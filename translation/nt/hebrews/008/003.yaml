theological_decisions:
- issue: Referent of 'this one' (τοῦτον)
  chosen_reading: The phrase refers to Jesus as the high priest discussed in context,
    but the translation leaves the referent implicit in the main text.
  alternative_readings:
  - Explicitly supplying 'Messiah' or 'Christ' in the main text
  rationale: The immediate context in Hebrews identifies Jesus as the subject, but
    the Greek itself uses the demonstrative 'this one.' To avoid adding words not
    present while still preserving clarity, the main text keeps 'this one' and the
    rationale documents the referent.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cultic terminology
  chosen_reading: Retain 'gifts and sacrifices' as distinct priestly categories without
    theological paraphrase.
  alternative_readings:
  - Offerings and sacrifices
  - sacrificial gifts
  rationale: The verse states a general priestly principle and should not be expanded
    into a fuller doctrinal explanation of Christ's self-offering here. Preserving
    the two terms maintains the text's cultic precision and theological restraint.
  doctrine_reference: Translation philosophy §1, §3
