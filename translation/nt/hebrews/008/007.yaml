id: HEB.8.7
reference: Hebrews 8:7
source:
  edition: SBLGNT
  text: Εἰ γὰρ ἡ πρώτη ἐκείνη ἦν ἄμεμπτος, οὐκ ἂν δευτέρας ἐζητεῖτο τόπος·
translation:
  text: For if that first covenant had been faultless, no place would have been sought
    for a second.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'that first one'; 'covenant' is supplied from the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'no opportunity/occasion would have been sought for a second.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For if indeed
  lexicon: BDAG
  rationale: γάρ links this verse as an explanation of the previous argument, so 'For
    if' preserves both the inferential and conditional force naturally in English.
- source_word: ἡ πρώτη ἐκείνη
  chosen: that first covenant
  alternatives:
  - that first one
  - the first
  lexicon: BDAG
  rationale: The feminine adjective phrase refers back to the covenant discussed in
    context (8:6, quoting Jer 31). Supplying 'covenant' in English makes the referent
    explicit and avoids awkward ellipsis.
- source_word: ἦν ἄμεμπτος
  chosen: had been faultless
  alternatives:
  - was blameless
  - was without fault
  lexicon: BDAG
  rationale: ἄμεμπτος denotes being without basis for blame or fault. 'Faultless'
    is concise and idiomatic here. Rendering with pluperfect-like English ('had been')
    fits the contrary-to-fact condition in context.
- source_word: οὐκ ἂν
  chosen: no ... would have
  alternatives:
  - would not have
  - there would not have
  lexicon: BDAG
  rationale: οὐκ with ἄν marks the apodosis of a contrary-to-fact condition. 'No place
    would have' reproduces the negated hypothetical force smoothly.
- source_word: δευτέρας
  chosen: for a second
  alternatives:
  - for a second covenant
  - for another
  lexicon: BDAG
  rationale: The genitive depends on τόπος in the idiom 'place for a second.' Because
    the referent is again the covenant, English can leave it elliptical or make it
    explicit. The main text keeps the Greek brevity while the prior supplied 'covenant'
    already establishes the frame.
- source_word: ἐζητεῖτο τόπος
  chosen: place would have been sought
  alternatives:
  - opportunity would have been sought
  - occasion would have been sought
  - room would have been sought
  lexicon: BDAG
  rationale: The passive of ζητέω with τόπος is an idiomatic expression meaning that
    occasion/room was sought for something else. 'Place would have been sought' stays
    close to the Greek while remaining understandable.
