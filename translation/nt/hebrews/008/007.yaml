theological_decisions:
- issue: Whether to make 'covenant' explicit though not repeated in Greek
  chosen_reading: Explicitly supplied 'covenant' with 'that first covenant'
  alternative_readings:
  - that first one
  - the first
  rationale: The immediate context contrasts the first and second covenants. Supplying
    'covenant' clarifies the author's argument without adding a new doctrinal claim;
    it simply makes explicit the understood referent of the feminine adjectives.
  doctrine_reference: Translation philosophy §1, §5
- issue: Implication of fault in the first covenant
  chosen_reading: Rendered ἄμεμπτος as 'faultless' without expanding the nature of
    the fault
  alternative_readings:
  - blameless
  - without fault
  rationale: The verse states the conditional logic of the argument but does not itself
    specify whether the deficiency lies in the covenant, its administration, or the
    people associated with it (clarified in the next verse). The translation preserves
    that tension and does not import a fuller theological explanation into this verse.
  doctrine_reference: Translation philosophy §3
