theological_decisions:
- issue: Rendering of ἠμέλησα αὐτῶν in a verse echoing Jeremiah 31:32, where MT and
    LXX/Hebrews differ in sense
  chosen_reading: I disregarded them
  alternative_readings:
  - I neglected them
  - I turned away from them
  - though I was their husband
  rationale: The Greek text of Hebrews clearly reads ἠμέλησα αὐτῶν, reflecting the
    LXX-like sense rather than the MT's 'I was their husband/master.' The translation
    follows the Greek as required by original-language primacy, while preserving the
    notable OT alternative in a footnote because of its theological and intertextual
    significance.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
