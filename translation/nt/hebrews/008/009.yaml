id: HEB.8.9
reference: Hebrews 8:9
source:
  edition: SBLGNT
  text: οὐ κατὰ τὴν διαθήκην ἣν ἐποίησα τοῖς πατράσιν αὐτῶν ἐν ἡμέρᾳ ἐπιλαβομένου
    μου τῆς χειρὸς αὐτῶν ἐξαγαγεῖν αὐτοὺς ἐκ γῆς Αἰγύπτου, ὅτι αὐτοὶ οὐκ ἐνέμειναν
    ἐν τῇ διαθήκῃ μου, κἀγὼ ἠμέλησα αὐτῶν, λέγει κύριος.
translation:
  text: not like the covenant that I made with their fathers on the day when I took
    hold of their hand to lead them out of the land of Egypt, because they did not
    continue in my covenant, and I disregarded them, says the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'when I took them by the hand.'
    reason: lexical_alternative
  - marker: b
    text: 'The quotation follows the Greek wording reflected in Hebrews: ''I disregarded
      them.'' Jeremiah 31:32 in the Hebrew text has a different sense, often rendered
      ''though I was their husband'' or ''though I was their master.'''
    reason: alternative_reading
lexical_decisions:
- source_word: διαθήκην
  chosen: covenant
  alternatives:
  - agreement
  - testament
  lexicon: BDAG
  rationale: In Hebrews, διαθήκη is theologically tied to God's covenantal dealings,
    especially in the quotation of Jeremiah 31. 'Covenant' is the established and
    contextually precise rendering; 'testament' would mislead in this context.
- source_word: ἐποίησα
  chosen: made
  alternatives:
  - established
  - enacted
  lexicon: BDAG
  rationale: ποιέω with διαθήκη commonly means 'make' a covenant. 'Established' or
    'enacted' are possible but less direct than the Greek's ordinary idiom.
- source_word: πατράσιν
  chosen: fathers
  alternatives:
  - ancestors
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and refers to the forefathers
    of Israel. Per gender-accurate policy, 'fathers' is preferred over the more neutral
    'ancestors'.
- source_word: ἐν ἡμέρᾳ
  chosen: on the day
  alternatives:
  - in the day
  - when
  lexicon: BDAG
  rationale: This is a temporal expression introducing the historical moment of the
    exodus. 'On the day' preserves the concrete temporal force while remaining natural
    English.
- source_word: ἐπιλαβομένου μου τῆς χειρὸς αὐτῶν
  chosen: when I took hold of their hand
  alternatives:
  - when I grasped their hand
  - when I took them by the hand
  lexicon: BDAG
  rationale: The genitive absolute is rendered temporally. 'Took hold of their hand'
    closely reflects ἐπιλαμβάνομαι plus χειρός. 'Took them by the hand' is idiomatic
    and traditional, but the chosen wording preserves the singular 'hand' imagery
    more transparently.
- source_word: ἐξαγαγεῖν
  chosen: to lead them out
  alternatives:
  - to bring them out
  lexicon: BDAG
  rationale: ἐξάγω means to lead or bring out. 'Lead them out' fits the exodus imagery
    of God personally guiding Israel and works well with the preceding hand-taking
    image.
- source_word: γῆς Αἰγύπτου
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: BDAG
  rationale: The Greek explicitly includes γῆς, so 'the land of Egypt' preserves the
    fuller expression rather than abbreviating to simply 'Egypt.'
- source_word: ἐνέμειναν
  chosen: did not continue in
  alternatives:
  - did not remain in
  - did not persist in
  - did not abide in
  lexicon: BDAG
  rationale: ἐμμένω conveys remaining or continuing in a state or commitment. 'Continue
    in' is natural modern English and suits covenant fidelity language.
- source_word: κἀγὼ
  chosen: and I
  alternatives:
  - so I
  - therefore I
  lexicon: BDAG
  rationale: The crasis simply means 'and I.' While the context implies consequence,
    the conjunction itself should not be overinterpreted into a stronger inferential
    connector.
- source_word: ἠμέλησα αὐτῶν
  chosen: I disregarded them
  alternatives:
  - I neglected them
  - I turned away from them
  - I did not care for them
  lexicon: BDAG
  rationale: ἀμελέω means to be unconcerned about, neglect, or disregard. 'Disregarded'
    preserves the judicial-relational force here without importing a stronger idea
    like active rejection beyond the wording itself. It also fits the contrast with
    Israel's failure to remain in the covenant.
- source_word: λέγει κύριος
  chosen: says the Lord
  alternatives:
  - declares the Lord
  lexicon: BDAG
  rationale: λέγει is present tense in citation formulae and is naturally rendered
    'says.' κύριος is translated 'Lord' per the project's default for this contested
    term and in continuity with covenantal quotation style.
