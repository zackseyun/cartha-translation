id: HEB.8.10
reference: Hebrews 8:10
source:
  edition: SBLGNT
  text: ὅτι αὕτη ἡ διαθήκη ἣν διαθήσομαι τῷ οἴκῳ Ἰσραὴλ μετὰ τὰς ἡμέρας ἐκείνας, λέγει
    κύριος, διδοὺς νόμους μου εἰς τὴν διάνοιαν αὐτῶν, καὶ ἐπὶ καρδίας αὐτῶν ἐπιγράψω
    αὐτούς, καὶ ἔσομαι αὐτοῖς εἰς θεόν καὶ αὐτοὶ ἔσονταί μοι εἰς λαόν.
translation:
  text: 'For this is the covenant that I will make with the house of Israel after
    those days, says the Lord: putting my laws into their mind, and I will write them
    on their hearts; and I will be their God, and they will be my people.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more smoothly: ''I will put my laws into their mind, and I will write
      them on their hearts.'' The Greek has a participle (''putting/giving'') followed
      by a future verb (''I will write'').'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκη
  chosen: covenant
  alternatives:
  - testament
  - arrangement
  lexicon: BDAG
  rationale: In Hebrews, διαθήκη carries the covenantal sense drawn from Jeremiah
    31 rather than a last-will/testament sense. 'Covenant' preserves the OT background
    and theological continuity.
- source_word: διαθήσομαι
  chosen: I will make
  alternatives:
  - I will establish
  - I will covenant
  lexicon: BDAG
  rationale: Future middle of διατίθεμαι in covenant contexts commonly means to make
    or establish a covenant. 'I will make' is idiomatic and closely reflects the Greek
    without overformal stiffness.
- source_word: οἴκῳ Ἰσραήλ
  chosen: the house of Israel
  alternatives:
  - Israel
  - the household of Israel
  lexicon: BDAG
  rationale: The phrase echoes the prophetic covenant formula from Jeremiah. 'House
    of Israel' preserves the corporate, covenantal expression better than the simpler
    'Israel'.
- source_word: μετὰ τὰς ἡμέρας ἐκείνας
  chosen: after those days
  alternatives:
  - after those days have passed
  - after that time
  lexicon: BDAG
  rationale: A straightforward temporal rendering that preserves the prophetic idiom
    and intertextual link to Jeremiah 31.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - the LORD
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Although the quotation
    ultimately reflects YHWH in Jeremiah, the Greek text here has κύριος, and 'Lord'
    matches both covenantal resonance and NT usage.
- source_word: διδοὺς
  chosen: putting
  alternatives:
  - giving
  - placing
  lexicon: BDAG
  rationale: The participle is somewhat irregular in relation to the following finite
    verb, but semantically it introduces the means/content of the covenant promise.
    'Putting' fits naturally with laws entering the mind and pairs well with 'write'
    in the next clause.
- source_word: νόμους
  chosen: laws
  alternatives:
  - law
  - instructions
  lexicon: BDAG
  rationale: The plural is explicit in the Greek and should be preserved. 'Laws' reflects
    the text more directly than smoothing to the singular 'law' under influence from
    some English traditions.
- source_word: διάνοιαν
  chosen: mind
  alternatives:
  - understanding
  - thought
  lexicon: BDAG
  rationale: διάνοια refers to the faculty of understanding/thought. 'Mind' is natural
    modern English and preserves the inward, cognitive dimension in contrast with
    'hearts' in the next clause.
- source_word: ἐπὶ καρδίας αὐτῶν
  chosen: on their hearts
  alternatives:
  - upon their hearts
  - in their hearts
  lexicon: BDAG
  rationale: ἐπί with the accusative here is well rendered 'on,' matching the writing
    metaphor. This also preserves the parallel with inscription language.
- source_word: ἐπιγράψω
  chosen: I will write
  alternatives:
  - I will inscribe
  - I will write down
  lexicon: BDAG
  rationale: '''I will write'' is clear and idiomatic. ''Inscribe'' is possible and
    slightly more vivid, but ''write'' better suits readable modern English while
    retaining the metaphor.'
- source_word: ἔσομαι αὐτοῖς εἰς θεόν
  chosen: I will be their God
  alternatives:
  - I will be God to them
  lexicon: BDAG
  rationale: This is the standard covenant formula. 'I will be their God' is the most
    natural English equivalent and preserves the relational-covenantal force.
- source_word: αὐτοὶ ἔσονταί μοι εἰς λαόν
  chosen: they will be my people
  alternatives:
  - they will be a people for me
  lexicon: BDAG
  rationale: This completes the covenant formula. 'My people' is the established and
    accurate English rendering, preserving both possession and relationship.
