theological_decisions:
- issue: Rendering the covenant quotation from Jeremiah with strong intertextual continuity
  chosen_reading: Preserve OT covenantal phrasing such as 'house of Israel,' 'my laws,'
    'their hearts,' 'I will be their God,' and 'they will be my people.'
  alternative_readings:
  - Smoother contemporary paraphrase that reduces the quotation's formal echoes
  rationale: The verse is a direct citation/allusion to Jeremiah 31, and its theological
    force depends on recognizable covenant language. Optimal equivalence here leans
    slightly formal to preserve that continuity.
  doctrine_reference: 'Translation philosophy: Original-language primacy; Preserve
    theological tension rather than resolve it; Readable modern English, not archaic
    or academic.'
- issue: Whether to smooth the mixed verbal construction 'putting ... and I will write'
    into two finite futures
  chosen_reading: Retain the participial sense with 'putting ... and I will write'
    rather than fully smoothing to 'I will put ... and write.'
  alternative_readings:
  - I will put my laws into their mind, and I will write them on their hearts
  rationale: The Greek text uses the participle διδοὺς followed by the future ἐπιγράψω.
    Retaining 'putting' exposes the source structure while remaining intelligible
    in English. The alternative is stylistically smoother and worth preserving in
    a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Original-language
    primacy over translation tradition.'
