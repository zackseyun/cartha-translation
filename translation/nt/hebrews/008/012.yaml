id: HEB.8.12
reference: Hebrews 8:12
source:
  edition: SBLGNT
  text: ὅτι ἵλεως ἔσομαι ταῖς ἀδικίαις αὐτῶν, καὶ τῶν ἁμαρτιῶν ⸀αὐτῶν οὐ μὴ μνησθῶ
    ἔτι.
translation:
  text: For I will be merciful toward their unrighteous deeds, and I will remember
    their sins no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For I will be favorable to their injustices.' The Greek ἀδικίαις can
      denote acts of wrongdoing or injustice; 'unrighteous deeds' was chosen to preserve
      the moral sense in context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'I will certainly not remember their sins any longer.' This is
      a covenantal idiom for full forgiveness, not a claim that God ceases to know
      them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In this citation context, ὅτι introduces the content/reason for the preceding
    covenant promise. 'For' reads naturally in English while preserving the explanatory
    force.
- source_word: ἵλεως
  chosen: merciful
  alternatives:
  - gracious
  - favorable
  - propitious
  lexicon: BDAG
  rationale: ἵλεως denotes a disposition of mercy or favorable clemency. 'Merciful'
    is clear modern English and avoids the more technical 'propitious,' while preserving
    the covenantal sense of divine pardon.
- source_word: ἔσομαι
  chosen: I will be
  alternatives:
  - I shall be
  lexicon: BDAG
  rationale: Future middle of εἰμί is straightforwardly rendered 'I will be.'
- source_word: ταῖς ἀδικίαις αὐτῶν
  chosen: toward their unrighteous deeds
  alternatives:
  - to their unrighteousnesses
  - toward their injustices
  - toward their lawless acts
  lexicon: BDAG
  rationale: The dative after ἵλεως is idiomatically rendered with 'toward.' ἀδικία
    can mean unrighteousness, wrongdoing, or injustice. Here the plural points to
    concrete acts, so 'unrighteous deeds' preserves both moral weight and plurality
    better than the abstract 'unrighteousness.'
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction.
- source_word: τῶν ἁμαρτιῶν αὐτῶν
  chosen: their sins
  alternatives:
  - their sinful acts
  lexicon: BDAG
  rationale: ἁμαρτία is standardly 'sin'; the plural naturally becomes 'sins.'
- source_word: οὐ μὴ μνησθῶ
  chosen: I will remember ... no more
  alternatives:
  - I will certainly not remember
  - I will never remember again
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is a strong negation. English idiom
    is best captured by 'I will remember ... no more,' which preserves both futurity
    and emphatic denial without sounding wooden.
- source_word: ἔτι
  chosen: no more
  alternatives:
  - any longer
  - again
  lexicon: BDAG
  rationale: With the negated verb, ἔτι conveys cessation/continuation no longer.
    'No more' is concise and idiomatic in this covenant-forgiveness context.
