theological_decisions:
- issue: Force of divine non-remembrance
  chosen_reading: Covenantal forgiveness expressed as God no longer holding sins against
    his people
  alternative_readings:
  - Literal divine forgetting
  rationale: The idiom of 'remembering sins no more' in covenantal context communicates
    decisive forgiveness and non-imputation rather than suggesting a limitation in
    divine knowledge. The translation keeps the biblical idiom intact without over-explaining
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
