id: HEB.8.11
reference: Hebrews 8:11
source:
  edition: SBLGNT
  text: καὶ οὐ μὴ διδάξωσιν ἕκαστος τὸν πολίτην αὐτοῦ καὶ ἕκαστος τὸν ἀδελφὸν αὐτοῦ,
    λέγων· Γνῶθι τὸν κύριον, ὅτι πάντες εἰδήσουσίν με ἀπὸ ⸀μικροῦ ἕως μεγάλου αὐτῶν.
translation:
  text: And they will certainly not teach, each one his fellow citizen and each one
    his brother, saying, ‘Know the Lord,’ because they will all know me, from the
    least of them to the greatest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'neighbor.' The Greek text of Hebrews has 'fellow citizen,' while the
      underlying Jeremiah passage is commonly rendered 'neighbor.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ μὴ διδάξωσιν
  chosen: they will certainly not teach
  alternatives:
  - they shall not teach
  - they will by no means teach
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Will certainly
    not' preserves the force in natural modern English better than a bare future negative,
    while avoiding archaic 'shall.'
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - everyone
  lexicon: BDAG
  rationale: The distributive force is important because the clause emphasizes individual
    members within the covenant community. 'Each one' makes that explicit.
- source_word: πολίτην
  chosen: fellow citizen
  alternatives:
  - neighbor
  - countryman
  - fellow townsman
  lexicon: BDAG
  rationale: The Greek is literally 'citizen,' not the wording found in the LXX of
    Jeremiah ('neighbor'). Since the translation philosophy prioritizes the extant
    Greek text, 'fellow citizen' preserves the lexical specificity, even though 'neighbor'
    is more traditional and smoother.
- source_word: ἀδελφόν
  chosen: brother
  alternatives:
  - brother or sister
  - fellow believer
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular and should be rendered
    gender-accurately per doctrine guidelines. 'Brother' preserves the source form
    and the familial covenant language; broader inclusive implications may be inferred
    from context without changing the lexical form.
- source_word: Γνῶθι
  chosen: Know
  alternatives:
  - Come to know
  - Recognize
  lexicon: BDAG
  rationale: 'The aorist imperative here functions as a command: ''Know the Lord.''
    ''Know'' is the most direct and idiomatic rendering in this citation context.'
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per the contested-terms guidance, κύριος is rendered 'Lord.' This also
    fits the covenantal resonance of the Jeremiah citation.
- source_word: εἰδήσουσίν με
  chosen: they will all know me
  alternatives:
  - all of them will know me
  lexicon: BDAG
  rationale: οἶδα in the future conveys knowledge, and the explicit object 'me' should
    be retained. The placement 'they will all know me' is natural English and preserves
    πάντες.
- source_word: ἀπὸ μικροῦ ἕως μεγάλου αὐτῶν
  chosen: from the least of them to the greatest
  alternatives:
  - from their least to their greatest
  - from the small to the great among them
  lexicon: BDAG
  rationale: This idiom denotes the full range of persons within the group, not merely
    age or status in one narrow sense. 'From the least of them to the greatest' is
    idiomatic English and preserves the inclusive scope.
