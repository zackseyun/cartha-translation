theological_decisions:
- issue: Rendering the covenant-community term πολίτην in a quotation/allusion to
    Jeremiah 31:34
  chosen_reading: fellow citizen
  alternative_readings:
  - neighbor
  rationale: Although many English translations use 'neighbor' due to the OT source
    context, the Greek text of Hebrews here reads πολίτην. Following original-language
    primacy, the main text reflects the Greek wording. The more familiar alternative
    is preserved in a footnote because readers may expect the Jeremiah phrasing.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
- issue: Gendered familial language in ἀδελφόν
  chosen_reading: brother
  alternative_readings:
  - brother or sister
  rationale: The source text is masculine singular and distributive. Per the doctrine
    guidelines, gender-accurate rendering is preferred over flattening to gender-neutral
    language, while recognizing that the covenant promise applies comprehensively.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
