theological_decisions:
- issue: Referent of 'the holy places' and relation to the heavenly sanctuary
  chosen_reading: Cultic/heavenly sanctuary language rather than a reference to holy
    people
  alternative_readings:
  - the saints
  rationale: Hebrews 8:1-5 discusses the Messiah's high-priestly ministry in the heavenly
    sanctuary. Rendering τῶν ἁγίων as 'the holy places' preserves the tabernacle-temple
    framework and avoids shifting the verse toward ministry to people rather than
    in the sanctuary.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
- issue: Generic force of ἄνθρωπος
  chosen_reading: generic 'man' in contrast with the Lord
  alternative_readings:
  - human being
  rationale: The contrast is between what the Lord established and what humans establish.
    'Man' preserves the representative generic force and the terse rhetorical contrast
    of the Greek, consistent with the gender-accurate policy.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral'
