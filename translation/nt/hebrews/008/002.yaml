id: HEB.8.2
reference: Hebrews 8:2
source:
  edition: SBLGNT
  text: τῶν ἁγίων λειτουργὸς καὶ τῆς σκηνῆς τῆς ἀληθινῆς, ἣν ἔπηξεν ὁ κύριος, ⸀οὐκ
    ἄνθρωπος.
translation:
  text: a minister of the holy places and of the true tabernacle, which the Lord set
    up, not man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary'; the Greek phrase can denote the holy places of the sanctuary
      rather than holy people.
    reason: lexical_alternative
  - marker: b
    text: Or 'which the Lord pitched.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν ἁγίων
  chosen: the holy places
  alternatives:
  - the saints
  - the sanctuary
  - holy things
  lexicon: BDAG
  rationale: The genitive plural adjective functions substantivally. In Hebrews' cultic
    context, it most naturally refers to the heavenly sanctuary/holy places rather
    than to holy people ('saints'). 'Holy places' preserves the plural form and the
    sanctuary sense without over-specifying beyond the Greek.
- source_word: λειτουργὸς
  chosen: minister
  alternatives:
  - servant
  - liturgist
  lexicon: BDAG
  rationale: The term denotes one who performs public/religious service. 'Minister'
    captures the cultic-priestly sense in readable English better than the overly
    generic 'servant' or the too technical/transliterated 'liturgist'.
- source_word: σκηνῆς
  chosen: tabernacle
  alternatives:
  - tent
  - dwelling
  lexicon: BDAG
  rationale: In Hebrews this term evokes the Mosaic tabernacle and its heavenly counterpart.
    'Tabernacle' preserves that biblical-cultic resonance more clearly than the more
    generic 'tent'.
- source_word: ἀληθινῆς
  chosen: 'true'
  alternatives:
  - real
  - genuine
  lexicon: BDAG
  rationale: In Johannine and Hebrews-style theological usage, ἀληθινός often means
    ultimate or corresponding to reality. 'True' is the standard concise rendering
    and preserves the contrast with the earthly copy without interpretively expanding
    to 'real' in the main text.
- source_word: ἔπηξεν
  chosen: set up
  alternatives:
  - pitched
  - erected
  - established
  lexicon: BDAG
  rationale: The verb literally refers to fixing or setting up, especially of a tent/tabernacle.
    'Set up' is natural English and fits the tabernacle imagery. 'Pitched' is possible
    and vivid, but slightly more idiomatic; it is preserved in a footnote.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' The article is retained in English
    because it is idiomatic here and marks the subject distinctly.
- source_word: οὐκ ἄνθρωπος
  chosen: not man
  alternatives:
  - not a man
  - not a human being
  lexicon: BDAG
  rationale: The anarthrous singular contrasts divine action with human action in
    a representative sense. 'Not man' is concise and preserves the generic force of
    ἄνθρωπος in line with the gender-accurate policy; 'not a human being' is more
    explicit but less idiomatic here.
