theological_decisions:
- issue: Referent of αὐτούς in 'finding fault with them'
  chosen_reading: The fault is found with the people, not with the covenant itself.
  alternative_readings:
  - The fault is found with the first covenant
  rationale: 'The masculine plural pronoun naturally refers to persons, and the immediate
    quotation from Jeremiah rebukes Israel and Judah. This also fits the argument
    of Hebrews 8: the first covenant was not faultless because the people did not
    continue in it, not because God''s covenant was morally defective.'
  doctrine_reference: Preserve theological tension rather than resolve it beyond the
    grammar; here the grammar sufficiently supports the people as referent.
- issue: Rendering of διαθήκη
  chosen_reading: covenant
  alternative_readings:
  - testament
  rationale: In this prophetic citation and broader biblical-theological context,
    διαθήκη refers to God's covenantal arrangement with his people. 'Testament' would
    obscure the Jeremiah background and the argument of Hebrews 8.
  doctrine_reference: Consistency of key terms, or documented exception.
