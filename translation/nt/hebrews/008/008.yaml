id: HEB.8.8
reference: Hebrews 8:8
source:
  edition: SBLGNT
  text: μεμφόμενος γὰρ ⸀αὐτοὺς λέγει· Ἰδοὺ ἡμέραι ἔρχονται, λέγει κύριος, καὶ συντελέσω
    ἐπὶ τὸν οἶκον Ἰσραὴλ καὶ ἐπὶ τὸν οἶκον Ἰούδα διαθήκην καινήν,
translation:
  text: For in finding fault with them he says, “Look, days are coming, says the Lord,
    when I will establish a new covenant with the house of Israel and with the house
    of Judah,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in blaming them he says.' The Greek participle can carry the sense of
      expressing fault or reproach.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will make a new covenant.' The verb can mean to bring to completion
      or conclude; 'establish' was chosen to convey covenant enactment in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεμφόμενος
  chosen: in finding fault
  alternatives:
  - finding fault
  - blaming
  - rebuking
  lexicon: BDAG
  rationale: The participle from μέμφομαι denotes expressing disapproval or finding
    fault. Rendering it as 'in finding fault' preserves the participial connection
    to the main verb λέγει while sounding natural in English. It avoids overpersonalizing
    the action as mere emotional blame.
- source_word: αὐτοὺς
  chosen: with them
  alternatives:
  - them
  - with it
  lexicon: BDAG
  rationale: The direct object is masculine plural, naturally referring to the people
    addressed rather than the covenant itself. English idiom with 'find fault' commonly
    takes 'with,' so 'finding fault with them' best reflects both grammar and natural
    usage.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation for the preceding argument. 'For' is the
    standard concise connective and fits the discourse flow.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  - it says
  lexicon: BDAG
  rationale: The present tense is a common scriptural citation formula in Greek. 'He
    says' preserves the vivid present and the personal subject implied by the quotation's
    speaker.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is an attention-getting particle. 'Look' is readable modern English
    and preserves the force without archaic tone; 'Behold' would be more traditional
    but less natural for the stated translation philosophy.
- source_word: ἡμέραι ἔρχονται
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on their way
  lexicon: BDAG
  rationale: This is a standard prophetic formula. Omitting the article in English
    keeps the phrase idiomatic while preserving the future-oriented prophetic announcement.
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this citation of Jeremiah,
    the referent is the covenant God of Israel; English idiom in prophetic formula
    favors 'says the Lord.'
- source_word: συντελέσω
  chosen: I will establish
  alternatives:
  - I will complete
  - I will conclude
  - I will make
  lexicon: BDAG
  rationale: In covenantal context, συντελέω can mean bring about, complete, or conclude.
    'Establish' communicates the formal enactment of the covenant in clear English
    without implying mere drafting. 'Make' is possible, but 'establish' better reflects
    the sense of bringing the covenant into effect.
- source_word: ἐπὶ τὸν οἶκον Ἰσραὴλ ... ἐπὶ τὸν οἶκον Ἰούδα
  chosen: with the house of Israel and with the house of Judah
  alternatives:
  - upon the house of Israel and upon the house of Judah
  - for the house of Israel and the house of Judah
  lexicon: BDAG
  rationale: Although ἐπί with accusative is literally 'upon/over,' in covenant-making
    context English idiom is 'with.' Retaining 'house of Israel' and 'house of Judah'
    preserves the corporate, covenantal identity language of the source.
- source_word: διαθήκην καινήν
  chosen: a new covenant
  alternatives:
  - a fresh covenant
  lexicon: BDAG
  rationale: διαθήκη in Hebrews is a major theological term best rendered consistently
    as 'covenant,' not 'testament,' in this context. καινήν denotes new in kind or
    quality; 'new covenant' is both accurate and intertextually important with Jeremiah
    31.
