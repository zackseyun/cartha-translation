id: HEB.8.13
reference: Hebrews 8:13
source:
  edition: SBLGNT
  text: ἐν τῷ λέγειν Καινὴν πεπαλαίωκεν τὴν πρώτην, τὸ δὲ παλαιούμενον καὶ γηράσκον
    ἐγγὺς ἀφανισμοῦ.
translation:
  text: By saying, “new,” he has made the first obsolete. And what is becoming obsolete
    and growing old is near to disappearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “In saying” or “When he says.”
    reason: lexical_alternative
  - marker: b
    text: The Greek quotes only “new,” echoing the phrase “new covenant” from the
      preceding citation of Jeremiah 31:31.
    reason: cross_reference
  - marker: c
    text: Or “is near to vanishing.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ λέγειν
  chosen: By saying
  alternatives:
  - In saying
  - When he says
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is idiomatic and expresses circumstance
    or means. 'By saying' preserves the close connection to the citation of 'a new
    covenant' in the previous verse while remaining natural English. 'When he says'
    is possible, but 'By saying' better reflects the instrumental nuance.
- source_word: Καινὴν
  chosen: “new”
  alternatives:
  - a new covenant
  lexicon: BDAG
  rationale: The adjective is quoted elliptically from Jeremiah 31:31 as cited in
    Hebrews 8:8. Rendering it simply as 'new' preserves the Greek's concise allusion.
    'A new covenant' is interpretively explicit but adds a noun not present in this
    verse; the quotation marks signal the ellipsis.
- source_word: πεπαλαίωκεν
  chosen: has made ... obsolete
  alternatives:
  - has made ... old
  - has declared ... outdated
  lexicon: BDAG
  rationale: The perfect tense indicates a completed action with present result. 'Has
    made obsolete' captures the force of παλαιόω here better than the more literal
    but less idiomatic 'has made old,' and fits the covenantal contrast in context.
- source_word: τὴν πρώτην
  chosen: the first
  alternatives:
  - the first covenant
  lexicon: BDAG
  rationale: The adjective functions substantivally and refers to the first covenant
    from context. 'The first' preserves the Greek wording without importing the noun
    into the main text; the referent remains clear from the preceding discussion.
- source_word: τὸ ... παλαιούμενον
  chosen: what is becoming obsolete
  alternatives:
  - what is being made obsolete
  - the thing becoming obsolete
  lexicon: BDAG
  rationale: The present participle denotes an ongoing process. 'What is becoming
    obsolete' is natural English and preserves the inceptive/processive sense better
    than a more wooden rendering.
- source_word: γηράσκον
  chosen: growing old
  alternatives:
  - aging
  lexicon: BDAG
  rationale: The participle complements παλαιούμενον with imagery of aging. 'Growing
    old' is idiomatic and preserves the metaphor clearly.
- source_word: ἐγγὺς
  chosen: is near to
  alternatives:
  - is close to
  - is at hand for
  lexicon: BDAG
  rationale: ἐγγύς with the genitive expresses nearness. 'Is near to' is straightforward
    and natural in English.
- source_word: ἀφανισμοῦ
  chosen: disappearing
  alternatives:
  - vanishing
  - destruction
  - removal
  lexicon: BDAG
  rationale: The noun denotes disappearance or vanishing. 'Disappearing' is accessible
    modern English and fits the author's temporal argument. 'Vanishing' is a strong
    alternative and is preserved in a footnote because of its familiarity in English
    tradition.
