theological_decisions:
- issue: Referent of the implied subject in 'By saying, “new,”'
  chosen_reading: Rendered as 'he' without specifying God or Scripture in the main
    text.
  alternative_readings:
  - God says
  - Scripture says
  rationale: The Greek leaves the subject implicit, referring back to the speaker
    in the Jeremiah citation. Using 'he' preserves the textual economy and avoids
    over-specifying beyond what the verse itself states, while the context makes the
    referent sufficiently clear.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Implication of the old covenant's status
  chosen_reading: '''has made the first obsolete'''
  alternative_readings:
  - has made the first old
  rationale: The context contrasts the first covenant with the promised new covenant
    and argues that the former is superseded. 'Obsolete' best conveys the covenantal
    force without importing extra doctrinal claims about the law beyond the author's
    argument.
