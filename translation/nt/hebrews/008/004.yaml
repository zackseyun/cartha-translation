id: HEB.8.4
reference: Hebrews 8:4
source:
  edition: SBLGNT
  text: εἰ μὲν ⸀οὖν ἦν ἐπὶ γῆς, οὐδ’ ἂν ἦν ἱερεύς, ⸀ὄντων τῶν προσφερόντων κατὰ ⸀νόμον
    τὰ δῶρα·
translation:
  text: Now if he were on earth, he would not even be a priest, since there are those
    who offer the gifts according to the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the offerings.' The Greek says 'the gifts,' a common sacrificial term
      in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ μὲν οὖν
  chosen: Now if
  alternatives:
  - If then
  - Therefore if indeed
  lexicon: BDAG
  rationale: The particle combination marks a logical transition and sets up a conditional
    statement. 'Now if' preserves the discourse movement in natural English without
    overloading the line with multiple connective particles.
- source_word: ἦν
  chosen: he were
  alternatives:
  - he was
  lexicon: BDAG
  rationale: Although formally imperfect indicative, in this second-class conditional
    construction with ἄν in the apodosis, English idiom is best represented by 'were'
    to signal the contrary-to-fact condition.
- source_word: ἐπὶ γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  - on the land
  lexicon: BDAG
  rationale: The phrase contrasts earthly location with the heavenly sphere in the
    surrounding context. 'On earth' is the most natural and contextually appropriate
    rendering.
- source_word: οὐδ’ ἂν ἦν
  chosen: he would not even be
  alternatives:
  - he would not be at all
  - nor would he be
  lexicon: BDAG
  rationale: οὐδὲ with ἄν intensifies the negation in the apodosis. 'Would not even
    be' captures the emphatic exclusion clearly in English.
- source_word: ἱερεύς
  chosen: a priest
  lexicon: BDAG
  rationale: Standard rendering for the cultic office. The indefinite article is required
    in English though absent in Greek.
- source_word: ὄντων τῶν προσφερόντων
  chosen: since there are those who offer
  alternatives:
  - because there are those offering
  - while those who offer exist
  lexicon: BDAG
  rationale: The genitive absolute gives the circumstance/reason for the preceding
    statement. 'Since there are those who offer' communicates the causal force in
    idiomatic English.
- source_word: κατὰ νόμον
  chosen: according to the law
  alternatives:
  - in accordance with the law
  - according to law
  lexicon: BDAG
  rationale: νόμος here refers to the Mosaic legal order governing priestly offerings.
    'According to the law' is both clear and sufficiently formal.
- source_word: τὰ δῶρα
  chosen: the gifts
  alternatives:
  - the offerings
  lexicon: BDAG
  rationale: δῶρα in sacrificial context can be rendered 'gifts' or 'offerings.' 'Gifts'
    preserves the lexical distinction present in the Greek while still fitting the
    cultic setting; 'offer' already renders προσφερόντων, so this keeps the noun and
    verb from collapsing into the same English term.
