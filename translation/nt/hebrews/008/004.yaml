theological_decisions:
- issue: Implicit subject of the conditional clause
  chosen_reading: Render the subject as 'he,' referring to Jesus/the Messiah from
    the immediate context.
  alternative_readings:
  - Leave the subject fully implicit in English
  rationale: English requires an explicit subject, and the antecedent is clear from
    the surrounding argument about Messiah's priesthood. This does not add doctrine
    beyond the discourse context; it simply makes the Greek ellipsis intelligible
    in English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import
    doctrinal claims the text does not make.'
- issue: Force of the conditional statement
  chosen_reading: 'Translate as a contrary-to-fact condition: ''if he were on earth,
    he would not even be a priest.'''
  alternative_readings:
  - 'A more wooden past-tense form: ''if he was on earth, he would not be a priest'''
  rationale: The εἰ + imperfect ... οὐδ’ ἂν + imperfect construction is naturally
    represented in English as contrary to fact. This preserves the author's argument
    about the heavenly character of Messiah's priesthood without overstating it.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense.'
