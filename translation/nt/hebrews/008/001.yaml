id: HEB.8.1
reference: Hebrews 8:1
source:
  edition: SBLGNT
  text: Κεφάλαιον δὲ ἐπὶ τοῖς λεγομένοις, τοιοῦτον ἔχομεν ἀρχιερέα, ὃς ἐκάθισεν ἐν
    δεξιᾷ τοῦ θρόνου τῆς μεγαλωσύνης ἐν τοῖς οὐρανοῖς,
translation:
  text: 'Now the main point in what is being said is this: we have such a high priest,
    who sat down at the right hand of the throne of the Majesty in the heavens,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sum' or 'the chief point' in what has been said.
    reason: lexical_alternative
  - marker: b
    text: Or 'in heaven'; Greek 'in the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κεφάλαιον
  chosen: the main point
  alternatives:
  - the sum
  - the chief point
  - the point
  lexicon: BDAG
  rationale: In this discourse marker context, κεφάλαιον idiomatically means the principal
    point or summary of the argument, not a literal 'chapter.' 'The main point' is
    clear modern English and fits the author's transition.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ marks a mild transition rather than strong contrast here. 'Now' signals
    a discourse shift naturally in English.
- source_word: ἐπὶ τοῖς λεγομένοις
  chosen: in what is being said
  alternatives:
  - in the things being said
  - about what we are saying
  - in regard to the things spoken
  lexicon: BDAG
  rationale: The phrase is idiomatic and refers to the matters under discussion. 'In
    what is being said' preserves the present passive sense while remaining readable.
- source_word: τοιοῦτον
  chosen: such a
  alternatives:
  - this kind of
  - such
  lexicon: BDAG
  rationale: τοιοῦτον points back to the kind of high priest just described in the
    preceding argument. 'Such a' is the natural English equivalent before a singular
    noun.
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - we possess
  lexicon: BDAG
  rationale: Simple present possession is intended; 'we have' is direct and idiomatic.
- source_word: ἀρχιερέα
  chosen: high priest
  lexicon: BDAG
  rationale: Standard and precise rendering for the cultic office in Hebrews.
- source_word: ἐκάθισεν
  chosen: sat down
  alternatives:
  - took his seat
  - was seated
  lexicon: BDAG
  rationale: The aorist active indicates the completed act of taking the seat. 'Sat
    down' preserves the verbal action and echoes Hebrews' emphasis on the completed
    priestly work without over-interpreting.
- source_word: ἐν δεξιᾷ
  chosen: at the right hand
  alternatives:
  - on the right
  - at the right side
  lexicon: BDAG
  rationale: This is a standard idiom for the place of highest honor and authority.
    'At the right hand' preserves the biblical idiom.
- source_word: τοῦ θρόνου
  chosen: of the throne
  lexicon: BDAG
  rationale: A straightforward genitive dependent on 'right hand'; retaining 'throne'
    preserves the royal imagery.
- source_word: τῆς μεγαλωσύνης
  chosen: the Majesty
  alternatives:
  - Majesty on high
  - the Greatness
  - the Majestic One
  lexicon: BDAG
  rationale: A reverential circumlocution for God. 'The Majesty' is established biblical
    English and preserves the elevated, indirect reference without making the implicit
    subject overly explicit.
- source_word: ἐν τοῖς οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  - in the heavenly places
  lexicon: BDAG
  rationale: The Greek is plural, and 'in the heavens' preserves that form more closely
    than the singular 'in heaven,' while remaining understandable.
