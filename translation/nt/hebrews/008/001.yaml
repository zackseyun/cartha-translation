theological_decisions:
- issue: Whether to make the referent of 'the Majesty' explicit as God
  chosen_reading: Retain the reverential circumlocution 'the Majesty' without substituting
    'God.'
  alternative_readings:
  - the throne of God
  - the Majesty on high
  rationale: The Greek uses an elevated indirect designation rather than the direct
    noun θεός. Preserving that wording maintains the text's rhetorical and theological
    register without importing a more explicit formulation than the source text gives.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Whether ἐκάθισεν should be rendered dynamically to foreground completed priestly
    work
  chosen_reading: Translate as 'sat down' rather than an interpretive expansion such
    as 'took his seat in completed triumph.'
  alternative_readings:
  - took his seat
  - was seated
  rationale: Hebrews does connect Christ's seating with completed priestly work, but
    that implication should arise from the text and context, not from added wording
    in the translation.
  doctrine_reference: Do not import doctrinal claims the text does not make; optimal
    equivalence.
