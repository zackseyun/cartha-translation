id: HEB.8.6
reference: Hebrews 8:6
source:
  edition: SBLGNT
  text: ⸀νυνὶ δὲ διαφορωτέρας τέτυχεν λειτουργίας, ὅσῳ καὶ κρείττονός ἐστιν διαθήκης
    μεσίτης, ἥτις ἐπὶ κρείττοσιν ἐπαγγελίαις νενομοθέτηται.
translation:
  text: But as it is, he has obtained a more excellent ministry, by as much as he
    is also the mediator of a better covenant, which has been enacted on better promises.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'superior ministry.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has been established on better promises.'
    reason: lexical_alternative
  - marker: c
    text: The Greek word can mean 'covenant' or, in some contexts, 'testament'; here
      'covenant' fits the context of Jeremiah's new covenant promise cited in the
      following verses.
    reason: alternative_reading
lexical_decisions:
- source_word: νυνὶ δὲ
  chosen: But as it is
  alternatives:
  - But now
  - But as things now stand
  lexicon: BDAG
  rationale: Marks a present contrast with the earthly priests just discussed. 'But
    as it is' is idiomatic modern English that preserves the adversative and temporal
    force without sounding wooden.
- source_word: διαφορωτέρας
  chosen: more excellent
  alternatives:
  - more distinguished
  - superior
  lexicon: BDAG
  rationale: Comparative of διάφορος here conveys superiority/difference in quality.
    'More excellent' fits the elevated style of Hebrews and pairs naturally with the
    comparative logic of the verse.
- source_word: τέτυχεν
  chosen: has obtained
  alternatives:
  - has received
  - has attained
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from a completed action.
    'Has obtained' captures both acquisition and present possession of this ministry.
- source_word: λειτουργίας
  chosen: ministry
  alternatives:
  - service
  - priestly service
  lexicon: BDAG
  rationale: In context the term refers to Christ's sacred priestly ministry. 'Ministry'
    is clear and natural; 'priestly service' is possible but would make explicit what
    the surrounding context already supplies.
- source_word: ὅσῳ καὶ
  chosen: by as much as he is also
  alternatives:
  - inasmuch as he is also
  - to the degree that he is also
  lexicon: BDAG
  rationale: This comparative-correlative construction links the superiority of Christ's
    ministry to the superiority of the covenant he mediates. The chosen rendering
    is idiomatic and preserves the argument's proportional force.
- source_word: κρείττονός ... διαθήκης
  chosen: of a better covenant
  alternatives:
  - of a superior covenant
  lexicon: BDAG
  rationale: κρείττων is a key Hebrews term for superiority. 'Better' is the standard,
    natural English equivalent and preserves the author's repeated comparative emphasis.
- source_word: μεσίτης
  chosen: mediator
  alternatives:
  - go-between
  - intermediary
  lexicon: BDAG
  rationale: '''Mediator'' is the established and precise term for one who stands
    between parties to effect covenant relationship. It preserves the theological
    and legal nuance of the Greek.'
- source_word: ἥτις
  chosen: which
  alternatives:
  - and this covenant
  - which indeed
  lexicon: BDAG
  rationale: Refers back to 'covenant' and introduces a descriptive clause. 'Which'
    is sufficient in English; the qualitative nuance of ἥτις is not strong enough
    here to require expansion.
- source_word: ἐπὶ κρείττοσιν ἐπαγγελίαις
  chosen: on better promises
  alternatives:
  - upon better promises
  - based on better promises
  lexicon: BDAG
  rationale: ἐπί with the dative here indicates basis or foundation. 'On better promises'
    is concise and natural, while still preserving the covenant's grounding in divine
    promises.
- source_word: νενομοθέτηται
  chosen: has been enacted
  alternatives:
  - has been established
  - has been legislated
  lexicon: BDAG
  rationale: Perfect passive of νομοθετέω/νομοθετέομαι conveys that the covenant has
    been put into force or legally instituted, with continuing validity. 'Has been
    enacted' preserves the legal-covenantal sense better than the more generic 'established'.
