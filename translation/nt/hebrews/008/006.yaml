theological_decisions:
- issue: Rendering διαθήκη in Hebrews 8:6
  chosen_reading: covenant
  alternative_readings:
  - testament
  rationale: In Hebrews 8 the argument explicitly draws on Jeremiah's new covenant
    promise and priestly mediation, so 'covenant' best reflects the biblical-theological
    context. 'Testament' is possible in some contexts but would obscure the immediate
    OT covenant background here.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it only where the
    source is genuinely ambiguous.'
