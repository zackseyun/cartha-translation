theological_decisions:
- issue: Rendering of the Psalm 110:1 quotation in a way that preserves its christological
    force without over-interpreting it
  chosen_reading: 'Retain the direct quotation as an enthronement oracle addressed
    uniquely to the Son: ''Sit at my right hand until I make your enemies a footstool
    for your feet.'''
  alternative_readings:
  - More paraphrastic renderings that explain the image as 'until I completely defeat
    your enemies'
  rationale: Hebrews' argument depends on the exact wording of the cited Scripture
    and its contrast between the Son and angels. The translation therefore preserves
    the royal enthronement and subjugation imagery rather than flattening it into
    explanation.
  doctrine_reference: Translation philosophy §§1, 3, 6
