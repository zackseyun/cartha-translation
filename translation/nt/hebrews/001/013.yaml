id: HEB.1.13
reference: Hebrews 1:13
source:
  edition: SBLGNT
  text: πρὸς τίνα δὲ τῶν ἀγγέλων εἴρηκέν ποτε· Κάθου ἐκ δεξιῶν μου ἕως ἂν θῶ τοὺς
    ἐχθρούς σου ὑποπόδιον τῶν ποδῶν σου;
translation:
  text: But to which of the angels has he ever said, ‘Sit at my right hand until I
    make your enemies a footstool for your feet’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until I put your enemies beneath your feet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς τίνα δὲ τῶν ἀγγέλων
  chosen: But to which of the angels
  alternatives:
  - And to which of the angels
  - Now to which of the angels
  lexicon: BDAG
  rationale: πρός with τίνα after a verb of speaking yields the idiom 'to whom.' δέ
    is rendered 'But' to preserve the contrastive transition from the preceding catena
    argument while keeping natural English.
- source_word: εἴρηκέν ποτε
  chosen: has he ever said
  alternatives:
  - did he ever say
  - has he at any time said
  lexicon: BDAG
  rationale: The perfect εἴρηκεν can be represented idiomatically in English as 'has
    ... said,' emphasizing the standing force of God's utterance; ποτέ adds the sense
    'ever/at any time.'
- source_word: Κάθου
  chosen: Sit
  alternatives:
  - Sit down
  - Be seated
  lexicon: BDAG
  rationale: Imperative of κάθημαι in the quotation is most naturally 'Sit.' 'Sit
    down' is possible but slightly more colloquial; 'Be seated' is too formal and
    passive in tone.
- source_word: ἐκ δεξιῶν μου
  chosen: at my right hand
  alternatives:
  - at my right side
  - on my right hand
  lexicon: BDAG
  rationale: 'This is the standard idiomatic rendering of the enthronement formula.
    Although ἐκ is literally ''from/out of,'' in this fixed expression the sense is
    locative: the place of highest honor beside God.'
- source_word: ἕως ἂν θῶ
  chosen: until I make
  alternatives:
  - until I put
  - until I place
  lexicon: BDAG
  rationale: ἕως ἂν with the aorist subjunctive marks a future contingency, naturally
    rendered 'until I make.' 'Put' is more literal for τίθημι, but 'make' fits the
    predicate construction with ὑποπόδιον in idiomatic English.
- source_word: τοὺς ἐχθρούς σου
  chosen: your enemies
  lexicon: BDAG
  rationale: Straightforward plural object; no reason to depart from the standard
    gloss.
- source_word: ὑποπόδιον τῶν ποδῶν σου
  chosen: a footstool for your feet
  alternatives:
  - the footstool of your feet
  - a footstool beneath your feet
  lexicon: BDAG
  rationale: The phrase is a stock scriptural image of subjugation. 'A footstool for
    your feet' is clear modern English and preserves the metaphor without unnecessary
    archaism.
