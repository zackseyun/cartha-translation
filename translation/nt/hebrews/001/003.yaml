id: HEB.1.3
reference: Hebrews 1:3
source:
  edition: SBLGNT
  text: ὃς ὢν ἀπαύγασμα τῆς δόξης καὶ χαρακτὴρ τῆς ὑποστάσεως αὐτοῦ, φέρων τε τὰ πάντα
    τῷ ῥήματι τῆς δυνάμεως, ⸂δι’ αὑτοῦ⸃ καθαρισμὸν ⸂τῶν ἁμαρτιῶν ποιησάμενος⸃ ἐκάθισεν
    ἐν δεξιᾷ τῆς μεγαλωσύνης ἐν ὑψηλοῖς,
translation:
  text: He, being the radiance of his glory and the exact imprint of his being, and
    sustaining all things by the word of his power, after making purification for
    sins through himself, sat down at the right hand of the Majesty in the heights,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts omit "through himself"; the phrase is included here following
      the SBLGNT reading. Traditional English versions often reflect a different textual
      form, sometimes rendered "by himself."
    reason: textual_variant
  - marker: b
    text: Or "the exact representation of his nature/substance."
    reason: lexical_alternative
  - marker: c
    text: Or "on high."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαύγασμα
  chosen: radiance
  alternatives:
  - brightness
  - effulgence
  - reflection
  lexicon: BDAG
  rationale: '"Radiance" naturally conveys emitted splendor and fits the christological
    context without the ambiguity of "reflection," which could imply merely derivative
    mirroring. It preserves the metaphor of shared divine glory in accessible English.'
- source_word: δόξα
  chosen: glory
  alternatives:
  - splendor
  - honor
  lexicon: BDAG
  rationale: '"Glory" is the standard rendering and best preserves the theological
    weight of divine majesty here.'
- source_word: χαρακτήρ
  chosen: exact imprint
  alternatives:
  - exact representation
  - impress
  lexicon: BDAG
  rationale: '"Exact imprint" preserves the concrete image of an impressed stamp while
    clearly communicating precise correspondence. It is more vivid and textually grounded
    than the more interpretive "exact representation."'
- source_word: ὑπόστασις
  chosen: being
  alternatives:
  - nature
  - substance
  - essence
  lexicon: BDAG
  rationale: In this context, "being" communicates underlying reality without importing
    later technical metaphysical terminology too directly into the translation. "Essence"
    and "substance" are possible, but they risk sounding more creedal than the verse
    itself, even though the verse contributed to later doctrinal formulation.
- source_word: φέρων
  chosen: sustaining
  alternatives:
  - upholding
  - carrying
  lexicon: BDAG
  rationale: The participle here conveys ongoing active maintenance of all things.
    "Sustaining" expresses continuous support in idiomatic English; "upholding" is
    traditional and possible, but "sustaining" is slightly clearer for modern readers.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - the universe
  - everything
  lexicon: BDAG
  rationale: '"All things" is sufficiently broad and formal enough to preserve the
    comprehensive scope of the Greek without narrowing it to merely the cosmos as
    physical universe.'
- source_word: ῥῆμα
  chosen: word
  alternatives:
  - utterance
  - command
  lexicon: BDAG
  rationale: '"Word" is the most natural rendering and preserves the instrumental
    sense of divine speech. "Command" is interpretive and too narrow.'
- source_word: δύναμις
  chosen: power
  alternatives:
  - might
  lexicon: BDAG
  rationale: '"Power" is the standard and clearest rendering in this collocation,
    "the word of his power."'
- source_word: δι’ αὑτοῦ
  chosen: through himself
  alternatives:
  - by himself
  lexicon: BDAG
  rationale: The textual reading included in SBLGNT is best represented by "through
    himself," preserving the preposition's normal force. Because many English readers
    know the traditional reading "by himself," that alternative is preserved in a
    footnote as a textual variant.
- source_word: καθαρισμὸν
  chosen: purification
  alternatives:
  - cleansing
  lexicon: BDAG
  rationale: '"Purification" preserves the cultic and sacrificial nuance better than
    the more general "cleansing."'
- source_word: τῶν ἁμαρτιῶν
  chosen: for sins
  alternatives:
  - of sins
  lexicon: BDAG
  rationale: English idiom prefers "purification for sins" in sacrificial contexts,
    conveying purification dealing with sins. "Purification of sins" is more wooden
    and less natural in English.
- source_word: ποιησάμενος
  chosen: after making
  alternatives:
  - having made
  - when he had made
  lexicon: BDAG
  rationale: The aorist middle participle is most naturally rendered as antecedent
    action relative to the main verb. "After making" clearly marks the sequence before
    "sat down."
- source_word: ἐκάθισεν
  chosen: sat down
  alternatives:
  - took his seat
  lexicon: BDAG
  rationale: '"Sat down" is the straightforward rendering and preserves the enthronement/completion
    imagery.'
- source_word: ἐν δεξιᾷ
  chosen: at the right hand
  alternatives:
  - at the right side
  lexicon: BDAG
  rationale: This is the established idiomatic rendering for enthronement language
    and best matches biblical usage.
- source_word: μεγαλωσύνη
  chosen: the Majesty
  alternatives:
  - Majesty
  - the Greatness
  lexicon: BDAG
  rationale: The noun functions reverentially as a divine circumlocution. Capitalized
    "the Majesty" preserves that elevated usage without over-paraphrasing.
- source_word: ἐν ὑψηλοῖς
  chosen: in the heights
  alternatives:
  - on high
  - in the highest places
  lexicon: BDAG
  rationale: '"In the heights" closely reflects the plural form and locative sense
    of the Greek while remaining readable. "On high" is idiomatic but less formally
    transparent.'
