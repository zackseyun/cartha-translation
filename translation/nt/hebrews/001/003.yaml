theological_decisions:
- issue: Rendering of ὑπόστασις in a verse central to later Trinitarian and christological
    formulation
  chosen_reading: being
  alternative_readings:
  - nature
  - substance
  - essence
  rationale: The translation should not flatten the verse into later conciliar terminology,
    even though orthodox doctrine rightly draws on this text. "Being" preserves ontological
    force while avoiding anachronistically technical wording in the main text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language);
    Definition of Chalcedon (451 AD)'
- issue: Christological force of ἀπαύγασμα and χαρακτήρ
  chosen_reading: Retain strong ontological language without interpretive dilution
  alternative_readings:
  - Use weaker representational language such as "reflection" or "representation"
  rationale: Given the text's high christology, the rendering should preserve the
    Son's full participation in divine glory and exact correspondence to God's reality,
    while still translating rather than theologizing beyond the Greek.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language)'
- issue: Textual variant involving δι’ αὑτοῦ
  chosen_reading: Include "through himself" in the main text
  alternative_readings:
  - omit the phrase
  - render the variant tradition as "by himself"
  rationale: The SBLGNT text includes δι’ αὑτοῦ, so it is translated in the main text.
    Because many manuscripts and traditional English versions differ, the alternative
    is preserved in a footnote for transparency.
