theological_decisions:
- issue: Application of Psalm 102 language addressed to the Lord to the Son in Hebrews
    1
  chosen_reading: Retain the direct address 'You, Lord' in the main text without weakening
    it.
  alternative_readings:
  - Translate more neutrally to avoid the christological force of the citation
  rationale: The Greek text explicitly includes κύριε in direct address within the
    citation. The translation should preserve the author of Hebrews' application of
    this language to the Son, without adding doctrinal explanation beyond the text
    itself.
