id: HEB.1.10
reference: Hebrews 1:10
source:
  edition: SBLGNT
  text: καί· Σὺ κατ’ ἀρχάς, κύριε, τὴν γῆν ἐθεμελίωσας, καὶ ἔργα τῶν χειρῶν σού εἰσιν
    οἱ οὐρανοί·
translation:
  text: And, “You, Lord, in the beginning laid the foundation of the earth, and the
    heavens are the works of your hands.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at the beginning.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καί
  chosen: And
  alternatives:
  - and also
  - and further
  lexicon: BDAG
  rationale: Introduces an additional citation in the catena. Simple 'And' preserves
    the connective force without overinterpreting it.
- source_word: Σὺ
  chosen: You
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek; English naturally preserves
    it as the direct address opening the quotation.
- source_word: κατ’ ἀρχάς
  chosen: in the beginning
  alternatives:
  - at the beginning
  - from the beginning
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning at the outset/origin. 'In the beginning'
    is both natural English and fitting for the creation context, echoing biblical
    diction without being archaic.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine defaults, κύριος is rendered 'Lord.'
    In this context it is part of the Psalm citation applied to the Son in Hebrews.
- source_word: τὴν γῆν
  chosen: the earth
  alternatives:
  - the land
  lexicon: BDAG
  rationale: In a creation context paired with 'the heavens,' γῆ clearly denotes the
    earth/cosmos rather than a particular land.
- source_word: ἐθεμελίωσας
  chosen: laid the foundation of
  alternatives:
  - founded
  - established
  lexicon: BDAG
  rationale: The verb θεμελιόω literally refers to laying a foundation. The fuller
    English phrase preserves the architectural metaphor more clearly than the simpler
    'founded.'
- source_word: ἔργα
  chosen: works
  alternatives:
  - workmanship
  - deeds
  lexicon: BDAG
  rationale: With 'of your hands,' 'works' is the most natural and transparent rendering,
    preserving the concrete sense of what has been made.
- source_word: τῶν χειρῶν σού
  chosen: of your hands
  alternatives:
  - made by your hands
  - your handiwork
  lexicon: BDAG
  rationale: A literal rendering preserves the anthropomorphic imagery of the source
    and the Psalm citation. 'Your handiwork' is smoother but less formally transparent.
- source_word: οἱ οὐρανοί
  chosen: the heavens
  alternatives:
  - the skies
  - heaven
  lexicon: BDAG
  rationale: Plural οὐρανοί is best represented by 'the heavens,' especially in biblical
    creation language and in parallel with 'the earth.'
