id: HEB.1.12
reference: Hebrews 1:12
source:
  edition: SBLGNT
  text: καὶ ὡσεὶ περιβόλαιον ἑλίξεις αὐτούς, ⸂ὡς ἱμάτιον⸃ καὶ ἀλλαγήσονται· σὺ δὲ
    ὁ αὐτὸς εἶ, καὶ τὰ ἔτη σου οὐκ ἐκλείψουσιν.
translation:
  text: and like a cloak you will roll them up; like a garment they will be changed.
    But you are the same, and your years will not fail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a garment they will be changed' could be rendered 'like clothing
      they will be changed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your years will never end' / 'your years will not cease.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσεὶ
  chosen: like
  alternatives:
  - as
  - as if
  lexicon: BDAG
  rationale: Introduces comparison. 'Like' is natural modern English here and pairs
    well with the following accusative noun phrase.
- source_word: περιβόλαιον
  chosen: cloak
  alternatives:
  - mantle
  - covering
  - outer garment
  lexicon: BDAG
  rationale: Refers to something wrapped around oneself. 'Cloak' is idiomatic and
    preserves the clothing metaphor without sounding archaic.
- source_word: ἑλίξεις
  chosen: you will roll ... up
  alternatives:
  - you will fold
  - you will wrap up
  lexicon: BDAG
  rationale: Future active of ἑλίσσω, used of rolling or folding. 'Roll ... up' best
    fits the imagery of the heavens/creation being treated like worn clothing and
    matches the Psalmic source.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Masculine plural pronoun referring back to the created heavens/earth
    from the preceding context; English naturally uses 'them'.
- source_word: ὡς ἱμάτιον
  chosen: like a garment
  alternatives:
  - as a garment
  - like clothing
  lexicon: BDAG
  rationale: A second clothing comparison parallel to περιβόλαιον. 'Garment' preserves
    the singular and the elevated poetic register.
- source_word: ἀλλαγήσονται
  chosen: they will be changed
  alternatives:
  - they will be altered
  - they will be exchanged
  lexicon: BDAG
  rationale: Future passive indicates the created order undergoes change. 'Be changed'
    is the clearest rendering and preserves the passive voice.
- source_word: σὺ δὲ
  chosen: But you
  alternatives:
  - Yet you
  - and you
  lexicon: BDAG
  rationale: Marks strong contrast between mutable creation and the Son's constancy.
    'But you' is direct and natural.
- source_word: ὁ αὐτὸς
  chosen: the same
  alternatives:
  - unchanged
  - the very same
  lexicon: BDAG
  rationale: Idiomatic expression for sameness/unchangeableness. 'The same' closely
    reflects the Greek while remaining readable.
- source_word: τὰ ἔτη σου
  chosen: your years
  lexicon: BDAG
  rationale: Literal rendering preserves the temporal metaphor for enduring existence.
- source_word: οὐκ ἐκλείψουσιν
  chosen: will not fail
  alternatives:
  - will never end
  - will not come to an end
  - will not cease
  lexicon: BDAG
  rationale: Future of ἐκλείπω can mean fail, cease, come to an end. 'Will not fail'
    is close to the Greek and suits the poetic style; the sense is enduring continuance,
    not deficiency.
