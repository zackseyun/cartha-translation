theological_decisions:
- issue: Rendering language of divine immutability in a christological citation
  chosen_reading: But you are the same
  alternative_readings:
  - But you remain the same
  - But you are unchanged
  rationale: The verse contrasts the created order's changeability with the Son's
    enduring identity. 'Are the same' stays close to the Greek expression ὁ αὐτός
    without importing later technical theological wording beyond what the text states,
    while still preserving the orthodox implication of divine constancy in context.
  doctrine_reference: Affirmations; Translation philosophy §3
