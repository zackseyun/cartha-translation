id: HEB.1.8
reference: Hebrews 1:8
source:
  edition: SBLGNT
  text: πρὸς δὲ τὸν υἱόν· Ὁ θρόνος σου ὁ θεὸς εἰς τὸν αἰῶνα τοῦ αἰῶνος, ⸂καὶ ἡ ῥάβδος
    τῆς εὐθύτητος⸃ ῥάβδος τῆς βασιλείας ⸀σου.
translation:
  text: But of the Son he says, “Your throne, O God, is forever and ever, and the
    scepter of uprightness is the scepter of your kingdom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, less likely: “God is your throne forever and ever.” The Greek syntax
      has been debated, but the direct address “Your throne, O God” best fits the
      context and the quotation’s force.'
    reason: alternative_reading
  - marker: b
    text: Or “the scepter of righteousness.” The Greek word can denote uprightness
      or rectitude.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς δὲ τὸν υἱόν
  chosen: But of the Son he says
  alternatives:
  - But to the Son
  - But concerning the Son
  lexicon: BDAG
  rationale: 'πρός with accusative after an implied verb of speaking commonly means
    ''to'' or ''with reference to.'' In this catena context, English reads most naturally
    with the implied verb supplied: ''of the Son he says,'' matching the contrast
    with prior quotations while preserving the referential force.'
- source_word: υἱόν
  chosen: the Son
  alternatives:
  - his Son
  lexicon: BDAG
  rationale: The article marks a definite, titular use. 'The Son' preserves the christological
    title and the contrastive structure of the passage.
- source_word: Ὁ θρόνος σου ὁ θεὸς
  chosen: Your throne, O God
  alternatives:
  - God is your throne
  - Your throne is God
  lexicon: BDAG
  rationale: 'The most natural reading in context is vocative force for ὁ θεός, as
    in the LXX source of Psalm 45:6 and in the argument of Hebrews exalting the Son
    above angels. This yields a direct address to the Son: ''Your throne, O God.''
    The alternative ''God is your throne'' is grammatically possible but contextually
    less likely and is preserved in a footnote because the syntax has been debated.'
- source_word: εἰς τὸν αἰῶνα τοῦ αἰῶνος
  chosen: forever and ever
  alternatives:
  - for the age of the age
  - unto the age of the age
  lexicon: BDAG
  rationale: This idiom denotes unending duration. 'Forever and ever' is the standard
    natural English equivalent and preserves the superlative force better than a woodenly
    literal rendering.
- source_word: ῥάβδος
  chosen: scepter
  alternatives:
  - rod
  - staff
  lexicon: BDAG
  rationale: In royal context, ῥάβδος refers to a ruler's staff or emblem of authority.
    'Scepter' best fits the kingdom imagery.
- source_word: τῆς εὐθύτητος
  chosen: of uprightness
  alternatives:
  - of righteousness
  - of straightness
  lexicon: BDAG
  rationale: εὐθύτης denotes uprightness, straightness, or rectitude. 'Uprightness'
    is a precise and readable rendering here. 'Righteousness' is possible, especially
    by contextual association with just rule, but the lexical sense is more directly
    'uprightness,' so that is preferred.
- source_word: ῥάβδος τῆς βασιλείας σου
  chosen: the scepter of your kingdom
  alternatives:
  - the scepter of your reign
  - your royal scepter
  lexicon: BDAG
  rationale: βασιλεία can mean kingdom, kingship, or reign. 'Kingdom' is retained
    as the most straightforward and traditional rendering in this royal citation,
    while still communicating dominion.
