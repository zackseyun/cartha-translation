theological_decisions:
- issue: Whether ὁ θεός in the quotation addresses the Son directly as God or should
    be construed predicatively ('God is your throne').
  chosen_reading: 'Direct address: ''Your throne, O God.'''
  alternative_readings:
  - '''God is your throne forever and ever'''
  rationale: Within Hebrews 1, the author is demonstrating the Son's superiority and
    unique status through scriptural citations. Reading ὁ θεός as a vocative directly
    supports the discourse flow and aligns with the LXX phrasing of Psalm 45:6 as
    commonly understood. This also coheres with the doctrinal bounds affirming Nicene
    and Chalcedonian orthodoxy, while still basing the choice on contextual and syntactic
    considerations rather than importing theology into the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy §3 Preserve theological tension rather than resolve
    it'
