theological_decisions:
- issue: Addressed subject and christological force
  chosen_reading: The verse is rendered as direct address to the Son ('you remain'),
    preserving the author's application of Psalm 102 language to the Son in context.
  rationale: Hebrews 1 applies this citation to the Son, contributing to the chapter's
    high christology. The translation should preserve the direct second-person address
    without adding explanatory doctrinal language beyond the text itself.
