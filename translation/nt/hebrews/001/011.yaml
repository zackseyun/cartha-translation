id: HEB.1.11
reference: Hebrews 1:11
source:
  edition: SBLGNT
  text: αὐτοὶ ἀπολοῦνται, σὺ δὲ διαμένεις· καὶ πάντες ὡς ἱμάτιον παλαιωθήσονται,
translation:
  text: They will perish, but you remain; and they all will wear out like a garment,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will grow old like a garment.'
    reason: lexical_alternative
  - marker: b
    text: The imagery echoes Psalm 102:25–27, contrasting the created order's transience
      with the enduring permanence of the one addressed.
    reason: cross_reference
lexical_decisions:
- source_word: αὐτοὶ
  chosen: They
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: Refers back to 'the heavens' and 'the earth' in the preceding verse.
    English 'they' is natural; the emphatic force of the pronoun is sufficiently carried
    by position and contrast with 'you.'
- source_word: ἀπολοῦνται
  chosen: will perish
  alternatives:
  - will pass away
  - will be destroyed
  lexicon: BDAG
  rationale: Future middle of ἀπόλλυμι here denotes coming to an end/perishing. 'Will
    perish' preserves the strong sense without over-specifying the mechanism. 'Pass
    away' is possible but softer; 'be destroyed' could imply an explicit external
    agent not stated here.
- source_word: σὺ δὲ
  chosen: but you
  alternatives:
  - yet you
  lexicon: BDAG
  rationale: Marks strong contrast between the created order and the addressed Son.
    'But you' is the most direct and idiomatic rendering of the adversative δέ with
    the explicit pronoun.
- source_word: διαμένεις
  chosen: remain
  alternatives:
  - continue
  - endure
  lexicon: BDAG
  rationale: διαμένω means to continue/remain, emphasizing ongoing persistence. 'Remain'
    fits the contrast with creation's perishing and echoes the Psalm source well.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  - all
  lexicon: BDAG
  rationale: Refers collectively to the created things just mentioned. 'They all'
    makes the referent explicit in English and preserves the distributive force.
- source_word: ὡς ἱμάτιον
  chosen: like a garment
  alternatives:
  - like clothing
  - like a robe
  lexicon: BDAG
  rationale: ἱμάτιον is a garment/cloak. 'Garment' is broad, natural, and preserves
    the simile without narrowing to a specific article of clothing.
- source_word: παλαιωθήσονται
  chosen: will wear out
  alternatives:
  - will grow old
  - will become worn out
  lexicon: BDAG
  rationale: Future passive of παλαιόω means to become old or worn with age. 'Will
    wear out' communicates the image clearly in modern English and fits the clothing
    metaphor better than the more literal 'grow old.'
