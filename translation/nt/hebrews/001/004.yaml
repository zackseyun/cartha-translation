id: HEB.1.4
reference: Hebrews 1:4
source:
  edition: SBLGNT
  text: τοσούτῳ κρείττων γενόμενος τῶν ἀγγέλων ὅσῳ διαφορώτερον παρ’ αὐτοὺς κεκληρονόμηκεν
    ὄνομα.
translation:
  text: having become as much superior to the angels as the name he has inherited
    is more excellent than theirs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'better than the angels ... more distinguished than theirs.'
    reason: lexical_alternative
  - marker: b
    text: The 'name' is clarified in the following context as the Son's filial title/status.
    reason: cross_reference
lexical_decisions:
- source_word: τοσούτῳ ... ὅσῳ
  chosen: as much ... as
  alternatives:
  - so much ... as
  - by so much ... by as much
  lexicon: BDAG
  rationale: This correlative construction expresses proportional comparison. 'As
    much ... as' is natural modern English and preserves the measured comparison between
    superiority and inherited name.
- source_word: κρείττων
  chosen: superior
  alternatives:
  - better
  - greater
  lexicon: BDAG
  rationale: '''Superior'' fits the comparative sense in context of rank over angels.
    ''Better'' is possible and traditional in Hebrews, but here ''superior'' more
    clearly communicates status rather than moral quality.'
- source_word: γενόμενος
  chosen: having become
  alternatives:
  - becoming
  - having been made
  lexicon: BDAG
  rationale: The aorist participle is best represented as 'having become,' indicating
    a resultant state in relation to the Son's exaltation. 'Having been made' could
    suggest creation if read incautiously; 'having become' better preserves the Greek
    without importing that implication.
- source_word: τῶν ἀγγέλων
  chosen: the angels
  alternatives:
  - angels
  lexicon: BDAG
  rationale: The genitive after the comparative is rendered with 'to the angels' in
    English sense, but the lexical item itself is simply 'the angels.' The article
    is retained in idiomatic English.
- source_word: διαφορώτερον
  chosen: more excellent
  alternatives:
  - more distinguished
  - more outstanding
  - different
  lexicon: BDAG
  rationale: In this context the comparative adverb/adjectival form conveys surpassing
    distinction or excellence, especially with reference to the inherited name. 'More
    excellent' is idiomatic and fits the elevated style of Hebrews. 'Different' is
    too weak and misses the comparative force of superiority.
- source_word: παρ’ αὐτοὺς
  chosen: than theirs
  alternatives:
  - than they
  - than them
  - than the one belonging to them
  lexicon: BDAG
  rationale: 'With ὄνομα as the comparison point, English idiom requires supplying
    the possessive sense: the inherited name is more excellent than the angels'' name/name-status.
    ''Than theirs'' is concise and clear.'
- source_word: κεκληρονόμηκεν
  chosen: he has inherited
  alternatives:
  - he inherited
  - he has obtained by inheritance
  lexicon: BDAG
  rationale: The perfect tense suggests a present state resulting from inheritance,
    so 'he has inherited' is preferable to a simple past. 'Obtained by inheritance'
    is more explicit but less natural.
- source_word: ὄνομα
  chosen: the name
  alternatives:
  - a name
  - name
  lexicon: BDAG
  rationale: The anarthrous noun in Greek can still be definite in English due to
    context; the following verses identify the specific filial name/status ('Son').
    'The name' best reflects that contextual definiteness without overtranslating
    the verse itself.
