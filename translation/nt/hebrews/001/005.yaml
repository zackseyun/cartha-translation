id: HEB.1.5
reference: Hebrews 1:5
source:
  edition: SBLGNT
  text: Τίνι γὰρ εἶπέν ποτε τῶν ἀγγέλων· Υἱός μου εἶ σύ, ἐγὼ σήμερον γεγέννηκά σε,
    καὶ πάλιν· Ἐγὼ ἔσομαι αὐτῷ εἰς πατέρα, καὶ αὐτὸς ἔσται μοι εἰς υἱόν;
translation:
  text: For to which of the angels did he ever say, “You are my Son; today I have
    begotten you”? And again, “I will be to him a father, and he will be to me a son”?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “said at any time.”
    reason: lexical_alternative
  - marker: b
    text: “I have begotten you” echoes Psalm 2:7. The phrase has been understood in
      relation to royal enthronement, resurrection, or the Son’s eternal relation
      to the Father; the translation preserves the wording without deciding among
      these interpretations.
    reason: cross_reference
  - marker: c
    text: Quotation from 2 Samuel 7:14. Or more idiomatically, “I will be his father,
      and he will be my son.”
    reason: alternative_reading
lexical_decisions:
- source_word: Τίνι
  chosen: to which
  alternatives:
  - to whom
  lexicon: BDAG
  rationale: Dative interrogative τίς with the partitive genitive τῶν ἀγγέλων is most
    naturally rendered 'to which of the angels,' preserving the contrast among the
    angels rather than a more general 'to whom.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connection to the preceding argument. 'For' is
    concise and natural in English.
- source_word: εἶπέν ποτε
  chosen: did he ever say
  alternatives:
  - has he ever said
  - said at any time
  lexicon: BDAG
  rationale: Aorist εἶπεν with ποτέ in this rhetorical question points to any instance
    whatsoever. 'Did he ever say' is idiomatic and preserves the force of ποτέ.
- source_word: ἀγγέλων
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In Hebrews 1 the referent is clearly heavenly angels, not human messengers,
    so 'angels' is required by context.
- source_word: Υἱός μου εἶ σύ
  chosen: You are my Son
  alternatives:
  - My Son are you
  lexicon: BDAG
  rationale: Preserves the predicative emphasis while using natural English word order.
    Capitalized 'Son' reflects direct address to the unique filial figure in the cited
    Scripture and the christological context.
- source_word: σήμερον
  chosen: today
  lexicon: BDAG
  rationale: Straightforward temporal adverb; no warrant to paraphrase.
- source_word: γεγέννηκά
  chosen: I have begotten
  alternatives:
  - I have become the father of
  - I have fathered
  lexicon: BDAG
  rationale: Perfect of γεννάω in this citation is traditionally and lexically well
    represented by 'have begotten.' This preserves the metaphorical and royal-sonship
    language of Psalm 2:7 without flattening it into a merely biological or overly
    interpretive paraphrase.
- source_word: καὶ πάλιν
  chosen: And again
  alternatives:
  - And further
  - And once more
  lexicon: BDAG
  rationale: In Hebrews this formula introduces another scriptural citation. 'And
    again' is the standard and clear rendering.
- source_word: Ἐγὼ ἔσομαι αὐτῷ εἰς πατέρα
  chosen: I will be to him a father
  alternatives:
  - I will be his father
  lexicon: BDAG
  rationale: The εἰς + accusative construction is more literally preserved by 'be
    to him a father.' This keeps the formal covenantal tone of the citation while
    remaining intelligible.
- source_word: καὶ αὐτὸς ἔσται μοι εἰς υἱόν
  chosen: and he will be to me a son
  alternatives:
  - and he will be my son
  lexicon: BDAG
  rationale: Again preserves the εἰς construction and the balanced parallelism of
    the quotation. Lowercase 'son' is retained within the quotation because the Greek
    lacks orthographic capitalization and the phrase echoes covenantal sonship language
    from 2 Samuel 7:14.
