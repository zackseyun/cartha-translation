theological_decisions:
- issue: Rendering of filial language in the two OT citations
  chosen_reading: Retain 'Son' in the first citation and 'son' in the second, preserving
    the wording and literary distinction of the quotations.
  alternative_readings:
  - Capitalize both as 'Son' for explicit christological identification
  - Lowercase both to avoid interpretive capitalization
  rationale: The verse applies both citations to the Son in Hebrews' argument, but
    the first citation directly names the addressee 'my Son' and functions as a christological
    title in context, while the second is a covenant formula quoted as written. This
    preserves theological force without over-regularizing capitalization beyond what
    the source text itself marks.
  doctrine_reference: Affirmations; Translation philosophy 1, 3, 6
- issue: Meaning of 'I have begotten you'
  chosen_reading: Preserve the wording 'have begotten' without specifying eternal
    generation, incarnation, resurrection, or enthronement in the translation itself.
  alternative_readings:
  - Interpret as enthronement language
  - Interpret as resurrection declaration
  - Interpret as eternal generation
  rationale: The text cites Psalm 2:7 and uses it in a christological argument, but
    the translation should not resolve the theological referent beyond the wording
    of the citation. Preserving the phrase maintains the text's theological depth
    and ambiguity for readers and interpreters.
  doctrine_reference: Affirmations; Translation philosophy 3
