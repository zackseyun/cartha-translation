id: HEB.1.6
reference: Hebrews 1:6
source:
  edition: SBLGNT
  text: ὅταν δὲ πάλιν εἰσαγάγῃ τὸν πρωτότοκον εἰς τὴν οἰκουμένην, λέγει· Καὶ προσκυνησάτωσαν
    αὐτῷ πάντες ἄγγελοι θεοῦ.
translation:
  text: And when he again brings the Firstborn into the world, he says, “And let all
    God’s angels worship him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''And again, when he brings the Firstborn into the world, he says:
      “Let all God’s angels worship him.”'' The Greek adverb ''again'' may modify
      either ''brings'' or ''he says.'''
    reason: alternative_reading
  - marker: b
    text: Or, 'all the angels of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a temporal clause. In this context, 'when' fits the specific
    scriptural event better than the more iterative 'whenever'.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: A mild connective moving the argument forward. 'And' is natural English
    and preserves continuity without overstating contrast.
- source_word: πάλιν
  chosen: again
  alternatives:
  - in turn
  - further
  lexicon: BDAG
  rationale: 'Placed with ''brings'' in the main text: ''when he again brings.'' The
    adverb can also be taken with ''he says'' (''again he says''), but its position
    before εἰσαγάγῃ naturally allows the temporal/action reading, and this reading
    is common and coherent in context. The alternative is preserved in a footnote
    because the ambiguity is genuine.'
- source_word: εἰσαγάγῃ
  chosen: brings
  alternatives:
  - leads in
  - introduces
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅταν, referring to the act of bringing in. 'Brings'
    is idiomatic and sufficiently formal; 'introduces' is possible but less natural
    in this exalted context.
- source_word: τὸν πρωτότοκον
  chosen: the Firstborn
  alternatives:
  - the firstborn one
  lexicon: BDAG
  rationale: Used as a christological title here. Capitalized to reflect titular use
    for the Son in context, not to import meaning beyond the Greek. 'Firstborn' preserves
    the lexical and theological resonance of rank/preeminence and sonship.
- source_word: εἰς τὴν οἰκουμένην
  chosen: into the world
  alternatives:
  - into the inhabited world
  lexicon: BDAG
  rationale: οἰκουμένη can mean the inhabited world/world order. 'Into the world'
    is natural English and fits the broad scope intended here without unnecessary
    archaism.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he says in Scripture
  - he says
  lexicon: BDAG
  rationale: The subject is implicitly God in the catena context. The simple 'he says'
    matches the Greek and avoids adding 'in Scripture,' which is interpretive though
    contextually true.
- source_word: προσκυνησάτωσαν
  chosen: let ... worship
  alternatives:
  - let ... bow down before
  - let ... pay homage to
  lexicon: BDAG
  rationale: Imperative/jussive force is best represented by 'let ... worship.' In
    this context, where angels render honor to the Son, 'worship' best captures the
    force of προσκυνέω without reduction to mere homage.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - before him
  lexicon: BDAG
  rationale: Dative object after προσκυνέω is naturally rendered 'worship him' in
    English.
- source_word: πάντες ἄγγελοι θεοῦ
  chosen: all God’s angels
  alternatives:
  - all the angels of God
  lexicon: BDAG
  rationale: A natural English rendering of the genitive construction. 'All God's
    angels' is concise and clear while preserving possession/source.
