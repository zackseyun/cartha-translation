theological_decisions:
- issue: Syntactical scope of πάλιν
  chosen_reading: πάλιν modifies 'brings' ('when he again brings the Firstborn into
    the world')
  alternative_readings:
  - πάλιν modifies 'he says' ('and again, when he brings the Firstborn into the world,
    he says')
  rationale: The Greek permits either construal, and interpreters differ. The main
    text adopts the reading that most naturally follows the word order and yields
    smooth sense in context. Because the ambiguity is real and potentially affects
    how the citation is framed, the alternative is preserved in a footnote rather
    than suppressed.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of προσκυνέω toward the Son
  chosen_reading: Rendered as 'worship'
  alternative_readings:
  - pay homage
  - bow down before
  rationale: Given the argument of Hebrews 1 concerning the Son's superiority to angels
    and the command directed to all God's angels, 'worship' best reflects the force
    of the verb in this context. This aligns with historic orthodoxy regarding the
    Son's divine honor without importing claims not present in the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), within source-text bounds.'
