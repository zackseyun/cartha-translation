id: HEB.1.7
reference: Hebrews 1:7
source:
  edition: SBLGNT
  text: καὶ πρὸς μὲν τοὺς ἀγγέλους λέγει· Ὁ ποιῶν τοὺς ἀγγέλους αὐτοῦ πνεύματα, καὶ
    τοὺς λειτουργοὺς αὐτοῦ πυρὸς φλόγα·
translation:
  text: And about the angels he says, “He makes his angels winds, and his ministers
    a flame of fire.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “spirits”: the Greek word can mean either “winds” or “spirits.”'
    reason: alternative_reading
lexical_decisions:
- source_word: πρὸς μὲν τοὺς ἀγγέλους
  chosen: about the angels
  alternatives:
  - to the angels
  - concerning the angels
  lexicon: BDAG
  rationale: In Hebrews 1 the author contrasts what God says with reference to angels
    and with reference to the Son. Here πρός with λέγει is best rendered in a topical
    sense ('about/concerning') rather than as direct address ('to'), since the quotation
    is not spoken to angels but speaks of them.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he says of
  - he says concerning
  lexicon: BDAG
  rationale: Present tense is retained for the citation formula, matching common NT
    usage and preserving the vivid scriptural present.
- source_word: Ὁ ποιῶν
  chosen: He makes
  alternatives:
  - He who makes
  - He appoints
  lexicon: BDAG
  rationale: The articular participle in the quotation functions verbally in English.
    'He makes' is natural and preserves the active sense. 'He who makes' is more formal
    but less idiomatic in this context.
- source_word: ἀγγέλους
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: Given the context of Hebrews 1, which explicitly contrasts heavenly angels
    with the Son, 'angels' is required rather than the more general 'messengers'.
- source_word: πνεύματα
  chosen: winds
  alternatives:
  - spirits
  lexicon: BDAG
  rationale: πνεύματα can mean 'winds' or 'spirits.' In the underlying Psalm 104:4
    and in this poetic parallel with 'flame of fire,' 'winds' is the more likely sense
    in the main text. Because the term is genuinely ambiguous and has interpretive
    significance, the alternative 'spirits' is preserved in a footnote.
- source_word: λειτουργοὺς
  chosen: ministers
  alternatives:
  - servants
  - attendants
  lexicon: BDAG
  rationale: λειτουργός denotes one who performs service, often in a sacred or official
    capacity. 'Ministers' preserves the elevated register and possible cultic nuance
    better than the flatter 'servants,' without importing later ecclesiastical office.
- source_word: πυρὸς φλόγα
  chosen: a flame of fire
  alternatives:
  - flames of fire
  - fiery flame
  lexicon: BDAG
  rationale: The singular accusative phrase is idiomatically rendered 'a flame of
    fire.' This preserves the poetic imagery and aligns with the Greek construction
    more closely than the pluralized traditional rendering.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - of him
  lexicon: BDAG
  rationale: The possessive pronoun is naturally rendered 'his' in English, referring
    to God in the citation context.
