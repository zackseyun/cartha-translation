theological_decisions:
- issue: Meaning of πνεύματα in the quotation from Psalm 104:4
  chosen_reading: winds
  alternative_readings:
  - spirits
  rationale: The verse is poetic and allusive, and πνεύματα is lexically ambiguous.
    Rendering it as 'winds' best fits the Hebrew background and the parallel image
    'a flame of fire,' while still preserving the alternative in a footnote so as
    not to over-resolve the ambiguity.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
