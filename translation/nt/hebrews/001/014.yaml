id: HEB.1.14
reference: Hebrews 1:14
source:
  edition: SBLGNT
  text: οὐχὶ πάντες εἰσὶν λειτουργικὰ πνεύματα εἰς διακονίαν ἀποστελλόμενα διὰ τοὺς
    μέλλοντας κληρονομεῖν σωτηρίαν;
translation:
  text: Are they not all ministering spirits, being sent out for service for the sake
    of those who are about to inherit salvation?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who will inherit salvation.' The Greek expression has a future-oriented
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχὶ
  chosen: Are ... not
  alternatives:
  - Is it not that
  - Surely ... are
  lexicon: BDAG
  rationale: 'Introduces a rhetorical question expecting an affirmative answer. English
    idiom is best captured by fronting the auxiliary: ''Are they not ... ?'''
- source_word: πάντες
  chosen: all
  alternatives:
  - every one of them
  lexicon: BDAG
  rationale: Retains the comprehensive scope of the plural adjective without over-expanding
    the wording.
- source_word: λειτουργικὰ πνεύματα
  chosen: ministering spirits
  alternatives:
  - liturgical spirits
  - serving spirits
  - spirits in sacred service
  lexicon: BDAG
  rationale: λειτουργικός denotes service, often with sacred or official connotations.
    'Ministering' preserves the elevated register and traditional sense without implying
    a formal church office. 'Spirits' is the natural rendering of πνεύματα here, referring
    to angelic beings.
- source_word: εἰς διακονίαν
  chosen: for service
  alternatives:
  - for ministry
  - for ministering
  - to serve
  lexicon: BDAG
  rationale: The prepositional phrase expresses purpose. 'For service' is clear modern
    English and preserves the noun form of διακονία without importing ecclesiastical
    overtones that 'ministry' may carry for modern readers.
- source_word: ἀποστελλόμενα
  chosen: being sent out
  alternatives:
  - sent out
  - being dispatched
  lexicon: BDAG
  rationale: The present passive participle is rendered with an English participial
    form to preserve its descriptive force in relation to 'spirits.' 'Sent out' reflects
    the missional nuance of ἀποστέλλω.
- source_word: διὰ
  chosen: for the sake of
  alternatives:
  - for
  - because of
  - on account of
  lexicon: BDAG
  rationale: With the accusative, διά commonly indicates reason, purpose, or benefit.
    In context the angels are sent in relation to the beneficiaries, so 'for the sake
    of' makes the benefactive sense explicit.
- source_word: τοὺς μέλλοντας
  chosen: those who are about to
  alternatives:
  - those who will
  - those destined to
  lexicon: BDAG
  rationale: μέλλω with an infinitive often conveys futurity with an impending or
    prospective nuance. 'About to' preserves that nuance more closely than a simple
    future, while still fitting the eschatological context.
- source_word: κληρονομεῖν
  chosen: inherit
  alternatives:
  - receive as an inheritance
  - come into possession of
  lexicon: BDAG
  rationale: '''Inherit'' is the standard and concise rendering, preserving the covenantal/heirship
    imagery important in Hebrews.'
- source_word: σωτηρίαν
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: '''Salvation'' is the established and contextually appropriate rendering
    in Hebrews, carrying both present and eschatological dimensions.'
