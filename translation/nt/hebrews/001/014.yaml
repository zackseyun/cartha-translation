theological_decisions:
- issue: Force of μέλλοντας κληρονομεῖν σωτηρίαν
  chosen_reading: Rendered prospectively as 'those who are about to inherit salvation,'
    preserving the future-oriented aspect without specifying a denominational doctrine
    of assurance or predestination.
  alternative_readings:
  - those who will inherit salvation
  - those destined to inherit salvation
  rationale: The verse describes the beneficiaries of angelic service in future-oriented
    terms. The translation preserves the temporal/prospective force of μέλλω and the
    inheritance motif, while avoiding interpretive expansion beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    advocate denominational distinctives unless unambiguously supported.
