theological_decisions:
- issue: Christological force of ἐν υἱῷ
  chosen_reading: Rendered 'in a Son' to preserve the anarthrous expression while
    still affirming that God's climactic revelation is in the Son.
  alternative_readings:
  - in the Son
  - by his Son
  rationale: The phrase is grammatically unusual and rhetorically weighty. The translation
    should not erase the article-less form by defaulting to the more familiar 'his
    Son,' yet it must remain intelligible in English. This rendering preserves the
    text's emphasis on the mode and character of revelation without weakening orthodox
    Christology.
  doctrine_reference: Translation philosophy §§1, 3, 5; Affirmations (Nicene Creed,
    Chalcedon)
- issue: Scope of τοὺς αἰῶνας in relation to the Son's role in creation
  chosen_reading: Rendered 'the ages' in the main text, with a footnote preserving
    'the universe/worlds.'
  alternative_readings:
  - the universe
  - the worlds
  - the world
  rationale: The Greek term can encompass both temporal ages and the created order.
    Preserving 'the ages' keeps the lexical form visible and maintains the text's
    rich temporal-cosmic scope, while the footnote acknowledges the common interpretation
    that this includes the universe itself. This avoids artificially narrowing or
    over-expanding the statement while remaining fully compatible with historic orthodox
    Christology.
  doctrine_reference: Translation philosophy §§1, 3, 5; Affirmations (Nicene Creed)
