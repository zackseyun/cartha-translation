id: HEB.1.2
reference: Hebrews 1:2
source:
  edition: SBLGNT
  text: ἐπ’ ἐσχάτου τῶν ἡμερῶν τούτων ἐλάλησεν ἡμῖν ἐν υἱῷ, ὃν ἔθηκεν κληρονόμον πάντων,
    δι’ οὗ καὶ ⸂ἐποίησεν τοὺς αἰῶνας⸃·
translation:
  text: in these last days he has spoken to us in a Son, whom he appointed heir of
    all things, through whom he also made the ages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by a Son.' The Greek says literally 'in a Son,' with no article before
      'Son,' highlighting the manner and climactic character of God's speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'made the universe' or 'made the worlds.' The Greek 'the ages' can refer
      to the ages themselves and, by extension, the whole created order.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπ’ ἐσχάτου τῶν ἡμερῶν τούτων
  chosen: in these last days
  alternatives:
  - at the end of these days
  - in the last of these days
  lexicon: BDAG
  rationale: Idiomatic temporal expression. English naturally renders the genitive
    construction as 'in these last days,' preserving the eschatological force without
    wooden phrasing.
- source_word: ἐλάλησεν
  chosen: has spoken
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: The aorist is formally past, but in English 'has spoken' appropriately
    conveys the completed yet still-relevant divine speech in contrast with the former
    prophetic speech in v. 1. This is an optimal-equivalence choice for natural discourse
    flow.
- source_word: ἐν υἱῷ
  chosen: in a Son
  alternatives:
  - by a Son
  - in the Son
  - through a Son
  lexicon: BDAG
  rationale: The anarthrous υἱῷ is significant. 'In a Son' preserves the lack of article
    and the mode/sphere nuance of ἐν, while still clearly referring to the Son in
    context. 'By a Son' is possible but flattens the preposition into mere agency;
    'in the Son' over-specifies the Greek.
- source_word: ὃν ἔθηκεν
  chosen: whom he appointed
  alternatives:
  - whom he made
  - whom he set
  lexicon: BDAG
  rationale: τίθημι here carries the sense of appointing or establishing someone in
    a role. 'Appointed' is idiomatic and fits the complement 'heir of all things.'
- source_word: κληρονόμον πάντων
  chosen: heir of all things
  alternatives:
  - heir of everything
  - inheritor of all things
  lexicon: BDAG
  rationale: Standard and transparent rendering. 'All things' preserves the broad
    scope of πάντων and aligns with common NT usage.
- source_word: δι’ οὗ
  chosen: through whom
  alternatives:
  - by whom
  - through him
  lexicon: BDAG
  rationale: διά with genitive commonly denotes intermediate agency or instrumentality.
    'Through whom' is the most natural relative-clause rendering.
- source_word: ἐποίησεν
  chosen: made
  alternatives:
  - created
  - fashioned
  lexicon: BDAG
  rationale: ποιέω is broader than the more specific κτίζω. 'Made' preserves the Greek
    wording while still fitting the cosmological context. 'Created' is interpretively
    acceptable but slightly more specific than the verb itself.
- source_word: τοὺς αἰῶνας
  chosen: the ages
  alternatives:
  - the world
  - the universe
  - the worlds
  lexicon: BDAG
  rationale: αἰῶνες can denote ages/epochs and, by extension in some contexts, the
    created world-order. Here 'the ages' preserves the Greek term's temporal-cosmic
    breadth and avoids prematurely narrowing it to merely spatial creation. Because
    English readers may hear 'the universe,' that alternative is preserved in a footnote.
