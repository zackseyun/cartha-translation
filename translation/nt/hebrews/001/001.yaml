theological_decisions:
- issue: Rendering the participial construction in relation to Hebrews 1:2
  chosen_reading: Use a finite English verb in v.1 ('God spoke') while preserving
    the temporal contrast with v.2.
  alternative_readings:
  - 'Retain the participle more formally: ''God, having spoken...'''
  rationale: The Greek participle λαλήσας is syntactically completed by the main verb
    in v.2, but an isolated verse translation in English can sound incomplete if rendered
    too literally. The chosen rendering preserves the sense and prepares for the contrast
    between former revelation and the climactic revelation in the Son without importing
    extra theology.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
