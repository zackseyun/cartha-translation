id: HEB.1.1
reference: Hebrews 1:1
source:
  edition: SBLGNT
  text: Πολυμερῶς καὶ πολυτρόπως πάλαι ὁ θεὸς λαλήσας τοῖς πατράσιν ἐν τοῖς προφήταις
translation:
  text: Long ago, God spoke to the fathers in many parts and in many ways by the prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in many portions'; the Greek distinguishes this from 'in many ways,'
      emphasizing both the fragmentary character and the diverse manner of earlier
      revelation.
    reason: lexical_alternative
  - marker: b
    text: Or 'through the prophets'; literally 'in the prophets.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to the ancestors'; Greek 'to the fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολυμερῶς
  chosen: in many parts
  alternatives:
  - in many portions
  - many times
  - in many ways
  lexicon: BDAG
  rationale: The adverb denotes multiplicity in parts or portions. Rendering it as
    'in many parts' preserves the distinction from πολυτρόπως, which separately conveys
    diversity of manner. This avoids collapsing the two adverbs into near-synonyms.
- source_word: πολυτρόπως
  chosen: in many ways
  alternatives:
  - in many manners
  - variously
  lexicon: BDAG
  rationale: This adverb refers to diversity of modes or manners. 'In many ways' is
    natural modern English and preserves the contrast with Πολυμερῶς.
- source_word: πάλαι
  chosen: Long ago
  alternatives:
  - formerly
  - in former times
  - of old
  lexicon: BDAG
  rationale: '''Long ago'' is idiomatic modern English that captures the temporal
    distance without sounding archaic.'
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward nominative subject; no article needs to be represented
    in English.
- source_word: λαλήσας
  chosen: spoke
  alternatives:
  - having spoken
  lexicon: BDAG
  rationale: Although formally an aorist participle, in Hebrews 1:1–2 it functions
    with the finite verb of the next verse to form a smooth temporal contrast ('having
    spoken... he has spoken'). For English verse-level readability, 'spoke' best conveys
    the action without awkwardness, while still preparing for the contrast with 1:2.
- source_word: τοῖς πατράσιν
  chosen: to the fathers
  alternatives:
  - to our fathers
  - to the ancestors
  lexicon: BDAG
  rationale: The Greek says 'the fathers,' not 'our fathers.' 'Fathers' preserves
    the covenant-historical and gendered wording of the source better than the more
    interpretive 'ancestors.'
- source_word: ἐν τοῖς προφήταις
  chosen: by the prophets
  alternatives:
  - in the prophets
  - through the prophets
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' here it is instrumental or associative
    in sense. 'By the prophets' is concise and idiomatic, expressing God as the speaker
    and the prophets as his agents. 'Through the prophets' is also possible, but 'by'
    is slightly more direct in English.
