id: HEB.1.9
reference: Hebrews 1:9
source:
  edition: SBLGNT
  text: ἠγάπησας δικαιοσύνην καὶ ἐμίσησας ἀνομίαν· διὰ τοῦτο ἔχρισέν σε ὁ θεός, ὁ
    θεός σου, ἔλαιον ἀγαλλιάσεως παρὰ τοὺς μετόχους σου·
translation:
  text: You have loved righteousness and hated lawlessness; therefore God, your God,
    has anointed you with the oil of gladness beyond your companions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.' The Greek word can denote righteousness or justice; here the
      main text follows the project's default rendering 'righteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγάπησας
  chosen: have loved
  alternatives:
  - loved
  lexicon: BDAG
  rationale: Aorist indicative in a citation can be rendered as simple past, but English
    present perfect preserves the force of a completed action with present relevance
    in elevated discourse. It also pairs naturally with the following verb.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Default doctrinal rendering is 'righteousness.' In this royal/messianic
    citation the moral quality is foregrounded, though 'justice' is a viable nuance
    and is preserved in a footnote per the contested-terms guidance.
- source_word: ἐμίσησας
  chosen: hated
  alternatives:
  - have hated
  lexicon: BDAG
  rationale: Rendered with the straightforward English verb 'hated' to preserve the
    strong moral contrast with 'loved.' English simple past reads naturally in parallel
    with the citation style; the perfect nuance is not essential to preserve explicitly
    here.
- source_word: ἀνομίαν
  chosen: lawlessness
  alternatives:
  - wickedness
  - iniquity
  lexicon: BDAG
  rationale: '''Lawlessness'' most directly reflects ἀνομία as disregard for or violation
    of law, and preserves the lexical contrast with righteousness better than the
    broader ''wickedness'' or the more traditional but less transparent ''iniquity.'''
- source_word: διὰ τοῦτο
  chosen: therefore
  alternatives:
  - for this reason
  - because of this
  lexicon: BDAG
  rationale: '''Therefore'' is concise, natural, and preserves the inferential/causal
    connection between the Son''s moral character and the ensuing anointing.'
- source_word: ἔχρισέν
  chosen: has anointed
  alternatives:
  - anointed
  lexicon: BDAG
  rationale: The verb χρίω is central to royal/messianic imagery. 'Has anointed' preserves
    the completed action with ongoing significance and echoes the elevated style of
    the citation.
- source_word: ὁ θεός, ὁ θεός σου
  chosen: God, your God
  alternatives:
  - God, even your God
  lexicon: BDAG
  rationale: The repeated nominative with apposition/vocative-like force is best represented
    directly. 'God, your God' preserves both the repetition and the relational distinction
    in the text without adding interpretive wording.
- source_word: ἔλαιον ἀγαλλιάσεως
  chosen: the oil of gladness
  alternatives:
  - oil of joy
  - oil of exultation
  lexicon: BDAG
  rationale: This phrase is a recognizable scriptural idiom from the Psalm citation.
    'Gladness' is readable modern English while retaining the celebratory, consecratory
    imagery. 'Joy' is possible but slightly flatter; 'exultation' is more formal.
- source_word: παρὰ
  chosen: beyond
  alternatives:
  - more than
  - above
  lexicon: BDAG
  rationale: In this comparative context παρά with the accusative indicates superiority
    in degree. 'Beyond' is idiomatic and avoids awkwardness while preserving the comparative
    sense.
- source_word: μετόχους
  chosen: companions
  alternatives:
  - partners
  - associates
  - fellows
  lexicon: BDAG
  rationale: '''Companions'' is natural English and fits the relational sense here.
    ''Fellows'' is traditional but dated; ''partners'' can sound commercial; ''associates''
    is too impersonal.'
