theological_decisions:
- issue: Rendering of δικαιοσύνη in a non-Pauline but theologically weighty context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Following the project's default rendering for δικαιοσύνη, 'righteousness'
    best fits the moral and covenantal sense in this citation about the Son's character.
    Because 'justice' is a recognized alternative and the doctrine file calls for
    preserving such alternatives in footnotes for this contested term, it is noted
    there without displacing the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternatives
    preserved in footnotes where relevant'
- issue: Christological force of 'God, your God' in reference to the Son
  chosen_reading: Retain the wording without doctrinal expansion
  alternative_readings:
  - Paraphrastic expansions clarifying Trinitarian relations
  rationale: The verse addresses the Son in exalted terms while also speaking of 'your
    God.' In keeping with Chalcedonian and Nicene orthodoxy and the translation philosophy,
    the wording is preserved as written rather than softened or expanded. This maintains
    the text's theological tension without importing explanatory doctrine into the
    translation itself.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3 Preserve
    theological tension rather than resolve it
