theological_decisions:
- issue: Nature of Isaac's 'return'
  chosen_reading: Abraham received Isaac back figuratively/as a type, not through an actual resurrection.
  alternative_readings:
  - Abraham received Isaac back 'in a parable' with emphasis on typology rather than figurative speech
  - The phrase could be rendered more dynamically as 'symbolically he did receive him back from death'
  rationale: The Greek ἐν παραβολῇ signals that the recovery of Isaac is analogous to resurrection rather than a literal resurrection event. The translation preserves this theological tension without over-specifying the typology.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
revisions:
- timestamp: '2026-04-21T03:27:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/hebrews/011/019.json
  category: awkward_english
  tier: 1
  from: from which
  to: from where
  rationale: The Greek ὅθεν is a relative adverb meaning 'from where' or 'whence.' The current rendering 'from which' is an awkward and ambiguous literalism in English. It is unclear whether 'which' refers to 'the dead' or the entire preceding clause. Using 'from where' preserves the intended locative/source connection to 'the dead' while being grammatically natural and clear in English.
