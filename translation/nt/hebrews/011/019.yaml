id: HEB.11.19
reference: Hebrews 11:19
source:
  edition: SBLGNT
  text: λογισάμενος ὅτι καὶ ἐκ νεκρῶν ἐγείρειν δυνατὸς ὁ θεός· ὅθεν αὐτὸν καὶ ἐν παραβολῇ ἐκομίσατο.
translation:
  text: having considered that God is able even to raise from the dead, from where, in a figure, he also received him back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "figuratively"; the phrase means Abraham received Isaac back as though from death, not by an actual resurrection.
    reason: lexical_alternative
  - marker: b
    text: Or 'from which'.
    reason: previous_rendering
lexical_decisions:
- source_word: λογισάμενος
  chosen: having considered
  alternatives:
  - having reasoned
  - having concluded
  - having reckoned
  lexicon: BDAG
  rationale: Aorist middle participle indicating Abraham's internal reasoning process. 'Having considered' is natural modern English while preserving the deliberative sense better than the more archaic 'reckoned.'
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out of the dead
  - from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering for resurrection language in English. The plural νεκρῶν is often represented idiomatically as 'the dead.'
- source_word: ἐγείρειν
  chosen: to raise
  alternatives:
  - to awaken
  - to raise up
  lexicon: BDAG
  rationale: In context this is resurrection language, so 'to raise' is the clearest and most idiomatic rendering.
- source_word: δυνατὸς ὁ θεός
  chosen: God is able
  alternatives:
  - God was able
  - God is powerful enough
  lexicon: BDAG
  rationale: Predicate adjective with θεός. Present-tense English best reflects the Greek construction in this participial clause; 'is able' is concise and natural.
- source_word: ὅθεν
  chosen: from which
  alternatives:
  - therefore
  - whence
  - for which reason
  lexicon: BDAG
  rationale: Here ὅθεν most naturally points back to the preceding idea and introduces the result in relation to resurrection, leading into the figurative statement. 'From which' preserves the relative force better than a purely inferential 'therefore.'
- source_word: ἐν παραβολῇ
  chosen: in a figure
  alternatives:
  - figuratively
  - as a parable
  - symbolically
  lexicon: BDAG
  rationale: 'The phrase indicates a figurative or illustrative sense: Isaac was received back as though from death, not literally resurrected. ''In a figure'' preserves the compactness and literary flavor of the Greek while remaining understandable.'
- source_word: ἐκομίσατο
  chosen: he also received him back
  alternatives:
  - he received him
  - he recovered him
  - he got him back
  lexicon: BDAG
  rationale: Middle voice with αὐτόν in context suggests receiving Isaac back after the near-sacrifice. 'Received him back' makes explicit the contextual sense commonly understood from the narrative.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  lexicon: BDAG
  rationale: 'In καὶ ἐκ νεκρῶν the particle intensifies the claim: God is able ''even'' to raise the dead.'
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: BDAG
  rationale: 'The second καὶ before ἐν παραβολῇ is additive, linking the result to Abraham''s reasoning: he ''also'' received him back in a figurative sense.'
