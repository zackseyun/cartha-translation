id: HEB.11.8
reference: Hebrews 11:8
source:
  edition: SBLGNT
  text: ⸀Πίστει καλούμενος Ἀβραὰμ ὑπήκουσεν ἐξελθεῖν εἰς ⸀τόπον ὃν ἤμελλεν λαμβάνειν εἰς κληρονομίαν, καὶ ἐξῆλθεν μὴ ἐπιστάμενος ποῦ ἔρχεται.
translation:
  text: By faith Abraham, when called, obeyed by going out to a place that he was going to receive as an inheritance, and he went out not knowing where he was going.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obeyed to go out'.
    reason: previous_rendering
lexical_decisions:
- source_word: Πίστει
  chosen: By faith
  alternatives:
  - By trust
  - By faithfulness
  lexicon: BDAG
  rationale: Dative of means/instrument; the default rendering for πίστις is 'faith' per doctrine. 'Trust' is possible in English, and 'faithfulness' is a known semantic alternative, but here the context of Abraham's responsive reliance favors 'faith'.
- source_word: καλούμενος
  chosen: when called
  alternatives:
  - being called
  - after being called
  lexicon: BDAG
  rationale: Present passive participle modifying Abraham. 'When called' gives natural English while preserving the temporal-circumstantial force without over-specifying sequence.
- source_word: ὑπήκουσεν
  chosen: obeyed
  alternatives:
  - listened obediently
  - responded in obedience
  lexicon: BDAG
  rationale: The verb denotes obedience/compliance. 'Obeyed' is the most direct and idiomatic rendering in context.
- source_word: ἐξελθεῖν
  chosen: to go out
  alternatives:
  - to depart
  - to leave
  lexicon: BDAG
  rationale: Complementary infinitive after 'obeyed.' 'Go out' preserves the verbal connection with the later finite verb ἐξῆλθεν ('he went out'), maintaining the author's repetition.
- source_word: τόπον
  chosen: a place
  alternatives:
  - the place
  - a region
  lexicon: BDAG
  rationale: Anarthrous/variant-supported noun best rendered indefinitely here in English. 'A place' fits the sense of an as-yet unspecified destination.
- source_word: ἤμελλεν λαμβάνειν
  chosen: he was going to receive
  alternatives:
  - he was about to receive
  - he was destined to receive
  lexicon: BDAG
  rationale: μέλλω with infinitive often indicates futurity or impending action. 'Was going to receive' is readable modern English and avoids overstating predestinarian nuance that 'destined' might suggest.
- source_word: εἰς κληρονομίαν
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as his inheritance
  lexicon: BDAG
  rationale: The prepositional phrase expresses result/purpose with the sense of receiving the place in the status of inheritance. 'As an inheritance' is idiomatic and sufficiently literal. 'His' is not explicit in Greek and is therefore omitted.
- source_word: ἐξῆλθεν
  chosen: he went out
  alternatives:
  - he departed
  - he left
  lexicon: BDAG
  rationale: Aorist main verb echoing ἐξελθεῖν. 'Went out' preserves the repetition and narrative movement.
- source_word: μὴ ἐπιστάμενος
  chosen: not knowing
  alternatives:
  - without knowing
  - though not knowing
  lexicon: BDAG
  rationale: Negative participle expressing attendant circumstance. 'Not knowing' is concise and natural.
- source_word: ποῦ ἔρχεται
  chosen: where he was going
  alternatives:
  - where he was coming
  - where he was headed
  lexicon: BDAG
  rationale: Although ἔρχεται is formally present middle/passive of 'come/go,' in this context English idiom requires 'was going' for destination. 'Was headed' is smoother but less formally tied to the Greek verb.
