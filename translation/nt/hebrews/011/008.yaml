  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: Following the doctrine table, πίστις is rendered 'faith' in the main text. The context emphasizes Abraham's believing response to God's call rather than primarily his covenantal fidelity, so no footnote is necessary beyond documenting the lexical alternatives.
