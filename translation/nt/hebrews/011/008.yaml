  category: awkward_english
  tier: 1
  from: obeyed to go out
  to: obeyed by going out
  rationale: The construction 'obeyed to [verb]' is unidiomatic and awkward in English. While it formally mirrors the Greek verb + complementary infinitive (ὑπήκουσεν ἐξελθεῖν), the meaning in English is more naturally expressed with a construction like 'obeyed by [verb]-ing'. This change improves the fluency of the English sentence without altering the core meaning, which is that the act of obedience consisted in the act of going out.
