theological_decisions:
- issue: Referent of δι’ αὐτῆς in the final clause
  chosen_reading: Left intentionally less specific in English as 'through it'
  alternative_readings:
  - through faith
  - through the sacrifice
  rationale: The Greek feminine pronoun may point back to either Abel's faith (the
    thematic frame of the chapter) or his sacrifice (the nearer feminine antecedent).
    In keeping with the doctrine's instruction to preserve theological tension rather
    than resolve genuine ambiguity, the main text retains the ambiguity as much as
    English allows, and alternatives are preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Force of ἐμαρτυρήθη
  chosen_reading: Rendered with witness language ('was testified to') rather than
    a more interpretive 'was commended'
  alternative_readings:
  - was commended
  - was approved
  rationale: Hebrews 11 repeatedly uses μαρτυρέω language to describe divine testimony
    concerning the faithful. Preserving the witness motif is important for the chapter's
    rhetoric and avoids importing a narrower evaluative nuance.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
revisions:
- timestamp: '2026-04-21T03:27:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/hebrews/011/004.json
  category: awkward_english
  tier: 1
  from: he was testified to be righteous
  to: he was attested as righteous
  rationale: The current rendering is an awkward and unidiomatic English calque of
    the Greek passive verb with an infinitive. One testifies *about* or *of* a person,
    but one does not 'testify a person to be' something. The suggested rewrite, 'he
    was attested as righteous' (which is already noted as an alternative by the drafter),
    is much more natural English. It fully preserves the meaning and the core concept
    of 'witness' (via its Latin root *testis*), aligning with the stated goal of maintaining
    the chapter's witness motif while improving readability.
