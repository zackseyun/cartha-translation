id: HEB.11.4
reference: Hebrews 11:4
source:
  edition: SBLGNT
  text: Πίστει πλείονα θυσίαν Ἅβελ παρὰ Κάϊν προσήνεγκεν τῷ θεῷ, δι’ ἧς ἐμαρτυρήθη
    εἶναι δίκαιος, μαρτυροῦντος ἐπὶ τοῖς δώροις αὐτοῦ ⸂τοῦ θεοῦ⸃, καὶ δι’ αὐτῆς ἀποθανὼν
    ἔτι ⸀λαλεῖ.
translation:
  text: By faith Abel offered to God a better sacrifice than Cain, through which he
    was attested as righteous, God testifying concerning his gifts; and through it,
    though he died, he still speaks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a greater sacrifice.' The comparative may emphasize either quality ('better')
      or magnitude ('greater').
    reason: lexical_alternative
  - marker: b
    text: Or 'he was commended to be righteous' or 'he was attested as righteous.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'through it' may refer to Abel's faith or to his sacrifice; the
      Greek is not fully explicit.
    reason: alternative_reading
  - marker: d
    text: Or 'he was testified to be righteous'.
    reason: previous_rendering
lexical_decisions:
- source_word: Πίστει
  chosen: By faith
  alternatives:
  - By faithfulness
  - By trust
  lexicon: BDAG
  rationale: Dative of means/instrument. Per doctrine defaults, πίστις is rendered
    'faith' in the main text; alternatives are noted but this context in Hebrews 11
    strongly supports the exemplary human response of faith.
- source_word: πλείονα θυσίαν
  chosen: a better sacrifice
  alternatives:
  - a greater sacrifice
  - a more acceptable sacrifice
  lexicon: BDAG
  rationale: πλείων can mean greater/more, but in context the comparative concerns
    qualitative superiority relative to Cain's offering. 'Better' is idiomatic and
    fits Hebrews' recurring comparative language without adding 'acceptable,' which
    would over-interpret.
- source_word: παρὰ Κάϊν
  chosen: than Cain
  alternatives:
  - more than Cain
  - beyond Cain
  lexicon: BDAG
  rationale: 'παρά with the comparative naturally marks the standard of comparison:
    Abel''s sacrifice was better than Cain''s. English ''than Cain'' is concise and
    idiomatic.'
- source_word: προσήνεγκεν τῷ θεῷ
  chosen: offered to God
  alternatives:
  - presented to God
  lexicon: BDAG
  rationale: Cultic verb προσφέρω is well rendered 'offer' in sacrificial contexts.
- source_word: δι’ ἧς
  chosen: through which
  alternatives:
  - through it
  - by which
  lexicon: BDAG
  rationale: The feminine relative most naturally refers back to θυσίαν ('sacrifice').
    'Through which' preserves the grammatical link and avoids ambiguity at this point
    in the sentence.
- source_word: ἐμαρτυρήθη
  chosen: he was testified to
  alternatives:
  - he was commended
  - he was attested
  lexicon: BDAG
  rationale: Passive of μαρτυρέω means to receive testimony/witness. 'Commended' is
    smoother but slightly interpretive; 'testified to' preserves the witness language
    that is thematic in Hebrews 11.
- source_word: εἶναι δίκαιος
  chosen: to be righteous
  alternatives:
  - to be just
  lexicon: BDAG
  rationale: δίκαιος here describes Abel's standing/character as affirmed by God.
    'Righteous' is the standard theological and lexical equivalent.
- source_word: μαρτυροῦντος ἐπὶ τοῖς δώροις αὐτοῦ τοῦ θεοῦ
  chosen: God testifying concerning his gifts
  alternatives:
  - God bearing witness over his gifts
  - as God testified concerning his offerings
  lexicon: BDAG
  rationale: The genitive absolute with explicit subject τοῦ θεοῦ is rendered as a
    circumstantial clause. ἐπί with the dative here is taken in the sense 'concerning/with
    reference to.' δῶρα in sacrificial context can be 'gifts' or 'offerings'; 'gifts'
    preserves the lexical form while remaining natural.
- source_word: δι’ αὐτῆς
  chosen: through it
  alternatives:
  - through this faith
  - through this sacrifice
  lexicon: BDAG
  rationale: The feminine pronoun could refer to faith or sacrifice. Given the immediate
    antecedent possibilities and the thematic prominence of faith in Hebrews 11, the
    English keeps the pronoun somewhat open with 'it,' preserving the Greek's ambiguity
    rather than resolving it too strongly.
- source_word: ἀποθανὼν
  chosen: though he died
  alternatives:
  - having died
  - after he died
  lexicon: BDAG
  rationale: Aorist participle indicating Abel's death prior to the continuing result.
    'Though he died' brings out the concessive force that is natural in English in
    contrast with 'he still speaks.'
- source_word: ἔτι λαλεῖ
  chosen: he still speaks
  alternatives:
  - he is still speaking
  lexicon: BDAG
  rationale: Present tense indicates continuing significance. Simple present 'still
    speaks' is idiomatic and preserves the durative sense.
