  from: For before his being taken away
  to: For before he was taken away
  rationale: The current rendering uses a gerund phrase ('his being taken away') to translate the Greek noun `τῆς μεταθέσεως`. While this is a formally equivalent and grammatical choice, converting it to a subordinate clause ('before he was taken away') is more natural and idiomatic in contemporary English without any loss of meaning.
