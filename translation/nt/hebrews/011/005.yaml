theological_decisions:
- issue: Meaning of Enoch's μετατίθημι language
  chosen_reading: Render as 'taken away' without importing a fuller doctrinal explanation beyond the text.
  alternative_readings:
  - Render more interpretively as 'taken up to heaven'
  - Use traditional 'translated'
  rationale: The verse clearly states that God removed Enoch so that he did not see death, but it does not itself elaborate the mechanics beyond that. 'Taken away' preserves the text's claim without adding details not explicit in the verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of 'see death'
  chosen_reading: Preserve the idiom 'see death' in the main text.
  alternative_readings:
  - Interpret idiomatically as 'experience death'
  rationale: The Greek idiom is transparent enough in English and retains biblical texture. The interpretive sense can be preserved in a footnote without flattening the source expression.
  doctrine_reference: Translation philosophy §§1, 6
