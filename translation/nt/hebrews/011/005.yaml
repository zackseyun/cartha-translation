id: HEB.11.5
reference: Hebrews 11:5
source:
  edition: SBLGNT
  text: Πίστει Ἑνὼχ μετετέθη τοῦ μὴ ἰδεῖν θάνατον, καὶ οὐχ ηὑρίσκετο διότι μετέθηκεν αὐτὸν ὁ θεός· πρὸ γὰρ τῆς ⸀μεταθέσεως μεμαρτύρηται εὐαρεστηκέναι τῷ θεῷ,
translation:
  text: By faith Enoch was taken away so that he should not see death, and he was not found because God had taken him away. For before he was taken away, he had been commended as having pleased God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'experience death.' The expression 'see death' is a Greek idiom preserved in the main text.
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions often render μετατίθημι here as 'translated.'
    reason: lexical_alternative
  - marker: c
    text: Or 'For before his being taken away'.
    reason: previous_rendering
lexical_decisions:
- source_word: Πίστει
  chosen: By faith
  alternatives:
  - By trust
  - By faithfulness
  lexicon: BDAG
  rationale: Follows the project's default rendering of πίστις as 'faith.' In Hebrews 11 the dative functions instrumentally or associatively, introducing the exemplars' mode of action/life. 'By faith' is the established and contextually fitting rendering; alternatives are possible in principle but are not as natural here.
- source_word: μετετέθη
  chosen: was taken away
  alternatives:
  - was transferred
  - was removed
  - was translated
  lexicon: BDAG
  rationale: The passive of μετατίθημι here refers to Enoch's being taken from earthly life by divine action. 'Was taken away' is clear modern English and preserves the passive. 'Translated' is traditional but archaic/misleading for modern readers.
- source_word: τοῦ μὴ ἰδεῖν θάνατον
  chosen: so that he should not see death
  alternatives:
  - so as not to see death
  - so that he would not experience death
  lexicon: BDAG
  rationale: The articular infinitive with μή expresses purpose/result. 'See death' is a natural literal rendering of the idiom and preserves the biblical phrasing, while still being understandable as 'experience death.'
- source_word: οὐχ ηὑρίσκετο
  chosen: he was not found
  alternatives:
  - he could not be found
  - he was nowhere to be found
  lexicon: BDAG
  rationale: Imperfect passive/middle of εὑρίσκω is best rendered straightforwardly. 'He was not found' preserves the wording and leaves implicit who was seeking him, matching the Greek.
- source_word: διότι μετέθηκεν αὐτὸν ὁ θεός
  chosen: because God had taken him away
  alternatives:
  - because God had transferred him
  - because God had removed him
  lexicon: BDAG
  rationale: Uses pluperfect sense in English ('had taken') to reflect the prior action explaining why he was not found. Repeats the same English root as earlier μετατίθημι for consistency.
- source_word: πρὸ γὰρ τῆς μεταθέσεως
  chosen: For before his being taken away
  alternatives:
  - For before his removal
  - For before this translation
  lexicon: BDAG
  rationale: Maintains lexical consistency with μετατίθημι/μετάθεσις by using 'taken away.' The possessive 'his' is implied by context and natural in English.
- source_word: μεμαρτύρηται
  chosen: he had been commended
  alternatives:
  - it has been testified
  - he has been attested
  - he received testimony
  lexicon: BDAG
  rationale: The perfect passive of μαρτυρέω in Hebrews often carries the sense of receiving divine/scriptural commendation. 'Had been commended' fits the context and reads naturally in English while preserving the passive idea.
- source_word: εὐαρεστηκέναι τῷ θεῷ
  chosen: as having pleased God
  alternatives:
  - that he had pleased God
  - to have been pleasing to God
  lexicon: BDAG
  rationale: The perfect infinitive expresses prior completed state/action relative to the testimony. 'As having pleased God' fits after 'had been commended' and preserves the infinitival construction's sense.
