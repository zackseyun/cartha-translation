id: 1TH.1.2
reference: 1 Thessalonians 1:2
source:
  edition: SBLGNT
  text: Εὐχαριστοῦμεν τῷ θεῷ πάντοτε περὶ πάντων ὑμῶν ⸀μνείαν ποιούμενοι ἐπὶ τῶν προσευχῶν
    ἡμῶν, ἀδιαλείπτως
translation:
  text: We always give thanks to God for all of you, making mention of you in our
    prayers unceasingly,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without ceasing.' The adverb may modify either 'making mention of you
      in our prayers' specifically or the broader thanksgiving statement as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστοῦμεν
  chosen: We ... give thanks
  alternatives:
  - we thank
  lexicon: BDAG
  rationale: Present active indicative, first person plural. 'Give thanks' is the
    standard idiomatic rendering for εὐχαριστέω in Pauline thanksgiving formulas and
    preserves the explicit gratitude directed to God better than the flatter 'thank.'
- source_word: τῷ θεῷ
  chosen: to God
  lexicon: BDAG
  rationale: Dative indirect object after εὐχαριστοῦμεν; straightforwardly marks the
    recipient of thanks.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - at all times
  lexicon: BDAG
  rationale: Natural modern English adverb matching the temporal force of πάντοτε.
- source_word: περὶ πάντων ὑμῶν
  chosen: for all of you
  alternatives:
  - concerning all of you
  - about all of you
  lexicon: BDAG
  rationale: περί with the genitive here expresses reference or concern. 'For all
    of you' is idiomatic in English thanksgiving language and keeps the inclusive
    force of πάντων ὑμῶν.
- source_word: μνείαν ποιούμενοι
  chosen: making mention of you
  alternatives:
  - remembering you
  - making mention
  lexicon: BDAG
  rationale: This participial idiom literally means 'making mention.' It is a common
    Pauline expression tied specifically to prayer. Including 'of you' makes explicit
    the object supplied by context from περὶ πάντων ὑμῶν. 'Remembering you' is possible
    but less precise to the idiom.
- source_word: ἐπὶ τῶν προσευχῶν ἡμῶν
  chosen: in our prayers
  alternatives:
  - upon our prayers
  - at our prayers
  lexicon: BDAG
  rationale: ἐπί with the genitive in this idiom is best rendered idiomatically in
    English as 'in' or 'during.' 'In our prayers' is clear and natural.
- source_word: ἀδιαλείπτως
  chosen: unceasingly
  alternatives:
  - constantly
  - without ceasing
  lexicon: BDAG
  rationale: The adverb emphasizes persistent regularity. 'Unceasingly' preserves
    the stronger rhetorical force and echoes Pauline usage elsewhere. Its placement
    at the end reflects the Greek emphasis, though English punctuation may vary by
    sentence division.
