id: 1TH.1.3
reference: 1 Thessalonians 1:3
source:
  edition: SBLGNT
  text: μνημονεύοντες ὑμῶν τοῦ ἔργου τῆς πίστεως καὶ τοῦ κόπου τῆς ἀγάπης καὶ τῆς
    ὑπομονῆς τῆς ἐλπίδος τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ ἔμπροσθεν τοῦ θεοῦ καὶ πατρὸς
    ἡμῶν,
translation:
  text: remembering your work of faith and labor of love and steadfastness of hope
    in our Lord Jesus Messiah before our God and Father,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness' or 'trust' for 'faith.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because Χριστός functions as a
      title.
    reason: alternative_reading
lexical_decisions:
- source_word: μνημονεύοντες
  chosen: remembering
  alternatives:
  - mentioning
  - keeping in mind
  lexicon: BDAG
  rationale: Present participle continuing the sense from the previous verse; 'remembering'
    is natural English and preserves the ongoing verbal aspect without overparaphrase.
- source_word: ἔργου
  chosen: work
  alternatives:
  - deed
  - activity
  lexicon: BDAG
  rationale: '''Work'' is the standard rendering and fits the triad ''work... labor...
    steadfastness,'' preserving Paul''s rhetorical structure.'
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here
    the genitive likely denotes work produced by or characterized by faith. 'Faithfulness'
    is possible but less likely in this context and is preserved as an alternative.
- source_word: κόπου
  chosen: labor
  alternatives:
  - toil
  lexicon: BDAG
  rationale: κόπος often carries the sense of strenuous effort. 'Labor' preserves
    that force and pairs well with 'love' in established Pauline usage.
- source_word: ἀγάπης
  chosen: love
  lexicon: BDAG
  rationale: Per doctrine defaults, ἀγάπη is rendered 'love.'
- source_word: ὑπομονῆς
  chosen: steadfastness
  alternatives:
  - endurance
  - perseverance
  lexicon: BDAG
  rationale: The term denotes patient endurance under pressure. 'Steadfastness' captures
    both durability and firmness and reads well in the triad.
- source_word: ἐλπίδος
  chosen: hope
  lexicon: BDAG
  rationale: Standard rendering; in Pauline usage this is confident expectation grounded
    in God.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  chosen: in our Lord Jesus Messiah
  alternatives:
  - of our Lord Jesus Messiah
  - in our Lord Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ is rendered 'Messiah' because it functions as a title, per doctrine
    guidance. The genitive phrase most naturally modifies 'hope' as its object or
    sphere, and in English 'hope in our Lord Jesus Messiah' expresses that relation
    clearly. 'Christ' is preserved as an alternative due to English familiarity.
- source_word: ἔμπροσθεν
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is concise and accurately conveys the relational/spatial
    sense of being in God''s presence.'
- source_word: τοῦ θεοῦ καὶ πατρὸς ἡμῶν
  chosen: our God and Father
  alternatives:
  - God our Father
  lexicon: BDAG
  rationale: The article with both nouns supports the close appositional sense. 'Our
    God and Father' is a transparent rendering of the Greek word order and syntax.
