theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term is a title here rather than merely a name-like element, so 'Messiah'
    best preserves the meaning of Χριστός in line with project doctrine, while the
    familiar 'Christ' is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Sense of πίστις in τῆς πίστεως
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The project default for πίστις is 'faith' in the main text, with alternatives
    preserved where interpretively significant. In this verse the phrase likely means
    work arising from faith, but 'faithfulness' remains a plausible nuance and is
    footnoted.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; preserve theological
    tension where ambiguity is genuine'
