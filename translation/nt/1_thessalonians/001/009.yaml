id: 1TH.1.9
reference: 1 Thessalonians 1:9
source:
  edition: SBLGNT
  text: αὐτοὶ γὰρ περὶ ἡμῶν ἀπαγγέλλουσιν ὁποίαν εἴσοδον ἔσχομεν πρὸς ὑμᾶς, καὶ πῶς
    ἐπεστρέψατε πρὸς τὸν θεὸν ἀπὸ τῶν εἰδώλων δουλεύειν θεῷ ζῶντι καὶ ἀληθινῷ,
translation:
  text: For they themselves report about us what kind of reception we had among you,
    and how you turned to God from idols to serve the living and true God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what kind of entrance we had to you'; the Greek expression refers to
      the character and effect of Paul's arrival among them.
    reason: lexical_alternative
  - marker: b
    text: Or 'how you were converted to God from idols.'
    reason: alternative_reading
  - marker: c
    text: The phrase 'the living and true God' contrasts God with lifeless idols;
      compare Jer 10:10.
    reason: cross_reference
lexical_decisions:
- source_word: αὐτοὶ
  chosen: they themselves
  alternatives:
  - they
  - they on their own
  lexicon: BDAG
  rationale: The intensive pronoun adds emphasis, highlighting that the report comes
    from others without Paul's prompting. 'They themselves' preserves that emphatic
    force.
- source_word: ἀπαγγέλλουσιν
  chosen: report
  alternatives:
  - tell
  - announce
  - declare
  lexicon: BDAG
  rationale: A present indicative of ongoing report. 'Report' fits the sense of relaying
    news publicly or widely without sounding overly formal.
- source_word: ὁποίαν εἴσοδον
  chosen: what kind of reception
  alternatives:
  - what kind of entrance
  - what kind of coming
  - what sort of visit
  lexicon: BDAG
  rationale: Literally 'what kind of entrance,' but in context it refers to the character
    and effect of Paul's arrival among them. 'Reception' communicates the relational
    result of that entrance in natural English while staying close to the contextual
    sense.
- source_word: ἔσχομεν πρὸς ὑμᾶς
  chosen: we had among you
  alternatives:
  - we had with you
  - we had toward you
  lexicon: BDAG
  rationale: The idiom concerns Paul's coming into relation with the Thessalonians.
    'Among you' is idiomatic English and fits the communal setting better than a wooden
    'toward you.'
- source_word: πῶς ἐπεστρέψατε
  chosen: how you turned
  alternatives:
  - how you turned back
  - how you converted
  lexicon: BDAG
  rationale: ἐπιστρέφω here denotes turning/conversion to God. 'Turned' preserves
    the metaphor and avoids importing later technical terminology too strongly.
- source_word: πρὸς τὸν θεὸν ἀπὸ τῶν εἰδώλων
  chosen: to God from idols
  alternatives:
  - to God away from idols
  lexicon: BDAG
  rationale: 'The paired prepositions express both destination and source: conversion
    is a turn toward God and away from idols. The concise English preserves both directions.'
- source_word: εἰδώλων
  chosen: idols
  alternatives:
  - images
  - false gods
  lexicon: BDAG
  rationale: '''Idols'' is the direct and standard rendering, accurately capturing
    the cultic objects/deities rejected by the Thessalonians.'
- source_word: δουλεύειν
  chosen: to serve
  alternatives:
  - to be a slave to
  - to render service to
  lexicon: BDAG
  rationale: Although related to the δοῦλος word-group, this infinitive in a religious
    context commonly means to serve or worship in devoted service. 'To serve' is the
    most natural rendering here; 'to be a slave to' would overstate the bonded nuance
    in this context.
- source_word: θεῷ ζῶντι καὶ ἀληθινῷ
  chosen: the living and true God
  alternatives:
  - a living and true God
  - God who is living and true
  lexicon: BDAG
  rationale: The dative phrase is the object/complement of service. The adjectives
    distinguish Israel's God from lifeless idols. 'The living and true God' is both
    accurate and idiomatic.
- source_word: γὰρ
  chosen: For
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: γάρ links this verse as support for the previous statement. 'For' preserves
    the explanatory connection straightforwardly.
