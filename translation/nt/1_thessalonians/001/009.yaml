theological_decisions:
- issue: Nature of conversion language in ἐπεστρέψατε πρὸς τὸν θεὸν ἀπὸ τῶν εἰδώλων
  chosen_reading: Rendered as 'you turned to God from idols'
  alternative_readings:
  - you were converted to God from idols
  rationale: The text describes a genuine conversion from idolatry to the worship
    of the true God, but the verb itself is best preserved with the metaphor 'turned'
    rather than importing a more systematized doctrinal term into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English without flattening theological weight.
- issue: Force of δουλεύειν in relation to God
  chosen_reading: Rendered as 'to serve' rather than 'to be enslaved to'
  alternative_readings:
  - to be a slave to God
  - to worship
  rationale: While the verb belongs to the slavery/service semantic domain, in this
    context of religious allegiance it denotes devoted service to God in contrast
    to idols. 'Serve' communicates the sense without importing a harsher metaphor
    than the context requires.
  doctrine_reference: 'Contested terms table: δοῦλος group rendered servant/slave
    context-dependently.'
