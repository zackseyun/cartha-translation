id: 1TH.1.8
reference: 1 Thessalonians 1:8
source:
  edition: SBLGNT
  text: ἀφ’ ὑμῶν γὰρ ἐξήχηται ὁ λόγος τοῦ κυρίου οὐ μόνον ἐν τῇ Μακεδονίᾳ ⸀καὶ Ἀχαΐᾳ,
    ⸀ἀλλ’ ἐν παντὶ τόπῳ ἡ πίστις ὑμῶν ἡ πρὸς τὸν θεὸν ἐξελήλυθεν, ὥστε μὴ χρείαν ⸂ἔχειν
    ἡμᾶς⸃ λαλεῖν τι·
translation:
  text: For from you the word of the Lord has sounded forth, not only in Macedonia
    and Achaia, but in every place your faith toward God has gone out, so that we
    have no need to say anything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your faith in God.' The Greek more literally reads 'your faith toward
      God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξήχηται
  chosen: has sounded forth
  alternatives:
  - has rung out
  - has resounded
  lexicon: BDAG
  rationale: The verb evokes a strong auditory image of something sounding out or
    resounding from a source. 'Has sounded forth' preserves the metaphor and the perfect
    tense's present result better than a flatter 'has spread.'
- source_word: ὁ λόγος τοῦ κυρίου
  chosen: the word of the Lord
  alternatives:
  - the Lord's message
  - the message of the Lord
  lexicon: BDAG
  rationale: 'A relatively formal rendering preserves the familiar Pauline expression
    and allows the genitive to remain slightly open: the message belonging to or concerning
    the Lord. ''Lord'' follows the doctrinal default for κύριος.'
- source_word: Μακεδονίᾳ καὶ Ἀχαΐᾳ
  chosen: Macedonia and Achaia
  rationale: Standard transliteration of regional names, in keeping with the policy
    to transliterate names.
- source_word: ἀλλ’ ἐν παντὶ τόπῳ
  chosen: but in every place
  alternatives:
  - but in every region
  - but everywhere
  lexicon: BDAG
  rationale: This keeps the distributive force of παντί and the concrete noun τόπῳ.
    'Everywhere' is smoother but slightly less explicit than the Greek.
- source_word: ἡ πίστις ὑμῶν ἡ πρὸς τὸν θεόν
  chosen: your faith toward God
  alternatives:
  - your faith in God
  - your faith directed to God
  lexicon: BDAG
  rationale: πίστις is rendered by the default 'faith.' The preposition πρὸς literally
    means 'toward,' and preserving that wording reflects the Greek more closely while
    still sounding natural enough in English. 'In God' is idiomatic and interpretive,
    so it is preserved as an alternative.
- source_word: ἐξελήλυθεν
  chosen: has gone out
  alternatives:
  - has spread
  - has become known
  lexicon: BDAG
  rationale: The perfect of ἐξέρχομαι is kept with a concrete image, matching the
    source's movement language and paralleling the earlier 'has sounded forth.' 'Has
    spread' is possible but more interpretive.
- source_word: ὥστε μὴ χρείαν ἔχειν ἡμᾶς
  chosen: so that we have no need
  alternatives:
  - so that there is no need for us
  - with the result that we do not need
  lexicon: BDAG
  rationale: This idiom naturally conveys the infinitival construction while preserving
    the result clause introduced by ὥστε.
- source_word: λαλεῖν τι
  chosen: to say anything
  alternatives:
  - to speak anything
  - to say a word
  lexicon: BDAG
  rationale: Idiomatic English prefers 'say anything' here. 'Speak anything' is too
    wooden, while 'say a word' adds emphasis not explicit in the Greek.
