theological_decisions:
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrinal guidance sets 'faith' as the default rendering for πίστις.
    In this context the phrase refers to the Thessalonians' believing response toward
    God rather than primarily their reliability, so 'faith' best fits the immediate
    sense. Alternatives are noted for auditability, but the ambiguity is not strong
    enough here to require a footnote in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
