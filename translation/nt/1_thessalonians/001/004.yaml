id: 1TH.1.4
reference: 1 Thessalonians 1:4
source:
  edition: SBLGNT
  text: εἰδότες, ἀδελφοὶ ἠγαπημένοι ὑπὸ ⸀θεοῦ, τὴν ἐκλογὴν ὑμῶν,
translation:
  text: For we know, brothers loved by God, your election,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' but in Paul's letters
      this often addresses the whole believing community.
    reason: lexical_alternative
  - marker: b
    text: Or 'your being chosen.' The Greek noun is 'election,' a term that should
      not be narrowed here to a particular theological system beyond what the text
      itself states.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰδότες
  chosen: For we know
  alternatives:
  - knowing
  - since we know
  lexicon: BDAG
  rationale: Although formally a participle ('knowing'), in context it continues the
    sentence from v. 3 and is naturally rendered with an explicit finite verb in English.
    'For we know' captures the participial sense while producing idiomatic English
    and reflecting Paul's explanatory flow.
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and, per doctrine, should
    be rendered gender-accurately rather than neutralized. In Pauline usage it often
    addresses the whole congregation, but the masculine form is retained in the main
    text; inclusivity can be noted in a footnote.
- source_word: ἠγαπημένοι ὑπὸ θεοῦ
  chosen: loved by God
  alternatives:
  - beloved by God
  - having been loved by God
  lexicon: BDAG
  rationale: The perfect passive participle denotes a settled state resulting from
    God's love. 'Loved by God' is clear modern English and preserves the passive sense
    without sounding archaic. 'Beloved by God' is possible but slightly more traditional/ecclesiastical.
- source_word: ἐκλογὴν
  chosen: election
  alternatives:
  - chosen-ness
  - choice
  - being chosen
  lexicon: BDAG
  rationale: ἐκλογή in Pauline usage commonly denotes election/choosing. 'Election'
    preserves the theological and lexical weight of the noun better than a paraphrase
    like 'being chosen.' Because the term is doctrinally loaded, retaining the formal
    noun best preserves the text's tension without importing a specific system.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: Straightforward possessive genitive modifying 'election.'
