theological_decisions:
- issue: Rendering ἐκλογή in a doctrinally contested context
  chosen_reading: election
  alternative_readings:
  - being chosen
  - God's choice of you
  rationale: The verse affirms God's choosing of the Thessalonian believers, but the
    translation should not resolve broader Calvinist/Arminian debates beyond the text.
    Retaining 'election' preserves Paul's wording and theological tension without
    interpretive expansion.
  doctrine_reference: Affirmations; Translation philosophy §3, §5
- issue: Whether to make ἀδελφοί explicitly inclusive in the main text
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: Per the doctrine's gender-accurate principle, the masculine plural is
    retained in the main text. Since the address likely includes the whole church,
    the inclusive force is worth preserving in a footnote rather than replacing the
    source-form in the text.
  doctrine_reference: Translation philosophy §4
