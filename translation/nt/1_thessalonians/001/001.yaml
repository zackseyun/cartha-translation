id: 1TH.1.1
reference: 1 Thessalonians 1:1
source:
  edition: SBLGNT
  text: Παῦλος καὶ Σιλουανὸς καὶ Τιμόθεος τῇ ἐκκλησίᾳ Θεσσαλονικέων ἐν θεῷ πατρὶ καὶ
    κυρίῳ Ἰησοῦ Χριστῷ· χάρις ὑμῖν καὶ ⸀εἰρήνη.
translation:
  text: 'Paul and Silvanus and Timothy, to the church of the Thessalonians in God
    the Father and the Lord Jesus the Messiah: grace to you and peace.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve its meaning; many English versions transliterate it as 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'assembly' for 'church.' The Greek ἐκκλησία refers to the gathered community.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παῦλος
  chosen: Paul
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Παῦλος.
- source_word: Σιλουανὸς
  chosen: Silvanus
  alternatives:
  - Silas
  lexicon: BDAG
  rationale: The Greek text has Σιλουανός, so the direct transliteration 'Silvanus'
    is preferred over the familiar equivalent 'Silas,' which reflects a different
    Greek form.
- source_word: Τιμόθεος
  chosen: Timothy
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Τιμόθεος.
- source_word: ἐκκλησίᾳ
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: '''Church'' is the most natural modern English rendering in this epistolary
    context, while still conveying the gathered people of God; ''assembly'' is possible
    but less idiomatic here.'
- source_word: Θεσσαλονικέων
  chosen: of the Thessalonians
  alternatives:
  - of the people of Thessalonica
  lexicon: BDAG
  rationale: The genitive plural denotes the people belonging to Thessalonica; 'of
    the Thessalonians' is concise and standard.
- source_word: ἐν
  chosen: in
  alternatives:
  - among
  - within
  lexicon: BDAG
  rationale: 'The preposition marks the church''s sphere or relationship: they exist
    ''in'' God the Father and the Lord Jesus Messiah. A more interpretive gloss would
    over-specify the nuance.'
- source_word: θεῷ πατρὶ
  chosen: God the Father
  alternatives:
  - God our Father
  lexicon: BDAG
  rationale: The Greek lacks 'our'; therefore 'God the Father' preserves the appositional
    construction without importing a possessive not present in the text.
- source_word: κυρίῳ
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord' in New Testament usage.
- source_word: Ἰησοῦ Χριστῷ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine defaults, Χριστός is translated 'Messiah' where it functions
    as a title rather than a fixed name-like element. In this greeting, the titular
    sense remains clear alongside 'Lord.'
- source_word: χάρις
  chosen: grace
  lexicon: BDAG
  rationale: Standard Pauline greeting term; 'grace' preserves both the lexical sense
    and epistolary resonance.
- source_word: εἰρήνη
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering of εἰρήνη in Pauline greetings, preserving both Greek
    and Jewish greeting resonance.
- source_word: χάρις ὑμῖν καὶ εἰρήνη
  chosen: grace to you and peace
  alternatives:
  - grace and peace to you
  lexicon: BDAG
  rationale: The Greek order places ὑμῖν immediately after χάρις; rendering 'grace
    to you and peace' preserves the source order while remaining natural English.
