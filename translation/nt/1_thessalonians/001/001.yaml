theological_decisions:
- issue: Rendering of Χριστός in the greeting
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate Χριστός as 'Messiah' where the title
    sense is still active. In 1 Thessalonians 1:1, 'Lord Jesus Messiah' remains intelligible
    and preserves the meaning of the title rather than defaulting to inherited transliteration.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; ''Χριστός Christos | Messiah
    (where title; Christ where name-like)''.'
- issue: Relation expressed by ἐν θεῷ πατρὶ καὶ κυρίῳ Ἰησοῦ Χριστῷ
  chosen_reading: The church is described as existing 'in' God the Father and the
    Lord Jesus Messiah
  alternative_readings:
  - The church belongs to God the Father and the Lord Jesus Messiah
  - The church gathers in the sphere of God the Father and the Lord Jesus Messiah
  rationale: The preposition ἐν is retained as 'in' to preserve Paul's theological
    language of union/relationship without collapsing it into a more interpretive
    paraphrase such as 'belonging to.' This also preserves the parallel relation of
    the Father and the Son in the phrase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
