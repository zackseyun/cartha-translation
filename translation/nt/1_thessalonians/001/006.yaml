id: 1TH.1.6
reference: 1 Thessalonians 1:6
source:
  edition: SBLGNT
  text: καὶ ὑμεῖς μιμηταὶ ἡμῶν ἐγενήθητε καὶ τοῦ κυρίου, δεξάμενοι τὸν λόγον ἐν θλίψει
    πολλῇ μετὰ χαρᾶς πνεύματος ἁγίου,
translation:
  text: And you became imitators of us and of the Lord, having received the word in
    much affliction with joy from the Holy Spirit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with joy of the Holy Spirit,' that is, joy produced by the Holy Spirit.
    reason: lexical_alternative
lexical_decisions:
- source_word: μιμηταὶ
  chosen: imitators
  alternatives:
  - followers
  lexicon: BDAG
  rationale: The noun denotes those who imitate or emulate an example. 'Imitators'
    is more precise than 'followers' and preserves Paul's explicit imitation language.
- source_word: ἐγενήθητε
  chosen: became
  alternatives:
  - came to be
  - proved to be
  lexicon: BDAG
  rationale: 'Aorist middle/passive of γίνομαι here marks a change of state: the Thessalonians
    came to be imitators. ''Became'' is natural English and reflects the ingressive
    sense.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Here it refers to Jesus
    and functions as a christological title.
- source_word: δεξάμενοι
  chosen: having received
  alternatives:
  - welcoming
  - accepting
  lexicon: BDAG
  rationale: The participle is aorist middle and is best represented as attendant
    circumstance or means, explaining how they became imitators. 'Having received'
    preserves the verbal aspect and avoids over-paraphrase.
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: λόγος here refers to the proclaimed gospel message. 'The word' preserves
    Pauline diction and allows readers to hear the intertextual resonance of apostolic
    proclamation; 'the message' is a viable interpretive alternative.
- source_word: ἐν θλίψει πολλῇ
  chosen: in much affliction
  alternatives:
  - in great tribulation
  - amid severe suffering
  lexicon: BDAG
  rationale: θλῖψις denotes trouble, oppression, or affliction. 'Affliction' is a
    clear modern rendering that preserves the pressure/suffering sense without importing
    eschatological overtones that 'tribulation' may carry.
- source_word: μετὰ χαρᾶς
  chosen: with joy
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase; no expansion
    is needed.
- source_word: πνεύματος ἁγίου
  chosen: from the Holy Spirit
  alternatives:
  - of the Holy Spirit
  - produced by the Holy Spirit
  lexicon: BDAG
  rationale: The genitive after χαρά can be read as source or attribution. 'From the
    Holy Spirit' makes explicit the likely source nuance in idiomatic English while
    preserving the theological sense that this joy is Spirit-given.
