theological_decisions:
- issue: Genitive relation in 'joy of/from the Holy Spirit'
  chosen_reading: 'source genitive: joy from the Holy Spirit'
  alternative_readings:
  - 'attributive genitive: Holy-Spirit joy'
  - 'subjective sense: joy produced by the Holy Spirit'
  rationale: The context contrasts severe affliction with a joy that is not naturally
    explained by circumstances. Rendering the phrase as source-oriented best captures
    Paul's likely meaning without over-specifying beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; render
    one in main text and preserve alternatives where ambiguity is genuine.
