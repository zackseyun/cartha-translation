id: 1TH.1.7
reference: 1 Thessalonians 1:7
source:
  edition: SBLGNT
  text: ὥστε γενέσθαι ὑμᾶς ⸀τύπον πᾶσιν τοῖς πιστεύουσιν ἐν τῇ Μακεδονίᾳ καὶ ⸀ἐν τῇ
    Ἀχαΐᾳ.
translation:
  text: so that you became an example to all the believers in Macedonia and in Achaia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a model" or "a pattern."
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - therefore
  lexicon: BDAG
  rationale: Introduces the result of the Thessalonians' reception of the word and
    imitation in the previous verse. 'So that' is natural English and preserves the
    consecutive force.
- source_word: γενέσθαι
  chosen: became
  alternatives:
  - to become
  - came to be
  lexicon: BDAG
  rationale: The aorist middle infinitive after ὥστε expresses result. In idiomatic
    English, finite 'you became' best conveys the sense without awkwardness.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object/subject of the infinitival construction, naturally rendered
    as 'you' in English.
- source_word: τύπον
  chosen: an example
  alternatives:
  - a model
  - a pattern
  lexicon: BDAG
  rationale: τύπος here refers to an exemplary pattern for others to follow. 'Example'
    is the clearest modern English rendering; 'model' and 'pattern' are possible but
    less natural in this context.
- source_word: πᾶσιν τοῖς πιστεύουσιν
  chosen: to all the believers
  alternatives:
  - to all who believe
  - for all the believers
  lexicon: BDAG
  rationale: The participle πιστεύουσιν functions substantivally. 'Believers' is concise
    and idiomatic, while preserving the sense of those who are believing. 'To' reflects
    the dative with τύπον as the group for whom they served as an example.
- source_word: ἐν τῇ Μακεδονίᾳ
  chosen: in Macedonia
  lexicon: BDAG
  rationale: Straightforward locative phrase naming the Roman province/region.
- source_word: καὶ ἐν τῇ Ἀχαΐᾳ
  chosen: and in Achaia
  lexicon: BDAG
  rationale: Coordinates a second geographic region. Repeating 'in' reflects the Greek
    and keeps the parallel structure.
