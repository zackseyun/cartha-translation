id: 1TH.1.10
reference: 1 Thessalonians 1:10
source:
  edition: SBLGNT
  text: καὶ ἀναμένειν τὸν υἱὸν αὐτοῦ ἐκ τῶν οὐρανῶν, ὃν ἤγειρεν ἐκ τῶν νεκρῶν, Ἰησοῦν
    τὸν ῥυόμενον ἡμᾶς ⸀ἐκ τῆς ὀργῆς τῆς ἐρχομένης.
translation:
  text: and to wait for his Son from heaven, whom he raised from the dead—Jesus, who
    rescues us from the coming wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who delivers us from the wrath to come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναμένειν
  chosen: to wait for
  alternatives:
  - to await
  - to expect
  lexicon: BDAG
  rationale: The infinitive continues the content of the Thessalonians' turning to
    God in v. 9. 'Wait for' is natural modern English and preserves the sense of expectant
    waiting better than the more formal 'await.'
- source_word: υἱὸν αὐτοῦ
  chosen: his Son
  lexicon: BDAG
  rationale: A direct, formal rendering that preserves the filial christological title
    without expansion.
- source_word: ἐκ τῶν οὐρανῶν
  chosen: from heaven
  alternatives:
  - out of the heavens
  - from the heavens
  lexicon: BDAG
  rationale: Although the Greek is plural, idiomatic English normally uses the singular
    'heaven' in this sense. This preserves meaning without awkwardness.
- source_word: ὃν ἤγειρεν ἐκ τῶν νεκρῶν
  chosen: whom he raised from the dead
  alternatives:
  - whom he raised from among the dead
  lexicon: BDAG
  rationale: Standard resurrection language in English. 'From the dead' is idiomatic
    and accurately conveys ἐκ τῶν νεκρῶν.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: τὸν ῥυόμενον
  chosen: who rescues
  alternatives:
  - the one rescuing
  - who delivers
  lexicon: BDAG
  rationale: The present participle is rendered with a relative clause for natural
    English. 'Rescues' preserves the active sense of deliverance; 'delivers' is possible
    but can sound more traditional than contemporary.
- source_word: ἐκ τῆς ὀργῆς
  chosen: from ... wrath
  alternatives:
  - from ... judgment
  - out of ... wrath
  lexicon: BDAG
  rationale: ὀργή is more specifically 'wrath' than the broader 'judgment.' 'From'
    fits the preposition ἐκ naturally in English.
- source_word: τῆς ἐρχομένης
  chosen: the coming
  alternatives:
  - that is coming
  - to come
  lexicon: BDAG
  rationale: The attributive participle denotes wrath that is coming/approaching.
    'The coming wrath' is concise, idiomatic, and preserves the eschatological force.
