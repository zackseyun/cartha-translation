theological_decisions:
- issue: Nature of 'the coming wrath'
  chosen_reading: Retain the phrase 'the coming wrath' without specifying whether
    it refers to final judgment, eschatological tribulation, or God's wrath more generally.
  alternative_readings:
  - the coming judgment
  - the wrath to come interpreted specifically as end-time tribulation
  - the wrath to come interpreted specifically as final condemnation
  rationale: The Greek phrase is theologically weighty but not narrowly defined in
    the verse itself. To preserve theological tension and avoid importing a denominational
    eschatological scheme, the translation keeps the more literal 'wrath' language.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the present participle ῥυόμενον
  chosen_reading: Render as 'who rescues us' rather than a more temporally specific
    'who will rescue us.'
  alternative_readings:
  - who will rescue us
  - who is rescuing us
  rationale: The present participle can characterize Jesus as the rescuer without
    requiring an explicit future tense in English. Because the object is 'the coming
    wrath,' the context is future-oriented, but the Greek wording presents this as
    part of Jesus' identity and action rather than only a future event.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
