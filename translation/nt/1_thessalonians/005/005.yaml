theological_decisions:
- issue: Gendered familial metaphor in υἱοὶ φωτός / υἱοὶ ἡμέρας
  chosen_reading: sons of light and sons of day
  alternative_readings:
  - children of light and children of day
  rationale: The Greek uses the masculine plural υἱοί, an idiomatic expression for
    those characterized by or belonging to something. In keeping with the stated gender-accurate
    philosophy, the main text preserves 'sons' rather than neutralizing to 'children,'
    while a footnote can clarify representative force for modern readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
- issue: Person shift from second person to first person plural
  chosen_reading: For you are all ... We are not ...
  alternative_readings:
  - For you are all ... you are not ...
  rationale: The Greek text intentionally moves from addressing the Thessalonians
    directly to including Paul and his companions with them. Preserving the shift
    avoids smoothing out a meaningful rhetorical feature.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 (Original-language primacy
    over translation tradition)
