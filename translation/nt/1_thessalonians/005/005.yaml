id: 1TH.5.5
reference: 1 Thessalonians 5:5
source:
  edition: SBLGNT
  text: πάντες ⸀γὰρ ὑμεῖς υἱοὶ φωτός ἐστε καὶ υἱοὶ ἡμέρας. οὐκ ἐσμὲν νυκτὸς οὐδὲ σκότους·
translation:
  text: For you are all sons of light and sons of day. We are not of night or of darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of light and children of day.' The Greek literally says 'sons,'
      an idiom for those characterized by or belonging to light and day.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  chosen: all
  alternatives:
  - every one of you
  lexicon: BDAG
  rationale: Placed with 'you' as 'you are all' to reflect the emphatic inclusive
    force of the nominative plural adjective without sounding wooden.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connective linking this statement to the preceding
    argument. 'For' is natural and sufficiently transparent in English.
- source_word: υἱοὶ
  chosen: sons
  alternatives:
  - children
  - people
  lexicon: BDAG
  rationale: Rendered 'sons' rather than 'children' because the Greek explicitly uses
    υἱοί, and the translation philosophy prefers gender-accurate renderings where
    the source uses masculine forms with representative force. The idiom 'sons of
    light/day' expresses belonging or characterized-by relationship.
- source_word: φωτός
  chosen: light
  lexicon: BDAG
  rationale: A straightforward genitive after 'sons,' preserving the metaphor of moral/spiritual
    belonging and contrast with darkness.
- source_word: ἡμέρας
  chosen: day
  lexicon: BDAG
  rationale: Kept as 'day' to preserve the paired metaphor with 'light' and the contrast
    with 'night.'
- source_word: οὐκ ἐσμὲν
  chosen: We are not
  alternatives:
  - you are not
  lexicon: BDAG
  rationale: The Greek shifts from second person ('you are') to first person plural
    ('we are'), likely including Paul with the Thessalonian believers. The shift should
    be preserved rather than harmonized.
- source_word: νυκτός
  chosen: of night
  alternatives:
  - belonging to the night
  - of the night
  lexicon: BDAG
  rationale: The genitive parallels the earlier 'sons of light/day' construction and
    denotes sphere or belonging. 'Of night' is concise and preserves the metaphor.
- source_word: σκότους
  chosen: darkness
  lexicon: BDAG
  rationale: Maintains the moral/spiritual contrast central to the passage and pairs
    naturally with 'night.'
