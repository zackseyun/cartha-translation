theological_decisions:
- issue: Inclusive force of ἀδελφοί in congregational address
  chosen_reading: Render as 'brothers' in the main text, preserving the likely mixed-gender
    audience in a footnote.
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The translation philosophy requires gender-accurate rendering rather
    than replacing masculine forms with gender-neutral language in the main text.
    Because Paul is almost certainly addressing the whole church, the inclusive sense
    should be documented in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
