id: 1TH.5.15
reference: 1 Thessalonians 5:15
source:
  edition: SBLGNT
  text: ὁρᾶτε μή τις κακὸν ἀντὶ κακοῦ τινι ἀποδῷ, ἀλλὰ πάντοτε τὸ ἀγαθὸν ⸀διώκετε
    εἰς ἀλλήλους καὶ εἰς πάντας.
translation:
  text: See to it that no one repays evil for evil to anyone, but always pursue what
    is good toward one another and toward all people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest anyone repay evil for evil to anyone.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'one another ... all people' likely moves from fellow believers
      to everyone more broadly.
    reason: cross_reference
lexical_decisions:
- source_word: ὁρᾶτε
  chosen: See to it
  alternatives:
  - Watch out
  - Take care
  lexicon: BDAG
  rationale: Imperative plural from ὁράω functions idiomatically as an exhortation
    to be vigilant or take care, not merely literal seeing. 'See to it' is natural
    English that preserves the force of communal responsibility.
- source_word: μή τις
  chosen: that no one
  alternatives:
  - lest anyone
  lexicon: BDAG
  rationale: With ὁρᾶτε, μή τις introduces the content to be guarded against. 'That
    no one' is clearer in modern English than the more formal 'lest anyone' while
    preserving the prohibitive sense.
- source_word: κακὸν ἀντὶ κακοῦ
  chosen: evil for evil
  alternatives:
  - wrong for wrong
  - harm for harm
  lexicon: BDAG
  rationale: This is a standard retaliation formula. 'Evil for evil' preserves the
    lexical repetition and moral breadth of κακός better than narrower options like
    'harm' or 'wrong.'
- source_word: τινι
  chosen: to anyone
  alternatives:
  - to someone
  lexicon: BDAG
  rationale: The dative indefinite pronoun marks the recipient of repayment. 'To anyone'
    fits the broad ethical scope of the exhortation.
- source_word: ἀποδῷ
  chosen: repays
  alternatives:
  - returns
  - pays back
  lexicon: BDAG
  rationale: Aorist subjunctive after μή τις in a preventative clause. 'Repays' best
    matches the sense of rendering back in response to prior action and fits the retaliation
    context.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - at all times
  lexicon: BDAG
  rationale: Straightforward temporal adverb; 'always' is the most natural equivalent.
- source_word: τὸ ἀγαθὸν
  chosen: what is good
  alternatives:
  - the good
  - good
  lexicon: BDAG
  rationale: The article with the adjective substantivizes it. 'What is good' is idiomatic
    English and preserves the moral category without sounding abstract or stilted.
- source_word: διώκετε
  chosen: pursue
  alternatives:
  - seek after
  - strive for
  lexicon: BDAG
  rationale: διώκω here carries the active sense of earnestly pursuing or striving
    after, not merely preferring. 'Pursue' preserves the energetic imperative force.
- source_word: εἰς ἀλλήλους
  chosen: toward one another
  alternatives:
  - for one another
  - with one another
  lexicon: BDAG
  rationale: εἰς here expresses direction of action or orientation. 'Toward one another'
    captures the relational direction of doing good within the believing community.
- source_word: καὶ εἰς πάντας
  chosen: and toward all people
  alternatives:
  - and toward everyone
  - and toward all
  lexicon: BDAG
  rationale: πάντας is broad and likely extends beyond the church community. 'All
    people' makes the universal scope explicit in natural English.
