theological_decisions:
- issue: Scope of Christian ethical obligation
  chosen_reading: The verse distinguishes mutual conduct within the community ('one
    another') and conduct extending beyond it ('all people').
  alternative_readings:
  - '''all'' refers only to all believers'
  rationale: The paired phrases εἰς ἀλλήλους καὶ εἰς πάντας naturally move from the
    internal circle to a wider group. The translation preserves this widening scope
    without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
