id: 1TH.5.24
reference: 1 Thessalonians 5:24
source:
  edition: SBLGNT
  text: πιστὸς ὁ καλῶν ὑμᾶς, ὃς καὶ ποιήσει.
translation:
  text: Faithful is the one who calls you, who also will do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Trustworthy is the one who calls you; he also will accomplish it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστὸς
  chosen: Faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: Predicate adjective describing the subject's reliability and dependability.
    'Faithful' is the standard and most theologically resonant rendering in this context,
    while 'trustworthy' is possible but less idiomatic here.
- source_word: ὁ καλῶν
  chosen: the one who calls
  alternatives:
  - he who calls
  - the one calling
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to God as the ongoing caller. 'The one who calls' preserves the participial force
    in natural English better than the more wooden 'the one calling.'
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object. English 'you' does not mark number, but
    the plural is clear from context in the letter's address to the community.
- source_word: ὃς
  chosen: who
  alternatives:
  - and he
  lexicon: BDAG
  rationale: Relative pronoun linking the second clause to 'the one who calls you.'
    'Who' preserves the Greek syntax more directly than restructuring with 'and he.'
- source_word: καὶ
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: BDAG
  rationale: 'Here καί adds emphasis/continuity: the one who calls is also the one
    who will act. ''Also'' is the most straightforward rendering.'
- source_word: ποιήσει
  chosen: will do it
  alternatives:
  - will accomplish it
  - will bring it about
  lexicon: BDAG
  rationale: 'Future active indicative of ποιέω. The verb is broad (''do, make, accomplish'').
    Because the immediate context concerns sanctification and preservation (v. 23),
    English idiom favors supplying the understood object as ''it'': ''will do it.''
    ''Will accomplish it'' is interpretive and slightly more expansive.'
