theological_decisions:
- issue: Implied object of ποιήσει
  chosen_reading: The clause refers to God carrying out what Paul has just prayed
    for in v. 23, rendered idiomatically as 'will do it.'
  alternative_readings:
  - will accomplish this
  - will bring it about
  rationale: The Greek leaves the object unstated, but English normally requires one.
    Given the immediate context, the implied referent is God's fulfillment of the
    sanctifying/preserving work just mentioned. 'Will do it' preserves the brevity
    and force of the Greek without over-specifying the mechanism.
  doctrine_reference: Translation philosophy §1, §3, §6
