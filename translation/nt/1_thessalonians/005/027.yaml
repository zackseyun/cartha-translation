theological_decisions:
- issue: Rendering of ἀδελφοῖς in a likely mixed-gender congregational context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The Greek uses the masculine plural ἀδελφοῖς. In Paul's letters this
    often includes women, but the translation philosophy requires gender-accurate
    rendering in the main text rather than resolving to an inclusive paraphrase. The
    likely representative force is preserved by a footnote.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
