id: 1TH.5.27
reference: 1 Thessalonians 5:27
source:
  edition: SBLGNT
  text: ⸀ἐνορκίζω ὑμᾶς τὸν κύριον ἀναγνωσθῆναι τὴν ἐπιστολὴν πᾶσιν ⸀τοῖς ἀδελφοῖς.
translation:
  text: I put you under oath before the Lord to have this letter read to all the brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the Lord.' The Greek expression can mean that Paul solemnly charges
      them with the Lord as the invoked authority.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' likely refers to the whole congregation, including women;
      Greek ἀδελφοῖς is masculine plural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνορκίζω
  chosen: I put you under oath
  alternatives:
  - I charge you solemnly
  - I adjure you
  lexicon: BDAG
  rationale: The verb denotes placing someone under oath or solemnly binding them.
    'I put you under oath' preserves the force more transparently than the traditional
    but less common 'I adjure you,' while remaining closer to the Greek than the somewhat
    broader 'I charge you solemnly.'
- source_word: τὸν κύριον
  chosen: before the Lord
  alternatives:
  - by the Lord
  lexicon: BDAG
  rationale: With ἐνορκίζω, the accusative can express the one by whom the oath is
    imposed ('by the Lord'). In idiomatic English, 'before the Lord' communicates
    solemn invocation of the Lord as witness/authority without sounding awkward. 'Lord'
    follows the doctrine's default rendering for κύριος.
- source_word: ἀναγνωσθῆναι
  chosen: to have ... read
  alternatives:
  - to read
  - that ... be read aloud
  lexicon: BDAG
  rationale: The aorist passive infinitive means 'to be read,' and in context refers
    to public reading of the letter. 'To have this letter read' captures the passive
    sense in natural English and implies the intended public action. The alternative
    'be read aloud' is interpretively explicit but likely reflects the normal sense
    of letter reading in assembly.
- source_word: τὴν ἐπιστολήν
  chosen: this letter
  alternatives:
  - the letter
  - this epistle
  lexicon: BDAG
  rationale: Paul refers to the present document. 'This letter' is natural modern
    English and reflects the deictic sense implied by context, even though the article
    alone is used in Greek. 'Epistle' is accurate but less readable for the target
    audience.
- source_word: πᾶσιν τοῖς ἀδελφοῖς
  chosen: to all the brothers
  alternatives:
  - to all the brothers and sisters
  - to all the believers
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and in Pauline usage often
    addresses the whole Christian community. Per doctrine, gender-accurate rendering
    is preferred over gender-neutral; therefore 'brothers' is retained in the main
    text, with inclusivity relevance preserved in a footnote.
