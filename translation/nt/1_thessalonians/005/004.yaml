theological_decisions:
- issue: Gendered address ἀδελφοί in a mixed congregation
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: Following the stated gender-accurate philosophy, the masculine vocative
    is retained in the main text rather than replaced with an inclusive paraphrase.
    Because the address likely includes the whole congregation, the inclusive sense
    is worth preserving in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Eschatological reference of ἡ ἡμέρα
  chosen_reading: the day
  alternative_readings:
  - that day
  - the Day of the Lord
  rationale: The immediate context identifies the referent, but the Greek here says
    simply 'the day.' The translation avoids importing the fuller phrase into the
    main text while allowing contextual clarification by footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
