id: 1TH.5.4
reference: 1 Thessalonians 5:4
source:
  edition: SBLGNT
  text: ὑμεῖς δέ, ἀδελφοί, οὐκ ἐστὲ ἐν σκότει, ἵνα ἡ ἡμέρα ὑμᾶς ὡς ⸀κλέπτης καταλάβῃ,
translation:
  text: But you, brothers, are not in darkness, so that the day would overtake you
    like a thief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, with inclusive sense, 'brothers and sisters.'
    reason: lexical_alternative
  - marker: b
    text: That is, the day of the Lord in the immediate context.
    reason: cross_reference
lexical_decisions:
- source_word: ὑμεῖς δέ
  chosen: But you
  alternatives:
  - But as for you
  - But you yourselves
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding description of others; the explicit
    pronoun ὑμεῖς is emphatic, so 'But you' preserves both contrast and emphasis without
    sounding wooden.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The vocative plural literally means 'brothers.' Per the gender-accurate
    philosophy, the masculine form is retained in the main text, while the representative/mixed-gender
    sense can be noted in a footnote.
- source_word: ἐν σκότει
  chosen: in darkness
  alternatives:
  - in the dark
  lexicon: BDAG
  rationale: The phrase is metaphorical for moral/spiritual unawareness in context,
    but 'in darkness' preserves the image and theological resonance better than the
    more idiomatic 'in the dark.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - with the result that
  - that
  lexicon: BDAG
  rationale: 'Here ἵνα introduces the intended/resulting circumstance: they are not
    in darkness such that the day should catch them unawares. ''So that'' preserves
    the Greek linkage without overinterpreting whether the nuance is purpose or result.'
- source_word: ἡ ἡμέρα
  chosen: the day
  alternatives:
  - that day
  - the Day
  lexicon: BDAG
  rationale: The article marks a specific eschatological day already in view from
    context. 'The day' is a natural rendering and leaves the referent to context;
    capitalization is interpretive and therefore avoided in the main text.
- source_word: ὡς κλέπτης
  chosen: like a thief
  alternatives:
  - as a thief
  lexicon: BDAG
  rationale: ὡς naturally introduces comparison. 'Like a thief' is idiomatic modern
    English and preserves the simile.
- source_word: καταλάβῃ
  chosen: would overtake
  alternatives:
  - might overtake
  - would seize
  - would catch by surprise
  lexicon: BDAG
  rationale: καταλαμβάνω here carries the sense of catching up to or overtaking unexpectedly.
    'Would overtake' preserves the metaphor and fits the image of the day arriving
    suddenly; 'catch by surprise' is interpretive and therefore kept as an alternative
    rather than the main text.
