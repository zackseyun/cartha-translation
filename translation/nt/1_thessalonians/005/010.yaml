theological_decisions:
- issue: Meaning of 'awake or asleep' in context
  chosen_reading: Refers primarily to being alive or dead, not to moral vigilance
    versus spiritual lethargy.
  alternative_readings:
  - Refers to ethical watchfulness versus carelessness, continuing the exhortation
    of 5:6–7.
  rationale: Although γρηγορέω/καθεύδω can carry ethical overtones in the immediate
    context, Paul's wording here most naturally echoes 4:13–15, where 'sleep' is a
    metaphor for believers who have died. The statement that Christ died so that whether
    believers are 'awake or asleep' they may live with him fits the alive/dead contrast
    especially well. The English keeps the metaphor rather than resolving it in the
    main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
