id: 1TH.5.9
reference: 1 Thessalonians 5:9
source:
  edition: SBLGNT
  text: ὅτι οὐκ ἔθετο ἡμᾶς ὁ θεὸς εἰς ὀργὴν ἀλλὰ εἰς περιποίησιν σωτηρίας διὰ τοῦ
    κυρίου ἡμῶν Ἰησοῦ Χριστοῦ,
translation:
  text: For God did not appoint us for wrath, but for obtaining salvation through
    our Lord Jesus Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for possession of salvation,' 'for acquiring salvation,' or possibly
      'for preservation unto salvation'; the Greek noun περιποίησις has a broader
      range than the English 'obtaining.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''through our Lord Jesus Christ.'' The Greek title Χριστός
      is rendered ''Messiah'' here to preserve its meaning.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context, ὅτι introduces the ground for the preceding exhortation,
    so 'For' gives natural English discourse flow while preserving the causal sense.
- source_word: ἔθετο
  chosen: did not appoint
  alternatives:
  - did not set
  - did not destine
  lexicon: BDAG
  rationale: τίθημι here means to place or appoint with reference to an outcome. 'Appoint'
    fits the idiom with εἰς + accusative and avoids importing stronger predestinarian
    language than the verse itself requires.
- source_word: εἰς ὀργὴν
  chosen: for wrath
  alternatives:
  - for anger
  - for judgment
  lexicon: BDAG
  rationale: ὀργή in Pauline eschatological contexts commonly denotes divine wrath.
    'Wrath' is the most direct and theologically weighty rendering; 'judgment' is
    interpretive and broader than the lexical sense.
- source_word: περιποίησιν
  chosen: obtaining
  alternatives:
  - acquiring
  - possession
  - preservation
  lexicon: BDAG
  rationale: περιποίησις can denote acquisition, gaining, possession, or preservation
    depending on context. In the phrase εἰς περιποίησιν σωτηρίας, 'obtaining salvation'
    is idiomatic English and fits the contrast with 'for wrath' as the intended outcome.
    The noun's broader semantic range is preserved in a footnote.
- source_word: σωτηρίας
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: σωτηρία in Paul regularly carries the theological sense 'salvation,'
    though 'deliverance' is a possible gloss. 'Salvation' best matches the soteriological
    context and established Pauline usage.
- source_word: διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  chosen: through our Lord Jesus Messiah
  alternatives:
  - through our Lord Jesus Christ
  lexicon: BDAG
  rationale: διά with the genitive indicates means or agency, hence 'through.' κύριος
    is rendered 'Lord' per doctrine defaults. Χριστός is a title here rather than
    a fixed surname-like form, so 'Messiah' follows the project's stated preference,
    while the traditional 'Christ' is preserved as an alternative.
