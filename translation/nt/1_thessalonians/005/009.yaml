theological_decisions:
- issue: Whether ἔθετο should be rendered with stronger predestinarian force
  chosen_reading: did not appoint us for wrath
  alternative_readings:
  - did not destine us for wrath
  rationale: The verse states God's purpose or appointment regarding believers' end,
    but the wording does not require a more systematized doctrinal formulation about
    predestination. 'Appoint' preserves the text's claim without over-resolving denominational
    debates.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering Χριστοῦ as title or name-like form
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine guidance prefers translating Christological titles where
    context supports it. Here Χριστοῦ follows the personal name Ἰησοῦ but still functions
    as a title with theological meaning, so 'Messiah' is preferred while the traditional
    form is preserved in a footnote.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
