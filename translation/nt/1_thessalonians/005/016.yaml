id: 1TH.5.16
reference: 1 Thessalonians 5:16
source:
  edition: SBLGNT
  text: πάντοτε χαίρετε,
translation:
  text: Always rejoice,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Keep rejoicing always.' The present imperative can emphasize ongoing
      action.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντοτε
  chosen: Always
  alternatives:
  - continually
  - at all times
  lexicon: BDAG
  rationale: The adverb denotes constancy or all-times frequency. 'Always' is the
    most natural concise English equivalent and preserves the absolute force without
    sounding awkward.
- source_word: χαίρετε
  chosen: rejoice
  alternatives:
  - be glad
  - keep rejoicing
  lexicon: BDAG
  rationale: Second person plural present active imperative of χαίρω. 'Rejoice' preserves
    the imperative force and the verbal connection to joy. 'Be glad' is possible but
    weaker and less idiomatic in exhortation. 'Keep rejoicing' brings out the present
    imperative's ongoing aspect, but English usually leaves that implicit; 'Always
    rejoice' adequately conveys the durative sense in context.
