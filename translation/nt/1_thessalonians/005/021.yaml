theological_decisions:
- issue: Scope of πάντα in relation to prophecy/discernment context
  chosen_reading: Rendered comprehensively as 'everything' while allowing the immediate
    context to guide application, especially the testing of prophetic utterances.
  alternative_readings:
  - all prophecies
  - all things said
  rationale: Although the immediate context includes prophecy (v. 20), the Greek text
    itself uses the broad term πάντα without an explicit limiting noun. The translation
    preserves that breadth rather than narrowing the command interpretively.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
