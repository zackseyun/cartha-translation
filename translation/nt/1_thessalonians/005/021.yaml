id: 1TH.5.21
reference: 1 Thessalonians 5:21
source:
  edition: SBLGNT
  text: πάντα δὲ δοκιμάζετε, τὸ καλὸν κατέχετε,
translation:
  text: But test everything; hold fast to what is good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all things.' In context, this especially includes evaluating prophetic
      utterances.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  lexicon: BDAG
  rationale: The neuter plural accusative is naturally rendered comprehensively. 'Everything'
    is idiomatic modern English and preserves the broad scope better than the more
    wooden 'all things.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the preceding prohibitions/instructions.
    'But' best captures the adversative nuance in context, though it is not strongly
    contrastive.
- source_word: δοκιμάζετε
  chosen: test
  alternatives:
  - examine
  - prove
  - discern after testing
  lexicon: BDAG
  rationale: The present active imperative calls for ongoing evaluative testing. 'Test'
    is concise, natural, and preserves the sense of examining something to determine
    its genuineness or worth.
- source_word: τὸ καλὸν
  chosen: what is good
  alternatives:
  - the good
  - what is excellent
  - what is right
  lexicon: BDAG
  rationale: The article with the neuter singular adjective functions substantivally.
    'What is good' is the most natural English equivalent and avoids sounding abstract
    or philosophical in a way 'the good' might.
- source_word: κατέχετε
  chosen: hold fast to
  alternatives:
  - hold on to
  - retain
  - keep
  lexicon: BDAG
  rationale: The imperative here conveys firm adherence or retention after discernment.
    'Hold fast to' communicates active, continuing commitment better than the flatter
    'keep' or 'retain.'
