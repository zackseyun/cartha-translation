id: 1TH.5.26
reference: 1 Thessalonians 5:26
source:
  edition: SBLGNT
  text: ἀσπάσασθε τοὺς ἀδελφοὺς πάντας ἐν φιλήματι ἁγίῳ.
translation:
  text: Greet all the brothers with a holy kiss.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the brothers and sisters,' since 'brothers' may refer to the whole
      believing community.
    reason: lexical_alternative
  - marker: b
    text: The 'holy kiss' was a culturally recognized sign of Christian fellowship
      and affection.
    reason: cultural_note
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Aorist middle imperative, second person plural, functioning as a direct
    exhortation. 'Greet' is the most natural concise English imperative and matches
    the social sense of ἀσπάζομαι without unnecessary expansion.
- source_word: ἀδελφοὺς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Although the referent may include the whole believing community, the
    Greek uses the masculine plural ἀδελφοί. Per the doctrine's gender-accurate principle,
    the main text keeps 'brothers,' while an inclusive alternative is preserved in
    a footnote because the context likely addresses the congregation broadly.
- source_word: πάντας
  chosen: all
  alternatives:
  - every one of
  lexicon: BDAG
  rationale: Placed attributively with τοὺς ἀδελφούς, it emphasizes the entirety of
    the group. 'All' is the most natural and sufficiently precise rendering.
- source_word: ἐν φιλήματι ἁγίῳ
  chosen: with a holy kiss
  alternatives:
  - with a sacred kiss
  - with a kiss of holiness
  lexicon: BDAG
  rationale: The preposition ἐν here expresses accompanying means or manner. English
    idiom prefers 'with' rather than a wooden 'in.' φίλημα is specifically 'kiss,'
    and ἅγιος marks it as consecrated/pure within Christian fellowship; 'holy kiss'
    preserves the established and accurate sense.
