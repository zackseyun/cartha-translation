theological_decisions:
- issue: Gendered address of ἀδελφοί in a congregational context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek form is grammatically masculine plural. In line with the translation
    philosophy, the main text remains gender-accurate rather than flattening the form
    to a neutral expression. Because the social referent may well include the whole
    church, the inclusive sense is preserved in a footnote rather than moved into
    the main text.
