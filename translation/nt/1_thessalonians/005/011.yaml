id: 1TH.5.11
reference: 1 Thessalonians 5:11
source:
  edition: SBLGNT
  text: διὸ παρακαλεῖτε ἀλλήλους καὶ οἰκοδομεῖτε εἷς τὸν ἕνα, καθὼς καὶ ποιεῖτε.
translation:
  text: Therefore encourage one another and build up one another, just as you are
    also doing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'exhort one another'; παρακαλεῖτε can carry either encouraging or urging
      force in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument; 'Therefore' is natural
    English and preserves the logical connection.
- source_word: παρακαλεῖτε
  chosen: encourage
  alternatives:
  - exhort
  - comfort
  lexicon: BDAG
  rationale: παρακαλέω can mean exhort, encourage, or comfort depending on context.
    In this paraenetic setting, with mutual strengthening in view, 'encourage' best
    captures the broad sense without sounding overly harsh ('exhort') or too narrow
    ('comfort').
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering in English; fits the mutual action commanded.
- source_word: οἰκοδομεῖτε
  chosen: build up
  alternatives:
  - edify
  - strengthen
  lexicon: BDAG
  rationale: Retains the metaphor of construction while using readable modern English.
    'Edify' is traditional but less accessible; 'strengthen' loses the metaphor present
    in the Greek.
- source_word: εἷς τὸν ἕνα
  chosen: one another
  alternatives:
  - each the other
  - one the one
  lexicon: BDAG
  rationale: This idiom intensifies the reciprocal sense. English normally renders
    it idiomatically as 'one another' rather than literally. Repeating 'one another'
    after οἰκοδομεῖτε preserves the Greek emphasis on mutuality better than omitting
    it.
- source_word: καθὼς καὶ ποιεῖτε
  chosen: just as you are also doing
  alternatives:
  - as indeed you do
  - just as you do
  lexicon: BDAG
  rationale: καθώς introduces comparison, καί adds the sense 'also/indeed,' and the
    present indicative points to their current practice. 'Just as you are also doing'
    preserves both the commendation and ongoing aspect in natural English.
