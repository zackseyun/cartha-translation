- issue: Rendering Χριστῷ as title or traditional transliteration
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrine excerpt directs that Χριστός be translated as 'Messiah'
    where it functions as a title, preserving the Hebraic messianic sense. In this
    Pauline formula the title remains meaningful, so the main text uses 'Messiah Jesus,'
    while the traditional 'Christ Jesus' is preserved as an alternative.
