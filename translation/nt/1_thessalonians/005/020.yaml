theological_decisions:
- issue: Meaning of 'prophecies' in an early Christian congregational context
  chosen_reading: Retain the broad term 'prophecies' without narrowing it to a specific
    mechanism or later doctrinal category.
  alternative_readings:
  - prophetic utterances
  - messages claimed to be from God
  rationale: The verse warns against contempt for prophetic speech in the church,
    but the Greek term itself should be translated directly rather than interpreted
    through a particular cessationist or continuationist framework. This preserves
    theological tension and avoids importing denominational conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it.
