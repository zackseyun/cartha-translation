id: 1TH.5.20
reference: 1 Thessalonians 5:20
source:
  edition: SBLGNT
  text: προφητείας μὴ ἐξουθενεῖτε·
translation:
  text: Do not despise prophecies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prophetic utterances.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προφητείας
  chosen: prophecies
  alternatives:
  - prophetic utterances
  - prophecy
  lexicon: BDAG
  rationale: Accusative plural of προφητεία, referring to instances or expressions
    of prophecy rather than the abstract concept alone. 'Prophecies' is natural modern
    English and preserves the plural form. 'Prophetic utterances' is more explicit
    but less concise; singular 'prophecy' would flatten the Greek plural.
- source_word: μὴ
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: BDAG
  rationale: Standard negation with the present imperative, naturally rendered 'Do
    not' in English. Stronger English options like 'Never' overstate the form.
- source_word: ἐξουθενεῖτε
  chosen: despise
  alternatives:
  - treat with contempt
  - look down on
  - reject
  lexicon: BDAG
  rationale: Second person plural present active imperative meaning to regard as nothing,
    disdain, or treat with contempt. 'Despise' is concise and strong, matching the
    semantic force well. 'Reject' is possible but narrower, since the verb includes
    contemptuous disregard, not merely refusal.
