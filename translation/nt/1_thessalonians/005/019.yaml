theological_decisions:
- issue: Referent of πνεῦμα
  chosen_reading: the Holy Spirit
  alternative_readings:
  - human spirit
  - spiritual fervor/gift
  rationale: The verse could be read more generically, but in this context Paul's
    following warning not to despise prophecies strongly suggests the activity of
    the Holy Spirit in the congregation. The translation preserves that likely referent
    in the main text while noting the lexical alternative.
