id: 1TH.5.19
reference: 1 Thessalonians 5:19
source:
  edition: SBLGNT
  text: τὸ πνεῦμα μὴ σβέννυτε,
translation:
  text: Do not quench the Spirit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirit.' The Greek term can denote spirit more generally, but here
      it most likely refers to the Holy Spirit, especially in light of the following
      mention of prophecies.
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: With the article and in Pauline paraenesis, πνεῦμα here most naturally
    refers to the Holy Spirit rather than a human disposition. The immediate context
    about prophecy and discernment (vv. 20–21) supports this reading. Capitalization
    in English signals this referent, though the Greek manuscripts themselves do not
    mark capitalization.
- source_word: μὴ
  chosen: Do not
  alternatives:
  - not
  lexicon: BDAG
  rationale: μή with the present imperative regularly forms a prohibition. Idiomatic
    English renders this as 'Do not' rather than a bare 'not'.
- source_word: σβέννυτε
  chosen: quench
  alternatives:
  - extinguish
  - put out
  lexicon: BDAG
  rationale: σβέννυμι literally means to extinguish or put out, especially of fire.
    'Quench' is the established and still natural English metaphor for suppressing
    what is flame-like, fitting the Spirit imagery and preserving the metaphorical
    force without paraphrase.
