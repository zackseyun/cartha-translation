id: 1TH.5.23
reference: 1 Thessalonians 5:23
source:
  edition: SBLGNT
  text: Αὐτὸς δὲ ὁ θεὸς τῆς εἰρήνης ἁγιάσαι ὑμᾶς ὁλοτελεῖς, καὶ ὁλόκληρον ὑμῶν τὸ
    πνεῦμα καὶ ἡ ψυχὴ καὶ τὸ σῶμα ἀμέμπτως ἐν τῇ παρουσίᾳ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
    τηρηθείη.
translation:
  text: Now may the God of peace himself sanctify you completely, and may your whole
    spirit and soul and body be kept blameless at the coming of our Lord Jesus the
    Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, “at the coming of our Lord Jesus Christ.”
    reason: alternative_reading
  - marker: b
    text: Paul’s wording names “spirit and soul and body”; interpreters differ on
      whether this teaches a three-part view of human nature or simply emphasizes
      the whole person.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτὸς
  chosen: himself
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: Intensive use of αὐτός emphasizes God personally as the one acting; 'himself'
    preserves the emphasis naturally in English.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here marks a transition to a benedictory wish/prayer. 'Now' conveys
    the discourse shift smoothly in modern English without overstating contrast.
- source_word: ὁ θεὸς τῆς εἰρήνης
  chosen: the God of peace
  lexicon: BDAG
  rationale: Standard genitival expression meaning the God characterized by or associated
    with peace; this is a well-established Pauline title and is best kept formally.
- source_word: ἁγιάσαι
  chosen: may ... sanctify
  alternatives:
  - may ... make holy
  lexicon: BDAG
  rationale: Aorist optative in a wish-prayer. 'Sanctify' preserves the theological
    and lexical connection to holiness better than the more paraphrastic 'make holy,'
    while remaining understandable.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object plural, referring to the Thessalonian believers collectively.
- source_word: ὁλοτελεῖς
  chosen: completely
  alternatives:
  - entirely
  - through and through
  lexicon: BDAG
  rationale: The adjective conveys completeness/wholeness in sanctification. Rendering
    adverbially in English after 'sanctify' is idiomatic and reflects the sense of
    totality.
- source_word: ὁλόκληρον
  chosen: whole
  alternatives:
  - complete
  - entire
  lexicon: BDAG
  rationale: This term emphasizes wholeness/intactness. 'Whole' is concise and pairs
    naturally with the following triad.
- source_word: τὸ πνεῦμα
  chosen: spirit
  lexicon: BDAG
  rationale: Rendered 'spirit' in keeping with normal NT usage. The verse lists human
    constituents without requiring a technical anthropological system beyond the wording
    itself.
- source_word: ἡ ψυχὴ
  chosen: soul
  alternatives:
  - life
  lexicon: BDAG
  rationale: In this triadic expression, 'soul' is the most natural and traditional
    rendering, preserving the lexical distinction from πνεῦμα and σῶμα.
- source_word: τὸ σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Standard rendering for σῶμα.
- source_word: ἀμέμπτως
  chosen: blameless
  alternatives:
  - without blame
  lexicon: BDAG
  rationale: The adverb modifies the state in which believers are to be kept. English
    idiom prefers the predicate adjective 'be kept blameless' rather than the less
    natural adverbial 'be kept blamelessly.'
- source_word: ἐν τῇ παρουσίᾳ
  chosen: at the coming
  alternatives:
  - at the presence
  - in the coming
  lexicon: BDAG
  rationale: παρουσία in Pauline eschatological contexts commonly denotes the coming/arrival
    of Christ. 'At the coming' is idiomatic and contextually precise.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  chosen: of our Lord Jesus Messiah
  alternatives:
  - of our Lord Jesus Christ
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine defaults. Χριστοῦ is a title here
    and is therefore translated 'Messiah' rather than transliterated 'Christ,' following
    the stated philosophy to translate titles where context supports.
- source_word: τηρηθείη
  chosen: may ... be kept
  alternatives:
  - may ... be preserved
  - may ... be guarded
  lexicon: BDAG
  rationale: Aorist passive optative continuing the prayer-wish. 'Be kept' is natural,
    sufficiently formal, and broad enough to include preservation in an unblemished
    state.
