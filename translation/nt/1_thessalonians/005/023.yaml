theological_decisions:
- issue: Anthropological triad (spirit, soul, body)
  chosen_reading: Retain the threefold expression as written without collapsing terms
    or implying a formal doctrinal endorsement of trichotomy.
  alternative_readings:
  - Interpret the triad rhetorically as a comprehensive way of referring to the whole
    person rather than a technical division of human nature.
  rationale: The Greek explicitly names spirit, soul, and body. The translation should
    preserve that wording and the theological tension, rather than resolve the longstanding
    debate over human constitution. This follows the instruction to preserve theological
    tension rather than resolve it where the text itself does not force a system.
  doctrine_reference: Translation philosophy §3
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Because Χριστός functions as a title here, the default policy is to translate
    it as 'Messiah' rather than leave it transliterated. The traditional alternative
    'Christ' is preserved in a footnote for readers familiar with conventional English
    Bible wording.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
