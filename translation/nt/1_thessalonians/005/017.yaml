theological_decisions:
- issue: Practical force of the command
  chosen_reading: A general exhortation to persistent prayer rather than a literal
    requirement of uninterrupted verbal prayer every moment.
  alternative_readings:
  - A hyper-literal reading requiring nonstop explicit prayer
  rationale: The combination of a present imperative with the adverb ἀδιαλείπτως is
    best understood as urging continual devotion and regular persistence in prayer.
    The translation preserves the wording of the text without importing a narrower
    doctrinal or ascetic interpretation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
