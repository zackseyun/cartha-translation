id: 1TH.5.17
reference: 1 Thessalonians 5:17
source:
  edition: SBLGNT
  text: ἀδιαλείπτως προσεύχεσθε,
translation:
  text: Pray without ceasing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Pray continually' or 'Pray unceasingly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδιαλείπτως
  chosen: without ceasing
  alternatives:
  - constantly
  - unceasingly
  - continually
  lexicon: BDAG
  rationale: The adverb denotes an ongoing, uninterrupted or regularly persistent
    manner. 'Without ceasing' is the established and still natural English rendering
    that best preserves the force of the Greek without overstating it as mathematically
    nonstop every second. Alternatives like 'constantly' or 'continually' are possible
    but slightly more interpretive.
- source_word: προσεύχεσθε
  chosen: Pray
  alternatives:
  - Keep praying
  lexicon: BDAG
  rationale: Present middle/passive imperative, second person plural, calling for
    continued habitual action. English imperative 'Pray' naturally carries the exhortational
    force; the durative aspect is sufficiently conveyed by 'without ceasing.' 'Keep
    praying' is possible but would add emphasis already supplied by the adverb.
