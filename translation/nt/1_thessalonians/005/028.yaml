id: 1TH.5.28
reference: 1 Thessalonians 5:28
source:
  edition: SBLGNT
  text: ἡ χάρις τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ μεθ’ ⸀ὑμῶν.
translation:
  text: The grace of our Lord Jesus Messiah be with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'The grace of our Lord Jesus Christ be with you.'
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  - gracious favor
  lexicon: BDAG
  rationale: χάρις in Pauline benedictions regularly denotes divine grace/favor as
    a theological reality, and 'grace' is the established and most precise English
    equivalent here.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' In this christological
    formula it functions as a title of Jesus and should preserve its theological weight.
- source_word: Ἰησοῦ
  chosen: Jesus
  rationale: Proper name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine default, Χριστός is rendered 'Messiah' where it clearly
    functions as a title rather than a name-like fixed surname. In the phrase 'Jesus
    Messiah,' the titular sense remains transparent and preserves the Hebraic messianic
    meaning.
- source_word: μεθ’ ὑμῶν
  chosen: be with you
  alternatives:
  - with you
  lexicon: BDAG
  rationale: The Greek prepositional phrase literally means 'with you.' English benediction
    style commonly supplies 'be' for naturalness, and the ellipsis is clearly implied
    in the Greek closing blessing.
- source_word: ἡ χάρις τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  chosen: The grace of our Lord Jesus Messiah
  alternatives:
  - May the grace of our Lord Jesus Messiah be with you
  rationale: 'The genitive chain is rendered straightforwardly as possession/source:
    ''the grace of our Lord Jesus Messiah.'' Although English benedictions often add
    ''may,'' the Greek is a verbless wish/blessing formula; supplying only ''be''
    is closer to the source while remaining idiomatic.'
