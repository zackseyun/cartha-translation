id: 1TH.5.2
reference: 1 Thessalonians 5:2
source:
  edition: SBLGNT
  text: αὐτοὶ γὰρ ἀκριβῶς οἴδατε ⸀ὅτι ἡμέρα κυρίου ὡς κλέπτης ἐν νυκτὶ οὕτως ἔρχεται.
translation:
  text: For you yourselves know very well that the day of the Lord comes like a thief
    in the night.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αὐτοὶ
  chosen: you yourselves
  alternatives:
  - you
  - yourselves
  lexicon: BDAG
  rationale: The intensive pronoun adds emphasis to the second person subject already
    contained in οἴδατε. 'You yourselves' preserves that emphasis naturally in English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason or explanation for the preceding statement. 'For'
    is a natural connective here and preserves the explanatory force.
- source_word: ἀκριβῶς
  chosen: very well
  alternatives:
  - accurately
  - exactly
  lexicon: BDAG
  rationale: The adverb denotes precise or exact knowledge. In idiomatic English with
    οἴδατε, 'know very well' communicates the sense more naturally than the stiffer
    'know exactly,' while still preserving the idea of accurate knowledge.
- source_word: οἴδατε
  chosen: know
  alternatives:
  - are aware
  - understand
  lexicon: BDAG
  rationale: οἶδα commonly means 'know.' 'Know' is the most direct and natural rendering
    here.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of what they know; 'that' is the standard English
    complementizer.
- source_word: ἡμέρα κυρίου
  chosen: the day of the Lord
  alternatives:
  - the Lord's day
  lexicon: BDAG
  rationale: This eschatological expression in Pauline usage refers to the day of
    the Lord, not the weekly day of worship. The contested term κύριος is rendered
    by the doctrinal default 'Lord.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per DOCTRINE.md, κύριος defaults to 'Lord.' In this phrase it carries
    established biblical and eschatological significance.
- source_word: ὡς κλέπτης ἐν νυκτί
  chosen: like a thief in the night
  alternatives:
  - as a thief at night
  - like a thief at night
  lexicon: BDAG
  rationale: This is a conventional simile in the NT for unexpected arrival. 'In the
    night' closely follows the Greek and is idiomatic in English.
- source_word: οὕτως
  chosen: comes
  alternatives:
  - thus comes
  - so comes
  lexicon: BDAG
  rationale: οὕτως marks the manner corresponding to the simile ('in this way'). English
    normally absorbs this into the verbal phrase rather than requiring an explicit
    'thus' here. The sense is preserved in 'comes like a thief in the night.'
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - is coming
  - arrives
  lexicon: BDAG
  rationale: Present tense with future reference is common in Greek. 'Comes' preserves
    the vivid present and works idiomatically in English for a future eschatological
    event.
