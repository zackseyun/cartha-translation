theological_decisions:
- issue: Eschatological phrase ἡμέρα κυρίου
  chosen_reading: the day of the Lord
  alternative_readings:
  - the Lord's day
  rationale: In context Paul is speaking about the timing and suddenness of the eschatological
    day of divine intervention/judgment, not a liturgical day. The established prophetic
    phrase 'day of the Lord' best reflects the Greek and biblical background.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation
    philosophy #1 and #5'
- issue: Force of the simile 'like a thief in the night'
  chosen_reading: Retained as a simile of sudden, unexpected arrival without importing
    additional doctrinal detail
  rationale: The verse emphasizes unexpectedness and suddenness. The translation should
    not expand the image into claims about secrecy, timing systems, or specific eschatological
    frameworks not stated in the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
