theological_decisions:
- issue: Literal vs metaphorical rendering of sleep/drunkenness in an explanatory
    analogy
  chosen_reading: Retain the literal imagery ('sleep,' 'get drunk') in the main text
  alternative_readings:
  - Render metaphorically as spiritual unawareness and moral dissipation
  rationale: In the immediate context Paul is using ordinary nighttime behavior to
    explain his spiritual exhortation. Keeping the literal wording preserves the analogy
    and avoids importing the interpretation into the translation itself.
  doctrine_reference: Translation philosophy §1, §3
