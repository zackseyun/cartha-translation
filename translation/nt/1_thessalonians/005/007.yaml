id: 1TH.5.7
reference: 1 Thessalonians 5:7
source:
  edition: SBLGNT
  text: οἱ γὰρ καθεύδοντες νυκτὸς καθεύδουσιν, καὶ οἱ μεθυσκόμενοι νυκτὸς μεθύουσιν·
translation:
  text: For those who sleep, sleep at night, and those who get drunk, get drunk at
    night.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the preceding exhortation; 'for'
    preserves the straightforward connective force in natural English.
- source_word: οἱ καθεύδοντες ... καθεύδουσιν
  chosen: those who sleep, sleep
  alternatives:
  - the ones sleeping, sleep
  - those who are asleep, sleep
  lexicon: BDAG
  rationale: The articular participle is rendered generically as 'those who sleep.'
    Repeating 'sleep' for the finite verb preserves the rhetorical parallelism and
    the literal image, which in context supports Paul's contrast between night behavior
    and spiritual vigilance.
- source_word: νυκτός
  chosen: at night
  alternatives:
  - by night
  - during the night
  lexicon: BDAG
  rationale: The genitive functions adverbially. 'At night' is the most natural modern
    English rendering and keeps the temporal sense concise.
- source_word: οἱ μεθυσκόμενοι
  chosen: those who get drunk
  alternatives:
  - those who are getting drunk
  - those who become drunk
  lexicon: BDAG
  rationale: The present participle of μεθύσκομαι denotes the act/state of becoming
    intoxicated. 'Get drunk' is idiomatic English and matches the parallel finite
    verb that follows.
- source_word: μεθύουσιν
  chosen: get drunk
  alternatives:
  - are drunk
  - become drunk
  lexicon: BDAG
  rationale: Although English could render the verb statively ('are drunk'), the verbal
    parallel with μεθυσκόμενοι is best preserved with 'get drunk,' emphasizing the
    customary action described.
- source_word: καί
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the two parallel clauses.
