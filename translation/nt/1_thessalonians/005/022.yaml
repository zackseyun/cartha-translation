id: 1TH.5.22
reference: 1 Thessalonians 5:22
source:
  edition: SBLGNT
  text: ἀπὸ παντὸς εἴδους πονηροῦ ἀπέχεσθε.
translation:
  text: Abstain from every kind of evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every form of evil'; traditionally, 'every appearance of evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέχεσθε
  chosen: Abstain
  alternatives:
  - keep away
  - refrain
  lexicon: BDAG
  rationale: Present middle imperative, second person plural, calling for ongoing
    avoidance. 'Abstain' is concise, idiomatic, and preserves the imperative force
    better than a looser paraphrase.
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - away from
  lexicon: BDAG
  rationale: Standard separative sense with the verb ἀπέχω, expressing distance or
    avoidance.
- source_word: παντὸς
  chosen: every
  alternatives:
  - all
  lexicon: BDAG
  rationale: Genitive singular with εἴδους gives the sense 'every kind/sort.' 'Every'
    is the most natural English determiner here.
- source_word: εἴδους
  chosen: kind
  alternatives:
  - form
  - appearance
  - sort
  lexicon: BDAG
  rationale: Although traditionally rendered 'appearance,' in this context εἶδος more
    naturally means 'kind' or 'sort' rather than mere outward appearance. This avoids
    the misleading sense 'avoid anything that looks evil' and better reflects the
    lexical value in context.
- source_word: πονηροῦ
  chosen: evil
  alternatives:
  - wickedness
  - what is evil
  lexicon: BDAG
  rationale: 'Genitive singular modifying εἴδους: ''kind of evil.'' ''Evil'' is the
    most direct and natural rendering.'
