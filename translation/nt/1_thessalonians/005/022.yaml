theological_decisions:
- issue: Meaning of εἴδους in the phrase ἀπὸ παντὸς εἴδους πονηροῦ
  chosen_reading: every kind of evil
  alternative_readings:
  - every appearance of evil
  - every form of evil
  rationale: The traditional English rendering 'appearance of evil' can suggest avoiding
    merely seeming evil, which likely overreads εἶδος as outward appearance in this
    context. The phrase more plausibly means every kind or form of evil. To preserve
    transparency, the traditional alternative is noted in a footnote.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition); §3 (preserve theological tension where ambiguity is genuine)
