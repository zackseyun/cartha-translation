theological_decisions:
- issue: Gendered address to the church
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: Following the stated philosophy of gender-accurate over gender-neutral,
    the masculine vocative ἀδελφοί is rendered 'brothers' in the main text. Because
    the address likely includes the whole congregation, the inclusive sense is preserved
    in a footnote rather than replacing the source-form in the text.
