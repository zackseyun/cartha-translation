id: 1TH.5.1
reference: 1 Thessalonians 5:1
source:
  edition: SBLGNT
  text: Περὶ δὲ τῶν χρόνων καὶ τῶν καιρῶν, ἀδελφοί, οὐ χρείαν ἔχετε ὑμῖν γράφεσθαι,
translation:
  text: Now concerning the times and the seasons, brothers, you have no need for anything
    to be written to you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and likely addresses
      the whole believing community.
    reason: lexical_alternative
  - marker: b
    text: '''Times and seasons'' is a paired expression for periods and appointed
      moments, especially in an eschatological context.'
    reason: cultural_note
lexical_decisions:
- source_word: Περὶ δὲ
  chosen: Now concerning
  alternatives:
  - Concerning now
  - But concerning
  lexicon: BDAG
  rationale: Περὶ introduces the topic ('concerning/regarding'), while δέ marks a
    transition. 'Now concerning' is idiomatic English that preserves the discourse
    shift without overstating contrast.
- source_word: τῶν χρόνων
  chosen: the times
  alternatives:
  - times
  lexicon: BDAG
  rationale: χρόνος commonly denotes time in its extent or duration. With the article,
    'the times' reflects the Greek and preserves the eschatological framing.
- source_word: τῶν καιρῶν
  chosen: the seasons
  alternatives:
  - the appointed times
  - the epochs
  lexicon: BDAG
  rationale: καιρός often refers to a specific time, fitting moment, or appointed
    season. 'Seasons' preserves the traditional pairing 'times and seasons' and distinguishes
    it from χρόνοι without becoming overly technical.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The vocative plural ἀδελφοί is grammatically masculine but commonly addresses
    the mixed Christian community. Per the translation philosophy, the main text remains
    gender-accurate to the source form as 'brothers,' with inclusivity noted in a
    footnote.
- source_word: οὐ χρείαν ἔχετε
  chosen: you have no need
  alternatives:
  - there is no need for you
  - you do not need
  lexicon: BDAG
  rationale: This is a standard idiom meaning lack of necessity. 'You have no need'
    closely follows the Greek structure while remaining natural English.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: 'The dative pronoun is best represented here as the indirect object of
    the infinitive construction: something written ''to you.'''
- source_word: γράφεσθαι
  chosen: for anything to be written
  alternatives:
  - to be written
  - for me to write
  lexicon: BDAG
  rationale: The present passive infinitive is formally 'to be written.' The passive
    leaves the writer implicit. English requires some expansion for smoothness in
    this construction; 'for anything to be written to you' captures the sense without
    forcing an explicit subject such as 'me,' which the Greek does not state.
