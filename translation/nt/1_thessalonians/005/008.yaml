id: 1TH.5.8
reference: 1 Thessalonians 5:8
source:
  edition: SBLGNT
  text: ἡμεῖς δὲ ἡμέρας ὄντες νήφωμεν, ἐνδυσάμενοι θώρακα πίστεως καὶ ἀγάπης καὶ περικεφαλαίαν ἐλπίδα σωτηρίας·
translation:
  text: But since we are of the day, let us be sober, having put on the breastplate of faith and love, and the hope of salvation as a helmet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness and love.' The Greek word pistis can mean 'faith,' 'trust,' or 'faithfulness'; here 'faith' is retained in the main text as the default rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'and as a helmet the hope of salvation'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἡμεῖς δὲ
  chosen: But since we
  alternatives:
  - But we
  - But as for us
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding 'they' in the context. 'But since we' brings out both the adversative force and the causal/logical connection to the participial phrase that follows, in readable English.
- source_word: ἡμέρας ὄντες
  chosen: are of the day
  alternatives:
  - belong to the day
  - being of the day
  lexicon: BDAG
  rationale: The genitive with εἰμί here expresses belonging or sphere, not merely time of day. 'Are of the day' preserves Paul's metaphor and keeps closer to the Greek than the more interpretive 'belong to the day.'
- source_word: νήφωμεν
  chosen: let us be sober
  alternatives:
  - let us stay sober
  - let us be self-controlled
  lexicon: BDAG
  rationale: νήφω can denote literal sobriety and figurative alert self-control. In this immediate context of night/day and watchfulness, 'be sober' preserves the metaphorical and possibly literal resonance without over-paraphrasing.
- source_word: ἐνδυσάμενοι
  chosen: having put on
  alternatives:
  - putting on
  - after putting on
  lexicon: BDAG
  rationale: The aorist middle participle is best represented as attendant circumstance or means accompanying the exhortation. 'Having put on' is natural English and preserves the sense of taking up armor as the manner in which sobriety is expressed.
- source_word: θώρακα
  chosen: breastplate
  alternatives:
  - body armor
  lexicon: BDAG
  rationale: The military metaphor is explicit. 'Breastplate' is the standard and precise rendering, matching the imagery also familiar from Pauline armor language.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine guidance, πίστις defaults to 'faith.' Here the genitive likely describes the breastplate's constituent virtues ('of faith and love'). 'Faithfulness' is possible but less likely in this paired virtue context, so it is preserved in a footnote rather than adopted in the main text.
- source_word: ἀγάπης
  chosen: love
  lexicon: BDAG
  rationale: Per doctrine guidance, ἀγάπη is rendered 'love.' This is the natural and consistent gloss in Paul's virtue triad.
- source_word: περικεφαλαίαν
  chosen: helmet
  lexicon: BDAG
  rationale: Standard military term; 'helmet' is direct and idiomatic.
- source_word: ἐλπίδα σωτηρίας
  chosen: the hope of salvation
  alternatives:
  - hope for salvation
  - the hope that is salvation
  lexicon: BDAG
  rationale: The phrase most naturally means hope directed toward or characterized by salvation. 'The hope of salvation' is both idiomatic and close to the Greek, preserving the established Pauline triad of faith, love, and hope.
