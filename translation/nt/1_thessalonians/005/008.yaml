theological_decisions:
- issue: Meaning of πίστις in the armor metaphor
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις, with alternatives preserved where contested. In this verse, the immediate pairing with love and hope favors the virtue term 'faith' in the main text, while 'faithfulness' remains a plausible nuance worth preserving in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; footnote alternatives where contested'
- issue: Force of ἡμέρας ὄντες
  chosen_reading: we are of the day
  alternative_readings:
  - we belong to the day
  rationale: The phrase is metaphorical and ecclesiological/ethical rather than merely temporal. The chosen wording preserves the metaphor without importing extra doctrinal explanation about identity beyond what the text states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; do not import doctrinal claims'
revisions:
- timestamp: '2026-04-21T02:05:50Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_thessalonians/005/008.json
  category: awkward_english
  tier: 1
  from: and as a helmet the hope of salvation
  to: and the hope of salvation as a helmet
  rationale: The current phrasing mimics the Greek word order (περικεφαλαίαν ἐλπίδα) at the cost of natural English flow. While grammatically defensible, the inversion is slightly awkward for the reader. Reversing the elements to 'the hope of salvation as a helmet' presents the appositional relationship in a more common and readable English idiom, improving the sentence's rhythm without altering the meaning.
