id: 1TH.5.25
reference: 1 Thessalonians 5:25
source:
  edition: SBLGNT
  text: Ἀδελφοί, ⸀προσεύχεσθε περὶ ἡμῶν.
translation:
  text: Brothers, pray for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Brothers and sisters," since the address likely includes the whole congregation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί
  chosen: Brothers
  alternatives:
  - Brothers and sisters
  - Siblings
  lexicon: BDAG
  rationale: Vocative plural of ἀδελφός. Following the doctrine's gender-accurate
    principle, the main text keeps the masculine form 'Brothers' to reflect the Greek
    wording, while preserving the likely mixed-gender referent in a footnote alternative.
- source_word: προσεύχεσθε
  chosen: pray
  alternatives:
  - keep praying
  lexicon: BDAG
  rationale: Present middle/passive imperative, second person plural, from προσεύχομαι.
    English imperative 'pray' is the most natural rendering. The present imperative
    may suggest ongoing action, but English commonly leaves that aspect implicit unless
    emphasis is required; 'keep praying' is possible but too explicit for the brief
    appeal here.
- source_word: περὶ
  chosen: for
  alternatives:
  - concerning
  - about
  lexicon: BDAG
  rationale: With the genitive ἡμῶν, περί here expresses reference/concern in the
    sense 'for us' in a prayer request. 'For' is idiomatic English and best matches
    the sense in context.
- source_word: ἡμῶν
  chosen: us
  alternatives:
  - me and my companions
  lexicon: BDAG
  rationale: First person plural genitive pronoun governed by περί. Rendered simply
    as 'us,' referring to Paul and his coworkers, without over-specifying beyond the
    text.
