id: 1TH.5.3
reference: 1 Thessalonians 5:3
source:
  edition: SBLGNT
  text: ⸀ὅταν λέγωσιν· Εἰρήνη καὶ ἀσφάλεια, τότε αἰφνίδιος αὐτοῖς ἐφίσταται ὄλεθρος
    ὥσπερ ἡ ὠδὶν τῇ ἐν γαστρὶ ἐχούσῃ, καὶ οὐ μὴ ἐκφύγωσιν.
translation:
  text: When they say, “Peace and security,” then sudden destruction comes upon them,
    like labor pains upon a pregnant woman, and they will certainly not escape.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Peace and safety.”
    reason: lexical_alternative
  - marker: b
    text: Or “birth pains.”
    reason: lexical_alternative
  - marker: c
    text: 'Greek has an emphatic negation: “they will by no means escape.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: When
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces an indefinite temporal clause with the subjunctive λέγωσιν.
    'When' is idiomatic in English and fits the predictive context; 'whenever' is
    possible but sounds more iterative than the immediate eschatological warning suggests.
- source_word: λέγωσιν
  chosen: they say
  alternatives:
  - they are saying
  lexicon: BDAG
  rationale: Present subjunctive after ὅταν is best rendered with simple present in
    English in a future-oriented temporal clause. The unspecified subject remains
    'they,' matching the Greek's indefinite plural.
- source_word: Εἰρήνη καὶ ἀσφάλεια
  chosen: Peace and security
  alternatives:
  - Peace and safety
  lexicon: BDAG
  rationale: εἰρήνη is straightforwardly 'peace.' ἀσφάλεια can mean 'security' or
    'safety'; 'security' better matches the abstract noun and common public-claim
    sense in context, while preserving the rhetorical pairing.
- source_word: τότε
  chosen: then
  lexicon: BDAG
  rationale: Marks the consequent event following the claim of peace and security;
    'then' is the natural English equivalent.
- source_word: αἰφνίδιος
  chosen: sudden
  alternatives:
  - unexpected
  lexicon: BDAG
  rationale: Predicate adjective modifying ὄλεθρος. 'Sudden' preserves the abruptness
    emphasized in the Greek; 'unexpected' interprets the effect rather than the manner.
- source_word: ἐφίσταται
  chosen: comes upon
  alternatives:
  - stands over
  - overtakes
  lexicon: BDAG
  rationale: In this context the verb conveys the onset or arrival of destruction
    upon someone. 'Comes upon' is natural and sufficiently formal; 'overtakes' is
    possible but slightly more interpretive.
- source_word: ὄλεθρος
  chosen: destruction
  alternatives:
  - ruin
  - doom
  lexicon: BDAG
  rationale: The noun denotes ruin/destruction. 'Destruction' is the clearest and
    most standard rendering here without specifying annihilation; it preserves the
    severity of judgment while avoiding over-interpretation.
- source_word: ὥσπερ
  chosen: like
  alternatives:
  - just as
  lexicon: BDAG
  rationale: Introduces the comparison with labor pains. 'Like' is concise and natural
    in modern English.
- source_word: ἡ ὠδὶν
  chosen: labor pains
  alternatives:
  - birth pains
  lexicon: BDAG
  rationale: Refers to the pains associated with childbirth. 'Labor pains' is idiomatic
    modern English; 'birth pains' is also valid and may be preserved as a lexical
    alternative.
- source_word: τῇ ἐν γαστρὶ ἐχούσῃ
  chosen: upon a pregnant woman
  alternatives:
  - upon the woman who is pregnant
  - upon the one having a child in the womb
  lexicon: BDAG
  rationale: The participial expression literally means 'the one having [a child]
    in the womb.' 'Pregnant woman' is the natural equivalent in readable modern English
    and preserves the image without unnecessary literalism.
- source_word: οὐ μὴ ἐκφύγωσιν
  chosen: they will certainly not escape
  alternatives:
  - they will by no means escape
  - they shall surely not escape
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation about the future.
    'Will certainly not escape' communicates the force in contemporary English without
    archaic phrasing.
