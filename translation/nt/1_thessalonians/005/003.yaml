theological_decisions:
- issue: Nature of ὄλεθρος in an eschatological warning
  chosen_reading: Rendered as 'destruction' without specifying annihilation or eternal
    conscious punishment.
  alternative_readings:
  - ruin implying devastation rather than extinction
  - doom as a more interpretive judgment term
  rationale: The verse warns of decisive judgment, but the noun itself does not require
    a more detailed doctrinal conclusion about the mode or duration of that judgment.
    The translation preserves the text's gravity without importing a specific eschatological
    system.
  doctrine_reference: Preserve theological tension rather than resolve it.
