id: 1TH.5.13
reference: 1 Thessalonians 5:13
source:
  edition: SBLGNT
  text: καὶ ἡγεῖσθαι αὐτοὺς ⸀ὑπερεκπερισσοῦ ἐν ἀγάπῃ διὰ τὸ ἔργον αὐτῶν. εἰρηνεύετε
    ἐν ⸀ἑαυτοῖς.
translation:
  text: and to regard them very highly in love because of their work. Be at peace
    among yourselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'esteem them most exceedingly in love.' The Greek adverb is unusually
      intensive.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡγεῖσθαι
  chosen: to regard
  alternatives:
  - to esteem
  - to consider
  lexicon: BDAG
  rationale: 'In this infinitive construction following the previous exhortation,
    the sense is evaluative rather than leadership-related: the Thessalonians are
    urged to hold their leaders in high regard. ''Regard'' is natural modern English
    and preserves the cognitive/evaluative force without sounding overly formal.'
- source_word: ὑπερεκπερισσοῦ
  chosen: very highly
  alternatives:
  - most exceedingly
  - beyond all measure
  - exceedingly
  lexicon: BDAG
  rationale: This rare intensive adverb stacks prefixes for emphasis. 'Very highly'
    captures the superlative force in readable English. More literal options like
    'most exceedingly' are awkward; 'beyond all measure' is possible but slightly
    more interpretive.
- source_word: ἐν ἀγάπῃ
  chosen: in love
  alternatives:
  - with love
  lexicon: BDAG
  rationale: The phrase is idiomatic and should preserve the key term ἀγάπη as 'love'
    per project defaults. 'In love' keeps the Greek prepositional form and can modify
    the manner in which they are to regard these leaders.
- source_word: διὰ τὸ ἔργον αὐτῶν
  chosen: because of their work
  alternatives:
  - on account of their work
  - because of what they do
  lexicon: BDAG
  rationale: διά with the accusative here expresses reason or basis. 'Because of their
    work' is straightforward and preserves the concrete noun ἔργον rather than paraphrasing
    it away.
- source_word: εἰρηνεύετε
  chosen: Be at peace
  alternatives:
  - live in peace
  - be peaceful
  lexicon: BDAG
  rationale: The present imperative calls for an ongoing state or practice of peace.
    'Be at peace' is concise and idiomatic. 'Live in peace' is also possible, but
    'be at peace' better reflects the stative nuance.
- source_word: ἐν ἑαυτοῖς
  chosen: among yourselves
  alternatives:
  - with one another
  - among one another
  lexicon: BDAG
  rationale: In context the reflexive plural points to peace within the community.
    'Among yourselves' is the most natural rendering in English and preserves the
    communal/internal sense.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: The conjunction links this exhortation with the preceding appeals. 'And'
    is sufficient and preserves the flow of the paraenesis.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: The pronoun refers back to those who labor among and lead/admonish the
    believers in the previous verse. 'Them' is the direct and contextually clear rendering.
