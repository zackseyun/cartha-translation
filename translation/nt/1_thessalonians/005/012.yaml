id: 1TH.5.12
reference: 1 Thessalonians 5:12
source:
  edition: SBLGNT
  text: Ἐρωτῶμεν δὲ ὑμᾶς, ἀδελφοί, εἰδέναι τοὺς κοπιῶντας ἐν ὑμῖν καὶ προϊσταμένους
    ὑμῶν ἐν κυρίῳ καὶ νουθετοῦντας ὑμᾶς,
translation:
  text: Now we ask you, brothers, to acknowledge those who labor among you and lead
    you in the Lord and admonish you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers,' used here as a congregational
      address.
    reason: lexical_alternative
  - marker: b
    text: Or 'respect' or 'recognize' those who labor among you.
    reason: lexical_alternative
  - marker: c
    text: Or 'are over you in the Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐρωτῶμεν
  chosen: we ask
  alternatives:
  - we request
  - we urge
  - we appeal to
  lexicon: BDAG
  rationale: The verb ἐρωτάω commonly means 'ask' or 'request.' Here it introduces
    a pastoral appeal rather than a command, so 'we ask' preserves the gentler force
    better than 'urge,' while remaining natural English.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ marks a mild transition. 'Now' captures the discourse shift into exhortation
    better than a stronger adversative like 'but.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - brothers, sisters
  lexicon: BDAG
  rationale: Per the gender-accurate policy, the vocative masculine plural is rendered
    'brothers.' In context it addresses the whole congregation, but the source form
    is masculine; inclusivity can be noted in a footnote rather than flattened in
    the main text.
- source_word: εἰδέναι
  chosen: to acknowledge
  alternatives:
  - to know
  - to respect
  - to recognize
  lexicon: BDAG
  rationale: Although literally 'to know,' in this idiom the sense is relational recognition
    or appreciative acknowledgment of leaders. 'Acknowledge' preserves that sense
    without overinterpreting as full 'respect' in the main text.
- source_word: κοπιῶντας
  chosen: those who labor
  alternatives:
  - those who work hard
  - those who toil
  lexicon: BDAG
  rationale: κοπιάω emphasizes strenuous labor. 'Labor' preserves the weight and dignity
    of the term while remaining readable.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - among yourselves
  lexicon: BDAG
  rationale: The phrase indicates activity within the congregation. 'Among you' is
    the most natural and direct rendering.
- source_word: προϊσταμένους
  chosen: lead you
  alternatives:
  - are over you
  - direct you
  - care for you
  lexicon: BDAG
  rationale: προΐστημι can denote leading, managing, or exercising a position of care/oversight.
    'Lead you' communicates recognized authority without importing a rigid hierarchical
    model. The alternative 'are over you' is more literal and worth preserving in
    a footnote.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in union with the Lord
  - in the sphere of the Lord
  lexicon: BDAG
  rationale: This phrase qualifies their leadership as exercised in relation to the
    Lord. The standard rendering 'in the Lord' is both accurate and theologically
    transparent. κύριος follows the doctrinal default 'Lord.'
- source_word: νουθετοῦντας
  chosen: admonish you
  alternatives:
  - warn you
  - instruct you
  - counsel you
  lexicon: BDAG
  rationale: νουθετέω carries the sense of corrective instruction or warning. 'Admonish'
    best preserves both the pastoral and corrective dimensions.
