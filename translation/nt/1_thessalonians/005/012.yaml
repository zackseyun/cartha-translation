theological_decisions:
- issue: Rendering of congregational address ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The translation follows the stated gender-accurate policy by retaining
    the masculine form in the main text. Because the address likely includes the whole
    church, the inclusive sense is preserved in a footnote rather than replacing the
    source-form in the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sense of εἰδέναι in relation to church leaders
  chosen_reading: to acknowledge
  alternative_readings:
  - to respect
  - to know
  rationale: The verse calls for recognizing and valuing those serving in leadership,
    but the Greek does not explicitly command obedience or veneration. 'Acknowledge'
    preserves the relational recognition without importing stronger ecclesial claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Force of προϊσταμένους ὑμῶν ἐν κυρίῳ
  chosen_reading: lead you in the Lord
  alternative_readings:
  - are over you in the Lord
  - care for you in the Lord
  rationale: The participle can denote leadership/oversight and may include caring
    responsibility. 'Lead you' is a balanced rendering that preserves authority while
    avoiding unnecessary denominational overtones. A more literal alternative is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3
