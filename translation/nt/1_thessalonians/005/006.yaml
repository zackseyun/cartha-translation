theological_decisions:
- issue: Metaphorical force of sleep/wakefulness
  chosen_reading: Retain the sleep/awake imagery in the main text as an ethical-spiritual
    exhortation.
  alternative_readings:
  - Paraphrase as moral carelessness versus vigilance
  rationale: The surrounding context contrasts believers as children of light with
    others associated with night. Preserving the metaphor maintains Paul's theological
    imagery without overexplaining it in translation.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering of νήφω
  chosen_reading: Translate as 'be sober' rather than a broader paraphrase like 'be
    self-controlled.'
  alternative_readings:
  - be self-controlled
  - be clearheaded
  rationale: The text likely includes both literal and metaphorical overtones of sobriety
    and alertness. The main text should preserve that tension rather than resolve
    it into a single abstract virtue.
  doctrine_reference: Translation philosophy §3, §6
