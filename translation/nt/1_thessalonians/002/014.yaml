theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The phrase ἐν Χριστῷ Ἰησοῦ is a standard Pauline expression, but the
    doctrinal guideline prefers translating Χριστός as 'Messiah' where title force
    is still appreciable. This preserves the semantic content of the title without
    altering orthodox Christology.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός) and Translation
    philosophy §2'
- issue: Scope implied by 'the Jews'
  chosen_reading: Retain 'the Jews' as the direct rendering of τῶν Ἰουδαίων without
    expanding or universalizing the referent
  alternative_readings:
  - the Judeans
  rationale: The verse refers to the specific agents from whom the Judean churches
    suffered, not to all Jewish people in every sense. The translation keeps the lexical
    form while avoiding interpretive expansion in the main text; an alternative is
    preserved in a footnote because the term is contextually sensitive.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy'
