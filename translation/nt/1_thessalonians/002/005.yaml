theological_decisions:
- issue: Nature of Paul's denial regarding motives and method
  chosen_reading: The verse denies both flattery in speech and greed concealed under
    a pretext, without expanding into broader doctrinal claims about ministry.
  alternative_readings:
  - A broader denunciation of all rhetorical polish
  - An exclusive focus on financial exploitation
  rationale: The Greek specifically names κολακεία and πλεονεξία. The translation
    preserves those concrete accusations without importing a blanket rejection of
    rhetoric or narrowing the verse only to money, though greed likely includes material
    gain.
  doctrine_reference: Translation philosophy items 1 and 3
