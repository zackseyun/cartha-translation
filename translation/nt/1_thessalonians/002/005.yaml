id: 1TH.2.5
reference: 1 Thessalonians 2:5
source:
  edition: SBLGNT
  text: οὔτε γάρ ποτε ἐν λόγῳ κολακείας ἐγενήθημεν, καθὼς οἴδατε, οὔτε ⸀ἐν προφάσει
    πλεονεξίας, θεὸς μάρτυς,
translation:
  text: For we never came with flattering speech, as you know, nor with a pretext
    for greed—God is witness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with flattery'; literally 'in a word of flattery.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with a cloak for greed' or 'with a pretense of covetousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε γάρ ποτε
  chosen: For we never
  alternatives:
  - For neither ever
  - For at no time
  lexicon: BDAG
  rationale: γάρ is rendered 'For' to connect this verse to the preceding defense
    of Paul's conduct. ποτέ with οὔτε conveys emphatic negation over time, naturally
    expressed in English as 'never.' The initial οὔτε is absorbed idiomatically into
    the first negative clause rather than translated woodenly as 'neither.'
- source_word: ἐν λόγῳ κολακείας
  chosen: with flattering speech
  alternatives:
  - in a word of flattery
  - with flattery
  lexicon: BDAG
  rationale: λόγος here refers to speech/message rather than a single 'word.' κολακεία
    denotes flattery. 'With flattering speech' preserves the instrumental sense of
    ἐν while sounding natural in English.
- source_word: ἐγενήθημεν
  chosen: came
  alternatives:
  - became
  - were found to be
  - conducted ourselves
  lexicon: BDAG
  rationale: Although γίνομαι commonly means 'become,' in this context it idiomatically
    refers to how Paul and his companions proved to be or presented themselves among
    the Thessalonians. 'Came' fits the missionary-visit context and pairs naturally
    with the following prepositional phrases without overstating the sense.
- source_word: καθὼς οἴδατε
  chosen: as you know
  alternatives:
  - just as you know
  - as you yourselves know
  lexicon: BDAG
  rationale: A straightforward appeal to the Thessalonians' own knowledge. 'As you
    know' is concise and preserves the evidential force.
- source_word: ἐν προφάσει πλεονεξίας
  chosen: with a pretext for greed
  alternatives:
  - with a cloak for greed
  - with a pretense of covetousness
  lexicon: BDAG
  rationale: πρόφασις means pretext, pretense, or outward cover. πλεονεξία in this
    context is acquisitive greed/covetousness. 'Pretext for greed' is clear modern
    English and preserves the idea of greed being concealed behind a false front.
- source_word: θεὸς μάρτυς
  chosen: God is witness
  alternatives:
  - God is our witness
  - God is a witness
  lexicon: BDAG
  rationale: This is a solemn appeal to God as witness. The Greek lacks an explicit
    possessive pronoun, so 'God is witness' is slightly more formal and closer to
    the source than 'our witness,' while remaining idiomatic in English.
