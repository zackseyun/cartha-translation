id: 1TH.2.10
reference: 1 Thessalonians 2:10
source:
  edition: SBLGNT
  text: ὑμεῖς μάρτυρες καὶ ὁ θεός, ὡς ὁσίως καὶ δικαίως καὶ ἀμέμπτως ὑμῖν τοῖς πιστεύουσιν
    ἐγενήθημεν,
translation:
  text: You are witnesses, and God also, how devoutly and righteously and blamelessly
    we conducted ourselves toward you who believe,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holily' for 'devoutly.' The Greek term emphasizes pious conduct before
      God.
    reason: lexical_alternative
  - marker: b
    text: Or 'among you who believe' instead of 'toward you who believe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς μάρτυρες καὶ ὁ θεός
  chosen: You are witnesses, and God also
  alternatives:
  - You and God are witnesses
  - You are witnesses, and so is God
  lexicon: BDAG
  rationale: The nominative phrase functions idiomatically as an appeal to witnesses.
    Supplying 'are' makes natural English while preserving the emphatic direct address
    to the Thessalonians first, then God.
- source_word: ὡς
  chosen: how
  alternatives:
  - that
  - in what manner
  lexicon: BDAG
  rationale: Here ὡς introduces the manner of Paul's conduct, best rendered 'how'
    in English after an appeal to witnesses.
- source_word: ὁσίως
  chosen: devoutly
  alternatives:
  - holily
  - piously
  lexicon: BDAG
  rationale: ὁσίως denotes conduct marked by piety/devotion before God. 'Devoutly'
    is readable modern English and preserves the Godward dimension better than the
    archaic 'holily.'
- source_word: δικαίως
  chosen: righteously
  alternatives:
  - justly
  - uprightly
  lexicon: BDAG
  rationale: The adverb describes morally right conduct. 'Righteously' fits the ethical
    sense and pairs well with the surrounding adverbs. 'Justly' is possible but can
    sound more narrowly forensic or social in English.
- source_word: ἀμέμπτως
  chosen: blamelessly
  alternatives:
  - without blame
  - irreproachably
  lexicon: BDAG
  rationale: The adverb indicates behavior open to no valid accusation. 'Blamelessly'
    is the most direct and idiomatic equivalent.
- source_word: ὑμῖν
  chosen: toward you
  alternatives:
  - among you
  - before you
  lexicon: BDAG
  rationale: The dative here marks the people in relation to whom the conduct was
    displayed. 'Toward you' captures relational orientation. 'Among you' is possible,
    but the following dative participial phrase already identifies the audience.
- source_word: τοῖς πιστεύουσιν
  chosen: who believe
  alternatives:
  - the believers
  - who are believing
  lexicon: BDAG
  rationale: The present participle is substantival, referring to the Thessalonian
    believers. 'Who believe' is natural English and preserves the verbal force better
    than the noun 'believers.'
- source_word: ἐγενήθημεν
  chosen: we conducted ourselves
  alternatives:
  - we were
  - we became
  lexicon: BDAG
  rationale: Although γίνομαι often means 'become' or 'be,' in this context with adverbs
    of manner it idiomatically refers to how Paul and his companions behaved among
    the Thessalonians. 'We conducted ourselves' conveys the sense clearly in English.
