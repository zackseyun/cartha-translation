theological_decisions:
- issue: Inclusive force of ἀδελφοί
  chosen_reading: Retain 'brothers' in the main text
  alternative_readings:
  - brothers and sisters
  rationale: The translation philosophy specifies gender-accurate over gender-neutral
    renderings. While the address likely includes the whole church, the Greek form
    is masculine plural, so the main text preserves that form and the inclusive sense
    can be noted in a footnote.
