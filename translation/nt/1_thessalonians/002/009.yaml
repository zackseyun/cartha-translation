id: 1TH.2.9
reference: 1 Thessalonians 2:9
source:
  edition: SBLGNT
  text: Μνημονεύετε γάρ, ἀδελφοί, τὸν κόπον ἡμῶν καὶ τὸν μόχθον· ⸀νυκτὸς καὶ ἡμέρας
    ἐργαζόμενοι πρὸς τὸ μὴ ἐπιβαρῆσαί τινα ὑμῶν ἐκηρύξαμεν εἰς ὑμᾶς τὸ εὐαγγέλιον
    τοῦ θεοῦ.
translation:
  text: 'For you remember, brothers, our labor and hardship: working night and day
    so as not to burden any of you, we proclaimed to you the gospel of God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and may address the
      whole congregation inclusively.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μνημονεύετε
  chosen: you remember
  alternatives:
  - you recall
  - remember
  lexicon: BDAG
  rationale: Present indicative, second person plural, is best rendered as a present
    statement ('you remember') rather than an imperative. This fits Paul's appeal
    to the Thessalonians' own memory.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Rendered 'brothers' to preserve the masculine plural form in keeping
    with the gender-accurate philosophy. In context it likely addresses the whole
    congregation, but the main text retains the source form rather than expanding
    it.
- source_word: κόπον
  chosen: labor
  alternatives:
  - toil
  lexicon: BDAG
  rationale: κόπος commonly denotes laborious effort. 'Labor' is natural English and
    pairs well with μόχθος while preserving distinction.
- source_word: μόχθον
  chosen: hardship
  alternatives:
  - toil
  - trouble
  - wearisome labor
  lexicon: BDAG
  rationale: Used 'hardship' to distinguish it from κόπος. The pair conveys both strenuous
    work and the burden/suffering associated with it.
- source_word: νυκτὸς καὶ ἡμέρας
  chosen: night and day
  alternatives:
  - by night and by day
  lexicon: BDAG
  rationale: A standard idiomatic genitive expression meaning continual effort. 'Night
    and day' is clear, natural, and sufficiently formal.
- source_word: ἐργαζόμενοι
  chosen: working
  alternatives:
  - laboring
  - toiling
  lexicon: BDAG
  rationale: The participle explains the manner/circumstance of Paul's ministry. 'Working'
    is straightforward and avoids redundancy with the earlier nouns while still conveying
    manual or sustained labor.
- source_word: πρὸς τὸ μὴ ἐπιβαρῆσαί
  chosen: so as not to burden
  alternatives:
  - in order not to burden
  - so that we might not be a burden to
  lexicon: BDAG
  rationale: This construction expresses purpose. 'So as not to burden' is concise
    and natural. ἐπιβαρέω here refers to imposing a financial or practical burden
    on the recipients.
- source_word: τινα ὑμῶν
  chosen: any of you
  alternatives:
  - any one of you
  lexicon: BDAG
  rationale: The singular τινα with the genitive ὑμῶν is idiomatically rendered 'any
    of you.'
- source_word: ἐκηρύξαμεν
  chosen: we proclaimed
  alternatives:
  - we preached
  lexicon: BDAG
  rationale: κηρύσσω means to announce or proclaim publicly. 'Proclaimed' preserves
    the heraldic force without relying on church-specific jargon.
- source_word: εἰς ὑμᾶς
  chosen: to you
  alternatives:
  - among you
  lexicon: BDAG
  rationale: Although εἰς can sometimes overlap with 'among' in proclamation contexts,
    'to you' best reflects the directional sense here and matches the verbal object
    naturally in English.
- source_word: τὸ εὐαγγέλιον τοῦ θεοῦ
  chosen: the gospel of God
  alternatives:
  - God's gospel
  - the good news of God
  lexicon: BDAG
  rationale: Retained the familiar Pauline phrase 'the gospel of God.' 'Gospel' is
    established, readable English; 'of God' preserves the genitive without overinterpreting
    whether it is source, possession, or content.
