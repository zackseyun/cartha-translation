theological_decisions:
- issue: Rendering παρουσίᾳ in an eschatological context
  chosen_reading: coming
  alternative_readings:
  - presence
  - arrival
  rationale: The verse refers to the future appearing of the Lord Jesus, so 'coming'
    best communicates the eschatological sense in idiomatic English. However, because
    παρουσία lexically denotes 'presence' or 'arrival,' the alternative is preserved
    in a footnote rather than erased.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
