id: 1TH.2.19
reference: 1 Thessalonians 2:19
source:
  edition: SBLGNT
  text: τίς γὰρ ἡμῶν ἐλπὶς ἢ χαρὰ ἢ στέφανος καυχήσεως— ἢ οὐχὶ καὶ ὑμεῖς— ἔμπροσθεν
    τοῦ κυρίου ἡμῶν Ἰησοῦ ἐν τῇ αὐτοῦ παρουσίᾳ;
translation:
  text: For what is our hope or joy or crown of boasting—is it not indeed you?—before
    our Lord Jesus at his coming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at his presence' or 'at his arrival.' The Greek παρουσίᾳ can denote
      presence or arrival; in this context it refers to the Lord Jesus's future coming.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  chosen: what
  alternatives:
  - who
  lexicon: BDAG
  rationale: Although τίς can mean either 'who' or 'what,' the following predicate
    nouns ('hope,' 'joy,' 'crown') are impersonal abstractions, so English idiom is
    best served by 'what is our hope or joy or crown...' while the appositional identification
    of 'you' follows in the rhetorical question.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retained as 'For' to preserve the explanatory connection with the preceding
    context rather than smoothing it away.
- source_word: ἐλπίς
  chosen: hope
  lexicon: BDAG
  rationale: Standard Pauline sense of confident expectation; 'hope' is the natural
    and consistent rendering.
- source_word: χαρά
  chosen: joy
  alternatives:
  - gladness
  lexicon: BDAG
  rationale: '''Joy'' is the most direct and idiomatic rendering and preserves the
    emotional force.'
- source_word: στέφανος καυχήσεως
  chosen: crown of boasting
  alternatives:
  - crown of rejoicing
  - victor's wreath of boasting
  - crown for boasting
  lexicon: BDAG
  rationale: στέφανος denotes a wreath/crown awarded in honor or victory, and καυχήσεως
    is a genitive expressing the basis or character of the crown. 'Crown of boasting'
    stays close to the Greek and preserves Paul's rhetoric without importing a narrower
    interpretive gloss like 'rejoicing.'
- source_word: οὐχὶ καὶ ὑμεῖς
  chosen: is it not indeed you?
  alternatives:
  - is it not also you?
  - are not you also...?
  lexicon: BDAG
  rationale: This construction expects an affirmative answer. 'Indeed' captures the
    emphatic force of οὐχί, while avoiding awkward English word order. καί may be
    rendered 'also,' but here functions naturally as an intensifier within the rhetorical
    question.
- source_word: ἔμπροσθεν
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is concise and natural, adequately conveying standing in
    someone''s presence.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' is the standard rendering and
    fits both NT usage and Christological confession.
- source_word: παρουσία
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In Pauline eschatological contexts παρουσία commonly refers to Christ's
    future coming/arrival. 'Coming' is the clearest English rendering here, while
    'presence' is preserved in a footnote because the term's lexical range includes
    both ideas.
