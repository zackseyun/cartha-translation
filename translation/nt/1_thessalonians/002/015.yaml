id: 1TH.2.15
reference: 1 Thessalonians 2:15
source:
  edition: SBLGNT
  text: τῶν καὶ τὸν κύριον ἀποκτεινάντων Ἰησοῦν καὶ ⸀τοὺς προφήτας καὶ ἡμᾶς ἐκδιωξάντων,
    καὶ θεῷ μὴ ἀρεσκόντων, καὶ πᾶσιν ἀνθρώποις ἐναντίων,
translation:
  text: who also killed the Lord Jesus and the prophets, and drove us out, and are
    not pleasing to God, and are hostile to all people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put to death the Lord Jesus.'
    reason: lexical_alternative
  - marker: b
    text: That is, they 'drove us out' or 'expelled us'; the verb is more specific
      than the broader idea of persecution.
    reason: lexical_alternative
  - marker: c
    text: This description grammatically continues the group identified in the previous
      verse; it should not be read as a blanket statement about all Jewish people
      in every time and place.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποκτεινάντων
  chosen: killed
  alternatives:
  - put to death
  - murdered
  lexicon: BDAG
  rationale: Aorist active participle meaning to kill/put to death. 'Killed' is the
    most natural modern English rendering and fits the participial chain without overinterpreting
    motive. 'Murdered' is possible but adds a moral nuance not explicit in the verb
    itself.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Here it is a christological
    title modifying Jesus.
- source_word: Ἰησοῦν
  chosen: Jesus
  rationale: Personal name transliterated by standard English convention.
- source_word: προφήτας
  chosen: the prophets
  lexicon: BDAG
  rationale: Standard rendering of προφήτης. The article is retained in English because
    it likely refers to the recognized line of God's prophets.
- source_word: ἐκδιωξάντων
  chosen: drove us out
  alternatives:
  - persecuted us
  - expelled us
  lexicon: BDAG
  rationale: The verb denotes driving out or expelling. 'Drove us out' preserves the
    concrete force better than the broader 'persecuted us.'
- source_word: θεῷ μὴ ἀρεσκόντων
  chosen: are not pleasing to God
  alternatives:
  - do not please God
  lexicon: BDAG
  rationale: Present active participle with dative θεῷ expresses ongoing failure to
    please God. 'Are not pleasing to God' preserves the participial, descriptive force
    in smooth English.
- source_word: πᾶσιν ἀνθρώποις ἐναντίων
  chosen: are hostile to all people
  alternatives:
  - contrary to all people
  - opposed to all people
  lexicon: BDAG
  rationale: ἐναντίος conveys opposition/hostility. 'Hostile to all people' communicates
    the adversative sense idiomatically in modern English. 'Contrary to all people'
    is more literal but less natural.
- source_word: τῶν ... ἀποκτεινάντων ... ἐκδιωξάντων ... ἀρεσκόντων ... ἐναντίων
  chosen: who also killed ... and drove ... and are not pleasing ... and are hostile
    ...
  alternatives:
  - who both killed ... and drove ... not pleasing ... hostile ...
  lexicon: Greek grammar
  rationale: The genitive plural article with a chain of participles continues the
    description of the antecedent from the previous verse. Rendering with a relative
    clause in English best preserves the syntax and readability.
- source_word: καὶ
  chosen: also / and
  lexicon: BDAG
  rationale: The first καί is rendered 'also' to mark addition within the accusation;
    subsequent instances are rendered 'and' to preserve the cumulative rhetorical
    force.
