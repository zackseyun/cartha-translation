theological_decisions:
- issue: Reference of the participial description
  chosen_reading: The verse continues Paul's description of 'the Jews' from the previous
    verse without expanding it into a timeless statement about all Jewish people everywhere.
  alternative_readings:
  - A generalized condemnation of all Jews in all times
  rationale: The Greek syntax links this verse directly to the antecedent in 2:14.
    The translation preserves the grammatical connection with 'who' and does not add
    wording that universalizes the statement beyond the immediate literary referent.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
