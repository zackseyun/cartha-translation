theological_decisions:
- issue: Rendering of δόξα in an interpersonal Pauline statement
  chosen_reading: glory
  alternative_readings:
  - boast
  - honor
  rationale: The verse is not making a technical doctrinal claim but expressing the
    Thessalonians as the missionaries' source of honor and joy before the Lord. 'Glory'
    best preserves the Greek term's semantic range and rhetorical force without reducing
    it to mere self-congratulation.
