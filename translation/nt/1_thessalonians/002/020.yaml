id: 1TH.2.20
reference: 1 Thessalonians 2:20
source:
  edition: SBLGNT
  text: ὑμεῖς γάρ ἐστε ἡ δόξα ἡμῶν καὶ ἡ χαρά.
translation:
  text: For you are our glory and joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boast' or 'honor' for 'glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun, explicitly stated for emphasis. English
    'you' captures the referent; the emphatic force is sufficiently conveyed by word
    order and context without adding 'yourselves' to the main text.
- source_word: γάρ
  chosen: For
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason or explanation for the preceding statement. 'For'
    is the most natural concise English connective here and preserves the logical
    link.
- source_word: ἐστε
  chosen: are
  lexicon: BDAG
  rationale: Present indicative of 'to be'; simple copular 'are' is the direct and
    natural rendering.
- source_word: δόξα
  chosen: glory
  alternatives:
  - boast
  - honor
  - pride
  lexicon: BDAG
  rationale: δόξα commonly means 'glory' or 'honor.' In this relational context it
    refers to that in which Paul and his companions take honor/exultation. 'Glory'
    preserves the lexical connection and theological weight better than the more interpretive
    'pride' or narrower 'boast.'
- source_word: ἡμῶν
  chosen: our
  lexicon: BDAG
  rationale: Genitive first-person plural possessive, naturally rendered 'our.'
- source_word: χαρά
  chosen: joy
  alternatives:
  - rejoicing
  - delight
  lexicon: BDAG
  rationale: χαρά denotes joy or gladness. 'Joy' is the standard and most direct rendering;
    'rejoicing' would shift toward an activity rather than the noun naming what the
    Thessalonians are to Paul and his companions.
