theological_decisions:
- issue: Scope of ἀκαθαρσία in Paul's denial
  chosen_reading: Render broadly as 'impurity' without specifying sexual misconduct
    in the main text.
  alternative_readings:
  - sexual impurity
  - uncleanness
  rationale: Although ἀκαθαρσία can carry sexual overtones, the verse itself gives
    a broader triad concerning the source and manner of apostolic ministry. A broad
    rendering avoids importing a narrower accusation than the Greek states.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
