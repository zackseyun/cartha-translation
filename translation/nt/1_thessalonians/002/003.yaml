id: 1TH.2.3
reference: 1 Thessalonians 2:3
source:
  edition: SBLGNT
  text: ἡ γὰρ παράκλησις ἡμῶν οὐκ ἐκ πλάνης οὐδὲ ἐξ ἀκαθαρσίας ⸀οὐδὲ ἐν δόλῳ,
translation:
  text: For our appeal does not come from error or from impurity or with deceit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'exhortation.' The Greek παράκλησις can denote an appeal, exhortation,
      or encouragement depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'deception' for 'error'; the following phrase 'with deceit' more directly
      expresses deliberate trickery.
    reason: lexical_alternative
lexical_decisions:
- source_word: παράκλησις
  chosen: appeal
  alternatives:
  - exhortation
  - encouragement
  - message
  lexicon: BDAG
  rationale: In this context Paul is defending the character and source of his missionary
    proclamation and urging. 'Appeal' best captures the sense of earnest exhortation/proclamation
    directed to the hearers without narrowing it merely to comfort ('encouragement')
    or to content alone ('message').
- source_word: πλάνης
  chosen: error
  alternatives:
  - deception
  - delusion
  lexicon: BDAG
  rationale: The phrase οὐκ ἐκ πλάνης speaks of source/origin ('not from error').
    'Error' fits the likely sense of falsehood or mistaken teaching as the source
    of the appeal. 'Deception' is possible, but the following δόλος more directly
    covers intentional deceit, so 'error' preserves the distinction between the terms.
- source_word: ἀκαθαρσίας
  chosen: impurity
  alternatives:
  - uncleanness
  - moral impurity
  lexicon: BDAG
  rationale: '''Impurity'' is the natural modern-English rendering and preserves the
    moral sense without archaic wording. In Pauline usage the term can include sexual
    impurity, but the broader term is preferable here because the text itself does
    not specify the exact form.'
- source_word: δόλῳ
  chosen: deceit
  alternatives:
  - guile
  - trickery
  lexicon: BDAG
  rationale: 'With ἐν, the phrase denotes manner: ''with deceit'' or ''in deceit.''
    ''Deceit'' is clear modern English and avoids the archaic feel of ''guile'' while
    preserving the idea of deliberate craftiness.'
- source_word: ἐκ ... ἐξ ... ἐν
  chosen: does not come from ... or from ... or with ...
  alternatives:
  - is not from ... nor from ... nor in ...
  lexicon: BDAG
  rationale: 'The prepositions are significant and are reflected distinctly in English:
    ἐκ/ἐξ indicates source (''from''), while ἐν indicates manner or sphere (''with'').
    Rendering them this way preserves Paul''s threefold denial with natural English
    syntax.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: '''For'' preserves the connective force linking this verse to the preceding
    statement and is idiomatic at the start of an explanatory clause.'
