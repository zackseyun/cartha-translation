id: 1TH.2.11
reference: 1 Thessalonians 2:11
source:
  edition: SBLGNT
  text: καθάπερ οἴδατε ὡς ἕνα ἕκαστον ὑμῶν ὡς πατὴρ τέκνα ἑαυτοῦ
translation:
  text: just as you know, we dealt with each one of you as a father with his own children
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'just as you know how each one of you, as a father his
      own children'—the Greek clause is elliptical and depends on the surrounding
      sentence for its full verbal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - even as
  - as
  lexicon: BDAG
  rationale: Introduces a comparison by appealing to the Thessalonians' knowledge
    of Paul's conduct. 'Just as' is natural modern English and preserves the comparative
    force.
- source_word: οἴδατε
  chosen: you know
  alternatives:
  - you knew
  - you are aware
  lexicon: BDAG
  rationale: Although οἶδα is formally perfect, it commonly carries present meaning
    ('know'). Present English best reflects the sense here.
- source_word: ὡς
  chosen: that
  alternatives:
  - how
  lexicon: BDAG
  rationale: The first ὡς introduces the content of what they know. In idiomatic English,
    the clause is best represented by the overall construction 'you know ... we dealt
    with,' without forcing a separate explicit 'that' in the final line.
- source_word: ἕνα ἕκαστον ὑμῶν
  chosen: each one of you
  alternatives:
  - every one of you
  - each of you individually
  lexicon: BDAG
  rationale: The combination intensifies distributive force, stressing individual
    pastoral attention. 'Each one of you' preserves that emphasis clearly.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: The second ὡς marks comparison. 'As' is slightly more formal and fits
    the parental analogy well.
- source_word: πατὴρ
  chosen: a father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: Anarthrous noun used qualitatively/comparatively; 'a father' is the most
    natural English rendering in this simile.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons and daughters
  - offspring
  lexicon: BDAG
  rationale: τέκνα is a broad kinship term meaning 'children,' not specifically 'sons.'
    This preserves the familial image without over-specifying gender.
- source_word: ἑαυτοῦ
  chosen: his own
  alternatives:
  - his
  lexicon: BDAG
  rationale: 'The reflexive pronoun adds emphasis: not merely children in general,
    but a father''s own children. ''His own'' preserves that nuance.'
- source_word: '[elliptical verbal idea from context]'
  chosen: we dealt with
  alternatives:
  - we treated
  - we exhorted/encouraged/charged
  lexicon: BDAG
  rationale: This verse is syntactically incomplete in Greek and depends on the verbal
    sequence supplied from the surrounding context, especially v. 12 and the participles
    in v. 11's broader sentence. 'We dealt with' is broad enough to carry the implied
    pastoral action without prematurely narrowing it to one of the specific participles.
