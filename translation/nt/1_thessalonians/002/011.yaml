theological_decisions:
- issue: Supplying the implied verbal action in an elliptical clause
  chosen_reading: 'Use a broad supplied verb: ''we dealt with each one of you'''
  alternative_readings:
  - 'leave the clause more fragmentary: ''just as you know how each one of you, as
    a father his own children'''
  - supply a narrower pastoral verb such as 'we exhorted each one of you'
  rationale: The Greek clause as cited is elliptical and not a complete English sentence
    without supplied sense from context. A broad rendering preserves the comparison
    and avoids importing a single specific pastoral action where the larger sentence
    includes multiple related actions.
  doctrine_reference: Translation philosophy §1, §3, §6
