id: 1TH.2.16
reference: 1 Thessalonians 2:16
source:
  edition: SBLGNT
  text: κωλυόντων ἡμᾶς τοῖς ἔθνεσιν λαλῆσαι ἵνα σωθῶσιν, εἰς τὸ ἀναπληρῶσαι αὐτῶν
    τὰς ἁμαρτίας πάντοτε. ἔφθασεν δὲ ἐπ’ αὐτοὺς ἡ ⸀ὀργὴ εἰς τέλος.
translation:
  text: by hindering us from speaking to the Gentiles so that they may be saved, with
    the result that they always fill up the measure of their sins. But wrath has come
    upon them at last.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''fully,'' ''completely,'' or ''to the end'' for ''at last'' (Greek:
      εἰς τέλος).'
    reason: lexical_alternative
  - marker: b
    text: '''Wrath'' likely refers to divine judgment, but Paul does not specify here
      whether he means a present historical judgment, final judgment, or both.'
    reason: alternative_reading
lexical_decisions:
- source_word: κωλυόντων
  chosen: by hindering
  alternatives:
  - forbidding
  - preventing
  lexicon: BDAG
  rationale: Present participle in a genitive construction continuing the prior description;
    'by hindering' captures ongoing obstructive action in natural English without
    over-specifying legal prohibition.
- source_word: τοῖς ἔθνεσιν
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Pauline usage here the referent is non-Jews rather than nations as
    geopolitical entities. 'Gentiles' best conveys the ethnic-religious sense.
- source_word: λαλῆσαι
  chosen: from speaking
  alternatives:
  - from telling
  - from proclaiming
  lexicon: BDAG
  rationale: Infinitive dependent on κωλυόντων. 'Speaking' is the most direct rendering;
    the evangelistic content is supplied by context and the following purpose clause.
- source_word: ἵνα σωθῶσιν
  chosen: so that they may be saved
  alternatives:
  - that they might be saved
  lexicon: BDAG
  rationale: Purpose clause with passive subjunctive of σῴζω. 'Be saved' preserves
    the theological weight and passive form without importing a narrower sense.
- source_word: εἰς τὸ ἀναπληρῶσαι
  chosen: with the result that they ... fill up
  alternatives:
  - so as to fill up
  - resulting in their filling up
  lexicon: BDAG
  rationale: The infinitival construction can express result here in context. 'With
    the result that' avoids implying that their conscious purpose was to complete
    their sins, while preserving the consequential force.
- source_word: ἀναπληρῶσαι
  chosen: fill up the measure of
  alternatives:
  - complete
  - fill up
  lexicon: BDAG
  rationale: The verb suggests bringing to fullness. Adding 'the measure of' makes
    explicit the idiomatic sense in English and reflects the common biblical image
    of sins reaching fullness.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: Straightforward adverb; placed with the filling-up clause to reflect
    the Greek emphasis on persistent pattern.
- source_word: ἔφθασεν
  chosen: has come
  alternatives:
  - came
  - has overtaken
  - has reached
  lexicon: BDAG
  rationale: Aorist rendered as English present perfect to convey a completed action
    with present relevance. 'Has come upon' is idiomatic with ἐπί and avoids over-interpreting
    whether the sense is arrival or overtaking.
- source_word: ὀργή
  chosen: wrath
  alternatives:
  - judgment
  - anger
  lexicon: BDAG
  rationale: '''Wrath'' preserves the gravity and likely divine sense of ὀργή better
    than the more generic ''anger.'' ''Judgment'' would be interpretive rather than
    lexical.'
- source_word: εἰς τέλος
  chosen: at last
  alternatives:
  - completely
  - to the end
  - fully
  lexicon: BDAG
  rationale: The phrase is debated. 'At last' fits the idiom as an adverbial expression
    of culmination and reads naturally in context, while alternatives are preserved
    in a footnote because the phrase may also mean 'fully' or 'completely.'
