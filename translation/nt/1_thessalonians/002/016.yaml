theological_decisions:
- issue: Referent and force of 'wrath' in Paul's statement
  chosen_reading: '''Wrath'' is left as a theologically weighty but not over-defined
    term, implying divine wrath/judgment without specifying whether Paul refers to
    a historical event, eschatological judgment, or both.'
  alternative_readings:
  - A specific historical judgment already experienced
  - Final eschatological wrath
  - A proleptic statement combining present and future judgment
  rationale: The text itself states that wrath has come upon them but does not explicitly
    identify the event. The translation preserves the ambiguity rather than resolving
    it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of εἰς τὸ ἀναπληρῶσαι
  chosen_reading: Result rather than explicit purpose
  alternative_readings:
  - 'Purpose: ''in order to fill up their sins'''
  rationale: Rendering the clause as result avoids implying that the opponents consciously
    intended to complete the measure of their sins, while still reflecting the Greek
    construction in context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without importing claims the text does not make.'
