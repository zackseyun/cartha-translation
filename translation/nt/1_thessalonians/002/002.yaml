theological_decisions:
- issue: Force of ἐν τῷ θεῷ ἡμῶν
  chosen_reading: Rendered as 'in our God' to preserve the relational/spherical sense
    of the Greek rather than making God merely the efficient cause.
  alternative_readings:
  - by our God
  - through our God
  - with confidence in our God
  rationale: The phrase describes the ground or sphere of apostolic boldness. Translating
    it too instrumentally could narrow Paul's expression beyond what the Greek states.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
