id: 1TH.2.2
reference: 1 Thessalonians 2:2
source:
  edition: SBLGNT
  text: ἀλλὰ προπαθόντες καὶ ὑβρισθέντες καθὼς οἴδατε ἐν Φιλίπποις ἐπαρρησιασάμεθα
    ἐν τῷ θεῷ ἡμῶν λαλῆσαι πρὸς ὑμᾶς τὸ εὐαγγέλιον τοῦ θεοῦ ἐν πολλῷ ἀγῶνι.
translation:
  text: But after we had already suffered and been shamefully mistreated, as you know,
    in Philippi, we were bold in our God to speak the gospel of God to you amid much
    conflict.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'been insulted,' 'been outrageously treated,' or 'been abused.' The Greek
      verb includes the idea of being treated with insolence or public dishonor.
    reason: lexical_alternative
  - marker: b
    text: Or 'we spoke boldly in our God.' The Greek verb can itself include the act
      of bold speaking; the translation separates 'were bold' from 'to speak' to reflect
      the following infinitive.
    reason: lexical_alternative
  - marker: c
    text: Or 'in much struggle' or 'with much opposition.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding idea; 'But' is the most natural
    English adversative here.
- source_word: προπαθόντες
  chosen: after we had already suffered
  alternatives:
  - having suffered before
  - after suffering previously
  lexicon: BDAG
  rationale: Aorist participle of προπάσχω indicates prior suffering before the main
    action. 'Already' helps convey the προ- prefix's sense of prior experience without
    sounding wooden.
- source_word: ὑβρισθέντες
  chosen: been shamefully mistreated
  alternatives:
  - been insulted
  - been outrageously treated
  - been abused
  lexicon: BDAG
  rationale: The verb carries the sense of being treated with insolence or outrage,
    not merely verbally insulted. 'Shamefully mistreated' captures both the dishonoring
    and abusive force, fitting the Philippi context.
- source_word: καθὼς οἴδατε
  chosen: as you know
  alternatives:
  - just as you know
  - as you yourselves know
  lexicon: BDAG
  rationale: A straightforward parenthetical appeal to the Thessalonians' knowledge.
    The simpler English preserves the force without overemphasis.
- source_word: ἐν Φιλίπποις
  chosen: in Philippi
  lexicon: BDAG
  rationale: Standard transliteration of the place name in idiomatic English singular
    form.
- source_word: ἐπαρρησιασάμεθα
  chosen: we were bold
  alternatives:
  - we spoke boldly
  - we had courage
  - we acted boldly
  lexicon: BDAG
  rationale: παρρησιάζομαι denotes speaking or acting with boldness/frankness. Because
    λαλῆσαι later supplies the specific infinitive 'to speak,' rendering this as 'we
    were bold' avoids redundancy and preserves the verbal sequence.
- source_word: ἐν τῷ θεῷ ἡμῶν
  chosen: in our God
  alternatives:
  - by our God
  - through our God
  - with confidence in our God
  lexicon: BDAG
  rationale: 'The prepositional phrase most naturally expresses sphere or basis: their
    boldness was exercised in relationship to God. ''In our God'' is slightly formal
    but faithful and intelligible.'
- source_word: λαλῆσαι πρὸς ὑμᾶς
  chosen: to speak ... to you
  alternatives:
  - to tell you
  - to proclaim to you
  lexicon: BDAG
  rationale: λαλέω is a common verb for speaking; 'speak ... to you' preserves the
    verbal simplicity, leaving the content specified by 'the gospel of God.'
- source_word: τὸ εὐαγγέλιον τοῦ θεοῦ
  chosen: the gospel of God
  alternatives:
  - God's gospel
  - the good news of God
  lexicon: BDAG
  rationale: A standard Pauline phrase. 'The gospel of God' preserves the familiar
    theological expression and the genitival structure without unnecessary paraphrase.
- source_word: ἐν πολλῷ ἀγῶνι
  chosen: amid much conflict
  alternatives:
  - in much struggle
  - with much opposition
  - in great contest
  lexicon: BDAG
  rationale: ἀγών can denote struggle, contest, or conflict. Here it likely refers
    to strenuous opposition surrounding the ministry. 'Amid much conflict' communicates
    both adversity and setting in natural English.
