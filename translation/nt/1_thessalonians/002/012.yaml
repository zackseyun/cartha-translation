theological_decisions:
- issue: Whether to preserve the metaphor of περιπατεῖν or interpret it as general conduct
  chosen_reading: Retain 'walk' in the main text
  alternative_readings:
  - live
  - conduct yourselves
  rationale: The metaphor is common and intelligible in English Bible style, and preserving it maintains intertextual continuity with broader biblical ethics. The alternatives are interpretive paraphrases and are not necessary for clarity here.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of God's calling in τοῦ καλοῦντος ὑμᾶς
  chosen_reading: Render as present 'who calls you'
  alternative_readings:
  - who called you
  - who is calling you
  rationale: The present participle can be represented naturally as a present relative clause. This preserves the text's aspect without importing a specific doctrinal stance on the timing or mechanics of calling.
  doctrine_reference: Affirmations; Translation philosophy §3
