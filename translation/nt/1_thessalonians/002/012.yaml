  from: encouraging you and comforting you and urging you
  to: encouraging, comforting, and urging you
  rationale: The Greek text uses a single object pronoun (ὑμᾶς) after the first of three coordinated participles. Repeating 'you' after each participle in the English translation is not reflective of the source text's structure and creates a slightly cumbersome rhythm. A more concise and natural rendering would use a single 'you' as the object of all three verbs, which is also closer to the Greek construction.
