theological_decisions:
- issue: Gendered address in ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: Following the project's gender-accurate policy, the masculine vocative
    is retained in the main text. Because the address likely includes the whole congregation,
    an inclusive explanatory footnote preserves that contextual force without altering
    the source-form in translation.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
