id: 1TH.2.17
reference: 1 Thessalonians 2:17
source:
  edition: SBLGNT
  text: Ἡμεῖς δέ, ἀδελφοί, ἀπορφανισθέντες ἀφ’ ὑμῶν πρὸς καιρὸν ὥρας, προσώπῳ οὐ καρδίᾳ,
    περισσοτέρως ἐσπουδάσαμεν τὸ πρόσωπον ὑμῶν ἰδεῖν ἐν πολλῇ ἐπιθυμίᾳ.
translation:
  text: But we, brothers, having been torn away from you for a short time—in person,
    not in heart—were all the more eager, with great longing, to see your face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'having been orphaned from you'; the Greek uses a vivid
      image of bereavement to describe the separation.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' is Paul''s form of address; in context it likely refers to
      the whole believing community, including women.'
    reason: cultural_note
lexical_decisions:
- source_word: Ἡμεῖς δέ
  chosen: But we
  alternatives:
  - But as for us
  - Now we
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the preceding discussion;
    'But we' preserves the contrast and the emphatic subject Ἡμεῖς without sounding
    wooden.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The vocative plural is grammatically masculine and in Pauline usage often
    addresses the whole believing community. Per doctrine, gender-accurate rendering
    is preferred, so 'brothers' is retained in the main text rather than a gender-neutral
    expansion.
- source_word: ἀπορφανισθέντες
  chosen: having been torn away
  alternatives:
  - having been orphaned from
  - having been separated from
  lexicon: BDAG
  rationale: The verb literally evokes being made orphaned/bereft, but in English
    'orphaned from you' is awkward because Paul is not the child of the Thessalonians.
    'Having been torn away' conveys the painful forced separation while remaining
    stronger than the flatter 'separated.' The orphan-image is worth preserving in
    a footnote.
- source_word: ἀφ’ ὑμῶν
  chosen: from you
  alternatives:
  - away from you
  lexicon: BDAG
  rationale: Standard separation sense of ἀπό; 'from you' is idiomatic with the chosen
    participial rendering.
- source_word: πρὸς καιρὸν ὥρας
  chosen: for a short time
  alternatives:
  - for an hour's time
  - for a moment
  lexicon: BDAG
  rationale: This idiom denotes a brief period rather than a literal hour. 'For a
    short time' communicates the sense naturally in modern English.
- source_word: προσώπῳ οὐ καρδίᾳ
  chosen: in person, not in heart
  alternatives:
  - in face, not in heart
  - in presence, not in heart
  lexicon: BDAG
  rationale: The dative pair contrasts physical presence with inward affection. 'In
    person, not in heart' is idiomatic and preserves the contrast clearly.
- source_word: περισσοτέρως
  chosen: all the more
  alternatives:
  - more abundantly
  - even more
  lexicon: BDAG
  rationale: Comparative adverb intensifying the main verb; 'all the more' is natural
    and emphatic.
- source_word: ἐσπουδάσαμεν
  chosen: were ... eager
  alternatives:
  - made every effort
  - were zealous
  - were diligent
  lexicon: BDAG
  rationale: σπουδάζω can mean to be eager or to make every effort. Here, with the
    infinitive 'to see' and the emotional context, 'were eager' best fits readable
    English. The effort nuance is partly carried by 'all the more.'
- source_word: τὸ πρόσωπον ὑμῶν ἰδεῖν
  chosen: to see your face
  alternatives:
  - to see you
  - to see your presence
  lexicon: BDAG
  rationale: Literally 'to see your face.' Retaining 'face' preserves the personal,
    embodied nature of Paul's desire and echoes the earlier 'in person' language.
- source_word: ἐν πολλῇ ἐπιθυμίᾳ
  chosen: with great longing
  alternatives:
  - with much desire
  - with strong desire
  lexicon: BDAG
  rationale: ἐπιθυμία here denotes strong desire/longing, not necessarily negative
    lust. 'With great longing' communicates intense affectionate desire in natural
    English.
