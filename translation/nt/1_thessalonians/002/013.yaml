id: 1TH.2.13
reference: 1 Thessalonians 2:13
source:
  edition: SBLGNT
  text: ⸀Καὶ διὰ τοῦτο καὶ ἡμεῖς εὐχαριστοῦμεν τῷ θεῷ ἀδιαλείπτως, ὅτι παραλαβόντες
    λόγον ἀκοῆς παρ’ ἡμῶν τοῦ θεοῦ ἐδέξασθε οὐ λόγον ἀνθρώπων ἀλλὰ καθὼς ⸂ἀληθῶς ἐστὶν⸃
    λόγον θεοῦ, ὃς καὶ ἐνεργεῖται ἐν ὑμῖν τοῖς πιστεύουσιν.
translation:
  text: 'And because of this we also thank God continually: when you received the
    word of God that you heard from us, you accepted it not as the word of men but,
    as it truly is, as the word of God, which is also at work in you who believe.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the message of God that you heard from us.' The Greek expression is
      compressed and can be unpacked in more than one natural way in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'not as a human word but, as it truly is, God's word.'
    reason: lexical_alternative
  - marker: c
    text: 'The relative pronoun could also be understood to refer to God: ''who is
      also at work in you who believe.'''
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: because of this
  alternatives:
  - for this reason
  - therefore
  lexicon: BDAG
  rationale: Causal phrase linking this thanksgiving to the preceding context; 'because
    of this' is natural English and preserves the explicit causal force better than
    a more inferential 'therefore'.
- source_word: εὐχαριστοῦμεν ... ἀδιαλείπτως
  chosen: we also thank God continually
  alternatives:
  - we give thanks to God unceasingly
  - we thank God constantly
  lexicon: BDAG
  rationale: Retains the present tense and adverbial force. 'Continually' is readable
    modern English for ἀδιαλείπτως while preserving the sense of ongoing repetition.
- source_word: παραλαβόντες
  chosen: received
  alternatives:
  - having received
  - taken in
  lexicon: BDAG
  rationale: The participle is best rendered with a finite clause in English for readability.
    'Received' preserves the act of taking over what was delivered.
- source_word: λόγον ἀκοῆς παρ’ ἡμῶν τοῦ θεοῦ
  chosen: the word of God that you heard from us
  alternatives:
  - the message of God which you heard from us
  - the word of hearing from us, of God
  lexicon: BDAG
  rationale: This compressed genitival construction is idiomatically unpacked. The
    sense is not merely 'a report' but God's word as heard through apostolic proclamation.
    'That you heard from us' captures ἀκοῆς παρ’ ἡμῶν, while attaching 'of God' to
    'word' reflects the contrast developed in the verse.
- source_word: ἐδέξασθε
  chosen: you accepted it
  alternatives:
  - you welcomed it
  - you received it
  lexicon: BDAG
  rationale: δέχομαι here goes beyond mere reception and conveys favorable acceptance.
    'Accepted it' fits the contrast with 'not as the word of men but ... as the word
    of God.'
- source_word: οὐ λόγον ἀνθρώπων
  chosen: not as the word of men
  alternatives:
  - not as a human word
  - not as the word of human beings
  lexicon: BDAG
  rationale: The anarthrous construction is qualitative, but 'the word of men' preserves
    the rhetorical contrast with 'the word of God.' 'Men' reflects the generic plural
    ἀνθρώπων in a traditional but still intelligible way.
- source_word: ἀλλὰ καθὼς ἀληθῶς ἐστὶν
  chosen: but, as it truly is,
  alternatives:
  - but as it really is
  - but as indeed it is
  lexicon: BDAG
  rationale: This parenthetical affirmation underscores the reality of the claim.
    'Truly' preserves ἀληθῶς without sounding overly formal.
- source_word: λόγον θεοῦ
  chosen: as the word of God
  alternatives:
  - as God's word
  lexicon: BDAG
  rationale: Keeps the repeated phrase explicit for rhetorical force and theological
    emphasis.
- source_word: ὃς
  chosen: which
  alternatives:
  - who
  lexicon: BDAG
  rationale: The relative pronoun most naturally refers to 'word' (λόγον), not directly
    to God, so English 'which' is appropriate.
- source_word: ἐνεργεῖται
  chosen: is also at work
  alternatives:
  - is active
  - is working
  - works effectively
  lexicon: BDAG
  rationale: The middle/passive form here conveys operative efficacy. 'Is at work'
    is idiomatic and preserves the ongoing action without over-specifying whether
    the nuance is middle or passive.
- source_word: τοῖς πιστεύουσιν
  chosen: in you who believe
  alternatives:
  - in you believers
  - in you who are believing
  lexicon: BDAG
  rationale: Present participle rendered as a relative clause in natural English,
    preserving the ongoing characteristic of faith.
