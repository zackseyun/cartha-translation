id: 1TH.2.1
reference: 1 Thessalonians 2:1
source:
  edition: SBLGNT
  text: Αὐτοὶ γὰρ οἴδατε, ἀδελφοί, τὴν εἴσοδον ἡμῶν τὴν πρὸς ὑμᾶς ὅτι οὐ κενὴ γέγονεν,
translation:
  text: For you yourselves know, brothers, that our coming to you was not in vain,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and often uses the
      masculine form to address the whole believing community.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτοὶ
  chosen: you yourselves
  alternatives:
  - you
  - yourselves
  lexicon: BDAG
  rationale: The intensive use of αὐτοὶ emphasizes the Thessalonians' own firsthand
    knowledge. 'You yourselves' preserves the emphatic force better than a simple
    'you'.
- source_word: γὰρ
  chosen: For
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: γὰρ links this statement as support for the preceding thought. 'For'
    is the most natural English connective here and preserves the argumentative flow.
- source_word: οἴδατε
  chosen: know
  alternatives:
  - have known
  - are aware
  lexicon: BDAG
  rationale: Although οἶδα is formally perfect in form, it commonly carries present
    sense ('know'). 'Know' is idiomatic and accurate in context.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per the gender-accurate philosophy, the grammatically masculine vocative
    is rendered 'brothers.' In Pauline usage it often addresses the whole believing
    community, so an inclusivity note is appropriate rather than replacing the source-shaped
    term in the main text.
- source_word: εἴσοδον
  chosen: coming
  alternatives:
  - entrance
  - visit
  - arrival
  lexicon: BDAG
  rationale: Literally 'entrance' or 'entry,' but in this context referring to Paul's
    missionary arrival among them. 'Coming' is natural modern English and captures
    the event without sounding wooden.
- source_word: τὴν πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - among you
  - with you
  lexicon: BDAG
  rationale: The phrase modifies 'coming' and indicates direction toward the Thessalonians.
    'To you' is the most direct rendering; 'among you' is interpretive and better
    left as an alternative.
- source_word: ὅτι
  chosen: that
  alternatives:
  - how
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what they know. 'That' is the straightforward
    English equivalent.
- source_word: οὐ κενὴ
  chosen: was not in vain
  alternatives:
  - was not empty
  - was not fruitless
  lexicon: BDAG
  rationale: κενός can mean 'empty,' 'without result,' or 'in vain.' In context Paul
    means his visit was not without effect or significance. 'Was not in vain' is both
    idiomatic and faithful, while preserving the evaluative force.
- source_word: γέγονεν
  chosen: was
  alternatives:
  - has become
  - has been
  lexicon: BDAG
  rationale: The perfect of γίνομαι here describes the resulting character of their
    coming. English idiom prefers 'was not in vain' rather than the more wooden 'has
    become not empty.' The sense of completed event with abiding significance is adequately
    conveyed in context.
