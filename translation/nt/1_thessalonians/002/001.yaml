theological_decisions:
- issue: Rendering of ἀδελφοί in a mixed-community address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: Following the stated gender-accurate philosophy, the masculine plural
    is retained in the main text rather than neutralized. Because Paul's address likely
    includes the whole congregation, the broader referent is preserved in a footnote
    rather than altering the main-text form.
