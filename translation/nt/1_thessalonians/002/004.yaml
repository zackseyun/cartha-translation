theological_decisions:
- issue: Rendering the contrast between pleasing humans and pleasing God without over-smoothing
    Paul's compressed syntax
  chosen_reading: 'Preserve the elliptical contrast in the main text: ''not as pleasing
    people, but God'''
  alternative_readings:
  - not to please people, but to please God
  - not as those who please people, but as those who please God
  rationale: The Greek explicitly states the first participle and leaves the second
    implied. Preserving some of that compression reflects Paul's style and keeps the
    focus on divine rather than human approval, while a more idiomatic expansion is
    preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §6
