id: 1TH.2.4
reference: 1 Thessalonians 2:4
source:
  edition: SBLGNT
  text: ἀλλὰ καθὼς δεδοκιμάσμεθα ὑπὸ τοῦ θεοῦ πιστευθῆναι τὸ εὐαγγέλιον οὕτως λαλοῦμεν,
    οὐχ ὡς ἀνθρώποις ἀρέσκοντες ἀλλὰ ⸀θεῷ τῷ δοκιμάζοντι τὰς καρδίας ἡμῶν.
translation:
  text: But just as we have been approved by God to be entrusted with the gospel,
    so we speak—not as pleasing people, but God, who tests our hearts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'not to please people, but to please God.' The Greek
      is compressed, explicitly stating 'pleasing' only in the first half of the contrast.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεδοκιμάσμεθα
  chosen: have been approved
  alternatives:
  - have been tested and approved
  - have been found worthy
  lexicon: BDAG
  rationale: The perfect passive indicates a completed evaluation with continuing
    result. 'Approved' captures the outcome of δοκιμάζω here better than a mere 'tested,'
    while avoiding over-interpretive language like 'found worthy.'
- source_word: πιστευθῆναι
  chosen: to be entrusted with
  alternatives:
  - to be trusted with
  - to receive in trust
  lexicon: BDAG
  rationale: In this passive infinitive construction with τὸ εὐαγγέλιον as object,
    the sense is not believing the gospel but being entrusted with it. 'Entrusted
    with' is idiomatic and precise in English.
- source_word: τὸ εὐαγγέλιον
  chosen: the gospel
  alternatives:
  - the good news
  lexicon: BDAG
  rationale: '''Gospel'' is the established and accurate rendering in Pauline contexts,
    preserving the term''s theological density. ''Good news'' is possible but slightly
    flatter here.'
- source_word: οὕτως λαλοῦμεν
  chosen: so we speak
  alternatives:
  - thus we speak
  - in this way we speak
  lexicon: BDAG
  rationale: This straightforwardly links their manner of speaking to God's prior
    approval and entrustment. 'So we speak' is natural modern English while preserving
    the logical connection.
- source_word: οὐχ ὡς ἀνθρώποις ἀρέσκοντες
  chosen: not as pleasing people
  alternatives:
  - not to please people
  - not as those who please people
  lexicon: BDAG
  rationale: The participial construction is most literally 'not as pleasing people.'
    This keeps the contrastive structure with the following dative θεῷ. A more idiomatic
    alternative is preserved in a footnote.
- source_word: ἀλλὰ θεῷ
  chosen: but God
  alternatives:
  - but as pleasing God
  - but to please God
  lexicon: BDAG
  rationale: 'The Greek omits an explicit participle after ἀλλά, creating a compressed
    contrast: not pleasing people, but God. English can preserve this terseness with
    ''but God,'' though the implied sense is ''but [pleasing] God.'' The fuller idiomatic
    alternative is worth preserving in a footnote.'
- source_word: τῷ δοκιμάζοντι
  chosen: who tests
  alternatives:
  - who examines
  - who proves
  lexicon: BDAG
  rationale: The present participle emphasizes God's ongoing scrutiny. 'Tests' keeps
    the lexical connection with δεδοκιμάσμεθα earlier in the verse and preserves the
    evaluative nuance.
- source_word: τὰς καρδίας ἡμῶν
  chosen: our hearts
  alternatives:
  - our inner selves
  - our minds
  lexicon: BDAG
  rationale: '''Hearts'' is the standard biblical anthropological term and should
    be retained rather than reduced to a modern psychological paraphrase.'
