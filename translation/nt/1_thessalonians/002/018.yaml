id: 1TH.2.18
reference: 1 Thessalonians 2:18
source:
  edition: SBLGNT
  text: ⸀διότι ἠθελήσαμεν ἐλθεῖν πρὸς ὑμᾶς, ἐγὼ μὲν Παῦλος καὶ ἅπαξ καὶ δίς, καὶ ἐνέκοψεν
    ἡμᾶς ὁ Σατανᾶς.
translation:
  text: For we wanted to come to you—I, Paul, more than once—but Satan hindered us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'once and twice,' an idiom meaning 'more than once.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  chosen: For
  alternatives:
  - because
  - therefore
  lexicon: BDAG
  rationale: Introduces the reason for the preceding statement. 'For' is natural English
    and preserves the explanatory force without over-specifying causal nuance.
- source_word: ἠθελήσαμεν
  chosen: we wanted
  alternatives:
  - we desired
  - we intended
  lexicon: BDAG
  rationale: θέλω here expresses volition/desire. 'We wanted' is idiomatic modern
    English and fits the aorist summary sense without sounding overly formal.
- source_word: ἐλθεῖν πρὸς ὑμᾶς
  chosen: to come to you
  alternatives:
  - to visit you
  - to come back to you
  lexicon: BDAG
  rationale: A straightforward infinitival complement. 'Come to you' preserves the
    motion toward the Thessalonians without adding the interpretive nuance 'visit'
    or the explicit 'back,' though return is implied by context.
- source_word: ἐγὼ μὲν Παῦλος
  chosen: I, Paul,
  alternatives:
  - I myself, Paul,
  - I indeed, Paul,
  lexicon: BDAG
  rationale: The phrase singles Paul out from the plural 'we.' Rendering it appositionally
    as 'I, Paul,' preserves the emphasis without forcing an awkward explicit counterpart
    for μέν.
- source_word: καὶ ἅπαξ καὶ δίς
  chosen: more than once
  alternatives:
  - once and twice
  - again and again
  - both once and twice
  lexicon: BDAG
  rationale: The idiom literally means 'once and twice,' i.e., repeatedly on at least
    two occasions. 'More than once' communicates the sense in clear modern English
    while avoiding a wooden rendering that may confuse readers.
- source_word: ἐνέκοψεν
  chosen: hindered
  alternatives:
  - prevented
  - obstructed
  - blocked
  lexicon: BDAG
  rationale: ἐγκόπτω conveys the idea of cutting in on someone's path, hence impeding
    or preventing progress. 'Hindered' is a natural English equivalent that preserves
    the sense of obstruction without overstating absolute prevention.
- source_word: ὁ Σατανᾶς
  chosen: Satan
  alternatives:
  - the Adversary
  lexicon: BDAG
  rationale: Standard transliteration of the personal name/title in New Testament
    usage. Retaining 'Satan' matches established English convention and the source's
    personal reference.
