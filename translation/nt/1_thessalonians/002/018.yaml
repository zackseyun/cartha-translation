theological_decisions:
- issue: Agency of Satan in Paul's travel obstruction
  chosen_reading: but Satan hindered us
  alternative_readings:
  - but the Adversary hindered us
  - but Satan prevented us
  rationale: The text explicitly attributes the hindrance to Satan. The translation
    preserves that personal agency without softening it into an impersonal circumstance
    or strengthening it into absolute determinism beyond the lexical force of ἐνέκοψεν.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
