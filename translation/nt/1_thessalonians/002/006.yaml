theological_decisions:
- issue: Nature of the sought δόξα
  chosen_reading: human glory/acclaim, not divine glory
  alternative_readings:
  - human honor
  - human praise
  rationale: The phrase ἐξ ἀνθρώπων makes clear that the reference is to approval
    from human beings. The translation avoids wording that could imply seeking God's
    glory.
