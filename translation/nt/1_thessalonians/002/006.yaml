id: 1TH.2.6
reference: 1 Thessalonians 2:6
source:
  edition: SBLGNT
  text: οὔτε ζητοῦντες ἐξ ἀνθρώπων δόξαν, οὔτε ἀφ’ ὑμῶν οὔτε ἀπ’ ἄλλων,
translation:
  text: nor seeking glory from people, neither from you nor from others,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'honor' or 'praise' for 'glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητοῦντες
  chosen: seeking
  alternatives:
  - looking for
  - desiring
  lexicon: BDAG
  rationale: Present participle modifying the implied subject from the surrounding
    sentence; 'seeking' preserves the ongoing sense without overinterpreting motive
    beyond the Greek.
- source_word: ἐξ ἀνθρώπων
  chosen: from people
  alternatives:
  - from men
  - from human beings
  lexicon: BDAG
  rationale: ἄνθρωποι here is generic rather than specifically male. 'People' is natural
    modern English and reflects the source's generic human reference.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  - praise
  lexicon: BDAG
  rationale: δόξα in this context refers to human acclaim or honor. 'Glory' keeps
    the lexical connection to the common NT term while remaining understandable; alternatives
    are possible but less consistent with broader usage.
- source_word: οὔτε ... οὔτε ... οὔτε
  chosen: nor ... neither ... nor
  alternatives:
  - nor ... nor ... nor
  lexicon: LSJ
  rationale: The correlative negatives structure the clause. Rendering the first as
    'nor' connects smoothly with the prior verse, while 'neither ... nor' preserves
    the internal pairing of the final two phrases.
- source_word: ἀφ’ ὑμῶν
  chosen: from you
  alternatives:
  - from any of you
  lexicon: BDAG
  rationale: Direct second-person plural reference to the Thessalonian believers.
    'From you' is the most straightforward rendering.
- source_word: ἀπ’ ἄλλων
  chosen: from others
  alternatives:
  - from anyone else
  - from other people
  lexicon: BDAG
  rationale: ἄλλων is anarthrous and contextually refers to other people besides the
    Thessalonians. 'Others' is concise and natural.
