theological_decisions:
- issue: Referent of 'the Lord'
  chosen_reading: Rendered simply as 'the Lord' without specifying further in the
    translation.
  alternative_readings:
  - A specifically Christological reference
  - A more general divine reference
  rationale: The Greek text uses κύριος, and the translation should preserve the title
    without importing an interpretive gloss. Within Pauline usage the referent may
    be understood from context, but the verse itself does not require an explicit
    expansion.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → ''Lord'''
- issue: Scope of πάντας
  chosen_reading: '''all'' left broad rather than narrowed to ''all people'' or ''all
    believers.'''
  alternative_readings:
  - all people
  - all believers
  rationale: Paul likely broadens love beyond the Christian community, but the Greek
    adjective itself is unspecific. Preserving 'all' maintains the text's breadth
    and avoids interpretive narrowing.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
