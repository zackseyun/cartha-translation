id: 1TH.3.12
reference: 1 Thessalonians 3:12
source:
  edition: SBLGNT
  text: ὑμᾶς δὲ ὁ κύριος πλεονάσαι καὶ περισσεύσαι τῇ ἀγάπῃ εἰς ἀλλήλους καὶ εἰς πάντας,
    καθάπερ καὶ ἡμεῖς εἰς ὑμᾶς,
translation:
  text: And may the Lord cause you to increase and abound in love for one another
    and for all, just as we also do for you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward one another and toward all.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is elliptical in Greek, literally 'just as also we toward
      you,' with the sense supplied from the previous phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines; the default rendering
    is 'Lord.' In this Pauline benediction/prayer context it functions as the standard
    christological/divine title, not merely a social superior.
- source_word: πλεονάσαι
  chosen: cause you to increase
  alternatives:
  - make you increase
  - increase
  lexicon: BDAG
  rationale: Aorist optative in a wish-prayer construction after an implied 'may.'
    The causative nuance is best brought out in English with 'cause you to increase,'
    with the Lord as subject and 'you' as object.
- source_word: περισσεύσαι
  chosen: abound
  alternatives:
  - overflow
  - increase greatly
  lexicon: BDAG
  rationale: Used alongside πλεονάζω for rhetorical intensification. 'Abound' preserves
    the sense of superabundance without becoming overly paraphrastic. Rendering the
    pair as 'increase and abound' keeps both verbs distinct.
- source_word: τῇ ἀγάπῃ
  chosen: in love
  alternatives:
  - with love
  lexicon: BDAG
  rationale: 'ἀγάπη is rendered by the project''s default ''love.'' The dative is
    naturally expressed in English as the sphere/respect in which the increase occurs:
    ''in love.'''
- source_word: εἰς ἀλλήλους
  chosen: for one another
  alternatives:
  - toward one another
  - to one another
  lexicon: BDAG
  rationale: Although εἰς often means 'into/toward,' with relational nouns and verbs
    it can idiomatically indicate direction of affection. 'For one another' is idiomatic
    modern English and fits 'love' well.
- source_word: καὶ εἰς πάντας
  chosen: and for all
  alternatives:
  - and toward all
  - and for everyone
  lexicon: BDAG
  rationale: πάντας is broad and likely means all people, not only believers. 'For
    all' is concise and preserves the open scope of Paul's statement.
- source_word: καθάπερ καὶ ἡμεῖς εἰς ὑμᾶς
  chosen: just as we also do for you
  alternatives:
  - just as we also have for you
  - just as we also abound in love for you
  lexicon: BDAG
  rationale: The clause is elliptical; the verb of loving/abounding is understood
    from the previous phrase. English requires some completion, and 'do' supplies
    the ellipsis without over-specifying beyond the immediate context. 'Also' reflects
    καί.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here marks a smooth transition within Paul's prayer-wish rather than
    a strong contrast. 'And' is natural in English and fits the flow from the previous
    verse.
