id: 1TH.3.5
reference: 1 Thessalonians 3:5
source:
  edition: SBLGNT
  text: διὰ τοῦτο κἀγὼ μηκέτι στέγων ἔπεμψα εἰς τὸ γνῶναι τὴν πίστιν ὑμῶν, μή πως
    ἐπείρασεν ὑμᾶς ὁ πειράζων καὶ εἰς κενὸν γένηται ὁ κόπος ἡμῶν.
translation:
  text: For this reason, when I could bear it no longer, I sent to learn about your
    faith, lest somehow the tempter had tempted you and our labor might become empty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your faithfulness' or 'your trust.' The Greek word can carry overlapping
      senses depending on context.
    reason: alternative_reading
  - marker: b
    text: Or 'in vain' or 'for nothing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  rationale: Natural causal-consecutive rendering that preserves the backward reference
    to Paul's prior explanation.
- source_word: κἀγὼ
  chosen: I
  alternatives:
  - I also
  - I too
  lexicon: BDAG
  rationale: The καί element can be represented implicitly in English; the emphasis
    is not strong enough here to require 'also' in the main text.
- source_word: μηκέτι στέγων
  chosen: when I could bear it no longer
  alternatives:
  - no longer enduring
  - being unable to endure any longer
  lexicon: BDAG
  rationale: Idiomatic English for the participial expression, preserving the sense
    of continued endurance reaching its limit.
- source_word: ἔπεμψα
  chosen: I sent
  alternatives:
  - I sent someone
  - I dispatched
  lexicon: BDAG
  rationale: The object is implicit from context (Timothy in v. 2), but not stated
    here, so the translation keeps the verb simple without importing the object.
- source_word: εἰς τὸ γνῶναι
  chosen: to learn about
  alternatives:
  - to know
  - to find out
  lexicon: BDAG
  rationale: Purpose infinitive rendered idiomatically; 'learn about' fits English
    better than the more wooden 'to know' while preserving the investigative sense.
- source_word: τὴν πίστιν ὑμῶν
  chosen: your faith
  alternatives:
  - your faithfulness
  - your trust
  lexicon: BDAG
  rationale: Following the project's default for πίστις, the main text uses 'faith.'
    In context Paul is concerned with the Thessalonians' continuing believing response
    to the gospel; alternative nuances are preserved in a footnote.
- source_word: μή πως
  chosen: lest somehow
  alternatives:
  - for fear that somehow
  - that perhaps
  lexicon: BDAG
  rationale: Conveys Paul's apprehensive purpose/result nuance without overcomplicating
    the sentence.
- source_word: ἐπείρασεν ὑμᾶς ὁ πειράζων
  chosen: the tempter had tempted you
  alternatives:
  - the tempter might have tempted you
  - the one who tempts had tempted you
  - the tempter tested you
  lexicon: BDAG
  rationale: Retains the verbal repetition between noun/participle and finite verb.
    'Tempter' is preferable to the more neutral 'tester' because the context is satanic
    enticement away from faith, not a morally neutral test.
- source_word: ὁ πειράζων
  chosen: the tempter
  alternatives:
  - the one who tempts
  - the tester
  lexicon: BDAG
  rationale: Substantival participle rendered as a title-like designation. In context
    this refers to Satan, but the Greek uses the descriptive term rather than the
    proper name.
- source_word: εἰς κενὸν
  chosen: empty
  alternatives:
  - in vain
  - for nothing
  lexicon: BDAG
  rationale: The phrase means 'to no purpose' or 'in vain.' 'Empty' preserves the
    image of κενός and works naturally with 'become,' though the idiom is slightly
    less traditional than 'in vain'.
- source_word: γένηται
  chosen: might become
  alternatives:
  - might prove to be
  - would be
  lexicon: BDAG
  rationale: Aorist middle subjunctive after μή πως is well represented by 'might
    become,' preserving the prospective sense.
- source_word: ὁ κόπος ἡμῶν
  chosen: our labor
  alternatives:
  - our toil
  - our work
  lexicon: BDAG
  rationale: κόπος often carries the sense of strenuous labor. 'Labor' preserves that
    weight better than the broader 'work'.
