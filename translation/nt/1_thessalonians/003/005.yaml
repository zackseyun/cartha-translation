theological_decisions:
- issue: Rendering πίστις in a potentially nuanced Pauline context
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved in a footnote where contested. Here 'your faith' most
    naturally refers to the Thessalonians' continuing faith in response to the gospel,
    but 'faithfulness' is a plausible contextual nuance and is therefore footnoted
    rather than elevated to the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις'
