theological_decisions:
- issue: Force of Paul's statement 'now we live'
  chosen_reading: A rhetorical expression of renewed encouragement/vitality because
    of the Thessalonians' steadfastness, not a literal claim that his physical life
    depends on them.
  alternative_readings:
  - A hyperbolic statement of emotional relief
  - A nearly literal statement that his ministry's meaning depends on their perseverance
  rationale: The Greek wording is literal ('we live') but in context functions pastorally
    and rhetorically. The translation preserves the literal expression while avoiding
    interpretive expansion in the main text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Meaning of 'in the Lord'
  chosen_reading: Perseverance within the sphere of relationship to the Lord Jesus,
    without narrowing it to a specific denominational doctrine of perseverance.
  alternative_readings:
  - in union with the Lord
  - faithful to the Lord
  rationale: The phrase is theologically rich but broad. 'In the Lord' preserves Paul's
    wording and leaves the full theological nuance intact.
  doctrine_reference: Affirmations; Translation philosophy §3
