id: 1TH.3.10
reference: 1 Thessalonians 3:10
source:
  edition: SBLGNT
  text: νυκτὸς καὶ ἡμέρας ὑπερεκπερισσοῦ δεόμενοι εἰς τὸ ἰδεῖν ὑμῶν τὸ πρόσωπον καὶ
    καταρτίσαι τὰ ὑστερήματα τῆς πίστεως ὑμῶν;
translation:
  text: night and day praying most earnestly to see your face and to supply what is
    lacking in your faith,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is missing from your faith.' The Greek could also be understood
      more broadly as what still needs strengthening or completion in their faith.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυκτὸς καὶ ἡμέρας
  chosen: night and day
  alternatives:
  - by night and by day
  - night and daytime
  lexicon: BDAG
  rationale: Genitives used adverbially express continual or repeated activity. 'Night
    and day' is idiomatic, natural English and preserves the sense of ongoing earnestness.
- source_word: ὑπερεκπερισσοῦ
  chosen: most earnestly
  alternatives:
  - beyond measure
  - very exceedingly
  - most intensely
  lexicon: BDAG
  rationale: This rare adverb is an intensive superlative expression. 'Most earnestly'
    captures the force in readable English without sounding wooden; it modifies the
    manner of praying.
- source_word: δεόμενοι
  chosen: praying
  alternatives:
  - begging
  - imploring
  - making request
  lexicon: BDAG
  rationale: The participle denotes earnest petition. In context with the intensive
    adverb, 'praying' is sufficient and idiomatic, while the adverb carries the intensity.
    'Begging' would overstate the tone in English.
- source_word: εἰς τὸ ἰδεῖν
  chosen: to see
  alternatives:
  - for seeing
  - so that we might see
  lexicon: BDAG
  rationale: The preposition with articular infinitive expresses purpose/result. 'To
    see' is the most natural English rendering here.
- source_word: ὑμῶν τὸ πρόσωπον
  chosen: your face
  alternatives:
  - you face to face
  - your presence
  lexicon: BDAG
  rationale: Literally 'your face.' This idiom commonly means personal presence. 'Your
    face' preserves the concrete wording and natural English sense, with the relational
    nuance intact.
- source_word: καταρτίσαι
  chosen: to supply
  alternatives:
  - to restore
  - to equip
  - to complete
  - to make up
  lexicon: BDAG
  rationale: The verb can mean to put in order, restore, equip, or make complete.
    With 'what is lacking,' 'to supply' best fits the collocation and communicates
    Paul's desire to provide what is needed for their faith.
- source_word: τὰ ὑστερήματα
  chosen: what is lacking
  alternatives:
  - the deficiencies
  - the shortcomings
  - what is missing
  lexicon: BDAG
  rationale: The plural noun refers to deficiencies or lacks. English idiom prefers
    the singular collective expression 'what is lacking' in this construction.
- source_word: τῆς πίστεως ὑμῶν
  chosen: in your faith
  alternatives:
  - of your faith
  - in your trust
  - in your faithfulness
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine guidance. Here the genitive is
    best represented in English as 'in your faith' after 'what is lacking,' indicating
    areas where their faith needs strengthening rather than implying absence of faith
    altogether.
