- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine table sets 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. In this verse the sense is the Thessalonians'
    faith as belief/trust needing strengthening, not primarily their faithfulness
    as conduct, though that nuance is lexically possible.
