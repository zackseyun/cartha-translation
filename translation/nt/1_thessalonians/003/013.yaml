theological_decisions:
- issue: Referent of 'all his holy ones'
  chosen_reading: Kept as 'holy ones' without specifying whether these are angels,
    glorified believers, or both.
  alternative_readings:
  - all his saints
  - all his angels
  rationale: The Greek ἁγίων is formally broad enough to allow more than one referent
    in this eschatological setting. The translation preserves the textual ambiguity
    rather than resolving it beyond what the verse itself states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
