id: 1TH.3.13
reference: 1 Thessalonians 3:13
source:
  edition: SBLGNT
  text: εἰς τὸ στηρίξαι ὑμῶν τὰς καρδίας ἀμέμπτους ἐν ἁγιωσύνῃ ἔμπροσθεν τοῦ θεοῦ
    καὶ πατρὸς ἡμῶν ἐν τῇ παρουσίᾳ τοῦ κυρίου ἡμῶν ⸀Ἰησοῦ μετὰ πάντων τῶν ἁγίων ⸀αὐτοῦ.
translation:
  text: so that he may establish your hearts blameless in holiness before our God
    and Father at the coming of our Lord Jesus with all his holy ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with all his saints.' The Greek 'holy ones' may refer to holy people,
      angels, or both in this context.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς τὸ στηρίξαι
  chosen: so that he may establish
  alternatives:
  - for the purpose of establishing
  - to establish
  lexicon: BDAG
  rationale: The preposition with the articular infinitive expresses purpose/result
    flowing from the previous verse. English idiom is best served by an explicit finite
    clause, 'so that he may establish,' while preserving the purposive force.
- source_word: στηρίξαι
  chosen: establish
  alternatives:
  - strengthen
  - make firm
  lexicon: BDAG
  rationale: The verb carries the sense of strengthening or making firm. 'Establish'
    fits Pauline usage well here, especially with 'hearts' as the object, and preserves
    both firmness and stability.
- source_word: καρδίας
  chosen: hearts
  alternatives:
  - inner selves
  - minds
  lexicon: BDAG
  rationale: '''Hearts'' is the natural and theologically resonant rendering for καρδία
    in Paul, referring to the inner person rather than merely emotions.'
- source_word: ἀμέμπτους
  chosen: blameless
  alternatives:
  - without blame
  - irreproachable
  lexicon: BDAG
  rationale: '''Blameless'' is concise, idiomatic, and preserves the moral/judicial
    nuance of being free from valid accusation.'
- source_word: ἐν ἁγιωσύνῃ
  chosen: in holiness
  alternatives:
  - in sanctity
  - in consecration
  lexicon: BDAG
  rationale: ἁγιωσύνη denotes holiness as a state or quality. 'In holiness' is the
    most natural English equivalent and avoids more technical or less familiar alternatives.
- source_word: ἔμπροσθεν
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: The preposition marks standing in God's sight. 'Before' is concise and
    fully adequate in English.
- source_word: τοῦ θεοῦ καὶ πατρὸς ἡμῶν
  chosen: our God and Father
  alternatives:
  - God our Father
  lexicon: BDAG
  rationale: The genitival phrase is most directly represented as 'our God and Father.'
    This preserves the coordinate structure while still reading naturally.
- source_word: παρουσίᾳ
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In this eschatological context, παρουσία conventionally refers to the
    future coming/arrival of the Lord. 'Coming' is the clearest and most established
    rendering in English. 'Presence' is lexically possible but less suitable here.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This matches both NT
    usage and the christological force of the title.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention.
- source_word: μετὰ πάντων τῶν ἁγίων αὐτοῦ
  chosen: with all his holy ones
  alternatives:
  - with all his saints
  - with all his holy people
  lexicon: BDAG
  rationale: ἅγιοι can denote 'saints' or 'holy ones.' Here the referent may be angels
    or believers, and 'holy ones' preserves that breadth without prematurely narrowing
    the sense. 'Saints' is traditional but in modern English can imply canonized persons;
    'holy people' would over-resolve the referent toward humans.
