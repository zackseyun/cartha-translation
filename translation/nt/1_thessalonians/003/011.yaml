theological_decisions:
- issue: Singular verb with coordinated subjects ('our God and Father' and 'our Lord
    Jesus')
  chosen_reading: 'Retain both subjects plainly and translate the singular optative
    as a unified prayer: ''may our God and Father himself, and our Lord Jesus, direct...''.'
  alternative_readings:
  - Restructure to avoid drawing attention to the singular verb
  - Interpret the singular as applying primarily to God alone
  rationale: The Greek presents the Father and the Lord Jesus together as the subjects
    of a single singular verb, a notable Pauline formulation. The translation should
    preserve this grammatical-theological feature without adding explanatory wording
    beyond the text. This aligns with historic orthodoxy while not importing claims
    not made explicitly by the verse.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language); Translation philosophy §3 Preserve theological tension rather than
    resolve it.'
