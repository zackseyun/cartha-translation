id: 1TH.3.2
reference: 1 Thessalonians 3:2
source:
  edition: SBLGNT
  text: καὶ ἐπέμψαμεν Τιμόθεον, τὸν ἀδελφὸν ἡμῶν καὶ ⸀συνεργὸν τοῦ ⸀θεοῦ ἐν τῷ εὐαγγελίῳ
    τοῦ Χριστοῦ, εἰς τὸ στηρίξαι ὑμᾶς καὶ παρακαλέσαι ⸀ὑπὲρ τῆς πίστεως ὑμῶν
translation:
  text: and we sent Timothy, our brother and God's fellow worker in the gospel of
    the Messiah, to strengthen you and to encourage you concerning your faith,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'co-worker with God.' Some manuscripts and translations have a different
      wording here, such as 'servant of God.'
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because the title sense is prominent.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέμψαμεν
  chosen: we sent
  alternatives:
  - we dispatched
  lexicon: BDAG
  rationale: Aorist indicative of πέμπω is naturally rendered as a simple past narrative
    verb. 'Sent' is idiomatic and sufficiently formal without sounding bureaucratic
    like 'dispatched.'
- source_word: Τιμόθεον
  chosen: Timothy
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: ἀδελφὸν ἡμῶν
  chosen: our brother
  alternatives:
  - our fellow believer
  - our brother in the faith
  lexicon: BDAG
  rationale: The Greek is singular masculine with familial metaphor commonly used
    among believers. 'Our brother' preserves the source wording and relational force
    better than an interpretive expansion.
- source_word: συνεργὸν τοῦ θεοῦ
  chosen: God's fellow worker
  alternatives:
  - fellow worker of God
  - co-worker with God
  lexicon: BDAG
  rationale: 'The genitive most naturally indicates relation to God: Timothy is described
    as God''s fellow worker. ''Co-worker with God'' is possible but can suggest a
    more interpretive instrumental nuance; ''God''s fellow worker'' stays closer to
    the Greek while remaining readable.'
- source_word: ἐν τῷ εὐαγγελίῳ τοῦ Χριστοῦ
  chosen: in the gospel of the Messiah
  alternatives:
  - in the gospel of Christ
  - in God's gospel about the Messiah
  lexicon: BDAG
  rationale: 'ἐν marks sphere or activity: Timothy labors in the sphere of the gospel.
    Χριστοῦ is rendered ''the Messiah'' because Χριστός functions as a title here,
    in keeping with doctrine guidance. ''Gospel of the Messiah'' preserves the genitive
    without over-resolving whether it is subjective or objective.'
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated 'Messiah' where it functions as a
    title rather than a name-like form. Here the genitival construction with εὐαγγέλιον
    supports title force.
- source_word: εἰς τὸ στηρίξαι
  chosen: to strengthen
  alternatives:
  - in order to strengthen
  - to establish
  lexicon: BDAG
  rationale: The articular infinitive with εἰς expresses purpose. 'To strengthen'
    is clear modern English and fits the pastoral context; 'establish' is possible
    but less immediately accessible.
- source_word: παρακαλέσαι
  chosen: to encourage
  alternatives:
  - to exhort
  - to comfort
  lexicon: BDAG
  rationale: παρακαλέω can mean encourage, exhort, or comfort depending on context.
    Here, alongside 'strengthen' and in relation to their faith under pressure, 'encourage'
    best captures the supportive pastoral sense without narrowing it to consolation
    alone.
- source_word: ὑπὲρ τῆς πίστεως ὑμῶν
  chosen: concerning your faith
  alternatives:
  - for the sake of your faith
  - about your faith
  lexicon: BDAG
  rationale: ὑπέρ with the genitive can mean 'concerning' or 'for the sake of.' In
    this context of pastoral support, 'concerning your faith' fits the sense of encouragement
    with respect to their faith. 'Faith' follows the default rendering for πίστις.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine, πίστις defaults to 'faith.' In this verse the referent
    is the Thessalonians' believing response and steadfast reliance, not primarily
    their faithfulness as a quality, though that nuance is related.
