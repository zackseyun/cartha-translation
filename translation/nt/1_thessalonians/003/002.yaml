theological_decisions:
- issue: Rendering συνεργὸν τοῦ θεοῦ
  chosen_reading: God's fellow worker
  alternative_readings:
  - co-worker with God
  - servant of God
  rationale: The SBLGNT text reads συνεργὸν τοῦ θεοῦ, a strong expression that should
    not be weakened to 'servant of God' merely to avoid theological discomfort. The
    translation preserves the wording while avoiding overinterpretation. An alternative
    phrasing is preserved in a footnote because some manuscripts/readings and translations
    differ, and because the expression can be heard differently in English.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering Χριστοῦ in εὐαγγελίῳ τοῦ Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, so 'Messiah' best preserves meaning
    per doctrine. The traditional 'Christ' is preserved as an alternative in a footnote
    for readers familiar with standard English Bible phrasing.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah where title; Christ
    where name-like.'
