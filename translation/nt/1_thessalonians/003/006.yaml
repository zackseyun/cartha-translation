id: 1TH.3.6
reference: 1 Thessalonians 3:6
source:
  edition: SBLGNT
  text: Ἄρτι δὲ ἐλθόντος Τιμοθέου πρὸς ἡμᾶς ἀφ’ ὑμῶν καὶ εὐαγγελισαμένου ἡμῖν τὴν
    πίστιν καὶ τὴν ἀγάπην ὑμῶν, καὶ ὅτι ἔχετε μνείαν ἡμῶν ἀγαθὴν πάντοτε ἐπιποθοῦντες
    ἡμᾶς ἰδεῖν καθάπερ καὶ ἡμεῖς ὑμᾶς,
translation:
  text: But now that Timothy has come to us from you and has brought us the good news
    of your faith and love, and that you always have a good remembrance of us, longing
    to see us just as we also long to see you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your faithfulness." The Greek word pistis can denote faith, trust, or
      faithfulness; the main text follows the project's default rendering "faith."
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄρτι
  chosen: now
  alternatives:
  - just now
  - at present
  lexicon: BDAG
  rationale: Marks the present point in the discourse in contrast to Paul's earlier
    anxiety; 'now' is natural English and fits the transitional force.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Signals a mild contrast/transition from the previous verse; 'But' best
    reflects the shift from concern to relief.
- source_word: ἐλθόντος Τιμοθέου πρὸς ἡμᾶς ἀφ’ ὑμῶν
  chosen: that Timothy has come to us from you
  alternatives:
  - with Timothy having come to us from you
  - since Timothy came to us from you
  lexicon: BDAG
  rationale: The genitive absolute is rendered idiomatically in English with a finite
    clause. Perfect-like English 'has come' suits the recent arrival implied by ἄρτι.
- source_word: εὐαγγελισαμένου
  chosen: has brought us the good news
  alternatives:
  - has reported good news to us
  - has evangelized us with
  lexicon: BDAG
  rationale: Though often used for proclaiming the gospel, here the verb refers to
    Timothy's favorable report. 'Brought us the good news' preserves the verbal connection
    to gospel language without sounding wooden.
- source_word: τὴν πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text. In
    this context it likely denotes the Thessalonians' continuing faith, though 'faithfulness'
    is a plausible nuance and is preserved in a footnote.
- source_word: τὴν ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Standard rendering of ἀγάπη; no contextual reason to vary from the default.
- source_word: μνείαν ἡμῶν ἀγαθὴν
  chosen: a good remembrance of us
  alternatives:
  - a good memory of us
  - kind thoughts of us
  lexicon: BDAG
  rationale: μνεία is 'remembrance/mention.' 'A good remembrance of us' stays close
    to the Greek while remaining understandable. 'Kind thoughts of us' is smoother
    but more interpretive.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: Straightforward adverbial rendering.
- source_word: ἐπιποθοῦντες ἡμᾶς ἰδεῖν
  chosen: longing to see us
  alternatives:
  - eagerly desiring to see us
  - yearning to see us
  lexicon: BDAG
  rationale: ἐπιποθέω conveys strong affectionate desire; 'longing' is natural and
    preserves the emotional force.
- source_word: καθάπερ καὶ ἡμεῖς ὑμᾶς
  chosen: just as we also long to see you
  alternatives:
  - just as we also do to see you
  - even as we also long for you
  lexicon: BDAG
  rationale: Makes explicit the implied verb from the previous participial phrase
    for clear English while preserving the reciprocal comparison.
