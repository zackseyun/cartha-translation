theological_decisions:
- issue: Rendering of πίστις in a context where 'faith' and 'faithfulness' are both
    possible nuances
  chosen_reading: your faith
  alternative_readings:
  - your faithfulness
  rationale: Following the doctrine table, πίστις defaults to 'faith' in the main
    text. Here the report likely concerns the Thessalonians' continuing trust in God/the
    gospel, though the semantic overlap with steadfastness warrants preserving 'faithfulness'
    in a footnote rather than collapsing the nuance.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy #3'
