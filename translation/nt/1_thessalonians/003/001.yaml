id: 1TH.3.1
reference: 1 Thessalonians 3:1
source:
  edition: SBLGNT
  text: Διὸ μηκέτι στέγοντες εὐδοκήσαμεν καταλειφθῆναι ἐν Ἀθήναις μόνοι,
translation:
  text: Therefore, when we could bear it no longer, we were pleased to be left alone
    in Athens,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when we could endure it no longer.'
    reason: lexical_alternative
  - marker: b
    text: Or 'we thought it best to be left behind in Athens by ourselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding context. 'Therefore'
    is natural modern English and preserves the logical connection.
- source_word: μηκέτι
  chosen: no longer
  alternatives:
  - not any longer
  - no more
  lexicon: BDAG
  rationale: Adverb indicating cessation or the limit of endurance. 'No longer' is
    the standard concise rendering in this construction.
- source_word: στέγοντες
  chosen: could bear it
  alternatives:
  - enduring
  - putting up with it
  - holding out
  lexicon: BDAG
  rationale: The participle from στέγω here carries the sense of enduring or bearing
    up under emotional strain. Rendering it idiomatically as 'could bear it' best
    fits the context of concern for the Thessalonians and works naturally with μηκέτι.
- source_word: εὐδοκήσαμεν
  chosen: we were pleased
  alternatives:
  - we decided gladly
  - we thought it best
  - we were willing
  lexicon: BDAG
  rationale: The verb can denote taking pleasure in, being willing, or deciding favorably.
    'We were pleased' preserves the positive volitional nuance without overinterpreting
    it as merely pragmatic decision-making.
- source_word: καταλειφθῆναι
  chosen: to be left
  alternatives:
  - to be left behind
  - to remain
  lexicon: BDAG
  rationale: Aorist passive infinitive of καταλείπω. 'To be left' is the most direct
    rendering; 'behind' is possible but not required by the Greek. The passive sense
    should be preserved.
- source_word: ἐν Ἀθήναις
  chosen: in Athens
  lexicon: BDAG
  rationale: Standard locative rendering of the place name Ἀθῆναι.
- source_word: μόνοι
  chosen: alone
  alternatives:
  - by ourselves
  lexicon: BDAG
  rationale: Predicate adjective describing Paul's party as left without companions.
    'Alone' is concise and idiomatic; it also prepares for the following verse's mention
    of sending Timothy.
