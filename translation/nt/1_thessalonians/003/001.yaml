theological_decisions:
- issue: Referent of the first person plural and singular/plural tension with the
    wider context
  chosen_reading: Retain the plural 'we' and 'alone' as stated in the Greek without
    harmonizing to a singular paraphrase.
  alternative_readings:
  - Interpret as an epistolary plural referring mainly to Paul
  - Paraphrase as 'I decided to stay alone' to match Acts-based reconstruction
  rationale: The Greek text uses first person plural forms (εὐδοκήσαμεν, μόνοι). Even
    if interpreters debate whether Paul speaks for himself alone or for a missionary
    team, the translation should preserve the grammatical form rather than resolve
    the historical question in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
