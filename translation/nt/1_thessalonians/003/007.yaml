theological_decisions:
- issue: Rendering of πίστις in a context where steadfastness may be in view
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: The doctrine excerpt specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved in footnotes where contested. Here Paul is encouraged
    by the Thessalonians' continuing trust in God, which also implies steadfastness;
    the main text keeps 'faith' and the footnote preserves 'faithfulness.'
