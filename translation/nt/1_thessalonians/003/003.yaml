id: 1TH.3.3
reference: 1 Thessalonians 3:3
source:
  edition: SBLGNT
  text: τὸ μηδένα σαίνεσθαι ἐν ταῖς θλίψεσιν ταύταις. αὐτοὶ γὰρ οἴδατε ὅτι εἰς τοῦτο
    κείμεθα·
translation:
  text: so that no one would be shaken by these afflictions. For you yourselves know
    that we are appointed for this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'disturbed,' 'unsettled'; the rare verb may also carry the sense 'deceived'
      or 'won over by flattery' in other contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'tribulations.'
    reason: lexical_alternative
  - marker: c
    text: Or 'we are destined for this' or 'we are set for this.'
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ μηδένα σαίνεσθαι
  chosen: so that no one would be shaken
  alternatives:
  - that no one be disturbed
  - that no one be unsettled
  - that no one be deceived/flattered
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose/result in connection with
    the previous verse, naturally rendered in English as 'so that no one would…'.
    σαίνεσθαι is rare and in context refers to being unsettled or disturbed by suffering;
    'shaken' is idiomatic, concise, and fits the pastoral concern. The older lexical
    sense 'deceived/flattered' is less likely here but worth preserving as a lexical
    alternative.
- source_word: ἐν ταῖς θλίψεσιν ταύταις
  chosen: by these afflictions
  alternatives:
  - in these afflictions
  - by these tribulations
  lexicon: BDAG
  rationale: θλίψεσιν denotes troubles, pressures, or afflictions. 'Afflictions' preserves
    the weight of the term in Pauline usage without sounding archaic. Although ἐν
    is formally 'in,' English idiom with 'shaken' is better as 'by these afflictions,'
    expressing the means/circumstance causing the disturbance.
- source_word: αὐτοὶ
  chosen: you yourselves
  alternatives:
  - you yourselves indeed
  - you
  lexicon: BDAG
  rationale: The pronoun is emphatic; 'you yourselves' preserves the emphasis better
    than a simple 'you'.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces the explanatory ground for the preceding statement. 'For'
    is the most natural concise rendering here.
- source_word: οἴδατε
  chosen: know
  alternatives:
  - have known
  - are aware
  lexicon: BDAG
  rationale: Although οἶδα is formally perfect in form, it functions with present
    sense. 'Know' is the standard English equivalent.
- source_word: εἰς τοῦτο
  chosen: for this
  alternatives:
  - for this purpose
  - for this very thing
  - to this
  lexicon: BDAG
  rationale: The phrase points to the reality just mentioned, namely afflictions as
    part of the believers' calling/lot. 'For this' is natural and sufficiently precise;
    'for this purpose' is possible but slightly more interpretive.
- source_word: κείμεθα
  chosen: we are appointed
  alternatives:
  - we are destined
  - we are set
  - we are laid/placed
  lexicon: BDAG
  rationale: κεῖμαι literally means 'lie' or 'be placed,' but in this idiom it conveys
    being appointed or destined for something. 'Appointed' captures the passive, divinely
    ordered nuance without overloading the statement with fatalistic connotations.
