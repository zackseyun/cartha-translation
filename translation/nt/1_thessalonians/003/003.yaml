theological_decisions:
- issue: Nature of believers' relation to suffering in εἰς τοῦτο κείμεθα
  chosen_reading: we are appointed for this
  alternative_readings:
  - we are destined for this
  - we are set for this
  rationale: The verse teaches that afflictions are an expected part of Christian
    life, but it does not specify a detailed doctrine of predestination beyond God's
    ordering of suffering in discipleship. 'Appointed' preserves the text's theological
    weight without importing a narrower denominational framework.
  doctrine_reference: Affirmations; Translation philosophy §3
