theological_decisions:
- issue: Referent of 'this matter' and nature of the wrong
  chosen_reading: The verse continues the sexual-ethics instruction of vv. 3–5, warning
    against violating and exploiting a fellow believer in sexual matters.
  alternative_readings:
  - The verse refers more generally to business or interpersonal fraud.
  rationale: The immediate context concerns sanctification, sexual immorality, and
    controlling one's own body in holiness. While πλεονεκτεῖν can be used for defrauding
    more generally, the surrounding argument strongly favors a sexual context. The
    translation therefore uses broader but morally pointed language ('exploit ...
    in this matter') and preserves the more specific traditional alternative in a
    footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of ἀδελφός
  chosen_reading: his brother
  alternative_readings:
  - his brother or sister
  - another believer
  rationale: The Greek is masculine singular, and the doctrine requires gender-accurate
    rendering in the main text. Because the ethical principle may extend more broadly
    within the believing community, an inclusive implication may be noted in a footnote
    rather than replacing the source's form.
  doctrine_reference: Translation philosophy §4
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: DOCTRINE.md specifies 'Lord' as the default rendering for κύριος. In
    this context it refers to the risen Lord exercising judgment, and 'Lord' preserves
    both theological and lexical continuity.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
