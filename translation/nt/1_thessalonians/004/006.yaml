id: 1TH.4.6
reference: 1 Thessalonians 4:6
source:
  edition: SBLGNT
  text: τὸ μὴ ὑπερβαίνειν καὶ πλεονεκτεῖν ἐν τῷ πράγματι τὸν ἀδελφὸν αὐτοῦ, διότι
    ἔκδικος ⸀κύριος περὶ πάντων τούτων, καθὼς καὶ προείπαμεν ὑμῖν καὶ διεμαρτυράμεθα.
translation:
  text: that no one should overstep and exploit his brother in this matter, because
    the Lord is an avenger concerning all these things, just as we also told you beforehand
    and solemnly warned you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'defraud his brother in the matter.' The Greek can denote taking advantage
      of someone, and some understand the phrase more narrowly as fraud; in context,
      the warning most likely concerns sexual wrongdoing.
    reason: lexical_alternative
  - marker: b
    text: '''His brother'' translates a masculine singular Greek expression. The wording
      likely focuses on a fellow believer, though the ethical warning may apply more
      broadly within the community.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ μὴ ὑπερβαίνειν
  chosen: that no one should overstep
  alternatives:
  - that he should not transgress
  - not to go beyond
  lexicon: BDAG
  rationale: The articular infinitive continues the exhortational content from the
    previous verse. ὑπερβαίνω here is idiomatic for crossing a moral boundary, so
    'overstep' preserves the metaphor while sounding natural in English. 'No one should'
    makes explicit the generic force in context.
- source_word: πλεονεκτεῖν
  chosen: exploit
  alternatives:
  - take advantage of
  - defraud
  lexicon: BDAG
  rationale: In this sexual-ethics context, the verb denotes taking more than is right
    at another's expense. 'Exploit' captures the broader moral wrong without narrowing
    it only to financial fraud; 'defraud' is a traditional option and worth preserving
    in a footnote because some interpreters take the phrase in a more commercial sense.
- source_word: ἐν τῷ πράγματι
  chosen: in this matter
  alternatives:
  - in the matter
  - in this affair
  lexicon: BDAG
  rationale: πρᾶγμα is contextually specific but somewhat general in wording. Given
    the immediate context about sexual holiness (vv. 3–5), 'in this matter' is natural
    English and preserves the referential link without over-specifying beyond the
    Greek.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  chosen: his brother
  alternatives:
  - his brother or sister
  - his fellow believer
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral. 'His brother' matches the source form
    and likely refers to a fellow believer within the Christian community; broader
    inclusive implications can be noted in a footnote rather than flattened in the
    main text.
- source_word: ἔκδικος κύριος
  chosen: the Lord is an avenger
  alternatives:
  - the Lord is one who carries out justice
  - the Lord takes vengeance
  lexicon: BDAG
  rationale: ἔκδικος denotes one who exacts justice or avenges wrongdoing. 'An avenger'
    is concise and preserves the judicial force. κύριος is rendered 'Lord' per doctrinal
    default.
- source_word: περὶ πάντων τούτων
  chosen: concerning all these things
  alternatives:
  - about all these things
  - in regard to all these matters
  lexicon: BDAG
  rationale: A fairly direct rendering that keeps the scope broad, referring to the
    sexual sins and wrongs under discussion.
- source_word: προείπαμεν
  chosen: told you beforehand
  alternatives:
  - said to you before
  - warned you previously
  lexicon: BDAG
  rationale: The compound verb indicates prior communication. 'Told you beforehand'
    preserves the temporal sense without redundancy with the following stronger warning
    verb.
- source_word: διεμαρτυράμεθα
  chosen: solemnly warned you
  alternatives:
  - testified earnestly
  - strongly charged you
  lexicon: BDAG
  rationale: διαμαρτύρομαι often carries the sense of emphatic testimony or solemn
    warning. In this paraenetic context, 'solemnly warned you' best conveys the force.
