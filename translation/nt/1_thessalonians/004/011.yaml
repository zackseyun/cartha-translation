id: 1TH.4.11
reference: 1 Thessalonians 4:11
source:
  edition: SBLGNT
  text: καὶ φιλοτιμεῖσθαι ἡσυχάζειν καὶ πράσσειν τὰ ἴδια καὶ ἐργάζεσθαι ⸀ταῖς χερσὶν
    ὑμῶν, καθὼς ὑμῖν παρηγγείλαμεν,
translation:
  text: and to aspire to live quietly, to mind your own affairs, and to work with
    your own hands, just as we commanded you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make it your ambition to be quiet.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to attend to your own business.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλοτιμεῖσθαι
  chosen: to aspire
  alternatives:
  - to make it your ambition
  - to be eager
  - to strive earnestly
  lexicon: BDAG
  rationale: The verb carries the sense of considering something an honor or ambition
    and thus striving for it. 'Aspire' is concise modern English and fits the infinitival
    series, while preserving the paradoxical force of making it one's ambition to
    be quiet. 'Make it your ambition' is a strong alternative but more expansive.
- source_word: ἡσυχάζειν
  chosen: to live quietly
  alternatives:
  - to be quiet
  - to keep calm
  - to be at rest
  lexicon: BDAG
  rationale: In this paraenetic context the sense is not absolute silence but a quiet,
    settled manner of life. 'Live quietly' communicates lifestyle rather than mere
    speech restraint and reads naturally in English.
- source_word: πράσσειν τὰ ἴδια
  chosen: to mind your own affairs
  alternatives:
  - to do your own things
  - to attend to your own business
  - to mind your own business
  lexicon: BDAG
  rationale: The idiom refers to attending to one's own matters. 'Mind your own affairs'
    preserves the sense without the potentially abrasive modern idiom 'mind your own
    business.' 'Do your own things' is too literal and unnatural.
- source_word: ἐργάζεσθαι
  chosen: to work
  alternatives:
  - to labor
  - to be employed
  lexicon: BDAG
  rationale: The verb broadly means to work or labor. 'Work' is the most natural and
    sufficiently broad rendering here.
- source_word: ταῖς χερσὶν ὑμῶν
  chosen: with your own hands
  alternatives:
  - with your hands
  - by your own hands
  lexicon: BDAG
  rationale: The dative is instrumental. Including 'own' reflects the possessive ὑμῶν
    and preserves Paul's emphasis on manual self-support.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: BDAG
  rationale: Introduces comparison to prior apostolic instruction. 'Just as' is idiomatic
    and slightly emphatic.
- source_word: παρηγγείλαμεν
  chosen: we commanded
  alternatives:
  - we instructed
  - we gave orders
  - we directed
  lexicon: BDAG
  rationale: παραγγέλλω can denote authoritative instruction. In this context Paul
    recalls prior apostolic charge, and 'commanded' best reflects that force without
    overstating beyond the verb's normal range.
