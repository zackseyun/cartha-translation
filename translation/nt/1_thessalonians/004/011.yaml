theological_decisions:
- issue: Ethical force of apostolic instruction
  chosen_reading: Rendered παραγγέλλω as 'commanded' to preserve the authoritative
    tone of Paul's exhortation.
  alternative_readings:
  - '''instructed'''
  - '''directed'''
  rationale: This is not a doctrinally contested term in DOCTRINE.md, but the verse
    presents apostolic moral instruction with real authority. 'Commanded' best reflects
    the imperative weight while remaining faithful to the Greek.
  doctrine_reference: Translation philosophy §1, §6
