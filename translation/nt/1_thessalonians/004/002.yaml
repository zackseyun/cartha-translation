id: 1TH.4.2
reference: 1 Thessalonians 4:2
source:
  edition: SBLGNT
  text: οἴδατε γὰρ τίνας παραγγελίας ἐδώκαμεν ὑμῖν διὰ τοῦ κυρίου Ἰησοῦ.
translation:
  text: For you know what instructions we gave you through the Lord Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by the authority of the Lord Jesus.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἴδατε
  chosen: you know
  alternatives:
  - you have known
  - you are aware
  lexicon: BDAG
  rationale: Perfect-form οἶδα functions with present sense in Koine; 'you know' is
    the natural English rendering.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation/grounding for the preceding statement; 'For' preserves
    the connective force without overtranslating.
- source_word: τίνας
  chosen: what
  alternatives:
  - which
  - what sort of
  lexicon: BDAG
  rationale: Introduces the content of what they know in idiomatic English. Although
    formally plural with παραγγελίας, English 'what instructions' best conveys the
    sense.
- source_word: παραγγελίας
  chosen: instructions
  alternatives:
  - commands
  - charges
  - directives
  lexicon: BDAG
  rationale: παραγγελία can denote authoritative instruction or command. 'Instructions'
    fits optimal equivalence and readable modern English, while still allowing the
    authoritative nuance to be carried by context and the following phrase 'through
    the Lord Jesus.'
- source_word: ἐδώκαμεν
  chosen: we gave
  alternatives:
  - we delivered
  - we issued
  lexicon: BDAG
  rationale: Aorist of δίδωμι is straightforwardly rendered 'gave'; this is natural
    with παραγγελίας in English.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Indirect object is naturally expressed in English without repeating 'to';
    the sense remains clear.
- source_word: διὰ τοῦ κυρίου Ἰησοῦ
  chosen: through the Lord Jesus
  alternatives:
  - by the authority of the Lord Jesus
  - through Lord Jesus
  lexicon: BDAG
  rationale: διά with the genitive commonly denotes means or agency, here indicating
    that Paul's instructions were mediated through or given under the agency/authority
    of the Lord Jesus. 'Through the Lord Jesus' preserves the Greek wording while
    allowing the authority nuance to remain implicit.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord'.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention per project philosophy.
