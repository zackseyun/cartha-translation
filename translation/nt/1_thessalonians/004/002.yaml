theological_decisions:
- issue: Force of διὰ τοῦ κυρίου Ἰησοῦ
  chosen_reading: through the Lord Jesus
  alternative_readings:
  - by the authority of the Lord Jesus
  rationale: The phrase could be understood instrumentally/mediationally or as shorthand
    for authority. The main text keeps the more formally transparent 'through,' preserving
    the wording and theological texture without narrowing the sense. The authority
    nuance is preserved as an alternative because it is contextually plausible.
  doctrine_reference: 'Translation philosophy §3, §6; Contested terms: κύριος → Lord'
