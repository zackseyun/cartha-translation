id: 1TH.4.16
reference: 1 Thessalonians 4:16
source:
  edition: SBLGNT
  text: ὅτι αὐτὸς ὁ κύριος ἐν κελεύσματι, ἐν φωνῇ ἀρχαγγέλου καὶ ἐν σάλπιγγι θεοῦ,
    καταβήσεται ἀπ’ οὐρανοῦ, καὶ οἱ νεκροὶ ἐν Χριστῷ ἀναστήσονται πρῶτον,
translation:
  text: For the Lord himself will descend from heaven with a command, with an archangel’s
    voice, and with God’s trumpet, and the dead in Messiah will rise first,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with a shout of command.” The Greek κέλευσμα can denote a summons or
      commanding cry.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “the dead in Christ will rise first.”'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: In context this conjunction introduces the explanation for the preceding
    assurance, so 'For' best captures the explanatory force in natural English.
- source_word: αὐτὸς ὁ κύριος
  chosen: the Lord himself
  alternatives:
  - the Lord himself personally
  - the Lord himself
  lexicon: BDAG
  rationale: The intensive pronoun αὐτός with the article and noun emphasizes the
    subject; 'himself' preserves that emphasis. κύριος follows the doctrinal default
    'Lord' rather than 'Master'.
- source_word: ἐν κελεύσματι
  chosen: with a command
  alternatives:
  - with a shout of command
  - with a commanding call
  lexicon: BDAG
  rationale: κέλευσμα denotes a command or summons, often a shouted order. 'With a
    command' is concise and faithful; the more explicit 'shout of command' is plausible
    but slightly more interpretive, so it is preserved in a footnote.
- source_word: ἐν φωνῇ ἀρχαγγέλου
  chosen: with an archangel’s voice
  alternatives:
  - with the voice of an archangel
  lexicon: BDAG
  rationale: φωνή is 'voice' and the genitive ἀρχαγγέλου is naturally rendered possessively
    in English. The anarthrous form does not require 'the' archangel, so 'an archangel’s
    voice' better reflects the Greek.
- source_word: ἐν σάλπιγγι θεοῦ
  chosen: with God’s trumpet
  alternatives:
  - with the trumpet of God
  lexicon: BDAG
  rationale: σάλπιγξ means 'trumpet.' The genitive θεοῦ is rendered as a possessive
    for readable modern English without loss of meaning.
- source_word: καταβήσεται ἀπ’ οὐρανοῦ
  chosen: will descend from heaven
  alternatives:
  - will come down from heaven
  lexicon: BDAG
  rationale: καταβαίνω means 'descend' or 'come down.' 'Will descend from heaven'
    preserves the elevated register appropriate to the passage while remaining natural.
- source_word: οἱ νεκροὶ
  chosen: the dead
  alternatives:
  - the dead ones
  lexicon: BDAG
  rationale: The adjective functions substantivally here; standard English idiom is
    'the dead.'
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Per translation philosophy, Χριστός is rendered 'Messiah' where it functions
    as a title. Here the phrase denotes union with the anointed one, so 'in Messiah'
    preserves the title's meaning. The traditional 'in Christ' is preserved in a footnote
    as a familiar alternative.
- source_word: ἀναστήσονται
  chosen: will rise
  alternatives:
  - will be raised
  - will arise
  lexicon: BDAG
  rationale: Future middle of ἀνίστημι here refers to resurrection. 'Will rise' is
    the most direct and idiomatic rendering; 'will be raised' would import a passive
    nuance not present in the form.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: πρῶτον marks sequence relative to the living believers mentioned in the
    next verse; 'first' is sufficient and precise.
