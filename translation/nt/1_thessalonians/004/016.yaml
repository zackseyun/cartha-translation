theological_decisions:
- issue: Rendering Χριστῷ in the phrase ἐν Χριστῷ
  chosen_reading: in Messiah
  alternative_readings:
  - in Christ
  rationale: The term functions as a title rather than a mere name-like label, and
    the project default is to translate Χριστός as 'Messiah' where context supports.
    Because 'in Christ' is deeply familiar in English Christian usage, the alternative
    is preserved in a footnote rather than adopted in the main text.
