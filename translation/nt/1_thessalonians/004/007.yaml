id: 1TH.4.7
reference: 1 Thessalonians 4:7
source:
  edition: SBLGNT
  text: οὐ γὰρ ἐκάλεσεν ἡμᾶς ὁ θεὸς ἐπὶ ἀκαθαρσίᾳ ἀλλ’ ἐν ἁγιασμῷ.
translation:
  text: For God did not call us for uncleanness, but in holiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for impurity.' The Greek term can denote moral impurity, especially
      sexual impurity in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'in sanctification.' The Greek can refer to holiness as a state or to
      sanctification as the process of being made holy.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  chosen: did not call
  alternatives:
  - has not called
  - called
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as a simple past in English. In this
    context καλέω refers to God's effective summons of believers into a way of life,
    but 'call' preserves the lexical link without importing a narrower theological
    system.
- source_word: ἐπὶ ἀκαθαρσίᾳ
  chosen: for uncleanness
  alternatives:
  - to impurity
  - for impurity
  lexicon: BDAG
  rationale: 'With ἐπί plus dative here, the sense is purpose/sphere: God did not
    call believers with a view to or for a life characterized by ἀκαθαρσία. ''Uncleanness''
    preserves the moral and cultic resonance of the Greek better than the more flattened
    ''impurity,'' while remaining understandable in context.'
- source_word: ἀκαθαρσίᾳ
  chosen: uncleanness
  alternatives:
  - impurity
  lexicon: BDAG
  rationale: ἀκαθαρσία in Pauline usage often denotes moral impurity, especially sexual
    impurity in the immediate context (4:3–8). 'Uncleanness' keeps the broader semantic
    range and echoes biblical holiness language.
- source_word: ἐν ἁγιασμῷ
  chosen: in holiness
  alternatives:
  - in sanctification
  - for holiness
  lexicon: BDAG
  rationale: ἁγιασμός can mean sanctification or holiness. Here, paired antithetically
    with ἀκαθαρσία and governed by ἐν, it most naturally denotes the sphere or manner
    of life into which God has called believers. 'In holiness' is clearer modern English
    than 'in sanctification' while preserving the theological weight.
- source_word: ἁγιασμῷ
  chosen: holiness
  alternatives:
  - sanctification
  lexicon: BDAG
  rationale: The noun can denote both the process and state of being set apart. In
    this verse the contrast with moral uncleanness favors the lived state/sphere of
    holiness rather than an abstract doctrinal term.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces the ground for the preceding exhortation. 'For' is concise
    and natural at the start of the sentence.
