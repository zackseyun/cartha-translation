theological_decisions:
- issue: Meaning of God's 'call'
  chosen_reading: A real divine calling of believers that grounds ethical exhortation,
    without specifying a denominational doctrine of effectual calling beyond what
    the text states.
  alternative_readings:
  - A more general invitation
  - A specifically effectual call in a technical theological sense
  rationale: The verse clearly presents God's call as the basis for holy living, but
    it does not itself define the mechanics of that call. The translation therefore
    preserves the biblical term 'call' and avoids importing later doctrinal precision
    not explicit in the Greek.
  doctrine_reference: Affirmations; Translation philosophy §3
