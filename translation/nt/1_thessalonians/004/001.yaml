theological_decisions:
- issue: Gendered address to the Thessalonian believers
  chosen_reading: Retain 'brothers' in the main text with an inclusivity footnote
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek masculine plural ἀδελφοί likely addresses the whole believing
    community, but the translation philosophy specifies gender-accurate over gender-neutral
    renderings. Therefore the masculine form is preserved in the text and contextual
    inclusivity is noted in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of κύριος in reference to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrinal guidance lists κύριος with default rendering 'Lord.' In
    this context it is a christological title and should be translated, not transliterated
    or weakened.
  doctrine_reference: 'DOCTRINE.md §Contested terms: κύριος'
