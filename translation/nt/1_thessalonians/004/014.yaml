theological_decisions:
- issue: Meaning of the death metaphor κοιμηθέντας
  chosen_reading: Retain the metaphor 'fallen asleep' rather than flattening it to
    'died.'
  alternative_readings:
  - those who have died
  rationale: The metaphor is pastorally and theologically important in this context
    about believers who have died before the Lord's return. Retaining it preserves
    Paul's wording and the passage's tension between real death and future resurrection
    hope.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Interpretation of διὰ τοῦ Ἰησοῦ
  chosen_reading: Render as 'through Jesus' in the main text and preserve alternatives
    in a footnote.
  alternative_readings:
  - in Jesus
  - because of Jesus
  - by means of Jesus
  rationale: 'The phrase is genuinely ambiguous: it may describe agency (''through
    Jesus''), sphere/association as reflected in some translations (''in Jesus''),
    or causal relation. The main text follows the most straightforward sense of διά
    with the genitive while preserving interpretive tension in a footnote.'
  doctrine_reference: Translation philosophy §3
