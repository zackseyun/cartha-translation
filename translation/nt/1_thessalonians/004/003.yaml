theological_decisions:
- issue: Meaning of ἁγιασμός in ethical exhortation
  chosen_reading: Rendered as 'sanctification' with ethical content specified by the
    following clause.
  alternative_readings:
  - Rendered as 'holiness' to emphasize resultant state
  rationale: The verse defines God's will in terms of believers' consecrated moral
    life, especially sexual purity. 'Sanctification' preserves the theological breadth
    of Paul's term without collapsing it into either a purely positional or purely
    process-oriented doctrine.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of πορνεία
  chosen_reading: Broadly rendered as 'sexual immorality.'
  alternative_readings:
  - '''fornication'''
  rationale: The Greek term is broader than one specific category of illicit sexual
    behavior. The translation avoids importing a narrower doctrinal or cultural definition
    than the source text itself states.
  doctrine_reference: Translation philosophy §§1, 6
