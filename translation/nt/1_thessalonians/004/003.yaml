id: 1TH.4.3
reference: 1 Thessalonians 4:3
source:
  edition: SBLGNT
  text: τοῦτο γάρ ἐστιν θέλημα τοῦ θεοῦ, ὁ ἁγιασμὸς ὑμῶν, ἀπέχεσθαι ὑμᾶς ἀπὸ τῆς πορνείας,
translation:
  text: 'For this is the will of God: your sanctification—that you abstain from sexual
    immorality.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your holiness.'
    reason: lexical_alternative
  - marker: b
    text: Greek porneia; a broad term for illicit sexual conduct. Traditionally, 'fornication.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλημα
  chosen: will
  alternatives:
  - desire
  - purpose
  lexicon: BDAG
  rationale: '''Will'' is the standard and most natural rendering for θέλημα in reference
    to God''s desired and authoritative intention. ''Desire'' is too weak here, and
    ''purpose'' could suggest decretive intent more narrowly than the context warrants.'
- source_word: ὁ ἁγιασμὸς ὑμῶν
  chosen: your sanctification
  alternatives:
  - your holiness
  - your being made holy
  lexicon: BDAG
  rationale: ἁγιασμός in Pauline usage commonly denotes sanctification/holiness as
    a state and process of consecrated living. 'Sanctification' preserves the established
    theological sense while remaining accurate; 'holiness' is possible but less clearly
    connected to the following infinitive phrase as an ethical outworking.
- source_word: ἀπέχεσθαι
  chosen: that you abstain
  alternatives:
  - to abstain
  - for you to abstain
  lexicon: BDAG
  rationale: The infinitive explains the content of 'your sanctification.' Rendering
    it as 'that you abstain' produces clear English while preserving the infinitival
    force as an epexegetical expression of what sanctification entails in this context.
- source_word: πορνείας
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual sin
  - unchastity
  lexicon: BDAG
  rationale: πορνεία broadly denotes illicit sexual conduct, not merely premarital
    intercourse. 'Sexual immorality' is the clearest modern English rendering and
    best captures the term's breadth without archaic limitation. 'Fornication' is
    too narrow and dated in contemporary usage.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ links this verse to the preceding exhortation by giving the reason
    or ground. 'For' preserves that discourse connection in concise, natural English.
