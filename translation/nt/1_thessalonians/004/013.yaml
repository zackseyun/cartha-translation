theological_decisions:
- issue: Meaning of κοιμωμένων in an eschatological context
  chosen_reading: Retain the metaphor 'those who have fallen asleep' rather than interpretively
    replacing it with 'those who have died.'
  alternative_readings:
  - those who have died
  - those who sleep
  rationale: Paul's wording intentionally uses the sleep metaphor for deceased believers
    in the context of resurrection hope. Preserving the metaphor maintains the theological
    texture and avoids over-paraphrase, while a footnote can clarify the referent.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of ἀδελφοί
  chosen_reading: Render as 'brothers' in the main text, with a footnote noting the
    likely mixed-gender congregational address.
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The doctrine requires gender-accurate rather than gender-neutral rendering
    in the main text where the Greek is masculine with representative force, while
    annotation may clarify inclusivity.
  doctrine_reference: Translation philosophy §4
