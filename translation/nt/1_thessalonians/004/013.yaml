id: 1TH.4.13
reference: 1 Thessalonians 4:13
source:
  edition: SBLGNT
  text: Οὐ θέλομεν δὲ ὑμᾶς ἀγνοεῖν, ἀδελφοί, περὶ τῶν ⸀κοιμωμένων, ἵνα μὴ λυπῆσθε
    καθὼς καὶ οἱ λοιποὶ οἱ μὴ ἔχοντες ἐλπίδα.
translation:
  text: But we do not want you to be uninformed, brothers, about those who have fallen
    asleep, so that you may not grieve as the rest do, who have no hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who sleep'; here Paul uses 'sleep' as a metaphor for believers
      who have died.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here addresses the congregation and likely includes both men
      and women.'
    reason: cultural_note
lexical_decisions:
- source_word: Οὐ θέλομεν δὲ
  chosen: But we do not want
  alternatives:
  - Now we do not want
  - And we do not want
  lexicon: BDAG
  rationale: δέ is mildly connective/adversative; 'But' fits the discourse transition
    naturally in English without overstating contrast. θέλομεν + infinitive is idiomatically
    'we do not want ... to ...'.
- source_word: ὑμᾶς ἀγνοεῖν
  chosen: you to be uninformed
  alternatives:
  - you to be ignorant
  - you not to know
  lexicon: BDAG
  rationale: ἀγνοεῖν means 'to be uninformed/not know.' 'Uninformed' preserves the
    sense accurately in readable modern English and avoids the misleading modern connotation
    of 'ignorant' as insulting.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in Pauline usage often
    addresses the whole congregation. Per doctrine, gender-accurate over gender-neutral,
    so 'brothers' is retained in the main text, with inclusivity noted in a footnote.
- source_word: περὶ τῶν κοιμωμένων
  chosen: about those who have fallen asleep
  alternatives:
  - about those who are asleep
  - about the sleeping
  - about those who have died
  lexicon: BDAG
  rationale: κοιμωμένων is the conventional Christian euphemism for the dead in this
    context. 'Have fallen asleep' preserves the metaphor and aspect better than flattening
    it to 'have died,' while making clear it refers to persons.
- source_word: ἵνα μὴ λυπῆσθε
  chosen: so that you may not grieve
  alternatives:
  - in order that you may not grieve
  - so that you will not be grieved
  lexicon: BDAG
  rationale: ἵνα + subjunctive expresses purpose/result. 'So that you may not grieve'
    is natural English and preserves the pastoral aim without implying an absolute
    prohibition of sorrow.
- source_word: καθὼς καὶ οἱ λοιποὶ
  chosen: as the rest do
  alternatives:
  - as also the rest
  - like the others
  lexicon: BDAG
  rationale: οἱ λοιποί refers to the remaining people outside the believing community
    in this contrast. 'The rest' is concise and natural; adding 'do' completes the
    English comparison.
- source_word: οἱ μὴ ἔχοντες ἐλπίδα
  chosen: who have no hope
  alternatives:
  - who do not have hope
  lexicon: BDAG
  rationale: A straightforward rendering of the participial phrase. 'No hope' is idiomatic
    English and preserves Paul's contrast regarding eschatological hope.
