- issue: Rendering ἀδελφοί/ἀδελφούς in a mixed-gender church context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - fellow believers
  rationale: Following the stated gender-accurate policy, the masculine plural is
    retained in the main text while acknowledging that Paul likely addresses/includes
    the whole Christian community. This preserves the source-language form without
    denying the representative scope.
