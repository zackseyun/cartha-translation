theological_decisions:
- issue: Rendering of ἁρπαγησόμεθα in a verse central to debates about the 'rapture'
  chosen_reading: will be caught up
  alternative_readings:
  - will be snatched up
  rationale: The translation renders the Greek verb directly and neutrally, without
    importing a denominational framework about the timing or nature of the event.
    This preserves the text's claim while avoiding doctrinal over-specification beyond
    what the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    advocate for a particular denominational distinctive unless the Greek unambiguously
    supports one reading over another.
- issue: Sense of εἰς ἀπάντησιν τοῦ κυρίου
  chosen_reading: to meet the Lord
  alternative_readings:
  - for a meeting with the Lord
  rationale: The phrase is translated idiomatically without building in a more developed
    eschatological scenario from outside the verse. The wording states the encounter
    plainly and leaves broader interpretive models unresolved.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
