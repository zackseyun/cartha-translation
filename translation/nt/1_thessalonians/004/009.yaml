id: 1TH.4.9
reference: 1 Thessalonians 4:9
source:
  edition: SBLGNT
  text: Περὶ δὲ τῆς φιλαδελφίας οὐ χρείαν ἔχετε γράφειν ὑμῖν, αὐτοὶ γὰρ ὑμεῖς θεοδίδακτοί
    ἐστε εἰς τὸ ἀγαπᾶν ἀλλήλους·
translation:
  text: Now concerning brotherly love, you have no need for anyone to write to you,
    for you yourselves are taught by God to love one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'love for fellow believers'; the Greek term for 'brotherly
      love' carries family-language imagery within the Christian community.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'you have no need to write to you'; English supplies the implied
      writer for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ
  chosen: Now concerning
  alternatives:
  - Concerning
  - But concerning
  lexicon: BDAG
  rationale: Introduces a new topic with mild continuity from the previous section.
    'Now concerning' is natural English and preserves the discourse shift signaled
    by περὶ δέ.
- source_word: φιλαδελφίας
  chosen: brotherly love
  alternatives:
  - love for the brothers and sisters
  - family affection among believers
  lexicon: BDAG
  rationale: The noun specifically denotes familial affection among fellow believers.
    'Brotherly love' preserves the lexical distinction from ἀγαπᾶν later in the verse,
    while remaining a recognized English expression. Because the context is the church,
    the inclusive sense can be clarified in a footnote if needed, but the main text
    keeps the source's familial imagery.
- source_word: οὐ χρείαν ἔχετε γράφειν ὑμῖν
  chosen: you have no need for anyone to write to you
  alternatives:
  - you have no need that we should write to you
  - you do not need us to write to you
  lexicon: BDAG
  rationale: The Greek literally says 'you have no need to write to you,' with the
    writer implied from context. English idiom requires the implied subject to be
    supplied. 'Anyone' avoids over-specifying 'we' where the Greek infinitive itself
    leaves the subject implicit, while still conveying the sense that no written instruction
    is needed.
- source_word: αὐτοὶ γὰρ ὑμεῖς
  chosen: for you yourselves
  alternatives:
  - for you yourselves indeed
  - for you yourselves
  lexicon: BDAG
  rationale: The doubled pronouns are emphatic. 'You yourselves' captures the emphasis
    without awkwardness.
- source_word: θεοδίδακτοί
  chosen: taught by God
  alternatives:
  - God-taught
  - instructed by God
  lexicon: BDAG
  rationale: A rare adjective meaning instructed by God. 'Taught by God' is clearer
    in modern English than the more literal but less natural 'God-taught,' while preserving
    the divine agency.
- source_word: εἰς τὸ ἀγαπᾶν ἀλλήλους
  chosen: to love one another
  alternatives:
  - for loving one another
  - to be loving one another
  lexicon: BDAG
  rationale: The construction expresses purpose or result. 'To love one another' is
    the most natural English rendering and preserves the verbal link to ἀγάπη/ἀγαπάω
    language.
