theological_decisions:
- issue: Distinction between φιλαδελφία and ἀγαπᾶν within the same verse
  chosen_reading: Render φιλαδελφία as 'brotherly love' and ἀγαπᾶν as 'love' to preserve
    Paul's lexical variation.
  alternative_readings:
  - Render both with 'love' for smoother English
  rationale: The verse intentionally moves from the specific category of familial
    affection among believers to the broader verbal expression of love toward one
    another. Preserving the distinction reflects the Greek wording and avoids flattening
    Paul's rhetoric.
  doctrine_reference: 'Translation philosophy #5 (Consistency of key terms, or documented
    exception)'
- issue: Implied subject of γράφειν
  chosen_reading: Supply an indefinite English subject ('for anyone to write to you')
    rather than 'for us to write to you.'
  alternative_readings:
  - for us to write to you
  rationale: The infinitive lacks an explicit subject in Greek. Although Paul and
    his co-senders are the likely implied writers from context, the Greek wording
    itself does not state 'us.' The chosen rendering avoids importing a more specific
    subject than the text explicitly gives while remaining idiomatic English.
  doctrine_reference: 'Translation philosophy #1 (Original-language primacy over translation
    tradition)'
