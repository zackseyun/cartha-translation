theological_decisions:
- issue: Meaning of the closing clause μηδενὸς χρείαν ἔχητε
  chosen_reading: economic/material self-sufficiency expressed as 'have need of nothing'
  alternative_readings:
  - social independence expressed as 'have need of no one'
  rationale: In context (working with one's hands, minding one's own affairs), Paul
    emphasizes avoiding unnecessary dependence on others. The Greek phrase itself
    is broader, but 'nothing' best matches the grammar and preserves the sense without
    over-narrowing to persons alone. The alternative is preserved in a footnote because
    context makes it plausible.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
