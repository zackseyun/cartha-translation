id: 1TH.4.12
reference: 1 Thessalonians 4:12
source:
  edition: SBLGNT
  text: ἵνα περιπατῆτε εὐσχημόνως πρὸς τοὺς ἔξω καὶ μηδενὸς χρείαν ἔχητε.
translation:
  text: so that you may walk properly before outsiders and have need of nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'have need of no one.' The phrase may emphasize not being dependent
      on others.
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result from the preceding exhortation. 'So that' is
    natural modern English while preserving the purposive force.
- source_word: περιπατῆτε
  chosen: you may walk
  alternatives:
  - you may live
  - you may conduct yourselves
  lexicon: BDAG
  rationale: Literally 'walk'; in Pauline usage often metaphorical for manner of life.
    'Walk' preserves the metaphor and remains idiomatic enough in English.
- source_word: εὐσχημόνως
  chosen: properly
  alternatives:
  - decently
  - honorably
  - respectably
  lexicon: BDAG
  rationale: Conveys behaving in a fitting, respectable, becoming way. 'Properly'
    is concise and natural; 'decently' can sound narrower or archaic, while 'honorably'
    may overstate the moral nuance.
- source_word: πρὸς τοὺς ἔξω
  chosen: before outsiders
  alternatives:
  - toward those outside
  - in relation to outsiders
  - before those outside
  lexicon: BDAG
  rationale: Refers to people outside the Christian community. 'Before outsiders'
    captures the social/public dimension of Christian conduct in relation to nonbelievers.
- source_word: τοὺς ἔξω
  chosen: outsiders
  alternatives:
  - those outside
  - nonbelievers
  lexicon: BDAG
  rationale: A conventional early Christian expression for those outside the church.
    'Outsiders' is concise and preserves the group distinction without importing a
    stronger theological label than the text itself states.
- source_word: μηδενὸς χρείαν ἔχητε
  chosen: have need of nothing
  alternatives:
  - need nothing
  - have need of no one
  lexicon: BDAG
  rationale: The Greek most naturally means lacking nothing / not being dependent
    for necessities. 'Have need of nothing' is a close rendering. 'Have need of no
    one' is a known interpretive alternative, but the genitive with χρεία more naturally
    points to 'nothing' rather than 'no one' here.
