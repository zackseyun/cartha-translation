theological_decisions:
- issue: Referent of 'his Holy Spirit'
  chosen_reading: The phrase refers to the personal Holy Spirit given by God to believers.
  alternative_readings:
  - the holy spirit as a more impersonal gift or disposition
  rationale: The construction τὸ πνεῦμα αὐτοῦ τὸ ἅγιον in Pauline context naturally
    denotes the Holy Spirit. Rendering with capitalization in English reflects this
    without adding doctrinal content beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Generic force of ὁ ἀθετῶν
  chosen_reading: Rendered as 'whoever rejects' rather than a masculine-specific expression.
  alternative_readings:
  - the one who rejects
  - he who rejects
  rationale: The Greek masculine singular is generic/representative, not restricted
    to males. 'Whoever' preserves the generic force in natural English while remaining
    faithful to the source's intent.
  doctrine_reference: Translation philosophy §4
