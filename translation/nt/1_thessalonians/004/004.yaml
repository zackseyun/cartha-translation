id: 1TH.4.4
reference: 1 Thessalonians 4:4
source:
  edition: SBLGNT
  text: εἰδέναι ἕκαστον ὑμῶν τὸ ἑαυτοῦ σκεῦος κτᾶσθαι ἐν ἁγιασμῷ καὶ τιμῇ,
translation:
  text: that each of you know how to acquire his own vessel in holiness and honor,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'know how to control his own body'; alternatively, 'know how to take
      a wife for himself.' The Greek literally says 'acquire his own vessel.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰδέναι
  chosen: know how
  alternatives:
  - know
  - understand
  lexicon: BDAG
  rationale: The infinitive depends on the preceding exhortation and here conveys
    practical knowledge or skill, not mere cognition. 'Know how' best captures the
    idiomatic force in English.
- source_word: ἕκαστον ὑμῶν
  chosen: each of you
  alternatives:
  - every one of you
  lexicon: BDAG
  rationale: This preserves the distributive sense of ἕκαστον with the partitive ὑμῶν
    in natural English.
- source_word: σκεῦος
  chosen: vessel
  alternatives:
  - body
  - wife
  lexicon: BDAG
  rationale: σκεῦος literally means 'vessel' or 'container.' In this context its referent
    is debated. To preserve the source-text ambiguity rather than importing an interpretive
    decision, the main text keeps the more literal 'vessel,' while major interpretive
    alternatives are preserved in a footnote.
- source_word: κτᾶσθαι
  chosen: acquire
  alternatives:
  - possess
  - control
  - take
  lexicon: BDAG
  rationale: The middle infinitive of κτάομαι commonly means 'acquire' or 'gain for
    oneself.' 'Possess' is possible in context, especially if σκεῦος is taken as 'body,'
    but 'acquire' more directly reflects the lexical core and leaves the debated object-reference
    less resolved.
- source_word: ἐν ἁγιασμῷ
  chosen: in holiness
  alternatives:
  - in sanctification
  - in consecration
  lexicon: BDAG
  rationale: ἁγιασμός denotes holiness or sanctification. 'Holiness' is more idiomatic
    for modern readers here while retaining the ethical and consecrated sense.
- source_word: τιμῇ
  chosen: honor
  alternatives:
  - respect
  - dignity
  lexicon: BDAG
  rationale: τιμή here denotes honor or esteem. 'Honor' is the most direct and theologically
    weighty rendering in this ethical context.
