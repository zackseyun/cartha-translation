theological_decisions:
- issue: Interpretation of τὸ ἑαυτοῦ σκεῦος κτᾶσθαι
  chosen_reading: Retain the literal expression 'acquire his own vessel' in the main
    text
  alternative_readings:
  - control his own body
  - take/acquire a wife for himself
  rationale: This clause is a well-known interpretive crux. Because the Greek wording
    itself is ambiguous and neither major interpretation is unambiguously demanded
    by the immediate syntax alone, the translation preserves the ambiguity in the
    main text rather than resolving it doctrinally or denominationally. The leading
    interpretive options are preserved in a footnote for transparency.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
