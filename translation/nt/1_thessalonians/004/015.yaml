theological_decisions:
- issue: Nature of Paul's appeal to 'a word from the Lord'
  chosen_reading: Rendered in a way that preserves the statement's authority without
    deciding whether Paul cites a known Jesus tradition or a direct revelation.
  alternative_readings:
  - a citation of a dominical saying
  - a prophetic revelation given to Paul
  rationale: The Greek phrase ἐν λόγῳ κυρίου affirms divine authority but does not
    itself specify the exact mode of transmission. The translation should preserve
    that ambiguity rather than resolve it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of κοιμηθέντας
  chosen_reading: Retained the sleep metaphor for deceased believers.
  alternative_readings:
  - render explicitly as 'the dead'
  rationale: Paul's wording softens death in light of resurrection hope. Keeping the
    metaphor preserves the theological texture of the passage without denying physical
    death.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
