id: 1TH.4.15
reference: 1 Thessalonians 4:15
source:
  edition: SBLGNT
  text: τοῦτο γὰρ ὑμῖν λέγομεν ἐν λόγῳ κυρίου, ὅτι ἡμεῖς οἱ ζῶντες οἱ περιλειπόμενοι
    εἰς τὴν παρουσίαν τοῦ κυρίου οὐ μὴ φθάσωμεν τοὺς κοιμηθέντας·
translation:
  text: 'For this we say to you by a word from the Lord: that we who are living, who
    remain until the coming of the Lord, will certainly not precede those who have
    fallen asleep.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the word of the Lord.' The Greek may refer either to a saying from
      the Lord Jesus or to a revelation given with the Lord's authority.
    reason: alternative_reading
  - marker: b
    text: Or 'presence' or 'arrival' for 'coming' (Greek παρουσία).
    reason: lexical_alternative
  - marker: c
    text: '''Those who have fallen asleep'' is a metaphor for believers who have died.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν λόγῳ κυρίου
  chosen: by a word from the Lord
  alternatives:
  - by the word of the Lord
  - in a word of the Lord
  lexicon: BDAG
  rationale: The phrase most naturally indicates the basis or authority of Paul's
    statement. 'By a word from the Lord' preserves the instrumental nuance of ἐν and
    avoids over-specifying whether this is a direct dominical saying or a revelation
    mediated to Paul. 'The Lord' follows the default rendering of κύριος.
- source_word: παρουσίαν
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In this eschatological context, παρουσία refers to the Lord's future
    arrival/appearing. 'Coming' is the most natural English rendering and best communicates
    the event sense here, though 'presence' reflects the term's broader semantic range.
- source_word: οἱ ζῶντες
  chosen: we who are living
  alternatives:
  - we who are alive
  lexicon: BDAG
  rationale: The present participle is rendered with an English participial clause.
    'Living' is slightly more literal to the verbal form, while still idiomatic.
- source_word: οἱ περιλειπόμενοι
  chosen: who remain
  alternatives:
  - who are left
  - who survive
  lexicon: BDAG
  rationale: The participle denotes those still remaining up to the specified time.
    'Who remain' is concise and neutral, avoiding the potentially interpretive nuance
    of 'survive'.
- source_word: οὐ μὴ φθάσωμεν
  chosen: will certainly not precede
  alternatives:
  - will by no means go before
  - will certainly not come before
  lexicon: BDAG
  rationale: The emphatic negation οὐ μὴ with the aorist subjunctive strongly denies
    the possibility. In this context φθάνω means 'precede' rather than merely 'arrive
    at.' 'Will certainly not precede' captures both the sense and the emphasis in
    natural English.
- source_word: τοὺς κοιμηθέντας
  chosen: those who have fallen asleep
  alternatives:
  - those who are asleep
  - the dead
  lexicon: BDAG
  rationale: The aorist passive participle from κοιμάομαι is a conventional Christian
    euphemism for believers who have died. 'Have fallen asleep' preserves the metaphor
    present in the Greek better than the interpretive flattening 'the dead.'
- source_word: κύριος / κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord.' In this verse it
    refers to Jesus in an eschatological context.
