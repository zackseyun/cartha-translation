theological_decisions:
- issue: Rendering ἔθνη in a moral-exhortation context
  chosen_reading: the Gentiles
  alternative_readings:
  - the nations
  - the pagans
  rationale: Paul commonly uses ἔθνη for non-Jews. Here the contrast is between believers
    and non-God-knowing outsiders; 'Gentiles' preserves the ethnic-religious category
    without importing extra contempt. 'Pagans' is interpretive and 'nations' is too
    broad in contemporary English.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of πάθει ἐπιθυμίας
  chosen_reading: the passion of lust
  alternative_readings:
  - passionate desire
  - lustful passion
  rationale: The phrase refers to disordered sexual desire in context. The chosen
    rendering preserves both nouns rather than collapsing them into a single adjective-noun
    phrase, maintaining transparency to the Greek while remaining readable.
  doctrine_reference: Translation philosophy §5, §6
