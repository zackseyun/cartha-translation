id: COL.3.2
reference: Colossians 3:2
source:
  edition: SBLGNT
  text: τὰ ἄνω φρονεῖτε, μὴ τὰ ἐπὶ τῆς γῆς,
translation:
  text: Set your minds on the things above, not on the things on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Think about the things above.' The Greek verb includes not only thinking,
      but also setting one's mindset or concern on something.
    reason: lexical_alternative
  - marker: b
    text: Or 'the things on earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἄνω
  chosen: the things above
  alternatives:
  - what is above
  - the things that are above
  - things above
  lexicon: BDAG
  rationale: The neuter plural article with the adverb ἄνω functions substantivally,
    referring to heavenly realities or matters above. 'The things above' preserves
    the plural and the contrast with earthly things in the second clause.
- source_word: φρονεῖτε
  chosen: Set your minds on
  alternatives:
  - think on
  - be minded toward
  - have your mind on
  - seek mentally
  lexicon: BDAG
  rationale: φρονέω commonly denotes directing one's mindset, attitude, or concern
    toward something, not merely entertaining a thought. 'Set your minds on' captures
    the present imperative's call for an ongoing orientation of thought and affection
    better than the flatter 'think about.'
- source_word: μὴ
  chosen: not
  alternatives:
  - and not
  lexicon: BDAG
  rationale: 'μή negates the second object of the imperative by contrast: believers
    are to orient themselves toward one sphere and not the other. Simple ''not'' is
    sufficient in English.'
- source_word: τὰ ἐπὶ τῆς γῆς
  chosen: the things on the earth
  alternatives:
  - earthly things
  - the things upon the earth
  - the things on earth
  lexicon: BDAG
  rationale: The phrase is the counterpart to τὰ ἄνω. 'The things on the earth' preserves
    the concrete spatial contrast in Paul's wording. 'Earthly things' is possible
    but slightly more interpretive and adjectival than the Greek substantival construction.
- source_word: γῆς
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: In this cosmic contrast with 'above,' γῆ refers to the earth rather than
    a particular land or territory.
