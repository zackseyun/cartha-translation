theological_decisions:
- issue: Nature of Paul's exhortation in φρονεῖτε
  chosen_reading: An exhortation to orient one's mindset and values toward heavenly
    realities
  alternative_readings:
  - A narrower command merely to think intellectually about heaven
  rationale: The semantic range of φρονέω includes mindset, attitude, and disposition.
    Rendering it as 'Set your minds on' preserves the broader ethical and spiritual
    force without importing extra doctrinal content.
  doctrine_reference: Translation philosophy §3, §6
