id: COL.3.20
reference: Colossians 3:20
source:
  edition: SBLGNT
  text: Τὰ τέκνα, ὑπακούετε τοῖς γονεῦσιν κατὰ πάντα, τοῦτο γὰρ ⸂εὐάρεστόν ἐστιν⸃
    ἐν κυρίῳ.
translation:
  text: Children, obey your parents in everything, for this is pleasing in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acceptable in the Lord.'
    reason: lexical_alternative
  - marker: b
    text: '''In the Lord'' may be understood as describing what is pleasing within
      one''s relationship to the Lord, rather than simply ''to the Lord.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Τὰ τέκνα
  chosen: Children
  alternatives:
  - Sons and daughters
  - Childen
  lexicon: BDAG
  rationale: τέκνα is the standard plural term for children/offspring, not specifically
    sons. 'Children' is natural modern English and accurately reflects the vocative
    address to offspring within the household code.
- source_word: ὑπακούετε
  chosen: obey
  alternatives:
  - listen to
  - be subject to
  lexicon: BDAG
  rationale: The imperative of ὑπακούω means to obey, heed, or comply with authority.
    'Obey' best captures the force of the present imperative in this parent-child
    context; 'listen to' is too weak, and 'be subject to' is less idiomatic here.
- source_word: τοῖς γονεῦσιν
  chosen: your parents
  alternatives:
  - parents
  - father and mother
  lexicon: BDAG
  rationale: γονεῦσιν means parents. English idiom normally supplies 'your' in direct
    address ('Children, obey your parents'), though the possessive is implicit rather
    than explicit in Greek. 'Father and mother' would over-specify beyond the plural
    noun used.
- source_word: κατὰ πάντα
  chosen: in everything
  alternatives:
  - in all things
  - always
  lexicon: BDAG
  rationale: 'The phrase κατά + accusative here expresses extent/respect: ''in everything''
    or ''in all things.'' ''In everything'' is clear modern English and avoids the
    potentially misleading temporal sense of ''always.'''
- source_word: τοῦτο
  chosen: this
  alternatives:
  - such obedience
  - this way
  lexicon: BDAG
  rationale: τοῦτο points back to the command just given. The simple demonstrative
    'this' preserves the Greek structure and lets the referent be understood from
    context.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces the reason for the command. 'For' is concise and preserves
    the explanatory connection.
- source_word: εὐάρεστόν ἐστιν
  chosen: is pleasing
  alternatives:
  - is acceptable
  - is well-pleasing
  lexicon: BDAG
  rationale: εὐάρεστος denotes that which is pleasing or acceptable, especially to
    God. 'Is pleasing' is natural English and retains the evaluative sense without
    archaic phrasing like 'well-pleasing.'
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - to the Lord
  - before the Lord
  lexicon: BDAG
  rationale: The prepositional phrase is best retained as 'in the Lord,' a common
    Pauline expression denoting relation to or sphere of the Lord. Rendering it 'to
    the Lord' would interpret the phrase more narrowly than the Greek states. κύριος
    is rendered 'Lord' per doctrine defaults.
