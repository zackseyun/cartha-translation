theological_decisions:
- issue: Force of 'in the name of the Lord Jesus'
  chosen_reading: Retain the idiom 'in the name of the Lord Jesus' in the main text.
  alternative_readings:
  - under the authority of the Lord Jesus
  - as representatives of the Lord Jesus
  rationale: The phrase carries a broad biblical range including authority, agency,
    and identification. Preserving the idiom maintains theological richness rather
    than resolving it into one narrower interpretive gloss.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Referent of 'through him'
  chosen_reading: The pronoun refers to the Lord Jesus as the mediator of thanksgiving
    to God the Father.
  alternative_readings:
  - Generic reference carried over from the clause without explicit christological
    emphasis
  rationale: The nearest antecedent is 'Lord Jesus,' and the resulting sense coheres
    with Pauline patterns of thanksgiving to the Father through the Son. This reflects
    the syntax without importing extra doctrinal formulation.
  doctrine_reference: Affirmations; Translation philosophy §1
