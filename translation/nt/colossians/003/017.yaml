id: COL.3.17
reference: Colossians 3:17
source:
  edition: SBLGNT
  text: καὶ πᾶν ⸂ὅ τι⸃ ⸀ἐὰν ποιῆτε ἐν λόγῳ ἢ ἐν ἔργῳ, πάντα ἐν ὀνόματι κυρίου Ἰησοῦ,
    εὐχαριστοῦντες τῷ ⸀θεῷ πατρὶ δι’ αὐτοῦ.
translation:
  text: And whatever you do, in word or in deed, do everything in the name of the
    Lord Jesus, giving thanks to God the Father through him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in speech or in action.'
    reason: lexical_alternative
  - marker: b
    text: '''In the name of'' can also mean ''under the authority of'' or ''as representing.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν ὅ τι ἐὰν ποιῆτε
  chosen: whatever you do
  alternatives:
  - everything that you might do
  - whatever you may do
  lexicon: BDAG
  rationale: The idiom πᾶν ὅ τι ἐὰν with the present subjunctive expresses an indefinite
    comprehensive sense. 'Whatever you do' is natural English and preserves the open-ended
    totality without awkwardness.
- source_word: ἐν λόγῳ ἢ ἐν ἔργῳ
  chosen: in word or in deed
  alternatives:
  - in speech or in action
  - in what you say or in what you do
  lexicon: BDAG
  rationale: This is a conventional pair contrasting verbal and practical conduct.
    'Word' and 'deed' preserves the compactness and rhetorical balance of the Greek
    while remaining clear in modern English.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all of it
  lexicon: BDAG
  rationale: The accusative neuter plural functions adverbially/comprehensively here,
    summing up the prior phrase. 'Everything' communicates the totalizing force in
    idiomatic English.
- source_word: ἐν ὀνόματι κυρίου Ἰησοῦ
  chosen: in the name of the Lord Jesus
  alternatives:
  - under the authority of the Lord Jesus
  - as representing the Lord Jesus
  lexicon: BDAG
  rationale: '''In the name of'' is the most direct rendering and preserves the biblical
    idiom, which can include authority, representation, and allegiance. Dynamic unpacking
    would narrow the semantic range too much for the main text.'
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this christological context
    it is a title, not merely a social designation, and 'Lord' preserves both NT usage
    and theological weight.
- source_word: εὐχαριστοῦντες
  chosen: giving thanks
  alternatives:
  - thanking
  lexicon: BDAG
  rationale: The present participle is best rendered as a contemporaneous participial
    idea modifying the main exhortation. 'Giving thanks' is idiomatic and preserves
    the ongoing aspect better than a finite clause.
- source_word: τῷ θεῷ πατρὶ
  chosen: to God the Father
  alternatives:
  - to the God and Father
  - to God, the Father
  lexicon: BDAG
  rationale: The anarthrous πατρί in apposition to θεῷ is naturally rendered 'God
    the Father.' This is standard, clear English and does not require the more interpretive
    'the God and Father' here.
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - through Jesus
  - by him
  lexicon: BDAG
  rationale: The pronoun most naturally refers to the immediately preceding 'Lord
    Jesus.' 'Through him' preserves the mediation language without over-specifying
    beyond the Greek pronoun.
