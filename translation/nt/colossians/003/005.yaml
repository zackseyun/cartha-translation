theological_decisions:
- issue: Referent of 'which is idolatry'
  chosen_reading: The clause refers specifically to 'greed' rather than to the entire
    vice list.
  alternative_readings:
  - The clause summarizes the whole preceding list as idolatry.
  rationale: The feminine singular relative pronoun ἥτις agrees most naturally with
    the nearest feminine singular antecedent, πλεονεξίαν ('greed'). This also matches
    Pauline usage elsewhere.
  doctrine_reference: Preserve theological tension rather than resolve it; grammatical
    evidence here favors a specific antecedent.
- issue: Interpretation of 'members that are on the earth'
  chosen_reading: Retain the bodily-member metaphor in the main text rather than replacing
    it with an abstract phrase like 'earthly nature.'
  alternative_readings:
  - your earthly nature
  - whatever in you is earthly
  rationale: The Greek says 'members,' and the following accusatives can be read as
    appositional specification of what is to be put to death. Retaining the metaphor
    avoids importing a later interpretive abstraction not explicit in the text.
  doctrine_reference: Original-language primacy over translation tradition.
