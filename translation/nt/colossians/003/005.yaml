id: COL.3.5
reference: Colossians 3:5
source:
  edition: SBLGNT
  text: Νεκρώσατε οὖν τὰ ⸀μέλη τὰ ἐπὶ τῆς γῆς, πορνείαν, ἀκαθαρσίαν, πάθος, ἐπιθυμίαν
    κακήν, καὶ τὴν πλεονεξίαν ἥτις ἐστὶν εἰδωλολατρία,
translation:
  text: 'Therefore, put to death your members that are on the earth: sexual immorality,
    impurity, passion, evil desire, and greed, which is idolatry.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whatever in you is earthly.' The Greek more literally says 'the members
      that are on the earth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'covetousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Νεκρώσατε
  chosen: put to death
  alternatives:
  - mortify
  - make dead
  lexicon: BDAG
  rationale: Aorist active imperative calling for decisive action. 'Put to death'
    is clear modern English and preserves the force better than archaic 'mortify.'
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding argument; 'Therefore' best preserves
    the logical connection.
- source_word: μέλη
  chosen: your members
  alternatives:
  - the parts of you
  - your bodily members
  lexicon: BDAG
  rationale: Literally 'members/limbs.' In this context Paul uses bodily-member language
    metaphorically for earthly aspects expressed in the vice list. 'Your members'
    keeps the metaphor visible without over-interpreting.
- source_word: τὰ ἐπὶ τῆς γῆς
  chosen: that are on the earth
  alternatives:
  - that are earthly
  - the earthly parts
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the spatial metaphor and avoids
    prematurely resolving it into an abstract adjective. The phrase qualifies 'members'
    as belonging to the earthly sphere.
- source_word: πορνείαν
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual sin
  lexicon: BDAG
  rationale: Standard broad rendering for πορνεία in modern English; 'fornication'
    is too narrow/archaic, while 'sexual sin' is less precise.
- source_word: ἀκαθαρσίαν
  chosen: impurity
  alternatives:
  - uncleanness
  lexicon: BDAG
  rationale: Common Pauline vice-term; 'impurity' is natural modern English and broad
    enough to include moral uncleanness.
- source_word: πάθος
  chosen: passion
  alternatives:
  - lust
  - shameful passion
  lexicon: BDAG
  rationale: The term denotes strong disordered passion. 'Passion' is the most direct
    lexical equivalent; more interpretive expansions are unnecessary here.
- source_word: ἐπιθυμίαν κακήν
  chosen: evil desire
  alternatives:
  - evil craving
  - wicked desire
  lexicon: BDAG
  rationale: The adjective κακήν explicitly qualifies desire as morally bad; 'evil
    desire' is concise and accurate.
- source_word: πλεονεξίαν
  chosen: greed
  alternatives:
  - covetousness
  - avarice
  lexicon: BDAG
  rationale: The word denotes grasping desire for more. 'Greed' is clear modern English;
    'covetousness' is traditional but less accessible.
- source_word: ἥτις ἐστὶν εἰδωλολατρία
  chosen: which is idolatry
  alternatives:
  - which amounts to idolatry
  lexicon: BDAG
  rationale: The relative clause most naturally refers to the immediately preceding
    singular noun 'greed.' 'Which is idolatry' preserves Paul's stark identification
    without softening it.
