theological_decisions:
- issue: Scope and grounding of the exhortation
  chosen_reading: The command is rendered with the qualifying phrase 'as is fitting
    in the Lord,' preserving that the instruction is framed and bounded by allegiance
    to the Lord rather than presented as an absolute, unqualified social maxim.
  alternative_readings:
  - as a general cultural norm without theological qualification
  - as if 'in the Lord' modified only the wives rather than the fittingness of the
    action
  rationale: The Greek places ἐν κυρίῳ with the statement of propriety. The translation
    preserves the theological qualifier without expanding it into commentary. This
    maintains the text's own tension and avoids importing broader doctrinal claims
    not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; κύριος
    default rendering 'Lord'.
