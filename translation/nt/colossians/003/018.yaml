id: COL.3.18
reference: Colossians 3:18
source:
  edition: SBLGNT
  text: Αἱ γυναῖκες, ὑποτάσσεσθε ⸀τοῖς ἀνδράσιν, ὡς ἀνῆκεν ἐν κυρίῳ.
translation:
  text: Wives, submit yourselves to your husbands, as is fitting in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be subject to your husbands.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as was proper in the Lord'; the Greek verb can be expressed as 'was
      fitting/proper,' though in this context it likely carries a general present
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυναῖκες
  chosen: Wives
  alternatives:
  - Women
  lexicon: BDAG
  rationale: In a household-code context paired with ἀνδράσιν, γυνή refers specifically
    to married women rather than women in general. 'Wives' makes the relational sense
    explicit in natural English.
- source_word: ὑποτάσσεσθε
  chosen: submit yourselves
  alternatives:
  - be subject
  - submit
  lexicon: BDAG
  rationale: The present middle/passive imperative here calls for voluntary ordering
    under another within the stated relationship. 'Submit yourselves' preserves the
    reflexive/volitional nuance better than a bare passive such as 'be subjected,'
    while remaining idiomatic.
- source_word: ἀνδράσιν
  chosen: your husbands
  alternatives:
  - men
  lexicon: BDAG
  rationale: In parallel with γυναῖκες in this domestic instruction, ἀνήρ means 'husband,'
    not 'man/men.' Supplying 'your' is natural in English and reflects the relational
    force of the dative plural in context.
- source_word: ὡς
  chosen: as
  alternatives:
  - because
  - since
  lexicon: BDAG
  rationale: Here ὡς introduces the standard or manner of what is appropriate, not
    a causal clause. 'As' best fits the syntax with ἀνῆκεν.
- source_word: ἀνῆκεν
  chosen: is fitting
  alternatives:
  - is proper
  - was fitting
  lexicon: BDAG
  rationale: 'Although morphologically imperfect, ἀνῆκεν functions idiomatically with
    present force in this paraenetic statement: what is proper or appropriate. ''Is
    fitting'' is concise, natural, and preserves the ethical sense without overinterpreting.'
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in Lord
  - before the Lord
  lexicon: BDAG
  rationale: The phrase is best retained literally. It locates the fittingness of
    the exhortation within relationship to the Lord, rather than merely adding a vague
    religious qualifier. 'Lord' follows the project's default rendering for κύριος.
