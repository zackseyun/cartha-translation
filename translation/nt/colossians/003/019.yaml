theological_decisions:
- issue: Household instruction and gendered address
  chosen_reading: Retain the gender-specific and marital address as 'Husbands' and
    'wives.'
  alternative_readings:
  - Use broader terms such as 'men' and 'women'
  rationale: The Greek is explicitly gendered and relational, and the doctrine excerpt
    directs gender-accurate translation over gender-neutral renderings. The verse
    addresses married men in relation to their wives, not a generic audience.
