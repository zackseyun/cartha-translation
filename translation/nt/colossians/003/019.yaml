id: COL.3.19
reference: Colossians 3:19
source:
  edition: SBLGNT
  text: οἱ ἄνδρες, ἀγαπᾶτε τὰς γυναῖκας καὶ μὴ πικραίνεσθε πρὸς αὐτάς.
translation:
  text: Husbands, love your wives, and do not be harsh toward them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not become bitter toward them.' The Greek verb can denote becoming
      bitter or embittered, but here likely refers to harsh, resentful treatment.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἄνδρες
  chosen: Husbands
  alternatives:
  - Men
  lexicon: BDAG
  rationale: Although ἀνήρ can mean 'man' or 'husband,' the household-code context
    and the direct object 'wives' make 'husbands' the clear relational sense.
- source_word: ἀγαπᾶτε
  chosen: love
  lexicon: BDAG
  rationale: Standard rendering of ἀγαπάω; it preserves the lexical connection to
    ἀγάπη and fits the imperative force without paraphrase.
- source_word: τὰς γυναῖκας
  chosen: your wives
  alternatives:
  - the wives
  - women
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife.' In this reciprocal household instruction,
    'wives' is required by context. English idiom naturally supplies 'your' though
    the Greek article is used.
- source_word: μὴ πικραίνεσθε
  chosen: do not be harsh
  alternatives:
  - do not be embittered
  - do not become bitter
  lexicon: BDAG
  rationale: πικραίνω literally relates to bitterness, but in this context with πρὸς
    αὐτάς it denotes harsh, resentful treatment toward one's wife. 'Do not be harsh'
    communicates the relational force in natural English while remaining faithful
    to the sense.
- source_word: πρὸς αὐτάς
  chosen: toward them
  alternatives:
  - against them
  - with them
  lexicon: BDAG
  rationale: πρός with the accusative here marks direction of attitude/action. 'Toward
    them' is a clear English equivalent and works naturally with 'be harsh.'
