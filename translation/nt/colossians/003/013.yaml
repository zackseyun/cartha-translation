theological_decisions:
- issue: Referent of ὁ κύριος
  chosen_reading: the Lord refers to Christ/the risen Lord in Pauline usage here
  alternative_readings:
  - the Lord could be understood more generally as God
  rationale: Within Colossians and the immediate ethical patterning, 'the Lord' most
    naturally points to Christ as the exemplar whose forgiveness grounds believers'
    forgiveness. Rendering simply 'the Lord' preserves the title without over-specifying
    beyond the Greek.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
- issue: Ellipsis in the final clause
  chosen_reading: leave the implied imperative/action elliptical in translation ('so
    also you')
  alternative_readings:
  - explicitly supply 'forgive'
  - explicitly supply 'must do'
  rationale: The Greek ends tersely with an implied verb. Preserving some ellipsis
    respects the source text's style and avoids importing a stronger modal than is
    stated, while the context makes the meaning clear.
