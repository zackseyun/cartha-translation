id: COL.3.13
reference: Colossians 3:13
source:
  edition: SBLGNT
  text: ἀνεχόμενοι ἀλλήλων καὶ χαριζόμενοι ἑαυτοῖς ἐάν τις πρός τινα ἔχῃ μομφήν· καθὼς
    καὶ ὁ ⸀κύριος ἐχαρίσατο ὑμῖν οὕτως καὶ ὑμεῖς·
translation:
  text: bearing with one another and forgiving each other, if anyone has a complaint
    against anyone; just as the Lord also forgave you, so also you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if anyone has a grievance against another.'
    reason: lexical_alternative
  - marker: b
    text: 'Some translations make the final clause explicit: ''so also you must forgive.''
      The Greek leaves the verb implied from the context.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνεχόμενοι
  chosen: bearing with
  alternatives:
  - putting up with
  - enduring
  lexicon: BDAG
  rationale: Present middle participle in a paraenetic list; 'bearing with' preserves
    the ongoing, relational sense without the harsher colloquial tone of 'putting
    up with.'
- source_word: ἀλλήλων
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering; retained here with the first participle
    for natural English parallelism.
- source_word: χαριζόμενοι
  chosen: forgiving
  alternatives:
  - graciously forgiving
  - showing grace to
  lexicon: BDAG
  rationale: In this context the verb denotes forgiving/remitting offense. 'Forgiving'
    is the clearest idiomatic English equivalent, while still allowing the grace nuance
    to be heard through the cognate relation to the later ἐχαρίσατο.
- source_word: ἑαυτοῖς
  chosen: each other
  alternatives:
  - yourselves
  - one another
  lexicon: BDAG
  rationale: Though formally reflexive/dative, in reciprocal context it means mutual
    action within the community. 'Each other' avoids awkward repetition after 'one
    another' and conveys the reciprocal force accurately.
- source_word: ἐάν τις πρός τινα ἔχῃ μομφήν
  chosen: if anyone has a complaint against anyone
  alternatives:
  - if anyone has a grievance against another
  - if anyone has blame against anyone
  lexicon: BDAG
  rationale: This conditional clause is generic and indefinite. 'Complaint' is natural
    modern English for μομφή, preserving the idea of a cause for reproach without
    overstating it as formal accusation.
- source_word: μομφήν
  chosen: complaint
  alternatives:
  - grievance
  - cause for blame
  lexicon: BDAG
  rationale: '''Complaint'' fits contemporary English and the interpersonal setting;
    ''grievance'' is possible but slightly more formal and potentially stronger.'
- source_word: καθὼς καὶ
  chosen: just as ... also
  alternatives:
  - as also
  - just as
  lexicon: BDAG
  rationale: Preserves the comparative force linking believers' forgiveness to the
    Lord's prior forgiveness.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a christological
    title. In context this refers to Christ as the model for forgiveness.
- source_word: ἐχαρίσατο
  chosen: forgave
  alternatives:
  - graciously forgave
  - freely forgave
  lexicon: BDAG
  rationale: Aorist middle of χαρίζομαι, matching the earlier participle semantically.
    'Forgave' is the most direct and idiomatic rendering in this ethical exhortation.
- source_word: οὕτως καὶ ὑμεῖς
  chosen: so also you
  alternatives:
  - so also must you do
  - so you also
  lexicon: BDAG
  rationale: The Greek is elliptical, with the verb implied from context. 'So also
    you' preserves the compact force of the exhortation without adding more than necessary;
    English readers readily supply the implied action from the preceding clause.
