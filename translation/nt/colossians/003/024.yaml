theological_decisions:
- issue: Rendering Χριστῷ in a title-bearing christological phrase
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The phrase τῷ κυρίῳ Χριστῷ presents Χριστός as a title rather than a
    mere name-like element. Following the doctrine's contested-terms guidance, 'Messiah'
    is preferred where the title sense is active, while preserving 'Christ' as a familiar
    alternative.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Force of δουλεύετε
  chosen_reading: indicative ('you are serving')
  alternative_readings:
  - imperatival-sounding translation ('serve the Lord Messiah')
  rationale: The morphology is present active indicative, second person plural. Although
    some English versions punctuate or phrase it like an imperative, the Greek form
    itself is indicative and functions as a motivating reminder within the household
    code.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition'
