id: COL.3.24
reference: Colossians 3:24
source:
  edition: SBLGNT
  text: εἰδότες ὅτι ἀπὸ κυρίου ⸀ἀπολήμψεσθε τὴν ἀνταπόδοσιν τῆς κληρονομίας· ⸀τῷ κυρίῳ
    Χριστῷ δουλεύετε·
translation:
  text: knowing that from the Lord you will receive the reward of the inheritance.
    You are serving the Lord Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the Lord Christ.'
    reason: alternative_reading
  - marker: b
    text: 'The Greek verb is indicative: ''you are serving,'' not a direct imperative
      ''serve.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδότες
  chosen: knowing
  alternatives:
  - since you know
  - because you know
  lexicon: BDAG
  rationale: A participial form continuing the exhortational flow from the previous
    verse. 'Knowing' preserves the participial connection without over-interpreting
    the causal nuance, though English readers may hear it causally.
- source_word: ἀπὸ κυρίου
  chosen: from the Lord
  alternatives:
  - from a lord
  - from the Master
  lexicon: BDAG
  rationale: 'ἀπό with genitive marks source: the recompense comes ''from'' the Lord.
    κύριος is rendered ''Lord'' per doctrine defaults; ''Master'' is possible in a
    slave/household context but would obscure the christological title here.'
- source_word: ἀπολήμψεσθε
  chosen: you will receive
  alternatives:
  - you will be paid back
  - you will obtain
  lexicon: BDAG
  rationale: Future middle indicative of receiving back or receiving in return. 'You
    will receive' is natural English and fits the object ἀνταπόδοσιν; the reciprocal
    nuance is sufficiently carried by 'reward'.
- source_word: ἀνταπόδοσιν
  chosen: the reward
  alternatives:
  - the recompense
  - the repayment
  lexicon: BDAG
  rationale: The noun denotes recompense or reward. 'Reward' is clearer in modern
    English while still fitting the positive eschatological context; 'recompense'
    is more formal but less natural.
- source_word: τῆς κληρονομίας
  chosen: of the inheritance
  alternatives:
  - which is the inheritance
  - the inheritance as your reward
  lexicon: BDAG
  rationale: 'The genitive is best retained straightforwardly: the reward consists
    in or is characterized by the inheritance. ''Of the inheritance'' preserves the
    compact Greek expression without forcing a more interpretive paraphrase.'
- source_word: τῷ κυρίῳ Χριστῷ
  chosen: the Lord Messiah
  alternatives:
  - the Lord Christ
  - Christ the Lord
  - the Lord Jesus Christ
  lexicon: BDAG
  rationale: 'Χριστῷ is title-bearing here and, per doctrine guidance, is rendered
    ''Messiah'' where context supports title sense. κύριος remains ''Lord.'' The dative
    is governed by δουλεύετε: they serve the Lord Messiah.'
- source_word: δουλεύετε
  chosen: you are serving
  alternatives:
  - serve
  - you serve
  - be slaves to
  lexicon: BDAG
  rationale: 'Present active indicative can be read as an assertion grounding the
    exhortation: ''you are serving.'' This fits the context of Christian slaves being
    reminded of their true master. ''Serve'' as imperative is possible in English
    punctuation traditions, but the form is indicative, not imperative; ''be slaves
    to'' is too wooden here.'
