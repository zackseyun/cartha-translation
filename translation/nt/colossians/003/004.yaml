id: COL.3.4
reference: Colossians 3:4
source:
  edition: SBLGNT
  text: ὅταν ὁ Χριστὸς φανερωθῇ, ἡ ζωὴ ⸀ὑμῶν, τότε καὶ ὑμεῖς σὺν αὐτῷ φανερωθήσεσθε
    ἐν δόξῃ.
translation:
  text: When the Messiah, who is your life, is revealed, then you also will be revealed
    with him in glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ' instead of 'the Messiah.' The Greek title Χριστός can be rendered
      either way; here 'Messiah' preserves the title's meaning.
    reason: alternative_reading
  - marker: b
    text: Literally, 'the Messiah, your life.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will appear with him in glory.' The Greek verb is the same root used
      earlier in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: When
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a future temporal clause with the subjunctive φανερωθῇ. 'When'
    is the most natural English rendering here, pointing to the expected future event
    rather than a repeated occurrence.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title here rather than a name-like label. Per doctrine guidance,
    Χριστός is translated 'Messiah' where context supports title force. The article
    ὁ also supports a titular sense.
- source_word: φανερωθῇ
  chosen: is revealed
  alternatives:
  - appears
  - is manifested
  lexicon: BDAG
  rationale: Passive aorist subjunctive of φανερόω. 'Is revealed' preserves the passive
    form and the sense of becoming openly visible/known. 'Appears' is idiomatic but
    slightly less transparent to the Greek voice.
- source_word: ἡ ζωὴ ὑμῶν
  chosen: who is your life
  alternatives:
  - your life
  lexicon: BDAG
  rationale: 'The Greek apposition literally reads ''the Messiah, your life.'' English
    normally requires an explicit relative clause to make the appositional sense clear:
    Messiah is identified as the believers'' life. This is an explicitation for readability,
    not an added concept.'
- source_word: τότε καὶ
  chosen: then ... also
  alternatives:
  - then
  - at that time also
  lexicon: BDAG
  rationale: τότε marks the consequent time and καὶ adds inclusion/emphasis. Rendering
    both preserves the sequence and the believers' participation in what happens to
    Messiah.
- source_word: ὑμεῖς
  chosen: you
  lexicon: BDAG
  rationale: Explicit pronoun in Greek adds emphasis; English can convey this adequately
    with word order and the accompanying 'also' without needing typographic emphasis.
- source_word: σὺν αὐτῷ
  chosen: with him
  alternatives:
  - together with him
  lexicon: BDAG
  rationale: σύν denotes close association/participation. 'With him' is natural and
    sufficient; 'together with him' is possible but heavier in English.
- source_word: φανερωθήσεσθε
  chosen: will be revealed
  alternatives:
  - will appear
  - will be manifested
  lexicon: BDAG
  rationale: Future passive of the same verb as earlier in the verse. Rendering it
    with the same English root ('revealed') preserves the verbal parallel between
    Messiah's revelation and believers' revelation.
- source_word: ἐν δόξῃ
  chosen: in glory
  alternatives:
  - in glorious splendor
  - gloriously
  lexicon: BDAG
  rationale: A concise and traditional rendering that preserves the prepositional
    phrase and its theological weight. It likely denotes the sphere or mode of eschatological
    manifestation rather than merely an adverbial flourish.
