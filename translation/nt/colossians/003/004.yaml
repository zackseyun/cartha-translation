theological_decisions:
- issue: Rendering Χριστός as title or name-like form
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The verse presents Χριστός with the article and in a clearly titular,
    christological statement. Following the project's contested-terms guidance, the
    title is translated rather than transliterated.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names'' and
    contested terms table for Χριστός'
- issue: Appositional identification of Messiah with believers' life
  chosen_reading: who is your life
  alternative_readings:
  - your life
  rationale: The Greek apposition strongly identifies the Messiah as the believers'
    life. The English relative clause clarifies this identification without importing
    a doctrinal explanation beyond the text. It preserves the theological force rather
    than flattening it into a loose association.
  doctrine_reference: 'DOCTRINE.md: ''Preserve theological tension rather than resolve
    it'''
