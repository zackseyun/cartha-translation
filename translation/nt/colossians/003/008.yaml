theological_decisions:
- issue: Rendering βλασφημία in an ethical vice list
  chosen_reading: slander
  alternative_readings:
  - blasphemy
  - abusive speech
  rationale: The immediate context is a list of interpersonal sins to be discarded,
    followed by a phrase about speech 'from your mouth.' This favors a human-directed
    speech sin rather than specifically irreverence toward God. The broader semantic
    range is preserved in a footnote for auditability.
