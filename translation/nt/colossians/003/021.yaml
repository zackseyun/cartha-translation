id: COL.3.21
reference: Colossians 3:21
source:
  edition: SBLGNT
  text: οἱ πατέρες, μὴ ἐρεθίζετε τὰ τέκνα ὑμῶν, ἵνα μὴ ἀθυμῶσιν.
translation:
  text: Fathers, do not provoke your children, so that they may not become discouraged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may not lose heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πατέρες
  chosen: Fathers
  alternatives:
  - Parents
  lexicon: BDAG
  rationale: The noun πατέρες is grammatically and lexically 'fathers,' not the gender-neutral
    'parents.' This follows the gender-accurate principle and matches the household-code
    context, where specific family roles are addressed distinctly.
- source_word: μὴ ἐρεθίζετε
  chosen: do not provoke
  alternatives:
  - do not embitter
  - do not stir up
  - do not irritate
  lexicon: BDAG
  rationale: ἐρεθίζω here means to arouse or provoke in a negative sense. 'Provoke'
    is concise, natural English and preserves the active sense of behavior that incites
    a harmful response in children.
- source_word: τὰ τέκνα ὑμῶν
  chosen: your children
  alternatives:
  - your sons and daughters
  lexicon: BDAG
  rationale: τέκνα is the standard inclusive term for offspring/children. 'Your children'
    is the most natural and accurate rendering in context.
- source_word: ἵνα μὴ
  chosen: so that ... not
  alternatives:
  - lest
  - in order that ... not
  lexicon: BDAG
  rationale: ἵνα with μή expresses purpose or intended result. 'So that ... not' gives
    clear modern English while preserving the clause's purposive force.
- source_word: ἀθυμῶσιν
  chosen: may not become discouraged
  alternatives:
  - may not lose heart
  - may not become disheartened
  lexicon: BDAG
  rationale: ἀθυμέω denotes becoming discouraged or losing heart. 'Become discouraged'
    is readable modern English and captures the resulting inward loss of courage or
    spirit implied by the verb.
