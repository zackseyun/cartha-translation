- issue: Scope of πατέρες in household instruction
  chosen_reading: Addressed specifically to fathers
  alternative_readings:
  - Addressed generically to parents
  rationale: The Greek explicitly says 'fathers.' While the application may extend
    more broadly, the translation should preserve the specific addressee rather than
    generalize to 'parents.'
