id: COL.3.12
reference: Colossians 3:12
source:
  edition: SBLGNT
  text: Ἐνδύσασθε οὖν ὡς ἐκλεκτοὶ τοῦ θεοῦ, ἅγιοι καὶ ἠγαπημένοι, σπλάγχνα οἰκτιρμοῦ,
    χρηστότητα, ταπεινοφροσύνην, πραΰτητα, μακροθυμίαν,
translation:
  text: Put on, then, as God’s chosen ones, holy and beloved, a heart of compassion,
    kindness, humility, gentleness, and patience,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “compassionate hearts.” The Greek literally speaks of inward affections
      of mercy/compassion.
    reason: lexical_alternative
  - marker: b
    text: Or “the elect of God.”
    reason: alternative_reading
  - marker: c
    text: Or “meekness.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐνδύσασθε
  chosen: Put on
  alternatives:
  - Clothe yourselves with
  lexicon: BDAG
  rationale: Aorist middle imperative of ἐνδύω used metaphorically for adopting virtues.
    'Put on' is idiomatic, concise modern English that preserves the clothing metaphor
    without awkwardness.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding exhortation. 'Then' is natural in
    English and keeps the discourse connection without sounding overly formal.
- source_word: ὡς
  chosen: as
  alternatives:
  - since you are
  - as those who are
  lexicon: BDAG
  rationale: 'Retains the comparative/identificational force: they are to act in keeping
    with their identity. ''As'' is sufficiently transparent and avoids over-interpreting
    the conjunction as purely causal.'
- source_word: ἐκλεκτοὶ τοῦ θεοῦ
  chosen: God’s chosen ones
  alternatives:
  - the elect of God
  - God’s chosen people
  lexicon: BDAG
  rationale: ἐκλεκτοί means 'chosen' or 'elect.' 'Chosen ones' is clear modern English
    and avoids importing later theological systematization that 'the elect' may suggest,
    while preserving the divine initiative expressed by τοῦ θεοῦ.
- source_word: ἅγιοι
  chosen: holy
  alternatives:
  - saints
  - set apart
  lexicon: BDAG
  rationale: Predicate adjective modifying the readers' identity. 'Holy' preserves
    the adjectival form and theological weight better than 'saints,' which would shift
    to a noun and sound more tradition-bound.
- source_word: ἠγαπημένοι
  chosen: beloved
  alternatives:
  - loved
  lexicon: BDAG
  rationale: 'Perfect passive participle functioning adjectivally: those who have
    been loved and remain so. ''Beloved'' captures both the relational warmth and
    the established status more naturally than ''loved.'''
- source_word: σπλάγχνα οἰκτιρμοῦ
  chosen: a heart of compassion
  alternatives:
  - compassionate hearts
  - bowels of mercy
  - deep compassion
  lexicon: BDAG
  rationale: Literally 'inward parts of compassion,' an idiom for deep-seated pity/mercy.
    'A heart of compassion' communicates the anthropological metaphor in natural English
    while preserving the singular collective sense of an inner disposition.
- source_word: χρηστότητα
  chosen: kindness
  alternatives:
  - goodness
  - benevolence
  lexicon: BDAG
  rationale: Standard ethical sense in Pauline virtue lists. 'Kindness' is the clearest
    and most idiomatic rendering in this context.
- source_word: ταπεινοφροσύνην
  chosen: humility
  alternatives:
  - lowliness
  lexicon: BDAG
  rationale: Refers to humble-mindedness. 'Humility' is standard modern English and
    accurately conveys the virtue without archaic tone.
- source_word: πραΰτητα
  chosen: gentleness
  alternatives:
  - meekness
  lexicon: BDAG
  rationale: πραΰτης can be rendered 'meekness,' but in contemporary English 'gentleness'
    better communicates strength under control without the misleading connotations
    of weakness that 'meekness' may carry.
- source_word: μακροθυμίαν
  chosen: patience
  alternatives:
  - longsuffering
  - forbearance
  lexicon: BDAG
  rationale: Denotes patient endurance toward others. 'Patience' is the most natural
    rendering in a virtue list; 'longsuffering' is more formal and archaic, while
    'forbearance' can be too narrow.
