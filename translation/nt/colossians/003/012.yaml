theological_decisions:
- issue: Rendering ἐκλεκτοὶ τοῦ θεοῦ in a way that preserves the text's covenantal
    identity language without importing a specific denominational doctrine of election
  chosen_reading: God’s chosen ones
  alternative_readings:
  - the elect of God
  - God’s chosen people
  rationale: The verse identifies believers as those chosen by God, but does not here
    explicate the mechanics or order of election. 'God’s chosen ones' preserves the
    lexical meaning while avoiding unnecessary system-laden overtones that some readers
    attach to 'the elect.'
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Rendering πραΰτης with accessible modern English while preserving ethical
    force
  chosen_reading: gentleness
  alternative_readings:
  - meekness
  rationale: No doctrinal dispute is at stake, but the translation philosophy prioritizes
    readable modern English. 'Gentleness' better communicates the virtue to contemporary
    readers without flattening its moral seriousness.
  doctrine_reference: Translation philosophy §6
