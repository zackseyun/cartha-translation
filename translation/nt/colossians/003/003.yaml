theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: Per doctrine guidance, Χριστός should be translated as 'Messiah' where
    it functions as a title. In this context, the phrase speaks of union with the
    anointed one in a theological sense rather than using 'Christ' merely as a fixed
    proper-name element.
