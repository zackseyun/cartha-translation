id: COL.3.3
reference: Colossians 3:3
source:
  edition: SBLGNT
  text: ἀπεθάνετε γάρ, καὶ ἡ ζωὴ ὑμῶν κέκρυπται σὺν τῷ Χριστῷ ἐν τῷ θεῷ·
translation:
  text: For you died, and your life has been hidden with the Messiah in God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with Christ.' The Greek title Χριστός can be rendered 'Messiah' or
      'Christ'; here it is translated as a title to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: Or, 'is hidden.' The Greek perfect can emphasize a present state resulting
      from a completed action.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεθάνετε
  chosen: you died
  alternatives:
  - you have died
  lexicon: BDAG
  rationale: Aorist indicative, second person plural, referring to the believers'
    decisive past death with Christ. English simple past best reflects the aorist
    here in natural style, while 'you have died' is possible but can overemphasize
    present-result nuance already carried elsewhere in the verse.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks explanation/ground for the preceding exhortation. 'For' preserves
    the connective force in a concise, natural way.
- source_word: ζωὴ
  chosen: life
  lexicon: BDAG
  rationale: Standard rendering of ζωή. In context it refers to the believers' true
    life in union with Christ, but no expansion beyond 'life' is warranted in the
    main text.
- source_word: κέκρυπται
  chosen: has been hidden
  alternatives:
  - is hidden
  lexicon: BDAG
  rationale: Perfect passive indicative. 'Has been hidden' preserves both the completed
    action and its continuing state more explicitly than the simpler 'is hidden,'
    while remaining readable.
- source_word: σὺν τῷ Χριστῷ
  chosen: with the Messiah
  alternatives:
  - with Christ
  lexicon: BDAG
  rationale: Χριστός is a title here rather than a name-like usage, so the default
    doctrinal guidance favors 'Messiah.' σύν is rendered 'with,' expressing union/association.
- source_word: ἐν τῷ θεῷ
  chosen: in God
  alternatives:
  - with God
  lexicon: BDAG
  rationale: ἐν normally denotes location/sphere here; 'in God' best preserves the
    Greek wording and theological force of secure incorporation without paraphrase.
