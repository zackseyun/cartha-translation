id: COL.3.7
reference: Colossians 3:7
source:
  edition: SBLGNT
  text: ἐν οἷς καὶ ὑμεῖς περιεπατήσατέ ποτε ὅτε ἐζῆτε ἐν ⸀τούτοις·
translation:
  text: In these things you too once walked, when you were living in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In which things you too once walked, when you were living in them.'
      The Greek relative pronoun may be rendered more literally as 'in which things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν οἷς
  chosen: In these things
  alternatives:
  - Among which
  - In which
  lexicon: BDAG
  rationale: The dative plural relative pronoun refers back to the preceding list
    of vices in the immediate context. 'In these things' makes the referent explicit
    and reads naturally in English while preserving the locative/instrumental sense
    of ἐν.
- source_word: καὶ ὑμεῖς
  chosen: you too
  alternatives:
  - you also
  lexicon: BDAG
  rationale: καὶ with the emphatic pronoun ὑμεῖς highlights that the Colossians themselves
    formerly shared this way of life. 'You too' preserves the emphasis in idiomatic
    English.
- source_word: περιεπατήσατε
  chosen: walked
  alternatives:
  - lived
  - conducted yourselves
  lexicon: BDAG
  rationale: Paul frequently uses περιπατέω metaphorically for manner of life. 'Walked'
    preserves the metaphor and Pauline diction better than flattening it to 'lived,'
    especially since ἐζῆτε later in the verse is from ζάω and benefits from lexical
    distinction.
- source_word: ποτε
  chosen: once
  alternatives:
  - formerly
  - at one time
  lexicon: BDAG
  rationale: ποτε marks past time in an indefinite but clearly former sense. 'Once'
    is concise and natural.
- source_word: ὅτε
  chosen: when
  alternatives:
  - while
  lexicon: BDAG
  rationale: A straightforward temporal conjunction linking their former conduct with
    their former state of life.
- source_word: ἐζῆτε
  chosen: were living
  alternatives:
  - lived
  - were alive
  lexicon: BDAG
  rationale: Imperfect aspect suggests ongoing past state. 'Were living' captures
    the durative sense and avoids confusion with the metaphorical 'walked.' 'Were
    alive' is possible lexically but here the sense is existential/behavioral life
    within those practices, not mere biological existence.
- source_word: ἐν τούτοις
  chosen: in them
  alternatives:
  - in these things
  - among them
  lexicon: BDAG
  rationale: τούτοις again points to the previously named sins/practices. 'In them'
    avoids awkward repetition after 'In these things' while preserving the same referent
    and the sense of being immersed in that former sphere of life.
