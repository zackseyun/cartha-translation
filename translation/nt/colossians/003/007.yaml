theological_decisions:
- issue: Relation of 'walked' and 'were living' in Paul's ethical description
  chosen_reading: The verse distinguishes former conduct ('walked') from former sphere/state
    of life ('were living in them').
  alternative_readings:
  - Treat both verbs as near synonyms and render both simply as 'lived'
  rationale: Preserving the distinction reflects the Greek verbs περιπατέω and ζάω
    and maintains Paul's layered description of past sinful practice without importing
    additional doctrinal claims.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
