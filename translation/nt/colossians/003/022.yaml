theological_decisions:
- issue: Ethical instruction within slavery context (δοῦλοι/κυρίοι)
  chosen_reading: Translate the social reality plainly (“slaves…masters”) without
    endorsing the institution; keep Paul’s contrast between human masters and the
    Lord explicit.
  alternative_readings:
  - Soften to “servants…masters/employers” to align with modern employment categories
  rationale: The Greek household-code terminology refers to slavery in the ancient
    world; rendering it as employment risks obscuring the historical and ethical tension
    present in the text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; δοῦλος servant/slave
    context-dependent'
