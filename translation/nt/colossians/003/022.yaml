id: COL.3.22
reference: Colossians 3:22
source:
  edition: SBLGNT
  text: οἱ δοῦλοι, ὑπακούετε κατὰ πάντα τοῖς κατὰ σάρκα κυρίοις, μὴ ἐν ⸀ὀφθαλμοδουλίαις,
    ὡς ἀνθρωπάρεσκοι, ἀλλ’ ἐν ἁπλότητι καρδίας, φοβούμενοι τὸν ⸀κύριον.
translation:
  text: Slaves, obey in everything those who are your masters according to the flesh,
    not with eye-service, as people-pleasers, but with sincerity of heart, fearing
    the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: 3:22a
    text: “Slaves” (Greek δοῦλοι) can also be rendered “servants” or “bondservants,”
      but the term commonly denotes an enslaved person under a master’s authority.
    reason: lexical_alternative
  - marker: 3:22b
    text: “According to the flesh” may be rendered “earthly,” emphasizing that these
      masters’ authority is limited to this-worldly, human relations.
    reason: lexical_alternative
  - marker: 3:22c
    text: “Eye-service” refers to work done only when one is being watched.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δοῦλοι
  chosen: Slaves
  alternatives:
  - Servants
  - Bondservants
  lexicon: BDAG
  rationale: δοῦλος commonly denotes an enslaved person under another’s authority;
    in this household-code context the bonded status is salient, so “slaves” is preferred
    over the softer “servants.”
- source_word: ὑπακούετε
  chosen: obey
  alternatives:
  - be obedient to
  - listen to
  lexicon: BDAG
  rationale: Imperative of ὑπακούω; “obey” is the natural English imperative conveying
    compliance to authority.
- source_word: κατὰ πάντα
  chosen: in everything
  alternatives:
  - in all things
  - in every respect
  lexicon: BDAG
  rationale: Idiomatic distributive sense; “in everything” is clear modern English
    while retaining scope.
- source_word: τοῖς κατὰ σάρκα κυρίοις
  chosen: those who are your masters according to the flesh
  alternatives:
  - your earthly masters
  - your masters in the flesh
  lexicon: BDAG
  rationale: Retains Paul’s qualifier κατὰ σάρκα rather than collapsing to “earthly,”
    while still making the referent clear in English.
- source_word: σάρκα
  chosen: flesh
  alternatives:
  - earthly
  lexicon: BDAG
  rationale: Here σάρξ contrasts human/this-worldly relations with the Lord; “flesh”
    preserves the Pauline term and its contrastive force.
- source_word: κυρίοις
  chosen: masters
  alternatives:
  - lords
  lexicon: BDAG
  rationale: In this clause κύριος refers to human slaveholders/masters; “masters”
    avoids confusion with the later reference to “the Lord.”
- source_word: μὴ ἐν ὀφθαλμοδουλίαις
  chosen: not with eye-service
  alternatives:
  - not with mere eye-service
  - not only when being watched
  lexicon: BDAG
  rationale: Rare compound meaning service performed only under observation; “eye-service”
    is a compact calque used in English Bible tradition and remains understandable.
- source_word: ὡς ἀνθρωπάρεσκοι
  chosen: as people-pleasers
  alternatives:
  - as men-pleasers
  - as those who please people
  lexicon: BDAG
  rationale: Captures the στόχος of pleasing humans; “people-pleasers” is idiomatic
    and keeps the pejorative nuance.
- source_word: ἀλλ’ ἐν ἁπλότητι καρδίας
  chosen: but with sincerity of heart
  alternatives:
  - but in singleness of heart
  - but with simplicity of heart
  lexicon: BDAG
  rationale: ἁπλότης here conveys single-minded sincerity/integrity rather than intellectual
    simplicity; “sincerity of heart” communicates the ethical sense.
- source_word: φοβούμενοι
  chosen: fearing
  alternatives:
  - revering
  - having fear of
  lexicon: BDAG
  rationale: Participle expressing manner/motivation; “fearing” preserves the biblical
    fear-of-the-Lord concept without over-softening.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Default rendering for κύριος as a divine title per project standards;
    context indicates the Lord (Christ) rather than human masters.
