theological_decisions:
- issue: Nature of divine judgment/impartiality
  chosen_reading: The verse states a principle of impartial recompense without specifying
    the full mechanism or timing of judgment.
  alternative_readings:
  - A narrowly eschatological judgment statement
  - A statement limited to social relations between masters and slaves
  rationale: 'The wording is broad: the wrongdoer will receive back what he has done
    wrong, and there is no partiality. The translation preserves this general moral-theological
    warning without narrowing it beyond what the Greek states.'
  doctrine_reference: Preserve theological tension rather than resolve it.
