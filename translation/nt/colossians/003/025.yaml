id: COL.3.25
reference: Colossians 3:25
source:
  edition: SBLGNT
  text: ὁ ⸀γὰρ ἀδικῶν κομίσεται ὃ ἠδίκησεν, καὶ οὐκ ἔστιν προσωπολημψία.
translation:
  text: For the wrongdoer will be repaid for what he has done wrong, and there is
    no partiality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the one who does wrong will receive back the wrong he has done.'
    reason: lexical_alternative
  - marker: b
    text: Or 'there is no favoritism'; literally, 'there is no receiving of face,'
      that is, no judging by outward status.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ γὰρ ἀδικῶν
  chosen: For the wrongdoer
  alternatives:
  - For the one doing wrong
  - For the one who does wrong
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    generically to a person characterized by wrongdoing. 'Wrongdoer' is concise, natural
    English and preserves the generic force without unnecessary expansion. 'For' renders
    γάρ as explanatory/grounding.
- source_word: κομίσεται
  chosen: will be repaid
  alternatives:
  - will receive back
  - will receive
  lexicon: BDAG
  rationale: κομίζω in this context carries the sense of receiving what is due in
    return for one's actions. The passive/middle future is well conveyed by 'will
    be repaid,' which makes the retributive sense clear in idiomatic English.
- source_word: ὃ ἠδίκησεν
  chosen: for what he has done wrong
  alternatives:
  - what he did wrong
  - the wrong he has done
  lexicon: BDAG
  rationale: The relative pronoun with aorist verb points to the wrongful act(s) committed.
    'For what he has done wrong' reads smoothly in English and keeps the connection
    to ἀδικέω. The perfect-like English phrasing highlights completed wrongdoing with
    present accountability.
- source_word: οὐκ ἔστιν προσωπολημψία
  chosen: there is no partiality
  alternatives:
  - there is no favoritism
  - there is no respect of persons
  lexicon: BDAG
  rationale: προσωπολημψία denotes partiality or favoritism, especially judging by
    status or outward standing. 'There is no partiality' is clear, modern, and slightly
    more formal than 'favoritism,' fitting the solemnity of the warning while avoiding
    archaic 'respect of persons'.
- source_word: implicit generic masculine in ὁ ... ἀδικῶν / ἠδίκησεν
  chosen: he
  alternatives:
  - they
  - the person ... has done wrong
  rationale: The Greek is grammatically masculine singular with generic force. Per
    the translation philosophy's gender-accurate principle, the English retains a
    masculine singular form rather than flattening to plural. The generic sense is
    preserved by the noun 'wrongdoer,' and the masculine pronoun reflects the source
    grammar.
