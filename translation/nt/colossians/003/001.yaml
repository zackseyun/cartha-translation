id: COL.3.1
reference: Colossians 3:1
source:
  edition: SBLGNT
  text: Εἰ οὖν συνηγέρθητε τῷ Χριστῷ, τὰ ἄνω ζητεῖτε, οὗ ὁ Χριστός ἐστιν ἐν δεξιᾷ
    τοῦ θεοῦ καθήμενος·
translation:
  text: If, then, you were raised with the Messiah, seek the things above, where the
    Messiah is, seated at the right hand of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Since, then, you have been raised with Christ.' The Greek keeps a conditional
      form ('If, then') that likely assumes the condition as true in context.
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ οὖν
  chosen: If, then
  alternatives:
  - Since, then
  - Therefore, if
  lexicon: BDAG
  rationale: Retains the conditional particle εἰ and inferential οὖν without collapsing
    the clause into an assumed fact. Although the condition is rhetorically assumed
    true in context, 'if, then' best preserves the Greek form while remaining natural
    English.
- source_word: συνηγέρθητε
  chosen: you were raised
  alternatives:
  - you have been raised
  - you rose together
  lexicon: BDAG
  rationale: Aorist passive indicative, second plural, from συνεγείρω. 'Were raised'
    reflects the passive verbal form and the past event sense. 'Have been raised'
    is possible in English for present-result emphasis, but the simpler past better
    matches the aorist here while the union idea is carried by the following phrase.
- source_word: τῷ Χριστῷ
  chosen: with the Messiah
  alternatives:
  - with Christ
  lexicon: BDAG
  rationale: 'The dative here expresses association/union: believers were raised together
    with Christ. Per doctrine guidance, Χριστός as a title is rendered ''Messiah''
    rather than transliterated ''Christ,'' since the title sense is still active in
    Pauline usage.'
- source_word: τὰ ἄνω
  chosen: the things above
  alternatives:
  - the things that are above
  - what is above
  - the heavenly things
  lexicon: BDAG
  rationale: The neuter plural article with adverb ἄνω functions substantivally. 'The
    things above' is concise, idiomatic, and preserves the plural breadth of Paul's
    exhortation better than the singular 'what is above.'
- source_word: ζητεῖτε
  chosen: seek
  alternatives:
  - keep seeking
  - set your hearts on
  lexicon: BDAG
  rationale: Present active imperative calls for ongoing orientation. 'Seek' is the
    standard lexical sense and leaves the durative force to context; 'keep seeking'
    is interpretively fuller but slightly more expansive than the Greek wording.
- source_word: οὗ
  chosen: where
  alternatives:
  - there, where
  lexicon: BDAG
  rationale: Locative relative adverb referring to the realm 'above.' 'Where' is the
    natural English equivalent and smoothly introduces the relative clause.
- source_word: ὁ Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Again treated as a title rather than a name-like form in keeping with
    the project's default rendering for Χριστός where context supports title force.
- source_word: ἐν δεξιᾷ τοῦ θεοῦ
  chosen: at the right hand of God
  alternatives:
  - at God's right hand
  - on the right hand of God
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering of the exaltation formula. 'At
    the right hand of God' preserves both the metaphorical royal imagery and familiar
    biblical idiom.
- source_word: καθήμενος
  chosen: seated
  alternatives:
  - sitting
  - enthroned
  lexicon: BDAG
  rationale: Present middle/passive participle describing the Messiah's current exalted
    position. 'Seated' is idiomatic in English and fits the royal/session context
    without over-interpreting as 'enthroned,' though enthronement is implied.
