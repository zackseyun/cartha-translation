theological_decisions:
- issue: Rendering Χριστός in Pauline context
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate Χριστός as 'Messiah' where the title
    sense is active. In this verse Paul speaks of believers' union with the exalted
    anointed one, so the titular sense remains meaningful and should be preserved
    in English.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; ''Χριστός Christos → Messiah
    (where title; Christ where name-like)''.'
- issue: Force of the conditional clause Εἰ
  chosen_reading: Preserve formal conditional with 'If, then'
  alternative_readings:
  - Since, then
  rationale: The Greek uses a first-class style condition often assuming truth for
    argument, but the translation philosophy prefers preserving theological tension
    rather than resolving it unnecessarily. 'If, then' keeps the Greek structure while
    the broader context still communicates Paul's assumption.
  doctrine_reference: 'DOCTRINE.md: ''Preserve theological tension rather than resolve
    it.'''
