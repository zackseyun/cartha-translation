id: COL.3.6
reference: Colossians 3:6
source:
  edition: SBLGNT
  text: δι’ ἃ ἔρχεται ἡ ὀργὴ τοῦ θεοῦ ⸂ἐπὶ τοὺς υἱοὺς τῆς ἀπειθείας⸃·
translation:
  text: Because of these things the wrath of God is coming upon the sons of disobedience.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of disobedience,' that is, people characterized by disobedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ἃ
  chosen: Because of these things
  alternatives:
  - for which things
  - on account of which
  lexicon: BDAG
  rationale: διά with the accusative relative pronoun ἃ expresses cause ('because
    of, on account of'). 'These things' clearly points back to the vices in the previous
    verse and is natural English while preserving the plural reference.
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - is on its way
  lexicon: BDAG
  rationale: Present middle/passive indicative of ἔρχομαι is best rendered as a present
    with imminent or ongoing force here. 'Is coming' preserves the verbal aspect and
    eschatological sense better than a simple gnomic 'comes'.
- source_word: ἡ ὀργὴ τοῦ θεοῦ
  chosen: the wrath of God
  alternatives:
  - God's wrath
  lexicon: BDAG
  rationale: ὀργή denotes wrath/anger in a judicial-divine sense in Pauline usage.
    'The wrath of God' is a clear and established rendering that preserves the genitival
    construction and theological weight without paraphrase.
- source_word: ἐπὶ
  chosen: upon
  alternatives:
  - 'on'
  - against
  lexicon: BDAG
  rationale: With the accusative, ἐπί here marks direction/target of the coming wrath.
    'Upon' is idiomatic in English for judgment language and preserves the force better
    than the flatter 'on'.
- source_word: τοὺς υἱοὺς τῆς ἀπειθείας
  chosen: the sons of disobedience
  alternatives:
  - the children of disobedience
  - those who are disobedient
  lexicon: BDAG
  rationale: This is a Semitic-style genitival expression meaning people characterized
    by disobedience. Per the gender-accurate policy, the masculine υἱούς is retained
    as 'sons' rather than neutralizing to 'children' or paraphrasing to 'those who
    are disobedient'; the idiom is preserved in the main text, with a footnote giving
    the sense.
