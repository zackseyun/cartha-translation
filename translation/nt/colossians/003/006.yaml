theological_decisions:
- issue: Whether to retain the idiomatic expression 'sons of disobedience' or interpret
    it more dynamically
  chosen_reading: Retain 'sons of disobedience' in the main text
  alternative_readings:
  - children of disobedience
  - those characterized by disobedience
  rationale: The Greek uses a masculine idiom that denotes people marked by disobedience.
    In keeping with the translation philosophy's gender-accurate principle and preference
    to preserve source-language texture where understandable, the idiom is kept in
    the main text while its sense is clarified in a footnote rather than being flattened
    in translation.
