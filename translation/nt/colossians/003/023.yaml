id: COL.3.23
reference: Colossians 3:23
source:
  edition: SBLGNT
  text: ⸀ὃ ἐὰν ποιῆτε, ἐκ ψυχῆς ἐργάζεσθε, ὡς τῷ κυρίῳ καὶ οὐκ ἀνθρώποις,
translation:
  text: Whatever you do, work from the soul, as for the Lord and not for men,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heartily' or 'from the heart'; literally 'from the soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'people'; Greek 'men' here is a generic term for human beings, contrasting
      human beings with the Lord.
    reason: lexical_alternative
  - marker: c
    text: '''Lord'' could also be understood with the nuance ''Master'' in this household
      context.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὃ ἐὰν ποιῆτε
  chosen: Whatever you do
  alternatives:
  - Whatever you may do
  - Whatever thing you do
  lexicon: BDAG
  rationale: 'The neuter relative with ἐάν introduces an indefinite/general condition:
    ''whatever'' rather than a more wooden ''what if.'' English idiom is best captured
    by ''Whatever you do.'''
- source_word: ἐκ ψυχῆς
  chosen: from the soul
  alternatives:
  - heartily
  - from the heart
  - wholeheartedly
  lexicon: BDAG
  rationale: Literally 'from the soul.' This phrase denotes inner sincerity and full
    personal engagement. I retained the more literal 'from the soul' to preserve the
    Greek imagery and avoid flattening ψυχή into a mere adverb, while still remaining
    understandable in modern English.
- source_word: ἐργάζεσθε
  chosen: work
  alternatives:
  - labor
  - do your work
  lexicon: BDAG
  rationale: Present middle/passive imperative here functions as an exhortation to
    active effort. 'Work' is the most natural and sufficiently broad English equivalent
    in context.
- source_word: ὡς
  chosen: as for
  alternatives:
  - as to
  - as if for
  lexicon: BDAG
  rationale: 'The comparative particle introduces manner/perspective: they are to
    work in the way one works for the Lord. ''As for'' is idiomatic and preserves
    the relational orientation.'
- source_word: τῷ κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' The dative with ὡς
    is naturally expressed in English as 'for the Lord.' 'Master' could fit the household
    context, but the default christological title should be preserved unless context
    clearly demands otherwise.
- source_word: ἀνθρώποις
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: BDAG
  rationale: The plural contrasts human masters/people with the Lord. 'Men' preserves
    the generic human reference and the source's anthropological term, in line with
    the gender-accurate-over-gender-neutral policy, though in context it is representative
    rather than male-exclusive.
