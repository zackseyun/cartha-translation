theological_decisions:
- issue: Rendering of κύριος in a household-instruction context
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Although the immediate context addresses slaves and masters, κύριος here
    most naturally refers to the exalted Lord rather than merely a human master. Following
    the doctrine table, 'Lord' is the default rendering; 'Master' is preserved as
    an alternative because the social context may make that nuance salient to some
    readers.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
