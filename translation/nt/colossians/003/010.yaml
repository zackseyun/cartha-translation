id: COL.3.10
reference: Colossians 3:10
source:
  edition: SBLGNT
  text: καὶ ἐνδυσάμενοι τὸν νέον τὸν ἀνακαινούμενον εἰς ἐπίγνωσιν κατ’ εἰκόνα τοῦ
    κτίσαντος αὐτόν,
translation:
  text: and have put on the new self, which is being renewed into knowledge according
    to the image of the one who created it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "into full knowledge." The Greek word can carry the sense of fuller or
      deeper knowledge.
    reason: lexical_alternative
  - marker: b
    text: Or "the new man." The Greek expression contrasts with the "old man/self"
      in the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδυσάμενοι
  chosen: have put on
  alternatives:
  - having put on
  - put on
  lexicon: BDAG
  rationale: Aorist middle participle, coordinated with the preceding context's exhortation
    about putting off/putting on. 'Have put on' communicates the completed aspect
    in natural English while preserving the clothing metaphor.
- source_word: τὸν νέον
  chosen: the new self
  alternatives:
  - the new man
  - the new person
  lexicon: BDAG
  rationale: The adjective νέον is substantival here. 'Self' is idiomatic in English
    and matches the contrast with the 'old self/man' in the immediate context. 'New
    man' is more formal but can sound misleadingly male-specific in English; 'self'
    preserves the anthropological sense without paraphrasing beyond context.
- source_word: ἀνακαινούμενον
  chosen: which is being renewed
  alternatives:
  - being made new
  - being renewed
  lexicon: BDAG
  rationale: Present passive participle indicates an ongoing process. 'Which is being
    renewed' preserves both the durative sense and the passive voice more clearly
    than a simple adjective like 'renewed'.
- source_word: εἰς ἐπίγνωσιν
  chosen: into knowledge
  alternatives:
  - to knowledge
  - for knowledge
  - into full knowledge
  lexicon: BDAG
  rationale: ἐπίγνωσις can mean 'knowledge' or 'full knowledge/recognition.' Because
    'full' is interpretive and not explicit in the Greek form itself, the main text
    uses 'knowledge.' 'Into' reflects εἰς as movement toward/result, fitting the renewal
    process.
- source_word: κατ’ εἰκόνα
  chosen: according to the image
  alternatives:
  - in accordance with the image
  - after the image
  lexicon: BDAG
  rationale: κατά with the accusative here expresses conformity or standard. 'According
    to the image' is natural English and preserves the likely allusion to Genesis
    image language.
- source_word: τοῦ κτίσαντος αὐτόν
  chosen: of the one who created it
  alternatives:
  - of its creator
  - of the one who created him
  lexicon: BDAG
  rationale: The genitive participial phrase identifies the creator as the patterning
    source of the renewed new self. 'The one who created it' keeps the personal reference
    open while matching 'self' as the English antecedent. 'Its creator' is possible
    but less transparent to the Greek structure. 'Him' would fit if rendered 'new
    man,' but with 'self' the neuter-like English pronoun 'it' is more coherent.
