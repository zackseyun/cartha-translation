theological_decisions:
- issue: Rendering τὸν νέον in anthropological context
  chosen_reading: the new self
  alternative_readings:
  - the new man
  - the new person
  rationale: The verse contrasts the believer's former and renewed identity. 'The
    new self' preserves the corporate/anthropological sense without importing a specifically
    male referent into English. This follows the project's gender-accurate principle
    while respecting the substantival adjective in context.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Strength of ἐπίγνωσις
  chosen_reading: knowledge
  alternative_readings:
  - full knowledge
  rationale: Although ἐπίγνωσις often carries the nuance of fuller or deeper knowledge
    in Pauline usage, making that nuance explicit in the main text risks overtranslation.
    The broader Pauline resonance is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
