theological_decisions:
- issue: Meaning of love as σύνδεσμος τῆς τελειότητος
  chosen_reading: Love is presented as the unifying bond that brings the listed virtues
    into complete wholeness.
  alternative_readings:
  - Love is the bond that belongs to perfection
  - Love is the bond that produces maturity/completeness
  rationale: The genitive τῆς τελειότητος can be understood in more than one related
    way, but the most natural sense in context is that love binds the virtues together
    into complete Christian character. The translation 'bond of perfection' preserves
    the Greek's compactness and leaves the exact nuance of the genitive open rather
    than over-resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
