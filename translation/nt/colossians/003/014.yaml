id: COL.3.14
reference: Colossians 3:14
source:
  edition: SBLGNT
  text: ἐπὶ πᾶσιν δὲ τούτοις τὴν ἀγάπην, ⸀ὅ ἐστιν σύνδεσμος τῆς τελειότητος.
translation:
  text: And above all these, put on love, which is the bond of perfection.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bond of completeness' or 'the bond of maturity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ πᾶσιν δὲ τούτοις
  chosen: above all these
  alternatives:
  - over all these
  - in addition to all these
  lexicon: BDAG
  rationale: The prepositional phrase with ἐπί + dative here is idiomatic in the clothing
    metaphor of the surrounding context (vv. 12–13), conveying priority or what is
    worn over the other virtues. 'Above all these' preserves both the metaphorical
    sense and the emphasis better than a flatter 'in addition to.'
- source_word: τὴν ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: ἀγάπη is rendered by the project's default as 'love.' In context it is
    the crowning virtue to be 'put on' with the others.
- source_word: '[implicit verb from context]'
  chosen: put on
  alternatives:
  - clothe yourselves with
  lexicon: BDAG
  rationale: Although no finite verb appears in this clause, the accusative τὴν ἀγάπην
    depends on the imperative ἐνδύσασθε ('put on') from v. 12. Supplying 'put on'
    in English is necessary for a complete and natural translation and preserves the
    ongoing clothing metaphor.
- source_word: ὅ
  chosen: which
  alternatives:
  - this
  lexicon: BDAG
  rationale: The relative pronoun is neuter singular while its apparent antecedent
    ἀγάπην is feminine, likely because the clause comments on the concept as a whole
    or on the preceding exhortation summarized in love. English 'which' naturally
    introduces the explanatory relative clause without forcing a more interpretive
    rendering.
- source_word: σύνδεσμος
  chosen: bond
  alternatives:
  - binding tie
  - ligament
  lexicon: BDAG
  rationale: σύνδεσμος can denote that which binds together. 'Bond' is concise, idiomatic,
    and fits the metaphor of love as what unites the virtues. 'Ligament' is too anatomical
    here, and 'binding tie' is more paraphrastic.
- source_word: τῆς τελειότητος
  chosen: of perfection
  alternatives:
  - of completeness
  - that leads to maturity
  lexicon: BDAG
  rationale: τελειότης denotes completeness, perfection, or maturity. 'Perfection'
    is the traditional and sufficiently transparent rendering here, expressing the
    state of full wholeness to which the virtues are bound together. 'Maturity' is
    possible but narrows the sense.
