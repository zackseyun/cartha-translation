id: COL.3.9
reference: Colossians 3:9
source:
  edition: SBLGNT
  text: μὴ ψεύδεσθε εἰς ἀλλήλους· ἀπεκδυσάμενοι τὸν παλαιὸν ἄνθρωπον σὺν ταῖς πράξεσιν
    αὐτοῦ,
translation:
  text: Do not lie to one another, since you have stripped off the old man with its
    practices,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having stripped off' or 'because you have put off.' The Greek participle
      can be rendered more formally, but here it likely gives the reason for the command.
    reason: lexical_alternative
  - marker: b
    text: Or 'the old self.' Greek 'the old man' preserves Paul's contrast with the
      'new man' in the next verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ψεύδεσθε
  chosen: Do not lie
  alternatives:
  - Stop lying
  - Do not deceive
  lexicon: BDAG
  rationale: Present middle/passive imperative with μή naturally gives a prohibition.
    'Do not lie' is the most direct and idiomatic rendering of ψεύδομαι here. 'Stop
    lying' is possible for a present imperative in prohibition, but the context does
    not require emphasizing ongoing action in English.
- source_word: εἰς ἀλλήλους
  chosen: to one another
  alternatives:
  - to each other
  - against one another
  lexicon: BDAG
  rationale: The idiom ψεύδεσθαι εἰς ἀλλήλους means lying in relation to fellow believers.
    'To one another' is the most natural English equivalent and preserves the reciprocal
    sense.
- source_word: ἀπεκδυσάμενοι
  chosen: since you have stripped off
  alternatives:
  - having stripped off
  - after stripping off
  - because you have put off
  lexicon: BDAG
  rationale: Aorist middle participle, nominative plural, modifying the implied subject.
    In context it gives the basis for the prohibition, linked with the following participle
    in v.10. 'Since you have stripped off' communicates the participial force in natural
    English while preserving the completed aspect. 'Put off' is traditional, but 'stripped
    off' better reflects the clothing metaphor in ἀπεκδύομαι.
- source_word: τὸν παλαιὸν ἄνθρωπον
  chosen: the old man
  alternatives:
  - the old self
  - the old person
  - the old humanity
  lexicon: BDAG
  rationale: ἄνθρωπος is singular masculine here and participates in Paul's Adamic/anthropological
    contrast with the 'new man' in the next verse. Per doctrine, gender-accurate rendering
    is preferred over flattening to gender-neutral language. 'Old man' preserves the
    source imagery and theological linkage better than 'old self,' though the latter
    is a common interpretive rendering.
- source_word: σὺν
  chosen: with
  alternatives:
  - together with
  lexicon: BDAG
  rationale: Simple accompaniment is intended; 'with' is sufficient and idiomatic.
- source_word: ταῖς πράξεσιν αὐτοῦ
  chosen: its practices
  alternatives:
  - his practices
  - its deeds
  - its actions
  lexicon: BDAG
  rationale: πρᾶξις denotes deeds/practices. 'Practices' fits the ethical context
    of habitual conduct. Although αὐτοῦ is grammatically masculine agreeing with ἄνθρωπον,
    English idiom with the metaphorical 'old man' can take 'its' when referring to
    the complex of the old humanity/self; this avoids implying a distinct male person
    while retaining the source metaphor. 'Deeds' is possible but slightly narrower
    than the broader behavioral sense here.
