theological_decisions:
- issue: Rendering of τὸν παλαιὸν ἄνθρωπον
  chosen_reading: the old man
  alternative_readings:
  - the old self
  - the old person
  rationale: Paul's contrast between the old and new 'man' is theologically significant
    and tied to representative humanity. Following the doctrine's gender-accurate
    principle, the masculine singular is retained in the main text rather than neutralized.
    A more interpretive alternative is preserved in a footnote for readability.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
- issue: Participial relation of ἀπεκδυσάμενοι
  chosen_reading: causal/grounding nuance expressed as 'since you have stripped off'
  alternative_readings:
  - 'attendant circumstance: ''having stripped off'''
  - 'temporal: ''after stripping off'''
  rationale: The participle grounds the exhortation in the believers' changed status,
    especially in the immediate context with v.10. Rendering it with 'since' makes
    the logic explicit in natural English without importing extra doctrine.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
