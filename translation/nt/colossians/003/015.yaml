theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, and the doctrine excerpt directs
    that Christological titles be translated rather than merely transliterated where
    context supports it. This preserves the messianic sense without adding doctrinal
    content beyond the Greek.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Force of 'one body'
  chosen_reading: corporate ecclesial unity is implied but not expanded beyond the
    text
  alternative_readings:
  - explicitly interpret as the church
  rationale: Paul's body language commonly refers to the church, but the translation
    leaves the metaphor intact rather than importing an explanatory gloss into the
    main text. This preserves theological tension and textual economy.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
