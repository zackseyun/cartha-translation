id: COL.3.15
reference: Colossians 3:15
source:
  edition: SBLGNT
  text: καὶ ἡ εἰρήνη τοῦ ⸀Χριστοῦ βραβευέτω ἐν ταῖς καρδίαις ὑμῶν, εἰς ἣν καὶ ἐκλήθητε
    ἐν ἑνὶ σώματι· καὶ εὐχάριστοι γίνεσθε.
translation:
  text: And let the peace of the Messiah rule in your hearts, to which indeed you
    were called in one body. And be thankful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the peace of Christ.' The Greek title Χριστός can be rendered 'Messiah'
      when its titular sense is in view.
    reason: lexical_alternative
  - marker: b
    text: The verb can also mean 'act as umpire' or 'decide,' emphasizing the peace
      of the Messiah as the governing arbiter in the community's inner life.
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'into one body,' highlighting incorporation into a single corporate
      body.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - wholeness
  lexicon: BDAG
  rationale: Standard Pauline sense of peace as relational and communal peace under
    God's saving work; 'peace' is the natural English equivalent and fits the exhortational
    context.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Χριστοῦ is a title here rather than a name-like identifier. Per doctrine,
    Χριστός is rendered 'Messiah' where title is in view, preserving the semantic
    force of the anointed one. The traditional 'Christ' is preserved as an alternative
    in a footnote-worthy lexical note.
- source_word: βραβευέτω
  chosen: let ... rule
  alternatives:
  - let ... arbitrate
  - let ... be umpire
  lexicon: BDAG
  rationale: The verb literally evokes acting as an umpire or deciding. In idiomatic
    English within this moral exhortation, 'let ... rule' best captures the governing/decisive
    function without awkwardness, while preserving the imperative force.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  chosen: in your hearts
  alternatives:
  - among yourselves internally
  lexicon: BDAG
  rationale: A conventional biblical expression for the inner life, affections, and
    will. The plural 'hearts' matches the Greek and supports the communal dimension
    without over-paraphrase.
- source_word: εἰς ἣν
  chosen: to which
  alternatives:
  - for which
  - into which
  lexicon: BDAG
  rationale: This relative construction most naturally points back to 'peace' as the
    goal or sphere of calling. 'To which' is straightforward and sufficiently literal
    in English.
- source_word: καὶ ἐκλήθητε
  chosen: indeed you were called
  alternatives:
  - also you were called
  lexicon: BDAG
  rationale: Here καί has an adverbial intensifying sense rather than simple coordination.
    'Indeed' conveys emphasis naturally in English.
- source_word: ἐν ἑνὶ σώματι
  chosen: in one body
  alternatives:
  - into one body
  lexicon: BDAG
  rationale: The phrase likely expresses the corporate sphere or reality of the church.
    'In one body' is the most direct rendering of ἐν + dative and preserves Paul's
    body imagery without interpretive expansion.
- source_word: εὐχάριστοι
  chosen: thankful
  alternatives:
  - grateful
  lexicon: BDAG
  rationale: Both are possible, but 'thankful' is slightly more idiomatic in a concise
    exhortation and resonates with the surrounding thanksgiving language in Colossians.
- source_word: γίνεσθε
  chosen: be
  alternatives:
  - become
  lexicon: BDAG
  rationale: Although γίνομαι can mean 'become,' in imperatival exhortation English
    commonly uses 'be' to express the resulting state naturally. The sense of ongoing
    cultivation is retained by the imperative context.
