id: COL.3.11
reference: Colossians 3:11
source:
  edition: SBLGNT
  text: ὅπου οὐκ ἔνι Ἕλλην καὶ Ἰουδαῖος, περιτομὴ καὶ ἀκροβυστία, βάρβαρος, Σκύθης,
    δοῦλος, ἐλεύθερος, ἀλλὰ ⸀τὰ πάντα καὶ ἐν πᾶσιν Χριστός.
translation:
  text: where there is no Greek and Jew, circumcision and uncircumcision, barbarian,
    Scythian, slave, free, but the Messiah is all and in all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ is everything and in everyone.' The Greek 'in all' is concise
      and may be understood personally of all members of the renewed community.
    reason: alternative_reading
  - marker: b
    text: Greek 'Christos'; rendered 'the Messiah' here because the term functions
      as a title. Traditionally, 'Christ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  chosen: where
  alternatives:
  - in which place
  - wherein
  lexicon: BDAG
  rationale: Introduces the sphere or realm of the 'new man' context from the preceding
    verse; 'where' is natural English and preserves the locative sense.
- source_word: οὐκ ἔνι
  chosen: there is no
  alternatives:
  - there is not
  - there cannot be
  lexicon: BDAG
  rationale: Idiomatic expression meaning nonexistence or absence within a given sphere.
    'There is no' is concise and natural while preserving the categorical negation.
- source_word: Ἕλλην καὶ Ἰουδαῖος
  chosen: Greek and Jew
  alternatives:
  - Gentile and Jew
  lexicon: BDAG
  rationale: The Greek text specifically says 'Greek,' not the broader 'Gentile.'
    Retaining 'Greek' preserves Paul's actual ethnic-cultural pairing and avoids overgeneralization.
- source_word: περιτομὴ καὶ ἀκροβυστία
  chosen: circumcision and uncircumcision
  alternatives:
  - the circumcised and the uncircumcised
  lexicon: BDAG
  rationale: Paul uses abstract nouns as social-religious identity markers. Rendering
    them literally preserves the compact style and the covenantal/social contrast.
- source_word: βάρβαρος
  chosen: barbarian
  alternatives:
  - foreigner
  - uncultured person
  lexicon: BDAG
  rationale: The traditional term best preserves the ancient Greek cultural distinction
    between the 'civilized' and those viewed as outsiders. Softer alternatives lose
    the rhetorical force.
- source_word: Σκύθης
  chosen: Scythian
  lexicon: BDAG
  rationale: A specific ethnonym, so it should be transliterated in standard English
    form rather than generalized.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine guidance, 'slave' is preferred where bonded status is salient.
    Here the social-status contrast with 'free' makes the bonded nature explicit and
    important.
- source_word: ἐλεύθερος
  chosen: free
  alternatives:
  - freeman
  lexicon: BDAG
  rationale: Standard antonym to 'slave' in this social pairing; 'free' is clear and
    idiomatic.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks the strong contrast between abolished social distinctions and the
    Christ-centered reality that replaces them.
- source_word: τὰ πάντα
  chosen: is all
  alternatives:
  - is everything
  - is all things
  lexicon: BDAG
  rationale: With Χριστός as subject, the phrase expresses Christ's all-sufficiency
    and comprehensive significance. 'Is all' is concise and traditional without adding
    metaphysical precision the text does not spell out.
- source_word: ἐν πᾶσιν
  chosen: in all
  alternatives:
  - in everyone
  - in all people
  - in all things
  lexicon: BDAG
  rationale: The phrase is grammatically broad and contextually refers to the members
    of the renewed community. 'In all' preserves the Greek's compact ambiguity better
    than interpretively narrowing it.
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where functioning
    as a title. Here it is titular and theological rather than merely name-like, so
    'the Messiah' best preserves meaning.
