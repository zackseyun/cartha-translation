theological_decisions:
- issue: Scope of ἐν πᾶσιν
  chosen_reading: in all
  alternative_readings:
  - in everyone
  - in all people
  - in all things
  rationale: The phrase can be taken personally ('in everyone') or more broadly. The
    immediate context concerns the renewed community and erased human distinctions,
    but the Greek itself remains compact and somewhat open. The main text preserves
    that tension rather than resolving it too narrowly.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here and the doctrine excerpt directs that
    Christological titles be translated where context supports. 'Messiah' preserves
    the semantic content of Χριστός without denying its established name-like use
    elsewhere.
  doctrine_reference: Translate titles; transliterate names; Contested terms table
    for Χριστός.
- issue: Rendering δοῦλος
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: Because δοῦλος is paired with ἐλεύθερος, the social-legal contrast is
    explicit. 'Slave' best preserves the bonded-status contrast required by the context
    and aligns with the doctrine guidance for salient uses.
  doctrine_reference: Contested terms table for δοῦλος.
