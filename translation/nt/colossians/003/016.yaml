theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here rather than a name-like fixed label.
    Following the doctrine's contested-terms guidance, "Messiah" preserves the title's
    meaning and Jewish messianic context.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Corporate vs. individual force of ἐν ὑμῖν
  chosen_reading: among you
  alternative_readings:
  - in you
  rationale: Because ὑμῖν is plural and the surrounding participles describe mutual
    congregational activity, the communal sense is foregrounded. This preserves the
    ecclesial dimension without denying personal application.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Sense of ἐν χάριτι
  chosen_reading: with grace
  alternative_readings:
  - with thankfulness
  rationale: The phrase is genuinely capable of being heard as grace/graciousness
    or thankfulness. The main text keeps the more lexically transparent rendering,
    while the alternative is preserved in a footnote rather than being erased.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
