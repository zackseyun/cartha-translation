theological_decisions:
- issue: Nuance of ἐν κυρίῳ
  chosen_reading: Rendered as 'in the Lord' in the main text.
  alternative_readings:
  - from the Lord
  rationale: The phrase could be understood as the sphere in which Archippus received
    the ministry or, by implication, its source. The Greek preposition is ἐν, not
    παρά or ἀπό, so the translation preserves the wording and theological openness
    rather than resolving the nuance.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it; Contested terms table for κύριος → ''Lord''.'
