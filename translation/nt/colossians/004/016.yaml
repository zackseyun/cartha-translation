id: COL.4.16
reference: Colossians 4:16
source:
  edition: SBLGNT
  text: καὶ ὅταν ἀναγνωσθῇ παρ’ ὑμῖν ἡ ἐπιστολή, ποιήσατε ἵνα καὶ ἐν τῇ ⸀Λαοδικέων
    ἐκκλησίᾳ ἀναγνωσθῇ, καὶ τὴν ἐκ Λαοδικείας ἵνα καὶ ὑμεῖς ἀναγνῶτε.
translation:
  text: And when this letter has been read among you, see that it is also read in
    the church of the Laodiceans, and that you also read the one from Laodicea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'the letter from Laodicea.' The Greek leaves 'letter'
      implied.
    reason: lexical_alternative
  - marker: b
    text: The identity of 'the one from Laodicea' is uncertain; it may refer to a
      letter currently in Laodicea, not necessarily one originally addressed there.
    reason: cultural_note
lexical_decisions:
- source_word: ἀναγνωσθῇ / ἀναγνῶτε
  chosen: has been read / read
  alternatives:
  - is read aloud
  - is publicly read
  lexicon: BDAG
  rationale: ἀναγινώσκω means 'read,' often in the sense of public reading in early
    Christian assemblies. English 'read' is the most natural main-text rendering;
    the public aspect is plausible but not explicit enough to require 'read aloud'
    in the text.
- source_word: παρ’ ὑμῖν
  chosen: among you
  alternatives:
  - by you
  - in your presence
  lexicon: BDAG
  rationale: 'With παρά plus dative, the sense here is locative/social: the letter
    being read in the Colossian community. ''Among you'' best captures communal reception
    rather than merely agency.'
- source_word: ἡ ἐπιστολή
  chosen: this letter
  alternatives:
  - the letter
  - this epistle
  lexicon: BDAG
  rationale: The article refers to the present letter being sent to the Colossians.
    English idiom prefers 'this letter' to make the deictic reference clear.
- source_word: ποιήσατε
  chosen: see that
  alternatives:
  - make sure
  - do this
  lexicon: BDAG
  rationale: The aorist imperative of ποιέω here functions idiomatically with ἵνα
    to urge action ensuring a result. 'See that' is concise, natural, and preserves
    the imperative force without woodenly rendering 'do/make'.
- source_word: ἐν τῇ Λαοδικέων ἐκκλησίᾳ
  chosen: in the church of the Laodiceans
  alternatives:
  - in the Laodicean church
  - in the assembly of the Laodiceans
  lexicon: BDAG
  rationale: 'ἐκκλησία is rendered ''church'' in Pauline contexts. The genitive Λαοδικέων
    is most straightforwardly possessive/descriptive: the church belonging to or consisting
    of the Laodiceans. This preserves the Greek structure more closely than the adjectival
    ''Laodicean church.'''
- source_word: τὴν ἐκ Λαοδικείας
  chosen: the one from Laodicea
  alternatives:
  - the letter from Laodicea
  - the letter coming from Laodicea
  lexicon: BDAG
  rationale: The noun 'letter' is implied from context and omitted in Greek. 'The
    one from Laodicea' preserves the ellipsis while remaining clear in English. A
    footnote preserves the more explicit alternative 'the letter from Laodicea.'
- source_word: ἐκ Λαοδικείας
  chosen: from Laodicea
  alternatives:
  - to Laodicea
  - associated with Laodicea
  lexicon: BDAG
  rationale: ἐκ normally means 'from, out of.' The phrase most naturally refers to
    a letter originating from Laodicea or sent via Laodicea, not one addressed to
    Laodicea. Because the exact referent is historically debated, the translation
    keeps the preposition's plain sense.
