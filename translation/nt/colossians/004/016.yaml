theological_decisions:
- issue: Identity of 'the one from Laodicea'
  chosen_reading: Render neutrally as 'the one from Laodicea' without identifying
    it with a known canonical or non-canonical letter.
  alternative_readings:
  - Paul's letter addressed to the Laodiceans
  - a letter sent from Laodicea to Colossae
  - a circular letter associated with Laodicea, possibly Ephesians
  rationale: The Greek does not specify the document's exact identity, only its relation
    to Laodicea. To preserve interpretive restraint and avoid importing a historical
    reconstruction, the main text remains neutral while a footnote notes the explicit
    alternative wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
