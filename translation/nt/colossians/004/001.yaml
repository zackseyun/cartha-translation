id: COL.4.1
reference: Colossians 4:1
source:
  edition: SBLGNT
  text: οἱ κύριοι, τὸ δίκαιον καὶ τὴν ἰσότητα τοῖς δούλοις παρέχεσθε, εἰδότες ὅτι
    καὶ ὑμεῖς ἔχετε κύριον ἐν ⸀οὐρανῷ.
translation:
  text: Masters, provide your slaves with what is right and fair, knowing that you
    also have a Lord in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “what is right and equality.” The Greek term translated “fair” can also
      mean “equality” or “equity.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ κύριοι
  chosen: Masters
  alternatives:
  - Lords
  - Slaveholders
  lexicon: BDAG
  rationale: In this household-code context, κύριοι refers to human masters in relation
    to δοῦλοι. 'Masters' is the most natural English equivalent here. 'Lords' would
    sound misleadingly exalted in English, while 'slaveholders' is interpretive and
    narrower than the Greek term.
- source_word: τὸ δίκαιον
  chosen: what is right
  alternatives:
  - justice
  - what is just
  lexicon: BDAG
  rationale: The substantivized adjective δίκαιον denotes that which is just/right.
    'What is right' is clear modern English and preserves the ethical force without
    sounding overly abstract. 'What is just' is also possible, but the paired phrase
    with ἰσότητα reads more naturally as 'right and fair' in English.
- source_word: τὴν ἰσότητα
  chosen: fair
  alternatives:
  - fairness
  - equality
  - equity
  lexicon: BDAG
  rationale: ἰσότης can denote equality, fairness, or equity. In this context of treatment
    of slaves, the sense is equitable/fair dealing rather than ontological equality
    stated abstractly. Rendering it as 'fair' gives idiomatic coordination with 'what
    is right' while preserving the ethical demand. The more literal 'equality' is
    worth preserving in a footnote because it is a significant lexical possibility.
- source_word: τοῖς δούλοις
  chosen: your slaves
  alternatives:
  - your servants
  - your bondservants
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος should be rendered 'slave' where the bonded
    nature is salient. Here the social relation to masters is explicit, so 'slaves'
    is the appropriate rendering. 'Servants' would soften the institution; 'bondservants'
    is accurate but less accessible in modern English.
- source_word: παρέχεσθε
  chosen: provide
  alternatives:
  - grant
  - give
  - render
  lexicon: BDAG
  rationale: The middle imperative calls masters to furnish or grant this treatment
    to their slaves. 'Provide' is natural modern English and fits the object phrase
    well. 'Render' is more formal but less idiomatic here.
- source_word: εἰδότες
  chosen: knowing
  alternatives:
  - since you know
  - because you know
  lexicon: BDAG
  rationale: The participle gives the grounds or accompanying awareness for the command.
    'Knowing' preserves the participial structure and leaves the precise nuance appropriately
    broad.
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - you too
  - even you
  lexicon: BDAG
  rationale: καὶ with the pronoun emphasizes that masters themselves stand under authority.
    'You also' is straightforward and preserves the emphasis.
- source_word: κύριον
  chosen: a Lord
  alternatives:
  - a master
  lexicon: BDAG
  rationale: For κύριος the project's default is 'Lord.' Although 'master' would echo
    the human relationship in the verse, 'Lord' better preserves the title's theological
    weight and distinguishes the heavenly κύριος from earthly masters.
- source_word: ἐν οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heavens
  - in heaven above
  lexicon: BDAG
  rationale: The singular dative with ἐν is idiomatically rendered 'in heaven.' This
    is standard and clear English.
