theological_decisions:
- issue: Rendering δοῦλοι in a household-code context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The verse directly addresses masters in relation to δοῦλοι, making the
    bonded status socially salient. Following the doctrine guideline, 'slave' is preferred
    over the softer 'servant' in such contexts.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος
- issue: Rendering ἰσότητα
  chosen_reading: fair
  alternative_readings:
  - fairness
  - equality
  - equity
  rationale: The term can mean equality or equitable treatment. In context, Paul commands
    masters to treat slaves justly and equitably; 'fair' communicates this naturally
    in English. Because 'equality' is a notable lexical possibility with interpretive
    significance, it is preserved in a footnote rather than forced into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
