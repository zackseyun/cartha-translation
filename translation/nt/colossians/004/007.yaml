theological_decisions:
- issue: Rendering of σύνδουλος / δοῦλος language
  chosen_reading: fellow slave
  alternative_readings:
  - fellow servant
  - fellow bondservant
  rationale: The verse commends Tychicus as sharing a status of belonging and service
    under the Lord. Given the project's stated preference to render δοῦλος as 'slave'
    where bondedness is theologically salient, 'fellow slave' is preferred here. The
    smoother 'fellow servant' is preserved as an alternative because some readers
    may hear 'slave' with modern associations not foregrounded in every NT context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος
