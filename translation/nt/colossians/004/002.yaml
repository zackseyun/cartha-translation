id: COL.4.2
reference: Colossians 4:2
source:
  edition: SBLGNT
  text: Τῇ προσευχῇ προσκαρτερεῖτε, γρηγοροῦντες ἐν αὐτῇ ἐν εὐχαριστίᾳ,
translation:
  text: Devote yourselves to prayer, staying alert in it with thanksgiving,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Continue steadfastly in prayer, being watchful in it with thanksgiving.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσευχῇ
  chosen: prayer
  alternatives:
  - the prayer
  lexicon: BDAG
  rationale: 'The dative with article is idiomatic here and refers to prayer as a
    practice rather than a specific prayer, so English omits the article: ''to prayer.'''
- source_word: προσκαρτερεῖτε
  chosen: Devote yourselves to
  alternatives:
  - continue steadfastly in
  - persist in
  - be devoted to
  lexicon: BDAG
  rationale: The present imperative calls for ongoing persistence. 'Devote yourselves
    to' captures sustained commitment in natural modern English while preserving the
    imperative force.
- source_word: γρηγοροῦντες
  chosen: staying alert
  alternatives:
  - keeping watch
  - being watchful
  - remaining awake
  lexicon: BDAG
  rationale: The participle expresses the manner accompanying the command about prayer.
    'Staying alert' communicates vigilant attentiveness without the potentially misleading
    literalism of 'remaining awake.'
- source_word: ἐν αὐτῇ
  chosen: in it
  alternatives:
  - in prayer
  - in this
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to 'prayer.' 'In it' preserves
    the Greek anaphoric structure, with the referent clear in English context.
- source_word: ἐν εὐχαριστίᾳ
  chosen: with thanksgiving
  alternatives:
  - in thanksgiving
  - thankfully
  lexicon: BDAG
  rationale: This prepositional phrase describes the manner or accompanying attitude
    of prayerful vigilance. 'With thanksgiving' is idiomatic and preserves the sense
    of gratitude accompanying prayer.
