theological_decisions:
- issue: Rendering Χριστοῦ in the phrase δοῦλος Χριστοῦ
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The translation philosophy directs that Χριστός be rendered 'Messiah'
    where it functions as a title. Here the phrase identifies Epaphras in relation
    to Jesus' messianic lordship, so the title meaning is preserved in the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Rendering δοῦλος
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The doctrinal guidance allows 'servant / slave' context-dependently and
    prefers 'slave' where bonded nature is salient. In this self-identifying religious
    allegiance formula, the stronger term better preserves total belonging to Messiah
    Jesus.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Contested terms table
    for δοῦλος'
- issue: Sense of πεπληροφορημένοι
  chosen_reading: fully assured
  alternative_readings:
  - fully convinced
  - fully established
  rationale: The participle has been interpreted either epistemically ('fully convinced/assured')
    or more statively ('fully established'). The main text adopts the assurance sense
    as the more common lexical value, while preserving the alternative in a footnote
    because the phrase is interpretively significant.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
