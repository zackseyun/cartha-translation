id: COL.4.14
reference: Colossians 4:14
source:
  edition: SBLGNT
  text: ἀσπάζεται ὑμᾶς Λουκᾶς ὁ ἰατρὸς ὁ ἀγαπητὸς καὶ Δημᾶς.
translation:
  text: Luke, the beloved physician, and Demas greet you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀσπάζεται
  chosen: greet
  alternatives:
  - sends greetings to
  - greets
  lexicon: BDAG
  rationale: The singular verb introduces the greeting formula common in epistolary
    contexts. In English, with a compound subject following ('Luke ... and Demas'),
    'greet you' is the most natural rendering while preserving the sense of conveyed
    greetings.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object, addressed to the Colossian recipients collectively.
    English 'you' preserves the sense, though number is not marked.
- source_word: Λουκᾶς
  chosen: Luke
  rationale: Standard English transliteration of the personal name Λουκᾶς, following
    the translation philosophy to transliterate names.
- source_word: ἰατρὸς
  chosen: physician
  alternatives:
  - doctor
  lexicon: BDAG
  rationale: Both 'physician' and 'doctor' are possible, but 'physician' better reflects
    the lexical sense of ἰατρός in a first-century context and matches established
    but still readable English usage.
- source_word: ἀγαπητὸς
  chosen: beloved
  alternatives:
  - dear
  - loved
  lexicon: BDAG
  rationale: ἀγαπητός commonly means 'beloved' in affectionate and esteem-bearing
    contexts. 'Beloved' preserves the warmth and slightly elevated tone of Paul's
    commendation better than the flatter 'dear'.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction joining Demas with Luke as co-senders
    of greeting.
- source_word: Δημᾶς
  chosen: Demas
  rationale: Standard English transliteration of the personal name Δημᾶς.
