theological_decisions:
- issue: Scope of the modifier 'the beloved'
  chosen_reading: The phrase 'the beloved physician' modifies Luke, not Demas.
  alternative_readings:
  - '''Luke the physician, the beloved one, and Demas'' with ambiguity only in English
    punctuation'
  rationale: In the Greek, the article-adjective sequence ὁ ἰατρὸς ὁ ἀγαπητός directly
    apposes and describes Λουκᾶς. English punctuation is used to make explicit that
    both descriptors belong to Luke alone.
