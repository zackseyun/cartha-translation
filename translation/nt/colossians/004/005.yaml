theological_decisions:
- issue: Potential theological overreading of ἐξαγοραζόμενοι
  chosen_reading: An exhortation to wise, opportunistic conduct in relation to non-believers
  alternative_readings:
  - A more literal 'redeeming the time' that may evoke theological redemption language
  rationale: In this context the verb functions idiomatically for seizing or maximizing
    opportunity, not for redemptive atonement. The translation avoids importing doctrinal
    claims the text does not make while preserving the lexical alternative in a footnote.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; optimal equivalence'
