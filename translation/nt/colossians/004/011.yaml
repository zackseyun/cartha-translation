theological_decisions:
- issue: Meaning of 'those from the circumcision'
  chosen_reading: A reference to Jewish believers/laborers rather than a broader theological
    party label.
  alternative_readings:
  - a narrower reference to the circumcision party
  - simply ethnic Jews without implication of Christian faith
  rationale: In context Paul is listing coworkers and says these are the only ones
    'from the circumcision' who are fellow workers for the kingdom of God. The phrase
    most naturally identifies these coworkers as Jewish-background believers. The
    translation preserves the literal expression rather than resolving it to a more
    interpretive label in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
