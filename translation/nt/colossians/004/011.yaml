id: COL.4.11
reference: Colossians 4:11
source:
  edition: SBLGNT
  text: καὶ Ἰησοῦς ὁ λεγόμενος Ἰοῦστος, οἱ ὄντες ἐκ περιτομῆς, οὗτοι μόνοι συνεργοὶ
    εἰς τὴν βασιλείαν τοῦ θεοῦ, οἵτινες ἐγενήθησάν μοι παρηγορία.
translation:
  text: and Jesus who is called Justus. These are the only fellow workers for the
    kingdom of God who are from the circumcision, and they have been a comfort to
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who are Jews.' Literally, 'who are from the circumcision.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they became an encouragement to me' or 'they proved a comfort to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰησοῦς
  chosen: Jesus
  alternatives:
  - Joshua
  lexicon: BDAG
  rationale: As a personal name in the NT context, standard English transliteration
    is 'Jesus.' Although the underlying Hebrew/Aramaic name corresponds to 'Joshua,'
    NT convention and reader recognition favor 'Jesus.'
- source_word: ὁ λεγόμενος Ἰοῦστος
  chosen: who is called Justus
  alternatives:
  - who is called Justus
  - the one called Justus
  lexicon: BDAG
  rationale: The participial expression identifies an alternate Roman name or cognomen.
    'Who is called Justus' is natural English and preserves the appositional identification.
- source_word: οἱ ὄντες ἐκ περιτομῆς
  chosen: who are from the circumcision
  alternatives:
  - being of the circumcision
  - who are Jews
  lexicon: BDAG
  rationale: Literally 'being from the circumcision.' The phrase is a Jewish identity
    marker. 'From the circumcision' preserves the source wording and avoids over-interpreting,
    while still communicating ethnic-religious background. 'Who are Jews' is interpretive
    and therefore kept as an alternative rather than main text.
- source_word: οὗτοι μόνοι
  chosen: These are the only
  alternatives:
  - These alone are the
  - These only are
  lexicon: BDAG
  rationale: This construction emphasizes exclusivity. 'These are the only' is idiomatic
    modern English and preserves Paul's point that among a certain group, only these
    men are his συνεργοί.
- source_word: συνεργοὶ
  chosen: fellow workers
  alternatives:
  - co-workers
  - workers together
  lexicon: BDAG
  rationale: A common Pauline term for ministry partners. 'Fellow workers' is clear,
    dignified, and slightly more formal than 'co-workers,' fitting the register of
    the letter.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  chosen: for the kingdom of God
  alternatives:
  - for God's kingdom
  - unto the kingdom of God
  lexicon: BDAG
  rationale: 'Here εἰς with συνεργοί is best rendered in a telic/service sense: they
    are fellow workers ''for'' the kingdom. ''Unto'' is too wooden in modern English.
    ''Kingdom of God'' preserves the established biblical phrase.'
- source_word: οἵτινες
  chosen: who
  alternatives:
  - and these
  - such men as
  lexicon: BDAG
  rationale: The relative pronoun introduces a descriptive clause about these coworkers.
    Simple 'who' is sufficient in English without losing meaning.
- source_word: ἐγενήθησάν μοι παρηγορία
  chosen: they have been a comfort to me
  alternatives:
  - they became an encouragement to me
  - they proved a comfort to me
  lexicon: BDAG
  rationale: The aorist of γίνομαι with predicate noun can mean 'became' or more idiomatically
    'have been/proved.' παρηγορία denotes comfort, encouragement, or consolation.
    'Have been a comfort to me' is natural English and conveys the pastoral-relational
    sense.
