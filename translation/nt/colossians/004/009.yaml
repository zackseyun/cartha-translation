theological_decisions:
- issue: Ecclesial sense of ἀδελφῷ
  chosen_reading: brother
  alternative_readings:
  - brother in the faith
  rationale: The term denotes a fellow Christian, but the text itself simply says
    'brother.' The translation preserves the familial ecclesial language without interpretive
    expansion.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Force of ἐξ ὑμῶν
  chosen_reading: who is one of you
  alternative_readings:
  - who is from among you
  rationale: This wording preserves Onesimus's identification with the Colossian believers
    without importing further social or theological claims from Philemon into the
    verse.
  doctrine_reference: Affirmations / do not import doctrinal claims the text does
    not make
