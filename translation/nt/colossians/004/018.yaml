id: COL.4.18
reference: Colossians 4:18
source:
  edition: SBLGNT
  text: Ὁ ἀσπασμὸς τῇ ἐμῇ χειρὶ Παύλου. μνημονεύετέ μου τῶν δεσμῶν. ἡ χάρις μεθ’ ⸀ὑμῶν.
translation:
  text: The greeting is in my own hand—Paul's. Remember my chains. Grace be with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'salutation.' The Greek refers to the closing greeting written personally
      by Paul.
    reason: lexical_alternative
  - marker: b
    text: Or 'my imprisonment' or 'my bonds.' Literally 'my chains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπασμός
  chosen: greeting
  alternatives:
  - greeting of farewell
  - salutation
  lexicon: BDAG
  rationale: Refers to the closing greeting/sign-off of the letter. 'Greeting' is
    natural modern English and fits the epistolary context better than the more formal
    'salutation.'
- source_word: τῇ ἐμῇ χειρὶ Παύλου
  chosen: is in my own hand—Paul's
  alternatives:
  - with my own hand, Paul's
  - by my own hand, Paul
  lexicon: BDAG
  rationale: The dative phrase indicates authorship in Paul's own handwriting, likely
    marking the autograph closing. Rendering it as 'is in my own hand—Paul's' makes
    the elliptical Greek idiomatic in English while preserving the emphatic personal
    signature.
- source_word: μνημονεύετέ
  chosen: Remember
  alternatives:
  - Keep remembering
  - Be mindful of
  lexicon: BDAG
  rationale: Present imperative can carry ongoing force, but simple 'Remember' is
    idiomatic and sufficiently captures the exhortation without overtranslating aspect.
- source_word: μου τῶν δεσμῶν
  chosen: my chains
  alternatives:
  - my imprisonment
  - my bonds
  lexicon: BDAG
  rationale: δεσμοί literally means 'chains' or 'bonds' and is a vivid metonym for
    imprisonment. 'My chains' preserves the concrete imagery of Paul's captivity better
    than the more abstract 'imprisonment.'
- source_word: ἡ χάρις
  chosen: Grace
  alternatives:
  - The grace
  - God's grace
  lexicon: BDAG
  rationale: A conventional Pauline benediction. English idiom omits the article in
    such blessings, and adding 'God's' would import what is not explicit in the Greek.
- source_word: μεθ’ ὑμῶν
  chosen: be with you
  alternatives:
  - with you
  - be among you
  lexicon: BDAG
  rationale: English benedictory style commonly supplies 'be' for a verbless blessing.
    'With you' is the straightforward sense of μετά with the genitive here.
