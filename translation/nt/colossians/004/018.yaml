theological_decisions:
- issue: Pauline closing benediction without explicit verb
  chosen_reading: Grace be with you
  alternative_readings:
  - Grace with you
  rationale: The Greek is verbless, but English requires a natural benedictory expression.
    Supplying 'be' clarifies the blessing without adding theological content.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
