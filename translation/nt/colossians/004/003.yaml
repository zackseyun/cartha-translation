  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here and the doctrine excerpt directs translating Χριστός as 'Messiah' where context supports title rather than name-like usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Metaphorical force of θύραν τοῦ λόγου
  chosen_reading: a door for the word
  alternative_readings:
  - an opportunity for the message
  rationale: The translation preserves Paul's metaphor rather than resolving it into an interpretive paraphrase. This maintains the text's imagery while remaining intelligible.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
