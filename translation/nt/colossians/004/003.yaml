  from: praying at the same time also for us
  to: while also praying for us
  rationale: The literal rendering 'at the same time also' is slightly redundant and stiff in English. A more natural rendering like 'while also praying for us' captures the sense of both ἅμα (simultaneity) and καὶ (addition) in a smoother participial construction that fits the context of the ongoing exhortation to pray.
