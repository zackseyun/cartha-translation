theological_decisions:
- issue: Sense of πόνος in relation to Epaphras's ministry
  chosen_reading: Rendered as 'great labor' to emphasize strenuous effort without
    narrowing it exclusively to emotional anguish or prayer.
  alternative_readings:
  - great concern
  - deep anguish
  - much toil
  rationale: The immediate context (4:12) highlights Epaphras's earnest struggle in
    prayer, so an affective rendering is possible. However, πόνος itself more basically
    denotes toil/labor, and 'great labor' preserves the broader sense while allowing
    prayerful struggle to remain included by context rather than interpretation.
  doctrine_reference: Translation philosophy §1, §3, §5
