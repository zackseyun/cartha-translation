id: COL.4.15
reference: Colossians 4:15
source:
  edition: SBLGNT
  text: ἀσπάσασθε τοὺς ἐν Λαοδικείᾳ ἀδελφοὺς καὶ ⸂Νύμφαν καὶ τὴν κατ’ οἶκον αὐτῆς⸃
    ἐκκλησίαν.
translation:
  text: Greet the brothers in Laodicea, and Nympha and the church in her house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts/readings support 'Nymphas' and 'the church in his house';
      others support 'their house.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Greet warmly
  lexicon: BDAG
  rationale: Aorist middle imperative, second person plural, functioning as a straightforward
    command to convey greetings. 'Greet' is natural modern English and preserves the
    imperative force without unnecessary expansion.
- source_word: τοὺς ἐν Λαοδικείᾳ ἀδελφοὺς
  chosen: the brothers in Laodicea
  alternatives:
  - the brothers and sisters in Laodicea
  - the believers in Laodicea
  lexicon: BDAG
  rationale: ἀδελφοὺς is grammatically masculine plural and, in Pauline usage, often
    includes mixed-gender fellow believers. Per doctrine, gender-accurate translation
    is preferred over flattening to a neutral term. 'Brothers' preserves the source
    form; the inclusive sense can be noted by readers from context.
- source_word: Νύμφαν
  chosen: Nympha
  alternatives:
  - Nymphas
  lexicon: BDAG
  rationale: The SBLGNT text reads the accusative form Νύμφαν, commonly taken as the
    feminine name 'Nympha.' A well-known textual/interpretive alternative understands
    the name as masculine 'Nymphas'; this should be preserved in a footnote rather
    than resolved silently.
- source_word: τὴν κατ’ οἶκον αὐτῆς ἐκκλησίαν
  chosen: the church in her house
  alternatives:
  - the church that meets in her house
  - the house church of hers
  lexicon: BDAG
  rationale: κατ’ οἶκον literally means 'according to house' in this idiom, referring
    to a congregation meeting in a home. 'The church in her house' is a clear, fairly
    formal rendering that preserves the locative sense without over-paraphrasing.
    'That meets in' is interpretive and therefore kept as an alternative only.
- source_word: ἐκκλησίαν
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In Pauline epistolary context, ἐκκλησία refers to the gathered Christian
    community. 'Church' is the standard and contextually appropriate rendering; 'assembly'
    is possible but less idiomatic here.
