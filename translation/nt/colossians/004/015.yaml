theological_decisions:
- issue: Identity/gender of Νύμφαν and corresponding pronoun
  chosen_reading: Nympha ... the church in her house
  alternative_readings:
  - Nymphas ... the church in his house
  - Nympha ... the church in their house
  rationale: The printed SBLGNT reading supports the feminine singular pronoun αὐτῆς
    ('her'), yielding 'Nympha' as the most direct translation. Because manuscript
    variation and historical discussion include masculine and plural possibilities,
    the alternatives are preserved in a footnote rather than ignored. This is a textual/interpretive
    issue, not a doctrinal one, so the main text follows the critical text while documenting
    alternatives.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpretive
    tension where genuine ambiguity exists)
