theological_decisions:
- issue: Nature of Paul's relationship to Aristarchus in συναιχμάλωτός μου
  chosen_reading: Rendered literally as 'my fellow prisoner' without specifying whether
    the imprisonment is literal or metaphorical.
  alternative_readings:
  - my fellow captive in the Lord
  - my fellow worker under hardship
  rationale: The verse itself presents the term straightforwardly; the translation
    preserves the lexical sense and leaves historical/theological interpretation to
    readers rather than resolving it in the text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
