id: COL.4.10
reference: Colossians 4:10
source:
  edition: SBLGNT
  text: Ἀσπάζεται ὑμᾶς Ἀρίσταρχος ὁ συναιχμάλωτός μου, καὶ Μᾶρκος ὁ ἀνεψιὸς Βαρναβᾶ
    (περὶ οὗ ἐλάβετε ἐντολάς, ἐὰν ἔλθῃ πρὸς ὑμᾶς δέξασθε αὐτόν),
translation:
  text: Aristarchus, my fellow prisoner, greets you, and Mark, the cousin of Barnabas
    (about whom you received instructions—if he comes to you, welcome him),
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nephew of Barnabas'; older English versions sometimes render ἀνεψιός
      this way, but 'cousin' is the more precise sense in Koine Greek.
    reason: lexical_alternative
  - marker: b
    text: Or 'receive him.' The Greek verb can denote receiving someone hospitably;
      'welcome him' makes that sense explicit in modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζεται
  chosen: greets
  alternatives:
  - sends greetings to
  - greets warmly
  lexicon: BDAG
  rationale: The present middle commonly introduces epistolary greetings. 'Greets'
    is concise, natural English and preserves the direct verbal force better than
    the more expanded 'sends greetings to.'
- source_word: συναιχμάλωτός
  chosen: fellow prisoner
  alternatives:
  - fellow captive
  - fellow prisoner in Christ
  lexicon: BDAG
  rationale: The compound noun literally denotes one taken captive with another. 'Fellow
    prisoner' is the most natural and transparent rendering. Adding 'in Christ' would
    import interpretation not explicit in the verse.
- source_word: ἀνεψιὸς
  chosen: cousin
  alternatives:
  - nephew
  - kinsman
  lexicon: BDAG
  rationale: In Koine usage ἀνεψιός specifically denotes 'cousin' rather than the
    broader 'kinsman.' 'Nephew' reflects older English tradition in some versions
    but is lexically less precise here.
- source_word: ἐλάβετε ἐντολάς
  chosen: you received instructions
  alternatives:
  - you received commands
  - you received orders
  lexicon: BDAG
  rationale: ἐντολή can mean command or instruction. In this travel-and-reception
    context, 'instructions' fits idiomatic English without overstating harshness,
    while still preserving the sense of authoritative direction.
- source_word: ἐὰν ἔλθῃ πρὸς ὑμᾶς
  chosen: if he comes to you
  alternatives:
  - if he should come to you
  - if he comes your way
  lexicon: BDAG
  rationale: This conditional clause with ἐάν and aorist subjunctive is naturally
    rendered as a future-oriented condition. 'If he comes to you' is clear and sufficiently
    formal.
- source_word: δέξασθε αὐτόν
  chosen: welcome him
  alternatives:
  - receive him
  - accept him
  lexicon: BDAG
  rationale: δέχομαι in hospitality/travel contexts often means to receive or welcome
    someone. 'Welcome him' best captures the interpersonal force in contemporary English,
    while 'receive him' can sound stilted or ambiguous.
