theological_decisions:
- issue: Meaning of θρησκείᾳ τῶν ἀγγέλων
  chosen_reading: 'objective genitive: worship directed toward angels'
  alternative_readings:
  - 'subjective genitive: worship offered by angels'
  - 'associative reading: worship with angels'
  rationale: The phrase is genuinely ambiguous. The main text follows the most common
    and contextually plausible reading in a warning against false religious practice,
    but alternatives are preserved in a footnote to maintain interpretive transparency
    and avoid overstating certainty.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Interpretation of σάρξ in τῆς σαρκὸς αὐτοῦ
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  rationale: The translation avoids importing a more systematized doctrinal gloss.
    'Flesh' preserves Paul's anthropological tension and lets readers see the source
    term directly.
  doctrine_reference: 'Contested terms table: σάρξ = flesh (literal) / sinful nature
    (metaphorical), context-dependent; per-verse documented.'
