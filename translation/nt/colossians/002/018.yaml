id: COL.2.18
reference: Colossians 2:18
source:
  edition: SBLGNT
  text: μηδεὶς ὑμᾶς καταβραβευέτω θέλων ἐν ταπεινοφροσύνῃ καὶ θρησκείᾳ τῶν ἀγγέλων,
    ⸀ἃ ἑόρακεν ἐμβατεύων, εἰκῇ φυσιούμενος ὑπὸ τοῦ νοὸς τῆς σαρκὸς αὐτοῦ,
translation:
  text: Let no one disqualify you, delighting in humility and the worship of angels,
    going on about what he has seen, vainly puffed up by the mind of his flesh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the religion of angels' or 'worship with angels.' The Greek phrase can
      be understood in more than one way.
    reason: alternative_reading
  - marker: b
    text: Some manuscripts read 'not seeing' instead of 'what he has seen,' yielding
      a sense like 'going on about what he has not seen.'
    reason: textual_variant
  - marker: c
    text: Or 'dwelling on what he has seen' or 'entering into what he has seen.' The
      Greek verb is rare and difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβραβευέτω
  chosen: disqualify
  alternatives:
  - deprive of the prize
  - condemn
  lexicon: BDAG
  rationale: The verb carries the sense of acting as an umpire against someone, thus
    ruling them out or depriving them of their prize. 'Disqualify' is concise, natural
    English and fits Paul's warning against false ascetic-mystical judgment.
- source_word: θέλων
  chosen: delighting in
  alternatives:
  - insisting on
  - taking pleasure in
  - willing
  lexicon: BDAG
  rationale: In this construction, the participle likely conveys the person's self-chosen
    delight or pleasure in the practices named, not mere volition. 'Delighting in'
    captures the nuance without over-paraphrasing.
- source_word: ταπεινοφροσύνῃ
  chosen: humility
  alternatives:
  - self-abasement
  - lowliness
  lexicon: BDAG
  rationale: The noun normally means 'humility,' but in this polemical context it
    likely refers to an affected or ascetic humility. The main text keeps the lexical
    form 'humility' and lets context signal the irony rather than importing interpretation
    into the translation.
- source_word: θρησκείᾳ τῶν ἀγγέλων
  chosen: the worship of angels
  alternatives:
  - religion of angels
  - worship with angels
  lexicon: BDAG
  rationale: The genitive is debated. The most straightforward reading is objective
    genitive, worship directed toward angels. Because the phrase is genuinely ambiguous,
    the main text adopts the common reading while preserving alternatives in a footnote.
- source_word: ἃ ἑόρακεν ἐμβατεύων
  chosen: going on about what he has seen
  alternatives:
  - entering into what he has seen
  - dwelling on what he has seen
  lexicon: BDAG
  rationale: ἐμβατεύω is rare and difficult; in context it likely means to go into
    detail about visionary experiences. 'Going on about' is idiomatic modern English
    that reflects the likely sense without wooden obscurity. The textual issue around
    ἃ is preserved in a footnote.
- source_word: εἰκῇ
  chosen: vainly
  alternatives:
  - without cause
  - to no purpose
  lexicon: BDAG
  rationale: The adverb modifies the inflation of pride as groundless and empty. 'Vainly'
    captures both emptiness and unwarranted pride.
- source_word: φυσιούμενος
  chosen: puffed up
  alternatives:
  - inflated
  - conceited
  lexicon: BDAG
  rationale: Paul commonly uses this metaphor for arrogant conceit. 'Puffed up' preserves
    the metaphor and Pauline tone.
- source_word: νοὸς
  chosen: mind
  alternatives:
  - understanding
  - way of thinking
  lexicon: BDAG
  rationale: '''Mind'' is the natural gloss here and keeps the phrase compact.'
- source_word: σαρκὸς
  chosen: flesh
  alternatives:
  - sinful nature
  lexicon: BDAG
  rationale: Per doctrine guidance, σάρξ should be rendered 'flesh' literally unless
    context clearly demands an interpretive rendering. Here 'the mind of his flesh'
    is awkward but theologically important, pointing to fallen human orientation without
    collapsing it into a doctrinal paraphrase.
