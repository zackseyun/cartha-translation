theological_decisions:
- issue: Referent of 'spirit' in the contrast 'in the flesh ... in spirit'
  chosen_reading: Paul means he is not physically present but is present with them
    in his spirit.
  alternative_readings:
  - Paul speaks of being with them by the Holy Spirit.
  rationale: The immediate antithesis with bodily absence favors a contrast between
    physical absence and non-physical personal presence. Rendering 'in spirit' without
    capitalization preserves the ambiguity without asserting a distinct doctrinal
    mechanism.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering Χριστόν
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where it
    functions as a title rather than a name-like form. Here the phrase 'faith in Messiah'
    retains the titular sense.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
- issue: Rendering πίστις in the phrase εἰς Χριστὸν πίστις
  chosen_reading: faith in Messiah
  alternative_readings:
  - faithfulness toward Messiah
  rationale: The default rendering for πίστις is 'faith.' Because πίστις can in some
    contexts shade toward 'faithfulness,' that nuance is preserved in a footnote rather
    than elevated to the main text.
  doctrine_reference: 'Contested terms table: πίστις → faith; footnote alternatives
    where contested.'
