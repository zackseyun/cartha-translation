theological_decisions:
- issue: Referent of ἐν ᾧ
  chosen_reading: 'Refers to baptism: ''in which'''
  alternative_readings:
  - 'Refers to Messiah implicitly: ''in whom'''
  rationale: The nearest grammatical antecedent is βαπτισμῷ, and the dative relative
    naturally resumes it. The broader context of union with Messiah remains present
    through the compound verbs, but the syntax favors baptism as the referent.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Sense of baptismal language
  chosen_reading: Retain the text's strong union-with-Messiah and baptismal wording
    without specifying a denominational sacramental theory
  alternative_readings:
  - A strongly sacramental reading
  - A purely symbolic reading
  rationale: The verse closely links burial and raising with baptism and faith, but
    it does not itself settle later doctrinal debates about sacramental efficacy.
    The translation therefore preserves the wording and tension of the Greek without
    importing a sectarian conclusion.
  doctrine_reference: Affirmations; Translation philosophy §3
