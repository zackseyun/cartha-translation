id: COL.2.12
reference: Colossians 2:12
source:
  edition: SBLGNT
  text: συνταφέντες αὐτῷ ἐν τῷ ⸀βαπτισμῷ, ἐν ᾧ καὶ συνηγέρθητε διὰ τῆς πίστεως τῆς
    ἐνεργείας τοῦ θεοῦ τοῦ ἐγείραντος αὐτὸν ⸀ἐκ νεκρῶν·
translation:
  text: having been buried with him in baptism, in which you also were raised with
    him through faith in the working of God, who raised him from the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, 'in whom,' if the relative is taken to refer to Messiah rather
      than to baptism.
    reason: alternative_reading
  - marker: b
    text: Or 'through trust'; the Greek word can also carry the sense of 'faithfulness'
      in some contexts, but here 'faith' is the main-text rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνταφέντες
  chosen: having been buried with
  alternatives:
  - being buried with
  - having been buried together with
  lexicon: BDAG
  rationale: Aorist passive participle, nominative plural, expressing attendant circumstance/means
    tied to the main verb. 'Having been buried with' preserves the completed participial
    force and the συν- prefix ('with/together with').
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - Messiah
  - Christ
  lexicon: BDAG
  rationale: Dative pronoun referring back to Messiah in context. English pronoun
    is natural and avoids unnecessary repetition while preserving the union-with-Messiah
    theme.
- source_word: ἐν τῷ βαπτισμῷ
  chosen: in baptism
  alternatives:
  - by baptism
  - in the baptism
  lexicon: BDAG
  rationale: ἐν with the dative here is best rendered 'in,' preserving the locative/instrumental
    overlap without over-specifying. Anarthrous English 'baptism' is idiomatic despite
    the Greek article.
- source_word: ἐν ᾧ
  chosen: in which
  alternatives:
  - in whom
  - by which
  lexicon: BDAG
  rationale: The relative pronoun is masculine/neuter dative singular and most naturally
    refers to βαπτισμῷ ('baptism') in the immediate syntax. 'In which' preserves the
    grammatical linkage without forcing a more interpretive reading.
- source_word: συνηγέρθητε
  chosen: you also were raised with him
  alternatives:
  - you were also raised
  - you were raised together
  lexicon: BDAG
  rationale: Aorist passive indicative, second plural. The συν- prefix is significant
    and is brought out with 'with him,' supplied from the verb's compound sense and
    the immediate context of union with Messiah.
- source_word: διὰ τῆς πίστεως
  chosen: through faith
  alternatives:
  - through trust
  - through faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here
    the sense is the means by which participation in God's raising work is appropriated.
    'Trust' is possible but less standard; 'faithfulness' is less likely in this construction.
- source_word: τῆς ἐνεργείας
  chosen: the working
  alternatives:
  - the power
  - the operation
  - the effective working
  lexicon: BDAG
  rationale: ἐνέργεια denotes operative power/activity. 'Working' is accessible modern
    English and preserves the sense of God's active operation without importing a
    narrower idea like mere abstract 'power.'
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: 'Straightforward genitive: the working belongs to or proceeds from God.'
- source_word: τοῦ ἐγείραντος αὐτὸν
  chosen: who raised him
  alternatives:
  - the one who raised him
  lexicon: BDAG
  rationale: Articular participle functioning attributively/appositionally to 'God.'
    Relative clause English is smoother while preserving the identifying force.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering for resurrection language. 'Out from among
    the dead' is more explicit but less natural in English.
