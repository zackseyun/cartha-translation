id: COL.2.17
reference: Colossians 2:17
source:
  edition: SBLGNT
  text: ἅ ἐστιν σκιὰ τῶν μελλόντων, τὸ δὲ σῶμα ⸀τοῦ Χριστοῦ.
translation:
  text: These are a shadow of the things to come, but the substance belongs to the
    Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'but the body is the Messiah's' or 'but the body belongs
      to Christ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅ
  chosen: These
  alternatives:
  - which things
  - these things
  lexicon: BDAG
  rationale: Neuter plural relative pronoun referring back to the food, festival,
    new moon, and Sabbath matters in the previous verse. 'These' is natural English
    and preserves the anaphoric reference without unnecessary stiffness.
- source_word: σκιὰ
  chosen: a shadow
  alternatives:
  - shadow
  lexicon: BDAG
  rationale: The singular predicate nominative is best rendered literally as 'a shadow,'
    preserving Paul's contrast between provisional outline and fuller reality.
- source_word: τῶν μελλόντων
  chosen: of the things to come
  alternatives:
  - of the coming things
  - of what was to come
  lexicon: BDAG
  rationale: The participle μέλλω with the article functions substantivally. 'The
    things to come' is idiomatic and keeps the future-oriented sense without overinterpreting
    whether Paul means eschatological realities, messianic fulfillment, or both.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks contrast here, setting 'shadow' over against 'body/substance.'
    'But' best signals the adversative force in English.
- source_word: σῶμα
  chosen: the substance
  alternatives:
  - the body
  - the reality
  lexicon: BDAG
  rationale: Although σῶμα normally means 'body,' in this contrast with 'shadow' it
    idiomatically points to the solid reality casting the shadow. 'Substance' communicates
    the metaphor clearly in modern English while preserving the contrast. Because
    'body' is a viable formal alternative and has been traditionally used, it is preserved
    in a footnote.
- source_word: τοῦ Χριστοῦ
  chosen: belongs to the Messiah
  alternatives:
  - is of the Messiah
  - is Christ's
  - is the Messiah's
  lexicon: BDAG
  rationale: 'The genitive is concise and somewhat elliptical in Greek. Rendering
    it as possession (''belongs to'') makes the clause intelligible in English: the
    substantial reality is the Messiah''s. ''Messiah'' follows the project''s default
    for Χριστός as a title rather than a name-like usage.'
