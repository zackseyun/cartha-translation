theological_decisions:
- issue: Meaning of σῶμα in contrast with σκιά
  chosen_reading: σῶμα is rendered metaphorically as 'substance,' referring to the
    fuller reality found in the Messiah.
  alternative_readings:
  - '''body,'' taken more formally and left for interpretation'
  - '''reality,'' emphasizing fulfillment'
  rationale: The verse contrasts shadow with what casts it or corresponds to it. Translating
    σῶμα as 'substance' preserves the metaphor's force in clear English without importing
    a specific doctrinal system. A more literal 'body' is possible and traditional,
    so it is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering Χριστοῦ
  chosen_reading: '''the Messiah'''
  alternative_readings:
  - '''Christ'''
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title. Here the genitive is titular rather than merely name-like, and 'Messiah'
    preserves the meaning of the title.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like)'
