theological_decisions:
- issue: Nature of the warning in παραλογίζηται ἐν πιθανολογίᾳ
  chosen_reading: A warning against being deceived by plausible or persuasive reasoning,
    without specifying a particular doctrinal system in the translation.
  alternative_readings:
  - A warning specifically against false philosophy
  - A warning against merely eloquent speech
  rationale: The Greek text itself warns generally against deceptive persuasive argumentation.
    The translation should not import a narrower polemical target than the verse states.
    Context may later clarify the threat, but this verse alone does not name it.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
