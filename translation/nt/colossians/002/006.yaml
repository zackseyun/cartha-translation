id: COL.2.6
reference: Colossians 2:6
source:
  edition: SBLGNT
  text: Ὡς οὖν παρελάβετε τὸν Χριστὸν Ἰησοῦν τὸν κύριον, ἐν αὐτῷ περιπατεῖτε,
translation:
  text: Therefore, just as you received Messiah Jesus the Lord, walk in him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὡς
  chosen: just as
  alternatives:
  - as
  - in the same way as
  lexicon: BDAG
  rationale: Introduces comparison between the Colossians' reception of Christ and
    their ongoing conduct. 'Just as' makes the comparative force clear in natural
    English.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument. 'Therefore' preserves
    the logical connection more explicitly than 'then'.
- source_word: παρελάβετε
  chosen: received
  alternatives:
  - accepted
  - learned
  lexicon: BDAG
  rationale: Aorist active indicative, referring to their prior reception of the apostolic
    message/person of Messiah Jesus. 'Received' is the standard and sufficiently broad
    rendering, preserving both doctrinal reception and personal welcome without over-interpreting.
- source_word: τὸν Χριστὸν Ἰησοῦν
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is translated as ''Messiah'' where it functions
    as a title rather than a fixed name-like element. Here the article and appositional
    structure support a titular sense: ''the Messiah, Jesus.'' ''Messiah Jesus'' preserves
    the title''s meaning.'
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - Lord
  - the Master
  lexicon: BDAG
  rationale: 'κύριος is a christological title and per doctrine defaults to ''Lord.''
    The article is retained in English because it is natural in apposition here: ''Messiah
    Jesus the Lord.'' ''Master'' is possible lexically but weaker for the established
    NT title.'
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in union with him
  lexicon: BDAG
  rationale: Preserves Paul's compact locative/instrumental union language without
    expanding it interpretively. 'In union with him' explains but over-specifies;
    'in him' keeps the theological richness and ambiguity.
- source_word: περιπατεῖτε
  chosen: walk
  alternatives:
  - live
  - keep walking
  lexicon: BDAG
  rationale: Present active imperative plural. 'Walk' preserves the common Pauline
    metaphor for conduct and discipleship. English readers can understand the metaphor,
    and it avoids flattening the image to merely 'live.' The imperative force is conveyed
    by the bare imperative 'walk.'
