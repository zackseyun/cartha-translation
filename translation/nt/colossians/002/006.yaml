theological_decisions:
- issue: Rendering Χριστός in a Pauline title sequence
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The translation philosophy directs that titles be translated and names
    transliterated. In this context Χριστός retains titular force rather than functioning
    purely as a surname-like identifier, so 'Messiah' is preferred. The traditional
    'Christ Jesus' is preserved in a footnote for recognizability.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Pauline union language in ἐν αὐτῷ
  chosen_reading: in him
  alternative_readings:
  - in union with him
  rationale: The phrase carries rich theological significance regarding believers'
    relation to Christ, but the Greek itself is concise. The translation preserves
    that tension rather than resolving it into a more interpretive paraphrase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
