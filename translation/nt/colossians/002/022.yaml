id: COL.2.22
reference: Colossians 2:22
source:
  edition: SBLGNT
  text: ἅ ἐστιν πάντα εἰς φθορὰν τῇ ἀποχρήσει, κατὰ τὰ ἐντάλματα καὶ διδασκαλίας τῶν
    ἀνθρώπων;
translation:
  text: These all are headed for destruction by being used, according to the commandments
    and teachings of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which all perish with use.' The Greek can be rendered more compactly,
      emphasizing that the things regulated are temporary and consumable.
    reason: lexical_alternative
  - marker: b
    text: '''Commandments and teachings of men'' likely echoes Isaiah 29:13, underscoring
      that these regulations are human in origin.'
    reason: cross_reference
  - marker: c
    text: Or 'of people.' The Greek reads 'of men/humans,' contrasting human regulations
      with God's commands.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅ
  chosen: These
  alternatives:
  - which things
  lexicon: BDAG
  rationale: Neuter plural relative pronoun referring back to the prohibitions of
    the previous verse. 'These' gives natural English while preserving the referential
    force.
- source_word: ἐστιν πάντα
  chosen: all are
  alternatives:
  - are all
  - all of them are
  lexicon: BDAG
  rationale: Taken together with neuter plural subject; in English the plural sense
    is best expressed explicitly as 'all are'.
- source_word: εἰς φθοράν
  chosen: headed for destruction
  alternatives:
  - for destruction
  - destined for decay
  - for corruption
  lexicon: BDAG
  rationale: φθορά can denote destruction, ruin, or decay. In this context of consumable
    things, the phrase indicates that such things perish; 'headed for destruction'
    is idiomatic and preserves the telic force of εἰς.
- source_word: τῇ ἀποχρήσει
  chosen: by being used
  alternatives:
  - with use
  - in using
  - through consumption
  lexicon: BDAG
  rationale: 'ἀπόχρησις refers to use up, consumption, or utilization. The dative
    is best taken instrumentally/circumstantially: these things perish in the very
    act of use. ''By being used'' is clear modern English.'
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in accordance with
  lexicon: BDAG
  rationale: Standard sense here introducing the norm or basis of the regulations.
- source_word: ἐντάλματα
  chosen: commandments
  alternatives:
  - commands
  - precepts
  lexicon: BDAG
  rationale: '''Commandments'' preserves the formal, regulatory sense and echoes biblical
    diction, especially in a likely allusion to Isaiah 29:13/LXX phrasing.'
- source_word: διδασκαλίας
  chosen: teachings
  alternatives:
  - doctrines
  - instructions
  lexicon: BDAG
  rationale: '''Teachings'' is the most natural modern rendering and pairs well with
    ''commandments'' without importing later technical doctrinal nuance.'
- source_word: τῶν ἀνθρώπων
  chosen: of men
  alternatives:
  - of people
  - human
  lexicon: BDAG
  rationale: 'The genitive marks source: these are human, not divine, regulations.
    Per translation philosophy, masculine plural ἀνθρώπων is rendered gender-accurately
    as ''men'' here because the phrase echoes traditional biblical wording and emphasizes
    human origin in contrast to God.'
