theological_decisions:
- issue: Nature of the parenthetical/explanatory clause in relation to ascetic regulations
  chosen_reading: The verse explains that the prohibited items are perishable and
    that the regulations are humanly derived.
  alternative_readings:
  - The verse may be read more sharply as dismissing the regulations themselves as
    concerned with things that perish in use.
  rationale: The Greek most naturally describes the objects of the prohibitions ('these
    all') as perishing with use, followed by a characterization of the rules as according
    to human commandments and teachings. The translation preserves Paul's critique
    without over-specifying whether the focus falls primarily on the objects or the
    regulations.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
