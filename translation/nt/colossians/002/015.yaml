id: COL.2.15
reference: Colossians 2:15
source:
  edition: SBLGNT
  text: ἀπεκδυσάμενος τὰς ἀρχὰς καὶ τὰς ἐξουσίας ἐδειγμάτισεν ἐν παρρησίᾳ, θριαμβεύσας
    αὐτοὺς ἐν αὐτῷ.
translation:
  text: Having disarmed the rulers and the authorities, he made a public spectacle
    of them, triumphing over them in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having stripped off the rulers and the authorities.' The verb can picture
      divesting or disarming hostile powers.
    reason: lexical_alternative
  - marker: b
    text: Or 'he exposed them openly' or 'he put them to open shame.'
    reason: lexical_alternative
  - marker: c
    text: Or 'leading them in triumph.' The verb evokes a Roman triumphal procession.
    reason: cultural_note
  - marker: d
    text: Or 'in it,' possibly referring to the cross mentioned in the previous verse.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκδυσάμενος
  chosen: having disarmed
  alternatives:
  - having stripped off
  - having stripped
  lexicon: BDAG
  rationale: The middle participle can mean to strip off or divest; in this context
    with personal objects ('the rulers and the authorities') it is best rendered as
    depriving them of their power, hence 'having disarmed.' This fits the hostile-powers
    context without overparaphrasing.
- source_word: ἀρχὰς
  chosen: the rulers
  alternatives:
  - the principalities
  - the first rulers
  lexicon: BDAG
  rationale: In Pauline usage ἀρχαί commonly refers to cosmic or spiritual rulers
    rather than merely abstract 'beginnings.' 'Rulers' is clear modern English and
    pairs naturally with ἐξουσίαι.
- source_word: ἐξουσίας
  chosen: the authorities
  alternatives:
  - the powers
  lexicon: BDAG
  rationale: A standard rendering in Pauline contexts for personal or supra-human
    authorities. 'Authorities' preserves the governmental/power nuance and matches
    common pairing with ἀρχαί.
- source_word: ἐδειγμάτισεν
  chosen: he made a public spectacle of
  alternatives:
  - he exposed publicly
  - he put to open shame
  lexicon: BDAG
  rationale: The verb denotes making an example of or exposing publicly. 'Made a public
    spectacle of' captures the public-display sense without importing excessive emotional
    coloring. 'Put to open shame' is possible but slightly more interpretive.
- source_word: ἐν παρρησίᾳ
  chosen: publicly
  alternatives:
  - openly
  - with boldness
  lexicon: BDAG
  rationale: Here the phrase modifies the public exposure of the defeated powers.
    Although παρρησία often means boldness/frankness, in this collocation the sense
    'openly/publicly' best fits the context and standard usage.
- source_word: θριαμβεύσας
  chosen: triumphing over
  alternatives:
  - leading in triumph
  - celebrating triumph over
  lexicon: BDAG
  rationale: The verb evokes a triumphal procession. In English, 'triumphing over'
    communicates victory clearly and idiomatically. 'Leading in triumph' is possible
    but can be misunderstood as the objects sharing in the triumph rather than being
    displayed as defeated foes.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in it
  - in the cross
  lexicon: BDAG
  rationale: The dative pronoun is syntactically ambiguous. The nearest explicit antecedent
    is not obvious, and interpreters differ whether it refers to Christ or to the
    cross implied from v.14. 'In him' preserves the masculine singular form straightforwardly,
    while the alternative 'in it'/'in the cross' is important enough to preserve in
    a footnote.
