theological_decisions:
- issue: Identity of 'the rulers and the authorities'
  chosen_reading: hostile cosmic/spiritual powers
  alternative_readings:
  - human rulers and authorities
  rationale: In Colossians, the pair ἀρχαί and ἐξουσίαι regularly carries a cosmic-power
    sense (cf. nearby usage), though the wording can also overlap with earthly authorities.
    The translation keeps the terms broad enough not to over-specify in the main text
    while recognizing the likely spiritual reference.
- issue: Referent of ἐν αὐτῷ
  chosen_reading: in him
  alternative_readings:
  - in it, i.e., in the cross
  rationale: The Greek pronoun is ambiguous and the text does not force a single interpretation.
    Per translation philosophy, the main text adopts one natural reading while preserving
    the alternative in a footnote rather than resolving the tension dogmatically.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
