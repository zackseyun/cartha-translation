theological_decisions:
- issue: Meaning of χειρόγραφον τοῖς δόγμασιν
  chosen_reading: a record of debt expressed in decrees/ordinances that stood against
    us
  alternative_readings:
  - the Mosaic law itself
  - an IOU of sins
  - a legal indictment
  rationale: The phrase is metaphorical and debated. The translation preserves the
    documentary-debt image without collapsing it into one theological system. This
    avoids importing a specific view of law, sin, or covenant beyond what the Greek
    directly states, while still reflecting that the document's contents were binding
    and adverse.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Subject of ἦρκεν
  chosen_reading: he (God) has taken it out of the way
  alternative_readings:
  - implicit divine passive-like sense without explicit subject
  rationale: English requires a subject, and the broader sentence context points to
    God as the actor. This is a grammatical completion rather than a doctrinal addition.
  doctrine_reference: Translation philosophy §1
