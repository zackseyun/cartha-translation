id: COL.2.7
reference: Colossians 2:7
source:
  edition: SBLGNT
  text: ἐρριζωμένοι καὶ ἐποικοδομούμενοι ἐν αὐτῷ καὶ ⸀βεβαιούμενοι τῇ πίστει καθὼς
    ἐδιδάχθητε, ⸀περισσεύοντες ἐν εὐχαριστίᾳ.
translation:
  text: having been rooted and being built up in him, and being established in the
    faith just as you were taught, overflowing with thanksgiving.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in faith'; alternatively, 'in faithfulness.' The Greek term pistis can
      carry the senses of faith, trust, or faithfulness, though here 'the faith' likely
      refers to the faith they were taught.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρριζωμένοι
  chosen: having been rooted
  alternatives:
  - rooted
  lexicon: BDAG
  rationale: Perfect participle; the English perfect-like 'having been rooted' best
    preserves the completed action with continuing result, while still reading naturally.
    The agricultural metaphor should be retained rather than paraphrased.
- source_word: ἐποικοδομούμενοι
  chosen: being built up
  alternatives:
  - built up
  - being built on
  lexicon: BDAG
  rationale: Present participle indicating ongoing action. 'Built up' preserves the
    construction metaphor and is idiomatic in Pauline usage. 'Being built on' is possible
    etymologically but less fitting here without an expressed foundation object.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in Messiah
  - in Christ
  lexicon: BDAG
  rationale: The pronoun refers back to Christ in the immediate context, but the Greek
    uses a pronoun, not the title/name itself, so 'in him' should be preserved.
- source_word: βεβαιούμενοι
  chosen: being established
  alternatives:
  - being strengthened
  - being confirmed
  lexicon: BDAG
  rationale: '''Being established'' best captures the sense of being made firm or
    secure in context. ''Confirmed'' is possible but less natural in contemporary
    English here; ''strengthened'' narrows the sense too much.'
- source_word: τῇ πίστει
  chosen: in the faith
  alternatives:
  - in faith
  - by faith
  - in faithfulness
  lexicon: BDAG
  rationale: The article favors a more definite sense, 'the faith,' likely referring
    to the Christian faith/the believed message rather than merely subjective believing.
    Because πίστις is a contested term in the project guidelines, the default 'faith'
    is retained; 'faithfulness' is preserved as an alternative but is less likely
    here.
- source_word: καθὼς ἐδιδάχθητε
  chosen: just as you were taught
  alternatives:
  - as you were taught
  lexicon: BDAG
  rationale: This straightforwardly links their establishment in the faith to prior
    apostolic instruction. 'Just as' slightly better conveys the comparative force
    of καθώς.
- source_word: περισσεύοντες
  chosen: overflowing
  alternatives:
  - abounding
  - having an abundance
  lexicon: BDAG
  rationale: Present participle with the sense of abundance. 'Overflowing' is vivid,
    natural English and fits the metaphorical extension into thanksgiving.
- source_word: ἐν εὐχαριστίᾳ
  chosen: with thanksgiving
  alternatives:
  - in thanksgiving
  - in gratitude
  lexicon: BDAG
  rationale: Although ἐν is formally 'in,' English idiom prefers 'with thanksgiving'
    here. This preserves the sense without woodenness. 'Gratitude' is possible but
    'thanksgiving' better reflects the noun and Pauline diction.
