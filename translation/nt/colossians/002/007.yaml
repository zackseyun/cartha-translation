theological_decisions:
- issue: Sense of τῇ πίστει
  chosen_reading: the faith, understood as the Christian faith/message in which the
    Colossians are being established
  alternative_readings:
  - faith as their personal trust
  - faithfulness
  rationale: The article with πίστις and the following 'just as you were taught' point
    toward the content or sphere of apostolic teaching rather than merely an inward
    act. This preserves the text's likely meaning without over-specifying denominational
    implications. Per doctrine guidelines, the default rendering 'faith' is maintained,
    while alternatives are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy #3'
