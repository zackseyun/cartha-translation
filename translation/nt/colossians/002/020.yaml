theological_decisions:
- issue: Sense of στοιχεῖα in Pauline usage
  chosen_reading: Rendered as 'elemental principles' in the main text
  alternative_readings:
  - elemental spirits
  - basic elements
  rationale: The term is debated and may include both cosmic/spiritual and rudimentary-system
    meanings. The chosen rendering preserves ambiguity without importing a specific
    cosmology. Alternatives are preserved in a footnote for auditability.
  doctrine_reference: Preserve theological tension rather than resolve it.
