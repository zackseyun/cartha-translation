id: COL.2.20
reference: Colossians 2:20
source:
  edition: SBLGNT
  text: Εἰ ἀπεθάνετε σὺν Χριστῷ ἀπὸ τῶν στοιχείων τοῦ κόσμου, τί ὡς ζῶντες ἐν κόσμῳ
    δογματίζεσθε·
translation:
  text: 'If you died with the Messiah away from the elemental principles of the world,
    why, as if living in the world, are you submitting yourselves to decrees:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the elemental spirits of the world'; alternatively, 'the basic elements
      of the world.'
    reason: alternative_reading
  - marker: b
    text: Or 'do you submit to regulations?'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ
  chosen: If
  alternatives:
  - Since
  lexicon: BDAG
  rationale: The conditional particle is formally 'if.' In context Paul likely assumes
    the condition as true for believers, but retaining 'if' preserves the Greek form
    without over-interpreting the rhetoric.
- source_word: ἀπεθάνετε
  chosen: you died
  alternatives:
  - you have died
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as a simple past here. English present
    perfect is possible, but 'you died' keeps the decisive past event in union with
    Messiah in view.
- source_word: σὺν Χριστῷ
  chosen: with the Messiah
  alternatives:
  - with Christ
  lexicon: BDAG
  rationale: Χριστός is a title here rather than a name-like identifier, so 'Messiah'
    follows the project's default for Christological titles and preserves the title's
    meaning.
- source_word: ἀπὸ
  chosen: away from
  alternatives:
  - from
  lexicon: BDAG
  rationale: The preposition marks separation. 'Away from' makes the sense of release/separation
    from the στοιχεῖα more explicit in natural English.
- source_word: τῶν στοιχείων τοῦ κόσμου
  chosen: the elemental principles of the world
  alternatives:
  - the elemental spirits of the world
  - the basic elements of the world
  lexicon: BDAG
  rationale: στοιχεῖα can denote basic elements, elemental principles, or cosmic powers/spirits.
    In Colossians 2 the phrase likely refers to the world's rudimentary ordering principles,
    possibly with spiritual overtones. 'Elemental principles' preserves the ambiguity
    better than a fully demythologized or fully personal rendering.
- source_word: τί
  chosen: why
  alternatives:
  - for what reason
  lexicon: BDAG
  rationale: 'Idiomatic in this rhetorical question: τί with the following clause
    asks ''why?'' rather than requiring a wooden ''what?''.'
- source_word: ὡς ζῶντες ἐν κόσμῳ
  chosen: as if living in the world
  alternatives:
  - as though you were living in the world
  lexicon: BDAG
  rationale: ὡς with the participle conveys comparison or supposition. 'As if living
    in the world' is concise and natural while preserving the rhetorical force.
- source_word: δογματίζεσθε
  chosen: are you submitting yourselves to decrees
  alternatives:
  - do you submit to regulations
  - are you being subjected to decrees
  lexicon: BDAG
  rationale: The verb means to be governed by decrees or submit to regulations. The
    middle/passive form allows either passive or reflexive nuance; 'submitting yourselves
    to decrees' captures the practical sense in context while keeping the readers'
    participation in view.
