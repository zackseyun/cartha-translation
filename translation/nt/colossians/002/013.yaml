id: COL.2.13
reference: Colossians 2:13
source:
  edition: SBLGNT
  text: καὶ ὑμᾶς νεκροὺς ὄντας ⸀ἐν τοῖς παραπτώμασιν καὶ τῇ ἀκροβυστίᾳ τῆς σαρκὸς
    ὑμῶν, συνεζωοποίησεν ὑμᾶς σὺν αὐτῷ· χαρισάμενος ἡμῖν πάντα τὰ παραπτώματα,
translation:
  text: And you, who were dead in your trespasses and in the uncircumcision of your
    flesh, he made alive together with him, having forgiven us all our trespasses,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your transgressions.'
    reason: lexical_alternative
  - marker: b
    text: '''Uncircumcision of your flesh'' refers most directly to their uncircumcised
      bodily state, though in context it also carries spiritual significance.'
    reason: cultural_note
  - marker: c
    text: 'The Greek shifts from ''you'' to ''us'': ''having forgiven us all our trespasses.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: νεκροὺς ὄντας
  chosen: who were dead
  alternatives:
  - being dead
  lexicon: BDAG
  rationale: The participial construction modifies ὑμᾶς and is naturally rendered
    in English as a relative clause for readability while preserving the state of
    spiritual death.
- source_word: ἐν τοῖς παραπτώμασιν
  chosen: in your trespasses
  alternatives:
  - because of your trespasses
  - in the sphere of your trespasses
  lexicon: BDAG
  rationale: παράπτωμα commonly means 'trespass' or 'transgression.' 'In' preserves
    the preposition ἐν and Paul's imagery of their condition existing within the realm
    of their offenses rather than flattening it to simple causation.
- source_word: ἀκροβυστίᾳ
  chosen: uncircumcision
  alternatives:
  - foreskin
  lexicon: BDAG
  rationale: The term can denote literal foreskin or the state of being uncircumcised.
    Here the abstract sense fits the dative construction and Paul's theological usage,
    especially in contrast with covenantal circumcision in the surrounding context.
- source_word: τῆς σαρκὸς ὑμῶν
  chosen: of your flesh
  alternatives:
  - of your sinful nature
  - of your body
  lexicon: BDAG
  rationale: Per doctrine guidance, σάρξ is rendered 'flesh' when literal and 'sinful
    nature' when metaphorical. Here it most naturally refers to bodily uncircumcision,
    though with possible theological overtones. 'Of your flesh' preserves the concrete
    expression without over-interpreting it.
- source_word: συνεζωοποίησεν
  chosen: he made alive together
  alternatives:
  - he gave life together
  - he made alive with
  lexicon: BDAG
  rationale: The compound verb emphasizes being made alive together with another.
    English requires completion by the following phrase σὺν αὐτῷ; 'he made alive together
    with him' preserves both the resurrection-life sense and the union-with-Christ
    emphasis.
- source_word: σὺν αὐτῷ
  chosen: together with him
  alternatives:
  - with him
  lexicon: BDAG
  rationale: The preposition σύν explicitly marks association; retaining 'together'
    preserves the force of the compound verb plus prepositional phrase and highlights
    participation with Christ.
- source_word: χαρισάμενος
  chosen: having forgiven
  alternatives:
  - forgiving
  - graciously forgiving
  lexicon: BDAG
  rationale: The aorist middle participle from χαρίζομαι carries the sense of freely
    or graciously forgiving. 'Having forgiven' fits the participial relation to the
    main verb and keeps the action closely connected without overloading the English
    with adverbial explanation.
- source_word: ἡμῖν
  chosen: us
  alternatives:
  - you and us
  lexicon: BDAG
  rationale: The Greek shifts from second person ('you') to first person plural ('us').
    This should be preserved rather than harmonized, since Paul likely broadens the
    statement from the Colossians to believers generally, including himself.
- source_word: πάντα τὰ παραπτώματα
  chosen: all our trespasses
  alternatives:
  - all the trespasses
  - all our transgressions
  lexicon: BDAG
  rationale: The article plus πᾶς is naturally rendered 'all.' Repeating 'trespasses'
    maintains lexical consistency with the earlier παράπτωμα and preserves Paul's
    emphasis on the totality of forgiveness.
