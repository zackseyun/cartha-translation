theological_decisions:
- issue: Meaning of σάρξ in the phrase τῆς σαρκὸς ὑμῶν
  chosen_reading: literal 'flesh' with possible theological resonance, not 'sinful
    nature' in the main text
  alternative_readings:
  - metaphorical 'sinful nature'
  rationale: In context, 'uncircumcision of your flesh' most directly refers to bodily
    uncircumcision, especially given the circumcision language in the immediate context
    (2:11). Rendering it 'sinful nature' would import an interpretive conclusion not
    demanded by the phrase, though the broader context of spiritual deadness allows
    theological overtones.
  doctrine_reference: 'DOCTRINE.md: σάρξ default rendering is ''flesh'' when literal
    / ''sinful nature'' when metaphorical; preserve tension rather than resolve it.'
- issue: Referent of αὐτῷ in σὺν αὐτῷ
  chosen_reading: with Christ
  alternative_readings:
  - with God in a broader sense through the antecedent subject
  rationale: The immediate context in Colossians 2 centers on union with Christ in
    burial and resurrection (2:12), so 'him' is best understood as Christ. The English
    keeps the pronoun rather than substituting 'Christ' to remain close to the Greek
    while allowing the contextual referent to stand.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; do not import claims
    beyond the text.'
