id: COL.2.16
reference: Colossians 2:16
source:
  edition: SBLGNT
  text: Μὴ οὖν τις ὑμᾶς κρινέτω ἐν βρώσει ⸀ἢ ἐν πόσει ἢ ἐν μέρει ἑορτῆς ἢ νουμηνίας
    ἢ σαββάτων,
translation:
  text: Therefore, let no one judge you in food or in drink, or with regard to a festival
    or a new moon or Sabbaths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'let no one pass judgment on you.'
    reason: lexical_alternative
  - marker: b
    text: That is, with respect to food and drink regulations.
    reason: cultural_note
  - marker: c
    text: The sequence 'festival or a new moon or Sabbaths' echoes the Jewish sacred
      calendar (annual, monthly, weekly).
    reason: cross_reference
lexical_decisions:
- source_word: Μὴ οὖν
  chosen: Therefore, let no one
  alternatives:
  - So let no one
  - Therefore let no one
  lexicon: BDAG
  rationale: Μὴ with the present imperative κρινέτω forms a prohibition; οὖν is inferential,
    best carried by 'therefore' to preserve the logical connection with the preceding
    argument.
- source_word: τις
  chosen: no one
  alternatives:
  - anyone
  lexicon: BDAG
  rationale: Indefinite singular subject in a prohibitive construction is idiomatically
    rendered 'no one' in English.
- source_word: ὑμᾶς κρινέτω
  chosen: let no one judge you
  alternatives:
  - let no one pass judgment on you
  lexicon: BDAG
  rationale: κρίνω here means to judge/condemn in relation to observance practices.
    'Judge you' is concise and natural; the fuller nuance 'pass judgment on you' is
    preserved as an alternative.
- source_word: ἐν βρώσει
  chosen: in food
  alternatives:
  - in eating
  - with regard to food
  lexicon: BDAG
  rationale: βρῶσις can denote eating or food. In this list of ritual observance categories,
    the object/category sense fits best. Retaining 'in' reflects the repeated ἐν structure,
    though the sense is 'in matters of food'.
- source_word: ἐν πόσει
  chosen: in drink
  alternatives:
  - in drinking
  - with regard to drink
  lexicon: BDAG
  rationale: πόσις can denote drinking or drink. Parallel to βρώσει, the category/object
    sense is preferable in this context of dietary regulations.
- source_word: ἐν μέρει ἑορτῆς
  chosen: with regard to a festival
  alternatives:
  - in the matter of a festival
  - in part of a festival
  lexicon: BDAG
  rationale: The idiom ἐν μέρει commonly means 'with respect to / in the matter of,'
    not 'in part.' ἑορτή refers to a religious feast/festival day.
- source_word: νουμηνίας
  chosen: a new moon
  alternatives:
  - the new moon festival
  lexicon: BDAG
  rationale: Refers to the monthly new-moon observance. Singular in Greek is naturally
    rendered with the English singular article in a representative list.
- source_word: σαββάτων
  chosen: Sabbaths
  alternatives:
  - a Sabbath
  - sabbath days
  lexicon: BDAG
  rationale: The plural genitive likely refers to Sabbath observances as part of the
    standard triad 'festival, new moon, Sabbaths.' 'Sabbaths' preserves the Greek
    number and the Jewish calendrical pattern.
