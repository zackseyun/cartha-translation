theological_decisions:
- issue: Whether ἀπόκρυφοι implies esoteric secrecy or secure location in Christ
  chosen_reading: Rendered neutrally as 'hidden' without importing the idea that wisdom
    is either inaccessible to believers or merely stored up for them.
  alternative_readings:
  - '''stored up'' to emphasize safekeeping/availability'
  - '''secret'' to emphasize hiddenness from outsiders'
  rationale: The verse likely engages claims of special knowledge, but the adjective
    itself does not require a full interpretive resolution. Following the translation
    philosophy, the wording preserves the theological tension rather than resolving
    it beyond the Greek.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
