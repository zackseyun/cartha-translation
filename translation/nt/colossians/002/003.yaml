id: COL.2.3
reference: Colossians 2:3
source:
  edition: SBLGNT
  text: ἐν ᾧ εἰσιν πάντες οἱ θησαυροὶ τῆς σοφίας ⸀καὶ γνώσεως ἀπόκρυφοι.
translation:
  text: in whom are hidden all the treasures of wisdom and knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in which,' if the antecedent is taken more broadly as the mystery of
      God rather than Christ personally.
    reason: alternative_reading
  - marker: b
    text: Or 'stored up'; the Greek adjective can suggest what is hidden or kept in
      reserve.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: in whom
  alternatives:
  - in which
  lexicon: BDAG
  rationale: The relative pronoun is dative singular and most naturally refers back
    to the immediately preceding personal referent, Christ (2:2). Because the antecedent
    is personal, 'in whom' is preferable to 'in which,' while preserving the locative/instrumental
    force of ἐν.
- source_word: πάντες οἱ θησαυροὶ
  chosen: all the treasures
  alternatives:
  - every treasure
  - all treasures
  lexicon: BDAG
  rationale: 'The article with the plural noun supports a definite collective sense:
    ''all the treasures.'' This preserves Paul''s comprehensive claim without paraphrase.'
- source_word: τῆς σοφίας καὶ γνώσεως
  chosen: of wisdom and knowledge
  alternatives:
  - of wisdom and understanding
  lexicon: BDAG
  rationale: σοφία and γνῶσις are distinct but related terms; 'wisdom and knowledge'
    is the most direct and standard rendering, preserving the paired genitives without
    collapsing them into one concept.
- source_word: ἀπόκρυφοι
  chosen: hidden
  alternatives:
  - stored up
  - concealed
  lexicon: BDAG
  rationale: ἀπόκρυφοι literally means 'hidden' or 'concealed.' 'Hidden' is the most
    transparent rendering and fits the polemical context, likely countering claims
    to secret wisdom, without overinterpreting whether the sense is inaccessible or
    securely stored.
- source_word: εἰσιν ... ἀπόκρυφοι
  chosen: are hidden
  alternatives:
  - are concealed
  lexicon: Greek grammar / BDAG
  rationale: 'The predicate adjective ἀπόκρυφοι with εἰσιν is naturally rendered as
    a predicate: ''are hidden.'' This is more straightforward English than a more
    wooden order such as ''are ... hidden,'' while preserving the Greek assertion.'
