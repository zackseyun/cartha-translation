theological_decisions:
- issue: Christological force of θεότης and σωματικῶς
  chosen_reading: The verse affirms that the full reality of deity dwells in Christ
    bodily.
  alternative_readings:
  - The verse speaks more loosely of divine qualities dwelling in Christ
  - The verse refers only to God's presence in Christ without implying full deity
  rationale: θεότης is a strong term for deity rather than merely divine quality,
    and σωματικῶς indicates that this indwelling is bodily/corporeal. The translation
    should preserve this high Christological claim in line with the Greek text, without
    diluting it into a weaker statement about attributes or presence alone.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language); Definition of Chalcedon (451 AD)'
