id: COL.2.9
reference: Colossians 2:9
source:
  edition: SBLGNT
  text: ὅτι ἐν αὐτῷ κατοικεῖ πᾶν τὸ πλήρωμα τῆς θεότητος σωματικῶς,
translation:
  text: For in him all the fullness of deity dwells bodily,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole fullness of the Godhead dwells in him bodily.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context, ὅτι introduces the ground for the preceding warning/exhortation,
    so 'For' reads naturally in English while preserving the causal force.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in him alone
  lexicon: BDAG
  rationale: A straightforward locative phrase referring to Messiah; no exclusivizing
    adverb should be added beyond the Greek.
- source_word: κατοικεῖ
  chosen: dwells
  alternatives:
  - lives
  - resides
  lexicon: BDAG
  rationale: '''Dwells'' preserves the durative, settled sense of κατοικέω better
    than the flatter ''lives'' or ''resides,'' and echoes the theological weight of
    divine indwelling without becoming archaic.'
- source_word: πᾶν τὸ πλήρωμα
  chosen: all the fullness
  alternatives:
  - the whole fullness
  - all fullness
  lexicon: BDAG
  rationale: The combination of πᾶν with the articular πλήρωμα is best represented
    as 'all the fullness,' conveying totality without awkwardness. 'The whole fullness'
    is possible but less idiomatic in modern English.
- source_word: τῆς θεότητος
  chosen: of deity
  alternatives:
  - of the Godhead
  - of divinity
  lexicon: BDAG
  rationale: θεότης denotes the state or quality of being God, stronger than a more
    general term for divinity. 'Deity' is clear modern English and preserves the full
    force of the term better than the traditional but less accessible 'Godhead.'
- source_word: σωματικῶς
  chosen: bodily
  alternatives:
  - in bodily form
  - in a body
  lexicon: BDAG
  rationale: The adverb is most directly rendered 'bodily.' This preserves the concise
    Greek expression and leaves its full Christological force intact without over-interpreting
    it as merely incarnational or sacramental.
