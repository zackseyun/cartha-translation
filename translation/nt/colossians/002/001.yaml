id: COL.2.1
reference: Colossians 2:1
source:
  edition: SBLGNT
  text: Θέλω γὰρ ὑμᾶς εἰδέναι ἡλίκον ἀγῶνα ἔχω ⸀ὑπὲρ ὑμῶν καὶ τῶν ἐν Λαοδικείᾳ καὶ
    ὅσοι οὐχ ἑόρακαν τὸ πρόσωπόν μου ἐν σαρκί,
translation:
  text: For I want you to know how great a struggle I have for you and for those in
    Laodicea, and for all who have not seen my face in the flesh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in person' or 'bodily.' The Greek reads literally 'in the flesh,' referring
      here to physical presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θέλω γὰρ
  chosen: For I want
  alternatives:
  - For I desire
  - Indeed, I want
  lexicon: BDAG
  rationale: γάρ is naturally rendered 'for' to connect with the preceding argument,
    and θέλω in this epistolary context is best expressed as the straightforward modern
    English 'want' rather than the more formal 'desire.'
- source_word: ὑμᾶς εἰδέναι
  chosen: you to know
  alternatives:
  - you to understand
  - you to be aware
  lexicon: BDAG
  rationale: The infinitive construction after θέλω is idiomatically 'I want you to
    know.' This preserves the directness of the Greek without unnecessary expansion.
- source_word: ἡλίκον ἀγῶνα
  chosen: how great a struggle
  alternatives:
  - what a great conflict
  - how intense a contest
  lexicon: BDAG
  rationale: ἡλίκον emphasizes magnitude ('how great'), and ἀγών here refers to strenuous
    struggle rather than a literal athletic contest. 'Struggle' is natural English
    and fits Paul's metaphorical use.
- source_word: ἔχω ὑπὲρ ὑμῶν
  chosen: I have for you
  alternatives:
  - I am engaged in on your behalf
  - I have concerning you
  lexicon: BDAG
  rationale: ἔχω with ἀγῶνα is idiomatically 'have a struggle,' and ὑπέρ here is best
    rendered 'for' in the sense of acting on behalf of or for the benefit of the readers.
- source_word: τῶν ἐν Λαοδικείᾳ
  chosen: those in Laodicea
  alternatives:
  - the ones in Laodicea
  - those at Laodicea
  lexicon: BDAG
  rationale: The article plus prepositional phrase functions substantivally. 'Those
    in Laodicea' is concise and natural.
- source_word: ὅσοι οὐχ ἑόρακαν
  chosen: all who have not seen
  alternatives:
  - as many as have not seen
  - those who have not seen
  lexicon: BDAG
  rationale: ὅσοι has an inclusive force. 'All who have not seen' preserves that breadth
    better than the less explicit 'those who have not seen.' The perfect form is represented
    with English present perfect.
- source_word: τὸ πρόσωπόν μου
  chosen: my face
  alternatives:
  - my presence
  - me face to face
  lexicon: BDAG
  rationale: The literal 'my face' is retained because it is intelligible in English
    and reflects the Greek expression. More interpretive renderings like 'my presence'
    are possible but less transparent.
- source_word: ἐν σαρκί
  chosen: in the flesh
  alternatives:
  - in person
  - bodily
  lexicon: BDAG
  rationale: Given the doctrine guidance on σάρξ, the literal rendering 'flesh' is
    preferred in non-metaphorical contexts. Here it denotes bodily, physical presence,
    not sinful nature.
