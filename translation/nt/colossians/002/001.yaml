- issue: Rendering of σάρξ in a non-metaphorical context
  chosen_reading: in the flesh
  alternative_readings:
  - in person
  - bodily
  rationale: The phrase ἐν σαρκί here refers to physical, embodied presence. Following
    the doctrine's default for σάρξ, the literal 'flesh' is retained where the sense
    is literal rather than moral/metaphorical.
