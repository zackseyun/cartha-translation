theological_decisions:
- issue: Meaning of 'the circumcision of the Messiah'
  chosen_reading: 'Rendered as an intentionally open genitive: ''the circumcision
    of the Messiah'''
  alternative_readings:
  - the circumcision performed by the Messiah
  - the Messiah's own circumcision
  - the circumcision that belongs to the Messiah/new-covenant circumcision
  rationale: The Greek genitive τοῦ Χριστοῦ is ambiguous, and the context links believers'
    spiritual circumcision to union with Christ. The translation preserves this ambiguity
    rather than resolving it into one doctrinally loaded interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; Χριστός
    default rendered 'Messiah' where title.
- issue: Sense of 'body of flesh'
  chosen_reading: Kept as 'body of flesh' without expanding to 'sinful nature' or
    'body of sins'
  alternative_readings:
  - body of the flesh
  - fleshly body
  - body of sinful flesh
  rationale: The phrase is textually and interpretively difficult, and some later
    manuscripts expand it. The SBLGNT reading should be translated without importing
    later clarifications. This preserves Paul's wording and avoids overstatement about
    anthropology.
  doctrine_reference: Original-language primacy; preserve theological tension rather
    than resolve it.
