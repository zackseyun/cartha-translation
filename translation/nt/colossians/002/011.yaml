id: COL.2.11
reference: Colossians 2:11
source:
  edition: SBLGNT
  text: ἐν ᾧ καὶ περιετμήθητε περιτομῇ ἀχειροποιήτῳ ἐν τῇ ἀπεκδύσει τοῦ ⸀σώματος τῆς
    σαρκός, ἐν τῇ περιτομῇ τοῦ Χριστοῦ,
translation:
  text: In him you also were circumcised with a circumcision not made by hands, in
    the removal of the body of flesh, in the circumcision of the Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in whom.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with a circumcision made without hands.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the stripping off of the body of flesh.'
    reason: lexical_alternative
  - marker: d
    text: '''Flesh'' could also be understood more interpretively as ''sinful nature,''
      but the Greek term is left more literal here.'
    reason: lexical_alternative
  - marker: e
    text: Or 'by the circumcision of the Messiah' or 'the Messiah's circumcision.'
      The Greek may refer to circumcision effected by the Messiah, belonging to the
      Messiah, or associated with him.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: In him
  alternatives:
  - in whom
  lexicon: BDAG
  rationale: The relative pronoun refers back to Christ in the previous context. 'In
    him' is idiomatic modern English and preserves the union-with-Christ sense without
    awkwardness.
- source_word: περιετμήθητε
  chosen: you were circumcised
  alternatives:
  - you were cut around
  lexicon: BDAG
  rationale: Aorist passive indicative, best rendered straightforwardly as a completed
    passive action. The metaphorical force should remain tied to 'circumcised' rather
    than paraphrased away.
- source_word: περιτομῇ ἀχειροποιήτῳ
  chosen: with a circumcision not made by hands
  alternatives:
  - with a handmade-less circumcision
  - with a circumcision made without hands
  lexicon: BDAG
  rationale: The dative is instrumental/associative. 'Not made by hands' is natural
    English and preserves the biblical contrast between human ritual and divine action.
- source_word: ἀχειροποιήτῳ
  chosen: not made by hands
  alternatives:
  - made without hands
  lexicon: BDAG
  rationale: This established biblical expression communicates divine, non-human origin.
    The chosen wording is slightly more natural in contemporary English while retaining
    the idiom.
- source_word: ἐν τῇ ἀπεκδύσει
  chosen: in the removal
  alternatives:
  - in the stripping off
  - by the putting off
  lexicon: BDAG
  rationale: The noun denotes a stripping off or removal. 'Removal' is concise and
    readable, while still allowing the metaphor of decisive putting away.
- source_word: τοῦ σώματος τῆς σαρκός
  chosen: of the body of flesh
  alternatives:
  - of the fleshly body
  - of the body of the flesh
  lexicon: BDAG
  rationale: This genitival phrase is difficult. 'Body of flesh' preserves the Greek
    structure and avoids overinterpreting whether Paul means the physical body, the
    body characterized by flesh, or the old fleshly existence.
- source_word: σαρκός
  chosen: flesh
  alternatives:
  - sinful nature
  lexicon: BDAG
  rationale: Per doctrine guidance, sarx should be rendered 'flesh' when possible
    unless the metaphorical sense clearly demands otherwise. Here 'flesh' preserves
    Pauline texture and avoids importing a narrower doctrinal interpretation.
- source_word: ἐν τῇ περιτομῇ τοῦ Χριστοῦ
  chosen: in the circumcision of the Messiah
  alternatives:
  - by the circumcision of the Messiah
  - in Messiah's circumcision
  - in the circumcision done by the Messiah
  lexicon: BDAG
  rationale: The repeated ἐν is retained as 'in' for formal coherence. Χριστοῦ is
    rendered 'the Messiah' per doctrine for title usage. The genitive is left somewhat
    open in English ('of the Messiah') to preserve the likely intentional ambiguity
    between circumcision belonging to, effected by, or associated with the Messiah.
