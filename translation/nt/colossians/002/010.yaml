theological_decisions:
- issue: Meaning of believers' fullness in Christ
  chosen_reading: The verse states that believers have been made full in Christ, expressing
    their participation in the fullness found in him, without specifying a later doctrinal
    system about perfection or eradication of sin.
  alternative_readings:
  - Believers are complete in the sense of lacking nothing for salvation
  - Believers are filled with divine fullness by union with Christ
  rationale: The wording should preserve Paul's claim of sufficiency in Christ while
    not importing a technical doctrine of sinless perfection or collapsing the phrase
    into a merely forensic statement. 'Made full' keeps the fullness theme and theological
    breadth.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Force of κεφαλή over spiritual powers
  chosen_reading: Christ is presented as supreme over all rulers and authorities.
  alternative_readings:
  - Christ is the source of every ruler and authority
  rationale: While κεφαλή can be debated in some contexts, here the immediate pairing
    with cosmic powers in Colossians strongly favors supremacy/authority. The main
    text retains 'head' to preserve the metaphor, while the theological sense is documented
    here.
