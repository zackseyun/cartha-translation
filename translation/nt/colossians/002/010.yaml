id: COL.2.10
reference: Colossians 2:10
source:
  edition: SBLGNT
  text: καὶ ἐστὲ ἐν αὐτῷ πεπληρωμένοι, ὅς ἐστιν ἡ κεφαλὴ πάσης ἀρχῆς καὶ ἐξουσίας,
translation:
  text: and in him you have been made full, who is the head of every ruler and authority.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "filled" or "brought to fullness."
    reason: lexical_alternative
  - marker: b
    text: '"Head" preserves the Greek metaphor; the sense here is that he is supreme
      over every ruler and authority.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Standard connective; retained to preserve the verse's continuity with
    the preceding argument.
- source_word: ἐστὲ
  chosen: you have been
  alternatives:
  - you are
  lexicon: BDAG
  rationale: Combined with the perfect participle πεπληρωμένοι, the English perfect
    passive ('have been made') best conveys the present state resulting from a completed
    action.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in union with him
  lexicon: BDAG
  rationale: The prepositional phrase expresses believers' incorporation/union with
    Christ. 'In him' is both faithful and idiomatic, while preserving Paul's compact
    theological language.
- source_word: πεπληρωμένοι
  chosen: made full
  alternatives:
  - filled
  - brought to fullness
  - complete
  lexicon: BDAG
  rationale: Perfect passive participle of πληρόω. 'Made full' preserves the passive
    sense and the fullness motif linking back to the previous verse, without overinterpreting
    as merely subjective satisfaction. 'Complete' is possible but can flatten the
    fullness imagery.
- source_word: ὅς
  chosen: who
  alternatives:
  - he who
  lexicon: BDAG
  rationale: Relative pronoun referring back to 'him' (Christ). 'Who' is natural English
    and preserves the personal reference.
- source_word: κεφαλὴ
  chosen: head
  alternatives:
  - ruler
  - source
  lexicon: BDAG
  rationale: '''Head'' is the direct lexical rendering and preserves the metaphor.
    Rendering it as ''ruler'' would interpret the metaphor rather than translate it.
    The context of authority supports supremacy, but the metaphor should remain in
    the main text.'
- source_word: πάσης
  chosen: every
  alternatives:
  - all
  lexicon: BDAG
  rationale: With singular collectives ἀρχῆς and ἐξουσίας, 'every' idiomatically conveys
    comprehensiveness over each instance/class.
- source_word: ἀρχῆς
  chosen: ruler
  alternatives:
  - rule
  - principality
  - domain
  lexicon: BDAG
  rationale: In this context paired with ἐξουσία, the term denotes a ruling power
    or ruler. 'Ruler' communicates the personal/power-bearing sense more clearly for
    modern readers than 'principality,' which is archaic, while avoiding the abstraction
    of 'rule' alone.
- source_word: ἐξουσίας
  chosen: authority
  alternatives:
  - power
  - jurisdiction
  lexicon: BDAG
  rationale: Standard rendering in Pauline contexts for delegated or exercised authority.
    It pairs naturally with ἀρχή and is widely understandable.
