id: COL.2.21
reference: Colossians 2:21
source:
  edition: SBLGNT
  text: Μὴ ἅψῃ μηδὲ γεύσῃ μηδὲ θίγῃς,
translation:
  text: “Do not handle, nor taste, nor touch,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not touch, nor taste, nor touch.' The first verb (ἅψῃ) can also be
      rendered 'touch' or 'take hold of,' but 'handle' is used here to distinguish
      it from the later θίγῃς ('touch').
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ
  chosen: Do not
  alternatives:
  - Do not ever
  - You must not
  lexicon: BDAG
  rationale: μή with the aorist subjunctive forms a prohibition. English idiom is
    best represented by 'Do not' introducing the series.
- source_word: ἅψῃ
  chosen: handle
  alternatives:
  - touch
  - take hold of
  lexicon: BDAG
  rationale: From ἅπτω in the middle, often 'touch' or 'take hold of.' Here, because
    θίγῃς also appears later and more naturally covers 'touch,' rendering ἅψῃ as 'handle'
    preserves the rhetorical gradation and avoids flattening two distinct verbs into
    the same English gloss.
- source_word: μηδὲ
  chosen: nor
  alternatives:
  - and not
  - or
  lexicon: BDAG
  rationale: Repeated coordinating negative conjunction linking the prohibitions.
    'Nor' preserves the cumulative force in natural English.
- source_word: γεύσῃ
  chosen: taste
  alternatives:
  - eat
  - partake of
  lexicon: BDAG
  rationale: γεύομαι literally means 'taste,' and that direct rendering fits both
    the lexical sense and the ascetic-prohibition context.
- source_word: θίγῃς
  chosen: touch
  alternatives:
  - lay hold of
  - come into contact with
  lexicon: BDAG
  rationale: θιγγάνω commonly means 'touch.' Since ἅψῃ has been rendered 'handle,'
    'touch' here preserves a distinction between the verbs while remaining idiomatic.
