theological_decisions:
- issue: Meaning of στοιχεῖα τοῦ κόσμου
  chosen_reading: elemental principles of the world
  alternative_readings:
  - elemental spirits of the world
  - basic principles of the world
  rationale: The phrase is debated in Pauline usage. To preserve theological tension
    rather than resolve it, the main text uses 'elemental principles,' which can encompass
    rudimentary structures/orderings without explicitly deciding for personal spiritual
    beings. A footnote preserves 'elemental spirits' as a significant alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (Preserve theological
    tension rather than resolve it)'
