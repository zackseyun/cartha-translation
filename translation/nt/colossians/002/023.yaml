theological_decisions:
- issue: Meaning of the difficult final clause οὐκ ἐν τιμῇ τινι πρὸς πλησμονὴν τῆς
    σαρκός
  chosen_reading: The ascetic practices have no real value in restraining fleshly
    indulgence.
  alternative_readings:
  - They are not in any honor, serving only the satisfaction of the flesh.
  - They involve no honor to the body, though aimed at checking fleshly fullness.
  rationale: The Greek is syntactically compressed and widely debated. In context
    Paul is criticizing ascetic regulations as merely seeming wise while lacking power
    against fleshly desires. Rendering the clause as 'of no value against the indulgence
    of the flesh' best fits the argument flow and avoids implying Paul commends bodily
    neglect. The alternatives are preserved in a footnote because the phrase is genuinely
    difficult.
  doctrine_reference: Translation philosophy §3; Contested terms table for σάρξ
