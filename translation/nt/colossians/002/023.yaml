id: COL.2.23
reference: Colossians 2:23
source:
  edition: SBLGNT
  text: ἅτινά ἐστιν λόγον μὲν ἔχοντα σοφίας ἐν ἐθελοθρησκίᾳ καὶ ταπεινοφροσύνῃ καὶ
    ἀφειδίᾳ σώματος, οὐκ ἐν τιμῇ τινι πρὸς πλησμονὴν τῆς σαρκός.
translation:
  text: These indeed have an appearance of wisdom in self-made religion and humility
    and harsh treatment of the body, but they are of no value against the indulgence
    of the flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''have a reputation for wisdom.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'self-imposed worship'; traditionally 'will-worship.'
    reason: lexical_alternative
  - marker: c
    text: 'The final clause is difficult. Or: ''not in any honor, for the satisfaction
      of the flesh,'' or ''of no honor against the indulgence of the flesh.'''
    reason: alternative_reading
  - marker: d
    text: '''Flesh'' may refer here to fallen human desires; compare Paul''s contextual
      use of the term elsewhere.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅτινά
  chosen: These
  alternatives:
  - which things
  - such things
  lexicon: BDAG
  rationale: Refers back to the regulations of v. 21–22. 'These' is natural English
    while preserving the demonstrative/anaphoric force.
- source_word: λόγον μὲν ἔχοντα σοφίας
  chosen: indeed have an appearance of wisdom
  alternatives:
  - indeed have a reputation for wisdom
  - have a word/account of wisdom
  lexicon: BDAG
  rationale: 'The idiom λόγον ἔχειν here means having a reputation, account, or appearance.
    ''Appearance of wisdom'' captures Paul''s concessive tone with μέν: they seem
    wise, though not truly effective.'
- source_word: ἐθελοθρησκίᾳ
  chosen: self-made religion
  alternatives:
  - self-imposed worship
  - will-worship
  lexicon: BDAG
  rationale: A rare term denoting religious practice arising from one's own will rather
    than divine command. 'Self-made religion' is clear modern English and preserves
    the negative nuance.
- source_word: ταπεινοφροσύνῃ
  chosen: humility
  alternatives:
  - self-abasement
  lexicon: BDAG
  rationale: The term normally means humility, though in this context it may be an
    affected or ascetic humility. The simple gloss 'humility' preserves the lexical
    form while the context supplies the irony.
- source_word: ἀφειδίᾳ σώματος
  chosen: harsh treatment of the body
  alternatives:
  - severity to the body
  - unsparing treatment of the body
  - neglect of the body
  lexicon: BDAG
  rationale: ἀφειδία conveys unsparing severity or lack of indulgence. 'Harsh treatment
    of the body' communicates ascetic rigor more idiomatically than the more wooden
    alternatives.
- source_word: οὐκ ἐν τιμῇ τινι
  chosen: they are of no value
  alternatives:
  - not in any honor
  - not in any esteem
  lexicon: BDAG
  rationale: The phrase is difficult, but in context τιμή is best taken in the sense
    of value/benefit rather than honor shown to the body. This yields coherent contrast
    with the preceding apparent wisdom and following failure to restrain fleshly indulgence.
- source_word: πρὸς πλησμονὴν
  chosen: against the indulgence
  alternatives:
  - against the satisfying
  - for the filling/fullness
  lexicon: BDAG
  rationale: πρός here expresses relation or result. πλησμονή denotes fullness/satiation;
    in context of ascetic regulations, 'indulgence' best captures the sense of fleshly
    gratification that these practices fail to check.
- source_word: τῆς σαρκός
  chosen: of the flesh
  alternatives:
  - of the sinful nature
  lexicon: BDAG
  rationale: Following the project's default, σάρξ is rendered 'flesh' unless context
    clearly demands an interpretive expansion. Here Paul likely refers to fallen human
    impulses, but 'flesh' preserves the theological tension without over-resolving
    it.
