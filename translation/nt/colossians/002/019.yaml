theological_decisions:
- issue: Meaning of the genitive in τὴν αὔξησιν τοῦ θεοῦ
  chosen_reading: 'source genitive: the body grows with growth that comes from God'
  alternative_readings:
  - 'possessive genitive: God''s growth'
  - objective/qualitative nuances
  rationale: Within the immediate context, the body derives its life and increase
    from the Head, and ultimately from God. Rendering the phrase as 'growth from God'
    preserves Paul's theology of divine source without implying that God is the one
    who grows.
  doctrine_reference: Translation philosophy §3 (preserve theological tension where
    genuine ambiguity exists)
