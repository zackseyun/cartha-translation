id: COL.2.19
reference: Colossians 2:19
source:
  edition: SBLGNT
  text: καὶ οὐ κρατῶν τὴν κεφαλήν, ἐξ οὗ πᾶν τὸ σῶμα διὰ τῶν ἁφῶν καὶ συνδέσμων ἐπιχορηγούμενον
    καὶ συμβιβαζόμενον αὔξει τὴν αὔξησιν τοῦ θεοῦ.
translation:
  text: and not holding fast to the Head, from whom the whole body, being supplied
    and held together through the joints and ligaments, grows with the growth from
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clinging to the Head.'
    reason: lexical_alternative
  - marker: b
    text: Or 'being nourished and knit together through the joints and ligaments.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'grows the growth of God'; the phrase likely means growth that
      comes from God.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρατῶν
  chosen: holding fast
  alternatives:
  - holding
  - clinging to
  lexicon: BDAG
  rationale: The participle denotes maintaining a firm grasp or adherence, not mere
    physical touching. 'Holding fast' captures the metaphorical force of steadfast
    attachment to the Head better than the flatter 'holding.'
- source_word: κεφαλήν
  chosen: the Head
  alternatives:
  - the head
  lexicon: BDAG
  rationale: Capitalized because in context it refers to Christ as the metaphorical
    source and authority of the body, the church. The lexical sense is 'head'; capitalization
    signals referent in English without changing meaning.
- source_word: ἐξ οὗ
  chosen: from whom
  alternatives:
  - from which
  lexicon: BDAG
  rationale: The relative pronoun is masculine singular, referring back to 'the Head,'
    so 'from whom' is required rather than the impersonal 'from which.'
- source_word: πᾶν τὸ σῶμα
  chosen: the whole body
  alternatives:
  - all the body
  - the entire body
  lexicon: BDAG
  rationale: Idiomatic English for the collective sense of the singular phrase. It
    preserves the image of the church as one body in its entirety.
- source_word: ἁφῶν
  chosen: joints
  alternatives:
  - contacts
  - ligaments
  lexicon: BDAG
  rationale: In this anatomical metaphor, 'joints' is the most natural rendering for
    ἁφαί/ἁφαί as points of connection or contact. It pairs well with 'ligaments' for
    the two-part bodily imagery.
- source_word: συνδέσμων
  chosen: ligaments
  alternatives:
  - bands
  - sinews
  lexicon: BDAG
  rationale: The term denotes that which binds together. 'Ligaments' is clear modern
    English and fits the anatomical metaphor better than the more archaic 'bands'
    or broader 'sinews.'
- source_word: ἐπιχορηγούμενον
  chosen: being supplied
  alternatives:
  - being nourished
  - being provided for
  lexicon: BDAG
  rationale: The passive participle conveys provision or support furnished to the
    body. 'Being supplied' is broad enough to include nourishment and support without
    over-specifying one aspect.
- source_word: συμβιβαζόμενον
  chosen: held together
  alternatives:
  - knit together
  - joined together
  lexicon: BDAG
  rationale: The participle indicates being brought into unity or coherence. 'Held
    together' is natural English and preserves the structural sense; 'knit together'
    is possible but more interpretive and traditional.
- source_word: αὔξει
  chosen: grows
  alternatives:
  - increases
  lexicon: BDAG
  rationale: The verb continues the body metaphor. 'Grows' is the most idiomatic and
    vivid choice in context, whereas 'increases' is more abstract.
- source_word: τὴν αὔξησιν τοῦ θεοῦ
  chosen: with the growth from God
  alternatives:
  - with God's growth
  - with the growth of God
  - with growth given by God
  lexicon: BDAG
  rationale: 'The genitive τοῦ θεοῦ is best taken as source: the growth comes from
    God, not that God himself grows. ''Growth from God'' preserves the compactness
    of the Greek while avoiding the ambiguity of ''God''s growth.'''
