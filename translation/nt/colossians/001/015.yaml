theological_decisions:
- issue: Meaning of πρωτότοκος πάσης κτίσεως in relation to Christ and creation
  chosen_reading: the firstborn over all creation
  alternative_readings:
  - the firstborn of all creation
  rationale: Within historic orthodoxy affirmed in DOCTRINE.md, the translation should
    not suggest that the Son is a created being when the immediate context (vv. 16–17)
    presents him as the agent and goal of all creation. The Greek genitive can be
    understood as subordination/rule, and 'firstborn' in biblical usage often denotes
    status and inheritance rights, not merely temporal origin. Therefore 'over all
    creation' best preserves the sense without flattening πρωτότοκος into a purely
    interpretive gloss like 'supreme.' The traditional alternative is preserved in
    a footnote for auditability.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language);
    Translation philosophy §3 Preserve theological tension rather than resolve it'
