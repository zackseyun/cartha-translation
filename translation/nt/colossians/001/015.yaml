id: COL.1.15
reference: Colossians 1:15
source:
  edition: SBLGNT
  text: ὅς ἐστιν εἰκὼν τοῦ θεοῦ τοῦ ἀοράτου, πρωτότοκος πάσης κτίσεως,
translation:
  text: He is the image of the invisible God, the firstborn over all creation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the firstborn of all creation.' Here 'firstborn' likely
      carries the sense of rank and inheritance, not that the Son is part of creation;
      compare the explanation in the following verses.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅς
  chosen: He
  alternatives:
  - who
  lexicon: BDAG
  rationale: The relative pronoun refers back to the Son in the previous verse. English
    idiom prefers the personal pronoun 'He' at the start of this verbless-style christological
    description rather than 'who is' carried over too woodenly.
- source_word: ἐστιν
  chosen: is
  lexicon: BDAG
  rationale: Simple present copula; no reason to expand or paraphrase.
- source_word: εἰκὼν
  chosen: image
  alternatives:
  - likeness
  - representation
  lexicon: BDAG
  rationale: '''Image'' is the standard and most transparent rendering, preserving
    both representational and revelatory force without over-interpreting the metaphysical
    relation.'
- source_word: τοῦ θεοῦ τοῦ ἀοράτου
  chosen: of the invisible God
  alternatives:
  - of God, the invisible one
  lexicon: BDAG
  rationale: The genitive construction is straightforward. Rendering ἀοράτου as attributive
    ('invisible God') is natural English and preserves the emphasis that God is unseen.
- source_word: πρωτότοκος
  chosen: firstborn
  alternatives:
  - firstborn one
  - preeminent one
  lexicon: BDAG
  rationale: '''Firstborn'' preserves the lexical form and the Old Testament/Jewish
    background of rank and inheritance. Rendering it directly as ''preeminent'' would
    interpret the metaphor rather than translate it. Its nuance of supremacy is better
    explained in rationale/footnote than substituted into the main text.'
- source_word: πάσης κτίσεως
  chosen: over all creation
  alternatives:
  - of all creation
  - over every creature
  lexicon: BDAG
  rationale: The genitive after πρωτότοκος is contested. 'Over all creation' best
    communicates the likely sense of supremacy/rank in context, especially given the
    following verses about creation through and for him, while avoiding the misleading
    implication that the Son is part of creation. The more literal 'of all creation'
    is preserved in a footnote because it is a traditional and grammatically possible
    rendering.
