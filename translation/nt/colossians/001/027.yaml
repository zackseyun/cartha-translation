id: COL.1.27
reference: Colossians 1:27
source:
  edition: SBLGNT
  text: οἷς ἠθέλησεν ὁ θεὸς γνωρίσαι τί τὸ πλοῦτος τῆς δόξης τοῦ μυστηρίου τούτου
    ἐν τοῖς ἔθνεσιν, ⸀ὅ ἐστιν Χριστὸς ἐν ὑμῖν, ἡ ἐλπὶς τῆς δόξης·
translation:
  text: To them God chose to make known what is the riches of the glory of this mystery
    among the Gentiles, which is Christ in you, the hope of glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among you.' The Greek phrase can refer either to Christ's presence among
      the Gentiles as a people or to Christ in believers.
    reason: alternative_reading
  - marker: b
    text: Or 'what is the riches'.
    reason: previous_rendering
lexical_decisions:
- source_word: οἷς
  chosen: To them
  alternatives:
  - to whom
  - among whom
  lexicon: BDAG
  rationale: Dative plural relative pronoun referring back to the saints in the previous
    verse. 'To them' is natural English and fits the infinitive γνωρίσαι ('to make
    known') with an indirect object.
- source_word: ἠθέλησεν
  chosen: chose
  alternatives:
  - willed
  - desired
  - was pleased
  lexicon: BDAG
  rationale: θέλω can denote willing, desiring, or choosing. 'Chose' communicates
    deliberate divine intention in idiomatic English without sounding stilted; 'willed'
    is more formal but less natural here.
- source_word: γνωρίσαι
  chosen: to make known
  alternatives:
  - to reveal
  - to disclose
  lexicon: BDAG
  rationale: γνωρίζω commonly means 'make known.' 'Reveal' is possible, but 'make
    known' more directly reflects the lexical sense and preserves the verbal link
    to disclosure of the mystery.
- source_word: τί τὸ πλοῦτος τῆς δόξης
  chosen: what is the riches of the glory
  alternatives:
  - what are the riches of the glory
  - how great are the glorious riches
  lexicon: BDAG
  rationale: The Greek construction is somewhat compressed. 'What is the riches of
    the glory' stays close to the singular τί with the neuter noun phrase while remaining
    intelligible. 'How great are the glorious riches' is smoother but more interpretive
    and shifts the structure.
- source_word: μυστηρίου
  chosen: mystery
  alternatives:
  - secret
  lexicon: BDAG
  rationale: In Pauline usage μυστήριον is not an unknowable puzzle but a divine purpose
    once hidden and now disclosed. 'Mystery' is the established and accurate rendering;
    'secret' is possible but narrower and less idiomatic in this theological context.
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the Gentiles
  alternatives:
  - among the nations
  - among the Gentile peoples
  lexicon: BDAG
  rationale: ἔθνη in Pauline contexts commonly refers to non-Jews, so 'Gentiles' best
    captures the contextual sense. 'Nations' is more literal but can obscure the Jew/Gentile
    distinction central to the passage.
- source_word: ὅ ἐστιν
  chosen: which is
  alternatives:
  - that is
  - namely
  lexicon: BDAG
  rationale: The relative pronoun introduces an explanatory identification of the
    mystery. 'Which is' is straightforward and preserves the syntax.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title
    rather than a name-like form. Here it identifies the content of the mystery and
    retains strong titular force.
- source_word: ἐν ὑμῖν
  chosen: in you
  alternatives:
  - among you
  lexicon: BDAG
  rationale: The phrase can be read corporately ('among you') or individually/plurally
    ('in you'). 'In you' is the traditional and grammatically direct rendering, preserving
    the theological tension rather than resolving whether Paul means indwelling in
    individuals or presence among the Gentile community.
- source_word: ἡ ἐλπὶς τῆς δόξης
  chosen: the hope of glory
  alternatives:
  - the hope of the glory
  - the hope for glory
  lexicon: BDAG
  rationale: This compact genitive phrase is well represented by 'the hope of glory.'
    'Hope for glory' is possible but slightly more interpretive; retaining 'of' preserves
    the density of Paul's expression.
