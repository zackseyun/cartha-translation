  from: what is the riches
  to: what are the riches
  rationale: The current rendering 'what is the riches' is ungrammatical in contemporary
    English. 'Riches' is a plural noun that requires a plural verb ('are'). While
    the construction follows the singular Greek interrogative pronoun (τί) and has
    precedent in older translations like the KJV, it is jarring and incorrect for
    a modern reader. Changing 'is' to 'are' makes the phrase grammatically correct
    and aligns with standard English usage without altering the meaning.
