theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in this explanatory clause ('which is the
    Messiah in you'), so the default doctrinal guidance favors 'Messiah' rather than
    the more name-like 'Christ.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah''
    where title; ''Christ'' where name-like'
- issue: Sense of ἐν ὑμῖν
  chosen_reading: in you
  alternative_readings:
  - among you
  rationale: The Greek permits either an inward/plural sense or a corporate/community
    sense. The translation keeps the more direct 'in you' in the main text while preserving
    'among you' in a footnote so as not to over-resolve the ambiguity.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
