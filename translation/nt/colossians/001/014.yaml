id: COL.1.14
reference: Colossians 1:14
source:
  edition: SBLGNT
  text: ἐν ᾧ ἔχομεν τὴν ἀπολύτρωσιν, τὴν ἄφεσιν τῶν ἁμαρτιῶν·
translation:
  text: in whom we have redemption, the forgiveness of sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'release' for both 'redemption' and 'forgiveness'; Paul likely uses 'forgiveness
      of sins' to specify what this redemption consists in here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: in whom
  alternatives:
  - in which
  - by whom
  lexicon: BDAG
  rationale: The relative pronoun is masculine singular dative, referring back to
    the beloved Son in the previous verse; 'in whom' preserves the personal and relational
    sense of union/location better than the less likely impersonal 'in which' or instrumental
    'by whom'.
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - we possess
  lexicon: BDAG
  rationale: Present active indicative is best rendered simply as 'we have,' expressing
    present possession of the stated benefit without adding interpretive nuance.
- source_word: ἀπολύτρωσιν
  chosen: redemption
  alternatives:
  - release
  - deliverance
  lexicon: BDAG
  rationale: '''Redemption'' is the standard and theologically weighty rendering for
    ἀπολύτρωσις, preserving the sense of liberation effected at cost. ''Release''
    or ''deliverance'' are possible but flatten the term''s redemptive resonance in
    Pauline usage.'
- source_word: ἄφεσιν
  chosen: forgiveness
  alternatives:
  - release
  - pardon
  lexicon: BDAG
  rationale: Here ἄφεσις is appositional to ἀπολύτρωσις and specifies redemption as
    'the forgiveness.' 'Forgiveness' is the clearest modern English equivalent in
    this moral context; 'release' is too ambiguous and 'pardon' too narrow.
- source_word: τῶν ἁμαρτιῶν
  chosen: of sins
  alternatives:
  - of the sins
  lexicon: BDAG
  rationale: The genitive plural denotes the object/content of forgiveness. English
    idiom normally omits the article here, so 'of sins' is natural while remaining
    faithful.
