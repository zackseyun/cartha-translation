theological_decisions:
- issue: Relationship between 'redemption' and 'forgiveness of sins'
  chosen_reading: 'Render the second noun phrase appositionally: ''redemption, the
    forgiveness of sins.'''
  alternative_readings:
  - Render more interpretively as 'redemption, that is, the forgiveness of sins'
  rationale: The Greek places τὴν ἄφεσιν τῶν ἁμαρτιῶν in apposition to τὴν ἀπολύτρωσιν.
    The translation preserves the theological identification without inserting explanatory
    wording not present in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
