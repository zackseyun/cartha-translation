theological_decisions:
- issue: Implied object of ἀρεσκείαν
  chosen_reading: Keep the phrase implicit as 'for all pleasing' rather than making
    the object explicit ('to please him in every way').
  alternative_readings:
  - to please him in every way
  rationale: The Greek does not state an explicit object, though the Lord is contextually
    implied. Preserving the implicitness avoids adding words not present while still
    allowing the context to supply the referent.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nuance of ἐπίγνωσις
  chosen_reading: Render ἐπίγνωσις as 'knowledge' in the main text.
  alternative_readings:
  - full knowledge
  - true knowledge
  rationale: While ἐπίγνωσις can suggest fuller or more complete knowledge, translating
    it simply as 'knowledge' keeps the English accessible and avoids imposing a technical
    theological distinction unless context requires it. The fuller nuance is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §6, §5
