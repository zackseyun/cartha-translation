theological_decisions:
- issue: Meaning of 'what is lacking in the afflictions of the Messiah'
  chosen_reading: Paul speaks of his own participation in the ongoing sufferings associated
    with the Messiah's people and mission, not of any deficiency in the Messiah's
    atoning death.
  alternative_readings:
  - Paul's sufferings somehow complete Christ's redemptive sufferings
  - Paul refers only to a fixed quota of end-time messianic woes
  rationale: The wording must preserve the text's strong expression without importing
    the idea that Christ's atoning work was insufficient. The use of θλίψεις ('afflictions')
    rather than terms more directly tied to atonement, together with the phrase 'for
    the sake of his body, which is the church,' supports an ecclesial/ministerial
    participation in messianic suffering. The translation therefore keeps the literal
    tension in the main text and explains the doctrinal guardrail here rather than
    softening the verse.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where title
    is in view. This preserves the titular force and Jewish messianic context in Paul's
    language.
  doctrine_reference: 'Contested terms: Χριστός'
