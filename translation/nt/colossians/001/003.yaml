theological_decisions:
- issue: Rendering Χριστός in Pauline salutation/thanksgiving context
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate Χριστός as 'Messiah' where the titular
    force is still active. Although 'Jesus Christ' is deeply traditional, this verse
    does not require treating Χριστός as merely a surname-like proper name. Rendering
    it 'Messiah' preserves the title's meaning without altering orthodox Christology.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός → Messiah where
    title; Christ where name-like)'
