id: COL.1.3
reference: Colossians 1:3
source:
  edition: SBLGNT
  text: Εὐχαριστοῦμεν τῷ ⸀θεῷ πατρὶ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ πάντοτε ⸀περὶ ὑμῶν
    προσευχόμενοι,
translation:
  text: We always give thanks to God, the Father of our Lord Jesus the Messiah, as
    we pray for you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'Jesus Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: Εὐχαριστοῦμεν
  chosen: We give thanks
  alternatives:
  - We thank
  lexicon: BDAG
  rationale: The verb commonly means 'to express gratitude/thanks.' 'Give thanks'
    is the more natural English equivalent in epistolary thanksgiving contexts and
    preserves the formal sense better than the flatter 'thank.'
- source_word: θεῷ πατρὶ
  chosen: to God, the Father
  alternatives:
  - to God the Father
  - to the God and Father
  lexicon: BDAG
  rationale: 'The two datives are in apposition: ''to God, the Father.'' The comma
    clarifies apposition in English. ''The God and Father'' is possible in some contexts,
    but here the anarthrous πατρί after articular θεῷ is most naturally read appositionally
    rather than as a coordinated pair.'
- source_word: κυρίου
  chosen: Lord
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This is the standard
    title here and fits both Pauline usage and the immediate genitival construction.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: 'Per doctrine defaults, Χριστός is translated ''Messiah'' where it functions
    as a title rather than a fixed name-like element. In this opening thanksgiving,
    the titular sense remains transparent: ''our Lord Jesus Messiah.'' The traditional
    ''Jesus Christ'' is preserved as an alternative.'
- source_word: πάντοτε
  chosen: always
  alternatives:
  - at all times
  lexicon: BDAG
  rationale: πάντοτε straightforwardly means 'always.' It modifies the main thanksgiving
    and is retained in a natural English position before 'give thanks.'
- source_word: περὶ ὑμῶν
  chosen: for you
  alternatives:
  - concerning you
  - about you
  lexicon: BDAG
  rationale: With prayer language, περί + genitive is idiomatically rendered 'for'
    in English. This best conveys intercessory reference rather than mere topic.
- source_word: προσευχόμενοι
  chosen: as we pray
  alternatives:
  - praying
  - while praying
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb and explains
    the circumstance of thanksgiving. 'As we pray' gives smooth modern English while
    preserving the temporal/circumstantial force. 'Praying' would also be possible
    but is slightly less natural in this sentence.
