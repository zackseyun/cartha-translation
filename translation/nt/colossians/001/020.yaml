id: COL.1.20
reference: Colossians 1:20
source:
  edition: SBLGNT
  text: καὶ δι’ αὐτοῦ ἀποκαταλλάξαι τὰ πάντα εἰς αὐτόν, εἰρηνοποιήσας διὰ τοῦ αἵματος
    τοῦ σταυροῦ αὐτοῦ, ⸂[δι’ αὐτοῦ]⸃ εἴτε τὰ ἐπὶ τῆς γῆς εἴτε τὰ ⸀ἐν τοῖς οὐρανοῖς·
translation:
  text: and through him to reconcile all things to himself, having made peace through
    the blood of his cross—through him—whether the things on the earth or the things
    in the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by him' for both occurrences of 'through him.'
    reason: lexical_alternative
  - marker: b
    text: '''All things'' here is left broad, matching the Greek and the following
      phrase ''whether the things on the earth or the things in the heavens''; the
      verse itself does not specify how this reconciliation relates to final salvation.'
    reason: alternative_reading
  - marker: c
    text: Greek 'in the heavens' is plural.
    reason: lexical_alternative
  - marker: d
    text: Some manuscripts omit the second 'through him.'
    reason: textual_variant
lexical_decisions:
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by him
  lexicon: BDAG
  rationale: διά with the genitive normally expresses means or agency. 'Through him'
    is idiomatic and preserves the mediatorial force in the hymn's repeated emphasis
    on the Son as the agent of creation and reconciliation.
- source_word: ἀποκαταλλάξαι
  chosen: to reconcile
  alternatives:
  - to reconcile completely
  - to restore to favor
  lexicon: BDAG
  rationale: The infinitive denotes reconciliation/restoration of relationship. The
    compound prefix ἀπο- may intensify, but English 'reconcile' adequately carries
    the sense without overtranslation. 'Completely reconcile' would be interpretive.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  - the whole universe
  lexicon: BDAG
  rationale: A comprehensive neuter plural expression common in Pauline usage. 'All
    things' preserves the breadth and intertextual resonance with the surrounding
    context (especially vv. 16–17) better than the more colloquial 'everything.'
- source_word: εἰς αὐτόν
  chosen: to himself
  alternatives:
  - to him
  lexicon: BDAG
  rationale: 'Given the subject implied from v. 19 is God, and the English clause
    naturally requires reflexive clarity, ''to himself'' makes explicit the reflexive
    sense in context: God reconciling all things to himself through the Son.'
- source_word: εἰρηνοποιήσας
  chosen: having made peace
  alternatives:
  - making peace
  - having established peace
  lexicon: BDAG
  rationale: The aorist participle is best rendered as antecedent or attendant to
    the infinitive's action. 'Having made peace' is natural English and preserves
    the causal/instrumental nuance without flattening it into a finite verb.
- source_word: διὰ τοῦ αἵματος
  chosen: through the blood
  alternatives:
  - by the blood
  lexicon: BDAG
  rationale: διά again marks means. 'Blood' is retained literally because it is theologically
    and sacrificially significant; it should not be paraphrased away as merely 'death.'
- source_word: τοῦ σταυροῦ αὐτοῦ
  chosen: of his cross
  alternatives:
  - of the cross
  lexicon: BDAG
  rationale: The genitive with possessive pronoun is explicit in Greek. 'His cross'
    preserves the personal reference to Messiah's crucifixion rather than making the
    cross an abstract symbol.
- source_word: ⸂[δι’ αὐτοῦ]⸃
  chosen: through him
  alternatives:
  - by him
  lexicon: NA28/SBLGNT textual tradition
  rationale: The bracketed phrase is likely original enough to retain in translation,
    and its repetition is rhetorically emphatic. It is represented with em dashes
    to reflect the resumptive emphasis in English.
- source_word: εἴτε ... εἴτε
  chosen: whether ... or
  alternatives:
  - whether ... whether
  lexicon: BDAG
  rationale: This correlative construction is most natural in English as 'whether
    ... or,' while preserving the exhaustive pairing.
- source_word: τὰ ἐπὶ τῆς γῆς
  chosen: the things on the earth
  alternatives:
  - things on earth
  - what is on the earth
  lexicon: BDAG
  rationale: The article is retained for balance with the following phrase and to
    mirror the cosmic scope of the Greek. 'Earth' rather than 'land' fits the cosmological
    contrast with 'heavens.'
- source_word: τὰ ἐν τοῖς οὐρανοῖς
  chosen: the things in the heavens
  alternatives:
  - things in heaven
  - the heavenly things
  lexicon: BDAG
  rationale: The plural οὐρανοῖς is preserved as 'the heavens' rather than flattened
    to singular 'heaven.' This better reflects the Greek form and biblical cosmological
    idiom.
