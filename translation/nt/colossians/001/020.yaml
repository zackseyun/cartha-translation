theological_decisions:
- issue: Scope of reconciliation in τὰ πάντα
  chosen_reading: Rendered comprehensively as 'all things' without narrowing the referent
    or importing a doctrine of universal salvation.
  alternative_readings:
  - all people
  - the whole universe reconciled salvifically
  rationale: The text speaks of cosmic reconciliation in the context of creation ('things
    on earth' and 'things in the heavens'). The translation should preserve that breadth
    while not resolving the theological question of how this reconciliation relates
    to final salvation for personal beings. This follows the doctrine principle of
    preserving theological tension rather than resolving it beyond the text.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Referent of 'himself' in εἰς αὐτόν
  chosen_reading: Understood as God reconciling all things to himself through the
    Son.
  alternative_readings:
  - Messiah reconciling all things to himself
  rationale: The syntax continues the purpose clause from v. 19, where God's fullness
    was pleased to dwell in the Son; thus the most likely referent is God. English
    'himself' clarifies the reflexive relation without making an explicit theological
    claim beyond the immediate syntax.
  doctrine_reference: Affirmations; Translation philosophy optimal equivalence
- issue: Meaning of 'blood of his cross'
  chosen_reading: Retained as concrete sacrificial and crucifixion language.
  alternative_readings:
  - his death on the cross
  rationale: The Greek explicitly says 'blood' and 'cross.' Rendering both literally
    preserves the atoning and historical force of the text without importing a narrower
    theory of atonement.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition
