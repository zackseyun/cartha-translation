id: COL.1.11
reference: Colossians 1:11
source:
  edition: SBLGNT
  text: ἐν πάσῃ δυνάμει δυναμούμενοι κατὰ τὸ κράτος τῆς δόξης αὐτοῦ εἰς πᾶσαν ὑπομονὴν
    καὶ μακροθυμίαν μετὰ χαρᾶς,
translation:
  text: being strengthened with all power, according to the might of his glory, for
    all endurance and patience with joy,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to his glorious power.' The Greek more literally reads 'according
      to the might of his glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πάσῃ δυνάμει
  chosen: with all power
  alternatives:
  - in all power
  - by all power
  lexicon: BDAG
  rationale: The preposition ἐν with the dative here is instrumental/spherical. 'With
    all power' is natural English and preserves the sense that believers are being
    empowered comprehensively. 'In all power' is more literal but less idiomatic in
    this context.
- source_word: δυναμούμενοι
  chosen: being strengthened
  alternatives:
  - being empowered
  - being made strong
  lexicon: BDAG
  rationale: 'The present passive participle is best rendered as an ongoing passive
    process: God is the implied agent strengthening them. ''Being strengthened'' is
    idiomatic and fits the prayer context. ''Being empowered'' is possible but can
    sound more modern/technical than the Greek requires.'
- source_word: κατὰ τὸ κράτος
  chosen: according to the might
  alternatives:
  - according to the power
  - in keeping with the strength
  lexicon: BDAG
  rationale: 'κατά with the accusative here expresses standard or measure: the strengthening
    corresponds to, or is in proportion to, God''s mighty power. κράτος often denotes
    manifested strength/might; ''might'' distinguishes it from δύναμις earlier in
    the verse and preserves Paul''s piling up of power terms.'
- source_word: τῆς δόξης αὐτοῦ
  chosen: of his glory
  alternatives:
  - of his glorious power
  - of his majesty
  lexicon: BDAG
  rationale: A formally closer rendering preserves the genitive construction and avoids
    collapsing δόξα into an adjectival paraphrase. While many English versions smooth
    this to 'his glorious power,' the Greek more directly says 'the might of his glory,'
    emphasizing glory as the source/quality associated with that might.
- source_word: εἰς πᾶσαν ὑπομονὴν
  chosen: for all endurance
  alternatives:
  - unto all endurance
  - resulting in every kind of endurance
  lexicon: BDAG
  rationale: εἰς marks purpose/result. 'For all endurance' is concise and natural,
    preserving the comprehensive force of πᾶσαν. ὑπομονή commonly denotes steadfast
    endurance under trial.
- source_word: μακροθυμίαν
  chosen: patience
  alternatives:
  - longsuffering
  - forbearance
  lexicon: BDAG
  rationale: 'μακροθυμία overlaps with patience/forbearance, often especially toward
    people. ''Patience'' is accessible modern English; ''longsuffering'' is traditional
    but archaic. The pairing with ὑπομονή is preserved by using two distinct but related
    English terms: ''endurance and patience.'''
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - joyfully
  - with rejoicing
  lexicon: BDAG
  rationale: The prepositional phrase is straightforwardly rendered 'with joy.' This
    keeps the noun χαρά explicit and allows the phrase to modify the endurance/patience
    naturally without overinterpreting its exact syntactic attachment.
