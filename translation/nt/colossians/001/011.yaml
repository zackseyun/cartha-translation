theological_decisions:
- issue: Relation of divine empowerment to God's attributes
  chosen_reading: The text speaks of believers being strengthened in a manner corresponding
    to the might associated with God's glory, without expanding this into a doctrinal
    paraphrase.
  alternative_readings:
  - according to his glorious power
  rationale: The translation preserves Paul's dense wording and avoids importing explanatory
    language not present in the Greek. This maintains theological weight while staying
    close to the source.
  doctrine_reference: Translation philosophy §1, §3, §6
