id: COL.1.21
reference: Colossians 1:21
source:
  edition: SBLGNT
  text: καὶ ὑμᾶς ποτε ὄντας ἀπηλλοτριωμένους καὶ ἐχθροὺς τῇ διανοίᾳ ἐν τοῖς ἔργοις
    τοῖς πονηροῖς—
translation:
  text: And you, who once were alienated and hostile in mind, doing evil deeds—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enemies in mind in evil deeds.' The Greek is compact and may be rendered
      more literally, but the main text expresses the sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποτε
  chosen: once
  alternatives:
  - formerly
  - at one time
  lexicon: BDAG
  rationale: Temporal adverb marking the readers’ former state. 'Once' is concise
    and idiomatic in English while preserving the contrast with their present reconciled
    state in the following verse.
- source_word: ὄντας
  chosen: who once were
  alternatives:
  - being
  - while being
  lexicon: BDAG
  rationale: The participle is carried into natural English with a relative clause.
    This preserves the descriptive force without woodenly reproducing Greek participial
    structure.
- source_word: ἀπηλλοτριωμένους
  chosen: alienated
  alternatives:
  - estranged
  - excluded
  lexicon: BDAG
  rationale: The perfect/passive participial sense indicates a state of separation.
    'Alienated' best captures relational estrangement from God in Pauline usage and
    is standard, clear English.
- source_word: ἐχθροὺς
  chosen: hostile
  alternatives:
  - enemies
  lexicon: BDAG
  rationale: 'Although literally ''enemies,'' the phrase with dative ''τῇ διανοίᾳ''
    is most naturally rendered as an adjectival description of inward hostility: ''hostile
    in mind.'' This avoids awkward English (''enemies in mind'') while preserving
    the sense.'
- source_word: τῇ διανοίᾳ
  chosen: in mind
  alternatives:
  - in your mind
  - in understanding
  - in thought
  lexicon: BDAG
  rationale: The dative expresses sphere or respect. 'In mind' is concise and idiomatic;
    the possessive 'your' is implied by the address to 'you' and need not be repeated.
- source_word: ἐν τοῖς ἔργοις τοῖς πονηροῖς
  chosen: doing evil deeds
  alternatives:
  - in evil deeds
  - by evil deeds
  - in your evil works
  lexicon: BDAG
  rationale: A very literal rendering would be 'in evil deeds/works,' but in English
    this can sound opaque. The phrase likely expresses the sphere or manifestation
    of their hostility, so 'doing evil deeds' makes the relation clear while staying
    close to the Greek.
- source_word: ἔργοις
  chosen: deeds
  alternatives:
  - works
  lexicon: BDAG
  rationale: '''Deeds'' is more natural in contemporary English here than ''works''
    and avoids possible theological overtones associated with Pauline discussions
    of ''works'' in other contexts.'
- source_word: πονηροῖς
  chosen: evil
  alternatives:
  - wicked
  lexicon: BDAG
  rationale: '''Evil'' is the most direct and natural gloss, preserving the moral
    force without sounding archaic.'
- source_word: καὶ ὑμᾶς
  chosen: And you,
  alternatives:
  - You also,
  - And as for you,
  lexicon: BDAG
  rationale: This continues the sentence from the prior verse and marks the readers
    as included in the scope of Christ’s reconciling work. 'And you,' preserves the
    connective force and discourse flow.
