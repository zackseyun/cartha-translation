id: COL.1.2
reference: Colossians 1:2
source:
  edition: SBLGNT
  text: τοῖς ἐν ⸀Κολοσσαῖς ἁγίοις καὶ πιστοῖς ἀδελφοῖς ἐν Χριστῷ· χάρις ὑμῖν καὶ εἰρήνη
    ἀπὸ θεοῦ πατρὸς ⸀ἡμῶν.
translation:
  text: 'To the holy and faithful brothers in Messiah at Colossae: grace to you and
    peace from God our Father.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'believing'; the Greek πιστοῖς can describe those who believe or those
      who are faithful.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' is the Greek wording; in context Paul likely addresses the
      whole community, including women.'
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''in Christ.'' The Greek title Χριστός means ''Messiah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: τοῖς ἐν Κολοσσαῖς
  chosen: to ... at Colossae
  alternatives:
  - in Colossae
  lexicon: BDAG
  rationale: The dative article with ἐν plus place name identifies the recipients
    by location. English idiom can use either 'in' or 'at'; 'at Colossae' reads naturally
    in an address line while preserving the locative sense.
- source_word: ἁγίοις
  chosen: holy
  alternatives:
  - saints
  lexicon: BDAG
  rationale: ἅγιος here functions adjectivally with ἀδελφοῖς. 'Holy' preserves the
    basic lexical sense and avoids importing later ecclesiastical overtones often
    associated with 'saints,' while still conveying consecration to God.
- source_word: πιστοῖς
  chosen: faithful
  alternatives:
  - believing
  lexicon: BDAG
  rationale: πιστός can denote either trust/belief or faithfulness. In this epistolary
    address, 'faithful' naturally describes the brothers' character and allegiance.
    The alternative 'believing' is possible and worth preserving in a footnote because
    the Greek can encompass both senses.
- source_word: ἀδελφοῖς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per the translation philosophy's gender-accurate principle, the grammatically
    masculine plural is rendered 'brothers.' In Pauline addresses this often has mixed-gender
    reference, so an inclusive alternative is preserved in a footnote rather than
    replacing the source-shaped wording in the main text.
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: 'Χριστός is a title here rather than a name-like form, so the doctrinal
    default applies: translate as ''Messiah.'' ''In Messiah'' preserves Paul''s union-with-Christ
    language while retaining the title''s meaning.'
- source_word: χάρις ὑμῖν καὶ εἰρήνη
  chosen: grace to you and peace
  alternatives:
  - grace and peace to you
  lexicon: BDAG
  rationale: This is Paul's standard greeting formula. 'Grace to you and peace' follows
    the Greek order closely while remaining natural English.
- source_word: ἀπὸ θεοῦ πατρὸς ἡμῶν
  chosen: from God our Father
  alternatives:
  - from our God and Father
  lexicon: BDAG
  rationale: 'The genitive construction is most naturally read as appositional: ''God
    our Father.'' This is the standard sense in Pauline greetings and avoids adding
    a conjunction not present in the Greek.'
