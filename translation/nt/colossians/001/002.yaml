theological_decisions:
- issue: Rendering Χριστῷ in the phrase ἐν Χριστῷ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where it
    functions as a title. In this greeting formula the titular sense remains clear,
    so 'Messiah' is preferred while the traditional 'Christ' is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Gendered language in ἀδελφοῖς
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek is grammatically masculine plural. Per the gender-accurate
    policy, the main text should reflect that form. Because the referent likely includes
    women in the congregation, an explanatory footnote preserves that contextual inclusivity
    without flattening the source wording.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Semantic nuance of πιστοῖς
  chosen_reading: faithful
  alternative_readings:
  - believing
  rationale: The adjective can denote either faithfulness or belief. The verse does
    not force a sharp distinction, so the main text uses 'faithful' as a natural descriptor,
    with 'believing' preserved in a footnote to maintain the lexical tension rather
    than over-resolve it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
