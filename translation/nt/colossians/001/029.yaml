theological_decisions:
- issue: Referent of αὐτοῦ ('his')
  chosen_reading: Retain the pronoun 'his' without specifying whether the antecedent
    is God or Messiah.
  alternative_readings:
  - God's working
  - the Messiah's working
  rationale: The immediate verse does not explicitly name the antecedent, and context
    in Colossians allows readers to trace the empowering source without the translation
    resolving the referent more narrowly than the Greek does. This preserves theological
    tension rather than importing an interpretive decision into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
