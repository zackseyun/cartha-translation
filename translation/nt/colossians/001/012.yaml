theological_decisions:
- issue: Textual variant in the object pronoun
  chosen_reading: you
  alternative_readings:
  - us
  rationale: The provided Greek text reads ὑμᾶς ('you'), which is followed in the
    main text. Because ἡμᾶς ('us') is a notable variant reflected in some manuscripts
    and translations, it is preserved in a footnote rather than silently ignored.
  doctrine_reference: Translation philosophy §3 (preserve theological tension/alternatives
    where relevant)
