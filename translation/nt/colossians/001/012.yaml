id: COL.1.12
reference: Colossians 1:12
source:
  edition: SBLGNT
  text: εὐχαριστοῦντες τῷ πατρὶ τῷ ἱκανώσαντι ⸀ὑμᾶς εἰς τὴν μερίδα τοῦ κλήρου τῶν
    ἁγίων ἐν τῷ φωτί,
translation:
  text: giving thanks to the Father, who has qualified you for the share of the inheritance
    of the saints in the light,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'us' instead of 'you.'
    reason: textual_variant
  - marker: b
    text: Or 'the portion allotted to the saints in the light'; the Greek evokes the
      imagery of an allotted inheritance.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχαριστοῦντες
  chosen: giving thanks
  alternatives:
  - thanking
  lexicon: BDAG
  rationale: Present active participle, nominative plural, continuing the flow from
    the preceding exhortation. 'Giving thanks' is idiomatic modern English and preserves
    the durative participial sense better than a finite verb here.
- source_word: τῷ πατρὶ
  chosen: to the Father
  alternatives:
  - to God the Father
  lexicon: BDAG
  rationale: The Greek explicitly says 'to the Father.' Adding 'God' would clarify
    but goes beyond the wording of this verse. The article supports the definite relational
    title.
- source_word: ἱκανώσαντι
  chosen: who has qualified
  alternatives:
  - who made fit
  - who enabled
  lexicon: BDAG
  rationale: Aorist active participle from ἱκανόω, meaning to make sufficient/fit/qualified.
    'Has qualified' is natural in English and fits the salvation/inheritance context
    without implying mere permission.
- source_word: ὑμᾶς
  chosen: you
  alternatives:
  - us
  lexicon: NA28/SBLGNT textual tradition
  rationale: The SBLGNT reading is ὑμᾶς ('you'). A well-known variant reads ἡμᾶς ('us').
    The main text follows the provided source text; the alternative is preserved in
    a footnote as a textual variant.
- source_word: εἰς τὴν μερίδα
  chosen: for the share
  alternatives:
  - for a share
  - for the portion
  lexicon: BDAG
  rationale: μερίς denotes a share or portion. 'For the share' reflects εἰς with result/purpose
    nuance and keeps the imagery of allotted participation.
- source_word: τοῦ κλήρου
  chosen: of the inheritance
  alternatives:
  - of the lot
  - of the allotted portion
  lexicon: BDAG
  rationale: κλῆρος can denote lot, share, or inheritance. In this context with saints
    and eschatological blessing, 'inheritance' best communicates the sense in clear
    English while preserving the OT-allotment background.
- source_word: τῶν ἁγίων
  chosen: of the saints
  alternatives:
  - of the holy ones
  - of God's holy people
  lexicon: BDAG
  rationale: ἅγιοι in Pauline usage commonly refers to God's consecrated people. 'Saints'
    is concise and traditional, while still understandable in context. Alternatives
    are possible, but this best preserves the lexical link.
- source_word: ἐν τῷ φωτί
  chosen: in the light
  alternatives:
  - in light
  lexicon: BDAG
  rationale: The phrase is best taken as modifying the inheritance/share belonging
    to the saints, characterizing the sphere of that inheritance. 'In the light' preserves
    the metaphorical and theological resonance without over-interpreting it.
