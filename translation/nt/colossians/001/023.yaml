theological_decisions:
- issue: Conditional force of εἴ γε in relation to perseverance
  chosen_reading: Render as a real conditional ('if indeed you continue') without
    importing a full doctrinal conclusion about apostasy or guaranteed perseverance.
  alternative_readings:
  - since indeed you continue
  - provided that you continue in a way that implies possible loss of salvation
  rationale: The Greek presents a condition tied to continuing in faith, but the verse
    itself does not settle broader theological debates between traditions. The translation
    preserves the tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of πίστις in τῇ πίστει
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: DOCTRINE.md specifies 'faith' as the default rendering of πίστις, with
    alternatives preserved where contested. This context is not a major pistis-contested
    construction like pistis Christou, so the main text uses 'faith.'
  doctrine_reference: 'Contested terms table: πίστις → faith'
