id: COL.1.22
reference: Colossians 1:22
source:
  edition: SBLGNT
  text: νυνὶ δὲ ⸀ἀποκατηλλάγητε ἐν τῷ σώματι τῆς σαρκὸς αὐτοῦ διὰ τοῦ θανάτου— παραστῆσαι
    ὑμᾶς ἁγίους καὶ ἀμώμους καὶ ἀνεγκλήτους κατενώπιον αὐτοῦ,
translation:
  text: But now he has reconciled you in his body of flesh through death, to present
    you holy and blameless and beyond accusation before him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have been reconciled.' The Greek verb is passive.
    reason: alternative_reading
  - marker: b
    text: '''Blameless'' can also be rendered ''without blemish,'' preserving the
      sacrificial nuance of the Greek term.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  chosen: But now
  alternatives:
  - Now, however
  - But as it is now
  lexicon: BDAG
  rationale: Captures the adversative transition from the prior state in v. 21 to
    the present reconciled state. 'But now' is idiomatic and preserves the contrastive
    force of δέ with the temporal νυνί.
- source_word: ἀποκατηλλάγητε
  chosen: he has reconciled you
  alternatives:
  - you have been reconciled
  - you were reconciled
  lexicon: BDAG
  rationale: The form is aorist passive indicative, 2nd plural. In context, English
    active with implied divine subject ('he') is clearer and reflects the immediately
    preceding subject in v. 21–22 context, while preserving the passive sense semantically.
    'Has reconciled' conveys the completed act with present relevance in natural English.
- source_word: ἐν τῷ σώματι τῆς σαρκὸς αὐτοῦ
  chosen: in his body of flesh
  alternatives:
  - in the body of his flesh
  - in his fleshly body
  lexicon: BDAG
  rationale: Retains the concrete, embodied emphasis of the Greek. 'Body of flesh'
    is slightly more literal than 'fleshly body' and avoids suggesting sinfulness;
    here σάρξ is literal/physical, not metaphorical 'sinful nature.'
- source_word: σώματι
  chosen: body
  alternatives:
  - physical body
  lexicon: BDAG
  rationale: Standard gloss. The surrounding genitive phrase already clarifies physicality,
    so 'physical body' would over-interpret.
- source_word: σαρκὸς
  chosen: flesh
  alternatives:
  - human flesh
  lexicon: BDAG
  rationale: Per doctrine defaults, σάρξ is rendered 'flesh' in literal contexts.
    Here it underscores Messiah's real embodied humanity and death, not a metaphorical
    moral sphere.
- source_word: διὰ τοῦ θανάτου
  chosen: through death
  alternatives:
  - by means of his death
  lexicon: BDAG
  rationale: A natural rendering of διά with the genitive indicating means/instrumentality.
    'Through death' is concise and preserves the solemnity of the phrase.
- source_word: παραστῆσαι
  chosen: to present
  alternatives:
  - to bring before
  - to cause to stand before
  lexicon: BDAG
  rationale: Infinitive of purpose/result following the reconciliation statement.
    'To present' is standard in sacrificial/judicial contexts and fits the following
    adjectives and prepositional phrase.
- source_word: ἁγίους
  chosen: holy
  alternatives:
  - set apart
  - saintly
  lexicon: BDAG
  rationale: '''Holy'' is the established and contextually appropriate rendering,
    preserving both consecration and moral purity without paraphrase.'
- source_word: ἀμώμους
  chosen: blameless
  alternatives:
  - without blemish
  - unblemished
  lexicon: BDAG
  rationale: The term can evoke sacrificial 'without blemish,' but in this context
    paired with judicial language it is best rendered 'blameless' in the main text.
    The sacrificial nuance is worth preserving in a footnote.
- source_word: ἀνεγκλήτους
  chosen: beyond accusation
  alternatives:
  - irreproachable
  - unaccused
  - above reproach
  lexicon: BDAG
  rationale: This term carries a forensic sense of not being open to charge. 'Beyond
    accusation' makes that legal nuance clearer than the more idiomatic but broader
    'above reproach.'
- source_word: κατενώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  lexicon: BDAG
  rationale: A straightforward rendering. 'Before him' preserves the relational and
    evaluative setting without over-specifying whether the referent is God or Christ;
    the Greek pronoun remains as given.
