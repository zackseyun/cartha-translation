theological_decisions:
- issue: Agency in the passive verb ἀποκατηλλάγητε
  chosen_reading: 'Render with explicit subject in English: ''he has reconciled you'''
  alternative_readings:
  - 'retain formal passive: ''you have been reconciled'''
  rationale: The Greek passive leaves the agent implicit, but the immediate context
    supplies God as the acting subject. Making the subject explicit improves English
    readability without altering the theology of divine initiative. This does not
    resolve a doctrinal dispute so much as an English syntactic necessity.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (original-language
    primacy)
- issue: Meaning of σάρξ in 'body of flesh'
  chosen_reading: 'Literal physical sense: ''flesh'''
  alternative_readings:
  - metaphorical 'sinful nature'
  rationale: The phrase emphasizes the real embodied humanity in which reconciliation
    was accomplished through death. Rendering σάρξ as 'sinful nature' here would import
    a Pauline theological category not warranted by this immediate context.
  doctrine_reference: 'Contested terms table: σάρξ = ''flesh'' (literal) / ''sinful
    nature'' (metaphorical), context-dependent'
- issue: Nuance of ἀμώμους and ἀνεγκλήτους
  chosen_reading: Use 'blameless' and 'beyond accusation' to preserve distinct sacrificial
    and forensic-adjacent nuances
  alternative_readings:
  - '''without blemish and above reproach'''
  rationale: The cluster likely combines holiness, sacrificial acceptability, and
    legal irreproachability. The chosen wording keeps the terms distinct in English
    rather than flattening them into near-synonyms.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
