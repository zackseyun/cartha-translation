theological_decisions:
- issue: Rendering of σύνδουλος / δοῦλος language
  chosen_reading: fellow slave
  alternative_readings:
  - fellow servant
  - fellow bondservant
  rationale: The verse presents Epaphras as sharing the same master with Paul and
    his coworkers. Because the bonded relation is part of the image, 'fellow slave'
    best preserves the force of the Greek while remaining understandable in modern
    English.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In 'διάκονος τοῦ Χριστοῦ' the term functions as a title identifying the
    one served. Translating it as 'Messiah' preserves the semantic content of Χριστός
    in line with project policy.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
- issue: Sense of ὑπὲρ ἡμῶν
  chosen_reading: on our behalf
  alternative_readings:
  - for us
  rationale: The phrase most naturally indicates representation/benefit in relation
    to Paul and his companions. 'On our behalf' preserves that nuance without making
    a stronger theological claim than the text itself.
