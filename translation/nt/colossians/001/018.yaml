theological_decisions:
- issue: Meaning of κεφαλή in Christ-body metaphor
  chosen_reading: Retain the metaphor as 'head' without specifying 'authority over'
    or 'source of.'
  alternative_readings:
  - leader/authority over the body
  - source/origin of the body
  rationale: The verse uses a rich metaphor that has generated theological debate.
    Translating simply as 'head' preserves the inspired image and avoids resolving
    a contested interpretive question beyond what the Greek explicitly states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of ἀρχή in relation to resurrection and new creation
  chosen_reading: '''beginning'''
  alternative_readings:
  - ruler
  - origin
  rationale: In this immediate context, 'firstborn from the dead' explains or parallels
    'beginning,' pointing to Christ as the inaugurator of resurrection life. This
    rendering preserves the christological claim without forcing a narrower metaphysical
    reading.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension where ambiguity remains.
- issue: Force of πρωτότοκος ἐκ τῶν νεκρῶν
  chosen_reading: Retain 'firstborn from the dead' as resurrection-preeminence language
  alternative_readings:
  - first to rise from the dead
  - firstborn over the dead
  rationale: The phrase speaks of Christ's primacy in resurrection, not creatureliness.
    Keeping 'firstborn' preserves biblical intertextual resonance and allows the following
    clause to state his preeminence explicitly.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language);
    preserve lexical form unless context demands otherwise.'
