id: COL.1.18
reference: Colossians 1:18
source:
  edition: SBLGNT
  text: καὶ αὐτός ἐστιν ἡ κεφαλὴ τοῦ σώματος τῆς ἐκκλησίας· ὅς ⸀ἐστιν ἀρχή, πρωτότοκος
    ἐκ τῶν νεκρῶν, ἵνα γένηται ἐν πᾶσιν αὐτὸς πρωτεύων,
translation:
  text: And he is the head of the body, the church; he is the beginning, the firstborn
    from the dead, so that he himself might become preeminent in all things,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the origin' or 'the ruler' for 'the beginning' (ἀρχή).
    reason: lexical_alternative
  - marker: b
    text: Or 'having first place in everything' for 'preeminent in all things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτός
  chosen: he / he himself
  alternatives:
  - he himself (first occurrence)
  - himself
  lexicon: BDAG
  rationale: The pronoun is emphatic. In the first clause, simple 'he' is sufficient
    in English because the emphasis is carried by word order and context; in the final
    clause, 'he himself' preserves the explicit emphasis more naturally.
- source_word: κεφαλή
  chosen: head
  alternatives:
  - source
  - leader
  lexicon: BDAG
  rationale: '''Head'' is the direct lexical equivalent and preserves the metaphor
    without narrowing it to only authority or only source. This keeps the Pauline
    image intact and avoids importing a debated interpretive gloss.'
- source_word: σώματος
  chosen: body
  lexicon: BDAG
  rationale: Standard rendering of the metaphorical corporate body; paired with 'head'
    to preserve the image.
- source_word: ἐκκλησίας
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: '''Church'' is the established and contextually appropriate rendering
    in Pauline usage here, referring to the people of God as Christ''s body. ''Assembly''
    is lexically possible but too narrow in this christological context.'
- source_word: ἀρχή
  chosen: beginning
  alternatives:
  - origin
  - ruler
  - first cause
  lexicon: BDAG
  rationale: '''Beginning'' best fits the immediate context with ''firstborn from
    the dead,'' emphasizing Christ as the inaugurator of the new creation/resurrection
    order. ''Ruler'' is possible lexically but is less likely here given the appositional
    sequence.'
- source_word: πρωτότοκος
  chosen: firstborn
  alternatives:
  - first to be born
  - preeminent one
  lexicon: BDAG
  rationale: '''Firstborn'' preserves the lexical form and its biblical-theological
    resonance. The term can imply rank as well as sequence, but that nuance is better
    expressed by the following ''preeminent'' rather than replacing the word here.'
- source_word: ἐκ τῶν νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: Idiomatic English for resurrection language. 'Out from among the dead'
    is more formally explicit but less natural.
- source_word: ἵνα γένηται
  chosen: so that he himself might become
  alternatives:
  - in order that he might be
  - so that he might come to be
  lexicon: BDAG
  rationale: The ἵνα clause expresses purpose/result. 'Might become' reflects γένηται
    more directly than a simple stative 'be,' while remaining natural English.
- source_word: ἐν πᾶσιν
  chosen: in all things
  alternatives:
  - in everything
  - among all
  lexicon: BDAG
  rationale: The neuter plural naturally yields 'in all things' or 'in everything.'
    'In all things' is slightly more formal and suits the cosmic scope of the context.
- source_word: πρωτεύων
  chosen: preeminent
  alternatives:
  - having first place
  - being supreme
  lexicon: BDAG
  rationale: '''Preeminent'' concisely captures the sense of holding first place.
    ''Having first place'' is a strong alternative but less elegant in this sentence;
    ''supreme'' risks importing a broader doctrinal abstraction beyond the participle''s
    immediate sense.'
