theological_decisions:
- issue: Relation of Christ to creation in πρὸ πάντων
  chosen_reading: Temporal priority ('before all things') is expressed in the main
    text, with ontological implication left implicit rather than expanded.
  alternative_readings:
  - Supremacy in rank ('above all things')
  rationale: The Greek most naturally states priority, and within the context of Colossians
    1:15–20 this contributes to a high Christology. The translation should preserve
    the text's wording without importing a fuller doctrinal paraphrase.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Force of συνέστηκεν
  chosen_reading: Cosmic cohesion/sustaining order ('all things hold together')
  alternative_readings:
  - Ontological constitution ('all things consist')
  rationale: The verse presents the Son as the one in whom the universe remains ordered
    and sustained. 'Hold together' preserves this theological weight in readable English
    without archaic diction.
  doctrine_reference: Affirmations; Translation philosophy §6
