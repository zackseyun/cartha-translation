id: COL.1.17
reference: Colossians 1:17
source:
  edition: SBLGNT
  text: καὶ αὐτός ἐστιν πρὸ πάντων καὶ τὰ πάντα ἐν αὐτῷ συνέστηκεν,
translation:
  text: And he is before all things, and in him all things hold together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all things consist in him' or 'all things cohere in him.'
    reason: lexical_alternative
  - marker: b
    text: '''Before all things'' can also imply supremacy over all things, but the
      Greek wording primarily expresses priority.'
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτός
  chosen: he
  alternatives:
  - he himself
  - he is the one who
  lexicon: BDAG
  rationale: The pronoun is emphatic in position, but standard English can convey
    the emphasis adequately with 'he' in this context without becoming wooden. Stronger
    expansions are possible but would over-interpret the degree of emphasis.
- source_word: πρὸ πάντων
  chosen: before all things
  alternatives:
  - prior to all things
  - above all things
  lexicon: BDAG
  rationale: πρό with the genitive most naturally expresses priority here. In context,
    temporal priority is primary, supporting the Son's preexistence; 'above all things'
    would shift toward rank alone and is less precise.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  - the whole creation
  lexicon: BDAG
  rationale: The phrase is broad and comprehensive. 'All things' preserves the repeated
    wording from the surrounding context and avoids narrowing the scope to creation
    only, though creation is in view.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - by him
  - through him
  lexicon: BDAG
  rationale: ἐν is best retained as 'in' here. While the phrase can suggest instrumentality
    or sphere, the immediate wording supports a locative/sustaining relation rather
    than replacing it with a more interpretive 'by' or 'through.'
- source_word: συνέστηκεν
  chosen: hold together
  alternatives:
  - have held together
  - consist
  - cohere
  lexicon: BDAG
  rationale: The perfect tense indicates a present state resulting from prior action.
    'Hold together' communicates ongoing cohesion in clear modern English. 'Consist'
    is traditional but less transparent in contemporary usage; 'cohere' is accurate
    but more technical.
