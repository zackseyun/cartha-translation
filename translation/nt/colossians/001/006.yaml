theological_decisions:
- issue: Scope of 'all the world'
  chosen_reading: A broad rhetorical description of the gospel's spread in the inhabited
    world, not a strict claim that every individual or region had already been reached.
  alternative_readings:
  - A literal universal statement covering the entire globe
  rationale: Paul commonly uses universal language rhetorically to emphasize the gospel's
    expansive reach. The translation keeps the universal wording of the Greek while
    avoiding interpretive expansion in the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nuance of ἐν ἀληθείᾳ
  chosen_reading: Rendered 'in truth' to preserve ambiguity between 'truly' and 'in
    the sphere/content of truth.'
  alternative_readings:
  - truly
  - in the truth
  rationale: The Greek permits more than one closely related nuance. The main text
    preserves the ambiguity rather than resolving it interpretively.
  doctrine_reference: Translation philosophy §3
