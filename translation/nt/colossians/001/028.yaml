theological_decisions:
- issue: Rendering Χριστῷ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Per doctrine guidelines, Χριστός is translated as 'Messiah' where the
    title is active rather than functioning merely as a proper name. In this verse,
    the phrase 'in Messiah' preserves the messianic title and Paul's union-with-the-Messiah
    theology without importing a denominational reading.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Rendering τέλειον
  chosen_reading: mature
  alternative_readings:
  - perfect
  - complete
  rationale: The verse speaks of the goal of ministry in believers' formation. 'Mature'
    preserves the sanctification-oriented sense without suggesting sinless perfection,
    while still leaving the theological tension of completeness in union with Messiah
    intact.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English;
    preserve theological tension rather than resolve it'
