id: COL.1.8
reference: Colossians 1:8
source:
  edition: SBLGNT
  text: ὁ καὶ δηλώσας ἡμῖν τὴν ὑμῶν ἀγάπην ἐν πνεύματι.
translation:
  text: and who also made known to us your love in the Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your love in spirit," that is, your spiritual love.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ... δηλώσας
  chosen: who also made known
  alternatives:
  - he also informed
  - the one who also revealed
  lexicon: BDAG
  rationale: The article with the aorist participle functions substantivally, referring
    back to Epaphras from the previous verse. English idiom is best served by a relative
    clause. δηλόω here means to make something known or report it.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: καί here adds Epaphras' further action relative to the previous description.
    In English, 'who also made known' captures the additive force naturally, while
    the verse-initial 'and' reflects the connective relation to v. 7.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: BDAG
  rationale: 'The dative is best rendered as indirect object: Epaphras made this known
    to Paul and his companions.'
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: ἀγάπη is rendered by the project's default as 'love.' No contextual reason
    warrants variation.
- source_word: ἐν πνεύματι
  chosen: in the Spirit
  alternatives:
  - in spirit
  - spiritually
  lexicon: BDAG
  rationale: The phrase is somewhat ambiguous, but in Pauline usage the anarthrous
    dative after ἐν can still refer to the Holy Spirit. Given the immediate context
    of Christian fruitfulness and Paul's typical idiom, 'in the Spirit' best preserves
    the likely sense without over-paraphrasing. The lowercase alternative is preserved
    in a footnote because some take it as describing the sphere or quality of their
    love rather than explicitly the Holy Spirit.
