theological_decisions:
- issue: Referent of πνεύματι
  chosen_reading: the Holy Spirit is the most likely referent in 'your love in the
    Spirit'
  alternative_readings:
  - your spiritual love
  - your love in spirit
  rationale: This phrase can be read either as a reference to the Holy Spirit or more
    generally to the spiritual sphere/disposition. In keeping with the instruction
    to preserve theological tension rather than erase ambiguity, the main text adopts
    the likely Pauline sense 'in the Spirit' while preserving the less specific alternative
    in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
