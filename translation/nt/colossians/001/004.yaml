theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: Here Χριστῷ functions as a christological title paired with the personal
    name Ἰησοῦ. Per doctrine guidance, titles are translated where context supports
    it, and this phrase still reads naturally in English as 'Messiah Jesus.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
- issue: Potential nuance of πίστις in Pauline usage
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine excerpt specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where relevant. In this verse the object is the believers'
    response in relation to Messiah Jesus, so 'faith' best fits the immediate context
    while preserving theological tension in a footnote.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις'
