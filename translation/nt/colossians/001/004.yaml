id: COL.1.4
reference: Colossians 1:4
source:
  edition: SBLGNT
  text: ἀκούσαντες τὴν πίστιν ὑμῶν ἐν Χριστῷ Ἰησοῦ καὶ τὴν ἀγάπην ⸂ἣν ἔχετε⸃ εἰς πάντας
    τοὺς ἁγίους
translation:
  text: having heard of your faith in Messiah Jesus and the love that you have for
    all the saints,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your faithfulness in Messiah Jesus' or 'your trust in Messiah Jesus.'
      The Greek noun pistis can carry these related senses depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: having heard of
  alternatives:
  - since we heard of
  - after hearing of
  lexicon: BDAG
  rationale: Aorist participle modifying the implied subject from the previous verse;
    'having heard of' preserves the participial connection and naturally introduces
    the reported basis for thanksgiving. 'Of' is supplied idiomatically in English
    with 'heard' when the object is a report.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Following the project's default for πίστις, 'faith' is the main rendering.
    In this construction with ἐν Χριστῷ Ἰησοῦ, the sense is the Colossians' faith
    centered in Messiah Jesus rather than their faithfulness as a quality, though
    that nuance is worth preserving as an alternative.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  - toward Messiah Jesus
  lexicon: BDAG
  rationale: ἐν is retained as 'in,' preserving Paul's common locative/relational
    phrasing rather than flattening it to merely directional 'toward.' Χριστῷ is rendered
    'Messiah' per doctrine guidance to translate titles where context supports title
    force.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Standard and default rendering for ἀγάπη; clear, natural, and consistent
    with project policy.
- source_word: ἣν ἔχετε
  chosen: that you have
  alternatives:
  - which you have
  lexicon: BDAG
  rationale: The relative clause is textually present in the SBLGNT and is naturally
    rendered in English as 'that you have.' This makes explicit that the love is a
    present possession/practice of the readers.
- source_word: εἰς πάντας τοὺς ἁγίους
  chosen: for all the saints
  alternatives:
  - toward all the saints
  - for all God's holy people
  lexicon: BDAG
  rationale: εἰς with ἀγάπη can be rendered idiomatically as 'for' in English. 'Saints'
    preserves the lexical force of ἅγιοι and Paul's customary designation for believers;
    'holy people' is possible but less consistent with key-term usage.
