id: COL.1.16
reference: Colossians 1:16
source:
  edition: SBLGNT
  text: ὅτι ἐν αὐτῷ ἐκτίσθη τὰ ⸀πάντα ἐν τοῖς οὐρανοῖς ⸀καὶ ἐπὶ τῆς γῆς, τὰ ὁρατὰ
    καὶ τὰ ἀόρατα, εἴτε θρόνοι εἴτε κυριότητες εἴτε ἀρχαὶ εἴτε ἐξουσίαι· τὰ πάντα
    δι’ αὐτοῦ καὶ εἰς αὐτὸν ἔκτισται·
translation:
  text: 'For in him all things were created: in the heavens and on the earth, the
    visible and the invisible, whether thrones or dominions or rulers or authorities.
    All things have been created through him and for him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because in him all things were created.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in heaven and on earth'; Greek has the plural 'in the heavens.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lordships' for 'dominions'; the terms likely denote ranks of created
      authorities.
    reason: lexical_alternative
  - marker: d
    text: Or 'All things were created through him and unto him'; 'for him' expresses
      the goal of creation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context this introduces the ground for the preceding claim about the
    Son's supremacy, so 'For' reads naturally in English while preserving the causal
    force.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - by him
  - in union with him
  lexicon: BDAG
  rationale: The preposition ἐν is retained as 'in' rather than interpreted instrumentally,
    since the verse later uses δι’ αὐτοῦ for the instrumental/mediatorial idea. Preserving
    both distinctions reflects Paul's layered formulation.
- source_word: ἐκτίσθη
  chosen: were created
  alternatives:
  - was created
  lexicon: BDAG
  rationale: 'Aorist passive with neuter plural subject τὰ πάντα is best rendered
    with English plural agreement: ''all things were created.'''
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  - the whole universe
  lexicon: BDAG
  rationale: '''All things'' is the standard and sufficiently broad rendering, preserving
    the comprehensive scope without paraphrase.'
- source_word: ἐν τοῖς οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  - in the heavenly realms
  lexicon: BDAG
  rationale: The plural οὐρανοῖς is preserved as 'the heavens.' This is more formally
    accurate than singular 'heaven' and avoids importing the more interpretive 'heavenly
    realms.'
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - upon the earth
  - on earth
  lexicon: BDAG
  rationale: A natural rendering of ἐπί with genitive here, paired with 'in the heavens'
    to express total cosmic scope.
- source_word: τὰ ὁρατὰ καὶ τὰ ἀόρατα
  chosen: the visible and the invisible
  alternatives:
  - visible things and invisible things
  lexicon: BDAG
  rationale: The articular adjectives function substantivally; the concise English
    pair preserves the contrast cleanly.
- source_word: εἴτε ... εἴτε ... εἴτε ... εἴτε
  chosen: whether ... or ... or ... or
  alternatives:
  - whether ... whether ... whether ... whether
  lexicon: BDAG
  rationale: English idiom normally uses 'whether' once followed by 'or' for the remaining
    coordinated items, while preserving the exhaustive listing force.
- source_word: θρόνοι
  chosen: thrones
  lexicon: BDAG
  rationale: A direct rendering that likely denotes exalted ranks or seats of authority
    among created powers; the literal term should be preserved.
- source_word: κυριότητες
  chosen: dominions
  alternatives:
  - lordships
  - ruling powers
  lexicon: BDAG
  rationale: '''Dominions'' is a conventional and understandable rendering for a class
    of powers/authorities. ''Lordships'' is more wooden and potentially misleading
    in English.'
- source_word: ἀρχαὶ
  chosen: rulers
  alternatives:
  - principalities
  - first rulers
  - powers
  lexicon: BDAG
  rationale: '''Rulers'' communicates the governing sense in clear modern English.
    ''Principalities'' is traditional but less accessible and more jargon-laden.'
- source_word: ἐξουσίαι
  chosen: authorities
  alternatives:
  - powers
  - authoritative powers
  lexicon: BDAG
  rationale: '''Authorities'' is the most direct and readable rendering, distinguishing
    this term from ἀρχαί while keeping the semantic field of ruling power.'
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by means of him
  lexicon: BDAG
  rationale: διά with genitive expresses agency or means; 'through him' is idiomatic
    and preserves the mediatorial nuance distinct from ἐν αὐτῷ and εἰς αὐτόν.
- source_word: εἰς αὐτόν
  chosen: for him
  alternatives:
  - to him
  - unto him
  lexicon: BDAG
  rationale: Here εἰς expresses goal or end. 'For him' communicates purpose/goal naturally
    in English; 'to him' is possible but less explicit about teleology.
- source_word: ἔκτισται
  chosen: have been created
  alternatives:
  - were created
  - stand created
  lexicon: BDAG
  rationale: The perfect passive indicates a completed act with abiding result. 'Have
    been created' preserves that aspect better than repeating simple past 'were created.'
