theological_decisions:
- issue: Relation of the Son to creation in the three prepositional phrases (ἐν αὐτῷ
    / δι’ αὐτοῦ / εἰς αὐτόν)
  chosen_reading: Preserve the distinct wording 'in him ... through him ... for him'
    without collapsing the phrases into a single explanatory paraphrase.
  alternative_readings:
  - by him ... through him ... for him
  - in union with him ... through him ... unto him
  rationale: The verse presents the Son as the sphere/context, agent/means, and goal
    of creation. Because the Greek intentionally varies the prepositions, the translation
    should preserve that theological richness rather than flatten it.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather
    than resolve it.'
- issue: Nature of 'thrones ... dominions ... rulers ... authorities'
  chosen_reading: Render them as created ranks or powers without specifying whether
    they are exclusively angelic, spiritual, or earthly.
  alternative_readings:
  - explicitly angelic orders
  - human political structures
  rationale: The text lists categories of authority within the created order but does
    not narrowly define them here. The translation should not import a more specific
    ontology than the verse itself states.
  doctrine_reference: 'Affirmations: do not import doctrinal claims the text does
    not make.'
