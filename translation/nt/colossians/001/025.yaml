theological_decisions:
- issue: Meaning of πληρῶσαι τὸν λόγον τοῦ θεοῦ
  chosen_reading: to fulfill the word of God
  alternative_readings:
  - to make the word of God fully known
  - to complete the word of God
  rationale: The phrase can be understood as Paul's commission to bring God's word
    to its full expression/proclamation, especially in light of the mystery now revealed
    in the following verses. The main text keeps the broader, less interpretively
    narrowed 'fulfill,' preserving theological tension rather than resolving whether
    the emphasis is proclamation, completion, or fulfillment.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
