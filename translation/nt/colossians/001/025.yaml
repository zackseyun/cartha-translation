  from: the stewardship from God given to me for you
  to: the stewardship given to me by God for you
  rationale: The current rendering separates the elements of the Greek phrase `τὴν
    οἰκονομίαν τοῦ θεοῦ τὴν δοθεῖσάν μοι` in a way that is slightly unnatural in English
