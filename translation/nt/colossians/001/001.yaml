theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Christological titles be translated,
    with Χριστός rendered 'Messiah' where context supports a titular sense. In this
    opening identification, the title remains semantically alive rather than merely
    name-like.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Relational force of ὁ ἀδελφός
  chosen_reading: our brother
  alternative_readings:
  - the brother
  rationale: This is not a doctrinally contested issue, but it affects how the Christian
    familial designation is conveyed. 'Our brother' makes explicit in natural English
    the communal relationship implied in the epistolary context without changing the
    sense.
  doctrine_reference: 'DOCTRINE.md: Readable modern English, not archaic or academic'
