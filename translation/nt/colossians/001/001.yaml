id: COL.1.1
reference: Colossians 1:1
source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ διὰ θελήματος θεοῦ καὶ Τιμόθεος ὁ ἀδελφὸς
translation:
  text: Paul, an apostle of Messiah Jesus by the will of God, and Timothy our brother,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Christ Jesus.' The Greek title Χριστός can be rendered 'Christ';
      here it is translated 'Messiah' to preserve its titular sense.
    reason: alternative_reading
  - marker: b
    text: Greek 'the brother'; rendered 'our brother' for natural English in this
      letter opening.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παῦλος
  chosen: Paul
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Παῦλος.
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - delegate
  lexicon: BDAG
  rationale: In Pauline self-identification, ἀπόστολος is a recognized office/title,
    not merely a generic 'messenger,' so 'apostle' best preserves both lexical meaning
    and ecclesial force.
- source_word: Χριστοῦ Ἰησοῦ
  chosen: of Messiah Jesus
  alternatives:
  - of Christ Jesus
  - of Jesus Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is translated as ''Messiah'' where it functions
    as a title rather than a name-like element. Here the genitive construction after
    ''apostle'' naturally reads as a titular designation: Paul is an apostle belonging
    to/sent by Messiah Jesus.'
- source_word: διὰ
  chosen: by
  alternatives:
  - through
  - because of
  lexicon: BDAG
  rationale: With the genitive θελήματος, διά commonly expresses agency or means.
    'By the will of God' is idiomatic English and accurately reflects divine agency
    behind Paul's apostleship.
- source_word: θελήματος
  chosen: will
  alternatives:
  - purpose
  - desire
  lexicon: BDAG
  rationale: θέλημα in this context denotes God's volitional purpose or determination.
    'Will' is the standard and most transparent rendering.
- source_word: θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: 'Straightforward genitive dependent on ''will'': ''the will of God.'''
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking Timothy with Paul in the epistolary
    prescript.
- source_word: Τιμόθεος
  chosen: Timothy
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Τιμόθεος.
- source_word: ὁ ἀδελφὸς
  chosen: our brother
  alternatives:
  - the brother
  - the fellow believer
  lexicon: BDAG
  rationale: Although the Greek text has the article ('the brother'), English epistolary
    style commonly supplies the relational sense as 'our brother' to convey the familial
    Christian designation naturally. 'Fellow believer' is interpretive and less direct.
