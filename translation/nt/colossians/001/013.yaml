theological_decisions:
- issue: Rendering the genitive phrase τοῦ υἱοῦ τῆς ἀγάπης αὐτοῦ
  chosen_reading: the Son of his love
  alternative_readings:
  - his beloved Son
  - the Son whom he loves
  rationale: The phrase expresses the Father's special love for the Son. To follow
    original-language primacy and preserve the texture of the Greek, the main text
    keeps the genitival form rather than replacing it with a smoother traditional
    paraphrase. The more idiomatic alternatives are preserved in a footnote because
    they communicate the sense clearly and are common in English translations.
  doctrine_reference: Translation philosophy §§1, 3, 6
