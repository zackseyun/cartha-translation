id: COL.1.13
reference: Colossians 1:13
source:
  edition: SBLGNT
  text: ὃς ἐρρύσατο ἡμᾶς ἐκ τῆς ἐξουσίας τοῦ σκότους καὶ μετέστησεν εἰς τὴν βασιλείαν
    τοῦ υἱοῦ τῆς ἀγάπης αὐτοῦ,
translation:
  text: who rescued us from the authority of darkness and transferred us into the
    kingdom of the Son of his love,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his beloved Son' or 'the Son whom he loves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - freed
  lexicon: BDAG
  rationale: ῥύομαι commonly means to rescue or deliver from danger or hostile power.
    'Rescued' is clear modern English and preserves the sense of decisive intervention
    without importing extra theological terminology.
- source_word: ἐξουσίας
  chosen: authority
  alternatives:
  - domain
  - power
  - jurisdiction
  lexicon: BDAG
  rationale: ἐξουσία denotes authority, right, or ruling power. 'Authority' is the
    most direct lexical equivalent here. 'Domain' is interpretive and can be preserved
    as an alternative because the phrase refers to the ruling sphere characterized
    by darkness.
- source_word: σκότους
  chosen: darkness
  lexicon: BDAG
  rationale: σκότος is straightforwardly 'darkness.' In Pauline usage it carries moral
    and spiritual overtones, but those should be left implicit in the translation
    rather than expanded.
- source_word: μετέστησεν
  chosen: transferred
  alternatives:
  - brought over
  - removed
  - translated
  lexicon: BDAG
  rationale: μεθίστημι can mean to move from one place or state to another, including
    transfer into another realm. 'Transferred' best captures the formal movement from
    one dominion to another and fits the kingdom imagery.
- source_word: βασιλείαν
  chosen: kingdom
  alternatives:
  - reign
  - realm
  lexicon: BDAG
  rationale: βασιλεία can denote reign or kingdom. Here, with εἰς and the transfer
    imagery, 'kingdom' naturally conveys entry into the Son's ruled realm while still
    implying his reign.
- source_word: υἱοῦ
  chosen: Son
  lexicon: BDAG
  rationale: υἱός is literally 'son.' Capitalized 'Son' reflects its referent in context,
    the unique Son central to the Christological passage, without changing the lexical
    sense.
- source_word: ἀγάπης
  chosen: love
  lexicon: BDAG
  rationale: 'Per doctrine defaults, ἀγάπη is rendered ''love.'' The genitive construction
    is retained as literally as possible in English: ''the Son of his love.'''
- source_word: τοῦ υἱοῦ τῆς ἀγάπης αὐτοῦ
  chosen: the Son of his love
  alternatives:
  - his beloved Son
  - the Son whom he loves
  lexicon: BDAG
  rationale: The Greek is a genitival expression, literally 'the Son of his love.'
    Rather than smoothing it fully into the traditional idiom 'his beloved Son,' the
    translation preserves the source structure while remaining intelligible. The alternatives
    are idiomatic interpretations of the same sense and are worth preserving in a
    footnote.
