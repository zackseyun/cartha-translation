id: COL.1.5
reference: Colossians 1:5
source:
  edition: SBLGNT
  text: διὰ τὴν ἐλπίδα τὴν ἀποκειμένην ὑμῖν ἐν τοῖς οὐρανοῖς, ἣν προηκούσατε ἐν τῷ
    λόγῳ τῆς ἀληθείας τοῦ εὐαγγελίου
translation:
  text: because of the hope laid up for you in the heavens, which you heard about
    before in the word of truth, the gospel
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in heaven.' Greek has the plural, 'in the heavens.'
    reason: lexical_alternative
  - marker: b
    text: Or 'which you previously heard' or 'which you heard beforehand.'
    reason: lexical_alternative
  - marker: c
    text: '''The word of truth'' may also be rendered ''the message of truth''; ''the
      gospel'' stands in apposition, identifying that word/message.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὴν ἐλπίδα
  chosen: because of the hope
  alternatives:
  - on account of the hope
  - for the sake of the hope
  lexicon: BDAG
  rationale: With διά + accusative, the phrase most naturally expresses cause or basis
    here, continuing the sense from the previous verse ('because of'). 'Hope' is the
    standard rendering of ἐλπίς and fits Pauline usage without overinterpreting it
    as subjective optimism alone.
- source_word: ἀποκειμένην
  chosen: laid up
  alternatives:
  - stored up
  - reserved
  lexicon: BDAG
  rationale: The participle of ἀπόκειμαι conveys something being kept in store or
    reserved. 'Laid up' preserves the metaphor and echoes common biblical idiom while
    remaining natural English.
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - for you all
  - for your benefit
  lexicon: BDAG
  rationale: 'The dative here is best taken as advantage/benefit rather than simple
    possession: the hope is laid up ''for'' them. English singular/plural distinction
    is not marked, so ''you'' is sufficient.'
- source_word: ἐν τοῖς οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  lexicon: BDAG
  rationale: The Greek is plural, and rendering it 'the heavens' preserves the form
    of the source text. Although idiomatic English often uses singular 'heaven,' the
    plural is understandable and reflects Paul's wording more closely.
- source_word: ἣν
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: The relative pronoun refers back to 'hope.' 'Which' gives a smooth English
    connection without changing the antecedent.
- source_word: προηκούσατε
  chosen: you heard about before
  alternatives:
  - you previously heard
  - you heard beforehand
  lexicon: BDAG
  rationale: The compound verb προακούω includes the sense of prior hearing. 'Heard
    about before' communicates that this hope had already been announced to them earlier,
    likely at their initial reception of the gospel.
- source_word: ἐν τῷ λόγῳ τῆς ἀληθείας
  chosen: in the word of truth
  alternatives:
  - in the message of truth
  - in the true word
  lexicon: BDAG
  rationale: λόγος can mean 'word' or 'message.' 'Word of truth' is a transparent
    and established biblical phrase, and the following apposition 'the gospel' clarifies
    its sense. This keeps closer to the Greek while remaining readable.
- source_word: τοῦ εὐαγγελίου
  chosen: the gospel
  alternatives:
  - the good news
  lexicon: BDAG
  rationale: 'The genitive is best taken in apposition to ''the word of truth'': ''the
    word of truth, the gospel.'' ''Gospel'' is standard, concise, and widely understood
    in modern English Christian usage.'
