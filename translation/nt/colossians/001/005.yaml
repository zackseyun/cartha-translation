theological_decisions:
- issue: Referent of the relative clause
  chosen_reading: The clause 'which you heard about before' refers to 'the hope,'
    not to the whole preceding idea in a vague way.
  alternative_readings:
  - The relative clause refers more broadly to the gospel message as a whole.
  rationale: The feminine singular relative pronoun ἣν most directly agrees with ἐλπίδα.
    This preserves the syntax of the Greek and avoids flattening Paul's emphasis that
    the Colossians had already heard of this hope in the gospel message.
  doctrine_reference: Preserve theological tension rather than resolve it; follow
    the source text's plain sense.
- issue: Rendering οὐρανοῖς
  chosen_reading: Use 'the heavens' in the main text.
  alternative_readings:
  - Use idiomatic singular 'heaven'.
  rationale: This is not a major doctrinal dispute, but retaining the plural better
    reflects the Greek form and avoids unnecessary harmonization to English tradition.
  doctrine_reference: Original-language primacy over translation tradition.
