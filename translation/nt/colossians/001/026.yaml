id: COL.1.26
reference: Colossians 1:26
source:
  edition: SBLGNT
  text: τὸ μυστήριον τὸ ἀποκεκρυμμένον ἀπὸ τῶν αἰώνων καὶ ἀπὸ τῶν γενεῶν,— ⸀νῦν δὲ
    ἐφανερώθη τοῖς ἁγίοις αὐτοῦ,
translation:
  text: the mystery hidden from the ages and from the generations—but now revealed
    to his saints,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘secret.’ In Paul, ‘mystery’ usually means a divine purpose once hidden
      and now disclosed.
    reason: lexical_alternative
  - marker: b
    text: Or ‘to his holy ones.’
    reason: lexical_alternative
lexical_decisions:
- source_word: μυστήριον
  chosen: mystery
  alternatives:
  - secret
  lexicon: BDAG
  rationale: '‘Mystery’ is the established and accurate Pauline sense: something once
    hidden and now disclosed by God, not merely an esoteric secret. ‘Secret’ is possible
    in English but can sound too informal or reductionistic for Paul''s theological
    usage.'
- source_word: ἀποκεκρυμμένον
  chosen: hidden
  alternatives:
  - having been hidden
  - kept hidden
  lexicon: BDAG
  rationale: The perfect passive participle indicates a state resulting from prior
    concealment. ‘Hidden’ gives natural English while preserving the passive sense.
    ‘Having been hidden’ is more formally explicit but less readable.
- source_word: ἀπὸ τῶν αἰώνων
  chosen: from the ages
  alternatives:
  - for ages
  - from ages past
  lexicon: BDAG
  rationale: The preposition ἀπό is best preserved as ‘from.’ αἰῶνες here refers to
    ages/epochs rather than the abstract concept of eternity. ‘For ages’ is idiomatic
    but slightly shifts the prepositional force.
- source_word: καὶ ἀπὸ τῶν γενεῶν
  chosen: and from the generations
  alternatives:
  - and from generations
  - and from all generations
  lexicon: BDAG
  rationale: This closely mirrors the Greek parallelism with ‘from the ages.’ The
    article is retained in English for rhythm and specificity. ‘All generations’ adds
    emphasis not explicit in the text.
- source_word: νῦν δὲ
  chosen: but now
  alternatives:
  - yet now
  - now, however
  lexicon: BDAG
  rationale: This preserves the strong contrast between former concealment and present
    disclosure. ‘But now’ is concise and idiomatic.
- source_word: ἐφανερώθη
  chosen: revealed
  alternatives:
  - was made manifest
  - has been revealed
  lexicon: BDAG
  rationale: The aorist passive is well represented by ‘revealed.’ ‘Was made manifest’
    is more formal but less natural; ‘has been revealed’ overstates the aspect in
    English.
- source_word: τοῖς ἁγίοις αὐτοῦ
  chosen: to his saints
  alternatives:
  - to his holy ones
  - to his people
  lexicon: BDAG
  rationale: ἅγιοι in Pauline usage commonly denotes God's consecrated people. ‘Saints’
    preserves the lexical and theological weight better than the broader ‘people.’
    ‘Holy ones’ is more literal but less idiomatic in this context.
