theological_decisions:
- issue: Referent and force of ‘his saints’
  chosen_reading: ‘his saints’ refers to God's holy people, the community of believers,
    without restricting the term to an elite class of canonized individuals.
  alternative_readings:
  - ‘his holy ones’
  - ‘his people’
  rationale: In Pauline usage, ἅγιοι ordinarily designates believers as those set
    apart to God. Retaining ‘saints’ preserves the ecclesial and theological terminology
    while avoiding a narrowing to later ecclesiastical usage through documentation
    here.
  doctrine_reference: Affirmations; Translation philosophy §6
