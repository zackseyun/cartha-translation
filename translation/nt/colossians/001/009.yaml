theological_decisions:
- issue: Force of ἐπίγνωσις in Paul's prayer
  chosen_reading: knowledge
  alternative_readings:
  - full knowledge
  rationale: ἐπίγνωσις often has an intensified sense in Paul, but rendering it as
    'full knowledge' in the main text risks importing an interpretive emphasis not
    demanded by the immediate syntax. The richer nuance is preserved as a lexical
    alternative rather than elevated into the translation itself.
  doctrine_reference: Translation philosophy §1, §5
- issue: Reference of πνευματικῇ
  chosen_reading: '''spiritual'' qualifying both wisdom and understanding without
    explicitly naming the Holy Spirit'
  alternative_readings:
  - '''Spirit-given wisdom and understanding'''
  - '''wisdom and understanding given by the Spirit'''
  rationale: The adjective may imply relation to the Holy Spirit, but the Greek construction
    leaves the expression compact and somewhat open. To preserve theological tension
    rather than resolve it, the main text keeps 'spiritual,' with a footnote noting
    the possible Spirit-related nuance.
  doctrine_reference: Translation philosophy §3
