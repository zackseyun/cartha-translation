theological_decisions:
- issue: Implicit subject of εὐδόκησεν
  chosen_reading: Leave the subject implicit in English rather than supplying 'the
    Father' or 'God.'
  alternative_readings:
  - For God was pleased to have all the fullness dwell in him
  - For the Father was pleased to have all his fullness dwell in him
  rationale: The Greek clause does not explicitly state the subject of εὐδόκησεν.
    Supplying 'God' or 'the Father' reflects a common interpretation from the broader
    context, but the translation should not import an unstated subject into the main
    text. The chosen rendering preserves the syntactic ambiguity while remaining intelligible.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent of 'the fullness'
  chosen_reading: Retain 'all the fullness' without expanding it to 'all the fullness
    of God.'
  alternative_readings:
  - all the fullness of God
  - all his fullness
  rationale: Historic orthodoxy affirms the full deity of the Son, and the broader
    context strongly supports that sense. However, this verse by itself does not include
    an explicit genitive. To avoid adding words beyond the source text while preserving
    theological weight, the translation leaves the phrase unexpanded.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
