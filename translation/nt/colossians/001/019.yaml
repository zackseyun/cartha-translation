id: COL.1.19
reference: Colossians 1:19
source:
  edition: SBLGNT
  text: ὅτι ἐν αὐτῷ εὐδόκησεν πᾶν τὸ πλήρωμα κατοικῆσαι
translation:
  text: For in him all the fullness was pleased to dwell,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because in him all the fullness was pleased to dwell.' The conjunction
      can be rendered in more than one explanatory way in context.
    reason: lexical_alternative
  - marker: b
    text: 'Many translations make the implied subject explicit: ''For God was pleased
      to have all his fullness dwell in him'' or ''For the Father was pleased…'' The
      Greek does not state the subject directly.'
    reason: alternative_reading
  - marker: c
    text: '''All the fullness'' is often understood as the fullness of God; compare
      Colossians 2:9.'
    reason: cross_reference
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: In context this conjunction introduces the ground for the preceding claims
    about the Son, so 'For' communicates explanatory force in natural English better
    than a bare 'that.'
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - in the Messiah
  - in Christ
  lexicon: BDAG
  rationale: The pronoun refers back to the Son in the immediate context. 'In him'
    preserves the Greek wording without importing the explicit title into this verse.
- source_word: εὐδόκησεν
  chosen: was pleased
  alternatives:
  - pleased
  - delighted
  - willed
  lexicon: BDAG
  rationale: The aorist of εὐδοκέω expresses favorable intention or good pleasure.
    Rendering it as 'was pleased' preserves the verbal idea while avoiding an overly
    interpretive supplied subject such as 'God was pleased,' which is not explicit
    in the Greek.
- source_word: πᾶν τὸ πλήρωμα
  chosen: all the fullness
  alternatives:
  - the whole fullness
  - all fullness
  - the fullness of God
  lexicon: BDAG
  rationale: The phrase is articular and comprehensive. 'All the fullness' is a natural
    rendering that preserves the totalizing force of πᾶν without adding 'of God,'
    which many interpreters infer from context but which is not stated here. The wording
    also leaves intact the theological weight later echoed in Colossians 2:9.
- source_word: κατοικῆσαι
  chosen: to dwell
  alternatives:
  - to reside
  - to make its dwelling
  lexicon: BDAG
  rationale: The infinitive denotes taking up dwelling or residing. 'To dwell' is
    concise, idiomatic, and preserves the elevated theological tone of the clause.
