translation:
  text: Who has crossed beyond the sea and found her, and will bring her for choice
    gold?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'found it ... bring it'; the Greek uses feminine pronouns because wisdom
      is grammatically feminine and personified in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  chosen: Who
  alternatives:
  - Who is it that
  - Who has
  lexicon: LSJ
  rationale: Introduces a rhetorical question about the impossibility of obtaining
    wisdom by human effort.
- source_word: διέβη πέραν τῆς θαλάσσης
  chosen: has crossed beyond the sea
  alternatives:
  - went across the sea
  - crossed over the sea
  lexicon: LSJ
  rationale: Aorist verb with πέραν conveys crossing to the far side/beyond; 'has
    crossed beyond the sea' preserves the completed-action rhetorical force and the
    spatial sense of πέραν.
- source_word: εὗρεν αὐτήν
  chosen: found her
  alternatives:
  - found it
  lexicon: LSJ
  rationale: The pronoun refers to wisdom, grammatically feminine in Greek and personified
    in the surrounding context. 'Her' preserves the source-text personification better
    than impersonal 'it'.
- source_word: οἴσει αὐτὴν
  chosen: will bring her back
  alternatives:
  - will bring her
  - will carry her
  lexicon: LSJ
  rationale: Future of φέρω can mean bring/carry. 'Bring her back' is supplied from
    context because the question imagines retrieving wisdom from beyond the sea and
    returning with her; this makes the implied motion natural in English without substantial
    paraphrase.
- source_word: χρυσίου ἐκλεκτοῦ
  chosen: for choice gold
  alternatives:
  - for selected gold
  - for fine gold
  - with choice gold
  lexicon: LSJ
  rationale: Genitive phrase denotes precious, select gold. 'For choice gold' fits
    the likely sense of exchange or price in context and keeps the elevated but readable
    register.
