theological_decisions:
- issue: Meaning of 'your fear' in relation to repentance
  chosen_reading: Retained as 'your fear' rather than interpreting it as mere reverence
  alternative_readings:
  - fear of you
  - reverence for you
  rationale: The penitential context suggests divinely given fear leading to invocation
    and praise. Keeping the more literal phrase preserves the theological tension
    between dread, reverence, and covenantal obedience rather than resolving it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Gender rendering of πατέρων
  chosen_reading: '''our fathers'''
  alternative_readings:
  - our ancestors
  rationale: The source explicitly says 'fathers,' and the context concerns inherited
    ancestral sin. Per doctrine, gender-accurate rendering is preferred over neutralization
    unless the source intent is clearly generic in a way English cannot bear.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
