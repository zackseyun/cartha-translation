id: BAR.3.7
reference: Baruch 3:7
source:
  edition: lxx-swete-1909
  text: ὅτι διὰ τοῦτο ἔδωκας τὸν φόβον σου ἐπὶ καρδίαν ἡμῶν καὶ ἐπικαλεῖσθαι τὸ ὄνομά
    σου· καὶ αἰνέσομέν σε ἐν τῇ ἀποικίᾳ ἡμῶν, ὅτι ἀπεστρέψαμεν ἀπὸ καρδίας ἡμῶν πᾶσαν
    ἀδικίαν πατέρων ἡμῶν τῶν ἡμαρτηκότων ἐναντίον σου.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: For because of this you have put your fear in our hearts, that we may call
    on your name; and we will praise you in our exile, because we have turned away
    from our hearts every unrighteousness of our fathers who sinned before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fear of you.' The Greek literally reads 'your fear,' a biblical expression
      for the fear directed toward God.
    reason: lexical_alternative
  - marker: b
    text: Or 'in our captivity.' The Greek term can denote the state of deportation
      or exile.
    reason: lexical_alternative
  - marker: c
    text: Or 'every wrongdoing' or 'all injustice.'
    reason: lexical_alternative
  - marker: d
    text: Or 'who sinned against you.' The Greek more literally says 'who sinned before
      you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: because of this
  alternatives:
  - for this reason
  - therefore
  lexicon: BDAG
  rationale: The phrase gives the reason for the preceding situation. 'Because of
    this' preserves the causal force without over-smoothing into a purely inferential
    'therefore.'
- source_word: ἔδωκας
  chosen: you have put
  alternatives:
  - you gave
  - you placed
  lexicon: BDAG
  rationale: Although literally 'gave,' English idiom with 'fear upon our hearts'
    is better expressed as 'put' or 'placed.' 'You have put' preserves the completed
    action with present relevance.
- source_word: τὸν φόβον σου
  chosen: your fear
  alternatives:
  - fear of you
  - reverence for you
  lexicon: BDAG
  rationale: The genitive-like possessive in Greek is most directly represented by
    'your fear.' This leaves intact the biblical sense of fear directed toward God,
    without prematurely interpreting it as merely 'reverence.'
- source_word: ἐπὶ καρδίαν ἡμῶν
  chosen: upon our hearts
  alternatives:
  - in our hearts
  - on our hearts
  lexicon: BDAG
  rationale: The preposition ἐπί with accusative is retained with 'upon' to reflect
    the source image. 'Hearts' is kept literal as the seat of inner disposition.
- source_word: ἐπικαλεῖσθαι τὸ ὄνομά σου
  chosen: we call on your name
  alternatives:
  - we invoke your name
  - we call upon your name
  lexicon: BDAG
  rationale: The infinitive is understood here as result/purpose after the preceding
    clause. 'Call on your name' is standard biblical English and preserves covenantal/prayer
    language.
- source_word: αἰνέσομέν σε
  chosen: we will praise you
  alternatives:
  - we shall praise you
  lexicon: BDAG
  rationale: Future tense is straightforward. 'Will' is natural modern English.
- source_word: ἐν τῇ ἀποικίᾳ ἡμῶν
  chosen: in our exile
  alternatives:
  - in our captivity
  - in our colony/dispersion
  lexicon: LSJ
  rationale: In Baruch's context the term refers to the condition of deportation/exilic
    displacement. 'Exile' is the clearest contextual rendering.
- source_word: ἀπεστρέψαμεν
  chosen: we have turned away
  alternatives:
  - we turned away
  - we have removed
  lexicon: BDAG
  rationale: The verb denotes turning away from or rejecting. The perfect-like English
    present perfect fits the Greek aorist here in context of present repentance.
- source_word: ἀπὸ καρδίας ἡμῶν
  chosen: from our hearts
  alternatives:
  - from our heart
  - out of our hearts
  lexicon: BDAG
  rationale: Literal rendering preserves the anthropological language of inward repentance.
- source_word: πᾶσαν ἀδικίαν
  chosen: every unrighteousness
  alternatives:
  - all injustice
  - every wrongdoing
  - all wickedness
  lexicon: BDAG
  rationale: ἀδικία can mean injustice or wrongdoing; 'unrighteousness' best preserves
    the moral-religious register in this penitential prayer.
- source_word: πατέρων ἡμῶν
  chosen: of our fathers
  alternatives:
  - of our ancestors
  lexicon: BDAG
  rationale: The Greek is explicitly masculine/plural and refers to forefathers. Per
    doctrine, gender-accurate language is preferred unless context requires neutralization.
- source_word: τῶν ἡμαρτηκότων ἐναντίον σου
  chosen: who sinned before you
  alternatives:
  - who sinned against you
  - who sinned in your sight
  lexicon: BDAG
  rationale: ἐναντίον σου literally means 'before you' or 'in your presence.' 'Before
    you' preserves that spatial-relational nuance while still implying accountability
    to God.
