theological_decisions:
- issue: Referent of the implied subject in the passive verbs
  chosen_reading: The verse continues speaking of wisdom from the surrounding context,
    without supplying the noun in English.
  alternative_readings:
  - 'Explicitly supply ''wisdom'' in the translation: ''nor was wisdom heard of...'''
  rationale: The Greek uses passive verbs without restating the subject, relying on
    the immediate context. English can preserve this ellipsis with 'it,' which remains
    clear from context and avoids adding a noun not present in the verse itself.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what
    the source says without paraphrastic expansion.'
