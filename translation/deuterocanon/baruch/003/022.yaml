lexical_decisions:
- source_word: οὐδὲ
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: LSJ
  rationale: Coordinates this clause with the preceding context by continuing the
    negation. 'Nor' is idiomatic and preserves the cumulative force better than repeating
    'and not.'
- source_word: ἠκούσθη
  chosen: was heard of
  alternatives:
  - was heard
  - was reported
  lexicon: BDAG
  rationale: Aorist passive of ἀκούω. In English, 'was heard of' best conveys not
    merely the act of hearing a sound but the idea that this wisdom was not known
    or reported there. This fits the surrounding context about the inaccessibility
    of wisdom.
- source_word: ἐν
  chosen: in
  alternatives:
  - among
  - within
  lexicon: BDAG
  rationale: The preposition is locative here, marking geographic regions. 'In' is
    the most natural and direct rendering for both place names.
- source_word: Χαναάν
  chosen: Canaan
  lexicon: LSJ
  rationale: Standard English transliteration of the place name Χαναάν.
- source_word: ὤφθη
  chosen: was seen
  alternatives:
  - appeared
  - was found
  lexicon: BDAG
  rationale: Aorist passive of ὁράω. 'Was seen' preserves the visual/discovery imagery
    in parallel with 'was heard of.' 'Was found' would over-interpret the sense.
- source_word: Θαιμάν
  chosen: Teman
  alternatives:
  - Theman
  lexicon: LSJ
  rationale: Standard English transliteration of the place name, commonly associated
    with Edom. 'Teman' is the conventional form in English Bible usage.
