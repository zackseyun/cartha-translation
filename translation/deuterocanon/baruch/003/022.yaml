translation:
  text: nor was it heard of in Canaan, nor was it seen in Teman;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the wisdom under discussion in the surrounding context; Greek leaves
      the subject implicit in this verse.
