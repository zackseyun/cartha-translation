translation:
  text: those who make sport with the birds of the sky, and who store up silver and
    gold, in which people trusted, and there is no end to their possessions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'play among the birds of the sky'; the Greek participle can suggest sporting
      activity more generally, not necessarily verbal mockery.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμπαίζοντες
  chosen: make sport with
  alternatives:
  - play among
  - mock
  - amuse themselves with
  lexicon: LSJ
  rationale: The participle literally involves playing or making sport. In this context
    with birds of the sky, it likely refers to sporting/hunting activity rather than
    verbal mockery, so 'make sport with' preserves the ambiguity better than the overly
    specific 'hunt' and fits the syntax.
- source_word: ὀρνέοις τοῦ οὐρανοῦ
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - birds in the sky
  lexicon: LSJ
  rationale: A standard literal rendering of the Greek phrase; 'of the sky' keeps
    the Semitic/LXX flavor without becoming archaic.
- source_word: θησαυρίζοντες
  chosen: store up
  alternatives:
  - treasure up
  - heap up
  lexicon: BDAG
  rationale: '''Store up'' is clear modern English and preserves the sense of accumulating
    wealth.'
- source_word: ἀργύριον
  chosen: silver
  alternatives:
  - money
  lexicon: LSJ
  rationale: The immediate pairing with 'gold' favors the literal precious-metal sense
    rather than the broader 'money'.
- source_word: χρυσίον
  chosen: gold
  lexicon: LSJ
  rationale: Straightforward lexical equivalent.
- source_word: ᾧ ἐπεποίθεισαν ἄνθρωποι
  chosen: in which men have trusted
  alternatives:
  - on which people relied
  - in which human beings trusted
  lexicon: BDAG
  rationale: The relative pronoun is singular but refers collectively to the stored
    wealth, especially the gold/silver complex. 'Men' matches the Greek ἄνθρωποι in
    a representative human sense per project policy; 'have trusted' conveys settled
    reliance.
- source_word: οὐκ ἔστιν τέλος
  chosen: there is no end
  alternatives:
  - there is no limit
  - it is endless
  lexicon: LSJ
  rationale: A direct and idiomatic rendering of the existential clause.
- source_word: κτήσεως
  chosen: possessions
  alternatives:
  - acquisition
  - property
  - wealth
  lexicon: LSJ
  rationale: The noun denotes what has been acquired or owned. 'Possessions' is natural
    English and broad enough to include accumulated property and wealth.
