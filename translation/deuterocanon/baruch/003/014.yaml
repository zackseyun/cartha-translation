theological_decisions:
- issue: Rendering of wisdom-related terms as distinct concepts
  chosen_reading: Kept φρόνησις, ἰσχύς, and σύνεσις distinct as 'prudence,' 'strength,'
    and 'understanding.'
  alternative_readings:
  - Render φρόνησις and σύνεσις both as 'wisdom' or 'understanding' for smoother English
  rationale: The verse deliberately catalogs multiple goods rather than repeating
    one concept. Preserving distinction better reflects the Greek and the wisdom theology
    of the passage.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Idiomatic rendering of μακροβίωσις καὶ ζωή
  chosen_reading: Rendered as 'length of days and life.'
  alternative_readings:
  - '''long life and prosperity'''
  - '''longevity and life'''
  rationale: The Greek explicitly names life-length and life itself; importing 'prosperity'
    would exceed the source. The chosen rendering preserves the Hebrew-like wisdom
    idiom without paraphrase.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
