translation:
  text: Learn where prudence is, where strength is, where understanding is, so that
    you may know at the same time where length of days and life are, where light for
    the eyes and peace are.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'long life' for 'length of days.' The Greek μακροβίωσις denotes longevity;
      the main text preserves the biblical idiom.
    reason: lexical_alternative
  - marker: b
    text: '''Light for the eyes'' is a literal metaphor that can suggest vitality,
      joy, or clarity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μάθε
  chosen: Learn
  alternatives:
  - Know
  - Find out
  lexicon: BDAG
  rationale: Aorist imperative of μανθάνω calls for an exhortation to acquire knowledge.
    'Learn' is direct and idiomatic, preserving the imperative force without overinterpreting
    it as mere discovery.
- source_word: φρόνησις
  chosen: prudence
  alternatives:
  - wisdom
  - good sense
  - insight
  lexicon: BDAG
  rationale: φρόνησις often denotes practical wisdom or sound judgment. 'Prudence'
    best captures this practical, discerning sense and distinguishes it from σύνεσις
    later in the verse.
- source_word: ἰσχύς
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: BDAG
  rationale: The noun denotes strength or might. 'Strength' is the most natural and
    least overstated English equivalent in this wisdom context.
- source_word: σύνεσις
  chosen: understanding
  alternatives:
  - intelligence
  - insight
  - discernment
  lexicon: BDAG
  rationale: σύνεσις commonly refers to understanding or comprehension. 'Understanding'
    is clear modern English and pairs well with 'prudence' without collapsing the
    two terms into one idea.
- source_word: τοῦ γνῶναι
  chosen: so that you may know
  alternatives:
  - to know
  - for knowing
  lexicon: BDAG
  rationale: The articular infinitive can express purpose or result. In context, after
    a string of imperatives and questions, an English purpose clause is smoother and
    communicates the sense of learning in order to know.
- source_word: ἅμα
  chosen: at the same time
  alternatives:
  - also
  - together
  lexicon: BDAG
  rationale: ἅμα here links the sought knowledge as a combined whole. 'At the same
    time' preserves the adverb's sense that these goods are known together, not separately.
- source_word: μακροβίωσις
  chosen: length of days
  alternatives:
  - long life
  - longevity
  lexicon: LSJ
  rationale: The term denotes long duration of life. 'Length of days' preserves the
    biblical idiom and fits the wisdom style, while 'and life' then remains a distinct
    coordinate term in the Greek.
- source_word: ζωή
  chosen: life
  lexicon: BDAG
  rationale: Standard rendering; no contextual reason to vary it here.
- source_word: φῶς ὀφθαλμῶν
  chosen: light for the eyes
  alternatives:
  - light of the eyes
  - brightness for the eyes
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the metaphor. 'Light for the eyes'
    is idiomatic enough in English and avoids flattening the expression into mere
    happiness or vitality.
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - well-being
  lexicon: BDAG
  rationale: εἰρήνη can include wholeness and well-being, but 'peace' is the standard
    rendering and preserves the text's resonance with biblical wisdom language.
