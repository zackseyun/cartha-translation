theological_decisions:
- issue: Whether καθήμενος should be expanded to an explicitly royal or heavenly image
    ('enthroned')
  chosen_reading: Kept the more literal 'remain seated' in the main text
  alternative_readings:
  - sit enthroned forever
  - are enthroned forever
  rationale: The context addresses God, so enthronement is a plausible implication,
    but the Greek here says only 'sitting/seated.' To avoid importing a stronger theological
    image than the wording requires, the main text preserves the literal posture while
    allowing the royal nuance in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
