id: BAR.3.3
reference: Baruch 3:3
source:
  edition: lxx-swete-1909
  text: ὅτι σὺ καθήμενος τὸν αἰῶνα, καὶ ἡμεῖς ἀπολλύμενοι τὸν αἰῶνα.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: for you remain seated forever, and we are perishing forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sit enthroned forever.' The Greek literally says 'sitting/seated forever,'
      which may imply enthronement in context but does not explicitly mention a throne.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the ground or explanation for the plea in context; 'for' is
    concise and natural in English while preserving the causal force.
- source_word: σὺ
  chosen: you
  lexicon: BDAG
  rationale: Explicit pronoun retained for emphasis, contrasting God with 'we' in
    the second clause.
- source_word: καθήμενος
  chosen: remain seated
  alternatives:
  - sit enthroned
  - are seated
  - sit
  lexicon: BDAG
  rationale: The participle literally denotes sitting; in reference to God it can
    imply enthronement or abiding rule. 'Remain seated' preserves the posture image
    and the durative contrast with human perishing without importing 'throne' where
    the Greek does not state it.
- source_word: τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for ever
  lexicon: BDAG
  rationale: Idiomatic accusative of duration meaning enduringly or forever. Modern
    English 'forever' best conveys the sense.
- source_word: ἡμεῖς
  chosen: we
  lexicon: BDAG
  rationale: Explicit pronoun retained to preserve the sharp contrast between divine
    permanence and human/corporate ruin.
- source_word: ἀπολλύμενοι
  chosen: are perishing
  alternatives:
  - are being destroyed
  - are wasting away
  - perish
  lexicon: BDAG
  rationale: Present middle/passive participle conveys an ongoing state/process. 'Are
    perishing' preserves the durative aspect and leaves open whether the emphasis
    is destruction, ruin, or wasting away.
- source_word: τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - continually
  lexicon: BDAG
  rationale: Repeated for rhetorical parallelism with the first clause; rendered consistently
    as 'forever'.
