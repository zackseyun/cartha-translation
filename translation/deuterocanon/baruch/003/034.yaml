theological_decisions:
- issue: Poetic personification of the stars
  chosen_reading: Retain the personified language directly ('the stars shone... and
    rejoiced')
  alternative_readings:
  - Depersonalize as merely astronomical description
  rationale: The Greek explicitly attributes joy to the stars as part of the poem's
    portrayal of creation responding to God's order. The translation should preserve
    this literary-theological effect rather than flatten it into impersonal description.
