translation:
  text: And the stars shone in their watches and rejoiced;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their stations,' 'in their courses,' or 'at their posts.' The Greek
      phrase uses φυλακαί, literally 'watches' or 'guard-posts,' in poetic reference
      to the stars' appointed places or times.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀστέρες
  chosen: stars
  lexicon: BDAG
  rationale: Straightforward plural noun referring to heavenly bodies; 'stars' is
    the natural and formal English equivalent.
- source_word: ἔλαμψαν
  chosen: shone
  alternatives:
  - gave light
  - gleamed
  lexicon: BDAG
  rationale: Aorist verb from λάμπω, denoting emitting light. 'Shone' is idiomatic,
    concise, and preserves the simple narrative force better than the more wooden
    'gave light'.
- source_word: ἐν ταῖς φυλακαῖς αὐτῶν
  chosen: in their watches
  alternatives:
  - in their stations
  - in their courses
  - at their posts
  lexicon: BDAG
  rationale: φυλακή can denote a watch, guard-post, or period of keeping watch. In
    this poetic cosmological context, 'in their watches' preserves the Greek imagery
    of appointed stations/times without over-interpreting it as astronomical 'courses.'
    The possessive αὐτῶν is retained as 'their.'
- source_word: εὐφράνθησαν
  chosen: rejoiced
  alternatives:
  - were glad
  - delighted themselves
  lexicon: BDAG
  rationale: Passive/deponent form conveying gladness or joy. 'Rejoiced' fits the
    elevated poetic register and personification of the stars.
