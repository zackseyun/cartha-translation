translation:
  text: Where are the rulers of the nations, and those who rule over the beasts on
    the earth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wild animals on the earth.' The Greek θηρίων can denote beasts generally
      or wild animals more specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποῦ
  chosen: Where
  alternatives:
  - Where now
  lexicon: BDAG
  rationale: Direct interrogative asking the location or present state of those mentioned.
    A simple 'Where' best matches the Greek without adding emphasis not explicit in
    the text.
- source_word: ἄρχοντες
  chosen: rulers
  alternatives:
  - princes
  - leaders
  lexicon: BDAG
  rationale: The term denotes those in positions of authority. 'Rulers' is natural
    modern English and preserves the political sense better than the more archaic
    'princes' or the broader 'leaders'.
- source_word: ἐθνῶν
  chosen: of the nations
  alternatives:
  - of the Gentiles
  - of peoples
  lexicon: BDAG
  rationale: In this context the word refers to nations/peoples politically rather
    than specifically 'Gentiles' in a later Jewish-Christian contrast. 'Of the nations'
    is the clearest rendering.
- source_word: κυριεύοντες
  chosen: those who rule over
  alternatives:
  - those who dominate
  - lords over
  lexicon: BDAG
  rationale: The participle expresses exercising dominion. 'Those who rule over' is
    idiomatic and preserves the active governing sense without the awkwardness of
    a literal participial form.
- source_word: θηρίων
  chosen: the beasts
  alternatives:
  - wild animals
  - beasts
  lexicon: BDAG
  rationale: The word commonly denotes beasts or wild animals. 'The beasts' keeps
    the elevated tone and broad category of the Greek; 'wild animals' is possible
    but slightly more interpretive.
- source_word: τῶν ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - of the earth
  - upon the land
  lexicon: BDAG
  rationale: The phrase modifies 'beasts' and identifies them as earthly creatures.
    'On the earth' is straightforward and readable; 'of the earth' is also possible
    but less clearly locative in English.
