theological_decisions:
- issue: Personification of wisdom
  chosen_reading: Retain feminine personal reference ('her') for wisdom
  alternative_readings:
  - Use impersonal 'it' for wisdom
  rationale: The immediate Greek uses feminine pronouns for wisdom, and the surrounding
    passage personifies wisdom. Preserving 'her' maintains the literary and theological
    texture without implying a separate deity.
  doctrine_reference: Translation philosophy §3, §6
- issue: Divine creative action in κατασκευάσας
  chosen_reading: Render as 'prepared the earth' rather than a more doctrinally loaded
    'created'
  alternative_readings:
  - created the earth
  - established the earth
  rationale: The Greek verb here is not the most direct creation verb and should be
    translated according to its own lexical force. This avoids importing a stronger
    doctrinal formulation than the wording itself states.
  doctrine_reference: Translation philosophy §1
