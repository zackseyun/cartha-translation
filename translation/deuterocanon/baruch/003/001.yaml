theological_decisions:
- issue: Anthropological pairing of ψυχή and πνεῦμα
  chosen_reading: Render both distinctly as 'soul' and 'spirit'
  alternative_readings:
  - Collapse into 'heart and mind'
  - Render ψυχή as 'person' and πνεῦμα as 'breath'
  rationale: The verse uses a poetic parallelism of inner-human terms in prayer. Preserving
    both terms maintains the text's theological and literary texture without forcing
    a technical anthropology.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
