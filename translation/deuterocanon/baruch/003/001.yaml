id: BAR.3.1
reference: Baruch 3:1
source:
  edition: lxx-swete-1909
  text: Κύριε Παντοκράτωρ, ὁ θεὸς Ἰσραήλ, ψυχὴ ἐν στενοῖς καὶ πνεῦμα ἀκηδιῶν κέκραγεν
    πρὸς σέ.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: Lord Almighty, God of Israel, a soul in distress and a discouraged spirit
    has cried out to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a soul in straits and a despondent spirit has cried out to you.' The
      Greek terms can also suggest severe affliction and loss of heart.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος used as a divine address; 'Lord' follows project default
    for κύριος and fits Jewish-Greek scriptural usage.
- source_word: Παντοκράτωρ
  chosen: Almighty
  alternatives:
  - All-sovereign
  - Ruler of all
  lexicon: LEH
  rationale: Common LXX divine title meaning one who holds power over all; 'Almighty'
    is the most natural and established English equivalent without sounding overly
    technical.
- source_word: ὁ θεὸς Ἰσραήλ
  chosen: God of Israel
  alternatives:
  - the God of Israel
  lexicon: LEH
  rationale: Appositional divine title following the vocative address. English omits
    the article naturally in direct address while preserving the title's covenantal
    force.
- source_word: ψυχὴ
  chosen: a soul
  alternatives:
  - a life
  - a person
  lexicon: LEH
  rationale: Here ψυχή denotes the inner self/person in lament language. 'Soul' preserves
    the text's anthropological register better than the flatter 'person,' while remaining
    understandable.
- source_word: ἐν στενοῖς
  chosen: in distress
  alternatives:
  - in straits
  - in affliction
  - in narrow circumstances
  lexicon: LEH
  rationale: Idiomatic expression for being in trouble or constrained circumstances.
    'In distress' communicates the sense clearly in modern English.
- source_word: πνεῦμα
  chosen: spirit
  alternatives:
  - breath
  - inner spirit
  lexicon: LEH
  rationale: In parallel with ψυχή, πνεῦμα refers to the inward disposition rather
    than literal breath; 'spirit' preserves the parallelism.
- source_word: ἀκηδιῶν
  chosen: discouraged
  alternatives:
  - fainthearted
  - despondent
  - wearied
  lexicon: LEH
  rationale: The participial form conveys dejection, weariness, or loss of heart.
    'Discouraged' is readable modern English and fits the lament context without overstating
    clinical despair.
- source_word: κέκραγεν
  chosen: has cried out
  alternatives:
  - cried out
  - has called out
  lexicon: BDAG
  rationale: Perfect tense of κράζω highlights the completed yet present-significant
    cry. 'Has cried out' preserves that aspect better than a simple past.
- source_word: πρὸς σέ
  chosen: to you
  alternatives:
  - toward you
  lexicon: BDAG
  rationale: Standard directional phrase in prayer language; 'to you' is idiomatic
    English.
