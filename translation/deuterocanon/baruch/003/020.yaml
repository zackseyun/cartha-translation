theological_decisions:
- issue: Idiomatic force of 'saw the light' in wisdom context
  chosen_reading: Retain the concrete expression 'saw the light' rather than interpret
    it as 'came to life' or 'enjoyed life.'
  alternative_readings:
  - saw light
  - enjoyed life
  rationale: The phrase may carry an idiomatic association with being alive, but the
    text itself states the image directly. Preserving the metaphor maintains the poetic
    force and avoids importing a fuller interpretation than the Greek requires.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender rendering of νεώτεροι
  chosen_reading: 'Render with masculine reference: ''the younger men.'''
  alternative_readings:
  - the young
  - younger people
  rationale: The Greek form is grammatically masculine plural used substantivally.
    In keeping with the project's gender-accurate policy, the translation preserves
    masculine wording rather than neutralizing it without textual warrant.
  doctrine_reference: Translation philosophy §4
