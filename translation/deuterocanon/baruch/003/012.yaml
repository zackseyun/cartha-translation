translation:
  text: You abandoned the fountain of wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spring of wisdom' or 'source of wisdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκατέλιπες
  chosen: you abandoned
  alternatives:
  - you forsook
  - you left behind
  - you deserted
  lexicon: BDAG
  rationale: Aorist active indicative, second singular of ἐγκαταλείπω. 'Abandoned'
    is natural modern English and preserves the force of deliberate leaving more strongly
    than the flatter 'left.' 'Forsook' is possible but more archaic.
- source_word: πηγήν
  chosen: fountain
  alternatives:
  - spring
  - source
  lexicon: LSJ
  rationale: πηγή denotes a spring or fountain as a source of water. 'Fountain' preserves
    the vivid metaphor and matches common biblical imagery; 'spring' is also viable,
    while 'source' is more abstract and less imagistic.
- source_word: σοφίας
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering of σοφία. In context it denotes divine wisdom, but
    the text itself simply says 'wisdom,' so no expansion is added.
