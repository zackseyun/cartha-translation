theological_decisions:
- issue: Metaphorical force of 'the fountain of wisdom'
  chosen_reading: Retain the metaphor directly rather than interpret it as 'the source
    of wisdom' in the main text.
  alternative_readings:
  - the source of wisdom
  - the spring of wisdom
  rationale: The Greek uses concrete imagery (πηγή) and the translation philosophy
    favors preserving theological and poetic texture where English can bear it. 'Fountain'
    communicates the metaphor without unnecessary interpretation.
