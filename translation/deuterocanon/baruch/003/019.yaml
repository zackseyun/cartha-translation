theological_decisions:
- issue: Rendering of ᾅδης in a deuterocanonical wisdom context
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - the underworld
  - Sheol
  rationale: The source text is Greek and uses ᾅδου, not a Hebrew term. Following
    original-language primacy, the translation keeps 'Hades' rather than normalizing
    to 'grave' or retroverting to 'Sheol.' This preserves the text's own depiction
    of the realm of the dead without importing later doctrinal claims about hell.
