translation:
  text: They vanished and went down to Hades, and others rose up in their place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the underworld' or 'the grave'; Greek 'Hades,' the realm of the dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠφανίσθησαν
  chosen: they vanished
  alternatives:
  - they disappeared
  - they perished
  lexicon: BDAG
  rationale: Aorist passive of ἀφανίζω/ἀφανίζομαι here denotes passing from view or
    being wiped out. 'Vanished' preserves the resultative sense without over-specifying
    physical destruction; 'perished' is possible but stronger than the immediate lexical
    force.
- source_word: εἰς ᾅδου
  chosen: to Hades
  alternatives:
  - to the grave
  - to the underworld
  - to Sheol
  lexicon: BDAG
  rationale: The Greek explicitly names ᾅδης, the realm of the dead. 'Hades' is the
    most transparent direct rendering from the Greek source; 'grave' would flatten
    the mythic/cosmological sense, while 'Sheol' would import the Hebrew term not
    present in this witness.
- source_word: κατέβησαν
  chosen: went down
  alternatives:
  - descended
  lexicon: BDAG
  rationale: The verb literally means 'went down' or 'descended.' 'Went down' is slightly
    more natural modern English while preserving the downward movement associated
    with the realm of the dead.
- source_word: ἄλλοι
  chosen: others
  alternatives:
  - other men
  - others afterward
  lexicon: BDAG
  rationale: The indefinite plural is best rendered simply as 'others.' Supplying
    'men' is unnecessary because the Greek does not state it explicitly here.
- source_word: ἀντανέστησαν
  chosen: rose up
  alternatives:
  - arose
  - came forward
  - appeared in succession
  lexicon: LSJ
  rationale: The compound verb conveys rising up in response or in succession to others.
    'Rose up' keeps the verbal imagery and avoids implying resurrection in this context;
    the following phrase clarifies replacement.
- source_word: ἀντʼ αὐτῶν
  chosen: in their place
  alternatives:
  - instead of them
  - after them
  lexicon: BDAG
  rationale: ἀντί with the genitive indicates substitution or succession. 'In their
    place' is idiomatic English that captures replacement more clearly than the more
    wooden 'instead of them.'
