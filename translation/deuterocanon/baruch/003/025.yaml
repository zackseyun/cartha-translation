translation:
  text: Great and without end, lofty and immeasurable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'great and has no end, high and immeasurable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μέγας
  chosen: Great
  alternatives:
  - large
  - mighty
  lexicon: BDAG
  rationale: Predicate adjective in a verbless descriptive clause; 'great' best preserves
    the broad sense of magnitude/majesty without over-specifying physical size ('large')
    or power ('mighty'). Capitalized because it continues the description of Wisdom
    from the surrounding context, functioning almost titularly in English style.
- source_word: οὐκ ἔχει τελευτήν
  chosen: without end
  alternatives:
  - has no end
  - without limit
  - endless
  lexicon: BDAG
  rationale: Literally 'does not have an end.' 'Without end' is concise, natural English
    and preserves the durative sense without turning the line into a more interpretive
    adjective like 'endless.'
- source_word: ὑψηλός
  chosen: lofty
  alternatives:
  - high
  - exalted
  lexicon: BDAG
  rationale: '''Lofty'' preserves the elevated, majestic quality in a poetic register.
    ''High'' is more literal but flatter in English; ''exalted'' would add a stronger
    evaluative/theological nuance than the adjective itself requires here.'
- source_word: ἀμέτρητος
  chosen: immeasurable
  alternatives:
  - beyond measure
  - countless
  - without measure
  lexicon: BDAG
  rationale: The term denotes what cannot be measured. 'Immeasurable' is the most
    direct and idiomatic equivalent. 'Countless' would narrow the sense toward number
    alone, while the Greek can denote unbounded extent more generally.
