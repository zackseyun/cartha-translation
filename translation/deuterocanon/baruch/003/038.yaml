theological_decisions:
- issue: Referent of the masculine subject ('he') in a context about Wisdom
  chosen_reading: Retain the Greek masculine pronoun as 'he' without resolving the
    broader interpretive question in the translation itself.
  alternative_readings:
  - Render implicitly as 'it' to match English expectations for 'wisdom'
  - Paraphrase as a direct christological statement
  rationale: The Greek text uses masculine verbal forms without an explicit noun in
    this verse, following the preceding context. Rendering 'he' preserves the source
    wording and the theological tension historically associated with this verse, especially
    in Christian reception, without importing a doctrinal conclusion beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
