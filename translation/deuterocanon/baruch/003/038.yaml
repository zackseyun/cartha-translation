reference: Baruch 3:38
source:
  edition: lxx-swete-1909
  text: μετὰ τοῦτο ἐπὶ τῆς γῆς ὤφθη, καὶ ἐν τοῖς ἀνθρώποις συνανεστράφη.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: After this he was seen on the earth, and lived among men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appeared on earth, and associated with human beings.' The Greek can
      be rendered more idiomatically as 'appeared,' and 'among men' means among human
      beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ τοῦτο
  chosen: After this
  alternatives:
  - Afterward
  - Then after this
  lexicon: LSJ
  rationale: Temporal sequence is explicit. 'After this' is a straightforward rendering
    that preserves the Greek phrasing without unnecessary smoothing.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - upon the earth
  - on earth
  - in the land
  lexicon: LSJ
  rationale: The phrase most naturally means 'on the earth.' 'In the land' is possible
    in some contexts, but here the broader sense of earthly human sphere fits the
    contrast with divine wisdom's manifestation among humans.
- source_word: ὤφθη
  chosen: was seen
  alternatives:
  - appeared
  - was made visible
  lexicon: LSJ
  rationale: The passive/intransitive aorist of ὁράω can mean 'was seen' or idiomatically
    'appeared.' 'Was seen' stays closer to the Greek form and preserves the text's
    restraint, avoiding over-interpretation.
- source_word: ἐν τοῖς ἀνθρώποις
  chosen: among men
  alternatives:
  - among human beings
  - among people
  lexicon: LSJ
  rationale: ἀνθρώποις refers to humans generally. Per project philosophy, a gender-accurate
    rendering may retain 'men' where representative humanity is intended. Here 'among
    men' preserves the traditional anthropological force; more inclusive alternatives
    are possible but less formally aligned.
- source_word: συνανεστράφη
  chosen: lived among
  alternatives:
  - associated with
  - moved about among
  - dwelt among
  lexicon: LSJ
  rationale: The verb conveys living/conducting oneself in company with others. 'Lived
    among' is natural English and captures sustained presence better than the more
    formal 'associated with' or the potentially over-theological 'dwelt among'.
