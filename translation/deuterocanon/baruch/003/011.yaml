translation:
  text: you were counted among those in Hades,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''you were reckoned with those in the realm of the dead.'' Greek: ''in
      Hades.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελογίσθης
  chosen: you were counted
  alternatives:
  - you were reckoned
  - you were considered
  - you were added to the number of
  lexicon: BDAG
  rationale: Aorist passive of προσλογίζομαι/προσλογίζω in context conveys being reckoned
    or counted as belonging to a group. 'Counted' is clear modern English and preserves
    the passive sense without over-paraphrase.
- source_word: μετὰ
  chosen: among
  alternatives:
  - with
  lexicon: BDAG
  rationale: With the genitive plural, μετά means 'with,' but in English 'counted
    among' is the most natural idiom after a passive verb of reckoning and accurately
    conveys inclusion in a class.
- source_word: τῶν εἰς ᾅδου
  chosen: those in Hades
  alternatives:
  - those who are in Hades
  - those gone down to Hades
  - the dead
  lexicon: BDAG
  rationale: The phrase literally identifies the group as those 'in Hades.' 'Hades'
    is retained rather than generalized to 'the grave' or 'the dead' because the Greek
    names the underworld realm explicitly. 'Those in Hades' is concise and faithful.
- source_word: ᾅδου
  chosen: Hades
  alternatives:
  - the grave
  - the realm of the dead
  - Sheol
  lexicon: BDAG
  rationale: The Greek text uses ᾅδης, the standard LXX/Greek term for the underworld
    or realm of the dead. 'Hades' preserves the lexical form and avoids importing
    the narrower later English sense of 'hell.' 'Sheol' would reflect a Hebrew background
    term not present in the Greek wording here.
