theological_decisions:
- issue: Rendering of ᾅδου
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - the realm of the dead
  - Sheol
  rationale: To preserve theological and lexical precision, the proper Greek term
    is kept in the main text. This avoids conflating the verse with final judgment
    ('hell') while also not flattening it into merely 'grave.' A lexical alternative
    is preserved in a footnote for readers unfamiliar with the term.
