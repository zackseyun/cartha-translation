translation:
  text: There is no one who knows her way, nor one who considers her path.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκ ἔστιν
  chosen: There is no one
  alternatives:
  - No one is
  - There is not anyone
  lexicon: BDAG
  rationale: Idiomatic English existential rendering of the Greek negated expression,
    preserving the emphatic absence of any such person.
- source_word: ὁ γινώσκων
  chosen: who knows
  alternatives:
  - knowing
  - who understands
  lexicon: BDAG
  rationale: 'The articular present participle functions substantivally: ''the one
    who knows.'' ''Knows'' is the most direct and natural English equivalent here.'
- source_word: τὴν ὁδὸν αὐτῆς
  chosen: her way
  alternatives:
  - its way
  - the way to her
  lexicon: BDAG
  rationale: The feminine pronoun refers back to Wisdom in the surrounding context,
    so 'her' is appropriate rather than impersonal 'its.' ὁδός is well rendered as
    'way' here in wisdom literature imagery.
- source_word: οὐδὲ
  chosen: nor
  alternatives:
  - and not
  - nor is there
  lexicon: BDAG
  rationale: Connects the second clause as a parallel negative statement; 'nor' preserves
    the balanced poetic structure.
- source_word: ὁ ἐνθυμούμενος
  chosen: one who considers
  alternatives:
  - one who reflects on
  - one who thinks about
  - one who remembers
  lexicon: BDAG
  rationale: ἐνθυμέομαι can denote pondering or considering inwardly. 'Considers'
    best fits the parallel with 'knows' and the search-for-wisdom context, without
    narrowing it to mere recollection.
- source_word: τὴν τρίβον αὐτῆς
  chosen: her path
  alternatives:
  - her track
  - her road
  lexicon: BDAG
  rationale: τρίβος overlaps with ὁδός but can suggest a track or path. Rendering
    it as 'path' preserves the poetic variation without flattening both terms into
    the same English word.
