theological_decisions:
- issue: Whether to render τούτους as a simple pronoun or preserve the demonstrative
    force
  chosen_reading: these
  alternative_readings:
  - them
  rationale: The verse contrasts specific peoples or figures mentioned in the surrounding
    context. Preserving the demonstrative keeps the rhetorical specificity of the
    Greek without overinterpreting the referent.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Whether ὁδὸν ἐπιστήμης should be rendered more interpretively as 'the path
    to knowledge'
  chosen_reading: the way of knowledge
  alternative_readings:
  - the path to knowledge
  - the way to understanding
  rationale: The Greek construction is most literally 'way of knowledge.' Rendering
    it this way preserves the wisdom idiom and avoids importing a more directional
    nuance ('to knowledge') that the Greek does not explicitly state.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
