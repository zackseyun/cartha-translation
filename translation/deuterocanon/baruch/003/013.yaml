theological_decisions:
- issue: Conditional construction and implied unreal condition
  chosen_reading: 'Render as a contrary-to-fact past condition: ''If you had walked
    ... you would have lived ...'''
  alternative_readings:
  - If you walked ... you would live ...
  - Had you gone ... you would dwell ...
  rationale: The combination εἰ + aorist indicative with ἄν in the apodosis points
    to an unreal past condition. Rendering it this way preserves the lamenting force
    of the verse rather than turning it into a general maxim.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Metaphorical force of 'the way of God'
  chosen_reading: Keep the metaphor rather than paraphrasing it as 'God's commands'
    or 'God's law'
  alternative_readings:
  - If you had followed God's law...
  - If you had obeyed God...
  rationale: The Greek says 'the way of God,' a broader and more vivid metaphor for
    covenantal conduct. Paraphrasing to 'law' or 'obeyed' would narrow the image beyond
    what the source text explicitly states.
  doctrine_reference: Translation philosophy §1, §6
