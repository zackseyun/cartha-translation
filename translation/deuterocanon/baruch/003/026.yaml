theological_decisions:
- issue: Identity and connotations of 'the giants'
  chosen_reading: Retain 'the giants' as a direct rendering of οἱ γίγαντες without
    specifying mythological or Genesis-6 interpretation.
  alternative_readings:
  - the mighty men
  - the Nephilim
  rationale: The Greek text itself says γίγαντες. Rendering it more interpretively
    as 'Nephilim' would import a specific intertextual identification not explicit
    in this verse, while 'mighty men' weakens the lexical sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
