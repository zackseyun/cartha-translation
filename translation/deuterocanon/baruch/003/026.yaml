translation:
  text: There the giants were born, those renowned from the beginning, great in size,
    skilled in war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those famous from of old, having come into being [then].' The Greek
      phrase 'οἱ ὀνομαστοὶ ἀπʼ ἀρχῆς γενόμενοι' is somewhat compressed; the translation
      renders its sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖ
  chosen: There
  alternatives:
  - In that place
  lexicon: BDAG
  rationale: Adverb of place pointing back to the preceding context; simple deictic
    'There' is natural and sufficiently formal.
- source_word: ἐγεννήθησαν
  chosen: were born
  alternatives:
  - came into being
  - were begotten
  lexicon: BDAG
  rationale: Aorist passive of γεννάω. 'Were born' is the most straightforward English
    rendering here; 'were begotten' is too archaic, and 'came into being' is less
    specific than the birth imagery.
- source_word: οἱ γίγαντες
  chosen: the giants
  alternatives:
  - the giant men
  - the Titans
  lexicon: BDAG
  rationale: γίγαντες conventionally denotes 'giants.' This preserves the traditional
    and lexical sense without importing later mythological precision.
- source_word: οἱ ὀνομαστοὶ
  chosen: those renowned
  alternatives:
  - the famous ones
  - those of name
  - those well-known
  lexicon: BDAG
  rationale: ὀνομαστός means famous or renowned. Rendering it predicatively/appositionally
    as 'those renowned' reads naturally in English while preserving the descriptive
    force.
- source_word: ἀπʼ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from of old
  - since the beginning
  lexicon: BDAG
  rationale: The phrase marks remote antiquity. 'From the beginning' is a transparent
    rendering; in context it means ancient renown rather than a metaphysical absolute
    beginning.
- source_word: γενόμενοι
  chosen: from the beginning
  alternatives:
  - having arisen
  - having come to be
  - who came into being
  lexicon: BDAG
  rationale: γενόμενοι modifies the renowned giants and overlaps semantically with
    ἀπʼ ἀρχῆς in expressing their emergence in ancient times. English idiom is smoother
    if the participial idea is absorbed into 'those renowned from the beginning' rather
    than rendered woodenly as a second finite clause.
- source_word: εὐμεγέθεις
  chosen: great in size
  alternatives:
  - very large
  - of great stature
  lexicon: LSJ
  rationale: The adjective denotes impressive bodily size. 'Great in size' is clear
    modern English and avoids the slightly interpretive heroic nuance of 'of great
    stature.'
- source_word: ἐπιστάμενοι πόλεμον
  chosen: skilled in war
  alternatives:
  - knowing war
  - experienced in battle
  - expert in warfare
  lexicon: BDAG
  rationale: ἐπίσταμαι with an accusative can mean to understand or be skilled in
    something. 'Skilled in war' captures competence in battle in concise English.
