translation:
  text: Hear, Lord, and have mercy, for we have sinned against you;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before you' or 'in your sight.' The Greek phrase can denote presence
      before God as well as offense against him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄκουσον
  chosen: Hear
  alternatives:
  - Listen
  - Hear me
  lexicon: BDAG
  rationale: Aorist imperative of ἀκούω used in prayer language. 'Hear' is the natural
    concise English imperative in direct address to God and preserves the solemn petition
    better than the slightly more colloquial 'Listen.' The object is implicit, so
    'Hear' without 'me/us' best matches the Greek.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος in direct address to God. Per doctrine, κύριος defaults
    to 'Lord.' 'Master' is possible lexically but is less fitting in this prayer context
    and less consistent with biblical address to God.
- source_word: ἐλέησον
  chosen: have mercy
  alternatives:
  - show mercy
  - be merciful
  lexicon: BDAG
  rationale: Aorist imperative of ἐλεέω. 'Have mercy' is idiomatic in English prayer
    and preserves the direct plea. 'Show mercy' is also possible, but 'have mercy'
    better reflects established prayer diction without becoming archaic.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the ground or reason for the plea. 'Because' clearly signals
    causal force in modern English. 'For' is possible but can sound archaic or ambiguous.
- source_word: ἡμάρτομεν
  chosen: we have sinned
  alternatives:
  - we sinned
  lexicon: BDAG
  rationale: Aorist of ἁμαρτάνω. English present perfect communicates a past act with
    present relevance in a penitential prayer, which fits the context better than
    the simple past while remaining faithful to the Greek sense.
- source_word: ἐναντίον σου
  chosen: against you
  alternatives:
  - before you
  - in your sight
  lexicon: BDAG
  rationale: The phrase can denote spatial or relational opposition/presence. With
    ἁμαρτάνω, 'against you' best conveys the offense directed toward God, which is
    the most natural and contextually appropriate English rendering here.
