theological_decisions:
- issue: Rendering the divine address Κύριε
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse is a penitential prayer addressed to God. Following the project's
    contested-terms guidance, κύριος is rendered 'Lord.' No stronger contextual reason
    justifies departing from the default.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of ἐναντίον σου after 'we have sinned'
  chosen_reading: against you
  alternative_readings:
  - before you
  - in your sight
  rationale: The phrase could be rendered more literally as 'before you,' but in a
    confession of sin the relational sense 'against you' better communicates the theological
    force of offense against God without adding content not present in the Greek.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy; §6 Readable modern
    English
