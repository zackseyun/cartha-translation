theological_decisions:
- issue: Gender of the pronoun referring to Wisdom
  chosen_reading: Render αὐτήν as 'her'
  alternative_readings:
  - Render as 'it' for abstract wisdom
  rationale: The Greek uses a feminine pronoun, matching the personified feminine
    presentation of Wisdom in the immediate context. Following the project's gender-accurate
    principle, 'her' preserves the source's literary and theological texture better
    than flattening to 'it'.
