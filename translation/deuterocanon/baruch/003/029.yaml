translation:
  text: Who went up into heaven and took her, and brought her down from the clouds?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, Wisdom, personified as feminine in the surrounding context.
    reason: cross_reference
lexical_decisions:
- source_word: τίς
  chosen: Who
  alternatives:
  - Who is the one who
  lexicon: LSJ
  rationale: Introduces a rhetorical question plainly and idiomatically in English
    without adding emphasis not present in the Greek.
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - ascended
  - went up
  lexicon: LSJ
  rationale: Aorist of ἀναβαίνω. 'Went up' is natural modern English and preserves
    the concrete upward movement; 'ascended' is possible but sounds more elevated
    than the context requires.
- source_word: εἰς τὸν οὐρανόν
  chosen: into heaven
  alternatives:
  - to heaven
  - into the sky
  lexicon: LSJ
  rationale: In this wisdom context οὐρανός refers to heaven, not merely the visible
    sky. 'Into heaven' follows the preposition εἰς more closely than 'to heaven'.
- source_word: ἔλαβεν αὐτήν
  chosen: took her
  alternatives:
  - received her
  - obtained her
  lexicon: LSJ
  rationale: The feminine pronoun refers back to Wisdom in the surrounding context.
    'Took her' is the most direct rendering of λαμβάνω here; 'obtained' is interpretive.
- source_word: κατεβίβασεν
  chosen: brought ... down
  alternatives:
  - brought down
  - led down
  lexicon: LSJ
  rationale: The verb denotes causing to come down. 'Brought down' is idiomatic and
    preserves the causative sense.
- source_word: ἐκ τῶν νεφελῶν
  chosen: from the clouds
  alternatives:
  - out of the clouds
  - from the cloud-masses
  lexicon: LSJ
  rationale: A straightforward rendering of the plural noun; 'from the clouds' is
    natural English and preserves the imagery of heavenly height.
