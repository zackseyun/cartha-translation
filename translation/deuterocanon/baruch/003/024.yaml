theological_decisions:
- issue: Sense of κτήσεως in relation to God's 'house' and 'place'
  chosen_reading: Rendered as 'his possession' rather than 'his creation.'
  alternative_readings:
  - his creation
  rationale: The verse emphasizes the greatness and extent of God's domain. κτῆσις
    can refer to what is possessed or acquired, and that sense fits the immediate
    spatial language ('house,' 'place') more naturally. Because 'creation' is also
    lexically possible and theologically meaningful, it is preserved in a footnote
    rather than excluded.
  doctrine_reference: Translation philosophy §§1, 3, 5
