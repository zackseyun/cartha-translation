translation:
  text: O Israel, how great is the house of God, and how vast is the place of his
    possession;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the place of his creation.' The Greek κτήσεως can denote possession/property,
      and in some contexts creation or what has been acquired.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ
  chosen: O
  alternatives:
  - Oh
  lexicon: LSJ
  rationale: Retains the direct vocative force and elevated address of the Greek without
    adding interpretive content.
- source_word: Ἰσραήλ
  chosen: Israel
  rationale: Standard transliteration of the proper name, following the project's
    policy to transliterate names rather than translate them.
- source_word: ὡς μέγας
  chosen: how great
  alternatives:
  - how عظ great
  - great is
  lexicon: LSJ
  rationale: The exclamatory ὡς with adjective is best rendered as an exclamation
    ('how great') rather than a simple statement ('great is'), preserving the rhetorical
    force.
- source_word: ὁ οἶκος τοῦ θεοῦ
  chosen: the house of God
  alternatives:
  - God's house
  - the household of God
  lexicon: LSJ
  rationale: A formally close rendering fits the likely sense here. 'Household' would
    over-interpret toward people rather than domain or dwelling; 'house of God' preserves
    the ambiguity of temple/realm/dwelling.
- source_word: ἐπιμήκης
  chosen: vast
  alternatives:
  - long
  - extended
  - immense
  lexicon: LSJ
  rationale: Literally the term can denote length or extension, but in English 'how
    long is the place' is unnatural here. 'Vast' captures spatial extensiveness in
    idiomatic modern English while staying close to the sense of great extent.
- source_word: ὁ τόπος
  chosen: the place
  alternatives:
  - the region
  - the domain
  lexicon: LSJ
  rationale: '''Place'' is the straightforward gloss and preserves the concrete-yet-flexible
    spatial language of the Greek.'
- source_word: τῆς κτήσεως αὐτοῦ
  chosen: of his possession
  alternatives:
  - of his creation
  - belonging to him
  - that he possesses
  lexicon: LSJ
  rationale: κτῆσις can denote possession/property or acquisition, and in some contexts
    creation. Here 'of his possession' best matches the genitival construction and
    the theme of God's vast domain. 'Creation' is possible but more interpretive and
    better preserved as an alternative.
