theological_decisions:
- issue: Meaning of 'the dead of Israel'
  chosen_reading: A literal reference to deceased Israelites is retained in the main
    text.
  alternative_readings:
  - a figurative description of Israel as good as dead
  - the spiritually dead of Israel
  rationale: The Greek phrase τῶν τεθνηκότων Ἰσραήλ straightforwardly denotes 'those
    of Israel who have died.' The verse's rhetoric may invoke the exilic community's
    condition, but the translation should not replace the literal wording with an
    interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of τὰ κακά
  chosen_reading: Rendered as 'the evils' in the main text, with 'calamities/disasters'
    preserved as an alternative.
  alternative_readings:
  - the calamities
  - the disasters
  rationale: In biblical Greek, τὰ κακά can denote moral evils or adverse troubles/calamities
    depending on context. Here covenantal consequences are in view; the Greek wording
    is broad enough to preserve in the main text while noting the more idiomatic contextual
    sense.
  doctrine_reference: Consistency of key terms, or documented exception.
