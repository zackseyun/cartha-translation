id: BAR.3.4
reference: Baruch 3:4
source:
  edition: lxx-swete-1909
  text: Κύριε Παντοκράτωρ, ὁ θεὸς Ἰσραήλ, ἄκουσον δὴ τῆς προσευχῆς τῶν τεθνηκότων
    Ἰσραὴλ καὶ υἱῶν τῶν ἁμαρτανόντων ἐναντίον σου, οἳ οὐκ ἤκουσαν τῆς φωνῆς σου θεοῦ
    αὐτῶν, καὶ ἐκολλήθη ἡμῖν τὰ κακά.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: Lord Almighty, God of Israel, please hear the prayer of the dead of Israel
    and of the sons who sin against you, who did not listen to your voice, their God,
    and the evils have clung to us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the calamities have clung to us' or 'the disasters have stuck to us.'
      The Greek literally says 'the evils have clung to us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Standard rendering of κύριος as a divine title per project defaults;
    vocative addressed to God.
- source_word: Παντοκράτωρ
  chosen: Almighty
  alternatives:
  - All-ruler
  - Ruler of all
  lexicon: LSJ
  rationale: Established and semantically fitting rendering for the divine title παντοκράτωρ,
    expressing universal sovereignty in natural English.
- source_word: ἄκουσον δὴ
  chosen: please hear
  alternatives:
  - hear now
  - listen, then
  lexicon: LSJ
  rationale: The imperative ἄκουσον is softened/emphasized by δή; 'please hear' captures
    the supplicatory force in readable modern English better than the more wooden
    'hear now.'
- source_word: τῆς προσευχῆς
  chosen: the prayer
  alternatives:
  - the plea
  lexicon: LSJ
  rationale: προσευχή normally means 'prayer'; no need to weaken or paraphrase it.
- source_word: τῶν τεθνηκότων Ἰσραήλ
  chosen: the dead of Israel
  alternatives:
  - the dead Israelites
  - those of Israel who have died
  lexicon: LSJ
  rationale: τεθνηκότων is the perfect participle of θνῄσκω, literally 'those who
    have died.' 'The dead of Israel' stays close to the Greek while remaining intelligible.
    The phrase is striking and should not be softened away.
- source_word: υἱῶν τῶν ἁμαρτανόντων
  chosen: the sons who sinned
  alternatives:
  - the children who sinned
  - their sons who sinned
  lexicon: LSJ
  rationale: υἱῶν is literally 'sons.' In keeping with the project's gender-accurate
    policy, the masculine term is retained rather than neutralized to 'children.'
    The participle ἁμαρτανόντων is rendered as a past sense ('sinned') in context
    with the following relative clause recounting disobedience.
- source_word: ἐναντίον σου
  chosen: before you
  alternatives:
  - against you
  - in your presence
  lexicon: LSJ
  rationale: The phrase can mean 'before/in the presence of' and in sin contexts can
    imply offense against God. 'Before you' preserves the Greek wording without over-interpreting,
    while the sinful context already conveys hostility.
- source_word: οἳ οὐκ ἤκουσαν τῆς φωνῆς σου
  chosen: who did not listen to your voice
  alternatives:
  - who did not obey your voice
  - who did not hear your voice
  lexicon: LSJ
  rationale: ἀκούω with genitive plus 'voice' can imply both hearing and obeying.
    'Did not listen to your voice' preserves the auditory metaphor while allowing
    the disobedience nuance to remain evident.
- source_word: θεοῦ αὐτῶν
  chosen: you, their God
  alternatives:
  - their God
  lexicon: LSJ
  rationale: 'In English the appositional phrase is best attached to the preceding
    second-person address: ''the voice of you, their God.'' This preserves the Greek
    relationship while producing acceptable English.'
- source_word: ἐκολλήθη ἡμῖν τὰ κακά
  chosen: the evils have clung to us
  alternatives:
  - calamities have stuck to us
  - disasters have come upon us
  lexicon: LSJ
  rationale: κολλάω means 'to glue, cling, stick.' The passive 'have clung to us'
    reflects the vivid metaphor. τὰ κακά can mean 'evils' or concretely 'calamities/disasters';
    'evils' is retained in the main text for formal transparency, with a footnote
    preserving the more idiomatic alternative.
