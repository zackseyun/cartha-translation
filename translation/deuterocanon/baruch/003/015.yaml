translation:
  text: Who found her place, and who entered into her treasuries?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her treasures.' The Greek term can mean either the treasures themselves
      or the treasury/storehouse containing them; 'treasuries' is chosen because the
      verb says one 'entered into' them.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  chosen: Who
  alternatives:
  - who is it that
  lexicon: LSJ
  rationale: Interrogative pronoun introducing direct rhetorical questions; simple
    'Who' is natural and sufficiently formal.
- source_word: εὗρεν
  chosen: found
  alternatives:
  - has found
  - discovered
  lexicon: LSJ
  rationale: Aorist verb rendered as simple past in English within a sequence of rhetorical
    questions. 'Found' is more direct and less interpretive than 'discovered.'
- source_word: τὸν τόπον
  chosen: place
  alternatives:
  - location
  - dwelling place
  lexicon: LSJ
  rationale: τόπος commonly means 'place.' In context, referring to wisdom's whereabouts,
    'place' preserves the metaphor without overinterpreting it as a residence.
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  lexicon: LSJ
  rationale: The antecedent is Wisdom, grammatically feminine in Greek and personified
    in the surrounding context. 'Her' preserves the source's personification better
    than impersonal 'its.'
- source_word: εἰσῆλθεν εἰς
  chosen: entered into
  alternatives:
  - entered
  - went into
  lexicon: LSJ
  rationale: The verb with εἰς explicitly marks movement into; 'entered into' preserves
    that force, though slightly more formal than plain 'entered.'
- source_word: τοὺς θησαυροὺς
  chosen: treasuries
  alternatives:
  - treasures
  - storehouses
  lexicon: LSJ
  rationale: 'θησαυρός can denote both treasure and treasury/storehouse. With the
    preposition ''into,'' a locative sense is more natural: one enters treasuries/storehouses,
    not abstract treasures. ''Treasuries'' best fits the Greek syntax and imagery.'
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  lexicon: LSJ
  rationale: Again refers to personified Wisdom; retaining 'her' keeps the poetic
    and theological personification visible.
