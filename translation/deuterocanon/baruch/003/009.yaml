  text: Ἄκουε, Ἰσραήλ, ἐντολὰς ζωῆς, ἐνωτίσασθε γνῶναι φρόνησιν.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
