theological_decisions:
- issue: Force of the genitive in 'ἐντολὰς ζωῆς'
  chosen_reading: '''the commandments of life'''
  alternative_readings:
  - '''the life-giving commandments'''
  - '''the commandments for life'''
  rationale: The Greek genitive ζωῆς is compact and can be understood in more than
    one related way. The main text preserves the formal ambiguity rather than resolving
    it into a more interpretive paraphrase. This aligns with the project's preference
    to preserve theological and semantic tension where the source allows it.
