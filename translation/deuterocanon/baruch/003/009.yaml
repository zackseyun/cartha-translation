translation:
  text: Hear, Israel, the commandments of life; give ear to know understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the life-giving commandments' or 'the commandments for life.' The Greek
      literally reads 'the commandments of life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'prudence' or 'insight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄκουε
  chosen: Hear
  alternatives:
  - Listen
  lexicon: BDAG
  rationale: Imperative singular of ἀκούω addressed to Israel as a collective entity.
    'Hear' preserves the solemn covenantal summons familiar in biblical style better
    than the more casual 'Listen'.
- source_word: Ἰσραήλ
  chosen: Israel
  rationale: Standard transliteration of the proper name, following the project's
    policy to transliterate names rather than translate them.
- source_word: ἐντολὰς
  chosen: the commandments
  alternatives:
  - commands
  - precepts
  lexicon: BDAG
  rationale: ἐντολή commonly denotes authoritative commands or commandments. 'Commandments'
    preserves the weight and scriptural resonance of divinely given instruction.
- source_word: ζωῆς
  chosen: of life
  alternatives:
  - that give life
  - for life
  lexicon: BDAG
  rationale: The genitive is left relatively formal as 'of life,' which is natural
    in English here and preserves the compact Greek expression without over-interpreting
    whether the sense is source, result, or quality.
- source_word: ἐνωτίσασθε
  chosen: give ear
  alternatives:
  - listen closely
  - pay attention
  lexicon: LSJ
  rationale: Aorist middle imperative plural from ἐνωτίζομαι, literally 'give ear'
    or 'incline the ear.' 'Give ear' preserves the vivid idiom and the heightened
    exhortatory tone.
- source_word: γνῶναι
  chosen: to know
  alternatives:
  - so as to know
  - to learn
  lexicon: BDAG
  rationale: Aorist infinitive of purpose or result. 'To know' is the most direct
    rendering; 'to learn' is possible but adds an educational nuance not required
    by the Greek.
- source_word: φρόνησιν
  chosen: understanding
  alternatives:
  - prudence
  - wisdom
  - insight
  lexicon: BDAG
  rationale: φρόνησις can denote practical understanding, prudence, or insight. 'Understanding'
    is broad, readable, and fits the exhortation without narrowing the term to merely
    intellectual or merely moral prudence.
