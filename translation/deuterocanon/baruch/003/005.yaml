theological_decisions:
- issue: Meaning of 'remember your hand and your name'
  chosen_reading: A plea for God to act in accordance with his known power and covenantal
    identity/honor.
  alternative_readings:
  - A plea for God simply to take notice of his power and name without explicit covenantal
    nuance
  rationale: The phrase is idiomatic and prayerful. Retaining 'hand' and 'name' avoids
    over-interpreting in the main text while allowing the theological implication—divine
    power and covenantal reputation—to remain present.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English without flattening theological weight.
