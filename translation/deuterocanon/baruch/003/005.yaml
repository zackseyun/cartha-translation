translation:
  text: Do not remember the unrighteous acts of our fathers, but remember your hand
    and your name at this time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wrongdoings of our fathers.'
    reason: lexical_alternative
  - marker: b
    text: '''Your hand'' is a biblical idiom that can imply your power or mighty action.'
    reason: cultural_note
lexical_decisions:
- source_word: μὴ μνησθῇς
  chosen: Do not remember
  alternatives:
  - Do not call to mind
  - Do not keep in mind
  lexicon: BDAG
  rationale: A direct imperative/jussive appeal to God not to hold past offenses in
    view. 'Remember' preserves the biblical idiom and the deliberate contrast with
    μνήσθητι later in the verse.
- source_word: ἀδικιῶν
  chosen: the unrighteous acts
  alternatives:
  - the injustices
  - the wrongdoings
  - the sins
  lexicon: BDAG
  rationale: ἀδικία denotes wrongdoing/unrighteousness. 'Unrighteous acts' keeps the
    moral-religious force without narrowing it to social injustice alone or importing
    the more specific term 'sins' where the Greek does not use ἁμαρτίαι.
- source_word: πατέρων ἡμῶν
  chosen: of our fathers
  alternatives:
  - of our ancestors
  lexicon: BDAG
  rationale: The Greek is explicitly masculine and refers to forefathers/previous
    generations. Per gender-accurate policy, 'fathers' is retained rather than neutralizing
    to 'ancestors,' though the latter is a possible contextual gloss.
- source_word: μνήσθητι
  chosen: remember
  alternatives:
  - be mindful of
  - call to mind
  lexicon: BDAG
  rationale: 'Using the same English verb as μνησθῇς preserves the rhetorical contrast:
    do not remember their wrongdoing, but do remember your own covenantal commitments.'
- source_word: χειρός σου
  chosen: your hand
  alternatives:
  - your power
  - your might
  lexicon: LSJ
  rationale: χείρ literally means 'hand.' In biblical idiom it often connotes power
    or action, but the literal rendering is preferable here because it preserves the
    metaphor and pairs naturally with 'your name.' The implied sense of power can
    be understood without paraphrase.
- source_word: ὀνόματός σου
  chosen: your name
  alternatives:
  - your reputation
  lexicon: BDAG
  rationale: '''Name'' is the standard biblical expression and can carry connotations
    of reputation, identity, and covenantal honor. Retaining ''name'' preserves that
    theological richness.'
- source_word: ἐν τῷ καιρῷ τούτῳ
  chosen: at this time
  alternatives:
  - in this time
  - in this season
  - now
  lexicon: BDAG
  rationale: καιρός here refers to the present moment/circumstance. 'At this time'
    is natural English and preserves the situational urgency better than the flatter
    'now'.
