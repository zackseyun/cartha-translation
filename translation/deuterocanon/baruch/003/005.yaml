reference: Baruch 3:5
source:
  edition: lxx-swete-1909
  text: μὴ μνησθῇς ἀδικιῶν πατέρων ἡμῶν, ἀλλὰ μνήσθητι χειρός σου καὶ ὀνόματός σου
    ἐν τῷ καιρῷ τούτῳ·
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
