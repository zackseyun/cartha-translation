theological_decisions:
- issue: Nature of the cause of destruction
  chosen_reading: The verse attributes their perishing to a deficiency of understanding
    and deliberation, without importing a broader doctrinal explanation.
  alternative_readings:
  - A more interpretive rendering could make this moral failure explicit as 'folly'
    or 'senselessness'.
  rationale: The Greek states the cause in wisdom-language terms (φρόνησις, ἀβουλία).
    The translation preserves that language rather than expanding it into a fuller
    theological diagnosis not stated in the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
