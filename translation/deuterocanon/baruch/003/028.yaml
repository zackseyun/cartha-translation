translation:
  text: And they perished because they had no understanding; they perished through
    their own lack of counsel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were destroyed because they lacked prudence; they were destroyed
      because of their lack of judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπώλοντο
  chosen: they perished
  alternatives:
  - they were destroyed
  - they died
  lexicon: BDAG
  rationale: Aorist middle/passive of ἀπόλλυμι here denotes ruin or destruction. 'Perished'
    preserves the solemn tone and avoids over-specifying whether the emphasis is violent
    destruction or fatal ruin.
- source_word: παρὰ τὸ μὴ ἔχειν
  chosen: because they had no
  alternatives:
  - for not having
  - on account of not having
  lexicon: BDAG
  rationale: The construction παρὰ τό + infinitive expresses cause. 'Because they
    had no' gives natural English while preserving the causal force.
- source_word: φρόνησιν
  chosen: understanding
  alternatives:
  - prudence
  - sense
  - wisdom
  lexicon: BDAG
  rationale: φρόνησις commonly denotes practical understanding or prudence. 'Understanding'
    is broad and readable, while still conveying the intellectual-moral deficiency
    in context.
- source_word: διὰ τὴν ἀβουλίαν
  chosen: through their own lack of counsel
  alternatives:
  - because of their folly
  - through their lack of judgment
  - because of their senselessness
  lexicon: LSJ
  rationale: ἀβουλία literally denotes lack of counsel/deliberation, hence poor judgment.
    'Lack of counsel' keeps the lexical link to deficient deliberation rather than
    flattening it to generic 'folly'; 'their own' makes explicit the possessive αὐτῶν.
- source_word: αὐτῶν
  chosen: their own
  alternatives:
  - their
  lexicon: BDAG
  rationale: The possessive is explicit in Greek. 'Their own' slightly sharpens the
    reflexive sense of responsibility already implied by the context without adding
    new content.
