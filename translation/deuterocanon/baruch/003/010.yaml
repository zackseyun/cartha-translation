theological_decisions:
- issue: Nature of defilement in συνεμιάνθης τοῖς νεκροῖς
  chosen_reading: retain broad 'become defiled with the dead' language without narrowing
    to exclusively ritual or metaphorical death
  alternative_readings:
  - ritually defiled by contact with corpses
  - counted among the dead metaphorically
  rationale: The Greek supports both ritual-impurity resonance and figurative association
    with the realm of death. The translation preserves that tension rather than resolving
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
