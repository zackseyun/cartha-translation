translation:
  text: What is it, Israel? Why is it that you are in the land of enemies? You have
    grown old in a foreign land; you have become defiled with the dead,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What is the matter, Israel? Why are you in the land of enemies?' The
      opening τί ἐστιν can function idiomatically as a lamenting exclamation or question.
    reason: lexical_alternative
  - marker: b
    text: '''Defiled with the dead'' may evoke either ritual impurity through association
      with the dead or a figurative condition of being as good as dead in exile; the
      Greek allows both resonances.'
    reason: alternative_reading
lexical_decisions:
- source_word: τί ἐστιν
  chosen: What is it
  alternatives:
  - What is the matter
  - Why
  lexicon: LSJ
  rationale: The idiom introduces a lamenting question. 'What is it' stays close to
    the Greek while remaining intelligible; the following τί ὅτι then carries the
    more explicit 'why' sense.
- source_word: ἐν γῇ τῶν ἐχθρῶν
  chosen: in the land of enemies
  alternatives:
  - in the land of your enemies
  - in enemy territory
  lexicon: LSJ
  rationale: The Greek lacks an explicit possessive pronoun, so 'of enemies' is the
    most formally accurate. English idiom is preserved by adding 'the land of.' 'Your
    enemies' is interpretively natural but not stated.
- source_word: ἐπαλαιώθης
  chosen: you have grown old
  alternatives:
  - you have become old
  - you have worn out
  lexicon: LSJ
  rationale: The passive/aoristic form conveys having become old or aged. 'Grown old'
    is natural English and preserves the metaphor of prolonged exile rather than shifting
    to a purely figurative 'worn out'.
- source_word: γῇ ἀλλοτρίᾳ
  chosen: in a foreign land
  alternatives:
  - in an alien land
  - in another's land
  lexicon: LSJ
  rationale: ἀλλότριος here denotes what belongs to another or is foreign. 'Foreign
    land' is clear modern English and fits the exile context.
- source_word: συνεμιάνθης
  chosen: you have become defiled
  alternatives:
  - you were polluted
  - you were made unclean
  lexicon: LSJ
  rationale: The verb μιαίνω commonly denotes ritual or moral defilement. 'Become
    defiled' preserves the resulting state without over-specifying whether the uncleanness
    is ritual, moral, or both.
- source_word: τοῖς νεκροῖς
  chosen: with the dead
  alternatives:
  - among the dead
  - by the dead
  lexicon: LSJ
  rationale: 'The dative after the compound verb can be rendered naturally as association:
    ''with the dead.'' This keeps the ambiguity of contamination by contact/association,
    which suits the context and leads into the next verse''s imagery of Sheol-like
    status.'
