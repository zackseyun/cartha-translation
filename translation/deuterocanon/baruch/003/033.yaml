translation:
  text: He sends out the light, and it goes; he called it, and it obeyed him with
    trembling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the one who sends out the light, and it goes.' The Greek
      begins with an articular participle functioning as a title-like description
      of God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἀποστέλλων
  chosen: He sends out
  alternatives:
  - the one who sends
  - he dispatches
  lexicon: BDAG
  rationale: The articular participle functions substantivally, referring back to
    God in context. English finite verbal style is more natural than a bare participial
    phrase while preserving the ongoing, characteristic action.
- source_word: τὸ φῶς
  chosen: the light
  alternatives:
  - light
  lexicon: BDAG
  rationale: The article is retained naturally in English. In context this is cosmic
    light under God's command, not merely metaphorical illumination.
- source_word: πορεύεται
  chosen: it goes
  alternatives:
  - it travels
  - it proceeds
  lexicon: BDAG
  rationale: A simple intransitive rendering best matches the straightforward personification
    of light responding to divine sending.
- source_word: ἐκάλεσεν
  chosen: he called
  alternatives:
  - he summoned
  lexicon: BDAG
  rationale: The verb depicts divine command in personal terms. 'Called' preserves
    the verbal parallelism and avoids over-specifying a formal summons.
- source_word: ὑπήκουσεν αὐτῷ
  chosen: it obeyed him
  alternatives:
  - it listened to him
  - it heeded him
  lexicon: BDAG
  rationale: ὑπακούω here carries the sense of responsive obedience, fitting the portrayal
    of creation subject to God. 'Obeyed' is clearer in English than the more literal
    'listened under/to.'
- source_word: τρόμῳ
  chosen: with trembling
  alternatives:
  - in trembling
  - fearfully
  lexicon: BDAG
  rationale: The dative is rendered adverbially. 'With trembling' preserves the vivid
    anthropomorphic image of creation responding in awe.
