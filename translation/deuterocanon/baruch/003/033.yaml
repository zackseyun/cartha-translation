theological_decisions:
- issue: Anthropomorphic portrayal of light obeying God
  chosen_reading: Retain the personification directly in the main text.
  alternative_readings:
  - Soften to an impersonal description of natural order
  rationale: The Greek explicitly personifies light as going, being called, and obeying
    with trembling. Preserving this imagery maintains the theological emphasis on
    God's sovereign command over creation without flattening the poetry.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referent of the articular participle ὁ ἀποστέλλων
  chosen_reading: Render with explicit personal subject 'He,' referring to God from
    the surrounding context.
  alternative_readings:
  - The one who sends out the light
  rationale: The participle is substantival, but English style favors an explicit
    pronoun here. The context clearly identifies God as the actor, so this does not
    import a new claim but makes the sentence readable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
