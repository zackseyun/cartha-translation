theological_decisions:
- issue: Exclusive monotheistic claim in the comparative clause
  chosen_reading: no other will be reckoned beside him
  alternative_readings:
  - no other will be counted in comparison with him
  - no other will be considered alongside him
  rationale: The Greek states God's uniqueness without requiring an expanded doctrinal
    paraphrase such as 'there is no other God.' The chosen wording preserves the text's
    comparative/passive formulation while clearly expressing exclusivity.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
