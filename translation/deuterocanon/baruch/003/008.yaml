theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The project default for κύριος is 'Lord.' In this deuterocanonical Greek
    context it refers to Israel's God in covenantal language; 'Lord' is the prescribed
    and natural rendering.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Interpretation of ὄφλησιν in a judgment context
  chosen_reading: liability to payment
  alternative_readings:
  - penalty
  - punishment
  - indebtedness
  rationale: The Greek term is semantically broader than simple 'punishment' and retains
    the idea of incurred obligation or debt under judgment. The main text preserves
    that nuance, while a more idiomatic alternative is footnoted for readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency/documented
    exception)
