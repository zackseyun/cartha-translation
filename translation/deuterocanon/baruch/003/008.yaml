id: BAR.3.8
reference: Baruch 3:8
source:
  edition: lxx-swete-1909
  text: ἰδοὺ ἡμεῖς σήμερον ἐν τῇ ἀποικίᾳ ἡμῶν, οὗ διέσπειρας ἡμᾶς ἐκεῖ εἰς ὀνειδισμὸν
    καὶ εἰς ἀρὰν καὶ εἰς ὄφλησιν κατὰ πάσας τὰς ἀδικίας πατέρων ἡμῶν, οἳ ἀπέστησαν
    ἀπὸ Κυρίου θεοῦ ἡμῶν.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: Behold, today we are in our exile, where you scattered us, for reproach and
    for a curse and for payment, according to all the wrongdoings of our fathers,
    who turned away from the Lord our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for penalty' or 'for indebtedness.' The Greek term carries the sense
      of liability or obligation incurred, here in a context of divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Introduces emphatic attention to the present condition. 'Look' preserves
    the force in readable modern English better than the more archaic 'Behold.'
- source_word: ἀποικίᾳ
  chosen: exile
  alternatives:
  - captivity
  - colony
  - sojourn
  lexicon: LSJ
  rationale: In this context the term refers to the condition/place of deportation
    among foreign peoples. 'Exile' best captures the covenantal and historical sense
    without the narrower connotations of 'colony.'
- source_word: διέσπειρας
  chosen: scattered
  alternatives:
  - dispersed
  - drove away
  lexicon: LSJ
  rationale: The verb denotes dispersal among the nations. 'Scattered' is the most
    natural and biblically resonant English rendering.
- source_word: ὀνειδισμὸν
  chosen: reproach
  alternatives:
  - disgrace
  - insult
  lexicon: BDAG
  rationale: The noun conveys public shame and object of taunt. 'Reproach' preserves
    that covenantal-biblical register better than the flatter 'disgrace.'
- source_word: ἀρὰν
  chosen: curse
  alternatives:
  - accursed state
  lexicon: LSJ
  rationale: Straightforward rendering of the noun for curse; no need to expand beyond
    the source.
- source_word: ὄφλησιν
  chosen: liability to payment
  alternatives:
  - penalty
  - indebtedness
  - punishment
  lexicon: LSJ
  rationale: The term can denote indebtedness, liability, or penalty. 'Liability to
    payment' keeps the underlying sense of obligation incurred, while allowing the
    punitive context to remain visible. Because this is less idiomatic in English,
    an alternative is preserved in a footnote.
- source_word: κατὰ πάσας τὰς ἀδικίας
  chosen: according to all the wrongdoings
  alternatives:
  - because of all the unrighteous acts
  - in keeping with all the injustices
  lexicon: BDAG
  rationale: 'κατά here expresses correspondence or measure: their present state accords
    with their fathers'' sins. ''Wrongdoings'' is accessible and morally clear without
    over-specifying legal injustice.'
- source_word: ἀπέστησαν
  chosen: turned away
  alternatives:
  - departed
  - rebelled
  - apostatized
  lexicon: BDAG
  rationale: The verb indicates defection from the Lord. 'Turned away' is clear and
    faithful; 'apostatized' is too technical, while 'rebelled' adds a nuance not explicit
    in the verb alone.
- source_word: Κυρίου θεοῦ ἡμῶν
  chosen: the Lord our God
  alternatives:
  - the Lord God of us
  lexicon: BDAG
  rationale: Follows the standard rendering of κύριος as 'Lord' per doctrine, and
    preserves the covenantal phrase naturally in English.
