theological_decisions:
- issue: Rendering παῖς for Jacob in relation to God
  chosen_reading: servant
  alternative_readings:
  - child
  - son
  rationale: Although παῖς can denote child or son, in this covenantal context 'servant'
    better reflects biblical usage for God's chosen servant and avoids overstating
    filial language not explicit here.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; consistency of key
    terms'
- issue: Whether to smooth Jacob/Israel into a single referent
  chosen_reading: retain both names in parallel
  alternative_readings:
  - collapse to 'Jacob/Israel' once
  - interpret as the people of Israel only
  rationale: The Greek presents a poetic parallelism with both names. Retaining both
    preserves the literary and theological texture of election language without interpretive
    reduction.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
