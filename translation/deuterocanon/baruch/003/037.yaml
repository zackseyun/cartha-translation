translation:
  text: He found out every way of knowledge, and gave it to Jacob his servant and
    to Israel his beloved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his child' or 'his son' for 'his servant' (Greek παῖς).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεῦρεν
  chosen: found out
  alternatives:
  - discovered
  - found
  lexicon: LSJ
  rationale: The compound verb conveys discovering or finding out. 'Found out' preserves
    the active sense of uncovering or ascertaining, slightly stronger than simple
    'found.'
- source_word: πᾶσαν ὁδὸν
  chosen: every way
  alternatives:
  - the whole way
  - every path
  lexicon: LSJ
  rationale: ὁδός is literally 'way' or 'path.' In this wisdom context it is metaphorical
    for course or mode. 'Every way' keeps the metaphor without over-interpreting.
- source_word: ἐπιστήμης
  chosen: of knowledge
  alternatives:
  - of understanding
  - of skill
  - of wisdom
  lexicon: LSJ
  rationale: ἐπιστήμη commonly denotes knowledge or understanding. 'Knowledge' is
    the most direct rendering here and avoids importing the more specialized biblical
    term 'wisdom' where the Greek does not use σοφία.
- source_word: ἔδωκεν αὐτήν
  chosen: gave it
  alternatives:
  - granted it
  - gave her
  lexicon: LSJ
  rationale: The pronoun refers back to the feminine ὁδόν. In English the referent
    is the abstract phrase 'way of knowledge,' so 'it' is idiomatic and clear.
- source_word: τῷ παιδὶ αὐτοῦ
  chosen: his servant
  alternatives:
  - his child
  - his son
  lexicon: LSJ
  rationale: παῖς can mean child, son, or servant. In scriptural Greek, when used
    of Jacob in relation to God, 'servant' best fits covenantal language and avoids
    implying literal sonship in this phrase.
- source_word: τῷ ἠγαπημένῳ ὑπʼ αὐτοῦ
  chosen: his beloved
  alternatives:
  - the one loved by him
  - his loved one
  lexicon: LSJ
  rationale: The perfect/passive participial expression means 'the one loved by him.'
    'His beloved' is natural English and preserves the relational force.
- source_word: Ἰακώβ ... Ἰσραήλ
  chosen: Jacob ... Israel
  rationale: Personal names are transliterated per project philosophy. The paired
    names likely refer to the same covenant people under parallel designations, and
    both should be retained.
