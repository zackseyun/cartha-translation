translation:
  text: And the sons of Hagar also, who seek understanding on the earth—the merchants
    of Merran and Teman, and the storytellers and seekers of understanding—did not
    know the way of wisdom, nor did they remember her paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads 'Merran,' an unusual place name in this witness; some traditions
      identify or normalize it differently. The translation preserves the extant Greek
      form rather than silently emending it.
    reason: textual_variant
  - marker: b
    text: Or 'myth-makers' for 'storytellers'; the Greek refers to people occupied
      with tales or myths.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ τε υἱοὶ Ἁγὰρ
  chosen: And the sons of Hagar also
  alternatives:
  - and the sons of Hagar
  - the descendants of Hagar also
  lexicon: LSJ
  rationale: υἱοί is rendered 'sons' rather than the more interpretive 'descendants'
    to stay close to the Greek while remaining natural. τε is lightly represented
    by 'also' to preserve the additive force in the list.
- source_word: οἱ ἐκζητοῦντες τὴν σύνεσιν
  chosen: who seek understanding
  alternatives:
  - who diligently seek understanding
  - who search out insight
  lexicon: LSJ
  rationale: ἐκζητέω carries an intensive sense of seeking, but English 'seek' in
    context is sufficient and readable. σύνεσις is rendered 'understanding' consistently
    here.
- source_word: οἱ ἐπὶ γῆς
  chosen: on the earth
  alternatives:
  - on earth
  - in the land
  lexicon: LSJ
  rationale: The phrase is somewhat abrupt in Greek. 'On the earth' preserves the
    broad, worldly scope better than the more localized 'in the land.'
- source_word: οἱ ἔμποροι τῆς Μερρὰν καὶ Θαιμάν
  chosen: the merchants of Merran and Teman
  alternatives:
  - the traders of Merran and Teman
  lexicon: LSJ
  rationale: ἔμποροι naturally means 'merchants' or 'traders'; 'merchants' is slightly
    more idiomatic in this elevated register. The place names are transliterated from
    the Greek witness as personal/geographical names should be. 'Teman' is the standard
    English form of Θαιμάν.
- source_word: οἱ μυθολόγοι
  chosen: the storytellers
  alternatives:
  - the myth-makers
  - the tale-tellers
  lexicon: LSJ
  rationale: The term denotes people occupied with tales/myths. 'Storytellers' is
    readable modern English and avoids importing a more technical or pejorative sense
    than the context requires, while still conveying verbal tradition rather than
    true wisdom.
- source_word: οἱ ἐκζητηταὶ τῆς συνέσεως
  chosen: seekers of understanding
  alternatives:
  - searchers for understanding
  - investigators of insight
  lexicon: LSJ
  rationale: This nominal form echoes the earlier participial phrase. Rendering it
    with the same core term 'understanding' preserves the rhetorical repetition in
    Greek.
- source_word: ὁδὸν δὲ σοφίας
  chosen: the way of wisdom
  alternatives:
  - wisdom's way
  - the path of wisdom
  lexicon: LSJ
  rationale: ὁδός is 'way' or 'road'; 'the way of wisdom' preserves the metaphor and
    leaves the later τρίβους available as 'paths,' maintaining the Greek variation.
- source_word: οὐκ ἔγνωσαν
  chosen: did not know
  alternatives:
  - have not known
  - failed to know
  lexicon: LSJ
  rationale: Aorist narrative sense is best represented by simple past here.
- source_word: οὐδὲ ἐμνήσθησαν τὰς τρίβους αὐτῆς
  chosen: nor did they remember her paths
  alternatives:
  - nor did they call her paths to mind
  - nor were they mindful of her tracks
  lexicon: LSJ
  rationale: ἐμνήσθησαν is naturally 'remembered.' τρίβοι are tracks/paths; 'paths'
    is idiomatic and fits wisdom imagery. The feminine pronoun refers back to wisdom
    personified, so 'her paths' preserves the personification.
