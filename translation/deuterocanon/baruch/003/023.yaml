theological_decisions:
- issue: Personification of wisdom
  chosen_reading: Retain feminine reference in 'her paths'
  alternative_readings:
  - its paths
  rationale: σοφία is grammatically feminine and personified throughout the context.
    Rendering the pronoun as 'her' preserves the literary-theological portrayal without
    overexplaining it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Ethnographic/geographical names in a difficult deuterocanonical witness
  chosen_reading: Keep 'Merran' as transliterated from the Greek source and 'Teman'
    in standard English form
  alternative_readings:
  - emend the place name to a more familiar form
  rationale: The Zone 1 Greek witness reads Μερρὰν, and the source metadata notes
    a major mismatch. Because the source form itself is uncertain or at least unusual,
    the translation should not silently normalize it beyond standard transliteration.
    This preserves auditability and source honesty.
  doctrine_reference: PHILOSOPHY.md §What we are translating; §transparent
