theological_decisions:
- issue: Force of τῇ τοῦ θεοῦ δόξῃ in relation to Israel's safe walking
  chosen_reading: in the glory of God
  alternative_readings:
  - by the glory of God
  - through the glory of God
  rationale: 'The dative is somewhat open: it may denote sphere, accompaniment, or
    means. The main text preserves this theological breadth rather than narrowing
    it to a purely instrumental sense. The alternatives are worth preserving because
    they affect whether God''s glory is the environment of Israel''s journey or the
    means by which it is secured.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
