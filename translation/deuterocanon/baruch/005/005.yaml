translation:
  text: Rise up, Jerusalem, and stand on the height, and look around toward the east,
    and see your children gathered from the setting of the sun to its rising, at the
    word of the Holy One, rejoicing in the remembrance of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the word of the Holy One.' The dative τῷ ῥήματι may be understood
      instrumentally.
    reason: lexical_alternative
  - marker: b
    text: Or 'because God remembered them' or 'in remembrance of God.' The Greek phrase
      is compact and may point either to God's remembering his people or to their
      remembering God.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνάστηθι
  chosen: Rise up
  alternatives:
  - Arise
  - Stand up
  lexicon: LSJ
  rationale: Aorist imperative calling Jerusalem to action. 'Rise up' is natural modern
    English while preserving the force of the summons.
- source_word: στῆθι ἐπὶ τοῦ ὑψηλοῦ
  chosen: stand on the height
  alternatives:
  - stand upon the high place
  - take your stand on the high mountain
  lexicon: LSJ
  rationale: The phrase is singular and somewhat general in Greek; 'the height' preserves
    the elevated vantage point without over-specifying 'mountain,' which the text
    does not state here.
- source_word: περίβλεψαι
  chosen: look around
  alternatives:
  - look about
  - look all around
  lexicon: LSJ
  rationale: The verb suggests looking around from an elevated position. 'Look around'
    is concise and idiomatic.
- source_word: πρὸς ἀνατολάς
  chosen: toward the east
  alternatives:
  - toward the eastlands
  - toward the sunrise
  lexicon: LSJ
  rationale: 'Although plural in Greek, the idiomatic directional sense in English
    is singular: ''toward the east.'''
- source_word: συνηγμένα τὰ τέκνα
  chosen: your children gathered
  alternatives:
  - your children assembled
  - your sons and daughters gathered
  lexicon: LSJ
  rationale: Perfect passive participle conveys a gathered state. 'Children' reflects
    τέκνα accurately without narrowing to males.
- source_word: ἀπὸ ἡλίου δυσμῶν ἕως ἀνατολῶν
  chosen: from the setting of the sun to its rising
  alternatives:
  - from west to east
  - from sunset to sunrise
  lexicon: LSJ
  rationale: This preserves the imagery of solar setting and rising rather than flattening
    it to compass points, while still communicating the full geographic sweep.
- source_word: τῷ ῥήματι
  chosen: at the word
  alternatives:
  - by the word
  - at the command
  lexicon: LSJ
  rationale: The dative can express means or basis. 'At the word' preserves the sense
    of divine utterance/command prompting the gathering, without over-interpreting
    the nuance.
- source_word: τοῦ ἁγίου
  chosen: the Holy One
  alternatives:
  - the Holy
  - the Holy God
  lexicon: LSJ
  rationale: The genitive with article functions substantivally. 'The Holy One' is
    the most natural English equivalent and preserves the reverential title without
    adding 'God' where the Greek does not.
- source_word: χαίροντες
  chosen: rejoicing
  alternatives:
  - being glad
  - celebrating
  lexicon: LSJ
  rationale: Present participle describing the gathered children. 'Rejoicing' keeps
    the participial connection and elevated tone.
- source_word: τῇ τοῦ θεοῦ μνείᾳ
  chosen: in the remembrance of God
  alternatives:
  - because of God's remembrance
  - at God's remembrance
  - that God has remembered them
  lexicon: LSJ
  rationale: μνεία can mean remembrance or mention. The phrase is somewhat compact
    and may imply God's remembering them or their remembering God. 'In the remembrance
    of God' preserves the ambiguity more transparently than resolving it.
