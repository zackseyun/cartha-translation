theological_decisions:
- issue: Meaning of τῇ τοῦ θεοῦ μνείᾳ
  chosen_reading: A deliberately ambiguous phrase rendered 'in the remembrance of
    God'
  alternative_readings:
  - because God remembered them
  - in remembrance of God
  rationale: The Greek permits either an objective sense (their remembrance of God)
    or a subjective/genitival sense (God's remembrance of them). The verse does not
    force a single theological interpretation, so the translation preserves the tension
    rather than resolving it.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it.
