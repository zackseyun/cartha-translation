theological_decisions:
- issue: Rendering of Jerusalem's restored honor in λαμπρότητα
  chosen_reading: splendor
  alternative_readings:
  - glory
  - radiance
  rationale: The verse speaks of God making Jerusalem's restored magnificence visible
    to all. 'Splendor' preserves the luminous and honorific sense without importing
    the more theologically loaded 'glory' unless the Greek explicitly uses δόξα.
