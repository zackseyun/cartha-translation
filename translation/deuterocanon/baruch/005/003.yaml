translation:
  text: For God will show your splendor to all under heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'radiance' or 'glory' for 'splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ γὰρ
  chosen: For
  alternatives:
  - because
  - for indeed
  lexicon: BDAG
  rationale: γάρ introduces the ground or explanation for the preceding exhortation/promise.
    'For' preserves the connective force in natural English.
- source_word: θεὸς
  chosen: God
  lexicon: BDAG
  rationale: The noun straightforwardly refers to Israel's God in this context; no
    title ambiguity is present.
- source_word: δείξει
  chosen: will show
  alternatives:
  - will display
  - will reveal
  - will make visible
  lexicon: BDAG
  rationale: Future active of δείκνυμι. 'Will show' is the most direct and idiomatic
    rendering, preserving God's action of making Jerusalem's glory visible to others.
- source_word: τῇ ὑπʼ οὐρανὸν πάσῃ
  chosen: to all under heaven
  alternatives:
  - to the whole world under heaven
  - to everyone beneath heaven
  lexicon: BDAG
  rationale: The phrase is an idiom for the whole inhabited world or all peoples everywhere.
    'To all under heaven' keeps the imagery and broad scope without over-paraphrasing.
- source_word: τὴν σὴν
  chosen: your
  lexicon: BDAG
  rationale: Second-person singular possessive, addressing Jerusalem/Zion as in the
    surrounding context. English 'your' preserves the direct address.
- source_word: λαμπρότητα
  chosen: splendor
  alternatives:
  - radiance
  - glory
  - brightness
  lexicon: BDAG
  rationale: λαμπρότης denotes brightness, magnificence, or splendor. 'Splendor' best
    captures both visible brilliance and exalted dignity here. 'Glory' is possible
    but less tied to the term's luminous nuance.
