translation:
  text: For God will lead Israel with gladness, by the light of his glory, with mercy
    and righteousness from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with mercy and justice from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡγήσεται
  chosen: will lead
  alternatives:
  - will guide
  - will bring
  lexicon: BDAG
  rationale: Future middle of ἡγέομαι in this context denotes leading or guiding a
    people. 'Will lead' is natural English and preserves the exodus/restoration imagery
    without overinterpreting the destination.
- source_word: εὐφροσύνης
  chosen: gladness
  alternatives:
  - joy
  - rejoicing
  lexicon: LSJ
  rationale: The noun denotes joyfulness or gladness. 'Gladness' fits the prepositional
    phrase μετʼ εὐφροσύνης smoothly and keeps the tone elevated but readable.
- source_word: τῷ φωτὶ
  chosen: by the light
  alternatives:
  - in the light
  - with the light
  lexicon: LSJ
  rationale: 'The dative here is best taken instrumentally or associatively with the
    leading: God leads Israel by means of the light of his glory. ''By the light''
    expresses that sense clearly.'
- source_word: δόξης
  chosen: glory
  alternatives:
  - splendor
  - majesty
  lexicon: LSJ
  rationale: δόξα regularly carries the sense 'glory' in biblical Greek, especially
    in reference to God. 'Splendor' is possible but weaker theologically and less
    consistent with biblical usage.
- source_word: ἐλεημοσύνῃ
  chosen: mercy
  alternatives:
  - compassion
  - almsgiving
  - merciful kindness
  lexicon: LSJ
  rationale: Although ἐλεημοσύνη can mean 'almsgiving' in some contexts, here paired
    with δικαιοσύνη and modified by τῇ παρʼ αὐτοῦ it refers to a divine quality or
    action toward Israel. 'Mercy' best fits the context.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness' unless context
    strongly favors 'justice.' Here, as a divine attribute accompanying mercy, 'righteousness'
    is the better main-text rendering, while 'justice' remains a viable alternative.
- source_word: τῇ παρʼ αὐτοῦ
  chosen: from him
  alternatives:
  - that comes from him
  - from his presence
  lexicon: LSJ
  rationale: The article with the prepositional phrase modifies both mercy and righteousness
    as proceeding from God. 'From him' is concise and faithful; 'from his presence'
    would add specificity not demanded by the Greek.
