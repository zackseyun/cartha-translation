translation:
  text: Put on the robe of the righteousness that comes from God, and place on your
    head the turban of the glory of the Eternal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cloak' or 'mantle' for the garment term; the Greek word refers to an
      outer wrap or robe.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice that comes from God' for 'righteousness that comes from God.'
    reason: lexical_alternative
  - marker: c
    text: Or 'headdress' or traditional 'mitre' for 'turban.'
    reason: lexical_alternative
  - marker: d
    text: The phrase may also be understood more loosely as 'the eternal glory,' but
      the Greek likely points to 'the glory of the Eternal'—that is, God's glory.
    reason: alternative_reading
lexical_decisions:
- source_word: περιβαλοῦ
  chosen: Put on
  alternatives:
  - Clothe yourself with
  - Wrap yourself in
  lexicon: LSJ
  rationale: Imperative of περιβάλλω meaning to put on or clothe oneself. 'Put on'
    is natural modern English while preserving the clothing metaphor.
- source_word: διπλοΐδα
  chosen: robe
  alternatives:
  - mantle
  - cloak
  - double garment
  lexicon: LSJ
  rationale: The noun denotes an outer garment, historically a doubled or ample wrap.
    'Robe' communicates a dignified ceremonial garment in context better than the
    more technical 'double garment,' while avoiding over-specific reconstruction.
- source_word: τῆς παρὰ τοῦ θεοῦ δικαιοσύνης
  chosen: of the righteousness that comes from God
  alternatives:
  - of righteousness from God
  - of the justice from God
  lexicon: BDAG
  rationale: δικαιοσύνη defaults to 'righteousness' per doctrine. The phrase παρὰ
    τοῦ θεοῦ indicates source/origin, so 'that comes from God' makes the relation
    clear in idiomatic English.
- source_word: ἐπίθου
  chosen: place
  alternatives:
  - put
  - set
  lexicon: LSJ
  rationale: Imperative of ἐπιτίθημι. 'Place' fits the formal poetic register and
    pairs well with the object worn on the head.
- source_word: μίτραν
  chosen: turban
  alternatives:
  - mitre
  - headband
  - headdress
  lexicon: LSJ
  rationale: μίτρα refers to a head-wrap or turban-like headdress. 'Turban' is the
    clearest common-English equivalent; 'mitre' is traditional but can sound ecclesiastical
    and potentially misleading.
- source_word: τῆς δόξης τοῦ αἰωνίου
  chosen: of the glory of the Eternal
  alternatives:
  - of the glory of the everlasting One
  - of the glory of the age-enduring One
  lexicon: LSJ
  rationale: The genitive likely identifies the glory belonging to the Eternal, i.e.,
    God. Rendering αἰώνιος substantivally as 'the Eternal' preserves the Greek's compactness
    and theological weight without adding an explicit noun absent from the text.
