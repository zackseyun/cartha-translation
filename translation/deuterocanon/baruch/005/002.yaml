theological_decisions:
- issue: Rendering δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Per doctrine, δικαιοσύνη is normally rendered 'righteousness,' with 'justice'
    preserved as an alternative where relevant. In this poetic clothing metaphor,
    'righteousness' better matches the moral and covenantal sense of the garment imagery.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: Understanding τοῦ αἰωνίου as a substantive divine title
  chosen_reading: the Eternal
  alternative_readings:
  - the everlasting One
  - eternal glory
  rationale: The Greek most naturally reads as 'the glory of the Eternal,' with αἰώνιος
    functioning substantivally for God. This preserves the likely divine reference
    rather than flattening the phrase into a mere adjective modifying glory.
  doctrine_reference: DOCTRINE.md §1, §3
