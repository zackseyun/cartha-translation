translation:
  text: For they went out from you on foot, being led away by enemies, but God brings
    them back to you, carried with glory as on a royal throne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God leads them in to you'; the Greek verb is literally 'brings in' or
      'leads in,' here in the context of return from exile.
    reason: lexical_alternative
  - marker: b
    text: Or 'borne' or 'lifted up'; the image contrasts their going out on foot with
      an honored, exalted return.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  chosen: went out
  alternatives:
  - departed
  - came out
  lexicon: LSJ
  rationale: A straightforward past narrative verb; 'went out' preserves the movement
    away from Jerusalem/Zion without adding interpretive nuance.
- source_word: παρὰ σοῦ
  chosen: from you
  alternatives:
  - away from you
  - from your presence
  lexicon: LSJ
  rationale: Addresses Jerusalem/Zion personified in context. 'From you' is the most
    direct rendering and keeps the emotional force of separation.
- source_word: πεζοὶ
  chosen: on foot
  alternatives:
  - as foot travelers
  - walking
  lexicon: LSJ
  rationale: Idiomatic English for the adverbial sense of traveling without mounts
    or honor. It contrasts naturally with the exalted return.
- source_word: ἀγόμενοι ὑπʼ ἐχθρῶν
  chosen: being led away by enemies
  alternatives:
  - driven by enemies
  - taken away by enemies
  lexicon: LSJ
  rationale: The participle conveys passive movement under hostile control. 'Being
    led away' preserves the captivity/exile sense without overstating violence.
- source_word: εἰσάγει
  chosen: brings them back
  alternatives:
  - leads them in
  - brings them in
  lexicon: LSJ
  rationale: Literally 'brings in/introduces,' but in context of return to Jerusalem
    the English idiom 'brings them back' best communicates restoration while remaining
    faithful to the directional sense toward 'you.'
- source_word: αἰρομένους
  chosen: carried
  alternatives:
  - borne
  - lifted up
  lexicon: LSJ
  rationale: The participle contrasts with 'on foot' and suggests being borne aloft
    in honor. 'Carried' is clear modern English; 'borne' is possible but less natural.
- source_word: μετὰ δόξης
  chosen: with glory
  alternatives:
  - in glory
  - with splendor
  lexicon: LSJ
  rationale: Retains the theological and honorific weight of δόξα. 'With glory' is
    concise and preserves the Greek preposition.
- source_word: ὡς θρόνον βασιλείας
  chosen: as on a royal throne
  alternatives:
  - like a throne of a kingdom
  - as a kingly throne
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek. 'As on a royal throne' brings
    out the image of regal exaltation in idiomatic English while preserving the comparison
    introduced by ὡς.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: LSJ
  rationale: Standard rendering; no contextual reason to expand or paraphrase.
