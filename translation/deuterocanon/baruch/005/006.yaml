theological_decisions:
- issue: Restoration imagery in contrast with exile
  chosen_reading: 'The return is rendered as a reversal of humiliation: they left
    ''on foot'' under enemy control, but God now ''brings them back'' ''carried with
    glory as on a royal throne.'''
  alternative_readings:
  - A more formal rendering could keep 'brings them in to you' instead of 'brings
    them back to you.'
  rationale: The verse's theology centers on divine reversal and vindication. 'Brings
    them back' makes the restoration sense explicit from the context without importing
    claims beyond the Greek.
  doctrine_reference: Translation philosophy §1, §6
- issue: Image of exalted transport
  chosen_reading: The simile is preserved rather than interpreted away.
  alternative_readings:
  - '''borne in glory like a royal throne'''
  - '''lifted up gloriously as a royal throne'''
  rationale: The text presents a vivid, somewhat compressed image of regal honor.
    Preserving the metaphor maintains theological tension and poetic force rather
    than flattening it into explanation.
  doctrine_reference: Translation philosophy §3, §6
