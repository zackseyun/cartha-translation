translation:
  text: For your name will be called by God forever, “Peace of righteousness and glory
    of godliness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Peace of justice and glory of godliness.”
    reason: lexical_alternative
  - marker: b
    text: Or “glory of piety” or “glory of reverence for God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: κληθήσεται
  chosen: will be called
  alternatives:
  - will be named
  lexicon: BDAG
  rationale: Future passive of καλέω here naturally expresses the conferral of a name/title.
    'Will be called' is the most direct and idiomatic rendering.
- source_word: τὸ ὄνομα
  chosen: name
  alternatives:
  - title
  lexicon: BDAG
  rationale: The phrase concerns the designation given to Jerusalem/Zion. 'Name' preserves
    the biblical idiom of bestowed identity, while 'title' would over-interpret.
- source_word: παρὰ τοῦ θεοῦ
  chosen: by God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: With naming language, παρά with the genitive indicates source or agency.
    'By God' reads naturally in English and highlights divine bestowal; 'from God'
    is possible but less idiomatic here.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for ever
  lexicon: BDAG
  rationale: Idiomatic expression for enduring permanence. 'Forever' is clear modern
    English and fits the promise context.
- source_word: εἰρήνη
  chosen: Peace
  alternatives:
  - peace
  - well-being
  lexicon: BDAG
  rationale: As part of the bestowed name, it functions as a titular element, so capitalization
    in English helps signal that this is the content of the name rather than a mere
    predicate.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness' unless context
    strongly demands 'justice.' Here the genitival construction in a name is broad
    enough to preserve the more traditional and theologically weighty 'righteousness,'
    while 'justice' remains a viable alternative.
- source_word: δόξα
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: BDAG
  rationale: '''Glory'' best preserves the biblical resonance of divinely conferred
    honor and radiance in this naming formula.'
- source_word: θεοσεβείας
  chosen: godliness
  alternatives:
  - piety
  - reverence for God
  lexicon: BDAG
  rationale: θεοσέβεια denotes reverence toward God or piety. 'Godliness' is concise
    and readable, and pairs well with 'glory' in the formal title. 'Piety' is possible
    but sounds more archaic or narrow in modern English.
