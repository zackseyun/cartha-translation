theological_decisions:
- issue: Rendering δικαιοσύνης in the bestowed name
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The project default for δικαιοσύνη is 'righteousness,' with 'justice'
    preserved where appropriate. In this poetic titular phrase, 'righteousness' better
    preserves the broader covenantal and moral sense without narrowing it to social
    justice alone.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternative
    ''justice'' preserved where relevant'
- issue: Understanding the final phrase as the content of a new divinely given name
  chosen_reading: 'quoted appositional title: “Peace of righteousness and glory of
    godliness.”'
  alternative_readings:
  - unquoted apposition without explicit title formatting
  rationale: The Greek presents two nominative phrases after 'your name will be called,'
    which function naturally as the bestowed name. Quotation marks help modern readers
    recognize the naming formula without adding content.
