theological_decisions:
- issue: Personification of Jerusalem
  chosen_reading: Address Jerusalem directly as a woman/city commanded to exchange
    garments of grief for divine glory.
  alternative_readings:
  - Treat the language as purely corporate without preserving the personified clothing
    imagery
  rationale: The Greek directly addresses Ἰερουσαλήμ and uses imperatives of removing
    and putting on clothing. Preserving the personification maintains the prophetic
    and theological force of Zion/Jerusalem as the restored people of God.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Source of the new splendor
  chosen_reading: Render τῆς παρὰ τοῦ θεοῦ δόξης as 'the glory from God,' indicating
    divine source rather than merely a God-like quality.
  alternative_readings:
  - '''the glory of God'''
  - '''God''s glory'''
  rationale: The preposition παρά points to origin/source. The text emphasizes that
    Jerusalem's restored splendor is bestowed from God, not self-generated.
  doctrine_reference: Translation philosophy §§1, 5
