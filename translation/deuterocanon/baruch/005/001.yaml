translation:
  text: Take off, O Jerusalem, the garment of your mourning and affliction, and put
    on forever the splendor of the glory from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the robe of your mourning and misery.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the beauty of the glory from God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔκδυσαι
  chosen: Take off
  alternatives:
  - Strip off
  - Remove
  lexicon: LSJ
  rationale: Aorist middle imperative of ἐκδύω, used for removing clothing. 'Take
    off' is natural modern English and preserves the clothing metaphor without sounding
    overly abrupt like 'strip off'.
- source_word: στολή
  chosen: garment
  alternatives:
  - robe
  - clothing
  lexicon: LSJ
  rationale: στολή often denotes a robe or stately garment, but here the focus is
    the metaphorical clothing of grief. 'Garment' preserves the singular image and
    works idiomatically with 'take off' and 'put on'.
- source_word: πένθος
  chosen: mourning
  alternatives:
  - grief
  - lamentation
  lexicon: LSJ
  rationale: The term denotes mourning, especially as expressed in bereavement or
    communal sorrow. 'Mourning' fits the clothing metaphor and the restoration context.
- source_word: κάκωσις
  chosen: affliction
  alternatives:
  - misery
  - humiliation
  - distress
  lexicon: LSJ
  rationale: The noun can denote ill-treatment, oppression, or wretched condition.
    'Affliction' is broad enough to include both suffering and abasement, and pairs
    well with 'mourning' without over-specifying the cause.
- source_word: ἔνδυσαι
  chosen: put on
  alternatives:
  - clothe yourself with
  - dress yourself in
  lexicon: LSJ
  rationale: Aorist middle imperative of ἐνδύω, the natural counterpart to ἔκδυσαι.
    'Put on' is concise, idiomatic, and preserves the imperative force.
- source_word: εὐπρέπεια
  chosen: splendor
  alternatives:
  - beauty
  - majesty
  - grace
  lexicon: LSJ
  rationale: The word conveys beauty, dignity, and fitting magnificence. 'Splendor'
    best captures the elevated, radiant sense in context.
- source_word: δόξα
  chosen: glory
  alternatives:
  - majesty
  - honor
  lexicon: LSJ
  rationale: δόξα in biblical Greek regularly carries the sense 'glory,' especially
    in relation to God. This is a key theological term and should be preserved consistently.
- source_word: παρὰ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - that comes from God
  - given by God
  lexicon: LSJ
  rationale: παρά with the genitive indicates source or origin. 'From God' is the
    most direct rendering and keeps the phrase compact.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - unto the age
  lexicon: LSJ
  rationale: The phrase commonly denotes enduring permanence. 'Forever' is readable
    modern English and suits the promise of lasting restoration.
