  confidence: high
  validation: major_mismatch
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: And we did not listen to the voice of the Lord our God, according to all the
    words of the prophets whom he sent to us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not obey the voice of the Lord our God.' The Greek can carry the
      sense of heeding, not merely hearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσαμεν
  chosen: did not listen
  alternatives:
  - did not hear
  - did not obey
  lexicon: BDAG
  rationale: ἀκούω with a genitive object and in covenantal/disobedience contexts
    often carries the sense of heeding or listening, not mere auditory perception.
    'Did not listen' preserves the idiom and the moral force without over-interpreting
    as the more explicit 'obey.'
- source_word: τῆς φωνῆς
  chosen: the voice
  alternatives:
  - the sound
  - the call
  lexicon: LSJ
  rationale: φωνή is literally 'voice.' In the biblical idiom 'listen to the voice
    of' is standard and should be preserved rather than flattened to 'message,' since
    the next phrase separately mentions the prophets' words.
- source_word: Κυρίου τοῦ θεοῦ ἡμῶν
  chosen: the Lord our God
  alternatives:
  - the LORD our God
  lexicon: LSJ
  rationale: κύριος is rendered 'Lord' per project default. Small-caps 'LORD' is reserved
    in this project for explicit Hebrew YHWH contexts; here the Greek source gives
    κύριος, so 'the Lord our God' best matches the source witness while preserving
    biblical diction.
- source_word: κατὰ πάντας τοὺς λόγους
  chosen: in accordance with all the words
  alternatives:
  - according to all the words
  - in keeping with all the words
  lexicon: BDAG
  rationale: κατά with the accusative here expresses conformity or correspondence.
    'In accordance with' is natural modern English and preserves the sense that their
    listening should have matched the full prophetic message.
- source_word: τῶν προφητῶν
  chosen: of the prophets
  alternatives:
  - spoken by the prophets
  lexicon: LSJ
  rationale: A straightforward genitive is best preserved. The following relative
    clause already identifies the prophets as those whom God sent.
- source_word: ὧν ἀπέστειλεν πρὸς ἡμᾶς
  chosen: whom he sent to us
  alternatives:
  - which he sent to us
  - whom he sent against us
  lexicon: BDAG
  rationale: The relative pronoun refers naturally to 'the prophets,' not 'the words.'
    πρὸς ἡμᾶς means 'to us,' not 'against us.' This keeps the syntax clear in English.
