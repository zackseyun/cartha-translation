reference: Baruch 1:21
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἠκούσαμεν τῆς φωνῆς Κυρίου τοῦ θεοῦ ἡμῶν κατὰ πάντας τοὺς λόγους τῶν
    προφητῶν ὧν ἀπέστειλεν πρὸς ἡμᾶς,
  language: Greek
  pages:
