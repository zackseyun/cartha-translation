  chosen_reading: Rendered as 'did not listen to the voice of the Lord our God'
  alternative_readings:
  - did not hear the voice of the Lord our God
  - did not obey the voice of the Lord our God
  rationale: The phrase denotes culpable refusal to heed God. 'Did not listen' preserves
