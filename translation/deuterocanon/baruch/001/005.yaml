translation:
  text: and they were weeping and fasting and praying before the Lord,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔκλαιον
  chosen: were weeping
  alternatives:
  - wept
  - were lamenting
  lexicon: BDAG
  rationale: Imperfect verb, conveying ongoing or repeated action in the narrative
    sequence; 'were weeping' preserves the durative sense better than simple 'wept.'
- source_word: ἐνήστευον
  chosen: fasting
  alternatives:
  - were fasting
  lexicon: BDAG
  rationale: The participle-like English coordination 'were weeping and fasting and
    praying' reads naturally while still reflecting the Greek imperfect of continued
    action.
- source_word: ηὔχοντο
  chosen: praying
  alternatives:
  - were praying
  - offering prayers
  lexicon: BDAG
  rationale: Standard rendering of the middle form of εὔχομαι in a religious context.
    'Praying' is clear, natural, and faithful.
- source_word: ἐναντίον
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: BDAG
  rationale: Idiomatic expression for being in the presence of someone, especially
    in worship language. 'Before' is concise and preserves the relational/spatial
    sense.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' The article is represented naturally
    in English as 'the Lord,' especially in Septuagintal reverential usage.
