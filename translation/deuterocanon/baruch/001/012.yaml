id: BAR.1.12
reference: Baruch 1:12
source:
  edition: lxx-swete-1909
  text: καὶ δώσει Κύριος ἰσχὺν ἡμῖν καὶ φωτίσει τοὺς ὀφθαλμοὺς ἡμῶν, καὶ ζησόμεθα
    ὑπὸ τὴν σκιὰν Ναβουχοδονοσὸρ βασιλέως Βαβυλῶνος καὶ ὑπὸ τὴν σκιὰν Βαλτασὰρ υἱοῦ
    αὐτοῦ, καὶ δουλεύσομεν αὐτοῖς ἡμέρας πολλὰς καὶ εὑρήσομεν χάριν ἐναντίον αὐτῶν.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: And the Lord will give us strength and enlighten our eyes, and we will live
    under the shadow of Nebuchadnezzar king of Babylon and under the shadow of Belshazzar
    his son, and we will serve them many days and find favor before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the protection of' or 'in the shelter of'; the Greek literally
      says 'under the shadow of,' a metaphor that can suggest both shelter and subjection.
    reason: lexical_alternative
  - marker: b
    text: Or 'find favor with them.' The Greek idiom is literally 'find favor before
      them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰσχύν
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: BDAG
  rationale: ἰσχύς commonly denotes strength or might. 'Strength' is the most natural
    modern English rendering here and fits the sense of God granting capacity or resilience.
- source_word: φωτίσει τοὺς ὀφθαλμοὺς ἡμῶν
  chosen: will enlighten our eyes
  alternatives:
  - will give light to our eyes
  - will brighten our eyes
  lexicon: BDAG
  rationale: The idiom is more than literal illumination; it conveys restoration,
    clarity, and renewed vitality. 'Enlighten our eyes' preserves the metaphor without
    flattening it into paraphrase.
- source_word: ζησόμεθα
  chosen: we will live
  alternatives:
  - we will survive
  lexicon: BDAG
  rationale: The future middle of ζάω straightforwardly means 'we will live.' Although
    'survive' captures contextual nuance under foreign rule, 'live' stays closer to
    the Greek while remaining clear.
- source_word: ὑπὸ τὴν σκιὰν
  chosen: under the shadow of
  alternatives:
  - under the protection of
  - in the shelter of
  lexicon: BDAG
  rationale: The phrase is metaphorical and can imply protection or dominion. 'Under
    the shadow of' preserves the image and its ambiguity, allowing readers to sense
    both dependence and subjection.
- source_word: Ναβουχοδονοσὸρ
  chosen: Nebuchadnezzar
  alternatives:
  - Nabuchodonosor
  lexicon: LSJ
  rationale: A standard English transliteration is preferred for readability, while
    remaining recognizably tied to the Greek form.
- source_word: Βαλτασὰρ
  chosen: Belshazzar
  alternatives:
  - Baltasar
  lexicon: LSJ
  rationale: Standard English biblical transliteration is used for the personal name
    rather than a more mechanical transliteration from the Greek.
- source_word: δουλεύσομεν
  chosen: we will serve
  alternatives:
  - we will be enslaved to
  - we will be subject to
  lexicon: BDAG
  rationale: Although δουλεύω can denote slavery or bondage, here the object is political
    rulers and the context is continued subjection in exile. 'Serve' is the best contextual
    rendering; 'be enslaved to' would overstate the lexical force in this sentence.
- source_word: ἡμέρας πολλὰς
  chosen: many days
  alternatives:
  - for many days
  - a long time
  lexicon: BDAG
  rationale: The accusative phrase is idiomatically temporal. 'Many days' is a transparent
    rendering; English readers will understand the duration sense without needing
    expansion.
- source_word: εὑρήσομεν χάριν ἐναντίον αὐτῶν
  chosen: find favor before them
  alternatives:
  - find favor with them
  - obtain goodwill from them
  lexicon: BDAG
  rationale: This reflects a common biblical idiom. 'Before them' is slightly more
    formal and preserves the source structure, though 'with them' is a viable smoother
    alternative.
