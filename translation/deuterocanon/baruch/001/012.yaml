theological_decisions:
- issue: Metaphorical force of 'under the shadow' in relation to pagan imperial rulers
  chosen_reading: Retain the metaphor 'under the shadow of' rather than interpret
    it explicitly as protection or domination.
  alternative_readings:
  - under the protection of Nebuchadnezzar...
  - under the rule of Nebuchadnezzar...
  rationale: The Greek image can suggest both shelter and subjection. Preserving the
    metaphor maintains the theological and political tension of Israel's life under
    foreign kings without resolving it interpretively.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
- issue: Rendering δουλεύσομεν in a context of imperial subjection
  chosen_reading: we will serve them
  alternative_readings:
  - we will be slaves to them
  - we will be subject to them
  rationale: The project defaults to 'slave' where bonded status is theologically
    salient, but here the statement concerns political service under exile rather
    than foregrounding the institution of slavery itself. 'Serve' best fits the context
    while documenting the stronger alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος / doulos'
