translation:
  text: after Nebuchadnezzar king of Babylon had taken Jeconiah and the rulers and
    the prisoners and the mighty men and the people of the land into exile from Jerusalem,
    and had brought him to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has singular 'him,' apparently referring specifically to Jeconiah;
      some readers may understand the sense more broadly as 'them' for the whole deported
      group.
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ τὸ ἀποικίσαι
  chosen: after ... had taken ... into exile
  alternatives:
  - after deporting
  - after carrying away into exile
  lexicon: LSJ
  rationale: The articular infinitive with μετά is temporal, 'after.' ἀποικίζω in
    this context denotes deportation/exile rather than mere migration. Rendering it
    with 'had taken ... into exile' preserves the causative force and reads naturally
    in English.
- source_word: Ναβουχοδονοσὸρ
  chosen: Nebuchadnezzar
  alternatives:
  - Nabuchodonosor
  rationale: Standard English transliteration of the Babylonian king's name is preferred
    for readability, while remaining recognizably tied to the Greek form.
- source_word: βασιλέα Βαβυλῶνος
  chosen: king of Babylon
  rationale: Straightforward genitival title; no reason to depart from the standard
    rendering.
- source_word: τὸν Ἰεχονίαν
  chosen: Jeconiah
  alternatives:
  - Jechoniah
  - Jehoiachin
  rationale: The Greek form Ἰεχονίας most directly corresponds to 'Jeconiah/Jechoniah.'
    'Jehoiachin' reflects the Hebrew royal name tradition but is less directly tied
    to the Greek wording. 'Jeconiah' is a standard English form and preserves source
    transparency.
- source_word: τοὺς ἄρχοντας
  chosen: the rulers
  alternatives:
  - the officials
  - the leaders
  lexicon: LSJ
  rationale: ἄρχοντες are governing figures or leaders. 'Rulers' best preserves the
    political sense without over-specifying office.
- source_word: τοὺς δεσμώτας
  chosen: the prisoners
  alternatives:
  - the captives
  - those in bonds
  lexicon: LSJ
  rationale: δεσμώτης literally denotes one in bonds or imprisonment. 'Prisoners'
    is the most direct gloss, though in context it overlaps with deportees. It is
    retained to reflect the distinct Greek term rather than smoothing it into a synonym
    of exile.
- source_word: τοὺς δυνατοὺς
  chosen: the mighty men
  alternatives:
  - the powerful men
  - the strong men
  lexicon: LSJ
  rationale: δυνατοί here likely refers to socially or militarily prominent men. 'Mighty
    men' preserves the broad force and the masculine/plural sense of the Greek without
    narrowing it to only political power.
- source_word: τὸν λαὸν τῆς γῆς
  chosen: the people of the land
  alternatives:
  - the common people of the land
  - the people of the country
  lexicon: LSJ
  rationale: This phrase can function as a social designation, but the Greek itself
    is simply 'the people of the land.' The more interpretive 'common people' is possible
    but not necessary here, so the more transparent rendering is preferred.
- source_word: ἀπὸ Ἰερουσαλήμ
  chosen: from Jerusalem
  rationale: Simple prepositional phrase indicating the place from which the deportation
    occurred.
- source_word: καὶ ἤγαγεν αὐτὸν εἰς Βαβυλῶνα
  chosen: and had brought him to Babylon
  alternatives:
  - and brought him to Babylon
  - and had brought them to Babylon
  lexicon: LSJ
  rationale: The Greek text reads singular αὐτόν ('him'), which most naturally refers
    back to Jeconiah, even after the preceding list. The singular should be preserved
    in the main text rather than harmonized to the plural sense of the whole group.
    The plainer past perfect fits the prior temporal clause.
