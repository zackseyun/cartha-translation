theological_decisions:
- issue: Number of the pronoun in the final clause
  chosen_reading: Preserve the singular 'him' in the main text.
  alternative_readings:
  - Render idiomatically as 'them' to refer to the whole deported group.
  rationale: This is primarily a textual/interpretive issue rather than a doctrinal
    one. Since the source witness provided reads αὐτόν, the translation should reflect
    that singular form. Because English readers may expect a plural after the list,
    the alternative is worth preserving in a footnote rather than silently smoothing
    the text.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; transparency in documenting
    decisions'
