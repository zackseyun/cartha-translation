id: BAR.1.9
reference: Baruch 1:9
source:
  edition: lxx-swete-1909
  text: μετὰ τὸ ἀποικίσαι Ναβουχοδονοσὸρ βασιλέα Βαβυλῶνος τὸν Ἰεχονίαν καὶ τοὺς ἄρχοντας
    καὶ τοὺς δεσμώτας καὶ τοὺς δυνατοὺς καὶ τὸν λαὸν τῆς γῆς ἀπὸ Ἰερουσαλήμ, καὶ ἤγαγεν
    αὐτὸν εἰς Βαβυλῶνα.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
