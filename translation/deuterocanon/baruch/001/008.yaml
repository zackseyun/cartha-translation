translation:
  text: when he received the vessels of the house of the Lord that had been carried
    out from the temple, to return them to the land of Judah, on the tenth of Sivan—silver
    vessels that Zedekiah son of Josiah, king of Judah, had made—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bring them back to the land of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ λαβεῖν
  chosen: when he received
  alternatives:
  - at the time of his receiving
  - in receiving
  lexicon: BDAG
  rationale: The articular infinitive with ἐν commonly expresses contemporaneous time.
    'When he received' gives clear English temporal sense without over-literal awkwardness.
- source_word: σκεύη
  chosen: vessels
  alternatives:
  - articles
  - utensils
  lexicon: BDAG
  rationale: In temple context, σκεύη refers to cultic objects/implements. 'Vessels'
    is the standard and suitably formal rendering in English Bible style.
- source_word: οἴκου Κυρίου
  chosen: the house of the Lord
  alternatives:
  - the Lord's house
  - the house of the LORD
  lexicon: BDAG
  rationale: A literal temple designation is preserved. κύριος follows project default
    'Lord.' 'House of the Lord' is idiomatic and keeps the cultic register.
- source_word: τὰ ἐξενεχθέντα ἐκ τοῦ ναοῦ
  chosen: that had been carried out from the temple
  alternatives:
  - that had been brought out of the temple
  - that had been taken out from the sanctuary
  lexicon: BDAG
  rationale: The aorist passive participle indicates prior removal. 'Carried out'
    reflects physical transfer; ναός here is best rendered 'temple' rather than the
    more technical 'sanctuary' for readability.
- source_word: ἀποστρέψαι
  chosen: to return them
  alternatives:
  - to bring them back
  - to restore them
  lexicon: BDAG
  rationale: The infinitive expresses purpose. 'Return them' is concise and fits the
    movement of sacred vessels back to Judah.
- source_word: γῆν Ἰούδα
  chosen: the land of Judah
  alternatives:
  - Judah
  - the country of Judah
  lexicon: BDAG
  rationale: γῆ with a proper name often means land/territory. 'The land of Judah'
    preserves the geographic sense more fully than simply 'Judah.'
- source_word: τῇ δεκάτῃ τοῦ Σειουάν
  chosen: on the tenth of Sivan
  alternatives:
  - on the tenth day of Sivan
  lexicon: BDAG
  rationale: This is a date formula. 'Sivan' is the conventional English transliteration
    of the month name represented here as Σειουάν.
- source_word: σκεύη ἀργυρᾶ
  chosen: silver vessels
  alternatives:
  - vessels of silver
  - silver articles
  lexicon: BDAG
  rationale: Straightforward adjectival construction; 'silver vessels' is natural
    and preserves the material specification.
- source_word: ἐποίησεν
  chosen: had made
  alternatives:
  - made
  - fashioned
  lexicon: BDAG
  rationale: Given the surrounding temporal frame, English past perfect helps show
    that Zedekiah's making of the vessels precedes the receiving/returning event.
