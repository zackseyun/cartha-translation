  text: ἐν τῷ λαβεῖν αὐτὸν τὰ σκεύη οἴκου Κυρίου τὰ ἐξενεχθέντα ἐκ τοῦ ναοῦ ἀποστρέψαι
    εἰς γῆν Ἰούδα, τῇ δεκάτῃ τοῦ Σειουάν, σκεύη ἀργυρᾶ ἃ ἐποίησεν Σεδεκίας υἱὸς Ἰωσεία
    βασιλεὺς Ἰούδα,
  language: Greek
  pages: []
