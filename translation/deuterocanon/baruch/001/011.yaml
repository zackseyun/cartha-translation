translation:
  text: And pray for the life of Nebuchodonosor king of Babylon, and for the life
    of Baltasar his son, so that their days may be like the days of heaven upon the
    earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'so that their days may be long, like the heavens
      over the earth.' The Greek preserves a vivid metaphor for enduring life.
    reason: lexical_alternative
  - marker: b
    text: The Greek names are transliterated directly here as 'Nebuchodonosor' and
      'Baltasar'; more familiar English forms are 'Nebuchadnezzar' and 'Belshazzar.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσεύξασθε
  chosen: pray
  alternatives:
  - offer prayers
  - pray earnestly
  lexicon: BDAG
  rationale: Aorist imperative plural calling for a direct exhortation. 'Pray' is
    the natural modern English equivalent and preserves the imperative force without
    unnecessary expansion.
- source_word: περὶ τῆς ζωῆς
  chosen: for the life of
  alternatives:
  - concerning the life of
  - for the well-being of
  lexicon: BDAG
  rationale: περί with the genitive here indicates prayer on behalf of someone's life.
    'For the life of' stays close to the Greek; 'well-being' is possible idiomatically
    but would move beyond the explicit wording ζωή.
- source_word: Ναβουχοδονοσὸρ
  chosen: Nebuchodonosor
  alternatives:
  - Nebuchadnezzar
  rationale: The Greek form is Ναβουχοδονοσόρ, conventionally transliterated 'Nebuchodonosor'
    in direct relation to the LXX form. This follows the project's principle to transliterate
    names rather than harmonize them to more familiar English forms derived from Hebrew/Aramaic
    traditions.
- source_word: Βαλτασὰρ
  chosen: Baltasar
  alternatives:
  - Belshazzar
  - Balthasar
  rationale: The Greek form Βαλτασάρ is best represented by the direct transliteration
    'Baltasar.' 'Belshazzar' reflects a different traditional form and would assimilate
    the Greek name to a more familiar English biblical spelling not present in this
    witness.
- source_word: ἵνα ὦσιν αἱ ἡμέραι αὐτῶν
  chosen: so that their days may be
  alternatives:
  - that their days may be
  - in order that their days may be
  lexicon: BDAG
  rationale: ἵνα introduces purpose. 'So that' clearly conveys the purposive sense
    in readable English.
- source_word: ὡς αἱ ἡμέραι τοῦ οὐρανοῦ ἐπὶ τῆς γῆς
  chosen: like the days of heaven upon the earth
  alternatives:
  - like the days of the heavens over the earth
  - as the days of heaven above the earth
  lexicon: BDAG
  rationale: The phrase is somewhat idiomatic and likely echoes biblical language
    for enduring duration. 'Like the days of heaven upon the earth' preserves the
    imagery and unusual wording rather than flattening it into an interpretive paraphrase
    such as 'for a very long time.'
