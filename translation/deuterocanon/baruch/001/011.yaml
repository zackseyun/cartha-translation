theological_decisions:
- issue: Whether to interpret the final clause idiomatically as long life or preserve
    the metaphor
  chosen_reading: 'Preserve the metaphor: ''their days may be like the days of heaven
    upon the earth'''
  alternative_readings:
  - their days may last as long as the heavens are over the earth
  - their days may be very long upon the earth
  rationale: The Greek wording is metaphorical and scripturally resonant. Preserving
    the image maintains the text's rhetorical and theological texture while still
    being intelligible in English. A more explicit paraphrase would over-resolve the
    idiom.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Whether to normalize royal names to familiar English biblical forms
  chosen_reading: 'Use direct transliterations from the Greek witness: ''Nebuchodonosor''
    and ''Baltasar'''
  alternative_readings:
  - Nebuchadnezzar and Belshazzar
  rationale: The project prioritizes original-language primacy and transliterates
    names. Normalizing to more familiar forms would obscure that this deuterocanonical
    verse is being translated directly from the Greek witness rather than from later
    English tradition.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 2
