lexical_decisions:
- source_word: ὧν
  chosen: in which
  alternatives:
  - because of which
  - wherein
  lexicon: LSJ
  rationale: Relative pronoun in the genitive plural, here functioning idiomatically
    with the preceding context to refer back to the matters just mentioned; 'in which'
    preserves the compact Greek linkage without over-interpreting causation.
- source_word: ἡμάρτομεν
  chosen: we sinned
  alternatives:
  - we have sinned
  - we did wrong
  lexicon: BDAG
  rationale: Aorist active indicative of ἁμαρτάνω. 'We sinned' is the most direct
    rendering; English simple past fits the confessional summary without importing
    aspectual nuance beyond the Greek.
- source_word: ἔναντι
  chosen: before
  alternatives:
  - in the presence of
  - against
  lexicon: LSJ
  rationale: With the genitive Κυρίου, ἔναντι commonly means 'before' or 'in the sight/presence
    of.' 'Before' is concise and preserves the relational/judicial sense better than
    the more interpretive 'against.'
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: κύριος is rendered by the project's default as 'Lord.' The article is
    represented in English as 'the Lord,' which is natural here and fits the LXX's
    covenantal usage.
