translation:
  text: And you shall read this book that we have sent to you, to proclaim in the
    house of the Lord on a feast day and on days of appointed time,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'on festival days and at appointed times.' The Greek
      phrase 'on days of appointed time' is somewhat awkward as transmitted, so the
      main text stays close to the source while preserving a natural alternative here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγνώσεσθε
  chosen: you shall read
  alternatives:
  - you shall have read
  - read aloud
  lexicon: BDAG
  rationale: Future middle form of ἀναγινώσκω; in context it gives an instruction
    to the recipients. 'You shall read' preserves the directive force without over-specifying
    'aloud,' though public reading is implied by the setting.
- source_word: τὸ βιβλίον τοῦτο
  chosen: this book
  alternatives:
  - this scroll
  lexicon: BDAG
  rationale: βιβλίον can denote a scroll or book/document. 'Book' is the most natural
    modern English rendering and matches the broad sense without forcing a material
    format.
- source_word: ἀπεστείλαμεν
  chosen: we have sent
  alternatives:
  - we sent
  lexicon: BDAG
  rationale: Aorist verb referring to the completed act of dispatching the document.
    English present perfect fits the relation to the present instruction ('this book
    that we have sent to you') and reads naturally.
- source_word: ἐξαγορεῦσαι
  chosen: to proclaim
  alternatives:
  - to declare fully
  - to read out
  - to announce
  lexicon: LSJ
  rationale: The infinitive expresses purpose. The verb can mean to tell out or declare
    publicly. In this cultic/public-reading context, 'to proclaim' captures the public,
    formal sense better than the more wooden 'declare fully.'
- source_word: ἐν οἴκῳ Κυρίου
  chosen: in the house of the Lord
  alternatives:
  - in the Lord's house
  - in the temple of the Lord
  lexicon: BDAG
  rationale: A standard biblical expression for the temple/sanctuary. 'House of the
    Lord' preserves the source idiom and aligns with the project's default rendering
    of κύριος as 'Lord'.
- source_word: ἐν ἡμέρᾳ ἑορτῆς
  chosen: on a feast day
  alternatives:
  - on the day of a feast
  - on a festival day
  lexicon: BDAG
  rationale: ἑορτή denotes a feast/festival. 'Feast day' is concise, natural, and
    retains the religious-calendar sense.
- source_word: ἐν ἡμέραις καιροῦ
  chosen: on days of appointed time
  alternatives:
  - in days of season
  - on appointed days
  - at set times
  lexicon: BDAG
  rationale: καιρός often means appointed or fitting time. The phrase is somewhat
    awkward in Greek as transmitted; 'days of appointed time' stays close to the wording
    while signaling calendrical observance. A smoother alternative is preserved in
    a footnote because the source phrasing is unusual.
