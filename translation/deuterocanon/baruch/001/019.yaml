source:
  edition: lxx-swete-1909
  text: ἀπὸ τῆς ἡμέρας ἧς ἐξήγαγεν Κύριος τοὺς πατέρας ἡμῶν ἐκ γῆς Αἰγύπτου καὶ ἕως
