theological_decisions:
- issue: Rendering covenantal divine title Κύριος in a deuterocanonical Greek context
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: The source text has Κύριος, not the Hebrew divine name directly. Following
    doctrine, κύριος is rendered 'Lord.' Because the referent is Israel's God and
    the exodus is in view, the covenantal force remains clear without importing small-caps
    LORD into the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: Temporal aspect of the confession from exodus to present
  chosen_reading: we have been disobedient ... we have been negligent
  alternative_readings:
  - we were disobedient ... we were negligent
  rationale: The Greek frames a continuing pattern from a past starting point until
    the present day. English present perfect better preserves that durative confessional
    force than a simple past.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source sense in
    readable modern English'
