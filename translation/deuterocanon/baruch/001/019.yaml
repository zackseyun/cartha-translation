translation:
  text: From the day when the Lord brought our fathers out of the land of Egypt until
    this day, we have been disobedient to the Lord our God, and we have been stubborn
    about not listening to his voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we acted carelessly in not listening to his voice.' The Greek verb
      ἐσχεδιάζομεν is uncommon and may suggest heedlessness or negligence rather than
      a more specific form of rebellion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τῆς ἡμέρας ἧς
  chosen: From the day when
  alternatives:
  - Since the day that
  - From the time when
  lexicon: LSJ
  rationale: This idiom marks the starting point of a continuing period. 'From the
    day when' is natural English and preserves the temporal force of the Greek.
- source_word: ἐξήγαγεν
  chosen: brought ... out
  alternatives:
  - led ... out
  - brought forth
  lexicon: LSJ
  rationale: The verb means to bring or lead out. 'Brought ... out' is clear, idiomatic,
    and preserves the exodus resonance without sounding archaic.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - the LORD
  - Master
  lexicon: LSJ
  rationale: Per project doctrine, κύριος defaults to 'Lord.' In this deuterocanonical
    Greek context it refers to Israel's God in covenantal usage.
- source_word: τοὺς πατέρας ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: LSJ
  rationale: The Greek is explicitly masculine/plural and refers to the forefathers
    of Israel. Following the gender-accurate policy, 'our fathers' is retained rather
    than neutralizing to 'ancestors'.
- source_word: ἐκ γῆς Αἰγύπτου
  chosen: out from the land of Egypt
  alternatives:
  - from the land of Egypt
  - out of Egypt
  lexicon: LSJ
  rationale: This preserves both the preposition and the formal exodus phrasing. 'Land
    of Egypt' reflects the Greek wording more fully than simply 'Egypt.'
- source_word: καὶ ἕως τῆς ἡμέρας ταύτης
  chosen: until this day
  alternatives:
  - and up to this day
  - even to this day
  lexicon: LSJ
  rationale: A standard temporal expression indicating continuity from the exodus
    to the present confession. 'Until this day' is concise and faithful.
- source_word: ἤμεθα ἀπειθοῦντες
  chosen: we have been disobedient
  alternatives:
  - we were disobeying
  - we have been refusing to obey
  lexicon: LSJ
  rationale: The periphrastic construction conveys ongoing state or repeated conduct
    over time. 'We have been disobedient' captures that continuing sense in idiomatic
    English.
- source_word: πρὸς Κύριον θεὸν ἡμῶν
  chosen: to the Lord our God
  alternatives:
  - against the Lord our God
  - toward the Lord our God
  lexicon: LSJ
  rationale: With ἀπειθέω, πρός can indicate relation directed toward someone. 'To
    the Lord our God' is the most natural complement in English with 'disobedient,'
    while 'against' would overstate hostility not explicit in the phrase.
- source_word: ἐσχεδιάζομεν
  chosen: we have been negligent
  alternatives:
  - we acted carelessly
  - we were heedless
  - we were reluctant
  lexicon: LSJ
  rationale: The verb is unusual and contextually points to careless or willful disregard
    in relation to obedience. 'We have been negligent' best fits the following infinitive
    phrase and preserves the confessional tone without overinterpreting as outright
    rebellion beyond the preceding clause.
- source_word: πρὸς τὸ μὴ ἀκούειν
  chosen: in not listening
  alternatives:
  - so as not to listen
  - with respect to not listening
  - in refusing to hear
  lexicon: LSJ
  rationale: This construction expresses the sphere or result of their negligence/disposition.
    'In not listening' is natural English and avoids making the purpose sense ('so
    as not to') too strong.
- source_word: τῆς φωνῆς αὐτοῦ
  chosen: to his voice
  alternatives:
  - to his word
  - his voice
  lexicon: LSJ
  rationale: The Greek says 'voice,' a common biblical expression for heeding God's
    spoken command. 'To his voice' preserves the idiom; 'word' would be interpretive.
