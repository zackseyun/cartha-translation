  text: καὶ τοῖς βασιλεῦσιν ἡμῶν καὶ τοῖς ἄρχουσιν ἡμῶν καὶ τοῖς ἱερεῦσιν ἡμῶν καὶ
    τοῖς προφήταις ἡμῶν καὶ τοῖς πατράσιν ἡμῶν,
  language: Greek
