theological_decisions:
- issue: Rendering πατράσιν in a communal confession context
  chosen_reading: fathers
  alternative_readings:
  - ancestors
  rationale: The Greek uses the masculine familial term, and the project's gender-accurate
    policy favors preserving that form where it reflects the source's intent. In this
