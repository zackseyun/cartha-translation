translation:
  text: and to our kings and our rulers and our priests and our prophets and our fathers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Greek 'fathers' can refer to forefathers in a national
      or covenantal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεῦσιν
  chosen: kings
  alternatives:
  - royal rulers
  lexicon: BDAG
  rationale: The dative plural of βασιλεύς straightforwardly denotes monarchs. 'Kings'
    is the natural English equivalent and preserves the political rank.
- source_word: ἄρχουσιν
  chosen: rulers
  alternatives:
  - leaders
  - officials
  lexicon: BDAG
  rationale: ἄρχων refers broadly to those in authority. 'Rulers' best preserves the
    governing sense without narrowing to a specific office.
- source_word: ἱερεῦσιν
  chosen: priests
  lexicon: BDAG
  rationale: ἱερεύς is the standard term for cultic priests. 'Priests' is the direct
    and established rendering.
- source_word: προφήταις
  chosen: prophets
  lexicon: BDAG
  rationale: προφήτης is directly rendered 'prophet.' No contextual pressure suggests
    a different gloss.
- source_word: πατράσιν
  chosen: fathers
  alternatives:
  - ancestors
  lexicon: BDAG
  rationale: πατέρες can mean either literal fathers or forefathers/ancestors. In
    this confessional list of national groups, 'fathers' preserves the source wording
    and its traditional covenantal resonance; 'ancestors' is a viable interpretive
    alternative but is not required in the main text.
- source_word: ἡμῶν
  chosen: our
  lexicon: BDAG
  rationale: The repeated possessive pronoun is retained each time rather than collapsed,
    because the Greek repeats it with rhetorical force and communal identification.
- source_word: καί
  chosen: and
  lexicon: BDAG
  rationale: The verse is a continuation of a list, and the repeated καί is best represented
    by repeated 'and' to preserve the cumulative structure.
