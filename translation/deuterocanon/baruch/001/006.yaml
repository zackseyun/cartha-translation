translation:
  text: And they collected silver, as much as each one’s hand was able.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “as each one’s hand was able,” an idiom meaning according to
      each person’s ability or means.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγαγον
  chosen: they collected
  alternatives:
  - they gathered
  - they brought together
  lexicon: BDAG
  rationale: Aorist of συνάγω here refers to gathering money together. 'Collected'
    is natural English for assembling funds while remaining close to the Greek sense.
- source_word: ἀργύριον
  chosen: silver
  alternatives:
  - money
  - silver money
  lexicon: BDAG
  rationale: The Greek literally denotes silver, often functioning as money. 'Silver'
    preserves the source wording; the monetary sense is clear from context without
    paraphrasing to 'money' in the main text.
- source_word: καθὰ
  chosen: as much as
  alternatives:
  - according to what
  - in proportion as
  lexicon: LSJ
  rationale: In this construction καθὰ introduces proportion or measure. 'As much
    as' communicates the distributive proportional sense idiomatically in English.
- source_word: ἑκάστου
  chosen: each one’s
  alternatives:
  - each person's
  - of each
  lexicon: BDAG
  rationale: Genitive singular of ἕκαστος marks individual distribution. 'Each one’s'
    is concise and preserves the individualized sense.
- source_word: ἠδύνατο
  chosen: was able
  alternatives:
  - could
  - had the means
  lexicon: BDAG
  rationale: The verb δύναμαι expresses ability or capacity. 'Was able' keeps the
    verbal force explicit; 'had the means' would interpret the economic implication
    more than translate it.
- source_word: ἡ χείρ
  chosen: hand
  alternatives:
  - means
  - resources
  lexicon: BDAG
  rationale: Literally 'hand,' a common idiom for capacity or means. Retaining 'hand'
    preserves the Greek imagery while the surrounding English makes the sense understandable.
    A more interpretive rendering like 'resources' is possible but less transparent
    to the source.
