id: BAR.1.4
reference: Baruch 1:4
source:
  edition: lxx-swete-1909
  text: καὶ ἐν ὠσίν τῶν δυνατῶν καὶ υἱῶν τῶν βασιλέων, καὶ ἐν ὠσὶ τῶν πρεσβυτέρων,
    καὶ ἐν ὠσὶ παντὸς τοῦ λαοῦ ἀπὸ μικροῦ ἕως μεγάλου, πάντων τῶν κατοικούντων ἐν
    Βαβυλῶνι ἐπὶ ποταμοῦ Σούδ.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: and in the hearing of the nobles and the sons of kings, and in the hearing
    of the elders, and in the hearing of all the people, from the least to the greatest,
    all who were dwelling in Babylon by the river Sud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'in the ears of,' an idiom meaning 'in the hearing of.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the mighty.' The Greek term can denote powerful or prominent persons;
      'nobles' was chosen for the social setting.
    reason: lexical_alternative
  - marker: c
    text: Or 'the princes.' The Greek more literally reads 'the sons of the kings.'
    reason: lexical_alternative
  - marker: d
    text: The river name 'Sud' is transliterated from the Greek; its exact identification
      is uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν ὠσίν
  chosen: in the hearing of
  alternatives:
  - in the ears of
  - before
  lexicon: BDAG
  rationale: Literally 'in the ears of,' an idiom meaning something was read or spoken
    so as to be heard by someone. 'In the hearing of' preserves the idiomatic sense
    in natural English without over-paraphrasing.
- source_word: τῶν δυνατῶν
  chosen: the nobles
  alternatives:
  - the mighty
  - the powerful men
  lexicon: LSJ
  rationale: The term denotes powerful or prominent persons. 'Nobles' fits the social
    setting alongside royal sons and elders, conveying status rather than mere physical
    strength.
- source_word: υἱῶν τῶν βασιλέων
  chosen: the sons of the kings
  alternatives:
  - the royal sons
  - the princes
  lexicon: LSJ
  rationale: A more formal equivalent would be 'princes,' but the Greek is explicitly
    relational and plural. 'Sons of the kings' stays closer to the source and avoids
    importing a court title not stated directly.
- source_word: τῶν πρεσβυτέρων
  chosen: the elders
  alternatives:
  - the older men
  lexicon: BDAG
  rationale: In Jewish and broader ancient civic contexts this commonly denotes recognized
    community leaders, not merely elderly males. 'Elders' is the standard and contextually
    appropriate rendering.
- source_word: παντὸς τοῦ λαοῦ
  chosen: all the people
  alternatives:
  - the whole people
  lexicon: BDAG
  rationale: A straightforward rendering preserving the collective sense.
- source_word: ἀπὸ μικροῦ ἕως μεγάλου
  chosen: from the least to the greatest
  alternatives:
  - from small to great
  - from the youngest to the oldest
  lexicon: LSJ
  rationale: This is a common merism for the full social range of the community. 'From
    the least to the greatest' is idiomatic English and preserves the social breadth
    better than a strictly age-based rendering.
- source_word: πάντων τῶν κατοικούντων
  chosen: all who were dwelling
  alternatives:
  - all those living
  - all the inhabitants
  lexicon: BDAG
  rationale: The participial construction is best represented by 'all who were dwelling,'
    which keeps the descriptive force of the Greek while remaining readable.
- source_word: ἐν Βαβυλῶνι
  chosen: in Babylon
  lexicon: LSJ
  rationale: Standard place-name rendering.
- source_word: ἐπὶ ποταμοῦ Σούδ
  chosen: by the river Sud
  alternatives:
  - on the river Sud
  - at the river Sud
  lexicon: LSJ
  rationale: ἐπί with the genitive here is locative, indicating position near or along
    the river. 'By the river Sud' is natural English. The proper name is transliterated
    because it is a place-name of uncertain identification.
