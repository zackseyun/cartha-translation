id: BAR.1.3
reference: Baruch 1:3
source:
  edition: lxx-swete-1909
  text: καὶ ἀνέγνω Βαροὺχ τοὺς λόγους τοῦ βιβλίου τούτου ἐν ὠσὶν Ἰεχονίου υἱοῦ Ἰωακεὶμ
    βασιλέως Ἰούδα, καὶ ἐν ὠσὶ παντὸς τοῦ λαοῦ τῶν ἐρχομένων πρὸς τὴν βίβλον,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: And Baruch read the words of this book in the hearing of Jeconiah son of Jehoiakim,
    king of Judah, and in the hearing of all the people who came to the book,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'who came to the reading' or 'who came to the scroll.' The
      Greek phrase 'who came to the book' is unusual, so a more interpretive rendering
      is possible.
    reason: lexical_alternative
  - marker: b
    text: Jeconiah is the Greek-form name; the same king is often identified in English
      as Jehoiachin.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνέγνω
  chosen: read
  alternatives:
  - read aloud
  lexicon: BDAG
  rationale: The verb means 'read,' and in this public setting the sense is inherently
    oral. English 'read' in context is sufficient and natural; 'read aloud' is possible
    but slightly more explicit than the Greek requires.
- source_word: τοὺς λόγους
  chosen: the words
  alternatives:
  - the contents
  - the sayings
  lexicon: BDAG
  rationale: λόγοι here refers to the verbal content of the written work. 'Words'
    preserves the formal link to the Greek and avoids over-interpreting as a summary
    of contents.
- source_word: τοῦ βιβλίου τούτου
  chosen: of this book
  alternatives:
  - of this scroll
  lexicon: BDAG
  rationale: βιβλίον can denote a scroll/book document. 'Book' is the most straightforward
    modern English rendering and matches the deictic force of τούτου.
- source_word: ἐν ὠσὶν
  chosen: in the hearing of
  alternatives:
  - in the ears of
  - before
  lexicon: BDAG
  rationale: The idiom literally means 'in the ears of' but naturally signifies audible
    public reading before an audience. 'In the hearing of' preserves the idiom's sense
    without wooden English.
- source_word: Ἰεχονίου
  chosen: Jeconiah
  alternatives:
  - Jechoniah
  - Jehoiachin
  lexicon: Lexicon not consulted
  rationale: The Greek form Ἰεχονίου is most directly represented by 'Jeconiah.' 'Jehoiachin'
    reflects the better-known Hebrew/English equivalent, but the project preference
    is to transliterate names from the source witness unless context strongly favors
    harmonization.
- source_word: τῶν ἐρχομένων πρὸς τὴν βίβλον
  chosen: who came to the book
  alternatives:
  - who came to the reading
  - who came to the scroll
  - who came forward to the document
  lexicon: BDAG
  rationale: The phrase is somewhat unusual. A formally anchored rendering keeps the
    concrete noun βίβλος/'book' rather than resolving it interpretively to 'reading.'
    This preserves the source wording and leaves the exact nuance transparent.
