id: BAR.1.1
reference: Baruch 1:1
source:
  edition: lxx-swete-1909
  text: ΚΑΙ οὗτοι οἱ λόγοι τοῦ βιβλίου οὓς ἔγραψεν Βαροὺχ υἱὸς Νηρίου υἱοῦ Μαασαίου
    υἱοῦ Σεδεκίου υἱοῦ Ἀσαδίου υἱοῦ Χελκίου ἐν Βαβυλῶνι,
  language: Greek
  pages:
  - 374
  confidence: medium
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: And these are the words of the book that Baruch son of Neriah, son of Maaseiah,
    son of Zedekiah, son of Hasadiah, son of Hilkiah, wrote in Babylon,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek manuscripts here give the name as Asadiah; the English form Hasadiah
      reflects the standard Semitic-style biblical transliteration of the name.
    reason: lexical_alternative
lexical_decisions:
- source_word: ΚΑΙ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Retained as a connective opening the narrative. 'And' preserves the Greek
    coordination without adding interpretive force.
- source_word: οὗτοι
  chosen: these
  alternatives:
  - these here
  lexicon: BDAG
  rationale: Straight demonstrative reference to what follows; 'these' is the natural
    formal equivalent in English.
- source_word: λόγοι
  chosen: words
  alternatives:
  - matters
  - sayings
  - accounts
  lexicon: BDAG
  rationale: In the phrase 'the words of the book,' λόγοι is best kept as 'words'
    rather than broadened to 'account' or 'message,' since the Greek points to the
    written contents themselves.
- source_word: τοῦ βιβλίου
  chosen: of the book
  alternatives:
  - in the book
  - of this scroll
  lexicon: BDAG
  rationale: The genitive is most naturally rendered 'of the book.' 'Scroll' is possible
    historically, but βιβλίον in this context is adequately represented by 'book'
    in readable modern English.
- source_word: οὓς ἔγραψεν
  chosen: that ... wrote
  alternatives:
  - which ... wrote
  - that ... had written
  lexicon: BDAG
  rationale: The relative clause is rendered idiomatically in English with 'that.'
    The aorist ἔγραψεν is simple past, not pluperfect.
- source_word: Βαροὺχ
  chosen: Baruch
  rationale: Personal name transliterated according to project policy.
- source_word: υἱὸς
  chosen: son of
  alternatives:
  - descendant of
  lexicon: BDAG
  rationale: The repeated genealogy formula is explicit and should be preserved. 'Descendant'
    would weaken the direct genealogical presentation.
- source_word: Νηρίου
  chosen: Neriah
  alternatives:
  - Nerias
  rationale: Standard English biblical transliteration aligned with the familiar Hebrew-form
    name behind the Greek genitive.
- source_word: Μαασαίου
  chosen: Maaseiah
  alternatives:
  - Maasaias
  rationale: Standard English biblical transliteration rather than a more Greek-shaped
    form.
- source_word: Σεδεκίου
  chosen: Zedekiah
  alternatives:
  - Sedekias
  rationale: Standard English biblical transliteration rather than preserving the
    Greek ending.
- source_word: Ἀσαδίου
  chosen: Hasadiah
  alternatives:
  - Asadiah
  rationale: The initial alpha likely reflects the Hebrew name without aspiration
    marked consistently in Greek transmission; 'Hasadiah' is the conventional Semitic-form
    transliteration and fits the genealogical sequence of Hebrew names.
- source_word: Χελκίου
  chosen: Hilkiah
  alternatives:
  - Chelkias
  rationale: Standard English biblical transliteration from the underlying Hebrew
    name rather than a Greek-form transliteration.
- source_word: ἐν Βαβυλῶνι
  chosen: in Babylon
  alternatives:
  - at Babylon
  lexicon: BDAG
  rationale: ἐν with place name is naturally locative. 'In Babylon' is the clearest
    modern English rendering.
