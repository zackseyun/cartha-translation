id: BAR.1.10
reference: Baruch 1:10
source:
  edition: lxx-swete-1909
  text: Καὶ εἶπαν Ἰδοὺ ἀπεστείλαμεν πρὸς ὑμᾶς ἀργύριον, καὶ ἀγοράσατε τοῦ ἀργυρίου
    ὁλοκαυτώματα καὶ περὶ ἁμαρτίας καὶ λίβανον, καὶ ποιήσατε μάννα καὶ ἀνοίσατε ἐπὶ
    τὸ θυσιαστήριον Κυρίου θεοῦ ἡμῶν,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: And they said, ‘Behold, we have sent you money; and with the money buy burnt
    offerings and sin offerings and frankincense, and prepare a grain offering and
    offer them on the altar of the Lord our God,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek μάννα here is understood in its sacrificial sense, that is, a grain
      offering, not the wilderness food called manna.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀργύριον
  chosen: money
  alternatives:
  - silver
  lexicon: LSJ
  rationale: Although literally 'silver,' in this transactional context it refers
    to money sent for purchasing sacrificial materials. 'Money' communicates the functional
    sense in natural English while remaining faithful to the Greek.
- source_word: ἀγοράσατε
  chosen: buy
  alternatives:
  - purchase
  lexicon: LSJ
  rationale: Imperative of buying in a straightforward commercial sense. 'Buy' is
    the clearest modern English equivalent.
- source_word: ὁλοκαυτώματα
  chosen: whole burnt offerings
  alternatives:
  - burnt offerings
  - holocausts
  lexicon: LSJ
  rationale: The term denotes offerings wholly consumed by fire. 'Whole burnt offerings'
    preserves that nuance better than simply 'burnt offerings,' while avoiding the
    misleading modern associations of 'holocausts.'
- source_word: περὶ ἁμαρτίας
  chosen: sin offerings
  alternatives:
  - offerings for sin
  - for sin
  lexicon: LSJ
  rationale: In sacrificial context this phrase functions as a technical expression
    for offerings dealing with sin. 'Sin offerings' is idiomatic and precise.
- source_word: λίβανον
  chosen: frankincense
  alternatives:
  - incense
  lexicon: LSJ
  rationale: The noun specifically denotes frankincense rather than incense in general,
    so the more precise term is preferred.
- source_word: ποιήσατε μάννα
  chosen: prepare a grain offering
  alternatives:
  - make manna
  - prepare offerings
  lexicon: LSJ
  rationale: Here μάννα reflects the sacrificial term for a cereal/grain offering
    rather than the wilderness food 'manna.' Rendering it as 'grain offering' fits
    the cultic sequence and avoids confusion for English readers.
- source_word: ἀνοίσατε
  chosen: offer
  alternatives:
  - bring up
  - present
  lexicon: LSJ
  rationale: In sacrificial context the verb carries the sense of bringing up/offering
    upon the altar. 'Offer' gives the intended cultic action in clear English.
- source_word: θυσιαστήριον
  chosen: altar
  lexicon: LSJ
  rationale: Standard rendering for the place of sacrifice.
- source_word: Κυρίου θεοῦ ἡμῶν
  chosen: the Lord our God
  alternatives:
  - our Lord God
  lexicon: LSJ
  rationale: This preserves the genitival construction naturally in English and follows
    the project's default rendering of κύριος as 'Lord'.
