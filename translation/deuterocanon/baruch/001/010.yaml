theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek context referring to Israel's
    God
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The source text has Κυρίου, and the project's default for κύριος is 'Lord.'
    Small-caps 'LORD' is reserved especially for explicit representation of YHWH in
    Hebrew contexts; here the Greek witness itself is primary.
