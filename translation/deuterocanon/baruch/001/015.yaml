theological_decisions:
- issue: Rendering of δικαιοσύνη in a confessional statement contrasting God's character
    with Israel's shame
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The verse confesses that moral rightness belongs to God while disgrace
    belongs to the people. In this penitential context, 'righteousness' better preserves
    the covenantal and ethical sense than 'justice,' though the latter remains a viable
    lexical alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; justice
    preserved where appropriate in footnotes'
