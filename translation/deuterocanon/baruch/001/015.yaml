translation:
  text: And you shall say, ‘To the Lord our God belongs righteousness, but to us shame
    of face, as it is this day—to the people of Judah and to the inhabitants of Jerusalem,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''justice'': ''To the Lord our God belongs justice.'' The Greek δικαιοσύνη
      can denote either righteousness or justice; here ''righteousness'' was chosen
      for the penitential contrast.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρεῖτε
  chosen: you shall say
  alternatives:
  - you will say
  - say
  lexicon: LSJ
  rationale: Future indicative with directive force in context; 'you shall say' preserves
    the solemn, liturgical instruction better than a simple predictive 'you will say.'
- source_word: κυρίῳ θεῷ ἡμῶν
  chosen: the Lord our God
  alternatives:
  - our Lord God
  - the LORD our God
  lexicon: LSJ
  rationale: κύριος is rendered by the project's default 'Lord.' Because this is Greek
    Baruch in the LXX tradition rather than direct Hebrew with יהוה in view, 'the
    Lord our God' is the most natural and source-anchored rendering.
- source_word: ἡ δικαιοσύνη
  chosen: belongs righteousness
  alternatives:
  - is righteousness
  - is justice
  - belongs justice
  lexicon: BDAG
  rationale: 'The Greek is elliptical: literally ''the righteousness.'' English idiom
    requires supplying the sense of possession: ''To the Lord our God belongs righteousness.''
    ''Righteousness'' follows the project''s default for δικαιοσύνη; ''justice'' is
    possible but less fitting in this confessional contrast.'
- source_word: αἰσχύνη τῶν προσώπων
  chosen: shame of face
  alternatives:
  - shamefacedness
  - shame on our faces
  - open shame
  lexicon: LSJ
  rationale: A semitizing expression meaning public disgrace or shame visible on the
    face. 'Shame of face' preserves the idiom closely while remaining intelligible;
    alternatives are more interpretive.
- source_word: ὡς ἡ ἡμέρα αὕτη
  chosen: as it is this day
  alternatives:
  - as on this day
  - as at this day
  - as this day shows
  lexicon: LSJ
  rationale: This formula points to the present, evident state of affairs. 'As it
    is this day' communicates the idiomatic force in natural English without over-paraphrasing.
- source_word: ἀνθρώπῳ Ἰούδα
  chosen: to the men of Judah
  alternatives:
  - to the people of Judah
  - to Judah's men
  - to the man Judah
  lexicon: LSJ
  rationale: Although singular in form, ἀνθρώπῳ here functions collectively in apposition
    with the following plural group and in parallel with confessional formulas about
    the nation. 'Men of Judah' preserves the gendered, collective sense more closely
    than the broader 'people of Judah.'
- source_word: τοῖς κατοικοῦσιν Ἰερουσαλήμ
  chosen: to the inhabitants of Jerusalem
  alternatives:
  - to those dwelling in Jerusalem
  - to those who live in Jerusalem
  lexicon: LSJ
  rationale: A standard rendering for κατοικέω-participial expressions; clear and
    natural in English.
