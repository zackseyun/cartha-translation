translation:
  text: And the calamities and the curse that the Lord appointed for Moses his servant
    clung to us, on the day when he brought our fathers out to give us a land flowing
    with milk and honey, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the evils'; here the Greek likely refers to disastrous judgments rather
      than moral evils.
    reason: lexical_alternative
  - marker: b
    text: Or 'ordained,' 'decreed,' or 'prescribed' for 'appointed.'
    reason: lexical_alternative
  - marker: c
    text: '''His servant'' translates Greek ''his païs''; the word can also mean ''child,''
      but with Moses here it means servant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκολλήθη
  chosen: clung to
  alternatives:
  - was joined to
  - stuck to
  - came upon
  lexicon: BDAG
  rationale: The passive of κολλάω here conveys something attaching itself closely
    and persistently to the people. 'Clung to' preserves the vivid metaphor better
    than a flatter idiom like 'came upon.'
- source_word: τὰ κακὰ
  chosen: the calamities
  alternatives:
  - the evils
  - the disasters
  - the troubles
  lexicon: BDAG
  rationale: In this covenant-judgment context, τὰ κακά refers to harmful outcomes
    rather than moral evil committed by the people. 'Calamities' communicates inflicted
    misfortune clearly in modern English.
- source_word: ἡ ἀρά
  chosen: the curse
  alternatives:
  - the oath-curse
  - the imprecation
  lexicon: BDAG
  rationale: ἀρά in this context is the covenant curse pronounced for disobedience.
    'The curse' is the most natural and sufficiently weighty rendering; more technical
    options would overtranslate the verse.
- source_word: συνέταξεν
  chosen: appointed
  alternatives:
  - ordained
  - commanded
  - decreed
  - prescribed
  lexicon: BDAG
  rationale: The verb can denote ordering or prescribing. Because the object is 'the
    calamities and the curse,' 'appointed' best captures that the Lord set these sanctions
    in order through Moses without implying mere verbal command.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' With the article in English
    syntax, 'the Lord' is the natural expression here.
- source_word: παιδὶ αὐτοῦ
  chosen: his servant
  alternatives:
  - his child
  - his attendant
  lexicon: BDAG
  rationale: Although παῖς can mean 'child' or 'servant,' with Moses and in biblical
    register it denotes a servant of God. 'His servant' matches the contextual sense
    without importing NT servant-title debates.
- source_word: ἐν ἡμέρᾳ ᾗ
  chosen: on the day when
  alternatives:
  - in the day when
  - at the time when
  lexicon: BDAG
  rationale: This is a temporal construction referring back to the exodus event. 'On
    the day when' is idiomatic English while preserving the temporal anchoring.
- source_word: ἐξήγαγεν
  chosen: he brought ... out
  alternatives:
  - he led ... out
  lexicon: BDAG
  rationale: The exodus formula is naturally rendered 'brought out' in English and
    preserves the movement from bondage without unnecessary stiffness.
- source_word: γῆν ῥέουσαν γάλα καὶ μέλι
  chosen: a land flowing with milk and honey
  alternatives:
  - a land that flows with milk and honey
  lexicon: BDAG
  rationale: This is a fixed biblical expression and should be preserved in its familiar
    form because it accurately reflects the Greek and its scriptural resonance.
- source_word: ὡς ἡ ἡμέρα αὕτη
  chosen: as it is this day
  alternatives:
  - as on this day
  - as to this day
  lexicon: BDAG
  rationale: The phrase marks continuing present reality from the speaker's standpoint.
    'As it is this day' preserves the formal biblical idiom while remaining intelligible.
