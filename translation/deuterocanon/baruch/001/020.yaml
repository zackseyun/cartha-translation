theological_decisions:
- issue: Nature of the covenant sanctions in view
  chosen_reading: The verse refers to covenant judgments attaching to the people as
    consequences announced by the Lord through Moses.
  alternative_readings:
  - A more general statement about misfortunes and cursing without specific covenantal
    background
  rationale: The combination of 'the calamities and the curse,' the reference to Moses,
    and the exodus/gift-of-land language strongly evokes Deuteronomic covenant sanctions.
    The translation keeps this resonance without expanding the text into an explicit
    citation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
