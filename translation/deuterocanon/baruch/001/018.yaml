translation:
  text: and we disobeyed him, and did not listen to the voice of the Lord our God,
    to walk in the commandments of the Lord that he set before us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not obey the voice of the Lord our God.' The Greek says 'did not
      listen to the voice,' an expression that can carry the sense of refusing obedience.
    reason: lexical_alternative
  - marker: b
    text: Or 'commands' or 'statutes' for 'ordinances.' The Greek term refers to what
      has been prescribed or ordered.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠπειθήσαμεν
  chosen: we disobeyed
  alternatives:
  - we were disobedient
  - we refused to obey
  lexicon: BDAG
  rationale: Aorist verb from ἀπειθέω, denoting refusal or disobedience. 'We disobeyed'
    is concise, natural English and preserves the active sense better than the more
    stative 'were disobedient'.
- source_word: ἠκούσαμεν τῆς φωνῆς
  chosen: did not listen to the voice
  alternatives:
  - did not hear the voice
  - did not obey the voice
  lexicon: BDAG
  rationale: Although 'hear' can imply obedience in biblical idiom, the Greek explicitly
    uses 'voice,' and English 'listen to the voice' preserves both the auditory metaphor
    and the implied refusal without over-interpreting it as simple 'obey'.
- source_word: Κυρίου θεοῦ ἡμῶν
  chosen: the Lord our God
  alternatives:
  - the LORD our God
  lexicon: LEH
  rationale: κύριος is rendered by the project's default 'Lord.' Since this is Greek
    Baruch in the LXX rather than direct Hebrew with יהוה in the source line, 'the
    Lord' is preferred over small-caps 'the LORD,' while retaining the covenantal
    title.
- source_word: πορεύεσθαι
  chosen: to walk
  alternatives:
  - to go
  - to live
  lexicon: BDAG
  rationale: In biblical legal and ethical contexts, 'walk' is the established metaphor
    for conduct. It is more precise than 'go' and less interpretive than 'live'.
- source_word: τοῖς προστάγμασιν
  chosen: the ordinances
  alternatives:
  - the commands
  - the statutes
  - the precepts
  lexicon: LEH
  rationale: πρόσταγμα refers to what is ordered or prescribed. 'Ordinances' fits
    the legal-register context and distinguishes it from more common command terms,
    while remaining readable.
- source_word: ἔδωκεν κατὰ πρόσωπον ἡμῶν
  chosen: he set before us
  alternatives:
  - he gave before us
  - he gave in our presence
  lexicon: LEH
  rationale: The idiom κατὰ πρόσωπον ἡμῶν is awkward if rendered woodenly. 'Set before
    us' captures the sense of placing commands before the people for observance and
    is idiomatic English.
