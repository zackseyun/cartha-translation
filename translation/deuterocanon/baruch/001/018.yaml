theological_decisions:
- issue: Rendering of κύριος in a deuterocanonical Greek context
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The doctrine default for κύριος is 'Lord.' Because the immediate source
    is Greek and not a direct Hebrew witness with the Tetragrammaton visible in the
    verse, 'the Lord' best follows source-language primacy while preserving the divine
    title.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: Whether to make the obedience nuance explicit in ἠκούσαμεν τῆς φωνῆς
  chosen_reading: did not listen to the voice
  alternative_readings:
  - did not obey the voice
  - did not hear the voice
  rationale: The phrase carries an obedience implication, but the text itself says
    'listen to the voice.' Preserving the metaphor maintains theological and rhetorical
    texture without collapsing it into a paraphrase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy'
