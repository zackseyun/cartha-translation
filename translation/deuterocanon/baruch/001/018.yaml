source:
  edition: lxx-swete-1909
  text: καὶ ἠπειθήσαμεν αὐτῷ, καὶ οὐκ ἠκούσαμεν τῆς φωνῆς Κυρίου θεοῦ ἡμῶν πορεύεσθαι
    τοῖς προστάγμασιν Κυρίου οἷς ἔδωκεν κατὰ πρόσωπον ἡμῶν,
  language: Greek
  pages:
