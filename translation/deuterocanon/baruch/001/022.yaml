theological_decisions:
- issue: Rendering of κύριος in a deuterocanonical LXX context
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The covenantal reference to Israel's God favors 'Lord,' consistent with
    project doctrine and LXX usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Idolatry clause with ἐργάζεσθαι θεοῖς ἑτέροις
  chosen_reading: to serve other gods
  alternative_readings:
  - to work for other gods
  rationale: Theologically and contextually the clause describes apostasy into idolatrous
    service, not merely generic activity. The rendering should make that plain without
    over-paraphrasing.
