translation:
  text: And we each went off in the intention of his evil heart, to serve other gods,
    to do what is evil in the sight of the Lord our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the thought of his evil heart.' The Greek phrase emphasizes
      inward intention or mindset.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠχόμεθα
  chosen: went off
  alternatives:
  - went away
  - departed
  lexicon: LSJ
  rationale: From οἴχομαι, conveying going away/departing. 'Went off' preserves the
    movement away into disobedient action without sounding overly formal.
- source_word: ἕκαστος
  chosen: each
  alternatives:
  - every one
  - each one
  lexicon: LSJ
  rationale: 'Distributive sense is important: the people acted individually as well
    as collectively.'
- source_word: ἐν διανοίᾳ καρδίας αὐτοῦ τῆς πονηρᾶς
  chosen: in the intention of his evil heart
  alternatives:
  - according to the thought of his evil heart
  - in the mindset of his evil heart
  lexicon: LSJ
  rationale: The phrase combines διάνοια ('thought, intention, mindset') with καρδία
    ('heart') and the adjective πονηρά ('evil'). 'Intention' gives natural English
    while preserving the inward-volitional emphasis of the Greek.
- source_word: ἐργάζεσθαι θεοῖς ἑτέροις
  chosen: to serve other gods
  alternatives:
  - to work for other gods
  - to act for other gods
  lexicon: LSJ
  rationale: Although ἐργάζομαι is literally 'work/do,' with a dative object here
    it idiomatically expresses rendering service. 'Serve other gods' best captures
    the sense in context of idolatry.
- source_word: ποιῆσαι τὰ κακὰ
  chosen: to do what is evil
  alternatives:
  - to do evil things
  - to commit evil
  lexicon: LSJ
  rationale: The articular neuter plural τὰ κακὰ is naturally rendered as 'what is
    evil' in idiomatic English while retaining moral force.
- source_word: κατʼ ὀφθαλμοὺς Κυρίου θεοῦ ἡμῶν
  chosen: in the sight of the Lord our God
  alternatives:
  - before the eyes of the Lord our God
  - before the Lord our God
  lexicon: LSJ
  rationale: This is a standard biblical idiom for divine evaluation. 'In the sight
    of' is clear modern English and preserves the metaphor.
- source_word: Κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Per doctrine, κύριος defaults to 'Lord.' Here it refers to Israel's God
    in a covenantal context.
