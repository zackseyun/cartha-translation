translation:
  text: And pray for us to the Lord our God, because we have sinned against the Lord
    our God, and the anger of the Lord and his wrath have not turned away from us
    to this day.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσεύξασθε
  chosen: pray
  alternatives:
  - pray earnestly
  - offer prayer
  lexicon: BDAG
  rationale: 'Aorist middle imperative, second plural: a direct command to address
    God in prayer. ''Pray'' is the natural modern English imperative and preserves
    the force without unnecessary expansion.'
- source_word: περὶ ἡμῶν
  chosen: for us
  alternatives:
  - concerning us
  - on our behalf
  lexicon: BDAG
  rationale: With prayer language, περί + genitive commonly conveys intercession.
    'For us' is idiomatic and accurately reflects the request for intercessory prayer.
- source_word: Κύριον τὸν θεὸν ἡμῶν
  chosen: the Lord our God
  alternatives:
  - the Lord, our God
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default 'Lord.' The appositional
    phrase is naturally expressed in English as 'the Lord our God,' preserving covenantal
    address.
- source_word: ἡμάρτομεν
  chosen: we have sinned
  alternatives:
  - we sinned
  lexicon: BDAG
  rationale: The aorist can be rendered simply as past, but in this penitential context
    English present perfect communicates a past act with continuing relevance, matching
    the ongoing consequence stated in the next clause.
- source_word: τῷ κυρίῳ θεῷ ἡμῶν
  chosen: against the Lord our God
  alternatives:
  - to the Lord our God
  lexicon: BDAG
  rationale: Although the Greek uses the dative after ἁμαρτάνω, idiomatic English
    requires 'sin against' when the offended party is expressed. This makes the relational
    offense clear without adding content.
- source_word: οὐκ ἀπέστρεψεν
  chosen: has not turned away
  alternatives:
  - did not turn away
  - has not been turned away
  lexicon: BDAG
  rationale: The singular verb with θυμός as subject is best rendered actively. Present
    perfect in English fits the continuing state 'to this day.'
- source_word: ὁ θυμὸς Κυρίου
  chosen: the anger of the Lord
  alternatives:
  - the Lord's fury
  - the Lord's indignation
  lexicon: BDAG
  rationale: θυμός denotes strong anger or wrath. 'Anger' is clear modern English
    and avoids overstating beyond the term's normal range.
- source_word: ἡ ὀργὴ αὐτοῦ
  chosen: his wrath
  alternatives:
  - his anger
  - his indignation
  lexicon: BDAG
  rationale: Using 'wrath' here preserves the rhetorical pairing with θυμός without
    flattening both nouns into the same English word. The double expression communicates
    intensified divine displeasure.
- source_word: ἀφʼ ἡμῶν
  chosen: from us
  alternatives:
  - away from us
  lexicon: BDAG
  rationale: Combined with 'turned away,' the phrase is naturally completed in English
    as 'turned away from us.'
- source_word: ἕως τῆς ἡμέρας ταύτης
  chosen: to this day
  alternatives:
  - until this day
  - up to this day
  lexicon: BDAG
  rationale: A standard idiomatic rendering that preserves the temporal force in natural
    English.
