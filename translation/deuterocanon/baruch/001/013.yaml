theological_decisions:
- issue: Rendering the paired divine-displeasure terms θυμός and ὀργή
  chosen_reading: Translate distinctly as 'anger' and 'wrath'
  alternative_readings:
  - Translate both as 'anger'
  - Translate as 'fury' and 'anger'
  rationale: The Greek uses two near-synonymous terms in parallel for emphasis. Distinct
    English renderings preserve the rhetorical weight without importing a technical
    theological distinction between the terms.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
- issue: English tense choice for aorists in a penitential context
  chosen_reading: Use present perfects ('we have sinned,' 'has not turned away')
  alternative_readings:
  - Use simple pasts ('we sinned,' 'did not turn away')
  rationale: Although the Greek aorists are formally past, the verse stresses continuing
    consequences 'to this day.' Present perfect English best communicates that ongoing
    relevance while remaining faithful to the source sense.
  doctrine_reference: DOCTRINE.md § Translation philosophy 6
