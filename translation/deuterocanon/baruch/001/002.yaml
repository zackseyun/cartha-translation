  edition: lxx-swete-1909
  text: ἐν τῷ ἔτει τῷ πέμπτῳ ἐν ἑβδόμῃ τοῦ μηνός, ἐν τῷ καιρῷ ᾧ ἔλαβον οἱ Χαλδαῖοι
    τὴν Ἰερουσαλὴμ καὶ ἐνέπρησαν αὐτὴν ἐν πυρί.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
