translation:
  text: in the fifth year, on the seventh day of the month, at the time when the Chaldeans
    captured Jerusalem and burned it with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'in the seventh of the month'; the translation understands
      the common elliptical dating formula as 'on the seventh day of the month.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ ἔτει τῷ πέμπτῳ
  chosen: in the fifth year
  alternatives:
  - in year five
  - during the fifth year
  lexicon: LSJ
  rationale: A straightforward temporal dative with ἐν; 'in the fifth year' is idiomatic
    and formally close.
- source_word: ἐν ἑβδόμῃ τοῦ μηνός
  chosen: on the seventh day of the month
  alternatives:
  - in the seventh month
  - on the seventh of the month
  lexicon: LSJ
  rationale: Although ἡμέρᾳ is not expressed, the feminine ordinal ἑβδόμῃ with the
    genitive τοῦ μηνός is naturally understood as an ellipsis for 'the seventh day
    of the month,' a common dating formula. Rendering it as 'in the seventh month'
    would mismatch the feminine form and the idiom.
- source_word: ἐν τῷ καιρῷ ᾧ
  chosen: at the time when
  alternatives:
  - when
  - in the time that
  lexicon: LSJ
  rationale: This preserves the temporal force of καιρός with readable English; 'when'
    alone would be slightly leaner but less explicit.
- source_word: ἔλαβον
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: LSJ
  rationale: For a city as direct object, 'captured' conveys the military sense of
    λαμβάνω more clearly in modern English than the more literal 'took.'
- source_word: οἱ Χαλδαῖοι
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: LSJ
  rationale: The Greek ethnonym is Χαλδαῖοι; 'Chaldeans' is the direct rendering.
    'Babylonians' is historically explanatory but less textually exact.
- source_word: ἐνέπρησαν
  chosen: burned
  alternatives:
  - set ablaze
  - burned down
  lexicon: LSJ
  rationale: The verb means to set on fire/burn. 'Burned' is concise and natural;
    'burned down' adds a nuance of total destruction not explicitly stated by the
    verb alone.
- source_word: ἐν πυρί
  chosen: with fire
  alternatives:
  - by fire
  - in fire
  lexicon: LSJ
  rationale: This instrumental phrase is conventionally and clearly rendered 'with
    fire' in English.
