    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: and they sent to Jerusalem, to Jehoiakim son of Hilkiah, son of Shallum, the
    priest, and to the priests, and to all the people who were found with him in Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''with him'' (singular). The antecedent is not explicit in this
      verse; some might understand the sense more generally as those present there.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπέστειλαν
  chosen: they sent
  alternatives:
  - they dispatched
  - they sent word
  lexicon: BDAG
  rationale: The aorist verb straightforwardly denotes sending. 'They sent' is the
    most natural English rendering here and leaves the object implicit as in the Greek,
    to be clarified by the following verse context if needed.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: εἰς with a place name normally indicates movement toward/into. In idiomatic
    English with a city, 'to Jerusalem' is preferred.
- source_word: πρὸς Ἰωακεὶμ ... τὸν ἱερέα
  chosen: to Jehoiakim son of Hilkiah, son of Shallum, the priest
  alternatives:
  - to Jehoiakim ... the high priest
  lexicon: BDAG
  rationale: πρός with persons here marks the recipients of the sending. ἱερεύς means
    'priest'; the Greek in this verse does not include ἀρχιερεύς ('high priest'),
    so 'the priest' should not be expanded beyond the source text.
- source_word: τοὺς ἱερεῖς
  chosen: the priests
  lexicon: BDAG
  rationale: A simple plural of ἱερεύς; rendered consistently as 'priests'.
- source_word: πάντα τὸν λαόν
  chosen: all the people
  alternatives:
  - the whole people
  - all the populace
  lexicon: BDAG
  rationale: The phrase is collective singular in Greek but idiomatic English is 'all
    the people.' This preserves the collective sense without awkwardness.
- source_word: τοὺς εὑρεθέντας
  chosen: who were found
  alternatives:
  - who were present
  - who were there
  lexicon: BDAG
  rationale: The participle of εὑρίσκω literally means 'having been found.' 'Who were
    found' keeps the formal sense; although 'who were present' is smoother, the more
    literal rendering better preserves the source wording.
- source_word: μετ᾽ αὐτοῦ
  chosen: with him
  alternatives:
  - with them
  lexicon: BDAG
  rationale: The transmitted Greek reads singular αὐτοῦ, so the translation follows
    it as 'with him.' Because the antecedent may strike readers as unclear in context,
    the singular is preserved rather than silently normalized.
