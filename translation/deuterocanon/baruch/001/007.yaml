reference: Baruch 1:7
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστειλαν εἰς Ἰερουσαλὴμ πρὸς Ἰωακεὶμ υἱὸν Χελκίου υἱοῦ Σαλὼμ τὸν ἱερέα,
    καὶ πρὸς τοὺς ἱερεῖς καὶ πρὸς πάντα τὸν λαὸν τοὺς εὑρεθέντας μετ᾽ αὐτοῦ ἐν Ἰερουσαλήμ,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
