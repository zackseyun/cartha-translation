translation:
  text: which the Lord spoke against us—all these evils that came upon us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all these calamities' or 'all these disasters.' The Greek 'evils' here
      refers to the harmful judgments that came upon the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἃ
  chosen: which
  alternatives:
  - that
  lexicon: LSJ
  rationale: Relative pronoun introducing the clause; 'which' fits the formal linkage
    to the preceding context while remaining natural English.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  - declared
  lexicon: BDAG
  rationale: Aorist of λαλέω, here referring to what the Lord uttered or announced.
    'Spoke' is straightforward and preserves the verbal connection without over-interpreting
    as a formal decree.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Greek deuterocanonical
    context the source text has Κύριος, not the Hebrew divine name directly, so 'Lord'
    is preferred in the main text.
- source_word: ἐφ᾽ ἡμᾶς
  chosen: against us
  alternatives:
  - upon us
  - concerning us
  lexicon: BDAG
  rationale: With verbs of speaking and in this judgment context, ἐπί + accusative
    can carry an adversative sense. 'Against us' best captures that the Lord's spoken
    word was a word of judgment, not merely speech 'about' us.
- source_word: πάντα τὰ κακὰ ταῦτα
  chosen: all these evils
  alternatives:
  - all these calamities
  - all these disasters
  lexicon: BDAG
  rationale: κακά can denote evils or calamities. Because the phrase refers to covenant
    judgments that have befallen the people, 'evils' preserves the Greek wording while
    allowing the context to supply the sense of disastrous events. 'Calamities' is
    possible but slightly more interpretive.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - came to pass
  - fell
  lexicon: BDAG
  rationale: Simple aorist of ἔρχομαι. 'Came' is idiomatic in the phrase 'came upon
    us' and avoids archaic expansion.
- source_word: ἐφ᾽ ἡμᾶς
  chosen: upon us
  alternatives:
  - against us
  lexicon: BDAG
  rationale: In the second occurrence, the idiom with ἔρχομαι is naturally rendered
    'came upon us.' This preserves the repeated Greek preposition while using the
    most natural English collocation.
