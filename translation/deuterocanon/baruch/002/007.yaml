theological_decisions:
- issue: Whether τὰ κακά should be rendered morally ('evils') or experientially ('calamities/disasters')
    in a judgment context
  chosen_reading: Rendered as 'evils' in the main text
  alternative_readings:
  - calamities
  - disasters
  rationale: The Greek term can denote harmful events as well as evils more broadly.
    Keeping 'evils' stays closer to the source wording and preserves the theological
    tension that these are disastrous judgments spoken by the Lord, without forcing
    a narrower interpretive gloss in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
