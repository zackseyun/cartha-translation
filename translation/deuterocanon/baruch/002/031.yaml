translation:
  text: And they will know that I am the Lord their God. And I will give them a heart
    and ears that hear,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hearing ears.' The Greek phrase is literally 'ears hearing' and expresses
      ears made responsive.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνώσονται
  chosen: they will know
  alternatives:
  - they shall know
  - they will recognize
  lexicon: BDAG
  rationale: Future middle of γινώσκω; 'they will know' is the plain, natural English
    future and preserves the covenantal recognition sense without overinterpreting
    it as merely intellectual awareness.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' is the standard rendering. Here
    it functions as the divine title in relation to 'their God.'
- source_word: ὁ θεὸς αὐτῶν
  chosen: their God
  alternatives:
  - the God of them
  lexicon: BDAG
  rationale: Idiomatic English possessive best reflects the Greek phrase while preserving
    covenantal relationship language.
- source_word: δώσω
  chosen: I will give
  alternatives:
  - I shall give
  lexicon: BDAG
  rationale: Simple future of δίδωμι; 'I will give' is the most natural modern English
    rendering.
- source_word: καρδίαν
  chosen: a heart
  alternatives:
  - heart
  - an inner heart
  lexicon: BDAG
  rationale: The anarthrous singular is retained as 'a heart,' matching the Greek
    form and preserving the anthropological metaphor of inward disposition.
- source_word: ὦτα ἀκούοντα
  chosen: ears that hear
  alternatives:
  - hearing ears
  - ears to hear
  lexicon: BDAG
  rationale: The participial phrase literally denotes ears characterized by hearing.
    'Ears that hear' is transparent and natural, while avoiding the more idiomatic
    but slightly interpretive 'ears to hear.'
