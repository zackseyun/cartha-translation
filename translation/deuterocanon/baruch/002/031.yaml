theological_decisions:
- issue: Anthropological restoration imagery in 'heart and ears that hear'
  chosen_reading: Retain the concrete bodily metaphors rather than abstracting to
    'understanding' or 'obedience.'
  alternative_readings:
  - a mind and receptivity
  - understanding hearts and listening ears
  rationale: The Greek uses concrete terms καρδίαν and ὦτα ἀκούοντα. Preserving the
    imagery maintains the text's theological tension between inward transformation
    and responsive hearing without paraphrasing into a doctrinal explanation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
