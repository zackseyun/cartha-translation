reference: Baruch 2:31
source:
  edition: lxx-swete-1909
  text: καὶ γνώσονται ὅτι ἐγὼ Κύριος ὁ θεὸς αὐτῶν. καὶ δώσω αὐτοῖς καρδίαν καὶ ὦτα
    ἀκούοντα,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
