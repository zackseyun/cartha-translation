  text: ἡμάρτομεν, ἠσεβήσαμεν, ἠδικήσαμεν, Κύριε ὁ θεὸς ἡμῶν, ἐπὶ πᾶσιν τοῖς δικαιώμασίν
    σου.
  language: Greek
  pages: []
