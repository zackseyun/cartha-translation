theological_decisions:
- issue: Rendering of κύριος in direct address to God
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: DOCTRINE.md specifies 'Lord' as the default rendering for κύριος. Since
    the Greek source has κύριος rather than the Hebrew divine name, 'Lord' is the
    appropriate translation.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Nuance of δικαιώματα in a penitential confession
  chosen_reading: ordinances
  alternative_readings:
  - righteous judgments
  - statutes
  - requirements
  rationale: The verse confesses sin in relation to God's binding standards. 'Ordinances'
    preserves that covenantal/legal force while avoiding an overly narrow judicial
    sense. This keeps the text's theological weight without importing a more specific
    doctrinal category than the Greek requires.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
