translation:
  text: We have sinned, we have acted ungodly, we have done wrong, O Lord our God,
    against all your ordinances.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against all your righteous judgments' or 'with respect to all your ordinances.'
      The Greek phrase can be understood in relation to God's decrees or standards
      more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμάρτομεν
  chosen: We have sinned
  alternatives:
  - We sinned
  lexicon: BDAG
  rationale: Aorist verb of sinning/confessing wrongdoing. English present perfect
    fits the confessional force in context while remaining natural and close to the
    Greek.
- source_word: ἠσεβήσαμεν
  chosen: we have acted ungodly
  alternatives:
  - we have been ungodly
  - we have acted impiously
  lexicon: BDAG
  rationale: The verb denotes impious or ungodly conduct. 'Acted ungodly' preserves
    the verbal force better than the more stative 'been ungodly,' and is more accessible
    than 'acted impiously.'
- source_word: ἠδικήσαμεν
  chosen: we have done wrong
  alternatives:
  - we have acted unjustly
  - we have wronged
  lexicon: BDAG
  rationale: The verb can mean to do wrong, act unjustly, or wrong someone. Here,
    without an explicit personal object, the broader 'done wrong' best fits the confession
    sequence and avoids over-specifying interpersonal harm.
- source_word: Κύριε
  chosen: O Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine, κύριος is rendered 'Lord.' The interjection
    'O' reflects direct address in prayer/confession and suits the solemn tone.
- source_word: ὁ θεὸς ἡμῶν
  chosen: our God
  alternatives:
  - the God of us
  lexicon: BDAG
  rationale: Standard possessive rendering in English; formally anchored and idiomatic.
- source_word: ἐπὶ
  chosen: against
  alternatives:
  - in regard to
  - concerning
  - with respect to
  lexicon: BDAG
  rationale: With the dative here, ἐπί can mark relation or basis. In this penitential
    context, 'against' best conveys offense in relation to God's righteous requirements.
- source_word: πᾶσιν
  chosen: all
  alternatives:
  - every
  lexicon: BDAG
  rationale: Straightforward distributive/plural sense modifying 'ordinances.'
- source_word: τοῖς δικαιώμασίν σου
  chosen: your ordinances
  alternatives:
  - your righteous judgments
  - your statutes
  - your requirements
  lexicon: BDAG
  rationale: δικαίωμα can denote ordinance, requirement, statute, or righteous decree.
    'Ordinances' preserves the legal-covenantal sense without narrowing it to judicial
    verdicts alone. 'Righteous judgments' is possible but less likely here than a
    broader reference to God's prescribed standards.
