theological_decisions:
- issue: Force of God's spoken word in a judgment context
  chosen_reading: The verse states that the Lord has enacted the judgment he previously
    spoke.
  alternative_readings:
  - The Lord has established/confirmed his word in a more general sense.
  rationale: The surrounding objects ('against us... against our judges... kings...
    rulers') indicate punitive fulfillment rather than a neutral confirmation of speech.
    The translation therefore reflects enacted judgment without adding details not
    present in the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of ἄνθρωπον with gender accuracy
  chosen_reading: the men of Israel and Judah
  alternative_readings:
  - the people of Israel and Judah
  - everyone in Israel and Judah
  rationale: Per doctrine, gender-accurate renderings are preferred where the source
    uses a masculine human term. Because the Greek is collective and somewhat compressed,
    a lexical-alternative footnote preserves the broader-inclusive possibility for
    readers.
  doctrine_reference: Translation philosophy §4
