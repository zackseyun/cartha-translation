id: BAR.2.34
reference: Baruch 2:34
source:
  edition: lxx-swete-1909
  text: καὶ ἀποστρέψω αὐτοὺς εἰς τὴν γῆν ἣν ὤμοσα τοῖς πατράσιν αὐτῶν, τῷ Ἀβραὰμ καὶ
    τῷ Ἰσαὰκ καὶ τῷ Ἰακώβ, καὶ κυριεύσουσιν αὐτῆς· καὶ πληθυνῶ αὐτούς, καὶ οὐ μὴ σμικρυνθῶσιν·
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: and I will bring them back to the land that I swore to their fathers—to Abraham
    and Isaac and Jacob—and they will rule over it; and I will multiply them, and
    they will certainly not be diminished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will possess it.' The Greek verb can denote exercising dominion
      or possessing by mastery; 'rule over it' was chosen as the more direct rendering
      of the verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστρέψω
  chosen: I will bring ... back
  alternatives:
  - I will turn ... back
  - I will restore
  lexicon: BDAG
  rationale: Future active of ἀποστρέφω here has the sense of causing return to a
    place. 'Bring ... back' is idiomatic English that preserves the movement implied
    by εἰς τὴν γῆν without over-paraphrasing.
- source_word: γῆν
  chosen: land
  alternatives:
  - earth
  - country
  lexicon: BDAG
  rationale: In covenantal context with the patriarchs, γῆ refers specifically to
    the promised land, not the earth in general.
- source_word: ὤμοσα
  chosen: I swore
  alternatives:
  - I promised with an oath
  - I pledged
  lexicon: BDAG
  rationale: The verb explicitly denotes swearing an oath. 'I swore' is concise and
    preserves the covenantal force.
- source_word: πατράσιν
  chosen: fathers
  alternatives:
  - ancestors
  lexicon: BDAG
  rationale: The Greek is masculine plural and specifically identifies the patriarchs
    immediately after. 'Fathers' matches the source and the named referents Abraham,
    Isaac, and Jacob.
- source_word: κυριεύσουσιν
  chosen: they will rule over
  alternatives:
  - they will possess
  - they will have dominion over
  lexicon: BDAG
  rationale: κυριεύω commonly means to rule, be lord over, or exercise dominion. Although
    in land contexts 'possess' is possible as an interpretive smoothing, 'rule over'
    more directly reflects the Greek form and preserves its stronger sense.
- source_word: πληθυνῶ
  chosen: I will multiply
  alternatives:
  - I will make numerous
  - I will increase
  lexicon: BDAG
  rationale: This echoes covenant language of increasing descendants. 'Multiply' is
    the most direct and biblically resonant rendering.
- source_word: οὐ μὴ
  chosen: certainly not
  alternatives:
  - by no means
  - not at all
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation. 'Certainly
    not' conveys the force naturally in English.
- source_word: σμικρυνθῶσιν
  chosen: be diminished
  alternatives:
  - be made few
  - be reduced
  - be made small
  lexicon: BDAG
  rationale: The passive sense is that their numbers/status will not be reduced. 'Be
    diminished' is natural English and pairs well with 'I will multiply them.'
