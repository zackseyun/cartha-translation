theological_decisions:
- issue: Covenantal restoration language tied to the patriarchal oath
  chosen_reading: Retain explicit oath language and patriarchal names in the main
    text
  alternative_readings:
  - Use 'ancestors' instead of 'fathers'
  - Render more dynamically as 'the land promised to their ancestors'
  rationale: The verse grounds restoration in God's sworn oath to Abraham, Isaac,
    and Jacob. Keeping 'swore' and 'fathers' preserves the covenantal and patriarchal
    framing without importing further theological interpretation.
