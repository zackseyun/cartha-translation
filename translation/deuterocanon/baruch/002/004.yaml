translation:
  text: And he gave them over as subjects to all the kingdoms around us, for reproach
    and desolation among all the peoples around whom the Lord scattered them there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an impassable waste.' The Greek term rendered 'desolation' can more
      literally denote something untrodden or inaccessible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκεν
  chosen: gave ... over
  alternatives:
  - gave
  - handed over
  lexicon: BDAG
  rationale: The verb δίδωμι here carries the sense of delivering a people into the
    power of others, not merely giving in a neutral sense. 'Gave ... over' captures
    the judicial/disastrous force in natural English.
- source_word: ὑποχειρίους
  chosen: as subjects
  alternatives:
  - under the hand of
  - subjugated
  - subject to their power
  lexicon: LSJ
  rationale: The adjective means brought under another's hand or power. 'As subjects'
    communicates political subjection clearly, while avoiding an overly wooden idiom
    like 'under the hand of.'
- source_word: πάσαις ταῖς βασιλείαις
  chosen: to all the kingdoms
  alternatives:
  - to every kingdom
  - to all the kingdoms
  lexicon: BDAG
  rationale: The dative with ὑποχειρίους indicates subjection to surrounding political
    powers. 'All the kingdoms' preserves the plural and the comprehensive force.
- source_word: ταῖς κύκλῳ ἡμῶν
  chosen: around us
  alternatives:
  - surrounding us
  - all around us
  lexicon: BDAG
  rationale: κύκλῳ denotes surrounding location. 'Around us' is simple and direct,
    and it can be repeated later to preserve the Greek structure.
- source_word: εἰς ὀνειδισμόν
  chosen: for reproach
  alternatives:
  - for disgrace
  - for scorn
  lexicon: BDAG
  rationale: ὀνειδισμός denotes public reproach or disgrace. 'Reproach' preserves
    the covenantal/shame nuance common in biblical diction without becoming archaic.
- source_word: ἄβατον
  chosen: desolation
  alternatives:
  - an impassable place
  - waste
  - deserted ruin
  lexicon: LSJ
  rationale: Although literally related to something inaccessible or untrodden, in
    this judgment context it functions idiomatically as devastation/desolation. 'Desolation'
    best fits the parallel with reproach and the condition of a scattered people among
    the nations.
- source_word: λαοῖς
  chosen: peoples
  alternatives:
  - nations
  - peoples
  lexicon: BDAG
  rationale: λαοί can mean peoples broadly, not necessarily political nations. 'Peoples'
    avoids flattening it into a technical geopolitical term and matches the plural
    ethnic sense.
- source_word: διέσπειρεν
  chosen: scattered
  alternatives:
  - dispersed
  - spread abroad
  lexicon: BDAG
  rationale: The verb is the standard term for scattering in exile contexts. 'Scattered'
    is the most natural and biblically recognizable rendering.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord.' With the article in
    English, 'the Lord' is the natural phrasing in this clause.
