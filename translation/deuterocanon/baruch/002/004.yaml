theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: This follows the project's default rendering for κύριος and preserves
    the text's attribution of the scattering to divine judgment without importing
    further doctrinal claims.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of ἄβατον in a judgment context
  chosen_reading: desolation
  alternative_readings:
  - an impassable place
  - waste
  rationale: The Greek adjective can denote what is inaccessible or untrodden, but
    in this context paired with 'reproach' and applied among the peoples, the sense
    is best represented as a state of devastation and ruin. This preserves the severity
    of judgment without over-literal awkwardness.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
