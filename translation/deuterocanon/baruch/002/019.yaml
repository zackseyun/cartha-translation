theological_decisions:
- issue: Whether the verse denies reliance on ancestral and royal merit in prayer
  chosen_reading: The speakers confess that their appeal to God is not grounded in
    the righteous deeds of their fathers or kings.
  alternative_readings:
  - The phrase could be read more formally as not basing their petition on the legal
    righteousness or ordinances associated with their ancestors.
  rationale: The immediate prayer context favors a rejection of merit-based appeal
    rather than a statement about legal codes. This preserves the penitential force
    without overstating a doctrine beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
