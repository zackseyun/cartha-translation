reference: Baruch 2:19
source:
  edition: lxx-swete-1909
  text: ὅτι οὐκ ἐπὶ τὰ δικαιώματα τῶν πατέρων ἡμῶν καὶ τῶν βασιλέων ἡμῶν ἡμεῖς καταβάλλομεν
    τὸν ἔλεον κατὰ πρόσωπόν σου, Κύριε ὁ θεὸς ἡμῶν,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: for it is not on the basis of the righteous deeds of our fathers and of our
    kings that we lay our plea for mercy before you, O Lord our God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'righteous acts'; less likely here, 'ordinances' or 'statutes.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'before your face,' an idiom meaning 'in your presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιώματα
  chosen: righteous deeds
  alternatives:
  - righteous acts
  - ordinances
  - statutes
  - just deeds
  lexicon: LSJ
  rationale: In this penitential prayer context, the phrase 'of our fathers and of
    our kings' points to deeds or claims of righteousness rather than legal ordinances
    possessed by them. 'Righteous deeds' best captures the sense of meritorious acts
    without importing technical legal language.
- source_word: καταβάλλομεν
  chosen: lay
  alternatives:
  - present
  - cast down
  - bring forward
  - submit
  lexicon: LSJ
  rationale: With 'τὸν ἔλεον' and 'before your face,' the verb is idiomatic for setting
    or laying something before someone. 'Lay' preserves the concrete imagery while
    remaining natural English.
- source_word: τὸν ἔλεον
  chosen: our plea for mercy
  alternatives:
  - mercy
  - compassion
  - supplication for mercy
  lexicon: LSJ
  rationale: A literal 'the mercy' is awkward in English and could imply that the
    speakers are offering mercy rather than appealing for it. The context is petitionary
    prayer, so 'our plea for mercy' makes explicit the object of the appeal while
    staying close to the idiom.
- source_word: κατὰ πρόσωπόν σου
  chosen: before your face
  alternatives:
  - before you
  - in your presence
  lexicon: LSJ
  rationale: The Greek is literally face-oriented language. 'Before your face' preserves
    the vivid Hebraic/LXX idiom and the solemnity of direct address, while remaining
    understandable in English.
- source_word: Κύριε ὁ θεὸς ἡμῶν
  chosen: O Lord our God
  alternatives:
  - O Lord, our God
  lexicon: LSJ
  rationale: '''Lord'' follows the project''s default rendering for κύριος. The vocative
    address is retained with ''O'' for prayerful solemnity.'
