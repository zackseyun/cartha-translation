id: BAR.2.28
reference: Baruch 2:28
source:
  edition: lxx-swete-1909
  text: καθὰ ἐλάλησας ἐν χειρὶ παιδός σου Μωυσῆ, ἐν ἡμέρᾳ ἐντειλαμένου σου αὐτῷ γράψαι
    τὸν νόμον σου ἐναντίον υἱῶν Ἰσραὴλ λέγων
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: just as you spoke by the hand of your servant Moses, on the day when you commanded
    him to write your law before the sons of Israel, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'by the hand of' is a biblical idiom meaning 'through' or 'by means
      of.'
    reason: cultural_note
  - marker: b
    text: Or 'the children of Israel' / 'the Israelites.' The Greek reads 'sons of
      Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὰ
  chosen: just as
  alternatives:
  - according as
  - as
  lexicon: LSJ
  rationale: Introduces comparison/correspondence with what follows; 'just as' is
    idiomatic modern English and preserves the force.
- source_word: ἐλάλησας
  chosen: you spoke
  alternatives:
  - you said
  lexicon: LSJ
  rationale: Aorist of λαλέω; 'spoke' is slightly more formal and fits the solemn
    scriptural context.
- source_word: ἐν χειρὶ
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: LSJ
  rationale: This is a standard biblical idiom for mediated agency. Retaining 'by
    the hand of' preserves the source texture while remaining understandable.
- source_word: παιδός σου
  chosen: your servant
  alternatives:
  - your child
  - your slave
  lexicon: LSJ
  rationale: In this context παῖς refers to Moses as God's commissioned servant. 'Servant'
    is the natural biblical-English rendering here; 'child' is contextually wrong,
    and 'slave' would overstate bonded-status nuance in this idiom.
- source_word: ἐν ἡμέρᾳ
  chosen: on the day
  alternatives:
  - in the day
  - when
  lexicon: LSJ
  rationale: Temporal dative phrase best rendered idiomatically as 'on the day,' preserving
    the formal cadence of the Greek.
- source_word: ἐντειλαμένου σου αὐτῷ
  chosen: when you commanded him
  alternatives:
  - when you gave him orders
  - at your commanding him
  lexicon: LSJ
  rationale: Genitive absolute expressing attendant time/circumstance. 'When you commanded
    him' is clear and natural.
- source_word: γράψαι
  chosen: to write
  alternatives:
  - to record
  lexicon: LSJ
  rationale: Infinitive of purpose after the command; 'write' is direct and sufficient.
- source_word: τὸν νόμον σου
  chosen: your law
  alternatives:
  - your instruction
  lexicon: LSJ
  rationale: νόμος can mean law or instruction; in this Mosaic covenantal setting
    'law' is the most recognizable and contextually appropriate rendering.
- source_word: ἐναντίον
  chosen: before
  alternatives:
  - in the presence of
  - against
  lexicon: LSJ
  rationale: With persons, ἐναντίον commonly means 'before/in the presence of.' 'Against'
    would misread the relational sense here.
- source_word: υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: LSJ
  rationale: Per project philosophy, gender-accurate rendering is preferred where
    the source is explicitly masculine. 'Sons of Israel' preserves the Greek form
    and biblical register.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: LSJ
  rationale: Participle introducing the quoted content in the next verse; 'saying'
    should be retained because the sentence continues.
