theological_decisions:
- issue: Rendering of παῖς for Moses
  chosen_reading: your servant
  alternative_readings:
  - your child
  - your slave
  rationale: The term can bear several senses, but in reference to Moses as God's
    commissioned agent, 'servant' best reflects the honorific covenantal role without
    importing filial or overly literal slave imagery.
  doctrine_reference: 'DOCTRINE.md: δοῦλος/servant-slave context sensitivity; translate
    according to source sense and context'
- issue: Gendered phrase υἱῶν Ἰσραήλ
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Greek is explicitly masculine plural. Following the project's gender-accurate
    policy, the translation preserves that form rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
