theological_decisions:
- issue: Biblical idiom of the divine name being 'called upon' a people
  chosen_reading: Retain the idiom closely as 'your name has been called upon Israel'
  alternative_readings:
  - your name has been invoked over Israel
  - Israel bears your name
  - Israel is called by your name
  rationale: The phrase signals covenant belonging and public identification with
    God. A more interpretive rendering like 'is called by your name' is possible,
    but the draft keeps the Greek idiom more transparently while preserving the theological
    sense in a footnote.
