id: BAR.2.15
reference: Baruch 2:15
source:
  edition: lxx-swete-1909
  text: ἵνα γνῷ πᾶσα ἡ γῆ ὅτι σὺ Κύριος ὁ θεὸς ἡμῶν, ὅτι τὸ ὄνομά σου ἐπεκλήθη ἐπὶ
    Ἰσραὴλ καὶ ἐπὶ τὸ γένος αὐτοῦ.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: so that all the earth may know that you, Lord, are our God, because your name
    has been called upon Israel and upon his offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your name has been invoked over Israel,' or more interpretively, 'Israel
      is called by your name.' The Greek idiom expresses belonging to and identification
      with God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα γνῷ
  chosen: so that ... may know
  alternatives:
  - that ... may know
  - in order that ... may know
  lexicon: BDAG
  rationale: ἵνα with the aorist subjunctive expresses purpose/result. 'So that ...
    may know' is natural modern English while preserving the purposive force.
- source_word: πᾶσα ἡ γῆ
  chosen: all the earth
  alternatives:
  - the whole earth
  - all the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' In this context of universal recognition
    of Israel's God, the broader sense 'earth' best fits the scope of πᾶσα.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - LORD
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' The Greek text has Κύριος, not
    the Hebrew divine name directly, so 'Lord' is the appropriate rendering.
- source_word: ὁ θεὸς ἡμῶν
  chosen: our God
  alternatives:
  - the God of us
  lexicon: BDAG
  rationale: Standard possessive rendering in English; it preserves the covenantal
    confession without wooden phrasing.
- source_word: τὸ ὄνομά σου ἐπεκλήθη ἐπὶ
  chosen: your name has been called upon
  alternatives:
  - your name has been invoked over
  - your name has been called over
  - your name is called by
  lexicon: BDAG
  rationale: The idiom ἐπικαλεῖσθαι/ἐπικέκλησθαι ἐπί with 'name' commonly denotes
    that someone is designated by or bears another's name. 'Has been called upon'
    stays close to the Greek form and preserves the biblical idiom, though English
    readers may also hear the sense 'called over/designated upon.'
- source_word: Ἰσραήλ
  chosen: Israel
  lexicon: BDAG
  rationale: Standard transliteration of the proper name.
- source_word: τὸ γένος αὐτοῦ
  chosen: his offspring
  alternatives:
  - his race
  - his family line
  - his descendants
  lexicon: BDAG
  rationale: γένος here refers to lineage/posterity. 'Offspring' is concise and natural.
    The pronoun αὐτοῦ most naturally refers back to Israel as a collective/patriarchal
    name in the Greek wording, so 'his' is retained rather than smoothing to 'their.'
