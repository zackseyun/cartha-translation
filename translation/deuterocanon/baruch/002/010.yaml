theological_decisions:
- issue: Whether ἠκούσαμεν should be rendered as simple hearing or as obedience
  chosen_reading: did not listen
  alternative_readings:
  - did not hear
  - did not obey
  rationale: The verse speaks of failure in relation to God's commandments. The middle
    rendering 'did not listen' preserves the Hebrew/Greek biblical idiom of hearing-as-heeding
    without collapsing the metaphor into an interpretive paraphrase.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: How to render the ethical infinitive πορεύεσθαι in covenantal context
  chosen_reading: to walk in the commandments
  alternative_readings:
  - to go in the commandments
  - to live by the commandments
  rationale: The biblical metaphor of walking is important and widely intelligible
    in English. It preserves the text's theological texture of life-conduct before
    God.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
