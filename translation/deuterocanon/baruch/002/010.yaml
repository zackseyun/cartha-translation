id: BAR.2.10
reference: Baruch 2:10
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἠκούσαμεν τῆς φωνῆς αὐτοῦ, πορεύεσθαι τοῖς προστάγμασιν Κυρίου οἷς
    ἔδωκεν κατὰ πρόσωπον ἡμῶν.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: And we did not listen to his voice, to walk in the commandments of the Lord
    that he set before us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we did not obey his voice.' The Greek literally says 'we did not listen
      to his voice,' a biblical idiom for refusing to heed God's command.
    reason: lexical_alternative
  - marker: b
    text: Literally 'which he gave before our face'; that is, commandments set before
      us.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσαμεν
  chosen: did not listen
  alternatives:
  - did not hear
  - did not obey
  lexicon: BDAG
  rationale: ἀκούω can mean hear, listen, or obey depending on context. Here the following
    infinitive phrase about walking in the Lord's commandments shows a response of
    heedful listening is in view. 'Did not listen' preserves the auditory metaphor
    without over-interpreting it as the fuller result 'obey.'
- source_word: τῆς φωνῆς αὐτοῦ
  chosen: his voice
  alternatives:
  - him
  - what he said
  lexicon: BDAG
  rationale: The Greek explicitly says 'the voice of him/his voice.' Retaining 'his
    voice' preserves the biblical idiom and the personal force of divine address.
- source_word: πορεύεσθαι
  chosen: to walk
  alternatives:
  - to go
  - to live
  lexicon: BDAG
  rationale: In scriptural moral contexts, 'walk' is a standard metaphor for conduct.
    It is more faithful to the idiom than the flatter 'live,' while still natural
    in English with 'in the commandments.'
- source_word: τοῖς προστάγμασιν
  chosen: the commandments
  alternatives:
  - the ordinances
  - the decrees
  - the commands
  lexicon: BDAG
  rationale: πρόσταγμα denotes an order or command. 'Commandments' fits the covenantal
    context and reads naturally with 'walk in.'
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' Because the Greek lacks the
    article in English idiom after a genitive construction, 'the commandments of the
    Lord' is the most natural rendering.
- source_word: οἷς ἔδωκεν κατὰ πρόσωπον ἡμῶν
  chosen: that he set before us
  alternatives:
  - which he gave before us
  - which he gave in our presence
  lexicon: BDAG
  rationale: The phrase is somewhat literal as 'which he gave before our face.' In
    English, 'set before us' preserves the spatial metaphor and covenantal presentation
    more naturally than a wooden rendering. 'In our presence' is possible but weaker
    in conveying the idea of commandments placed before the people as their path.
