theological_decisions:
- issue: Implicit subject of ἐποίησεν
  chosen_reading: he refers to God
  alternative_readings:
  - an impersonal rendering such as 'was done in Jerusalem'
  rationale: The surrounding context attributes the calamity/judgment to God fulfilling
    his spoken warnings. Retaining 'he did' preserves the Greek's active verb and
    the theological claim of divine agency without adding explanatory wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
