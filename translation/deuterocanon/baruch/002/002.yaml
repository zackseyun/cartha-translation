translation:
  text: it had not been done under all heaven as he had done in Jerusalem, according
    to what is written in the law of Moses,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the whole heaven'; the phrase is an idiom for anywhere in the
      world.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐποιήθη
  chosen: it had not been done
  alternatives:
  - it was not done
  - there had not been done
  lexicon: BDAG
  rationale: A passive rendering best reflects the Greek aorist passive. The English
    pluperfect fits the discourse flow from the preceding context, indicating an unprecedented
    event up to that point.
- source_word: ὑποκάτω παντὸς τοῦ οὐρανοῦ
  chosen: under all heaven
  alternatives:
  - under the whole heaven
  - anywhere under heaven
  lexicon: LSJ
  rationale: This is a conventional idiom for the whole world. 'Under all heaven'
    stays close to the Greek while remaining intelligible; 'anywhere under heaven'
    is interpretive and slightly freer.
- source_word: καθὰ
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: LSJ
  rationale: Introduces comparison with what was done in Jerusalem. Simple 'as' is
    sufficient and natural in English.
- source_word: ἐποίησεν
  chosen: he did
  alternatives:
  - he made
  - he acted
  lexicon: BDAG
  rationale: The verb is broad, but in this context refers to what God did in judgment.
    'He did' preserves the verbal link with the earlier passive without over-specifying
    beyond the text.
- source_word: ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Standard locative rendering.
- source_word: κατὰ τὰ γεγραμμένα
  chosen: according to what is written
  alternatives:
  - according to the things written
  - in accordance with what has been written
  lexicon: BDAG
  rationale: This phrase signals conformity to scriptural record. 'What is written'
    is idiomatic English and preserves the appeal to written authority.
- source_word: ἐν τῷ νόμῳ Μωυσῆ
  chosen: in the law of Moses
  alternatives:
  - in Moses' law
  - in the Law of Moses
  lexicon: BDAG
  rationale: A straightforward genitival construction. Lowercase 'law' is used here
    because capitalization is an English style choice rather than a source-language
    feature, though 'Law' would also be defensible.
