id: BAR.2.22
reference: Baruch 2:22
source:
  edition: lxx-swete-1909
  text: καὶ ἐὰν μὴ ἀκούσητε τῆς φωνῆς Κυρίου ἐργάσασθαι τῷ βασιλεῖ Βαβυλῶνος,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: And if you do not listen to the voice of the Lord, to serve the king of Babylon,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heed the voice of the Lord'; the Greek idiom can carry the sense of
      obedience, not mere hearing.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to work for the king of Babylon'; here the sense is 'to serve'
      him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν μὴ ἀκούσητε
  chosen: if you do not listen
  alternatives:
  - if you do not hear
  - unless you obey
  lexicon: BDAG
  rationale: ἀκούω with the genitive ('of the voice') can mean hear/listen, and in
    covenantal contexts carries the sense of heed/obey. 'Listen' preserves the auditory
    idiom while allowing the implied obedience without over-paraphrasing to 'obey'
    in the main text.
- source_word: τῆς φωνῆς
  chosen: the voice
  alternatives:
  - the sound
  - the command
  lexicon: BDAG
  rationale: φωνή is literally 'voice.' Retaining 'voice' preserves the biblical idiom
    'listen to the voice of the Lord' rather than flattening it to 'command.'
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: 'κύριος is rendered by the project''s default as ''Lord.'' Here the article
    in English is natural because the Greek genitive phrase is definite: ''the voice
    of the Lord.'''
- source_word: ἐργάσασθαι
  chosen: to serve
  alternatives:
  - to work for
  - to labor for
  - to do service for
  lexicon: LSJ
  rationale: Although ἐργάζομαι commonly means 'work/do,' in this construction with
    a dative person ('for/to the king of Babylon') it conveys rendering service. 'To
    serve' best captures the political subjection in context without awkward literalism.
- source_word: τῷ βασιλεῖ Βαβυλῶνος
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: BDAG
  rationale: A straightforward genitive construction. 'The king of Babylon' is the
    clearest natural English rendering and preserves the geopolitical reference.
