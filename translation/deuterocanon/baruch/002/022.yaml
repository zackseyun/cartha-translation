theological_decisions:
- issue: Whether to make the implied obedience explicit in ἀκούσητε
  chosen_reading: Retain 'listen to the voice of the Lord' in the main text
  alternative_readings:
  - '''obey the Lord'''
  - '''heed the voice of the Lord'''
  rationale: The phrase is a standard biblical idiom in which hearing implies obedience,
    but the Greek wording is still explicitly auditory. The main text preserves that
    idiom; stronger interpretive renderings are better left as alternatives rather
    than imported into the translation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence'
