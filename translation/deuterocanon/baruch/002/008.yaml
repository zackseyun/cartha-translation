translation:
  text: And we did not seek the favor of the Lord, that each one might turn from the
    thoughts of their evil heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'we did not entreat the face of the Lord.' The Greek idiom refers
      to seeking the Lord's favorable presence or mercy.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the devices/intentions of their evil heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδεήθημεν
  chosen: seek the favor
  alternatives:
  - implore
  - entreat
  - beseech
  lexicon: BDAG
  rationale: The verb δέομαι commonly means to ask, beg, or entreat. With τοῦ προσώπου
    as its object, the idiom points to seeking favorable audience or mercy from someone
    rather than merely 'praying.' 'Seek the favor' captures the relational sense of
    appealing to the Lord's face/presence in readable English.
- source_word: τοῦ προσώπου Κυρίου
  chosen: the favor of the Lord
  alternatives:
  - the face of the Lord
  - the presence of the Lord
  lexicon: LEH
  rationale: Literally 'the face of the Lord,' a Semitic idiom often meaning presence
    or favorable attention. Because it is governed by ἐδεήθημεν, the sense is not
    simply spatial presence but appeal for mercy or favor. 'Lord' follows the project's
    default for κύριος.
- source_word: τοῦ ἀποστρέψαι
  chosen: that ... might turn
  alternatives:
  - to turn
  - for turning
  lexicon: BDAG
  rationale: 'The articular infinitive here expresses intended result or purpose connected
    with seeking the Lord: they did not seek him so that each person would turn. Rendering
    with ''that ... might turn'' gives natural English while preserving the purposive
    force.'
- source_word: ἕκαστον
  chosen: each one
  alternatives:
  - everyone
  - each person
  lexicon: BDAG
  rationale: ἕκαστον is distributive and singular. 'Each one' preserves the individualizing
    force better than the more collective 'everyone.'
- source_word: νοημάτων
  chosen: thoughts
  alternatives:
  - devices
  - intentions
  - schemes
  lexicon: LEH
  rationale: νόημα can denote thought, purpose, or design. In this penitential context,
    'thoughts' is the broadest and most natural rendering, while still allowing the
    moral sense of inward intentions.
- source_word: καρδίας
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: LEH
  rationale: '''Heart'' is the standard biblical anthropological term and preserves
    the source metaphor for the inner seat of thought and will.'
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - his
  lexicon: BDAG
  rationale: The Greek has plural αὐτῶν after singular ἕκαστον, a construction reflecting
    distributive sense across the group. English 'their' is natural and preserves
    the collective reference without awkwardness.
- source_word: τῆς πονηρᾶς
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: LEH
  rationale: πονηρός in moral contexts is well rendered 'evil.' It modifies 'heart'
    and marks the moral corruption from which they should have turned.
