theological_decisions:
- issue: Idiomatic force of 'the face of the Lord'
  chosen_reading: Rendered idiomatically as 'the favor of the Lord' in context of
    entreaty
  alternative_readings:
  - the face of the Lord
  - the presence of the Lord
  rationale: The verse concerns repentance and supplication. A wooden rendering 'did
    not beseech the face of the Lord' is obscure in modern English. 'Seek the favor
    of the Lord' preserves the penitential-theological sense of appealing for divine
    mercy without flattening the idiom into generic prayer.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; κύριος -> Lord'
- issue: Anthropological expression 'thoughts of their evil heart'
  chosen_reading: Kept the biblical image of the heart as the source of evil thoughts
  alternative_readings:
  - plans of their wicked heart
  - devices of their evil mind
  rationale: The text locates sinful intention in the heart. Preserving 'heart' maintains
    biblical theological texture and avoids over-psychologizing with 'mind' alone.
  doctrine_reference: 'DOCTRINE.md: preserve source meaning; readable modern English'
