reference: Baruch 2:32
source:
  edition: lxx-swete-1909
  text: καὶ αἰνέσουσίν με ἐν γῇ ἀποικισμοῦ αὐτῶν, καὶ μνησθήσονται τοῦ ὀνόματός μου·
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: and they will praise me in the land of their exile, and they will remember
    my name;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land of their deportation.' The Greek term can refer to removal
      and settlement away from one's homeland; 'exile' best fits the context here.
    reason: lexical_alternative
  - marker: b
    text: '''My name'' preserves the biblical idiom for God''s revealed identity and
      honor; compare the covenantal use of ''name'' elsewhere in Scripture.'
    reason: cross_reference
lexical_decisions:
- source_word: αἰνέσουσίν
  chosen: they will praise
  alternatives:
  - they will extol
  - they will give praise
  lexicon: BDAG
  rationale: Future active of αἰνέω, denoting verbal praise. 'Praise' is the most
    natural modern English equivalent and preserves the worshipful sense without sounding
    archaic.
- source_word: ἐν γῇ
  chosen: in the land
  alternatives:
  - in a land
  - on the land
  lexicon: BDAG
  rationale: The preposition ἐν with γῇ is most straightforwardly locative, 'in the
    land.' The anarthrous Greek still naturally yields 'the land' here because it
    is specified by the following genitive phrase.
- source_word: ἀποικισμοῦ
  chosen: of their exile
  alternatives:
  - of their deportation
  - of their settlement abroad
  - of their colonization
  lexicon: LSJ
  rationale: ἀποικισμός can denote removal/settlement away from home; in this context
    of covenant judgment and dispersion, 'exile' best communicates the forced displacement
    implied by the passage. 'Deportation' is possible but narrower and less idiomatic
    in English here.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - of them
  lexicon: BDAG
  rationale: Standard possessive genitive modifying ἀποικισμοῦ; 'their' is idiomatic
    English.
- source_word: μνησθήσονται
  chosen: they will remember
  alternatives:
  - they will call to mind
  - they will be mindful of
  lexicon: BDAG
  rationale: Future middle of μιμνῄσκομαι. 'Remember' is the clearest and most idiomatic
    rendering; the middle nuance does not require special expression in English.
- source_word: τοῦ ὀνόματός μου
  chosen: my name
  alternatives:
  - the name of me
  lexicon: BDAG
  rationale: A standard genitive construction. 'My name' preserves the biblical idiom,
    which can imply God's revealed identity and reputation, without over-interpreting
    it in the main text.
