theological_decisions:
- issue: Meaning of 'my name' in a covenantal context
  chosen_reading: Retain the idiom 'my name' literally
  alternative_readings:
  - my reputation
  - who I am
  rationale: The phrase likely carries covenantal and theological weight beyond mere
    nomenclature, but the text itself uses the biblical idiom 'name.' Preserving it
    avoids flattening the theological resonance or paraphrasing beyond the source.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of ἀποικισμός in judgment/restoration context
  chosen_reading: Render as 'exile'
  alternative_readings:
  - deportation
  - dispersion
  rationale: Within Baruch's context of punishment among the nations and later remembrance
    of God, 'exile' best captures the theological setting of covenant judgment without
    importing details not explicit in this verse alone.
  doctrine_reference: Translation philosophy §§1, 5, 6
