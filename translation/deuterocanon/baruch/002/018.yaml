theological_decisions:
- issue: Rendering of δικαιοσύνην in a prayer addressed to God
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness' unless context
    strongly favors 'justice.' Here the prayer likely speaks of acknowledging God's
    moral rightness, though 'justice' remains a viable nuance and is preserved in
    a footnote.
