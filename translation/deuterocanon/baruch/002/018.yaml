id: BAR.2.18
reference: Baruch 2:18
source:
  edition: lxx-swete-1909
  text: ἀλλὰ ἡ ψυχὴ αὐτοῦ ἡ λυπουμένη ἐπὶ τὸ μέγεθος, ὃ βαδίζει κύπτον καὶ ἀσθενοῦν,
    καὶ οἱ ὀφθαλμοὶ οἱ ἐκλείποντες καὶ ἡ ψυχὴ ἡ πεινῶσα δώσουσίν σοι δόξαν καὶ δικαιοσύνην,
    Κύριε.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: But the soul that is grieved over its great misery, that goes about bent over
    and weak, and the eyes that are failing and the soul that is hungry—these will
    give you glory and righteousness, O Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over the greatness of its misery.' The Greek phrase is compressed and
      may refer more literally to 'the greatness' of the affliction.
    reason: lexical_alternative
  - marker: b
    text: Or 'will give you glory and justice.'
    reason: alternative_reading
lexical_decisions:
- source_word: ψυχή
  chosen: soul
  alternatives:
  - life
  - person
  - self
  lexicon: BDAG
  rationale: Kept as 'soul' because the verse uses repeated ψυχή in a lament-prayer
    context, where the inner life/person is in view. 'Person' would flatten the poetic
    force.
- source_word: λυπουμένη
  chosen: is grieved
  alternatives:
  - is sorrowing
  - is distressed
  lexicon: BDAG
  rationale: The participle conveys ongoing sorrow or distress. 'Is grieved' is natural
    English and preserves the emotional weight without overinterpreting.
- source_word: ἐπὶ τὸ μέγεθος
  chosen: over its great misery
  alternatives:
  - because of the greatness
  - over the magnitude
  lexicon: BDAG
  rationale: The phrase is elliptical in Greek. Given the surrounding language of
    weakness, hunger, and failing eyes, the sense is grief over great affliction/misery
    rather than abstract 'greatness.' 'Its' refers back to the afflicted soul/person.
- source_word: βαδίζει
  chosen: goes about
  alternatives:
  - walks
  - goes
  lexicon: BDAG
  rationale: Present tense with participial description suggests ongoing condition.
    'Goes about' fits the idiomatic sense in English better than the bare 'walks'
    in this lament context.
- source_word: κύπτον
  chosen: bent over
  alternatives:
  - stooping
  - bowed down
  lexicon: LSJ
  rationale: Conveys physical and metaphorical debilitation. 'Bent over' is vivid
    and accessible modern English.
- source_word: ἀσθενοῦν
  chosen: weak
  alternatives:
  - feeble
  - sick
  lexicon: BDAG
  rationale: The participle can denote weakness or illness. 'Weak' best matches the
    broader picture of exhaustion and deprivation without narrowing to disease.
- source_word: οἱ ὀφθαλμοὶ οἱ ἐκλείποντες
  chosen: the eyes that are failing
  alternatives:
  - the failing eyes
  - the eyes growing dim
  lexicon: LSJ
  rationale: ἐκλείπω here suggests giving out or failing from exhaustion. 'The eyes
    that are failing' preserves the participial force and the image of depletion.
- source_word: πεινῶσα
  chosen: is hungry
  alternatives:
  - hungers
  - is famished
  lexicon: BDAG
  rationale: A straightforward rendering of ongoing hunger. 'Famished' would intensify
    beyond what the Greek itself requires.
- source_word: δώσουσίν σοι δόξαν
  chosen: will give you glory
  alternatives:
  - will ascribe glory to you
  - will give glory to you
  lexicon: BDAG
  rationale: Retains the direct object construction while using idiomatic English.
    The sense is acknowledgment of God's honor by the humbled afflicted.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Following project default for δικαιοσύνη. In this prayer context it denotes
    God's rightness/uprightness; 'justice' is possible and preserved in a footnote.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows project default for κύριος as the divine address/title.
