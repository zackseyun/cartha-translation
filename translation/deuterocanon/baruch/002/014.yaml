id: BAR.2.14
reference: Baruch 2:14
source:
  edition: lxx-swete-1909
  text: εἰσάκουσον, Κύριε, τῆς προσευχῆς ἡμῶν καὶ τῆς δεήσεως ἡμῶν, καὶ ἐξελοῦ ἡμᾶς
    ἕνεκεν σοῦ καὶ δὸς ἡμῖν χάριν κατὰ πρόσωπον τῶν ἀποικισάντων ἡμᾶς,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
