translation:
  text: Hear, O Lord, our prayer and our supplication, and deliver us for your own
    sake, and grant us favor before those who carried us away captive,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who exiled us' or 'those who deported us.' The Greek participle
      refers to the people who removed Judah into captivity.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσάκουσον
  chosen: Hear
  alternatives:
  - Listen to
  - Give ear to
  lexicon: BDAG
  rationale: Imperative of εἰσακούω in prayer language commonly means to hear with
    responsiveness. 'Hear' is concise and idiomatic in biblical petition, preserving
    the direct appeal without overexpansion.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Direct address to God; per doctrine, κύριος is rendered 'Lord.' The vocative
    is naturally expressed in English as 'O Lord' in solemn prayer.
- source_word: προσευχῆς
  chosen: prayer
  lexicon: BDAG
  rationale: Standard rendering for προσευχή; paired with δέησις to distinguish general
    prayer from specific supplication.
- source_word: δεήσεως
  chosen: plea
  alternatives:
  - supplication
  - petition
  lexicon: BDAG
  rationale: δέησις denotes an earnest request or entreaty. 'Plea' is natural modern
    English and preserves the heightened urgency relative to 'prayer.'
- source_word: ἐξελοῦ
  chosen: deliver
  alternatives:
  - rescue
  - save
  lexicon: BDAG
  rationale: Imperative of ἐξαιρέω, 'deliver out of' or 'rescue.' 'Deliver' fits biblical
    register and avoids importing fuller soteriological overtones that 'save' might
    suggest here.
- source_word: ἕνεκεν σοῦ
  chosen: for your own sake
  alternatives:
  - because of you
  - for your sake
  lexicon: BDAG
  rationale: The phrase grounds the requested action in God's own name or honor. 'For
    your own sake' makes explicit the reflexive force natural in context without exceeding
    the Greek.
- source_word: δὸς ... χάριν
  chosen: grant us favor
  alternatives:
  - give us favor
  - grant us grace
  lexicon: BDAG
  rationale: χάρις here refers to favorable disposition shown by others, not primarily
    theological 'grace.' 'Grant us favor' communicates the idiom clearly in context.
- source_word: κατὰ πρόσωπον
  chosen: before
  alternatives:
  - in the sight of
  - in the presence of
  lexicon: BDAG
  rationale: This idiom means 'before' or 'in the sight of.' 'Before' is concise and
    idiomatic with 'grant us favor before those...'
- source_word: τῶν ἀποικισάντων ἡμᾶς
  chosen: those who carried us away captive
  alternatives:
  - those who exiled us
  - those who deported us
  lexicon: LSJ
  rationale: The participle refers to those who removed the people into exile. 'Carried
    us away captive' preserves the exilic force and echoes the concrete sense of forced
    deportation better than the more abstract 'exiled us.'
