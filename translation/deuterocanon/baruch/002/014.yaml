theological_decisions:
- issue: Ground of the petition in ἕνεκεν σοῦ
  chosen_reading: The appeal is that God act on account of his own name/honor ('for
    your own sake').
  alternative_readings:
  - Act because of your relationship to us
  - act for your sake
  rationale: The phrase most naturally points to God himself as the basis for deliverance,
    a common biblical prayer motif. The rendering avoids over-specifying covenant
    theology while preserving the God-centered appeal.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy'
