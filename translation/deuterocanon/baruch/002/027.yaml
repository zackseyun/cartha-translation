id: BAR.2.27
reference: Baruch 2:27
source:
  edition: lxx-swete-1909
  text: Καὶ ἐποίησας εἰς ἡμᾶς, Κύριε ὁ θεὸς ἡμῶν, κατὰ πᾶσαν ἐπιεικίαν σου καὶ κατὰ
    πάντα οἰκτειρμόν σου τὸν μέγαν,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: And you have dealt with us, Lord our God, according to all your gentleness
    and according to all your great compassion,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clemency' for 'gentleness.' The Greek term can carry the sense of leniency
      or forbearance.
    reason: lexical_alternative
  - marker: b
    text: Or 'mercy' for 'compassion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησας εἰς ἡμᾶς
  chosen: you have dealt with us
  alternatives:
  - you have done to us
  - you have acted toward us
  lexicon: BDAG
  rationale: The idiom ποιεῖν εἰς with a personal object is more naturally rendered
    in English as acting or dealing toward someone rather than the overly literal
    'done to us.' 'Have dealt with us' preserves the completed verbal action and fits
    the context of divine treatment.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Direct address to God with κύριος is best rendered 'Lord' per project
    default for κύριος.
- source_word: ἐπιεικίαν
  chosen: gentleness
  alternatives:
  - clemency
  - forbearance
  - fairness
  lexicon: BDAG
  rationale: ἐπιείκεια can denote gentleness, clemency, or leniency. In this prayer
    context, referring to God's merciful treatment, 'gentleness' is natural modern
    English while retaining the moral quality of lenient kindness. 'Clemency' is possible
    but sounds more juridical and less readable.
- source_word: οἰκτειρμόν
  chosen: compassion
  alternatives:
  - mercy
  - pity
  lexicon: BDAG
  rationale: οἰκτειρμός denotes compassion or mercy. 'Compassion' avoids flattening
    both ἐπιείκεια and οἰκτειρμός into the same English term and preserves the affective
    nuance.
- source_word: τὸν μέγαν
  chosen: great
  alternatives:
  - abundant
  - mighty
  lexicon: BDAG
  rationale: The adjective straightforwardly modifies οἰκτειρμόν and is best rendered
    'great' without embellishment.
- source_word: κατὰ πᾶσαν ... καὶ κατὰ πάντα
  chosen: according to all ... and according to all
  alternatives:
  - in keeping with all ... and all
  - according to your every ... and every
  lexicon: BDAG
  rationale: The repeated κατὰ with πᾶς is preserved for rhetorical balance. 'According
    to all' sounds slightly formal but matches the prayerful register and the source
    structure.
