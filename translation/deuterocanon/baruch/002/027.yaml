theological_decisions:
- issue: Rendering two near-synonymous divine-mercy terms distinctly
  chosen_reading: Translate ἐπιείκεια as 'gentleness' and οἰκτειρμός as 'compassion'
  alternative_readings:
  - Translate both broadly as 'mercy'
  - Render ἐπιείκεια as 'clemency' and οἰκτειρμός as 'mercy'
  rationale: The Greek uses two different terms for God's gracious disposition. Distinguishing
    them preserves the text's rhetorical fullness without importing a technical theological
    distinction beyond the source.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Addressing God with κύριος
  chosen_reading: Lord
  alternative_readings:
  - LORD
  rationale: The source text has κύριος, not the Hebrew divine name. The project's
    contested-terms guidance sets 'Lord' as the default for κύριος.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
