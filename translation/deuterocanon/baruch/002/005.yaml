translation:
  text: and they became beneath and not above, because we sinned against the Lord
    our God by not listening to his voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'below and not above'; the Greek uses a spatial contrast that also conveys
      lowered status or humiliation.
    reason: lexical_alternative
  - marker: b
    text: '''Listening to his voice'' is a biblical idiom that includes the sense
      of obeying him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγενήθησαν
  chosen: they became
  alternatives:
  - they were made
  - they came to be
  lexicon: BDAG
  rationale: 'Aorist middle/passive of γίνομαι here marks resulting state: Israel
    came to be in a lowered condition. ''Became'' preserves the verbal force better
    than a static ''were''.'
- source_word: ὑποκάτω
  chosen: beneath
  alternatives:
  - below
  - under
  lexicon: LSJ
  rationale: The adverb contrasts directly with ἐπάνω ('above'). 'Beneath' preserves
    the metaphor of lowered status and echoes covenant-curse language without over-paraphrasing.
- source_word: ἐπάνω
  chosen: above
  alternatives:
  - on top
  - over
  lexicon: LSJ
  rationale: Simple spatial/status contrast with ὑποκάτω. 'Above' is the natural English
    counterpart.
- source_word: ἡμάρτομεν
  chosen: we sinned
  alternatives:
  - we committed sin
  - we did wrong
  lexicon: BDAG
  rationale: Standard rendering of ἁμαρτάνω; concise and theologically weighty without
    dilution.
- source_word: Κυρίῳ θεῷ ἡμῶν
  chosen: the Lord our God
  alternatives:
  - our Lord God
  - the Lord God of us
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per project doctrine. The dative after ἁμαρτάνω
    is naturally expressed in English as 'against the Lord our God'.
- source_word: πρὸς τὸ μὴ ἀκούειν
  chosen: by not listening
  alternatives:
  - in not listening
  - because we did not obey
  - so as not to listen
  lexicon: BDAG
  rationale: The construction expresses the manner/respect in which the sin occurred.
    'By not listening' is idiomatic and stays close to the Greek infinitival phrase.
    'Obey' is interpretive; 'listening' better preserves the source wording.
- source_word: τῆς φωνῆς αὐτοῦ
  chosen: his voice
  alternatives:
  - what he said
  lexicon: BDAG
  rationale: φωνή is literally 'voice.' In biblical idiom 'listen to his voice' carries
    the sense of heeding/obeying, but the literal wording should be preserved in the
    main text.
