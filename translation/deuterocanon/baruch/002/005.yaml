theological_decisions:
- issue: Idiomatic covenant-curse language of lowered status
  chosen_reading: and they became beneath and not above
  alternative_readings:
  - and they were below and not above
  - and we became low and not high
  rationale: The Greek uses third person plural, likely referring to the people as
    a collective in continuity with Deuteronomic curse language ('below and not above').
    The main text keeps the metaphor rather than smoothing it into a generalized statement
    of humiliation.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Whether to render ἀκούειν τῆς φωνῆς αὐτοῦ as 'listen to his voice' or 'obey
    him'
  chosen_reading: by not listening to his voice
  alternative_readings:
  - by not obeying him
  rationale: The phrase is a standard biblical idiom for obedience, but the source
    text explicitly says 'listen to his voice.' Preserving the idiom maintains transparency
    and allows readers to hear the covenantal language.
  doctrine_reference: Translation philosophy §§1, 6
