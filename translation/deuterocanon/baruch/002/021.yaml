translation:
  text: 'Thus says the Lord: Bow your shoulder and serve the king of Babylon, and
    dwell on the land that I gave to your fathers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Bend your shoulder.' The image is one of submitting oneself to imposed
      service.
    reason: lexical_alternative
  - marker: b
    text: Or 'settle on the land' / 'remain on the land.' Greek 'sit' here functions
      idiomatically for residing.
    reason: lexical_alternative
  - marker: c
    text: 'Or ''your ancestors.'' Greek: ''your fathers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὕτως εἶπεν
  chosen: Thus says
  alternatives:
  - Thus said
  - This is what ... said
  lexicon: LSJ
  rationale: Although the Greek verb is aorist ('said'), prophetic and divine-speech
    formulas are idiomatically rendered in English as present-tense 'says' to preserve
    the force of an ongoing authoritative declaration.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Default rendering per doctrine for κύριος is 'Lord.' With the article
    in English idiom after a speech formula, 'the Lord' is the most natural rendering.
- source_word: Κλίνατε
  chosen: Bow
  alternatives:
  - Bend
  - Incline
  lexicon: LSJ
  rationale: Imperative of κλίνω. 'Bow' fits the metaphor of submitting oneself under
    a yoke or authority and reads naturally with 'shoulder.'
- source_word: τὸν ὦμον ὑμῶν
  chosen: your shoulder
  alternatives:
  - your neck
  - your back
  lexicon: LSJ
  rationale: The Greek explicitly says 'shoulder,' not 'neck.' The image is one of
    placing the shoulder under service or yoke; retaining 'shoulder' stays close to
    the source without importing wording from parallel traditions.
- source_word: ἐργάσασθε
  chosen: work for
  alternatives:
  - serve
  - labor for
  lexicon: LSJ
  rationale: The verb broadly means to work or labor. 'Work for' preserves the concrete
    sense while fitting the dative 'for the king of Babylon.' 'Serve' is possible
    but slightly more interpretive.
- source_word: τῷ βασιλεῖ Βαβυλῶνος
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: LSJ
  rationale: Straightforward genitival construction; standard English order is clearest.
- source_word: καθίσατε
  chosen: dwell
  alternatives:
  - sit
  - settle down
  - remain
  lexicon: LSJ
  rationale: Literally 'sit,' but in this context with 'upon the land' it carries
    the sense of residing or settling. 'Dwell' communicates the idiomatic force in
    readable English.
- source_word: ἐπὶ τὴν γῆν
  chosen: on the land
  alternatives:
  - in the land
  - upon the land
  lexicon: LSJ
  rationale: The preposition ἐπί with accusative is literally 'upon/on.' 'On the land'
    is slightly more formal and preserves the Greek image, though 'in the land' would
    also be idiomatic.
- source_word: ἣν δέδωκα
  chosen: that I gave
  alternatives:
  - which I have given
  lexicon: LSJ
  rationale: The perfect can be rendered with English simple past here without significant
    loss, since the focus is the historical divine gift of the land to the ancestors.
- source_word: τοῖς πατράσιν ὑμῶν
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural 'fathers.' Per gender-accurate
    policy, 'your fathers' is retained rather than neutralizing to 'ancestors,' though
    the latter is a viable interpretive gloss.
