reference: Baruch 2:21
source:
  edition: lxx-swete-1909
  text: Οὕτως εἶπεν Κύριος Κλίνατε τὸν ὦμον ὑμῶν καὶ ἐργάσασθε τῷ βασιλεῖ Βαβυλῶνος,
    καὶ καθίσατε ἐπὶ τὴν γῆν ἣν δέδωκα τοῖς πατράσιν ὑμῶν·
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
