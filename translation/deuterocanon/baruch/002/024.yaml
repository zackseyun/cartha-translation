id: BAR.2.24
reference: Baruch 2:24
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἠκούσαμεν τῆς φωνῆς σου ἐργάσασθαι τῷ βασιλεῖ Βαβυλῶνος, καὶ ἔστησας
    τοὺς λόγους σου οὓς ἐλάλησας ἐν χερσὶν τῶν παίδων σου τῶν προφητῶν τοῦ ἐξενεχθῆναι
    τὰ ὀστᾶ βασιλέων ἡμῶν καὶ τὰ ὀστᾶ τῶν πατέρων ἡμῶν ἐκ τοῦ τόπου αὐτῶν.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: And we did not listen to your voice to serve the king of Babylon, and you
    have fulfilled your words that you spoke by the hands of your servants the prophets,
    that the bones of our kings and the bones of our fathers would be brought out
    from their place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did not obey your voice.' The Greek idiom literally speaks of not hearing/listening
      to God's voice, with obedience implied by context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'by the hands of your servants the prophets,' an idiom meaning
      'through your servants the prophets.'
    reason: lexical_alternative
  - marker: c
    text: That is, from their burial place; the Greek says only 'from their place.'
    reason: cultural_note
lexical_decisions:
- source_word: ἠκούσαμεν τῆς φωνῆς σου
  chosen: did not listen to your voice
  alternatives:
  - did not obey your voice
  - did not hear your voice
  lexicon: BDAG
  rationale: ἀκούω with a genitive object can denote hearing with heed/obedience.
    'Listen to' preserves the auditory idiom while naturally implying refusal to heed,
    without over-paraphrasing to 'obey' in the main text.
- source_word: ἐργάσασθαι τῷ βασιλεῖ Βαβυλῶνος
  chosen: to serve the king of Babylon
  alternatives:
  - to work for the king of Babylon
  - to labor for the king of Babylon
  lexicon: LSJ
  rationale: Although ἐργάζομαι often means 'work' or 'do,' in this context with dative
    of person and in light of the historical demand of subjection, 'serve' best captures
    the sense of rendering service to the Babylonian king.
- source_word: ἔστησας τοὺς λόγους σου
  chosen: you have fulfilled your words
  alternatives:
  - you have established your words
  - you have carried out your words
  lexicon: LSJ
  rationale: ἵστημι can mean to set up, establish, or confirm. In context of threatened
    judgment now realized, 'fulfilled' communicates that God's spoken words have come
    to pass.
- source_word: ἐν χερσὶν τῶν παίδων σου τῶν προφητῶν
  chosen: by the hands of your servants the prophets
  alternatives:
  - through your servants the prophets
  - by your servants the prophets
  lexicon: LSJ
  rationale: The idiom 'by the hands of' is a literal rendering of ἐν χερσίν used
    for agency or instrumentality. It is preserved because it is intelligible in English
    and reflects the prophetic mediation of the message.
- source_word: παίδων σου
  chosen: servants
  alternatives:
  - slaves
  - children
  lexicon: BDAG
  rationale: Here παῖς in relation to God and prophets is a conventional designation
    of commissioned servants. 'Servants' fits the prophetic context better than 'children,'
    and 'slaves' would overstate the social nuance in this idiom.
- source_word: τοῦ ἐξενεχθῆναι
  chosen: would be brought out
  alternatives:
  - to be brought out
  - would be carried out
  - to be taken out
  lexicon: LSJ
  rationale: The articular infinitive expresses the content/result of the prophetic
    word. 'Would be brought out' renders the passive future-like force naturally in
    English.
- source_word: τὰ ὀστᾶ
  chosen: the bones
  alternatives:
  - the remains
  lexicon: LSJ
  rationale: A direct rendering is preferable. The verse refers specifically to bones
    being removed from burial places, so 'bones' should be retained rather than generalized
    to 'remains'.
- source_word: ἐκ τοῦ τόπου αὐτῶν
  chosen: from their place
  alternatives:
  - out of their place
  - from their resting place
  - from their tombs
  lexicon: LSJ
  rationale: τόπος is literally 'place.' While the context implies burial places,
    the Greek does not explicitly say 'tombs,' so the more literal 'their place' is
    retained.
