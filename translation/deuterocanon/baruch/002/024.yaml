theological_decisions:
- issue: Whether to make the first clause explicitly about obedience rather than hearing
  chosen_reading: did not listen to your voice
  alternative_readings:
  - did not obey your voice
  rationale: The verse concerns covenant disobedience, but the Greek keeps the hearing/listening
    idiom. Preserving that wording maintains the biblical texture while allowing the
    context to convey disobedience.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: How to render God's action in relation to his spoken judgment
  chosen_reading: you have fulfilled your words
  alternative_readings:
  - you have established your words
  - you have carried out your words
  rationale: Theologically, the point is that God has brought his prophetic warnings
    to pass. 'Fulfilled' communicates realization without importing extra doctrinal
    claims.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
