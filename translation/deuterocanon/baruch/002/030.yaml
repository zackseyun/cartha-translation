id: BAR.2.30
reference: Baruch 2:30
source:
  edition: lxx-swete-1909
  text: ὅτι ἔγνων ὅτι οὐ μὴ ἀκούσωσίν μου, ὅτι λαὸς σκληροτράχηλός ἐστιν· καὶ ἐπιστρέψουσιν
    ἐπὶ καρδίαν αὐτῶν ἐν γῇ ἀποικισμοῦ αὐτῶν,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: For I knew that they would certainly not listen to me, because they are a
    stiff-necked people; but in the land of their exile they will return to their
    heart,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will take it to heart' / 'they will turn back in their heart.'
      The Greek reads literally, 'they will return to their heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνων
  chosen: I knew
  alternatives:
  - I have known
  - I recognized
  lexicon: BDAG
  rationale: Aorist of γινώσκω is best rendered as simple past in this context, expressing
    God's prior knowledge of Israel's response.
- source_word: οὐ μὴ ἀκούσωσίν
  chosen: would certainly not listen
  alternatives:
  - will by no means hear
  - would never obey
  lexicon: BDAG
  rationale: οὐ μή with the subjunctive strongly negates the future action. 'Listen'
    preserves the auditory verb ἀκούω while allowing the covenantal sense of heeding;
    'certainly not' reflects the emphatic negation without sounding archaic.
- source_word: μου
  chosen: to me
  alternatives:
  - me
  - my voice
  lexicon: BDAG
  rationale: With ἀκούω, the genitive pronoun is naturally rendered in English as
    'listen to me.' 'My voice' is not explicit in the Greek.
- source_word: λαὸς
  chosen: people
  alternatives:
  - nation
  lexicon: BDAG
  rationale: '''People'' is the standard rendering and fits the covenantal description
    of Israel here better than the more political ''nation.'''
- source_word: σκληροτράχηλος
  chosen: stiff-necked
  alternatives:
  - stubborn
  - hard-necked
  lexicon: LEH
  rationale: '''Stiff-necked'' preserves the established biblical metaphor and closely
    matches the Greek compound, while remaining understandable in modern English.'
- source_word: ἐπιστρέψουσιν
  chosen: they will return
  alternatives:
  - they will turn back
  - they will repent
  lexicon: BDAG
  rationale: The verb literally means 'turn/return.' Because the object is expressed
    idiomatically by the following phrase, 'return' preserves the wording without
    over-interpreting it as explicit repentance, though repentance is implied by context.
- source_word: ἐπὶ καρδίαν αὐτῶν
  chosen: to their heart
  alternatives:
  - to heart
  - in their heart
  - to themselves
  lexicon: LEH
  rationale: This is a Semitic-style idiom meaning an inward turning or taking something
    to heart. 'Return to their heart' keeps the metaphor visible and auditable, even
    if slightly unusual in English.
- source_word: ἐν γῇ ἀποικισμοῦ αὐτῶν
  chosen: in the land of their exile
  alternatives:
  - in the land of their captivity
  - in the land of their deportation
  lexicon: LEH
  rationale: ἀποικισμός denotes removal/settlement away from the homeland. 'Exile'
    is the clearest natural English equivalent in this context and avoids overly technical
    wording.
