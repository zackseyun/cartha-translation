theological_decisions:
- issue: Idiomatic force of 'they will return to their heart'
  chosen_reading: Rendered literally enough to preserve the metaphor, implying inward
    repentance without making 'repent' the main-text verb.
  alternative_readings:
  - they will take it to heart
  - they will repent in their heart
  rationale: The Greek phrase is idiomatic and spiritually significant, but the text
    does not use the more explicit standard verb for repentance. Preserving the heart-language
    maintains theological texture and avoids importing a stronger formulation than
    the source states.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
