translation:
  text: Let your wrath turn away from us, for we have been left few among the nations
    where you scattered us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly in English, 'among the nations where you scattered us,'
      with 'there' omitted as stylistically redundant.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστραφήτω
  chosen: Let ... turn away
  alternatives:
  - Turn away
  - May ... turn away
  - Be turned away
  lexicon: BDAG
  rationale: Aorist passive imperative used jussively in prayer. 'Let your wrath turn
    away' preserves the petitionary force in natural English without over-paraphrasing.
- source_word: ὁ θυμός σου
  chosen: your wrath
  alternatives:
  - your anger
  - your fury
  lexicon: LEH
  rationale: θυμός here denotes divine anger in judgment. 'Wrath' better preserves
    the gravity and covenantal-theological tone than the milder 'anger'.
- source_word: ἀφ᾽ ἡμῶν
  chosen: from us
  alternatives:
  - away from us
  lexicon: BDAG
  rationale: Standard prepositional sense; combined with the verb in English as 'turn
    away from us' for idiomatic clarity.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the ground of the plea. 'Because' is clear modern English
    and preserves the causal relation.
- source_word: κατελείφθημεν
  chosen: we have been left
  alternatives:
  - we were left
  - we have been abandoned
  - we remain
  lexicon: LEH
  rationale: Passive of καταλείπω, 'leave behind' or 'leave remaining.' 'Have been
    left' preserves both the passive form and the resulting condition.
- source_word: ὀλίγοι
  chosen: few
  alternatives:
  - a few
  - few in number
  - only a few
  lexicon: BDAG
  rationale: Predicate adjective describing the reduced remnant. 'Few' is concise
    and faithful; 'only a few' would add emphasis not explicit in the Greek.
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the nations
  alternatives:
  - in the nations
  - among the Gentiles
  lexicon: BDAG
  rationale: ἔθνη in this exilic context refers to foreign peoples/nations. 'Among
    the nations' is the most natural and contextually appropriate rendering.
- source_word: οὗ διέσπειρας ἡμᾶς
  chosen: where you scattered us
  alternatives:
  - among which you scattered us
  - to which you dispersed us
  lexicon: LEH
  rationale: διέσπειρας evokes dispersal in exile. 'Scattered' is the standard and
    vivid rendering; 'where' reflects οὗ as a locative relative.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - — omitted in English
  lexicon: BDAG
  rationale: The adverb is present in the Greek and should be represented for transparency,
    though English style makes it slightly redundant. It likely adds emphasis to the
    place of dispersion, so it is retained.
