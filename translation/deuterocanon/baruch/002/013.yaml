theological_decisions:
- issue: Tone of divine judgment in θυμός
  chosen_reading: wrath
  alternative_readings:
  - anger
  - fury
  rationale: The verse is a penitential plea for the cessation of divine judgment.
    'Wrath' best preserves the solemn theological force without importing later doctrinal
    categories beyond the text.
  doctrine_reference: 'DOCTRINE.md: readable modern English while preserving theological
    weight'
- issue: Retention of ἐκεῖ
  chosen_reading: retain 'there' in the main text
  alternative_readings:
  - omit as redundant in smoother English
  rationale: Although somewhat redundant in English after 'where,' the Greek includes
    ἐκεῖ. Retaining it favors source transparency and avoids silently smoothing away
    emphasis.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition'
