  text: ἀποστραφήτω ὁ θυμός σου ἀφ᾽ ἡμῶν, ὅτι κατελείφθημεν ὀλίγοι ἐν τοῖς ἔθνεσιν
    οὗ διέσπειρας ἡμᾶς ἐκεῖ.
  language: Greek
  pages: []
