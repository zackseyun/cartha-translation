reference: Baruch 2:16
source:
  edition: lxx-swete-1909
  text: Κύριε, κάτιδε ἐκ τοῦ οἴκου τοῦ ἁγίου σου καὶ ἐννόησον εἰς ἡμᾶς· κλῖνον, Κύριε,
    τὸ οὖς σου καὶ ἄκουσον.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: Lord, look down from your holy house and take notice of us; incline your ear,
    Lord, and hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from your holy temple.' The Greek literally says 'from your holy house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - O Lord
  lexicon: BDAG
  rationale: Vocative of κύριος. The project's default rendering is 'Lord.' English
    omits the vocative particle naturally, while retaining direct address.
- source_word: κάτιδε
  chosen: look down
  alternatives:
  - look
  - behold
  lexicon: LSJ
  rationale: Imperative meaning 'look down/upon,' with κατά adding the sense of looking
    from above. 'Look down' fits the following phrase 'from your holy house' and preserves
    the prayer's vertical imagery.
- source_word: ἐκ τοῦ οἴκου τοῦ ἁγίου σου
  chosen: from your holy house
  alternatives:
  - from your holy temple
  - out of your holy house
  lexicon: LSJ
  rationale: οἶκος is literally 'house.' While 'temple' is possible in context, the
    Greek here says 'house,' and 'holy house' preserves the wording without obscuring
    that it refers to God's heavenly dwelling.
- source_word: ἐννόησον
  chosen: take notice
  alternatives:
  - consider
  - give heed
  - pay attention
  lexicon: LSJ
  rationale: The verb calls for attentive regard, not mere cognition. 'Take notice'
    is idiomatic modern English that conveys active regard toward the petitioners.
- source_word: εἰς ἡμᾶς
  chosen: of us
  alternatives:
  - toward us
  - upon us
  lexicon: BDAG
  rationale: With ἐννόησον, the preposition marks the direction of God's attention.
    In English, 'take notice of us' is the most natural equivalent.
- source_word: κλῖνον
  chosen: incline
  alternatives:
  - bend
  - turn
  lexicon: LSJ
  rationale: Traditional prayer language here remains clear in modern English and
    matches the metaphor of God bending down to hear.
- source_word: τὸ οὖς σου
  chosen: your ear
  alternatives:
  - your hearing
  lexicon: BDAG
  rationale: Literal singular 'ear' is idiomatic in biblical prayer and should be
    preserved.
- source_word: ἄκουσον
  chosen: hear
  alternatives:
  - listen
  lexicon: BDAG
  rationale: Imperative 'hear' is the standard and suitably weighty rendering in prayer
    language.
