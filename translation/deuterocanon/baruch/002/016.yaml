theological_decisions:
- issue: Whether to render οἶκος as 'house' or interpretively as 'temple' for God's
    dwelling
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The Greek explicitly uses οἶκος, not ναός. Since the verse is a prayer
    for God to look from his holy dwelling, 'house' preserves the source wording while
    allowing readers to infer the sacred referent. This avoids importing a more specific
    cultic term than the text uses.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Whether to preserve elevated prayer diction in κλῖνον τὸ οὖς σου
  chosen_reading: incline your ear
  alternative_readings:
  - bend your ear
  - listen to us
  rationale: The phrase is metaphorical and conventional in biblical prayer. 'Incline
    your ear' preserves the imagery and gravity without becoming archaic beyond comprehension.
  doctrine_reference: Translation philosophy §§5, 6
