theological_decisions:
- issue: Covenant formula wording
  chosen_reading: that I may be their God and they may be my people
  alternative_readings:
  - that I will be their God and they will be my people
  rationale: The Greek uses an articular infinitive clause after διαθήκην αἰώνιον,
    expressing the covenant's purpose/content. English can render this either more
    literally with 'to be' or more idiomatically with finite verbs. 'May be' preserves
    the purposive nuance without weakening the covenant formula.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Force of οὐ κινήσω ἔτι regarding Israel's future in the land
  chosen_reading: I will no longer remove my people Israel from the land
  alternative_readings:
  - I will no longer move my people Israel from the land
  - I will never again uproot my people Israel from the land
  rationale: The text promises cessation of displacement from the given land. 'Remove'
    preserves the promise without importing later doctrinal systems or intensifying
    beyond the Greek with 'never again uproot.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
