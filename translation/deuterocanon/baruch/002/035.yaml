translation:
  text: And I will establish for them an everlasting covenant, that I may be their
    God and they may be my people; and I will no longer remove my people Israel from
    the land that I gave to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that I will be their God and they will be my people.' The Greek expresses
      the covenant's purpose/content with an infinitive construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: στήσω
  chosen: I will establish
  alternatives:
  - I will set up
  - I will make
  lexicon: BDAG
  rationale: Future of ἵστημι here idiomatically refers to putting a covenant in force
    or establishing it. 'Establish' is natural English and preserves covenantal solemnity
    better than the more wooden 'set up'.
- source_word: διαθήκην αἰώνιον
  chosen: an everlasting covenant
  alternatives:
  - an eternal covenant
  - a perpetual covenant
  lexicon: BDAG
  rationale: Standard covenantal phrase in biblical diction. 'Everlasting' is idiomatic
    and preserves the enduring force of αἰώνιον without sounding overly abstract.
- source_word: τοῦ εἶναί με αὐτοῖς εἰς θεόν
  chosen: that I may be their God
  alternatives:
  - for me to be God to them
  - that I may be God for them
  lexicon: BDAG
  rationale: This infinitival clause expresses covenant purpose/result. The chosen
    rendering gives clear modern English while preserving the familiar covenant formula.
- source_word: αὐτοὶ ἔσονταί μοι εἰς λαόν
  chosen: they may be my people
  alternatives:
  - they will be a people for me
  - they shall be my people
  lexicon: BDAG
  rationale: Balances formal fidelity with readable English. 'My people' is the established
    covenant expression and matches the reciprocal structure of the Greek.
- source_word: οὐ κινήσω ἔτι
  chosen: I will no longer remove
  alternatives:
  - I will no longer move
  - I will no longer shake
  - I will no longer dislodge
  lexicon: BDAG
  rationale: κινέω literally means 'move,' but with ἀπό and a people from a land,
    the sense is removal/displacement. 'Remove' best communicates the covenant promise
    not to uproot them again.
- source_word: τὸν λαόν μου Ἰσραήλ
  chosen: my people Israel
  alternatives:
  - Israel my people
  - the people of Israel
  lexicon: BDAG
  rationale: The appositional structure is preserved naturally in English as 'my people
    Israel,' retaining the possessive covenant emphasis.
- source_word: ἀπὸ τῆς γῆς
  chosen: from the land
  alternatives:
  - from the earth
  - out of the land
  lexicon: BDAG
  rationale: In this covenant-restoration context γῆ refers specifically to the land
    given to Israel, not the earth in general.
- source_word: ἧς ἔδωκα αὐτοῖς
  chosen: that I gave to them
  alternatives:
  - which I gave them
  - that I have given them
  lexicon: BDAG
  rationale: The aorist points to the prior divine gift of the land. 'That I gave
    to them' is slightly more formal but keeps the relative-clause linkage explicit.
