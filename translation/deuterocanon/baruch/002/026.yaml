theological_decisions:
- issue: Reference of 'the house' and the naming formula
  chosen_reading: The verse refers to the Jerusalem temple as the house marked by
    God's name, now brought to its present condition because of covenant people's
    wickedness.
  alternative_readings:
  - The phrase could be rendered more idiomatically as 'the house that bears your
    name'.
  rationale: This is not a major doctrinal dispute, but the naming formula carries
    theological weight about divine ownership/presence. The main text preserves that
    formula rather than reducing it to a paraphrase.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it.'
