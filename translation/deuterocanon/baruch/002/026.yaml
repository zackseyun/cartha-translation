  text: καὶ ἔθηκας τὸν οἶκον οὗ ἐπεκλήθη τὸ ὄνομά σου ἐπ᾽ αὐτῷ ὡς ἡ ἡμέρα αὕτη, διὰ
    πονηρίαν οἴκου Ἰσραὴλ καὶ οἴκου Ἰούδα.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
