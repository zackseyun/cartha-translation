translation:
  text: And you made the house over which your name was called as it is this day,
    because of the wickedness of the house of Israel and the house of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'the house that bears your name.' The Greek uses
      a Semitic formula, literally 'the house over which your name was called.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθηκας
  chosen: you made
  alternatives:
  - you set
  - you rendered
  - you turned
  lexicon: LSJ
  rationale: Aorist of τίθημι here takes the house as object with a resulting state
    introduced by ὡς ἡ ἡμέρα αὕτη. 'You made' is idiomatic English for causing the
    house to become as it now is, without over-specifying the exact action.
- source_word: τὸν οἶκον
  chosen: the house
  alternatives:
  - the temple
  lexicon: LSJ
  rationale: Literally 'the house.' In context it refers to the temple, but 'house'
    preserves the source wording and the biblical idiom of God's house.
- source_word: οὗ ἐπεκλήθη τὸ ὄνομά σου ἐπ᾽ αὐτῷ
  chosen: over which your name was called upon it
  alternatives:
  - which bears your name
  - over which your name was invoked
  - on which your name was called
  lexicon: LSJ
  rationale: The Greek reproduces a Semitic formula for belonging/consecration. A
    more idiomatic English option would be 'which bears your name,' but the chosen
    rendering keeps the formal texture and the double prepositional expression visible
    for auditability.
- source_word: ὡς ἡ ἡμέρα αὕτη
  chosen: as it is this day
  alternatives:
  - as on this day
  - as at this day
  lexicon: LSJ
  rationale: This is a standard biblical idiom meaning 'as is evident today' or 'in
    its present condition.' 'As it is this day' preserves the idiom in readable modern
    English.
- source_word: διὰ
  chosen: because of
  alternatives:
  - through
  - on account of
  lexicon: LSJ
  rationale: 'Causal sense fits the clause: the temple''s present ruined state is
    due to Israel''s and Judah''s wickedness.'
- source_word: πονηρίαν
  chosen: wickedness
  alternatives:
  - evil
  - evil-doing
  lexicon: LSJ
  rationale: '''Wickedness'' best captures moral corruption in this penitential context.'
- source_word: οἴκου Ἰσραὴλ καὶ οἴκου Ἰούδα
  chosen: the house of Israel and the house of Judah
  alternatives:
  - Israel and Judah
  - the people of Israel and Judah
  lexicon: LSJ
  rationale: Retaining 'house of' preserves the covenantal-corporate language of the
    source rather than flattening it to mere ethnic labels.
