theological_decisions:
- issue: Meaning of ἀποστολή in a judgment context
  chosen_reading: in exile
  alternative_readings:
  - in deportation
  - in banishment
  rationale: The verse lists covenant-curse outcomes. Rendering ἀποστολή as 'exile'
    communicates the national-theological reality of forced removal from the land
    without importing extra interpretation. Because the noun can more literally suggest
    'deportation' or 'sending away,' that alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
