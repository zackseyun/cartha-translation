id: BAR.2.25
reference: Baruch 2:25
source:
  edition: lxx-swete-1909
  text: καὶ ἰδού, ἔστιν ἐξεριμμένα τῷ καύματι τῆς ἡμέρας καὶ τῷ παγετῷ τῆς νυκτός·
    καὶ ἀπεθάνοσαν ἐν πόνοις πονηροῖς, ἐν λιμῷ καὶ ἐν ῥομφαίᾳ καὶ ἐν ἀποστολῇ.
  language: Greek
  pages: []
