translation:
  text: And behold, they have been exposed to the heat of the day and to the frost
    of the night; and they died in grievous sufferings, in famine and by the sword
    and in exile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in deportation' or 'in banishment'; the Greek literally refers to a
      sending away.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδού
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Rendered as the direct attention-getter 'look' to preserve the force
    of the interjection in readable modern English without archaic tone.
- source_word: ἐξεριμμένα
  chosen: have been cast out
  alternatives:
  - have been thrown out
  - lie exposed
  - have been cast forth
  lexicon: LSJ
  rationale: The participle conveys being thrown out/exposed. 'Have been cast out'
    preserves the passive sense and fits the context of corpses exposed to the elements,
    without over-specifying beyond the Greek.
- source_word: τῷ καύματι τῆς ἡμέρας
  chosen: to the heat of the day
  alternatives:
  - to the burning heat of the day
  - to the scorching heat of the day
  lexicon: LSJ
  rationale: A fairly literal rendering that preserves the dative construction's sense
    of exposure to daytime heat. 'Burning/scorching' are possible but not necessary
    to convey the plain sense.
- source_word: τῷ παγετῷ τῆς νυκτός
  chosen: to the frost of the night
  alternatives:
  - to the cold of the night
  - to the freezing cold of the night
  lexicon: LSJ
  rationale: παγετός specifically denotes frost or freezing cold. 'Frost of the night'
    keeps the concrete image and balances the parallel with 'heat of the day.'
- source_word: ἐν πόνοις πονηροῖς
  chosen: in grievous sufferings
  alternatives:
  - in evil pains
  - in terrible torments
  - in painful afflictions
  lexicon: BDAG
  rationale: The phrase intensifies suffering. 'Grievous sufferings' communicates
    severe misery in natural English while retaining the plural and the negative force
    of πονηροῖς.
- source_word: ἐν λιμῷ
  chosen: in famine
  alternatives:
  - by famine
  - from hunger
  lexicon: BDAG
  rationale: A literal rendering of the prepositional phrase. In English the following
    coordinated phrases vary naturally, but 'in famine' preserves the Greek pattern
    and the calamity category.
- source_word: ἐν ῥομφαίᾳ
  chosen: by the sword
  alternatives:
  - in the sword
  - by warfare
  lexicon: BDAG
  rationale: Idiomatic English for death through violent slaughter, while remaining
    faithful to the concrete image of the sword.
- source_word: ἐν ἀποστολῇ
  chosen: in exile
  alternatives:
  - in deportation
  - in banishment
  - in being sent away
  lexicon: LSJ
  rationale: In this context of covenant curses and national judgment, the noun refers
    to removal/sending away from the land. 'In exile' best captures the sense for
    modern readers, though the more literal idea of deportation is preserved in a
    footnote.
