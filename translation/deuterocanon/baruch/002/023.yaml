id: BAR.2.23
reference: Baruch 2:23
source:
  edition: lxx-swete-1909
  text: ἐκλείψειν ποιήσω ἐκ πόλεων Ἰούδα καὶ ἔξωθεν Ἰερουσαλὴμ φωνὴν εὐφροσύνης καὶ
    φωνὴν χαρμοσύνης, φωνὴν νυμφίου καὶ φωνὴν νύμφης, καὶ ἔσται πᾶσα ἡ γῆ εἰς ἄβατον
    ἀπὸ ἐνοικούντων.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
