- issue: Whether to harmonize the wording to the more familiar Jeremiah judgment formula
  chosen_reading: Retain the Greek witness's 'from outside Jerusalem' and the difficult
    final phrase rather than importing a smoother traditional form.
  alternative_readings:
  - Use a harmonized rendering such as 'from the streets of Jerusalem' and 'without
    inhabitants' based on parallel judgment formulas
  rationale: The translation philosophy prioritizes the extant source text over inherited
