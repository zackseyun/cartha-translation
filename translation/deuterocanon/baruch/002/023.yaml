translation:
  text: I will cause the sound of gladness and the sound of rejoicing to cease from
    the cities of Judah and from outside Jerusalem, the sound of bridegroom and the
    sound of bride, and all the land will become impassable because of its inhabitants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''from outside Jerusalem.'' Some translations smooth this to ''from
      the streets of Jerusalem'' under the influence of parallel prophetic formulas,
      but the extant Greek here reads ''outside.'''
    reason: alternative_reading
  - marker: b
    text: The final phrase is difficult in Greek. It may also be understood as 'all
      the land will become impassable, without inhabitants' or 'devoid of inhabitants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκλείψειν ποιήσω
  chosen: I will cause ... to cease
  alternatives:
  - I will make ... fail
  - I will bring ... to an end
  lexicon: LSJ
  rationale: 'The periphrastic construction with ποιέω + infinitive intensifies causation:
    not merely ''cease'' intransitively, but ''cause to cease.'' This preserves the
    active divine agency in the judgment saying.'
- source_word: ἐκ πόλεων Ἰούδα καὶ ἔξωθεν Ἰερουσαλήμ
  chosen: from the cities of Judah and from outside Jerusalem
  alternatives:
  - from the cities of Judah and from the streets of Jerusalem
  - from the cities of Judah and from Jerusalem's environs
  lexicon: LSJ
  rationale: ἔξωθεν normally means 'from outside' or 'outside.' The Greek here does
    not use a word meaning 'streets,' so the rendering should stay close to the source
    even if Jeremiah-tradition parallels might suggest a more idiomatic phrase. 'From
    outside Jerusalem' preserves the wording of the extant Greek witness.
- source_word: φωνὴν εὐφροσύνης καὶ φωνὴν χαρμοσύνης
  chosen: the sound of gladness and the sound of rejoicing
  alternatives:
  - the voice of joy and the voice of merriment
  - the sound of joy and the sound of gladness
  lexicon: LSJ
  rationale: φωνή can mean 'voice' or 'sound'; here 'sound' fits the list of festive
    noises being removed. εὐφροσύνη and χαρμοσύνη are near-synonyms; rendering them
    as 'gladness' and 'rejoicing' preserves the poetic doubling without collapsing
    them into one term.
- source_word: φωνὴν νυμφίου καὶ φωνὴν νύμφης
  chosen: the sound of bridegroom and the sound of bride
  alternatives:
  - the voice of the bridegroom and the voice of the bride
  lexicon: LSJ
  rationale: This continues the repeated φωνή pattern. 'Bridegroom' and 'bride' are
    the natural English equivalents for νυμφίος and νύμφη in a wedding-celebration
    context.
- source_word: ἔσται πᾶσα ἡ γῆ εἰς ἄβατον
  chosen: all the land will become impassable
  alternatives:
  - all the land will become uninhabitable
  - all the land will be a trackless waste
  lexicon: LSJ
  rationale: ἄβατος literally denotes something not to be walked on or traversed,
    hence 'impassable.' This is preferable to 'desolate' alone because the Greek term
    is more specific than a general ruin word.
- source_word: ἀπὸ ἐνοικούντων
  chosen: because of its inhabitants
  alternatives:
  - for lack of inhabitants
  - without inhabitants
  - from inhabitants
  lexicon: LSJ
  rationale: The phrase is difficult in Greek. Taken woodenly, ἀπό with the participle
    could suggest separation from inhabitants ('devoid of inhabitants'), which would
    fit the judgment context. But the transmitted wording can also be represented
    more literally as a condition arising in relation to inhabitants. 'Because of
    its inhabitants' preserves the prepositional force without overcorrecting beyond
    the witness. The difficulty is preserved in a footnote.
