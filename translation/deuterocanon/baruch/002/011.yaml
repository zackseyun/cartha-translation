id: BAR.2.11
reference: Baruch 2:11
source:
  edition: lxx-swete-1909
  text: Καὶ νῦν, Κύριε ὁ θεὸς Ἰσραήλ, ὃς ἐξήγαγες τὸν λαόν σου ἐκ γῆς Αἰγύπτου ἐν
    χειρὶ κραταιῷ, ἐν σημείοις καὶ ἐν τέρασιν καὶ ἐν δυνάμει μεγάλῃ καὶ ἐν βραχίονι
    ὑψηλῷ, καὶ ἐποίησας σεαυτῷ ὄνομα ὡς ἡ ἡμέρα αὕτη,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
