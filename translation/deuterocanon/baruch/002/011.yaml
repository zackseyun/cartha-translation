    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: And now, O Lord, God of Israel, who brought your people out of the land of
    Egypt with a mighty hand, with signs and wonders and with great power and with
    an uplifted arm, and made for yourself a name, as at this day,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an outstretched arm.' The Greek here reads 'uplifted/high arm' (βραχίονι
      ὑψηλῷ), differing from the more familiar exodus wording in some passages.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Direct address with κύριος used as a divine title; per doctrine default,
    render as 'Lord' rather than transliterating or using 'Master'.
- source_word: ὁ θεὸς Ἰσραήλ
  chosen: God of Israel
  alternatives:
  - the God of Israel
  lexicon: BDAG
  rationale: 'The Greek includes the article, but in direct address English idiom
    naturally omits it: ''Lord God of Israel.'' This preserves the title while remaining
    readable.'
- source_word: ἐξήγαγες
  chosen: brought ... out
  alternatives:
  - led ... out
  lexicon: BDAG
  rationale: Standard exodus language; 'brought out' best matches the verbal sense
    and common biblical idiom without unnecessary stiffness.
- source_word: ἐν χειρὶ κραταιῷ
  chosen: with a mighty hand
  alternatives:
  - by a mighty hand
  - with a strong hand
  lexicon: BDAG
  rationale: This is established exodus phrasing. 'Mighty hand' is natural English
    and preserves the metaphor of divine power.
- source_word: σημείοις
  chosen: signs
  alternatives:
  - tokens
  lexicon: BDAG
  rationale: Standard rendering in miracle contexts; paired naturally with 'wonders'
    in exodus language.
- source_word: τέρασιν
  chosen: wonders
  alternatives:
  - portents
  - marvels
  lexicon: BDAG
  rationale: Common collocation with 'signs'; 'wonders' is clear and idiomatic.
- source_word: δυνάμει μεγάλῃ
  chosen: great power
  alternatives:
  - great might
  lexicon: BDAG
  rationale: Either is possible, but 'great power' is more transparent for modern
    readers while preserving the force of δύναμις.
- source_word: βραχίονι ὑψηλῷ
  chosen: an uplifted arm
  alternatives:
  - a high arm
  - an outstretched arm
  lexicon: BDAG
  rationale: ὑψηλός is literally 'high/exalted,' not the more common exodus phrase
    'outstretched.' 'Uplifted arm' preserves the Greek wording while still sounding
    natural in English.
- source_word: ἐποίησας σεαυτῷ ὄνομα
  chosen: made for yourself a name
  alternatives:
  - made yourself a name
  - won renown for yourself
  lexicon: BDAG
  rationale: The reflexive σεαυτῷ is explicit. 'Made for yourself a name' keeps the
    wording close to the Greek and preserves the biblical idiom of establishing renown.
- source_word: ὡς ἡ ἡμέρα αὕτη
  chosen: as it is this day
  alternatives:
  - as at this day
  - as on this day
  lexicon: BDAG
  rationale: Idiomatic temporal formula meaning the renown remains evident up to the
    present. 'As it is this day' is readable while preserving the formulaic sense.
