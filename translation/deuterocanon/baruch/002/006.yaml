translation:
  text: To the Lord our God belongs righteousness, but to us and to our fathers belongs
    shame of face, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.' The Greek δικαιοσύνη can denote both righteousness and justice;
      here the main text keeps 'righteousness' per project default.
    reason: lexical_alternative
  - marker: b
    text: Literally 'shame of face,' an idiom for public disgrace or humiliation.
    reason: cultural_note
lexical_decisions:
- source_word: Τῷ κυρίῳ θεῷ ἡμῶν
  chosen: To the Lord our God belongs
  alternatives:
  - The Lord our God has
  - Righteousness is the Lord our God's
  lexicon: BDAG
  rationale: 'The dative phrase with implied possession is idiomatically rendered
    with ''belongs'' in English to express attribution: righteousness is properly
    God''s.'
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project default, δικαιοσύνη is rendered 'righteousness.' In this
    confessional context it denotes God's moral rightness/covenant rectitude more
    than judicial 'justice,' though that nuance is related.
- source_word: ἡμῖν δὲ καὶ τοῖς πατράσιν ἡμῶν
  chosen: but to us and to our fathers belongs
  alternatives:
  - but to us and our fathers belongs
  - but for us and our fathers there is
  lexicon: BDAG
  rationale: Mirrors the contrastive structure of the Greek and preserves the explicit
    inclusion of the ancestors in the confession.
- source_word: αἰσχύνη τῶν προσώπων
  chosen: shame of face
  alternatives:
  - shame-facedness
  - shame on our faces
  - open shame
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the Semitic/Septuagintal idiom behind
    the phrase. 'Shame of face' communicates public disgrace and humiliation. Smoother
    English alternatives are possible, but this wording keeps the texture of the source.
- source_word: ὡς ἡ ἡμέρα αὕτη
  chosen: as it is this day
  alternatives:
  - as on this day
  - as is evident today
  lexicon: BDAG
  rationale: This idiom points to the present, manifest state of affairs. 'As it is
    this day' is a natural English equivalent that preserves the formulaic force without
    over-paraphrasing.
