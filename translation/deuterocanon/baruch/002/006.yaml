theological_decisions:
- issue: Meaning of δικαιοσύνη when predicated of God
  chosen_reading: God's righteousness/rightness is contrasted with Israel's public
    shame
  alternative_readings:
  - God's justice is contrasted with Israel's disgrace
  rationale: 'The verse is a confession of guilt: God is in the right, while the people
    and their ancestors bear shame. ''Righteousness'' best preserves the lexical default
    and theological breadth without narrowing the statement to punitive justice alone.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δικαιοσύνη; preserve
    theological tension rather than over-resolve.'
