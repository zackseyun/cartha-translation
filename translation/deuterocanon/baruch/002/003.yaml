lexical_decisions:
- source_word: τοῦ φαγείν
  chosen: for ... to eat
  alternatives:
  - to eat
  - that ... should eat
  lexicon: BDAG
  rationale: The articular infinitive with τοῦ is rendered idiomatically as a purpose/result-like
    construction in English. Given the fragmentary wording supplied for this verse,
    'for ... to eat' preserves the infinitival force without over-specifying syntax
    not present in the excerpt.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - man
  - a person
  lexicon: BDAG
  rationale: The Greek uses ἄνθρωπον twice in singular form. Following the project's
    gender-accurate policy, 'a man' best matches the singular masculine/generic form
    here rather than flattening to 'person.'
- source_word: σάρκας
  chosen: the flesh
  alternatives:
  - flesh
  - meat
  lexicon: BDAG
  rationale: σάρξ in this context is literal bodily flesh, not metaphorical 'sinful
    nature.' 'The flesh' is the most direct and grave rendering; 'meat' would soften
    the horror of the statement.
- source_word: υἱοῦ αὐτοῦ
  chosen: his own son
  alternatives:
  - his son
  lexicon: BDAG
  rationale: The genitive with αὐτοῦ indicates the man's own child. English naturally
    expresses this as 'his own son' to make the filial relation explicit.
- source_word: θυγατρὸς αὐτοῦ
  chosen: his own daughter
  alternatives:
  - his daughter
  lexicon: BDAG
  rationale: As with 'son,' the possessive relation is explicit in Greek and is naturally
    conveyed as 'his own daughter' in English.
