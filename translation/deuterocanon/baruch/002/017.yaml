theological_decisions:
- issue: Meaning of πνεῦμα in a death-context
  chosen_reading: breath
  alternative_readings:
  - spirit
  rationale: The verse contrasts the dead in Hades with the living who can still respond
    to God. In that setting, πνεῦμα most naturally evokes the life-breath removed
    at death, though 'spirit' remains possible and should be preserved as an alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of δικαίωμα in relation to God
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The noun here likely refers to acknowledging God's rightness or just
    due rather than a legal 'ordinance.' 'Righteousness' keeps the moral-theological
    register, while 'justice' is a viable alternative worth preserving because the
    context concerns what is due to the Lord.
  doctrine_reference: Consistency of key terms, or documented exception.
