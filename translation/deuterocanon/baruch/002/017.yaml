translation:
  text: 'Open your eyes and see: it is not the dead in Hades, whose breath has been
    taken from their inward parts, who will give glory and righteousness to the Lord;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose spirit has been taken from within them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will give glory and justice to the Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνοιξον
  chosen: Open
  alternatives:
  - Uncover
  - Open up
  lexicon: LSJ
  rationale: Aorist imperative of ἀνοίγω; direct imperative best rendered simply as
    'Open' in natural English.
- source_word: ὀφθαλμούς σου
  chosen: your eyes
  alternatives:
  - your eye
  lexicon: LSJ
  rationale: Plural object in Greek; idiomatic English keeps the plural.
- source_word: ἴδε
  chosen: see
  alternatives:
  - look
  - behold
  lexicon: LSJ
  rationale: Imperative of ὁράω. 'See' is clear modern English; 'behold' is too archaic,
    while 'look' underplays the cognitive force.
- source_word: οὐχ οἱ τεθνηκότες
  chosen: it is not the dead
  alternatives:
  - not the dead
  - not those who have died
  lexicon: LSJ
  rationale: The clause is contrastive and emphatic; supplying 'it is' makes the English
    syntax clear without adding new content. τεθνηκότες denotes the dead / those who
    have died.
- source_word: ἐν τῷ ᾅδῃ
  chosen: in Hades
  alternatives:
  - in the grave
  - in the underworld
  - among the dead
  lexicon: LSJ
  rationale: ᾅδης is the Greek term used in the source text, referring to the realm
    of the dead. 'Hades' preserves the lexical specificity better than interpretive
    substitutes like 'grave'.
- source_word: ὧν ἐλήμφθη τὸ πνεῦμα αὐτῶν
  chosen: whose breath has been taken
  alternatives:
  - whose spirit has been taken
  - from whom life has been taken
  lexicon: LSJ
  rationale: πνεῦμα can mean 'breath' or 'spirit.' In context of the dead, the life-breath
    being removed is likely foregrounded. Passive perfective sense is conveyed by
    'has been taken.'
- source_word: ἀπὸ τῶν σπλάγχνων αὐτῶν
  chosen: from their inward parts
  alternatives:
  - from their bodies
  - from their entrails
  - from within them
  lexicon: LSJ
  rationale: σπλάγχνα literally denotes inward parts/entrails and can also carry affective
    senses. Here the physical sense fits the death imagery. 'Inward parts' is more
    readable than 'entrails' while remaining concrete.
- source_word: δώσουσιν
  chosen: will give
  alternatives:
  - shall give
  - will render
  lexicon: LSJ
  rationale: Future active; 'will give' is straightforward modern English.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  - praise
  lexicon: LSJ
  rationale: δόξα regularly means 'glory'; this preserves the biblical register and
    leaves the object less interpretively narrowed than 'praise'.
- source_word: δικαίωμα
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  - vindication
  lexicon: LSJ
  rationale: δικαίωμα can denote a righteous requirement, ordinance, or just act.
    In this collocation with 'give glory ... to the Lord,' the sense is acknowledging
    God's rightness/justice. 'Righteousness' is chosen for compactness, with 'justice'
    preserved as an alternative because English readers may hear the phrase as ascribing
    God's just due.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - to Lord
  - to the master
  lexicon: LSJ
  rationale: Per doctrine, κύριος is rendered 'Lord.' The dative marks the recipient
    of glory and righteousness/justice.
