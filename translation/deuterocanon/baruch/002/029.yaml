id: BAR.2.29
reference: Baruch 2:29
source:
  edition: lxx-swete-1909
  text: Ἐὰν μὴ ἀκούσητε τῆς φωνῆς μου, εἰ μὴν ἡ βόμβησις ἡ μεγάλη ἡ πολλὴ αὕτη ἀποστρέψει
    εἰς μικρὰν ἐν τοῖς ἔθνεσιν οὗ διασπερῶ αὐτοὺς ἐκεῖ.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: If you do not listen to my voice, surely this great and numerous multitude
    will be reduced to a few among the nations where I will scatter them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἡ βόμβησις literally can denote a buzzing, roar, or tumult. Here it
      is rendered 'multitude' because the following phrase 'to a few among the nations'
      points to the people as a large population being diminished.
    reason: lexical_alternative
  - marker: b
    text: The Greek ends with a redundant locative expression, literally 'where I
      will scatter them there.' This translation preserves the emphasis with 'there,'
      though English would normally omit it.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐὰν μὴ ἀκούσητε
  chosen: If you do not listen
  alternatives:
  - If you do not hear
  - Unless you listen
  lexicon: BDAG
  rationale: ἀκούω can mean either hear or listen/obey depending on context. With
    the genitive τῆς φωνῆς μου and covenantal warning context, 'listen' best conveys
    hearing with heed rather than mere auditory perception.
- source_word: τῆς φωνῆς μου
  chosen: to my voice
  alternatives:
  - my voice
  - what I say
  lexicon: LEH
  rationale: A fairly direct rendering preserves the idiom of divine address. English
    naturally takes 'listen to my voice' here.
- source_word: εἰ μὴν
  chosen: surely
  alternatives:
  - indeed
  - certainly
  lexicon: LSJ
  rationale: This particle combination strengthens the apodosis with emphatic assurance.
    'Surely' captures the solemn certainty of the warning.
- source_word: ἡ βόμβησις
  chosen: multitude
  alternatives:
  - noise
  - roar
  - tumult
  - throng
  lexicon: LSJ
  rationale: The noun literally can denote a buzzing/noise, but in this context with
    modifiers 'great' and 'many' and followed by reduction 'to a few among the nations,'
    it functions metonymically for the populous mass of the people. 'Multitude' best
    fits the sense in context while avoiding an unintelligible literalism.
- source_word: ἡ μεγάλη ἡ πολλὴ αὕτη
  chosen: this great and vast
  alternatives:
  - this great and numerous
  - this great and many
  lexicon: LEH
  rationale: The paired adjectives intensify the size of the people. 'Great and vast'
    is idiomatic English that preserves the double emphasis without wooden repetition.
- source_word: ἀποστρέψει εἰς μικρὰν
  chosen: will be reduced to a few
  alternatives:
  - will turn into a small number
  - will become small
  lexicon: LEH
  rationale: The Greek is somewhat compressed and awkward in Swete's wording, but
    the sense is that the large population will become small in number. 'Will be reduced
    to a few' expresses the result clearly in English.
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: LEH
  rationale: In Baruch's exilic context, ἔθνη refers to the foreign nations among
    whom Israel is dispersed. 'Among the nations' is the most natural and least theologically
    loaded rendering here.
- source_word: οὗ διασπερῶ αὐτοὺς ἐκεῖ
  chosen: where I will scatter them there
  alternatives:
  - where I will scatter them
  - there where I will scatter them
  lexicon: LEH
  rationale: The Greek includes both the relative adverb οὗ and ἐκεῖ, creating a slightly
    redundant locative emphasis. Retaining 'there' preserves that emphasis, though
    the English is somewhat marked. Because the source is high-confidence and the
    redundancy is in the Greek, it is reflected rather than silently removed.
