translation:
  text: And they will turn away from their stiff neck and from their evil deeds, because
    they will remember the way of their fathers who sinned before the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their hard neck' or more interpretively 'from their stubbornness.'
      The Greek text, however, literally says 'from their stubborn back.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστρέψουσιν
  chosen: they will turn away
  alternatives:
  - they will turn back
  - they will turn
  lexicon: BDAG
  rationale: Future active conveys a coming change of direction. With ἀπό, 'turn away'
    best captures repentance from prior conduct in natural English.
- source_word: ἀπὸ τοῦ νώτου αὐτῶν τοῦ σκληροῦ
  chosen: from their stubborn back
  alternatives:
  - from their hard neck
  - from their stubbornness
  lexicon: LSJ
  rationale: νώτου literally means 'back,' and the Greek text here does not use the
    more common 'neck' idiom. Retaining 'back' preserves the source wording, while
    'stubborn' renders τοῦ σκληροῦ idiomatically. The phrase likely functions metaphorically
    for obstinacy, but the translation keeps the image rather than flattening it to
    an abstraction.
- source_word: πονηρῶν πραγμάτων
  chosen: evil deeds
  alternatives:
  - wicked acts
  - evil things
  lexicon: BDAG
  rationale: πράγματα in context refers to actions or practices rather than mere 'things.'
    'Evil deeds' is clear, natural, and morally weighty.
- source_word: μνησθήσονται
  chosen: they will remember
  alternatives:
  - they will call to mind
  - they will be mindful of
  lexicon: BDAG
  rationale: Future middle of μιμνῄσκομαι commonly means 'remember.' This is the most
    direct and readable rendering.
- source_word: τῆς ὁδοῦ
  chosen: the way
  alternatives:
  - the path
  - the conduct
  lexicon: BDAG
  rationale: ὁδός can denote literal road or figurative manner of life. 'Way' preserves
    the biblical metaphor and allows the following genitive phrase to define it.
- source_word: πατέρων αὐτῶν
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural. Per project philosophy, the
    gendered term is retained unless context clearly demands neutralization. Here
    'fathers' also fits the idiom of ancestral precedent.
- source_word: τῶν ἁμαρτόντων
  chosen: who sinned
  alternatives:
  - who had sinned
  - the ones who sinned
  lexicon: BDAG
  rationale: Aorist participle is well represented by the simple English relative
    clause 'who sinned.'
- source_word: ἔναντι Κυρίου
  chosen: before the Lord
  alternatives:
  - in the presence of the Lord
  - against the Lord
  lexicon: BDAG
  rationale: ἔναντι normally means 'before' or 'in the sight of.' 'Against the Lord'
    would overinterpret the preposition, though the sinful offense is certainly directed
    toward him. 'Before the Lord' preserves the Greek more exactly.
