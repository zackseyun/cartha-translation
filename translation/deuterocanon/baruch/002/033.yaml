theological_decisions:
- issue: Metaphorical force of 'their stubborn back'
  chosen_reading: Retain the bodily image rather than interpretively replacing it
    with 'stubbornness.'
  alternative_readings:
  - from their stubbornness
  - from their hard neck
  rationale: The Greek witness reads νώτου ('back'), not a more familiar term for
    'neck.' Preserving the image maintains transparency to the source and avoids importing
    a different idiom from elsewhere in Scripture.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering of πατέρων αὐτῶν
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The source is grammatically masculine and refers to forefathers whose
    sinful pattern is being recalled. Per gender-accurate policy, the masculine form
    is retained rather than neutralized.
  doctrine_reference: Translation philosophy §4
- issue: Rendering of Κυρίου
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The Greek source has Κυρίου, and the project's default for κύριος is
    'Lord.' Since this is a Greek deuterocanonical text rather than a direct Hebrew
    occurrence of YHWH in the source line, 'the Lord' is the appropriate rendering
    here.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord'
