translation:
  text: And the Lord kept watch over the calamities and brought them upon us, because
    the Lord is righteous in all his works that he commanded us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the evils' or 'the disasters.' The Greek κακά here likely refers to
      calamities of judgment, not moral evil in the abstract.
    reason: lexical_alternative
  - marker: b
    text: Or 'just' instead of 'righteous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγρηγόρησεν
  chosen: kept watch over
  alternatives:
  - watched over
  - was vigilant over
  - stayed awake over
  lexicon: LSJ
  rationale: From γρηγορέω, literally 'to be awake/watchful.' In this context with
    ἐπὶ τοῖς κακοῖς it conveys active vigilance with respect to the coming disasters,
    not mere observation. 'Kept watch over' preserves the metaphor without implying
    approval of evil.
- source_word: ἐπὶ τοῖς κακοῖς
  chosen: over the calamities
  alternatives:
  - over the evils
  - concerning the disasters
  - over the troubles
  lexicon: LSJ
  rationale: κακά can mean 'evils' or 'calamities/misfortunes.' Here, since the next
    clause says the Lord brought them upon us, the sense is punitive disasters rather
    than moral evil. 'Calamities' avoids suggesting that God watched over moral evil
    itself.
- source_word: ἐπήγαγε
  chosen: brought
  alternatives:
  - brought on
  - brought upon
  - caused to come
  lexicon: LSJ
  rationale: The verb means to bring upon/against. Because ἐφ᾽ ἡμᾶς already supplies
    'upon us,' the concise English 'brought them upon us' is natural and sufficiently
    formal.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: LSJ
  rationale: The default project rendering for cognates of δικαιοσύνη/δίκαιος favors
    'righteous/righteousness' unless context strongly demands 'just/justice.' Here
    the statement concerns the Lord's moral rightness in judgment; 'righteous' preserves
    biblical-theological resonance.
- source_word: ἐπὶ πάντα τὰ ἔργα αὐτοῦ
  chosen: in all his works
  alternatives:
  - over all his works
  - in regard to all his deeds
  lexicon: LSJ
  rationale: The preposition here is idiomatic with δίκαιος, expressing sphere or
    respect. 'In all his works' is natural English and keeps the comprehensive scope.
- source_word: ἃ ἐνετείλατο ἡμῖν
  chosen: that he commanded us
  alternatives:
  - which he commanded us
  - that he commanded for us
  - that he enjoined on us
  lexicon: LSJ
  rationale: The Greek relative clause most naturally refers to the works/acts in
    relation to what God commanded Israel. The construction is somewhat compressed,
    but 'that he commanded us' best reflects the wording without overexpansion.
