theological_decisions:
- issue: Whether τὰ κακά should be rendered as moral 'evils' or punitive 'calamities'
    when attributed to the Lord's action
  chosen_reading: calamities
  alternative_readings:
  - evils
  - disasters
  rationale: Given the immediate parallel 'and brought them upon us' and the context
    of covenant judgment, the phrase refers to disastrous judgments rather than moral
    evil. This preserves divine righteousness in the following clause without softening
    the text's claim that the Lord actively brought judgment.
  doctrine_reference: 'Translation philosophy: preserve source sense without importing
    doctrinal claims; readable modern English.'
- issue: Rendering δίκαιος for the Lord
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: The project's contested-terms guidance prefers righteousness language
    for δικ- terms unless context requires otherwise. Here 'righteous' retains scriptural
    resonance while fitting the context of divine judgment.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice'
