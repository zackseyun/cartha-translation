theological_decisions:
- issue: Rendering the paired divine-judgment terms θυμός and ὀργή
  chosen_reading: 'distinct pair: ''wrath and ... anger'''
  alternative_readings:
  - '''anger and fury'''
  - '''wrath and indignation'''
  rationale: The Greek intentionally doubles near-synonyms to emphasize the severity
    of God's judgment. The translation preserves the tension and rhetorical fullness
    rather than reducing the pair to a single concept.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Agency idiom ἐν χειρὶ τῶν παίδων σου τῶν προφητῶν
  chosen_reading: '''by the hand of your servants the prophets'''
  alternative_readings:
  - '''through your servants the prophets'''
  rationale: The idiom expresses prophetic mediation. The more literal rendering keeps
    the biblical idiom visible while remaining intelligible; the alternative is smoother
    but less transparent to the source wording.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; original-language primacy
    over translation tradition.'
