id: BAR.2.20
reference: Baruch 2:20
source:
  edition: lxx-swete-1909
  text: ὅτι ἐνῆκας τὸν θυμόν σου καὶ τὴν ὀργήν σου εἰς ἡμᾶς, καθάπερ ἐλάλησας ἐν χειρὶ
    τῶν παίδων σου τῶν προφητῶν
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: because you have brought your wrath and your anger upon us, just as you spoke
    by the hand of your servants the prophets
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'through your servants the prophets.' The Greek
      literally says 'by the hand of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνῆκας
  chosen: you brought ... upon
  alternatives:
  - you brought in
  - you inflicted
  lexicon: LSJ
  rationale: Aorist verb from ἐνάγω/ἐνέγκω in context takes the sense of bringing
    something upon someone. 'Brought ... upon' is idiomatic English and preserves
    the causative force without overinterpreting as a more specific punitive verb
    like 'inflicted'.
- source_word: θυμόν
  chosen: wrath
  alternatives:
  - rage
  - fury
  lexicon: BDAG
  rationale: θυμός here denotes intense divine anger. 'Wrath' fits biblical register
    and distinguishes it from the paired ὀργή without collapsing the two terms into
    one English word.
- source_word: ὀργήν
  chosen: anger
  alternatives:
  - indignation
  - wrath
  lexicon: BDAG
  rationale: The verse uses both θυμός and ὀργή. Rendering them as 'wrath' and 'anger'
    preserves the rhetorical pairing while avoiding an awkward doublet like 'wrath
    and wrath.' 'Anger' is clear modern English and still weighty enough for divine
    judgment.
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - even as
  - as
  lexicon: LSJ
  rationale: This comparative conjunction links the present judgment with prior prophetic
    warning. 'Just as' clearly marks correspondence and fulfillment.
- source_word: ἐλάλησας
  chosen: you spoke
  alternatives:
  - you said
  lexicon: BDAG
  rationale: The verb is the common 'speak.' 'You spoke' preserves the verbal connection
    to prophetic mediation better than the slightly flatter 'you said.'
- source_word: ἐν χειρί
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: LSJ
  rationale: This is a standard biblical idiom for agency or instrumentality. Retaining
    'by the hand of' preserves the scriptural texture while remaining understandable
    in English.
- source_word: παίδων
  chosen: servants
  alternatives:
  - slaves
  - children
  lexicon: BDAG
  rationale: Although παῖς can mean 'child' or 'servant,' in the phrase 'your servants
    the prophets' it clearly denotes those commissioned by God. 'Servants' is the
    natural contextual rendering; 'slaves' would overstate the bonded nuance here,
    and 'children' would be incorrect.
- source_word: προφητῶν
  chosen: the prophets
  lexicon: BDAG
  rationale: Straightforward rendering of the genitive apposition identifying the
    servants as prophets.
