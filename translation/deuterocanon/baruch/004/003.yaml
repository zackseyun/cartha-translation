id: BAR.4.3
reference: Baruch 4:3
source:
  edition: lxx-swete-1909
  text: μὴ δῷς ἑτέρῳ τὴν δόξαν σου, καὶ τὰ συμφέροντά σοι ἔθνει ἀλλοτρίῳ.
  language: Greek
  pages:
  - 380
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: Do not give your glory to another, nor what benefits you to a foreign nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your honor' for 'your glory.' The Greek δόξα can carry either sense
      here.
    reason: lexical_alternative
  - marker: b
    text: Or 'your welfare' or 'your advantages' for 'what benefits you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ δῷς
  chosen: Do not give
  alternatives:
  - Do not hand over
  - Do not surrender
  lexicon: BDAG
  rationale: A straightforward prohibition with aorist subjunctive after μή. 'Do not
    give' is the plain and natural English equivalent, while stronger options like
    'surrender' are interpretive.
- source_word: ἑτέρῳ
  chosen: to another
  alternatives:
  - to someone else
  - to a different one
  lexicon: BDAG
  rationale: ἕτερος commonly means 'another' or 'different.' 'To another' preserves
    the concise formal contrast of the Greek.
- source_word: τὴν δόξαν σου
  chosen: your glory
  alternatives:
  - your honor
  - your splendor
  lexicon: BDAG
  rationale: δόξα can denote glory, honor, or reputation. 'Glory' best preserves the
    elevated theological and covenantal resonance of the term in this admonition.
- source_word: τὰ συμφέροντά σοι
  chosen: what benefits you
  alternatives:
  - your advantages
  - what is profitable for you
  - your welfare
  lexicon: BDAG
  rationale: The neuter plural with dative σοι refers to things advantageous or beneficial
    to the addressee. 'What benefits you' is idiomatic English that preserves the
    sense without over-specifying material or political advantage.
- source_word: ἔθνει ἀλλοτρίῳ
  chosen: to a foreign nation
  alternatives:
  - to an alien nation
  - to a strange nation
  lexicon: BDAG
  rationale: ἔθνος here is best rendered 'nation' rather than 'Gentile,' since the
    context concerns handing over Israel's distinctive glory/benefit to an outside
    people. ἀλλότριος adds the sense of foreignness or belonging to another.
