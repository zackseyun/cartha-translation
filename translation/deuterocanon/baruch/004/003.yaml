theological_decisions:
- issue: Sense of 'your glory' in context
  chosen_reading: Retain the broader phrase 'your glory' without narrowing it to covenant
    privilege, honor, or worship.
  alternative_readings:
  - your honor
  - the glory given to you by God
  - your covenant privilege
  rationale: The Greek itself does not explicitly define the referent. Preserving
    'glory' maintains the text's theological breadth and avoids importing a more specific
    doctrinal interpretation than the verse states.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Sense of τὰ συμφέροντά σοι
  chosen_reading: Render generally as 'what benefits you' rather than specifying material
    prosperity or spiritual good.
  alternative_readings:
  - your welfare
  - your advantages
  - what is profitable for you
  rationale: The phrase is semantically broad. A general rendering preserves the tension
    and allows the reader to hear both practical and covenantal overtones.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
