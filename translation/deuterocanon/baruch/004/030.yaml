translation:
  text: Take courage, Jerusalem; the one who named you will comfort you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Take heart.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the one who named you' refers contextually to God, though the
      Greek does not state the divine name or title explicitly here.
    reason: alternative_reading
lexical_decisions:
- source_word: Θάρσει
  chosen: Take courage
  alternatives:
  - Be of good courage
  - Be encouraged
  - Take heart
  lexicon: BDAG
  rationale: Imperative of θαρσέω/θαρσέω-family expression calling for courage or
    confidence. 'Take courage' is natural modern English and preserves the exhortatory
    force better than the more archaic 'be of good courage.'
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard transliteration of the place/city name, following the project's
    policy to transliterate names.
- source_word: παρακαλέσει
  chosen: will comfort
  alternatives:
  - will encourage
  - will console
  lexicon: BDAG
  rationale: Future of παρακαλέω. In this context of afflicted Jerusalem, 'comfort'
    best fits the restorative sense, while 'encourage' is possible but weaker and
    less contextually apt.
- source_word: ὁ ὀνομάσας σε
  chosen: the one who named you
  alternatives:
  - he who named you
  - your namer
  lexicon: BDAG
  rationale: Aorist participle with article functioning substantivally. 'The one who
    named you' is clear, idiomatic English and preserves the personal agency implied
    in the Greek without over-interpreting the referent in the main text.
