theological_decisions:
- issue: Identification of 'the one who named you'
  chosen_reading: Render the phrase descriptively without explicitly supplying 'God'
    in the main text.
  alternative_readings:
  - the Lord who named you
  - God, who named you
  rationale: The context strongly implies God as Jerusalem's namer and comforter,
    but the Greek text itself uses the descriptive participial phrase rather than
    a divine title. Preserving that wording maintains the text's literary force and
    avoids importing an explicit identification not stated in this verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
