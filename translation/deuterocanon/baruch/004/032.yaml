id: BAR.4.32
reference: Baruch 4:32
source:
  edition: lxx-swete-1909
  text: δείλαιαι αἱ πόλεις αἷς ἐδούλευσαν τὰ τέκνα σου, δείλαια ἡ δεξαμένη τοὺς υἱούς
    σου.
  language: Greek
  pages:
  - 382
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: Wretched are the cities to which your children were enslaved; wretched is
    she who received your sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in which your children served as slaves.' The Greek verb can be rendered
      more literally as 'served,' but the context favors the stronger sense of bondage.
    reason: lexical_alternative
lexical_decisions:
- source_word: δείλαιαι
  chosen: wretched
  alternatives:
  - miserable
  - pitiful
  - woe to
  lexicon: LSJ
  rationale: An exclamatory adjective of lament/pity directed at the cities. 'Wretched'
    preserves the denunciatory sorrow better than the weaker 'miserable' and avoids
    turning the adjective into an interpretive interjection like 'woe to.'
- source_word: αἱ πόλεις
  chosen: the cities
  alternatives:
  - cities
  lexicon: LSJ
  rationale: Definite article retained naturally in English because the reference
    is to specific cities associated with the exile.
- source_word: αἷς ἐδούλευσαν
  chosen: to which ... were enslaved
  alternatives:
  - in which ... served as slaves
  - for which ... were enslaved
  lexicon: BDAG
  rationale: The verb δουλεύω carries slave-service/bondage sense here in the context
    of exile and oppression. English passive 'were enslaved' makes the force clear
    and avoids the softer 'served.' The dative relative is represented idiomatically
    as 'to which.'
- source_word: τὰ τέκνα σου
  chosen: your children
  alternatives:
  - your sons and daughters
  - your offspring
  lexicon: BDAG
  rationale: τέκνα is broader than 'sons' and includes children generally, so 'children'
    is the most accurate and natural rendering.
- source_word: ἡ δεξαμένη
  chosen: she who received
  alternatives:
  - the one that received
  - the city that took in
  lexicon: LSJ
  rationale: The feminine singular participle personifies a city as a woman. 'She
    who received' preserves the personification and matches the singular feminine
    form.
- source_word: τοὺς υἱούς σου
  chosen: your sons
  alternatives:
  - your children
  lexicon: BDAG
  rationale: Unlike τέκνα earlier in the verse, υἱούς is specifically male. The translation
    preserves the lexical shift rather than flattening both expressions into the same
    English term.
