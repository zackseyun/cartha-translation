theological_decisions:
- issue: Rendering of δουλεύω in an exile/judgment context
  chosen_reading: were enslaved
  alternative_readings:
  - served
  - were in bondage
  rationale: Following the project's doctrine on δοῦλος-word family, the stronger
    slavery sense is used where bonded oppression is salient. In this verse the context
    is forced subjection of Zion's children, so 'were enslaved' best reflects the
    severity.
