id: BAR.4.13
reference: Baruch 4:13
source:
  edition: lxx-swete-1909
  text: καὶ δικαιώματα αὐτοῦ οὐκ ἔγνωσαν, οὐδὲ ἐπορεύθησαν ὁδοῖς ἐντολῶν θεοῦ, οὐδὲ
    τρίβους παιδίας ἐν δικαιοσύνῃ αὐτοῦ ἐπέβησαν.
  language: Greek
  pages:
  - 380
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: and they did not know his righteous decrees, nor did they walk in the ways
    of God's commandments, nor did they step onto the paths of discipline in his righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instruction' for 'discipline' (Greek παιδεία), emphasizing formative
      teaching rather than correction alone.
    reason: lexical_alternative
  - marker: b
    text: Or 'in his justice' for 'in his righteousness.'
    reason: alternative_reading
lexical_decisions:
- source_word: δικαιώματα
  chosen: righteous decrees
  alternatives:
  - ordinances
  - statutes
  - requirements
  lexicon: LSJ
  rationale: δικαιώματα commonly denotes ordinances or decrees; adding 'righteous'
    reflects the δικαι- stem and suits the moral-legal force in context, while avoiding
    overly technical 'statutes.'
- source_word: ἔγνωσαν
  chosen: did not know
  alternatives:
  - did not understand
  - did not recognize
  lexicon: LSJ
  rationale: The aorist of γινώσκω here naturally means they failed to know or come
    to know; 'know' preserves the direct lexical sense without over-interpreting as
    mere intellectual comprehension.
- source_word: ἐπορεύθησαν
  chosen: did ... walk
  alternatives:
  - go
  - live
  lexicon: LSJ
  rationale: In biblical idiom πορεύομαι with 'ways' is well rendered 'walk,' preserving
    the ethical-metaphorical sense of conduct.
- source_word: ὁδοῖς ἐντολῶν θεοῦ
  chosen: the ways of God's commandments
  alternatives:
  - the ways of the commandments of God
  - the paths of God's commands
  lexicon: LSJ
  rationale: This keeps the genitival structure visible while remaining readable.
    'Commandments' preserves the covenantal-moral force of ἐντολῶν.
- source_word: τρίβους
  chosen: paths
  alternatives:
  - tracks
  - ways
  lexicon: LSJ
  rationale: τρίβοι are beaten paths or tracks; 'paths' is idiomatic and distinguishes
    the term from the earlier ὁδοῖς without becoming awkward.
- source_word: παιδίας
  chosen: discipline
  alternatives:
  - instruction
  - training
  - education
  lexicon: LSJ
  rationale: In this wisdom context παιδεία carries the sense of formative instruction
    and correction. 'Discipline' best preserves that moral-training nuance, though
    'instruction' remains possible.
- source_word: ἐν δικαιοσύνῃ αὐτοῦ
  chosen: in his righteousness
  alternatives:
  - in his justice
  - for his righteousness
  lexicon: LSJ
  rationale: The phrase is somewhat compact, but 'in his righteousness' most directly
    reflects the Greek and preserves the established default rendering of δικαιοσύνη
    as 'righteousness.' 'Justice' is possible but less fitting in this immediate wisdom-torah
    context.
- source_word: ἐπέβησαν
  chosen: did ... step onto
  alternatives:
  - set foot on
  - enter upon
  - tread
  lexicon: LSJ
  rationale: ἐπιβαίνω literally means to step onto or set foot on. 'Step onto' preserves
    the concrete image while remaining natural English.
