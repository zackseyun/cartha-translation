translation:
  text: Wretched are those who harmed you and rejoiced at your fall,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gloated over your downfall.' The Greek literally says 'rejoiced at your
      fall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δείλαιοι
  chosen: Wretched
  alternatives:
  - Miserable
  - Pitiful
  - Accursed
  lexicon: LSJ
  rationale: The adjective expresses a state of misery or pitiable wretchedness. 'Wretched'
    preserves the lament/woe tone without over-specifying a formal curse, which the
    word itself does not explicitly state.
- source_word: οἱ σε κακώσαντες
  chosen: those who harmed you
  alternatives:
  - those who mistreated you
  - those who afflicted you
  - those who did evil to you
  lexicon: BDAG
  rationale: The participle from κακόω denotes doing harm or mistreating. 'Harmed
    you' is concise, natural English and broad enough to cover injury/oppression without
    narrowing to only physical abuse.
- source_word: ἐπιχαρέντες
  chosen: rejoiced
  alternatives:
  - gloated
  - took delight
  lexicon: BDAG
  rationale: The participle means rejoicing over something, often at another's misfortune.
    'Rejoiced' is the direct lexical equivalent; the hostile nuance is supplied by
    the dative phrase 'at your fall.' 'Gloated' is possible but slightly more interpretive.
- source_word: τῇ σῇ πτώσει
  chosen: at your fall
  alternatives:
  - over your downfall
  - at your collapse
  lexicon: LSJ
  rationale: πτῶσις literally means a fall, and in context refers to Jerusalem's downfall.
    'At your fall' keeps the metaphor close to the Greek while remaining idiomatic
    in English.
