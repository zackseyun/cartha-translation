translation:
  text: Children, endure patiently the wrath that has come upon you from God. The
    enemy pursued you, but you will soon see his destruction, and you will step upon
    their necks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''his destruction ... their necks.'' The verse shifts from singular
      to plural in reference to the enemy, likely treating the enemy as both a single
      foe and a collective force.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνα
  chosen: Children
  alternatives:
  - My children
  - Sons/children
  lexicon: BDAG
  rationale: Vocative plural of τέκνον used as a tender address. 'Children' preserves
    the familial appeal without adding 'my,' which is not in the Greek.
- source_word: μακροθυμήσατε
  chosen: endure patiently
  alternatives:
  - be patient
  - be long-suffering
  lexicon: BDAG
  rationale: Aorist imperative calling for patient endurance under suffering. 'Endure
    patiently' captures both the command and the context of affliction better than
    the flatter 'be patient.'
- source_word: ὀργήν
  chosen: wrath
  alternatives:
  - anger
  lexicon: BDAG
  rationale: In the phrase 'the wrath ... from God,' 'wrath' better conveys judicial
    divine anger than the more ordinary 'anger.'
- source_word: ἐπελθοῦσαν
  chosen: that has come upon you
  alternatives:
  - that came upon you
  - that has overtaken you
  lexicon: BDAG
  rationale: The participle with ὀργήν describes wrath as having come upon the audience.
    Present perfect English gives the resulting state naturally.
- source_word: κατεδίωξέν
  chosen: pursued
  alternatives:
  - persecuted
  - chased down
  lexicon: BDAG
  rationale: The verb denotes hostile pursuit. 'Pursued' is broad enough to include
    military oppression without importing later technical religious overtones of 'persecuted.'
- source_word: ὄψει
  chosen: you will see
  alternatives:
  - you will behold
  lexicon: BDAG
  rationale: Future middle of ὁράω. 'You will see' is the natural modern equivalent.
- source_word: ἀπώλειαν
  chosen: destruction
  alternatives:
  - ruin
  - downfall
  lexicon: BDAG
  rationale: Refers to the enemy's undoing. 'Destruction' is strong and straightforward.
- source_word: ἐν τάχει
  chosen: soon
  alternatives:
  - quickly
  - in a short time
  lexicon: BDAG
  rationale: Idiomatic temporal phrase meaning imminence. 'Soon' is the clearest natural
    rendering.
- source_word: ἐπὶ τραχήλους αὐτῶν ἐπιβήσῃ
  chosen: you will step upon their necks
  alternatives:
  - you will tread on their necks
  - you will set foot on their necks
  lexicon: BDAG
  rationale: A vivid image of triumph over defeated enemies. 'Step upon their necks'
    preserves the concrete metaphor. The Greek shifts from singular αὐτοῦ ('his')
    to plural αὐτῶν ('their'), which is retained in sense rather than smoothed away.
