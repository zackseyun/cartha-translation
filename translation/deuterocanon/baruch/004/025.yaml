theological_decisions:
- issue: Divine agency in the people's suffering
  chosen_reading: the wrath is rendered explicitly as coming from God
  alternative_readings:
  - the anger that came upon you
  - the punishment that came upon you from the Lord
  rationale: The Greek plainly says 'the wrath that has come upon you from God.' The
    translation preserves divine agency without softening it into a mere consequence
    or interpretive 'punishment.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Imagery of victory over enemies
  chosen_reading: retain the concrete image 'step upon their necks'
  alternative_readings:
  - triumph over them
  - subdue them
  rationale: The Greek uses bodily conquest imagery. Keeping the metaphor avoids paraphrasing
    away the force of the text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
