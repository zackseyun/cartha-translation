theological_decisions:
- issue: Referent and force of δαιμονίοις in an idolatry-sacrifice context
  chosen_reading: demons
  alternative_readings:
  - evil spirits
  - idol-powers
  rationale: The verse presents idolatrous sacrifice as directed to personal spiritual
    beings opposed to God, echoing established Jewish scriptural polemic. Rendering
    as 'demons' preserves that theological claim rather than softening it into merely
    metaphorical language.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without paraphrase.'
