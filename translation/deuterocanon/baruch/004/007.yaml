id: BAR.4.7
reference: Baruch 4:7
source:
  edition: lxx-swete-1909
  text: παρωξύνατε γὰρ τὸν ποιήσαντα ὑμᾶς θύσαντες δαιμονίοις καὶ οὐ θεῷ.
  language: Greek
  pages:
  - 380
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: For you provoked the one who made you by sacrificing to demons and not to
    God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρωξύνατε
  chosen: provoked
  alternatives:
  - angered
  - embittered
  - stirred to wrath
  lexicon: BDAG
  rationale: Aorist active indicative, second plural, from παροξύνω. In this context
    of covenantal offense through idolatry, 'provoked' best preserves the causative
    sense without over-specifying the emotional result. 'Stirred to wrath' is interpretive;
    'angered' is possible but less directly tied to the Greek verb's common biblical
    usage.
- source_word: τὸν ποιήσαντα ὑμᾶς
  chosen: the one who made you
  alternatives:
  - your Maker
  - the one who created you
  lexicon: BDAG
  rationale: The articular participial phrase is naturally rendered as 'the one who
    made you.' 'Your Maker' is idiomatic and possible, but the chosen wording stays
    closer to the Greek structure while remaining readable. 'Created' is slightly
    broader than ποιέω here.
- source_word: θύσαντες
  chosen: by sacrificing
  alternatives:
  - when you sacrificed
  - having sacrificed
  lexicon: BDAG
  rationale: The aorist participle expresses means or attendant circumstance explaining
    how they provoked God. 'By sacrificing' captures the instrumental nuance in smooth
    English better than a more wooden participial rendering.
- source_word: δαιμονίοις
  chosen: demons
  alternatives:
  - evil spirits
  - divine beings
  lexicon: BDAG
  rationale: In Jewish-Greek polemical usage, δαιμόνια in sacrificial contexts refers
    to hostile spiritual beings associated with idolatry, not neutral lesser deities.
    'Demons' is the clearest and most theologically accurate English equivalent here.
- source_word: καὶ οὐ θεῷ
  chosen: and not to God
  alternatives:
  - and not God
  - instead of God
  lexicon: BDAG
  rationale: 'The dative θεῷ matches the dative δαιμονίοις after θύσαντες, so the
    sense is sacrificial direction: ''to demons and not to God.'' This preserves the
    contrast without paraphrase.'
