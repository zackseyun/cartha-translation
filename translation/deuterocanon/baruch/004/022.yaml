id: BAR.4.22
reference: Baruch 4:22
source:
  edition: lxx-swete-1909
  text: ἐγὼ γὰρ ἤλπισα ἐπὶ τῷ αἰωνίῳ τὴν σωτηρίαν ὑμῶν, καὶ ἦλθέν μοι χαρὰ παρὰ τοῦ
    ἁγίου ἐπὶ τῇ ἐλεημοσύνῃ, ἣ ἥξει ὑμῖν ἐν τάχει παρὰ τοῦ αἰωνίου σωτῆρος ὑμῶν.
  language: Greek
  pages:
  - 381
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: For I have hoped in the Eternal One for your salvation, and joy has come to
    me from the Holy One because of the mercy that will quickly come to you from your
    eternal Savior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the merciful act.' The Greek term can elsewhere mean 'almsgiving'
      or 'charitable deed,' but here the context favors God's mercy toward his people.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤλπισα
  chosen: have hoped
  alternatives:
  - hoped
  - placed my hope
  lexicon: BDAG
  rationale: A present-perfect English form best conveys the Greek aorist here as
    a settled act with continuing relevance in context, while remaining natural English.
- source_word: ἐπὶ τῷ αἰωνίῳ
  chosen: in the Eternal One
  alternatives:
  - in the Eternal
  - upon the Eternal One
  lexicon: LSJ
  rationale: The phrase denotes trust directed toward God under the title αἰώνιος.
    Rendering it as 'the Eternal One' makes the adjectival title idiomatic in English
    and preserves the personal reference.
- source_word: σωτηρίαν
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: '''Salvation'' fits the religious register of the passage and the broader
    restoration context, while ''deliverance'' is possible but somewhat narrower.'
- source_word: χαρὰ
  chosen: joy
  alternatives:
  - gladness
  lexicon: BDAG
  rationale: '''Joy'' is the most direct and natural equivalent.'
- source_word: παρὰ τοῦ ἁγίου
  chosen: from the Holy One
  alternatives:
  - from the Holy
  lexicon: LSJ
  rationale: The articular adjective functions as a divine title. 'The Holy One' is
    idiomatic and preserves the personal reference to God.
- source_word: ἐπὶ τῇ ἐλεημοσύνῃ
  chosen: because of the mercy
  alternatives:
  - at the mercy
  - over the mercy
  - because of the act of mercy
  lexicon: BDAG
  rationale: Here ἐπὶ with the dative gives the basis or occasion for joy. ἐλεημοσύνη
    can mean mercy, almsgiving, or charitable deed, but in this context of divine
    rescue the sense is God's merciful action, not human almsgiving.
- source_word: ἐν τάχει
  chosen: quickly
  alternatives:
  - soon
  - in haste
  lexicon: BDAG
  rationale: '''Quickly'' preserves the adverbial force and the expectation of nearness
    without sounding colloquial.'
- source_word: τοῦ αἰωνίου σωτῆρος ὑμῶν
  chosen: your eternal Savior
  alternatives:
  - your Savior, the Eternal One
  - your everlasting savior
  lexicon: BDAG/LSJ
  rationale: The Greek most naturally reads αἰωνίου as modifying σωτῆρος within the
    genitive phrase. 'Your eternal Savior' preserves that syntax and keeps the title
    personal and reverent.
