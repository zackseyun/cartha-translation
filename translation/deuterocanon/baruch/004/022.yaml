theological_decisions:
- issue: Rendering divine titles αἰώνιος and ὁ ἅγιος
  chosen_reading: the Eternal One / the Holy One
  alternative_readings:
  - the Eternal / the Holy
  rationale: Both adjectives are articular and function as divine titles. Adding 'One'
    in English avoids awkwardness and preserves the personal reference without importing
    extra theology.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
- issue: Sense of ἐλεημοσύνη in relation to God
  chosen_reading: mercy
  alternative_readings:
  - almsgiving
  - charitable deed
  rationale: Although ἐλεημοσύνη often refers to almsgiving, the immediate context
    speaks of salvation coming from God. Therefore the term is best understood as
    divine mercy or merciful action rather than human charity.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
