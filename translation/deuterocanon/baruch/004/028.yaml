    of Jeremiah handled separately as LJE.
translation:
  text: For just as your mind was set on going astray from God, so, as you return,
    seek him ten times more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seek him tenfold as you return.' The Greek literally says 'make [it]
      tenfold, returning to seek him,' with the intensified object implied by context.
    reason: lexical_alternative
lexical_decisions:
- source_word: διάνοια
  chosen: mind
  alternatives:
  - understanding
  - thought
  - way of thinking
  lexicon: BDAG
  rationale: διάνοια commonly denotes the mind or understanding. 'Mind' is the most
    natural modern English rendering here and preserves the focus on the people's
    inward disposition rather than merely an isolated thought.
- source_word: ἐγένετο
  chosen: came to
  alternatives:
  - became
  - was
  lexicon: BDAG
  rationale: With ἡ διάνοια ὑμῶν and the infinitive construction, ἐγένετο conveys
    a resulting state or development. 'Came to' idiomatically captures this movement
    into a condition without sounding wooden.
- source_word: εἰς τὸ πλανηθῆναι
  chosen: to go astray
  alternatives:
  - to be led astray
  - to wander
  lexicon: BDAG
  rationale: πλανηθῆναι can mean to wander or go astray. 'Go astray' fits the religious
    context of deviation from God and is standard, clear English. The passive nuance
    ('be led astray') is possible, but the broader sense of straying is sufficient
    here.
- source_word: ἀπὸ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - away from God
  lexicon: BDAG
  rationale: The preposition ἀπό marks separation. 'From God' is concise and natural;
    the sense of alienation is already conveyed by 'go astray.'
- source_word: δεκαπλασιάσατε
  chosen: seek him ten times more
  alternatives:
  - multiply it tenfold
  - redouble your effort ten times
  - seek him tenfold
  lexicon: LSJ
  rationale: The verb literally means 'make tenfold' or 'multiply by ten.' In context
    it modifies the returning pursuit of God. English requires making explicit what
    is intensified; 'seek him ten times more' communicates the idiomatic force clearly
    while remaining anchored to the Greek.
- source_word: ἐπιστρέφοντες
  chosen: as you return
  alternatives:
  - returning
  - when you turn back
  lexicon: BDAG
  rationale: ἐπιστρέφοντες is a participle indicating the manner or circumstance of
    the imperative. 'As you return' preserves the ongoing or attendant sense and keeps
    the repentance/turning-back motif clear.
- source_word: ζητῆσαι
  chosen: seek him
  alternatives:
  - to seek him
  - look for him
  lexicon: BDAG
  rationale: ζητέω in religious contexts often means to seek God. 'Seek him' is the
    standard and appropriately weighty rendering; 'look for him' would sound too casual.
