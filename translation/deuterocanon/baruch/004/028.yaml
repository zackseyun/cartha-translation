id: BAR.4.28
reference: Baruch 4:28
source:
  edition: lxx-swete-1909
  text: ὥσπερ γὰρ ἐγένετο ἡ διάνοια ὑμῶν εἰς τὸ πλανηθῆναι ἀπὸ τοῦ θεοῦ, δεκαπλασιάσατε
    ἐπιστρέφοντες ζητῆσαι αὐτόν.
  language: Greek
  pages:
  - 381
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
