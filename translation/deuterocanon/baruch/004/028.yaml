theological_decisions:
- issue: How to express the idiom δεκαπλασιάσατε in relation to repentance and renewed
    devotion
  chosen_reading: 'Render the command as intensified seeking: ''seek him ten times
    more.'''
  alternative_readings:
  - '''multiply your seeking tenfold'''
  - '''seek him tenfold as you return'''
  rationale: 'The Greek imperative is elliptical in English, since the object of multiplication
    is implied by the participial and infinitival phrase. The chosen rendering makes
    the implied sense explicit without adding doctrinal content: after straying from
    God, the people are urged to seek him with greatly increased earnestness.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning in readable modern English.'
