translation:
  text: Go, children, go, for I have been left desolate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Walk, children, walk'; the Greek verb is literally 'walk,' used here
      as an urgent command to depart.
    reason: lexical_alternative
  - marker: b
    text: Or 'for I have been left alone' or 'left deserted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βαδίζετε
  chosen: Go
  alternatives:
  - Walk
  - Proceed
  lexicon: BDAG
  rationale: The imperative of βαδίζω is literally 'walk,' but in direct address urging
    departure, idiomatic English 'Go' best conveys the command without woodenness.
    The repetition is preserved for emphasis.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - little children
  lexicon: BDAG
  rationale: τέκνα is a broad familial term meaning 'children,' not specifically male
    'sons.' 'Children' preserves the maternal address in context.
- source_word: κατελείφθην
  chosen: I have been left
  alternatives:
  - I was left
  - I have been abandoned
  lexicon: BDAG
  rationale: The passive indicates being left behind. 'I have been left' preserves
    the resultant state and avoids overstating the verb as 'abandoned,' which is interpretive
    though contextually possible.
- source_word: ἔρημος
  chosen: desolate
  alternatives:
  - alone
  - forsaken
  - deserted
  lexicon: BDAG
  rationale: ἔρημος can denote deserted, solitary, or desolate. 'Desolate' captures
    both the loneliness and the devastated condition of the speaker better than the
    narrower 'alone.'
