theological_decisions:
- issue: Referent of the feminine subject throughout the verse
  chosen_reading: Render with feminine pronouns ('she,' 'her') without specifying
    the nation in the main text.
  alternative_readings:
  - Explicitly identify the subject as Babylon or the enemy city in translation
  rationale: The Greek uses feminine singular verbs and pronouns, likely referring
    back to the hostile city/nation in context. Keeping the pronouns preserves the
    source wording and avoids importing an identification into the verse itself beyond
    what the immediate Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
