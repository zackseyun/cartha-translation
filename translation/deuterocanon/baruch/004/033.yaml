id: BAR.4.33
reference: Baruch 4:33
source:
  edition: lxx-swete-1909
  text: ὥσπερ γὰρ ἐχάρη ἐπὶ τῇ σῇ πτώσει καὶ εὐφράνθη ἐπὶ τῷ πτώματί σου, οὕτως λυπηθήσεται
    ἐπὶ τῇ ἑαυτῆς ἐρημίᾳ.
  language: Greek
  pages:
  - 382
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: For just as she rejoiced over your fall and was glad over your downfall, so
    she will grieve over her own desolation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The feminine 'she' likely refers to the hostile city or nation addressed
      in the surrounding context, traditionally understood as Babylon.
    reason: cross_reference
  - marker: b
    text: Or 'ruin' for 'downfall' (Greek πτῶματί); the term here refers to calamity,
      not a literal corpse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ ... οὕτως
  chosen: For just as ... so
  alternatives:
  - just as ... so
  - as ... so
  lexicon: LSJ
  rationale: Preserves the explicit comparative structure and the explanatory force
    of γάρ at the start of the sentence.
- source_word: ἐχάρη
  chosen: rejoiced
  alternatives:
  - was glad
  - took joy
  lexicon: BDAG
  rationale: A straightforward rendering of the aorist passive/deponent sense of χαίρω
    here, matching the emotional response to Zion's calamity.
- source_word: πτώσει
  chosen: fall
  alternatives:
  - collapse
  - ruin
  lexicon: LSJ
  rationale: πτῶσις can denote a fall or downfall. 'Fall' keeps the metaphor concise,
    while the following phrase supplies a near-synonymous intensification.
- source_word: εὐφράνθη
  chosen: was glad
  alternatives:
  - rejoiced
  - celebrated
  lexicon: BDAG
  rationale: Using 'was glad' avoids flattening both verbs into the same English wording
    and preserves the paired but distinct expressions of malicious joy.
- source_word: πτώματί
  chosen: downfall
  alternatives:
  - fall
  - ruin
  - corpse
  lexicon: LSJ
  rationale: Although πτῶμα can mean 'corpse' in some contexts, here the parallel
    with πτῶσις and the preposition ἐπί with a calamity context strongly favor 'downfall'
    or 'ruin.' 'Downfall' preserves the semantic link to 'fall' while avoiding an
    implausible bodily sense.
- source_word: λυπηθήσεται
  chosen: will grieve
  alternatives:
  - will be grieved
  - will sorrow
  lexicon: BDAG
  rationale: Future passive/deponent sense is best expressed idiomatically as 'will
    grieve,' indicating the coming reversal of fortune.
- source_word: ἐρημίᾳ
  chosen: desolation
  alternatives:
  - wasteland
  - desertion
  - ruin
  lexicon: LSJ
  rationale: In judgment language, ἐρημία commonly denotes devastation or desolation
    rather than a literal wilderness. 'Desolation' fits the prophetic tone and the
    context of national ruin.
- source_word: ἑαυτῆς
  chosen: her own
  alternatives:
  - her
  - herself's
  lexicon: BDAG
  rationale: The reflexive pronoun marks that the desolation will be her own in reversal
    of her earlier joy over another's calamity.
