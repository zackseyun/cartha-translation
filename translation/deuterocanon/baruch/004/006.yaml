theological_decisions:
- issue: Nature of Israel's exile/judgment
  chosen_reading: The verse states that being sold to the nations was not for final
    destruction, but as a consequence of provoking God to anger, resulting in being
    handed over to adversaries.
  alternative_readings:
  - The exile was not for annihilation but for disciplinary judgment.
  - The language may be read rhetorically rather than as a full doctrine of exile.
  rationale: The Greek explicitly contrasts 'not for destruction' with the causal
    clause 'because you provoked God to anger.' The translation preserves that theological
    tension without expanding it into a fuller doctrine than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
