id: BAR.4.6
reference: Baruch 4:6
source:
  edition: lxx-swete-1909
  text: ἐπράθητε τοῖς ἔθνεσιν οὐκ εἰς ἀπώλειαν, διὰ δὲ τὸ παροργίσαι ὑμᾶς τὸν θεόν,
    παρεδόθητε τοῖς ὑπεναντίοις.
  language: Greek
  pages:
  - 380
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: You were sold to the nations, not for destruction; but because you provoked
    God to anger, you were handed over to your adversaries.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπράθητε
  chosen: you were sold
  alternatives:
  - you were sold off
  lexicon: BDAG
  rationale: Aorist passive of πιπράσκω, denoting being sold. 'You were sold' preserves
    the metaphor of being given into foreign power without overinterpreting the mechanism.
- source_word: τοῖς ἔθνεσιν
  chosen: to the nations
  alternatives:
  - to the Gentiles
  - to the peoples
  lexicon: BDAG
  rationale: ἔθνη in this exilic/judgment context refers to foreign nations. 'Nations'
    is the most transparent and least theologically loaded rendering here; 'Gentiles'
    would import later Jewish/Christian usage.
- source_word: οὐκ εἰς ἀπώλειαν
  chosen: not for destruction
  alternatives:
  - not for ruin
  - not for annihilation
  lexicon: BDAG
  rationale: The preposition εἰς with ἀπώλεια expresses result/purpose. 'Not for destruction'
    is natural English and preserves the sense that exile was not intended as final
    obliteration.
- source_word: διὰ δὲ τὸ παροργίσαι
  chosen: but because you provoked ... to anger
  alternatives:
  - but because of your provoking ... to anger
  - but because you angered
  lexicon: BDAG
  rationale: 'The articular infinitive with διά gives causal force: ''because.'' παροργίζω
    intensifies angering/provoking. ''Provoked ... to anger'' best reflects the verbal
    force and keeps the object explicit.'
- source_word: τὸν θεόν
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: The accusative object of παροργίσαι is definite in Greek, but idiomatic
    English omits the article with 'God' in this context.
- source_word: παρεδόθητε
  chosen: you were handed over
  alternatives:
  - you were delivered over
  - you were given over
  lexicon: BDAG
  rationale: Passive of παραδίδωμι. 'Handed over' is idiomatic modern English and
    preserves the judicial/judgment nuance of being surrendered to another's power.
- source_word: τοῖς ὑπεναντίοις
  chosen: to your adversaries
  alternatives:
  - to the enemies
  - to those opposed to you
  lexicon: LSJ
  rationale: ὑπεναντίος denotes one set against another, an opponent or adversary.
    'Adversaries' captures the oppositional sense more precisely than the broader
    'enemies.'
