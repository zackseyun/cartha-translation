translation:
  text: For the one who brought these evils upon you will bring you everlasting gladness
    with your salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eternal joy.' The Greek εὐφροσύνη can be rendered 'gladness' or 'joy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with your deliverance.' The Greek σωτηρία can mean 'salvation' or 'deliverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγαγὼν
  chosen: brought ... upon
  alternatives:
  - brought
  - caused to come upon
  - inflicted
  lexicon: BDAG
  rationale: Aorist participle of ἐπάγω in a causative sense. 'Brought ... upon' preserves
    the idiom and the relation to the future ἐπάξει later in the verse.
- source_word: τὰ κακὰ
  chosen: these evils
  alternatives:
  - the evils
  - these troubles
  - these calamities
  lexicon: BDAG
  rationale: κακά can denote evils, troubles, or calamities. 'Evils' is the more direct
    lexical rendering, while 'these' is supplied naturally in English to point back
    to the sufferings just mentioned in context without over-paraphrasing.
- source_word: ἐπάξει
  chosen: will bring
  alternatives:
  - will bring upon
  - will cause to come
  - will lead
  lexicon: BDAG
  rationale: 'Future of the same verb as ἐπαγαγών. Rendering both with ''bring'' preserves
    the deliberate verbal parallel: the same one who brought calamity will bring joy.'
- source_word: τὴν αἰώνιον εὐφροσύνην
  chosen: everlasting gladness
  alternatives:
  - eternal joy
  - everlasting joy
  - perpetual gladness
  lexicon: BDAG
  rationale: εὐφροσύνη is gladness, joy, or rejoicing. 'Gladness' keeps a slightly
    more concrete and affective sense than the broader 'joy,' while αἰώνιον is naturally
    'everlasting' here.
- source_word: μετὰ τῆς σωτηρίας ὑμῶν
  chosen: with your salvation
  alternatives:
  - together with your deliverance
  - along with your salvation
  lexicon: BDAG
  rationale: σωτηρία can mean salvation or deliverance. In this context of restoration
    after judgment, 'salvation' preserves the theological weight while remaining faithful
    to the Greek.
