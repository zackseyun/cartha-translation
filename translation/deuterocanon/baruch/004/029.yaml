theological_decisions:
- issue: Agency of judgment and restoration
  chosen_reading: The same divine agent who brought calamity is said to bring everlasting
    gladness and salvation.
  alternative_readings:
  - A more softened rendering could obscure direct divine agency in the calamity.
  rationale: The Greek explicitly attributes both actions to 'the one who brought'
    and 'will bring.' The translation preserves this theological tension rather than
    softening the first clause.
