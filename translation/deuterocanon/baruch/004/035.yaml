theological_decisions:
- issue: Rendering the divine title τοῦ αἰωνίου
  chosen_reading: the Everlasting One
  alternative_readings:
  - the Eternal One
  - the everlasting God
  rationale: The Greek uses a substantive adjective rather than an explicit noun for
    God. The chosen rendering preserves the title-like force and divine referent without
    adding words absent from the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
- issue: Sense of δαιμόνια in a judgment oracle
  chosen_reading: demons
  alternative_readings:
  - evil spirits
  rationale: The context is post-destruction habitation of a ruined city by malevolent
    beings. 'Demons' best matches the theological and lexical force in standard Jewish-Greek
    usage.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception.'
