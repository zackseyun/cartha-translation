id: BAR.4.35
reference: Baruch 4:35
source:
  edition: lxx-swete-1909
  text: πῦρ γὰρ ἐπελεύσεται αὐτῇ παρὰ τοῦ αἰωνίου εἰς ἡμέρας μακράς, καὶ κατοικηθήσεται
    ὑπὸ δαιμονίων τὸν πλεῖονα χρόνον.
  language: Greek
  pages:
  - 382
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
