translation:
  text: For fire will come upon her from the Everlasting One for many days, and for
    a very long time she will be inhabited by demons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the Eternal One.' The Greek has a substantive adjective, literally
      'from the everlasting [one],' used here as a divine title.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῦρ
  chosen: fire
  alternatives:
  - a fire
  lexicon: BDAG
  rationale: The noun is anarthrous and straightforward; 'fire' best preserves the
    image of divine judgment without unnecessary expansion.
- source_word: ἐπελεύσεται
  chosen: will come upon
  alternatives:
  - will come
  - will overtake
  - will attack
  lexicon: BDAG
  rationale: The future middle of ἐπέρχομαι here conveys something coming upon the
    city in judgment. 'Will come upon' is natural English and preserves the hostile
    force better than the flatter 'will come'.
- source_word: αὐτῇ
  chosen: her
  alternatives:
  - it
  lexicon: BDAG
  rationale: The referent is the city, grammatically feminine in Greek and personified
    in context. 'Her' preserves the personification better than impersonal 'it'.
- source_word: παρὰ τοῦ αἰωνίου
  chosen: from the Everlasting One
  alternatives:
  - from the Eternal One
  - from the everlasting God
  - from the Eternal
  lexicon: BDAG
  rationale: τοῦ αἰωνίου functions substantivally, referring to God. 'The Everlasting
    One' preserves the adjectival force and avoids importing 'God' where the Greek
    does not explicitly supply it, while still making the divine referent clear.
- source_word: εἰς ἡμέρας μακράς
  chosen: for many days
  alternatives:
  - for long days
  - for a long time
  lexicon: BDAG
  rationale: This idiom expresses duration. 'For many days' is a natural English rendering
    that stays close to the Greek wording.
- source_word: κατοικηθήσεται
  chosen: will be inhabited
  alternatives:
  - will be dwelt in
  - will be occupied
  lexicon: BDAG
  rationale: The future passive indicates the city as the place inhabited. 'Will be
    inhabited' is the clearest idiomatic equivalent.
- source_word: δαιμονίων
  chosen: demons
  alternatives:
  - evil spirits
  - divine beings
  lexicon: BDAG
  rationale: In this Jewish-Greek judgment context, δαιμόνια refers to hostile spiritual
    beings, not neutral lesser deities. 'Demons' is the standard and clearest rendering.
- source_word: τὸν πλεῖονα χρόνον
  chosen: for a very long time
  alternatives:
  - for most of the time
  - for the longer time
  - for a long duration
  lexicon: BDAG
  rationale: The phrase is idiomatic for an extended period. 'For a very long time'
    communicates the sense of prolonged desolation more naturally than a wooden rendering.
