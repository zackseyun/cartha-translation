id: BAR.4.11
reference: Baruch 4:11
source:
  edition: lxx-swete-1909
  text: ἔθρεψα γὰρ αὐτοὺς μετʼ εὐφροσύνης, ἐξαπέστειλα δὲ μετὰ κλαυθμοῦ καὶ πένθους.
  language: Greek
  pages:
  - 380
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: For I nourished them with gladness, but I sent them away with weeping and
    mourning.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔθρεψα
  chosen: I nourished
  alternatives:
  - I fed
  - I raised
  lexicon: BDAG
  rationale: τρέφω can mean to feed, nourish, or rear. 'Nourished' preserves both
    the provision and parental-care nuance in context better than the narrower 'fed'
    or the more interpretive 'raised'.
- source_word: μετʼ εὐφροσύνης
  chosen: with gladness
  alternatives:
  - with joy
  - in gladness
  lexicon: BDAG
  rationale: εὐφροσύνη denotes joy, gladness, or festivity. 'With gladness' is natural
    English and keeps the instrumental/accompanying force of μετά.
- source_word: ἐξαπέστειλα
  chosen: I sent them away
  alternatives:
  - I sent out
  - I dismissed
  lexicon: BDAG
  rationale: The compound verb intensifies simple sending and in this context refers
    to their departure from the speaker. 'Sent them away' best captures the separation
    implied by the context of loss and exile.
- source_word: μετὰ κλαυθμοῦ
  chosen: with weeping
  alternatives:
  - with crying
  - amid weeping
  lexicon: BDAG
  rationale: κλαυθμός is weeping or lamenting. 'With weeping' is idiomatic and parallels
    the earlier phrase 'with gladness'.
- source_word: πένθους
  chosen: mourning
  alternatives:
  - grief
  - lamentation
  lexicon: BDAG
  rationale: πένθος denotes mourning, especially grief expressed over loss. 'Mourning'
    pairs well with 'weeping' and preserves the emotional and ritual weight of the
    term.
