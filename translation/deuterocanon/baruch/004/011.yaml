theological_decisions:
- issue: Speaker's maternal voice and exile context
  chosen_reading: The first-person verbs are rendered straightforwardly without adding
    explanatory material, allowing the speaker's grief over the children's departure
    to remain implicit.
  alternative_readings:
  - Expanding the line to make exile explicit in the main text
  rationale: The Greek states the emotional contrast directly but does not explicitly
    restate exile in this verse. The translation preserves the pathos without importing
    additional interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; never paraphrase
    beyond what the source text warrants.
