translation:
  text: This is the book of the commandments of God, and the law that endures forever;
    all who hold fast to it are for life, but those who forsake it will die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all who hold fast to it will live.' The Greek reads literally 'all who
      hold fast to it, for life,' an elliptical expression contrasting with 'those
      who forsake it will die.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βίβλος
  chosen: book
  alternatives:
  - scroll
  lexicon: LSJ
  rationale: The ordinary sense is a written book/document. 'Book' is the most natural
    modern English rendering and fits the idiom 'book of the commandments.'
- source_word: προσταγμάτων
  chosen: commandments
  alternatives:
  - orders
  - injunctions
  - precepts
  lexicon: LSJ
  rationale: πρόσταγμα denotes an authoritative command or ordinance. 'Commandments'
    best conveys divine authority and matches the religious-legal context alongside
    νόμος.
- source_word: νόμος
  chosen: law
  alternatives:
  - instruction
  lexicon: LSJ
  rationale: In this context νόμος refers to God's binding law. 'Law' preserves the
    covenantal and legal force more clearly than the broader 'instruction.'
- source_word: ὁ ὑπάρχων εἰς τὸν αἰῶνα
  chosen: that endures forever
  alternatives:
  - which exists forever
  - which remains forever
  lexicon: LSJ
  rationale: The participle ὑπάρχων with εἰς τὸν αἰῶνα expresses continuing existence/permanence.
    'Endures forever' is idiomatic English that preserves the sense of abiding validity.
- source_word: κρατοῦντες
  chosen: hold fast to
  alternatives:
  - grasp
  - cling to
  - keep hold of
  lexicon: LSJ
  rationale: κρατέω can mean seize, hold, or retain firmly. Here the metaphorical
    sense is steadfast adherence to the law; 'hold fast to' communicates active, faithful
    attachment.
- source_word: εἰς ζωὴν
  chosen: are for life
  alternatives:
  - will live
  - lead to life
  - for life
  lexicon: LSJ
  rationale: The Greek is elliptical, literally 'into/for life.' Rather than over-resolving
    it into a finite verb, 'are for life' preserves the concise antithesis with the
    following 'will die' while remaining intelligible in English.
- source_word: καταλείποντες
  chosen: forsake
  alternatives:
  - leave behind
  - abandon
  - neglect
  lexicon: LSJ
  rationale: The verb means leave behind or abandon. 'Forsake' best captures deliberate
    abandonment of God's law in elevated but still readable English.
- source_word: ἀποθανοῦνται
  chosen: will die
  alternatives:
  - shall die
  lexicon: LSJ
  rationale: Simple future of ἀποθνῄσκω. 'Will die' is clear modern English and preserves
    the stark warning.
