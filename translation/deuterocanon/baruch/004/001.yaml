theological_decisions:
- issue: Whether to render the final contrast in a more interpretive way ('will have
    life' / 'will perish') or preserve the life/death antithesis of the Greek
  chosen_reading: Preserved the explicit contrast 'are for life ... will die.'
  alternative_readings:
  - all who hold fast to it will live, but those who leave it will die
  - all who cling to it attain life, but those who abandon it perish
  rationale: The verse presents Torah as the path of life over against death. The
    Greek explicitly names ζωή and ἀποθανοῦνται; the translation keeps that theological
    polarity without softening 'die' to 'perish' or over-paraphrasing the first clause.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Whether νόμος here should be broadened to 'teaching' to avoid legal overtones
  chosen_reading: Rendered νόμος as 'law.'
  alternative_readings:
  - instruction
  - teaching
  rationale: The immediate parallel with 'commandments of God' indicates binding divine
    commands, not merely general wisdom teaching. 'Law' best preserves the text's
    theological claim about enduring divine normativity.
  doctrine_reference: Translation philosophy §§1, 5
