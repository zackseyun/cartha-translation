  text: ἐπελάθεσθε τὸν τροφεύσαντα ὑμᾶς θεὸν αἰώνιον, ἐλυπήσατε δὴ καὶ τὴν ἐκθρέψασαν
    ὑμᾶς Ἰερουσαλήμ.
  language: Greek
