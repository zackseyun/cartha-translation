theological_decisions:
- issue: Personification of Jerusalem as maternal caregiver
  chosen_reading: Retain the personification explicitly with 'Jerusalem, who reared
    you'
  alternative_readings:
  - Jerusalem that reared you
  - your mother Jerusalem
  rationale: The feminine participle ἐκθρέψασαν presents Jerusalem as a personal,
    maternal figure. The translation preserves this imagery without adding 'mother,'
    which the Greek does not explicitly state.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering of divine epithet αἰώνιον
  chosen_reading: the eternal God
  alternative_readings:
  - the everlasting God
  rationale: Both are viable, but 'eternal' is more idiomatic in contemporary English
    while preserving the theological claim of God's enduring nature.
  doctrine_reference: Translation philosophy §6
