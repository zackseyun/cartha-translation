translation:
  text: You forgot the eternal God who nourished you; you also grieved Jerusalem,
    who reared you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπελάθεσθε
  chosen: You forgot
  alternatives:
  - You neglected
  - You became forgetful of
  lexicon: BDAG
  rationale: Aorist middle of ἐπιλανθάνομαι means to forget or lose remembrance of.
    'Forgot' is the plain, idiomatic English rendering and preserves the accusatory
    force.
- source_word: τὸν τροφεύσαντα
  chosen: who nourished
  alternatives:
  - who fed
  - who brought you up
  lexicon: LSJ
  rationale: The participle from τροφεύω denotes nourishing or rearing. 'Nourished'
    keeps the parental/caregiving sense without narrowing it merely to physical feeding.
- source_word: θεὸν αἰώνιον
  chosen: the eternal God
  alternatives:
  - God everlasting
  - the everlasting God
  lexicon: LSJ
  rationale: αἰώνιος here functions attributively with θεόν. 'The eternal God' is
    natural modern English and preserves the divine attribute.
- source_word: ἐλυπήσατε
  chosen: you grieved
  alternatives:
  - you saddened
  - you caused sorrow to
  lexicon: BDAG
  rationale: λυπέω commonly means to cause grief or sorrow. 'Grieved' is concise and
    carries the emotional and covenantal weight of the charge.
- source_word: δὴ καὶ
  chosen: you also
  alternatives:
  - indeed also
  - and moreover
  lexicon: LSJ
  rationale: δὴ adds emphasis, while καί adds inclusion. In smooth English, 'also'
    captures the additive force; the emphatic nuance is sufficiently conveyed by the
    sentence's structure.
- source_word: τὴν ἐκθρέψασαν
  chosen: who reared
  alternatives:
  - who brought up
  - who raised
  lexicon: LSJ
  rationale: From ἐκτρέφω, 'to rear/bring up.' 'Reared' pairs well with 'nourished'
    while distinguishing the second maternal image from the first.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Proper name transliterated per project philosophy. In context Jerusalem
    is personified as a mother/city.
