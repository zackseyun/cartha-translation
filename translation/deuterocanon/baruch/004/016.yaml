translation:
  text: And they carried away the widow’s beloved ones, and from among her daughters
    they left her desolate and alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they made the widow desolate as the only one left from among her daughters.'
      The Greek τὴν μόνην may be taken more literally as 'the only one,' though the
      sense is that she was left alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγαγον
  chosen: carried away
  alternatives:
  - led away
  - took away
  lexicon: BDAG
  rationale: The verb denotes taking persons away, often into captivity or removal.
    'Carried away' fits the context of bereavement and exile without over-specifying
    the manner.
- source_word: τοὺς ἀγαπητοὺς
  chosen: the beloved ones
  alternatives:
  - the loved ones
  - the dear ones
  lexicon: LSJ
  rationale: The adjective used substantivally refers to those who are loved. 'Beloved
    ones' preserves the emotional force and plural reference.
- source_word: τῆς χήρας
  chosen: the widow’s
  alternatives:
  - of the widow
  lexicon: BDAG
  rationale: The genitive is naturally rendered possessively in English. In context
    the widow is personified Jerusalem/Zion, but the metaphor should remain in the
    text rather than be interpreted away.
- source_word: ἀπὸ τῶν θυγατέρων
  chosen: from among her daughters
  alternatives:
  - from her daughters
  - of her daughters
  lexicon: LSJ
  rationale: The preposition ἀπό with the genitive here is best represented as separation
    from a group. 'From among her daughters' makes the partitive/separative sense
    clear.
- source_word: τὴν μόνην
  chosen: alone
  alternatives:
  - the only one
  - solitary
  lexicon: BDAG
  rationale: Although literally 'the only/alone one,' in this clause it functions
    predicatively with ἠρήμωσαν to describe the widow's resulting state. 'Alone' is
    idiomatic and conveys the sense of bereft isolation better than the stiffer 'the
    only one.'
- source_word: ἠρήμωσαν
  chosen: they left her desolate
  alternatives:
  - they made her desolate
  - they devastated her
  lexicon: LSJ
  rationale: The verb means to make desolate or lay waste. Because the object implied
    is the widow, 'left her desolate' captures the resultant condition in natural
    English while preserving the severity.
