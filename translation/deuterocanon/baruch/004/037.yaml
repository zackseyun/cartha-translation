id: BAR.4.37
reference: Baruch 4:37
source:
  edition: lxx-swete-1909
  text: ἰδοὺ ἔρχονται οἱ υἱοί σου οὓς ἐξαπέστειλας, ἔρχονται συνηγμένοι ἀπʼ ἀνατολῶν
    ἕως δυσμῶν τῷ ῥήματι τοῦ ἁγίου, χαίροντες τῇ τοῦ θεοῦ δόξῃ. V
  language: Greek
  pages:
  - 382
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
