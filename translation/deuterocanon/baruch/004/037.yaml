translation:
  text: Look, your sons are coming, whom you sent away; they are coming, gathered
    from east to west at the word of the Holy One, rejoicing in the glory of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the word of the Holy One.' The dative τῷ ῥήματι may be taken instrumentally
      ('by') or as responsive command ('at').
    reason: lexical_alternative
  - marker: b
    text: Or 'rejoicing at the glory of God.' The dative with 'rejoicing' can be rendered
      in more than one natural way in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: LSJ
  rationale: Introduces the scene with an attention-getting particle. 'Look' preserves
    the force in readable modern English better than the more archaic 'Behold.'
- source_word: οἱ υἱοί σου
  chosen: your sons
  alternatives:
  - your children
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural 'sons.' Per gender-accurate
    philosophy, the masculine form is retained rather than neutralized to 'children,'
    though the referent is the exiled offspring of Jerusalem more broadly.
- source_word: ἐξαπέστειλας
  chosen: you sent away
  alternatives:
  - you sent out
  - you dismissed
  lexicon: LSJ
  rationale: The compound verb conveys sending forth/away. 'Sent away' fits the exile
    context and reads naturally in English.
- source_word: συνηγμένοι
  chosen: gathered
  alternatives:
  - assembled
  - brought together
  lexicon: LSJ
  rationale: Perfect/passive sense indicates they come as those who have been gathered
    together. 'Gathered' is concise and preserves the restoration motif.
- source_word: ἀπʼ ἀνατολῶν ἕως δυσμῶν
  chosen: from east to west
  alternatives:
  - from the east to the west
  - from the rising of the sun to its setting
  lexicon: LSJ
  rationale: This idiom marks the full geographic span. 'From east to west' is natural
    English and preserves the merism without unnecessary expansion.
- source_word: τῷ ῥήματι
  chosen: at the word
  alternatives:
  - by the word
  - at the command
  lexicon: LSJ
  rationale: The dative can express means or basis. 'At the word' captures the sense
    of divine utterance/command prompting the gathering while remaining close to the
    Greek.
- source_word: τοῦ ἁγίου
  chosen: the Holy One
  alternatives:
  - the Holy
  - the Holy God
  lexicon: LSJ
  rationale: The genitive with article functions substantivally. 'The Holy One' is
    idiomatic English and preserves the reverential divine title without over-specifying
    beyond the Greek.
- source_word: χαίροντες
  chosen: rejoicing
  alternatives:
  - being glad
  - joyful
  lexicon: LSJ
  rationale: The participle describes their manner as they come. 'Rejoicing' preserves
    the verbal force and links naturally with the following phrase.
- source_word: τῇ τοῦ θεοῦ δόξῃ
  chosen: in the glory of God
  alternatives:
  - at the glory of God
  - because of the glory of God
  lexicon: LSJ
  rationale: The dative after χαίρω can indicate the object or occasion of rejoicing.
    'In the glory of God' is a natural rendering that keeps the close association
    between their joy and God's manifested glory.
