translation:
  text: And I will take away from her the rejoicing of her many people, and her pride
    into mourning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rejoicing of her great multitude.' The Greek phrase can point either
      to her populousness itself or to the joy arising from it.
    reason: lexical_alternative
  - marker: b
    text: Or 'her haughtiness into mourning' or 'her splendor into mourning.' The
      Greek term can carry the sense of proud display as well as pride.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιελῶ
  chosen: I will take away
  alternatives:
  - I will remove
  - I will strip away
  lexicon: LSJ
  rationale: Future of περιαιρέω; the sense is removal or taking away. 'Take away'
    is natural English and preserves the direct divine action.
- source_word: ἀγαλλίαμα
  chosen: rejoicing
  alternatives:
  - exultation
  - gladness
  lexicon: LSJ
  rationale: Denotes joyful exultation. 'Rejoicing' is idiomatic and retains the emotional
    force without sounding archaic.
- source_word: τῆς πολυοχλίας
  chosen: of her many people
  alternatives:
  - of her great multitude
  - caused by her crowds
  lexicon: LSJ
  rationale: πολυοχλία refers to a great multitude or populousness. The genitive most
    naturally qualifies the source or basis of the rejoicing. 'Of her many people'
    communicates that her joy derives from her populous condition.
- source_word: ἀγαυρίαμα
  chosen: pride
  alternatives:
  - boastfulness
  - haughtiness
  - splendor
  lexicon: LSJ
  rationale: The noun can denote exultant pride or haughty display. In parallel with
    the removal of rejoicing and the movement into mourning, 'pride' best captures
    the city's self-exalting glory without overinterpreting as purely visual splendor.
- source_word: εἰς πένθος
  chosen: into mourning
  alternatives:
  - to mourning
  - for mourning
  lexicon: LSJ
  rationale: The phrase marks transformation or result. The verb 'take away' is carried
    over elliptically from the first clause, so 'her pride into mourning' preserves
    the Greek compression while remaining intelligible in English.
