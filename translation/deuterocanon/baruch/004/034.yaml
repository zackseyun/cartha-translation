theological_decisions:
- issue: Elliptical second clause lacking an explicit repeated verb
  chosen_reading: 'Supply the sense of the first clause in translation while preserving
    the compressed structure: ''and her pride into mourning.'''
  alternative_readings:
  - Expand fully as 'and turn her pride into mourning'
  - Expand as 'and I will take away her pride and turn it into mourning'
  rationale: The Greek omits the second verb, relying on parallelism. A restrained
    English rendering keeps the terseness of the source while still conveying the
    transformation implied by εἰς πένθος.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without unnecessary paraphrase.'
