translation:
  text: For just as the neighbors of Zion have now seen your captivity, so they will
    soon see the salvation from your God that will come upon you with great glory
    and the splendor of the Eternal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance' for 'salvation.' The Greek σωτηρία can denote rescue or
      deliverance as well as salvation.
    reason: lexical_alternative
  - marker: b
    text: Or 'the everlasting One' for 'the Eternal.' The Greek has the substantive
      adjective τοῦ αἰωνίου.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πάροικοι Σειὼν
  chosen: the neighbors of Zion
  alternatives:
  - those dwelling near Zion
  - the sojourners of Zion
  - the inhabitants around Zion
  lexicon: LSJ
  rationale: πάροικοι literally denotes those dwelling beside or near, sometimes resident
    aliens. In this context it most naturally refers to surrounding peoples who observe
    Zion's condition, so 'neighbors of Zion' is clear modern English without over-specifying
    legal status.
- source_word: αἰχμαλωσίαν
  chosen: captivity
  alternatives:
  - exile
  - being taken captive
  lexicon: LSJ
  rationale: The noun denotes captivity or the state of being carried off. 'Captivity'
    preserves the concrete sense of being taken by enemies better than the somewhat
    broader 'exile,' though exile is contextually related.
- source_word: ἐν τάχει
  chosen: soon
  alternatives:
  - quickly
  - in haste
  - before long
  lexicon: LSJ
  rationale: The idiom means in a short time or quickly. 'Soon' fits natural English
    in this future-oriented promise while preserving temporal nearness.
- source_word: σωτηρίαν
  chosen: salvation
  alternatives:
  - deliverance
  - rescue
  lexicon: LSJ
  rationale: σωτηρία can mean rescue or deliverance, but 'salvation' preserves the
    theological weight of God's saving act in this context. The immediate context
    is national restoration, yet the broader biblical register supports 'salvation'
    as the main rendering.
- source_word: παρὰ τοῦ θεοῦ ὑμῶν
  chosen: from your God
  alternatives:
  - from God, your God
  - from the side of your God
  lexicon: LSJ
  rationale: παρά with genitive here indicates source or origin. 'From your God' is
    the most direct and idiomatic rendering.
- source_word: ἐπελεύσεται ὑμῖν
  chosen: will come upon you
  alternatives:
  - will come to you
  - will overtake you
  lexicon: LSJ
  rationale: The verb ἐπέρχομαι commonly means come upon or come to. 'Will come upon
    you' preserves the force of arrival from above or toward them, fitting the promised
    divine intervention.
- source_word: μετὰ δόξης μεγάλης
  chosen: with great glory
  alternatives:
  - with great honor
  - with great splendor
  lexicon: LSJ
  rationale: δόξα in biblical Greek often carries the sense of glory, especially in
    divine contexts. 'Great glory' keeps that theological resonance.
- source_word: λαμπρότητος
  chosen: the splendor
  alternatives:
  - brightness
  - radiance
  - majesty
  lexicon: LSJ
  rationale: λαμπρότης denotes brightness or splendor. 'Splendor' pairs well with
    'glory' while avoiding redundancy and preserving elevated style.
- source_word: τοῦ αἰωνίου
  chosen: the Eternal
  alternatives:
  - the everlasting One
  - the eternal God
  lexicon: LSJ
  rationale: The articular adjective functions substantivally, referring to God as
    the Eternal One. 'The Eternal' is concise, reverent, and reflects the Greek without
    adding a noun absent from the text.
