theological_decisions:
- issue: Rendering σωτηρία in a restoration context
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  - rescue
  rationale: Although the immediate sense is restoration from captivity, the Greek
    term carries broader theological weight in biblical usage. 'Salvation' preserves
    that resonance while remaining contextually intelligible.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Rendering τοῦ αἰωνίου as a divine title
  chosen_reading: the Eternal
  alternative_readings:
  - the everlasting One
  - the eternal God
  rationale: The Greek uses a substantive adjective as a divine designation. Translating
    it as 'the Eternal' preserves the title-like force and avoids importing 'God'
    where the noun is not repeated.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
