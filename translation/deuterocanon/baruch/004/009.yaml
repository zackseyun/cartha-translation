id: BAR.4.9
reference: Baruch 4:9
source:
  edition: lxx-swete-1909
  text: εἶδεν γὰρ τὴν ἐπελθοῦσαν ὑμῖν ὀργὴν παρὰ τοῦ θεοῦ, καὶ εἶπεν Ἀκούσατε, οἱ
    πάροικοι Σειών, ἐπήγαγέ μοι ὁ θεὸς πένθος μέγα.
  language: Greek
  pages:
  - 380
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: 'For he saw the wrath that came upon you from God, and he said, “Hear, you
    neighbors of Zion: God has brought upon me great mourning.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you sojourners of Zion” or “you residents near Zion.” The Greek πάροικοι
      can denote those dwelling beside or among a place, sometimes with the nuance
      of resident aliens.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he perceived
  - he looked upon
  lexicon: BDAG
  rationale: A straightforward past-tense rendering fits the narrative sequence and
    preserves the concrete verbal sense without overinterpreting it as merely mental
    perception.
- source_word: ἐπελθοῦσαν
  chosen: that came upon
  alternatives:
  - that came against
  - that befell
  lexicon: BDAG
  rationale: The participle with ὀργή conveys wrath arriving upon the people. 'Came
    upon' is idiomatic English and preserves the sense of an event overtaking them.
- source_word: ὀργὴν
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: BDAG
  rationale: '''Wrath'' best conveys the gravity of divine judgment in this context;
    ''anger'' is possible but lighter in tone.'
- source_word: παρὰ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - by God
  - from the side of God
  lexicon: BDAG
  rationale: The phrase marks source/origin. 'From God' is the most natural English
    rendering here and preserves divine agency without awkwardness.
- source_word: Ἀκούσατε
  chosen: Hear
  alternatives:
  - Listen
  - Give ear
  lexicon: BDAG
  rationale: An imperative of summons. 'Hear' is concise and suitably elevated for
    prophetic-style address.
- source_word: οἱ πάροικοι Σειών
  chosen: you neighbors of Zion
  alternatives:
  - you dwellers near Zion
  - you sojourners of Zion
  - you residents of Zion
  lexicon: BDAG
  rationale: πάροικοι normally denotes those dwelling near or alongside, often as
    resident aliens or neighbors rather than native citizens. Because the phrase is
    vocative and relational, 'neighbors of Zion' preserves the distinction better
    than simply 'residents of Zion.' A footnote preserves the more literal 'sojourners
    of Zion' possibility.
- source_word: ἐπήγαγέ μοι
  chosen: has brought upon me
  alternatives:
  - brought on me
  - brought to me
  lexicon: BDAG
  rationale: The verb means to bring upon or inflict. 'Has brought upon me' captures
    the burden imposed and works naturally with 'mourning' as the object.
- source_word: πένθος μέγα
  chosen: great mourning
  alternatives:
  - great grief
  - deep mourning
  lexicon: BDAG
  rationale: πένθος denotes mourning, especially grief expressed in lament. 'Great
    mourning' keeps the lexical connection to lament rather than reducing it to an
    internal feeling alone.
