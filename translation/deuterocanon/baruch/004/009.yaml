theological_decisions:
- issue: Divine agency in the calamity
  chosen_reading: The verse states directly that the wrath came from God and that
    God brought great mourning.
  alternative_readings:
  - A softer rendering that leaves the calamity more impersonal
  rationale: The Greek explicitly attributes both the wrath and the mourning to God.
    The translation preserves that theological claim without mitigation, in keeping
    with original-language primacy and the text's own rhetoric of judgment.
  doctrine_reference: Translation philosophy §1, §3
