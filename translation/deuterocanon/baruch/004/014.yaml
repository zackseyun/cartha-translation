theological_decisions:
- issue: Divine title ὁ αἰώνιος
  chosen_reading: the Eternal One
  alternative_readings:
  - the Eternal
  - the Everlasting One
  rationale: The Greek uses a divine epithet rather than a personal name. Rendering
    it as 'the Eternal One' preserves the title's theological weight and readability
    without importing covenant-name language not present in the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English.'
- issue: Force of αἱ πάροικοι in context
  chosen_reading: neighboring women
  alternative_readings:
  - resident aliens
  - sojourners
  - neighbors
  rationale: The repeated feminine plural form in a summons connected with Zion suggests
    an address to surrounding women/inhabitants. Because the term can also mean sojourners
    or resident aliens, that alternative is preserved in a footnote rather than hidden.
  doctrine_reference: Preserve theological/interpretive tension rather than resolve
    it silently.
