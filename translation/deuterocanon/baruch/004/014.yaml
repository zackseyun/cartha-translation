translation:
  text: Let the neighboring women of Zion come, let the neighboring women come, and
    remember the captivity of my sons and daughters, which the Eternal One brought
    upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the resident women/sojourners of Zion' or 'the neighbors of Zion.' The
      Greek πάροικοι can denote those dwelling nearby or as resident aliens.
    reason: lexical_alternative
  - marker: b
    text: The Greek text repeats 'let the neighboring women come' twice for emphasis.
    reason: textual_variant
lexical_decisions:
- source_word: ἐλθάτωσαν
  chosen: let ... come
  alternatives:
  - come
  - let ... arrive
  lexicon: LSJ
  rationale: Third-person imperative/aorist imperative form from ἔρχομαι; in English,
    'let ... come' best conveys the hortatory/jussive force.
- source_word: αἱ πάροικοι
  chosen: the neighboring women
  alternatives:
  - the resident aliens
  - the sojourners
  - the neighbors
  lexicon: LSJ
  rationale: πάροικος can denote one dwelling nearby or as a sojourner. Here the feminine
    plural article and the address to Zion favor a vocative-like summons to surrounding
    women/neighboring inhabitants rather than a technical 'resident aliens.' 'Women'
    is supplied because the feminine plural form is explicit in Greek and likely contrasts
    with 'sons and daughters' later in the verse.
- source_word: Σειών
  chosen: Zion
  alternatives:
  - Sion
  lexicon: LSJ
  rationale: Standard English transliteration is 'Zion.'
- source_word: μνήσθητε
  chosen: remember
  alternatives:
  - call to mind
  - take note of
  lexicon: LSJ
  rationale: Aorist imperative of μιμνῄσκομαι; 'remember' is the most direct and natural
    rendering.
- source_word: τὴν αἰχμαλωσίαν
  chosen: the captivity
  alternatives:
  - the exile
  - the deportation
  lexicon: LSJ
  rationale: αἰχμαλωσία denotes captivity/captives taken in war. 'Captivity' preserves
    the concrete force; 'exile' is possible but slightly broader and less tied to
    seizure.
- source_word: τῶν υἱῶν μου καὶ θυγατέρων
  chosen: of my sons and daughters
  alternatives:
  - of my children
  lexicon: LSJ
  rationale: The Greek explicitly names both sons and daughters; the translation preserves
    that gendered pair rather than flattening to 'children,' in keeping with gender-accurate
    policy.
- source_word: ὁ αἰώνιος
  chosen: the Eternal One
  alternatives:
  - the Eternal
  - the Everlasting One
  lexicon: LSJ
  rationale: As a substantive adjective/title, ὁ αἰώνιος refers to God as the everlasting
    one. 'The Eternal One' is clear modern English and preserves the divine title
    sense without overinterpreting.
- source_word: ἐπήγαγεν
  chosen: brought upon
  alternatives:
  - brought
  - inflicted on
  lexicon: LSJ
  rationale: The compound verb with object and indirect object naturally yields 'brought
    upon them.' 'Inflicted' is interpretive and stronger than the Greek requires.
