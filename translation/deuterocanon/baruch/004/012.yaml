theological_decisions:
- issue: Corporate personification of Jerusalem/Zion as a bereaved mother/widow
  chosen_reading: Retain the first-person feminine self-description without making
    the metaphor explicit in the main text.
  alternative_readings:
  - Make the implied speaker explicit as 'Jerusalem' or 'Zion' in the translation
  rationale: The Greek presents the speaker directly in the first person as 'a widow'
    and 'desolate.' The broader context identifies the speaker, but the verse itself
    does not name her. Preserving the metaphor without expansion avoids importing
    explanatory material into the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
