id: BAR.4.12
reference: Baruch 4:12
source:
  edition: lxx-swete-1909
  text: μηδεὶς ἐπιχαιρέτω μοι τῇ χήρᾳ καὶ καταλειφθείσῃ ὑπὸ πολλῶν· ἠρημώθην διὰ τὰς
    ἁμαρτίας τῶν τέκνων μου, διότι ἐξέκλιναν ἐκ νόμου θεοῦ
  language: Greek
  pages:
  - 380
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: Let no one gloat over me, a widow and abandoned by many; I have been left
    desolate because of the sins of my children, because they turned aside from the
    law of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rejoice over me.' The Greek verb carries the sense of taking joy in
      another's distress, hence 'gloat over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδεὶς
  chosen: Let no one
  alternatives:
  - No one should
  - May no one
  lexicon: LSJ
  rationale: Negative imperative/subjunctive force introducing an exhortation or wish;
    'Let no one' preserves the direct prohibitive tone in natural English.
- source_word: ἐπιχαιρέτω
  chosen: gloat over
  alternatives:
  - rejoice over
  - exult over
  lexicon: LSJ
  rationale: The compound verb conveys rejoicing at another's misfortune rather than
    simple joy. 'Gloat over' best captures the hostile nuance in idiomatic modern
    English.
- source_word: μοι
  chosen: over me
  alternatives:
  - at me
  - against me
  lexicon: LSJ
  rationale: With ἐπιχαίρω the dative marks the person over whose plight one rejoices;
    'over me' is the most natural English complement.
- source_word: τῇ χήρᾳ
  chosen: a widow
  alternatives:
  - the widow
  - widowed woman
  lexicon: LSJ
  rationale: The speaker identifies herself by condition. English idiom prefers the
    predicate-like apposition 'a widow' after 'me' rather than the more wooden 'the
    widow.'
- source_word: καταλειφθείσῃ
  chosen: abandoned
  alternatives:
  - forsaken
  - left behind
  lexicon: LSJ
  rationale: The participle denotes being left or forsaken. 'Abandoned' is clear modern
    English and pairs well with the social pathos of widowhood.
- source_word: ὑπὸ πολλῶν
  chosen: by many
  alternatives:
  - by many people
  - by all
  lexicon: LSJ
  rationale: The phrase is indefinite and should not be overstated. 'By many' preserves
    the Greek's breadth without specifying who the many are.
- source_word: ἠρημώθην
  chosen: I have been left desolate
  alternatives:
  - I was made desolate
  - I have become desolate
  lexicon: LSJ
  rationale: The passive points to a state of devastation or abandonment. 'Have been
    left desolate' preserves both the resulting condition and the passive sense in
    readable English.
- source_word: διὰ τὰς ἁμαρτίας
  chosen: because of the sins
  alternatives:
  - on account of the sins
  - through the sins
  lexicon: LSJ
  rationale: διά with the accusative expresses cause. 'Because of' is the clearest
    causal rendering.
- source_word: τῶν τέκνων μου
  chosen: of my children
  alternatives:
  - of my sons
  - of my offspring
  lexicon: LSJ
  rationale: τέκνα is broader than 'sons' and naturally rendered 'children.' This
    avoids narrowing the reference beyond the Greek.
- source_word: ἐξέκλιναν
  chosen: they turned aside
  alternatives:
  - they deviated
  - they turned away
  lexicon: LSJ
  rationale: The verb denotes deviating from a path or norm. 'Turned aside' preserves
    the metaphor and works well with 'from the law of God.'
- source_word: ἐκ νόμου θεοῦ
  chosen: from the law of God
  alternatives:
  - from God's law
  - out of the law of God
  lexicon: LSJ
  rationale: The phrase denotes departure from God's law. 'The law of God' is slightly
    more formal and matches the solemn register of the verse.
