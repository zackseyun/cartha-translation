reference: Baruch 4:2
source:
  edition: lxx-swete-1909
  text: ἐπιστρέφου, Ἰακώβ, καὶ ἐπιλαβοῦ αὐτῆς, διόδευσον πρὸς τὴν λάμψιν κατέναντι
    τοῦ φωτὸς αὐτῆς.
  language: Greek
  pages:
