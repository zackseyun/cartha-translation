translation:
  text: Turn, O Jacob, and take hold of her; walk toward the radiance, opposite her
    light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Return, O Jacob, and grasp it'; the Greek feminine pronoun can be rendered
      more impersonally if understood as referring to the law rather than to wisdom
      personified.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'walk toward the radiance, opposite her light' is formally close
      to the Greek. It may also be understood more idiomatically as 'make your way
      toward the radiance of her light.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιστρέφου
  chosen: Turn back
  alternatives:
  - Return
  - Turn around
  lexicon: BDAG
  rationale: Middle/passive imperative of ἐπιστρέφω commonly means 'turn back' or
    'return.' 'Turn back' preserves the directional and repentant nuance without overinterpreting
    beyond the immediate context.
- source_word: Ἰακώβ
  chosen: Jacob
  alternatives:
  - Israel
  rationale: Proper name is transliterated per project philosophy. Although Jacob
    can stand metonymically for Israel, the Greek text names Jacob directly.
- source_word: ἐπιλαβοῦ
  chosen: take hold of
  alternatives:
  - grasp
  - seize
  lexicon: BDAG
  rationale: The imperative of ἐπιλαμβάνομαι often means to take hold of or grasp.
    'Take hold of' is idiomatic and preserves the concrete force better than the more
    aggressive 'seize.'
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - it
  rationale: The feminine pronoun refers to the feminine antecedent in context, most
    naturally wisdom/law personified in the surrounding passage. 'Her' preserves the
    Greek personification.
- source_word: διόδευσον
  chosen: walk toward
  alternatives:
  - make your way toward
  - pass along toward
  lexicon: LSJ
  rationale: The verb conveys proceeding or making one's way. 'Walk toward' gives
    natural English while retaining the imperative movement imagery.
- source_word: λάμψιν
  chosen: radiance
  alternatives:
  - brightness
  - splendor
  lexicon: LSJ
  rationale: λάμψις denotes shining brightness or radiance. 'Radiance' fits the elevated
    style and pairs well with the following 'light.'
- source_word: κατέναντι
  chosen: opposite
  alternatives:
  - in front of
  - before
  lexicon: LSJ
  rationale: The preposition literally means 'opposite' or 'over against.' Here it
    likely expresses orientation toward or in the presence of the light. 'Opposite'
    is the most formally transparent rendering, even if slightly unusual in English.
- source_word: φωτός
  chosen: light
  alternatives:
  - brightness
  lexicon: BDAG
  rationale: Basic sense is 'light.' Retaining both λάμψις and φῶς with distinct English
    terms ('radiance' / 'light') preserves the Greek's poetic variation.
