  text: ἰδοὺ γὰρ τὴν αἰχμαλωσίαν τῶν υἱῶν μου καὶ τῶν θυγατέρων, ἣν ἐπήγαγεν αὐτοῖς
    ὁ αἰώνιος.
  language: Greek
