theological_decisions:
- issue: Rendering the divine title ὁ αἰώνιος
  chosen_reading: the Everlasting One
  alternative_readings:
  - the Eternal One
  - the Eternal
  - the everlasting God
  rationale: The Greek uses a title for God rather than the more common κύριος. The
    translation preserves this distinct title instead of normalizing it to 'the Lord'
    or expanding it to 'God' without lexical warrant.
