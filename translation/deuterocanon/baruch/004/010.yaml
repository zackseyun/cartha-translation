translation:
  text: For look, I have seen the captivity of my sons and daughters, which the Everlasting
    One brought upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the exile of my sons and daughters.' The Greek αἰχμαλωσία can denote
      captivity more broadly, including deportation into exile.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Eternal One.' The Greek reads a divine title, ὁ αἰώνιος, literally
      'the everlasting/eternal one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: For look
  alternatives:
  - Behold
  - Look
  lexicon: BDAG
  rationale: ἰδού is an attention-getting particle. 'Look' is natural modern English;
    'For' is retained from γάρ to preserve the explanatory connection.
- source_word: γὰρ
  chosen: For
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: γάρ links this statement to the preceding context as an explanation or
    grounding, best represented by 'For' here.
- source_word: τὴν αἰχμαλωσίαν
  chosen: the captivity
  alternatives:
  - the exile
  - the state of being taken captive
  lexicon: BDAG
  rationale: αἰχμαλωσία denotes captivity or exile resulting from conquest. 'Captivity'
    is the most direct rendering and preserves the pathos of forced removal; 'exile'
    is possible but slightly less explicit about coercion.
- source_word: τῶν υἱῶν μου καὶ τῶν θυγατέρων
  chosen: of my sons and daughters
  alternatives:
  - of my children
  lexicon: BDAG
  rationale: The Greek explicitly names both sons and daughters. Following the project's
    gender-accurate policy, the paired terms are preserved rather than collapsed into
    'children'.
- source_word: ἣν
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: Relative pronoun referring back to 'captivity'; 'which' is straightforward
    and clear.
- source_word: ἐπήγαγεν
  chosen: brought upon
  alternatives:
  - brought
  - inflicted on
  - caused to come upon
  lexicon: BDAG
  rationale: The verb ἐπάγω in this context means to bring upon or cause to come upon
    someone. 'Brought upon' preserves both the causative force and the idiomatic English
    expression.
- source_word: ὁ αἰώνιος
  chosen: the Everlasting One
  alternatives:
  - the Eternal One
  - the everlasting God
  - the Eternal
  lexicon: LEH
  rationale: ὁ αἰώνιος functions here as a divine title, literally 'the everlasting/eternal
    [one].' 'The Everlasting One' preserves the adjectival title and avoids importing
    a noun not present in the Greek. Capitalization marks it as a divine designation.
