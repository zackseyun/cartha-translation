theological_decisions:
- issue: Representative singulars for vulnerable persons
  chosen_reading: the old man ... the child
  alternative_readings:
  - old men ... children
  - the elderly ... infants
  rationale: The Greek uses singular nouns πρεσβύτην and παιδίον. Retaining singulars
    preserves the rhetoric of representative vulnerability without importing a broader
    paraphrase. 'Child' is preferred over 'infant' because παιδίον is broader than
    a baby alone.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4 (gender-accurate
    over gender-neutral)
