translation:
  text: For he brought against them a nation from far away, a shameless and foreign-speaking
    nation, which showed no respect for the old man and had no mercy on the child,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a nation of another language' or 'a foreign-tongued nation.'
    reason: lexical_alternative
  - marker: b
    text: The Greek literally says 'the old man' and 'the child,' using singular figures
      representatively for the vulnerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπήγαγεν
  chosen: brought against
  alternatives:
  - brought upon
  - led against
  lexicon: LSJ
  rationale: The verb ἐπάγω here takes ἐπʼ αὐτούς and denotes causing an attacking
    force to come upon them. 'Brought against' is natural English and preserves the
    hostile sense without overparaphrase.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  - gentile nation
  lexicon: LSJ
  rationale: ἔθνος commonly means 'nation' or 'people.' Here the repetition emphasizes
    an invading foreign people group; 'nation' best preserves that force in English.
- source_word: μακρόθεν
  chosen: from far away
  alternatives:
  - from afar
  - from a distant place
  lexicon: LSJ
  rationale: The adverb indicates geographical remoteness. 'From far away' is clear
    modern English while retaining the sense of distance.
- source_word: ἀναιδές
  chosen: shameless
  alternatives:
  - insolent
  - brazen
  - ruthless
  lexicon: LSJ
  rationale: ἀναιδής fundamentally denotes lack of shame or audacity. 'Shameless'
    is the most direct rendering; while 'ruthless' captures effect, it is less lexically
    exact.
- source_word: ἀλλόγλωσσον
  chosen: foreign-speaking
  alternatives:
  - of another language
  - strange-tongued
  - foreign-tongued
  lexicon: LSJ
  rationale: The compound literally means speaking another/foreign language. 'Foreign-speaking'
    keeps the lexical idea compactly and avoids archaic phrasing.
- source_word: οὐκ ᾐσχύνθησαν πρεσβύτην
  chosen: showed no respect for the old man
  alternatives:
  - were not ashamed before the elder
  - did not honor the old man
  lexicon: LSJ
  rationale: The idiom with αἰσχύνομαι here conveys failure to show deference or regard
    toward an elderly person, not merely internal shame. 'Showed no respect' communicates
    the social-ethical sense in idiomatic English.
- source_word: πρεσβύτην
  chosen: the old man
  alternatives:
  - the elder
  - an old man
  lexicon: LSJ
  rationale: The singular likely functions generically. 'The old man' preserves the
    masculine singular form and representative force better than a plural smoothing.
- source_word: οὐδὲ παιδίον ἠλέησαν
  chosen: had no mercy on the child
  alternatives:
  - did not pity the child
  - showed no compassion to the child
  lexicon: LSJ
  rationale: ἐλεέω means to show mercy or pity. 'Had no mercy on the child' is forceful
    and natural, matching the parallel with their treatment of the elderly.
