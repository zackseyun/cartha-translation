  text: Θαρρεῖτε, τέκνα, βοήσατε πρὸς τὸν θεόν, καὶ ἐξελεῖται ὑμᾶς ἐκ δυναστείας,
    ἐκ χειρὸς ἐχθρῶν.
  language: Greek
