  text: ἐξεδυσάμην τὴν στολὴν τῆς εἰρήνης, ἐνεδυσάμην δὲ σάκκον τῆς δεήσεώς μου· κεκράξομαι
    πρὸς τὸν αἰώνιον ἐν ταῖς ἡμέραις μου.
  language: Greek
