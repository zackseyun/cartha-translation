translation:
  text: I have taken off the robe of peace, but I have put on the sackcloth of my
    supplication; I will cry out to the Eternal One in my days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Everlasting One.' The Greek title is literally 'the eternal [one],'
      used here as a divine designation.
    reason: lexical_alternative
  - marker: b
    text: '''Sackcloth'' refers to coarse mourning clothing worn as a sign of grief,
      repentance, or distress.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐξεδυσάμην
  chosen: I have taken off
  alternatives:
  - I stripped off
  - I removed
  lexicon: BDAG
  rationale: Aorist middle of ἐκδύω, here idiomatically for removing clothing from
    oneself. 'Taken off' is natural modern English and preserves the clothing metaphor
    without sounding overly abrupt like 'stripped off'.
- source_word: στολήν
  chosen: robe
  alternatives:
  - garment
  - dress
  lexicon: BDAG
  rationale: στολή commonly denotes a robe or long garment. 'Robe' preserves the dignified
    sense better than the more generic 'garment'.
- source_word: εἰρήνης
  chosen: peace
  alternatives:
  - well-being
  lexicon: BDAG
  rationale: 'The genitive qualifies the robe metaphorically: a robe characterized
    by peace. ''Peace'' is the standard and sufficiently broad rendering.'
- source_word: ἐνεδυσάμην
  chosen: I have put on
  alternatives:
  - I clothed myself with
  - I have donned
  lexicon: BDAG
  rationale: Aorist middle of ἐνδύω, paired with ἐξεδυσάμην. 'I have put on' keeps
    the parallelism clear and readable.
- source_word: σάκκον
  chosen: sackcloth
  alternatives:
  - a sackcloth garment
  lexicon: BDAG
  rationale: Standard biblical term for mourning attire; retaining 'sackcloth' preserves
    the cultural and literary force better than paraphrase.
- source_word: δεήσεώς
  chosen: my supplication
  alternatives:
  - my prayer
  - my plea
  lexicon: BDAG
  rationale: δέησις often emphasizes entreaty or urgent petition. 'Supplication' best
    conveys earnest pleading, though less colloquial than 'prayer'; the possessive
    is retained from the Greek.
- source_word: κεκράξομαι
  chosen: I will cry out
  alternatives:
  - I will call out
  - I will cry aloud
  lexicon: BDAG
  rationale: Future of κράζω, expressing loud urgent appeal. 'Cry out' captures both
    volume and desperation.
- source_word: τὸν αἰώνιον
  chosen: the Eternal One
  alternatives:
  - the Eternal
  - the Everlasting One
  lexicon: BDAG
  rationale: The adjective is used substantivally. 'The Eternal One' makes explicit
    the personal referent in English while preserving the title's theological weight.
    It avoids importing the divine name where the Greek does not use κύριος or θεός
    here.
- source_word: ἐν ταῖς ἡμέραις μου
  chosen: in my days
  alternatives:
  - during my days
  - all my days
  lexicon: BDAG
  rationale: A straightforward temporal phrase. 'In my days' is the most literal;
    'all my days' would overstate the Greek by adding 'all'.
