translation:
  text: My pampered ones traveled rough roads; they were carried off like a flock
    seized by enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My delicate ones' or 'My tender ones.' The Greek term highlights those
      once raised in softness or comfort.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ τρυφεροί μου
  chosen: My pampered ones
  alternatives:
  - my delicate ones
  - my tender ones
  - my cherished ones
  lexicon: LSJ
  rationale: τρυφερός can denote softness, delicacy, or luxurious/pampered upbringing.
    In this lament context it contrasts former ease with present suffering. 'Pampered
    ones' preserves that social and emotional contrast more clearly than the vaguer
    'tender ones.'
- source_word: ἐπορεύθησαν
  chosen: traveled
  alternatives:
  - went
  - journeyed
  lexicon: LSJ
  rationale: Aorist middle/passive deponent of πορεύομαι, commonly 'go' or 'travel.'
    'Traveled' fits the idiom with 'rough roads' in natural modern English without
    overinterpreting.
- source_word: ὁδοὺς τραχείας
  chosen: rough roads
  alternatives:
  - harsh ways
  - rugged paths
  lexicon: LSJ
  rationale: ὁδός is literally 'road/way'; τραχύς means rough, harsh, rugged. The
    phrase is best kept concrete here, likely evoking the hard route of exile or forced
    removal. 'Rough roads' is both literal and readable.
- source_word: ἤρθησαν
  chosen: were carried off
  alternatives:
  - were taken away
  - were lifted up
  lexicon: LSJ
  rationale: From αἴρω, here in passive sense. In context with the simile of a flock
    snatched by enemies, the sense is not neutral 'lifted' but forcible removal. 'Were
    carried off' captures the passive and violent displacement.
- source_word: ὡς ποίμνιον
  chosen: like a flock
  alternatives:
  - like a little flock
  - like sheep
  lexicon: LSJ
  rationale: ποίμνιον denotes a flock, often a small flock. English 'flock' is the
    most natural equivalent; 'little flock' would overemphasize the diminutive nuance
    in a way not required by the context.
- source_word: ἡρπασμένον
  chosen: seized
  alternatives:
  - snatched
  - plundered away
  lexicon: LSJ
  rationale: From ἁρπάζω, to seize or snatch suddenly. 'Seized' is concise and works
    well with 'by enemies'; 'snatched' is possible but slightly more colloquial.
- source_word: ὑπὸ ἐχθρῶν
  chosen: by enemies
  alternatives:
  - by the enemy
  - by hostile men
  lexicon: LSJ
  rationale: The plural ἐχθρῶν is straightforwardly 'enemies.' Retaining the plural
    matches the Greek and avoids narrowing the referent.
