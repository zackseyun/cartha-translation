theological_decisions:
- issue: Metaphorical force of the flock image
  chosen_reading: The verse depicts the speaker's people/children as vulnerable exiles
    forcibly removed, using a simile of a flock seized by enemies.
  alternative_readings:
  - The image could be read more generally as suffering rather than specifically exile
    or capture.
  rationale: The Greek itself gives a simile rather than an explicit doctrinal claim.
    The translation preserves the metaphor without expanding it into a more specific
    theological interpretation than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
