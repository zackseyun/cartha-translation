theological_decisions:
- issue: Sense of the appositional phrase μνημόσυνον Ἰσραήλ
  chosen_reading: 'Treat as a second vocative/appositional address: ''my people, memorial
    of Israel'''
  alternative_readings:
  - '''my people, remembrance of Israel'''
  - '''my people, O memorial of Israel'''
  rationale: The Greek presents a verbless appositional phrase after 'my people.'
    The verse does not explain the metaphor, so the translation preserves it rather
    than resolving it interpretively into something like 'you who are remembered by
    Israel' or 'Israel's remnant.'
  doctrine_reference: Preserve theological tension rather than resolve it.
