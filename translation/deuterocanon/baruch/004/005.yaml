translation:
  text: Take courage, my people, the memorial of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remembrance of Israel.' The Greek μνημόσυνον can denote either a memorial
      or an act/object of remembrance.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θαρσεῖτε
  chosen: Take courage
  alternatives:
  - Be of good courage
  - Be courageous
  - Take heart
  lexicon: BDAG
  rationale: Imperative plural of θαρσέω, an exhortation to courage or confidence.
    'Take courage' is natural modern English and preserves the direct imperative force
    better than the more idiomatic but slightly looser 'take heart.'
- source_word: λαός μου
  chosen: my people
  alternatives:
  - O my people
  lexicon: BDAG
  rationale: Standard rendering of λαός with possessive pronoun. 'My people' preserves
    the covenantal and communal sense without adding vocative 'O,' which is not required
    by the Greek.
- source_word: μνημόσυνον
  chosen: memorial
  alternatives:
  - remembrance
  - memorial offering
  - reminder
  lexicon: BDAG
  rationale: The noun ordinarily denotes remembrance or memorial. In this appositional
    address to the people, 'memorial' is the most direct formal rendering. 'Remembrance'
    is possible and smoother, but 'memorial' better preserves the concrete nominal
    force of the Greek.
- source_word: Ἰσραήλ
  chosen: Israel
  lexicon: BDAG
  rationale: Proper name transliterated according to project policy.
