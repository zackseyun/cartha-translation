translation:
  text: For I sent you out with mourning and weeping, but God will give you back to
    me with joy and gladness forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God will restore you to me.' The Greek verb can mean 'give back' or
      'restore.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέπεμψα
  chosen: I sent ... out
  alternatives:
  - I sent away
  - I dismissed
  lexicon: BDAG
  rationale: The compound verb ἐκπέμπω commonly means to send out or away. 'Sent ...
    out' preserves the sense of expulsion/separation without overstating formal banishment
    in English.
- source_word: μετὰ πένθους
  chosen: with mourning
  alternatives:
  - in mourning
  - with grief
  lexicon: BDAG
  rationale: πένθος denotes mourning or grief, especially lament associated with loss.
    'With mourning' keeps the concrete emotional register and matches the repeated
    μετὰ construction.
- source_word: καὶ κλαυθμοῦ
  chosen: and weeping
  alternatives:
  - and lamentation
  - and crying
  lexicon: BDAG
  rationale: κλαυθμός is weeping or crying aloud. 'Weeping' is natural English and
    pairs well with 'mourning' without becoming overly formal.
- source_word: ἀποδώσει
  chosen: will give ... back
  alternatives:
  - will restore
  - will repay
  lexicon: BDAG
  rationale: ἀποδίδωμι can mean give back, restore, or repay. Here the object is 'you,'
    and the context is the return of exiles to the mother figure, so 'will give you
    back to me' best preserves the relational sense. 'Restore' is possible but less
    explicit about the dative μοι.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: The Greek has the articular noun 'the God,' but idiomatic English in
    this context is simply 'God.' No covenant name is present here.
- source_word: μετὰ χαρμοσύνης
  chosen: with joy
  alternatives:
  - with rejoicing
  lexicon: BDAG
  rationale: χαρμοσύνη denotes joy or gladness. 'Joy' is concise and idiomatic.
- source_word: καὶ εὐφροσύνης
  chosen: and gladness
  alternatives:
  - and delight
  - and rejoicing
  lexicon: BDAG
  rationale: εὐφροσύνη overlaps with χαρμοσύνη but is not identical; 'gladness' preserves
    the paired intensification rather than collapsing both terms into one English
    word.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for ever
  lexicon: BDAG
  rationale: In this context the phrase functions idiomatically for enduring permanence.
    'Forever' is clear modern English and fits the promise of lasting restoration.
