theological_decisions:
- issue: Speaker and relational framing
  chosen_reading: The first-person speaker is rendered as a motherly Zion/Jerusalem
    figure saying God will give the children back 'to me.'
  alternative_readings:
  - A more impersonal rendering such as 'God will restore you'
  rationale: The Greek explicitly includes μοι ('to me'), and the surrounding context
    personifies Jerusalem as mother. Retaining 'to me' preserves the text's familial
    and communal theology rather than flattening it into a generic restoration statement.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
