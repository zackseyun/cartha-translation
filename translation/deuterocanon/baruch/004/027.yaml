reference: Baruch 4:27
source:
  edition: lxx-swete-1909
  text: Θαρρήσατε, τέκνα, καὶ βοήσατε πρὸς τὸν θεόν, ἔσται γὰρ ὑμῶν ὑπὸ τοῦ ἐπάγοντος
    μνεία.
  language: Greek
  pages:
  - 381
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
