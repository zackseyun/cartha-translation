theological_decisions:
- issue: Identity of 'the one who brought [it] upon you'
  chosen_reading: An implicit reference to God as the one who brought the judgment/calamity
    upon the people and who will also remember them.
  alternative_readings:
  - 'A less explicit rendering could leave the agent more ambiguous: ''by the one
    who brought it upon you''.'
  rationale: The immediate clause already names God, and Baruch's theology regularly
    presents the exile/calamity as divine judgment. The Greek participle is formally
    less explicit than repeating 'God,' so the translation preserves that indirectness
    with 'the one who...' rather than replacing it with 'God' in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
