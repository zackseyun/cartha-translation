translation:
  text: Take courage, children, and cry out to God, for you will be remembered by
    the one who brought this upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for there will be remembrance of you by the one who
      brought it upon you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Θαρρήσατε
  chosen: Take courage
  alternatives:
  - Be courageous
  - Be of good courage
  - Take heart
  lexicon: LSJ
  rationale: Aorist imperative plural from θαρρέω/θαρσέω, calling for boldness or
    courage. 'Take courage' is natural modern English and preserves the exhortational
    force without sounding archaic.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: LSJ
  rationale: Vocative plural meaning 'children.' This is gender-inclusive in sense
    and fits the address to the people. 'Sons' would be too narrow.
- source_word: βοήσατε
  chosen: cry out
  alternatives:
  - call out
  - shout
  lexicon: LSJ
  rationale: Imperative plural from βοάω, often denoting a loud cry or appeal. 'Cry
    out' captures both volume and supplicatory force better than the flatter 'call
    out.'
- source_word: πρὸς τὸν θεόν
  chosen: to God
  alternatives:
  - toward God
  lexicon: LSJ
  rationale: Standard directional phrase after a verb of crying out; idiomatic English
    is 'cry out to God.'
- source_word: ἔσται ... μνεία
  chosen: you will be remembered
  alternatives:
  - there will be remembrance of you
  - mention will be made of you
  lexicon: LSJ
  rationale: 'The construction ἔσται ... μνεία is literally ''there will be remembrance,''
    but idiomatic English is passive: ''you will be remembered.'' This preserves the
    future assurance.'
- source_word: ὑμῶν
  chosen: you
  alternatives:
  - of you
  lexicon: LSJ
  rationale: Genitive dependent on μνεία. In English the passive restructuring naturally
    yields 'you will be remembered.'
- source_word: ὑπὸ τοῦ ἐπάγοντος
  chosen: by the one who brought this upon you
  alternatives:
  - by the one bringing it upon you
  - by the one who inflicted it
  - by him who brought it on
  lexicon: LSJ
  rationale: The articular present participle of ἐπάγω means 'the one bringing on
    / bringing upon.' In context it refers to the agent who brought the calamity upon
    them, implicitly God. 'This' is supplied in English to make the object of the
    calamity explicit from context, since Greek leaves it implicit.
