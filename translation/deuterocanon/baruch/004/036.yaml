id: BAR.4.36
reference: Baruch 4:36
source:
  edition: lxx-swete-1909
  text: περίβλεψαι πρὸς ἀνατολάς, Ἰερουσαλήμ, καὶ ἴδε τὴν εὐφροσύνην τὴν παρὰ τοῦ
    θεοῦ σοι ἐρχομένην.
  language: Greek
  pages:
  - 382
  confidence: high
  validation: minor_mismatch
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: Look toward the east, Jerusalem, and see the joy that is coming to you from
    God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: περίβλεψαι
  chosen: Look toward
  alternatives:
  - Look around toward
  - Look about toward
  - Gaze toward
  lexicon: LSJ
  rationale: Aorist middle imperative of περιβλέπω, here functioning as an exhortation
    to direct one's gaze. 'Look toward' is natural English and preserves the imperative
    force without overtranslating the compound verb.
- source_word: πρὸς ἀνατολάς
  chosen: toward the east
  alternatives:
  - toward the sunrise
  - toward the eastlands
  lexicon: LSJ
  rationale: ἀνατολαί literally refers to risings/east. In this context of Jerusalem
    awaiting restoration, the directional sense is primary. 'Toward the east' is the
    clearest idiomatic rendering.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard transliteration of the place name, following project policy
    to transliterate names rather than translate them.
- source_word: ἴδε
  chosen: see
  alternatives:
  - behold
  - look and see
  lexicon: LSJ
  rationale: Aorist imperative of ὁράω. 'See' is concise, natural modern English;
    'behold' would sound archaic.
- source_word: εὐφροσύνην
  chosen: the joy
  alternatives:
  - the gladness
  - the rejoicing
  lexicon: LSJ
  rationale: εὐφροσύνη denotes joy or gladness. 'Joy' is the most straightforward
    and readable choice in modern English.
- source_word: τὴν παρὰ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - that comes from God
  - from the side of God
  lexicon: LSJ
  rationale: παρά with genitive indicates source or origin. 'From God' captures the
    sense cleanly; the fuller verbal idea is supplied by the participle ἐρχομένην.
- source_word: σοι
  chosen: to you
  alternatives:
  - for you
  lexicon: LSJ
  rationale: Dative singular referring to Jerusalem personified. 'To you' fits the
    motion implied by ἐρχομένην and preserves the direct address.
- source_word: ἐρχομένην
  chosen: that is coming
  alternatives:
  - coming
  - which comes
  lexicon: LSJ
  rationale: Present middle/passive participle modifying 'joy.' The present participle
    conveys an approaching, ongoing arrival. 'That is coming' expresses this clearly
    in English.
