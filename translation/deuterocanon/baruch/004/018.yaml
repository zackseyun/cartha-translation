id: BAR.4.18
reference: Baruch 4:18
source:
  edition: lxx-swete-1909
  text: ὁ γὰρ ἐπαγαγὼν τὰ κακὰ ἐξελεῖται ὑμᾶς ἐκ χειρὸς ἐχθρῶν ὑμῶν.
  language: Greek
  pages:
  - 381
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; kept canonical Baruch 1:1-5:9 only, with Letter
    of Jeremiah handled separately as LJE.
translation:
  text: For the one who brought these evils upon you will rescue you from the hand
    of your enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these calamities' or 'these troubles.' The Greek τὰ κακὰ can refer to
      grievous afflictions as well as 'evils.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγαγὼν
  chosen: brought ... upon
  alternatives:
  - brought
  - brought down upon
  - caused to come upon
  lexicon: BDAG
  rationale: Aorist participle of ἐπάγω here means to bring or cause something to
    come upon someone. 'Brought ... upon' preserves the directional force and fits
    idiomatic English.
- source_word: τὰ κακὰ
  chosen: these evils
  alternatives:
  - these troubles
  - these calamities
  - the evils
  lexicon: BDAG
  rationale: κακά can denote evils, troubles, or calamities. 'These evils' keeps the
    moral/afflictive weight of the Greek and reflects the article with likely contextual
    reference to the sufferings just mentioned.
- source_word: ἐξελεῖται
  chosen: will rescue
  alternatives:
  - will deliver
  - will take out
  lexicon: BDAG
  rationale: Future middle of ἐξαιρέω commonly means rescue or deliver from danger.
    'Will rescue' is clear modern English while preserving the sense of active deliverance.
- source_word: ἐκ χειρὸς
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the hand of
  lexicon: BDAG
  rationale: This is a standard biblical idiom for power or control. 'From the hand
    of' preserves the idiom in readable English.
- source_word: ἐχθρῶν
  chosen: enemies
  alternatives:
  - foes
  lexicon: BDAG
  rationale: The ordinary sense is 'enemies'; no contextual reason requires a more
    specialized gloss.
