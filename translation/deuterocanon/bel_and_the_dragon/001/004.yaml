translation:
  text: and forty sheep and six measures of wine. And the king revered him, and went
    every day to bow down to him, but Daniel bowed down to his God. And the king said
    to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiped him' for both occurrences of the bowing verb; Greek προσκυνέω
      can denote either bowing down or worship depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόβατα τεσσεράκοντα
  chosen: forty sheep
  alternatives:
  - forty lambs
  lexicon: LSJ
  rationale: πρόβατα commonly denotes sheep/small livestock; 'sheep' is the broad,
    natural English equivalent here.
- source_word: οἴνου μετρηταὶ ἕξ
  chosen: six measures of wine
  alternatives:
  - six metrētai of wine
  - six jars of wine
  lexicon: LSJ
  rationale: μετρητής is a liquid measure. 'Measures' preserves the quantified sense
    without importing a speculative modern unit.
- source_word: ἐσέβετο αὐτόν
  chosen: revered him
  alternatives:
  - worshiped him
  - venerated him
  lexicon: LSJ
  rationale: σέβομαι can denote reverence or worship. Because the next clause explicitly
    uses προσκυνεῖν for the king's act of bowing down, 'revered' here preserves a
    distinction between inward/devotional regard and the physical act named afterward.
- source_word: ἐπορεύετο καθʼ ἑκάστην ἡμέραν
  chosen: went every day
  alternatives:
  - used to go each day
  - went according to each day
  lexicon: LSJ
  rationale: Imperfect middle indicates customary action; 'went every day' communicates
    repeated daily practice in idiomatic English.
- source_word: προσκυνεῖν αὐτῷ
  chosen: to bow down to him
  alternatives:
  - to worship him
  - to prostrate himself before him
  lexicon: LSJ
  rationale: προσκυνέω can mean worship or bow down. Here, since the object is the
    idol Bel and Daniel's contrasting action is stated separately, 'bow down to him'
    preserves the physical cultic act without over-specifying the theological nuance
    in English.
- source_word: προσεκύνει τῷ θεῷ αὐτοῦ
  chosen: bowed down to his God
  alternatives:
  - worshiped his God
  lexicon: LSJ
  rationale: 'Using the same English root as προσκυνεῖν maintains the narrative contrast:
    the king bows to Bel, Daniel bows to his God. ''His God'' reflects the possessive
    αὐτοῦ straightforwardly.'
- source_word: ὁ βασιλεὺς
  chosen: the king
  lexicon: LSJ
  rationale: Standard rendering for βασιλεύς.
- source_word: Δανιήλ
  chosen: Daniel
  rationale: Personal name transliterated by standard English convention, per project
    philosophy.
