id: BEL.1.4
reference: Bel and the Dragon 1:4
source:
  edition: lxx-swete-1909
  text: καὶ πρόβατα τεσσεράκοντα καὶ οἴνου μετρηταὶ ἕξ. καὶ ὁ βασιλεὺς ἐσέβετο αὐτόν,
    καὶ ἐπορεύετο καθʼ ἑκάστην ἡμέραν προσκυνεῖν αὐτῷ, Δανιὴλ δὲ προσεκύνει τῷ θεῷ
    αὐτοῦ. καὶ εἶπεν αὐτῷ ὁ βασιλεὺς
  language: Greek
  pages:
