theological_decisions:
- issue: Whether to render cultic verbs with explicit 'worship' language for the idol
    and for Daniel's action
  chosen_reading: Use 'revered' for ἐσέβετο and 'bow down' for both προσκυνεῖν/proσεκύνει
  alternative_readings:
  - Use 'worshiped' for the king's relation to Bel and for Daniel's relation to God
  rationale: The Greek uses two different verbs for the king's devotion to Bel (σέβομαι
    and προσκυνέω), then repeats προσκυνέω for Daniel toward God. Rendering them with
    some differentiation preserves the literary contrast and avoids collapsing all
    three into a single English term. The context remains clearly cultic without importing
    extra doctrinal precision.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
