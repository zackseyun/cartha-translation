theological_decisions:
- issue: Rendering πάσης σαρκὸς in a theological description of God's rule
  chosen_reading: all flesh
  alternative_readings:
  - all humanity
  - every living creature
  rationale: The biblical idiom is preserved rather than interpreted more narrowly.
    This keeps the theological breadth and scriptural resonance of the phrase without
    over-resolving its scope.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Rendering ζῶν θεός in a pagan king's speech
  chosen_reading: a living god
  alternative_readings:
  - the living God
  rationale: The Greek lacks the article that would justify 'the living God.' Since
    the speaker refers to Bel, the phrase should not be rendered in a way that imports
    Israel's confessional title.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
