id: BEL.1.32
reference: Bel and the Dragon 1:32
source:
  edition: lxx-swete-1909
  text: ἦσαν δὲ ἐν τῷ λάκκῳ ἑπτὰ λέοντες, καὶ ἐδί- δοτο αὐτοῖς τὴν ἡμέραν δύο σώματα
    καὶ δύο πρόβατα· τότε δὲ οὐκ ἐδόθη αὐτοῖς, ἵνα καταφάγωσιν τὸν Δανιήλ.
  language: Greek
  pages:
