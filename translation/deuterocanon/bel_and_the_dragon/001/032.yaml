translation:
  text: Now there were seven lions in the pit, and each day they were given two bodies
    and two sheep; but then nothing was given to them, so that they might devour Daniel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two carcasses' or 'two corpses' for 'two bodies'; the Greek says 'bodies'
      (σώματα), and the context suggests food for the lions.
    reason: lexical_alternative
lexical_decisions:
- source_word: λάκκῳ
  chosen: pit
  alternatives:
  - den
  lexicon: LSJ
  rationale: The Greek literally denotes a pit or cistern-like hole. 'Pit' stays closer
    to the source wording than the more interpretive 'den,' though the context is
    lions confined there.
- source_word: ἑπτὰ λέοντες
  chosen: seven lions
  lexicon: LSJ
  rationale: Straightforward numerical and nominal rendering with no need for expansion.
- source_word: ἐδίδοτο
  chosen: they were given
  alternatives:
  - it was given
  lexicon: LSJ
  rationale: Impersonal/passive imperfect is best rendered in English with 'they were
    given,' referring to the lions as recipients of food on a customary basis.
- source_word: τὴν ἡμέραν
  chosen: each day
  alternatives:
  - daily
  - for the day
  lexicon: LSJ
  rationale: Idiomatic temporal accusative indicating regular daily provision; 'each
    day' is natural modern English and preserves the habitual sense.
- source_word: δύο σώματα
  chosen: two bodies
  alternatives:
  - two carcasses
  - two corpses
  lexicon: LSJ
  rationale: σώματα literally means 'bodies.' In this feeding context it likely refers
    to human bodies/corpses, but the Greek itself uses the broader term. 'Bodies'
    preserves the source wording while allowing the grim context to speak for itself.
- source_word: δύο πρόβατα
  chosen: two sheep
  lexicon: LSJ
  rationale: Standard rendering of πρόβατα here as sheep.
- source_word: οὐκ ἐδόθη αὐτοῖς
  chosen: nothing was given to them
  alternatives:
  - it was not given to them
  - they were given nothing
  lexicon: LSJ
  rationale: English supplies 'nothing' naturally to express the negated passive without
    awkwardness.
- source_word: ἵνα καταφάγωσιν
  chosen: so that they might devour
  alternatives:
  - in order that they might eat up
  - so that they might consume
  lexicon: LSJ
  rationale: καταφαγεῖν intensifies eating as consuming/devouring. 'Devour' fits the
    predatory context and preserves the force of the compound verb.
- source_word: τὸν Δανιήλ
  chosen: Daniel
  rationale: Standard English transliteration of the proper name.
