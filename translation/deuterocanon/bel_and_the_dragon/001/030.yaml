theological_decisions:
- issue: Degree of coercion on the king
  chosen_reading: The king acts under strong social/political compulsion, not voluntary
    initiative.
  alternative_readings:
  - The king was simply persuaded
  - The king was physically forced
  rationale: The combination of ἐπείγουσιν ... σφόδρα and ἀναγκασθείς presents intense
