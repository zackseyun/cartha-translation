id: BEL.1.30
reference: Bel and the Dragon 1:30
source:
  edition: lxx-swete-1909
  text: καὶ εἶδεν ὁ βασιλεὺς ὅτι ἐπείγουσιν αὐτὸν σφόδρα, καὶ ἀναγκασθεὶς παρέδωκεν
    αὐτοῖς τὸν Δανιήλ.
  language: Greek
  pages:
  - 614
  confidence: high
  validation: normalized_direct_extract
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone Bel extraction currently
    follows the complete Theodotion stream in Swete, because that stream is the cleanest
    fully numbered extract available in the current corpus.
translation:
  text: And the king saw that they were pressing him very hard, and being compelled,
    he handed Daniel over to them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπείγουσιν
  chosen: were pressing him
  alternatives:
  - were urging him
  - were insisting on him
  - were pressing him urgently
  lexicon: BDAG
  rationale: The verb conveys strong pressure or insistence rather than mere request.
    'Were pressing him' preserves the ongoing force of the present tense and fits
    the political coercion in context.
- source_word: σφόδρα
  chosen: very hard
  alternatives:
  - greatly
  - exceedingly
  - strongly
  lexicon: LSJ
  rationale: σφόδρα intensifies the preceding verb. 'Very hard' is idiomatic modern
    English paired with 'pressing,' preserving the emphatic force without sounding
    archaic.
- source_word: ἀναγκασθείς
  chosen: being compelled
  alternatives:
  - being forced
  - under compulsion
  lexicon: BDAG
  rationale: The participle indicates that the king acts under external pressure.
    'Being compelled' preserves that passive nuance and avoids overstating physical
    force.
- source_word: παρέδωκεν
  chosen: handed ... over
  alternatives:
  - delivered ... over
  - gave ... over
  lexicon: BDAG
  rationale: The verb commonly means to hand someone over into another's power. 'Handed
    Daniel over to them' is natural English and preserves the transfer-of-custody
    sense.
- source_word: Δανιήλ
  chosen: Daniel
  rationale: Standard English transliteration of the personal name.
