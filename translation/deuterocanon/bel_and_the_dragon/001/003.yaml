theological_decisions:
- issue: Reference to the idol with masculine pronoun αὐτόν after neuter εἴδωλον
  chosen_reading: Render the idol as 'it' in English
  alternative_readings:
  - Render as 'him' to reflect the masculine pronoun and personified deity
  rationale: The Greek can personify the deity behind the idol, but the immediate
    antecedent is 'idol.' English 'it' better reflects the object-language of εἴδωλον
    while avoiding an interpretive move toward personal agency not explicit in this
    clause.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
