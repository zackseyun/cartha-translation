translation:
  text: And there was an idol among the Babylonians whose name was Bel, and twelve
    artabas of fine flour were spent on it each day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: An artaba was an ancient dry measure; the exact modern equivalent varied
      by region and period.
    reason: cultural_note
  - marker: b
    text: Or 'for him,' reflecting the Greek masculine pronoun after 'Bel'; the main
      text uses 'it' because the immediate referent is 'idol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴδωλον
  chosen: idol
  alternatives:
  - image
  - idol-image
  lexicon: BDAG
  rationale: The term denotes a cult image/object of worship. 'Idol' is the clearest
    natural English equivalent and preserves the polemical force better than the more
    neutral 'image'.
- source_word: τοῖς Βαβυλωνίοις
  chosen: among the Babylonians
  alternatives:
  - for the Babylonians
  - to the Babylonians
  lexicon: BDAG
  rationale: 'The dative here is best taken as indicating relation/possession within
    the people group: the Babylonians had such an idol. ''Among the Babylonians''
    communicates this idiomatically in English.'
- source_word: ᾧ ὄνομα Βὴλ
  chosen: whose name was Bel
  alternatives:
  - named Bel
  - to whom the name was Bel
  lexicon: BDAG
  rationale: This relative construction is idiomatically rendered in English as 'whose
    name was Bel.' 'Bel' is a proper name and is therefore transliterated, in keeping
    with project policy.
- source_word: ἐδαπανῶντο
  chosen: were spent
  alternatives:
  - were expended
  - were consumed
  lexicon: BDAG
  rationale: The verb means to spend or expend resources. A passive English rendering
    fits the impersonal Greek construction and keeps the focus on the quantity offered
    to the idol.
- source_word: εἰς αὐτόν
  chosen: for it
  alternatives:
  - on it
  - for him
  lexicon: BDAG
  rationale: Although αὐτόν is grammatically masculine, its antecedent is εἴδωλον
    ('idol'). In English, referring to the idol as 'it' is more natural and avoids
    implying personhood beyond what the text states. 'For' captures the sense of expenditure
    directed toward the idol.
- source_word: ἑκάστης ἡμέρας
  chosen: each day
  alternatives:
  - every day
  - daily
  lexicon: BDAG
  rationale: '''Each day'' is a straightforward, readable rendering of the genitive
    time expression.'
- source_word: σεμιδάλεως
  chosen: fine flour
  alternatives:
  - choice flour
  - wheat flour
  lexicon: LSJ
  rationale: σεμίδαλις refers to fine flour, often of wheat. 'Fine flour' is the standard
    clear rendering without over-specifying beyond the Greek.
- source_word: ἀρτάβαι δώδεκα
  chosen: twelve artabas
  alternatives:
  - twelve measures
  - twelve bushels
  lexicon: LSJ
  rationale: ἀρτάβη is a specific ancient dry measure. Retaining 'artabas' preserves
    the historical specificity of the source; converting to a modern unit would introduce
    approximation not present in the text.
