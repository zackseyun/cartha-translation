id: BEL.1.26
reference: Bel and the Dragon 1:26
source:
  edition: lxx-swete-1909
  text: σὺ δέ, βασιλεῦ, δός μοι ἐξουσίαν, καὶ ἀποκτενῶ τὸν δράκοντα ἄνευ μαχαίρας
    καὶ ῥάβδου. καὶ εἶπεν ὁ βασιλεὺς Δίδωμί σοι.
  language: Greek
  pages:
  - 614
  confidence: high
  validation: normalized_direct_extract
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone Bel extraction currently
    follows the complete Theodotion stream in Swete, because that stream is the cleanest
    fully numbered extract available in the current corpus.
translation:
  text: But you, O king, give me authority, and I will kill the dragon without sword
    or club. And the king said, “I give it to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I grant it to you,” referring to the authority Daniel requested.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δέ
  chosen: But you
  alternatives:
  - But as for you
  - You then
  lexicon: BDAG
  rationale: δέ marks a transition or contrast; with explicit σὺ it gives emphatic
    address. 'But you' preserves both the connective and the emphasis without sounding
    wooden.
- source_word: βασιλεῦ
  chosen: O king
  alternatives:
  - king
  - your majesty
  lexicon: BDAG
  rationale: Vocative direct address is explicit. 'O king' preserves the vocative
    force in natural English better than a bare 'king'; 'your majesty' would import
    a courtly idiom not present in the Greek.
- source_word: δός μοι ἐξουσίαν
  chosen: give me authority
  alternatives:
  - grant me authority
  - give me permission
  - give me power
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority, right, or delegated power. In this
    court setting Daniel asks for royal authorization to act. 'Authority' best preserves
    that official sense; 'permission' is possible but weaker, and 'power' could suggest
    innate ability rather than granted authorization.
- source_word: ἀποκτενῶ
  chosen: I will kill
  alternatives:
  - I will slay
  lexicon: BDAG
  rationale: The future verb straightforwardly means to kill. 'Kill' is clear modern
    English; 'slay' is more literary and archaic than the project's style prefers.
- source_word: τὸν δράκοντα
  chosen: the dragon
  alternatives:
  - the serpent
  lexicon: LSJ
  rationale: δράκων in this narrative refers to the creature venerated by the Babylonians.
    'Dragon' is the standard and contextually fitting rendering; 'serpent' would undertranslate
    the term's force in this story.
- source_word: ἄνευ μαχαίρας καὶ ῥάβδου
  chosen: without sword or club
  alternatives:
  - without a sword or a staff
  - without sword and rod
  lexicon: BDAG/LSJ
  rationale: 'ἄνευ governs both nouns: Daniel will kill the dragon without conventional
    weapons. μαχαίρα is ''sword''; ῥάβδος can be rod, staff, or club. Here, in a weapon
    pair, ''club'' best conveys an implement of striking rather than a shepherd''s
    staff.'
- source_word: Δίδωμί σοι
  chosen: I give it to you
  alternatives:
  - I grant it to you
  - I give you authority
  lexicon: BDAG
  rationale: The king's reply elliptically grants the requested ἐξουσίαν. English
    normally supplies the object for clarity; 'it' reflects the implied authorization
    without overexpanding the text. 'I grant it to you' is also possible, but 'I give
    it to you' stays closer to the Greek verb.
