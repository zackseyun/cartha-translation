id: BEL.1.14
reference: Bel and the Dragon 1:14
source:
  edition: lxx-swete-1909
  text: διόλου καὶ ἀνήλουν αὐτά. καὶ ἐγένετο ὡς ἐξῆλθον ἐκεῖνοι, καὶ ὁ βασιλεὺς παρέθηκεν
    τὰ βρώματα τῷ Βήλ, καὶ ἐπέταξεν Δανιὴλ τοῖς παιδαρίοις αὐτοῦ καὶ ἤνεγκαν τέφραν,
