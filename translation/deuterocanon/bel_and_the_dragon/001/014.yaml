translation:
  text: and they consumed them completely. And it happened that, when those men had
    gone out, the king set the food before Bel, and Daniel ordered his young servants,
    and they brought ashes and scattered them over the whole temple in the presence
    of the king alone. Then, after going out, they shut the door and sealed it with
    the king’s signet ring, and went away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with only the king present.' The Greek phrase emphasizes that the scattering
      of the ashes was done before the king and not before a larger group.
    reason: lexical_alternative
lexical_decisions:
- source_word: διόλου
  chosen: completely
  alternatives:
  - entirely
  - altogether
  lexicon: LSJ
  rationale: Adverb intensifying totality; 'completely' is natural modern English
    and fits the sense of total consumption.
- source_word: ἀνήλουν
  chosen: consumed
  alternatives:
  - used up
  - destroyed
  lexicon: LSJ
  rationale: In context of food offerings, 'consumed' best matches the object αὐτά
    and avoids the overly broad 'destroyed.'
- source_word: παρέθηκεν
  chosen: set ... before
  alternatives:
  - placed before
  - served
  lexicon: LSJ
  rationale: The verb commonly means to set or place before someone, especially food.
    'Set the food before Bel' preserves the ritual/presentation sense without sounding
    archaic.
- source_word: τὰ βρώματα
  chosen: the food
  alternatives:
  - the provisions
  - the things to eat
  lexicon: LSJ
  rationale: A straightforward rendering for edible items offered to Bel; 'food' is
    idiomatic and sufficiently specific.
- source_word: παιδαρίοις
  chosen: young servants
  alternatives:
  - boys
  - young attendants
  - servants
  lexicon: LSJ
  rationale: The term can denote boys or young attendants. Since they are acting under
    Daniel's orders in a service role, 'young servants' captures both age and function
    better than the potentially misleading 'boys'.
- source_word: τέφραν
  chosen: ashes
  alternatives:
  - ash
  lexicon: LSJ
  rationale: Plural mass-noun usage is standard in English for scattered residue used
    to reveal footprints.
- source_word: κατέσποραν
  chosen: scattered
  alternatives:
  - strewed
  - sprinkled
  lexicon: LSJ
  rationale: The verb indicates spreading material over a surface. 'Scattered' is
    clear modern English; 'strewed' is more formal/archaic.
- source_word: ναὸν
  chosen: temple
  alternatives:
  - shrine
  lexicon: LSJ
  rationale: ναός here refers to Bel's sanctuary building. 'Temple' is the most natural
    and recognizable English equivalent.
- source_word: ἐνώπιον τοῦ βασιλέως μόνου
  chosen: in the presence of the king alone
  alternatives:
  - before the king only
  - with only the king present
  lexicon: LSJ
  rationale: μόνου most naturally qualifies the king's sole presence at this act,
    emphasizing that no one else witnessed the scattering. The chosen wording preserves
    that emphasis.
- source_word: ἐσφραγίσαντο ἐν τῷ δακτυλίῳ τοῦ βασιλέως
  chosen: sealed it with the king’s signet ring
  alternatives:
  - sealed it with the king's ring
  lexicon: LSJ
  rationale: The phrase refers to official sealing by means of the royal ring. 'Signet
    ring' makes the sealing function explicit for modern readers.
