theological_decisions:
- issue: Rendering of Ἰουδαῖος
  chosen_reading: Jew
  alternative_readings:
  - Judean
  rationale: The term can be rendered either ethnically/religiously ('Jew') or geographically/politically
    ('Judean'). Here the crowd's charge is that the king has aligned himself with
    Daniel's people and religion, not merely with the territory of Judea, so 'Jew'
    best fits the narrative force.
