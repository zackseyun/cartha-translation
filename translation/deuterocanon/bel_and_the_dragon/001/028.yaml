id: BEL.1.28
reference: Bel and the Dragon 1:28
source:
  edition: lxx-swete-1909
  text: καὶ ἐγένετο ὡς ἤκουσαν οἱ Βαβυλώνιοι, ἠγανάκτησαν καὶ συνεστράφησαν ἐπὶ τὸν
    βασιλέα καὶ εἶπαν Ἰουδαῖος γέγονεν ὁ βασιλεύς· τὸν Βὴλ κατέσπασενν καὶ τὸν δράκοντα
    ἀπέκτεινεν, καὶ τοὺς ἱερεῖς κατέσφαξεν.
  language: Greek
  pages:
