translation:
  text: And it happened that when the Babylonians heard, they became indignant and
    gathered together against the king and said, “The king has become a Jew; he has
    torn down Bel and killed the dragon and slaughtered the priests.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The king has become a Judean.” The Greek Ἰουδαῖος can denote either
      ethnic-religious identity (“Jew”) or geographic-political identity (“Judean”).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ὡς ἤκουσαν
  chosen: it happened that when ... heard
  alternatives:
  - when ... heard
  - as soon as ... heard
  lexicon: BDAG
  rationale: The idiom καὶ ἐγένετο ὡς introduces a narrative transition. 'It happened
    that when' preserves the Semitic-flavored narrative formula without becoming too
    wooden; 'as soon as' would overstate immediacy not explicit in the phrase.
- source_word: οἱ Βαβυλώνιοι
  chosen: the Babylonians
  alternatives:
  - the people of Babylon
  lexicon: BDAG
  rationale: A straightforward ethnic/civic designation; 'the Babylonians' is the
    natural English equivalent.
- source_word: ἠγανάκτησαν
  chosen: became indignant
  alternatives:
  - were enraged
  - were angry
  lexicon: BDAG
  rationale: The verb denotes strong displeasure or indignation. 'Became indignant'
    captures the emotional force while leaving room for the following hostile action
    to intensify the scene.
- source_word: συνεστράφησαν ἐπὶ τὸν βασιλέα
  chosen: gathered together against the king
  alternatives:
  - turned against the king
  - conspired against the king
  lexicon: BDAG
  rationale: The middle/passive form with ἐπί here suggests collective movement/alignment
    against the king. 'Gathered together against' reflects the physical and political
    sense without importing the more specific idea of secret plotting implied by 'conspired.'
- source_word: Ἰουδαῖος γέγονεν ὁ βασιλεύς
  chosen: The king has become a Jew
  alternatives:
  - The king has become Judean
  lexicon: BDAG
  rationale: Ἰουδαῖος can mean 'Jew' or 'Judean.' In this deuterocanonical narrative
    context, the accusation is ethnic-religious rather than narrowly geographic, so
    'Jew' is the clearer English rendering.
- source_word: τὸν Βὴλ κατέσπασεν
  chosen: he has torn down Bel
  alternatives:
  - he has destroyed Bel
  - he has pulled down Bel
  lexicon: BDAG
  rationale: The verb means to pull down or demolish. Since Bel is the idol/shrine
    as represented in the narrative, 'torn down Bel' preserves the direct object as
    written while communicating the destruction of the cult image or sanctuary.
- source_word: τὸν δράκοντα ἀπέκτεινεν
  chosen: killed the dragon
  alternatives:
  - put the dragon to death
  - slew the dragon
  lexicon: BDAG
  rationale: A simple past accusation in direct speech; 'killed' is clear modern English.
- source_word: τοὺς ἱερεῖς κατέσφαξεν
  chosen: slaughtered the priests
  alternatives:
  - killed the priests
  - butchered the priests
  lexicon: BDAG
  rationale: κατασφάζω is stronger than ordinary 'kill,' often implying violent slaughter.
    'Slaughtered' preserves that severity without sounding overly colloquial.
