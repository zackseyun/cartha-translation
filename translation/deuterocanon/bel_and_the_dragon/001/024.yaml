reference: Bel and the Dragon 1:24
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν ὁ βασιλεὺς τῷ Δανιὴλ Οὐ δύνασαι εἰπεῖν ὅτι οὐκ ἔστιν οὗτος θεὸς
    ζῶν· καὶ προσκύνησον αὐτῷ.
  language: Greek
  pages:
  - 614
  confidence: high
  validation: normalized_direct_extract
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone Bel extraction currently
