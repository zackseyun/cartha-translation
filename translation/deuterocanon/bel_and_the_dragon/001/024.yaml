translation:
  text: And the king said to Daniel, “You cannot say that this is not a living god;
    so bow down to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “worship him.” The Greek verb can refer to bowing down in homage or to
      worship, especially when directed toward a deity.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ δύνασαι εἰπεῖν
  chosen: You cannot say
  alternatives:
  - You are not able to say
  - You cannot claim
  lexicon: BDAG
  rationale: A straightforward rendering of negated δύναμαι + infinitive. 'You cannot
    say' preserves the king's challenge without overinterpreting whether he means
    inability, permission, or rhetorical impossibility.
- source_word: οὐκ ἔστιν οὗτος θεὸς ζῶν
  chosen: this is not a living god
  alternatives:
  - this is no living god
  - this is not a god who lives
  lexicon: BDAG
  rationale: θεὸς ζῶν is rendered naturally as 'living god.' The anarthrous θεός in
    this context does not require 'the living God,' since the king is speaking of
    the idol Bel as a deity, not making Israel's confessional claim about the one
    true God.
- source_word: προσκύνησον αὐτῷ
  chosen: bow down to him
  alternatives:
  - worship him
  - do obeisance to him
  lexicon: BDAG
  rationale: προσκυνέω can mean either prostration/obeisance or worship depending
    on context. Here the object is a supposed deity, so 'worship him' is possible,
    but 'bow down to him' preserves the physical act explicitly while allowing the
    religious force to remain implicit in context.
- source_word: βασιλεὺς
  chosen: the king
  alternatives:
  - king
  lexicon: BDAG
  rationale: The article is naturally represented in English as 'the king,' identifying
    the known royal speaker in the narrative.
- source_word: τῷ Δανιήλ
  chosen: to Daniel
  lexicon: BDAG
  rationale: Standard dative of indirect object; the personal name is transliterated
    per project philosophy.
