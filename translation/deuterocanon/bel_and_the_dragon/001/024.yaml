theological_decisions:
- issue: Whether θεὸς ζῶν should be capitalized or rendered as a title associated
    with the true God
  chosen_reading: living god
  alternative_readings:
  - the living God
  rationale: The speaker is a pagan king referring to Bel. Capitalizing 'God' or using
    the familiar biblical title 'the living God' would risk importing Israelite theological
    affirmation into the king's claim about an idol. Lowercase 'god' preserves the
    narrative irony and the speaker's perspective.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
- issue: Whether προσκύνησον should be rendered with explicitly religious language
  chosen_reading: bow down to him
  alternative_readings:
  - worship him
  rationale: Because προσκυνέω can denote both bodily prostration and worship, the
    main text keeps the more concrete expression. In this context the act is religious,
    but the less interpretive rendering better matches optimal equivalence and leaves
    the theological implication to the narrative context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not paraphrase
    beyond what the source warrants.'
