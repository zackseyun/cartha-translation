translation:
  text: And Cyrus the Persian received his kingdom, and Daniel was a companion of
    the king and honored above all his friends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courtiers' or 'companions'; in royal contexts, 'friends' can refer to
      the king's close associates at court.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλαβεν
  chosen: received
  alternatives:
  - took over
  - inherited
  - obtained
  lexicon: BDAG
  rationale: The verb παραλαμβάνω here denotes coming into possession of royal rule.
    'Received' is a natural English rendering that stays close to the Greek without
    over-specifying the manner of accession, unlike 'took over' or 'inherited'.
- source_word: τὴν βασιλείαν αὐτοῦ
  chosen: his kingdom
  alternatives:
  - his kingship
  - the kingdom
  lexicon: BDAG
  rationale: βασιλεία can mean reign, kingship, or kingdom. In this narrative setting,
    'his kingdom' communicates receipt of royal rule/domain in idiomatic English.
    'Kingship' is possible but less natural here.
- source_word: συνβιωτής
  chosen: a companion
  alternatives:
  - an intimate associate
  - a close companion
  - one living with
  lexicon: LSJ
  rationale: The rare term literally suggests one who lives together with another,
    but in court context it points to close association with the king. 'Companion'
    preserves the relational closeness without implying cohabitation too woodenly.
- source_word: ἔνδοξος
  chosen: honored
  alternatives:
  - glorious
  - distinguished
  - held in honor
  lexicon: BDAG
  rationale: ἔνδοξος denotes being esteemed or held in honor. 'Honored' fits the courtly
    context and reads naturally in English. 'Glorious' would sound overstated here.
- source_word: ὑπὲρ πάντας τοὺς φίλους αὐτοῦ
  chosen: above all his friends
  alternatives:
  - above all his companions
  - more than all his courtiers
  lexicon: BDAG
  rationale: φίλοι in royal settings can refer to the king's friends or court associates.
    The literal 'friends' is retained in the main text for transparency, while the
    courtly nuance is worth preserving as an alternative.
