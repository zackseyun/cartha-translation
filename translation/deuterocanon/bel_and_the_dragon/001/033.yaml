  text: καὶ ἦν Ἀμβακοὺμ ὁ προφήτης ἐν τῇ Ἰουδαίᾳ, καὶ αὐτὸς ἥψησεν ἕψεμα καὶ ἐνέ-
    θρυψεν ἄρτους εἰς σκάφην, καὶ ἐπορεύετο εἰς τὸ πεδίον ἀπενέγκαι τοῖς θερισταῖς.
  language: Greek
  pages:
