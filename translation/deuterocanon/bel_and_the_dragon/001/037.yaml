lexical_decisions:
- source_word: ἐβόησεν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: BDAG
  rationale: The verb denotes a loud vocal utterance. 'Cried out' preserves the force
    better than the flatter 'said' or 'called,' while fitting the narrative scene.
- source_word: Ἀμβακοὺμ
  chosen: Habakkuk
  alternatives:
  - Ambakoum
  rationale: Standard English transliteration for the prophet's name, rather than
    a more mechanical transliteration from the Greek form.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: A participle introducing direct speech; 'saying' keeps the Greek structure
    naturally in English when paired with 'cried out.'
- source_word: Δανιὴλ Δανιήλ
  chosen: Daniel, Daniel
  rationale: The repeated vocative should be preserved, since it conveys urgency and
    direct address.
- source_word: Β
  chosen: take the meal that God has sent you
  alternatives:
  - behold, the meal that God has sent you
  - see, God has sent you a meal
  rationale: The source text as provided is truncated at the direct speech after the
    repeated name, ending with an isolated beta. In the standard continuation of this
    verse in the Theodotion/Bel narrative, Habakkuk announces the food sent by God
    to Daniel. Because the supplied text appears cut off, the translation reflects
    the verse's known continuation while acknowledging the source-level truncation
    in a footnote.
