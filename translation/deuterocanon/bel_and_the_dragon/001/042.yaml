  text: Δανιήλ, καὶ οὐκ ἔστιν πλὴν σοῦ ἄλλος. καὶ ἀνέσπασεν αὐτόν, † Δ τοὺς δὲ αἰτίους
    τῆς ἀπωλείας αὐτοῦ ἐνέβαλεν εἰς τὸν λάκκον, καὶ κατεβρώθησαν παραχρῆμα ἐνώπιον
    αὐτοῦ.
  language: Greek
  pages:
