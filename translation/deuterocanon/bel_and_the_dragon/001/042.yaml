translation:
  text: Daniel, and there is no other besides you. And he pulled him up. But he threw
    those responsible for his destruction into the pit, and they were devoured at
    once before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek opens abruptly with 'Daniel, and there is no other besides you,'
      likely continuing speech from the previous verse; some translations smooth this
      by adding words such as 'the king said.'
    reason: textual_variant
  - marker: b
    text: Or 'into the den.' The Greek word is literally 'pit,' though the context
      is the lions' pit.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔστιν πλὴν σοῦ ἄλλος
  chosen: there is no other besides you
  alternatives:
  - there is no one else except you
  - none other exists but you
  lexicon: LSJ
  rationale: 'πλὴν σοῦ with ἄλλος expresses exclusivity: ''no other besides you.''
    This preserves the emphatic praise directed to Daniel without overexpansion.'
- source_word: ἀνέσπασεν
  chosen: pulled ... up
  alternatives:
  - drew ... up
  - lifted ... out
  lexicon: LSJ
  rationale: The verb commonly means to draw or pull up, especially from below. In
    context of the pit/lions' den, 'pulled him up' is natural modern English and keeps
    the vertical sense.
- source_word: τοὺς ... αἰτίους
  chosen: those responsible for
  alternatives:
  - the guilty parties for
  - those who caused
  lexicon: LSJ
  rationale: αἴτιος can mean responsible, guilty, or causative. 'Those responsible
    for' captures both culpability and agency without sounding overly technical.
- source_word: τῆς ἀπωλείας αὐτοῦ
  chosen: his destruction
  alternatives:
  - his ruin
  - his death
  lexicon: LSJ
  rationale: ἀπώλεια denotes destruction or ruin. 'His destruction' is broad enough
    to reflect the Greek without specifying death more narrowly than the text does,
    though death is implied by the attempted execution.
- source_word: ἐνέβαλεν εἰς τὸν λάκκον
  chosen: threw ... into the pit
  alternatives:
  - cast ... into the den
  - put ... into the pit
  lexicon: LSJ
  rationale: λάκκος is literally 'pit' or 'cistern.' Since the Greek says pit, the
    translation keeps that wording rather than importing 'den' from contextual tradition.
- source_word: κατεβρώθησαν
  chosen: were devoured
  alternatives:
  - were eaten up
  - were consumed
  lexicon: LSJ
  rationale: The passive conveys being eaten/devoured, fitting the lions' action.
    'Were devoured' is vivid and idiomatic.
- source_word: παραχρῆμα
  chosen: at once
  alternatives:
  - immediately
  - instantly
  lexicon: LSJ
  rationale: παραχρῆμα indicates immediacy. 'At once' is concise and natural.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  - before his eyes
  lexicon: LSJ
  rationale: The phrase literally means 'before him/in his presence.' 'Before him'
    is the most direct rendering; the referent is the king in context.
