id: BEL.1.21
reference: Bel and the Dragon 1:21
source:
  edition: lxx-swete-1909
  text: καὶ ὀργισθεὶς ὁ βασιλεὺς τότε συνέλαβεν τοὺς ἱερεῖς καὶ τὰς γυναῖκας καὶ τὰ
    τέκνα αὐτῶν, καὶ ἔδειξαν αὐτῷ τὰς κρυπτὰς θύρας διʼ ὧν εἰσεπορεύοντο καὶ ἐδαπά-
