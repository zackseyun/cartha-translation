translation:
  text: Then the king became angry and arrested the priests and their wives and children,
    and they showed him the secret doors through which they used to go in and consume
    what was on the table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hidden doors.'
    reason: lexical_alternative
  - marker: b
    text: Or 'through which they entered and consumed the things on the table.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργισθεὶς
  chosen: became angry
  alternatives:
  - was enraged
  - grew angry
  lexicon: BDAG
  rationale: Aorist passive participle from ὀργίζω used in an intransitive/passive
    sense. 'Became angry' is natural modern English and preserves the narrative force
    without overstating intensity.
- source_word: συνέλαβεν
  chosen: arrested
  alternatives:
  - seized
  - took into custody
  lexicon: BDAG
  rationale: In this judicial context, where the king acts against the priests and
    their families after discovering deception, 'arrested' best conveys formal seizure
    rather than mere physical grabbing.
- source_word: ἱερεῖς
  chosen: priests
  alternatives:
  - temple priests
  lexicon: BDAG
  rationale: Standard rendering of ἱερεύς. The context already makes clear these are
    Bel's priests, so the simple term is sufficient.
- source_word: γυναῖκας
  chosen: wives
  alternatives:
  - women
  lexicon: BDAG
  rationale: Although γυνή can mean either 'woman' or 'wife,' the possessive αὐτῶν
    and household grouping with 'children' strongly favor 'their wives' here.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: BDAG
  rationale: τέκνα is the broad familial term 'children,' not specifically male offspring.
- source_word: κρυπτὰς θύρας
  chosen: secret doors
  alternatives:
  - hidden doors
  - concealed entrances
  lexicon: BDAG
  rationale: The phrase refers to concealed access points used for the fraud. 'Secret
    doors' is idiomatic and concrete.
- source_word: διʼ ὧν εἰσεπορεύοντο
  chosen: through which they used to go in
  alternatives:
  - through which they entered
  - by which they would go in
  lexicon: BDAG
  rationale: The imperfect/middle-deponent form conveys customary past action. 'Used
    to go in' captures repeated practice in clear English.
- source_word: ἐδαπάνων
  chosen: consume
  alternatives:
  - devour
  - spend/use up
  - eat up
  lexicon: BDAG
  rationale: From δαπανάω, literally 'spend' or 'consume.' In context of food on the
    table, 'consume' preserves the broader verb while fitting the narrative better
    than the more colloquial 'eat up.'
- source_word: τὰ ἐπὶ τῇ τραπέζῃ
  chosen: what was on the table
  alternatives:
  - the things on the table
  - the food on the table
  lexicon: BDAG
  rationale: The neuter plural article with prepositional phrase refers to the items
    set out on the table. 'What was on the table' is natural and avoids adding 'food'
    explicitly, though that is implied by context.
