translation:
  text: And there was a great dragon, and the Babylonians worshiped it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revered it' or 'venerated it'; the Greek verb can denote religious reverence,
      here likely cultic worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: δράκων
  chosen: dragon
  alternatives:
  - serpent
  lexicon: LSJ
  rationale: The standard Greek term here denotes a dragon or large serpent. In this
    narrative context, 'dragon' best matches the creature as presented in the text
    and in English literary expectation for Bel and the Dragon.
- source_word: μέγας
  chosen: great
  alternatives:
  - large
  lexicon: LSJ
  rationale: μέγας commonly means 'great' or 'large.' 'Great' preserves the elevated
    narrative tone and can include size without reducing the term to mere physical
    dimensions.
- source_word: ἐσέβοντο
  chosen: worshiped
  alternatives:
  - revered
  - venerated
  lexicon: BDAG
  rationale: The verb σέβομαι often refers to religious reverence or worship. Given
    the object is the dragon as a cultic figure for the Babylonians, 'worshiped' most
    clearly conveys religious devotion rather than mere respect.
- source_word: οἱ Βαβυλώνιοι
  chosen: the Babylonians
  alternatives:
  - the people of Babylon
  lexicon: LSJ
  rationale: A straightforward ethnic/national designation. 'The Babylonians' is the
    most natural and direct rendering.
