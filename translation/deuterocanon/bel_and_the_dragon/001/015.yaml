translation:
  text: But the priests came by night, according to their custom, and the women
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek γυναῖκες can mean either 'women' or 'wives.' The immediate wording
      here does not specify which, so 'women' is retained in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: But the
  alternatives:
  - and the
  - now the
  lexicon: LSJ
  rationale: δέ here marks narrative continuation with mild contrast or transition.
    'But' preserves the adversative/continuative force naturally in English narrative.
- source_word: ἱερεῖς
  chosen: priests
  alternatives:
  - the priests
  lexicon: LSJ
  rationale: Standard rendering for ἱερεῖς. The article is carried in English as 'the
    priests' within the clause.
- source_word: ἦλθον
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: LSJ
  rationale: Aorist of ἔρχομαι; 'came' is the most straightforward narrative rendering
    in context.
- source_word: τὴν νύκτα
  chosen: by night
  alternatives:
  - in the night
  - during the night
  lexicon: LSJ
  rationale: Idiomatic temporal accusative. 'By night' is concise and natural, preserving
    the nocturnal timing.
- source_word: κατὰ τὸ ἔθος αὐτῶν
  chosen: according to their custom
  alternatives:
  - as was their custom
  - according to their habit
  lexicon: LSJ
  rationale: ἔθος denotes customary practice. 'According to their custom' stays close
    to the Greek while remaining readable.
- source_word: καὶ αἱ γυναῖκες
  chosen: and the women
  alternatives:
  - and their wives
  - and the wives
  lexicon: LSJ
  rationale: γυναῖκες can mean 'women' or 'wives' depending on context. With only
    this clause present in the source witness, the safer non-interpretive rendering
    is 'women.' The broader narrative may imply wives, but that is not explicit here
    in the extracted wording.
