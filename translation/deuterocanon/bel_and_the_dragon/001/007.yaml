translation:
  text: Does he drink every day? Then Daniel said with a laugh, “Do not be deceived,
    O king; for this one is clay inside and bronze outside, and never—”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness provided for this verse breaks off after 'and never—'
      (καὶ οὐ), so the sentence is incomplete in the source excerpt used here.
    reason: textual_variant
lexical_decisions:
- source_word: πίνει
  chosen: drink
  alternatives:
  - drinks
  - consume
  lexicon: LSJ
  rationale: The verb means 'to drink.' Because the Greek clause is a question introduced
    by context and followed by καθʼ ἑκάστην ἡμέραν, English idiom is best as 'Does
    he drink every day?' rather than a more wooden 'He drinks every day?'.
- source_word: καθʼ ἑκάστην ἡμέραν
  chosen: every day
  alternatives:
  - each day
  - daily
  lexicon: LSJ
  rationale: Standard distributive expression meaning 'every day' or 'each day.' 'Every
    day' is the most natural modern English.
- source_word: γελάσας
  chosen: with a laugh
  alternatives:
  - laughing
  - smiling
  lexicon: LSJ
  rationale: Aorist participle from γελάω, indicating Daniel's manner as he speaks.
    'With a laugh' preserves the participial nuance in readable English. 'Smiling'
    is too weak.
- source_word: Μὴ πλανῶ
  chosen: Do not be deceived
  alternatives:
  - Do not be led astray
  - Do not err
  lexicon: LSJ
  rationale: The phrase is textually awkward in isolation, but the sense is a prohibition
    against being misled. 'Do not be deceived' fits the immediate context of exposing
    the idol's fraud better than 'Do not err.'
- source_word: βασιλεῦ
  chosen: O king
  alternatives:
  - king
  lexicon: LSJ
  rationale: Vocative direct address. 'O king' preserves the formal address and suits
    the narrative register.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - this god
  - this idol
  - he
  lexicon: LSJ
  rationale: The demonstrative literally means 'this one.' In context it refers to
    Bel/the idol, but the Greek does not supply 'god' or 'idol' here, so the more
    transparent rendering is retained.
- source_word: ἔσωθέν
  chosen: inside
  alternatives:
  - within
  - inwardly
  lexicon: LSJ
  rationale: Adverb meaning 'from within/inside.' Here it contrasts with ἔξωθεν and
    describes the idol's composition.
- source_word: πηλός
  chosen: clay
  alternatives:
  - mud
  lexicon: LSJ
  rationale: Refers to clay or earthen material. 'Clay' is the standard and fits an
    idol's inner construction.
- source_word: ἔξωθεν
  chosen: outside
  alternatives:
  - on the outside
  - externally
  lexicon: LSJ
  rationale: Natural counterpart to ἔσωθεν; 'outside' is concise and clear.
- source_word: χαλκός
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: LSJ
  rationale: In biblical Greek χαλκός commonly denotes copper/bronze metal. 'Bronze'
    is the usual English rendering for an object plated or fashioned with this metal;
    'brass' is anachronistic.
