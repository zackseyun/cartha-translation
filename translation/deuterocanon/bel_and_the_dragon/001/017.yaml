reference: Bel and the Dragon 1:17
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν Σῶοι αἱ σφραγῖδες, Δανιήλ; ὁ δὲ εἶπεν Σῶοι, βασιλεῦ.
  language: Greek
  pages:
