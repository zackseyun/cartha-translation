translation:
  text: And he said, “Are the seals intact, Daniel?” And he said, “They are intact,
    O king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Are the seals safe/sound, Daniel?... Safe/sound, O king.' The
      translation uses 'intact' because the context concerns whether the seals have
      remained undisturbed.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σῶοι
  chosen: intact
  alternatives:
  - safe
  - unbroken
  - sound
  lexicon: LSJ
  rationale: The adjective means 'safe/sound' and here refers to the condition of
    the seals. 'Intact' is the most natural English rendering for seals that have
    not been disturbed, preserving the forensic sense of the question.
- source_word: αἱ σφραγῖδες
  chosen: the seals
  alternatives:
  - seal-marks
  - seals
  lexicon: LSJ
  rationale: σφραγῖδες refers to seals or seal impressions used to secure an entry.
    'The seals' is the straightforward rendering in context.
- source_word: βασιλεῦ
  chosen: O king
  alternatives:
  - king
  - my king
  lexicon: LSJ
  rationale: The vocative is direct address. 'O king' preserves the formal vocative
    force without adding possessive nuance not present in the Greek.
- source_word: καὶ εἶπεν ... ὁ δὲ εἶπεν
  chosen: And he said ... And he said
  alternatives:
  - And he asked ... and he answered
  - Then he said ... and he said
  lexicon: LSJ
  rationale: The Greek repeats the common narrative verb λέγω. English could idiomatically
    vary it to 'asked/answered,' but retaining 'said' keeps closer to the source while
    remaining readable.
