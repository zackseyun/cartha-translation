translation:
  text: But they threw him into the lions' pit, and he was there for six days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English often reads 'lions' den'; the Greek more literally says
      'lions' pit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔβαλον
  chosen: threw
  alternatives:
  - cast
  - put
  lexicon: BDAG
  rationale: Aorist of βάλλω commonly means 'throw' or 'cast.' 'Threw' is natural
    modern English and preserves the forceful action better than the weaker 'put.'
- source_word: λάκκον
  chosen: pit
  alternatives:
  - den
  - cistern
  lexicon: LSJ
  rationale: λάκκος is literally a pit or hole. Although English tradition often uses
    'lions' den,' the Greek here says 'pit.' 'Pit' stays closer to the source while
    remaining clear.
- source_word: τῶν λεόντων
  chosen: of the lions
  alternatives:
  - lions'
  lexicon: BDAG
  rationale: Genitive plural specifying the pit as belonging to or associated with
    the lions. In the English text this is rendered idiomatically as 'the lions' pit.'
- source_word: ἡμέρας ἕξ
  chosen: for six days
  alternatives:
  - six days
  lexicon: BDAG
  rationale: Accusative of extent of time indicates duration. 'For six days' makes
    the temporal force explicit in natural English.
- source_word: οἱ δὲ
  chosen: But they
  alternatives:
  - And they
  - Then they
  lexicon: BDAG
  rationale: δέ marks continuation with mild contrast or progression. 'But they' preserves
    the adversative nuance without overstating it.
