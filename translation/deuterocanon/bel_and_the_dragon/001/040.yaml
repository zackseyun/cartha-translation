id: BEL.1.40
reference: Bel and the Dragon 1:40
source:
  edition: lxx-swete-1909
  text: κατέστησεν τὸν Ἀμβακοὺμ παραχρῆμα εἰς τὸν τόπον αὐτοῦ. ὁ δὲ Βασιλεὺς ἦλθεν
    τῇ ἡμέρᾳ τῇ ἑβδόμῃ πενθῆσαι τὸν Δανιήλ, καὶ ἦλθεν ἐπὶ τὸν λάκκον καὶ ἐνέβλεψεν,
    καὶ ἰδοὺ Δανιὴλ καθήμενος.
  language: Greek
  pages:
  - 616
  confidence: high
  validation: normalized_direct_extract
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone Bel extraction currently
    follows the complete Theodotion stream in Swete, because that stream is the cleanest
    fully numbered extract available in the current corpus.
translation:
  text: He set Habakkuk down at once in his own place. Then the king came on the seventh
    day to mourn for Daniel, and he came to the pit and looked in, and behold, Daniel
    was sitting there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his own place.' The Greek phrase can be rendered either with 'to'
      or, after 'set down,' more idiomatically as 'in.'
    reason: lexical_alternative
  - marker: b
    text: Or 'den.' The Greek says 'pit' (λάκκος), a broader term than a specialized
      word for a lions' den.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέστησεν
  chosen: set ... down
  alternatives:
  - placed
  - restored
  - stationed
  lexicon: BDAG
  rationale: In context of the angel returning Habakkuk after transporting him, the
    verb conveys causing someone to be in a place. 'Set ... down' is natural English
    that preserves the concrete action without overformal stiffness.
- source_word: παραχρῆμα
  chosen: at once
  alternatives:
  - immediately
  - instantly
  lexicon: BDAG
  rationale: The adverb marks immediacy. 'At once' is idiomatic modern English and
    preserves the temporal force.
- source_word: εἰς τὸν τόπον αὐτοῦ
  chosen: in his own place
  alternatives:
  - to his place
  - to his own place
  lexicon: BDAG
  rationale: The phrase indicates Habakkuk's proper/original location. 'In his own
    place' reads smoothly after 'set ... down' and preserves possession.
- source_word: πενθῆσαι
  chosen: to mourn for
  alternatives:
  - to lament
  - to grieve over
  lexicon: BDAG
  rationale: The infinitive expresses the king's purpose in coming. 'Mourn for' best
    captures bereavement-like lament in accessible English.
- source_word: λάκκον
  chosen: pit
  alternatives:
  - den
  - cistern
  lexicon: LSJ
  rationale: The Greek term is broader than 'den' and literally means a pit/cavity.
    Since the text itself says λάκκος, 'pit' stays closer to the source; the lion
    context is supplied by the wider narrative, not this noun alone.
- source_word: ἐνέβλεψεν
  chosen: looked in
  alternatives:
  - looked
  - peered in
  - gazed into
  lexicon: BDAG
  rationale: With ἐπί plus the pit as destination, the sense is that he looked into
    it. 'Looked in' is concise and natural.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - and there was
  lexicon: BDAG
  rationale: The particle marks sudden discovery and narrative vividness. 'Behold'
    preserves that force better than flattening it away, while remaining understandable
    in this literary context.
- source_word: καθήμενος
  chosen: was sitting there
  alternatives:
  - was seated
  - was sitting
  lexicon: BDAG
  rationale: The participle describes Daniel's posture when seen. 'Was sitting there'
    makes the scene vivid and supplies the locative sense naturally in English.
