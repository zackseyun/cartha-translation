theological_decisions:
- issue: Rendering τὰ σεβάσματα ὑμῶν in a polemical anti-idolatry context
  chosen_reading: your objects of worship
  alternative_readings:
  - your idols
  - your sacred things
  rationale: The Greek term itself refers to revered objects, not necessarily using
    the most pejorative available term. 'Your objects of worship' preserves the literal
    force and lets the narrative's irony carry the polemic without adding interpretive
    sharpness beyond the wording.
  doctrine_reference: 'Translation philosophy: original-language primacy; avoid importing
    claims the text does not make.'
