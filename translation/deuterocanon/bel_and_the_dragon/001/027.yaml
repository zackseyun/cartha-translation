id: BEL.1.27
reference: Bel and the Dragon 1:27
source:
  edition: lxx-swete-1909
  text: καὶ ἔλαβεν Δανιὴλ πίσσαν καὶ στῖρ καὶ τρίχας, καὶ ἥψησεν ἐπὶ τὸ αὐτὸ καὶ ἐποίησεν
    μάζας, καὶ ἔδωκεν εἰς τὸ στόμα τοῦ δράκοντος· καὶ φαγὼν διερράγη ὁ δράκων. καὶ
    εἶπεν Ἴδετε τὰ σεβάσματα ὑμῶν.
  language: Greek
