translation:
  text: And Daniel took pitch and fat and hair, and boiled them together and made
    cakes, and put them into the dragon’s mouth; and when the dragon had eaten them,
    it burst apart. And he said, “See your objects of worship.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your sacred things” or “the things you revere”; the Greek refers to
      objects held in reverence or worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίσσαν
  chosen: pitch
  alternatives:
  - bitumen
  - tar
  lexicon: LSJ
  rationale: πίσσα commonly denotes pitch/resinous tar-like material. 'Pitch' is concise,
    natural English and fits the narrative context of a combustible or sticky substance
    used in the mixture.
- source_word: στῖρ
  chosen: fat
  alternatives:
  - tallow
  - suet
  lexicon: LSJ
  rationale: The term denotes animal fat. 'Fat' is the broadest and most accessible
    rendering; 'tallow' or 'suet' are possible but more specific or less common in
    modern English.
- source_word: τρίχας
  chosen: hair
  lexicon: LSJ
  rationale: Literal plural of 'hair.' No contextual reason to generalize or paraphrase.
- source_word: ἥψησεν ἐπὶ τὸ αὐτό
  chosen: boiled them together
  alternatives:
  - cooked them together
  - boiled them into one mixture
  lexicon: LSJ
  rationale: ἕψω commonly means boil/cook. With ἐπὶ τὸ αὐτό, the sense is combining
    the ingredients into one prepared mixture. 'Boiled them together' preserves both
    the cooking action and the combining sense.
- source_word: μάζας
  chosen: cakes
  alternatives:
  - lumps
  - balls
  - loaves
  lexicon: LSJ
  rationale: μᾶζα refers to a cake or lump of kneaded food. 'Cakes' best fits the
    formed portions Daniel makes from the mixture before feeding the dragon.
- source_word: δράκοντος
  chosen: dragon
  alternatives:
  - serpent
  lexicon: LSJ
  rationale: The narrative explicitly concerns a δράκων in Bel and the Dragon. 'Dragon'
    is the standard and contextually appropriate rendering, while 'serpent' would
    understate the literary setting.
- source_word: φαγὼν
  chosen: when the dragon had eaten them
  alternatives:
  - after eating
  - having eaten
  lexicon: LSJ
  rationale: The aorist participle is naturally rendered temporally in English here.
    Expanding the subject and object improves readability while preserving the sequence.
- source_word: διερράγη
  chosen: it burst apart
  alternatives:
  - it split open
  - it burst
  lexicon: LSJ
  rationale: The verb conveys violent rupture. 'Burst apart' communicates the dramatic
    result clearly in idiomatic English.
- source_word: τὰ σεβάσματα ὑμῶν
  chosen: your objects of worship
  alternatives:
  - your sacred things
  - the things you revere
  - your idols
  lexicon: LSJ
  rationale: σεβάσματα denotes revered or worshiped objects. 'Objects of worship'
    preserves the broader sense without importing the more interpretive 'idols,' though
    that idea is certainly present in context.
