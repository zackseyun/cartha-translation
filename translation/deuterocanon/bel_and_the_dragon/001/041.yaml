lexical_decisions:
- source_word: ἀναβοήσας
  chosen: crying out
  alternatives:
  - shouting
  - calling out
  lexicon: BDAG
  rationale: Aorist participle from ἀναβοάω denotes a forceful vocal outcry. 'Crying
    out' preserves the intensity without over-specifying the emotional tone.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: This is a common idiom meaning audible intensity. 'With a loud voice'
    stays close to the Greek form while remaining natural English.
- source_word: Μέγας εἶ
  chosen: Great are you
  alternatives:
  - You are great
  - Great are you indeed
  lexicon: BDAG
  rationale: The predicate adjective placed first gives emphasis. 'Great are you'
    preserves the elevated, exclamatory tone better than the flatter 'You are great.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In direct address here it functions
    as a divine title.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. The article is not separately represented
    in English because 'Lord God' is the natural idiomatic form in direct address.
- source_word: τοῦ
  chosen: of the
  lexicon: BDAG
  rationale: The surviving source text ends with the genitive article τοῦ, indicating
    the phrase continues into the next verse or line. It should be translated as 'of
    the' rather than omitted, despite the resulting incompleteness in English, because
    the Zone 1 witness for this verse is itself truncated.
