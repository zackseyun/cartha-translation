translation:
  text: you. And Daniel rose and ate, and the angel of God departed—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek extract for this verse is truncated at the final word (ἀπε-),
      so the ending is represented as incomplete here. The sense is that the angel
      of God departed or went away.
    reason: textual_variant
lexical_decisions:
- source_word: σε
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Second-person singular pronoun; in this verse fragment it completes the
    preceding speech. English keeps the direct object as 'you,' though the full clause
    depends on the prior verse.
- source_word: ἀναστὰς
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι, commonly marking getting up/rising before
    the main action. 'Rose' is concise and suitably formal without being archaic.
- source_word: ἔφαγεν
  chosen: ate
  alternatives:
  - did eat
  lexicon: BDAG
  rationale: Simple aorist of ἐσθίω; straightforward narrative past is best.
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In this narrative context the referent is the heavenly being who transported
    Habakkuk; 'angel' is the natural and contextually established rendering.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: Genitive construction modifying 'angel'; 'angel of God' is the standard
    and most direct rendering.
- source_word: ἀπε-
  chosen: departed—
  alternatives:
  - went away—
  - left—
  lexicon: BDAG
  rationale: The source line is cut off at ἀπε-, almost certainly the beginning of
    a verb of departure (commonly ἀπῆλθεν in this context). Because the extract is
    truncated at line end, the English marks continuation with an em dash to reflect
    source-level incompleteness honestly rather than pretending the final form is
    fully visible in Zone 1.
