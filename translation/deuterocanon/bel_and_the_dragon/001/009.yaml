translation:
  text: this expense, you will die; but if you show that Bel eats them, Daniel will
    die, because he has blasphemed against Bel. And
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''And''—the sentence continues into the next verse in the source
      text.'
    reason: textual_variant
lexical_decisions:
- source_word: δαπάνην
  chosen: expense
  alternatives:
  - cost
  - expenditure
  lexicon: LSJ
  rationale: The noun denotes expense or cost. In context the speakers are referring
    back to the outlay for Bel's provisions, so 'expense' is a natural modern rendering
    without over-paraphrasing.
- source_word: ἀποθανεῖσθε
  chosen: you will die
  alternatives:
  - you shall die
  - you must die
  lexicon: BDAG
  rationale: Future middle indicative used as a judicial threat or sentence. 'You
    will die' preserves the force in readable modern English; 'shall die' is possible
    but more archaic.
- source_word: δείξητε
  chosen: you show
  alternatives:
  - you prove
  - you demonstrate
  lexicon: BDAG
  rationale: The verb means to show or demonstrate. 'Show' keeps close to the Greek
    while still fitting the legal-challenge context.
- source_word: κατεσθίει
  chosen: eats
  alternatives:
  - devours
  - consumes
  lexicon: LSJ
  rationale: The compound verb intensifies eating, but in this context simple 'eats'
    is sufficient and idiomatic; stronger options like 'devours' risk overstating
    the tone.
- source_word: ἐβλασφήμησεν εἰς τὸν Βήλ
  chosen: he has blasphemed against Bel
  alternatives:
  - he blasphemed against Bel
  - he has spoken irreverently against Bel
  lexicon: BDAG
  rationale: βλασφημέω is best rendered 'blaspheme' here because the accusation concerns
    insulting a deity. 'Against Bel' reflects εἰς with hostile direction. The perfect-like
    English 'has blasphemed' suits the causal clause explaining the death sentence.
- source_word: καὶ
  chosen: And
  alternatives:
  - and then
  - —
  lexicon: LSJ
  rationale: The source verse ends with καὶ, clearly continuing into the next verse.
    It should be represented rather than omitted, even though it leaves the English
    sentence open-ended.
