theological_decisions:
- issue: Rendering of βλασφημέω in a pagan setting
  chosen_reading: blasphemed against Bel
  alternative_readings:
  - spoken sacrilegiously against Bel
  - spoken against Bel
  rationale: Although 'blaspheme' is often used in biblical contexts involving the
    true God, the Greek term itself can denote reviling or impious speech against
    a deity more generally. Since the speakers regard Bel as a god and the charge
    is religious, 'blasphemed' best preserves the accusation without endorsing Bel's
    divinity.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
