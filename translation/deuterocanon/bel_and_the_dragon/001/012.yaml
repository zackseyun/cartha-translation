id: BEL.1.12
reference: Bel and the Dragon 1:12
source:
  edition: lxx-swete-1909
  text: καὶ σφράγισον τῷ δακτυλίῳ σου. καὶ ἐλθὼν πρωὶ ἐὰν μὴ εὕρῃς πάντα βεβρωμένα
    ὑπὸ τοῦ Βήλ, ἀποθανούμεθα, ἢ Δανιὴλ ὁ ψευδό- μενος καθʼ ἡμῶν.
  language: Greek
