translation:
  text: And seal it with your ring. Then, when you come in the morning, if you do
    not find everything eaten by Bel, we will die—or else Daniel, who is lying against
    us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who is falsely accusing us.' The Greek phrase can carry the sense of
      lying against someone in an accusatory way.
    reason: lexical_alternative
lexical_decisions:
- source_word: σφράγισον
  chosen: seal
  alternatives:
  - mark with a seal
  - secure with a seal
  lexicon: LSJ
  rationale: Imperative of sealing; 'seal' is the natural concise English equivalent
    and fits the context of verifying the room's integrity.
- source_word: τῷ δακτυλίῳ σου
  chosen: with your ring
  alternatives:
  - with your signet ring
  - with your signet
  lexicon: LSJ
  rationale: δάκτυλιος can denote a ring, often a signet ring in sealing contexts.
    'With your ring' is faithful and readable; the sealing function already implies
    its signet use.
- source_word: ἐλθὼν πρωὶ
  chosen: when you come in the morning
  alternatives:
  - after coming early
  - when you come early in the morning
  lexicon: LSJ
  rationale: The participle plus adverb is naturally rendered temporally in English.
    'In the morning' preserves πρωί without overloading the line.
- source_word: πάντα βεβρωμένα
  chosen: everything eaten
  alternatives:
  - all consumed
  - everything devoured
  lexicon: LSJ
  rationale: Perfect passive participle of βιβρώσκω indicates the food has been eaten/consumed.
    'Everything eaten' is direct and idiomatic in context.
- source_word: ὑπὸ τοῦ Βήλ
  chosen: by Bel
  alternatives:
  - by the god Bel
  lexicon: LSJ
  rationale: The text names Bel directly without an added noun. Since the narrative
    context already identifies Bel as the deity in question, the simple proper name
    is sufficient.
- source_word: ἀποθανούμεθα
  chosen: we will die
  alternatives:
  - we shall die
  - we must die
  lexicon: LSJ
  rationale: Future middle used straightforwardly. 'We will die' best reflects the
    threatened consequence in modern English.
- source_word: ὁ ψευδόμενος καθʼ ἡμῶν
  chosen: who is lying against us
  alternatives:
  - who is falsely accusing us
  - who lies about us
  lexicon: LSJ
  rationale: ψεύδομαι with κατά can mean to lie against someone or make false charges.
    'Lying against us' stays close to the Greek while preserving the adversative force
    of καθ᾽ ἡμῶν.
