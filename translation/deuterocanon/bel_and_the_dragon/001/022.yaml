theological_decisions:
- issue: Whether to render Bel with a personal pronoun ('him') or impersonal pronoun
    ('it') after the king gives Bel over to Daniel
  chosen_reading: Use 'it' in 'he destroyed it and its temple.'
  alternative_readings:
  - Use 'him' to reflect the masculine grammatical agreement with Βήλ
  rationale: The verse narrates the destruction of an idol and its temple. Preserving
    the Greek masculine pronoun mechanically in English could suggest personal agency
    or ontological status beyond what the narrative requires. The impersonal English
    pronoun better reflects the object being destroyed while still keeping Bel as
    the named deity in the clause before it.
  doctrine_reference: Preserve theological tension rather than resolve it; names transliterated,
    but English should remain readable and not import doctrinal claims the text does
    not make.
