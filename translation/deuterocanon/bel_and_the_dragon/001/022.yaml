  text: καὶ ἀπέκτεινεν αὐτοὺς ὁ βασιλεὺς, καὶ ἔδωκεν τὸν Βὴλ ἔκδοτον τῷ Δανιήλ, καὶ
    κατέστρεψεν αὐτὸν καὶ τὸ ἱερὸν αὐτοῦ.
  language: Greek
  pages:
