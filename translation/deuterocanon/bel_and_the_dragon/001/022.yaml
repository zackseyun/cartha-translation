translation:
  text: And the king killed them, and he gave Bel over to Daniel, and he destroyed
    him and his temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'handed Bel over to Daniel.' The Greek expression literally uses 'gave'
      with an adjective meaning 'given up' or 'surrendered.'
    reason: lexical_alternative
  - marker: b
    text: The Greek pronoun is masculine, so some translations render 'destroyed him
      and his temple.' Here 'it' is used because the context concerns the idol of
      Bel being destroyed.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπέκτεινεν
  chosen: killed
  alternatives:
  - put to death
  - slew
  lexicon: BDAG
  rationale: Aorist active of ἀποκτείνω, denoting causing death. 'Killed' is clear
    modern English; 'put to death' is possible but slightly more formal/judicial than
    the context requires.
- source_word: ἔδωκεν ... ἔκδοτον
  chosen: gave ... over
  alternatives:
  - handed ... over
  - delivered
  lexicon: LSJ
  rationale: The construction ἔδωκεν ... ἔκδοτον conveys surrendering someone or something
    into another's power. 'Gave ... over' preserves the idiom without sounding overly
    technical; 'delivered' is possible but less natural in contemporary English.
- source_word: τὸν Βὴλ
  chosen: Bel
  rationale: Proper name/title of the deity is transliterated per project philosophy
    for names.
- source_word: κατέστρεψεν
  chosen: destroyed
  alternatives:
  - tore down
  - demolished
  - overthrew
  lexicon: LSJ
  rationale: The verb denotes destruction/ruin. 'Destroyed' best covers both the idol
    and the sanctuary in a concise way.
- source_word: τὸ ἱερὸν
  chosen: temple
  alternatives:
  - sanctuary
  - shrine
  lexicon: LSJ
  rationale: ἱερόν refers to a sacred precinct or temple. Here 'temple' is the most
    natural rendering in English for Bel's cultic building; 'shrine' could understate
    the scale, while 'sanctuary' is possible but less direct.
- source_word: αὐτὸν
  chosen: it
  alternatives:
  - him
  lexicon: Greek grammar / context
  rationale: Although grammatically masculine because it refers to the masculine noun/name
    Βήλ, the referent in context is the idol/deity-image rather than a human male.
    English naturally uses 'it' for the idol here, avoiding an unnecessary personalizing
    effect not demanded by the context.
