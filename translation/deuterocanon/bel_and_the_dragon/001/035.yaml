translation:
  text: And Habakkuk said, “Lord, I have not seen Babylon, and I do not know the pit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the den” or “the cistern”; the Greek word is a general term for a pit-like
      place and here refers to Daniel’s place of confinement.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμβακοὺμ
  chosen: Habakkuk
  lexicon: LSJ
  rationale: Standard English transliteration of the prophet's name.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Vocative of κύριος; 'Lord' is the default rendering per doctrine and
    fits direct address to God here.
- source_word: Βαβυλῶνα
  chosen: Babylon
  lexicon: LSJ
  rationale: Accusative of the place name Babylon; rendered by the standard English
    form.
- source_word: οὐχ ἑώρακα
  chosen: I have not seen
  alternatives:
  - I have never seen
  - I did not see
  lexicon: LSJ
  rationale: 'Perfect of ὁράω naturally conveys a present state resulting from past
    experience: Habakkuk has not seen Babylon. ''I have not seen'' preserves that
    force without over-paraphrase.'
- source_word: τὸν λάκκον
  chosen: the pit
  alternatives:
  - the den
  - the cistern
  lexicon: LSJ
  rationale: λάκκος broadly denotes a pit, ditch, cistern, or den-like hole. 'Pit'
    is the most direct and least interpretively loaded rendering here; in context
    it refers to the place where Daniel has been cast, but the Greek itself uses the
    generic term.
- source_word: οὐ γινώσκω
  chosen: I do not know
  alternatives:
  - I am not acquainted with
  - I do not know about
  lexicon: LSJ
  rationale: Present tense of γινώσκω expresses lack of knowledge or acquaintance.
    'I do not know' is the plainest English equivalent.
