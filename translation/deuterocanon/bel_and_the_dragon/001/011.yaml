theological_decisions:
- issue: Cultic setting of οἶκος τοῦ Βήλ
  chosen_reading: house of Bel
  alternative_readings:
  - temple of Bel
  rationale: The verse concerns Bel's shrine, but the Greek says 'house.' Retaining
    'house' avoids importing a more interpretive cultic term into the main text while
    still allowing readers to infer the temple setting from context.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English.'
