translation:
  text: The king went with Daniēl into the house of Bel. And the priests of Bel said,
    “Look, we are going outside. But you, O king, set out the food, and after mixing
    the wine, set it out, and shut the door.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “temple of Bel.” The Greek literally says “house of Bel,” a common way
      to refer to a deity’s shrine or temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ βασιλεὺς
  chosen: The king
  alternatives:
  - the king himself
  lexicon: LSJ
  rationale: Standard rendering of βασιλεύς as the ruling king; no contextual reason
    to expand beyond the simple title.
- source_word: μετὰ Δανιὴλ
  chosen: with Daniēl
  alternatives:
  - with Daniel
  lexicon: LSJ
  rationale: μετά with genitive indicates accompaniment, so 'with.' The name is transliterated
    rather than translated, following project policy for personal names. 'Daniēl'
    reflects the Greek form Δανιήλ more directly.
- source_word: εἰς τὸν οἶκον τοῦ Βήλ
  chosen: into the house of Bel
  alternatives:
  - into Bel’s temple
  - to the house of Bel
  lexicon: LSJ
  rationale: οἶκος literally means 'house.' In this cultic context it likely denotes
    the temple/shrine, but 'house of Bel' preserves the source wording while remaining
    intelligible.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: LSJ
  rationale: A deictic attention-getter. 'Look' is natural modern English and preserves
    the discourse force without archaic tone.
- source_word: ἡμεῖς ἀποτρέχομεν ἔξω
  chosen: we are going outside
  alternatives:
  - we are running out
  - we are departing outside
  lexicon: LSJ
  rationale: ἀποτρέχω can suggest running off or departing quickly, but in context
    the priests are simply announcing that they will leave the room. 'Going outside'
    captures the practical sense in readable English without overstating speed.
- source_word: σύ δέ, βασιλεῦ
  chosen: But you, O king,
  alternatives:
  - and you, king,
  - but you, king,
  lexicon: LSJ
  rationale: 'σύ δέ marks contrast: the priests leave, while the king performs the
    next actions. Vocative βασιλεῦ is retained as direct address; ''O king'' preserves
    the formal tone.'
- source_word: παράθες τὰ βρώματα
  chosen: set out the food
  alternatives:
  - place the food
  - serve the food
  lexicon: LSJ
  rationale: παράθες is an aorist imperative meaning to place before or set out. βρώματα
    are edible provisions/foods. 'Set out the food' fits the ritual-meal setting naturally.
- source_word: τὸν οἶνον κεράσας θές
  chosen: after mixing the wine, set it out
  alternatives:
  - prepare the wine and place it
  - pour out the mixed wine
  lexicon: LSJ
  rationale: κεράσας is an aorist participle, likely referring to mixing wine in customary
    ancient fashion before serving. θές then gives the main imperative to place it.
    The translation preserves the participial sequence explicitly.
- source_word: ἀπόκλεισον τὴν θύραν
  chosen: shut the door
  alternatives:
  - close the door
  - lock the door
  lexicon: LSJ
  rationale: ἀποκλείω means to shut off/close. 'Shut the door' is idiomatic and slightly
    stronger than 'close,' while 'lock' would overtranslate because the Greek does
    not explicitly mention locking.
