translation:
  text: Daniel said to the king, “Let it be according to your word.” And there were
    seventy priests of Bel, besides women and children; and he came in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'according to your word.' The sense is Daniel's assent
      to the king's proposal.
    reason: lexical_alternative
  - marker: b
    text: Or 'apart from women and children' / 'not counting women and children.'
    reason: lexical_alternative
  - marker: c
    text: The verse ends with 'and he came,' leaving the destination to be supplied
      by the following context.
    reason: cross_reference
lexical_decisions:
- source_word: Γινέσθω
  chosen: Let it be
  alternatives:
  - So be it
  - Let it happen
  lexicon: LSJ
  rationale: Third-person imperative of γίνομαι; in this context it functions as assent
    to the king's proposal. 'Let it be' is natural English and preserves the imperative
    force without paraphrase.
- source_word: κατὰ τὸ ῥῆμά σου
  chosen: according to your word
  alternatives:
  - as you have said
  - according to your command
  lexicon: LSJ
  rationale: ῥῆμα here refers to the king's spoken statement or decision. 'According
    to your word' is a close rendering that preserves the formal tone; 'command' would
    overstate the lexical sense.
- source_word: ἱερεῖς
  chosen: priests
  alternatives:
  - temple priests
  lexicon: LSJ
  rationale: Standard rendering for cultic officials. No need to expand beyond the
    Greek.
- source_word: τοῦ Βὴλ
  chosen: of Bel
  alternatives:
  - belonging to Bel
  - of the god Bel
  lexicon: LSJ
  rationale: Genitive indicating association with the deity Bel. 'Of Bel' is concise
    and idiomatic.
- source_word: ἑβδομήκοντα
  chosen: seventy
  lexicon: LSJ
  rationale: Direct cardinal numeral.
- source_word: ἐκτὸς γυναικῶν καὶ τέκνων
  chosen: besides women and children
  alternatives:
  - apart from women and children
  - not counting women and children
  lexicon: LSJ
  rationale: ἐκτός marks exclusion from the count. 'Besides women and children' is
    clear modern English and preserves the sense that these were additional persons
    not included in the seventy.
- source_word: ἦλθεν
  chosen: he came
  alternatives:
  - he went in
  - he entered
  lexicon: LSJ
  rationale: Aorist of ἔρχομαι, straightforwardly 'came.' Although context may imply
    entering a place, the Greek here does not specify the destination in this verse,
    so the more basic rendering is preferred.
