translation:
  text: And an angel of the Lord said to Habakkuk, “Carry the meal that you have to
    Babylon, to Daniel in the lions’ pit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the food,” “the dinner,” or “the midday meal”; the Greek term refers
      to a meal and does not by itself specify the exact time of day.
    reason: lexical_alternative
  - marker: b
    text: Traditionally, “the lions’ den.” The Greek more literally says “the pit
      of the lions.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος Κυρίου
  chosen: an angel of the Lord
  alternatives:
  - the angel of the Lord
  lexicon: BDAG
  rationale: The Greek lacks the article before ἄγγελος, so the indefinite rendering
    is preferred. Κυρίου follows the project default 'Lord' for κύριος.
- source_word: Ἀμβακοὺμ
  chosen: Habakkuk
  alternatives:
  - Ambakoum
  rationale: Standard English transliteration of the prophet's name.
- source_word: Ἀπένεγκε
  chosen: Carry
  alternatives:
  - Bring
  - Take
  lexicon: BDAG
  rationale: The imperative calls for transporting the food from Habakkuk to Daniel.
    'Carry' is natural English and preserves the concrete action without over-specifying
    direction beyond what the following phrase supplies.
- source_word: τὸ ἄριστον
  chosen: the meal
  alternatives:
  - the food
  - the dinner
  - the midday meal
  lexicon: LSJ
  rationale: ἄριστον commonly denotes a meal, often the morning or midday meal depending
    on period and context. 'Meal' is broad enough to fit the context and avoids falsely
    narrowing the time of day.
- source_word: ὃ ἔχεις
  chosen: you have
  alternatives:
  - that is with you
  - that you are holding
  lexicon: BDAG
  rationale: A straightforward rendering of the relative clause; no need to expand
    beyond the Greek.
- source_word: εἰς Βαβυλῶνα
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: BDAG
  rationale: Directional εἰς with a place name is naturally rendered 'to Babylon'
    in English.
- source_word: εἰς τὸν λάκκον τῶν λεόντων
  chosen: in the lions’ pit
  alternatives:
  - into the lions' den
  - to the pit of the lions
  lexicon: LSJ
  rationale: 'λάκκος is literally a pit, and this wording preserves the concrete image
    better than the more traditional but less literal ''den.'' The prepositional phrase
    modifies Daniel''s location: Daniel is in the lions'' pit.'
