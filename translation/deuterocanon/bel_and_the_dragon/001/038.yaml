  text: λάβε τὸ ἄριστον ὃ ἀπέστειλέν σοι ὁ θεός. καὶ εἶπεν Δανιήλ Ἐμνήσθης γάρ μου,
    ὁ θεός, καὶ οὐκ ἐγκατέλιπες τοὺς ἀγαπῶντάς
  language: Greek
