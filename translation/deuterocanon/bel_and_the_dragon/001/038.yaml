translation:
  text: Take the meal that God has sent you. And Daniel said, “For you have remembered
    me, O God, and have not forsaken those who love you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the best portion' or 'the choice food'; Greek τὸ ἄριστον can refer to
      excellent food or a principal meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: λάβε
  chosen: Take
  alternatives:
  - Receive
  lexicon: BDAG
  rationale: Aorist imperative of λαμβάνω; 'Take' is the most natural direct command
    in English here.
- source_word: τὸ ἄριστον
  chosen: the meal
  alternatives:
  - the best portion
  - the choice food
  lexicon: LSJ
  rationale: ἄριστον can denote the chief or best meal/food. In context Habakkuk is
    delivering food, so 'the meal' communicates the sense idiomatically without overtranslating
    quality already implied by the narrative.
- source_word: ἀπέστειλέν
  chosen: has sent
  alternatives:
  - sent
  lexicon: BDAG
  rationale: 'English present perfect fits the completed action with present relevance:
    the food has now arrived from God.'
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός; no article-driven distinction is needed in
    English.
- source_word: Ἐμνήσθης
  chosen: you have remembered
  alternatives:
  - you remembered
  - you were mindful of
  lexicon: BDAG
  rationale: Aorist/passive-form deponent from μιμνῄσκομαι; in prayer language 'have
    remembered' is natural and preserves the covenantal sense of divine regard.
- source_word: ἐγκατέλιπες
  chosen: have not forsaken
  alternatives:
  - did not abandon
  - have not abandoned
  lexicon: BDAG
  rationale: Strong verb of leaving behind or abandoning. 'Forsaken' fits prayer diction
    and preserves the emotional and theological weight.
- source_word: τοὺς ἀγαπῶντάς
  chosen: those who love you
  alternatives:
  - the ones loving you
  lexicon: BDAG
  rationale: The participle is objectless in Greek because the object is implied from
    address to God. English requires explicit completion, so 'you' is supplied.
