theological_decisions:
- issue: Supplying the implied object of 'those who love'
  chosen_reading: those who love you
  alternative_readings:
  - those who love God
  rationale: Because Daniel directly addresses God ('O God'), the participle naturally
    means 'those who love you.' This is not a doctrinal expansion but an English-explicit
    rendering of the implied object.
