translation:
  text: Whose footprints are these? And the king said, “I see the footprints of men
    and women and children.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τίνος
  chosen: Whose
  alternatives:
  - Of whom
  lexicon: BDAG
  rationale: Interrogative genitive asking possession/identity. 'Whose' is idiomatic
    modern English and preserves the direct question.
- source_word: ἴχνη
  chosen: footprints
  alternatives:
  - tracks
  - traces
  lexicon: LSJ
  rationale: The noun refers to marks left by feet. 'Footprints' is the most natural
    and specific rendering in this narrative context.
- source_word: ταῦτα
  chosen: these
  alternatives:
  - these here
  lexicon: BDAG
  rationale: Demonstrative pointing to visible evidence before the speakers; simple
    'these' preserves the deixis.
- source_word: ὁρῶ
  chosen: I see
  alternatives:
  - I am looking at
  - I observe
  lexicon: BDAG
  rationale: Straightforward present-tense perception verb. 'I see' is both literal
    and natural.
- source_word: ἀνδρῶν
  chosen: men
  alternatives:
  - males
  lexicon: BDAG
  rationale: Plural of ἀνήρ refers specifically to adult male humans, not generic
    humanity. 'Men' is gender-accurate and contextually appropriate.
- source_word: γυναικῶν
  chosen: women
  alternatives:
  - wives
  lexicon: BDAG
  rationale: In this list of persons identified by footprints, the generic sense 'women'
    fits better than the relational sense 'wives'.
- source_word: παιδίων
  chosen: children
  alternatives:
  - little children
  - young ones
  lexicon: BDAG
  rationale: Plural diminutive/child term indicating children generally. 'Children'
    is clear and natural without over-specifying age.
