translation:
  text: But they were unconcerned, because they had made a hidden entrance under the
    table, and through it they would go in
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they thought nothing of it' or 'they were contemptuous,' reflecting
      the broader semantic range of κατεφρόνουν.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεφρόνουν
  chosen: were unconcerned
  alternatives:
  - were contemptuous
  - disregarded it
  - thought nothing of it
  lexicon: BDAG
  rationale: The verb can mean to look down on, despise, or make light of. In this
    narrative context, the sense is not chiefly contempt toward a person but confidence
    that Daniel's measure would not expose them. 'Were unconcerned' captures their
    dismissive attitude in natural English without over-personalizing the object of
    contempt.
- source_word: πεποιήκεσαν
  chosen: had made
  alternatives:
  - had prepared
  - had constructed
  lexicon: BDAG
  rationale: Pluperfect sense is best reflected by 'had made,' indicating prior action
    explaining their confidence.
- source_word: κεκρυμμένην εἴσοδον
  chosen: a hidden entrance
  alternatives:
  - a concealed प्रवेश
  - a secret entryway
  lexicon: BDAG
  rationale: The participle plus noun denotes an entrance that had been concealed.
    'Hidden entrance' is clear, idiomatic, and close to the Greek.
- source_word: ὑπὸ τὴν τράπεζαν
  chosen: under the table
  alternatives:
  - beneath the table
  lexicon: BDAG
  rationale: A straightforward spatial phrase. 'Table' is retained rather than a more
    interpretive term such as 'altar-table,' since the Greek here simply says table.
- source_word: διʼ αὐτῆς
  chosen: through it
  alternatives:
  - by means of it
  - through that entrance
  lexicon: BDAG
  rationale: The feminine pronoun most naturally refers to the hidden entrance. 'Through
    it' is concise and clear in context.
- source_word: εἰσεπορεύοντο
  chosen: they would go in
  alternatives:
  - they entered
  - they used to go in
  lexicon: BDAG
  rationale: The imperfect indicates repeated customary action rather than a single
    entrance. 'Would go in' communicates habitual past action in readable English.
