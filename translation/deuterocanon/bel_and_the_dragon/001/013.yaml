  text: αὐτοὶ δὲ κατεφρόνουν, ὅτι πεποιήκεσαν ὑπὸ τὴν τράπεζαν κεκρυμμένην εἴσοδον,
    καὶ διʼ αὐτῆς εἰσεπορεύοντο
  language: Greek
