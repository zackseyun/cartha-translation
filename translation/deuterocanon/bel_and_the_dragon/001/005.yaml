translation:
  text: Why do you not bow down to Bel? But he said, “Because I do not revere idols
    made by hands, but the living God, who created heaven and”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek source provided for this verse ends mid-sentence with 'and' (καί).
      The translation therefore preserves the unfinished clause rather than supplying
      missing words from context.
    reason: textual_variant
lexical_decisions:
- source_word: προσκυνεῖς
  chosen: bow down to
  alternatives:
  - worship
  - prostrate yourself before
  lexicon: BDAG
  rationale: The verb commonly denotes prostration or reverential homage. 'Bow down
    to' preserves the physical/religious act without over-specifying inner devotion,
    while fitting the immediate context of idolatrous veneration.
- source_word: σέβομαι
  chosen: revere
  alternatives:
  - worship
  - venerate
  lexicon: BDAG
  rationale: The verb denotes reverence or worship. 'Revere' distinguishes Daniel's
    statement from the previous προσκυνέω and avoids unnecessary repetition, while
    still conveying religious honor refused to idols.
- source_word: εἴδωλα
  chosen: idols
  alternatives:
  - images
  lexicon: BDAG
  rationale: In this context the referent is cult images treated as gods. 'Idols'
    best captures the polemical force of the term in Jewish discourse.
- source_word: χειροποίητα
  chosen: made by hands
  alternatives:
  - handmade
  - made with hands
  lexicon: BDAG
  rationale: The adjective emphasizes human manufacture in contrast to the living
    Creator. 'Made by hands' is idiomatic English that preserves the contrast and
    the anti-idolatry theme.
- source_word: ζῶντα θεόν
  chosen: the living God
  alternatives:
  - a living God
  lexicon: BDAG
  rationale: The article naturally points to the known true God in contrast with idols.
    'The living God' is theologically and idiomatically appropriate in biblical English.
- source_word: κτίσαντα
  chosen: who created
  alternatives:
  - who made
  lexicon: BDAG
  rationale: The participle identifies God by his creative act. 'Created' better preserves
    the elevated theological sense than the more general 'made'.
- source_word: τὸν οὐρανὸν
  chosen: heaven
  alternatives:
  - the heaven
  - the sky
  lexicon: BDAG
  rationale: Singular 'heaven' is the natural English equivalent here and matches
    common biblical usage in creation formulas.
