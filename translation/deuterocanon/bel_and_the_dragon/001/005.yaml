id: BEL.1.5
reference: Bel and the Dragon 1:5
source:
  edition: lxx-swete-1909
  text: Διὰ τί οὐ προσκυνεῖς τῷ Βὴλ; ὁ δὲ εἶπεν Ὅτι οὐ σέβομαι εἴδωλα χειροποίητα,
    ἀλλὰ τὸν ζῶντα θεόν, τὸν κτίσαντα τὸν οὐρανὸν καὶ
  language: Greek
  pages:
  - 610
  confidence: high
  validation: normalized_direct_extract
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone Bel extraction currently
