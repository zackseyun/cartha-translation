id: BEL.1.18
reference: Bel and the Dragon 1:18
source:
  edition: lxx-swete-1909
  text: καὶ ἐγένετο ἅμα τῷ ἀνοῖξαι τὰς θύρας, ἐπιβλέψας ὁ βασιλεὺς ἐπὶ τὴν τράπεζαν
    ἐβόησεν φωνῇ μεγάλῃ Μέγας εἶ, Βήλ, καὶ οὐκ ἔστιν παρὰ σοὶ δόλος
  language: Greek
  pages:
  - 612
  confidence: high
  validation: normalized_direct_extract
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone Bel extraction currently
    follows the complete Theodotion stream in Swete, because that stream is the cleanest
    fully numbered extract available in the current corpus.
translation:
  text: And it happened, when the doors were opened, that the king looked at the table
    and cried out with a loud voice, “Great are you, Bel, and there is no deceit with
    you.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ἐγένετο
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: BDAG
  rationale: Retains the narrative transition formula without archaic English. 'And
    it came to pass' is more traditional but less natural for modern readers.
- source_word: ἅμα τῷ ἀνοῖξαι
  chosen: as soon as ... were opened
  alternatives:
  - when ... were opened
  - at the opening of
  lexicon: BDAG
  rationale: The construction conveys temporal immediacy ('at the same time as opening'
    / 'as soon as opening occurred'). 'As soon as' best captures the prompt sequence
    in readable English.
- source_word: τὰς θύρας
  chosen: the doors
  alternatives:
  - the gates
  lexicon: BDAG
  rationale: θύραι normally means 'doors'; nothing in the immediate context requires
    the broader 'gates'.
- source_word: ἐπιβλέψας
  chosen: looked at
  alternatives:
  - looked upon
  - glanced at
  - examined
  lexicon: BDAG
  rationale: A straightforward participial sense fits the scene. 'Examined' would
    overinterpret; 'looked at' preserves the basic visual action.
- source_word: τὴν τράπεζαν
  chosen: the table
  alternatives:
  - the table of offerings
  lexicon: BDAG
  rationale: The noun itself is simply 'table.' The offering context is clear from
    the surrounding narrative and need not be imported into the gloss here.
- source_word: ἐβόησεν φωνῇ μεγάλῃ
  chosen: cried out with a loud voice
  alternatives:
  - shouted loudly
  - cried with a great voice
  lexicon: BDAG
  rationale: This preserves both the verbal force of ἐβόησεν and the explicit instrumental
    phrase φωνῇ μεγάλῃ in natural English.
- source_word: Μέγας εἶ
  chosen: Great are you
  alternatives:
  - You are great
  lexicon: BDAG
  rationale: Either is possible; 'Great are you' preserves the exclamatory, elevated
    word order of the Greek while remaining idiomatic.
- source_word: Βήλ
  chosen: Bel
  rationale: Personal/divine name is transliterated per project philosophy.
- source_word: οὐκ ἔστιν παρὰ σοὶ δόλος
  chosen: there is no deceit with you
  alternatives:
  - there is no fraud in you
  - no trickery is found with you
  - there is no guile with you
  lexicon: BDAG
  rationale: δόλος denotes deceit, trickery, or guile. 'There is no deceit with you'
    closely follows the Greek phrasing παρὰ σοὶ while remaining clear. 'In you' is
    possible, but 'with you' better reflects the preposition and the idiom of attributing
    deceit to someone's presence or character.
