theological_decisions:
- issue: The king's declaration about Bel could be rendered in a way that implies
    a theological endorsement by the narrator.
  chosen_reading: 'The line is translated as the king''s direct speech without narratorial
    endorsement: ''Great are you, Bel, and there is no deceit with you.'''
  alternative_readings:
  - Paraphrastic renderings that soften the statement as merely the king's impression
  rationale: The Greek presents the king's exclamation directly. The translation preserves
    the dramatic irony of the narrative without importing editorial qualification
    into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
