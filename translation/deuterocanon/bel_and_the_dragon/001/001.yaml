theological_decisions:
- issue: Rendering the death idiom προσετέθη πρὸς τοὺς πατέρας αὐτοῦ
  chosen_reading: was gathered to his fathers
  alternative_readings:
  - was added to his fathers
  - died
  rationale: The phrase is an established biblical idiom rather than a mere statement
    of death. Preserving the idiom maintains literary continuity with similar scriptural
    expressions while remaining intelligible in English.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
