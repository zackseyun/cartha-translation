id: BEL.1.1
reference: Bel and the Dragon 1:1
source:
  edition: lxx-swete-1909
  text: ΚΑΙ ὁ βασιλεὺς Ἀστυάγης προσετέθη πρὸς τοὺς πατέρας αὐτοῦ,
  language: Greek
  pages:
  - 610
  confidence: high
  validation: normalized_direct_extract
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone Bel extraction currently
    follows the complete Theodotion stream in Swete, because that stream is the cleanest
    fully numbered extract available in the current corpus.
translation:
  text: And King Astyages was gathered to his fathers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'was added to his fathers,' a biblical idiom meaning
      that he died.
    reason: lexical_alternative
lexical_decisions:
- source_word: ΚΑΙ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: LSJ
  rationale: Standard connective at the head of narrative. 'And' preserves the simple
    paratactic flow of the Greek without adding temporal nuance not explicit in the
    text.
- source_word: ὁ βασιλεὺς
  chosen: King
  alternatives:
  - the king
  lexicon: LSJ
  rationale: 'The article with βασιλεύς marks a definite referent, but English idiom
    with a proper name normally omits the article: ''King Astyages'' rather than ''the
    king Astyages.'''
- source_word: Ἀστυάγης
  chosen: Astyages
  rationale: Personal name is transliterated by standard convention, following project
    policy to transliterate names rather than translate them.
- source_word: προσετέθη
  chosen: was gathered
  alternatives:
  - was added
  - was joined
  - died
  lexicon: LSJ
  rationale: The passive of προστίθημι with 'to his fathers' is an idiomatic expression
    for death/burial association. 'Was gathered' preserves the idiom's biblical resonance
    better than the overly literal 'was added' and avoids flattening it to the interpretive
    gloss 'died.'
- source_word: πρὸς τοὺς πατέρας αὐτοῦ
  chosen: to his fathers
  alternatives:
  - to his ancestors
  lexicon: LSJ
  rationale: This phrase echoes a well-known biblical idiom for death. 'To his fathers'
    keeps the source imagery and intertextual resonance; 'to his ancestors' is possible
    but less formally aligned with the Greek wording.
