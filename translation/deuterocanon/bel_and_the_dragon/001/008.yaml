lexical_decisions:
- source_word: βέβρωκεν
  chosen: has eaten
  alternatives:
  - has consumed
  - has devoured
  lexicon: LSJ
  rationale: Perfect of βιβρώσκω, expressing completed action with present relevance.
    In English, 'has eaten' is the most natural rendering. The negative οὐδέποτε yields
    'has never eaten.'
- source_word: οὐδέποτε
  chosen: never
  alternatives:
  - not ever
  lexicon: LSJ
  rationale: Straightforward adverbial negation intensifying the denial; 'never' is
    idiomatic modern English.
- source_word: θυμωθεὶς
  chosen: became angry
  alternatives:
  - was enraged
  - grew angry
  lexicon: LSJ
  rationale: Aorist participle from θυμόω/θυμόομαι indicating the king's anger as
    the circumstance for the following action. 'Became angry' preserves the ingressive
    sense without overstating it as 'enraged.'
- source_word: ὁ βασιλεὺς
  chosen: the king
  lexicon: LSJ
  rationale: Standard rendering of the title; no reason to paraphrase.
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: LSJ
  rationale: Common verb for calling or summoning. 'Called' is sufficiently clear;
    'summoned' is possible but slightly more formal than needed.
- source_word: τοὺς ἱερεῖς αὐτοῦ
  chosen: his priests
  alternatives:
  - the priests belonging to him
  - his temple priests
  lexicon: LSJ
  rationale: ἱερεῖς means 'priests.' The possessive αὐτοῦ is naturally rendered 'his,'
    indicating the priests attached to the king's cultic establishment.
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - told them
  lexicon: LSJ
  rationale: Standard speech formula; 'said to them' stays close to the Greek.
- source_word: Ἐὰν μὴ εἴπητέ μοι
  chosen: If you do not tell me
  alternatives:
  - Unless you tell me
  lexicon: LSJ
  rationale: Conditional construction with ἐὰν μή and subjunctive. 'If you do not
    tell me' is transparent and preserves the direct conditional force.
- source_word: τίς ὁ κατεσθίων
  chosen: who is eating
  alternatives:
  - who is consuming
  - who is devouring
  lexicon: LSJ
  rationale: Present participle of κατεσθίω, 'eat up/consume.' Because the Greek text
    here breaks off after τὴν, the participle is best rendered progressively as 'is
    eating,' anticipating the unfinished object in the next verse.
