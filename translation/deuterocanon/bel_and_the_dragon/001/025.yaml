reference: Bel and the Dragon 1:25
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν Δανιὴλ Κυρίῳ τῷ θεῷ μου προσκυνήσω, ὅτι οὗτός ἐστιν θεὸς ζῶν·
  language: Greek
  pages:
