translation:
  text: And Daniel said, “I will bow down to the Lord my God, because he is the living
    God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will worship the Lord my God.” The Greek verb can denote both bowing
      down and worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκυνήσω
  chosen: I will bow down
  alternatives:
  - I will worship
  - I will prostrate myself
  lexicon: BDAG
  rationale: The future verb denotes an act of reverence/prostration. 'Bow down' preserves
    the physical and devotional sense without over-specifying formal worship language,
    though worship is clearly implied in context.
- source_word: Κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: 'κύριος is rendered by the project''s default ''Lord.'' The article in
    Greek supports ''the Lord'' here, and the phrase is completed by ''my God,'' yielding
    a natural English confession: ''the Lord my God.'''
- source_word: τῷ θεῷ μου
  chosen: my God
  alternatives:
  - to my God
  lexicon: BDAG
  rationale: This dative phrase depends on the verb of bowing down and identifies
    the recipient. In idiomatic English, 'bow down to the Lord my God' naturally incorporates
    the preposition once for the whole phrase.
- source_word: θεὸς ζῶν
  chosen: the living God
  alternatives:
  - a living God
  - God who lives
  lexicon: BDAG
  rationale: The anarthrous predicate with adjective is best rendered idiomatically
    as 'the living God,' a standard biblical expression emphasizing that Israel's
    God is truly alive in contrast to idols.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for Daniel's act of reverence. 'Because'
    makes the causal force explicit in clear modern English.
