theological_decisions:
- issue: Rendering of κύριος in a confession addressed to Israel's God
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The project's contested-terms guidance sets κύριος to 'Lord.' In this
    deuterocanonical Greek context, 'the Lord my God' is both faithful to the source
    and natural English.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether προσκυνέω should be rendered with explicit worship language
  chosen_reading: I will bow down
  alternative_readings:
  - I will worship
  rationale: The verb can denote worship, but 'bow down' preserves the concrete act
    named by the Greek while allowing the theological significance to remain implicit
    in the context of devotion to the living God.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source sense without paraphrase'
