  text: καὶ τὰ τέκνα αὐτῶν, καὶ κατέφαγον πάντα καὶ ἐξέπιον. καὶ ὤρθρισεν ὁ βασιλεὺς
    πρωί, καὶ Δανιὴλ μετʼ αὐτοῦ.
  language: Greek
