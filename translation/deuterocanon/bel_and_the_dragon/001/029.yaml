translation:
  text: And they came to the king and said, “Hand Daniel over to us; otherwise we
    will kill you and your household.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Deliver Daniel to us”; the Greek imperative can also
      be rendered “Give Daniel up to us.”
    reason: lexical_alternative
  - marker: b
    text: “Your household” translates Greek “your house,” a common expression that
      can mean the members of one’s household or family, not merely the building.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παράδος
  chosen: Hand ... over
  alternatives:
  - Give ... up
  - Deliver
  lexicon: LSJ
  rationale: Aorist imperative of παραδίδωμι. 'Hand over' is natural modern English
    and preserves the force of surrendering Daniel into their power better than the
    more formal 'deliver'.
- source_word: ἡμῖν
  chosen: to us
  lexicon: LSJ
  rationale: Dative pronoun marking the recipients of the demanded surrender; retained
    explicitly in English.
- source_word: τὸν Δανιήλ
  chosen: Daniel
  rationale: Standard English transliteration of the personal name Δανιήλ.
- source_word: εἰ δὲ μή
  chosen: otherwise
  alternatives:
  - if not
  lexicon: LSJ
  rationale: This conditional threat is idiomatically rendered 'otherwise' in English
    while preserving the ultimatum sense.
- source_word: ἀποκτενοῦμέν
  chosen: we will kill
  alternatives:
  - we will put to death
  - we will murder
  lexicon: LSJ
  rationale: Future of ἀποκτείνω. 'Kill' is the plain, direct equivalent and fits
    the mob's threat without adding legal nuance ('put to death') or interpretive
    coloring ('murder').
- source_word: σε
  chosen: you
  lexicon: LSJ
  rationale: Direct object singular, addressed to the king.
- source_word: τὸν οἶκόν σου
  chosen: your household
  alternatives:
  - your house
  - your family
  lexicon: LSJ
  rationale: οἶκος can mean the physical house or, by extension, the household/family.
    In a death threat, 'your household' best conveys the people belonging to the king's
    house rather than merely the building.
- source_word: ἐλθόντες πρὸς τὸν βασιλέα
  chosen: they came to the king
  alternatives:
  - coming to the king
  - having come to the king
  lexicon: LSJ
  rationale: The participle ἐλθόντες is naturally coordinated in English as a finite
    verb before 'said.' This preserves the sequence without awkward literalism.
