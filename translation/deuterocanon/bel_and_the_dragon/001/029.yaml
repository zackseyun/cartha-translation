  text: καὶ εἶπαν ἐλθόντες πρὸς τὸν βασιλέα Παράδος ἡμῖν τὸν Δανιήλ· εἰ δὲ μή, ἀποκτενοῦμέν
    σε καὶ τὸν οἶκόν σου.
  language: Greek
