lexical_decisions:
- source_word: ἐπελάβετο
  chosen: seized
  alternatives:
  - took hold of
  - grasped
  lexicon: BDAG
  rationale: The middle form here conveys forceful taking hold of someone. 'Seized'
    preserves the sudden, active intervention better than the milder 'took hold of.'
- source_word: ἄγγελος Κυρίου
  chosen: angel of the Lord
  alternatives:
  - messenger of the Lord
  lexicon: BDAG
  rationale: In this narrative context a supernatural being is in view, so 'angel'
    is the natural rendering. 'Lord' follows the project's default for κύριος.
- source_word: κορυφή
  chosen: crown
  alternatives:
  - top
  - summit
  lexicon: LSJ
  rationale: With reference to a person's head, κορυφή denotes the top or crown. 'Crown
    of his head' is idiomatic enough in English and preserves the bodily specificity
    of the Greek.
- source_word: βαστάσας
  chosen: carrying
  alternatives:
  - lifting
  - bearing
  lexicon: BDAG
  rationale: The participle describes what the angel did while transporting him. 'Carrying'
    fits the motion toward Babylon better than the more static 'bearing.'
- source_word: κόμη
  chosen: hair
  alternatives:
  - long hair
  - locks
  lexicon: LSJ
  rationale: κόμη refers to the hair of the head. 'Hair' is the clearest general rendering;
    'locks' would add stylistic color not demanded by the text.
- source_word: ἔθηκεν
  chosen: set
  alternatives:
  - placed
  - put
  lexicon: BDAG
  rationale: The verb marks the angel's placing Habakkuk at a location. 'Set' is concise
    and natural in narrative English.
- source_word: ἐπάνω τοῦ λάκκου
  chosen: above the pit
  alternatives:
  - over the pit
  - at the top of the pit
  lexicon: BDAG
  rationale: ἐπάνω most directly means 'above' or 'over.' 'Above the pit' preserves
    the spatial relation without over-interpreting the exact position.
- source_word: ῥοίζος
  chosen: rushing
  alternatives:
  - whirring
  - sound
  - rush
  lexicon: LSJ
  rationale: The noun denotes a rushing or whizzing sound/noise. Because the source
    text as provided breaks off after τοῦ, the phrase is incomplete; 'in the rushing
    of his' preserves the extant wording without inventing the missing object.
