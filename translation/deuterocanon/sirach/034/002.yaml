theological_decisions:
- issue: Interpretive force of ὁ ἐπέχων ἐνυπνίοις
  chosen_reading: one who clings to dreams
  alternative_readings:
  - one who pays attention to dreams
  - one who relies on dreams
  rationale: The verse condemns dependence on dreams by comparing it to grasping a
    shadow and chasing wind. Rendering the phrase as 'clings to' makes the negative
    evaluative force explicit from the simile itself without adding doctrine beyond
    the text.
