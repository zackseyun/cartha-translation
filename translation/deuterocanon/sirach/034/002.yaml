translation:
  text: Like one grasping at a shadow and chasing the wind, so is one who clings to
    dreams.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one who relies on dreams' or 'one who pays attention to dreams.' The
      Greek verb can suggest holding fast to, depending on, or giving heed to something.
    reason: lexical_alternative
lexical_decisions:
- source_word: δρασσόμενος
  chosen: grasping at
  alternatives:
  - seizing
  - catching hold of
  lexicon: LSJ
  rationale: The participle conveys an attempt to take hold of something with the
    hand. 'Grasping at' fits the futile image in idiomatic modern English and pairs
    naturally with 'shadow.'
- source_word: σκιᾶς
  chosen: a shadow
  alternatives:
  - shadow
  - shade
  lexicon: LSJ
  rationale: The genitive after the participle gives the object being grasped. 'Shadow'
    best preserves the image of insubstantiality; the English article smooths the
    simile.
- source_word: διώκων ἄνεμον
  chosen: chasing the wind
  alternatives:
  - pursuing the wind
  - running after the wind
  lexicon: LSJ
  rationale: The phrase is a conventional image of futility. 'Chasing the wind' is
    natural English and preserves the metaphor without paraphrase.
- source_word: ὁ ἐπέχων
  chosen: one who clings to
  alternatives:
  - the one who attends to
  - the one who relies on
  - the one who gives heed to
  lexicon: LSJ
  rationale: In this context the verb must express attachment or dependence on dreams,
    not mere possession. 'Clings to' captures the sense of fastening oneself to something
    unreliable and matches the verse's critique of trusting dreams.
- source_word: ἐνυπνίοις
  chosen: dreams
  alternatives:
  - dream-visions
  - dreams in sleep
  lexicon: LSJ
  rationale: The plural refers to dreams/visions seen in sleep. 'Dreams' is the clearest
    and most natural rendering in English.
