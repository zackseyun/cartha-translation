id: SIR.34.28
reference: Sirach 34:28
source:
  edition: lxx-swete-1909
  text: ἀγαλλίαμα καρδίας καὶ εὐφροσύνη ψυχῆς οἶνος πινόμενος ἐν καιρῷ αὐτάρκης·
  language: Greek
  pages: []
  confidence: high
translation:
  text: Wine drunk at the proper time and in moderation is gladness of heart and joy
    of soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Wine drunk at the right time, in sufficient measure.' The Greek adjective
      can more literally mean 'sufficient' or 'enough'; here it likely refers to moderate
      use rather than excess.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαλλίαμα
  chosen: gladness
  alternatives:
  - exultation
  - rejoicing
  lexicon: LSJ
  rationale: The noun denotes joyful delight or exultant gladness. 'Gladness' fits
    natural English here while preserving the positive emotional force without sounding
    overly elevated.
- source_word: καρδίας
  chosen: of heart
  alternatives:
  - for the heart
  lexicon: LSJ
  rationale: A straightforward genitive construction; 'of heart' preserves the compact
    poetic pairing with the following phrase.
- source_word: εὐφροσύνη
  chosen: joy
  alternatives:
  - cheerfulness
  - merriment
  lexicon: LSJ
  rationale: The term conveys cheer, delight, or festal joy. 'Joy' is broad and dignified,
    matching the parallelism with 'gladness'.
- source_word: ψυχῆς
  chosen: of soul
  alternatives:
  - of life
  - of the self
  lexicon: LSJ
  rationale: In wisdom literature ψυχή often refers to the inner life or person. 'Soul'
    preserves the anthropological depth and the poetic balance with 'heart'.
- source_word: οἶνος
  chosen: Wine
  alternatives:
  - wine
  lexicon: LSJ
  rationale: The subject is explicitly 'wine'; capitalized only because it begins
    the sentence.
- source_word: πινόμενος
  chosen: drunk
  alternatives:
  - being drunk
  - when drunk
  lexicon: LSJ
  rationale: 'The participle is best rendered idiomatically in English as ''drunk''
    modifying ''wine'': ''Wine drunk...'' This keeps the proverbial style without
    unnecessary expansion.'
- source_word: ἐν καιρῷ
  chosen: at the proper time
  alternatives:
  - in season
  - at the right time
  lexicon: LSJ
  rationale: καιρός here means a fitting or appropriate time, not merely chronological
    time. 'At the proper time' captures the ethical sense of appropriateness in wisdom
    instruction.
- source_word: αὐτάρκης
  chosen: in moderation
  alternatives:
  - sufficient
  - self-sufficient
  - enough
  lexicon: LSJ
  rationale: Although the adjective literally relates to sufficiency or contented
    adequacy, in this context with wine it most naturally describes a measured, sufficient
    amount rather than excess. 'In moderation' expresses the intended sense in clear
    English.
