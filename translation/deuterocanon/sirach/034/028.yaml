theological_decisions:
- issue: Ethical force of αὐτάρκης in relation to wine
  chosen_reading: The verse commends wine only when taken in a fitting time and measured
    amount.
  alternative_readings:
  - The verse simply states that wine, when sufficient, brings joy.
  - The adjective could be taken more literally as 'self-sufficient' or 'enough'.
  rationale: The Greek proverb pairs temporal propriety (ἐν καιρῷ) with quantitative
    propriety (αὐτάρκης). Rendering αὐτάρκης as 'in moderation' preserves the wisdom-ethical
    point and avoids implying an unqualified endorsement of wine.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without paraphrase'
