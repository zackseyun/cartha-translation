id: SIR.34.31
reference: Sirach 34:31
source:
  edition: lxx-swete-1909
  text: ἐν συμποσίῳ οἴνου μὴ ἐλέγξῃς τὸν πλησίον, καὶ μὴ ἐξουδενώσῃς αὐτὸν ἐν εὐφροσύνῃ
    αὐτοῦ· λόγον ὀνειδισμοῦ μὴ εἴπῃς αὐτῷ, καὶ μὴ αὐτὸν θλίψῃς ἐν ἀπαιτήσει.
  language: Greek
  pages: []
  confidence: high
translation:
  text: At a banquet of wine do not rebuke your neighbor, and do not belittle him
    in his gladness; do not speak a word of reproach to him, and do not distress him
    by making demands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not distress him by pressing for repayment'; the Greek term can refer
      to a demand or exaction, often in the sense of collecting what is owed.
    reason: lexical_alternative
lexical_decisions:
- source_word: συμποσίῳ οἴνου
  chosen: a banquet of wine
  alternatives:
  - a drinking party
  - a wine feast
  - over wine
  lexicon: LSJ
  rationale: The phrase denotes a social meal characterized by wine-drinking. 'Banquet
    of wine' stays close to the Greek while remaining intelligible; 'drinking party'
    is possible but sounds more colloquial and potentially harsher than the source
    requires.
- source_word: ἐλέγξῃς
  chosen: rebuke
  alternatives:
  - reprove
  - expose
  - correct
  lexicon: BDAG
  rationale: In this interpersonal wisdom context, the sense is admonishing or censuring
    someone, not formally exposing wrongdoing. 'Rebuke' is natural English and fits
    the prohibition against shaming a companion during festivity.
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - companion
  - fellow
  lexicon: BDAG
  rationale: '''Neighbor'' is the standard rendering and preserves the ethical register
    of the term, even though the immediate sense is a fellow guest or associate.'
- source_word: ἐξουδενώσῃς
  chosen: belittle
  alternatives:
  - despise
  - humiliate
  - treat with contempt
  lexicon: BDAG
  rationale: The verb means to regard as nothing or make light of. 'Belittle' captures
    the social action in context better than the more inward 'despise,' and is less
    interpretively strong than 'humiliate.'
- source_word: ἐν εὐφροσύνῃ αὐτοῦ
  chosen: in his gladness
  alternatives:
  - during his merriment
  - in his joy
  lexicon: LSJ
  rationale: The phrase refers to the person's state of festive enjoyment. 'In his
    gladness' is concise and dignified; 'merriment' is possible but slightly more
    idiomatic than necessary.
- source_word: λόγον ὀνειδισμοῦ
  chosen: a word of reproach
  alternatives:
  - an insulting word
  - a word of insult
  - a reproachful word
  lexicon: BDAG
  rationale: The genitive construction is well represented by 'a word of reproach.'
    This preserves the formal wisdom tone without flattening it into merely casual
    insult.
- source_word: θλίψῃς
  chosen: distress
  alternatives:
  - afflict
  - trouble
  - press hard
  lexicon: BDAG
  rationale: The verb can mean to press, trouble, or afflict. In this social setting,
    'distress' best conveys causing emotional or practical pressure without overstating
    physical suffering.
- source_word: ἐν ἀπαιτήσει
  chosen: by making demands
  alternatives:
  - in collecting a debt
  - with a demand for repayment
  - by pressing for payment
  lexicon: LSJ
  rationale: The noun can denote a demand, claim, or exaction, often with financial
    overtones. Because the Greek does not explicitly state 'debt,' the main text keeps
    the broader 'making demands,' while the likely debt-collection nuance is preserved
    in a footnote.
