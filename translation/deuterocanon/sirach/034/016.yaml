translation:
  text: He set down signs of favor, and a cry made the cloud hasten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''And who is his support?'' The Greek witness differs sharply
      from the surviving Hebrew here, suggesting a substantially different textual
      form.'
