translation:
  text: For he is a God of justice, and with him there is no partiality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The supplied Greek parallel for this verse in Swete reads a different sentence
      ('Many times I was in danger unto death, and I was delivered because of these
      things'), indicating a textual or versification mismatch at this location. The
      translation here follows the surviving Hebrew witness.
    reason: textual_variant
lexical_decisions:
- source_word: כי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding prohibition in the Hebrew context.
    'For' is natural English and preserves the causal force.
- source_word: אלהי
  chosen: God of
  alternatives:
  - God, a God of
  - the God of
  lexicon: HALOT
  rationale: Construct form with משפט. Since the Hebrew lacks the article here, 'a
    God of justice' would be possible, but in English 'he is a God of justice' best
    reflects the predicative sense without overdefining.
- source_word: משפט
  chosen: justice
  alternatives:
  - judgment
  - justice
  lexicon: HALOT
  rationale: In this context the sense is God's just judicial character, grounding
    the claim that bribery and exploitative sacrifice are unacceptable. 'Justice'
    communicates the ethical-judicial force more idiomatically than 'judgment'.
- source_word: אין עמו
  chosen: with him there is no
  alternatives:
  - there is not with him
  - he has no
  lexicon: HALOT
  rationale: This idiom expresses what is absent in God's presence or character. 'With
    him there is no' is a clear, fairly literal English rendering.
- source_word: משוא פנים
  chosen: partiality
  alternatives:
  - favoritism
  - respect of persons
  - lifting up of face
  lexicon: HALOT
  rationale: Standard Hebrew idiom for showing favoritism or accepting persons based
    on status. 'Partiality' is concise, natural, and preserves the judicial setting.
