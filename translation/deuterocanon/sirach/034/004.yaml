translation:
  text: From the unclean, what will be made clean? And from falsehood, what will become
    true?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And from a lie, what will prove true?' The Greek verb can also carry
      the sense 'speak truth' or 'prove true,' but the main text follows the broader
      parallel with 'be made clean.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: Marks source or origin in both clauses; 'from' is the most natural and
    sufficiently formal English equivalent.
- source_word: ἀκαθάρτου
  chosen: the unclean
  alternatives:
  - what is unclean
  - an unclean thing
  lexicon: BDAG
  rationale: The genitive singular adjective is used substantivally. 'The unclean'
    preserves the generic force without over-specifying a concrete object.
- source_word: τί
  chosen: what
  alternatives:
  - who
  - anything
  lexicon: BDAG
  rationale: Interrogative pronoun introducing a rhetorical question about result
    or product; 'what' best fits the impersonal sense.
- source_word: καθαρισθήσεται
  chosen: will be made clean
  alternatives:
  - will be cleansed
  - will become clean
  lexicon: BDAG
  rationale: Future passive of καθαρίζω. 'Will be made clean' keeps the passive force
    explicit and fits the proverb's emphasis on derivation from an impure source.
    'Will be cleansed' is possible, but can sound more ritual-technical than the context
    requires.
- source_word: ψευδοῦς
  chosen: falsehood
  alternatives:
  - a lie
  - what is false
  lexicon: BDAG
  rationale: Genitive singular used substantivally. 'Falsehood' matches the abstract
    parallel to 'the unclean' and avoids narrowing the sense to a single spoken lie.
- source_word: ἀληθεύσει
  chosen: will become true
  alternatives:
  - will tell the truth
  - will prove true
  - will be true
  lexicon: BDAG
  rationale: The verb can mean 'speak truth' or 'be true/prove true,' but in this
    parallelism with 'be made clean' the sense is about what can arise from falsehood.
    'Will become true' best captures the intransitive/resultative sense in context.
