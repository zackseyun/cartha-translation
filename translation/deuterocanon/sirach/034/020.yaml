lexical_decisions:
- source_word: נאה
  chosen: is fitting
  alternatives:
  - is beautiful
  - is lovely
  - is becoming
  lexicon: HALOT
  rationale: The adjective conveys what is appropriate or pleasing. In English, 'is fitting' best captures suitability in context rather than mere aesthetic beauty.
- source_word: חסד
  chosen: kindness
  alternatives:
  - steadfast love
  - mercy
  - loyal love
  lexicon: HALOT
  rationale: In this wisdom context, the term points to benevolent favor shown in need. 'Kindness' is clear modern English and fits the simile of timely relief. 'Steadfast love' would sound more covenantally loaded than the immediate context requires, while 'mercy' is possible but narrower.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  rationale: Per project doctrine, the divine name is rendered 'the LORD' following Jewish reverence tradition and common English Bible practice.
- source_word: בזמן מצוקה
  chosen: in a time of distress
  alternatives:
  - at a time of trouble
  - in time of affliction
  lexicon: HALOT
  rationale: The phrase denotes a season of pressure or hardship. 'Distress' is natural English and preserves the seriousness of the condition.
- source_word: כעב חזיזים
  chosen: like a storm cloud
  alternatives:
  - like a cloud of rain
  - like a thundercloud
  lexicon: HALOT
  rationale: The image is of a rain-bearing cloud associated with storm and relief. Because the following phrase is 'in a time of drought,' the point is not menace but life-giving rain. 'Storm cloud' preserves the vividness without over-specifying thunder.
- source_word: בעת בצרת
  chosen: in a time of drought
  alternatives:
  - in time of dryness
  - in time of scarcity
  lexicon: HALOT
  rationale: The Hebrew points to dryness/parched conditions; the Greek parallel has a very different text, but the Hebrew witness here yields a coherent agricultural simile. 'Drought' is the clearest idiomatic rendering.
