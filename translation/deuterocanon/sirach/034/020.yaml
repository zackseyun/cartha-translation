translation:
  text: The kindness of Yahweh is fitting in a time of distress, like a rain cloud in a time of drought.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''The Most High does not delight in the offerings of the ungodly, nor is he appeased for sins by a multitude of sacrifices.'' The Hebrew and Greek witnesses differ substantially at this verse.'
