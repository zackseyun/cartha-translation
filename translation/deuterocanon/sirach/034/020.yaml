theological_decisions:
- issue: Primary source selection amid major mismatch between Hebrew and Greek witnesses
  chosen_reading: Translate the extant Hebrew as the main text while preserving the Greek's substantially different reading in a footnote.
  alternative_readings:
  - The Most High does not delight in the offerings of the ungodly, nor is he appeased for sins by a multitude of sacrifices.
  rationale: For Sirach, the project translates from the Hebrew where it survives and from the Greek where it does not. Here the Hebrew and Greek differ sharply at the verse level. Because the Hebrew witness is extant and marked high confidence, it governs the main translation, but the Greek parallel is too substantial to ignore and should be preserved transparently as an alternative textual tradition.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly.'
