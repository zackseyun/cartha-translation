theological_decisions:
- issue: Creational purpose of wine
  chosen_reading: It too was created for human gladness
  alternative_readings:
  - It was created for people's joy
  - It was created for cheer among men
  rationale: The verse attributes a positive created purpose to wine while the surrounding
    wording limits that good to proper measure. The translation preserves both the
    goodness of creation and the warning implied by the rhetorical question, without
    importing a broader doctrine of abstinence or indulgence.
  doctrine_reference: Translation philosophy §§1, 3, 6
