translation:
  text: Wine is like life to a man, if you drink it in due measure. What is life to
    one diminished by wine? For it too was created for human gladness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'What is life to one lacking wine?' The Greek phrase is terse,
      and the dative with 'wine' can be taken differently; the main text understands
      the sense as a person diminished by wine, that is, harmed by it.
    reason: alternative_reading
lexical_decisions:
- source_word: ἴσον
  chosen: is like
  alternatives:
  - is equal to
  - is the same as
  lexicon: LSJ
  rationale: The predicate ἴσον with ζωῆς conveys equivalence/comparability. In idiomatic
    English, 'is like life' preserves the comparative force without sounding wooden;
    'is equal to life' is possible but less natural here.
- source_word: ζωῆς
  chosen: life
  alternatives:
  - living
  lexicon: LSJ
  rationale: 'The genitive after ἴσον expresses comparison: wine is comparable to
    life for a human being. ''Life'' is the plain and weighty rendering.'
- source_word: ἀνθρώπῳ
  chosen: to a man
  alternatives:
  - for a person
  - for a human being
  lexicon: LSJ
  rationale: The singular dative is generic. Per project philosophy, a gender-accurate
    representative singular may be rendered 'a man' where the source uses masculine
    generic force. The following clause broadens to 'human gladness' for ἀνθρώποις
    in the plural.
- source_word: ἐὰν πίνῃς
  chosen: if you drink
  alternatives:
  - if one drinks
  - if you should drink
  lexicon: LSJ
  rationale: The Greek shifts to second person singular in a gnomic conditional. English
    'if you drink' best preserves the proverbial directness.
- source_word: μέτρῳ αὐτοῦ
  chosen: in its measure
  alternatives:
  - in due measure
  - with moderation
  - according to its measure
  lexicon: LSJ
  rationale: The phrase literally refers to measure/portion. 'In its measure' stays
    close to the Greek while remaining intelligible. 'With moderation' captures the
    sense but is more interpretive.
- source_word: τίς ζωὴ
  chosen: What is life
  alternatives:
  - What kind of life is it
  - What life is there
  lexicon: LSJ
  rationale: The rhetorical question is terse. 'What is life' preserves the compact
    force and sets up the following dative phrase.
- source_word: ἐλασσουμένῳ
  chosen: to one diminished
  alternatives:
  - to one deprived
  - to one made less
  - to one lacking
  lexicon: LSJ
  rationale: The participle literally means being lessened/diminished. In context
    it likely refers to someone harmed or reduced by wine. 'Diminished' preserves
    the lexical image without over-specifying the mechanism.
- source_word: οἴνῳ
  chosen: by wine
  alternatives:
  - without wine
  - in wine
  lexicon: LSJ
  rationale: The dative can be construed in more than one way. Given the immediate
    context praising measured drinking and the following statement that wine was created
    for gladness, the sense is best taken as a person diminished through wine, i.e.,
    harmed by excess. An alternative understanding, 'one lacking wine,' is worth preserving
    in a footnote because the Greek is terse and can be read that way.
- source_word: ἔκτισται
  chosen: was created
  alternatives:
  - has been created
  - came into being
  lexicon: LSJ
  rationale: The perfect/passive form points to created status. 'Was created' is natural
    English and preserves the theological implication of creaturely purpose without
    overemphasis.
- source_word: εἰς εὐφροσύνην
  chosen: for human gladness
  alternatives:
  - for joy
  - for cheerfulness
  - for rejoicing
  lexicon: LSJ
  rationale: εὐφροσύνη denotes gladness/cheer. 'Gladness' is accessible and dignified;
    'cheerfulness' is possible but lighter in tone.
- source_word: ἀνθρώποις
  chosen: human
  alternatives:
  - for men
  - for people
  lexicon: LSJ
  rationale: In the plural this clearly refers to human beings generally. Rendering
    the phrase as 'for human gladness' keeps the generic sense while producing natural
    English.
