id: SIR.34.1
reference: Sirach 34:1
source:
  edition: lxx-swete-1909
  text: κεναὶ καὶ ψευδεῖς ἐλπίδες ἀσυνέτῳ ἀνδρί, καὶ ἐνύπνια ἀναπτεροῦσιν ἄφρονας.
  language: Greek
  pages:
