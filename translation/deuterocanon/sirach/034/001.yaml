translation:
  text: Empty and false hopes are for a senseless man, and dreams give wings to fools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vain and deceptive hopes.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'dreams give wings to fools,' an image of dreams carrying the
      foolish away.
    reason: lexical_alternative
lexical_decisions:
- source_word: κεναὶ
  chosen: empty
  alternatives:
  - vain
  - worthless
  lexicon: LSJ
  rationale: κενός commonly denotes emptiness or futility. 'Empty' is concise and
    natural in English, preserving the image of hopes lacking substance.
- source_word: ψευδεῖς
  chosen: 'false'
  alternatives:
  - deceptive
  - lying
  lexicon: LSJ
  rationale: ψευδής means false or untrue. 'False' pairs well with 'empty' and keeps
    the moral/intellectual critique without overinterpreting as active deception.
- source_word: ἐλπίδες
  chosen: hopes
  alternatives:
  - expectations
  lexicon: LSJ
  rationale: The ordinary sense is 'hopes.' 'Expectations' is possible but less direct
    and less idiomatic with the adjectives in this proverb-like statement.
- source_word: ἀσυνέτῳ
  chosen: senseless
  alternatives:
  - without understanding
  - foolish
  lexicon: LSJ
  rationale: ἀσύνετος denotes lack of understanding or discernment. 'Senseless' captures
    deficient judgment without collapsing it into the later distinct term ἄφρονας.
- source_word: ἀνδρί
  chosen: man
  alternatives:
  - person
  lexicon: LSJ
  rationale: The Greek is singular masculine and proverbial. Per project philosophy,
    a gender-accurate rendering is preferred where representative force is present;
    'man' preserves the source form and proverbial style.
- source_word: ἐνύπνια
  chosen: dreams
  alternatives:
  - dream-visions
  lexicon: LSJ
  rationale: The standard meaning is 'dreams.' No expansion is needed in English.
- source_word: ἀναπτεροῦσιν
  chosen: give wings to
  alternatives:
  - make fly
  - lift up
  - set fluttering
  lexicon: LSJ
  rationale: The verb literally evokes winging or causing to fly. 'Give wings to'
    preserves the metaphor and communicates that dreams carry fools away into unreality.
- source_word: ἄφρονας
  chosen: fools
  alternatives:
  - the foolish
  lexicon: LSJ
  rationale: ἄφρων is a standard wisdom term for a fool, one lacking sound judgment.
    'Fools' is the clearest and most idiomatic rendering in this parallel line.
