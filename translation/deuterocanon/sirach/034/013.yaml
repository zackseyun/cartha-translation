translation:
  text: He does not show partiality to the poor, and he hears the plea of the oppressed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek witness: ''The spirit of those who fear the Lord will live, for their
      hope is in the one who saves them.'' The Greek here reflects a substantially
      different textual form from the extant Hebrew.'
    reason: textual_variant
lexical_decisions:
- source_word: לא ישא פנים
  chosen: does not show partiality
  alternatives:
  - does not lift up the face
  - does not show favoritism
  - does not respect persons
  lexicon: HALOT
  rationale: The Hebrew idiom נשא פנים literally means 'lift up the face' but commonly
    denotes showing favor or partiality. 'Does not show partiality' gives the idiomatic
    sense in clear modern English without importing a positive sense of acceptance.
- source_word: אל דל
  chosen: against the poor
  alternatives:
  - to the poor
  - toward the poor
  - for the poor
  lexicon: HALOT
  rationale: With the idiom 'show partiality,' אל here is best taken in the sense
    of partiality directed with respect to someone, and in context the line denies
    biased treatment in judgment. 'Against the poor' makes explicit that the point
    is not that God refuses to favor the poor benevolently, but that he is not unjustly
    biased against them. This also fits the parallel clause about hearing the oppressed.
- source_word: דל
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  - the needy
  lexicon: HALOT
  rationale: דל commonly denotes one who is poor, weak, or socially vulnerable. 'The
    poor' is the most straightforward and idiomatic rendering here, while the second
    colon supplies the oppression/vulnerability nuance.
- source_word: תחנוני
  chosen: the plea
  alternatives:
  - supplications
  - entreaties
  - prayers
  lexicon: HALOT
  rationale: תחנונים refers to earnest pleas for mercy or help. 'Plea' is natural
    English and preserves the urgent singular sense in context, even though the Hebrew
    form is morphologically plural/intensive.
- source_word: מצוק
  chosen: the oppressed
  alternatives:
  - the distressed
  - the afflicted
  - the one in straits
  lexicon: HALOT
  rationale: מצוק denotes one under pressure, distress, or oppression. 'The oppressed'
    fits the social-justice context and pairs well with 'the poor,' while remaining
    within the semantic range.
- source_word: ישמע
  chosen: he hears
  alternatives:
  - he will hear
  - he listens to
  lexicon: HALOT
  rationale: The yiqtol can be rendered as habitual present in wisdom literature.
    'He hears' matches the gnomic character of the saying and keeps the parallel with
    'does not show partiality'.
- source_word: πνεῦμα φοβουμένων Κύριον ζήσεται
  chosen: not adopted in main text
  alternatives:
  - the spirit of those who fear the Lord will live
  lexicon: BDAG
  rationale: The Greek parallel in Swete differs substantially from the extant Hebrew
    and appears to reflect a different textual form for this verse. Because Hebrew
    survives here and has primacy for Sirach where extant, the main text follows the
    Hebrew, while the Greek reading is preserved in a footnote as a textual variant.
