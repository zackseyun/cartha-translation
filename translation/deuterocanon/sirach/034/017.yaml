translation:
  text: The cry of the poor passes through the cloud, and until it reaches him it
    does not rest. It does not cease until God attends, and the righteous Judge executes
    judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'does justice.' The Hebrew idiom literally says 'does judgment.'
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel in Swete differs substantially here ('The eyes of the
      Lord are upon those who love him ...'), while the surviving Hebrew reads as
      translated above. This verse is therefore textually uncertain at the source
      level.
    reason: textual_variant
lexical_decisions:
- source_word: שועת
  chosen: the cry of
  alternatives:
  - the outcry of
  - the plea of
  lexicon: HALOT
  rationale: שועה denotes a cry for help or appeal arising from distress. 'Cry' is
    natural English and preserves the urgency better than the more formal 'plea.'
- source_word: דל
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  lexicon: HALOT
  rationale: דל commonly refers to one who is poor, lowly, or socially weak. 'The
    poor' best fits the social-ethical sense in this context, while still implying
    vulnerability.
- source_word: ענן חלפה
  chosen: passes through the cloud
  alternatives:
  - passes beyond the cloud
  - crosses the cloud
  lexicon: HALOT
  rationale: The Hebrew imagery is that the poor person's cry traverses the cloud
    barrier to reach God. 'Passes through the cloud' is vivid and idiomatic, and aligns
    with the verse's movement toward divine hearing.
- source_word: ועד תגיע לא תנוח
  chosen: and until it reaches him it does not rest
  alternatives:
  - and until it arrives it does not rest
  - and until it reaches its goal it does not cease
  lexicon: HALOT
  rationale: The feminine verbs refer back to the cry. The object 'him' is implicit
    from context, namely God, and is supplied in English for clarity. 'Does not rest'
    preserves the metaphor of persistent appeal.
- source_word: לא תמוש
  chosen: It does not cease
  alternatives:
  - It does not depart
  - It does not stop
  lexicon: HALOT
  rationale: מוש can mean depart or move away, but in context of an ongoing cry, 'does
    not cease' best conveys continued persistence in prayer or appeal.
- source_word: יפקוד אל
  chosen: until God attends
  alternatives:
  - until God visits
  - until God takes notice
  - until God intervenes
  lexicon: HALOT
  rationale: פקד has a broad range including visit, attend to, take note of, or intervene.
    'Attends' captures divine responsive attention without over-specifying either
    blessing or punishment.
- source_word: ושופט צדק
  chosen: and the righteous Judge
  alternatives:
  - and the Judge of righteousness
  - and the just Judge
  lexicon: HALOT
  rationale: The phrase can be read appositionally of God as a judge characterized
    by righteousness. 'The righteous Judge' is the most natural English rendering.
- source_word: יעשה משפט
  chosen: executes judgment
  alternatives:
  - does justice
  - renders judgment
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'does judgment/justice.' 'Executes judgment'
    preserves the judicial force and fits the parallel with 'Judge,' though 'does
    justice' remains a viable alternative.
