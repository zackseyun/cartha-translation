theological_decisions:
- issue: Implicit divine referent in 'until it reaches'
  chosen_reading: Supplied 'him' to indicate that the poor person's cry reaches God.
  alternative_readings:
  - 'Left the object unstated: ''until it reaches'''
  rationale: The Hebrew leaves the object implicit, but the following clause explicitly
    names God. Supplying 'him' makes the sense clear in English without adding a new
    theological claim.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (source-text
    plain sense).
- issue: Rendering of משפט
  chosen_reading: '''executes judgment'' in the main text'
  alternative_readings:
  - '''does justice'''
  - '''renders judgment'''
  rationale: The verse emphasizes God as judge responding to the poor. 'Executes judgment'
    preserves the legal register and avoids flattening the judicial imagery into a
    more abstract ethical term, while the alternative 'does justice' is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception).
