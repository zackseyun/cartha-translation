translation:
  text: One is praying and one is cursing—which voice will the Master listen to?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will hear' or 'will heed.' The Greek verb can denote hearing, often
      with the nuance of paying attention favorably.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the Master' (ὁ δεσπότης), not the more common 'Lord' (κύριος).
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς ... καὶ εἷς
  chosen: One ... and one ...
  alternatives:
  - One person ... and another ...
  - The one ... and the other ...
  lexicon: LSJ
  rationale: The repeated εἷς sets up a stark contrast between two individuals. 'One
    ... and one ...' preserves the concise parallelism of the Greek better than a
    more expanded rendering.
- source_word: εὐχόμενος
  chosen: is praying
  alternatives:
  - prays
  - is making a vow
  - is offering prayer
  lexicon: BDAG
  rationale: εὔχομαι can mean pray or vow depending on context. Here, paired with
    καταρώμενος and followed by 'whose voice will the Master listen to?', the sense
    is straightforward prayer. The progressive English keeps the participial force
    in a natural way.
- source_word: καταρώμενος
  chosen: is cursing
  alternatives:
  - utters a curse
  - is invoking a curse
  lexicon: BDAG
  rationale: The participle denotes pronouncing a curse. 'Is cursing' is direct, idiomatic,
    and preserves the verbal contrast with 'is praying.'
- source_word: τίνος
  chosen: whose
  alternatives:
  - which one's
  - of whom
  lexicon: LSJ
  rationale: The genitive interrogative asks which person's voice is heard. 'Whose'
    is the most natural and exact English equivalent.
- source_word: φωνῆς
  chosen: voice
  alternatives:
  - cry
  - sound
  - prayer
  lexicon: BDAG
  rationale: φωνή literally means 'voice.' While 'prayer' could be interpretive for
    the first person, the second is cursing, so 'voice' preserves the common term
    applying to both.
- source_word: εἰσακούσεται
  chosen: will ... listen to
  alternatives:
  - will hear
  - will heed
  lexicon: BDAG
  rationale: εἰσακούω can mean hear favorably or listen to. 'Listen to' is accessible
    and fits the rhetorical question without over-specifying a positive answer such
    as 'heed.'
- source_word: ὁ δεσπότης
  chosen: the Master
  alternatives:
  - the Lord
  - the sovereign
  - the owner
  lexicon: BDAG
  rationale: δεσπότης is not the default κύριος. 'Master' preserves the distinct lexical
    choice and the sense of authority. Although 'Lord' is possible in religious context,
    using it here would obscure the Greek distinction.
