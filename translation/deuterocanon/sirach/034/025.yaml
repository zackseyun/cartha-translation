theological_decisions:
- issue: Rendering of ὁ δεσπότης in a prayer context
  chosen_reading: the Master
  alternative_readings:
  - the Lord
  rationale: The Greek uses δεσπότης rather than κύριος. Following the project's principle
    of consistency and transparency, the distinct title should be translated distinctly
    unless context compels otherwise. Here 'the Master' preserves the rhetorical force
    without importing covenant-title associations tied more naturally to κύριος.
  doctrine_reference: 'DOCTRINE.md: Contested terms table notes κύριος → Lord; by
    contrast δεσπότης should not be flattened into the same English title without
    cause.'
