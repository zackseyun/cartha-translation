translation:
  text: He who offers a sacrifice from the goods of the poor is like one who slaughters
    a son before his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'The one offering a sacrifice from the goods of the
      poor is one slaughtering a son before his father.' The Greek is a compressed
      proverbial comparison.
    reason: lexical_alternative
lexical_decisions:
- source_word: θύων
  chosen: is like one who slaughters
  alternatives:
  - slaughters
  - sacrifices
  - offers as a sacrifice
  lexicon: LSJ
  rationale: 'The participle literally means ''sacrificing/slaughtering.'' In English,
    the comparison is clearer if the implied copula is supplied and the participle
    is rendered as part of the comparison: the one offering an unjust sacrifice is
    like someone slaughtering a son. ''Slaughters'' preserves the shocking violence
    better than the more cultic ''sacrifices.'''
- source_word: υἱὸν
  chosen: a son
  alternatives:
  - his son
  - a child
  lexicon: LSJ
  rationale: The Greek lacks an explicit possessive with 'son'; 'a son' is the most
    literal and avoids importing a relationship not stated. 'Child' is broader than
    the Greek.
- source_word: ἔναντι
  chosen: before
  alternatives:
  - in the presence of
  - in front of
  lexicon: LSJ
  rationale: '''Before'' is concise, natural, and preserves the sense of direct presence.'
- source_word: τοῦ πατρὸς αὐτοῦ
  chosen: his father
  alternatives:
  - the father of him
  - its father
  lexicon: LSJ
  rationale: 'The pronoun most naturally refers to the son: ''before his father.''
    This yields the morally horrifying image intended by the proverb.'
- source_word: ὁ προσάγων θυσίαν
  chosen: He who offers a sacrifice
  alternatives:
  - the one bringing a sacrifice
  - the one presenting an offering
  lexicon: LSJ
  rationale: This phrase names the subject being compared. 'Offers a sacrifice' is
    idiomatic and preserves sacrificial context.
- source_word: ἐκ χρημάτων πενήτων
  chosen: from the goods of the poor
  alternatives:
  - from the money of the poor
  - out of poor people's possessions
  lexicon: LSJ
  rationale: χρήματα can mean money, property, or goods. 'Goods' is broad enough to
    include possessions unjustly taken from the poor, not only cash. πενήτων is plural,
    'of the poor/poor people.'
