theological_decisions:
- issue: Force of the comparison between unjust sacrifice and violence against a child
  chosen_reading: 'The verse is rendered as a direct moral simile: offering sacrifice
    from property taken from the poor is like slaughtering a son before his father.'
  alternative_readings:
  - 'A more wooden rendering could leave the comparison implicit: ''Slaughtering a
    son before his father is the one who offers a sacrifice from the goods of the
    poor.'''
  rationale: The Greek is compressed and proverbial. English requires the comparison
    to be made explicit for clarity. This does not add doctrine; it clarifies the
    syntax and preserves the prophetic condemnation of worship funded by oppression.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s
    plain sense without paraphrase.'
