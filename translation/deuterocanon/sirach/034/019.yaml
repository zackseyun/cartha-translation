translation:
  text: Until he repays a man for his deed, and a person's recompense according to
    his scheme; until he pleads the case of his people and gladdens them with his
    salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Greek text of Sirach 34:19 reads instead: ''One who sacrifices
      from injustice offers a blemished offering, and the gifts of lawless men are
      not for acceptance.'' The surviving Hebrew witness here differs substantially
      from the Greek.'
    reason: alternative_reading
lexical_decisions:
- source_word: עד
  chosen: until
  alternatives:
  - while
  - as long as
  lexicon: HALOT
  rationale: In both cola the Hebrew עד introduces the limit of a preceding condition
    carried over from the prior verse; 'until' best preserves the temporal force.
    The Greek parallel for this verse is substantially different, so the Hebrew governs
    the translation despite source-level mismatch.
- source_word: ישיב
  chosen: he repays
  alternatives:
  - he returns
  - he restores
  lexicon: HALOT
  rationale: 'From שוב in a causative/returning sense, here with פעלו as object: the
    sense is requital or repayment for deeds. ''Repays'' communicates judicial recompense
    more clearly than the more wooden ''returns''.'
- source_word: לאנוש
  chosen: a man
  alternatives:
  - to man
  - to a human
  lexicon: HALOT
  rationale: אנוש denotes a human person, often with emphasis on mortality. Singular
    'a man' fits the Hebrew syntax and the project's gender-accurate policy for representative
    singulars.
- source_word: פעלו
  chosen: his deed
  alternatives:
  - his work
  - what he has done
  lexicon: HALOT
  rationale: פעל can mean deed or work. In this context of recompense, 'deed' better
    conveys moral action under judgment.
- source_word: וגמול אדם
  chosen: and a person's recompense
  alternatives:
  - and the repayment of a man
  - and man's reward
  lexicon: HALOT
  rationale: גמול is recompense/reward, often in a judicial or moral sense. Rendering
    אדם as 'a person' here avoids awkward repetition of 'man' in adjacent cola while
    still reflecting a representative singular human subject.
- source_word: כמזימתו
  chosen: according to his scheme
  alternatives:
  - according to his plan
  - according to his device
  lexicon: HALOT
  rationale: מזמה can be plan, purpose, or scheme, sometimes with a negative nuance.
    Given the context of requital, 'scheme' preserves the possibility of morally charged
    intent better than the neutral 'plan'.
- source_word: יריב ריב עמו
  chosen: he pleads the case of his people
  alternatives:
  - he contends for the cause of his people
  - he takes up the dispute of his people
  lexicon: HALOT
  rationale: 'The cognate construction ריב ריב commonly has forensic force: to conduct
    or champion a legal case. ''Pleads the case'' gives readable modern English while
    retaining the judicial image.'
- source_word: ושמחם
  chosen: and gladdens them
  alternatives:
  - and makes them rejoice
  - and gives them joy
  lexicon: HALOT
  rationale: The verb means to make glad/rejoice. 'Gladdens them' is concise and keeps
    the causative sense.
- source_word: בישועתו
  chosen: with his salvation
  alternatives:
  - by his deliverance
  - with his victory
  lexicon: HALOT
  rationale: ישועה can mean salvation or deliverance. 'Salvation' preserves the broader
    theological resonance, while still fitting the context of divine rescue of the
    people.
