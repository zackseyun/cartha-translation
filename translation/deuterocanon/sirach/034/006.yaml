translation:
  text: Unless it is sent from the Most High in visitation, do not give your heart
    to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to these things,' referring to the dreams and similar experiences mentioned
      in the surrounding context.
    reason: lexical_alternative
  - marker: b
    text: '''In visitation'' may also be understood as ''at the time of visitation''
      or ''in divine inspection/oversight.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν μὴ
  chosen: Unless
  alternatives:
  - if not
  lexicon: LSJ
  rationale: Introduces a negative conditional. 'Unless' is idiomatic modern English
    and preserves the force of the warning better than the more wooden 'if not.'
- source_word: παρὰ Ὑψίστου
  chosen: from the Most High
  alternatives:
  - by the Most High
  - from God Most High
  lexicon: LSJ
  rationale: παρά with the genitive here indicates source/origin. Ὑψίστος is a divine
    title best translated rather than transliterated, in keeping with project philosophy.
- source_word: ἀποσταλῇ
  chosen: it is sent
  alternatives:
  - it should be sent
  - it be sent
  lexicon: LSJ
  rationale: Aorist passive subjunctive governed by the conditional clause. English
    present passive after 'unless' communicates the sense naturally without over-formal
    awkwardness.
- source_word: ἐν ἐπισκοπῇ
  chosen: in visitation
  alternatives:
  - for inspection
  - in oversight
  - at the time of visitation
  lexicon: LSJ
  rationale: ἐπισκοπή can denote visitation, inspection, or oversight. In wisdom literature
    here, the phrase likely refers to a divine visitation or occasion of God's intervention.
    'In visitation' preserves the ambiguity and theological weight without over-interpreting.
- source_word: μὴ δῷς
  chosen: do not give
  alternatives:
  - do not set
  - do not devote
  lexicon: LSJ
  rationale: The imperative is straightforward. 'Give' keeps the metaphor of the Greek
    rather than replacing it with a more interpretive verb.
- source_word: εἰς αὐτὰ
  chosen: to them
  alternatives:
  - to these things
  - to such things
  lexicon: LSJ
  rationale: The pronoun refers back to the dreams/divinations of the surrounding
    context. 'Them' is the most natural English anaphoric rendering, while the footnote
    preserves the more explicit alternative.
- source_word: τὴν καρδίαν σου
  chosen: your heart
  alternatives:
  - your mind
  - your attention
  lexicon: LSJ
  rationale: The Greek idiom speaks of inward trust/attention/commitment. 'Your heart'
    preserves the biblical anthropological metaphor and avoids flattening it to mere
    cognition.
