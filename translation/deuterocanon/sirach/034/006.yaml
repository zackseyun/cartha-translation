theological_decisions:
- issue: Meaning of ἐν ἐπισκοπῇ
  chosen_reading: Retain 'in visitation' as a deliberately open expression for divine
    visitation/inspection rather than specifying judgment or providential oversight.
  alternative_readings:
  - in oversight
  - at the time of visitation
  - for inspection
  rationale: The phrase is semantically broad, and the verse warns against trusting
    dreams unless they truly come from God. A more specific rendering would resolve
    ambiguity the Greek leaves open.
  doctrine_reference: Preserve theological tension rather than resolve it.
