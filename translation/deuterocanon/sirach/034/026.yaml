translation:
  text: A furnace tests the tempering in dipping; so wine tests hearts in the strife
    of the proud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek of the first line is difficult. The phrase rendered 'the tempering
      in dipping' may also be understood more specifically as 'an edge in quenching'
      or, more generally, 'metalwork in immersion.'
    reason: lexical_alternative
  - marker: b
    text: Or 'wine tests hearts in the battle of the proud.' The Greek word can denote
      battle or conflict; here it is rendered more generally as 'strife.'
    reason: alternative_reading
lexical_decisions:
- source_word: κάμινος
  chosen: furnace
  alternatives:
  - kiln
  - oven
  lexicon: LSJ
  rationale: The word denotes a high-heat furnace or kiln. 'Furnace' best fits a testing/refining
    context in English and preserves the image of intense heat.
- source_word: δοκιμάζει
  chosen: tests
  alternatives:
  - proves
  - examines
  - tries
  lexicon: LSJ
  rationale: The verb carries the sense of testing something to determine its quality.
    'Tests' is clear modern English and keeps the evaluative force without archaic
    tone.
- source_word: στόμωμα
  chosen: tempering
  alternatives:
  - hardening
  - edge
  - metalwork
  lexicon: LSJ
  rationale: The noun is difficult and the source is marked with major mismatch. In
    this context with furnace and dipping/dyeing, it most plausibly refers to the
    tempering or hardening process of metal. 'Tempering' best captures a process tested
    by heat, while avoiding overprecision about a specific object such as a blade
    edge.
- source_word: ἐν βαφῇ
  chosen: in dipping
  alternatives:
  - by quenching
  - in dyeing
  - in immersion
  lexicon: LSJ
  rationale: The phrase literally involves dipping/immersion and can be used for dyeing
    or quenching. Given the metallurgical imagery suggested by the surrounding words,
    'in dipping' preserves the literal action while leaving room for the exact technical
    nuance, which is uncertain.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: LSJ
  rationale: Introduces the comparison succinctly and naturally in English.
- source_word: οἶνος
  chosen: wine
  lexicon: LSJ
  rationale: Straightforward lexical equivalent; the verse compares wine's effect
    to a testing process.
- source_word: καρδίας
  chosen: hearts
  alternatives:
  - the heart
  - inner selves
  lexicon: LSJ
  rationale: Plural accusative/object sense is best represented by 'hearts.' This
    preserves the biblical anthropology of the inner person rather than flattening
    to a psychological paraphrase.
- source_word: ἐν μάχῃ
  chosen: in the strife
  alternatives:
  - in battle
  - in conflict
  lexicon: LSJ
  rationale: While μάχη can mean battle, here the context is likely social contention
    brought out by wine among the arrogant. 'Strife' preserves conflict without forcing
    a military scene.
- source_word: ὑπερηφάνων
  chosen: of the proud
  alternatives:
  - of the arrogant
  - of proud men
  lexicon: LSJ
  rationale: The genitive most naturally qualifies those involved in the strife. 'The
    proud' is concise, idiomatic, and preserves the moral characterization.
