theological_decisions:
- issue: Ethical force of the metaphor equating economic deprivation with homicide
  chosen_reading: Render the statement as a direct moral equivalence ('is murdering
    him' / 'is shedding blood') rather than softening it into mere comparison.
  alternative_readings:
  - is like murdering him
  - is as one who sheds blood
  rationale: The Greek uses participial predicates in parallel without comparative
    markers. The verse intentionally heightens the gravity of depriving someone of
    livelihood or wages. Preserving the stark formulation best reflects the source
    text's prophetic ethical force.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
