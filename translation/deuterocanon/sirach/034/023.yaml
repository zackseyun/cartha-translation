translation:
  text: Whoever takes away a neighbor’s livelihood is murdering him, and whoever withholds
    a hired worker’s wages is shedding blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the one who takes away subsistence.' The Greek term
      refers to the means by which a person lives.
    reason: lexical_alternative
  - marker: b
    text: The verse states the moral equivalence directly rather than saying merely
      'is like a murderer.'
    reason: alternative_reading
lexical_decisions:
- source_word: φονεύων
  chosen: is murdering
  alternatives:
  - murders
  - kills
  lexicon: BDAG
  rationale: 'Present participle used predicatively; rendering with an English progressive/present
    verbal idea preserves the gnomic force: such a person is acting as a murderer.
    ''Murder'' is preferable to the broader ''kill'' because the context is moral
    condemnation of wrongful taking of life.'
- source_word: τὸν πλησίον
  chosen: a neighbor
  alternatives:
  - his neighbor
  - the neighbor
  lexicon: BDAG
  rationale: πλησίον commonly means 'neighbor' in an ethical/social sense. The article
    does not require a rigidly definite English rendering here; 'a neighbor' reads
    naturally in a proverbial statement while preserving the interpersonal scope.
- source_word: ὁ ἀφαιρούμενος συμβίωσιν
  chosen: whoever takes away a neighbor’s livelihood
  alternatives:
  - the one who deprives him of his living
  - the one who takes away subsistence
  - the one who removes means of life
  lexicon: BDAG
  rationale: ἀφαιρέω means 'take away, deprive of.' συμβίωσις denotes means of living,
    livelihood, subsistence. The object is not merely abstract 'life together' here
    but what sustains life. 'Livelihood' is idiomatic modern English and fits the
    parallel with withholding wages.
- source_word: ἐκχέων αἷμα
  chosen: is shedding blood
  alternatives:
  - sheds blood
  - pours out blood
  lexicon: BDAG
  rationale: A standard biblical idiom for bloodguilt/violent wrongdoing. 'Shedding
    blood' preserves the idiom and its moral weight better than a flattened paraphrase.
- source_word: ὁ ἀποστερῶν
  chosen: whoever withholds
  alternatives:
  - the one who defrauds
  - the one who deprives
  - the one who keeps back
  lexicon: BDAG
  rationale: ἀποστερέω can mean deprive, rob, defraud, withhold. In the collocation
    with wages, 'withholds' is the clearest and most natural English, while still
    implying wrongful deprivation.
- source_word: μισθὸν μισθωτοῦ
  chosen: a hired worker’s wages
  alternatives:
  - the wages of a hired laborer
  - a wage-earner's pay
  lexicon: BDAG
  rationale: μισθός is 'wages/pay'; μισθωτός is 'hired worker/laborer.' 'A hired worker’s
    wages' is clear, contemporary, and preserves the socioeconomic setting.
