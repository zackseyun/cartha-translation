translation:
  text: The vision of dreams is this against that, like the likeness of a face opposite
    a face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A vision of dreams is like this against that; like the likeness of
      a face opposite a face.' The Greek is terse and somewhat elliptical, so the
      exact comparative force may also be understood as correspondence or reflection.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅρασις ἐνυπνίων
  chosen: dream-vision
  alternatives:
  - vision of dreams
  - dreams' vision
  lexicon: LSJ
  rationale: The genitive construction is compact and somewhat proverbial. 'Dream-vision'
    preserves the close link between ὅρασις and ἐνύπνια without over-expanding the
    phrase.
- source_word: τοῦτο κατὰ τούτου
  chosen: this against that
  alternatives:
  - one thing corresponding to another
  - this in relation to that
  lexicon: LSJ
  rationale: The Greek is elliptical and aphoristic. κατὰ with the genitive-like demonstrative
    pairing here suggests juxtaposition or correspondence. 'This against that' keeps
    the terse, comparative force and matches the following image of face opposite
    face.
- source_word: κατέναντι προσώπου
  chosen: opposite a face
  alternatives:
  - before a face
  - face to face
  lexicon: LSJ
  rationale: κατέναντι denotes being opposite or facing. I avoided the idiomatic 'face
    to face' in the main text because the Greek continues with ὁμοίωμα προσώπου, and
    a more literal rendering better preserves the structure.
- source_word: ὁμοίωμα προσώπου
  chosen: the likeness of a face
  alternatives:
  - an image of a face
  - a resemblance of a face
  lexicon: LSJ
  rationale: 'ὁμοίωμα is ''likeness'' or ''image.'' ''Likeness'' best conveys resemblance
    rather than identity, which is the point of the proverb: dreams are only a copy,
    not the reality itself.'
