translation:
  text: Bread for the needy is the life of the poor; the one who deprives them of
    it is a man of blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a murderer' or 'a man guilty of bloodshed.' The Greek literally says
      'a man of blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρτος
  chosen: Bread
  alternatives:
  - food
  lexicon: LSJ
  rationale: The literal 'bread' is retained because it naturally stands for basic
    sustenance while preserving the concrete imagery of the Greek.
- source_word: ἐπιδεομένων
  chosen: for the needy
  alternatives:
  - for those in need
  - of those lacking
  lexicon: LSJ
  rationale: The participle denotes people who are in want or lacking necessities.
    'For the needy' is concise, idiomatic English and fits the genitival relation
    with ἄρτος.
- source_word: ζωὴ
  chosen: is the life
  alternatives:
  - is life
  - means life
  lexicon: LSJ
  rationale: The anarthrous predicate sense is well conveyed by 'is the life,' expressing
    that bread is what sustains the poor person's life. This preserves the force without
    over-paraphrasing.
- source_word: πτωχῶν
  chosen: of the poor
  alternatives:
  - for the poor
  lexicon: LSJ
  rationale: 'A straightforward genitive: the poor are those whose life depends on
    bread. ''Of the poor'' keeps the structure close to the Greek.'
- source_word: ὁ ἀποστερῶν
  chosen: the man who deprives
  alternatives:
  - whoever withholds
  - the one who robs
  lexicon: LSJ
  rationale: ἀποστερέω means to deprive, defraud, or withhold what is due. 'Deprives'
    best fits the context of taking away necessary sustenance without importing a
    narrower legal sense.
- source_word: αὐτὴν
  chosen: them of it
  alternatives:
  - him of it
  - it
  lexicon: Greek grammar / context
  rationale: 'The pronoun is feminine singular, referring back to ''bread,'' but English
    idiom requires the affected persons to be expressed: one deprives the poor/needy
    ''of it.'' Since both ἐπιδεομένων and πτωχῶν are plural in sense, ''them of it''
    makes the relation clear and natural.'
- source_word: ἄνθρωπος αἱμάτων
  chosen: a man of blood
  alternatives:
  - a bloodthirsty man
  - a murderer
  - a man guilty of bloodshed
  lexicon: LSJ
  rationale: The literal expression 'man of blood' preserves the Semitic coloring
    behind the Greek and leaves the moral weight intact. More interpretive options
    like 'murderer' capture the sense but flatten the idiom.
