theological_decisions:
- issue: Moral force of calling one who withholds sustenance 'a man of blood'
  chosen_reading: Retain the idiom 'a man of blood' in the main text rather than resolving
    it to 'murderer.'
  alternative_readings:
  - a murderer
  - a man guilty of bloodshed
  rationale: The verse equates depriving the poor of bread with bloodguilt. Keeping
    the idiom preserves the text's stark ethical claim without narrowing it to a strictly
    judicial category.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
