translation:
  text: Without falsehood the law will be fulfilled, and wisdom is perfection for
    a faithful mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wisdom is completion in a faithful mouth.' The Greek syntax of the final
      clause is compact and may be construed slightly differently.
    reason: alternative_reading
  - marker: b
    text: The Greek source for this verse is textually or syntactically difficult
      at the final clause; this translation follows the extant wording without claiming
      more certainty than the text allows.
    reason: textual_variant
lexical_decisions:
- source_word: ἄνευ
  chosen: without
  alternatives:
  - apart from
  lexicon: LSJ
  rationale: Standard privative preposition; 'without' is the natural English equivalent.
- source_word: ψεύδους
  chosen: falsehood
  alternatives:
  - lie
  - deceit
  lexicon: LSJ
  rationale: Genitive after ἄνευ. 'Falsehood' fits the abstract quality in context
    better than the more concrete 'lie,' while preserving the moral sense.
- source_word: συντελεσθήσεται
  chosen: will be fulfilled
  alternatives:
  - will be completed
  - will be accomplished
  lexicon: LSJ
  rationale: Future passive of συντελέω. 'Will be fulfilled' works well with νόμος
    and preserves both completion and carrying-through into effect.
- source_word: νόμος
  chosen: law
  alternatives:
  - instruction
  lexicon: LSJ
  rationale: Default equivalent for νόμος. 'Instruction' is possible in wisdom literature,
    but 'law' is the more direct rendering and keeps the Greek term visible.
- source_word: σοφία
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering.
- source_word: στόματι πιστῷ
  chosen: for a faithful mouth
  alternatives:
  - in a faithful mouth
  - to a trustworthy mouth
  lexicon: LSJ
  rationale: Dative phrase linked predicatively with τελείωσις. 'For a faithful mouth'
    best captures the relation in idiomatic English while retaining the metaphor of
    speech. 'Faithful' is preferred over 'trustworthy' for closer lexical correspondence
    to πιστός.
- source_word: τελείωσις
  chosen: perfection
  alternatives:
  - completion
  - consummation
  - maturity
  lexicon: LSJ
  rationale: The noun denotes bringing to completion or perfection. 'Perfection' best
    fits the aphoristic style and the predicate relation with wisdom, though 'completion'
    remains a viable alternative.
