- issue: Interpretation of νόμος in a wisdom/deuterocanonical context
  chosen_reading: law
  alternative_readings:
  - instruction
  rationale: The Greek plainly reads νόμος. While wisdom literature can shade toward
    'instruction,' the verse does not require interpretive narrowing, so the more
    transparent rendering is retained.
  doctrine_reference: Translation philosophy §1, §5
- issue: Syntactic force of στόματι πιστῷ
  chosen_reading: rendered as 'for a faithful mouth'
  alternative_readings:
  - '''in a faithful mouth'''
  - '''to a faithful mouth'''
  rationale: The Greek is compressed and somewhat awkward, and the source is flagged
    with validation mismatch. The chosen rendering preserves the dative without over-resolving
    the syntax. A footnote preserves the main alternative construal.
  doctrine_reference: Translation philosophy §3
