theological_decisions:
- issue: Nature of the warning about dreams
  chosen_reading: The verse warns that dreams can mislead and bring downfall when
    people place their hope in them.
  alternative_readings:
  - The verse condemns all dreams without exception.
  - The verse speaks only of false dream interpretation rather than dreams themselves.
  rationale: The Greek states plainly that dreams have misled many and that those
    hoping in them have fallen. The wording targets reliance on dreams, not necessarily
    every possible dream experience in every context.
  doctrine_reference: Preserve theological tension rather than resolve it.
