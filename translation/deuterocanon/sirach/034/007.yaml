id: SIR.34.7
reference: Sirach 34:7
source:
  edition: lxx-swete-1909
  text: πολλοὺς γὰρ ἐπλάνησεν τὰ ἐνύπνια, καὶ ἐξέπεσαν ἐλπίζοντες ἐπʼ αὐτοῖς.
  language: Greek
