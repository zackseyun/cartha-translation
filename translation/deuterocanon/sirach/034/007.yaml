translation:
  text: For dreams have misled many, and those who hoped in them have fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'led many astray' for 'have misled many.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'have fallen'; the sense may include failure or ruin for
      those who put their hope in dreams.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὺς
  chosen: many
  alternatives:
  - many people
  - multitudes
  lexicon: LSJ
  rationale: Accusative plural object of ἐπλάνησεν; idiomatic English omits an explicit
    'people' while preserving the indefinite human reference.
- source_word: ἐπλάνησεν
  chosen: have misled
  alternatives:
  - led astray
  - deceived
  lexicon: BDAG
  rationale: The verb denotes causing someone to wander or go astray. 'Have misled'
    fits the gnomic/proverbial force in English and avoids overstating with 'deceived'
    while preserving the warning against reliance on dreams.
- source_word: τὰ ἐνύπνια
  chosen: dreams
  alternatives:
  - dream-visions
  - things seen in dreams
  lexicon: LSJ
  rationale: Standard rendering of ἐνύπνια. 'Dreams' is clear, natural, and sufficient
    in context.
- source_word: ἐξέπεσαν
  chosen: have fallen
  alternatives:
  - have failed
  - have come to ruin
  - have fallen away
  lexicon: BDAG
  rationale: Literally 'fell out/down'; in context it describes the downfall of those
    relying on dreams. 'Have fallen' preserves the metaphor without over-interpreting
    the precise nature of the collapse.
- source_word: ἐλπίζοντες
  chosen: those who hoped
  alternatives:
  - while hoping
  - those who placed their hope
  lexicon: BDAG
  rationale: Participle used substantivally with implied persons. 'Those who hoped'
    is concise and natural; the object of hope is supplied by ἐπʼ αὐτοῖς.
- source_word: ἐπʼ αὐτοῖς
  chosen: in them
  alternatives:
  - on them
  - upon them
  lexicon: BDAG
  rationale: Refers back to dreams. English idiom prefers 'hope in' rather than 'hope
    on' here.
