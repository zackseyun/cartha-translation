theological_decisions:
- issue: Proverbial singular subjects
  chosen_reading: One builds and another tears down
  alternative_readings:
  - A man builds and another tears down
  rationale: The Greek uses singular participles without explicit nouns in a gnomic
    saying. 'One...another...' preserves the generic force without importing gender
    where the Greek leaves it implicit.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
- issue: Force of the rhetorical question
  chosen_reading: what did they gain beyond toil?
  alternative_readings:
  - what profit was there except labor?
  - what did they accomplish more than trouble?
  rationale: 'The verse emphasizes futility: opposing actions cancel each other, leaving
    only labor. This rendering preserves the rhetorical sting without paraphrasing
    beyond the Greek.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence
