translation:
  text: One builds and another tears down—what did they gain beyond toil?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what profit did they have except toil?' The Greek wording asks what
      benefit remained when one person's building was undone by another's tearing
      down.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδομῶν
  chosen: builds
  alternatives:
  - is building
  - constructs
  lexicon: LSJ
  rationale: Present participle from οἰκοδομέω, here used generically/proverbially.
    'Builds' is concise, natural English and preserves the concrete image.
- source_word: καθαιρῶν
  chosen: tears down
  alternatives:
  - demolishes
  - pulls down
  lexicon: LSJ
  rationale: Present participle from καθαιρέω in the sense of dismantling or destroying
    a structure. 'Tears down' matches the building image and reads idiomatically in
    English.
- source_word: τί ὠφέλησαν
  chosen: what did they gain
  alternatives:
  - what profit did they have
  - how were they benefited
  lexicon: LSJ
  rationale: Aorist of ὠφελέω asks about resulting benefit or profit. 'What did they
    gain' is clear modern English and preserves the rhetorical question.
- source_word: πλεῖον
  chosen: beyond
  alternatives:
  - more
  - anything more than
  lexicon: LSJ
  rationale: πλεῖον here modifies the comparison with ἢ κόπους, expressing excess
    over mere labor. 'Beyond' captures the sense smoothly in English without over-literal
    awkwardness.
- source_word: κόπους
  chosen: toil
  alternatives:
  - labors
  - trouble
  - wearisome labor
  lexicon: LSJ
  rationale: κόπος commonly denotes labor, trouble, or exhausting effort. 'Toil' conveys
    strenuous labor and fits the proverb's moral force better than the flatter 'work'.
