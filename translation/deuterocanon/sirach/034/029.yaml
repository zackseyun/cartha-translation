id: SIR.34.29
reference: Sirach 34:29
source:
  edition: lxx-swete-1909
  text: πικρία ψυχῆς οἶνος πινόμενος πολὺς ἐν ἐρεθισμῷ καὶ ἀντιπτώματι.
  language: Greek
  pages: []
  confidence: high
translation:
  text: Wine drunk in excess is bitterness of soul, with provocation and stumbling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Wine drunk in excess is bitterness to the soul, with irritation and
      stumbling.' The final two nouns are compact and can be rendered with slightly
      different nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: πικρία
  chosen: bitterness
  alternatives:
  - bitter grief
  - embitterment
  lexicon: BDAG
  rationale: The noun denotes bitterness or a bitter state. 'Bitterness' preserves
    the metaphorical force without over-interpreting it as either emotional grief
    or moral resentment alone.
- source_word: ψυχῆς
  chosen: of soul
  alternatives:
  - of the self
  - of life
  - to the soul
  lexicon: BDAG
  rationale: The genitive is best kept straightforwardly as 'of soul,' preserving
    the anthropological language of the Greek. 'Soul' is more transparent to the source
    than flattening to 'self,' though the sense is inward life/personhood.
- source_word: οἶνος
  chosen: Wine
  alternatives:
  - wine
  lexicon: BDAG
  rationale: Literal reference to wine; no reason to generalize to alcohol in this
    verse.
- source_word: πινόμενος πολὺς
  chosen: drunk in excess
  alternatives:
  - much wine being drunk
  - when drunk much
  - drunk in large quantity
  lexicon: BDAG
  rationale: The participial phrase modifies wine as consumed in great quantity. 'Drunk
    in excess' gives natural English while preserving the warning against overconsumption
    rather than wine per se.
- source_word: ἐν ἐρεθισμῷ
  chosen: in provocation
  alternatives:
  - with irritation
  - in agitation
  - in anger
  lexicon: LSJ
  rationale: ἐρεθισμός can denote irritation, exasperation, or provocation. 'In provocation'
    keeps the compact prepositional structure and allows either the setting or effect
    of contentious arousal without narrowing too far.
- source_word: ἀντιπτώματι
  chosen: downfall
  alternatives:
  - stumbling
  - ruin
  - disgrace
  lexicon: LSJ
  rationale: The noun suggests a falling against something, hence a stumble or collapse.
    'Downfall' fits the proverbial warning and pairs well with the escalating consequence
    after provocation.
