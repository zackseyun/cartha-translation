theological_decisions:
- issue: Divine name/title in אל / Κυρίου parallel
  chosen_reading: God in the Hebrew-led main text
  alternative_readings:
  - the Lord
  rationale: Zone 1 primary witness is Hebrew and reads אל ('God'), while the Greek
    parallel has Κυρίου ('Lord'). Since the project translates Sirach from Hebrew
    where extant, the main text follows the Hebrew witness, while the Greek-based
    alternative is preserved in a footnote due to the verse's textual difficulty.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    DOCTRINE.md contested terms table for κύριος / divine titles'
- issue: Handling a difficult and partially uncertain final colon
  chosen_reading: express the sense as God's work carrying out his will
  alternative_readings:
  - retain a more literal but obscure wording
  - 'follow the Greek more closely: ''in the words of the Lord are his works'''
  rationale: The Hebrew transmission here is awkward and marked by minor mismatch,
    and the Masada live excerpt does not provide a usable full reading for this verse.
    Optimal equivalence allows a clear English rendering of the probable sense while
    documenting the Greek-supported alternative in a footnote rather than presenting
    false precision.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it; PHILOSOPHY.md: preserve source uncertainty honestly'
