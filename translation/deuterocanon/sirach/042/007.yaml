translation:
  text: For every deposit, let your hand keep count; and every giving and receiving
    should be in writing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew wording is somewhat compressed here. The Greek parallel reads,
      'Whatever you hand over, do it by number and weight, and let every giving and
      receiving be in writing,' which supports the verse's sense of careful, documented
      accounting.
    reason: alternative_reading
lexical_decisions:
- source_word: על מקום
  chosen: For whatever place
  alternatives:
  - Concerning a place
  - At a place
  - For any deposit/place
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat compressed. With the parallel Greek ὃ ἐὰν
    παραδιδῷς ('whatever you hand over'), the sense is practical instruction about
    any matter/location entrusted or assigned. 'For whatever place' preserves the
    Hebrew wording while allowing the following clause to govern the practical sense.
- source_word: תפקד
  chosen: you appoint
  alternatives:
  - you assign
  - you entrust
  - you deposit
  lexicon: HALOT
  rationale: פקד can mean appoint, assign, entrust, or take account of. The Greek
    parallel παραδιδῷς points toward handing over/entrusting. 'Appoint' fits the Hebrew
    surface form, while the broader sentence clarifies that this concerns accountable
    transactions.
- source_word: יד תספור
  chosen: keep count by your hand
  alternatives:
  - count carefully
  - count it yourself
  - count by hand
  lexicon: HALOT
  rationale: Literally 'your hand shall count' or 'by hand you shall count.' The idiom
    stresses personal, careful accounting. 'Keep count by your hand' preserves the
    concrete Hebrew image without becoming obscure.
- source_word: ומתת ולקח
  chosen: giving and receiving
  alternatives:
  - what is given and taken
  - payment and receipt
  - outgoing and incoming
  lexicon: HALOT
  rationale: The pair denotes reciprocal transactions. The Greek δόσις καὶ λῆψις confirms
    a broad accounting sense. 'Giving and receiving' is natural English and sufficiently
    formal.
- source_word: הכל בכתב
  chosen: every giving and receiving should be in writing
  alternatives:
  - everything in writing
  - all of it in a written record
  - put everything in writing
  lexicon: HALOT
  rationale: כתב indicates written documentation. Because the phrase modifies the
    transaction pair in context, the English makes explicit that the instruction is
    to document transactions in writing.
