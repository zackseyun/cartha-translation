translation:
  text: In her virginity, lest she be seduced, and in her husband’s house, lest she
    go astray; in her father’s house, lest she become pregnant, and in her husband’s
    house, lest she be barren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads 'lest she be defiled' where the Hebrew has 'lest she be seduced,'
      making the sexual sense explicit.
    reason: alternative_reading
  - marker: b
    text: The final clause could be rendered more literally 'lest she be restrained,'
      but the Greek parallel supports the sense 'lest she be barren.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בבתוליה
  chosen: in her virginity
  alternatives:
  - while she is a virgin
  - in maidenhood
  lexicon: HALOT
  rationale: The Hebrew noun denotes the state of virginity/maidenhood. 'In her virginity'
    preserves the concrete state named by the Hebrew and aligns with the Greek ἐν
    παρθενίᾳ.
- source_word: פן תפתה
  chosen: lest she be seduced
  alternatives:
  - lest she be enticed
  - lest she be deceived
  lexicon: HALOT
  rationale: The Niphal/implied passive sense here is best captured by 'be seduced'
    in context of a daughter’s sexual vulnerability before marriage. The Greek parallel
    βεβηλωθῇ points toward sexual defilement, supporting a sexualized sense rather
    than mere intellectual deception.
- source_word: ובבית בעלה
  chosen: and in her husband’s house
  alternatives:
  - and in her husband’s home
  - and in the house of her husband
  lexicon: HALOT
  rationale: Formal but natural rendering of the Hebrew phrase. Although the verse
    later has בבית אישה, both expressions point to the married household; 'husband’s
    house' keeps the social setting explicit.
- source_word: לא תשטה
  chosen: lest she go astray
  alternatives:
  - lest she stray
  - lest she be unfaithful
  lexicon: HALOT
  rationale: The Hebrew verb can denote straying or erring. 'Go astray' preserves
    the broader moral/sexual sense without over-specifying adultery, while the Greek
    παραβῇ supports transgression/violation.
- source_word: בבית אביה
  chosen: in her father’s house
  alternatives:
  - while in her father’s house
  lexicon: HALOT
  rationale: Straightforward rendering of the domestic setting before marriage; also
    matches the Greek ἐν τοῖς πατρικοῖς αὐτῆς.
- source_word: פן תהרה
  chosen: lest she become pregnant
  alternatives:
  - lest she conceive
  lexicon: HALOT
  rationale: The verb means to conceive/be pregnant. 'Become pregnant' is clear modern
    English and fits the warning about premarital pregnancy.
- source_word: בבית אישה
  chosen: and in her husband’s house
  alternatives:
  - and in her man's house
  - and in her husband's home
  lexicon: HALOT
  rationale: Although איש can be rendered 'man,' in this context it refers to her
    husband. Rendering both marital-household phrases consistently avoids awkward
    English and reflects the social reality intended.
- source_word: פן תעצר
  chosen: lest she be barren
  alternatives:
  - lest she be restrained
  - lest she fail to conceive
  lexicon: HALOT
  rationale: In context, the likely sense is reproductive failure, supported strongly
    by the Greek στειρώσῃ ('be barren'). A more literal 'be restrained' would be obscure
    and contextually weak.
