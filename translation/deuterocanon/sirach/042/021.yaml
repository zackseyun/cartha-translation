theological_decisions:
- issue: Divine uniqueness in אחד הוא
  chosen_reading: he alone is
  alternative_readings:
  - he is one
  rationale: The Hebrew could be rendered more literally as 'he is one,' but in this
    context the emphasis is not a metaphysical formula alone; it highlights God's
    singular, incomparable existence. 'He alone is' communicates that force more clearly
    in English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve source sense over
    tradition
- issue: Temporal force of מעולם with Greek parallel
  chosen_reading: from everlasting
  alternative_readings:
  - from of old
  - before the age and into the age
  rationale: The Hebrew alone might allow 'from of old,' but the Greek parallel explicitly
    stretches the statement across all ages. 'From everlasting' best captures the
    combined witness without overexpanding the line.
  doctrine_reference: 'PHILOSOPHY.md: use Hebrew where it survives and Greek parallel
    as actual translation input'
