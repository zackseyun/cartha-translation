translation:
  text: about livestock, whether much or little, and about the price of a merchant’s
    sale;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel differs noticeably here, reading more broadly about trade
      dealings and merchants. The Hebrew witness is followed as the primary text,
      with the Greek used as a consistency check for the commercial sense.
    reason: textual_variant
lexical_decisions:
- source_word: על
  chosen: about
  alternatives:
  - concerning
  - regarding
  lexicon: HALOT
  rationale: The preposition introduces the matters on which one should not be ashamed
    to be exact or corrective in the surrounding context. 'About' is natural English
    and preserves the topical force.
- source_word: מקנה
  chosen: livestock
  alternatives:
  - property
  - cattle
  - acquired goods
  lexicon: HALOT
  rationale: In this context, with 'whether much or little,' the word most naturally
    refers to owned animals/herds rather than property in general. 'Livestock' is
    broad enough to cover herd animals without narrowing to only cattle.
- source_word: בין רב למעט
  chosen: whether much or little
  alternatives:
  - between much and little
  - whether great or small
  lexicon: HALOT
  rationale: This idiom contrasts quantity or scale. 'Whether much or little' gives
    clear modern English while preserving the distributive sense.
- source_word: ממחיר
  chosen: the price of
  alternatives:
  - from the price of
  - concerning the valuation of
  lexicon: HALOT
  rationale: The Hebrew likely reflects a compressed construction. In English, 'the
    price of' best conveys the commercial sense without woodenly preserving a preposition
    that would sound unnatural.
- source_word: ממכר
  chosen: sale
  alternatives:
  - merchandise
  - what is sold
  - transaction
  lexicon: HALOT
  rationale: The noun denotes something sold or the act of selling. Given the following
    'merchant,' 'sale' fits the commercial setting and reads smoothly.
- source_word: תגר
  chosen: merchant’s
  alternatives:
  - trader’s
  - peddler’s
  lexicon: HALOT
  rationale: The term refers to a trader or merchant. 'Merchant' is the most standard
    and least culturally narrowing choice in English.
- source_word: περὶ ἀδιαφόρου πράσεως καὶ ἐμπόρων
  chosen: about ... the price of a merchant’s sale
  alternatives:
  - about indifferent buying and selling and merchants
  - about trade dealings and merchants
  lexicon: LSJ
  rationale: The Greek parallel is textually and semantically difficult and does not
    map neatly onto the extant Hebrew. It confirms a commercial topic but appears
    expanded or divergent. The Hebrew remains primary, while the Greek supports rendering
    the line in terms of trade and sale rather than a non-commercial abstraction.
