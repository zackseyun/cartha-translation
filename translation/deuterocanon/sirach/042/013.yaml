theological_decisions:
- issue: Potentially misogynistic proverbial wording
  chosen_reading: Retain the direct wording 'from a woman a woman’s wickedness' without
    softening or generalizing.
  alternative_readings:
  - from a wife comes a wife's wickedness
  - from woman comes evil
  rationale: The source text itself presents a stark proverb and should not be softened
    to avoid offense. At the same time, the translation avoids importing broader doctrinal
    claims beyond the verse. The Hebrew and Greek both support the pointed formulation
    centered on 'woman.'
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve tension rather
    than resolve it; gender-accurate over gender-neutral'
