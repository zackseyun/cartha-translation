translation:
  text: For from a garment comes a moth, and from a woman comes a woman's wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and from a woman, a woman’s evil.' The Hebrew is terse
      and proverbial; the Greek likewise reads 'from a woman, a woman’s wickedness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בגד
  chosen: garment
  alternatives:
  - clothing
  - cloak
  lexicon: HALOT
  rationale: The Hebrew broadly denotes a garment or article of clothing. 'Garment'
    is natural English and matches the singular form, while also aligning with the
    Greek ἱμάτιον.
- source_word: יצא
  chosen: comes
  alternatives:
  - goes out
  - emerges
  lexicon: HALOT
  rationale: The verb literally means 'goes out/comes forth.' In English, 'comes'
    gives the proverbial sense smoothly without over-paraphrasing. The image is that
    moth issues from or arises out of the garment.
- source_word: עש
  chosen: moth
  alternatives:
  - moth-worm
  lexicon: HALOT
  rationale: The noun refers to the clothes-moth or moth-damage associated with garments.
    'Moth' is the standard concise rendering and fits the proverb's imagery.
- source_word: אשה
  chosen: woman
  alternatives:
  - wife
  lexicon: HALOT
  rationale: The Hebrew can mean either 'woman' or 'wife,' but here the generic proverbial
    contrast and the Greek γυνή support the broader 'woman' rather than specifically
    'wife'.
- source_word: רעת
  chosen: wickedness
  alternatives:
  - evil
  - badness
  lexicon: HALOT
  rationale: The construct phrase רעת אשה is most naturally 'the wickedness/evil of
    a woman.' 'Wickedness' better conveys moral quality than the flatter 'badness,'
    while preserving the proverb's sharpness.
- source_word: רעת אשה
  chosen: a woman’s wickedness
  alternatives:
  - evil from a woman
  - the evil of a woman
  lexicon: HALOT
  rationale: The Hebrew is terse and somewhat elliptical, mirrored by the Greek πονηρία
    γυναικός. Rendering it as 'a woman’s wickedness' preserves the construct relationship
    and the proverb-like parallel with 'from a garment comes a moth.'
