translation:
  text: He lives and stands forever; his goodness passes from one thing to another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew wording is terse and somewhat uncertain here. The Greek parallel
      preserves a different, fuller text: ''Neither was anything added nor diminished,
      and he had no need of any counselor. How desirable are all his works, and like
      a spark they are to behold.'''
    reason: textual_variant
  - marker: b
    text: Or 'his goodness passes over each thing' / 'his goodness goes from one to
      another.' The Hebrew phrase is compressed, and the exact force of 'this upon
      this' is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוא
  chosen: He
  alternatives:
  - It
  lexicon: HALOT
  rationale: The Hebrew refers back to God in the surrounding hymn, so the personal
    pronoun is best rendered personally as 'He' rather than impersonal 'it.'
- source_word: חי
  chosen: lives
  alternatives:
  - is living
  - is alive
  lexicon: HALOT
  rationale: The participial/adjectival form conveys ongoing life. 'Lives' is concise,
    natural English and preserves the durative sense.
- source_word: ועומד
  chosen: and stands
  alternatives:
  - and endures
  - and remains
  lexicon: HALOT
  rationale: The Hebrew verb literally means 'stands.' While 'endures' or 'remains'
    would make the idiomatic sense explicit, 'stands' preserves the concrete imagery
    and still communicates permanence in context.
- source_word: לעד
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: Standard rendering for perpetual duration; readable modern English.
- source_word: זה על זה
  chosen: from one thing to another
  alternatives:
  - one after another
  - each over each other
  - this upon that
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat compressed and likely expresses succession
    or relation among created things. 'From one thing to another' captures the distributive
    flow of the statement in idiomatic English without overcommitting to a more technical
    reconstruction.
- source_word: חלף
  chosen: passes
  alternatives:
  - extends
  - comes over
  - succeeds
  lexicon: HALOT
  rationale: The verb can denote passing on, passing over, or succeeding. Given the
    Hebrew wording and the Greek parallel's emphasis on the attractiveness/visibility
    of God's works, 'passes' preserves the movement metaphor while leaving the exact
    nuance open.
- source_word: טובו
  chosen: his goodness
  alternatives:
  - his bounty
  - his goodness/beneficence
  - his beauty
  lexicon: HALOT
  rationale: The noun from טוב naturally denotes goodness or beneficence. 'His goodness'
    is the most direct rendering; 'bounty' is possible but narrower, and 'beauty'
    would be too interpretive here.
