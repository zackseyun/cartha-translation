theological_decisions:
- issue: Use of Hebrew as primary witness with Greek parallel informing a difficult
    line
  chosen_reading: Translate from the extant Hebrew while allowing the Greek to confirm
    the verse's two-part structure and ethical thrust.
  alternative_readings:
  - 'Follow the Greek more closely: ''Concerning the instruction of a senseless and
    foolish man, and an aged man being judged with youths; and you will be truly instructed
    and approved before every living person.'''
  rationale: 'For Sirach, surviving Hebrew is primary where extant. Here the Hebrew
    and Greek diverge in the middle clause: Hebrew speaks of an old man returning
    to counsel in sexual immorality, while the Greek has an old man being judged with
    youths. Because the task prioritizes the Hebrew witness where preserved, the main
    text follows Hebrew; the Greek alternative is preserved in a footnote due to the
    substantial difference.'
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    use Greek parallel as actual input and preserve uncertainty honestly.'
