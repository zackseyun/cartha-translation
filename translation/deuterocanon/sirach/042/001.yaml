theological_decisions:
- issue: Relationship of 'and sin' to 'do not show partiality'
  chosen_reading: Render the final verb coordinately as 'and sin,' leaving the exact
    nuance slightly open.
  alternative_readings:
  - 'render as result: ''and so sin'''
  - 'render as purpose/warning: ''lest you sin'''
  rationale: The Hebrew wording is compressed, and the Greek parallel for this verse
    reflects a substantially different textual form, so the Hebrew should control
    while the ambiguity is preserved. A more explicit English expansion would resolve
    a syntactic relation the source leaves terse.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (preserve theological
    tension rather than resolve it)
