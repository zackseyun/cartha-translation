translation:
  text: But concerning these things, do not be ashamed, and do not show partiality
    so as to sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel preserved in the Septuagint has a substantially different
      wording here, expanding the instruction into several specific matters of shame
      and discretion. The Hebrew Cairo Geniza text is followed for the main translation.
    reason: textual_variant
  - marker: b
    text: Or 'do not show favoritism.' The Hebrew idiom literally says 'do not lift
      up a face.'
    reason: lexical_alternative
  - marker: c
    text: The final phrase could also be understood more explicitly as 'and so sin'
      or 'lest you sin.'
    reason: alternative_reading
lexical_decisions:
- source_word: אך
  chosen: these things
  alternatives:
  - only
  - surely
  - but
  lexicon: HALOT
  rationale: In the idiom אך על אלה, the particle introduces limitation/emphasis tied
    to the following phrase. In English, the sense is best carried by making אלה explicit
    as 'these things' rather than forcing a separate rendering like 'only' that would
    sound awkward here.
- source_word: על אלה
  chosen: of these things
  alternatives:
  - because of these things
  - concerning these things
  lexicon: HALOT
  rationale: With בוש, the preposition על can mark the matter of shame. 'Be ashamed
    of these things' is idiomatic English and fits the admonitory context.
- source_word: אל תבוש
  chosen: do not be ashamed
  alternatives:
  - do not feel shame
  - do not be embarrassed
  lexicon: HALOT
  rationale: בוש denotes shame/disgrace more than mere embarrassment. 'Do not be ashamed'
    preserves the moral-social force.
- source_word: ואל תשא פנים
  chosen: and do not show partiality
  alternatives:
  - and do not lift up a face
  - and do not be deferential
  - and do not show favoritism
  lexicon: HALOT
  rationale: The Hebrew idiom נשא פנים commonly means to show favor or partiality.
    'Show partiality' is a clear modern equivalent and preserves the ethical sense
    better than a literal gloss.
- source_word: וחטא
  chosen: and sin
  alternatives:
  - lest you sin
  - to sin
  lexicon: HALOT
  rationale: 'The Hebrew is terse: literally ''and sin.'' It may be read as a coordinate
    prohibition-result expression. Retaining ''and sin'' keeps the compact force of
    the Hebrew without over-interpreting the syntax as explicitly purposive or consequential.'
