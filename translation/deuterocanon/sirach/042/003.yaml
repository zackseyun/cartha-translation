translation:
  text: about the account of a tenant, a master, and a guest, and about the division
    of an inheritance and property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel reads 'about an account of a partner and travelers, about
      the giving of an inheritance of associates,' reflecting a different underlying
      text at several points. The main translation follows the surviving Hebrew witness.
    reason: alternative_reading
  - marker: b
    text: The final Hebrew word is terse and somewhat uncertain in sense here; it
      is rendered 'property' in keeping with the verse's legal-economic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: על
  chosen: about
  alternatives:
  - concerning
  - regarding
  lexicon: HALOT
  rationale: The repeated preposition introduces the topics under discussion in this
    proverb-like list. 'About' is natural English and preserves the topical force.
- source_word: חשבון
  chosen: account
  alternatives:
  - reckoning
  - calculation
  lexicon: HALOT
  rationale: The Hebrew points to financial reckoning or accounting. 'Account' fits
    the commercial/legal context and aligns with the Greek περὶ λόγου in the sense
    of a matter of account.
- source_word: חוכר
  chosen: tenant
  alternatives:
  - leaseholder
  - farmer
  lexicon: HALOT
  rationale: The term denotes one who rents or leases property. 'Tenant' is the broadest
    clear English equivalent; 'leaseholder' is possible but less idiomatic, and 'farmer'
    would be too narrow.
- source_word: אדון
  chosen: master
  alternatives:
  - lord
  - owner
  lexicon: HALOT
  rationale: In this economic/social setting, 'master' best conveys a person in authority
    within a household or contractual relation. 'Lord' would sound overly elevated
    in English here, and 'owner' is possible but narrower.
- source_word: אורח
  chosen: guest
  alternatives:
  - traveler
  - wayfarer
  lexicon: HALOT
  rationale: The Hebrew commonly means a guest or traveler. Because the Greek parallel
    has ὁδοιπόρων ('travelers/wayfarers'), the semantic field includes itinerants,
    but the Hebrew witness is primary here and 'guest' best reflects it while remaining
    intelligible.
- source_word: מחלקות
  chosen: division
  alternatives:
  - distribution
  - apportionment
  lexicon: HALOT
  rationale: The noun refers to dividing or allotting. 'Division' is concise and works
    naturally with inheritance language.
- source_word: נחלה
  chosen: inheritance
  alternatives:
  - estate
  - heritage
  lexicon: HALOT
  rationale: A standard legal/familial term for inherited property. 'Inheritance'
    is the clearest default in English.
- source_word: ויש
  chosen: and property
  alternatives:
  - and possessions
  - and wealth
  lexicon: HALOT
  rationale: The Hebrew יש here is terse and somewhat unusual in isolation, but in
    context it points to substance/property. 'And property' gives a clear legal-economic
    sense. The Greek parallel's ἑταίρων ('of partners/associates') suggests some textual
    instability or a different Vorlage, so this choice follows the extant Hebrew while
    acknowledging uncertainty.
