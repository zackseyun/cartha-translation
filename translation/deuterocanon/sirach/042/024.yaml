id: SIR.42.24
reference: Sirach 42:24
source:
  edition: lxx-swete-1909
  text: πάντα δισσὰ ἐν κατέναντι τοῦ ἑνός, καὶ οὐκ ἐποίησεν οὐδὲν ἐκλιπόν
  language: Greek
