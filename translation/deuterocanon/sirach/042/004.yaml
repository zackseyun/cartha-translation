  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: περὶ ἀκριβείας ζυγοῦ καὶ σταθμίων, περὶ κτήσεως πολλῶν καὶ ὀλίγων,
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 42:4
translation:
  text: about cheating with scales and balances, and about measures of ephah and stone
    weight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel reads more like 'about accuracy of scale and weights,'
      rather than 'about cheating with scales and balances.' The Hebrew witness here
      is difficult and does not align neatly with the Greek.
    reason: alternative_reading
  - marker: b
    text: The Greek second line differs substantially, reading 'about acquiring much
      and little' or 'about quantities great and small,' where the Hebrew mentions
      an ephah and a stone weight.
    reason: textual_variant
  - marker: c
    text: An ephah was an ancient dry measure; a 'stone weight' was a stone used as
      a standard weight in trade.
    reason: cultural_note
lexical_decisions:
- source_word: שחק
  chosen: cheating
  alternatives:
  - fraud
  - exactness
  - accuracy
  lexicon: HALOT
  rationale: The Hebrew as transmitted in Kahana is difficult; in context with scales
    and balances it most naturally points to dishonest manipulation rather than mere
    play or wear. The Greek parallel has 'accuracy of scale and weights,' which suggests
    the line concerns proper commercial measurement. Rendering 'cheating' captures
    the likely practical sense from the Hebrew while acknowledging the mismatch with
    the Greek.
- source_word: מאזנים
  chosen: scales
  alternatives:
  - balances
  lexicon: HALOT
  rationale: Standard Hebrew term for weighing scales. 'Scales' is the most natural
    modern English equivalent.
- source_word: פלס
  chosen: balances
  alternatives:
  - weights
  - balance-beam
  lexicon: HALOT
  rationale: In a weighing context this likely denotes balancing apparatus or standard
    balancing measure. 'Balances' pairs naturally with 'scales' without over-specifying
    the instrument.
- source_word: תמחות
  chosen: measures
  alternatives:
  - quantities
  - standard measures
  lexicon: HALOT
  rationale: The form is textually difficult, but in context with 'ephah and stone'
    it refers to units or standards of measurement. 'Measures' preserves the commercial
    sense without forcing a narrower reconstruction.
- source_word: איפה
  chosen: ephah
  alternatives:
  - dry measure
  lexicon: HALOT
  rationale: An ephah is a specific ancient unit; transliteration preserves the source
    term better than flattening it to a generic 'measure.'
- source_word: אבן
  chosen: stone weight
  alternatives:
  - stone
  - weight-stone
  lexicon: HALOT
  rationale: In commercial contexts אבן commonly refers to a stone used as a weight.
    'Stone weight' makes the sense explicit in English.
- source_word: περὶ ἀκριβείας ζυγοῦ καὶ σταθμίων
  chosen: about cheating with scales and balances
  alternatives:
  - about accuracy in scales and weights
  - about exactness of scale and weights
  lexicon: BDAG
  rationale: The Greek parallel points toward precision/accuracy in weighing, but
    the Hebrew witness appears to reflect abuse or manipulation. Because the project
    prioritizes surviving Hebrew for Sirach where available, the main text follows
    the Hebrew-leaning sense while preserving the Greek-oriented alternative in a
    footnote.
- source_word: περὶ κτήσεως πολλῶν καὶ ὀλίγων
  chosen: measures of ephah and stone weight
  alternatives:
  - acquiring much and little
  - large and small quantities
  lexicon: BDAG
  rationale: The Greek second colon diverges notably from the Hebrew. Since the Hebrew
    specifically mentions ephah and stone, the translation follows the Hebrew wording,
    with the Greek divergence noted as a textual/translation issue.
