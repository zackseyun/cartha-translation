translation:
  text: For an angry man kindles strife, and a sinful man stirs up friends, and among
    those making peace he casts slander.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hot-tempered man.' The Greek θυμώδης describes one marked by anger or
      a quick temper.
    reason: lexical_alternative
  - marker: b
    text: Literally 'casts slander' among those making peace; the image is of injecting
      defamatory speech into a reconciliation.
    reason: lexical_alternative
lexical_decisions:
- source_word: θυμώδης
  chosen: angry
  alternatives:
  - hot-tempered
  - wrathful
  - quick-tempered
  lexicon: LSJ
  rationale: The adjective denotes a person characterized by anger or a heated temper.
    'Angry' is concise and natural English; 'hot-tempered' is possible but slightly
    more interpretive. The following verb already conveys the heated effect, so a
    simpler adjective is preferred.
- source_word: ἐκκαύσει μάχην
  chosen: kindles strife
  alternatives:
  - sets a fight ablaze
  - stirs up conflict
  - inflames a quarrel
  lexicon: LSJ
  rationale: ἐκκαίω literally evokes kindling or setting aflame. Rendering it as 'kindles'
    preserves the metaphor, while μάχη in wisdom context is well represented by 'strife'
    rather than a single physical 'fight.'
- source_word: ἁμαρτωλός
  chosen: sinful
  alternatives:
  - sinner
  - wicked
  lexicon: LSJ
  rationale: As an attributive description of character, 'sinful man' fits the parallelism
    with 'angry man.' 'Sinner' is also possible, but 'sinful' keeps the adjectival
    balance and avoids sounding like a fixed religious label.
- source_word: ταράξει φίλους
  chosen: stirs up friends
  alternatives:
  - troubles friends
  - throws friends into turmoil
  - disturbs friends
  lexicon: LSJ
  rationale: ταράσσω can mean trouble, disturb, or agitate. 'Stirs up' fits the escalating
    social-disruption imagery of the verse and allows the object 'friends' to be understood
    as friends set against one another, not merely emotionally upset.
- source_word: εἰρηνευόντων
  chosen: those making peace
  alternatives:
  - peacemakers
  - those at peace
  - those reconciling
  lexicon: LSJ
  rationale: 'The participle is active: people engaged in making peace or reconciling
    others. ''Those making peace'' is slightly more explicit than ''peacemakers''
    and preserves the verbal force.'
- source_word: ἐκβάλλει διαβολήν
  chosen: casts slander
  alternatives:
  - throws in slander
  - spreads slander
  - casts accusation
  lexicon: LSJ
  rationale: διαβολή here is slanderous speech or calumny. ἐκβάλλει literally means
    'throws/casts out,' and 'casts slander' preserves the vividness without becoming
    awkward. 'Spreads slander' is smoother but loses the force of the Greek verb.
- source_word: ἄνθρωπος / ἀνήρ
  chosen: man
  alternatives:
  - person
  lexicon: LSJ
  rationale: The Greek uses masculine singular nouns in proverbial parallelism. Per
    project philosophy, gender-accurate language is preferred where the source uses
    masculine representative forms; 'man' preserves the diction and proverbial style.
