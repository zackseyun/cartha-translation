  text: ἄνθρωπος γὰρ θυμώδης ἐκκαύσει μάχην, καὶ ἀνὴρ ἁμαρτωλὸς ταράξει φίλους, καὶ
    ἀνὰ μέσον εἰρηνευόντων ἐκβάλλει διαβολήν.
