theological_decisions:
- issue: Referent of the feminine pronouns ('from it,' 'its wrath,' 'its yoke,' 'its
    chains')
  chosen_reading: The pronouns refer to the destructive tongue/slanderous speech personified
    in the immediate context, rendered with English impersonal pronouns.
  alternative_readings:
  - Render the referent as 'her' to preserve the feminine grammatical personification
    more explicitly.
  rationale: The Greek uses feminine forms because the antecedent in context is grammatically
    feminine. English normally treats an impersonal abstraction such as 'the tongue'
    as 'it.' This preserves readability without changing the underlying metaphor.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve ambiguity/tension where genuine.'
