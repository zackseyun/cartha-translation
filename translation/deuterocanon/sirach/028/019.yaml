translation:
  text: Blessed is the one sheltered from it, who has not passed through its wrath,
    who has not drawn its yoke, and has not been bound in its chains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has a feminine pronoun throughout this verse, referring back to the
      destructive tongue in the preceding context; English uses 'it' for natural style.
      An alternative is 'from her ... her wrath ... her yoke ... her chains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Standard wisdom-language rendering that preserves the beatitude-like
    force better than the more subjective 'happy' or merely circumstantial 'fortunate.'
- source_word: σκεπασθεὶς
  chosen: sheltered
  alternatives:
  - covered
  - protected
  - shielded
  lexicon: BDAG
  rationale: The passive participle conveys being covered/protected from danger. 'Sheltered'
    is natural English and fits the metaphor of being kept safe from the destructive
    power under discussion.
- source_word: ἀπʼ αὐτῆς
  chosen: from it
  alternatives:
  - from her
  lexicon: BDAG
  rationale: The antecedent is the feminine noun for the destructive tongue in the
    preceding context. English idiom more naturally uses 'it' for an impersonal destructive
    force, while preserving the referential link.
- source_word: διῆλθεν
  chosen: has not passed through
  alternatives:
  - has not gone through
  - has not come through
  lexicon: BDAG
  rationale: A fairly direct rendering of the aorist verb that preserves the imagery
    of undergoing an experience rather than flattening it to a generic 'experienced.'
- source_word: θυμῷ
  chosen: wrath
  alternatives:
  - rage
  - anger
  lexicon: BDAG
  rationale: In this context of destructive speech and its effects, 'wrath' best conveys
    intense destructive fury. 'Anger' is weaker; 'rage' is possible but slightly more
    colloquial.
- source_word: εἵλκυσεν
  chosen: has not drawn
  alternatives:
  - has not dragged
  - has not pulled
  lexicon: BDAG
  rationale: The verb literally means to draw/pull. 'Drawn its yoke' preserves the
    metaphor of taking on bondage; 'dragged' would suggest being acted upon rather
    than taking it up.
- source_word: ζυγὸν
  chosen: yoke
  alternatives:
  - burden
  lexicon: BDAG
  rationale: '''Yoke'' is the literal and metaphorically rich image of bondage or
    oppressive control; ''burden'' would interpret rather than translate.'
- source_word: δεσμοῖς
  chosen: chains
  alternatives:
  - bonds
  - fetters
  lexicon: BDAG
  rationale: The term denotes bonds or restraints. 'Chains' is vivid, accessible English
    and pairs well with the preceding 'yoke' imagery of enslavement.
- source_word: ἐδέθη
  chosen: has not been bound
  alternatives:
  - has not been tied
  - has not been fettered
  lexicon: BDAG
  rationale: This passive verb is best rendered with 'bound,' preserving both the
    literal restraint imagery and the metaphorical sense of enslavement to destructive
    speech.
