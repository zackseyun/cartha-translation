translation:
  text: Keep away from strife, and you will lessen sins;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀπόσχου
  chosen: Keep away from
  alternatives:
  - Refrain from
  - Hold back from
  - Abstain from
  lexicon: BDAG
  rationale: Aorist middle imperative of ἀπέχω/ἀπόσχω, calling for deliberate withdrawal.
    'Keep away from' is natural modern English and preserves the force of avoiding
    involvement, without sounding overly formal like 'abstain from'.
- source_word: μάχης
  chosen: strife
  alternatives:
  - quarreling
  - conflict
  - fighting
  lexicon: LSJ
  rationale: μάχη can denote fighting or quarrel/controversy. In wisdom literature
    this context concerns interpersonal contention that leads to sin, so 'strife'
    best captures the broader moral-social sense rather than only physical combat.
- source_word: ἐλαττώσεις
  chosen: you will lessen
  alternatives:
  - you will reduce
  - you will diminish
  - you will have fewer
  lexicon: LSJ
  rationale: 'Future verb expressing result: avoiding strife leads to a decrease in
    sins. ''You will lessen'' is concise and keeps the causal-result structure of
    the Greek.'
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - sin
  - offenses
  lexicon: BDAG
  rationale: Plural accusative is best represented by the plural 'sins,' indicating
    acts of sin rather than an abstract principle.
