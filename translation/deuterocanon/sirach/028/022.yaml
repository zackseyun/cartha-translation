theological_decisions:
- issue: Referent of the feminine pronoun αὐτῆς ('its/her')
  chosen_reading: Rendered as 'its,' referring to the destructive power of the tongue
    imaged as fire in the immediate context.
  alternative_readings:
  - Rendered as 'her,' if taken as a more personified reference to the tongue
  rationale: English normally uses 'its' for an impersonal destructive force. The
    surrounding context in Sirach 28 repeatedly compares the tongue to fire and weaponry;
    'its flame' preserves the metaphor without introducing unnecessary personification.
