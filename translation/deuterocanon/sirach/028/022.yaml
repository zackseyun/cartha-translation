translation:
  text: It will never overpower the godly, and they will not be burned in its flame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'It will never seize the devout.' The Greek verb can denote taking hold
      of, mastering, or prevailing against.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴ
  chosen: will never
  alternatives:
  - will certainly not
  - shall by no means
  lexicon: BDAG
  rationale: The emphatic negation οὐ μή with the aorist subjunctive is best conveyed
    by strong future negation in natural English. 'Will never' preserves the force
    without sounding archaic.
- source_word: κρατήσῃ
  chosen: overpower
  alternatives:
  - seize
  - prevail against
  - master
  lexicon: BDAG
  rationale: κρατέω can mean seize, hold fast, or gain mastery over. In context, referring
    back to the destructive power of the tongue/fire imagery in the surrounding verses,
    'overpower' best captures hostile domination rather than mere physical grasping.
- source_word: εὐσεβῶν
  chosen: the godly
  alternatives:
  - the devout
  - the pious
  lexicon: BDAG
  rationale: The genitive plural of εὐσεβής denotes those characterized by reverence
    toward God. 'The godly' is idiomatic modern English and preserves the religious-moral
    sense better than the somewhat formal 'pious.'
- source_word: φλογί
  chosen: flame
  alternatives:
  - blaze
  - fire
  lexicon: BDAG
  rationale: φλόξ refers specifically to flame rather than fire in general. Since
    the previous context already uses fire imagery, 'flame' keeps the vividness and
    specificity of the Greek.
- source_word: καήσονται
  chosen: will be burned
  alternatives:
  - will be consumed
  - will burn
  lexicon: BDAG
  rationale: The future passive indicates suffering burning rather than actively burning.
    'Will be burned' is the most direct rendering; 'consumed' would overinterpret
    the extent of the damage.
