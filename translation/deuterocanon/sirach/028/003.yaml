translation:
  text: I weighed everything in the balance, and found nothing lighter than bran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The supplied Hebrew witness for this reference reads, 'I weighed everything
      in the pan of scales, and I did not find anything lighter than bran/chaff,'
      which does not match the context here. The translation therefore follows the
      Greek witness for Sirach 28:3.
    reason: textual_variant
lexical_decisions:
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The extant Hebrew in Zone 1 ('I weighed everything...') is clearly unrelated
    to Sirach 28:3 in context, so the Greek parallel provides the usable wording for
    this verse. ἄνθρωπος is singular and generic here; per project philosophy, a gender-accurate
    rendering is preferred where the source uses the masculine singular representatively.
- source_word: συντηρεῖ
  chosen: keeps
  alternatives:
  - maintains
  - preserves
  - holds onto
  lexicon: BDAG
  rationale: The verb conveys continuing retention rather than a momentary outburst.
    'Keeps' is concise, natural English and preserves the durative sense of harboring
    anger.
- source_word: ὀργήν
  chosen: anger
  alternatives:
  - wrath
  - rage
  lexicon: BDAG
  rationale: '''Anger'' is the most natural modern equivalent here. ''Wrath'' sounds
    elevated and can imply divine wrath; ''rage'' is too intense for the general admonition.'
- source_word: παρὰ Κυρίου
  chosen: from the Lord
  alternatives:
  - from the LORD
  - from the Lord God
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' by default per doctrine. The preposition παρά
    with ζητεῖ ἴασιν is naturally expressed as seeking healing 'from' the Lord.
- source_word: ζητεῖ
  chosen: seeks
  alternatives:
  - asks for
  - looks for
  lexicon: BDAG
  rationale: A straightforward present-tense rendering that matches the rhetorical
    force of the Greek.
- source_word: ἴασιν
  chosen: healing
  alternatives:
  - cure
  - restoration
  lexicon: BDAG
  rationale: ἴασις can denote healing in a broad sense, including moral or relational
    restoration. 'Healing' preserves that breadth better than 'cure'.
