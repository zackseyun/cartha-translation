translation:
  text: For her yoke is an iron yoke, and her bonds are bronze bonds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its yoke ... its bonds,' if the image is taken more abstractly rather
      than as a personification.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζυγός
  chosen: yoke
  alternatives:
  - burden
  lexicon: BDAG
  rationale: The noun literally denotes a yoke. In this wisdom context the metaphor
    of oppressive restraint is important, so the concrete image should be preserved
    rather than generalized to 'burden.'
- source_word: σιδηροῦς
  chosen: iron
  alternatives:
  - made of iron
  - iron-hard
  lexicon: LSJ
  rationale: The adjective straightforwardly means 'iron' or 'made of iron.' 'Iron'
    keeps the compact proverbial force of the Greek.
- source_word: δεσμοί
  chosen: bonds
  alternatives:
  - chains
  - fetters
  lexicon: BDAG
  rationale: The term refers to bonds or restraints. 'Bonds' matches the repeated
    structure of the Greek and pairs naturally with 'yoke'; 'chains' would be slightly
    more specific than the source requires.
- source_word: χαλκεῖοι
  chosen: bronze
  alternatives:
  - brazen
  - copper
  lexicon: LSJ
  rationale: The adjective denotes something made of bronze/copper. 'Bronze' is the
    most natural modern English rendering for metal objects in biblical contexts;
    'brazen' is archaic in this sense.
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  lexicon: BDAG
  rationale: The antecedent in context is grammatically feminine in Greek, referring
    to the destructive tongue/speech personified. 'Her' preserves the personification
    better than the impersonal 'its.'
