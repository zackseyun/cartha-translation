id: SIR.28.20
reference: Sirach 28:20
source:
  edition: lxx-swete-1909
  text: ὁ γὰρ ζυγὸς αὐτῆς ζυγὸς σιδηροῦς, καὶ οἱ δεσμοὶ αὐτῆς δεσμοὶ χαλκεῖοι·
  language: Greek
