translation:
  text: Many have fallen by the mouth of the sword, but not as those who have fallen
    because of the tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'by the mouth of the sword.' Many English versions render
      the idiom 'by the edge of the sword,' but the more literal wording preserves
      the verse's contrast with 'the tongue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: Many
  alternatives:
  - A great many
  - Many people
  lexicon: LSJ
  rationale: Straightforward quantitative adjective; 'Many' is natural and sufficiently
    formal.
- source_word: ἔπεσαν
  chosen: have fallen
  alternatives:
  - fell
  - were struck down
  lexicon: LSJ
  rationale: Aorist form literally means 'fell.' English present perfect fits proverbial/wisdom
    style, expressing a repeated reality with continuing relevance. 'Were struck down'
    is interpretive and less direct.
- source_word: ἐν στόματι μαχαίρας
  chosen: by the mouth of the sword
  alternatives:
  - by the edge of the sword
  - by a sword's mouth
  lexicon: LSJ
  rationale: The Greek idiom literally says 'in/by the mouth of a sword.' Retaining
    'mouth of the sword' preserves the vivid metaphor and sets up the contrast with
    'tongue.' 'Edge of the sword' is idiomatic English but weakens the wordplay between
    mouth/tongue.
- source_word: καὶ οὐχ ὡς
  chosen: but not as many as
  alternatives:
  - and not like
  - and not so much as
  lexicon: LSJ
  rationale: In context this comparative phrase contrasts the number slain by swords
    with those ruined by speech. 'But not as many as' makes the implied comparison
    explicit in clear English.
- source_word: οἱ πεπτωκότες
  chosen: those who have fallen
  alternatives:
  - the ones who fell
  - those fallen
  lexicon: LSJ
  rationale: Perfect participle naturally rendered as 'those who have fallen,' matching
    the first clause and preserving the repeated imagery of falling.
- source_word: διὰ γλῶσσαν
  chosen: because of the tongue
  alternatives:
  - through the tongue
  - by the tongue
  - because of speech
  lexicon: LSJ
  rationale: διά with accusative indicates cause or means. 'Because of the tongue'
    preserves the concrete metaphor of destructive speech; 'speech' would flatten
    the imagery.
