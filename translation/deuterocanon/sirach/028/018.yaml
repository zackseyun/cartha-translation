theological_decisions:
- issue: Metaphorical contrast between sword and tongue
  chosen_reading: Preserve the literal body-part imagery ('mouth' and 'tongue') rather
    than smoothing to abstract 'edge' and 'speech.'
  alternative_readings:
  - Translate idiomatically as 'edge of the sword' and 'speech'
  rationale: This is not a doctrinal crux, but it is a significant interpretive choice.
    The verse's wisdom force depends on the sharp contrast between physical weaponry
    and destructive words. Keeping the imagery better reflects the Greek text and
    the rhetorical punch.
  doctrine_reference: Translation philosophy §§1, 6
