translation:
  text: There was a coal before him; he blew on it, and it blazed up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''If you blow on a spark, it will ignite; and if you spit
      on it, it will be quenched; and both come out of your mouth.'' The Hebrew witness
      is shorter and reads ''There was a coal before him; he blew on it, and it blazed
      up.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הָיְתָה
  chosen: There was
  alternatives:
  - it was
  - there came to be
  lexicon: HALOT
  rationale: The Hebrew clause opens existentially rather than emphasizing the subject
    alone. 'There was' gives natural English while preserving the simple verbal sense.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in front of him
  - before it
  lexicon: HALOT
  rationale: The Hebrew prepositional phrase most naturally means 'before him/in front
    of him.' The masculine singular suffix is retained as 'him' from the Hebrew witness.
    The Greek parallel shifts to second person and expands the saying, but the Hebrew
    is the primary source here.
- source_word: גַחֶלֶת
  chosen: a coal
  alternatives:
  - an ember
  - a live coal
  lexicon: HALOT
  rationale: '''Coal'' is the straightforward gloss for גחלת. ''Ember'' is possible
    and is supported conceptually by the Greek σπινθήρ (''spark''), but the Hebrew
    witness specifically names a coal, so that wording is preferred.'
- source_word: נָפַח
  chosen: he blew on it
  alternatives:
  - he breathed on it
  - he fanned it
  lexicon: HALOT
  rationale: The verb means to blow/breathe. 'Blew on it' is idiomatic English for
    kindling fire and matches the concrete image.
- source_word: וּבָעֲרָה
  chosen: and it blazed up
  alternatives:
  - and it burned
  - and it caught fire
  lexicon: HALOT
  rationale: בער in this context denotes igniting/burning. 'Blazed up' captures the
    inceptive force after blowing on the coal and reads naturally in English.
- source_word: ἐὰν φυσήσῃς σπινθῆρα ἐκκαήσεται
  chosen: kept in view but not followed in main text
  alternatives:
  - if you blow on a spark, it will ignite
  lexicon: BDAG
  rationale: The Greek parallel presents the saying in second person and with 'spark'
    rather than 'coal,' likely reflecting a different or expanded form of the proverb.
    Because the Hebrew survives and is the primary witness, the main text follows
    the Hebrew while preserving the Greek expansion in a footnote.
