translation:
  text: Remember the commandments, and do not be angry with your neighbor; remember
    the covenant of the Most High, and overlook ignorance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pass over ignorance'—that is, overlook an offense arising from ignorance.
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητι
  chosen: Remember
  alternatives:
  - Keep in mind
  - Be mindful of
  lexicon: LSJ
  rationale: Aorist middle imperative of μιμνῄσκομαι/μιμνήσκομαι, calling for active
    recollection. 'Remember' is the most direct and idiomatic imperative in English.
    The verb governs both objects in the verse by ellipsis, so it is supplied again
    in English for clarity in the second clause.
- source_word: ἐντολῶν
  chosen: the commandments
  alternatives:
  - the commands
  - the commandments of the law
  lexicon: LSJ
  rationale: Genitive plural after μνήσθητι. 'Commandments' preserves the moral-religious
    force better than the flatter 'commands.' No explicit qualifier such as 'of the
    law' appears in the Greek, so it is not added.
- source_word: μὴ μηνίσῃς
  chosen: do not be angry
  alternatives:
  - do not be wrathful
  - do not be resentful
  lexicon: LSJ
  rationale: Aorist subjunctive with μή functioning as a prohibition. μηνίω denotes
    anger or wrath. 'Do not be angry' is natural modern English and fits the ethical
    context without overstating to 'rage.'
- source_word: τῷ πλησίον
  chosen: with your neighbor
  alternatives:
  - at your neighbor
  - toward your neighbor
  lexicon: LSJ
  rationale: πλησίον in ethical contexts means 'neighbor.' English idiom prefers 'be
    angry with your neighbor' rather than a more wooden prepositional rendering.
- source_word: διαθήκην Ὑψίστου
  chosen: the covenant of the Most High
  alternatives:
  - the covenant with the Most High
  - the pact of the Most High
  lexicon: LSJ
  rationale: διαθήκη regularly means 'covenant' in biblical Greek. The genitive is
    best rendered 'of the Most High,' preserving the title Ὑψίστος as 'the Most High'
    rather than paraphrasing. 'With the Most High' is interpretive and not required
    by the Greek form.
- source_word: πάριδε
  chosen: overlook
  alternatives:
  - ignore
  - pass over
  - disregard
  lexicon: LSJ
  rationale: Imperative of παροράω/παρίδωμι in the sense of passing over or overlooking.
    'Overlook' best captures the ethical exhortation to forbearance without implying
    denial of the offense.
- source_word: ἄγνοιαν
  chosen: ignorance
  alternatives:
  - an error done in ignorance
  - unknowing
  lexicon: LSJ
  rationale: ἄγνοια denotes ignorance or lack of knowledge. In context it likely refers
    to an offense arising from ignorance, but the noun itself is simply 'ignorance,'
    so the translation stays close while allowing the ethical implication to be heard.
