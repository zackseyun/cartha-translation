translation:
  text: As the fuel of a fire, so it will be kindled; according to a man's strength,
    so will his wrath be; and according to his wealth he will raise up his anger,
    and according to the firmness of the conflict it will be kindled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wood' instead of 'fuel' for ὕλην; the Greek more literally refers to
      the material that feeds a fire.
    reason: lexical_alternative
  - marker: b
    text: The final clause could also be understood more interpretively as 'according
      to how severe the conflict is, so it will blaze up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕλην
  chosen: fuel
  alternatives:
  - wood
  - material
  lexicon: LSJ
  rationale: In context with πυρός and ἐκκαυθήσεται, ὕλη refers to combustible material
    feeding a fire. 'Fuel' is more idiomatic and contextually precise than the more
    literal but narrower 'wood' or broader 'material'.
- source_word: ἐκκαυθήσεται
  chosen: will be kindled
  alternatives:
  - will burn up
  - will blaze up
  - will be inflamed
  lexicon: LSJ
  rationale: The future passive conveys being set ablaze or ignited. 'Will be kindled'
    preserves the metaphor and allows the final occurrence to echo the first. 'Will
    be inflamed' would over-interpret toward anger in the first clause.
- source_word: ἰσχὺν
  chosen: strength
  alternatives:
  - power
  - might
  lexicon: LSJ
  rationale: ἰσχύς denotes strength or capability. 'Strength' is the most natural
    English equivalent here and fits the proverb-like comparison between a person's
    capacity and the scale of his anger.
- source_word: ἀνθρώπου
  chosen: a man's
  alternatives:
  - a person's
  - a human being's
  lexicon: LSJ
  rationale: The Greek singular ἀνθρώπου is generic, but the surrounding pronouns
    are masculine singular and the project's philosophy prefers gender-accurate rendering
    where representative force is present. 'A man's' preserves the singular proverbial
    form.
- source_word: θυμός
  chosen: wrath
  alternatives:
  - anger
  - rage
  lexicon: LSJ
  rationale: θυμός can denote passionate anger or fury. 'Wrath' better distinguishes
    it from the later ὀργή, allowing the verse's paired anger terms to remain differentiated
    in English.
- source_word: πλοῦτον
  chosen: wealth
  alternatives:
  - riches
  - abundance
  lexicon: LSJ
  rationale: πλοῦτος here refers to material resources or social means. 'Wealth' is
    clear modern English and fits the escalation motif of the verse.
- source_word: ἀνυψώσει
  chosen: will raise up
  alternatives:
  - will increase
  - will stir up
  - will exalt
  lexicon: LSJ
  rationale: The verb literally means to lift up or raise. 'Will raise up' keeps the
    metaphor visible and avoids collapsing it into an interpretive gloss like 'increase,'
    though the sense is intensification.
- source_word: ὀργήν
  chosen: anger
  alternatives:
  - wrath
  - indignation
  lexicon: LSJ
  rationale: ὀργή commonly denotes anger or indignation. Rendering it as 'anger' while
    θυμός is rendered 'wrath' preserves a lexical distinction without forcing an overly
    technical contrast.
- source_word: στερέωσιν
  chosen: firmness
  alternatives:
  - hardness
  - strength
  - severity
  lexicon: LSJ
  rationale: στερέωσις denotes solidity, firmness, or fixed strength. In the phrase
    τῆς μάχης it likely refers to the intensity or entrenched character of the conflict.
    'Firmness' is a relatively literal rendering that preserves the image while leaving
    room for interpretation.
- source_word: μάχης
  chosen: conflict
  alternatives:
  - battle
  - strife
  - quarrel
  lexicon: LSJ
  rationale: μάχη can mean battle or fight, but in Sirach's wisdom context about interpersonal
    anger, 'conflict' best captures the broader relational sense without sounding
    militarized.
