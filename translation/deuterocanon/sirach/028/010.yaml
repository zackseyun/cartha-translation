theological_decisions:
- issue: Rendering the generic singular ἀνθρώπου with masculine English
  chosen_reading: a man's
  alternative_readings:
  - a person's
  - one's
  rationale: The verse uses a generic singular in proverbial style with masculine
    singular possessives. Following the project's gender-accurate policy, the translation
    preserves the masculine representative form rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Differentiating θυμός and ὀργή in English
  chosen_reading: θυμός = 'wrath'; ὀργή = 'anger'
  alternative_readings:
  - render both as 'anger'
  - θυμός = 'rage'; ὀργή = 'wrath'
  rationale: The Greek employs two related but distinct anger terms in close proximity.
    Preserving some distinction in English reflects the source text more transparently,
    even if the semantic overlap remains substantial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
