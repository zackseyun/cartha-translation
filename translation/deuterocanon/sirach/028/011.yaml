translation:
  text: A hastened quarrel kindles fire, and a hastened fight pours out blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A hurried quarrel kindles fire, and a fight rushed into sheds blood.'
      The Greek participles stress conflict that is driven forward too quickly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρις
  chosen: quarrel
  alternatives:
  - strife
  - contention
  lexicon: LSJ
  rationale: ἔρις denotes discord or contention between parties. 'Quarrel' gives a
    natural modern English rendering for interpersonal conflict without becoming too
    abstract.
- source_word: κατασπευδομένη
  chosen: hastened
  alternatives:
  - hurried
  - rushed
  - hasty
  lexicon: LSJ
  rationale: The participle conveys something being pressed on or hurried along. In
    context it describes a quarrel that is accelerated rather than restrained. 'Hastened'
    preserves the verbal force and links to the warning against escalation.
- source_word: ἐκκαίει
  chosen: kindles
  alternatives:
  - sets ablaze
  - burns up
  lexicon: LSJ
  rationale: The verb means to kindle or ignite. 'Kindles' keeps the metaphor vivid
    and concise.
- source_word: πῦρ
  chosen: fire
  lexicon: LSJ
  rationale: Literal 'fire' is the natural rendering and preserves the metaphor of
    conflict escalating destructively.
- source_word: μάχη
  chosen: fight
  alternatives:
  - battle
  - combat
  - brawl
  lexicon: LSJ
  rationale: In this wisdom context the term refers to violent conflict. 'Fight' is
    the most readable and proportionate English equivalent.
- source_word: κατασπεύδουσα
  chosen: hasty
  alternatives:
  - hurried
  - rushing
  - hastening
  lexicon: LSJ
  rationale: Here the participle modifies μάχη. Rendering it adjectivally as 'hasty'
    produces idiomatic English while preserving the sense of rash escalation.
- source_word: ἐκχέει αἷμα
  chosen: pours out blood
  alternatives:
  - sheds blood
  lexicon: LSJ
  rationale: The phrase is literally 'pours out blood.' Although 'sheds blood' is
    idiomatic, 'pours out blood' stays closer to the Greek imagery and matches the
    force of ἐκχέει.
