translation:
  text: See, fence in your property with thorns; bind up your silver and your gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enclose your possessions with thornbushes' and 'secure your silver and
      gold.' The Greek imagery is concrete and proverbial, urging careful guarding
      of what is valuable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδε
  chosen: See
  alternatives:
  - Look
  - Take notice
  lexicon: LSJ
  rationale: An attention-getting imperative. 'See' preserves the brief, direct force
    of the Greek better than a more expanded paraphrase.
- source_word: περίφραξον
  chosen: fence in
  alternatives:
  - enclose
  - hedge around
  - fortify
  lexicon: LSJ
  rationale: The verb denotes enclosing or fencing around. 'Fence in' is natural modern
    English and keeps the concrete image of protective enclosure.
- source_word: τὸ κτῆμά σου
  chosen: your property
  alternatives:
  - your possession
  - your estate
  lexicon: LSJ
  rationale: κτῆμα refers to what one possesses, especially property or goods. 'Property'
    is broad enough to fit the context without sounding archaic like 'estate'.
- source_word: ἀκάνθαις
  chosen: with thorns
  alternatives:
  - with thornbushes
  - with briars
  lexicon: LSJ
  rationale: 'The dative is instrumental: the enclosure is made ''with thorns.'' The
    image is literal and proverbial, so the simple ''thorns'' is preferred.'
- source_word: τὸ ἀργύριόν σου
  chosen: your silver
  alternatives:
  - your money
  lexicon: LSJ
  rationale: Though silver can function as money, the Greek explicitly says 'silver.'
    Retaining the metal keeps the parallel with 'gold' and preserves the concrete
    wording.
- source_word: καὶ τὸ χρυσίον
  chosen: and your gold
  alternatives:
  - and your wealth
  lexicon: LSJ
  rationale: The Greek names gold specifically. 'Wealth' would overgeneralize and
    flatten the paired image of precious metals.
- source_word: κατάδησον
  chosen: bind up
  alternatives:
  - tie up
  - secure
  - fasten
  lexicon: LSJ
  rationale: The verb means to bind or tie securely. 'Bind up' preserves the literal
    image while still reading naturally in English as a command to secure valuables.
