id: SIR.28.21
reference: Sirach 28:21
source:
  edition: lxx-swete-1909
  text: θάνατος πονηρὸς ὁ θάνατος αὐτῆς, καὶ λυσιτελὴς μᾶλλον ὁ ᾅδης αὐτῆς.
  language: Greek
