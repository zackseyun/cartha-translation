translation:
  text: Its death is an evil death, and its Hades is more advantageous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her death is an evil death'; the feminine pronoun refers back to the
      feminine antecedent in the previous context, likely the tongue or slanderous
      speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'Hades is better than it' or 'the realm of the dead is preferable to
      it.'
    reason: alternative_reading
lexical_decisions:
- source_word: θάνατος
  chosen: death
  alternatives:
  - deadly end
  lexicon: LSJ
  rationale: The noun appears twice for emphasis. Rendering it straightforwardly as
    'death' preserves the stark parallelism and the personified description of the
    antecedent 'it/her' from the previous verse.
- source_word: πονηρός
  chosen: evil
  alternatives:
  - bad
  - grievous
  - wretched
  lexicon: LSJ
  rationale: πονηρός can mean morally evil or harmful/bad. Here, modifying 'death,'
    it conveys a ruinous, dreadful character. 'Evil' preserves the force and the rhetorical
    sharpness better than the flatter 'bad.'
- source_word: αὐτῆς
  chosen: its
  alternatives:
  - her
  lexicon: LSJ
  rationale: The pronoun is feminine because it refers back to the feminine antecedent
    in context (the tongue/slanderous speech in the preceding verse). English can
    render this either personally ('her') or non-personally ('its'). 'Its' avoids
    over-personifying while still referring back clearly.
- source_word: λυσιτελής
  chosen: more profitable
  alternatives:
  - more advantageous
  - better
  - more beneficial
  lexicon: LSJ
  rationale: The adjective means advantageous or profitable. In this comparative construction
    with μᾶλλον, the sense is that even Hades is preferable by comparison. 'More profitable'
    is a close lexical rendering, though idiomatically strong.
- source_word: μᾶλλον
  chosen: more
  alternatives:
  - rather
  - instead
  lexicon: LSJ
  rationale: 'This marks comparison: Hades is ''more'' advantageous than the death
    associated with the antecedent. ''More'' keeps the comparative explicit.'
- source_word: ᾅδης
  chosen: Hades
  alternatives:
  - the grave
  - Sheol
  - the realm of the dead
  lexicon: LSJ
  rationale: As a deuterocanonical Greek text translated from Greek, ᾅδης is best
    preserved as 'Hades' rather than assimilated to 'grave.' This keeps the term's
    reference to the underworld/the realm of the dead without overinterpreting it.
