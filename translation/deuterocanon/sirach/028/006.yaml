translation:
  text: Remember the end, and stop being hostile; remember decay and death, and remain
    in the commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the last things.' The phrase can mean one's final end
      or ultimate outcome.
    reason: lexical_alternative
  - marker: b
    text: The supplied Hebrew witness here reads a different saying, approximately,
      '...one answers a matter before he hears,' indicating a source-location mismatch
      rather than a straightforward variant for this verse.
    reason: textual_variant
lexical_decisions:
- source_word: μνήσθητι
  chosen: Remember
  alternatives:
  - Keep in mind
  - Be mindful of
  lexicon: BDAG
  rationale: The Hebrew in Zone 1 appears mismatched to this verse, while the Greek
    parallel supplies a coherent imperative. 'Remember' is the direct and natural
    rendering of the aorist middle imperative, fitting wisdom exhortation style.
- source_word: τὰ ἔσχατα
  chosen: the end
  alternatives:
  - the last things
  - your end
  lexicon: BDAG
  rationale: Literally 'the last things,' but in concise English wisdom style 'the
    end' best captures reflection on one's final outcome. The broader sense is preserved
    in a footnote.
- source_word: παῦσαι ἐχθραίνων
  chosen: stop being hostile
  alternatives:
  - cease from enmity
  - stop hating
  lexicon: BDAG
  rationale: The participial construction conveys ongoing hostile behavior. 'Stop
    being hostile' is readable modern English and avoids over-specifying emotional
    hatred where the Greek can denote enmity/hostility more broadly.
- source_word: καταφθοράν
  chosen: decay
  alternatives:
  - corruption
  - destruction
  lexicon: BDAG
  rationale: The noun can denote corruption or ruin. In the paired expression with
    'death,' 'decay' naturally evokes bodily perishability and mortality in English
    without importing a narrower moral sense.
- source_word: θάνατον
  chosen: death
  lexicon: BDAG
  rationale: Standard rendering; paired with 'decay' as the object of remembrance.
- source_word: ἔμμενε
  chosen: remain
  alternatives:
  - abide
  - continue steadfastly
  lexicon: BDAG
  rationale: The imperative calls for persistence. 'Remain' is simple, direct, and
    idiomatic with 'in the commandments.'
- source_word: ἐντολαῖς
  chosen: the commandments
  alternatives:
  - the commands
  - the commandments of God
  lexicon: BDAG
  rationale: The Greek lacks an explicit divine possessive, so the translation does
    not add 'of God.' 'The commandments' preserves the moral-religious force typical
    of wisdom literature.
