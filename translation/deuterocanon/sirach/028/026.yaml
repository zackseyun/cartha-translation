translation:
  text: Take care lest you slip in it, lest you fall before one lying in wait.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek pronoun 'it' refers to a feminine antecedent from the surrounding
      context; this verse by itself does not restate the noun explicitly.
    reason: cross_reference
lexical_decisions:
- source_word: πρόσεχε
  chosen: Take care
  alternatives:
  - Be on guard
  - Pay attention
  lexicon: LSJ
  rationale: Imperative of προσέχω here warns the hearer to exercise caution. 'Take
    care' is natural modern English and preserves the admonitory force without sounding
    overly formal.
- source_word: μὴ πῶς
  chosen: lest
  alternatives:
  - so that not
  - in case
  lexicon: LSJ
  rationale: The combination introduces a negative purpose/result warning. English
    'lest' compactly conveys the cautionary sense in both clauses.
- source_word: ὀλισθήσῃς
  chosen: you slip
  alternatives:
  - you stumble
  - you slide
  lexicon: LSJ
  rationale: The verb denotes slipping or losing footing. 'Slip' fits the imagery
    and avoids overinterpreting it as a moral 'stumble,' though that metaphor may
    be present.
- source_word: ἐν αὐτῇ
  chosen: by it
  alternatives:
  - in it
  - through it
  lexicon: LSJ
  rationale: The pronoun refers back to the feminine antecedent in the context, most
    likely the dangerous object just discussed (the tongue/speech imagery). Because
    English 'in it' is awkward with 'slip,' 'by it' conveys proximate cause or occasion
    while remaining restrained. Source-level antecedent remains contextual rather
    than explicit in this verse alone.
- source_word: πέσῃς
  chosen: you fall
  alternatives:
  - you collapse
  - you be brought down
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist subjunctive preserving the
    physical-metaphorical warning.
- source_word: κατέναντι
  chosen: before
  alternatives:
  - in front of
  - opposite
  lexicon: LSJ
  rationale: The preposition here marks being brought down in the presence of or directly
    before the ambusher. 'Before' is idiomatic and concise.
- source_word: ἐνεδρεύοντος
  chosen: one lying in wait
  alternatives:
  - an ambusher
  - one who lurks
  lexicon: LSJ
  rationale: The participle denotes someone setting an ambush or lying in wait. 'One
    lying in wait' preserves the verbal force and menace of the Greek better than
    the more interpretive noun 'ambusher'.
