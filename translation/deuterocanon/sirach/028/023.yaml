translation:
  text: Those who forsake the Lord will fall into it, and it will burn among them
    and will certainly not be quenched; it will be sent out against them like a lion,
    and like a leopard it will ravage them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The pronoun 'it' refers to the destructive power described in the preceding
      context, especially the tongue's harmful speech.
    reason: cross_reference
  - marker: b
    text: Or 'it will be kindled in them'; the Greek can be read with a more internal
      sense than 'among them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'like a panther.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ καταλείποντες
  chosen: Those who forsake
  alternatives:
  - Those who abandon
  - Those who leave behind
  lexicon: LSJ
  rationale: The participle denotes people characterized by leaving or abandoning.
    'Forsake' best captures covenantal/religious abandonment in natural English and
    fits the object 'the Lord'.
- source_word: Κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Follows the project's default rendering for κύριος. With no explicit
    divine name in the Greek, 'the Lord' is the natural English expression here.
- source_word: ἐμπεσοῦνται εἰς αὐτήν
  chosen: will fall into it
  alternatives:
  - will fall into her
  - will be caught in it
  lexicon: LSJ
  rationale: The verb means 'fall into.' The feminine pronoun refers back to the preceding
    feminine noun in context (the destructive tongue/slander imagery of the passage).
    English 'it' is idiomatic for the antecedent image without over-personifying it.
- source_word: ἐν αὐτοῖς ἐκκαήσεται
  chosen: it will burn among them
  alternatives:
  - it will be kindled in them
  - it will blaze against them
  lexicon: LSJ
  rationale: ἐκκαίω can mean kindle or burn up. 'Burn among them' preserves the destructive
    spread of the image while avoiding an overly internalized reading ('in them')
    that the context does not require.
- source_word: οὐ μὴ σβεσθῇ
  chosen: will certainly not be quenched
  alternatives:
  - will not be quenched
  - will never be extinguished
  lexicon: LSJ
  rationale: οὐ μή with the aorist subjunctive is emphatic negation. 'Will certainly
    not be quenched' preserves that force better than a simple future negative.
- source_word: ἐξαποσταλήσεται ἐπʼ αὐτοῖς
  chosen: it will be sent out against them
  alternatives:
  - it will be unleashed against them
  - it will be sent upon them
  lexicon: LSJ
  rationale: The passive future of ἐξαποστέλλω is literally 'will be sent out.' 'Against
    them' captures ἐπί with hostile force in context. 'Unleashed' is vivid but slightly
    more interpretive.
- source_word: ὡς λέων
  chosen: like a lion
  alternatives:
  - as a lion
  lexicon: LSJ
  rationale: Simple simile; 'like a lion' is standard modern English.
- source_word: ὡς πάρδαλις
  chosen: like a leopard
  alternatives:
  - like a panther
  lexicon: LSJ
  rationale: πάρδαλις commonly denotes a leopard/panther-type big cat. 'Leopard' is
    the most standard and recognizable English equivalent.
- source_word: λυμανεῖται
  chosen: it will ravage them
  alternatives:
  - it will maul them
  - it will destroy them
  - it will lay them waste
  lexicon: LSJ
  rationale: The verb conveys violent damage or ruin. 'Ravage' fits the predatory-animal
    imagery and preserves the sense of destructive assault without narrowing it to
    literal biting.
