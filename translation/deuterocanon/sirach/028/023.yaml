theological_decisions:
- issue: Referent of the pronoun αὐτήν / implied subject throughout the verse
  chosen_reading: Render the feminine pronoun and repeated subject as 'it,' referring
    back to the destructive tongue/slander image from the immediate context.
  alternative_readings:
  - Render more explicitly as 'the tongue' in the main text
  - Render the pronoun as 'her' to preserve grammatical gender
  rationale: The Greek uses a feminine pronoun whose antecedent is supplied by the
    preceding context, not repeated here. English normally uses 'it' for such an abstract
    or metaphorical antecedent. Supplying 'the tongue' in the main text would clarify
    but goes beyond the wording of this verse; 'her' would sound misleadingly personified
    in English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without paraphrasing beyond what the text warrants.'
