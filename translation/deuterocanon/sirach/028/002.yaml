lexical_decisions:
- source_word: ἄφες
  chosen: Forgive
  alternatives:
  - let go
  - pardon
  lexicon: BDAG
  rationale: The Hebrew Zone 1 text appears to reflect a different verse, while the
    Greek parallel directly matches Sirach 28:2 in the traditional numbering. ἄφες
    is an aorist imperative meaning 'forgive' or 'release'; 'forgive' best fits the
    interpersonal offense context and idiomatic English.
- source_word: ἀδίκημα
  chosen: the wrong
  alternatives:
  - offense
  - injustice
  - wrongdoing
  lexicon: BDAG
  rationale: ἀδίκημα denotes a wrong or injury committed against someone. 'The wrong'
    is concise and natural in English while preserving the concrete sense of an offense
    done by one person to another.
- source_word: τῷ πλησίον σου
  chosen: your neighbor
  alternatives:
  - your fellow
  - the one near you
  lexicon: BDAG
  rationale: πλησίον in ethical contexts conventionally means 'neighbor.' This preserves
    the biblical moral register without sounding archaic.
- source_word: δεηθέντος σου
  chosen: when you pray
  alternatives:
  - when you make supplication
  - when you ask
  lexicon: BDAG
  rationale: The genitive absolute refers to the time of making supplication. 'When
    you pray' gives clear modern English while retaining the religious sense of petition
    to God.
- source_word: αἱ ἁμαρτίαι σου λυθήσονται
  chosen: your sins will be released
  alternatives:
  - your sins will be forgiven
  - your sins will be loosed
  lexicon: BDAG
  rationale: λυθήσονται is literally 'will be loosed/released,' not the more common
    verb for forgive. 'Will be released' preserves the metaphorical force and avoids
    over-assimilating the phrase to standard forgiveness formulas, while still communicating
    the result in understandable English.
