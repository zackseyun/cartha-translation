translation:
  text: Whoever pays attention to it will never find rest, nor will he settle down
    in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'nor will he camp/dwell with quietness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ προσέχων
  chosen: Whoever pays attention
  alternatives:
  - the one who gives heed
  - whoever listens closely
  - the one who attends to
  lexicon: BDAG
  rationale: The articular present participle functions generically, referring to
    any person characterized by giving heed. 'Whoever pays attention' is natural modern
    English and preserves the sense of directing oneself toward something.
- source_word: αὐτῇ
  chosen: to it
  alternatives:
  - to her
  lexicon: BDAG
  rationale: The pronoun is feminine because it refers back to the feminine noun in
    context (the slandering/double tongue). English need not preserve grammatical
    gender here, and 'it' better reflects the referent as a thing rather than a female
    person.
- source_word: οὐ μὴ εὑρῇ
  chosen: will never find
  alternatives:
  - shall certainly not find
  - will by no means find
  lexicon: BDAG
  rationale: οὐ μή with the subjunctive is an emphatic negation. 'Will never find'
    conveys the force clearly in idiomatic English without sounding wooden.
- source_word: ἀνάπαυσιν
  chosen: rest
  alternatives:
  - repose
  - relief
  lexicon: BDAG
  rationale: '''Rest'' is the most straightforward equivalent and fits the wisdom
    context of inward or social tranquility.'
- source_word: οὐδὲ κατασκηνώσει
  chosen: nor will he settle down
  alternatives:
  - nor will he dwell
  - nor will he encamp
  - nor will he lodge
  lexicon: BDAG
  rationale: The verb literally evokes pitching camp or dwelling. In this context
    it is metaphorical for coming to settled repose. 'Settle down' communicates that
    sense in readable English while retaining the image of finding a stable place.
- source_word: μεθʼ ἡσυχίας
  chosen: in peace
  alternatives:
  - in quietness
  - with tranquility
  - in quiet
  lexicon: BDAG
  rationale: ἡσυχία denotes quietness, calm, or tranquility. 'In peace' is slightly
    interpretive but idiomatic with 'settle down' and captures the state of undisturbed
    calm intended by the phrase.
