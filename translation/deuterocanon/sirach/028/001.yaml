  parallel_sources:
  - edition: lxx-swete-1909
    text: ὁ ἐκδικῶν παρὰ Κυρίου εὑρήσει ἐκδίκησιν, καὶ τὰς ἁμαρτίας αὐτοῦ διατηρῶν
      διατηρήσει.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 28:1
translation:
  text: Do not boast about tomorrow’s trouble, for you do not know what a day may
    bring forth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew line supplied for this verse reads, 'Do not dread tomorrow's
      trouble, for you do not know what a day will bring forth,' which does not match
      the Greek Sirach text here and appears to reflect a different verse or a transmission
      mismatch. The translation therefore follows the Greek witness for Sirach 28:1.
    reason: textual_variant
  - marker: b
    text: Or 'he will keep his sins stored up.' The Greek repeats the same verb for
      emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐκδικῶν
  chosen: the one who takes vengeance
  alternatives:
  - the avenger
  - whoever exacts revenge
  lexicon: BDAG
  rationale: Zone 1 Hebrew appears to reflect a different text (matching Prov 27:1)
    and is marked minor_mismatch, while the Greek parallel provides the actual Sirach
    28:1 wording. The participial construction is rendered generically as 'the one
    who...' for readable modern English while preserving the habitual sense.
- source_word: παρὰ Κυρίου
  chosen: from the Lord
  alternatives:
  - from the LORD
  - at the hands of the Lord
  lexicon: BDAG
  rationale: παρά with genitive here indicates source. 'Lord' follows project default
    for κύριος.
- source_word: εὑρήσει ἐκδίκησιν
  chosen: will find vengeance
  alternatives:
  - will receive vengeance
  - will encounter punishment
  lexicon: BDAG
  rationale: Keeps the lexical repetition with ἐκδικῶν/ἐκδίκησιν visible in English.
    'Find' is slightly idiomatic but still close to the Greek.
- source_word: τὰς ἁμαρτίας αὐτοῦ
  chosen: his sins
  alternatives:
  - his offenses
  lexicon: BDAG
  rationale: Standard rendering of ἁμαρτίαι; no need to weaken the moral force.
- source_word: διατηρῶν διατηρήσει
  chosen: he will surely keep his sins in mind
  alternatives:
  - he will keep them stored up
  - he will preserve them
  - he will keep them
  lexicon: BDAG
  rationale: The Greek repeats the same verb for emphasis. In context, the sense is
    that his sins are retained against him, not merely remembered mentally. 'Keep
    ... in mind' communicates ongoing retention in accessible English, while 'surely'
    reflects the emphatic repetition.
