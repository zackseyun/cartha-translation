translation:
  text: A third tongue has shaken many and scattered them from nation to nation,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a slanderous tongue,' 'a double tongue,' or more generally 'divisive
      speech.' The Greek reads literally 'a third tongue,' an idiom left transparent
      in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: γλῶσσα
  chosen: tongue
  alternatives:
  - language
  - speech
  lexicon: LSJ
  rationale: The Greek literally means 'tongue' and can extend metaphorically to speech.
    Here the idiom 'third tongue' is striking and likely proverbial, so retaining
    'tongue' preserves the image better than flattening to 'speech' or 'language'.
- source_word: τρίτη
  chosen: third
  alternatives:
  - treacherous
  - double
  lexicon: LSJ
  rationale: 'The adjective is straightforwardly ordinal: ''third.'' Although the
    phrase is idiomatic and some interpreters explain it as a slanderous or divisive
    tongue, the Greek text itself says ''third,'' so the main text preserves that
    wording rather than importing an interpretation.'
- source_word: ἐσάλευσεν
  chosen: has shaken
  alternatives:
  - has disturbed
  - has overthrown
  lexicon: LSJ
  rationale: The verb commonly means to shake, agitate, or unsettle. 'Has shaken'
    keeps the concrete metaphor while fitting the moral-social context.
- source_word: διέστησεν
  chosen: scattered
  alternatives:
  - divided
  - separated
  lexicon: LSJ
  rationale: The verb can mean to separate or set apart; in context with 'from nation
    to nation' it conveys dispersal among peoples. 'Scattered' captures the resulting
    social fragmentation more naturally in English while remaining close to the Greek
    sense.
- source_word: ἀπὸ ἔθνους εἰς ἔθνος
  chosen: from nation to nation
  alternatives:
  - from one people to another
  - from nation among nation
  lexicon: LSJ
  rationale: This phrase marks movement or displacement across peoples. 'From nation
    to nation' is concise, idiomatic English and preserves the repeated ἔθνος.
