translation:
  text: A blow from a whip makes welts, but a blow from the tongue shatters bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bruises' for 'welts'; the Greek term denotes marks left by blows.
    reason: lexical_alternative
lexical_decisions:
- source_word: πληγὴ
  chosen: a blow
  alternatives:
  - a wound
  - a strike
  lexicon: LSJ
  rationale: In both clauses πληγὴ denotes the impact of a strike rather than the
    resulting injury alone. 'A blow' preserves the parallelism between physical striking
    and verbal striking.
- source_word: μάστιγος
  chosen: from a whip
  alternatives:
  - of a whip
  - from scourging
  lexicon: LSJ
  rationale: The genitive identifies the instrument causing the blow. 'From a whip'
    is natural English and keeps the concrete image.
- source_word: ποιεῖ
  chosen: makes
  alternatives:
  - produces
  - causes
  lexicon: LSJ
  rationale: A simple present verb fits the proverb-like statement and keeps the first
    colon vivid and direct.
- source_word: μώλωπας
  chosen: welts
  alternatives:
  - bruises
  - stripes
  lexicon: LSJ
  rationale: The term refers to raised marks or bruising from blows. 'Welts' best
    matches the effect of a whip in contemporary English, more specifically than 'bruises'
    and less archaic than 'stripes'.
- source_word: γλώσσης
  chosen: the tongue
  alternatives:
  - speech
  - the tongue's words
  lexicon: LSJ
  rationale: The Greek uses the concrete metaphor 'tongue' for harmful speech. Retaining
    'tongue' preserves the imagery and the contrast with the whip.
- source_word: συγκλάσει
  chosen: will shatter
  alternatives:
  - will break
  - crushes
  lexicon: LSJ
  rationale: The future form gives the second colon a forceful proverbial prediction.
    'Will shatter' conveys the intensified violence of συνκλάω better than the milder
    'break'.
- source_word: ὀστᾶ
  chosen: bones
  alternatives:
  - the bones
  lexicon: LSJ
  rationale: The plural object is literal within the metaphor. English idiom works
    best without the article here.
