theological_decisions:
- issue: Anthropological term σὰρξ in a wisdom context
  chosen_reading: being flesh
  alternative_readings:
  - being mortal
  - being only flesh
  rationale: Following doctrine, σάρξ is rendered according to context. Here it refers
    to human frailty, not a technical doctrine of the sinful nature. 'Being flesh'
    preserves the biblical tension and concreteness.
  doctrine_reference: 'DOCTRINE.md: Contested terms — σάρξ ''flesh (literal) / sinful
    nature (metaphorical)'' context-dependent'
- issue: Atonement language in ἐξιλάσεται
  chosen_reading: make atonement
  alternative_readings:
  - forgive
  - make propitiation
  rationale: The verse asks how a person who clings to wrath can expect divine dealing
    with his own sins. 'Make atonement' preserves that cultic/theological register
    without importing a narrower doctrinal system.
  doctrine_reference: 'DOCTRINE.md: readable modern English; preserve theological
    tension rather than resolve it'
