translation:
  text: Blow on a spark, and it will be kindled; spit on it, and it will be quenched;
    and both come out of your mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew here is difficult and appears to read more literally,
      'Spit on it, and it will be quenched,' with a bracketed continuation, 'both
      of them are from your mouth.' The Greek parallel instead reads, 'Curse the whisperer
      and the double-tongued,' which is followed in the main text because it gives
      the clearer sense in context.
    reason: alternative_reading
lexical_decisions:
- source_word: רָקַק בָּהּ
  chosen: Curse
  alternatives:
  - Spit at it
  - Spit on him/it
  lexicon: HALOT
  rationale: The extant Hebrew literally reads 'spit at/on it,' but the parallel Greek
    has an imperative meaning 'curse.' Given the bracketed and likely uncertain Hebrew
    continuation, and because the Greek provides a coherent admonition matching the
    context, the main text follows the Greek sense while preserving the Hebrew literal
    alternative in a footnote.
- source_word: וְכָבְתָה
  chosen: the whisperer
  alternatives:
  - and it will be quenched
  - and it will go out
  lexicon: HALOT
  rationale: The Hebrew phrase literally means 'and it will be quenched,' likely continuing
    a metaphor from the previous verse about extinguishing a spark. However, the Greek
    parallel reads 'the whisperer,' which fits the verse's direct object of cursing.
    Because the Hebrew line as transmitted appears divergent and the bracketed material
    signals textual instability, the translation adopts the Greek-based reading for
    the main text and notes the Hebrew image in a footnote.
- source_word: '[וּשְׁנֵיהֶם מִפִּיךָ הֵם]'
  chosen: and the double-tongued
  alternatives:
  - both of them are from your mouth
  - both come from your mouth
  lexicon: HALOT
  rationale: The bracketed Hebrew likely reflects a damaged or uncertain reading and
    does not align straightforwardly with the Greek δίγλωσσον ('double-tongued').
    Since the task directs use of the Greek parallel as actual translation input,
    the main text follows the Greek's clear ethical target while preserving the Hebrew
    alternative in a footnote.
- source_word: Ψίθυρον
  chosen: the whisperer
  alternatives:
  - the slanderer
  - the talebearer
  lexicon: BDAG
  rationale: '''Whisperer'' preserves the image of secretive, malicious speech and
    stays close to the Greek. ''Slanderer'' is interpretive; ''talebearer'' is accurate
    but archaic.'
- source_word: δίγλωσσον
  chosen: the double-tongued
  alternatives:
  - the deceitful speaker
  - the two-faced
  lexicon: BDAG
  rationale: '''Double-tongued'' is the most transparent equivalent, preserving the
    metaphor of duplicitous speech without flattening it into a modern idiom.'
- source_word: εἰρηνεύοντας
  chosen: who were at peace
  alternatives:
  - who lived in peace
  - peaceable people
  lexicon: BDAG
  rationale: This participle describes people in a state of peace. 'Who were at peace'
    is natural English and preserves the verbal sense better than the adjectival 'peaceable.'
