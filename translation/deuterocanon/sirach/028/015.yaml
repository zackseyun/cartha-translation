translation:
  text: A third tongue has driven out strong women, and has deprived them of the fruit
    of their labor;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a divisive tongue' or 'a backbiting tongue.' The Greek literally says
      'a third tongue,' an idiom likely describing speech that intrudes as a third
      party and separates people.
    reason: lexical_alternative
lexical_decisions:
- source_word: γλῶσσα
  chosen: tongue
  alternatives:
  - speech
  - language
  lexicon: LSJ
  rationale: Literally 'tongue'; in context it refers metaphorically to harmful speech
    or slander. Retaining 'tongue' preserves the vivid personification used throughout
    the passage.
- source_word: τρίτη
  chosen: third
  alternatives:
  - double
  - treacherous
  lexicon: LSJ
  rationale: The Greek reads 'third.' In Sirach's idiom this likely refers to a divisive
    or backbiting tongue that comes in as a third party between others. 'Third' is
    kept formally in the main text rather than interpreting it away.
- source_word: γυναῖκας ἀνδρείας
  chosen: strong women
  alternatives:
  - courageous women
  - noble women
  lexicon: LSJ
  rationale: ἀνδρείας, though etymologically linked to manliness/courage, describes
    strength or bravery. 'Strong women' is natural English and preserves the gendered
    reference without awkwardness.
- source_word: ἐξέβαλεν
  chosen: has driven out
  alternatives:
  - cast out
  - expelled
  lexicon: LSJ
  rationale: The verb commonly means to cast out or drive out. 'Driven out' fits the
    social-disruptive context and reads naturally in English.
- source_word: ἐστέρεσεν
  chosen: has deprived
  alternatives:
  - robbed
  - made destitute of
  lexicon: LSJ
  rationale: The verb conveys causing lack or deprivation. 'Has deprived' is clear
    and sufficiently strong without overinterpreting the mechanism.
- source_word: τῶν πόνων αὐτῶν
  chosen: the fruit of their labor
  alternatives:
  - their labors
  - their toil
  - the results of their work
  lexicon: LSJ
  rationale: πόνων literally means 'toils/labors,' but after 'deprived them of' English
    idiom is better served by 'the fruit of their labor,' making explicit that what
    is lost is what their toil produced.
