translation:
  text: And make for your words a balance and a measure, and make for your mouth a
    door and a bolt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek ζυγόν commonly means ''yoke,'' but here, paired with ''measure,''
      it is taken in the sense of a balance or weighing device: the point is to weigh
      and regulate one''s speech.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγοις
  chosen: words
  alternatives:
  - speech
  - sayings
  lexicon: LSJ
  rationale: λόγος here refers to what one says; 'words' is the most direct and natural
    English rendering in this admonitory context.
- source_word: ζυγόν
  chosen: balance
  alternatives:
  - yoke
  - scale
  lexicon: LSJ
  rationale: Although ζυγός often means 'yoke,' in collocation with σταθμός it points
    to weighing imagery. 'Balance' best fits the paired metaphor of measured speech.
- source_word: σταθμόν
  chosen: measure
  alternatives:
  - weight
  - standard
  lexicon: LSJ
  rationale: The term can denote a weight or standard used in weighing. 'Measure'
    communicates the broader idea of regulated, controlled speech and pairs idiomatically
    with 'balance'.
- source_word: στόματί
  chosen: mouth
  alternatives:
  - speech
  lexicon: LSJ
  rationale: 'A literal rendering preserves the concrete metaphor that follows: a
    physical barrier placed on the mouth as an image for restraint.'
- source_word: θύραν
  chosen: door
  alternatives:
  - gate
  lexicon: LSJ
  rationale: The image is of shutting access to the mouth; 'door' is the straightforward
    literal equivalent and works naturally in English.
- source_word: μοχλόν
  chosen: bolt
  alternatives:
  - bar
  - latch
  lexicon: LSJ
  rationale: μοχλός is a bar or lever used to secure a door. 'Bolt' is concise, idiomatic,
    and preserves the image of firmly restraining speech.
- source_word: ποίησον
  chosen: make
  alternatives:
  - fashion
  - set
  lexicon: LSJ
  rationale: The repeated imperative is best kept with the simple verb 'make,' preserving
    the parallel structure of the Greek exhortation.
