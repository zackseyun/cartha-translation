id: SIR.28.25
reference: Sirach 28:25
source:
  edition: lxx-swete-1909
  text: καὶ τοῖς λόγοις σου ποίησον ζυγὸν καὶ σταθμόν, καὶ τῷ στόματί σου ποίησον
    θύραν καὶ μοχλόν.
