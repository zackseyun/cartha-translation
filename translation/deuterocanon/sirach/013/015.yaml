theological_decisions:
- issue: Use of the Hebrew witness versus the Greek parallel in an elliptical first
    colon
  chosen_reading: Translate primarily from the Hebrew, with the Greek used to clarify
    the sense as association with one's own kind.
  alternative_readings:
  - Every creature loves its like, and every man his neighbor.
  rationale: The Hebrew is the primary witness for extant Sirach here, but its first
    colon is compressed. The Greek parallel is therefore used as an actual translation
    input to confirm the underlying sense of affinity with one's own kind. The main
    text stays closer to the Hebrew's 'kind' language rather than adopting the Greek's
    'neighbor.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    parallel Greek as input when present.'
