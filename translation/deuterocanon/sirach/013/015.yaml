translation:
  text: Every kind of flesh keeps to its own kind, and a man is joined to his own
    kind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Every living thing loves what is like itself, and every
      man his neighbor.'' The Hebrew main text emphasizes being joined to one''s own
      kind.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִין
  chosen: kind
  alternatives:
  - species
  - sort
  lexicon: HALOT
  rationale: מִין denotes a class or kind. 'Kind' is the most natural English equivalent
    here and matches the proverb-like generalization.
- source_word: כָּל בָּשָׂר
  chosen: every living thing
  alternatives:
  - all flesh
  - every creature
  lexicon: HALOT
  rationale: Literally 'all flesh,' but in this wisdom context it refers broadly to
    animate creatures. The Greek parallel πᾶν ζῷον supports an animal/living-creature
    sense rather than a strictly literal 'flesh.' 'Every living thing' preserves the
    scope while reading naturally in English.
- source_word: אֶצְלוֹ
  chosen: to its own
  alternatives:
  - with it
  - beside it
  - near its like
  lexicon: HALOT
  rationale: The phrase מִין כָּל בָּשָׂר אֶצְלוֹ is elliptical. In light of the parallel
    Greek 'every living thing loves what is like itself' and the second colon 'to
    his kind a man is joined,' the sense is association with what is like oneself.
    'To its own' captures the relational force without overtranslating the ellipsis.
- source_word: יְחֻבַּר
  chosen: is joined
  alternatives:
  - is associated
  - is attached
  - keeps company
  lexicon: HALOT
  rationale: The passive of חבר conveys being joined or associated. 'Is joined' is
    close to the Hebrew and fits the proverb's statement about social affinity.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - humankind
  - a person
  lexicon: HALOT
  rationale: The singular generic אדם here parallels 'every living thing' and speaks
    of human social behavior in general. Per project philosophy, the masculine singular
    is retained where representative/generic force is present; 'a man' best matches
    the source form and proverbial style.
