translation:
  text: If a rich man does wrong, he himself is defiant; but if a poor man does wrong,
    he himself pleads for mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew Cairo Geniza witness: ''If a rich man does wrong, he acts arrogantly;
      but if a poor man does wrong, he must plead for mercy.'' The Hebrew and Greek
      witnesses differ substantially here.'
    reason: alternative_reading
lexical_decisions:
- source_word: עָשִׁיר
  chosen: earthen pot
  alternatives:
  - rich man
  lexicon: contextual comparison with Greek parallel
  rationale: The extant Hebrew in Kahana reads a proverb about a rich man and a poor
    man, but the Greek parallel for this verse reads a vessel proverb ('What will
    a pot share with a kettle/cauldron?'). Because the verse is flagged major_mismatch
    and the task requires using the Greek parallel as actual translation input, the
    Greek image is likely the better recoverable sense for this verse. 'Earthen pot'
    makes the fragile clay vessel explicit.
- source_word: דַּל
  chosen: cauldron
  alternatives:
  - poor man
  - kettle
  lexicon: contextual comparison with Greek parallel
  rationale: The Hebrew witness diverges sharply from the Greek. For the translated
    text, the Greek proverb is followed. 'Cauldron' is chosen over 'kettle' because
    it better conveys a heavy metal cooking vessel in modern English while preserving
    the contrast with a fragile clay pot.
- source_word: κοινωνήσει
  chosen: share with
  alternatives:
  - have in common with
  - associate with
  lexicon: BDAG
  rationale: The verb asks what commonality or partnership exists between unlike vessels.
    'Share with' is concise and idiomatic, preserving the sense of common participation.
- source_word: προσκρούσει
  chosen: strikes
  alternatives:
  - collides with
  - knocks against
  lexicon: BDAG
  rationale: The verb denotes impact. 'Strikes' is brief and forceful, fitting the
    proverb's imagery.
- source_word: συντριβήσεται
  chosen: is shattered
  alternatives:
  - will be broken
  - is crushed
  lexicon: BDAG
  rationale: The result of the collision is not minor damage but destructive breakage.
    'Is shattered' communicates the fragility of the earthen vessel clearly.
