- issue: Divergent Hebrew and Greek witnesses for Sirach 13:3
  chosen_reading: Translate the Greek vessel proverb in the main text, while preserving
    the Hebrew rich/poor saying in a footnote.
  alternative_readings:
  - 'Translate the Hebrew: ''If a rich man does wrong, he acts proudly; but if a poor
    man does wrong, he must plead for mercy.'''
  rationale: Zone 1 marks the Hebrew witness as 'major_mismatch' and supplies the
    Greek as a parallel to be used as actual translation input. Since Sirach is translated
    from Hebrew where it survives but with Greek kept in view, and because this verse's
    witnesses are not merely stylistic variants but different sayings, the main text
    should honestly reflect the better recoverable reading rather than harmonize them.
    The Hebrew alternative is preserved in a footnote due to its substantial witness
    value.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, but
    use Greek parallel as actual translation input when present; preserve source uncertainty
    honestly.'
