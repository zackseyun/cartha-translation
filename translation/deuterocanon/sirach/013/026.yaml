translation:
  text: A person's heart changes his face, whether for good or for evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel text differs notably here, reading along the lines of
      a cheerful face as the sign of a heart in good things, followed by a difficult
      clause about finding parables with labor. Because the Hebrew witness is extant
      and primary for this verse, the main text follows the Hebrew; the Greek confirms
      the general link between inner disposition and outward expression but not the
      exact wording.
    reason: textual_variant
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Hebrew wisdom literature, לֵב commonly denotes the inner person as
    the seat of thought and disposition. 'Heart' preserves the concrete anthropological
    idiom and matches the verse's contrast between inward state and outward face.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - person
  - human being
  lexicon: HALOT
  rationale: The noun is singular and masculine/generic. Per project philosophy, a
    gender-accurate rendering is preferred where the source uses a masculine human
    term with representative force. 'A man's heart' is natural English and preserves
    the Hebrew form.
- source_word: יְשַׁנֵּא
  chosen: changes
  alternatives:
  - alters
  - transforms
  lexicon: HALOT
  rationale: From שנה in the sense 'to change, alter.' The Hebrew indicates that the
    inner disposition affects or alters the outward appearance. 'Changes' is the most
    direct and readable rendering. The Greek parallel points in the same semantic
    direction by linking the heart with a cheerful face in good circumstances.
- source_word: פָנָיו
  chosen: his face
  alternatives:
  - his appearance
  - his countenance
  lexicon: HALOT
  rationale: Literally 'his face.' This concrete wording should be retained rather
    than generalized to 'appearance,' since the proverb concerns visible expression.
    'Countenance' is possible but less natural in modern English.
- source_word: אִם לְטוֹב וְאִם לְרָע
  chosen: whether for good or for bad
  alternatives:
  - whether for good or for evil
  - for better or for worse
  lexicon: HALOT
  rationale: The paired construction marks two opposite outcomes. 'Good ... bad' is
    clear modern English and avoids importing a stronger moral sense than the context
    requires, though 'evil' remains a viable alternative. 'For better or for worse'
    is idiomatic but too paraphrastic.
