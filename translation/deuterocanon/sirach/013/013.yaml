translation:
  text: Be on guard and be careful, and do not walk with violent men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''for you are walking with your downfall'' or ''with your
      fall.'' The Hebrew witness instead reads, ''do not walk with violent men.'''
    reason: textual_variant
lexical_decisions:
- source_word: הִשָּׁמֵר
  chosen: Be on guard
  alternatives:
  - Guard yourself
  - Take care
  - Beware
  lexicon: HALOT
  rationale: Niphal imperative of שמר conveys guarding oneself or being watchful.
    'Be on guard' is idiomatic modern English and preserves the reflexive cautionary
    force.
- source_word: וֶהְיֵה זָהִיר
  chosen: and be very careful
  alternatives:
  - and be cautious
  - and be vigilant
  lexicon: HALOT
  rationale: זָהִיר denotes carefulness/caution. The Greek parallel πρόσεχε σφοδρῶς
    intensifies the warning ('pay very close attention'), supporting the stronger
    English 'be very careful' rather than a flatter 'be cautious'.
- source_word: וְאַל תִּתְהַלֵּךְ
  chosen: and do not walk
  alternatives:
  - and do not go about
  - and do not associate
  lexicon: HALOT
  rationale: The hithpael of הלך literally means 'walk about' or 'conduct oneself.'
    In wisdom context, 'walk with' naturally carries both literal and associative
    force in English, preserving the Hebrew metaphor without paraphrasing it away.
- source_word: עִם
  chosen: with
  alternatives:
  - among
  - alongside
  lexicon: HALOT
  rationale: Simple accompaniment/association is in view. 'With' best fits the wisdom
    warning against companionship.
- source_word: אַנְשֵׁי חָמָס
  chosen: violent men
  alternatives:
  - men of violence
  - lawless men
  - wrongdoers
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, wrongdoing, or ruthless injustice. 'Violent
    men' is concise, natural English and keeps the concrete moral danger. 'Men of
    violence' is more formal but less idiomatic. The masculine 'men' reflects the
    Hebrew wording per the project's gender-accurate policy.
