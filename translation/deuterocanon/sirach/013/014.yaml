theological_decisions:
- issue: Hebrew vs. Greek nuance in the second colon
  chosen_reading: Follow the Hebrew 'the one like himself' in the main text
  alternative_readings:
  - his neighbor
  rationale: For Sirach, surviving Hebrew is primary where extant. The Greek parallel
    likely reflects either an interpretive expansion or a Vorlage nuance, but the
    Hebrew plainly emphasizes likeness/similarity. The Greek alternative is worth
    preserving in a footnote because it is a major ancient witness and slightly shifts
    the saying toward social proximity rather than similarity.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    use Greek parallel as actual input/consistency check'
