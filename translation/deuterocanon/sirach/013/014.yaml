id: SIR.13.14
reference: Sirach 13:14
source:
  edition: sefaria-ben-sira-kahana
  text: כָּל הַבָּשָׂר יֶאֱהַב מִינוֹ, וְכָל אָדָם אֶת הַדּוֹמֶה לוֹ.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: πᾶν ζῷον ἀγαπᾷ τὸ ὅμοιον αὐτῷ, καὶ πᾶς ἄνθρωπος τὸν πλησίον αὐτοῦ·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 13:14
translation:
  text: All flesh loves its own kind, and every person the one like himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and every man his neighbor.'' The Hebrew reads more literally,
      ''the one like him.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל הַבָּשָׂר
  chosen: All flesh
  alternatives:
  - Every living creature
  - All creatures
  lexicon: HALOT
  rationale: The Hebrew literally reads 'all the flesh.' In wisdom-style generalization
    this can denote living beings broadly, but 'flesh' preserves the Hebrew wording
    and matches the parallel Greek πᾶν ζῷον only as a consistency check, not as the
    primary base text. Retaining 'flesh' also keeps the proverb's earthy, embodied
    register.
- source_word: יֶאֱהַב
  chosen: loves
  alternatives:
  - will love
  - likes
  lexicon: HALOT
  rationale: Imperfect verb used gnomicly in a proverb; present-tense English best
    conveys the general truth.
- source_word: מִינוֹ
  chosen: its own kind
  alternatives:
  - its species
  - its own sort
  lexicon: HALOT
  rationale: מין denotes kind/species/sort. 'Its own kind' is idiomatic modern English
    and fits the proverb's observation about affinity among like beings.
- source_word: וְכָל אָדָם
  chosen: and every man
  alternatives:
  - and every person
  - and everyone
  lexicon: HALOT
  rationale: אָדָם here refers to a human being in a generic singular construction.
    Per the project's gender-accurate policy, 'man' is retained where the source uses
    the masculine/generic form, especially since the next phrase uses a masculine
    singular suffix ('like himself').
- source_word: אֶת הַדּוֹמֶה לוֹ
  chosen: the one like himself
  alternatives:
  - his like
  - the one similar to him
  - his neighbor
  lexicon: HALOT
  rationale: The Hebrew means 'the one resembling him / like him.' The Greek parallel
    has τὸν πλησίον αὐτοῦ ('his neighbor'), but the Hebrew witness is primary here
    and more specific. 'The one like himself' preserves the comparative sense without
    importing the broader ethical sense of 'neighbor' into the main text.
