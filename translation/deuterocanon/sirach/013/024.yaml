translation:
  text: When a poor man speaks, they say, “Who is this?” and if he stumbles, they
    push him down even more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'they too push him'; the sense is that others add to his downfall
      rather than helping him when he stumbles.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel differs substantially here: ''Wealth is good when there
      is no sin in it, and poverty is evil in the mouth of the godly.'' The main translation
      follows the extant Hebrew witness, with the Greek kept in view as a parallel
      tradition.'
    reason: textual_variant
lexical_decisions:
- source_word: דַּל
  chosen: a poor man
  alternatives:
  - the poor man
  - a poor person
  lexicon: HALOT
  rationale: דַּל denotes one who is poor, weak, or socially lowly. The singular is
    retained. 'A poor man' fits the Hebrew wording and the proverb-like generic sense;
    'poor person' is possible but less gender-accurate to the masculine form.
- source_word: דּוֹבֵר
  chosen: speaks
  alternatives:
  - is speaking
  - talks
  lexicon: HALOT
  rationale: 'The participle functions generically here: when the poor man speaks.
    ''Speaks'' is natural English and preserves the ongoing/general force without
    awkwardness.'
- source_word: מִי זֶה
  chosen: Who is this?
  alternatives:
  - Who is that?
  - Who is he?
  lexicon: HALOT
  rationale: The phrase expresses dismissive contempt toward the speaker. 'Who is
    this?' best preserves the demeaning directness of the Hebrew.
- source_word: נִתְקַל
  chosen: stumbles
  alternatives:
  - falters
  - is tripped up
  - falls
  lexicon: HALOT
  rationale: The verb can denote stumbling or coming to ruin. 'Stumbles' preserves
    the concrete image while allowing the social/moral implication typical of wisdom
    literature.
- source_word: יֶהְדֳּפוּהוּ
  chosen: they push him down all the more
  alternatives:
  - they thrust him away
  - they drive him off
  - they push him over
  lexicon: HALOT
  rationale: From הדף, to push, thrust, or drive away. In context, after the poor
    man stumbles, the point is not mere exclusion but compounding his downfall. 'Push
    him down all the more' captures both the physical metaphor and the social cruelty.
- source_word: גַּם הֵם
  chosen: all the more
  alternatives:
  - even they
  - they too
  lexicon: HALOT
  rationale: 'Literally ''even they/they too,'' but idiomatically in this context
    it intensifies the action: beyond dismissing him, they also add to his fall. ''All
    the more'' conveys the force in natural English.'
