translation:
  text: When a noble draws near, keep your distance, and then he will bring you nearer
    still.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew ''When a noble draws you near'' is somewhat terse and could be taken
      more literally as ''Draw near to a noble; be far off.'' The Greek parallel supports
      the sense adopted here: when a powerful person summons you, maintain reserve,
      and he will invite you closer.'
    reason: alternative_reading
lexical_decisions:
- source_word: קָרֵב
  chosen: draws you near
  alternatives:
  - comes near
  - invites you near
  - when you approach
  lexicon: HALOT
  rationale: The Hebrew consonants can be read as an imperative ('draw near') or,
    with the Greek parallel in view, as describing the noble's act of summoning/bringing
    near. The LXX προσκαλεσαμένου σε supports taking the sense as the ruler's invitation
    rather than the addressee's initiative, so 'draws you near' best reflects the
    combined evidence in idiomatic English.
- source_word: נָדִיב
  chosen: noble
  alternatives:
  - prince
  - generous man
  - magnate
  lexicon: HALOT
  rationale: In wisdom context this refers to a socially elevated, powerful person.
    'Noble' captures rank/status without over-specifying monarchy. The Greek δυνάστης
    points toward a powerful ruler, confirming the social-power nuance.
- source_word: הֱיֶה רָחוֹק
  chosen: keep your distance
  alternatives:
  - be far off
  - stand back
  - withdraw
  lexicon: HALOT
  rationale: The phrase is an imperative urging reserve in the presence of the powerful.
    'Keep your distance' is natural modern English and preserves the cautionary force.
    The Greek ὑποχωρῶν γίνου similarly suggests stepping back or maintaining reserve.
- source_word: וּכְדֵי כֵן
  chosen: and then
  alternatives:
  - and accordingly
  - to that degree
  - all the more
  lexicon: HALOT
  rationale: The idiom marks the consequence of such restraint. Because the following
    verb already carries the comparative sense in context, 'and then' gives clear
    English flow while preserving the causal/resultative connection. The Greek τόσῳ
    μᾶλλον shows an intensifying result ('all the more'), which informs the sense.
- source_word: יַגִּישֶׁךָ
  chosen: he will bring you nearer still
  alternatives:
  - he will bring you near
  - he will invite you forward
  - he will approach you
  lexicon: HALOT
  rationale: 'From נגשׁ, here with object suffix, the sense is causing someone to
    come closer. ''Bring you nearer still'' reflects the comparative force supported
    by the Greek προσκαλέσεταί σε with τόσῳ μᾶλλον, and fits the proverb''s social
    wisdom: modest reserve elicits greater favor.'
