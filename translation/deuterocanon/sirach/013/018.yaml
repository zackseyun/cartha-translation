translation:
  text: The wild beasts of the wilderness are food for the lion; so the poor are the
    pasture of the rich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: “What peace has a hyena with a dog? And what peace has a rich man
      with a poor man?” The Greek parallel preserves a different proverb with the
      same social point of hostility between rich and poor.'
    reason: alternative_reading
  - marker: b
    text: Or possibly “wild donkeys of the wilderness,” if the Hebrew term is taken
      more narrowly rather than as wild animals generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַאֲכַל
  chosen: food for
  alternatives:
  - prey of
  - something eaten by
  lexicon: HALOT
  rationale: The noun denotes what is eaten. 'Food for' is natural English and preserves
    the predatory image without over-specifying the mode of capture. 'Prey of' is
    possible but slightly narrower than the Hebrew.
- source_word: אֲרִי
  chosen: lion
  lexicon: HALOT
  rationale: Standard rendering of the animal term.
- source_word: פִּרְאֵי מִדְבָּר
  chosen: the wild beasts of the wilderness
  alternatives:
  - the wild animals of the desert
  - the wild donkeys of the wilderness
  lexicon: HALOT
  rationale: The phrase most naturally refers broadly to wild creatures of the open
    country/desert. Because פרא can in some contexts point to a wild ass, an alternative
    is worth preserving, but the plural construct with 'wilderness' here works well
    as a collective for wild animals generally, matching the proverb's broad predatory
    comparison.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - likewise
  lexicon: HALOT
  rationale: Introduces the comparison in straightforward proverbial style.
- source_word: מַרְעִית
  chosen: the pasture of
  alternatives:
  - grazing place for
  - prey of
  lexicon: HALOT
  rationale: 'Literally a pasture/grazing place. In context it is metaphorical: the
    poor are what the rich feed upon. ''The pasture of'' preserves the Hebrew image
    more closely than flattening it to ''prey,'' while still making sense in English.'
- source_word: עָשִׁיר
  chosen: the rich
  alternatives:
  - a rich man
  lexicon: HALOT
  rationale: Used generically as a class in proverbial contrast with the poor; English
    plural best conveys the representative force.
- source_word: דַּלִּים
  chosen: the poor
  alternatives:
  - poor people
  - the weak
  lexicon: HALOT
  rationale: The term denotes the poor/needy and fits the social contrast in the verse.
    'The weak' is possible in some contexts, but here economic and social vulnerability
    is primary, reinforced by the Greek πένητα.
