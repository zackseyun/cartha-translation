translation:
  text: If you are useful to him, he will make use of you; and if you bow down, he
    will not spare you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek tradition: ''The rich man does wrong, and he even blusters; the poor
      man is wronged, and he must even beg.'' The Hebrew witness preserved here gives
      a different warning about how a powerful person uses you when you are useful
      and shows no pity when you are brought low.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם תִּכְשַׁר לוֹ
  chosen: if you are useful to him
  alternatives:
  - if you succeed with him
  - if you are fit for him
  - if you prosper for him
  lexicon: HALOT
  rationale: The Hebrew root כשר here carries the sense of being suitable, fit, or
    advantageous. In context with the following verb יַעֲבֹד בָּךְ, the point is not
    moral uprightness but practical usefulness to a powerful person. 'Useful to him'
    best captures the exploitative social sense and aligns with the Greek parallel's
    rich/poor dynamic.
- source_word: יַעֲבֹד בָּךְ
  chosen: he will make use of you
  alternatives:
  - he will work you
  - he will exploit you
  - he will employ you
  lexicon: HALOT
  rationale: Literally 'he will work in/with you' or 'he will use you.' 'Make use
    of you' preserves the idiomatic force without overcommitting to the stronger interpretive
    gloss 'exploit,' though exploitation is clearly implied by context.
- source_word: וְאִם תִּכְרַע
  chosen: if you fall low
  alternatives:
  - if you bow down
  - if you collapse
  - if you are brought low
  lexicon: HALOT
  rationale: The verb כרע literally means to bend, kneel, or collapse. In this wisdom
    context, it likely refers to being reduced, weakened, or humbled in status. 'Fall
    low' communicates social and personal decline in readable English while retaining
    the metaphorical force.
- source_word: לֹא יַחְמֹל עָלֶיךָ
  chosen: he will not spare you
  alternatives:
  - he will not pity you
  - he will show you no compassion
  - he will not have mercy on you
  lexicon: HALOT
  rationale: חמל denotes sparing or showing pity/compassion. 'He will not spare you'
    is concise, idiomatic, and fits the warning tone; it also leaves room for both
    emotional hardness and practical ruthlessness.
- source_word: πλούσιος / πτωχός (Greek parallel)
  chosen: kept implicit in the English rather than explicit
  alternatives:
  - the rich man ... the poor man
  lexicon: BDAG
  rationale: The Greek parallel frames the saying through rich and poor, but the primary
    Hebrew witness expresses the principle in direct second-person address. Since
    the task prioritizes the Hebrew where extant, the English follows the Hebrew syntax
    while allowing the Greek to confirm the social-exploitative sense of the verse.
