translation:
  text: As long as you are useful, he will make sport of you; two or three times he
    will flatter you. Then he will look at you as if to pass beyond you, and he will
    shake his head at you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew יְהָתֵל can suggest mocking, trifling with, or toying with someone;
      'make sport of you' aims to preserve that range.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew of the middle clause is difficult. The Greek witness expands
      the thought: after using you, he later sees you and leaves you. The translation
      follows the Hebrew while keeping the Greek parallel in view.'
    reason: textual_variant
lexical_decisions:
- source_word: עַד אֲשֶׁר תּוֹעִיל
  chosen: As long as you are useful
  alternatives:
  - Until you are of use
  - So long as you benefit him
  lexicon: HALOT
  rationale: The Hebrew clause marks duration/condition tied to the addressee's usefulness.
    'As long as you are useful' is idiomatic English and fits the social-exploitation
    context confirmed by the Greek χρείαν ἔσχηκέν σου ('he has need of you').
- source_word: יְהָתֵל בָּךְ
  chosen: he will make sport of you
  alternatives:
  - he will mock you
  - he will toy with you
  - he will deceive you
  lexicon: HALOT
  rationale: The Hithpael/denominative sense from התל can involve mocking, trifling,
    or making a plaything of someone. Given the parallel Greek includes both misleading
    friendliness and later open contempt, 'make sport of you' preserves the exploitative,
    derisive nuance without overcommitting to outright deception in this clause.
- source_word: פַעֲמַיִם שָׁלֹשׁ
  chosen: two or three times
  alternatives:
  - twice or three times
  - again and again
  lexicon: HALOT
  rationale: The Hebrew is a straightforward numeric idiom. 'Two or three times' is
    natural modern English and preserves the limited-but-repeated sense.
- source_word: יַעֲרִיצֶךָ
  chosen: he will flatter you
  alternatives:
  - he will honor you
  - he will praise you
  - he will fawn over you
  lexicon: HALOT
  rationale: In context the rich man temporarily treats the poor person with exaggerated
    regard for self-serving ends. The Greek parallel earlier in the verse speaks of
    smiling, speaking good things, and giving hope; thus 'flatter you' best captures
    insincere elevation rather than genuine honor.
- source_word: וּבְכֵן
  chosen: Then
  alternatives:
  - And afterward
  - So then
  lexicon: HALOT
  rationale: This transitional particle moves the scene from temporary favor to rejection.
    'Then' is concise and readable.
- source_word: יִרְאֲךָ לְהִתְעַבֵּר בָּךְ
  chosen: he will look at you as if to pass beyond you
  alternatives:
  - he will look at you in order to pass by you
  - he will look at you with aversion
  - he will turn away from you
  lexicon: HALOT
  rationale: The Hebrew is somewhat difficult, but the verbal idea from עבר suggests
    passing by / moving on. The Greek parallel ὄψεταί σε καὶ καταλείψει σε ('he will
    see you and leave you') supports a sense of dismissive disregard rather than physical
    aggression. 'As if to pass beyond you' preserves the Hebrew image while remaining
    intelligible.
- source_word: וּבְרֹאשׁוֹ יָנִיעַ אֵלֶיךָ
  chosen: he will shake his head at you
  alternatives:
  - he will wag his head at you
  - he will nod his head toward you
  lexicon: HALOT
  rationale: The idiom of moving the head toward someone commonly signals scorn or
    dismissal. The Greek exactly parallels this gesture (τὴν κεφαλὴν αὐτοῦ κινήσει
    ἐπὶ σοί). 'Shake his head at you' is the clearest modern equivalent.
