translation:
  text: Do not draw near, lest you be pushed away; and do not stay far off, lest you
    be hated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''lest you be forgotten'' or ''neglected'' in the second clause,
      instead of Hebrew ''lest you be hated.'' The main text follows the surviving
      Hebrew witness; the Greek suggests a softer consequence that fits the social
      setting.'
    reason: alternative_reading
  - marker: b
    text: The first clause is difficult in the Hebrew as transmitted; the Greek parallel
      supports the sense of being repelled or pushed away if one comes too close.
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּתְקָרֵב
  chosen: Do not draw near
  alternatives:
  - Do not come close
  - Do not approach
  lexicon: HALOT
  rationale: The Hebrew reflexive/imperfect with אַל gives a prohibition. 'Draw near'
    preserves the relational/spatial nuance and matches wisdom-style admonition better
    than the more clinical 'approach.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: '''Lest'' concisely conveys the warning force of פן in both clauses and
    suits the proverb-like parallelism.'
- source_word: תִּתְרַחֵק
  chosen: you be pushed away
  alternatives:
  - you be distanced
  - you be driven away
  - you become far off
  lexicon: HALOT
  rationale: The Hebrew form from רחק in this context is somewhat awkward in the surviving
    text, and the Greek parallel has ἀπωσθῇς ('be thrust/pushed away'). Using 'be
    pushed away' reflects the likely sense of being repelled by an important person,
    while remaining anchored to the Hebrew warning about becoming distant.
- source_word: וְאַל תִּתְרַחֵק
  chosen: and do not stay far off
  alternatives:
  - and do not keep your distance
  - and do not go far away
  lexicon: HALOT
  rationale: Here the same root clearly carries the opposite side of the balanced
    admonition. 'Stay far off' preserves the antithetical parallel with 'draw near'
    and reads naturally in English.
- source_word: תִּשָּׂנֵא
  chosen: you be hated
  alternatives:
  - you be despised
  - you become odious
  lexicon: HALOT
  rationale: The Hebrew verb normally means 'be hated.' This is stronger and more
    direct than 'despised.' Although the Greek parallel reads ἐπιλησθῇς ('be forgotten/neglected'),
    the primary Hebrew witness supports 'be hated,' so the main text follows Hebrew
    and preserves the Greek-based alternative in a footnote.
