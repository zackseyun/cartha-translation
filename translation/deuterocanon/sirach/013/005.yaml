translation:
  text: If you have something, he will speak kindly with you, and he will strip you
    bare without feeling pain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''If you are useful, he will work with you; and if you
      are lacking, he will leave you.'' This reflects a materially different form
      of the verse than the surviving Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם שַלְּךָ
  chosen: If you have something
  alternatives:
  - If you are useful
  - If you have means
  - If you have wealth
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult and marked by source-level mismatch.
    In light of the Greek parallel ἐὰν χρησιμεύσῃς ('if you are useful / of service')
    and the immediate context about exploitation by the rich, the phrase likely points
    to possessing resources or being of use. 'If you have something' preserves the
    Hebrew-oriented sense of having means while remaining broad enough to overlap
    with the Greek idea of usefulness.
- source_word: יֵיטִיב דְּבָרָיו עִמָּךְ
  chosen: he will speak kindly with you
  alternatives:
  - he will make his words good toward you
  - he will treat you with pleasant words
  lexicon: HALOT
  rationale: Literally 'he will make his words good with you.' The idiom refers to
    speaking pleasantly or ingratiatingly. 'Speak kindly with you' is natural English
    and keeps the verbal focus on speech.
- source_word: וִירֹשֶׁשְׁךָ
  chosen: he will strip you bare
  alternatives:
  - he will impoverish you
  - he will despoil you
  - he will exhaust you
  lexicon: HALOT
  rationale: From a root associated with impoverishing or dispossessing. 'Strip you
    bare' vividly conveys the predatory sense in context, while 'impoverish you' is
    a viable more formal alternative. The Greek parallel differs here, reading 'if
    you are lacking, he will leave you,' which suggests a somewhat different Vorlage
    or interpretive tradition; the Hebrew witness is followed in the main text because
    Hebrew survives for this verse.
- source_word: וְלֹא יִכְאַב לוֹ
  chosen: without feeling pain
  alternatives:
  - and it will not hurt him
  - and he will not be grieved
  - and he will feel no pain
  lexicon: HALOT
  rationale: The clause indicates that the exploiter suffers no distress over what
    he has done. 'Without feeling pain' expresses the idiom smoothly in English while
    preserving the moral callousness.
