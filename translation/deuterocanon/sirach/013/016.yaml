translation:
  text: What fellowship has a wolf with a lamb? So a wicked man with a righteous man,
    and likewise a rich man with a man brought low.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a rich man with a man brought low.'' The final expression is
      somewhat uncertain; it may denote a socially low or reduced person, hence ''brought
      low.'''
    reason: lexical_alternative
  - marker: b
    text: 'Greek parallel: ''All flesh gathers according to kind, and a man will cling
      to one like himself.'' This reflects a different form of the saying and supports
      the general theme that people associate with their own kind.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה יְּחֻבַּר
  chosen: What fellowship has
  alternatives:
  - What can be joined
  - How can there be association between
  - What companionship has
  lexicon: HALOT
  rationale: The passive of חבר asks rhetorically about being joined or associated.
    In English, 'What fellowship has ... with ...?' captures the relational sense
    naturally while preserving the rhetorical force. The Greek parallel speaks of
    gathering/cleaving to one's like, supporting an association sense rather than
    a merely physical joining.
- source_word: זְאֵב
  chosen: wolf
  lexicon: HALOT
  rationale: Straightforward animal term in the comparison.
- source_word: כֶּבֶשׂ
  chosen: lamb
  alternatives:
  - sheep
  lexicon: HALOT
  rationale: In this predator-prey contrast, 'lamb' is more pointed and idiomatic
    than the broader 'sheep,' matching the vulnerability implied by the proverb.
- source_word: רָשָׁע
  chosen: wicked man
  alternatives:
  - wicked person
  - evildoer
  lexicon: HALOT
  rationale: The Hebrew adjective/substantive denotes the wicked person. 'Wicked man'
    preserves the masculine singular form and proverbial parallelism with 'righteous
    man,' in keeping with the project's gender-accurate policy for representative
    masculine forms.
- source_word: לַצַּדִיק
  chosen: with a righteous man
  alternatives:
  - to the righteous man
  - with the righteous
  lexicon: HALOT
  rationale: 'Although the preposition is ל, the sense in this comparison is relational
    juxtaposition: the wicked in relation to the righteous. English ''with'' best
    matches the first colon''s pattern and the proverb''s meaning.'
- source_word: עָשִׁיר
  chosen: a rich man
  alternatives:
  - the rich man
  - a wealthy man
  lexicon: HALOT
  rationale: The singular substantive is best rendered generically in parallel with
    the preceding pair.
- source_word: אִישׁ נֶאֱצָל
  chosen: a man brought low
  alternatives:
  - a poor man
  - a man of low estate
  - a despised man
  lexicon: HALOT
  rationale: The Hebrew adjective here is difficult and the source has minor mismatch
    status. In context, the contrast with 'rich man' points to someone socially lowered
    or reduced. 'Brought low' preserves that broader sense without overcommitting
    to strictly economic poverty. The Greek parallel differs substantially, emphasizing
    like associating with like, which supports the social-compatibility theme but
    not this exact wording.
