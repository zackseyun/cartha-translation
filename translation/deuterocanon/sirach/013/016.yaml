theological_decisions:
- issue: Representative masculine nouns in a wisdom proverb
  chosen_reading: wicked man / righteous man / rich man / a man brought low
  alternative_readings:
  - wicked person / righteous person / rich person / lowly person
  rationale: The Hebrew uses masculine singular forms in a generic proverbial statement.
    Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    language when the source uses representative masculine grammar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Use of Hebrew as primary witness with Greek kept in view
  chosen_reading: Translate the Hebrew predator-prey proverb in the main text
  alternative_readings:
  - 'Translate toward the Greek: ''All flesh associates with its own kind, and a man
    will cling to one like himself'''
  rationale: For Sirach, surviving Hebrew is primary where available. Here the Hebrew
    is extant and high confidence, though marked minor mismatch; the Greek parallel
    is notably different and is therefore used as a consistency check and preserved
    in a footnote rather than replacing the Hebrew-based translation.
  doctrine_reference: PHILOSOPHY.md §What we are translating
