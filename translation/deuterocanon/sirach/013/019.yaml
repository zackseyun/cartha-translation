translation:
  text: Humility is abhorrent to pride, and the poor are abhorrent to the rich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek witness: ''Wild donkeys are the prey of lions in the wilderness;
      so the poor are the pasture of the rich.'' The Hebrew extant here reads instead,
      ''Humility is abhorrent to pride, and the poor are abhorrent to the rich.'''
    reason: alternative_reading
lexical_decisions:
- source_word: תּוֹעֲבַת
  chosen: is abhorrent to
  alternatives:
  - is an abomination to
  - is detestable to
  lexicon: HALOT
  rationale: 'The construct phrase תועבת X Y is most naturally rendered relationally:
    ''Y is abhorrent to X'' or ''X finds Y abhorrent.'' ''Abomination'' is possible
    but sounds more cultic and formal in English than the social contrast here requires.
    ''Abhorrent'' preserves the strong revulsion without over-ritualizing the sense.'
- source_word: גַּאֲוָה
  chosen: pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: HALOT
  rationale: The noun denotes pride or haughtiness. 'Pride' is the most direct and
    idiomatic rendering here, while still allowing the moral contrast with humility
    to stand clearly.
- source_word: עֲנָוָה
  chosen: humility
  alternatives:
  - lowliness
  - meekness
  lexicon: HALOT
  rationale: The Hebrew abstract noun is best rendered 'humility.' 'Lowliness' is
    possible but less natural in modern English; 'meekness' narrows the sense too
    much toward gentleness rather than humble status or disposition.
- source_word: עָשִׁיר
  chosen: the rich
  alternatives:
  - a rich man
  - the wealthy
  lexicon: HALOT
  rationale: Although singular in Hebrew, the proverb states a general social truth.
    'The rich' is idiomatic English for a representative class and matches the parallel
    'the poor.'
- source_word: אֶבְיוֹן
  chosen: the poor
  alternatives:
  - a poor man
  - the needy
  lexicon: HALOT
  rationale: The term denotes a poor or needy person. Given the generic proverb and
    the class contrast with 'the rich,' 'the poor' is the clearest English rendering.
    The Greek parallel πτωχοί supports a plural/class sense in translation.
