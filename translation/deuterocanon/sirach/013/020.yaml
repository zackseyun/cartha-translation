translation:
  text: When a rich man stumbles, he is supported by a friend; but when a poor man
    stumbles, he is driven away from friend to friend.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from one friend to another.' The Hebrew suggests that the poor man
      is passed along or driven off repeatedly rather than receiving real support.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel differs substantially here ('Lowliness is an abomination
      to the proud, and a poor man is an abomination to a rich man'), but the Hebrew
      witness is the primary source for this verse where it survives.
    reason: textual_variant
lexical_decisions:
- source_word: עָשִׁיר
  chosen: a rich man
  alternatives:
  - the rich
  - a wealthy man
  lexicon: HALOT
  rationale: The singular noun is used proverbially. 'A rich man' preserves the individualizing
    Hebrew form while still conveying a general truth.
- source_word: מוּט
  chosen: stumbles
  alternatives:
  - slips
  - totters
  - is shaken
  lexicon: HALOT
  rationale: 'The verb denotes wavering or tottering rather than final collapse. ''Stumbles''
    fits the proverb''s social point: even a setback for the rich draws support.'
- source_word: נִסְמָךְ
  chosen: is supported
  alternatives:
  - is upheld
  - is sustained
  - is propped up
  lexicon: HALOT
  rationale: 'Passive/reflexive sense from סמך: the rich person receives support from
    others. ''Is supported'' is natural English and preserves the social action.'
- source_word: מֵרֵעַ
  chosen: by a friend
  alternatives:
  - by his companion
  - by an associate
  lexicon: HALOT
  rationale: 'The preposition מן here is best rendered instrumentally/source-wise
    in context: support comes from a friend. ''Friend'' is the most straightforward
    rendering of רֵעַ in this proverb.'
- source_word: דַל
  chosen: a poor man
  alternatives:
  - the poor man
  - a lowly man
  lexicon: HALOT
  rationale: דַל denotes one who is poor or weak. 'A poor man' matches the singular
    proverbial style and keeps the socioeconomic contrast with עָשִׁיר.
- source_word: נָמוֹט
  chosen: stumbles
  alternatives:
  - totters
  - slips
  - is shaken
  lexicon: HALOT
  rationale: Using the same English gloss as מוּט preserves the parallelism between
    the rich and the poor in the Hebrew line.
- source_word: נִדְחָה
  chosen: is pushed away
  alternatives:
  - is driven away
  - is cast off
  - is rejected
  lexicon: HALOT
  rationale: נדחא/נדחה here conveys being thrust aside or driven off. 'Is pushed away'
    keeps the concrete social force and contrasts sharply with 'is supported.'
- source_word: מֵרֵעַ אֶל רֵעַ
  chosen: from friend to friend
  alternatives:
  - from one friend to another
  - by friend after friend
  lexicon: HALOT
  rationale: The phrase suggests repeated rejection or shuffling along from one associate
    to another. 'From friend to friend' is concise and preserves the Hebrew rhythm,
    while implying that no one truly helps him.
