translation:
  text: Whoever touches pitch will have his hand stick to it, and whoever associates
    with a scoffer will learn his way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''He who touches pitch will be defiled, and he who has
      fellowship with a proud man will become like him.'' The Hebrew witness instead
      reads ''a scoffer'' and ''will learn his way.'''
    reason: alternative_reading
lexical_decisions:
- source_word: נוֹגֵעַ
  chosen: Whoever touches
  alternatives:
  - He who touches
  - The one touching
  lexicon: HALOT
  rationale: The participle introduces a general proverbial subject. 'Whoever touches'
    gives natural English while preserving the generic force of the Hebrew.
- source_word: בְּזֶפֶת
  chosen: pitch
  alternatives:
  - tar
  - bitumen
  lexicon: HALOT
  rationale: '''Pitch'' best fits the sticky black substance in proverbial usage and
    matches the image of defilement/adhesion also reflected by the Greek πίσσα.'
- source_word: תִּדְבַּק יָדוֹ
  chosen: will have his hand stick to it
  alternatives:
  - his hand will cling
  - his hand will be stuck
  lexicon: HALOT
  rationale: The Hebrew literally says 'his hand will stick/cling.' Adding 'to it'
    makes the English idiomatic and clarifies the object implied by the context. 'Stick'
    preserves the concrete image better than the more abstract Greek-based 'be defiled.'
- source_word: וְחוֹבֵר
  chosen: and whoever associates with
  alternatives:
  - and he who joins himself to
  - and whoever keeps company with
  lexicon: HALOT
  rationale: The Hebrew verb conveys joining or associating oneself with someone.
    'Associates with' is clear modern English and preserves the relational sense without
    over-paraphrase.
- source_word: לֵץ
  chosen: a scoffer
  alternatives:
  - a mocker
  - an arrogant man
  lexicon: HALOT
  rationale: In Hebrew wisdom literature לֵץ commonly denotes a scoffer or mocker.
    Although the Greek parallel has 'the proud man' (ὑπερήφανος), the primary Hebrew
    witness supports 'scoffer'; this better fits the wisdom-category vocabulary of
    Ben Sira's Hebrew.
- source_word: יִלְמַד דַּרְכּוֹ
  chosen: will learn his way
  alternatives:
  - will learn his ways
  - will become like him
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'will learn his way.' This is more precise
    than the Greek parallel's interpretive 'will become like him,' while still conveying
    moral imitation.
