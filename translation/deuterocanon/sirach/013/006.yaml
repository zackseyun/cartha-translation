translation:
  text: He has need of you, and he will deceive you; he will smile at you and reassure
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''he will empty you out,'' that is, drain or exploit you.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew of this line is difficult; the Greek parallel helps clarify the
      sense as manipulative exploitation.
    reason: textual_variant
lexical_decisions:
- source_word: צֹרֶךְ לוֹ עִמְּךָ
  chosen: He has need of you
  alternatives:
  - He needs you
  - If he has need of you
  lexicon: HALOT
  rationale: The Hebrew phrase literally expresses need with עִם/עִמְּךָ, 'there is
    need for him with you,' i.e., 'he has need of you.' This follows the Hebrew witness
    as primary. The Greek parallel begins conditionally ('if you have [something]'),
    which points to a context of usefulness or resources, but the Hebrew directly
    frames the rich man's self-interest in terms of needing the other person.
- source_word: וְהָשִׁיעַ לָךְ
  chosen: he will deceive you
  alternatives:
  - he will delude you
  - he will exploit you
  - he will strip you bare
  lexicon: HALOT
  rationale: The Hebrew form is difficult and the verse is marked by source mismatch.
    Read in light of the Greek parallel ἀποκενώσει σε ('he will empty you out'), the
    sense is harmful exploitation rather than rescue, despite the consonants suggesting
    a form like 'save/help.' 'Deceive you' captures the manipulative force implied
    by the surrounding cola ('smile... give assurance') while avoiding overcommitting
    to the Greek's more concrete 'empty you out.'
- source_word: וְשׁוֹחֵק לְךָ
  chosen: he will smile at you
  alternatives:
  - he will laugh with you
  - he will make sport of you
  lexicon: HALOT
  rationale: שׂחק can denote laughing/playing, but in this social-manipulation context,
    'smile at you' best conveys a friendly outward demeanor masking self-interest.
    This also coheres with the next verb of reassurance.
- source_word: וְהִבְטִיחֶךָ
  chosen: give you assurance
  alternatives:
  - reassure you
  - make promises to you
  lexicon: HALOT
  rationale: The Hiphil of בטח here means to make someone feel secure or confident.
    'Give you assurance' preserves the causative nuance and fits the sequence of flattering
    behavior.
- source_word: ἀποκενώσει σε
  chosen: deceive you
  alternatives:
  - empty you out
  - drain you
  - exploit you
  lexicon: BDAG
  rationale: The Greek parallel strongly suggests material or personal depletion ('empty
    you out'). Because the Hebrew reading is problematic, the Greek informs the sense
    of exploitation behind the line. The main text keeps a broader idiom ('deceive
    you') shaped by the Hebrew context, while the more concrete Greek nuance is preserved
    in a footnote.
