translation:
  text: A rich man speaks, and many are his supporters; even his ugly words are made
    beautiful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel differs substantially: ''A rich man when shaken is supported
      by friends, but a humble man when fallen is pushed away even by friends.'' The
      Hebrew witness here instead emphasizes how a rich man''s speech is favorably
      received.'
    reason: alternative_reading
lexical_decisions:
- source_word: עָשִׁיר
  chosen: a rich man
  alternatives:
  - the rich man
  - a wealthy man
  lexicon: HALOT
  rationale: The Hebrew singular denotes a representative individual. 'Rich man' is
    the most direct and natural rendering; 'wealthy man' is possible but less idiomatic
    here. 'Man' preserves the masculine singular form in line with the project's gender-accurate
    policy.
- source_word: מְדַבֵּר
  chosen: speaks
  alternatives:
  - talks
  - utters words
  lexicon: HALOT
  rationale: 'Simple present best matches the proverbial style: when a rich man speaks,
    the social dynamic described follows.'
- source_word: וְעוֹזְרָיו רַבִּים
  chosen: and many are his supporters
  alternatives:
  - and his helpers are many
  - and many help him
  lexicon: HALOT
  rationale: 'The phrase literally means ''and his helpers are many.'' ''Supporters''
    captures the social sense in context: many rally to him because of his status.
    This also aligns with the Greek parallel''s emphasis on friends supporting the
    rich.'
- source_word: דְבָרָיו
  chosen: his words
  alternatives:
  - what he says
  - his speech
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun, preserving the concrete
    focus on his utterances.
- source_word: מְכוֹעֲרִין
  chosen: ugly
  alternatives:
  - offensive
  - disgraceful
  - repulsive
  lexicon: HALOT
  rationale: The Hebrew points to something unsightly or objectionable. 'Ugly' preserves
    the metaphorical force and pairs naturally with 'made beautiful' in the next word.
- source_word: מְיוּפִּין
  chosen: are made beautiful
  alternatives:
  - are beautified
  - are praised as beautiful
  lexicon: HALOT
  rationale: 'The passive/causative sense is important: others recast or present his
    objectionable words as admirable. ''Are made beautiful'' keeps the irony visible
    in plain English.'
