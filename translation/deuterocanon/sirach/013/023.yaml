translation:
  text: When a rich man speaks, everyone falls silent, and they exalt his understanding
    to the clouds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and they lifted up his word to the clouds.'' The Hebrew reads
      ''his sense/understanding,'' which is followed here as the primary witness.'
    reason: alternative_reading
lexical_decisions:
- source_word: עָשִׁיר
  chosen: a rich man
  alternatives:
  - the rich man
  - a wealthy man
  lexicon: HALOT
  rationale: The singular generic is best represented by 'a rich man' in English proverbial
    style. 'Rich' is the plain sense.
- source_word: דּוֹבֵר
  chosen: speaks
  alternatives:
  - is speaking
  - utters words
  lexicon: HALOT
  rationale: Simple present fits the gnomic/proverbial force of the Hebrew participle.
- source_word: הַכֹּל
  chosen: everyone
  alternatives:
  - all
  - the whole company
  lexicon: HALOT
  rationale: Idiomatic English for a collective subject in a wisdom saying.
- source_word: נִסְכָּתוּ
  chosen: falls silent
  alternatives:
  - are hushed
  - become quiet
  lexicon: HALOT
  rationale: The Greek parallel has ἐσίγησαν ('became silent'), which strongly supports
    understanding the Hebrew as silence rather than a different reaction. Singular
    English with collective 'everyone' is idiomatic.
- source_word: שִׂכְלוֹ
  chosen: his sense
  alternatives:
  - his insight
  - his understanding
  - his wisdom
  lexicon: HALOT
  rationale: Hebrew שׂכל often denotes understanding or good sense. 'Sense' preserves
    the slightly ironic possibility that even ordinary judgment is extravagantly praised.
    The Greek parallel reads 'his word,' but the Hebrew witness here supports a more
    evaluative term.
- source_word: עַד עָב
  chosen: to the clouds
  alternatives:
  - up to the clouds
  - as high as the clouds
  lexicon: HALOT
  rationale: A vivid idiom of exaltation. English plural 'clouds' is natural and aligns
    with the Greek parallel ἕως τῶν νεφελῶν.
- source_word: יַגִּיעוּ
  chosen: they lift up
  alternatives:
  - they raise
  - they exalt
  - they carry
  lexicon: HALOT
  rationale: In context with 'to the clouds,' the verb expresses elevating or extolling.
    'Lift up' captures both literal imagery and figurative praise.
