theological_decisions:
- issue: Divergence between surviving Hebrew and Greek parallel imagery
  chosen_reading: Translate the Hebrew proverb's concrete image ('hyena ... dog')
    in the main text while allowing the Greek's different comparison in a footnote.
  alternative_readings:
  - 'Greek: ''What will a wolf share with a lamb? so a sinner with a godly man.'''
  rationale: The project gives primacy to the surviving Hebrew of Sirach where extant.
    The Greek is still a real translation input and indicates that the line circulated
    in a substantially different form, shifting from social/economic contrast to moral
    contrast. Because this materially affects interpretation, the Greek alternative
    is preserved in a footnote rather than silently ignored.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
