translation:
  text: What peace can there be between a hyena and a dog? What peace can there be
    between a rich man and a poor man?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''What will a wolf share with a lamb? So a sinner with
      a godly man.'' The Hebrew witness instead reads ''hyena ... dog'' and ''rich
      man ... poor man.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאַיִן
  chosen: What ... can there be
  alternatives:
  - From where
  - How can there be
  lexicon: HALOT
  rationale: The idiom introduces a rhetorical denial of possibility rather than a
    literal question about origin. English 'What ... can there be' captures the force
    naturally.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - harmony
  - friendship
  lexicon: HALOT
  rationale: The Hebrew denotes peaceful relations or harmony. 'Peace' is the most
    direct rendering, with the rhetorical context implying the impossibility of harmonious
    coexistence.
- source_word: צָבוּעַ
  chosen: hyena
  alternatives:
  - jackal
  - wild beast
  lexicon: HALOT
  rationale: In post-biblical and Ben Sira Hebrew, צבוע commonly denotes the hyena.
    The Greek parallel has 'wolf with a lamb,' showing a different image rather than
    controlling the Hebrew wording. Since the Hebrew witness survives here, the animal
    image should be translated from Hebrew.
- source_word: כָּלֶב
  chosen: dog
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: עָשִׁיר
  chosen: rich man
  alternatives:
  - rich person
  lexicon: HALOT
  rationale: The Hebrew is masculine singular and paired with masculine singular רָשׁ.
    Per project philosophy, a gender-accurate rendering is preferred.
- source_word: רָשׁ
  chosen: poor man
  alternatives:
  - poor person
  lexicon: HALOT
  rationale: The term denotes a poor or needy person. 'Poor man' preserves the masculine
    singular pairing and the proverb's social contrast.
