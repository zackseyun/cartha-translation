theological_decisions:
- issue: Use of Hebrew primary witness versus Greek expansion
  chosen_reading: Follow the Hebrew wording in the main text, while allowing the Greek
    to clarify the prohibitive force.
  alternative_readings:
  - Do not lift a burden beyond you, and do not share with one stronger and richer
    than you.
  rationale: For Sirach, surviving Hebrew is primary where extant. Here the Hebrew
    text is present and coherent, though the Greek parallel includes an additional
    comparative ('stronger'). Because the Hebrew lacks that element, it is not imported
    into the main text. The Greek is nevertheless used as an actual input to confirm
    that the Hebrew rhetorical questions should be rendered as prohibitions in English.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives in Sirach;
    use Greek parallel as input without overriding extant Hebrew.'
