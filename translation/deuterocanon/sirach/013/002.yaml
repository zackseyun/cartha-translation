translation:
  text: 'What is heavier than you, do not carry; and with one richer than you, do
    not associate. What can a potsherd be joined to a pot? He strikes it, and it is
    broken. Or what can be joined: a rich man to a poor man?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Do not lift a burden beyond you, and do not share with one stronger
      and richer than you.'' The Greek includes ''stronger'' in addition to ''richer.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כָּבֵד מִמְּךָ
  chosen: what is heavier than you
  alternatives:
  - a burden beyond you
  - what outweighs you
  lexicon: HALOT
  rationale: The Hebrew adjective כָּבֵד with comparative מִמְּךָ denotes something
    too heavy for the addressee. Rendering it as 'what is heavier than you' keeps
    the comparative image. The Greek parallel βάρος ὑπὲρ σὲ μὴ ἄρῃς confirms the sense
    of bearing a weight beyond one's capacity.
- source_word: מַה תִּשָּׂא
  chosen: do not carry
  alternatives:
  - what will you carry?
  - do not lift
  lexicon: HALOT
  rationale: Although the Hebrew is formally interrogative ('what will you carry?'),
    in wisdom style it functions as a prohibition or rhetorical warning. The Greek
    parallel makes the prohibitive force explicit with μὴ ἄρῃς, so 'do not carry'
    best reflects the intended sense in idiomatic English.
- source_word: וְאֶל עָשִׁיר מִמְּךָ
  chosen: with one richer than you
  alternatives:
  - with a rich man greater than you
  - with someone wealthier than you
  lexicon: HALOT
  rationale: עָשִׁיר means 'rich' or 'wealthy.' The comparative phrase מִמְּךָ indicates
    someone richer than the addressee. 'One richer than you' is natural English and
    preserves the social comparison. The Greek parallel adds ἰσχυροτέρῳ σου καὶ πλουσιωτέρῳ
    ('stronger and richer than you'), but the Hebrew witness here mentions only wealth;
    the translation follows the Hebrew as primary.
- source_word: מַה תִּתְחַבָּר
  chosen: do not associate
  alternatives:
  - why join yourself
  - do not join yourself
  - do not become a companion
  lexicon: HALOT
  rationale: The hitpael of חבר conveys joining oneself to, associating with, or becoming
    a companion of someone. As with the first clause, the Hebrew rhetorical question
    carries admonitory force. 'Do not associate' gives clear modern English while
    preserving the warning against unequal alliance. The Greek μὴ κοινώνει similarly
    supports the sense of entering fellowship/partnership.
