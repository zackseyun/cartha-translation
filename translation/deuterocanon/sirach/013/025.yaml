translation:
  text: Wealth is good if there is no iniquity, and poverty is bad according to the
    mouth of arrogance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel has a substantially different reading: ''A man''s heart
      changes his face, whether for good or for bad.'''
    reason: textual_variant
  - marker: b
    text: Hebrew 'according to the mouth of arrogance' is difficult; it may mean 'in
      the judgment/speech of the arrogant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: good
  alternatives:
  - better
  - beneficial
  lexicon: HALOT
  rationale: The adjective straightforwardly evaluates the state named by the following
    noun. 'Good' preserves the concise proverbial force better than a more interpretive
    option like 'beneficial'.
- source_word: הָעֹשֶׂר
  chosen: wealth
  alternatives:
  - riches
  - prosperity
  lexicon: HALOT
  rationale: The Hebrew denotes wealth/riches. 'Wealth' is idiomatic and broad, fitting
    a wisdom saying about social condition rather than a pile of possessions alone.
- source_word: אִם אֵין עָוֹן
  chosen: if there is no iniquity
  alternatives:
  - if there is no wrongdoing
  - if it is without sin
  lexicon: HALOT
  rationale: The conditional clause qualifies wealth morally. 'Iniquity' keeps the
    ethical weight of עָוֹן without over-paraphrasing. The existential English 'there
    is no' naturally renders אֵין.
- source_word: עָוֹן
  chosen: iniquity
  alternatives:
  - wrongdoing
  - guilt
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote guilt or wrongdoing. Here it most naturally refers to
    moral crookedness associated with acquiring or possessing wealth. 'Iniquity' preserves
    that moral sense in a compact proverbial line.
- source_word: וְרַע
  chosen: and poverty is bad
  alternatives:
  - and ... is evil
  - and ... is harmful
  lexicon: HALOT
  rationale: The adjective balances the first colon's 'good.' In English, 'bad' is
    the most natural counterpart in a proverb. The predicate is carried over to the
    following subject.
- source_word: הָעוֹנִי
  chosen: poverty
  alternatives:
  - the poor state
  - affliction
  lexicon: HALOT
  rationale: The noun denotes poverty/poor condition. 'Poverty' is the plain and idiomatic
    rendering.
- source_word: עַל פִּי
  chosen: according to the mouth of
  alternatives:
  - by the judgment of
  - in the saying of
  - on the testimony of
  lexicon: HALOT
  rationale: Literally 'upon the mouth of.' The phrase is somewhat awkward in English,
    but preserving 'mouth' reflects the Hebrew wording and leaves open whether the
    sense is public speech, verdict, or characterization. Because the source validation
    notes a minor mismatch and the Greek parallel diverges sharply, a more interpretive
    rendering would overstate certainty.
- source_word: זָדוֹן
  chosen: arrogance
  alternatives:
  - insolence
  - presumption
  - pride
  lexicon: HALOT
  rationale: זָדוֹן commonly denotes presumptuousness or arrogance. 'Arrogance' is
    clear modern English and suits the social-moral context of the chapter.
