  chosen_reading: the godly
  alternative_readings:
  - the pious
  - the devout
  rationale: The verse contrasts malicious delight in the righteous person's fall
    with the eventual judgment of the malicious. 'The godly' best conveys the moral-religious
    category in accessible English without importing later technical theological categories.
