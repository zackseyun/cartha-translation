id: SIR.27.29
reference: Sirach 27:29
source:
  edition: lxx-swete-1909
  text: παγίδι ἁλώσονται οἱ εὐφραινόμενοι πτώσει εὐσεβῶν, καὶ ὀδύνη καταναλώσει αὐτοὺς
    πρὸ τοῦ θανάτου αὐτῶν.
  language: Greek
  pages:
  - 717
  confidence: high
  validation: agree
translation:
  text: Those who rejoice at the fall of the godly will be caught in a trap, and pain
    will consume them before their death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the pious'' or ''the devout.'' Greek: εὐσεβῶν.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παγίδι
  chosen: in a trap
  alternatives:
  - by a snare
  - in a snare
  lexicon: LSJ
  rationale: Dative singular of παγίς, expressing the means or sphere of capture.
    'Trap' is clear modern English; 'snare' is possible but slightly more archaic.
- source_word: ἁλώσονται
  chosen: will be caught
  alternatives:
  - will be taken
  - will be captured
  lexicon: LSJ
  rationale: Future passive of ἁλίσκομαι/ἁλόω, commonly 'be caught' or 'be captured.'
    'Will be caught' fits the trap imagery naturally in English.
- source_word: οἱ εὐφραινόμενοι
  chosen: those who rejoice
  alternatives:
  - those who take pleasure
  - those who make merry
  lexicon: LSJ
  rationale: Present middle/passive participle used substantivally. In this moral
    context it denotes taking gladness in something; 'those who rejoice' is idiomatic
    and sufficiently direct.
- source_word: πτώσει
  chosen: the fall
  alternatives:
  - the downfall
  - the collapse
  lexicon: LSJ
  rationale: Dative of πτῶσις. 'Fall' is the most straightforward rendering; 'downfall'
    is interpretive but possible. The context already makes the negative sense clear.
- source_word: εὐσεβῶν
  chosen: the godly
  alternatives:
  - the pious
  - the devout
  lexicon: LSJ
  rationale: Genitive plural of εὐσεβής. 'The godly' is natural English and preserves
    the moral-religious sense without sounding overly technical. 'Pious' can sound
    pejorative in modern English.
- source_word: ὀδύνη
  chosen: pain
  alternatives:
  - grief
  - anguish
  - distress
  lexicon: LSJ
  rationale: The noun can denote bodily pain or severe distress. 'Pain' is broad enough
    to preserve the term's force without over-specifying whether physical or emotional
    suffering is intended.
- source_word: καταναλώσει
  chosen: will consume
  alternatives:
  - will wear away
  - will destroy
  lexicon: LSJ
  rationale: Future of καταναλίσκω, 'consume' or 'devour up.' 'Will consume' preserves
    the vivid metaphor and matches the severity of the warning.
- source_word: πρὸ τοῦ θανάτου αὐτῶν
  chosen: before their death
  alternatives:
  - before they die
  - before their end
  lexicon: LSJ
  rationale: The prepositional phrase is temporal. 'Before their death' is formally
    close and idiomatic; singular 'death' with plural possessive is standard English.
