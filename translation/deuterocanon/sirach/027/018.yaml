theological_decisions:
- issue: Gendered generic in proverbial statement
  chosen_reading: a man
  alternative_readings:
  - someone
  - a person
  rationale: The verse uses ἄνθρωπος generically in a wisdom saying. Following the
    project's gender-accurate policy, the masculine singular is preserved in English
    rather than neutralized, since the source presents a representative 'man' proverbially.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Severity of relational language
  chosen_reading: destroyed the friendship
  alternative_readings:
  - ruined the friendship
  - broken off friendship
  rationale: The repeated ἀπόλλυμι is strong and should not be softened into merely
    ending or straining a relationship. The verse intentionally compares the loss
    of friendship to the destruction of an enemy, so the stronger English verb preserves
    the rhetorical force.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
