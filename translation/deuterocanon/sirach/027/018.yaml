id: SIR.27.18
reference: Sirach 27:18
source:
  edition: lxx-swete-1909
  text: καθὼς γὰρ ἀπώλεσεν ἄνθρωπος τὸν ἐχθρὸν αὐτοῦ, οὕτως ἀπώλεσας τὴν φιλίαν τοῦ
    πλησίον·
  language: Greek
  pages:
  - 716
  confidence: high
  validation: minor_mismatch
translation:
  text: For just as a man has destroyed his enemy, so you have destroyed the friendship
    of your neighbor;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so you have ruined your neighbor's friendship' or 'so you have destroyed
      friendship with your neighbor.' The Greek genitive τοῦ πλησίον can be understood
      either as the friendship belonging to the neighbor or as friendship involving
      the neighbor.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as
  lexicon: LSJ
  rationale: Retains the explanatory and comparative force of the Greek conjunctions,
    linking this verse to the surrounding admonition while preserving the simile structure.
- source_word: ἀπώλεσεν
  chosen: has destroyed
  alternatives:
  - destroyed
  - ruined
  - done away with
  lexicon: BDAG
  rationale: The verb denotes causing destruction or ruin. 'Has destroyed' preserves
    the completed action with present relevance in idiomatic English and matches the
    severity of the Greek better than a softer option like 'ruined'.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - someone
  - a person
  - a human being
  lexicon: LSJ
  rationale: The Greek singular is grammatically masculine and generic/proverbial.
    Per doctrine, a gender-accurate rendering is preferred where representative force
    is present; 'a man' preserves the proverbial style without claiming maleness is
    the point.
- source_word: τὸν ἐχθρὸν αὐτοῦ
  chosen: his enemy
  alternatives:
  - the one hostile to him
  - his foe
  lexicon: BDAG
  rationale: A straightforward rendering of the object phrase; 'enemy' is the natural
    English equivalent and preserves the contrast with 'friendship' in the second
    clause.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: LSJ
  rationale: Carries the comparison forward succinctly in natural English.
- source_word: ἀπώλεσας
  chosen: you have destroyed
  alternatives:
  - you destroyed
  - you have ruined
  lexicon: BDAG
  rationale: Uses the same English verb as the first clause for consistency, reflecting
    the repeated Greek verb and preserving the accusation's force. The perfect-like
    English phrasing also suits the direct address.
- source_word: τὴν φιλίαν
  chosen: the friendship
  alternatives:
  - friendship
  - the bond of friendship
  lexicon: LSJ
  rationale: The article is retained because the Greek has it, and the phrase refers
    to the concrete relational bond now broken, not friendship in the abstract.
- source_word: τοῦ πλησίον
  chosen: of your neighbor
  alternatives:
  - with your neighbor
  - of your companion
  lexicon: BDAG
  rationale: πλησίον commonly means 'neighbor' in Jewish-Greek ethical contexts. The
    genitive can be rendered literally as 'of your neighbor'; this keeps close to
    the Greek while still reading clearly in English.
