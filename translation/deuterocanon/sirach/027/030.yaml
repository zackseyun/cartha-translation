id: SIR.27.30
reference: Sirach 27:30
source:
  edition: lxx-swete-1909
  text: Μῆνις καὶ ὀργή, καὶ ταῦτά ἐστιν βδελύγματα, καὶ ἀνὴρ ἁμαρτωλὸς ἐγκρατὴς ἔσται
    αὐτῶν.
  language: Greek
  pages:
  - 717
  confidence: high
  validation: agree
translation:
  text: Resentment and anger—these also are abominations, and a sinful man will hold
    fast to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wrath and anger'; Μῆνις can carry the sense of deep-seated or vengeful
      anger, while ὀργή is a more general term for anger.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'a sinful man will be ἐγκρατής of them.' The expression is difficult;
      here it is taken to mean that he clings to or retains these vices.
    reason: alternative_reading
lexical_decisions:
- source_word: Μῆνις
  chosen: resentment
  alternatives:
  - wrath
  - rancor
  - vengeful anger
  lexicon: LSJ
  rationale: Μῆνις can denote deep, abiding anger rather than a momentary outburst.
    'Resentment' captures a sustained hostile disposition and distinguishes it from
    the following ὀργή.
- source_word: ὀργή
  chosen: anger
  alternatives:
  - wrath
  - rage
  lexicon: LSJ
  rationale: A common term for anger or wrath. 'Anger' is the most natural modern
    English rendering and avoids overstating the register with 'wrath' when paired
    with Μῆνις.
- source_word: βδελύγματα
  chosen: abominations
  alternatives:
  - detestable things
  - loathsome things
  lexicon: LSJ
  rationale: The noun denotes things regarded as abhorrent or detestable. 'Abominations'
    preserves the moral and religious weight of the Greek.
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: LSJ
  rationale: The Greek is explicitly masculine singular. Following the project's gender-accurate
    policy, 'man' is retained rather than neutralizing to 'person'.
- source_word: ἁμαρτωλὸς
  chosen: sinful
  alternatives:
  - sinner
  - sinning
  lexicon: LSJ
  rationale: Used attributively with ἀνήρ. 'Sinful man' reads naturally in English
    and reflects the adjectival construction.
- source_word: ἐγκρατὴς ἔσται αὐτῶν
  chosen: will hold fast to them
  alternatives:
  - will be mastered by them
  - will cling to them
  - will keep control of them
  lexicon: LSJ
  rationale: 'Although ἐγκρατής often means ''self-controlled,'' with the genitive
    αὐτῶν the sense here is idiomatic and contextually negative: the sinful man keeps
    a grip on, clings to, or retains these vices. ''Will hold fast to them'' best
    fits the warning context without forcing a paradoxical positive sense.'
