theological_decisions:
- issue: Anthropological/gender rendering of ἀνὴρ
  chosen_reading: man
  alternative_readings:
  - person
  - one
  rationale: The source uses a masculine singular noun, likely representative but
    still explicitly masculine. Per doctrine, gender-accurate rendering is preferred
    over flattening to a neutral term.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Interpretation of ἐγκρατὴς in a negative moral context
  chosen_reading: will hold fast to them
  alternative_readings:
  - will be self-controlled regarding them
  - will be mastered by them
  rationale: A wooden rendering 'will be self-controlled of them' is awkward and contextually
    unlikely, since the verse condemns these passions. The chosen reading preserves
    the idea of firm attachment/retention in a sinful person without importing a stronger
    theological claim than the Greek warrants.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
