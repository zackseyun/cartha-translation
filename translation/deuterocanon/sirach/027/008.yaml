theological_decisions:
- issue: Rendering of τὸ δίκαιον in a wisdom context
  chosen_reading: righteousness
  alternative_readings:
  - what is right
  - justice
  rationale: Although the Greek expression could be rendered more concretely as 'what
    is right,' the abstract moral pursuit and the subsequent image of wearing it favor
    'righteousness' as the most coherent English rendering. This also aligns with
    the project's default handling of δικ- terms while recognizing that 'justice'
    remains a viable contextual alternative.
