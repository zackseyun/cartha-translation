id: SIR.27.8
reference: Sirach 27:8
source:
  edition: lxx-swete-1909
  text: ἐὰν διώκῃς τὸ δίκαιον, καταλήμψῃ, καὶ ἐνδύσῃ αὐτὸ ὡς ποδήρη δόξης.
  language: Greek
  pages:
  - 715
  confidence: high
  validation: agree
translation:
  text: If you pursue righteousness, you will attain it, and put it on like a robe
    of glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is right'; alternatively, 'justice.' The Greek expression is broad
      enough to include both personal righteousness and just conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: διώκῃς
  chosen: pursue
  alternatives:
  - seek
  - follow after
  - strive for
  lexicon: BDAG
  rationale: The verb commonly means 'pursue' or 'press after.' Here it is metaphorical
    for earnest moral striving, and 'pursue' preserves the active force better than
    the weaker 'seek.'
- source_word: τὸ δίκαιον
  chosen: righteousness
  alternatives:
  - what is right
  - justice
  - the righteous thing
  lexicon: LSJ
  rationale: The neuter singular with article can denote 'what is right/just' in an
    abstract moral sense. 'Righteousness' best captures the ethical quality being
    sought and aligns with the verse's moral imagery. 'Justice' is possible but narrower
    in English and less fitting with the clothing metaphor that follows.
- source_word: καταλήμψῃ
  chosen: attain
  alternatives:
  - overtake
  - lay hold of
  - obtain
  lexicon: BDAG
  rationale: Literally the verb can mean 'seize' or 'overtake,' but in this context
    of pursuing a moral good, 'attain' gives natural English while preserving the
    idea of successfully reaching what is pursued.
- source_word: ἐνδύσῃ
  chosen: put it on
  alternatives:
  - clothe yourself with it
  - wear it
  lexicon: BDAG
  rationale: The middle sense is naturally expressed in English as 'put it on.' This
    keeps the clothing metaphor vivid and avoids overformal diction.
- source_word: ποδήρη
  chosen: robe
  alternatives:
  - long robe
  - full-length garment
  lexicon: LSJ
  rationale: The adjective/substantival form refers to a garment reaching to the feet.
    'Robe' is idiomatic and sufficiently conveys a dignified long garment; the full
    nuance of length is not crucial to the verse's main image.
- source_word: δόξης
  chosen: of glory
  alternatives:
  - of honor
  - glorious
  lexicon: LSJ
  rationale: The genitive is best retained as 'of glory,' preserving the elevated
    metaphor and the noun's theological resonance. 'Of honor' is possible but less
    weighty.
