id: SIR.27.2
reference: Sirach 27:2
source:
  edition: lxx-swete-1909
  text: ἀνὰ μέσον ἁρμῶν λίθων παγήσεται πάσσαλος, καὶ ἀνὰ μέσον πράσεως καὶ ἀγορασμοῦ
    συντριβήσεται ἁμαρτία.
  language: Greek
  pages:
  - 715
  confidence: high
  validation: minor_mismatch
translation:
  text: A peg will be driven in between the joints of stones, and sin will be crushed
    between selling and buying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be fixed' / 'will be fastened' for the peg image.
    reason: lexical_alternative
  - marker: b
    text: The image is that just as a peg is wedged into the joints between stones,
      so sin gets wedged in between seller and buyer in a transaction.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνὰ μέσον
  chosen: between
  alternatives:
  - in the midst of
  - among
  lexicon: LSJ
  rationale: The repeated prepositional phrase marks position between two things.
    'Between' is the most natural English equivalent in this proverb-like saying.
- source_word: ἁρμῶν
  chosen: joints
  alternatives:
  - fittings
  - courses
  - crevices
  lexicon: LSJ
  rationale: ἁρμός commonly denotes a joining, joint, or fastening. With λίθων ('stones'),
    it refers to the joined places between stones in masonry. 'Joints' preserves the
    construction image better than the more interpretive 'crevices'.
- source_word: παγήσεται
  chosen: will be driven in
  alternatives:
  - will be fixed
  - will be fastened
  - will be stuck
  lexicon: LSJ
  rationale: From πήγνυμι, the passive here describes a peg being set or driven firmly
    into place. 'Will be driven in' conveys the concrete masonry image more clearly
    than the flatter 'will be fixed'.
- source_word: πάσσαλος
  chosen: peg
  alternatives:
  - stake
  - pin
  lexicon: LSJ
  rationale: The word denotes a peg or stake. 'Peg' best fits the image of something
    inserted between stone joints; 'stake' can sound too large or outdoor-specific.
- source_word: πράσεως
  chosen: selling
  alternatives:
  - sale
  - trade
  lexicon: LSJ
  rationale: The noun refers to the act of selling. 'Selling' pairs neatly with ἀγορασμοῦ
    and preserves the transactional contrast in the Greek.
- source_word: ἀγορασμοῦ
  chosen: buying
  alternatives:
  - purchase
  - acquiring
  lexicon: LSJ
  rationale: The noun denotes buying or purchase. 'Buying' is the most direct counterpart
    to 'selling' and keeps the proverb concise.
- source_word: συντριβήσεται
  chosen: will be crushed
  alternatives:
  - will be broken
  - will be shattered
  lexicon: LSJ
  rationale: The future passive indicates being broken or crushed. 'Will be crushed'
    fits the warning tone and the pressure implied by being caught between two sides
    of a transaction.
- source_word: ἁμαρτία
  chosen: sin
  alternatives:
  - wrongdoing
  - offense
  lexicon: LSJ
  rationale: The standard sense is 'sin.' In this wisdom context it refers to moral
    failure arising in commerce; 'sin' preserves the ethical and theological force
    without reduction to mere impropriety.
