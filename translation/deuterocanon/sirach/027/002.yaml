theological_decisions:
- issue: Moral force of ἁμαρτία in a commercial proverb
  chosen_reading: sin
  alternative_readings:
  - wrongdoing in business
  - offense
  rationale: The verse warns that moral failure intrudes into transactions as readily
    as a peg is wedged into stone joints. Rendering ἁμαρτία as 'sin' preserves the
    text's ethical seriousness rather than narrowing it to commercial sharp practice
    alone.
  doctrine_reference: Translation philosophy §1, §6
