id: SIR.27.21
reference: Sirach 27:21
source:
  edition: lxx-swete-1909
  text: ὅτι τραῦμά ἐστιν καταδῆσαι, καὶ λοιδορίας ἐστὶ διαλλαγή· ὁ δὲ ἀποκαλύψας μυστήρια
    ἀφήλπισεν.
  language: Greek
  pages:
  - 716
  confidence: high
  validation: minor_mismatch
translation:
  text: For a wound may be bound up, and after insults there may be reconciliation;
    but one who reveals secrets has lost hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'is beyond hope' or 'has despaired.' The Greek leaves unstated what
      hope is lost; in context it most likely refers to hope of restored trust after
      betraying a confidence.
    reason: lexical_alternative
lexical_decisions:
- source_word: τραῦμά
  chosen: a wound
  alternatives:
  - an injury
  - a hurt
  lexicon: LSJ
  rationale: The noun denotes a physical wound or injury. 'Wound' preserves the concrete
    image that grounds the proverb and fits the contrast with relational damage in
    the second clause.
- source_word: καταδῆσαι
  chosen: be bound up
  alternatives:
  - be bandaged
  - be tied up
  lexicon: LSJ
  rationale: The infinitive refers to binding or bandaging a wound. The passive English
    'be bound up' naturally conveys the impersonal Greek construction ('it is possible
    to bind up a wound') without over-paraphrasing.
- source_word: λοιδορίας
  chosen: insults
  alternatives:
  - abuse
  - reviling
  - reproaches
  lexicon: LSJ
  rationale: The plural noun refers to verbal abuse or insulting speech. 'Insults'
    is clear modern English and keeps the interpersonal sense without sounding overly
    formal.
- source_word: διαλλαγή
  chosen: reconciliation
  alternatives:
  - making peace
  - restoration
  lexicon: LSJ
  rationale: The term denotes restored relations after conflict. 'Reconciliation'
    best captures the relational repair implied after insulting words.
- source_word: ἀποκαλύψας
  chosen: has revealed
  alternatives:
  - has disclosed
  - has uncovered
  lexicon: LSJ
  rationale: The participle means to uncover or disclose. 'Has revealed' is idiomatic
    with 'secrets' and preserves the completed action leading to the final state.
- source_word: μυστήρια
  chosen: secrets
  alternatives:
  - confidences
  - hidden matters
  lexicon: LSJ
  rationale: In this wisdom context the word refers to confidential matters rather
    than apocalyptic 'mysteries.' 'Secrets' is the most direct and natural rendering.
- source_word: ἀφήλπισεν
  chosen: has lost hope
  alternatives:
  - is beyond hope
  - has despaired
  lexicon: LSJ
  rationale: 'The verb means to give up hope or be without hope. ''Has lost hope''
    preserves the verbal aspect and leaves the implied object open: the betrayer has
    forfeited hope of restored trust or reconciliation.'
