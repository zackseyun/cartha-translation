theological_decisions:
- issue: Sense of the final clause ὁ δὲ ἀποκαλύψας μυστήρια ἀφήλπισεν
  chosen_reading: The one who reveals secrets has forfeited hope of restored relationship/trust.
  alternative_readings:
  - The one who reveals secrets has fallen into despair personally.
  - The one who reveals secrets is beyond hope in a more absolute moral sense.
  rationale: In context, the proverb contrasts injuries and insults, which can be
    remedied, with betrayal of confidences, which destroys the possibility of repair.
    The Greek verb itself is terse, so the main text keeps the broader 'has lost hope'
    rather than specifying an object too narrowly, while the rationale notes the likely
    relational force.
  doctrine_reference: Preserve theological tension rather than resolve it.
