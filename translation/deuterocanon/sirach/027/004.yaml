id: SIR.27.4
reference: Sirach 27:4
source:
  edition: lxx-swete-1909
  text: ἐν σείσματι κοσκίνου διαμενεῖ κοπρία, οὕτως σκύβαλα ἀνθρώπου ἐν λογισμῷ αὐτοῦ.
  language: Greek
  pages:
  - 715
  confidence: high
  validation: agree
translation:
  text: When a sieve is shaken, the refuse remains; so a person's filth is revealed
    in his thoughts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'refuse' or 'rubbish' for 'filth'; the Greek term can denote waste or
      excrement, and the proverb uses coarse material left behind in sifting as an
      image for what a person's inner reasoning reveals.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν σείσματι
  chosen: When ... is shaken
  alternatives:
  - in the shaking of
  - by the shaking of
  lexicon: LSJ
  rationale: The prepositional phrase is rendered temporally/instrumentally in natural
    English. 'When ... is shaken' captures the proverbial sense without over-literal
    awkwardness.
- source_word: κοσκίνου
  chosen: a sieve
  alternatives:
  - the sieve
  lexicon: LSJ
  rationale: Anarthrous genitive after the verbal noun naturally yields an indefinite
    sense in English; 'a sieve' fits proverbial style.
- source_word: διαμενεῖ
  chosen: remains
  alternatives:
  - stays behind
  - continues
  lexicon: LSJ
  rationale: The verb means to remain or persist. 'Remains' is concise and idiomatic
    in the image of sifting.
- source_word: κοπρία
  chosen: the refuse
  alternatives:
  - dung
  - manure
  - filth
  lexicon: LSJ
  rationale: The noun can denote dung/manure, but in the sieve metaphor it refers
    to the coarse waste left behind. 'Refuse' preserves the image while avoiding an
    overly specific agricultural term that may mislead modern readers.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: LSJ
  rationale: Standard comparative marker linking the proverb's image and application.
- source_word: σκύβαλα
  chosen: filth
  alternatives:
  - refuse
  - rubbish
  - dung
  lexicon: LSJ
  rationale: The term denotes refuse/excrement. In application to a person, 'filth'
    communicates moral ugliness and keeps the parallel with the first colon's waste
    imagery.
- source_word: ἀνθρώπου
  chosen: a man's
  alternatives:
  - of a man
  - of a person
  lexicon: LSJ
  rationale: The Greek singular 'man' is retained per gender-accurate policy and proverbial
    style. It functions generically here, but the source is grammatically masculine
    singular.
- source_word: ἐν λογισμῷ αὐτοῦ
  chosen: in his thinking
  alternatives:
  - in his reasoning
  - in his thoughts
  - in his deliberation
  lexicon: LSJ
  rationale: λογισμός can mean thought, reasoning, or deliberation. 'Thinking' is
    readable modern English and suits the idea that inner reflection reveals character.
