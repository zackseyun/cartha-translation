theological_decisions:
- issue: Moral force of wisdom terminology
  chosen_reading: Rendered μωρῶν as 'fools' and ἁμαρτίας directly as 'sin'
  alternative_readings:
  - the foolish
  - wrongdoing
  rationale: Sirach's wisdom discourse uses morally charged categories. Softer renderings
    would reduce the ethical sharpness of the verse without textual warrant.
  doctrine_reference: 'DOCTRINE.md: readable modern English without flattening theological
    weight; consistency of key terms'
