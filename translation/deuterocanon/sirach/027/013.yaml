id: SIR.27.13
reference: Sirach 27:13
source:
  edition: lxx-swete-1909
  text: διήγησις μωρῶν προσόχθισμα, καὶ ὁ γέλως αὐτῶν ἐν σπατάλῃ ἁμαρτίας.
  language: Greek
  pages:
  - 716
  confidence: high
  validation: agree
translation:
  text: The talk of fools is offensive, and their laughter is in the indulgence of
    sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The speech of fools is vexation,' with προσόχθισμα understood more as
      'annoyance' or 'vexation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their laughter is in sinful dissipation'; σπατάλη can suggest self-indulgent
      excess, luxury, or wanton living.
    reason: lexical_alternative
lexical_decisions:
- source_word: διήγησις
  chosen: talk
  alternatives:
  - speech
  - telling
  - narration
  - conversation
  lexicon: LSJ
  rationale: The noun can denote narration, account, or discourse. In this wisdom
    context, a broad term for what fools say fits better than the more formal 'narration.'
    'Talk' is natural modern English and captures the general sense of their speech.
- source_word: μωρῶν
  chosen: of fools
  alternatives:
  - of the foolish
  - of stupid people
  lexicon: LSJ
  rationale: The genitive plural identifies the speakers. 'Fools' is the standard
    wisdom-literature term and preserves the moral-intellectual force better than
    a flatter modern substitute.
- source_word: προσόχθισμα
  chosen: offensive
  alternatives:
  - annoyance
  - irritation
  - vexation
  - disgusting thing
  lexicon: LSJ
  rationale: The noun denotes something causing displeasure or vexation. 'Offensive'
    communicates that such speech is not merely mildly irritating but objectionable,
    while remaining idiomatic in English.
- source_word: γέλως
  chosen: laughter
  alternatives:
  - mockery
  - laughing
  lexicon: LSJ
  rationale: The basic sense is 'laughter.' Although context may imply coarse or sinful
    merriment, the Greek does not explicitly specify mockery, so the simpler gloss
    is retained.
- source_word: ἐν
  chosen: is in
  alternatives:
  - consists in
  - belongs to
  - occurs in the sphere of
  lexicon: LSJ
  rationale: The preposition marks sphere or setting. 'Is in' is slightly literal
    but still readable, preserving the image that their laughter operates within or
    belongs to sinful indulgence.
- source_word: σπατάλῃ
  chosen: indulgence
  alternatives:
  - luxury
  - wantonness
  - dissipation
  - self-indulgence
  lexicon: LSJ
  rationale: The term often denotes luxurious or self-indulgent excess. 'Indulgence'
    captures the moral sense without over-specifying material luxury, and it fits
    the genitive construction with 'sin.'
- source_word: ἁμαρτίας
  chosen: of sin
  alternatives:
  - sinful behavior
  - sinfulness
  lexicon: LSJ
  rationale: The genitive qualifies the kind of indulgence involved. 'Of sin' is concise
    and preserves the direct moral category of the Greek.
