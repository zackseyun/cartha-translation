theological_decisions:
- issue: Whether to render the final verb with explicit hunting language or with a
    more result-focused expression
  chosen_reading: you will not catch him
  alternative_readings:
  - you will not hunt him down
  - you will not capture him
  rationale: This is not a major doctrinal issue, but it affects the force of the
    proverb. The Greek verb evokes hunting, yet the central point is irretrievability
    after a broken relationship. 'Catch him' preserves the metaphor's outcome in readable
    English without overextending the image.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (documented
    exception/consistency)
