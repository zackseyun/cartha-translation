id: SIR.27.19
reference: Sirach 27:19
source:
  edition: lxx-swete-1909
  text: καὶ ὡς πετεινὸν ἐκ χειρός σου ἀπέλυσας, οὕτως ἀφῆκας τὸν πλησίον, καὶ οὐ θηρεύσεις
    αὐτόν.
  language: Greek
  pages:
  - 716
  confidence: high
  validation: agree
translation:
  text: And as a bird from your hand you have let go, so you have let your neighbor
    go, and you will not catch him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you will not hunt him down.' The Greek verb has hunting imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: πετεινὸν
  chosen: bird
  alternatives:
  - fowl
  - flying creature
  lexicon: LSJ
  rationale: The noun broadly denotes a bird. 'Bird' is the natural modern English
    equivalent and fits the simile without unnecessary archaism.
- source_word: ἐκ χειρός σου
  chosen: from your hand
  alternatives:
  - out of your hand
  lexicon: LSJ
  rationale: A straightforward spatial expression. 'From your hand' preserves the
    concrete imagery of something released from one's grasp.
- source_word: ἀπέλυσας
  chosen: you have let go
  alternatives:
  - you released
  - you sent away
  lexicon: LSJ
  rationale: The verb means to release or let go. 'You have let go' matches the image
    of a bird escaping the hand and prepares the parallel with the next clause.
- source_word: ἀφῆκας
  chosen: you have let ... go
  alternatives:
  - you abandoned
  - you released
  - you sent away
  lexicon: LSJ
  rationale: Though the verb can mean forgive, leave, or release, here the parallel
    with ἀπέλυσας and the following hunting image favors 'let go'/'released.' Repeating
    'let go' in English preserves the deliberate analogy between the bird and the
    neighbor.
- source_word: τὸν πλησίον
  chosen: your neighbor
  alternatives:
  - your companion
  - the one near you
  lexicon: LSJ
  rationale: In wisdom literature this commonly refers to a fellow person in close
    social relation. 'Neighbor' is idiomatic and preserves the ethical resonance.
- source_word: οὐ θηρεύσεις
  chosen: you will not catch
  alternatives:
  - you will not hunt down
  - you will not capture
  lexicon: LSJ
  rationale: The verb literally involves hunting, but in this context the point is
    that once released, the person cannot be recovered. 'Catch' communicates the result
    clearly in modern English while still fitting the bird metaphor.
