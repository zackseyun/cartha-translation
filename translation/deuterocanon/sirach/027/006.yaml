id: SIR.27.6
reference: Sirach 27:6
source:
  edition: sefaria-ben-sira-kahana
  text: עַל עֲבֹדַת עֵץ יְהִי פֶרִי, כֵּן חֶשְׁבּוֹן עַל יֵצֶר אֶחָד.
  language: Hebrew
  pages:
  - 715
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: γεώργιον ξύλου ἐκφαίνει ὁ καρπὸς αὐτοῦ, οὕτως λόγος ἐνθυμήματος καρδίας
      ἀνθρώπου.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 27:6
translation:
  text: The fruit shows the cultivation of a tree; so a man's reasoning shows the
    inclination of his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'reasoning ... inclination of one'; the Greek parallel reads 'the
      word of a man's heart's thought,' supporting the sense that a person's outward
      expression reveals the inner disposition.
    reason: alternative_reading
lexical_decisions:
- source_word: עֲבֹדַת עֵץ
  chosen: the cultivation of a tree
  alternatives:
  - the work of a tree
  - the tillage of a tree
  - the care of a tree
  lexicon: HALOT
  rationale: The Hebrew literally combines 'service/work' with 'tree,' but in context
    it refers to what is revealed about a tree by its produce—its cultivation or tending.
    The Greek parallel γεώργιον ξύλου ('cultivation/farming of a tree') supports an
    agricultural sense rather than a more abstract 'work.' 'Cultivation' is natural
    English and preserves the proverb's image.
- source_word: פֶרִי
  chosen: fruit
  alternatives:
  - produce
  lexicon: HALOT
  rationale: Standard agricultural term. 'Fruit' fits both the literal image and the
    proverb's metaphorical force.
- source_word: חֶשְׁבּוֹן
  chosen: reasoning
  alternatives:
  - thought
  - account
  - calculation
  - speech
  lexicon: HALOT
  rationale: 'The Hebrew can denote reckoning or thought. The Greek parallel has λόγος
    ἐνθυμήματος καρδίας ἀνθρώπου, pointing toward the outward expression of inward
    thought. ''Reasoning'' preserves the mental-process sense while fitting the comparison:
    what a person says or reasons reveals what is within.'
- source_word: יֵצֶר
  chosen: inclination
  alternatives:
  - formation
  - disposition
  - purpose
  lexicon: HALOT
  rationale: In Hebrew this commonly refers to the shaping impulse or inclination
    of the inner person. 'Inclination' is idiomatic and preserves the anthropological
    nuance without importing later doctrinal freight.
- source_word: אֶחָד
  chosen: his
  alternatives:
  - a person
  - one
  - an individual
  lexicon: HALOT
  rationale: The Hebrew phrase is awkward in isolation ('of one'), likely meaning
    'of a person/individual.' The Greek explicitly reads 'of a man's heart' (ἀνθρώπου).
    Rendering with the possessive 'his' in the proverb's second line produces clear
    English while staying anchored to both witnesses.
