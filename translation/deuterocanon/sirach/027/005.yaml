    reference: Sirach 27:5
translation:
  text: A potter’s vessels are tested by the kiln, and likewise a man by his reasoning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “by his thoughts” or “in his deliberation”; the Greek parallel reads
      “in his deliberation.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי יוֹצֵר
  chosen: A potter’s vessels
  alternatives:
  - the vessels of a potter
  - pottery vessels
  lexicon: HALOT
  rationale: כְּלֵי is the construct plural 'vessels/utensils,' and יוֹצֵר is 'potter.'
    The phrase is rendered naturally in English while preserving the concrete image.
- source_word: לְבָעֵר כִּבְשָׁן
  chosen: are tested by the kiln
  alternatives:
  - the kiln examines
  - the furnace proves
  - for the firing of a kiln
  lexicon: HALOT
  rationale: The Hebrew wording is somewhat compressed and the Greek parallel has
    δοκιμάζει κάμινος, 'a kiln tests.' In context the sense is clearly that the kiln
    proves the quality of pottery. 'Are tested by the kiln' brings out the passive
    sense idiomatically in English while staying anchored to both witnesses.
- source_word: וְכָמֹהוּ
  chosen: and likewise
  alternatives:
  - and so also
  - and like it
  lexicon: HALOT
  rationale: This connective draws an analogy from the first colon to the second.
    'Likewise' is concise and idiomatic.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and matches the Greek
    ἀνθρώπου in a representative sense. Per project philosophy, the gendered form
    is retained where it reflects the source wording.
- source_word: עַל חֶשְׁבּוֹנוֹ
  chosen: by his reasoning
  alternatives:
  - by his thoughts
  - in his deliberation
  - by his plan
  lexicon: HALOT; LSJ
  rationale: The Hebrew חֶשְׁבּוֹן can denote thought, calculation, or reasoning;
    the Greek parallel ἐν διαλογισμῷ αὐτοῦ points to deliberation/thought-process
    rather than moral 'account.' 'By his reasoning' best captures the idea that a
    person's quality is disclosed in the way he thinks and speaks from deliberation.
