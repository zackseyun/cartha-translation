id: SIR.27.28
reference: Sirach 27:28
source:
  edition: lxx-swete-1909
  text: ἐμπαιγμὸς καὶ ὀνειδισμὸς ὑπερηφάνων, καὶ ἡ ἐκδίκησις ὡς λέων ἐνεδρεύσει αὐτόν.
  language: Greek
  pages:
  - 717
  confidence: high
  validation: agree
translation:
  text: Mockery and reproach are for the proud, and vengeance will lie in wait for
    him like a lion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the arrogant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will ambush him like a lion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμπαιγμός
  chosen: mockery
  alternatives:
  - derision
  - scorn
  lexicon: LSJ
  rationale: The noun denotes mocking or derisive treatment. 'Mockery' is natural
    modern English and pairs well with the following term without overinterpreting.
- source_word: ὀνειδισμός
  chosen: reproach
  alternatives:
  - insult
  - disgrace
  lexicon: LSJ
  rationale: The word commonly refers to reproach or reviling. 'Reproach' preserves
    the moral and social shame nuance better than the flatter 'insult.'
- source_word: ὑπερηφάνων
  chosen: the proud
  alternatives:
  - proud people
  - the arrogant
  lexicon: LSJ
  rationale: The genitive plural refers to proud/arrogant persons. 'The proud' is
    concise, idiomatic, and preserves the generic class sense.
- source_word: ἐκδίκησις
  chosen: vengeance
  alternatives:
  - punishment
  - retribution
  - justice
  lexicon: LSJ
  rationale: The term denotes avenging or retributive response. 'Vengeance' best matches
    the force of the Greek here, especially with the predatory lion image; 'justice'
    would soften the warning.
- source_word: ἐνεδρεύσει
  chosen: will lie in wait
  alternatives:
  - will ambush
  - will lurk for
  lexicon: LSJ
  rationale: The verb means to lie in ambush or wait secretly. 'Will lie in wait'
    preserves the metaphorical stalking image and reads smoothly with 'like a lion.'
- source_word: αὐτόν
  chosen: him
  alternatives:
  - them
  lexicon: LSJ
  rationale: The Greek object is singular, likely referring back generically to the
    proud person as a representative individual. Per project philosophy, the masculine
    singular is retained rather than neutralized.
