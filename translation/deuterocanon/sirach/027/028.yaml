theological_decisions:
- issue: Whether to render the singular pronoun generically or as gender-neutral plural
  chosen_reading: Retain singular 'him'
  alternative_readings:
  - them
  - such a person
  rationale: The Greek has singular αὐτόν after a plural class noun, a common way
    of individualizing the warning. Keeping 'him' reflects the source form and preserves
    the proverb-like force without importing a plural not present in the Greek.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Whether ἐκδίκησις should be softened to 'justice' or 'punishment'
  chosen_reading: Render as 'vengeance'
  alternative_readings:
  - retribution
  - punishment
  - justice
  rationale: In this wisdom context the term warns of retaliatory consequence stalking
    the proud. 'Vengeance' best preserves the severity and imagery of the Greek, while
    not specifying the agent beyond what the text states.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
