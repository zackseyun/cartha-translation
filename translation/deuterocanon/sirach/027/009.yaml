id: SIR.27.9
reference: Sirach 27:9
source:
  edition: lxx-swete-1909
  text: πετεινὰ πρὸς τὰ ὅμοια αὐτοῖς καταλύσει, καὶ ἀλήθεια πρὸς τοὺς ἐργαζομένους
    αὐτὴν ἐπανήξει.
  language: Greek
  pages:
  - 715
  confidence: high
  validation: agree
translation:
  text: Birds settle with their own kind, and truth returns to those who practice
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Birds lodge with their own kind.'
    reason: lexical_alternative
  - marker: b
    text: Or 'truth comes back to those who do it.' The Greek personifies truth and
      speaks of it as returning to those who put it into practice.
    reason: lexical_alternative
lexical_decisions:
- source_word: πετεινὰ
  chosen: Birds
  alternatives:
  - Flying creatures
  - Birds of the air
  lexicon: LSJ
  rationale: The neuter plural commonly denotes birds in general. 'Birds' is natural
    English and fits the proverb's imagery without over-specifying.
- source_word: πρὸς τὰ ὅμοια αὐτοῖς
  chosen: with their own kind
  alternatives:
  - to what is like them
  - to their like
  lexicon: LSJ
  rationale: The phrase expresses likeness or affinity. 'With their own kind' captures
    the proverbial sense idiomatically in English better than a more wooden rendering.
- source_word: καταλύσει
  chosen: settle
  alternatives:
  - lodge
  - rest
  - take up lodging
  lexicon: LSJ
  rationale: The verb can mean to lodge or settle down. 'Settle' fits birds naturally
    in English and preserves the image of coming to rest among similar creatures.
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - truthfulness
  lexicon: LSJ
  rationale: The noun straightforwardly means 'truth.' In this wisdom context it may
    imply faithful truthfulness, but 'truth' best preserves the Greek's breadth.
- source_word: πρὸς τοὺς ἐργαζομένους αὐτὴν
  chosen: to those who practice it
  alternatives:
  - to those who work it
  - to those who do it
  lexicon: LSJ
  rationale: ἐργάζομαι with a direct object can mean to do, practice, or carry out.
    Since the object is 'truth,' 'practice it' communicates enacted truth in readable
    English.
- source_word: ἐπανήξει
  chosen: returns
  alternatives:
  - will come back
  - will come again
  lexicon: LSJ
  rationale: 'The future verb indicates coming back or returning. ''Returns'' is concise
    and preserves the proverbial reciprocity: truth comes back to those who live by
    it.'
