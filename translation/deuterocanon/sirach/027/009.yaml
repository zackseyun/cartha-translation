theological_decisions:
- issue: Personification of truth and ethical reciprocity
  chosen_reading: Truth is rendered as something that 'returns' to those who practice
    it, preserving the proverb's personified moral logic.
  alternative_readings:
  - Truth comes to those who practice it
  - Truth associates with those who practice it
  rationale: The Greek ἐπανήξει specifically suggests return or coming back, not merely
    generic association. Retaining this imagery preserves the wisdom-style claim that
    moral conduct draws a corresponding moral reality.
