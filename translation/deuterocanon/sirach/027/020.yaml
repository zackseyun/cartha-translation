id: SIR.27.20
reference: Sirach 27:20
source:
  edition: lxx-swete-1909
  text: μὴ αὐτὸν διώξῃς, ὅτι μακρὰν ἀπέστη, καὶ ἐξέφυγεν ὡς δορκὰς ἐκ παγίδος.
  language: Greek
  pages:
  - 716
  confidence: high
  validation: agree
translation:
  text: Do not pursue him, for he has gone far away, and has escaped like a gazelle
    from a snare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not chase him.' The Greek verb can denote pursuit more generally.
    reason: lexical_alternative
  - marker: b
    text: The image is of a swift wild animal escaping a hunter's trap; 'gazelle'
      could also be rendered 'roe' or 'antelope.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ... διώξῃς
  chosen: Do not pursue
  alternatives:
  - Do not chase
  - Do not persecute
  lexicon: LSJ
  rationale: διώκω commonly means 'pursue' or 'chase'; in this wisdom context the
    sense is literal/figurative pursuit of a departed person, not persecution. 'Pursue'
    preserves the imperative force without over-specifying hostility.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - it
  - that person
  lexicon: LSJ
  rationale: The pronoun is masculine singular in Greek. Per gender-accurate policy,
    'him' best matches the source form and likely referent in context.
- source_word: μακρὰν ἀπέστη
  chosen: he has gone far away
  alternatives:
  - he has departed far away
  - he has stood far off
  lexicon: LSJ
  rationale: ἀφίστημι here denotes departure or withdrawal. 'Has gone far away' is
    idiomatic modern English and captures both the completed action and the distance
    implied by μακράν.
- source_word: ἐξέφυγεν
  chosen: has escaped
  alternatives:
  - fled away
  - got away
  lexicon: LSJ
  rationale: The verb means to escape or get clear of danger. 'Has escaped' fits the
    following simile of an animal escaping a trap.
- source_word: ὡς δορκὰς
  chosen: like a gazelle
  alternatives:
  - like a roe
  - like an antelope
  lexicon: LSJ
  rationale: δορκάς refers to a gazelle/roe-like animal. 'Gazelle' is the clearest
    modern equivalent and preserves the image of swift escape.
- source_word: ἐκ παγίδος
  chosen: from a snare
  alternatives:
  - from a trap
  - from a net
  lexicon: LSJ
  rationale: παγίς denotes a snare or trap. 'Snare' fits the singular noun and pairs
    naturally with the gazelle image in wisdom literature.
