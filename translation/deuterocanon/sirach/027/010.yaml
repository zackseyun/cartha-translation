theological_decisions:
- issue: Personification of ἁμαρτίαι
  chosen_reading: sins are personified as predators that stalk wrongdoers
  alternative_readings:
  - the consequences of sins stalk wrongdoers
  - punishments for sins stalk wrongdoers
  rationale: The Greek text itself says 'sins,' not explicitly 'punishments' or 'consequences.'
    The translation preserves the text's vivid personification rather than interpreting
    it into a secondary abstraction.
  doctrine_reference: Preserve theological tension rather than resolve it.
