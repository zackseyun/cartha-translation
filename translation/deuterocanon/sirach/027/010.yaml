id: SIR.27.10
reference: Sirach 27:10
source:
  edition: lxx-swete-1909
  text: λέων θήραν ἐνεδρεύει, οὕτως ἁμαρτίαι ἐργαζομένους ἄδικα.
  language: Greek
  pages:
  - 715
  confidence: high
  validation: minor_mismatch
translation:
  text: A lion lies in wait for prey; so sins do for those who practice injustice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A lion ambushes prey; so sins ambush those who do unjust things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέων
  chosen: A lion
  alternatives:
  - the lion
  - lion
  lexicon: LSJ
  rationale: Anarthrous singular used proverbially; English indefinite article best
    conveys a general truth in a wisdom saying.
- source_word: θήραν
  chosen: prey
  alternatives:
  - game
  - a catch
  lexicon: LSJ
  rationale: The noun denotes hunted prey. 'Prey' is the most natural and vivid English
    equivalent in this simile.
- source_word: ἐνεδρεύει
  chosen: lies in wait
  alternatives:
  - ambushes
  - lurks for
  lexicon: LSJ
  rationale: The verb conveys setting an ambush or lying in wait. 'Lies in wait' preserves
    the predatory image without overcompressing it.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: LSJ
  rationale: Introduces the comparison succinctly; 'so' fits readable modern English
    while preserving the proverbial parallel.
- source_word: ἁμαρτίαι
  chosen: sins
  alternatives:
  - sinful acts
  - transgressions
  lexicon: LSJ
  rationale: 'Plural noun is best kept as ''sins.'' The personifying force is retained:
    sins are depicted as stalking the wrongdoer.'
- source_word: ἐργαζομένους
  chosen: those who practice
  alternatives:
  - those who do
  - those working
  lexicon: LSJ
  rationale: The participle denotes people engaged in doing something habitually or
    actively. 'Those who practice' brings out the ongoing character better than a
    bare 'do.'
- source_word: ἄδικα
  chosen: injustice
  alternatives:
  - wrong
  - unjust things
  - wickedly
  lexicon: LSJ
  rationale: The neuter plural adverbial/object-like form can be rendered as 'unjust
    things' or more idiomatically 'injustice.' 'Practice injustice' is natural English
    and preserves the ethical sense.
