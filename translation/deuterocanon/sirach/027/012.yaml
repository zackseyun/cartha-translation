id: SIR.27.12
reference: Sirach 27:12
source:
  edition: lxx-swete-1909
  text: εἰς μέσον ἀσυνέτων συντήρησον καιρόν, εἰς μέσον δὲ διανοουμένου ἐνδελέχιζε.
  language: Greek
  pages:
  - 716
  confidence: high
  validation: agree
translation:
  text: Among the senseless, watch for the right time; but among the thoughtful, be
    constant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Among fools, keep watch for the proper moment; but among the discerning,
      remain continually.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσυνέτων
  chosen: the senseless
  alternatives:
  - the foolish
  - the undiscerning
  - those without understanding
  lexicon: LSJ
  rationale: The genitive plural of ἀσύνετος denotes people lacking understanding
    or sense. 'Senseless' preserves the intellectual and moral nuance without sounding
    overly proverbial or flattening it to mere stupidity.
- source_word: συντήρησον καιρόν
  chosen: watch for the right time
  alternatives:
  - keep time
  - observe the occasion
  - bide your time
  lexicon: LSJ
  rationale: συντηρέω can mean keep, observe, or watch carefully, and καιρός here
    is the fitting or opportune time rather than chronological time. The phrase likely
    urges restraint and discernment in speech or conduct among fools. 'Watch for the
    right time' captures both attentiveness and timing in idiomatic English.
- source_word: διανοουμένου
  chosen: the thoughtful
  alternatives:
  - the intelligent person
  - one who understands
  - the discerning person
  lexicon: LSJ
  rationale: The participial form from διανοέομαι points to one who thinks things
    through or is reflective. 'Thoughtful' is natural English and matches the contrast
    with ἀσυνέτων.
- source_word: ἐνδελέχιζε
  chosen: be constant
  alternatives:
  - persist
  - stay continually
  - spend time continually
  lexicon: LSJ
  rationale: The verb conveys continuance or persistence. In context, the sense is
    to remain steadily engaged in the company of the thoughtful, in contrast to cautious
    reserve among the senseless. 'Be constant' preserves the durative force without
    over-specifying the action.
- source_word: εἰς μέσον ... εἰς μέσον δέ
  chosen: among ... but among
  alternatives:
  - in the midst of ... and in the midst of
  - with ... but with
  lexicon: LSJ
  rationale: Literally 'into/in the midst of,' but idiomatic English in this social
    context is 'among.' The repeated construction marks a contrast between two kinds
    of company.
