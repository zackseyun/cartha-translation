theological_decisions:
- issue: Rendering πίστιν in a non-theological wisdom context
  chosen_reading: trust
  alternative_readings:
  - faith
  - confidence
  rationale: DOCTRINE.md gives 'faith' as the default for πίστις, with context-sensitive
    alternatives documented. Here the verse concerns betrayal of confidences and the
    loss of friendship, so 'trust' reflects the plain relational sense and avoids
    doctrinal misreading.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy #1 and #5'
- issue: Gendered proverbial subject
  chosen_reading: his soul
  alternative_readings:
  - their soul
  - for himself
  rationale: The Greek uses masculine forms in a generic proverb. Per doctrine, gender-accurate
    rendering is preferred over flattening to gender-neutral language. 'His soul'
    preserves the source form while still functioning generically in English.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4'
