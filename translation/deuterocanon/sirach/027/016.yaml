id: SIR.27.16
reference: Sirach 27:16
source:
  edition: lxx-swete-1909
  text: Ὁ ἀποκαλύπτων μυστήρια ἀπώλεσεν πίστιν, καὶ οὐ μὴ εὕρῃ φίλον πρὸς τὴν ψυχὴν
    αὐτοῦ.
  language: Greek
  pages:
  - 716
  confidence: high
  validation: agree
translation:
  text: Whoever reveals secrets destroys trust, and will never find a friend for his
    soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mysteries' or 'confidences' for 'secrets.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'for his soul'—an idiom for one truly close to him or fitting for
      his very self.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ ἀποκαλύπτων
  chosen: Whoever reveals
  alternatives:
  - The one who uncovers
  - He who discloses
  lexicon: BDAG
  rationale: The articular present participle expresses a general principle about
    a person characterized by this action. 'Whoever reveals' gives natural English
    while preserving the proverbial force.
- source_word: μυστήρια
  chosen: secrets
  alternatives:
  - mysteries
  - confidences
  lexicon: BDAG
  rationale: In this wisdom context the sense is private matters entrusted to someone,
    not theological 'mysteries.' 'Secrets' is the clearest modern rendering; 'confidences'
    is possible but slightly interpretive.
- source_word: ἀπώλεσεν
  chosen: has destroyed
  alternatives:
  - has ruined
  - destroyed
  - lost
  lexicon: BDAG
  rationale: The aorist states the consequence as a settled fact. 'Has destroyed'
    communicates decisive loss better than 'lost,' and the object is not the revealer's
    own faith but relational trust.
- source_word: πίστιν
  chosen: trust
  alternatives:
  - faith
  - faithfulness
  - confidence
  lexicon: BDAG
  rationale: Although the project's default for πίστις is 'faith,' context governs
    here. In a proverb about betraying secrets and losing friendship, the relational
    sense 'trust' best matches the Greek and avoids importing theological overtones
    the text does not require.
- source_word: οὐ μὴ εὕρῃ
  chosen: will never find
  alternatives:
  - shall certainly not find
  - will by no means find
  lexicon: BDAG
  rationale: οὐ μή with the subjunctive is emphatic negation about the future. 'Will
    never find' is idiomatic and preserves the force.
- source_word: φίλον
  chosen: a friend
  alternatives:
  - friend
  lexicon: BDAG
  rationale: Indefinite singular object in a proverbial statement is naturally rendered
    'a friend.'
- source_word: πρὸς τὴν ψυχὴν αὐτοῦ
  chosen: for his soul
  alternatives:
  - suited to himself
  - close to him
  - for himself
  lexicon: BDAG
  rationale: The phrase is somewhat idiomatic, indicating a friend truly attached
    to or fitting for one's very self/life. 'For his soul' keeps the source imagery
    and gravity, even if slightly more formal than 'close to him.'
