theological_decisions:
- issue: Interpretive force of the final clause after betrayal of confidence
  chosen_reading: 'The line is rendered as a consequence: after revealing a friend''s
    secrets, one will certainly not be able to pursue after him successfully.'
  alternative_readings:
  - you should certainly not pursue after him
  - you will certainly not overtake him again in friendship
  rationale: The Greek form is second person singular with strong negation and naturally
    reads as a predictive/proverbial consequence rather than a direct prohibition.
    The context of broken friendship in surrounding material supports an irreversible-result
    sense.
  doctrine_reference: Preserve theological/interpretive tension rather than resolve
    it beyond the source
