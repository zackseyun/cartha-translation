id: SIR.27.17
reference: Sirach 27:17
source:
  edition: lxx-swete-1909
  text: στέργον φίλον καὶ πιστώθητι μετʼ αὐτοῦ· ἐὰν δὲ ἀποκαλύψῃς τὰ μυστήρια αὐτοῦ,
    οὐ μὴ καταδιώξῃς ὀπίσω αὐτοῦ.
  language: Greek
  pages:
  - 716
  confidence: high
  validation: agree
translation:
  text: Cherish a friend and be faithful with him; but if you reveal his secrets,
    you will certainly not pursue after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you should certainly not go after him.' The Greek can be heard either
      as a statement of consequence or, less likely, as a prohibition.
    reason: alternative_reading
lexical_decisions:
- source_word: στέργον
  chosen: Cherish
  alternatives:
  - love
  - be devoted to
  - hold dear
  lexicon: LSJ
  rationale: The imperative from στέργω denotes affectionate attachment or natural
    devotion. 'Cherish' captures warm, loyal affection in idiomatic English without
    flattening it to the broader 'love.'
- source_word: φίλον
  chosen: a friend
  alternatives:
  - your friend
  - the one who is a friend
  lexicon: LSJ
  rationale: The accusative object is indefinite in form; 'a friend' is natural English
    and fits the proverbial style. The sense is relational rather than merely adjectival
    ('friendly one').
- source_word: πιστώθητι
  chosen: be faithful
  alternatives:
  - be trustworthy
  - be steadfast
  - show fidelity
  lexicon: LSJ
  rationale: The passive/middle imperative here carries the sense of proving faithful
    or trustworthy in relation to the friend. 'Be faithful' preserves the covenantal-relational
    nuance better than the more transactional 'be trustworthy.'
- source_word: μετʼ αὐτοῦ
  chosen: with him
  alternatives:
  - toward him
  - to him
  lexicon: LSJ
  rationale: μετά with genitive commonly means 'with,' expressing relationship or
    association. 'With him' is the most direct rendering.
- source_word: ἀποκαλύψῃς
  chosen: reveal
  alternatives:
  - uncover
  - disclose
  lexicon: LSJ
  rationale: The verb means to uncover or disclose what was hidden. 'Reveal' is clear
    modern English and fits the context of divulging confidential matters.
- source_word: τὰ μυστήρια αὐτοῦ
  chosen: his secrets
  alternatives:
  - his confidential matters
  - his mysteries
  lexicon: LSJ
  rationale: In wisdom literature μυστήρια commonly refers to confidential matters
    or secrets, not necessarily esoteric religious 'mysteries.' 'His secrets' best
    fits the interpersonal context.
- source_word: οὐ μὴ
  chosen: certainly not
  alternatives:
  - by no means
  - not at all
  lexicon: Greek grammar
  rationale: οὐ μή with the subjunctive is a strong negation. Rendering it as 'certainly
    not' preserves the emphatic force in natural English.
- source_word: καταδιώξῃς ὀπίσω αὐτοῦ
  chosen: pursue after him
  alternatives:
  - go after him
  - follow after him
  - seek him out again
  lexicon: LSJ
  rationale: The phrase literally means 'pursue after him.' In context it implies
    that once trust is broken, the friendship cannot be recovered by chasing after
    the offended friend. 'Pursue after him' keeps the imagery while remaining understandable.
