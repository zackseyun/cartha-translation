id: SIR.27.24
reference: Sirach 27:24
source:
  edition: lxx-swete-1909
  text: πολλὰ ἐμίσησα καὶ οὐχ ὡμοίωσα αὐτῷ, καὶ ὁ κύριος μισήσει αὐτόν.
  language: Greek
  pages:
  - 717
  confidence: high
  validation: agree
translation:
  text: I have hated many things, but I have not become like him; and the Lord will
    hate him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πολλὰ
  chosen: many things
  alternatives:
  - many
  - much
  lexicon: LSJ
  rationale: Neuter plural used substantivally; in English, 'many things' makes the
    object of hatred explicit and natural.
- source_word: ἐμίσησα
  chosen: I have hated
  alternatives:
  - I hated
  lexicon: LSJ
  rationale: Aorist can be rendered as simple past, but the English present perfect
    preserves the speaker's accumulated experience and fits the proverbial tone.
- source_word: οὐχ ὡμοίωσα αὐτῷ
  chosen: I have not become like him
  alternatives:
  - I did not resemble him
  - I was not made like him
  - I have not likened myself to him
  lexicon: LSJ
  rationale: 'The verb ὁμοιόω can mean ''make like'' or in passive/intransitive sense
    ''become like, resemble.'' In this context the sense is moral comparison: despite
    hating many things, the speaker has not become like the person just described.
    ''Become like him'' communicates this clearly in idiomatic English.'
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the lord
  lexicon: LSJ
  rationale: Per doctrine, κύριος is rendered 'Lord.' Here it refers to God in wisdom
    literature context.
- source_word: μισήσει
  chosen: will hate
  alternatives:
  - will detest
  lexicon: LSJ
  rationale: Future of μισέω straightforwardly means 'will hate.' A softer rendering
    like 'detest' is possible, but 'hate' best matches the Greek and preserves the
    severity of divine opposition in the saying.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - that person
  lexicon: LSJ
  rationale: Masculine singular pronoun points back to the individual under discussion.
    'Him' is gender-accurate and concise.
