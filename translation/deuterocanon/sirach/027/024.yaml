theological_decisions:
- issue: Divine hatred language
  chosen_reading: the Lord will hate him
  alternative_readings:
  - the Lord will detest him
  - the Lord will be hostile to him
  rationale: The Greek uses the same μισέω root for both the speaker's hatred and
    the Lord's future response. Retaining 'hate' preserves the rhetorical force and
    lexical repetition rather than softening the statement for theological comfort.
