id: SIR.27.11
reference: Sirach 27:11
source:
  edition: lxx-swete-1909
  text: διήγησις εὐσεβοῦς διὰ παντὸς σοφία, ὁ δὲ ἄφρων ὡς σελήνη ἀλλοιοῦται.
  language: Greek
  pages:
  - 715
  confidence: high
  validation: agree
translation:
  text: The speech of the godly is always wisdom, but the fool changes like the moon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The discourse of the devout is wisdom at all times.'
    reason: lexical_alternative
  - marker: b
    text: 'The comparison to the moon likely points to its changing phases: the fool
      is unstable or inconstant.'
    reason: cultural_note
lexical_decisions:
- source_word: διήγησις
  chosen: speech
  alternatives:
  - discourse
  - narration
  - talk
  lexicon: LSJ
  rationale: The noun can denote narration, account, or discourse. In this wisdom
    context it refers to what a person says in ongoing conversation rather than a
    formal story, so 'speech' best captures the broad sense in natural English.
- source_word: εὐσεβοῦς
  chosen: the godly
  alternatives:
  - the pious
  - the devout
  lexicon: LSJ
  rationale: 'The genitive singular functions substantivally: ''of a godly/devout
    person.'' ''The godly'' is readable modern English and preserves the moral-religious
    sense without sounding archaic.'
- source_word: διὰ παντός
  chosen: always
  alternatives:
  - continually
  - at all times
  lexicon: LSJ
  rationale: The idiom means 'through all time' or 'continually.' 'Always' is concise
    and idiomatic in English.
- source_word: σοφία
  chosen: wisdom
  alternatives:
  - wise speech
  lexicon: LSJ
  rationale: The predicate is simply 'wisdom.' Retaining the noun preserves the aphoristic
    force of the Greek rather than paraphrasing it into an adjective.
- source_word: ἄφρων
  chosen: the fool
  alternatives:
  - the senseless man
  - the foolish person
  lexicon: LSJ
  rationale: Standard wisdom-literature term for one lacking sense. 'The fool' is
    the most natural and recognizable English equivalent.
- source_word: ἀλλοιοῦται
  chosen: changes
  alternatives:
  - is altered
  - shifts
  - is changeable
  lexicon: LSJ
  rationale: The verb means to change or become different. 'Changes' keeps the verbal
    force and fits the simile with the moon's phases.
- source_word: ὡς σελήνη
  chosen: like the moon
  alternatives:
  - as the moon
  lexicon: LSJ
  rationale: The comparison is explicit and likely evokes the moon's changing phases.
    'Like the moon' is the clearest idiomatic rendering.
