theological_decisions:
- issue: Meaning of 'fear of the Lord'
  chosen_reading: Retain the traditional biblical idiom as reverent fear toward God,
    without paraphrasing it into 'piety' or 'reverence' alone.
  alternative_readings:
  - reverence for the Lord
  - devotion to the Lord
  rationale: The phrase carries established theological significance in wisdom literature.
    Preserving 'fear of the Lord' maintains intertextual continuity and avoids flattening
    the concept into a merely emotional or merely devotional term.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
- issue: Scope of 'house'
  chosen_reading: Leave 'house' in the main text rather than specifying 'family' or
    'estate.'
  alternative_readings:
  - household
  - family line
  - estate
  rationale: The Greek οἶκος can encompass dwelling, household, and family establishment.
    The text does not force a narrower interpretation, so the translation preserves
    the broader image.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve ambiguity
    where the source is genuinely broad.'
