id: SIR.27.3
reference: Sirach 27:3
source:
  edition: lxx-swete-1909
  text: ἐὰν μὴ ἐν φόβῳ Κυρίου κρατήσῃ κατὰ σπουδήν, ἐν τάχει καταστραφήσεται αὐτοῦ
    ὁ οἶκος.
  language: Greek
  pages:
  - 715
  confidence: high
  validation: agree
translation:
  text: If he does not hold fast diligently in the fear of the Lord, his house will
    quickly be overthrown.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his household will quickly be ruined.' The Greek 'house' can refer not
      only to a building but also to a person's household or family establishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν μὴ
  chosen: If ... does not
  alternatives:
  - unless
  lexicon: BDAG
  rationale: Standard conditional construction. 'If ... does not' is clear modern
    English and preserves the protasis without compressing it too much into 'unless.'
- source_word: ἐν φόβῳ Κυρίου
  chosen: in the fear of the Lord
  alternatives:
  - with fear of the Lord
  - by the fear of the Lord
  lexicon: BDAG
  rationale: The phrase is a common biblical expression denoting reverent posture
    before God. 'In the fear of the Lord' preserves the idiom and its theological
    weight better than a more interpretive paraphrase.
- source_word: Κυρίου
  chosen: Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: The source is Greek κύριος, and the doctrine default for κύριος is 'Lord.'
    Since this is Sirach in Greek rather than a direct Hebrew occurrence of the divine
    name, 'Lord' is preferred.
- source_word: κρατήσῃ
  chosen: hold fast
  alternatives:
  - hold firmly
  - maintain
  - cling to
  lexicon: BDAG
  rationale: κρατέω here conveys firm grasp or steadfast retention. 'Hold fast' is
    concise, idiomatic, and preserves the sense of tenacious adherence.
- source_word: κατὰ σπουδήν
  chosen: diligently
  alternatives:
  - earnestly
  - carefully
  - with zeal
  lexicon: BDAG
  rationale: The phrase modifies the manner of holding fast, indicating earnestness
    or serious application. 'Diligently' fits natural English while retaining the
    moral seriousness of the Greek.
- source_word: ἐν τάχει
  chosen: quickly
  alternatives:
  - soon
  - in haste
  lexicon: BDAG
  rationale: The phrase indicates rapidity of the resulting downfall. 'Quickly' is
    the most natural rendering in contemporary English.
- source_word: καταστραφήσεται
  chosen: will be overthrown
  alternatives:
  - will be destroyed
  - will be ruined
  lexicon: BDAG
  rationale: The future passive points to collapse or ruin. 'Will be overthrown' preserves
    the vivid sense of being brought down, while still fitting the metaphorical subject
    'house.'
- source_word: αὐτοῦ ὁ οἶκος
  chosen: his house
  alternatives:
  - his household
  lexicon: BDAG
  rationale: οἶκος can mean either physical house or household/family establishment.
    In wisdom literature the broader sense of one's house as household/estate is likely,
    but 'his house' preserves the source wording and allows the fuller resonance in
    English.
