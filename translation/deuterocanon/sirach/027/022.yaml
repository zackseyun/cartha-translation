id: SIR.27.22
reference: Sirach 27:22
source:
  edition: lxx-swete-1909
  text: διανεύων ὀφθαλμῷ τεκταίνει κακά, καὶ οὐδεὶς αὐτὸν ἀποστήσει ἀπʼ αὐτοῦ.
  language: Greek
  pages:
  - 716
  confidence: high
  validation: minor_mismatch
translation:
  text: One who winks with the eye devises evil things, and no one will turn him away
    from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'from it'; the sense is likely 'from the evil things' just
      mentioned, hence 'from them' in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: διανεύων
  chosen: One who winks
  alternatives:
  - one who signals
  - one who nods
  - one who gives a sign
  lexicon: LSJ
  rationale: The participle denotes making a sign or gesture; with ὀφθαλμῷ ('with
    the eye') it naturally refers to a covert eye-signal. 'Winks' is concise and idiomatic
    in English, while preserving the sense of furtive signaling.
- source_word: ὀφθαλμῷ
  chosen: with the eye
  alternatives:
  - with his eye
  lexicon: LSJ
  rationale: The dative is instrumental. English idiom prefers 'with the eye' or 'with
    his eye'; the former stays closer to the Greek without adding a possessive not
    explicit in the text.
- source_word: τεκταίνει
  chosen: devises
  alternatives:
  - contrives
  - plans
  - fashions
  lexicon: LSJ
  rationale: The verb literally can mean to craft or construct, but in this moral
    context it refers to plotting or contriving. 'Devises' captures intentional planning
    without sounding overly wooden.
- source_word: κακά
  chosen: evil things
  alternatives:
  - evils
  - harmful things
  - wicked schemes
  lexicon: LSJ
  rationale: The plural accusative is broad. 'Evil things' preserves the open-ended
    plural and moral force better than the more interpretive 'wicked schemes,' though
    the context clearly involves scheming.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: LSJ
  rationale: Standard, natural rendering of the indefinite negative pronoun.
- source_word: ἀποστήσει
  chosen: will turn him away
  alternatives:
  - will remove him
  - will make him desist
  - will turn him back
  lexicon: LSJ
  rationale: Future of ἀφίστημι/ἀποστέλλω-family usage here conveys causing separation
    from or turning away from a course. 'Will turn him away' fits the following ἀπʼ
    αὐτοῦ and avoids over-specifying whether the subject is physically removed or
    morally restrained.
- source_word: ἀπʼ αὐτοῦ
  chosen: from them
  alternatives:
  - from it
  - from this
  - from him
  lexicon: LSJ
  rationale: Although the Greek form is singular ('from it/him'), the nearest semantic
    antecedent is the plural κακά ('evil things'). English naturally resolves the
    sense as 'from them.' This is a minor smoothing for coherence; a more formal rendering
    would be 'from it,' but that is less clear in English.
