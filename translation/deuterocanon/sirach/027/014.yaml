id: SIR.27.14
reference: Sirach 27:14
source:
  edition: lxx-swete-1909
  text: λαλιὰ πολυκόρυφου ὀρθώσει τρίχας, καὶ ἡ μάχη αὐτῶν ἐμφραγμὸς ὤτιων.
  language: Greek
  pages:
  - 716
  confidence: high
  validation: agree
translation:
  text: The talk of one who swears much makes the hair stand up, and their quarrel
    is a stopping of the ears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek πολυκόρυφου is lexically difficult. It may refer to a person given
      to excessive swearing or cursing, or more broadly to loud, outrageous, or boastful
      speech. The main text adopts 'one who swears much' as the best contextual fit,
      but the exact nuance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλιὰ
  chosen: talk
  alternatives:
  - speech
  - chatter
  - talking
  lexicon: LSJ
  rationale: A broad term for speech or talk. 'Talk' is natural modern English and
    fits the proverbial tone without sounding overly formal.
- source_word: πολυκόρυφου
  chosen: one who swears much
  alternatives:
  - the loud man
  - the boastful man
  - the much-cursing person
  lexicon: LSJ
  rationale: The adjective is difficult and likely denotes someone given to excessive
    oaths/curses or noisy, outrageous speech. The immediate effect described—hair
    standing up and ears being blocked—fits shocking, offensive speech. 'One who swears
    much' best captures the likely sense while remaining readable; the lexical uncertainty
    is preserved in a footnote.
- source_word: ὀρθώσει τρίχας
  chosen: makes the hair stand up
  alternatives:
  - raises hairs
  - makes one's hair bristle
  lexicon: LSJ
  rationale: An idiomatic expression for causing horror or alarm. 'Makes the hair
    stand up' is clear modern English and preserves the vivid image.
- source_word: μάχη
  chosen: quarrel
  alternatives:
  - fight
  - strife
  - battle
  lexicon: LSJ
  rationale: In this wisdom context, verbal conflict is more likely than literal combat.
    'Quarrel' fits the social setting and pairs naturally with speech in the first
    clause.
- source_word: ἐμφραγμὸς ὤτιων
  chosen: a stopping of the ears
  alternatives:
  - an obstruction of the ears
  - something that makes one stop the ears
  - ear-blocking
  lexicon: LSJ
  rationale: 'The phrase is metaphorical: their conflict is so offensive that one
    shuts the ears. ''A stopping of the ears'' stays close to the Greek while remaining
    intelligible.'
