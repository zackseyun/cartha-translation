id: SIR.27.1
reference: Sirach 27:1
source:
  edition: lxx-swete-1909
  text: χάριν ἀδιαφόρου πολλοὶ ἥμαρτον, καὶ ὁ ζητῶν πληθῦναι ἀποστρέψει ὀφθαλμόν.
  language: Greek
  pages:
  - 715
  confidence: high
  validation: agree
translation:
  text: For the sake of gain many have sinned, and whoever seeks to increase it will
    turn away his eye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'profit.' The Greek term here likely refers to material advantage or
      gain.
    reason: lexical_alternative
  - marker: b
    text: That is, he will avert his eyes—an idiom suggesting deliberate moral compromise
      or overlooking what should be seen.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριν
  chosen: for the sake of
  alternatives:
  - because of
  - for
  lexicon: LSJ
  rationale: With the genitive it commonly expresses motive or purpose, here introducing
    the reason for sinning.
- source_word: ἀδιαφόρου
  chosen: gain
  alternatives:
  - profit
  - indifference
  - what makes no difference
  lexicon: LSJ
  rationale: Although the adjective can mean 'indifferent' in other contexts, in this
    proverbial setting with πολλοὶ ἥμαρτον and the following clause about seeking
    increase, the sense is material advantage/profit. 'Gain' is concise and natural
    English.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: LSJ
  rationale: Straightforward quantitative term; the implied subject is generic people.
- source_word: ἥμαρτον
  chosen: have sinned
  alternatives:
  - sinned
  lexicon: LSJ
  rationale: English present perfect suits the gnomic/proverbial observation about
    repeated human behavior.
- source_word: ζητῶν
  chosen: whoever seeks
  alternatives:
  - the one seeking
  - he who seeks
  lexicon: LSJ
  rationale: The articular participle functions generically. 'Whoever seeks' gives
    readable modern English while preserving the proverbial force.
- source_word: πληθῦναι
  chosen: to increase it
  alternatives:
  - to multiply
  - to increase
  - to get more
  lexicon: LSJ
  rationale: The infinitive likely refers back to gain/profit as the object understood
    from context. 'Increase it' makes the ellipsis clear in English without overparaphrasing.
- source_word: ἀποστρέψει ὀφθαλμόν
  chosen: will turn away his eye
  alternatives:
  - will avert his eye
  - will look away
  lexicon: LSJ
  rationale: 'A literal rendering preserves the idiom''s moral force: one seeking
    more gain will deliberately overlook wrongdoing or need. ''His eye'' reflects
    the singular Greek expression.'
