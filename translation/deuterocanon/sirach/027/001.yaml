theological_decisions:
- issue: Moral nuance of the final clause
  chosen_reading: The line is rendered idiomatically but still literally enough to
    preserve the image of deliberately averting one's eye for profit.
  alternative_readings:
  - will overlook wrongdoing
  - will shut his eyes
  rationale: The Greek idiom does not specify the object from which the eye is turned
    away. Keeping the image in the main text avoids importing a more specific accusation
    than the source states, while the English still communicates moral compromise.
  doctrine_reference: Translation philosophy §§1, 3, 6
