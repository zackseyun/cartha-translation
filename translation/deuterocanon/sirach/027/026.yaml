id: SIR.27.26
reference: Sirach 27:26
source:
  edition: lxx-swete-1909
  text: ὁ ὀρύσσων βόθρον εἰς αὐτὸν ἐμπεσεῖται, καὶ ὁ ἱστῶν παγίδα ἐν αὐτῇ ἁλώσεται·
  language: Greek
  pages:
  - 717
  confidence: high
  validation: agree
translation:
  text: The one who digs a pit will fall into it, and the one who sets a snare will
    be caught in it.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ὀρύσσων
  chosen: the one who digs
  alternatives:
  - whoever digs
  - he who digs
  lexicon: BDAG
  rationale: Articular present participle used substantivally; rendered generically
    as 'the one who digs' for clear modern English while preserving the proverbial
    force.
- source_word: βόθρον
  chosen: a pit
  alternatives:
  - a ditch
  - a hole
  lexicon: LSJ
  rationale: '''Pit'' best fits proverbial trap imagery in English and matches the
    common sense of a dug hole intended to ensnare or harm.'
- source_word: εἰς αὐτὸν
  chosen: into it
  alternatives:
  - into the same pit
  - into him/it
  lexicon: BDAG
  rationale: Neuter/masculine pronoun refers back to βόθρον in sense; idiomatic English
    requires 'into it.' 'The same pit' is interpretive and unnecessary.
- source_word: ἐμπεσεῖται
  chosen: will fall
  alternatives:
  - will fall in
  - will tumble into
  lexicon: BDAG
  rationale: Future middle of ἐμπίπτω; 'will fall' is natural English, with 'into
    it' carrying the directional sense.
- source_word: ὁ ἱστῶν
  chosen: the one who sets
  alternatives:
  - the one who lays
  - whoever sets
  lexicon: LSJ
  rationale: Present participle of ἵστημι in the sense of setting up or placing; 'sets'
    is the most natural collocation with 'snare' in English.
- source_word: παγίδα
  chosen: a snare
  alternatives:
  - a trap
  lexicon: BDAG
  rationale: Both are possible, but 'snare' preserves the proverbial and literary
    tone and avoids flattening the imagery. It also distinguishes the second image
    from the first rather than using two generic trap terms.
- source_word: ἐν αὐτῇ
  chosen: in it
  alternatives:
  - by it
  - in the snare
  lexicon: BDAG
  rationale: Feminine pronoun refers to παγίδα. 'In it' is concise and preserves the
    parallel structure with the first clause.
- source_word: ἁλώσεται
  chosen: will be caught
  alternatives:
  - will be captured
  - will be taken
  lexicon: BDAG
  rationale: Future passive of ἁλίσκομαι; in trap imagery 'will be caught' is the
    most idiomatic English rendering.
