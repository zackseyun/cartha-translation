id: SIR.27.7
reference: Sirach 27:7
source:
  edition: lxx-swete-1909
  text: πρὸ λογισμοῦ μὴ ἐπαινέσῃς ἄνδρα, οὗτος γὰρ πειρασμὸς ἀνθρώπων.
  language: Greek
  pages:
  - 715
  confidence: high
  validation: agree
translation:
  text: Do not praise a man before he speaks his mind, for this is the test of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before reflection' or 'before a man's reasoning is known.' The Greek
      says literally, 'Before thought/reasoning, do not praise a man.'
    reason: lexical_alternative
  - marker: b
    text: '''Man'' and ''men'' render Greek masculine forms used proverbially for
      human beings in general.'
    reason: cultural_note
lexical_decisions:
- source_word: πρὸ
  chosen: before
  alternatives:
  - prior to
  lexicon: LSJ
  rationale: Temporal preposition introducing what must precede the action of praising.
- source_word: λογισμοῦ
  chosen: he speaks his mind
  alternatives:
  - reflection
  - reasoning
  - thought
  - consideration
  lexicon: LSJ
  rationale: Literally 'thought/reasoning/consideration.' In this proverb the sense
    is not merely internal thought but the expression that reveals a person's judgment
    or character. English 'before he speaks his mind' captures the practical force
    of evaluating a person only after their thinking becomes evident, while remaining
    anchored to the noun's sense of thought/reasoning.
- source_word: μὴ ἐπαινέσῃς
  chosen: Do not praise
  alternatives:
  - do not commend
  lexicon: LSJ
  rationale: Aorist subjunctive with μή functions as a prohibition. 'Praise' is the
    most natural and direct English equivalent.
- source_word: ἄνδρα
  chosen: a man
  alternatives:
  - a person
  lexicon: LSJ
  rationale: The Greek is singular masculine. Per project philosophy, gender-accurate
    rendering is preferred where the source uses masculine representative language.
    Here proverbial 'man' can stand generically for a human being, but the translation
    preserves the source form.
- source_word: οὗτος
  chosen: this
  alternatives:
  - that
  lexicon: LSJ
  rationale: 'Refers to the preceding principle or circumstance: this is what constitutes
    the test.'
- source_word: πειρασμὸς
  chosen: test
  alternatives:
  - trial
  - proof
  lexicon: LSJ
  rationale: In wisdom context the noun denotes testing or proving rather than specifically
    temptation. 'Test' is concise and idiomatic.
- source_word: ἀνθρώπων
  chosen: of men
  alternatives:
  - of people
  - for men
  lexicon: LSJ
  rationale: Genitive plural most naturally read as 'of men/people.' 'Of men' preserves
    the lexical link with ἄνδρα and the source's anthropological wording.
