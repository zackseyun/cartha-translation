id: SIR.27.25
reference: Sirach 27:25
source:
  edition: lxx-swete-1909
  text: ὁ βάλλων λίθον εἰς ὕψος ἐπὶ κεφαλὴν αὐτοῦ βάλλει, καὶ πληγὴ δολία διελεῖ τραύματα.
  language: Greek
  pages:
  - 717
  confidence: high
  validation: minor_mismatch
translation:
  text: Whoever throws a stone upward throws it on his own head, and a treacherous
    blow makes wounds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a deceitful blow splits wounds.' The Greek wording in the second clause
      is terse, and the exact nuance of the verb may be rendered more literally as
      'splits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ βάλλων
  chosen: Whoever throws
  alternatives:
  - The one who throws
  - He who throws
  lexicon: LSJ
  rationale: The articular participle functions generically/proverbially. 'Whoever
    throws' gives natural modern English while preserving the gnomic force.
- source_word: λίθον
  chosen: a stone
  alternatives:
  - stone
  - rock
  lexicon: LSJ
  rationale: The singular indefinite object is straightforward; 'stone' fits proverbial
    imagery better than 'rock'.
- source_word: εἰς ὕψος
  chosen: upward
  alternatives:
  - to a height
  - on high
  lexicon: LSJ
  rationale: The phrase denotes motion to a height. 'Upward' is concise and idiomatic
    in English, preserving the sense that the act rebounds on the thrower.
- source_word: ἐπὶ κεφαλὴν αὐτοῦ βάλλει
  chosen: throws it on his own head
  alternatives:
  - casts it upon his own head
  - throws against his head
  lexicon: LSJ
  rationale: The repeated βάλλει is retained with 'throws' for rhetorical balance.
    'His own head' makes explicit the reflexive sense implied by the proverb's logic.
- source_word: πληγὴ δολία
  chosen: a treacherous blow
  alternatives:
  - a deceitful blow
  - a treacherous strike
  - a hidden blow
  lexicon: LSJ
  rationale: πληγή is a blow/wound/strike; here the parallel with the first colon
    favors the act that causes injury rather than the injury itself. δολία conveys
    treachery or deceit, so 'treacherous blow' best captures the moral quality.
- source_word: διελεῖ
  chosen: opens
  alternatives:
  - divides
  - splits
  - causes
  lexicon: LSJ
  rationale: The verb literally suggests splitting or cleaving. With τραύματα as object,
    'opens wounds' is idiomatic and preserves the vivid physical image better than
    the more wooden 'divides wounds.'
- source_word: τραύματα
  chosen: wounds
  alternatives:
  - injuries
  - sores
  lexicon: LSJ
  rationale: τραύματα denotes wounds/injuries. 'Wounds' is the most direct and vivid
    English equivalent in this proverb.
