translation:
  text: For her understanding was multiplied from the sea, and her counsel from the
    great deep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thought' for 'understanding.' The Greek term can denote thought or the
      faculty/product of thinking; 'understanding' was chosen to fit the wisdom context.
    reason: lexical_alternative
  - marker: b
    text: '''The great deep'' renders language of primeval or cosmic depths; alternatively,
      ''the great abyss.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: διανόημα
  chosen: understanding
  alternatives:
  - thought
  - mind
  - insight
  lexicon: LSJ
  rationale: The noun denotes the product or faculty of thought. 'Understanding' fits
    the wisdom context better than the more bare 'thought' and avoids over-psychologizing
    with 'mind.'
- source_word: ἐπληθύνθη
  chosen: was multiplied
  alternatives:
  - increased
  - became abundant
  lexicon: LSJ
  rationale: A fairly formal rendering preserves the passive verbal image of increase/abundance.
    'Was multiplied' keeps the metaphorical force without paraphrase.
- source_word: βουλή
  chosen: counsel
  alternatives:
  - plan
  - purpose
  - deliberation
  lexicon: LSJ
  rationale: In wisdom literature, 'counsel' naturally conveys wise deliberation or
    guidance. 'Plan' would sound too narrow and purposive here.
- source_word: ἀβύσσου μεγάλης
  chosen: the great deep
  alternatives:
  - a great abyss
  - the great abyss
  lexicon: LSJ
  rationale: The phrase evokes the deep waters rather than an abstract pit. 'The great
    deep' is idiomatic, preserves the cosmic-water imagery, and pairs well with 'sea'
    in the first clause.
- source_word: ἀπὸ γὰρ θαλάσσης
  chosen: from the sea
  alternatives:
  - out of the sea
  - from the ocean
  lexicon: LSJ
  rationale: '''From the sea'' is the most direct rendering of ἀπό + genitive and
    preserves the parallel structure with the following clause.'
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  lexicon: Greek grammar / context
  rationale: The antecedent in context is personified Wisdom, grammatically and literarily
    feminine, so 'her' best reflects the source and the passage's personification.
