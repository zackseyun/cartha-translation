theological_decisions:
- issue: Personification of Wisdom
  chosen_reading: Retain feminine personal language ('her') for Wisdom.
  alternative_readings:
  - Use impersonal 'its' for abstract wisdom
  rationale: The Greek uses feminine forms and the surrounding context personifies
    Wisdom as a speaking female figure. Preserving this literary-theological feature
    is more faithful than flattening it into abstraction.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; gender-accurate over gender-neutral.'
