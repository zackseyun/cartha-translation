translation:
  text: For her understanding is more abundant than the sea, and her counsel more abundant than the great deep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thought' for 'understanding.' The Greek term can denote thought or the faculty/product of thinking; 'understanding' was chosen to fit the wisdom context.
    reason: lexical_alternative
  - marker: b
    text: '''The great deep'' renders language of primeval or cosmic depths; alternatively, ''the great abyss.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'For her understanding was multiplied from the sea, and her counsel from the great deep.'.
    reason: previous_rendering
  - marker: d
    text: Or 'For her understanding is more abundant than the sea, and her counsel deeper than the great deep.'.
    reason: previous_rendering
lexical_decisions:
- source_word: διανόημα
  chosen: understanding
  alternatives:
  - thought
  - mind
  - insight
  lexicon: LSJ
  rationale: The noun denotes the product or faculty of thought. 'Understanding' fits the wisdom context better than the more bare 'thought' and avoids over-psychologizing with 'mind.'
- source_word: ἐπληθύνθη
  chosen: is more abundant
  alternatives:
  - is greater
  - is more full
  lexicon: LSJ
  rationale: The passive verb reflects a comparative idiom here rather than a literal process of multiplication. 'Is more abundant' captures the sense of surpassing the sea.
- source_word: βουλή
  chosen: counsel
  alternatives:
  - plan
  - purpose
  lexicon: LSJ
  rationale: '''Counsel'' remains the best wisdom-term here and now participates in the same comparative abundance as the first clause.'
- source_word: ἀβύσσου μεγάλης
  chosen: the great deep
  alternatives:
  - a great abyss
  - the great abyss
  lexicon: LSJ
  rationale: The phrase evokes the deep waters rather than an abstract pit. 'The great deep' is idiomatic, preserves the cosmic-water imagery, and pairs well with 'sea' in the first clause.
- source_word: ἀπὸ γὰρ θαλάσσης
  chosen: than the sea
  alternatives:
  - than the ocean
  lexicon: LSJ
  rationale: The preposition ἀπό reproduces a Semitic comparative idiom in this verse. It should be rendered comparatively ('than the sea'), not literally as source ('from the sea').
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  lexicon: Greek grammar / context
  rationale: The antecedent in context is personified Wisdom, grammatically and literarily feminine, so 'her' best reflects the source and the passage's personification.
