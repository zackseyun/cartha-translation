theological_decisions:
- issue: Referent and gender of personified Wisdom
  chosen_reading: Retain feminine personal language ('her') for Wisdom.
  alternative_readings:
  - Use impersonal 'it' for abstract wisdom
  rationale: Sirach 24 consistently personifies Wisdom as a female speaker. Preserving
    'her' reflects the source text and literary theology without importing later doctrinal
    claims.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
