translation:
  text: The first has not finished discovering her, and so the last has not traced
    her out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The first has not finished knowing her, and likewise the last has not
      searched her out fully.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ συνετέλεσεν
  chosen: has not finished
  alternatives:
  - did not complete
  - has not fully accomplished
  lexicon: LSJ
  rationale: συντελέω commonly means to bring to completion or finish. In context
    with the infinitive γνῶναι, it conveys not reaching the end of knowing/discovering
    wisdom, rather than simple failure to begin.
- source_word: ὁ πρῶτος
  chosen: the first
  alternatives:
  - the former one
  - the first person
  lexicon: LSJ
  rationale: The phrase is substantival and contrasts with ὁ ἔσχατος. 'The first'
    preserves the open-ended temporal/generational contrast without over-specifying
    the referent.
- source_word: γνῶναι
  chosen: discovering
  alternatives:
  - knowing
  - coming to know
  lexicon: LSJ
  rationale: Although γινώσκω often means 'know,' English 'discovering' better fits
    the progressive sense after 'has not finished' and the context of searching out
    wisdom's depths.
- source_word: αὐτήν
  chosen: her
  alternatives:
  - it
  lexicon: LSJ
  rationale: The antecedent is Wisdom personified in the surrounding context, so the
    feminine pronoun should be preserved as 'her' rather than flattened to 'it'.
- source_word: καὶ οὕτως
  chosen: and so
  alternatives:
  - and likewise
  - thus also
  lexicon: LSJ
  rationale: This links the second clause as a corresponding consequence or parallel.
    'And so' is natural English while preserving the inferential connection.
- source_word: ὁ ἔσχατος
  chosen: the last
  alternatives:
  - the final one
  - the one who comes after
  lexicon: LSJ
  rationale: This balances 'the first' and preserves the temporal/generational contrast.
    It likely refers broadly to later people rather than a single eschatological figure,
    so the simple substantive is best.
- source_word: οὐκ ἐξιχνίασεν
  chosen: has not traced her out
  alternatives:
  - has not searched her out
  - has not fathomed her
  - did not investigate her fully
  lexicon: LSJ
  rationale: ἐξιχνιάζω literally evokes tracking out by traces and idiomatically means
    to search out or fathom. 'Traced her out' preserves the metaphor and the sense
    of exhaustive investigation.
