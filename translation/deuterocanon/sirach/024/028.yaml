lexical_decisions:
- source_word: οὐ συνετέλεσεν
  chosen: did not finish
  alternatives:
  - did not complete
  lexicon: LSJ
  rationale: A simple past better suits 'the first' than the English present perfect here.
- source_word: ὁ πρῶτος
  chosen: the first
  alternatives:
  - the former one
  - the first person
  lexicon: LSJ
  rationale: The phrase is substantival and contrasts with ὁ ἔσχατος. 'The first' preserves the open-ended temporal/generational contrast without over-specifying the referent.
- source_word: γνῶναι
  chosen: knowing
  alternatives:
  - to know
  - discovering
  lexicon: LSJ
  rationale: '''Knowing'' better matches the wisdom context than the more exploratory ''discovering''.'
- source_word: αὐτήν
  chosen: her
  alternatives:
  - it
  lexicon: LSJ
  rationale: The antecedent is Wisdom personified in the surrounding context, so the feminine pronoun should be preserved as 'her' rather than flattened to 'it'.
- source_word: καὶ οὕτως
  chosen: likewise
  alternatives:
  - in the same way
  lexicon: LSJ
  rationale: The phrase marks a parallel, not a consequence. 'Likewise' best captures that relation.
- source_word: ὁ ἔσχατος
  chosen: the last
  alternatives:
  - the final one
  - the one who comes after
  lexicon: LSJ
  rationale: This balances 'the first' and preserves the temporal/generational contrast. It likely refers broadly to later people rather than a single eschatological figure, so the simple substantive is best.
- source_word: οὐκ ἐξιχνίασεν
  chosen: did not trace her out
  alternatives:
  - did not search her out
  lexicon: LSJ
  rationale: A simple past preserves the parallel with the first clause and keeps the investigative nuance of the verb.
