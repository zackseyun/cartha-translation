  from: In the holy tent, before him, I ministered, and so I was established in Zion.
  to: In the holy tent I ministered before him, and so I was established in Zion.
  rationale: The existing Cartha draft is highly accurate in its lexical choices ('holy tent', 'ministered', 'established'). However, the punctuation ('In the holy tent, before him, I ministered') creates a disjointed rhythm. Removing the commas ('In the holy tent I ministered before him') produces a more natural English syntax that perfectly reflects the Greek word order and phrasing (ἐν σκηνῇ ἁγίᾳ ἐνώπιον αὐτοῦ ἐλειτούργησα).
