lexical_decisions:
- source_word: σκηνῇ ἁγίᾳ
  chosen: the holy tent
  alternatives:
  - the holy tabernacle
  - the holy sanctuary
  lexicon: LSJ
  rationale: σκηνή literally denotes a tent/tabernacle. 'Tent' preserves the concrete cultic image of the Greek while remaining readable; 'tabernacle' is possible but more traditional and less accessible. The adjective ἁγίᾳ is rendered straightforwardly as 'holy'.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  lexicon: LSJ
  rationale: The phrase literally means 'before him.' This keeps the spatial-relational sense and leaves the referent as given by context, without over-interpreting. 'In his presence' is idiomatic but slightly more interpretive.
- source_word: ἐλειτούργησα
  chosen: I ministered
  alternatives:
  - I performed service
  - I served liturgically
  lexicon: BDAG
  rationale: λειτουργέω in cultic contexts refers to priestly/public sacred service. 'I ministered' captures the religious-service sense in natural English without importing later technical liturgical language too heavily.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: LSJ
  rationale: οὕτως links the prior service with the resulting establishment. 'So' is concise, natural, and preserves the inferential/resultative connection.
- source_word: ἐστηρίχθην
  chosen: I was established
  alternatives:
  - I was set firmly
  - I was made secure
  lexicon: BDAG
  rationale: στηρίζω in the passive conveys being fixed, established, or made firm. 'I was established' best fits the personified Wisdom context and preserves the formal dignity of the line.
- source_word: Σειὼν
  chosen: Zion
  alternatives:
  - Sion
  lexicon: LSJ
  rationale: Standard English transliteration is 'Zion.' This is the conventional and recognizable rendering of Σειών/Σειὼν.
