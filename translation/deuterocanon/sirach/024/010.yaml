theological_decisions:
- issue: Cultic nuance of Wisdom's service in the sanctuary
  chosen_reading: Render ἐλειτούργησα as 'I ministered' to preserve sacred-service language without narrowing it to a specific priestly office.
  alternative_readings:
  - I served
  - I performed priestly service
  rationale: The speaker is personified Wisdom in a temple/tabernacle setting. The Greek verb carries cultic force, but the text does not explicitly assign a formal priestly title. 'I ministered' preserves the theological resonance while avoiding overstatement.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readable modern English, not archaic or academic.'
