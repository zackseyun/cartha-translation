theological_decisions:
- issue: Personified Wisdom's invitation imagery
  chosen_reading: 'Retain first-person feminine personification without allegorical
    expansion: ''Come to me... be filled with my fruits.'''
  alternative_readings:
  - Interpret 'fruits' explicitly as teachings or benefits of wisdom in the main text
  rationale: The verse speaks in the voice of personified Wisdom. The translation
    preserves the metaphor rather than resolving it into doctrinal or explanatory
    language not present in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
