translation:
  text: Come to me, you who desire me, and be filled with my fruits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you who long for me.' The Greek participle expresses strong desire.
    reason: lexical_alternative
  - marker: b
    text: Or 'my produce' or 'my yield.' The Greek refers to what is produced; 'fruits'
      is chosen to preserve the surrounding poetic imagery of Wisdom as a fruitful
      plant.
    reason: lexical_alternative
lexical_decisions:
- source_word: προέλθετέ
  chosen: Come
  alternatives:
  - Come forward
  - Draw near
  - Come forth
  lexicon: LSJ
  rationale: Aorist imperative plural of προσέρχομαι/πρόειμι in context functions
    as an invitation to approach Wisdom. 'Come' is natural modern English and preserves
    the summons without over-specifying movement.
- source_word: πρὸς μέ
  chosen: to me
  alternatives:
  - toward me
  - near me
  lexicon: LSJ
  rationale: Standard directional phrase; 'to me' is the most idiomatic English complement
    to the imperative.
- source_word: οἱ ἐπιθυμοῦντές μου
  chosen: you who desire me
  alternatives:
  - you who long for me
  - you who yearn for me
  lexicon: LSJ
  rationale: The participle denotes strong desire. 'Desire' is the most direct lexical
    equivalent and fits Wisdom's self-invitation. 'Long for' is possible but slightly
    more interpretive.
- source_word: γενημάτων
  chosen: fruits
  alternatives:
  - produce
  - yield
  - offspring
  lexicon: LSJ
  rationale: γένημα commonly denotes what is produced, especially fruit or produce.
    In this poetic context, where Wisdom has just compared herself to fragrant and
    fruitful plants, 'fruits' best preserves the imagery and avoids the more commercial
    tone of 'produce'.
- source_word: ἐμπλήσθητε
  chosen: be filled
  alternatives:
  - be satisfied
  - fill yourselves
  lexicon: LSJ
  rationale: Aorist passive imperative plural. 'Be filled' closely matches the Greek
    form and leaves the metaphor open-ended; 'be satisfied' is a plausible sense but
    narrows the image.
