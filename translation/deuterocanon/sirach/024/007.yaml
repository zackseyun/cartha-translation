theological_decisions:
- issue: Personified Wisdom's search for a place of settlement
  chosen_reading: Render the verse straightforwardly as Wisdom seeking a resting place
    and asking in whose inheritance she will lodge, without importing later doctrinal
    identifications.
  alternative_readings:
  - Interpret the inheritance more explicitly as Israel in the main text
  - Read the line in a more abstract sense of finding acceptance among peoples
  rationale: The Greek itself presents personified Wisdom speaking and uses inheritance
    language that will be specified by the following context. The translation should
    preserve that literary-theological tension without prematurely resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
