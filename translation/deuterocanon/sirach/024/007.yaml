translation:
  text: Among all these I sought a resting place, and in whose inheritance shall I
    lodge?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rest'; the Greek noun can denote rest or repose, but here likely carries
      the sense of a place of rest in parallel with 'shall I lodge.'
    reason: lexical_alternative
  - marker: b
    text: Or 'shall I encamp.' The Greek verb can refer to taking up lodging or camping
      for the night.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ τούτων πάντων
  chosen: Among all these
  alternatives:
  - After all these
  - With all these
  lexicon: LSJ
  rationale: μετά with the genitive can mean 'among' or 'with' in a relational/distributive
    sense. In context Wisdom is surveying possible places of settlement among peoples
    or domains, so 'Among all these' best captures the sense of searching within the
    set rather than merely temporally 'after' them.
- source_word: ἀνάπαυσιν
  chosen: a resting place
  alternatives:
  - rest
  - repose
  lexicon: LSJ
  rationale: The noun denotes rest, but in this context of seeking where to dwell,
    English idiom is clearer with the concrete expression 'a resting place,' which
    preserves the locative nuance implied by the following question about lodging.
- source_word: ἐζήτησα
  chosen: I sought
  alternatives:
  - I searched for
  - I looked for
  lexicon: LSJ
  rationale: A straightforward past-tense rendering of ζητέω. 'Sought' is concise
    and suitably elevated without becoming archaic.
- source_word: κληρονομίᾳ
  chosen: inheritance
  alternatives:
  - heritage
  - possession
  lexicon: LSJ
  rationale: κληρονομία commonly denotes an inheritance or allotted possession. 'Inheritance'
    preserves the covenantal/allotment resonance important in biblical diction, especially
    as Wisdom asks in whose allotted domain she will dwell.
- source_word: τίνος
  chosen: whose
  alternatives:
  - of whom
  - in what person's
  lexicon: LSJ
  rationale: The genitive interrogative naturally asks for the possessor of the inheritance.
    'Whose' is the most idiomatic English equivalent.
- source_word: αὐλισθήσομαι
  chosen: shall I lodge
  alternatives:
  - shall I encamp
  - shall I dwell
  - shall I take up lodging
  lexicon: LSJ
  rationale: The future passive/middle of αὐλίζομαι refers to spending the night,
    lodging, or encamping. 'Shall I lodge' is natural English and fits the parallel
    with seeking a resting place. 'Encamp' is more literal etymologically but sounds
    too military here; 'dwell' is broader and less concrete.
