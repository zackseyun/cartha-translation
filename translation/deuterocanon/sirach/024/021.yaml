theological_decisions:
- issue: Interpretation of the paradox that those who partake of Wisdom still hunger
    and thirst
  chosen_reading: Retain the literal metaphor of continued hunger and thirst after
    eating and drinking Wisdom, without softening it into 'desire more' in the main
    text.
  alternative_readings:
  - Those who eat me will hunger for more, and those who drink me will thirst for
    more.
  rationale: The Greek states the paradox directly. While the sense may imply an intensified
    desire for Wisdom rather than lack of satisfaction, the text itself uses hunger/thirst
    language and should be preserved. Interpreting it as 'for more' goes beyond the
    explicit wording, though that nuance is worth preserving in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
