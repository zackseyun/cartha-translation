translation:
  text: Those who eat me will still hunger, and those who drink me will still thirst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will hunger for more ... will thirst for more.' The Greek says literally
      'will still hunger' and 'will still thirst,' expressing an ongoing desire for
      Wisdom after partaking of her.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἐσθίοντές
  chosen: those who eat
  alternatives:
  - the ones eating
  - those who consume
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to people characterized by eating. 'Those who eat' is natural English and preserves
    the ongoing/general sense without awkwardness.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: The first-person object should be retained directly. In context Wisdom
    is speaking personified, so 'me' preserves the metaphor rather than interpreting
    it away.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  - again
  lexicon: BDAG
  rationale: ἔτι here marks continued desire even after partaking. 'Still' communicates
    that sense clearly in modern English better than the slightly archaic 'yet.'
- source_word: πεινάσουσιν
  chosen: will hunger
  alternatives:
  - will be hungry
  - will hunger still
  lexicon: BDAG
  rationale: Future active verb. 'Will hunger' is concise and preserves the verbal
    force; 'will be hungry' is possible but slightly less direct.
- source_word: οἱ πίνοντές
  chosen: those who drink
  alternatives:
  - the ones drinking
  lexicon: BDAG
  rationale: Parallel to οἱ ἐσθίοντές; the substantival participle is best mirrored
    consistently in English.
- source_word: διψήσουσιν
  chosen: will still thirst
  alternatives:
  - will thirst
  - will be thirsty
  lexicon: BDAG
  rationale: 'The future verb means ''will thirst.'' Because ἔτι also modifies this
    clause, English idiom is best served by placing ''still'' with the verb here:
    ''will still thirst.'' This preserves the parallelism and the paradoxical imagery
    of unending desire for Wisdom.'
