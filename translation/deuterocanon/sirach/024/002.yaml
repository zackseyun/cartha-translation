  from: In the assembly of the Most High she will open her mouth, and before his power she will boast.
  to: In the assembly of the Most High she will open her mouth, and before his host she will boast.
  rationale: The Greek δύναμις frequently translates the Hebrew צָבָא (host) in the LXX. Given the parallel with 'assembly' (ἐκκλησίᾳ) in the first half of the verse, the context strongly points to the heavenly court. Translating δυνάμεως as 'host' preserves this spatial and collective imagery, whereas 'power' obscures the parallel. The future tenses (ἀνοίξει, καυχήσεται) are correctly rendered as 'will open' and 'will boast'.
