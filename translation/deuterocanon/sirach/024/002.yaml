theological_decisions:
- issue: Referent of the feminine pronouns
  chosen_reading: Render the subject as 'she' without supplying 'Wisdom' in the main text.
  alternative_readings:
  - Explicitly identify the speaker as 'Wisdom' in the verse
  rationale: The immediate literary context identifies the speaker as personified Wisdom, and the feminine pronouns reflect the Greek grammar. However, the verse itself does not repeat the noun, so the translation preserves the pronoun rather than importing an explicit subject into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import claims the text does not make.
