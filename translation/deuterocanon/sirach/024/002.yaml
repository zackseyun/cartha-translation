translation:
  text: In the assembly of the Most High she will open her mouth, and before his power
    she will boast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, personified Wisdom, as established by the surrounding context.
    reason: cross_reference
  - marker: b
    text: Or 'before his might.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλησίᾳ
  chosen: assembly
  alternatives:
  - congregation
  - church
  lexicon: LSJ
  rationale: In Sirach, ἐκκλησία denotes the gathered community. 'Assembly' is the
    most neutral and contextually fitting English term; 'church' would be anachronistic
    here, and 'congregation' is possible but slightly more tradition-laden.
- source_word: Ὑψίστου
  chosen: the Most High
  alternatives:
  - the Highest
  lexicon: LSJ
  rationale: A standard rendering for the divine title Ὕψιστος in Jewish-Greek literature.
    It preserves the title's reverential force and reads naturally in English.
- source_word: στόμα αὐτῆς ἀνοίξει
  chosen: she will open her mouth
  alternatives:
  - her mouth will open
  lexicon: LSJ
  rationale: The Greek is a straightforward idiom for speaking. Retaining 'open her
    mouth' preserves the vividness and personification of Wisdom without unnecessary
    paraphrase.
- source_word: ἔναντι
  chosen: before
  alternatives:
  - in the presence of
  - in front of
  lexicon: LSJ
  rationale: '''Before'' is concise and accurately conveys the relational sense of
    being in someone''s presence.'
- source_word: δυνάμεως αὐτοῦ
  chosen: his power
  alternatives:
  - his might
  - his host
  lexicon: LSJ
  rationale: δύναμις commonly means 'power' or 'might.' 'Power' is the broadest and
    most natural rendering here. While in some contexts it can refer to a heavenly
    host or force, nothing in this verse requires that narrower sense.
- source_word: καυχήσεται
  chosen: will boast
  alternatives:
  - will glory
  - will exult
  lexicon: LSJ
  rationale: The verb means to boast or glory. 'Will boast' is the plain lexical sense
    and fits the personified speech of Wisdom. 'Will glory' is possible but more archaic
    in modern English.
