theological_decisions:
- issue: Whether Wisdom's origin language should be softened to avoid implying creatureliness
  chosen_reading: Retain 'he created me' in the main text
  alternative_readings:
  - he established me
  - he formed me
  rationale: The Greek verb is κτίζω, whose plain sense is 'create' or 'found.' The
    translation should not mute the source text's wording for later theological sensitivities.
    Since Sirach presents personified Wisdom, the wording is preserved as written
    without importing later doctrinal resolution.
