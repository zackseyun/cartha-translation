translation:
  text: Before the age, from the beginning, he created me, and until the age I will
    never fail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Before eternity' for 'Before the age'; Greek αἰών can denote an age
      or an unbounded duration depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will never cease' / 'I will never come to an end.' The Greek expression
      is emphatically negative.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ τοῦ αἰῶνος
  chosen: Before the age
  alternatives:
  - Before eternity
  - Before the world
  - Before the ages
  lexicon: LSJ
  rationale: αἰών can denote an age, long duration, or eternity depending on context.
    Here, with πρὸ and followed by ἀπʼ ἀρχῆς, the phrase points to primordial pretemporal
    origin. 'Before the age' keeps the Greek's wording and avoids over-specifying
    metaphysical 'eternity' beyond the text.
- source_word: ἀπʼ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from the first
  - at the beginning
  lexicon: LSJ
  rationale: A standard rendering that preserves the temporal starting-point language
    and echoes familiar biblical diction without becoming archaic.
- source_word: ἔκτισέν
  chosen: created
  alternatives:
  - founded
  - formed
  - brought into being
  lexicon: LSJ
  rationale: κτίζω ordinarily means create or found. In this wisdom context, 'created'
    is the most direct and transparent rendering and preserves the theological force
    of Wisdom as a created reality in the text's wording.
- source_word: με
  chosen: me
  rationale: The first-person object refers to personified Wisdom speaking throughout
    the passage; English preserves the personification straightforwardly.
- source_word: ἕως αἰῶνος
  chosen: until the age
  alternatives:
  - forever
  - until eternity
  - for the age
  lexicon: LSJ
  rationale: The phrase literally refers to enduring unto the age. 'Until the age'
    keeps the lexical link with the earlier αἰών and avoids prematurely collapsing
    the expression into the idiomatic 'forever,' though the sense is one of unending
    continuance.
- source_word: οὐ μὴ ἐκλίπω
  chosen: I will never fail
  alternatives:
  - I will never cease
  - I will never come to an end
  - I will not fail
  lexicon: LSJ
  rationale: οὐ μή with the aorist subjunctive is emphatically negative. ἐκλείπω can
    mean fail, cease, or come to an end. 'I will never fail' is concise, natural English
    and can cover both persistence and non-disappearance in context.
