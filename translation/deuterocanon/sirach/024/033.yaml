theological_decisions:
- issue: Force of the comparison in ὡς προφητείαν
  chosen_reading: 'comparative: the instruction is poured out like prophecy'
  alternative_readings:
  - 'identificational: the instruction is poured out as prophecy'
  rationale: The Greek ὡς can mean 'as' or 'like,' but here the comparative sense
    better preserves the text's rhetorical modesty and avoids making an unnecessary
    stronger claim about the exact status of the teaching.
  doctrine_reference: Preserve theological tension rather than resolve it.
