translation:
  text: I alone encircled the vault of heaven, and walked in the depth of the abysses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the circle of heaven.' The Greek term can denote a circular expanse or arching vault.
