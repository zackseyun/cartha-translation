lexical_decisions:
- source_word: γῦρον
  chosen: vault
  alternatives:
  - circle
  - vault
  - dome
  - circuit
  lexicon: LSJ
  rationale: γῦρος denotes a round or curved structure/circuit. In context with 'of heaven,' it refers to the arching expanse of the sky. 'Vault' communicates the cosmological image in natural English better than the more literal but less idiomatic 'circle' or 'circuit.'
- source_word: ἐκύκλωσα
  chosen: encircled
  alternatives:
  - went around
  - surrounded
  - traversed
  lexicon: LSJ
  rationale: From κυκλόω, the verb means to move around or encircle. 'Encircled' preserves the circular imagery and matches the object γῦρον well.
- source_word: μόνη
  chosen: I alone
  alternatives:
  - alone
  - by myself
  lexicon: LSJ
  rationale: As a feminine singular adjective agreeing with the speaking personified Wisdom, it emphasizes exclusivity. 'I alone' brings the emphasis forward in idiomatic English.
- source_word: βάθει
  chosen: depths
  alternatives:
  - depth
  - deep places
  lexicon: LSJ
  rationale: Though singular in form, the phrase ἐν βάθει ἀβύσσων is best rendered idiomatically as 'in the depths of the abysses/deep waters,' conveying the realm beneath rather than a single abstract depth.
- source_word: ἀβύσσων
  chosen: abysses
  alternatives:
  - deeps
  - deep places
  - abyss
  lexicon: LSJ
  rationale: The plural genitive suggests multiple unfathomable depths. 'Abysses' preserves the elevated, cosmic register of the Greek better than the flatter 'deeps,' while remaining understandable.
- source_word: περιεπάτησα
  chosen: walked
  alternatives:
  - went about
  - roamed
  - traversed
  lexicon: LSJ
  rationale: The verb literally means 'walked around/about.' 'Walked' keeps the concrete imagery; the surrounding cosmic objects already imply extraordinary scope, so a more interpretive gloss like 'traversed' is unnecessary.
