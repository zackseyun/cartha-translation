  from: Then the Creator of all commanded me, and the one who created me pitched my tent, and he said, “Dwell in Jacob, and receive your inheritance in Israel.”
  to: Then the Creator of all commanded me, and the one who created me pitched my tent and said, “Make your dwelling in Jacob, and receive your inheritance in Israel.”
  rationale: The Cartha draft is highly accurate and correctly handles the passive imperative κατακληρονομήθητι ('receive your inheritance'), which the blind draft mistranslates. However, Cartha's 'Dwell' for κατασκήνωσον slightly weakens the tabernacle imagery established by 'pitched my tent' (κατέπηξεν τὴν σκηνήν μου). Upgrading 'Dwell' to 'Make your dwelling' (or 'Encamp') restores the lexical connection to the tent motif while maintaining natural English flow.
