theological_decisions:
- issue: Personified Wisdom's relation to God in creation and dwelling imagery
  chosen_reading: 'Retain the personal feminine first-person voice without softening the creator-creature distinction: Wisdom is created by God and commanded to dwell in Israel.'
  alternative_readings:
  - Render more abstractly so Wisdom sounds less personal
  - Use more cultic language such as 'tabernacle' to heighten theological resonance
  rationale: The Greek presents Wisdom as a personified speaker who is nevertheless created by 'the Creator of all.' The translation preserves both the vivid personification and the explicit creator-creature distinction without importing later doctrinal categories. The dwelling image is kept concrete through 'pitched my tent' rather than being flattened or over-theologized.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.
