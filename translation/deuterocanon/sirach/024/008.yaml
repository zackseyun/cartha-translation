translation:
  text: Then the Creator of all commanded me, and the one who created me pitched my tent and said, “Make your dwelling in Jacob, and receive your inheritance in Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “set up my dwelling” / “established my tabernacle.” The Greek literally speaks of pitching or fixing a tent.
    reason: lexical_alternative
  - marker: b
    text: Or “inherit in Israel” or “be allotted in Israel.” The Greek verb carries inheritance/allotment imagery.
    reason: lexical_alternative
  - marker: c
    text: Or 'Then the Creator of all commanded me, and the one who created me pitched my tent, and he said, “Dwell in Jacob, and receive your inheritance in Israel.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐνετείλατό
  chosen: commanded
  alternatives:
  - gave orders to
  - appointed
  lexicon: BDAG
  rationale: The verb ἐντέλλομαι commonly means to command or give an order. 'Commanded' preserves the force of divine instruction without unnecessary expansion.
- source_word: ὁ κτίστης ἁπάντων
  chosen: the Creator of all
  alternatives:
  - the maker of all things
  - the founder of all
  lexicon: LSJ
  rationale: κτίστης denotes creator/maker; ἁπάντων broadens it to all things/all. 'The Creator of all' is concise, natural English and preserves the universal scope.
- source_word: ὁ κτίσας με
  chosen: the one who created me
  alternatives:
  - he who created me
  - my creator
  lexicon: LSJ
  rationale: The participial phrase is rendered explicitly to preserve the parallelism with the previous clause and the personal relation of Wisdom to her creator.
- source_word: κατέπηξεν τὴν σκηνήν μου
  chosen: pitched my tent
  alternatives:
  - fixed my tent
  - set up my dwelling
  - established my tabernacle
  lexicon: LSJ
  rationale: καταπήγνυμι literally means to fix or pitch, especially of a tent. σκηνή is 'tent' or 'tabernacle.' 'Pitched my tent' keeps the concrete imagery and avoids overly ecclesiastical diction, while still allowing readers to hear the dwelling motif.
- source_word: Ἐν Ἰακὼβ κατασκήνωσον
  chosen: Dwell in Jacob
  alternatives:
  - Make your dwelling in Jacob
  - Encamp in Jacob
  lexicon: LSJ
  rationale: κατασκηνόω means to settle, dwell, or encamp. 'Dwell' is smoother in English while retaining the habitation imagery. 'Jacob' here stands metonymically for the covenant people/land, and the direct transliteration preserves the biblical idiom.
- source_word: κατακληρονομήθητι
  chosen: receive your inheritance
  alternatives:
  - take possession of your inheritance
  - be allotted as an inheritance
  - inherit
  lexicon: LSJ
  rationale: The verb is related to inheritance/allotment language. In context, Wisdom is being assigned a place among Israel. 'Receive your inheritance' preserves the passive/allotment nuance better than a simple active 'inherit,' while remaining readable.
- source_word: ἐν Ἰσραήλ
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: LSJ
  rationale: The preposition ἐν is straightforwardly rendered 'in.' Because the verse pairs Jacob and Israel in parallel, keeping 'in Israel' preserves the poetic structure.
