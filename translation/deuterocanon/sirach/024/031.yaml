theological_decisions:
- issue: Metaphorical expansion of wisdom's teaching from small irrigation to overwhelming
    abundance
  chosen_reading: Preserve the agricultural-water metaphor straightforwardly without
    allegorical expansion in the main text.
  alternative_readings:
  - Interpret the imagery explicitly as wisdom spreading to the nations
  - Interpret the speaker's work as scriptural instruction overflowing
  rationale: The verse itself presents the metaphor but does not explicitly decode
    it. To avoid importing doctrinal interpretation, the translation keeps the concrete
    imagery and leaves broader significance to context.
  doctrine_reference: Translation philosophy §§1, 3, 6
