translation:
  text: I said, ‘I will water my garden, and I will drench my flowerbed.’ And behold,
    my channel became a river, and my river became a sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'garden bed' for 'flowerbed'; the Greek refers to a cultivated plot or
      bed of greenery.
    reason: lexical_alternative
  - marker: b
    text: The image intensifies from a small irrigation channel to a river and then
      to a sea, expressing extraordinary increase.
    reason: cultural_note
lexical_decisions:
- source_word: Ποτιῶ
  chosen: I will water
  alternatives:
  - I will irrigate
  - I will give drink to
  lexicon: LSJ
  rationale: Future of ποτίζω/ποτίω in context of a garden image; 'water' is natural
    modern English and preserves the agricultural metaphor without overtechnical wording.
- source_word: κῆπον
  chosen: garden
  alternatives:
  - orchard
  lexicon: LSJ
  rationale: κῆπος commonly means 'garden'; 'orchard' is possible in some contexts,
    but here the paired imagery with πρασιά favors a cultivated garden plot generally.
- source_word: μεθύσω
  chosen: I will drench
  alternatives:
  - I will soak
  - I will satisfy with drink
  lexicon: LSJ
  rationale: From μεθύω/μεθύσκω language of filling or making drunk; in this irrigation
    context it is metaphorical for saturating with water. 'Drench' captures the vivid
    excess better than the flatter 'water' and avoids misleading intoxication language
    in English.
- source_word: πρασιάν
  chosen: flowerbed
  alternatives:
  - garden bed
  - plot
  - green bed
  lexicon: LSJ
  rationale: πρασιά denotes a garden bed or plot, often associated with greenery.
    'Flowerbed' is idiomatic and fits the cultivated-garden imagery, though 'garden
    bed' is a viable alternative.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: LSJ
  rationale: Retained for rhetorical vividness; Sirach often uses elevated diction,
    and 'behold' remains readable while signaling sudden development.
- source_word: διῶρυξ
  chosen: channel
  alternatives:
  - ditch
  - canal
  - watercourse
  lexicon: LSJ
  rationale: The word denotes an artificial or cut watercourse. 'Channel' is broad
    enough to fit the image and avoids the overly humble 'ditch' or overly technical
    'canal'.
- source_word: ποταμόν
  chosen: river
  alternatives:
  - stream
  lexicon: LSJ
  rationale: Standard sense is 'river'; the image is of dramatic increase from a small
    irrigation channel to a major flow.
- source_word: θάλασσαν
  chosen: sea
  alternatives:
  - the sea
  lexicon: LSJ
  rationale: Standard rendering. The anarthrous English 'a sea' best reflects the
    Greek without forcing a specific geographic referent.
