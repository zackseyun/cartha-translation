theological_decisions:
- issue: Implicit subject of κατέπαυσεν
  chosen_reading: Rendered simply as 'he' without specifying God in the main text.
  alternative_readings:
  - the Lord gave me rest
  - God settled me
  rationale: The Greek verb has an implicit masculine singular subject carried from
    the surrounding context, likely God, but the verse itself does not name the subject
    explicitly. To avoid importing more than the text states in this line, the translation
    preserves the pronoun.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
