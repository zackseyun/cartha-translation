translation:
  text: In the beloved city likewise he gave me rest, and in Jerusalem was my authority.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The subject of 'he gave me rest' is implicit in Greek; the surrounding context
      points to God, but the verse itself does not name him explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: πόλει ἠγαπημένῃ
  chosen: the beloved city
  alternatives:
  - the city he loved
  - the cherished city
  lexicon: LSJ
  rationale: ἠγαπημένῃ is a perfect/passive participial adjective meaning 'beloved'
    or 'loved.' The article is absent, but English idiom naturally supplies 'the'
    for a specific city identified in the next clause as Jerusalem. 'Beloved' preserves
    the elevated tone better than 'cherished.'
- source_word: ὁμοίως
  chosen: likewise
  alternatives:
  - also
  - in like manner
  lexicon: LSJ
  rationale: ὁμοίως marks continuation with what precedes. 'Likewise' preserves the
    connective force with a slightly formal register suitable to wisdom literature.
- source_word: κατέπαυσεν
  chosen: he gave me rest
  alternatives:
  - he caused me to rest
  - he settled me
  - he made me dwell
  lexicon: LSJ
  rationale: From καταπαύω, 'cause to cease/rest, settle.' The object με indicates
    Wisdom is being caused to rest or settle in a place. 'He gave me rest' captures
    both repose and placement without over-paraphrasing; 'settled me' is possible
    but less natural in English.
- source_word: ἐξουσία
  chosen: authority
  alternatives:
  - power
  - domain
  - rule
  lexicon: LSJ
  rationale: ἐξουσία denotes authority, right, or jurisdiction. 'Authority' best preserves
    the abstract noun and avoids overstating territorial rule, while still fitting
    Wisdom's personified status in Jerusalem.
