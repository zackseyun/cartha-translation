translation:
  text: He who pours out wisdom like Pishon, and like the Tigris in the days of firstfruits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'in the days of new growth' or, more literally, 'in the days
      of new things'; the Greek phrase is difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πιπλῶν
  chosen: He who pours out
  alternatives:
  - The one who fills
  - He who makes full
  lexicon: LSJ
  rationale: The participle from πίμπλημι/related form here is used with a river comparison
    and an accusative object, σοφίαν. In context of abundant flowing waters, 'pours
    out' captures the image more naturally in English than the more wooden 'fills,'
    while preserving the idea of abundance rather than changing the subject.
- source_word: ὡς Φισὼν
  chosen: like Pishon
  alternatives:
  - like Phison
  lexicon: LSJ
  rationale: Φισών is the river name known from Genesis; standard English transliteration
    is 'Pishon.' Names are transliterated rather than translated.
- source_word: σοφίαν
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering of σοφία; in Sirach 24 Wisdom is personified and central
    to the chapter, so consistency strongly favors 'wisdom.'
- source_word: ὡς Τίγρις
  chosen: like the Tigris
  lexicon: LSJ
  rationale: Proper river name; standard English transliteration is 'Tigris.'
- source_word: ἐν ἡμέραις νέων
  chosen: in the days of firstfruits
  alternatives:
  - in the days of new things
  - in the days of spring growth
  - in the days of youth
  lexicon: LSJ
  rationale: The Greek νέων is unusual here and likely reflects the season of fresh
    produce/new growth rather than human youth. Given the river-flooding agricultural
    context and common Sirach translations' sense, 'firstfruits' best conveys the
    seasonal-harvest reference in idiomatic English while staying close to the likely
    sense. Because the Greek form could be read more literally as 'new things' or
    even 'youth,' the alternative is preserved in a footnote.
