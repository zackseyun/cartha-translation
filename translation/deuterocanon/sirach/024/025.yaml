theological_decisions:
- issue: Personified Wisdom imagery
  chosen_reading: Retain 'wisdom' without capitalizing it
  alternative_readings:
  - Wisdom
  rationale: The Greek has σοφίαν without orthographic distinction. Since capitalization
    is an English interpretive aid rather than a source feature, the translation preserves
    the personified concept without forcing a theological reading through capitalization.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
