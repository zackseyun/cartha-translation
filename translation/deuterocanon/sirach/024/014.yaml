translation:
  text: Like a palm tree I was raised up in the seashores, and like rose plants in
    Jericho; like a splendid olive tree in the plain, and I was raised up like a plane
    tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads 'in the seashores.' Some interpreters suspect a different underlying
      setting because the image of a palm is more commonly associated with oasis or
      riverbank environments, but the extant Greek witness here supports 'seashores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοῖνιξ
  chosen: palm tree
  alternatives:
  - date palm
  - palm
  lexicon: LSJ
  rationale: φοῖνιξ in this botanical comparison most naturally refers to a palm tree;
    'palm tree' is clear modern English and preserves the image.
- source_word: ἀνυψώθην
  chosen: was raised up
  alternatives:
  - was exalted
  - grew tall
  - was lifted up
  lexicon: LSJ
  rationale: The verb literally denotes being lifted high. In this sequence of plant
    similes, 'was raised up' preserves the vertical imagery without importing a stronger
    theological sense such as 'was exalted.' Repetition is retained for consistency
    across both occurrences.
- source_word: αἰγιαλοῖς
  chosen: seashores
  alternatives:
  - shorelands
  - coastlands
  - riverbanks
  lexicon: LSJ
  rationale: αἰγιαλός ordinarily means seashore or shore. Although palms are often
    associated with oases, the Greek witness here reads a shoreline term, so the translation
    stays anchored to the source rather than harmonizing to expected botany.
- source_word: φυτὰ ῥόδου
  chosen: rose plants
  alternatives:
  - rosebushes
  - plantings of roses
  lexicon: LSJ
  rationale: φυτά are plants or things planted; 'rose plants' is a transparent rendering
    that keeps the plural botanical image without over-specifying shrub form.
- source_word: Ἰερειχώ
  chosen: Jericho
  rationale: Standard English transliteration of the place name.
- source_word: ἐλαία εὐπρεπής
  chosen: splendid olive tree
  alternatives:
  - beautiful olive tree
  - graceful olive tree
  lexicon: LSJ
  rationale: εὐπρεπής conveys beauty, nobility, or stateliness. 'Splendid' captures
    the dignified attractiveness of the image in readable English.
- source_word: πεδίῳ
  chosen: the plain
  alternatives:
  - a plain
  - open country
  - field
  lexicon: LSJ
  rationale: πεδίον denotes a plain or level open land. 'The plain' works idiomatically
    here as a landscape setting for the simile.
- source_word: πλάτανος
  chosen: plane tree
  alternatives:
  - platanus tree
  - sycamore
  lexicon: LSJ
  rationale: πλάτανος is the plane tree. 'Sycamore' would be misleading here, since
    that is a different tree in biblical English usage.
