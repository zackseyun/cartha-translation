  from: Like a palm tree I was raised up in the seashores, and like rose plants in Jericho; like a splendid olive tree in the plain, and I was raised up like a plane tree.
  to: Like a palm tree I was raised high on the shores, and like rose plants in Jericho; like a splendid olive tree in the plain, and I was raised high like a plane tree.
  rationale: The preposition 'in' with 'seashores' is awkward English; 'on the shores' is the natural idiom for ἐν αἰγιαλοῖς. Additionally, 'raised high' better captures the force of ἀνυψώθην (to raise high, exalt) than 'raised up,' fitting both the physical height of the trees and the metaphorical exaltation of Wisdom. The provided Greek text reads ἐν αἰγιαλοῖς ('on the shores'), which we translate directly, rather than emending to 'En-gedi' as some modern translations do based on Hebrew retroversion.
