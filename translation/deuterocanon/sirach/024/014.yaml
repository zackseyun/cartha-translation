translation:
  text: Like a palm tree I was raised high on the shores, and like rose plants in Jericho; like a splendid olive tree in the plain, and I was raised high like a plane tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads 'in the seashores.' Some interpreters suspect a different underlying setting because the image of a palm is more commonly associated with oasis or riverbank environments, but the extant Greek witness here supports 'seashores.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Like a palm tree I was raised up in the seashores, and like rose plants in Jericho; like a splendid olive tree in the plain, and I was raised up like a plane tree.'.
    reason: previous_rendering
lexical_decisions:
- source_word: φοῖνιξ
  chosen: palm tree
  alternatives:
  - date palm
  - palm
  lexicon: LSJ
  rationale: φοῖνιξ in this botanical comparison most naturally refers to a palm tree; 'palm tree' is clear modern English and preserves the image.
- source_word: ἀνυψώθην
  chosen: was raised high
  alternatives:
  - was exalted
  - grew tall
  - was raised up
  lexicon: LSJ
  rationale: '''Was raised high'' preserves both the vertical imagery and the note of exaltation better than the weaker ''was raised up''.'
- source_word: αἰγιαλοῖς
  chosen: shores
  alternatives:
  - shorelands
  - coastlands
  - seashores
  lexicon: LSJ
  rationale: The Greek denotes shorelines. 'On the shores' is the natural English idiom, whereas 'in the seashores' is awkward.
- source_word: φυτὰ ῥόδου
  chosen: rose plants
  alternatives:
  - rosebushes
  - plantings of roses
  lexicon: LSJ
  rationale: φυτά are plants or things planted; 'rose plants' is a transparent rendering that keeps the plural botanical image without over-specifying shrub form.
- source_word: Ἰερειχώ
  chosen: Jericho
  rationale: Standard English transliteration of the place name.
- source_word: ἐλαία εὐπρεπής
  chosen: splendid olive tree
  alternatives:
  - beautiful olive tree
  - graceful olive tree
  lexicon: LSJ
  rationale: εὐπρεπής conveys beauty, nobility, or stateliness. 'Splendid' captures the dignified attractiveness of the image in readable English.
- source_word: πεδίῳ
  chosen: the plain
  alternatives:
  - a plain
  - open country
  - field
  lexicon: LSJ
  rationale: πεδίον denotes a plain or level open land. 'The plain' works idiomatically here as a landscape setting for the simile.
- source_word: πλάτανος
  chosen: plane tree
  alternatives:
  - platanus tree
  - sycamore
  lexicon: LSJ
  rationale: πλάτανος is the plane tree. 'Sycamore' would be misleading here, since that is a different tree in biblical English usage.
