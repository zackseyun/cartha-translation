translation:
  text: Like a cedar I was raised high in Lebanon, and like a cypress in the mountains
    of Hermon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Ἀερμών reflects the place-name commonly rendered 'Hermon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: LSJ
  rationale: Introduces a simile. 'Like' is slightly more natural in contemporary
    English while preserving the comparative force.
- source_word: κέδρος
  chosen: cedar
  lexicon: LSJ
  rationale: Standard rendering for the tree named in the Greek; 'cedar' also fits
    the Lebanon imagery conventionally associated with height and majesty.
- source_word: ἀνυψώθην
  chosen: was raised high
  alternatives:
  - was exalted
  - grew tall
  - was lifted up
  lexicon: LSJ
  rationale: Aorist passive of ἀνυψόω, conveying being lifted or elevated. 'Was raised
    high' preserves the passive form and the imagery of height without importing a
    more overtly honorific theological sense that 'was exalted' might suggest.
- source_word: ἐν τῷ Λιβάνῳ
  chosen: in Lebanon
  alternatives:
  - on Lebanon
  lexicon: LSJ
  rationale: Straightforward locative rendering of the prepositional phrase. 'In Lebanon'
    is idiomatic in English and suits the geographic reference.
- source_word: κυπάρισσος
  chosen: cypress
  alternatives:
  - fir
  - pine
  lexicon: LSJ
  rationale: The usual identification is 'cypress.' Alternatives exist in older translation
    tradition, but 'cypress' best matches the Greek lexical value.
- source_word: ἐν ὄρεσιν Ἀερμών
  chosen: in the mountains of Hermon
  alternatives:
  - on the mountains of Hermon
  - in the mountains of Aermon
  lexicon: LSJ
  rationale: Plural ὄρεσιν is best represented by 'mountains.' Ἀερμών corresponds
    to Hermon; the normalized English form 'Hermon' is preferable to a more mechanical
    transliteration from this Greek spelling.
