theological_decisions:
- issue: Whether ἀνυψώθην should be rendered with explicitly honorific language
  chosen_reading: was raised high
  alternative_readings:
  - was exalted
  rationale: The verse is poetic self-description by personified Wisdom using arboreal
    similes. A height-focused rendering preserves the imagery and avoids over-theologizing
    the verb into a status claim beyond what the immediate metaphor requires.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
