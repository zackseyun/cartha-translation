translation:
  text: All these things are the book of the covenant of God Most High, the law that
    Moses commanded as an inheritance for the assemblies of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Most High God.' The Greek word order can be represented either way
      in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the congregations of Jacob.' The Greek συναγωγαῖς here likely means
      the assembled communities of Israel, not necessarily later synagogue institutions.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα πάντα
  chosen: All these things
  alternatives:
  - All this
  - All these
  lexicon: LSJ
  rationale: The neuter plural phrase naturally points back to the preceding discourse
    as a collected whole. 'All these things' preserves the plural force more clearly
    than the more idiomatic but less explicit 'all this.'
- source_word: βίβλος
  chosen: book
  alternatives:
  - scroll
  - document
  lexicon: LSJ
  rationale: βίβλος ordinarily denotes a written book/scroll. 'Book' is the most natural
    modern English equivalent and fits the idiom 'book of the covenant' without over-specifying
    ancient material form.
- source_word: διαθήκης
  chosen: covenant
  alternatives:
  - testament
  - agreement
  lexicon: LSJ
  rationale: In biblical Greek, διαθήκη regularly carries covenantal force rather
    than the later English sense 'testament.' 'Covenant' preserves the theological
    and scriptural resonance.
- source_word: θεοῦ Ὑψίστου
  chosen: God Most High
  alternatives:
  - the Most High God
  - God the Most High
  lexicon: LSJ
  rationale: The genitive phrase identifies whose covenant-book this is. 'God Most
    High' is a direct rendering of the Greek word order while remaining natural English.
- source_word: νόμον
  chosen: the law
  alternatives:
  - a law
  - instruction
  lexicon: LSJ
  rationale: νόμος here refers specifically to the Mosaic law just identified with
    the covenant-book. The article in English helps mark this as a definite, recognized
    body of instruction.
- source_word: ὃν ἐνετείλατο
  chosen: that Moses commanded
  alternatives:
  - which Moses commanded
  - that Moses enjoined
  - that Moses gave as a command
  lexicon: LSJ
  rationale: ἐντέλλομαι is to command or give orders. 'Commanded' is straightforward
    and avoids importing the distinct idea of 'gave' from other legal contexts.
- source_word: κληρονομίαν
  chosen: as an inheritance
  alternatives:
  - an inheritance
  - for an inheritance
  - as a heritage
  lexicon: LSJ
  rationale: 'The accusative stands in apposition/result relation to the law: it is
    presented as Israel''s inherited possession. ''As an inheritance'' makes that
    relation clear in idiomatic English.'
- source_word: συναγωγαῖς
  chosen: assemblies
  alternatives:
  - congregations
  - gatherings
  lexicon: LSJ
  rationale: In this pre-rabbinic wisdom context, συναγωγαί most basically means assembled
    communities rather than later institutional 'synagogues.' 'Assemblies' preserves
    the lexical sense without anachronism.
- source_word: Ἰακώβ
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: LSJ
  rationale: The Greek text reads the patriarchal name Ἰακώβ. 'Jacob' should be retained
    rather than interpreted as 'Israel,' though the collective sense is clear from
    context.
