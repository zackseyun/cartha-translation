- issue: Rendering διαθήκη in a covenantal context
  chosen_reading: covenant
  alternative_readings:
  - testament
  rationale: The verse explicitly links divine revelation, Moses, and Jacob/Israel.
    In such scriptural contexts διαθήκη is best rendered 'covenant,' not 'testament,'
    preserving the theological continuity of God's covenant with his people.
