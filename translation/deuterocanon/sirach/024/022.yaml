translation:
  text: Whoever obeys me will not be put to shame, and those who work in me will not
    sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not be ashamed.' The Greek verb can denote either experiencing
      shame inwardly or being put to shame/disgraced.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who work with me.' The Greek reads 'in me,' which may express
      close association with personified Wisdom.
    reason: lexical_alternative
  - marker: c
    text: Or 'Whoever obeys me will not be put to shame, and those who work in me
      will not sin.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ ὑπακούων μου
  chosen: Whoever obeys me
  alternatives:
  - The one who listens to me
  - Whoever heeds me
  lexicon: BDAG
  rationale: ὑπακούω commonly means to listen with responsive obedience, not mere
    hearing. 'Whoever obeys me' captures the generic singular participle naturally
    in English while preserving the active sense of compliance.
- source_word: οὐκ αἰσχυνθήσεται
  chosen: will not be put to shame
  alternatives:
  - will not be ashamed
  - will not be disgraced
  lexicon: BDAG
  rationale: The passive form supports 'be put to shame' more directly than the more
    internal-sounding 'be ashamed.' This preserves the likely sense of not ending
    in disgrace or public shame.
- source_word: οἱ ἐργαζόμενοι
  chosen: those who work
  alternatives:
  - those who practice
  - those who labor
  lexicon: BDAG
  rationale: ἐργάζομαι denotes doing or working. 'Those who work' is the most straightforward
    rendering here; 'practice' is possible but less concrete.
- source_word: ἐν ἐμοὶ
  chosen: with me
  alternatives:
  - in me
  - by me
  lexicon: BDAG
  rationale: Here the phrase is best rendered associatively rather than woodenly locative.
    'With me' gives natural English while preserving Wisdom's companionship and agency.
- source_word: οὐχ ἁμαρτήσουσιν
  chosen: will not sin
  alternatives:
  - will not go wrong
  - will not miss the mark
  lexicon: BDAG
  rationale: ἁμαρτάνω is the standard verb 'to sin.' In wisdom literature it can overlap
    with 'go wrong,' but 'sin' is the clearest and most theologically transparent
    rendering.
