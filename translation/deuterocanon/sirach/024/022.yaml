theological_decisions:
- issue: Sense of the promise that those acting in Wisdom 'will not sin'
  chosen_reading: A moral-spiritual promise stated in wisdom-language, rendered directly
    as 'will not sin' without softening.
  alternative_readings:
  - will not err
  - will not stumble into sin
  rationale: The Greek uses the ordinary verb for sinning, and the translation should
    not dilute that. At the same time, the statement belongs to personified Wisdom
    discourse and should not be expanded into a doctrinal claim of absolute sinlessness
    beyond what the text itself says.
  doctrine_reference: Preserve theological tension rather than resolve it.
