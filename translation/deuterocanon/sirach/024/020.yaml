translation:
  text: For the memory of me is sweeter than honey, and my inheritance than the honeycomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remembrance of me' or 'memorial of me.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'than honey of the comb'; that is, choice honey from the honeycomb.
    reason: lexical_alternative
