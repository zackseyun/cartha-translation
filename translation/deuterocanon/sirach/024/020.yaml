theological_decisions:
- issue: Speaker reference in first person
  chosen_reading: Retain the first-person speech as Wisdom speaking of herself.
  alternative_readings:
  - Interpret the line more abstractly as referring to wisdom's remembrance or legacy without emphasizing personification.
  rationale: Within Sirach 24 the surrounding context is Wisdom's self-presentation in the first person. The translation therefore keeps 'me' and 'my inheritance' rather than depersonalizing the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
