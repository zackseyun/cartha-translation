lexical_decisions:
- source_word: μνημόσυνόν
  chosen: memory
  alternatives:
  - remembrance
  - memorial
  lexicon: LSJ
  rationale: μνημόσυνον can denote remembrance or memorial. In this poetic context with the possessive 'of me,' 'memory' gives natural English while preserving the sense of remembered presence rather than a formal memorial object.
- source_word: μου
  chosen: of me
  alternatives:
  - my
  - me
  lexicon: LSJ
  rationale: 'The genitive after μνημόσυνον is rendered idiomatically as ''of me'' in English to keep the personal object explicit: the verse speaks of the remembrance of Wisdom herself.'
- source_word: ὑπὲρ
  chosen: than
  alternatives:
  - above
  - beyond
  lexicon: LSJ
  rationale: 'Here ὑπέρ with the comparative sense is best rendered ''than'' in both cola: sweeter than honey, and greater/sweeter than honey from the comb.'
- source_word: γλυκύ
  chosen: sweeter
  alternatives:
  - sweet
  lexicon: LSJ
  rationale: Although the Greek adjective is positive in form, the construction with ὑπέρ is comparative in sense. English requires the comparative 'sweeter than honey.'
- source_word: κληρονομία
  chosen: inheritance
  alternatives:
  - heritage
  - possession
  lexicon: LSJ
  rationale: κληρονομία commonly means inheritance or heritage. 'Inheritance' is the more direct lexical equivalent and preserves the possibility of what Wisdom grants or leaves to her people, without overinterpreting it as merely abstract 'heritage.'
- source_word: μέλιτος κηροῦ
  chosen: the honeycomb
  alternatives:
  - honey from the comb
  lexicon: LSJ
  rationale: The Greek phrase is the standard idiom for 'honeycomb'. The more direct rendering is preferable here.
