lexical_decisions:
- source_word: κἀγώ
  chosen: And I
  alternatives:
  - As for me
  - I too
  lexicon: LSJ
  rationale: Here κἀγώ marks the shift to the speaker's own role. 'And I' is straightforward and less heavy than 'And I too'.
- source_word: διῶρυξ
  chosen: canal
  alternatives:
  - channel
  - ditch
  lexicon: LSJ
  rationale: The term denotes an artificial channel or canal. 'Canal' best conveys a constructed waterway, fitting the imagery and distinguishing it from the natural 'river' (ποταμός).
- source_word: ἀπὸ ποταμοῦ
  chosen: from a river
  alternatives:
  - out of a river
  - from the river
  lexicon: LSJ
  rationale: The anarthrous phrase is naturally rendered 'from a river' rather than 'from the river.' It describes source or origin of the canal imagery.
- source_word: ὑδραγωγός
  chosen: water channel
  alternatives:
  - watercourse
  - aqueduct
  lexicon: LSJ
  rationale: ὑδραγωγός denotes an artificial conduit or channel. 'Water channel' preserves that constructed-irrigation sense better than 'watercourse'.
- source_word: ἐξῆλθον
  chosen: went out
  alternatives:
  - issued forth
  - came out
  lexicon: LSJ
  rationale: For the movement of a canal or watercourse, 'went out' is more natural than 'came out' while staying close to the Greek verb.
- source_word: παράδεισον
  chosen: garden
  alternatives:
  - paradise
  - orchard
  lexicon: LSJ
  rationale: In this context the word refers to a cultivated park or garden in an irrigation image. 'Garden' communicates the concrete sense clearly; 'paradise' is possible but in English can sound more theological than the immediate metaphor requires.
