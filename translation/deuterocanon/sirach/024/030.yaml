  from: And I, like a canal from a river, and like a watercourse, went out into a garden.
  to: And I, like a canal from a river, and like a water channel, went out into a garden.
  rationale: The existing Cartha draft is very close, but 'watercourse' slightly obscures the artificial nature of ὑδραγωγὸς. The author is comparing himself to a constructed offshoot (διῶρυξ, ὑδραγωγὸς) that directs the main river of Wisdom into a specific garden. 'Water channel' or 'conduit' captures this directed, artificial nature better than 'watercourse'. The blind draft's 'water channel' is an excellent solution that avoids the overly architectural connotations of 'aqueduct' while maintaining the sense of a constructed path.
