translation:
  text: And I, like a canal from a river, and like a water channel, went out into a garden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'paradise.' The Greek word can denote a garden, park, or paradise; here the immediate image is of irrigation flowing into a cultivated garden.
    reason: lexical_alternative
  - marker: b
    text: Or 'And I too, like a canal from a river, and like a watercourse, came out into a garden.'.
