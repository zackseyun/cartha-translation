theological_decisions:
- issue: Rendering παράδεισον in a wisdom-metaphor context
  chosen_reading: garden
  alternative_readings:
  - paradise
  rationale: The verse uses irrigation imagery rather than making an explicit eschatological
    claim. Rendering the term as 'garden' preserves the concrete agricultural picture
    and avoids importing later theological associations, while preserving 'paradise'
    as a lexical alternative in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
