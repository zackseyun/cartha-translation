translation:
  text: filling understanding like the Euphrates, and like the Jordan in the days
    of harvest;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who fills understanding like the Euphrates, and like the Jordan at harvest
      time.' The Greek begins with an articular participle, which can be rendered
      more explicitly with 'who.'
    reason: lexical_alternative
  - marker: b
    text: The comparison evokes the great rivers at full flow, a fitting image for
      wisdom's abundance.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ ἀναπληρῶν
  chosen: filling
  alternatives:
  - the one filling
  - who fills
  - bringing to fullness
  lexicon: BDAG
  rationale: The articular present participle functions substantivally but in this
    poetic context is best carried into English as a participial clause rather than
    a heavier nominal expression. 'Filling' preserves the ongoing, vivid action and
    avoids over-specifying an explicit subject beyond what the Greek supplies in context.
- source_word: σύνεσιν
  chosen: understanding
  alternatives:
  - insight
  - intelligence
  - discernment
  lexicon: BDAG
  rationale: σύνεσις commonly denotes understanding or insight. 'Understanding' is
    broad, natural English and fits wisdom literature well without sounding technical.
- source_word: ὡς Εὐφράτης
  chosen: like the Euphrates
  alternatives:
  - as the Euphrates
  lexicon: LSJ
  rationale: ὡς here introduces comparison. 'Like the Euphrates' is idiomatic modern
    English and preserves the river imagery.
- source_word: Ἰορδάνης
  chosen: the Jordan
  alternatives:
  - Jordan
  lexicon: LSJ
  rationale: English river names normally take the article. This keeps the geographic
    image natural and recognizable.
- source_word: ἐν ἡμέραις θερισμοῦ
  chosen: in the days of harvest
  alternatives:
  - at harvest time
  - during the days of harvest
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the concrete temporal phrase
    and echoes the seasonal allusion behind the Jordan's swelling. 'At harvest time'
    is possible but slightly flattens the Greek wording.
