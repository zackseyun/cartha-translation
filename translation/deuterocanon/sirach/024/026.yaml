translation:
  text: It overflows with understanding like the Euphrates, and like the Jordan in the days of harvest;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who fills understanding like the Euphrates, and like the Jordan at harvest time.' The Greek begins with an articular participle, which can be rendered more explicitly with 'who.'
    reason: lexical_alternative
  - marker: b
    text: The comparison evokes the great rivers at full flow, a fitting image for wisdom's abundance.
    reason: cultural_note
  - marker: c
