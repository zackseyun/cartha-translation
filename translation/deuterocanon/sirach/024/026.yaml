lexical_decisions:
- source_word: ὁ ἀναπληρῶν
  chosen: It overflows with
  alternatives:
  - It fills up with
  - It makes full with
  lexicon: BDAG
  rationale: Given the river imagery, 'overflows with' best captures the active, abundant force of ἀναπληρόω in this context.
- source_word: σύνεσιν
  chosen: understanding
  alternatives:
  - insight
  - intelligence
  - discernment
  lexicon: BDAG
  rationale: σύνεσις commonly denotes understanding or insight. 'Understanding' is broad, natural English and fits wisdom literature well without sounding technical.
- source_word: ὡς Εὐφράτης
  chosen: like the Euphrates
  alternatives:
  - as the Euphrates
  lexicon: LSJ
  rationale: ὡς here introduces comparison. 'Like the Euphrates' is idiomatic modern English and preserves the river imagery.
- source_word: Ἰορδάνης
  chosen: the Jordan
  alternatives:
  - Jordan
  lexicon: LSJ
  rationale: English river names normally take the article. This keeps the geographic image natural and recognizable.
- source_word: ἐν ἡμέραις θερισμοῦ
  chosen: in the days of harvest
  alternatives:
  - at harvest time
  - during the days of harvest
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the concrete temporal phrase and echoes the seasonal allusion behind the Jordan's swelling. 'At harvest time' is possible but slightly flattens the Greek wording.
