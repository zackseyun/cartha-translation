translation:
  text: And I took root among a glorified people, in the portion of the Lord, his
    inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'among a glorious people.' The Greek participle can be taken more adjectivally,
      though the main text preserves its verbal/resultative force.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in the portion of the Lord, his inheritance' may also be rendered
      'in the portion of the Lord's inheritance' or 'in the Lord's allotted inheritance.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρρίζωσα
  chosen: I took root
  alternatives:
  - I rooted myself
  - I was rooted
  lexicon: LSJ
  rationale: Aorist active of ῥιζόω/ῥιζόω-related form, here first person singular.
    'I took root' is idiomatic English that preserves the active sense without awkward
    reflexive wording.
- source_word: λαῷ
  chosen: people
  alternatives:
  - nation
  lexicon: LSJ
  rationale: λαός commonly denotes a people, often with covenantal or communal force.
    'People' fits the singular collective sense better than 'nation' here.
- source_word: δεδοξασμένῳ
  chosen: glorified
  alternatives:
  - honored
  - made glorious
  - glorious
  lexicon: LSJ
  rationale: Perfect passive participle of δοξάζω. 'Glorified' best preserves the
    verbal/resultative force ('having been glorified') better than the flatter adjective
    'glorious'.
- source_word: μερίδι
  chosen: portion
  alternatives:
  - share
  - allotted part
  lexicon: LSJ
  rationale: μερίς often means an allotted share or portion. 'Portion' is concise,
    natural, and preserves the inheritance/allotment nuance in parallel with κληρονομίας.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Following project default for κύριος/Kyrios as 'Lord.' With the article-like
    English idiom after ἐν μερίδι, 'the Lord' reads naturally.
- source_word: κληρονομίας
  chosen: inheritance
  alternatives:
  - heritage
  - possession
  lexicon: LSJ
  rationale: κληρονομία regularly denotes inheritance or heritage. 'Inheritance' keeps
    the familial/allotted sense and matches the genitival construction closely.
