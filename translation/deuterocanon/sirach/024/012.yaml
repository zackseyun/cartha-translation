theological_decisions:
- issue: Whether δεδοξασμένῳ should be rendered as a simple adjective ('glorious people')
    or with its participial/resultative force ('glorified people').
  chosen_reading: glorified people
  alternative_readings:
  - glorious people
  - honored people
  rationale: The Greek form is a perfect passive participle, and the translation preserves
    that force rather than flattening it into a mere descriptive adjective. This also
    avoids overstating an inherent quality and leaves open that the people's glory
    is bestowed.
  doctrine_reference: Translation philosophy §1, §5
- issue: How to construe 'ἐν μερίδι Κυρίου κληρονομίας αὐτοῦ' in English.
  chosen_reading: in the portion of the Lord, his inheritance
  alternative_readings:
  - in the portion of the Lord's inheritance
  - in the Lord's allotted inheritance
  rationale: The Greek is compact and somewhat appositional. The chosen rendering
    stays close to the wording while preserving the likely sense that the speaker
    is rooted within the Lord's allotted inheritance. A smoother possessive rendering
    is possible, but this form remains more auditable to the source text.
  doctrine_reference: Translation philosophy §1, §3, §5
