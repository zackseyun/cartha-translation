theological_decisions:
- issue: Allusion to Israel's wilderness theophany in 'pillar of cloud'
  chosen_reading: Retain the phrase straightforwardly as 'a pillar of cloud' without
    expanding the allusion.
  alternative_readings:
  - the pillar of cloud
  rationale: The verse likely echoes the divine cloud-pillar tradition, but the text
    itself states the image without explicit explanatory expansion. The main text
    preserves the imagery and leaves the intertextual resonance intact rather than
    resolving it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
