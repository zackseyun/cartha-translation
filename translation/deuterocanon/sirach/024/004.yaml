translation:
  text: I made my dwelling in the heights, and my throne was in a pillar of cloud;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the pillar of cloud.' The Greek reads 'in a pillar of cloud,' but the
      phrase likely echoes the well-known cloud-pillar associated with God's presence
      and guidance.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεσκήνωσα
  chosen: I made my dwelling
  alternatives:
  - I dwelt
  - I encamped
  - I tabernacled
  lexicon: BDAG
  rationale: The verb from κατασκηνόω denotes settling or dwelling, with an echo of
    pitching a tent/tabernacling. 'I made my dwelling' preserves the first-person
    verbal force and the sense of established residence in readable English, while
    avoiding the overly literal but less natural 'I encamped.'
- source_word: ἐν ὑψηλοῖς
  chosen: in the heights
  alternatives:
  - in high places
  - on high
  - in the highest places
  lexicon: LSJ
  rationale: The plural adjective used substantivally refers to elevated or heavenly
    heights. 'In the heights' is concise and preserves the plural/local sense better
    than the more interpretive 'on high.'
- source_word: θρόνος
  chosen: throne
  alternatives:
  - seat
  lexicon: LSJ
  rationale: The royal/exalted imagery is explicit; 'throne' is the natural and theologically
    weighty rendering.
- source_word: στύλῳ νεφέλης
  chosen: a pillar of cloud
  alternatives:
  - the pillar of cloud
  - a column of cloud
  lexicon: LSJ
  rationale: This phrase strongly evokes the wilderness theophany tradition. Because
    the Greek lacks the article, 'a pillar of cloud' is the most formally accurate
    main-text rendering, while the allusive force remains clear. 'Column of cloud'
    is possible but less idiomatic in biblical English.
