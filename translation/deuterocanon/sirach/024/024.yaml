translation:
  text: Do not fail in strength; cling to him, so that you may be strengthened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not grow weary in strength.' The verb can mean fail, cease, or faint.
    reason: lexical_alternative
  - marker: b
    text: The line is an added verse in some Sirach textual traditions; the project
      retains it as verse 24 in this chapter's sequence.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκλίπητε
  chosen: fail
  alternatives:
  - cease
  - faint
  - grow weary
  lexicon: LEH
  rationale: The verb can mean fail, cease, or faint. With ἐν ἰσχύϊ, 'fail' best preserves
    the exhortation against losing strength without becoming paraphrastic.
- source_word: ἰσχύϊ
  chosen: strength
  alternatives:
  - might
  - vigor
  lexicon: LEH
  rationale: ἰσχύς denotes strength, might, or vigor. 'Strength' is the most direct
    and idiomatic English equivalent here.
- source_word: κολλᾶσθε
  chosen: cling
  alternatives:
  - hold fast
  - join yourselves
  lexicon: LEH
  rationale: The middle/passive form carries the sense of attaching oneself closely.
    'Cling' preserves the deliberate, covenantal sense of close adherence.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - it
  lexicon: LEH
  rationale: The dative pronoun may be masculine or neuter, but in this exhortational
    setting 'him' is the most natural rendering for steadfast attachment to the Lord.
- source_word: κραταιωθῆτε
  chosen: be strengthened
  alternatives:
  - be made strong
  - grow strong
  lexicon: LEH
  rationale: The passive subjunctive expresses the result of clinging. 'Be strengthened'
    preserves that passive/resultative force naturally in English.
