translation:
  text: I am like a canal from a river, and like a water channel into a garden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''paradise'': the Greek word can denote a garden, orchard, or paradise-like
      enclosure; here the irrigation imagery favors ''garden.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγώ
  chosen: I
  lexicon: LSJ
  rationale: Explicit first-person pronoun retained because the verse continues Wisdom's
    self-description in the first person.
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: LSJ
  rationale: Introduces similes; 'like' is natural modern English and preserves the
    comparative force.
- source_word: διῶρυξ
  chosen: canal
  alternatives:
  - ditch
  - channel
  lexicon: LSJ
  rationale: Refers to an artificial watercourse. 'Canal' best conveys a substantial
    man-made conduit without sounding archaic.
- source_word: ἀπὸ ποταμοῦ
  chosen: from a river
  alternatives:
  - out of a river
  - from the river
  lexicon: LSJ
  rationale: The preposition indicates derivation/source. The anarthrous English 'a
    river' reads naturally while preserving the sense of water branching from a larger
    source.
- source_word: καί
  chosen: and
  lexicon: LSJ
  rationale: Simple coordination of the two similes.
- source_word: ὡς ὑδραγωγός
  chosen: like a water channel
  alternatives:
  - like an aqueduct
  - like a conduit
  lexicon: LSJ
  rationale: The term denotes a structure/channel that carries water. 'Water channel'
    is clearer to modern readers than 'aqueduct' while preserving the image.
- source_word: εἰς παράδεισον
  chosen: into a garden
  alternatives:
  - into a park
  - into paradise
  lexicon: LSJ
  rationale: In Sirach this commonly refers to an irrigated garden/orchard setting.
    'Garden' fits the agricultural imagery better than the more theological-sounding
    'paradise' in this context.
