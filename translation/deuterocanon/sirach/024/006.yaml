translation:
  text: In the waves of the sea and in all the earth, and among every people and nation, I gained possession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I acquired' or 'I took possession.' The Greek verb leaves the object unstated.
    reason: lexical_alternative
  - marker: b
    text: Or 'In the waves of the sea and in all the earth, and among every people and nation I gained a possession.'.
