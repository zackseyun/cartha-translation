  from: In the waves of the sea and in all the earth, and among every people and nation I gained a possession.
  to: In the waves of the sea and in all the earth, and among every people and nation, I gained possession.
  rationale: The source text explicitly reads ἐκτησάμην (from κτάομαι, 'to acquire, gain possession'), whereas the major modern reference translations follow the variant ἡγησάμην ('I led' or 'held sway'). Translating the provided source text requires a verb of acquisition. The existing Cartha draft's 'I gained a possession' is accurate, but the blind draft's 'I gained possession' is slightly more idiomatic for the absolute use of the verb, conveying the establishment of a domain across these realms. Adopting the blind draft's phrasing and punctuation yields the best result.
