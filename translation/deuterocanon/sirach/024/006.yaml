lexical_decisions:
- source_word: ἐν κύμασιν θαλάσσης
  chosen: In the waves of the sea
  alternatives:
  - Among the waves of the sea
  - In the billows of the sea
  lexicon: LSJ
  rationale: A straightforward locative rendering preserves the concrete imagery. 'Waves' is more natural modern English than 'billows' while staying close to κύματα.
- source_word: ἐν πάσῃ τῇ γῇ
  chosen: in all the earth
  alternatives:
  - in the whole land
  - throughout all the earth
  lexicon: LSJ
  rationale: γῆ can mean 'land' or 'earth'; in this sweeping cosmic-geographic sequence, 'earth' best matches the universal scope.
- source_word: ἐν παντὶ λαῷ καὶ ἔθνει
  chosen: among every people and nation
  alternatives:
  - in every people and nation
  - among every people and ethnic group
  lexicon: LSJ
  rationale: The phrase extends Wisdom's reach across human collectivities. 'Among' reads naturally in English for presence within groups. 'Nation' is the standard rendering for ἔθνος here.
- source_word: ἐκτησάμην
  chosen: I gained possession
  alternatives:
  - I acquired
  - I took possession
  lexicon: LSJ
  rationale: 'The verb κτάομαι here is best understood absolutely: Wisdom gains possession or domain among every people and nation. ''I gained possession'' is more idiomatic than ''I gained a possession''.'
