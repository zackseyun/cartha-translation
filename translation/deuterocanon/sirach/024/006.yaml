theological_decisions:
- issue: Implicit object of ἐκτησάμην
  chosen_reading: 'Render the verb with an explicit but general object: ''I gained a possession.'''
  alternative_readings:
  - I acquired [them]
  - I took possession [there]
  rationale: The Greek leaves the object unstated, but English normally requires one for clarity. A general object avoids over-specifying what Wisdom acquires while still conveying the verb's sense. This preserves the text's breadth rather than resolving it into a narrower theological claim.
