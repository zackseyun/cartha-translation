  from: Wisdom will praise her own soul, and in the midst of her people she will boast.
  to: Wisdom will praise herself, and in the midst of her people she will boast.
  rationale: The Greek phrase 'ψυχὴν αὐτῆς' is a standard translation-Greek calque for the Hebrew reflexive idiom meaning 'herself'. While 'her own soul' is lexically literal, it produces an unnatural English image that distracts from the author's intent of straightforward self-praise. Rendering it as 'herself' accurately conveys the meaning and maintains the poetic personification without introducing an awkward dichotomy. The future tenses (αἰνέσει, καυχήσεται) are correctly preserved.
