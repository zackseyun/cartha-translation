theological_decisions:
- issue: Personification of Wisdom
  chosen_reading: Retain feminine personal language ('her') and capitalize 'Wisdom'
  alternative_readings:
  - Render as uncapitalized abstract 'wisdom'
  - Reduce ψυχὴν αὐτῆς to 'herself' and minimize personification
  rationale: The Greek grammar is feminine and the chapter presents Wisdom as a personified speaker. Preserving this literary-theological presentation is more faithful than abstracting it away.
