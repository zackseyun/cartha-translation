lexical_decisions:
- source_word: ἴδετε
  chosen: See that
  alternatives:
  - See
  - Look
  - Consider
  lexicon: LSJ
  rationale: Imperative plural of ὁράω functioning as an appeal to the audience to recognize a stated fact. 'See that' captures the exhortatory force in natural English better than the bare 'See.'
- source_word: οὐκ ἐμοὶ μόνῳ
  chosen: not for myself alone
  alternatives:
  - not for me alone
  - not only for myself
  lexicon: LSJ
  rationale: 'The dative with μόνος expresses advantage/benefit: the labor was not merely for the speaker''s own benefit. ''For myself alone'' is idiomatic and preserves the emphasis of μόνῳ.'
- source_word: ἐκοπίασα
  chosen: I have labored
  alternatives:
  - I labored
  - I toiled
  lexicon: LSJ
  rationale: Although the Greek aorist is simple past, the English present perfect better captures the author's presentation of completed labor whose effect still stands before the reader.
- source_word: ἀλλὰ πᾶσι
  chosen: but for all
  alternatives:
  - but for everyone
  - but for all people
  lexicon: LSJ
  rationale: 'Strong contrast with the preceding phrase: the labor benefits a wider group. ''For all'' is concise and leaves the following participial phrase to define the group.'
- source_word: τοῖς ἐκζητοῦσιν
  chosen: who seek
  alternatives:
  - who diligently seek
  - who search for
  - who pursue
  lexicon: LSJ
  rationale: ἐκζητέω can intensify the idea of seeking, but in English 'seek' already fits wisdom-language well and avoids overtranslation. The object is supplied by the following pronoun.
- source_word: αὐτήν
  chosen: her
  alternatives:
  - it
  lexicon: LSJ
  rationale: The pronoun refers back to personified Wisdom in the surrounding context. 'Her' preserves the feminine personification rather than flattening it to 'it.'
