  from: See that I did not labor for myself alone, but for all who seek her.
  to: See that I have not labored for myself alone, but for all who seek her.
  rationale: The existing Cartha draft is highly accurate, but the simple past 'did not labor' slightly disconnects the action from the present moment of the author offering his work to the reader. The Greek aorist (ἐκοπίασα) frequently functions this way, and English naturally expresses this present-oriented result with the present perfect ('have not labored'). The blind draft and all reference translations agree on this tense. 'For all who seek her' is retained as it is concise and accurate.
