translation:
  text: He makes instruction shine forth like light, like Gihon in the days of the
    grape harvest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'The one who makes instruction shine forth like light.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐκφαίνων
  chosen: He makes ... shine forth
  alternatives:
  - the one who reveals
  - the one who brings to light
  - he displays
  lexicon: LSJ
  rationale: The articular participle functions substantivally, referring back to
    the speaker/personified Wisdom in context. 'Makes ... shine forth' preserves the
    causative force of ἐκφαίνω and fits the following comparison with light.
- source_word: ὡς φῶς
  chosen: like light
  alternatives:
  - as light
  lexicon: LSJ
  rationale: A straightforward comparison introduced by ὡς. 'Like light' is idiomatic
    modern English and preserves the simile.
- source_word: παιδείαν
  chosen: instruction
  alternatives:
  - discipline
  - training
  - education
  lexicon: LSJ
  rationale: In Wisdom/Sirach context παιδεία commonly denotes formative instruction
    or training in wisdom. 'Instruction' is clearer in English here than 'discipline,'
    which could overemphasize punishment.
- source_word: ὡς Γηὼν
  chosen: like Gihon
  alternatives:
  - like the Gihon
  lexicon: LSJ
  rationale: Γηὼν is a proper name and should be transliterated per project philosophy.
    The comparison is to the river Gihon, so 'like Gihon' is sufficient without adding
    interpretive material.
- source_word: ἐν ἡμέραις τρυγητοῦ
  chosen: in the days of the grape harvest
  alternatives:
  - at vintage time
  - in the days of vintage
  lexicon: LSJ
  rationale: τρυγητός refers specifically to grape gathering/vintage. 'Grape harvest'
    is accessible modern English and preserves the agricultural specificity better
    than the less common 'vintage.'
