theological_decisions:
- issue: Referent of the substantival participle ὁ ἐκφαίνων
  chosen_reading: Render with personal pronoun 'He,' referring to personified Wisdom/the
    speaker in the immediate context.
  alternative_readings:
  - The one who makes instruction shine forth
  rationale: The Greek participle with article can be rendered more formally as 'the
    one who...,' but in context a finite clause with 'He' reads naturally and preserves
    the personal referent without adding doctrine beyond the text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; translate for
    readable modern English while preserving source sense.'
