lexical_decisions:
- source_word: ὁ ἐκφαίνων
  chosen: It makes ... shine forth
  alternatives:
  - It shines forth
  - which makes ... shine forth
  lexicon: LSJ
  rationale: The participle continues to describe the Law from verse 23. 'It makes instruction shine forth' avoids the mistaken personal antecedent 'He'.
- source_word: ὡς φῶς
  chosen: like light
  alternatives:
  - as light
  lexicon: LSJ
  rationale: A straightforward comparison introduced by ὡς. 'Like light' is idiomatic modern English and preserves the simile.
- source_word: παιδείαν
  chosen: instruction
  alternatives:
  - discipline
  - training
  - education
  lexicon: LSJ
  rationale: In Wisdom/Sirach context παιδεία commonly denotes formative instruction or training in wisdom. 'Instruction' is clearer in English here than 'discipline,' which could overemphasize punishment.
- source_word: ὡς Γηὼν
  chosen: like the Gihon
  alternatives:
  - like Gihon
  lexicon: LSJ
  rationale: As with other river names in English, the definite article is natural here.
- source_word: ἐν ἡμέραις τρυγητοῦ
  chosen: in the days of the grape harvest
  alternatives:
  - at vintage time
  - in the days of vintage
  lexicon: LSJ
  rationale: τρυγητός refers specifically to grape gathering/vintage. 'Grape harvest' is accessible modern English and preserves the agricultural specificity better than the less common 'vintage.'
