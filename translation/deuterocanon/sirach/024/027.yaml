  from: He makes instruction shine forth like light, like Gihon in the days of the grape harvest.
  to: It makes instruction shine forth like light, like the Gihon in the days of the grape harvest.
  rationale: The primary issue is the antecedent of the masculine articular participle ὁ ἐκφαίνων. Verses 25-27 feature a sequence of these participles describing the actions of the 'law that Moses commanded' (νόμον, v. 23). Translating this as 'He' misleads the English reader into thinking God is the subject, breaking the author's rhetorical focus on the Law's overflowing abundance. Changing 'He' to 'It' restores the correct referent. Additionally, adding 'the' before 'Gihon' aligns with standard English conventions for naming rivers. The translation of 'ὡς φῶς' as 'like light' is correct for the Greek text, even though scholars recognize it as the Greek translator's misreading of the Hebrew 'like the Nile'.
