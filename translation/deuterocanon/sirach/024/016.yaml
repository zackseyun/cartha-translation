  from: I spread out my branches like a terebinth, and my branches are branches of glory and grace.
  to: Like a terebinth I spread out my branches, and my branches are branches of glory and grace.
  rationale: The existing Cartha draft is highly accurate and rightly preserves the emphatic repetition of 'branches' and the literal genitives 'glory and grace' (against the NRSV's flattening). However, modifying the word order to front the simile ('Like a terebinth I spread out...') better reflects the Greek syntax (ἐγὼ ὡς τερέβινθος ἐξέτεινα) and maintains the poetic anaphora established in verses 13-14, where the tree comparisons consistently precede the verbs.
