translation:
  text: Like a terebinth I spread out my branches, and my branches are branches of glory and grace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stretched out my branches.'
    reason: lexical_alternative
  - marker: b
    text: The terebinth is a large tree often used in biblical imagery; some render the term more generally as 'oak,' but the Greek names the terebinth specifically.
    reason: cultural_note
  - marker: c
    text: Or 'branches of glory and favor.'
    reason: lexical_alternative
