lexical_decisions:
- source_word: τερέβινθος
  chosen: terebinth
  alternatives:
  - turpentine tree
  - oak
  lexicon: LSJ
  rationale: A specific tree name is present in the Greek. 'Terebinth' preserves the botanical image more accurately than the broader or less certain alternatives. Though less common in English, it is standard biblical vocabulary and avoids collapsing the image into 'oak.'
- source_word: ἐξέτεινα
  chosen: spread out
  alternatives:
  - stretched out
  - extended
  lexicon: LSJ
  rationale: The verb conveys extension outward. 'Spread out' is natural modern English for branches while still reflecting the physical imagery of extension.
- source_word: κλάδους
  chosen: branches
  alternatives:
  - boughs
  - shoots
  lexicon: LSJ
  rationale: '''Branches'' is the most straightforward and readable rendering for repeated κλάδοι here. ''Boughs'' is more literary/archaic; ''shoots'' would suggest smaller new growth not required by the Greek.'
- source_word: δόξης
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: LSJ
  rationale: '''Glory'' best preserves the elevated register and common biblical sense of δόξα. ''Honor'' is too abstract and ''splendor'' narrows the sense to visual brilliance.'
- source_word: χάριτος
  chosen: grace
  alternatives:
  - favor
  - beauty
  - charm
  lexicon: LSJ
  rationale: χάρις can denote grace, favor, or charm. In this wisdom-poetic self-description, 'grace' preserves both attractiveness and beneficent quality without reducing the term to mere aesthetics. The pairing 'glory and grace' also reads naturally and retains theological resonance.
