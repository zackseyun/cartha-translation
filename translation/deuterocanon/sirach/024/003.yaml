theological_decisions:
- issue: Personified Wisdom's origin from God
  chosen_reading: Retained the direct statement 'I came forth from the mouth of the
    Most High' without softening it into mere speech or creation imagery.
  alternative_readings:
  - I was spoken by the Most High
  - I proceeded from the command of the Most High
  rationale: The Greek presents Wisdom in first-person personification with origin
    imagery tied to God's mouth. The translation preserves that theological-poetic
    tension rather than resolving it into a narrower doctrinal category.
