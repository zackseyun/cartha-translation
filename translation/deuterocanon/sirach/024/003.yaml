translation:
  text: I came forth from the mouth of the Most High, and like a mist I covered the
    earth;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξῆλθον
  chosen: came forth
  alternatives:
  - went out
  - proceeded
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι. 'Came forth' preserves the elevated, personified
    voice of Wisdom and fits origin imagery better than the more pedestrian 'went
    out.' 'Proceeded' is possible but sounds more abstract and less natural in modern
    English.
- source_word: ἀπὸ στόματος
  chosen: from the mouth of
  alternatives:
  - out of the mouth of
  lexicon: BDAG
  rationale: A direct, formal rendering that preserves the metaphor of utterance/origin.
    'From the mouth of' is idiomatic English and keeps the imagery without unnecessary
    stiffness.
- source_word: Ὑψίστου
  chosen: the Most High
  alternatives:
  - the Highest
  lexicon: BDAG
  rationale: Standard rendering of the divine title Ὕψιστος in biblical English. It
    is both recognizable and faithful to the Greek title.
- source_word: ὡς ὁμίχλη
  chosen: like a mist
  alternatives:
  - like fog
  - like a cloud of mist
  lexicon: LSJ
  rationale: ὁμίχλη denotes mist/fog. 'Mist' best matches the poetic register and
    avoids the heavier modern associations of 'fog.'
- source_word: κατεκάλυψα
  chosen: I covered
  alternatives:
  - I enveloped
  - I spread over
  lexicon: BDAG
  rationale: The compound verb means to cover over. 'I covered' is the most direct
    rendering and preserves the image without overinterpreting the manner of coverage.
- source_word: γῆν
  chosen: the earth
  alternatives:
  - the land
  lexicon: BDAG
  rationale: In this cosmic-poetic context, γῆ refers to the earth broadly rather
    than a particular land. 'The earth' best fits the scope of Wisdom's self-description.
