id: SIR.24.3
reference: Sirach 24:3
source:
  edition: lxx-swete-1909
  text: Ἐγὼ ἀπὸ στόματος Ὑψίστου ἐξῆλθον, καὶ ὡς ὁμίχλη κατεκάλυψα γῆν·
  language: Greek
