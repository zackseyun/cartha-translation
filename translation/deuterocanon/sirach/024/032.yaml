theological_decisions:
- issue: Referent of αὐτά in Wisdom's self-speech
  chosen_reading: Rendered as 'these things,' referring to Wisdom's instruction/teachings
  alternative_readings:
  - Rendered more abstractly as 'it,' referring back to instruction singularly
  rationale: The Greek has neuter plural αὐτά after singular παιδείαν, likely referring
    to the contents or expressions of Wisdom's instruction rather than the abstract
    noun alone. The translation preserves that plurality without forcing a narrow
    doctrinal interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
