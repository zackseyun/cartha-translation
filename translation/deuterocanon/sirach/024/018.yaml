theological_decisions:
- issue: Sense of φόβου in wisdom context
  chosen_reading: fear
  alternative_readings:
  - reverence
  rationale: Wisdom literature often uses 'fear' with reverential overtones, especially
    in relation to God. The Greek here, however, simply says φόβου without an explicit
    interpretive qualifier. Rendering it 'fear' preserves the source wording and lets
    readers hear both dread/respect and reverence as the text allows.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
