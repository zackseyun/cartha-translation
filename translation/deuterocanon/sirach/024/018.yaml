translation:
  text: I am the mother of beautiful love, and of fear, and of knowledge, and of holy
    hope;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'good love' or 'noble love'; Greek καλῆς can carry moral as well as aesthetic
      force.
    reason: lexical_alternative
  - marker: b
    text: Or 'reverence'; Greek φόβου in wisdom literature often denotes reverent
      fear, especially toward God.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ
  chosen: mother
  alternatives:
  - source
  - origin
  lexicon: LSJ
  rationale: The noun is literally 'mother.' In this personified Wisdom context, retaining
    the familial metaphor is more faithful and vivid than abstracting to 'source'
    or 'origin.'
- source_word: καλῆς
  chosen: beautiful
  alternatives:
  - good
  - noble
  - fair
  lexicon: LSJ
  rationale: καλός can mean good, noble, or beautiful. Here, paired with ἀγάπη in
    a poetic self-description, 'beautiful' preserves the aesthetic and moral richness
    without flattening it to merely ethical 'good.'
- source_word: ἀγάπης
  chosen: love
  lexicon: LSJ
  rationale: Per project defaults, ἀγάπη is rendered 'love.' No contextual pressure
    here warrants deviation.
- source_word: φόβου
  chosen: fear
  alternatives:
  - reverence
  lexicon: LSJ
  rationale: φόβος is literally 'fear.' In wisdom literature it often carries reverential
    force, but the Greek does not explicitly narrow it to 'reverence,' so 'fear' best
    preserves the theological tension.
- source_word: γνώσεως
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: LSJ
  rationale: γνῶσις most directly denotes 'knowledge.' 'Understanding' is possible
    but less exact here.
- source_word: ἁγίας
  chosen: holy
  alternatives:
  - sacred
  lexicon: LSJ
  rationale: ἅγιος is regularly rendered 'holy.' 'Sacred' is possible, but 'holy'
    better preserves biblical diction and theological resonance.
- source_word: ἐλπίδος
  chosen: hope
  alternatives:
  - expectation
  lexicon: LSJ
  rationale: ἐλπίς is straightforwardly 'hope' in this context; 'expectation' is too
    weak and less idiomatic in English.
