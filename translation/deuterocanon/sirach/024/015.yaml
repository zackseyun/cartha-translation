  from: Like cinnamon and aspalathus, I gave forth a scent of spices, and like choice myrrh I spread a sweet fragrance, like galbanum and onycha and stacte, and like the vapor of frankincense in the tabernacle.
  to: Like cinnamon and aspalathus, I gave forth a scent of spices, and like choice myrrh I spread a sweet fragrance, like galbanum and onycha and stacte, and like the smoke of frankincense in the tabernacle.
  rationale: The Cartha draft is highly accurate and correctly preserves the specific incense terminology that links Wisdom to the tabernacle cultus. However, 'vapor' for ἀτμὶς in the context of burning frankincense is less natural in English than 'smoke' (as used in the blind draft and Charles). While ἀτμὶς literally means vapor or exhalation, the visible product of burning incense is smoke. Changing 'vapor' to 'smoke' improves the naturalness without losing the cultic imagery. 'Sweet fragrance' is retained for εὐωδίαν to fully capture the εὐ- prefix.
