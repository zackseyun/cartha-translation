  tier: 3
  from: Like cinnamon and aspalathus, I gave forth a scent of spices, and like choice myrrh I spread a sweet smell, like galbanum and onycha and stacte, and like the vapor of frankincense in the tent.
  to: Like cinnamon and aspalathus, I gave forth a scent of spices, and like choice myrrh I spread a sweet fragrance, like galbanum and onycha and stacte, and like the vapor of frankincense in the tabernacle.
  rationale: The existing draft is generally accurate, but it flattens the register and the cultic specificity of the verse. 'Sweet smell' is a bit wooden for εὐωδίαν in a poetic hymn. More importantly, while σκηνή literally means 'tent', in the LXX it is the standard term for the Tabernacle. Given that the author has just listed the exact four ingredients of the sacred sanctuary incense from Exodus 30:34 (χαλβάνη, ὄνυξ, στακτή, λίβανος), the referent is unambiguously the Tabernacle. Translating it as 'the tent' (uncapitalized) strips away the cultic resonance that the original audience would have instantly recognized. The blind draft correctly identifies this and uses 'tabernacle'.
