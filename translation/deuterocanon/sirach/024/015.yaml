lexical_decisions:
- source_word: κιννάμωμον
  chosen: cinnamon
  alternatives:
  - cassia
  lexicon: LSJ
  rationale: The Greek term ordinarily denotes cinnamon; 'cassia' is a possible related spice but is less likely here. 'Cinnamon' is the most natural and recognizable English equivalent.
- source_word: ἀσπάλαθος
  chosen: aspalathus
  alternatives:
  - sweetbrier
  - aromatic shrub
  lexicon: LSJ
  rationale: The plant identification is uncertain. Retaining the transliterated plant name avoids false precision while preserving the specific aromatic reference in the Greek.
- source_word: ἀρωμάτων
  chosen: of spices
  alternatives:
  - spices
  lexicon: LSJ
  rationale: 'The genitive is best heard with the idea of scent here: Wisdom gives forth a scent ''of spices''.'
- source_word: δέδωκα ὀσμήν
  chosen: I gave forth a scent
  alternatives:
  - I gave off fragrance
  - I gave a scent
  lexicon: LSJ
  rationale: '''I gave forth a scent'' better suits the hymnic register than the more prosaic ''I gave off fragrance''.'
- source_word: σμύρνα ἐκλεκτή
  chosen: choice myrrh
  alternatives:
  - select myrrh
  - finest myrrh
  lexicon: LSJ
  rationale: ἐκλεκτή means selected or choice. 'Choice myrrh' is concise and natural English.
- source_word: διέδωκα εὐωδίαν
  chosen: I spread a sweet fragrance
  alternatives:
  - I spread a sweet smell
  - I diffused fragrance
  lexicon: LSJ
  rationale: εὐωδία denotes pleasing fragrance. 'Sweet fragrance' fits the poetic and cultic register well.
- source_word: χαλβάνη
  chosen: galbanum
  alternatives:
  - aromatic gum
  lexicon: LSJ
  rationale: This is the standard English name for the resin. It also echoes the incense vocabulary familiar from biblical contexts.
- source_word: ὄνυξ
  chosen: onycha
  alternatives:
  - onyx
  - aromatic shell
  lexicon: LSJ
  rationale: In incense lists this term is traditionally understood as onycha, an aromatic ingredient, not the gemstone onyx. 'Onycha' avoids misleading readers.
- source_word: στακτή
  chosen: stacte
  alternatives:
  - liquid myrrh
  - aromatic resin
  lexicon: LSJ
  rationale: The term names a specific aromatic substance known from incense contexts. 'Stacte' preserves the specificity better than a generic gloss.
- source_word: λίβανου ἀτμίς
  chosen: the smoke of frankincense
  alternatives:
  - the vapor of frankincense
  lexicon: LSJ
  rationale: In the context of burning frankincense, ἀτμίς is best rendered as the visible 'smoke' rather than the more clinical 'vapor'.
- source_word: ἐν σκηνῇ
  chosen: in the tabernacle
  alternatives:
  - in the tent
  lexicon: LSJ
  rationale: In this cultic setting, especially after the incense ingredients of Exodus 30, σκηνή points to the Tabernacle rather than a generic tent.
