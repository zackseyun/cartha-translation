  text: ὡς κιννάμωμον καὶ ἀσπάλαθος ἀρωμάτων δέδωκα ὀσμήν, καὶ ὡς σμύρνα ἐκλεκτὴ διέδωκα
    εὐωδίαν, ὡς χαλβάνη καὶ ὄνυξ καὶ στακτή, καὶ ὡς λίβανου ἀτμὶς ἐν σκηνῇ.
