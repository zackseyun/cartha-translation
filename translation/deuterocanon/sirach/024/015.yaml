translation:
  text: Like cinnamon and aspalathus of spices I gave off fragrance, and like choice
    myrrh I spread a sweet smell, like galbanum and onycha and stacte, and like the
    vapor of frankincense in the tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the tabernacle.' The Greek literally says 'in the tent,' but in this
      incense-setting it likely alludes to the sanctuary tent.
    reason: lexical_alternative
  - marker: b
    text: Aspalathus is an aromatic plant, but its exact identification is uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: κιννάμωμον
  chosen: cinnamon
  alternatives:
  - cassia
  lexicon: LSJ
  rationale: The Greek term ordinarily denotes cinnamon; 'cassia' is a possible related
    spice but is less likely here. 'Cinnamon' is the most natural and recognizable
    English equivalent.
- source_word: ἀσπάλαθος
  chosen: aspalathus
  alternatives:
  - sweetbrier
  - aromatic shrub
  lexicon: LSJ
  rationale: The plant identification is uncertain. Retaining the transliterated plant
    name avoids false precision while preserving the specific aromatic reference in
    the Greek.
- source_word: ἀρωμάτων
  chosen: of spices
  alternatives:
  - of aromatics
  - of perfumes
  lexicon: LSJ
  rationale: The genitive qualifies the preceding plants as aromatic substances. 'Of
    spices' is idiomatic and accessible, while still conveying fragrant materials.
- source_word: δέδωκα ὀσμήν
  chosen: I gave off fragrance
  alternatives:
  - I gave a smell
  - I emitted scent
  lexicon: LSJ
  rationale: The perfect verb with object literally means 'I have given smell,' but
    idiomatic English prefers 'gave off fragrance.' This preserves the sensory image
    without wooden phrasing.
- source_word: σμύρνα ἐκλεκτή
  chosen: choice myrrh
  alternatives:
  - select myrrh
  - finest myrrh
  lexicon: LSJ
  rationale: ἐκλεκτή means selected or choice. 'Choice myrrh' is concise and natural
    English.
- source_word: διέδωκα εὐωδίαν
  chosen: I spread a sweet smell
  alternatives:
  - I diffused fragrance
  - I spread fragrance
  lexicon: LSJ
  rationale: The verb suggests diffusion or spreading abroad. 'Sweet smell' captures
    εὐωδία's pleasant-fragrance sense in readable English.
- source_word: χαλβάνη
  chosen: galbanum
  alternatives:
  - aromatic gum
  lexicon: LSJ
  rationale: This is the standard English name for the resin. It also echoes the incense
    vocabulary familiar from biblical contexts.
- source_word: ὄνυξ
  chosen: onycha
  alternatives:
  - onyx
  - aromatic shell
  lexicon: LSJ
  rationale: In incense lists this term is traditionally understood as onycha, an
    aromatic ingredient, not the gemstone onyx. 'Onycha' avoids misleading readers.
- source_word: στακτή
  chosen: stacte
  alternatives:
  - liquid myrrh
  - aromatic resin
  lexicon: LSJ
  rationale: The term names a specific aromatic substance known from incense contexts.
    'Stacte' preserves the specificity better than a generic gloss.
- source_word: λίβανου ἀτμίς
  chosen: the vapor of frankincense
  alternatives:
  - the smoke of frankincense
  - the aroma of frankincense
  lexicon: LSJ
  rationale: ἀτμίς is literally vapor or exhalation. 'Vapor' is closer than 'smoke,'
    while still fitting the incense imagery.
- source_word: ἐν σκηνῇ
  chosen: in the tent
  alternatives:
  - in the tabernacle
  - in a tent
  lexicon: LSJ
  rationale: σκηνή literally means tent. In this cultic context it likely evokes the
    sacred tent/tabernacle, but the Greek itself says 'tent,' so the main text keeps
    the literal term and lets readers hear the imagery without over-specifying.
