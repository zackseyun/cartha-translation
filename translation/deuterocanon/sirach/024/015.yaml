translation:
  text: Like cinnamon and aspalathus, I gave forth a scent of spices, and like choice myrrh I spread a sweet fragrance, like galbanum and onycha and stacte, and like the smoke of frankincense in the tabernacle.
  philosophy: optimal-equivalence
