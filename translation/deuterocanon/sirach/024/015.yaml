- issue: Cultic reference of σκηνή
  chosen_reading: in the tent
  alternative_readings:
  - in the tabernacle
  rationale: The verse uses sanctuary-incense imagery. Because σκηνή can denote the tabernacle but literally means 'tent,' the main text preserves the literal wording while the alternative is noted. This follows the project's preference to preserve textual tension rather than resolve it unnecessarily.
