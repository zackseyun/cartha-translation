theological_decisions:
- issue: Divergence between Hebrew חָמָס ('violence') and Greek ψεῦδος ('falsehood/lie')
    in the first prohibition
  chosen_reading: 'Follow the Hebrew primary witness in the main text: ''Do not plot
    violence against a brother.'''
  alternative_readings:
  - Do not plow falsehood against your brother
  - Do not devise deceit against your brother
  rationale: For Sirach, surviving Hebrew is primary where extant. Here the Hebrew
    witness is marked high-confidence and validated, so it governs the main translation.
    The Greek parallel is still used as translation input and helps confirm the figurative
    force of the verb, but its object differs materially. Because the difference affects
    meaning, the Greek alternative is preserved in a footnote rather than silently
    ignored.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; DOCTRINE.md:
    preserve theological/interpretive tension rather than resolve it silently'
