translation:
  text: Do not devise violence against a brother, and likewise against a friend and
    companion together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Do not plow falsehood against your brother,'' that is, do not
      devise deceit against him.'
    reason: alternative_reading
lexical_decisions:
- source_word: תַּחֲרוֹשׁ
  chosen: plot
  alternatives:
  - plow
  - devise
  - scheme
  lexicon: HALOT
  rationale: The Hebrew verb literally means 'plow,' but in this idiom with an evil
    object it means to devise or scheme. 'Plot' captures the metaphorical sense in
    natural English while preserving intentionality. The Greek parallel's ἀροτρία
    ('plow') plus ψεῦδος shows a similar figurative construction, confirming an idiomatic
    sense rather than literal agriculture.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - outrage
  - injustice
  lexicon: HALOT
  rationale: The Hebrew commonly denotes violent wrong or injurious injustice. 'Violence'
    is the most direct rendering and fits the warning against harmful intent. Although
    the Greek parallel has ψεῦδος ('falsehood'/'lie'), the primary Hebrew witness
    is high-confidence and should govern; the Greek is best taken as a divergent rendering
    or Vorlage.
- source_word: עַל אָח
  chosen: against a brother
  alternatives:
  - against your brother
  - against a kinsman
  lexicon: HALOT
  rationale: אָח can mean literal brother or fellow member of one's community. 'A
    brother' preserves the Hebrew's gendered singular and representative force without
    over-specifying kinship. The Greek ἐπʼ ἀδελφῷ σου supports the relational sense.
- source_word: רֵעַ
  chosen: friend
  alternatives:
  - neighbor
  - companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. In this verse it is paired
    with חָבֵר, so rendering it as 'friend' helps preserve a distinction between the
    two near-synonyms rather than flattening both into one English term.
- source_word: חָבֵר
  chosen: companion
  alternatives:
  - associate
  - friend
  lexicon: HALOT
  rationale: Because רֵעַ already covers 'friend,' 'companion' gives the second term
    its own audible weight while reflecting the semantic overlap. The pair intensifies
    the prohibition across close social relationships.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - likewise
  - equally
  lexicon: HALOT
  rationale: The adverb literally means 'together.' In context it may function idiomatically
    to include both categories jointly or to intensify the parallelism. Retaining
    'together' stays close to the Hebrew, though the sense overlaps with 'likewise.'
    The Greek μηδὲ φίλῳ τὸ ὅμοιον ποίει points toward the idiomatic sense 'do the
    like,' which is reflected in the clause as a whole.
