translation:
  text: Do not despise a man in bitterness of spirit; remember that there is one who
    exalts and humbles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''there is one who raises up and humbles''; Greek parallel: ''there
      is one who humbles and exalts.'' The main text follows the Greek-supported order
      because it better fits the verse''s warning not to despise the distressed.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּבֶז
  chosen: Do not despise
  alternatives:
  - Do not scorn
  - Do not mock
  lexicon: HALOT
  rationale: The Hebrew verb בזה denotes treating someone with contempt. 'Despise'
    best captures contempt without narrowing the action to verbal ridicule. The Greek
    parallel καταγέλα could suggest 'mock/laugh at,' but the Hebrew witness is primary
    here, so 'despise' preserves the broader sense while remaining compatible with
    the Greek's warning against derision.
- source_word: לֶאֱנוֹשׁ
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: HALOT
  rationale: אֱנוֹשׁ commonly means 'man' in the sense of a human being, often with
    an emphasis on frailty. Per the project's gender-accurate philosophy, 'a man'
    is retained rather than neutralizing to 'person,' since the Hebrew is singular
    masculine with representative force.
- source_word: בְּמַר רוּחַ
  chosen: in bitterness of spirit
  alternatives:
  - when his spirit is bitter
  - in bitter distress
  lexicon: HALOT
  rationale: The phrase literally combines 'bitterness' with 'spirit.' 'In bitterness
    of spirit' preserves the Hebrew idiom and aligns with the Greek ἐν πικρίᾳ ψυχῆς
    αὐτοῦ, while remaining understandable in English.
- source_word: זְכוֹר
  chosen: remember
  alternatives:
  - keep in mind
  - recall
  lexicon: HALOT
  rationale: A straightforward imperative; 'remember' is both formal enough and natural
    in English.
- source_word: כִּי יֵשׁ
  chosen: that there is
  alternatives:
  - for there is
  - because there is
  lexicon: HALOT
  rationale: The clause introduces the reason for the prohibition. 'That there is'
    after 'remember' yields natural English while preserving the existential force
    of יֵשׁ.
- source_word: מֵרִים וּמַשְׁפִּיל
  chosen: one who humbles and exalts
  alternatives:
  - one who brings low and lifts up
  - one who raises up and brings down
  lexicon: HALOT
  rationale: The Hebrew as transmitted reads 'raises and humbles,' while the Greek
    parallel reads 'humbles and exalts.' Given the warning against despising the downcast,
    the Greek order better fits the sense and likely preserves the intended antithetical
    sequence. The English follows the Greek-supported sense while keeping the underlying
    Hebrew pair of divine reversal verbs. The alternative order is preserved in a
    footnote because the Hebrew witness is primary but marked with minor mismatch.
