theological_decisions:
- issue: Implicit subject of the one who reverses human status
  chosen_reading: Leave the subject implicit as 'one' rather than specifying God in
    the main text.
  alternative_readings:
  - '''the Lord who humbles and exalts'''
  - '''God humbles and exalts'''
  rationale: The Hebrew and Greek both imply a divine actor without naming God explicitly
    in this clause. To avoid importing a title not present in the text, the translation
    keeps the subject indefinite but clearly singular. The theological force of divine
    sovereignty over humiliation and exaltation is preserved without over-interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; never import
    doctrinal claims the text does not make.
