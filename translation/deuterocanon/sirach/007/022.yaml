translation:
  text: Do you have livestock? Keep your eye on it; and if it is profitable, keep
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'if it is אֻמָּנָה'; the exact nuance of the adjective is uncertain,
      but the Greek parallel reads 'useful,' which supports the rendering here.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'see [with] your eyes.' The sense is to watch over or inspect
      your livestock carefully.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהֵמָה
  chosen: livestock
  alternatives:
  - cattle
  - beast
  - animals
  lexicon: HALOT
  rationale: Hebrew בְּהֵמָה can denote domestic animals or beasts generally. In this
    wisdom context, and with the Greek κτήνη ('beasts of burden/livestock'), 'livestock'
    best captures owned domestic animals without narrowing too far to cattle alone.
- source_word: לְךָ
  chosen: Do you have
  alternatives:
  - for you
  - belonging to you
  - you have
  lexicon: HALOT
  rationale: The Hebrew phrase is verbless ('livestock to/for you'), functioning idiomatically
    as possession. English requires an explicit possessive construction; 'Do you have'
    fits the admonitory style and aligns with the Greek σοί ἐστιν.
- source_word: רְאֵה עֵינֶיךָ
  chosen: Keep your eye on them
  alternatives:
  - see with your eyes
  - watch them
  - look after them
  lexicon: HALOT
  rationale: Literally 'see [with] your eyes,' an idiom for attentive oversight. 'Keep
    your eye on them' preserves the concrete imagery while sounding natural in modern
    English. 'Look after them' is possible, but the Hebrew imagery and Greek ἐπισκέπτου
    support active inspection/oversight.
- source_word: אֻמָּנָה
  chosen: useful
  alternatives:
  - reliable
  - productive
  - profitable
  - well-trained
  lexicon: HALOT
  rationale: The Hebrew adjective is somewhat uncertain in nuance here; the Greek
    parallel χρήσιμα strongly supports the sense 'useful/serviceable.' This is preferable
    to 'faithful' or 'trained,' which would over-specify beyond the available evidence.
- source_word: הַעֲמִידָהּ
  chosen: keep them
  alternatives:
  - maintain it
  - preserve it
  - let it stand
  - keep it
  lexicon: HALOT
  rationale: From עמד in the causative, literally 'set/keep it standing.' In context
    the sense is to retain or maintain the animal(s). Because English has rendered
    the referent collectively as 'livestock... them,' 'keep them' gives the practical
    force clearly. The Greek ἐμμενέτω σοι likewise points to continued retention.
