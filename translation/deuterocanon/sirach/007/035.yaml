translation:
  text: Do not delay with those who weep, and mourn with those who mourn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek witness: ''Do not hesitate to visit the sick, for from such things
      you will be loved.'' This is a substantially different reading from the extant
      Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּתְאַחֵר
  chosen: Do not delay
  alternatives:
  - Do not be late
  - Do not hesitate
  - Do not tarry
  lexicon: HALOT
  rationale: The hitpael/imperfect with negative particle gives a prohibition against
    holding back or delaying. 'Do not delay' is natural modern English and preserves
    the urgency better than the more archaic 'do not tarry.'
- source_word: מִבּוֹכִים
  chosen: with those who weep
  alternatives:
  - from those who weep
  - among mourners
  - with the grieving
  lexicon: HALOT
  rationale: 'The Hebrew points to people in a state of crying/weeping. Given the
    parallel clause and the ethical exhortation, the sense is association/solidarity
    rather than separation, so English idiomatically renders the phrase as companionship:
    ''with those who weep.'' This also aligns with the Hebrew parallelism better than
    a literal ''from those who weep,'' which would invert the sense.'
- source_word: אֲבֵלִים
  chosen: those who mourn
  alternatives:
  - mourners
  - the bereaved
  - the grieving
  lexicon: HALOT
  rationale: The noun denotes mourners, especially those in mourning. 'Those who mourn'
    is clear, readable, and matches the verbal parallel in the second colon.
- source_word: תִּתְאַבָּל
  chosen: mourn
  alternatives:
  - grieve
  - show mourning
  - lament
  lexicon: HALOT
  rationale: The hitpael form expresses entering into mourning with others. 'Mourn'
    keeps the formal link with 'those who mourn' and preserves the exhortation to
    shared grief without overinterpreting the social setting.
