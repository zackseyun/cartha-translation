theological_decisions:
- issue: Whether to follow the Hebrew's unusual 'gates of God' or the Greek parallel's
    'multitude of a city' in the main text
  chosen_reading: Retain the Hebrew-oriented rendering 'assembly at the gates of God'
    in the main text
  alternative_readings:
  - Do not sin in the multitude of the city
  rationale: The project philosophy gives primacy to the surviving Hebrew of Sirach
    where available, while also using the Greek as a real input. Here the Hebrew is
    extant and high-confidence, though somewhat difficult. The Greek likely reflects
    either a variant Vorlage or an interpretive smoothing toward the familiar public
    setting of the city crowd. Because the Hebrew is the more original witness available
    for this verse, its wording is preserved in the main text, with the Greek-based
    alternative noted in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
