translation:
  text: Do not make yourself guilty in the assembly at the gates of God, and do not
    cast yourself down in the congregation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not sin in the multitude of the city, and do not cast
      yourself down in a crowd.'' This may reflect a different Hebrew reading or an
      interpretive smoothing of the Hebrew phrase ''gates of God.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּרְשִׁיעֲךָ
  chosen: Do not make yourself guilty
  alternatives:
  - Do not act wickedly
  - Do not condemn yourself
  - Do not sin
  lexicon: HALOT
  rationale: The Hiphil of רשע can mean to declare guilty or to make guilty/wicked.
    With the reflexive object suffix, the sense is best taken as bringing guilt upon
    oneself. The Greek parallel μὴ ἁμάρτανε supports a moral-fault sense ('do not
    sin'), but the Hebrew more specifically points to incurring guilt rather than
    generic sinning.
- source_word: בַּעֲדַת
  chosen: in the assembly
  alternatives:
  - among the assembly
  - in the council
  lexicon: HALOT
  rationale: עֵדָה commonly denotes an assembled group or congregation. 'Assembly'
    is natural English and preserves the corporate/public setting.
- source_word: שַׁעֲרֵי אֵל
  chosen: at the gates of God
  alternatives:
  - of the gates of God
  - in the city crowd
  - before God's gates
  lexicon: HALOT
  rationale: The Hebrew text literally reads 'gates of God,' an unusual phrase. It
    likely evokes the public/judicial setting of the city gates under divine oversight.
    The Greek has 'multitude of a city,' which may reflect a different Vorlage or
    interpretive rendering, but the Hebrew witness is primary here and should be represented
    in the main text.
- source_word: וְאַל תַּפִּילְךָ
  chosen: and do not cast yourself down
  alternatives:
  - and do not bring yourself down
  - and do not throw yourself away
  - and do not abase yourself
  lexicon: HALOT
  rationale: From נפל in Hiphil/reflexive-like usage, the phrase suggests causing
    oneself to fall or be brought low. 'Cast yourself down' preserves the metaphor
    of self-ruin without overinterpreting.
- source_word: בַּקְּהִלָּה
  chosen: in the congregation
  alternatives:
  - in the assembly
  - in the crowd
  lexicon: HALOT
  rationale: קְהִלָּה denotes an assembled community. 'Congregation' distinguishes
    it slightly from the first colon's עֵדָה while retaining the public communal sense.
    The Greek ἐν ὄχλῳ ('in a crowd') confirms a public-group setting.
