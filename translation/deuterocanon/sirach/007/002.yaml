translation:
  text: Do not sow furrows of injustice against a brother, lest you reap it sevenfold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally has 'reap him/it'; the suffix is ambiguous in isolation.
      The translation takes it as referring to the injustice sown, which best fits
      the sowing-and-reaping imagery.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel reads more generally, 'Turn away from injustice, and
      it will turn away from you,' reflecting a different form of the saying than
      the extant Hebrew.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - You shall not
  - Do not ever
  lexicon: HALOT
  rationale: Standard negative prohibition in Hebrew; simple imperative English best
    matches the wisdom-instruction style without unnecessary archaism.
- source_word: תִּזְרַע
  chosen: sow
  alternatives:
  - plant
  - scatter seed
  lexicon: HALOT
  rationale: The agricultural metaphor is explicit and should be preserved formally.
    'Sow' naturally pairs with the later 'reap' and keeps the proverb's imagery intact.
- source_word: חֲרוּשֵׁי
  chosen: furrows of
  alternatives:
  - plowings of
  - plots of
  - things plowed for
  lexicon: HALOT
  rationale: From a root associated with plowing/cutting the ground. In context with
    'sow' and 'reap,' 'furrows' best preserves the farming image and yields idiomatic
    English. The phrase is somewhat unusual, so a more literal agricultural term is
    preferable to flattening it into a generic 'deeds'.
- source_word: עָוֶל
  chosen: injustice
  alternatives:
  - wrongdoing
  - iniquity
  - evil
  lexicon: HALOT
  rationale: '''Injustice'' captures the moral and relational wrong implied by עָוֶל,
    especially in a context directed ''against a brother.'' ''Iniquity'' is too ecclesiastical
    here; ''evil'' is broader and less precise.'
- source_word: עַל אָח
  chosen: against a brother
  alternatives:
  - against your brother
  - upon a brother
  - toward a brother
  lexicon: HALOT
  rationale: The preposition here is adversative in context. 'Brother' is retained
    as gender-accurate and faithful to the Hebrew social term; adding 'your' would
    slightly over-specify what is not explicit in the text.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: Wisdom-style warning is compactly conveyed by 'lest,' which remains readable
    in modern English and preserves the cautionary force.
- source_word: תִּקְצְרֵהוּ
  chosen: you reap it
  alternatives:
  - you reap him
  - you harvest it
  - you reap them
  lexicon: HALOT
  rationale: The suffix is most naturally taken as referring back to the sown injustice/furrows
    rather than the brother. This keeps the sowing-reaping metaphor coherent. Because
    the Hebrew suffix could be construed differently in isolation, the alternative
    is worth preserving in a footnote.
- source_word: שִׁבְעָתָיִם
  chosen: sevenfold
  alternatives:
  - seven times
  - to the seventh degree
  lexicon: HALOT
  rationale: Idiomatic English for intensified recompense. 'Sevenfold' preserves the
    Hebrew numeric idiom and the wisdom tradition's use of seven as a figure of fullness/intensity.
