theological_decisions:
- issue: Referent of the pronominal suffix in תִּקְצְרֵהוּ
  chosen_reading: 'The object refers to the injustice sown: ''reap it sevenfold.'''
  alternative_readings:
  - 'The object refers to the brother: ''reap him sevenfold'''
  - 'The line may be generalized by the Greek parallel: ''Turn away from injustice,
    and it will turn away from you'''
  rationale: The Hebrew agricultural metaphor strongly favors an object tied to what
    was sown, and the immediate parallelism of sow/reap supports this. The Greek witness
    reflects a substantially different form of the saying and confirms the general
    moral sense but not the exact Hebrew imagery. Because the Hebrew suffix is compact
    and the Greek diverges, the alternative should be documented rather than erased.
  doctrine_reference: Translation philosophy §§1, 3, 4, 5
