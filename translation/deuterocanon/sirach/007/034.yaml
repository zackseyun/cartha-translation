translation:
  text: Give a gift before every living person, and do not withhold kindness even
    from the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, 'Do not fail those who weep, and mourn with those who mourn.'
      This reflects a substantially different textual tradition for this verse.
    reason: textual_variant
lexical_decisions:
- source_word: תֵּן
  chosen: Give
  alternatives:
  - Present
  - Offer
  lexicon: HALOT
  rationale: Imperative of נתן, straightforward command. 'Give' is the most natural
    modern English equivalent and preserves the directness of the Hebrew.
- source_word: מַתָּן
  chosen: a gift
  alternatives:
  - an offering
  - a present
  lexicon: HALOT
  rationale: Refers broadly to a gift or donation. 'Gift' is broad enough to fit the
    Hebrew without importing cultic overtones that 'offering' might suggest.
- source_word: לִפְנֵי כָל חָי
  chosen: in the presence of every living person
  alternatives:
  - before every living one
  - to every living person
  lexicon: HALOT
  rationale: Literally 'before every living [one].' The preposition לִפְנֵי is best
    preserved as 'in the presence of'/'before,' but in English 'in the presence of
    every living person' communicates the Hebrew idiom clearly. 'Every living person'
    makes explicit the human referent in context.
- source_word: וְגַם
  chosen: and
  alternatives:
  - and also
  - even
  lexicon: HALOT
  rationale: Connective with additive force. The following phrase already contains
    'even' in English to convey the emphasis, so a simple 'and' avoids redundancy
    while preserving the flow.
- source_word: מִמֵּת
  chosen: from the dead
  alternatives:
  - from a dead person
  - from one who has died
  lexicon: HALOT
  rationale: The singular collective sense is naturally rendered generically in English.
    'The dead' preserves the broad proverbial force and fits the parallel with 'every
    living person.'
- source_word: אַל תִּמְנַע
  chosen: do not withhold
  alternatives:
  - do not hold back
  - do not deny
  lexicon: HALOT
  rationale: מנע commonly means withhold or restrain. 'Do not withhold' is idiomatic
    and preserves the ethical force of the prohibition.
- source_word: חָסֶד
  chosen: kindness
  alternatives:
  - loyal love
  - mercy
  - steadfast love
  lexicon: HALOT
  rationale: In this wisdom context, חסד refers to concrete benevolence or faithful
    kindness shown to others, including burial or memorial obligations toward the
    dead. 'Kindness' is accessible and contextually apt; 'steadfast love' would sound
    overly covenantal here, and 'mercy' is narrower than the Hebrew.
