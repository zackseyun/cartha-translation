translation:
  text: Do not seek to become a ruler if you have no strength to put an end to insolence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, 'Do not justify yourself before the Lord, and before a king
      do not act wisely,' reflecting a substantially different form of the verse.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תְּבַקֵּשׁ
  chosen: Do not seek
  alternatives:
  - Do not desire
  - Do not strive for
  lexicon: HALOT
  rationale: The prohibition with בקש naturally means 'seek' or 'strive after.' 'Seek'
    is direct and idiomatic in English without overstating the nuance.
- source_word: לִהְיוֹת מוֹשֵׁל
  chosen: to become a ruler
  alternatives:
  - to be a ruler
  - to rule
  lexicon: HALOT
  rationale: מושל denotes one who rules or governs. The infinitive לִהְיוֹת plus participial/noun-like
    מושל is well represented by 'to become a ruler,' preserving the aspirational sense
    of the warning better than the flatter 'to rule.'
- source_word: חַיִל
  chosen: strength
  alternatives:
  - ability
  - power
  - resources
  lexicon: HALOT
  rationale: חיל can denote strength, capacity, valor, or resources. In this wisdom
    context, the point is practical capacity to govern effectively. 'Strength' keeps
    the Hebrew's force while remaining broad enough to include capability, not merely
    physical might.
- source_word: לְהַשְׁבִּית
  chosen: to put an end to
  alternatives:
  - to stop
  - to silence
  - to abolish
  lexicon: HALOT
  rationale: The Hiphil of שבת here means causing something to cease. 'Put an end
    to' is natural English and conveys decisive suppression more strongly than merely
    'stop.'
- source_word: זָדוֹן
  chosen: insolence
  alternatives:
  - arrogance
  - presumption
  - wickedness
  lexicon: HALOT
  rationale: זדון often refers to proud, presumptuous, or arrogant wrongdoing. 'Insolence'
    captures the social and moral dimension of overbearing pride that a ruler must
    restrain. 'Wickedness' is too broad, while 'arrogance' is possible but slightly
    less active in tone.
- source_word: μὴ δικαίου ἔναντι Κυρίου, καὶ παρὰ βασιλεῖ μὴ σοφίζου
  chosen: used as a secondary control, not followed in the main text
  alternatives:
  - Do not justify yourself before the Lord, and do not display wisdom before a king
  lexicon: BDAG
  rationale: The Greek parallel diverges sharply from the extant Hebrew and appears
    to reflect a different Vorlage or substantial textual development. Per project
    philosophy, the surviving Hebrew is primary for Sirach where available, but the
    Greek was consulted as an actual input and confirms that this verse has a notable
    textual divergence worth preserving in a footnote.
