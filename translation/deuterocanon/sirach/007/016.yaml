translation:
  text: Humble pride very much, for the hope of man is worms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel (Swete) reads: ''Do not count yourself among the multitude
      of sinners.'' This appears to reflect a different textual tradition rather than
      a small wording difference.'
    reason: textual_variant
lexical_decisions:
- source_word: מְאֹד מְאֹד
  chosen: very, very much
  alternatives:
  - greatly
  - utterly
  - exceedingly
  lexicon: HALOT
  rationale: The doubled adverb intensifies the imperative strongly. Retaining the
    repetition reflects the Hebrew emphasis rather than smoothing it away.
- source_word: הַשְׁפִּיל
  chosen: Humble
  alternatives:
  - bring low
  - abase
  lexicon: HALOT
  rationale: Hiphil imperative of שׁפל calls for active lowering. 'Humble' is concise
    and natural in English while preserving the imperative force.
- source_word: גַּאֲוָה
  chosen: pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: HALOT
  rationale: The noun denotes pride or exaltation of self. 'Pride' is the broad, standard
    rendering; 'arrogance' is possible but narrower and more interpretive.
- source_word: תִקְוַת
  chosen: the hope of
  alternatives:
  - the expectation of
  - the end of
  lexicon: HALOT
  rationale: תקוה normally means hope or expectation. Although the Greek parallel
    points in a different direction, the Hebrew witness here clearly reads 'the hope
    of,' so the translation follows the Hebrew while noting the Greek divergence in
    a footnote.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - a human being
  - mortal man
  - humankind
  lexicon: HALOT
  rationale: אֱנוֹשׁ emphasizes frail humanity, often an individual human in mortality.
    'Man' preserves the singular and the anthropological force; 'mortal man' would
    make the nuance more explicit but adds wording not present in the text.
- source_word: רִמָּה
  chosen: worms
  alternatives:
  - maggots
  - worm
  lexicon: HALOT
  rationale: The noun refers to worm/vermin associated with decay. English idiom prefers
    the plural in this kind of mortality saying, and it conveys the image of bodily
    corruption clearly.
