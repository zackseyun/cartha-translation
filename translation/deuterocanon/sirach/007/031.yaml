translation:
  text: Honor God and show honor to the priest, and give them their portion, as you
    were commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Fear the Lord and glorify the priest, and give him his
      portion, as it has been commanded you from the beginning,'' followed by a fuller
      list of priestly dues.'
    reason: alternative_reading
  - marker: b
    text: Hebrew has 'their portion' (plural), likely referring to the priests' allotted
      dues collectively; the Greek parallel smooths this to singular, 'his portion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּבֵּד
  chosen: Honor
  alternatives:
  - Glorify
  - Give honor to
  lexicon: HALOT
  rationale: The piel imperative of כבד commonly means to honor or give due weight.
    'Honor' is natural modern English and preserves the ethical force without over-specifying
    liturgical glorification.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Almighty
  - the Mighty One
  lexicon: HALOT
  rationale: The Hebrew has the generic divine title אל, best rendered simply 'God'
    here. The Greek parallel reads τὸν κύριον ('the Lord'), but the Hebrew witness
    is primary for this verse and supports 'God' rather than importing the Greek title
    into the main text.
- source_word: וַהֲדַר
  chosen: show honor
  alternatives:
  - honor
  - glorify
  - adorn
  lexicon: HALOT
  rationale: From הדר in the hifil/imparative-like form, the sense is to treat with
    honor or dignity. 'Show honor' avoids awkward repetition while preserving the
    semantic overlap with the first imperative.
- source_word: כֹּהֵן
  chosen: the priest
  alternatives:
  - a priest
  lexicon: HALOT
  rationale: The singular is generic/institutional, referring to the priestly office.
    English idiom favors 'the priest' for this representative singular.
- source_word: וְתֵן
  chosen: give
  alternatives:
  - pay
  - grant
  lexicon: HALOT
  rationale: A straightforward imperative; 'give' best matches the Hebrew and leaves
    the nature of the due portion to the following noun.
- source_word: חֶלְקָם
  chosen: their portion
  alternatives:
  - their share
  - their due portion
  lexicon: HALOT
  rationale: Though the immediately preceding noun is singular ('priest'), the suffix
    here is plural. 'Their portion' preserves the Hebrew form and naturally refers
    to the priestly dues collectively. The Greek singular αὐτῷ likely smooths the
    sense toward the representative singular priest.
- source_word: כַּאֲשֶׁר צֻוֵּיתָה
  chosen: as you were commanded
  alternatives:
  - as you have been commanded
  - as it was commanded you
  lexicon: HALOT
  rationale: The passive verbal form indicates prior command given to the addressee.
    'As you were commanded' is concise and idiomatic.
