theological_decisions:
- issue: Divine title in the main clause
  chosen_reading: Render Hebrew אֵל as 'God' in the main text
  alternative_readings:
  - Render according to Greek parallel as 'the Lord'
  rationale: The project gives primacy to the surviving Hebrew of Sirach where available.
    Since the Hebrew witness is clear here, the main text follows it. The Greek parallel
    is significant enough to preserve in a footnote as an alternative witness.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation
    tradition; Contested terms table for κύριος → Lord
- issue: Referent and number of the possessive in חֶלְקָם
  chosen_reading: Keep the plural sense with 'their portion'
  alternative_readings:
  - 'Smooth to singular: ''his portion'''
  - Interpret collectively as 'the priest's due'
  rationale: The Hebrew suffix is plural and should be represented unless context
    compels smoothing. Because the verse addresses honor toward the priestly office
    and dues owed to priests, the plural can naturally stand in English. The Greek
    singular likely reflects interpretive smoothing rather than requiring a singular
    translation from the Hebrew.
  doctrine_reference: Translation philosophy §5, Consistency of key terms, or documented
    exception
