translation:
  text: Do not do evil, and evil will not overtake you; keep far from iniquity, and
    it will turn away from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''harm''/''calamity'' in the second clause: ''Do not do evil, and harm
      will not overtake you.'' The Hebrew repeats the same word, and the Greek likewise
      has ''evil'' in both places.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is concise in Hebrew and may also be understood as 'and
      it will depart from you.' The sense is that distancing yourself from iniquity
      causes its danger or effect to turn aside.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּעַשׂ
  chosen: Do not do
  alternatives:
  - Do not commit
  - Do not practice
  lexicon: HALOT
  rationale: The Hebrew prohibition with עשה is straightforwardly verbal ('do/make').
    'Do not do' preserves the directness of the imperative without adding the more
    specialized moral nuance of 'commit' or the habitual sense of 'practice'.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - wrong
  lexicon: HALOT
  rationale: The noun appears twice in a moral warning. 'Evil' best preserves the
    ethical force in both clauses and aligns with the Greek κακά/κακόν. 'Harm' would
    shift the first occurrence away from moral evil, though the second occurrence
    can include resulting calamity; the parallelism supports retaining the same English
    term.
- source_word: יַשִּׂיגְךָ
  chosen: will not overtake you
  alternatives:
  - will not reach you
  - will not seize you
  lexicon: HALOT
  rationale: The verb נשׂג in this context conveys catching up with or overtaking.
    'Overtake you' is idiomatic English and matches the warning that evil consequences
    pursue the evildoer. The Greek καταλάβῃ likewise supports the sense of overtaking/seizing.
- source_word: הַרְחֵק
  chosen: keep far from
  alternatives:
  - distance yourself from
  - stay away from
  lexicon: HALOT
  rationale: The imperative calls for active separation. 'Keep far from' preserves
    the spatial metaphor of the Hebrew while remaining natural English. It also pairs
    well with the following promise.
- source_word: מֵעָוֹן
  chosen: from iniquity
  alternatives:
  - from sin
  - from guilt
  - from wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. Here
    the exhortational context favors the moral sense. 'Iniquity' preserves the weight
    of the term without flattening it to the broader 'wrongdoing.'
- source_word: וְיֵט מִמְּךָ
  chosen: and it will turn away from you
  alternatives:
  - and it will depart from you
  - and he will turn it away from you
  lexicon: HALOT
  rationale: The most natural reading is that the danger associated with iniquity/evil
    turns aside from the person who keeps away from it. 'It will turn away from you'
    preserves the Hebrew's concise ambiguity and avoids over-specifying the subject.
    This also fits the Greek parallel's logic in the first colon.
