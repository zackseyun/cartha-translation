theological_decisions:
- issue: Moral evil versus calamity in the repeated רָעָה
  chosen_reading: Render both occurrences as 'evil' in the main text
  alternative_readings:
  - Render the second occurrence as 'harm' or 'calamity'
  rationale: 'The Hebrew and Greek both repeat the same root/term, creating a deliberate
    moral-consequence parallel: do not do evil, and evil will not overtake you. While
    the second instance may imply harmful consequence, preserving ''evil'' keeps the
    rhetorical symmetry visible and avoids importing a more interpretive distinction
    not explicit in the text.'
