translation:
  text: Marry off a daughter, and the matter will be settled; and give her to an intelligent
    man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'and the matter will go out'; the sense is that the concern is concluded.
      The Greek parallel reads more explicitly, 'and you will have completed a great
      task.'
    reason: alternative_reading
  - marker: b
    text: Or 'give her in marriage to a prudent man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצֵא
  chosen: Marry off
  alternatives:
  - Give in marriage
  - Send out
  lexicon: HALOT
  rationale: The Hebrew literally means 'bring out/send out,' but in context with
    'daughter' and confirmed by the Greek ἔκδου, it idiomatically refers to giving
    a daughter in marriage. 'Marry off' is natural modern English while preserving
    the parental action implied by the source.
- source_word: בַת
  chosen: a daughter
  alternatives:
  - your daughter
  lexicon: HALOT
  rationale: The noun is indefinite in form here. English idiom prefers 'a daughter'
    in proverbial instruction. 'Your daughter' is possible as an interpretive expansion,
    but the Hebrew does not require the possessive.
- source_word: וְיֵצֵא
  chosen: will be settled
  alternatives:
  - will go out
  - will come to an end
  - will turn out
  lexicon: HALOT
  rationale: Literally 'and it will go out/come out.' In this wisdom context, paired
    with עֵסֶק, the sense is that the business or concern is concluded. The Greek
    renders the line more expansively ('you will have completed a great task'), supporting
    a sense of completion rather than motion.
- source_word: עֵסֶק
  chosen: the matter
  alternatives:
  - business
  - concern
  - task
  lexicon: HALOT
  rationale: The Hebrew term can denote business, occupation, or matter/affair. Here
    it refers to the parental concern associated with arranging a daughter's marriage.
    'The matter' is concise and idiomatic; the Greek's 'a great work' reflects an
    interpretive equivalent rather than requiring 'task' in English.
- source_word: גֶּבֶר
  chosen: man
  alternatives:
  - husband
  - male
  lexicon: HALOT
  rationale: The Hebrew specifically denotes a man. In context it refers to the prospective
    husband, but 'man' preserves the source wording while allowing the phrase 'give
    her to an intelligent man' to carry the marital sense.
- source_word: נָבוֹן
  chosen: intelligent
  alternatives:
  - understanding
  - sensible
  - prudent
  lexicon: HALOT
  rationale: The adjective denotes discernment and understanding. 'Intelligent' is
    readable modern English, though 'prudent' or 'sensible' are possible. The Greek
    συνετός likewise points to a discerning, sensible man.
- source_word: חַבְּרָהּ
  chosen: give her
  alternatives:
  - join her
  - match her
  - marry her
  lexicon: HALOT
  rationale: From the root חבר, the form suggests joining/attaching her to someone.
    In marriage context, 'give her' is the clearest idiomatic English and aligns with
    the Greek δώρησαι/ἔκδου tradition of giving in marriage.
