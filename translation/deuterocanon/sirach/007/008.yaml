theological_decisions:
- issue: Whether to render the final clause in forensic terms ('be acquitted') or
    penal terms ('go unpunished')
  chosen_reading: go unpunished
  alternative_readings:
  - be acquitted
  - be cleared
  rationale: The verse warns against repeating sin because even a single sin does
    not escape consequences. The Hebrew and Greek can support forensic language, but
    the wisdom context favors the practical warning of punishment. The forensic alternatives
    are preserved in a footnote.
