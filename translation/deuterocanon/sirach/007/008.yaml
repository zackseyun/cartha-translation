translation:
  text: Do not bind sin a second time, for even in one you will not go unpunished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you will not be acquitted' or 'you will not be cleared.' The Hebrew
      and Greek can carry a forensic sense as well as the idea of not escaping punishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - You shall not
  lexicon: HALOT
  rationale: Standard negative prohibition in Hebrew; imperative force is best conveyed
    in direct modern English as 'Do not'.
- source_word: תִּקְשׁוֹר
  chosen: bind
  alternatives:
  - tie
  - fasten
  - commit
  lexicon: HALOT
  rationale: The Hebrew verb literally means 'bind/tie.' The Greek parallel καταδεσμεύσῃς
    likewise supports 'bind fast.' Retaining the metaphor preserves the source image
    better than an interpretive gloss like 'commit'.
- source_word: לְשָׁנוֹת
  chosen: a second time
  alternatives:
  - twice
  - again
  lexicon: HALOT
  rationale: The infinitive from שנה here indicates repetition. 'A second time' is
    slightly more explicit and natural in English than the compressed 'twice,' while
    matching the Hebrew and Greek sense.
- source_word: חֵטְ
  chosen: sin
  alternatives:
  - offense
  - wrongdoing
  lexicon: HALOT
  rationale: The noun denotes sin/offense. 'Sin' is the most direct and theologically
    transparent rendering, and it aligns with the Greek ἁμαρτίαν.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition; 'for' preserves the concise
    causal connection of the Hebrew.
- source_word: בְאַחַת
  chosen: even in one
  alternatives:
  - for one
  - with one sin
  - in one instance
  lexicon: HALOT
  rationale: The Hebrew literally says 'in one,' echoed by Greek ἐν γὰρ τῇ μιᾷ. The
    sense is that even a single sin does not escape judgment. 'Even in one' preserves
    the terse comparative force without over-paraphrasing.
- source_word: לֹא תִנָּקֶה
  chosen: you will not go unpunished
  alternatives:
  - you will not be acquitted
  - you will not be innocent
  - you will not be cleared
  lexicon: HALOT
  rationale: The Niphal of נקה can mean 'be clean, be acquitted, go unpunished.' In
    this wisdom context, the practical sense of escaping penalty is primary. 'Go unpunished'
    is idiomatic and matches the warning tone, while the acquittal nuance is preserved
    as an alternative.
