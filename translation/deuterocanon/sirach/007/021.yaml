translation:
  text: Love an intelligent slave as yourself, and do not withhold freedom from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew ''intelligent''; the Greek parallel reads ''good'': ''Love a good
      servant/slave as yourself.'''
    reason: alternative_reading
lexical_decisions:
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: The Hebrew denotes a bonded servant/slave. Given the following reference
    to granting freedom, the bonded status is explicit and salient, so 'slave' better
    reflects the source than the softer 'servant.' The Greek parallel οἰκέτην could
    be rendered 'household servant,' but the Hebrew witness is primary here and the
    context confirms servile status.
- source_word: מַשְׂכִּיל
  chosen: intelligent
  alternatives:
  - prudent
  - wise
  - skillful
  lexicon: HALOT
  rationale: The term describes one who has understanding or acts with insight. 'Intelligent'
    is concise and natural in English, while preserving the sense of discernment.
    The Greek parallel ἀγαθόν ('good') reflects a looser or variant rendering, but
    the Hebrew reading is well attested in the primary witness and should govern the
    main text.
- source_word: חַבֵּב
  chosen: love
  alternatives:
  - hold dear
  - cherish
  lexicon: HALOT
  rationale: The imperative calls for genuine affection or esteem. 'Love' matches
    the force of the command and is supported by the Greek ἀγαπάτω. 'Cherish' is possible
    but slightly narrower and less direct.
- source_word: כְּנֶפֶש
  chosen: as yourself
  alternatives:
  - like your own soul
  - as your own life
  lexicon: HALOT
  rationale: Literally 'like a soul/self,' an idiomatic comparison of personal regard.
    'As yourself' communicates the idiom naturally in modern English while preserving
    the ethical force. A more literal rendering would be understandable but less idiomatic.
- source_word: וְאַל תִּמְנַע
  chosen: and do not withhold
  alternatives:
  - and do not deny
  - and do not keep back
  lexicon: HALOT
  rationale: The verb means to hold back or prevent from receiving. 'Do not withhold'
    is idiomatic and fits the object 'freedom' well. The Greek μὴ στερήσῃς likewise
    supports the sense of depriving or withholding.
- source_word: חֹפֶשׁ
  chosen: freedom
  alternatives:
  - liberty
  - manumission
  lexicon: HALOT
  rationale: The noun denotes release into free status. 'Freedom' is clear, modern,
    and faithful. 'Liberty' is possible but slightly elevated; 'manumission' is precise
    but too technical for the translation text.
