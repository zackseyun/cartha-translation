translation:
  text: Do not seek authority from God, nor from the king a seat of honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness here reads a different saying: ''Son, do not sow in furrows
      of injustice, and you will not reap them sevenfold.'' The main text follows
      the extant Hebrew witness for Sirach at this verse.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תְּבַקֵּשׁ
  chosen: Do not seek
  alternatives:
  - Do not ask for
  - Do not pursue
  lexicon: HALOT
  rationale: בקש commonly means to seek, ask for, or desire. 'Seek' preserves both
    the volitional and aspirational sense without over-specifying a verbal request.
- source_word: מֵאֵל
  chosen: from God
  alternatives:
  - from God Almighty
  - from God himself
  lexicon: HALOT
  rationale: אֵל here is the common Semitic term for God. 'From God' is the plain
    sense and avoids importing a more specific divine title not present in the Hebrew.
- source_word: מֶמְשֶׁלַת
  chosen: authority
  alternatives:
  - rule
  - dominion
  - governance
  lexicon: HALOT
  rationale: ממשלה denotes rule, dominion, or governing authority. 'Authority' fits
    the admonitory context well in English and avoids implying only territorial kingship;
    it can include office or power more broadly.
- source_word: וְכֵן
  chosen: nor
  alternatives:
  - and likewise
  - and so also
  lexicon: HALOT
  rationale: Literally 'and likewise/so too,' but in coordinated prohibition English
    idiom is best served by 'nor,' which preserves the parallel negative force of
    the second clause.
- source_word: מִמֶּלֶךְ
  chosen: from the king
  alternatives:
  - from a king
  lexicon: HALOT
  rationale: The preposition מן is straightforwardly 'from.' The singular 'the king'
    works generically here, matching the Hebrew form while remaining idiomatic.
- source_word: מוֹשַׁב כָּבוֹד
  chosen: a seat of honor
  alternatives:
  - an honored seat
  - a place of honor
  - a glorious seat
  lexicon: HALOT
  rationale: מוֹשב is a seat, sitting place, or position; כבוד adds the sense of honor
    or glory. 'A seat of honor' is natural English and preserves the image of an elevated
    position granted by royal favor.
