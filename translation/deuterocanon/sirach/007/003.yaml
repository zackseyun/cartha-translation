theological_decisions:
- issue: Relationship between the Hebrew and Greek witnesses for this verse
  chosen_reading: Translate the extant Hebrew as the primary text, while noting that
    the Greek parallel reflects a substantially different verse.
  alternative_readings:
  - Son, do not sow in furrows of injustice, and you will not reap them sevenfold.
  rationale: For Sirach, the project translates from the Hebrew where it survives.
    Here the Hebrew witness gives an admonition against seeking rule and honor, while
    the supplied Greek parallel preserves a different saying. Because the divergence
    is material, the main text follows the Hebrew and the Greek is preserved in a
    footnote as an alternative witness rather than harmonized into the translation.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly'
