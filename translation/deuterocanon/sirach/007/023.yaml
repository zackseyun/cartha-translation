translation:
  text: Do you have sons? Discipline them, and get wives for them in their youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do you have children? Discipline them, and bend their
      neck from youth.'' The Hebrew witness instead reads, ''...and get wives for
      them in their youth.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew masculine plural ordinarily means 'sons' here, and the following
    instruction about getting wives for them confirms male children specifically rather
    than children in general. This follows the gender-accurate principle.
- source_word: יַסֵּר
  chosen: discipline
  alternatives:
  - chasten
  - correct
  - train
  lexicon: HALOT
  rationale: The verb יסר carries the sense of corrective instruction or discipline.
    'Discipline' preserves both correction and training without sounding archaic like
    'chasten'.
- source_word: וְשָׂא לָהֶם נָשִׁים
  chosen: get wives for them
  alternatives:
  - marry wives to them
  - take wives for them
  - arrange wives for them
  lexicon: HALOT
  rationale: The Hebrew idiom with נשׂא plus נשים refers to securing marriage. In
    English, 'get wives for them' best captures the parental arranging function implied
    by the Hebrew. The Greek parallel instead reads 'bend their neck from youth,'
    showing a different Vorlage or interpretive tradition, but the extant Hebrew witness
    is the primary source here.
- source_word: בִּנְעוּרֵיהֶם
  chosen: in their youth
  alternatives:
  - while they are young
  - from their youth
  lexicon: HALOT
  rationale: The phrase naturally means during their youthful years. 'In their youth'
    is concise and idiomatic. The Greek parallel has 'from youth' attached to the
    neck-bending clause, but with the Hebrew wording this phrase modifies the marriage
    instruction.
