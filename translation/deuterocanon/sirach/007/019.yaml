translation:
  text: Do not despise an intelligent wife, for her graciousness is better than pearls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Do not miss a wise and good woman, for her grace is beyond gold.''
      The Hebrew reads ''pearls'' (or another precious jewel) where the Greek has
      ''gold.'''
    reason: alternative_reading
  - marker: b
    text: Or 'a prudent wife' / 'a wise wife.' The Hebrew term emphasizes insight
      or good sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּמְאַס
  chosen: Do not despise
  alternatives:
  - Do not reject
  - Do not disdain
  lexicon: HALOT
  rationale: מָאַס commonly carries the sense of rejecting or despising. 'Despise'
    best fits the admonitory tone and the relational context, warning against treating
    such a wife with contempt rather than merely declining her.
- source_word: אִשָּׁה מַשְׁכֶּלֶת
  chosen: an intelligent wife
  alternatives:
  - a prudent wife
  - a wise wife
  - an understanding wife
  lexicon: HALOT
  rationale: The Hebrew participial/adjectival form from שכל points to insight, prudence,
    or intelligence. 'Intelligent' preserves the cognitive emphasis of the Hebrew,
    while the Greek parallel σοφῆς and ἀγαθῆς confirms a commendatory sense of wisdom/quality.
    'Wife' is retained rather than 'woman' because in this wisdom context the line
    most naturally concerns one's spouse, and the Greek γυναικός can also bear that
    sense.
- source_word: וְטוֹבַת חֵן
  chosen: for her graciousness is better
  alternatives:
  - and one good in grace is better
  - and charm of goodness is better
  - and favor is better
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat compressed. Taken idiomatically, it praises
    the woman's grace/charm/favor. The Greek parallel 'for her grace is beyond gold'
    supports reading the clause as referring to her gracious quality. 'Graciousness'
    avoids reducing חֵן to mere physical charm and fits wisdom literature's valuation
    of attractive character.
- source_word: מִפְּנִינִים
  chosen: than pearls
  alternatives:
  - than corals
  - than precious stones
  - than rubies
  lexicon: HALOT
  rationale: פְּנִינִים in wisdom texts denotes a precious luxury item, often rendered
    'pearls' or 'rubies.' 'Pearls' is a common and defensible rendering in this context.
    The Greek parallel has 'gold,' indicating a differing valuation image in the Greek
    tradition, so a footnote preserves that alternative witness.
