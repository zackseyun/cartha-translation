theological_decisions:
- issue: Referent of אִשָּׁה in wisdom admonition
  chosen_reading: wife
  alternative_readings:
  - woman
  rationale: The Hebrew can mean either 'woman' or 'wife,' but in a sequence of household
    and relational instructions, 'wife' is the more contextually specific and natural
    reading. This is not a doctrinally loaded choice, but it affects the social scope
    of the command and should be documented.
  doctrine_reference: Gender-accurate over gender-neutral; consistency of key terms,
    or documented exception.
