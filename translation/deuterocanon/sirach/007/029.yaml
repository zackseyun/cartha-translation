translation:
  text: With all your heart fear God, and sanctify his priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sanctify his priests'' more literally; the Greek parallel reads
      ''marvel at'' or ''hold in awe'' his priests. The main text renders the shared
      sense as ''honor his priests.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכָל לִבְּך
  chosen: with all your heart
  alternatives:
  - with your whole heart
  - with all your mind
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'heart' for the inner person/will. 'With
    all your heart' is a natural and faithful English rendering. The Greek parallel
    has 'with all your soul,' confirming the sense of total devotion rather than a
    narrowly emotional meaning.
- source_word: פְּחַד
  chosen: fear
  alternatives:
  - revere
  - stand in awe of
  lexicon: HALOT
  rationale: The verb denotes fearing or standing in dread/awe. 'Fear' preserves the
    biblical wisdom register and the moral-religious weight of the command. The Greek
    εὐλαβοῦ suggests reverent fear, but the Hebrew witness is primary here, so 'fear'
    is retained rather than softened to 'revere'.
- source_word: אִל
  chosen: God
  alternatives:
  - the Mighty One
  lexicon: HALOT
  rationale: The Hebrew divine title אל is best rendered simply 'God' in this context.
    'The Mighty One' is possible etymologically but would sound marked in English
    and is not required by the context.
- source_word: כֹּהֲנָיו
  chosen: his priests
  alternatives:
  - the priests
  - his priesthood
  lexicon: HALOT
  rationale: The suffix is explicit in Hebrew and matches the Greek αὐτοῦ. 'His priests'
    preserves the possessive relation to God and keeps the plural concrete.
- source_word: הַקְדִישׁ
  chosen: honor
  alternatives:
  - sanctify
  - treat as holy
  - show honor to
  lexicon: HALOT
  rationale: The Hiphil of קדשׁ literally means 'make holy' or 'treat as holy.' In
    English, when the object is priests, the idiomatic sense is to accord them sacred
    honor or due respect. The Greek parallel θαύμαζε points toward honoring/holding
    in esteem rather than a technical act of consecration, so 'honor' best captures
    the intended force without wooden awkwardness.
