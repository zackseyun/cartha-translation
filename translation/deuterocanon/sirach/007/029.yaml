theological_decisions:
- issue: Rendering the imperative toward priests without overstating sacerdotal theology
  chosen_reading: and honor his priests
  alternative_readings:
  - and sanctify his priests
  - and hold his priests in awe
  rationale: The Hebrew could be rendered more literally as 'sanctify his priests,'
    but in English that may imply conferring holiness on them rather than recognizing
    their consecrated status. The Greek parallel supports an esteem/honor sense. 'Honor
    his priests' preserves the exhortation to respect the priesthood without importing
    later doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
