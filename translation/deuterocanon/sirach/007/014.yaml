translation:
  text: Do not chatter in the assembly of rulers, and do not repeat a word in your
    prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not prattle' or 'do not talk excessively.' The Greek parallel likewise
      warns against idle or excessive speech among elders.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'do not repeat a word in your prayer.' This likely warns against
      redundant or mechanical repetition, not every form of repeated petition.
    reason: alternative_reading
lexical_decisions:
- source_word: תְּסַוֵּר
  chosen: chatter
  alternatives:
  - prattle
  - babble
  - talk excessively
  lexicon: HALOT
  rationale: The Hebrew verb here, supported by the Greek parallel μὴ ἀδολέσχει, conveys
    excessive or idle talk rather than simply 'speak.' 'Chatter' captures the warning
    against verbose, undisciplined speech in a public setting without sounding archaic.
- source_word: בַּעֲדַת
  chosen: in the assembly of
  alternatives:
  - in the council of
  - among the gathering of
  lexicon: HALOT
  rationale: עֵדָה commonly denotes an assembly or gathered body. 'Assembly' is natural
    English and fits a formal public context.
- source_word: שָׂרִים
  chosen: rulers
  alternatives:
  - princes
  - officials
  - leaders
  lexicon: HALOT
  rationale: שָׂרִים refers to persons of rank or authority. 'Rulers' best reflects
    the governing or high-status setting; 'princes' would sound too narrow or monarchical
    in English.
- source_word: תִּישֶׁן דָּבָר
  chosen: repeat a word
  alternatives:
  - say a thing twice
  - double a word
  lexicon: HALOT
  rationale: The Hebrew idiom is difficult in isolation, but the Greek parallel μὴ
    δευτερώσῃς λόγον strongly supports the sense 'do not repeat a word/speech.' This
    likely warns against repetitive verbosity in prayer rather than forbidding all
    persistence in prayer.
- source_word: בַּתְּפִלָּה
  chosen: in your prayer
  alternatives:
  - in prayer
  - while praying
  lexicon: HALOT
  rationale: The Greek explicitly has 'in your prayer' (ἐν προσευχῇ σου), which helps
    specify the likely sense of the Hebrew phrase. Including 'your' yields a more
    precise and personal rendering consistent with the parallel source.
