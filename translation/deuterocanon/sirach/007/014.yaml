theological_decisions:
- issue: Whether the prohibition in the second colon condemns all repeated prayer
    or specifically empty/redundant repetition
  chosen_reading: It warns against repeating words in a verbose or mechanical way
    during prayer, not against all earnest persistence in prayer.
  alternative_readings:
  - It forbids any repetition in prayer.
  - It broadly warns against multiplying words before God.
  rationale: The Hebrew plus Greek parallel point to repetition of speech, but wisdom-context
    and the lexical force suggest a critique of wordy redundancy rather than a doctrinal
    ban on repeated petitions. The translation stays close to the wording while avoiding
    an interpretive expansion in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
