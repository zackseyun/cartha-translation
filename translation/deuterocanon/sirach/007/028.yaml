translation:
  text: Remember that if not for them, you would not have come into the world; and
    what can you do for them as they have done for you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, your parents; the pronoun is implicit from the surrounding context.
    reason: cross_reference
  - marker: b
    text: Or, more literally, 'what will you repay them as they [have done] to you?'
      The Greek explicitly frames the question in terms of repayment.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכוֹר
  chosen: Remember
  alternatives:
  - Keep in mind
  - Recall
  lexicon: HALOT
  rationale: Imperative of זכר, calling for active remembrance. 'Remember' is the
    most direct and natural English equivalent.
- source_word: לוּלֵי הֵם
  chosen: if not for them
  alternatives:
  - were it not for them
  - without them
  lexicon: HALOT
  rationale: The Hebrew idiom expresses counterfactual dependence. 'If not for them'
    is idiomatic modern English and matches the sense confirmed by the Greek διʼ αὐτῶν.
- source_word: לֹא בָאתָ לָעוֹלָם
  chosen: you would not have come into the world
  alternatives:
  - you would not have been born
  - you would not have come into being
  lexicon: HALOT
  rationale: Literally 'you did not come into the world.' The context is filial obligation
    to parents, so the sense is birth/existence through them. 'Come into the world'
    preserves the Hebrew wording while remaining clear.
- source_word: וּמָה אַתָּה עוֹשֶׂה לָהֶם
  chosen: what can you do for them
  alternatives:
  - what are you doing for them
  - what will you do for them
  lexicon: HALOT
  rationale: The Hebrew can be read as a present rhetorical question, but in context
    it asks what repayment is possible. The Greek ἀνταποδώσεις ('will you repay/return')
    clarifies the sense of recompense, so 'can you do' brings out the rhetorical force
    without overtranslating.
- source_word: שֶׁהֵם גּוֹמְלִים לָךְ
  chosen: equal to what they have done for you
  alternatives:
  - as they repay you
  - as they have dealt with you
  - what they have bestowed on you
  lexicon: HALOT
  rationale: גמל can mean deal with, repay, or requite. Here, with the Greek καθὼς
    αὐτοί σοι and the parental context, the point is proportional return for their
    benefaction in giving life and care. 'Equal to what they have done for you' expresses
    the comparative sense naturally in English.
