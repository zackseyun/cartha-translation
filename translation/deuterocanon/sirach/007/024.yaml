theological_decisions:
- issue: Ethical force of the parental warning
  chosen_reading: Retain the concrete idiom about the face rather than interpretively
    flattening it into 'do not be indulgent.'
  alternative_readings:
  - do not be indulgent toward them
  - do not pamper them
  rationale: This is not a major doctrinal crux, but it is ethically sensitive. Preserving
    the idiom avoids importing a more specific modern parenting theory than the text
    itself states, while a footnote can clarify the likely sense of undue softness
    or favoritism.
  doctrine_reference: Translation philosophy §§1, 3, 6
