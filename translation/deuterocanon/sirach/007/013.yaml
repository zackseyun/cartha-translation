translation:
  text: Do not desire to repeat a lie, for its end is not pleasant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'do not desire to lie upon falsehood'; the phrase likely
      means adding lie to lie or repeating falsehood. The Greek parallel reads 'do
      not want every lie,' supporting the broader sense of practicing falsehood.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - You shall not
  - Never
  lexicon: HALOT
  rationale: Standard negative prohibition introducing an admonition.
- source_word: תַּחְפֹּץ
  chosen: desire
  alternatives:
  - delight in
  - take pleasure in
  - wish
  lexicon: HALOT
  rationale: חפץ denotes desire or taking pleasure. 'Desire' preserves the volitional
    nuance without sounding archaic.
- source_word: לְכַחֵש
  chosen: to repeat a lie
  alternatives:
  - to lie
  - to deny falsely
  - to practice falsehood
  lexicon: HALOT
  rationale: The Hebrew infinitive from כחש can mean to lie or deal falsely. In this
    collocation with עַל כָּחַש and in light of the Greek πᾶν ψεῦδος ('every lie'),
    the sense is not merely a single false statement but engaging in falsehood again/continually.
    'Repeat a lie' captures the Hebrew prepositional phrase and the Greek's emphasis
    on repeated falsehood.
- source_word: עַל כָּחַש
  chosen: repeat a lie
  alternatives:
  - lie upon lie
  - falsehood upon falsehood
  - every lie
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic. Literally it suggests 'upon falsehood,'
    i.e., adding falsehood to falsehood. The Greek parallel supports an expansive
    sense ('every lie'). 'Repeat a lie' gives clear English while reflecting the cumulative
    force.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition.
- source_word: תִקְוָתוֹ
  chosen: its outcome
  alternatives:
  - its hope
  - its expectation
  - its end
  lexicon: HALOT
  rationale: The Hebrew noun usually means 'hope' or 'expectation,' but with an inanimate
    antecedent ('falsehood') English 'its hope' is awkward. The Greek ἐνδελεχισμός
    points toward the result or persistence of the practice. 'Its outcome' communicates
    the practical sense of what falsehood leads to.
- source_word: לֹא תִנְעָם
  chosen: is not good
  alternatives:
  - will not be pleasant
  - will not be sweet
  - will not prosper
  lexicon: HALOT
  rationale: נעם literally concerns pleasantness or sweetness. The Greek has οὐκ εἰς
    ἀγαθόν ('not for good'), which broadens the sense from pleasantness to beneficial
    result. 'Is not good' best reflects the combined Hebrew-Greek evidence in natural
    English.
