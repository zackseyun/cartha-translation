translation:
  text: With all your strength, love your Maker, and do not forsake his ministers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with all your might' or 'with all your power.'
    reason: lexical_alternative
  - marker: b
    text: '''His ministers'' may refer more specifically to those who serve God in
      sacred or temple service; alternatively, ''his servants.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכָל מְאֹדְךָ
  chosen: with all your strength
  alternatives:
  - with all your might
  - with all your power
  lexicon: HALOT
  rationale: Hebrew מְאֹד in this idiom denotes one's full strength or might; the
    Greek parallel ἐν ὅλῃ δυνάμει confirms the sense of total strength. 'Strength'
    is natural modern English and preserves the allusion to wholehearted devotion.
- source_word: אֱהוֹב
  chosen: love
  alternatives:
  - show love to
  lexicon: HALOT
  rationale: Straightforward imperative of אהב. 'Love' is the direct and sufficient
    rendering.
- source_word: עוֹשֶׂךָ
  chosen: your Maker
  alternatives:
  - the one who made you
  - your creator
  lexicon: HALOT
  rationale: The participial form literally means 'the one making/made you.' 'Your
    Maker' is concise, idiomatic, and preserves the personal creator relation. The
    Greek τὸν ποιήσαντά σε supports this sense.
- source_word: מְשָׁרְתָיו
  chosen: his ministers
  alternatives:
  - his servants
  - those who serve him
  - his attendants
  lexicon: HALOT
  rationale: From שרת, those who minister or serve in an official/cultic capacity.
    The Greek λειτουργούς αὐτοῦ points specifically to ministers/servants in sacred
    service. 'Ministers' best captures the likely temple/cultic nuance without over-paraphrasing.
- source_word: לֹא תַעֲזֹב
  chosen: do not forsake
  alternatives:
  - do not abandon
  - do not neglect
  lexicon: HALOT
  rationale: עזב commonly means leave, forsake, abandon. 'Do not forsake' preserves
    the moral force and matches the Greek μὴ ἐγκαταλίπῃς.
