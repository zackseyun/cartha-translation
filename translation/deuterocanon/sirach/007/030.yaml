theological_decisions:
- issue: Referent and capitalization of עוֹשֶׂךָ
  chosen_reading: your Maker
  alternative_readings:
  - your creator
  - the one who made you
  rationale: The verse addresses devotion to God as creator. Capitalizing 'Maker'
    signals the divine referent in English without adding content beyond the Hebrew
    and Greek.
- issue: Sense of מְשָׁרְתָיו / λειτουργούς αὐτοῦ
  chosen_reading: his ministers
  alternative_readings:
  - his servants
  - those who minister to him
  rationale: Both Hebrew and Greek suggest persons engaged in God's service, likely
    with cultic or priestly overtones. 'Ministers' preserves that official-service
    nuance better than the broader 'servants.'
