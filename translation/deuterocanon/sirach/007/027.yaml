translation:
  text: With all your heart honor your father, and do not forget the labor pains of
    your mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is terse in the second line ('and the mother who bore you, do not
      ...'); the Greek parallel clarifies the sense as 'do not forget your mother's
      labor pains.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכָל לִבְּךָ
  chosen: With all your heart
  alternatives:
  - With your whole heart
  - With your entire heart
  lexicon: HALOT
  rationale: A straightforward idiom for wholehearted devotion or sincerity. 'With
    all your heart' is natural modern English and preserves the Hebrew expression
    closely.
- source_word: כַּבֵּד
  chosen: honor
  alternatives:
  - glorify
  - give weight to
  - show honor to
  lexicon: HALOT
  rationale: The verb from כבד in this relational context means to honor or treat
    with due weight/respect, matching common biblical usage for honoring parents.
    'Honor' is both accurate and idiomatic.
- source_word: לְאָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct object of the imperative; no reason to generalize or neutralize
    the familial term.
- source_word: וְאֵם
  chosen: and ... your mother
  alternatives:
  - and mother
  lexicon: HALOT
  rationale: The Hebrew lacks an explicit pronominal suffix here, but the following
    verb 'who bore you' makes the referent definite and personal. English naturally
    supplies 'your mother'.
- source_word: יוֹלַדְתְּךָ
  chosen: your mother
  alternatives:
  - who bore you
  - who gave birth to you
  lexicon: HALOT
  rationale: The Hebrew phrase literally says 'mother who bore you.' In the final
    English line, the maternal relation is expressed explicitly and the birthing imagery
    is carried by the next clause via the Greek-supported phrase 'labor pains,' avoiding
    awkward repetition while preserving sense.
- source_word: אַל תִּשֶּׁה
  chosen: do not forget
  alternatives:
  - do not neglect
  - do not disregard
  lexicon: HALOT
  rationale: The Greek parallel reads μὴ ἐπιλάθῃ, 'do not forget,' which clarifies
    the Hebrew sense here. Given the parallel source and the likely semantic force
    in context, 'do not forget' is the best rendering.
- source_word: μητρὸς ὠδῖνας
  chosen: the labor pains of your mother
  alternatives:
  - your mother's birth pangs
  - the travail of your mother
  lexicon: BDAG
  rationale: 'The Greek parallel makes explicit what is only compressed in the Hebrew
    wording: the son is to remember the mother''s suffering in childbirth. ''Labor
    pains'' is clear, contemporary, and faithful without being clinical or archaic.'
