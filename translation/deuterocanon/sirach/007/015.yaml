translation:
  text: Do not count yourself among the people’s dead; remember that passing away
    will not pass over.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek tradition: “Do not hate hard labor and farming created by the Most
      High.” The Greek differs substantially from the surviving Hebrew here.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew of the second line is difficult and may involve wordplay on “passing
      over / passing away”; the sense is that death or mortality does not bypass anyone.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תַּחְשׁוֹבְךָ
  chosen: Do not count yourself
  alternatives:
  - Do not reckon yourself
  - Do not consider yourself
  lexicon: HALOT
  rationale: From חשב in the reflexive/object construction, the sense is to reckon
    or count oneself as belonging to a category. 'Count yourself' is idiomatic modern
    English and preserves the admonitory force.
- source_word: בָּמֳתֵי עָם
  chosen: among the people’s dead
  alternatives:
  - with the dead of the people
  - among dead men
  lexicon: HALOT
  rationale: מותי is best taken from 'dead/dead ones' rather than an abstract 'death.'
    With עם, the phrase denotes the dead belonging to the people/community. 'Among
    the people’s dead' keeps the concrete image, though the Hebrew is somewhat compressed.
- source_word: זְכוֹר
  chosen: remember
  alternatives:
  - call to mind
  - keep in mind
  lexicon: HALOT
  rationale: Imperative of זכר. 'Remember' is the standard and sufficiently natural
    rendering.
- source_word: עִבָּרוֹן
  chosen: passing away
  alternatives:
  - transgression
  - wrath
  - passing over
  lexicon: HALOT
  rationale: The Hebrew noun is difficult. In light of the immediately following verb
    יתעבר and the Greek parallel's very different wording, the Hebrew likely plays
    on עבר ('pass over/pass away'). Rendering it as 'passing away' preserves the mortality
    theme suggested by the surrounding line and avoids importing a less secure theological
    sense such as 'wrath.'
- source_word: לֹא יִתְעַבָּר
  chosen: will not pass over
  alternatives:
  - will not be averted
  - will not pass by
  - cannot be escaped
  lexicon: HALOT
  rationale: From עבר in an intransitive/passive-like form, the phrase conveys something
    that does not pass by or bypass a person. 'Will not pass over' preserves the verbal
    wordplay with עִבָּרוֹן and leaves the exact nuance open.
- source_word: μὴ μισήσῃς ἐπίπονον ἐργασίαν
  chosen: not adopted in main text
  alternatives:
  - Do not hate hard labor
  lexicon: BDAG
  rationale: The Greek parallel in Swete differs substantially from the extant Hebrew
    and appears to reflect a different Vorlage or textual development. Because Hebrew
    survives here with high confidence, the main translation follows the Hebrew witness,
    while the Greek is preserved in a footnote as a significant alternative tradition.
- source_word: γεωργίαν ὑπὸ Ὑψίστου ἐκτισμένην
  chosen: not adopted in main text
  alternatives:
  - and farming created by the Most High
  lexicon: BDAG
  rationale: This Greek clause has no clear counterpart in the extant Hebrew line.
    It is too substantial to harmonize silently into the translation, so it is documented
    as an alternative reading in the footnotes.
