translation:
  text: Do not be hasty in the army, for laborious work is allotted by God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel reads: ''Do not say, “He will look upon the multitude of
      my gifts, and when I offer to God Most High, he will accept them.”'' This reflects
      a substantially different textual tradition from the extant Hebrew.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תָּאִיץ
  chosen: Do not be hasty
  alternatives:
  - Do not press forward
  - Do not rush
  - Do not be eager
  lexicon: HALOT
  rationale: The negative imperative with תאיץ conveys urging oneself on or acting
    hastily. 'Do not be hasty' gives natural English while preserving the warning
    against impulsive action.
- source_word: בַּצָּבָא
  chosen: in the army
  alternatives:
  - in military service
  - in the host
  lexicon: HALOT
  rationale: The Hebrew צבא ordinarily denotes army/host/service. In this Hebrew witness
    the plain sense is military context, so 'in the army' is the most direct rendering.
    The Greek parallel reflects a substantially different text and does not support
    replacing the Hebrew with a cultic-gift saying.
- source_word: מְלֶאכֶת עֲבֹדָה
  chosen: laborious work
  alternatives:
  - hard labor
  - work of service
  - toilsome labor
  lexicon: HALOT
  rationale: The collocation combines 'work' and 'service/labor,' intensifying the
    sense of burdensome toil. 'Laborious work' preserves the doubled idea without
    becoming too wooden.
- source_word: הִיא
  chosen: is
  lexicon: HALOT
  rationale: Simple copular force linking the subject phrase to what follows.
- source_word: מֵאֵל
  chosen: by God
  alternatives:
  - from God
  - by the Mighty One
  lexicon: HALOT
  rationale: The preposition marks source or agency. 'By God' reads naturally in English
    and preserves divine source. 'God' is preferable to the more literal 'Mighty One'
    here for clarity.
- source_word: נֶחֱלָקָה
  chosen: is allotted
  alternatives:
  - is apportioned
  - is assigned
  - is divided
  lexicon: HALOT
  rationale: The passive form from חלק suggests something apportioned or assigned.
    'Is allotted' fits the sense that such burdensome work is assigned by God.
