theological_decisions:
- issue: Divergence between Hebrew and Greek witnesses in Sirach 7:33
  chosen_reading: Translate the extant Hebrew as the primary witness for this verse,
    while noting the Greek parallel in a footnote.
  alternative_readings:
  - 'Greek: ''Let the kindness of a gift be before every living person, and do not
    withhold kindness even from the dead.'''
  rationale: Project policy for Sirach is to translate from the Hebrew where it survives,
    using the Greek as an actual input and consistency check. Here the Greek parallel
    is not a close verbal match to the Hebrew and appears to reflect a different textual
    form or expansion. The main text therefore follows the Hebrew, with the Greek
    preserved as a significant alternative witness.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    use Swete LXX as Greek source alongside Hebrew witness.'
