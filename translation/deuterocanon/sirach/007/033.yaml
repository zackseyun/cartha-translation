translation:
  text: Also stretch out your hand to the poor, so that your blessing may be complete.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Let the kindness of a gift be before every living person,
      and do not withhold kindness even from the dead.'' The Hebrew witness here instead
      reads, ''Also stretch out your hand to the poor, so that your blessing may be
      complete.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: Also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Adds this instruction to the preceding series of exhortations; 'Also'
    is concise and natural in English while preserving the additive force.
- source_word: לְאֶבְיוֹן
  chosen: to the poor
  alternatives:
  - to the needy
  - to the destitute
  lexicon: HALOT
  rationale: אֶבְיוֹן denotes a poor or needy person. 'The poor' is idiomatic and
    broad enough for the social-ethical sense here.
- source_word: הוֹשִׁיט יָד
  chosen: stretch out your hand
  alternatives:
  - extend your hand
  - reach out your hand
  - give generously
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of extending the hand, commonly for
    giving aid. Keeping the bodily image preserves the source texture while still
    communicating generosity.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Marks purpose/result. 'So that' is clear modern English and preserves
    the clause relationship.
- source_word: תִּשְׁלַם
  chosen: may be complete
  alternatives:
  - may be fulfilled
  - may be repaid
  - may be full
  lexicon: HALOT
  rationale: From שלם, here best taken as reaching completeness or fullness. In context,
    the sense is that one's blessing is made complete by generosity to the poor, not
    primarily that it is repaid. The Greek parallel differs substantially and does
    not control the Hebrew here.
- source_word: בִּרְכָתֶךָ
  chosen: your blessing
  alternatives:
  - your blessing-gift
  - your benefaction
  lexicon: HALOT
  rationale: The plain sense is 'your blessing.' In Hebrew usage this can refer concretely
    to a gift or benefaction, but the wording is left broader in English to preserve
    the source's ambiguity between blessing received, blessing bestowed, and beneficent
    action.
