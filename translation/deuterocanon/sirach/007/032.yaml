theological_decisions:
- issue: Divergence between the extant Hebrew and Greek parallel
  chosen_reading: Translate the surviving Hebrew as the primary witness, while preserving
    the Greek's substantially different sense in a footnote.
  alternative_readings:
  - And stretch out your hand to the poor, so that your blessing may be complete.
  rationale: For Sirach, where Hebrew survives, project policy gives Hebrew primacy.
    Here the Greek parallel is not merely stylistic but substantially different, indicating
    either a variant Vorlage or corruption in one line of transmission. The main text
    therefore follows the Hebrew witness, but the Greek alternative is important enough
    to preserve for auditability.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    preserve ambiguity/alternatives in footnotes where significant.'
