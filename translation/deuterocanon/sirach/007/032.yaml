translation:
  text: Bread of the mighty and an offering of the hand, sacrifices of righteousness
    and a holy contribution.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''And stretch out your hand to the poor, so that your blessing
      may be complete.'' The Hebrew and Greek differ substantially here, suggesting
      a variant textual tradition or corruption.'
    reason: textual_variant
lexical_decisions:
- source_word: לֶחֶם
  chosen: Bread
  alternatives:
  - food
  - bread
  lexicon: HALOT
  rationale: The basic sense is literal 'bread,' and there is no clear contextual
    warrant to generalize it to 'food' in the main text.
- source_word: אַבִּירִים
  chosen: the mighty
  alternatives:
  - strong ones
  - nobles
  - bulls
  lexicon: HALOT
  rationale: Hebrew אבירים can denote mighty ones/strong ones and in some contexts
    bulls. Here, with sacrificial language in the cola that follow, the phrase is
    difficult. 'The mighty' preserves the Hebrew form without over-resolving the referent.
    The Greek parallel points in a very different direction ('to the poor stretch
    out your hand'), suggesting textual instability, so a conservative rendering is
    preferable.
- source_word: וּתְרוּמַת יָד
  chosen: and an offering of the hand
  alternatives:
  - and a hand-offering
  - and a contribution from your hand
  lexicon: HALOT
  rationale: תרומה is a contribution/heave offering; with יד it likely means an offering
    given by one's hand. The more literal phrasing keeps the Hebrew imagery and avoids
    importing a specific cultic technical term beyond the text.
- source_word: זִבְחֵי צֶדֶק
  chosen: righteous sacrifices
  alternatives:
  - just sacrifices
  - sacrifices of righteousness
  lexicon: HALOT
  rationale: The construct can be rendered formally as 'sacrifices of righteousness,'
    but 'righteous sacrifices' is clearer modern English while preserving the moral/cultic
    sense of צדק.
- source_word: וּתְרוּמַת קֹדֶשׁ
  chosen: and a holy contribution
  alternatives:
  - and a sacred offering
  - and a contribution of holiness
  lexicon: HALOT
  rationale: תרומת קדש denotes a consecrated contribution. 'Holy contribution' is
    concise and preserves the cultic register.
