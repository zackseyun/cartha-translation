translation:
  text: Do not cower before a noble, lest you set a bribe within your integrity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''lest you set a stumbling block in your uprightness.'' The Hebrew
      reads more concretely with a term for unjust gain, here rendered ''a bribe.'''
    reason: alternative_reading
lexical_decisions:
- source_word: תָגוּר
  chosen: cower
  alternatives:
  - fear
  - be intimidated
  - be in dread
  lexicon: HALOT
  rationale: From גור in a context of shrinking back before power. The Greek parallel
    εὐλαβηθῇς ἀπὸ προσώπου δυνάστου supports the sense of being intimidated or showing
    fearful deference, not mere ordinary fear.
- source_word: נָדִיב
  chosen: noble
  alternatives:
  - prince
  - magnate
  - powerful man
  - ruler
  lexicon: HALOT
  rationale: Hebrew נדיב can denote a noble or prominent person. The Greek parallel
    has δυνάστου, 'ruler/potentate.' 'Noble' preserves the Hebrew social-status nuance
    while fitting the warning against being overawed by the powerful.
- source_word: וְנָתוּן
  chosen: set
  alternatives:
  - place
  - give
  - lay
  lexicon: HALOT
  rationale: The idiom is literally 'and put/set.' English 'set' keeps the concrete
    metaphor without over-paraphrasing.
- source_word: בֶּצַע
  chosen: a bribe
  alternatives:
  - gain
  - greedy gain
  - unjust profit
  lexicon: HALOT
  rationale: בצע often denotes gain acquired by greed or unjust means. The Greek parallel
    σκάνδαλον ('stumbling block/offense') points to a morally compromising act rather
    than profit as such. In this judicial context, 'bribe' best captures the concrete
    corruption implied by allowing fear of the powerful to distort uprightness.
- source_word: בִּתְמִימִיךָ
  chosen: within your integrity
  alternatives:
  - in your innocence
  - in your uprightness
  - in your blamelessness
  lexicon: HALOT
  rationale: From תמימים/תמים language of integrity or uprightness. The Greek ἐν εὐθύτητί
    σου ('in your uprightness') confirms the ethical sense. 'Within your integrity'
    preserves the Hebrew preposition and the idea that corruption is introduced into
    one's moral rectitude.
