theological_decisions:
- issue: How to render the difficult Hebrew phrase וְנָתוּן בֶּצַע בִּתְמִימִיךָ in
    light of the Greek parallel καὶ θήσεις σκάνδαλον ἐν εὐθύτητί σου
  chosen_reading: Translate the Hebrew directly as introducing corrupt gain/bribery
    into one's integrity, while recognizing the Greek reflects a broader idea of placing
    a stumbling block in one's uprightness.
  alternative_readings:
  - lest you put unjust gain into your uprightness
  - lest you set a stumbling block in your integrity
  rationale: The Hebrew witness is primary where extant, but the phrase is somewhat
    terse. The Greek suggests the consequence is moral compromise. Because בצע commonly
    carries the sense of greedy or unjust gain, and the context concerns fear before
    the powerful, 'bribe' makes the implied corruption explicit without departing
    too far from the Hebrew. The broader Greek-based alternative is preserved in a
    footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, using
    Greek parallel as actual input and consistency check'
