translation:
  text: Do not mistreat a worker who is faithful, nor a hired laborer who gives his
    life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'worker of truth'; Greek has 'house-servant working in truth.' The
      sense is a laborer who works faithfully or honestly.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew wording in the second clause is difficult, but the Greek parallel
      reads 'nor a hired laborer giving his life,' which supports the rendering 'a
      hired laborer who gives his life.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תָּרֵעַ
  chosen: Do not mistreat
  alternatives:
  - Do not do evil to
  - Do not harm
  - Do not wrong
  lexicon: HALOT
  rationale: The Hebrew verb from רעע in the Hiphil/causative sense means to do harm
    or treat badly. The Greek parallel μὴ κακώσῃς likewise supports 'mistreat'/'harm.'
    'Mistreat' is natural modern English and captures interpersonal abuse more clearly
    than the more wooden 'do evil to.'
- source_word: עוֹבֵד אֱמֶת
  chosen: a worker who is faithful
  alternatives:
  - a servant who works truly
  - an honest worker
  - a worker in truth
  lexicon: HALOT
  rationale: The Hebrew phrase literally combines 'worker/servant' with 'truth.' The
    Greek οἰκέτην ἐργαζόμενον ἐν ἀληθείᾳ points to one working 'in truth,' i.e., faithfully
    or honestly. 'Worker who is faithful' preserves the ethical sense without over-literal
    awkwardness. 'Servant' is possible, but the parallel with 'hired laborer' favors
    the broader labor sense here.
- source_word: וְכֵן
  chosen: nor
  alternatives:
  - and likewise
  - and so also
  lexicon: HALOT
  rationale: The conjunction introduces a parallel prohibition. In idiomatic English,
    'nor' best conveys the second negative clause after 'Do not…' while preserving
    the coordinate force of 'and likewise.'
- source_word: שׁוֹמֵר
  chosen: a hired laborer
  alternatives:
  - a hireling
  - a keeper
  - a guard
  lexicon: HALOT
  rationale: The Hebrew reading is somewhat unusual in isolation, but the Greek parallel
    μηδὲ μίσθιον strongly indicates a wage-earning laborer/hireling. Given the instruction
    to use the Greek as actual translation input alongside the Hebrew, 'hired laborer'
    best reflects the sense. A more literal rendering from the Hebrew alone ('keeper/guard')
    would likely miss the intended meaning in this line.
- source_word: נוֹחֵן נַפְשׁוֹ
  chosen: who gives his life
  alternatives:
  - who devotes himself
  - who gives himself fully
  - who expends his life
  lexicon: HALOT
  rationale: 'The Greek διδόντα ψυχὴν αὐτοῦ is a strong interpretive control: ''giving
    his soul/life.'' The Hebrew phrase as transmitted is difficult, but in context
    it refers to one who spends himself in labor. ''Who gives his life'' is vivid
    and close to the Greek, while still understandable as idiomatic self-expenditure
    rather than literal death.'
