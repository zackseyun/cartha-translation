translation:
  text: Do not be fainthearted in prayer, and do not neglect to give alms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צדקה can also mean 'righteousness,' but here the Greek parallel explicitly
      reads 'to do almsgiving,' supporting the sense 'give alms.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּתְקַצֵּר
  chosen: Do not be fainthearted
  alternatives:
  - Do not be discouraged
  - Do not be short/patientless
  - Do not be small-souled
  lexicon: HALOT
  rationale: The Hebrew form is difficult in isolation, but the Greek parallel μὴ
    ὀλιγοψυχήσῃς strongly supports the sense of losing heart or becoming fainthearted
    rather than merely shortening the prayer. Using the Greek as an actual input helps
    clarify the Hebrew composite reading.
- source_word: בַּתְּפִלָּה
  chosen: in your prayer
  alternatives:
  - in prayer
  lexicon: HALOT
  rationale: The noun means 'prayer.' The Greek has ἐν τῇ προσευχῇ σου ('in your prayer'),
    which supports supplying the possessive in English for naturalness and alignment
    with the parallel witness.
- source_word: וּבִצְדָקָה
  chosen: and ... to give alms
  alternatives:
  - and in righteousness
  - and charitable giving
  - and mercy
  lexicon: HALOT
  rationale: Although צדקה can mean 'righteousness,' in later Hebrew and in this context
    it commonly denotes almsgiving/charity. The Greek parallel ἐλεημοσύνην ποιῆσαι
    explicitly interprets it as almsgiving, so 'give alms' best reflects the sense
    here.
- source_word: אַל תִּתְעַבָּר
  chosen: do not neglect
  alternatives:
  - do not pass by
  - do not omit
  - do not disregard
  lexicon: HALOT
  rationale: The verb literally suggests passing over or overlooking. The Greek μὴ
    παρίδῃς confirms the sense 'do not neglect/overlook.' 'Neglect' is idiomatic modern
    English in this exhortation.
