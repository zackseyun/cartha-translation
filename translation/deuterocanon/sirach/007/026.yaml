theological_decisions:
- issue: Divergence between surviving Hebrew and Greek parallel
  chosen_reading: Translate primarily from the Hebrew witness, while preserving the
    Greek's distinct wording in a footnote.
  alternative_readings:
  - 'Greek: ''Do you have a wife after your soul/according to your desire? Do not
    cast her out.'''
