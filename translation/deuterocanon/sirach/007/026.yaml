    but the Greek parallel is to be used as actual input. Here the two witnesses diverge
    substantially in the second colon and somewhat in the first. The Hebrew is the
    main text because it is the most-original available Zone 1 witness for this verse,
    but the Greek alternative is significant enough to preserve for auditability.
