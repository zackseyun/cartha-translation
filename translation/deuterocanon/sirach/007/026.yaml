translation:
  text: Do not despise a wife who is yours, and do not trust yourself to one you hate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do you have a wife after your own desire? Do not cast
      her out.'' The surviving Hebrew and Greek differ notably in this verse, so the
      main text follows the Hebrew witness and this note preserves the Greek alternative.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִשָּׁה
  chosen: wife
  alternatives:
  - woman
  lexicon: HALOT
  rationale: In context with לְךָ ('for/to you'), the Hebrew most naturally refers
    to one's own wife rather than a woman in general. The Greek parallel likewise
    has γυνή with possessive sense.
- source_word: לְךָ
  chosen: who is yours
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: The phrase marks personal relation/possession. Rendering it as 'who is
    yours' makes explicit the marital relationship implied by the Hebrew and supported
    by the Greek parallel.
- source_word: אַל תְּתַעֲבֶהָ
  chosen: do not despise
  alternatives:
  - do not abhor
  - do not loathe
  lexicon: HALOT
  rationale: The verb conveys strong rejection or abhorrence. 'Despise' is idiomatic
    modern English and fits wisdom-instruction style without sounding archaic. 'Abhor'
    is possible but less natural. The Greek parallel differs here ('do not cast her
    out'), so a footnote preserves that alternative trajectory.
- source_word: וּשְׂנוּאָה
  chosen: one you hate
  alternatives:
  - a hated woman
  - a woman who is hated
  lexicon: HALOT
  rationale: The Hebrew form can be read adjectivally/passively ('hated') or, in context,
    as the woman whom the addressee hates. The following בָּהּ ('in/her') and the
    antithetic parallel favor the relational sense 'one you hate.' This avoids implying
    merely that she is hated by others.
- source_word: אַל תַּאֲמֵן בָּהּ
  chosen: do not trust yourself to
  alternatives:
  - do not trust in
  - do not rely on
  - do not put confidence in
  lexicon: HALOT
  rationale: The Hifil of אמן with ב can mean to trust or place confidence in. 'Do
    not trust yourself to' captures the personal, relational force of the warning
    in idiomatic English better than the flatter 'do not trust in her.'
