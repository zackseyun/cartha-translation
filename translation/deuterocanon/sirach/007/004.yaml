translation:
  text: Do not justify yourself before a king, and do not show understanding in the
    presence of a king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, 'Do not seek rulership from the Lord, nor a seat of glory from
      a king.' The Hebrew witness followed here differs substantially.
    reason: textual_variant
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not seek to
  - Never
  lexicon: HALOT
  rationale: Standard negative imperative particle introducing prohibition.
- source_word: תִּצְטַדֵּק
  chosen: justify yourself
  alternatives:
  - make yourself righteous
  - act self-righteously
  - vindicate yourself
  lexicon: HALOT
  rationale: Hitpael of צדק naturally carries a reflexive sense, 'show oneself righteous'
    or 'justify oneself.' 'Justify yourself' preserves the reflexive force and the
    warning against self-assertion before royal authority better than the more interpretive
    'act self-righteously.'
- source_word: לִפְנֵי מֶלֶךְ
  chosen: before a king
  alternatives:
  - in the presence of a king
  - before the king
  lexicon: HALOT
  rationale: The Hebrew lacks the article, so 'a king' is preferable to 'the king.'
    'Before' is the natural rendering of לִפְנֵי here.
- source_word: וּמִפְּנֵי מֶלֶךְ
  chosen: and in the presence of a king
  alternatives:
  - and before a king
  - and because of a king
  lexicon: HALOT
  rationale: The prepositional phrase is closely parallel to the first colon. Rendering
    with 'in the presence of' gives slight variation in English while preserving the
    same situational sense.
- source_word: תִּתְבּוֹנֵן
  chosen: show understanding
  alternatives:
  - be clever
  - display discernment
  - consider carefully
  lexicon: HALOT
  rationale: From בין in the hitbonen form, the sense here is not merely inward reflection
    but presenting oneself as discerning or clever. 'Show understanding' best fits
    the social warning of the line. The Greek parallel points in a related direction
    of aspiring to status, but the Hebrew wording is retained as primary.
