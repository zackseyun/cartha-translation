translation:
  text: A resident alien, a foreigner, a stranger, and a poor man—their glory is the
    fear of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''It is not right to dishonor a poor intelligent man, and
      it is not fitting to glorify a sinful man.'' The Hebrew and Greek differ substantially
      here.'
    reason: alternative_reading
lexical_decisions:
- source_word: גֵּר
  chosen: resident alien
  alternatives:
  - sojourner
  - stranger
  lexicon: HALOT
  rationale: גר denotes a non-native living among a people with some settled status,
    not merely a passerby. 'Resident alien' preserves the social-legal nuance better
    than the broader 'stranger'.
- source_word: וְזָר
  chosen: an outsider
  alternatives:
  - stranger
  - one who is estranged
  lexicon: HALOT
  rationale: זר often means one outside the normal kinship/cultic/social circle. Because
    נָכְרִי also follows, rendering this as 'outsider' helps preserve distinction
    rather than collapsing both terms into 'foreigner'.
- source_word: נָכְרִי
  chosen: a foreigner
  alternatives:
  - foreigner from another people
  - stranger
  lexicon: HALOT
  rationale: נכרי commonly denotes a foreign national or one belonging to another
    people. 'Foreigner' is the clearest modern equivalent and distinguishes it from
    גר.
- source_word: וָרָשׁ
  chosen: and a poor man
  alternatives:
  - and the poor
  - and a needy man
  lexicon: HALOT
  rationale: רש denotes a poor person. The singular is retained. 'Poor man' matches
    the masculine singular form and the verse's list structure.
- source_word: תִּפְאֶרֶת
  chosen: their glory
  alternatives:
  - ornament
  - splendor
  - boast
  lexicon: HALOT
  rationale: The noun can mean beauty, adornment, or glory. In this aphoristic context,
    'glory' best conveys what truly dignifies such socially low-status persons.
- source_word: יִרְאַת אֱלֹהִים
  chosen: the fear of God
  alternatives:
  - reverence for God
  - fear of God
  lexicon: HALOT
  rationale: This is a standard wisdom expression for reverent awe and piety. 'Fear
    of God' preserves the traditional and lexical force, while readers can infer reverential
    sense from wisdom context.
