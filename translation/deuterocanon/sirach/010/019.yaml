translation:
  text: What offspring is honorable? Human offspring. What offspring is honorable?
    Those who fear God. What offspring is honorable? Those who keep the commandment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''What offspring is dishonorable? Human offspring.'' The
      Hebrew witness instead reads, ''What offspring is honorable? Those who keep
      the commandment.'''
    reason: textual_variant
  - marker: b
    text: Greek has 'those who fear the Lord' where the Hebrew reads 'those who fear
      God.'
    reason: alternative_reading
lexical_decisions:
- source_word: זֶרַע / σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - descendants
  - lineage
  lexicon: HALOT; BDAG
  rationale: Both the Hebrew and Greek repeat the term as a rhetorical keyword. 'Offspring'
    preserves the collective sense better than the more literal 'seed' in modern English,
    while avoiding the narrower genealogical feel of 'lineage'.
- source_word: נִכְבָּד / ἔντιμον
  chosen: honorable
  alternatives:
  - noble
  - esteemed
  - distinguished
  lexicon: HALOT; BDAG
  rationale: The term denotes worth or honor status. 'Honorable' fits the wisdom context
    and works naturally in the repeated question formula. 'Noble' could imply aristocratic
    birth, which the verse appears to relativize.
- source_word: מַה / ποῖον
  chosen: what
  alternatives:
  - which kind of
  - what sort of
  lexicon: HALOT; BDAG
  rationale: The interrogative introduces a rhetorical classification. Simple 'what'
    is the most natural English equivalent and preserves the aphoristic style.
- source_word: לֶאֱנוֹשׂ / ἀνθρώπου
  chosen: human
  alternatives:
  - man
  - mankind
  - of man
  lexicon: HALOT; BDAG
  rationale: The Hebrew and Greek point to humanity in a generic sense. 'Human' avoids
    misleading male-specific force while still reflecting the generic anthropological
    reference.
- source_word: יְרֵא אֱלֹהִים / οἱ φοβούμενοι τὸν κύριον
  chosen: those who fear God
  alternatives:
  - God-fearers
  - those who fear the Lord
  lexicon: HALOT; BDAG
  rationale: The Hebrew witness reads 'fear God,' while the Greek parallel has 'fear
    the Lord.' Since Hebrew is primary where extant, the main text follows 'God.'
    The participial sense is best rendered with an explicit subject phrase, 'those
    who fear God.'
- source_word: שׂוֹמֵר מִצְוָה
  chosen: those who keep the commandment
  alternatives:
  - those who keep the commandment(s)
  - those who keep the law
  - those who obey the commandment
  lexicon: HALOT
  rationale: The Hebrew phrase is singular, so 'the commandment' is retained rather
    than generalized to 'the commandments.' 'Keep' is a standard rendering for שמר
    in covenantal/ethical contexts and preserves the biblical idiom.
