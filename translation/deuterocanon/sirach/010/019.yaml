  chosen_reading: Follow the extant Hebrew as primary, while using the Greek as a
    control and preserving its differing final line in a footnote.
  alternative_readings:
  - 'Greek: ''What offspring is dishonorable? Human offspring.'''
  rationale: The Zone 1 Hebrew presents a threefold positive formulation culminating
    in 'those who keep the commandment,' whereas the Greek parallel preserves a contrastive
    final line about dishonorable offspring. Because the Hebrew survives for this
