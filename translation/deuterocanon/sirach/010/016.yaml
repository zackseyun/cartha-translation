translation:
  text: God erased the footprints of nations, and their root down to the earth’s bedrock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''The Lord pulled up the roots of nations, and planted
      the humble in their place.'' The Hebrew witness instead speaks of God erasing
      the nations’ ''footprints'' and their ''root'' down to the earth’s lowest level.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew word rendered 'bedrock' is rare and may also mean the lowest
      depth or bottom of the ground; the sense is total uprooting.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִקְבוֹת
  chosen: footprints
  alternatives:
  - heels
  - tracks
  - steps
  lexicon: HALOT
  rationale: The noun from עקב literally relates to heel/footstep marks. In this context,
    paired with the following clause about uprooting, it likely denotes the traces
    or tracks of nations. 'Footprints' preserves the concrete Hebrew image better
    than the more abstract Greek parallel 'roots,' while still making sense in English.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - gentiles
  - peoples
  lexicon: HALOT
  rationale: In wisdom literature this commonly refers to peoples or nations rather
    than specifically 'Gentiles' in a later theological sense. 'Nations' is the most
    natural and contextually appropriate rendering.
- source_word: טִמְטֵם
  chosen: erased
  alternatives:
  - blotted out
  - effaced
  - destroyed
  lexicon: HALOT
  rationale: The verb conveys obliterating or effacing. 'Erased' fits the imagery
    of removing footprints/traces. It also avoids over-reading total annihilation
    while still expressing decisive divine judgment.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - the Lord
  lexicon: HALOT
  rationale: The Hebrew witness reads אֱלֹהִים, so 'God' should be retained rather
    than harmonizing to the Greek parallel's ὁ κύριος ('the Lord').
- source_word: וְשָׁרְשָׁם
  chosen: and their root
  alternatives:
  - and their roots
  - and their stock
  lexicon: HALOT
  rationale: 'The Hebrew form is singular with pronominal suffix, likely collective:
    ''their root.'' This matches the image of complete removal from the source. English
    singular is retained to reflect the Hebrew more closely.'
- source_word: עַד אֶרֶץ
  chosen: down to the earth’s
  alternatives:
  - from the earth
  - to the ground
  - as far as the land
  lexicon: HALOT
  rationale: 'The phrase marks extent: the removal reaches all the way down to the
    earth/ground. ''Down to the earth’s'' prepares for the following noun and preserves
    the sense of depth.'
- source_word: קִעֲקָע
  chosen: bedrock
  alternatives:
  - lowest depth
  - foundation
  - rock-bottom
  lexicon: HALOT
  rationale: The rare noun denotes something dug down or the lowest depth/bottom.
    In context with 'root' and 'earth,' 'bedrock' gives a vivid English equivalent
    for complete uprooting to the deepest level, while acknowledging some lexical
    uncertainty.
