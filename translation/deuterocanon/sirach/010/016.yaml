theological_decisions:
- issue: Divergence between Hebrew and Greek imagery
  chosen_reading: Follow the extant Hebrew as primary, retaining 'footprints' in the
    first colon and 'God' rather than conforming to the Greek's 'roots' and 'the Lord.'
  alternative_readings:
  - The Greek parallel reads 'The Lord pulled up the roots of nations, and planted
    the humble in their place.'
  rationale: Project policy gives primacy to the surviving Hebrew of Sirach where
    available, while using the Greek as a real input and consistency check. The Greek
    confirms a judgment/uplifting context but differs substantially in wording; the
    main text therefore reflects the Hebrew witness, with the Greek preserved in a
    footnote because the divergence is material.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is primary where it survives;
    use Greek parallel as translation input/consistency check.'
