translation:
  text: Who will declare righteous the one who condemns himself, and who will honor
    the one who dishonors himself?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek witness: ''A poor man is honored for his knowledge, and a rich man
      is honored for his wealth.'' The Hebrew and Greek here preserve substantially
      different sayings.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַרְשִׁיעַ
  chosen: condemns
  alternatives:
  - declares guilty
  - brings guilt on
  lexicon: HALOT
  rationale: Hiphil of רשע commonly means 'declare guilty/condemn.' In this wisdom
    context with reflexive object 'his soul/self,' the sense is that a person treats
    himself as blameworthy or ruins his own standing. 'Condemns' is concise and idiomatic
    in English while preserving the judicial coloring.
- source_word: נַפְשׁוֹ
  chosen: himself
  alternatives:
  - his soul
  - his life
  - his very self
  lexicon: HALOT
  rationale: 'נפש can mean soul, life, or self. In both cola the reflexive sense fits
    best in English: the person is acting against himself. Rendering literally as
    ''his soul'' would sound unnatural and could over-spiritualize the Hebrew.'
- source_word: יַצְדִיקֶנּוּ
  chosen: declare righteous
  alternatives:
  - justify
  - vindicate
  lexicon: HALOT
  rationale: 'Hiphil of צדק is forensic: ''declare righteous/justify.'' ''Declare
    righteous'' makes the judicial sense explicit and avoids importing later doctrinal
    freight that ''justify'' can carry, while still matching the Hebrew.'
- source_word: יְכַבֵּד
  chosen: honor
  alternatives:
  - glorify
  - esteem
  lexicon: HALOT
  rationale: כבד in the piel commonly means 'honor.' This fits the social valuation
    parallel to the first colon's judicial valuation.
- source_word: מַקְלֶה
  chosen: dishonors
  alternatives:
  - treats lightly
  - despises
  - disgraces
  lexicon: HALOT
  rationale: From קלל in a causative/intensive sense, the idea is making light of
    or dishonoring. 'Dishonors' gives a clean antithesis with 'honor' and suits the
    parallelism.
