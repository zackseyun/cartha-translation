theological_decisions:
- issue: Divine title in a verse with divergent Hebrew and Greek witnesses
  chosen_reading: God
  alternative_readings:
  - the Lord
  rationale: The project prioritizes the extant Hebrew of Sirach where it survives.
    Since the Hebrew reads אֱלֹהִים while the Greek parallel reads Κύριος, the main
    text follows 'God' and preserves 'the Lord' in a footnote as a witness-level alternative
    rather than harmonizing them.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    DOCTRINE.md contested terms table for divine titles'
- issue: Handling a textually awkward Hebrew clause
  chosen_reading: Translate the first colon idiomatically as an inward divine blow
    ('God struck his heart with dread')
  alternative_readings:
  - Therefore God filled his heart and afflicted him
  - Therefore God filled his heart; he struck
  - Therefore the Lord made the punishments marvelous
  rationale: The Hebrew wording is terse and somewhat mismatched, while the Greek
    parallel reflects a different or expanded Vorlage. Rather than reproduce an opaque
    literalism, the translation keeps the Hebrew imagery of 'heart' and divine striking,
    while signaling the Greek alternative in a footnote. This preserves source uncertainty
    honestly without importing a full Greek reading into the main text.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it; PHILOSOPHY.md: transparency about source uncertainty'
