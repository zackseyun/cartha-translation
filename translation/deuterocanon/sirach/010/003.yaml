translation:
  text: As the judge of a people, so are his officials; and as the head of a city,
    so are its inhabitants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''An undisciplined king will destroy his people, and a
      city will be inhabited through the understanding of rulers.'' The surviving
      Hebrew and Greek forms of this verse differ substantially; the main text follows
      the extant Hebrew witness.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּשׁוֹפֵט
  chosen: as the judge
  alternatives:
  - like the judge
  - according to the judge
  lexicon: HALOT
  rationale: שׁוֹפֵט denotes a ruler/judge. 'As the judge' preserves the comparative
    proverb structure introduced by כְּ while remaining natural English.
- source_word: עַם
  chosen: a people
  alternatives:
  - the people
  - a nation
  lexicon: HALOT
  rationale: עַם can mean 'people' collectively. The anarthrous construction works
    proverbially, so 'a people' best reflects the generic sense rather than a specific
    nation.
- source_word: מְלִיצָיו
  chosen: his officials
  alternatives:
  - his interpreters
  - his spokesmen
  - his counselors
  lexicon: HALOT
  rationale: Though מליץ can denote an interpreter or spokesman, in this governance
    context the sense is the ruler's functionaries or court officials. The Greek parallel
    has δυναστῶν in the second colon and presents a political reading overall, supporting
    an administrative sense rather than linguistic 'interpreters'.
- source_word: וּכְרֹאשׁ עִיר
  chosen: and as the head of a city
  alternatives:
  - and like the chief of a city
  - and as the ruler of a city
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head' and often metaphorically 'chief.' 'Head
    of a city' keeps the Hebrew image while remaining intelligible in English.
- source_word: יוֹשְׁבָיו
  chosen: its inhabitants
  alternatives:
  - those who dwell in it
  - its residents
  lexicon: HALOT
  rationale: יֹשְׁבִים are those dwelling in a place. 'Its inhabitants' is concise,
    natural, and fits the proverbial parallelism.
