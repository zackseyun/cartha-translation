lexical_decisions:
- source_word: זֶרַע
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: Hebrew זֶרַע can denote literal seed or figurative progeny. In this aphoristic
    context it refers to lineage/progeny, and 'offspring' is natural modern English
    while preserving the singular collective sense.
- source_word: נִקְלֶה
  chosen: contemptible
  alternatives:
  - despised
  - base
  - dishonored
  lexicon: HALOT
  rationale: The adjective denotes something treated as slight, base, or dishonored.
    'Contemptible' best fits the evaluative force of the rhetorical question and aligns
    with the Greek ἄτιμον ('without honor').
- source_word: מַה
  chosen: What kind of
  alternatives:
  - what
  - which
  lexicon: HALOT
  rationale: The Hebrew interrogative here introduces a rhetorical classification
    question rather than a request for simple identification. 'What kind of' captures
    the idiomatic force in English.
- source_word: לֶאֱנוֹשׁ
  chosen: of one who
  alternatives:
  - for man
  - to a human
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult ('what seed to a man?'), and the
    line is marked by minor mismatch. The Greek parallel clarifies the sense by identifying
    the contemptible seed as 'those who transgress commandments.' Rendering the phrase
    idiomatically as 'of one who' reflects the underlying human referent without forcing
    a wooden but obscure English phrase.
- source_word: עוֹבֵר
  chosen: transgresses
  alternatives:
  - breaks
  - passes over
  - violates
  lexicon: HALOT
  rationale: With מִצְוָה, the participle means one who violates or transgresses a
    command. 'Transgresses' preserves the moral-legal register appropriate to wisdom
    literature.
- source_word: מִצְוָה
  chosen: a commandment
  alternatives:
  - a command
  - the commandment
  lexicon: HALOT
  rationale: The singular is retained from the Hebrew witness. 'Commandment' fits
    the wisdom/Torah register better than the flatter 'command.' The Greek has plural
    ἐντολάς, which is preserved as an alternative in a footnote due to source divergence.
