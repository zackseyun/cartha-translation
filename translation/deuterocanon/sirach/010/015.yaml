theological_decisions:
- issue: Divergence between Hebrew divine title and Greek parallel
  chosen_reading: Use 'God' in the main text from the Hebrew witness
  alternative_readings:
  - the Lord
  rationale: For Sirach, the project translates from the Hebrew where it survives,
    while using the Greek parallel as a real input and consistency check. Here the
    Hebrew has אֱלֹהִים ('God') and the Greek has ὁ κύριος ('the Lord'). Because the
    Hebrew is extant and high-confidence, the main text follows 'God,' while the Greek-based
    alternative is preserved in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; DOCTRINE.md
    contested terms table for κύριος/YHWH is not directly controlling here because
    the Hebrew source reads אֱלֹהִים, not YHWH.'
