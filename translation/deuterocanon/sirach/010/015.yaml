  - marker: a
    text: 'Greek parallel: ''the Lord'' instead of ''God.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כִּסֵּא
  chosen: thrones
  alternatives:
  - seat
  - chair
  - throne
  lexicon: HALOT
  rationale: Although the Hebrew form is singular ('throne/seat'), the parallel Greek
    has plural θρόνους, and the singular in Hebrew can function collectively here.
    'Thrones' best reflects the sense of positions of rule and aligns with the parallel
    witness without over-translating.
- source_word: גֵאִים
  chosen: the proud
  alternatives:
  - the arrogant
  - the exalted ones
  lexicon: HALOT
  rationale: The Hebrew denotes haughty or proud people. 'The proud' is idiomatic
    and preserves the moral sense of arrogance rather than merely social elevation.
- source_word: הָפַך
  chosen: overturned
  alternatives:
  - cast down
  - reversed
  - upturned
  lexicon: HALOT
  rationale: The verb means to turn over or overturn. 'Overturned' preserves the concrete
    image from the Hebrew; 'cast down' is influenced by the Greek but is slightly
    more interpretive.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - the Lord
  lexicon: HALOT
  rationale: The Hebrew explicitly reads 'God' (אֱלֹהִים), while the Greek parallel
    has 'the Lord.' Since the Hebrew is the primary witness where extant, 'God' should
    stand in the main text.
- source_word: וַיֹּשֶׁב
  chosen: seated
  alternatives:
  - caused to sit
  - set
  - enthroned
  lexicon: HALOT
  rationale: The verb means to cause to sit or to seat. 'Seated' is natural English
    and keeps the reversal imagery. 'Enthroned' would be too specific, since the object
    is people rather than explicitly kings.
- source_word: עֲנָוִים
  chosen: the humble
  alternatives:
  - the meek
  - the lowly
  lexicon: HALOT
  rationale: The Hebrew refers to humble or lowly people. The Greek πραεῖς could support
    'meek,' but 'humble' better matches the Hebrew witness and the pride/humility
    contrast in context.
- source_word: תַּחְתָּם
  chosen: in their place
  alternatives:
  - under them
  - instead of them
  - beneath them
  lexicon: HALOT
  rationale: 'Literally ''under them,'' but in this context of replacing rulers, the
    idiomatic sense is substitution: the humble are seated where the proud had been.
    The Greek ἀντʼ αὐτῶν confirms the replacement sense.'
