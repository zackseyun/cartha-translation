theological_decisions:
- issue: Divergence between Hebrew and Greek in the first prohibition
  chosen_reading: Follow the Hebrew 'do not repay evil' in the main text while noting
    the Greek's emphasis on anger/resentment in a footnote.
  alternative_readings:
  - do not be angry with your neighbor over any wrong
  - do not be resentful toward your neighbor for any injustice
  rationale: 'The project translates Sirach from the extant Hebrew where it survives,
    using the Greek parallel as a real input and consistency check. Here the Hebrew
    and Greek are semantically related but not identical: the Hebrew forbids retaliatory
    repayment, while the Greek forbids angry resentment. Because the Hebrew witness
    is present and high-confidence, it governs the main rendering; the Greek alternative
    is important enough to preserve in a footnote.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; DOCTRINE.md:
    preserve theological tension rather than resolve it silently'
