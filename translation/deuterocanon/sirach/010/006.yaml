translation:
  text: For any offense, do not repay your neighbor with evil, and do not walk in
    the way of pride.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Over every wrong, do not be angry with your neighbor,'' emphasizing
      resentment rather than repayment.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכֵל פֶּשַׁע
  chosen: for no offense
  alternatives:
  - for every offense
  - in any transgression
  - for any wrong
  lexicon: HALOT
  rationale: 'The Hebrew phrase literally means ''in/for every offense.'' In idiomatic
    English within a prohibition, ''for no offense'' best conveys the universal negative
    sense: under no circumstance of offense should retaliation follow. The Greek parallel
    ἐπὶ παντὶ ἀδικήματι likewise supports a broad sense such as ''for every wrong/offense.'''
- source_word: אַל תְּשַׁלֵּם רַע
  chosen: repay evil
  alternatives:
  - return evil
  - pay back harm
  lexicon: HALOT
  rationale: שׁלם in the piel commonly carries the sense 'repay, recompense.' 'Repay
    evil' preserves the retaliatory nuance and matches the ethical warning of the
    line. The Greek μὴ μηνιάσῃς ('do not be resentful/angry') reflects a somewhat
    interpretive or variant rendering, but the Hebrew witness is primary here and
    clearly points to repayment rather than merely inward anger.
- source_word: לְרֵעַ
  chosen: to your neighbor
  alternatives:
  - to a companion
  - to your fellow
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a neighbor, companion, or fellow person in relational
    proximity. 'Neighbor' is natural English and fits wisdom-style ethical instruction.
    The Greek τῷ πλησίον directly supports 'neighbor.'
- source_word: וְאַל תִּהֲלַךְ
  chosen: and do not walk
  alternatives:
  - and do not go
  - and do not conduct yourself
  lexicon: HALOT
  rationale: הלך literally means 'walk/go,' and wisdom literature often uses 'walk'
    metaphorically for conduct. Retaining 'walk' preserves the idiom while remaining
    readable.
- source_word: בְּדֶרֶךְ גַּאֲוָה
  chosen: in the way of pride
  alternatives:
  - on the path of arrogance
  - in a proud way
  - in the way of insolence
  lexicon: HALOT
  rationale: דֶּרֶךְ plus an abstract noun forms a common metaphor for manner of life.
    גַּאֲוָה can mean pride, arrogance, or haughtiness. 'The way of pride' preserves
    the metaphor and keeps the moral force concise. The Greek ἐν ἔργοις ὕβρεως ('in
    works of insolence') points in the same semantic field of arrogant behavior, confirming
    the sense though not the exact wording.
