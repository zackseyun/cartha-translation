translation:
  text: As the rulers are wise, so the city is inhabited; but an undisciplined king
    will ruin a city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'a city is inhabited by the prudence of its rulers.'
      The Greek parallel expresses the thought as the city's inhabitants reflecting
      their leader.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - ruler
  lexicon: HALOT
  rationale: Standard sense in Hebrew; the singular political head is in view.
- source_word: פָּרוּעַ
  chosen: undisciplined
  alternatives:
  - unrestrained
  - lawless
  - disorderly
  lexicon: HALOT
  rationale: The adjective conveys looseness or lack of restraint. 'Undisciplined'
    fits the moral-political sense in context without over-specifying criminality.
    The Greek parallel reflects the idea through civic leadership rather than this
    exact adjective, but the Hebrew witness is primary here.
- source_word: יַשְׁחִית
  chosen: will ruin
  alternatives:
  - will destroy
  - will corrupt
  lexicon: HALOT
  rationale: From שחת, denoting causing destruction or ruin. 'Ruin' suits a city in
    a governance proverb and is slightly less absolute than 'destroy,' matching the
    likely social-political sense.
- source_word: עִיר
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: Standard rendering for the civic community/polity in both Hebrew and
    Greek parallel.
- source_word: נוֹשֶׁבֶת
  chosen: is inhabited
  alternatives:
  - is settled
  - is populated
  lexicon: HALOT
  rationale: The Hebrew passive/medio-passive sense points to a city being inhabited
    or settled. The Greek parallel likewise speaks of 'all those dwelling in it,'
    supporting this civic-population sense.
- source_word: בְּשֶׂכֶל
  chosen: are wise
  alternatives:
  - with wisdom
  - through prudence
  lexicon: HALOT
  rationale: Literally 'with prudence/insight.' In English, rendering the clause as
    'the rulers are wise' brings out the predicative sense naturally while preserving
    the governance emphasis. This is informed by the Greek parallel's 'according to
    the leader... so all the inhabitants,' which links civic condition to the quality
    of leadership.
- source_word: שָׂרֶיהָ
  chosen: the rulers
  alternatives:
  - its princes
  - its officials
  lexicon: HALOT
  rationale: Plural of שר, denoting leaders or officials. 'Rulers' is clear modern
    English and fits the civic context. The Greek has singular 'leader of the city'
    in a parallel formulation, but the Hebrew plural is retained in translation.
