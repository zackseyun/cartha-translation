theological_decisions:
- issue: Relationship between the two cola in Hebrew and Greek parallel
  chosen_reading: Render the Hebrew proverb directly while allowing the Greek parallel
    to inform the sense that a city's condition reflects its leadership.
  alternative_readings:
  - 'Translate more literally: ''A city is inhabited by the prudence of its rulers'''
  - 'Conform more closely to the Greek: ''As the ruler of the city is, so are all
    its inhabitants'''
  rationale: The Hebrew is the primary witness for this verse and should govern the
    main text. However, the Greek parallel clarifies that the saying concerns the
    moral and social effect of leadership on the whole city. The chosen English keeps
    the Hebrew imagery while reading naturally in English.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual translation input'
