theological_decisions:
- issue: Whether to make explicit the object of defiance as the Lord, following the
    Greek parallel
  chosen_reading: Keep the Hebrew's terser 'defiance' in the main text and let the
    second colon identify alienation from God as the sense.
  alternative_readings:
  - The beginning of a man's pride is turning away from the Lord, and his heart departs
    from his Maker.
  rationale: The Hebrew witness is primary and reads more tersely than the Greek,
    with מוּעָז not explicitly naming the Lord as the object. The Greek parallel clarifies
    the theological direction of the proverb, so the translation chooses an English
    term that can bear that sense without overtranslating the Hebrew. The second colon
    then makes the Godward rupture explicit.
  doctrine_reference: Translation philosophy §§1, 3
