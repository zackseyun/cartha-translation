translation:
  text: For the hope of arrogance is sin, and its source pours out wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''For the beginning of pride is sin, and the one who holds fast
      to it will pour out abomination.'' The Greek reflects a notably different first
      clause and expands the second.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִקְוֵה
  chosen: hope
  alternatives:
  - gathering
  - reservoir
  - beginning
  lexicon: HALOT
  rationale: The Hebrew מִקְוֶה commonly denotes 'hope' or 'that in which one trusts,'
    which fits the Hebrew witness directly. The Greek parallel has ἀρχή ('beginning'),
    suggesting either a different Vorlage or interpretive rendering. Because the project
    gives primacy to the surviving Hebrew of Sirach, the main text follows 'hope,'
    while the Greek-based alternative is preserved in a footnote.
- source_word: זָדוֹן
  chosen: arrogance
  alternatives:
  - pride
  - insolence
  - presumption
  lexicon: HALOT
  rationale: זָדוֹן denotes proud, presumptuous arrogance. 'Arrogance' communicates
    the moral posture clearly in modern English, while remaining close to the Hebrew.
    The Greek ὑπερηφανία likewise supports the semantic field of pride/arrogance.
- source_word: חֵטְא
  chosen: sin
  alternatives:
  - offense
  lexicon: HALOT
  rationale: Straightforward rendering of the Hebrew noun for sin; also confirmed
    by the Greek ἁμαρτία.
- source_word: מְקוֹרָהּ
  chosen: its source
  alternatives:
  - its spring
  - its fountain
  - its origin
  lexicon: HALOT
  rationale: The feminine suffix most naturally refers back to arrogance/pride as
    a personified reality. 'Source' preserves the metaphor while sounding natural
    in English. 'Spring' or 'fountain' are possible, but 'source' better bridges the
    metaphor to the following verb 'pours out.'
- source_word: יַבִּיעַ
  chosen: pours out
  alternatives:
  - bubbles forth
  - gushes out
  - utters
  lexicon: HALOT
  rationale: The verb conveys something welling up or pouring forth from a spring.
    'Pours out' fits the water-source imagery created by מְקוֹרָהּ.
- source_word: זִמָּה
  chosen: wickedness
  alternatives:
  - scheming
  - lewdness
  - depravity
  lexicon: HALOT
  rationale: זִמָּה can denote wicked intent, depravity, or notorious misconduct.
    In this wisdom context, 'wickedness' is broad enough to preserve the moral force
    without narrowing it to sexual sin. The Greek βδέλυγμα ('abomination') reflects
    a related but not identical moral intensification, so that alternative is footnoted
    rather than adopted in the main text.
