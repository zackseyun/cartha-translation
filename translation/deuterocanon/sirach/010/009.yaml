theological_decisions:
- issue: Use of Hebrew as primary witness despite a difficult final clause
  chosen_reading: Translate from the extant Hebrew, while allowing the Greek parallel
    to inform the sense of mortality and humiliation.
  alternative_readings:
  - 'Translate primarily from the Greek: ''Why is earth and ashes proud? For in life
    I cast out his inward parts.'''
  - Emend the Hebrew toward a clearer mortuary sense such as 'for in his life his
    body decays/is cast off'
  rationale: Project policy gives primacy to the Hebrew where it survives. Here the
    Hebrew is extant but textually difficult ('major_mismatch'), especially in the
    final clause. The draft therefore keeps the Hebrew wording as the base text, but
    the Greek parallel confirms that the verse's point is the absurdity of human pride
    in light of bodily frailty and death.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is primary where it survives;
    use Greek parallel as actual translation input.'
