translation:
  text: Why does dust and ashes exalt itself, though in its life its body is lifted
    up?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew final clause is difficult. The Greek parallel reads, 'For in life
      I cast out his inward parts,' emphasizing human bodily corruption and mortality.
      The Hebrew may similarly point to the body's humiliation or perishability.
    reason: alternative_reading
lexical_decisions:
- source_word: מַה
  chosen: Why
  alternatives:
  - What
  lexicon: HALOT
  rationale: In this interrogative rhetorical construction, 'Why' best conveys the
    sense of rebuke ('why should ...?') rather than a bare 'what?'.
- source_word: יִּגְאֶה
  chosen: does exalt itself
  alternatives:
  - is proud
  - acts arrogantly
  - boasts
  lexicon: HALOT
  rationale: From גאה, the sense is becoming lofty/exalting oneself. 'Exalt itself'
    preserves the imagery of self-elevation and matches the rhetorical critique of
    pride.
- source_word: עָפָר וָאֵפֶר
  chosen: dust and ashes
  alternatives:
  - dust and ash
  lexicon: HALOT
  rationale: A fixed biblical expression for human frailty and mortality. The plural
    'ashes' is idiomatic in English and preserves the traditional force of the pair.
- source_word: אֲשֶׁר
  chosen: when
  alternatives:
  - that
  - since
  - although
  lexicon: HALOT
  rationale: The clause is difficult in the Hebrew witness. Rendering אֲשֶׁר here
    as introducing a temporal/circumstantial clause ('when') yields coherent English
    while keeping close to the source's logic.
- source_word: בְּחַיָּיו
  chosen: in its life
  alternatives:
  - during its lifetime
  - while alive
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase. 'In its life'
    stays close to the Hebrew while remaining intelligible.
- source_word: יוּרַם
  chosen: is raised up
  alternatives:
  - is lifted up
  - is exalted
  lexicon: HALOT
  rationale: The passive of רום suggests being raised/lifted up. 'Is raised up' preserves
    the verbal link with pride/elevation without overinterpreting.
- source_word: גִּוְיוֹ
  chosen: its body
  alternatives:
  - its corpse
  - its carcass
  lexicon: HALOT
  rationale: The noun can denote body/corpse. Given the Hebrew wording alone, 'body'
    is the least overdetermined choice, though the Greek parallel points toward entrails/corpse
    imagery and suggests a more mortality-focused sense.
