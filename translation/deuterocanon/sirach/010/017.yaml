  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐξήρανεν ἐξ αὐτῶν καὶ ἀπώλεσεν αὐτούς, καὶ κατέπαυσεν ἀπὸ γῆς τὸ μνημόσυνον
