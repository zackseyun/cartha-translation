translation:
  text: He swept them from the earth and uprooted them, and he made their memory cease
    from the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew וְסִחָם is difficult; the Greek parallel supports the sense of removing
      or wiping them out. An alternative rendering is, 'He wiped them from the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסִחָם
  chosen: he swept them
  alternatives:
  - he wiped them away
  - he dried them up
  - he removed them
  lexicon: HALOT
  rationale: The Hebrew form is somewhat uncommon/uncertain in isolation, so the Greek
    parallel ἐξήρανεν/ἀπώλεσεν is used as a control. In context, the sense is forceful
    removal or clearing away. 'Swept them' preserves vividness without overcommitting
    to a more specific image like 'dried up.'
- source_word: מֵאֶרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: Hebrew אֶרֶץ can mean 'land' or 'earth.' Because the phrase recurs in
    both cola and the Greek has ἀπὸ γῆς, 'earth' best preserves the broader, universal
    sense of eradication.
- source_word: וַיִּתְּשֵׁם
  chosen: and uprooted them
  alternatives:
  - and tore them out
  - and plucked them up
  lexicon: HALOT
  rationale: From נתשׁ, commonly used for pulling up by the roots. 'Uprooted' is idiomatic
    English and preserves the metaphor of total removal.
- source_word: וַיַּשְׁבֵּת
  chosen: and he made ... cease
  alternatives:
  - and he destroyed
  - and he put an end to
  lexicon: HALOT
  rationale: The Hiphil of שׁבת means to cause to cease. This is more precise than
    simply 'destroyed,' and it matches the object 'their memory' well.
- source_word: זִכְרָם
  chosen: their memory
  alternatives:
  - their remembrance
  - their memorial
  lexicon: HALOT
  rationale: '''Memory'' is the most natural modern English rendering and fits the
    idiom of erasing a people''s remembered name or legacy.'
