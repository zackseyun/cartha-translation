- issue: Divergence between the extant Hebrew and Greek parallel
  chosen_reading: Translate primarily from the surviving Hebrew, while allowing the
    Greek to inform the sense of the final phrase as material need.
  alternative_readings:
  - A Greek-based rendering such as 'Better one who works than one who walks about
    boasting and lacking bread'
  rationale: The project philosophy gives primacy to the Hebrew where it survives
    in Sirach, but the source is flagged 'major_mismatch' and the Greek differs substantially.
    The English therefore stays anchored in the Hebrew wording while letting the Greek
    confirm that the warning concerns self-exaltation amid need/poverty. Because the
    divergence is substantial, the alternative should be preserved in a footnote rather
    than silently harmonized.
