translation:
  text: Do not act too wisely to serve your own desire, and do not honor yourself
    in the time of your need.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness reads very differently here: ''Better one who works in
      everything than one who goes about boasting and lacks bread.'' The Hebrew surviving
      in the Cairo Geniza warns against self-serving cleverness and self-honor in
      time of need.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תּתְחַכַּם
  chosen: Do not act too wisely
  alternatives:
  - Do not be overwise
  - Do not play the wise man
  - Do not scheme cleverly
  lexicon: HALOT
  rationale: The hitpael of חכם here is reflexive/iterative, warning against self-styled
    cleverness or affected wisdom. 'Act too wisely' preserves the caution against
    self-serving cleverness without overparaphrasing. The Greek parallel does not
    directly mirror this clause, which increases uncertainty, so a relatively literal
    rendering is preferable.
- source_word: לַעֲבוֹד
  chosen: to serve
  alternatives:
  - to work for
  - to labor for
  lexicon: HALOT
  rationale: The infinitive of עבד commonly means 'to serve' or 'to work.' 'Serve'
    fits the ethical warning and allows the object 'your own desire' to stand starkly
    as the thing being served.
- source_word: חֶפְצֶךָ
  chosen: your own desire
  alternatives:
  - your pleasure
  - your will
  - what you want
  lexicon: HALOT
  rationale: חפץ can denote delight, desire, or pleasure. 'Your own desire' best captures
    the self-directed sense in context and makes clear that the warning concerns self-interest.
- source_word: וְאַל תִּתְכַּבֵּד
  chosen: and do not honor yourself
  alternatives:
  - and do not glorify yourself
  - and do not make yourself important
  lexicon: HALOT
  rationale: 'The hitpael of כבד is reflexive: to honor oneself, make oneself weighty,
    or seek self-glory. ''Honor yourself'' is direct and readable, while preserving
    the reflexive force.'
- source_word: בְּמוֹעֵד
  chosen: in the time of
  alternatives:
  - at the time of
  - in the season of
  lexicon: HALOT
  rationale: מוֹעֵד often means appointed time or season. Here it introduces the circumstance
    in which self-exaltation is inappropriate. 'In the time of' is natural English
    and sufficiently formal.
- source_word: צָרְכֶּךָ
  chosen: your need
  alternatives:
  - your distress
  - your want
  - your necessity
  lexicon: HALOT
  rationale: Given the Greek parallel's reference to lacking bread, the Hebrew likely
    points to need or want rather than merely abstract necessity. 'Your need' is concise
    and fits both the Hebrew and the Greek sense of poverty or lack.
