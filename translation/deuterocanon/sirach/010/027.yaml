translation:
  text: Better is one who works and has abundant wealth than one who honors himself
    and lacks food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek witness: ''My child, glorify your soul in gentleness, and give it
      honor according to its worth.'' The Hebrew and Greek differ substantially here.'
    reason: alternative_reading
lexical_decisions:
- source_word: טוֹב
  chosen: Better is
  alternatives:
  - Good is
  - It is better
  lexicon: HALOT
  rationale: Comparative evaluative opening in a wisdom saying; English idiom is best
    conveyed with 'Better is' rather than a flat adjectival 'good.'
- source_word: עוֹבֵד
  chosen: one who works
  alternatives:
  - a worker
  - a laborer
  - a servant
  lexicon: HALOT
  rationale: From עבד in the sense of laboring/working. Here the contrast is with
    self-exaltation and lack, not servile status, so 'one who works' best captures
    the practical wisdom sense without importing slavery language.
- source_word: וְיוֹתֵר הוֹן
  chosen: and has abundant wealth
  alternatives:
  - and has more wealth
  - and increases wealth
  - and has plenty
  lexicon: HALOT
  rationale: The phrase is terse and somewhat awkward in Hebrew. With הוֹן meaning
    wealth/substance and יותר conveying excess or abundance, the sense is that the
    working person possesses material sufficiency or plenty. 'Has abundant wealth'
    preserves the economic contrast more clearly than a wooden 'more wealth.'
- source_word: מִמִּתְכַּבֵּד
  chosen: than one who honors himself
  alternatives:
  - than one who glorifies himself
  - than one who makes himself important
  - than one who is honored
  lexicon: HALOT
  rationale: Reflexive Hitpael sense favors self-honoring/self-exaltation rather than
    passive 'is honored.' The proverb contrasts humble productive labor with pretentious
    self-importance.
- source_word: וַחֲסַר
  chosen: and lacks
  alternatives:
  - but lacks
  - and is without
  lexicon: HALOT
  rationale: Simple conjunctive plus adjective/participle sense; 'and lacks' keeps
    the compact parallelism.
- source_word: מַתָּן
  chosen: food
  alternatives:
  - provision
  - gift
  - sustenance
  lexicon: HALOT
  rationale: Although the consonants could suggest 'gift,' in this proverbial context
    the sense is basic provision or sustenance. This is supported by the Greek parallel,
    which points in a different direction overall and highlights source instability;
    nevertheless, within the Hebrew line the contrast with wealth and lack is best
    resolved as lacking food/provision rather than lacking a present.
