translation:
  text: Among brothers their chief is honored, and one who fears God among his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Rich and honored and poor—their boast is the fear of
      the Lord.'' The Hebrew and Greek witnesses differ substantially here; the main
      text follows the extant Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּין
  chosen: among
  alternatives:
  - between
  - in the midst of
  lexicon: HALOT
  rationale: The preposition here introduces the social setting within a group, so
    'among' is more natural in English than the more strictly bilateral 'between'.
- source_word: אַחִים
  chosen: brothers
  alternatives:
  - brothers and sisters
  - kinsmen
  - siblings
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural. Per project philosophy,
    a gender-accurate rendering is preferred unless context clearly demands a mixed-gender
    inclusive gloss. Here the social proverb-like saying can stand as 'brothers,'
    with the representative force left intact rather than expanded.
- source_word: רֹאשָׁם
  chosen: their chief
  alternatives:
  - their head
  - their leader
  lexicon: HALOT
  rationale: Hebrew רֹאשׁ literally means 'head,' but in social-political contexts
    commonly denotes a chief or leader. 'Their chief' preserves the concrete metaphor's
    sense without sounding unnatural in English.
- source_word: נִכְבָּד
  chosen: is honored
  alternatives:
  - is esteemed
  - is glorious
  - is weighty
  lexicon: HALOT
  rationale: From כבד in the nifal/passive sense of being honored or held in esteem.
    'Is honored' fits the social context and reads clearly.
- source_word: וִירֵא אֱלֹהִים
  chosen: and one who fears God
  alternatives:
  - and a God-fearer
  - and he who fears God
  lexicon: HALOT
  rationale: The Hebrew phrase is singular and character-based. Rendering it as 'one
    who fears God' preserves the proverbial singular and avoids awkwardness. 'God'
    follows the Hebrew witness, even though the Greek parallel has 'the Lord.'
- source_word: בְּעַמּוֹ
  chosen: among his people
  alternatives:
  - in his people
  - with his people
  lexicon: HALOT
  rationale: The beth preposition with עַם here is best rendered locatively/socially
    as 'among his people.' This keeps the parallelism with 'among brothers' and yields
    idiomatic English.
