translation:
  text: Arrogance and insolence are not fitting for a man—much less for one born of
    a woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Arrogance was not created for human beings, nor wrathful
      anger for those born of women.'' The Hebrew witness instead reads ''arrogance
      and insolence ... much less for one born of a woman.'''
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא נָאוֶה
  chosen: are not fitting
  alternatives:
  - is not becoming
  - is not proper
  - was not created for
  lexicon: HALOT
  rationale: The Hebrew adjective/verb conveys what is suitable or becoming. 'Are
    not fitting' preserves the evaluative sense of impropriety from the Hebrew. The
    Greek parallel's οὐκ ἔκτισται ('was not created for') likely reflects an interpretive
    or variant tradition, but the Hebrew witness is primary here.
- source_word: לֶאֱנוֹשׁ
  chosen: for a man
  alternatives:
  - for a human being
  - for humankind
  lexicon: HALOT
  rationale: אֱנוֹשׁ commonly means 'man' in the sense of a mortal human. The singular
    is retained. This follows the project's gender-accurate policy while allowing
    the representative force of the Hebrew singular.
- source_word: זָדוֹן
  chosen: arrogance
  alternatives:
  - pride
  - presumption
  - insolence
  lexicon: HALOT
  rationale: זָדוֹן denotes proud, presumptuous self-exaltation. 'Arrogance' best
    captures the inner posture here, while leaving עַזוּת to express the more outward
    brazenness.
- source_word: וְעַזוּת
  chosen: insolence
  alternatives:
  - boldness
  - impudence
  - shamelessness
  lexicon: HALOT
  rationale: The term refers to brazen audacity or shameless hardness. 'Insolence'
    fits the negative moral sense and pairs well with 'arrogance' without collapsing
    the two terms into one idea.
- source_word: אַף
  chosen: much less
  alternatives:
  - even
  - indeed
  - all the more
  lexicon: HALOT
  rationale: In context אַף intensifies the statement toward the following phrase.
    Given the moral comparison, 'much less' brings out the climactic force more naturally
    in English than a bare 'even'.
- source_word: לִילוּד אִשָּׁה
  chosen: for one born of a woman
  alternatives:
  - for the offspring of a woman
  - for one born from a woman
  lexicon: HALOT
  rationale: The Hebrew idiom emphasizes human frailty and creatureliness. 'One born
    of a woman' is idiomatic English and preserves the allusion to mortal humanity.
    The Greek γεννήμασιν γυναικῶν similarly points to those born from women.
