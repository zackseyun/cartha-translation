theological_decisions:
- issue: Relationship between the Hebrew wording and the Greek parallel
  chosen_reading: Translate the Hebrew as primary while allowing the Greek to inform
    nuance; retain 'not fitting' rather than importing the Greek's 'not created for'
    into the main text.
  alternative_readings:
  - Arrogance was not created for human beings, nor furious anger for those born of
    women.
  rationale: The project gives primacy to the most original available witness; here
    the Hebrew survives and is high-confidence. The Greek differs notably in predicate
    ('was not created for') and in the second vice ('wrath of anger' rather than 'insolence').
    Because the Hebrew is extant and validated, the main text follows it, while the
    Greek alternative is preserved in a footnote as a significant parallel reading.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
