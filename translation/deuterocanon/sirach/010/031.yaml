translation:
  text: How honored is one in his wealth, and how despised in his poverty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel reads differently in order and emphasis: ''But the one
      honored in poverty—how much more in wealth? And the one without honor in wealth—how
      much more in poverty?'' The Hebrew witness here is taken as primary, with the
      Greek used as a consistency check.'
    reason: alternative_reading
lexical_decisions:
- source_word: נִכְבָּד
  chosen: honored
  alternatives:
  - glorious
  - esteemed
  lexicon: HALOT
  rationale: From כבד in the nifal/passive sense of being weighty, honored, or esteemed.
    'Honored' is natural English and preserves the social-status nuance in context.
- source_word: בְּעָשְׁרוֹ
  chosen: in his wealth
  alternatives:
  - because of his wealth
  - when he is rich
  lexicon: HALOT
  rationale: The beth preposition can mark circumstance or sphere. 'In his wealth'
    stays close to the Hebrew while allowing the implied social setting to be heard.
    The Greek parallel likewise frames the condition by ἐν + noun.
- source_word: אֵיכָכָה
  chosen: how
  alternatives:
  - how much more
  - to what degree
  lexicon: HALOT
  rationale: An exclamatory/interrogative particle expressing degree. 'How' best captures
    the rhetorical force without over-interpreting the comparison.
- source_word: וְנִקְלֶה
  chosen: despised
  alternatives:
  - dishonored
  - held cheap
  - contemptible
  lexicon: HALOT
  rationale: From קלה in the nifal/passive sense of being lightly esteemed or treated
    with contempt. 'Despised' gives the strongest and clearest social contrast to
    'honored.'
- source_word: בְּעָנְיוֹ
  chosen: in his poverty
  alternatives:
  - because of his poverty
  - when he is poor
  lexicon: HALOT
  rationale: As with בְּעָשְׁרוֹ, the preposition marks the condition or circumstance.
    'In his poverty' preserves the Hebrew structure and the antithetical parallelism.
- source_word: 'Greek parallel: δοξαζόμενος / ἄδοξος / ποσαχῶς'
  chosen: supported the exclamatory contrast reflected in the Hebrew
  alternatives:
  - glorified / inglorious / how much more
  lexicon: BDAG
  rationale: The Greek tradition appears to preserve a related but differently ordered
    rhetorical comparison. It confirms the verse's concern with honor versus dishonor
    under conditions of poverty and wealth, but the Hebrew remains primary for the
    main wording.
