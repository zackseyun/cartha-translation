translation:
  text: One should not despise an intelligent poor man, nor honor a wrongdoer who
    has been exalted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek tradition reads very differently here: ''A great man, a judge, and
      a ruler will be honored, and none of them is greater than the one who fears
      the Lord.'' The Hebrew witness behind the main text instead gives an ethical
      maxim about not despising a poor but intelligent man and not honoring an exalted
      wrongdoer.'
    reason: textual_variant
lexical_decisions:
- source_word: אֵין לִבְזוֹת
  chosen: One should not despise
  alternatives:
  - there is no despising
  - do not despise
  lexicon: HALOT
  rationale: The Hebrew construction with אֵין + infinitive functions idiomatically
    as a prohibition or statement of impropriety. English 'One should not despise'
    captures the gnomic, wisdom-style force better than a wooden 'there is no despising.'
- source_word: דַּל
  chosen: poor man
  alternatives:
  - poor person
  - lowly man
  - the poor
  lexicon: HALOT
  rationale: דַּל denotes one who is poor, weak, or of low status. Because the Hebrew
    is singular masculine and proverbial, 'poor man' preserves the gendered singular
    form per project philosophy, while still functioning generically.
- source_word: מַשְׁכִּיל
  chosen: intelligent
  alternatives:
  - wise
  - prudent
  - discerning
  lexicon: HALOT
  rationale: 'מַשְׁכִּיל points to understanding or prudence. ''Intelligent'' fits
    the immediate contrast with social status: poverty does not negate real understanding.
    ''Wise'' is possible, but ''intelligent'' better reflects the participial sense
    of being insightful.'
- source_word: לְכַבֵּד
  chosen: honor
  alternatives:
  - glorify
  - show respect to
  lexicon: HALOT
  rationale: כבד in the piel commonly means to honor or give weight to. 'Honor' is
    the most natural English equivalent in this ethical maxim.
- source_word: עַוָּל
  chosen: wrongdoer
  alternatives:
  - unjust man
  - evildoer
  - wicked man
  lexicon: HALOT
  rationale: עַוָּל denotes one characterized by injustice or wrongdoing. 'Wrongdoer'
    is clear modern English and avoids over-specifying the moral category beyond the
    Hebrew.
- source_word: אֲשֶׁר הוּרָם
  chosen: who has been exalted
  alternatives:
  - though he has been raised high
  - who has been elevated
  lexicon: HALOT
  rationale: The passive perfect indicates someone elevated in status. 'Who has been
    exalted' preserves the passive and the social-status nuance. The Greek parallel
    likewise reflects public honor/status, supporting this sense.
