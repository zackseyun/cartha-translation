theological_decisions:
- issue: Referent of אֲדוֹן
  chosen_reading: the Lord (God)
  alternative_readings:
  - a master
  rationale: Although אֲדוֹן can denote a human master, the wisdom setting and the
    Greek parallel Κυρίου indicate a divine referent. This also aligns with the project's
    default rendering of divine lordship language.
  doctrine_reference: 'DOCTRINE.md: κύριος/Kyrios -> Lord; original-language primacy'
- issue: Rendering of אֲנָשִׁים
  chosen_reading: men
  alternative_readings:
  - people
  - humanity
  rationale: The Hebrew specifically uses a masculine plural term for humans. In line
    with the project's gender-accurate policy, 'men' is retained as the representative
    term rather than neutralizing it.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
