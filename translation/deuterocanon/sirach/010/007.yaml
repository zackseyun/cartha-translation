translation:
  text: Pride is hateful to the Lord and to men, and from both comes oppressive wrongdoing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Pride is hateful before the Lord and men, and from both it will
      commit unjust things.'' The Hebrew more naturally yields the sense that oppressive
      wrongdoing proceeds from pride''s offense before both God and humans.'
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂנוּאָה
  chosen: is hateful
  alternatives:
  - is hated
  - is detestable
  lexicon: HALOT
  rationale: Predicate adjective from the root שׂנא expresses that pride is an object
    of hatred/abhorrence. 'Is hateful' is natural English and preserves the evaluative
    force without over-intensifying.
- source_word: לְאָדוֹן
  chosen: to the Lord
  alternatives:
  - before the Lord
  - to a master
  lexicon: HALOT
  rationale: The Hebrew reads 'to Lord/master'; in this wisdom context and confirmed
    by the Greek Κυρίου, the referent is God. Following project doctrine for divine
    title language, 'the Lord' is preferred.
- source_word: וַאֲנָשִׁים
  chosen: and to men
  alternatives:
  - and to people
  - and to human beings
  lexicon: HALOT
  rationale: The source uses the masculine plural 'men' in a representative sense.
    Per doctrine, gender-accurate rendering is preferred over flattening to a neutral
    term unless context requires it.
- source_word: גַּאֲוָה
  chosen: Pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: HALOT
  rationale: The noun denotes exalted self-regard or arrogance. 'Pride' is the broad,
    idiomatic English equivalent and matches the moral category in wisdom literature.
- source_word: וּמִשְּׁנֵיהֶם
  chosen: from both
  alternatives:
  - from the two of them
  - by both
  lexicon: HALOT
  rationale: The preposition מן with 'the two of them' points back to the two parties
    just named, the Lord and men. 'From both' best captures source sense in concise
    English.
- source_word: מַעַל
  chosen: wrongdoing
  alternatives:
  - treachery
  - faithlessness
  - transgression
  lexicon: HALOT
  rationale: מעל often carries the sense of unfaithful or treacherous offense. Here,
    paired with עֹשֶׁק and checked against Greek πλημμελήσει, a broader moral term
    works best in English. 'Wrongdoing' preserves the offense sense without forcing
    a covenantal nuance that the immediate context does not foreground.
- source_word: עֹשֶׁק
  chosen: oppressive
  alternatives:
  - oppression
  - injustice
  - extortion
  lexicon: HALOT
  rationale: The noun denotes oppression or exploitation. Because the Hebrew phrase
    is compressed, rendering it adjectivally in 'oppressive wrongdoing' preserves
    both elements in readable English. The Greek ἄδικα supports an unjust/wrongful
    sense, while the Hebrew specifically contributes the oppression nuance.
