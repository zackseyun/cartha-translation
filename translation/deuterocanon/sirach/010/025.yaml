translation:
  text: Do not act wisely in doing your work, and do not boast in a time of distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Hebrew witness here differs substantially: ''A prudent slave
      is exalted, and a foolish slave will not complain'' (the final verb is uncertain
      and may carry a nuance such as ''murmur'' or ''find pretext'').'
    reason: textual_variant
lexical_decisions:
- source_word: Μὴ σοφίζου
  chosen: Do not act wisely
  alternatives:
  - Do not be clever
  - Do not show yourself wise
  - Do not play the wise man
  lexicon: LSJ
  rationale: The Hebrew and Greek witnesses diverge sharply; given the major mismatch
    and the instruction to use the Greek parallel as actual input, the Greek imperative
    is translated directly. σοφίζου here is middle/passive in sense, warning against
    self-display of wisdom or overwise behavior. 'Act wisely' preserves the verbal
    force without importing a positive commendation.
- source_word: ποιῆσαι τὸ ἔργον σου
  chosen: in doing your work
  alternatives:
  - to do your work
  - in carrying out your task
  lexicon: LSJ
  rationale: This infinitival phrase expresses the sphere or action in view. 'In doing
    your work' is idiomatic English and keeps the connection to one's task or labor.
- source_word: μὴ δοξάζου
  chosen: do not boast
  alternatives:
  - do not glorify yourself
  - do not pride yourself
  lexicon: LSJ
  rationale: The verb can mean 'glorify' or 'take pride/boast.' In this admonitory
    context, 'boast' is the most natural modern English and captures the reflexive
    sense implied by context.
- source_word: ἐν καιρῷ στενοχωρίας σου
  chosen: in a time of distress
  alternatives:
  - in the time of your hardship
  - when you are in trouble
  - in your affliction
  lexicon: LSJ
  rationale: στενοχωρία denotes distress, affliction, or hardship. 'In a time of distress'
    is clear, natural, and preserves the temporal force of καιρός.
- source_word: עֶבֶד מַשְׂכּיל הוּרָם, וְעֶבֶד סָכָל לֹא יִתְאוֹנֵן
  chosen: not followed in main text
  alternatives:
  - A prudent slave is exalted, and a foolish slave will not complain/escape blame
  lexicon: HALOT
  rationale: The extant Hebrew in Kahana is a major mismatch with the Greek witness
    for this verse. Because the project uses the Greek source for deuterocanonical
    books and the prompt flags the Hebrew as major_mismatch while instructing that
    the Greek parallel be used as actual translation input, the main text follows
    the Greek. The Hebrew is preserved in a footnote as a significant alternative
    witness.
