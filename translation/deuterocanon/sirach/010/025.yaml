theological_decisions:
- issue: Divergent Hebrew and Greek witnesses for Sirach 10:25
  chosen_reading: Main text follows the Greek admonition about not acting wisely or
    boasting in distress.
  alternative_readings:
  - 'Hebrew witness: ''A prudent slave is exalted, and a foolish slave will not complain''
    (or similar, depending on how יתאונן is construed).'
  rationale: This is primarily a textual-critical rather than doctrinal issue, but
    it materially affects translation. The project's deuterocanonical base text is
    Greek, while Hebrew Sirach is used where it survives. Here the supplied Hebrew
    and Greek are not parallel in sense, and the source metadata marks the Hebrew
    as 'major_mismatch.' To avoid presenting a conflated text, the translation follows
    the Greek and documents the Hebrew as an alternative witness.
  doctrine_reference: 'PHILOSOPHY.md: Swete LXX is the Greek source for every deuterocanonical
    book; Sefaria Ben Sira Hebrew is used where it survives, with source uncertainty
    preserved honestly.'
