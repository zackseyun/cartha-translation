theological_decisions:
- issue: Primary source selection where Hebrew and Greek differ notably
  chosen_reading: Translate from the extant Hebrew as primary, while allowing the
    Greek parallel to inform the contextual sense of divinely appointed human leadership.
  alternative_readings:
  - 'Translate toward the Greek: ''In the hand of the Lord is a man''s success, and
    upon the face of the scribe he will place his glory.'''
  rationale: Per project philosophy, extant Hebrew Sirach is primary where it survives.
    Here the Hebrew and Greek appear to reflect markedly different forms of the verse.
    Because the Hebrew witness is present and rated high confidence, the main text
    follows it. The Greek is preserved in a footnote as a significant alternative
    tradition.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    use Greek parallel as actual input/consistency check.'
- issue: Gendered language in אִישׁ
  chosen_reading: man
  alternative_readings:
  - person
  - human
  rationale: The source is grammatically masculine singular and likely refers to an
    individual ruler rather than humanity in general. Following the project's gender-accurate
    policy, the main rendering keeps masculine reference, while the contextual qualifier
    'right' clarifies function.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral.
