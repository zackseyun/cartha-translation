translation:
  text: In the hand of God is the rule of the world, and in due time he will raise
    up over it the right man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''In the hand of the Lord is a man''s success, and on the face of
      the scribe he will place his glory.'' The Greek tradition differs substantially
      from the extant Hebrew here.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיַד
  chosen: In the hand of
  alternatives:
  - By the hand of
  - In God's power is
  lexicon: HALOT
  rationale: The Hebrew idiom בְּיַד commonly denotes control or power. Rendering
    it formally as 'in the hand of' preserves the metaphor while remaining clear in
    English.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - the Lord
  lexicon: HALOT
  rationale: The Hebrew witness reads אֱלֹהִים, not the divine name YHWH, so 'God'
    is the accurate rendering.
- source_word: מֶמְשֶׁלֶת
  chosen: the rule
  alternatives:
  - dominion
  - government
  - authority
  lexicon: HALOT
  rationale: The noun denotes ruling power or dominion. 'Rule' is concise, natural
    English and fits the statement about governance over the world.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  - the earth
  lexicon: HALOT
  rationale: תבל commonly refers to the inhabited world. 'The world' is the most idiomatic
    equivalent here.
- source_word: וְאִישׁ
  chosen: the right man
  alternatives:
  - a man
  - a person
  - a human being
  lexicon: HALOT
  rationale: The Hebrew literally has 'and a man,' but in context the line concerns
    God's appointment of a ruler over the world. The Greek parallel points toward
    a suitable human agent. 'The right man' brings out the contextual force without
    erasing the masculine singular of the Hebrew.
- source_word: לְעֵת
  chosen: at the right time
  alternatives:
  - in due time
  - at a time
  - for the occasion
  lexicon: HALOT
  rationale: The phrase means 'at the proper time' or 'in due time.' 'At the right
    time' is clear modern English and preserves the sense of divinely fitting timing.
- source_word: יַעֲמוֹד עָלֶיהָ
  chosen: he will raise up over it
  alternatives:
  - he will set over it
  - he will cause to stand over it
  - he will appoint over it
  lexicon: HALOT
  rationale: Literally the verb is 'he will make stand/stand' over it. In context
    of installing a ruler, 'raise up over it' captures the idiom of establishing someone
    in authority. The Greek parallel differs substantially, but the Hebrew witness
    is primary here.
