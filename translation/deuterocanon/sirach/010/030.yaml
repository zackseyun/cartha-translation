theological_decisions:
- issue: Use of the Hebrew witness despite Greek parallel divergence
  chosen_reading: 'Translate the extant Hebrew main line as a positive contrast between
    two honored men: one honored for insight, one for wealth.'
  alternative_readings:
  - The Greek parallel reads a rhetorical comparison about one honored in poverty
    and one dishonored in wealth, asking 'how much more' in the opposite condition.
  rationale: Per project philosophy, the surviving Hebrew is primary for Sirach where
    extant. However, the Greek parallel is materially different and likely reflects
    a different textual form or substantial corruption/rewriting in transmission.
    The English main text therefore follows the Hebrew witness, while the Greek alternative
    is preserved in a footnote because the mismatch is significant and source validation
    flags a major mismatch.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input and preserve uncertainty honestly.'
