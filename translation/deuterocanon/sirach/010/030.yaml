translation:
  text: There is a poor man who is honored because of his insight, and there is one
    who is honored because of his wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''But the one honored in poverty—how much more in wealth?
      And the one without honor in wealth—how much more in poverty?'' The Hebrew and
      Greek differ substantially here.'
    reason: alternative_reading
lexical_decisions:
- source_word: דַּל
  chosen: poor man
  alternatives:
  - poor person
  - lowly man
  lexicon: HALOT
  rationale: The Hebrew adjective/noun denotes one who is poor or weak. Because the
    Hebrew is singular and masculine, and Ben Sira often speaks in representative
    masculine terms, 'poor man' preserves the source's gendered singular form better
    than a neutral plural or abstract rendering.
- source_word: נִכְבָּד
  chosen: honored
  alternatives:
  - esteemed
  - glorious
  - important
  lexicon: HALOT
  rationale: From כבד in the nifal/passive sense, the word denotes being honored or
    held in esteem. 'Honored' fits both occurrences and keeps the social-status nuance
    without overstating it as 'glorious.'
- source_word: בִּגְלַל
  chosen: because of
  alternatives:
  - on account of
  - by reason of
  lexicon: HALOT
  rationale: The preposition marks cause or basis. 'Because of' is natural modern
    English and clearly expresses the causal relation in both clauses.
- source_word: שִׂכְלוֹ
  chosen: his insight
  alternatives:
  - his prudence
  - his understanding
  - his wisdom
  lexicon: HALOT
  rationale: שכל can denote understanding, prudence, or good sense. 'Insight' captures
    intellectual discernment in accessible English and avoids overloading the line
    with the more technical or broader term 'wisdom.'
- source_word: עָשְׁרוֹ
  chosen: his wealth
  alternatives:
  - his riches
  - his prosperity
  lexicon: HALOT
  rationale: The noun refers to material wealth or riches. 'Wealth' is the most straightforward
    modern equivalent and matches the social contrast with poverty.
- source_word: יֵשׁ ... וְיֵשׁ
  chosen: There is ... and there is ...
  alternatives:
  - One ... and another ...
  - There is ... and there is one ...
  lexicon: HALOT
  rationale: The Hebrew existential construction sets up a balanced contrast between
    two cases. Retaining 'There is ... and there is ...' preserves the aphoristic
    parallelism of the Hebrew.
