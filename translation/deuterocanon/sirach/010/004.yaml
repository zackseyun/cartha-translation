theological_decisions:
- issue: Relation between divine sovereignty and human political authority
  chosen_reading: The verse states that human rule is under God's control, without
    specifying a full doctrine of kingship or providence.
  alternative_readings:
  - A narrower reading limited to kingship over the land, following the Greek parallel
  - A stronger theological claim that God directly appoints each ruler
  rationale: The Hebrew says 'In the hand of God is the rule of every man,' which
    clearly affirms divine sovereignty over human governance. It does not explicitly
    spell out the mechanism of appointment. The Greek parallel points toward authority
    over 'the earth' and God's raising up a useful ruler, but the Hebrew witness is
    primary and should not be harmonized into a more specific doctrine than it states.
  doctrine_reference: Preserve theological tension rather than resolve it.
