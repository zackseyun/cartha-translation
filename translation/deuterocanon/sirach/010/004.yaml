lexical_decisions:
- source_word: בְּיַד
  chosen: in the hand of
  alternatives:
  - by the hand of
  - under the control of
  lexicon: HALOT
  rationale: The Hebrew idiom בְּיַד commonly expresses control or power. Rendering
    it formally as 'in the hand of' preserves the metaphor while remaining clear in
    English.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - the Lord
  lexicon: HALOT
  rationale: The Hebrew text reads אֱלֹהִים, not the divine name YHWH. 'God' is therefore
    the direct and accurate rendering.
- source_word: מֶמְשֶׁלֶת
  chosen: the rule
  alternatives:
  - dominion
  - authority
  - government
  lexicon: HALOT
  rationale: The noun denotes ruling power or dominion. 'Rule' is concise, natural
    English and fits the political context of the surrounding passage. The Greek parallel
    has ἐξουσία ('authority/power'), which supports this semantic range.
- source_word: כָּל גֶּבֶר
  chosen: every man
  alternatives:
  - every person
  - every warrior
  - everyone
  lexicon: HALOT
  rationale: גבר is grammatically and semantically masculine, often meaning 'man'
    in the sense of an individual male or representative human. In keeping with the
    project's gender-accurate policy, 'every man' is preferred over a neutralizing
    rendering. The immediate context concerns rulers and human governance, so representative
    'man' fits.
- source_word: וְלִפְנֵי
  chosen: and before
  alternatives:
  - and in the presence of
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition preserving the Hebrew
    syntax and the sense of standing in relation to another figure.
- source_word: מְחוֹקֵק
  chosen: the lawgiver
  alternatives:
  - the ruler
  - the legislator
  lexicon: HALOT
  rationale: The Hebrew term literally denotes one who decrees or legislates. 'Lawgiver'
    best preserves the lexical force. The Greek parallel diverges here, reading 'he
    will raise up the useful one at the right time upon it,' which suggests a different
    Vorlage or interpretive tradition; since the Hebrew witness is primary here, the
    Hebrew sense is retained.
- source_word: יָשִׁית
  chosen: he sets
  alternatives:
  - he places
  - he bestows
  lexicon: HALOT
  rationale: The verb שׂים means 'to put, place, set.' 'He sets' is a natural English
    equivalent that preserves the active verbal sense without overinterpreting.
- source_word: הוֹדוֹ
  chosen: his splendor
  alternatives:
  - his majesty
  - his honor
  - his glory
  lexicon: HALOT
  rationale: הוד can denote splendor, majesty, or honor. 'Splendor' preserves the
    elevated sense while avoiding importing specifically theological 'glory' language
    where the text may simply refer to regal dignity. The suffix is rendered 'his.'
