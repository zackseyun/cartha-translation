translation:
  text: In the hand of God is the rule of every man, and before the lawgiver he sets
    his splendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''In the hand of the Lord is the authority of the earth,
      and he will raise up the useful one over it at the right time.'' The Greek reflects
      a substantially different second line and likely a different Hebrew Vorlage
      or interpretive development.'
    reason: alternative_reading
  - marker: b
    text: Or 'his majesty' or 'his honor' for 'his splendor.'
