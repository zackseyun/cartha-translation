theological_decisions:
- issue: Representative masculine in אדם
  chosen_reading: a man
  alternative_readings:
  - a person
  - humankind
  rationale: The proverb speaks of a human being generically, but the Hebrew form
    is masculine singular. Per doctrine, the translation keeps the gendered form rather
    than flattening it to a neutral expression.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Use of Hebrew as primary witness with Greek parallel in view
  chosen_reading: Translate the extant Hebrew directly, while allowing the Greek to
    confirm the general sense of postmortem possession by low creatures.
  alternative_readings:
  - 'Translate more closely to the Greek: ''he will inherit creeping things and beasts,
    worms'''
  rationale: For Sirach where Hebrew survives, the project translates from the Hebrew
    witness. The Greek supports the verse's overall meaning but differs in the creature
    list, so the Hebrew wording remains primary and the Greek-based alternative is
    preserved in a footnote.
  doctrine_reference: PHILOSOPHY.md §What we are translating
