translation:
  text: At a man's death, his inheritance is maggots and worms, gnats and creeping
    things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew כִּנִּים may also be rendered 'lice' or more generally 'vermin';
      the exact insect is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel reads more broadly, 'he will inherit creeping things
      and beasts, worms,' differing from the Hebrew list of creatures.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּמוֹת
  chosen: When ... dies
  alternatives:
  - at the death of
  - in dying
  lexicon: HALOT
  rationale: 'The preposition with the infinitive construct is best rendered temporally
    here: ''when ... dies.'' This yields natural English while preserving the Hebrew
    sense.'
- source_word: אָדָם
  chosen: a man
  alternatives:
  - man
  - humankind
  - a person
  lexicon: HALOT
  rationale: The singular Hebrew noun refers to a human individual in a representative
    sense. Following the project's gender-accurate policy, 'a man' preserves the masculine
    singular form better than the more neutral 'a person,' while the saying still
    functions generically.
- source_word: יִנְחַל
  chosen: what he inherits is
  alternatives:
  - he will inherit
  - he inherits
  lexicon: HALOT
  rationale: The verb means 'inherit' or 'receive as an inheritance.' Because the
    listed items are what come to a person at death, English idiom is clearer with
    'what he inherits is,' making explicit the predicative force implied by the Hebrew
    sequence.
- source_word: רִמָּה
  chosen: maggots
  alternatives:
  - worms
  - maggot
  lexicon: HALOT
  rationale: רִמָּה commonly denotes maggots or worm-like decay-creatures associated
    with corpses. 'Maggots' distinguishes it from the following תוֹלֵעָה and fits
    the death context.
- source_word: וְתוֹלֵעָה
  chosen: and worms
  alternatives:
  - and grubs
  - and worm
  lexicon: HALOT
  rationale: תוֹלֵעָה often denotes a worm. Rendering it separately from רִמָּה preserves
    the Hebrew pairing of related but not identical decay-creatures.
- source_word: כִּנִּים
  chosen: gnats
  alternatives:
  - lice
  - vermin
  lexicon: HALOT
  rationale: The Hebrew can denote small parasitic or swarming insects; 'gnats' is
    a plausible rendering in this list of lowly creatures. The Greek parallel has
    broader terms ('creeping things and beasts, worms') rather than a direct equivalent,
    so the Hebrew witness governs, but the uncertainty should be preserved in a footnote.
- source_word: וָרֶמֶשׂ
  chosen: and creeping things
  alternatives:
  - and creeping creatures
  - and reptiles
  lexicon: HALOT
  rationale: רֶמֶשׂ is a broad term for creeping things or small crawling creatures.
    'Creeping things' is the most transparent and biblically consistent English rendering.
