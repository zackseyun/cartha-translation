translation:
  text: Kingship passes from nation to nation because of violence and arrogance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek tradition: ''Kingship is transferred from nation to nation because
      of injustice and outrages and money.'''
    reason: textual_variant
lexical_decisions:
- source_word: מַלְכוּת
  chosen: Kingship
  alternatives:
  - kingdom
  - royal rule
  - sovereignty
  lexicon: HALOT
  rationale: The Hebrew denotes royal rule or kingship rather than merely a geographic
    realm. 'Kingship' best matches the abstract sense and aligns with the Greek βασιλεία,
    which can denote rule/kingdom. Here the saying concerns transfer of political
    dominion, so 'kingship' is preferable to the more territorial 'kingdom'.
- source_word: מִגּוֹי אֶל גּוֹי
  chosen: from nation to nation
  alternatives:
  - from one nation to another
  - from people to people
  lexicon: HALOT
  rationale: גוי here refers to a nation/people in the political sense. 'From nation
    to nation' preserves the concise proverbial rhythm of the Hebrew.
- source_word: תִּסֹּב
  chosen: passes
  alternatives:
  - turns
  - changes hands
  - is transferred
  lexicon: HALOT
  rationale: The verb literally suggests turning or going around, but in context it
    describes the shifting of rule from one nation to another. 'Passes' is idiomatic
    English that preserves the sense without over-paraphrasing. The Greek μετάγεται
    supports the idea of transfer.
- source_word: בִּגְלַל
  chosen: because of
  alternatives:
  - on account of
  - due to
  lexicon: HALOT
  rationale: This preposition marks cause. 'Because of' is the clearest modern English
    equivalent.
- source_word: חֲמַס
  chosen: violence
  alternatives:
  - wrongdoing
  - injustice
  - oppression
  lexicon: HALOT
  rationale: In Hebrew חמס commonly denotes violence or violent wrongdoing. Although
    the Greek has ἀδικίας ('injustice'), the Hebrew witness is primary here, and 'violence'
    best reflects the Hebrew term while still fitting the political-moral context.
- source_word: גַּאֲוָה
  chosen: arrogance
  alternatives:
  - pride
  - haughtiness
  lexicon: HALOT
  rationale: The Hebrew points to pride/haughtiness. 'Arrogance' communicates the
    moral vice in clear modern English. It also pairs naturally with 'violence' in
    English style.
