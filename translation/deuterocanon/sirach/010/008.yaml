theological_decisions:
- issue: Difference between Hebrew and Greek causal list
  chosen_reading: Follow the Hebrew's two causes, 'violence and arrogance,' in the
    main text.
  alternative_readings:
  - 'Greek: ''because of injustice and insults/outrages and wealth/money'''
  rationale: The project translates Sirach from the extant Hebrew where available,
    while using the Greek as a real control. Here the Hebrew is high-confidence and
    validated, so it governs the main text. The Greek reflects a notably expanded
    or divergent list of causes, important enough to preserve in a footnote as an
    alternative textual tradition.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    use Greek parallel as consistency check'
