translation:
  text: A slight illness makes a physician look yellow; a king today, and tomorrow
    he falls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and a king today, and tomorrow he will come to his end,''
      interpreting the Hebrew ''falls'' more specifically as death.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew says literally 'look yellow,' using a color-change image for
      the visible effect of sickness.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁמֶץ
  chosen: slight
  alternatives:
  - trace
  - small amount
  - mere speck
  lexicon: HALOT
  rationale: The noun denotes a small amount or slight degree. In context it qualifies
    the illness as something minor, sharpening the irony that even a small sickness
    can affect a physician.
- source_word: מַחֲלָה
  chosen: illness
  alternatives:
  - sickness
  - disease
  lexicon: HALOT
  rationale: A general term for sickness. 'Illness' is natural modern English and
    fits the proverb-like statement without overstating severity.
- source_word: יַצְהִיב
  chosen: makes ... look yellow
  alternatives:
  - turns yellow
  - makes pale
  lexicon: HALOT
  rationale: From a verb related to becoming yellow/pale. Because English idiom does
    not commonly say someone 'turns yellow' from sickness in this context, 'makes
    ... look yellow' preserves the color imagery while remaining readable. The Greek
    parallel's σκώπτει ἰατρός points to a difficult tradition, but the Hebrew is the
    primary witness here and supports the bodily-color image.
- source_word: רוֹפֵא
  chosen: physician
  alternatives:
  - doctor
  - healer
  lexicon: HALOT
  rationale: The Hebrew denotes one who heals. 'Physician' fits wisdom-literature
    register better than the more colloquial 'doctor' and avoids the broader ambiguity
    of 'healer'.
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT
  rationale: Straightforward royal title; no contextual reason to vary the standard
    gloss.
- source_word: הַיּוֹם
  chosen: today
  lexicon: HALOT
  rationale: Temporal adverb marking present status in contrast with the next day.
- source_word: וּמָחָר
  chosen: and tomorrow
  alternatives:
  - but tomorrow
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb creates a sharp contrast. English
    can preserve this simply as 'and tomorrow,' letting the juxtaposition carry the
    force.
- source_word: יִפּוֹל
  chosen: he falls
  alternatives:
  - he will fall
  - he dies
  - he comes to ruin
  lexicon: HALOT
  rationale: The Hebrew verb normally means 'fall.' In wisdom context it can imply
    downfall or death. The Greek parallel has τελευτήσει ('will end/die'), which shows
    an interpretive tradition toward death, but the Hebrew image of 'fall' is broader
    and should be retained in the main text.
