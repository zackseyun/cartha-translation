theological_decisions:
- issue: Whether the king's fate should be rendered specifically as death or more
    generally as downfall
  chosen_reading: more general 'he falls'
  alternative_readings:
  - he dies
  - he comes to his end
  rationale: The Hebrew primary witness uses יִפּוֹל, 'he falls,' which can encompass
    death but does not require it. The Greek parallel interprets the line more specifically
    with 'will die/come to his end.' Following original-language primacy for this
    verse, the main text keeps the broader Hebrew wording, while the Greek-specific
    sense is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3
