translation:
  text: A wise judge sets his people in order, and the rule of one who understands
    is well arranged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew יוֹסֵד can also be rendered 'establishes' or 'founds'; the Greek
      parallel points toward the sense of governing or ordering a people.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹפֵט
  chosen: judge
  alternatives:
  - ruler
  - magistrate
  lexicon: HALOT
  rationale: The Hebrew noun most naturally denotes a judge or governing official.
    The Greek parallel has κριτής, confirming 'judge' rather than a broader 'ruler.'
- source_word: יוֹסֵד
  chosen: sets ... in order
  alternatives:
  - establishes
  - founds
  lexicon: HALOT
  rationale: Although the verb can suggest founding or establishing, in this context
    with 'people' as object and with the Greek παιδεύσει / the second colon's 'well
    arranged,' the sense is practical ordering and stabilizing of the people rather
    than literal founding. 'Sets ... in order' captures the governance sense in readable
    English.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: The possessive is explicit in Hebrew and Greek (λαὸν αὐτοῦ). 'People'
    is the natural English equivalent for עם here.
- source_word: מֶמְשֶׁלֶת
  chosen: the rule
  alternatives:
  - government
  - dominion
  - administration
  lexicon: HALOT
  rationale: The noun refers to governing authority or rule. 'Rule' is concise and
    idiomatic, and fits the parallelism with the first colon.
- source_word: מֵבִין
  chosen: one who understands
  alternatives:
  - the discerning man
  - the intelligent one
  - the prudent one
  lexicon: HALOT
  rationale: The participle denotes a person of understanding or discernment. 'One
    who understands' preserves the personal force without over-specifying gender,
    while still reflecting the singular individual in view.
- source_word: סְדוּרָה
  chosen: well arranged
  alternatives:
  - ordered
  - properly established
  lexicon: HALOT
  rationale: The adjective conveys being ordered or arranged. 'Well arranged' brings
    out the positive evaluative sense and matches the governance context.
- source_word: ἡγεμονία συνετοῦ τεταγμένη ἔσται
  chosen: the rule of one who understands is well arranged
  alternatives:
  - the government of a prudent man will be orderly
  lexicon: BDAG
  rationale: The Greek parallel supports reading the second colon as a statement about
    orderly governance. It also helps justify an English rendering that emphasizes
    order rather than mere existence.
