translation:
  text: A ruler, a governor, and a judge are honored, but none is greater than one
    who fears God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness here has a substantially different reading: ''Free men
      will serve a wise slave, and an understanding man will not complain.'''
    reason: textual_variant
lexical_decisions:
- source_word: נָגִיד
  chosen: ruler
  alternatives:
  - leader
  - prince
  lexicon: HALOT
  rationale: נָגִיד denotes one set over others in authority. 'Ruler' is broad, natural
    English and avoids the dynastic nuance 'prince' can suggest where the context
    lists civic offices.
- source_word: מוֹשֶׁל
  chosen: governor
  alternatives:
  - ruler
  - one who rules
  lexicon: HALOT
  rationale: Since נָגִיד already covers 'ruler,' a differentiated rendering helps
    preserve the threefold list. 'Governor' conveys an exercising authority figure
    without overtranslating.
- source_word: שׁוֹפֵט
  chosen: judge
  alternatives:
  - magistrate
  lexicon: HALOT
  rationale: Standard and contextually fitting rendering for a judicial office.
- source_word: נִכְבָּדוּ
  chosen: are honored
  alternatives:
  - are esteemed
  - are glorified
  lexicon: HALOT
  rationale: The passive plural indicates receiving honor or esteem. 'Are honored'
    is idiomatic and fits the social-status comparison in the verse.
- source_word: וְאֵין גָּדוֹל
  chosen: but none is greater
  alternatives:
  - and there is none greater
  - yet no one is greater
  lexicon: HALOT
  rationale: The clause states a superlative comparison. 'But none is greater' brings
    out the contrast with the honored officials in smooth English.
- source_word: מִיְּרֵא אֱלֹהִים
  chosen: than one who fears God
  alternatives:
  - than the God-fearing person
  - than one who reveres God
  lexicon: HALOT
  rationale: The Hebrew idiom 'fears God' is a key biblical expression for reverent
    piety and should be preserved rather than flattened to mere respect. 'One who
    fears God' keeps the singular representative force.
