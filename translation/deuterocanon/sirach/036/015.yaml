translation:
  text: Have compassion on the city of your sanctuary, Jerusalem, the city of your
    resting place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Show mercy on the city of your sanctuary, Jerusalem, the city of your
      dwelling place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκτείρησον
  chosen: Have compassion
  alternatives:
  - Show mercy
  - Pity
  lexicon: BDAG
  rationale: Imperative of οἰκτείρω, calling for compassionate mercy. 'Have compassion'
    is natural modern English and preserves the emotional force better than the potentially
    condescending 'pity.'
- source_word: πόλιν
  chosen: the city
  alternatives:
  - city
  lexicon: LSJ
  rationale: Anarthrous in Greek here but definite by apposition with Jerusalem and
    possessive qualifiers; English idiom naturally takes it as definite.
- source_word: ἁγιάσματός
  chosen: your sanctuary
  alternatives:
  - your holy place
  - your consecrated place
  lexicon: LSJ
  rationale: ἁγίασμα denotes a holy/sanctified place. 'Sanctuary' is concise, idiomatic,
    and fitting for Jerusalem as the city associated with God's holy dwelling.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: καταπαύματός
  chosen: your resting place
  alternatives:
  - your dwelling place
  - your place of rest
  lexicon: LSJ
  rationale: κατάπαυμα denotes a place of rest or settling. 'Resting place' preserves
    the noun's concrete sense while fitting the prayer's reverent tone.
