theological_decisions:
- issue: How to render the paired genitives describing Jerusalem
  chosen_reading: Jerusalem is described as both 'the city of your sanctuary' and
    'the city of your resting place.'
  alternative_readings:
  - Jerusalem, your holy city, your resting place
  - the city where your sanctuary rests
  rationale: The Greek presents two appositional descriptions of Jerusalem. The translation
    preserves both images without collapsing them into a single paraphrase, maintaining
    the theological association of Jerusalem with God's holy presence and chosen dwelling.
  doctrine_reference: Translation philosophy §§1, 3, 6
