translation:
  text: Where there is no fence, the property will be plundered; and where there is
    no wife, he will groan as he wanders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hedge' for 'fence.' The Greek term denotes a protective enclosure or
      barrier around property.
    reason: lexical_alternative
  - marker: b
    text: The Greek literally says 'and where there is no wife, will groan wandering,'
      with the male householder understood as the implied subject.
    reason: lexical_alternative
lexical_decisions:
- source_word: φραγμός
  chosen: fence
  alternatives:
  - hedge
  - wall
  - enclosure
  lexicon: LSJ
  rationale: φραγμός denotes a fence or enclosure barrier. 'Fence' is the most natural
    modern English equivalent here, preserving the image of unprotected property without
    over-specifying a stone wall.
- source_word: διαρπαγήσεται
  chosen: will be plundered
  alternatives:
  - will be seized
  - will be pillaged
  - will be ravaged
  lexicon: LSJ
  rationale: The future passive conveys forcible taking by others. 'Will be plundered'
    fits κτῆμα ('property/possession') idiomatically and preserves the sense of vulnerability
    to theft or raiding.
- source_word: κτῆμα
  chosen: property
  alternatives:
  - possession
  - estate
  - goods
  lexicon: LSJ
  rationale: κτῆμα can mean possession or property broadly. 'Property' is clear, modern,
    and suitably general; 'estate' would sound too large-scale, and 'goods' too movable.
- source_word: γυνή
  chosen: wife
  alternatives:
  - woman
  lexicon: LSJ
  rationale: In this proverbial domestic context, γυνή most naturally means 'wife,'
    not merely 'woman.' The saying concerns household stability rather than generic
    female company.
- source_word: στενάξει
  chosen: will groan
  alternatives:
  - will sigh
  - will lament
  lexicon: LSJ
  rationale: '''Will groan'' preserves the stronger sense of distress in στενάζω better
    than the milder ''sigh,'' while remaining idiomatic.'
- source_word: πλανώμενος
  chosen: as he wanders
  alternatives:
  - wandering
  - going astray
  - roaming
  lexicon: LSJ
  rationale: The participle indicates a state accompanying the groaning. 'As he wanders'
    captures the ongoing unsettled condition and reads naturally in English.
- source_word: οὗ οὐκ ἔστιν ... καὶ οὗ οὐκ ἔστιν
  chosen: Where there is no ... and where there is no ...
  alternatives:
  - He who has no ... and he who has no ...
  - Where ... is absent
  lexicon: LSJ
  rationale: The repeated relative construction is proverb-like. Rendering it as 'Where
    there is no...' preserves the parallelism and avoids awkward literalism.
