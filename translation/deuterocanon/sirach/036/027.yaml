theological_decisions:
- issue: Gendered implication in the second clause
  chosen_reading: a man will groan as he wanders
  alternative_readings:
  - he will groan as he wanders
  - one will groan as one wanders
  rationale: The Greek lacks an explicit noun for the subject of στενάξει, but the
    context implies the husband/householder lacking a wife. Because the source is
    gendered in sense through γυνή ('wife') and the proverb concerns household order,
    'a man' makes the implied subject explicit in a gender-accurate way rather than
    neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
