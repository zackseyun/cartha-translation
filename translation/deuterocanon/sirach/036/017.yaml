theological_decisions:
- issue: Interpretation of 'your creatures from the beginning'
  chosen_reading: A reference to God's created beings/things that have existed from
    the beginning
  alternative_readings:
  - A reference to the ancient tribes/people formed by God
  - A reference to God's primordial works more generally
  rationale: The Greek κτίσμασιν naturally points to created things/beings, but in
    context the prayer may shade toward God's people or the foundational order he
    established. The main text keeps the broader lexical sense rather than narrowing
    it to Israel without explicit textual warrant.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Force of 'raise up the prophecies'
  chosen_reading: A plea for God to bring prophetic words into active effect or renewed
    standing
  alternative_readings:
  - A plea to fulfill the prophecies
  - A plea to revive prophets themselves
  rationale: The object is 'prophecies,' not 'prophets,' so the line is best taken
    of prophetic utterances. 'Raise up' preserves the metaphor and leaves open whether
    the emphasis is fulfillment, vindication, or renewed force.
  doctrine_reference: Translation philosophy §3, §5
