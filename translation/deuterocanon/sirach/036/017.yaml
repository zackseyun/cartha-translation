translation:
  text: Give testimony to your creatures from the beginning, and raise up the prophecies
    spoken in your name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your creations that were from the beginning.' The Greek phrase is
      compressed and may refer broadly to what God created at the beginning rather
      than specifically to living creatures.
    reason: lexical_alternative
  - marker: b
    text: Or 'fulfill the prophecies in your name.' The Greek literally says 'raise
      up the prophecies,' which may imply bringing them into effect.
    reason: alternative_reading
lexical_decisions:
- source_word: δὸς
  chosen: Give
  alternatives:
  - Grant
  - Provide
  lexicon: LSJ
  rationale: Aorist imperative of δίδωμι; 'Give' is the most direct and natural imperative
    in English.
- source_word: μαρτύριον
  chosen: testimony
  alternatives:
  - witness
  - evidence
  lexicon: LSJ
  rationale: μαρτύριον commonly denotes testimony or witness. 'Testimony' preserves
    the juridical/revelatory sense without overinterpreting the object of the testimony.
- source_word: τοῖς ... κτίσμασίν σου
  chosen: to your creatures
  alternatives:
  - for your creatures
  - to your creations
  lexicon: LSJ
  rationale: κτίσμα can mean a created thing or creature. 'Creatures' is the most
    natural rendering here, while still allowing the broad sense of beings/things
    God has made. The dative is retained with 'to' rather than paraphrased away.
- source_word: τοῖς ἐν ἀρχῇ
  chosen: from the beginning
  alternatives:
  - that were at the beginning
  - in the beginning
  lexicon: LSJ
  rationale: The phrase modifies κτίσμασιν and likely means those existing from the
    beginning. 'From the beginning' is idiomatic English and avoids a wooden but awkward
    relative clause. Because the Greek construction is somewhat compressed, this rendering
    reflects the probable sense while acknowledging some ambiguity.
- source_word: ἔγειρον
  chosen: raise up
  alternatives:
  - awaken
  - stir up
  - fulfill
  lexicon: LSJ
  rationale: Imperative of ἐγείρω, literally 'raise up.' Although some interpreters
    may understand an implicit sense like 'bring to fulfillment,' the Greek verb itself
    is more basic, so 'raise up' best preserves the wording without importing interpretation.
- source_word: προφητείας
  chosen: the prophecies
  alternatives:
  - prophetic words
  - predictions
  lexicon: LSJ
  rationale: προφητεία is straightforwardly 'prophecy' or 'prophetic utterance.' The
    plural article is represented by 'the prophecies.'
- source_word: τὰς ἐπʼ ὀνόματί σου
  chosen: spoken in your name
  alternatives:
  - that are upon your name
  - concerning your name
  - bearing your name
  lexicon: LSJ
  rationale: The prepositional phrase ἐπʼ ὀνόματί σου is idiomatically difficult if
    rendered woodenly. In prophetic contexts, 'in your name' captures agency/authorization.
    Adding 'spoken' makes the English natural and reflects the implied verbal force
    of prophecies uttered under God's name, without changing the core sense.
