translation:
  text: And all men are from the ground, and Adam was created from the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all people.' The Greek says 'all men' (ἄνθρωποι πάντες), using a masculine
      plural with representative force for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωποι πάντες
  chosen: all men
  alternatives:
  - all people
  - all human beings
  lexicon: BDAG
  rationale: The phrase is generic for humanity, but the Greek uses the masculine
    plural ἄνθρωποι. Following the project's gender-accurate policy, 'all men' preserves
    the source form while still functioning representatively for humankind in context.
- source_word: ἀπὸ ἐδάφους
  chosen: from the ground
  alternatives:
  - from the soil
  - from the earth
  lexicon: LSJ
  rationale: ἐδάφος commonly denotes ground/soil. 'Ground' is natural English and
    preserves the concrete creation imagery without over-specifying texture.
- source_word: γῆς
  chosen: the earth
  alternatives:
  - the ground
  - the land
  lexicon: LSJ
  rationale: γῆ can mean earth, land, or ground. Here the paired wording with ἐδάφους
    suggests a slight variation rather than strict repetition; 'the earth' keeps the
    broader term while maintaining the parallelism.
- source_word: ἐκτίσθη
  chosen: was created
  alternatives:
  - was formed
  - was made
  lexicon: LSJ
  rationale: κτίζω in passive commonly means 'be created.' 'Was created' best reflects
    the verb's standard sense and preserves the creation motif linking Adam with all
    humanity.
- source_word: Ἀδάμ
  chosen: Adam
  lexicon: LSJ
  rationale: Proper name transliterated according to project policy. The verse likely
    alludes to the primal human as Adam specifically, not merely generic 'man'.
