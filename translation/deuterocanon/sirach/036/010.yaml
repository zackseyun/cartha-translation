theological_decisions:
- issue: Representative force of ἄνθρωποι πάντες in relation to Adam
  chosen_reading: The verse states that all men come from the ground, then grounds
    that claim in Adam's creation from the earth.
  alternative_readings:
  - The second clause could be read as appositional, treating Adam as paradigmatic
    humanity rather than only the individual first man.
  rationale: The Greek presents a general statement followed by Adam's creation as
    supporting example or prototype. The translation preserves both the historical
    name 'Adam' and the representative force of the first clause without collapsing
    one into the other.
