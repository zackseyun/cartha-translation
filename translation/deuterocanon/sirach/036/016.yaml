translation:
  text: Fill Zion with your praise, and your people with your glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Fill Zion with the proclamation of your mighty deeds,' or 'with your
      excellencies.' The Greek noun can denote praise or the recounting of praiseworthy
      deeds/virtues.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and your people from your glory.' In English this is naturally
      expressed as 'fill your people with your glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλῆσον
  chosen: Fill
  alternatives:
  - Make full
  - Satisfy
  lexicon: LSJ
  rationale: 'Aorist imperative of πίμπλημι/πληρόω-family sense: a direct petition
    to cause fullness. ''Fill'' is the most natural imperative in English and preserves
    the concrete imagery.'
- source_word: Σιὼν
  chosen: Zion
  alternatives:
  - Sion
  lexicon: LSJ
  rationale: Standard English transliteration of the place/name in biblical usage.
- source_word: ἀρεταλογίας
  chosen: praise
  alternatives:
  - praises
  - mighty deeds
  - excellencies
  - glorious deeds
  lexicon: LSJ
  rationale: The noun can denote praise or the recounting of excellencies/mighty deeds.
    In this prayer context, 'Fill Zion with your praise' is idiomatic and captures
    the sense of Zion being filled with proclamation of God's excellencies. Because
    the term is somewhat unusual and could point more specifically to celebrated mighty
    acts, alternatives are preserved in a footnote.
- source_word: σου
  chosen: your
  lexicon: Greek grammar
  rationale: Genitive second-person singular possessive modifying both 'praise' and
    'glory' in context.
- source_word: ἀπὸ τῆς δόξης σου
  chosen: with your glory
  alternatives:
  - from your glory
  - with the glory that comes from you
  lexicon: LSJ
  rationale: Although ἀπό commonly means 'from,' after a filling verb Greek can use
    a source expression where English more naturally uses 'with' for the content filling
    the object. 'With your glory' gives the natural English sense while preserving
    that the glory is God's own.
- source_word: τὸν λαόν σου
  chosen: your people
  alternatives:
  - the people who are yours
  lexicon: LSJ
  rationale: Straightforward rendering of the accusative object in the second clause.
