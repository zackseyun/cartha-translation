theological_decisions:
- issue: Sense of ἀρεταλογίας in a prayer for restoration
  chosen_reading: Rendered broadly as 'praise' in the main text
  alternative_readings:
  - '''mighty deeds'''
  - '''excellencies'''
  - '''glorious deeds'''
  rationale: The Greek term can emphasize either praise offered or the celebrated
    excellencies/deeds being proclaimed. The main text uses the more readable and
    prayer-appropriate 'praise,' while preserving the more specific lexical possibilities
    in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve significant
    lexical alternatives in footnotes where ambiguity remains.'
- issue: Idiomatic force of ἀπό after a filling verb
  chosen_reading: Expressed as English 'with your glory'
  alternative_readings:
  - '''from your glory'''
  rationale: A formally wooden 'from your glory' is possible, but English normally
    marks the content of filling with 'with.' The source nuance of origin remains
    implicit in 'your glory.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English without flattening the source.'
