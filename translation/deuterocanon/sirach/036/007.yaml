theological_decisions:
- issue: Comparative wording of ὑπερέχει
  chosen_reading: surpass another
  alternative_readings:
  - is superior to another
  - excel another
  rationale: The verse poses a wisdom-style question about distinctions among days
    despite their common solar source. 'Surpass' preserves the comparison without
    importing a stronger moral or cultic valuation than the Greek itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
