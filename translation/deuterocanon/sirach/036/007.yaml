translation:
  text: Why does one day surpass another, when every daylight of the year comes from
    the sun?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Why is one day superior to another, when all the light of every day
      in the year is from the sun?'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: LSJ
  rationale: Introduces a direct question asking for the reason or basis of the distinction.
- source_word: ἡμέρα ἡμέρας ὑπερέχει
  chosen: does one day surpass another
  alternatives:
  - is one day superior to another
  - does day excel day
  lexicon: LSJ
  rationale: The genitive after ὑπερέχει conveys comparison. 'Surpass' is natural
    modern English and preserves the comparative force without sounding overly formal.
- source_word: πᾶν φῶς ἡμέρας
  chosen: every daylight
  alternatives:
  - all the light of day
  - every day's light
  lexicon: LSJ
  rationale: The phrase refers to the daylight belonging to each day. 'Every daylight'
    keeps the distributive sense and avoids an awkwardly literal phrase.
- source_word: ἐνιαυτοῦ
  chosen: of the year
  alternatives:
  - in the year
  - throughout the year
  lexicon: LSJ
  rationale: 'Taken with the preceding phrase to specify the scope: the days under
    consideration are the days of the year.'
- source_word: ἀφ᾽ ἡλίου
  chosen: comes from the sun
  alternatives:
  - is from the sun
  - derives from the sun
  lexicon: LSJ
  rationale: The preposition ἀπό marks source. 'Comes from' is idiomatic English that
    preserves the causal/source relation.
