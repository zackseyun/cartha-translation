theological_decisions:
- issue: Generic masculine ἄνθρωπος in a wisdom saying
  chosen_reading: man
  alternative_readings:
  - person
  - human being
  rationale: The verse is proverbial and uses a grammatically masculine singular form.
    Following the project's gender-accurate policy, 'man' is retained rather than
    neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sense of ἀνταποδώσει in context
  chosen_reading: will repay him
  alternative_readings:
  - will answer him
  - will repay him in kind
  rationale: The Greek does not explicitly state the content or moral valence of the
    repayment. The translation preserves that tension rather than resolving it into
    either wise counsel or retaliation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
