translation:
  text: A woman will accept any male, but one daughter is better than another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A wife will accept any man.' Greek γυνή can mean either 'woman' or
      'wife,' and ἄρρην can be rendered more generally as 'man,' though 'male' is
      more literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα ἄρρενα
  chosen: any male
  alternatives:
  - every male
  - any man
  lexicon: LSJ
  rationale: πάντα with singular ἄρρενα has a distributive sense, 'any/every male.'
    ἄρρην denotes a male as such, more biological than ἀνήρ ('man/husband'), so 'male'
    best reflects the Greek without importing marital nuance.
- source_word: ἐπιδέξεται
  chosen: will accept
  alternatives:
  - will receive
  - will take
  lexicon: LSJ
  rationale: The future middle indicates receiving or accepting. 'Accept' fits the
    proverb-like context about a woman's receptivity in choosing a mate better than
    the more wooden 'receive,' while avoiding the stronger and potentially misleading
    'take.'
- source_word: γυνή
  chosen: a woman
  alternatives:
  - a wife
  - woman
  lexicon: LSJ
  rationale: γυνή can mean either 'woman' or 'wife.' Here the saying is generic and
    contrasts with 'daughter,' not a specific marriage already in view, so 'a woman'
    is the least interpretively loaded rendering.
- source_word: ἔστιν δὲ
  chosen: but
  alternatives:
  - and yet there is
  - however
  lexicon: LSJ
  rationale: The phrase marks a contrast between the first and second cola. In idiomatic
    English proverb style, simple 'but' conveys the adversative force clearly.
- source_word: θυγάτηρ θυγατρός
  chosen: one daughter ... another
  alternatives:
  - a daughter than a daughter
  - daughter of a daughter
  lexicon: LSJ
  rationale: 'The repeated noun is a comparative idiom: one daughter is better than
    another. A literal ''daughter of a daughter'' would be misleading here. The comparative
    sense is required by κρεῖσσον.'
- source_word: κρεῖσσον
  chosen: is better
  alternatives:
  - is superior
  - is preferable
  lexicon: LSJ
  rationale: κρεῖσσον is the comparative 'better/superior.' 'Is better' is the most
    natural English in this aphoristic statement.
