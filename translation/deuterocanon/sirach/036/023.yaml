- issue: Interpretation of the proverb's social setting
  chosen_reading: Render the line as a general observation about women and daughters
    without adding explanatory material about marriage or morality.
  alternative_readings:
  - Interpret γυνή as 'wife' and make the saying explicitly about marriage choice
  - Soften the statement to avoid its patriarchal social assumptions
  rationale: The Greek itself is terse and proverbial. The translation should preserve
    its plain sense and social world without importing extra moral commentary or smoothing
    away the text's gendered framing.
