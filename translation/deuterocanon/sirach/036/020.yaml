translation:
  text: Every food is eaten by the stomach, but one food is better than another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'there is food better than food,' a Greek comparative expression
      meaning that some foods are better than others.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶν
  chosen: Every
  alternatives:
  - All
  lexicon: LSJ
  rationale: 'The distributive sense fits the proverb-like statement: each kind of
    food falls under the claim. ''All'' would also work, but ''Every'' reads more
    naturally with singular ''food'' in English.'
- source_word: βρῶμα
  chosen: food
  alternatives:
  - thing to eat
  - meal
  lexicon: LSJ
  rationale: βρῶμα is the general term for food or what is eaten. 'Food' is the most
    natural broad rendering here and preserves the generic scope of the saying.
- source_word: φάγεται
  chosen: is eaten
  alternatives:
  - will be eaten
  - is consumed
  lexicon: LSJ
  rationale: The future/passive form functions gnomicly in this wisdom context, expressing
    a general truth. English present passive best captures the proverbial force without
    sounding overly predictive.
- source_word: κοιλία
  chosen: stomach
  alternatives:
  - belly
  - womb
  lexicon: LSJ
  rationale: In this context of eating, κοιλία clearly refers to the digestive organ
    rather than 'womb.' 'Stomach' is more idiomatic and precise in modern English
    than 'belly'.
- source_word: ἔστιν δὲ
  chosen: but
  alternatives:
  - yet there is
  - however
  lexicon: LSJ
  rationale: 'The phrase introduces a contrast: although the stomach can eat any food,
    foods still differ in quality. ''But'' conveys the adversative turn succinctly
    in readable English.'
- source_word: βρῶμα βρώματος κάλλιον
  chosen: one food is better than another
  alternatives:
  - there is food better than food
  - one kind of food is better than another kind
  lexicon: LSJ
  rationale: The comparative construction literally contrasts 'food' with 'food.'
    Idiomatic English requires an explicit comparative pair. 'One food is better than
    another' preserves the sense that foods differ in excellence or desirability.
