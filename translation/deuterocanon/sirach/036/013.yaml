theological_decisions:
- issue: Sense of inheritance language in κατακληρονομήσεις
  chosen_reading: A prayer for God to restore the tribes to their inherited place/portion,
    expressed as 'give them their inheritance.'
  alternative_readings:
  - '''take possession of them as from the beginning'''
  - '''apportion them as an inheritance as from the beginning'''
  rationale: The Greek form could be rendered more literally in a way that makes God
    the one inheriting the tribes, but in context the prayer concerns regathering
    Israel and restoring its ancient order. The chosen rendering communicates the
    covenant-restoration sense most clearly in English while remaining anchored in
    the inheritance lexeme.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without paraphrasing beyond what the text warrants.'
