translation:
  text: Gather all the tribes of Jacob, and give them their inheritance as from the
    beginning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and inherit them as from the beginning' or 'and apportion
      them as an inheritance as from the beginning.' The Greek verb is unusual and
      carries inheritance/allotment imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύναγε
  chosen: Gather
  alternatives:
  - Assemble
  - Bring together
  lexicon: LSJ
  rationale: Imperative of συνάγω, calling for collecting or assembling. 'Gather'
    is natural modern English and preserves the direct petitional force.
- source_word: πάσας φυλὰς Ἰακώβ
  chosen: all the tribes of Jacob
  alternatives:
  - every tribe of Jacob
  - all Jacob's tribes
  lexicon: LSJ
  rationale: A straightforward rendering of the accusative phrase. 'Jacob' is retained
    rather than replacing it with 'Israel' because the Greek explicitly names Jacob.
- source_word: κατακληρονομήσεις
  chosen: give them their inheritance
  alternatives:
  - apportion them as an inheritance
  - cause them to inherit
  - re-establish them in their inheritance
  lexicon: LSJ
  rationale: The verb κατακληρονομέω is rare and built on inheritance/allotment language.
    In this prayer context, the sense is best captured as restoring or assigning the
    tribes to their inherited possession/status. 'Give them their inheritance' is
    clearer in English than a wooden 'inherit them' and fits the likely covenant-land/allotment
    sense.
- source_word: αὐτούς
  chosen: them
  lexicon: LSJ
  rationale: Direct object referring back to the tribes; rendered simply as 'them'
    within the idiom 'give them their inheritance.'
- source_word: καθὼς ἀπʼ ἀρχῆς
  chosen: as from the beginning
  alternatives:
  - as at the beginning
  - as in former times
  - as from the first
  lexicon: LSJ
  rationale: This phrase appeals to the original ordering or ancient state. 'As from
    the beginning' preserves the temporal comparison without over-interpreting whether
    the focus is creation, early Israel, or the initial allotment of the people.
