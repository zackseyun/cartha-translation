translation:
  text: By the knowledge of the Lord they were distinguished, and he altered seasons
    and festivals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were separated' or 'were set apart.' The Greek passive verb can denote
      differentiation or separation; the subject is left implicit in the Greek.
    reason: lexical_alternative
  - marker: b
    text: Or 'appointed times and feasts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν γνώσει
  chosen: By the knowledge
  alternatives:
  - In knowledge
  - Through knowledge
  lexicon: LSJ
  rationale: 'The preposition ἐν with an abstract noun can express means or sphere.
    Here a means/instrumental sense best fits the clause: the distinguishing happened
    by means of the Lord''s knowledge, not merely within a realm of knowledge.'
- source_word: Κυρίου
  chosen: of the Lord
  alternatives:
  - of the master
  lexicon: LSJ
  rationale: κύριος is rendered 'Lord' per project default and because in Jewish-Greek
    wisdom literature it naturally refers to God with reverential force.
- source_word: διεχωρίσθησαν
  chosen: were distinguished
  alternatives:
  - were separated
  - were divided
  - were set apart
  lexicon: LSJ
  rationale: The passive of διαχωρίζω can mean separate or distinguish. In this context
    of ordering times and observances, 'were distinguished' captures differentiation
    into categories without implying physical separation alone.
- source_word: ἠλλοίωσεν
  chosen: altered
  alternatives:
  - changed
  - varied
  lexicon: LSJ
  rationale: ἀλλοιόω denotes making different or changing. 'Altered' preserves the
    sense of modification in arrangement without overinterpreting the nature of the
    change.
- source_word: καιρούς
  chosen: seasons
  alternatives:
  - appointed times
  - times
  lexicon: LSJ
  rationale: καιρός often means a fitting or appointed time. Paired with ἑορτάς, 'seasons'
    gives natural English while retaining the calendrical sense. 'Appointed times'
    is possible but less smooth here.
- source_word: ἑορτάς
  chosen: festivals
  alternatives:
  - feasts
  - festal days
  lexicon: LSJ
  rationale: ἑορτή refers to a feast or festival. 'Festivals' is clear modern English
    and suits the calendrical context.
