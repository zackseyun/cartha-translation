theological_decisions:
- issue: Referent of the plural passive verb 'were distinguished'
  chosen_reading: Left implicit as 'they were distinguished' rather than supplying
    an interpretive object such as days, nations, or heavenly bodies.
  alternative_readings:
  - the days were distinguished
  - the nations were separated
  - the luminaries were distinguished
  rationale: The Greek text gives a plural passive verb without an explicit subject
    in this clause as cited. Supplying a noun would go beyond the source wording.
    The translation preserves the ambiguity rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
