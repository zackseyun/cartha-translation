  text: δὸς μισθὸν τοῖς ὑπομένουσίν σε, καὶ οἱ προφῆταί σου ἐμπιστευθήτωσαν. εἰσάκουσον,
    Κύριε, δεήσεως τῶν ἱκετῶν σου
