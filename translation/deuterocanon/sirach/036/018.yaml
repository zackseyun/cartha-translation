theological_decisions:
- issue: Sense of τοῖς ὑπομένουσίν σε
  chosen_reading: those who wait for you
  alternative_readings:
  - those who endure for you
  - those who remain steadfast toward you
  rationale: The Greek verb can carry either endurance or waiting. In a prayer asking
    God to act and vindicate his people, 'wait for you' best reflects faithful expectancy
    without excluding perseverance. The ambiguity is lexical rather than doctrinal,
    so the main text chooses the more idiomatic devotional sense.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Force of ἐμπιστευθήτωσαν regarding the prophets
  chosen_reading: let your prophets be found trustworthy
  alternative_readings:
  - let your prophets be trusted
  - let your prophets be believed
  rationale: The clause likely asks God to confirm the reliability of prophetic words
    rather than merely command hearers to trust them. The chosen rendering preserves
    that vindicatory nuance while remaining readable.
  doctrine_reference: Translation philosophy §§1, 6
