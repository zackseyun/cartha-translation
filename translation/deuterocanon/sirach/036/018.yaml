translation:
  text: Give a reward to those who wait for you, and let your prophets be trusted.
    Hear, O Lord, the prayer of your suppliants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to those who endure for you' or 'to those who remain steadfast toward
      you.' The Greek verb can express both waiting and persevering.
    reason: lexical_alternative
  - marker: b
    text: Or 'let your prophets be trusted' or 'let your prophets be believed.' The
      Greek is somewhat compressed and may refer either to the prophets' being shown
      trustworthy or to their receiving trust.
    reason: alternative_reading
lexical_decisions:
- source_word: δὸς
  chosen: Give
  alternatives:
  - Grant
  lexicon: LSJ
  rationale: A direct imperative from δίδωμι. 'Give' is the plain, forceful English
    equivalent and fits the prayer context without unnecessary elevation.
- source_word: μισθὸν
  chosen: a reward
  alternatives:
  - wages
  - recompense
  lexicon: LSJ
  rationale: μισθός commonly denotes pay, wages, or reward. In this prayer context
    'reward' best captures a divinely given recompense without implying a commercial
    transaction as strongly as 'wages'.
- source_word: τοῖς ὑπομένουσίν σε
  chosen: to those who wait for you
  alternatives:
  - to those who endure for you
  - to those who remain steadfast for you
  lexicon: LSJ
  rationale: ὑπομένω can mean remain, endure, or wait. With a personal object ('you'),
    the sense 'wait for you' is the most natural devotional rendering in context,
    expressing faithful expectancy toward God. The alternatives are possible but less
    idiomatic in English here.
- source_word: οἱ προφῆταί σου
  chosen: your prophets
  lexicon: LSJ
  rationale: Straightforward rendering of the noun phrase; no reason to obscure the
    prophetic reference.
- source_word: ἐμπιστευθήτωσαν
  chosen: be found trustworthy
  alternatives:
  - be trusted
  - be proved faithful
  - be believed
  lexicon: LSJ
  rationale: The passive imperative of ἐμπιστεύω/ἐμπιστεύομαι is difficult. 'Be trusted'
    is possible, but 'be found trustworthy' better preserves the idea that the prophets
    are shown or recognized as reliable, which suits the prayer for vindication of
    prophetic words.
- source_word: εἰσάκουσον
  chosen: Hear
  alternatives:
  - Listen to
  - Give ear to
  lexicon: LSJ
  rationale: A standard prayer verb meaning hear favorably or listen to. 'Hear' is
    concise and idiomatic in biblical prayer language.
- source_word: Κύριε
  chosen: Lord
  lexicon: LSJ
  rationale: Per doctrine, κύριος defaults to 'Lord.' Here it is a direct address
    to God in prayer.
- source_word: δεήσεως
  chosen: the prayer
  alternatives:
  - the supplication
  - the plea
  lexicon: LSJ
  rationale: δέησις often means supplication or petition. 'Prayer' is slightly broader
    but natural in English and still fits the earnest petitionary sense in context.
- source_word: τῶν ἱκετῶν σου
  chosen: of your suppliants
  alternatives:
  - of your petitioners
  - of those who implore you
  lexicon: LSJ
  rationale: ἱκέτης denotes a suppliant, one who entreats. 'Suppliants' preserves
    the formal prayer posture more precisely than the flatter 'petitioners.'
