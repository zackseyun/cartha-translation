translation:
  text: 'He who acquires a wife begins an acquisition: a helper fit for him and a
    pillar of rest.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'begins a possession' or 'begins property'; the Greek uses a cognate
      wordplay between 'acquires' and 'acquisition/possession.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'according to him,' that is, corresponding to him or suited to
      him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κτώμενος
  chosen: He who acquires
  alternatives:
  - The one who acquires
  - Whoever acquires
  - He who gets
  lexicon: BDAG
  rationale: The participial construction is generic but grammatically masculine.
    Per gender-accurate policy, 'He who acquires' preserves the masculine singular
    form and proverbial tone better than a flattened plural. 'Acquires' reflects κτάομαι
    more precisely than the colloquial 'gets'.
- source_word: γυναῖκα
  chosen: a wife
  alternatives:
  - a woman
  lexicon: BDAG
  rationale: In this context of household formation and the following appositional
    description, γυνή is best rendered 'wife' rather than the broader 'woman'.
- source_word: ἐνάρχεται
  chosen: begins
  alternatives:
  - makes a beginning of
  - starts
  lexicon: LSJ
  rationale: The verb means to begin or make a beginning. 'Begins' is concise and
    natural English while preserving the sense of commencement.
- source_word: κτήσεως
  chosen: an acquisition
  alternatives:
  - a possession
  - property
  - estate
  lexicon: LSJ
  rationale: 'The noun is cognate with κτώμενος and creates a wordplay: one who acquires
    a wife begins an acquisition. ''Acquisition'' preserves that lexical link better
    than ''possession'' or ''property,'' though the English is somewhat stiff. This
    is preferable for auditability and to retain the proverb''s compact structure.'
- source_word: βοηθὸν
  chosen: a helper
  alternatives:
  - help
  - an assistant
  lexicon: BDAG
  rationale: βοηθός is straightforwardly 'helper.' This also echoes familiar biblical
    idiom without importing additional theological claims.
- source_word: κατʼ αὐτόν
  chosen: fit for him
  alternatives:
  - corresponding to him
  - according to him
  - matching him
  lexicon: LSJ
  rationale: The phrase idiomatically indicates suitability or correspondence. 'Fit
    for him' is natural English and captures the relational sense better than the
    more wooden 'according to him.' It also resonates with the well-known creation
    idiom without forcing dependence on Genesis.
- source_word: στύλον
  chosen: a pillar
  alternatives:
  - a support
  - a column
  lexicon: LSJ
  rationale: The metaphor is architectural. 'Pillar' preserves the image more vividly
    than the abstract 'support'.
- source_word: ἀναπαύσεως
  chosen: of rest
  alternatives:
  - of repose
  - of relief
  lexicon: BDAG
  rationale: 'ἀνάπαυσις denotes rest or repose. ''Of rest'' is the clearest modern
    rendering and keeps the metaphor compact: ''a pillar of rest.'''
