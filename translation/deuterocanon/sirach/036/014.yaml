translation:
  text: Have mercy on the people, O Lord, who are called by your name, and on Israel,
    whom you likened to a firstborn son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Israel, whom you made your firstborn,' reflecting the broader biblical
      theme of Israel as God's firstborn son (compare Exod 4:22). The Greek here more
      literally says 'whom you likened to a firstborn.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλέησον
  chosen: Have mercy
  alternatives:
  - Show mercy
  - Be merciful to
  lexicon: BDAG
  rationale: Aorist imperative of ἐλεέω, a direct plea for compassionate action. 'Have
    mercy' is idiomatic, solemn, and preserves the prayerful force without paraphrase.
- source_word: λαόν
  chosen: the people
  alternatives:
  - your people
  - a people
  lexicon: BDAG
  rationale: The anarthrous object in prayer can still be definite in sense. 'The
    people' keeps close to the Greek while avoiding importing 'your' where it is not
    explicit; the following clause identifies them as the people called by God's name.
- source_word: Κύριε
  chosen: O Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Vocative κύριε is naturally rendered 'O Lord' in direct address. This
    follows the project's default rendering of κύριος as 'Lord'.
- source_word: κεκλημένον ἐπʼ ὀνόματί σου
  chosen: who are called by your name
  alternatives:
  - called upon by your name
  - named by your name
  - who bear your name
  lexicon: BDAG
  rationale: The perfect passive participle with ἐπί + dative/name idiom denotes being
    designated by or belonging under someone's name. 'Who are called by your name'
    is the standard transparent English equivalent and preserves covenantal resonance.
- source_word: Ἰσραήλ
  chosen: Israel
  rationale: Proper name transliterated per project policy.
- source_word: πρωτόγονον
  chosen: a firstborn son
  alternatives:
  - firstborn
  - firstborn one
  lexicon: LSJ
  rationale: The adjective means 'firstborn.' In English, 'firstborn son' makes the
    filial comparison explicit and natural, especially after ὡμοίωσας ('you likened').
    'Son' is interpretive but warranted by the familial sense of 'firstborn' in this
    context.
- source_word: ὡμοίωσας
  chosen: you likened
  alternatives:
  - you made like
  - you compared
  - you made similar to
  lexicon: BDAG
  rationale: Aorist of ὁμοιόω, 'to make like, liken.' 'You likened' best preserves
    the verbal idea without overcommitting to a stronger ontological claim such as
    'you made [him] your firstborn.'
