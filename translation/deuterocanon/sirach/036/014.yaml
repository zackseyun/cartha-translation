theological_decisions:
- issue: Whether the final clause states that Israel actually is God's firstborn or
    that God compared/treated Israel as a firstborn
  chosen_reading: 'Render ὡμοίωσας with its comparative force: ''whom you likened
    to a firstborn son.'''
  alternative_readings:
  - whom you made your firstborn
  - whom you called firstborn
  - your firstborn Israel
  rationale: The Greek verb ὁμοιόω ordinarily carries the sense of making like or
    likening, not directly naming or declaring identity. The translation preserves
    the wording of the Greek witness rather than harmonizing to passages such as Exod
    4:22. Because the phrase can evoke Israel's filial status before God, the alternative
    stronger reading is preserved in a footnote rather than imported into the main
    text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
