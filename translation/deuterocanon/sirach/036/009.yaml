theological_decisions:
- issue: Subject left implicit in the Greek verbs
  chosen_reading: he
  alternative_readings:
  - God
  - the Lord
  rationale: The Greek uses third-person singular verbs without an explicit subject
    in this clause. English requires a subject, and 'he' preserves the anaphoric ambiguity
    rather than importing a divine name or title not present in the source line itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
