translation:
  text: From them he exalted and sanctified, and from them he appointed a fixed number
    of days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he raised up and made holy'; the Greek verbs can be rendered more literally
      that way.
    reason: lexical_alternative
  - marker: b
    text: Literally 'into a number of days,' likely meaning an assigned or fixed span
      of days.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπ᾽ αὐτῶν
  chosen: From them
  alternatives:
  - Some of them
  - Out of them
  lexicon: LSJ
  rationale: The preposition ἀπό with the genitive αὐτῶν most naturally means 'from/out
    of them.' English 'from them' preserves the source wording without over-specifying
    whether the sense is partitive ('some of them') or separative.
- source_word: ἀνύψωσεν
  chosen: he exalted
  alternatives:
  - he raised up
  - he lifted up
  lexicon: LSJ
  rationale: ἀνυψόω commonly means 'raise up' or 'exalt.' 'Exalted' fits the likely
    honorific sense in parallel with 'sanctified' and reads naturally in English.
- source_word: ἡγίασεν
  chosen: sanctified
  alternatives:
  - made holy
  - consecrated
  lexicon: LSJ
  rationale: ἁγιάζω means 'make holy, sanctify, consecrate.' 'Sanctified' preserves
    the formal theological register of the Greek while remaining understandable; 'made
    holy' is possible but less compact, and 'consecrated' may sound more narrowly
    cultic than the text requires.
- source_word: ἔθηκεν
  chosen: appointed
  alternatives:
  - set
  - placed
  - established
  lexicon: LSJ
  rationale: τίθημι is broad ('set/place/appoint'). In the phrase 'into a number of
    days,' the sense is not physical placement but assigning or fixing a temporal
    allotment, so 'appointed' best conveys the idiom in English.
- source_word: εἰς ἀριθμὸν ἡμερῶν
  chosen: a fixed number of days
  alternatives:
  - a number of days
  - the number of days
  - for a number of days
  lexicon: LSJ
  rationale: Literally 'into a number of days.' The phrase likely denotes assignment
    to a determinate span or count of days. 'A fixed number of days' makes the idiomatic
    force clear in English without adding more than the Greek implies.
