id: SIR.36.31
reference: Sirach 36:31
source:
  edition: lxx-swete-1909
  text: τίς γὰρ πιστεύσει εὐζώνῳ λῃστῇ σφαλλομένῳ ἐκ πόλεως εἰς πόλιν; οὕτως ἀνθρώπῳ
    μὴ ἔχοντι νοσσιὰν καὶ καταλύοντι οὗ ἐὰν ὀψίσῃ.
  language: Greek
  pages: []
  confidence: high
translation:
  text: For who will trust a well-armed robber, stumbling from city to city? So it
    is with a man who has no nest and lodges wherever evening finds him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'well-girded robber'—the Greek adjective literally refers to being well-belted
      or equipped, here likely implying readiness for action.
    reason: lexical_alternative
  - marker: b
    text: Literally 'has no nest,' a metaphor for having no settled home or secure
      resting place.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐζώνῳ
  chosen: well-armed
  alternatives:
  - well-girded
  - belted for action
  - lightly equipped
  lexicon: LSJ
  rationale: The adjective literally suggests being well-girded or equipped. In context
    with λῃστῇ ('robber'), the sense is not merely dressed but ready for violent action;
    'well-armed' conveys the practical force in idiomatic English better than the
    more opaque 'well-girded'.
- source_word: λῃστῇ
  chosen: robber
  alternatives:
  - bandit
  - brigand
  lexicon: BDAG
  rationale: The term denotes a robber or brigand rather than a mere thief. 'Robber'
    is clear modern English and preserves the criminal, potentially violent sense
    without sounding archaic.
- source_word: σφαλλομένῳ
  chosen: stumbling
  alternatives:
  - wandering
  - falling
  - reeling
  lexicon: LSJ
  rationale: The participle can denote tripping, tottering, or being thrown off course.
    'Stumbling' preserves the image of instability and unsettled movement better than
    the flatter 'wandering'.
- source_word: νοσσιὰν
  chosen: nest
  alternatives:
  - home
  - resting place
  - brood-place
  lexicon: LSJ
  rationale: The noun literally refers to a nest or brood-place. Although metaphorical
    here for a settled dwelling, 'nest' preserves the vivid image of having no secure
    place of one's own; 'home' would smooth away the metaphor.
- source_word: καταλύοντι
  chosen: lodges
  alternatives:
  - stays
  - takes shelter
  - spends the night
  lexicon: BDAG
  rationale: The verb commonly means to lodge or stay, often for the night. 'Lodges'
    fits the itinerant context and pairs naturally with the following temporal clause.
- source_word: οὗ ἐὰν ὀψίσῃ
  chosen: wherever evening finds him
  alternatives:
  - wherever night overtakes him
  - wherever he is delayed till evening
  - wherever he comes late
  lexicon: LSJ
  rationale: The clause is idiomatic and tied to evening/nightfall. 'Wherever evening
    finds him' is natural English that preserves the sense of stopping wherever night
    catches him, without over-literal awkwardness.
- source_word: ἀνθρώπῳ
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The Greek is singular masculine and proverbial. Per project philosophy,
    a gender-accurate rendering is preferred where the source uses masculine representative
    language; 'a man' preserves that form in a wisdom saying.
