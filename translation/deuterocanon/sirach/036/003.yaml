translation:
  text: A man of understanding will trust in the law, and the law is as trustworthy
    to him as an oracle of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as trustworthy to him as an answer of the righteous.' The Greek term
      can refer either to an inquiry or to the answer received.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  chosen: A man
  alternatives:
  - A person
  - A human being
  lexicon: LSJ
  rationale: The Greek singular ἄνθρωπος here introduces a representative human subject.
    Per project philosophy, a gender-accurate rendering is preferred where the source
    uses a masculine/generic form. 'A man' preserves the proverbial style better than
    the more abstract 'a person.'
- source_word: συνετός
  chosen: of understanding
  alternatives:
  - prudent
  - intelligent
  - discerning
  lexicon: LSJ
  rationale: συνετός denotes one who has understanding or discernment. 'Of understanding'
    preserves the wisdom-literature register and avoids narrowing the sense merely
    to cleverness or caution.
- source_word: ἐμπιστεύσει
  chosen: will trust in
  alternatives:
  - will put confidence in
  - will rely on
  lexicon: LSJ
  rationale: Future verb expressing confident reliance. 'Trust in' is idiomatic English
    and fits the moral-religious sense of reliance on the law.
- source_word: νόμῳ / ὁ νόμος
  chosen: the law
  alternatives:
  - instruction
  - the Law
  lexicon: LSJ
  rationale: νόμος in Sirach commonly refers to the divine law/Torah. Lowercase 'the
    law' is chosen because the Greek lacks a distinct capitalization marker and the
    context is sapiential rather than a formal title formula, though the referent
    is still God's law.
- source_word: πιστός
  chosen: trustworthy
  alternatives:
  - faithful
  - reliable
  lexicon: LSJ
  rationale: 'Predicate adjective balancing the previous verb of trust. ''Trustworthy''
    makes the reciprocal sense clear in English: the law proves dependable to the
    one who trusts it.'
- source_word: ἐρώτημα
  chosen: oracle
  alternatives:
  - answer
  - decision
  - consultation
  lexicon: LSJ
  rationale: ἐρώτημα can denote something asked or the response obtained through inquiry.
    In this context, with ὡς and δικαίων, it likely refers to a dependable judicial
    or sacred pronouncement. 'Oracle' best captures the sense of an authoritative
    answer, while a footnote preserves 'answer' as an alternative.
- source_word: δικαίων
  chosen: of the righteous
  alternatives:
  - of just men
  - of the just
  lexicon: LSJ
  rationale: δικαίων is a genitive plural. 'Of the righteous' is the most natural
    modern English rendering and preserves the moral quality without archaic phrasing.
