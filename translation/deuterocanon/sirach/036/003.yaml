theological_decisions:
- issue: Referent of νόμος
  chosen_reading: the divine law/Torah in wisdom context
  alternative_readings:
  - law in a more general moral sense
  rationale: In Sirach, νόμος regularly points to the revealed law associated with
    Israel's wisdom tradition. The translation keeps 'the law' while allowing readers
    to hear the broader wisdom application without over-specifying beyond the Greek.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; consistency of key
    terms'
- issue: Force of ἐρώτημα δικαίων
  chosen_reading: an authoritative, dependable pronouncement associated with the righteous
  alternative_readings:
  - the inquiry of the righteous
  - the answer given to the righteous
  rationale: The phrase is somewhat compressed in Greek. Rendering it 'as an oracle
    of the righteous' preserves the comparison's solemnity and the sense of dependable
    guidance, while a footnote records the lexical alternative 'answer.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
