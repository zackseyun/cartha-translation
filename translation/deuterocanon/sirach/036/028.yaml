translation:
  text: For who will trust a well-armed robber, staggering from city to city? So it
    is with a man who has no nest and lodges wherever night finds him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'well-girded robber'—the Greek adjective literally refers to being well
      belted or equipped for action.
    reason: lexical_alternative
  - marker: b
    text: '''No nest'' preserves the Greek metaphor of a bird without a settled resting
      place; the sense is a man with no secure home.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς γὰρ πιστεύσει
  chosen: For who will trust
  alternatives:
  - For who would trust
  - Who indeed will believe
  lexicon: LSJ
  rationale: πιστεύω here takes the sense of placing trust in a person rather than
    believing a proposition. 'For' preserves γάρ's explanatory force linking this
    proverb to the preceding thought.
- source_word: εὐζώνῳ
  chosen: well-armed
  alternatives:
  - well-girded
  - belted for action
  lexicon: LSJ
  rationale: The adjective literally suggests being well-girded/equipped. In context
    with λῃστῇ ('robber'), the sense is not merely dressed but ready for violent action;
    'well-armed' communicates the practical force in natural English.
- source_word: λῃστῇ
  chosen: robber
  alternatives:
  - bandit
  - brigand
  lexicon: LSJ
  rationale: λῃστής denotes a robber/bandit rather than a mere thief. 'Robber' is
    the clearest modern English equivalent without adding historical color.
- source_word: σφαλλομένῳ ἐκ πόλεως εἰς πόλιν
  chosen: staggering from city to city
  alternatives:
  - wandering from city to city
  - reeling from city to city
  lexicon: LSJ
  rationale: The participle can suggest tottering, tripping, or being thrown off course.
    Given the itinerant instability of the image, 'staggering' preserves both movement
    and precariousness better than the flatter 'wandering.'
- source_word: οὕτως
  chosen: So it is with
  alternatives:
  - Thus also
  - In the same way
  lexicon: LSJ
  rationale: Introduces the comparison in idiomatic English while preserving the proverbial
    analogy.
- source_word: ἀνθρώπῳ
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: LSJ
  rationale: The Greek is singular masculine/generic. Per project philosophy, 'man'
    is retained as gender-accurate generic usage in proverbial discourse.
- source_word: μὴ ἔχοντι νοσσιὰν
  chosen: who has no nest
  alternatives:
  - who has no home
  - who has no resting place
  lexicon: LSJ
  rationale: νοσσιά is literally a nest or brood-place. The metaphor of a bird's nesting
    place is vivid and should be preserved rather than flattened to 'home,' though
    the figurative sense of lacking settled shelter remains clear.
- source_word: καταλύοντι
  chosen: lodges
  alternatives:
  - stays
  - takes shelter
  lexicon: LSJ
  rationale: καταλύω in this context refers to stopping for the night or taking lodging.
    'Lodges' is concise and suitably concrete.
- source_word: οὗ ἐὰν ὀψίσῃ
  chosen: wherever night finds him
  alternatives:
  - wherever evening overtakes him
  - wherever he is delayed till evening
  lexicon: LSJ
  rationale: The idiom is tied to lateness/evening. 'Wherever night finds him' renders
    the temporal sense naturally in English and fits the image of unsettled wandering.
