theological_decisions:
- issue: Rendering of divine title Κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Follows the project's contested-terms guidance for κύριος. No stronger
    reason in this verse to depart from the default.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering of ὁ θεὸς τῶν αἰώνων
  chosen_reading: the God of the ages
  alternative_readings:
  - the eternal God
  - the God of eternity
  rationale: The Greek phrase can be smoothed idiomatically, but the more literal
    rendering preserves the text's wording and theological breadth without importing
    a more developed doctrinal formula.
