translation:
  text: according to the blessing of Aaron over your people, and all those on the
    earth will know that you are the Lord, the God of the ages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for your people' or 'concerning your people'; the Greek phrase may be
      understood in relation to Aaron's pronouncing blessing upon Israel.
    reason: lexical_alternative
  - marker: b
    text: Or 'the eternal God.' The Greek reads more literally, 'the God of the ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in accordance with
  - like
  lexicon: LSJ
  rationale: 'The preposition with the accusative here most naturally expresses conformity
    or correspondence: the requested divine action is to be in keeping with Aaron''s
    blessing.'
- source_word: εὐλογίαν
  chosen: blessing
  alternatives:
  - benediction
  lexicon: LSJ
  rationale: Standard sense in prayer context. 'Benediction' is possible but less
    natural in modern English.
- source_word: Ἀαρὼν
  chosen: Aaron
  rationale: Personal name is transliterated per project philosophy.
- source_word: περὶ τοῦ λαοῦ σου
  chosen: over your people
  alternatives:
  - concerning your people
  - for your people
  lexicon: LSJ
  rationale: With blessing language, English 'over' best conveys the idiom of pronouncing
    a blessing upon a people, while remaining anchored to περὶ.
- source_word: γνώσονται
  chosen: will know
  alternatives:
  - shall know
  - will come to know
  lexicon: LSJ
  rationale: Future middle is well represented by simple future in English. 'Will
    know' is clear and idiomatic.
- source_word: πάντες οἱ ἐπὶ τῆς γῆς
  chosen: all those on the earth
  alternatives:
  - all on the earth
  - all who are upon the earth
  - all the inhabitants of the earth
  lexicon: LSJ
  rationale: The phrase is broader than a technical 'inhabitants' formula but refers
    to people living on earth. 'All those on the earth' preserves the wording without
    over-paraphrase.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Project default for κύριος is 'Lord.' Here it functions as a divine title.
- source_word: ὁ θεὸς τῶν αἰώνων
  chosen: the God of the ages
  alternatives:
  - the eternal God
  - the God forever
  - the God of eternity
  lexicon: LSJ
  rationale: Ages is the most transparent rendering of αἰώνων and preserves the phrase's
    temporal breadth without collapsing it into an interpretive paraphrase like 'eternal.'
