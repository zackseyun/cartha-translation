translation:
  text: No evil will confront the one who fears the Lord, but in trial he will rescue
    him again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'No harm will meet the one who fears the Lord.' Greek κακόν can mean
      'evil,' 'harm,' or 'misfortune.'
    reason: lexical_alternative
  - marker: b
    text: Or 'but in testing/temptation he will deliver him again.' Greek πειρασμός
      can denote trial, testing, or temptation; here the context favors adversity
      or testing.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ φοβουμένῳ
  chosen: the one who fears
  alternatives:
  - whoever fears
  - the person fearing
  lexicon: BDAG
  rationale: The articular present middle/passive participle functions substantivally,
    referring generically to a person characterized by fearing. 'The one who fears'
    preserves the singular and proverbial force without sounding wooden.
- source_word: Κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: 'Following the project''s default for κύριος, ''Lord'' is used as a title.
    The article is natural in English here: ''the Lord.'''
- source_word: οὐκ ἀπαντήσει
  chosen: will confront
  alternatives:
  - will meet
  - will happen to
  - will come upon
  lexicon: BDAG
  rationale: ἀπαντάω can mean 'meet' or 'encounter.' With κακόν as subject/object
    of encounter, the sense is that evil does not come to meet or befall the God-fearer.
    'Will confront' keeps the encounter imagery while reading naturally in English.
- source_word: κακόν
  chosen: evil
  alternatives:
  - harm
  - misfortune
  - bad thing
  lexicon: BDAG
  rationale: κακόν can denote moral evil or harmful adversity. In this wisdom context
    the line speaks broadly of what is bad or harmful. 'Evil' preserves the Greek's
    breadth and traditional moral weight better than the narrower 'harm,' though the
    context includes adversity.
- source_word: ἀλλʼ ἐν πειρασμῷ
  chosen: but in trial
  alternatives:
  - but in testing
  - but in temptation
  - but in a time of trial
  lexicon: BDAG
  rationale: πειρασμός can mean testing, trial, or temptation. In this context of
    adversity from which God rescues, 'trial' best fits without importing specifically
    moral temptation.
- source_word: καὶ πάλιν
  chosen: again
  alternatives:
  - in turn
  - once more
  - on the other hand
  lexicon: BDAG
  rationale: πάλιν most naturally means 'again' or 'once more.' Here it likely conveys
    repeated or renewed deliverance in successive trials. 'Again' is concise and faithful.
- source_word: ἐξελεῖται
  chosen: he will rescue him
  alternatives:
  - he will deliver him
  - he will take him out
  lexicon: BDAG
  rationale: The verb means to deliver or rescue. The subject is best understood as
    the Lord from context, with the object referring back to the God-fearing person.
    English supplies the pronouns required by the idiom.
