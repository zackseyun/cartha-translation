theological_decisions:
- issue: Implicit subject of ἐξελεῖται
  chosen_reading: 'The Lord is the implied subject: ''he will rescue him.'''
  alternative_readings:
  - An impersonal rendering such as 'there will be rescue for him'
  rationale: The preceding mention of 'the Lord' and the wisdom-theological pattern
    of divine deliverance make the Lord the most natural implied subject. English
    requires an explicit subject, so it is supplied.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    syntax is implicit but not seriously contested, so the most natural contextual
    subject is supplied.
- issue: Sense of κακόν
  chosen_reading: Broad 'evil' rather than narrower 'harm' or 'calamity.'
  alternative_readings:
  - harm
  - misfortune
  rationale: The proverb states a general truth about the Lord's care for the God-fearing.
    'Evil' preserves the semantic breadth of κακόν, while the second colon clarifies
    that adverse testing is still in view and does occur.
