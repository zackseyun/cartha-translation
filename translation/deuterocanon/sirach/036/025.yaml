theological_decisions:
- issue: Gendered anthropological expression in καθʼ υἱοὺς ἀνθρώπων
  chosen_reading: sons of men
  alternative_readings:
  - other men
  - human beings
  rationale: Following the project's gender-accurate policy, the masculine expression
    is retained rather than neutralized, since the Greek wording itself is masculine
    and proverbial. The phrase likely means 'like ordinary men,' but the main text
    preserves the source form while allowing a clarifying alternative in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
