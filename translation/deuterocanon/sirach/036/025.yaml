translation:
  text: If there is mercy and gentleness on her tongue, her husband is not like the
    sons of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'her husband is not like other men.' The Greek says
      'the sons of men,' a masculine proverbial expression.
    reason: lexical_alternative
  - marker: b
    text: The Greek text here is somewhat awkward in expression; the sense is that
      a wife whose speech is marked by mercy and gentleness makes her husband exceptional.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπὶ γλώσσης αὐτῆς
  chosen: on her tongue
  alternatives:
  - upon her tongue
  - in her speech
  - on her lips
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the idiom of speech proceeding from
    the tongue. 'In her speech' is smoother but less transparent to the Greek imagery.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - kindness
  - compassion
  lexicon: LSJ
  rationale: '''Mercy'' is the most direct equivalent and preserves the moral-religious
    nuance of benevolent disposition. ''Kindness'' is possible but weaker.'
- source_word: πραΰτης
  chosen: gentleness
  alternatives:
  - meekness
  - mildness
  lexicon: LSJ
  rationale: '''Gentleness'' communicates the virtue clearly in modern English without
    the potential misunderstanding attached to ''meekness''.'
- source_word: ὁ ἀνὴρ αὐτῆς
  chosen: her husband
  alternatives:
  - her man
  lexicon: LSJ
  rationale: In this marital context, ἀνήρ naturally means 'husband,' not merely 'man.'
    This makes the relational sense explicit.
- source_word: καθʼ υἱοὺς ἀνθρώπων
  chosen: like the sons of men
  alternatives:
  - like other men
  - according to the sons of men
  - like human beings
  lexicon: LSJ
  rationale: The Greek phrase is somewhat idiomatic and textually awkward in context.
    'Like the sons of men' preserves the source wording and its elevated style. A
    smoother rendering such as 'like other men' is interpretive and may over-resolve
    the expression.
