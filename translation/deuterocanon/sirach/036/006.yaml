translation:
  text: A horse for mounting is like a mocking friend; under anyone who sits on it,
    it neighs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek wording is somewhat terse and unusual. The phrase translated 'for
      mounting' can in other contexts carry a sexual sense, but here the surrounding
      image of someone sitting on the horse supports the riding sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵππος
  chosen: horse
  alternatives:
  - stallion
  lexicon: LSJ
  rationale: The ordinary sense is 'horse.' Nothing in the verse requires the more
    specific 'stallion.'
- source_word: εἰς ὀχείαν
  chosen: for mounting
  alternatives:
  - for riding
  - for copulation
  lexicon: LSJ
  rationale: In this context with ἵππος and ἐπικαθημένου, the phrase most naturally
    refers to being mounted/ridden. The noun can carry sexual sense elsewhere, but
    the immediate imagery of someone sitting on the horse favors 'mounting' in the
    riding sense.
- source_word: ὡς φίλος μῶκος
  chosen: like a mocking friend
  alternatives:
  - like a foolish friend
  - like a derisive friend
  lexicon: LSJ
  rationale: μῶκος denotes mockery, ridicule, or a mocker. 'Mocking friend' best captures
    the relational image and the verse's comparison without flattening it into mere
    stupidity.
- source_word: ὑποκάτω παντὸς ἐπικαθημένου
  chosen: under anyone sitting on it
  alternatives:
  - beneath every rider
  - under whoever mounts it
  lexicon: LSJ
  rationale: παντός gives an unrestricted sense ('anyone/everyone'), and ἐπικαθημένου
    means one sitting upon it. 'Anyone sitting on it' is clear modern English while
    preserving the universal force.
- source_word: χρεμετίζει
  chosen: it neighs
  alternatives:
  - it whinnies
  lexicon: LSJ
  rationale: The standard verb for the sound a horse makes is 'neigh.' 'Whinnies'
    is possible but slightly less neutral in register.
