theological_decisions:
- issue: Reference of 'the law' (νόμον)
  chosen_reading: Torah/the law in a Jewish sapiential sense, rendered simply as 'the
    law'
  alternative_readings:
  - instruction in a more general sense
  rationale: In Sirach, νόμος commonly refers to the law of God/Torah, though with
    wisdom overtones. Rendering 'the law' preserves both the likely referent and the
    traditional Jewish frame without over-expansion.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms'
- issue: Force of ὑποκρινόμενος
  chosen_reading: active dissembling toward the law ('plays the hypocrite in it')
  alternative_readings:
  - '''is a hypocrite regarding it'''
  rationale: 'The participial form suggests enacted pretense rather than merely labeling
    a type of person. This preserves the moral contrast: the wise man truly embraces
    the law, while the other only performs adherence.'
  doctrine_reference: 'Translation philosophy: preserve significant lexical decisions
    explicitly'
