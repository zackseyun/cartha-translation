translation:
  text: A wise man will not hate the law, but the one who plays the hypocrite in it
    is like a ship in a storm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the hypocrite in it is like a ship in a tempest.' The Greek participle
      can be rendered more compactly as a noun-like expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - person
  lexicon: LSJ
  rationale: The Greek is explicitly masculine singular ('man'). In wisdom literature
    this can carry a representative sense, but per project philosophy gender-accurate
    rendering is preferred unless context clearly demands neutralization.
- source_word: σοφὸς
  chosen: wise
  alternatives:
  - skillful
  - prudent
  lexicon: LSJ
  rationale: In this sapiential context, 'wise' is the natural English equivalent
    and preserves the wisdom-literature register.
- source_word: μισήσει
  chosen: will not hate
  alternatives:
  - will not despise
  lexicon: LSJ
  rationale: μισέω ordinarily means 'hate.' 'Despise' is possible in some contexts,
    but here 'hate' best reflects the direct contrast with the hypocrite's instability
    toward the law.
- source_word: νόμον
  chosen: the law
  alternatives:
  - law
  lexicon: LSJ
  rationale: The anarthrous/arthrous nuances in Greek are less important than the
    idiomatic sense here; 'the law' fits Jewish wisdom usage and likely refers to
    Torah/instruction rather than law in the abstract.
- source_word: ὑποκρινόμενος
  chosen: the one who plays the hypocrite
  alternatives:
  - the hypocrite
  - the one who pretends
  - the dissembler
  lexicon: LSJ
  rationale: The participle denotes acting a part or dissembling. 'Plays the hypocrite'
    preserves the verbal force better than the static noun 'hypocrite' and avoids
    over-ecclesiastical tone.
- source_word: ἐν αὐτῷ
  chosen: in it
  alternatives:
  - with respect to it
  - in regard to it
  lexicon: LSJ
  rationale: The pronoun most naturally refers back to νόμος. 'In it' is concise and
    preserves the Greek's compact phrasing, meaning hypocrisy in relation to the law.
- source_word: καταιγίδι
  chosen: storm
  alternatives:
  - tempest
  - squall
  lexicon: LSJ
  rationale: '''Storm'' is clear modern English for the violent weather implied by
    καταιγίς.'
- source_word: πλοῖον
  chosen: ship
  alternatives:
  - boat
  - vessel
  lexicon: LSJ
  rationale: '''Ship'' is the standard equivalent and suits the simile''s gravity
    better than ''boat.'''
