translation:
  text: In the wrath of fire let the one who escapes be consumed, and let those who
    do injustice to your people meet destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the one being saved/preserved.' The Greek phrase is
      difficult in context and may refer to any enemy who has thus far escaped destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ὀργῇ πυρὸς
  chosen: In fiery wrath
  alternatives:
  - in the wrath of fire
  - in burning anger
  lexicon: LSJ
  rationale: The phrase is literally 'in wrath of fire.' English idiom is improved
    by rendering the genitive πυρὸς adjectivally as 'fiery,' while preserving the
    image of destructive divine anger rather than flattening it to a generic 'anger.'
- source_word: καταβρωθήτω
  chosen: let ... be consumed
  alternatives:
  - let ... be devoured
  - let ... be eaten up
  lexicon: LSJ
  rationale: The passive imperative from καταβιβρώσκω conveys being consumed or devoured.
    'Be consumed' is natural modern English and fits the fire imagery immediately
    preceding.
- source_word: ὁ σωζόμενος
  chosen: the survivor
  alternatives:
  - the one being saved
  - the one escaping
  - the remnant one
  lexicon: LSJ
  rationale: Although the participle can mean 'the one being saved/preserved,' in
    this hostile context it most naturally refers to one who has escaped so far. 'The
    survivor' communicates that sense clearly. Because the source validation flags
    a major mismatch and the phrase is somewhat awkward in context, the more literal
    alternative is preserved in a footnote.
- source_word: οἱ ἀδικοῦντες
  chosen: those who do injustice
  alternatives:
  - the wrongdoers
  - those who act unjustly
  - those who oppress
  lexicon: LSJ
  rationale: The participle denotes people acting unjustly against God's people. 'Those
    who do injustice' stays close to the verbal force without over-specifying oppression.
- source_word: εὕροισαν ἀπώλειαν
  chosen: let ... meet destruction
  alternatives:
  - let ... find destruction
  - may ... encounter ruin
  lexicon: LSJ
  rationale: The optative/imprecatory sense is best carried by 'let ... meet destruction.'
    'Find destruction' is more literal but less idiomatic in English.
