theological_decisions:
- issue: Imprecatory force of the verse
  chosen_reading: Retain the prayer for judgment as a direct petition
  alternative_readings:
  - Soften into a predictive statement about eventual judgment
  rationale: Both καταβρωθήτω and εὕροισαν function as wishes/prayers for divine judgment.
    The text should remain an imprecation rather than be softened into mere prediction.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening gravity.'
