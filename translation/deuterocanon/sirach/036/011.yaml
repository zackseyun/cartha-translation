id: SIR.36.11
reference: Sirach 36:11
source:
  edition: lxx-swete-1909
  text: ἐν ὀργῇ πυρὸς καταβρωθήτω ὁ σωζόμενος, καὶ οἱ ἀδικοῦντες τὸν λαόν σου εὕροισαν
    ἀπώλειαν.
