translation:
  text: The throat tastes the food of the hunt; so an intelligent heart tests false
    words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'The throat tastes foods of the hunt, so an intelligent
      heart false words,' with the second clause elliptical; 'tests' is supplied in
      English to complete the comparison.
    reason: lexical_alternative
  - marker: b
    text: '''Food of the hunt'' may also be rendered ''game'' or ''food from hunting.'''
    reason: alternative_reading
lexical_decisions:
- source_word: φάρυγξ
  chosen: throat
  alternatives:
  - palate
  - gullet
  - mouth
  lexicon: LSJ
  rationale: The noun denotes the throat or gullet literally. 'Throat' preserves the
    bodily image more precisely than the broader 'mouth,' while still sounding natural
    in English.
- source_word: γεύεται
  chosen: tastes
  alternatives:
  - samples
  - discerns by taste
  lexicon: BDAG
  rationale: The verb means to taste or experience by tasting. 'Tastes' keeps the
    sensory comparison concise and direct.
- source_word: βρώματα
  chosen: food
  alternatives:
  - foods
  - edibles
  - meats
  lexicon: LSJ
  rationale: The plural refers generally to things eaten. 'Food' is idiomatic in English
    and avoids implying specifically meat, though the hunting context could suggest
    game.
- source_word: θήρας
  chosen: of the hunt
  alternatives:
  - of game
  - from hunting
  - of prey
  lexicon: LSJ
  rationale: The genitive likely qualifies the food as that obtained by hunting. 'Of
    the hunt' preserves the compact metaphor and avoids over-specifying 'game' if
    the sense is broader.
- source_word: καρδία
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: LSJ
  rationale: In wisdom literature, 'heart' is the seat of understanding and judgment.
    Retaining 'heart' preserves the anthropological imagery of the source.
- source_word: συνετή
  chosen: intelligent
  alternatives:
  - discerning
  - understanding
  - prudent
  lexicon: LSJ
  rationale: The adjective describes a person or faculty marked by understanding.
    'Intelligent' is clear modern English, though 'discerning' is also possible. Here
    'intelligent heart' keeps the parallel with sensory testing while signaling evaluative
    capacity.
- source_word: λόγους ψευδεῖς
  chosen: false words
  alternatives:
  - lying words
  - deceitful words
  - false statements
  lexicon: LSJ
  rationale: The phrase straightforwardly denotes words characterized by falsity.
    'False words' is formally close and preserves the broad scope of speech rather
    than narrowing to formal statements.
- source_word: '[implied comparison in οὕτως ... καρδία συνετὴ]'
  chosen: tests
  alternatives:
  - discerns
  - evaluates
  - judges
  lexicon: LSJ
  rationale: 'The Greek as given omits an explicit second verb after the comparison,
    leaving the reader to infer the corresponding action from the first clause. ''Tests''
    makes the analogy explicit in natural English: as the throat tastes food, so the
    intelligent heart tests words. This is an interpretive supply warranted by the
    proverb''s structure.'
