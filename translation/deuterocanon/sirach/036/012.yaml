translation:
  text: Crush the heads of enemy rulers, who say, “There is no one but us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “There is none besides us.” The Greek wording expresses exclusive self-exaltation;
      some readers may hear a stronger claim of quasi-divine arrogance, but 'God'
      is not stated in the text.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύντριψον
  chosen: Crush
  alternatives:
  - Shatter
  - Break
  lexicon: LSJ
  rationale: Aorist imperative of συντρίβω, conveying forceful destruction. 'Crush'
    is vivid, natural English and fits the violent imagery without overexpanding the
    verb.
- source_word: κεφαλὰς
  chosen: heads
  lexicon: LSJ
  rationale: Literal plural object; the imagery is concrete and should be preserved
    rather than softened into a metaphor such as 'power' or 'leaders' alone.
- source_word: ἀρχόντων
  chosen: rulers
  alternatives:
  - princes
  - leaders
  lexicon: LSJ
  rationale: Genitive plural of ἄρχων, denoting those in authority. 'Rulers' best
    captures political or governing authority in clear modern English.
- source_word: ἐχθρῶν
  chosen: of the enemies
  alternatives:
  - of enemies
  - hostile ones
  lexicon: LSJ
  rationale: 'The genitive most naturally modifies ''rulers'': ''rulers of the enemies.''
    Retaining ''enemies'' preserves the adversarial sense without specifying nationality
    beyond the Greek.'
- source_word: λεγόντων
  chosen: who say
  alternatives:
  - saying
  lexicon: LSJ
  rationale: The participle explains or characterizes the enemies' rulers. Relative-clause
    English is smoother while preserving the ongoing descriptive force.
- source_word: Οὐκ ἔστιν πλὴν ἡμῶν
  chosen: There is no one but us
  alternatives:
  - There is none except us
  - There is no one besides us
  lexicon: LSJ
  rationale: The phrase expresses arrogant exclusivity. 'There is no one but us' is
    idiomatic and preserves the boast without importing a more explicit theological
    claim than the Greek states.
