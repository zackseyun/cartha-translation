theological_decisions:
- issue: Nature of the enemies' boast
  chosen_reading: Render the statement as arrogant exclusivity ('There is no one but
    us') rather than an explicitly theological paraphrase such as 'There is no God
    but us' or 'There is none besides us' with divine overtones.
  alternative_readings:
  - There is none besides us
  - There is no God but us
  rationale: The Greek text as given does not include 'God.' The line may imply self-exalting
    pride, possibly even quasi-divine pretension, but the wording should not be made
    more explicit than the source warrants. The broader context can carry the theological
    force without adding unstated content.
