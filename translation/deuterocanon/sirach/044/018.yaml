- issue: Whether to specify the flood explicitly from the Greek parallel
  chosen_reading: Keep the Hebrew's broader wording in the main text without naming
    the flood explicitly.
  alternative_readings:
  - so that all flesh might not be blotted out by a flood
  rationale: The primary Hebrew witness lacks an explicit equivalent to Greek κατακλυσμῷ
    ('by a flood'), though the Greek parallel clarifies the Noahic context. Because
    Hebrew is extant and primary, the main text follows its wording while preserving
    the more explicit Greek nuance in a footnote.
