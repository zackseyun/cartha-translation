lexical_decisions:
- source_word: באות עולם
  chosen: an everlasting covenant
  alternatives:
  - a covenant of eternity
  - eternal covenants
  lexicon: HALOT
  rationale: The Hebrew phrase is singular in sense here despite the Greek plural
    διαθῆκαι; the Hebrew witness is primary where extant. עולם commonly denotes enduring
    or perpetual duration, and 'everlasting covenant' is idiomatic English that preserves
    covenantal weight.
- source_word: נכרת עמו
  chosen: was cut with him
  alternatives:
  - was made with him
  - was established with him
  lexicon: HALOT
  rationale: כרת with ברית/covenant is the standard Hebrew idiom 'cut a covenant.'
    To preserve the source texture while remaining readable, the main text keeps 'was
    cut with him' rather than flattening to 'made,' since English readers can still
    understand the covenant idiom.
- source_word: לבלתי
  chosen: so that ... not
  alternatives:
  - in order that ... not
  - lest
  lexicon: HALOT
  rationale: This introduces purpose/result. 'So that ... not' is natural modern English
    and captures the clause's function without archaic 'lest.'
- source_word: השחית
  chosen: be destroyed
  alternatives:
  - be wiped out
  - be ruined
  lexicon: HALOT
  rationale: The verb denotes destruction; the Greek parallel ἐξαλειφθῇ with κατακλυσμῷ
    points specifically to being wiped out by the flood, but the Hebrew itself states
    the broader destruction. 'Be destroyed' preserves the Hebrew while remaining compatible
    with the flood context from the Greek.
- source_word: כל בשר
  chosen: all flesh
  alternatives:
  - all living creatures
  - all humanity
  lexicon: HALOT
  rationale: The phrase literally means 'all flesh' and in flood context refers broadly
    to living creatures, not merely humanity. Following the project's preference to
    preserve key biblical diction where intelligible, 'all flesh' is retained in the
    main text.
