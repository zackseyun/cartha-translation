translation:
  text: Their bodies were gathered in peace, and their name lives from generation
    to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Their body was buried in peace.'' The Greek witness makes the
      funerary sense explicit where the Hebrew says ''were gathered in peace.'''
    reason: alternative_reading
  - marker: b
    text: Masada preserves a shorter reading here ('if/in peace they were gathered'),
      while the Cairo Geniza text reads 'Their bodies were gathered in peace.'
    reason: textual_variant
lexical_decisions:
- source_word: גויתם
  chosen: their bodies
  alternatives:
  - their corpse
  - their body
  lexicon: HALOT
  rationale: Hebrew גויה commonly denotes the body/corpse. The plural sense in context
    is best rendered 'their bodies.' The Greek parallel has singular collective τὸ
    σῶμα αὐτῶν, but the Hebrew plural-like form supports an English plural.
- source_word: בשלום
  chosen: in peace
  alternatives:
  - peacefully
  lexicon: HALOT
  rationale: The prepositional phrase is straightforward. 'In peace' preserves the
    formal sense and echoes the Greek ἐν εἰρήνῃ without over-interpreting the phrase
    as merely adverbial.
- source_word: נאספו
  chosen: were gathered
  alternatives:
  - were gathered in death
  - were buried
  - were taken away
  lexicon: HALOT
  rationale: The Hebrew verb אסף in passive can function as an idiom for being gathered
    in death, but the Zone 1 Hebrew does not explicitly say 'buried.' The Greek parallel
    reads ἐτάφη ('was buried'), which confirms funerary context, yet the Hebrew witness
    should remain primary here. 'Were gathered' preserves the Hebrew wording while
    allowing the death-context to be heard.
- source_word: ושמם
  chosen: and their name
  alternatives:
  - and their reputation
  - and their memory
  lexicon: HALOT
  rationale: '''Name'' is the direct lexical equivalent and preserves the biblical
    idiom of enduring renown without reducing it to a modern abstraction.'
- source_word: חי
  chosen: lives
  alternatives:
  - endures
  - remains alive
  lexicon: HALOT
  rationale: The Hebrew verb 'lives' is vivid and matches the Greek ζῇ. It preserves
    the personified force of the text better than the flatter 'endures.'
- source_word: לדור ודור
  chosen: from generation to generation
  alternatives:
  - for generation and generation
  - through all generations
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for continuing across successive generations.
    'From generation to generation' is natural modern English while staying close
    to the source.
