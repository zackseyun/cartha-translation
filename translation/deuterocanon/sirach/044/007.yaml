translation:
  text: All these were honored in their generations, and in their days they were a
    glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a compact nominal clause, literally, 'and in their days, their
      glory.' The Greek parallel reads, 'and in their days [there was] a boast/glory.'
      The translation expresses the sense in idiomatic English.
    reason: lexical_alternative
lexical_decisions:
- source_word: כל אלה
  chosen: All these
  alternatives:
  - All these men
  - All these ones
  lexicon: HALOT
  rationale: The Hebrew phrase is a straightforward demonstrative summary of the figures
    just listed. 'All these' is natural English and avoids adding 'men,' which is
    implied by context but not explicit in the phrase itself.
- source_word: בדורם
  chosen: in their generations
  alternatives:
  - in their generation
  - among their generations
  - in their own age
  lexicon: HALOT
  rationale: The Hebrew דור with pronominal suffix is best kept close to the source
    as 'generation(s).' The Greek parallel has ἐν γενεαῖς, plural, supporting the
    plural rendering. This preserves the idiom of being distinguished within the historical
    periods to which they belonged.
- source_word: ומימיהם
  chosen: and in their days
  alternatives:
  - and from their days
  - and in their lifetime
  lexicon: HALOT
  rationale: 'The prefixed conjunction plus מימי with suffix is most naturally rendered
    temporally here: ''and in their days.'' The Greek parallel ἐν ταῖς ἡμέραις αὐτῶν
    confirms a temporal sense rather than a source sense (''from their days'').'
- source_word: תפארתם
  chosen: they were a glory
  alternatives:
  - their glory
  - their splendor
  - a boast
  lexicon: HALOT
  rationale: The Hebrew noun תפארת can mean 'glory,' 'splendor,' or 'ornament.' The
    Hebrew clause as transmitted is verbless ('and in their days, their glory'), while
    the Greek has καύχημα ('boast/glory'). Rendering it as 'they were a glory' makes
    good English from the nominal clause while preserving the sense that these people
    themselves were a source of honor in their own time. 'A glory' better reflects
    the honorific force than the more subjective 'a boast.'
