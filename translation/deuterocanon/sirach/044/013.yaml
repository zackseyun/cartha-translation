translation:
  text: Their remembrance will stand forever, and their righteousness will not be
    forgotten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, 'Their offspring will remain forever, and their glory will
      not be blotted out.' The Masada scroll likewise reads 'their offspring/seed'
      where the Cairo Geniza Hebrew here reads 'their remembrance.'
    reason: textual_variant
lexical_decisions:
- source_word: זכרם
  chosen: their remembrance
  alternatives:
  - their memory
  - their name
  lexicon: HALOT
  rationale: זֵכֶר commonly denotes remembrance or memorial memory. 'Their remembrance'
    preserves the Hebrew noun directly and fits the parallel with what endures over
    time. The Greek parallel has δόξα αὐτῶν ('their glory'), but the primary Hebrew
    witness supports 'remembrance'.
- source_word: יעמד
  chosen: will stand
  alternatives:
  - will endure
  - will remain
  lexicon: HALOT
  rationale: עמד literally means 'stand.' In context it conveys lasting endurance.
    'Will stand' keeps the concrete Hebrew image while remaining natural English.
- source_word: עד עולם
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: HALOT
  rationale: The idiom means perpetual duration. 'Forever' is idiomatic modern English
    and adequately reflects the Hebrew phrase.
- source_word: וצדקתם
  chosen: their righteousness
  alternatives:
  - their justice
  - their righteous deeds
  lexicon: HALOT
  rationale: צדקה can denote righteousness or justice, and in wisdom literature may
    shade toward righteous conduct. 'Their righteousness' is the most direct rendering
    and matches the moral commendation of the context; 'their righteous deeds' is
    interpretive and therefore left as an alternative.
- source_word: לא תשכח
  chosen: will not be forgotten
  alternatives:
  - will not be neglected
  - will not be erased from memory
  lexicon: HALOT
  rationale: The Niphal/passive sense is well represented by 'will not be forgotten.'
    This also balances naturally with 'their remembrance will stand forever.'
