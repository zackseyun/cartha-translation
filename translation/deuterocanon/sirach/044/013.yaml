theological_decisions:
- issue: Hebrew-Cairo versus Greek/Masada line of transmission
  chosen_reading: Translate the extant Cairo Geniza Hebrew main line as 'Their remembrance
    will stand forever, and their righteousness will not be forgotten,' while preserving
    the older Masada/Greek-type alternative in a footnote.
  alternative_readings:
  - Their offspring/seed will stand forever, and their glory will not be blotted out.
  rationale: Zone 1 primacy favors the extant Hebrew witness where available. However,
    the Greek parallel and the consulted Masada evidence indicate a notable alternative
    textual form centered on 'their seed/offspring' and 'their glory.' Because this
    materially affects translation, the alternative is preserved in a footnote rather
    than silently ignored.
