theological_decisions:
- issue: Divergence between Hebrew and Greek opening description of the honored figures
  chosen_reading: Follow the extant Hebrew 'men of faithful love' in the main text,
    while preserving the Greek 'glorious men' in a footnote.
  alternative_readings:
  - glorious men
  rationale: For Sirach, where Hebrew survives, the project gives primacy to the Hebrew
    witness. The Greek parallel is still an actual translation input and likely reflects
    either a variant Vorlage or interpretive rendering. Because the difference affects
    the characterization of the ancestors, the Greek alternative is preserved transparently
    in a footnote.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve theological tension rather than resolve it silently.'
