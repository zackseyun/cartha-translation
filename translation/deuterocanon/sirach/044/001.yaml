translation:
  text: Let us now praise godly men, our fathers in their generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Let us now praise glorious men, and our fathers in their generation.''
      The Hebrew reads ''men of faithful love.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אהללה נא
  chosen: Let us now praise
  alternatives:
  - I will now praise
  - Let me now praise
  lexicon: HALOT
  rationale: The Hebrew form as transmitted can be read as first-person cohortative/singular
    ('I will praise'), but the Greek parallel has the hortatory plural Αἰνέσωμεν δὴ
    ('let us praise now'). Given the minor mismatch note and the strong parallel support,
    the English follows the likely communal exhortation while preserving 'now' for
    נא.
- source_word: אנשי חסד
  chosen: men of faithful love
  alternatives:
  - godly men
  - men of kindness
  - men of mercy
  - glorious men
  lexicon: HALOT
  rationale: Hebrew אנשי חסד is best anchored in חסד, a rich covenantal term involving
    loyalty, kindness, and faithful love. 'Men of faithful love' preserves the Hebrew
    witness rather than assimilating to the Greek ἄνδρας ἐνδόξους ('glorious men').
    'Godly men' is interpretive; 'kind men' is too thin. Because the Greek differs
    materially, the alternative is preserved in a footnote.
- source_word: אבותינו
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'our fathers.' Per gender-accurate philosophy,
    the masculine familial term is retained rather than neutralized to 'ancestors,'
    though the latter is a possible contextual gloss.
- source_word: בדורותם
  chosen: in their generations
  alternatives:
  - in their generation
  - throughout their generations
  lexicon: HALOT
  rationale: A straightforward rendering of the beth + plural noun with pronominal
    suffix. The plural 'generations' matches the Hebrew form and idiomatically conveys
    successive historical eras.
