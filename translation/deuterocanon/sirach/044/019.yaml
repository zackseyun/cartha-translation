lexical_decisions:
- source_word: אב
  chosen: father
  alternatives:
  - ancestor
  lexicon: HALOT
  rationale: The Hebrew plainly identifies Abraham as 'father'; this also aligns with
    the Greek πατήρ. 'Ancestor' is possible in some contexts but is less direct here.
- source_word: המון גוים
  chosen: a multitude of nations
  alternatives:
  - many nations
  - a crowd of nations
  lexicon: HALOT
  rationale: This phrase echoes the Abrahamic promise language ('father of a multitude
    of nations'). 'Multitude' preserves the covenantal resonance better than the flatter
    'many.' The Greek πλήθους ἐθνῶν supports this sense.
- source_word: לא נתן
  chosen: no blemish was found
  alternatives:
  - he gave no
  - he did not allow
  lexicon: HALOT
  rationale: The Hebrew wording is difficult if taken woodenly ('he did not give in
    his honor a blemish'). The Greek parallel reads οὐχ εὑρέθη ὅμοιος ἐν τῇ δόξῃ ('no
    equal was found in glory/honor'), suggesting a commendatory statement about Abraham's
    unimpaired honor. Given the Hebrew מום ('blemish') and the Greek's laudatory sense,
    'no blemish was found' best reflects the Hebrew witness while producing coherent
    English.
- source_word: בכבודו
  chosen: in his honor
  alternatives:
  - in his glory
  - in his splendor
  lexicon: HALOT
  rationale: כבוד can mean 'honor' or 'glory.' Here 'honor' fits the Hebrew idiom
    with מום ('blemish') and remains close to the Greek δόξα. 'Glory' is possible
    and preserved in a footnote.
- source_word: מום
  chosen: blemish
  alternatives:
  - defect
  - stain
  lexicon: HALOT
  rationale: מום commonly denotes a blemish or defect. 'Blemish' preserves the moral
    and honor-related nuance without overinterpreting.
