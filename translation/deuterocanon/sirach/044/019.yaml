theological_decisions:
- issue: Relationship between the Hebrew and Greek final clause
  chosen_reading: Translate primarily from the Hebrew as a statement that Abraham's
    honor was without blemish, while preserving the Greek's different commendatory
    wording in a footnote.
  alternative_readings:
  - and no equal was found in glory/honor
  rationale: The project's philosophy gives primacy to the surviving Hebrew of Sirach
    where available, but the Greek parallel must be used as a real input. Here the
    Hebrew and Greek diverge in expression at the end of the verse. The Hebrew can
    be rendered coherently as a statement about Abraham's honor lacking blemish; the
    Greek instead says no equal was found in his glory/honor. Because the difference
    is material, the Greek alternative is preserved in a footnote rather than silently
    harmonized.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as translation input; preserve genuine tension rather than resolve
    it silently.'
