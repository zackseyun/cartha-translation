translation:
  text: The Most High apportioned abundant honor, and his greatness is from everlasting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Cairo Geniza reads חלק עליון, while the older Masada scroll reads
      חולק עליון, supporting the sense 'the Most High apportioned/distributed.' The
      Greek parallel reads 'The Lord created much glory.'
    reason: textual_variant
  - marker: b
    text: Or 'abundant glory.' Hebrew כבוד and Greek δόξα can denote either 'honor'
      or 'glory' depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'from of old' or 'from eternity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רב
  chosen: abundant
  alternatives:
  - great
  - much
  lexicon: HALOT
  rationale: In the phrase רב כבוד, the adjective/intensifier modifies 'honor' quantitatively/qualitatively.
    'Abundant honor' is natural English and preserves the sense of largeness without
    awkwardness.
- source_word: כבוד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: Hebrew כבוד can mean 'glory' or 'honor.' Here, with חלק/חולק and in a
    context introducing the praise of famous men, 'honor' fits the distributive sense
    better, while the Greek δόξαν confirms the semantic field. 'Glory' remains possible
    and is preserved in a footnote.
- source_word: חלק / חולק
  chosen: apportioned
  alternatives:
  - divided
  - distributed
  - allotted
  lexicon: HALOT
  rationale: Zone 1 Cairo Geniza reads חלק עליון, while the older Masada witness has
    חולק עליון. The Masada reading points to a verbal idea, 'the Most High apportions/apportioned.'
    'Apportioned' captures the distributive nuance in idiomatic English and explains
    the syntax better than taking חלק as a noun. The Greek ἔκτισεν diverges, but the
    Hebrew is primary where extant.
- source_word: עליון
  chosen: the Most High
  alternatives:
  - Most High
  lexicon: HALOT
  rationale: Divine title; translated rather than transliterated, in keeping with
    project philosophy. The article is supplied for natural English.
- source_word: וגדלו
  chosen: and his greatness
  alternatives:
  - and his majesty
  - and he made him great
  lexicon: HALOT
  rationale: The suffix naturally yields 'his greatness.' The Greek τὴν μεγαλωσύνην
    αὐτοῦ supports this reading. 'Majesty' is possible, but 'greatness' stays closer
    to both Hebrew and Greek.
- source_word: מימות עולם
  chosen: is from everlasting
  alternatives:
  - from ancient days
  - from eternity
  - from of old
  lexicon: HALOT
  rationale: The phrase denotes remote antiquity or eternity. Because the subject
    is God's greatness, 'from everlasting' best conveys the theological weight in
    idiomatic English. The copula is supplied in English.
