translation:
  text: investigating the structure of song according to rule, and bearing proverbs
    in writing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'according to rule' is difficult; the Greek parallel reads 'seeking
      out musical songs/pieces,' which supports the sense of ordered or crafted song.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'proverbs' is broader in the Greek parallel, which has 'utterances'
      or 'sayings' in writing.
    reason: alternative_reading
lexical_decisions:
- source_word: חוקרי
  chosen: investigating
  alternatives:
  - seeking out
  - studying
  - inquiring into
  lexicon: HALOT
  rationale: From חקר, denoting searching out or investigating. The participial form
    suits an ongoing characteristic activity. 'Investigating' preserves the intellectual,
    analytical sense better than the broader 'seeking out.' The Greek ἐκζητοῦντες
    supports an active searching nuance.
- source_word: מזמור
  chosen: song
  alternatives:
  - psalm
  - melody
  lexicon: HALOT
  rationale: The Hebrew term can denote a song or psalm. Here, in wisdom praise of
    cultural achievements and alongside the Greek μέλη μουσικῶν ('musical pieces/songs'),
    'song' is the broader and less anachronistically liturgical choice. 'Psalm' would
    over-specify canonical or cultic associations not required by the context.
- source_word: על חוק
  chosen: according to rule
  alternatives:
  - by regulation
  - with measure
  - on principle
  lexicon: HALOT
  rationale: חוק commonly means statute, fixed rule, or prescribed order. In this
    artistic context it likely refers to ordered form or regulated structure. 'According
    to rule' keeps the formal sense while remaining readable. The phrase is somewhat
    difficult in Hebrew; the Greek's μουσικῶν points toward an artistic rather than
    legal context, but the Hebrew wording still suggests ordered composition.
- source_word: נושאי
  chosen: bearing
  alternatives:
  - uttering
  - composing
  - carrying
  lexicon: HALOT
  rationale: The participle from נשא literally means 'bearing/carrying.' In context
    with משל and בכתב it likely refers to producing or presenting literary sayings.
    'Bearing' preserves the Hebrew image more closely, while still allowing the sense
    of carrying proverbs into written form.
- source_word: משל
  chosen: proverbs
  alternatives:
  - parable
  - maxim
  - wise saying
  lexicon: HALOT
  rationale: משל can mean proverb, parable, or aphoristic saying. In a wisdom-literary
    context, 'proverbs' is the most natural default. The Greek ἔπη ('sayings/verses/utterances')
    is broader, so this remains a documented choice rather than an absolute certainty.
- source_word: בכתב
  chosen: in writing
  alternatives:
  - in a written text
  - in books
  - in script
  lexicon: HALOT
  rationale: Literally 'in writing' or 'in written form.' This is the most direct
    rendering of the Hebrew. The Greek ἐν γραφῇ confirms a written medium. 'In books'
    would be interpretive and reflects a possible reconstruction known from other
    witnesses, but the Zone 1 Hebrew here supports the simpler phrase.
