translation:
  text: Noah was found righteous, blameless; at the time of destruction he became
    a substitute. Because of him a remnant remained, and by his covenant the flood
    ceased.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel differs in the final clause, with a reading that points
      toward the coming of the flood rather than its cessation. The Hebrew witness
      used here reads, 'and by his covenant the flood ceased.'
    reason: textual_variant
  - marker: b
    text: Or 'an exchange,' 'compensation,' or 'ransom' for 'a substitute.' The Hebrew
      תחליף and Greek ἀντάλλαγμα both carry the idea of something given in place of
      another.
    reason: lexical_alternative
lexical_decisions:
- source_word: נח
  chosen: Noah
  rationale: Standard transliteration of the personal name.
- source_word: צדיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: The Hebrew adjective denotes moral uprightness; 'righteous' best preserves
    the biblical ethical sense and aligns with the Greek δίκαιος.
- source_word: תמים
  chosen: blameless
  alternatives:
  - perfect
  - whole
  - integrity
  lexicon: HALOT
  rationale: In context this describes Noah's integrity rather than absolute perfection.
    'Blameless' is idiomatic modern English and fits the paired description with 'righteous.'
- source_word: לעת כלה
  chosen: at the time of destruction
  alternatives:
  - in a time of annihilation
  - when the end came
  lexicon: HALOT
  rationale: כלה here refers to destructive ruin/judgment, not merely chronological
    'end.' 'At the time of destruction' preserves the temporal phrase and the catastrophic
    sense.
- source_word: תחליף
  chosen: a substitute
  alternatives:
  - compensation
  - ransom
  - exchange
  lexicon: HALOT
  rationale: The noun denotes something given in place of another. The Greek ἀντάλλαγμα
    supports the sense of an exchange/substitute. 'Substitute' is the clearest concise
    rendering, while leaving the exact nuance somewhat open.
- source_word: בעבורו
  chosen: Because of him
  alternatives:
  - for his sake
  - on his account
  lexicon: HALOT
  rationale: The phrase marks Noah as the reason the remnant survived. 'Because of
    him' is natural English and preserves causality.
- source_word: שארית
  chosen: a remnant remained
  alternatives:
  - a survivor was left
  - a remainder was left
  lexicon: HALOT
  rationale: The noun often carries the sense of survivors preserved through judgment.
    Rendering it with 'remnant' preserves that biblical resonance; adding 'remained'
    makes the clause idiomatic in English.
- source_word: ובבריתו
  chosen: by his covenant
  alternatives:
  - through his covenant
  - in his covenant
  lexicon: HALOT
  rationale: The Hebrew preposition can be rendered instrumentally here. The suffix
    most naturally refers to Noah, i.e., the covenant associated with him; this also
    fits the broader flood narrative.
- source_word: חדל מבול
  chosen: the flood ceased
  alternatives:
  - the flood was stopped
  - the deluge ended
  lexicon: HALOT
  rationale: חדל means to cease/come to an end. 'The flood ceased' is direct and idiomatic.
    The Greek parallel appears to read differently at this point, but the Hebrew witness
    supports cessation.
