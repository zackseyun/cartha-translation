theological_decisions:
- issue: Final clause differs between Hebrew and Greek witnesses
  chosen_reading: 'Follow the extant Hebrew: ''and by his covenant the flood ceased'''
  alternative_readings:
  - Greek witness appears to support a clause closer to 'because of this a flood came/upon
    the earth' rather than cessation
  rationale: For Sirach, where Hebrew survives, project policy gives primacy to the
    Hebrew witness. Here the Cairo Geniza Hebrew clearly reads a cessation formula
    with מבול, while the Greek parallel as cited is textually awkward and points in
    a different direction. Because the divergence materially affects meaning, the
    main text follows the Hebrew and the Greek-based alternative is preserved in a
    footnote. The Masada consult excerpt for this verse is fragmentary and does not
    securely preserve the disputed final clause, so it does not overturn the Hebrew
    main text.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    preserve source uncertainty honestly'
