theological_decisions:
- issue: Reference of the verse to Abraham's circumcision and covenant fidelity
  chosen_reading: Retain the bodily language ('In his flesh') and covenant language
    without making the Abraham reference more explicit than the context already does.
  alternative_readings:
  - Paraphrase explicitly as 'He received circumcision in his flesh as the covenant
    sign'
  rationale: The surrounding context identifies Abraham, so the verse may allude to
    circumcision as covenant sign. But the text itself uses concise wording; the translation
    should preserve that allusive style rather than expand it interpretively.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Hebrew-Greek divergence in the third clause
  chosen_reading: Main text follows the Hebrew 'statute' while preserving the Greek
    'covenant' in a footnote.
  alternative_readings:
  - Translate the clause with Greek support as 'In his flesh he established a covenant
    with him'
  rationale: For Sirach, surviving Hebrew has primacy where extant. However, the Greek
    parallel is significant and differs materially, so the alternative should remain
    visible for auditability.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly'
