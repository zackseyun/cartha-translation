theological_decisions:
- issue: Hebrew vs. Greek closing phrase
  chosen_reading: Follow the extant Hebrew 'an example of knowledge for generation after generation' in the main text, while preserving the Greek alternative in a footnote.
  alternative_readings:
  - 'Greek: ''an example of repentance to the generations'''
  rationale: For Sirach where Hebrew survives, project policy gives primacy to the Hebrew witness. However, the Greek parallel differs significantly at the close and is ancient and meaningful, so the alternative should be preserved transparently rather than ignored.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve theological tension rather than resolve it silently.'
- issue: Rendering of the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
