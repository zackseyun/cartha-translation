translation:
  text: Enoch was found blameless, and he walked with Yahweh, and he was taken away—a sign of knowledge for generation after generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, 'an example of repentance to the generations.' The Hebrew witness here instead reads 'knowledge.'
    reason: alternative_reading
  - marker: b
    text: Masada preserves the Enoch line in a form closer to Genesis 5:24 ('Enoch walked with God, and he was not, because God took him'), while the Cairo Geniza Hebrew represented here reads 'was found blameless ... and was taken away.'
    reason: textual_variant
lexical_decisions:
- source_word: חנוך
  chosen: Enoch
  rationale: Personal name is transliterated by standard convention.
- source_word: נמצא
  chosen: was found
  alternatives:
  - was shown to be
  - proved to be
  lexicon: HALOT
  rationale: The passive 'was found' closely reflects the Hebrew and preserves the evaluative sense without over-interpreting.
- source_word: תמים
  chosen: blameless
  alternatives:
  - perfect
  - whole
  - upright
  lexicon: HALOT
  rationale: '''Blameless'' fits moral integrity in context better than the misleadingly absolute ''perfect,'' while preserving the commendatory force.'
- source_word: והתהלך
  chosen: he walked
  alternatives:
  - he walked about
  - he conducted himself
  lexicon: HALOT
  rationale: The idiom 'walked with' is well established in biblical English and matches the Hebrew expression for lived fellowship/conduct before God.
- source_word: עם יהוה
  chosen: with the LORD
  alternatives:
  - with Yahweh
  lexicon: HALOT
  rationale: The Hebrew has the divine name; per doctrine, YHWH is rendered 'the LORD.' The preposition 'with' is retained from the Hebrew idiom.
- source_word: ונלקח
  chosen: he was taken away
  alternatives:
  - he was taken
  - he was removed
  lexicon: HALOT
  rationale: The passive preserves the Hebrew wording and allows the allusion to Genesis 5:24 to remain without forcing an explanatory paraphrase. 'Taken away' reads naturally in English.
- source_word: אות
  chosen: example
  alternatives:
  - sign
  - token
  lexicon: HALOT
  rationale: Hebrew 'sign' is possible, but in this wisdom context the Greek parallel's ὑπόδειγμα supports a sense like 'example' or 'pattern.' 'Example' communicates the didactic force clearly.
- source_word: דעת
  chosen: knowledge
  alternatives:
  - understanding
  - instruction
  lexicon: HALOT
  rationale: The Hebrew witness reads דעת, which most naturally means 'knowledge.' This is somewhat difficult in context, but it should be preserved in the main text rather than harmonized away. The Greek parallel instead reads 'repentance,' which is preserved in a footnote as a major alternative reading.
- source_word: לדור ודור
  chosen: for generation after generation
  alternatives:
  - to every generation
  - for all generations
  lexicon: HALOT
  rationale: This English idiom captures the distributive force of the Hebrew phrase in readable modern English.
