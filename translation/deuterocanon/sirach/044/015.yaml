translation:
  text: Their wisdom is repeated by the assembly, and their praise is recounted by
    the congregation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Cairo Geniza reads, 'Their wisdom is repeated by the assembly, and
      their praise is recounted by the congregation.' The Greek parallel has, 'Peoples
      will recount their wisdom, and the assembly declares their praise.' The main
      text follows the Hebrew as the primary witness here while noting the Greek's
      broader subject ('peoples').
    reason: alternative_reading
  - marker: b
    text: The Masada scroll for this section is fragmentary at this verse and preserves
      only the closing phrase corresponding to 'their praise ... congregation/assembly,'
      not the full line.
    reason: textual_variant
lexical_decisions:
- source_word: חכמתם
  chosen: their wisdom
  alternatives:
  - the wisdom they possess
  lexicon: HALOT
  rationale: Straightforward construct/pronominal form from חכמה with 3mp suffix;
    no reason to expand beyond the possessive sense.
- source_word: תשנה
  chosen: is repeated
  alternatives:
  - is rehearsed
  - is recited
  - is told again
  lexicon: HALOT
  rationale: From שנה in the sense 'repeat/recite.' The Hebrew subject is 'their wisdom,'
    so an English passive best captures the idiom in smooth modern English. The Greek
    parallel διηγήσονται ('will recount/tell') points toward public retelling, supporting
    a speech/report sense rather than 'change'.
- source_word: עדה
  chosen: the assembly
  alternatives:
  - the community
  - the congregation
  lexicon: HALOT
  rationale: עדה commonly denotes an assembled community. 'Assembly' preserves the
    collective/public setting and avoids using the same English word for both עדה
    and קהל in this verse.
- source_word: ותהלתם
  chosen: and their praise
  alternatives:
  - and their renown
  - and their praiseworthiness
  lexicon: HALOT
  rationale: תהלה most naturally means 'praise.' In context it refers to the praise
    spoken about them, not merely an abstract quality.
- source_word: יספר
  chosen: is recounted
  alternatives:
  - is declared
  - is told
  - is proclaimed
  lexicon: HALOT
  rationale: ספר in the pi'el/qal reporting sense is well rendered 'recount.' The
    passive keeps parallelism with תשנה and reflects that others are speaking of the
    ancestors. The Greek ἐξαγγέλλει/related tradition also supports public declaration.
- source_word: קהל
  chosen: the congregation
  alternatives:
  - the assembly
  - the gathered people
  lexicon: HALOT
  rationale: קהל denotes the gathered congregation. 'Congregation' gives a slightly
    more formal communal nuance than 'assembly,' helping preserve the Hebrew poetic
    parallelism without collapsing both nouns into one English term.
