translation:
  text: Men of valor, steadfast in strength, and at ease in their dwellings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has 'rich men, furnished with strength, living in peace in their settlements.'
      The Hebrew is followed as primary here, with the Greek used as a consistency
