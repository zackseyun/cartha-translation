lexical_decisions:
- source_word: אנשי חיל
  chosen: men of valor
  alternatives:
  - mighty men
  - men of substance
  - men of worth
  lexicon: HALOT
  rationale: The Hebrew phrase commonly denotes men marked by strength, capability,
    or valor. Here, in a praise context and alongside references to strength, 'men
    of valor' best preserves the commendatory force without narrowing it merely to
    wealth. The Greek parallel's πλούσιοι could suggest 'rich,' but κεχορηγημένοι
    ἰσχύϊ strongly supports a broader sense of endowed capability; the Hebrew witness
    remains primary.
- source_word: וסמכי כח
  chosen: steadfast in strength
  alternatives:
  - supporters of strength
  - firm in power
  - upheld by strength
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic. סמכי likely carries the sense of being
    firmly established or supported, and כח is 'strength/power.' 'Steadfast in strength'
    gives natural English while preserving the idea of settled might. It avoids the
    overly literal 'supporters of strength,' which is awkward and less likely in context.
- source_word: ושוקטים
  chosen: at ease
  alternatives:
  - quiet
  - tranquil
  - living in peace
  lexicon: HALOT
  rationale: The participle denotes quietness, restfulness, or peaceful settledness.
    Because the line describes honored ancestors in their social setting, 'at ease'
    communicates settled peace in idiomatic English. The Greek εἰρηνεύοντες confirms
    a peace-oriented sense.
- source_word: על מכונתם
  chosen: in their dwellings
  alternatives:
  - in their place
  - in their station
  - in their established order
  lexicon: HALOT
  rationale: מכונה can denote a fixed place, foundation, or established setting. In
    this context, and with the Greek ἐν παροικίαις αὐτῶν ('in their settlements/dwellings')
    as a control, 'in their dwellings' is the clearest rendering. It captures the
    idea of settled domestic or communal life rather than abstract status.
