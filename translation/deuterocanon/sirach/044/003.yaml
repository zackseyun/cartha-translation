- issue: Use of masculine language in a representative catalog of Israel's honored
    ancestors
  chosen_reading: men renowned
  alternative_readings:
  - people renowned
  - the renowned
  rationale: The Hebrew explicitly uses masculine אנשי ('men'). Following the project's
    gender-accurate policy, the masculine form is retained rather than neutralized.
