translation:
  text: But these are men of steadfast love, and their hope will not cease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''With their offspring an excellent inheritance remains,
      their descendants.'' The Hebrew Cairo Geniza text here instead reads, ''these
      are men of faithful love, and their hope will not cease.'' Masada also reflects
      a different surrounding wording focused on offspring/endurance.'
    reason: textual_variant
  - marker: b
    text: Or 'steadfast love,' 'mercy,' or 'loyalty' for 'faithful love' (Hebrew חסד).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  chosen: But
  alternatives:
  - Yet
  - Nevertheless
  - And yet
  lexicon: HALOT
  rationale: Introduces a contrast with the preceding description of others whose
    memory perished; 'But' is concise modern English that preserves the adversative
    force.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - these ones
  - such men
  lexicon: HALOT
  rationale: A straightforward demonstrative pointing to the exemplary ancestors under
    discussion.
- source_word: אַנְשֵׁי
  chosen: men of
  alternatives:
  - people of
  - persons of
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and refers to notable forefathers;
    per project philosophy, a gender-accurate rendering is preferred over neutralizing
    the expression.
- source_word: חֶסֶד
  chosen: faithful love
  alternatives:
  - kindness
  - mercy
  - steadfast love
  - loyalty
  lexicon: HALOT
  rationale: חסד carries covenantal and relational overtones beyond mere kindness.
    'Faithful love' preserves both affection and loyalty in accessible English. The
    Greek parallel's ἀγαθὴ κληρονομία points in a somewhat different textual direction,
    but the Hebrew witness here supports a character description centered on חסד.
- source_word: וְתִקְוָתָם
  chosen: and their hope
  alternatives:
  - and their expectation
  - and what they hoped for
  lexicon: HALOT
  rationale: תקוה most naturally means 'hope.' The suffix indicates possession, so
    'their hope' is the most direct rendering.
- source_word: לֹא תִשְׁבֹּת
  chosen: will not cease
  alternatives:
  - will not fail
  - will not come to an end
  - will not be cut off
  lexicon: HALOT
  rationale: From שבת in the sense of ceasing/stopping. 'Will not cease' is a natural
    future rendering and preserves the verbal image without overinterpreting the object
    of endurance.
