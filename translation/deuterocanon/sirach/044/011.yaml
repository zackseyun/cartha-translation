theological_decisions:
- issue: Textual divergence between the Hebrew Cairo Geniza reading and the Greek
    parallel in this verse
  chosen_reading: 'Translate the extant Hebrew main line as the primary text: ''these
    are men of faithful love, and their hope will not cease'''
  alternative_readings:
  - A Greek-based sense such as 'With their offspring an excellent inheritance remains,
    their descendants'
  - A harmonized rendering that imports offspring/inheritance language from the Greek
    or nearby Masada lines
  rationale: Project policy gives primacy to the Hebrew where Sirach survives in Hebrew,
    while also keeping the Greek in view. Here the Greek parallel reflects a substantially
    different line, and the Masada excerpt for the surrounding passage also points
    to offspring/endurance language rather than the Cairo wording. Because Zone 1's
    primary witness is the Hebrew line supplied, the main translation remains anchored
    there, while the significant alternative textual tradition is preserved in a footnote
    rather than silently harmonized.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly'
