translation:
  text: Discipline your son and make his yoke heavy, lest in his foolishness he consume
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Discipline your son and work on him, lest he stumble
      because of your disgrace.'' The Hebrew reads ''lest in his foolishness he consume
      you.'''
    reason: textual_variant
lexical_decisions:
- source_word: יסר
  chosen: Discipline
  alternatives:
  - Correct
  - Chasten
  - Instruct
  lexicon: HALOT
  rationale: The Hebrew יסר commonly denotes corrective discipline or instruction.
    'Discipline' best preserves both the corrective and formative force in accessible
    modern English. The Greek parallel παιδεύσον likewise supports a training/disciplining
    sense.
- source_word: והכבד עולו
  chosen: make his yoke heavy
  alternatives:
  - lay a heavy yoke on him
  - impose a burden on him
  - work hard on him
  lexicon: HALOT
  rationale: The Hebrew is literally 'make his yoke heavy.' This concrete image should
    be preserved rather than flattened. The Greek parallel ἔργασαι ἐν αὐτῷ points
    toward active labor/training with him, but the Hebrew witness is primary here
    and supports retaining the yoke metaphor as the sharper parental-discipline image.
- source_word: עולו
  chosen: his yoke
  alternatives:
  - his burden
  lexicon: HALOT
  rationale: עול literally means 'yoke.' Although 'burden' would communicate the sense,
    'yoke' preserves the Hebrew metaphor and matches wisdom-literature imagery of
    discipline as imposed restraint.
- source_word: פן
  chosen: lest
  alternatives:
  - so that not
  - otherwise
  lexicon: HALOT
  rationale: פן introduces a warning of undesirable result. 'Lest' is concise and
    natural in this proverbial context.
- source_word: באולתו
  chosen: in his foolishness
  alternatives:
  - through his folly
  - by his senselessness
  lexicon: HALOT
  rationale: אולת denotes folly or foolishness. 'In his foolishness' closely follows
    the Hebrew preposition and keeps the causal-circumstantial sense. The Greek differs
    here, reading 'in your shame/disgrace,' so the Hebrew wording is a meaningful
    textual divergence worth preserving in a footnote.
- source_word: יבלע בך
  chosen: he consume you
  alternatives:
  - he swallow you up
  - he ruin you
  - he devour you
  lexicon: HALOT
  rationale: בלע literally means 'swallow' or 'consume.' In context it is metaphorical
    for bringing harm or ruin upon the parent. 'Consume you' preserves the vividness
    without sounding overly idiomatic; 'swallow you up' is possible but more colloquial
    in English.
