translation:
  text: Put him to work, so that he may not be idle,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Set him to labor, lest he be idle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔμβαλε
  chosen: Put
  alternatives:
  - set
  - throw
  - place
  lexicon: LSJ
  rationale: Aorist imperative of ἐμβάλλω, here idiomatically meaning to put or set
    someone into a condition or activity. 'Put' is natural English and preserves the
    imperative force without over-literalizing as 'throw.'
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - it
  lexicon: LSJ
  rationale: Masculine accusative singular pronoun referring to a male person in context.
    'Him' preserves the gender and direct-object function.
- source_word: εἰς ἐργασίαν
  chosen: to work
  alternatives:
  - into labor
  - into employment
  - to a task
  lexicon: LSJ
  rationale: The preposition εἰς with ἐργασίαν expresses movement into productive
    activity. 'To work' is idiomatic modern English and captures the sense of engaging
    someone in labor or occupation.
- source_word: ἵνα μὴ ἀργῇ
  chosen: so that he may not be idle
  alternatives:
  - lest he be idle
  - so that he does not become lazy
  lexicon: LSJ
  rationale: ἵνα introduces purpose; μὴ negates; ἀργῇ conveys being idle or inactive.
    'So that he may not be idle' preserves the purposive nuance and avoids importing
    the stronger moralized sense 'lazy' beyond the Greek.
