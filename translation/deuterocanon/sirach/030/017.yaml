translation:
  text: Death is better than a life of vanity, and everlasting rest than continual
    pain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Death is better than a bitter life.'' The Hebrew reads
      ''a life of emptiness.'''
    reason: alternative_reading
  - marker: b
    text: Greek parallel has 'a lasting sickness/affliction' where the Hebrew says
      'pain' qualified as enduring.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוב
  chosen: better
  alternatives:
  - good
  lexicon: HALOT
  rationale: In the comparative construction טוב ל־ ('better to/than'), English idiom
    prefers 'better than' rather than the more wooden 'good to.' The Greek parallel
    κρείσσων confirms a comparative sense.
- source_word: למות
  chosen: Death
  alternatives:
  - to die
  - dying
  lexicon: HALOT
  rationale: 'Although formally an infinitive (''to die''), English reads more naturally
    with the abstract noun in a comparative proverb: ''Death is better than…''. This
    preserves the gnomic force without adding content. The Greek θάνατος likewise
    supports a nominal rendering.'
- source_word: מחיי שוא
  chosen: than a life of emptiness
  alternatives:
  - than vain life
  - than a futile life
  - than a life of vanity
  lexicon: HALOT
  rationale: חיי is 'life/living of,' and שוא denotes emptiness, vanity, futility,
    or worthlessness. 'A life of emptiness' captures the Hebrew sense clearly in modern
    English. The Greek parallel has 'bitter life,' which likely reflects an interpretive
    or variant tradition; because the Hebrew witness is primary here and high-confidence,
    the main text follows the Hebrew.
- source_word: ונוחת עולם
  chosen: and eternal rest
  alternatives:
  - and everlasting repose
  - and rest forever
  - and perpetual rest
  lexicon: HALOT
  rationale: נוחה/נוחת denotes rest or repose; עולם can mean long duration, perpetuity,
    or eternity. 'Eternal rest' is concise, idiomatic, and preserves the proverb's
    contrast with ongoing pain. 'Everlasting repose' is possible but less natural
    in contemporary English.
- source_word: מכאב נאמן
  chosen: than unrelenting pain
  alternatives:
  - than enduring pain
  - than constant pain
  - than persistent sickness
  lexicon: HALOT
  rationale: כאב is pain. נאמן literally means firm, faithful, reliable, and in context
    describes something continuing or persistent. The Greek ἀρρώστημα ἔμμονον points
    to a sense of a lasting affliction. 'Unrelenting pain' communicates the durative
    force well in readable English.
