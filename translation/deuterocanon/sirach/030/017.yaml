- issue: Hebrew-Greek divergence in the first comparison
  chosen_reading: Follow the Hebrew 'life of emptiness' in the main text
  alternative_readings:
  - '''bitter life'' (from the Greek parallel)'
  rationale: The Hebrew is the primary witness for extant Sirach verses and is marked
    high-confidence here. The Greek parallel is still used as translation input and
    confirms the verse's comparative structure, but where it diverges lexically from
    the Hebrew, the Hebrew governs the main rendering. The Greek alternative is preserved
    in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input while keeping Hebrew primary'
- issue: Force of עולם in a wisdom saying
  chosen_reading: Render as 'eternal'
  alternative_readings:
  - '''everlasting'''
  - '''perpetual'''
  rationale: The term denotes enduring duration and, in proverbial contrast with ongoing
    pain, 'eternal rest' best conveys the weight of the expression in natural English
    without over-specifying afterlife doctrine beyond the text's own contrast.
  doctrine_reference: 'DOCTRINE.md: readable modern English; preserve theological
    tension rather than resolve it'
