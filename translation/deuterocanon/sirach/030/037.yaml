translation:
  text: For idleness has taught much evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great evil'; the Greek phrase can emphasize either quantity ('much evil')
      or magnitude.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλὴν
  chosen: much
  alternatives:
  - great
  - many things
  lexicon: LSJ
  rationale: The adjective modifies κακίαν in the accusative singular. In English,
    'much evil' is the most natural mass-noun rendering; 'great evil' is possible
    but slightly shifts toward intensity rather than extent.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: Retained as 'for' to preserve the explanatory connection with the preceding
    context rather than recasting the clause more dynamically.
- source_word: κακίαν
  chosen: evil
  alternatives:
  - wickedness
  - badness
  - vice
  lexicon: LSJ
  rationale: κακία commonly denotes moral badness or vice. 'Evil' is broad, idiomatic,
    and preserves the moral force without narrowing the term to a specific vice.
- source_word: ἐδίδαξεν
  chosen: has taught
  alternatives:
  - taught
  - has instructed
  - has produced
  lexicon: LSJ
  rationale: 'The aorist is rendered with English present perfect for natural proverbial
    force in context: idleness is presented as something shown by experience to teach
    evil. ''Produced'' would be interpretive and less faithful to the verbal image
    of instruction.'
- source_word: ἡ ἀργία
  chosen: idleness
  alternatives:
  - laziness
  - sloth
  - inactivity
  lexicon: LSJ
  rationale: ἀργία denotes idleness or laziness. 'Idleness' best matches the abstract
    noun in Greek and avoids importing the more specifically moralized category 'sloth,'
    while remaining clear in modern English.
