translation:
  text: What value is there in the idols of the nations, which neither eat nor smell?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek adds, 'So is the one driven away by the Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: מה יעריכו
  chosen: What value is there
  alternatives:
  - What can be valued
  - How can one esteem
  - What profit is there
  lexicon: HALOT
  rationale: The Hebrew idiom asks about worth or valuation. The Greek parallel τί
    συμφέρει ('what benefits/profits') confirms a rhetorical question about usefulness
    rather than literal appraising. 'What value is there' preserves the evaluative
    force in natural English.
- source_word: לאלילי הגוים
  chosen: in the idols of the nations
  alternatives:
  - for the idols of the nations
  - in the idols of the Gentiles
  - in the pagan idols
  lexicon: HALOT
  rationale: אלילי הגוים refers to the idols belonging to the nations/Gentiles. 'Nations'
    is preferred over 'Gentiles' in this wisdom context because it is less church-coded
    and closer to the Hebrew. English idiom with 'value' favors 'in the idols'.
- source_word: אשר לא יאכלון
  chosen: which neither eat
  alternatives:
  - that do not eat
  lexicon: HALOT
  rationale: A straightforward relative clause describing the impotence of idols.
    'Neither' sets up the paired negation with the following verb.
- source_word: ולא יריחון
  chosen: nor smell
  alternatives:
  - nor perceive an odor
  - nor smell fragrance
  lexicon: HALOT
  rationale: The Hebrew verb means 'smell.' The Greek ὀσφρανθῇ likewise points to
    smelling/odor. 'Nor smell' is concise and preserves the sensory contrast with
    living beings who can enjoy offerings.
