translation:
  text: Do not give your soul over to grief, and do not stumble in your iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew לדין is difficult. The Greek parallel supports the sense 'grief'
      or 'sorrow'; a more literal reading from the Hebrew consonants alone could suggest
      'judgment.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek witness is considerably fuller here: ''Love your soul and comfort
      your heart, and put grief far from you; for grief has killed many, and there
      is no benefit in it.'' The Hebrew surviving text is shorter.'
    reason: alternative_reading
lexical_decisions:
- source_word: אל תתן
  chosen: Do not give ... over
  alternatives:
  - Do not hand over
  - Do not surrender
  lexicon: HALOT
  rationale: The Hebrew idiom with נתן plus an object and complement naturally means
    to give over or surrender to something. 'Give ... over' preserves the warning
    against yielding oneself to a destructive state without over-paraphrasing.
- source_word: לדין
  chosen: to grief
  alternatives:
  - to sorrow
  - to affliction
  - to judgment
  lexicon: HALOT
  rationale: The Hebrew reading is somewhat difficult, but in light of the Greek parallel's
    repeated λύπη ('grief, sorrow') and the verse's admonitory context, the sense
    is best taken as grief/sorrow rather than legal 'judgment.' 'Grief' is concise
    and idiomatic in English.
- source_word: נפשך
  chosen: your soul
  alternatives:
  - your life
  - your self
  lexicon: HALOT
  rationale: נפש can mean soul, life, or self. Here 'your soul' preserves the Hebrew
    anthropological term and matches the Greek ψυχή, while still being understandable
    in modern English.
- source_word: ואל תכשל
  chosen: and do not stumble
  alternatives:
  - and do not fall
  - and do not be tripped up
  lexicon: HALOT
  rationale: כשל commonly denotes stumbling or faltering. 'Stumble' keeps the metaphorical
    moral sense and remains close to the Hebrew wording.
- source_word: בעונך
  chosen: in your iniquity
  alternatives:
  - through your guilt
  - by your wrongdoing
  - in your sin
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or the consequences of wrongdoing. 'In
    your iniquity' stays formally close and preserves the moral weight of the Hebrew,
    though 'guilt' is a viable contextual alternative.
