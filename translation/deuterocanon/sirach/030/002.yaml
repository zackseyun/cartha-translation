translation:
  text: He who disciplines his son will profit by him, and among his acquaintances
    he will boast because of him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ παιδεύων
  chosen: He who disciplines
  alternatives:
  - The one who trains
  - He who instructs
  - He who corrects
  lexicon: BDAG
  rationale: παιδεύω can denote upbringing, instruction, training, or disciplinary
    correction. In this wisdom context about child-rearing, 'disciplines' best preserves
    both formative instruction and corrective force without reducing it to mere punishment.
- source_word: τὸν υἱὸν αὐτοῦ
  chosen: his son
  alternatives:
  - his child
  lexicon: BDAG
  rationale: The Greek is specifically masculine singular, 'his son,' not a gender-neutral
    term. Per gender-accurate policy, the masculine is retained.
- source_word: ὀνήσεται
  chosen: will profit by
  alternatives:
  - will benefit from
  - will be helped by
  lexicon: BDAG
  rationale: The future middle conveys receiving benefit or advantage. 'Will profit
    by' is concise and idiomatic, preserving the sense that the son's formation yields
    benefit to the father.
- source_word: ἐπʼ αὐτῷ
  chosen: by him
  alternatives:
  - from him
  - because of him
  lexicon: BDAG
  rationale: With ὀνήσεται, the phrase indicates the basis or source of benefit. 'By
    him' is compact English; the second occurrence later in the verse is better rendered
    'because of him' to fit the boasting idiom.
- source_word: ἀνὰ μέσον γνωρίμων
  chosen: among his acquaintances
  alternatives:
  - in the midst of his acquaintances
  - among those who know him
  - among his friends
  lexicon: BDAG
  rationale: γνωρίμων refers to acquaintances or familiar associates. 'Among his acquaintances'
    is natural modern English and avoids overstating intimacy with 'friends'.
- source_word: καυχήσεται
  chosen: he will boast
  alternatives:
  - he will glory
  - he will take pride
  lexicon: BDAG
  rationale: The verb means to boast or exult. 'Boast' is the most direct lexical
    equivalent here; the context is social honor in wisdom literature, not necessarily
    sinful arrogance.
- source_word: ἐπʼ αὐτῷ
  chosen: because of him
  alternatives:
  - over him
  - in him
  lexicon: BDAG
  rationale: In the clause with καυχήσεται, the prepositional phrase expresses the
    ground of boasting. 'Because of him' communicates that the son is the reason for
    the father's boasting.
