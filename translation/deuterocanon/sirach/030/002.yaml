  text: ὁ παιδεύων τὸν υἱὸν αὐτοῦ ὀνήσεται ἐπʼ αὐτῷ, καὶ ἀνὰ μέσον γνωρίμων ἐπʼ αὐτῷ
    καυχήσεται·
