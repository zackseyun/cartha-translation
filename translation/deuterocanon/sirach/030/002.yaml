theological_decisions:
- issue: Moral valence of parental boasting
  chosen_reading: Render καυχήσεται as 'will boast' without softening to 'take pride.'
  alternative_readings:
  - will take pride
  - will glory
  rationale: The verse describes social honor resulting from a well-disciplined son.
    The text itself does not explicitly condemn or commend the boasting beyond reporting
    it, so the translation preserves the plain lexical sense rather than importing
    a moral judgment.
  doctrine_reference: Preserve theological tension rather than resolve it.
