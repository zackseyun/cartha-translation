translation:
  text: As long as you still live and breath is in you, do not give yourself over
    to any flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not give yourself over to any person' / 'to any human being.' Greek
      'flesh' here likely means mortal humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως ἔτι ζῇς
  chosen: As long as you still live
  alternatives:
  - While you are still alive
  - So long as you live
  lexicon: LSJ
  rationale: The phrase is temporal and idiomatic. 'As long as you still live' preserves
    both duration and the emphatic ἔτι ('still').
- source_word: πνοὴ ἐν σοί
  chosen: breath is in you
  alternatives:
  - there is breath in you
  - you have breath
  lexicon: LSJ
  rationale: A fairly literal rendering keeps the embodied image of life. 'Breath
    is in you' is natural enough in English and matches the Greek expression closely.
- source_word: μὴ ἀλλάξῃς
  chosen: do not give yourself over to
  alternatives:
  - do not exchange
  - do not surrender
  - do not hand yourself over
  - do not change
  lexicon: LSJ
  rationale: Although ἀλλάσσω often means 'change' or 'exchange,' with reflexive σεαυτόν
    and the following dative it likely means to yield or transfer oneself into another's
    power or judgment. A wooden 'do not change yourself to any flesh' is not intelligible
    English. 'Give yourself over to' captures the warning against subordinating oneself
    to merely human persons.
- source_word: σεαυτόν
  chosen: yourself
  lexicon: LSJ
  rationale: Reflexive object; retained explicitly because the admonition concerns
    self-disposition.
- source_word: πάσῃ σαρκί
  chosen: any flesh
  alternatives:
  - any person
  - any human being
  - all flesh
  lexicon: LSJ
  rationale: The Greek is singular dative with πᾶς used distributively. 'Flesh' is
    preserved because it is the actual lexical choice and carries the sense of mortal
    humanity; 'any flesh' is slightly unusual in English but auditable and theologically
    transparent. A footnote preserves the smoother alternative 'any person'.
