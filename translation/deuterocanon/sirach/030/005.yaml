translation:
  text: In his lifetime he saw and rejoiced, and at his end he was not grieved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the end of his life' or 'in his last days.' The Greek phrase refers
      to the close of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῇ ζωῇ αὐτοῦ
  chosen: In his lifetime
  alternatives:
  - During his life
  - While he lived
  lexicon: LSJ
  rationale: A natural English rendering of the temporal phrase that preserves the
    Greek sense of time within one's life rather than a more wooden 'in his life.'
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he looked upon
  - he lived to see
  lexicon: LSJ
  rationale: The verb is simply 'saw.' Although context suggests seeing the good outcome
    of his son, the object is unstated in this clause, so the translation keeps the
    verb broad rather than supplying an interpretive object.
- source_word: εὐφράνθη
  chosen: rejoiced
  alternatives:
  - was glad
  - was delighted
  lexicon: LSJ
  rationale: '''Rejoiced'' preserves the strong positive response of the passive/deponent
    form and fits wisdom-style diction without sounding archaic.'
- source_word: ἐν τῇ τελευταῖ αὐτοῦ
  chosen: at his end
  alternatives:
  - at the end of his life
  - in his last days
  lexicon: LSJ
  rationale: The phrase refers to the close of life. 'At his end' is concise and close
    to the Greek; the fuller alternatives are possible but slightly more interpretive.
- source_word: οὐκ ἐλυπήθη
  chosen: he was not grieved
  alternatives:
  - he did not grieve
  - he was not saddened
  lexicon: LSJ
  rationale: The passive form is best reflected by 'was not grieved.' This preserves
    the emotional sense without overinterpreting the cause.
