translation:
  text: Jealousy and anger shorten days, and anxiety brings old age before its time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew דין is difficult here. It may mean 'anger' or, less likely, 'contention/strife'
      or 'judgment.' The main text chooses 'anger' because the verse lists destructive
      dispositions that damage life.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel supplied in Zone 1 does not correspond to this verse
      and appears to reflect a different passage, so the Hebrew witness governs the
      translation here.
    reason: textual_variant
lexical_decisions:
- source_word: קנאה
  chosen: Jealousy
  alternatives:
  - envy
  - zeal
  lexicon: HALOT
  rationale: In this wisdom context, the term denotes corrosive envy/jealousy rather
    than positive zeal. 'Jealousy' is the most natural English rendering alongside
    the paired vice that follows.
- source_word: דין
  chosen: anger
  alternatives:
  - judgment
  - contention
  - strife
  lexicon: HALOT
  rationale: Although דין commonly relates to judgment, in this Ben Sira context and
    in parallel with harmful inner dispositions, it is best taken as a hostile, contentious
    temper. 'Anger' communicates the vice clearly in idiomatic English. Because the
    Hebrew is somewhat unusual here, alternatives are preserved in a footnote.
- source_word: יקצרו ימים
  chosen: shorten days
  alternatives:
  - cut life short
  - reduce one's days
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom while remaining
    clear in English. It expresses premature loss of lifespan.
- source_word: ובלא עת
  chosen: before its time
  alternatives:
  - untimely
  - out of season
  - when it is not time
  lexicon: HALOT
  rationale: This idiom refers to something happening prematurely. 'Before its time'
    is natural modern English and preserves the temporal force.
- source_word: תזקין
  chosen: brings old age
  alternatives:
  - makes one grow old
  - ages
  lexicon: HALOT
  rationale: 'The verb means to become old/grow old. Rendering it causally in English
    fits the clause''s sense: anxiety causes premature aging.'
- source_word: דאגה
  chosen: anxiety
  alternatives:
  - worry
  - care
  - sorrow
  lexicon: HALOT
  rationale: The word denotes anxious care or worry. 'Anxiety' best matches the inward,
    consuming concern described in this wisdom saying.
