translation:
  text: Delicacies poured out before a shut mouth are like an offering set before
    an idol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גלול is a contemptuous term for an idol; alternatively, 'a dung-idol'
      or 'a filthy idol.'
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel reads 'food portions laid beside a tomb' instead of the
      Hebrew's 'an offering set before an idol,' showing a notable difference in the
      second comparison while preserving the same idea of futility.
    reason: textual_variant
lexical_decisions:
- source_word: טובה
  chosen: delicacies
  alternatives:
  - good things
  - choice food
  - bounty
  lexicon: HALOT
  rationale: In context with the Greek parallel's food imagery (ἀγαθὰ ... θέμα βρωμάτων),
    the Hebrew likely refers not to abstract 'goodness' but to desirable provisions/foods.
    'Delicacies' captures the concrete, appetizing sense in readable English.
- source_word: שפוכה
  chosen: poured out
  alternatives:
  - spilled
  - set out
  lexicon: HALOT
  rationale: The passive participle from שפך naturally means 'poured out.' Retaining
    this image preserves the vividness of the Hebrew and aligns with the Greek ἐκκεχυμένα.
- source_word: על פה סתום
  chosen: before a shut mouth
  alternatives:
  - upon a closed mouth
  - for a mouth that is shut
  lexicon: HALOT
  rationale: A more idiomatic English rendering is needed. 'Before a shut mouth' conveys
    food presented to someone unable or unwilling to eat, matching the proverb's point
    and the Greek ἐπὶ στόματι κεκλεισμένῳ.
- source_word: תנופה
  chosen: an offering
  alternatives:
  - wave offering
  - presentation offering
  lexicon: HALOT
  rationale: 'Though תנופה can specifically denote a ''wave offering,'' here the comparison
    is broader: a cultic presentation placed before something incapable of receiving
    it. ''An offering'' communicates the sense without over-specifying a ritual nuance
    that may not be central in this proverb.'
- source_word: מצגת
  chosen: set
  alternatives:
  - placed
  - presented
  - laid out
  lexicon: HALOT
  rationale: The participial sense is that of something placed or presented. 'Set'
    is concise and natural in English.
- source_word: לפני גלול
  chosen: before an idol
  alternatives:
  - before a dung-idol
  - before an image
  lexicon: HALOT
  rationale: גלול/גלולים is a contemptuous term for idols. 'Idol' is the clearest
    main-text rendering; the pejorative force can be preserved in a footnote as an
    alternative nuance.
