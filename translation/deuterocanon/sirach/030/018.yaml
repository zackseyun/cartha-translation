theological_decisions:
- issue: Cultic term תנופה in a wisdom comparison
  chosen_reading: render generally as 'an offering' rather than the technical 'wave
    offering'
  alternative_readings:
  - a wave offering
  rationale: The verse's force lies in the futility of presenting something valuable
    to one unable to receive it. A fully technical sacrificial term may over-narrow
    the comparison for modern readers. The cultic background remains visible through
    'offering.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Pejorative idol term גלול
  chosen_reading: translate as 'idol' in the main text
  alternative_readings:
  - dung-idol
  - filthy idol
  rationale: The Hebrew term is intentionally contemptuous, but an explicitly pejorative
    English rendering in the main text can sound interpretive or awkward. 'Idol' preserves
    the referent cleanly, with the stronger nuance noted in a footnote for transparency.
  doctrine_reference: Translation philosophy §6
