translation:
  text: An unbroken horse turns out stubborn, and a son left unchecked turns out headstrong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'untamed' for 'unbroken' (ἀδάμαστος). The image is of a horse not brought
      under training.
    reason: lexical_alternative
  - marker: b
    text: The final adjective (προαλής) is rare; possible renderings include 'self-willed'
      or 'presumptuous.' 'Headstrong' is chosen to reflect the sense of uncontrolled
      forwardness in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵππος
  chosen: horse
  alternatives:
  - steed
  lexicon: LSJ
  rationale: The ordinary sense is a horse; no contextual reason suggests a more elevated
    term like 'steed'.
- source_word: ἀδάμαστος
  chosen: unbroken
  alternatives:
  - untamed
  - unsubdued
  lexicon: LSJ
  rationale: For a horse, 'unbroken' is the most idiomatic English equivalent, conveying
    an animal not trained into submission. 'Untamed' is possible but less specific
    to horse-training imagery.
- source_word: ἀποβαίνει
  chosen: turns out
  alternatives:
  - becomes
  - proves to be
  lexicon: LSJ
  rationale: The verb here expresses resultant state or outcome. 'Turns out' is natural
    modern English and preserves the proverbial force.
- source_word: σκληρός
  chosen: stubborn
  alternatives:
  - hard
  - harsh
  - unyielding
  lexicon: LSJ
  rationale: In this context of an untrained horse, the sense is not physical hardness
    but obstinate resistance. 'Stubborn' best captures that behavioral nuance.
- source_word: υἱός
  chosen: son
  alternatives:
  - child
  lexicon: LSJ
  rationale: The Greek is specifically masculine singular. Per gender-accurate policy,
    'son' should be retained rather than generalized to 'child'.
- source_word: ἀνειμένος
  chosen: left unchecked
  alternatives:
  - undisciplined
  - let loose
  - unrestrained
  lexicon: LSJ
  rationale: The participle denotes being let go or not held in. 'Left unchecked'
    communicates parental laxity in a proverb about discipline, while remaining broader
    than a fully interpretive 'undisciplined'.
- source_word: ἐκβαίνει
  chosen: turns out
  alternatives:
  - comes out
  - proves to be
  lexicon: LSJ
  rationale: Like ἀποβαίνει earlier in the verse, this verb marks the resulting character
    produced by prior conditions. Matching it with 'turns out' preserves the parallelism.
- source_word: προαλής
  chosen: headstrong
  alternatives:
  - self-willed
  - presumptuous
  - wanton
  lexicon: LSJ
  rationale: The adjective is somewhat rare and contextually denotes a forward, uncontrolled,
    self-assertive disposition. 'Headstrong' fits the parental-discipline context
    and pairs well with 'stubborn' in the first colon without collapsing the distinction
    entirely.
