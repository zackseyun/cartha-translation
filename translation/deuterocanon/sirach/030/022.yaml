translation:
  text: Gladness of heart is a man's life, and a man's rejoicing prolongs his days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Hebrew witness for this verse is difficult and differs sharply
      from the Greek tradition. The translation follows the clear sense of the Greek
      parallel: ''Gladness of heart is a man''s life, and a man''s rejoicing prolongs
      his days.'''
    reason: textual_variant
lexical_decisions:
- source_word: εὐφροσύνη / כנאמן לן
  chosen: gladness
  alternatives:
  - cheerfulness
  - joy
  lexicon: LSJ / Hebrew lexicon
  rationale: The Hebrew as transmitted is difficult and appears corrupt or divergent
    from the Greek; the Greek parallel clearly gives the sense of inward cheer or
    gladness. 'Gladness' preserves the affective sense without sounding overly elevated.
- source_word: καρδίας
  chosen: of heart
  alternatives:
  - in the heart
  - hearted
  lexicon: LSJ
  rationale: A straightforward genitival rendering that preserves the biblical idiom
    of the heart as the seat of inner life and emotion.
- source_word: ζωὴ ἀνθρώπου
  chosen: is a man's life
  alternatives:
  - is human life
  - is a person's life
  lexicon: LSJ
  rationale: The Greek uses singular ἀνθρώπου, and the doctrine prefers gender-accurate
    rendering where the source is grammatically masculine with representative force.
    'A man's life' keeps the form while still functioning generically.
- source_word: ἀγαλλίαμα
  chosen: rejoicing
  alternatives:
  - exultation
  - joy
  lexicon: LSJ
  rationale: '''Rejoicing'' is natural English and retains the active, expressive
    sense better than the more abstract ''joy.'''
- source_word: ἀνδρός
  chosen: a man's
  alternatives:
  - of a man
  - one's
  lexicon: LSJ
  rationale: The Greek specifically has ἀνδρός, not a gender-neutral plural. Rendering
    it as 'a man's' preserves the source's singular masculine form in line with project
    philosophy.
- source_word: μακροημέρευσις
  chosen: prolongs his days
  alternatives:
  - length of days
  - long life
  - adds days
  lexicon: LSJ
  rationale: This expresses the idiomatic sense in clear modern English. 'Prolongs
    his days' preserves the biblical flavor of lengthened life without awkwardness.
