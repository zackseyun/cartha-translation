translation:
  text: Put him to work as is fitting for him, and if he does not obey discipline,
    make his fetters heavy. But do not be excessive with any flesh, and do nothing
    without judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''with anyone'' / ''toward any person.'' Greek: ''with any flesh,''
      a Semitic-style way of speaking about human beings generally.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἔργα κατάστησον
  chosen: Put him to work
  alternatives:
  - Assign him to tasks
  - Set him over work
  lexicon: LSJ
  rationale: The phrase combines movement/purpose with καθίστημι in a causative sense.
    'Put him to work' is idiomatic modern English that preserves the imperative force
    and labor context without overformal awkwardness.
- source_word: καθὼς πρέπει αὐτῷ
  chosen: as is fitting for him
  alternatives:
  - as is appropriate for him
  - as befits him
  lexicon: LSJ
  rationale: πρέπει conveys what is proper or suitable. 'As is fitting for him' keeps
    the ethical/propriety nuance and reads naturally.
- source_word: κἂν μὴ πειθαρχῇ
  chosen: if he does not obey discipline
  alternatives:
  - if he is not obedient
  - if he refuses instruction
  lexicon: LSJ
  rationale: πειθαρχέω is more than generic hearing; it is obedience to rule, authority,
    or discipline. 'Obey discipline' preserves that nuance better than the flatter
    'obey' alone.
- source_word: βάρυνον τὰς πέδας αὐτοῦ
  chosen: make his fetters heavy
  alternatives:
  - weigh down his shackles
  - tighten his chains
  lexicon: LSJ
  rationale: πέδαι are fetters/shackles, especially for the feet. 'Make his fetters
    heavy' is a close rendering of the imperative βάρυνον without importing a more
    specific action like 'tighten' not stated in the Greek.
- source_word: μὴ περισσεύσῃς
  chosen: do not be excessive
  alternatives:
  - do not go too far
  - do not overdo it
  lexicon: LSJ
  rationale: The verb here warns against excess. 'Do not be excessive' preserves the
    moral caution in a concise way and fits the following universal phrase.
- source_word: ἐν πάσῃ σαρκί
  chosen: with any flesh
  alternatives:
  - toward any person
  - with anyone
  lexicon: LSJ
  rationale: Literally 'in/with all flesh.' Because σάρξ here refers to human beings
    in their creaturely frailty rather than the Pauline theological sense, 'with any
    flesh' preserves the source image. A footnote preserves the smoother alternative
    'with anyone/any person'.
- source_word: ἄνευ κρίσεως
  chosen: without judgment
  alternatives:
  - without discernment
  - without due consideration
  lexicon: LSJ
  rationale: κρίσις can mean judgment, decision, or discernment. 'Without judgment'
    is the most direct rendering and suits the wisdom context of measured action.
- source_word: μὴ ποιήσῃς μηδέν
  chosen: do nothing
  alternatives:
  - do not do anything
  - do nothing at all
  lexicon: LSJ
  rationale: A straightforward prohibition. 'Do nothing' is concise and idiomatic
    while preserving the emphatic negation.
