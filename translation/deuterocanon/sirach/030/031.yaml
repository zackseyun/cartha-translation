translation:
  text: In all your works be outstanding; do not give a blemish to your honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be surpassing/excellent' for 'be outstanding.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not bring a blemish upon your reputation/glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πᾶσι τοῖς ἔργοις σου
  chosen: In all your works
  alternatives:
  - In everything you do
  - In all your deeds
  lexicon: LSJ
  rationale: ἔργα commonly means works/deeds/actions. 'Works' keeps closer formal
    correspondence while remaining natural in English; the phrase is comprehensive
    because of πᾶσι.
- source_word: γίνου
  chosen: be
  alternatives:
  - become
  - prove yourself
  lexicon: LSJ
  rationale: Present middle imperative of γίνομαι here functions idiomatically as
    an exhortation about one's manner of conduct. 'Be' is concise and natural in English.
- source_word: ὑπεράγων
  chosen: outstanding
  alternatives:
  - surpassing
  - excelling
  - superior
  lexicon: LSJ
  rationale: The participial/adjectival sense conveys surpassing excellence. 'Outstanding'
    communicates the ethical exhortation clearly in modern English without sounding
    wooden; 'surpassing' is more literal but less idiomatic here.
- source_word: μὴ δῷς
  chosen: do not give
  alternatives:
  - do not bring
  - do not incur
  - do not allow
  lexicon: LSJ
  rationale: The verb δίδωμι is literally 'give.' In this idiom, the sense is to occasion
    or bring upon oneself, but retaining 'give' preserves the Greek image and remains
    understandable.
- source_word: μῶμον
  chosen: a blemish
  alternatives:
  - a stain
  - fault
  - disgrace
  - reproach
  lexicon: LSJ
  rationale: μῶμος/μῶμον denotes blemish, defect, or blame. 'Blemish' best preserves
    the metaphorical image of a mar on reputation; 'stain' and 'disgrace' are interpretive
    expansions.
- source_word: ἐν τῇ δόξῃ σου
  chosen: to your honor
  alternatives:
  - in your glory
  - upon your reputation
  lexicon: LSJ
  rationale: δόξα can mean glory, honor, or reputation. In this wisdom context about
    personal conduct, 'honor' best captures social esteem without over-theologizing
    'glory.' The preposition is rendered idiomatically in English as 'to' rather than
    woodenly 'in.'
