translation:
  text: So it is with one who has wealth and does not enjoy it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel expands the thought vividly: ''looking with the eyes
      and groaning, like a eunuch embracing a virgin and groaning.'' This supports
      the sense of possessing wealth without being able to enjoy it.'
    reason: alternative_reading
lexical_decisions:
- source_word: כן
  chosen: So it is with
  alternatives:
  - thus
  - likewise
  lexicon: HALOT
  rationale: Introduces a comparison or analogy from the surrounding context. 'So
    it is with' gives natural English while preserving the proverbial force better
    than a bare 'thus'.
- source_word: מי
  chosen: one who
  alternatives:
  - whoever
  - a man who
  lexicon: HALOT
  rationale: An indefinite relative expression. 'One who' is idiomatic and avoids
    over-specifying gender where the Hebrew is generic.
- source_word: יש לו
  chosen: has
  alternatives:
  - there is to him
  - possesses
  lexicon: HALOT
  rationale: The Hebrew idiom means possession. 'Has' is the most natural English
    equivalent.
- source_word: עושר
  chosen: wealth
  alternatives:
  - riches
  - abundance
  lexicon: HALOT
  rationale: '''Wealth'' best matches the concrete sense of material prosperity here.
    ''Riches'' is possible but sounds more traditional and less natural in modern
    English.'
- source_word: ואין נהנה ממנו
  chosen: and does not enjoy it
  alternatives:
  - and gets no benefit from it
  - and does not profit from it
  lexicon: HALOT
  rationale: The Hebrew נהנה denotes deriving enjoyment or benefit. In this context,
    with wealth as the object, 'does not enjoy it' captures the experiential point
    more directly than the more economic 'profit from it.' The singular pronoun 'it'
    refers back to wealth collectively.
- source_word: βλέπων ἐν ὀφθαλμοῖς ... καὶ στενάζων
  chosen: does not enjoy it
  alternatives:
  - only looks at it and groans
  lexicon: BDAG
  rationale: 'The Greek parallel expands the image: seeing with the eyes yet sighing,
    like a eunuch embracing a virgin and groaning. This supports understanding the
    Hebrew not merely as lacking legal possession but as having wealth without actual
    enjoyment. The vivid Greek image informs the nuance, though the main translation
    remains anchored in the Hebrew wording.'
