translation:
  text: Over the souls of his sons he will bind up his wounds, and at every cry his
    inward parts will be troubled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'souls of his sons' could also be rendered 'lives of his sons' or
      'his sons themselves.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'his inward parts' is a literal idiom for deep inner emotion; some
      translations render more interpretively as 'his heart' or 'his feelings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ
  chosen: over
  alternatives:
  - for
  - concerning
  - because of
  lexicon: LSJ
  rationale: 'With καταδεσμεύσει τραύματα, περὶ likely expresses relation/object sphere:
    ''bind up ... over/for.'' ''Over'' preserves the somewhat awkward Greek idiom
    without overinterpreting it as causal.'
- source_word: ψυχῶν
  chosen: souls
  alternatives:
  - lives
  - persons
  lexicon: LSJ
  rationale: The Greek literally has 'souls of sons.' Although 'lives' or 'persons'
    could smooth the sense, 'souls' preserves the anthropological wording and emotional
    force of the source.
- source_word: καταδεσμεύσει
  chosen: will bind up
  alternatives:
  - will bandage
  - will bind
  lexicon: LSJ
  rationale: The verb denotes binding up or bandaging wounds. 'Will bind up' is idiomatic
    English and fits the direct object τραύματα.
- source_word: τραύματα
  chosen: wounds
  alternatives:
  - injuries
  - blows
  lexicon: LSJ
  rationale: Standard sense is physical wounds; here likely metaphorical for the father's
    self-inflicted emotional pain through overconcern for his sons. 'Wounds' keeps
    the vivid image.
- source_word: βοῇ
  chosen: cry
  alternatives:
  - shout
  - outcry
  - noise
  lexicon: LSJ
  rationale: The noun can mean cry or shout. In context of parental anxiety, 'cry'
    best conveys a distressing sound from the child that agitates the father.
- source_word: ταραχθήσεται
  chosen: will be troubled
  alternatives:
  - will be disturbed
  - will be agitated
  lexicon: LSJ
  rationale: Passive future of ταράσσω. 'Will be troubled' is natural English and
    preserves the emotional disturbance without exaggeration.
- source_word: σπλάγχνα
  chosen: inward parts
  alternatives:
  - heart
  - bowels
  - inner being
  lexicon: LSJ
  rationale: Literally the inward organs, often the seat of deep emotion. 'Inward
    parts' preserves the concrete ancient idiom better than the interpretive 'heart,'
    while avoiding the crudeness of 'bowels' in modern English.
