reference: Sirach 30:4
source:
  edition: lxx-swete-1909
  text: ἐτελεύτησεν αὐτοῦ ὁ πατήρ, καὶ ὡς οὐκ ἀπέθανεν, ὅμοιον γὰρ αὐτῷ κατέλιπεν
    μετʼ αὐτόν.
