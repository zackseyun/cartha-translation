- issue: Whether to specify the offspring as 'son' in the main text
  chosen_reading: one like himself
  alternative_readings:
  - a son like himself
  rationale: The broader context concerns sons, and the implied referent is clearly
    a child/offspring; however, this clause itself uses ὅμοιον without an explicit
    noun. To avoid importing a noun not stated in this line, the main text keeps the
    more literal 'one like himself.'
