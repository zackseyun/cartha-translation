translation:
  text: Put him to work while he is a child, and you will find rest; let his hands
    go idle, and he will seek freedom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let up on his hands,' that is, relax discipline over his work or activity.
    reason: lexical_alternative
  - marker: b
    text: '''Freedom'' here means throwing off restraint or discipline, not political
      liberty.'
    reason: cultural_note
lexical_decisions:
- source_word: ἔργασαι
  chosen: Put him to work
  alternatives:
  - Make him work
  - Train him in work
  - Keep him busy
  lexicon: LSJ
  rationale: Aorist middle imperative of ἐργάζομαι here functions as an exhortation
    to engage the child in labor or disciplined activity. 'Put him to work' is idiomatic
    modern English and preserves the causative sense better than the flatter 'work
    with' or the harsher 'make him work.'
- source_word: ἐν παιδί
  chosen: while he is a child
  alternatives:
  - in childhood
  - with a child
  - during his youth
  lexicon: LSJ
  rationale: 'The phrase is elliptical and idiomatic. Given the following masculine
    pronouns, the sense is temporal: deal with him in this way during childhood. ''While
    he is a child'' makes the temporal force clear in readable English.'
- source_word: εὑρήσεις ἀνάπαυσιν
  chosen: you will find rest
  alternatives:
  - you will find relief
  - you will gain peace
  lexicon: LSJ
  rationale: ἀνάπαυσις commonly denotes rest or relief. 'Find rest' is both natural
    and close to the Greek, preserving the proverbial consequence of proper discipline.
- source_word: ἄνες
  chosen: let ... go idle
  alternatives:
  - relax
  - loosen
  - leave alone
  - give free rein to
  lexicon: LSJ
  rationale: From ἀνίημι, 'let up, relax, loosen.' In this disciplinary context the
    sense is not merely physical release but slackening restraint or labor. 'Let his
    hands go idle' captures the practical force in context.
- source_word: χεῖρας αὐτῷ
  chosen: his hands
  alternatives:
  - his hand
  - his activity
  - his labor
  lexicon: LSJ
  rationale: The plural 'hands' is retained because it is the Greek wording and naturally
    represents his work or activity in English idiom.
- source_word: ζητήσει ἐλευθερίαν
  chosen: he will seek freedom
  alternatives:
  - he will seek liberty
  - he will become headstrong
  - he will look for independence
  lexicon: LSJ
  rationale: ἐλευθερία literally means freedom/liberty. In context it refers to throwing
    off restraint rather than a political abstraction. 'Seek freedom' keeps the literal
    term while allowing readers to hear the disciplinary sense from context.
