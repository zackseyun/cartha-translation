translation:
  text: He who instructs his son will provoke the enemy to jealousy, and in the presence
    of friends he will rejoice over him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will make the enemy envious.' The Greek verb can denote provoking jealousy
      or envy.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ διδάσκων
  chosen: He who instructs
  alternatives:
  - The one who teaches
  - Whoever trains
  lexicon: BDAG
  rationale: Present participle used substantivally; 'instructs' fits parental formation
    better than the more classroom-oriented 'teaches,' while preserving the ongoing
    sense.
- source_word: τὸν υἱὸν αὐτοῦ
  chosen: his son
  alternatives:
  - his child
  lexicon: BDAG
  rationale: The Greek is explicitly masculine singular ('son'), and the translation
    philosophy prefers gender-accurate rendering over neutralization.
- source_word: παραζηλώσει
  chosen: will provoke ... to jealousy
  alternatives:
  - will make ... envious
  - will stir to emulation
  lexicon: BDAG
  rationale: 'The verb commonly carries the sense of provoking to jealousy/envy. Here
    the object is ''the enemy,'' so the idiom is best expressed in English with an
    explicit complement: ''provoke the enemy to jealousy.'''
- source_word: τὸν ἐχθρόν
  chosen: the enemy
  alternatives:
  - his enemy
  - an enemy
  lexicon: BDAG
  rationale: The Greek has the singular with article. English can preserve this as
    a representative singular, implying the rival/opponent generally.
- source_word: ἔναντι φίλων
  chosen: in the presence of friends
  alternatives:
  - before friends
  - among friends
  lexicon: BDAG
  rationale: ἔναντι naturally means 'before' or 'in the presence of.' This rendering
    is idiomatic and keeps the public/social setting clear.
- source_word: ἐπʼ αὐτῷ
  chosen: over him
  alternatives:
  - because of him
  - concerning him
  lexicon: BDAG
  rationale: With ἀγαλλιάσεται, the phrase most naturally indicates the cause or occasion
    of rejoicing; 'over him' is concise and idiomatic in English.
- source_word: ἀγαλλιάσεται
  chosen: he will rejoice
  alternatives:
  - he will exult
  - he will be glad
  lexicon: BDAG
  rationale: The future middle denotes joyful exultation. 'Rejoice' is natural modern
    English and preserves the positive, celebratory force without sounding archaic.
