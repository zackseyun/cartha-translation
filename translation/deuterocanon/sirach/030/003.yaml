reference: Sirach 30:3
source:
  edition: lxx-swete-1909
  text: ὁ διδάσκων τὸν υἱὸν αὐτοῦ παραζηλώσει τὸν ἐχθρόν, καὶ ἔναντι φίλων ἐπʼ αὐτῷ
    ἀγαλλιάσεται.
