translation:
  text: Years of a glad heart are better than delicacies, and his food will agree
    with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Years of a good heart instead of delicacies, and his
      food will go up upon him.' The sense of the second line is that simple food
      is healthful or digestible for the cheerful person.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel in Swete at this reference reads a different saying about
      not giving authority over yourself or your possessions to son, wife, brother,
      or friend. The Hebrew witness here therefore reflects a substantially different
      textual tradition.
    reason: textual_variant
lexical_decisions:
- source_word: שנות
  chosen: Years of
  alternatives:
  - The years of
  - A lifetime of
  lexicon: HALOT
  rationale: The plural construct with לב טוב introduces a state or condition extending
    over time. 'Years of' preserves the Hebrew image more closely than smoothing to
    'a lifetime of.'
- source_word: לב טוב
  chosen: a glad heart
  alternatives:
  - a good heart
  - a cheerful heart
  lexicon: HALOT
  rationale: In wisdom Hebrew, לב טוב denotes inward well-being or cheerfulness rather
    than moral goodness alone. 'Glad heart' captures the emotional sense while remaining
    natural English.
- source_word: תחת
  chosen: better than
  alternatives:
  - instead of
  - in place of
  lexicon: HALOT
  rationale: 'Here תחת functions comparatively: years marked by inner gladness are
    preferable to rich fare. ''Better than'' makes the implied comparison explicit
    in idiomatic English.'
- source_word: מטעמים
  chosen: delicacies
  alternatives:
  - dainties
  - choice foods
  - savory dishes
  lexicon: HALOT
  rationale: The noun refers to tasty or luxurious foods. 'Delicacies' best conveys
    special, desirable fare without archaic tone.
- source_word: ומאכלו
  chosen: and its food
  alternatives:
  - and his food
  - and what he eats
  lexicon: HALOT
  rationale: The suffix is formally masculine singular and could refer back to the
    person with the glad heart ('his food') or, less naturally in English, to the
    condition just described. Because the next phrase uses עליו ('upon him' = agree
    with him / sit well with him), the sense is that the person's food is healthful
    to him. The English keeps the Hebrew linkage while allowing the following clause
    to clarify the sense.
- source_word: יעלה עליו
  chosen: will agree with him
  alternatives:
  - will sit well with him
  - will benefit him
  - will go up upon him
  lexicon: HALOT
  rationale: The idiom literally 'go up upon him' is used of food affecting someone
    well, i.e., being digestible or beneficial. 'Will agree with him' is idiomatic
    modern English and fits the wisdom context of health and contentment.
