theological_decisions:
- issue: Use of severe corporal-discipline imagery in wisdom instruction
  chosen_reading: Retain the concrete bodily metaphors in translation rather than
    softening them into abstract 'discipline.'
  alternative_readings:
  - Paraphrase as 'discipline him strictly'
  - Moderate the imagery to avoid apparent endorsement of violence
  rationale: The source text uses stark physical imagery in both Hebrew and Greek
    witnesses. Optimal equivalence here requires preserving the rhetoric of the wisdom
    tradition without importing modern ethical mitigation into the main text. Readability
    is maintained, but the severity is not concealed.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological
    tension rather than resolve it'
