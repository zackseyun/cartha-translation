translation:
  text: Bend his neck in his youth, and break his loins while he is still small, lest
    he become stubborn and rebel against you, and bring you bitterness of soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'break his loins,' while the Greek parallel reads 'crush his
      sides/ribs.' The main text follows the extant Hebrew witness, with the Greek
      used to clarify the disciplinary sense where the Hebrew line is difficult.
    reason: textual_variant
  - marker: b
    text: The clause rendered 'lest he become stubborn' reflects a difficult Hebrew
      reading in the Cairo Geniza text; the Greek parallel more clearly supports the
      sense 'lest he become hardened.'
    reason: alternative_reading
lexical_decisions:
- source_word: כוף
  chosen: Bend
  alternatives:
  - Bow
  - Force down
  lexicon: HALOT
  rationale: The imperative calls for subduing or bending. 'Bend' preserves the physical
    metaphor without over-paraphrasing into an abstract 'discipline.'
- source_word: ראשו
  chosen: his neck
  alternatives:
  - his head
  lexicon: HALOT
  rationale: Although the Hebrew form literally reads 'his head,' the idiom with כוף
    is best represented in English as 'bend his neck,' matching the sense of humbling
    or restraining. The Greek parallel supports a disciplinary bodily image rather
    than a focus on the head as such.
- source_word: בנערותו
  chosen: in his youth
  alternatives:
  - while he is young
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'in his youth' is concise and natural.
- source_word: ובקע מתניו
  chosen: and break his loins
  alternatives:
  - and break his sides
  - and strike his flanks
  lexicon: HALOT
  rationale: The Hebrew reads 'split/break his loins/hips,' while the Greek parallel
    has 'crush his ribs/sides.' Because the Hebrew is the primary witness where extant,
    the main text follows its stronger wording, but the bodily term is kept literal
    rather than softened. A footnote preserves the Greek-side alternative.
- source_word: כשהוא קטן
  chosen: while he is still small
  alternatives:
  - while he is little
  - when he is young
  lexicon: HALOT
  rationale: This phrase emphasizes early childhood. 'Still small' is idiomatic and
    preserves the concrete sense.
- source_word: למה ישקה
  chosen: lest he become stubborn
  alternatives:
  - lest he grow hard
  - lest he become difficult
  lexicon: HALOT
  rationale: The Hebrew clause is textually difficult in Kahana, but the Greek parallel
    clearly reads 'lest perhaps, having become hardened...' The English reflects that
    sense while acknowledging the Hebrew uncertainty.
- source_word: ἀπειθήσῃ σοι / ומרה בך
  chosen: and rebel against you
  alternatives:
  - and disobey you
  - and be defiant toward you
  lexicon: BDAG
  rationale: The Hebrew 'be rebellious/bitter against you' and Greek 'disobey/rebel
    against you' converge on filial defiance. 'Rebel against you' captures the stronger
    force.
- source_word: מפח נפש
  chosen: bitterness of soul
  alternatives:
  - anguish
  - grief
  - vexation
  lexicon: HALOT
  rationale: The Hebrew phrase points to deep inner distress. 'Bitterness of soul'
    preserves the anthropological language and emotional weight better than a flatter
    gloss.
