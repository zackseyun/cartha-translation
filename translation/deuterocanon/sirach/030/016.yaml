translation:
  text: There is no wealth greater than a sound body, and there is no good greater
    than a glad heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'soundness of body' is supported by the Greek parallel 'health of
      body.' The Hebrew phrase is idiomatic and somewhat compressed.
    reason: lexical_alternative
  - marker: b
    text: Or 'joy of heart.' The Hebrew literally says 'goodness of heart,' while
      the Greek parallel reads 'joy of heart.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֹשֶׁר / אין עושר על עושר
  chosen: There is no wealth greater than
  alternatives:
  - No wealth surpasses
  - There is no riches above
  lexicon: HALOT
  rationale: 'The Hebrew construction with אין ... על expresses superiority/comparison:
    no wealth is above another kind of wealth. Rendering it as ''There is no wealth
    greater than'' preserves the comparative force in natural English. The Greek βελτίων
    confirms a comparative sense (''better than'').'
- source_word: שַׂר עֶצֶם
  chosen: a sound body
  alternatives:
  - health of body
  - bodily health
  - firm flesh/bone
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat idiomatic and compressed. In light of the
    Greek parallel ὑγείας σώματος ('health of body'), the sense is bodily soundness/health
    rather than literal 'prince of bone' or similar. 'A sound body' is concise, idiomatic
    English that reflects the Hebrew through the Greek witness without over-literalizing
    an opaque phrase.
- source_word: טוֹבָה / אין טובה על
  chosen: there is no good beyond
  alternatives:
  - there is no better thing than
  - nothing is better than
  lexicon: HALOT
  rationale: The repeated comparative pattern in the second colon mirrors the first.
    'No good beyond' keeps the noun טובה visible while expressing the superlative
    comparison naturally. The Greek likewise has a comparative/surpassing construction.
- source_word: טוּב לֵבָב
  chosen: a glad heart
  alternatives:
  - goodness of heart
  - cheerfulness of heart
  - joy of heart
  lexicon: HALOT
  rationale: Although literally 'goodness of heart,' in context the phrase denotes
    inner well-being or cheerfulness. The Greek parallel χαρὰν καρδίας ('joy of heart')
    supports an affective sense. 'A glad heart' is natural English and preserves the
    Hebrew anthropological term 'heart'.
