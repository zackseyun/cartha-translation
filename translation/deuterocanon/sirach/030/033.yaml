theological_decisions:
- issue: Rendering of οἰκέτῃ in a wisdom proverb about household labor
  chosen_reading: slave
  alternative_readings:
  - servant
  - household servant
  rationale: This is not a theological crux in the narrow sense, but it bears ethical
    and social weight. The Greek term often refers to a domestic slave/servant. Given
    the verse's pairing of bread, discipline, and work, the bonded and subordinate
    status is foregrounded, so 'slave' is the more transparent rendering under the
    project's doctrine on δοῦλος-like terms and social-status language.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Contested terms table on δοῦλος as servant/slave context-dependent'
