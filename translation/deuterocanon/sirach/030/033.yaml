translation:
  text: Fodder and a rod and burdens are for a donkey; bread and discipline and work
    are for a slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'loads' for 'burdens.'
    reason: lexical_alternative
  - marker: b
    text: Or 'servant' or 'household servant' for 'slave'; the Greek οἰκέτης often
      refers to a domestic bondservant.
    reason: alternative_reading
  - marker: c
    text: '''Discipline'' may also be understood as ''training'' or ''correction.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: χορτάσματα
  chosen: fodder
  alternatives:
  - feed
  - provender
  lexicon: LSJ
  rationale: Refers to animal feed, especially what satisfies grazing animals. 'Fodder'
    is natural English for feed given to a donkey and preserves the proverb's concrete
    imagery better than the broader 'food'.
- source_word: ῥάβδος
  chosen: rod
  alternatives:
  - stick
  - staff
  lexicon: LSJ
  rationale: In this disciplinary proverb, 'rod' best conveys an instrument of correction
    or control. 'Staff' sounds supportive rather than corrective; 'stick' is too generic.
- source_word: φορτία
  chosen: burdens
  alternatives:
  - loads
  - cargo
  lexicon: LSJ
  rationale: The noun denotes things carried. 'Burdens' preserves the weight-bearing
    sense and matches the proverbial parallelism, though 'loads' is also possible.
- source_word: ὄνῳ
  chosen: donkey
  alternatives:
  - ass
  lexicon: LSJ
  rationale: '''Donkey'' is standard modern English and avoids archaic tone while
    accurately rendering the animal named.'
- source_word: ἄρτος
  chosen: bread
  alternatives:
  - food
  lexicon: LSJ
  rationale: The Greek specifically says 'bread.' In wisdom literature it can stand
    for basic sustenance, but there is no need to generalize in translation.
- source_word: παιδεία
  chosen: discipline
  alternatives:
  - instruction
  - training
  - correction
  lexicon: LSJ
  rationale: The term can include education, training, and correction. In this triad
    paired with bread and work for a slave, 'discipline' best captures the controlling/corrective
    sense intended by the comparison, while still allowing the broader notion of training.
- source_word: ἔργον
  chosen: work
  alternatives:
  - labor
  - task
  lexicon: LSJ
  rationale: A straightforward rendering that fits the social setting and keeps the
    terse proverbial style.
- source_word: οἰκέτῃ
  chosen: slave
  alternatives:
  - servant
  - household servant
  lexicon: LSJ
  rationale: Although οἰκέτης can denote a household servant, the social reality is
    one of bonded status. Per project philosophy, 'slave' is preferred where bonded
    nature is salient. The proverb speaks of imposed labor and discipline, so 'slave'
    better reflects the underlying institution than the softer 'servant'.
