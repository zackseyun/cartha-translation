translation:
  text: Give rest to your soul, and gladden your heart; and keep anger far from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text here is difficult, and the supplied Greek parallel reflects
      a substantially different wording for this verse. The translation follows the
      surviving Hebrew witness, with 'gladden your heart' representing a context-based
      reading of a difficult verb.
    reason: textual_variant
lexical_decisions:
- source_word: פוג
  chosen: give rest
  alternatives:
  - relax
  - soothe
  - ease
  lexicon: HALOT
  rationale: The imperative addresses the hearer's inner life. The verb can convey
    slackening, easing, or letting subside. 'Give rest' captures the causative sense
    toward one's soul without sounding overly colloquial. The parallel with the next
    clause supports a calming/restorative nuance rather than mere inactivity.
- source_word: נפשך
  chosen: your soul
  alternatives:
  - your life
  - your self
  lexicon: HALOT
  rationale: In wisdom literature נפש often denotes the inner self or life. 'Soul'
    preserves the anthropological weight and matches the reflective, moral tone of
    the verse better than the flatter 'self,' while not requiring a technical metaphysical
    claim beyond the Hebrew term's normal range.
- source_word: ופיג
  chosen: and gladden
  alternatives:
  - cheer
  - refresh
  - make calm
  lexicon: HALOT
  rationale: The form is difficult, but in context with 'heart' and the following
    warning against anger, the sense is positive restoration of the inner person.
    'Gladden' fits the emotional parallelism better than 'calm' alone and avoids overcommitting
    to a more technical reconstruction.
- source_word: לבך
  chosen: your heart
  alternatives:
  - your mind
  - your inner being
  lexicon: HALOT
  rationale: Hebrew לב commonly denotes the inner center of thought and feeling. 'Heart'
    is the standard and sufficiently transparent English equivalent in wisdom contexts.
- source_word: וקצפון
  chosen: and anger
  alternatives:
  - wrath
  - resentment
  - vexation
  lexicon: HALOT
  rationale: The noun denotes anger or wrath. 'Anger' is the most natural modern English
    rendering and suits the practical ethical instruction of the verse.
- source_word: הרחק ממך
  chosen: keep far from you
  alternatives:
  - put far from yourself
  - remove from yourself
  lexicon: HALOT
  rationale: The imperative plus prepositional phrase calls for active distancing.
    'Keep far from you' is idiomatic English and preserves the exhortational force.
