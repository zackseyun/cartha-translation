translation:
  text: For anger has killed many, and there is no benefit in wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The supplied Greek parallel for this verse reads a different saying ('Consider
      that I have not labored for myself alone, but for all who seek instruction'),
      indicating a verse-numbering mismatch or divergent textual tradition. The main
      translation follows the extant Hebrew witness.
    reason: textual_variant
  - marker: b
    text: The Hebrew word rendered 'anger' in the first line is somewhat uncertain
      in form; it is translated from context and from its parallel with 'wrath' in
      the second line.
    reason: lexical_alternative
lexical_decisions:
- source_word: כי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or ground for the surrounding admonition; 'for'
    is the most natural concise connector in English.
- source_word: רבים
  chosen: many
  alternatives:
  - multitudes
  - numerous people
  lexicon: HALOT
  rationale: Straightforward quantitative term; 'many' is idiomatic and preserves
    the broad, proverbial force.
- source_word: הרג
  chosen: has killed
  alternatives:
  - killed
  - has slain
  lexicon: HALOT
  rationale: The Hebrew verb denotes killing/slaying. The English present perfect
    fits proverbial wisdom in English, expressing repeated attested reality rather
    than a single past event.
- source_word: דין
  chosen: anger
  alternatives:
  - vexation
  - resentment
  - judgment
  lexicon: HALOT
  rationale: The Hebrew reading is somewhat unusual, but in context and in parallel
    with קצפון it points to an emotion of indignation/anger rather than juridical
    'judgment.' Rendering it as 'anger' yields coherent synonymous parallelism with
    the second colon while staying anchored to the Hebrew sense as preserved.
- source_word: ואין
  chosen: and there is no
  alternatives:
  - and there is not
  - but there is no
  lexicon: HALOT
  rationale: Standard existential negation; 'and there is no' preserves the coordinate
    structure of the Hebrew.
- source_word: תעלה
  chosen: benefit
  alternatives:
  - profit
  - advantage
  - gain
  lexicon: HALOT
  rationale: The noun denotes profit or advantage. 'Benefit' is clear modern English
    and suits wisdom-style moral instruction.
- source_word: בקצפון
  chosen: in wrath
  alternatives:
  - in rage
  - in anger
  - from wrath
  lexicon: HALOT
  rationale: קצפון denotes wrath/anger. 'In wrath' preserves the preposition and keeps
    the terse proverbial style. 'Wrath' also helps distinguish it slightly from the
    first colon's 'anger' while preserving the parallelism.
