translation:
  text: If you have a slave, let him be like yourself, because you acquired him with
    blood; if you have a slave, treat him like yourself, because you need him as your
    own life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'because in/with blood you acquired him,' an idiom for
      acquiring at great personal cost.
    reason: lexical_alternative
  - marker: b
    text: The final clause is syntactically difficult in Greek. The sense appears
      to be that the slave is needed as dearly or as urgently as one's own life.
    reason: textual_variant
lexical_decisions:
- source_word: οἰκέτης
  chosen: slave
  alternatives:
  - servant
  - household servant
  lexicon: BDAG
  rationale: Although οἰκέτης can denote a household servant, the surrounding language
    of acquisition (ἐκτήσω) and possession ('if you have') makes bonded status salient
    here. Per project philosophy, 'slave' better preserves that social reality than
    the softer 'servant'.
- source_word: ἔστω ὡς σύ
  chosen: let him be like yourself
  alternatives:
  - let him be as you are
  - let him be like you
  lexicon: LSJ
  rationale: A straightforward comparative expression. 'Like yourself' reads naturally
    in English and preserves the ethical force of treating the slave as one's own
    equal/self-analogue.
- source_word: ἐν αἵματι
  chosen: with blood
  alternatives:
  - at the cost of blood
  - with your lifeblood
  lexicon: LSJ
  rationale: The phrase is idiomatic and likely means at great personal cost, but
    the Greek says literally 'in/with blood.' Rendering 'with blood' keeps the vividness
    while allowing readers to sense the metaphorical weight.
- source_word: ἐκτήσω
  chosen: you acquired
  alternatives:
  - you bought
  - you gained for yourself
  lexicon: LSJ
  rationale: The verb means acquire/get possession of. 'Acquired' is broad enough
    to fit the Greek without over-specifying a commercial transaction, though purchase
    may be implied.
- source_word: ἄγε
  chosen: lead
  alternatives:
  - guide
  - treat
  - bring along
  lexicon: LSJ
  rationale: The imperative of ἄγω is literally 'lead' or 'bring.' The phrase is somewhat
    awkward in English, but 'lead him as yourself' preserves the verbal force better
    than an interpretive paraphrase like 'treat him like yourself.'
- source_word: σεαυτόν
  chosen: yourself
  alternatives:
  - your own self
  lexicon: LSJ
  rationale: Reflexive comparison matching the first clause; 'yourself' is the natural
    English equivalent.
- source_word: ψυχή
  chosen: life
  alternatives:
  - soul
  - self
  lexicon: BDAG
  rationale: In this context ψυχή most naturally refers to one's life/self rather
    than an immaterial soul. 'Your own life' communicates the intensity of dependence
    without importing later soul/body distinctions.
- source_word: ἐπιδέησις
  chosen: you need
  alternatives:
  - there is need of
  - you are dependent on
  lexicon: LSJ
  rationale: The transmitted Greek is syntactically rough, but the sense is that the
    master has need of the slave. Rendering verbally as 'you need him' produces clear
    English while staying close to the apparent meaning.
