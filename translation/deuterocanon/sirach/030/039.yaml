  text: εἰ ἔστιν σοι οἰκέτης, ἔστω ὡς σύ, ὅτι ἐν αἵματι ἐκτήσω αὐτόν· εἰ ἔστιν σοι
    οἰκέτης, ἄγε αὐτὸν ὡς σεαυτόν, ὅτι ὡς ἡ ψυχή σου ἐπιδέησις αὐτόν.
