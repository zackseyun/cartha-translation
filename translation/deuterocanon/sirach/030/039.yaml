theological_decisions:
- issue: Rendering of οἰκέτης in a slavery context
  chosen_reading: slave
  alternative_readings:
  - servant
  - household servant
  rationale: The verse concerns ownership/acquisition and dependence, so the bonded
    nature is contextually salient. This aligns with the project's guidance to use
    'slave' where the social reality should not be softened.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, δοῦλος servant/slave (context-dependent)
    and original-language primacy.'
- issue: How literally to render the difficult final clause
  chosen_reading: because you need him as your own life
  alternative_readings:
  - because he is as necessary to you as your own life
  - because he is your indispensable support
  rationale: The Greek wording is awkward ('ὅτι ὡς ἡ ψυχή σου ἐπιδέησις αὐτόν'), likely
    reflecting a Semitic substrate or textual roughness. The chosen rendering preserves
    the core sense of personal dependence without over-resolving the syntax.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; PHILOSOPHY.md: preserve source uncertainty honestly.'
