translation:
  text: Discipline your son, lest you be put to shame; but if you play with him, he
    will humiliate you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Nurse/coddle a child, and he will astonish you; play with him,
      and he will grieve you.'' The Hebrew witness instead reads ''Discipline your
      son ... he will humiliate you.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יסר
  chosen: Discipline
  alternatives:
  - Correct
  - Chasten
  - Train
  lexicon: HALOT
  rationale: The Hebrew יסר commonly denotes corrective instruction or discipline,
    not merely verbal teaching. 'Discipline' best preserves the parental corrective
    sense in clear modern English. The Greek parallel τιθήνησον is textually and semantically
    difficult, but the Hebrew witness is primary here and supports a disciplinary
    sense.
- source_word: בנך
  chosen: your son
  alternatives:
  - your child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular, 'your son.' Per the project's
    gender-accurate policy, the masculine should be retained rather than neutralized
    to 'child.'
- source_word: לבל תבוש
  chosen: lest you be put to shame
  alternatives:
  - so that you may not be ashamed
  - lest you be ashamed
  lexicon: HALOT
  rationale: 'The clause expresses purpose/prevention: discipline the son in order
    to avoid the father''s shame. ''Be put to shame'' captures the social-honor dimension
    slightly better than the more internal ''be ashamed.'''
- source_word: תשחק עמו
  chosen: play with him
  alternatives:
  - indulge him
  - joke with him
  - sport with him
  lexicon: HALOT
  rationale: The plain sense of שׂחק is 'play' or 'laugh.' The Greek σύνπαιξον likewise
    supports 'play with him.' In context the warning is against overfamiliar indulgence,
    but the text itself uses the concrete verb, so the main rendering keeps 'play
    with him' rather than interpreting it more strongly as 'indulge him.'
- source_word: יכלימך
  chosen: he will humiliate you
  alternatives:
  - he will shame you
  - he will disgrace you
  lexicon: HALOT
  rationale: From כלם, to shame or humiliate. 'Humiliate you' gives the active force
    of the son's effect on the parent and pairs well with the earlier shame language
    without sounding redundant. The Greek λυπήσει ('he will grieve/distress you')
    reflects a different nuance, but the Hebrew witness here is clear and primary.
