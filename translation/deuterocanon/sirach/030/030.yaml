theological_decisions:
- issue: Gender-specific family term in the second clause
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The source text distinguishes τέκνα in the first clause from υἱῶν in
    the second. The translation preserves that distinction rather than neutralizing
    both to 'children.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Economic dependence imagery
  chosen_reading: look to the hands of your sons
  alternative_readings:
  - depend on your sons
  - look to your sons for support
  rationale: The Greek uses concrete bodily imagery rather than an abstract verb for
    dependence. The main text preserves the image; a footnote can clarify the idiomatic
    sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
