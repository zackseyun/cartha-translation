id: SIR.30.30
reference: Sirach 30:30
source:
  edition: lxx-swete-1909
  text: κρεῖσσον γάρ ἐστιν τὰ τέκνα δεηθῆναί σου ἢ σὲ ἐμβλέπειν εἰς χεῖρας υἱῶν σου.
  language: Greek
