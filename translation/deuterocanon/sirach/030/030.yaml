translation:
  text: For it is better that your children should beg from you than that you look
    to the hands of your sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'than that you depend on your sons for support.'
      The Greek says literally, 'look to the hands of your sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖσσον
  chosen: better
  alternatives:
  - preferable
  - superior
  lexicon: LSJ
  rationale: Standard comparative adjective meaning 'better' or 'stronger/preferable.'
    'Better' is the most natural English comparative here.
- source_word: τὰ τέκνα
  chosen: your children
  alternatives:
  - the children
  - your offspring
  lexicon: LSJ
  rationale: Although τέκνα can be a general term for children/offspring, the following
    σου makes the possessive explicit. 'Children' is natural and inclusive English.
- source_word: δεηθῆναί
  chosen: have to beg
  alternatives:
  - ask
  - be in need of
  - implore
  lexicon: LSJ
  rationale: The aorist passive infinitive of δέομαι can mean 'to ask, beg, entreat.'
    In this economic/familial context, the sense is not a mere request but dependence
    expressed by begging or asking for support. 'Have to beg' brings out the force
    without over-paraphrasing.
- source_word: ἐμβλέπειν
  chosen: look to
  alternatives:
  - look at
  - depend on
  - fix your gaze on
  lexicon: LSJ
  rationale: Literally 'look into/upon,' but with εἰς χεῖρας it idiomatically points
    to looking toward someone's hands for provision. 'Look to' preserves the visual
    metaphor while allowing the dependence sense to be heard.
- source_word: εἰς χεῖρας
  chosen: to the hands
  alternatives:
  - at the hands
  - for help from the hands
  - for support from
  lexicon: LSJ
  rationale: A literal rendering keeps the concrete imagery of receiving support from
    another's hand. Because this may sound idiomatic in English, the surrounding phrase
    'look to the hands of your sons' preserves the metaphor rather than flattening
    it to 'depend on.'
- source_word: υἱῶν
  chosen: sons
  alternatives:
  - children
  lexicon: LSJ
  rationale: The Greek specifically says 'sons,' not the more general 'children.'
    Per project policy, gender-specific language is retained where the source is specific.
