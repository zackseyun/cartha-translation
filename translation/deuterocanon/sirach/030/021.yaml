theological_decisions:
- issue: Relationship between the Hebrew and Greek forms of the verse
  chosen_reading: Translate primarily from the surviving Hebrew image, while allowing
    the Greek parallel to supply the prohibitory force and second-person address.
  alternative_readings:
  - 'Translate the Greek alone: ''Do not give your soul to grief, and do not afflict
    yourself in your planning/counsel.'''
  - Translate the Hebrew more literally as a descriptive statement without explicit
    prohibition.
  rationale: For Sirach, surviving Hebrew has primacy where extant, but the prompt
    requires the Greek parallel to be used as actual translation input. The Hebrew
    preserves the vivid simile; the Greek clarifies that the line functions as exhortation.
    The resulting English keeps the Hebrew image while reflecting the admonitory context.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    parallel Greek as translation input'
