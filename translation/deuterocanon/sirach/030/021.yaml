translation:
  text: Do not look on with your eyes and groan, like a eunuch embracing a young woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not give your soul over to grief, and do not afflict
      yourself in your own counsel/planning.'' The Hebrew witness here preserves a
      vivid image of frustrated longing; the Greek expresses the verse more directly
      as an admonition against self-inflicted sorrow.'
    reason: alternative_reading
lexical_decisions:
- source_word: ראה
  chosen: look on
  alternatives:
  - see
  - gaze at
  lexicon: HALOT
  rationale: The Hebrew imperative is best taken here as a prohibition in context,
    supported by the Greek parallel's explicit negative imperative. 'Look on' preserves
    the visual sense while fitting the idiom of longing frustrated by inability.
- source_word: בעיניו
  chosen: with your eyes
  alternatives:
  - with his eyes
  - before your eyes
  lexicon: HALOT
  rationale: The Hebrew form is literally 'with his eyes,' but the Greek parallel
    addresses the reader directly ('your soul... yourself'). Rendering it as second
    person aligns the clause with the admonitory context and likely sense of the Hebrew
    in this instructional setting.
- source_word: ומתאנח
  chosen: and groan
  alternatives:
  - and sigh
  - and lament
  lexicon: HALOT
  rationale: The verb denotes audible grief or pained sighing. 'Groan' better conveys
    deeper anguish than a mild 'sigh,' matching the simile that follows.
- source_word: כאשר
  chosen: like
  alternatives:
  - as
  - just as
  lexicon: HALOT
  rationale: Introduces a comparison; 'like' is the most natural modern English equivalent.
- source_word: סריס
  chosen: eunuch
  alternatives:
  - court official
  lexicon: HALOT
  rationale: In this context the comparison depends on sexual incapacity or exclusion,
    not bureaucratic office. 'Eunuch' preserves the force of the image.
- source_word: יחבק
  chosen: embracing
  alternatives:
  - hugging
  - holding close
  lexicon: HALOT
  rationale: The imperfect in the simile is naturally rendered as a participial English
    form after 'like.' 'Embracing' is dignified and preserves the physical closeness
    implied.
- source_word: נערה
  chosen: a young woman
  alternatives:
  - a girl
  - a maiden
  lexicon: HALOT
  rationale: '''Young woman'' is clear modern English and avoids the possible childish
    implication of ''girl'' while not sounding archaic like ''maiden''.'
- source_word: μὴ δῷς εἰς λύπην τὴν ψυχήν σου
  chosen: Do not look on with your eyes and groan
  alternatives:
  - Do not give your soul over to grief
  lexicon: BDAG
  rationale: The Greek parallel gives the verse's admonitory force explicitly. While
    the Hebrew wording differs, the Greek supports reading the Hebrew as a warning
    against frustrated longing and grief rather than as a bare description.
