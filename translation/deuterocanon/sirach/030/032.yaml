translation:
  text: On the day your life's days are completed, and at the time of your death,
    distribute your inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the days of your life are at their completion.' The Greek phrase is
      somewhat compact and can be rendered more literally as 'in the day of the completion
      of the days of your life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἡμέρᾳ
  chosen: On the day
  alternatives:
  - In the day
  - At the day
  lexicon: LSJ
  rationale: A temporal dative with ἐν is naturally rendered in English as 'on the
    day' in this context.
- source_word: συντελείας
  chosen: are completed
  alternatives:
  - consummation
  - end
  - completion
  lexicon: LSJ
  rationale: The noun denotes completion or bringing to an end. Rendering it verbally
    in English ('are completed') produces natural syntax while preserving the sense
    of life's days reaching their full end.
- source_word: ἡμερῶν ζωῆς σου
  chosen: your life's days
  alternatives:
  - the days of your life
  - your days of life
  lexicon: LSJ
  rationale: The genitive construction literally means 'days of your life.' 'Your
    life's days' is concise and keeps the Hebrew-like idiom visible, though still
    readable.
- source_word: καιρῷ τελευτῆς
  chosen: the time of your death
  alternatives:
  - the time of your end
  - the season of death
  lexicon: LSJ
  rationale: τελευτή commonly means end or death; here, with the surrounding context
    of inheritance disposition, 'death' is the clearest and most idiomatic sense.
- source_word: διάδος
  chosen: distribute
  alternatives:
  - give
  - apportion
  - hand over
  lexicon: LSJ
  rationale: The aorist imperative calls for an act of giving out or assigning. 'Distribute'
    fits the legal/property context of inheritance better than the more generic 'give'.
- source_word: κληρονομίαν
  chosen: your inheritance
  alternatives:
  - inheritance
  - estate
  - property
  lexicon: LSJ
  rationale: κληρονομία is the standard term for inheritance. Adding 'your' in English
    is warranted by context, since the imperative concerns the speaker's own estate
    to be assigned before death.
