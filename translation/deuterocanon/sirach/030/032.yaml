theological_decisions:
- issue: Ethical force of the instruction about inheritance
  chosen_reading: A practical wisdom instruction to assign one's estate at life's
    end, without importing later legal or doctrinal frameworks.
  alternative_readings:
  - A broader exhortation about generosity before death
  rationale: The verse is framed by death and inheritance language, so the primary
    sense is disposition of property at the end of life. The translation avoids expanding
    it into a generalized theological statement beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the text''s plain sense without importing doctrinal claims.'
