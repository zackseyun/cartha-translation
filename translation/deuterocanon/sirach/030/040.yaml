translation:
  text: If you mistreat him and send him away, he will run off; on what road will
    you look for him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''on what road will you look for him?'' The wording is concrete
      and rhetorical, emphasizing the difficulty of recovering someone once driven
      away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  chosen: If
  alternatives:
  - when
  lexicon: BDAG
  rationale: Introduces a conditional clause; 'if' best preserves the open conditional
    sense in natural English.
- source_word: κακώσῃς
  chosen: you mistreat
  alternatives:
  - you harm
  - you afflict
  - you do evil to
  lexicon: BDAG
  rationale: The verb denotes treating someone badly or causing harm. 'Mistreat' fits
    the interpersonal context and avoids sounding overly physical where the Greek
    can be broader.
- source_word: ἀπάρᾳς
  chosen: drive him away
  alternatives:
  - remove him
  - dismiss him
  - send him off
  lexicon: LSJ
  rationale: In context with the following 'he will run off,' the sense is causing
    separation or expulsion. 'Drive him away' captures the force better than the more
    neutral 'remove.'
- source_word: ἀποδρᾷ
  chosen: he will run off
  alternatives:
  - he escapes
  - he flees
  lexicon: BDAG
  rationale: The verb means to run away or escape. 'Run off' is idiomatic and matches
    the concrete image of flight after mistreatment.
- source_word: ἐν ποίᾳ ὁδῷ
  chosen: on what road
  alternatives:
  - by what way
  - where
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the concrete metaphor of route or
    path rather than flattening it to a vague 'where.'
- source_word: ζητήσεις
  chosen: will you look for
  alternatives:
  - will you seek
  - will you search for
  lexicon: BDAG
  rationale: Future indicative in a rhetorical question. 'Look for' is natural modern
    English while retaining the sense of seeking.
