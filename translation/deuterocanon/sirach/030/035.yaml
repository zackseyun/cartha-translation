translation:
  text: A yoke and a strap will bend the neck, and for a wicked servant there are
    racks and tortures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' / 'household servant' for Greek οἰκέτῃ; the main text uses
      'slave' because the context emphasizes coercive subjection.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζυγὸς
  chosen: yoke
  alternatives:
  - balance beam
  lexicon: LSJ
  rationale: In this context with neck-bending imagery, the concrete sense 'yoke'
    is plainly intended rather than a weighing instrument.
- source_word: ἱμὰς
  chosen: strap
  alternatives:
  - thong
  - lash
  lexicon: LSJ
  rationale: Refers to a leather strap or binding; 'strap' is clear modern English
    and fits the paired image with 'yoke' as instruments of restraint.
- source_word: κάμψουσιν
  chosen: will bend
  alternatives:
  - will bow
  - will force down
  lexicon: LSJ
  rationale: Future verb meaning to bend or make bend. 'Will bend' preserves the physical
    image without overinterpreting the degree of coercion.
- source_word: τράχηλον
  chosen: the neck
  alternatives:
  - a neck
  lexicon: LSJ
  rationale: Singular object in a proverbial statement; English idiom prefers 'the
    neck' for a generic physical effect.
- source_word: οἰκέτῃ
  chosen: slave
  alternatives:
  - servant
  - household servant
  lexicon: LSJ
  rationale: Although οἰκέτης can denote a household servant, the context is coercive
    punishment and bonded status is salient. Per doctrine on δουλος-family terms,
    'slave' better preserves the social reality than the softer 'servant'.
- source_word: κακούργῳ
  chosen: wicked
  alternatives:
  - criminal
  - evildoing
  lexicon: LSJ
  rationale: Adjectival modifier of οἰκέτῃ. 'Wicked' fits wisdom-style moral characterization;
    'criminal' would narrow the sense to legal status.
- source_word: στρέβλαι
  chosen: racks
  alternatives:
  - twisting devices
  - instruments of torture
  lexicon: LSJ
  rationale: The noun denotes instruments for twisting/torture. 'Racks' gives a concise
    concrete rendering while preserving the harshness of the image.
- source_word: βάσανοι
  chosen: tortures
  alternatives:
  - torments
  - punishments
  lexicon: LSJ
  rationale: The term commonly denotes severe testing by torture or torment. 'Tortures'
    best matches the intensity and pairs naturally with 'racks'.
