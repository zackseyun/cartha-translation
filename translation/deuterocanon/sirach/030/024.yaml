translation:
  text: A joyful heart is a man's life, and a person's gladness prolongs his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The final Hebrew words are difficult: the transmitted text reads literally
      something like ''has lengthened his nose/anger.'' The Greek parallel supports
      the sense ''lengthens his days'' or ''prolongs life,'' which is followed here.'
    reason: textual_variant
lexical_decisions:
- source_word: שמחת לב
  chosen: a joyful heart
  alternatives:
  - joy of heart
  - gladness of heart
  lexicon: HALOT
  rationale: The Hebrew construct literally means 'joy/gladness of heart.' 'A joyful
    heart' gives natural English while preserving the inward, affective sense rooted
    in לב ('heart').
- source_word: חיי איש
  chosen: is a man's life
  alternatives:
  - are a man's life
  - is the life of a man
  - is a person's life
  lexicon: HALOT
  rationale: The Hebrew reads literally 'the life/lives of a man.' Although the predicate
    is plural in form, the sense is singular/collective ('life'). 'A man's life' preserves
    the gender-accurate איש in line with project philosophy, while still functioning
    proverbially.
- source_word: וגיל אדם
  chosen: and a person's gladness
  alternatives:
  - and human rejoicing
  - and a man's gladness
  lexicon: HALOT
  rationale: גיל denotes rejoicing/gladness. אדם here is generic human reference rather
    than specifically male, so 'a person's' best reflects the representative sense
    while preserving the parallelism with איש in the first colon.
- source_word: האריך אפו
  chosen: lengthens his days
  alternatives:
  - prolongs his life
  - lengthens his life
  lexicon: HALOT
  rationale: The Hebrew consonantal text as given reads 'has lengthened his nose/anger,'
    which is difficult in context. In light of the Greek parallel ('jealousy and anger
    diminish days') and the proverb's sense, this is best understood as reflecting
    a Hebrew reading equivalent to 'his days' rather than the transmitted אפו. 'Lengthens
    his days' preserves the idiomatic biblical expression for prolonged life and fits
    the antithetical wisdom context.
