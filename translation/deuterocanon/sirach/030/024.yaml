theological_decisions:
- issue: Use of gendered anthropology in parallel terms איש / אדם
  chosen_reading: Retain 'man' for איש and render אדם generically as 'person'
  alternative_readings:
  - Render both generically as 'person'/'human being'
  - Render both as 'man'
  rationale: The verse uses two different Hebrew human terms. Preserving some distinction
    reflects the source more accurately. איש is naturally 'man,' while אדם often carries
    broader human reference. This follows the project's gender-accurate-over-gender-neutral
    principle without flattening the Hebrew variation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Handling the difficult final Hebrew wording
  chosen_reading: 'Translate according to the likely sense supported by the Greek
    parallel: gladness prolongs life/days'
  alternative_readings:
  - Translate woodenly as 'has lengthened his nose/anger'
  - Emend more explicitly in the main text to 'lengthens his life'
  rationale: The extant Hebrew wording is awkward and likely corrupt or graphically
    confused at the end of the line. Because the Greek parallel is supplied as an
    actual translation input and clearly points to the sense of shortened/lengthened
    days in this context, the main text adopts the probable intended meaning while
    documenting the issue in a footnote.
  doctrine_reference: PHILOSOPHY.md §What we are translating; transparency principle
