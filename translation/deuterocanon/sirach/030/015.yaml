translation:
  text: Life for the poor is better than refined gold, and a good spirit than pearls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Health and well-being are better than all gold, and a strong body
      than immeasurable wealth.'' The Hebrew and Greek differ substantially here,
      suggesting a variant textual tradition or corruption in the surviving Hebrew.'
    reason: textual_variant
lexical_decisions:
- source_word: חיי
  chosen: Life
  alternatives:
  - The life of
  - Living
  lexicon: HALOT
  rationale: Construct form from חַיִּים used idiomatically for 'life.' Rendered simply
    as 'Life' to keep the proverbial comparison concise in English.
- source_word: שר
  chosen: the poor
  alternatives:
  - a poor man
  - one in want
  lexicon: HALOT
  rationale: The Hebrew witness reads שר, which in context is best taken as referring
    to a poor/needy person; the Greek parallel instead has 'health/well-being,' suggesting
    some textual instability. Because the primary Hebrew witness is to be translated
    where it survives, the main text follows the Hebrew while preserving the Greek-based
    alternative in a footnote.
- source_word: איביתי
  chosen: is better than
  alternatives:
  - I desired more than
  - I preferred to
  lexicon: HALOT
  rationale: The form is textually difficult in the Hebrew manuscripts. In context,
    with the comparative structure confirmed by the Greek βελτίων...ἢ, the sense is
    comparative preference/superiority. 'Is better than' gives the proverb's plain
    force in readable English.
- source_word: מפז
  chosen: refined gold
  alternatives:
  - fine gold
  - pure gold
  lexicon: HALOT
  rationale: פז denotes high-quality refined gold. 'Refined gold' is natural modern
    English and preserves the sense of exceptional value.
- source_word: ורוח טובה
  chosen: and a good spirit
  alternatives:
  - and a cheerful spirit
  - and a sound spirit
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, disposition, or inner vitality. Given the Hebrew
    wording, 'good spirit' preserves the anthropological breadth without narrowing
    it merely to mood. The Greek parallel's 'a strong body' points to a different
    Vorlage or interpretive tradition, so the Hebrew is retained in the main text.
- source_word: מפנינים
  chosen: than pearls
  alternatives:
  - than corals
  - than precious stones
  lexicon: HALOT
  rationale: פנינים commonly denotes pearls or a similarly precious luxury item. 'Pearls'
    is the most familiar and likely sense in contemporary English.
