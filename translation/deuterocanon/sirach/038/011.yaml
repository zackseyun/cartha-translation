theological_decisions:
- issue: Cultic imagery in a wisdom context
  chosen_reading: Retain explicit sacrificial language ('memorial offering') rather
    than generalizing to prayer or piety.
  alternative_readings:
  - Render more generally as 'memorial' or 'tribute'
  rationale: The Hebrew and Greek both use offering terminology. The verse belongs
    to instructions involving prayer and physician, but the text itself still speaks
    in sacrificial categories; the translation should preserve that theological texture
    rather than spiritualize it.
