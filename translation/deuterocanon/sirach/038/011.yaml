translation:
  text: Present a memorial offering of soothing aroma, and enrich the arranged offering
    with the best of your wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Present a pleasing memorial offering, and enrich the
      arranged fat with the wings of your wealth.' The phrase 'with the wings of your
      wealth' is idiomatic and likely means giving from the choicest or fullest extent
      of one's means.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel reads, 'Give a fragrance and a memorial of fine flour,
      and make the offering rich, as one who does not exist'—a substantially different
      final phrase. The Hebrew witness is followed here, with the Greek used as a
      consistency check for the sacrificial sense.
    reason: alternative_reading
lexical_decisions:
- source_word: הגש
  chosen: Present
  alternatives:
  - Bring near
  - Offer
  lexicon: HALOT
  rationale: Imperative of נגש in sacrificial context naturally means to bring/present
    an offering. 'Present' is idiomatic English while retaining cultic force.
- source_word: ניחוח
  chosen: pleasing
  alternatives:
  - soothing
  - sweet-smelling
  lexicon: HALOT
  rationale: In offering language ניחוח evokes an acceptable/pleasing aroma. Because
    the Hebrew here lacks an explicit word for 'aroma' and the Greek has εὐωδία ('fragrance'),
    'pleasing' captures the acceptability implied by both witnesses without overloading
    the English with a supplied noun.
- source_word: אזכרה
  chosen: memorial offering
  alternatives:
  - memorial portion
  - remembrance offering
  lexicon: HALOT
  rationale: Cultic term for the memorial portion of an offering. 'Memorial offering'
    is clear modern English and aligns with the Greek μνημόσυνον while preserving
    sacrificial specificity.
- source_word: ודשן
  chosen: enrich
  alternatives:
  - make rich
  - fatten
  lexicon: HALOT
  rationale: The verb from דשן can mean make fat/rich. In context of sacrificial provision,
    'enrich' communicates generous abundance in readable English; 'fatten' would sound
    overly literal and awkward in English.
- source_word: ערוך
  chosen: arranged fat
  alternatives:
  - prepared offering
  - laid-out sacrifice
  lexicon: HALOT
  rationale: ערוך suggests something set in order/prepared, likely the sacrificial
    portions arranged on the altar. Retaining 'arranged' keeps the formal cultic nuance,
    while 'fat' reflects the probable sacrificial referent supported by the Greek
    προσφορά ('offering') as a broader parallel.
- source_word: בכנפי
  chosen: with the best of
  alternatives:
  - with the wings of
  - from the extremity of
  - according to the abundance of
  lexicon: HALOT
  rationale: Literally 'with the wings of,' but in Hebrew idiom כנף can denote edge/extremity.
    In this context with wealth, the sense is giving from the choicest/full extent
    of one's means. A more literal 'wings of your wealth' would be opaque in English.
- source_word: הוניך
  chosen: your wealth
  alternatives:
  - your substance
  - your possessions
  - your means
  lexicon: HALOT
  rationale: הון denotes wealth/substance. 'Your wealth' is straightforward and fits
    the exhortation to generous sacrificial giving.
