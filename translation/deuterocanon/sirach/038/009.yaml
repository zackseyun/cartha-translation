theological_decisions:
- issue: Divine title in the prayer clause
  chosen_reading: God
  alternative_readings:
  - the Lord
  rationale: The extant Hebrew witness reads אל ('God'), while the Greek parallel
    reads Κυρίῳ ('the Lord'). Following original-language primacy for this verse,
    the Hebrew governs the main text. The Greek alternative is preserved in a footnote
    because it is a meaningful source-level difference, though not a doctrinally weighty
    one.
