translation:
  text: My son, in your sickness do not be negligent; pray to God, for he will heal
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''pray to the Lord.'' The Hebrew witness here reads ''to
      God.'''
    reason: alternative_reading
  - marker: b
    text: Or 'do not neglect it' / 'do not overlook it'; the Greek parallel supports
      the sense of not disregarding one's illness.
    reason: lexical_alternative
lexical_decisions:
- source_word: בני
  chosen: My son
  alternatives:
  - Son
  - My child
  - Child
  lexicon: HALOT
  rationale: The Hebrew vocative בני is literally 'my son.' The Greek parallel τέκνον
    broadens to 'child,' but the primary Hebrew witness is extant and should govern.
    'My son' preserves the paternal instructional tone typical of Sirach and follows
    the gender-accurate policy.
- source_word: בחולי
  chosen: in your sickness
  alternatives:
  - when you are sick
  - in illness
  - in your disease
  lexicon: HALOT
  rationale: The preposition ב plus חולי yields a locative/temporal sense, 'in your
    sickness' or 'when sick.' 'In your sickness' stays closer to the Hebrew while
    remaining natural English. The Greek ἐν ἀρρωστήματί σου supports this sense.
- source_word: על תתעבר
  chosen: do not be negligent
  alternatives:
  - do not neglect yourself
  - do not disregard it
  - do not overlook it
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat idiomatic and the exact nuance of תתעבר
    could be taken in more than one way. The Greek parallel μὴ παράβλεπε ('do not
    neglect/overlook') strongly supports the sense of failing to attend to the condition.
    'Do not be negligent' captures the admonition without over-specifying an object
    absent in the Hebrew wording as transmitted.
- source_word: התפלל
  chosen: pray
  alternatives:
  - pray earnestly
  - make supplication
  lexicon: HALOT
  rationale: התפלל straightforwardly means 'pray.' No expansion is warranted. The
    Greek εὔξαι confirms the sense.
- source_word: אל אל
  chosen: to God
  alternatives:
  - to God Almighty
  - to the Mighty One
  lexicon: HALOT
  rationale: The Hebrew reads אל אל, literally 'to God.' Retaining the simple 'God'
    is the most natural English rendering. The Greek has Κυρίῳ ('to the Lord'), but
    since the Hebrew witness is primary and secure here, 'God' is preferred in the
    main text.
- source_word: כי הוא ירפא
  chosen: for he will heal you
  alternatives:
  - for he will heal
  - because he will heal you
  lexicon: HALOT
  rationale: 'The Hebrew clause states the reason for prayer: ''for he will heal.''
    The Greek explicitly includes the object σε (''you''), which is naturally implied
    by the Hebrew context and makes good English sense. Including ''you'' reflects
    the parallel source without distorting the Hebrew.'
