theological_decisions:
- issue: Meaning of חק in a death-and-mourning context
  chosen_reading: appointed lot/shared human destiny
  alternative_readings:
  - decree
  - statute
  rationale: The immediate context concerns mourning and mortality, not legal instruction.
    Rendering חק as 'lot' best fits the Hebrew line and is reinforced by the Greek
    parallel's focus on 'the end.'
  doctrine_reference: Translation philosophy §1, §5
- issue: How explicitly to unpack the elliptical final clause
  chosen_reading: retain the poetic ellipsis in English
  alternative_readings:
  - expand to 'yesterday for him, today for you'
  - interpret more fully as 'he died yesterday, and you today'
  rationale: The Hebrew is intentionally compressed. The translation preserves that
    compression without over-paraphrasing, while still being understandable in context.
  doctrine_reference: Translation philosophy §1, §6
