translation:
  text: 'Remember his decree, for it is your decree: his yesterday, and your today.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his decree' / 'his appointed portion.' Hebrew חק commonly means 'statute'
      or 'decree,' but here likely refers to the fate allotted to every person in
      death.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel reads differently: ''Do not give your heart over to
      grief; put it away, remembering the last things.'' This supports the verse''s
      focus on mortality, though the Hebrew wording here is distinct.'
    reason: alternative_reading
lexical_decisions:
- source_word: זכור
  chosen: Remember
  alternatives:
  - Keep in mind
  - Recall
  lexicon: HALOT
  rationale: Imperative of זכר, calling for active recollection. 'Remember' is the
    most direct and idiomatic rendering.
- source_word: חקו
  chosen: his lot
  alternatives:
  - his decree
  - his statute
  - his appointed portion
  lexicon: HALOT
  rationale: Though חק often means 'statute' or 'decree,' in this funerary context
    and with the following explanation 'for it is your lot,' the sense is an allotted
    fate or appointed portion. The Greek parallel's appeal to remembering 'the end'
    supports an existential sense rather than legal ordinance.
- source_word: כי הוא חקך
  chosen: for it is your lot
  alternatives:
  - for it is your decree
  - for it is your appointed portion
  lexicon: HALOT
  rationale: The clause universalizes the dead person's fate to the mourner. 'Lot'
    communicates shared human destiny in natural English better than the more wooden
    'decree,' while staying close to the Hebrew idea of an allotted portion.
- source_word: לו אתמול ולך היום
  chosen: his yesterday, and your today
  alternatives:
  - yesterday for him, and today for you
  - his was yesterday, yours is today
  lexicon: HALOT
  rationale: 'A terse antithetical line contrasting the deceased and the living. The
    chosen rendering preserves the compactness and poetic force of the Hebrew while
    making the implied meaning intelligible: death came to him yesterday, and comes
    to you today.'
