translation:
  text: For from grief disaster comes forth; so a sorrowful heart wastes away in sadness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''For from grief death comes forth, and grief of heart bends strength.''
      The Hebrew reads ''disaster'' rather than ''death,'' so the main text follows
      the Hebrew witness while preserving the Greek alternative here.'
    reason: alternative_reading
lexical_decisions:
- source_word: מדין
  chosen: from grief
  alternatives:
  - from sorrow
  - from contention
  lexicon: HALOT
  rationale: The Hebrew form is difficult in isolation, but the Greek parallel has
    ἀπὸ λύπης ('from grief/sorrow'), strongly supporting a sense of grief rather than
    legal contention or strife here. 'Grief' fits the mourning context of the surrounding
    verses.
- source_word: יוצא
  chosen: comes forth
  alternatives:
  - goes out
  - issues forth
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the image of something emerging as
    a consequence. 'Comes forth' is natural English while staying close to the Hebrew
    verbal sense.
- source_word: אסון
  chosen: disaster
  alternatives:
  - calamity
  - death
  lexicon: HALOT
  rationale: The Hebrew normally denotes serious calamity or disaster. The Greek reads
    θάνατος ('death'), which may reflect an interpretive rendering or variant, but
    the primary Hebrew witness supports 'disaster' in the main text. The Greek alternative
    is preserved in a footnote because it is significant.
- source_word: רע לבב
  chosen: a troubled heart
  alternatives:
  - an evil heart
  - a distressed heart
  - a sorrowful heart
  lexicon: HALOT
  rationale: Although literally 'evil/bad of heart,' in context of mourning and with
    the Greek λύπη καρδίας ('grief of heart'), the phrase denotes inner distress rather
    than moral evil. 'Troubled heart' communicates the idiomatic sense in readable
    English.
- source_word: יכלה
  chosen: wastes away
  alternatives:
  - consumes
  - fails
  - comes to an end
  lexicon: HALOT
  rationale: The verb conveys being spent, consumed, or brought to an end. 'Wastes
    away' fits the emotional and bodily weakening described in context and aligns
    well with the Greek notion of strength being bent/broken.
- source_word: עצבה
  chosen: in sorrow
  alternatives:
  - with pain
  - with grief
  - sadness
  lexicon: HALOT
  rationale: The noun denotes pain, grief, or sorrow. 'In sorrow' reads smoothly in
    English and keeps the emotional focus of the Hebrew line.
