translation:
  text: He will apply his heart to the completion of his work, and his wakefulness
    is to bring it to perfection.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'he will give his heart to the completion of works, and
      his wakefulness to adorn unto completion.' The wording is idiomatic and somewhat
      compressed; the translation brings out the sense of concentrated effort to finish
      craftsmanship well.
    reason: lexical_alternative
lexical_decisions:
- source_word: καρδίαν
  chosen: heart
  alternatives:
  - mind
  - attention
  lexicon: LSJ
  rationale: In Greek idiom, 'heart' can denote the inner faculty of thought and intention.
    Retaining 'heart' preserves the concrete anthropological language of the source
    while still making sense in English.
- source_word: δώσει εἰς
  chosen: will apply ... to
  alternatives:
  - will give to
  - will devote to
  lexicon: LSJ
  rationale: The literal 'will give his heart into/to' is idiomatic for directing
    oneself toward a task. 'Apply ... to' captures the sense naturally in English
    without excessive paraphrase.
- source_word: συντέλειαν
  chosen: completion
  alternatives:
  - end
  - consummation
  - perfection
  lexicon: LSJ
  rationale: Here the context is craftsmanship and finishing labor. 'Completion' best
    fits the practical sense of bringing work to its finished state. Because the noun
    recurs later in a related form, the second clause is rendered with 'perfection'
    to reflect the stylistic variation while preserving the semantic overlap.
- source_word: ἔργων
  chosen: his work
  alternatives:
  - works
  - labors
  - tasks
  lexicon: LSJ
  rationale: Although plural in Greek, English often uses the collective singular
    'work' for a craftsman's production. This reads naturally and suits the context
    of artisanal labor in the surrounding passage.
- source_word: ἀγρυπνία
  chosen: wakefulness
  alternatives:
  - vigilance
  - sleeplessness
  - watchfulness
  lexicon: LSJ
  rationale: The term denotes staying awake or being vigilant over one's task. 'Wakefulness'
    preserves the image of diligent, even late-night, attention to the craft.
- source_word: κοσμῆσαι
  chosen: to bring it to perfection
  alternatives:
  - to adorn
  - to arrange
  - to finish beautifully
  lexicon: LSJ
  rationale: The verb can mean adorn, arrange, or put in proper order. In this craft
    context, it likely refers to giving the finished work its proper form or polish.
    'Bring it to perfection' conveys ordered finishing rather than mere decoration.
- source_word: ἐπὶ συντελείας
  chosen: to perfection
  alternatives:
  - for completion
  - unto completion
  - at the finishing point
  lexicon: LSJ
  rationale: The phrase is somewhat compressed and overlaps semantically with the
    earlier συντέλειαν. Rendering it 'to perfection' reflects the goal-oriented sense
    and avoids awkward repetition, while still indicating final completion.
