theological_decisions:
- issue: Reconciling the difficult Hebrew wording with the Greek parallel in a verse
    with source-level mismatch
  chosen_reading: Translate primarily from the Hebrew, but let the Greek clarify that
    the first clause refers to supplication and the final clause to life-preserving
    healing.
  alternative_readings:
  - for his prayer will prosper, and remedies are for life
  - for his intercession may succeed, and healing serves survival
  rationale: The Hebrew witness is terse and somewhat opaque, especially פשרה. Since
    the project directs use of the Hebrew where it survives while also treating the
    Greek parallel as actual translation input, the main text preserves the Hebrew
    structure but adopts a gloss consistent with the Greek's explicit prayer language
    and healing-for-life sense.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives in Sirach,
    using Greek parallel as input; DOCTRINE.md: preserve ambiguity rather than over-resolve
    it.'
