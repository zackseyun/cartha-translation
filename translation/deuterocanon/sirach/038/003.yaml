lexical_decisions:
- source_word: דעת
  chosen: knowledge
  alternatives:
  - understanding
  - skill
  - expertise
  lexicon: HALOT
  rationale: The Hebrew noun commonly denotes knowledge or understanding. In this
    context, paired with 'physician,' it refers to the physician's learned competence.
    'Knowledge' best preserves the source's straightforward sense while remaining
    natural English. The Greek parallel ἐπιστήμη likewise supports 'knowledge' or
    'expertise.'
- source_word: רופא
  chosen: physician
  alternatives:
  - doctor
  - healer
  lexicon: HALOT
  rationale: The Hebrew denotes a healer/medical practitioner. 'Physician' is slightly
    more formal than 'doctor' and fits wisdom-literature register while remaining
    readable. The Greek ἰατροῦ confirms the medical sense.
- source_word: תרים קרנו
  chosen: will lift up his head
  alternatives:
  - will raise his horn
  - will exalt him
  - will elevate his status
  lexicon: HALOT
  rationale: The Hebrew literally says 'will raise his horn,' an idiom for honor or
    elevation. The Greek parallel reads 'will lift up his head,' which likely reflects
    the idiomatic sense rather than a strict literal retention. Rendering 'lift up
    his head' preserves the elevated-status imagery in idiomatic English without importing
    a more interpretive paraphrase like 'elevate his status.'
- source_word: נדיבים
  chosen: nobles
  alternatives:
  - princes
  - great men
  - magnates
  lexicon: HALOT
  rationale: The Hebrew refers to prominent, noble, or generous high-status persons.
    'Nobles' fits the social rank context and aligns well with the Greek μεγιστάνων
    ('great ones,' magnates).
- source_word: יתיצב
  chosen: he will stand
  alternatives:
  - he will take his stand
  - he will present himself
  - he will be admired
  lexicon: HALOT
  rationale: The Hebrew verb means to stand or station oneself. Although the Greek
    parallel has θαυμασθήσεται ('he will be admired'), the primary Hebrew witness
    is strong here, so the translation follows the Hebrew. 'He will stand' naturally
    conveys appearing in the presence of the powerful, likely with honor.
