translation:
  text: All these have trusted in their hands, and each becomes skillful in his own
    work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek wording is somewhat difficult: the clause could also be understood
      as ''have been entrusted into their hands'' or ''put their trust in their hands.''
      The main text keeps the likely sense that these craftsmen rely on manual skill.'
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες οὗτοι
  chosen: All these
  alternatives:
  - All of these
  - All these men
  lexicon: LSJ
  rationale: A straightforward demonstrative phrase referring back to the craftsmen
    just listed. 'Men' is possible from context, but the Greek phrase itself does
    not explicitly include ἄνδρες, so 'All these' stays closer to the wording while
    preserving the referent.
- source_word: εἰς χεῖρας αὐτῶν ἐνεπίστευσαν
  chosen: have trusted in their hands
  alternatives:
  - have been entrusted to their hands
  - put their trust in their hands
  lexicon: LSJ
  rationale: The Greek is somewhat unusual. ἐμπιστεύω can mean 'trust' or 'entrust,'
    and the phrase with εἰς χεῖρας naturally evokes 'into their hands.' However, the
    active plural form here most naturally yields 'have trusted in their hands' in
    the sense that they rely on manual skill. Because the source text is marked with
    source-validation mismatch and the construction is awkward, alternatives are preserved
    in a footnote.
- source_word: ἕκαστος
  chosen: each
  alternatives:
  - every one
  lexicon: LSJ
  rationale: Standard distributive sense; 'each' is concise and natural.
- source_word: ἐν τῷ ἔργῳ αὐτοῦ
  chosen: in his own work
  alternatives:
  - at his work
  - in his craft
  lexicon: LSJ
  rationale: ἔργον here refers to one's work or occupation. 'His own work' preserves
    both the possessive and the sphere in which the skill is exercised.
- source_word: σοφίζεται
  chosen: becomes skillful
  alternatives:
  - shows wisdom
  - is wise
  - practices skillfully
  lexicon: LSJ
  rationale: The verb can denote being wise or showing skill/wisdom. In this context
    of artisans and manual trades, the practical sense of becoming or being skillful
    best fits the immediate context.
