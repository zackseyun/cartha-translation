theological_decisions:
- issue: Rendering נפש in a death context
  chosen_reading: his life departs
  alternative_readings:
  - his soul departs
  rationale: The Hebrew נפש is semantically broad. To avoid overstating a specific
    doctrine of the soul while still reflecting the death idiom, the main text uses
    'life.' Because 'soul' is a traditional and lexically viable alternative, it is
    preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
- issue: Handling the Hebrew minor mismatch with Greek parallel
  chosen_reading: 'A memorial exhortation: ''Remember his resting place, and be comforted
    when his life departs.'''
  alternative_readings:
  - Remember that his judgment is like yours; yesterday for me and today for you.
  rationale: The primary witness is the surviving Hebrew, but it carries a minor mismatch
    and differs substantially from the Greek parallel, which appears to reflect a
    different textual form. Following source primacy for surviving Hebrew Sirach,
    the main text translates the Hebrew while preserving the Greek-based alternative
    as a footnote due to the significant divergence.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input while preserving source uncertainty honestly.'
