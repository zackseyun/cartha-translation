translation:
  text: Remember his resting place, and be comforted when his life departs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when his soul departs.' Hebrew נפש can mean life, soul, self, or life-breath.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel reads substantially differently: ''Remember that his
      judgment is like yours: mine yesterday, and yours today.'' This likely reflects
      a different textual form than the surviving Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: מושבת
  chosen: resting place
  alternatives:
  - dwelling place
  - seat
  - abode
  lexicon: HALOT
  rationale: From the Hebrew witness, the noun from ישב can denote a place of sitting/dwelling.
    In this funerary context, with מתו following, it most naturally points to the
    dead person's place of rest or burial. 'Resting place' gives the memorial/funerary
    sense in idiomatic English without over-specifying 'grave,' which the Hebrew does
    not explicitly say.
- source_word: מתו
  chosen: his
  alternatives:
  - the dead man’s
  - his dead one
  lexicon: HALOT
  rationale: Literally 'his dead one/dead man.' English normally expresses this possessive
    relation more naturally by folding it into 'his resting place.' This preserves
    the sense while avoiding awkward phrasing.
- source_word: שבת
  chosen: remember
  alternatives:
  - think on
  - keep in mind
  lexicon: HALOT
  rationale: The Hebrew form is difficult in isolation and the source has a minor
    mismatch note, but in context and in light of the Greek parallel μνήσθητι, the
    imperative sense 'remember' is strongly supported. This is the clearest rendering
    of the exhortation.
- source_word: זכרו
  chosen: remember
  alternatives:
  - his remembrance
  - remember him
  lexicon: HALOT
  rationale: The transmitted Hebrew sequence is somewhat compressed or mismatched,
    but זכר clearly carries the remembrance idea. The Greek parallel confirms an imperative
    of remembering. The English consolidates the Hebrew's memorial language into a
    single clear command.
- source_word: והנחם
  chosen: be comforted
  alternatives:
  - take comfort
  - console yourself
  lexicon: HALOT
  rationale: Niphal/hithpael-like consolation language is best rendered as an exhortation
    to receive or take comfort. 'Be comforted' is concise and preserves the passive/reflexive
    nuance better than a purely active 'comfort yourself.'
- source_word: עם
  chosen: when
  alternatives:
  - with
  - at the time of
  lexicon: HALOT
  rationale: 'Here עם functions temporally in context: consolation is urged at the
    time of the person''s death. English ''when'' communicates the temporal force
    naturally.'
- source_word: צאת
  chosen: departs
  alternatives:
  - goes out
  - goes forth
  - leaves
  lexicon: HALOT
  rationale: The infinitive 'going out' is a common idiom for departure. With נפשו,
    it refers to the departure of life/soul at death. 'Departs' is natural English
    and preserves the idiomatic sense.
- source_word: נפשו
  chosen: his life
  alternatives:
  - his soul
  - his breath
  lexicon: HALOT
  rationale: נפש can mean soul, life, self, or life-breath. In a death context, 'his
    life departs' is idiomatic modern English and avoids importing a more technical
    anthropology than the verse itself requires. The alternative 'his soul departs'
    is worth preserving in a footnote because it is also lexically possible.
