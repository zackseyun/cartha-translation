translation:
  text: but they will uphold the fabric of the age, and their prayer is in the work
    of their craft.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will establish the creation/order of the age.' The Greek κτίσμα
      αἰῶνος is compact and may refer either to the enduring fabric of society or
      more broadly to the world's established order.
    reason: lexical_alternative
  - marker: b
    text: Or 'their supplication is in the labor of their craft,' expressing that
      their prayer is bound up with their skilled work.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - yet
  - rather
  lexicon: LSJ
  rationale: Marks contrast with the preceding description of artisans not sitting
    in the council or public office; 'but' is the most natural concise adversative
    in English.
- source_word: κτίσμα
  chosen: fabric
  alternatives:
  - creation
  - thing made
  - structure
  - order
  lexicon: LSJ
  rationale: Literally 'something made/created.' In this context it refers to the
    constructed social/world order sustained by craftsmen. 'Creation' could sound
    too cosmological or theological in English; 'fabric' idiomatically conveys the
    made structure of enduring human life while remaining anchored to the idea of
    something fashioned.
- source_word: αἰῶνος
  chosen: of the age
  alternatives:
  - of the world
  - everlasting
  - age-long
  lexicon: LSJ
  rationale: Genitive qualifying κτίσμα. 'Of the age' preserves the Greek term αἰών
    without overinterpreting it as either strictly 'world' or 'eternity.' It suggests
    the enduring order of human society across time.
- source_word: στηρίσουσιν
  chosen: will uphold
  alternatives:
  - will establish
  - will support
  - will make firm
  lexicon: LSJ
  rationale: Future of στηρίζω, 'to make firm, support, establish.' In context the
    artisans sustain and stabilize the social order through their labor. 'Will uphold'
    captures ongoing support better than the more one-time sense of 'establish.'
- source_word: δέησις
  chosen: prayer
  alternatives:
  - supplication
  - petition
  lexicon: LSJ
  rationale: The noun commonly denotes prayerful petition. 'Prayer' is the clearest
    modern English rendering; 'supplication' is more formal but less readable.
- source_word: ἐν ἐργασίᾳ
  chosen: is in the work
  alternatives:
  - is in labor
  - is in their occupation
  - consists in work
  lexicon: LSJ
  rationale: The phrase locates their prayer within their labor. 'Is in the work'
    preserves the prepositional force and the connection between devotion and craftsmanship.
- source_word: τέχνης
  chosen: of their craft
  alternatives:
  - of skill
  - of art
  - of craftsmanship
  lexicon: LSJ
  rationale: τέχνη denotes skilled craft or art. 'Of their craft' is idiomatic and
    fits the artisan context established in the surrounding verses. The possessive
    is supplied naturally in English from αὐτῶν governing the clause.
