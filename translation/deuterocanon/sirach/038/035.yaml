theological_decisions:
- issue: Meaning of the clause 'their prayer is in the work of craft'
  chosen_reading: The line is rendered as describing artisans whose devotion is expressed
    through their skilled labor, not as denying that they pray verbally.
  alternative_readings:
  - their concern/request is for success in their work
  - their prayer accompanies their labor
  rationale: The Greek δέησις normally means prayer or petition, and ἐν ἐργασίᾳ τέχνης
    naturally links that prayer to the sphere of their work. The translation preserves
    the metaphorical/theological tension that labor itself can be the setting or expression
    of prayer.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
