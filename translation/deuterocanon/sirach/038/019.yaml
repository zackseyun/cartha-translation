theological_decisions:
- issue: Referent of 'the end' (אחרית)
  chosen_reading: general remembrance of the final end, especially mortality, without
    specifying only the deceased or only the mourner
  alternative_readings:
  - remember his end
  - remember your own end
  rationale: The Hebrew leaves the object implicit. Wisdom literature often uses אחרית
    broadly for final outcome or mortality. The translation preserves that ambiguity
    rather than resolving it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (preserve theological
    tension rather than resolve it)
