translation:
  text: Do not give your heart to him any longer; let his memory go, and remember
    the end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'do not place your heart toward him any longer,' an idiom meaning
      not to remain emotionally fixed on the dead.
    reason: lexical_alternative
  - marker: b
    text: Or 'release his memory' / 'dismiss his remembrance.' The Hebrew verb in
      this phrase is difficult, and the Greek parallel supports the sense of moving
      beyond grief.
    reason: alternative_reading
  - marker: c
    text: Or 'remember his end' or 'remember your own end.' The Hebrew simply says
      'remember the end,' which may intentionally remain broad.
    reason: alternative_reading
lexical_decisions:
- source_word: אל תשים אליו לב
  chosen: Do not give your heart to him
  alternatives:
  - Do not set your heart on him
  - Do not pay attention to him
  - Do not take him to heart
  lexicon: HALOT
  rationale: The Hebrew idiom literally involves placing the heart toward someone.
    In context of mourning, it means ceasing inward fixation or emotional attachment
    to the deceased. 'Give your heart to him' preserves the heart-language of the
    Hebrew better than the flatter 'pay attention,' while still reading naturally
    in English.
- source_word: עוד
  chosen: any longer
  alternatives:
  - again
  - still
  lexicon: HALOT
  rationale: The adverb marks continuation from prior mourning behavior; 'any longer'
    fits the exhortation to stop prolonged grief.
- source_word: פרע זכרו
  chosen: let his memory go
  alternatives:
  - dismiss his memory
  - release his remembrance
  - forget him
  lexicon: HALOT
  rationale: The verb is difficult and the source has minor mismatch status; in context
    it calls for loosening one's hold on the dead person's memory rather than absolute
    erasure. The Greek parallel points toward moving past grief, supporting a rendering
    that conveys release rather than harsh command to forget.
- source_word: וזכור אחרית
  chosen: and remember the end
  alternatives:
  - and remember the outcome
  - and remember your own end
  - and remember the final end
  lexicon: HALOT
  rationale: אחרית can mean end, latter end, or final outcome. The concise 'the end'
    preserves the Hebrew's breadth and allows the wisdom context to evoke mortality
    and life's final destiny without over-specifying whose end is meant.
