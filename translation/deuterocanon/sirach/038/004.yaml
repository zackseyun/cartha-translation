theological_decisions:
- issue: Divine subject in the Hebrew witness ('אל') versus Greek parallel ('Κύριος')
  chosen_reading: The Lord created medicines from the earth
  alternative_readings:
  - God created medicines from the earth
  rationale: 'The Hebrew points to God as subject, while the Greek explicitly has
    ''Lord.'' Because the parallel source is to be used as actual translation input
    and the project''s default for κύριος is ''Lord,'' the main text uses ''The Lord.''
    The theological point is not altered: medicines are presented as part of God''s
    created provision.'
