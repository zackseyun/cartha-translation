translation:
  text: The Lord created medicines from the earth, and an intelligent man will not
    despise them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has 'God' (אל) as the subject; the Greek parallel reads 'Lord' (Κύριος).
    reason: alternative_reading
  - marker: b
    text: The Hebrew wording behind 'created' is difficult in this manuscript tradition;
      the Greek parallel supports the sense that the Lord is the one who brings medicines
      into being from the earth.
    reason: textual_variant
lexical_decisions:
- source_word: אל
  chosen: The Lord
  alternatives:
  - God
  lexicon: HALOT
  rationale: In Ben Sira this form functions as the divine title/name 'God'; the Greek
    parallel explicitly reads Κύριος ('Lord'). Given the parallel and the project's
    default rendering for divine titles, 'The Lord' best reflects the intended referent
    in idiomatic English.
- source_word: מארץ
  chosen: from the earth
  alternatives:
  - from the land
  - out of the ground
  lexicon: HALOT
  rationale: The preposition plus אֶרֶץ naturally yields 'from the earth/land.' Here
    the sense is the material source of remedies in creation, so 'from the earth'
    fits both Hebrew and the Greek ἐκ γῆς.
- source_word: מצוציא
  chosen: created
  alternatives:
  - brings forth
  - caused to come out
  - produced
  lexicon: HALOT
  rationale: The Hebrew form appears textually awkward, but in context with תרופות
    and the Greek ἔκτισεν, the sense is that God is the source/originator of medicines.
    'Created' follows the secure Greek parallel and expresses divine origination clearly.
- source_word: תרופות
  chosen: medicines
  alternatives:
  - remedies
  - healing drugs
  lexicon: HALOT
  rationale: The noun denotes medicinal remedies. 'Medicines' is clear modern English
    and matches the verse's commendation of medical means; 'remedies' is possible
    but slightly less concrete.
- source_word: גבר מבין
  chosen: an intelligent man
  alternatives:
  - a discerning man
  - a wise man
  lexicon: HALOT
  rationale: גבר is specifically 'man,' and מבין denotes understanding/discernment.
    Per project policy, the masculine representative form is preserved rather than
    neutralized. 'Intelligent man' communicates practical understanding in this context.
- source_word: אל ימאס בם
  chosen: will not despise them
  alternatives:
  - must not reject them
  - will not scorn them
  lexicon: HALOT
  rationale: 'מאס means reject/despise. The imperfect here is naturally rendered as
    a general truth: a discerning person does not treat medicines with contempt. ''Despise''
    preserves the evaluative force and aligns with Greek οὐ προσοχθιεῖ αὐτοῖς.'
