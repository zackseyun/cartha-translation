translation:
  text: By them the physician relieves pain, and likewise the perfumer prepares a
    mixture.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'With them the physician relieves pain'; the Hebrew instrumental phrase
      and the Greek parallel both support the sense that the remedies are the means
      by which pain is alleviated.
    reason: lexical_alternative
  - marker: b
    text: '''Perfumer'' renders Hebrew רוקח, a mixer of aromatic or medicinal compounds;
      ''apothecary'' is a traditional alternative.'
    reason: cultural_note
lexical_decisions:
- source_word: בהם
  chosen: By them
  alternatives:
  - With them
  - Through them
  lexicon: HALOT
  rationale: The preposition ב with pronominal suffix refers back to the medicinal
    substances of the previous verse. 'By them' preserves instrumental force in concise
    English; 'with them' was possible, but 'by them' better matches the Hebrew's means/instrument
    sense while also fitting the Greek parallel ἐν αὐτοῖς.
- source_word: רופא
  chosen: the physician
  alternatives:
  - the doctor
  - a physician
  lexicon: HALOT
  rationale: '''Physician'' is the natural formal-modern rendering for רופא in wisdom
    literature. The article is retained as generic/class reference: the physician
    as a type.'
- source_word: יניח
  chosen: eases
  alternatives:
  - relieves
  - allays
  - removes
  lexicon: HALOT
  rationale: The Hebrew verb from נוח/הניח literally suggests causing to rest, setting
    down, or easing. In context with מכאוב ('pain'), 'eases' best captures the idiomatic
    sense. The Greek parallel has ἐθεράπευσεν καὶ ἦρεν τὸν πόνον αὐτοῦ ('he healed
    and took away his pain'), which supports a pain-relief sense. 'Removes' would
    overstate the Hebrew if the sense is mitigation rather than total elimination.
- source_word: מכאוב
  chosen: pain
  alternatives:
  - suffering
  - affliction
  - ache
  lexicon: HALOT
  rationale: '''Pain'' is the most direct and contextually appropriate rendering for
    physical suffering in a medical context. It also aligns with the Greek πόνος.'
- source_word: וכן
  chosen: and so
  alternatives:
  - likewise
  - so also
  - thus
  lexicon: HALOT
  rationale: וכן links the second clause by comparison or continuation. 'And so' gives
    readable modern English while preserving the parallelism between physician and
    perfumer.
- source_word: רוקח
  chosen: the perfumer
  alternatives:
  - the apothecary
  - the compounder
  - the pharmacist
  lexicon: HALOT
  rationale: רוקח denotes one who mixes aromatic or medicinal compounds. 'Perfumer'
    is the most straightforward lexical equivalent in biblical usage, though here
    the context overlaps with medicinal compounding. 'Apothecary' is traditional but
    archaic; 'pharmacist' is too modern and specialized.
- source_word: עושה מרקחת
  chosen: prepares a mixture
  alternatives:
  - makes an ointment
  - compounds a remedy
  - prepares a compound
  lexicon: HALOT
  rationale: The phrase literally means 'makes a compound/mixture.' Because the object
    is not explicitly limited to perfume and the context is medicinal substances,
    'prepares a mixture' preserves breadth. 'Ointment' is too specific; 'remedy' imports
    therapeutic intent more strongly than the Hebrew alone requires.
