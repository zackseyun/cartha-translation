theological_decisions:
- issue: How to express the theological basis for honoring the physician
  chosen_reading: for God has also allotted him a share
  alternative_readings:
  - for the Lord also created him
  - for he too has a portion from God
  rationale: The Hebrew witness is primary for Sirach where extant, and here it speaks
    in terms of חלק ('share/portion'), while the Greek parallel speaks of divine creation.
    Rather than flattening one into the other, the main text follows the Hebrew and
    preserves the Greek-supported alternative in a footnote. This maintains transparency
    about the two witnesses and preserves the text's theological point that the physician's
    role is divinely sanctioned.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
