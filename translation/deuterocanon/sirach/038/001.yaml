translation:
  text: Honor the physician according to your need of him, for God has also given
    him a portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following the Greek: ''Honor the physician for his services, for the
      Lord also created him.'' The Hebrew reads more literally, ''for with him also
      is a share from God.'''
    reason: alternative_reading
lexical_decisions:
- source_word: רעי
  chosen: Honor
  alternatives:
  - Befriend
  - Esteem
  - Treat kindly
  lexicon: HALOT
  rationale: The Hebrew imperative likely carries the sense of showing regard or honoring.
    The Greek parallel has Τίμα, 'honor,' which strongly supports rendering the command
    as 'Honor' rather than the more relational 'befriend.' This best fits both witnesses
    while remaining natural English.
- source_word: רופא
  chosen: the physician
  alternatives:
  - the doctor
  - the healer
  lexicon: HALOT
  rationale: The noun denotes a healer/physician. 'Physician' preserves the dignified
    and somewhat formal register of wisdom literature better than 'doctor,' while
    remaining clear to modern readers.
- source_word: לפני צרכו
  chosen: for his needful service
  alternatives:
  - according to your need of him
  - when you need him
  - for the need
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat compressed and can be read in relation
    to need/necessity. The Greek parallel expands this as πρὸς τὰς χρείας τιμαῖς αὐτοῦ,
    indicating honor in view of the physician's services/fees for necessities. 'For
    his needful service' captures the practical context without importing the Greek
    word for fees directly into the main text.
- source_word: כי עם אותו
  chosen: for God has also allotted him
  alternatives:
  - for with him also
  - for him too
  - for with him as well
  lexicon: HALOT
  rationale: 'The Hebrew wording is terse and somewhat idiomatic. Read with the following
    phrase חלק אל, it conveys that the physician too has a divinely assigned portion
    or place. The Greek parallel, ''for the Lord created him also,'' points in the
    same theological direction: the physician''s role is divinely grounded. ''God
    has also allotted him'' stays closer to the Hebrew noun חלק while expressing the
    sense clearly.'
- source_word: חלק אל
  chosen: a share
  alternatives:
  - a portion from God
  - a divinely given portion
  - God's portion
  lexicon: HALOT
  rationale: חלק commonly means 'share, portion.' Because אל here is best taken as
    'God' rather than as a preposition, the phrase indicates a share or portion assigned
    by God. 'A share' is concise in the main text; the fuller alternative is preserved
    in a footnote.
