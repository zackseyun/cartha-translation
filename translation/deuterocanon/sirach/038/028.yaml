translation:
  text: So the smith sits near the anvil and studies the raw iron; the vapor of the
    fire wastes his flesh, and he struggles with the heat of the furnace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the unworked iron' for 'the raw iron.' The Greek adjective can denote
      what is idle or not yet worked.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the vapor of the fire melts his flesh.' The English main text
      uses 'wastes' to express the bodily toll idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: χαλκεύς
  chosen: smith
  alternatives:
  - metalworker
  - bronzesmith
  - blacksmith
  lexicon: LSJ
  rationale: A general term for a worker in metal. Because the verse immediately specifies
    σιδήρῳ ('iron'), 'smith' is the most natural concise English rendering; 'bronzesmith'
    would be too narrow, while 'blacksmith' may over-specify beyond the Greek.
- source_word: ἐγγὺς ἄκμονος
  chosen: near the anvil
  alternatives:
  - beside the anvil
  lexicon: LSJ
  rationale: A straightforward spatial phrase. 'Anvil' is the standard rendering of
    ἄκμων in this craft context.
- source_word: καταμανθάνων
  chosen: studies
  alternatives:
  - carefully observes
  - learns by practice
  - attends to
  lexicon: LSJ
  rationale: The participle conveys close, attentive observation. In context of metalworking,
    'studies' communicates focused attention to the material without sounding overly
    academic.
- source_word: ἀργῷ σιδήρῳ
  chosen: the raw iron
  alternatives:
  - the unworked iron
  - the rough iron
  lexicon: LSJ
  rationale: ἀργός here most naturally means idle/unworked rather than shining. In
    a smithing context it refers to iron in its unworked state. 'Raw iron' is idiomatic
    modern English and fits the craft image.
- source_word: ἀτμὶς πυρός
  chosen: the vapor of the fire
  alternatives:
  - the heat of the fire
  - the smoke of the fire
  lexicon: LSJ
  rationale: ἀτμίς denotes vapor/steam/exhalation. Since the Greek distinguishes this
    from the later θέρμη ('heat'), it is better not to collapse both into 'heat.'
    'Vapor' preserves the imagery of fiery exhalation, even if it is somewhat figurative
    in English.
- source_word: τήξει
  chosen: wastes
  alternatives:
  - melts
  - consumes
  - wears away
  lexicon: LSJ
  rationale: Literally 'will melt,' but with 'flesh' as object the sense is that the
    fire's vapor wears down or consumes his body. 'Wastes' preserves the physical
    toll without implying literal liquefaction.
- source_word: σάρκας αὐτοῦ
  chosen: his flesh
  alternatives:
  - his body
  lexicon: LSJ
  rationale: The Greek is literally 'his flesh.' Because the context is bodily suffering
    from labor, the literal rendering works naturally and preserves the vividness
    of the source.
- source_word: ἐν θέρμῃ καμίνου
  chosen: with the heat of the furnace
  alternatives:
  - in the furnace's heat
  - by the heat of the oven
  lexicon: LSJ
  rationale: The phrase denotes the oppressive heat associated with the furnace. 'Furnace'
    fits metalworking better than the broader 'oven.' 'With' idiomatically suits the
    following verb in English.
- source_word: διαμαχήσεται
  chosen: he struggles
  alternatives:
  - he contends
  - he fights
  lexicon: LSJ
  rationale: The verb suggests strenuous contention. In English, 'struggles' conveys
    ongoing exertion against the furnace's heat without sounding too militarized.
