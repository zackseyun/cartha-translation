translation:
  text: Was not water made sweet by wood, in order to make his power known to every
    person?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its power,' taking the pronoun to refer to the wood; the Hebrew and
      Greek allow this, though the context favors God's power displayed through the
      means used.
    reason: alternative_reading
  - marker: b
    text: Likely alludes to the episode in which bitter water was made sweet by means
      of wood (Exod 15:25).
    reason: cross_reference
  - marker: c
    text: Hebrew 'every man' uses a masculine singular term for humanity in general.
    reason: cultural_note
lexical_decisions:
- source_word: הלא
  chosen: Was not
  alternatives:
  - Did not
  - Is it not that
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. The Greek οὐκ supports
    the interrogative-retorical force.
- source_word: בעץ
  chosen: by wood
  alternatives:
  - with wood
  - through a tree
  - by a piece of wood
  lexicon: HALOT
  rationale: The preposition ב plus עץ indicates instrument or means. 'Wood' is broad
    and matches the allusive quality of the Hebrew and Greek ξύλου, likely recalling
    the episode of bitter water made sweet without over-specifying 'tree' in the main
    text.
- source_word: המתיקו
  chosen: made sweet
  alternatives:
  - sweetened
  - made fresh
  lexicon: HALOT
  rationale: The verb denotes making something sweet. 'Made sweet' is slightly more
    formal and preserves the concrete transformation of the water; 'made fresh' would
    over-interpret.
- source_word: מים
  chosen: water
  alternatives:
  - the water
  - waters
  lexicon: HALOT
  rationale: Although morphologically plural in Hebrew, English idiom prefers singular
    mass noun here. The Greek ὕδωρ confirms singular sense.
- source_word: בעבור
  chosen: so that
  alternatives:
  - for the sake of
  - in order to
  lexicon: HALOT
  rationale: Marks purpose. 'So that' is natural modern English and preserves the
    purposive relation.
- source_word: להודיע
  chosen: might be made known
  alternatives:
  - to make known
  - to show
  lexicon: HALOT
  rationale: An infinitive of causing knowledge; the passive English construction
    fits the clause smoothly after 'so that' and preserves the focus on revelation
    rather than the unnamed agent.
- source_word: כל אנוש
  chosen: every man
  alternatives:
  - every human
  - all humankind
  - every person
  lexicon: HALOT
  rationale: אנוש here means human being in general. Per project guidance, a masculine
    representative form may be retained where generic force is intended. 'Every man'
    also reflects the distributive כל. Inclusive alternatives are possible, but this
    rendering stays closer to the source form.
- source_word: כחו
  chosen: his power
  alternatives:
  - its power
  - his strength
  lexicon: HALOT
  rationale: The suffix is masculine singular. In context, the referent is best taken
    as God, whose power was displayed in the miracle; the Greek τὴν ἰσχὺν αὐτοῦ supports
    a personal masculine referent. 'Power' is more idiomatic here than 'strength'
    for divine might.
