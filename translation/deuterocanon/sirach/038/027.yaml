translation:
  text: So too every craftsman and planner, who labors by night as by day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew is concise: ''every craftsman and planner/designer.'' The Greek
      parallel expands the picture with terms for a builder/master craftsman and continues
      with engravers and their sleepless effort to complete the work. The main text
      follows the Hebrew while allowing the Greek to clarify the sense of skilled
      design.'
    reason: alternative_reading
lexical_decisions:
- source_word: אף
  chosen: So too
  alternatives:
  - also
  - likewise
  - even
  lexicon: HALOT
  rationale: Here אף introduces a comparison continuing the description of laborers
    in context. 'So too' captures the connective force better than a bare 'also' in
    English.
- source_word: עשה
  chosen: craftsman
  alternatives:
  - maker
  - artisan
  - worker
  lexicon: HALOT
  rationale: In construct with חרש and in light of the Greek τέκτων, the sense is
    a manual maker/artisan rather than the generic verb 'to do/make.' 'Craftsman'
    is natural and suitably concrete.
- source_word: חרש
  chosen: craftsman
  alternatives:
  - artisan
  - smith
  - carpenter
  lexicon: HALOT
  rationale: חרש can denote an artisan of skilled manual trade. Because the Hebrew
    phrase is compressed and the Greek expands to τέκτων καὶ ἀρχιτέκτων, a broader
    rendering is preferable to a narrow trade such as 'smith' or 'carpenter.' The
    English combines the artisan sense with the preceding עשה.
- source_word: וחשב
  chosen: and designer
  alternatives:
  - and planner
  - and engraver
  - and skilled worker
  lexicon: HALOT
  rationale: חשב can denote devising, planning, or skilled artistic work. The Greek
    parallel's ἀρχιτέκτων points toward a designing/planning role. 'Designer' preserves
    the artistic-technical nuance without overcommitting to a modern profession.
- source_word: אשר
  chosen: who
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: Relative pronoun introducing the clause describing the worker.
- source_word: לילה כיום
  chosen: by night as by day
  alternatives:
  - night like day
  - through the night as in the day
  lexicon: HALOT
  rationale: This idiom expresses tireless labor extending into the night. 'By night
    as by day' is idiomatic English and preserves the comparison.
- source_word: יגיע
  chosen: labors
  alternatives:
  - toils
  - wearies himself
  - works hard
  lexicon: HALOT
  rationale: The verb denotes strenuous labor or toil. 'Labors' is clear modern English
    and retains the sense of exertion.
