translation:
  text: Whoever sins before his Maker will be defiant before a physician.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''will fall into the hands of a physician.'' The Hebrew reads ''will
      be defiant before a physician.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אשר
  chosen: Whoever
  alternatives:
  - He who
  - The one who
  lexicon: HALOT
  rationale: Introduces a generalizing relative clause. 'Whoever' gives natural modern
    English while preserving the proverb-like universal force.
- source_word: חואט
  chosen: sins
  alternatives:
  - misses
  - does wrong
  lexicon: HALOT
  rationale: From חטא, the standard Hebrew verb for sinning. 'Sins' preserves the
    moral/religious force better than a flatter expression like 'does wrong.'
- source_word: לפני
  chosen: before
  alternatives:
  - in the presence of
  - against
  lexicon: HALOT
  rationale: The Hebrew preposition most naturally means 'before/in the presence of'
    here. The Greek parallel has ἔναντι, confirming this sense. 'Against' would over-interpret
    the relation.
- source_word: עושהו
  chosen: his Maker
  alternatives:
  - the one who made him
  - his creator
  lexicon: HALOT
  rationale: From עשה with pronominal suffix, literally 'his maker/the one who made
    him.' 'Maker' is concise, elevated without being archaic, and fits wisdom-style
    diction.
- source_word: יתנכר
  chosen: will be defiant
  alternatives:
  - will act like a stranger
  - will show himself hostile
  - will be alienated
  lexicon: HALOT
  rationale: The hitpael of נכר can mean to disguise oneself, estrange oneself, or
    behave as a stranger. In context with 'before a physician,' the sense is not mere
    foreignness but resistant, uncooperative self-distancing. 'Will be defiant' captures
    the practical force of refusing proper help. The Greek parallel 'fall into the
    hands of a physician' reflects a different interpretive tradition, but the Hebrew
    witness here supports a behavioral description rather than a passive fate.
- source_word: רופא
  chosen: a physician
  alternatives:
  - a doctor
  - the physician
  - a healer
  lexicon: HALOT
  rationale: '''Physician'' best matches the wisdom-literature register and the medical
    context of the surrounding passage. The anarthrous Hebrew is well represented
    by English ''a physician.'''
