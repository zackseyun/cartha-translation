translation:
  text: The sound of the hammer keeps striking his ear, and his eyes are fixed on
    the pattern of the vessel;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The sound of the hammer rings in his ear.' The Greek verb is difficult
      in this context and may express the repeated impact of the hammer's noise on
      the craftsman's hearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνή
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: LSJ
  rationale: In context with σφύρης ('hammer'), the noun refers to the audible sound
    produced by hammering, not a spoken 'voice.' 'Sound' is natural English and preserves
    the sensory focus.
- source_word: σφύρης
  chosen: hammer
  alternatives:
  - mallet
  lexicon: LSJ
  rationale: The genitive identifies the source of the sound. 'Hammer' is the straightforward
    tool term in this artisan context.
- source_word: καινεῖ
  chosen: keeps striking
  alternatives:
  - moves
  - stirs
  - beats upon
  - rings in
  lexicon: LSJ
  rationale: 'The verb literally can mean ''make new'' in other contexts, but here
    the sense is shaped by the object τὸ οὖς and the workshop setting: the hammer''s
    sound repeatedly affects the craftsman''s ear. ''Keeps striking'' captures the
    ongoing, percussive impact better than a wooden literalism like ''renews his ear,''
    which would be obscure in English.'
- source_word: τὸ οὖς αὐτοῦ
  chosen: his ear
  alternatives:
  - his hearing
  lexicon: LSJ
  rationale: Singular 'ear' follows the Greek and idiomatically expresses the craftsman's
    constant exposure to the hammer's sound.
- source_word: κατέναντι
  chosen: fixed on
  alternatives:
  - before
  - opposite
  - facing
  lexicon: LSJ
  rationale: Literally the eyes are 'before/opposite' the object, but idiomatic English
    in this visual-attention context is 'fixed on.' This conveys sustained concentration
    rather than mere spatial relation.
- source_word: ὁμοιώματος
  chosen: pattern
  alternatives:
  - likeness
  - model
  - form
  lexicon: LSJ
  rationale: The term denotes the form or model being reproduced. 'Pattern' fits an
    artisan shaping a vessel according to a design. 'Likeness' would be too abstract
    in English here.
- source_word: σκεύους
  chosen: vessel
  alternatives:
  - utensil
  - implement
  - container
  lexicon: LSJ
  rationale: In craft context, σκεῦος commonly refers to an article or vessel being
    made. 'Vessel' is suitably broad and dignified, matching the likely metalworking
    imagery.
- source_word: οἱ ὀφθαλμοὶ αὐτοῦ
  chosen: his eyes
  lexicon: LSJ
  rationale: Retained literally to preserve the concrete bodily imagery of concentrated
    manual labor.
