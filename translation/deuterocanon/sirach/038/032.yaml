translation:
  text: With his arm he will shape clay, and before his feet he will bend his strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will stoop with all his strength before his feet.' The Greek phrase
      'he will bend his strength' is idiomatic and may describe either the craftsman's
      physical posture or the exertion of his power in the work.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν βραχίονι αὐτοῦ
  chosen: With his arm
  alternatives:
  - By his arm
  - With his forearm
  lexicon: LSJ
  rationale: βραχίων denotes the arm as the instrument of labor. 'With his arm' gives
    natural English while preserving the bodily, manual emphasis of the Greek.
- source_word: τυπώσει
  chosen: he will shape
  alternatives:
  - he will mold
  - he will form
  - he will stamp
  lexicon: LSJ
  rationale: In context of working πηλός ('clay'), the verb refers to fashioning or
    molding rather than striking in a generic sense. 'Shape' is readable modern English
    and fits pottery/craft imagery without over-specifying technique.
- source_word: πηλόν
  chosen: clay
  alternatives:
  - mud
  lexicon: LSJ
  rationale: πηλός normally means clay, especially suitable for a craftsman's material.
    'Clay' is the straightforward contextual rendering.
- source_word: πρὸ ποδῶν
  chosen: before his feet
  alternatives:
  - at his feet
  - in front of his feet
  lexicon: LSJ
  rationale: The phrase is spatial and concrete. 'Before his feet' preserves the Greek
    wording and the image of the material placed low before the worker.
- source_word: κάμψει
  chosen: he will bend
  alternatives:
  - he will bow
  - he will stoop
  - he will exert
  lexicon: LSJ
  rationale: κάμπτω commonly means 'bend' or 'bow.' Here it likely describes the physical
    bending of the worker over his task. Retaining 'bend' keeps the bodily image explicit.
- source_word: ἰσχὺν αὐτοῦ
  chosen: his strength
  alternatives:
  - his might
  - his force
  lexicon: LSJ
  rationale: ἰσχύς denotes strength or force. The Greek idiom is somewhat compressed;
    rendering it literally as 'his strength' preserves the sense that he applies his
    bodily power to the work, even if the English is slightly marked.
