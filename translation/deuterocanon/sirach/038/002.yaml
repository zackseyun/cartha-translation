translation:
  text: From God the physician becomes wise, and from the king he receives a gift.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''For healing is from the Most High.'' The Hebrew reads ''from God''
      and contains a difficult form where the Greek clearly supports ''healing.'''
    reason: alternative_reading
  - marker: b
    text: The Hebrew line also includes 'physician/doctor' in a difficult construction;
      the Greek parallel instead gives a smoother sense focused on healing itself.
    reason: textual_variant
  - marker: c
    text: Or 'from the king he receives payment.' The Hebrew wording is idiomatic
      and difficult, while the Greek reads 'he will receive a gift.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מאת אל
  chosen: from God
  alternatives:
  - from the Most High
  - from God
  lexicon: HALOT
  rationale: The Hebrew witness reads אל ('God'), while the Greek parallel has Ὑψίστου
    ('the Most High'). Since the Hebrew is the primary witness here, the main text
    follows 'God.' The Greek parallel is significant enough to preserve as an alternative
    in a footnote.
- source_word: יחכם
  chosen: healing
  alternatives:
  - wisdom
  - skill
  - healing
  lexicon: HALOT
  rationale: The Hebrew form as transmitted is difficult and likely reflects a corruption
    or variant behind the sense attested by the Greek ἴασις ('healing'). Given the
    immediate context about physicians and the strong Greek support, 'healing' best
    represents the verse's intended sense while honestly acknowledging the Hebrew
    difficulty.
- source_word: רופא
  chosen: (implicit in context, not carried into English main text)
  alternatives:
  - physician
  - doctor
  lexicon: HALOT
  rationale: The Hebrew text includes רופא ('physician/doctor') in a syntactically
    difficult clause. The Greek parallel lacks an explicit equivalent here and instead
    gives a smoother statement about healing. Because the Hebrew line appears textually
    unstable and the core sense is preserved without forcing an awkward English reconstruction,
    the main text does not explicitly include 'physician.' The alternative is preserved
    in a footnote.
- source_word: מאת מלך
  chosen: from the king
  alternatives:
  - from a king
  - from the king
  lexicon: HALOT
  rationale: The anarthrous Hebrew construct can be rendered generically, but 'the
    king' matches the Greek parallel παρὰ βασιλέως naturally and reads well in English.
- source_word: ישא משאות
  chosen: he receives a gift
  alternatives:
  - he bears loads
  - he receives payment
  - he receives a gift
  lexicon: HALOT
  rationale: The Hebrew phrase literally suggests 'he lifts/carries burdens/loads,'
    but in context with a physician and with the Greek λήμψεται δόμα ('he will receive
    a gift'), the sense is remuneration or royal reward. 'Receives a gift' best reflects
    the likely intended meaning and aligns with the Greek consistency check.
