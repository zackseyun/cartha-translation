theological_decisions:
- issue: Relationship between the Hebrew clause 'ותושיה מבני אדם' and the Greek parallel
    'and peace from him is upon the face of the earth'
  chosen_reading: 'Render the Hebrew primarily, but allow the Greek to inform a broad,
    non-technical sense: ''well-being may come from among men.'''
  alternative_readings:
  - '''and skill is among mankind'''
  - '''and peace from him is upon the face of the earth'''
  rationale: Zone 1 Hebrew is primary for extant Sirach Hebrew, but the clause is
    terse and semantically difficult. The Greek appears to reflect an interpretive
    or variant Vorlage that expands the social effect of the artisan's work. The chosen
    rendering stays anchored in the Hebrew while acknowledging, through word choice
    and footnote, the Greek's peace-oriented witness.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual translation input'
