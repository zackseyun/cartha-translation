translation:
  text: Turn away from wrongdoing, and make your hands straight; and from every sin
    cleanse your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The middle clause is textually difficult in the surviving Hebrew. The Greek
      parallel reads 'make straight your hands,' which likely reflects the intended
      sense of setting one's actions right.
    reason: textual_variant
  - marker: b
    text: Or 'from all transgressions.' The Hebrew term can carry the stronger sense
      of rebellious offenses, though the Greek parallel has 'from every sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נום
  chosen: Turn away
  alternatives:
  - Depart
  - Withdraw
  lexicon: HALOT
  rationale: The Hebrew form is somewhat uncertain in this composite Geniza text,
    but in context and in light of the Greek ἀπόστησον it calls for a movement away
    from evil. 'Turn away' is idiomatic modern English and preserves the imperative
    force without over-paraphrasing.
- source_word: מעול
  chosen: from wrongdoing
  alternatives:
  - from injustice
  - from iniquity
  lexicon: HALOT
  rationale: עול commonly denotes wrong, injustice, or iniquity. 'Wrongdoing' is broad
    and natural in English, fitting the ethical exhortation here. 'Injustice' is possible
    but narrower; 'iniquity' is more traditional but less accessible.
- source_word: ומהכר פנים
  chosen: and make your hands straight
  alternatives:
  - and direct your hands
  - and set your hands right
  lexicon: HALOT
  rationale: The Hebrew reading is difficult and appears to diverge from the Greek,
    which clearly reads εὔθυνον χεῖρας ('make straight/direct [your] hands'). Because
    the Greek parallel is supplied as an actual translation input and the Hebrew is
    marked with minor mismatch, the rendering follows the clearer sense attested by
    the Greek while remaining compatible with the likely Hebrew intent of rectifying
    one's actions.
- source_word: ומכל פשעים
  chosen: and from every sin
  alternatives:
  - and from all transgressions
  - and from every offense
  lexicon: HALOT
  rationale: פשעים literally suggests transgressions/rebellions, but the Greek has
    ἀπὸ πάσης ἁμαρτίας ('from every sin'). 'From every sin' gives a smooth and comprehensive
    ethical sense in English, while the stronger nuance of 'transgressions' is preserved
    as an alternative.
- source_word: טהר לב
  chosen: cleanse your heart
  alternatives:
  - purify your heart
  lexicon: HALOT
  rationale: טהר means to cleanse or purify. 'Cleanse your heart' matches the imperative
    tone and keeps the moral-ritual resonance without sounding overly technical. 'Purify'
    is also valid but slightly less idiomatic here.
