translation:
  text: My son, shed tears for the dead, be bitter, and begin the lament.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''be bitter and ... a lament''; the final verb is difficult in
      the surviving Hebrew. The Greek parallel reads, ''and as one suffering terribly,
      begin the lament,'' which supports the sense given here.'
    reason: textual_variant
lexical_decisions:
- source_word: בני
  chosen: My son
  alternatives:
  - Son
  - Child
  lexicon: HALOT
  rationale: Vocative singular with 1cs suffix; rendered naturally as an address.
    'My son' preserves the paternal instructional tone of Ben Sira better than the
    more generic 'child.'
- source_word: על המת
  chosen: for the dead
  alternatives:
  - over the dead
  - for the deceased
  lexicon: HALOT
  rationale: The preposition על here marks occasion/object of mourning. 'For the dead'
    is idiomatic English while retaining the sense of mourning on account of the deceased
    person.
- source_word: הזיב דמעה
  chosen: shed tears
  alternatives:
  - let a tear flow
  - make tears run
  lexicon: HALOT
  rationale: The Hebrew idiom speaks of causing a tear to flow; the Greek parallel
    κατάγαγε δάκρυα confirms an imperative to weep. 'Shed tears' is natural English
    and preserves the concrete mourning action.
- source_word: התמרר
  chosen: bitterly begin
  alternatives:
  - be embittered and begin
  - make yourself bitter
  lexicon: HALOT
  rationale: The hitpael conveys entering into bitter grief. In context with the following
    imperative and the Greek ὡς δεινὰ πάσχων ἔναρξαι θρήνου, the sense is not merely
    an inner state but the manner of commencing mourning. 'Bitterly begin' captures
    both force and flow in English.
- source_word: וגהה קינה
  chosen: the lament
  alternatives:
  - a lamentation
  - mourning-song
  lexicon: HALOT
  rationale: קינה is a formal lament. The verb is somewhat difficult in the Hebrew
    as transmitted, but the Greek parallel clearly supports beginning a lament. Rendering
    the phrase as 'begin the lament' reflects the combined Hebrew-Greek evidence without
    overtranslating the uncertain verb form.
