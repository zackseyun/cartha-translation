translation:
  text: My son, make the mourning bitter and complete the lament; perform his mourning
    as is fitting for him. For a day or two, because of reproach, shed tears; then
    be comforted because of grief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'because of reproach' is uncertain in nuance here; the Greek reads
      'for the sake of slander/reproach,' likely referring to avoiding social criticism
      by neglecting proper mourning.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew final phrase could be read more literally as 'because of affliction'
      or, if taken differently, 'because of iniquity'; the Greek supports the sense
      'because of grief/sorrow.'
    reason: alternative_reading
lexical_decisions:
- source_word: המר
  chosen: make ... bitter
  alternatives:
  - embitter
  - intensify
  lexicon: HALOT
  rationale: The Hiphil imperative from מרר carries the sense of making something
    bitter or intense. With מספד ('mourning/lamentation'), it idiomatically calls
    for vigorous mourning rather than literal bitterness alone. 'Make the mourning
    bitter' preserves the Hebrew image while remaining intelligible; the Greek πίκρανον
    supports this nuance.
- source_word: והתם
  chosen: complete
  alternatives:
  - finish
  - bring to an end
  - perform fully
  lexicon: HALOT
  rationale: The verb likely means to complete or carry through the lamentation. In
    context it does not mean to stop mourning immediately, but to carry out the formal
    lament properly. Greek θέρμανον is textually difficult as a consistency check,
    but the Hebrew witness is primary here.
- source_word: מספד
  chosen: mourning
  alternatives:
  - lamentation
  - funeral lament
  lexicon: HALOT
  rationale: מספד denotes lamentation for the dead. 'Mourning' is slightly broader
    and reads naturally in English, while the paired phrase 'complete the lament'
    preserves the more explicit lament element.
- source_word: אבלו
  chosen: his mourning
  alternatives:
  - mourning for him
  - his funeral observance
  lexicon: HALOT
  rationale: The suffix points to the deceased person as the reference point for the
    mourning rite. 'His mourning' is concise English for the mourning due on his account.
- source_word: כיוצא בו
  chosen: as is fitting for him
  alternatives:
  - as befits him
  - according to what is due to him
  - in proportion to him
  lexicon: HALOT
  rationale: The phrase indicates appropriateness or correspondence to the deceased's
    due. The Greek κατὰ τὴν ἀξίαν αὐτοῦ confirms the sense of what is fitting or worthy.
- source_word: יום ושנים
  chosen: for a day or two
  alternatives:
  - one day and two
  - for one or two days
  lexicon: HALOT
  rationale: The idiom is best rendered naturally in English as a limited mourning
    period of one or two days. The Greek ἡμέραν μίαν καὶ δύο supports this reading.
- source_word: בעבור דמעה
  chosen: shed tears
  alternatives:
  - for tears
  - on account of weeping
  lexicon: HALOT
  rationale: The Hebrew phrase literally means 'for the sake of tears.' In idiomatic
    English, the instruction is to weep or shed tears for a brief period. This keeps
    the emotional force without wooden phrasing.
- source_word: הנחם
  chosen: be comforted
  alternatives:
  - console yourself
  - take comfort
  lexicon: HALOT
  rationale: The imperative calls for moving from active mourning toward consolation.
    'Be comforted' preserves the passive/reflexive sense and matches the Greek παρακλήθητι.
- source_word: בעבור עון
  chosen: because of grief
  alternatives:
  - because of sorrow
  - because of affliction
  - because of trouble
  lexicon: HALOT
  rationale: The Hebrew עון here is difficult if read in its more common sense 'iniquity.'
    In this context, supported by the Greek λύπης ἕνεκα, it is best understood in
    the sense of distress, sorrow, or grief. 'Because of grief' fits the mourning
    context and aligns with the Greek parallel.
