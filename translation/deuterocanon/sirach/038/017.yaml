theological_decisions:
- issue: Use of Hebrew as primary witness with Greek as control
  chosen_reading: Translate from the extant Hebrew while allowing the Greek to clarify
    difficult phrases, especially the final clause.
  alternative_readings:
  - Translate more strictly from Hebrew alone
  - Prefer the Greek wording where the Hebrew is semantically difficult
  rationale: For Sirach, the project philosophy gives primacy to the surviving Hebrew
    where available. Here the Hebrew is extant and coherent overall, but the Greek
    parallel helps confirm 'as is fitting for him' and supports reading the final
    phrase in the semantic field of grief rather than sin/iniquity.
