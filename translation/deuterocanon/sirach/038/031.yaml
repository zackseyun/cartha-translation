translation:
  text: So the potter, sitting at his work and turning the wheel with his feet, is
    continually anxious over his work, and all his labor is by number;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all his work is numbered.' The Greek adjective ἐνάριθμος can be rendered
      more directly as 'numbered' or 'counted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κεραμεύς
  chosen: potter
  alternatives:
  - ceramist
  lexicon: LSJ
  rationale: The standard sense is a maker of clay vessels. 'Potter' is the natural,
    idiomatic English equivalent and fits the ancient craft context.
- source_word: καθήμενος ἐν ἔργῳ αὐτοῦ
  chosen: sitting at his work
  alternatives:
  - seated at his task
  - sitting over his work
  lexicon: LSJ
  rationale: This participial phrase describes the potter's posture and engagement
    in his craft. 'At his work' is idiomatic and preserves the concrete scene without
    over-literal awkwardness.
- source_word: συστρέφων ... τροχόν
  chosen: turning the wheel
  alternatives:
  - spinning the wheel
  - rotating the wheel
  lexicon: LSJ
  rationale: The verb indicates causing the wheel to turn. 'Turning the wheel' is
    clear, direct English for the potter's action.
- source_word: ἐν ποσὶν αὐτοῦ
  chosen: with his feet
  alternatives:
  - by his feet
  lexicon: LSJ
  rationale: The phrase specifies the means by which the wheel is operated. 'With
    his feet' is the most natural rendering in English.
- source_word: ἐν μερίμνῃ κεῖται διὰ παντός
  chosen: is continually anxious
  alternatives:
  - is continually concerned
  - lies in constant care
  lexicon: LSJ
  rationale: The idiom literally suggests being in a state of care or concern continually.
    'Is continually anxious' captures the ongoing preoccupation of the craftsman,
    though not necessarily pathological anxiety.
- source_word: ἐπὶ τὸ ἔργον αὐτοῦ
  chosen: over his work
  alternatives:
  - about his work
  - for his work
  lexicon: LSJ
  rationale: Here ἐπί with the accusative conveys direction of concern toward the
    work. 'Over his work' fits English idiom with 'anxious' and preserves the focus
    of his concern.
- source_word: ἐνάριθμος
  chosen: by number
  alternatives:
  - counted
  - numbered
  - carefully measured
  lexicon: LSJ
  rationale: The adjective means 'numbered' or 'reckoned by number.' In context it
    likely conveys that every item of his production is counted or precisely quantified.
    'By number' stays close to the Greek while remaining intelligible, preserving
    the somewhat formal texture of the line.
- source_word: πᾶσα ἡ ἐργασία αὐτοῦ
  chosen: all his labor
  alternatives:
  - all his work
  - his whole production
  lexicon: LSJ
  rationale: ἐργασία can denote work, labor, or product of labor. 'All his labor'
    avoids repetition with earlier ἔργον while still reflecting the same semantic
    field.
