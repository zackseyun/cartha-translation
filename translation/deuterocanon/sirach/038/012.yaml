lexical_decisions:
- source_word: וגם
  chosen: Also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Introduces an additional exhortation linked to the surrounding context.
    'Also' is concise and natural in English while preserving the additive force.
- source_word: לרופא
  chosen: the physician
  alternatives:
  - the doctor
  - a physician
  lexicon: HALOT
  rationale: The Hebrew noun means 'physician/healer.' 'Physician' fits the wisdom-literature
    register better than the more colloquial 'doctor.' The definite sense is supported
    by the Greek ἰατρῷ and the generic class reference.
- source_word: תן מקום
  chosen: give ... a place
  alternatives:
  - make room for
  - give scope to
  - allow
  lexicon: HALOT
  rationale: Literally 'give place.' This idiom can mean to make room for or allow
    proper standing. 'Give the physician a place' preserves the concrete metaphor
    and remains understandable in context.
- source_word: ולא ימוש
  chosen: do not let him depart
  alternatives:
  - do not dismiss him
  - do not send him away
  - let him not leave
  lexicon: HALOT
  rationale: The Hebrew verb מוש conveys moving away/departing. Because the subject
    in English would otherwise sound intransitive and awkward, 'do not let him depart'
    captures the sense naturally. The Greek μὴ ἀποστήτῳ σου supports the idea of not
    having him withdraw from one's side.
- source_word: כי גם בו צורך
  chosen: for there is need of him as well
  alternatives:
  - for you also need him
  - for he too is necessary
  - for there is also need for him
  lexicon: HALOT
  rationale: The clause states the physician's necessity. 'There is need of him as
    well' preserves the impersonal Hebrew construction and the emphatic גם, while
    reading smoothly in English. The Greek αὐτοῦ χρεία confirms the sense of practical
    necessity.
