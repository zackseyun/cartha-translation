theological_decisions:
- issue: Use of Hebrew primary witness with Greek parallel where wording differs
  chosen_reading: Translate the Hebrew base text while allowing the Greek to confirm
    the sense of honoring and retaining the physician, without importing the Greek
    addition 'for the Lord created him.'
  alternative_readings:
  - Also give the physician a place, for the Lord created him, and do not let him
    depart from you, for there is need of him.
  rationale: The project philosophy gives primacy to the most original available witness
    for Sirach where Hebrew survives. Here the Hebrew reads 'וגם לרופא תן מקום, ולא
    ימוש כי גם בו צורך,' while the Greek contains an expanded clause about the Lord
    creating the physician. Since that clause is absent from the Zone 1 Hebrew, it
    should not be inserted into the main text, but the Greek parallel is significant
    enough to preserve in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input without overriding the Hebrew base.'
