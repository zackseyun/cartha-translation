theological_decisions:
- issue: Divine title in the clause 'did not turn away from ...'
  chosen_reading: God
  alternative_readings:
  - Lord
  rationale: The primary Hebrew witness reads אל ('God'), while the Greek parallel
    has Κυρίου ('Lord'). Because Hebrew is extant and primary for Sirach here, the
    main text follows the Hebrew. The Greek alternative is preserved in a footnote
    as a source-level variant of significance.
  doctrine_reference: Original-language primacy over translation tradition; contested
    term κύριος → Lord
- issue: Sense of the heart-clause
  chosen_reading: whose heart was not led astray
  alternative_readings:
  - whose heart was not lifted up
  - whose heart did not go whoring
  rationale: The Hebrew wording alone could be read more literally as 'was not lifted
    up,' but the Greek parallel strongly indicates apostasy/unfaithfulness as the
    intended sense. The chosen rendering preserves the theological force of covenant
    loyalty without over-literalizing the Greek metaphor in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
