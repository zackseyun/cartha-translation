translation:
  text: And the judges, each by his own name—all whose hearts were not led astray
    and who did not turn away from God—may their memory be for blessing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'all who did not lift up his heart'; the Greek parallel
      reads, 'whose heart did not go astray,' which likely clarifies the intended
      sense here.
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''did not turn away from the Lord.'' The Hebrew witness here reads
      ''from God.'''
    reason: alternative_reading
lexical_decisions:
- source_word: והשופטים
  chosen: And the judges
  alternatives:
  - And the rulers
  - And the magistrates
  lexicon: HALOT
  rationale: Hebrew שפטים in this context refers to the leaders/judges of Israel in
    the period of the Judges. 'Judges' is the most direct and contextually appropriate
    rendering, also supported by the Greek οἱ κριταί.
- source_word: איש בשמו
  chosen: each by his own name
  alternatives:
  - each one by name
  - each in his own name
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the idiom that the judges are individually
    remembered, not merely as a group. The Greek ἕκαστος τῷ αὐτοῦ ὀνόματι confirms
    this sense.
- source_word: כל אשר לא נשא לבו
  chosen: everyone whose heart was not led astray
  alternatives:
  - all whose heart was not lifted up
  - everyone whose heart did not go whoring
  - all who were not proud in heart
  lexicon: HALOT
  rationale: The Hebrew as transmitted is somewhat terse, literally 'all who did not
    lift his heart,' which could suggest pride, but the Greek parallel reads ὅσων
    οὐκ ἐξεπόρνευσεν ἡ καρδία, 'whose heart did not go astray/play the harlot.' Given
    the task requirement to use the Greek parallel as actual translation input, and
    the immediate parallel clause about not turning away from God, the sense is covenantal
    faithfulness rather than mere humility. 'Led astray' captures the likely intended
    meaning in readable English without importing overly explicit metaphor not present
    in the Hebrew line as preserved.
- source_word: ולא נסוג מאחרי אל
  chosen: and who did not turn away from God
  alternatives:
  - and who did not draw back from following God
  - and who did not turn aside from the Lord
  lexicon: HALOT
  rationale: נסוג מאחרי means to turn back/away from following. The Hebrew reads אל
    ('God'), while the Greek has Κυρίου ('Lord'). Since the Hebrew is the primary
    witness here, 'God' is preferred in the main text.
- source_word: יהי זכרם לברכה
  chosen: may their memory be for blessing
  alternatives:
  - may their remembrance be blessed
  - let their memory be blessed
  lexicon: HALOT
  rationale: This preserves the familiar Hebrew idiom with good English rhythm. It
    is closer to the Hebrew wording than the more interpretive 'let their memory be
    blessed,' while still natural.
