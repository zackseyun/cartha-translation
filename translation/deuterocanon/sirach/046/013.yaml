translation:
  text: Beloved by his people and pleasing to his Maker, asked for from his mother's
    womb, Samuel, a Nazirite of the Lord in prophecy, judged and served as priest;
    by the word of God he established the kingdom, and anointed rulers over his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Samuel, beloved by his Lord, a prophet of the Lord, established
      a kingdom, and anointed rulers over his people.'' The Hebrew witness instead
      reads ''a Nazirite of the Lord in prophecy'' and adds that he ''judged and served
      as priest.'''
    reason: alternative_reading
lexical_decisions:
- source_word: נזיר יהוה
  chosen: a Nazirite of the Lord
  alternatives:
  - consecrated one of the Lord
  - one dedicated to the Lord
  lexicon: HALOT
  rationale: נזיר most naturally denotes one specially consecrated, and in Samuel's
    case evokes his lifelong dedication from birth. 'Nazirite' preserves the specific
    cultic/theological resonance better than a generalized 'consecrated one.' Following
    doctrine, יהוה is rendered 'the Lord.'
- source_word: בנבואה
  chosen: in prophecy
  alternatives:
  - as a prophet
  - for prophecy
  - in prophetic office
  lexicon: HALOT
  rationale: The Hebrew preposition ב with נבואה is compact and somewhat elliptical.
    'In prophecy' preserves the Hebrew form while communicating Samuel's prophetic
    role. The Greek parallel has 'prophet of the Lord,' which supports understanding
    this phrase as identifying his prophetic status.
- source_word: שופט
  chosen: judged
  alternatives:
  - was judge
  - governed as judge
  lexicon: HALOT
  rationale: The participial/title sense is clear. 'Judged' gives natural English
    in coordination with the following verb while retaining the judicial-governing
    role signaled by שופט.
- source_word: ומכהן
  chosen: served as priest
  alternatives:
  - ministered as priest
  - was priest
  lexicon: HALOT
  rationale: The verb כהן denotes priestly service. 'Served as priest' is idiomatic
    and reflects activity rather than merely office-holding.
- source_word: בדבר אל
  chosen: by the word of God
  alternatives:
  - by God's word
  - at the word of God
  lexicon: HALOT
  rationale: The Hebrew points to divine authorization/instrumentality. 'By the word
    of God' is clear modern English and preserves the causal/instrumental force. Although
    the Greek lacks explicit 'God' here and reads more simply that he 'established
    a kingdom,' the Hebrew witness is primary for this verse.
- source_word: הכין ממלכת
  chosen: he established the kingdom
  alternatives:
  - he set up the kingdom
  - he made the kingdom firm
  lexicon: HALOT
  rationale: הכין commonly means to establish or make firm. 'Established the kingdom'
    fits the context of Samuel's role in instituting monarchy and is supported broadly
    by the Greek parallel's κατέστησεν βασιλείαν.
- source_word: וימשח נגידים
  chosen: and anointed rulers
  alternatives:
  - and anointed leaders
  - and anointed princes
  lexicon: HALOT
  rationale: נגידים can mean leaders, rulers, or princes. 'Rulers' best fits the political
    context of Saul and David without sounding archaic. The Greek ἄρχοντας likewise
    supports 'rulers/leaders.'
- source_word: על עם
  chosen: over his people
  alternatives:
  - over the people
  - for the people
  lexicon: HALOT
  rationale: The Greek explicitly reads 'over his people,' and the Hebrew phrase naturally
    carries that sense in context. Including 'his' clarifies the referent and aligns
    with the parallel source.
