theological_decisions:
- issue: Hebrew-Jacob versus Greek-Israel in the descendant phrase
  chosen_reading: all the offspring of Jacob
  alternative_readings:
  - all the sons/children of Israel
  rationale: The primary witness for Sirach here is the surviving Hebrew, which reads
    'all the seed of Jacob,' while the Greek parallel reads 'all the sons of Israel.'
    The English follows the Hebrew as the most original available witness, while preserving
    the Greek-aligned alternative in a footnote because the difference is meaningful
    but not doctrinally weighty.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    use Greek parallel as actual input'
- issue: Rendering the obedience idiom
  chosen_reading: follow after the LORD
  alternative_readings:
  - walk after the LORD
  - go after the LORD
  rationale: The Hebrew phrase למלא אחרי is textually/idiomatically difficult in isolation,
    but the Greek parallel strongly supports the sense of going after the Lord. 'Follow
    after' preserves the metaphor of directed allegiance without flattening it into
    abstract obedience.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without paraphrase'
