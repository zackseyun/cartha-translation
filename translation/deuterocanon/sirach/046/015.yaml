translation:
  text: By the faithfulness of his mouth he was sought out as a seer, and also by
    his word he was found faithful as a shepherd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By the faith of his mouth'; the Hebrew more naturally suggests the faithfulness
      or trustworthiness of his speech.
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''prophet'' where the Hebrew reads ''seer.'''
    reason: alternative_reading
  - marker: c
    text: The Hebrew wording in the second line is somewhat compressed; the sense
      may be that by his word he was recognized as a faithful shepherd.
    reason: textual_variant
lexical_decisions:
- source_word: באמונת
  chosen: by the faithfulness of
  alternatives:
  - in the faithfulness of
  - by the trustworthiness of
  - by the faith of
  lexicon: HALOT
  rationale: The Hebrew אֱמוּנָה commonly denotes firmness, faithfulness, or reliability.
    Here, with 'his mouth,' the sense is not inward belief but the trustworthiness/reliability
    expressed in speech. The Greek parallel uses ἐν πίστει, which can mean 'in faith'
    or 'in faithfulness'; in this context the Hebrew points more clearly to faithfulness.
- source_word: פיו
  chosen: his mouth
  alternatives:
  - his speech
  lexicon: HALOT
  rationale: Retained literally to preserve the Hebrew idiom linking faithfulness
    to spoken utterance. English remains intelligible with the literal rendering.
- source_word: דרוש
  chosen: was sought out
  alternatives:
  - was consulted
  - was inquired of
  lexicon: HALOT
  rationale: The passive/participial sense from דרש fits being sought or consulted.
    'Was sought out' preserves the concrete Hebrew while allowing the following predicate
    'as a seer.'
- source_word: חזה
  chosen: as a seer
  alternatives:
  - a visionary
  - a prophet
  lexicon: HALOT
  rationale: חֹזֶה/חזה denotes a seer or visionary figure. The Greek has προφήτης
    ('prophet'), showing an interpretive equivalent, but the Hebrew witness is primary
    here and 'seer' better reflects the specific Hebrew term.
- source_word: וגם
  chosen: and also
  alternatives:
  - and
  - also
  lexicon: HALOT
  rationale: Preserves the additive force of the Hebrew conjunction plus adverb.
- source_word: בדברו
  chosen: in his word
  alternatives:
  - by his word
  - in what he said
  - in his speech
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the parallelism with 'his mouth.'
    'Word' can denote speech or utterance here.
- source_word: נאמן
  chosen: was found faithful
  alternatives:
  - was faithful
  - proved faithful
  - was trustworthy
  lexicon: HALOT
  rationale: The adjective means faithful/trustworthy. Rendering with 'was found faithful'
    makes good sense with the likely elliptical syntax and reflects the Greek ἐγνώσθη
    ... πιστός ('was known ... faithful') as a consistency check.
- source_word: רועה
  chosen: a shepherd
  alternatives:
  - shepherd
  - one who shepherds
  - leader
  lexicon: HALOT
  rationale: The Hebrew noun ordinarily means shepherd. Although metaphorical leadership
    may be implied, the base image should be preserved in translation.
