  - trustworthiness
  rationale: Following the Hebrew primary witness, the phrase refers to reliability
    in speech rather than subjective belief. This also preserves the commendatory
    character of the verse about Samuel.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; preserve alternatives
    where contested.'
- issue: חזה versus Greek προφήτης
  chosen_reading: seer
  alternative_readings:
  - prophet
  rationale: The Hebrew survives for this verse and is primary per project philosophy.
    The Greek parallel likely interprets the role more broadly; the main text keeps
    the more specific Hebrew designation, with 'prophet' preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition.'
