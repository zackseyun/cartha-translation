theological_decisions:
- issue: How to handle the apparent mismatch between Hebrew צוה ('he commanded') and Greek ἔκρινεν ('he judged')
  chosen_reading: Render the clause as 'he judged the assembly' in the main text
  alternative_readings:
  - he commanded the assembly
  rationale: The Hebrew witness is primary where extant, but the Greek parallel is to be used as actual translation input. In this context Samuel is being praised as judge over Israel, and the Greek provides a coherent reading that fits the immediate literary context better than 'he commanded the assembly.' Because the Hebrew form as transmitted is difficult in context, the Greek likely preserves the intended sense or reflects a closely related Vorlage. The alternative is preserved in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, using the Greek parallel as actual translation input'
