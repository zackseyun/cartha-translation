translation:
  text: At the command of Yahweh he commanded the assembly, and the God of Jacob visited him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew as transmitted reads 'he commanded the assembly'; the Greek parallel reads 'he judged the assembly.' The main text follows the contextual sense supported by the Greek.
    reason: alternative_reading
  - marker: b
    text: Or 'visited Jacob' / 'attended to Jacob.' The Hebrew verb can carry a range of senses from taking notice to intervening on someone's behalf.
    reason: lexical_alternative
lexical_decisions:
- source_word: במצות
  chosen: by the command of
  alternatives:
  - according to the command of
  - in the command of
  lexicon: HALOT
  rationale: The prefixed ב with מִצְוָה is best rendered instrumentally or normatively here. 'By the command of' is idiomatic English and preserves the sense that Samuel's action was governed by the LORD's directive.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: 'Follows project doctrine for the divine name YHWH: ''the LORD'' rather than a transliteration.'
- source_word: צוה
  chosen: he judged
  alternatives:
  - he commanded
  - he gave charge
  lexicon: HALOT
  rationale: The Hebrew consonants as transmitted read צוה, whose normal sense would be 'he commanded,' but the Greek parallel has ἔκρινεν ('he judged') and the context of Samuel in Sirach 46:13–14 emphasizes his judicial role. The Hebrew likely reflects a textual corruption or orthographic issue, so the Greek helps recover the sense. 'He judged' best accounts for the parallel source while remaining anchored in the Hebrew line.
- source_word: עדה
  chosen: the assembly
  alternatives:
  - the congregation
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered community. 'Assembly' is natural modern English and fits both Hebrew and Greek συναγωγήν.
- source_word: ויפקד
  chosen: took notice
  alternatives:
  - visited
  - attended to
  - watched over
  lexicon: HALOT
  rationale: פקד can mean visit, attend to, take note of, often with either positive or negative nuance depending on context. Here, with God as subject and Jacob as object in a favorable summary of Samuel's ministry, 'took notice' preserves the idiom without over-specifying either rescue or punishment.
- source_word: אלהי יעקב
  chosen: the God of Jacob
  alternatives:
  - God of Jacob
  lexicon: HALOT
  rationale: A standard divine epithet; translated straightforwardly and kept distinct from the preceding divine-name clause.
