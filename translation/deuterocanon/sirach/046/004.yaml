translation:
  text: Was it not by his hand that the sun stood still, and one day was like two?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'one day became like two days.' The Hebrew says simply
      'like two,' with 'day' understood from the context.
    reason: lexical_alternative
  - marker: b
    text: The verse alludes to Joshua's victory tradition in which the sun's course
      was halted; compare Joshua 10:12–14.
    reason: cross_reference
lexical_decisions:
- source_word: הלא
  chosen: Was it not
  alternatives:
  - Did not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Was it not' preserves
    the emphatic interrogative force in natural English.
- source_word: בידו
  chosen: by his hand
  alternatives:
  - in his hand
  - through him
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'in/by his hand' to express agency or
    instrumentality. 'By his hand' keeps the concrete imagery while communicating
    agency clearly.
- source_word: עמד
  chosen: stood still
  alternatives:
  - stood
  - stopped
  lexicon: HALOT
  rationale: In context of the sun, the verb refers to halting its movement. The Greek
    parallel likewise points to the sun being checked or hindered. 'Stood still' is
    idiomatic English and fits the allusion to Joshua's miracle.
- source_word: השמש
  chosen: the sun
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: יום אחד
  chosen: one day
  alternatives:
  - a single day
  lexicon: HALOT
  rationale: Direct rendering of the Hebrew phrase.
- source_word: כשנים
  chosen: became like two
  alternatives:
  - was as two
  - was like two days
  lexicon: HALOT
  rationale: The Hebrew literally says 'like two.' Because 'day' is already established
    in the clause, 'became like two' preserves the compactness of the source while
    remaining intelligible. The sense is that one day was extended to the length of
    two.
