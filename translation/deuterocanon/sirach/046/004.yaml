theological_decisions:
- issue: Miracle language concerning Joshua and the sun
  chosen_reading: Render the statement straightforwardly as a historical claim within
    the poem of praise, without naturalizing it.
  alternative_readings:
  - Interpret as poetic hyperbole about military success or daylight
  rationale: Both the Hebrew and Greek present the event as the sun's halting/being
    hindered and the day becoming like two. The translation should preserve the text's
    claim rather than soften it into metaphor.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
