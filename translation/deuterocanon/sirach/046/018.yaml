translation:
  text: And at the time of his resting on his bed, he testified before the LORD and
    his anointed one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his anointed one' uses the same root as 'Messiah'; the phrase may
      refer specifically to the LORD's anointed ruler in Samuel's day.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel for this verse differs sharply, reading instead that
      he 'crushed the leaders of Tyre and all the rulers of the Philistines,' indicating
      a substantial textual divergence between the Hebrew and Greek witnesses here.
    reason: textual_variant
lexical_decisions:
- source_word: ועת
  chosen: And at the time of
  alternatives:
  - And when
  - At the time when
  lexicon: HALOT
  rationale: The conjunction plus noun introduces a temporal clause. 'And at the time
    of' preserves the Hebrew structure while remaining natural English.
- source_word: נוחו
  chosen: his resting
  alternatives:
  - his repose
  - his lying down
  - his death
  lexicon: HALOT
  rationale: From נוח, here an infinitive/nominal sense tied to lying on the bed.
    It likely refers to Samuel's final repose rather than abstract rest. 'His resting'
    keeps the wording close without over-interpreting as death alone.
- source_word: על משכבו
  chosen: on his bed
  alternatives:
  - upon his couch
  - on his deathbed
  lexicon: HALOT
  rationale: משכב is literally a place of lying down, often bed/couch. 'On his bed'
    is the plain sense; 'deathbed' is interpretive and therefore left implicit rather
    than made explicit in the main text.
- source_word: העיד
  chosen: he called ... to witness
  alternatives:
  - he testified before
  - he bore witness by
  - he adjured
  lexicon: HALOT
  rationale: The hiphil of עוד can mean to testify, warn, or call as witness. With
    the direct objects 'the LORD and his anointed one,' the sense is best taken as
    invoking them as witnesses rather than saying Samuel testified to them.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per project doctrine, the Tetragrammaton is rendered 'the LORD'.
- source_word: ומשיחו
  chosen: and his anointed one
  alternatives:
  - and his Messiah
  - and his king
  lexicon: HALOT
  rationale: משיח means 'anointed one.' In this historical context it most naturally
    refers to the LORD's anointed ruler, likely Saul, but the Hebrew itself uses the
    title rather than the personal name. The translation preserves the title. 'Messiah'
    is possible lexically, but here the immediate historical referent is not an eschatological
    title in English usage, so 'anointed one' is clearer.
