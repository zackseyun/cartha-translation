theological_decisions:
- issue: Rendering of משיחו
  chosen_reading: his anointed one
  alternative_readings:
  - his Messiah
  - his king
  rationale: The Hebrew title should be translated rather than replaced with a proper
    name. Because the context is Samuel's final testimony involving the reigning anointed
    ruler, 'his anointed one' preserves the lexical force without importing later
    messianic specificity. An alternative 'his Messiah' is lexically valid and worth
    preserving in a footnote because the Hebrew term is the same root as 'Messiah.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Χριστός/Messiah
    principle applied analogically to Hebrew משיח.'
