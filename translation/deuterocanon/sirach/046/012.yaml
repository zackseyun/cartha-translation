translation:
  text: May their bones blossom like a lily, and may their name be renewed in their
    sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''like a lily''; some have rendered the flower more generally or
      as ''rose,'' but ''lily'' is the more likely sense of שושנה.'
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel explicitly reads 'from their place' after 'their bones
      blossom'; this likely clarifies the Hebrew image of their memory flourishing
      from where they rest.
    reason: alternative_reading
  - marker: c
    text: Or 'their name be passed on through their sons.' The Hebrew verb can suggest
      renewal or succession, and the Greek likewise points to a name continuing in
      honored descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: תפרחנה
  chosen: blossom
  alternatives:
  - sprout
  - flourish
  lexicon: HALOT
  rationale: From פרח, denoting budding or flowering. 'Blossom' preserves the vivid
    botanical image better than the more general 'flourish.' The jussive-like sense
    in context supports 'May ... blossom.'
- source_word: עצמותם
  chosen: their bones
  alternatives:
  - their remains
  lexicon: HALOT
  rationale: The Hebrew literally says 'their bones.' This concrete wording is retained
    rather than softened to 'remains,' and it coheres with the Greek parallel τὰ ὀστᾶ
    αὐτῶν.
- source_word: כשושנה
  chosen: like a lily
  alternatives:
  - like a rose
  lexicon: HALOT
  rationale: שושנה commonly denotes 'lily' in biblical and post-biblical usage. Although
    some traditions render it 'rose,' 'lily' is the more defensible default and matches
    the floral imagery naturally.
- source_word: ושמם
  chosen: and their name
  alternatives:
  - and their reputation
  lexicon: HALOT
  rationale: '''Name'' is retained as the primary biblical idiom, allowing both memorial
    and reputation connotations without over-interpreting.'
- source_word: תחליף
  chosen: be renewed
  alternatives:
  - be passed on
  - be exchanged
  - sprout anew
  lexicon: HALOT
  rationale: The verb from חלף can denote renewal, succession, or replacement. In
    this memorial context, with the Greek ἀντικαταλλασσόμενον suggesting continuance
    by succession, 'be renewed' best captures the idea that their name lives on in
    the next generation without implying mere substitution.
- source_word: לבניהם
  chosen: in their sons
  alternatives:
  - among their children
  - through their sons
  lexicon: HALOT
  rationale: The Hebrew specifically says 'their sons,' and the project's gender-accurate
    policy favors preserving that specificity rather than neutralizing to 'children.'
    'In their sons' reflects the idiom of a name continuing in descendants.
