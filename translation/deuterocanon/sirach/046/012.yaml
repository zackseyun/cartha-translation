theological_decisions:
- issue: Gender-specific descendant term
  chosen_reading: sons
  alternative_readings:
  - children
  - descendants
  rationale: The Hebrew בניהם is explicitly masculine plural. In keeping with the
    project's gender-accurate policy, the translation preserves 'sons' rather than
    broadening to a gender-neutral term, while recognizing that the sense is dynastic
    continuation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Memorial/restoration imagery in the first colon
  chosen_reading: May their bones blossom like a lily from their place
  alternative_readings:
  - May their bones sprout from their place
  - May their bones flourish where they lie
  rationale: The Hebrew text gives the floral image directly; the Greek parallel adds
    'from their place' explicitly. Including 'from their place' reflects the parallel
    source as instructed and clarifies the image of posthumous honor or enduring memory
    without forcing a doctrine of bodily resurrection into the line.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
