theological_decisions:
- issue: Divine title repetition
  chosen_reading: Repeat 'God Most High' in both clauses
  alternative_readings:
  - Use 'the Most High' in the second clause only
  rationale: The Hebrew repeats אל עליון, and preserving the repetition reflects the
    poetic emphasis on the same God who is invoked and who answers. This is stylistic
    rather than doctrinal, but it bears on how the verse presents divine agency.
