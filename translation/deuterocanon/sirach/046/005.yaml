translation:
  text: For he called on God Most High when his enemies pressed him from all around,
    and God Most High answered him with hailstones and ice-stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the great Lord heard them/him in stones of hail, with mighty power.''
      The Hebrew witness is primary here, but the Greek suggests a more expansive
      storm-theophany wording.'
    reason: alternative_reading
lexical_decisions:
- source_word: קרא אל
  chosen: called on
  alternatives:
  - called to
  - invoked
  lexicon: HALOT
  rationale: The idiom קרא אל commonly means to call upon or invoke someone for help,
    not merely to speak toward them. 'Called on' is natural English and preserves
    the prayer-for-help sense, supported by the Greek ἐπεκαλέσατο.
- source_word: אל עליון
  chosen: God Most High
  alternatives:
  - the Most High God
  - God the Most High
  lexicon: HALOT
  rationale: The Hebrew is a divine title consisting of 'God' plus 'Most High.' 'God
    Most High' keeps the Hebrew order more closely while remaining readable. The same
    title is repeated in the verse and is rendered consistently both times.
- source_word: כאכפה לו אויביו מסביב
  chosen: when his enemies pressed him from all around
  alternatives:
  - when his enemies surrounded him
  - when his enemies oppressed him on every side
  lexicon: HALOT
  rationale: The clause describes hostile pressure from surrounding enemies. The exact
    force of the rare/uncertain verbal form is clarified by the Greek ἐν τῷ θλίψαι
    αὐτὸν ἐχθροὺς κυκλόθεν, which points to affliction or pressing distress rather
    than simple location. 'Pressed him from all around' captures both the pressure
    and encirclement.
- source_word: ויענהו
  chosen: answered him
  alternatives:
  - responded to him
  - heard him
  lexicon: HALOT
  rationale: ענה in this context is best rendered 'answered,' since the Hebrew explicitly
    states response, and the Greek ἐπήκουσεν reflects hearing favorably. 'Answered
    him' preserves the Hebrew wording while implying effective response.
- source_word: באבני ברד
  chosen: with hailstones
  alternatives:
  - by hailstones
  - in hailstones
  lexicon: HALOT
  rationale: 'The beth preposition here is instrumental: God answered by means of
    storm judgment. ''With hailstones'' is idiomatic English and fits the martial-theophanic
    context.'
- source_word: ואלגביש
  chosen: and ice-stones
  alternatives:
  - and hail
  - and great hailstones
  - and thunderbolts
  lexicon: HALOT
  rationale: אלגביש is a rare term known from storm-theophany contexts and often associated
    with hail or icy stones. Since ברד already covers ordinary hail, rendering the
    second term distinctly as 'ice-stones' preserves the Hebrew's twofold expression
    without collapsing them into one word. The Greek's expanded phrase differs, so
    the Hebrew is kept primary and the broader Greek nuance is noted in a footnote.
