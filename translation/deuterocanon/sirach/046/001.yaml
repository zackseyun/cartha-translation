theological_decisions:
- issue: Relation of Joshua to Moses in the phrase 'in prophecy'
  chosen_reading: Retain the compact wording 'Moses’ attendant in prophecy' rather
    than expanding to 'successor to Moses in prophetic office.'
  alternative_readings:
  - Moses’ successor in prophecy
  - Moses’ minister for prophecy
  rationale: The Greek parallel points toward succession, but the surviving Hebrew
    reads משרת משה בנבואה. Since the Hebrew witness is primary here and the phrase
    is not fully transparent, the translation preserves its wording without importing
    a stronger claim than the text explicitly states.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Scope of תשועה
  chosen_reading: Render as 'salvation' in the main text, preserving military-deliverance
    nuance in alternatives.
  alternative_readings:
  - deliverance
  - victory
  rationale: The verse praises Joshua in a military context, but the Hebrew term and
    Greek σωτηρία are broader than battlefield victory alone. 'Salvation' keeps the
    lexical breadth and theological resonance without denying the historical sense
    of deliverance.
  doctrine_reference: Translation philosophy §§1, 5
