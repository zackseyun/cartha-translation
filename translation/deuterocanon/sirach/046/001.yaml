translation:
  text: Joshua son of Nun was a mighty warrior, Moses’ attendant in prophecy; he was
    appointed in his days to be a great salvation for his chosen ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''successor to Moses in prophecies,'' making Joshua’s relation to
      Moses more explicitly one of succession than the surviving Hebrew wording does.'
    reason: alternative_reading
  - marker: b
    text: '''A great salvation'' can also be rendered ''great deliverance'' or ''great
      victory''; the Hebrew תשועה and Greek σωτηρία can carry both military and broader
      saving senses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גבור בן חיל
  chosen: a mighty warrior
  alternatives:
  - a hero, son of valor
  - mighty in strength
  - strong in war
  lexicon: HALOT
  rationale: The Hebrew idiom combines גבוֹר ('mighty man/hero') with בן חיל ('man
    of valor, capable warrior'). 'Mighty warrior' gives natural English while preserving
    martial force. The Greek parallel κραταιὸς ἐν πολέμῳ supports an explicitly military
    sense.
- source_word: משרת משה
  chosen: Moses’ attendant
  alternatives:
  - Moses’ minister
  - servant of Moses
  - assistant to Moses
  lexicon: HALOT
  rationale: משרת commonly denotes one who serves in an official assisting role. 'Attendant'
    is more natural modern English than 'minister' here and avoids importing later
    ecclesiastical associations.
- source_word: בנבואה
  chosen: in prophecy
  alternatives:
  - for prophecy
  - with prophetic office
  - in prophetic succession
  lexicon: HALOT
  rationale: The Hebrew phrase is terse and somewhat unusual. The Greek parallel διάδοχος
    Μωσῇ ἐν προφητείαις suggests succession or service in relation to prophetic function.
    'In prophecy' preserves the wording without over-resolving whether the sense is
    sphere, instrument, or office.
- source_word: אשר נוצר
  chosen: he was formed
  alternatives:
  - he was fashioned
  - he was created
  - he was appointed
  lexicon: HALOT
  rationale: נוצר likely reflects a passive form meaning 'formed/fashioned.' The Greek
    has ὃς ἐγένετο ('who became/came to be'), which is less specific. Because the
    Hebrew survives, 'was formed' follows it while remaining intelligible. The wording
    may also imply divine preparation.
- source_word: להיות בימיו
  chosen: in his days to be
  alternatives:
  - to become in his time
  - for his generation to be
  - during his days as
  lexicon: HALOT
  rationale: The phrase is awkward in English if rendered too literally. 'In his days
    to be' preserves the temporal element while connecting smoothly to the predicate
    that follows.
- source_word: תשועה גדולה
  chosen: a great salvation
  alternatives:
  - great deliverance
  - a great victory
  - great rescue
  lexicon: HALOT
  rationale: תשועה can mean salvation, deliverance, or victory. Given Joshua's military
    context and the Greek ἐπὶ σωτηρίᾳ, both 'salvation' and 'deliverance' are possible.
    'Great salvation' preserves the broader theological sense while still fitting
    the historical setting.
- source_word: לבחיריו
  chosen: for his chosen ones
  alternatives:
  - for his elect
  - for his chosen people
  - for Israel, his chosen
  lexicon: HALOT
  rationale: 'The pronominal suffix is ambiguous in English contextually: likely God''s
    chosen ones, though the immediate antecedent could be read otherwise. ''His chosen
    ones'' preserves the ambiguity and matches the Greek ἐκλεκτῶν αὐτοῦ.'
