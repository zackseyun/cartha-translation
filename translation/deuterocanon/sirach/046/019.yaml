translation:
  text: 'Even up to the time of his end, he was found faithful in the eyes of Yahweh: “I have taken a bribe and concealed it—from whose hand have I taken anything? And no one answered against him.”¹'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: Hebrew is somewhat terse here. The Greek witness reads more explicitly, 'Money, even as far as sandals, I have not taken from any flesh, and no man brought a charge against him.' The Hebrew כפר may also be understood in context as 'bribe' rather than 'ransom,' and 'no man answered against him' may mean 'no one accused him.'
    reason: alternative_reading
lexical_decisions:
- source_word: וגם עד עת קצו
  chosen: Even up to the time of his end
  alternatives:
  - And even until the time of his end
  - Before the time of his eternal sleep
  lexicon: HALOT
  rationale: The Hebrew witness is primary here and reads straightforwardly 'and also until the time of his end.' The Greek has a different, expanded formulation about 'before the time of eternal sleep,' likely interpretive. The translation follows the Hebrew while keeping the Greek in view as a secondary witness.
- source_word: נכון נמצא
  chosen: he was found faithful
  alternatives:
  - he was found steadfast
  - he was found trustworthy
  - he was found established
  lexicon: HALOT
  rationale: נכון can denote firmness, reliability, or being established. In context, describing Samuel's integrity before the LORD, 'faithful' best conveys moral reliability in idiomatic English without losing the sense of steadfastness.
- source_word: בעיני יהוה
  chosen: in the eyes of the LORD
  alternatives:
  - before the LORD
  - in the sight of the LORD
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom. 'The LORD' follows the project's default for יהוה.
- source_word: כפר
  chosen: I have taken a ransom
  alternatives:
  - I have taken a bribe
  - I have accepted compensation
  lexicon: HALOT
  rationale: The Hebrew כפר here most naturally refers to a compensatory payment or ransom. However, in this judicial-integrity context the sense overlaps with illicit payment, which the Greek paraphrases more broadly as 'money.' I retain 'ransom' in the main text because it is the more direct lexical equivalent, while preserving 'bribe' as an alternative in a footnote due to contextual plausibility.
- source_word: ונעלם
  chosen: and hidden it
  alternatives:
  - and concealed it
  - and kept it secret
  lexicon: HALOT
  rationale: The verb carries the sense of concealment. The phrase likely means taking payment and covering up the matter. 'Hidden it' is concise and natural.
- source_word: ממי לקחתי
  chosen: from whom have I taken anything?
  alternatives:
  - from whom have I taken it?
  - from whom did I take anything?
  lexicon: HALOT
  rationale: The Hebrew is elliptical after the prior clause. Supplying 'anything' makes the English intelligible while preserving the rhetorical denial of exploitation.
- source_word: וכל אדם לא ענה בו
  chosen: And no man answered against him
  alternatives:
  - and no one accused him
  - and no person brought a charge against him
  lexicon: HALOT
  rationale: ענה with ב can indicate responding against or testifying/accusing. Because the Greek explicitly has 'no man brought a charge against him,' that sense is likely correct. The main text stays somewhat closer to the Hebrew wording, with the clearer forensic sense preserved in a footnote.
