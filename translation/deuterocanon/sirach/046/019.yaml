theological_decisions:
- issue: Divine name rendering
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relation of the quoted denial to Samuel's character
  chosen_reading: Present the quotation as evidence of Samuel's integrity without expanding it into a doctrinal claim
  alternative_readings:
  - Interpret the line explicitly as a legal self-vindication against bribery
  - Harmonize fully to the Greek and make the charge monetary in general
  rationale: The verse commends Samuel's faithfulness and cites his denial of corrupt gain. The translation preserves that moral testimony without importing a more developed legal or doctrinal framework than the text itself states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
