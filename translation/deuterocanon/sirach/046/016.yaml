translation:
  text: He too called upon God when his enemies hemmed him in all around; when he offered a milk-fed lamb, Yahweh thundered from heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''when his enemies ... all around,'' but the exact form in the surviving Hebrew is difficult; the Greek parallel supports the sense ''when his enemies pressed/surrounded him all around.'''
    reason: textual_variant
  - marker: b
    text: Or 'a suckling lamb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קרא אל אל
  chosen: called upon God
  alternatives:
  - called to God
  - invoked God
  lexicon: HALOT
  rationale: The idiom קרא אל commonly means to call to/upon someone in appeal or prayer. 'Called upon' captures invocation in distress more naturally in English than the more literal 'called to.'
- source_word: כאפכה לו אויביו מסביב
  chosen: when his enemies hemmed him in all around
  alternatives:
  - when his enemies surrounded him
  - as his enemies were overturned around him
  lexicon: HALOT
  rationale: The Hebrew as transmitted is somewhat difficult, but in context and with support from the Greek ἐν τῷ θλίψαι ἐχθροὺς αὐτοῦ κυκλόθεν, the sense is distress caused by enemies surrounding him. 'Hemmed him in all around' preserves the pressure implied by the Greek and fits the likely Hebrew sense better than a wooden rendering of the uncertain form.
- source_word: בעלתו
  chosen: when he offered
  alternatives:
  - in his offering up
  - at his bringing
  lexicon: HALOT
  rationale: The form is awkward in the Hebrew witness, but the Greek ἐν προσφορᾷ clarifies a sacrificial-offering context. Rendering it verbally in English gives a natural connection to the following object, 'a milk-fed lamb.'
- source_word: טלה חלב
  chosen: a milk-fed lamb
  alternatives:
  - a suckling lamb
  - a fattened lamb
  lexicon: HALOT
  rationale: The phrase denotes a young lamb nourished on milk. 'Milk-fed lamb' is transparent and concrete; 'suckling lamb' is possible but slightly less natural in modern English.
- source_word: וירעם משמים יהוה
  chosen: the LORD thundered from heaven
  alternatives:
  - the LORD made thunder from heaven
  - the LORD roared from heaven
  lexicon: HALOT
  rationale: The verb רעם in this context refers to thunder. Following doctrine, יהוה is rendered 'the LORD.' 'Thundered from heaven' is idiomatic and preserves the divine response imagery.
