lexical_decisions:
- source_word: מה נהדר
  chosen: How glorious
  alternatives:
  - How splendid
  - How majestic
  - How honored
  lexicon: HALOT
  rationale: The Hebrew exclamatory phrase introduces admiration for Joshua's martial
    prowess. 'Glorious' fits the praise context and aligns well with the Greek ἐδοξάσθη
    ('was glorified/was honored'), while remaining natural English.
- source_word: בנטותו יד
  chosen: when he stretched out his hand
  alternatives:
  - in his extending his hand
  - when he raised his hand
  lexicon: HALOT
  rationale: The infinitive construct with suffix indicates the time/circumstance
    of the action. 'Stretched out his hand' preserves the Hebrew idiom and suits the
    military gesture in context. The Greek ἐπᾶραι χεῖρας ('to raise his hands') supports
    a bodily action of extending/raising the hand; 'stretched out' keeps the Hebrew
    primary witness in view.
- source_word: בהניפו כידון
  chosen: when he brandished a spear
  alternatives:
  - when he waved a javelin
  - when he lifted a lance
  lexicon: HALOT
  rationale: הניף conveys a waving or brandishing motion. כידון is a spear/javelin-type
    weapon. 'Brandished a spear' is idiomatic, vivid, and broad enough to cover the
    weapon term without over-specifying. The Greek ἐκκλῖναι ῥομφαίαν ('to wield/turn
    a sword') reflects a divergent weapon term, but the Hebrew witness is primary
    here.
- source_word: על עיר
  chosen: against a city
  alternatives:
  - over a city
  - toward a city
  lexicon: HALOT
  rationale: In martial context, על naturally carries hostile direction. 'Against
    a city' best conveys the military action implied by the verse.
