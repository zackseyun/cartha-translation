theological_decisions:
- issue: How explicitly to render the posthumous activity of Samuel
  chosen_reading: Keep the Hebrew's concise 'after his death he was sought out' in
    the main text, with the Greek expansion preserved in a footnote.
  alternative_readings:
  - 'Render from the Greek more explicitly: ''after he fell asleep he prophesied and
    revealed to the king his end, and lifted up his voice from the earth in prophecy,
    to blot out the lawlessness of the people'''
  rationale: The project philosophy gives primacy to the surviving Hebrew of Sirach
    where available. Here the Hebrew witness is brief, while the Greek parallel preserves
    a fuller interpretation/tradition about Samuel's posthumous prophecy. To avoid
    importing details absent from the Hebrew main witness, the main text stays with
    the Hebrew, but the Greek expansion is important enough to preserve in a footnote
    because it materially clarifies what 'was sought out' likely refers to.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    use Greek parallel as actual input without overriding Hebrew primacy.'
