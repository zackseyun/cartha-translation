translation:
  text: In the sight of every living thing—and even after his death he was sought
    out.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: 'a'
    text: 'The Greek parallel expands this: ''after he fell asleep, he prophesied
      and showed the king his end, and lifted up his voice from the earth in prophecy,
      to blot out the lawlessness of the people.'' This likely explains the Hebrew
      ''he was sought out'' as referring to Samuel being consulted after death.'
    reason: alternative_reading
lexical_decisions:
- source_word: ובעיני
  chosen: In the sight of
  alternatives:
  - before the eyes of
  - in the eyes of
  lexicon: HALOT
  rationale: The Hebrew idiom בעיני literally means 'in the eyes of,' but in English
    'in the sight of' better preserves the public, observable sense without sounding
    awkward. It also fits the honorific context of Samuel's reputation.
- source_word: כל חי
  chosen: every living thing
  alternatives:
  - all the living
  - every living being
  lexicon: HALOT
  rationale: The phrase is broad and literal. 'Every living thing' preserves the Hebrew
    scope and echoes biblical diction, though in context it refers to all living people
    who could witness his stature.
- source_word: וגם
  chosen: and even
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: וגם adds emphasis as well as coordination. 'And even' captures the climactic
    force leading into the statement about events after death.
- source_word: אחרי מותו
  chosen: after his death
  alternatives:
  - after he died
  - after his dying
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'After his death' is idiomatic and
    formally close.
- source_word: נדרש
  chosen: was sought out
  alternatives:
  - was consulted
  - was inquired of
  - was sought
  lexicon: HALOT
  rationale: The Niphal of דרש can mean 'to be sought' or 'to be consulted/inquired
    of.' Given the Greek parallel, which expands this into Samuel prophesying after
    death, the sense here is that he was sought out for inquiry beyond death. 'Was
    sought out' keeps the Hebrew concise while allowing the broader narrative implication.
