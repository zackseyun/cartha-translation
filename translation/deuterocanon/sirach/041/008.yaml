translation:
  text: Woe to you, wicked men, who have abandoned the law of the Most High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''the law of God Most High.'' The Hebrew primary witness
      reads simply ''the law of the Most High.'''
    reason: alternative_reading
  - marker: b
    text: Hebrew תורת can also be rendered 'instruction' or 'teaching,' though 'law'
      fits the covenantal sense here and is supported by the Greek νόμον.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוי / οὐαί
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT; BDAG
  rationale: Both the Hebrew and Greek open with an interjection of denunciation or
    lament. 'Woe' preserves the prophetic force better than the softer 'Alas.'
- source_word: לכם / ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT; BDAG
  rationale: The dative/addressee sense is straightforward. 'To you' is idiomatic
    in English after 'Woe.'
- source_word: אנשי / ἄνδρες
  chosen: men
  alternatives:
  - people
  - persons
  lexicon: HALOT; BDAG
  rationale: Both witnesses use a masculine plural noun meaning 'men.' Per project
    philosophy, gender-accurate rendering is preferred over neutralizing language
    where the source is grammatically masculine.
- source_word: רשע / ἀσεβεῖς
  chosen: wicked
  alternatives:
  - ungodly
  - evil
  lexicon: HALOT; BDAG
  rationale: The Hebrew points to wickedness, while the Greek emphasizes impiety/ungodliness.
    'Wicked' is broad enough to fit the Hebrew base text and still accords with the
    Greek parallel without over-specifying impiety.
- source_word: אשר / οἵτινες
  chosen: who
  alternatives:
  - you who
  lexicon: HALOT; BDAG
  rationale: A simple relative clause is the most natural English rendering. The sense
    is restrictive and explanatory.
- source_word: עזבתם / ἐγκατελίπετε
  chosen: have abandoned
  alternatives:
  - have forsaken
  - left behind
  lexicon: HALOT; BDAG
  rationale: Both verbs convey deliberate leaving or forsaking. 'Have abandoned' is
    clear modern English and preserves the moral force of covenantal disloyalty.
- source_word: תורת / νόμον
  chosen: the law
  alternatives:
  - instruction
  - teaching
  lexicon: HALOT; BDAG
  rationale: Hebrew תּוֹרָה can mean 'instruction,' but with the Greek νόμος and the
    likely covenantal sense, 'the law' is the best main-text rendering. 'Instruction'
    is worth preserving as a lexical alternative.
- source_word: עליון / θεοῦ Ὑψίστου
  chosen: the Most High
  alternatives:
  - the Most High God
  lexicon: HALOT; BDAG
  rationale: The Hebrew has simply 'Most High,' while the Greek expands to 'God Most
    High.' Since the Hebrew is the primary witness here, 'the Most High' best reflects
    the source while remaining fully intelligible in English.
