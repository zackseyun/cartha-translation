theological_decisions:
- issue: Divine title עליון in relation to Greek θεοῦ Ὑψίστου
  chosen_reading: the Most High
  alternative_readings:
  - the Most High God
  rationale: The Hebrew witness is primary for extant Sirach Hebrew, and it lacks
    an explicit 'God' here. The Greek parallel likely makes explicit what is implicit
    in the Hebrew. To avoid importing an extra word into the main text, the shorter
    Hebrew-based title is retained, with the Greek-supported expansion noted as an
    alternative.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    source-based wording without importing claims not explicit in the primary witness.
