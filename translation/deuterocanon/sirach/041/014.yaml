translation:
  text: Hidden wisdom and a concealed treasure—what benefit is in either of them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'what benefit is there in both of them?' The English 'either
      of them' brings out the rhetorical sense in natural English.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel adds an introductory line: ''Keep instruction in peace,
      children,'' before ''hidden wisdom and an unseen treasure…'' The Hebrew witness
      used for the main translation begins with this line about hidden wisdom.'
    reason: textual_variant
lexical_decisions:
- source_word: חכמה
  chosen: wisdom
  alternatives:
  - skill
  - instruction
  lexicon: HALOT
  rationale: The Hebrew plainly denotes wisdom here, matching the Greek σοφία. 'Instruction'
    is less suitable in this proverb-like saying about something valuable kept hidden.
- source_word: טמונה
  chosen: hidden
  alternatives:
  - stored away
  - buried
  - concealed
  lexicon: HALOT
  rationale: The participle conveys something kept hidden or tucked away. 'Hidden'
    is concise and idiomatic; 'buried' would over-specify, while 'concealed' is preserved
    as an alternative.
- source_word: אוצר
  chosen: treasure
  alternatives:
  - storehouse
  - hoard
  lexicon: HALOT
  rationale: In parallel with wisdom, the sense is the valuable thing itself, not
    primarily the place of storage. The Greek θησαυρός supports 'treasure'.
- source_word: מוסתר
  chosen: concealed
  alternatives:
  - hidden
  - unseen
  lexicon: HALOT
  rationale: Using 'concealed' for the second colon preserves the poetic parallel
    without repeating 'hidden' exactly. The Greek ἀφανής suggests something not visible
    or not apparent; 'concealed' fits the Hebrew and reads naturally.
- source_word: מה תועלה
  chosen: what benefit is there
  alternatives:
  - what profit is there
  - what use is there
  lexicon: HALOT
  rationale: This idiom asks about practical advantage or profit. 'What benefit is
    there' is natural modern English and preserves the rhetorical force.
- source_word: בשתיהם
  chosen: in either of them
  alternatives:
  - in both of them
  - in the two of them
  lexicon: HALOT
  rationale: Hebrew 'in both of them' and Greek ἐν ἀμφοτέροις literally point to the
    pair together, but idiomatic English in this rhetorical question is better expressed
    as 'in either of them?' meaning 'what benefit is there in either one, if hidden?'
    This preserves the sense that both hidden wisdom and concealed treasure are useless
    when not brought forth.
