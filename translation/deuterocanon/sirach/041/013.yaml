translation:
  text: The good of life is a limited number of days, but the good of a name is days
    without number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and a good name will remain forever.'''
    reason: alternative_reading
  - marker: b
    text: '''Name'' here carries the sense of one''s reputation or remembered honor,
      not merely a personal label.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טובת
  chosen: The good of
  alternatives:
  - Better is
  - The goodness of
  - The benefit of
  lexicon: HALOT
  rationale: The Hebrew noun phrase literally speaks of the 'good(ness)/good thing
    of' life and of a name. Rendering it as 'The good of' preserves the parallel structure
    of the Hebrew and avoids importing the comparative sense ('better is') that is
    not explicit in this wording, even though the verse has proverbial force.
- source_word: חי
  chosen: life
  alternatives:
  - living
  - a living person
  lexicon: HALOT
  rationale: In this context the noun is best taken abstractly as 'life,' matching
    the Greek ζωῆς and fitting the contrast between lifespan and enduring reputation.
- source_word: ימי מספר
  chosen: a limited number of days
  alternatives:
  - numbered days
  - few days
  - days that can be counted
  lexicon: HALOT
  rationale: The Hebrew literally means 'days of number,' i.e., days that are countable/limited.
    'A limited number of days' communicates the idiom clearly in modern English while
    preserving the contrast with 'days without number.'
- source_word: שם
  chosen: name
  alternatives:
  - reputation
  - renown
  lexicon: HALOT
  rationale: Hebrew 'name' often carries the sense of reputation or remembered identity.
    The main text keeps the concrete 'name' to preserve the Hebrew imagery and the
    proverb's terseness; the reputational nuance is implicit.
- source_word: ימי אין מספר
  chosen: days without number
  alternatives:
  - countless days
  - days beyond counting
  - forever
  lexicon: HALOT
  rationale: The Hebrew literally says 'days of no number.' This is rendered closely
    as 'days without number.' The Greek parallel interprets the sense as enduring
    'forever,' but the Hebrew idiom is retained in the main text for source primacy
    while the Greek's more explicit sense is preserved in a footnote.
