theological_decisions:
- issue: Gendered address בנים
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The Hebrew directly addresses 'sons' in wisdom-teaching style. Following
    doctrine, the masculine form is retained rather than neutralized, since the source
    wording is explicit and representative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Primary witness vs. Greek divergence in the second colon
  chosen_reading: Follow the Hebrew wording in the main text
  alternative_readings:
  - 'Reflect the Greek more closely: ''for it is not good to preserve every shame,
    and not everything is approved by all in faith'''
  rationale: The Hebrew witness is present and high-confidence, so it has primacy
    for Sirach where extant. The Greek parallel is used as a consistency check, but
    here it diverges notably in the final clause and likely reflects a different textual
    development. The main text therefore follows the Hebrew, with the Greek alternative
    preserved in a footnote.
  doctrine_reference: PHILOSOPHY.md §What we are translating; §transparent actually
    means
