translation:
  text: 'Instruction about shame: hear, sons, and be ashamed according to my judgments.
    Not every shame is fitting to keep, and not every disgrace is rightly chosen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Therefore be ashamed at my word; for it is not good to
      preserve every shame, and not everything is approved by all in faith.'' The
      Greek final clause differs notably from the extant Hebrew.'
    reason: alternative_reading
  - marker: b
    text: '''Sons'' renders the masculine Hebrew address and preserves the wisdom-teacher''s
      form of speech.'
    reason: cultural_note
lexical_decisions:
- source_word: מוסר
  chosen: Instruction
  alternatives:
  - Discipline
  - Correction
  lexicon: HALOT
  rationale: In wisdom literature מוסר commonly denotes formative instruction/discipline.
    Here, followed by 'hear, sons,' it introduces admonition rather than punitive
    chastisement, so 'Instruction' best fits the discourse opening.
- source_word: בשת
  chosen: shame
  alternatives:
  - disgrace
  - embarrassment
  lexicon: HALOT
  rationale: The Hebrew noun refers to shame/disgrace. 'Shame' is the broadest and
    best matches the Greek αἰσχύνη. A second English term 'disgrace' is used later
    for stylistic differentiation where the Hebrew shifts form, but the core semantic
    field is preserved.
- source_word: שמעו בנים
  chosen: hear, sons
  alternatives:
  - listen, sons
  - hear, children
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'sons.' Per doctrine, gender-accurate
    rendering is preferred over neutralizing to 'children.' 'Hear' preserves the wisdom-instruction
    register.
- source_word: והכלמו
  chosen: be ashamed
  alternatives:
  - be put to shame
  - feel shame
  lexicon: HALOT
  rationale: 'The niphal/hithpael-like sense here is exhortative: the hearers are
    told to experience shame in appropriate cases. ''Be ashamed'' is idiomatic and
    aligns with the Greek ἐντράπητε.'
- source_word: על משפטי
  chosen: according to my judgments
  alternatives:
  - at my judgments
  - by my rules
  - because of my words
  lexicon: HALOT
  rationale: The Hebrew reads 'upon/according to my judgments,' while the Greek has
    'at my word.' Since the Hebrew is the primary witness here and is high-confidence,
    'according to my judgments' preserves משפטי as evaluative standards or rulings.
    The Greek parallel suggests an admonitory sense, supporting a less wooden English
    preposition.
- source_word: לא כל בשת נאה לשמור
  chosen: Not every shame is fitting to keep
  alternatives:
  - Not every shame is good to preserve
  - It is not proper to retain every shame
  lexicon: HALOT
  rationale: נאה conveys what is fitting/appropriate; לשמור literally 'to keep, preserve.'
    The line teaches that some shame is proper and some is not; 'fitting to keep'
    preserves the metaphor of retaining shame without over-paraphrase.
- source_word: ולא כל הכלם נבחר
  chosen: and not every disgrace is rightly chosen
  alternatives:
  - and not every humiliation is to be preferred
  - and not every shame is commendable
  lexicon: HALOT
  rationale: הכלם denotes shame/disgrace/humiliation; נבחר means chosen/selected,
    hence approved or preferable. 'Rightly chosen' keeps the selection metaphor while
    making the ethical sense clear in English. The Greek's 'not everything is approved
    by all in faith' appears to reflect a divergent or expanded text, so the Hebrew
    wording governs the main translation.
