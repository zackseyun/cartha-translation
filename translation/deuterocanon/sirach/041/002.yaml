theological_decisions:
- issue: Use of Hebrew as primary witness with Greek parallel where the Hebrew is
    textually difficult and marked major_mismatch
  chosen_reading: Main text follows the extant Hebrew structure and key terms, with
    Greek used to clarify obscure clauses and support the direct address to death.
  alternative_readings:
  - A fuller Greek-based rendering would include additional descriptors such as 'very
    old' or 'distracted about all things'.
  rationale: Project policy gives primacy to the Hebrew where it survives in Sirach,
    but the Greek must be used as actual translation input. Here the Hebrew is extant
    yet somewhat unstable; therefore the translation keeps the Hebrew's core wording
    while allowing the Greek to inform ambiguous phrases.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives in Sirach;
    use Greek parallel as input'
- issue: Evaluation of death as 'good'
  chosen_reading: Rendered as 'fitting' rather than 'good' in English.
  alternative_readings:
  - good
  - welcome
  rationale: The verse does not make a broad theological claim that death is morally
    good in itself; it says death's decree/judgment is appropriate for one crushed
    by weakness and despair. 'Fitting' preserves the contextual force without overstating
    the theology.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
