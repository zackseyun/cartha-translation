  parallel_sources:
  - edition: lxx-swete-1909
    text: ὦ θάνατε, καλὸν σου τὸ κρίμα ἐστὶν ἀνθρώπῳ ἐπιδεομένῳ καὶ ἐλασσουμένῳ ἰσχύϊ,
      ἐσχατογήρῳ καὶ περισπωμένῳ περὶ πάντων, καὶ ἀπειθοῦντι καὶ ἀπολωλεκότι ὑπομονήν.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 41:2
translation:
  text: O death, how fitting is your sentence for a man who is needy and lacking strength,
    stumbling in everything, stubborn, and having lost hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''your judgment is good''; Hebrew: ''your decree/statute is good.''
      The English ''sentence'' reflects the overlap of appointed decree and judicial
      judgment.'
    reason: alternative_reading
  - marker: b
    text: The Greek witness expands this description with terms such as 'very old'
      and 'troubled about everything,' where the surviving Hebrew is shorter and somewhat
      difficult.
    reason: textual_variant
  - marker: c
    text: 'Hebrew: ''having lost hope''; Greek: ''having lost endurance'' or ''patience.'''
    reason: lexical_alternative
  - marker: d
    text: Masada preserves a related but fragmentary Hebrew form in this context and
      differs from the Cairo Geniza wording at several points, confirming textual
      instability in the verse.
    reason: textual_variant
lexical_decisions:
- source_word: האח / ὦ
  chosen: O
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT / LSJ
  rationale: The Hebrew exclamatory opening is difficult in the transmitted text,
    but the Greek vocative particle ὦ clearly addresses death directly. 'O' preserves
    the elevated apostrophe without adding lament beyond the source.
- source_word: למות / θάνατε
  chosen: death
  alternatives:
  - Death
  lexicon: HALOT / LSJ
  rationale: Direct address to death is explicit in both Hebrew and Greek. Lowercase
    'death' is retained in English while still functioning vocatively.
- source_word: כי טוב חקיך / καλὸν σου τὸ κρίμα
  chosen: how fitting is your sentence
  alternatives:
  - how good is your decree
  - how good is your judgment
  - how fitting is your judgment
  lexicon: HALOT / LSJ
  rationale: The Hebrew reads 'for good is your statute/decree,' while the Greek has
    'your judgment/sentence is good.' Because the witnesses diverge somewhat and the
    verse speaks of death's appointed lot for the miserable person, 'sentence' captures
    the judicial nuance of κρίμα and the decretive force of חק in idiomatic English.
    'Fitting' avoids implying moral goodness in a context of death's appropriateness
    for the suffering person.
- source_word: לאיש אונים / ἀνθρώπῳ ἐπιδεομένῳ
  chosen: for a man who is needy
  alternatives:
  - for a needy man
  - for a man in want
  lexicon: HALOT / LSJ
  rationale: The Hebrew phrase is textually difficult, but both witnesses point to
    a person in need or reduced condition. 'Man' follows the singular איש and the
    project's gender-accurate policy.
- source_word: וחסר עצמה / καὶ ἐλασσουμένῳ ἰσχύϊ
  chosen: and lacking strength
  alternatives:
  - and diminished in strength
  - and without power
  lexicon: HALOT / LSJ
  rationale: Both Hebrew and Greek agree on weakness or loss of strength. 'Lacking
    strength' is natural modern English and preserves the physical/existential frailty.
- source_word: איש כושל / περισπωμένῳ περὶ πάντων
  chosen: stumbling
  alternatives:
  - failing
  - troubled
  - harassed
  lexicon: HALOT / LSJ
  rationale: The Hebrew explicitly has 'a stumbling man,' while the Greek expands
    to one 'distracted/troubled about everything.' 'Stumbling' keeps the Hebrew image
    and can encompass the broader sense of faltering under life's burdens.
- source_word: ינקש בכל / περὶ πάντων
  chosen: in everything
  alternatives:
  - at every step
  - about everything
  lexicon: HALOT / LSJ
  rationale: The Hebrew clause is obscure, but the sense is comprehensive adversity
    or failure. The Greek supports a broad scope. 'In everything' is concise and compatible
    with both witnesses.
- source_word: סורב / ἀπειθοῦντι
  chosen: defiant
  alternatives:
  - disobedient
  - rebellious
  - unpersuaded
  lexicon: HALOT / LSJ
  rationale: The Greek clearly means one who refuses compliance; the Hebrew likely
    points in a similar direction. 'Defiant' conveys stubborn resistance in readable
    English.
- source_word: ואובד תקוה / ἀπολωλεκότι ὑπομονήν
  chosen: and having lost hope
  alternatives:
  - and having lost endurance
  - and despairing
  lexicon: HALOT / LSJ
  rationale: The Hebrew says 'lost hope,' while the Greek says 'lost endurance/patience.'
    Because the base Hebrew witness survives here, the main text follows 'hope,' while
    the Greek alternative is preserved in a footnote.
