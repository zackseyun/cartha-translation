theological_decisions:
- issue: Gendered singular אדם/איש language
  chosen_reading: to a man ... to a man
  alternative_readings:
  - to one ... to one
  - to a person ... to a person
  rationale: The source uses masculine singular terms generically. Per doctrine, gender-accurate
    rendering is preferred over flattening to gender-neutral language when the source
    presents representative masculine singular.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Use of Hebrew as primary with Greek parallel to clarify uncertain phrase
  chosen_reading: Main text follows the Hebrew witness, with the Greek parallel informing
    ambiguous clauses, especially the final phrase about enjoying food.
  alternative_readings:
  - A more strictly Hebrew rendering could preserve 'receive pleasure' without specifying
    food.
  rationale: For Sirach, surviving Hebrew has primacy, but the prompt requires the
    Greek parallel to be used as actual translation input. Here the Greek helps resolve
    a likely idiomatic or textually uncertain Hebrew expression without displacing
    the Hebrew base.
  doctrine_reference: PHILOSOPHY.md 'What we are translating' and task requirement
    on parallel sources
