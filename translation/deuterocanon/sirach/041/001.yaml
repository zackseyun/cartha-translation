translation:
  text: O death, how bitter is your remembrance to a man at ease in his possessions,
    to a man untroubled and prospering in everything, and still strong enough to enjoy
    food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''still having strength to receive pleasure''; the Greek parallel
      reads more specifically, ''still strong enough to receive food.'' The translation
      follows the likely sense reflected by the Greek.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew phrase rendered 'at ease in his possessions' is somewhat uncertain;
      the Greek parallel supports the sense of a man living in peace with what he
      has.
    reason: textual_variant
lexical_decisions:
- source_word: מה מר זכרך / ὡς πικρόν σου τὸ μνημόσυνόν
  chosen: how bitter is your remembrance
  alternatives:
  - how bitter is the memory of you
  - how bitter is your mention
  lexicon: HALOT; BDAG
  rationale: The Hebrew זכרך and Greek μνημόσυνον both point to remembrance/memory
    rather than death itself being called bitter in the abstract. 'Remembrance' preserves
    the direct address to death and the reflective sense of recalling it.
- source_word: לאיש שוקט על מכונתו / ἀνθρώπῳ εἰρηνεύοντι ἐν τοῖς ὑπάρχουσιν αὐτοῦ
  chosen: to a man at ease in his possessions
  alternatives:
  - to a man at rest in his station
  - to a man living securely in what he has
  lexicon: HALOT; BDAG
  rationale: The Hebrew phrase is somewhat uncertain, but in light of the Greek parallel
    it refers to a person living in peace/security with his means. 'At ease in his
    possessions' balances the Hebrew wording with the clearer Greek witness.
- source_word: איש שליו / ἀνδρὶ ἀπερισπάστῳ
  chosen: to a man untroubled
  alternatives:
  - to a carefree man
  - to a man free from distraction
  lexicon: HALOT; BDAG
  rationale: Hebrew שליו suggests ease, tranquility, or carefree security. The Greek
    ἀπερίσπαστος adds the nuance of being undisturbed/unencumbered. 'Untroubled' captures
    both without sounding colloquial.
- source_word: ומצליח בכל / καὶ εὐοδουμένῳ ἐν πᾶσιν
  chosen: and prospering in everything
  alternatives:
  - and successful in all things
  - and doing well in everything
  lexicon: HALOT; BDAG
  rationale: Both Hebrew and Greek indicate broad success. 'Prospering in everything'
    is natural English and preserves the comprehensive scope.
- source_word: ועוד בו חיל לקבל תענוג / καὶ ἔτι ἰσχύοντι ἐπιδέξασθαι τροφήν
  chosen: and still strong enough to enjoy food
  alternatives:
  - and still having strength to receive nourishment
  - and still able to take his pleasure
  lexicon: HALOT; BDAG
  rationale: 'The Hebrew text reads ''strength to receive pleasure,'' while the Greek
    specifies ''to receive food/nourishment.'' Because the Hebrew is somewhat awkward
    and the Greek parallel is explicit, ''enjoy food'' best reflects the likely sense:
    one still vigorous enough to take life''s ordinary pleasures, especially eating.'
