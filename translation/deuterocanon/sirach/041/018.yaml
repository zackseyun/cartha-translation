translation:
  text: Before a master and mistress, be ashamed of a lie; before an assembly and
    the people, of transgression; before a companion and a friend, of wrongdoing;
    and where you sojourn, of theft.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'master and mistress'; the Greek parallel has 'judge and ruler.'
      The main text follows the Hebrew as the primary witness for extant Hebrew Sirach.
    reason: textual_variant
  - marker: b
    text: Hebrew מעל can also be rendered 'trespass' or 'breach of trust.'
    reason: lexical_alternative
  - marker: c
    text: 'The final Hebrew phrase is difficult: literally something like ''from/at
      the place where you dwell, concerning זר.'' The Greek parallel points toward
      ''theft/stealing,'' which is reflected in the main text.'
    reason: textual_variant
lexical_decisions:
- source_word: מאדון וגברת
  chosen: Before a master and mistress
  alternatives:
  - From a judge and ruler
  - Before a lord and lady
  lexicon: HALOT
  rationale: The Hebrew witness is primary here and clearly reads 'from/before a master
    and mistress.' In this shame-list context, מן/מ־ with persons is best carried
    idiomatically as 'before' rather than a wooden 'from.' The Greek parallel reflects
    a different reading ('judge and ruler'), but the Hebrew is the most original available
    witness for this verse.
- source_word: על שקר
  chosen: of a lie
  alternatives:
  - concerning falsehood
  - for lying
  lexicon: HALOT
  rationale: With the repeated pattern of persons + על + offense, the sense is what
    one should be ashamed of in relation to them. 'Of a lie' is concise and natural
    English while preserving the noun.
- source_word: מעדה ועם
  chosen: before an assembly and the people
  alternatives:
  - before a congregation and people
  - from assembly and people
  lexicon: HALOT
  rationale: עדה commonly denotes an assembly/congregation. 'Assembly' is chosen for
    broad readability and to avoid importing specifically cultic overtones not required
    by the context.
- source_word: על פשע
  chosen: of transgression
  alternatives:
  - of offense
  - of rebellion
  lexicon: HALOT
  rationale: פשע often carries the sense of transgression or breach. 'Transgression'
    preserves the moral weight better than the flatter 'offense.'
- source_word: מחבר ורע
  chosen: before a companion and a friend
  alternatives:
  - before an associate and friend
  - before a partner and friend
  lexicon: HALOT
  rationale: The pair denotes close social relations. 'Companion and friend' preserves
    the parallelism without over-specifying legal or commercial partnership.
- source_word: על מעל
  chosen: of wrongdoing
  alternatives:
  - of trespass
  - of unfaithfulness
  lexicon: HALOT
  rationale: מעל can denote breach of trust or trespass. Because the immediate social
    context is interpersonal rather than explicitly cultic, 'wrongdoing' is the most
    natural broad rendering, while preserving more specific alternatives in a footnote.
- source_word: וממקום תגור
  chosen: and where you live
  alternatives:
  - and from the place where you sojourn
  - and before your dwelling place
  lexicon: HALOT
  rationale: The Hebrew is somewhat awkward, but likely refers to one's place of residence
    or neighborhood. The verb/root behind תגור suggests sojourning/dwelling. 'Where
    you live' gives the probable sense in clear English without overcommitting to
    a technical nuance.
- source_word: על זר
  chosen: of theft
  alternatives:
  - of a strange thing
  - of a stranger
  - of alien property
  lexicon: HALOT
  rationale: The Hebrew reading is difficult. The Greek parallel supports a sense
    related to theft ('from a place ... about stealing'). In context, the final item
    in the shame-list most plausibly concerns stealing, likely from what belongs to
    another/what is alien. 'Of theft' best captures the likely sense while acknowledging
    the lexical difficulty in a footnote.
