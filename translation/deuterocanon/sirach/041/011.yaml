theological_decisions:
- issue: Divergence between the Hebrew primary witness and the Greek parallel in the
    second clause
  chosen_reading: 'Follow the Hebrew: ''a name of kindness will not be cut off'''
  alternative_readings:
  - 'Greek parallel: ''the name of sinners will not be blotted out for good'' / ''will
    not be blotted out as good'''
  rationale: For Sirach, surviving Hebrew is primary where extant. The Hebrew presents
    a positive contrast between the fleeting body and enduring good reputation, while
    the Greek parallel reflects a substantially different, negative wording. Because
    the Hebrew witness is high-confidence and validated, the main text follows it,
    while the Greek alternative is preserved in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    genuine tension rather than silently resolve it.'
