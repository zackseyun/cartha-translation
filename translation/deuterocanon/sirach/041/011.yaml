translation:
  text: A man's body is vanity, but a gracious name will not be cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''the name of sinners will not be blotted out as good''
      (or ''for good''). The Hebrew witness instead reads, ''a name of kindness will
      not be cut off.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הבל
  chosen: vanity
  alternatives:
  - breath
  - vapor
  - emptiness
  lexicon: HALOT
  rationale: The Hebrew noun commonly denotes transience or insubstantiality. 'Vanity'
    preserves the wisdom-literature resonance and fits the predication about the human
    body as fleeting. 'Breath' or 'vapor' are possible but sound more concrete here
    than the aphoristic sense warrants.
- source_word: אדם
  chosen: a man
  alternatives:
  - humankind
  - a human being
  lexicon: HALOT
  rationale: The singular construct with the following singular suffix and noun yields
    a proverbial singular. Per project philosophy, a gender-accurate singular 'a man'
    is retained rather than flattening to an abstract plural, while the sense remains
    representative.
- source_word: בגויתו
  chosen: body
  alternatives:
  - corpse
  - frame
  lexicon: HALOT
  rationale: The noun גויה can denote body or corpse. In this wisdom saying, 'body'
    best matches the contrast with enduring reputation and aligns with the Greek σῶμασιν
    as a consistency check. 'Corpse' would over-specify death in the clause.
- source_word: אך
  chosen: but
  alternatives:
  - surely
  - only
  - indeed
  lexicon: HALOT
  rationale: Here it marks contrast between bodily transience and enduring reputation,
    so adversative 'but' best conveys the discourse function.
- source_word: שם
  chosen: name
  alternatives:
  - reputation
  - renown
  lexicon: HALOT
  rationale: '''Name'' is the literal and biblically resonant term, while naturally
    carrying the sense of reputation in context. The more interpretive alternatives
    are therefore left implicit rather than promoted to the main text.'
- source_word: חסד
  chosen: kindness
  alternatives:
  - steadfast love
  - mercy
  - goodness
  lexicon: HALOT
  rationale: The Hebrew here qualifies the enduring 'name' positively. 'Kindness'
    is accessible modern English and suits a human quality or reputation. The Greek
    parallel has 'of sinners' in a negative formulation, but the Hebrew witness is
    primary here and supports a positive contrast; 'steadfast love' would sound overly
    covenantal in this context.
- source_word: לא יכרת
  chosen: will not be cut off
  alternatives:
  - will not perish
  - will not be blotted out
  lexicon: HALOT
  rationale: The Niphal/Qal passive-like sense of כרת is literally 'be cut off.' This
    preserves the Hebrew idiom and contrasts well with bodily transience. The Greek
    parallel's ἐξαλειφθήσεται suggests 'be blotted out,' but the Hebrew wording is
    distinct and should govern the main text.
