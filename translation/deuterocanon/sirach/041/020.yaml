theological_decisions:
- issue: Textual and semantic uncertainty in the Hebrew line versus the Greek parallel
  chosen_reading: Translate the Hebrew as an admonition about refusing a request and
    turning away anger from one's neighbor, while preserving the Greek's substantially
    different reading in a footnote.
  alternative_readings:
  - 'Greek: ''and from greeting about silence, from looking at a woman who is a companion/courtesan'''
  - 'A more literal but opaque Hebrew rendering: ''from withholding the gift of a
    request, from turning back the anger of your neighbor'''
  rationale: Zone 1 marks the Hebrew with major mismatch, and the Greek parallel diverges
    sharply. Because the project gives primacy to the surviving Hebrew of Sirach where
    extant, the main text follows the Hebrew witness, but the instability must be
    made transparent. The English is therefore cautious and idiomatic rather than
    overconfidently precise.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; preserve source uncertainty
    honestly'
