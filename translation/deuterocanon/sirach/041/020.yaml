translation:
  text: Be ashamed of refusing a request, and of turning away your anger from your
    neighbor.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew here is uncertain and differs markedly from the Greek, which
      reads approximately: ''and from greeting in a matter of silence, and from looking
      at a woman who is a companion/courtesan.'' The main text follows the surviving
      Hebrew witness, but the divergence is significant.'
    reason: alternative_reading
lexical_decisions:
- source_word: ממנוע
  chosen: of refusing
  alternatives:
  - of withholding
  - of preventing
  lexicon: HALOT
  rationale: מן + noun/infinitive from מנע conveys withholding or refusing. In context
    with 'gift/request,' 'refusing' gives the clearest idiomatic English while preserving
    the sense of denying what is asked.
- source_word: מתת
  chosen: a request
  alternatives:
  - a gift
  - giving
  lexicon: HALOT
  rationale: 'The Hebrew as transmitted is difficult: מתת normally suggests ''gift/giving,''
    but in the collocation with שאלה and in light of the Greek parallel, the phrase
    points to the matter of a request or petition. Rendering it with the sense governed
    by שאלה best reflects the likely force of the line without woodenly preserving
    an opaque wording.'
- source_word: שאלה
  chosen: request
  alternatives:
  - petition
  - loan
  lexicon: HALOT
  rationale: שאלה commonly means a request or petition; although it can mean a loan
    in some contexts, that sense is unlikely here. 'Request' is natural and broad.
- source_word: מהשב
  chosen: of turning away
  alternatives:
  - of turning back
  - of restraining
  lexicon: HALOT
  rationale: From שוב/השיב, the phrase likely means causing something to turn back
    or away. With 'anger' as object, 'turning away' is the most coherent English expression.
- source_word: אפי
  chosen: your anger
  alternatives:
  - your wrath
  - your nose/face
  lexicon: HALOT
  rationale: אף idiomatically means anger/wrath. The 1cs suffix spelling in the transmitted
    text is likely orthographic or corrupt in context; the sense required is the addressee's
    anger. 'Anger' is more readable than 'wrath' and fits optimal equivalence.
- source_word: רעך
  chosen: your neighbor
  alternatives:
  - your companion
  - your fellow
  lexicon: HALOT
  rationale: רע commonly denotes one's fellow or neighbor. 'Neighbor' preserves the
    ethical/social force familiar in biblical English without being archaic.
