theological_decisions:
- issue: Rendering of the afterlife term שאול / ᾅδης
  chosen_reading: Sheol
  alternative_readings:
  - Hades
  - the grave
  rationale: Because Hebrew survives for this verse and uses שאול, 'Sheol' best preserves
    the source-world concept without importing later Greek or flattened English associations.
    'Hades' reflects the Greek parallel and is preserved as an alternative.
  doctrine_reference: 'PHILOSOPHY.md: translate directly from Hebrew where Sirach
    survives; preserve source concepts transparently'
- issue: How to handle the tension between Hebrew 'law' wording and Greek 'good pleasure'
    wording in the rhetorical question
  chosen_reading: the decree of the Most High
  alternative_readings:
  - the law of the Most High
  - the good pleasure of the Most High
  - the will of the Most High
  rationale: The witnesses diverge at a meaningful lexical point. Rather than force
    a narrow doctrinal reading from either witness, the main text uses a mediating
    term that fits the context of accepting mortality as divinely appointed, while
    the alternatives are preserved in footnotes for auditability.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
