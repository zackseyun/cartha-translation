translation:
  text: This is the lot of all flesh from God, so why reject the decree of the Most
    High? Whether for a thousand years, or a hundred, or ten, there is no rebuke of
    life in Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'from God'; the Greek parallel reads 'from the Lord.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew text appears to read 'the law of the Most High,' while the Greek
      parallel has 'the good pleasure of the Most High.' The main text's 'decree'
      reflects the sense of what the Most High has ordained in context.
    reason: alternative_reading
  - marker: c
    text: The number sequence is textually difficult in the Hebrew witness; the Greek
      parallel reads 'whether ten or a hundred or a thousand years.'
    reason: textual_variant
  - marker: d
    text: Greek has 'Hades'; the Hebrew witness supports 'Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זה חלק כל בשר / τοῦτό τὸ κρίμα ... πάσῃ σαρκί
  chosen: This is the lot of all flesh
  alternatives:
  - This is the judgment for all flesh
  - This is the fate of every mortal
  lexicon: HALOT; BDAG/LXX lexica
  rationale: The Hebrew primary witness has 'this is the portion/lot of all flesh
    from God,' while the Greek parallel has 'this is the judgment from the Lord for
    all flesh.' 'Lot' best reflects Hebrew חלק, while 'all flesh' preserves the idiom
    for mortal humanity and remains supported by the Greek πάσῃ σαρκί. 'Judgment'
    is preserved as an alternative because of the Greek.
- source_word: מאל / παρὰ Κυρίου
  chosen: from God
  alternatives:
  - from the Lord
  lexicon: HALOT; BDAG/LXX lexica
  rationale: The Hebrew witness reads מאל ('from God'), whereas the Greek has 'from
    the Lord.' Since Hebrew is primary where extant, 'from God' is preferred. The
    Greek-supported alternative is preserved in a footnote.
- source_word: תמאס / ἀπαναίνῃ
  chosen: reject
  alternatives:
  - despise
  - refuse
  lexicon: HALOT; BDAG
  rationale: Hebrew מאס commonly means reject/despise. 'Reject' is idiomatic modern
    English and fits the rhetorical question. Greek ἀπαναίνῃ likewise supports the
    sense of refusing.
- source_word: בתורת עליון / ἐν εὐδοκίᾳ Ὑψίστου
  chosen: the decree of the Most High
  alternatives:
  - the law of the Most High
  - the good pleasure of the Most High
  - the will of the Most High
  lexicon: HALOT; BDAG
  rationale: The Hebrew text as transmitted reads בתורת עליון ('in/with the law of
    the Most High'), but the Greek reads 'in the good pleasure of the Most High,'
    and the Hebrew line is textually difficult. A rendering like 'decree' captures
    the sense of an ordained divine determination in context, bridging the Hebrew
    legal term and the Greek volitional term without overcommitting to either. Alternatives
    are preserved in footnotes due to source uncertainty.
- source_word: לאלף שנים מאה ועשר / εἴτε δέκα εἴτε ἑκατὸν εἴτε χίλια ἔτη
  chosen: Whether for a thousand years, or a hundred, or ten
  alternatives:
  - Whether ten, or a hundred, or a thousand years
  lexicon: HALOT; BDAG
  rationale: The Hebrew sequence appears to read 'for a thousand years, a hundred
    and ten,' while the Greek clearly gives the triad 'ten or a hundred or a thousand
    years.' Because the Hebrew is awkward and the Greek likely preserves the intended
    sense, the translation follows the Greek's numerical contrast while keeping the
    Hebrew's mention of thousand and hundred in view. This is a materially uncertain
    place and is footnoted.
- source_word: איש תוכחות בשאול חיים / οὐκ ἔστιν ἐν ᾅδου ἔλεγμὸς ζωῆς
  chosen: there is no rebuke of life in Sheol
  alternatives:
  - there is no reproof in Sheol concerning life
  - in Sheol there is no accounting for life
  lexicon: HALOT; BDAG
  rationale: 'The Greek phrase is relatively clear: ''there is no rebuke/reproof of
    life in Hades.'' The Hebrew is difficult but appears to contain תוכחות (''rebukes/reproofs'')
    and שאול חיים (''Sheol'' and ''life''). ''Rebuke of life'' is somewhat literal
    and preserves the terse, difficult character of the source rather than paraphrasing
    into a smoother but less auditable interpretation. ''Sheol'' is retained rather
    than ''Hades'' because the Hebrew witness is primary and the Semitic concept should
    be preserved.'
