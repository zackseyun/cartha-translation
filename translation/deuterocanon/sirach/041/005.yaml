theological_decisions:
- issue: Use of Hebrew Cairo Geniza text with Greek parallel where the Hebrew line
    is somewhat difficult
  chosen_reading: Translate primarily from the Hebrew, with the Greek used as a control
    confirming the verse's strongly negative judgment on the offspring of the ungodly/foolish.
  alternative_readings:
  - A Greek-led rendering such as 'Abominable children are the children of sinners,
    and they keep company in the settlements of the ungodly.'
  rationale: Project policy gives primacy to the surviving Hebrew of Sirach where
    extant. Here the Hebrew is present but contains a difficult phrase (דבר רעים).
    The Greek differs notably in wording, especially in the second colon. The draft
    therefore stays anchored in the Hebrew while allowing the Greek to confirm tone
    and general sense rather than override the extant Hebrew witness.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    use Greek parallel as actual input without displacing Hebrew primacy.'
