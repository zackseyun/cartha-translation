translation:
  text: The children of the despised are an evil thing, and the offspring of a fool
    are in the terror of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is difficult in the first line; the Greek parallel reads more like,
      'Abominable children are the children of sinners.'
    reason: alternative_reading
  - marker: b
    text: The Greek parallel differs more strongly in the second line, reading approximately,
      'and they keep company in the dwellings of the ungodly.'
    reason: alternative_reading
  - marker: c
    text: The older Masada witness for this area is fragmentary here; the Cairo Geniza
      Hebrew provides the main readable wording for this verse.
    reason: textual_variant
lexical_decisions:
- source_word: נין
  chosen: Children
  alternatives:
  - Offspring
  - Descendants
  lexicon: HALOT
  rationale: Hebrew נין denotes progeny/descendants. 'Children' is natural English
    and fits the parallel with נכד, while still conveying offspring rather than a
    specific age group.
- source_word: נמאס
  chosen: of the despised
  alternatives:
  - despised
  - rejected
  - loathsome
  lexicon: HALOT
  rationale: 'Taken adjectivally/passively with נין: the children belong to or come
    from one who is despised. The Greek βδελυρά supports a strongly negative sense,
    but the Hebrew points more naturally to ''despised'' than to ''abominable'' as
    a direct predicate of the children.'
- source_word: דבר רעים
  chosen: are an evil thing
  alternatives:
  - are a bad matter
  - are spoken of by evildoers
  lexicon: HALOT
  rationale: 'The Hebrew is difficult and likely somewhat unstable. Reading דבר in
    the sense ''thing/matter'' yields a coherent line: ''Children of the despised
    are an evil thing.'' The Greek has ''abominable children become children of sinners,''
    which confirms a strongly negative predicate though not the exact Hebrew wording.
    ''Are an evil thing'' preserves the harsh evaluative force without overcommitting
    to a more speculative reconstruction.'
- source_word: נכד
  chosen: the offspring
  alternatives:
  - grandchild
  - descendant
  lexicon: HALOT
  rationale: Though נכד can mean 'grandchild,' in poetic parallel with נין it broadly
    denotes posterity/offspring. 'The offspring' avoids an overly narrow generational
    sense in English.
- source_word: אויל
  chosen: of a fool
  alternatives:
  - foolish person
  - stupid man
  lexicon: HALOT
  rationale: אויל is the standard wisdom term for a fool. 'Fool' preserves the moral-wisdom
    category better than a merely intellectual gloss.
- source_word: במגור
  chosen: in the terror
  alternatives:
  - in fear
  - in dread
  lexicon: HALOT
  rationale: מגור conveys fear/dread/terror. 'In the terror' reflects the concrete
    force of the noun and fits the prepositional phrase naturally in English.
- source_word: רשע
  chosen: of the wicked
  alternatives:
  - of a wicked man
  - of wickedness
  lexicon: HALOT
  rationale: The singular form can function collectively. 'The wicked' is idiomatic
    and matches the moral category used throughout wisdom literature.
