translation:
  text: for violating an oath and a covenant, and for leaning with your elbow over
    the bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is terse and somewhat uncertain in the second clause. The Greek parallel
      reads more fully, 'and from planting the elbow over the loaves,' which supports
      the rendering 'leaning with your elbow over the bread.'
    reason: textual_variant
  - marker: b
    text: '''An oath'' could also be rendered ''a curse'' or ''an adjuration,'' since
      the Hebrew term can carry oath-curse overtones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מהפר
  chosen: for violating
  alternatives:
  - for breaking
  - for annulling
  lexicon: HALOT
  rationale: The Hebrew root פרר/הפר commonly means to break, nullify, or violate
    a covenantal or sworn obligation. In this shame-list context, 'violating' is idiomatic
    and preserves the moral force better than the more technical 'annulling.' The
    Greek parallel's ἀπὸ ... διαθήκης supports a covenant-breaking sense.
- source_word: אלה
  chosen: an oath
  alternatives:
  - a curse
  - an adjuration
  lexicon: HALOT
  rationale: Hebrew אלה can denote an oath, often with curse-sanction implied. Here,
    paired with 'covenant,' it most naturally refers to a sworn oath. 'Curse' is possible
    etymologically, but the Greek parallel's ἀληθείας θεοῦ καὶ διαθήκης points to
    the sphere of sworn truth/obligation rather than an independent malediction.
- source_word: וברית
  chosen: and a covenant
  alternatives:
  - and an agreement
  - and a treaty
  lexicon: HALOT
  rationale: ברית is regularly 'covenant.' This preserves the formal relational obligation
    implied by the Hebrew and aligns with the Greek διαθήκη.
- source_word: ממטה
  chosen: for leaning
  alternatives:
  - for stretching out
  - for extending downward
  - from inclining
  lexicon: HALOT
  rationale: The Hebrew is difficult, but in light of the Greek πήξεως ἀγκῶνος ('planting/fixing
    of the elbow'), the phrase points to the physical act of propping or leaning on
    the elbow at table. 'Leaning' gives the likely social sense in natural English
    while remaining close to the image.
- source_word: אציל
  chosen: your elbow
  alternatives:
  - the elbow
  - the forearm
  - the arm-joint
  lexicon: HALOT
  rationale: אציל denotes the elbow or arm-joint. The Greek ἀγκών confirms 'elbow'
    specifically.
- source_word: אל לחם
  chosen: over the bread
  alternatives:
  - toward the bread
  - at the bread
  - upon the bread
  lexicon: HALOT
  rationale: The preposition plus 'bread' is somewhat awkward in the Hebrew witness,
    but the Greek ἐπ᾿ ἄρτους suggests a table-setting expression involving bread/food.
    'Over the bread' preserves the concrete image without over-interpreting the exact
    etiquette violation.
