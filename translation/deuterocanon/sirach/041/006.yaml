theological_decisions:
- issue: Use of Hebrew primary witness with Greek parallel in a difficult clause
  chosen_reading: Retain the Hebrew-based structure while allowing the Greek parallel
    to clarify the second colon as enduring disgrace upon the offspring.
  alternative_readings:
  - 'Translate more directly from the Greek: ''The inheritance of sinners'' children
    will perish, and with their offspring reproach will continue.'''
  - Emend the Hebrew more aggressively to match the Greek's 'inheritance will perish'.
  rationale: The project philosophy gives primacy to the most original available witness;
    here that is the Hebrew Geniza text. However, the second colon is textually difficult,
    and the Greek parallel provides a stable sense. I therefore translated the extant
    Hebrew wording where clear and used the Greek as a consistency check rather than
    replacing the Hebrew wholesale.
  doctrine_reference: 'PHILOSOPHY.md: Original-language primacy over translation tradition;
    for Sirach, translate from Hebrew where it survives and keep Greek in view.'
