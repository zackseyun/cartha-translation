translation:
  text: The dominion of evil is from the child of injustice, and disgrace is always
    with his offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''The inheritance of sinners'' children will perish, and with their
      offspring reproach will continue.'' The Hebrew surviving here is difficult,
      especially in the second clause, but it points in the same general direction
      of lasting shame upon the descendants of the unjust.'
    reason: alternative_reading
lexical_decisions:
- source_word: מבן עול
  chosen: from the child of injustice
  alternatives:
  - from a son of wrongdoing
  - for the child of injustice
  - the child of sinners
  lexicon: HALOT
  rationale: 'The Hebrew phrase is best taken literally from the surviving witness:
    מן/מ־ + בן + עול, ''from the son/child of injustice.'' I render בן as ''child''
    rather than ''son'' for natural English while preserving the singular individual
    source. עול here denotes injustice/wrongdoing rather than mere trouble. The Greek
    parallel reflects an interpretive plural (''children of sinners''), which supports
    the moral sense but not the exact Hebrew number or wording, so the Hebrew remains
    primary.'
- source_word: ממשלת רע
  chosen: the dominion of evil
  alternatives:
  - evil rule
  - the rule of evil
  - a wicked dominion
  lexicon: HALOT
  rationale: ממשלה denotes rule, dominion, or governing power. רע can function substantivally
    ('evil') or adjectivally ('evil/wicked'). 'The dominion of evil' preserves the
    compact Hebrew construction and fits the warning context. 'Wicked dominion' is
    possible, but the genitival English better reflects the Hebrew sequence.
- source_word: וריש עם
  chosen: and disgrace
  alternatives:
  - and reproach
  - and shame
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult. In light of the Greek parallel
    ὄνειδος ('reproach, disgrace'), the sense is clearly one of enduring public shame
    attached to the descendants. 'Disgrace' is chosen as idiomatic modern English.
    The exact Hebrew reading behind this clause may be uncertain, so the Greek helps
    stabilize the sense.
- source_word: זרעו
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: HALOT
  rationale: זרע in this context refers to progeny/descendants. 'Offspring' is concise
    and natural; 'seed' would be overly literal in modern English.
- source_word: תמיד
  chosen: always
  alternatives:
  - continually
  - constantly
  lexicon: HALOT
  rationale: תמיד denotes continual or ongoing duration. 'Always' is the most natural
    concise rendering in English.
