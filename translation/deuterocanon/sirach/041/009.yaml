translation:
  text: And if you are born, you will be born for a curse; and if you die, you will
    be allotted to a curse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew for this verse is somewhat difficult and differs in detail
      from the Greek. The Greek parallel reads, 'if you are born, you will be born
      for a curse, and if you die, you will be allotted to a curse,' which guides
      the sense here.
    reason: textual_variant
lexical_decisions:
- source_word: תולידו / γεννηθῆτε ... γεννηθήσεσθε
  chosen: you are born / you will be born
  alternatives:
  - you beget / you give birth
  - you are brought forth
  lexicon: HALOT; BDAG
  rationale: The Hebrew in Zone 1 appears to read a form from ילד that could suggest
    'beget/give birth,' but the Greek parallel clearly has passive 'if you are born
    ... you will be born.' Given the verse's sense and the parallelism with death,
    the passive birth sense is most likely intended and yields coherent English.
- source_word: לקללה / εἰς κατάραν
  chosen: for a curse
  alternatives:
  - into a curse
  - for cursing
  lexicon: HALOT; BDAG
  rationale: Both Hebrew and Greek point to the noun 'curse.' 'For a curse' is idiomatic
    in English and preserves the telic/resultative force of the preposition.
- source_word: תמותו / ἀποθάνητε
  chosen: you die
  alternatives:
  - you should die
  - you perish
  lexicon: HALOT; BDAG
  rationale: Simple conditional future-oriented sense in parallel with 'if you are
    born.' 'Die' is the plain lexical equivalent.
- source_word: μερισθήσεσθε
  chosen: you will be allotted
  alternatives:
  - you will be assigned
  - you will have as your portion
  - you will be divided
  lexicon: BDAG; LSJ
  rationale: The Greek supplies a more specific predicate for the second colon than
    the extant Hebrew, indicating being assigned or apportioned to a curse. 'Allotted'
    preserves the passive and the notion of assigned portion without sounding overly
    technical.
- source_word: אם ... ואם
  chosen: And if ... and if
  alternatives:
  - If ... and if
  - Whether ... or
  lexicon: HALOT
  rationale: The repeated conditional structure is emphatic. Retaining 'And if ...
    and if' reflects the Hebrew-Greek parallelism and the cumulative force of the
    denunciation.
