translation:
  text: Better is a man who hides his folly than a man who hides his wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew ends with a difficult phrase, literally something like 'discipline/reproof
      of shame' (מוסר בשת), where the Greek reads simply 'than a man who hides his
      wisdom.' The main text follows the clearer comparative sense supported by the
      Greek parallel.
    reason: textual_variant
  - marker: b
    text: Or 'Better is a person who hides his folly than one who hides his wisdom.'
      The source uses the singular masculine form 'man' in a representative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוב
  chosen: Better is
  alternatives:
  - Good is
  - It is better
  lexicon: HALOT
  rationale: The comparative sense fits the Hebrew proverb style and is confirmed
    by the Greek κρείσσων. English idiom prefers 'Better is' or 'It is better'; 'Better
    is' preserves the terseness of the source.
- source_word: איש
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: HALOT
  rationale: The Hebrew uses the masculine singular 'man,' and the Greek likewise
    has ἄνθρωπος in singular. Per project philosophy, gender-accurate wording is preferred
    where the source is masculine and representative.
- source_word: מצפין
  chosen: who hides
  alternatives:
  - concealing
  - covering up
  - keeping hidden
  lexicon: HALOT
  rationale: The participle denotes one who conceals or keeps something hidden. 'Who
    hides' is clear, concise, and matches the repeated structure in both Hebrew and
    Greek (ἀποκρύπτων).
- source_word: אולתו
  chosen: his folly
  alternatives:
  - his foolishness
  - his stupidity
  lexicon: HALOT
  rationale: '''Folly'' best captures the wisdom-literature register of אולת without
    sounding either too clinical (''foolishness'') or too colloquial/harsh (''stupidity'').
    The Greek μωρία supports this semantic range.'
- source_word: חכמתו
  chosen: his wisdom
  alternatives:
  - his insight
  lexicon: HALOT
  rationale: The straightforward sense is 'wisdom,' and the Greek σοφία confirms it.
    No contextual pressure warrants a narrower gloss such as 'insight'.
- source_word: מוסר בשת
  chosen: than
  alternatives:
  - is shameful discipline
  - brings shame
  - is a rebuke of shame
  lexicon: HALOT
  rationale: 'The Hebrew phrase as transmitted is difficult, but the Greek parallel
    presents a clean comparative: ''better ... than ...''. Given the high-confidence
    Hebrew line and the explicit instruction to use the Greek parallel as translation
    input, the comparative sense is best represented in the main text. The awkward
    Hebrew ending is therefore treated as reflecting a corrupt or compressed reading
    behind the clearer Greek witness rather than translated woodenly into unintelligible
    English.'
