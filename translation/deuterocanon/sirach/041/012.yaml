translation:
  text: Be concerned for your name, for it will go with you more than a thousand treasures
    of wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Be concerned for your name, for it will remain for you more than
      a thousand great treasures of gold.'' The Hebrew witness instead reads ''stores
      of wisdom.'''
    reason: alternative_reading
lexical_decisions:
- source_word: פחד
  chosen: Be concerned
  alternatives:
  - Take care
  - Be anxious
  - Care
  lexicon: HALOT
  rationale: The Hebrew reading פחד is difficult in context, but alongside the Greek
    parallel φρόντισον ('take thought for, be concerned about'), the sense is exhortative
    concern rather than fear in the emotional sense. 'Be concerned' preserves the
    admonitory force without overstating panic.
- source_word: על שם
  chosen: for your name
  alternatives:
  - about your name
  - for a name
  lexicon: HALOT
  rationale: With the Greek περὶ ὀνόματος, the phrase refers to one's reputation/name.
    'For your name' is concise English that keeps the Hebrew-Greek alignment.
- source_word: כי הוא ילוך
  chosen: for it will go with you
  alternatives:
  - for it will accompany you
  - for it will remain with you
  lexicon: HALOT
  rationale: The Hebrew verb הלך in this form naturally suggests 'go/walk'; the Greek
    has διαμενεῖ ('will remain/endure'). 'Will go with you' honors the Hebrew wording
    while conveying the idea of enduring accompaniment supported by the Greek.
- source_word: מאלפי
  chosen: more than a thousand
  alternatives:
  - than thousands of
  - beyond a thousand
  lexicon: HALOT
  rationale: The comparative מן plus 'thousand' is rendered comparatively. The Greek
    explicitly has ἢ χίλιοι ('than a thousand'), supporting this sense.
- source_word: אוצרות
  chosen: stores
  alternatives:
  - treasures
  - storehouses
  lexicon: HALOT
  rationale: Hebrew אוצרות commonly means treasures/storehouses. Because the following
    noun is 'wisdom' in the Hebrew witness, 'stores of wisdom' best reflects the extant
    text, while a footnote preserves the Greek's 'great treasures of gold.'
- source_word: חכמה
  chosen: wisdom
  alternatives:
  - skill
  - learning
  lexicon: HALOT
  rationale: The Hebrew witness reads חכמה clearly. This differs from the Greek χρυσίου
    ('of gold'), so the main text follows the primary Hebrew witness and the variant
    is preserved in a footnote.
