    great treasures of gold'''
  rationale: Per project philosophy, where Hebrew Sirach survives it is primary. Here
    the Hebrew and Greek align broadly in exhorting care for one's name/reputation,
    but diverge in the final object. The Hebrew is high-confidence and validated,
    so the main text follows it; the Greek alternative is important enough to preserve
    in a footnote because it materially affects imagery and may reflect a different
    Vorlage or secondary development.
