translation:
  text: for a friend, over words of reproach; and after giving a gift to a brother,
    do not reproach him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew of this line is terse and somewhat elliptical. The Greek parallel
      makes the implied sense explicit: ''from friends concerning words of reproach,
      and after giving, do not reproach.'''
    reason: textual_variant
lexical_decisions:
- source_word: מאוהב
  chosen: for a friend
  alternatives:
  - from a friend
  - because of a friend
  - with a friend
  lexicon: HALOT
  rationale: The Hebrew consonants point to אוהב, 'one who loves/friend.' In this
    compressed admonition list, the phrase is elliptical. The Greek parallel has ἀπὸ
    φίλων, 'from friends/about friends,' which supports understanding the Hebrew as
    referring to one's relation to a friend rather than romantic love. 'For a friend'
    best captures the topical force in English without overfilling the ellipsis.
- source_word: על דברי חרפה
  chosen: over words of reproach
  alternatives:
  - about insulting words
  - concerning disgraceful speech
  - for words of insult
  lexicon: HALOT
  rationale: דברי חרפה denotes speech characterized by reproach/insult/disgrace. 'Words
    of reproach' is natural English and preserves the moral-social sense of חרפה.
    'Over' reflects על in a dispute/topic sense within an elliptical prohibition.
- source_word: ומאחרי
  chosen: and after
  alternatives:
  - and from after
  - and afterward
  lexicon: HALOT
  rationale: The preposition marks subsequent time. 'And after' keeps the terse parallel
    structure of the Hebrew.
- source_word: מתת
  chosen: giving a gift
  alternatives:
  - a gift
  - a present
  - an act of giving
  lexicon: HALOT
  rationale: מתת can denote gift or giving. Because the following phrase is temporal
    ('after ...'), rendering it verbally as 'giving a gift' makes the syntax clear
    in English while staying close to the Hebrew.
- source_word: אח
  chosen: a brother
  alternatives:
  - a kinsman
  - a fellow
  - a companion
  lexicon: HALOT
  rationale: The Hebrew literally says 'brother.' In wisdom literature this may extend
    beyond a biological sibling, but the source is masculine singular and relationally
    specific. Per gender-accurate policy, 'brother' is retained.
- source_word: מנאץ
  chosen: do not reproach him
  alternatives:
  - do not revile
  - do not taunt
  - do not insult
  lexicon: HALOT
  rationale: The Hebrew participle/admonitory form is terse and likely elliptical
    in a list of things one should be ashamed of or avoid. The Greek parallel explicitly
    reads 'after giving, do not reproach' (μὴ ὀνείδιζε), which clarifies the sense.
    'Do not reproach him' best reflects the likely intended prohibition and matches
    the parallelism with חרפה/ὀνειδισμός.
