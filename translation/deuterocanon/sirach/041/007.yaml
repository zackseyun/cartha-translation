theological_decisions:
- issue: Whether to foreground curse language from the Hebrew or reproach language
    from the Greek parallel
  chosen_reading: The children of a wicked father are cursed, for because of him they
    are for disgrace.
  alternative_readings:
  - The children of an ungodly father are reproached, because because of him they
    will be disgraced.
  - A wicked father brings reproach on his children, for because of him they are disgraced.
  rationale: Zone 1 Hebrew is the primary witness for Sirach where extant, so the
    stronger maledictory sense of יקוב is retained in the main text. The Greek parallel
    was used as a control, especially for the final clause's social-shame nuance,
    which is reflected in 'disgrace.' Because the Hebrew verb is somewhat difficult
    and the Greek differs in emphasis, the alternative is preserved in a footnote
    rather than flattened into a single harmonized rendering.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    DOCTRINE.md: preserve theological tension rather than resolve it'
