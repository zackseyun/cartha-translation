translation:
  text: The children of a wicked father are cursed, for because of him they are a
    disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''The children of an ungodly father are reproached, because
      of him they will be disgraced.'' The Hebrew more sharply suggests being cursed,
      while the Greek emphasizes reproach.'
    reason: alternative_reading
lexical_decisions:
- source_word: אב רשע
  chosen: a wicked father
  alternatives:
  - an ungodly father
  - a wicked parent
  lexicon: HALOT
  rationale: The Hebrew phrase is singular and specifically paternal. רשע commonly
    denotes moral wickedness or guilt. The Greek parallel πατρὶ ἀσεβεῖ confirms the
    paternal reference and supports 'wicked/ungodly'; 'wicked' is more idiomatic here.
- source_word: יקוב
  chosen: are cursed
  alternatives:
  - he curses
  - will be cursed
  - are denounced
  lexicon: HALOT
  rationale: 'From נקב in a maledictory sense, the Hebrew most naturally yields a
    passive/resultative idea here: the children come under a curse. The Greek parallel
    μέμφεται (''are blamed/reproached'') points toward social reproach rather than
    formal cursing, but the Hebrew witness is primary and stronger. English present
    ''are cursed'' captures the gnomic force.'
- source_word: ילד
  chosen: children
  alternatives:
  - child
  - offspring
  lexicon: HALOT
  rationale: Though morphologically singular/collective in Hebrew, the sense is collective,
    and the Greek τέκνα is plural. 'Children' best reflects the intended class.
- source_word: כי בגללו
  chosen: for because of him
  alternatives:
  - for on account of him
  - because of their father
  lexicon: HALOT
  rationale: The causal phrase explicitly grounds the children's condition in the
    father. Retaining 'him' preserves the directness of the Hebrew while remaining
    clear from context.
- source_word: לחרפה
  chosen: for disgrace
  alternatives:
  - for reproach
  - to shame
  - for public shame
  lexicon: HALOT
  rationale: חרפה denotes reproach, disgrace, or shame. The Greek ὀνειδισθήσονται
    emphasizes being reproached. 'For disgrace' keeps the nominal Hebrew structure
    while conveying the social shame in view.
