theological_decisions:
- issue: Sense of חנף
  chosen_reading: the ungodly
  alternative_readings:
  - the hypocrite
  - the godless
  rationale: The Hebrew term can be rendered more narrowly as 'hypocrite,' but the
    Greek parallel's ἀσεβεῖς points toward a broader category of impious persons.
    'The ungodly' best reflects the moral-religious force without narrowing the term
    to performative hypocrisy alone.
  doctrine_reference: 'DOCTRINE.md: original-language primacy with documented exception;
    preserve ambiguity where real'
- issue: Relationship between Hebrew and Greek witnesses
  chosen_reading: Translate the Hebrew main line while preserving the Greek's divergent
    imagery in a footnote
  alternative_readings:
  - Adopt the Greek 'from earth to earth' in the main text
  - Conflate Hebrew and Greek into a harmonized rendering
  rationale: The project philosophy for Sirach gives primacy to the surviving Hebrew
    where extant, while also using the Greek parallel as real translation input. Here
    the Greek differs materially in the first colon and in the second colon's endpoint.
    The Hebrew is translated in the main text, and the Greek alternative is preserved
    for auditability rather than harmonized.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    use Swete LXX alongside it'
