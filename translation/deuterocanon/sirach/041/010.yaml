translation:
  text: Everything from nothing returns to nothing; so the ungodly go from emptiness
    to emptiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Everything that is from earth goes away to earth; so
      the ungodly go from a curse to destruction.'' The Greek reflects a substantially
      different form of the verse than the surviving Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: כל
  chosen: Everything
  alternatives:
  - All
  lexicon: HALOT
  rationale: Used distributively to open the proverb in natural English; 'everything'
    fits the singular collective sense better than a bare 'all.'
- source_word: מאפס
  chosen: from nothing
  alternatives:
  - from nonexistence
  - from emptiness
  lexicon: HALOT
  rationale: Hebrew אפס here is best taken as 'nothingness' or 'nonentity.' 'From
    nothing' is idiomatic and preserves the starkness of the Hebrew. The Greek parallel
    instead has 'from earth,' indicating a divergent Vorlage or interpretive rendering,
    but the Hebrew witness is primary here.
- source_word: אל אפס
  chosen: to nothing
  alternatives:
  - to nonexistence
  - to emptiness
  lexicon: HALOT
  rationale: Maintains the antithetical repetition of אפס in a concise English form.
    'Returns to nothing' captures ישוב plus the destination phrase smoothly.
- source_word: ישוב
  chosen: returns
  alternatives:
  - goes back
  - turns back
  lexicon: HALOT
  rationale: The verb שוב commonly means 'return.' 'Returns' is both formally close
    and idiomatic in the proverb's general statement.
- source_word: כן
  chosen: so
  alternatives:
  - thus
  - likewise
  lexicon: HALOT
  rationale: Introduces the comparison between the first and second cola in clear
    modern English.
- source_word: חנף
  chosen: the ungodly
  alternatives:
  - the hypocrite
  - the impious
  - the godless
  lexicon: HALOT
  rationale: Although חנף can denote a 'hypocrite' in some contexts, in wisdom literature
    it often carries the broader sense of the irreverent or impious person. The Greek
    parallel has ἀσεβεῖς ('ungodly/impious'), which supports the broader moral-religious
    sense here rather than mere social duplicity.
- source_word: מתהו
  chosen: from emptiness
  alternatives:
  - from chaos
  - from vanity
  - from nothingness
  lexicon: HALOT
  rationale: תהו can denote emptiness, wasteness, or chaos. Here the paired movement
    'from X to X' is proverbial and moral rather than cosmological, so 'emptiness'
    best conveys futility without overloading the line with Genesis-style 'chaos'
    associations.
- source_word: אל תהו
  chosen: to emptiness
  alternatives:
  - to chaos
  - to vanity
  - to nothingness
  lexicon: HALOT
  rationale: Preserves the repetition and rhetorical force of תהו. 'Emptiness' reads
    naturally and matches the likely sense of futile ruin.
