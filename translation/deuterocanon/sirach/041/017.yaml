translation:
  text: Be ashamed before father and mother for sexual immorality, and before a ruler
    seated in office for lying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'before a ruler seated in office'; the Greek parallel has 'before
      a leader and potentate.' The translation follows the Hebrew while allowing the
      Greek to confirm the general sense of public authority.
    reason: alternative_reading
lexical_decisions:
- source_word: בוש
  chosen: Be ashamed
  alternatives:
  - Feel shame
  - Be put to shame
  lexicon: HALOT
  rationale: Imperative verb calling for a sense of shame/reserve. 'Be ashamed' is
    idiomatic and preserves the exhortational force better than the more passive 'be
    put to shame'.
- source_word: מאב ואם
  chosen: before father and mother
  alternatives:
  - of father and mother
  - from father and mother
  lexicon: HALOT
  rationale: The preposition מן after בוש can mark the person before whom one feels
    shame. The Greek ἀπὸ πατρὸς καὶ μητρὸς confirms the relational sense. 'Before
    father and mother' is natural English and fits the admonitory list.
- source_word: אל זנות
  chosen: for sexual immorality
  alternatives:
  - concerning fornication
  - for prostitution
  - about sexual misconduct
  lexicon: HALOT
  rationale: זנות broadly denotes illicit sexual behavior, not only commercial prostitution.
    The Greek περὶ πορνείας supports a general category of sexual immorality. 'Sexual
    immorality' is clear modern English without narrowing the term too much.
- source_word: מנשיא יושב
  chosen: before a ruler seated in office
  alternatives:
  - before a prince who sits
  - before a leader and one in authority
  - before a ruler
  lexicon: HALOT
  rationale: The Hebrew literally has 'from/before a נשיא sitting.' The participle
    יושב likely characterizes the ruler as one occupying his seat of authority. The
    Greek expands to 'from a leader and potentate,' suggesting an authority figure
    rather than a casual seated person. 'Ruler seated in office' preserves the Hebrew
    image while making the authority sense explicit.
- source_word: אל כחש
  chosen: for lying
  alternatives:
  - for falsehood
  - concerning deceit
  lexicon: HALOT
  rationale: כחש denotes falsehood or deception. In this ethical list, 'lying' is
    the most direct and readable English rendering, matching the Greek περὶ ψεύδους.
