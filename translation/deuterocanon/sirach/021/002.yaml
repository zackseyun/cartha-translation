translation:
  text: Flee from sin as from the face of a snake; for if you come near it, it will
    bite you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Flee from sin as from the face/presence of a snake.' The Greek
      image is highly concrete; 'snake' could also be rendered 'serpent.'
    reason: lexical_alternative
  - marker: b
    text: The extant Cairo Geniza Hebrew line in the provided source does not match
      the Greek wording for this verse and appears to reflect a source-location mismatch;
      the translation therefore follows the Greek witness here.
    reason: textual_variant
lexical_decisions:
- source_word: φεῦγε / שַׂר
  chosen: Flee
  alternatives:
  - Turn aside
  - Withdraw
  lexicon: BDAG / HALOT
  rationale: The Greek imperative φεῦγε clearly means 'flee, run away from.' The extant
    Hebrew in Zone 1 appears mismatched to the Greek and does not yield a coherent
    equivalent for this verse, so the Greek provides the stable basis. 'Flee' preserves
    the vivid urgency better than softer options.
- source_word: ἁμαρτίας
  chosen: sin
  alternatives:
  - wrongdoing
  lexicon: BDAG
  rationale: Standard rendering for ἁμαρτία. 'Sin' best preserves the moral and theological
    force of the warning.
- source_word: ὡς ἀπὸ προσώπου ὄφεως
  chosen: as from the face of a snake
  alternatives:
  - like from a snake
  - as from a serpent's presence
  lexicon: BDAG / LSJ
  rationale: The idiom literally includes 'from the face/presence of a snake.' English
    needs slight smoothing, but retaining 'face' keeps the concrete imagery of direct
    encounter. 'Snake' is more accessible modern English than 'serpent,' while preserving
    the animal image.
- source_word: ἐὰν ... προσέλθῃς
  chosen: if you come near it
  alternatives:
  - if you approach
  - if you go up to it
  lexicon: BDAG
  rationale: προσέρχομαι here means to approach or come near. 'Come near it' is natural
    English and fits the warning image.
- source_word: δήξεταί
  chosen: it will bite you
  alternatives:
  - it will strike you
  - it will wound you
  lexicon: BDAG / LSJ
  rationale: The verb specifically denotes biting. 'Bite' preserves the concrete consequence
    of approaching sin in the snake metaphor.
