translation:
  text: The inward parts of a fool are like a broken vessel, and they will not hold
    any knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a shattered jar' or 'like a broken pot.' The Greek image is of
      a container smashed so that it cannot retain what is put into it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγκατα
  chosen: the inward parts
  alternatives:
  - the entrails
  - the inner being
  - the heart
  lexicon: LSJ
  rationale: Literally refers to the inner organs or inward parts. In wisdom literature
    it can suggest the inner self, but here the concrete comparison to a broken vessel
    favors retaining the bodily metaphor rather than abstracting to 'heart' or 'mind'.
- source_word: μωροῦ
  chosen: of a fool
  alternatives:
  - of the foolish man
  - of a senseless person
  lexicon: LSJ
  rationale: μωρός in wisdom context denotes a morally and intellectually foolish
    person. 'Fool' is the standard concise English equivalent and preserves the proverbial
    tone.
- source_word: ὡς ἄγγιον συντετριμμένον
  chosen: like a broken vessel
  alternatives:
  - like a shattered jar
  - like a broken pot
  lexicon: LSJ
  rationale: The phrase compares the fool's interior to a smashed container. 'Vessel'
    is broad and natural English, preserving the image without over-specifying the
    material. 'Broken' captures συντετριμμένον clearly.
- source_word: πᾶσαν γνῶσιν
  chosen: any knowledge
  alternatives:
  - all knowledge
  - any understanding
  lexicon: LSJ
  rationale: With the negated future οὐ κρατήσει, English idiom prefers 'will not
    hold on to any knowledge' rather than the more wooden 'will not hold all knowledge.'
    The sense is that no knowledge remains retained.
- source_word: οὐ κρατήσει
  chosen: he will not hold on to
  alternatives:
  - it will not hold
  - he will not retain
  - he will not grasp
  lexicon: LSJ
  rationale: κρατέω can mean hold fast, retain, or keep possession of. Because the
    subject is singular and personal in context, 'he will not hold on to' best reflects
    the fool's inability to retain knowledge while still echoing the vessel metaphor.
