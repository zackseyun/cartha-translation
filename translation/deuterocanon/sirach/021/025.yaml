translation:
  text: The lips of strangers will be weighed down by these things, but the words
    of the wise will be set on a balance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in these things' for 'by these things'; the Greek phrase may be read
      more literally, but the English here reflects the likely sense in context.
    reason: lexical_alternative
  - marker: b
    text: The image in 'will be set on a balance' suggests that the wise speak with
      measured judgment.
    reason: cultural_note
lexical_decisions:
- source_word: χείλη
  chosen: lips
  alternatives:
  - speech
  - mouth
  lexicon: LSJ
  rationale: A literal rendering fits the proverb's imagery and preserves the metonymy
    of 'lips' for speech without flattening it to the abstract 'speech'.
- source_word: ἀλλοτρίων
  chosen: strangers
  alternatives:
  - others
  - foreigners
  lexicon: LSJ
  rationale: The genitive plural denotes those who are not part of the wise/in-group.
    'Strangers' preserves the social distance without over-specifying ethnicity, whereas
    'foreigners' could imply national origin too strongly.
- source_word: ἐν τούτοις
  chosen: by these things
  alternatives:
  - in these things
  - with these things
  lexicon: LSJ
  rationale: The phrase points back to the preceding matters under discussion. Because
    βαρυνθήσεται is metaphorical, 'by these things' gives natural English while retaining
    the causal/instrumental sense.
- source_word: βαρυνθήσεται
  chosen: will be weighed down
  alternatives:
  - will be burdened
  - will become heavy
  lexicon: LSJ
  rationale: The future passive of βαρέω carries the sense of being made heavy or
    burdened. 'Will be weighed down' preserves the metaphor and also prepares for
    the balancing imagery in the second clause.
- source_word: λόγοι
  chosen: words
  alternatives:
  - sayings
  - speeches
  lexicon: LSJ
  rationale: '''Words'' is the most straightforward equivalent in a wisdom context
    and matches the concise proverbial style.'
- source_word: φρονίμων
  chosen: the wise
  alternatives:
  - prudent people
  - the sensible
  lexicon: LSJ
  rationale: The adjective in substantival use commonly denotes wise or prudent persons.
    'The wise' is idiomatic and preserves wisdom-literature diction.
- source_word: ἐν ζυγῷ
  chosen: on a balance
  alternatives:
  - in a balance
  - on scales
  lexicon: LSJ
  rationale: ζυγός can denote a balance or scale-beam in weighing contexts. Here the
    image is evaluative measurement, not a yoke. 'On a balance' is clear and singular
    like the Greek.
- source_word: σταθήσονται
  chosen: will be set
  alternatives:
  - will stand
  - will be established
  lexicon: LSJ
  rationale: In context with ἐν ζυγῷ, the verb evokes being placed or standing in
    the balance for proper measure. 'Will be set' communicates the idiom more naturally
    in English than the wooden 'will stand'.
