translation:
  text: Like one who grasps a woman’s private parts and urinates, so is one who suddenly
    enters his neighbor’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew here is a crude bodily proverb. The word rendered “private parts”
      can have other senses in Hebrew, but in this context the obscene sense best
      fits the line.
    reason: lexical_alternative
  - marker: b
    text: 'Greek has a different line here: “Her teeth are lion’s teeth, destroying
      the lives of men.” This appears to reflect a substantially different textual
      form.'
    reason: textual_variant
lexical_decisions:
- source_word: הָאוֹחֵז
  chosen: like one who grasps
  alternatives:
  - one who seizes
  - one who takes hold of
  lexicon: HALOT
  rationale: The participle from אחז denotes taking hold or grasping. 'Grasps' is
    vivid and concrete, fitting the proverb's deliberately shocking imagery.
- source_word: בָּאַמָה
  chosen: a woman’s private parts
  alternatives:
  - the forearm
  - the cubit
  - the maidservant
  lexicon: HALOT
  rationale: In this context the common senses 'forearm/cubit' do not fit the parallel
    obscene image, and the following clause about urinating confirms a crude bodily
    proverb. The term is therefore taken in a euphemistic/sexual sense, best rendered
    explicitly but not crudely as 'a woman’s private parts.'
- source_word: וּמַשְׁתִּין מָיִם
  chosen: and urinates
  alternatives:
  - and passes water
  - and pisses
  lexicon: HALOT
  rationale: The idiom literally means 'urinates water.' English normally says 'urinates'
    or 'passes water.' 'Urinates' preserves the bodily force without becoming slangy;
    'water' is omitted as non-idiomatic in English.
- source_word: וְהַנִּכְנָס
  chosen: so is one who suddenly enters
  alternatives:
  - and one who enters
  - likewise one who comes in
  lexicon: HALOT
  rationale: The Hebrew gives a second participial phrase coordinated to the first.
    English proverb style is clearer if the comparison is made explicit with 'so is
    one who...'. The adverb 'suddenly' belongs with this action.
- source_word: לְבֵית חֲבֵרוֹ
  chosen: his neighbor’s house
  alternatives:
  - his companion’s house
  - his friend’s house
  lexicon: HALOT
  rationale: חבר can mean companion/friend/associate. 'Neighbor' works well in wisdom
    literature for a socially proximate other and avoids implying intimacy that the
    context does not require.
- source_word: פִּתְאוֹם
  chosen: suddenly
  alternatives:
  - without warning
  - abruptly
  lexicon: HALOT
  rationale: The adverb means suddenly or unexpectedly. 'Suddenly' is concise and
    preserves the sense of intrusive, unannounced entry.
- source_word: ὀδόντες λέοντος οἱ ὀδόντες αὐτῆς, ἀναιροῦντες ψυχὰς ἀνθρώπων
  chosen: used as a control only, not translated in the main text
  alternatives:
  - her teeth are lion's teeth, destroying the souls/lives of men
  lexicon: LSJ
  rationale: The Greek parallel diverges sharply and appears to reflect a different
    line, likely aligned with the surrounding warning about sin as a devouring power.
    Because the Hebrew witness is extant and high-confidence, the main translation
    follows the Hebrew; the Greek divergence is preserved in a footnote as a textual
    alternative.
