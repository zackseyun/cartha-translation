translation:
  text: The prayer of a poor man goes from his mouth to his ears, and his judgment
    comes quickly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literally, ''from mouth to his ears.'' The pronoun ''his'' is most naturally
      understood as referring to God: the poor man''s prayer reaches God''s ears.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his case' or 'justice'; the Greek 'judgment' can refer to the decision
      rendered on behalf of the poor man.
    reason: alternative_reading
lexical_decisions:
- source_word: δέησις
  chosen: prayer
  alternatives:
  - supplication
  - petition
  lexicon: BDAG
  rationale: The noun denotes an earnest request or plea. 'Prayer' is the most natural
    English in context, while still allowing the sense of urgent appeal implied by
    the word.
- source_word: πτωχοῦ
  chosen: poor man
  alternatives:
  - poor person
  - needy man
  lexicon: BDAG
  rationale: The Greek is masculine singular genitive and refers to a poor individual.
    Following the project's gender-accurate policy, 'poor man' preserves the grammatical
    form without forcing a gender-neutral rendering.
- source_word: ἐκ στόματος ἕως ὠτίων αὐτοῦ
  chosen: from his mouth to his ears
  alternatives:
  - from his mouth to God's ears
  - from his lips to his ears
  lexicon: LSJ
  rationale: The Greek literally reads 'from [the] mouth to his ears.' The pronoun
    most naturally refers to God in this wisdom context, expressing that the poor
    man's prayer reaches God directly. English idiom can preserve the literal image
    with 'his ears,' while the capitalization question is avoided in running text.
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - case
  - justice
  - decision
  lexicon: BDAG
  rationale: κρίμα can denote a judicial decision or judgment. 'Judgment' best preserves
    the legal and theological breadth of the term here, while allowing that God is
    the one who renders the decision in response to the poor man's plea.
- source_word: κατὰ σπουδήν
  chosen: quickly
  alternatives:
  - with haste
  - promptly
  - speedily
  lexicon: LSJ
  rationale: The phrase conveys promptness or haste. 'Quickly' is clear modern English
    and fits the project's readability aims.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - arrives
  - takes place
  lexicon: BDAG
  rationale: A straightforward rendering of the present verb. 'Comes' works naturally
    with 'judgment' in English and preserves the immediacy of the Greek present.
