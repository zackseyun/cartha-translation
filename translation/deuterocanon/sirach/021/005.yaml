theological_decisions:
- issue: Referent of αὐτοῦ in 'to his ears'
  chosen_reading: The pronoun refers to God, so the sense is that the poor man's prayer
    reaches God directly.
  alternative_readings:
  - The pronoun refers back to the poor man himself, yielding a more awkward sense.
  rationale: Although the nearest explicit antecedent is 'poor man,' the clause functions
    as a wisdom saying about divine hearing of the oppressed. The second clause about
    judgment arriving promptly also points to God as the implied hearer and judge.
    The English keeps the literal wording while the rationale documents the implied
    referent.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it where ambiguity is genuine.
