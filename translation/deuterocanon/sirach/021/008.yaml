translation:
  text: He who builds his house with another’s money is like one gathering his stones
    for winter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with others’ wealth.' The Greek says 'in another’s monies/possessions,'
      an idiom for using resources that belong to someone else.
    reason: lexical_alternative
  - marker: b
    text: '''For winter'' may also imply ''for the storm season,'' sharpening the
      image of futility: the materials are gathered too late to build securely.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ οἰκοδομῶν
  chosen: He who builds
  alternatives:
  - The one who builds
  - Whoever builds
  lexicon: LSJ
  rationale: Articular present participle used generically/proverbially. 'He who builds'
    preserves the masculine singular form and proverbial style without over-paraphrasing.
- source_word: τὴν οἰκίαν αὐτοῦ
  chosen: his house
  alternatives:
  - his household
  - his home
  lexicon: LSJ
  rationale: οἰκία can mean house or household, but in this construction with building
    and stones the literal building sense is primary.
- source_word: ἐν χρήμασιν ἀλλοτρίοις
  chosen: with another’s money
  alternatives:
  - with чуж?
  - with others' money
  - from чуж? wealth
  - with foreign money
  lexicon: LSJ
  rationale: χρήματα commonly means money/wealth/property; ἀλλότριος means belonging
    to another. The sense is illicit use of someone else's resources, not merely 'foreign'
    funds. Singular idiomatic English ('another’s money') conveys the generic force
    cleanly.
- source_word: ὡς συνάγων
  chosen: is like one gathering
  alternatives:
  - is like someone collecting
  - is as one who gathers
  lexicon: LSJ
  rationale: ὡς with participle introduces comparison. 'Is like one gathering' keeps
    the simile explicit and readable.
- source_word: αὐτοῦ τοὺς λίθους
  chosen: his stones
  alternatives:
  - the stones for it
  - its stones
  lexicon: LSJ
  rationale: The transmitted Greek includes αὐτοῦ before τοὺς λίθους. The most natural
    sense is possessive, referring to the builder's stones. English compresses this
    to 'his stones.'
- source_word: εἰς χειμῶνα
  chosen: for winter
  alternatives:
  - against winter
  - for the winter season
  lexicon: LSJ
  rationale: χειμών can denote winter or stormy season. In this proverb, 'for winter'
    is the most natural concise rendering, implying futility or untimeliness in gathering
    building stones when harsh weather is arriving.
