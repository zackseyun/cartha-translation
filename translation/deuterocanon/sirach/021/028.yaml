translation:
  text: The whisperer defiles his own soul, and in the community where he lives he
    will be hated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among those with whom he resides' or 'in his neighborhood.' The Greek
      phrase refers to the sphere of one's dwelling or resident community.
    reason: lexical_alternative
lexical_decisions:
- source_word: μολύνει
  chosen: defiles
  alternatives:
  - pollutes
  - stains
  lexicon: BDAG
  rationale: The verb denotes making something unclean or morally tainted. 'Defiles'
    preserves both the moral and impurity nuance better than the more physical-sounding
    'pollutes' or the weaker 'stains'.
- source_word: τὴν ἑαυτοῦ ψυχὴν
  chosen: his own soul
  alternatives:
  - himself
  - his own life
  lexicon: BDAG
  rationale: ψυχή can mean soul, life, or self. Here the reflexive phrase stresses
    inward moral damage, so 'his own soul' best preserves the ethical and anthropological
    force of the Greek.
- source_word: ὁ ψιθυρίζων
  chosen: the whisperer
  alternatives:
  - the one who whispers
  - the slanderer
  - the murmurer
  lexicon: BDAG
  rationale: The participle refers to one who whispers secretly, often with the sense
    of backbiting or tale-bearing. 'The whisperer' is concise and keeps the image
    of covert speech without over-specifying to 'slanderer,' which would narrow the
    sense.
- source_word: ἐν παροικήσει
  chosen: in the community where he lives
  alternatives:
  - in his neighborhood
  - in his sojourning
  - among those with whom he resides
  lexicon: LSJ
  rationale: παροίκησις can denote residence as a sojourner, dwelling, or the place/community
    of one's residence. A wooden rendering like 'in his sojourning' is awkward in
    English; 'in the community where he lives' communicates the social setting in
    which the person's reputation is ruined.
- source_word: μισηθήσεται
  chosen: he will be hated
  alternatives:
  - he will become hated
  - he will be despised
  lexicon: BDAG
  rationale: The future passive straightforwardly indicates that others will hate
    him. 'He will be hated' is the most direct and natural rendering.
