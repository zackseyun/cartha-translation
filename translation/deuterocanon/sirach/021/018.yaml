translation:
  text: Wisdom to a fool is like a ruined house, and the knowledge of one without
    understanding is words that cannot be examined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a destroyed house' for 'a ruined house'; the Greek participle can carry
      the sense of something obliterated or made to disappear.
    reason: lexical_alternative
  - marker: b
    text: Or 'incomprehensible words' for 'words that cannot be examined'; the Greek
      may emphasize either unintelligibility or the impossibility of probing the speech
      meaningfully.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶκος ἠφανισμένος
  chosen: a ruined house
  alternatives:
  - a destroyed house
  - a vanished house
  lexicon: LSJ
  rationale: ἠφανισμένος (from ἀφανίζω) can suggest being made unseen, obliterated,
    or ruined. In the simile, the point is practical uselessness or collapse, so 'ruined
    house' gives clear modern English while preserving the image better than the more
    wooden 'vanished house.'
- source_word: μωρῷ
  chosen: to a fool
  alternatives:
  - for a fool
  - in a fool
  lexicon: LSJ
  rationale: 'The dative is best taken as reference/advantage: wisdom, in relation
    to a fool, is like a ruined house. ''To a fool'' is idiomatic and preserves the
    relational force.'
- source_word: σοφία
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering; no contextual reason to vary.
- source_word: γνῶσις
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: LSJ
  rationale: Kept distinct from σοφία ('wisdom') to preserve the verse's parallelism
    between wisdom and knowledge.
- source_word: ἀσυνέτου
  chosen: one without understanding
  alternatives:
  - the senseless person
  - the undiscerning person
  - the foolish person
  lexicon: LSJ
  rationale: From ἀσύνετος, lacking understanding or discernment. 'One without understanding'
    is transparent and preserves the semantic link to understanding rather than collapsing
    it into 'fool,' which is already used for μωρός in the first colon.
- source_word: ἀδιεξέταστοι λόγοι
  chosen: words that cannot be examined
  alternatives:
  - incomprehensible words
  - unintelligible words
  - words beyond investigation
  lexicon: LSJ
  rationale: ἀδιεξέταστοι suggests not examinable, not traceable through, or not intelligible
    upon inquiry. 'Words that cannot be examined' stays close to the Greek image of
    scrutiny/investigation, though it also implies obscurity.
