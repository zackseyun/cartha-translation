id: SIR.21.19
reference: Sirach 21:19
source:
  edition: lxx-swete-1909
  text: πέδαι ἐν ποσὶν ἀνοήτοις παιδεία, καὶ ὡς χειροπέδαι ἐπὶ χειρὸς δεξιᾶς.
