translation:
  text: Instruction is shackles on the feet of the senseless, and like handcuffs on
    the right hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Discipline is fetters on the feet of the senseless, and like manacles
      on the right hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέδαι
  chosen: shackles
  alternatives:
  - fetters
  - chains
  lexicon: LSJ
  rationale: πέδαι denotes fetters or shackles, especially for the feet. 'Shackles'
    is clear modern English and preserves the concrete restraint image.
- source_word: ἐν ποσὶν
  chosen: on the feet
  alternatives:
  - for the feet
  - at the feet
  lexicon: LSJ
  rationale: The phrase is idiomatic with πέδαι, indicating shackles placed on the
    feet. 'On the feet' is natural English and keeps the bodily imagery.
- source_word: ἀνοήτοις
  chosen: the senseless
  alternatives:
  - fools
  - the foolish
  - the unintelligent
  lexicon: LSJ
  rationale: ἀνόητος refers to one lacking understanding or sense. 'The senseless'
    preserves the wisdom-literature emphasis on deficient understanding without importing
    a more fixed character label than necessary.
- source_word: παιδεία
  chosen: instruction
  alternatives:
  - discipline
  - training
  - education
  lexicon: LSJ
  rationale: In wisdom literature παιδεία can mean instruction, discipline, or training.
    Here the comparison is to restraints felt negatively by the foolish; 'instruction'
    best fits the broad pedagogical sense while allowing the metaphor to carry the
    aversion. 'Discipline' is possible but could over-specify punitive correction.
- source_word: χειροπέδαι
  chosen: handcuffs
  alternatives:
  - hand-fetters
  - manacles
  lexicon: LSJ
  rationale: χειροπέδαι are restraints for the hands. 'Handcuffs' is the most accessible
    modern equivalent; 'manacles' is accurate but more archaic.
- source_word: ἐπὶ χειρὸς δεξιᾶς
  chosen: on the right hand
  alternatives:
  - upon the right hand
  - on the right arm
  lexicon: LSJ
  rationale: The Greek specifies the right hand. The singular should be preserved
    rather than generalized, even if the image is somewhat stylized.
