translation:
  text: If an intelligent man hears a wise word, he will praise it and add to it;
    a wasteful man heard it and was displeased with it, and he threw it behind his
    back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wise saying.' The Greek λόγον σοφόν can refer to a wise utterance
      more broadly than a single word.
    reason: lexical_alternative
  - marker: b
    text: The expression 'add to it' likely means to build on the wise saying by contributing
      further insight.
    reason: lexical_alternative
  - marker: c
    text: The Greek for 'was displeased with it' is difficult; the sense in context
      is that he reacted negatively and dismissed what he heard.
    reason: alternative_reading
lexical_decisions:
- source_word: λόγον σοφόν
  chosen: a wise word
  alternatives:
  - a wise saying
  - wise speech
  lexicon: LSJ
  rationale: λόγος here refers to a spoken or expressed piece of wisdom rather than
    merely a single lexical 'word.' 'Wise word' keeps the singular and remains idiomatic,
    while preserving the concise Greek expression.
- source_word: ἐπιστήμων
  chosen: an intelligent man
  alternatives:
  - a knowledgeable man
  - a discerning man
  - an expert
  lexicon: LSJ
  rationale: The term denotes one who has understanding or knowledge. 'Intelligent
    man' fits the contrast with the foolish/wasteful hearer and preserves the masculine
    singular representative form in line with the project's gender-accurate policy.
- source_word: αἰνέσει
  chosen: he will praise it
  alternatives:
  - he will commend it
  - he will approve it
  lexicon: LSJ
  rationale: The future verb naturally means to praise or commend. 'Praise it' is
    straightforward and preserves the positive response of the wise hearer.
- source_word: ἐπʼ αὐτὸν προσθήσει
  chosen: he will add to it
  alternatives:
  - he will build on it
  - he will add to that word
  lexicon: LSJ
  rationale: The idiom suggests adding further insight or extension to the wise saying.
    'Add to it' is formally close and leaves the precise nuance open, as in the Greek.
- source_word: ὁ σπαταλῶν
  chosen: a wasteful man
  alternatives:
  - a prodigal man
  - a dissipated man
  - a reckless man
  lexicon: LSJ
  rationale: σπαταλάω and its participial form can denote self-indulgent, extravagant,
    or dissipated behavior. 'Wasteful man' preserves the core sense without over-specifying
    moral texture, and it works in proverbial contrast to the disciplined wise hearer.
- source_word: ἀπῄρεσεν αὐτῷ
  chosen: was displeased with it
  alternatives:
  - rejected it
  - took offense at it
  - was annoyed by it
  lexicon: LSJ
  rationale: The verb is textually and semantically difficult in this context. Given
    the following gesture of casting it behind his back, the sense is that he reacted
    negatively to what he heard. 'Was displeased with it' captures that response without
    overstating a more technical nuance.
- source_word: ἀπέστρεψεν αὐτοῦ ὀπίσω τοῦ νώτου αὐτοῦ
  chosen: he threw it behind his back
  alternatives:
  - he turned it behind his back
  - he cast it behind his back
  lexicon: LSJ
  rationale: The phrase is idiomatic for dismissing or disregarding something heard.
    'Threw it behind his back' communicates active rejection in natural English while
    reflecting the vivid Greek image.
