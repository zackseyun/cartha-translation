id: SIR.21.15
reference: Sirach 21:15
source:
  edition: lxx-swete-1909
  text: λόγον σοφὸν ἐὰν ἀκούσῃ ἐπιστήμων, αἰνέσει αὐτὸν καὶ ἐπʼ αὐτὸν προσθήσει· ἤκουσεν
    ὁ σπαταλῶν καὶ ἀπῄρεσεν αὐτῷ, καὶ ἀπέστρεψεν αὐτοῦ ὀπίσω τοῦ νώτου αὐτοῦ.
