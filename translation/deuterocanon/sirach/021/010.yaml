theological_decisions:
- issue: Rendering ᾅδου in wisdom literature imagery
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - the underworld
  rationale: The source text uses the proper Greek term ᾅδης rather than a generic
    word for grave. "Hades" preserves the Septuagintal conceptual world and avoids
    importing a later, more developed doctrine of hell.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
