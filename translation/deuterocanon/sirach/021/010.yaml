translation:
  text: The way of sinners is paved with stones, and at its end is the pit of Hades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "is made smooth with stones." The Greek participle can emphasize a road
      made even or leveled; "paved with stones" brings out the likely roadway image.
    reason: lexical_alternative
  - marker: b
    text: '"Hades" here refers to the realm of the dead; alternatively, "the grave"
      or "the underworld."'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁδός
  chosen: way
  alternatives:
  - path
  - road
  lexicon: BDAG
  rationale: '"Way" naturally renders the metaphorical sense of a course of life or
    conduct, while still allowing the concrete image to stand.'
- source_word: ἁμαρτωλῶν
  chosen: of sinners
  alternatives:
  - of sinful people
  lexicon: BDAG
  rationale: The genitive is straightforwardly possessive/descriptive. "Sinners" is
    the standard, concise rendering and preserves the moral category without softening
    it.
- source_word: ὡμαλισμένη
  chosen: is paved
  alternatives:
  - is made smooth
  - is leveled
  lexicon: LSJ
  rationale: From ὁμαλίζω/ὁμαλής language of making even or smooth. In context with
    ἐκ λίθων, the image is not merely abstract smoothness but a road laid or surfaced
    with stones. "Is paved" best captures the combined sense in idiomatic English.
- source_word: ἐκ λίθων
  chosen: with stones
  alternatives:
  - from stones
  - of stones
  lexicon: BDAG
  rationale: English idiom with "paved" takes "with stones." This preserves the material
    sense of ἐκ without wooden phrasing.
- source_word: ἐπʼ ἐσχάτῳ αὐτῆς
  chosen: at its end
  alternatives:
  - at its extremity
  - in its last part
  lexicon: BDAG
  rationale: The phrase denotes the far end or outcome of the way. "At its end" is
    clear modern English and preserves the metaphor of destination/result.
- source_word: βόθρος
  chosen: pit
  alternatives:
  - ditch
  - hole
  lexicon: LSJ
  rationale: '"Pit" best fits both literal imagery and the ominous metaphorical force
    of destruction or death.'
- source_word: ᾅδου
  chosen: of Hades
  alternatives:
  - of the grave
  - of the underworld
  lexicon: BDAG
  rationale: The Greek explicitly names Hades, the realm of the dead. Retaining "Hades"
    is more textually precise than flattening it to "grave," while remaining understandable
    in English.
