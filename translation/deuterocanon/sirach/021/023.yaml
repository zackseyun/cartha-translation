translation:
  text: A fool peers into a house from the doorway, but an honorable man will stand
    outside and speak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'and honor to a man [who] will stand outside and speak,' a
      compressed expression rendered here as 'a well-bred man.' The Greek parallel
      has 'a trained/educated man will stand outside.'
    reason: alternative_reading
  - marker: b
    text: The Greek parallel ends with 'will stand outside' and does not include 'and
      speak,' which is present in the Hebrew witness followed here.
    reason: textual_variant
lexical_decisions:
- source_word: אֱוִיל
  chosen: a fool
  alternatives:
  - a stupid person
  - a senseless man
  lexicon: HALOT
  rationale: Standard Hebrew wisdom term for a morally and socially foolish person,
    not merely someone lacking intelligence. 'A fool' preserves the proverbial register.
- source_word: מִפֶּתַח
  chosen: from the doorway
  alternatives:
  - at the entrance
  - through the door
  lexicon: HALOT
  rationale: The preposition מן with פתח indicates position at or from the entrance.
    'From the doorway' fits the image of intrusive looking from the threshold.
- source_word: יַבִּיט אֶל בָּיִת
  chosen: peers into a house
  alternatives:
  - looks into a house
  - gazes into the house
  lexicon: HALOT
  rationale: הביט אל commonly means to look toward/into. Given the social impropriety
    in context and the Greek παρακύπτει ('peeps/bends to look'), 'peers into' best
    captures the intrusive nuance.
- source_word: וְכָבוֹד לְאִישׁ
  chosen: but a well-bred man
  alternatives:
  - but honor belongs to a man
  - and it is honorable for a man
  - but an honorable man
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed. Literally, 'and honor to a man...'
    but the sense in context is that proper conduct marks a respectable/cultivated
    person. The Greek parallel reads ἀνὴρ δὲ πεπαιδευμένος ('a trained/educated man'),
    which supports taking כבוד here as social propriety/honorableness rather than
    an abstract predicate. 'Well-bred man' conveys socially proper behavior in idiomatic
    English.
- source_word: בַּחוּץ יַעֲמוֹד
  chosen: will stand outside
  alternatives:
  - stands outside
  - will remain outside
  lexicon: HALOT
  rationale: Straightforward rendering of the Hebrew phrase, also confirmed by the
    Greek ἔξω στήσεται. Future English works naturally in proverbial style.
- source_word: וִידַבֵּר
  chosen: and speak
  alternatives:
  - and converse
  - and call out
  lexicon: HALOT
  rationale: The Hebrew explicitly adds speech, likely meaning that the courteous
    person announces himself or speaks from outside rather than intruding. Although
    the extant Greek parallel lacks an equivalent verb, the Hebrew witness is primary
    here and should be represented.
