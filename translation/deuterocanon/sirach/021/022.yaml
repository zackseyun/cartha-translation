theological_decisions:
- issue: Use of Hebrew as primary witness with Greek parallel showing notable divergence
    in the second colon
  chosen_reading: Translate from the Hebrew Cairo Geniza text while allowing the Greek
    to inform uncertainty in the second colon.
  alternative_readings:
  - A man of much experience will be ashamed before a face/presence.
  rationale: 'Project policy gives primacy to the surviving Hebrew of Sirach where
    available. Here the first colon aligns well between Hebrew and Greek, but the
    second colon differs substantially: Hebrew ''a man of schemes humbles himself
    before the great/many'' versus Greek ''a very experienced man will be ashamed
    from a face/presence.'' The main text therefore follows the Hebrew, but the Greek
    alternative is preserved in a footnote because the divergence materially affects
    interpretation.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly'
