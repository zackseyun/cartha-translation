  - marker: a
    text: 'Greek parallel: ''but a very experienced man will be ashamed before a face/presence.''
      The Hebrew and Greek differ notably in the second line.'
    reason: alternative_reading
lexical_decisions:
- source_word: רֶגֶל
  chosen: foot
  alternatives:
  - feet
  - step
  lexicon: HALOT
  rationale: The singular Hebrew is retained idiomatically as 'foot,' matching the
    proverb-like style and aligning with the Greek ποὺς. 'Step' would smooth the image
    too much.
- source_word: נָבָל
  chosen: fool
  alternatives:
  - senseless man
  - base man
  lexicon: HALOT
  rationale: '''Fool'' is the most natural wisdom-literature rendering and fits Sirach''s
    ethical register. It preserves the moral-intellectual sense without overinterpreting
    as ''vile'' or ''base.'''
- source_word: מִהֲרָה
  chosen: hurries
  alternatives:
  - is quick
  - rushes
  lexicon: HALOT
  rationale: The verb conveys haste. 'Hurries' is readable modern English and preserves
    the negative nuance of impulsive eagerness in context.
- source_word: אֶל בָּיִת
  chosen: to a house
  alternatives:
  - into a house
  - to the house
  lexicon: HALOT
  rationale: The Hebrew is indefinite, and the Greek likewise has εἰς οἰκίαν without
    requiring definiteness. 'To a house' preserves the broad proverbial sense.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: Per project philosophy, gender-accurate language is preferred where the
    source is masculine generic. 'A man' also preserves the parallelism with the first
    colon.
- source_word: מְזִימוֹת
  chosen: of schemes
  alternatives:
  - discerning
  - experienced
  - prudent
  lexicon: HALOT
  rationale: The Hebrew noun usually denotes plans or schemes, often with a morally
    ambivalent or negative edge. The Greek parallel reads πολύπειρος ('very experienced')
    and points to a positive-sounding counterpart, but the primary Hebrew witness
    is to be followed. 'Of schemes' preserves the Hebrew wording while leaving the
    exact moral coloring open.
- source_word: יַכְנִיעַ
  chosen: humbles himself
  alternatives:
  - submits
  - is brought low
  - shows deference
  lexicon: HALOT
  rationale: The hiphil of כנע commonly means to humble or subdue. In this context,
    reflexive English ('humbles himself') best conveys voluntary lowering/deference
    before others.
- source_word: לָרַבִּים
  chosen: before the great
  alternatives:
  - before many
  - to the many
  - before the multitude
  lexicon: HALOT
  rationale: Hebrew רבים can mean 'many' or 'great ones.' Given the social setting
    and the Greek's different ending ('from a face/presence'), the exact sense is
    somewhat uncertain. 'Before the great' best fits the idiom of deference and yields
    a coherent proverb, while preserving the likely social nuance.
