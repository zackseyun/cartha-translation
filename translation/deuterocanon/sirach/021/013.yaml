translation:
  text: The knowledge of a wise man will increase like a flood, and his counsel is
    like a spring of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The knowledge of the wise will increase like a flood'; the Greek σοφοῦ
      is singular, but some English renderings generalize it.
    reason: lexical_alternative
  - marker: b
    text: Or 'a fountain of life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνῶσις
  chosen: knowledge
  alternatives:
  - understanding
  - discernment
  lexicon: LSJ
  rationale: γνῶσις most directly denotes knowledge. 'Understanding' or 'discernment'
    are possible in wisdom literature, but the noun here is straightforward and pairs
    well with the image of increase.
- source_word: σοφοῦ
  chosen: of a wise man
  alternatives:
  - of the wise
  - of a wise person
  lexicon: LSJ
  rationale: The genitive singular σοφοῦ is best rendered as an individual exemplar,
    'of a wise man.' This follows the project's gender-accurate policy rather than
    flattening to a neutral plural or abstract class.
- source_word: ὡς κατακλυσμός
  chosen: like a flood
  alternatives:
  - like a deluge
  lexicon: LSJ
  rationale: κατακλυσμός denotes an inundation or flood. 'Flood' is clear modern English;
    'deluge' is possible but more elevated and less natural here.
- source_word: πληθυνθήσεται
  chosen: will increase
  alternatives:
  - will be multiplied
  - will abound
  lexicon: LSJ
  rationale: The future passive/middle sense here is well conveyed by 'will increase.'
    'Will be multiplied' is more formally literal, but 'will increase' is more idiomatic
    while preserving the sense of growth in abundance.
- source_word: βουλή
  chosen: counsel
  alternatives:
  - advice
  - purpose
  - deliberation
  lexicon: LSJ
  rationale: In wisdom context βουλή commonly refers to counsel or sound advice. 'Purpose'
    is possible in other contexts, but here the comparison to a life-giving spring
    favors the practical sense of wise counsel offered to others.
- source_word: πηγή ζωῆς
  chosen: a spring of life
  alternatives:
  - a fountain of life
  - a source of life
  lexicon: LSJ
  rationale: πηγή is a spring or fountain. 'Spring of life' is vivid, natural, and
    preserves the metaphor. 'Fountain of life' is traditional and possible, but 'spring'
    better matches accessible modern English.
