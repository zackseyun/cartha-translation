translation:
  text: He who is not shrewd will not be instructed;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clever' or 'prudent'; the Greek word can also carry a negative sense
      such as 'crafty' in other contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ παιδευθήσεται
  chosen: will not be instructed
  alternatives:
  - will not be disciplined
  - will not be taught
  - will not be educated
  lexicon: BDAG
  rationale: The future passive of παιδεύω can mean to educate, train, discipline,
    or instruct. In this wisdom context, 'be instructed' best captures receptivity
    to corrective teaching without narrowing the sense to punishment alone ('disciplined')
    or formal schooling ('educated').
- source_word: ὃς
  chosen: He who
  alternatives:
  - whoever
  - the one who
  lexicon: LSJ
  rationale: The relative pronoun introduces a generic person. 'He who' preserves
    the masculine singular form in line with the project's gender-accurate policy
    for representative masculine expressions in wisdom literature.
- source_word: οὐκ ἔστιν
  chosen: is not
  alternatives:
  - does not prove to be
  - is not found to be
  lexicon: BDAG
  rationale: A straightforward existential/copular rendering is sufficient; the Greek
    does not require a more expanded English expression.
- source_word: πανοῦργος
  chosen: shrewd
  alternatives:
  - clever
  - crafty
  - prudent
  - resourceful
  lexicon: LSJ
  rationale: πανοῦργος can be negative ('crafty, unscrupulous') or more neutral/positive
    ('clever, shrewd') depending on context. Here the saying appears to commend a
    kind of practical acuity needed to receive instruction, so 'shrewd' best preserves
    the sharpness of the term without importing moral corruption. 'Prudent' would
    sound too positively moralized; 'crafty' would skew negative.
