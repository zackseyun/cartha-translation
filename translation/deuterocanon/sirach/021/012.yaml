theological_decisions:
- issue: Moral valence of πανοῦργος in a wisdom saying
  chosen_reading: Render the term in a relatively neutral-positive sense ('shrewd')
    rather than a negative sense ('crafty').
  alternative_readings:
  - He who is not crafty will not be instructed;
  - Whoever is not clever will not be taught;
  rationale: The verse links the quality named by πανοῦργος with the capacity to benefit
    from instruction. A negative rendering would make the proverb imply that one must
    be morally devious to learn, which is unlikely in context. A neutral-positive
    rendering preserves the idea of practical sharpness or mental quickness without
    overinterpreting.
