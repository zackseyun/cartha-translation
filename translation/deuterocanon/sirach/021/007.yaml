translation:
  text: A man mighty in tongue is known from afar, but one with understanding knows
    when he slips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is recognized from a distance'; the Greek may suggest either conspicuous
      speech or a reputation that precedes him.
    reason: lexical_alternative
  - marker: b
    text: Or 'when he stumbles.' The Greek image of slipping can denote either literal
      stumbling or figurative error.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνωστὸς μακρόθεν
  chosen: is known from afar
  alternatives:
  - is recognized from a distance
  - becomes known far away
  lexicon: LSJ
  rationale: The phrase naturally conveys that such a person is readily recognized
    even at a distance, likely by reputation or conspicuous speech. 'Known from afar'
    preserves the compact Greek idiom without overexplaining.
- source_word: ὁ δυνατὸς ἐν γλώσσῃ
  chosen: a man mighty in tongue
  alternatives:
  - one powerful in speech
  - a strong speaker
  - one skilled with the tongue
  lexicon: LSJ
  rationale: δυνατός means powerful/strong; ἐν γλώσσῃ is literally 'in tongue,' an
    idiom for speech. 'Mighty in tongue' keeps the vivid metaphor while remaining
    intelligible. 'Man' reflects the masculine singular article used representatively,
    in line with the gender-accurate policy.
- source_word: ὁ δὲ νοήμων
  chosen: but one with understanding
  alternatives:
  - but the discerning person
  - but the intelligent one
  - but the prudent one
  lexicon: LSJ
  rationale: νοήμων denotes understanding, discernment, or intelligence. 'One with
    understanding' is natural English and preserves the contrast with the merely verbally
    powerful person.
- source_word: οἶδεν
  chosen: knows
  alternatives:
  - perceives
  - recognizes
  lexicon: LSJ
  rationale: The common verb 'knows' is sufficient and lets the object/complement
    carry the nuance of perceptive recognition.
- source_word: ἐν τῷ ὀλισθάνειν αὐτόν
  chosen: when he slips
  alternatives:
  - in his slipping
  - when he stumbles
  - at the moment he falls into error
  lexicon: LSJ
  rationale: 'The articular infinitive with ἐν commonly has temporal force: ''when/in
    the act of.'' ὀλισθάνειν is literally ''to slip'' or ''stumble.'' ''When he slips''
    is concise and idiomatic, preserving the image and likely moral implication without
    making it more explicit than the Greek does.'
