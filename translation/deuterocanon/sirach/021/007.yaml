theological_decisions:
- issue: Representative masculine wording
  chosen_reading: A man mighty in tongue ... but one with understanding ... when he
    slips
  alternative_readings:
  - One mighty in tongue ... but the discerning person ... when he slips
  - A powerful speaker ... but the wise person knows when he slips
  rationale: The Greek begins with a masculine singular construction. Rendering the
    first clause with 'a man' preserves the representative masculine force, while
    the second clause uses a natural English equivalent without obscuring the contrast.
    No doctrinal issue is at stake, but this follows the project's gender-accurate
    policy.
