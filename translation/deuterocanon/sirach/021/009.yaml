theological_decisions:
- issue: Whether ἀνόμων should be softened to a general moral term
  chosen_reading: lawless
  alternative_readings:
  - wicked
  - ungodly
  rationale: The Greek specifically evokes disregard for law/order, not generic evil.
    Retaining 'lawless' preserves the sharper ethical category without importing later
    doctrinal nuance.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether the verse should be rendered as a direct metaphor or with an explanatory
    expansion
  chosen_reading: 'Direct simile/metaphor with minimal expansion: ''is like a bundle
    of tow'''
  alternative_readings:
  - An assembly of the lawless is gathered like tow
  - The company of the wicked is tinder gathered together
  rationale: Optimal equivalence favors preserving the vivid image while making the
    compressed Greek intelligible in modern English. 'Bundle' is a modest explicitation
    of the participle, not a paraphrase.
  doctrine_reference: Translation philosophy §1, §6
