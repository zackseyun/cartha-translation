translation:
  text: An assembly of the lawless is like a bundle of tow, and their end is a flame
    of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''a gathering of the wicked is like tow gathered together.'' The Greek
      compresses the image: literally ''tow gathered together, an assembly of the
      lawless.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: στιππύον
  chosen: tow
  alternatives:
  - kindling
  - stubble
  - flax tow
  lexicon: LSJ
  rationale: The noun denotes combustible fibrous material, especially tow/flax refuse.
    'Tow' is the most precise rendering, while the simile's force is clarified by
    the surrounding phrase 'bundle of tow.'
- source_word: συνηγμένον
  chosen: bundle
  alternatives:
  - gathered together
  - heaped up
  lexicon: LSJ
  rationale: Literally 'having been gathered together.' In idiomatic English with
    a combustible noun, 'bundle' captures both the passive participial sense and the
    image of material collected for burning.
- source_word: συναγωγὴ ἀνόμων
  chosen: assembly of the lawless
  alternatives:
  - gathering of the wicked
  - congregation of the lawless
  lexicon: LSJ
  rationale: συναγωγή is a gathering/assembly; ἄνομος means lawless, not merely morally
    'wicked.' 'Assembly of the lawless' preserves the social image and the legal-moral
    nuance.
- source_word: συντέλεια
  chosen: end
  alternatives:
  - outcome
  - consummation
  lexicon: LSJ
  rationale: Here the word refers to the final result or fate of the lawless assembly.
    'End' is natural English and preserves the eschatological/final sense without
    overloading the line.
- source_word: φλὸξ πυρός
  chosen: a flame of fire
  alternatives:
  - fiery flame
  - flame
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the emphatic image. 'A flame of
    fire' sounds slightly Hebraic/poetic in English and suits wisdom literature.
