translation:
  text: Instruction is like a golden ornament to a prudent man, and like a bracelet
    on his right arm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'discipline' or 'training' for 'instruction' (παιδεία), since the Greek
      term can include moral formation as well as teaching.
    reason: lexical_alternative
lexical_decisions:
- source_word: κόσμος
  chosen: ornament
  alternatives:
  - adornment
  - jewel
  - decoration
  lexicon: LSJ
  rationale: In this context κόσμος denotes an adornment or ornament, not the 'world.'
    The comparison with gold and with a bracelet on the right arm favors a wearable
    decorative item. 'Ornament' is natural English and preserves the image.
- source_word: χρυσοῦς
  chosen: golden
  alternatives:
  - of gold
  - made of gold
  lexicon: LSJ
  rationale: The adjective describes the ornament as gold/golden. 'Golden ornament'
    is concise and idiomatic, while still reflecting the material/value nuance.
- source_word: φρονίμῳ
  chosen: to a prudent man
  alternatives:
  - for a wise man
  - to the sensible man
  - for the discerning person
  lexicon: LSJ
  rationale: The dative marks the person for whom instruction is fitting or beneficial.
    φρόνιμος carries the sense of prudent, sensible, practically wise. 'Prudent man'
    preserves the masculine singular form and the wisdom-context nuance.
- source_word: παιδεία
  chosen: instruction
  alternatives:
  - discipline
  - training
  - education
  lexicon: LSJ
  rationale: παιδεία in wisdom literature can include discipline and moral formation,
    but here the saying praises its value as something beautifying to the wise. 'Instruction'
    best fits the immediate context without over-narrowing to punitive discipline,
    while still allowing the broader formative sense.
- source_word: χλιδών
  chosen: bracelet
  alternatives:
  - armlet
  - luxurious ornament
  lexicon: LSJ
  rationale: Given the phrase 'upon the right arm,' the noun most naturally refers
    to an arm-ornament. 'Bracelet' is the clearest modern equivalent, though 'armlet'
    is possible.
- source_word: βραχίονι δεξιῷ
  chosen: on his right arm
  alternatives:
  - upon the right arm
  - on the right forearm
  lexicon: LSJ
  rationale: This phrase specifies the location of the ornament. Adding 'his' makes
    the English idiomatic and reflects the implied possessive relation in the comparison.
