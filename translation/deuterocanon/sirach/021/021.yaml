- issue: Gender rendering of masculine singular φρονίμῳ
  chosen_reading: prudent man
  alternative_readings:
  - prudent person
  - wise person
  rationale: The Greek is grammatically masculine singular in a wisdom-saying about
    a representative individual. Per doctrine, gender-accurate rendering is preferred
    over flattening to gender-neutral language unless context requires otherwise.
