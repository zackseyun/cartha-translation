translation:
  text: In the mouth of fools is their heart, but the heart of the wise is their mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'the mouth of the wise is in their heart'—that
      is, the wise keep speech under inward control. The Greek wording is terse and
      antithetical, and this alternative makes the implied sense explicit.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν
  chosen: in
  alternatives:
  - 'on'
  - at
  lexicon: BDAG
  rationale: 'The preposition is retained literally to preserve the proverb''s imagery:
    the fool''s heart is located ''in'' his mouth, i.e., immediately expressed in
    speech.'
- source_word: στόματι
  chosen: mouth
  alternatives:
  - speech
  - words
  lexicon: BDAG
  rationale: A literal rendering fits the antithetical proverb and preserves the concrete
    metaphor better than an abstract paraphrase like 'speech'.
- source_word: μωρῶν
  chosen: fools
  alternatives:
  - the foolish
  - foolish people
  lexicon: BDAG
  rationale: The plural substantive is naturally rendered 'fools' in English wisdom
    literature and keeps the proverbial tone concise.
- source_word: καρδία
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: BDAG
  rationale: '''Heart'' best preserves the biblical anthropological sense of the inner
    person, including thought and disposition, without reducing it to emotion alone.'
- source_word: σοφῶν
  chosen: the wise
  alternatives:
  - wise people
  - wise ones
  lexicon: BDAG
  rationale: The genitive plural substantive is idiomatically rendered 'the wise'
    in English proverbial style.
- source_word: καρδία δὲ σοφῶν στόμα αὐτῶν
  chosen: but the heart of the wise is their mouth
  alternatives:
  - but the mouth of the wise is their heart
  - but the wise have their mouth in their heart
  lexicon: BDAG
  rationale: 'The Greek as transmitted is elliptical and intentionally antithetical.
    A formally close rendering preserves the inversion: fools speak straight from
    the heart, whereas for the wise the heart stands in relation to the mouth in the
    opposite order. More idiomatic alternatives interpret the proverb more explicitly,
    but the chosen wording keeps the source structure auditable.'
