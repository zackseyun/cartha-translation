theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's default for κύριος is 'Lord.' In Sirach this also fits
    reverential wisdom usage directed toward God.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Supplying an implied verbal idea in the first clause
  chosen_reading: One who hates reproof walks in the track of a sinner
  alternative_readings:
  - One who hates reproof is in the track of a sinner
  - One who hates reproof follows a sinner's track
  rationale: The Greek first clause is elliptical, with no explicit finite verb after
    the participle. The supplied 'walks' reflects the path/track imagery of ἴχνος
    and yields coherent English without adding doctrinal content.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
