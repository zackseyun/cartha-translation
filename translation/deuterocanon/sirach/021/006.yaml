translation:
  text: One who hates reproof walks in the track of a sinner, but one who fears the
    Lord will turn back in his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'is in the track/footstep of a sinner.' The Greek first
      clause is elliptical, so English supplies the implied motion.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισῶν
  chosen: one who hates
  alternatives:
  - whoever hates
  - the one hating
  lexicon: BDAG
  rationale: The present participle functions substantivally, describing a type of
    person. 'One who hates' is natural English and preserves the ongoing character
    sense.
- source_word: ἐλεγμὸν
  chosen: reproof
  alternatives:
  - rebuke
  - correction
  - conviction
  lexicon: LSJ
  rationale: '''Reproof'' best captures verbal correction or admonition in wisdom
    literature. ''Rebuke'' is possible, but ''reproof'' fits the moral-instruction
    context slightly better.'
- source_word: ἐν ἴχνει
  chosen: walks in the track of
  alternatives:
  - is in the footsteps of
  - follows the track of
  - in the footprint of
  lexicon: LSJ
  rationale: ἴχνος denotes a track, footprint, or trace. The Greek lacks an explicit
    finite verb in the first clause, so English supplies one idiomatically. 'Walks
    in the track of' makes the implied sense clear while staying close to the image.
- source_word: ἁμαρτωλοῦ
  chosen: a sinner
  alternatives:
  - the sinner
  - sinful man
  lexicon: BDAG
  rationale: The singular generic is best rendered 'a sinner.' This preserves the
    wisdom-style characterization without over-specifying a particular individual.
- source_word: ὁ φοβούμενος Κύριον
  chosen: one who fears the Lord
  alternatives:
  - whoever fears the Lord
  lexicon: BDAG
  rationale: A substantival participial phrase describing a class of person. 'Lord'
    follows the project's default rendering for κύριος.
- source_word: ἐπιστρέψει
  chosen: will turn back
  alternatives:
  - will return
  - will repent
  - turns back
  lexicon: BDAG
  rationale: Future active naturally renders as 'will turn back.' 'Repent' is interpretive
    and stronger than the lexical sense; 'return' is possible but less clear in English
    without an explicit object.
- source_word: ἐν καρδίᾳ
  chosen: in his heart
  alternatives:
  - in heart
  - with his heart
  - inwardly
  lexicon: BDAG
  rationale: The phrase indicates inward disposition. 'In his heart' preserves the
    anthropological idiom. The masculine singular reflects the Greek generic form
    per project policy on gender accuracy.
