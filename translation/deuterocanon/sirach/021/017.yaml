translation:
  text: The mouth of a wise man will be sought in the assembly, and they will ponder
    his words in their hearts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be sought after in the congregation.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek ''in heart''; the English supplies ''their'' for natural sense: the
      community inwardly reflects on what the wise man says.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στόμα
  chosen: mouth
  alternatives:
  - speech
  - words
  lexicon: LSJ
  rationale: A literal rendering fits the Greek idiom and preserves the concrete image
    of the wise person's utterance being valued. 'Speech' would smooth the metaphor
    too quickly.
- source_word: φρονίμου
  chosen: of a wise man
  alternatives:
  - of a wise person
  - of the prudent man
  lexicon: LSJ
  rationale: The genitive modifies 'mouth.' The masculine singular is retained as
    'man' per the project's gender-accurate policy; 'wise' is the most natural gloss
    here, while 'prudent' is possible but less idiomatic in English.
- source_word: ζητηθήσεται
  chosen: will be sought
  alternatives:
  - will be sought after
  - will be in demand
  lexicon: LSJ
  rationale: The future passive of ζητέω is best rendered straightforwardly. 'Sought'
    preserves the formal sense; 'sought after' is interpretive expansion, and 'in
    demand' is too idiomatic.
- source_word: ἐν ἐκκλησίᾳ
  chosen: in the assembly
  alternatives:
  - in the congregation
  - in the gathering
  lexicon: LSJ
  rationale: For Sirach, ἐκκλησία refers to the gathered community rather than a later
    technical sense 'church.' 'Assembly' is both accurate and readable.
- source_word: λόγους
  chosen: words
  alternatives:
  - sayings
  - speech
  lexicon: LSJ
  rationale: '''Words'' is the broad and natural equivalent for λόγοι here. ''Sayings''
    is narrower and more stylized.'
- source_word: διανοηθήσεται
  chosen: will ponder
  alternatives:
  - will consider
  - will think over
  lexicon: LSJ
  rationale: The future middle conveys reflective internal consideration. 'Ponder'
    captures this contemplative sense well without becoming wooden.
- source_word: ἐν καρδίᾳ
  chosen: in their heart
  alternatives:
  - in the heart
  - in their minds
  lexicon: LSJ
  rationale: Although the Greek lacks an explicit possessive pronoun, English idiom
    commonly supplies one with distributive force after an indefinite plural subject
    implied by the verb. 'Heart' should be retained rather than reduced to 'mind,'
    since biblical anthropology includes inward reflection in the heart.
