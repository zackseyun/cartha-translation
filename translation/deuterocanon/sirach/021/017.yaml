theological_decisions:
- issue: Gender rendering of φρονίμου
  chosen_reading: wise man
  alternative_readings:
  - wise person
  rationale: The Greek adjective is masculine singular used substantivally. Following
    the project's gender-accurate policy, the masculine form is retained unless context
    clearly demands a gender-inclusive abstraction.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of ἐκκλησία in deuterocanonical Greek
  chosen_reading: assembly
  alternative_readings:
  - congregation
  - church
  rationale: The context is sapiential and communal, not ecclesiological in a later
    Christian institutional sense. 'Assembly' preserves the communal setting without
    importing later doctrinal associations.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
