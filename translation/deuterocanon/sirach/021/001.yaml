translation:
  text: Child, have you sinned? Do so no more, and pray concerning your former sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew line supplied in Zone 1 does not match Sirach 21:1 here;
      it reads, 'Three things I hated, and four I did not love.' Because of that mismatch,
      the Greek witness is followed for this verse.
    reason: textual_variant
lexical_decisions:
- source_word: Τέκνον
  chosen: Child
  alternatives:
  - My child
  - Son
  lexicon: BDAG
  rationale: The Hebrew Zone 1 text appears to belong to a different verse line ('Three
    things I hated...'), while the Greek parallel gives the familiar admonition for
    Sirach 21:1. Because the Hebrew witness is marked minor_mismatch and does not
    align semantically with the verse reference, the Greek provides the usable base
    text here. Τέκνον is a direct address meaning 'child'; 'Child' preserves the vocative
    without importing gender. 'My child' would add a possessive not present in the
    Greek.
- source_word: ἥμαρτες
  chosen: have you sinned
  alternatives:
  - did you sin
  - have you missed the mark
  lexicon: BDAG
  rationale: Aorist of ἁμαρτάνω in a direct question. 'Have you sinned?' is idiomatic
    English and preserves the moral-religious sense. 'Missed the mark' is too interpretive
    for main text.
- source_word: μὴ προσθῇς μηκέτι
  chosen: Do so no more
  alternatives:
  - Do not continue any longer
  - Add no more
  lexicon: BDAG
  rationale: The idiom literally means 'do not add again/any longer.' In context it
    forbids repeating the sin. 'Do so no more' is natural English that keeps the force
    of cessation without woodenly reproducing 'add.'
- source_word: περὶ τῶν προτέρων σου
  chosen: concerning your former sins
  alternatives:
  - for your previous sins
  - about the things before
  lexicon: BDAG
  rationale: The Greek literally says 'concerning your former things.' In context,
    with the preceding mention of sin, the implied object is prior sins. Supplying
    'sins' in English makes the sense explicit and is warranted by the discourse.
- source_word: δεήθητι
  chosen: pray
  alternatives:
  - make supplication
  - entreat
  lexicon: BDAG
  rationale: Imperative of δέομαι, 'to ask, implore, pray.' 'Pray' is accessible modern
    English and fits the penitential context; 'make supplication' is more formal but
    less readable.
