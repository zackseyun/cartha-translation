translation:
  text: It is a man's lack of discipline to listen at a door, but a prudent man will
    be weighed down by disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to listen at a door'; the phrase implies eavesdropping without
      making the implication explicit in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαιδευσία
  chosen: lack of discipline
  alternatives:
  - undisciplined behavior
  - ignorance
  - boorishness
  lexicon: LSJ
  rationale: The noun denotes absence of proper training or instruction, with the
    resulting sense of ill-bred or undisciplined conduct. 'Lack of discipline' preserves
    the moral-social force without sounding overly academic.
- source_word: ἀνθρώπου
  chosen: a man's
  alternatives:
  - of a man
  - human
  - a person's
  lexicon: LSJ
  rationale: 'The genitive depends on ἀπαιδευσία: ''the lack of discipline of a man.''
    Following the project''s gender-accurate principle, ''a man''s'' is retained rather
    than neutralizing to ''a person''s,'' since the Greek is singular masculine/generic.'
- source_word: ἀκροᾶσθαι
  chosen: to listen
  alternatives:
  - to eavesdrop
  - to hear
  lexicon: LSJ
  rationale: The infinitive means 'to listen/hear.' In context with 'at a door' it
    implies eavesdropping, but the Greek states the act more literally. 'To listen'
    keeps the wording close to the source while allowing the context to convey impropriety.
- source_word: παρὰ θύραν
  chosen: at a door
  alternatives:
  - by a door
  - beside a door
  lexicon: LSJ
  rationale: παρά with the accusative here indicates position near a door. 'At a door'
    is idiomatic English and preserves the image of listening outside someone else's
    doorway.
- source_word: φρόνιμος
  chosen: prudent man
  alternatives:
  - wise man
  - sensible man
  lexicon: LSJ
  rationale: φρόνιμος emphasizes practical wisdom and sound judgment. 'Prudent' best
    captures that nuance in contrast to the ill-bred person of the first clause.
- source_word: βαρυνθήσεται
  chosen: will be weighed down
  alternatives:
  - will be burdened
  - will be offended
  - will be grieved
  lexicon: LSJ
  rationale: The future passive literally suggests being made heavy or burdened. In
    this context it describes the prudent person's reaction to disgraceful conduct.
    'Will be weighed down' preserves the metaphorical heaviness.
- source_word: ἀτιμίᾳ
  chosen: by disgrace
  alternatives:
  - by dishonor
  - by shame
  - at the insult
  lexicon: LSJ
  rationale: 'The dative can express cause or means: the prudent person is burdened
    because of dishonor/disgrace. ''Disgrace'' fits the social-moral register of the
    verse and reads naturally in English.'
