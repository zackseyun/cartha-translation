theological_decisions:
- issue: Whether σατανᾶ should be rendered as a title/common noun or as the proper
    name Satan
  chosen_reading: the Adversary
  alternative_readings:
  - Satan
  rationale: The Greek term is semantically 'adversary' and is not among the project's
    fixed contested-term defaults. In this wisdom saying, a translated rendering better
    reflects original-language meaning and avoids importing a more fixed later proper-name
    sense than the text itself requires. Because many readers will expect 'Satan,'
    that alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; original-language
    primacy over translation tradition.'
