translation:
  text: When the ungodly curses the Adversary, he curses his own soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Satan.' The Greek reads satanas, a transliterated term meaning 'adversary.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ καταρᾶσθαι
  chosen: When ... curses
  alternatives:
  - In cursing
  - While ... curses
  lexicon: BDAG
  rationale: The articular infinitive with ἐν commonly expresses a temporal circumstance.
    In idiomatic English, 'When ... curses' best conveys the sense without awkwardness.
- source_word: ἀσεβῆ
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  - an ungodly man
  lexicon: LSJ
  rationale: Although morphologically this form can be accusative, in this construction
    it functions as the subject of the infinitive. 'The ungodly' preserves the singular
    generic force and matches the moral-religious sense of ἀσεβής.
- source_word: τὸν σατανᾶ
  chosen: the Adversary
  alternatives:
  - Satan
  - the satan
  lexicon: LSJ
  rationale: σατανᾶς is a transliteration of the Semitic term for 'adversary/accuser.'
    In Sirach's wisdom context, the common noun sense remains plausible, and translating
    it preserves meaning rather than importing later name-like usage too strongly.
    The capitalized 'Adversary' signals a personal referent while retaining lexical
    transparency.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - that one
  - he himself
  lexicon: BDAG
  rationale: Here αὐτός resumes the subject and adds mild emphasis. English can convey
    the sense naturally with 'he' without overloading the line.
- source_word: καταρᾶται
  chosen: curses
  alternatives:
  - calls down a curse on
  lexicon: BDAG
  rationale: The same verb is used twice in the verse; rendering both with 'curses'
    preserves the rhetorical parallel.
- source_word: τὴν ἑαυτοῦ ψυχήν
  chosen: his own soul
  alternatives:
  - himself
  - his own life
  lexicon: BDAG
  rationale: ψυχή can mean 'life' or 'self,' but 'soul' best preserves the moral-spiritual
    weight of the saying, and ἑαυτοῦ is reflected by 'his own.'
