translation:
  text: Whoever keeps the law controls his understanding, and the fulfillment of the
    fear of the Lord is wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'masters his mind,' 'holds fast to his intention,' or 'preserves his
      understanding.' The Greek phrase is compact, and ἐννόημα can mean thought, intention,
      or understanding.
    reason: lexical_alternative
  - marker: b
    text: Or 'the fulfillment of the fear of the Lord is wisdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ φυλάσσων
  chosen: Whoever keeps
  alternatives:
  - The one who guards
  - He who observes
  lexicon: BDAG
  rationale: The articular present participle has a generic force. 'Whoever keeps'
    gives natural modern English while preserving the ongoing sense of φυλάσσω as
    keep/observe/guard.
- source_word: νόμον
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: νόμος here is anarthrous in Greek but refers to the known body of instruction;
    English idiom favors 'the law' in wisdom/Jewish context.
- source_word: κατακρατεῖ
  chosen: controls
  alternatives:
  - masters
  - holds fast to
  - gains mastery over
  lexicon: BDAG
  rationale: The verb can mean seize, hold fast, or gain mastery over. With the genitive
    object 'of his understanding,' the sense is best taken as exercising control or
    mastery rather than merely retaining possession.
- source_word: τοῦ ἐννοήματος αὐτοῦ
  chosen: his understanding
  alternatives:
  - his purpose
  - his mind
  - his intention
  lexicon: LSJ
  rationale: ἐννόημα can denote thought, intention, or understanding. In this sapiential
    context, 'understanding' fits the moral-intellectual sense better than 'purpose'
    or the more concrete 'mind.' The possessive αὐτοῦ is retained.
- source_word: συντέλεια
  chosen: the completion
  alternatives:
  - the fulfillment
  - the consummation
  - the end
  lexicon: BDAG
  rationale: συντέλεια denotes completion or bringing to full measure. 'Completion'
    preserves the metaphor of something brought to its proper end without overinterpreting
    eschatologically.
- source_word: τοῦ φόβου Κυρίου
  chosen: the fear of the Lord
  alternatives:
  - fear of the Lord
  lexicon: BDAG
  rationale: 'A standard wisdom expression. ''Lord'' follows the project''s default
    for κύριος. The genitive is objective: reverent fear directed toward the Lord.'
- source_word: σοφία
  chosen: wisdom
  lexicon: BDAG
  rationale: Straightforward sapiential term; no contextual reason to vary the standard
    gloss.
