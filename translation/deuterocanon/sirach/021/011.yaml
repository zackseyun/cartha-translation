theological_decisions:
- issue: Meaning of the relation between law-keeping and inner faculty in κατακρατεῖ
    τοῦ ἐννοήματος αὐτοῦ
  chosen_reading: Law-keeping gives a person mastery over his understanding.
  alternative_readings:
  - Law-keeping holds fast to his intention.
  - Law-keeping preserves his understanding.
  rationale: 'The Greek construction is somewhat compressed, and ἐννόημα can point
    either to thought/intention or understanding. The chosen reading best fits the
    wisdom context: obedience disciplines and governs one''s inner discernment. Alternatives
    are preserved because the phrase is semantically broad and the source note indicates
    minor mismatch at the source-validation level, though not enough to overturn the
    main sense.'
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
