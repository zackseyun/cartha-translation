translation:
  text: All lawlessness is like a two-edged sword; for its wound there is no healing.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: LSJ
  rationale: Introduces a simile. 'Like' is the most natural modern English marker
    here.
- source_word: ῥομφαία δίστομος
  chosen: a two-edged sword
  alternatives:
  - a double-edged sword
  - a two-mouthed sword
  lexicon: LSJ
  rationale: The phrase denotes a sword with two edges. 'Two-edged sword' is idiomatic
    and preserves the vivid image without over-literalizing δίστομος as 'two-mouthed.'
- source_word: πᾶσα ἀνομία
  chosen: all lawlessness
  alternatives:
  - every lawless deed
  - all iniquity
  - all wrongdoing
  lexicon: BDAG
  rationale: ἀνομία is best rendered 'lawlessness,' preserving the sense of violation
    of law/order rather than merely generic moral evil. πᾶσα is carried by 'all.'
- source_word: τῇ πληγῇ αὐτῆς
  chosen: for its wound
  alternatives:
  - for its blow
  - for the wound it causes
  - by its wound
  lexicon: LSJ
  rationale: πληγή can mean blow, stroke, or wound. In context with ἴασις ('healing'),
    'wound' best fits the resulting injury. The dative is rendered idiomatically in
    English as 'for its wound.'
- source_word: οὐκ ἔστιν ἴασις
  chosen: there is no healing
  alternatives:
  - there is no cure
  - it cannot be healed
  lexicon: LSJ
  rationale: ἴασις denotes healing or cure. 'There is no healing' stays close to the
    Greek structure and preserves the proverbial force.
