translation:
  text: Stakes set on a height opposite the wind will never hold out; so a timid heart,
    set on a foolish thought, will never hold out against any fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'facing the wind' / 'against the wind.' The Greek image is of stakes
      exposed directly to the wind.
    reason: lexical_alternative
  - marker: b
    text: The Greek uses an emphatic negation ('will certainly not endure').
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρακες
  chosen: stakes
  alternatives:
  - palisades
  - posts
  - pickets
  lexicon: LSJ
  rationale: The plural denotes pointed stakes or posts. 'Stakes' is concrete, natural
    English, and fits the image of insecure objects exposed to wind better than the
    more military 'palisades'.
- source_word: ἐπὶ μετεώρου κείμενοι
  chosen: set on a height
  alternatives:
  - placed aloft
  - lying in midair
  - set in an elevated place
  lexicon: LSJ
  rationale: The phrase describes being placed in an exposed elevated position, not
    literally floating in air. 'Set on a height' preserves the elevated, unstable
    setting in idiomatic English.
- source_word: κατέναντι ἀνέμου
  chosen: opposite the wind
  alternatives:
  - facing the wind
  - against the wind
  lexicon: LSJ
  rationale: Literally 'opposite/facing the wind.' 'Opposite the wind' keeps the spatial
    image, while the following English clause naturally conveys the hostile exposure.
- source_word: οὐ μὴ ὑπομείνωσιν / οὐ μὴ ὑπομείνῃ
  chosen: will never hold out
  alternatives:
  - will certainly not endure
  - will not stand firm
  - will not remain
  lexicon: BDAG/LSJ
  rationale: 'The emphatic οὐ μή with ὑπομένω expresses strong future negation: they
    absolutely will not endure. ''Hold out'' is readable modern English and suits
    both the physical image and the moral application.'
- source_word: καρδία δειλή
  chosen: a timid heart
  alternatives:
  - a cowardly heart
  - a fainthearted heart
  lexicon: LSJ
  rationale: δειλός can mean cowardly or fearful. 'Timid' avoids over-moralizing while
    still conveying weakness in the face of fear; it matches the proverb's psychological
    focus.
- source_word: ἐπὶ διανοήματος μωροῦ
  chosen: set on a foolish thought
  alternatives:
  - resting on a foolish plan
  - fixed on a foolish idea
  - based on foolish reasoning
  lexicon: LSJ
  rationale: διανόημα is a thought, purpose, or design. 'Thought' is broad enough
    to preserve ambiguity between idea and intention; 'foolish' renders μωροῦ straightforwardly.
- source_word: παντὸς φόβου
  chosen: any fear
  alternatives:
  - every fear
  - all fear
  lexicon: LSJ
  rationale: The genitive with πᾶς here is distributive. 'Any fear' communicates vulnerability
    to whatever fear arises, which fits the proverbial sense better than the more
    wooden 'every fear'.
