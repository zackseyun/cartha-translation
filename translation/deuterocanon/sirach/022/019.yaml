translation:
  text: One who pricks an eye will bring down tears, and one who pricks a heart reveals
    feeling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will cause tears'; the Greek literally speaks of bringing tears down.
    reason: lexical_alternative
  - marker: b
    text: Or 'reveals perception' or 'makes feeling known'; the Greek noun can refer
      to perception, sensation, or inner sensibility.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ νύσσων
  chosen: one who pricks
  alternatives:
  - one who pierces
  - one who stings
  - one who goads
  lexicon: LSJ
  rationale: The participle denotes the act of pricking or stabbing with a pointed
    object. 'Pricks' preserves the concrete metaphor and works naturally in both clauses
    without over-intensifying to 'pierces'.
- source_word: ὀφθαλμόν
  chosen: an eye
  alternatives:
  - the eye
  lexicon: LSJ
  rationale: The anarthrous singular is naturally rendered generically in English
    as 'an eye,' expressing a general truth rather than a specific eye.
- source_word: κατάξει δάκρυα
  chosen: will bring down tears
  alternatives:
  - will cause tears
  - will draw tears
  lexicon: LSJ
  rationale: The verb literally suggests bringing down or causing to fall; 'bring
    down tears' keeps the vivid image of tears being produced, while remaining understandable.
    'Cause tears' is possible but less concrete.
- source_word: καρδίαν
  chosen: a heart
  alternatives:
  - the heart
  lexicon: LSJ
  rationale: As with 'eye,' the singular is generic. 'Heart' here refers to the inner
    person or seat of emotion, not merely the physical organ.
- source_word: ἐκφαίνει
  chosen: reveals
  alternatives:
  - shows forth
  - brings to light
  - makes manifest
  lexicon: LSJ
  rationale: The verb means to bring out into the open or make evident. 'Reveals'
    is clear modern English and preserves the sense of making something inward visible.
- source_word: αἴσθησιν
  chosen: feeling
  alternatives:
  - perception
  - sensation
  - awareness
  lexicon: LSJ
  rationale: In this context, paired with 'heart,' the noun most naturally refers
    to felt inner response or sensibility. 'Feeling' best fits the proverb's emotional
    register; 'perception' would sound too cognitive.
