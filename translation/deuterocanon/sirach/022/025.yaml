translation:
  text: I will not be ashamed to shelter a friend, and from his presence I will certainly
    not hide myself,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'from his face/presence I will certainly not hide myself'; the wording
      may also be understood more literally as 'I will by no means be hidden from
      before him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φίλον
  chosen: a friend
  alternatives:
  - my friend
  - the friend
  lexicon: LSJ
  rationale: Accusative singular of φίλος used generically/objectively here. English
    indefinite 'a friend' best reflects the Greek without importing possessive nuance
    not explicit in the text.
- source_word: σκεπάσαι
  chosen: to shelter
  alternatives:
  - to cover
  - to protect
  - to conceal
  lexicon: LSJ
  rationale: The infinitive from σκεπάζω can mean cover, shelter, or protect. In context
    with 'I will not be ashamed' and the following 'I will certainly not hide myself
    from his presence,' the sense is protective support of a friend rather than merely
    physical covering. 'Shelter' preserves the metaphor while remaining natural English.
- source_word: οὐκ αἰσχυνθήσομαι
  chosen: I will not be ashamed
  alternatives:
  - I will not be put to shame
  - I will not feel shame
  lexicon: LSJ
  rationale: Future middle/passive of αἰσχύνω/αἰσχύνομαι commonly means 'be ashamed.'
    This is the most straightforward rendering and fits the ethical context.
- source_word: ἀπὸ προσώπου αὐτοῦ
  chosen: from his presence
  alternatives:
  - from before him
  - from his face
  lexicon: LSJ
  rationale: πρόσωπον literally means face, but in the idiom ἀπὸ προσώπου it often
    means 'from before' or 'from the presence of.' 'From his presence' communicates
    the relational sense in idiomatic English.
- source_word: οὐ μὴ κρυβῶ
  chosen: I will certainly not hide myself
  alternatives:
  - I will by no means be hidden
  - I will never hide
  lexicon: LSJ
  rationale: 'οὐ μή with the aorist subjunctive gives emphatic negation. Although
    κρυβῶ could be understood passively (''be hidden''), the context favors a reflexive/middle
    sense: the speaker will not withdraw or conceal himself from the friend. ''Certainly
    not hide myself'' captures both the emphasis and the likely sense.'
