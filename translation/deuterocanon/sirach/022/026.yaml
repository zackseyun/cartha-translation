theological_decisions:
- issue: Gendered generic expression in πᾶς ὁ ἀκούων
  chosen_reading: everyone who hears of it
  alternative_readings:
  - every man who hears of it
  rationale: The Greek uses a masculine singular participial construction generically.
    Per translation philosophy, English should reflect the source's representative
    force without unnecessary male-specific restriction; 'everyone' conveys the generic
    sense accurately.
