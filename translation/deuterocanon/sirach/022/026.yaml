translation:
  text: And if harm comes to me because of him, everyone who hears of it will guard
    himself from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if evil befalls me through him ... everyone who hears will beware of
      him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κακά
  chosen: harm
  alternatives:
  - evil things
  - troubles
  - misfortunes
  lexicon: BDAG
  rationale: The neuter plural with συμβήσεται refers to bad consequences or injury
    befalling the speaker, not moral evil committed by the speaker. 'Harm' is natural
    English and preserves the adverse-result sense without over-specifying physical
    danger.
- source_word: μοι
  chosen: to me
  alternatives:
  - for me
  lexicon: BDAG
  rationale: The dative marks the person affected by the event. In idiomatic English
    with 'comes,' 'to me' best conveys personal impact.
- source_word: συμβήσεται
  chosen: comes
  alternatives:
  - happens
  - befalls
  lexicon: BDAG
  rationale: The verb means 'happen' or 'befall.' 'Comes' in the phrase 'harm comes
    to me' is idiomatic modern English while retaining the eventive sense. 'Befalls'
    is more formal and archaic.
- source_word: διʼ αὐτόν
  chosen: because of him
  alternatives:
  - through him
  - on account of him
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses cause or reason. 'Because
    of him' clearly communicates that the harm occurs due to that person's agency
    or involvement.
- source_word: πᾶς ὁ ἀκούων
  chosen: everyone who hears of it
  alternatives:
  - everyone hearing
  - everyone who hears
  lexicon: BDAG
  rationale: The substantival participle denotes any person who hears about the matter.
    Adding 'of it' makes explicit in English the implied object of hearing, namely
    the reported harm.
- source_word: φυλάξεται
  chosen: will guard himself
  alternatives:
  - will beware
  - will keep away
  - will be on guard
  lexicon: BDAG
  rationale: The future middle suggests taking precaution for oneself. 'Will guard
    himself' preserves the reflexive nuance more closely than the smoother but less
    explicit 'will beware.'
- source_word: ἀπʼ αὐτοῦ
  chosen: from him
  alternatives:
  - against him
  - away from him
  lexicon: BDAG
  rationale: The preposition marks separation from the dangerous person. 'From him'
    works naturally with 'guard himself' and keeps the personal reference clear.
