id: SIR.22.27
reference: Sirach 22:27
source:
  edition: lxx-swete-1909
  text: Τίς δώσει μοι ἐπὶ στόμα μου φυλακήν καὶ ἐπὶ τῶν χειλέων μου σφραγῖδα πανοῦργον,
    ἵνα μὴ πέσω ἀπʼ αὐτῆς, καὶ ἡ γλῶσσά μου ἀπολέσῃ με;
  language: Greek
  pages:
  - 706
  confidence: high
  validation: minor_mismatch
translation:
  text: Who will set a guard over my mouth, and a prudent seal over my lips, so that
    I may not fall because of it, and my tongue destroy me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a crafty seal over my lips.' The Greek adjective can carry either a
      negative sense ('crafty') or a positive/neutral one ('shrewd, clever'); here
      it is taken in the sense of effective restraint.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίς δώσει μοι
  chosen: Who will set for me / Who will set
  alternatives:
  - Who will give me
  - Who will place for me
  lexicon: LSJ
  rationale: The idiom literally says 'Who will give to me,' but in English with the
    following objects ('a guard... a seal') the sense is best conveyed as 'Who will
    set' or 'place.' This preserves the petitionary force without wooden awkwardness.
- source_word: φυλακήν
  chosen: a guard
  alternatives:
  - watch
  - keeping
  - restraint
  lexicon: LSJ
  rationale: φυλακή commonly denotes a guard or watch. 'Guard' is natural modern English
    and fits the metaphor of controlling speech.
- source_word: σφραγῖδα
  chosen: a seal
  alternatives:
  - a signet
  - a lock
  lexicon: LSJ
  rationale: The literal image is of a seal placed on the lips. 'Seal' preserves the
    concrete metaphor better than interpretive renderings like 'lock.'
- source_word: πανοῦργον
  chosen: shrewd
  alternatives:
  - crafty
  - clever
  - prudent
  lexicon: LSJ
  rationale: πανοῦργος can be negative ('crafty') or positive/neutral ('clever, shrewd')
    depending on context. Here it modifies the protective 'seal' and refers to an
    effective, discerning restraint rather than moral deceit, so 'shrewd' best captures
    the sense without importing vice.
- source_word: ἵνα μὴ πέσω ἀπʼ αὐτῆς
  chosen: so that I may not fall because of it
  alternatives:
  - so that I may not fall by it
  - so that I may not stumble because of her
  lexicon: LSJ
  rationale: The feminine pronoun most naturally refers back to the immediately preceding
    image in a collective sense, but in context the danger is the mouth/lips/tongue—speech
    itself. English 'because of it' communicates the causal sense of ἀπό here without
    forcing an awkward feminine pronoun.
- source_word: ἡ γλῶσσά μου ἀπολέσῃ με
  chosen: my tongue destroy me
  alternatives:
  - my tongue ruin me
  - my tongue cause me to perish
  lexicon: LSJ
  rationale: ἀπόλλυμι can mean destroy, ruin, or cause to perish. 'Destroy' is strong
    but idiomatic and matches the warning about destructive speech.
