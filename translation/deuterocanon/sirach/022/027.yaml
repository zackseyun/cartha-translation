theological_decisions:
- issue: Moral valence of πανοῦργον modifying 'seal'
  chosen_reading: Rendered positively/neutral as 'shrewd seal'
  alternative_readings:
  - crafty seal
  - clever seal
  rationale: The verse is a prayer for restraint over speech, so a negatively loaded
    'crafty' would suggest moral duplicity not demanded by the context. The chosen
    rendering preserves the unusual metaphor while fitting the ethical aim of wise
    self-control.
