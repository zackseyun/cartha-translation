translation:
  text: A lazy man is compared to a lump of dung; everyone who picks it up will shake
    off his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'has been thrown together with a lump of dung,' if συνεβλήθη
      is taken in a physical rather than comparative sense; the comparative sense
      fits the proverb better in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: βολβίτῳ
  chosen: a lump
  alternatives:
  - a clod
  - a ball
  - a dung-cake
  lexicon: LSJ
  rationale: The noun denotes a rounded lump or clod; in context with κοπρίων it refers
    to a lump of excrement. 'Lump' is natural English and preserves the concrete image
    without unnecessary archaism.
- source_word: κοπρίων
  chosen: of dung
  alternatives:
  - of manure
  - of filth
  lexicon: LSJ
  rationale: The genitive specifies the substance of the lump. 'Dung' is the most
    direct and vivid equivalent, matching the proverb's deliberately degrading imagery
    better than the milder 'manure'.
- source_word: συνεβλήθη
  chosen: is compared to
  alternatives:
  - has been likened to
  - was thrown together with
  - was cast onto
  lexicon: LSJ
  rationale: In this wisdom-saying context, the passive is best taken in the sense
    'be likened/compared to,' a known semantic extension of συμβάλλω. This fits the
    proverbial comparison structure and the following explanatory clause better than
    a literal physical sense such as 'was thrown together with.'
- source_word: ὀκνηρός
  chosen: a lazy man
  alternatives:
  - the lazy person
  - a sluggard
  lexicon: LSJ
  rationale: The adjective means 'lazy, idle, sluggish.' 'Lazy man' keeps the masculine
    singular force of the Greek and matches the gender-accurate policy; 'sluggard'
    is possible but sounds more traditional and less natural in modern English.
- source_word: πᾶς ὁ ἀναιρούμενος αὐτόν
  chosen: everyone who picks it up
  alternatives:
  - whoever takes it away
  - everyone who lifts him up
  lexicon: LSJ
  rationale: ἀναιρέω here most naturally means 'take up, lift, remove.' Because the
    comparison is to a lump of dung, the pronoun is rendered as 'it' in English to
    follow the image rather than force a masculine personal pronoun. 'Picks it up'
    is idiomatic and concrete.
- source_word: ἐκτινάξει χεῖρα
  chosen: will shake off his hand
  alternatives:
  - will shake his hand clean
  - will fling off his hand
  lexicon: LSJ
  rationale: The verb means 'shake out/off.' The singular χεῖρα is retained as 'hand.'
    The phrase evokes the instinctive act of shaking off contamination after touching
    dung, reinforcing the proverb's contempt.
