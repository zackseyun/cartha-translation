translation:
  text: One who throws a stone at birds drives them away, and one who reproaches a
    friend will break up friendship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scares them away.' The Greek verb denotes driving off or causing to
      flee.
    reason: lexical_alternative
  - marker: b
    text: Or 'insults a friend.' The Greek verb can carry the sense of reproaching
      or heaping scorn on someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: βάλλων
  chosen: One who throws
  alternatives:
  - He who throws
  - Throwing
  lexicon: BDAG
  rationale: The present participle functions generically/proverbially. 'One who throws'
    gives natural English while preserving the gnomic force.
- source_word: λίθον
  chosen: a stone
  alternatives:
  - stone
  lexicon: BDAG
  rationale: Direct, literal rendering of the singular object.
- source_word: ἐπὶ πετεινὰ
  chosen: at birds
  alternatives:
  - against birds
  - toward birds
  - at flying creatures
  lexicon: BDAG
  rationale: πετεινά can denote birds/flying creatures. In this proverb, 'birds' is
    the natural idiomatic sense, and 'at' best fits the hostile action implied by
    throwing a stone.
- source_word: ἀποσοβεῖ
  chosen: drives them away
  alternatives:
  - scares them away
  - frightens them off
  lexicon: LSJ
  rationale: The verb denotes causing to flee or driving off. 'Drives them away' is
    clear, suitably literal, and fits the proverb's comparison.
- source_word: ὀνειδίζων
  chosen: one who reproaches
  alternatives:
  - one who insults
  - one who taunts
  - one who reviles
  lexicon: BDAG
  rationale: The verb can mean reproach, insult, or heap scorn on someone. 'Reproaches'
    preserves the moral/social nuance without overstating it as abusive reviling.
- source_word: φίλον
  chosen: a friend
  alternatives:
  - his friend
  - a companion
  lexicon: BDAG
  rationale: Anarthrous singular in a proverbial statement is well represented by
    'a friend.' Adding 'his' would over-specify possession not explicit in the Greek.
- source_word: διαλύσει
  chosen: will break up
  alternatives:
  - will dissolve
  - will destroy
  - will sever
  lexicon: BDAG
  rationale: The future verb expresses the result of such reproach. 'Break up' communicates
    the undoing of a relationship in idiomatic modern English.
- source_word: φιλίαν
  chosen: friendship
  alternatives:
  - affection
  - friendly bond
  lexicon: BDAG
  rationale: The noun denotes friendship or friendly relation. 'Friendship' is the
    straightforward and contextually exact rendering.
