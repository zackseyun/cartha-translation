translation:
  text: A father’s shame is the begetting of an undisciplined son, and a daughter
    comes into being for loss.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'A father’s shame is the begetting of an undisciplined
      [male child].' The noun 'son' is implied by the masculine adjective.
    reason: lexical_alternative
  - marker: b
    text: Or 'for diminution' or 'to her father’s loss'; the Greek phrase points to
      reduction or loss, and the exact nuance is compressed.
    reason: alternative_reading
lexical_decisions:
- source_word: αἰσχύνη
  chosen: shame
  alternatives:
  - disgrace
  lexicon: BDAG
  rationale: The noun denotes dishonor or shame. 'Shame' is the most direct and natural
    rendering here, preserving the proverb's terse force.
- source_word: πατρὸς
  chosen: a father’s
  alternatives:
  - of a father
  - for a father
  lexicon: BDAG
  rationale: The genitive is naturally rendered possessively in English. The singular
    is retained as gender-accurate and proverbial.
- source_word: ἐν γεννήσει
  chosen: is the begetting
  alternatives:
  - in the birth
  - at the birth
  - in begetting
  lexicon: BDAG
  rationale: The phrase is somewhat compressed. Rendering it as 'is the begetting'
    brings out the event/process sense of γέννησις without over-paraphrasing. It conveys
    that the father's shame lies in having produced such a child.
- source_word: ἀπαιδεύτου
  chosen: an undisciplined son
  alternatives:
  - an untrained son
  - an uneducated son
  - an uninstructed son
  lexicon: BDAG
  rationale: ἀπαίδευτος means lacking training, instruction, or discipline. In wisdom
    literature the moral sense is prominent, so 'undisciplined' best captures the
    ethical force. 'Son' is supplied in English because the adjective is masculine
    and the parallel with 'daughter' makes the implied child male.
- source_word: θυγάτηρ
  chosen: a daughter
  lexicon: BDAG
  rationale: Straightforward lexical rendering; the explicit female counterpart in
    the second colon should be preserved.
- source_word: ἐπʼ ἐλαττώσει
  chosen: for loss
  alternatives:
  - for diminution
  - for disgrace
  - to her father's loss
  lexicon: LSJ
  rationale: The phrase literally points to reduction, lessening, or loss. 'For loss'
    is concise and preserves the economic/social diminution implied by the Greek without
    importing a more specific interpretation than the text states.
- source_word: γίνεται
  chosen: comes into being
  alternatives:
  - is born
  - becomes
  - comes to be
  lexicon: BDAG
  rationale: γίνομαι is broader than physical birth alone. 'Comes into being' preserves
    the literal verbal sense and matches the proverbial style, though the context
    clearly concerns birth/offspring.
