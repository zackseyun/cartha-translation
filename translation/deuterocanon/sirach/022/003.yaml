theological_decisions:
- issue: Gendered offspring terms in a wisdom saying
  chosen_reading: Retain 'father,' implied 'son,' and 'daughter' as gender-specific
    terms.
  alternative_readings:
  - Use gender-neutral 'parent' and 'child'
  rationale: The Greek explicitly names a father and a daughter, and the masculine
    adjective in the first colon implies a son. Per the project's gender-accurate
    policy, the proverb's gendered formulation should be preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Potentially offensive social valuation of daughters
  chosen_reading: Translate the line directly without softening its ancient social
    assumption.
  alternative_readings:
  - Interpret the second colon more generally as 'a daughter brings humiliation'
  - Soften to a contextual paraphrase about family hardship
  rationale: The text reflects ancient patriarchal social realities and should not
    be doctrinally sanitized. The translation preserves the source claim while avoiding
    expansion beyond what the Greek explicitly says.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
