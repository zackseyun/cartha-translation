theological_decisions:
- issue: Connotation of death as rest
  chosen_reading: Render ἀνεπαύσατο as 'has found rest' without expanding it into
    a doctrinal statement about the afterlife.
  alternative_readings:
  - has fallen asleep
  - has been laid to rest
  rationale: The verse presents death as rest in wisdom-language, but the Greek does
    not specify a detailed doctrine of the intermediate state or resurrection here.
    The translation preserves the metaphor without importing later theological precision.
  doctrine_reference: Preserve theological tension rather than resolve it.
