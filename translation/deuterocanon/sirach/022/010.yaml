translation:
  text: Weep more sweetly over the dead, because he has found rest,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'weep more pleasantly/better over the dead'; the Greek comparative adverb
      ἥδιον literally carries the idea of 'more sweetly' or 'more pleasantly,' but
      in context it likely means more moderately or gently.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥδιον
  chosen: more gently
  alternatives:
  - more sweetly
  - more pleasantly
  - better
  lexicon: LSJ
  rationale: Comparative adverb from ἡδύς. In context of mourning, a literal 'more
    sweetly/pleasantly' sounds misleading in English. The sense is that lament for
    the dead should be moderated or softer, since the dead person has come to rest.
    'More gently' preserves the comparative force while fitting the mourning context.
- source_word: κλαῦσον
  chosen: weep
  alternatives:
  - lament
  - cry
  lexicon: LSJ
  rationale: Aorist imperative of κλαίω, the ordinary verb for weeping. 'Weep' is
    the most direct and natural English equivalent; 'lament' is possible but slightly
    more interpretive and formal.
- source_word: ἐπὶ νεκρῷ
  chosen: over the dead
  alternatives:
  - for the dead person
  - over a dead man
  lexicon: LSJ
  rationale: The preposition ἐπί with dative here marks the object/circumstance of
    mourning. 'Over the dead' is idiomatic English and keeps the focus on mourning
    for one who has died. The singular is retained conceptually, but English can express
    it naturally without forcing 'dead man' where the Greek noun itself simply means
    'dead person/corpse'.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: LSJ
  rationale: Introduces the reason for the imperative. 'Because' is clear modern English
    and preserves the causal force.
- source_word: ἀνεπαύσατο
  chosen: has found rest
  alternatives:
  - has rested
  - has been laid to rest
  - has ceased
  lexicon: LSJ
  rationale: Middle of ἀναπαύω/ἀναπαύομαι, 'to rest, take rest.' 'Has found rest'
    communicates the completed state naturally in English and fits the consolatory
    logic of the line. 'Has been laid to rest' would import burial imagery not explicit
    in the Greek.
