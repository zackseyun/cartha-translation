translation:
  text: Before bloodshed come the furnace’s vapor and smoke; so before bloodshed comes
    abuse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'insult,' 'reviling,' or 'verbal abuse' for the final term.
    reason: lexical_alternative
  - marker: b
    text: The Greek literally says 'bloods,' an idiom for bloodshed or violent acts.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ
  chosen: before
  alternatives:
  - in the presence of
  - ahead of
  lexicon: LSJ
  rationale: 'The preposition marks temporal precedence in both clauses: one thing
    comes prior to another.'
- source_word: πυρὸς
  chosen: fire
  lexicon: LSJ
  rationale: Genitive after πρὸ in the idiom 'before fire'; retained conceptually
    in the image of what precedes a blaze.
- source_word: ἀτμὶς
  chosen: vapor
  alternatives:
  - steam
  - heat
  - mist
  lexicon: LSJ
  rationale: ἀτμίς denotes vapor/exhalation. 'Vapor' best fits the furnace image and
    pairs naturally with 'smoke' as visible precursors.
- source_word: καμίνου
  chosen: the furnace’s
  alternatives:
  - of a furnace
  - oven’s
  lexicon: LSJ
  rationale: Genitive specifying the source of the vapor. 'Furnace' is more natural
    than 'oven' in this warning image and preserves the intensity of καμίνος.
- source_word: καπνός
  chosen: smoke
  lexicon: LSJ
  rationale: Straightforward lexical equivalent; paired with vapor as signs preceding
    destructive fire.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: LSJ
  rationale: Introduces the comparison between the physical image and the moral reality.
- source_word: αἱμάτων
  chosen: bloodshed
  alternatives:
  - blood
  - acts of blood
  - violence
  lexicon: LSJ
  rationale: Plural 'bloods' in Greek commonly denotes bloodshed or violent acts rather
    than literal blood as a substance. 'Bloodshed' communicates the ethical sense
    clearly in modern English.
- source_word: λοιδορία
  chosen: abuse
  alternatives:
  - insult
  - reviling
  - verbal abuse
  lexicon: LSJ
  rationale: The noun refers to abusive or reviling speech. 'Abuse' is concise, modern,
    and captures the progression from hostile words to violent deeds; 'reviling' is
    accurate but less natural.
