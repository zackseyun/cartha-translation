theological_decisions:
- issue: Moral progression from speech to violence
  chosen_reading: The verse is rendered as a proverb stating that abusive speech precedes
    bloodshed, without expanding it into a broader doctrine of causation.
  alternative_readings:
  - Insult precedes murder
  - Reviling accompanies bloodshed
  rationale: 'The repeated πρὸ most naturally signals sequence: just as vapor and
    smoke come before fire, abusive speech comes before bloodshed. The translation
    preserves the warning force without overstating a deterministic claim.'
  doctrine_reference: Translation philosophy §§1, 3, 6
