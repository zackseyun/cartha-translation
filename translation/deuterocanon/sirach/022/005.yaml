translation:
  text: A shameless woman brings shame on father and husband, and she will be dishonored
    by both.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a brazen woman' or 'an impudent woman.' The Greek term denotes a woman
      marked by audacious shamelessness.
    reason: lexical_alternative
lexical_decisions:
- source_word: πατέρα
  chosen: father
  alternatives:
  - her father
  lexicon: BDAG
  rationale: Direct object of καταισχύνει. English can omit the possessive as Greek
    does, but the relational sense is naturally understood.
- source_word: ἄνδρα
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: In coordination with 'father' and in this family-honor context, ἀνήρ
    most naturally means 'husband,' not a generic 'man.'
- source_word: καταισχύνει
  chosen: brings shame on
  alternatives:
  - disgraces
  - puts to shame
  lexicon: BDAG
  rationale: This verb denotes causing shame or disgrace. 'Brings shame on' is idiomatic
    modern English and preserves the causative force.
- source_word: ἡ θρασεῖα
  chosen: a shameless woman
  alternatives:
  - the bold woman
  - the impudent woman
  - the brazen woman
  lexicon: BDAG
  rationale: The feminine adjective used substantivally refers to a woman characterized
    by audacity/impudence. In this wisdom context, the sense is negative moral brazenness
    rather than commendable courage. 'Shameless woman' communicates the social-moral
    force clearly.
- source_word: ὑπὸ ἀμφοτέρων
  chosen: by both
  alternatives:
  - by both of them
  lexicon: BDAG
  rationale: ἀμφότεροι refers back to the two previously named figures, father and
    husband.
- source_word: ἀτιμασθήσεται
  chosen: she will be dishonored
  alternatives:
  - she will be despised
  - she will be treated with contempt
  lexicon: BDAG
  rationale: Future passive of ἀτιμάζω, indicating that she will receive dishonor
    from them. 'Dishonored' keeps the honor-shame vocabulary parallel to the first
    clause.
