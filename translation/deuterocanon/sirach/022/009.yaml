translation:
  text: Weep over the dead, for the light has failed; and weep over the fool, for
    understanding has failed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the light is gone out.' The Greek keeps the image of light rather than
      stating 'life' directly.
    reason: lexical_alternative
  - marker: b
    text: 'The saying is proverbial: the fool is lamented because understanding has
      failed, not because the text explicitly states physical death here.'
    reason: cultural_note
lexical_decisions:
- source_word: κλαῦσον
  chosen: weep
  alternatives:
  - mourn
  - cry
  lexicon: BDAG
  rationale: Imperative of κλαίω, denoting audible grieving/crying. 'Weep' is direct
    and natural in English, preserving the emotional force better than the broader
    'mourn'.
- source_word: νεκρῷ
  chosen: the dead
  alternatives:
  - a dead person
  - the deceased
  lexicon: BDAG
  rationale: Dative singular with ἐπί in this lament context refers to a dead person
    as the object of mourning. 'The dead' is idiomatic English and keeps the proverbial,
    general force.
- source_word: ἐξέλιπεν
  chosen: has failed
  alternatives:
  - has departed
  - is gone out
  - has come to an end
  lexicon: BDAG
  rationale: From ἐκλείπω, 'to fail, cease, come to an end.' Because it is used both
    with φῶς and σύνεσιν in parallel, 'has failed' preserves the rhetorical repetition
    in English better than varying the gloss.
- source_word: φῶς
  chosen: the light
  alternatives:
  - light
  lexicon: BDAG
  rationale: With the dead, φῶς functions metaphorically for the light of life. 'The
    light' preserves the image without over-interpreting it as 'life' in the main
    text.
- source_word: μωρῷ
  chosen: the fool
  alternatives:
  - a fool
  - the foolish person
  lexicon: BDAG
  rationale: μωρός in wisdom literature denotes a morally and intellectually deficient
    person, not merely someone lacking intelligence. 'The fool' matches biblical wisdom
    diction and the generic singular force.
- source_word: σύνεσιν
  chosen: understanding
  alternatives:
  - sense
  - insight
  - good sense
  lexicon: BDAG
  rationale: σύνεσις denotes understanding, discernment, or intelligence. 'Understanding'
    is the most straightforward wisdom-literature equivalent and pairs well with 'fool'.
