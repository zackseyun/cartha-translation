theological_decisions:
- issue: Metaphorical force of φῶς in relation to death
  chosen_reading: Retain the metaphor 'the light has failed' rather than interpret
    it explicitly as 'life is gone.'
  alternative_readings:
  - for life has departed
  - for his light is extinguished
  rationale: The Greek uses φῶς, not ζωή. Preserving the metaphor respects the source
    text's poetic compression and avoids importing a more explicit interpretation
    than the wording requires.
  doctrine_reference: Translation philosophy §1, §3
- issue: Wisdom-literature category of μωρός
  chosen_reading: Render as 'the fool' rather than a softened expression like 'the
    unwise person.'
  alternative_readings:
  - the foolish person
  - the senseless one
  rationale: The verse contrasts physical death with the loss of understanding in
    a proverbial way. 'The fool' preserves the established wisdom category and the
    sharpness of the saying without reducing it to mere lack of intelligence.
  doctrine_reference: Translation philosophy §1, §6
