translation:
  text: If you open your mouth against a friend, do not despair, for there can be
    reconciliation—except in the case of insult and arrogance and the revealing of
    a secret and a treacherous blow; in these things every friend will flee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not be afraid.' The Greek verb can denote fear or caution, but the
      context favors not giving up hope because reconciliation remains possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ φίλον
  chosen: against a friend
  alternatives:
  - to a friend
  - concerning a friend
  lexicon: LSJ
  rationale: With ἀνοίξῃς στόμα, ἐπί + accusative can indicate speech directed against
    someone rather than merely speaking to them. The following reassurance about reconciliation
    after offense supports the adversative sense.
- source_word: ἀνοίξῃς στόμα
  chosen: open your mouth
  alternatives:
  - speak
  - say something
  lexicon: LSJ
  rationale: The idiom is retained in English because it is natural enough and preserves
    the concrete force of the Greek.
- source_word: μὴ εὐλαβηθῇς
  chosen: do not despair
  alternatives:
  - do not be afraid
  - do not be apprehensive
  lexicon: LSJ
  rationale: Although εὐλαβέομαι often means 'be cautious' or 'be afraid,' here the
    sense is not simple fear but reluctance or hopelessness after offending a friend.
    The next clause, 'for there can be reconciliation,' points to not giving up hope
    of restored friendship.
- source_word: διαλλαγή
  chosen: reconciliation
  alternatives:
  - restoration
  - making up
  lexicon: LSJ
  rationale: The noun denotes restored relations after estrangement; 'reconciliation'
    is the clearest modern English equivalent.
- source_word: πλὴν
  chosen: except in the case of
  alternatives:
  - except for
  - but
  lexicon: LSJ
  rationale: Here πλὴν introduces exceptions to the possibility of reconciliation,
    not merely a loose contrast.
- source_word: ὀνειδισμοῦ
  chosen: insult
  alternatives:
  - reproach
  - reviling
  lexicon: LSJ
  rationale: A straightforward rendering for verbal disgrace or taunt; 'insult' is
    readable modern English.
- source_word: ὑπερηφανίας
  chosen: arrogance
  alternatives:
  - pride
  - haughtiness
  lexicon: LSJ
  rationale: The term denotes overbearing pride expressed toward others; 'arrogance'
    captures the relational offense well in this list.
- source_word: μυστηρίου ἀποκαλύψεως
  chosen: the revealing of a secret
  alternatives:
  - disclosure of a secret
  - uncovering a mystery
  lexicon: LSJ
  rationale: In wisdom literature context, μυστήριον refers to a confidential matter
    rather than a theological 'mystery.' 'Secret' is therefore preferable.
- source_word: πληγῆς δολίας
  chosen: a treacherous blow
  alternatives:
  - a deceitful wound
  - a treacherous strike
  lexicon: LSJ
  rationale: The phrase likely refers metaphorically or literally to a harmful act
    done with deceit. 'Treacherous blow' preserves both injury and betrayal.
- source_word: ἀποφεύξεται
  chosen: will flee
  alternatives:
  - will avoid
  - will escape from
  lexicon: LSJ
  rationale: The verb is stronger than mere avoidance; in context it depicts a friend
    withdrawing completely.
- source_word: πᾶς φίλος
  chosen: every friend
  alternatives:
  - any friend
  - all friends
  lexicon: LSJ
  rationale: The singular distributive sense is best represented by 'every friend.'
