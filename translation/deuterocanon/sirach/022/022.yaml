id: SIR.22.22
reference: Sirach 22:22
source:
  edition: lxx-swete-1909
  text: ἐπὶ φίλον ἐὰν ἀνοίξῃς στόμα, μὴ εὐλαβηθῇς, ἔστιν γὰρ διαλλαγή· πλὴν ὀνειδισμοῦ
    καὶ ὑπερηφανίας καὶ μυστηρίου ἀποκαλύψεως καὶ πληγῆς δολίας· ἐν τούτοις ἀποφεύξεται
    πᾶς φίλος.
