translation:
  text: Mourning for the dead is seven days, but for a fool and an ungodly man, all
    the days of his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a fool and an ungodly person.' The Greek uses masculine singular
      forms generically in this wisdom saying.
    reason: lexical_alternative
lexical_decisions:
- source_word: πένθος
  chosen: mourning
  alternatives:
  - grief
  - lamentation
  lexicon: LSJ
  rationale: The noun denotes mourning or lament for the dead. 'Mourning' is natural
    English and preserves the customary bereavement sense better than the more internal
    'grief' or the more performative 'lamentation'.
- source_word: νεκροῦ
  chosen: the dead
  alternatives:
  - a dead person
  - the deceased
  lexicon: LSJ
  rationale: 'The genitive singular functions generically: mourning occasioned by
    a dead person. ''The dead'' is idiomatic and concise in English.'
- source_word: ἑπτὰ ἡμέραι
  chosen: seven days
  lexicon: LSJ
  rationale: Straightforward temporal expression; retained formally.
- source_word: μωροῦ
  chosen: a fool
  alternatives:
  - the foolish person
  - a stupid man
  lexicon: LSJ
  rationale: μωρός in wisdom literature commonly denotes a morally and practically
    foolish person, not merely someone unintelligent. 'A fool' is the standard wisdom-literature
    rendering and preserves that category.
- source_word: ἀσεβοῦς
  chosen: an ungodly man
  alternatives:
  - the impious person
  - a godless man
  - an ungodly person
  lexicon: LSJ
  rationale: ἀσεβής denotes one who is irreverent or impious toward God. 'Ungodly'
    is clear and biblically resonant. Because the Greek is grammatically masculine
    singular and paired with μωροῦ in a representative saying, 'man' preserves the
    source's gendered form per project philosophy.
- source_word: πᾶσαι αἱ ἡμέραι τῆς ζωῆς αὐτοῦ
  chosen: all the days of his life
  alternatives:
  - all his lifetime
  - all his days
  lexicon: LSJ
  rationale: 'This phrase is best taken as the duration of mourning occasioned by
    such a person: it lasts throughout his life. The more explicit ''all the days
    of his life'' preserves the Greek structure and clarifies the comparison with
    ''seven days''.'
