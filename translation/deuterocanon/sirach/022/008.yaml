translation:
  text: Telling a story to one who is drowsy is like telling it to a fool, and at
    the end he will say, “What is it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek text is somewhat awkward in form, repeating ''the one telling''
      (διηγούμενος ... ὁ διηγούμενος). The sense is comparative: telling something
      to a drowsy person is like telling it to a fool.'
    reason: textual_variant
lexical_decisions:
- source_word: διηγούμενος
  chosen: telling a story
  alternatives:
  - recounting
  - narrating
  - explaining
  lexicon: LSJ
  rationale: 'The participle from διηγέομαι commonly means to relate or narrate in
    detail. ''Telling a story'' gives natural English while preserving the sense of
    recounting speech. The repeated participle creates a comparison: narrating to
    a drowsy person is equivalent to narrating to a fool.'
- source_word: νυστάζοντι
  chosen: to one who is drowsy
  alternatives:
  - to a sleepy person
  - to one who is nodding off
  lexicon: LSJ
  rationale: νυστάζω denotes being sleepy or drowsy. 'Drowsy' is concise and idiomatic,
    preserving the image of someone not really able to attend.
- source_word: μωρῷ
  chosen: a fool
  alternatives:
  - a stupid person
  - a dullard
  lexicon: LSJ
  rationale: μωρός in wisdom literature regularly denotes a 'fool' in the moral-practical
    sense, not merely low intelligence. 'Fool' best matches biblical wisdom diction.
- source_word: ἐπὶ συντελείᾳ
  chosen: at the end
  alternatives:
  - at the conclusion
  - when it is finished
  lexicon: LSJ
  rationale: The phrase indicates the close or completion of the narration. 'At the
    end' is straightforward modern English.
- source_word: Τί ἐστιν;
  chosen: What is it?
  alternatives:
  - What was that?
  - What does it mean?
  lexicon: LSJ
  rationale: Literally 'What is it?' In context it conveys that the hearer has not
    grasped what was said. The literal rendering is clear enough in English and preserves
    the abruptness.
