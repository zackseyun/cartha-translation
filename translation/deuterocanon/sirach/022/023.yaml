translation:
  text: Gain trust with your neighbor in poverty, so that in his good things you may
    be filled together. In a time of distress remain with him, so that you may inherit
    with him in his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Gain trust with your neighbor in poverty'; πίστις here may carry the
      relational sense of trust or faithfulness, not only faith in an abstract sense.
    reason: lexical_alternative
  - marker: b
    text: '''His good things'' may also be understood as ''his prosperity'' or ''his
      goods.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστιν κτῆσαι
  chosen: Gain faith
  alternatives:
  - Acquire trust
  - Win faithfulness
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine, but in this interpersonal context
    it can denote trustworthiness or trust. The phrase κτῆσαι with an accusative naturally
    means 'acquire/gain.' I kept 'gain faith' in the main text to preserve the Greek
    term and the project's default, while the relational sense is clarified by the
    context and alternatives are preserved here.
- source_word: ἐν πτωχείᾳ
  chosen: in poverty
  alternatives:
  - in your poverty
  - in hardship
  lexicon: BDAG
  rationale: The dative with ἐν is straightforward. 'Poverty' is the most direct rendering
    of πτωχεία; 'hardship' would broaden the sense beyond the lexical value.
- source_word: μετὰ τοῦ πλησίον
  chosen: with your neighbor
  alternatives:
  - with your companion
  - with your fellow
  lexicon: BDAG
  rationale: πλησίον here refers to the person near to one, a neighbor/fellow person.
    'Neighbor' is the most established and transparent English equivalent.
- source_word: ἐν τοῖς ἀγαθοῖς αὐτοῦ
  chosen: in his good things
  alternatives:
  - in his prosperity
  - in his goods
  - in his blessings
  lexicon: BDAG
  rationale: ἀγαθά can mean good things, goods, or benefits. Because the phrase may
    include both material prosperity and broader benefits, 'good things' preserves
    the breadth better than the narrower 'prosperity' or 'goods'.
- source_word: ὁμοῦ πλησθῇς
  chosen: you may be filled together
  alternatives:
  - you may be satisfied together
  - you may share fully together
  lexicon: BDAG
  rationale: ὁμοῦ means 'together,' and πλησθῇς is 'be filled/satisfied.' 'Be filled
    together' is slightly formal but closely tracks the Greek and preserves the image
    of shared abundance.
- source_word: ἐν καιρῷ θλίψεως
  chosen: In a time of distress
  alternatives:
  - In time of affliction
  - In a season of trouble
  lexicon: BDAG
  rationale: θλῖψις commonly denotes distress, affliction, or trouble. 'A time of
    distress' is idiomatic modern English while remaining close to the source.
- source_word: διάμενε αὐτῷ
  chosen: remain with him
  alternatives:
  - stay by him
  - persevere with him
  lexicon: BDAG
  rationale: διαμένω here calls for continuing loyalty or steadfast presence. 'Remain
    with him' is both literal and clear.
- source_word: συνκληρονομήσῃς
  chosen: you may inherit along with him
  alternatives:
  - you may share in the inheritance with him
  - you may become co-heir with him
  lexicon: BDAG
  rationale: The compound verb means to inherit together with someone. 'Inherit along
    with him' is natural English and preserves the joint-heir idea without importing
    later Pauline technical overtones.
- source_word: ἐν τῇ κληρονομίᾳ αὐτοῦ
  chosen: in his inheritance
  alternatives:
  - in his allotted share
  - in his heritage
  lexicon: BDAG
  rationale: κληρονομία is inheritance, heritage, or allotted possession. 'Inheritance'
    is the most direct and broadly understandable rendering.
