theological_decisions:
- issue: Gender rendering of ἄνθρωπον
  chosen_reading: man
  alternative_readings:
  - person
  - human being
  rationale: The source uses a masculine singular human term. This is proverbial rather
    than explicitly universal, so retaining 'man' best matches the Greek form and
    the project's gender-accurate policy.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nuance of ἀσύνετον
  chosen_reading: unintelligent
  alternative_readings:
  - senseless
  - foolish
  - without understanding
  rationale: The verse is wisdom literature and critiques lack of understanding. 'Unintelligent'
    keeps the focus on deficient understanding rather than moral wickedness; alternatives
    are preserved because English options overlap and each shades the saying differently.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
