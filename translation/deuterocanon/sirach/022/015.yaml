translation:
  text: It is easier to carry sand and salt and a lump of iron than a senseless man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a senseless man,' 'a foolish man,' or 'a man without understanding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄμμον
  chosen: sand
  alternatives:
  - a load of sand
  lexicon: LSJ
  rationale: Direct concrete noun; singular in Greek but naturally mass-noun in English
    as 'sand'.
- source_word: ἅλα
  chosen: salt
  lexicon: LSJ
  rationale: Plural form used collectively; English mass noun 'salt' best matches
    the sense in a list of burdensome materials.
- source_word: βῶλον σιδήρου
  chosen: a lump of iron
  alternatives:
  - a clod of iron
  - a mass of iron
  lexicon: LSJ
  rationale: βῶλος denotes a clod, lump, or mass. 'Lump of iron' is idiomatic modern
    English and preserves the image of a heavy object.
- source_word: εὔκοπον
  chosen: easier
  alternatives:
  - easy
  - less troublesome
  lexicon: LSJ
  rationale: 'Predicate adjective meaning easy or manageable; rendered comparatively
    in English because the construction ἢ sets up an explicit comparison: easier to
    bear these things than such a person.'
- source_word: ὑπενεγκεῖν
  chosen: to carry
  alternatives:
  - to bear
  - to endure
  lexicon: LSJ
  rationale: The verb can mean bear, carry, or endure. In this context, with concrete
    objects named first, 'carry' preserves the physical image while also implying
    burden-bearing.
- source_word: ἄνθρωπον
  chosen: man
  alternatives:
  - person
  - human being
  lexicon: LSJ
  rationale: The Greek is singular masculine and contrasts a burdensome human with
    physical loads. Per gender-accurate policy, 'man' is retained rather than neutralizing
    to 'person'.
- source_word: ἀσύνετον
  chosen: unintelligent
  alternatives:
  - senseless
  - foolish
  - without understanding
  lexicon: LSJ
  rationale: The adjective denotes lack of understanding or sense. 'Unintelligent'
    is a clear modern rendering, though the semantic field overlaps with 'senseless'
    or 'foolish'. It fits the proverb's comparison without importing stronger moral
    categories than the Greek requires.
