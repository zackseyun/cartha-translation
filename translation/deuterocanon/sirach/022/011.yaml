translation:
  text: But for a fool, an evil life is worse than death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wicked life' or 'a miserable life'; the Greek phrase literally says
      'an evil life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μωροῦ
  chosen: a fool
  alternatives:
  - the foolish man
  - the senseless person
  lexicon: LSJ
  rationale: μωρός denotes a foolish or dull-witted person. 'A fool' is concise, idiomatic,
    and matches wisdom-literature usage in English.
- source_word: ὑπὲρ θάνατον
  chosen: worse than death
  alternatives:
  - beyond death
  - more than death
  lexicon: LSJ
  rationale: With a comparative sense, ὑπέρ can mean 'more than' or 'beyond'; in this
    aphoristic construction it naturally yields 'worse than death,' expressing that
    such a life is more grievous than death itself.
- source_word: ζωὴ πονηρά
  chosen: an evil life
  alternatives:
  - a miserable life
  - a wicked life
  - a bad life
  lexicon: LSJ
  rationale: The phrase is literally 'evil life.' πονηρά can denote moral evil or
    grievous badness. In context, the saying contrasts the fool's life with death;
    'evil life' preserves the Greek wording while allowing both moral and miserable
    connotations. 'Miserable life' would narrow the sense too much to suffering alone.
- source_word: τοῦ δὲ
  chosen: But for
  alternatives:
  - and for
  - but as for
  lexicon: LSJ
  rationale: δὲ marks a mild contrast with the preceding context. 'But for' gives
    natural English while preserving the adversative turn.
