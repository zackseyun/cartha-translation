theological_decisions:
- issue: Sense of πονηρά in wisdom context
  chosen_reading: Retain 'evil' rather than reducing to purely experiential 'miserable.'
  alternative_readings:
  - miserable
  - wretched
  rationale: The text does not force a choice between moral corruption and grievous
    quality; wisdom literature often lets both resonate. Rendering 'evil' preserves
    that tension rather than resolving it into mere emotional misery.
