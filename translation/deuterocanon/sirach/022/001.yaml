theological_decisions:
- issue: Gendered substantival adjective ὀκνηρός
  chosen_reading: lazy man
  alternative_readings:
  - lazy person
  - sluggard
  rationale: Per doctrine, gender-accurate rendering is preferred over flattening
    to gender-neutral when the source is grammatically masculine. Here the saying
    is proverbial and representative, but the Greek form is masculine singular, so
    'lazy man' is retained.
