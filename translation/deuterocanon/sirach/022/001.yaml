translation:
  text: A lazy man is compared to a filthy stone, and everyone will whistle at his
    disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A lazy man has been likened to a dirty/befouled stone.' The rare Greek
      participle for the stone's condition is difficult, but it clearly carries a
      negative sense of being soiled.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb can also suggest 'hiss at' in derision, not only 'whistle
      at.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λίθῳ
  chosen: stone
  alternatives:
  - rock
  lexicon: LSJ
  rationale: The dative singular of λίθος denotes a stone. 'Stone' is the natural
    English equivalent in this proverb-like comparison.
- source_word: ἠρδαλωμένῳ
  chosen: filthy
  alternatives:
  - dirty
  - befouled
  - covered with dirt
  lexicon: LSJ
  rationale: This rare participial form describes the stone as soiled or befouled.
    'Filthy' best conveys the strong negative sense in concise modern English. Because
    the form is uncommon and the source has minor mismatch validation, a broader alternative
    is preserved in the rationale rather than overstated.
- source_word: συνεβλήθη
  chosen: is compared to
  alternatives:
  - has been likened to
  - was thrown together with
  lexicon: LSJ
  rationale: In context the verb is best taken in the sense of being likened or compared,
    not literal physical throwing. The proverb sets the lazy person alongside an image
    for evaluation.
- source_word: ὀκνηρός
  chosen: lazy man
  alternatives:
  - sluggard
  - lazy person
  lexicon: LSJ
  rationale: The adjective used substantivally refers to a lazy person. 'Lazy man'
    preserves the masculine singular form and matches the source's gendered wording;
    'sluggard' is possible but less natural for modern readers.
- source_word: πᾶς
  chosen: everyone
  alternatives:
  - all
  - every person
  lexicon: LSJ
  rationale: The term has a generic force here. 'Everyone' is idiomatic English for
    the universal reaction described.
- source_word: ἐκσυριεῖ
  chosen: will whistle at
  alternatives:
  - will hiss at
  - will jeer at
  lexicon: LSJ
  rationale: The verb denotes making a derisive whistling or hissing sound. 'Will
    whistle at' keeps the concrete image; 'hiss at' is a viable alternative but less
    certain as the primary rendering here.
- source_word: ἀτιμίᾳ
  chosen: disgrace
  alternatives:
  - dishonor
  - shame
  lexicon: LSJ
  rationale: The noun denotes dishonor or ignominy. 'Disgrace' fits the public-shame
    setting created by the mocking reaction.
