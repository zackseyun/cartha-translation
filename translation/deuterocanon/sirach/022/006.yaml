translation:
  text: Music during mourning is an untimely speech, but beatings and discipline are
    wisdom at every time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an ill-timed discourse' for 'an untimely speech.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'beatings and discipline ... wisdom,' a compressed proverbial
      expression that may also mean 'belong to wisdom' or 'are fitting in wisdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μουσικὰ
  chosen: Music
  alternatives:
  - Musical entertainment
  - songs
  lexicon: LSJ
  rationale: The neuter plural refers broadly to musical things or music-making. 'Music'
    is natural English and preserves the generality without narrowing to singing alone.
- source_word: ἐν πένθει
  chosen: during mourning
  alternatives:
  - in mourning
  - at a time of grief
  lexicon: LSJ
  rationale: The phrase marks the circumstance or setting. 'During mourning' communicates
    temporal-contextual force clearly in modern English.
- source_word: ἄκαιρος
  chosen: untimely
  alternatives:
  - out of season
  - inappropriate
  - ill-timed
  lexicon: LSJ
  rationale: The adjective means not at the right time, hence ill-timed or inappropriate.
    'Untimely' keeps the temporal emphasis that matches the verse's contrast with
    'at every time' later in the line.
- source_word: διήγησις
  chosen: speech
  alternatives:
  - talk
  - narration
  - discourse
  lexicon: LSJ
  rationale: The noun can mean narration or discourse. In this proverb-like context,
    a general spoken address fits best. 'Speech' is broad and idiomatic in English.
- source_word: μάστιγες
  chosen: beatings
  alternatives:
  - whippings
  - lashes
  - scourgings
  lexicon: LSJ
  rationale: The plural denotes blows from a whip or scourge. 'Beatings' is the clearest
    modern English equivalent without over-specifying the instrument.
- source_word: παιδεία
  chosen: discipline
  alternatives:
  - instruction
  - training
  - correction
  lexicon: LSJ
  rationale: In wisdom literature παιδεία often includes corrective training, not
    mere classroom instruction. 'Discipline' best matches the pairing with physical
    correction in this line.
- source_word: ἐν παντὶ καιρῷ
  chosen: at every time
  alternatives:
  - always
  - in every season
  lexicon: LSJ
  rationale: The phrase expresses general applicability across circumstances. 'At
    every time' preserves the explicit temporal wording and balances 'untimely' earlier
    in the verse.
- source_word: σοφίας
  chosen: are wisdom
  alternatives:
  - belong to wisdom
  - are marks of wisdom
  - are wise
  lexicon: LSJ
  rationale: The genitive is compressed and somewhat elliptical in Greek. Rendering
    it predicatively as 'are wisdom' preserves the terse proverbial force better than
    a looser paraphrase.
