translation:
  text: A wooden binding fastened into a building will not be loosened in an earthquake;
    so a heart made firm by thoughtful counsel will not lose courage in time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not come undone' for 'will not be loosened.' The Greek verb can
      denote being broken up or falling apart; the chosen rendering follows the fastening/building
      image.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'by deliberate counsel' is compressed in Greek and may
      also be understood as 'upon thoughtful purpose' or 'on considered planning.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'in time'; the context suggests a time of testing or crisis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱμάντωσις
  chosen: binding
  alternatives:
  - band
  - fastening
  - strapwork
  lexicon: LSJ
  rationale: The noun denotes a binding or fastening made with straps/bands. 'Binding'
    is broad enough in English to fit a structural image without over-specifying the
    material form.
- source_word: ξυλίνη
  chosen: wooden
  alternatives:
  - of wood
  - wooden-framed
  lexicon: LSJ
  rationale: Adjectival modifier indicating material. 'Wooden' is the natural English
    equivalent.
- source_word: ἐνδεδεμένη
  chosen: fastened
  alternatives:
  - bound
  - tied in
  - secured
  lexicon: LSJ
  rationale: Perfect participle conveying something having been firmly tied/secured.
    'Fastened' fits the construction image and reads naturally.
- source_word: εἰς οἰκοδομήν
  chosen: into a building
  alternatives:
  - for a building
  - in a structure
  lexicon: LSJ
  rationale: The phrase most naturally points to incorporation into a built structure.
    'Into a building' preserves the image of being set within construction.
- source_word: ἐν συσσεισμῷ
  chosen: in an earthquake
  alternatives:
  - in a shaking
  - during a quake
  lexicon: LSJ
  rationale: The compound noun refers to violent shaking, especially seismic disturbance.
    'Earthquake' best conveys the force of the metaphor.
- source_word: οὐ διαλυθήσεται
  chosen: will not be loosened
  alternatives:
  - will not be broken apart
  - will not come undone
  - will not be dissolved
  lexicon: LSJ
  rationale: In this structural context the verb suggests coming apart or being undone.
    'Will not be loosened' matches the fastening metaphor more closely than the more
    abstract 'dissolved'.
- source_word: καρδία
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: LSJ
  rationale: Retains the biblical anthropological term rather than reducing it to
    mere intellect.
- source_word: ἐστηριγμένη
  chosen: made firm
  alternatives:
  - established
  - strengthened
  - steadied
  lexicon: LSJ
  rationale: Perfect participle indicating a settled, strengthened condition. 'Made
    firm' echoes the structural comparison.
- source_word: ἐπὶ διανοήματος βουλῆς
  chosen: by deliberate counsel
  alternatives:
  - upon thoughtful planning
  - on a considered purpose
  - by prudent resolve
  lexicon: LSJ
  rationale: 'The phrase is somewhat compressed: διανόημα suggests thought/intention,
    and βουλή counsel/deliberation/purpose. ''By deliberate counsel'' preserves both
    the reflective and advisory/planning sense without becoming wooden.'
- source_word: ἐν καιρῷ
  chosen: in time of trouble
  alternatives:
  - at the critical moment
  - in due time
  - in a crisis
  lexicon: LSJ
  rationale: Although literally 'in time/season,' the context is testing under pressure,
    so an idiomatic English expansion is warranted to make the implied adverse moment
    explicit.
- source_word: οὐ δειλιάσει
  chosen: will not lose courage
  alternatives:
  - will not be cowardly
  - will not be afraid
  - will not shrink back
  lexicon: LSJ
  rationale: The verb denotes becoming timid or fainthearted. 'Will not lose courage'
    communicates the inward moral sense in natural English.
