translation:
  text: A prudent daughter will obtain a husband, but one who brings shame is a grief
    to the one who fathered her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally says 'will inherit a husband'; the translation 'will obtain
      a husband' reflects the idiomatic sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: θυγάτηρ
  chosen: daughter
  lexicon: LSJ
  rationale: Direct familial term; no reason to generalize or paraphrase.
- source_word: φρονίμη
  chosen: prudent
  alternatives:
  - wise
  - sensible
  lexicon: LSJ
  rationale: Conveys practical wisdom and good judgment in a domestic/social context.
    'Wise' is possible, but 'prudent' better matches the nuance of sound conduct.
- source_word: κληρονομήσει
  chosen: will obtain
  alternatives:
  - will inherit
  - will possess
  lexicon: LSJ
  rationale: Literally 'will inherit,' but with ἄνδρα as object in this context the
    idiom points to acquiring a husband in marriage. 'Obtain' preserves the result
    without forcing an awkwardly literal English 'inherit a husband.'
- source_word: ἄνδρα
  chosen: a husband
  alternatives:
  - a man
  lexicon: LSJ
  rationale: In this marital context ἀνήρ naturally means 'husband,' not merely 'man.'
- source_word: καταισχύνουσα
  chosen: one who brings shame
  alternatives:
  - shameful daughter
  - one who disgraces
  lexicon: LSJ
  rationale: 'The participle is active: she causes shame/disgrace. Rendering it verbally
    preserves that force better than a static adjective.'
- source_word: εἰς λύπην
  chosen: is a grief to
  alternatives:
  - results in grief for
  - becomes sorrow to
  lexicon: LSJ
  rationale: The phrase expresses resulting sorrow. 'Is a grief to' is idiomatic English
    and keeps the relational sense.
- source_word: γεννήσαντος
  chosen: the one who fathered her
  alternatives:
  - her father
  - the one who begot her
  - the parent who begot her
  lexicon: LSJ
  rationale: The Greek is a masculine singular participle, more literally 'the one
    who fathered [her].' 'Her father' is smoother, but this rendering keeps the explicit
    begetting language and the masculine reference present in the source.
