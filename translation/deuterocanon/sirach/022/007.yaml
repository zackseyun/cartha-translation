translation:
  text: Teaching a fool is like gluing a potsherd, like waking one from a deep sleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'He who teaches a fool is gluing a potsherd, waking one
      from deep sleep.' The Greek uses participial comparisons rather than an explicit
      'is like.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συγκολλῶν
  chosen: gluing
  alternatives:
  - joining
  - cementing
  - patching
  lexicon: LSJ
  rationale: The participle literally denotes joining or gluing together. 'Gluing'
    preserves the concrete, somewhat futile image better than a more abstract 'joining.'
- source_word: ὄστρακον
  chosen: potsherds
  alternatives:
  - a potsherd
  - broken pottery
  - shards
  lexicon: LSJ
  rationale: The noun commonly refers to earthenware or a potsherd. In English, 'potsherds'
    best conveys broken pottery fragments and fits the proverb's image of a futile
    repair attempt. The singular in Greek can function generically; English plural
    sounds more natural in this comparison.
- source_word: ὁ διδάσκων
  chosen: teaching
  alternatives:
  - the one teaching
  - instructing
  lexicon: LSJ
  rationale: The articular participle means 'the one who teaches.' Rendering it as
    the verbal noun 'teaching' produces idiomatic English while preserving the generic
    proverbial force.
- source_word: μωρόν
  chosen: a fool
  alternatives:
  - a stupid person
  - the foolish
  lexicon: LSJ
  rationale: μωρός in wisdom literature denotes a morally and intellectually foolish
    person, not merely someone lacking intelligence. 'A fool' is the standard and
    most faithful wisdom-term rendering.
- source_word: ἐξεγείρων
  chosen: waking
  alternatives:
  - rousing
  - stirring up
  lexicon: LSJ
  rationale: The participle means to awaken or rouse. 'Waking' is the clearest modern
    English equivalent and matches the simile's concrete action.
- source_word: καθεύδοντα
  chosen: one
  alternatives:
  - someone sleeping
  - a sleeper
  lexicon: LSJ
  rationale: The participle literally means 'one sleeping.' In the comparison, English
    idiom prefers 'one' after 'waking,' with the sleeping state implied by the following
    phrase.
- source_word: ἐκ βαθέος ὕπνου
  chosen: from a deep sleep
  alternatives:
  - out of deep sleep
  - from profound sleep
  lexicon: LSJ
  rationale: This phrase straightforwardly denotes deep sleep. 'From a deep sleep'
    is natural English and preserves the intensity of the image.
