translation:
  text: If you draw a sword against a friend, do not despair, for there can be a return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If you unsheathe a sword against a friend.' The Greek verb literally
      means 'draw' or 'pull.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'for there is a way back' or 'for restoration is possible.' The Greek
      says literally, 'for there is a return.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ φίλον
  chosen: against a friend
  alternatives:
  - upon a friend
  - at a friend
  lexicon: LSJ
  rationale: With verbs of hostile action, ἐπί with the accusative commonly carries
    an adversative sense. In English, 'against a friend' best conveys the idea of
    turning violence toward a friend.
- source_word: ἐὰν σπάσῃς
  chosen: if you draw
  alternatives:
  - if you unsheathe
  - if you pull out
  lexicon: LSJ
  rationale: σπάω means to draw or pull. With ῥομφαίαν as object, the idiom is drawing
    a sword rather than literally breaking one. 'Draw' is natural modern English and
    preserves the martial image.
- source_word: ῥομφαίαν
  chosen: a sword
  alternatives:
  - a blade
  - a large sword
  lexicon: LSJ
  rationale: ῥομφαία refers to a sword, often a large or broad sword. English 'sword'
    is sufficient here; adding 'large' would over-specify beyond what the verse requires.
- source_word: μὴ ἀπελπίσῃς
  chosen: do not despair
  alternatives:
  - do not lose hope
  - do not give up hope
  lexicon: LSJ
  rationale: ἀπελπίζω means to despair or lose hope. 'Do not despair' is concise and
    preserves the imperative force.
- source_word: ἔστιν γὰρ ἐπάνοδος
  chosen: for there can be a return
  alternatives:
  - for there is a way back
  - for there is restoration
  - for reconciliation is possible
  lexicon: LSJ
  rationale: ἐπάνοδος literally denotes a return or coming back. In context it points
    to the possibility of restored relationship after a breach. 'There can be a return'
    keeps the metaphor of return while sounding natural in English and avoids over-interpreting
    it as full reconciliation in the main text.
