theological_decisions:
- issue: Interpretation of relational restoration after violence toward a friend
  chosen_reading: The verse states that restoration remains possible even after a
    severe breach symbolized by drawing a sword.
  alternative_readings:
  - The phrase could be taken more generally as 'there is a way back' without specifying
    reconciliation.
  - The image may be hyperbolic for grave offense rather than literal violence.
  rationale: The Greek uses concrete martial imagery followed by the abstract statement
    ἔστιν γὰρ ἐπάνοδος. The translation preserves the image and leaves the exact scope
    of the 'return' somewhat open, while signaling relational restoration as the contextual
    sense.
