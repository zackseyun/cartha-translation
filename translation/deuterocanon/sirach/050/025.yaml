theological_decisions:
- issue: Whether to normalize the anthropological idiom 'my soul' into a simple first-person
    expression
  chosen_reading: Retain 'my soul' in the main text
  alternative_readings:
  - I am disgusted
  rationale: The verse is poetic and the Hebrew explicitly uses נַפְשִׁי. Retaining
    'my soul' preserves the source texture and the Greek parallel, without creating
    doctrinal claims beyond the idiom itself.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Whether to follow the Greek's 'nation' in the final clause or the Hebrew's
    'people'
  chosen_reading: Use 'people' in the main text, with 'nation' preserved as an alternative
  alternative_readings:
  - is not a nation
  rationale: The project gives primacy to the Hebrew where it survives in Sirach.
    Since the Hebrew witness is high-confidence here, עָם should govern the translation.
    The Greek parallel is still significant and worth preserving in a footnote as
    a lexical alternative.
  doctrine_reference: PHILOSOPHY.md 'What we are translating'; DOCTRINE.md §Translation
    philosophy 1, 5
