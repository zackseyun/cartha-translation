translation:
  text: With two nations my soul is disgusted, and the third is not a people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and the third is not a nation.'' The Hebrew reads ''people''
      here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנֵי גוֹיִם
  chosen: with two nations
  alternatives:
  - at two nations
  - because of two nations
  lexicon: HALOT
  rationale: The preposition ב with the numeral here is idiomatic with the following
    verb of aversion; the sense is directed toward or in relation to 'two nations.'
    'With two nations' preserves the Hebrew construction while remaining intelligible
    in English. The Greek parallel ἐν δυσὶν ἔθνεσιν supports retaining the simple
    prepositional phrasing rather than expanding it interpretively.
- source_word: קָצָה נַפְשִׁי
  chosen: my soul is disgusted
  alternatives:
  - my soul loathes
  - my soul is vexed
  - I am disgusted
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of the soul feeling revulsion or loathing.
    'My soul is disgusted' keeps the anthropological term 'soul' present, matching
    the Hebrew and the Greek ἡ ψυχή μου, while expressing the emotional force in readable
    English. 'Loathes' is possible, but 'is disgusted' better reflects the stative
    nuance of קָצָה here.
- source_word: וְהַשְּׁלִישִׁית
  chosen: and the third
  alternatives:
  - and the third one
  - and a third
  lexicon: HALOT
  rationale: The feminine ordinal points back to an implied feminine noun such as
    'nation/people-group' in context. English can render this naturally as 'and the
    third' without over-specifying what is ellipsed.
- source_word: אִינֶנּוּ עָם
  chosen: is not a people
  alternatives:
  - is no nation
  - is not a nation
  lexicon: HALOT
  rationale: 'The Hebrew עָם commonly means ''people'' in the collective sense. The
    Greek parallel has οὐκ ἔστιν ἔθνος (''is not a nation''), but since the primary
    witness here is Hebrew, ''people'' is preferred. This also preserves the rhetorical
    sting: the third group is denied the status of a true people.'
