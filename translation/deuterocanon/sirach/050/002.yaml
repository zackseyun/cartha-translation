translation:
  text: In his days a reservoir was dug out, and a conduit like the sea in its abundance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''By him was founded the height of the double structure,
      the high buttress of the temple enclosure.'' The Hebrew witness instead speaks
      of a reservoir and a conduit, reflecting a significant textual divergence.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew word rendered 'conduit' is uncertain and may refer more generally
      to a channel or watercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְרָה
  chosen: was dug out
  alternatives:
  - was excavated
  - was cut out
  lexicon: HALOT
  rationale: The Niphal/passive sense from כרה naturally refers to digging or excavating.
    'Was dug out' is clear modern English and fits construction of a water reservoir.
- source_word: מִקְוֶה
  chosen: reservoir
  alternatives:
  - pool
  - cistern
  - collection of water
  lexicon: HALOT
  rationale: In this architectural context, the term denotes a gathered body/storage
    of water. 'Reservoir' best conveys a substantial engineered water installation,
    matching the temple-building context and aligning with the Greek's concern for
    major construction.
- source_word: שִׂיחַ
  chosen: conduit
  alternatives:
  - channel
  - watercourse
  - ditch
  lexicon: HALOT
  rationale: The Hebrew is somewhat difficult, but in parallel with the reservoir
    and in light of the Greek's architectural line, it likely refers to a constructed
    water-channel or related installation. 'Conduit' preserves the infrastructural
    sense without overcommitting to a narrower technical term.
- source_word: כַּיָּם
  chosen: like the sea
  alternatives:
  - as the sea
  lexicon: HALOT
  rationale: The simile is explicit and should be preserved formally. It likely emphasizes
    scale or fullness.
- source_word: בַּהֲמוֹנוֹ
  chosen: in its abundance
  alternatives:
  - in its multitude
  - in its roaring
  - in its fullness
  lexicon: HALOT
  rationale: המון can denote abundance, multitude, or tumult/noise. With 'sea' the
    phrase may evoke either fullness or surging mass; 'in its abundance' communicates
    the likely sense of great quantity while remaining natural in English.
- source_word: בְּדוֹרוֹ
  chosen: In his days
  alternatives:
  - In his generation
  - During his time
  lexicon: HALOT
  rationale: The phrase idiomatically marks the period of the high priest's activity.
    'In his days' is concise and natural.
