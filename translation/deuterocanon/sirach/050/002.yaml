    was founded, the high buttress of the temple enclosure.'''
  rationale: Project policy gives primacy to the surviving Hebrew of Sirach where
    extant, but the Greek must remain in view as an actual input. Here the Hebrew
    and Greek do not closely match at the surface level, suggesting either a divergent
    Vorlage or substantial textual development. The main text therefore follows the
    Hebrew wording, while preserving the Greek architectural alternative in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    use Greek parallel as consistency check and input'
