translation:
  text: the one who cares for his people against calamity, and strengthens his city
    against distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from sudden disaster'; the Greek parallel reads 'from downfall,' supporting
      the sense of protection from ruin.
    reason: lexical_alternative
  - marker: b
    text: Or 'fortifies his city against siege'; the Greek parallel points more specifically
      to military pressure than the Hebrew wording may require.
    reason: alternative_reading
lexical_decisions:
- source_word: הַדּוֹאֵג
  chosen: the one who cares for
  alternatives:
  - who is concerned for
  - who provides for
  - who watches over
  lexicon: HALOT
  rationale: The participle from דאג denotes anxious concern or care. 'Cares for'
    preserves the active, ongoing sense without overstating administrative provision.
- source_word: לְעַמּוֹ
  chosen: his people
  alternatives:
  - for his people
  lexicon: HALOT
  rationale: עם here is the collective 'people,' with the pronominal suffix retained
    as 'his.' The preposition is absorbed naturally into the English verbal phrase.
- source_word: מֵחֶתֶף
  chosen: against calamity
  alternatives:
  - from sudden disaster
  - from ruin
  - from collapse
  lexicon: HALOT
  rationale: The noun חֶתֶף can denote a sudden destructive blow or calamity. Because
    the parallel colon is also protective, 'against calamity' gives a natural English
    complement to 'cares for' while preserving the sense of threatened disaster. The
    Greek ἀπὸ πτώσεως ('from falling/downfall') supports a danger-prevention sense,
    though not the exact Hebrew nuance.
- source_word: וּמְחַזֵּק
  chosen: and strengthens
  alternatives:
  - and fortifies
  - and makes strong
  lexicon: HALOT
  rationale: חזק in the piel commonly means to strengthen or fortify. 'Strengthens'
    is broad enough to include civic fortification while remaining close to the Hebrew.
- source_word: עִירוֹ
  chosen: his city
  lexicon: HALOT
  rationale: Straightforward rendering of עיר with pronominal suffix.
- source_word: מִצָּר
  chosen: against distress
  alternatives:
  - from siege
  - against siege
  - from affliction
  - against adversity
  lexicon: HALOT
  rationale: The Hebrew noun can denote distress, straits, or pressure; in military
    context it may approach siege. The Greek parallel points toward siege/poliorcetic
    pressure, but the Hebrew as given is somewhat broader. 'Against distress' preserves
    the Hebrew wording without narrowing too quickly, while the military alternative
    is preserved in a footnote.
