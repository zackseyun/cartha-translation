lexical_decisions:
- source_word: יִתֵּן
  chosen: May he give
  alternatives:
  - He will give
  - Let him give
  lexicon: HALOT
  rationale: The Hebrew yiqtol here functions jussively in a blessing/wish context,
    not as a simple future. 'May he give' best conveys the benedictory force in natural
    English.
- source_word: לָכֶם
  chosen: you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The indirect object is naturally carried in English without repeating
    'to'; the sense remains unchanged.
- source_word: חָכְמַת לֵבָב
  chosen: wisdom of heart
  alternatives:
  - wisdom of mind
  - gladness of heart
  lexicon: HALOT
  rationale: The Hebrew witness reads 'wisdom of heart,' which should be given primacy.
    This preserves the Hebrew idiom of inner discernment. The Greek parallel has 'gladness
    of heart,' showing a notable variant or interpretive rendering, but the main text
    follows the extant Hebrew.
- source_word: וִיהִי
  chosen: and may there be
  alternatives:
  - and let there be
  - and there will be
  lexicon: HALOT
  rationale: Like the first verb, this is best taken as jussive in a blessing formula.
    'May there be' is idiomatic and preserves the prayerful tone.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard and sufficiently broad rendering here, carrying
    both harmony and well-being in context.'
- source_word: בֵּינֵיכֶם
  chosen: among you
  alternatives:
  - between you
  lexicon: HALOT
  rationale: Because the address is plural, 'among you' is more natural English than
    'between you' while preserving the interpersonal sense.
