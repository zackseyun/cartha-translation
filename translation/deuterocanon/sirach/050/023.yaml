translation:
  text: May he give you wisdom of heart, and may there be peace among you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''gladness of heart'' instead of ''wisdom of heart.'''
    reason: alternative_reading
  - marker: b
    text: 'Greek also expands the blessing: ''and peace in our days in Israel, as
      in the days of old.'''
