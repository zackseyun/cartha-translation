theological_decisions:
- issue: Whether to follow the Hebrew's luminosity image or the Greek parallel's more
    specific 'morning star' wording
  chosen_reading: Retain the Hebrew-based 'shining star' in the main text
  alternative_readings:
  - Like the morning star among the clouds
  rationale: The project prioritizes the surviving Hebrew of Sirach where available,
    while using the Greek as a real control. Here the Hebrew reads אוֹר ('light/shining'),
    whereas the Greek has ἀστὴρ ἑωθινός ('morning star'). Since the Hebrew witness
    is extant and high-confidence, the main text follows it; the Greek-based specificity
    is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
