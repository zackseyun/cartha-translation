translation:
  text: Like a shining star from among clouds, and like the full moon in the days
    of the feast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Like the morning star in the midst of a cloud.'' The
      Hebrew reads more generally, ''like a shining star from among clouds.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כְּכוֹכָב
  chosen: Like a star
  alternatives:
  - Like the star
  - Like a heavenly body
  lexicon: HALOT
  rationale: כוכב ordinarily means 'star.' The prefixed כ marks comparison, so 'Like
    a star' is the natural simile opening.
- source_word: אוֹר
  chosen: shining
  alternatives:
  - light
  - bright
  - morning
  lexicon: HALOT
  rationale: The Hebrew noun/adjectival form here conveys luminosity. Because English
    'star of light' is awkward, 'shining star' captures the sense idiomatically while
    staying close to the Hebrew. The Greek parallel's ἑωθινός ('morning') may reflect
    an interpretive tradition, but the Hebrew witness supports luminosity rather than
    time-of-day as the primary sense.
- source_word: מִבֵּין עָבִים
  chosen: from among clouds
  alternatives:
  - between clouds
  - amid clouds
  lexicon: HALOT
  rationale: בין with מן yields the sense 'from among' or 'out from between.' 'Clouds'
    renders עבים straightforwardly. 'From among clouds' gives natural English while
    preserving the image of emergence.
- source_word: וּכְיָרֵחַ מָלֵא
  chosen: and like the full moon
  alternatives:
  - and like a full moon
  - and like the moon when full
  lexicon: HALOT
  rationale: ירח is 'moon' and מלא describes fullness. English idiom favors 'the full
    moon.' The conjunction keeps the parallel simile structure.
- source_word: בִּימֵי מוֹעֵד
  chosen: in the days of the feast
  alternatives:
  - in the days of the appointed time
  - at festival time
  - in feast days
  lexicon: HALOT
  rationale: מועד can mean appointed time or festival. In this poetic context, especially
    with the full moon image and the cultic setting of Sirach 50, 'feast' best conveys
    the likely festal reference without over-specifying a particular festival.
