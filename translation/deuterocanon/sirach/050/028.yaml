theological_decisions:
- issue: Generic masculine in wisdom beatitude
  chosen_reading: the man
  alternative_readings:
  - the person
  - one
  rationale: The Hebrew אִישׁ is masculine singular but functions generically in wisdom
    literature. Following the project's gender-accurate policy, the main text keeps
    'man' rather than neutralizing it, while the sense remains representative rather
    than male-exclusive.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Use of Hebrew as primary witness with Greek as control
  chosen_reading: Translate from the extant Hebrew while allowing the Greek to confirm
    implied plural reference in the second clause
  alternative_readings:
  - 'Translate more woodenly from Hebrew alone: ''and setting upon his heart, he will
    become wise'''
  rationale: For Sirach where Hebrew survives, the Hebrew has primacy. Here the Greek
    parallel helps confirm that the second clause refers back to the preceding teachings
    ('them'), making the English clearer without importing foreign content.
  doctrine_reference: PHILOSOPHY.md 'Deuterocanonical / Apocrypha' and 'transparent'
    principles
