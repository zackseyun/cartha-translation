theological_decisions:
- issue: Whether to render כָּל בָּשָׂר idiomatically as 'all people' in light of
    the Greek parallel πᾶς ὁ λαός
  chosen_reading: All flesh
  alternative_readings:
  - all the people
  - everyone
  rationale: The Hebrew witness is primary where extant, and its idiom is neither
    obscure nor misleading here. The Greek parallel likely interprets the idiom for
    clarity in context. To preserve the Hebrew texture while keeping the Greek in
    view, the main text retains 'All flesh' and the alternative is preserved in a
    footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve significant alternatives in footnotes where ambiguity is genuine.'
- issue: Whether לְהִשְׁתַּחֲוֹת should be rendered as bodily 'bow down' or more interpretive
    'worship'
  chosen_reading: to bow down
  alternative_readings:
  - to worship
  - to prostrate themselves
  rationale: The Hebrew verb explicitly denotes the act of prostration. Since the
    preceding clause already describes falling on their faces, 'to bow down' keeps
    the embodied worship language without flattening it into a purely abstract religious
    term.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not paraphrase
    beyond what the source warrants.'
