translation:
  text: All flesh together hurried, and they fell on their faces to the ground, to
    bow down before the Most High, before the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''then all the people together hurried'' rather than Hebrew ''all
      flesh together hurried.'' The Greek likely clarifies the Hebrew idiom for the
      gathered assembly.'
    reason: alternative_reading
  - marker: b
    text: Or 'to worship before the Most High.' The Hebrew verb specifically refers
      to bowing/prostrating oneself in reverence.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל בָּשָׂר
  chosen: All flesh
  alternatives:
  - all people
  - everyone
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'all flesh' and can denote all humanity.
    Here, because the scene is a gathered worshiping assembly and the Greek has 'all
    the people,' either could work. The main text keeps the Hebrew's vivid idiom 'all
    flesh' while remaining intelligible in English.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  - all together
  lexicon: HALOT
  rationale: The adverb marks collective action. 'Together' is the most natural concise
    rendering and fits both Hebrew and Greek κοινῇ.
- source_word: נִמְהָרוּ
  chosen: hurried
  alternatives:
  - hastened
  - made haste
  lexicon: HALOT
  rationale: The verb conveys quick movement or eager haste. 'Hurried' is readable
    modern English; 'hastened' is slightly more formal but less natural. The Greek
    κατέσπευσεν supports the sense of making haste.
- source_word: וַיִּפְּלוּ עַל פְּנֵיהֶם אָרְצָה
  chosen: they fell on their faces to the ground
  alternatives:
  - they fell facedown to the ground
  - they fell upon their faces to the earth
  lexicon: HALOT
  rationale: This preserves the physical posture of prostration. 'On their faces to
    the ground' closely reflects the Hebrew while remaining clear in English.
- source_word: לְהִשְׁתַּחֲוֹת
  chosen: to bow down
  alternatives:
  - to worship
  - to prostrate themselves
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration and often functions as an act of
    worship. 'To bow down' preserves the bodily action explicitly present in the Hebrew;
    'to worship' would be interpretive, though contextually true.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - the Exalted One
  lexicon: HALOT
  rationale: A standard and transparent rendering of the divine title, preserving
    its elevated theological force.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: This is a well-established biblical title and best preserves the Hebrew
    construction and resonance.
