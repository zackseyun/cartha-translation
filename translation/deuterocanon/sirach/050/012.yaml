translation:
  text: When he received the portions from the hand of his brothers, and he stood
    at his arranged place by the altar, around him was a crown of sons, like saplings
    of cedars in Lebanon; and they surrounded him like willows by a stream—all the
    sons of Aaron in their splendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''from the hands of the priests'' where the Hebrew reads ''from
      the hand of his brothers.'' The context indicates fellow priests.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'stood upon/at the arrangements' is difficult; the Greek parallel
      clarifies the scene as standing by the altar hearth.
    reason: textual_variant
lexical_decisions:
- source_word: בְּקַבְּלוֹ
  chosen: When he received
  alternatives:
  - as he received
  - in his receiving
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal circumstance.
    'When he received' gives natural English while preserving the sequence of the
    scene.
- source_word: נְתָחִים
  chosen: the portions
  alternatives:
  - pieces
  - portions of the sacrifice
  lexicon: HALOT
  rationale: The Hebrew denotes cut pieces/portions, here in sacrificial context.
    'Portions' is idiomatic and fits the cultic setting without over-specifying beyond
    the text.
- source_word: מִיַּד אֶחָיו
  chosen: from the hand of his brothers
  alternatives:
  - from his brothers' hand
  - from the priests' hands
  lexicon: HALOT
  rationale: The Hebrew literally says 'from the hand of his brothers.' Since the
    next colon identifies the surrounding group as Aaron's sons and the Greek has
    'priests,' 'brothers' is retained in the main text as the Hebrew reading, with
    priestly identity inferred by context rather than imported into the translation.
- source_word: נִצָּב עַל מַעֲרָכוֹת
  chosen: stood at his arranged place by the altar
  alternatives:
  - stood over the arrangements
  - stood at the ranks
  - stood at the altar arrangement
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat difficult. The Greek parallel clarifies
    the cultic scene with 'standing by the altar hearth.' 'Arranged place by the altar'
    reflects the Hebrew's sense of ordered arrangement while using the Greek as a
    control to avoid an opaque English rendering.
- source_word: עֲטֶרֶת
  chosen: a crown
  alternatives:
  - a wreath
  - a garland
  lexicon: HALOT
  rationale: 'The metaphor is visual: the sons around him form a crown. ''Crown''
    is the most direct rendering and preserves the honor imagery.'
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  - young men
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine/plural. In context these are priestly
    descendants, confirmed by the next line as 'all the sons of Aaron.' Per gender-accurate
    policy, 'sons' is retained.
- source_word: כִּשְׁתִילֵי אֲרָזִים
  chosen: like saplings of cedars
  alternatives:
  - like cedar shoots
  - like young cedars
  lexicon: HALOT
  rationale: The image is of vigorous young growth. 'Saplings of cedars' is slightly
    more literal than simply 'young cedars' and preserves the poetic comparison.
- source_word: בַּלְּבָנוֹן
  chosen: in Lebanon
  alternatives:
  - on Lebanon
  lexicon: HALOT
  rationale: Standard geographic rendering.
- source_word: בְּעַרְבֵי נָחַל
  chosen: like willows by a stream
  alternatives:
  - like poplars by a wadi
  - with willows of the brook
  lexicon: HALOT
  rationale: ערבי נחל is a known expression for willows associated with watercourses.
    'By a stream' communicates the image clearly in modern English.
- source_word: בִּכְבוֹדָם
  chosen: in their splendor
  alternatives:
  - in their glory
  - with their honor
  lexicon: HALOT
  rationale: The phrase describes the dignified, glorious appearance of the Aaronic
    priests. 'Splendor' is vivid and natural in English while preserving the honorific
    sense.
