theological_decisions:
- issue: Priestly identity of 'his brothers'
  chosen_reading: Retain 'his brothers' in the main text while allowing the priestly
    sense to be inferred from context and the following clause.
  alternative_readings:
  - from the hands of the priests
  rationale: The Hebrew witness has 'his brothers,' while the Greek parallel explicitly
    reads 'priests.' Because the Hebrew survives here and is the primary witness,
    the main text follows it; the Greek helps confirm that the brothers are fellow
    priests rather than generic kin.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source ambiguity/tension rather than resolve it unnecessarily.'
- issue: Difficult cultic phrase עַל מַעֲרָכוֹת
  chosen_reading: 'Render with altar-oriented sense: ''stood at his arranged place
    by the altar.'''
  alternative_readings:
  - stood over the arrangements
  - stood at the ranks
  rationale: The Hebrew alone is somewhat opaque, but the Greek parallel places him
    by the altar hearth. The chosen rendering keeps a trace of the Hebrew 'arrangement/order'
    language while making the cultic setting intelligible.
  doctrine_reference: 'Translation philosophy: optimal equivalence; use parallel source
    as actual translation input while remaining anchored in the primary witness.'
