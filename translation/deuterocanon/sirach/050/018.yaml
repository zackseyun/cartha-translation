lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave forth
  alternatives:
  - gave
  - uttered
  - sent out
  lexicon: HALOT
  rationale: נתן with קול is an idiom for producing or raising a sound/voice. 'Gave
    forth' preserves the Hebrew idiom while sounding natural in English.
- source_word: הַשִּׁיר
  chosen: the song
  alternatives:
  - the singing
  - the chant
  lexicon: HALOT
  rationale: The Hebrew points to 'song/singing.' The Greek parallel has 'the psalm-singers
    praised with their voices,' which suggests a musical-liturgical setting. 'The
    song' keeps the Hebrew wording while allowing the collective musical sense.
- source_word: קוֹלוֹ
  chosen: its voice
  alternatives:
  - its sound
  - its song
  lexicon: HALOT
  rationale: Literally 'its voice.' Because the antecedent is the grammatically masculine
    singular 'song,' 'its voice' is the most transparent rendering.
- source_word: וְעַל
  chosen: over
  alternatives:
  - upon
  - above
  - amid
  lexicon: HALOT
  rationale: The preposition is literally 'upon/over.' The exact force is somewhat
    uncertain in this difficult colon, but 'over' best preserves the spatial image
    without over-interpreting.
- source_word: הֲמּוֹן
  chosen: the multitude
  alternatives:
  - the crowd
  - the throng
  - the great assembly
  lexicon: HALOT
  rationale: המון commonly denotes a crowd or multitude. In this temple scene, 'the
    multitude' fits both the Hebrew and the Greek's reference to a very full house.
- source_word: הֶעֱרִיכוּ
  chosen: they set in order
  alternatives:
  - they arranged
  - they prepared
  lexicon: HALOT
  rationale: ערך in the Hifil commonly means to arrange or set in order. This is preferable
    to a looser rendering because the cultic setting may imply ordered liturgical
    or ceremonial action.
- source_word: נֵרוֹ
  chosen: his lamp
  alternatives:
  - his light
  - its lamp
  lexicon: HALOT
  rationale: נר normally means 'lamp.' The suffix is singular masculine, most naturally
    'his.' The referent is uncertain; it may point to the high priest or function
    as a poetic image. The Greek parallel instead reads about a sweetened melody in
    a very full house, indicating that the Hebrew here may be textually difficult.
    The main text keeps the extant Hebrew wording, with the Greek-based alternative
    preserved in a footnote.
