theological_decisions:
- issue: Temple imagery in a Hebrew text that says 'tent' alongside 'house/curtain'
  chosen_reading: Retain the Hebrew's mixed sanctuary imagery rather than harmonize
    it to 'temple' or 'tabernacle.'
  alternative_readings:
  - How glorious he was when he appeared from the sanctuary, when he came out from
    the house of the curtain.
  - How splendid he was in the circuit of the people, when he came out of the house
    of the veil.
  rationale: The Hebrew combines אֹהֶל ('tent') with בֵּית הַפָּרֹכֶת ('house of the
    curtain'), likely invoking inherited tabernacle language within temple worship.
    Harmonizing to a single architectural term would flatten the text's imagery. The
    Greek parallel reflects a somewhat different first colon, so the translation keeps
    the Hebrew main text and notes the Greek alternative.
  doctrine_reference: Translation philosophy §§1, 3, 5
