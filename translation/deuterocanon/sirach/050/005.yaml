translation:
  text: How splendid he was when he looked out from the tent, when he came out from
    behind the curtain of the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel reads, 'How he was glorified in the turning/circuit of
      the people,' instead of the Hebrew 'when he looked out from the tent.' This
      suggests a textual divergence in the first line.
    reason: textual_variant
  - marker: b
    text: Or 'veil' for 'curtain' (Hebrew parokhet; Greek katapetasma), the screen
      before the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה נֶהְדַּר
  chosen: How splendid
  alternatives:
  - How glorious
  - How majestic
  - How honored
  lexicon: HALOT
  rationale: The exclamatory מַה with נהדר expresses admiration at impressive appearance.
    'Splendid' preserves the visual and honorific sense without sounding overly liturgical.
    The Greek ὡς ἐδοξιάσθη supports a glory/honor nuance, but the Hebrew adjective
    points especially to striking magnificence.
- source_word: בְּהַשְׁגִּיחוֹ
  chosen: when he looked out
  alternatives:
  - when he appeared
  - when he gazed forth
  - in his looking forth
  lexicon: HALOT
  rationale: From שׁגח/השגיח, the form naturally suggests looking out or appearing
    in view. Given the parallel 'when he came out,' this likely describes the high
    priest becoming visible from the sanctuary area. 'Looked out' stays close to the
    Hebrew while fitting the scene. The Greek parallel instead reads 'in the circuit
    of the people,' indicating some textual divergence, but the Hebrew witness is
    primary here.
- source_word: מֵאֹהֶל
  chosen: from the tent
  alternatives:
  - from the tabernacle
  - from the sanctuary tent
  lexicon: HALOT
  rationale: The Hebrew literally says 'tent.' Although in cultic context it can evoke
    the tabernacle, Sirach's setting is the temple. Retaining 'tent' respects the
    Hebrew wording and its traditional sanctuary imagery, while the following phrase
    clarifies the sacred setting.
- source_word: וּבְצֵאתוֹ
  chosen: when he came out
  alternatives:
  - and in his going out
  - as he emerged
  lexicon: HALOT
  rationale: A straightforward infinitive/constructive verbal noun sense in context.
    'When he came out' gives natural English and preserves the temporal parallelism
    with the first clause.
- source_word: מִבֵּית הַפָּרֹכֶת
  chosen: from behind the curtain of the house
  alternatives:
  - from the house of the curtain
  - from the veil-chamber
  - from the inner sanctuary curtain
  lexicon: HALOT
  rationale: פָּרֹכֶת is the sanctuary curtain/veil. בית here is best taken as the
    temple house or the area defined by the curtain. 'From behind the curtain of the
    house' makes the spatial sense clear in English without over-specifying a technical
    architectural term. The Greek οἴκου καταπετάσματος confirms the veil/curtain imagery.
