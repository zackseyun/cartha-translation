translation:
  text: Then the sons of Aaron, the priests, would raise a shout with beaten trumpets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has a longer parallel here, describing the priest extending his hand
      for the libation and pouring out the blood of the grape at the altar as a pleasing
      aroma to the Most High, the King of all. The Hebrew witness preserved here contains
      only the trumpet acclamation line.
    reason: textual_variant
  - marker: b
    text: Or 'would sound a blast with hammered trumpets.' The Hebrew verb can denote
      a loud acclamation or signal-shout, and in this context it is expressed through
      the trumpets.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: HALOT
  rationale: Temporal-sequential marker introducing the next liturgical action in
    the scene.
- source_word: יָרִיעוּ
  chosen: would raise a shout
  alternatives:
  - would shout
  - would sound a blast
  - would cry out
  lexicon: HALOT
  rationale: From the root רוע/ריע, commonly denoting a loud shout or acclamation.
    Because the direct instrument phrase follows ('with trumpets'), the Hebrew likely
    compresses the idea of a jubilant/signal blast made by means of the trumpets.
    'Raise a shout' preserves the verbal force without over-specifying a technical
    trumpet term not explicit in the Hebrew form.
- source_word: בְנֵי אַהֲרֹן
  chosen: the sons of Aaron
  alternatives:
  - Aaron's sons
  lexicon: HALOT
  rationale: Formal priestly designation; preserving the familial title keeps the
    cultic lineage explicit.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Appositional clarification of 'the sons of Aaron'; retained in English
    for the Hebrew's emphatic identification.
- source_word: בַּחֲצֹצְרוֹת
  chosen: with trumpets
  alternatives:
  - on trumpets
  lexicon: HALOT
  rationale: חצוצרות are the priestly metal trumpets used in temple ritual. 'With
    trumpets' is natural English and preserves the instrumental sense of ב.
- source_word: מִקְשֶׁה
  chosen: hammered
  alternatives:
  - beaten
  - of hammered work
  lexicon: HALOT
  rationale: Technical term for something made by hammering/beating metal into shape.
    'Hammered trumpets' is concise and reflects the material-craft nuance.
