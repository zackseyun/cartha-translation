theological_decisions:
- issue: Cultic sense of memorial language
  chosen_reading: to make remembrance before the Most High
  alternative_readings:
  - to serve as a memorial before the Most High
  - to make mention before the Most High
  rationale: The Hebrew and Greek both point to memorial language in a worship setting.
    The translation preserves that sacrificial-liturgical resonance without importing
    later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
