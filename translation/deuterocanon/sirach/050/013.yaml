theological_decisions:
- issue: Specificity of sacrificial term אִשֵּׁי
  chosen_reading: offerings of the LORD
  alternative_readings:
  - fire offerings of the LORD
  rationale: The Hebrew term can specifically denote offerings made by fire, but the
    Greek parallel uses the broader προσφορὰ. Given the composite Hebrew witness and
    the Greek consistency check, the main text uses the broader but still cultic 'offerings,'
    while preserving the more specific alternative in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity
    rather than over-resolve.'
