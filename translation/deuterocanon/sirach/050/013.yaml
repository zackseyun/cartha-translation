lexical_decisions:
- source_word: וְאִשֵּׁי
  chosen: and the offerings of
  alternatives:
  - and the fire offerings of
  - and the food offerings of
  lexicon: HALOT
  rationale: Hebrew אִשֵּׁי commonly refers to offerings made by fire. In English,
    'fire offerings' is formally precise but can sound technical or awkward; the Greek
    parallel προσφορὰ supports the broader sense 'offering.' 'Offerings of' preserves
    the sacrificial sense without over-specifying beyond what the immediate line requires.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the Tetragrammaton is rendered 'the LORD.'
- source_word: בְּיָדָם
  chosen: were in their hands
  alternatives:
  - were at their hands
  - they held
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase that preserves
    the concrete ritual image of the priests holding the offerings.
- source_word: נֶגֶד
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: HALOT
  rationale: '''Before'' is idiomatic and suitably formal, conveying public visibility
    in a liturgical setting.'
- source_word: כָּל קְהַל יִשְׂרָאֵל
  chosen: all the assembly of Israel
  alternatives:
  - the whole congregation of Israel
  - all the congregation of Israel
  lexicon: HALOT
  rationale: קהל is well rendered by 'assembly' in public-worship contexts. 'All the
    assembly of Israel' closely follows the Hebrew while remaining natural English.
