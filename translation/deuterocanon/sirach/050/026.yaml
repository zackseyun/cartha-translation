lexical_decisions:
- source_word: יוֹשְׁבֵי
  chosen: the inhabitants of
  alternatives:
  - those who dwell in
  - the dwellers of
  lexicon: HALOT
  rationale: Construct plural of ישב used substantivally for people residing in a
    place. 'The inhabitants of' is natural English and preserves the collective sense.
- source_word: שֵׂעִיר
  chosen: Seir
  alternatives:
  - Mount Seir
  lexicon: HALOT
  rationale: Proper place-name, conventionally transliterated. The Hebrew lacks an
    explicit word for 'mountain' here, so 'Seir' is preferred over 'Mount Seir,' though
    the Greek reflects a mountainous region in its divergent reading.
- source_word: וּפְלֶשֶׁת
  chosen: and Philistia
  alternatives:
  - and the Philistines
  lexicon: HALOT
  rationale: The Hebrew form names the land/region rather than the people directly.
    'Philistia' best matches the source, while still implying its inhabitants in parallel
    with 'inhabitants of Seir.'
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: גוי commonly denotes a people-group or nation. 'Nation' preserves the
    collective-political nuance better than the more generic 'people'.
- source_word: נָבָל
  chosen: foolish
  alternatives:
  - senseless
  - base
  lexicon: HALOT
  rationale: נבל can denote moral and intellectual folly, not mere lack of intelligence.
    'Foolish' is the most idiomatic concise rendering in English and preserves the
    pejorative force.
- source_word: הַדָּר
  chosen: that dwells
  alternatives:
  - dwelling
  - that lives
  lexicon: HALOT
  rationale: Participle of דור/דר 'to dwell' functioning attributively with גוי. 'That
    dwells' gives smooth English while retaining the ongoing/residential sense.
- source_word: בִּשְׁכֶם
  chosen: in Shechem
  alternatives:
  - in Sichem
  lexicon: HALOT
  rationale: Proper place-name in Hebrew; standard English transliteration is 'Shechem.'
    The Greek parallel has 'Sikimoi/Shechem' confirming the location.
