translation:
  text: Like the sun shining on the temple of the king, and like a rainbow appearing
    in the cloud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''the temple of the Most High'' instead of ''the temple
      of the king.'' The Hebrew witness likely preserves a variant wording, while
      the Greek clarifies the cultic setting.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּשֶׁמֶשׁ
  chosen: Like the sun
  alternatives:
  - As the sun
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like the sun' gives a natural simile
    in English and matches the poetic sequence.
- source_word: מְשַׁקֶּרֶת
  chosen: shining
  alternatives:
  - beaming
  - casting rays
  lexicon: HALOT
  rationale: The Hebrew form is unusual and likely reflects a verb of radiance/beam-shooting
    in context. The Greek parallel ἐκλάμπων ('shining forth') supports a sense of
    bright shining rather than deception, so 'shining' best captures the image without
    overtranslating.
- source_word: אֶל הֵיכַל הַמֶּלֶךְ
  chosen: on the temple of the king
  alternatives:
  - toward the palace of the king
  - upon the king's palace
  lexicon: HALOT
  rationale: Hebrew היכל can mean palace or temple. The Greek parallel reads ναὸν
    Ὑψίστου ('temple of the Most High'), indicating a cultic sense rather than a royal
    palace. Because the Hebrew has 'the king,' the draft preserves that wording while
    rendering היכל as 'temple' in light of the Greek and the immediate high-priestly
    context.
- source_word: וּכְקֶשֶׁת
  chosen: and like a rainbow
  alternatives:
  - and like a bow
  lexicon: HALOT
  rationale: קשת can mean bow or rainbow. In parallel with 'appearing in the cloud,'
    the meteorological sense 'rainbow' is clearly intended.
- source_word: נִרְאֲתָה
  chosen: appearing
  alternatives:
  - seen
  - visible
  lexicon: HALOT
  rationale: The Niphal conveys being seen/appearing. 'Appearing' is idiomatic in
    English and suits the poetic simile.
- source_word: בֶעָנָן
  chosen: in the cloud
  alternatives:
  - in a cloud
  - among clouds
  lexicon: HALOT
  rationale: The Hebrew is singular. The Greek has plural 'in clouds of glory,' but
    the Hebrew witness here is singular and should govern the main text.
