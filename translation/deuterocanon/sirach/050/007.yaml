theological_decisions:
- issue: Hebrew 'temple of the king' versus Greek 'temple of the Most High'
  chosen_reading: Retain the Hebrew-based main text 'temple of the king' while rendering
    היכל as 'temple' under guidance from the Greek parallel.
  alternative_readings:
  - temple of the Most High
  - palace of the king
  rationale: Zone 1 primacy favors the surviving Hebrew, but the Greek parallel is
    an actual translation input and clarifies that היכל is cultic here. The phrase
    'of the king' is therefore preserved from Hebrew, with the Greek alternative noted
    in a footnote because it materially affects interpretation.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual translation input'
