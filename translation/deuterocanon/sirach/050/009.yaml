translation:
  text: like a vessel of engraved gold and antimony, fastened onto precious stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew וְאַנְטִיל is uncertain. It may refer to antimony or to some kind
      of ornamental inlay or adornment. The Greek parallel reads more broadly, 'adorned
      with every precious stone.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek witness expands the image: ''like a gold vessel, hammered and
      adorned with every precious stone.'' This supports the general sense of elaborate
      ornamentation in the Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּכְלִי
  chosen: like a vessel
  alternatives:
  - like an object
  - like a utensil
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'), and כְּלִי commonly denotes
    a vessel or crafted object. 'Vessel' preserves the poetic image of a finely made
    ceremonial item better than the broader 'object.'
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term; no contextual reason to vary the standard
    gloss.
- source_word: מְפֻתָּח
  chosen: engraved
  alternatives:
  - carved
  - worked
  - chased
  lexicon: HALOT
  rationale: The passive participial form suggests worked or ornamented craftsmanship.
    'Engraved' communicates decorative metalwork in accessible English. The Greek
    parallel ὁλοσφύρητον κεκοσμημένον points generally to elaborately worked ornamentation,
    supporting a craftsmanship sense.
- source_word: וְאַנְטִיל
  chosen: and antimony
  alternatives:
  - with antimony
  - and a necklace
  - and inset ornament
  lexicon: HALOT
  rationale: The Hebrew term is difficult and somewhat uncertain. Retaining 'antimony'
    follows the likely sense of a decorative dark inlay or cosmetic/mineral substance,
    while acknowledging uncertainty. The Greek parallel lacks a direct equivalent
    and instead has 'adorned with every precious stone,' suggesting the Hebrew word
    may denote some kind of ornament or inlay. Because the Hebrew survives here, the
    draft stays anchored to it but preserves the broader ornamental sense in a footnote.
- source_word: הַנֶּאֱחָז
  chosen: fastened
  alternatives:
  - set
  - held
  - mounted
  lexicon: HALOT
  rationale: The Niphal participle conveys something being held or fixed in place.
    In context of ornamentation with stones, 'fastened' naturally describes attachment
    without over-specifying the exact technique.
- source_word: עַל אַבְנֵי חֵפֶץ
  chosen: onto precious stones
  alternatives:
  - upon delightful stones
  - on costly stones
  - with precious gems
  lexicon: HALOT
  rationale: אַבְנֵי is 'stones,' and חֵפֶץ here likely conveys desirability/value.
    The Greek parallel παντὶ λίθῳ πολυτελεῖ strongly supports the sense 'precious/costly
    stones.' 'Precious stones' is idiomatic and faithful to both witnesses.
