lexical_decisions:
- source_word: עַד כַּלּוֹתוֹ
  chosen: until he finished
  alternatives:
  - until his finishing
  - until he completed
  lexicon: HALOT
  rationale: The infinitive construct with suffix from כלה marks the endpoint of the
    preceding action sequence. 'Until he finished' is idiomatic English while preserving
    the temporal force.
- source_word: לְשָׁרֵת
  chosen: ministering
  alternatives:
  - serving
  - officiating
  lexicon: HALOT
  rationale: שרת in priestly context commonly denotes liturgical service. 'Ministering'
    best conveys cultic service without flattening it to generic labor.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח in sacrificial context.
- source_word: וּלְסַדֵּר
  chosen: arranging
  alternatives:
  - setting in order
  - ordering
  lexicon: HALOT
  rationale: סדר means to arrange or set in order. The participial sense in English
    fits the parallel infinitive construction after 'until he finished.'
- source_word: מַעַרְכוֹת
  chosen: the orderings
  alternatives:
  - the arrangements
  - the rows
  - the prescribed order
  lexicon: HALOT
  rationale: The plural of מערכת can denote arranged sets or ordered dispositions,
    especially in cultic settings. Because the Hebrew object is terse and somewhat
    elliptical, 'the orderings' preserves the formal ambiguity better than specifying
    bread, wood, or offerings. The Greek parallel's κοσμῆσαι προσφοράν suggests a
    sacrificial arrangement/offering context, supporting a cultic sense without requiring
    a narrower object than the Hebrew gives.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - the Highest One
  lexicon: HALOT
  rationale: Standard divine title in wisdom literature. It is definite by sense here
    and refers to God.
