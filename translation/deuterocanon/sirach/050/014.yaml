theological_decisions:
- issue: How specifically to render the cultic object מַעַרְכוֹת in light of the Greek
    parallel προσφοράν
  chosen_reading: retain the broader Hebrew sense as 'the orderings' while signaling
    cultic context through 'ministering at the altar' and 'of the Most High'
  alternative_readings:
  - arranging the offering of the Most High Almighty
  - setting in order the sacrificial arrangements of the Most High
  rationale: Zone 1 Hebrew is primary where extant, but the Greek parallel must be
    used as translation input. Here the Hebrew preserves a plural noun 'arrangements/orderings,'
    while the Greek reflects a more explicit singular 'offering' and adds Παντοκράτορος.
    Because the Hebrew witness is available and high-confidence though flagged major_mismatch,
    the main text follows the Hebrew more closely and preserves the Greek's more explicit
    sacrificial interpretation in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve ambiguity rather than over-resolve.'
