translation:
  text: When he put on garments of honor and clothed himself in garments of splendor,
    when he went up to the glorious altar, he made the court of the sanctuary splendid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''when he went up to the holy altar, he glorified the vesture/court
      of the sanctuary.'' The Hebrew reads ''the glorious altar'' and ''the court
      of the sanctuary.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בַּעֲטוֹתוֹ
  chosen: when he put on
  alternatives:
  - when he wrapped himself
  - when he donned
  lexicon: HALOT
  rationale: The Hebrew form introduces the scene of vesting. 'Put on' is natural
    modern English and fits the parallel with 'clothed himself.' 'Wrapped himself'
    is possible but less idiomatic here.
- source_word: בִּגְדֵי כָבוֹד
  chosen: garments of honor
  alternatives:
  - glorious garments
  - honored garments
  lexicon: HALOT
  rationale: כָבוֹד often carries the sense of honor/glory. 'Garments of honor' preserves
    the Hebrew genitive and suits priestly vestments without overinterpreting.
- source_word: וְהִתְלַבְּשׁוֹ
  chosen: and clothed himself
  alternatives:
  - and dressed himself
  - and was clothed
  lexicon: HALOT
  rationale: Reflexive sense is likely in context. 'Clothed himself' preserves the
    formal dignity of the line and matches the Hebrew stem better than the flatter
    'dressed himself.'
- source_word: בִּגְדֵי תִפְאָרֶת
  chosen: garments of splendor
  alternatives:
  - garments of beauty
  - glorious garments
  lexicon: HALOT
  rationale: תִפְאָרֶת denotes beauty, splendor, adornment, or glory. 'Splendor' pairs
    well with the previous colon while avoiding repetitive use of 'glory.'
- source_word: בַּעֲלוֹתוֹ
  chosen: when he went up
  alternatives:
  - when he ascended
  lexicon: HALOT
  rationale: The phrase refers to ascending to the altar area. 'Went up' is idiomatic
    English while still reflecting the Hebrew motion upward.
- source_word: מִזְבַּח הוֹד
  chosen: the glorious altar
  alternatives:
  - the altar of majesty
  - the altar of splendor
  lexicon: HALOT
  rationale: הוֹד overlaps with majesty, splendor, and glory. Because the Greek parallel
    has 'holy altar,' there may be a textual or interpretive tension, but the Hebrew
    witness here supports a quality of magnificence; 'glorious altar' best reflects
    that.
- source_word: וַיֶּהְדַּר
  chosen: he made ... splendid
  alternatives:
  - he adorned
  - he glorified
  - he honored
  lexicon: HALOT
  rationale: From הדר, the sense is to beautify, adorn, or make splendid. The causative
    nuance is captured by 'made ... splendid,' which reads clearly in English and
    fits the object that follows.
- source_word: עֲזֶרֶת מִקְדָּשׁ
  chosen: the court of the sanctuary
  alternatives:
  - the sanctuary court
  - the court of the holy place
  lexicon: HALOT
  rationale: עֲזֶרֶת denotes a court or enclosed sacred area. 'Court of the sanctuary'
    is clear and preserves the construct relationship with מִקְדָּשׁ.
