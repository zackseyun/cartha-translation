theological_decisions:
- issue: Use of Hebrew as primary witness with Greek parallel in a deuterocanonical
    verse
  chosen_reading: Translate from the extant Hebrew while checking the Greek for coherence;
    retain the Hebrew's emphasis on the altar's splendor in the main text.
  alternative_readings:
  - 'Follow the Greek more closely: ''when he went up to the holy altar, he glorified
    the court/vesture of the sanctuary'''
  rationale: Project policy gives Hebrew primacy for Sirach where Hebrew survives.
    The Greek parallel confirms the ceremonial setting but differs in details ('holy
    altar' and possibly a different object phrase). Since the Hebrew is high-confidence
    and coherent, the main text follows it, while the Greek-based alternative is preserved
    in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is translated from the Hebrew
    where it survives; parallel Greek is used as actual input but not allowed to override
    a sound Hebrew witness without cause.'
