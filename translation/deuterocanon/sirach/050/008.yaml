translation:
  text: like a blossom of Lebanon in the days of summer, and like a fire of frankincense
    upon the grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''like lilies by the outlets of water'' appears in the
      corresponding comparison where the Hebrew here reads ''like a fire of frankincense
      upon the grain offering.'' The Hebrew witness is followed for the main text,
      with the Greek kept in view as a parallel tradition.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּפֶרַח
  chosen: like a blossom
  alternatives:
  - like a flower
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'). פֶּרַח denotes a blossom/flower.
    'Blossom' better preserves the vivid, fresh imagery in parallel with the Greek
    ἄνθος while remaining natural English.
- source_word: לְבָנוֹן
  chosen: of Lebanon
  alternatives:
  - from Lebanon
  lexicon: HALOT
  rationale: The construct phrase פֶּרַח לְבָנוֹן is rendered 'a blossom of Lebanon,'
    preserving the poetic association with Lebanon's famed vegetation. 'Of' is more
    literal and suitably poetic here than 'from.'
- source_word: בִּימֵי קָיִץ
  chosen: in the days of summer
  alternatives:
  - in summertime
  - in the days of heat
  lexicon: HALOT
  rationale: בִּימֵי is literally 'in the days of,' and קַיִץ denotes summer. The
    fuller phrase keeps the Hebrew poetic cadence and matches the comparative sequence
    of the verse.
- source_word: וּכְאֵשׁ
  chosen: and like a fire
  alternatives:
  - and like fire
  lexicon: HALOT
  rationale: The Hebrew includes the noun with prefixed comparison. 'Like a fire'
    preserves the concrete image rather than making it more abstract.
- source_word: לְבוֹנָה
  chosen: of frankincense
  alternatives:
  - incense
  lexicon: HALOT
  rationale: לְבוֹנָה specifically denotes frankincense, not incense in general. The
    more precise rendering preserves cultic specificity.
- source_word: עַל הַמִּנְחָה
  chosen: upon the grain offering
  alternatives:
  - upon the offering
  - over the cereal offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly refers to the grain offering.
    'Grain offering' is clear modern English and preserves the cultic reference better
    than the generic 'offering.'
