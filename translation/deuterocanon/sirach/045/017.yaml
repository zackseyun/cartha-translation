translation:
  text: And he gave him his commandments, and granted him authority in statute and
    judgment, to teach Jacob his testimonies and to enlighten Israel with his law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Cairo Geniza Hebrew for this verse is shorter: ''He gave him
      his commandments, and granted him authority in statute and judgment.'' The clauses
      ''to teach Jacob his testimonies and to enlighten Israel with his law'' are
      supported by the Greek witness and are included here because the Hebrew line
      appears abbreviated.'
    reason: textual_variant
lexical_decisions:
- source_word: ויתן לו מצותיו
  chosen: He gave him his commandments
  alternatives:
  - He entrusted to him his commandments
  - He gave him his commands
  lexicon: HALOT
  rationale: The Hebrew clause straightforwardly states that God gave Aaron 'his commandments.'
    'Commandments' preserves the covenantal/legal force better than the more generic
    'commands.' 'Entrusted' is interpretive and not required by נתן.
- source_word: וימשילהו
  chosen: and granted him authority
  alternatives:
  - and made him ruler
  - and gave him dominion
  lexicon: HALOT
  rationale: The Hifil of משל can mean to cause to rule or give dominion. In this
    context of priestly/legal commission, 'granted him authority' best captures delegated
    jurisdiction without implying kingship.
- source_word: בחוק ומשפט
  chosen: in statute and judgment
  alternatives:
  - over statute and judgment
  - in law and justice
  - in statute and ordinance
  lexicon: HALOT
  rationale: The Hebrew pair חוק ומשפט is legal-covenantal language. 'Statute and
    judgment' keeps the formal legal texture. The preposition ב is somewhat compressed;
    'in' is retained, though the sense is delegated authority within this legal sphere.
- source_word: ἐξουσίαν ἐν διαθήκαις κριμάτων
  chosen: authority in statute and judgment
  alternatives:
  - authority in covenants of judgments
  - authority in legal covenants
  lexicon: BDAG
  rationale: The Greek parallel expands the Hebrew and supports the sense of delegated
    legal authority. I did not import the full Greek expansion into the first half
    beyond what clarifies the Hebrew, but it confirms 'authority' for וימשילהו.
- source_word: διδάξαι τὸν Ἰακὼβ τὰ μαρτύρια
  chosen: to teach Jacob his testimonies
  alternatives:
  - to instruct Jacob in his decrees
  - to teach Jacob the testimonies
  lexicon: BDAG
  rationale: This infinitival purpose clause appears in the Greek parallel though
    absent from the extant Hebrew line. Because the Zone 1 Hebrew is marked major_mismatch
    and the Greek is supplied as actual translation input, the fuller line is included.
    'Testimonies' is a standard rendering for μαρτύρια in legal/covenantal contexts.
- source_word: καὶ ἐν νόμῳ αὐτοῦ φωτῖσαι Ἰσραήλ
  chosen: and to enlighten Israel with his law
  alternatives:
  - and to give light to Israel by his law
  - and to illumine Israel in his law
  lexicon: BDAG
  rationale: The Greek parallel presents Aaron's didactic role. 'Enlighten' is idiomatic
    modern English while preserving the metaphor of φωτίζω. 'With his law' expresses
    instrumentality clearly.
