theological_decisions:
- issue: Use of Hebrew vs. fuller Greek parallel in a verse marked major_mismatch
  chosen_reading: Main text follows the extant Hebrew wording, with the Greek expansion
    preserved in a footnote.
  alternative_readings:
  - Translate the fuller Greek as the main text
  - Conflate Hebrew and Greek into a harmonized sentence
  rationale: The translation policy gives primacy to the Hebrew witness for Sirach
    where it survives, but the Greek parallel must still be treated as real translation
    input. Here the Greek adds incense, memorial language, and atonement for the people.
    Because these are absent from the Hebrew witness supplied in Zone 1, importing
    them into the main line would exceed the Hebrew text; omitting them entirely would
    hide a significant source divergence. Therefore the Hebrew governs and the Greek
    expansion is footnoted transparently.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly'
