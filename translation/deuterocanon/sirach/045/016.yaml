    reason: textual_variant
lexical_decisions:
- source_word: לשרת
  chosen: to minister
  alternatives:
  - to serve
  lexicon: HALOT
  rationale: The verb denotes service in a sacred context here. 'Minister' preserves
    the cultic nuance better than a generic 'serve,' especially alongside the following
    priestly verb.
- source_word: ולכהן
  chosen: to serve as priest
  alternatives:
  - to act as priest
  - to officiate as priest
  lexicon: HALOT
  rationale: The piel/denominative sense from כהן is specifically priestly service.
    'Serve as priest' is clear modern English and keeps the office explicit.
- source_word: ולברך את עמו בשמו
  chosen: and to bless his people in his name
  alternatives:
  - and to bless his people by his name
  - and to pronounce blessing on his people in his name
  lexicon: HALOT
  rationale: The Hebrew straightforwardly expresses blessing the people under or by
    God's name. 'In his name' is idiomatic and preserves the covenantal-liturgical
    sense.
- source_word: ויבחר בו מכל חי
  chosen: He chose him from among all the living
  alternatives:
  - He chose him out of every living thing
  - He selected him from all flesh
  lexicon: HALOT
  rationale: מכל חי literally means 'from all living [beings].' In context it contrasts
    Aaron with all other humans; 'from among all the living' preserves the breadth
    without over-specifying 'men' where the Hebrew is broader.
- source_word: להגיש
  chosen: to present
  alternatives:
  - to bring near
  - to offer
  lexicon: HALOT
  rationale: In sacrificial context the verb means to bring/present an offering. 'Present'
    is slightly more formal and leaves room for the following objects to define the
    sacrificial action.
- source_word: עלה
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  lexicon: HALOT
  rationale: עלה is the standard sacrificial term for the offering wholly burned.
    'Burnt offering' is the established and accurate English equivalent.
- source_word: וחלבים
  chosen: fat portions
  alternatives:
  - fat
  - choice fat pieces
  lexicon: HALOT
  rationale: The plural refers to the sacrificial fat parts offered on the altar.
    'Fat portions' communicates the technical cultic sense better than bare 'fat.'
- source_word: προσαγαγεῖν κάρπωσιν Κυρίῳ, θυμίαμα καὶ εὐωδίαν εἰς μνημόσυνον, ἐξιλάσκεσθαι
    περὶ τοῦ λαοῦ σου
  chosen: not adopted in main text; preserved as a fuller Greek parallel
  alternatives:
  - to offer an offering to the Lord, incense and a pleasing aroma as a memorial,
    to make atonement for your people
  lexicon: BDAG
  rationale: The Greek parallel is substantially fuller than the surviving Hebrew
    and likely reflects either a longer Vorlage or expansion. Because the project
    prioritizes the extant Hebrew for Sirach where it survives, the shorter Hebrew
    governs the main text, while the Greek's additional sacrificial details are preserved
    in a footnote due to the source-level mismatch.
