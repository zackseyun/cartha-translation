theological_decisions:
- issue: Scope of the covenant promise in a priestly context
  chosen_reading: The covenant is stated as belonging to Aaron and his offspring in
    enduring terms, without importing later doctrinal claims about unconditional perpetuity
    beyond the verse's wording.
  alternative_readings:
  - A stronger claim of absolute perpetual priesthood
  - A reduced reading limited only to Aaron's lifetime
  rationale: The Hebrew and Greek both present an enduring covenantal grant tied to
    Aaron and his descendants. The translation preserves that force while avoiding
    theological expansion beyond the text itself.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; never import doctrinal claims the text does not make.'
- issue: Use of dynamic rendering for the idiom 'fill the hand'
  chosen_reading: Translate the idiom as 'ordained him' in the main text.
  alternative_readings:
  - filled his hand
  - installed him
  - consecrated him
  rationale: The phrase is a technical ordination idiom, not a statement about literal
    hands. Optimal equivalence favors a clear English rendering in the text, while
    preserving the literal alternative in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; consistency of key terms,
    or documented exception.'
