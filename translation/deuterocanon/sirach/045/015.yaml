translation:
  text: Moses ordained him and anointed him with holy oil. It became for him an everlasting
    covenant, and for his offspring, for as long as the heavens endure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'filled his hand,' a priestly idiom for installing or
      ordaining someone to office; the Greek likewise reads 'filled the hands.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'as the days of heaven'; this idiom expresses enduring
      duration.
    reason: lexical_alternative
  - marker: c
    text: 'The Greek parallel continues beyond the extant Hebrew here: ''to minister
      to him and to serve as priest, and to bless his people in his name.'' The main
      translation follows the surviving Hebrew as the primary witness.'
    reason: alternative_reading
lexical_decisions:
- source_word: וימלא ... את ידו
  chosen: ordained him
  alternatives:
  - filled his hand
  - installed him
  - consecrated him
  lexicon: HALOT
  rationale: The Hebrew idiom 'fill the hand' is a technical expression for installation
    into priestly office. A literal rendering would be opaque in English. 'Ordained
    him' best conveys the cultic commissioning in readable modern English, while the
    Greek parallel ἐπλήρωσεν ... τὰς χεῖρας confirms the underlying idiom.
- source_word: וימשחהו
  chosen: anointed him
  alternatives:
  - consecrated him by anointing
  lexicon: HALOT
  rationale: The verb משח plainly denotes anointing. 'Anointed him' preserves the
    ritual action directly and matches the Greek ἔχρισεν.
- source_word: בשמן הקדש
  chosen: with holy oil
  alternatives:
  - with the holy oil
  - with sacred oil
  lexicon: HALOT
  rationale: The Hebrew phrase is straightforward. 'Holy oil' is concise and natural;
    the article is not required in English to convey the ritual substance. The Greek
    ἐν ἐλαίῳ ἁγίῳ supports this sense.
- source_word: ברית עולם
  chosen: an everlasting covenant
  alternatives:
  - an eternal covenant
  - a perpetual covenant
  lexicon: HALOT
  rationale: This phrase commonly denotes enduring covenantal permanence. 'Everlasting
    covenant' is idiomatic biblical English without being archaic, and aligns with
    the Greek διαθήκην αἰώνιον.
- source_word: ולזרעו
  chosen: and for his offspring
  alternatives:
  - and for his seed
  - and for his descendants
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular sense of זרע in natural
    English. ''Seed'' would be more formal but less clear to modern readers.'
- source_word: כימי שמים
  chosen: for as long as the heavens endure
  alternatives:
  - as the days of heaven
  - for the days of heaven
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'as the days of heaven.' In English,
    'for as long as the heavens endure' communicates the temporal force clearly while
    preserving the cosmic-duration imagery. The Greek ἐν ἡμέραις οὐρανοῦ reflects
    the same idiom.
