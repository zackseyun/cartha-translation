translation:
  text: Beloved by God and men was Moses, whose memory is for blessing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'his memory is for good.' The Greek parallel reads 'whose
      memorial is in blessings,' which supports the idiomatic sense 'whose memory
      is for blessing.'
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel for this verse is longer, adding that God 'brought forth
      from him a man of mercy, finding favor in the eyes of all flesh' before naming
      Moses. Those words are not present in the supplied Hebrew witness.
    reason: textual_variant
  - marker: c
    text: Hebrew 'men'; Greek has a broader term meaning 'people' or 'human beings.'
    reason: alternative_reading
lexical_decisions:
- source_word: אהוב
  chosen: Beloved
  alternatives:
  - loved
  - dear
  lexicon: HALOT
  rationale: The passive/adjectival sense 'beloved' best matches the Hebrew predicate
    and aligns with the Greek ἠγαπημένον. It preserves the honorific tone better than
    the flatter 'loved'.
- source_word: אלהים
  chosen: God
  alternatives:
  - God/gods
  lexicon: HALOT
  rationale: In this singular reverential context with Moses, the referent is clearly
    the God of Israel, so 'God' is the natural English rendering.
- source_word: ואנשים
  chosen: and men
  alternatives:
  - and people
  - and humans
  lexicon: HALOT
  rationale: The Hebrew literally says 'and men/people.' Following the project's gender-accurate
    policy, 'men' is retained because the source uses the masculine plural אדם/אנשים
    form rather than a more explicitly neutral expression. The Greek parallel has
    ἀνθρώπων ('human beings, people'), which could support 'people,' but the Hebrew
    witness is primary here.
- source_word: משה
  chosen: Moses
  rationale: Standard English transliteration of the personal name משה.
- source_word: זכרו
  chosen: whose memory
  alternatives:
  - his remembrance
  - his memorial
  lexicon: HALOT
  rationale: The construct-like pronominal form is most idiomatically rendered 'whose
    memory' in English. This also resonates with the Greek μνημόσυνον while remaining
    natural.
- source_word: לטובה
  chosen: is for blessing
  alternatives:
  - for good
  - for a blessing
  - for good remembrance
  lexicon: HALOT
  rationale: Although literally 'for good,' in commemorative contexts the idiom points
    to blessed remembrance. The Greek parallel expands interpretively to ἐν εὐλογίαις
    ('in blessings'), supporting an English rendering that makes the idiom clear rather
    than leaving the opaque 'for good.'
