translation:
  text: He clothed him with splendor and attended him with his glory; he girded him
    with the horns of a wild ox and clothed him with bells.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''He established for him an everlasting covenant, and gave
      him the priesthood of the people; he blessed him with adornment, and girded
      him with a robe of glory.'' The Hebrew witness here differs substantially from
      the Greek.'
    reason: alternative_reading
  - marker: b
    text: Or possibly 'with the lofty strength of a wild ox.' The Hebrew phrase is
      difficult, and the image may be metaphorical rather than describing literal
      horned ornamentation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוד
  chosen: splendor
  alternatives:
  - majesty
  - honor
  - glory
  lexicon: HALOT
  rationale: הוד commonly denotes visible majesty or splendor. 'Splendor' fits the
    clothing/investiture imagery and avoids collapsing it into the following כבוד/δόξα
    term.
- source_word: וישרתהו
  chosen: attended him
  alternatives:
  - ministered to him
  - served him
  lexicon: HALOT
  rationale: From שרת, 'to minister/serve.' With God as subject and Aaron as object
    in an investiture context, 'attended him' conveys bestowed honor without implying
    subordination of God in awkward English. The Hebrew is somewhat unusual here,
    and the Greek parallel instead has 'blessed him/adorned him,' so a footnote preserves
    that alternative trajectory.
- source_word: בכבודו
  chosen: with his glory
  alternatives:
  - with honor
  - in his glory
  - with his majesty
  lexicon: HALOT
  rationale: כבוד here likely denotes honor/glory bestowed by God. 'With his glory'
    preserves the possessive suffix and the elevated register of priestly investiture.
- source_word: ויאזרהו
  chosen: he girded him
  alternatives:
  - belted him
  - bound him around
  lexicon: HALOT
  rationale: אזר in clothing contexts means to gird or belt. 'Girded' is slightly
    formal but natural in ceremonial dress language.
- source_word: בתועפות ראם
  chosen: with the horns of a wild ox
  alternatives:
  - with lofty strength of a wild ox
  - with exalted might
  - with wild-ox strength
  lexicon: HALOT
  rationale: The Hebrew phrase is difficult. תועפות can denote horns or exalted strength;
    ראם is the wild ox. Given the concrete vesting imagery and the likely metaphor
    of strength/exaltation, the main text keeps the vivid literal image, while a footnote
    preserves the more idiomatic sense 'wild-ox strength.'
- source_word: וילבישהו פעמונים
  chosen: clothed him with bells
  alternatives:
  - put bells on him
  - arrayed him with bells
  lexicon: HALOT
  rationale: פעמונים are bells, matching priestly vestment imagery. 'Clothed him with
    bells' stays close to the Hebrew and suits the sequence of investiture actions.
