theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  - Yahweh
  rationale: The project default for YHWH is 'the LORD.' This verse is in Sirach's
    Hebrew witness, but the immediate line is a liturgical exhortation where standard
    English prayer diction reads naturally with 'the Lord.' The default alternative
    is preserved in documentation because this is a doctrinally significant term.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Relationship between Hebrew and Greek witnesses
  chosen_reading: Main text follows the extant Hebrew exhortation; Greek parallel
    preserved as an alternative/textual note
  alternative_readings:
  - Translate the Greek as the main text
  - Conflate Hebrew exhortation with Greek benediction
  rationale: The Hebrew witness is extant and high-confidence, so it has primacy.
    The Greek, however, is substantially different and therefore materially relevant;
    preserving it in a footnote maintains transparency without conflating distinct
    textual forms.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy and transparent documentation'
