theological_decisions:
- issue: Reference point of the engraved stones
  chosen_reading: The stones memorialize Israel by bearing engraved names corresponding
    to Israel's sons/tribes.
  alternative_readings:
  - The verse may be read more generally as describing luxurious craftsmanship without
    emphasizing covenant memorial symbolism.
  rationale: Both Hebrew לזכרון and Greek εἰς μνημόσυνον make the memorial/covenantal
    function explicit, so the translation preserves that cultic significance without
    expanding beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
