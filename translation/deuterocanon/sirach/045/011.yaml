translation:
  text: precious stones upon the breastpiece, engraved like a seal in their settings—every
    precious stone as a memorial, engraved with writing according to the number of
    the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''according to the number of the tribes of Israel.'' The Hebrew
      witness reads ''sons of Israel,'' likely pointing to the tribal names represented
      on the stones.'
    reason: alternative_reading
  - marker: b
    text: The Greek explicitly mentions a gold mounting ('in a setting of gold'),
      while the Hebrew here only implies mounted settings.
    reason: textual_variant
lexical_decisions:
- source_word: אבני חפץ
  chosen: precious stones
  alternatives:
  - stones of delight
  - choice stones
  - desirable stones
  lexicon: HALOT
  rationale: The Hebrew phrase denotes highly valued stones; 'precious stones' is
    idiomatic English and fits the priestly-jewel context. The Greek πολυτελέσιν likewise
    supports the sense of costly/precious stones.
- source_word: החשן
  chosen: the breastpiece
  alternatives:
  - the breastplate
  lexicon: HALOT
  rationale: In priestly vestment contexts, חשן refers to the high priest's jeweled
    chest-piece. 'Breastpiece' is clearer modern English than 'breastplate' and avoids
    implying armor, while still matching Exodus usage.
- source_word: פתוחי חותם
  chosen: engraved like a seal
  alternatives:
  - seal engravings
  - engraved with a seal engraving
  - cut as a signet
  lexicon: HALOT
  rationale: The phrase describes the style of engraving, comparable to signet/seal
    cutting. The Greek γλύμματος σφραγῖδος confirms seal-style engraving. 'Engraved
    like a seal' is natural and preserves the comparison.
- source_word: במלואים
  chosen: in their settings
  alternatives:
  - in fillings
  - in mountings
  - set in place
  lexicon: HALOT
  rationale: In the context of gemstones on priestly attire, the term refers to mounted
    settings rather than a literal 'filling.' The Greek ἐν δέσει χρυσίου points toward
    mounted fastening, likely gold settings; the Hebrew alone does not explicitly
    state 'gold,' so 'in their settings' is the best restrained rendering.
- source_word: לזכרון
  chosen: as a memorial
  alternatives:
  - for remembrance
  - as a reminder
  lexicon: HALOT
  rationale: The term carries cultic-remembrance force. 'As a memorial' preserves
    that formal sense and aligns with the Greek εἰς μνημόσυνον.
- source_word: בכתב חרות
  chosen: with writing engraved
  alternatives:
  - with engraved inscription
  - inscribed in writing
  lexicon: HALOT
  rationale: The Hebrew emphasizes inscription by engraving. The Greek ἐν γραφῇ κεκολαμμένῃ
    similarly combines writing and carving. 'With writing engraved' keeps both elements
    visible.
- source_word: למספר בני ישראל
  chosen: according to the number of the sons of Israel
  alternatives:
  - according to the number of the tribes of Israel
  - for the number of the sons of Israel
  lexicon: HALOT
  rationale: The Hebrew witness reads 'sons of Israel,' while the Greek has 'tribes
    of Israel.' Since the Hebrew is the primary witness where extant, the main text
    follows it. Because the referent is the tribal enumeration, the Greek alternative
    is preserved in a footnote.
