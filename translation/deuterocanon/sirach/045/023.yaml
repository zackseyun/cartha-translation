translation:
  text: And Phinehas son of Eleazar inherited a third place in might, because he was
    zealous for the God of all and stood in the breach for his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''third in glory,'' where the Hebrew reads ''inherited a third place
      in might/valor.'' The Hebrew witness is followed here, with the Greek kept in
      view as a notable alternative nuance of honor.'
    reason: textual_variant
  - marker: b
    text: '''Stood in the breach'' is a Hebrew idiom for stepping in at a moment of
      communal danger, with intercessory or protective force.'
    reason: cultural_note
  - marker: c
    text: The Greek continues, 'and he made atonement for Israel,' an expansion not
      present in the extant Hebrew here.
    reason: textual_variant
lexical_decisions:
- source_word: נחל שלישי
  chosen: inherited a third place
  alternatives:
  - received third rank
  - was third in succession
  - obtained a third share
  lexicon: HALOT
  rationale: The Hebrew literally combines 'inherited/received' with 'third.' In context,
    after praise of earlier priestly figures, it most naturally indicates rank or
    place of honor rather than a literal land inheritance. 'Inherited a third place'
    preserves the metaphor while remaining readable. The Greek τρίτος εἰς δόξαν supports
    an honor-ranking sense.
- source_word: בגבורה
  chosen: in might
  alternatives:
  - in valor
  - for heroism
  - in glory
  lexicon: HALOT
  rationale: The Hebrew points to strength/valor. 'In might' keeps the concise Hebrew
    sense. The Greek has εἰς δόξαν ('for glory/to glory'), which reflects either an
    interpretive rendering or variant Vorlage; the Hebrew witness is primary here,
    so the translation follows the Hebrew while preserving the Greek-based alternative
    in a footnote.
- source_word: בקנאו
  chosen: because he was zealous
  alternatives:
  - when he was zealous
  - in his zeal
  - because he acted zealously
  lexicon: HALOT
  rationale: The infinitive/construct form with prefixed preposition gives the causal
    circumstance for his honor. 'Because he was zealous' makes the causal force clear
    in natural English.
- source_word: לאלוה כל
  chosen: for the God of all
  alternatives:
  - for God Most High
  - for God over all
  - for the God of everyone
  lexicon: HALOT
  rationale: The Hebrew literally reads 'for the God of all.' This is a distinctive
    title and should be preserved rather than assimilated to a more familiar liturgical
    phrase. It expresses universal divine sovereignty without importing later doctrinal
    language.
- source_word: ויעמוד בפרץ
  chosen: stood in the breach
  alternatives:
  - stood in the gap
  - intervened at the breaking point
  lexicon: HALOT
  rationale: This is a well-established Hebrew idiom for interceding or acting decisively
    in a crisis. 'Stood in the breach' is both accurate and intelligible, and it preserves
    the metaphor better than a flattened paraphrase.
- source_word: עמו
  chosen: for his people
  alternatives:
  - for his nation
  - for his kinsmen
  - his people
  lexicon: HALOT
  rationale: With the idiom 'stood in the breach,' English commonly requires an explicit
    relational phrase. 'For his people' conveys representative action on behalf of
    Israel. The Greek likewise points to the people/Israel context.
