lexical_decisions:
- source_word: הוד
  chosen: splendor
  alternatives:
  - majesty
  - beauty
  - glory
  lexicon: HALOT
  rationale: הוד commonly denotes splendor or majesty. 'Splendor' fits the poetic
    sequence and avoids collapsing it into the following כבוד ('glory').
- source_word: כבוד
  chosen: glory
  alternatives:
  - honor
  lexicon: HALOT
  rationale: כבוד regularly means 'glory' or 'honor.' Here 'glory' preserves the elevated
    poetic register and pairs naturally with הוד.
- source_word: ותהלת עז
  chosen: and praise of strength
  alternatives:
  - and renown of might
  - and glory of power
  lexicon: HALOT
  rationale: תהלה is 'praise' and עז is 'strength/might.' The construct is somewhat
    compressed; 'praise of strength' stays close to the Hebrew while remaining intelligible.
    The Greek καύχημα τιμῆς, ἔργον ἰσχύος reflects a somewhat different expansion,
    but the Hebrew witness is primary here.
- source_word: מחמד עין
  chosen: delight of the eyes
  alternatives:
  - desire of the eyes
  - loveliness to behold
  lexicon: HALOT
  rationale: מחמד denotes something desirable or delightful; with עין the idiom points
    to visual attractiveness. 'Delight of the eyes' is natural English and remains
    close to the Hebrew.
- source_word: ומכלל יופי
  chosen: and perfection of beauty
  alternatives:
  - and consummation of beauty
  - and complete beauty
  - and pattern of beauty
  lexicon: HALOT
  rationale: מכלל can denote completeness, perfection, or full measure. In this poetic
    description of priestly adornment, 'perfection of beauty' best conveys the superlative
    sense. The Greek κοσμούμενα suggests adornment, which supports a beauty-focused
    rendering, though the Hebrew wording is retained.
