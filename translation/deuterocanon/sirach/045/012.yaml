translation:
  text: splendor of glory and praise of strength, delight of the eyes and perfection
    of beauty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''a boast of honor, a work of strength, adornments desired
      by the eyes.'' The Hebrew witness here differs notably in wording, though both
      describe the high priestly ornaments in exalted terms.'
