translation:
  text: He gave him the choicest holy bread; they shall eat the food offerings of Yahweh. The bread of the Presence is his portion, a gift to him and to his offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the first of the holy things he gave him as bread.' The Hebrew wording is compressed, and the Greek parallel broadens the sense to priestly sacrificial portions.
    reason: lexical_alternative
  - marker: b
    text: '''Food offerings'' renders the Hebrew term often translated ''offerings by fire.'''
    reason: lexical_alternative
  - marker: c
    text: '''Bread of the Presence'' is the sacred bread traditionally called ''showbread.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ראשית קדש
  chosen: the choicest holy bread
  alternatives:
  - the first of the holy things
  - the firstfruits of holiness
  - the chief holy portion
  lexicon: HALOT
  rationale: The Hebrew phrase literally suggests the foremost/first of sacred things. In context, with לחם immediately following and the Greek parallel speaking of sacrifices/offerings given for priestly consumption, an idiomatic rendering that makes explicit the edible sacred portion is warranted. 'Choicest holy bread' preserves both priority and sanctity while fitting the immediate syntax.
- source_word: לחם
  chosen: bread
  alternatives:
  - food
  - portion
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'bread.' Although the Greek broadens to 'sacrifices of the Lord,' the Hebrew witness should govern where extant. 'Bread' is retained in both cola, with the first occurrence slightly expanded by context.
- source_word: אשי יהוה
  chosen: the food offerings of the LORD
  alternatives:
  - the offerings by fire of the LORD
  - the LORD's fire offerings
  lexicon: HALOT
  rationale: This standard sacrificial term refers to offerings made by fire. In contemporary English, 'food offerings' communicates the cultic category more naturally while remaining close to the Hebrew sense. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: יאכלון
  chosen: they shall eat
  alternatives:
  - they eat
  - they may eat
  lexicon: HALOT
  rationale: The plural verb naturally refers to the priestly beneficiaries (Aaron and his line) rather than Aaron alone. Future/modal force fits the legal-priestly context.
- source_word: לחם פנים
  chosen: the bread of the Presence
  alternatives:
  - the showbread
  - the bread set before him
  - the bread before the face
  lexicon: HALOT
  rationale: This is the standard cultic expression for the sacred bread set before God. 'Bread of the Presence' is transparent, modern, and more source-near than the traditional but opaque 'showbread.'
- source_word: חלקו
  chosen: is his portion
  alternatives:
  - was his share
  - belongs to him as a share
  lexicon: HALOT
  rationale: The noun denotes an allotted share or portion. 'Is his portion' is concise and idiomatic in English.
- source_word: ומתנה לו ולזרעו
  chosen: a gift to him and to his offspring
  alternatives:
  - and a gift for him and his seed
  - and a present to him and his descendants
  lexicon: HALOT
  rationale: מתנה denotes a gift/grant; זרעו here refers to priestly descendants. 'Offspring' is natural modern English and preserves the familial line without over-specifying.
- source_word: τῷ σπέρματι αὐτοῦ
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: BDAG
  rationale: The Greek parallel confirms that the beneficiaries extend to Aaron's line. This supports rendering זרעו as a continuing lineage term rather than a singular child reference.
