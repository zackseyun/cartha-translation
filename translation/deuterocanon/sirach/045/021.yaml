theological_decisions:
- issue: Divine name rendering
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic terminology for priestly portions
  chosen_reading: bread of the Presence / food offerings
  alternative_readings:
  - showbread / offerings by fire
  rationale: The verse concerns Aaronic priestly rights to sacred provisions. The chosen renderings preserve the sacrificial and tabernacle context while using accessible modern English. Traditional alternatives are preserved in footnotes because they remain recognizable and more formally literal in places.
  doctrine_reference: DOCTRINE.md translation philosophy §§5–6
