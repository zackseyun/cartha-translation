theological_decisions:
- issue: Hebrew-Greek divergence in the content of the covenant promise
  chosen_reading: Translate the extant Hebrew main line ('a statute, an everlasting
    covenant, to sustain the sanctuary') while preserving the Greek expansion about
    a covenant of peace and perpetual priesthood in a footnote.
  alternative_readings:
  - 'Greek: ''a covenant of peace,'' with Phinehas as guardian of the holy things
    and with a perpetual priesthood for him and his offspring'
  rationale: For Sirach, where Hebrew survives, the project gives primacy to the Hebrew
    witness. Here the Greek parallel is substantially fuller and interpretively significant,
    but the main text should remain anchored in the Hebrew. Because the divergence
    materially affects how readers understand the promise to Phinehas, the Greek reading
    is preserved in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly'
