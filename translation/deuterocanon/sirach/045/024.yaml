translation:
  text: Therefore he also established for him a statute, an everlasting covenant,
    to sustain the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[a]'
    text: 'Greek parallel: ''Therefore a covenant of peace was established for him,
      as guardian of the holy things and for his people, so that the dignity of the
      priesthood might belong to him and to his offspring forever.'' The Hebrew witness
      here is shorter and focuses on a statute and everlasting covenant to sustain
      the sanctuary.'
    reason: alternative_reading
lexical_decisions:
- source_word: לכן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks the consequence of Phinehas's zealous action in the preceding line;
    'Therefore' preserves the causal connection clearly.
- source_word: גם לו
  chosen: he also established for him
  alternatives:
  - for him too he prepared
  - he appointed also for him
  lexicon: HALOT
  rationale: The Hebrew indicates that something was prepared/established specifically
    for Phinehas as a further result. 'Established for him' is idiomatic English and
    fits covenantal/legal context.
- source_word: הכין
  chosen: established
  alternatives:
  - prepared
  - appointed
  - made ready
  lexicon: HALOT
  rationale: Although the verb can mean 'prepare,' in context of חק and covenant language
    'established' better conveys the conferral of a lasting ordinance. The Greek ἐστάθη
    supports a sense of being set/established.
- source_word: חק
  chosen: a statute
  alternatives:
  - a decree
  - an ordinance
  - a due
  lexicon: HALOT
  rationale: חק commonly denotes a fixed statute or prescribed due. 'Statute' preserves
    the legal-covenantal force without overinterpreting it as merely a priestly stipend.
- source_word: ברית עולם
  chosen: an everlasting covenant
  alternatives:
  - an eternal covenant
  - a perpetual covenant
  lexicon: HALOT
  rationale: This is standard covenant language. 'Everlasting covenant' is natural
    English and preserves the enduring force of עולם.
- source_word: לכלכל
  chosen: to sustain
  alternatives:
  - to provide for
  - to maintain
  - to support
  lexicon: HALOT
  rationale: The Hebrew verb can mean to sustain or provide for. In relation to the
    sanctuary, 'to sustain' captures ongoing support/maintenance. The Greek parallel
    expands toward priestly guardianship, but the Hebrew wording is more directly
    about sustaining the sanctuary.
- source_word: מקדש
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple
  lexicon: HALOT
  rationale: '''Sanctuary'' is broad enough to fit the sacred precinct without anachronistically
    narrowing to the later temple building alone. It also matches the cultic register
    of the verse.'
