translation:
  text: He let him hear his voice, and brought him near into the dark cloud. He placed
    in his hand the commandment, a law of life and understanding, to teach Jacob his
    statutes, and Israel his testimonies and judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''commandments'' instead of ''the commandment.'''
    reason: textual_variant
  - marker: b
    text: Greek reads 'to teach Jacob the covenant, and Israel his judgments' where
      the Hebrew reads 'his statutes ... his testimonies and judgments.'
    reason: alternative_reading
lexical_decisions:
- source_word: וישמיעהו את קולו
  chosen: He let him hear his voice
  alternatives:
  - He made him hear his voice
  - He caused him to hear his voice
  lexicon: HALOT
  rationale: The Hiphil of שמע conveys causation ('cause to hear'). 'Let him hear'
    is idiomatic modern English while preserving the sense that God granted Moses
    auditory access to the divine voice.
- source_word: ויגישהו לערפל
  chosen: brought him near into the dark cloud
  alternatives:
  - brought him into the gloom
  - led him into the thick darkness
  lexicon: HALOT
  rationale: The Hebrew verb נגש in Hiphil means 'bring near.' ערפל denotes dense
    darkness/cloud associated with divine manifestation. The Greek γνόφος supports
    a theophanic 'dark cloud/gloom' sense. 'Brought him near into the dark cloud'
    preserves both approach and setting.
- source_word: מצוה
  chosen: the commandment
  alternatives:
  - commandment
  - command
  lexicon: HALOT
  rationale: The singular is retained in Hebrew, though the Greek has plural ἐντολάς.
    Because the primary witness is Hebrew, the main text keeps the singular. The article
    in English reflects the concrete giving of divine instruction at Sinai.
- source_word: תורת חיים ותבונה
  chosen: a law of life and understanding
  alternatives:
  - the law of life and knowledge
  - instruction for life and understanding
  lexicon: HALOT
  rationale: תורה can mean law or instruction; here, in parallel with מצוה and in
    Sinai context, 'law' is appropriate. תבונה is 'understanding/discernment.' The
    Greek ἐπιστήμη suggests cognitive understanding/knowledge; 'understanding' fits
    the Hebrew more naturally while remaining broad enough.
- source_word: ללמד ביעקב חוקיו
  chosen: to teach Jacob his statutes
  alternatives:
  - to teach in Jacob his statutes
  - to teach Jacob his decrees
  lexicon: HALOT
  rationale: The infinitive expresses purpose. חוקים are fixed statutes/decrees; 'statutes'
    is a standard and suitably formal rendering. The preposition ב with Jacob is idiomatically
    rendered as the object of teaching in English.
- source_word: ועדותיו ומשפטיו לישראל
  chosen: and Israel his testimonies and judgments
  alternatives:
  - and Israel his covenant decrees and judgments
  - and Israel his testimonies and ordinances
  lexicon: HALOT
  rationale: עדות often denotes testimonies/covenant witness; משפטים are judgments/ordinances.
    'Judgments' keeps the juridical force and aligns with the Hebrew. The Greek διαθήκην
    appears to reflect a different reading or interpretive rendering for עדותיו; this
    is preserved in a footnote rather than adopted over the Hebrew.
