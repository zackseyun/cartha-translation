theological_decisions:
- issue: Theophanic imagery of ערפל
  chosen_reading: dark cloud
  alternative_readings:
  - thick darkness
  - gloom
  rationale: The term refers to the dark, concealed setting of divine revelation at
    Sinai. 'Dark cloud' communicates both darkness and cloudlike theophanic presence
    in accessible English without overinterpreting the image.
  doctrine_reference: 'Translation philosophy: readable modern English; preserve theological
    tension rather than resolve it'
- issue: Hebrew-Greek divergence in the legal terms
  chosen_reading: the commandment ... a law of life and understanding ... his testimonies
    and judgments
  alternative_readings:
  - commandments ... covenant and judgments
  rationale: 'The Hebrew witness is primary where extant, but the Greek parallel is
    a real translation input and shows notable variation: plural ''commandments''
    and ''covenant'' where Hebrew has singular ''commandment'' and ''testimonies.''
    Because the Hebrew is high-confidence and coherent, the main text follows it while
    preserving the Greek-supported alternatives in footnotes.'
  doctrine_reference: Original-language primacy over translation tradition; for Sirach,
    translate from Hebrew where it survives and use Greek in view
