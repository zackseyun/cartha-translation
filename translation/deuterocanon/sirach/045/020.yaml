lexical_decisions:
- source_word: ויוסף
  chosen: and he added
  alternatives:
  - and he increased
  - and he bestowed further
  lexicon: HALOT
  rationale: The Hebrew verb יסף in the hiphil commonly means 'add' or 'increase.'
    'Added' preserves the verbal image and matches the Greek προσέθηκεν closely.
- source_word: לאהרן
  chosen: to Aaron
  rationale: Proper name transliterated in standard English form per project philosophy.
- source_word: כבודו
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: Hebrew כבוד can mean 'honor' or 'glory.' Here, in the context of Aaron's
    elevated priestly status and with Greek δόξαν, 'honor' is the more natural modern
    English rendering while still preserving dignity and status.
- source_word: ויתן לו
  chosen: and gave him
  alternatives:
  - and granted him
  lexicon: HALOT
  rationale: A straightforward rendering of נתן with indirect object; 'gave' is simple
    and sufficiently formal.
- source_word: נחלתו
  chosen: his inheritance
  alternatives:
  - his portion
  - his allotted share
  lexicon: HALOT
  rationale: נחלה denotes an inheritance or allotted possession. 'Inheritance' best
    preserves the covenantal and cultic nuance, though the immediate sense is an assigned
    priestly portion.
- source_word: κληρονομίαν
  chosen: inheritance
  alternatives:
  - portion
  lexicon: BDAG
  rationale: The Greek parallel confirms the inheritance/portion sense and supports
    the Hebrew reading despite source-level mismatch notes.
