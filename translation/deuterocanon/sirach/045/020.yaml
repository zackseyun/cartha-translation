theological_decisions:
- issue: Nature of Aaron's 'inheritance'
  chosen_reading: his inheritance
  alternative_readings:
  - his allotted portion
  rationale: The text speaks of Aaron's divinely assigned priestly share, not necessarily
    landed property. 'Inheritance' preserves the biblical-theological resonance while
    allowing the cultic sense to remain implicit.
