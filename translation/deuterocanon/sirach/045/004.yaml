theological_decisions:
- issue: Rendering of אמונה / πίστις in a commendation of Moses
  chosen_reading: faithfulness
  alternative_readings:
  - faith
  rationale: The project default for πίστις is 'faith,' with alternatives preserved
    where contested. Here the Hebrew witness is primary and likely points to a character
    trait rather than an act of believing. Because the verse praises Moses' qualities
    together ('faithfulness and humility'), 'faithfulness' better preserves the ethical
    nuance without importing later doctrinal categories. The alternative 'faith' is
    preserved in a footnote because the Greek parallel naturally supports it.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; preserve theological
    tension rather than resolve it silently.'
