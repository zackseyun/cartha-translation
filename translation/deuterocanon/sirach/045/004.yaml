translation:
  text: In his faithfulness and humility, he chose him from all flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''In his faith and meekness, he sanctified him; he chose
      him from all flesh.'' The Hebrew witness lacks the explicit verb ''he sanctified
      him'' found in the Greek, and the Greek also supports the alternative rendering
      ''faith'' instead of ''faithfulness.'''
    reason: alternative_reading
lexical_decisions:
- source_word: באמונתו
  chosen: in his faithfulness
  alternatives:
  - in his faith
  - because of his faithfulness
  lexicon: HALOT
  rationale: Hebrew אֱמוּנָה can denote faithfulness/reliability as well as faith.
    In this context, describing Moses' character qualities alongside humility, 'faithfulness'
    fits the commendatory sense well. The Greek parallel has ἐν πίστει, which could
    be rendered 'in faith,' but in a biographical commendation of Moses the sense
    'faithfulness' is a natural optimal-equivalence rendering and preserves the likely
    ethical nuance of the Hebrew.
- source_word: ובענותו
  chosen: and humility
  alternatives:
  - and meekness
  - and lowliness
  lexicon: HALOT
  rationale: Hebrew עֲנָוָה denotes humility/meekness. 'Humility' is clearer in modern
    English, while the Greek πραΰτης supports the semantic field of meekness/gentleness.
    'Humility' best captures the moral quality in accessible English.
- source_word: בחר
  chosen: he chose
  alternatives:
  - he selected
  - he elected
  lexicon: HALOT
  rationale: בחר is the standard verb 'choose/select.' 'Chose' is the most direct
    and idiomatic rendering, matching the Greek ἐξελέξατο in sense.
- source_word: בו
  chosen: him
  alternatives:
  - in him
  lexicon: HALOT
  rationale: The Hebrew preposition with בחר commonly yields the idiomatic sense 'choose
    someone.' Although formally 'in him,' English requires 'chose him.'
- source_word: מכל בשר
  chosen: from all flesh
  alternatives:
  - from all humanity
  - from every mortal
  lexicon: HALOT
  rationale: The Hebrew phrase literally means 'from all flesh,' echoed closely by
    the Greek ἐκ πάσης σαρκός. Retaining 'flesh' preserves the biblical idiom and
    the universal scope, while remaining understandable in context.
