translation:
  text: His grain offering shall be burned up whole, every day, twice a day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''His sacrifices shall be wholly consumed, continually,
      twice daily.'' The Hebrew witness is more specific: ''his grain offering.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מנחתו
  chosen: His grain offering
  alternatives:
  - his offering
  - his tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly/sacrificial context commonly denotes a grain offering
    rather than a generic gift. The singular with suffix is retained as 'his grain
    offering.'
- source_word: כליל
  chosen: burned up whole
  alternatives:
  - entirely
  - as a whole burnt offering
  - wholly
  lexicon: HALOT
  rationale: The adverb/adjectival term conveys total consumption. Because the offering
    here is a מִנְחָה, rendering it as 'whole burnt offering' would wrongly suggest
    עֹלָה; 'burned up whole' preserves the sense of complete consumption.
- source_word: תקטר
  chosen: shall be burned up
  alternatives:
  - shall be turned into smoke
  - shall be offered in smoke
  - shall be burned
  lexicon: HALOT
  rationale: From קטר in sacrificial usage, referring to causing an offering to go
    up in smoke on the altar. 'Shall be burned up' is natural English and fits the
    sacrificial context; 'in smoke' is implicit.
- source_word: בכל יום
  chosen: each day
  alternatives:
  - every day
  - daily
  lexicon: HALOT
  rationale: Straightforward temporal phrase. 'Each day' fits the cadence of the line
    and pairs well with 'twice each day.'
- source_word: צמיד
  chosen: continually
  alternatives:
  - regularly
  - continual(ly)
  - without interruption
  lexicon: HALOT
  rationale: The term denotes regular continuity/perpetuity in cultic contexts. The
    Greek ἐνδελεχῶς supports the sense 'continually' or 'regularly.'
- source_word: פעמים
  chosen: twice
  alternatives:
  - two times
  lexicon: HALOT
  rationale: With the Greek δίς, the phrase clearly means 'twice.'
- source_word: θυσίαι αὐτοῦ
  chosen: His grain offering
  alternatives:
  - his sacrifices
  lexicon: BDAG
  rationale: The Greek parallel has the broader 'his sacrifices,' but the Hebrew witness
    is primary here and more specific with מנחתו. The Greek confirms sacrificial context
    and total burning, but the English follows the Hebrew specificity.
- source_word: ὁλοκαρπωθήσονται
  chosen: shall be burned up whole
  alternatives:
  - shall be wholly consumed
  - shall be offered whole
  lexicon: BDAG
  rationale: The Greek supports the Hebrew כליל + תקטר as complete consumption on
    the altar, reinforcing the chosen rendering without importing the technical term
    'holocaust' into modern English.
