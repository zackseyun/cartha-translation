lexical_decisions:
- source_word: בגדי קודש
  chosen: holy garments
  alternatives:
  - sacred garments
  - garments of holiness
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Holy garments' is natural English
    and preserves the cultic sense without over-expansion.
- source_word: זהב תכלת, וארגמן
  chosen: of gold, blue, and purple
  alternatives:
  - gold, violet-blue, and purple
  - gold, hyacinth-blue, and purple
  lexicon: HALOT
  rationale: The Hebrew lists prestigious tabernacle/priestly materials/colors. 'Blue'
    is the most readable rendering for תכלת, while the Greek ὑάκινθος confirms a blue-violet
    luxury dye. 'Of gold, blue, and purple' keeps the appositional/material listing
    compact.
- source_word: מעשה חשב
  chosen: the work of a designer
  alternatives:
  - skillfully woven work
  - the work of a craftsman
  - embroidered work
  lexicon: HALOT
  rationale: The phrase denotes skilled patterned workmanship used in sanctuary textiles.
    'Designer' captures intentional artistic craftsmanship better than a generic 'craftsman,'
    while avoiding overprecision where the exact technique may include weaving rather
    than embroidery. The Greek ἔργων ποικιλτοῦ supports ornate variegated workmanship.
- source_word: חשן משפט
  chosen: a breastpiece of judgment
  alternatives:
  - breastpiece of decision
  - breastpiece for judgment
  lexicon: HALOT
  rationale: This is the established priestly object known from Exodus. 'Judgment'
    preserves the traditional and lexical sense of משפט here, likely referring to
    judicial discernment/oracular decision.
- source_word: אפוד
  chosen: an ephod
  alternatives:
  - priestly vest
  lexicon: HALOT
  rationale: This is a technical cultic term with no precise English equivalent. Transliteration
    best preserves the referent without misleading simplification.
- source_word: ואזור
  chosen: a sash
  alternatives:
  - a waistband
  - a girdle
  lexicon: HALOT
  rationale: '''Sash'' is clear modern English for the priestly belt-like garment.
    ''Girdle'' is archaic.'
- source_word: ושני תולעת
  chosen: crimson yarn
  alternatives:
  - scarlet yarn
  - scarlet thread
  - double-dyed crimson
  lexicon: HALOT
  rationale: The phrase refers to the scarlet/crimson material used in priestly textiles.
    'Crimson yarn' is idiomatic in English and fits the textile context. 'Scarlet'
    is also possible; the exact shade is not crucial here.
- source_word: מעשה אורג
  chosen: the work of a weaver
  alternatives:
  - woven work
  - the work of the loom
  lexicon: HALOT
  rationale: Unlike the previous phrase, this one explicitly names the weaver. Rendering
    it directly preserves the distinction between general artistic design and actual
    weaving.
