lexical_decisions:
- source_word: אנשי
  chosen: The men of
  alternatives:
  - The people of
  - The followers of
  lexicon: HALOT
  rationale: The Hebrew literally denotes 'men of.' In this context it identifies
    the faction associated with Dathan and Abiram. 'Men of' preserves the concrete,
    masculine collective wording better than the more interpretive 'followers of.'
- source_word: דתן ואבירם
  chosen: Dathan and Abiram
  rationale: Personal names are transliterated by standard English biblical convention.
- source_word: ועדת קרח
  chosen: and the company of Korah
  alternatives:
  - and the congregation of Korah
  - and Korah's assembly
  lexicon: HALOT
  rationale: עדה commonly means 'assembly/congregation/company.' 'Company' is natural
    modern English and fits a rebellious faction without importing later ecclesial
    overtones.
- source_word: בעזוז אפם
  chosen: in the strength of their anger
  alternatives:
  - in the fierceness of their anger
  - in their mighty rage
  lexicon: HALOT
  rationale: עזוז conveys strength, might, or fierceness; אף here means anger/wrath.
    The phrase is somewhat compressed in Hebrew. 'In the strength of their anger'
    stays close to the wording while remaining intelligible. The Greek lacks this
    exact phrase and instead expands the judgment scene, so the Hebrew is given primacy
    here.
- source_word: וירא יהוה
  chosen: the LORD saw
  alternatives:
  - the LORD looked on
  lexicon: HALOT
  rationale: A straightforward rendering of the Hebrew verb ראה. Per doctrine, יהוה
    is rendered 'the LORD.'
- source_word: ויתאנף
  chosen: and was enraged
  alternatives:
  - and became angry
  - and was wrathful
  lexicon: HALOT
  rationale: The hitpael of אנף expresses becoming angry or showing wrath. 'Was enraged'
    conveys the intensity in a readable modern register.
- source_word: ויכלם
  chosen: and he consumed them
  alternatives:
  - and he destroyed them
  - and he finished them
  lexicon: HALOT
  rationale: The Hebrew form is difficult in isolation, but in context with the rebellion
    tradition and the Greek parallel's 'they were brought to an end' / fiery destruction,
    the sense is punitive destruction. 'Consumed them' fits both the likely Hebrew
    sense and the Greek's fire imagery without importing more detail than the Hebrew
    line itself states.
- source_word: בחרון אפו
  chosen: in the heat of his anger
  alternatives:
  - in the burning of his anger
  - in his burning wrath
  lexicon: HALOT
  rationale: A common Hebrew idiom for intense divine wrath. 'Heat of his anger' preserves
    the metaphor in accessible English.
