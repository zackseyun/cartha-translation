- issue: Use of Hebrew as primary witness with Greek parallel informing a difficult
    clause
  chosen_reading: Translate primarily from the extant Hebrew, while allowing the Greek
    to clarify the judgment language in ויכלם
  alternative_readings:
  - Translate more fully from the Greek expansion, including wonders and consuming
    fire
  rationale: PHILOSOPHY.md directs that Sirach be translated from the Hebrew where
    it survives, with the Greek used alongside it. The Greek contains an expansion
    ('he did signs for them, to consume in the fire of his flame') not present in
    the Hebrew line, so it is not imported into the main text, but it supports understanding
    the Hebrew clause as destructive judgment.
