- issue: Divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  rationale: DOCTRINE.md specifies 'the LORD' as the default rendering for YHWH, following
    Jewish reverence tradition and LXX pattern.
