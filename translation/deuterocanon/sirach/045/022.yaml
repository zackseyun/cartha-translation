theological_decisions:
- issue: Whether the final clause should follow the Hebrew witness ('the offerings
    of the LORD are his portion') or the Greek parallel ('he himself is your portion,
    inheritance').
  chosen_reading: Follow the extant Hebrew as the primary source for Sirach where
    it survives, rendering the priestly support as sacrificial offerings rather than
    directly identifying the LORD as the portion in the main text.
  alternative_readings:
  - the LORD himself is his/your portion and inheritance
  rationale: Project policy gives primacy to the Hebrew Ben Sira where extant, while
    still using the Greek as a real input. The Hebrew here reads אשי יהוה חלקו ונחלתו,
    naturally yielding 'the offerings of the LORD are his portion and his inheritance.'
    The Greek parallel reflects a different wording and likely harmonizes toward Pentateuchal
    inheritance language. Because the divergence is theologically meaningful, the
    Greek-based alternative is preserved in a footnote rather than silently excluded.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; DOCTRINE.md:
    preserve theological tension rather than resolve it silently.'
