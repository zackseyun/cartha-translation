translation:
  text: But in their land he will not inherit, and among them he will not be allotted
    an inheritance; the offerings of the LORD are his portion and his inheritance,
    among the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''for he himself is your portion, inheritance,'' reflecting
      a different form of the final clause than the extant Hebrew, which reads ''the
      offerings of the LORD are his portion and his inheritance.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אך
  chosen: But
  alternatives:
  - Only
  - Nevertheless
  lexicon: HALOT
  rationale: Introduces a contrast with the preceding grant to Aaron and his descendants.
    'But' is natural English and preserves the adversative force without overemphasis.
- source_word: בארצם
  chosen: in their land
  alternatives:
  - in their country
  lexicon: HALOT
  rationale: The Hebrew refers to the land belonging to Israel. 'Land' fits inheritance
    language better than 'country' and aligns with the Greek γῇ.
- source_word: לא ינחל
  chosen: he will not inherit
  alternatives:
  - he shall have no inheritance
  - he will not receive a possession
  lexicon: HALOT
  rationale: The singular verb likely refers collectively to the priestly figure/line
    represented by Aaron. 'Will not inherit' keeps the verbal force of נחל and matches
    the inheritance idiom.
- source_word: לא יחלק נחלה
  chosen: will not be allotted an inheritance
  alternatives:
  - will not divide an inheritance
  - will not receive a share of inheritance
  lexicon: HALOT
  rationale: 'In context the passive sense is intended: no landed allotment is assigned
    among Israel. This is supported by the Greek ''a portion is not for him among
    the people.'''
- source_word: אשי יהוה
  chosen: the offerings of the LORD
  alternatives:
  - the fire-offerings of the LORD
  - the LORD's food offerings
  lexicon: HALOT
  rationale: אשי commonly denotes offerings made by fire. 'Offerings of the LORD'
    is readable and accurate in context, indicating the sacrificial gifts that sustain
    the priests. Because the Hebrew is somewhat compressed and the Greek instead reads
    'he himself is your portion, inheritance,' this choice preserves the Hebrew witness
    while acknowledging source tension in a footnote.
- source_word: חלקו ונחלתו
  chosen: his portion and his inheritance
  alternatives:
  - his share and his possession
  lexicon: HALOT
  rationale: A standard covenantal pair for allotted support. 'Portion' and 'inheritance'
    preserve the legal-sacral nuance.
- source_word: בתוך בני ישראל
  chosen: among the sons of Israel
  alternatives:
  - among the children of Israel
  - among the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Per project philosophy, the
    masculine form is retained where it reflects the source wording; here it denotes
    the people of Israel corporately.
