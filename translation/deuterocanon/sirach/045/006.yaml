translation:
  text: He exalted Aaron, a holy one like himself, from the tribe of Levi, and made
    him an everlasting statute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek parallel explicitly reads 'a holy one like himself, his brother, from
      the tribe of Levi.' The Hebrew line as cited is shorter; 'like himself' is retained
      in the main text because the Greek is a required translation input and coheres
      with the sense of Aaron's exalted holiness.
    reason: alternative_reading
  - marker: b
    text: Or 'a perpetual statute' or 'a lasting ordinance.' The Hebrew idiom likely
      refers to Aaron's enduring legal-priestly appointment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וירם
  chosen: He exalted
  alternatives:
  - He raised up
  - He lifted high
  lexicon: HALOT
  rationale: The Hiphil of רום commonly means to raise/exalt. 'Exalted' fits the honorific/priestly
    context and aligns with the Greek ὕψωσεν while remaining natural English.
- source_word: קדוש
  chosen: a holy one
  alternatives:
  - the holy one
  - holy
  lexicon: HALOT
  rationale: The Hebrew lacks an explicit article in the cited line and functions
    appositionally with Aaron. Rendering as 'a holy one' preserves the predicate/appositional
    force. The Greek likewise has ἅγιον. Capitalizing or making it definite would
    overread the phrase.
- source_word: את אהרן
  chosen: Aaron
  rationale: Direct object marker plus personal name; standard transliteration per
    project policy.
- source_word: למטה לוי
  chosen: from the tribe of Levi
  alternatives:
  - of the tribe of Levi
  - from Levi's tribe
  lexicon: HALOT
  rationale: מַטֶּה in genealogical contexts means 'tribe.' 'From the tribe of Levi'
    is idiomatic and reflects both the Hebrew and the Greek ἐκ φυλῆς Λευεί.
- source_word: וישימהו
  chosen: and made him
  alternatives:
  - and appointed him
  - and set him
  lexicon: HALOT
  rationale: שׂים can mean set/place/appoint. Because the complement is לחק עולם,
    'made him' best carries the sense of constituting Aaron in a lasting legal-priestly
    role without adding more specificity than the text states.
- source_word: לחק עולם
  chosen: an everlasting statute
  alternatives:
  - a perpetual statute
  - a lasting ordinance
  lexicon: HALOT
  rationale: חק is often 'statute' or 'ordinance'; עולם here denotes enduring/perpetual
    duration. 'Everlasting statute' is slightly formal but clear and preserves the
    covenantal-legal register.
- source_word: ὅμοιον αὐτῷ
  chosen: like himself
  alternatives:
  - like him
  lexicon: BDAG
  rationale: The Greek parallel includes an explicit comparison absent or compressed
    in the Hebrew line as presented. Because the task requires using the Greek as
    actual translation input, 'like himself' is retained to reflect the parallel witness
    and the sense that Aaron is elevated as a holy counterpart/peer to the subject
    in honor.
