theological_decisions:
- issue: Subject identification of 'He'
  chosen_reading: An implicit third-person subject ('He') is retained without explicit
    identification.
  alternative_readings:
  - God exalted Aaron
  - The Lord exalted Aaron
  rationale: The Hebrew verb has no explicit subject in this line. In context the
    referent is God, but supplying 'God' or 'the Lord' in the main text would add
    wording not present in the verse itself. Retaining 'He' preserves the source's
    syntax while allowing context to identify the actor.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of לחק עולם in relation to Aaron
  chosen_reading: Rendered as 'made him an everlasting statute' with legal-covenantal
    force preserved, though the idiom is somewhat compressed in English.
  alternative_readings:
  - appointed him for an everlasting statute
  - established him in an everlasting priestly office
  rationale: The Hebrew idiom is terse and somewhat awkward in English. More explicit
    renderings such as 'priestly office' interpret beyond the words present. The chosen
    wording keeps the legal register and leaves the exact institutional implication
    to context.
  doctrine_reference: Translation philosophy §1, §3
