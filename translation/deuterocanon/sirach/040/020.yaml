id: SIR.40.20
reference: Sirach 40:20
source:
  edition: sefaria-ben-sira-kahana
  text: יין ושכר יעליצו לב, ומשניהם אהבת דודים.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: οἶνος καὶ μουσικὰ εὐφραίνουσιν καρδίαν, καὶ ὑπὲρ ἀμφότερα ἀγάπησις σοφίας.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:20
translation:
  text: Wine and strong drink gladden the heart, but better than both is the love
    of beloved ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, 'and beyond both is the love of wisdom.' The Hebrew witness
      here instead reads 'the love of lovers,' and the main text follows the Hebrew
      as the primary source where it survives.
    reason: alternative_reading
lexical_decisions:
- source_word: יין
  chosen: Wine
  alternatives:
  - wine
  lexicon: HALOT
  rationale: Straightforward noun for fermented grape drink; rendered with standard
    English 'wine'.
- source_word: שכר
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: HALOT
  rationale: Hebrew שכר denotes an intoxicating beverage other than wine, often rendered
    'strong drink.' This preserves the broader category without over-specifying a
    modern beverage type.
- source_word: יעליצו
  chosen: gladden
  alternatives:
  - make rejoice
  - cheer
  lexicon: HALOT
  rationale: The verb conveys causing joy or exultation. 'Gladden' is natural English
    and keeps the causative sense.
- source_word: לב
  chosen: the heart
  alternatives:
  - the mind
  - the inner self
  lexicon: HALOT
  rationale: Hebrew לב commonly denotes the inner person, including emotion and thought.
    'Heart' is the conventional and sufficiently transparent rendering here in a wisdom
    context about joy.
- source_word: ומשניהם
  chosen: but better than both
  alternatives:
  - and more than both
  - and beyond both
  lexicon: HALOT
  rationale: Literally 'and from/beyond the two of them.' In context it introduces
    a comparison of superiority. English idiom requires an explicit comparative sense,
    hence 'better than both.'
- source_word: אהבת
  chosen: the love of
  alternatives:
  - love
  - loving
  lexicon: HALOT
  rationale: Construct form of 'love'; rendered as 'the love of' to preserve the Hebrew
    relationship to the following noun.
- source_word: דודים
  chosen: lovers
  alternatives:
  - beloved ones
  - caresses
  - love-making
  lexicon: HALOT
  rationale: 'The Hebrew דודים can denote lovers or love-expressions. Given the Cairo
    Hebrew wording, the most direct reading is relational: ''lovers.'' This yields
    a coherent comparison: intoxicants gladden, but mutual love surpasses them.'
