id: SIR.40.17
reference: Sirach 40:17
source:
  edition: sefaria-ben-sira-kahana
  text: וחסד לעולם לא ימוט, וצדקה לעד תכון.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: χάρις ὡς παράδεισος ἐν εὐλογίαις, καὶ ἐλεημοσύνη εἰς τὸν αἰῶνα διαμενεῖ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:17
translation:
  text: Kindness will never be shaken, and righteousness will stand forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''grace is like a paradise in blessings, and almsgiving
      endures forever.'' The Hebrew witness instead reads ''kindness ... and righteousness
      ...'''
    reason: alternative_reading
  - marker: b
    text: Masada preserves a differing Hebrew reading at this point from the Cairo
      Geniza text; the surviving excerpt is too fragmentary here to control the full
      translation with confidence.
    reason: textual_variant
lexical_decisions:
- source_word: וחסד
  chosen: Kindness
  alternatives:
  - Mercy
  - Steadfast love
  - Grace
  lexicon: HALOT
  rationale: Hebrew חסד has a broad semantic range including kindness, mercy, and
    covenantal loyalty. In this wisdom context without an explicit covenantal frame,
    'kindness' best captures the ethical virtue in accessible English. The Greek parallel
    χάρις points toward gracious favor, but the Hebrew remains primary.
- source_word: לעולם לא ימוט
  chosen: will never be shaken
  alternatives:
  - will never totter
  - will never be moved
  lexicon: HALOT
  rationale: ימוט commonly conveys being shaken, tottering, or moved from stability.
    'Will never be shaken' is idiomatic modern English and preserves the image of
    enduring firmness.
- source_word: וצדקה
  chosen: righteousness
  alternatives:
  - justice
  - charity
  - almsgiving
  lexicon: HALOT
  rationale: Hebrew צדקה can denote righteousness or justice, and in later usage may
    overlap with almsgiving. The Greek parallel ἐλεημοσύνη ('almsgiving/mercy') shows
    a divergent interpretive tradition, but the Hebrew witness here reads plainly
    as צדקה. Following source primacy, 'righteousness' is preferred in the main text,
    while the Greek-based alternative is preserved in a footnote.
- source_word: לעד תכון
  chosen: will stand forever
  alternatives:
  - will be established forever
  - will endure forever
  lexicon: HALOT
  rationale: תכון from כון conveys being established, fixed, or standing firm. 'Will
    stand forever' gives a natural English equivalent while retaining the durability
    image parallel to the first colon.
