translation:
  text: From force to force, like a perennial wadi, and from a mighty channel, with
    a crash of sounds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel reads, 'The wealth of the unjust will dry up like a river,
      and it will resound like a great thunder in rain.' This reflects a markedly
      different textual form from the surviving Hebrew.
    reason: alternative_reading
  - marker: b
    text: The Hebrew text of this line is difficult, and the Masada fragment for this
      verse is too incomplete to settle the wording securely; the translation follows
      the Cairo Geniza Hebrew while keeping the Greek parallel in view.
    reason: textual_variant
  - marker: c
    text: Or 'an ever-flowing stream.' Hebrew נחל often refers to a wadi or torrent-bed,
      and איתן suggests enduring or perennial flow.
    reason: lexical_alternative
lexical_decisions:
- source_word: מחיל אל חיל
  chosen: from force to force
  alternatives:
  - from army to army
  - from strength to strength
  - wealth of the unjust
  lexicon: HALOT
  rationale: The Hebrew witness is difficult and somewhat elliptical. חיל can denote
    strength, force, wealth, or army. Given the immediate water imagery in the Hebrew
    ('like a perennial wadi' / 'from a mighty channel') and the alliterative parallelism,
    a sense of surging force best fits the line as preserved. The Greek parallel reflects
    a substantially different Vorlage about 'wealth of the unjust,' so that alternative
    is preserved in a footnote rather than imported into the main text.
- source_word: נחל איתן
  chosen: a perennial wadi
  alternatives:
  - an ever-flowing stream
  - a lasting torrent
  - a mighty river
  lexicon: HALOT
  rationale: נחל is often a wadi or torrent-bed rather than a generic river; איתן
    conveys enduring, perennial, or ever-flowing strength. 'Perennial wadi' preserves
    the Hebrew landscape image while remaining intelligible in English.
- source_word: אפיק אדיר
  chosen: a mighty channel
  alternatives:
  - a mighty streambed
  - a strong river-course
  - a powerful channel
  lexicon: HALOT
  rationale: אפיק denotes a channel, bed, or ravine; אדיר means mighty. 'Mighty channel'
    keeps the concrete topographical image and parallels the preceding water metaphor.
- source_word: בחזיז קולות
  chosen: with a crash of sounds
  alternatives:
  - with peals of thunder
  - in a thunderous burst
  - with a flash of voices/sounds
  lexicon: HALOT
  rationale: The phrase is rare and difficult. קולות commonly means sounds, voices,
    or thunderings. In context with the Greek's thunder imagery, 'a crash of sounds'
    captures the auditory violence without overcommitting to a reconstruction not
    explicit in the Hebrew text as transmitted.
