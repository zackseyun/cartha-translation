  chosen_reading: Translate primarily from the Hebrew list of calamities, but let
    the Greek parallel inform the difficult term חרחר as 'strife.'
  alternative_readings:
  - Render חרחר as 'fever' or another bodily affliction based on Hebrew uncertainty
  - Follow the Greek order and wording more directly
  rationale: Project policy gives primacy to the surviving Hebrew of Sirach where
    available, but the prompt explicitly requires using the Greek parallel as actual
    translation input. Because the Hebrew form חרחר is uncertain and the verse is
    source-flagged, the Greek ἔρις provides a strong control on sense without displacing
    the Hebrew witness as primary.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    use parallel Greek as input/check. DOCTRINE.md: original-language primacy and
    preserve ambiguity honestly.'
