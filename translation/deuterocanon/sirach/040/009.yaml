translation:
  text: Pestilence and bloodshed, destruction and the sword, devastation and ruin,
    calamity and death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text here is difficult, and one term (חרחר) is uncertain. The
      Greek parallel reads 'death and blood and strife and sword,' which supports
      the rendering 'strife' for that item.
    reason: alternative_reading
  - marker: b
    text: Literally 'blood'; rendered 'bloodshed' here to convey the likely sense
      of violent bloodletting in this list of disasters.
    reason: lexical_alternative
lexical_decisions:
- source_word: דבר
  chosen: Pestilence
  alternatives:
  - plague
  lexicon: HALOT
  rationale: In Hebrew this commonly denotes pestilence/plague as a divine or catastrophic
    scourge. 'Pestilence' fits the verse's catalog of disasters and aligns well with
    the Greek parallel θάνατος only insofar as both witnesses list lethal calamities;
    the Hebrew witness is primary here.
- source_word: דם
  chosen: bloodshed
  alternatives:
  - blood
  lexicon: HALOT
  rationale: Although literally 'blood,' in an English list of calamities the idiomatic
    force is better conveyed by 'bloodshed,' indicating violent death rather than
    mere physical blood. This also coheres with the Greek parallel αἷμα in a disaster
    list.
- source_word: חרחר
  chosen: strife
  alternatives:
  - fever
  - wrath
  - conflict
  lexicon: HALOT
  rationale: The Hebrew form is difficult and the source is marked with major mismatch.
    The Greek parallel has ἔρις ('strife'), which strongly supports taking this item
    as social conflict rather than a bodily ailment. 'Strife' best explains the sequence
    and avoids overclaiming certainty.
- source_word: חרב
  chosen: the sword
  alternatives:
  - sword
  - war
  lexicon: HALOT
  rationale: A standard Hebrew term for sword, often metonymic for violent warfare
    or slaughter. Retaining 'the sword' preserves the concrete force of the source
    while remaining natural in English.
- source_word: שד
  chosen: devastation
  alternatives:
  - destruction
  - violence
  lexicon: HALOT
  rationale: This noun denotes destructive devastation. 'Devastation' pairs well with
    the following term and reflects the verse's piling up of calamities.
- source_word: שבר
  chosen: ruin
  alternatives:
  - breaking
  - crash
  - destruction
  lexicon: HALOT
  rationale: In this context of disasters, 'ruin' captures the resultative sense of
    collapse/breaking. The pairing with שד suggests two near-synonymous calamity terms
    rendered with slight variation for readable English.
- source_word: רעה
  chosen: calamity
  alternatives:
  - evil
  - disaster
  lexicon: HALOT
  rationale: Here the sense is not moral evil but harmful misfortune/disaster. 'Calamity'
    avoids moral ambiguity and suits the disaster catalogue.
- source_word: מות
  chosen: death
  lexicon: HALOT
  rationale: Straightforward rendering of the Hebrew noun, also supported by the Greek
    parallel θάνατος in the same semantic field.
