id: SIR.40.23
reference: Sirach 40:23
source:
  edition: sefaria-ben-sira-kahana
  text: עמית ורע לעת ינהגו, ומשניהם אשה משכלת.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: φίλος καὶ ἑταῖρος εἰς καιρὸν ἀπαντῶντες, καὶ ὑπὲρ ἀμφότερα γυνὴ μετὰ ἀνδρός.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:23
translation:
  text: A companion and a friend are useful for a time, but better than both is an
    intelligent wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'woman'; the Greek parallel points more specifically toward a marital
      sense, hence 'wife.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for a season' / 'at the proper time.' The Hebrew לעת and Greek εἰς καιρόν
      both involve the idea of time, and the exact nuance may be either temporary
      duration or timely usefulness.
    reason: alternative_reading
lexical_decisions:
- source_word: עמית
  chosen: companion
  alternatives:
  - associate
  - neighbor
  - colleague
  lexicon: HALOT
  rationale: The Hebrew denotes a close associate or fellow. 'Companion' fits the
    relational sense here better than the more formal 'associate' or the covenantal/social
    nuance of 'neighbor.'
- source_word: רע
  chosen: friend
  alternatives:
  - companion
  - associate
  lexicon: HALOT
  rationale: In pairing with עמית, this term is best distinguished as 'friend,' preserving
    the verse's two related but not identical social relationships.
- source_word: לעת
  chosen: for a time
  alternatives:
  - at the right time
  - seasonally
  - for a season
  lexicon: HALOT
  rationale: The Hebrew phrase most naturally means 'for a time' or 'for a season,'
    indicating temporariness. The Greek εἰς καιρόν supports a time-limited sense rather
    than specifically 'at an opportune time.'
- source_word: ינהגו
  chosen: conduct themselves
  alternatives:
  - go along
  - behave
  - lead
  lexicon: HALOT
  rationale: From נהג, the sense here is that such relationships carry on or conduct
    themselves only temporarily. 'Conduct themselves' is idiomatic English that preserves
    the verbal force without overinterpreting the exact mode of action.
- source_word: ומשניהם
  chosen: better than both
  alternatives:
  - and beyond both of them
  - and more than the two of them
  lexicon: HALOT
  rationale: The comparative sense is not explicit in the Hebrew form alone, but the
    verse structure and the Greek ὑπὲρ ἀμφότερα indicate preference/superiority. 'Better
    than both' communicates the intended comparison clearly.
- source_word: אשה
  chosen: wife
  alternatives:
  - woman
  lexicon: HALOT
  rationale: Although the Hebrew can mean either 'woman' or 'wife,' the Greek parallel's
    domestic pairing language points toward a marital sense. 'Wife' also fits the
    wisdom-literature comparison of valued household relationships.
- source_word: משכלת
  chosen: intelligent
  alternatives:
  - prudent
  - sensible
  - understanding
  lexicon: HALOT
  rationale: The participial/adjectival form conveys practical intelligence or discernment.
    'Intelligent' is clear modern English, though 'prudent' and 'sensible' remain
    viable alternatives.
