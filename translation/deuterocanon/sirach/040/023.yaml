theological_decisions:
- issue: Whether אשה should be rendered generically as 'woman' or specifically as
    'wife'
  chosen_reading: wife
  alternative_readings:
  - woman
  rationale: The Hebrew alone allows either, but the Greek parallel ('a woman with
    a husband/man') points toward a marital relationship. In this wisdom context,
    the verse compares social bonds and then elevates a discerning spouse above them.
    This is a lexical-contextual decision rather than a doctrinal one.
  doctrine_reference: 'Translation philosophy: original-language primacy with parallel-source
    consultation; gender-accurate over gender-neutral.'
