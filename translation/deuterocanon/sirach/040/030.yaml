id: SIR.40.30
reference: Sirach 40:30
source:
  edition: sefaria-ben-sira-kahana
  text: לאיש עוז נפש תמתיק שאלה, ובקרבו תבער כמו אש.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐν στόματι ἀναιδοῦς γλυκανθήσεται ἐπαίτησις, καὶ ἐν κοιλίᾳ αὐτοῦ πῦρ καήσεται.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:30
translation:
  text: For a strong man, begging sweetens the soul, but within him it burns like
    fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'for a man of strong spirit/soul'; the Greek parallel
      reads 'in the mouth of a shameless person,' supporting the sense 'shameless
      man.'
    reason: alternative_reading
  - marker: b
    text: Or 'asking/requesting is sweet.' The Greek parallel more specifically suggests
      'begging' or 'alms-seeking.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לאיש עוז נפש
  chosen: for a shameless man
  alternatives:
  - for a strong-souled man
  - for a bold man
  - for a hard-faced man
  lexicon: HALOT
  rationale: The Hebrew phrase is difficult literally, but in context and in light
    of the Greek parallel ἐν στόματι ἀναιδοῦς ('in the mouth of a shameless person'),
    it points not to courage but to brazen impudence. 'Shameless man' best captures
    the moral sense rather than physical strength or commendable boldness.
- source_word: תמתיק שאלה
  chosen: begging is sweet
  alternatives:
  - a request is sweet
  - asking is sweet
  - alms-seeking is sweet
  lexicon: HALOT
  rationale: שאלה can mean asking/request, but here the Greek ἐπαίτησις specifically
    indicates begging or mendicancy. 'Begging is sweet' preserves the metaphor of
    pleasantness while making the social sense explicit.
- source_word: ובקרבו
  chosen: but within him
  alternatives:
  - and in his inward parts
  - and in his belly
  - and inside him
  lexicon: HALOT
  rationale: Hebrew קרב can denote the inner self or inward parts. The Greek κοιλία
    literally means belly/womb, but idiomatically refers to the inner being here.
    'Within him' is natural English and preserves the internal contrast with the outward
    sweetness of begging.
- source_word: תבער כמו אש
  chosen: it burns like fire
  alternatives:
  - fire burns
  - it will blaze like fire
  - it kindles like fire
  lexicon: HALOT
  rationale: The feminine verb likely refers back to the act or condition associated
    with begging. 'It burns like fire' keeps the vivid simile and allows the internal
    torment implied by the proverb to stand without overexplaining.
