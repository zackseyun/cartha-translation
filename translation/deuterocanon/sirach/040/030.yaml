theological_decisions:
- issue: Interpretation of the difficult Hebrew phrase לאיש עוז נפש
  chosen_reading: moral shamelessness/brazenness rather than commendable strength
  alternative_readings:
  - a man of strong spirit
  - a bold or forceful man
  rationale: The Hebrew alone could be read more literally as 'a man of strong soul/spirit,'
    but the Greek parallel strongly supports an interpretive sense of shameless brazenness.
    Since the verse is a wisdom saying condemning degrading dependence, the negative
    moral nuance fits the context best. The alternative is preserved in a footnote
    because the Hebrew wording is not fully transparent.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy with parallel-source consultation
