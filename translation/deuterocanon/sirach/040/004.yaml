translation:
  text: from one with a small turban and a flowered crown, even to one wrapped in
    a garment of skin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''from one wearing blue-purple and a crown, to one clothed in coarse
      linen.'' The Hebrew and Greek witnesses differ in the specific clothing imagery
      while conveying the same social range.'
    reason: textual_variant
lexical_decisions:
- source_word: מעוטה
  chosen: small
  alternatives:
  - little
  - meager
  - few
  lexicon: HALOT
  rationale: Taken adjectivally with צניף, describing the modest or slight headwrap.
    The Greek ὑάκινθον points to a fine or colored headdress, but the Hebrew witness
    is primary here; 'small' preserves the Hebrew sense without overinterpreting social
    rank.
- source_word: צניף
  chosen: turban
  alternatives:
  - headwrap
  - headdress
  lexicon: HALOT
  rationale: A wrapped head covering; 'turban' is the most natural concise English
    equivalent. It also fits the paired imagery of adornment and clothing in this
    verse.
- source_word: וציץ
  chosen: and a flowered crown
  alternatives:
  - and a diadem
  - and an ornament
  - and a blossom
  lexicon: HALOT
  rationale: ציץ can denote a blossom/flower and by extension an ornamental frontlet
    or diadem. Since the Greek has στέφανον ('crown/garland'), the phrase likely refers
    to ornamental headwear. 'Flowered crown' preserves both the Hebrew floral nuance
    and the Greek's regal/adorned sense.
- source_word: ועד
  chosen: even to
  alternatives:
  - and as far as
  - down to
  lexicon: HALOT
  rationale: Marks the lower end of a social or material range in the larger context.
    'Even to' reads naturally in English and preserves the range formula.
- source_word: עוטה
  chosen: wrapped
  alternatives:
  - clothed
  - covered
  lexicon: HALOT
  rationale: The participle denotes being covered or enveloped in a garment. 'Wrapped'
    is vivid and suits the roughness implied by the following phrase.
- source_word: שמלת עור
  chosen: a garment of skin
  alternatives:
  - a skin garment
  - a hide garment
  - rawhide clothing
  lexicon: HALOT
  rationale: Literally 'garment of skin.' This likely denotes rough, humble clothing
    in contrast to the adorned headwear earlier in the line. The more literal rendering
    avoids overstating whether the skin is processed leather or simply hide.
