id: SIR.40.25
reference: Sirach 40:25
source:
  edition: sefaria-ben-sira-kahana
  text: זהב וכסף יעמידו רגל, ומשניהם עצה טובה.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: χρυσίον καὶ ἀργύριον ἐπιστήσουσιν πόδα, καὶ ὑπὲρ ἀμφότερα βουλὴ εὐδοκιμεῖται.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:25
translation:
  text: Gold and silver make the foot stand firm, but better than both is good counsel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Gold and silver make the foot stand firm, and beyond
      both, good counsel.' The Greek parallel similarly reads, 'gold and silver will
      set the foot, and beyond both counsel…'
    reason: lexical_alternative
lexical_decisions:
- source_word: זהב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material noun; paired with כסף as a stock expression
    for wealth.
- source_word: וכסף
  chosen: and silver
  lexicon: HALOT
  rationale: Rendered literally to preserve the Hebrew pairing 'gold and silver,'
    echoed by the Greek χρυσίον καὶ ἀργύριον.
- source_word: יעמידו רגל
  chosen: make the foot stand firm
  alternatives:
  - establish a foot
  - set the foot firmly
  - provide stability
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of causing the foot to stand; the Greek
    ἐπιστήσουσιν πόδα confirms the sense of giving stability or secure footing. English
    idiomatically renders the idea as standing firm while retaining the concrete 'foot'
    image.
- source_word: ומשניהם
  chosen: but better than both
  alternatives:
  - and beyond both
  - and more than both
  - and above both
  lexicon: HALOT
  rationale: 'Literally ''and from/beyond the two of them.'' In context it introduces
    comparison: something surpasses both gold and silver. ''Better than both'' makes
    the comparative force explicit in natural English, supported by Greek ὑπὲρ ἀμφότερα.'
- source_word: עצה טובה
  chosen: sound counsel
  alternatives:
  - good counsel
  - good advice
  - wise counsel
  lexicon: HALOT
  rationale: עצה is counsel/advice; טובה is good. 'Sound counsel' conveys practical
    wisdom and reliability in idiomatic English. The Greek βουλή with εὐδοκιμεῖται
    supports the commendatory sense. 'Good counsel' is possible, but 'sound counsel'
    better captures the proverb-like valuation.
- source_word: καὶ ὑπὲρ ἀμφότερα βουλὴ εὐδοκιμεῖται
  chosen: but better than both is sound counsel
  alternatives:
  - and counsel prospers beyond both
  - and counsel is esteemed above both
  lexicon: BDAG
  rationale: The Greek clause helps interpret the compressed Hebrew comparison. εὐδοκιμεῖται
    can suggest being approved, esteemed, or flourishing; in this proverb context
    it supports the sense that counsel ranks above wealth. The English rendering follows
    the Hebrew as primary while using the Greek to clarify the comparative structure.
