translation:
  text: At the opening of his hands they will rejoice, but the transgressors will
    suddenly come to an end forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew first colon is difficult and may reflect a different reading,
      roughly involving 'people' and 'plundering.' The Greek reads, 'When he opens
      his hands, they rejoice.'
    reason: alternative_reading
  - marker: b
    text: Masada preserves only a fragmentary reading here; the Cairo Geniza text
      and Greek diverge substantially in the first colon.
    reason: textual_variant
lexical_decisions:
- source_word: שאתו כפים / ἐν τῷ ἀνοῖξαι αὐτὸν χεῖρας
  chosen: When he opens his hands
  alternatives:
  - At the lifting/opening of his hands
  - When he stretches out his hands
  lexicon: HALOT; BDAG
  rationale: The Hebrew in Kahana is difficult and likely corrupt at this point, while
    the Greek parallel gives a clear sense of opening/stretching out the hands. Rendering
    with 'opens his hands' follows the Greek and fits the probable Hebrew sense behind
    the damaged wording.
- source_word: עם עם
  chosen: they rejoice
  alternatives:
  - people upon people plunder
  - the people are plundered
  lexicon: HALOT; BDAG
  rationale: The extant Hebrew reading is obscure and appears textually unstable;
    the Greek has εὐφρανθήσεται ('will rejoice/be gladdened'). Because the task requires
    using the Greek parallel as actual translation input and the Hebrew here is problematic,
    the main text follows the clearer Greek sense. The Hebrew-based alternative is
    preserved in a footnote due to the substantial divergence.
- source_word: פתאם
  chosen: suddenly
  alternatives:
  - in an instant
  lexicon: HALOT
  rationale: פתאם straightforwardly means 'suddenly' or 'unexpectedly.' This adverb
    is retained because it is explicit in the Hebrew and sharpens the warning.
- source_word: לנצח
  chosen: forever
  alternatives:
  - completely
  - for good
  lexicon: HALOT
  rationale: The Hebrew most naturally means 'forever' or 'perpetually.' In context
    it conveys finality; 'forever' preserves that force without paraphrase.
- source_word: יתם / ἐκλείψουσιν
  chosen: will come to an end
  alternatives:
  - will perish
  - will vanish
  - will fail
  lexicon: HALOT; BDAG
  rationale: The Hebrew verb and the Greek ἐκλείψουσιν both point to ceasing/disappearing.
    'Will come to an end' is idiomatic modern English that preserves the sense of
    final disappearance without overinterpreting as violent destruction.
- source_word: הפרת implicit in Greek οἱ παραβαίνοντες
  chosen: the transgressors
  alternatives:
  - those who transgress
  - the lawbreakers
  lexicon: BDAG
  rationale: The Greek explicitly identifies the subject as 'those who transgress.'
    Since the Hebrew line is damaged/unclear in its first colon, this provides the
    clearest subject for the second colon. 'Transgressors' is concise and suitably
    weighty.
