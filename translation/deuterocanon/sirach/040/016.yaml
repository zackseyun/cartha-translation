translation:
  text: Like brushwood on a streamside planting, before every rain they are dried
    up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew כקרדמות is uncertain; the Greek parallel has imagery of growth by
      water and a riverbank that is quickly pulled up. The translation 'brushwood'
      reflects fragile scrub growth rather than a precise plant identification.
    reason: lexical_alternative
  - marker: b
    text: The older Masada witness appears to preserve a substantially different reading
      at this point than the Cairo Geniza Hebrew used here; because the Zone 1 Hebrew
      is our primary text and the surviving Masada excerpt is fragmentary in this
      prompt, the main translation follows the Cairo reading while acknowledging textual
      uncertainty.
    reason: textual_variant
lexical_decisions:
- source_word: כקרדמות
  chosen: like brushwood
  alternatives:
  - like thistles
  - like undergrowth
  - like cut brush
  lexicon: HALOT
  rationale: The Hebrew term is rare/uncertain in this form. The Greek parallel depicts
    vegetation that is quickly uprooted before other grass, suggesting low, expendable
    growth rather than a cultivated plant. 'Brushwood' preserves the image of scrub
    growth without overclaiming a precise botanical identification.
- source_word: על מטעי נחל
  chosen: on a streamside planting
  alternatives:
  - by plantings of a wadi
  - upon a riverbank plantation
  - beside a brook planting
  lexicon: HALOT
  rationale: מטעי is 'plantings/plantation' and נחל is a streambed/wadi. The phrase
    likely evokes vegetation growing along a watercourse. 'Streamside planting' is
    natural English while retaining the agricultural image.
- source_word: מפני כל מטר
  chosen: before every rain
  alternatives:
  - at the face of every rain
  - before any rainfall
  - in the face of every shower
  lexicon: HALOT
  rationale: מפני commonly means 'before' or 'because of/in the face of.' In context
    of fragile vegetation, the sense is that each rain causes its collapse or disappearance.
    'Before every rain' follows the Hebrew closely and matches the Greek sense of
    being removed quickly.
- source_word: נדעכו
  chosen: are withered away
  alternatives:
  - are extinguished
  - fade away
  - are blotted out
  lexicon: HALOT
  rationale: The verb commonly carries the sense of dying down, being quenched, or
    fading out. For vegetation imagery, 'withered away' fits the metaphor better than
    'extinguished,' while still conveying disappearance under adverse conditions.
