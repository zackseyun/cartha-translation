id: SIR.40.18
reference: Sirach 40:18
source:
  edition: sefaria-ben-sira-kahana
  text: חיי יין ושכר ימתקו, ומשניהם מוצא אוצר.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ζωὴ αὐτάρκους ἐργάτου γλυκανθήσεται, καὶ ὑπὲρ ἀμφότερα ὁ εὑρίσκων θησαυρόν.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:18
translation:
  text: Wine and strong drink sweeten life, but better than both is finding a treasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Wine and strong drink sweeten life, and beyond both, finding
      a treasure.'' The Greek parallel likewise supports a comparative sense (''above
      both'').'
    reason: lexical_alternative
lexical_decisions:
- source_word: חיי
  chosen: life
  alternatives:
  - the life of
  - living
  lexicon: HALOT
  rationale: The construct form with the following nouns is idiomatic. Rather than
    a wooden 'the life of wine and strong drink,' the Hebrew sense is that these things
    make life pleasant. 'Life' preserves the noun while allowing natural English.
- source_word: יין
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering for the fermented grape beverage; no reason to paraphrase.
- source_word: ושכר
  chosen: and strong drink
  alternatives:
  - and beer
  - and intoxicating drink
  lexicon: HALOT
  rationale: שכר denotes an intoxicating beverage other than wine in many contexts.
    'Strong drink' is the conventional broad English equivalent and avoids over-specifying
    a particular beverage.
- source_word: ימתקו
  chosen: sweeten
  alternatives:
  - are sweet
  - make pleasant
  - gladden
  lexicon: HALOT
  rationale: From מתק, 'to be/make sweet.' With 'life' as object, 'sweeten life' captures
    the causative/resultative sense more directly than the stative 'are sweet.'
- source_word: ומשניהם
  chosen: but better than both
  alternatives:
  - and from both of them
  - and beyond both
  lexicon: HALOT
  rationale: 'Literally ''and from/beyond the two of them.'' In context, with the
    Greek ὑπὲρ ἀμφότερα, the comparative sense is clear: what follows surpasses both
    wine and strong drink. ''But better than both'' makes the comparison explicit
    in idiomatic English.'
- source_word: מוצא
  chosen: finding
  alternatives:
  - one who finds
  - the finding of
  lexicon: HALOT
  rationale: The Hebrew participial/nominal form can be rendered verbally in English.
    The Greek parallel has ὁ εὑρίσκων ('the one finding'), confirming the sense. 'Finding'
    is concise and idiomatic after 'better than both is...'.
- source_word: אוצר
  chosen: a treasure
  alternatives:
  - treasure
  - wealth
  - a storehouse
  lexicon: HALOT
  rationale: In this context the sense is a valuable treasure, not a physical storehouse.
    The Greek θησαυρόν supports 'treasure.' The indefinite article is natural in English.
