id: SIR.40.26
reference: Sirach 40:26
source:
  edition: sefaria-ben-sira-kahana
  text: חיל וכח יגדלו לב, ומשניהם יראת אלהים.<br><small>(כו)</small> אין ביראת אלהים
    מחסור, ואין לבקש עמה משען.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: χρήματα καὶ ἰσχὺς ἀνυψώσουσιν καρδίαν, καὶ ὑπὲρ ἀμφότερα φόβος Κυρίου· οὐκ
      ἔστιν φόβῳ Κυρίου ἐλάττωσις, καὶ οὐκ ἔστιν ἐπιζητῆσαι ἐν αὐτῷ βοήθειαν·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:26
translation:
  text: Wealth and strength lift up the heart, but the fear of God is beyond both.
    In the fear of God there is no lack, and with it there is no need to seek support.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'more than both' or 'better than both'; the Hebrew says literally 'and
      from both of them,' in context expressing that the fear of God surpasses wealth
      and strength.
    reason: lexical_alternative
  - marker: b
    text: Or, 'and there is no need to seek help/support along with it.' The sense
      is that the fear of God is sufficient and does not require an added prop.
    reason: lexical_alternative
lexical_decisions:
- source_word: חיל
  chosen: wealth
  alternatives:
  - resources
  - riches
  - property
  lexicon: HALOT
  rationale: In this pairing with כח ('strength'), חיל most naturally denotes material
    means or wealth rather than military force. The Greek parallel χρήματα supports
    a financial/material sense.
- source_word: כח
  chosen: strength
  alternatives:
  - power
  - might
  lexicon: HALOT
  rationale: A straightforward rendering matching the Hebrew and the Greek ἰσχύς.
    'Strength' is idiomatic and broad enough to include personal power or capability.
- source_word: יגדלו לב
  chosen: lift up the heart
  alternatives:
  - make the heart great
  - enlarge the heart
  - exalt the heart
  lexicon: HALOT
  rationale: The idiom conveys elevation, confidence, or pride. 'Lift up the heart'
    preserves the metaphor without over-interpreting it as either positive courage
    or negative pride.
- source_word: ומשניהם
  chosen: beyond both
  alternatives:
  - more than both
  - better than both
  lexicon: HALOT
  rationale: 'The comparative sense is clear: the fear of God surpasses both wealth
    and strength. ''Beyond both'' is concise and natural English while preserving
    the comparison.'
- source_word: יראת אלהים
  chosen: the fear of God
  alternatives:
  - fear of the Lord
  - reverence for God
  lexicon: HALOT
  rationale: The Hebrew explicitly has 'God' (אלהים), not the divine name. 'Fear of
    God' preserves the traditional biblical idiom and its theological weight better
    than the softer 'reverence.'
- source_word: מחסור
  chosen: lack
  alternatives:
  - want
  - deficiency
  - need
  lexicon: HALOT
  rationale: '''Lack'' best fits the clause ''there is no lack'' and aligns with the
    Greek ἐλάττωσις as a state of deficiency or diminishment.'
- source_word: ואין לבקש עמה משען
  chosen: and with it there is no need to seek support
  alternatives:
  - and one need not seek help along with it
  - and there is no need to look for a support beside it
  - and with it one does not seek assistance
  lexicon: HALOT
  rationale: The Hebrew means that the fear of God is sufficient in itself; no additional
    support must be sought alongside it. The Greek βοήθεια points toward help/support.
    'With it there is no need to seek support' communicates sufficiency clearly in
    English.
