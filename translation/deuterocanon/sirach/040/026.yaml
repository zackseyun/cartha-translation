theological_decisions:
- issue: Rendering יראת אלהים
  chosen_reading: the fear of God
  alternative_readings:
  - reverence for God
  rationale: The phrase is a central wisdom motif and should retain its full biblical
    force. A softer rendering like 'reverence' risks reducing the tension between
    awe, obedience, and holy fear that the Hebrew idiom carries.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
