id: SIR.40.12
reference: Sirach 40:12
source:
  edition: lxx-swete-1909
  text: πᾶν δῶρον καὶ ἀδικία ἐξαλειφθήσεται, καὶ πίστις εἰς τὸν αἰῶνα στήσεται.
  language: Greek
