translation:
  text: Every gift and injustice will be wiped away, but faithfulness will stand forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness will stand forever.' The Greek word can denote either faith
      or faithfulness; the main text follows the project's default rendering for πίστις.
    reason: alternative_reading
  - marker: b
    text: The older Masada Hebrew witness appears to reflect a reading related to
      'loan' where the Greek has 'gift.' The main text follows the Zone 1 Greek source
      (δῶρον), but the Hebrew evidence suggests an ancient variation in the underlying
      text.
    reason: textual_variant
lexical_decisions:
- source_word: πᾶν
  chosen: every
  alternatives:
  - all
  lexicon: LSJ
  rationale: 'The distributive sense fits the singular nouns that follow: each such
    gift and each act/state of injustice is in view.'
- source_word: δῶρον
  chosen: gift
  alternatives:
  - present
  - offering
  - bribe
  lexicon: LSJ
  rationale: The Greek normally means 'gift.' Although the Hebrew consult tradition
    suggests a reading related to 'loan,' the Zone 1 Greek witness reads δῶρον, and
    the translation must remain anchored there. 'Bribe' would over-interpret without
    clearer contextual marking in the Greek.
- source_word: ἀδικία
  chosen: injustice
  alternatives:
  - wrongdoing
  - unrighteousness
  - wickedness
  lexicon: LSJ
  rationale: In this wisdom context, 'injustice' preserves the ethical and social
    force of ἀδικία without importing specifically Pauline overtones that 'righteousness/unrighteousness'
    can carry.
- source_word: ἐξαλειφθήσεται
  chosen: will be wiped away
  alternatives:
  - will be blotted out
  - will be erased
  lexicon: LSJ
  rationale: The verb conveys removal/erasure. 'Wiped away' is natural modern English
    and preserves the image of something being effaced.
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: LSJ
  rationale: Per doctrine, the default rendering is 'faith.' In this wisdom setting,
    'faithfulness' is also plausible, but the project default is retained in the main
    text and the alternative is preserved in a footnote.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for eternity
  lexicon: LSJ
  rationale: This idiom commonly denotes enduring permanence. 'Forever' is the clearest
    idiomatic English equivalent.
- source_word: στήσεται
  chosen: will stand
  alternatives:
  - will endure
  - will remain established
  lexicon: LSJ
  rationale: '''Will stand'' keeps the concrete metaphor of firmness/endurance present
    in the Greek.'
