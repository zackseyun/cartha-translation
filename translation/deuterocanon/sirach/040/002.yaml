theological_decisions:
- issue: Metaphorical expression for death in 'the mother of all the living'
  chosen_reading: Retain the Hebrew metaphor in the main text rather than replacing
    it with an explicit interpretive gloss like 'the earth' or 'death.'
  alternative_readings:
  - the earth
  - the grave
  rationale: The Hebrew witness is primary here and uses a poetic maternal metaphor.
    The Greek parallel expands the surrounding thought toward fear, expectation, and
    'the day of death,' which supports understanding this line as the endpoint of
    mortal life. Preserving the metaphor maintains the literary force while a footnote
    can clarify the likely sense.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    tension rather than over-resolve.'
