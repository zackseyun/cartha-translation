translation:
  text: from the day he comes out of his mother's womb until the day he returns to
    the mother of all living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literally, ''to the mother of all the living''—a poetic expression likely
      referring to the earth as the common mother to which humans return in death.
      The Greek parallel makes the death reference explicit: ''the day of death.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מיום
  chosen: from the day
  alternatives:
  - since the day
  - from the time
  lexicon: HALOT
  rationale: The preposition מן with יום marks the starting point of a span. 'From
    the day' preserves the temporal boundary clearly and naturally in English.
- source_word: צאתו
  chosen: he comes out
  alternatives:
  - his going out
  - his birth
  lexicon: HALOT
  rationale: The infinitive/nominal form from יצא literally means 'his going out.'
    In context with 'from his mother's womb' it refers to birth. 'He comes out' keeps
    the concrete imagery of the Hebrew better than the more abstract 'his birth,'
    while remaining readable.
- source_word: מרחם אמו
  chosen: from his mother's womb
  alternatives:
  - out of his mother's womb
  lexicon: HALOT
  rationale: A straightforward rendering of the Hebrew phrase. 'Womb' preserves the
    bodily concreteness and birth imagery.
- source_word: עד יום
  chosen: until the day
  alternatives:
  - to the day
  lexicon: HALOT
  rationale: Marks the endpoint of the same life-span expression; 'until the day'
    is idiomatic and mirrors the Hebrew structure.
- source_word: שובו
  chosen: he returns
  alternatives:
  - his return
  - he goes back
  lexicon: HALOT
  rationale: From שוב, 'return.' The verbal rendering fits the parallel with 'he comes
    out' and keeps the life-to-death movement vivid.
- source_word: אל אם כל חי
  chosen: to the mother of all the living
  alternatives:
  - to the mother of every living thing
  - to mother earth
  lexicon: HALOT
  rationale: The Hebrew is metaphorical. Literally it is 'to the mother of all living.'
    In context it refers to the earth as the common mother to which humans return
    in death. The chosen rendering stays close to the Hebrew metaphor without importing
    the interpretive paraphrase 'earth' into the main text. The Greek parallel's reference
    to 'the day of death' confirms the death-oriented sense.
