lexical_decisions:
- source_word: על רשע
  chosen: For the wicked
  alternatives:
  - Against the wicked
  - Upon the wicked
  - For a wicked man
  lexicon: HALOT
  rationale: The preposition על can mark relation such as 'for/upon/against.' In context,
    with the parallel Greek ἐπὶ τοὺς ἀνόμους and the following statement about evil
    being created in relation to the wicked, 'for the wicked' best captures the sense
    without overcommitting to punitive direction alone. The singular רשע is plausibly
    collective/generic, so English plural 'the wicked' is natural and preserves the
    representative force.
- source_word: נבראה רעה
  chosen: evil was created
  alternatives:
  - calamity was created
  - disaster was created
  - harm was created
  lexicon: HALOT
  rationale: רעה can denote moral evil or experiential calamity/disaster. In wisdom
    literature and in this judgment context, 'evil' is the most literal and broad
    rendering, allowing the reader to hear both the ominous and punitive sense. 'Calamity'
    is possible, but the Hebrew does not force that narrowing.
- source_word: ובעבור
  chosen: and because of them
  alternatives:
  - and on account of them
  - and for their sake
  lexicon: HALOT
  rationale: 'בעבור commonly means ''because of/on account of.'' The suffix is not
    explicit in the Hebrew phrase as cited, but the sense is clarified by the Greek
    δι’ αὐτούς, which supports supplying the plural referent in English from context:
    the wicked are the cause.'
- source_word: תמוש
  chosen: will cease
  alternatives:
  - will depart
  - will come to an end
  - will be removed
  lexicon: HALOT
  rationale: מוש commonly carries the sense of moving away, departing, or ceasing.
    Given the object implied by context and the collocation with כלה, 'will cease'
    gives a clear English expression while preserving the verbal idea of ending/removal.
- source_word: כלה
  chosen: only when it is complete
  alternatives:
  - completely
  - utterly
  - to completion
  - destruction
  lexicon: HALOT
  rationale: 'כלה can function as a noun (''completion, end, destruction'') or adverbially/verbally
    in the sense of complete consumption. The Hebrew wording is compressed and somewhat
    difficult. The Greek parallel instead reads ''the flood came to be because of
    them,'' indicating a different textual development. To stay anchored in the Hebrew
    while making sense of the clause, the translation takes כלה as the point of full
    completion: the ceasing/removal is not before total completion. This preserves
    the terse Hebrew without importing the Greek''s explicit ''flood'' into the main
    text.'
