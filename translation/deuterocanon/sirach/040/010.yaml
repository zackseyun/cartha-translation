theological_decisions:
- issue: Whether רעה should be rendered as moral 'evil' or punitive 'calamity/disaster'
  chosen_reading: evil
  alternative_readings:
  - calamity
  - disaster
  rationale: The Hebrew term is semantically broad. The verse speaks of what is created
    in relation to the wicked, and the broader context concerns afflictive realities
    appointed in the world. 'Evil' is retained in the main text as the more formally
    transparent rendering, while the lexical alternatives are preserved for auditability.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
- issue: How to handle the divergence between the Hebrew final clause and the Greek
    parallel mentioning the flood
  chosen_reading: Translate the Hebrew main text and preserve the Greek-based alternative
    in a footnote
  alternative_readings:
  - and because of them the flood came to be
  rationale: For Sirach, where Hebrew survives, the project translates from the Hebrew
    witness while using the Greek parallel as actual input and consistency check.
    Here the final clause in Hebrew is terse and differs materially from the Greek.
    The main text therefore follows the Hebrew, but the Greek reading is preserved
    in a footnote as a significant alternative tradition.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Swete Greek as parallel input.'
