translation:
  text: The fear of God is like a garden of blessing, and it covers one more than
    any glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'like Eden of blessing'; the Greek parallel reads 'like a paradise
      of blessing.' The translation uses 'garden' to convey the Eden/paradise image
      in clear English.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is difficult in concise Hebrew. The Greek parallel supports
      the sense of protective covering: ''and it covered him more than any glory.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְאַת אֱלֹהִים
  chosen: the fear of God
  alternatives:
  - fear of the Lord
  - reverence for God
  lexicon: HALOT
  rationale: The Hebrew witness reads 'fear of God,' and this is the plain sense.
    'Fear' is retained rather than softened to 'reverence' in order to preserve the
    biblical idiom, though reverential awe is included in the sense. 'God' follows
    the Hebrew אֱלֹהִים; the Greek parallel has 'Lord,' but the Hebrew is primary
    where extant.
- source_word: כְּעֵדֶן בְּרָכָה
  chosen: like a garden of blessing
  alternatives:
  - like Eden of blessing
  - like a paradise of blessing
  lexicon: HALOT
  rationale: The Hebrew כעדן naturally evokes Eden/delight; the Greek parallel renders
    it with παράδεισος, confirming a garden/paradise image. 'Garden of blessing' communicates
    the Edenic image in readable English without requiring the reader to infer the
    metaphor from the proper name alone. 'Paradise' is possible from the Greek, but
    the Hebrew witness is primary.
- source_word: וְעַל כָּל כָּבוֹד
  chosen: more than any glory
  alternatives:
  - above all glory
  - beyond every honor
  lexicon: HALOT
  rationale: The preposition על here is comparative in sense in light of the Greek
    ὑπὲρ πᾶσαν δόξαν. 'More than any glory' gives natural English while preserving
    the comparison.
- source_word: חָפְתָה
  chosen: it covers one
  alternatives:
  - it shelters one
  - it protects one
  - it overshadowed him
  lexicon: HALOT
  rationale: The Hebrew form points to covering/protecting, and the Greek ἐκάλυψαν
    αὐτόν likewise supports 'cover.' Because the Hebrew subject is singular feminine
    ('fear of God') but the Greek object is singular masculine ('him/it'), the sense
    is that the fear of God provides protective covering. 'Covers one' expresses the
    protective metaphor in idiomatic English while avoiding an overly specific masculine
    object not explicit in the Hebrew line as given.
