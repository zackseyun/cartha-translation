theological_decisions:
- issue: Divine title in the main text
  chosen_reading: God
  alternative_readings:
  - Lord
  rationale: The Hebrew witness for Sirach survives here and reads אֱלֹהִים ('God').
    Although the Greek parallel has Κυρίου ('Lord'), the project's philosophy gives
    primacy to the original-language witness available for Sirach, namely the Hebrew
    where extant. The Greek is still used to confirm the comparative and protective
    imagery.
  doctrine_reference: Translation philosophy §1; Contested terms table (κύριος / YHWH)
