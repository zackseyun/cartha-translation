translation:
  text: And with all flesh their anxiety is with them, and their wealth drives away
    their sleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''with all flesh, from man to beast, and upon sinners sevenfold
      more than these.'' This fuller wording is not present in the extant Hebrew line
      used here.'
    reason: alternative_reading
lexical_decisions:
- source_word: ועם כל בשר
  chosen: And with all flesh
  alternatives:
  - And among all flesh
  - With every living being
  lexicon: HALOT
  rationale: Hebrew בשר here is a collective for living creatures/humanity in embodied
    existence. The phrase is retained fairly literally as 'all flesh,' matching the
    Hebrew witness while remaining intelligible. The Greek parallel expands the scope
    explicitly from human to beast, confirming the broad collective sense.
- source_word: דאגתם
  chosen: their anxiety
  alternatives:
  - their worry
  - their care
  - their concern
  lexicon: HALOT
  rationale: The noun from דאג conveys anxious concern or worry. 'Anxiety' best captures
    the burdened tone in this wisdom context without becoming too colloquial. The
    pronominal suffix is preserved as 'their.'
- source_word: עמם
  chosen: is with them
  alternatives:
  - remains with them
  - is upon them
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'with them.' Rendering it as
    'is with them' supplies the implied copular sense in natural English while preserving
    the Hebrew image of anxiety accompanying people.
- source_word: ועשרם
  chosen: and their abundance
  alternatives:
  - and their wealth
  - and their riches
  lexicon: HALOT
  rationale: The consonantal text points to עֹשֶׁר, 'riches/wealth.' 'Abundance' is
    slightly broader and fits the poetic line, though 'wealth' is a close alternative.
    The line's sense is that possessions themselves become a source of unrest.
- source_word: מניד שנתם
  chosen: drives away their sleep
  alternatives:
  - disturbs their sleep
  - shakes their sleep away
  - keeps them from sleeping
  lexicon: HALOT
  rationale: The participial/verbal idea from נוד/ניד suggests causing movement or
    disturbance; with 'sleep' as object, the idiomatic sense is that sleep is unsettled
    or driven off. 'Drives away their sleep' preserves the vividness better than a
    flatter paraphrase.
- source_word: μετὰ πάσης σαρκὸς ἀπὸ ἀνθρώπου ἕως κτήνους
  chosen: all flesh
  alternatives:
  - from man to beast
  - every creature
  lexicon: BDAG
  rationale: The Greek parallel clarifies that 'all flesh' is comprehensive, extending
    from humans to animals. This supports retaining the Hebrew's compact phrase while
    recognizing its broad scope.
- source_word: ἐπὶ ἁμαρτωλῶν ἑπταπλάσια πρὸς ταῦτα
  chosen: not adopted in main text
  alternatives:
  - and upon sinners sevenfold more than these
  lexicon: BDAG
  rationale: The Greek parallel contains an additional clause absent from the extant
    Hebrew line. Because the project prioritizes the surviving Hebrew for Sirach where
    available, the shorter Hebrew-based text is kept in the main line, while the Greek
    expansion is preserved in a footnote as a significant alternative witness.
