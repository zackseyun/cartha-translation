    text: αὐλὸς καὶ ψαλτήριον ἡδύνουσιν μέλη, καὶ ὑπὲρ ἀμφότερα γλῶσσα ἡδεῖα.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:21
translation:
  text: Flute and harp make song sweet, but better than both is a pure tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and beyond both, a sweet tongue'' or ''pleasant speech.'''
    reason: alternative_reading
lexical_decisions:
- source_word: חליל
  chosen: flute
  alternatives:
  - pipe
  lexicon: HALOT
  rationale: The Hebrew denotes a wind instrument, commonly a flute or pipe. 'Flute'
    is the clearest modern English equivalent and aligns with the Greek αὐλός as a
    reed/wind instrument used in music.
- source_word: נבל
  chosen: harp
  alternatives:
  - lyre
  - lute
  lexicon: HALOT
  rationale: The instrument is a stringed instrument; English tradition varies between
    'harp' and 'lyre.' 'Harp' fits common biblical usage and pairs naturally with
    'flute,' while the Greek ψαλτήριον confirms a plucked string instrument.
- source_word: יעריבו
  chosen: make ... sweet
  alternatives:
  - sweeten
  - make pleasant
  lexicon: HALOT
  rationale: From ערב in the sense of being pleasant/sweet. In context of music and
    song, an idiomatic English rendering is that the instruments 'make song sweet.'
    This preserves the causative nuance better than a flat 'are pleasant.'
- source_word: שיר
  chosen: song
  alternatives:
  - music
  - melody
  lexicon: HALOT
  rationale: The noun can denote song or singing. 'Song' is the most direct equivalent;
    the Greek μέλη ('songs/melodies') supports a musical-vocal sense.
- source_word: ומשניהם
  chosen: better than both
  alternatives:
  - and beyond both of them
  - and more than both
  lexicon: HALOT
  rationale: Literally 'and from/beyond the two of them.' In English comparison, 'better
    than both' expresses the intended evaluative contrast clearly and is supported
    by the Greek ὑπὲρ ἀμφότερα.
- source_word: לשון
  chosen: tongue
  alternatives:
  - speech
  - language
  lexicon: HALOT
  rationale: The Hebrew literally says 'tongue.' Here it refers metonymically to speech,
    but retaining 'tongue' preserves the concrete imagery and matches the Greek γλῶσσα.
- source_word: ברה
  chosen: pure
  alternatives:
  - clear
  - clean
  - pleasant
  lexicon: HALOT
  rationale: The adjective most naturally means 'pure/clean.' Although the Greek has
    ἡδεῖα ('sweet/pleasant'), the Hebrew witness is primary here and likely speaks
    of morally or qualitatively pure speech rather than merely pleasing speech. 'Pure'
    preserves the Hebrew's sharper ethical nuance.
