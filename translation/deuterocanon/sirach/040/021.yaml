theological_decisions:
- issue: Hebrew-Greek nuance in the final phrase
  chosen_reading: a pure tongue
  alternative_readings:
  - a sweet tongue
  - pleasant speech
  rationale: The primary witness is the extant Hebrew, which reads לשון ברה, most
    naturally 'a pure tongue.' The Greek parallel reads 'a sweet/pleasant tongue,'
    likely reflecting either an interpretive rendering or a variant understanding.
    Following project policy, the Hebrew is primary where it survives, while the Greek
    is used as a consistency check and preserved in a footnote as a meaningful alternative
    nuance.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
