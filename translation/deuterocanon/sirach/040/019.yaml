id: SIR.40.19
reference: Sirach 40:19
source:
  edition: sefaria-ben-sira-kahana
  text: ילד ועיר יעמידו שם, ומשניהם מוצא חכמה.<br><small>(יט)</small> שגר ונטע יפריחו
    שם, ומשניהם אשה נחשקת.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: τέκνα καὶ οἰκοδομὴ πόλεως στηρίζουσιν ὄνομα, καὶ ὑπὲρ ἀμφότερα γυνὴ ἄμωμος
      λογίζεται.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:19
translation:
  text: Children and the building of a city establish a name, but better than both
    is a blameless wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Cairo Geniza text reads approximately, 'and from both of them comes
      wisdom'; the Greek parallel instead reads, 'but better than both is a blameless
      wife.' The Hebrew of this colon appears textually uncertain, so the main text
      follows the clearer Greek-supported sense.
    reason: alternative_reading
  - marker: b
    text: The older Masada scroll is fragmentary here and does not preserve enough
      of the line to settle the final wording with confidence.
    reason: textual_variant
lexical_decisions:
- source_word: ילד
  chosen: Children
  alternatives:
  - A child
  - Offspring
  lexicon: HALOT
  rationale: Hebrew ילד here functions collectively in a wisdom-style list; the Greek
    τέκνα confirms a plural/collective sense. 'Children' is the most natural English
    rendering.
- source_word: ועיר יעמידו שם
  chosen: the building of a city establish a name
  alternatives:
  - a city establish a name
  - founding a city establish renown
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult, but in light of the Greek οἰκοδομὴ
    πόλεως ('building of a city'), the sense is that civic construction/founding secures
    reputation. 'Establish a name' preserves the idiom שם with יעמידו.
- source_word: שם
  chosen: a name
  alternatives:
  - renown
  - reputation
  lexicon: HALOT
  rationale: Hebrew 'name' often carries the sense of reputation or lasting renown.
    I kept the literal 'name' to preserve the idiom while remaining intelligible in
    English.
- source_word: ומשניהם
  chosen: but better than both
  alternatives:
  - and beyond both
  - and more than both
  lexicon: HALOT
  rationale: The Hebrew phrase means 'from/beyond the two of them,' and the Greek
    ὑπὲρ ἀμφότερα supports a comparative sense. 'Better than both' expresses the evaluative
    comparison clearly in English.
- source_word: מוצא חכמה
  chosen: is a blameless wife
  alternatives:
  - the finding of wisdom
  - wisdom is found
  lexicon: HALOT
  rationale: The Cairo Geniza Hebrew reads מוצא חכמה, but this appears textually unstable
    in context. The Greek parallel reads γυνὴ ἄμωμος ('a blameless wife'), which also
    matches the second colon pattern in the Hebrew line pair and the likely original
    sense. Because the Hebrew witness here is problematic and the Greek is explicit,
    the main text follows the Greek-supported sense, with the Hebrew reading preserved
    in a footnote.
- source_word: γυνὴ ἄμωμος
  chosen: a blameless wife
  alternatives:
  - an irreproachable woman
  - a faultless wife
  lexicon: BDAG
  rationale: Used as a control on the difficult Hebrew. 'Blameless wife' is concise,
    idiomatic, and preserves the moral quality conveyed by ἄμωμος without overstating
    sinlessness.
