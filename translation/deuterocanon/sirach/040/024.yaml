id: SIR.40.24
reference: Sirach 40:24
source:
  edition: sefaria-ben-sira-kahana
  text: אח ושותף לעת צרה, ומשניהם צדק מצלת.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἀδελφοὶ καὶ βοήθεια εἰς καιρὸν θλίψεως, καὶ ὑπὲρ ἀμφότερα ἐλεημοσύνη ῥύσεται.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:24
translation:
  text: A brother and a partner are for a time of trouble, but righteousness delivers
    more than both.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and almsgiving/mercy will rescue more than both.'' The
      Hebrew witness reads ''righteousness'' here.'
    reason: alternative_reading
lexical_decisions:
- source_word: אח
  chosen: brother
  alternatives:
  - kinsman
  - friend
  lexicon: HALOT
  rationale: The Hebrew plainly denotes a brother. Although it can extend to kin or
    close associate, the parallel with 'partner' favors retaining the concrete familial
    term rather than broadening it.
- source_word: ושותף
  chosen: and a partner
  alternatives:
  - associate
  - companion
  lexicon: HALOT
  rationale: The noun denotes one who shares or participates with another. 'Partner'
    best captures the practical, mutual-support sense in context and aligns with the
    Greek's second supportive element, though the Greek witness reads 'help' rather
    than a personal noun.
- source_word: לעת צרה
  chosen: for a time of trouble
  alternatives:
  - in time of distress
  - for a time of affliction
  lexicon: HALOT
  rationale: The phrase indicates usefulness in a crisis. 'Trouble' is natural modern
    English and broad enough to cover distress/affliction without sounding overly
    technical.
- source_word: ומשניהם
  chosen: more than both
  alternatives:
  - than both of them
  - beyond both
  lexicon: HALOT
  rationale: 'The comparative sense is explicit: what follows surpasses the value
    of the two preceding supports. ''More than both'' is concise and idiomatic.'
- source_word: צדק
  chosen: righteousness
  alternatives:
  - justice
  - charity/almsgiving
  lexicon: HALOT
  rationale: The Hebrew witness reads צדק, whose normal sense is 'righteousness' or
    'justice.' Because the Greek parallel has ἐλεημοσύνη ('almsgiving, mercy'), an
    alternative must be preserved in a footnote. The Hebrew is the primary witness
    here, so the main text follows its plain sense. 'Righteousness' is preferred over
    'justice' because the saying contrasts moral quality with social supports in a
    broad wisdom context, not specifically judicial action.
- source_word: מצלת
  chosen: delivers
  alternatives:
  - rescues
  - saves
  lexicon: HALOT
  rationale: The verb means to snatch away or rescue. 'Delivers' fits wisdom-style
    English and avoids importing heavier soteriological overtones that 'saves' might
    suggest.
