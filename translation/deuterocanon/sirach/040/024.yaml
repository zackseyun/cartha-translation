theological_decisions:
- issue: Hebrew צדק versus Greek ἐλεημοσύνη in the climactic comparison
  chosen_reading: Follow the Hebrew main text with 'righteousness,' while preserving
    'almsgiving/mercy' as an alternative in a footnote from the Greek parallel.
  alternative_readings:
  - almsgiving delivers more than both
  - mercy delivers more than both
  rationale: Zone 1 gives a surviving Hebrew witness, which has primacy for extant
    Hebrew Sirach under project philosophy. However, the Greek parallel is significantly
    different at this point and may reflect either a variant Vorlage or an interpretive
    rendering. Because the difference affects the ethical emphasis of the verse, the
    Greek alternative should be preserved transparently in a footnote rather than
    suppressed.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; DOCTRINE.md:
    preserve theological tension rather than resolve it silently.'
