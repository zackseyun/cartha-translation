translation:
  text: Great toil is allotted, and a heavy burden upon the children of man—from the
    day they come forth from their mother’s womb until the day they return to the
    mother of all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''a heavy yoke upon the sons of Adam.'' The Hebrew is more compressed
      here; ''heavy burden'' reflects the sense without forcing the exact metaphor
      into the main text.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel expands the verse: ''from the day they come forth from
      their mother’s womb until the day of burial in the mother of all.'' The Hebrew
      witness here is shorter.'
    reason: alternative_reading
  - marker: c
    text: '''The mother of all'' is a figurative way of referring to the earth as
      the common destination of burial.'
    reason: cultural_note
lexical_decisions:
- source_word: עסק גדול
  chosen: Great toil
  alternatives:
  - great occupation
  - great trouble
  - great busyness
  lexicon: HALOT
  rationale: The Hebrew phrase denotes burdensome occupation or troublesome labor.
    'Toil' best captures the weighty, wearisome sense in natural English, and aligns
    with the Greek ἀσχολία μεγάλη ('great trouble/toil').
- source_word: חלק אל
  chosen: is allotted
  alternatives:
  - is apportioned by God
  - is a portion from God
  - is assigned
  lexicon: HALOT
  rationale: The Hebrew as transmitted is compressed and somewhat difficult. Taken
    with חלק as 'portion/allotment,' the sense is that this burden is assigned as
    humanity's lot. The Greek parallel has ἔκτισται παντὶ ἀνθρώπῳ ('has been created
    for every human'), which supports a general statement about the human condition
    rather than an explicit naming of God as subject. 'Is allotted' preserves the
    Hebrew sense without over-specifying a divine subject absent from the Greek wording.
- source_word: ועל כבד
  chosen: and a heavy burden
  alternatives:
  - and it is heavy
  - and a heavy yoke
  - and a weighty load
  lexicon: HALOT
  rationale: The Hebrew is elliptical; the Greek parallel clarifies with ζυγὸς βαρύς
    ('a heavy yoke'). 'Heavy burden' communicates the metaphor clearly in contemporary
    English while remaining faithful to both witnesses.
- source_word: על בני אדם
  chosen: upon the children of man
  alternatives:
  - upon humankind
  - upon human beings
  - upon the sons of Adam
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'upon the sons/children of man.' Following
    the project's gender-accurate policy and the Greek υἱοὺς Ἀδάμ, 'children of man'
    preserves the anthropological, Adamic flavor better than a flattened 'humanity,'
    while remaining understandable.
- source_word: ἀφʼ ἡμέρας ἐξόδου ἐκ γαστρὸς μητρὸς αὐτῶν
  chosen: from the day they come forth from their mother’s womb
  alternatives:
  - from the day of their birth
  - from the day they leave their mother’s womb
  lexicon: BDAG
  rationale: This temporal clause is present in the Greek parallel and appears to
    preserve fuller wording than the abbreviated Hebrew line. 'Come forth from their
    mother’s womb' is vivid and close to the source without sounding archaic.
- source_word: ἕως ἡμέρας ἐπὶ ταφῇ εἰς μητέρα πάντων
  chosen: until the day they return to the mother of all
  alternatives:
  - until the day of burial in the mother of all
  - until the day they are buried in the mother of all
  lexicon: BDAG
  rationale: The Greek supplies the closing limit of the statement. 'Mother of all'
    is a metaphor for the earth/ground receiving the dead. 'Return' makes the idiom
    intelligible in English while preserving the image; the burial sense is retained
    by context and noted in a footnote.
