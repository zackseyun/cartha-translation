theological_decisions:
- issue: Use of the fuller Greek parallel alongside the shorter Hebrew witness
  chosen_reading: Translate the verse as a complete statement using the Hebrew opening
    and the Greek continuation about birth and burial.
  alternative_readings:
  - Translate only the shorter Hebrew clause without the birth-to-burial expansion
  - Render the line strictly from Greek alone
  rationale: Per project policy for Sirach, the Hebrew is primary where it survives,
    but the Greek parallel is to be used as actual translation input. Here the Hebrew
    gives the core assertion, while the Greek preserves a fuller form that coheres
    naturally with it. The resulting English remains anchored in the Hebrew while
    honestly reflecting the fuller parallel witness.
  doctrine_reference: 'PHILOSOPHY.md: Sirach translated from Hebrew where it survives,
    with Greek parallel used alongside it'
- issue: Anthropological expression בני אדם / υἱοὶ Ἀδάμ
  chosen_reading: children of man
  alternative_readings:
  - humankind
  - sons of Adam
  rationale: This preserves the source's masculine representative expression without
    flattening it into a purely abstract collective. It also keeps the Adamic resonance
    visible, in line with the project's gender-accurate policy.
  doctrine_reference: DOCTRINE.md §4; Contested terms table for אָדָם
