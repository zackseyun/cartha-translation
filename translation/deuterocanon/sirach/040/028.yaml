id: SIR.40.28
reference: Sirach 40:28
source:
  edition: sefaria-ben-sira-kahana
  text: חיי מכי מתן אל תחי, טוב נאסף כמסתולל.<br>[א כל ימי עני רעים, בן סירא אומר
    אף לילות.<br>ב בשפל גנים גנו, ובמרום הרים כרמו.<br>ג ממטר גנים לגנו, ומעפר כרמו
    לכרמים.]
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: τέκνον, ζωὴν ἐπαιτήσεως μὴ βιώσῃς· κρεῖσσον ἀποθανεῖν ἢ ἐπαιτεῖν.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:28
translation:
  text: My child, do not live the life of a beggar; it is better to die than to beg.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads literally something like 'the life of מכי מתן'; the expression
      is difficult, but the Greek parallel clarifies the sense as living by begging
      or alms-seeking.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''to be gathered'' is an idiom for death; compare the Greek parallel,
      which states the sense explicitly: ''to die.'''
    reason: alternative_reading
lexical_decisions:
- source_word: חיי
  chosen: the life of
  alternatives:
  - life of
  - lives of
  lexicon: HALOT
  rationale: Construct form of 'life/lives' used idiomatically to denote a mode or
    condition of living, not multiple discrete lives. English 'the life of' best captures
    the idiom.
- source_word: מכי מתן
  chosen: a beggar
  alternatives:
  - one who is struck down by gift-seeking
  - one dependent on alms
  - one who begs
  lexicon: HALOT
  rationale: The Hebrew is difficult, but in context and in light of the Greek ἐπαιτήσεως/ἐπαιτεῖν,
    it refers to living by soliciting gifts or alms. 'Beggar' gives the plain sense
    in natural English.
- source_word: אל תחי
  chosen: do not live
  alternatives:
  - do not keep living
  - do not live out
  lexicon: HALOT
  rationale: Straightforward negative imperative from חיה. English 'do not live' is
    both formal enough and idiomatic.
- source_word: טוב
  chosen: it is better
  alternatives:
  - better
  - good is
  lexicon: HALOT
  rationale: 'Used comparatively in the Hebrew clause and matched by Greek κρεῖσσον.
    English requires an explicit predicative form: ''it is better''.'
- source_word: נאסף
  chosen: to die
  alternatives:
  - to be gathered
  - to pass away
  lexicon: HALOT
  rationale: Literally 'to be gathered,' a Hebrew idiom for death. Since the Greek
    parallel explicitly reads 'to die' (ἀποθανεῖν), the idiomatic sense should be
    brought into the main text rather than preserved woodenly.
- source_word: כמסתולל
  chosen: than to beg
  alternatives:
  - than to wander about in want
  - than to be a mendicant
  - than to live by importuning
  lexicon: HALOT
  rationale: The Hebrew form is obscure, but the Greek parallel ἐπαιτεῖν strongly
    supports the sense 'to beg.' This yields a balanced translation anchored in the
    Hebrew while using the Greek as an actual control on the difficult word.
- source_word: τέκνον
  chosen: My child
  alternatives:
  - Child
  - Son
  lexicon: BDAG
  rationale: The Greek includes a vocative absent from the extant Hebrew line. Because
    the parallel Greek is to be used as translation input and the address is integral
    to the verse's discourse tone, 'My child' is included in the main text.
