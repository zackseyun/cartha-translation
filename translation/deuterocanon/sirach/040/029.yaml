id: SIR.40.29
reference: Sirach 40:29
source:
  edition: sefaria-ben-sira-kahana
  text: איש משגיח על שלחן זר, אין חייו למנות חיים.<br><small>(כט)</small> מעוג לנפש
    מטעמו, לאיש יודע סוד מעים.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἀνὴρ βλέπων εἰς ἀλλοτρίαν τράπεζαν οὐκ ἔχει βίον ἐν λογισμῷ ζωῆς, ἀλισγήσει
      ψυχὴν αὐτοῦ ἐν ἐδέσμασιν ἀλλοτρίοις· ἀνὴρ δὲ ἐπιστήμων καὶ πεπαιδευμένος φυλάξεται.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:29
translation:
  text: A man who watches another’s table—his life is not to be counted as life; he
    defiles his appetite with another man’s delicacies, but a man who knows inward
    restraint will beware.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'another’s table'; the Greek likewise has 'a table belonging to another.'
      The point is dependence on someone else’s provisions, not necessarily a foreign
      ethnicity.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew of the final line is difficult: literally something like ''a
      man knowing the secret of the inward parts.'' The Greek interprets it as ''a
      knowledgeable and educated man will guard himself,'' which supports the sense
      of inward discipline or prudent restraint.'
    reason: alternative_reading
lexical_decisions:
- source_word: איש
  chosen: A man
  alternatives:
  - A person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions as a representative
    individual. Per doctrine, gender-accurate rendering is preferred over flattening
    to a neutral term.
- source_word: משגיח
  chosen: watches
  alternatives:
  - looks to
  - depends on
  - eyes
  lexicon: HALOT
  rationale: The participle conveys looking toward or watching. 'Watches' preserves
    the image of a person attentively looking to another's table, with an implied
    dependence reinforced by context.
- source_word: שלחן זר
  chosen: another’s table
  alternatives:
  - a stranger's table
  - an чужой table
  - a foreign table
  lexicon: HALOT
  rationale: זר can mean 'strange/foreign/another's.' In this wisdom context the sense
    is dependence on someone else's provisions rather than ethnic foreignness, so
    'another’s table' is the clearest idiomatic rendering. The Greek ἀλλοτρίαν τράπεζαν
    supports 'another's/belonging to another.'
- source_word: אין חייו למנות חיים
  chosen: his life is not to be counted as life
  alternatives:
  - his life is not worth counting as life
  - he does not have a life worth calling life
  lexicon: HALOT
  rationale: This clause is idiomatic and emphatic. A relatively formal rendering
    preserves the Hebrew wordplay on 'life' without over-paraphrasing. The Greek likewise
    reflects 'does not have life in the reckoning of life.'
- source_word: מעוג לנפש מטעמו
  chosen: he defiles his appetite with another man’s delicacies
  alternatives:
  - he soils his soul with another's food
  - he pollutes himself with foreign dishes
  lexicon: HALOT
  rationale: The Hebrew is difficult, but in light of the Greek ἀλισγήσει ψυχὴν αὐτοῦ
    ἐν ἐδέσμασιν ἀλλοτρίοις, the sense is that dependence on another's table degrades
    or defiles the self through чужие delicacies. 'Appetite' captures נפש idiomatically
    in a food context better than the more misleadingly spiritual 'soul.' 'Delicacies'
    reflects מטעמו/ἐδέσμασιν as choice foods.
- source_word: נפש
  chosen: appetite
  alternatives:
  - soul
  - self
  lexicon: HALOT
  rationale: In a context of eating and table fellowship, נפש naturally extends to
    appetite or the self as eater. This avoids importing a narrower immaterial-soul
    sense not demanded by the verse.
- source_word: לאיש יודע סוד מעים
  chosen: a man who knows inward restraint will beware
  alternatives:
  - a man who knows the secret of the belly will guard himself
  - a discerning and instructed man will be on guard
  lexicon: HALOT
  rationale: The Hebrew phrase is obscure. Literally it refers to one who knows the
    'secret/counsel of the inward parts.' The Greek interprets the line as 'a knowledgeable
    and educated man will guard himself.' 'Inward restraint' aims to preserve the
    Hebrew's internal-control imagery while yielding readable English and matching
    the Greek sense of prudent self-guarding.
- source_word: סוד מעים
  chosen: inward restraint
  alternatives:
  - the secret of the inward parts
  - inner counsel
  - what the belly requires
  lexicon: HALOT
  rationale: This is the main crux of the verse. A too-literal rendering would be
    opaque in English; a too-free rendering would erase the Hebrew imagery. 'Inward
    restraint' communicates internal discipline, which fits both the Hebrew body-language
    and the Greek's interpretive paraphrase.
- source_word: φυλάξεται
  chosen: will beware
  alternatives:
  - will guard himself
  - will keep watch
  lexicon: BDAG
  rationale: The Greek parallel clarifies the final colon as prudent self-protection.
    'Will beware' is concise modern English and fits the wisdom context.
