theological_decisions:
- issue: Use of Hebrew over Greek where the two differ in emphasis
  chosen_reading: Translate the first colon from the Hebrew as 'The offspring of violence
    will not go unpunished' while allowing the Greek to inform the imagery and confirm
    the general warning about wicked lineage.
  alternative_readings:
  - The offspring of the ungodly will not multiply branches
  rationale: The project philosophy gives primacy to the extant Hebrew of Sirach.
    Here the Greek parallel differs notably in wording, but it supports the broader
    metaphor of corrupt offspring and unstable rooting. The main text therefore follows
    the Hebrew while preserving the Greek-aligned alternative in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    use Greek parallel as actual input'
