translation:
  text: The offspring of violence will not go unpunished, for the root of the godless
    is on a jagged crag.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''The offspring of the ungodly will not multiply branches,
      and unclean roots are upon a sharply cut rock.'' This supports the image of
      corrupt growth but differs from the surviving Hebrew wording.'
    reason: alternative_reading
  - marker: b
    text: The final phrase is difficult Hebrew. Literally, it evokes a 'tooth' of
      rock—that is, a sharp rocky projection or crag.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוצר
  chosen: offspring
  alternatives:
  - what is produced
  - issue
  - that which springs from
  lexicon: HALOT
  rationale: From the Hebrew witness, the form is best taken in context as that which
    is produced or springs forth; the Greek parallel ἔκγονα strongly supports the
    sense 'offspring/progeny' rather than a verbal idea like 'guarded.' 'Offspring'
    is natural English and preserves the image of descendants or products of violence.
- source_word: מחמס
  chosen: of violence
  alternatives:
  - from violence
  - of wrongdoing
  - of extortion
  lexicon: HALOT
  rationale: חמס commonly denotes violence, wrong, or ruthless injustice. 'Of violence'
    fits both the Hebrew construction and the Greek ἀσεβῶν only partially; since the
    Hebrew is primary here, 'violence' is retained as the sharper lexical value.
- source_word: לא ינקה
  chosen: will not go unpunished
  alternatives:
  - will not be cleared
  - will not be innocent
  - will not escape
  lexicon: HALOT
  rationale: The idiom נקה in the negative commonly means not being acquitted or left
    unpunished. 'Will not go unpunished' communicates the judicial force in clear
    modern English.
- source_word: שרש
  chosen: root
  alternatives:
  - roots
  lexicon: HALOT
  rationale: The Hebrew is singular, and the metaphor works well in English as 'the
    root.' The Greek has plural ῥίζαι, but the Hebrew witness is primary for Sirach
    where extant.
- source_word: חנף
  chosen: the godless
  alternatives:
  - the impious
  - the hypocrite
  - the profane
  lexicon: HALOT
  rationale: חנף can denote the godless or impious, and in some contexts the hypocritical.
    The Greek ἀκάθαρτοι / ἀσεβῶν in the parallel tradition points toward impiety/uncleanness
    rather than mere social hypocrisy. 'The godless' best captures the moral-religious
    force in accessible English.
- source_word: על שן תלע
  chosen: on a jagged crag
  alternatives:
  - upon a rocky tooth
  - on a sharp cliff
  - on a craggy rock
  lexicon: HALOT
  rationale: The phrase is difficult, but שן literally 'tooth' is often used metaphorically
    for a sharp crag or rocky projection; תלע likely denotes a craggy or steep rock
    formation. The Greek parallel ἐπ’ ἀκροτόμου πέτρας confirms the sense of a sharply
    cut rock. 'On a jagged crag' preserves the vivid image in idiomatic English.
