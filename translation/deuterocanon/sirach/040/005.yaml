translation:
  text: Yet envy, anxiety, and fear, and the dread of death, bring contention in abundance;
    and at the time of his rest upon his bed, the sleep of night changes his misery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew phrase rendered 'bring contention in abundance' is compressed
      and somewhat uncertain. The Greek parallel more explicitly lists additional
      disturbances such as anger and strife.
    reason: alternative_reading
  - marker: b
    text: Or 'changes his distress' or 'alters his trouble.' The Hebrew likely refers
      to the sufferer's afflicted condition, not moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: קנאה
  chosen: envy
  alternatives:
  - jealousy
  - zeal
  lexicon: HALOT
  rationale: In this context of inner torments paired with anxiety and fear, the negative
    sense 'envy/jealousy' fits the Hebrew and aligns with the Greek ζῆλος as a troubling
    passion rather than positive zeal.
- source_word: דאגה
  chosen: anxiety
  alternatives:
  - care
  - worry
  lexicon: HALOT
  rationale: The term denotes troubled concern; 'anxiety' is natural modern English
    and preserves the emotional weight better than the broader 'care'.
- source_word: פחד
  chosen: fear
  alternatives:
  - terror
  lexicon: HALOT
  rationale: A straightforward rendering that matches the Hebrew and the Greek φόβος
    without overstating the intensity.
- source_word: אימת מות
  chosen: the dread of death
  alternatives:
  - terror of death
  - fear of death
  lexicon: HALOT
  rationale: The construct phrase is idiomatically rendered as 'the dread of death.'
    This preserves the force of אימה while remaining readable.
- source_word: תחרה ורב
  chosen: bring contention in abundance
  alternatives:
  - stir up strife greatly
  - are many and contentious
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed and difficult, but the sense is of
    these passions producing much agitation/strife. The Greek's μηνίαμα καὶ ἔρις supports
    a rendering involving anger/strife. 'Bring contention in abundance' reflects the
    probable sense without overclaiming precision.
- source_word: ועת נוחו
  chosen: and at the time of his rest
  alternatives:
  - and when he rests
  - and in the hour of repose
  lexicon: HALOT
  rationale: This keeps the temporal nuance of עת while remaining idiomatic in English.
- source_word: על משכבו
  chosen: upon his bed
  alternatives:
  - on his couch
  lexicon: HALOT
  rationale: A direct and natural rendering of the Hebrew phrase.
- source_word: שינת לילה
  chosen: the sleep of night
  alternatives:
  - night sleep
  - sleep at night
  lexicon: HALOT
  rationale: This preserves the genitival form and the slightly elevated poetic cadence
    of the Hebrew.
- source_word: תשנה
  chosen: changes
  alternatives:
  - alters
  - disturbs
  lexicon: HALOT
  rationale: The verb means 'change/alter.' The Greek ἀλλοιοῖ confirms this sense.
    'Changes' is the most direct rendering.
- source_word: רעתו
  chosen: his misery
  alternatives:
  - his distress
  - his trouble
  - his evil
  lexicon: HALOT
  rationale: Here רעה refers to the person's afflicted condition rather than moral
    evil. 'Misery' best fits the context of troubled sleep and human suffering.
