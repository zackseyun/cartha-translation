- issue: Use of the Hebrew as primary witness with Greek parallel informing a difficult
    clause
  chosen_reading: Translate from the extant Hebrew, while allowing the Greek to clarify
    the compressed phrase תחרה ורב and the final clause about sleep altering the sufferer's
    condition.
  alternative_readings:
  - A more literal but opaque rendering of תחרה ורב
  - A Greek-led rendering expanding the list to include wrath and strife explicitly
  rationale: Per project philosophy, the surviving Hebrew of Sirach is primary where
    extant. Here the Hebrew is concise and somewhat difficult in the first colon,
    while the Greek parallel preserves a fuller list of agitations. The main text
    stays anchored in the Hebrew wording but is informed by the Greek for sense.
