  parallel_sources:
  - edition: lxx-swete-1909
    text: θυμὸς καὶ ζῆλος καὶ ταραχὴ καὶ σᾶλος καὶ φόβος θανάτου καὶ μηνίαμα καὶ ἔρις.
      καὶ ἐν καιρῷ ἀναπαύσεως ἐπὶ κοίτης ὕπνος νυκτὸς ἀλλοιοῖ γνῶσιν αὐτοῦ·
    kind: greek_parallel
