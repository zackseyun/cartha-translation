theological_decisions:
- issue: Divergence between Hebrew second colon and Greek parallel
  chosen_reading: 'Translate the Hebrew second colon as primary: ''and what is from
    above to what is above.'''
  alternative_readings:
  - 'Greek parallel: ''and from the waters it returns to the sea'''
  rationale: Per project philosophy, the surviving Hebrew of Sirach is primary where
    extant. Here the Hebrew and Greek differ materially in the second colon. The Hebrew
    is concise and somewhat enigmatic, but it is the most original available witness
    in Zone 1. The Greek is preserved in a footnote as a significant alternative tradition.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    use Greek parallel as actual input while keeping Hebrew primary.'
