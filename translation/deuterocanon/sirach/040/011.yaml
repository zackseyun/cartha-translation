translation:
  text: Everything from the earth returns to the earth, and what is from above to
    what is above.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, 'and from the waters it returns to the sea.'
    reason: alternative_reading
lexical_decisions:
- source_word: כל
  chosen: Everything
  alternatives:
  - All things
  - Everyone
  lexicon: HALOT
  rationale: The Hebrew is an unrestricted collective, and the parallel Greek πάντα
    ὅσα supports an all-encompassing sense. 'Everything' is natural English and avoids
    narrowing the referent to persons only.
- source_word: מארץ אל ארץ
  chosen: from the earth returns to the earth
  alternatives:
  - from earth to earth goes back
  - from the ground returns to the ground
  lexicon: HALOT
  rationale: The phrase expresses origin and return. The Greek parallel ἀπὸ γῆς εἰς
    γῆν ἀναστρέφει confirms a movement back to earth. 'Returns' makes the implied
    motion explicit in idiomatic English while staying close to the sense.
- source_word: ישוב
  chosen: returns
  alternatives:
  - turns back
  - goes back
  lexicon: HALOT
  rationale: שוב commonly means 'return/turn back.' In this context of cyclical return,
    'returns' is the clearest and most idiomatic rendering.
- source_word: ואשר
  chosen: and what
  alternatives:
  - and whoever
  - and that which
  lexicon: HALOT
  rationale: The relative particle here is best taken non-personally because the parallelism
    is broad and cosmic rather than specifically anthropological.
- source_word: ממרום אל מרום
  chosen: from above to what is above
  alternatives:
  - from the height to the height
  - from heaven to heaven
  - from on high to on high
  lexicon: HALOT
  rationale: The Hebrew literally repeats מרום ('height, exalted place, what is above').
    Because the phrase is somewhat elliptical, the translation preserves the repetition
    and vertical imagery without over-specifying 'heaven.' This also respects the
    Hebrew witness over against the Greek parallel, which has a different second colon.
