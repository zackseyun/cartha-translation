id: SIR.40.22
reference: Sirach 40:22
source:
  edition: sefaria-ben-sira-kahana
  text: יפי ותאר יחמידו עין, ומשניהם צמחי שדה.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: χάριν καὶ κάλλος ἐπιθυμήσει ὀφθαλμός, καὶ ὑπὲρ ἀμφότερα χλόην σπόρου.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 40:22
translation:
  text: Grace and beauty delight the eye, and better than both is the green growth
    of a field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'form/appearance' with Greek parallel 'grace'; the line may be rendered
      'Beauty and appearance delight the eye.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'sprouts/growths of a field'; the Greek parallel reads 'green
      growth of seed/crop,' supporting the sense of fresh field vegetation rather
      than harvested produce.
    reason: alternative_reading
lexical_decisions:
- source_word: יפי
  chosen: beauty
  alternatives:
  - fairness
  - comeliness
  lexicon: HALOT
  rationale: The noun denotes beauty or attractiveness. 'Beauty' is the most natural
    modern English equivalent and pairs well with the following term without sounding
    archaic.
- source_word: ותאר
  chosen: grace
  alternatives:
  - form
  - appearance
  - comeliness
  lexicon: HALOT
  rationale: Hebrew תאר often refers to form or appearance, but the Greek parallel
    χάριν καὶ κάλλος suggests a pairing like 'grace and beauty' rather than two near-synonyms
    for physical shape. 'Grace' captures pleasing attractiveness in a broader sense
    and reflects the Greek consistency check.
- source_word: יחמידו עין
  chosen: delight the eye
  alternatives:
  - the eye desires
  - are desirable to the eye
  - the eye covets
  lexicon: HALOT
  rationale: The verb from חמד can mean desire or take pleasure in. In this wisdom
    context, 'delight the eye' communicates visual attractiveness idiomatically in
    English while preserving the sense of the eye as subject.
- source_word: ומשניהם
  chosen: and better than both
  alternatives:
  - and beyond both
  - and more than both
  lexicon: HALOT
  rationale: Literally 'and from the two of them,' but the comparative force is clarified
    by the Greek ὑπὲρ ἀμφότερα, 'better than both' or 'beyond both.' The English makes
    the comparison explicit.
- source_word: צמחי שדה
  chosen: the green growth of a field
  alternatives:
  - field plants
  - the produce of the field
  - the vegetation of a field
  lexicon: HALOT
  rationale: Hebrew צמחי means growths/plants/sprouts. The Greek χλόην σπόρου points
    to fresh green growth rather than harvested produce. 'The green growth of a field'
    preserves the agricultural image and the comparative praise of fertile vegetation.
