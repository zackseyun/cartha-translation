translation:
  text: For a little while, like a moment, he is quiet in vain; then, from the terrors
    of his heart, he is shaken—like one fleeing from before a pursuer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew text is difficult in the latter half of the verse. The Cairo Geniza
      reading compares the sleeper to one fleeing a pursuer; the Greek parallel similarly
      has 'like one who has escaped from the face of war.'
    reason: textual_variant
  - marker: b
    text: 'The Hebrew witness continues with additional wording about a vision of
      the soul in some line divisions; the Greek parallel expands the thought with
      ''in dreams, as on a day of watch.'' The main translation follows the clearest
      shared sense: rest is brief, and inward terror quickly returns.'
    reason: alternative_reading
lexical_decisions:
- source_word: מעט
  chosen: for a little while
  alternatives:
  - a little
  - briefly
  lexicon: HALOT
  rationale: The Hebrew opens with a temporal adverbial sense. 'For a little while'
    gives natural English while preserving the brevity emphasized by the repetition
    of מעט in the verse tradition.
- source_word: לריק
  chosen: in vain
  alternatives:
  - to no purpose
  - for nothing
  lexicon: HALOT
  rationale: לריק commonly means 'in vain' or 'for nothing.' Here it qualifies the
    brief quiet as empty or ineffective, matching the sense that rest does not truly
    relieve distress.
- source_word: כרגע
  chosen: like a moment
  alternatives:
  - as an instant
  - for an instant
  lexicon: HALOT
  rationale: The comparative כ plus רגע points to momentariness. 'Like a moment' preserves
    the simile and the compressed duration.
- source_word: ישקוט
  chosen: he is quiet
  alternatives:
  - he rests
  - he is at ease
  lexicon: HALOT
  rationale: The verb denotes quietness or repose. 'He is quiet' keeps the wording
    close to the Hebrew while allowing the following clause to show that this quiet
    is only temporary.
- source_word: ומבין
  chosen: then, from
  alternatives:
  - and from within
  - and because of
  lexicon: HALOT
  rationale: The Hebrew is somewhat difficult. In light of the Greek parallel ('and
    from that/in sleep') and the following phrase 'the terrors of his heart,' the
    sense is movement out of inward disturbance. 'Then, from' is concise and idiomatic,
    while acknowledging some compression in the Hebrew.
- source_word: בהלות לבו
  chosen: the terrors of his heart
  alternatives:
  - the alarms of his heart
  - the panic of his heart
  lexicon: HALOT
  rationale: בהלות denotes terrors, sudden alarms, or panics. 'Terrors of his heart'
    preserves the internal, emotional source of the disturbance and aligns with the
    Greek's vision-of-heart imagery.
- source_word: נרעש
  chosen: he is shaken
  alternatives:
  - he trembles
  - he is disturbed
  lexicon: HALOT
  rationale: The verb conveys being agitated or shaken. 'He is shaken' captures both
    emotional and bodily disturbance.
- source_word: כשריד בורח מפני רודף
  chosen: like one fleeing from before a pursuer
  alternatives:
  - like a survivor fleeing from a pursuer
  - like one escaping before an enemy
  lexicon: HALOT
  rationale: 'The Hebrew phrase is textually difficult, but the core image is clear:
    a person in panicked flight before pursuit. The Greek parallel likewise compares
    him to one escaping from the face of war. ''Like one fleeing from before a pursuer''
    preserves the simile without overcommitting to a more uncertain noun analysis.'
