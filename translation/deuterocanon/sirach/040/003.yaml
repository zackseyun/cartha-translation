translation:
  text: from one seated on a lofty throne, to one returning to dust and ashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''from one seated on a throne in glory to one humbled in
      earth and ashes.'' The Greek makes explicit the ideas of glory and humiliation
      that the Hebrew expresses more tersely.'
    reason: alternative_reading
lexical_decisions:
- source_word: מיושב
  chosen: from one seated
  alternatives:
  - from one who sits
  - from the one seated
  lexicon: HALOT
  rationale: The prefixed מ marks the starting point of a range ('from'), and יושב
    is best rendered as a participial expression, 'one seated.' This matches the Hebrew
    syntax and is supported by the Greek ἀπὸ καθημένου.
- source_word: כסא
  chosen: throne
  alternatives:
  - seat
  lexicon: HALOT
  rationale: כסא commonly denotes a throne, especially in royal or exalted contexts.
    The Greek θρόνος confirms that a regal seat is intended, not merely an ordinary
    chair.
- source_word: לגבה
  chosen: lofty
  alternatives:
  - high
  - in height
  - in exaltation
  lexicon: HALOT
  rationale: The phrase modifies the throne as elevated or exalted. 'Lofty' preserves
    both physical height and social exaltation in idiomatic English. The Greek ἐν
    δόξῃ ('in glory') reflects an interpretive expansion toward honor, but the Hebrew
    points more directly to height/exaltation.
- source_word: עד
  chosen: to
  alternatives:
  - until
  lexicon: HALOT
  rationale: 'In this meristic construction, עד marks the other end of the social
    spectrum: ''from ... to ...''. ''Until'' would sound temporal in English, while
    the context is comparative range.'
- source_word: לשוב
  chosen: returning
  alternatives:
  - to return
  - one who returns
  lexicon: HALOT
  rationale: The infinitive with prefixed ל functions here as the endpoint of the
    range, describing the human condition ending in mortality. 'Returning' gives natural
    English while preserving the verbal idea. It also resonates with the biblical
    idiom of returning to dust.
- source_word: עפר ואפר
  chosen: dust and ashes
  alternatives:
  - dust and ash
  lexicon: HALOT
  rationale: This fixed biblical pair expresses mortality, humiliation, and frailty.
    'Dust and ashes' is the established and accurate English equivalent, and the Greek
    ἐν γῇ καὶ σποδῷ is a close conceptual parallel though not identical in wording.
