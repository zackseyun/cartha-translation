theological_decisions:
- issue: Use of Hebrew as primary witness with Greek parallel in a verse describing
    the full human social range
  chosen_reading: 'Translate the Hebrew directly as a social-mortality merism: ''from
    one seated on a lofty throne, to one returning to dust and ashes.'''
  alternative_readings:
  - from one seated on a throne in glory to one humbled in earth and ashes
  rationale: The Hebrew is the most original available witness for this verse and
    should govern the translation. The Greek parallel confirms the broad sense but
    includes interpretive elements ('in glory,' 'humbled in earth') not explicit in
    the Hebrew. The chosen rendering preserves the Hebrew's concise contrast between
    highest status and mortal end without importing the Greek's expansions into the
    main text.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    original-language primacy over translation tradition'
