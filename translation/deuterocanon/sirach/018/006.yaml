id: SIR.18.6
reference: Sirach 18:6
source:
  edition: lxx-swete-1909
  text: οὐκ ἔστιν ἐλαττῶσαι οὐδὲ προσθεῖναι, καὶ οὐκ ἔστιν ἐξιχνιάσαι τὰ θαυμάσια
    τοῦ κυρίου·
  language: Greek
