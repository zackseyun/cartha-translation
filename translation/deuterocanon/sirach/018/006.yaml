- issue: Scope of the unstated object in 'diminish or add'
  chosen_reading: Leave the object implicit rather than supplying 'to his works' or
    similar.
  alternative_readings:
  - Supply an interpretive object such as 'to them' or 'to his works' from context.
  rationale: The Greek leaves the object unstated. Supplying one would smooth the
    English but goes beyond the wording of the source. Keeping it implicit preserves
    the aphoristic force and avoids narrowing the statement.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrinal default for κύριος is 'Lord.' In this wisdom context it
    functions as the divine title, not merely a social designation.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
