theological_decisions:
- issue: Sense of καιρός in a wisdom saying
  chosen_reading: the time
  alternative_readings:
  - the season
  - circumstance
  rationale: The verse reflects on rapid change within human experience under divine
    perspective. 'The time' preserves the Greek's breadth without narrowing it to
    agricultural seasons or a single occasion.
- issue: Force of πάντα ἐστὶν ταχινὰ ἔναντι Κυρίου
  chosen_reading: all things are swift before the Lord
  alternative_readings:
  - everything is easy before the Lord
  - all things are fleeting in the Lord's sight
  rationale: Given the lexical value of ταχινός, the primary sense is speed/quickness
    rather than ease. The line is rendered as an observation about the rapidity of
    change from God's vantage, not as a claim about divine effortlessness, which would
    require a different lexical basis.
  doctrine_reference: Preserve theological tension rather than resolve it
