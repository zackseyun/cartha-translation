translation:
  text: When a man has finished, then he is just beginning; and when he stops, then
    he will be at a loss.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When a man completes, then he begins.' The Greek verb can be rendered
      more formally as 'completes' or 'brings to completion.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will be perplexed' or 'he will be baffled.' The Greek suggests being
      left without a way forward or without an answer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: LSJ
  rationale: Introduces a general temporal condition. 'When' is natural English and
    fits the proverbial style; 'whenever' is possible but less concise.
- source_word: συντελέσῃ
  chosen: has finished
  alternatives:
  - completes
  - comes to an end
  - brings to completion
  lexicon: LSJ
  rationale: The verb conveys bringing something to completion. With ἄνθρωπος as subject
    in this wisdom context, 'has finished' idiomatically expresses a person's reaching
    the end of his work or course. It preserves the paradox with 'is just beginning'
    in the next clause.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  - humankind
  lexicon: LSJ
  rationale: The singular generic noun is best represented here by 'a man' under the
    project's gender-accurate policy. The saying is proverbial and representative,
    not restricted to males alone, but the Greek form is singular masculine/generic
    rather than an abstract collective.
- source_word: τότε ἄρχεται
  chosen: then he is just beginning
  alternatives:
  - then he begins
  - then he starts
  lexicon: LSJ
  rationale: 'ἄρχεται means ''begins.'' ''Is just beginning'' brings out the present/inceptive
    force in idiomatic English and sharpens the paradox: even at the point of completion,
    human understanding or achievement is only at its start.'
- source_word: παύσηται
  chosen: stops
  alternatives:
  - ceases
  - comes to rest
  lexicon: LSJ
  rationale: A straightforward rendering of cessation. 'Stops' is clear modern English
    and suits the balanced parallelism of the verse.
- source_word: ἀπορηθήσεται
  chosen: will be at a loss
  alternatives:
  - will be perplexed
  - will be in doubt
  - will be baffled
  lexicon: LSJ
  rationale: The future passive conveys being left in perplexity or without resources.
    'Will be at a loss' captures both cognitive bewilderment and inability to proceed,
    fitting the wisdom context better than a narrower 'will be perplexed'.
