translation:
  text: Therefore the Lord was patient with them, and poured out his mercy upon them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: LSJ
  rationale: A straightforward inferential connector. 'Therefore' preserves the causal/logical
    link to the preceding context in natural English.
- source_word: ἐμακροθύμησεν
  chosen: was patient
  alternatives:
  - was long-suffering
  - delayed in anger
  - showed forbearance
  lexicon: BDAG/LSJ
  rationale: The verb denotes being long-suffering or patient. 'Was patient' is clear
    modern English and preserves the sense without archaic phrasing. 'Long-suffering'
    is more formal but less natural for the target audience.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Following project doctrine, κύριος is rendered 'Lord.' The article is
    natural in English here and reflects the referential use of the title.
- source_word: ἐπʼ αὐτοῖς
  chosen: with them
  alternatives:
  - toward them
  - over them
  lexicon: LSJ
  rationale: With μακροθυμέω, English idiom prefers 'patient with' rather than a more
    literal prepositional rendering.
- source_word: ἐξέχεεν
  chosen: poured out
  alternatives:
  - shed forth
  - lavished
  lexicon: LSJ
  rationale: The verb literally means 'poured out.' This concrete metaphor is transparent
    and should be preserved rather than replaced with a looser dynamic equivalent.
- source_word: τὸ ἔλεος αὐτοῦ
  chosen: his mercy
  alternatives:
  - his compassion
  - his steadfast mercy
  lexicon: BDAG/LSJ
  rationale: ἔλεος commonly denotes mercy or compassion. 'Mercy' is the standard and
    most theologically recognizable rendering here, while remaining accessible.
- source_word: ἐπʼ αὐτοὺς
  chosen: upon them
  alternatives:
  - on them
  - over them
  lexicon: LSJ
  rationale: With 'poured out,' 'upon them' preserves the imagery and reads naturally
    in elevated but still modern English.
