reference: Sirach 18:11
source:
  edition: lxx-swete-1909
  text: διὰ τοῦτο ἐμακροθύμησεν Κύριος ἐπʼ αὐτοῖς, καὶ ἐξέχεεν ἐπʼ αὐτοὺς τὸ ἔλεος
    αὐτοῦ.
