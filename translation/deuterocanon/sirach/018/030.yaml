theological_decisions:
- issue: Moral nuance of desire language
  chosen_reading: 'Render both terms as morally cautioned but not hyper-specific:
    ''desires'' and ''cravings.'''
  alternative_readings:
  - '''lusts'' and ''appetites'''
  - '''passions'' and ''impulses'''
  rationale: The verse warns against being led by disordered desire, but the Greek
    itself does not limit the warning to sexual lust. The chosen wording preserves
    the ethical force without narrowing the scope beyond the source text.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; preserve lexical decisions.'
