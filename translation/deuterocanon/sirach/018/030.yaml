translation:
  text: Do not go after your desires, and restrain yourself from your cravings;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not follow your desires, and hold yourself back from your appetites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀπίσω
  chosen: after
  alternatives:
  - behind
  - in pursuit of
  lexicon: LSJ
  rationale: With πορεύου, the idiom ὀπίσω ... πορεύομαι means to go after or follow
    after. 'After' is natural English and preserves the metaphor of pursuit without
    over-paraphrasing.
- source_word: τῶν ἐπιθυμιῶν
  chosen: your desires
  alternatives:
  - your lusts
  - your passions
  - your longings
  lexicon: BDAG/LSJ
  rationale: ἐπιθυμία can denote desire broadly, sometimes with negative moral force
    depending on context. Here the warning context gives it a cautionary sense, but
    'desires' is broad enough to preserve the lexical range without importing specifically
    sexual overtones such as 'lusts'.
- source_word: μὴ πορεύου
  chosen: Do not go
  alternatives:
  - Do not walk
  - Do not follow
  lexicon: BDAG/LSJ
  rationale: πορεύομαι literally means go/walk. In this prohibitive construction,
    'Do not go after' best captures the full phrase with ὀπίσω while remaining idiomatic.
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - away from
  lexicon: BDAG/LSJ
  rationale: The preposition marks separation. 'From' is the most direct rendering;
    the reflexive force is supplied in English by 'restrain yourself from'.
- source_word: τῶν ὀρέξεών
  chosen: your cravings
  alternatives:
  - your appetites
  - your impulses
  - your desires
  lexicon: LSJ
  rationale: ὄρεξις often denotes appetite or impulse, especially strong desire. 'Cravings'
    distinguishes it from ἐπιθυμίαι in the first clause while preserving the intensified
    sense of bodily or urgent desire.
- source_word: κωλύου
  chosen: restrain yourself
  alternatives:
  - hold yourself back
  - forbid yourself
  - check yourself
  lexicon: BDAG/LSJ
  rationale: The middle/passive imperative here calls for self-restraint. 'Restrain
    yourself' expresses the reflexive sense clearly in modern English and fits the
    ethical exhortation.
