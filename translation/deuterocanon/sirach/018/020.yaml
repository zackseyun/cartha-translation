theological_decisions:
- issue: Meaning of ἐπισκοπή in a wisdom context
  chosen_reading: visitation with likely divine/judicial overtones
  alternative_readings:
  - inspection
  - oversight
  - reckoning
  rationale: The phrase likely refers to a decisive time when one is called to account,
    potentially by God. The translation keeps the traditional biblical term 'visitation'
    because it preserves both inspection and divine intervention without collapsing
    the ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of ἐξιλασμόν
  chosen_reading: atonement
  alternative_readings:
  - propitiation
  - expiation
  rationale: The term carries sacrificial and reconciliatory weight. 'Atonement' best
    fits the project's preference for readable modern English while preserving theological
    substance; more technical alternatives are preserved in a footnote.
  doctrine_reference: We avoid ecclesiastical jargon where a clear modern equivalent
    preserves the sense.
