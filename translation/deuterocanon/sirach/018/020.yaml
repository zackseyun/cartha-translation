translation:
  text: Before judgment, examine yourself, and in the hour of visitation you will
    find atonement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the hour of inspection' or 'in the time of reckoning'; the Greek
      visitation language can suggest a moment of divine review or intervention.
    reason: lexical_alternative
  - marker: b
    text: Or 'expiation' or 'propitiation'; the Greek denotes the removal of guilt
      and restoration of favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ κρίσεως
  chosen: Before judgment
  alternatives:
  - Before condemnation
  - Before decision
  lexicon: LSJ
  rationale: κρίσις commonly denotes judgment or judicial assessment. 'Before judgment'
    preserves the broad moral/judicial sense without narrowing it to condemnation.
- source_word: ἐξέταζε
  chosen: examine
  alternatives:
  - test
  - scrutinize
  - investigate
  lexicon: LSJ
  rationale: The imperative calls for self-scrutiny. 'Examine' is natural modern English
    and retains the reflective force better than the more technical 'investigate'
    or harsher 'scrutinize'.
- source_word: σεαυτόν
  chosen: yourself
  lexicon: LSJ
  rationale: Direct reflexive object; straightforwardly rendered 'yourself'.
- source_word: ἐν ὥρᾳ ἐπισκοπῆς
  chosen: in the hour of visitation
  alternatives:
  - at the time of inspection
  - in the time of reckoning
  - in the hour of oversight
  lexicon: LSJ
  rationale: ἐπισκοπή can mean visitation, inspection, or oversight. In wisdom and
    biblical usage it often carries the sense of divine visitation or reckoning. 'Hour
    of visitation' preserves that theological breadth and gravity without over-interpreting.
- source_word: εὑρήσεις
  chosen: you will find
  alternatives:
  - you will obtain
  - you will discover
  lexicon: LSJ
  rationale: Future of εὑρίσκω is idiomatically 'you will find.' 'Obtain' is possible
    by implication but less direct.
- source_word: ἐξιλασμόν
  chosen: atonement
  alternatives:
  - propitiation
  - means of expiation
  - forgiveness
  lexicon: LSJ
  rationale: ἐξιλασμός refers to expiation/atonement. 'Atonement' is accessible English
    that preserves sacrificial-reconciliatory force better than the more technical
    'propitiation' and is broader than simply 'forgiveness'.
