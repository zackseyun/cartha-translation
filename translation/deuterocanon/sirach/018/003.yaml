id: SIR.18.3
reference: Sirach 18:3
source:
  edition: lxx-swete-1909
  text: οὐθενὶ ἐξεποίησεν ἐξαγγεῖλαι τὰ ἔργα αὐτοῦ
  language: Greek
  pages: []
  confidence: high
translation:
  text: He has allowed no one to proclaim his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has enabled no one to declare his works' or 'To no one has he granted
      to proclaim his works.' The Greek verb is uncommon and may suggest permission,
      appointment, or enablement.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐθενί
  chosen: no one
  alternatives:
  - to no one
  - nobody
  lexicon: LSJ
  rationale: Dative of the indefinite negative pronoun/adjective, functioning here
    with ἐξεποίησεν to express that permission or enabling was granted to no person.
    English idiom is smoother with 'no one' as subject of the infinitive clause.
- source_word: ἐξεποίησεν
  chosen: has allowed
  alternatives:
  - has enabled
  - has caused
  - has made it possible
  lexicon: LSJ
  rationale: The verb is uncommon and contextually governs the infinitive ἐξαγγεῖλαι.
    In this construction it most naturally conveys causing or permitting someone to
    do something. 'Has allowed' gives clear modern English without over-specifying
    stronger causation.
- source_word: ἐξαγγεῖλαι
  chosen: to proclaim
  alternatives:
  - to declare
  - to report fully
  - to make known
  lexicon: LSJ
  rationale: The aorist infinitive of ἐξαγγέλλω carries the sense of declaring or
    reporting abroad. 'Proclaim' preserves the public, declarative force better than
    the flatter 'tell' or 'make known'.
- source_word: τὰ ἔργα αὐτοῦ
  chosen: his works
  alternatives:
  - what he has done
  - his deeds
  lexicon: LSJ
  rationale: A straightforward rendering of the plural noun phrase. 'Works' preserves
    the formal link to divine acts without narrowing to moral 'deeds' or paraphrasing
    into a clause.
