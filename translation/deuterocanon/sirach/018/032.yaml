translation:
  text: Do not delight in a mere scrap of pleasure, for its end is poverty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew final clause uncertain. The Cairo Geniza Hebrew reads literally something
      like 'whose פי of two is its poverty,' which is difficult to construe. The Greek
      parallel reads, 'Do not rejoice in much luxury, nor be bound to its expense,'
      supporting the sense that indulgence ends in financial loss.
    reason: textual_variant
  - marker: b
    text: Or 'Do not delight in even a little pleasure.' The Hebrew שֶׁמֶץ can mean
      a small fragment or trace.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּשְׂמַח
  chosen: Do not delight
  alternatives:
  - Do not rejoice
  - Do not be glad
  lexicon: HALOT
  rationale: The prohibition with שמח here concerns taking pleasure in something,
    not merely outward rejoicing. 'Delight' fits the wisdom context and pairs naturally
    with the object 'pleasure.'
- source_word: שֶׁמֶץ
  chosen: a mere scrap
  alternatives:
  - a little
  - a fragment
  - a trace
  lexicon: HALOT
  rationale: שֶׁמֶץ denotes a small piece or fragment. Rendering it as 'a mere scrap'
    preserves the diminutive, slightly dismissive force of the Hebrew. The Greek parallel
    has 'much luxury/indulgence,' suggesting some textual instability, but the Hebrew
    witness available in Zone 1 points to smallness rather than abundance.
- source_word: תַּעֲנוּג
  chosen: pleasure
  alternatives:
  - luxury
  - delight
  - indulgence
  lexicon: HALOT
  rationale: The Hebrew noun refers to enjoyment or sensual pleasure. 'Pleasure' is
    broad and natural English; 'luxury' would lean too strongly toward the Greek τρυφή,
    while 'indulgence' is possible but more interpretive.
- source_word: אֲשֶׁר
  chosen: for
  alternatives:
  - which
  - because
  lexicon: HALOT
  rationale: Although literally a relative particle ('which/that'), in context it
    introduces the reason for the warning. 'For' gives idiomatic English while preserving
    the causal sense.
- source_word: פִּי
  chosen: end
  alternatives:
  - mouth
  - edge
  - measure
  lexicon: HALOT
  rationale: In this idiom, פי can denote extremity or outcome rather than literal
    'mouth.' Given the following רֵישׁוֹ and the wisdom-saying structure, 'its end'
    best captures the sense.
- source_word: שְׂנַיִם
  chosen: poverty
  alternatives:
  - double
  - twofold
  lexicon: HALOT
  rationale: 'The Hebrew as transmitted is difficult: ''mouth of two, its poverty/head''
    is not straightforward. The Greek parallel reads ''do not become attached to its
    contribution/cost,'' implying a warning about the expense of indulgence. The chosen
    rendering takes the clause as pointing to the impoverishing outcome of pleasure,
    producing coherent sense while staying anchored to the warning''s thrust. This
    is a materially uncertain phrase and is documented in a footnote.'
- source_word: רֵישׁוֹ
  chosen: poverty
  alternatives:
  - its poverty
  - its want
  - its destitution
  lexicon: HALOT
  rationale: ריש commonly means poverty or want. This is the clearest lexical anchor
    in the difficult final clause, so the translation foregrounds that semantic value.
