theological_decisions:
- issue: Sense of παιδεία in a wisdom context
  chosen_reading: discipline
  alternative_readings:
  - instruction
  - training
  rationale: The verse commends a receptive posture toward God's formative correction.
    'Discipline' preserves that theological and moral weight better than the broader
    'instruction,' while remaining natural English.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of κρίματα αὐτοῦ
  chosen_reading: his judgments
  alternative_readings:
  - his ordinances
  rationale: The Greek can denote either judicial acts or normative decisions. In
    this context, retaining 'judgments' preserves the text's theological breadth and
    avoids narrowing it to legal prescriptions alone.
  doctrine_reference: Translation philosophy §3, §5
