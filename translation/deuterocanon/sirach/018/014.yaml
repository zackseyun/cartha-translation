translation:
  text: He has mercy on those who accept discipline, and on those who eagerly hasten
    to his judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who receive instruction' for 'those who accept discipline.' The
      Greek παιδεία can mean instruction, training, or corrective discipline.
    reason: lexical_alternative
  - marker: b
    text: Or 'his ordinances' for 'his judgments.' The Greek κρίματα can refer to
      judgments, decisions, or ordinances.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεᾷ
  chosen: has mercy on
  alternatives:
  - pities
  - shows compassion to
  lexicon: LSJ
  rationale: The verb denotes showing mercy or compassion. 'Has mercy on' is idiomatic
    modern English and preserves the moral-religious force better than the weaker
    'pities'.
- source_word: τοὺς ἐκδεχομένους
  chosen: those who accept
  alternatives:
  - those who await
  - those who receive
  lexicon: LSJ
  rationale: Although ἐκδέχομαι can mean 'await' or 'receive,' in this context with
    παιδείαν the sense is best taken as welcoming or accepting instruction/discipline
    rather than merely waiting for it.
- source_word: παιδείαν
  chosen: discipline
  alternatives:
  - instruction
  - training
  - correction
  lexicon: LSJ
  rationale: παιδεία can cover education, training, and corrective discipline. Here,
    in wisdom literature and paired with divine mercy, 'discipline' best captures
    the formative and corrective sense without over-paraphrasing.
- source_word: κατασπεύδοντας
  chosen: eagerly hasten
  alternatives:
  - hasten
  - make haste
  - are zealous for
  lexicon: LSJ
  rationale: The compound verb intensifies simple haste. 'Eagerly hasten' preserves
    both the movement and the positive readiness implied by the context.
- source_word: ἐπὶ τὰ κρίματα αὐτοῦ
  chosen: to his judgments
  alternatives:
  - toward his judgments
  - for his judgments
  - to his ordinances
  lexicon: LSJ
  rationale: κρίματα in biblical Greek often refers to God's judgments, decisions,
    or ordinances. 'Judgments' is the most direct rendering; 'ordinances' is possible
    but less certain here. The preposition ἐπί with the accusative after a verb of
    motion is naturally rendered 'to'.
