translation:
  text: My child, in good things do not add reproach, nor in any gift grief of words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with every gift, do not add hurtful words.' The Greek literally says
      'nor in any gift grief of words,' a compressed expression warning against spoiling
      generosity with speech that causes sorrow.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τέκνον
  chosen: My child
  alternatives:
  - Child
  - Son
  lexicon: LSJ
  rationale: Vocative singular of address. 'My child' is idiomatic English for wisdom
    instruction and preserves the warm, paternal tone better than the bare 'Child';
    'son' would over-specify gender not explicit in the Greek form here.
- source_word: ἐν ἀγαθοῖς
  chosen: in good things
  alternatives:
  - when doing good
  - with good gifts
  - in benefits
  lexicon: LSJ
  rationale: The phrase is broad and plural, referring to acts or instances of beneficence
    rather than a narrowly defined object. 'In good things' keeps the Greek's open
    texture, though the context clearly concerns beneficent giving.
- source_word: μὴ δῷς
  chosen: do not give
  alternatives:
  - do not add
  - do not bring
  lexicon: LSJ
  rationale: Aorist subjunctive with μή in prohibition. 'Do not give' is the direct
    lexical sense and fits the parallel with 'gift' in the next clause.
- source_word: μῶμον
  chosen: reproach
  alternatives:
  - blemish
  - faultfinding
  - disgrace
  lexicon: LSJ
  rationale: Although μῶμος/μῶμον can denote 'blemish' literally, in this ethical
    context it refers to a disparaging or fault-finding element attached to one's
    benefaction. 'Reproach' captures the interpersonal sense without over-paraphrasing.
- source_word: ἐν πάσῃ δόσει
  chosen: in any gift
  alternatives:
  - with every gift
  - in every giving
  lexicon: LSJ
  rationale: δόσις denotes an act of giving or a gift. 'In any gift' reads naturally
    in English and preserves the distributive force of πάσῃ.
- source_word: λύπην λόγων
  chosen: grief of words
  alternatives:
  - painful words
  - grieving speech
  - hurtful words
  lexicon: LSJ
  rationale: The genitive construction is compressed in Greek. A more idiomatic English
    rendering would be 'hurtful words,' but 'grief of words' better exposes the underlying
    structure and the idea that words can cause sorrow alongside a gift.
