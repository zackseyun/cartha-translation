theological_decisions:
- issue: Sense of εὐλαβηθήσεται in a wisdom maxim
  chosen_reading: practical caution rather than explicitly religious reverence
  alternative_readings:
  - will be reverent in everything
  rationale: While εὐλαβέομαι can carry the sense of reverence or piety, the immediate
    parallel about taking heed to avoid wrongdoing favors a practical-moral sense
    of caution. This preserves the proverb's ethical force without importing a narrower
    liturgical meaning.
  doctrine_reference: DOCTRINE.md §Translation philosophy, items 1 and 6
- issue: Generic masculine ἄνθρωπος
  chosen_reading: A wise man
  alternative_readings:
  - A wise person
  rationale: The source uses a masculine singular generic form in proverbial style.
    Per project policy, gender-accurate rendering is preferred where the source's
    form and intent are represented by 'man' in English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4
