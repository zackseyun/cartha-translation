translation:
  text: The Lord alone will be declared righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The Lord alone will be justified' or 'The Lord alone will be vindicated.'
      The Greek verb can carry declarative or vindicatory force.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος
  chosen: The Lord
  alternatives:
  - Lord
  - the LORD
  - Master
  lexicon: LSJ
  rationale: κύριος is the subject and standard title meaning 'Lord.' Following project
    doctrine, the default rendering is 'Lord.' The article is supplied in English
    for natural style.
- source_word: μόνος
  chosen: alone
  alternatives:
  - only
  - by himself
  lexicon: LSJ
  rationale: μόνος emphasizes exclusivity. 'Alone' reads naturally after the subject
    in English and preserves the force that no other shares this status.
- source_word: δικαιωθήσεται
  chosen: will be declared righteous
  alternatives:
  - will be justified
  - will be vindicated
  - will be shown to be righteous
  lexicon: BDAG
  rationale: Future passive of δικαιόω. In this context, 'will be declared righteous'
    best preserves the passive sense without importing later Pauline technical usage
    too strongly. 'Will be justified' is possible but in modern English can sound
    overly doctrinal or suggest acquittal from guilt; 'vindicated' is also possible
    but shifts toward public demonstration rather than the core righteous/just declaration.
