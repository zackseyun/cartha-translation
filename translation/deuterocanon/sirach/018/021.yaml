theological_decisions:
- issue: Meaning of ἐπιστροφήν in relation to ἁμαρτημάτων
  chosen_reading: repentance
  alternative_readings:
  - turning back
  - return
  rationale: The immediate context is moral failure ('sins'), so the noun is best
    understood as repentance rather than a merely spatial or generic return. This
    preserves the text's ethical exhortation without importing later technical theology
    beyond the Greek's plain sense.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of ταπεινώθητι
  chosen_reading: humble yourself
  alternative_readings:
  - be humbled
  rationale: Although formally passive, the imperative in wisdom exhortation is naturally
    rendered reflexively in English. This avoids suggesting only imposed humiliation
    and better matches the call to voluntary self-abasement before affliction.
  doctrine_reference: Translation philosophy §§1, 6
