translation:
  text: Before you become sick, humble yourself, and in the time of sins show repentance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show a turning back' / 'show your return.' The Greek ἐπιστροφή can denote
      a turning back; here it is rendered 'repentance' because of the immediate reference
      to sins.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὶν
  chosen: Before
  alternatives:
  - ere
  - prior to
  lexicon: LSJ
  rationale: Temporal marker introducing an action to be taken in advance of what
    follows.
- source_word: ἀρρωστῆσαί
  chosen: become sick
  alternatives:
  - fall ill
  - be weak
  lexicon: LSJ
  rationale: Aorist infinitive from ἀρρωστέω, referring to becoming ill or infirm.
    'Become sick' is natural modern English and preserves the ingressive sense better
    than simply 'be sick.'
- source_word: σε
  chosen: you
  lexicon: Greek grammar
  rationale: Object of the infinitive; in English the clause is naturally rendered
    with 'you' as subject of 'become sick.'
- source_word: ταπεινώθητι
  chosen: humble yourself
  alternatives:
  - be humbled
  - submit yourself
  lexicon: LSJ
  rationale: Aorist passive imperative of ταπεινόω, often functioning with reflexive
    force in exhortation. 'Humble yourself' best conveys the ethical command in idiomatic
    English without implying merely external humiliation.
- source_word: ἐν καιρῷ
  chosen: at the time of
  alternatives:
  - in the time of
  - when
  lexicon: LSJ
  rationale: καιρός denotes an appointed or fitting time. 'At the time of' keeps the
    temporal nuance while remaining readable.
- source_word: ἁμαρτημάτων
  chosen: sins
  alternatives:
  - sin
  - transgressions
  lexicon: LSJ
  rationale: Plural genitive is best preserved as 'sins,' referring to occasions or
    acts of sin rather than an abstract principle.
- source_word: δεῖξον
  chosen: show
  alternatives:
  - display
  - make evident
  lexicon: LSJ
  rationale: Aorist imperative of δείκνυμι. 'Show' is the straightforward rendering
    and leaves the object to define what is manifested.
- source_word: ἐπιστροφήν
  chosen: repentance
  alternatives:
  - turning back
  - conversion
  - return
  lexicon: LSJ
  rationale: ἐπιστροφή can mean a turning or return; in this moral context with 'sins'
    it denotes repentance, i.e., turning back from sin. 'Repentance' communicates
    the ethical-religious sense most clearly in English, while the more literal 'turning
    back' is preserved as an alternative.
