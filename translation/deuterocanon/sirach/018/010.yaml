translation:
  text: Like a drop of water from the sea and a grain of sand, so are a few years
    in the day of eternity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a pebble of sand'; the Greek word often means 'pebble,' but here likely
      refers to a single grain because it is paired with 'sand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the day of the age.' The Greek phrase is compact and may be rendered
      more literally, but here it refers to the vast span of eternity in contrast
      with human years.
    reason: alternative_reading
lexical_decisions:
- source_word: σταγών
  chosen: drop
  alternatives:
  - droplet
  lexicon: LSJ
  rationale: The noun denotes a single drop. 'Drop' is idiomatic and preserves the
    image's smallness without sounding technical.
- source_word: ψῆφος
  chosen: grain
  alternatives:
  - pebble
  - small stone
  lexicon: LSJ
  rationale: Although ψῆφος often means 'pebble,' the genitive ἄμμου ('of sand') specifies
    a single particle of sand. 'Grain' best conveys the sense in natural English.
- source_word: ὀλίγα ἔτη
  chosen: a few years
  alternatives:
  - few years
  lexicon: LSJ
  rationale: This straightforwardly expresses brevity in contrast with the vastness
    of sea, sand, and eternity. The article is not required in Greek, but 'a few years'
    is natural English.
- source_word: ἡμέρα αἰῶνος
  chosen: the day of eternity
  alternatives:
  - an age-long day
  - the day of the age
  lexicon: LSJ
  rationale: 'Rendered relatively formally to preserve the striking singular contrast:
    human years are tiny when set within ''the day of eternity.'' ''Eternity'' best
    captures αἰών here as unbounded duration rather than merely ''age.'''
- source_word: οὕτως
  chosen: so are
  alternatives:
  - so is
  - thus are
  lexicon: LSJ
  rationale: This introduces the comparison and requires a plural verb in English
    to agree with 'years.' 'So are' is concise and natural.
