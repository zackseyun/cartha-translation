translation:
  text: Do not be hindered from paying a vow in due time, and do not wait until death
    to be justified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be vindicated' or 'to be shown righteous.' The Greek can refer more
      broadly to being found in the right, not necessarily to later technical uses
      of 'justification.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμποδισθῇς
  chosen: be hindered
  alternatives:
  - be prevented
  - be delayed
  - be obstructed
  lexicon: LSJ
  rationale: The passive imperative warns against allowing an obstacle or delay to
    interfere. 'Be hindered' preserves the passive sense and the moral urgency without
    overinterpreting the source of the hindrance.
- source_word: ἀποδοῦναι
  chosen: paying
  alternatives:
  - rendering
  - fulfilling
  - giving back
  lexicon: LSJ
  rationale: With εὐχήν ('vow'), the idiomatic sense is to pay or fulfill a vow. 'Paying'
    is natural English and reflects standard vow language.
- source_word: εὐχήν
  chosen: a vow
  alternatives:
  - a prayer
  - a pledge
  lexicon: LSJ
  rationale: Although εὐχή can mean 'prayer' in some contexts, with ἀποδοῦναι it most
    naturally means a vow made to God and later fulfilled. 'Vow' best fits the collocation
    and wisdom context.
- source_word: εὐκαίρως
  chosen: in due time
  alternatives:
  - promptly
  - at the proper time
  - seasonably
  lexicon: LSJ
  rationale: 'The adverb indicates timeliness or appropriateness. ''In due time''
    preserves both the temporal and ethical sense: the vow should be paid when it
    ought to be, not postponed.'
- source_word: μὴ μείνῃς
  chosen: do not wait
  alternatives:
  - do not remain
  - do not delay
  - do not linger
  lexicon: LSJ
  rationale: In context the sense is not merely spatial or static remaining, but delaying
    action. 'Do not wait' communicates the exhortation clearly in modern English.
- source_word: ἕως θανάτου
  chosen: until death
  alternatives:
  - until you die
  - as far as death
  lexicon: LSJ
  rationale: The phrase marks an extreme endpoint of delay. 'Until death' is concise
    and close to the Greek.
- source_word: δικαιωθῆναι
  chosen: to be justified
  alternatives:
  - to be vindicated
  - to be shown righteous
  - to be made right
  lexicon: LSJ
  rationale: The passive infinitive from δικαιόω can mean to be declared or shown
    righteous. 'Be justified' preserves the lexical connection and avoids narrowing
    the sense prematurely. In this wisdom context it likely refers to being found
    in the right before God rather than a later technical Pauline doctrine, but the
    traditional theological term remains the most transparent rendering.
