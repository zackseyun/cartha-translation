theological_decisions:
- issue: Meaning of δικαιωθῆναι in a wisdom exhortation
  chosen_reading: to be justified
  alternative_readings:
  - to be vindicated
  - to be shown righteous
  rationale: The verse warns against postponing obedience and repentance. Rendering
    δικαιωθῆναι as 'to be justified' keeps the Greek term visible while not importing
    later doctrinal precision into Ben Sira. Alternatives are preserved because English
    readers may hear Pauline overtones that are not necessarily primary here.
  doctrine_reference: Translation philosophy §§1, 3, 5; Contested terms table for
    δικαιοσύνη-related language
