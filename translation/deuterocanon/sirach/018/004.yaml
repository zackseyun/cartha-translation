translation:
  text: And who can search out his mighty deeds?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τίς
  chosen: who
  alternatives:
  - what person
  - who is there that
  lexicon: BDAG
  rationale: An interrogative pronoun introducing a rhetorical question; simple 'who'
    is natural English and preserves the force.
- source_word: ἐξιχνιάσει
  chosen: can search out
  alternatives:
  - will trace out
  - will investigate fully
  - can fathom
  lexicon: BDAG
  rationale: The verb carries the sense of tracing out or searching thoroughly. 'Can
    search out' preserves both the future-form rhetorical force and the implied inability
    in context better than the more interpretive 'fathom.'
- source_word: τὰ μεγαλεῖα
  chosen: mighty deeds
  alternatives:
  - great things
  - great works
  - majesties
  lexicon: LSJ
  rationale: The plural noun refers to great acts or manifestations of greatness.
    'Mighty deeds' fits biblical English idiom and conveys active works rather than
    abstract greatness alone.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - of him
  lexicon: BDAG
  rationale: Standard possessive rendering. In context the pronoun refers to God from
    the surrounding lines, so 'his' is appropriate and clear.
