translation:
  text: Remember the time of famine in the time of plenty, and poverty and need in
    the days of wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'season of hunger ... season of abundance.' The Greek contrasts appointed
      times of scarcity and fullness.
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητι
  chosen: Remember
  alternatives:
  - Keep in mind
  - Be mindful of
  lexicon: BDAG
  rationale: Aorist imperative calling for deliberate recollection. 'Remember' is
    direct, idiomatic, and preserves the exhortational force without paraphrase.
- source_word: καιρὸν λιμοῦ
  chosen: the time of famine
  alternatives:
  - a time of famine
  - season of hunger
  lexicon: LSJ
  rationale: καιρός denotes a fitting or appointed time/season; λιμός is famine rather
    than mere hunger. The article is not explicit in English, but 'the time of famine'
    best reflects the concrete contrast with 'the time of plenty.'
- source_word: ἐν καιρῷ πλησμονῆς
  chosen: in the time of plenty
  alternatives:
  - in a time of abundance
  - during fullness
  lexicon: LSJ
  rationale: πλησμονή denotes fullness or abundance, here materially 'plenty.' This
    keeps the antithesis with famine clear and natural in English.
- source_word: πτωχείαν
  chosen: poverty
  alternatives:
  - destitution
  - want
  lexicon: LSJ
  rationale: πτωχεία is the state of being poor. 'Poverty' is the most straightforward
    and broadly understandable rendering.
- source_word: ἔνδειαν
  chosen: need
  alternatives:
  - lack
  - privation
  lexicon: LSJ
  rationale: ἔνδεια overlaps with poverty but emphasizes deficiency or want. Rendering
    it as 'need' preserves the paired but non-identical sense alongside πτωχείαν.
- source_word: ἐν ἡμέραις πλούτου
  chosen: in the days of wealth
  alternatives:
  - in days of prosperity
  - when rich days come
  lexicon: LSJ
  rationale: πλοῦτος is wealth/riches. 'Days of wealth' is slightly more formal than
    'prosperity' and stays closer to the Greek imagery while remaining readable.
