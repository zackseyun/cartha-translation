theological_decisions:
- issue: Whether to smooth the verse into a generalized moral paraphrase about future
    hardship
  chosen_reading: 'Retain the concrete paired contrasts: famine/plenty and poverty/need
    versus wealth'
  alternative_readings:
  - Paraphrastic renderings such as 'In good times, remember bad times may come'
  rationale: The Greek presents specific economic conditions in balanced parallelism.
    Preserving those terms respects the source text's wisdom-style concreteness and
    avoids importing a broader moral summary not explicitly stated.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
