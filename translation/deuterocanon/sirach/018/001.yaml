translation:
  text: The one who lives forever created all things at once.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'created everything collectively' or 'created all things in common';
      the Greek adverb κοινῇ is somewhat compressed and may emphasize the totality
      of creation as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ ζῶν
  chosen: The one who lives
  alternatives:
  - He who lives
  - The living one
  lexicon: BDAG
  rationale: The articular present participle functions substantivally. 'The one who
    lives' is natural modern English and preserves the descriptive force without over-formal
    archaism.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: BDAG
  rationale: The phrase denotes enduring perpetuity. 'Forever' is idiomatic and clear
    in English while retaining the sense of unending duration.
- source_word: ἔκτισεν
  chosen: created
  alternatives:
  - made
  - founded
  lexicon: BDAG
  rationale: κτίζω commonly means 'create' in cosmological contexts. Here it best
    conveys origination of all things.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  - the whole of creation
  lexicon: BDAG
  rationale: A standard comprehensive expression meaning the totality of what exists.
    'All things' is slightly more formal and suits the elevated tone.
- source_word: κοινῇ
  chosen: together
  alternatives:
  - in common
  - altogether
  - universally
  lexicon: LSJ
  rationale: The adverb can mean 'in common' or 'collectively.' In this context, modifying
    the scope of creation, 'together' best captures the sense that all things were
    created as a whole/collectively, without importing a stronger philosophical claim.
