theological_decisions:
- issue: Identification of the subject as God without an explicit divine name or title
  chosen_reading: The verse is rendered descriptively as 'The one who lives forever'
    rather than supplying 'God' in the main text.
  alternative_readings:
  - God, who lives forever
  - The Lord who lives forever
  rationale: The Greek names the subject by a descriptive participial phrase, not
    by θεός or κύριος. The translation preserves that wording and lets the theological
    identification arise from context rather than being imported.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve what the source text explicitly says.'
