translation:
  text: If you grant your soul the pleasure it desires, it will make you a joy to
    your enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If you indulge your soul's craving, you will become something your
      enemies gloat over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  chosen: If
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause; simple 'If' best fits the warning structure
    of the proverb-like saying.
- source_word: χορηγήσεις
  chosen: you grant
  alternatives:
  - you supply
  - you provide
  - you indulge
  lexicon: BDAG
  rationale: The verb means to furnish or provide. 'Grant' preserves the idea of allowing
    or supplying to oneself without over-paraphrasing into the more interpretive 'indulge,'
    though indulgence is clearly the sense in context.
- source_word: τῇ ψυχῇ σου
  chosen: your soul
  alternatives:
  - yourself
  - your appetite
  - your life
  lexicon: BDAG
  rationale: ψυχή is retained as 'soul' rather than flattened to 'yourself,' since
    the Greek explicitly names the inner self. In wisdom literature this can include
    appetite or desire, but 'soul' keeps the source wording visible.
- source_word: εὐδοκίαν
  chosen: the pleasure
  alternatives:
  - good pleasure
  - delight
  - satisfaction
  lexicon: BDAG
  rationale: Here εὐδοκία denotes what is pleasing or gratifying. 'Pleasure' communicates
    the object granted to the soul in idiomatic English while preserving the moral
    warning of self-gratification.
- source_word: ἐπιθυμίας
  chosen: it desires
  alternatives:
  - of desire
  - of craving
  - of lust
  lexicon: BDAG
  rationale: 'The genitive most naturally qualifies εὐδοκίαν: pleasure connected with
    desire/craving. Rendering the phrase as ''the pleasure it desires'' makes the
    Greek relation intelligible in English without importing the narrower sexual sense
    of ''lust.'''
- source_word: ποιήσει σε
  chosen: it will make you
  alternatives:
  - it will turn you into
  - it will render you
  lexicon: BDAG
  rationale: Straightforward future causative sense; 'make you' is natural and sufficiently
    formal.
- source_word: ἐπίχαρμα
  chosen: a delight
  alternatives:
  - a laughingstock
  - an object of rejoicing
  - a mockery
  lexicon: LSJ
  rationale: The noun denotes something over which others rejoice. In context of enemies,
    this implies gloating or triumph. 'A delight to your enemies' preserves the literal
    image while allowing the hostile nuance to emerge from the phrase as a whole.
- source_word: τῶν ἐχθρῶν σου
  chosen: to your enemies
  alternatives:
  - for your enemies
  - of your enemies
  lexicon: BDAG
  rationale: English idiom prefers 'to your enemies' with 'a delight,' though the
    genitive could also be represented as 'for your enemies.' The sense is that enemies
    take pleasure in your self-indulgent downfall.
