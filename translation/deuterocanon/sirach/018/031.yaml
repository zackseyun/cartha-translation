id: SIR.18.31
reference: Sirach 18:31
source:
  edition: lxx-swete-1909
  text: ἐὰν χορηγήσεις τῇ ψυχῇ σου εὐδοκίαν ἐπιθυμίας, ποιήσει σε ἐπίχαρμα τῶν ἐχθρῶν
    σου.
