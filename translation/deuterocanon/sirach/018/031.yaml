theological_decisions:
- issue: Anthropological force of ψυχή
  chosen_reading: Retain 'soul' in the main text
  alternative_readings:
  - yourself
  - your appetite
  rationale: The verse is wisdom instruction about inner desire and self-governance,
    not a technical doctrine of the soul. Still, the Greek explicitly says ψυχή, so
    'soul' best preserves the source while remaining understandable.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy: original-language primacy;
    readable modern English'
- issue: Hostile nuance of ἐπίχαρμα τῶν ἐχθρῶν σου
  chosen_reading: Render literally as 'a delight to your enemies'
  alternative_readings:
  - a laughingstock to your enemies
  - something your enemies gloat over
  rationale: The Greek image is that enemies rejoice over the person's condition.
    A more explicit rendering like 'laughingstock' is interpretive; the chosen wording
    keeps the metaphor closer to the source while still conveying the warning.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy: optimal equivalence; preserve
    ambiguity where present'
