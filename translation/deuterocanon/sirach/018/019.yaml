translation:
  text: Before you speak, learn; and before sickness, seek treatment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'care for yourself' / 'take remedies.' The Greek verb can mean to attend
      to, care for, or treat medically.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὶν ἢ
  chosen: Before
  alternatives:
  - Before ever
  - Prior to
  lexicon: LSJ
  rationale: Temporal conjunction introducing an action that should precede another.
    Simple 'Before' is natural and accurate in English.
- source_word: λαλῆσαι
  chosen: you speak
  alternatives:
  - to speak
  - you say something
  lexicon: LSJ
  rationale: Aorist infinitive of λαλέω, 'to speak.' Rendering with an English finite
    clause after 'before' gives idiomatic modern English while preserving the temporal
    sense.
- source_word: μάνθανε
  chosen: learn
  alternatives:
  - understand
  - be instructed
  lexicon: LSJ
  rationale: 'Imperative of μανθάνω. ''Learn'' best preserves the straightforward
    wisdom exhortation: acquire knowledge before speaking.'
- source_word: πρὸ
  chosen: before
  alternatives:
  - prior to
  lexicon: LSJ
  rationale: Preposition marking temporal priority; repeated in parallel with the
    first clause.
- source_word: ἀρρωστίας
  chosen: sickness
  alternatives:
  - illness
  - disease
  lexicon: LSJ
  rationale: The noun denotes sickness or bodily weakness. 'Sickness' is broad, natural
    English and fits the proverbial style.
- source_word: θεραπεύου
  chosen: seek treatment
  alternatives:
  - care for yourself
  - be treated
  - heal
  lexicon: LSJ
  rationale: Imperative of θεραπεύω. In this context, before the onset of sickness,
    the sense is preventive or timely care rather than literally 'heal' after illness
    has arrived. 'Seek treatment' captures the practical wisdom force in readable
    English without overparaphrasing.
