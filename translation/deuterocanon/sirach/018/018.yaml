translation:
  text: A foolish ingrate reproaches, and the gift of an envious man wears out the
    eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gift of one with an evil eye'—that is, a grudging or stingy giver.
      The Greek βασκάνος can evoke envy and the idiom of the 'evil eye.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μωρὸς
  chosen: foolish
  alternatives:
  - a fool
  - senseless
  lexicon: LSJ
  rationale: Adjectival use describing the kind of person in view. 'Foolish' keeps
    the proverbial tone in natural English; 'a fool' was possible, but the paired
    adjective-noun structure in English ('foolish ingrate') is concise and preserves
    the Greek characterization.
- source_word: ἀχάριστος
  chosen: ingrate
  alternatives:
  - ungrateful person
  - thankless one
  lexicon: LSJ
  rationale: The term denotes one lacking gratitude. 'Ingrate' is compact and idiomatic
    in a wisdom saying, preserving the moral force better than the more diffuse 'ungrateful
    person.'
- source_word: ὀνειδιεῖ
  chosen: reproaches
  alternatives:
  - insults
  - casts reproach
  - taunts
  lexicon: LSJ
  rationale: The verb means to heap reproach on or revile. 'Reproaches' stays close
    to the Greek and fits the wisdom-register better than the more colloquial 'insults.'
- source_word: δόσις
  chosen: gift
  alternatives:
  - giving
  - present
  lexicon: LSJ
  rationale: Although the noun can denote the act of giving, here the parallel with
    the character of the giver ('of an envious man') naturally points to the thing
    given. 'Gift' is the clearest English rendering.
- source_word: βασκάνου
  chosen: of an envious man
  alternatives:
  - of an evil eye
  - of a grudging man
  - of a stingy man
  lexicon: LSJ
  rationale: The adjective/noun family can denote envy or the 'evil eye.' In this
    context of giving, it refers to a person whose gift is poisoned by envy or grudging
    spirit. 'Of an envious man' is the most direct rendering from the Greek; the idiomatic
    nuance 'grudging/stingy' is preserved as an alternative because the phrase overlaps
    with the Semitic idea of the evil eye in matters of generosity.
- source_word: ἐκτήκει
  chosen: wears out
  alternatives:
  - consumes
  - wastes away
  - melts
  lexicon: LSJ
  rationale: The verb literally conveys consuming or wasting away. 'Wears out' gives
    a natural English idiom with 'the eyes' while preserving the metaphor of gradual
    depletion.
- source_word: ὀφθαλμούς
  chosen: the eyes
  alternatives:
  - eyesight
  lexicon: LSJ
  rationale: A literal rendering is preferable. In context it likely refers metaphorically
    to the emotional strain or disappointment caused by a grudging gift, but the Greek
    image should remain visible.
