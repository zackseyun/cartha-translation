id: SIR.18.18
reference: Sirach 18:18
source:
  edition: lxx-swete-1909
  text: μωρὸς ἀχάριστος ὀνειδιεῖ, καὶ δόσις βασκάνου ἐκτήκει ὀφθαλμούς.
  language: Greek
  pages:
