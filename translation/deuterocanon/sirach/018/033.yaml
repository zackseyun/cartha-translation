translation:
  text: Do not be a glutton and a drunkard, when there is nothing in your purse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew בַּכִּים is difficult; the Greek parallel reads 'in your purse' (ἐν
      μαρσιππίῳ), which supports the economic sense adopted here.
    reason: textual_variant
  - marker: b
    text: 'The Greek witness expands the warning: ''Do not become poor by feasting
      on borrowed money, when you have nothing in your purse.'''
    reason: alternative_reading
lexical_decisions:
- source_word: זוֹלֵל
  chosen: glutton
  alternatives:
  - one who squanders
  - profligate eater
  lexicon: HALOT
  rationale: In Hebrew wisdom usage, זולל commonly denotes a gluttonous or wasteful
    eater. Given its pairing with וְסוֹבֵא ('and a drunkard'), 'glutton' best preserves
    the vice list parallelism.
- source_word: וְסוֹבֵא
  chosen: drunkard
  alternatives:
  - winebibber
  - heavy drinker
  lexicon: HALOT
  rationale: The term denotes one given to excessive drinking. 'Drunkard' is idiomatic,
    morally weighty, and fits the paired warning with 'glutton'.
- source_word: וּמְאוּמָה אֵין
  chosen: when there is nothing
  alternatives:
  - and there is nothing
  - while there is nothing
  lexicon: HALOT
  rationale: The Hebrew clause states the condition of lacking anything at all. Rendering
    it with 'when' makes the admonition natural in English while preserving the causal/conditional
    force. The Greek likewise frames the warning around borrowing and having nothing
    on hand.
- source_word: בַּכִּים
  chosen: in your purse
  alternatives:
  - in your pockets
  - in your bag
  lexicon: HALOT
  rationale: The Hebrew reading is somewhat uncertain, but in light of the Greek parallel
    ἐν μαρσιππίῳ ('in the purse, money-bag'), the sense is clearly one's money pouch
    or available funds. 'Purse' is concise and matches the economic warning.
