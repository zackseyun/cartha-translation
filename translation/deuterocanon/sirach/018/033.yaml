theological_decisions:
- issue: Use of Hebrew primary witness with Greek parallel where the final Hebrew
    word is somewhat uncertain
  chosen_reading: Translate the vice warning from the Hebrew, but render the final
    clause economically as 'when there is nothing in your purse' in light of the Greek
    parallel.
  alternative_readings:
  - Do not be a glutton and a drunkard, and there is nothing among the weepers.
  - Do not become poor by feasting on borrowed money, when you have nothing in your
    purse.
  rationale: The Hebrew is primary for extant Sirach, but the closing word/form in
    Kahana is difficult. The Greek parallel points strongly to an economic sense involving
    lack of money in one's purse. The chosen rendering preserves the Hebrew admonition
    against gluttony and drunkenness while using the Greek as a consistency check
    for the final clause. The stronger Greek wording about becoming poor through borrowing
    is not adopted into the main text because it exceeds the extant Hebrew wording.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input without overruling extant Hebrew unnecessarily.'
