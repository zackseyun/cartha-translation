translation:
  text: Before you make a vow, prepare what is vowed, and do not be like one who tests
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew phrase rendered “what is vowed” is difficult and may also be
      understood more simply as “your vow.” The sense is that one should be ready
      to fulfill a vow before making it.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel differs substantially here, reading, “Will not dew cool
      the heat? So a word is better than a gift.” This suggests a different textual
      form behind the Greek tradition.
    reason: textual_variant
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: Before
  alternatives:
  - Prior to
  - Beforehand
  lexicon: HALOT
  rationale: Temporal marker introducing action that should precede the vow.
- source_word: תִּדּוֹר
  chosen: you make a vow
  alternatives:
  - you vow
  - you utter a vow
  lexicon: HALOT
  rationale: From נדר, 'to vow.' English verbal phrase 'make a vow' is idiomatic and
    clear.
- source_word: הָכֵן
  chosen: prepare
  alternatives:
  - set in order
  - make ready
  lexicon: HALOT
  rationale: Imperative calling for prior readiness; 'prepare' is natural modern English
    and fits the ethical instruction.
- source_word: נִדְרֶךָ
  chosen: what is vowed
  alternatives:
  - your vow
  - that which you have vowed
  lexicon: HALOT
  rationale: The form is textually awkward in the Hebrew witness, but in context it
    points to the content or fulfillment of the vow rather than merely the spoken
    formula. Rendering it as 'what is vowed' preserves the likely sense that one should
    have the means/intention to fulfill the vow before making it. The Greek parallel
    for this verse diverges substantially, so the Hebrew remains primary but with
    acknowledged uncertainty.
- source_word: בַּל
  chosen: do not
  alternatives:
  - lest
  - never
  lexicon: HALOT
  rationale: Standard negative particle with jussive/imperfect force in instruction.
- source_word: תִּהְיֶה
  chosen: be
  alternatives:
  - become
  lexicon: HALOT
  rationale: Simple existential/copular sense in prohibition.
- source_word: כִּמְנַסָּה
  chosen: like one who tests
  alternatives:
  - like one who tries
  - like one who puts to the test
  lexicon: HALOT
  rationale: מן נסה, 'to test/try.' The participial sense is best conveyed by 'one
    who tests.'
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD.'
