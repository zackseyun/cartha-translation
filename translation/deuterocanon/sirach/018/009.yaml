translation:
  text: 'The number of a man''s days is many years: a hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'A man's days may reach many years—one hundred.'
      The Greek is terse and elliptical.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀριθμός
  chosen: number
  alternatives:
  - count
  - sum
  - measure
  lexicon: LSJ
  rationale: The noun straightforwardly denotes a numerical total or count. 'Number'
    is the most direct and idiomatic rendering in this aphoristic statement.
- source_word: ἡμερῶν
  chosen: days
  alternatives:
  - lifetime
  - span of days
  lexicon: LSJ
  rationale: The genitive plural literally means 'of days.' Although the sense concerns
    lifespan, the Greek expresses it concretely as 'days,' which should be preserved
    in English.
- source_word: ἀνθρώπου
  chosen: a man's
  alternatives:
  - of a man
  - of a human being
  - of humankind
  lexicon: LSJ
  rationale: The singular generic noun refers representatively to a human person.
    Per the project's gender-accurate policy, 'a man's' preserves the singular masculine-generic
    force better than a pluralized or abstract rendering.
- source_word: πολλὰ
  chosen: many
  alternatives:
  - much
  - numerous
  lexicon: LSJ
  rationale: With ἔτη it yields the idiomatic phrase 'many years.' This keeps the
    concise proverbial style of the Greek.
- source_word: ἔτη
  chosen: years
  alternatives:
  - years of life
  lexicon: LSJ
  rationale: The word simply means 'years.' Combined with 'days,' the verse compresses
    lifespan language rather than contrasting two different ideas.
- source_word: ἑκατόν
  chosen: a hundred
  alternatives:
  - one hundred
  lexicon: LSJ
  rationale: The numeral is best left explicit. 'A hundred' is natural English and
    preserves the appositional force after the colon-like pause in the Greek.
