theological_decisions:
- issue: Sense of πειράζων τὸν κύριον
  chosen_reading: testing the Lord
  alternative_readings:
  - tempting the Lord
  rationale: Although πειράζω can be rendered 'tempt,' when God is the object the
    idiomatic and theological sense is 'test' or 'put to the test,' consistent with
    scriptural usage about improper challenge to God.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it; contested term κύριος rendered ''Lord''.'
- issue: Generic ἄνθρωπος
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The source uses singular masculine generic language in a wisdom saying.
    Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    English, while the generic force remains clear from context.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
