translation:
  text: Before you pray, prepare yourself, and do not be like a man testing the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tempting the Lord.' The Greek verb can mean either 'test' or 'tempt,'
      but here likely means putting the Lord to the test.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὶν
  chosen: Before
  alternatives:
  - Prior to
  - Beforehand
  lexicon: LSJ
  rationale: Temporal preposition introducing what should be done in advance of prayer.
- source_word: εὔξασθαι
  chosen: you pray
  alternatives:
  - to pray
  - to make a vow/prayer
  lexicon: BDAG
  rationale: The aorist middle infinitive of εὔχομαι can involve prayer or vow language,
    but in this wisdom context the natural sense is prayer addressed to God. Rendering
    with an English finite clause after 'Before' is idiomatic while preserving the
    sense.
- source_word: ἑτοίμασον
  chosen: prepare
  alternatives:
  - make ready
  - get ready
  lexicon: LSJ
  rationale: Imperative calling for deliberate readiness. 'Prepare' is concise and
    suitably weighty.
- source_word: σεαυτόν
  chosen: yourself
  lexicon: LSJ
  rationale: Direct reflexive object; the preparation is personal, not merely external.
- source_word: μὴ γίνου
  chosen: do not become
  alternatives:
  - do not be
  - do not turn into
  lexicon: BDAG
  rationale: γίνομαι often means 'become' or 'come to be.' 'Do not become' preserves
    the verbal force better than the flatter 'do not be,' suggesting one must not
    place oneself in such a posture.
- source_word: ὡς ἄνθρωπος
  chosen: like a man
  alternatives:
  - like a person
  - like one who
  lexicon: LSJ
  rationale: The Greek is singular masculine ἄνθρωπος. Per project philosophy, a gender-accurate
    rendering is preferred where the source uses masculine generic language. Here
    'man' reflects the form and generic wisdom style.
- source_word: πειράζων
  chosen: testing
  alternatives:
  - tempting
  - trying
  lexicon: BDAG
  rationale: πειράζω can mean test or tempt. Since the object is 'the Lord,' the sense
    is not enticing God to evil but putting him to the test, echoing biblical warnings
    against testing God.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this Jewish
    wisdom context it refers to God.
