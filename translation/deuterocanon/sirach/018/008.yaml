theological_decisions:
- issue: Generic masculine reference in wisdom-style anthropology
  chosen_reading: man ... his
  alternative_readings:
  - human being ... his
  - humankind ... its/their
  rationale: The Greek uses singular ἄνθρωπος with repeated singular pronouns. Following
    the project's gender-accurate policy, the main text preserves the masculine generic
    rather than flattening it into plural or abstract language.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Moral versus merely pragmatic force of κακόν
  chosen_reading: evil
  alternative_readings:
  - bad
  - harm
  rationale: The verse pairs ἀγαθόν and κακόν in a wisdom context that invites moral
    reflection, not merely practical assessment. 'Evil' preserves that weight while
    remaining a straightforward lexical rendering.
