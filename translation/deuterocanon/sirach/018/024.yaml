theological_decisions:
- issue: Whether the verse explicitly names God as the source of wrath, vengeance,
    and the turned-away face
  chosen_reading: Keep the wording implicit in the main text
  alternative_readings:
  - Interpret all three expressions explicitly as divine judgment
  - Interpret 'wrath' more generally as the consequences of sin
  rationale: The Greek does not explicitly name God, though the context strongly suggests
    divine judgment. To preserve the source's theological tension and imagery, the
    translation leaves the subject implicit rather than importing 'God' into the text.
