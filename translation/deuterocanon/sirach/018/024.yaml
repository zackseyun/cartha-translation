translation:
  text: Remember wrath in the days of your end, and the time of vengeance at the turning
    away of the face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anger' for 'wrath.' The Greek can denote strong anger generally, though
      here it likely refers to divine wrath in judgment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'in the turning away of a face.' This likely refers to the withdrawal
      of favor, probably God's, but the Greek does not explicitly name the subject.
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητι
  chosen: Remember
  alternatives:
  - Be mindful of
  - Recall
  lexicon: BDAG
  rationale: Aorist middle imperative of μιμνῄσκομαι/μιμνήσκομαι; 'Remember' is the
    most direct and natural imperative in English.
- source_word: θυμοῦ
  chosen: wrath
  alternatives:
  - anger
  - fury
  lexicon: BDAG
  rationale: θυμός can denote anger or wrath. 'Wrath' better fits the solemn warning
    context and pairs naturally with 'vengeance' in the next clause, likely referring
    to divine judgment rather than merely human emotion.
- source_word: ἐν ἡμέραις τελευτῆς
  chosen: in the days of your end
  alternatives:
  - at the days of death
  - in the days of your death
  - at life's end
  lexicon: LSJ
  rationale: τελευτή means end, completion, or death. The phrase is rendered closely
    as 'in the days of your end' to preserve the Greek wording while remaining intelligible;
    it likely points to one's final days or death.
- source_word: καιρόν
  chosen: the time
  alternatives:
  - a time
  - the appointed time
  - season
  lexicon: BDAG
  rationale: 'Although anarthrous in Greek, English idiom favors ''the time'' here
    because the following genitive specifies a definite event: the time of vengeance.'
- source_word: ἐκδικήσεως
  chosen: vengeance
  alternatives:
  - vindication
  - punishment
  - avenging
  lexicon: BDAG
  rationale: ἐκδίκησις can denote vengeance or vindication depending on context. Here,
    with wrath and the end in view, 'vengeance' best conveys punitive judgment. 'Vindication'
    is possible but less likely in this warning context.
- source_word: ἐν ἀποστροφῇ προσώπου
  chosen: when the face turns away
  alternatives:
  - at the turning away of the face
  - when he turns his face away
  - in the withdrawal of favor
  lexicon: LSJ
  rationale: Literally 'in a turning away of face.' The expression is somewhat idiomatic
    and likely refers to the withdrawal of divine favor or attention. 'When the face
    turns away' preserves the imagery without over-interpreting by explicitly supplying
    God as the subject in the main text.
