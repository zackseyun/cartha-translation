translation:
  text: Every prudent man has recognized wisdom, and to the one who found her he will
    give praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Every prudent person has recognized wisdom, and will give praise to
      the one who found it.' The Greek uses a masculine singular term for the discerning
      person and a feminine pronoun for wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  chosen: Every
  alternatives:
  - All
  - Each
  lexicon: LSJ
  rationale: Distributive sense fits the singular subject συνετός and yields natural
    English.
- source_word: συνετὸς
  chosen: prudent man
  alternatives:
  - understanding man
  - sensible man
  - wise man
  lexicon: LSJ
  rationale: The adjective denotes one with discernment or understanding. 'Prudent'
    preserves the nuance of practical discernment. 'Man' is retained because the Greek
    is masculine singular and the project's philosophy prefers gender-accurate rendering
    where the source uses masculine representative language.
- source_word: ἔγνω
  chosen: has recognized
  alternatives:
  - knew
  - has known
  - came to know
  lexicon: LSJ
  rationale: Aorist of γινώσκω here is best rendered as a completed recognition rather
    than simple stative knowledge. 'Has recognized' captures the sense of perceiving
    wisdom for what it is.
- source_word: σοφίαν
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering; no contextual pressure suggests a narrower gloss.
- source_word: τῷ εὑρόντι
  chosen: the one who found
  alternatives:
  - the finder of
  - him who found
  lexicon: LSJ
  rationale: Dative articular participle is naturally rendered as a substantival phrase
    in English. This keeps the syntax clear without over-paraphrase.
- source_word: αὐτὴν
  chosen: her
  alternatives:
  - it
  lexicon: LSJ
  rationale: Refers back to σοφία, a grammatically feminine noun commonly personified
    in wisdom literature. 'Her' preserves that literary-theological texture better
    than impersonal 'it'.
- source_word: δώσει
  chosen: he will give
  alternatives:
  - he gives
  - he shall give
  lexicon: LSJ
  rationale: Future indicative is straightforwardly rendered as future. The subject
    is understood from the preceding clause.
- source_word: ἐξομολόγησιν
  chosen: praise
  alternatives:
  - thanks
  - confession
  - acknowledgment
  lexicon: LSJ
  rationale: In this context the noun most naturally denotes thankful praise or commendation
    rather than confession of sins. 'Praise' is concise and idiomatic with 'give'
    in English, while still reflecting public acknowledgment.
