theological_decisions:
- issue: Scope of πᾶσαν σάρκα
  chosen_reading: The Lord's mercy extends broadly to all flesh, retaining the biblical
    idiom rather than narrowing it to humans only.
  alternative_readings:
  - all humanity
  - every living being
  rationale: The phrase is intentionally expansive and contrasts with the limited
    scope of ordinary human mercy. Retaining 'all flesh' preserves that theological
    breadth and scriptural resonance.
  doctrine_reference: 'Contested terms: σάρξ → flesh (literal) / sinful nature (metaphorical)'
