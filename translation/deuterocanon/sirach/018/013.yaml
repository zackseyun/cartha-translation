translation:
  text: A man's mercy is for his neighbor, but the Lord's mercy is for all flesh;
    he rebukes and disciplines and teaches and turns back, like a shepherd, his flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all humanity' or 'every living being'; Greek 'all flesh' is a broad
      biblical expression for creaturely life.
    reason: lexical_alternative
  - marker: b
    text: Or 'brings back' or 'restores'; the Greek literally means 'turning back,'
      fitting the image of a shepherd recovering strays.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - compassion
  - kindness
  lexicon: BDAG
  rationale: ἔλεος denotes merciful compassion shown to another. 'Mercy' preserves
    the ethical and theological weight in both clauses and keeps the parallel between
    human and divine action.
- source_word: ἀνθρώπου
  chosen: a man's
  alternatives:
  - a human's
  - a person's
  lexicon: BDAG
  rationale: The genitive singular contrasts an individual human with the Lord. Per
    gender-accurate policy, 'a man's' preserves the singular generic force better
    than a plural paraphrase, while still functioning representatively.
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - fellow human
  - companion
  lexicon: BDAG
  rationale: '''Neighbor'' is the standard and natural rendering for πλησίον in ethical
    contexts and preserves the interpersonal scope of ordinary human mercy.'
- source_word: Κυρίου
  chosen: the Lord's
  alternatives:
  - God's
  lexicon: BDAG
  rationale: κύριος defaults to 'Lord' per doctrine. The possessive form fits the
    parallel structure with 'a man's mercy'.
- source_word: πᾶσαν σάρκα
  chosen: all flesh
  alternatives:
  - all humanity
  - every living being
  lexicon: BDAG
  rationale: σάρξ here is not the Pauline metaphor 'sinful nature' but a broad creaturely
    term. 'All flesh' preserves the biblical idiom and the expansive contrast with
    'neighbor.'
- source_word: ἐλέγχων
  chosen: rebukes
  alternatives:
  - corrects
  - convicts
  lexicon: BDAG
  rationale: The participle describes the Lord's corrective mercy. 'Rebukes' best
    captures verbal reproof without over-specifying judicial conviction.
- source_word: παιδεύων
  chosen: disciplines
  alternatives:
  - trains
  - chastens
  lexicon: BDAG
  rationale: παιδεύω includes formative correction and training. 'Disciplines' preserves
    both corrective and educative force better than the narrower 'chastens' or softer
    'trains'.
- source_word: διδάσκων
  chosen: teaches
  alternatives:
  - instructs
  lexicon: BDAG
  rationale: A straightforward rendering that fits the sequence of divine pastoral
    actions.
- source_word: ἐπιστρέφων
  chosen: turns back
  alternatives:
  - restores
  - brings back
  - converts
  lexicon: BDAG
  rationale: The verb literally means to turn back/return. 'Turns back' preserves
    the image of bringing straying ones back, especially in the shepherd simile, without
    importing later technical theological language.
- source_word: ὡς ποιμήν
  chosen: like a shepherd
  alternatives:
  - as a shepherd
  lexicon: BDAG
  rationale: The simile is explicit. 'Like a shepherd' is idiomatic modern English.
- source_word: τὸ ποίμνιον αὐτοῦ
  chosen: his flock
  alternatives:
  - his little flock
  - his sheepfold
  lexicon: BDAG
  rationale: ποίμνιον denotes a flock. 'His flock' is natural English and preserves
    the pastoral metaphor without over-translating the diminutive nuance.
