translation:
  text: What he desires succeeds, and there is no hindrance to his salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What pleases him prospers'; the Greek parallel reads, 'At his command
      is every good pleasure, and there is no one who will diminish his salvation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תאות
  chosen: what he desires
  alternatives:
  - the desire of
  - his desire
  - the object of his desire
  lexicon: HALOT
  rationale: The construct from תאוה can denote desire or that which is desired. With
    רצונו following, the phrase is best rendered idiomatically as 'what he desires'
    rather than the more wooden 'the desire of his will.' This also aligns with the
    Greek sense πᾶσα ἡ εὐδοκία ('all good pleasure/will').
- source_word: רצונו
  chosen: he desires
  alternatives:
  - his will
  - his pleasure
  lexicon: HALOT
  rationale: רצון commonly means will, favor, or pleasure. In construct with תאות,
    an English verbal rendering ('he desires') produces natural English while preserving
    the sense of divine volition. 'His will' is possible, but 'what he desires' better
    reflects the Hebrew idiom as a whole.
- source_word: יצליח
  chosen: succeeds
  alternatives:
  - prospers
  - comes to pass
  lexicon: HALOT
  rationale: The Hifil of צלח often conveys prospering or succeeding. 'Succeeds' is
    concise and natural here, expressing that God's desired purpose is effectively
    accomplished. 'Prospers' is possible but can sound economic in English.
- source_word: מעצור
  chosen: hindrance
  alternatives:
  - restraint
  - obstacle
  - one who restrains
  lexicon: HALOT
  rationale: מעצור denotes something that restrains or blocks. The Hebrew says literally
    'there is no hindrance,' while the Greek has 'there is no one who will diminish.'
    'Hindrance' preserves the Hebrew witness as primary while remaining compatible
    with the Greek's emphasis that nothing can impede or reduce God's saving action.
- source_word: תשועתו
  chosen: his salvation
  alternatives:
  - his deliverance
  - his saving act
  - his victory
  lexicon: HALOT
  rationale: תשועה can mean salvation or deliverance. 'Salvation' is the most direct
    rendering and is supported by the Greek σωτήριον. In this wisdom context it refers
    broadly to God's saving power or saving outcome, not necessarily a narrowed later
    doctrinal sense.
