theological_decisions:
- issue: Whether תשועתו should be rendered in a narrowly soteriological sense or more
    broadly as deliverance
  chosen_reading: his salvation
  alternative_readings:
  - his deliverance
  - his saving act
  rationale: The Hebrew תשועה and Greek σωτήριον both naturally support 'salvation.'
    Because the verse speaks generally of God's effective will and unstoppable saving
    power, the translation keeps the broader biblical term without importing later
    systematic-theological specificity.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English without flattening theological weight.'
