theological_decisions:
- issue: Number of 'blessing' in the main text
  chosen_reading: 'singular collective: ''His blessing'''
  alternative_readings:
  - 'plural: ''Blessings'' or ''His blessings'''
  rationale: The Hebrew consonantal text presents a plural form, but the Greek parallel
    strongly supports a singular understanding. Because the sense is collective and
    the imagery is of one overwhelming outpouring, the singular is preferred in the
    main text while the plural is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referent of the pronominal suffix
  chosen_reading: '''His'' left as-is without explicit identification'
  alternative_readings:
  - '''God''s'' blessing'
  rationale: The verse itself uses a pronominal suffix without naming the referent
    in this line. Supplying 'God's' would clarify contextually but would go beyond
    the wording of the verse. The translation therefore preserves the pronoun.
  doctrine_reference: Translation philosophy §1, §3
