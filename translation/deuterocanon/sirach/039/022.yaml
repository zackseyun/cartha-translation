translation:
  text: His blessing overflowed like the Nile, and like a river it drenched the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Blessings like the Nile overflowed''; the Hebrew form is plural,
      while the Greek parallel reads singular, ''his blessing.'''
    reason: alternative_reading
  - marker: b
    text: Or 'watered the world' / 'saturated the dry land'; the Greek parallel reads
      'and like a flood it drenched the dry land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ברכות
  chosen: His blessing
  alternatives:
  - Blessings
  - His blessings
  lexicon: HALOT
  rationale: The Hebrew form is plural ('blessings'), but the Greek parallel has singular
    ἡ εὐλογία αὐτοῦ ('his blessing'). In English, a collective singular best captures
    the sense of beneficent abundance while respecting the parallel witness. The singular
    also reads more naturally with the following singular verbal imagery.
- source_word: כיאור
  chosen: like the Nile
  alternatives:
  - like the Nile River
  - like the river
  lexicon: HALOT
  rationale: יאר commonly refers specifically to the Nile in biblical and post-biblical
    Hebrew. Retaining 'Nile' preserves the Egyptian flood image rather than flattening
    it to a generic river.
- source_word: הציפה
  chosen: overflowed
  alternatives:
  - flooded
  - covered over
  lexicon: HALOT
  rationale: The verb conveys inundation/overflow. 'Overflowed' fits the Nile imagery
    and aligns well with the Greek ἐπεκάλυψεν ('covered over') without over-literalizing
    the English.
- source_word: וכנהר
  chosen: and like a river
  alternatives:
  - and like the river
  - and like a stream
  lexicon: HALOT
  rationale: The comparative introduces a second water image. 'River' is the straightforward
    rendering and matches the Greek ὡς ποταμός / κατακλυσμός imagery broadly.
- source_word: תבל
  chosen: the world
  alternatives:
  - the earth
  - the inhabited world
  lexicon: HALOT
  rationale: תבל often denotes the world in its inhabited sense. 'The world' is natural
    modern English and suits the universal scope of the blessing.
- source_word: ריותה
  chosen: drenched
  alternatives:
  - watered
  - satisfied with drink
  - soaked
  lexicon: HALOT
  rationale: From a root associated with being watered or saturated. 'Drenched' preserves
    the vivid flood imagery and corresponds well to the Greek ἐμέθυσεν ('made drunk,
    saturated') in context, without importing literal intoxication into English.
