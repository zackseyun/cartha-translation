  rationale: Zone 1 Hebrew is the primary witness for extant Sirach Hebrew, and here
    it reads למשפט נוצרו. The Greek parallel πάντα ταῦτα εἰς ἐκδίκησιν ἔκτισται shows
    an interpretive sharpening toward punitive recompense. Following project philosophy,
    the more original Hebrew witness governs the main text, while the Greek-informed
    alternative is preserved in a footnote.
