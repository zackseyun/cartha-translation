translation:
  text: Fire and hail, famine and pestilence—these also were created for judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''all these were created for vengeance'' or ''for punishment.''
      The Hebrew reads ''for judgment.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אש
  chosen: fire
  alternatives:
  - flame
  lexicon: HALOT
  rationale: The common Hebrew noun straightforwardly denotes fire. 'Fire' is the
    natural English equivalent and matches the Greek πῦρ.
- source_word: ברד
  chosen: hail
  lexicon: HALOT
  rationale: Standard rendering for the weather phenomenon; confirmed by Greek χάλαζα.
- source_word: רעב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: While the noun can denote hunger, in a list of calamities paired with
    fire, hail, and pestilence it is best rendered 'famine,' the more public/disaster-oriented
    sense. This also aligns with Greek λιμός.
- source_word: דבר
  chosen: pestilence
  alternatives:
  - plague
  - death
  lexicon: HALOT
  rationale: Hebrew דבר commonly denotes pestilence/plague. 'Pestilence' preserves
    the calamity sense without collapsing into the Greek translator's broader θάνατος
    ('death'). 'Plague' is possible, but 'pestilence' better reflects the traditional
    semantic range of דבר in judgment contexts.
- source_word: גם אלה
  chosen: these also
  alternatives:
  - even these
  - these too
  lexicon: HALOT
  rationale: The phrase adds these destructive forces to the preceding discussion
    of created things. 'These also' is clear, natural, and preserves the additive
    force.
- source_word: למשפט
  chosen: for judgment
  alternatives:
  - for justice
  - for punishment
  lexicon: HALOT
  rationale: משפט can mean judgment/justice. In this context of destructive agents
    sent against wrongdoing, 'for judgment' best preserves the broader judicial sense
    without narrowing too quickly to punishment alone. It also corresponds well to
    the Greek εἰς ἐκδίκησιν, which leans toward punitive vindication but may reflect
    interpretive expansion.
- source_word: נוצרו
  chosen: were created
  alternatives:
  - were formed
  - were fashioned
  lexicon: HALOT
  rationale: The passive plural indicates that these things came into being by divine
    agency. 'Were created' is idiomatic and fits the broader creation theme in the
    surrounding context, though 'formed' is a possible more literal nuance.
