translation:
  text: The works of God are all good, and for every need he provides in its time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''The works of the Lord are all good.'' The Hebrew witness
      here reads ''God'' rather than ''the Lord.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מעשה
  chosen: works
  alternatives:
  - deed
  - work
  lexicon: HALOT
  rationale: The singular noun functions collectively with כלם ('all of them'), referring
    to God's acts/works as a class. 'Works' is natural English and aligns with the
    Greek plural τὰ ἔργα.
- source_word: אל
  chosen: God
  alternatives:
  - the Lord
  lexicon: HALOT
  rationale: The Hebrew reads אל, a generic divine title here, not the Tetragrammaton.
    'God' reflects the Hebrew directly. The Greek parallel has Κυρίου ('of the Lord'),
    but the primary Hebrew witness should govern the main rendering.
- source_word: טובים
  chosen: good
  alternatives:
  - beneficial
  - excellent
  lexicon: HALOT
  rationale: טובים straightforwardly means 'good.' This preserves the verse's affirmation
    without overinterpreting it as merely useful or morally excellent.
- source_word: לכל צורך
  chosen: for every need
  alternatives:
  - for every necessity
  - for every purpose
  lexicon: HALOT
  rationale: צורך commonly denotes need or necessity. 'For every need' is idiomatic
    and fits the context of divine provision. 'Purpose' is possible in some contexts
    but is less likely here, especially in light of Greek χρείαν ('need').
- source_word: בעתו
  chosen: in its time
  alternatives:
  - at its time
  - in due time
  lexicon: HALOT
  rationale: 'The suffix most naturally refers to the need/occasion just mentioned:
    each need is met at its proper time. ''In its time'' preserves that linkage more
    closely than the more interpretive ''in due time.'''
- source_word: יספיק
  chosen: he will provide
  alternatives:
  - it will suffice
  - he will supply
  - he will make sufficient
  lexicon: HALOT
  rationale: 'The verb means to be sufficient or to supply sufficiently. Because the
    subject is implicit and the preceding clause concerns God''s works, English reads
    best by making God the understood subject: ''he will provide.'' The Greek χορηγήσει
    likewise supports an active sense of supplying/providing.'
