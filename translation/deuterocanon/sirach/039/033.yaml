- issue: Divine title in the first colon
  chosen_reading: '''God'' in the main text'
  alternative_readings:
  - '''the Lord'''
  rationale: The primary Hebrew witness reads אל ('God'), while the Greek parallel
    reads Κυρίου ('Lord'). Following original-language primacy for Sirach where Hebrew
    survives, the main text reflects the Hebrew. The Greek-based alternative is worth
    preserving in a footnote because it affects the divine title but not the verse's
    core sense.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Contested terms table for κύριος/YHWH not directly applicable because Hebrew here
