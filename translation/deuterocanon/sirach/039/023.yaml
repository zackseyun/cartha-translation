translation:
  text: So also his wrath will dispossess nations, and he will turn their drink into
    brine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''his wrath will inherit nations.'' The Hebrew likely means ''will
      dispossess nations,'' which better fits the judgment context.'
    reason: alternative_reading
  - marker: b
    text: Greek reads 'waters' where the Hebrew has a broader term meaning 'drink'
      or 'what is drunk.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כן
  chosen: So also
  alternatives:
  - Thus
  - Likewise
  lexicon: HALOT
  rationale: Introduces an analogy or corresponding action from the preceding context;
    'So also' preserves the comparative force naturally in English.
- source_word: זעמו
  chosen: his wrath
  alternatives:
  - his anger
  - his fury
  lexicon: HALOT
  rationale: The Hebrew noun denotes anger/wrath; 'wrath' better matches the gravity
    of divine judgment here, and aligns with the Greek ὀργή.
- source_word: גוים
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: '''Nations'' is the most standard and contextually fitting rendering
    for גוים in a judgment context; ''Gentiles'' would import a later Jewish/Christian
    contrast not explicit here.'
- source_word: יוריש
  chosen: will dispossess
  alternatives:
  - will cause to inherit
  - will drive out
  - will destroy
  lexicon: HALOT
  rationale: Hiphil of ירש can mean to cause to possess or to dispossess. In this
    context of wrath falling on nations, and with the Greek κληρονομήσει ('will inherit')
    likely reflecting a difficult Vorlage or interpretive rendering, the Hebrew sense
    'dispossess' best fits the judgment context and yields coherent parallelism with
    the second colon.
- source_word: ויהפך
  chosen: and he will turn
  alternatives:
  - and he will transform
  - and he changed
  lexicon: HALOT
  rationale: Simple future rendering of the waw-consecutive/imperfect sequence in
    poetic style; 'turn' is idiomatic and matches the Greek μετέστρεψεν conceptually.
- source_word: למלח
  chosen: into brine
  alternatives:
  - into salt
  - into saltiness
  lexicon: HALOT
  rationale: The phrase evokes water made salty, not merely the substance 'salt' in
    abstraction. 'Brine' communicates potable liquid rendered saline, which fits both
    the Hebrew and the Greek ἅλμην.
- source_word: משקה
  chosen: their drink
  alternatives:
  - drink
  - drinking water
  - waters
  lexicon: HALOT
  rationale: Hebrew משקה commonly means drink or beverage. Because the Greek has 'waters,'
    an alternative is worth preserving, but the Hebrew witness supports a singular
    collective sense such as 'their drink' or 'what they drink.' 'Their' is supplied
    in English to make the object of judgment explicit from context.
