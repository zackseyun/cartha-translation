theological_decisions:
- issue: Whether to follow the Hebrew ירש as 'dispossess' or the Greek κληρονομήσει
    as 'inherit'
  chosen_reading: will dispossess nations
  alternative_readings:
  - his wrath will inherit nations
  rationale: 'The project prioritizes the Hebrew witness for Sirach where it survives.
    Here the Hebrew line reads naturally as an act of judgment: divine wrath dispossessing
    nations, followed by turning drink into brine. The Greek was used as a real control
    and preserved in a footnote because it reflects a notable alternative construal.'
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition; §3, preserve tension in footnotes
- issue: Whether משקה should be rendered generically or as water specifically
  chosen_reading: their drink
  alternative_readings:
  - their waters
  - drinking water
  rationale: The Hebrew is broader than 'water,' though the Greek parallel specifies
    'waters.' The main text follows the Hebrew while preserving the Greek-specific
    alternative in a footnote.
  doctrine_reference: Translation philosophy §5, consistency with documented exception
