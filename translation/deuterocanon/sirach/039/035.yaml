lexical_decisions:
- source_word: עתה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing the concluding exhortation. The
    Greek has καὶ νῦν ('and now'), but the Hebrew primary witness has simply עתה.
    English 'Now' preserves the sense without adding unnecessary connective weight.
- source_word: בכל לב
  chosen: with all your heart
  alternatives:
  - with your whole heart
  - with every heart
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for wholeheartedness. Singular לב after בכל
    is best rendered idiomatically in English as 'with all your heart.' The Greek
    ἐν πάσῃ καρδίᾳ supports the same sense.
- source_word: הרנינו
  chosen: sing for joy
  alternatives:
  - rejoice aloud
  - raise a shout of joy
  lexicon: HALOT
  rationale: Imperative from רנן, conveying jubilant vocal rejoicing. 'Sing for joy'
    captures both the audible and celebratory force in natural English. The Greek
    ὑμνήσαμεν/underlying hymn language points toward vocal praise, supporting this
    rendering.
- source_word: וברכו
  chosen: and bless
  alternatives:
  - and praise
  - and speak blessing over
  lexicon: HALOT
  rationale: Standard rendering of ברך in doxological contexts. 'Bless' preserves
    the biblical idiom of blessing God's name more precisely than the broader 'praise.'
- source_word: את שם
  chosen: the name
  alternatives:
  - the name of
  - his name
  lexicon: HALOT
  rationale: Direct object marker plus noun; retained as 'the name' in construct with
    the following title. Biblical idiom treats 'the name' as a reverential metonym
    for the person and reputation of God.
- source_word: הקדוש
  chosen: the Holy One
  alternatives:
  - the holy name
  - the Holy
  lexicon: HALOT
  rationale: The Hebrew as transmitted reads 'the holy [one]' rather than the Greek's
    explicit Κυρίου ('Lord'). Rendering as 'the Holy One' respects the Hebrew primary
    witness and yields good English. 'The holy name' would require attaching the adjective
    directly to שם in a way less natural to the Hebrew wording here.
