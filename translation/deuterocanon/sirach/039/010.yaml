translation:
  text: Nations will recount his wisdom, and the assembly will proclaim his praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the congregation will declare his praise.' The Greek ἐκκλησία denotes
      the gathered community or assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: διηγήσονται
  chosen: will recount
  alternatives:
  - will tell of
  - will relate
  - will describe
  lexicon: BDAG
  rationale: Future middle indicative of διηγέομαι, conveying narrating or recounting
    in some detail. 'Recount' preserves the public testimonial sense better than the
    flatter 'tell of.'
- source_word: ἔθνη
  chosen: Nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: BDAG
  rationale: In wisdom literature and LXX usage, ἔθνη commonly denotes nations/peoples
    broadly. 'Nations' is the most straightforward and avoids importing a specifically
    Jew/Gentile contrast not explicit here.
- source_word: σοφίαν
  chosen: wisdom
  alternatives:
  - skill
  - understanding
  lexicon: BDAG
  rationale: Standard rendering for σοφία; in Sirach this carries moral and intellectual
    weight, and 'wisdom' best preserves that established sense.
- source_word: ἐξαγγελεῖ
  chosen: will proclaim
  alternatives:
  - will declare
  - will announce
  - will make known
  lexicon: BDAG
  rationale: The verb suggests public announcement. 'Proclaim' fits the elevated register
    and parallels the public speech implied by the first colon.
- source_word: ἐκκλησία
  chosen: assembly
  alternatives:
  - congregation
  - church
  lexicon: BDAG
  rationale: In this deuterocanonical Jewish context, ἐκκλησία refers to the gathered
    community/assembly, not specifically the later Christian church. 'Assembly' is
    the least anachronistic and most contextually accurate.
- source_word: ἔπαινον
  chosen: praise
  alternatives:
  - renown
  - commendation
  lexicon: BDAG
  rationale: The noun denotes praise or commendation. 'Praise' works naturally with
    'proclaim' and preserves the doxological/public-honor sense.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - —
  lexicon: BDAG
  rationale: The pronoun refers back to the wise person described in the surrounding
    context. Retaining 'his' follows the Greek and the project's gender-accurate policy.
