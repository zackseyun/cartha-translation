theological_decisions:
- issue: Hebrew 'strangers' versus Greek interpretive 'lawless'
  chosen_reading: Retain the Hebrew-based 'strangers' in the main text
  alternative_readings:
  - the lawless
  rationale: The project prioritizes the Hebrew witness for Sirach where extant. The
    Greek likely interprets 'strangers' morally as those alien to God's order, hence
    'lawless.' To avoid importing that interpretation into the main line, the Hebrew
    wording is preserved and the Greek sense is noted in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
