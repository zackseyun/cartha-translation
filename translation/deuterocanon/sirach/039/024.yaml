translation:
  text: The ways of the blameless are made straight; but for strangers they become
    ruinous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''for the lawless, stumbling blocks.'' The Greek appears to interpret
      the Hebrew ''strangers'' as those alien to God''s way.'
    reason: alternative_reading
  - marker: b
    text: The final Hebrew verb is difficult; the sense 'become ruinous' is guided
      by the Greek parallel, which reads 'stumbling blocks.'
    reason: textual_variant
lexical_decisions:
- source_word: ארחות
  chosen: ways
  alternatives:
  - paths
  - courses
  lexicon: HALOT
  rationale: Plural of אֹרַח commonly denotes ways or paths, often metaphorically
    for manner of life or course. 'Ways' is natural English and preserves the metaphor.
- source_word: תמים
  chosen: the blameless
  alternatives:
  - the upright
  - the innocent
  - the faithful
  lexicon: HALOT
  rationale: The Hebrew adjective תמים often means blameless, whole, or upright. The
    Greek parallel has τοῖς ὁσίοις ('for the holy/devout'), showing an interpretive
    tradition, but the Hebrew witness should govern here. 'The blameless' best reflects
    the Hebrew moral sense without over-specifying cultic holiness.
- source_word: יישרו
  chosen: are made straight
  alternatives:
  - are straight
  - become straight
  - are set right
  lexicon: HALOT
  rationale: From ישר, 'to be straight/right' or in causative nuance 'to make straight.'
    The form here conveys that the ways are straight/right for the blameless. 'Are
    made straight' preserves the verbal force while remaining idiomatic.
- source_word: כן
  chosen: but
  alternatives:
  - so
  - thus
  - likewise
  lexicon: HALOT
  rationale: Though כן often means 'thus/so,' in this antithetical proverb-like structure
    it marks the corresponding opposite clause. Rendering it 'but' brings out the
    contrast already implied by the parallelism.
- source_word: לזרים
  chosen: for strangers
  alternatives:
  - for outsiders
  - for aliens
  lexicon: HALOT
  rationale: זר literally means stranger/outsider. The Greek parallel reads τοῖς ἀνόμοις
    ('the lawless'), likely interpretive. Since the Hebrew is extant and confident,
    'strangers' is retained in the main text, likely in the sense of those alien to
    wisdom/God's ways.
- source_word: יסתוללו
  chosen: they become ruinous
  alternatives:
  - they become stumbling blocks
  - they are thrown into confusion
  - they become twisted
  lexicon: HALOT
  rationale: The verb is difficult and comparatively rare/uncertain in this form.
    The Greek parallel interprets the clause as 'stumbling blocks' (προσκόμματα),
    indicating a sense of obstruction or downfall. 'Become ruinous' captures the negative
    result without overcommitting to a precise etymology, while remaining anchored
    to the Hebrew and informed by the Greek.
