theological_decisions:
- issue: Whether the verse implies that harmful creatures and destructive forces are
    part of the created order under divine governance
  chosen_reading: The translation preserves the text's claim that these destructive
    agents 'were created' and are 'kept in store' for an appointed time, without softening
    the theological tension.
  alternative_readings:
  - Interpret the language as merely observational about nature rather than theological
  - Soften 'were created' to 'came to be'
  rationale: Both the Hebrew and Greek explicitly attribute these agents to creation
    and purposeful deployment. The translation should not mute that claim, even if
    it creates theological tension about divine judgment and harmful creatures.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
