translation:
  text: The teeth of wild beasts, and scorpions and vipers, and a sword that takes
    vengeance to destroy the wicked— all these were created for their purpose, and
    they are kept in store until the time they are appointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'adders' or 'asps'; the Hebrew names a venomous snake, and the exact
      species is uncertain. The Greek parallel has a general term for viper/snake.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to destroy'; the verb can also carry the stronger sense 'to devote
      to destruction' or 'to exterminate.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they are in the storehouse, and at the appointed time they are summoned.'
      The final clause is somewhat compressed in Hebrew; the sense is that these forces
      are reserved until their time of deployment.
    reason: alternative_reading
lexical_decisions:
- source_word: חית
  chosen: wild beasts
  alternatives:
  - beasts
  - animals
  lexicon: HALOT
  rationale: In construct with 'tooth/teeth,' the Hebrew denotes dangerous animals
    rather than animals in general. The Greek parallel θηρίων supports the sense of
    wild or savage beasts.
- source_word: שן
  chosen: teeth
  alternatives:
  - tooth
  - fangs
  lexicon: HALOT
  rationale: Although singular in Hebrew, it functions collectively here. 'Teeth'
    is natural English and matches the Greek plural ὀδόντες. 'Fangs' would be too
    specific, since the list includes more than snakes.
- source_word: עקרב
  chosen: scorpions
  alternatives:
  - a scorpion
  lexicon: HALOT
  rationale: Rendered as a plural collective in keeping with the series and the Greek
    parallel σκορπίοι.
- source_word: פתן
  chosen: vipers
  alternatives:
  - adder
  - asp
  lexicon: HALOT
  rationale: The exact zoological identification is uncertain. 'Vipers' communicates
    a venomous snake in clear modern English. 'Asp' is traditional but archaic; 'adder'
    is possible but narrower and regionally colored. The Greek ἔχεις points generally
    to a viper/snake.
- source_word: חרב נקמות
  chosen: a sword that takes vengeance
  alternatives:
  - a sword of vengeance
  - an avenging sword
  lexicon: HALOT
  rationale: The Hebrew construct expresses a sword characterized by vengeance. The
    verbal English phrase preserves the active force and aligns with Greek ῥομφαία
    ἐκδικοῦσα, 'a sword avenging/taking vengeance.'
- source_word: להחרים
  chosen: to destroy
  alternatives:
  - to exterminate
  - to devote to destruction
  lexicon: HALOT
  rationale: The verb can carry the stronger sense of putting under the ban/devoting
    to destruction, but in this wisdom context 'to destroy' is the clearest idiomatic
    rendering. The Greek εἰς ὄλεθρον supports a destruction sense without requiring
    technical herem language in English.
- source_word: רשעים
  chosen: the wicked
  alternatives:
  - the ungodly
  - evildoers
  lexicon: HALOT
  rationale: Standard rendering for the morally guilty. The Greek ἀσεβεῖς could suggest
    'ungodly,' but the Hebrew witness is primary here and 'the wicked' is the most
    natural equivalent.
- source_word: לצורכם
  chosen: for their purpose
  alternatives:
  - for their need
  - for their use
  - for the necessities of life
  lexicon: HALOT
  rationale: The Hebrew likely means according to the purpose or need for which these
    agents were made. 'For their purpose' avoids over-specifying whose need is in
    view while fitting the context of divinely ordered instruments. The Greek tradition
    differs here and points more toward 'for their uses,' so the English keeps the
    functional sense broad.
- source_word: נבראו
  chosen: were created
  alternatives:
  - have been created
  - were made
  lexicon: HALOT
  rationale: Straightforward passive perfective sense, emphasizing divine creation
    of even destructive agents.
- source_word: באוצר
  chosen: kept in store
  alternatives:
  - in the storehouse
  - in the treasury
  lexicon: HALOT
  rationale: The noun denotes a storehouse or treasury. 'Kept in store' gives idiomatic
    English while preserving the image of reserved instruments awaiting deployment.
- source_word: ולעת יפקדו
  chosen: until the time they are appointed
  alternatives:
  - and at the time they are summoned
  - and when the time comes they are mustered
  - and at the appointed time they are visited
  lexicon: HALOT
  rationale: The verb פקד here carries the sense of being called up, appointed, or
    mustered for action. 'Until the time they are appointed' fits the context of stored
    instruments released at a set time. The Greek parallel also suggests a future
    moment of activation.
