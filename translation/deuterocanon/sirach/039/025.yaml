translation:
  text: Good is allotted to the good from the beginning; so too, for the wicked, good
    and evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Good things were created for the good from the beginning;
      likewise for sinners, evil things.'' The Hebrew witness preserved here reads
      more fully, ''for the wicked, good and evil.'''
    reason: alternative_reading
lexical_decisions:
- source_word: טוב
  chosen: good
  alternatives:
  - what is good
  - benefit
  - prosperity
  lexicon: HALOT
  rationale: The Hebrew adjective/noun טוב appears twice and broadly denotes what
    is good or beneficial. 'Good' preserves the compact parallelism of the Hebrew
    and aligns with the Greek ἀγαθά/κακά contrast.
- source_word: חלק
  chosen: is allotted
  alternatives:
  - portion
  - share
  - assigned portion
  lexicon: HALOT
  rationale: Although חלק is formally a noun ('portion/share'), in this verbless poetic
    clause English needs a predicate. 'Is allotted' brings out the sense of an assigned
    portion, matching the Greek ἔκτισται only indirectly but preserving the Hebrew
    idea of distribution or apportionment.
- source_word: מראש
  chosen: from the beginning
  alternatives:
  - from the first
  - from the outset
  lexicon: HALOT
  rationale: מראש naturally means 'from the beginning/from the first.' This also coheres
    with the Greek ἀπʼ ἀρχῆς. 'From the beginning' is idiomatic and preserves the
    temporal scope.
- source_word: לרעים
  chosen: for the wicked
  alternatives:
  - for the evil
  - for evildoers
  - for sinners
  lexicon: HALOT
  rationale: The Hebrew רעים here refers to morally bad persons, not merely unfortunate
    circumstances. 'The wicked' is the most natural English equivalent in wisdom-style
    moral contrast. The Greek parallel has τοῖς ἁμαρτωλοῖς ('for sinners'), which
    supports a personal moral sense.
- source_word: טוב ורע
  chosen: good and evil
  alternatives:
  - prosperity and adversity
  - well-being and harm
  lexicon: HALOT
  rationale: The Hebrew phrase is left broad and antithetical. 'Good and evil' preserves
    the stark polarity of the source. More interpretive renderings like 'prosperity
    and adversity' narrow the semantic range beyond what the text requires.
