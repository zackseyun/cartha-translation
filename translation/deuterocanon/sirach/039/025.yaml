theological_decisions:
- issue: How to construe the final clause in relation to the Greek parallel
  chosen_reading: The Hebrew is rendered as stating that for the wicked there are
    both good and evil.
  alternative_readings:
  - The Greek parallel shortens the thought to 'for sinners, evils' only.
  - The line may imply that what is good for the good corresponds to what is bad for
    the wicked.
  rationale: The primary witness for this verse is the Hebrew, which explicitly reads
    'for the wicked, good and evil.' The Greek parallel is useful as a control but
    should not override the extant Hebrew. The translation therefore preserves the
    Hebrew's fuller wording while noting the Greek's simpler contrast.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    use Greek parallel as actual input without displacing the primary witness.'
