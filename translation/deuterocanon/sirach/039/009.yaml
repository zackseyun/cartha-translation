translation:
  text: Many will praise his understanding, and it will not be blotted out forever;
    his remembrance will not depart, and his name will live through generations of
    generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for generations and generations.' The Greek expression is an idiom for
      enduring through successive generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰνέσουσιν
  chosen: will praise
  alternatives:
  - will commend
  - will extol
  lexicon: BDAG
  rationale: Future active of αἰνέω, denoting spoken praise or commendation. 'Will
    praise' is the most natural and direct English equivalent.
- source_word: σύνεσιν
  chosen: understanding
  alternatives:
  - insight
  - intelligence
  lexicon: BDAG
  rationale: σύνεσις commonly denotes understanding, discernment, or insight. 'Understanding'
    fits wisdom-literature style and avoids sounding overly modern or technical.
- source_word: ἕως τοῦ αἰῶνος
  chosen: forever
  alternatives:
  - for the age
  - unto eternity
  lexicon: BDAG
  rationale: The idiom means enduring permanence. 'Forever' gives the sense in clear
    modern English while preserving the claim of lasting remembrance.
- source_word: ἐξαλειφθήσεται
  chosen: will be blotted out
  alternatives:
  - will be erased
  - will be wiped away
  lexicon: BDAG
  rationale: The verb literally means to wipe out or blot out. 'Blotted out' preserves
    the metaphorical force often used for names or memory.
- source_word: μνημόσυνον
  chosen: remembrance
  alternatives:
  - memory
  - memorial
  lexicon: BDAG
  rationale: μνημόσυνον can mean memorial or remembrance. Here, in parallel with 'his
    name will live,' 'remembrance' best captures continuing memory of the person rather
    than a physical monument.
- source_word: ἀποστήσεται
  chosen: will not depart
  alternatives:
  - will not cease
  - will not be removed
  lexicon: BDAG
  rationale: The verb means to depart or withdraw. With μνημόσυνον as subject, 'will
    not depart' preserves the Greek image of remembrance not passing away.
- source_word: ὄνομα
  chosen: name
  lexicon: BDAG
  rationale: Standard rendering. In this context 'name' carries the sense of reputation
    and enduring renown, but the literal term should be retained.
- source_word: ζήσεται
  chosen: will live
  alternatives:
  - will endure
  - will remain alive
  lexicon: BDAG
  rationale: The verb is literally 'will live.' Retaining 'live' preserves the vivid
    personification of the name's ongoing existence.
- source_word: εἰς γενεὰς γενεῶν
  chosen: through generations of generations
  alternatives:
  - for generations and generations
  - through all generations
  lexicon: BDAG
  rationale: A Semitic-style intensifying expression for very long duration across
    successive generations. 'Through generations of generations' stays close to the
    form while remaining intelligible.
