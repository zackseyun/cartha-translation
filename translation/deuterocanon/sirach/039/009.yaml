theological_decisions:
- issue: Degree of literalness in expressions of enduring fame
  chosen_reading: Retain the imagery of blotting out, remembrance, and a name living
    rather than flattening to abstract 'legacy.'
  alternative_readings:
  - His legacy will endure forever
  rationale: The verse uses concrete, poetic images typical of wisdom literature.
    Preserving them maintains the literary and theological texture without paraphrastic
    reduction.
