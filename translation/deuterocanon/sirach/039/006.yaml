theological_decisions:
- issue: Sense of ἐξομολογήσεται in relation to prayer
  chosen_reading: devotional thanksgiving/praise to the Lord
  alternative_readings:
  - confess to the Lord
  - acknowledge the Lord
  rationale: Although the verb can mean confess or acknowledge, the immediate context
    is the outflow of wisdom and prayer, favoring thankful praise rather than penitential
    confession. This avoids importing a sin-confession theme not explicit in the verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text says without importing doctrinal claims.'
