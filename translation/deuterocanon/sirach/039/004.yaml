theological_decisions:
- issue: Gendered language in ἀνθρώποις and μεγιστάνων
  chosen_reading: Render with 'men' rather than gender-neutral 'people' in the main
    text
  alternative_readings:
  - people
  - humanity
  rationale: The Greek uses masculine forms with representative force. Per doctrine,
    gender-accurate renderings are preferred over flattening to gender-neutral language
    unless context clearly demands otherwise. Here 'men' preserves the source texture
    and social setting.
