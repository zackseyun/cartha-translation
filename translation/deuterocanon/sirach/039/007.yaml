id: SIR.39.7
reference: Sirach 39:7
source:
  edition: lxx-swete-1909
  text: αὐτὸς κατευθυνεῖ βουλὴν αὐτοῦ καὶ ἐπιστήμην, καὶ ἐν τοῖς ἀποκρύφοις αὐτοῦ
    διανοηθήσεται·
