translation:
  text: At his word the waters pile up like a heap, and at the utterance of his mouth
    are storehouses of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads tersely, 'and at the utterance of his mouth, his storehouse';
      the Greek witness has 'storehouses of waters,' which clarifies the sense and
      is followed here.
    reason: alternative_reading
lexical_decisions:
- source_word: בדברו
  chosen: At his word
  alternatives:
  - By his word
  - When he speaks
  lexicon: HALOT
  rationale: 'The prefixed ב can be rendered instrumentally or temporally. In light
    of the Greek ἐν λόγῳ αὐτοῦ and the parallel colon, ''At his word'' preserves the
    concise Hebrew idiom while allowing both senses: by means of his command and upon
    his speaking.'
- source_word: יעריך
  chosen: pile up
  alternatives:
  - arrange
  - set in order
  - stand
  lexicon: HALOT
  rationale: From ערך, the basic sense is 'arrange/set in order.' In context with
    waters and the Greek ἔστη plus image of a heap, the idiomatic force is that the
    waters are marshaled into a piled mass. 'Pile up' communicates the concrete result
    without overparaphrasing.
- source_word: כנד מים
  chosen: like a heap
  alternatives:
  - like a mound of water
  - like a waterskin of water
  lexicon: HALOT
  rationale: נד commonly denotes a heap or piled mass, especially in descriptions
    of waters gathered up (cf. biblical usage). The Greek ὡς θιμωνιὰ ὕδωρ supports
    a 'heap' image. Rendering simply 'like a heap' is natural English; 'of water'
    is implicit from the subject 'the waters'.
- source_word: ובמוצא פיו
  chosen: and at the utterance of his mouth
  alternatives:
  - and by the utterance of his mouth
  - and at what comes out of his mouth
  lexicon: HALOT
  rationale: מוצא literally means 'going out, utterance.' Because the phrase is parallel
    to 'at his word,' 'at the utterance of his mouth' preserves the Hebrew concreteness
    and the poetic parallelism better than a flattened 'by his command'.
- source_word: אוצרו
  chosen: are storehouses of water
  alternatives:
  - his storehouses
  - his treasuries
  - reservoirs
  lexicon: HALOT
  rationale: 'The Hebrew as transmitted is terse (''his storehouse/treasury''), while
    the Greek explicitly reads ''storehouses of waters.'' Given the instruction to
    use the Greek as actual translation input and the likely ellipsis or compression
    in the Hebrew, ''are storehouses of water'' best reflects the sense: his spoken
    command brings the water-repositories into being or opens them.'
