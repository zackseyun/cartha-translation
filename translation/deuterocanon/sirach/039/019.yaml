translation:
  text: The deeds of all flesh are before him, and nothing is hidden from before his
    eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every living being' or 'all humanity' for 'all flesh'; the Hebrew idiom
      is broad, and the Greek parallel likewise reads 'all flesh.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''and it is not possible to be hidden from his eyes,'' making the
      impossibility slightly more explicit than the Hebrew wording.'
    reason: alternative_reading
lexical_decisions:
- source_word: מעשה
  chosen: deeds
  alternatives:
  - work
  - action
  - doing
  lexicon: HALOT
  rationale: 'The singular construct with כל בשר functions collectively: ''the deeds/work
    of all flesh.'' ''Deeds'' reads naturally in English while preserving the concrete
    sense of actions done, and aligns well with the Greek ἔργα (''works/deeds'').'
- source_word: כל בשר
  chosen: all flesh
  alternatives:
  - every living being
  - all humanity
  - every creature
  lexicon: HALOT
  rationale: Literally 'all flesh.' This Hebrew idiom can denote living creatures
    or humankind depending on context. Here, with the universal divine scrutiny of
    actions, 'all flesh' preserves the biblical idiom and its breadth without over-narrowing
    to humanity alone. The Greek πάσης σαρκὸς supports the literal rendering.
- source_word: נגדו
  chosen: before him
  alternatives:
  - in front of him
  - in his presence
  lexicon: HALOT
  rationale: The preposition conveys being set before or in the presence of someone.
    'Before him' is concise, idiomatic, and matches the Greek ἐνώπιον αὐτοῦ.
- source_word: אין נסתר
  chosen: nothing is hidden
  alternatives:
  - nothing is concealed
  - nothing can be hidden
  lexicon: HALOT
  rationale: The Hebrew states that nothing is hidden; the Greek infinitive construction
    ('it is not possible to be hidden') slightly emphasizes impossibility. 'Nothing
    is hidden' preserves the Hebrew directly while still communicating the same force
    in context.
- source_word: מנגד עיניו
  chosen: from before his eyes
  alternatives:
  - from his eyes
  - from his sight
  - from his gaze
  lexicon: HALOT
  rationale: This phrase intensifies the idea of divine sight. 'From before his eyes'
    is somewhat literal but still understandable, and it preserves the Hebrew wording
    and the Greek ἀπὸ τῶν ὀφθαλμῶν αὐτοῦ more closely than the smoother 'from his
    sight.'
