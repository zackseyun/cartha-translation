theological_decisions:
- issue: Scope of 'all flesh' under divine observation
  chosen_reading: Retain the idiom 'all flesh' rather than interpretively narrowing
    it.
  alternative_readings:
  - all humanity
  - every living being
  rationale: The verse asserts God's comprehensive knowledge of created beings' deeds.
    Because the Hebrew idiom and Greek parallel both use 'flesh,' the translation
    preserves that theological breadth and biblical diction rather than resolving
    the scope more narrowly than the text requires.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
