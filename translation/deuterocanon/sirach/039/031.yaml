translation:
  text: At his command they rejoice, and in their appointed order they do not rebel
    against his word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'his mouth.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel expands the line: ''they will be made ready on the earth
      for needs, and in their times they will not transgress a word.'' This supports
      the sense of created things functioning in their assigned order.'
    reason: alternative_reading
lexical_decisions:
- source_word: בצותו
  chosen: At his command
  alternatives:
  - When he commands
  - By his commanding
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of צוה is best rendered
    idiomatically as a temporal-circumstantial phrase. The Greek parallel ἐν τῇ ἐντολῇ
    αὐτοῦ supports understanding the phrase in relation to his command/commandment.
    'At his command' is concise and natural English while preserving the causal-temporal
    force.
- source_word: ישישו
  chosen: they rejoice
  alternatives:
  - they exult
  - they are glad
  lexicon: HALOT
  rationale: From שוש/שיש, expressing joy or exultation. 'Rejoice' is clear modern
    English and fits the personified obedience of creation in context. 'Exult' is
    possible but less natural here.
- source_word: ובחקם
  chosen: in their appointed order
  alternatives:
  - in their statute
  - in their fixed course
  - according to their decree
  lexicon: HALOT
  rationale: חק can denote statute, fixed ordinance, or prescribed limit/order. In
    this context of created things functioning as assigned by God, 'appointed order'
    best captures the sense of an assigned ordinance or fixed role. The Greek parallel
    ἐν τοῖς καιροῖς αὐτῶν / ἐπὶ τῆς γῆς εἰς χρείας ἑτοιμασθήσονται points toward ordered,
    timely function rather than legal statute in the narrow sense.
- source_word: לא ימרו פיו
  chosen: they do not rebel against his word
  alternatives:
  - they do not disobey his mouth
  - they do not defy his command
  lexicon: HALOT
  rationale: מרה means to be rebellious/disobedient. The idiom 'his mouth' in Hebrew
    commonly stands for what he says; in English 'his word' communicates the sense
    naturally without wooden literalism. The Greek οὐ παραβήσονται λόγον confirms
    the focus on not transgressing what he has spoken.
