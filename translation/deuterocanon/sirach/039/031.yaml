theological_decisions:
- issue: Anthropomorphic language for divine speech
  chosen_reading: his word
  alternative_readings:
  - his mouth
  rationale: The Hebrew literally says 'his mouth,' but the sense is his spoken command.
    Rendering 'his word' preserves the meaning in readable English without importing
    extra theology. The literal anthropomorphism is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §6; preserve source sense in readable
    modern English
