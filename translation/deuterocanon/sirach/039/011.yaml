theological_decisions:
- issue: Possible implication of death in ἀναπαύσηται
  chosen_reading: Render as 'comes to rest' rather than explicitly 'dies'
  alternative_readings:
  - if he dies
  - if he rests
  rationale: The verse may suggest that even after the sage's life ends, his influence
    continues. But the Greek uses the more general verb 'rest,' so the translation
    preserves that ambiguity rather than resolving it.
