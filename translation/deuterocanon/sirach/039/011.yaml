translation:
  text: If he remains steadfast, he will leave behind a name more than a thousand;
    and if he comes to rest, he still accomplishes them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'he will leave behind a name than a thousand.' The sense
      is likely that his name surpasses that of a thousand others.
    reason: lexical_alternative
  - marker: b
    text: '''Comes to rest'' may also imply death here, while still allowing the broader
      sense of repose.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν ἐμμένῃ
  chosen: If he remains steadfast
  alternatives:
  - If he persists
  - If he continues
  - If he remains
  lexicon: LSJ
  rationale: ἐμμένω commonly means remain in, persist, continue steadfastly. 'Remains
    steadfast' brings out the durative and commendatory sense in wisdom context better
    than the flatter 'remains.'
- source_word: ὄνομα καταλείψει
  chosen: he will leave behind a name
  alternatives:
  - he will leave a name
  - he will leave behind renown
  lexicon: LSJ
  rationale: The idiom literally speaks of leaving behind a name, meaning enduring
    reputation or memorial. Retaining 'name' preserves the biblical idiom while remaining
    intelligible in English.
- source_word: ἢ χίλιοι
  chosen: more than a thousand
  alternatives:
  - than a thousand
  - or a thousand
  lexicon: LSJ
  rationale: 'The transmitted Greek has ἢ, which in this context is awkward if rendered
    simply ''or.'' In comparative idiom it can function like ''than.'' ''More than
    a thousand'' yields coherent sense: his name outlasts or outweighs that of a thousand
    others. Because the source note indicates minor mismatch and the phrase is somewhat
    difficult, this is documented with an alternative in a footnote.'
- source_word: ἐὰν ἀναπαύσηται
  chosen: if he comes to rest
  alternatives:
  - if he rests
  - if he dies
  lexicon: LSJ
  rationale: ἀναπαύομαι means rest, take repose. In wisdom literature it may imply
    death, but the Greek does not explicitly say 'die.' 'Comes to rest' preserves
    the ambiguity between literal repose and death.
- source_word: ἐμποιεῖ
  chosen: he still accomplishes
  alternatives:
  - he produces
  - he effects
  - he works
  lexicon: LSJ
  rationale: ἐμποιέω can mean bring about, produce, effect. 'Accomplishes' fits the
    context of a sage whose influence continues even after rest.
- source_word: αὐτά
  chosen: them
  alternatives:
  - these things
  - it
  lexicon: LSJ
  rationale: The pronoun is plural and somewhat indefinite. 'Them' preserves the Greek's
    compactness, likely referring back to the sage's works or effects without over-specifying.
