theological_decisions:
- issue: Moral-religious characterization of the beneficiaries in the first colon
  chosen_reading: Render the Hebrew טובים with a morally positive sense informed by
    the Greek parallel, without over-specifying covenantal piety in the main text.
  alternative_readings:
  - for the godly
  - for the pious
  - for those who are good
  rationale: The Hebrew witness has טובים ('good ones'), while the Greek parallel
    interprets with εὐσεβέσιν ('godly/pious'). Because the project prioritizes the
    surviving Hebrew where available, the main text should not simply replace 'good'
    with 'godly'; however, the Greek should inform the sense. The chosen rendering
    keeps the Hebrew base while allowing the moral-religious force to remain visible.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
