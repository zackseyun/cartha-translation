translation:
  text: He will preserve the accounts of famous men, and he will enter into the twists
    of parables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the turns of proverbs' or 'the subtleties of figurative sayings.' The
      Greek παραβολῶν can denote a range of wisdom forms, not only narrative parables.
    reason: lexical_alternative
lexical_decisions:
- source_word: διηγήσεις
  chosen: accounts
  alternatives:
  - narratives
  - reports
  - recountings
  lexicon: LSJ
  rationale: The noun denotes narrated accounts or recitals. 'Accounts' is natural
    English and broad enough to cover remembered sayings or stories without over-specifying
    literary form.
- source_word: ἀνδρῶν ὀνομαστῶν
  chosen: famous men
  alternatives:
  - renowned men
  - men of name
  - notable men
  lexicon: LSJ
  rationale: Literally 'men who are named/renowned.' 'Famous men' is idiomatic and
    preserves the masculine reference present in the Greek, in line with the gender-accurate
    policy.
- source_word: συντηρήσει
  chosen: will preserve
  alternatives:
  - will keep
  - will maintain
  - will observe
  lexicon: LSJ
  rationale: The future verb can mean keep, preserve, or maintain. In context of remembered
    accounts, 'preserve' best conveys careful retention and guarding of tradition.
- source_word: στροφαῖς
  chosen: twists
  alternatives:
  - turns
  - windings
  - subtleties
  lexicon: LSJ
  rationale: The term refers to turns or convolutions. 'Twists' communicates the figurative
    complexity of wisdom sayings in accessible modern English.
- source_word: παραβολῶν
  chosen: parables
  alternatives:
  - proverbs
  - figures
  - comparisons
  lexicon: LSJ
  rationale: The Greek can cover parables, comparisons, or figurative sayings. 'Parables'
    is the most direct rendering of the source term, while still fitting wisdom literature's
    enigmatic sayings.
- source_word: συνεισελεύσεται
  chosen: will enter into
  alternatives:
  - will penetrate
  - will go into
  - will gain access to
  lexicon: LSJ
  rationale: The compound future verb literally means 'will go in with/into.' 'Will
    enter into' preserves the metaphor of moving into the meaning or complexity of
    the sayings without paraphrasing.
