translation:
  text: With the music of harp and instruments, so you shall speak with a shout.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lyre' for 'harp'; the Hebrew names an ancient stringed instrument whose
      exact modern equivalent is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or simply 'with a shout' or 'with acclamation'; the Hebrew term can denote
      a loud cry of rejoicing, and in some contexts a trumpet-like blast.
    reason: lexical_alternative
  - marker: c
    text: The Greek parallel for this verse is considerably fuller, explicitly calling
      for blessing the Lord and giving greatness to his name; the Hebrew witness here
      preserves only the musical-and-acclamatory portion.
    reason: textual_variant
lexical_decisions:
- source_word: בשירות
  chosen: With the service of
  alternatives:
  - In the service of
  - With songs of
  - In accompaniment of
  lexicon: HALOT
  rationale: The Hebrew likely derives from שירות, 'service/ministry/song-performance.'
    Given the parallel Greek continues with musical accompaniment and spoken praise,
    an instrumental or liturgical accompaniment sense fits better than a narrowly
    verbal 'songs of.' 'With the service of' preserves the Hebrew form while allowing
    the musical-liturgical setting.
- source_word: נבל
  chosen: harp
  alternatives:
  - lyre
  - lute
  lexicon: HALOT
  rationale: נבל denotes a stringed instrument. 'Harp' is a standard accessible rendering
    in English, though 'lyre' is also possible. The exact ancient instrument is uncertain,
    but 'harp' communicates the basic sense without excessive technicality.
- source_word: כלי מינים
  chosen: instruments of music
  alternatives:
  - various instruments
  - kinds of instruments
  - stringed instruments
  lexicon: HALOT
  rationale: כלי are instruments/vessels; מינים means kinds/species. The phrase naturally
    means instruments of various kinds. 'Instruments of music' gives idiomatic English
    and matches the musical context. 'Various instruments' is possible, but the chosen
    rendering reads more naturally in the line.
- source_word: וכן
  chosen: so
  alternatives:
  - and thus
  - likewise
  lexicon: HALOT
  rationale: 'וכן introduces the manner of what follows: ''and thus/so.'' ''So'' is
    concise and natural in English.'
- source_word: תאמרו
  chosen: you shall speak
  alternatives:
  - you shall say
  - say
  lexicon: HALOT
  rationale: The verb is straightforwardly 'say/speak.' 'Speak' works slightly better
    in English before the following phrase of shouted praise, while still preserving
    the verbal action.
- source_word: בתרועה
  chosen: with a shout of praise
  alternatives:
  - with a shout
  - with acclamation
  - with trumpet-blast
  lexicon: HALOT
  rationale: תרועה can denote a loud shout, acclamation, or trumpet-like blast. In
    this context of blessing and musical praise, 'with a shout of praise' best captures
    the celebratory liturgical force. A more literal 'with a shout' is preserved in
    a footnote because the exact nuance may be broader than explicit praise.
