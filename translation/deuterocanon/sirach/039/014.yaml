translation:
  text: Raise your voices and bless together, and give thanks to the LORD for all
    his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''And like frankincense send out fragrance, and blossom
      like a lily; spread fragrance and sing a song of praise.'' This fuller wording
