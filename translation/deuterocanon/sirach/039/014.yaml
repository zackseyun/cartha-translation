    reason: alternative_reading
lexical_decisions:
- source_word: הרימו
  chosen: Raise
  alternatives:
  - Lift up
  - Exalt
  lexicon: HALOT
  rationale: Imperative plural from רום in the causative sense, here governing 'your
    voice.' 'Raise' is natural modern English and preserves the concrete image better
    than the more idiomatic but less literal 'lift up.'
- source_word: קולכם
  chosen: your voice
  alternatives:
  - your sound
  - your voices
  lexicon: HALOT
  rationale: Literally 'your voice' (collective singular with plural suffix). English
    can render this collectively as 'your voice' after a plural imperative; 'your
    voices' is possible but slightly more interpretive. The singular keeps closer
    to the Hebrew while still reading naturally.
- source_word: וברכו
  chosen: and bless
  alternatives:
  - and praise
  lexicon: HALOT
  rationale: ברך in the piel commonly means 'bless.' Although in praise contexts English
    sometimes prefers 'praise,' 'bless' better preserves the Hebrew diction and the
    liturgical sense of speaking well of God.
- source_word: יחדו
  chosen: together
  alternatives:
  - as one
  - altogether
  lexicon: HALOT
  rationale: Adverb meaning 'together.' This straightforwardly conveys the communal
    force of the exhortation.
- source_word: והודו
  chosen: and give thanks
  alternatives:
  - and praise
  - and confess
  lexicon: HALOT
  rationale: ידה in the hifil often means 'give thanks' in worship contexts. 'Confess'
    is not suitable here; 'praise' overlaps semantically but loses the gratitude nuance.
- source_word: ליהוה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The Hebrew has the divine name YHWH. Per project doctrine, the default
    rendering is 'the LORD.'
- source_word: על כל מעשיו
  chosen: for all his works
  alternatives:
  - for all his deeds
  - for all that he has done
  lexicon: HALOT
  rationale: מעשים are deeds/works. 'Works' preserves the noun and matches biblical
    praise language; 'deeds' is possible, while 'all that he has done' is more dynamic
    than needed.
