translation:
  text: There are spirits created for judgment, and in their anger they move mountains;
    at the time of wrath they display their might, and they stir up a storm from the
    wasteland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'winds created for punishment.' Hebrew רוחות and Greek πνεύματα can denote
      either 'spirits' or 'winds.'
    reason: lexical_alternative
  - marker: b
    text: The latter clause is bracketed in the Cairo Geniza Hebrew edition, indicating
      some textual uncertainty; the Greek witness supports including the fuller sense
      of the verse.
    reason: textual_variant
lexical_decisions:
- source_word: רוחות
  chosen: spirits
  alternatives:
  - winds
  lexicon: HALOT
  rationale: Hebrew רוחות can mean 'winds' or 'spirits.' The parallel Greek πνεύματα
    likewise carries both senses, but the phrase 'created for judgment' points to
    personal or quasi-personal agents of divine punishment rather than mere weather
    phenomena. 'Spirits' best preserves that sense while allowing the storm imagery
    that follows.
- source_word: למשפט
  chosen: for judgment
  alternatives:
  - for justice
  - for punishment
  lexicon: HALOT
  rationale: 'The phrase indicates purpose: these spirits were created with judgment
    as their function. ''For judgment'' is broad enough to include punitive force
    without narrowing the term too quickly.'
- source_word: נוצרו
  chosen: created
  alternatives:
  - formed
  lexicon: HALOT
  rationale: The passive sense 'were created/formed' fits the Hebrew and aligns with
    the Greek ἔκτισται. 'Created' is slightly clearer in modern English and preserves
    divine agency implicitly.
- source_word: ובאפם
  chosen: in their anger
  alternatives:
  - in their wrath
  - with their nose/breath
  lexicon: HALOT
  rationale: אף in Hebrew commonly denotes anger/wrath idiomatically. Given the punitive
    context and the Greek ἐν θυμῷ αὐτῶν, 'in their anger' is the most natural rendering.
- source_word: הרים יעתיקו
  chosen: they move mountains
  alternatives:
  - they uproot mountains
  - they remove mountains
  lexicon: HALOT
  rationale: The Hebrew idiom suggests dislodging or shifting mountains. 'Move mountains'
    is idiomatic English and preserves the image of overwhelming destructive power
    without overcommitting to a more technical nuance.
- source_word: בעת זעם
  chosen: at the time of wrath
  alternatives:
  - in the time of fury
  - when wrath comes
  lexicon: HALOT
  rationale: The bracketed Hebrew phrase marks the occasion when these forces act.
    'At the time of wrath' is a close and readable rendering.
- source_word: גבורתם יראו
  chosen: they display their might
  alternatives:
  - their strength appears
  - they show their power
  lexicon: HALOT
  rationale: The Hebrew can be understood as their strength becoming visible or being
    shown. 'They display their might' gives a natural English expression of manifested
    power.
- source_word: וסער מן שדה יעוררו
  chosen: they stir up a storm from the wasteland
  alternatives:
  - they awaken a tempest from the field
  - they rouse a storm from the open country
  lexicon: HALOT
  rationale: סער is 'storm/tempest'; יעוררו is 'they arouse/stir up.' שדה literally
    means 'field,' but in this context likely denotes the open wild or wasteland from
    which destructive storm arises. This keeps the Hebrew image while sounding natural
    in English.
