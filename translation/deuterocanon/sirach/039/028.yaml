theological_decisions:
- issue: Whether to render רוחות/πνεύματα as impersonal meteorological forces or personal
    agents of divine punishment
  chosen_reading: personalized 'spirits' created for judgment
  alternative_readings:
  - winds created for punishment
  rationale: Both Hebrew and Greek allow either sense, and the verse blends cosmic
    and punitive imagery. Because the text speaks of these beings as created for judgment
    and acting in wrath, the main text uses 'spirits' while preserving the meteorological
    alternative in a footnote.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
- issue: How to handle the bracketed Hebrew clause in the Cairo Geniza witness
  chosen_reading: include the bracketed material in the main translation, with a note
    about source uncertainty
  alternative_readings:
  - omit the bracketed clause as secondary and translate only the first colon
  rationale: The supplied Hebrew witness includes the latter half in brackets, signaling
    some uncertainty, but the Greek parallel contains corresponding material and supports
    its inclusion as part of the verse. Transparency requires noting the uncertainty
    rather than silently excluding or flattening it.
  doctrine_reference: PHILOSOPHY.md transparency principle
