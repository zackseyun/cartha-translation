theological_decisions:
- issue: Relationship of 'law' and 'covenant' in ἐν νόμῳ διαθήκης Κυρίου
  chosen_reading: Rendered as 'in the law of the Lord’s covenant,' taking διαθήκης
    as qualifying νόμῳ.
  alternative_readings:
  - '''in the law, the covenant of the Lord'''
  - '''in the covenant law of the Lord'''
  rationale: The genitive most naturally links 'covenant' to 'law,' yielding a compact
    phrase about the covenantal law belonging to the Lord. This preserves the Greek
    structure without overinterpreting the exact nuance.
