translation:
  text: Listen to me, holy children, and bud like a rose growing by a stream of the
    field,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'devout sons.' The adjective can denote those who are pious or faithful
      in worshipful conduct.
    reason: lexical_alternative
  - marker: b
    text: Or 'blossom like a rose growing by a stream in the field.' The plant-growth
      imagery is exhortational and may be rendered with slightly different English
      verbs.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσακούσατέ
  chosen: Listen to
  alternatives:
  - Hear
  - Give heed to
  lexicon: LSJ
  rationale: The aorist imperative calls for attentive hearing in response to exhortation.
    'Listen to me' is natural modern English and preserves the direct appeal better
    than the more archaic 'hearken' or the flatter 'hear.'
- source_word: υἱοὶ
  chosen: sons
  alternatives:
  - children
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural, and the project's philosophy
    prefers gender-accurate rendering over neutralization. 'Sons' preserves the form
    of address; 'children' would smooth away the masculine wording.
- source_word: ὅσιοι
  chosen: holy
  alternatives:
  - faithful
  - devout
  - godly
  lexicon: LSJ
  rationale: Ὅσιος can denote pious or devout persons, but 'holy' best matches the
    adjective's consecrated/reverent force in a compact vocative phrase. 'Devout'
    is possible, but 'holy sons' preserves the elevated tone of the exhortation.
- source_word: βλαστήσατε
  chosen: bud forth
  alternatives:
  - sprout
  - blossom
  - put forth shoots
  lexicon: LSJ
  rationale: The imperative continues the hortatory imagery of plant growth. 'Bud
    forth' captures the emergence of new growth and fits the comparison to a rose.
    'Blossom' is attractive but slightly overstates the stage of growth implied by
    the verb itself.
- source_word: ῥόδον
  chosen: rose
  alternatives:
  - rosebush
  lexicon: LSJ
  rationale: The noun ordinarily denotes 'rose.' No expansion is needed in English.
- source_word: φυόμενον
  chosen: growing
  alternatives:
  - springing up
  lexicon: LSJ
  rationale: The participle describes the rose's ongoing growth. 'Growing' is the
    most straightforward and idiomatic rendering.
- source_word: ἐπὶ ῥεύματος
  chosen: beside a stream
  alternatives:
  - by a flowing channel
  - upon a stream
  lexicon: LSJ
  rationale: The phrase evokes proximity to running water rather than literal position
    on top of it. 'Beside a stream' communicates the image naturally in English.
- source_word: ἀγροῦ
  chosen: in a field
  alternatives:
  - of the countryside
  - in open country
  lexicon: LSJ
  rationale: ἀγρός commonly means field or cultivated/open land. 'In a field' keeps
    the concrete agricultural setting and works smoothly with the preceding phrase.
