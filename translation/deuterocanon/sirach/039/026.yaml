translation:
  text: The essentials for human life are water, fire, iron, and salt; wheat flour,
    milk, and honey; the blood of the grape, oil, and clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the blood of the grape'; this may refer broadly to grape drink,
      including wine, but the translation preserves the source's imagery.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew wording around 'wheat flour' is somewhat difficult in the Cairo
      Geniza text; the Greek parallel supports the sense 'wheat flour' or 'fine wheat
      flour.'
    reason: textual_variant
lexical_decisions:
- source_word: ראש
  chosen: the essentials
  alternatives:
  - the beginning
  - the chief things
  - the first things
  lexicon: HALOT
  rationale: In the Hebrew phrase ראש לחיי אדם, ראש functions idiomatically for what
    is primary or chief for human life, not temporal 'beginning.' The Greek parallel
    ἀρχὴ πάσης χρείας ('the beginning/principle of every need') supports the sense
    of what is fundamental or essential. 'The essentials' communicates this clearly
    in modern English.
- source_word: לחיי אדם
  chosen: for human life
  alternatives:
  - for the life of man
  - for a man's life
  lexicon: HALOT
  rationale: The phrase denotes what is needed for human living in general. Per project
    philosophy, this generic אדם is best rendered inclusively here as 'human life'
    rather than the more wooden 'man's life.'
- source_word: מים
  chosen: water
  lexicon: HALOT
  rationale: Straightforward concrete noun; basic necessity in the list.
- source_word: אש
  chosen: fire
  lexicon: HALOT
  rationale: Literal 'fire,' matching both Hebrew and Greek.
- source_word: ברזל
  chosen: iron
  lexicon: HALOT
  rationale: Literal material term; retained as 'iron' rather than generalized 'metal'
    because the source is specific.
- source_word: מלח
  chosen: salt
  lexicon: HALOT
  rationale: Literal and basic necessity in the list.
- source_word: חלב חטה
  chosen: wheat flour
  alternatives:
  - the fat of wheat
  - choice wheat
  - fine flour
  lexicon: HALOT
  rationale: The Hebrew as transmitted is awkward, but the Greek parallel has σεμίδαλις
    πυροῦ, clearly indicating fine wheat flour. 'Wheat flour' reflects the likely
    sense while staying close to the food-item list. 'The fat of wheat' would be too
    literal for an idiom that likely means the finest produce of wheat.
- source_word: חלב
  chosen: milk
  alternatives:
  - fat
  lexicon: HALOT
  rationale: In this food list, and confirmed by Greek γάλα, the word is best taken
    as 'milk,' not abstract 'fat.'
- source_word: דבש
  chosen: honey
  lexicon: HALOT
  rationale: Standard rendering; matches Greek μέλι.
- source_word: דם עינב
  chosen: the blood of the grape
  alternatives:
  - grape juice
  - wine
  lexicon: HALOT
  rationale: The Hebrew phrase is vivid and the Greek αἷμα σταφυλῆς closely parallels
    it. Retaining 'the blood of the grape' preserves the imagery and avoids over-resolving
    whether fermented wine is specifically intended.
- source_word: יצהר
  chosen: oil
  alternatives:
  - olive oil
  - fresh oil
  lexicon: HALOT
  rationale: יצהר commonly denotes fresh oil, usually olive oil. 'Oil' is sufficiently
    accurate and matches the Greek ἔλαιον without adding specificity not explicit
    in the verse.
- source_word: בגד
  chosen: clothing
  alternatives:
  - garment
  - raiment
  lexicon: HALOT
  rationale: Collective singular in Hebrew is naturally rendered as the mass noun
    'clothing' in English; this is more idiomatic than singular 'garment' in a list
    of necessities.
