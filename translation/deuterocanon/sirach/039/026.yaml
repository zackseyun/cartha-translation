- issue: Generic אדם rendering
  chosen_reading: human life
  alternative_readings:
  - man's life
  - the life of man
  rationale: The verse speaks generically of what humans need to live. Following the
    project's gender-accurate principle, inclusive English is appropriate because
    the source intends humanity generally, not males specifically.
