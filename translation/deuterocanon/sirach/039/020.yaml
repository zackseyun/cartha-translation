translation:
  text: From eternity to eternity he looks on, and nothing is too wondrous or too
    strong for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel reads, 'From age to age he looked, and nothing is marvelous
      before him,' lacking the Hebrew's additional 'or too strong.'
    reason: textual_variant
lexical_decisions:
- source_word: מעולם ועד עולם
  chosen: From eternity to eternity
  alternatives:
  - From age to age
  - From everlasting to everlasting
  - From the beginning to the end
  lexicon: HALOT
  rationale: The Hebrew idiom literally spans 'from age to age/eternity to eternity.'
    'From eternity to eternity' preserves the elevated temporal sweep and matches
    the parallel Greek ἀπὸ τοῦ αἰῶνος εἰς τὸν αἰῶνα without over-paraphrasing.
- source_word: יביט
  chosen: he looks on
  alternatives:
  - he sees
  - he gazes
  - he has looked
  lexicon: HALOT
  rationale: The verb denotes looking/seeing attentively. The Hebrew imperfect can
    be rendered as a present gnomic statement in wisdom literature. 'Looks on' preserves
    the visual sense and fits the context of God's comprehensive oversight. The Greek
    ἐπέβλεψεν is aorist, but in this context functions well as a general statement
    rather than a strictly past event.
- source_word: נפלא
  chosen: too wondrous
  alternatives:
  - wonderful
  - marvelous
  - hidden
  lexicon: HALOT
  rationale: The adjective/root can denote what is extraordinary or beyond human capacity.
    Because the clause is negative ('there is not...'), English idiom is clearer with
    'nothing is too wondrous for him,' expressing that nothing lies beyond his power
    or comprehension. This also aligns with the Greek θαυμάσιον ('marvelous/wondrous').
- source_word: חזק
  chosen: too strong
  alternatives:
  - strong
  - mighty
  - hard
  lexicon: HALOT
  rationale: The Hebrew explicitly adds the idea of strength/power, which is not reflected
    in the surviving Greek parallel ('nothing is wondrous before him'). Since the
    Hebrew is the primary witness here, the translation should preserve this second
    predicate. 'Too strong' idiomatically conveys that no force exceeds him.
- source_word: ממנו
  chosen: for him
  alternatives:
  - than him
  - from him
  - before him
  lexicon: HALOT
  rationale: 'With the negative existential and predicates, English idiom prefers
    ''for him'' in both halves: nothing is too wondrous or too strong for him. A more
    literal ''than him'' would be awkward and less clear. The Greek ἐναντίον αὐτοῦ
    suggests a relational sense (''before him/in his presence''), supporting a non-comparative
    English rendering.'
