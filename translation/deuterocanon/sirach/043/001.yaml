translation:
  text: The very substance of the heavens multiplies his splendor, and for every need
    the whole obeys. All of them differ from one another, and he made none of them
    to fail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The surviving Cairo Geniza Hebrew for this verse is difficult and differs
      notably from the Greek line; the Masada scroll also preserves a different Hebrew
      reading in this context. The main translation follows the clearer Greek parallel
      while taking the Hebrew evidence into account.
    reason: textual_variant
lexical_decisions:
- source_word: ועצם שמים / στερέωμα
  chosen: firmament
  alternatives:
  - vault of heaven
  - expanse
  lexicon: HALOT; LSJ
  rationale: The Hebrew witness in Zone 1 is difficult and appears textually disturbed
    here, while the Greek parallel is clear with στερέωμα, matching the traditional
    sense of a solid-seeming heavenly expanse. 'Firmament' preserves the cosmological
    imagery better than the flatter 'sky' or more interpretive 'vault,' while remaining
    recognizable in biblical English.
- source_word: מרבים הדרו / γαύριαμα
  chosen: splendor
  alternatives:
  - majesty
  - glory
  - pride
  lexicon: LSJ
  rationale: The Hebrew phrase is uncertain in this line, but both witnesses point
    to exalted magnificence. 'Splendor' fits the poetic register and avoids the negative
    connotation that 'pride' can carry in English.
- source_word: ὕψους
  chosen: the heights
  alternatives:
  - the height
  - the highest heaven
  lexicon: LSJ
  rationale: The Greek genitive naturally denotes the lofty realm above. 'The heights'
    is idiomatic English and preserves the elevated cosmological sense without over-specifying.
- source_word: καθαριότητος
  chosen: clear
  alternatives:
  - purity
  - brightness
  - cleanness
  lexicon: LSJ
  rationale: In context the term describes the sky's pure, unclouded quality. 'Clear'
    communicates this naturally in English, whereas 'purity' would sound abstract
    and potentially moralized.
- source_word: εἶδος οὐρανοῦ
  chosen: the appearance of heaven
  alternatives:
  - the form of heaven
  - the sight of heaven
  lexicon: LSJ
  rationale: εἶδος commonly denotes visible form or appearance. 'Appearance of heaven'
    best fits the visual, descriptive poetry.
- source_word: ἐν ὁράματι δόξης
  chosen: in a vision of glory
  alternatives:
  - in glorious sight
  - in a spectacle of glory
  lexicon: LSJ
  rationale: The phrase is visual and doxological. 'Vision of glory' preserves the
    elevated style and the possibility that the heavens are being described as a glorious
    sight, without forcing a technical prophetic sense.
