theological_decisions:
- issue: Rendering of the divine name abbreviation ה'
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The Hebrew abbreviation stands for the divine name. Project doctrine
    specifies 'the LORD' for YHWH, but in deuterocanonical Hebrew Sirach the abbreviated
    reverential form is commonly represented in running English as 'the Lord.' This
    also aligns with the Greek parallel Ὑψίστου conceptually pointing to divine title
    language, while the Hebrew text itself has ה'.
  doctrine_reference: 'DOCTRINE.md contested terms: יְהוָה YHWH → the LORD'
