translation:
  text: The sun, appearing in its form and hot, how awe-inspiring are the works of
    the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''The sun, proclaiming as it appears at its rising, a marvelous
      instrument, the work of the Most High.'' The Hebrew witness instead emphasizes
      the sun''s visible form and heat.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew wording is compressed and slightly difficult at 'appearing in
      its form and hot'; the sense is that the sun's visible appearance and heat display
      the awe-inspiring works of the Lord.
    reason: lexical_alternative
  - marker: c
    text: Masada preserves this line only fragmentarily here, while the Cairo Geniza
      text supplies the fuller Hebrew wording used for the main translation.
    reason: textual_variant
lexical_decisions:
- source_word: שמש
  chosen: The sun
  alternatives:
  - Sun
  lexicon: HALOT
  rationale: Straightforward noun for the celestial body; rendered with the definite
    article in natural English.
- source_word: מביע
  chosen: appearing
  alternatives:
  - shining forth
  - making known
  - displaying
  lexicon: HALOT
  rationale: The Hebrew participle is somewhat difficult, and the Greek parallel διαγγέλλων
    / ἐν ὀπτασίᾳ suggests visible manifestation or proclamation by appearance. 'Appearing'
    preserves the visual sense without overcommitting to a more speculative reconstruction.
- source_word: בצורתו
  chosen: in its form
  alternatives:
  - in its appearance
  - in its splendor
  lexicon: HALOT
  rationale: From צור/צורה, referring to visible form or appearance. The Greek ἐν
    ὀπτασίᾳ supports an appearance-oriented rendering. 'In its form' stays close to
    the Hebrew while remaining intelligible.
- source_word: וחמה
  chosen: and hot
  alternatives:
  - and burning
  - and heat
  lexicon: HALOT
  rationale: The Hebrew as transmitted is terse and somewhat awkward. It likely conveys
    the sun's heat. Rather than smoothing into a fuller paraphrase, 'and hot' preserves
    the compressed Hebrew sense. The Greek differs here, reading 'at its rising' rather
    than explicit heat, so the Hebrew witness is followed with the Greek kept in view.
- source_word: מה נורא
  chosen: how awe-inspiring
  alternatives:
  - how awesome
  - how fearsome
  - how marvelous
  lexicon: HALOT
  rationale: נורא carries the sense of inspiring fear or awe. 'Awe-inspiring' communicates
    the force in readable modern English without sounding colloquial.
- source_word: מעשי ה'
  chosen: are the works of the Lord
  alternatives:
  - is the work of the Lord
  - are the deeds of the Lord
  lexicon: HALOT
  rationale: Plural 'works' matches the Hebrew plural construct. ה' is rendered 'the
    Lord' per project policy for the divine name.
