translation:
  text: For great is the Lord who made it, and by his word he hastens its course.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Masada preserves only the first colon ('For great is the Lord who made it');
      the Cairo Geniza Hebrew continues with a difficult reading, and the Greek parallel
      supports the sense 'by his word he hastens its course.'
    reason: textual_variant
  - marker: b
    text: Or 'at his command he directs its course.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גדול
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: Predicate adjective describing the Lord; 'great' is the most direct and
    idiomatic rendering in this hymnic context.
- source_word: ה'
  chosen: the Lord
  alternatives:
  - YHWH
  lexicon: HALOT
  rationale: 'Follows project policy for the divine name: render as ''the Lord'' rather
    than transliteration.'
- source_word: עושהו
  chosen: who made it
  alternatives:
  - its maker
  - who made him
  lexicon: HALOT
  rationale: The suffix most naturally refers to the heavenly body under discussion
    in context (the moon), so English 'it' fits. A relative clause is smoother than
    a nominal phrase while preserving the sense.
- source_word: בדבריו
  chosen: by his word
  alternatives:
  - by his words
  - at his command
  lexicon: HALOT
  rationale: Singular 'word' best captures the instrumental sense in elevated English,
    while also aligning with the Greek ἐν λόγοις αὐτοῦ without overpluralizing in
    English. 'At his command' is interpretive and therefore left as an alternative.
- source_word: ינצח
  chosen: he hastens
  alternatives:
  - he directs
  - he drives onward
  - he gives victory to
  lexicon: HALOT
  rationale: The Hebrew form is difficult, but the Greek parallel κατέσπευσεν ('he
    hastened') strongly supports a sense of speeding or urging onward rather than
    'gives victory.' This also suits the astronomical context.
- source_word: אביריו
  chosen: its course
  alternatives:
  - its mighty ones
  - its path
  - its orbit
  lexicon: HALOT
  rationale: The Hebrew consonants are problematic in context, and the Greek parallel
    πορείαν points to 'course/journey.' Given the Masada fragment preserves only the
    first colon, the second colon is best translated with the Cairo Hebrew in light
    of the Greek. 'Course' is natural English for a celestial body's movement without
    importing modern technical language like 'orbit'.
