theological_decisions:
- issue: Divine name rendering
  chosen_reading: the Lord
  alternative_readings:
  - YHWH
  rationale: Project doctrine specifies rendering יהוה as 'the LORD/the Lord' rather
    than transliteration. Here the Hebrew source has ה', the reverential abbreviation
    for the divine name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Use of Hebrew with Greek parallel in a textually difficult colon
  chosen_reading: Translate the first colon from Hebrew and the second colon from
    the Hebrew as clarified by the Greek parallel
  alternative_readings:
  - Translate the second colon more literally from the difficult Hebrew alone
  - Follow the Greek alone for the whole verse
  rationale: The Hebrew is the primary witness for extant Sirach, but the second colon
    contains a lexical crux. The Greek parallel is explicitly to be used as translation
    input and provides a coherent sense ('hastened [its] course') that explains the
    line without abandoning the Hebrew base.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    parallel Greek as actual input'
