translation:
  text: There are the wonders of his marvelous works, every kind of living thing,
    and the great sea-creatures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and great/mighty ...'' with a difficult final phrase; the Greek
      parallel reads ''creation of sea-creatures,'' which likely preserves the intended
      sense.'
    reason: alternative_reading
lexical_decisions:
- source_word: שם
  chosen: There are
  alternatives:
  - there
  - therein
  - there is
  lexicon: HALOT
  rationale: Hebrew שם literally means 'there.' In English, an existential rendering
    ('There are') best conveys the verbless clause naturally while preserving the
    locative sense. The Greek ἐκεῖ supports the locative/existential force.
- source_word: פלאות
  chosen: wonders
  alternatives:
  - marvels
  - wonderful things
  lexicon: HALOT
  rationale: The noun denotes extraordinary or wondrous things. 'Wonders' is concise
    and matches the parallel Greek παράδοξα/θαυμάσια in sense.
- source_word: תמהי
  chosen: marvelous
  alternatives:
  - astonishing
  - amazing
  - wondrous
  lexicon: HALOT
  rationale: This adjective/participle-like form intensifies the sense of astonishment.
    'Marvelous' pairs well with 'wonders' without becoming overly wooden, and reflects
    the Greek θαυμάσια.
- source_word: מעשהו
  chosen: his work
  alternatives:
  - his deed
  - what he has made
  lexicon: HALOT
  rationale: The suffix is singular, referring to God's work/doing in context. 'His
    work' is broad enough to include creation and preserves the Hebrew compactness.
- source_word: מין כל חי
  chosen: every kind of living thing
  alternatives:
  - every species of animal life
  - all kinds of living creatures
  lexicon: HALOT
  rationale: מין is 'kind/species,' כל is 'every/all,' and חי is 'living thing/animal
    life.' This rendering is natural English and preserves the classificatory sense.
    The Greek ποικιλία παντὸς ζῴου points in the same semantic direction.
- source_word: וגבורות רבה
  chosen: the great sea-creatures
  alternatives:
  - great mighty creatures
  - great creatures
  - mighty creatures
  lexicon: HALOT
  rationale: 'The Hebrew as transmitted is difficult; taken alone, גבורות רבה would
    suggest ''great/mighty powers/creatures.'' The Greek parallel has κτίσις κητῶν,
    clearly referring to sea-monsters/sea-creatures. Because the task requires using
    the Greek parallel as actual translation input alongside the Hebrew, the English
    reflects the likely sense of the line in context: the mighty great creatures of
    the sea.'
