translation:
  text: It scorches the produce of the mountains with drought, and the pasture of
    plants with flame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel reads more generally, 'It will consume mountains and
      burn up the wilderness, and extinguish the green grass like fire.' The Hebrew
      text behind this translation is more compact and differs in imagery.
    reason: alternative_reading
  - marker: b
    text: The Hebrew phrase rendered 'with drought' uses a word for dryness; 'with
      dryness' is a possible more literal alternative.
    reason: lexical_alternative
lexical_decisions:
- source_word: יבול
  chosen: produce
  alternatives:
  - yield
  - crop
  - fruit
  lexicon: HALOT
  rationale: The noun denotes what the land brings forth. 'Produce' is broad enough
    for mountain vegetation and avoids the narrower agricultural feel of 'crop'.
- source_word: הרים
  chosen: mountains
  alternatives:
  - hills
  lexicon: HALOT
  rationale: The plain sense is 'mountains'; this also matches the Greek ὄρη.
- source_word: בחרב
  chosen: with drought
  alternatives:
  - with dryness
  - with heat
  lexicon: HALOT
  rationale: Hebrew חֹרֶב commonly denotes dryness/drought. In context of destructive
    natural forces, 'with drought' gives the idiomatic English sense. The Greek parallel
    has a more general destructive image ('will consume'), but the Hebrew witness
    is primary here.
- source_word: ישיק
  chosen: it scorches
  alternatives:
  - it burns
  - it destroys
  - it causes to wither
  lexicon: HALOT
  rationale: Given the paired image with 'flame' in the second colon, the verb is
    best rendered as a destructive burning/scorching action. 'Scorches' preserves
    the poetic parallelism without overcommitting to literal combustion in the first
    colon.
- source_word: נוה
  chosen: pasture
  alternatives:
  - habitation
  - meadow
  - dwelling-place
  lexicon: HALOT
  rationale: In this context with 'plants,' the sense is vegetative grazing-land or
    meadowland rather than human habitation. 'Pasture' fits the natural-world imagery.
- source_word: צמחים
  chosen: plants
  alternatives:
  - vegetation
  - growth
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun for what sprouts/grows.
    'Plants' is clear modern English; 'vegetation' is possible but less vivid.
- source_word: בלהבה
  chosen: with flame
  alternatives:
  - in flame
  - with blazing heat
  lexicon: HALOT
  rationale: The preposition plus noun is naturally instrumental here. 'With flame'
    preserves the compact poetic force and aligns with the Greek fire imagery (ὡς
    πῦρ).
