translation:
  text: He encircled the horizon in his glory, and the hand of God stretched out in
    his majesty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''He encircled the heaven with a circle of glory.'' The
      Hebrew reads ''the statute,'' which may reflect a different underlying text
      or a difficult poetic expression.'
    reason: alternative_reading
  - marker: b
    text: Hebrew has singular 'the hand of God'; Greek parallel has plural 'hands
      of the Most High.'
    reason: textual_variant
  - marker: c
    text: Masada preserves only a fragment here ('... in his glory'), while the Cairo
      Geniza text supplies the fuller wording used for the main translation.
    reason: textual_variant
lexical_decisions:
- source_word: חוק
  chosen: the statute
  alternatives:
  - the fixed order
  - the ordinance
  - the appointed boundary
  lexicon: HALOT
  rationale: The Hebrew reads חוק, normally 'statute/ordinance/fixed decree.' In context
    the Greek parallel has οὐρανόν ('heaven'), which suggests a divergent Vorlage
    or interpretive rendering. Because the Zone 1 primary witness is Hebrew and is
    rated high confidence, the main text stays anchored to חוק rather than importing
    'heaven' into the translation. 'Statute' preserves the concrete lexical value,
    while the footnote records the Greek alternative.
- source_word: הקיפה
  chosen: encircled
  alternatives:
  - surrounded
  - encompassed
  lexicon: HALOT
  rationale: The verb denotes going around or enclosing. 'Encircled' is concise and
    fits both a literal and exalted poetic register.
- source_word: בכבודה
  chosen: in his glory
  alternatives:
  - with his glory
  - in glory
  lexicon: HALOT
  rationale: The suffix is masculine singular in context and most naturally refers
    to God/the maker in the surrounding hymn. 'In his glory' preserves the preposition
    and the possessive sense without over-specifying.
- source_word: ויד אל
  chosen: and the hand of God
  alternatives:
  - and God's hand
  - and the hand of the Mighty One
  lexicon: HALOT
  rationale: אל can mean 'God' or 'mighty one.' Here the divine sense best matches
    the Greek parallel's 'hands of the Most High' and the surrounding doxological
    context. Singular 'hand' follows the Hebrew witness; the Greek plural is preserved
    in a footnote.
- source_word: נטתה
  chosen: stretched itself out
  alternatives:
  - was stretched out
  - extended
  lexicon: HALOT
  rationale: The verb נטה commonly means stretch out, extend, incline. 'Stretched
    itself out' reflects the feminine singular verb agreeing with 'hand' and keeps
    the vivid anthropomorphic imagery.
- source_word: בגבה
  chosen: in his majesty
  alternatives:
  - in his exaltation
  - in his height
  lexicon: HALOT
  rationale: The noun גבה/גובה can denote height or exaltation. In this poetic praise
    context, 'majesty' communicates elevated splendor more naturally than a spatial
    'height,' while remaining close to the semantic field.
