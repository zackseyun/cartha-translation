theological_decisions:
- issue: Divergence between Hebrew primary witness and Greek parallel
  chosen_reading: Main text follows the Hebrew wording, even where the Greek parallel
    points to 'heaven' and plural 'hands of the Most High.'
  alternative_readings:
  - He encircled the heaven with a circle of glory, and the hands of the Most High
    stretched it out.
  rationale: Project policy gives original-language primacy to the most-original witness
    available for Sirach; here Hebrew survives and is the primary source. The Greek
    is still treated as real translation input and confirms the verse's cosmic-theological
    setting, but it should not override the extant Hebrew in the main text without
    stronger textual grounds. The alternative is preserved in footnotes because the
    divergence materially affects interpretation.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    Translation philosophy §1 original-language primacy over translation tradition'
