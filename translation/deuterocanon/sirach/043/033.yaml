theological_decisions:
- issue: Rendering the divine name/title ה' in Sirach
  chosen_reading: The Lord
  alternative_readings:
  - the LORD
  rationale: The source has the reverential Hebrew abbreviation for the divine name,
    while the Greek parallel has ὁ κύριος. The translation uses 'The Lord' as a readable
    title rendering while preserving the identification with Israel's God. This is
    a stylistic/title decision rather than a doctrinal alteration.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD;
    translate titles'
- issue: Whether to include the Hebrew phrase שבח אבות עולם in the verse
  chosen_reading: Treat as secondary/carryover and exclude from the main translation
  alternative_readings:
  - Include as 'the praise of the fathers of old'
  - Footnote as a likely scribal carryover from the next section
  rationale: The primary Hebrew witness includes a phrase absent from the Greek parallel,
    and the phrase strongly resembles the incipit of the following section about praising
    the fathers. Since the verse is syntactically and semantically complete without
    it, and the Greek supports the shorter reading, the shorter text is preferred
    in the main line while preserving the issue in a footnote for transparency.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; document significant decisions'
