translation:
  text: The Lord is exceedingly awesome, and his words are wondrous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and his dominion is wondrous'' (or ''his rule is marvelous''),
      differing from the extant Hebrew ''and his words are wondrous.'''
    reason: alternative_reading
lexical_decisions:
- source_word: נורא
  chosen: awesome
  alternatives:
  - fearsome
  - terrible
  - awe-inspiring
  lexicon: HALOT
  rationale: The Hebrew adjective from ירא denotes that which inspires fear/awe. 'Awesome'
    best captures reverential dread in readable modern English; 'terrible' is archaic/misleading
    in contemporary usage, and 'fearsome' can sound merely threatening. The Greek
    parallel φοβερός supports the awe/fear sense.
- source_word: ה'
  chosen: The Lord
  alternatives:
  - the LORD
  rationale: The Hebrew abbreviation stands for the divine name. Following project
    doctrine for יְהוָה, render as 'the LORD/the Lord.' In Sirach's mixed-case style
    and with the Greek parallel Κύριος, 'The Lord' is a natural English title here.
- source_word: מאד מאד
  chosen: very, very
  alternatives:
  - exceedingly
  - utterly
  - greatly
  lexicon: HALOT
  rationale: The doubled מאד intensifies strongly. Rendering the repetition directly
    preserves the Hebrew emphasis better than collapsing it into a single adverb.
    The Greek parallel καὶ σφόδρα μέγας reflects strong intensification, though attached
    differently syntactically.
- source_word: ונפלאות
  chosen: and ... are wondrous
  alternatives:
  - and ... are marvelous
  - and ... are wonderful
  lexicon: HALOT
  rationale: The feminine plural adjective/noun from פלא conveys what is extraordinary
    or marvelous. Because the clause is verbless in Hebrew, English supplies 'are.'
    'Wondrous' preserves elevated but still accessible diction and matches the sense
    of extraordinary wonder.
- source_word: דבריו
  chosen: his words
  alternatives:
  - his deeds
  - his acts
  - his matters
  lexicon: HALOT
  rationale: The plain sense of דבריו is 'his words' or 'his utterances.' Although
    the Greek parallel reads 'his dominion/power' (ἡ δυναστεία αὐτοῦ), the primary
    Hebrew witness should govern where extant. A footnote preserves the Greek alternative
    because it materially affects interpretation.
