theological_decisions:
- issue: Rendering the divine name/title ה'
  chosen_reading: The Lord
  alternative_readings:
  - the LORD
  rationale: The project default for YHWH is 'the LORD.' Here the abbreviated Hebrew
    form ה' and the Greek Κύριος both point to the divine title. 'The Lord' is retained
    as a natural title in this verse while remaining doctrinally aligned with the
    default practice.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Primary-source priority where Hebrew and Greek differ in the second colon
  chosen_reading: his words are wondrous
  alternative_readings:
  - his dominion is wondrous
  - his rule is marvelous
  rationale: Zone 1 provides extant Hebrew for this verse, so the Hebrew wording governs
    the main text. The Greek parallel has a substantially different second colon,
    indicating either a variant Vorlage or translational divergence. To preserve transparency
    and theological/interpretive tension, the Greek-based alternative is kept in a
    footnote rather than imported into the main text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
