theological_decisions:
- issue: Implied subject versus literal noun at verse opening
  chosen_reading: Render the opening with an implied divine subject ('He settles...')
  alternative_readings:
  - Translate literally from Kahana as 'Mist of frost dwells like salt'
  - 'Follow the Greek more closely: ''He pours frost like salt upon the earth'''
  rationale: The Hebrew line in Kahana appears textually unstable, and the Masada
    evidence indicates a different wording in this vicinity. The Greek parallel confirms
    the verse describes God's action with frost. Since the surrounding context is
    a hymn to God's control of weather, supplying the implied subject yields coherent
    English while remaining anchored in the Hebrew-Greek evidence. The stronger Greek
    verb 'pours' was not adopted in the main text because the Zone 1 Hebrew verb is
    closer to 'settle/dwell.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity honestly'
