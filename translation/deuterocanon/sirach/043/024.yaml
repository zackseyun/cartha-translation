translation:
  text: Those who go down to the sea recount its far reaches; when our ears hear,
    we are astonished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads 'its danger' instead of Hebrew 'its far reaches/extremity.'
      The main text follows the extant Hebrew witness; the Greek preserves an interpretive
      or variant reading focused on the sea's peril.
    reason: alternative_reading
  - marker: b
    text: The Hebrew says literally 'those who go down to the sea,' an idiom for seafarers.
    reason: cultural_note
lexical_decisions:
- source_word: יורדי הים
  chosen: Those who go down to the sea
  alternatives:
  - Those who sail the sea
  - Seafarers
  - Those who travel on the sea
  lexicon: HALOT
  rationale: The Hebrew literally means 'those going down to the sea,' a standard
    idiom for seafarers. I preserved the Hebrew imagery with readable English rather
    than flattening it to a simple occupational label. The Greek parallel has 'those
    sailing the sea,' which confirms the maritime sense.
- source_word: יספרו
  chosen: recount
  alternatives:
  - tell
  - declare
  - describe
  lexicon: HALOT
  rationale: The verb denotes narrating or relating something. 'Recount' fits the
    testimonial sense of travelers reporting what they have experienced.
- source_word: קצהו
  chosen: its far reaches
  alternatives:
  - its end
  - its extremity
  - its danger
  lexicon: HALOT
  rationale: The Hebrew points to the sea's 'end/limit/extremity.' In context, this
    likely refers to the sea's remote extent or outer reaches. The Greek parallel
    reads 'its danger,' which reflects either a different Vorlage or an interpretive
    rendering. Because the primary Hebrew witness is strong here, the main text follows
    the Hebrew while preserving the Greek-based alternative in a footnote.
- source_word: לשמע אזנינו
  chosen: when our ears hear
  alternatives:
  - at the hearing of our ears
  - when we hear it
  - to our hearing
  lexicon: HALOT
  rationale: 'The Hebrew is idiomatic and somewhat emphatic: literally ''to the hearing
    of our ears.'' The chosen rendering keeps the sensory emphasis while sounding
    natural in English.'
- source_word: נשתומם
  chosen: we are astonished
  alternatives:
  - we are appalled
  - we are stunned
  - we marvel
  lexicon: HALOT
  rationale: The verb conveys being stunned or astonished. Given the context of hearing
    reports about the sea's vastness or peril, 'we are astonished' best captures the
    response without over-specifying fear. The Greek has 'we marvel,' which is close
    in sense.
