translation:
  text: At the flash he shakes out snow, and like locusts it settles where it stays.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew witness is difficult and differs sharply from the Greek parallel.
      The Greek reads instead about the sound of his thunder and a storm of the north
      wind. Masada also preserves a different Hebrew line here, reading in part 'the
      sound of thunder' where the Cairo Geniza text has 'at the flash.'
    reason: textual_variant
lexical_decisions:
- source_word: ברשף
  chosen: At the flash
  alternatives:
  - With a flash
  - At lightning
  lexicon: HALOT
  rationale: The Hebrew רשף commonly denotes a flash, flame, or lightning-like blaze.
    In this weather context, and with the parallel Greek reflecting storm phenomena,
    'At the flash' best preserves the terse instrumental-temporal force without over-specifying
    beyond the Hebrew.
- source_word: יניף
  chosen: he shakes out
  alternatives:
  - he brandishes
  - he waves
  - he causes to fly
  lexicon: HALOT
  rationale: From נוף/הניף, the verb can mean wave, brandish, or cause to move. With
    snow as object, 'shakes out' gives a natural English image of snow being cast
    down or scattered, matching the meteorological context better than the more literal
    but awkward 'waves' or 'brandishes'.
- source_word: שלגו
  chosen: snow
  alternatives:
  - his snow
  lexicon: HALOT
  rationale: The form includes a pronominal suffix, literally 'his snow,' but English
    normally omits such a possessive in impersonal weather description unless the
    theology of divine ownership is foregrounded. Since the verse focuses on the phenomenon
    itself, 'snow' is the clearest optimal-equivalence rendering.
- source_word: וכארבה
  chosen: and like locusts
  alternatives:
  - and like a locust swarm
  - and like grasshoppers
  lexicon: HALOT
  rationale: ארבה is the standard term for locust(s). The simile likely compares the
    dense settling or swarming descent of the snow. 'Like locusts' preserves the image
    compactly and literally.
- source_word: ישכון
  chosen: it settles
  alternatives:
  - it dwells
  - it rests
  - it lodges
  lexicon: HALOT
  rationale: שכן literally means dwell or settle. In context of snow after falling,
    'settles' communicates the resulting state in idiomatic English while retaining
    the core sense of coming to rest in a place.
- source_word: דירתו
  chosen: where it stays
  alternatives:
  - its dwelling place
  - its abode
  lexicon: HALOT
  rationale: דירה means dwelling or abode. Because the Hebrew line is textually uncertain
    and somewhat awkward in English if rendered woodenly, 'where it stays' preserves
    the locative sense in readable modern English without pretending greater certainty
    than the source warrants.
