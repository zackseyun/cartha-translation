theological_decisions:
- issue: Use of Hebrew primary witness with Greek parallel where the Hebrew verb is
    textually/lexically uncertain
  chosen_reading: Translate the clause as 'he opened the storehouses'
  alternative_readings:
  - '''he created a storehouse'' based on a strict reading of the Hebrew consonants'
  rationale: The Cairo Geniza Hebrew reads למען ברא אוצר, but the Greek parallel clearly
    supports an 'opened' sense ('the storehouses were opened'). Given the poetic context
    of weather imagery and the awkwardness of 'created a storehouse,' the translation
    follows the Hebrew as illuminated by the Greek parallel, while documenting the
    lexical uncertainty.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, using
    the Greek parallel as actual translation input for Sirach.'
