translation:
  text: Let us still speak of his greatness, for we cannot search him out; and he
    is greater than all his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Let us magnify/speak further, for we cannot search out';
      the object of 'search out' is implicit. The Greek parallel makes the reference
      to God explicit in sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: נגדלה
  chosen: Let us still speak of his greatness
  alternatives:
  - Let us magnify further
  - Let us praise yet more
  - Let us still exalt him
  lexicon: HALOT
  rationale: The Hebrew form is cohortative/plural from גדל, here functioning as an
    exhortation. Because the direct object is implicit and the following clause explains
    the inadequacy of human inquiry, an English rendering that continues the discourse
    ('Let us still speak of his greatness') fits both the Hebrew and the Greek parallel
    δοξάζοντες/implicit exhortation. 'Magnify' is more formal but less natural in
    modern English.
- source_word: עוד
  chosen: still
  alternatives:
  - yet
  - further
  - more
  lexicon: HALOT
  rationale: עוד marks continuation or addition. 'Still' gives natural modern English
    in an exhortative sentence; 'yet' or 'further' are possible but less idiomatic
    here.
- source_word: כי לא נחקור
  chosen: for we cannot search him out
  alternatives:
  - for we cannot investigate
  - for we cannot comprehend fully
  - for we cannot fathom him
  lexicon: HALOT
  rationale: The Hebrew חקר commonly denotes searching out, investigating, or probing
    fully. The object is implicit in Hebrew, but the Greek parallel points to God
    as the referent. 'Search him out' preserves the metaphor of inquiry without over-paraphrasing
    into 'comprehend fully,' though that sense is present.
- source_word: והוא גדול
  chosen: and he is greater
  alternatives:
  - and he is great
  - for he is great
  lexicon: HALOT
  rationale: Given the comparative force supplied by the following מכל מעשיו ('than
    all his works') and supported by the Greek ὁ μέγας παρὰ πάντα τὰ ἔργα αὐτοῦ, 'greater'
    is required rather than the simple predicate 'great'.
- source_word: מכל מעשיו
  chosen: than all his works
  alternatives:
  - than all that he has made
  - than all his deeds
  lexicon: HALOT
  rationale: מעשים can mean deeds or works; in this creation-hymn context 'works'
    naturally includes what God has made. 'Than all that he has made' is interpretive
    and smoother, but 'than all his works' stays closer to the source while remaining
    clear.
