theological_decisions:
- issue: Implicit object of 'we cannot search out'
  chosen_reading: The implied object is God himself ('we cannot search him out').
  alternative_readings:
  - 'The clause could be left absolute: ''for we cannot search out [enough]'''
  - 'The object could be rendered more abstractly: ''for we cannot fathom it/his greatness'''
  rationale: The Hebrew leaves the object unstated, but the immediate context and
    the Greek parallel make the referent clearly God rather than merely his works.
    Supplying 'him' in English is necessary for intelligibility and best reflects
    the sense without importing extra doctrine.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
