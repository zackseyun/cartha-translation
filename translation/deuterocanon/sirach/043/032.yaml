translation:
  text: Many such wonders exist, but I have seen only a few of his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''There are many hidden things greater than these.'' The Hebrew
      witness reads more briefly, ''Many such wonders...,'' without explicitly saying
      ''hidden things.'''
    reason: alternative_reading
  - marker: b
    text: Greek has 'we have seen only a few of his works,' while the extant Hebrew
      reads 'I have seen.'
    reason: textual_variant
lexical_decisions:
- source_word: רוב
  chosen: Many
  alternatives:
  - Most
  - An abundance of
  lexicon: HALOT
  rationale: In context with the Greek πολλὰ and the plural predicate, the sense is
    quantitative abundance rather than the stricter English superlative 'most.' This
    yields natural English while staying close to the Hebrew sense.
- source_word: נפלאות
  chosen: wonders
  alternatives:
  - marvels
  - wonderful things
  lexicon: HALOT
  rationale: The noun denotes extraordinary works that evoke awe. 'Wonders' is concise
    and fits the hymn-like context; 'marvels' is possible but slightly more literary.
- source_word: כאלה
  chosen: such
  alternatives:
  - like these
  - of this kind
  lexicon: HALOT
  rationale: This points back to the phenomena just described. 'Such' is idiomatic
    in English and preserves the comparative force.
- source_word: מעט
  chosen: only a few
  alternatives:
  - few
  - a little
  lexicon: HALOT
  rationale: With an implied object from the following phrase, the sense is not a
    small quantity in the abstract but that the speaker has seen only a limited number
    of God's works. 'Only a few' brings out the restrictive force clearly.
- source_word: ראיתי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: The perfect can be rendered as English present perfect here, expressing
    accumulated experience up to the present. This also aligns well with the Greek
    ἑωράκαμεν in sense, though the Greek has first person plural.
- source_word: ממעשיו
  chosen: of his works
  alternatives:
  - from his works
  - among his works
  - of what he has done
  lexicon: HALOT
  rationale: 'The מן is naturally partitive here: the speaker has seen only a few
    out of the totality of God''s deeds. ''Of his works'' is the most natural English
    expression of that partitive sense.'
- source_word: πολλὰ ἀπόκρυφά ἐστιν μείζονα τούτων
  chosen: Many such wonders exist, greater than these
  alternatives:
  - There are many hidden things greater than these
  - Many greater things than these remain concealed
  lexicon: BDAG
  rationale: The Greek parallel is fuller than the extant Hebrew and likely preserves
    the sense behind the compressed Hebrew. ἀπόκρυφα can mean 'hidden things,' but
    in this context of praising God's incomprehensible works, rendering the line as
    the existence of many greater wonders best integrates the Hebrew 'many such wonders'
    with the Greek comparative 'greater than these.' The more literal 'hidden things'
    is preserved in a footnote because it is a significant alternative.
