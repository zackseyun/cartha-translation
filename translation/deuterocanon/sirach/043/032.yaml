theological_decisions:
- issue: Whether to foreground the Greek adjective ἀπόκρυφα as 'hidden/secret' in
    the main text or to prioritize the Hebrew's simpler wording about many wonders
  chosen_reading: Main text emphasizes the abundance of greater wonders rather than
    explicitly calling them 'hidden.'
  alternative_readings:
  - There are many hidden things greater than these
  rationale: Zone 1 Hebrew is primary where extant, and it reads 'Many such wonders...'
    without an explicit equivalent to 'hidden.' Because the Greek parallel is fuller
    and likely preserves an expanded or clarified sense, its comparative 'greater
    than these' is incorporated into the main text, while the explicit 'hidden things'
    nuance is preserved in a footnote rather than allowed to override the Hebrew witness.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Person/number difference between Hebrew 'I have seen' and Greek 'we have
    seen'
  chosen_reading: Use singular 'I have seen' in the main text.
  alternative_readings:
  - for we have seen only a few of his works
  rationale: The extant Hebrew witness is the primary source for Sirach where preserved
    and has first person singular. The Greek plural is a meaningful variant or interpretive
    adjustment, so it is preserved in a footnote rather than adopted into the main
    text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition.'
