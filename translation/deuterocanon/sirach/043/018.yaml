translation:
  text: The appearance of snow dazzles the eyes, and at its falling the heart trembles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'whiteness' could be read here, but the Greek parallel and the weather
      context strongly support 'snow.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew line about its 'rain/shower' is textually awkward in context;
      the Greek parallel supports understanding the phrase as the snow's falling or
      precipitation.
    reason: textual_variant
  - marker: c
    text: Masada preserves a different neighboring line in this section ('and the
      sight amazes the heart'), showing some instability in the arrangement of these
      cola among Hebrew witnesses.
    reason: textual_variant
lexical_decisions:
- source_word: תואר
  chosen: appearance
  alternatives:
  - form
  - beauty
  - shape
  lexicon: HALOT
  rationale: In context with a weather phenomenon, the noun points to visible aspect
    or appearance rather than abstract beauty alone. The Greek parallel's κάλλος suggests
    attractiveness/beauty, but the Hebrew wording is best represented by a broader
    visual term that still fits the poetic line.
- source_word: לבנה
  chosen: snow
  alternatives:
  - whiteness
  lexicon: HALOT
  rationale: Although לבנה can denote whiteness, the Greek parallel explicitly has
    χιών ('snow'), and the surrounding context in Sirach 43 describes meteorological
    phenomena. Rendering it as 'snow' best accounts for both the Hebrew line and the
    Greek witness.
- source_word: יגהה עינים
  chosen: dazzles the eyes
  alternatives:
  - brightens the eyes
  - makes the eyes shine
  lexicon: HALOT
  rationale: The verb conveys shining/brightness affecting the eyes. In English, 'dazzles
    the eyes' naturally captures the striking brilliance of snow and aligns with the
    Greek ἐκθαυμάσει ὀφθαλμός, which emphasizes astonished visual response.
- source_word: ממטרו
  chosen: at its falling
  alternatives:
  - from its rain
  - at its shower
  - from its downpour
  lexicon: HALOT
  rationale: The Hebrew as transmitted reads a form related to 'rain/shower,' but
    in this context of snow the sense is its precipitation or descent. The Greek parallel
    speaks of 'its rain/fall' (ἐπὶ τοῦ ὑετοῦ αὐτῆς). 'At its falling' preserves the
    meteorological image without forcing 'rain' into a snow context.
- source_word: יהמה לב
  chosen: the heart is amazed
  alternatives:
  - the heart roars
  - the heart is stirred
  - the heart is in tumult
  lexicon: HALOT
  rationale: The verb can denote tumult or agitation. Given the Greek ἐκστήσεται καρδία
    ('the heart will be beside itself / amazed'), the line points to inward astonishment
    rather than literal roaring. 'Is amazed' communicates the poetic emotional effect
    in readable English.
