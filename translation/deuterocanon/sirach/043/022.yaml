translation:
  text: 'A healing for all: a massing cloud of dew, driving back the scorching heat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a massing cloud of dew' is difficult; the Greek parallel reads 'mist,
      dew,' pointing to cooling moisture rather than a storm cloud.
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be understood more literally as 'driving away
      the scorching heat to enrich/moisten,' with 'for refreshment' expressing the
      likely sense in idiomatic English.
    reason: alternative_reading
  - marker: c
    text: The Masada scroll for this area is fragmentary and does not supply a clear
      competing reading for this verse; the translation is anchored in the Cairo Geniza
      Hebrew with the Greek parallel used as a control.
    reason: textual_variant
lexical_decisions:
- source_word: מרפא כל
  chosen: A healing for all
  alternatives:
  - Healing for everything
  - The healing of all
  lexicon: HALOT
  rationale: מרפא naturally denotes healing/remedy. כל can be read broadly ('all/everything'),
    but in context of beneficial natural phenomena a concise predicative line 'A healing
    for all' fits the Hebrew and aligns with the Greek ἴασις πάντων.
- source_word: מערף ענן טל
  chosen: a massing cloud of dew
  alternatives:
  - a dripping cloud of dew
  - an overcast cloud of dew
  - a gathering mist of dew
  lexicon: HALOT
  rationale: The Hebrew is difficult. Kahana reads מערף with ענן טל. In light of the
    Greek ὁμίχλη, δρόσος ('mist, dew'), the phrase points to moisture-laden cloud/mist
    rather than rain proper. 'Massing cloud of dew' preserves the cloud image while
    reflecting the cooling moisture implied by the Greek parallel.
- source_word: פורע
  chosen: driving back
  alternatives:
  - repaying
  - loosening
  - dispersing
  lexicon: HALOT
  rationale: Given the object שרב ('scorching heat'), a sense like 'drive away/remove'
    best suits the context. More literal senses such as 'repay' do not fit here. The
    Greek ἀπὸ καύσωνος ἱλαρώσει supports an effect of relief from heat.
- source_word: לדשן
  chosen: for refreshment
  alternatives:
  - to make luxuriant
  - to enrich
  - to moisten richly
  lexicon: HALOT
  rationale: The root commonly relates to richness/fatness, but in this climatic context
    the result is refreshment and renewed vitality. 'For refreshment' captures the
    idiomatic force in natural English while staying close to the Hebrew sense of
    restorative enrichment.
- source_word: שרב
  chosen: the scorching heat
  alternatives:
  - the heat
  - the sirocco
  - the burning wind
  lexicon: HALOT
  rationale: שרב denotes parching heat, often hot wind. 'Scorching heat' is clear
    modern English and matches the Greek καύσων ('heat').
