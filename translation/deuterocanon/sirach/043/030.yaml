theological_decisions:
- issue: How explicitly to state God's incomparability in the final clause
  chosen_reading: for there is still more
  alternative_readings:
  - for he surpasses even this
  - for he is greater still
  rationale: The Hebrew witness is concise and slightly elliptical, while the Greek
    makes the implication explicit. Because the project prioritizes the Hebrew where
    it survives, the main text stays close to the Hebrew wording; the stronger explicative
    Greek sense is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
