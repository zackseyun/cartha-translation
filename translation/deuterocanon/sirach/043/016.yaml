translation:
  text: At the sound of his thunder the earth writhes; the blasts of the north are
    storm and tempest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel reads: ''and at his appearing the mountains will be shaken;
      at his will the south wind blows.'' This differs substantially from the extant
      Hebrew, whose second line speaks of the north''s blasts as storm and tempest.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew verb for 'writhes' can also be rendered 'trembles' or 'shakes,'
      with an image of convulsive motion.
    reason: lexical_alternative
lexical_decisions:
- source_word: קול
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: HALOT
  rationale: In the construct phrase 'קול רעמו' the sense is the audible report of
    thunder. 'Sound' is natural English and avoids overpersonalizing as 'voice' in
    this meteorological context.
- source_word: רעמו
  chosen: his thunder
  alternatives:
  - his roaring
  - his peal
  lexicon: HALOT
  rationale: From רעם, referring to thunder. The pronominal suffix points to God in
    context. 'His thunder' is the clearest rendering and preserves the theocentric
    attribution.
- source_word: יחיל
  chosen: writhes
  alternatives:
  - trembles
  - shakes
  - is in labor pains
  lexicon: HALOT
  rationale: The verb חול/חיל can denote writhing, trembling, or labor-like convulsion.
    'Writhes' preserves the vivid bodily imagery better than the flatter 'trembles,'
    while still fitting the earth as subject.
- source_word: ארצו
  chosen: the earth
  alternatives:
  - his earth
  - his land
  lexicon: HALOT
  rationale: Although the suffix could be rendered literally as 'his earth/land,'
    English idiom strongly favors 'the earth' here, with the possessive understood
    from the broader context of God's creation. 'Land' would narrow the scope too
    much in this cosmic hymn.
- source_word: זלעפות
  chosen: blasts
  alternatives:
  - fury
  - burning winds
  - raging gusts
  lexicon: HALOT
  rationale: The noun can denote fierce, scorching, or raging blasts. In collocation
    with 'north' and followed by storm terms, 'blasts' best captures violent wind
    without overcommitting to heat imagery.
- source_word: צפון
  chosen: the north
  alternatives:
  - north wind
  lexicon: HALOT
  rationale: The Hebrew literally says 'north.' In context it functions meteorologically,
    effectively the north wind. 'The north' keeps closer to the wording while remaining
    intelligible.
- source_word: סופה
  chosen: storm
  alternatives:
  - whirlwind
  - tempest
  lexicon: HALOT
  rationale: A standard term for violent storm or whirlwind. 'Storm' is broad and
    readable; 'tempest' is reserved for the following term to preserve some distinction.
- source_word: וסערה
  chosen: and tempest
  alternatives:
  - and gale
  - and whirlwind
  lexicon: HALOT
  rationale: סערה overlaps with storm/whirlwind language. Rendering it 'tempest' gives
    an English distinction from סופה while preserving the intensification of violent
    weather.
