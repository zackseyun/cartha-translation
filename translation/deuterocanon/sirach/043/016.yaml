theological_decisions:
- issue: Divine possessive suffix in meteorological imagery
  chosen_reading: Rendered the suffix in רעמו as 'his thunder' but smoothed ארצו to
    'the earth.'
  alternative_readings:
  - '''At the sound of his thunder his earth writhes'''
  - '''At the sound of his thunder his land trembles'''
  rationale: The verse attributes the thunder to God, and retaining 'his' there is
    theologically and poetically important. Repeating the possessive with 'earth/land'
    in English sounds awkward and may suggest a narrower territorial sense not intended
    in context.
  doctrine_reference: 'Translation philosophy: readable modern English; original-language
    primacy with documented exception.'
- issue: Hebrew-Greek divergence in the second colon
  chosen_reading: Followed the Hebrew line about the north's blasts being storm and
    tempest in the main text.
  alternative_readings:
  - 'Greek parallel: ''and by his appearing mountains will be shaken; at his will
    the south wind blows'''
  rationale: The Hebrew is the primary witness where extant for Sirach, per project
    philosophy. However, the Greek parallel differs substantially enough to merit
    preservation in a footnote as a major alternative tradition.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives,
    using Greek parallel as actual input and consistency check.'
