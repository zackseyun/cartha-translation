theological_decisions:
- issue: Whether to include an explicit divine subject ('the Lord') in the main text
  chosen_reading: 'Keep the subject implicit in the main text: ''At his word'''
  alternative_readings:
  - At the word of the Lord the decree stands
  rationale: The primary Zone 1 Hebrew reads 'בדבר אל' with a minor mismatch and no
    explicit אדני in the line as presented, while the older Masada witness reads 'בדבר
    אדני יעמד חק.' Since the task requires anchoring in Zone 1 while using parallels
    as real input, the translation preserves the implicit divine reference with 'his'
    rather than importing 'the Lord' directly into the main text. The stronger explicit
    reading is preserved in a footnote.
