translation:
  text: At his word the decree stands, and they do not fail in their watches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Masada reads 'At the word of the Lord the decree stands,' making the divine
      subject explicit where the Cairo Geniza text is less explicit.
    reason: textual_variant
  - marker: b
    text: Or 'they do not grow weak in their stations'; the Hebrew verb is uncertain
      here, and the Greek parallel supports the sense of not slackening or failing.
    reason: lexical_alternative
lexical_decisions:
- source_word: בדבר
  chosen: At his word
  alternatives:
  - By a word
  - At the word
  lexicon: HALOT
  rationale: The Hebrew preposition ב with דבר can indicate instrument or occasion.
    The parallel Greek ἐν λόγοις/likely reflecting 'by/at word' supports a concise
    causal-instrumental sense. Masada explicitly reads 'בדבר אדני' ('at the word of
    the Lord'), while the Cairo Geniza text lacks 'אדני'; because Zone 1 is primary,
    the main text keeps the pronoun implicit rather than supplying 'the Lord' in the
    line itself.
- source_word: יעמד
  chosen: stands
  alternatives:
  - is established
  - holds firm
  lexicon: HALOT
  rationale: The verb עמד commonly means 'stand' or 'remain standing.' 'Stands' is
    vivid and natural English, while still allowing the sense of fixed establishment
    in context.
- source_word: חק
  chosen: the decree
  alternatives:
  - statute
  - fixed order
  - ordinance
  lexicon: HALOT
  rationale: In this cosmic context, חק refers to an appointed fixed order or ordinance.
    'Decree' communicates an authoritative appointment without sounding overly legalistic;
    'statute' is too legislative in English, and 'fixed order' is possible but less
    idiomatic here.
- source_word: ולא ישח
  chosen: and they do not fail
  alternatives:
  - and they do not sink
  - and they do not droop
  - and they do not slacken
  lexicon: HALOT
  rationale: The Hebrew form is somewhat uncertain in this witness, but in context
    with the Greek οὐ μὴ ἐκλυθῶσιν ('they will certainly not grow weak/relax') and
    Masada's 'ולא ייעפו' ('they do not grow weary'), the sense is steadfast non-failure.
    'Do not fail' captures the functional meaning in readable English while acknowledging
    textual uncertainty.
- source_word: באשמרותם
  chosen: in their watches
  alternatives:
  - in their stations
  - in their guard-posts
  - during their watches
  lexicon: HALOT
  rationale: אשמרות normally denotes watches, guard periods, or watch-posts. The Greek
    ἐν φυλακαῖς αὐτῶν supports 'in their watches/guard-posts.' 'In their watches'
    preserves the image of appointed heavenly stations or courses.
