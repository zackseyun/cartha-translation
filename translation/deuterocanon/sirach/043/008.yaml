theological_decisions:
- issue: Use of Hebrew versus Greek in a partially difficult poetic line
  chosen_reading: Primary translation follows the extant Hebrew, with awareness of
    the Greek parallel where the Hebrew is obscure.
  alternative_readings:
  - 'Translate the first colon more in line with the Greek: ''Month by month, according
    to its name, it increases wondrously in change.'''
  - Smooth the second colon dynamically as a general description of the moon among
    the heavenly host.
  rationale: Per project philosophy, Hebrew is primary for Sirach where it survives.
    Here the Hebrew is extant but the latter half is textually and syntactically difficult,
    and the Greek confirms the general moon imagery without resolving every Hebrew
    crux. The draft therefore keeps the Hebrew imagery relatively transparent and
    preserves major alternatives in footnotes.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    preserve ambiguity rather than over-resolve.'
