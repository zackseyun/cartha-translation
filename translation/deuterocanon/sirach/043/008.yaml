translation:
  text: Month by month it renews itself—how awe-inspiring it is in its changing! A
    vessel of the host on high, from the expanse of the sky is its shining.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Month by month, according to its name, it increases wondrously
      in change.'' This reflects a different wording or interpretation than the extant
      Hebrew ''Month by month it renews itself.'''
    reason: alternative_reading
  - marker: b
    text: The Hebrew of the second half is difficult and likely textually uncertain.
      Masada preserves related wording that differs from the Cairo Geniza text in
      this line; the general sense is that the moon belongs to the heavenly host and
      shines from the sky.
    reason: textual_variant
  - marker: c
    text: Or 'harp of the heights.' The Hebrew phrase is unusual and may be metaphorical
      rather than literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: חדש בחדשו הוא מתחדש
  chosen: Month by month it renews itself
  alternatives:
  - New in its month it is renewed
  - By its name, month by month, it increases
  lexicon: HALOT
  rationale: The Hebrew Cairo Geniza reading plainly uses the root חדש twice and בחדשו
    naturally yields a temporal sense, 'in/at its month' or idiomatically 'month by
    month.' The Greek parallel reflects a different Vorlage or interpretation ('month
    according to its name'), but the Hebrew witness is primary here. 'Renews itself'
    preserves the reflexive sense of מתחדש and fits the moon context of the surrounding
    verses.
- source_word: מה נורא
  chosen: how awe-inspiring
  alternatives:
  - how fearsome
  - how marvelous
  lexicon: HALOT
  rationale: נורא denotes that which inspires awe or fear. In this hymnic description
    of creation, 'awe-inspiring' communicates the reverential force in readable modern
    English without overstating terror.
- source_word: בהשתנותו
  chosen: in its changing
  alternatives:
  - in its transformation
  - when it changes
  lexicon: HALOT
  rationale: The noun from שנה here refers to alteration/change. 'In its changing'
    stays close to the Hebrew construction while sounding natural in English and matching
    the moon's phases.
- source_word: כלי צבא
  chosen: A vessel of the host
  alternatives:
  - an instrument of the host
  - a weapon of the army
  lexicon: HALOT
  rationale: כלי can mean vessel, implement, instrument, or weapon; צבא can mean army/host.
    Given the cosmic context and the following מרום, the phrase likely depicts the
    moon as one item among the heavenly host rather than a military weapon. 'Vessel
    of the host' is somewhat formal but preserves the metaphor and avoids over-interpreting.
- source_word: נבלי מרום
  chosen: the lyre of the heights
  alternatives:
  - the harp of the heights
  - the lute of heaven
  lexicon: HALOT
  rationale: נבל commonly denotes a stringed instrument, often rendered 'harp' or
    'lyre.' Because the Hebrew is textually difficult and the phrase is unusual in
    context, 'lyre' keeps the lexical sense while signaling metaphorical imagery.
    'Of the heights' renders מרום literally and preserves the elevated cosmic register.
- source_word: מרצף רקיע
  chosen: from the expanse of the sky
  alternatives:
  - from the firmament's pavement
  - from the spread-out sky
  lexicon: HALOT
  rationale: The text is difficult. רקיע is the expanse/firmament. מרצף may reflect
    a noun or prepositional form connected with a spread or pavement-like surface.
    To avoid an overly speculative rendering while preserving the cosmological image,
    'from the expanse of the sky' captures the likely sense in accessible English.
- source_word: מזהירתו
  chosen: is its shining
  alternatives:
  - its brightness
  - its radiance shines
  lexicon: HALOT
  rationale: The form points to brightness/radiance from the root זהר. Because the
    clause is elliptical, 'is its shining' preserves the verbless poetic feel without
    adding too much.
