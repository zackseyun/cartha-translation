translation:
  text: The beauty of heaven and the glory of the stars—their light shines in the
    heights of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Masada preserves a differing opening reading at this point ('... the beauty/splendor
      of heaven and the majesty of a star'), while the Cairo Geniza text reads 'The
      splendor of the heavens and the majesty of the stars.' The main text follows
      the Zone 1 Hebrew with the Greek parallel supporting a collective sense.
    reason: textual_variant
  - marker: b
    text: 'Greek parallel: ''beauty of heaven, glory of stars, an ornament giving
      light, in the heights the Lord.'' This supports the verse''s imagery of the
      heavenly lights as radiant adornment, though the main text follows the surviving
      Hebrew wording.'
    reason: alternative_reading
lexical_decisions:
- source_word: תואר
  chosen: splendor
  alternatives:
  - form
  - appearance
  - beauty
  lexicon: HALOT
  rationale: In context with שמים and paired with והדר כוכב, the word points to the
    impressive appearance or beauty of the sky. 'Splendor' captures visible magnificence
    better than the more neutral 'form' or 'appearance'.
- source_word: שמים
  chosen: the heavens
  alternatives:
  - heaven
  - sky
  lexicon: HALOT
  rationale: The Hebrew plural commonly denotes the sky/heavens. 'The heavens' preserves
    the elevated poetic register of wisdom literature while remaining natural English.
- source_word: הדר
  chosen: majesty
  alternatives:
  - glory
  - splendor
  - honor
  lexicon: HALOT
  rationale: The term denotes stately beauty or magnificence. 'Majesty' differentiates
    it from תואר while preserving the exalted tone.
- source_word: כוכב
  chosen: the stars
  alternatives:
  - a star
  lexicon: HALOT
  rationale: Although singular in form in the cited Hebrew line, the Greek parallel
    has plural ἄστρων and the poetic sense is collective. Rendering it as 'the stars'
    best reflects the likely collective meaning in context.
- source_word: ואורו
  chosen: its light
  alternatives:
  - their light
  - his light
  lexicon: HALOT
  rationale: The suffix is singular in the Hebrew witness, likely referring back collectively
    to the heavenly display or starry array. 'Its light' preserves the singular Hebrew
    form without forcing an awkward English singular 'star' against the broader context.
- source_word: מזהיר
  chosen: shines brightly
  alternatives:
  - gives light
  - flashes
  - radiates
  lexicon: HALOT
  rationale: The participle conveys emitting bright light. 'Shines brightly' is idiomatic
    and preserves the vivid visual force.
- source_word: במרומי אל
  chosen: in the heights of God
  alternatives:
  - in God's heights
  - in the highest places of God
  - in the heights
  lexicon: HALOT
  rationale: The Hebrew literally points to the lofty heights associated with God.
    This keeps the explicit divine reference of אל, unlike a flattened 'in the heights'.
- source_word: κάλλος οὐρανοῦ, δόξα ἄστρων, κόσμος φωτίζων
  chosen: The splendor of the heavens and the majesty of the stars—its light shines
    brightly
  alternatives:
  - The beauty of heaven, the glory of the stars, an ornament giving light
  - The beauty of the sky, the glory of the stars, a shining adornment
  lexicon: BDAG
  rationale: The Greek parallel supports reading the Hebrew as a poetic description
    of the heavenly lights' beauty and luminosity. I did not import the Greek noun
    κόσμος directly as 'ornament' into the main text because the Hebrew witness instead
    has ואורו מזהיר, but the Greek confirms the verse's focus on radiant adornment.
