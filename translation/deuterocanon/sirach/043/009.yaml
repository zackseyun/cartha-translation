theological_decisions:
- issue: Rendering אל in במרומי אל
  chosen_reading: of God
  alternative_readings:
  - in the highest places
  - of the Mighty One
  rationale: The Hebrew explicitly includes אל. Since no doctrinally driven euphemism
    is required here, 'God' is the most transparent rendering. 'Mighty One' is possible
    lexically but less natural in this poetic line.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source meaning without importing tradition.'
