translation:
  text: Like a blazing furnace from scorching heat, the sun sets the mountains ablaze;
    with a roaring light it consumes as it blows, and its lamp burns the eye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text of this verse is partially difficult and does not align
      neatly at every point with the Greek. The translation follows the extant Hebrew
      as primary, with the Greek parallel used to clarify several compressed or uncertain
      phrases.
    reason: textual_variant
  - marker: b
    text: The phrase 'three times over' is explicit in the Greek witness (τριπλασίως)
      but not clearly preserved in the extant Hebrew line.
    reason: alternative_reading
lexical_decisions:
- source_word: כור נפוח
  chosen: a blazing furnace
  alternatives:
  - a blown furnace
  - a bellows-blown furnace
  lexicon: HALOT
  rationale: The Hebrew image is of a furnace intensified by blowing; 'blazing furnace'
    gives the sense in natural English while preserving the heat imagery. The Greek
    κάμινον φυσῶν confirms the furnace-plus-blowing image.
- source_word: מחם מצוק
  chosen: in the works of heat
  alternatives:
  - in oppressive heat
  - in heat's labor
  lexicon: HALOT
  rationale: The Hebrew is difficult and somewhat uncertain; the Greek ἐν ἔργοις καύματος
    supports a sense like 'in the operations/works of heat.' I retained a relatively
    formal rendering because the source wording is unusual and the Greek parallel
    points in that direction.
- source_word: שולח שמש
  chosen: the sun
  alternatives:
  - the sun sends forth
  lexicon: HALOT
  rationale: The Hebrew line is compressed and somewhat mismatched with the Greek.
    The Greek clearly makes the sun the subject of the scorching actions. English
    requires an explicit subject, so 'the sun' is carried into the clause.
- source_word: ידליק הרים
  chosen: scorches the mountains
  alternatives:
  - sets the mountains ablaze
  - kindles the mountains
  lexicon: HALOT
  rationale: The Hebrew verb suggests kindling/burning, while the Greek ἐκκαίων ὄρη
    also supports 'burning/scorching mountains.' 'Scorches' fits the context of solar
    heat without implying literal combustion.
- source_word: τριπλασίως
  chosen: three times over
  alternatives:
  - threefold
  - exceedingly
  lexicon: LSJ
  rationale: This element is explicit in the Greek parallel but not clear in the extant
    Hebrew line. Since the task requires using the Greek as actual translation input
    alongside the Hebrew, I preserved the intensifying adverb in the main text.
- source_word: ἀτμίδας πυρώδεις ἐμφυσῶν
  chosen: breathing out fiery vapors
  alternatives:
  - blowing fiery mists
  - exhaling burning fumes
  lexicon: LSJ
  rationale: The Greek phrase is vivid and likely reflects or supplements a damaged/unclear
    Hebrew line. 'Fiery vapors' is natural English and preserves the image of heat-laden
    exhalation.
- source_word: לשאון מאור תגמר נושבת
  chosen: and flashing rays
  alternatives:
  - with a roaring light it blows to completion
  - its blazing radiance bursts forth
  lexicon: HALOT; LSJ
  rationale: The Hebrew of the second colon is textually difficult, but the Greek
    καὶ ἐκλάμπων ἀκτῖνας gives a clear sense of emitting/flashing rays. I followed
    the clearer parallel while keeping the line concise.
- source_word: ומנורה תכוה עין / ἀμαυροῖ ὀφθαλμούς
  chosen: it dims the eyes
  alternatives:
  - it darkens the eyes
  - it blinds the eyes
  lexicon: HALOT; LSJ
  rationale: The Hebrew appears to speak of the eye being affected by the luminary/light,
    and the Greek explicitly says 'dims the eyes.' 'Dims' preserves the effect without
    overstating it as total blindness.
