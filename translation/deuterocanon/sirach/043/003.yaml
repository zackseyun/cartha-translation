translation:
  text: At its shining it makes the world boil, and before its sword who can endure?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'before its sword'; the Greek parallel reads 'before its burning/heat
      who will stand?' The main text keeps the Hebrew metaphor.
    reason: alternative_reading
  - marker: b
    text: The older Masada witness for this verse is fragmentary at this point; the
      Cairo Geniza Hebrew provides the main wording used here, with the Greek consulted
      as a control.
    reason: textual_variant
lexical_decisions:
- source_word: בהצהירו
  chosen: At its shining
  alternatives:
  - When it shines forth
  - At its brightness
  - At noon
  lexicon: HALOT
  rationale: The Hebrew verb from צהר/צהרר here points to bright shining or blazing.
    The Greek parallel reflects a temporal nuance ('at its midday/noon'), likely interpreting
    the same image in context of the sun's strongest heat. Because the Hebrew witness
    is primary and explicit about shining rather than clock time, 'At its shining'
    preserves the Hebrew while still fitting the Greek sense of intense solar radiance.
- source_word: ירתיח
  chosen: it makes ... boil
  alternatives:
  - it heats
  - it scorches
  - it makes ... seethe
  lexicon: HALOT
  rationale: The verb רתח commonly denotes boiling or seething. 'Makes the world boil'
    keeps the vivid metaphor of extreme heat better than the flatter 'heats' or the
    more interpretive 'scorches.' The Greek parallel's 'dries up' shows an interpretive
    equivalent of oppressive heat, but the Hebrew image is stronger and more concrete.
- source_word: תבל
  chosen: the world
  alternatives:
  - the earth
  - the inhabited world
  lexicon: HALOT
  rationale: תבל often denotes the world in the sense of the inhabited earth. 'The
    world' is natural English and broad enough to include the cosmic scope intended
    here.
- source_word: חרבו
  chosen: its sword
  alternatives:
  - its heat
  - its burning
  - its blade
  lexicon: HALOT
  rationale: The Hebrew literally reads 'its sword,' a striking metaphor for the sun's
    cutting, destructive force. The Greek parallel has 'its burning/heat,' which likely
    interprets the metaphor. Since the Hebrew survives and is the primary witness,
    the metaphor should be retained in the main text rather than flattened.
- source_word: מי יתכלכל
  chosen: who can endure?
  alternatives:
  - who can sustain himself?
  - who can stand?
  - who can hold out?
  lexicon: HALOT
  rationale: The verb כלכל in hitpael-like usage here conveys maintaining oneself,
    holding up, or enduring under pressure. The Greek parallel's 'who will stand up
    under it?' supports the sense of endurance. 'Who can endure?' is idiomatic and
    faithful.
