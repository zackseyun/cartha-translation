translation:
  text: By his power he gives strength to the clouds, to cast down hailstones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'the cloud' (singular); the Greek parallel has 'clouds' (plural).
      The translation follows the Hebrew as the primary witness here.
    reason: alternative_reading
  - marker: b
    text: Masada preserves only the opening of the verse ('And by his might the cloud
      is strong'), while the Cairo Geniza Hebrew continues with the hailstone clause;
      the full translation follows the extant Hebrew line in Zone 1, with the Greek
      parallel supporting the hail imagery.
    reason: textual_variant
lexical_decisions:
- source_word: בכחו
  chosen: By his power
  alternatives:
  - In his power
  - By his might
  lexicon: HALOT
  rationale: The preposition ב with כוח naturally expresses means or instrument here.
    'By his power' is idiomatic English and fits the causal sense in context.
- source_word: יתן
  chosen: he gives
  alternatives:
  - he grants
  - he sets
  lexicon: HALOT
  rationale: The Hebrew verb נתן most straightforwardly means 'give.' In this construction
    it conveys imparting strength to the cloud. A more interpretive rendering like
    'sets' is unnecessary.
- source_word: לענן
  chosen: the cloud
  alternatives:
  - a cloud
  - the clouds
  lexicon: HALOT
  rationale: The Hebrew is singular with prefixed article-like sense from context
    not explicit, but English idiom often uses the singular collectively in weather
    descriptions. The Greek has plural 'clouds,' but the primary Hebrew witness reads
    singular; the English keeps the Hebrew while remaining natural.
- source_word: עז
  chosen: strength
  alternatives:
  - might
  - force
  lexicon: HALOT
  rationale: עז denotes strength or might. 'Strength' works well with 'gives' and
    avoids over-dramatizing the phrase.
- source_word: להשליך
  chosen: to cast down
  alternatives:
  - to throw
  - to hurl
  lexicon: HALOT
  rationale: The infinitive expresses purpose or result. 'Cast down' preserves the
    force of השליך in a weather context and sounds more literary than 'throw' without
    becoming archaic.
- source_word: אבני אלגביש
  chosen: hailstones
  alternatives:
  - stones of hail
  - hail
  lexicon: HALOT
  rationale: The Hebrew phrase literally means something like 'stones of hail/ice.'
    English 'hailstones' is the natural equivalent and preserves the concrete imagery.
    The Greek parallel likewise supports a hailstone reading.
