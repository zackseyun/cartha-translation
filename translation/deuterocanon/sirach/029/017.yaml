lexical_decisions:
- source_word: ἀχάριστος
  chosen: ungrateful
  alternatives:
  - thankless
  - unthankful
  lexicon: LSJ
  rationale: The adjective denotes lack of gratitude or thankfulness. 'Ungrateful'
    is clear modern English and preserves the moral force without sounding archaic.
- source_word: ἐν διανοίᾳ
  chosen: man
  alternatives:
  - in mind
  - in disposition
  - in his thinking
  lexicon: LSJ
  rationale: Taken idiomatically with ἀχάριστος, the phrase describes the person's
    inward disposition rather than adding a separate adverbial clause. English requires
    a natural restructuring; 'an ungrateful man' best conveys a person characterized
    by thanklessness. The inward aspect is implicit in the adjective's characterization.
- source_word: ἐγκαταλείψει
  chosen: will abandon
  alternatives:
  - will forsake
  - will leave behind
  lexicon: LSJ
  rationale: The future verb means to leave behind or forsake. 'Will abandon' is natural
    and strong, fitting the proverb's warning about disloyalty.
- source_word: ῥυσάμενον
  chosen: the one who rescued him
  alternatives:
  - his deliverer
  - the one who delivered him
  - the one who saved him
  lexicon: LSJ
  rationale: Aorist middle participle of ῥύομαι, referring to the person who delivered
    or rescued him. 'Rescued' is idiomatic and concrete; adding 'him' makes the implied
    object explicit in English.
