translation:
  text: Many, because of wickedness, turned away; they were afraid of being defrauded
    gratuitously.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Many withdrew on account of evil; they feared being cheated for nothing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: Many
  alternatives:
  - Many people
  lexicon: LSJ
  rationale: An indefinite plural subject is best rendered simply as 'Many' in idiomatic
    English while preserving the generalizing force.
- source_word: χάριν
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: LSJ
  rationale: With the genitive πονηρίας, χάριν functions as a preposition meaning
    'because of' or 'on account of,' not 'grace' or 'favor' here.
- source_word: πονηρίας
  chosen: wickedness
  alternatives:
  - evil
  - badness
  lexicon: LSJ
  rationale: The noun denotes moral badness or dishonesty in context. 'Wickedness'
    preserves the ethical force and fits the surrounding concern about lending and
    fraud.
- source_word: ἀπέστρεψαν
  chosen: turned away
  alternatives:
  - turned back
  - withdrew
  lexicon: LSJ
  rationale: The verb conveys withdrawing or turning aside. 'Turned away' is natural
    English and suits the context of refusing to lend or help.
- source_word: ἀποστερηθῆναι
  chosen: being defrauded
  alternatives:
  - being deprived
  - being cheated
  - being robbed
  lexicon: LSJ
  rationale: The passive infinitive of ἀποστερέω means to be deprived of what is due,
    often with the nuance of being cheated or defrauded. 'Being defrauded' best captures
    the financial context.
- source_word: δωρεὰν
  chosen: for nothing
  alternatives:
  - in vain
  - gratuitously
  - without cause
  lexicon: LSJ
  rationale: Here δωρεάν most naturally means 'for nothing' or 'without compensation,'
    i.e., suffering loss to no purpose. This fits the fear of losing money through
    a loan.
- source_word: εὐλαβήθησαν
  chosen: were afraid
  alternatives:
  - were cautious
  - were apprehensive
  lexicon: LSJ
  rationale: The verb can denote reverent caution or fear; in this economic context,
    straightforward 'were afraid' best expresses the motive for refusing help.
