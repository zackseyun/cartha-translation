translation:
  text: A sinner who falls into surety and pursues contracts will fall into lawsuits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will fall into judgments' or 'legal disputes.' The Greek κρίσεις can
      refer broadly to judicial proceedings or verdicts; 'lawsuits' is chosen here
      because the context is financial surety and contractual obligations.
    reason: lexical_alternative
  - marker: b
    text: '''Surety'' refers to becoming security or guarantor for another person''s
      debt or obligation.'
    reason: cultural_note
lexical_decisions:
- source_word: ἁμαρτωλός
  chosen: a sinner
  alternatives:
  - a sinful man
  - the sinner
  lexicon: BDAG
  rationale: The noun is singular and generic. 'A sinner' is natural modern English
    and preserves the moral characterization without over-specifying gender.
- source_word: ἐμπεσών εἰς ἐγγύην
  chosen: falls into surety
  alternatives:
  - gets involved in guaranteeing a debt
  - falls into a pledge
  lexicon: LSJ
  rationale: ἐγγύη refers to surety/guarantee, especially becoming security for another's
    obligation. 'Falls into surety' keeps the metaphor of entering into such an obligation
    while remaining readable.
- source_word: διώκων
  chosen: who pursues
  alternatives:
  - chasing
  - seeking after
  lexicon: BDAG
  rationale: The participle has the sense of actively going after something. 'Pursues'
    preserves the verbal force and the negative tone in context.
- source_word: ἐργολαβίας
  chosen: contracts
  alternatives:
  - business deals
  - undertakings
  - contract work
  lexicon: LSJ
  rationale: The term can denote contractual undertakings or business engagements.
    'Contracts' is concise and fits the warning about entangling oneself in obligations;
    'business deals' is possible but slightly more interpretive.
- source_word: ἐμπεσεῖται εἰς κρίσεις
  chosen: will fall into lawsuits
  alternatives:
  - will fall into judgments
  - will fall into legal disputes
  lexicon: BDAG
  rationale: κρίσεις can mean judgments or legal cases. In this context of surety
    and contracts, the legal sense is most natural, so 'lawsuits' brings out the practical
    consequence implied by the Greek.
