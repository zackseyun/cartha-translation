translation:
  text: Keep your word, and be faithful to him, and at all times you will find what
    you need.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be trustworthy with it,' taking 'with him' as referring more abstractly
      to your pledged word or agreement.
    reason: lexical_alternative
lexical_decisions:
- source_word: στερέωσον
  chosen: Keep
  alternatives:
  - Confirm
  - Establish
  - Stand by
  lexicon: LSJ
  rationale: The aorist imperative of στερεόω can mean to make firm, establish, or
    confirm. In this wisdom context about lending and repayment, the sense is to make
    one's promise firm by honoring it. 'Keep your word' expresses the idiomatic force
    in clear modern English while remaining anchored to the Greek idea of firmness.
- source_word: λόγον
  chosen: word
  alternatives:
  - promise
  - agreement
  - matter
  lexicon: LSJ
  rationale: λόγος here most naturally refers to one's spoken commitment in the immediate
    context of financial trustworthiness. 'Word' preserves the Greek term directly,
    while the surrounding English makes clear that a pledged word is meant.
- source_word: πιστώθητι
  chosen: be faithful
  alternatives:
  - be trustworthy
  - show yourself reliable
  lexicon: LSJ
  rationale: The passive/middle imperative from πιστόω/πιστεύω-family language here
    carries the sense of proving faithful or trustworthy. 'Be faithful' is concise
    and preserves the moral dimension of reliability without overparaphrasing.
- source_word: μετʼ αὐτοῦ
  chosen: with him
  alternatives:
  - toward him
  - in dealing with him
  - with it
  lexicon: LSJ
  rationale: The Greek most straightforwardly reads 'with him,' likely referring to
    the person with whom one has made the agreement. Because αὐτοῦ could be taken
    more abstractly with 'word/agreement,' that alternative is worth preserving in
    a footnote, but the personal reference fits the surrounding exhortation about
    interpersonal obligations.
- source_word: ἐν παντὶ καιρῷ
  chosen: at all times
  alternatives:
  - in every season
  - whenever needed
  lexicon: LSJ
  rationale: This phrase denotes any time or every occasion. 'At all times' is a natural
    English equivalent and preserves the broad temporal scope.
- source_word: εὑρήσεις
  chosen: you will find
  alternatives:
  - you will obtain
  - you will have
  lexicon: LSJ
  rationale: The future of εὑρίσκω is literally 'you will find.' In context it implies
    obtaining needed help or resources, but the more direct rendering should be retained.
- source_word: τὴν χρείαν σου
  chosen: what you need
  alternatives:
  - your need
  - the help you need
  - your necessity
  lexicon: LSJ
  rationale: χρεία means need, necessity, or use. English idiom prefers 'what you
    need' over the stiffer 'your need,' while preserving the practical sense of receiving
    needed assistance or provision.
