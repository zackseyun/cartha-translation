translation:
  text: 'These things are grievous to a man who has understanding: the rebuke of a
    household and the reproach of a lender.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heavy ... the rebuke of a house and the reproach of a creditor.' The
      Greek terms allow slightly more formal renderings, but the main text aims for
      clear modern English while preserving the verse's shame-and-burden imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: βαρέα
  chosen: grievous
  alternatives:
  - heavy
  - burdensome
  - hard
  lexicon: LSJ
  rationale: The adjective literally means 'heavy,' but in this idiom it describes
    something difficult or painful to bear. 'Grievous' preserves the weight metaphor
    while sounding natural in English.
- source_word: ἀνθρώπῳ
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: LSJ
  rationale: The Greek is singular and generic. Following the project's gender-accurate
    policy, 'a man' preserves the representative singular rather than flattening it
    to an abstract plural or neutral expression.
- source_word: ἔχοντι φρόνησιν
  chosen: who has understanding
  alternatives:
  - who has prudence
  - who has good sense
  lexicon: LSJ
  rationale: φρόνησις can denote practical wisdom, prudence, or understanding. 'Understanding'
    is broad and idiomatic here, while still conveying discernment rather than mere
    intelligence.
- source_word: ἐπιτίμησις
  chosen: reproach
  alternatives:
  - rebuke
  - censure
  lexicon: LSJ
  rationale: The noun denotes blame or reprimand. 'Reproach' fits the social-shame
    context of the verse better than the more direct disciplinary sense of 'rebuke.'
- source_word: οἰκίας
  chosen: of a household
  alternatives:
  - of a house
  - at home
  lexicon: LSJ
  rationale: οἰκία can mean the physical house or the household/family unit. In this
    wisdom context, social disgrace connected with one's domestic sphere is likely
    in view; 'household' communicates that broader sense.
- source_word: ὀνειδισμὸς
  chosen: insult
  alternatives:
  - reproach
  - disgrace
  lexicon: LSJ
  rationale: The term overlaps with 'reproach,' but varying the English avoids obscuring
    the Greek distinction between ἐπιτίμησις and ὀνειδισμός. 'Insult' captures the
    verbal and shaming force.
- source_word: δανιστοῦ
  chosen: a lender
  alternatives:
  - a creditor
  - one who lends
  lexicon: LSJ
  rationale: The noun refers to one who lends money, effectively a creditor. 'Lender'
    is straightforward and closely tied to the Greek form; 'creditor' would also fit
    but sounds slightly more technical.
