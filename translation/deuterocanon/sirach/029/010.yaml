translation:
  text: Lose silver for a brother and a friend, and do not let it rust under a stone
    to destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not let it corrode under a stone into ruin.' The Greek verb in this
      clause is difficult, and the sense is that hoarded money deteriorates or is
      wasted when hidden away instead of used to help others.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόλεσον
  chosen: Lose
  alternatives:
  - Spend
  - Give up
  - Risk
  lexicon: LSJ
  rationale: Aorist imperative of ἀπόλλυμι here urges willingly parting with money
    for another's sake. 'Lose' preserves the paradoxical force of surrendering wealth,
    while remaining natural in English. 'Spend' is possible but weakens the sacrificial
    nuance.
- source_word: ἀργύριον
  chosen: silver
  alternatives:
  - money
  lexicon: LSJ
  rationale: Literally 'silver,' commonly used for money. Retaining 'silver' preserves
    the concrete ancient economic idiom and the proverbial tone; readers can still
    understand it as money.
- source_word: διʼ ἀδελφὸν καὶ φίλον
  chosen: for a brother and a friend
  alternatives:
  - on behalf of a brother and friend
  - for your brother and friend
  lexicon: LSJ
  rationale: 'διά with accusative here expresses purpose or benefit: part with money
    for the sake of close relations. The anarthrous nouns are rendered idiomatically
    without adding possessive force beyond the Greek.'
- source_word: μὴ ἰωθῇ
  chosen: do not let it rust away
  alternatives:
  - do not let it become rusty
  - do not let it corrode
  - do not let it be damaged
  lexicon: LSJ
  rationale: The verb is difficult and somewhat rare in this form, but in context
    with money hidden under a stone it points to deterioration through disuse or storage.
    'Rust away' communicates the warning against hoarding wealth until it is useless.
    Because silver does not literally rust in modern scientific terms, the phrase
    is kept as idiomatic ancient imagery rather than modern metallurgy.
- source_word: ὑπὸ τὸν λίθον
  chosen: under a stone
  alternatives:
  - beneath the stone
  lexicon: LSJ
  rationale: A concrete image of hidden, buried, or hoarded money. 'Under a stone'
    is direct and preserves the proverb-like picture.
- source_word: εἰς ἀπώλειαν
  chosen: to destruction
  alternatives:
  - for ruin
  - to loss
  lexicon: LSJ
  rationale: 'Expresses the result of hoarding: the money ends in ruin or useless
    loss. ''To destruction'' is slightly formal but preserves the severity of the
    Greek.'
