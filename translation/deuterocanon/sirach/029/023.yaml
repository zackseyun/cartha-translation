translation:
  text: Be content with little and with much.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Have satisfaction in little and in much.' The Greek
      uses the noun 'good pleasure' or 'satisfaction' with the verb 'have.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ μικρῷ καὶ μεγάλῳ
  chosen: with little and with much
  alternatives:
  - in small things and great
  - over little and great
  - whether little or much
  lexicon: LSJ
  rationale: The preposition ἐπί with the dative here functions idiomatically with
    εὐδοκίαν ἔχε to express the circumstances or amount in which one is to maintain
    a favorable disposition. 'With little and with much' gives natural English while
    preserving the contrast between scarcity and abundance.
- source_word: εὐδοκίαν
  chosen: be content
  alternatives:
  - goodwill
  - satisfaction
  - favor
  - pleasure
  lexicon: LSJ
  rationale: Literally the noun denotes good pleasure, favor, or satisfaction. In
    this imperative expression with ἔχε ('have'), the sense is to maintain a pleased
    or accepting disposition. 'Be content' best captures the idiomatic force in clear
    English without over-paraphrasing.
- source_word: ἔχε
  chosen: be
  alternatives:
  - have
  - maintain
  lexicon: LSJ
  rationale: Although ἔχε is literally 'have,' English normally renders the idiom
    εὐδοκίαν ἔχε as a stative imperative. 'Be content' is more idiomatic than 'have
    contentment' while preserving the imperative force.
