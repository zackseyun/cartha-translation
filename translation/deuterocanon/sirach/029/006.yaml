theological_decisions:
- issue: Social-moral framing of the failed loan
  chosen_reading: The verse is rendered as practical wisdom about the lender's loss
    and the borrower's hostile response, without importing a broader doctrinal claim
    about usury or divine judgment.
  alternative_readings:
  - A more moralized rendering that implies deliberate fraud by the borrower
  - A more generalized rendering about human ingratitude
  rationale: 'The Greek focuses on the concrete consequences of lending: partial or
    no recovery, financial loss, enmity, and verbal abuse. The translation preserves
    that scope and does not expand the verse into a theological statement it does
    not explicitly make.'
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
