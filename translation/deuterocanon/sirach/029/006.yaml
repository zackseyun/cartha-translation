id: SIR.29.6
reference: Sirach 29:6
source:
  edition: lxx-swete-1909
  text: ἐὰν ἰσχύσῃ, μόλις κομίσεται τὸ ἥμισυ καὶ λογιεῖται αὐτὸ ὡς εὕρεμα· εἰ δὲ μή,
    ἀπεστέρησεν αὐτὸν τῶν χρημάτων αὐτοῦ, καὶ ἐκτήσατο αὐτὸν ἐχθρὸν οὐ δωρεάν. κατάρας
    καὶ λοιδορίας ἀποδώσει αὐτῷ, καὶ ἀντὶ δόξης ἀποδώσει αὐτῷ ἀτιμίαν.
