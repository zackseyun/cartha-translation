translation:
  text: If he is able, he will scarcely recover half, and will count it as a find;
    but if not, he has been deprived of his money, and has gained an enemy for nothing.
    He will repay him with curses and insults, and instead of honor he will repay
    him with dishonor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will count it as a windfall'; the Greek says literally 'as a find,'
      meaning that even recovering half is treated like unexpectedly found money.
    reason: lexical_alternative
  - marker: b
    text: Or 'has made an enemy of him for no benefit'; the Greek expression conveys
      the irony that the lender loses money and gains hostility in return.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν ἰσχύσῃ
  chosen: If he is able
  alternatives:
  - If he prevails
  - If he has the means
  lexicon: BDAG
  rationale: ἰσχύω commonly means to be strong, have power, or be able. In this lending
    context, 'if he is able' best captures the sense of being able to recover anything
    from the borrower without over-specifying how.
- source_word: μόλις κομίσεται
  chosen: he will scarcely recover
  alternatives:
  - he will barely get back
  - he will recover with difficulty
  lexicon: BDAG
  rationale: κομίζω here refers to receiving back what is owed; with μόλις, the sense
    is difficulty or minimal success. 'Scarcely recover' preserves both the formal
    future and the hardship implied.
- source_word: τὸ ἥμισυ
  chosen: half
  alternatives:
  - the half
  lexicon: BDAG
  rationale: Straightforward quantitative expression; idiomatic English omits the
    article.
- source_word: λογιεῖται αὐτὸ ὡς εὕρεμα
  chosen: will count it as a find
  alternatives:
  - will reckon it as a windfall
  - will consider it a discovery
  lexicon: BDAG
  rationale: λογίζομαι means to reckon or consider; εὕρεμα is something found, a find
    or windfall. 'Count it as a find' keeps the metaphor that even partial repayment
    is treated like unexpectedly found money.
- source_word: ἀπεστέρησεν αὐτὸν τῶν χρημάτων αὐτοῦ
  chosen: he has been deprived of his money
  alternatives:
  - he has been defrauded of his money
  - he has been robbed of his money
  lexicon: BDAG
  rationale: ἀποστερέω can mean deprive, defraud, or rob. Since the subject in context
    is effectively the failed borrower/transaction rather than a violent theft scene,
    'has been deprived of his money' is accurate and less interpretively loaded than
    'defrauded' or 'robbed.' Passive English best conveys the result for the lender.
- source_word: ἐκτήσατο αὐτὸν ἐχθρὸν οὐ δωρεάν
  chosen: has gained an enemy for nothing
  alternatives:
  - has acquired him as an enemy not without cause
  - has made an enemy of him for no benefit
  lexicon: BDAG
  rationale: κτάομαι means acquire or gain. οὐ δωρεάν here idiomatically means not
    gratuitously in the sense of 'not for free' or 'not without cost/benefit'; in
    context the lender suffers loss and additionally gains hostility. 'For nothing'
    communicates the bitter irony clearly in modern English.
- source_word: κατάρας καὶ λοιδορίας
  chosen: curses and insults
  alternatives:
  - imprecations and abuse
  - curses and revilings
  lexicon: BDAG
  rationale: The pair denotes hostile speech. 'Curses and insults' is natural modern
    English and preserves the twofold verbal abuse.
- source_word: ἀποδώσει αὐτῷ
  chosen: he will repay him
  alternatives:
  - he will return to him
  - he will render to him
  lexicon: BDAG
  rationale: 'ἀποδίδωμι means give back, repay, render. Repeating ''repay him'' preserves
    the irony: instead of repaying the loan, the borrower repays with abuse and dishonor.'
- source_word: ἀντὶ δόξης ... ἀτιμίαν
  chosen: instead of honor ... dishonor
  alternatives:
  - instead of glory ... disgrace
  - instead of respect ... shame
  lexicon: BDAG
  rationale: δόξα and ἀτιμία here concern social esteem. 'Honor' and 'dishonor' fit
    wisdom-literature social context better than the more exalted 'glory' and preserve
    the antithesis.
