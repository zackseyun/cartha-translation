translation:
  text: For the sake of the commandment, help the poor, and according to his need
    do not send him away empty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not turn him away empty-handed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριν
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: LSJ
  rationale: With the genitive ἐντολῆς, χάριν commonly expresses purpose or motive
    ('for the sake of'). This preserves the ethical motivation stated in the Greek
    without over-paraphrasing.
- source_word: ἐντολῆς
  chosen: the commandment
  alternatives:
  - command
  - instruction
  lexicon: LSJ
  rationale: The singular likely refers generically to God's commandment or the moral
    obligation enjoined by the law. 'The commandment' keeps the definite, weighty
    sense of the Greek better than the flatter 'instruction'.
- source_word: ἀντιλαβοῦ
  chosen: help
  alternatives:
  - take hold of
  - come to the aid of
  - support
  lexicon: BDAG
  rationale: The middle imperative from ἀντιλαμβάνομαι literally suggests taking hold
    in support of someone. In idiomatic English here, 'help' best captures active
    assistance to the poor while remaining natural and not overly expansive.
- source_word: πένητος
  chosen: the poor
  alternatives:
  - a poor man
  - the needy
  lexicon: LSJ
  rationale: πένης denotes a poor or needy person. 'The poor' works as a representative
    singular in English and avoids unnecessarily gendering the referent, since the
    Greek here points to a class rather than a specific male individual.
- source_word: κατὰ τὴν ἔνδειαν αὐτοῦ
  chosen: according to his need
  alternatives:
  - in proportion to his lack
  - according to his poverty
  lexicon: LSJ
  rationale: 'ἔνδεια denotes need, want, or lack. ''According to his need'' communicates
    the distributive sense naturally: one''s response should match the person''s actual
    deficiency.'
- source_word: μὴ ἀποστρέψῃς αὐτὸν κενόν
  chosen: do not send him away empty
  alternatives:
  - do not turn him away empty-handed
  - do not dismiss him empty
  lexicon: BDAG
  rationale: Although ἀποστρέφω can mean 'turn away,' with αὐτὸν κενόν the sense is
    effectively refusing aid and letting him depart with nothing. 'Do not send him
    away empty' is idiomatic English and preserves the concrete force of κενός.
