translation:
  text: A good man will stand surety for his neighbor, but one who has lost shame
    will abandon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shameless man will abandon him.' The Greek literally says 'the one
      who has lost shame.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ ἀγαθός
  chosen: a good man
  alternatives:
  - a good person
  - a kind man
  - a noble man
  lexicon: LSJ
  rationale: ἀνήρ is specifically masculine singular ('man'), and the doctrine calls
    for gender-accurate rendering where the source is masculine. ἀγαθός here denotes
    moral goodness or uprightness rather than merely usefulness, so 'good man' is
    the most direct and natural rendering.
- source_word: ἐγγυήσεται
  chosen: will stand surety for
  alternatives:
  - will guarantee
  - will go bail for
  - will become guarantor for
  lexicon: LSJ
  rationale: The verb refers to acting as security or guarantor for another, a key
    theme in this chapter. 'Stand surety for' preserves the legal/financial nuance
    more clearly than the broader 'guarantee,' while remaining understandable in context.
- source_word: τὸν πλησίον
  chosen: his neighbor
  alternatives:
  - his companion
  - the one near him
  lexicon: LSJ
  rationale: πλησίον commonly means 'neighbor' in ethical and social contexts. 'His
    neighbor' is idiomatic English and fits the reciprocal social setting of Sirach.
- source_word: ὁ ἀπολωλεκὼς αἰσχύνην
  chosen: one who has lost shame
  alternatives:
  - the shameless man
  - one who has lost all sense of shame
  - one who has lost modesty
  lexicon: LSJ
  rationale: The perfect participle ἀπολωλεκώς ('having lost') with αἰσχύνην ('shame')
    is more literally 'one who has lost shame.' This preserves the Greek image of
    forfeited moral restraint better than the more interpretive adjective 'shameless,'
    though that remains a close alternative.
- source_word: καταλείψει αὐτόν
  chosen: will abandon him
  alternatives:
  - will forsake him
  - will leave him behind
  lexicon: LSJ
  rationale: καταλείπω here means to leave behind or abandon. 'Will abandon him' best
    conveys the relational betrayal implied in the context of surety and failed loyalty.
