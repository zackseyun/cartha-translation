translation:
  text: The necessities of life are water and bread and clothing, and a house covering
    nakedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a house that covers nakedness/indecency.' The Greek term can refer to
      shame in general or specifically to what ought to be covered.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀρχὴ
  chosen: The beginning
  alternatives:
  - The foundation
  - The first necessity
  - The principal thing
  lexicon: LSJ
  rationale: ἀρχή can denote beginning, origin, first principle, or ruling place.
    In this proverb-like statement listing basic necessities, 'the beginning' preserves
    the Greek wording closely while allowing the sense of foundational necessities
    to be heard without over-interpreting.
- source_word: ζωῆς
  chosen: of life
  alternatives:
  - for life
  - of living
  lexicon: LSJ
  rationale: 'The genitive naturally links with ἀρχή: ''beginning/foundation of life.''
    ''Of life'' is the most direct rendering and keeps the aphoristic style.'
- source_word: ὕδωρ
  chosen: water
  lexicon: LSJ
  rationale: Straightforward concrete noun in a list of essentials.
- source_word: ἄρτος
  chosen: bread
  alternatives:
  - food
  lexicon: LSJ
  rationale: Although ἄρτος can sometimes stand more broadly for food, 'bread' is
    the literal and idiomatic choice here, fitting the list of basic provisions.
- source_word: ἱμάτιον
  chosen: clothing
  alternatives:
  - garment
  - cloak
  lexicon: LSJ
  rationale: The singular collective sense is best conveyed by 'clothing' in modern
    English. 'Garment' is more formal and less natural in a general maxim.
- source_word: οἶκος
  chosen: a house
  alternatives:
  - shelter
  - a home
  lexicon: LSJ
  rationale: οἶκος literally means house/household. Here it refers to dwelling as
    a basic necessity. 'A house' keeps the concrete image; 'shelter' would be more
    interpretive.
- source_word: καλύπτων
  chosen: covering
  alternatives:
  - that covers
  - to cover
  lexicon: LSJ
  rationale: The present participle modifies οἶκος. Rendering it as 'covering' preserves
    the compressed Greek structure in readable English.
- source_word: ἀσχημοσύνην
  chosen: shame
  alternatives:
  - nakedness
  - indecency
  - private parts
  lexicon: LSJ
  rationale: ἀσχημοσύνη can denote shame, indecency, or exposed nakedness. In context
    with clothing and house, the sense is the exposure or dishonor that proper covering
    prevents. 'Shame' preserves the moral-social dimension without reducing the term
    only to physical nakedness; the more concrete nuance is worth preserving in a
    footnote.
