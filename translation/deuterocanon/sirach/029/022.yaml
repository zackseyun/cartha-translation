translation:
  text: Better is the life of a poor man under shelter than splendid food in another's
    house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek participle translated in the clause ''under shelter'' is textually
      or lexically difficult here; taken strictly, it commonly means ''seeming'' or
      ''being thought.'' The rendering follows the proverb''s apparent sense: modest
      security is better than luxurious meals dependent on others.'
    reason: textual_variant
  - marker: b
    text: Or 'splendid dishes among strangers' / 'in others' houses.' The Greek ἐν
      ἀλλοτρίοις can refer more generally to what belongs to others.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρείσσων
  chosen: Better is
  alternatives:
  - Superior is
  - Better
  lexicon: LSJ
  rationale: Comparative adjective introducing a wisdom comparison; idiomatic English
    wisdom style is best conveyed with 'Better is'.
- source_word: βίος
  chosen: the life
  alternatives:
  - livelihood
  - way of life
  lexicon: LSJ
  rationale: Here βίος refers broadly to one's life or manner of living, not merely
    material means. 'The life' fits the proverb's contrast with luxurious meals.
- source_word: πτωχοῦ
  chosen: of a poor man
  alternatives:
  - of a poor person
  - of the poor man
  lexicon: LSJ
  rationale: The genitive depends on βίος. The Greek is masculine singular; per gender-accurate
    policy, 'poor man' preserves the source form in a representative wisdom context.
- source_word: ὑπὸ σκέπην
  chosen: under shelter
  alternatives:
  - under a roof
  - in shelter
  - with cover
  lexicon: LSJ
  rationale: The phrase denotes having protective covering or lodging. 'Under shelter'
    is concise and natural, preserving the image without over-specifying ownership
    or permanence.
- source_word: δοκῶν
  chosen: under shelter
  alternatives:
  - seeming
  - being thought
  - living
  lexicon: LSJ
  rationale: The transmitted participle δοκῶν is difficult in context if taken in
    its usual sense 'seeming/thinking.' In this proverbial line, the sense is best
    carried by the broader clause as a poor man having modest shelter. The English
    does not force an awkward literalism that would obscure the comparison; the difficulty
    is noted in a footnote as a textual/lexical issue.
- source_word: ἢ
  chosen: than
  alternatives:
  - rather than
  lexicon: LSJ
  rationale: Standard comparative conjunction after κρείσσων.
- source_word: ἐδέσματα
  chosen: food
  alternatives:
  - dishes
  - delicacies
  - meats
  lexicon: LSJ
  rationale: Refers to prepared foods or dishes. 'Food' is clear modern English; the
    adjective supplies the luxurious nuance.
- source_word: λαμπρά
  chosen: splendid
  alternatives:
  - luxurious
  - fine
  - sumptuous
  lexicon: LSJ
  rationale: Conveys brightness/splendor and by extension magnificence. 'Splendid'
    preserves the elevated quality without sounding overly modern.
- source_word: ἐν ἀλλοτρίοις
  chosen: in another man's house
  alternatives:
  - among strangers
  - in others' houses
  - in what belongs to another
  lexicon: LSJ
  rationale: The plural adjective literally means 'in what belongs to others/among
    others.' In context of meals and shelter, the sense is eating in someone else's
    home or dependence on others. 'In another man's house' makes the proverb's social
    contrast explicit in idiomatic English.
