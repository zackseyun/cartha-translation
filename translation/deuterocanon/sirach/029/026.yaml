translation:
  text: Move along, sojourner; set the table in order, and if you have anything in
    your hand, feed me with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sojourner' or 'resident alien' for 'stranger' (πάροικε). The Greek term
      marks someone living as an outsider rather than a full household member.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάρελθε
  chosen: Move along
  alternatives:
  - Pass by
  - Come forward
  - Go on
  lexicon: LSJ
  rationale: Imperative of παρέρχομαι. In context of a host dismissing or directing
    a resident alien/guest, it carries the sense of moving on or making way. 'Move
    along' captures the brusque imperative better than the more neutral 'pass by.'
- source_word: πάροικε
  chosen: stranger
  alternatives:
  - sojourner
  - resident alien
  - guest
  lexicon: LSJ
  rationale: πάροικος denotes one dwelling beside others, often a foreign resident
    or sojourner. In direct address within a household setting, 'stranger' is the
    most natural concise English, while preserving the outsider status. 'Resident
    alien' is more technical than the context requires; 'guest' softens the social
    distance too much.
- source_word: κόσμησον
  chosen: set ... in order
  alternatives:
  - arrange
  - prepare
  - adorn
  lexicon: LSJ
  rationale: From κοσμέω, here in the practical sense of arranging or putting in order
    rather than beautifying. With τράπεζαν, it refers to preparing/setting the table.
- source_word: τράπεζαν
  chosen: the table
  alternatives:
  - table
  lexicon: LSJ
  rationale: Literal household table; no reason to paraphrase beyond the concrete
    image.
- source_word: εἴ τι
  chosen: if you have anything
  alternatives:
  - if there is anything
  - if anything
  lexicon: LSJ
  rationale: The conditional phrase introduces a practical qualification. Because
    it is followed by 'in your hand,' English idiom is clearer with an implied 'you
    have.'
- source_word: ἐν τῇ χειρί σου
  chosen: in your hand
  alternatives:
  - at hand
  - with you
  lexicon: LSJ
  rationale: A literal rendering is clear in English and preserves the concrete phrasing.
    It idiomatically suggests possession of food or means.
- source_word: ψώμισόν
  chosen: feed me with it
  alternatives:
  - give me a morsel from it
  - nourish me with it
  - serve me from it
  lexicon: LSJ
  rationale: From ψωμίζω, to feed with morsels or give food. 'Feed me with it' preserves
    the directness and the implied dependence better than a weaker 'give me some.'
- source_word: με
  chosen: me
  lexicon: LSJ
  rationale: Direct object retained explicitly because the Greek imperative is personally
    directed and somewhat sharp in tone.
