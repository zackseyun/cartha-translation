translation:
  text: A miserable life is to go from house to house, and where one stays as a stranger,
    he will not open his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A wretched life is from house to house'; the Greek can be read more
      literally, but the sense is of insecure wandering from one household to another.
    reason: lexical_alternative
  - marker: b
    text: '''Stays as a stranger'' translates a verb for residing as a sojourner or
      outsider, not as a settled member of the household.'
    reason: cultural_note
lexical_decisions:
- source_word: ζωὴ πονηρά
  chosen: a miserable life
  alternatives:
  - an evil life
  - a wretched life
  - a hard life
  lexicon: LSJ
  rationale: ποντηρά with ζωή here describes the quality of life as grievous or miserable
    rather than morally evil. 'Miserable life' best fits the context of social insecurity
    and dependence.
- source_word: ἐξ οἰκίας εἰς οἰκίαν
  chosen: to go from house to house
  alternatives:
  - from one house to another
  - out of house into house
  lexicon: LSJ
  rationale: The phrase is idiomatic for unstable lodging or continual moving between
    households. 'To go from house to house' preserves the imagery while reading naturally
    in English.
- source_word: παροικήσει
  chosen: stays as a stranger
  alternatives:
  - sojourns
  - lives as an alien
  - lodges as a guest
  lexicon: LSJ
  rationale: παροικέω denotes residing in a place without full belonging, as a sojourner
    or outsider. 'Stays as a stranger' communicates both temporary residence and social
    marginality in accessible English.
- source_word: οὐκ ἀνοίξει στόμα
  chosen: he will not open his mouth
  alternatives:
  - he will not speak
  - he will not dare open his mouth
  lexicon: LSJ
  rationale: The idiom literally means refraining from speaking. Keeping 'open his
    mouth' preserves the vividness and likely sense of hesitancy or lack of standing.
