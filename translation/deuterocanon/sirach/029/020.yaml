translation:
  text: Support your neighbor according to your ability, and watch yourself lest you
    fall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest you fall into trouble' or 'lest you be ensnared.' The Greek leaves
      the danger unspecified.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιλαβοῦ
  chosen: Support
  alternatives:
  - Help
  - Take hold of
  - Come to the aid of
  lexicon: BDAG
  rationale: Middle imperative of ἀντιλαμβάνομαι, conveying active assistance or taking
    someone in hand. 'Support' preserves the sense of practical aid without over-paraphrasing.
- source_word: τοῦ πλησίον
  chosen: your neighbor
  alternatives:
  - your fellow
  - the one near you
  lexicon: BDAG
  rationale: Standard rendering for πλησίον in ethical contexts; the genitive depends
    on ἀντιλαβοῦ and refers to the person one is to help.
- source_word: κατὰ δύναμίν σου
  chosen: according to your ability
  alternatives:
  - as much as you can
  - in proportion to your strength
  lexicon: BDAG
  rationale: κατά with accusative here indicates measure or standard. 'According to
    your ability' is clear modern English and keeps the measured, bounded sense of
    the Greek.
- source_word: πρόσεχε σεαυτῷ
  chosen: watch yourself
  alternatives:
  - be careful for yourself
  - pay attention to yourself
  - take heed to yourself
  lexicon: BDAG
  rationale: Idiomatic warning formula. 'Watch yourself' is natural English and preserves
    the reflexive caution without archaic phrasing.
- source_word: μὴ ἐμπέσῃς
  chosen: lest you fall
  alternatives:
  - so that you may not fall into trouble
  - lest you be ensnared
  lexicon: BDAG
  rationale: ἐμπίπτω literally means 'fall into.' With no explicit object, the warning
    is left general in Greek. 'Lest you fall' preserves that open-ended caution better
    than specifying 'trouble' in the main text.
