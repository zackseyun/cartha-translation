theological_decisions:
- issue: Scope of the warning in μὴ ἐμπέσῃς
  chosen_reading: A general caution to avoid falling oneself while helping another
  alternative_readings:
  - lest you fall into trouble
  - lest you be ensnared
  rationale: The verse balances generosity with prudence. The Greek leaves the danger
    unspecified, so the translation preserves the broad warning rather than narrowing
    it to financial or moral peril.
