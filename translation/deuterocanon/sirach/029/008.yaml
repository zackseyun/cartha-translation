translation:
  text: But be patient with the humble, and do not keep him waiting for almsgiving.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not delay him when giving alms.' The Greek verb can mean to postpone
      or draw out the matter.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - nevertheless
  - however
  - except
  lexicon: LSJ
  rationale: Introduces a qualifying contrast with the preceding instruction; 'But'
    is natural English and preserves the adversative force without over-formality.
- source_word: ἐπὶ ταπεινῷ
  chosen: with the humble
  alternatives:
  - toward the lowly
  - with the poor
  - with the afflicted
  lexicon: LSJ
  rationale: The adjective ταπεινός can denote one who is lowly, humble, or poor.
    In this context of lending and almsgiving, social lowliness/poverty is in view,
    but 'the humble' preserves the Greek wording while still fitting the economic
    context.
- source_word: μακροθύμησον
  chosen: be patient
  alternatives:
  - be long-suffering
  - forbear
  - wait patiently
  lexicon: BDAG
  rationale: Imperative of patient endurance/forbearance. 'Be patient' is clear modern
    English and adequately conveys the ethical demand.
- source_word: ἐπʼ ἐλεημοσύνην
  chosen: for almsgiving
  alternatives:
  - for mercy
  - for charity
  - for a charitable gift
  lexicon: LSJ
  rationale: ἐλεημοσύνη in Jewish-Greek usage commonly refers to almsgiving or charitable
    giving, not merely abstract mercy. 'Almsgiving' best matches the concrete act
    in context.
- source_word: μὴ παρελκύσῃς
  chosen: do not keep ... waiting
  alternatives:
  - do not delay
  - do not put off
  - do not drag out
  lexicon: LSJ
  rationale: The verb conveys delaying or drawing something out. Because the object
    is a person (αὐτόν) and the phrase is tied to receiving alms, 'do not keep him
    waiting' expresses the personal force more naturally than the more abstract 'do
    not delay him'.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - the poor person
  - that one
  lexicon: BDAG
  rationale: Masculine singular pronoun retained as 'him' in keeping with the Greek's
    gendered singular form and the project's gender-accurate policy. The referent
    is the lowly person just mentioned.
