translation:
  text: Lend to your neighbor in his time of need, and repay your neighbor in turn
    at the appointed time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'again, repay your neighbor at the appointed time.' The Greek πάλιν can
      be read more literally as 'again,' and εἰς τὸν καιρόν as 'at the proper time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δάνεισον
  chosen: Lend
  alternatives:
  - Make a loan to
  - Give as a loan
  lexicon: BDAG
  rationale: Aorist imperative of δανείζω; 'Lend' is the natural concise English imperative
    and preserves the financial sense without paraphrase.
- source_word: τῷ πλησίον
  chosen: to your neighbor
  alternatives:
  - to the neighbor
  - to your fellow
  lexicon: BDAG
  rationale: πλησίον commonly means 'neighbor' or 'fellow person.' 'Your neighbor'
    is idiomatic in English and fits the ethical instruction addressed to the reader.
- source_word: ἐν καιρῷ χρείας αὐτοῦ
  chosen: in his time of need
  alternatives:
  - at the time of his need
  - when he is in need
  lexicon: BDAG
  rationale: καιρός here is a fitting or appointed time, and χρεία is need. 'In his
    time of need' is smooth modern English that preserves both elements. The masculine
    pronoun reflects the Greek form and the project's gender-accurate policy for representative
    masculine usage.
- source_word: πάλιν
  chosen: in turn
  alternatives:
  - again
  - likewise
  - for your part in return
  lexicon: BDAG
  rationale: 'Literally ''again,'' but in this context it links the reciprocal obligation:
    after borrowing, one should repay. ''In turn'' captures the discourse force more
    clearly in English than a bare ''again.'''
- source_word: ἀπόδος
  chosen: repay
  alternatives:
  - pay back
  - return
  lexicon: BDAG
  rationale: Aorist imperative of ἀποδίδωμι in a financial context. 'Repay' best matches
    the loan context established by δάνεισον and avoids the broader ambiguity of 'return.'
- source_word: εἰς τὸν καιρόν
  chosen: on time
  alternatives:
  - at the appointed time
  - in due time
  lexicon: BDAG
  rationale: The phrase points to repayment at the proper or agreed time. 'On time'
    is idiomatic and precise in a financial instruction, while still reflecting the
    temporal force of καιρός.
