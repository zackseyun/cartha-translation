translation:
  text: Do not forget the kindnesses of a guarantor, for he gave his life for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the favors of one who stood surety for you.' The Greek term refers to
      a person who guarantees another's obligation.
    reason: lexical_alternative
  - marker: b
    text: Literally 'his soul'; here the sense is 'his life' or 'himself' given on
      your behalf.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτας
  chosen: kindnesses
  alternatives:
  - graces
  - favors
  - benefits
  lexicon: BDAG
  rationale: Plural of χάρις here refers to concrete acts of favor or kindness shown
    by the guarantor, not abstract 'grace' in a theological sense. 'Kindnesses' is
    natural English and preserves the plural force.
- source_word: ἐγγύου
  chosen: of a guarantor
  alternatives:
  - of a surety
  - of one who stands security
  - of a pledge-maker
  lexicon: BDAG
  rationale: ἐγγύος denotes one who gives security for another's debt or obligation.
    'Guarantor' is clear modern English and fits the financial/social context of Sirach
    29.
- source_word: μὴ ἐπιλάθῃ
  chosen: Do not forget
  alternatives:
  - Do not neglect
  - Do not be unmindful of
  lexicon: BDAG
  rationale: 'The prohibition is straightforward: the addressee must not forget or
    fail to remember the benefactions received. ''Do not forget'' is the most direct
    and idiomatic rendering.'
- source_word: ἔδωκεν
  chosen: gave
  alternatives:
  - handed over
  - offered
  lexicon: BDAG
  rationale: Simple past of δίδωμι. 'Gave' is sufficient and avoids importing sacrificial
    overtones not demanded by the context.
- source_word: τὴν ψυχὴν αὐτοῦ
  chosen: his life
  alternatives:
  - his soul
  - himself
  lexicon: BDAG
  rationale: ψυχή can mean 'life' in contexts of risking or giving oneself over. In
    English, 'gave his life for you' best conveys the idiom and the seriousness of
    the guarantor's self-endangerment.
- source_word: ὑπὲρ σοῦ
  chosen: for you
  alternatives:
  - on your behalf
  - for your sake
  lexicon: BDAG
  rationale: ὑπέρ here indicates representation or benefit. 'For you' is concise and
    idiomatic, while still allowing the sense 'on your behalf' to be understood from
    context.
