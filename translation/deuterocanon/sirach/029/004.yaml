translation:
  text: Many have regarded a loan as a windfall, and have caused trouble for those
    who helped them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'as a find' or 'as something found'—that is, as if the borrowed
      money were an unexpected gain rather than something to be repaid.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: Many
  alternatives:
  - Many people
  lexicon: LSJ
  rationale: An indefinite plural referring broadly to people; 'Many' is concise and
    natural English.
- source_word: ὡς εὕρεμα
  chosen: as a windfall
  alternatives:
  - as a find
  - as a discovery
  - as something found
  lexicon: LSJ
  rationale: εὕρεμα denotes something found, a find or unexpected gain. In context
    of borrowing, the sense is not literal discovery but treating the loan like free
    gain; 'windfall' best captures that idiomatically without over-paraphrasing.
- source_word: ἐνόμισαν
  chosen: have regarded
  alternatives:
  - thought
  - considered
  - reckoned
  lexicon: LSJ
  rationale: νομίζω here means to consider or regard. Present perfect English gives
    a proverbial/general force naturally, though the Greek is aorist; this fits wisdom
    style in English.
- source_word: δάνος
  chosen: a loan
  alternatives:
  - debt
  - a borrowed sum
  lexicon: LSJ
  rationale: δάνος refers to a loan rather than the state of indebtedness in the abstract.
    'Loan' is the most direct rendering.
- source_word: παρέσχον πόνον
  chosen: have caused trouble
  alternatives:
  - have provided pain
  - have caused distress
  - have brought hardship
  lexicon: LSJ
  rationale: The idiom literally means 'provided pain/trouble.' In English, 'caused
    trouble' is the clearest equivalent and preserves the negative consequence without
    sounding wooden.
- source_word: τοῖς βοηθήσασιν αὐτοῖς
  chosen: for those who helped them
  alternatives:
  - to those who came to their aid
  - for their benefactors
  lexicon: LSJ
  rationale: The participle denotes those who helped or assisted them, namely the
    lenders. 'Those who helped them' is transparent and avoids importing a more specific
    social label than the Greek states.
