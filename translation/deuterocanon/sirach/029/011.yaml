translation:
  text: Store up your treasure according to the commandments of the Most High, and
    it will profit you more than gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'according to the commandments of the Most High'; the singular 'the
      commandment' is used here as a collective English rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: θὲς
  chosen: Store up
  alternatives:
  - Put
  - Lay up
  - Set
  lexicon: LSJ
  rationale: Aorist imperative of τίθημι. In context with 'treasure' and the following
    comparison to gold, the sense is not merely 'put' but 'lay/store up' in a way
    that conveys prudent placement or accumulation.
- source_word: τὸν θησαυρόν σου
  chosen: your treasure
  alternatives:
  - your store
  - your wealth
  lexicon: LSJ
  rationale: θησαυρός commonly means treasure or stored wealth. 'Treasure' preserves
    both literal wealth and the wisdom-literature resonance of what one values and
    stores up.
- source_word: κατʼ ἐντολὰς
  chosen: according to the commandment
  alternatives:
  - according to the commandments
  - in keeping with the commandment(s)
  lexicon: LSJ
  rationale: The Greek has plural ἐντολάς, literally 'commandments.' English can render
    this idiomatically as singular collective 'the commandment' to express conduct
    in line with the Most High's instruction. The plural remains a viable alternative
    and is preserved in a footnote because it is formally closer to the Greek.
- source_word: Ὑψίστου
  chosen: the Most High
  alternatives:
  - Most High
  lexicon: LSJ
  rationale: Standard rendering of the divine title Ὕψιστος in Jewish-Greek literature.
    The article is supplied naturally in English.
- source_word: λυσιτελήσει
  chosen: will profit
  alternatives:
  - will benefit
  - will be advantageous to
  lexicon: LSJ
  rationale: The verb means 'to be profitable/advantageous.' 'Will profit you' is
    concise, natural English and preserves the economic metaphor of the verse.
- source_word: μᾶλλον ἢ τὸ χρυσίον
  chosen: more than gold
  alternatives:
  - more than the gold
  - better than gold
  lexicon: LSJ
  rationale: Comparative phrase contrasting obedience-shaped treasure with gold. 'More
    than gold' is direct and idiomatic; 'better than gold' is interpretive rather
    than strictly lexical.
