theological_decisions:
- issue: Whether to make the verse explicitly almsgiving-specific or leave it broader
    as treasure handled in obedience to God
  chosen_reading: 'Leave the wording broad: ''Store up your treasure according to
    the commandment of the Most High'''
  alternative_readings:
  - Give alms and so store up treasure according to the Most High's command
  rationale: The immediate context in Sirach 29 concerns lending, generosity, and
    storing up almsgiving as treasure, but this verse's Greek wording itself does
    not explicitly mention alms. To avoid importing a narrower doctrinal application
    than the text states, the translation keeps the broader wording while allowing
    context to inform interpretation.
  doctrine_reference: Translation philosophy §1, §3
