translation:
  text: He who shows mercy lends to his neighbor, and he who strengthens him with
    his hand keeps the commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he who supports him with his hand.' The Greek expression pictures concrete,
      practical help.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ ποιῶν ἔλεος
  chosen: He who shows mercy
  alternatives:
  - The one who does mercy
  - Whoever acts mercifully
  lexicon: BDAG
  rationale: ποιῶν with ἔλεος is a semitic-style expression meaning to practice or
    show mercy, not merely to feel it. 'He who shows mercy' is idiomatic English while
    preserving the active sense.
- source_word: δανιεῖ
  chosen: will lend
  alternatives:
  - lends
  - will make a loan
  lexicon: LSJ
  rationale: Future indicative is best represented as 'will lend.' The sense is straightforward
    financial lending, fitting the chapter's theme.
- source_word: τῷ πλησίον
  chosen: to his neighbor
  alternatives:
  - to his fellow
  - to the one near him
  lexicon: BDAG
  rationale: πλησίον commonly means 'neighbor' in ethical contexts. 'His neighbor'
    is the most natural and recognizable rendering here.
- source_word: ὁ ἐπισχύων
  chosen: he who strengthens him
  alternatives:
  - he who supports him
  - he who helps him
  lexicon: LSJ
  rationale: ἐπισχύω carries the sense of strengthening or supporting. Because the
    following phrase specifies 'with his hand,' 'strengthens him' preserves the concrete
    imagery better than the more generalized 'helps him.'
- source_word: τῇ χειρὶ αὐτοῦ
  chosen: with his hand
  alternatives:
  - by his hand
  - with his means
  lexicon: BDAG
  rationale: The phrase is literally instrumental, 'with his hand.' In context it
    likely refers to practical, tangible assistance. The literal rendering preserves
    the image and allows the reader to infer the practical sense.
- source_word: τηρεῖ ἐντολάς
  chosen: keeps the commandments
  alternatives:
  - keeps commandments
  - observes the commandments
  lexicon: BDAG
  rationale: τηρέω plus ἐντολή is standard for keeping or observing commandments.
    'Keeps the commandments' is clear, idiomatic, and preserves the moral-religious
    force.
