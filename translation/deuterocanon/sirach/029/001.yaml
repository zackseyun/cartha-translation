theological_decisions:
- issue: Whether ἐντολάς should be rendered generically as 'commands' or with scriptural-religious
    force as 'the commandments'
  chosen_reading: the commandments
  alternative_readings:
  - commands
  rationale: In Sirach's wisdom context, reference to ἐντολαί normally evokes God's
    commandments rather than merely human instructions. The article is not explicit
    in Greek, but English idiom can supply 'the' to convey the recognized moral-religious
    category.
  doctrine_reference: 'Translation philosophy: readable modern English without flattening
    theological weight'
