  text: ἐγγύη πολλοὺς ἀπώλεσεν κατευθύνοντας, καὶ ἐσάλευσεν αὐτοὺς ὡς κῦμα θαλάσσης·
    ἄνδρας δυνατοὺς ἀπῴκισεν, καὶ ἐπλανήθησαν ἐν ἔθνεσιν ἀλλοτρίοις.
