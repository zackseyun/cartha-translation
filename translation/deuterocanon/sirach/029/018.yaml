translation:
  text: Surety has destroyed many who were upright, and has shaken them like a wave
    of the sea; it has driven mighty men from their homes, and they wandered among
    foreign nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Guarantee' or 'standing surety.' The Greek term refers to becoming security
      for another person's debt.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγγύη
  chosen: Surety
  alternatives:
  - Guarantee
  - Pledging security
  - Standing surety
  lexicon: LSJ
  rationale: The noun denotes the act or condition of giving security for another's
    debt. 'Surety' is concise and preserves the legal-financial sense prominent in
    this context; more explanatory alternatives are possible but less compact.
- source_word: ἀπώλεσεν
  chosen: has destroyed
  alternatives:
  - has ruined
  - has brought to ruin
  lexicon: LSJ
  rationale: The verb conveys causing loss or ruin. 'Has destroyed' keeps the severity
    of the Greek, while in context the object is people's well-being rather than necessarily
    their lives.
- source_word: κατευθύνοντας
  chosen: who were prospering
  alternatives:
  - who were going straight
  - who were successful
  - who were on a straight course
  lexicon: LSJ
  rationale: Literally the participle suggests those proceeding straight or prosperously.
    In this wisdom context, it refers to people whose affairs were going well; 'who
    were prospering' communicates the idiomatic sense in natural English.
- source_word: ἐσάλευσεν
  chosen: has shaken
  alternatives:
  - has tossed
  - has unsettled
  lexicon: LSJ
  rationale: The verb means to shake or cause to totter. Because the next phrase supplies
    the sea-wave simile, 'has shaken' preserves the metaphor without overinterpreting
    it.
- source_word: ὡς κῦμα θαλάσσης
  chosen: like a wave of the sea
  alternatives:
  - like a sea wave
  - like the wave of the sea
  lexicon: LSJ
  rationale: A close rendering preserves the vivid simile and the singular image used
    in Greek.
- source_word: ἄνδρας δυνατούς
  chosen: mighty men
  alternatives:
  - strong men
  - powerful men
  lexicon: LSJ
  rationale: The phrase refers to men of strength or standing. 'Mighty men' is idiomatic
    and weighty, while retaining the masculine reference present in the Greek.
- source_word: ἀπῴκισεν
  chosen: has driven from their homes
  alternatives:
  - has exiled
  - has removed to dwell elsewhere
  - has banished
  lexicon: LSJ
  rationale: The verb means to remove from one's home or country, to send away into
    settlement elsewhere. 'Driven from their homes' makes the displacement explicit
    and fits the following clause about wandering among foreign nations.
- source_word: ἐπλανήθησαν
  chosen: they wandered
  alternatives:
  - they were led astray
  - they roamed
  lexicon: LSJ
  rationale: In this context of displacement among foreign peoples, the sense is physical
    wandering rather than moral deception.
- source_word: ἐν ἔθνεσιν ἀλλοτρίοις
  chosen: among foreign nations
  alternatives:
  - among alien peoples
  - in strange nations
  lexicon: LSJ
  rationale: The phrase denotes peoples not one's own. 'Foreign nations' is clear,
    natural, and preserves the social-geographic force.
