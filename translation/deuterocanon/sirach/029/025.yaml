id: SIR.29.25
reference: Sirach 29:25
source:
  edition: lxx-swete-1909
  text: ξενιεῖς καὶ ποτιεῖς εἰς ἀχάριστα, καὶ πρὸς ἐπὶ τούτοις πικρὰ ἀκούσει
