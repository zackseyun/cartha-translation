translation:
  text: You will host and give drink to the ungrateful, and besides these things you
    will hear bitter words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will hear bitter things'; the Greek leaves the object of 'hear'
      implicit, and 'words' is supplied for natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ξενιεῖς
  chosen: you will host
  alternatives:
  - you will lodge
  - you will entertain as a guest
  - you will show hospitality
  lexicon: LSJ
  rationale: Future of ξενίζω in the sense of receiving or treating someone as a guest.
    'Host' is concise, natural English and preserves the hospitality setting better
    than the broader 'show hospitality.'
- source_word: ποτιεῖς
  chosen: give drink
  alternatives:
  - provide drink
  - make drink
  - give to drink
  lexicon: LSJ
  rationale: The verb means to give someone something to drink. 'Give drink' keeps
    the directness of the Greek and fits the parallel with 'host.'
- source_word: εἰς ἀχάριστα
  chosen: to the ungrateful
  alternatives:
  - for ungrateful people
  - for thankless people
  lexicon: LSJ
  rationale: ἀχάριστος means ungrateful or thankless. The phrase indicates the recipients
    of the hospitality. 'The ungrateful' is idiomatic and preserves the moral characterization.
- source_word: πρὸς ἐπὶ τούτοις
  chosen: besides these things
  alternatives:
  - in addition to this
  - on top of this
  - besides all this
  lexicon: LSJ
  rationale: 'The phrase is somewhat pleonastic but clearly additive: beyond the burdens
    already mentioned, something more follows. ''Besides these things'' reflects the
    Greek closely while remaining readable.'
- source_word: πικρὰ
  chosen: bitter words
  alternatives:
  - bitter things
  - harsh words
  lexicon: LSJ
  rationale: The adjective can mean bitter in a literal or figurative sense. With
    ἀκούσει ('you will hear'), English naturally supplies 'words.' This makes explicit
    what is implicit in the Greek idiom without overtranslating.
- source_word: ἀκούσει
  chosen: you will hear
  alternatives:
  - you will listen to
  - you will be made to hear
  lexicon: LSJ
  rationale: Simple future of ἀκούω. 'You will hear' is the straightforward rendering
    and suits the warning tone.
