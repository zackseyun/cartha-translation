theological_decisions:
- issue: How to render the personified efficacy of almsgiving
  chosen_reading: and it will rescue you from every affliction
  alternative_readings:
  - and this will deliver you from every evil
  rationale: The Greek straightforwardly attributes protective value to almsgiving.
    The translation preserves that claim as stated in the text without softening it
    into mere consequence or importing later doctrinal qualifiers. 'Affliction' was
    chosen over 'evil' because κακώσις here most naturally refers to hardship or trouble.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
