translation:
  text: Store up almsgiving in your treasuries, and it will rescue you from every
    affliction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Store up charity in your storerooms'; the Greek literally says 'shut
      up almsgiving in your treasuries.'
    reason: lexical_alternative
  - marker: b
    text: Or 'it will deliver you from every evil.'
    reason: alternative_reading
lexical_decisions:
- source_word: σύγκλεισον
  chosen: Store up
  alternatives:
  - shut up
  - lock away
  - lay up
  lexicon: LSJ
  rationale: The imperative literally means 'shut up/enclose,' but in context with
    valuables kept in storehouses it idiomatically conveys putting something away
    for safekeeping. 'Store up' preserves the metaphor while sounding natural in modern
    English.
- source_word: ἐλεημοσύνην
  chosen: almsgiving
  alternatives:
  - charity
  - mercy
  - acts of mercy
  lexicon: LSJ
  rationale: In Hellenistic Jewish usage the noun commonly denotes charitable giving
    to the needy, not merely an abstract quality of mercy. 'Almsgiving' is the most
    precise English equivalent here, though somewhat traditional; 'charity' is broader
    and less concrete.
- source_word: ἐν τοῖς ταμείοις σου
  chosen: in your treasuries
  alternatives:
  - in your storehouses
  - in your storerooms
  - in your chambers
  lexicon: LSJ
  rationale: ταμεῖον can mean storeroom, chamber, or treasury. Because the image is
    of laying up a valuable possession, 'treasuries' best captures the figurative
    force without over-literalizing domestic architecture.
- source_word: ἐξελεῖταί
  chosen: will rescue
  alternatives:
  - will deliver
  - will save
  lexicon: LSJ
  rationale: The verb means to draw out or deliver from danger. 'Rescue' is vivid,
    idiomatic modern English and avoids importing heavier soteriological overtones
    that 'save' might suggest in English.
- source_word: ἐκ πάσης κακώσεως
  chosen: from every affliction
  alternatives:
  - from every evil
  - from every harm
  - from every mistreatment
  lexicon: LSJ
  rationale: κακώσις can denote bad treatment, hardship, or affliction. 'Affliction'
    fits the wisdom context of deliverance from trouble better than the more morally
    charged 'evil' or the narrower 'mistreatment'.
