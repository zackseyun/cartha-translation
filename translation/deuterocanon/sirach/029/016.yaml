translation:
  text: A sinner will overturn the good things of a guarantor,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will ruin the goods/property of a guarantor.' The Greek ἀγαθὰ can refer
      broadly to good things, benefits, or possessions.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαθὰ
  chosen: the good things
  alternatives:
  - good things
  - benefits
  - property
  - goods
  lexicon: LSJ
  rationale: The neuter plural can denote 'good things' broadly, including possessions
    or benefits. 'The good things' preserves the Greek's breadth without narrowing
    it prematurely to material property alone.
- source_word: ἐγγύου
  chosen: of a guarantor
  alternatives:
  - of a surety
  - of one who gives security
  - of a pledge-maker
  lexicon: LSJ
  rationale: ἐγγύος refers to a person who stands surety for another. 'Guarantor'
    is clear modern English and preserves the legal/financial sense better than the
    archaic 'surety.'
- source_word: ἀνατρέψει
  chosen: will overturn
  alternatives:
  - will ruin
  - will upset
  - will bring down
  lexicon: LSJ
  rationale: The verb literally means to overturn or upset. 'Will overturn' keeps
    the concrete force while allowing the implied sense of ruining the guarantor's
    good estate.
- source_word: ἁμαρτωλός
  chosen: a sinner
  alternatives:
  - the sinner
  - a sinful man
  lexicon: LSJ
  rationale: The anarthrous singular is naturally rendered generically as 'a sinner.'
    This preserves the moral characterization in the Greek without over-specifying
    gender.
