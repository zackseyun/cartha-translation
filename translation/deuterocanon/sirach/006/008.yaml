translation:
  text: For there is a friend for the occasion, and he will not stand firm in the
    day of distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there is a friend for a time' or 'there is a friend when it suits him.'
      The Hebrew phrase is idiomatic, and the Greek parallel likewise suggests a friendship
      limited to favorable circumstances.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹהֵב
  chosen: friend
  alternatives:
  - one who loves
  - lover
  lexicon: HALOT
  rationale: Although the Hebrew participle literally means 'loving one' or 'one who
    loves,' in Ben Sira's wisdom context it functions substantivally for a companion/friend.
    The Greek parallel explicitly has φίλος ('friend'), confirming that relational
    sense rather than romantic or abstract 'lover.'
- source_word: כְּפִי עֵת
  chosen: for the occasion
  alternatives:
  - according to the time
  - for a time
  - when it suits the time
  lexicon: HALOT
  rationale: The phrase literally means 'according to the mouth/measure of time,'
    idiomatically 'as the time requires' or 'for the moment.' 'For the occasion' captures
    the opportunistic, time-conditioned nature of such a friend in readable English.
    The Greek ἐν καιρῷ αὐτοῦ likewise points to a friend only in his favorable/appropriate
    time.
- source_word: יַעֲמוֹד
  chosen: stand firm
  alternatives:
  - stand
  - remain
  - endure
  lexicon: HALOT
  rationale: The verb עמד is literally 'stand,' but in this moral context it implies
    remaining steadfast or holding one's ground. 'Stand firm' brings out the implied
    loyalty under pressure while staying close to the Hebrew image. The Greek παραμείνῃ
    ('remain') supports this nuance of persistence.
- source_word: בְּיוֹם צָרָה
  chosen: in the day of distress
  alternatives:
  - in the day of trouble
  - in time of adversity
  lexicon: HALOT
  rationale: צָרָה commonly denotes distress, trouble, or adversity. 'Day of distress'
    preserves the Hebrew idiom 'day of X' while remaining natural English. The Greek
    ἐν ἡμέρᾳ θλίψεώς σου confirms the adversity/trouble sense.
