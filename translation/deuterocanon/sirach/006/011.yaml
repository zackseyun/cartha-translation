translation:
  text: In your prosperity he is like you, but in your adversity he will separate
    himself from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, 'and toward your servants he will speak boldly.' The Hebrew
      witness instead reads, 'he will separate himself from you.' The main text follows
      the extant Hebrew as the primary witness for Sirach where available, while preserving
      the Greek alternative because the divergence is substantial.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּטוֹבָתְךָ
  chosen: in your prosperity
  alternatives:
  - in your good fortune
  - when things go well for you
  - in your well-being
  lexicon: HALOT
  rationale: The Hebrew noun טובה here refers to a state of good circumstances or
    benefit. 'Prosperity' fits the contrast with רעה/adversity in the second colon
    and reads naturally in English without narrowing the sense to material wealth
    alone.
- source_word: הוּא כָמוֹךָ
  chosen: he is like you
  alternatives:
  - he is as yourself
  - he is your equal
  - he is just like you
  lexicon: HALOT
  rationale: 'The Hebrew is straightforwardly comparative: ''he is like you.'' This
    likely conveys that the supposed friend identifies closely with you when things
    are favorable. The Greek parallel ἔσται ὡς σύ supports this sense.'
- source_word: וּבְרָעָתְךָ
  chosen: but in your adversity
  alternatives:
  - but in your trouble
  - but in your misfortune
  - and in your distress
  lexicon: HALOT
  rationale: רעה in contrast to טובה denotes bad circumstances, trouble, or misfortune.
    'Adversity' preserves the broad situational contrast and gives a balanced antithesis
    with 'prosperity.' The conjunction is rendered 'but' to bring out the adversative
    force implied by the parallelism.
- source_word: יִתְנַדֶּה מִמֶּךָּ
  chosen: he will separate himself from you
  alternatives:
  - he will withdraw from you
  - he will estrange himself from you
  - he will keep away from you
  lexicon: HALOT
  rationale: The hitpael/imperfect form conveys distancing or alienating oneself.
    'Separate himself from you' preserves the reflexive nuance better than a simple
    intransitive 'depart.' The Greek parallel in Swete differs here, reading that
    he 'will speak boldly to your servants,' but the Hebrew witness is primary for
    extant Sirach Hebrew; because the source validation flags a major mismatch, the
    Greek alternative is preserved in a footnote.
