translation:
  text: My son, from your youth receive instruction, and until gray hair you will
    attain wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has 'choose instruction' where the Hebrew reads 'receive instruction.'
      The Hebrew witness is primary here, but both point to embracing formative teaching
      from youth.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: The Hebrew directly addresses a male-gendered filial figure, and Ben
    Sira regularly uses this paternal instructional form. Per project philosophy,
    the gendered form is preserved rather than neutralized.
- source_word: מִנְּעוּרֶיךָ
  chosen: from your youth
  alternatives:
  - from your childhood
  - from your young years
  lexicon: HALOT
  rationale: The phrase denotes the period of youth/early life. 'From your youth'
    is idiomatic, concise, and aligns with the Greek ἐκ νεότητός σου.
- source_word: קַח
  chosen: receive
  alternatives:
  - take
  - acquire
  lexicon: HALOT
  rationale: Although the verb literally means 'take,' in English 'receive instruction'
    better conveys the idiom of accepting discipline/teaching. This is supported by
    the object לֶקַח and by the Greek's educational framing.
- source_word: לֶקַח
  chosen: instruction
  alternatives:
  - teaching
  - discipline
  - learning
  lexicon: HALOT
  rationale: לֶקַח commonly refers to instruction or teaching received. 'Instruction'
    best fits wisdom-literature usage and corresponds well to the Greek παιδείαν,
    which emphasizes formative training. 'Discipline' is possible but too narrow here.
- source_word: וְעַד שֵׂיבָה
  chosen: and until gray hair
  alternatives:
  - and until old age
  - even to old age
  lexicon: HALOT
  rationale: The Hebrew literally refers to gray hair, a metonym for old age. Retaining
    'gray hair' preserves the concrete imagery while remaining natural in English.
    The Greek ἕως πολιῶν supports this image.
- source_word: תַּשִּׂיג
  chosen: you will attain
  alternatives:
  - you will find
  - you will obtain
  - you will reach
  lexicon: HALOT
  rationale: The verb means to reach or attain. 'Attain' fits the sense of arriving
    at wisdom through lifelong instruction. The Greek εὑρήσεις ('you will find') points
    in a similar direction, but the Hebrew witness is primary here.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard wisdom-literature term; no contextual reason to vary the gloss.
