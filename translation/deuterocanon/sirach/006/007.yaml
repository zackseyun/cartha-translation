translation:
  text: If you acquire a friend, acquire him through testing, and do not quickly put
    your trust in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gain a friend by testing him'; the Hebrew and Greek both use a verb
      meaning 'acquire' or 'obtain,' which may sound more transactional than idiomatic
      English 'make a friend.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָנִיתָ / קְנֵהוּ
  chosen: acquire / acquire him
  alternatives:
  - gain / gain him
  - make / make him your friend
  lexicon: HALOT
  rationale: The Hebrew קנה commonly means 'acquire, get, obtain.' The Greek parallel
    κτᾶσαι / κτῆσαι confirms the sense of obtaining rather than creating. 'Acquire'
    preserves the somewhat transactional metaphor of gaining a friend without over-paraphrasing
    to 'make a friend.'
- source_word: אוֹהֵב
  chosen: friend
  alternatives:
  - one who loves
  - lover
  - companion
  lexicon: HALOT
  rationale: In context אוֹהֵב denotes a personal friend rather than abstract affection.
    The Greek φίλον supports 'friend' as the natural relational rendering.
- source_word: בְּנִסָּיוֹן
  chosen: through testing
  alternatives:
  - by testing
  - in a test
  - after testing
  lexicon: HALOT
  rationale: The noun נסיון denotes testing or trial. The prefixed ב can be rendered
    instrumentally or circumstantially. 'Through testing' communicates that a person's
    reliability as a friend is to be established by testing. The Greek ἐν πειρασμῷ
    likewise points to the sphere or means of testing/trial.
- source_word: וְאַל תְּמַהֵר
  chosen: do not quickly
  alternatives:
  - do not hasten
  - do not be quick
  lexicon: HALOT
  rationale: The idiom with מהר warns against acting too hastily. 'Do not quickly'
    is idiomatic modern English and keeps the adverbial force.
- source_word: לִבְטוֹחַ עָלָיו
  chosen: put your trust in him
  alternatives:
  - trust him
  - rely on him
  lexicon: HALOT
  rationale: בטח with על expresses trusting in or relying on someone. 'Put your trust
    in him' preserves the fuller verbal idea and matches the cautionary tone. The
    Greek ἐμπιστεύσῃς αὐτῷ similarly supports entrusting oneself or placing confidence
    in him.
- source_word: אוֹהֵב ... עָלָיו
  chosen: him
  alternatives:
  - them
  rationale: The Hebrew and Greek use singular masculine forms. Following the project's
    gender-accurate policy, the representative singular is retained as 'him' rather
    than neutralizing to 'them.'
