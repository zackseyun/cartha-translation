translation:
  text: Search out and investigate; seek, and find. Hold fast to her, and do not let
    her go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''seek, and it will become known to you.'' The Hebrew witness
      reads more directly, ''seek, and find.'''
    reason: alternative_reading
lexical_decisions:
- source_word: דְּרֹש
  chosen: Search out
  alternatives:
  - Inquire
  - Seek
  lexicon: HALOT
  rationale: From דרש, conveying active inquiry or searching. 'Search out' preserves
    the investigative force and distinguishes it from the following בקש ('seek').
    The Greek ἐξίχνευσον likewise supports a stronger sense of tracking out.
- source_word: וַחֲקֹר
  chosen: and investigate
  alternatives:
  - and examine
  - and explore
  lexicon: HALOT
  rationale: From חקר, to examine or investigate thoroughly. 'Investigate' keeps the
    intensification alongside דרש. The paired imperatives suggest diligent, probing
    pursuit rather than a single generic search.
- source_word: בַּקֵּש
  chosen: seek
  alternatives:
  - look for
  lexicon: HALOT
  rationale: Standard rendering of בקש. Kept distinct from דרש to preserve the Hebrew's
    rhetorical accumulation of pursuit verbs.
- source_word: וּמְצָא
  chosen: and find
  alternatives:
  - and you will find
  lexicon: HALOT
  rationale: The Hebrew reads as an imperative sequence, 'and find,' while the Greek
    has a future/passive sense, 'and it will become known to you.' Because the primary
    witness is Hebrew, the main text follows the Hebrew; the Greek-supported alternative
    is preserved in a footnote due to the source mismatch note.
- source_word: וְהֶחֱזַקְתָּהּ
  chosen: Hold fast to her
  alternatives:
  - Take hold of her strongly
  - Strengthen yourself in her
  lexicon: HALOT
  rationale: From החזיק with feminine object suffix, likely referring back to wisdom.
    'Hold fast to her' is idiomatic English and matches the sense of firm attachment.
    The Greek ἐγκρατὴς γενόμενος points to becoming steadfast/self-controlled in relation
    to wisdom, supporting the idea of firm grasp.
- source_word: וְאַל תַּרְפֶּהָ
  chosen: and do not let her go
  alternatives:
  - and do not relax your hold on her
  - and do not forsake her
  lexicon: HALOT
  rationale: From רפה, to slacken or let drop. In context, 'do not let her go' communicates
    the image naturally in English while preserving the metaphor of maintaining one's
    grip.
