theological_decisions:
- issue: Referent of the feminine suffixes
  chosen_reading: Render the feminine object as 'her,' implying Wisdom as the antecedent.
  alternative_readings:
  - Render more abstractly as 'it,' referring to instruction or understanding
  rationale: The immediate context in Sirach 6 centers on wisdom personified as a
    woman, and the feminine suffixes naturally align with that personification. Preserving
    'her' maintains the literary and theological texture of the passage without overexplaining.
  doctrine_reference: 'Translation philosophy: preserve source meaning and readable
    modern English; do not flatten significant imagery.'
- issue: Hebrew-Greek divergence in the discovery clause
  chosen_reading: 'Main text follows the Hebrew imperative sequence: ''seek, and find.'''
  alternative_readings:
  - 'Greek: ''seek, and it will be made known to you'' / ''and it will become known
    to you'''
  rationale: The project translates Sirach from the Hebrew where it survives, while
    using the Greek parallel as a real input and consistency check. Because the Hebrew
    witness is extant and high confidence, the main text follows it; the Greek alternative
    is important enough to preserve in a footnote, especially given the source validation
    note of major mismatch.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel alongside it.'
