translation:
  text: Let those at peace with you be many, but your confidant one out of a thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''your counselors'' or ''your advisers'' (οἱ δὲ σύμβουλοί σου),
      where the Hebrew reads ''the possessor of your secret/counsel,'' supporting
      the more intimate sense ''confidant.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַנְשֵׁי שְׁלוֹמְךָ
  chosen: those at peace with you
  alternatives:
  - your friends
  - the men of your peace
  - those on friendly terms with you
  lexicon: HALOT
  rationale: Literally 'men/people of your peace.' The idiom denotes persons living
    in peace or friendship with someone. 'Those at peace with you' preserves the relational
    and peace-based nuance better than the flatter 'friends.' It also aligns well
    with the Greek οἱ εἰρηνεύοντές σοι, 'those being at peace with you.'
- source_word: יִהְיוּ רַבִּים
  chosen: be many
  alternatives:
  - be numerous
  - be plentiful
  lexicon: HALOT
  rationale: 'A straightforward rendering of the jussive/imperfect plus adjective:
    the sense is exhortational or desiderative, not merely predictive. ''Be many''
    is concise and natural in English.'
- source_word: וּבַעַל סוֹדְךָ
  chosen: your confidant
  alternatives:
  - one who shares your counsel
  - your intimate adviser
  - your close confidant
  lexicon: HALOT
  rationale: בעל סוד is literally 'master/possessor of your secret/counsel,' meaning
    one admitted to intimate counsel. 'Confidant' best captures the personal trust
    implied by סוד without over-formalizing it as merely 'adviser.' The Greek σύμβουλοι
    points toward the counsel/advice dimension, but the Hebrew's secrecy/intimacy
    nuance is stronger and is retained here.
- source_word: אֶחַד מֵאָלֶף
  chosen: one out of a thousand
  alternatives:
  - one from a thousand
  - one among a thousand
  lexicon: HALOT
  rationale: This Hebrew idiom expresses extreme rarity. 'One out of a thousand' is
    idiomatic modern English and preserves the force of selective scarcity.
