translation:
  text: For as he is, so is his friend, and as his name, so are his deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''The one who fears the Lord directs his friendship rightly, for
      as he is, so also is his neighbor.'' The Hebrew witness here differs substantially
      in the first colon.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּמוֹהוּ
  chosen: as he is
  alternatives:
  - like him
  - according to him
  lexicon: HALOT
  rationale: The Hebrew comparative phrase with כ־ and pronoun most naturally means
    'like/as he is.' The Greek parallel (κατʼ αὐτὸν οὕτως) points in the same direction,
    though with a slightly more interpretive sense ('according to him'). 'As he is'
    preserves the concise proverbial force of the Hebrew.
- source_word: רֵעֵהוּ
  chosen: his friend
  alternatives:
  - his companion
  - his neighbor
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. In this context about friendship
    (supported by the Greek φιλίαν / πλησίον in the parallel tradition), 'friend'
    best fits the immediate theme and avoids the broader social sense of 'neighbor.'
- source_word: כִּשְׁמוֹ
  chosen: as his name
  alternatives:
  - according to his name
  - like his reputation
  lexicon: HALOT
  rationale: The Hebrew literally refers to 'his name.' While 'name' can imply reputation,
    the text does not require that expansion. Retaining 'name' preserves the proverb's
    terseness and leaves the implied sense to the reader.
- source_word: מַעֲשָׂיו
  chosen: his deeds
  alternatives:
  - his actions
  - his works
  lexicon: HALOT
  rationale: מַעֲשִׂים denotes acts or deeds. 'Deeds' is natural English in wisdom
    literature and preserves the moral coloring better than the more neutral 'actions.'
