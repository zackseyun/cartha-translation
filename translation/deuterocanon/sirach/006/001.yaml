theological_decisions:
- issue: Use of divergent Hebrew and Greek witnesses in a verse marked major_mismatch
  chosen_reading: A composite translation that includes the clear Greek admonition
    and the shared warning about evil reputation, while preserving the Hebrew-Greek
    difference in a footnote.
  alternative_readings:
  - 'Translate only the Hebrew: ''An evil name inherits shame and disgrace; so is
    an evil man, a possessor of two [things].'''
  - 'Translate only the Greek: ''In great and small do not err, and instead of a friend
    do not become an enemy; for an evil name will inherit shame and reproach; so is
    the sinner who is double-tongued.'''
  rationale: The project instructions require translating from the most original Zone
    1 witness available while using the Greek parallel as actual translation input.
    Here the Hebrew and Greek differ substantially, and the verse is flagged major_mismatch.
    The main text therefore follows the fuller, intelligible Greek where the Hebrew
    is terse or unclear, while still reflecting the shared core warning and documenting
    the divergence.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, but
    use parallel Greek as actual translation input for Sirach when present; DOCTRINE.md:
    preserve tension rather than over-resolve ambiguity.'
