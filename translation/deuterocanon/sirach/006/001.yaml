translation:
  text: An evil name inherits shame and disgrace; so it is with a sinner of double
    tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The surviving Hebrew witness is shorter and reads approximately, 'An evil
      name [inherits/brings] shame and disgrace; so is an evil man, a possessor of
      two [things].' The Greek adds the opening warning, 'Do not become an enemy instead
      of a friend,' and interprets the final expression as 'double-tongued.'
    reason: textual_variant
  - marker: b
    text: Or 'double-tongued.' The Hebrew expression is obscure, but the Greek makes
      the sense explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁם רַע / ὄνομα πονηρόν
  chosen: an evil name
  alternatives:
  - a bad reputation
  - an evil reputation
  lexicon: HALOT; BDAG
  rationale: The Hebrew phrase literally means 'evil name,' and the Greek closely
    parallels it. 'Name' is retained rather than paraphrased as 'reputation' to preserve
    the idiom while remaining intelligible in English.
- source_word: וְקָלוֹן / αἰσχύνη
  chosen: shame
  alternatives:
  - dishonor
  - disgrace
  lexicon: HALOT; BDAG
  rationale: Both Hebrew and Greek point to public shame/dishonor. 'Shame' is concise
    and natural, while 'disgrace' is used for the following term to preserve the pair
    distinctly.
- source_word: חֶרְפָּה / ὄνειδος
  chosen: disgrace
  alternatives:
  - reproach
  - insult
  lexicon: HALOT; BDAG
  rationale: The term denotes reproach or public disgrace. 'Disgrace' pairs well with
    'shame' and communicates the social dimension of the warning.
- source_word: תּוֹרִישׁ / κληρονομήσει
  chosen: will inherit
  alternatives:
  - will receive
  - will come into
  lexicon: HALOT; BDAG
  rationale: Although the Hebrew form is somewhat awkward in context, the Greek confirms
    the inheritance metaphor. 'Will inherit' preserves the image rather than flattening
    it.
- source_word: אִישׁ רַע / ὁ ἁμαρτωλός
  chosen: a sinful man
  alternatives:
  - an evil man
  - a wicked man
  lexicon: HALOT; BDAG
  rationale: The Hebrew reads 'evil man,' while the Greek has 'the sinner.' Given
    the source mismatch and the Greek's fuller context, 'sinful man' captures the
    moral sense without overstating either witness.
- source_word: בַּעַל שְׁתָּיִם / ὁ δίγλωσσος
  chosen: of double tongue
  alternatives:
  - double-tongued
  - two-faced
  - double-speaking
  lexicon: HALOT; BDAG
  rationale: The Hebrew literally means something like 'master/possessor of two [things],'
    and the Greek interprets this as 'double-tongued.' Because the Hebrew is terse
    and the Greek clarifies the idiom, 'of double tongue' preserves the metaphor and
    its likely sense.
- source_word: ἐν μεγάλῳ καὶ ἐν μικρῷ μὴ ἀγνόει
  chosen: Do not become an enemy instead of a friend
  alternatives:
  - In great matters and small do not err
  - In great and small do not be ignorant
  lexicon: BDAG
  rationale: The Greek opening clause has a textual/interpretive difficulty in Swete
    as presented, but the following clause 'and instead of a friend do not become
    an enemy' is clear and fits the warning context. The Hebrew witness for this verse
    lacks the opening admonition found in Greek, so the translation foregrounds the
    secure Greek clause rather than forcing an uncertain rendering of the first phrase.
- source_word: ἀντὶ φίλου μὴ γίνου ἐχθρός
  chosen: Do not become an enemy instead of a friend
  alternatives:
  - Do not become an enemy in place of a friend
  lexicon: BDAG
  rationale: This clause is clear Greek and likely preserves the fuller sense of the
    verse where the Hebrew witness is shorter or divergent. 'Instead of a friend'
    is a natural rendering of ἀντί + genitive.
