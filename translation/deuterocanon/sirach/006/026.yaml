translation:
  text: Approach her with all your soul, and with all your strength keep to her ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Draw near to her ... and guard her ways.' The Greek permits more formal
      renderings of both verbs.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόσελθε
  chosen: Approach
  alternatives:
  - Draw near
  - Come near
  lexicon: BDAG
  rationale: Imperative of προσέρχομαι, calling for intentional movement toward wisdom.
    'Approach' is natural English and preserves the direct exhortation without overinterpreting
    it as mere intellectual assent.
- source_word: ἐν πάσῃ ψυχῇ σου
  chosen: with all your soul
  alternatives:
  - with your whole being
  - with all your heart
  lexicon: BDAG
  rationale: A semitic-style expression for total personal devotion. 'Soul' keeps
    the source wording and echoes biblical diction; 'heart' would shift the anthropology,
    and 'whole being' is interpretive.
- source_word: αὐτῇ
  chosen: her
  alternatives:
  - it
  lexicon: BDAG
  rationale: Refers to personified wisdom in the feminine. 'Her' preserves the literary
    personification present in the Greek.
- source_word: ἐν ὅλῃ δυνάμει σου
  chosen: with all your strength
  alternatives:
  - with your full power
  - with all your might
  lexicon: BDAG
  rationale: δυνάμει here denotes one's capacity or strength. 'Strength' is idiomatic
    and resonates with biblical exhortation language; 'might' is possible but slightly
    more archaic.
- source_word: συντήρησον
  chosen: keep to
  alternatives:
  - guard
  - observe
  - maintain
  lexicon: BDAG
  rationale: The verb can mean keep, preserve, or observe. With 'ways' as object,
    'keep to' communicates faithful adherence in clear modern English better than
    the more ambiguous 'keep' or the more defensive 'guard'.
- source_word: τὰς ὁδοὺς αὐτῆς
  chosen: her ways
  alternatives:
  - her paths
  - her manner of life
  lexicon: BDAG
  rationale: A common metaphor for conduct or course of life. 'Ways' is the most direct
    and biblically recognizable rendering; 'paths' is possible but less likely here
    than the broader ethical sense.
