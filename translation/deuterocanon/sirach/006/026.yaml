theological_decisions:
- issue: Personification of wisdom
  chosen_reading: Retain feminine personal language ('her') for wisdom.
  alternative_readings:
  - Use impersonal language such as 'it'
  rationale: The Greek explicitly uses feminine forms, continuing Sirach's personification
    of wisdom as a woman. Preserving this literary-theological feature is more faithful
    than flattening it into an abstraction.
