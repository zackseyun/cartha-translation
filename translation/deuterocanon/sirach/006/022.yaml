translation:
  text: For discipline is true to its name, and it is not evident to many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''For wisdom is according to its name, and it is not evident
      to many.'' The Hebrew witness reads ''discipline'' where the Greek reads ''wisdom.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הַמּוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - wisdom
  lexicon: HALOT
  rationale: The Hebrew מוסר commonly denotes discipline/instruction/correction. The
    Hebrew witness reads מוסר, while the Greek parallel has σοφία ('wisdom'), indicating
    a source-level divergence. 'Discipline' best reflects the extant Hebrew, while
    the following clause still makes good sense. The Greek alternative is preserved
    in a footnote because the mismatch is significant.
- source_word: בִּשְׁמָהּ
  chosen: true to its name
  alternatives:
  - according to its name
  - as its name indicates
  lexicon: HALOT
  rationale: Literally 'in/according to its name.' English idiom 'true to its name'
    captures the sense that the thing corresponds to what it is called, without wooden
    phrasing.
- source_word: נְכוֹחָה
  chosen: evident
  alternatives:
  - plain
  - straightforward
  - right
  lexicon: HALOT
  rationale: In context with לֹא לְרַבִּים הִיא, the sense is that it is not readily
    apparent or plain to many. The Greek φανερά ('manifest, evident') supports this
    contextual rendering.
- source_word: לְרַבִּים
  chosen: to many
  alternatives:
  - for many
  - among many
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition plus adjective; 'to many'
    fits naturally with 'evident' in English.
