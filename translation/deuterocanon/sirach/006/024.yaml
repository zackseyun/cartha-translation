translation:
  text: As the fruit of a tree depends on its cultivation, so a person's reasoning
    depends on his inclination.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Cairo Geniza Hebrew line for this verse is substantially mismatched
      to the Greek witness and appears textually uncertain; the translation therefore
      follows the Greek sense here.
    reason: textual_variant
  - marker: b
    text: Or 'your neck into her yoke.' Greek κλοιός can denote a collar or yoke-like
      restraint.
    reason: lexical_alternative
lexical_decisions:
- source_word: עבודת עץ
  chosen: her fetters
  alternatives:
  - wooden labor
  - service of wood
  - her bonds
  lexicon: HALOT
  rationale: The extant Hebrew in Kahana is highly mismatched to the Greek parallel
    and appears textually problematic for this verse. Because the prompt requires
    using the Greek parallel as actual translation input, the main line follows Greek
    πέδας ('fetters, shackles') for a coherent sense in context, while recognizing
    the Hebrew may reflect corruption or displacement.
- source_word: פְּרִי
  chosen: collar
  alternatives:
  - fruit
  - result
  lexicon: HALOT
  rationale: The Hebrew reading 'fruit' does not fit the surrounding wisdom-discipline
    imagery here and likely reflects a mismatched or corrupt line in the composite
    Hebrew witness. The Greek κλοιός clearly denotes a collar/yoke-ring placed on
    the neck, which suits the exhortation to submit to Wisdom's discipline.
- source_word: πέδας
  chosen: fetters
  alternatives:
  - shackles
  - bonds
  lexicon: BDAG
  rationale: '''Fetters'' preserves the concrete restraint imagery more precisely
    than the broader ''bonds.'' It matches the pedagogical metaphor of willingly entering
    Wisdom''s discipline.'
- source_word: κλοιός
  chosen: collar
  alternatives:
  - yoke
  - ring
  - neck-yoke
  lexicon: BDAG
  rationale: '''Collar'' is the most natural modern English equivalent for a restraint
    placed on the neck. ''Yoke'' is possible, but here the paired imagery with fetters
    suggests a restraining collar rather than an agricultural implement.'
- source_word: εἴσενεγκον
  chosen: Put ... into
  alternatives:
  - bring ... into
  - lead ... into
  lexicon: BDAG
  rationale: The imperative calls for deliberate self-submission. 'Put' is idiomatic
    and direct in English while preserving the force of the command.
