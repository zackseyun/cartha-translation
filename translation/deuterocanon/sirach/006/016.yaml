theological_decisions:
- issue: Supplying the object of 'fears' from the Greek parallel
  chosen_reading: one who fears the Lord
  alternative_readings:
  - one who fears
  rationale: The Hebrew participle stands without an explicit object in the extant
    text, but the Greek parallel reads 'those who fear the Lord.' Because the task
    requires using the parallel as actual translation input and the Hebrew line is
    textually difficult, the translation supplies 'the Lord' from the Greek. This
    does not add a new doctrine; it clarifies the likely intended referent in a wisdom
    context.
  doctrine_reference: 'Translation philosophy: original-language primacy with Greek
    parallel used for deuterocanonical consistency; Contested terms table: κύριος
    → Lord'
