translation:
  text: A faithful friend is a bundle of life, and one who fears the Lord will find
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads literally 'a bundle of life, a lover of faithfulness'; the
      Greek parallel has 'a faithful friend is a remedy of life.' The translation
      follows the Hebrew image 'bundle of life' while using the Greek to clarify the
      sense of the line.
    reason: alternative_reading
  - marker: b
    text: The final clause is textually difficult in the Hebrew, which lacks an explicit
      object for 'fears' and has a verb/object form that is hard to construe. The
      Greek parallel reads, 'those who fear the Lord will find him.'
    reason: textual_variant
lexical_decisions:
- source_word: צְרוֹר חַיִּים
  chosen: a bundle of life
  alternatives:
  - a bundle of living
  - a life-giving bundle
  - a medicine of life
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'bundle of life/lives' and is the primary
    Zone 1 witness. It evokes something precious, preserved, and life-sustaining.
    The Greek parallel reads φάρμακον ζωῆς ('medicine/remedy of life'), which points
    in the same semantic direction but is not followed over the Hebrew. 'Bundle of
    life' preserves the Hebrew image while remaining intelligible in English.
- source_word: אוֹהֵב אֱמוּנָה
  chosen: a faithful friend
  alternatives:
  - one who loves faithfulness
  - a lover of fidelity
  lexicon: HALOT
  rationale: The Hebrew as transmitted is compressed and somewhat awkward. In context
    with the Greek φίλος πιστός ('faithful friend'), the sense is best represented
    as describing the friend as faithful/reliable rather than abstractly 'loving faithfulness.'
    This uses the Greek parallel as a consistency check while staying anchored to
    the Hebrew witness.
- source_word: יְרֵא
  chosen: one who fears
  alternatives:
  - the one fearing
  - whoever fears
  lexicon: HALOT
  rationale: The participial form is naturally rendered generically. 'One who fears'
    is readable modern English and preserves the wisdom-text generalization.
- source_word: וְאַל
  chosen: and
  alternatives:
  - but
  - yet
  lexicon: HALOT
  rationale: The Hebrew reading וְאַל is difficult if taken in its usual prohibitive
    sense ('and do not'), since it does not fit the clause smoothly. The Greek parallel
    supports a simple connective before 'will find him.' Given the source validation
    flag ('major_mismatch') and the coherence of the Greek, the clause is translated
    by sense as coordinate rather than preserving an unintelligible prohibition.
- source_word: יַשִּׂיגֵם
  chosen: will find him
  alternatives:
  - will attain him
  - will overtake them
  lexicon: HALOT
  rationale: The Hebrew form as pointed suggests 'attain/overtake them,' but the object/number
    is problematic in context. The Greek εὑρήσουσιν αὐτόν ('will find him') gives
    a clear singular referent matching 'faithful friend.' The English follows the
    contextual sense supported by the Greek parallel while acknowledging the Hebrew
    difficulty.
- source_word: Κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: The Greek parallel explicitly has 'the Lord,' supplying the object of
    fear absent from the compressed Hebrew clause. Per project doctrine, κύριος is
    rendered 'Lord.' Including 'the' yields natural English and reflects the Greek
    source used alongside the Hebrew.
