theological_decisions:
- issue: Primary-source divergence between surviving Hebrew and Greek parallel
  chosen_reading: Translate from the Hebrew witness while allowing the Greek to confirm
    the verse's wisdom-exhortation setting, without importing the Greek's distinct
    wording about standing among elders and attaching oneself to the wise.
  alternative_readings:
  - A Greek-based rendering such as 'Stand in the company of elders, and if anyone
    is wise, attach yourself to him.'
  rationale: For Sirach, the project translates from the Hebrew where it survives.
    Here the Hebrew and Greek differ substantially, and the source metadata flags
    a major mismatch. The Hebrew is extant and high-confidence, so it governs the
    main text. The Greek remains relevant as a parallel witness showing a similar
    pedagogical theme, but not enough to override the Hebrew wording.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    use Greek parallel as actual input while keeping original-language primacy.'
