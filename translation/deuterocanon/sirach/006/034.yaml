translation:
  text: Be eager to hear every discourse, and do not let a proverb of understanding
    escape you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Stand in the company of elders, and if anyone is wise,
      attach yourself to him.'' The surviving Hebrew witness differs substantially
      here; the main text follows the Hebrew, since Hebrew survives for this verse.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  - any
  lexicon: HALOT
  rationale: 'Distributive sense fits the exhortation: the hearer should be open to
    each kind of worthwhile speech, not merely ''all'' as a collective abstraction.'
- source_word: שִׂיחָה
  chosen: discourse
  alternatives:
  - conversation
  - speech
  - discussion
  lexicon: HALOT
  rationale: The Hebrew can denote speech or conversation. 'Discourse' preserves the
    broad sense of spoken instruction or discussion without sounding too casual. It
    also fits the wisdom context better than 'chat' or overly formal 'oration'.
- source_word: חֲפוֹץ
  chosen: Be eager
  alternatives:
  - desire
  - take pleasure
  - delight
  lexicon: HALOT
  rationale: Imperatival force is best conveyed idiomatically in English as 'Be eager.'
    It captures volitional readiness rather than mere emotional enjoyment.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: The infinitive after חפץ is naturally rendered 'to hear.' In English
    this includes attentive listening in context.
- source_word: וּמְשַׁל
  chosen: a proverb
  alternatives:
  - a parable
  - a maxim
  - a saying
  lexicon: HALOT
  rationale: In wisdom literature משל commonly denotes a proverb or aphoristic saying.
    'Proverb' is the clearest and most natural English equivalent here.
- source_word: בִּינָה
  chosen: of understanding
  alternatives:
  - of insight
  - of discernment
  - wise
  lexicon: HALOT
  rationale: 'The genitival construction is preserved: this is a proverb characterized
    by understanding. ''Of understanding'' keeps the Hebrew flavor and avoids over-interpreting
    whether the focus is on the speaker''s wisdom or the content''s discernment.'
- source_word: אַל יֵצְאֶךָּ
  chosen: do not let ... escape you
  alternatives:
  - let not ... leave you
  - do not miss
  - do not let ... pass from you
  lexicon: HALOT
  rationale: The idiom literally involves going out from or past the hearer. 'Do not
    let ... escape you' communicates the warning not to miss or lose hold of wise
    instruction in idiomatic modern English.
