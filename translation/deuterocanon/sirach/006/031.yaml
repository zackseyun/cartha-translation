translation:
  text: You will wear her like garments of honor, and you will crown yourself with
    her like a crown of splendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''a crown of rejoicing/exultation'' instead of Hebrew ''a crown
      of splendor.'' The main text follows the extant Hebrew witness, with the Greek
      kept here as a meaningful parallel nuance.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּגְדֵי כָבוֹד
  chosen: garments of honor
  alternatives:
  - glorious garments
  - robes of honor
  - garments of glory
  lexicon: HALOT
  rationale: The Hebrew literally means 'garments of honor/glory.' 'Garments of honor'
    preserves the concrete image and the dignity connotation of כָבוֹד without sounding
    overly elevated. The Greek parallel στολὴν δόξης supports a clothing image associated
    with glory/honor.
- source_word: תִלְבְּשֶׁנָּה
  chosen: you will put her on
  alternatives:
  - you will wear her
  - you will clothe yourself with her
  lexicon: HALOT
  rationale: From לבשׁ, 'to put on/wear.' Because the suffix refers back to wisdom
    in the surrounding context, English needs a formulation that can naturally take
    a feminine object; 'put her on' keeps the metaphor vivid. The Greek ἐνδύσῃ αὐτήν
    likewise has an explicit object, supporting this rendering over a more abstract
    paraphrase.
- source_word: וַעֲטֶרֶת תִּפְאֶרֶת
  chosen: like a crown of splendor
  alternatives:
  - with a crown of beauty
  - with a diadem of glory
  - with a crown of honor
  lexicon: HALOT
  rationale: The Hebrew phrase means 'and a crown of beauty/splendor.' 'Splendor'
    fits תִּפְאֶרֶת well in wisdom literature and pairs naturally with the first colon's
    honor imagery. The Greek στέφανον ἀγαλλιάματος differs somewhat ('crown of rejoicing/exultation'),
    so the Hebrew is followed in the main text while the Greek nuance is preserved
    in a footnote.
- source_word: תְּעַטְּרֶנָּה
  chosen: you will crown yourself with her
  alternatives:
  - you will adorn yourself with her
  - you will be crowned with her
  lexicon: HALOT
  rationale: From עטר, 'to crown, encircle, adorn.' The Hebrew suffix again points
    to wisdom as the object. The Greek περιθήσεις σεαυτῷ explicitly brings out the
    reflexive sense ('you will place [it] on yourself'), so 'crown yourself with her'
    best reflects both witnesses.
