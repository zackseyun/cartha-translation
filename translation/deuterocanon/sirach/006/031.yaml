theological_decisions:
- issue: Referent of the feminine suffixes
  chosen_reading: The verse continues the personification of wisdom as 'her.'
  alternative_readings:
  - Render the imagery without explicit feminine pronouns, e.g. 'you will wear garments
    of honor'
  rationale: The immediate context in Sirach 6 personifies wisdom as a woman. Preserving
    'her' maintains the literary and theological texture of the passage rather than
    flattening it into an impersonal abstraction.
