translation:
  text: For a fierce soul destroys its owner, and it makes him the rejoicing of enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and the joy/rejoicing of an enemy will overtake them.'' The Hebrew
      final verb is difficult and appears mismatched in number; the Greek parallel
      reads, ''and it will make him a rejoicing of enemies,'' which the main text
      follows for sense.'
    reason: textual_variant
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: soul
  alternatives:
  - self
  - person
  - life
  lexicon: HALOT
  rationale: The Hebrew נפש can denote the inner self, person, or life. Here, paired
    with an adjective describing character and followed by destructive action, it
    points to the person's inner disposition. 'Soul' preserves the anthropological
    force and aligns with the Greek ψυχή, while remaining understandable in English.
- source_word: עַזָּה
  chosen: fierce
  alternatives:
  - strong
  - bold
  - harsh
  - violent
  lexicon: HALOT
  rationale: 'The adjective literally conveys strength or intensity, but in this wisdom
    context the sense is morally negative: an overbearing, unrestrained disposition.
    The Greek parallel has πονηρά (''evil''), which confirms a negative characterization.
    ''Fierce'' captures the Hebrew''s forcefulness without flattening it to the more
    interpretive ''evil'' in the main text.'
- source_word: תַּשְׁחִית
  chosen: destroys
  alternatives:
  - ruins
  - corrupts
  - lays waste
  lexicon: HALOT
  rationale: From שחת, the verb can mean destroy, ruin, or corrupt. In context the
    warning is about self-destructive consequences, and 'destroys' best conveys the
    severity while fitting normal English style.
- source_word: בְּעָלֶיהָ
  chosen: its owner
  alternatives:
  - its master
  - the one who possesses it
  - its possessor
  lexicon: HALOT
  rationale: בעל commonly denotes owner, possessor, or master. The Greek κτησάμενον
    ('the one who acquired/possesses it') supports a possession sense rather than
    a marital one. 'Its owner' is concise and natural.
- source_word: וְשִׂמְחַת
  chosen: the rejoicing
  alternatives:
  - the joy
  - a delight
  - an object of rejoicing
  lexicon: HALOT
  rationale: The noun שמחה usually means joy or rejoicing. Because it is linked to
    enemies and functions predicatively of the victim, the sense is that he becomes
    something over which enemies rejoice. 'The rejoicing' preserves the nominal form
    while making the idiom intelligible.
- source_word: שׂוֹנֵא
  chosen: enemies
  alternatives:
  - haters
  - those who hate
  lexicon: HALOT
  rationale: Although singular in form, the following pronominal ending and the Greek
    ἐχθρῶν indicate a collective sense. 'Enemies' is the most natural English rendering.
- source_word: תַּשִּׂיגֵם
  chosen: it makes him
  alternatives:
  - it overtakes them
  - it reaches them
  - it brings them into
  lexicon: HALOT
  rationale: 'The Hebrew verb נשׂג normally means overtake or reach, and the extant
    Hebrew ending appears plural (''them''), creating a mismatch with the singular
    antecedent. The Greek parallel reads ποιήσει αὐτόν (''it will make him''), which
    likely reflects the intended sense: the person becomes an object of enemy rejoicing.
    Given the source validation flag ''major_mismatch'' and the strong Greek support,
    the translation follows the sense rather than a wooden rendering of the difficult
    Hebrew form.'
