theological_decisions:
- issue: Use of Hebrew versus Greek in a verse with a difficult final clause and source-level
    mismatch
  chosen_reading: Translate primarily from the Hebrew, but let the Greek parallel
    guide the final clause as 'it makes him the rejoicing of enemies.'
  alternative_readings:
  - '''and the joy of an enemy will overtake them'''
  - '''and enemies'' rejoicing will overtake them'''
  rationale: 'The project''s policy gives primacy to the Hebrew where it survives,
    but the Hebrew here has a notable grammatical/semantic difficulty in תַּשִּׂיגֵם
    and the verse is flagged ''major_mismatch.'' The Greek parallel offers a coherent
    reading that matches the broader wisdom sense: a vicious inner disposition ruins
    its possessor and turns him into an object of enemy triumph. This preserves source
    uncertainty honestly while producing a defensible main text.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives in Sirach,
