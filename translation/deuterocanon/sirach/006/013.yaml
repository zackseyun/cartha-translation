theological_decisions:
- issue: Use of Hebrew versus Greek relational term in the second colon
  chosen_reading: Render the second group as 'friends' in the main text while preserving
    'those who love you' as an alternative.
  alternative_readings:
  - those who love you
  - your loved ones
  rationale: The primary witness is the Hebrew, but the Greek parallel is explicitly
    to be used as translation input. Here the Hebrew אֹהֲבֶיךָ is broader/literal
    ('those who love you'), while the Greek φίλων narrows it to 'friends.' In context,
    the proverb contrasts obvious enemies with apparently close allies, and 'friends'
    communicates that contrast more idiomatically in English. The more literal Hebrew
    nuance is preserved in a footnote for auditability.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, using
    Greek parallel as actual input'
