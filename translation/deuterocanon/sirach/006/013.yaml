translation:
  text: Keep away from your enemies, and be on guard against your friends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''those who love you''; Greek parallel: ''friends.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מִשֹּׂנְאֶיךָ
  chosen: from your enemies
  alternatives:
  - from those who hate you
  lexicon: HALOT
  rationale: The Hebrew participial form from שׂנא literally means 'those hating you,'
    but in idiomatic English 'your enemies' is the more natural equivalent and is
    supported by the Greek ἐχθρῶν ('enemies'). This preserves the adversarial sense
    without awkwardness.
- source_word: הִבָּדֵל
  chosen: Keep away
  alternatives:
  - separate yourself
  - be separated
  lexicon: HALOT
  rationale: The Niphal imperative of בדל calls for distancing or separation. 'Keep
    away' gives clear imperative force in modern English while preserving the reflexive/separative
    sense. The Greek διαχωρίσθητι likewise supports deliberate separation.
- source_word: וּמֵאֹהֲבֶיָך
  chosen: even with your friends
  alternatives:
  - from your loved ones
  - from those who love you
  - from your friends
  lexicon: HALOT
  rationale: The Hebrew literally means 'from those who love you,' while the Greek
    has φίλων ('friends'). Because the parallel Greek likely reflects the intended
    relational category, 'friends' is the best main-text rendering. 'Even with' brings
    out the warning force in idiomatic English while still reflecting the preposition's
    relational scope.
- source_word: הֵשָּׁמֵר
  chosen: be on guard
  alternatives:
  - beware
  - guard yourself
  - be careful
  lexicon: HALOT
  rationale: The imperative of שמר in this stem carries the sense of guarding oneself
    or being cautious. 'Be on guard' is vivid, natural English and matches the cautionary
    tone. The Greek πρόσεχε similarly conveys attentiveness/caution.
