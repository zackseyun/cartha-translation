    text: ἄκουσον, τέκνον, καὶ δέξαι γνώμην μου, καὶ μὴ ἀπαναίνου τὴν συμβουλίαν μου·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 6:23
translation:
  text: A potter's vessel is tested in a furnace, and so a man is tested by his reasoning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Hebrew line supplied in Zone 1 appears to be a mismatched or
      corrupt witness for this verse; the translation therefore follows the Greek
      parallel: ''Listen, child, and receive my judgment, and do not refuse my counsel.'''
    reason: textual_variant
  - marker: b
    text: Or 'my child' for 'my son'; Greek τέκνον is broader in sense, but the instructional
      idiom here is rendered gender-accurately.
    reason: lexical_alternative
  - marker: c
    text: Or 'receive my instruction/opinion' for 'accept my judgment'; Greek γνώμη
      can carry several nuances of considered thought or counsel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄκουσον
  chosen: Listen
  alternatives:
  - Hear
  lexicon: BDAG
  rationale: The Hebrew in Zone 1 is clearly corrupt/mismatched for this verse, while
    the Greek parallel provides a coherent imperative. 'Listen' is natural modern
    English and preserves the force of the command.
- source_word: τέκνον
  chosen: my son
  alternatives:
  - child
  - my child
  lexicon: BDAG
  rationale: Although Greek τέκνον can mean 'child,' Ben Sira's instructional address
    conventionally targets a male disciple in the singular. Following the project's
    gender-accurate policy, 'my son' best reflects the source's pedagogical idiom.
- source_word: δέξαι
  chosen: accept
  alternatives:
  - receive
  lexicon: BDAG
  rationale: '''Accept'' fits the exhortational context better than the more literal
    ''receive,'' conveying willing reception of instruction rather than mere reception.'
- source_word: γνώμην
  chosen: judgment
  alternatives:
  - opinion
  - instruction
  - understanding
  lexicon: BDAG
  rationale: γνώμη can denote judgment, purpose, or opinion. Here it refers to the
    sage's considered guidance. 'Judgment' preserves the deliberative sense without
    becoming too paraphrastic.
- source_word: ἀπαναίνου
  chosen: reject
  alternatives:
  - refuse
  - spurn
  lexicon: BDAG
  rationale: The verb means to decline or refuse. 'Reject' is idiomatic with 'counsel'
    and matches the negative imperative's force.
- source_word: συμβουλίαν
  chosen: counsel
  alternatives:
  - advice
  - guidance
  lexicon: BDAG
  rationale: '''Counsel'' preserves the wisdom-literature register better than ''advice''
    while remaining readable modern English.'
