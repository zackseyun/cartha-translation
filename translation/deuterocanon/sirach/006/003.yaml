translation:
  text: It will consume your leaves and uproot your fruit, and leave you like a dry
    tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is difficult at several points in this verse; the Greek parallel
      supports the sense 'your leaves' and a destructive outcome for 'your fruit.'
    reason: textual_variant
  - marker: b
    text: Or 'destroy your fruit.' The underlying Hebrew verb is uncertain here, and
      the Greek reads 'destroy/lose.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלֶיךָ
  chosen: your leaves
  alternatives:
  - upon you
  - against you
  lexicon: HALOT
  rationale: In context with the Greek parallel τὰ φύλλα σου ('your leaves'), the
    Hebrew is best understood as a corrupted or orthographically unusual form corresponding
    to 'your leaves,' not the prepositional phrase 'upon you.' This yields coherent
    parallelism with 'your fruit.'
- source_word: תֹּאכַל
  chosen: it will consume
  alternatives:
  - you will eat
  - it will eat
  lexicon: HALOT
  rationale: The verb literally means 'eat/consume.' Given the surrounding imagery
    and the Greek καταφάγεσαι, an impersonal or previously implied subject ('it')
    is required in English. 'Consume' fits the metaphor of destructive appetite better
    than the more literal 'eat.'
- source_word: וּפֶרְיְךָ
  chosen: your fruit
  alternatives:
  - your produce
  lexicon: HALOT
  rationale: The noun denotes fruit/produce. 'Fruit' preserves the arboreal metaphor
    established by 'leaves' and 'dry tree.'
- source_word: תְּשָׁרֵשׁ
  chosen: uproot
  alternatives:
  - root out
  - destroy
  lexicon: HALOT
  rationale: The Hebrew form is difficult, and the Greek parallel has ἀπολέσεις ('you
    will destroy/lose'). Within the tree metaphor, 'uproot' best reflects a likely
    Hebrew sense related to rooting/rooting out and preserves vivid imagery. It also
    explains the progression from leaves to fruit to the whole tree's ruin.
- source_word: וְהִנִיחַתְךָ
  chosen: leave you
  alternatives:
  - cause you to rest
  - set you down
  lexicon: HALOT
  rationale: From נוח/הניח, the causative can mean 'leave' in context. The Greek ἀφήσεις
    σεαυτόν ('you will leave yourself') supports the sense of abandonment rather than
    rest.
- source_word: כְּעֵץ יָבֵשׁ
  chosen: like a dry tree
  alternatives:
  - like a withered tree
  lexicon: HALOT
  rationale: A straightforward simile. 'Dry tree' is more literal and preserves the
    starkness of the image; 'withered tree' is possible but slightly more interpretive.
