- issue: Use of Hebrew with major mismatch note and Greek parallel
  chosen_reading: Translate primarily from the extant Hebrew while allowing the Greek
    parallel to clarify difficult forms and syntax.
  alternative_readings:
  - 'Translate more woodenly from the Hebrew alone: ''Upon you it will eat...'''
  - 'Follow the Greek more directly: ''It will devour your leaves and destroy your
    fruits, and you will leave yourself like a dry tree.'''
  rationale: The Hebrew is the most original witness available for this verse, but
    the source is flagged 'major_mismatch' and contains forms that are awkward in
    isolation. The Greek parallel provides strong confirmation for the arboreal imagery
    ('leaves,' 'fruit,' 'dry tree') and helps resolve ambiguous Hebrew wording into
    coherent English without abandoning Hebrew primacy.
