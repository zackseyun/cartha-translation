translation:
  text: A sweet palate multiplies friends, and gracious lips ask after peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'multiplies one who loves' is difficult; the Greek parallel reads
      'multiplies his friends,' which is followed here as the clearer sense.
    reason: alternative_reading
  - marker: b
    text: Or 'gracious speech multiplies friendly greetings.' The Hebrew uses bodily
      imagery ('palate,' 'lips'), while the Greek similarly uses 'throat' and 'tongue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵךְ
  chosen: palate
  alternatives:
  - mouth
  - throat
  - speech
  lexicon: HALOT
  rationale: The Hebrew literally denotes the palate/mouth, and in context functions
    metonymically for pleasant speech. 'Palate' preserves the concrete Hebrew image
    better than flattening it to 'speech,' while the Greek λάρυγξ ('throat') confirms
    a bodily-speech metaphor rather than a purely abstract term.
- source_word: עָרֵב
  chosen: sweet
  alternatives:
  - pleasant
  - agreeable
  lexicon: HALOT
  rationale: The adjective commonly means pleasant or sweet. 'Sweet' keeps the sensory
    metaphor alive and matches the parallel Greek γλυκύς.
- source_word: יַרְבֶּה אוֹהֵב
  chosen: multiplies friends
  alternatives:
  - increases those who love him
  - gains many friends
  lexicon: HALOT
  rationale: The Hebrew consonants point to 'one loving/lover,' but the Greek reads
    φίλους αὐτοῦ ('his friends'), likely reflecting the intended sense in context.
    Given the source validation flag 'major_mismatch' and the Greek parallel, 'multiplies
    friends' best represents the likely meaning without overparaphrase.
- source_word: שִׂפְתֵי חֵן
  chosen: gracious lips
  alternatives:
  - pleasant lips
  - charming lips
  lexicon: HALOT
  rationale: Literally 'lips of grace/favor.' 'Gracious lips' is idiomatic modern
    English and preserves the moral-social nuance of חֵן better than merely aesthetic
    'charming.'
- source_word: שׁוֹאֲלֵי שָׁלוֹם
  chosen: ask after peace
  alternatives:
  - seek peace
  - greet kindly
  - speak peace
  lexicon: HALOT
  rationale: The Hebrew phrase literally means 'those asking of peace/well-being,'
    an idiom for inquiring after someone's welfare or offering peaceable greeting.
    'Ask after peace' keeps the Hebrew idiom visible. The Greek εὐπροσήγορα points
    toward pleasant address/greeting, supporting a social-greeting sense rather than
    abstract peacemaking alone.
