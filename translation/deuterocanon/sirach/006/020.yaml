theological_decisions:
- issue: Gendered reference for wisdom and the person lacking understanding
  chosen_reading: Use non-gendered English for the person ('one lacking sense') and
    neuter reference for the object ('it').
  alternative_readings:
  - '''the senseless man will not endure her'''
  rationale: The Hebrew idiom חֲסַר לֵב is grammatically masculine but functions as
    a wisdom-type characterization, not necessarily a male-specific statement. The
    immediate verse does not require a masculine English form. Also, although wisdom
    is often personified as feminine in Hebrew, this line predicates difficulty more
    abstractly; English 'it' reads naturally and avoids over-personifying where the
    verse itself does not make that explicit.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
