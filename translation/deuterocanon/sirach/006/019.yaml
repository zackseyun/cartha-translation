translation:
  text: Draw near to her like one who plows and reaps, and wait for her abundant produce.
    For in her service you will labor only a little, and before long you will eat
    her fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads 'like one who plows and sows' instead of 'plows and reaps.'
    reason: textual_variant
  - marker: b
    text: Hebrew literally says 'tomorrow'; the sense here is likely 'soon' or 'before
      long,' supported by the Greek's 'quickly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּחוֹרֵשׁ
  chosen: like one who plows
  alternatives:
  - like a plowman
  - as one plowing
  lexicon: HALOT
  rationale: The Hebrew participle from חרש refers to plowing. Rendering it verbally
    in a simile keeps the agricultural image natural in English while staying close
    to the source.
- source_word: וּכְקוֹצֵר
  chosen: and reaps
  alternatives:
  - and like one who harvests
  - and like a reaper
  lexicon: HALOT
  rationale: The Hebrew points to reaping/harvesting. 'Reaps' pairs idiomatically
    with 'plows' and preserves the farming metaphor. The Greek parallel has 'the one
    sowing,' but the Hebrew witness available here reads 'reaper,' so the main text
    follows the Hebrew while noting the Greek-supported alternative in a footnote.
- source_word: קְרַב אֵלֶיהָ
  chosen: Draw near to her
  alternatives:
  - Approach her
  - Come near to her
  lexicon: HALOT
  rationale: קְרַב is an imperative of approach. 'Draw near' is slightly more elevated
    and suits wisdom personified as a woman, without becoming archaic.
- source_word: וְקַוֵּה
  chosen: and wait for
  alternatives:
  - and hope for
  - and expect
  lexicon: HALOT
  rationale: The verb can denote waiting with expectation or hoping. 'Wait for' best
    fits the agricultural sequence and the patience implied by cultivation.
- source_word: לְרֹב תְּבוּאָתָהּ
  chosen: her abundant produce
  alternatives:
  - the abundance of her yield
  - her plentiful harvest
  lexicon: HALOT
  rationale: תבואה is produce/yield, and רֹב marks abundance. 'Abundant produce' is
    clear modern English and preserves the harvest metaphor.
- source_word: בַעֲבֹדָתָהּ
  chosen: in her service
  alternatives:
  - in working for her
  - in her labor
  lexicon: HALOT
  rationale: The noun עבודה can mean work, labor, or service. Because wisdom is personified,
    'in her service' preserves both the labor sense and the relational nuance of devoting
    oneself to wisdom.
- source_word: מְעַט תַּעֲבוֹד
  chosen: you will labor only a little
  alternatives:
  - you will work but little
  - you will toil a little
  lexicon: HALOT
  rationale: The phrase emphasizes that the effort is comparatively small. 'Labor
    only a little' is idiomatic and keeps the future promise.
- source_word: וּלְמָחָר
  chosen: and soon
  alternatives:
  - and tomorrow
  - before long
  lexicon: HALOT
  rationale: Literally the Hebrew reads 'for tomorrow' or 'by tomorrow,' but in wisdom-style
    exhortation this can function idiomatically for nearness in time. The Greek parallel
    explicitly has 'quickly.' 'Soon' best reflects the sense shared by the witnesses
    without forcing an overly literal 'tomorrow' that may mislead English readers.
- source_word: פִּרְיָהּ
  chosen: her fruit
  alternatives:
  - its fruit
  - her produce
  lexicon: HALOT
  rationale: Because wisdom is personified as feminine throughout the context, 'her
    fruit' preserves the personification better than 'its fruit.'
