theological_decisions:
- issue: Personification of wisdom as feminine
  chosen_reading: Use feminine pronouns throughout ('her')
  alternative_readings:
  - Use 'it' for abstract wisdom
  rationale: The Hebrew consistently personifies wisdom as a woman in this context.
    Preserving 'her' maintains the literary and theological texture of the passage
    rather than flattening wisdom into an impersonal abstraction.
  doctrine_reference: DOCTRINE.md §Translation philosophy, readable modern English
    and source-text primacy
- issue: Reconciling Hebrew and Greek divergence in the farming image
  chosen_reading: Main text follows Hebrew 'plows and reaps'
  alternative_readings:
  - Greek-supported 'plows and sows'
  rationale: The project translates Sirach from the Hebrew where it survives, while
    using the Greek parallel as a real input. Here the Hebrew witness is the primary
    source, so the main text keeps 'reaps'; the Greek alternative is preserved in
    a footnote because the divergence is significant and may reflect a different Vorlage
    or transmission history.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly'
