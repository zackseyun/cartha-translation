translation:
  text: It will be upon him like a heavy stone, and he will not delay to throw it
    off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads literally 'like a stone of burden'; the Greek parallel reads
      'like a strong stone of testing,' which likely clarifies the metaphor as both
      weight and probation.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּאֶבֶן
  chosen: like a ... stone
  alternatives:
  - as a stone
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like a stone' is the natural English
    simile.
- source_word: מַשָּׂא
  chosen: heavy
  alternatives:
  - burden
  - load-bearing
  lexicon: HALOT
  rationale: In the Hebrew phrase אבן משא, the noun denotes burden/load, yielding
    the sense of a burdensome or heavy stone. Because 'stone of burden' is awkward
    in English, 'heavy ... stone' conveys the weight imagery clearly while preserving
    the metaphor.
- source_word: תִּהְיֶה עָלָיו
  chosen: will be upon him
  alternatives:
  - will rest on him
  - will weigh on him
  lexicon: HALOT
  rationale: A fairly formal rendering of the Hebrew verbal clause. 'Upon him' preserves
    the image of weight resting on the person; the Greek ἔσται ἐπ᾽ αὐτῷ supports this.
- source_word: λίθος δοκιμασίας ἰσχυρός
  chosen: heavy testing stone
  alternatives:
  - strong stone of testing
  - touchstone
  - proving stone
  lexicon: BDAG
  rationale: The Greek parallel adds δοκιμασίας ('testing/proving') and ἰσχυρός ('strong/heavy/firm'),
    clarifying that the stone image is not merely weight but ordeal/probation. Since
    the Hebrew witness is marked major_mismatch, the Greek is used as an actual input
    to preserve this nuance. 'Testing stone' keeps the pedagogical context of wisdom
    as something difficult that proves the learner.
- source_word: וְלֹא יְאַחֵר
  chosen: he will not delay
  alternatives:
  - he will not linger
  - he will not hesitate
  lexicon: HALOT
  rationale: The hiphil of אחר commonly means delay/tarry. 'Will not delay' is direct
    and fits the following infinitive.
- source_word: לְהַשְׁלִיכָה
  chosen: to throw it off
  alternatives:
  - to cast it away
  - to throw her away
  lexicon: HALOT
  rationale: The infinitive means 'to throw/cast.' English idiom prefers 'throw it
    off' for removing a burden. The Hebrew suffix is feminine, matching 'wisdom/discipline'
    as a conceptual antecedent in context; English uses 'it' for the burden metaphor.
    The Greek ἀπορρῖψαι αὐτήν likewise points to casting 'her/it' away.
