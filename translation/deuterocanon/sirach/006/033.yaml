translation:
  text: If you are willing to listen, you will learn discipline; if you incline your
    ear, you will become wise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The surviving Hebrew for this verse is difficult and appears shorter than
      the Greek. The Greek parallel reads, 'If you love to listen, you will receive
      instruction, and if you incline your ear, you will be wise.' The translation
      follows the Hebrew as primary while using the Greek to clarify the sense and
      preserve the fuller parallelism.
    reason: textual_variant
  - marker: b
    text: Or 'receive instruction' for 'learn discipline.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם תּוֹבֵא לִשְׁמֹעַ
  chosen: If you are willing to listen
  alternatives:
  - If you come to hear
  - If you desire to hear
  - If you love to listen
  lexicon: HALOT
  rationale: The Hebrew form is somewhat unusual in this composite Geniza text, and
    the Greek parallel ἐὰν ἀγαπήσῃς ἀκούειν clarifies the sense as willingness or
    desire to hear rather than mere physical arrival. 'Are willing to listen' gives
    idiomatic English while preserving the volitional nuance.
- source_word: וְתֵט אָזְנְךָ
  chosen: if you incline your ear
  alternatives:
  - if you bend your ear
  - if you pay close attention
  lexicon: HALOT
  rationale: A standard Hebrew idiom for attentive listening. 'Incline your ear' preserves
    the metaphor and remains understandable in modern English.
- source_word: תִּוָּסֵר
  chosen: you will learn discipline
  alternatives:
  - you will be instructed
  - you will accept correction
  - you will be disciplined
  lexicon: HALOT
  rationale: From יסר in the passive/reflexive sphere, conveying receiving instruction/correction.
    'Learn discipline' captures the result in natural English and fits wisdom literature
    context better than the harsher 'be disciplined.' The Greek ἐκδέξῃ points toward
    receiving instruction, supporting this sense.
- source_word: σοφὸς ἔσῃ (Greek parallel)
  chosen: you will become wise
  alternatives:
  - you will be wise
  lexicon: BDAG
  rationale: The Hebrew line as given lacks an explicit equivalent here, but the Greek
    parallel preserves a second result clause. Because the task requires using the
    Greek as actual translation input alongside the Hebrew, this clause is included.
    'Become wise' expresses the future-result sense naturally in English.
