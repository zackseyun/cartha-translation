translation:
  text: If trouble overtakes you, he will turn against you and hide himself from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''If you are brought low,'' instead of Hebrew ''If trouble overtakes
      you.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  chosen: If
  lexicon: HALOT
  rationale: Standard conditional particle introducing the circumstance under which
    the supposed friend proves false.
- source_word: תַּשִּׂיגְךָ
  chosen: overtakes you
  alternatives:
  - comes upon you
  - reaches you
  - befalls you
  lexicon: HALOT
  rationale: From נשׂג/השיג, 'to reach, overtake.' 'Overtakes you' preserves the vivid
    sense of trouble catching up with a person better than the flatter 'befalls you.'
- source_word: רָעָה
  chosen: trouble
  alternatives:
  - evil
  - calamity
  - misfortune
  lexicon: HALOT
  rationale: In this context the noun refers to adversity or misfortune rather than
    moral evil. 'Trouble' is natural modern English and fits the warning about unreliable
    companionship.
- source_word: יֵהָפֵךְ בְּךָ
  chosen: he will turn against you
  alternatives:
  - he will turn on you
  - he will change toward you
  lexicon: HALOT
  rationale: The idiom with הפך plus ב conveys reversal in relation to the person;
    in context of a false friend, the sense is hostile reversal. 'Turn against you'
    makes that relational hostility explicit without overparaphrasing.
- source_word: וּמִפָּנֶיךָ
  chosen: from your presence
  alternatives:
  - from before you
  - from your face
  lexicon: HALOT
  rationale: Literally 'from your face/before you.' 'From your presence' is idiomatic
    English that preserves the personal, relational sense.
- source_word: יִסָּתֵר
  chosen: hide himself
  alternatives:
  - be hidden
  - withdraw
  lexicon: HALOT
  rationale: 'The reflexive/passive form here in context is best rendered actively
    in English: the false friend deliberately conceals himself or avoids the person
    in distress. ''Hide himself'' captures the social evasion.'
- source_word: 'Greek parallel: ἐὰν ταπεινωθῇς'
  chosen: If trouble overtakes you
  alternatives:
  - If you are brought low
  - If you are humbled
  lexicon: BDAG
  rationale: The Greek parallel differs from the Hebrew, reading 'if you are humbled/brought
    low.' Because the Hebrew is the primary witness where extant, the main text follows
    Hebrew; the Greek confirms the adversity setting and is preserved as an alternative
    in a footnote due to the source-level mismatch.
