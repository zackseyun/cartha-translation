translation:
  text: See who has understanding, and seek him out; and let your foot wear out his
    threshold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Desire to hear every divine discourse, and do not let
      proverbs of understanding escape you.'' The Hebrew and Greek witnesses differ
      substantially here, though both urge eager pursuit of wisdom.'
    reason: alternative_reading
  - marker: b
    text: Literally, 'let your foot wear out his threshold'—an image of frequenting
      the house of a wise person to learn from him.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Observe
  lexicon: HALOT
  rationale: Imperative of ראה used here as a call to discern or identify. 'See' is
    concise and preserves the direct imperative force.
- source_word: מִי יָבִין
  chosen: who has understanding
  alternatives:
  - who understands
  - who is discerning
  lexicon: HALOT
  rationale: The phrase points to a person characterized by discernment. 'Who has
    understanding' preserves the Hebrew sense while sounding natural in English; the
    Greek parallel's συνέσεως supports the semantic field of understanding/discernment.
- source_word: וְשַׁחֲרֵהוּ
  chosen: and seek him out
  alternatives:
  - and seek him diligently
  - and pursue him early
  lexicon: HALOT
  rationale: From שחר in the sense of seeking earnestly/diligently. 'Seek him out'
    captures active pursuit in idiomatic English without over-literalizing the possible
    'seek early' nuance. The Greek parallel about eagerly hearing divine discourse
    supports an intentional, diligent-seeking sense.
- source_word: וְתִשְׁחוֹק
  chosen: and let ... wear out
  alternatives:
  - and rub out
  - and wear down
  lexicon: HALOT
  rationale: The Hebrew is difficult, but in context with 'your foot' and 'his threshold'
    it conveys repeated coming and going to a wise person's house. 'Let your foot
    wear out' expresses the idiom naturally and preserves the image of persistence.
- source_word: בְּסִפּוֹ
  chosen: his threshold
  alternatives:
  - his doorstep
  - his door-sill
  lexicon: HALOT
  rationale: סַף commonly means threshold/sill. 'Threshold' is slightly more formal
    and fits wisdom-style imagery well.
- source_word: רַגְלְךָ
  chosen: your foot
  alternatives:
  - your feet
  lexicon: HALOT
  rationale: Singular in Hebrew; retained as singular in English for formal closeness,
    while still idiomatic in the expression.
