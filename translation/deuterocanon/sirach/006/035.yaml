theological_decisions:
- issue: Use of Hebrew witness despite mismatch with Greek parallel
  chosen_reading: Translate the extant Hebrew as the primary text, while allowing
    the Greek parallel to confirm the wisdom context rather than replace the Hebrew
    imagery.
  alternative_readings:
  - A Greek-based rendering such as 'Desire to hear every godly discourse, and do
    not let proverbs of understanding escape you'
  rationale: Project policy gives primacy to the Hebrew where Sirach survives in Hebrew.
    Here the source is marked 'major_mismatch,' so the Greek must be taken seriously
    as a parallel input. The two witnesses differ substantially in wording, but both
    concern pursuit of wisdom. The Hebrew yields a coherent admonition about seeking
    a discerning teacher persistently; the Greek preserves a related but different
    exhortation. Because the Hebrew is extant and intelligible, it remains the main
    text, with the Greek preserved in a footnote as an alternative reading.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input and preserve uncertainty honestly.'
