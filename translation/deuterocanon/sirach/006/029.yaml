translation:
  text: Its net will become for you a strong refuge, and its cords garments of fine
    gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''its fetters will be for you a shelter of strength, and
      its branches a robe of glory.'' This differs notably from the extant Hebrew,
      which reads ''its net ... its cords ... garments of fine gold.'''
    reason: alternative_reading
  - marker: b
    text: The Hebrew imagery presents what first seems restrictive as ultimately protective
      and honorable.
    reason: cross_reference
lexical_decisions:
- source_word: רִשְׁתָּהּ
  chosen: its net
  alternatives:
  - its mesh
  - its snare
  lexicon: HALOT
  rationale: The Hebrew noun from רשת denotes a net or mesh. 'Net' is the most natural
    English equivalent here and fits the parallel image of cords. The Greek πέδαι
    ('fetters') reflects a different or interpretive tradition, but the Hebrew witness
    is primary here.
- source_word: מְכוֹן עֹז
  chosen: a strong refuge
  alternatives:
  - a secure stronghold
  - a foundation of strength
  - a shelter of strength
  lexicon: HALOT
  rationale: מכון can denote a fixed place, base, or established dwelling/place; with
    עז it yields the sense of a secure place characterized by strength. 'Strong refuge'
    captures the protective metaphor in readable English. A more literal 'foundation
    of strength' is possible but less idiomatic in context.
- source_word: חַבְלֹתֶיהָ
  chosen: its cords
  alternatives:
  - its ropes
  - its bands
  lexicon: HALOT
  rationale: חבל commonly means cord, rope, or band. 'Cords' preserves the textile/net
    imagery and pairs well with 'net' in the first colon.
- source_word: בִּגְדֵי כָתֶם
  chosen: garments of fine gold
  alternatives:
  - robes of gold
  - splendid garments
  - garments of pure gold
  lexicon: HALOT
  rationale: בגדי means garments/clothes, and כתם refers to fine or choice gold. The
    Greek has στολὴν δόξης ('robe of glory'), likely an interpretive rendering. Because
    the Hebrew is extant, 'garments of fine gold' stays closer to the source while
    preserving the elevated metaphor.
- source_word: וְהָיְתָה לְךָ
  chosen: will become for you
  alternatives:
  - will be for you
  - shall become yours as
  lexicon: HALOT
  rationale: The clause marks what wisdom's discipline will turn into for the learner.
    'Will become for you' conveys the future/resultative sense naturally in English.
