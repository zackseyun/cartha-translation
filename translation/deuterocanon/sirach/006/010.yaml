translation:
  text: There is a friend who is a table-companion, but he will not be found in a
    day of trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a friend of table'; the Greek parallel reads 'a sharer
      of tables,' clarifying the sense of one who joins you at meals but proves unreliable
      in hardship.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'will not be found,' while the Greek parallel has 'will
      not remain.' Both convey that such a friend disappears when trouble comes.
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹהֵב
  chosen: friend
  alternatives:
  - one who loves
  - lover
  lexicon: HALOT
  rationale: Although the participle literally means 'loving' or 'one who loves,'
    in this context with חָבֵר it describes a person presenting as a friend. Rendering
    the clause with 'friend' gives natural English while preserving the relational
    sense.
- source_word: חָבֵר
  chosen: friend
  alternatives:
  - companion
  - associate
  lexicon: HALOT
  rationale: חָבֵר denotes a companion or associate. 'Friend' fits the wisdom context
    and aligns with the Greek φίλος, while still allowing the verse's warning about
    superficial friendship.
- source_word: שֻׁלְחָן
  chosen: table-companion
  alternatives:
  - companion of the table
  - table friend
  - messmate
  lexicon: HALOT
  rationale: The Hebrew phrase is compressed and the Greek explicitly reads κοινωνὸς
    τραπεζῶν, 'sharer/partner of tables.' 'Table-companion' preserves the meal-fellowship
    image without over-paraphrasing into 'fair-weather friend.'
- source_word: וְלֹא יִמָּצֵא
  chosen: he will not be found
  alternatives:
  - he will not be there
  - he will not remain
  lexicon: HALOT
  rationale: The Hebrew verb מצא in the nifal naturally yields 'be found.' This is
    supported by the Hebrew witness. The Greek has παραμείνῃ ('remain'), which points
    to the same practical sense of absence in adversity, but the Hebrew is primary
    here, so the main text keeps 'be found.'
- source_word: בְּיוֹם רָעָה
  chosen: in a day of trouble
  alternatives:
  - in the day of evil
  - in time of distress
  - on a bad day
  lexicon: HALOT
  rationale: רָעָה here refers to adversity or calamity rather than moral evil. 'A
    day of trouble' is idiomatic English and matches the wisdom-literature sense,
    with the Greek θλίψεως ('affliction/distress') confirming this nuance.
