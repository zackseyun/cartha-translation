translation:
  text: If you desire it, my son, you will become wise; and if you set your heart
    on it, you will become shrewd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''If you are willing, child, you will be instructed; and if you
      give your soul, you will be resourceful/shrewd.'' The Hebrew and Greek agree
      in overall sense, but the Greek foregrounds instruction where the Hebrew says
      ''become wise.'''
    reason: alternative_reading
  - marker: b
    text: Hebrew 'set your heart' is an idiom for intentional attention and commitment.
    reason: cultural_note
lexical_decisions:
- source_word: אִם תַּחְפּוֹץ
  chosen: If you desire it
  alternatives:
  - If you are willing
  - If you wish
  lexicon: HALOT
  rationale: The Hebrew root חפץ commonly conveys desire, delight, or willing intent.
    'Desire' best preserves the volitional sense here. The Greek parallel ἐὰν θέλῃς
    likewise supports a conditional of willing/desire. 'It' is supplied in English
    to make the clause idiomatic, with the object understood from the pursuit of wisdom
    in context.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular and vocative. Per the project's
    gender-accurate policy, 'my son' is preferred over the more neutral 'my child.'
    The Greek τέκνον is broader, but the Hebrew witness is primary here.
- source_word: תִּתְחַכָּם
  chosen: you will become wise
  alternatives:
  - you will gain wisdom
  - you will be made wise
  lexicon: HALOT
  rationale: The hitpael/imperfect form from חכם here is best rendered as entering
    into a state, 'become wise.' This keeps the reflexive/developing nuance without
    overcomplicating the English. The Greek παιδευθήσῃ points toward being instructed/educated,
    but the Hebrew specifically emphasizes becoming wise, so the main text follows
    the Hebrew while the Greek nuance is preserved in a footnote.
- source_word: וְאִם תָּשִׂים לִבְּךָ
  chosen: and if you set your heart on it
  alternatives:
  - and if you apply your mind
  - and if you give your heart
  lexicon: HALOT
  rationale: The idiom 'set your heart' is a natural English equivalent for Hebrew
    שים לב, conveying deliberate inward attention and commitment. The Greek has 'give
    your soul,' which is semantically close but less idiomatic in English for this
    context. 'On it' is supplied to clarify the implied object.
- source_word: תַּעֲרֹם
  chosen: you will become shrewd
  alternatives:
  - you will become prudent
  - you will become discerning
  lexicon: HALOT
  rationale: From ערם in a positive wisdom context, the sense is prudence or shrewdness
    rather than craftiness in a negative sense. 'Shrewd' preserves the sharper edge
    of practical intelligence and aligns well with the Greek πανοῦργος, which can
    denote cleverness or resourcefulness, though in some contexts negatively.
