theological_decisions:
- issue: Metaphorical portrayal of Wisdom's discipline as both restraint and beauty
  chosen_reading: Preserve both the 'yoke/bonds' imagery and the beautifying language
    in the same verse
  alternative_readings:
  - Flatten the imagery into purely decorative language ('her ornament... her necklace')
  - Flatten the imagery into purely burdensome language ('her yoke... her fetters')
  rationale: 'The Hebrew and Greek together show intentional tension: what binds the
    disciple to Wisdom is not merely restrictive but precious and beautiful. The translation
    keeps that tension rather than resolving it in one direction.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
