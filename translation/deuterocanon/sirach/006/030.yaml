translation:
  text: Its yoke is a golden ornament, and its bonds are a cord of blue thread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew preserves 'yoke' imagery here, while the Greek parallel emphasizes
      adornment ('an ornament of gold upon her'). The translation keeps both senses
      by rendering the first phrase as a yoke that is also a golden ornament.
    reason: alternative_reading
  - marker: b
    text: Or 'a cord of violet-blue' or 'a hyacinth-blue cord.' The color term refers
      to a valued blue-purple dyed thread.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֻלֵּי / עֻלָּהּ
  chosen: yoke
  alternatives:
  - ornament
  - necklace
  lexicon: HALOT
  rationale: The Hebrew presents a wordplay between a form of עֹל ('yoke') and the
    following predicate. In context, personified Wisdom is being described with imagery
    that deliberately blends burden and adornment. The Greek parallel has κόσμος ...
    ἐπ᾽ αὐτῆς ('an ornament upon her'), but the Hebrew explicitly preserves the yoke
    imagery found in the surrounding context. 'Yoke' is therefore retained in the
    main text, while the predicate 'golden ornament' reflects the beautifying nuance
    confirmed by the Greek.
- source_word: זָהָב
  chosen: golden
  alternatives:
  - of gold
  lexicon: HALOT
  rationale: Adjectival 'golden' is natural English and preserves the material image
    without unnecessary stiffness.
- source_word: מוֹסְרוֹתֶיהָ
  chosen: bonds
  alternatives:
  - fetters
  - bands
  lexicon: HALOT
  rationale: The term denotes restraints or bindings. 'Bonds' is both readable and
    suitably literal, matching the metaphor of disciplined attachment to Wisdom.
- source_word: פְּתִיל
  chosen: cord
  alternatives:
  - thread
  - string
  lexicon: HALOT
  rationale: The word denotes a cord or twisted thread. 'Cord' fits the metaphorical
    strength of the image better than the thinner-sounding 'thread,' while the color
    term is preserved explicitly.
- source_word: תְּכֵלֶת
  chosen: blue thread
  alternatives:
  - violet
  - purple-blue
  - hyacinth-blue
  lexicon: HALOT
  rationale: The Hebrew denotes the distinctive blue-purple dyed material known from
    tabernacle and priestly contexts. Because modern readers may not recognize the
    technical term, the main text renders the color concretely as 'blue thread.' The
    Greek ὑάκινθινον supports a blue-violet sense.
