  parallel_sources:
  - edition: lxx-swete-1909
    text: διανοοῦ ἐν τοῖς προσταγμάσιν Κυρίου, καὶ ἐν ταῖς ἐντολαῖς αὐτοῦ μελέτα διὰ
      παντός· αὐτὸς στηριεῖ τὴν καρδίαν σου, καὶ ἡ ἐπιθυμία τῆς σοφίας σου δοθήσεταί
