translation:
  text: There is no price for a faithful friend, and there is no weighing his goodness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''a faithful friend''; the Hebrew wording is more literally ''a
      lover of faithfulness,'' but in context it likely refers to a friend marked
      by faithfulness.'
    reason: alternative_reading
  - marker: b
    text: 'Greek: ''there is no measure of his beauty'' (or ''nobility'').'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאוֹהֵב אֱמוּנָה
  chosen: for a faithful friend
  alternatives:
  - for one who loves faithfulness
  - for a trustworthy friend
  lexicon: HALOT
  rationale: 'The Hebrew as transmitted is difficult: literally ''for a lover of faithfulness.''
    The Greek parallel has φίλου πιστοῦ, ''a faithful friend,'' which likely reflects
    the intended sense and clarifies the Hebrew expression. Rendering ''faithful friend''
    best fits the immediate context of Sirach 6:14–16, which praises reliable friendship,
    while remaining anchored in the Hebrew witness.'
- source_word: אֵין מְחִיר
  chosen: there is no price
  alternatives:
  - there is no equivalent
  - there is no exchange value
  lexicon: HALOT
  rationale: מְחִיר commonly denotes price or value. 'There is no price' communicates
    in natural English that such a friend is beyond valuation. The Greek ἀντάλλαγμα
    ('exchange, equivalent') supports the broader idea of incomparable worth, but
    the Hebrew witness justifies 'price' in the main text.
- source_word: מִשְׁקָל
  chosen: weighing
  alternatives:
  - measure
  - scale
  - weight
  lexicon: HALOT
  rationale: The noun relates to weighing or a scale. The Greek σταθμός likewise points
    to weighing/measure. 'There is no weighing' preserves the metaphor that his worth
    cannot be measured out.
- source_word: לְטוֹבָתוֹ
  chosen: his goodness
  alternatives:
  - his worth
  - his benefit
  - his excellence
  lexicon: HALOT
  rationale: The Hebrew points to goodness/benefit, while the Greek reads τῆς καλλονῆς
    αὐτοῦ, 'his beauty' or 'nobility.' Because the project gives primacy to the surviving
    Hebrew for Sirach where available, the main text follows the Hebrew with 'goodness.'
    The Greek suggests an alternative nuance of attractiveness or excellence, worth
    preserving in a footnote.
