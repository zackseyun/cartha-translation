translation:
  text: A faithful friend is a strong refuge, and whoever finds one has found a treasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Hebrew here is difficult and differs notably from the Greek
      witness. More literally from the Hebrew as transmitted: ''A lover of faithfulness
      [is/ loves] strength, and whoever finds it has found wealth.'' The main text
      follows the clearer sense of the Greek parallel: ''A faithful friend is a strong
      shelter.'''
    reason: textual_variant
lexical_decisions:
- source_word: אוֹהֵב אֱמוּנָה
  chosen: a faithful friend
  alternatives:
  - one who loves faithfulness
  - a friend of faithfulness
  lexicon: HALOT
  rationale: The Hebrew as transmitted in Kahana is difficult and appears mismatched
    against the Greek parallel φίλος πιστός ('faithful friend'). Given the source
    validation flag 'major_mismatch' and the close semantic alignment of the Greek
    with the verse's second colon, the translation follows the sense attested by the
    Greek while remaining compatible with the likely Hebrew intent.
- source_word: תְּקוֹף
  chosen: strong shelter
  alternatives:
  - strong protection
  - firm refuge
  - strength
  lexicon: HALOT
  rationale: The Greek σκέπη κραταιά clearly supports the sense of protective cover
    or shelter qualified by strength. 'Shelter' is natural English and preserves the
    metaphor better than a more abstract 'protection.' 'Strong' reflects the force
    of κραταιά and likely the Hebrew noun's sense in context.
- source_word: וּמוֹצְאוֹ
  chosen: and whoever finds one
  alternatives:
  - and the one who finds him
  - and he who finds it
  lexicon: HALOT
  rationale: The Hebrew suffix is formally singular, but English idiom prefers an
    indefinite personal construction here. 'One' avoids awkward gendering while still
    referring back to 'friend.' The Greek αὐτόν is masculine ('him'), but English
    'one' is smoother and contextually clear.
- source_word: הוֹן
  chosen: a treasure
  alternatives:
  - wealth
  - riches
  lexicon: HALOT
  rationale: Hebrew הוֹן can mean wealth or riches, while the Greek parallel has θησαυρόν,
    'treasure.' 'Treasure' best captures both the concrete metaphor and the evaluative
    force of the saying.
