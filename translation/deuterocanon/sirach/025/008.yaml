translation:
  text: Happy is the man who has not stumbled with his tongue, and has not served
    one more contemptible than himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek reads instead: ''a man rejoicing in his children, living and seeing
      the downfall of enemies.'' The Hebrew witness here differs substantially from
      the Greek.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Happy is
  alternatives:
  - Blessed is
  lexicon: HALOT
  rationale: The Hebrew beatitude formula marks a fortunate or enviable state. 'Happy
    is' is natural modern English and fits wisdom-style commendation, while 'Blessed
    is' was considered but can sound more overtly theological than the context requires.
- source_word: נִכְשַׁל
  chosen: has not stumbled
  alternatives:
  - has not sinned
  - has not failed
  lexicon: HALOT
  rationale: The verb literally denotes stumbling. In the idiom 'with his tongue'
    it refers to verbal misstep or offense. 'Has not stumbled' preserves the metaphor
    and allows the tongue-related nuance to remain visible rather than over-interpreting
    it as generic sin.
- source_word: בִּלְשׁוֹנוֹ
  chosen: with his tongue
  alternatives:
  - by his tongue
  - in his speech
  lexicon: HALOT
  rationale: A fairly literal rendering best preserves the Hebrew idiom and its moral
    focus on speech. 'In his speech' is smoother but less concrete.
- source_word: עֹבֵד
  chosen: has not served
  alternatives:
  - has not been a slave to
  - has not worked for
  lexicon: HALOT
  rationale: The participial/verbal sense here is best rendered broadly as 'served.'
    The context is social subordination to an unworthy superior. 'Been a slave to'
    would over-specify bonded status, and 'worked for' is too modern and narrow.
- source_word: נִקְלֶה
  chosen: more contemptible
  alternatives:
  - more base
  - more vile
  - beneath him
  lexicon: HALOT
  rationale: The adjective denotes someone lightly esteemed, dishonorable, or contemptible.
    'More contemptible' captures the comparative sense implied by the phrase 'than
    himself' and aligns with the social-honor register of wisdom literature.
- source_word: מִמֶּנּוּ
  chosen: than himself
  alternatives:
  - than he
  - than him
  lexicon: HALOT
  rationale: This comparative phrase is most idiomatically rendered 'than himself'
    in English after 'more contemptible,' preserving the reflexive comparison present
    in the Hebrew.
- source_word: ἄνθρωπος
  chosen: the man
  alternatives:
  - a man
  - the person
  lexicon: BDAG
  rationale: The Greek parallel begins with 'man,' and the Hebrew beatitude is singular
    masculine. Per project philosophy, gender-accurate language is preferred where
    the source is masculine and representative. 'The man' gives a proverbial, wisdom-style
    force.
