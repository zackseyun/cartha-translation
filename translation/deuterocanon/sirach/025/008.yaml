- issue: Use of Hebrew versus Greek parallel in a verse marked major_mismatch
  chosen_reading: Main text follows the extant Hebrew witness as the most-original
    Zone 1 source, while the Greek parallel is treated as a materially different reading
    and preserved in a footnote.
  alternative_readings:
  - 'Greek: ''A man rejoicing in his children, living and seeing the downfall of enemies'''
  rationale: The Hebrew and Greek witnesses diverge substantially. Project policy
    gives primacy to the Hebrew for Sirach where it survives, but the Greek must still
    be used as translation input and its major divergence should be exposed rather
    than ignored. The resulting English therefore translates the Hebrew main line
    and documents the Greek as an alternative reading.
