theological_decisions:
- issue: Interpretation of the elliptical comparative proverb
  chosen_reading: 'The verse is rendered as an implied preference: one could bear
    any wound or any vengeance rather than the especially painful wound of haters
    or vengeance of enemies.'
  alternative_readings:
  - 'Take the line as an exclamation: ''There is no wound like the wound of one who
    hates, and no vengeance like the vengeance of enemies.'''
  - Render ἐπαγωγή as a broader 'affliction' rather than 'wound.'
  rationale: The Greek is verbless and elliptical, a common proverbial style. The
    repeated 'πᾶσαν ... καὶ μὴ ...' naturally yields a comparative sense ('any X,
    but not Y'). English preserves this terseness without adding a full explanatory
    clause. Because the exact nuance of ἐπαγωγή is debated, the main text keeps a
    concise concrete term and preserves the broader option in a footnote.
  doctrine_reference: 'Translation philosophy: preserve ambiguity where genuine; document
    significant lexical decisions.'
