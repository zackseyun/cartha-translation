translation:
  text: Any wound, but not the wound of those who hate; and any vengeance, but not
    the vengeance of enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Any affliction, but not the affliction of those who hate.' The Greek
      noun rendered 'wound' can be understood more broadly as harm or affliction.
    reason: lexical_alternative
  - marker: b
    text: The Greek is an elliptical proverb, literally 'any wound ... and not the
      wound of those who hate; and any vengeance ... and not the vengeance of enemies,'
      expressing that such hostility is worse than other injuries.
    reason: cultural_note
lexical_decisions:
- source_word: πᾶσαν
  chosen: any
  alternatives:
  - every
  - all
  lexicon: LSJ
  rationale: 'Used distributively with the implied comparison: the saying prefers
    enduring any instance of one thing rather than a particular especially grievous
    kind. ''Any'' sounds more idiomatic in English proverbial style than repeating
    ''every.'''
- source_word: ἐπαγωγήν
  chosen: wound
  alternatives:
  - affliction
  - attack
  - calamity
  - plague
  lexicon: LSJ
  rationale: The noun is difficult and can denote something brought upon someone,
    including attack or affliction. In this antithetical proverb, pairing it with
    'vengeance' and then specifying 'of those who hate' favors a concrete harmful
    blow or injury. 'Wound' captures the terse, proverbial force while leaving room
    for both physical and figurative hurt.
- source_word: μισούντων
  chosen: those who hate
  alternatives:
  - haters
  - the hateful
  lexicon: LSJ
  rationale: A substantival participle. 'Those who hate' is more natural and transparent
    than the compressed 'haters,' and it preserves the active sense of hostility.
- source_word: ἐκδίκησιν
  chosen: vengeance
  alternatives:
  - revenge
  - punishment
  - avenging
  lexicon: LSJ
  rationale: The term denotes retaliatory retribution. 'Vengeance' best matches the
    gravity and proverbial parallelism here; 'revenge' can sound more colloquial and
    personal.
- source_word: ἐχθρῶν
  chosen: enemies
  alternatives:
  - foes
  lexicon: LSJ
  rationale: Standard rendering for the genitive plural. 'Enemies' is clear modern
    English and preserves the relational hostility of the source.
