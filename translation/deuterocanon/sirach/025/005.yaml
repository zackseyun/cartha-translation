theological_decisions:
- issue: Unexpressed antecedent of the plural object 'them'
  chosen_reading: Retain the Hebrew's unspecified plural as 'them' without supplying
    'wisdom' or 'such things' in the main text.
  alternative_readings:
  - If you did not seek wisdom in your youth, how will you attain it in your old age?
  - If you did not desire these things in your youth, how will you obtain them in
    old age?
  rationale: The Hebrew verse leaves the object implicit except for the plural suffix,
    and the Greek parallel helps situate the saying within wisdom and counsel. To
    avoid importing a more specific doctrinal or interpretive object than the text
    states, the main text preserves the ambiguity with 'them.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
