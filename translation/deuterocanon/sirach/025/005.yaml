translation:
  text: If you did not seek them in your youth, how will you attain them in your old
    age?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew has an unspecified plural object, 'them.' In context, the Greek
      parallel speaks of judgment and understanding counsel, so the reference is likely
      to wisdom-related qualities or attainments.
    reason: lexical_alternative
  - marker: b
    text: Hebrew חפץ more literally means 'desire' or 'take pleasure in'; the rendering
      'seek' brings out the active sense implied by the rhetorical question and the
      Greek parallel.
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause; 'If' best reflects the straightforward
    protasis.
- source_word: בִּנְעֻרוֹתֶיךָ
  chosen: in your youth
  alternatives:
  - in your younger years
  - in your youthfulness
  lexicon: HALOT
  rationale: The plural form with 2ms suffix denotes the period of youth. English
    idiom prefers the singular collective 'in your youth.'
- source_word: לֹא חֲפַצְתָּם
  chosen: you did not seek them
  alternatives:
  - you did not desire them
  - you took no pleasure in them
  lexicon: HALOT
  rationale: The Hebrew חפץ commonly means 'delight in, desire,' but in this wisdom
    context the Greek parallel (ἐπίγνωναι βουλήν in the preceding colon of the Greek
    verse pair) supports an active pursuit of wisdom-related goods. 'Seek' brings
    out the practical sense implied by the rhetorical question, while preserving the
    plural object 'them.'
- source_word: אֵיךְ
  chosen: how will
  alternatives:
  - how can
  - how could
  lexicon: HALOT
  rationale: Introduces a rhetorical question about possibility/future attainment.
    'How will' keeps the future orientation of the following verb.
- source_word: תַּשִּׁיגֵם
  chosen: you attain them
  alternatives:
  - you reach them
  - you obtain them
  lexicon: HALOT
  rationale: השיג conveys reaching or obtaining. 'Attain' fits wisdom literature well
    and pairs naturally with the implied abstract objects.
- source_word: בְּזִקְנוֹתֶיךָ
  chosen: in your old age
  alternatives:
  - in your old years
  - in your old age-time
  lexicon: HALOT
  rationale: The plural abstract noun with suffix refers to the period of old age.
    'In your old age' is idiomatic and contrasts clearly with 'in your youth.'
