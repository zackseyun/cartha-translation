theological_decisions:
- issue: Rendering Κυρίου
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The project's default for κύριος is 'Lord.' In Sirach's Greek, Κυρίου
    here refers to God, but the source text is Greek rather than a direct Hebrew divine-name
    witness in this verse, so 'the Lord' best matches the stated default while preserving
    reverence.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering ἀνθρώπων
  chosen_reading: men
  alternative_readings:
  - people
  - humanity
  rationale: The Greek uses the ordinary plural for human beings. 'Men' preserves
    the source's conventional anthropological wording and matches the project's gender-accurate
    policy, while the context clearly includes humanity generally rather than males
    only.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
