translation:
  text: 'In three things I was made beautiful, and I stood beautiful before the Lord
    and men:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was made beautiful' for 'I became beautiful'; the Greek passive can
      be heard either as a resulting state or as an action done to the speaker.
    reason: lexical_alternative
  - marker: b
    text: Or 'I arose beautiful' / 'I stood beautiful'; the Greek keeps a concrete
      image of rising or standing forth, not merely an abstract 'appeared.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν τρισὶν
  chosen: In three things
  alternatives:
  - By three things
  - Among three things
  lexicon: LSJ
  rationale: The preposition ἐν with the dative here introduces the sphere or respect
    in which the speaker is adorned. 'In three things' is a natural English rendering
    that preserves the enumerative setup for the following verses.
- source_word: ὡραιώθην
  chosen: I became beautiful
  alternatives:
  - I was made beautiful
  - I was adorned
  - I was honored
  lexicon: LSJ
  rationale: The aorist passive of ὡραιόω most directly means 'to be made beautiful'
    or 'to become beautiful/adorned.' 'I became beautiful' preserves the passive/resultative
    sense while sounding natural in English. 'Honored' is too interpretive and weakens
    the aesthetic language carried by the Greek.
- source_word: ἀνέστην
  chosen: I stood up
  alternatives:
  - I arose
  - I stood
  lexicon: LSJ
  rationale: The aorist of ἀνίστημι literally means 'I arose' or 'I stood up.' Because
    the verse pairs this with ὡραία, the sense is of appearing or standing forth in
    beauty. 'I stood up' keeps the concrete verbal image without over-paraphrasing
    to 'appeared.'
- source_word: ὡραία
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  - graceful
  lexicon: LSJ
  rationale: This adjective repeats the beauty motif from ὡραιώθην. 'Beautiful' is
    the most direct and readable modern equivalent; 'fair' is archaic and 'graceful'
    narrows the sense.
- source_word: ἔναντι Κυρίου καὶ ἀνθρώπων
  chosen: before the Lord and men
  alternatives:
  - in the sight of the Lord and men
  - before the Lord and people
  lexicon: LSJ
  rationale: ἔναντι means 'before' or 'in the presence/sight of.' 'Before the Lord
    and men' is concise and faithful. 'Men' is retained rather than 'people' because
    ἀνθρώπων here is the generic human term, and the project's philosophy prefers
    gender-accurate rendering where the source uses the conventional human term; in
    this collocation it means human beings generally, not specifically males.
