translation:
  text: If you did not gather in your youth, how then would you find anything in your
    old age?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek verb here is textually difficult in this witness; the translation
      follows the probable sense, 'gather' or 'collect.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐν νεότητι
  chosen: in your youth
  alternatives:
  - while young
  - in youth
  lexicon: LSJ
  rationale: Temporal phrase marking the season of life; 'in your youth' is natural
    English and preserves the concrete life-stage reference.
- source_word: οὐ συναγίοχας
  chosen: you did not gather
  alternatives:
  - you did not collect
  - you did not store up
  lexicon: LSJ
  rationale: The transmitted Greek form is unusual/possibly corrupt, but its sense
    is commonly understood from the συνάγω family as gathering or collecting. 'Gather'
    keeps the agricultural/proverbial force without over-specifying what is gathered.
- source_word: πῶς ἂν εὕροις
  chosen: how then would you find
  alternatives:
  - how could you find
  - how would you obtain
  lexicon: LSJ
  rationale: Potential/conditional force is conveyed by 'would you find.' Adding 'then'
    reflects the inferential force in the rhetorical question.
- source_word: ἐν τῷ γήρᾳ σου
  chosen: in your old age
  alternatives:
  - when you are old
  - in your old years
  lexicon: LSJ
  rationale: γήρας denotes old age as a life stage. 'In your old age' mirrors the
    Greek structure and balances 'in your youth.'
