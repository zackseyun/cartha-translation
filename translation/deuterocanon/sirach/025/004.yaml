theological_decisions:
- issue: Nature of the saying's object left unstated
  chosen_reading: Leave the object of 'gather/find' implicit rather than supplying
    'wisdom,' 'wealth,' or 'provisions.'
  alternative_readings:
  - Supply 'wisdom' from the surrounding context
  - Supply 'provisions' from a proverbial/agricultural sense
  rationale: The Greek text does not state an object. Preserving the ellipsis keeps
    the proverb broad and avoids importing a narrower moral or material interpretation
    than the wording itself warrants.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Handling source-level uncertainty in the unusual verb form συναγίοχας
  chosen_reading: Translate the probable sense 'gather' while documenting the textual/lexical
    uncertainty in a footnote.
  alternative_readings:
  - collect
  - store up
  rationale: The source is marked with major mismatch and the verb form is not standard
    Greek. A cautious rendering should preserve the likely sense without pretending
    the wording is textually straightforward.
