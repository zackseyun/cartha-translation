translation:
  text: Any evil is small compared with the evil of a woman; may the lot of a sinner
    fall upon her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Any evil is slight beside a woman's evil.' The Hebrew and Greek both
      express a comparison; the wording can be turned in more than one natural English
      way.
    reason: lexical_alternative
  - marker: b
    text: The final clause may be heard as an imprecation ('may the lot of a sinner
      fall upon her') rather than a simple prediction ('the lot of a sinner will fall
      upon her'). The Greek parallel supports the wish-like sense.
    reason: alternative_reading
lexical_decisions:
- source_word: מְעַט
  chosen: small
  alternatives:
  - little
  - slight
  lexicon: HALOT
  rationale: 'The Hebrew adverb/adjectival use conveys comparative insignificance:
    ''little/small'' in relation to the following evil. ''Small'' reads naturally
    in English with the comparative construction and matches the Greek μικρά.'
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - misfortune
  - wickedness
  lexicon: HALOT
  rationale: The noun can denote moral evil or calamity. Here, with the comparison
    'compared with the evil of a woman,' the line is a wisdom maxim about grievous
    badness broadly conceived. 'Evil' preserves the source's starkness and allows
    both moral and harmful nuance, supported by Greek κακία.
- source_word: כְרָעַת
  chosen: compared with the evil of
  alternatives:
  - like the evil of
  - as the evil of
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison. In idiomatic English, ''compared with''
    best conveys the proverb''s sense: all other evil is minor in comparison to this
    one.'
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - wife
  - womanhood
  lexicon: HALOT
  rationale: The unqualified singular noun is best rendered 'a woman.' Although the
    sentiment is generic and misogynistic in form, the source is singular and not
    specifically 'wife' here. This follows the Hebrew and Greek γυναικός without softening.
- source_word: גוֹרַל
  chosen: lot
  alternatives:
  - portion
  - fate
  lexicon: HALOT
  rationale: The noun literally denotes a lot/portion assigned by lot, and by extension
    one's allotted fate. 'Lot' keeps the metaphor and matches Greek κλῆρος; 'fate'
    is interpretive.
- source_word: חוֹטֵא
  chosen: a sinner
  alternatives:
  - the sinner
  - one who sins
  lexicon: HALOT
  rationale: The participial noun denotes a sinful person generally. 'A sinner' is
    idiomatic and preserves the generic singular.
- source_word: יִפּוֹל עָלֶיהָ
  chosen: may ... fall upon her
  alternatives:
  - will fall upon her
  - let ... come upon her
  lexicon: HALOT
  rationale: 'The yiqtol here, echoed by the Greek optative ἐπιπέσοι, is well taken
    as jussive/wish: ''may it fall upon her.'' This preserves the imprecatory force
    better than a simple future.'
