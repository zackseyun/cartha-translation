theological_decisions:
- issue: Force of the final verb clause
  chosen_reading: 'Rendered as an imprecation/wish: ''may the lot of a sinner fall
    upon her'''
  alternative_readings:
  - 'Rendered as prediction: ''the lot of a sinner will fall upon her'''
  rationale: The Hebrew yiqtol can be read modally, and the Greek parallel uses an
    optative form, strongly supporting a wish/imprecation rather than mere prediction.
    This is not a doctrinally contested issue, but it materially affects tone and
    should be documented.
- issue: Gendered wording
  chosen_reading: Retained 'a woman'
  alternative_readings:
  - a wife
  - women
  rationale: Per translation philosophy, gender-accurate rendering is preferred over
    neutralization. The source uses singular 'woman' and should not be generalized
    to plural or narrowed to 'wife' without textual warrant, even though the statement
    is culturally harsh.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
