theological_decisions:
- issue: Whether to preserve the verse's broad attribution of sin and death to 'a
    woman' without softening the gendered wording
  chosen_reading: Retain 'From a woman came the beginning of sin, and because of her
    we all die.'
  alternative_readings:
  - From woman came the beginning of sin, and because of her we all die.
  - From a wife came the beginning of sin, and through her we all die.
  rationale: The Hebrew and Greek both explicitly use 'woman' in the singular, likely
    echoing Eve/traditional primeval transgression. Per translation philosophy, the
    gendered wording should not be neutralized or softened. At the same time, the
    translation should not import extra doctrinal explanation into the main text beyond
    what the verse states.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve
    theological tension rather than resolve it.'
