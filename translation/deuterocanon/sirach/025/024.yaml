translation:
  text: From a woman is the beginning of sin, and because of her we all die together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and because of her we all died/perished.' The Hebrew verb can be read
      as a completed action, while the Greek parallel reads 'we all die,' supporting
      the present, universal sense used in the main text.
    reason: lexical_alternative
  - marker: b
    text: The line likely alludes to the woman in the primeval fall narrative; the
      verse states this tersely and does not itself elaborate the theology.
    reason: cross_reference
lexical_decisions:
- source_word: מֵאִשָּׁה
  chosen: From a woman
  alternatives:
  - From woman
  - By a woman
  - From a wife
  lexicon: HALOT
  rationale: The Hebrew preposition מִן with אִשָּׁה is most naturally rendered 'from
    a woman.' The Greek parallel ἀπὸ γυναικός confirms source/origin language. 'Woman'
    is preferred over 'wife' because the verse speaks generically and allusively,
    not of a specific marital relation in the wording itself.
- source_word: תְחִלַת
  chosen: the beginning
  alternatives:
  - the start
  - the first cause
  - the origin
  lexicon: HALOT
  rationale: תְחִלָּה denotes beginning or commencement. 'The beginning' preserves
    the concise, proverbial force and aligns with the Greek ἀρχή.
- source_word: עָוֹן
  chosen: sin
  alternatives:
  - iniquity
  - guilt
  lexicon: HALOT
  rationale: Although עָוֹן can denote iniquity or guilt, the Greek parallel has ἁμαρτίας
    ('sin'), which supports the broader moral sense here. 'Sin' is the clearest and
    most idiomatic English in this context.
- source_word: וּבִגְלָלָהּ
  chosen: because of her
  alternatives:
  - on account of her
  - through her
  lexicon: HALOT
  rationale: בגלל marks causation. 'Because of her' is natural modern English and
    matches the causal force also reflected in the Greek δι' αὐτήν. 'Through her'
    is possible but can sound more instrumental than the Hebrew requires.
- source_word: גָוַעְנוּ
  chosen: we all die
  alternatives:
  - we perished
  - we expired
  - we have died
  lexicon: HALOT
  rationale: The Hebrew verb גוע often means to expire or die. The Greek parallel
    reads present ἀποθνήσκομεν ('we die'), while the Hebrew form could be read as
    a completed action ('we perished'/'we died'). Given the proverbial, universal
    statement and the support of the Greek πάντες ἀποθνήσκομεν, 'we all die' best
    conveys the sense in idiomatic English.
- source_word: יַחַד
  chosen: all
  alternatives:
  - together
  - altogether
  lexicon: HALOT
  rationale: יַחַד literally means 'together,' but in this line it functions adverbially
    to express collective universality. The Greek parallel has πάντες ('all'), which
    likely reflects the intended sense. Rendering it as 'all' produces natural English
    while preserving the collective force.
