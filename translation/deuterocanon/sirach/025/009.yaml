theological_decisions:
- issue: Gendered singular in wisdom beatitude
  chosen_reading: the man
  alternative_readings:
  - the one
  - the person
  rationale: The Greek uses masculine singular forms (ὁ ... ὃς). Per doctrine, gender-accurate
    rendering is preferred over flattening to gender-neutral language when the source
    is explicitly masculine and representative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: δουλεύω rendering
  chosen_reading: served
  alternative_readings:
  - been enslaved to
  - been a slave to
  rationale: The project defaults to 'servant/slave' context-dependently for δοῦλος-family
    terms. Here the verbal form refers to serving an unworthy person; the bonded nature
    is not clearly foregrounded, so 'served' is the better contextual rendering.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
