translation:
  text: Blessed is the man who lives with an intelligent wife, and who has not slipped
    with his tongue, and who has not served one unworthy of him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a prudent wife' or 'a sensible wife'; the Greek describes a wife marked
      by practical understanding.
    reason: lexical_alternative
  - marker: b
    text: Literally 'has not slipped with the tongue,' an idiom for not stumbling
      in speech.
    reason: lexical_alternative
  - marker: c
    text: Or 'has not been enslaved to one unworthy of him'; the Greek verb can carry
      the sense of servitude, but here 'served' is used as the less overdetermined
      English rendering.
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Standard beatitude-style rendering that preserves the wisdom-literature
    tone better than the more subjective 'happy' or the flatter 'fortunate'.
- source_word: συνοικῶν
  chosen: lives with
  alternatives:
  - dwells with
  - cohabits with
  lexicon: LSJ
  rationale: The participle denotes living together in a household, here in marital
    context. 'Lives with' is natural modern English without losing the domestic sense.
- source_word: γυναικὶ συνετῇ
  chosen: an intelligent wife
  alternatives:
  - a prudent wife
  - a sensible wife
  - a discerning wife
  lexicon: LSJ
  rationale: γυνή in this context is best taken as 'wife' rather than merely 'woman'
    because συνοικῶν implies household/marital cohabitation. συνετή carries the sense
    of practical intelligence or prudence; 'intelligent' is concise and natural, though
    'prudent' is a viable alternative.
- source_word: ἐν γλώσσῃ οὐκ ὠλίσθησεν
  chosen: has not slipped with his tongue
  alternatives:
  - has not stumbled in speech
  - has not sinned with his tongue
  lexicon: LSJ
  rationale: 'The idiom is metaphorical: to slip/stumble in speech. ''Slipped with
    his tongue'' preserves the bodily metaphor and avoids over-interpreting the exact
    nature of the verbal fault.'
- source_word: ἐδούλευσεν
  chosen: has not served
  alternatives:
  - has not been enslaved to
  - has not been a slave to
  lexicon: BDAG
  rationale: Although δουλεύω can denote slavery/service, the object here is a person
    ('one unworthy of him'). English 'served' best fits the social relation in wisdom
    context without forcing the stronger 'enslaved' where the bonded nature is not
    explicit.
- source_word: ἀναξίῳ αὐτοῦ
  chosen: one unworthy of him
  alternatives:
  - his inferior
  - one beneath him
  - one unworthy of him
  lexicon: LSJ
  rationale: The phrase is comparative and socially evaluative. 'One unworthy of him'
    is the most literal and least interpretively loaded. Renderings like 'inferior'
    may sound harsher or import rank language beyond the Greek.
