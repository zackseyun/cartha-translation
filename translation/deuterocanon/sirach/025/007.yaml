translation:
  text: The crown of the aged is much experience, and their boast is the fear of the
    Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great experience' or 'wide experience.' The Greek πολυπειρία emphasizes
      extensive experience acquired over time.
    reason: lexical_alternative
lexical_decisions:
- source_word: στέφανος
  chosen: crown
  alternatives:
  - wreath
  - garland
  lexicon: LSJ
  rationale: The noun denotes a crown or wreath as a mark of honor. 'Crown' best conveys
    metaphorical honor in clear modern English and fits wisdom-style imagery.
- source_word: γερόντων
  chosen: the aged
  alternatives:
  - old men
  - elders
  - the old
  lexicon: LSJ
  rationale: The genitive plural refers to old people/aged persons. 'The aged' preserves
    the age-based sense without importing the office-like nuance of 'elders.'
- source_word: πολυπειρία
  chosen: much experience
  alternatives:
  - great experience
  - wide experience
  - long experience
  lexicon: LSJ
  rationale: The compound denotes extensive experience gained over time. 'Much experience'
    is natural English and keeps the quantitative force of πολυ- without sounding
    overly formal.
- source_word: καύχημα
  chosen: boast
  alternatives:
  - glory
  - pride
  - ground of boasting
  lexicon: LSJ
  rationale: The term can mean boasting or that in which one boasts. 'Boast' is concise
    and preserves the active rhetorical force; 'glory' would sound elevated but less
    transparent.
- source_word: φόβος Κυρίου
  chosen: the fear of the Lord
  alternatives:
  - reverence for the Lord
  - fear of the LORD
  lexicon: LSJ
  rationale: This is standard wisdom language for reverent fear toward God. Following
    project defaults, κύριος is rendered 'Lord.' 'Fear' is retained rather than softened
    to 'reverence' so the theological tension of the idiom remains visible.
