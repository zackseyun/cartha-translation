translation:
  text: How beautiful is wisdom in the aged, and understanding and counsel in those
    who are honored.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How lovely is the wisdom of old men, and thought and counsel for the
      honored.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ὡραία
  chosen: How beautiful
  alternatives:
  - How lovely
  - How fitting
  lexicon: LSJ
  rationale: The exclamatory ὡς with ὡραία naturally yields an exclamation, not a
    comparison. 'Beautiful' preserves the aesthetic commendation without over-interpreting
    it as merely 'fitting.'
- source_word: γερόντων
  chosen: the aged
  alternatives:
  - old men
  - elders
  - the old
  lexicon: LSJ
  rationale: The genitive plural refers to elderly persons. 'The aged' is natural
    modern English and avoids narrowing the sense to office-bearing 'elders.' The
    Greek form is grammatically masculine, but in wisdom literature this commonly
    carries a representative sense; the rendering preserves age-reference without
    forcing male-only application.
- source_word: σοφία
  chosen: wisdom
  alternatives:
  - skill
  - wise judgment
  lexicon: LSJ
  rationale: In Sirach, σοφία is a central wisdom term and should remain consistently
    'wisdom' unless context strongly demands otherwise.
- source_word: δεδοξασμένοις
  chosen: those who are honored
  alternatives:
  - the honored
  - the esteemed
  - the glorified
  lexicon: LSJ
  rationale: The perfect participle denotes persons in a state of being honored or
    held in esteem. 'Those who are honored' is clear and idiomatic. 'Glorified' would
    sound overly theological here and misfit the wisdom context.
- source_word: διανόημα
  chosen: understanding
  alternatives:
  - thought
  - insight
  - intelligence
  lexicon: LSJ
  rationale: The noun denotes the product or faculty of thought. 'Understanding' fits
    the parallel with 'counsel' and reads naturally in English wisdom style. 'Thought'
    is too bare, while 'intelligence' sounds too modern and technical.
- source_word: βουλή
  chosen: counsel
  alternatives:
  - advice
  - deliberation
  - purpose
  lexicon: LSJ
  rationale: In this pairing, βουλή refers to prudent counsel or sound deliberation.
    'Counsel' preserves the elevated wisdom-register and the practical sense of wise
    advisement.
