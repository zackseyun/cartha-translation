theological_decisions:
- issue: Gender/reference of γερόντων
  chosen_reading: Rendered inclusively as 'the aged' rather than male-specific 'old
    men.'
  alternative_readings:
  - old men
  - elders
  rationale: Although the Greek is grammatically masculine, the saying functions as
    a general wisdom observation rather than a restriction to males or office-holders.
    This follows the project's gender-accurate principle by matching the representative
    force of the source rather than importing a narrower male-only sense.
