translation:
  text: 'For because of her there is reproach and shame: a wife who supports her husband.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a woman who provides for her husband.' The Hebrew מְכַלְכֶּלֶת and Greek
      ἐπιχορηγῇ both carry the sense of supplying or sustaining materially.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - for because
  lexicon: HALOT
  rationale: Introduces an explanatory ground linking this line to the preceding warning.
    English 'For' preserves the connective force without overloading the clause.
- source_word: בַעֲדָהּ
  chosen: because of her
  alternatives:
  - on her account
  - for her sake
  lexicon: HALOT
  rationale: The preposition with pronominal suffix most naturally indicates cause
    or occasion here. 'Because of her' fits the Hebrew and aligns with the Greek sense
    that the woman is the source of the ensuing disgrace.
- source_word: חֶרְפָּה
  chosen: reproach
  alternatives:
  - disgrace
  - taunt
  lexicon: HALOT
  rationale: '''Reproach'' preserves the social-honor dimension of public disgrace
    or insult. ''Disgrace'' is possible, but using ''reproach'' alongside ''shame''
    keeps the pair distinct.'
- source_word: וּבֹשֶׁת
  chosen: shame
  alternatives:
  - disgrace
  - humiliation
  lexicon: HALOT
  rationale: A straightforward rendering of the noun for shame. It pairs naturally
    with 'reproach' and reflects the Hebrew honor-shame register.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: Although the noun can mean either 'woman' or 'wife,' the following phrase
    'her husband' specifies the marital relationship, so 'wife' is the most precise
    English rendering.
- source_word: מְכַלְכֶּלֶת
  chosen: supports
  alternatives:
  - provides for
  - sustains
  - maintains
  lexicon: HALOT
  rationale: From כלכל, 'to sustain/provide for.' The Hebrew and Greek (ἐπιχορηγῇ)
    both indicate material support or maintenance. 'Supports' is concise and natural
    modern English. The context treats this as socially shameful within the ancient
    setting, but the translation should not intensify beyond the lexical sense.
- source_word: אֶת בַּעֲלָהּ
  chosen: her husband
  alternatives:
  - her master
  lexicon: HALOT
  rationale: In this context בעל clearly means 'husband,' not the broader sense 'owner/master.'
    The marital sense is demanded by the syntax and parallelism.
