theological_decisions:
- issue: Whether to make the ancient patriarchal value judgment explicit in the translation
  chosen_reading: Retain the text's statement of reproach and shame without adding
    interpretive qualifiers.
  alternative_readings:
  - Paraphrase to explain that this reflects ancient social assumptions
  - Soften the line to avoid endorsing the value judgment
  rationale: The verse presents the social shame directly; the translator should preserve
    the source's rhetoric rather than soften or editorialize. At the same time, the
    English wording should not add condemnation beyond the Hebrew/Greek lexical content.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering אִשָּׁה as 'wife' rather than generic 'woman'
  chosen_reading: wife
  alternative_readings:
  - woman
  rationale: The possessive phrase 'her husband' narrows the sense to a married woman.
    This is a lexical-contextual decision with interpretive significance for the social
    setting of the verse.
  doctrine_reference: Translation philosophy §4
