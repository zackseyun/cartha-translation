theological_decisions:
- issue: Ethical force of the command in a wisdom context
  chosen_reading: Retain the stark imperative of separation without softening it into
    a modern explanatory paraphrase.
  alternative_readings:
  - Interpret as divorce language and translate explicitly 'divorce her'
  - Interpret metaphorically and soften to 'separate yourself from her'
  rationale: The Greek uses vivid bodily language ('cut her away from your flesh')
    rather than a technical legal term for divorce. The translation should preserve
    the severity and metaphorical force of the source without importing a narrower
    legal category the text itself does not state.
  doctrine_reference: Translation philosophy §§1, 3, 6
