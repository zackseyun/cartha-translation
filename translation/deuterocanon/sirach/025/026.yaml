translation:
  text: If she does not go according to your hand, cut her off from your flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''according to your hand,'' an idiom for acting under your direction
      or control.'
    reason: lexical_alternative
  - marker: b
    text: The wording 'cut her away from your flesh' uses bodily imagery for decisive
      separation; it does not use an explicit technical term for divorce.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ μὴ
  chosen: If ... not
  alternatives:
  - unless
  lexicon: LSJ
  rationale: Introduces a conditional clause. 'If ... not' is the most straightforward
    English equivalent here; 'unless' is possible but can sound smoother than the
    Greek's blunt conditional framing.
- source_word: πορεύεται
  chosen: goes
  alternatives:
  - walks
  - conducts herself
  - proceeds
  lexicon: LSJ
  rationale: The verb literally means 'goes' or 'walks.' In this context it refers
    to acting or proceeding in line with the husband's direction. 'Goes' preserves
    the concrete verbal image without over-paraphrasing into 'conducts herself.'
- source_word: κατὰ χεῖρά σου
  chosen: as your hand directs
  alternatives:
  - according to your hand
  - under your control
  - at your hand
  lexicon: LSJ
  rationale: The idiom is not naturally rendered woodenly as 'according to your hand'
    in modern English. 'As your hand directs' preserves the metaphor of the hand while
    conveying the sense of acting in accordance with one's guidance or authority.
- source_word: ἀπὸ τῶν σαρκῶν σου
  chosen: from your flesh
  alternatives:
  - from your own body
  - from among your flesh
  lexicon: LSJ
  rationale: Although the Greek has a plural form ('fleshes'), English idiom strongly
    prefers singular 'flesh.' The phrase expresses intimate bodily/kinship union,
    likely marital closeness, so 'from your flesh' preserves that resonance better
    than the flatter 'from your body.'
- source_word: ἀπότεμε
  chosen: cut ... away
  alternatives:
  - cut off
  - sever
  - remove
  lexicon: LSJ
  rationale: An imperative of cutting off or severing. 'Cut ... away' communicates
    decisive separation while fitting the following 'from your flesh.' 'Cut off' is
    also possible, but 'away' reads more naturally with the prepositional phrase.
- source_word: αὐτήν
  chosen: her
  lexicon: LSJ
  rationale: The feminine pronoun refers to the woman/wife in the immediate context
    and should be rendered explicitly as 'her.'
