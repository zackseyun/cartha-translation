translation:
  text: Like a sandy ascent under the feet of an old man, so is a sharp-tongued wife
    to a gentle man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew חוּץ is difficult here; the Greek parallel reads ''sandy,'' which
      likely preserves the sense of the image: unstable footing for an elderly man.'
    reason: textual_variant
  - marker: b
    text: Or 'a talkative wife.' The Hebrew idiom literally says 'a wife of tongue,'
      and the Greek has 'a tongue-given woman.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to a quiet man.' The Greek parallel uses a word that can mean 'quiet'
      or 'peaceable'; 'gentle' was chosen for natural English and to reflect the contrast
      in character.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמַעֲלֵה
  chosen: Like an ascent
  alternatives:
  - Like a climb
  - Like an uphill path
  lexicon: HALOT
  rationale: The Hebrew comparison opens with a noun from עלה, denoting an ascent
    or upward way. The Greek parallel ἀνάβασις confirms the sense of an uphill climb
    rather than a general 'going up.' In English, the simile is made natural with
    'Like a ... ascent.'
- source_word: חוּץ
  chosen: sandy
  alternatives:
  - outside
  - gravelly
  - loose ground
  lexicon: HALOT
  rationale: The Hebrew form is difficult in isolation, but the Greek parallel reads
    ἀμμώδης, 'sandy,' which strongly supports understanding the image as unstable
    sandy footing rather than 'outside.' Because the Zone 1 Hebrew has minor mismatch
    validation and the Greek is supplied as a consistency check, 'sandy' best captures
    the intended image.
- source_word: לְרַגְלֵי יָשִׁישׁ
  chosen: under the feet of an old man
  alternatives:
  - for the feet of an aged man
  - beneath an elder's feet
  lexicon: HALOT
  rationale: יָשִׁישׁ denotes an aged person, and the Greek πρεσβυτέρου here supports
    the sense 'old man/elderly man' rather than an office title. 'Under the feet of
    an old man' conveys the hazardous footing image idiomatically.
- source_word: אֵשֶׁת לָשׁוֹן
  chosen: a sharp-tongued wife
  alternatives:
  - a talkative wife
  - a wife of tongue
  - a loose-tongued wife
  lexicon: HALOT
  rationale: Literally 'a wife of tongue,' an idiom for a woman marked by troublesome
    speech. The Greek γλωσσώδης means talkative or given to the tongue. In context,
    the proverb is negative, so 'sharp-tongued' better conveys harmful, overbearing
    speech than the more neutral 'talkative.'
- source_word: לְאִישׁ רַךְ
  chosen: to a gentle man
  alternatives:
  - to a soft man
  - for a mild man
  - to a timid man
  lexicon: HALOT
  rationale: רַךְ literally means soft/tender, but in reference to a person it can
    denote gentleness or lack of hardness. The Greek ἡσύχῳ points toward 'quiet' or
    'gentle' rather than physically soft. 'Gentle man' preserves the contrast without
    importing cowardice.
