- issue: Use of gendered terms in a wisdom saying
  chosen_reading: wife ... man
  alternative_readings:
  - spouse ... person
  - woman ... husband
  rationale: The Hebrew explicitly uses gendered singular terms אֵשֶׁת and אִישׁ,
