theological_decisions:
- issue: Source divergence between Hebrew and Greek at Sirach 25:2
  chosen_reading: Translate the extant Hebrew main clause as the primary text for
    this verse, while preserving the Greek's substantially different content in a
    footnote.
  alternative_readings:
  - 'Greek: ''the harmony of brothers, and the friendship of neighbors, and a wife
    and a husband living well together'''
  rationale: For Sirach, surviving Hebrew is primary where extant. Here the Hebrew
    witness presents a line about three hated things, while the Greek presents three
    admired social goods. Because the mismatch is major and materially affects meaning,
    the Hebrew governs the main translation, but the Greek alternative must be exposed
    for auditability.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly'
