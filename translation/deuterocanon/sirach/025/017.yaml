- issue: Gendered proverb language
  chosen_reading: A woman's evil darkens a man's appearance
  alternative_readings:
  - A wife's evil darkens her husband's appearance
  - A woman's wickedness darkens a person's appearance
  rationale: The Hebrew uses explicitly gendered terms אשה and איש. Per project philosophy,
    the translation remains gender-accurate rather than neutralizing the proverb's
    wording. Because אשה may also mean 'wife,' that alternative is preserved in documentation
    rather than imported into the main text.
