translation:
  text: A woman's evil darkens a man's appearance, and makes his face gloomy like
    a bear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew אִשָּׁה can also mean 'wife,' so the line may be understood more
      specifically within a household setting.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel reads 'and darkens her face like sackcloth,' reflecting
      a different image from the extant Hebrew, which reads 'like a bear.'
    reason: alternative_reading
lexical_decisions:
- source_word: רֹעַ
  chosen: evil
  alternatives:
  - wickedness
  - badness
  - misery
  lexicon: HALOT
  rationale: The noun denotes moral badness or harmfulness. 'Evil' best preserves
    the terse, proverbial force of the Hebrew and aligns with the Greek πονηρία.
- source_word: אִשָּׁה
  chosen: woman's
  alternatives:
  - wife's
  lexicon: HALOT
  rationale: Hebrew אשה can mean either 'woman' or 'wife.' With no explicit possessive
    marker in Hebrew, the generic 'woman' is the safer main-text rendering, while
    'wife' remains a plausible contextual alternative in this section's household
    sayings.
- source_word: יַשְׁחִיר
  chosen: darkens
  alternatives:
  - blackens
  - makes dark
  lexicon: HALOT
  rationale: From שׁחר in the causative sense, the verb conveys making dark or black.
    'Darkens' is idiomatic modern English and preserves the image.
- source_word: מַרְאֶה אִישׁ
  chosen: a man's appearance
  alternatives:
  - a man's look
  - a man's countenance
  lexicon: HALOT
  rationale: מראה refers to visible appearance. 'Appearance' is natural English and
    avoids archaic 'countenance,' while keeping the focus on outward look.
- source_word: וְיַקְדִיר
  chosen: makes ... gloomy
  alternatives:
  - darkens
  - makes sallow
  - makes mournful
  lexicon: HALOT
  rationale: The verb קדַר can denote becoming dark, dim, or mournful. Because the
    previous colon already uses 'darkens,' varying here to 'makes ... gloomy' preserves
    the semantic overlap without awkward repetition and reflects the emotional cast
    of the expression.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his countenance
  lexicon: HALOT
  rationale: פנים commonly means 'face.' 'His face' is the plain and accurate rendering.
- source_word: לְדוֹב
  chosen: like a bear
  alternatives:
  - as a bear
  lexicon: HALOT
  rationale: The Hebrew points to 'bear.' Although the Greek parallel reads 'like
    sackcloth,' the primary Hebrew witness is clear enough to translate directly from
    it; the Greek is preserved in a footnote as a notable alternative image.
