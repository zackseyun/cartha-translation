translation:
  text: Happy is the husband of a prudent wife, and one who does not plow with an
    ox and a donkey together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a substantially different reading: ''How great is one who has
      found wisdom, but there is none above one who fears the Lord.'''
    reason: alternative_reading
  - marker: b
    text: The image likely alludes to Deuteronomy 22:10, which forbids plowing with
      an ox and a donkey together; here it functions proverbially for an ill-matched
      pairing.
    reason: cross_reference
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Happy is
  alternatives:
  - Blessed is
  - Fortunate is
  lexicon: HALOT
  rationale: The Hebrew beatitude formula marks a state of enviable well-being. 'Happy
    is' is natural modern English and fits wisdom-style commendation without importing
    stronger covenantal overtones than the word itself requires.
- source_word: בַעַל אִשָּׁה
  chosen: the husband of a ... wife
  alternatives:
  - a man with a ... wife
  - one who has a ... wife
  lexicon: HALOT
  rationale: Literally 'owner/master of a wife' is an idiom for 'husband.' Rendering
    it idiomatically avoids misleading possessive force in English while preserving
    the male-specific reference of the Hebrew.
- source_word: מַשְׁכָּלֶת
  chosen: prudent
  alternatives:
  - intelligent
  - sensible
  - wise
  lexicon: HALOT
  rationale: The adjective denotes good sense or sound judgment. 'Prudent' captures
    practical wisdom in conduct better than the more abstract 'intelligent' and is
    slightly narrower and more domestic-contextual than 'wise.'
- source_word: חוֹרֵשׁ
  chosen: plow
  alternatives:
  - till
  lexicon: HALOT
  rationale: The participial form refers to plowing. 'Plow' is the most direct and
    idiomatic agricultural equivalent in English.
- source_word: בְּשׁוֹר וְבַחְמוֹר יַחְדָּו
  chosen: with an ox and a donkey together
  alternatives:
  - with an ox and an ass together
  - with an ox and a donkey yoked together
  lexicon: HALOT
  rationale: The phrase echoes Deuteronomy 22:10. 'Donkey' is standard modern English
    for חמור. 'Together' preserves יַחְדָּו; the sense of mismatched pairing is left
    implicit in the allusion, though 'yoked together' is a possible explicating alternative.
