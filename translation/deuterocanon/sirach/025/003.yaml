translation:
  text: A poor man who is proud, and a rich man who lies, and an old man who commits
    adultery and lacks sense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew מְכַחֵשׁ can also mean 'deceiving' or 'denying'; the Greek parallel
      has 'liar,' which supports the rendering 'who lies.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'lacks sense' could also be rendered 'is without understanding' or
      'is deficient in judgment'; the Greek similarly reads 'diminished in understanding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּל
  chosen: poor man
  alternatives:
  - poor person
  - the poor
  lexicon: HALOT
  rationale: Hebrew דל denotes one who is poor/lowly. The singular masculine form
    is retained as 'poor man' in keeping with the source's gendered singular style
    and the project's gender-accurate policy.
- source_word: גֵּאֶה
  chosen: proud
  alternatives:
  - haughty
  - arrogant
  lexicon: HALOT
  rationale: The adjective conveys loftiness or arrogance. 'Proud' is the most natural
    modern English equivalent here; 'haughty' is possible but less readable.
- source_word: וְעָשִׁיר
  chosen: and a rich man
  alternatives:
  - and the rich man
  lexicon: HALOT
  rationale: עָשִׁיר means 'rich' or 'wealthy.' The conjunction and singular noun
    are carried over straightforwardly.
- source_word: מְכַחֵשׁ
  chosen: who lies
  alternatives:
  - who deceives
  - who denies
  - 'false'
  lexicon: HALOT
  rationale: The Hebrew participle from כחש can denote lying, deception, or denial.
    The Greek parallel ψεύστην ('liar') supports the sense 'who lies' rather than
    a narrower 'denies.' This yields clear idiomatic English while staying close to
    both witnesses.
- source_word: וְזָקֵן
  chosen: and an old man
  alternatives:
  - and an elder
  - and an aged man
  lexicon: HALOT
  rationale: זקן here refers to an aged man, not an office-holder. 'Old man' is direct
    and natural.
- source_word: מְנָאֵף
  chosen: who commits adultery
  alternatives:
  - adulterer
  lexicon: HALOT
  rationale: The participle denotes one committing adultery. Rendering it verbally
    ('who commits adultery') keeps the parallel structure with the preceding participles
    in English.
- source_word: וַחֲסַר דַּעַת
  chosen: and lacks sense
  alternatives:
  - and without understanding
  - and lacking knowledge
  - and deficient in judgment
  lexicon: HALOT
  rationale: The Hebrew phrase means lacking knowledge or understanding. The Greek
    parallel ἐλαττούμενον συνέσει points specifically to deficiency in understanding.
    'Lacks sense' is concise, idiomatic, and preserves the moral-intellectual force.
