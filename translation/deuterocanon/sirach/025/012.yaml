translation:
  text: The fear of the Lord surpasses everything; the one who holds fast to it—to
    whom will he be compared?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The fear of the Lord is above everything.' The Greek wording expresses
      superiority over all things.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the one who possesses it—to whom will he be likened?' The verb can
      suggest firm possession as well as holding fast.
    reason: lexical_alternative
lexical_decisions:
- source_word: φόβος Κυρίου
  chosen: the fear of the Lord
  alternatives:
  - fear of the LORD
  - reverence for the Lord
  lexicon: LSJ
  rationale: A standard rendering of the Greek phrase that preserves its wisdom-literature
    resonance. 'Fear' is retained rather than softened to 'reverence,' since the source
    uses φόβος and the phrase carries established theological weight.
- source_word: ὑπὲρ πᾶν
  chosen: surpasses everything
  alternatives:
  - is above all things
  - exceeds all
  lexicon: LSJ
  rationale: The preposition ὑπέρ with πᾶν conveys superiority over all things. 'Surpasses
    everything' is idiomatic modern English and fits the comparative force of the
    clause.
- source_word: ὑπερέβαλεν
  chosen: surpasses
  alternatives:
  - has excelled
  - has exceeded
  - is supreme over
  lexicon: LSJ
  rationale: Although the Greek form is aorist, English proverbial style often uses
    the present for a general truth. 'Surpasses' communicates the gnomic sense more
    naturally than a wooden past tense.
- source_word: ὁ κρατῶν αὐτοῦ
  chosen: the one who holds fast to it
  alternatives:
  - the one who possesses it
  - the one who grasps it
  - whoever holds to it
  lexicon: LSJ
  rationale: κρατέω here suggests holding firmly or maintaining possession. 'Holds
    fast' captures both firmness and ongoing adherence. The pronoun αὐτοῦ is rendered
    by sense as 'it,' referring back to the fear of the Lord.
- source_word: τίνι ὁμοιωθήσεται
  chosen: to whom will he be compared?
  alternatives:
  - to whom will he be likened?
  - who can be compared to him?
  lexicon: LSJ
  rationale: A future passive rhetorical question. 'Be compared' is clear modern English;
    'likened' is possible but less natural. The masculine singular is preserved as
    'he' because the Greek refers to 'the one who holds fast,' a grammatically masculine
    singular representative figure.
