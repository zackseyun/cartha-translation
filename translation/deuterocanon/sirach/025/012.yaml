theological_decisions:
- issue: Whether to soften 'fear' into 'reverence' in a wisdom context
  chosen_reading: the fear of the Lord
  alternative_readings:
  - reverence for the Lord
  rationale: The project philosophy prefers preserving the source's theological tension
    rather than resolving it. In wisdom literature, 'fear of the Lord' is a key concept
    and should remain explicit in the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms'
- issue: Whether to render the aorist verb as past or present in English
  chosen_reading: surpasses
  alternative_readings:
  - has surpassed
  - surpassed
  rationale: The verse states a general wisdom truth rather than a one-time past event.
    A present-tense English rendering best communicates the gnomic force without distorting
    the sense.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; readable modern English'
- issue: Gender rendering of the representative singular
  chosen_reading: he
  alternative_readings:
  - the person
  - they
  rationale: The Greek uses a grammatically masculine singular participial construction.
    Per project policy, the representative singular is rendered in a gender-accurate
    way rather than neutralized, while the phrase 'the one who' already broadens the
    sense.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
