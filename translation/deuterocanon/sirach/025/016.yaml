theological_decisions:
- issue: Whether γυνή should be rendered 'woman' or 'wife' in this proverb
  chosen_reading: woman
  alternative_readings:
  - wife
  rationale: The Greek γυνή can denote either 'woman' or 'wife.' Because the text
    does not explicitly mark possession ('one's wife') and the immediate Greek can
    be read generically, the main text keeps 'woman.' The domestic verbs make 'wife'
    a plausible contextual alternative, so it is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §3, §5
