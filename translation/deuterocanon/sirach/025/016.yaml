translation:
  text: I would rather live with a lion and a dragon than dwell with a wicked woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with a wicked wife.' Greek γυνή can mean either 'woman' or 'wife' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνοικῆσαι
  chosen: live with
  alternatives:
  - share a house with
  - cohabit with
  lexicon: BDAG
  rationale: The aorist infinitive of συνοικέω denotes living together in the same
    dwelling. 'Live with' is idiomatic modern English and preserves the domestic sense
    without importing specifically sexual overtones that 'cohabit with' might suggest.
- source_word: λέοντι
  chosen: a lion
  lexicon: LSJ
  rationale: Straightforward dative singular of λέων. The singular is retained for
    vivid proverbial comparison.
- source_word: δράκοντι
  chosen: a dragon
  alternatives:
  - a serpent
  - a monster
  lexicon: LSJ
  rationale: δράκων in Greek can denote a dragon or great serpent. 'Dragon' is the
    most direct and traditional rendering, fitting the heightened proverbial imagery.
    'Serpent' is possible but narrows the image.
- source_word: εὐδόκησα
  chosen: I would rather
  alternatives:
  - I was pleased to
  - I preferred
  lexicon: BDAG
  rationale: Although εὐδοκέω often means 'be pleased' or 'take delight,' in this
    comparative construction with ἤ it expresses preference. 'I would rather' captures
    the idiomatic force in English better than the stiffer 'I preferred'.
- source_word: ἐνοικῆσαι
  chosen: dwell
  alternatives:
  - live
  - reside
  lexicon: BDAG
  rationale: ἐνοικέω likewise refers to inhabiting or dwelling in a place. 'Dwell'
    provides slight variation from 'live with' while preserving the domestic setting
    and matching the elevated proverbial tone.
- source_word: μετὰ γυναικὸς πονηρᾶς
  chosen: with a wicked woman
  alternatives:
  - with an evil wife
  - with a bad woman
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife' depending on context. Since the Greek
    lacks an explicit possessive and the saying is proverbial, 'woman' is the safer
    default from the Greek alone. πονηρός here is moral in force, so 'wicked' is preferable
    to the flatter 'bad.'
