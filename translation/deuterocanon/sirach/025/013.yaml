theological_decisions:
- issue: Potential softening of the misogynistic-sounding final colon
  chosen_reading: Retain the direct wording 'the evil of a woman' in the main text
  alternative_readings:
  - the trouble caused by a woman
  - the wickedness of a wife
  - a woman's malice
  rationale: The source text is blunt and comparative, and the translation should
    not mute its force by paraphrasing into a less personal or less morally charged
    expression. At the same time, the lexical ambiguity of רָעָה and אִשָּׁה is documented,
    and an alternative is preserved in a footnote rather than resolved away.
