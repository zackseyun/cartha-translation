translation:
  text: Any wound, but not like a wound of the heart; any evil, but not like the evil
    of a woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any misfortune, but not like the misfortune caused by a woman'; Hebrew
      רָעָה can mean 'evil' or 'misfortune/harm,' and אִשָּׁה can also mean 'wife'
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: 'Used distributively in both cola: the saying compares any instance within
    a category against a worse exemplar. ''Any'' sounds more natural in English proverbial
    style than repeating ''every/all,'' while preserving the universal scope.'
- source_word: מַכָּה
  chosen: wound
  alternatives:
  - blow
  - affliction
  - plague
  lexicon: HALOT
  rationale: The Hebrew denotes a blow/strike and by extension its resulting injury.
    In parallel with 'heart' and echoed by Greek πληγή, 'wound' best captures both
    the physical-metaphorical force and the proverb's comparison.
- source_word: הַלֵּב
  chosen: the heart
  alternatives:
  - the mind
  - the inner self
  lexicon: HALOT
  rationale: Retained literally because Hebrew לב commonly denotes the inner person,
    and the proverb's force depends on the familiar image of an inward wound. Dynamic
    expansion would over-interpret.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - misfortune
  - harm
  - trouble
  lexicon: HALOT
  rationale: The noun can denote moral evil or calamity/misfortune. Because the parallel
    Greek πονηρία leans toward 'wickedness/evil,' and because the second colon characterizes
    a person rather than merely an event, 'evil' preserves the sharper moral sense
    without excluding harmfulness.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - wife
  lexicon: HALOT
  rationale: The unqualified Hebrew noun means 'woman' or 'wife' depending on context.
    Here there is no possessive or marital marker, and the Greek likewise has γυναικός,
    so 'woman' is the more textually direct rendering. 'Wife' is preserved as an alternative
    because some readers may hear the proverb in a domestic context.
- source_word: וְלֹא כְ
  chosen: but not like
  alternatives:
  - and not like
  - yet not like
  - none like
  lexicon: HALOT
  rationale: 'This comparative negation sets up a superlative contrast: any X, but
    none so severe as Y. ''But not like'' keeps the Hebrew structure visible while
    reading naturally in English.'
