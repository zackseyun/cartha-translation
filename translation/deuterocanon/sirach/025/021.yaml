translation:
  text: Do not fall for a woman's beauty, and do not desire what belongs to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and do not lust after a woman.'' The Hebrew witness is
      more specific here, warning against desiring her on account of what she has.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּפּוֹל
  chosen: Do not fall for
  alternatives:
  - Do not fall
  - Do not be overcome by
  - Do not be ensnared by
  lexicon: HALOT
  rationale: The Hebrew literally says 'do not fall,' but with בְּיֹפִי ('for/at the
    beauty of') the idiom warns against being captivated. 'Fall for' preserves the
    metaphor in natural English without over-paraphrasing. The Greek μὴ προσπέσῃς
    ἐπὶ κάλλος supports the sense of being drawn down or overcome by beauty.
- source_word: בְּיֹפִי
  chosen: for ... beauty
  alternatives:
  - because of ... beauty
  - by ... beauty
  - at ... beauty
  lexicon: HALOT
  rationale: The preposition ב with 'beauty' marks the occasion or cause of the falling.
    'For a woman's beauty' is idiomatic in English and captures the causal nuance.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - wife
  - woman
  lexicon: HALOT
  rationale: Both Hebrew אִשָּׁה and Greek γυνή can mean 'woman' or 'wife.' With no
    possessive or marital context here, the broader 'woman' is preferable.
- source_word: וְעַל יֵש לָהּ
  chosen: for what she has
  alternatives:
  - for her possessions
  - for her wealth
  - because she has something
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat compressed and reflects 'what belongs to
    her/what she has.' The Greek parallel simplifies to 'and do not lust after a woman,'
    but the Hebrew more specifically warns against coveting her on account of her
    assets or advantages. 'For what she has' preserves the Hebrew witness while remaining
    readable and honest to the minor source mismatch.
- source_word: לֹא תַּחְמוֹד
  chosen: do not desire
  alternatives:
  - do not covet
  - do not lust after
  lexicon: HALOT
  rationale: חמד often means 'covet' or 'desire.' Because the object here is a woman
    and the motive is tied to what she has, 'desire' is broad enough to include covetous
    attraction without narrowing the sense to purely sexual lust. The Greek ἐπιποθέω
    supports strong desire.
