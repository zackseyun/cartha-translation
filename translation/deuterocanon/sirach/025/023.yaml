theological_decisions:
- issue: Use of the Hebrew Cairo Geniza text with Greek parallel in a wisdom saying
    about a wife
  chosen_reading: Translate the Hebrew as primary while allowing the Greek to confirm
    the verse's appositional structure and negative characterization.
  alternative_readings:
  - 'Translate more expansively from the Greek: ''A wicked wife is a lowly heart and
    a gloomy face and a wound of the heart; hands hanging limp and paralyzed knees
    are she who does not make her husband blessed.'''
  rationale: Zone 1 provides a high-confidence Hebrew text for this verse, so it governs
    the translation. The Greek contains additional material in the preceding clause
    not present in the Hebrew line cited here; that material belongs to the broader
    verse tradition but should not be imported into the English main text when translating
    the extant Hebrew witness. The Greek does, however, support reading the Hebrew
    line as an image equating such a wife with bodily weakness.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    use Greek parallel as actual input without overriding the Hebrew witness.'
