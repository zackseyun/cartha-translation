translation:
  text: 'Slack hands and failing knees: a wife who does not bless her husband.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a wife who does not bless her husband,' with the sense possibly being
      'who does not make her husband count himself blessed' or 'who does not make
      him happy/fortunate.' The Greek parallel reads, 'she who does not count her
      husband blessed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רִפְיוֹן
  chosen: slack
  alternatives:
  - weakness
  - laxity
  - feebleness
  lexicon: HALOT
  rationale: The noun denotes looseness or weakness. 'Slack' preserves the concrete
    image in the Hebrew phrase 'slack hands' and matches the Greek παρειμέναι ('relaxed,
    hanging limp') without overinterpreting it as purely moral weakness.
- source_word: יָדַיִם
  chosen: hands
  lexicon: HALOT
  rationale: Literal body-part imagery is retained. Together with 'slack' it forms
    an idiomatic picture of incapacity or discouragement.
- source_word: כִשְׁלוֹן
  chosen: failing
  alternatives:
  - stumbling
  - collapse
  - weakness
  lexicon: HALOT
  rationale: The term comes from the root 'to stumble.' With 'knees' it idiomatically
    suggests knees giving way. 'Failing' is natural English and preserves the bodily
    metaphor better than the more literal but awkward 'stumbling knees.'
- source_word: בִּרְכַּיִם
  chosen: knees
  lexicon: HALOT
  rationale: Literal rendering preserves the parallel bodily image, also supported
    by Greek γόνατα παραλελυμένα ('paralyzed/disabled knees').
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: Although the noun can mean 'woman,' the following phrase 'her husband'
    specifies the marital relationship, so 'wife' is the most contextually accurate
    rendering.
- source_word: לֹא תְאַשֵּׁר
  chosen: does not make ... blessed
  alternatives:
  - does not bless
  - does not make happy
  - does not call fortunate
  lexicon: HALOT
  rationale: The piel of אשר commonly means to pronounce or regard as blessed/happy.
    Because the object is 'her husband,' the sense is that she does not render him
    blessed or fortunate. 'Make her husband blessed' keeps the lexical connection
    to blessing while allowing the causative nuance. The Greek οὐ μακαρίζει likewise
    points to 'does not count/call blessed,' but in context the Hebrew likely carries
    the practical-result sense.
- source_word: בַּעֲלָהּ
  chosen: her husband
  alternatives:
  - her master
  lexicon: HALOT
  rationale: In marital context this clearly means 'her husband.' 'Master' would import
    an unnecessary and misleading nuance here.
