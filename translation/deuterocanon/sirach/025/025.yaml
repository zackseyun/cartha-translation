translation:
  text: A bad wife is leprosy to her husband; let him drive her out of his house,
    and he will be healed of his leprosy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צָרַעַת, traditionally 'leprosy,' refers broadly to a serious skin
      affliction in biblical usage, not necessarily modern leprosy.
    reason: cultural_note
  - marker: b
    text: Or 'he should divorce her'; the Hebrew more literally says 'drive her out
      of his house,' which may imply separation without specifying the legal form.
    reason: alternative_reading
  - marker: c
    text: 'The Greek parallel reads quite differently: ''Do not give water an outlet,
      nor authority to a wicked wife.'' The English here follows the extant Hebrew
      witness as the primary source for this verse.'
    reason: textual_variant
lexical_decisions:
- source_word: אִשָּׁה רָעָה
  chosen: a bad wife
  alternatives:
  - an evil wife
  - a wicked wife
  - a bad woman
  lexicon: HALOT
  rationale: The Hebrew phrase is straightforwardly adjectival. In context לְבַעֲלָהּ
    ('to her husband') makes 'wife' more precise than the broader 'woman.' 'Bad' preserves
    the broad moral/practical force of רָעָה without over-specifying to 'wicked,'
    though that remains a viable alternative.
- source_word: צָרַעַת
  chosen: leprosy
  alternatives:
  - a skin disease
  - affliction
  lexicon: HALOT
  rationale: The Hebrew uses the standard term for the biblical condition commonly
    rendered 'leprosy.' Although the ancient disease category is broader than modern
    Hansen's disease, 'leprosy' is the conventional and most recognizable rendering;
    the metaphorical force here depends on the term's social and ritual offensiveness.
    A cultural note preserves the broader ancient sense.
- source_word: לְבַעֲלָהּ
  chosen: to her husband
  alternatives:
  - for her husband
  - to her master
  lexicon: HALOT
  rationale: In marital context בעל clearly means 'husband,' not the broader 'owner/master.'
    'To her husband' follows the predicative construction naturally in English.
- source_word: יְגַרְשֶׁנָּה
  chosen: let him drive her out
  alternatives:
  - he should drive her out
  - let him divorce her
  - expel her
  lexicon: HALOT
  rationale: The verb גרש means 'drive out/expel.' Because the following phrase is
    'from his house,' the concrete sense of expulsion is primary. 'Divorce' would
    import a legal category not explicit in the Hebrew, though it may be implicated.
    The jussive nuance is represented with 'let him.' The Greek parallel likewise
    speaks of not giving a wicked woman authority, supporting a forceful practical
    response without requiring the legal term 'divorce.'
- source_word: מִבֵּיתוֹ
  chosen: of his house
  alternatives:
  - from his house
  - out of his home
  lexicon: HALOT
  rationale: With 'drive her out,' idiomatic English prefers 'out of his house.' This
    preserves the concrete domestic setting of the Hebrew.
- source_word: וְיִתְרַפֵּא
  chosen: and he will be healed
  alternatives:
  - and let him be healed
  - and he shall recover
  lexicon: HALOT
  rationale: 'The verb רפא means ''be healed.'' In sequence after the jussive/imperatival
    expulsion, the Hebrew can be heard as resultative: if he does this, he will be
    healed. This reads more naturally in English than a second jussive.'
- source_word: מִצָּרַעְתּוֹ
  chosen: of his leprosy
  alternatives:
  - from his affliction
  - from that leprosy
  lexicon: HALOT
  rationale: The suffix makes the metaphor personal and completes the comparison begun
    in the first colon. Repeating 'leprosy' preserves the rhetorical symmetry of the
    Hebrew.
