theological_decisions:
- issue: Whether to render the remedy as legal 'divorce' or concrete expulsion from
    the household
  chosen_reading: 'Concrete expulsion: ''let him drive her out of his house'''
  alternative_readings:
  - let him divorce her
  rationale: The Hebrew verb גרש with the phrase 'from his house' is more concrete
    than a purely legal term. Rendering it as 'divorce' would narrow the sense and
    import a juridical category not stated in the text. The Greek parallel differs
    substantially and warns against giving a wicked woman authority, which supports
    the general thrust but not a specific legal formula.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
