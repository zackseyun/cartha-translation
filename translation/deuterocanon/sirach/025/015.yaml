translation:
  text: There is no head above the head of a snake, and there is no wrath above the
    wrath of an enemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'There is no venom like the venom of a snake.' The Greek literally says
      'head ... head of a snake,' and the translation preserves that image rather
      than replacing it with an interpretive paraphrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: κεφαλή
  chosen: head
  alternatives:
  - venom
  - poison
  lexicon: LSJ
  rationale: The Greek plainly reads 'head' in both occurrences. Although some interpreters
    take 'head of a snake' metonymically for its deadly striking power or venom, the
    source text itself uses the concrete noun, and optimal equivalence preserves the
    image rather than paraphrasing it.
- source_word: ὄφις
  chosen: snake
  alternatives:
  - serpent
  lexicon: LSJ
  rationale: '''Snake'' is the most natural modern English equivalent. ''Serpent''
    is possible but sounds more elevated and traditional than the context requires.'
- source_word: θυμός
  chosen: wrath
  alternatives:
  - anger
  - rage
  lexicon: LSJ
  rationale: θυμός here denotes intense hostile anger. 'Wrath' best conveys the heightened
    force and matches the proverb-like parallelism; 'anger' is possible but somewhat
    flatter, while 'rage' may sound more momentary or uncontrolled.
- source_word: ἐχθρός
  chosen: enemy
  alternatives:
  - foe
  lexicon: LSJ
  rationale: The standard and clear rendering is 'enemy.' It preserves the moral and
    relational force of the Greek without archaism.
- source_word: ὑπέρ
  chosen: above
  alternatives:
  - greater than
  - beyond
  lexicon: LSJ
  rationale: In this comparative construction, ὑπέρ expresses surpassing. 'Above'
    keeps the literal comparative imagery of the Greek; the sense is effectively 'greater
    than,' but the more literal wording works well in English here.
