theological_decisions:
- issue: Whether to follow the Hebrew עֲרִירִי ('childless') or the Greek συνετοῦ
    ('prudent/understanding') in the first colon
  chosen_reading: 'Follow the Hebrew witness in the main text: ''childless man,''
    while preserving the Greek-based alternative in a footnote.'
  alternative_readings:
  - wise man
  - understanding man
  - prudent man
  rationale: For Sirach, where Hebrew survives, the project translates from the Hebrew
    as the more original witness, while using the Greek as an actual input and consistency
    check. Here the divergence is substantial and affects meaning. The Hebrew is high-confidence,
    so it governs the main text; the Greek alternative is significant enough to preserve
    in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    genuine ambiguity/alternatives in footnotes.'
