translation:
  text: From one childless man who fears Yahweh a city will be inhabited, but from
    a family of traitors it will be laid waste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''From one prudent man a city will be inhabited.'' The Hebrew reads
      ''From one God-fearing childless man.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאֶחַד
  chosen: From one
  alternatives:
  - By one
  - Because of one
  lexicon: HALOT
  rationale: The preposition מִן with אֶחָד is best rendered 'from one,' matching
    the Hebrew construction and aligning with the Greek ἀπὸ ... ἑνός. It expresses
    source/origin rather than merely agency.
- source_word: עֲרִירִי
  chosen: childless man
  alternatives:
  - solitary man
  - destitute man
  - barren one
  lexicon: HALOT
  rationale: Hebrew עֲרִירִי commonly denotes one without children or descendants.
    The Greek parallel reads συνετοῦ ('prudent/understanding'), which likely reflects
    a different Vorlage or interpretive rendering, but the extant Hebrew witness should
    govern here. 'Childless man' preserves the concrete Hebrew sense.
- source_word: יְרֵא יְהֹוָה
  chosen: God-fearing
  alternatives:
  - who fears the LORD
  - a fearer of the LORD
  lexicon: HALOT
  rationale: This phrase literally means 'one who fears the LORD.' 'God-fearing' is
    a natural English adjectival rendering that preserves the reverential sense while
    reading smoothly. Because the Hebrew has the divine name, this is not generic
    religiosity but reverence toward the LORD.
- source_word: יְהֹוָה
  chosen: God-
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: The divine name is present in the Hebrew, and our default is 'the LORD.'
    In this verse, however, the phrase is embedded adjectivally in English ('God-fearing')
    for idiomatic clarity. The rationale is stylistic, not theological; the underlying
    referent remains YHWH.
- source_word: תֵּשֵׁב עִיר
  chosen: a city will be inhabited
  alternatives:
  - a city will be settled
  - a city will be populated
  lexicon: HALOT
  rationale: The verb ישב in this stem can mean 'be inhabited/settled.' The Greek
    συνοικισθήσεται likewise points to a city becoming inhabited or settled. 'Will
    be inhabited' is clear and preserves the passive/resultative sense.
- source_word: מִמִּשְׁפַּחַת
  chosen: from a family
  alternatives:
  - from a clan
  - from a household
  lexicon: HALOT
  rationale: מִשְׁפָּחָה denotes family, clan, or kin-group. 'Family' is the most
    accessible modern English choice and fits the contrast with 'one' in the first
    colon.
- source_word: בֹּגְדִים
  chosen: traitors
  alternatives:
  - the treacherous
  - the faithless
  - betrayers
  lexicon: HALOT
  rationale: בוגדים are those who act treacherously or betray trust. 'Traitors' captures
    the moral force sharply in idiomatic English. 'Faithless' is possible but can
    sound more abstract and less active than the Hebrew.
- source_word: תֶּחֱרָב
  chosen: it will be laid waste
  alternatives:
  - it will be ruined
  - it will be desolated
  lexicon: HALOT
  rationale: From חרב, the verb means to be ruined, desolated, or laid waste. The
    Greek ἐρημωθήσεται supports a desolation sense. 'It will be laid waste' preserves
    the severity and the passive/resultative force.
