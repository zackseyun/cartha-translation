theological_decisions:
- issue: Anthropological phrase בני אדם
  chosen_reading: the sons of man
  alternative_readings:
  - humankind
  - human beings
  rationale: The Hebrew is grammatically masculine and idiomatic for humanity. Following
    the project's gender-accurate policy, the main text keeps the masculine form while
    a footnote can clarify the representative sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms אָדָם
- issue: Relation of divine 'light' and 'praise' to humanity
  chosen_reading: he has apportioned his light and his praise to the sons of man
  alternative_readings:
  - his light and his glory he distributed among human beings
  rationale: The Hebrew states distribution/apportionment without specifying whether
    this means revelation, honor, or capacity for praise. The translation preserves
    that theological openness rather than resolving it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
