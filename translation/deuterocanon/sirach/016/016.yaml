id: SIR.16.16
reference: Sirach 16:16
source:
  edition: sefaria-ben-sira-kahana
  text: רַחֲמָיו יֵרָאוּ לְכָל בִּרְיוֹתָיו, וְאוֹרוֹ וְשִׁבְחוֹ חָלַק לִבְנֵי אָדָם.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ ἐξ ὕψους τίς μου μνησθήσεται;
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 16:16
translation:
  text: His mercies are seen by all his creatures, and he has apportioned his light
    and his praise to the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to humankind' / 'to human beings'; Hebrew 'to the sons of man,' an idiom
      for humanity.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel in Swete reads very differently here: ''Who will remember
      me from on high?'' The main text follows the extant Hebrew witness, which is
      the primary source for this verse where available.'
    reason: textual_variant
lexical_decisions:
- source_word: רַחֲמָיו
  chosen: his mercies
  alternatives:
  - his compassion
  - his acts of mercy
  lexicon: HALOT
  rationale: Plural of רחמים naturally conveys merciful acts or mercies. 'His mercies'
    preserves the Hebrew plural and keeps the line concrete without over-paraphrasing.
- source_word: יֵרָאוּ
  chosen: are seen
  alternatives:
  - are visible
  - appear
  - are feared
  lexicon: HALOT
  rationale: From ראה in the Niphal/Qal passive-like sense, 'are seen' fits the Hebrew
    straightforwardly. Although the consonants could suggest a fear-related reading
    in another context, the parallel with 'light' favors visibility/manifestation.
- source_word: לְכָל בִּרְיוֹתָיו
  chosen: by all his creatures
  alternatives:
  - to all his creatures
  - among all his creatures
  lexicon: HALOT
  rationale: The phrase means 'to/by all his creatures.' English 'seen by all his
    creatures' best expresses the passive sense with natural syntax. 'Creatures' preserves
    the created-being sense of בריותיו.
- source_word: וְאוֹרוֹ
  chosen: his light
  alternatives:
  - his illumination
  - his splendor
  lexicon: HALOT
  rationale: אור is most basically 'light.' In parallel with mercy and praise it may
    carry figurative force, but 'light' preserves the source image and theological
    openness.
- source_word: וְשִׁבְחוֹ
  chosen: his praise
  alternatives:
  - his glory
  - his renown
  lexicon: HALOT
  rationale: שבח denotes praise or praiseworthiness. 'His praise' is formally close
    and allows either the sense of praise belonging to him or praise due to him, without
    importing 'glory' unless required.
- source_word: חָלַק
  chosen: has apportioned
  alternatives:
  - divided
  - distributed
  - shared
  lexicon: HALOT
  rationale: חלק commonly means divide/distribute. 'Has apportioned' fits the object
    pair 'his light and his praise' and sounds natural in elevated English.
- source_word: לִבְנֵי אָדָם
  chosen: to the sons of man
  alternatives:
  - to humankind
  - to human beings
  - to the children of men
  lexicon: HALOT
  rationale: Per project policy, gender-accurate rendering is preferred where the
    Hebrew is masculine with representative force. 'Sons of man' closely reflects
    בני אדם and preserves the Hebrew idiom; a more inclusive paraphrase is preserved
    in a footnote.
