  - marker: b
    text: The Hebrew line is textually difficult at 'עוֹלָם'; the Greek parallel supports
      the sense 'in their might.'
    reason: textual_variant
lexical_decisions:
- source_word: לֹא נָשָׁא
  chosen: did not spare
  alternatives:
  - did not forgive
  - did not show favor to
  - did not lift up
  lexicon: HALOT
  rationale: In this context נשא with a negative and personal object is best taken
    idiomatically as withholding pardon or leniency. The Greek parallel οὐκ ἐξιλάσατο
    supports the sense of not sparing or not relenting rather than a literal 'did
    not lift.' 'Did not spare' is concise, natural English and fits the judgment context.
- source_word: לֲנְסִיכֵי קֶדֶם
  chosen: the princes of old
  alternatives:
  - the ancient princes
  - the rulers of old
  - the ancient giants
  lexicon: HALOT
  rationale: The Hebrew witness reads נסיכי קדם, literally 'princes/rulers of old.'
    This should govern the main text because Hebrew is primary where extant. The Greek
    parallel interprets the referent as 'ancient giants,' likely identifying these
    rulers with the primeval rebels. To preserve both, the Hebrew wording is kept
    in the text and the Greek interpretive equivalent is noted in a footnote.
- source_word: הַמּוֹרִים
  chosen: who rebelled
  alternatives:
  - who were rebellious
  - the rebels
  - who turned away
  lexicon: HALOT
  rationale: From מרה, 'to be rebellious, disobey.' The participial form describes
    their defining action. 'Who rebelled' is idiomatic and captures the moral force.
- source_word: עוֹלָם
  chosen: in their might
  alternatives:
  - forever
  - of old
  - eternally
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult here, since עולם normally means
    'forever' or 'antiquity,' but the Greek parallel has τῇ ἰσχύϊ αὐτῶν, 'in their
    strength/might.' Given the source validation note of minor mismatch and the strong
    contextual support from the Greek, the clause is rendered according to the likely
    intended sense reflected in the parallel rather than forcing an opaque 'forever.'
- source_word: בִּגְבוּרָתָם
  chosen: in their might
  alternatives:
  - by their strength
  - through their power
  lexicon: HALOT
  rationale: גבורה denotes strength, might, power. 'In their might' matches the preposition
    and aligns well with the Greek τῇ ἰσχύϊ αὐτῶν.
