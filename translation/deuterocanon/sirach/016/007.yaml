translation:
  text: He did not spare the princes of old, who revolted in their might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the ancient giants,'' identifying the ''princes of old'' as the
      primeval rebels.'
