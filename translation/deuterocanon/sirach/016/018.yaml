theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: at his visitation
  alternative_readings:
  - when he comes down upon them
  rationale: The Hebrew composite may suggest descent, but the Greek parallel frames
    the event as divine visitation/inspection. 'Visitation' preserves divine agency
    without overcommitting to a more anthropomorphic image where the Hebrew line is
    textually difficult.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy with honest source uncertainty.
