translation:
  text: 'Look—the heavens and the highest heavens, the deep and the earth: at his
    visitation they will quake.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the heavens and the heavens of heavens'; rendered idiomatically
      as 'the heavens and the highest heavens.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew line after 'the deep and the earth' is difficult in this composite
      Cairo Geniza text; the Greek parallel reads, in effect, 'the abyss and the earth
      will be shaken at his visitation.' The main translation follows that secure
      sense.
    reason: textual_variant
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic demonstrative/exclamatory statement. 'Look' is
    natural modern English while preserving the deictic force better than a flat omission.
- source_word: הַשָּׁמַיִם וּשְׁמֵי הַשָּׁמַיִם
  chosen: the heavens and the highest heavens
  alternatives:
  - the heavens and the heavens of heavens
  - heaven and the heaven of heaven
  lexicon: HALOT
  rationale: The Hebrew superlative expression 'heavens of heavens' is rendered idiomatically
    as 'highest heavens' in English. This preserves the sense of the loftiest celestial
    realm without wooden awkwardness.
- source_word: תְהוֹם
  chosen: the deep
  alternatives:
  - the abyss
  lexicon: HALOT
  rationale: Hebrew tehom commonly denotes the primeval deep or abyss. 'The deep'
    is the more natural English rendering from the Hebrew witness, while the Greek
    parallel confirms the semantic field with ἄβυσσος ('abyss').
- source_word: בְּפָקְדוֹ
  chosen: at his visitation
  alternatives:
  - when he visits
  - at his inspection
  - at his oversight
  lexicon: HALOT; BDAG
  rationale: The Hebrew פקד in this construction denotes divine intervention/visitation;
    the Greek parallel ἐν τῇ ἐπισκοπῇ αὐτοῦ strongly supports 'visitation' or 'inspection.'
    'At his visitation' preserves the formal theological weight and the temporal sense.
- source_word: יִרְגְּשׁוּ
  chosen: they will quake
  alternatives:
  - they will tremble
  - they will be shaken
  lexicon: HALOT
  rationale: The verb conveys agitation, trembling, or quaking. 'They will quake'
    is vivid and suits cosmic subjects. The Greek σαλευθήσονται supports the sense
    of being shaken.
- source_word: בְּרִדְתּוֹ עֲלֵיהֶם עוֹמְדִים
  chosen: omitted from the main line as textually uncertain behind the composite Hebrew;
    sense absorbed by the Greek-supported clause
  alternatives:
  - when he descends upon them they stand
  - at his descending upon them they stand
  lexicon: HALOT
  rationale: The Kahana Hebrew presents a difficult phrase that does not cohere smoothly
    with the rest of the verse and appears affected by the noted minor mismatch. The
    Greek parallel offers a cleaner and likely corresponding sense focused on cosmic
    shaking at divine visitation. Because the Hebrew wording here is uncertain and
    the Greek is supplied as an actual translation input, the main translation follows
    the secure shared sense rather than forcing an opaque literal rendering.
