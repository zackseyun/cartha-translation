translation:
  text: Each one did not oppress his neighbor, and they will never disobey his word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will not be disobedient to his word.' The Greek future verb can
      be rendered either with an active English verb ('disobey') or a more stative
      expression ('be disobedient').
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  chosen: Each one
  alternatives:
  - each
  - every one
  lexicon: LSJ
  rationale: Distributive singular is best preserved in English with 'Each one,' matching
    the individual-yet-collective sense of the Greek.
- source_word: τὸν πλησίον αὐτοῦ
  chosen: his neighbor
  alternatives:
  - the one near him
  - his fellow
  lexicon: LSJ
  rationale: πλησίον in this ethical context means 'neighbor' or 'fellow.' 'Neighbor'
    is the most natural and established English equivalent without sounding archaic.
- source_word: οὐκ ἔθλιψεν
  chosen: did not oppress
  alternatives:
  - did not afflict
  - did not press hard
  - did not trouble
  lexicon: LSJ
  rationale: θλίβω commonly carries the sense of pressing, afflicting, or oppressing.
    In relation to 'neighbor,' 'oppress' best captures interpersonal harm rather than
    mere emotional distress.
- source_word: ἕως αἰῶνος
  chosen: forever
  alternatives:
  - unto the age
  - for ever
  - for all time
  lexicon: LSJ
  rationale: The idiom denotes enduring duration. 'Forever' gives clear modern English
    while preserving the force of permanence.
- source_word: οὐκ ἀπειθήσουσι
  chosen: will not disobey
  alternatives:
  - will not be disobedient to
  - will not refuse to obey
  lexicon: LSJ
  rationale: ἀπειθέω means to disobey or refuse compliance. 'Will not disobey' is
    concise and preserves the future verbal force.
- source_word: τοῦ ῥήματος αὐτοῦ
  chosen: his word
  alternatives:
  - his command
  - his utterance
  - what he says
  lexicon: LSJ
  rationale: ῥῆμα can mean word, saying, or command depending on context. Here 'his
    word' preserves the Greek's breadth; 'command' would narrow the sense beyond what
    the text explicitly states.
