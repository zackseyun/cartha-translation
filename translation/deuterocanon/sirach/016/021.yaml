translation:
  text: If I have sinned, no eye sees me; or if I lie, who knows it in every hiding
    place?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel differs substantially here, reading in part that many
      of his works are in hidden places. The Hebrew witness is followed as the main
      text because it survives for this verse and is the primary source for Sirach
      where extant.
    reason: textual_variant
  - marker: b
    text: Or 'in every secret place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם חָטָאתִי
  chosen: If I have sinned
  alternatives:
  - If I sinned
  - Though I sinned
  lexicon: HALOT
  rationale: Conditional particle אִם with perfect חָטָאתִי is most naturally rendered
    as a conditional clause. English present perfect fits the Hebrew perfect in a
    general hypothetical statement.
- source_word: לֹא תִרְאֵנִי עָיִן
  chosen: no eye sees me
  alternatives:
  - an eye does not see me
  - no one sees me
  lexicon: HALOT
  rationale: Formally, 'eye' is the subject and should be preserved rather than flattened
    to 'no one,' since the Hebrew uses the concrete image. English idiom allows 'no
    eye sees me' while remaining readable.
- source_word: אוֹ אִם אֲכַזֵב
  chosen: or if I lie
  alternatives:
  - or if I deceive
  - or if I prove false
  lexicon: HALOT
  rationale: כזב in the Hiphil/Qal semantic range can denote lying or proving false.
    In this context of hidden wrongdoing, 'lie' is the clearest and most natural English
    rendering.
- source_word: בְּכָל סֵתֶר
  chosen: in every hiding place
  alternatives:
  - in every secret place
  - in all secrecy
  - in every hidden place
  lexicon: HALOT
  rationale: סֵתֶר denotes a hidden or secret place. 'Hiding place' preserves the
    spatial sense of the Hebrew and fits the rhetorical question about concealed acts.
    The Greek parallel's ἐν ἀποκρύφοις supports the sense of hiddenness.
- source_word: מִי יוֹדֵעַ
  chosen: who knows it
  alternatives:
  - who knows
  - who would know
  lexicon: HALOT
  rationale: The Hebrew literally asks 'who knows?' An object is implied by context
    ('it' = the lie/hidden act), and supplying it in English improves clarity without
    adding new content.
- source_word: καὶ καταιγίς, ἣν οὐκ ὄψεται ἄνθρωπος, τὰ δὲ πλεῖονα τῶν ἔργων αὐτοῦ
    ἐν ἀποκρύφοις
  chosen: used as a control on hiddenness, not as the base text
  alternatives:
  - translate from Greek alone
  - harmonize fully to Greek wording
  lexicon: BDAG
  rationale: The Greek witness diverges notably and appears compressed or differently
    transmitted, but it clearly reinforces the motif that much of a person's works
    are hidden. Because the Hebrew survives with high confidence, it remains primary,
    while the Greek informs the choice of 'hidden/hiding place' language.
