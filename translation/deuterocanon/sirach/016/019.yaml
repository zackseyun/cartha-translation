theological_decisions:
- issue: Implicit divine subject of 'when he looks at them'
  chosen_reading: The subject is rendered as lowercase 'he' rather than explicitly
    naming God.
  alternative_readings:
  - when God looks at them
  - at his glance they quake
  rationale: The immediate context supplies God as the referent, but the Hebrew clause
    itself uses only a pronominal suffix/implicit subject. Using 'he' preserves the
    source's style without importing an explicit noun absent from the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
