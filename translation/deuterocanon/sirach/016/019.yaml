lexical_decisions:
- source_word: קִצְבֵי
  chosen: peaks of
  alternatives:
  - ends of
  - extremities of
  - summits of
  lexicon: HALOT
  rationale: In context with 'the mountains,' the Hebrew denotes their outermost/highest
    reaches. 'Peaks' is natural English and fits the parallel Greek τὰ ὄρη, while
    preserving the vivid image better than the more wooden 'ends of.'
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  - hills
  lexicon: HALOT
  rationale: Standard rendering of הָרִים. The article is retained in sense, though
    English idiom allows either form; 'the mountains' matches the Hebrew and the Greek
    parallel.
- source_word: וִיסוֹדֵי
  chosen: and the foundations of
  alternatives:
  - and the bases of
  lexicon: HALOT
  rationale: יסוד commonly means 'foundation.' This pairs naturally with the cosmic
    image and is confirmed by the Greek θεμέλια.
- source_word: תֵבֵל
  chosen: the world
  alternatives:
  - the earth
  - the inhabited world
  lexicon: HALOT
  rationale: תבל often denotes the world as the inhabited, ordered world. Because
    'earth' already appears in the Greek parallel and English 'foundations of the
    earth' is possible, 'world' better reflects the Hebrew witness while still conveying
    the cosmic scope.
- source_word: בְּהַבִּיטוֹ אֲלֵיהֶם
  chosen: when he looks at them
  alternatives:
  - at his looking upon them
  - when he gazes on them
  lexicon: HALOT
  rationale: A temporal clause is the most natural English rendering of the infinitive
    construct with pronominal suffix. The subject is implicitly God from context;
    'looks at' is clear and dignified.
- source_word: רַעַשׁ
  chosen: with trembling
  alternatives:
  - in terror
  - with shaking
  - tumultuously
  lexicon: HALOT
  rationale: The noun intensifies the following verb. Since the verb already supplies
    'quake,' rendering the noun as 'with trembling' preserves the Hebrew emphasis
    without awkward repetition. The Greek τρόμῳ likewise supports an instrumental/adverbial
    sense.
- source_word: יִרְעָשׁוּ
  chosen: they quake
  alternatives:
  - they shake
  - they tremble
  - they are shaken
  lexicon: HALOT
  rationale: רעש in this context describes seismic trembling. 'They quake' is vivid,
    idiomatic, and suits both the Hebrew and the Greek συνσείονται.
