theological_decisions:
- issue: Relationship between divine mercy and divine correction/judgment
  chosen_reading: The verse presents mercy and reproof together in proportion, followed
    by judgment according to deeds.
  alternative_readings:
  - The second colon could be taken more punitively as 'punishment' rather than corrective
    'reproof'.
  rationale: 'Both Hebrew תּוֹכַחַת and Greek ἔλεγχος point primarily to reproof/correction,
    not sheer retributive punishment. This preserves the text''s theological tension:
    abundant mercy does not cancel moral accountability.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence.'
