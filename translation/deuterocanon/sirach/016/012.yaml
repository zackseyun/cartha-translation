translation:
  text: As great as his mercies are, so also is his reproof; he will judge a man according
    to his deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his mercy' (Greek singular), though the Hebrew reads the plural 'his
      mercies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his correction' or 'his rebuke'; the Greek likewise has 'reproof.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'a man' uses a masculine singular form with representative force.
    reason: cultural_note
lexical_decisions:
- source_word: כְּרָב
  chosen: as great as
  alternatives:
  - according to the abundance of
  - in proportion to the greatness of
  lexicon: HALOT
  rationale: 'The comparative construction כְּ... כֵּן expresses proportion: ''as
    ... so ...''. רָב here denotes greatness/abundance. ''As great as'' gives natural
    English while preserving the proportional force reflected also in the Greek κατὰ
    τὸ πολὺ ... οὕτως.'
- source_word: רַחֲמָיו
  chosen: his mercies
  alternatives:
  - his mercy
  - his compassion
  lexicon: HALOT
  rationale: Plural of רחמים in Hebrew often conveys abundant compassion/merciful
    acts. The Greek has singular ἔλεος, but the Hebrew witness is primary here. 'His
    mercies' preserves the Hebrew plurality without becoming unnatural.
- source_word: תּוֹכַחְתּוֹ
  chosen: his reproof
  alternatives:
  - his correction
  - his rebuke
  - his chastisement
  lexicon: HALOT
  rationale: 'The noun from יכח can denote reproof or corrective rebuke. The Greek
    ἔλεγχος supports ''reproof/rebuke'' rather than punitive ''punishment.'' ''Reproof''
    best preserves the moral-corrective sense and keeps the parallel with mercy: divine
    compassion does not exclude divine correction.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - each man
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and representative. Per
    project philosophy, gender-accurate rendering is preferred where the source uses
    masculine generic language. 'A man' preserves that form while still functioning
    generically in context.
- source_word: כְּמִפְעָלָיו
  chosen: according to his deeds
  alternatives:
  - according to his works
  - in keeping with what he has done
  lexicon: HALOT
  rationale: מִפְעָל denotes deed/work/action. The Greek parallel has ἔργα, confirming
    the sense. 'Deeds' is idiomatic and morally weighted in English without sounding
    overly technical.
- source_word: יִשְׁפֹּט
  chosen: he will judge
  alternatives:
  - he judges
  - he shall judge
  lexicon: HALOT
  rationale: Imperfect verb here is well rendered as future in this gnomic-theological
    statement, especially with the Greek future κρινεῖ. 'He will judge' is clear modern
    English and preserves the solemn judicial sense.
