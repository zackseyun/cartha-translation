- issue: Whether to follow the Hebrew חנף as 'godless/impious' or align more closely
    with the Greek ἀπειθεῖ as 'disobedient'
  chosen_reading: godless
  alternative_readings:
  - disobedient
  rationale: The Hebrew survives for this verse and is the primary witness for Sirach
    where extant. The Greek parallel was consulted and confirms the general sense
    of a morally corrupt people under judgment, but its specific adjective differs.
    Following project philosophy, the Hebrew wording governs the main text, while
    the Greek-based alternative is preserved in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    preserve alternatives in footnotes where meaningful'
