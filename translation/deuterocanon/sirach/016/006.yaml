lexical_decisions:
- source_word: בַּעֲדַת
  chosen: In the assembly of
  alternatives:
  - In the congregation of
  - Against the assembly of
  lexicon: HALOT
  rationale: 'עדה commonly denotes an assembled community or congregation. With ב,
    the sense is locative: ''in the assembly of.'' ''Assembly'' is natural modern
    English and fits both the Hebrew and the Greek συναγωγῇ.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - evildoers
  - the guilty
  - sinners
  lexicon: HALOT
  rationale: רשעים regularly means 'wicked' or 'guilty.' 'The wicked' preserves the
    moral category succinctly. The Greek parallel has ἁμαρτωλῶν ('sinners'), but the
    Hebrew witness is primary here, so the more exact Hebrew sense is retained.
- source_word: יוֹקֶדֶת אֵשׁ
  chosen: fire burns
  alternatives:
  - a fire blazes
  - fire is burning
  - fire is kindled
  lexicon: HALOT
  rationale: The Hebrew verbal idea from יקד conveys burning or blazing. 'Fire burns'
    is concise and idiomatic, while still reflecting the active sense. The Greek ἐκκαυθήσεται
    πῦρ points in the same semantic direction of burning intensely.
- source_word: וּבְגוֹי
  chosen: and among a ... nation
  alternatives:
  - and in a ... people
  - and against a ... nation
  lexicon: HALOT
  rationale: גוי denotes a people or nation. With ב, the phrase is again locative.
    'Among a ... nation' reads naturally in English and conveys that wrath breaks
    out within such a people.
- source_word: חָנֵף
  chosen: godless
  alternatives:
  - profane
  - impious
  - hypocritical
  lexicon: HALOT
  rationale: חנף can denote impiety, godlessness, or profaneness. Although 'hypocritical'
    is possible in some contexts, here the parallel with divine wrath falling on a
    corrupt people favors the broader religious-moral sense 'godless.' The Greek ἀπειθεῖ
    ('disobedient') reflects a related but not identical interpretive tradition; the
    Hebrew wording is better represented by 'godless.'
- source_word: נִצְּתָה חֵמָה
  chosen: wrath is kindled
  alternatives:
  - fury is ignited
  - anger flares up
  - wrath blazes
  lexicon: HALOT
  rationale: The verb נצתה means 'was kindled/ignited,' and חמה is wrath, fury, or
    anger. 'Wrath is kindled' preserves the metaphor and the elevated tone. It also
    aligns well with the Greek ἐξεκαύθη ὀργή.
