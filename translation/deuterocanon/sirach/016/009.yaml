theological_decisions:
- issue: How to render חרם in a judgment context
  chosen_reading: devoted to destruction
  alternative_readings:
  - under the ban
  - doomed to destruction
  rationale: The verse speaks of divine judgment on a people marked out for destruction.
    'Devoted to destruction' preserves the covenantal/judicial force of חרם without
    importing later doctrinal language or obscuring the severity of the term.
  doctrine_reference: Translation philosophy §1, §5
- issue: How to handle the difficult Hebrew הַנּדוֹשִׁים in light of the Greek parallel
  chosen_reading: those trampled down in their iniquity
  alternative_readings:
  - those removed in their sins
  - those crushed by their iniquity
  rationale: The Hebrew wording is somewhat difficult, and the Greek parallel has
    a different but related image ('those removed/marked out in their sins'). The
    main text follows the Hebrew witness as primary while using the Greek as a control.
    Because the source validation notes a minor mismatch and the Hebrew form is not
    entirely straightforward, the Greek-based alternative is preserved in a footnote
    rather than silently resolved.
  doctrine_reference: Translation philosophy §3; PHILOSOPHY.md 'Original-language
    primacy' and Sirach Hebrew+Greek practice
