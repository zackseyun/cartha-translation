translation:
  text: And he did not spare a people devoted to destruction, those trampled down
    in their iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''a nation of destruction, those removed in their sins.''
      The Hebrew appears to use an image of being trodden down or crushed; the Greek
      reflects a closely related judgment sense with different wording.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא חָמַל
  chosen: and he did not spare
  alternatives:
  - and he did not pity
  - and he did not have compassion on
  lexicon: HALOT
  rationale: חמל commonly conveys sparing or showing pity/compassion. 'Did not spare'
    is concise, idiomatic English and fits a judgment context better than the more
    emotive 'did not pity.'
- source_word: גוֹי
  chosen: a people
  alternatives:
  - a nation
  - a gentile nation
  lexicon: HALOT
  rationale: גוי can mean nation or people. 'A people' is slightly more natural here
    and avoids implying modern nation-state categories. The Greek ἔθνος supports either
    'nation' or 'people.'
- source_word: חֶרֶם
  chosen: devoted to destruction
  alternatives:
  - under the ban
  - doomed to destruction
  lexicon: HALOT
  rationale: חרם is a loaded term for something placed under ban for destruction.
    'Devoted to destruction' preserves the sacral/judicial force more transparently
    than the less familiar idiom 'under the ban.'
- source_word: הַנּדוֹשִׁים
  chosen: those trampled down
  alternatives:
  - those crushed
  - those threshed
  lexicon: HALOT
  rationale: 'The Hebrew form likely derives from a root meaning to tread or thresh.
    In context, with the Greek parallel τοὺς ἐξηρμένους ἐν ἁμαρτίαις αὐτῶν pointing
    to persons marked out/removed because of sin, the Hebrew image is best carried
    as a judgment image: ''those trampled down.'' ''Threshed'' is too literal and
    obscure in English; ''crushed'' is possible but less anchored to the Hebrew imagery.'
- source_word: בַּעֲוֹנָם
  chosen: in their iniquity
  alternatives:
  - for their iniquity
  - because of their guilt
  - in their sin
  lexicon: HALOT
  rationale: עון often denotes iniquity/guilt rather than the more general 'sin.'
    The preposition ב can be rendered variously; 'in their iniquity' stays close to
    the Hebrew while allowing the sense that their condition and judgment are bound
    up with their guilt. The Greek ἐν ἁμαρτίαις αὐτῶν likewise supports 'in their
    sins.'
