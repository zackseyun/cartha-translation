theological_decisions:
- issue: Nature of the created order's assigned roles in τὰς ἀρχὰς αὐτῶν
  chosen_reading: The verse speaks of God assigning enduring spheres or domains to
    his works within creation.
  alternative_readings:
  - The phrase refers to their beginnings or origins enduring through generations.
  rationale: The immediate context in Sirach 16 praises the ordered functioning of
    creation. Rendering ἀρχάς as 'dominions' or assigned domains better fits the logic
    of creatures continuing in their tasks without hunger, weariness, or cessation.
    The alternative 'beginnings' is lexically possible but contextually less coherent
    in English.
