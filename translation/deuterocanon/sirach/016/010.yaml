translation:
  text: So also six hundred thousand foot soldiers, those gathered together in the
    arrogance of their heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'six hundred thousand foot soldiers' likely alludes to the wilderness
      generation of Israel; compare the traditional census figure in Exodus 12:37
      and Numbers 11:21.
    reason: cross_reference
  - marker: b
    text: Or 'in the insolence of their heart' or 'in the presumptuousness of their
      heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So also
  alternatives:
  - Likewise
  - Thus also
  lexicon: HALOT
  rationale: Introduces an additional example parallel to the preceding judgments;
    'So also' preserves the connective force without sounding wooden.
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף
  chosen: six hundred thousand
  alternatives:
  - 600,000
  lexicon: HALOT
  rationale: Kept as a spelled-out cardinal number in readable literary English; matches
    the Hebrew and Greek straightforwardly.
- source_word: רַגְלִי
  chosen: foot soldiers
  alternatives:
  - infantry
  - on foot
  lexicon: HALOT
  rationale: Hebrew literally relates to those on foot; the Greek πεζῶν confirms the
    military sense. 'Foot soldiers' is clearer and more natural in English than the
    bare 'on foot' while preserving the concrete image.
- source_word: הַנֶּאֱסָפִים
  chosen: those gathered together
  alternatives:
  - those assembled
  - those who were gathered
  lexicon: HALOT
  rationale: Passive participle from אסף, referring to the group as assembled/collected.
    'Gathered together' reflects both Hebrew and the Greek ἐπισυναχθέντας.
- source_word: בִּזְדוֹן
  chosen: in the arrogance
  alternatives:
  - in insolence
  - in presumptuousness
  - in pride
  lexicon: HALOT
  rationale: זדון denotes presumptuous, insolent pride. 'Arrogance' is idiomatic modern
    English and captures the moral quality; 'pride' is broader and weaker, while 'presumptuousness'
    is accurate but less readable.
- source_word: לִבָּם
  chosen: of their heart
  alternatives:
  - of their hearts
  - in their heart
  lexicon: HALOT
  rationale: The Hebrew has singular 'heart' with plural suffix, a common collective
    idiom. 'Of their heart' preserves the singular collective sense, while still sounding
    acceptable in English.
