theological_decisions:
- issue: Identification of the six hundred thousand
  chosen_reading: Leave the referent implicit in the main text rather than naming
    Israel in translation.
  alternative_readings:
  - Interpret as the wilderness generation/allusion to the Exodus census
  rationale: The verse itself gives the number and characterizes them as gathered
    in arrogant-hearted rebellion, and the surrounding context points to historical
    examples of judgment. But the source text does not explicitly name the group here,
    so the translation should not import the identification into the main line.
  doctrine_reference: Preserve theological tension rather than resolve it; never import
    doctrinal claims the text does not make.
