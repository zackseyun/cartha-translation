translation:
  text: Even if one person is stiff-necked, it is astonishing if he will be cleared;
    for mercy and anger are with him, and he bears and forgives, but upon the wicked
    he lets his wrath rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be acquitted' or 'will go unpunished.' The Hebrew יִנָּקֶה and
      Greek ἀθῳωθήσεται both carry a forensic sense of being cleared from guilt or
      penalty.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'he lets his wrath rest upon the wicked,' an image of
      wrath settling on them rather than merely flaring up.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַקְשֶׁה עֹרֶף / σκληροτράχηλος
  chosen: stiff-necked
  alternatives:
  - hard-necked
  - stubborn
  lexicon: HALOT; LSJ
  rationale: The Hebrew idiom 'hardening the neck' and the Greek equivalent both denote
    obstinate resistance. 'Stiff-necked' preserves the biblical metaphor in natural
    English better than the flatter 'stubborn'.
- source_word: תֵּמַהּ זֶה / θαυμαστὸν τοῦτο
  chosen: it is astonishing
  alternatives:
  - this is a wonder
  - it would be surprising
  lexicon: HALOT; LSJ
  rationale: Both witnesses express amazement at the possibility stated. 'It is astonishing'
    keeps the rhetorical force without sounding archaic.
- source_word: יִנָּקֶה / ἀθῳωθήσεται
  chosen: will be cleared
  alternatives:
  - will be acquitted
  - will go unpunished
  lexicon: HALOT; LSJ
  rationale: 'The sense is forensic: to be declared free from guilt or penalty. ''Will
    be cleared'' is concise modern English and leaves room for both legal acquittal
    and escape from punishment; ''go unpunished'' is interpretive.'
- source_word: רַחֲמִים
  chosen: mercy
  alternatives:
  - compassion
  lexicon: HALOT
  rationale: The noun denotes compassionate mercy. 'Mercy' fits the paired contrast
    with anger and matches common biblical diction.
- source_word: אַף
  chosen: anger
  alternatives:
  - wrath
  lexicon: HALOT
  rationale: Here אַף is not the conjunction 'also' but the noun for anger, as the
    parallelism and following mention of wrath show. 'Anger' avoids overloading the
    verse with two instances of 'wrath'.
- source_word: וְנוֹשֵׂא
  chosen: he bears
  alternatives:
  - he endures
  - he carries away
  lexicon: HALOT
  rationale: The verb can mean to bear or carry, and in moral contexts may imply bearing
    with offense. 'He bears' preserves the compact Hebrew expression and pairs well
    with 'forgives'.
- source_word: וְסוֹלֵחַ
  chosen: forgives
  alternatives:
  - pardons
  lexicon: HALOT
  rationale: This is the standard sense of the verb in contexts of divine pardon.
    'Forgives' is the clearest modern rendering.
- source_word: יַנִּיחַ רָגְזוֹ
  chosen: he lets his wrath rest
  alternatives:
  - he lays his wrath
  - he unleashes his wrath
  - he causes his anger to settle
  lexicon: HALOT
  rationale: Literally the Hebrew speaks of causing his agitation/wrath to rest upon
    the wicked. 'Lets his wrath rest' preserves the image of wrath coming to settle
    on them, rather than merely erupting.
