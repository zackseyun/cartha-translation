theological_decisions:
- issue: Divine character expressed as both merciful and angry
  chosen_reading: The verse is rendered to preserve the tension that mercy and anger
    are both with God, followed by both forgiveness and wrath.
  alternative_readings:
  - Smoothing the line to emphasize only mercy
  - Interpreting anger as merely temporary displeasure
  rationale: The Hebrew explicitly juxtaposes mercy and anger and then balances forgiveness
    with wrath upon the wicked. Per doctrine, the translation preserves rather than
    resolves this tension.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
