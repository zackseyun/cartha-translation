  text: יְהֹוָה הִקְשָׁה אֶת לֵב פַּרְעֹה, אֲשֶׁר לֹא יְדָעוֹ, שֶׁמַעֲשָׂיו מְגֻלִּין תַּחַת הַשָּׁמַיִם.
  language: Hebrew
