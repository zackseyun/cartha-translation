translation:
  text: Yahweh hardened Pharaoh’s heart, though he did not know him, for his deeds are revealed under heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not say, “I shall be hidden from the Lord.”'' The Greek witness here differs substantially from the extant Hebrew line, suggesting a divergent textual form or verse alignment.'
    reason: textual_variant
lexical_decisions:
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Follows project doctrine for the divine name YHWH: render as ''the LORD'' rather than transliteration, matching Jewish reverence tradition and common biblical English usage.'
- source_word: הִקְשָׁה
  chosen: hardened
  alternatives:
  - made stubborn
  - made firm
  lexicon: HALOT
  rationale: The Hiphil of קשה in the Pharaoh tradition commonly means 'harden' in the sense of making obstinate or unyielding. 'Hardened' preserves the intertextual echo with Exodus and is the most natural equivalent here.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner will
  lexicon: HALOT
  rationale: Hebrew 'heart' regularly denotes the inner center of thought and will. Retaining 'heart' preserves the biblical idiom and the Exodus resonance.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name in biblical usage.
- source_word: אֲשֶׁר לֹא יְדָעוֹ
  chosen: though he did not know him
  alternatives:
  - whom he did not know
  - because he did not know him
  lexicon: HALOT
  rationale: The Hebrew relative clause most naturally refers to Pharaoh and states his lack of knowledge of the LORD. 'Though' brings out the concessive force in context without overparaphrasing. The object suffix is rendered 'him,' referring to the LORD.
- source_word: שֶׁמַעֲשָׂיו
  chosen: for his deeds
  alternatives:
  - because his works
  - that his actions
  lexicon: HALOT
  rationale: The prefixed שׁ is taken as introducing the explanatory clause ('for/because'). 'Deeds' is a natural rendering of מעשים and fits the moral context.
- source_word: מְגֻלִּין
  chosen: are revealed
  alternatives:
  - are uncovered
  - are laid bare
  - are manifest
  lexicon: HALOT
  rationale: The passive participle indicates exposure or disclosure. 'Are revealed' is idiomatic and preserves the sense that nothing is hidden from divine sight.
- source_word: תַּחַת הַשָּׁמַיִם
  chosen: under heaven
  alternatives:
  - under the heavens
  - beneath the sky
  lexicon: HALOT
  rationale: A standard biblical idiom. 'Under heaven' is concise, natural English and preserves the elevated register.
