translation:
  text: Do not desire a handsome appearance in worthless youths, and do not rejoice
    in sons of unrighteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Do not desire a multitude of useless children, and do not rejoice
      in ungodly sons.'' The Hebrew witness instead speaks of the outward appearance
      of worthless youths.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּתְאַוֶּה
  chosen: Do not desire
  alternatives:
  - Do not crave
  - Do not long for
  lexicon: HALOT
  rationale: The hitpael/imperfect with אַל gives a prohibition. 'Desire' is a clear
    modern English equivalent that preserves the volitional sense without over-intensifying
    to 'lust after.'
- source_word: תֹּאַר
  chosen: a handsome appearance
  alternatives:
  - beauty
  - form
  - good looks
  lexicon: HALOT
  rationale: Hebrew תֹּאַר commonly denotes outward form or appearance, often attractiveness.
    Because the object is not simply 'many children' in the Hebrew witness, the translation
    should preserve the focus on outward attractiveness. 'Handsome appearance' makes
    explicit that this is physical appearance, though 'beauty' is possible.
- source_word: נַעֲרֵי שָׁוְא
  chosen: worthless youths
  alternatives:
  - vain youths
  - empty youths
  - false youths
  lexicon: HALOT
  rationale: נַעֲרֵי is 'youths/young men.' שָׁוְא often carries the sense of emptiness,
    vanity, or worthlessness. 'Worthless youths' communicates the moral-practical
    force in idiomatic English better than the more opaque 'vain youths.'
- source_word: וְאַל תִּשְׂמַח
  chosen: and do not rejoice
  alternatives:
  - and do not be glad
  - and do not delight
  lexicon: HALOT
  rationale: A straightforward prohibition parallel to the first colon. 'Rejoice'
    preserves the emotional force and matches wisdom-style admonition.
- source_word: בִּבְנֵי עַוְלָה
  chosen: in sons of unrighteousness
  alternatives:
  - in children of injustice
  - in wicked sons
  - in lawless sons
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of unrighteousness/injustice.' Retaining
    'sons' follows the gender-accurate policy and preserves the Hebrew idiom, while
    'unrighteousness' reflects עַוְלָה more closely than the interpretive 'wicked.'
- source_word: Μὴ ἐπιθύμει τέκνων πλῆθος ἀχρήστων
  chosen: not adopted in main text
  alternatives:
  - Do not desire a multitude of useless children
  lexicon: BDAG
  rationale: The Greek parallel differs notably from the extant Hebrew, speaking of
    a 'multitude of useless children' rather than the 'appearance of worthless youths.'
    Since the Hebrew survives here and is the primary witness for Ben Sira where extant,
    the main text follows the Hebrew. The Greek is important enough to preserve in
    a footnote as an alternative textual form.
