theological_decisions:
- issue: Creation-order language in a textually difficult Hebrew clause
  chosen_reading: Render the verse as describing God's initial creation and his apportioning
    of ordered domains within it.
  alternative_readings:
  - 'Render more literally but obscurely: ''Upon their lives [he apportioned] their
    rule'''
  - 'Follow the Greek more closely: ''In the Lord''s judgment are his works from the
    beginning, and from their making he separated their portions'''
  rationale: The Hebrew witness is primary, but the bracketed clause is difficult
    and likely uncertain in transmission. The Greek parallel clearly witnesses an
    idea of divine ordering/apportionment from creation's beginning. The chosen rendering
    keeps the Hebrew base while allowing the Greek to clarify the sense, without importing
    extra doctrinal claims.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, using
    Greek parallel as actual input; preserve ambiguity rather than over-resolve'
