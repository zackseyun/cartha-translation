translation:
  text: When God created his works from the beginning, he assigned their domains over
    their living things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew text is difficult in the second clause. The Greek parallel reads,
      'and from their making he separated their portions,' which supports the sense
      of apportioning ordered domains.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּבְרֹא
  chosen: When [he] created
  alternatives:
  - as [he] created
  - at [the time of] creating
  lexicon: HALOT
  rationale: The prefixed כ here is best taken temporally with the infinitive construct
    of ברא, yielding 'when [he] created.' This fits the clause structure and aligns
    with the Greek's temporal framing 'from the beginning.'
- source_word: אֵל
  chosen: God
  alternatives:
  - God Almighty
  - the Mighty One
  lexicon: HALOT
  rationale: אֵל is the straightforward divine title 'God' here. No contextual marker
    requires a more expanded rendering.
- source_word: מַעֲשָׂיו
  chosen: his works
  alternatives:
  - his deeds
  - what he made
  lexicon: HALOT
  rationale: The noun refers to the things God made in creation. 'Works' preserves
    the formal link to creation language while remaining natural English.
- source_word: מֵרֹאשׁ
  chosen: from the beginning
  alternatives:
  - at the beginning
  - from first
  lexicon: HALOT
  rationale: This phrase naturally denotes the starting point of creation ordering.
    'From the beginning' also coheres with the Greek ἀπ’ ἀρχῆς.
- source_word: עַל חַיֵּיהֶם
  chosen: over their living things
  alternatives:
  - for their lives
  - according to their life
  - for their living beings
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult. Taken with the bracketed continuation,
    it most plausibly points to what belongs to or lives within the created orders.
    The Greek parallel speaks of distinguishing 'their portions,' suggesting an assignment
    within creation. 'Over their living things' preserves the sense of ordered domains
    without overcommitting to a speculative reconstruction.
- source_word: חָלָק
  chosen: he assigned
  alternatives:
  - he divided
  - he apportioned
  - he distributed
  lexicon: HALOT
  rationale: The verb/root idea is division or apportionment. In context of creation
    order, 'assigned' communicates the act of allotting roles or spheres in readable
    English.
- source_word: מִשְׁטָרָם
  chosen: their domains
  alternatives:
  - their rule
  - their government
  - their order
  - their authority
  lexicon: HALOT
  rationale: מִשטר denotes rule, governance, or ordered administration. In a creation
    context, 'domains' captures allotted spheres under divine ordering and avoids
    implying autonomous political government. The Greek's 'he separated their portions'
    supports an allotment sense.
