translation:
  text: Many who were exalted have been greatly disgraced, and brought low together;
    even the honored have been given into another's hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a substantially different reading here: ''Before you examine,
      do not blame; first understand, and then rebuke.'' The translation follows the
      extant Hebrew witness, per project policy for Sirach where Hebrew survives.'
    reason: alternative_reading
lexical_decisions:
- source_word: רַבִּים
  chosen: Many
  alternatives:
  - Many people
  - Many men
  lexicon: HALOT
  rationale: Quantifier used substantivally; 'Many' is concise and natural in English
    without adding 'people' unless needed.
- source_word: נִשָּׂאִים
  chosen: were exalted
  alternatives:
  - were lifted up
  - were elevated
  lexicon: HALOT
  rationale: Passive participial sense from נשׂא, here denoting raised status or prominence
    rather than literal lifting. 'Were exalted' best captures social elevation in
    this wisdom context.
- source_word: נִקְלוּ
  chosen: have been greatly disgraced
  alternatives:
  - have become very contemptible
  - have been treated with great contempt
  - have been dishonored greatly
  lexicon: HALOT
  rationale: From קלל/קלה in the sense of being slighted or held cheap. 'Disgraced'
    communicates the reversal from exaltation to humiliation more idiomatically than
    'made light' or 'contemptible.' 'Greatly' renders מְאֹד.
- source_word: וְהִשְׁפִּלוּ
  chosen: and brought low
  alternatives:
  - and were humbled
  - and were cast down
  lexicon: HALOT
  rationale: 'The form is somewhat compressed in the Hebrew tradition, but the sense
    is clear in context: lowering/humbling after prior exaltation. ''Brought low''
    preserves the passive-result sense in smooth English and aligns with the reversal
    motif.'
- source_word: יַחַד
  chosen: together
  alternatives:
  - altogether
  - at once
  lexicon: HALOT
  rationale: Adverb indicating collective or simultaneous action. 'Together' is the
    most straightforward rendering, though in English it functions adverbially with
    the clause.
- source_word: וְגַם
  chosen: even
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: 'Here the conjunction intensifies the statement: not only many generally,
    but even those regarded as honored. ''Even'' captures that rhetorical force better
    than a flat ''also.'''
- source_word: נִכְבָּדִים
  chosen: the honored
  alternatives:
  - the noble
  - the distinguished
  - the weighty ones
  lexicon: HALOT
  rationale: From כבד in the sense of honor/status. 'The honored' is broad enough
    to include socially eminent persons without over-specifying hereditary nobility.
- source_word: נִתְּנוּ בְיָד
  chosen: have been given into another's hand
  alternatives:
  - have been handed over
  - have been delivered into the hand of another
  - have been put under another's power
  lexicon: HALOT
  rationale: Hebrew idiom for being delivered into someone else's power or control.
    The phrase likely implies subjection rather than a literal hand. 'Into another's
    hand' preserves the idiom while making the implied object explicit for English
    clarity.
