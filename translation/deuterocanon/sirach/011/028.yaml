theological_decisions:
- issue: Relation of Hebrew wording to divergent Greek parallel
  chosen_reading: Translate the extant Hebrew directly, while allowing the Greek to
    confirm the verse's admonitory thrust rather than importing the Greek's substantially
    different wording into the main text.
  alternative_readings:
  - 'Greek-based rendering: ''Before the end do not call anyone blessed, and in his
    children a man will be known.'''
  rationale: For Sirach, surviving Hebrew has primacy where extant. Here the Greek
    parallel is not a close verbal match but reflects a related wisdom theme. The
    main text therefore follows the Hebrew witness, with the Greek preserved as an
    alternative reading note because the divergence is significant.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input without displacing Hebrew primacy.'
