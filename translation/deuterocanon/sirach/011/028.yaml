translation:
  text: Do not say, “Look, I have done what I desired; and what now will be lacking
    to me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: “Before the end do not call anyone blessed, and in his
      children a man will be known.” The Hebrew witness here instead warns against
      saying, “I have done what I desired; what now will be lacking to me?”'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֹּאמַר
  chosen: Do not say
  alternatives:
  - Do not declare
  - Never say
  lexicon: HALOT
  rationale: Straightforward prohibition with negative particle plus imperfect/jussive
    force; idiomatic English imperative is best.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces self-satisfied assertion. 'Look' preserves the deictic force
    in readable modern English better than archaic 'behold'.
- source_word: עָשִׂיתִי
  chosen: I have done
  alternatives:
  - I did
  - I have accomplished
  lexicon: HALOT
  rationale: Perfect verb rendered as present-result English perfect, fitting the
    speaker's claim of completed achievement.
- source_word: חֶפְצִי
  chosen: what I desired
  alternatives:
  - my desire
  - my pleasure
  - what I wanted
  lexicon: HALOT
  rationale: The noun denotes desire/pleasure/will. 'What I desired' makes the clause
    natural in English while preserving the sense of fulfilling one's own wish.
- source_word: וּמֶה עַתָּה
  chosen: what now
  alternatives:
  - and what now
  - what then now
  lexicon: HALOT
  rationale: Retains the rhetorical transition from self-congratulation to presumed
    security. The conjunction is absorbed idiomatically into English word order.
- source_word: יֵעָזֵב לִי
  chosen: will be lacking to me
  alternatives:
  - will be left for me
  - will fail me
  - will be withheld from me
  lexicon: HALOT
  rationale: The Hebrew as transmitted can suggest 'be left/remain' or, contextually,
    'be lacking/fail.' Given the boastful context, the sense is 'what could I still
    lack?' This also aligns with the Greek parallel's warning against premature self-blessing
    before the end.
