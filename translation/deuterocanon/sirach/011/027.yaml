translation:
  text: The blessing of God is the lot of the righteous, and at the time of his hope
    it will blossom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''The blessing of God is the lot of the righteous, and at the time
      of his hope it will blossom.'' The Greek parallel reads quite differently: ''An
      evil hour brings forgetfulness of luxury, and at a man''s end there is a revealing
      of his works.'' This suggests a divergent textual tradition for this verse.'
    reason: textual_variant
  - marker: b
    text: Or 'his hope will blossom.' The Hebrew verb can be understood with either
      'blessing' or 'hope' as its referent.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְכַּת
  chosen: the blessing of
  alternatives:
  - a blessing of
  - blessing from
  lexicon: HALOT
  rationale: Construct form of ברכה; rendered with definite sense because the following
    construct chain presents a general truth about divine blessing.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Most High
  - the Mighty One
  lexicon: HALOT
  rationale: אל here is the common divine title. 'God' is the plain English equivalent
    and fits the wisdom context without importing a more specific title not present
    in the Hebrew.
- source_word: גּוֹרָל
  chosen: the lot
  alternatives:
  - portion
  - inheritance
  - destiny
  lexicon: HALOT
  rationale: גורל literally denotes a lot or allotted portion. 'Lot' preserves the
    concrete metaphor and can naturally express what falls to someone by divine allotment.
    'Destiny' would over-interpret; 'inheritance' is possible but less direct.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the just man
  - the righteous man
  lexicon: HALOT
  rationale: Adjective used substantivally. 'The righteous' preserves the generic
    class sense without unnecessarily narrowing to an individual male, while still
    matching the Hebrew's moral category.
- source_word: וּבְעֵת
  chosen: and at the time of
  alternatives:
  - and in the time of
  - and when
  lexicon: HALOT
  rationale: Retains the temporal phrase explicitly rather than collapsing it into
    a looser clause.
- source_word: תִּקְוָתוֹ
  chosen: his hope
  alternatives:
  - his expectation
  - what he hopes for
  lexicon: HALOT
  rationale: תקוה commonly means hope or expectation. 'His hope' is concise and preserves
    the ambiguity between the act/object of hoping. The masculine singular suffix
    is retained as singular English in line with gender-accurate policy for representative
    singulars.
- source_word: תִּפְרָח
  chosen: it will blossom
  alternatives:
  - it will flourish
  - it will sprout
  lexicon: HALOT
  rationale: From פרח, to bud/blossom. The feminine singular verb most naturally refers
    back to the blessing. 'Blossom' preserves the vivid organic image better than
    the more abstract 'flourish'.
