theological_decisions:
- issue: Referent of the feminine singular verb תִּפְרָח
  chosen_reading: 'The verb refers to ''the blessing of God'' as the subject: ''it
    will blossom.'''
  alternative_readings:
  - The righteous person's hope will blossom.
  - The line is textually unstable and may reflect a different Vorlage, as suggested
    by the divergent Greek.
  rationale: In the Hebrew, the nearest suitable feminine singular antecedent is ברכת
    ('blessing'), whereas תקותו ('his hope') is morphologically feminine in form but
    semantically attached to the man's expectation; either could be heard as antecedent
    in translation. Rendering 'it will blossom' preserves the Hebrew ambiguity while
    allowing the blessing to remain the most natural referent. The Greek parallel
    is substantially different and appears to reflect another textual form, so the
    Hebrew witness remains primary but the divergence should be noted.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
