translation:
  text: The bee is small among flying creatures, but the chief of produce is its fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The bee is small among birds, and its fruit is the chief of sweet things.'
      The Hebrew speaks of 'produce/yields,' while the Greek parallel specifies 'sweet
      things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלִיל
  chosen: small
  alternatives:
  - insignificant
  - slight
  - tiny
  lexicon: HALOT
  rationale: In context with בעוף and the Greek μικρά, the adjective describes littleness
    or slightness, not idolatry or worthlessness. 'Small' is the clearest natural
    English equivalent and matches the proverb's contrast.
- source_word: בְּעוֹף
  chosen: among flying creatures
  alternatives:
  - among birds
  - among winged things
  lexicon: HALOT
  rationale: Hebrew עוף can denote flying creatures more broadly than 'birds.' The
    Greek πετεινοῖς likewise points to flying creatures. 'Among flying creatures'
    preserves the broader zoological category while remaining readable.
- source_word: דְּבֹרָה
  chosen: the bee
  lexicon: HALOT
  rationale: Straightforward lexical rendering; the definite sense is natural in English
    proverbial style.
- source_word: וְרֹאשׁ
  chosen: but the first
  alternatives:
  - and the chief
  - and the beginning
  lexicon: HALOT
  rationale: 'ראש here introduces the contrasting second colon: though the bee is
    small, what comes from it ranks first. ''But the first'' brings out the adversative
    force implied by the parallelism while preserving the sense of primacy.'
- source_word: תְּנוּבוֹת
  chosen: sweet produce
  alternatives:
  - produce
  - yield
  - harvests
  lexicon: HALOT
  rationale: Hebrew תנובות means produce/yield, but the Greek parallel γλυκασμάτων
    ('sweet things, sweets') clarifies the kind of produce in view. 'Sweet produce'
    keeps the Hebrew agricultural image while incorporating the Greek's semantic specificity.
- source_word: פּרִיָהּ
  chosen: its fruit
  alternatives:
  - its produce
  - what it yields
  lexicon: HALOT
  rationale: Literally 'its fruit.' Though referring to honey, the Hebrew metaphor
    should be preserved. The Greek ὁ καρπὸς αὐτῆς confirms this wording.
