theological_decisions:
- issue: Divergence between surviving Hebrew and Greek parallel
  chosen_reading: Translate the extant Hebrew as the primary witness while allowing
    the Greek to inform the contextual sense of the difficult Hebrew term בחקך.
  alternative_readings:
  - 'Translate from the Greek alone: ''Do not say, I am self-sufficient, and what
    harm shall come to me from now on?'''
  rationale: For Sirach, where Hebrew survives, project policy gives Hebrew primacy.
    Here the Hebrew and Greek differ substantially, suggesting either variant Vorlage
    or textual instability. The English main text therefore follows the Hebrew wording,
    but the Greek is preserved in a footnote because it is a significant alternative
    witness and helps explain the contextual force of the Hebrew exhortation.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    parallel Greek as actual input and preserve uncertainty honestly.'
