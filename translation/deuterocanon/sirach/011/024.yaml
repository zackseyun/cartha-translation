translation:
  text: My son, stand by your appointed lot and walk in it, and grow old in your work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek witness: ''Do not say, “I am self-sufficient, and what harm shall
      come to me from now on?”'' The surviving Hebrew here differs substantially from
      the Greek tradition.'
    reason: alternative_reading
  - marker: b
    text: Hebrew בחקך is difficult. It may mean something like 'your allotted portion,'
      'your prescribed sphere,' or 'your rule/way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative of address with masculine singular form. Per gender-accurate
    philosophy, 'My son' preserves the paternal instruction setting better than a
    neutralized 'My child'.
- source_word: עֲמוֹד
  chosen: stand by
  alternatives:
  - stand
  - remain firm in
  - persist in
  lexicon: HALOT
  rationale: Imperative of עמד. 'Stand by' captures both the literal stance and the
    idiomatic sense of remaining committed to something, fitting the exhortational
    context.
- source_word: בְּחֻקֶּךָ
  chosen: your allotted way
  alternatives:
  - your statute
  - your portion
  - your prescribed task
  lexicon: HALOT
  rationale: The Hebrew as transmitted is unusual here if read as the common 'statute/law.'
    In context, and with the Greek parallel warning against self-sufficient presumption,
    the sense is one's assigned lot or prescribed sphere. 'Your allotted way' preserves
    the idea of a fixed, given course without overcommitting to a legal sense.
- source_word: וּבוֹ הִתְהַלֵּךְ
  chosen: and walk in it
  alternatives:
  - and conduct yourself in it
  - and keep to it
  lexicon: HALOT
  rationale: התהלך commonly denotes ongoing conduct. 'Walk in it' is natural English
    and preserves the Hebrew metaphor of manner of life.
- source_word: וּבִמְלָאכְתְּךָ
  chosen: in your work
  alternatives:
  - in your labor
  - at your occupation
  - in your task
  lexicon: HALOT
  rationale: מלאכה denotes work, occupation, or labor. 'Work' is the most natural
    broad rendering in modern English.
- source_word: הִתְיַשֶּׁן
  chosen: grow old
  alternatives:
  - wear yourself out
  - become old
  - spend your old age
  lexicon: HALOT
  rationale: From ישׁן/התיישן in the sense of becoming old. In context it exhorts
    perseverance in one's occupation over time, not exhaustion. 'Grow old' best reflects
    duration and settled continuance.
