theological_decisions:
- issue: Gendered filial address in wisdom instruction
  chosen_reading: My son
  alternative_readings:
  - My child
  rationale: The Hebrew explicitly uses a masculine singular filial vocative. Per
    doctrine, gender-accurate rendering is preferred unless context clearly demands
    generic neutralization. Here the conventional wisdom-teaching address is best
    preserved in the main text.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
- issue: Primary witness and relation to divergent Greek parallel
  chosen_reading: Translate the extant Hebrew proverb directly, while noting the Greek
    parallel differs substantially.
  alternative_readings:
  - Translate toward the Greek sense of weakness and divine uplift
  rationale: For Sirach, surviving Hebrew is primary where available. The Greek parallel
    for this verse is markedly different in content, suggesting either a different
    Vorlage or significant textual divergence. The main text therefore follows the
    Hebrew witness, with the Greek divergence preserved in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md ''What we are translating'' and DOCTRINE.md §Translation
    philosophy #1'
