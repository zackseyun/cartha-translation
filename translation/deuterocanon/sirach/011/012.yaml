translation:
  text: My son, if you do not run, you will not attain; and if you do not seek, you
    will not find.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness at this point differs substantially, reading instead about
      a person who is sluggish, lacking strength, and poor, whom the eyes of the Lord
      look upon for good and raise from humiliation. The Hebrew here is therefore
      followed as the primary witness, with the Greek preserved as a significant alternative
      textual tradition.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative address from בן with 1cs suffix. 'My son' preserves the masculine
    singular form and the father-to-son instructional tone typical of wisdom literature;
    this follows the project's gender-accurate policy rather than neutralizing to
    'child'.
- source_word: תָּרוּץ
  chosen: run
  alternatives:
  - hasten
  - strive
  lexicon: HALOT
  rationale: From רוץ, literally 'run.' The Hebrew image is concrete and proverbial;
    'run' preserves the metaphor of energetic effort better than a more interpretive
    gloss. The Greek parallel's portrayal of weakness and need for help points to
    effort and ability themes, but the Hebrew wording here is straightforwardly imperative/proverbial.
- source_word: תַגִּיעַ
  chosen: attain
  alternatives:
  - reach
  - arrive
  - obtain
  lexicon: HALOT
  rationale: From נגע/הגיע in the sense of reaching or attaining. 'Attain' fits the
    proverbial sense of achieving a goal better than the more spatial 'arrive' and
    is less material than 'obtain.' Because the source note flags a minor mismatch
    and the form is slightly uncertain in transmission, a broad but faithful English
    verb is preferable.
- source_word: תְּבַקֵּשׁ
  chosen: seek
  alternatives:
  - search for
  - ask for
  lexicon: HALOT
  rationale: From בקש, commonly 'seek.' 'Seek' preserves both literal and figurative
    range and matches the parallelism with 'find.'
- source_word: תִמְצָא
  chosen: find
  alternatives:
  - discover
  lexicon: HALOT
  rationale: From מצא, standard 'find.' The pair 'seek/find' is idiomatic in English
    and closely reflects the Hebrew parallelism.
