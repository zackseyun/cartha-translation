translation:
  text: Do not praise a man for his appearance, and do not despise a man who is ugly
    in his looks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not praise a man in his beauty, and do not despise
      a person in his appearance.'' The Hebrew''s first clause is broader (''appearance'')
      while the Greek narrows it to ''beauty.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תְּהַלֵּלו
  chosen: Do not praise
  alternatives:
  - Do not commend
  - Do not extol
  lexicon: HALOT
  rationale: The Hebrew verb הלל in the piel commonly means to praise or extol. 'Praise'
    is the most natural modern English equivalent and matches the Greek αἰνέσῃς.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - a person
  - someone
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם refers to an individual human being in parallel clauses, not
    humanity in general. Per the project's gender-accurate policy, 'a man' best reflects
    the singular masculine/generic form used in the Hebrew and supported by Greek
    ἄνδρα/ἄνθρωπον.
- source_word: בְּתָאֳרוֹ
  chosen: for his appearance
  alternatives:
  - for his form
  - for his beauty
  lexicon: HALOT
  rationale: תֹּאַר denotes outward form or appearance. Although the Greek has κάλλει
    ('beauty'), the Hebrew points more broadly to physical appearance; 'appearance'
    preserves the Hebrew while still fitting the sense.
- source_word: וְאַל תְּתַעֵב
  chosen: and do not despise
  alternatives:
  - and do not abhor
  - and do not loathe
  lexicon: HALOT
  rationale: תעב conveys strong rejection or abhorrence. 'Despise' is idiomatic and
    suitably strong in English without sounding archaic; the Greek βδέλυξῃ supports
    a strong negative response.
- source_word: מְכוֹעָר
  chosen: who is ugly
  alternatives:
  - who is unattractive
  - who is deformed
  lexicon: HALOT
  rationale: The adjective means ugly or unsightly. 'Ugly' is the plainest and most
    direct rendering. 'Deformed' would over-specify beyond the source.
- source_word: בְּמַרְאֵהוּ
  chosen: in his looks
  alternatives:
  - in appearance
  - in what is seen of him
  lexicon: HALOT
  rationale: מַרְאֶה refers to visible appearance. 'In his looks' keeps the concrete
    focus of the Hebrew and preserves the parallel with the first clause without becoming
    overly repetitive.
