translation:
  text: Do not mock a poor man, and do not boast in bitter days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not boast in a garment of clothing, and do not exalt
      yourself in a day of glory; for the works of the Lord are wonderful, and his
      works among men are hidden.'''
    reason: textual_variant
  - marker: b
    text: Or 'a worn-out cloak' or 'a tattered garment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲטֶה
  chosen: cloak
  alternatives:
  - garment
  - covering
  - robe
  lexicon: HALOT
  rationale: The Hebrew denotes an outer covering or garment. 'Cloak' gives a concrete,
    natural English equivalent and fits the Greek parallel's reference to clothing.
    It also preserves the image of outward appearance rather than abstract status.
- source_word: אֹבֵד
  chosen: poor
  alternatives:
  - worn-out
  - perishing
  - failing
  - tattered
  lexicon: HALOT
  rationale: The participle from אבד literally suggests something lost, ruined, or
    perishing. In context with a garment, the sense is of a shabby or poor-quality
    cloak. 'Poor' is idiomatic English for inferior clothing, while the alternatives
    are preserved because the Hebrew could also suggest 'worn-out' or 'tattered.'
- source_word: אַל תְּהַתֵּל
  chosen: do not boast
  alternatives:
  - do not glory
  - do not vaunt yourself
  - do not exult
  lexicon: HALOT
  rationale: The prohibition concerns self-exaltation based on outward appearance.
    The Greek parallel uses a verb of boasting, which supports rendering the Hebrew
    as 'do not boast' rather than a more opaque English equivalent.
- source_word: תְּקַלֵּס
  chosen: praise yourself
  alternatives:
  - glorify yourself
  - exalt yourself
  - boast
  lexicon: HALOT
  rationale: 'The piel form conveys praising or extolling. In this admonitory parallelism,
    the reflexive sense is implied by context: one is warned against self-congratulation.
    ''Praise yourself'' keeps the lexical force distinct from the first colon''s ''boast''
    while remaining idiomatic.'
- source_word: בִּמְרִירֵי יוֹם
  chosen: in bitter days
  alternatives:
  - on a bitter day
  - in days of bitterness
  - in a day of glory
  lexicon: HALOT
  rationale: The Hebrew phrase literally points to bitterness or hard times. The Greek
    parallel instead reads 'in a day of glory,' indicating a divergent Vorlage or
    interpretive tradition. Because the Hebrew survives here and is the primary witness,
    the main text follows the Hebrew, while the Greek alternative is preserved in
    a footnote.
