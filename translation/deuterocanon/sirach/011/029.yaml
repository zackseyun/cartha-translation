theological_decisions:
- issue: Divergent Hebrew and Greek forms of Sirach 11:29
  chosen_reading: Follow the extant Hebrew as the main text, with the Greek preserved
    in a footnote.
  alternative_readings:
  - 'Translate the Greek as the main text: ''Do not bring every person into your house,
    for many are the ambushes of the deceitful.'''
  rationale: For Sirach, the project translates from the Hebrew where it survives
    and from the Greek where it does not. Here the Hebrew is present with high confidence,
    but the Greek parallel is substantially different and therefore materially relevant.
    To remain transparent and honest about the textual situation, the Hebrew governs
    the main rendering while the Greek is preserved as an alternative reading in a
    footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly'
