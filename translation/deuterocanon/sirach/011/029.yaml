translation:
  text: Do not say, “I have enough before me; what disaster could come upon me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, “Do not bring every person into your house, for many are the
      ambushes of the deceitful.” This reflects a substantially different textual
      form of the verse.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֹּאמַר
  chosen: Do not say
  alternatives:
  - Do not think
  - Never say
  lexicon: HALOT
  rationale: Straightforward negative imperative of אמר. 'Say' preserves the directness
    of the admonition better than a more interpretive 'think'.
- source_word: דַּיִּי
  chosen: I have enough
  alternatives:
  - It is enough for me
  - I am satisfied
  lexicon: HALOT
  rationale: From די 'enough, sufficiency.' The idiomatic first-person sense is best
    conveyed in English as 'I have enough.' 'I am satisfied' is possible but shifts
    from objective sufficiency to subjective contentment.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in front of me
  - at hand
  - available to me
  lexicon: HALOT
  rationale: Literally 'before me.' Kept in the main text because it is intelligible
    in English and preserves the Hebrew image of resources lying before a person.
    The phrase can imply what is presently at hand, but a more dynamic rendering would
    over-interpret.
- source_word: מַה אָסוֹן
  chosen: what disaster
  alternatives:
  - what harm
  - what calamity
  lexicon: HALOT
  rationale: אָסוֹן denotes serious harm/disaster. 'Disaster' captures the gravity
    better than the broader 'harm.'
- source_word: יְהִי עָלָי
  chosen: could come upon me
  alternatives:
  - would be upon me
  - might happen to me
  - could befall me
  lexicon: HALOT
  rationale: The Hebrew is literally 'will/be upon me,' but in this rhetorical question
    English idiom is better served by 'could come upon me,' expressing presumptuous
    denial of future misfortune. 'Befall me' is accurate but slightly archaic for
    the project's style.
- source_word: Μὴ πάντα ἄνθρωπον εἴσαγε εἰς τὸν οἶκόν σου
  chosen: not adopted in main text
  alternatives:
  - Do not bring every person into your house
  lexicon: BDAG
  rationale: The Greek parallel reflects a substantially different line, likely a
    divergent textual tradition rather than a close verbal equivalent of the extant
    Hebrew. Because the Hebrew witness is available and designated primary, the main
    translation follows the Hebrew; the Greek is preserved in a footnote as an alternative
    reading.
- source_word: πολλὰ γὰρ τὰ ἔνεδρα τοῦ δολίου
  chosen: not adopted in main text
  alternatives:
  - for many are the ambushes of the deceitful
  lexicon: BDAG
  rationale: This Greek clause supports the alternate textual form of the verse and
    cannot be harmonized naturally with the Hebrew wording without conflation. It
    is therefore documented as an alternative reading rather than merged into the
    translation.
