translation:
  text: Before death, do not call a man blessed, for in his end a man is made known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel reads quite differently: ''Beware of an evildoer, for
      he devises evil, lest he put a blemish on you forever.'' This likely reflects
      a different textual form; the Hebrew is followed here as the primary witness.'
    reason: alternative_reading
  - marker: b
    text: Or 'do not pronounce a man happy/fortunate.'
    reason: lexical_alternative
  - marker: c
    text: Or 'at his end a man is recognized' or 'becomes evident.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי מָוֶת
  chosen: Before death
  alternatives:
  - Before dying
  - Prior to death
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'Before death' preserves the Hebrew
    idiom concisely and matches the warning not to make a final judgment too early.
- source_word: אַל תְּאַשֶּׁר
  chosen: do not call ... blessed
  alternatives:
  - do not pronounce ... happy
  - do not deem ... fortunate
  lexicon: HALOT
  rationale: From אשר in the declarative sense 'to call blessed/happy.' 'Call blessed'
    preserves the evaluative force better than the flatter 'consider fortunate,' and
    fits wisdom-language about judging a person's state.
- source_word: גָּבֶר
  chosen: a man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and in wisdom literature
    often representative. Per project policy, a gender-accurate rendering is preferred
    over flattening to a gender-neutral term.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' is natural and preserves
    the proverbial style.
- source_word: בְּאַחֲרִיתוֹ
  chosen: in his end
  alternatives:
  - at his end
  - in his latter end
  - in the end of his life
  lexicon: HALOT
  rationale: אַחֲרִית can mean end, latter end, or outcome. Here the immediate context
    'before death' points to a person's final outcome/end of life. 'In his end' keeps
    the Hebrew terseness while allowing both temporal and evaluative nuance.
- source_word: יִנָּכֵר
  chosen: is made known
  alternatives:
  - is recognized
  - becomes evident
  - is revealed
  lexicon: HALOT
  rationale: The verb from נכר can carry the sense of being recognized or becoming
    known/distinguished. Given the proverb's point, the person's true character or
    condition becomes evident only at the end. 'Is made known' preserves that passive/resultative
    sense without over-interpreting.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - one
  lexicon: HALOT
  rationale: The second generic masculine noun reinforces the representative singular.
    Rendering it again as 'a man' preserves the Hebrew parallelism, though English
    readers may hear it generically.
