theological_decisions:
- issue: Generic masculine language in Hebrew wisdom style
  chosen_reading: Retain 'man' in both clauses
  alternative_readings:
  - person
  - anyone
  - one
  rationale: The verse uses גבר and איש in generic masculine singular form. Following
    the project's gender-accurate policy, the translation keeps the masculine representative
    form rather than neutralizing it, while understanding the proverb as broadly applicable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sense of the final clause
  chosen_reading: '''in his end a man is made known'''
  alternative_readings:
  - '''at the end of his life a person is recognized'''
  - '''in his outcome a man becomes evident'''
  rationale: The Hebrew points to a person's true status becoming clear only in the
    end. The Greek parallel in Zone 1 diverges substantially and appears to reflect
    a different textual form, so the Hebrew witness remains primary here while the
    note preserves the Greek evidence.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives,
    using Greek in view'
