theological_decisions:
- issue: Divine name rendering
  chosen_reading: the Lord
  alternative_readings:
  - Yahweh
  - the LORD
  rationale: The Hebrew has יי as a reverential writing of the divine name. Per project
    doctrine, the default English rendering is 'the Lord' in deuterocanonical contexts
    as well.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH | the LORD'
- issue: Competing Hebrew and Greek forms of the verse
  chosen_reading: Follow the extant Hebrew as main text, with the Greek as an alternative
    footnote
  alternative_readings:
  - For it is easy before the Lord, on the day of death, to repay a man according
    to his ways.
  rationale: Zone 1 provides a high-confidence Hebrew witness for this verse, and
    project philosophy gives primacy to Hebrew for Sirach where it survives. The Greek
    is still used as a real input and reveals a materially different form of the verse,
    so it should be preserved for transparency rather than ignored.
  doctrine_reference: 'PHILOSOPHY.md: Sefaria Ben Sira ... we translate from the Hebrew
    where it survives and from the Greek where it does not.'
