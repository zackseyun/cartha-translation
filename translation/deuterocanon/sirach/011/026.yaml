translation:
  text: For it is easy in the eyes of the Lord, in a sudden moment, to make a poor
    man rich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''For it is easy before the Lord, on the day of death, to repay
      a man according to his ways.'' The Greek reflects a substantially different
      form of the verse than the extant Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: נֹכַח
  chosen: easy
  alternatives:
  - plain
  - straightforward
  - light
  lexicon: HALOT
  rationale: In context with בְּעֵינֵי יי and the Greek parallel κοῦφον ('light/easy'),
    the sense is that the action is effortless for the Lord, not merely visible or
    direct.
- source_word: בְּעֵינֵי יי
  chosen: in the eyes of the Lord
  alternatives:
  - before the Lord
  - in the sight of the Lord
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom while remaining
    natural in English. 'Lord' follows the project's default for the divine name.
- source_word: בְּפֶתַע פִּתְאֹם
  chosen: in a sudden moment
  alternatives:
  - suddenly
  - in an instant
  - all at once
  lexicon: HALOT
  rationale: The doubled expression intensifies suddenness. 'In a sudden moment' keeps
    the temporal force and some of the emphatic feel without sounding wooden.
- source_word: לְהַעֲשִׁיר
  chosen: to make ... rich
  alternatives:
  - to enrich
  lexicon: HALOT
  rationale: The Hiphil causative is best represented by 'to make rich'; this is slightly
    more transparent than the more abstract 'to enrich'.
- source_word: דָּל
  chosen: poor man
  alternatives:
  - the poor
  - a poor person
  lexicon: HALOT
  rationale: The singular adjective/noun refers to an impoverished individual. 'Poor
    man' is gender-accurate to the Hebrew's singular personal reference and fits the
    wisdom-style generic usage.
- source_word: ὅτι κοῦφον ἔναντι Κυρίου
  chosen: For it is easy in the eyes of the Lord
  alternatives:
  - For it is light before the Lord
  - For it is easy before the Lord
  lexicon: BDAG
  rationale: The Greek parallel confirms the Hebrew sense of ease/effortlessness and
    supports the causal opening 'For'.
- source_word: ἐν ἡμέρᾳ τελευτῆς ἀποδοῦναι ἀνθρώπῳ κατὰ τὰς ὁδοὺς αὐτοῦ
  chosen: not adopted in main text
  alternatives:
  - on the day of death to repay a man according to his ways
  lexicon: BDAG
  rationale: The Greek parallel diverges substantially from the extant Hebrew, likely
    reflecting a different Vorlage or textual development. Because the Hebrew survives
    here and is the primary witness for Sirach where extant, the main text follows
    the Hebrew, while the Greek alternative is preserved in a footnote.
