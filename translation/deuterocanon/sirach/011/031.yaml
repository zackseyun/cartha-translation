translation:
  text: An evil hour makes pleasure be forgotten, and a man's end tells about him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''For while turning good things into evil he lies in wait,
      and on what is chosen he will place blame.'' The Hebrew and Greek witnesses
      differ notably here; the main text follows the extant Hebrew as the primary
      witness for Sirach where available.'
    reason: textual_variant
lexical_decisions:
- source_word: עֵת רָעָה
  chosen: an evil hour
  alternatives:
  - a bad time
  - a time of trouble
  - an evil time
  lexicon: HALOT
  rationale: עֵת is 'time/season,' but in concise wisdom style 'hour' gives a natural
    English singular event-like sense. רָעָה here denotes adversity or misfortune
    rather than moral evil alone; 'evil hour' preserves the Hebrew idiom and the sharpness
    of the saying.
- source_word: תְּשַׁכֵּח
  chosen: makes ... be forgotten
  alternatives:
  - causes ... to be forgotten
  - makes one forget
  lexicon: HALOT
  rationale: The Hiphil of שכח is causative. The object is תענוג, so the sense is
    that adverse circumstances cause prior delight to be forgotten. 'Makes pleasure
    be forgotten' keeps the causative force without over-specifying the subject.
- source_word: תַּעֲנוּג
  chosen: pleasure
  alternatives:
  - delight
  - enjoyment
  lexicon: HALOT
  rationale: The noun denotes delight or pleasurable enjoyment. 'Pleasure' is concise
    and idiomatic in English wisdom literature.
- source_word: וְסוֹף אָדָם
  chosen: and a man's end
  alternatives:
  - and the end of a man
  - and a person's end
  - and the end of humankind
  lexicon: HALOT
  rationale: סוֹף is 'end/outcome.' אָדָם here is singular and individualizing in
    context, not collective humanity. Per doctrine, a gender-accurate rendering is
    preferred where the source intends generic man; 'a man's end' preserves the proverbial
    singular.
- source_word: יַגִּיד עָלָיו
  chosen: tells about him
  alternatives:
  - declares concerning him
  - reveals him
  - tells what he is
  lexicon: HALOT
  rationale: נגד in Hiphil means 'tell, declare, make known.' With עָלָיו, the sense
    is that a person's end reveals or speaks concerning that person. 'Tells about
    him' is readable and stays close to the Hebrew. The Greek parallel supports a
    revelatory sense, though it diverges in wording.
