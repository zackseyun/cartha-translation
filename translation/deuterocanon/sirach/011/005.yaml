translation:
  text: For the works of the Lord are wondrous, and his work is hidden from man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from humankind.' Hebrew 'from man' uses a singular generic term for
      humanity.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel for this verse differs substantially: ''Many tyrants
      sat on the ground, but the unimagined one wore a crown.'' The Hebrew and Greek
      witnesses appear to reflect different textual forms at this point.'
    reason: textual_variant
lexical_decisions:
- source_word: פְלָאוֹת
  chosen: wondrous
  alternatives:
  - wonderful
  - marvelous
  lexicon: HALOT
  rationale: From the root פלא, denoting what is extraordinary or marvelous. 'Wondrous'
    preserves the elevated sense while fitting the predicate construction in English.
- source_word: מַעֲשֵׂי
  chosen: the works of
  alternatives:
  - deeds of
  - acts of
  lexicon: HALOT
  rationale: Plural construct of מעשה. 'Works' is a natural and sufficiently formal
    rendering for God's actions or productions here.
- source_word: יי
  chosen: the Lord
  alternatives:
  - YHWH
  - the LORD
  rationale: The Hebrew writes the divine name reverentially. Per project doctrine,
    the default English rendering for YHWH is 'the LORD'; however, because the source
    here uses the abbreviated reverential form יי rather than full יהוה, 'the Lord'
    is used as a natural equivalent while still signaling the divine title.
- source_word: וְנֶעְלָם
  chosen: is hidden
  alternatives:
  - is concealed
  - remains hidden
  lexicon: HALOT
  rationale: Passive/Nifal sense of עלם, indicating that something is not accessible
    to human perception. 'Is hidden' is direct and idiomatic.
- source_word: מֵאָדָם
  chosen: from man
  alternatives:
  - from humankind
  - from a person
  lexicon: HALOT
  rationale: אָדָם here has generic human reference. Per doctrine, gender-accurate
    rendering is preferred; 'man' preserves the singular generic force of the Hebrew,
    though the sense is humanity generally.
- source_word: פָּעֳלוֹ
  chosen: his work
  alternatives:
  - his deed
  - what he does
  lexicon: HALOT
  rationale: From פֹּעַל/פעל, referring to an act or working. Although close in sense
    to מַעֲשֵׂי, the singular here is retained as 'his work' rather than flattened,
    preserving the Hebrew's shift from plural to singular.
