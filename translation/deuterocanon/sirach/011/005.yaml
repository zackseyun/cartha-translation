theological_decisions:
- issue: Rendering the divine name in a deuterocanonical Hebrew witness written as
    יי
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  - YHWH
  rationale: The project default for YHWH is 'the LORD.' This verse's Hebrew witness
    uses the reverential written form יי. 'The Lord' preserves the sense without overclaiming
    the exact orthography, while the alternative project-standard capitalization is
    preserved in the decision record.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD'
- issue: Generic אָדָם
  chosen_reading: from man
  alternative_readings:
  - from humankind
  rationale: The Hebrew is singular and generic. Following the project's gender-accurate
    principle, 'man' best matches the source form and traditional anthropological
    sense, while the more explicitly inclusive alternative is preserved as an option.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table, אָדָם *adam* → man / humankind (context)'
