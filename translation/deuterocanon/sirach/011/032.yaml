translation:
  text: Before you examine a man, do not call him blessed, for a man will be called
    blessed in his end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Before you investigate a person, do not pronounce him happy; for in
      his outcome a person is pronounced happy.' The Hebrew repeats the verb 'call
      blessed' in active and passive forms.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel in Swete differs substantially here ('From a spark of
      fire a heap of coals will be multiplied, and a sinful man lies in wait for blood'),
      indicating a major textual divergence between the Hebrew and Greek witnesses
      for this verse.
    reason: textual_variant
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: Before
  alternatives:
  - Until before
  - ere
  lexicon: HALOT
  rationale: Temporal preposition introducing the condition prior to assessment.
- source_word: תַּחְקֹר
  chosen: you examine
  alternatives:
  - you investigate
  - you test
  - you search out
  lexicon: HALOT
  rationale: From חקר, meaning to examine or investigate. 'Examine' is natural English
    and fits the wisdom context of evaluating a person's character or outcome.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: The singular noun here refers to an individual human being under evaluation,
    not humanity in general. Per doctrine, gender-accurate rendering is preferred
    where the source uses masculine representative language.
- source_word: אַל תְּאַשְּׁרֵהוּ
  chosen: do not call him blessed
  alternatives:
  - do not pronounce him happy
  - do not congratulate him
  - do not deem him fortunate
  lexicon: HALOT
  rationale: From אשר in the Piel, 'to call blessed' or 'pronounce happy.' 'Call him
    blessed' preserves the evaluative sense better than the flatter 'praise him.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition.
- source_word: בְּאַחֲרִיתוֹ
  chosen: in his end
  alternatives:
  - at his end
  - in his latter end
  - in his outcome
  lexicon: HALOT
  rationale: אַחֲרִית can denote end, latter end, or outcome. 'In his end' stays close
    to the Hebrew while still intelligible, and preserves the wisdom theme that final
    outcome reveals true blessedness.
- source_word: יְאֻשַּׁר
  chosen: will be called blessed
  alternatives:
  - will be pronounced blessed
  - will be shown blessed
  lexicon: HALOT
  rationale: Passive of אשר, matching the earlier active form and preserving the verbal
    repetition in Hebrew.
