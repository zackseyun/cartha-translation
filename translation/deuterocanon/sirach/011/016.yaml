translation:
  text: He lifted him to the top and exalted him, and many were astonished at him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'He lifted him on/to his head.' The sense is likely elevation
      to the highest place or rank, hence 'to the top.'
    reason: lexical_alternative
  - marker: b
    text: The supplied Greek parallel for this verse does not correspond to the Hebrew
      line here, so the translation follows the extant Hebrew witness.
    reason: textual_variant
lexical_decisions:
- source_word: נָשָׂא
  chosen: lifted
  alternatives:
  - raised
  - carried
  lexicon: HALOT
  rationale: The verb commonly means 'lift, carry, raise.' In this poetic context
    with the following phrase 'to the top,' 'lifted' best preserves the upward movement
    without over-specifying the mechanism.
- source_word: בְּרֹאשׁוֹ
  chosen: to the top
  alternatives:
  - at his head
  - to the head
  - to the summit
  lexicon: HALOT
  rationale: Literally 'in/on his head,' but idiomatically with נשא it points to elevation
    to a highest position. 'To the top' communicates the sense naturally in English
    while retaining the imagery of being raised to prominence.
- source_word: וַיְרֹמְמֵהוּ
  chosen: exalted him
  alternatives:
  - made him high
  - raised him up
  lexicon: HALOT
  rationale: From רומם, 'to exalt, raise high.' 'Exalted him' fits the parallelism
    with the previous verb and conveys elevation in status, not merely physical height.
- source_word: וַיִּתְמְהוּ
  chosen: were astonished
  alternatives:
  - marveled
  - were amazed
  lexicon: HALOT
  rationale: The verb תמה denotes astonishment or wonder. 'Were astonished' preserves
    the stronger sense of being struck with amazement.
- source_word: עָלָיו
  chosen: at him
  alternatives:
  - about him
  - over him
  lexicon: HALOT
  rationale: With verbs of astonishment, על can indicate the object that occasions
    wonder. 'At him' is the most idiomatic English rendering here.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - many people
  - multitudes
  lexicon: HALOT
  rationale: The simple indefinite 'many' is faithful and suitably concise; English
    readers naturally understand an implied group of people.
