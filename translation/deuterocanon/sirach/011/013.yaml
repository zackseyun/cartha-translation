translation:
  text: There is one who labors and toils and rushes about, yet all the more he falls
    behind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''he is delayed / lags behind.'' The Greek parallel for this verse
      instead reads, ''and he lifted up his head, and many were astonished at him,''
      reflecting a substantially different textual tradition.'
    reason: textual_variant
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is one who
  alternatives:
  - There is
  - A man
  lexicon: HALOT
  rationale: Existential opening introducing a type of person. English idiom needs
    an explicit subject; 'one who' preserves the generic singular without over-specifying
    gender.
- source_word: עָמֵל
  chosen: labors
  alternatives:
  - works hard
  - wearies himself
  lexicon: HALOT
  rationale: Conveys strenuous work as a participial description. 'Labors' is concise
    and pairs naturally with the following verb.
- source_word: וְיָגֵעַ
  chosen: and toils
  alternatives:
  - and grows weary
  - and is exhausted
  lexicon: HALOT
  rationale: Keeps the near-synonymous intensification with עָמֵל. 'Toils' preserves
    the sense of wearying effort without making the phrase awkwardly repetitive.
- source_word: וָרָץ
  chosen: and rushes about
  alternatives:
  - and runs
  - and hurries
  lexicon: HALOT
  rationale: The Hebrew literally says 'runs,' but in English 'rushes about' better
    conveys frantic activity in this wisdom context.
- source_word: וּכְדֵי כֵן
  chosen: yet all the more
  alternatives:
  - and accordingly
  - and even so
  - to that extent
  lexicon: HALOT
  rationale: 'This idiom is difficult and the verse is marked with source mismatch;
    in context it introduces an ironic result: despite such effort, the person is
    delayed. ''Yet all the more'' captures the adversative-intensifying force.'
- source_word: הוּא מִתְאַחֵר
  chosen: he falls behind
  alternatives:
  - he is delayed
  - he lags behind
  - he is late
  lexicon: HALOT
  rationale: The reflexive form from אחר suggests being delayed/lagging. 'Falls behind'
    is natural English and fits the proverb's contrast between frantic effort and
    lack of progress. The Greek parallel points in a different direction, so a more
    literal alternative is preserved in a footnote.
