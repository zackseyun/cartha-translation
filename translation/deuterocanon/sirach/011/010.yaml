translation:
  text: Do not contend where there is no cause, and do not rise up in the quarrel
    of the arrogant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek reads very differently here: ''My child, do not let your actions
      be occupied with many things; if you multiply them, you will not be acquitted;
      if you pursue, you will not overtake; and by fleeing you will not escape.''
      This likely reflects a different Hebrew Vorlage or a major textual divergence.'
    reason: alternative_reading
  - marker: b
    text: Hebrew עַצָּבָה is uncertain in nuance here; it may mean 'grief,' 'trouble,'
      or 'cause/offense.' The translation takes it as the absence of valid grounds
      for contention.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵין
  chosen: where there is no
  alternatives:
  - in the absence of
  - without
  lexicon: HALOT
  rationale: The preposition with אֵין introduces a circumstance of nonexistence/absence.
    'Where there is no' gives natural English while preserving the situational force
    of the Hebrew clause.
- source_word: עַצָּבָה
  chosen: cause
  alternatives:
  - pain
  - grief
  - toil
  - offense
  lexicon: HALOT
  rationale: The noun is difficult and can denote pain/trouble or a provoking grievance.
    In this context, paired with a prohibition against contending, the sense is best
    taken as the absence of a real grievance or grounds for dispute. The Greek parallel
    diverges substantially and does not control the Hebrew here, but it supports a
    warning against fruitless overexertion/striving. 'Cause' captures the likely forensic-relational
    sense in idiomatic English.
- source_word: אַל תִּתְחָר
  chosen: do not contend
  alternatives:
  - do not stir yourself up
  - do not compete
  - do not be heated
  lexicon: HALOT
  rationale: From חרה/התחר in a reflexive or intransitive sense of becoming heated
    or engaging in strife. In context, 'do not contend' expresses the practical force
    of the prohibition better than a more literal but opaque 'do not grow hot.'
- source_word: וּבְרִיב
  chosen: and ... in the quarrel
  alternatives:
  - and in a dispute
  - and in litigation
  lexicon: HALOT
  rationale: רִיב commonly denotes strife, dispute, or quarrel. 'Quarrel' fits the
    interpersonal setting and keeps the proverb readable.
- source_word: זֵדִים
  chosen: the arrogant
  alternatives:
  - the insolent
  - the presumptuous
  - the proud
  lexicon: HALOT
  rationale: זֵדִים refers to insolent or presumptuous people. 'The arrogant' is clear
    modern English and preserves the moral characterization.
- source_word: אַל תְּקוֹמֵם
  chosen: do not rise up
  alternatives:
  - do not get involved
  - do not provoke
  - do not set yourself against
  lexicon: HALOT
  rationale: The verb from קום literally means 'rise up.' In context it likely means
    to enter into or take a stand within the quarrel. Retaining 'rise up' preserves
    the Hebrew image while remaining intelligible in English.
