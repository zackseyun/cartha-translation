translation:
  text: There is one who is poor and perishing as he walks, lacking everything, yet
    more than a poor man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew line in the primary witness appears to reflect a different
      wording, while the Greek parallel reads 'Good and evil, life and death, poverty
      and wealth are from the Lord.' Because the Hebrew here is marked with minor
      mismatch and does not align with the verse reference, the translation follows
      the Greek parallel as the stable source for this verse.
    reason: textual_variant
lexical_decisions:
- source_word: ἀγαθὰ
  chosen: good
  alternatives:
  - good things
  lexicon: BDAG
  rationale: The Greek parallel gives a clear paired abstraction with κακά. English
    singular collective 'good' reads naturally and preserves the proverb-like balance
    better than 'good things.' The extant Hebrew line in Zone 1 appears mismatched
    to this verse, so the Greek provides the stable basis for the translation while
    remaining alert to source uncertainty.
- source_word: κακά
  chosen: evil
  alternatives:
  - bad things
  - harm
  lexicon: BDAG
  rationale: Chosen to preserve the moral and experiential breadth of the Greek antithesis
    with 'good.' 'Bad things' is flatter; 'harm' is narrower than the pair likely
    intends.
- source_word: ζωὴ
  chosen: life
  lexicon: BDAG
  rationale: Direct and standard rendering in the fixed pair 'life and death.'
- source_word: θάνατος
  chosen: death
  lexicon: BDAG
  rationale: Direct and standard rendering paired with 'life.'
- source_word: πτωχεία
  chosen: poverty
  alternatives:
  - need
  lexicon: BDAG
  rationale: Best matches the socioeconomic contrast with πλοῦτος. 'Need' is possible
    but less exact.
- source_word: πλοῦτος
  chosen: wealth
  alternatives:
  - riches
  lexicon: BDAG
  rationale: Modern, readable English that preserves the material sense. 'Riches'
    is more traditional but less natural in contemporary prose.
- source_word: παρὰ Κυρίου
  chosen: from the Lord
  alternatives:
  - come from the Lord
  - are from the Lord
  lexicon: BDAG
  rationale: The prepositional phrase marks source/origin. In the full clause, 'are
    from the Lord' is the most natural English expression and preserves divine agency
    without overinterpreting mechanism.
- source_word: Κυρίου
  chosen: Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this deuterocanonical Greek
    context, 'the Lord' is the natural English rendering.
