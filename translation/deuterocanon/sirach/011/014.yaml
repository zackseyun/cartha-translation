theological_decisions:
- issue: Divine source of both favorable and unfavorable conditions
  chosen_reading: The verse states that good and evil, life and death, poverty and
    wealth are from the Lord.
  alternative_readings:
  - The verse refers to prosperity and adversity rather than moral good and evil.
  - The verse speaks of divine sovereignty over circumstances without making God the
    author of moral evil.
  rationale: The Greek text explicitly pairs ἀγαθὰ and κακά and attributes them to
    the Lord. The translation preserves that tension rather than softening κακά to
    avoid theological discomfort. At the same time, the wording does not expand the
    claim beyond what the text says.
  doctrine_reference: Preserve theological tension rather than resolve it; κύριος
    -> Lord
