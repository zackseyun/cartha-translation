theological_decisions:
- issue: Referent of the final pronoun
  chosen_reading: him
  alternative_readings:
  - the Lord
  - God
  rationale: The Hebrew witness ends with a pronoun rather than an explicit divine
    name. The Greek parallel for this verse in Swete is substantially different and
    does not directly support replacing the pronoun here. Since the surrounding context
    in Sirach commonly refers to God, the referent is likely divine, but the translation
    preserves the source wording and does not import an explicit title absent from
    the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Scope of 'evil' in relation to divine source
  chosen_reading: evil
  alternative_readings:
  - adversity
  - calamity
  - harm
  rationale: The Hebrew רַע can denote moral evil or experiential adversity. In this
    wisdom-style catalogue of opposites, the line states comprehensive realities under
    divine sovereignty. Retaining 'evil' is the more transparent lexical choice, while
    preserving a footnote to note the possible nuance of adversity/calamity so as
    not to over-resolve the theological question.
  doctrine_reference: Original-language primacy; preserve theological tension rather
    than resolve it.
