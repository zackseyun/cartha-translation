translation:
  text: Good and evil, life and death, poverty and wealth—they are from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'harm' or 'adversity' for 'evil' (Hebrew רַע); the term can denote calamity
      as well as evil more broadly.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''from him.'' The referent is likely God from context, but the
      divine name is not stated in this line.'
    reason: alternative_reading
  - marker: c
    text: 'The Greek parallel preserved in Swete for Sirach 11:17 differs substantially:
      ''The gift of the Lord remains for the godly, and his favor will prosper forever.''
      The Hebrew and Greek witnesses here do not closely align.'
    reason: textual_variant
lexical_decisions:
- source_word: טוֹב
  chosen: good
  alternatives:
  - prosperity
  - what is good
  lexicon: HALOT
  rationale: The plain adjectival/substantival sense fits the paired opposites in
    the Hebrew line. 'Good' preserves the broad scope rather than narrowing it to
    material prosperity.
- source_word: וְרַע
  chosen: and evil
  alternatives:
  - and harm
  - and adversity
  lexicon: HALOT
  rationale: In antithesis with 'good,' the broad term 'evil' best reflects the Hebrew.
    Although context could include calamity/adversity, the verse presents comprehensive
    opposites, so the wider term is retained.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - living
  lexicon: HALOT
  rationale: Standard rendering in the life/death pair; singular English is idiomatic
    while preserving the Hebrew plural-of-abstraction sense.
- source_word: וָמָוֶת
  chosen: and death
  lexicon: HALOT
  rationale: Direct opposite of 'life'; no reason to soften or paraphrase.
- source_word: רֵישׁ
  chosen: poverty
  alternatives:
  - want
  - destitution
  lexicon: HALOT
  rationale: The noun denotes poverty or impoverishment. 'Poverty' is the most natural
    English counterpart to 'wealth' in the next term.
- source_word: וְעֹשֶׁר
  chosen: and wealth
  alternatives:
  - riches
  lexicon: HALOT
  rationale: '''Wealth'' is modern and broad, matching the socioeconomic contrast
    with ''poverty''.'
- source_word: מֵיי הוּא
  chosen: they are from him
  alternatives:
  - are from the LORD
  - come from him
  lexicon: HALOT
  rationale: The Hebrew as given points to an unspecified third-person singular pronoun,
    literally 'from him.' Because the divine name is not present in the Hebrew line,
    the translation preserves the pronoun rather than supplying 'the LORD.' The plural
    English verb 'they are' gathers the listed pairs as a collective subject.
