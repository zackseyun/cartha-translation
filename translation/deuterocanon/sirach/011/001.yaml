theological_decisions:
- issue: Whether דל should be rendered primarily in socioeconomic or moral-humility
    terms
  chosen_reading: the poor
  alternative_readings:
  - the lowly
  - the humble
  rationale: The Hebrew witness is primary and favors a concrete social descriptor,
    while the Greek parallel supports the broader notion of low status. The main text
    keeps the socioeconomic sense; alternatives are preserved in a footnote because
    the verse can also be heard more generally as referring to the lowly.
