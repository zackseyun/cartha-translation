translation:
  text: The wisdom of the poor lifts up his head, and seats him among nobles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lowly' or 'the humble'; the Hebrew says 'the poor,' while the Greek
      parallel can suggest low status more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכְמַת
  chosen: The wisdom of
  alternatives:
  - wisdom
  - wise conduct of
  lexicon: HALOT
  rationale: Construct form with דל, naturally rendered 'the wisdom of ...'. A more
    abstract 'wisdom' alone would underrepresent the genitival relationship.
- source_word: דַּל
  chosen: the poor
  alternatives:
  - the lowly
  - the weak
  - the humble
  lexicon: HALOT
  rationale: Hebrew דל commonly denotes one who is poor, weak, or socially low. The
    Greek parallel ταπεινοῦ points toward low status/humility, but the Hebrew witness
    is primary here and most plainly supports 'the poor.' This keeps the socioeconomic
    sense while still allowing overlap with lowliness.
- source_word: תִּשָּׂא רֹאשׁוֹ
  chosen: lifts up his head
  alternatives:
  - raises his head
  - exalts him
  lexicon: HALOT
  rationale: This Hebrew idiom is well represented by the literal English expression
    'lift up the head,' conveying elevation in status or restored dignity. The Greek
    ἀνύψωσεν κεφαλήν confirms the image. A more interpretive 'exalts him' is possible
    but less transparent to the source metaphor.
- source_word: וּבֵין
  chosen: among
  alternatives:
  - between
  - in the midst of
  lexicon: HALOT
  rationale: With a plural noun, English 'among' is the natural idiomatic rendering.
- source_word: נְדִיבִים
  chosen: nobles
  alternatives:
  - princes
  - generous men
  - the great
  lexicon: HALOT
  rationale: In context this refers to socially elevated persons. Although נדיב can
    carry the sense 'noble' or 'generous,' the parallel Greek μεγιστάνων points to
    leading men or magnates. 'Nobles' best captures rank without overstating monarchy-specific
    status.
- source_word: תּוֹשִׁיבֶנּוּ
  chosen: seats him
  alternatives:
  - causes him to sit
  - sets him
  - makes him dwell
  lexicon: HALOT
  rationale: Hiphil of ישב here means to cause someone to sit, i.e., to give him a
    place. 'Seats him' is concise, natural, and preserves the social-honor imagery.
