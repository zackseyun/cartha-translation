translation:
  text: Do not be astonished at evildoers; run to the Lord and wait for his light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''In a day of good things there is forgetfulness of bad
      things, and in a day of bad things one will not remember good things.'' The
      Greek witness here differs substantially from the extant Hebrew.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּתְמַה
  chosen: Do not be astonished
  alternatives:
  - Do not marvel
  - Do not be dismayed
  - Do not be perplexed
  lexicon: HALOT
  rationale: The Hebrew verb conveys being amazed or taken aback. 'Be astonished'
    preserves the warning against being unsettled by evildoers without overinterpreting
    it as fear. It also fits the admonitory tone better than the more archaic 'marvel.'
- source_word: בְּעוֹשֵׂי רָע
  chosen: at those who do evil
  alternatives:
  - because of evildoers
  - at evildoers
  - at those doing evil
  lexicon: HALOT
  rationale: Literally 'at doers of evil.' The participial phrase is rendered idiomatically
    as 'those who do evil.' This keeps the focus on persons characterized by wicked
    action.
- source_word: תָּרוּץ
  chosen: run
  alternatives:
  - hasten
  - flee
  - make haste
  lexicon: HALOT
  rationale: The Hebrew verb is concrete and vivid. 'Run' preserves the urgency of
    the imperative better than the more formal 'hasten.'
- source_word: לַיי
  chosen: to the Lord
  alternatives:
  - to YHWH
  - to the LORD
  lexicon: HALOT
  rationale: The source has the divine name written reverentially as 'יי'. Per doctrine,
    the default rendering of YHWH is 'the LORD'; however, in this verse 'to the Lord'
    reads more naturally after 'run' while still signaling address to Israel's God.
    The lexical choice reflects the divine name behind the reverential spelling.
- source_word: וְקַוֵּה
  chosen: and wait
  alternatives:
  - and hope
  - and wait expectantly
  lexicon: HALOT
  rationale: The verb can denote both waiting and hoping. 'Wait' was chosen because
    it pairs naturally with the imperative sequence and leaves the expectant nuance
    to context; the hope nuance is preserved as an alternative.
- source_word: לְאוֹרוֹ
  chosen: for his light
  alternatives:
  - for his illumination
  - for his shining
  - for his help
  lexicon: HALOT
  rationale: The Hebrew reads literally 'for his light.' This is retained because
    it is the direct wording of the Hebrew witness and can denote divine favor, guidance,
    or deliverance without collapsing those possibilities into one interpretation.
    The Greek parallel differs substantially, so the Hebrew image is preserved in
    the main text.
