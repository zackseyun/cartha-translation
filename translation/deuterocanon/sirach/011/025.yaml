theological_decisions:
- issue: Rendering the divine name represented by the reverential Hebrew spelling
    יי
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  - Yahweh
  rationale: The doctrine default for YHWH is 'the LORD.' Because the syntax here
    is prepositional ('run to ...'), 'the Lord' was used for smoother English while
    still reflecting the divine name. The alternative small-caps convention remains
    viable at style-review stage.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Relationship between the Hebrew and Greek witnesses
  chosen_reading: Translate the extant Hebrew as primary, while preserving the Greek's
    substantially different sense in a footnote
  alternative_readings:
  - Translate from the Greek alone
  - Conflate Hebrew and Greek into a harmonized rendering
  rationale: For Sirach, where Hebrew survives, the project translates from the Hebrew
    witness while using the Greek parallel as actual input and consistency check.
    Here the Greek presents a different saying ('In a day of good things there is
    forgetfulness of bad things...'), not merely a minor variant. The main text therefore
    follows the Hebrew, and the Greek is preserved as a textual-variant footnote rather
    than silently ignored or harmonized.
  doctrine_reference: PHILOSOPHY.md — translate from Hebrew where it survives; use
    Greek parallel as input
