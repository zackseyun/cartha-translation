translation:
  text: Many who were oppressed sat on a throne, and one not thought of put on a turban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'an unexpected person received high honor.' The
      Hebrew says 'did not come up on the heart' and then 'put on a turban,' using
      a concrete image for sudden elevation.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel differs in wording, reading instead that many rulers
      were greatly dishonored and illustrious men were handed over into the hands
      of others. Both forms express reversal of status.
    reason: alternative_reading
lexical_decisions:
- source_word: רַבִּים
  chosen: Many
  alternatives:
  - Many people
  - Numerous ones
  lexicon: HALOT
  rationale: Straightforward quantitative term; 'Many' is concise and natural in English.
- source_word: נִדְכָּאִים
  chosen: who were oppressed
  alternatives:
  - the downtrodden
  - the crushed
  - the humbled
  lexicon: HALOT
  rationale: From a root conveying being crushed or oppressed. 'Who were oppressed'
    preserves the passive sense and fits the social-reversal context better than a
    more interpretive label.
- source_word: יָשְׁבוּ עַל כִּסֵּא
  chosen: sat on a throne
  alternatives:
  - sat on a seat
  - took a throne
  - sat upon a throne
  lexicon: HALOT
  rationale: In wisdom literature this idiom commonly signals accession to rule or
    high status. 'Throne' is preferable to generic 'seat' because the parallel Greek
    speaks of rulers and the context is exaltation.
- source_word: וּבַל עָלוּ עַל לֵב
  chosen: and one not thought of
  alternatives:
  - and one who had not come to mind
  - and one not considered
  - and one not esteemed
  lexicon: HALOT
  rationale: Literally, 'and not came up upon the heart/mind.' This Hebrew idiom means
    someone not considered or not expected. Singular English captures the following
    singular verb naturally.
- source_word: עָטוּ צְנִיף
  chosen: put on a turban
  alternatives:
  - wrapped himself in a turban
  - wore a turban
  - put on a headdress
  lexicon: HALOT
  rationale: The verb means to wrap or put on, and צְנִיף is a turban/headdress associated
    with dignity or office. 'Put on a turban' preserves the concrete image of elevation
    rather than flattening it to 'received honor'.
