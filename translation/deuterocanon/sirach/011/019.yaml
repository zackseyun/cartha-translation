    text: 'Greek parallel: ''When he says, “I have found rest, and now I will eat
      from my goods,” he does not know what time will pass by, and he will leave them
      to others and die.'' The Hebrew witness here differs sharply from the Greek
      tradition.'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׂכְלוּת
  chosen: folly
  alternatives:
  - stupidity
  - senselessness
  lexicon: HALOT
  rationale: The noun denotes foolishness or senseless conduct/state. 'Folly' is concise,
    idiomatic, and preserves the moral weight common in wisdom literature better than
    the flatter 'stupidity.'
- source_word: וְחֹשֶׁךְ
  chosen: and darkness
  alternatives:
  - gloom
  - obscurity
  lexicon: HALOT
  rationale: The basic sense is literal or metaphorical darkness. In parallel with
    'folly' it likely carries moral/disastrous overtones, but 'darkness' best preserves
    the Hebrew image without over-interpreting.
- source_word: לְפוֹשְׁעִים
  chosen: for transgressors
  alternatives:
  - for rebels
  - for sinners
  lexicon: HALOT
  rationale: From פשע, denoting rebellion/transgression. 'Transgressors' fits wisdom-register
    English and preserves the sense of willful violation better than the broader 'sinners.'
- source_word: נוֹצְרָה
  chosen: are reserved
  alternatives:
  - is kept
  - is stored up
  - is guarded
  lexicon: HALOT
  rationale: The passive sense of נצר here suggests something being kept in store
    for someone. Because the compound subject is effectively plural in English ('folly
    and darkness'), 'are reserved' is natural and communicates impending consequence.
- source_word: וּמְרֵעִים
  chosen: those who do evil
  alternatives:
  - evildoers
  - those acting wickedly
  lexicon: HALOT
  rationale: The participial form from רעע/רוע points to people doing evil. 'Those
    who do evil' is slightly more transparent than 'evildoers' and avoids compressing
    the Hebrew verbal force too much.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - calamity
  - misfortune
  lexicon: HALOT
  rationale: The noun can mean moral evil or harmful calamity. Given the terse Hebrew
    and the Greek parallel's emphasis on disastrous outcome elsewhere in the context,
    either is possible; 'evil' preserves the lexical repetition with מְרֵעִים and
    leaves the moral/disastrous ambiguity intact.
- source_word: עִמָּם
  chosen: with them
  alternatives:
  - upon them
  - among them
  lexicon: HALOT
  rationale: The preposition עם most naturally means 'with.' Retaining 'with them'
    preserves the compact Hebrew expression, suggesting evil accompanies or clings
    to such people.
