translation:
  text: Before you investigate, do not find fault; examine first, and afterward rebuke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew wording in the second half is difficult. The Greek witness reads,
      'Before you hear, do not answer, and in the midst of words do not interject.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew verb rendered 'find fault' may more literally suggest 'twist'
      or 'pervert'; the translation gives its likely sense here as warning against
      premature adverse judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: Before
  alternatives:
  - prior to
  - beforehand
  lexicon: HALOT
  rationale: Temporal marker introducing the prohibition; straightforwardly rendered
    'Before' in natural English.
- source_word: תַּחְקוֹר
  chosen: you investigate
  alternatives:
  - you examine
  - you inquire
  lexicon: HALOT
  rationale: From חקר, 'search out, investigate, examine.' 'Investigate' fits the
    context of withholding judgment until facts are known.
- source_word: אַל תְּסַלֵּף
  chosen: do not find fault
  alternatives:
  - do not distort
  - do not pervert
  - do not twist
  lexicon: HALOT
  rationale: The Hebrew סלף often carries the sense of twisting or perverting, but
    in this wisdom context the Greek parallel μὴ ἀποκρίνου ('do not answer') and the
    second colon's movement toward later rebuke suggest premature adverse judgment.
    'Do not find fault' captures the practical force without over-literal awkwardness,
    while acknowledging some uncertainty in the Hebrew wording.
- source_word: בַּקֵּר
  chosen: examine
  alternatives:
  - inspect
  - inquire into
  - look into
  lexicon: HALOT
  rationale: Imperative calling for prior scrutiny. 'Examine' pairs well with 'investigate'
    while remaining idiomatic.
- source_word: לְפָנִים
  chosen: first
  alternatives:
  - beforehand
  - at the outset
  lexicon: HALOT
  rationale: Adverbial use meaning prior in sequence; 'first' is concise and natural
    in English.
- source_word: וְאַחַר
  chosen: and afterward
  alternatives:
  - and then
  - and after that
  lexicon: HALOT
  rationale: 'Marks the proper sequence: inquiry precedes response or correction.'
- source_word: תַּזִּיף
  chosen: rebuke
  alternatives:
  - answer
  - speak
  - interject
  lexicon: HALOT
  rationale: The Hebrew form is textually and lexically difficult in Kahana's composite
    text. The Greek parallel reads 'and in the midst of words do not interject,' which
    points to verbal response after hearing. Given the Hebrew sequence 'examine first,
    and afterward ...', 'rebuke' fits the likely admonitory sense of delayed criticism,
    but the Greek-based alternative 'answer/interject' is important enough to preserve
    in a footnote.
