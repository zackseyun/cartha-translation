translation:
  text: My son, do not answer a matter before you hear it, and do not speak in the
    midst of another's speech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Do not quarrel about a matter you have no need of, and do not
      sit in judgment with sinners.'' The extant Hebrew and Greek differ substantially
      here; the main text follows the surviving Hebrew witness, with the Greek preserved
      as an alternative textual tradition.'
    reason: textual_variant
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative address from father/teacher to disciple; the masculine singular
    is explicit in Hebrew, so 'My son' preserves the source's gendered form per project
    philosophy.
- source_word: אַל תָּשִׁיב דָּבָר
  chosen: do not answer a matter
  alternatives:
  - do not reply to a matter
  - do not respond to a word/thing
  lexicon: HALOT
  rationale: השיב commonly means 'answer, reply, respond.' דָּבָר can mean 'word,
    matter, affair'; here 'matter' fits the wisdom context of responding to a case
    or issue before hearing it fully. This also aligns conceptually with the Greek
    parallel's concern about contentious involvement in a matter.
- source_word: טֶרֶם תִּשְׁמָע
  chosen: before you hear it
  alternatives:
  - before you listen
  - before you have heard
  lexicon: HALOT
  rationale: טֶרֶם marks prior time, and שמע here is straightforwardly 'hear.' 'Before
    you hear it' is idiomatic and preserves the warning against premature response.
- source_word: וּבְתוֹךְ שִׂיחָה
  chosen: in the midst of another's speech
  alternatives:
  - in the middle of conversation
  - during talk
  - in the midst of discourse
  lexicon: HALOT
  rationale: שִׂיחָה denotes speech, talk, or conversation. 'In the midst of another's
    speech' makes explicit the interpersonal setting implied by the context and avoids
    the slightly vague English 'in the middle of conversation.'
- source_word: אַל תְּדַבֵּר
  chosen: do not speak
  alternatives:
  - do not talk
  lexicon: HALOT
  rationale: דבר is the ordinary verb 'speak.' 'Do not speak' is the most direct and
    suitably weighty rendering in wisdom instruction.
- source_word: περὶ πράγματος οὗ οὐκ ἔστιν σοι χρεία μὴ ἔριζε
  chosen: not adopted in main text
  alternatives:
  - do not quarrel about a matter you do not need
  - do not dispute over a matter that does not concern you
  lexicon: BDAG
  rationale: The Greek parallel diverges substantially from the extant Hebrew and
    appears to reflect a different textual form or interpretive development. Because
    the Hebrew witness is extant and high-confidence, it governs the main translation;
    the Greek is preserved in a footnote as a notable alternative tradition.
- source_word: καὶ ἐν κρίσει ἁμαρτωλῶν μὴ σύνεδρευε
  chosen: not adopted in main text
  alternatives:
  - and do not sit in judgment with sinners
  - and do not sit in the council of sinners' judgment
  lexicon: BDAG
  rationale: This Greek colon is not equivalent to the Hebrew second colon. Since
    the project translates Sirach from Hebrew where extant, this Greek reading is
    treated as an alternative textual tradition rather than the base text.
