theological_decisions:
- issue: Temporal sense of עוֹלָם in wisdom hyperbole
  chosen_reading: Rendered as 'eternity' to express immeasurable duration
  alternative_readings:
  - Rendered as 'of old' to stress ancient time
  - Rendered as 'the age' to preserve semantic breadth
  rationale: In this context the verse lists things beyond human calculation. The
    Greek parallel strongly supports a sense of vast or unbounded duration. 'Eternity'
    best preserves the wisdom-text hyperbole without importing a technical doctrinal
    claim about metaphysics.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
