translation:
  text: Its roots are forever, and its branches are length of days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, 'An angry man cannot be justified.' The Hebrew and Greek witnesses
      diverge substantially at this verse.
    reason: textual_variant
  - marker: b
    text: Or 'long life' for 'length of days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁרְשֶׁיהָ
  chosen: its roots
  alternatives:
  - her roots
  lexicon: HALOT
  rationale: From שֹׁרֶשׁ with 3fs suffix, referring back to wisdom/fear of the Lord
    as a feminine antecedent in context. English 'its' is more natural for an abstract
    noun, while preserving the image.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - everlasting
  lexicon: HALOT
  rationale: The phrase indicates enduring permanence. 'Forever' is idiomatic modern
    English and preserves the temporal force without overformal stiffness.
- source_word: וַעֲנָפֶיהָ
  chosen: and its branches
  alternatives:
  - and her branches
  - and its boughs
  lexicon: HALOT
  rationale: ענף denotes branches/boughs. 'Branches' is the clearest common English
    equivalent and keeps the botanical parallel with 'roots.'
- source_word: אֹרֶךְ יָמִים
  chosen: length of days
  alternatives:
  - long life
  - many days
  lexicon: HALOT
  rationale: A Hebrew idiom for longevity. I retained the more literal 'length of
    days' because the verse is highly poetic and parallel, and this preserves the
    idiomatic biblical resonance while remaining understandable.
- source_word: '[שָׁרְשֶׁיהָ לְעוֹלָם, וַעֲנָפֶיהָ אֹרֶך יָמִים.]'
  chosen: Its roots are forever, and its branches are length of days.
  alternatives:
  - Its roots are eternal, and its branches are long life.
  - Its roots endure forever, and its branches are long life.
  lexicon: HALOT
  rationale: The Hebrew witness in Zone 1 is a short poetic bicola, but the parallel
    Greek for this verse reads a substantially different line ('An angry man cannot
    be justified'), indicating a major source mismatch. Per project philosophy, the
    translation is anchored in the extant Hebrew where available, while the Greek
    is treated as a real input showing that the textual tradition here is unstable.
    I therefore translated the Hebrew directly and preserved the Greek-based alternative
    in a footnote.
