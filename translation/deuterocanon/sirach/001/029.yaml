  parallel_sources:
  - edition: lxx-swete-1909
    text: καρδία συνετοῦ διανοηθήσεται παραβολήν, καὶ οὖς ἀκροατοῦ ἐπιθυμία σοφοῦ.
    kind: greek_parallel
