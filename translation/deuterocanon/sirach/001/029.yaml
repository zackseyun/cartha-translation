    reference: Sirach 1:29
translation:
  text: Love the fear of the LORD, and bless your heart in it; and do not fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel has a substantially different text: ''The heart of the
      intelligent will ponder a proverb, and the ear of a hearer is the desire of
      a wise man.'' This verse is text-critically uncertain.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'bless your heart in it' is idiomatic and uncertain; it may carry
      the sense of esteeming one's heart blessed in the fear of the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱהַב
  chosen: Love
  alternatives:
  - Embrace
  - Cherish
  lexicon: HALOT
  rationale: Imperative of אהב, straightforwardly 'love.' 'Love' preserves the direct
    volitional force better than softer paraphrases.
- source_word: יִרְאַת יְהֹוָה
  chosen: the fear of the LORD
  alternatives:
  - fear of Yahweh
  - reverence for the LORD
  lexicon: HALOT
  rationale: Construct phrase meaning reverent fear directed toward YHWH. Following
    doctrine, יְהוָה is rendered 'the LORD.' 'Fear' is retained rather than reduced
    to 'reverence' so as not to flatten the wisdom theme.
- source_word: וְאַשֵּׁר
  chosen: bless
  alternatives:
  - make happy
  - count blessed
  - esteem blessed
  lexicon: HALOT
  rationale: From אשר in the Piel/Hiphil-like usage, the sense is to pronounce or
    regard as blessed/happy. Because the object is 'your heart,' the idiom is difficult;
    'bless your heart in it' stays close to the Hebrew while remaining intelligible.
    The Greek parallel points elsewhere, so the Hebrew wording is likely unstable;
    this rendering preserves the extant Hebrew rather than overcorrecting.
- source_word: לִבְּךָ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: לב commonly denotes the inner person, including thought and will. 'Heart'
    is the standard and preserves the Hebrew anthropology.
- source_word: בָּהּ
  chosen: in it
  alternatives:
  - by it
  - through it
  lexicon: HALOT
  rationale: Feminine singular pronominal suffix most naturally refers back to 'fear'
    as a feminine noun. 'In it' is the most literal and least interpretively loaded
    rendering.
- source_word: וְאַל תִּירָא
  chosen: and do not fear
  alternatives:
  - and do not be afraid
  lexicon: HALOT
  rationale: Negative imperative from ירא. Rendering it with the same English root
    'fear' preserves the wordplay/tension with 'fear of the LORD' earlier in the verse.
