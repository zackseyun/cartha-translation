- issue: Primary witness divergence between Hebrew and Greek parallel
  chosen_reading: Translate the extant Hebrew as the primary text, while acknowledging
    that the Greek parallel reflects a substantially different verse.
  alternative_readings:
  - A Greek-based rendering such as 'The heart of the intelligent will ponder a proverb,
    and the ear of a hearer is the desire of a wise man.'
  rationale: Per project philosophy for Sirach, Hebrew is primary where it survives.
    However, the validation flag 'major_mismatch' and the Greek parallel show this
    verse is text-critically unstable. The main text therefore follows the Hebrew
    witness, but the alternative Greek form is preserved in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
