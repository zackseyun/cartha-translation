theological_decisions:
- issue: Relation of the Hebrew line to the Greek parallel, which reads a substantially
    different text about the one wise one seated on his throne
  chosen_reading: Translate the extant Hebrew as the primary text, while acknowledging
    the Greek as a major divergent witness
  alternative_readings:
  - A Greek-based rendering such as 'There is one who is wise, greatly fearsome, seated
    upon his throne.'
  rationale: Project policy gives primacy to the surviving Hebrew of Sirach where
    extant, but the prompt flags a major mismatch and instructs that the Greek parallel
    be used as actual input. The Hebrew line is coherent and translatable on its own,
    so it is retained in the main text; the Greek is preserved in a footnote as a
    materially different parallel witness.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly.'
- issue: Identity of the recipient phrase 'those who love him'
  chosen_reading: The masculine singular pronoun refers to God, the implied subject
  alternative_readings:
  - those who love it/her (if one assimilates the pronoun to wisdom by sense rather
    than grammar)
  rationale: The Hebrew suffix in לְאֹהֲבָיו is masculine singular, not feminine,
    so the most textually grounded reading is 'those who love him,' i.e., God. This
    also fits Sirach's theology of wisdom as God's gift.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it beyond the source; gender-accurate over gender-neutral.'
