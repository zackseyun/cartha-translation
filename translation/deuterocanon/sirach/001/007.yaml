lexical_decisions:
- source_word: בְחָנָהּ
  chosen: examined her
  alternatives:
  - tested her
  - searched her out
  lexicon: HALOT
  rationale: בחן commonly carries the sense of testing or examining. 'Examined' fits
    the sequence of divine appraisal in clear modern English without overinterpreting
    the object.
- source_word: וְרָאָהּ
  chosen: saw her
  alternatives:
  - perceived her
  - looked upon her
  lexicon: HALOT
  rationale: ראה is straightforwardly 'see.' Retaining the simple verb preserves the
    compact Hebrew style and the progression of verbs.
- source_word: וְסְפָרָהּ
  chosen: counted her
  alternatives:
  - numbered her
  - recounted her
  lexicon: HALOT
  rationale: ספר in this stem naturally means count/number. 'Counted' is idiomatic
    English and preserves the image of wisdom as fully measured or enumerated.
- source_word: וּנְתָנָהּ
  chosen: gave her
  alternatives:
  - bestowed her
  lexicon: HALOT
  rationale: נתן is the ordinary verb 'give.' 'Gave' keeps the line direct and avoids
    adding stylistic elevation not demanded by the Hebrew.
- source_word: לְאֹהֲבָיו
  chosen: to those who love him
  alternatives:
  - to his lovers
  - to those who love him/God
  lexicon: HALOT
  rationale: The suffix is masculine singular, most naturally referring to God as
    the implied subject of the verse. 'Those who love him' is natural English and
    preserves the relational condition stated in the Hebrew.
- source_word: הּ suffixes on feminine verbs/objects
  chosen: her
  alternatives:
  - it
  lexicon: HALOT
  rationale: The feminine suffixes most naturally refer to wisdom as a feminine noun/personification
    in Sirach. 'Her' preserves the literary personification better than the flattening
    'it'.
