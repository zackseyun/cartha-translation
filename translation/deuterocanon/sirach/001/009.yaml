id: SIR.1.9
reference: Sirach 1:9
source:
  edition: lxx-swete-1909
  text: μετὰ πάσης σαρκὸς κατὰ τὴν δόσιν αὐτοῦ, καὶ ἐχορήγησεν αὐτὴν τοῖς ἀγαπῶσιν
    αὐτόν.
  language: Greek
  pages:
  - 681
  - 722
