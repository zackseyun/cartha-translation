translation:
  text: The root of wisdom—to whom has it been revealed? And who has known her subtleties?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''The source of wisdom is the word of God in the highest
      places, and her ways are eternal commandments.'' The Hebrew witness here differs
      substantially from the Greek.'
    reason: alternative_reading
lexical_decisions:
- source_word: שֹׁרֶשׁ
  chosen: root
  alternatives:
  - source
  - foundation
  lexicon: HALOT
  rationale: The Hebrew plainly reads 'root,' a concrete metaphor for origin or underlying
    basis. Although the Greek parallel has 'spring/source' (πηγή), the primary Hebrew
    witness should govern where extant; 'root' preserves the Hebrew image rather than
    harmonizing to the Greek.
- source_word: הַחָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חכמה in sapiential literature; no contextual reason
    to vary.
- source_word: לְמִי
  chosen: to whom
  alternatives:
  - for whom
  lexicon: HALOT
  rationale: The preposition ל with interrogative מי is most naturally rendered 'to
    whom' in this passive-revelatory construction.
- source_word: נִגְלָה
  chosen: has it been revealed
  alternatives:
  - was disclosed
  - became known
  lexicon: HALOT
  rationale: The Niphal of גלה here conveys being revealed/disclosed. 'Has it been
    revealed' fits the interrogative and preserves the passive sense.
- source_word: מַעֲרֻמֶּיהָ
  chosen: her subtleties
  alternatives:
  - her shrewdness
  - her devices
  - her intricacies
  lexicon: HALOT
  rationale: The noun from ערם can denote shrewdness/craft/subtle understanding. In
    the context of personified wisdom, 'subtleties' best conveys difficult, penetrating
    aspects of wisdom without importing a negative moral sense like 'devices.' The
    Greek parallel's 'ways' (πορεῖαι) points to a different Vorlage or interpretive
    tradition, so the Hebrew wording is retained in the main text.
- source_word: מִי יָדַע
  chosen: who has known
  alternatives:
  - who knows
  - who has understood
  lexicon: HALOT
  rationale: The perfect form suits an English present perfect in this rhetorical
    question. 'Known' is the direct lexical equivalent of ידע; 'understood' would
    be interpretive.
