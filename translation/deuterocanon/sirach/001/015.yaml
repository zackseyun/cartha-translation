  parallel_sources:
  - edition: lxx-swete-1909
    text: πλησμονὴ σοφίας φοβεῖσθαι τὸν κύριον, καὶ μεθύσκει αὐτοὺς ἀπὸ τῶν καρπῶν
      αὐτῆς·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 1:15
translation:
  text: The fullness of wisdom is to fear the Lord, and it makes them drunk from its
    fruits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Cairo Geniza Hebrew line at this location differs sharply: ''With
      people of truth she has been established from of old, and with their offspring
      his loyalty is faithful.'' The Hebrew is bracketed in the cited edition and
      marked as a major mismatch, so the Greek reading governs the main text here.'
    reason: textual_variant
  - marker: b
    text: Or 'from her fruits'; wisdom is grammatically feminine in Greek and often
      personified in Sirach.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλησμονὴ
  chosen: fullness
  alternatives:
  - abundance
  - satisfaction
  - plenty
  lexicon: LSJ
  rationale: The Hebrew witness in Zone 1 is bracketed and reflects a major mismatch
    with the Greek parallel; the Greek therefore materially guides the translation.
    πλησμονή denotes fullness or abundance. 'Fullness' preserves the nominal force
    and fits the wisdom saying style better than the more interpretive 'satisfaction'.
- source_word: σοφίας
  chosen: of wisdom
  alternatives:
  - wisdom's
  - of skill
  lexicon: LSJ
  rationale: Standard genitive with πλησμονή. 'Wisdom' is the clear sense in Sirach's
    sapiential context.
- source_word: φοβεῖσθαι τὸν κύριον
  chosen: to fear the Lord
  alternatives:
  - fearing the Lord
  - reverence for the Lord
  lexicon: LSJ
  rationale: An infinitival construction explaining what the fullness of wisdom consists
    in. 'Fear the Lord' preserves the traditional and lexical sense without reducing
    it to mere respect. κύριος is rendered 'Lord' per doctrine.
- source_word: μεθύσκει
  chosen: makes them drunk
  alternatives:
  - intoxicates them
  - fills them to overflowing
  - satisfies them deeply
  lexicon: LSJ
  rationale: The verb literally means 'make drunk/intoxicate.' Although metaphorical
    here, the vivid image should be preserved rather than flattened into 'satisfies.'
- source_word: αὐτοὺς
  chosen: them
  alternatives:
  - those who fear him
  - people
  lexicon: LSJ
  rationale: The Greek pronoun lacks an explicit antecedent in this verse alone, likely
    referring back to those who fear the Lord in context. 'Them' preserves the source
    terseness without importing an antecedent into the main text.
- source_word: ἀπὸ τῶν καρπῶν αὐτῆς
  chosen: from its fruits
  alternatives:
  - with its fruits
  - by its fruits
  - from her fruits
  lexicon: LSJ
  rationale: The preposition ἀπό is best kept as 'from.' The pronoun refers to wisdom;
    English 'its' is idiomatic, though a feminine personification is possible in a
    footnote.
