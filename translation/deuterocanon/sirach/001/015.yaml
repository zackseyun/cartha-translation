theological_decisions:
- issue: Primary-source divergence between bracketed Hebrew witness and Greek parallel
  chosen_reading: Translate the Greek sense in the main text while acknowledging the
    Hebrew bracketed line as a major divergent witness.
  alternative_readings:
  - With truthful people she has been established from of old, and with their offspring
    his loyalty is faithful.
  - With people of truth she was prepared from eternity, and with their seed his steadfast
    love is trustworthy.
  rationale: Zone 1 marks the Hebrew as bracketed and 'major_mismatch,' while the
    project philosophy for deuterocanonical books names Swete LXX as the Greek source
    and Hebrew Sirach as primary where it survives. Because this Hebrew line does
    not correspond to the Greek verse and is text-critically uncertain in this location,
    the Greek must control the translation here, with the Hebrew divergence preserved
    in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: Sirach is translated from Hebrew where it survives
    and from Greek where it does not; source uncertainty must be preserved honestly.'
