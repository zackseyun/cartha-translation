translation:
  text: My son, do not be false in the fear of Yahweh, and do not draw near to him with a divided heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew witness reads, 'My son, do not be false in the fear of the LORD, and do not draw near to him with a divided heart.' The Greek parallel at this verse instead reads, 'He who repays acts of kindness remembers for what comes afterward, and in a time of falling he will find support.'
    reason: textual_variant
  - marker: b
    text: Literally, 'with heart and heart,' a Hebrew idiom for inner duplicity or a divided heart.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative address from בן with 1cs suffix. 'My son' preserves the masculine singular form and the instructional father-to-son framing typical of wisdom literature; this follows the project's gender-accurate principle.
- source_word: אַל תְּכַזֵּב
  chosen: do not be false
  alternatives:
  - do not lie
  - do not deceive
  - do not prove false
  lexicon: HALOT
  rationale: From כזב, conveying falsehood/deception. In this context with בְּיִרְאַת יְהוָה, the warning is not merely against speaking a lie but against falseness or hypocrisy in relation to reverence for God. 'Be false' best captures the broader ethical sense.
- source_word: בְּיִרְאַת יְהֹוָה
  chosen: in the fear of the LORD
  alternatives:
  - in reverence for the LORD
  - regarding the fear of the LORD
  lexicon: HALOT
  rationale: יראה here is the standard wisdom term 'fear' in covenantal/religious sense. The project default renders יְהוָה as 'the LORD.' 'Fear of the LORD' preserves the established biblical idiom without flattening it to mere respect.
- source_word: וְאַל תִּקְרַב אֵלָיו
  chosen: and do not draw near to him
  alternatives:
  - and do not approach him
  lexicon: HALOT
  rationale: קרב with אֶל marks approach/drawing near. 'Draw near' preserves the relational and potentially cultic resonance better than the more generic 'approach.'
- source_word: בְּלֵב וָלֵב
  chosen: with a divided heart
  alternatives:
  - with a double heart
  - with a duplicitous heart
  - with two hearts
  lexicon: HALOT
  rationale: Literally 'with heart and heart,' an idiom for duplicity or inner division. 'Divided heart' is idiomatic modern English and communicates the sense clearly while remaining close to the Hebrew image.
