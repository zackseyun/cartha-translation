translation:
  text: Do not disobey the fear of the Lord, and do not come to him with a divided
    heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew excerpt supplied for this location is flagged as a major
      mismatch and reads a different saying; the English here follows the Greek witness
      for Sirach 1:27.
    reason: textual_variant
  - marker: b
    text: Or 'with a double heart,' that is, with inner duplicity or divided loyalty.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ἀπειθήσῃς
  chosen: Do not disobey
  alternatives:
  - Do not be disobedient to
  - Do not reject
  lexicon: BDAG
  rationale: The Greek imperative from ἀπειθέω denotes refusal to obey or heed. 'Do
    not disobey' is concise, natural English and preserves the prohibitive force better
    than a looser paraphrase.
- source_word: φόβῳ Κυρίου
  chosen: the fear of the Lord
  alternatives:
  - fear of the Lord
  - reverence for the Lord
  lexicon: LSJ
  rationale: Although the Hebrew in Zone 1 is a major mismatch and does not align
    with this verse, the Greek parallel provides the actual verse text. φόβος Κυρίου
    is a standard wisdom expression; rendering it literally as 'the fear of the Lord'
    preserves its theological resonance better than the interpretive 'reverence.'
    The article in English improves idiomatic sense.
- source_word: προσέλθῃς αὐτῷ
  chosen: come to him
  alternatives:
  - approach him
  - draw near to him
  lexicon: BDAG
  rationale: The verb means to approach or come near. 'Come to him' is readable modern
    English and fits the wisdom exhortation without sounding overly liturgical; 'approach
    him' remains a viable alternative.
- source_word: ἐν καρδίᾳ δισσῇ
  chosen: with a divided heart
  alternatives:
  - with a double heart
  - with a duplicitous heart
  lexicon: LSJ
  rationale: δισσός means double or twofold. The idiom refers to inner division or
    duplicity. 'With a divided heart' communicates the moral and spiritual sense clearly
    in modern English while remaining close to the metaphor; 'double heart' is more
    literal but less idiomatic.
