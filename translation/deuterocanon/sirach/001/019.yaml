translation:
  text: She is a staff of strength and a support, praise and everlasting honor to
    everyone who walks after her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''The root of wisdom is to fear the Lord, and her branches
      are long life.'' The Hebrew witness here differs substantially from the Greek
      tradition.'
    reason: textual_variant
lexical_decisions:
- source_word: מַטּהֵ עֹז
  chosen: a staff of strength
  alternatives:
  - a rod of might
  - a staff of refuge
  lexicon: HALOT
  rationale: מַטֶּה commonly denotes a staff/rod. With עֹז ('strength, might'), the
    phrase is best rendered as an image of stabilizing power. 'Staff' fits the parallel
    with 'support' and reads naturally in English.
- source_word: מַשְׁעֵנָה
  chosen: a support
  alternatives:
  - a stay
  - a staff to lean on
  lexicon: HALOT
  rationale: The noun denotes something leaned upon for support. Because the previous
    phrase already uses 'staff,' rendering this as 'support' preserves the parallelism
    without awkward repetition.
- source_word: תְּהִלָּה
  chosen: praise
  alternatives:
  - renown
  - glory
  lexicon: HALOT
  rationale: The Hebrew most directly means 'praise.' In this poetic list of benefits,
    'praise' can denote praiseworthiness or the praise one receives; retaining the
    concrete noun keeps close to the source.
- source_word: כְבוֹד עוֹלָם
  chosen: everlasting honor
  alternatives:
  - eternal glory
  - lasting honor
  lexicon: HALOT
  rationale: כָּבוֹד is often 'glory' or 'honor'; here 'honor' fits the human recipient
    better in idiomatic English. עוֹלָם conveys enduring duration, hence 'everlasting.'
- source_word: לְכָל הַהוֹלֵךְ אַחֲרֶיהָ
  chosen: to everyone who walks after her
  alternatives:
  - for everyone who follows her
  - to all who go after her
  lexicon: HALOT
  rationale: הלך אחרי is a standard idiom for following after. 'Walks after her' preserves
    the Hebrew metaphor and keeps the feminine suffix, referring back to wisdom.
- source_word: αὐτῆς / אַחֲרֶיהָ
  chosen: her
  alternatives:
  - it
  lexicon: BDAG; HALOT
  rationale: Both the Greek and Hebrew treat wisdom with feminine grammar. Retaining
    'her' preserves the personified portrayal of wisdom rather than flattening it
    to an impersonal abstraction.
