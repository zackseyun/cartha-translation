- issue: Primary source selection amid Hebrew-Greek mismatch
  chosen_reading: Translate the extant Hebrew as the main text while consulting the Greek as a control and explanatory parallel.
  alternative_readings:
  - 'Translate from the Greek: ''He/it poured out knowledge and understanding, and exalted the glory of those who hold her.'''
  rationale: 'For Sirach, where Hebrew survives, project policy gives Hebrew primacy. This verse is marked ''major_mismatch'': the Greek parallel is not a close equivalent of the extant Hebrew line. Therefore the main translation follows the Hebrew witness, but the Greek alternative is preserved in a footnote because the divergence is too significant to ignore and may reflect a different Vorlage or textual development.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
- issue: Gendered personification
  chosen_reading: Retain feminine personification with 'she' and 'her.'
  alternative_readings:
  - Use impersonal 'it' throughout
  rationale: Hebrew wisdom language regularly personifies wisdom as feminine. The suffix on 'produce' is feminine, and preserving 'she/her' reflects the source text more accurately than flattening to impersonal English.
