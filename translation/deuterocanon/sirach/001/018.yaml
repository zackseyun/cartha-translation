translation:
  text: The fear of Yahweh is the beginning of wisdom, and she satisfies with the abundance of her produce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''He/it poured out knowledge and understanding, and exalted the glory of those who hold her.'' The Greek differs sharply from the extant Hebrew here, likely reflecting a different textual form.'
    reason: alternative_reading
lexical_decisions:
- source_word: רֵאשִׁית
  chosen: beginning
  alternatives:
  - first part
  - chief part
  lexicon: HALOT
  rationale: The Hebrew straightforwardly denotes 'beginning' or 'first.' This also aligns with the well-known wisdom formula and fits the syntax of the clause without importing a more interpretive sense such as 'chief principle.'
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering in wisdom literature; no contextual pressure suggests a narrower gloss.
- source_word: יִרְאַת יְהֹוָה
  chosen: the fear of the LORD
  alternatives:
  - fear of Yahweh
  - reverence for the LORD
  lexicon: HALOT
  rationale: This is a stock biblical expression. 'Fear' preserves the theological tension of awe, reverence, and proper dread better than reducing it to 'reverence' alone. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: וּתְרַוֵּה
  chosen: she fills one
  alternatives:
  - it satisfies
  - she drenches
  - she abundantly waters
  lexicon: HALOT
  rationale: The verb likely carries the sense of being saturated or abundantly supplied. Because the subject is feminine ('wisdom' or the implied fear/wisdom complex), 'she' preserves the Hebrew gendered personification common in wisdom literature. 'Fills one' communicates the result naturally in English while retaining the abundance implied by the verb. The Greek parallel's ἐξώμβρισεν ('poured out like rain') supports an image of lavish bestowal.
- source_word: בְּרֹב
  chosen: with the abundance of
  alternatives:
  - in the abundance of
  - by much
  lexicon: HALOT
  rationale: 'The preposition plus noun expresses means or content: the filling occurs with abundant yield. ''With the abundance of'' is idiomatic and preserves the quantitative force.'
- source_word: תְּבוּאָתָהּ
  chosen: her produce
  alternatives:
  - her yield
  - her harvest
  - its fruits
  lexicon: HALOT
  rationale: The noun commonly refers to produce or yield. 'Produce' is broad enough to preserve the agricultural metaphor without over-specifying 'harvest.' The feminine suffix is retained with 'her,' matching the personified feminine imagery. The Greek parallel differs substantially, speaking of knowledge and glory rather than produce; because the Hebrew witness is primary here, the agricultural image is kept in the main text.
