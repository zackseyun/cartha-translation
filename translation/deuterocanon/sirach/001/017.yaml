theological_decisions:
- issue: Divergent Hebrew and Greek witnesses for Sirach 1:17
  chosen_reading: Translate the extant Hebrew as the main text
  alternative_readings:
  - 'Translate the Greek: ''The crown of wisdom is the fear of the Lord, blossoming
    with peace and healing health'''
  rationale: For Sirach, the stated philosophy is to translate from the Hebrew where
    it survives, using the Greek as an actual input and consistency check. Here the
    witnesses differ sharply, so the Hebrew is retained in the main text, but the
    Greek tradition is too significant to ignore and is preserved in a footnote. No
    doctrinal issue is resolved by harmonization; the textual tension is left visible.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    preserve ambiguity/tension rather than resolve it'
