translation:
  text: Her whole storehouse fills with delight, and her granaries with her produce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads, 'Her whole storehouse fills with delight, and her granaries
      with her produce.' The Greek witness instead reads, 'The crown of wisdom is
      the fear of the Lord, blossoming with peace and healing health.'
    reason: textual_variant
  - marker: b
    text: Or 'preciousness,' 'pleasant things,' or 'desirable things' for 'delight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אוֹצָרֶיהָ
  chosen: her whole storehouse
  alternatives:
  - all her treasuries
  - all her storehouses
  lexicon: HALOT
  rationale: אוֹצָר denotes a storehouse, treasury, or store of goods. Given the parallel
    with אֲסָמֶיהָ ('her granaries'), an agricultural/storage sense fits better than
    abstract 'treasuries.' The singular English 'storehouse' is used collectively
    for readability, while 'whole' reflects כָּל.
- source_word: תְּמַלֵּא
  chosen: fills
  alternatives:
  - will fill
  - is filled with
  lexicon: HALOT
  rationale: The Hebrew imperfect can be rendered as a present gnomic statement in
    wisdom literature. 'Fills' gives a proverbial sense in smooth English without
    overcommitting to future tense.
- source_word: חֶמְדָּה
  chosen: delight
  alternatives:
  - desire
  - preciousness
  - pleasant things
  lexicon: HALOT
  rationale: חמדה can denote desirability, preciousness, or delight. Here the object
    of filling is somewhat abstract, and 'delight' best captures the positive value
    associated with wisdom's abundance. Because the Hebrew witness is marked with
    source mismatch and the Greek parallel differs substantially, a lexical alternative
    is preserved in a footnote.
- source_word: וַאֲסָמֶיהָ
  chosen: and her granaries
  alternatives:
  - and her barns
  - and her storehouses
  lexicon: HALOT
  rationale: אָסָם refers to a granary or barn. 'Granaries' keeps the agricultural
    image and pairs naturally with 'produce.'
- source_word: בִּתְבוּאָתָהּ
  chosen: with her produce
  alternatives:
  - with its yield
  - with her harvest
  lexicon: HALOT
  rationale: תבואה is produce, yield, or harvest. 'Produce' is broad and idiomatic
    in English. The feminine suffix is retained as 'her' to match the personified
    subject, wisdom.
- source_word: στέφανος σοφίας
  chosen: not adopted in main text
  alternatives:
  - crown of wisdom
  lexicon: BDAG
  rationale: The Greek parallel presents a substantially different line ('The crown
    of wisdom...'), indicating a major divergence between the Hebrew and Greek witnesses.
    Because the project prioritizes surviving Hebrew for Sirach where available, the
    Hebrew governs the main text, while the Greek reading is preserved in a footnote
    as a significant alternative tradition.
