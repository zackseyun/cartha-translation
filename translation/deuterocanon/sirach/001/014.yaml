translation:
  text: The beginning of wisdom is the fear of the LORD, and with the faithful she
    was formed in the womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek reads quite differently: ''Among men she nested as an eternal foundation,
      and with their offspring she will be entrusted.'' The Hebrew and Greek witnesses
      diverge substantially here.'
    reason: alternative_reading
  - marker: b
    text: Or possibly 'was preserved in the womb,' if the Hebrew verb is taken from
      a root meaning 'guard' rather than understood in a formation/birth sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  chosen: the beginning of
  alternatives:
  - first part of
  - chief part of
  lexicon: HALOT
  rationale: 'In construct with ''wisdom,'' the most natural sense is temporal/origin
    language: ''the beginning of wisdom.'' This also aligns with common Hebrew usage
    and the broader sapiential motif.'
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering in wisdom literature; no contextual pressure suggests
    a narrower gloss such as 'skill' or 'prudence' here.
- source_word: יִרְאַת יְהֹוָה
  chosen: the fear of the LORD
  alternatives:
  - fear of Yahweh
  - reverence for the LORD
  lexicon: HALOT
  rationale: This is a fixed wisdom expression. 'Fear' preserves the lexical force
    better than the softer 'reverence,' while 'the LORD' follows project policy for
    YHWH.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine for the divine name.
- source_word: וְעִם
  chosen: and with
  alternatives:
  - and among
  - and alongside
  lexicon: HALOT
  rationale: The preposition most directly means 'with.' 'Among' is possible interpretively,
    but the Hebrew wording is straightforwardly relational.
- source_word: נֶאֱמָנִים
  chosen: the faithful
  alternatives:
  - the trustworthy
  - the faithful ones
  lexicon: HALOT
  rationale: The adjective/substantive likely refers to faithful people. 'The faithful'
    is idiomatic English and preserves the moral-religious sense.
- source_word: נוֹצְרָה
  chosen: was formed
  alternatives:
  - was guarded
  - was preserved
  - was created
  lexicon: HALOT
  rationale: The Hebrew consonants could suggest a verb from נצר ('guard/preserve'),
    but in this context with 'in the womb' the sense 'was formed' best fits the Hebrew
    line as transmitted and coheres with the Greek parallel's imagery of being established
    from the beginning. Because the source validation flags a major mismatch and the
    Greek differs substantially, this choice is made with caution and preserved as
    auditable.
- source_word: בַבָּטֶן
  chosen: in the womb
  alternatives:
  - in the belly
  lexicon: HALOT
  rationale: '''Womb'' is the natural English rendering in this context and better
    conveys prenatal imagery than the more literal but less idiomatic ''belly''.'
