translation:
  text: Do not be hypocritical in the mouths of men, and watch your lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'before people' or 'among people.' The Greek literally
      says 'in the mouths of men.'
    reason: lexical_alternative
  - marker: b
    text: The extant Hebrew line in the supplied witness reads, 'Hear all my words
      and do them, and you will be written in the book of life,' which appears mismatched
      to this verse; the translation therefore follows the Greek text here.
    reason: textual_variant
lexical_decisions:
- source_word: μὴ ὑποκριθῇς
  chosen: Do not be hypocritical
  alternatives:
  - Do not play the hypocrite
  - Do not dissemble
  lexicon: BDAG
  rationale: The Hebrew witness in Zone 1 is clearly mismatched to this verse, so
    the Greek parallel must function as the actual translation base. The passive/deponent
    form from ὑποκρίνομαι here warns against hypocritical behavior or pretense. 'Do
    not be hypocritical' is idiomatic modern English and preserves the ethical force
    without archaic diction.
- source_word: ἐν στόμασιν ἀνθρώπων
  chosen: in the mouths of men
  alternatives:
  - before people
  - among men
  - in human speech
  lexicon: LSJ
  rationale: Formally the phrase is 'in the mouths of men.' Although somewhat unusual
    in English, it likely refers to one's speech in human company or public discourse.
    I retained the imagery because it is present in the Greek and may intentionally
    pair with the second colon about lips. 'Men' follows the source's masculine/generic
    form per project philosophy; a smoother alternative is preserved in a footnote.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - but
  lexicon: BDAG
  rationale: Simple coordination best fits the parallelism between the two cola.
- source_word: ἐν τοῖς χείλεσί σου πρόσεχε
  chosen: watch your lips
  alternatives:
  - be careful with your lips
  - pay attention to your lips
  - guard your lips
  lexicon: BDAG
  rationale: The idiom calls for careful speech. 'Watch your lips' is concise, natural,
    and preserves the bodily imagery of χείλη ('lips'). 'Guard your lips' is also
    possible, but 'watch' better reflects πρόσεχε in accessible modern English.
