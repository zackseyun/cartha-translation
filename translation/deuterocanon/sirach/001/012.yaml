translation:
  text: The fear of the LORD gladdens the heart, and gives joy and favor and length
    of days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: “For the one who fears the Lord, it will be well in the end, and
      on the day of his death he will be blessed.” The Greek parallel preserves a
      substantially different form of this verse.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְאַת יְהֹוָה
  chosen: the fear of the LORD
  alternatives:
  - fear of Yahweh
  - reverence for the LORD
  lexicon: HALOT
  rationale: The Hebrew witness is primary where extant. יִרְאָה with the divine name
    commonly denotes reverent fear directed toward God. Per doctrine, יְהוָה is rendered
    'the LORD.' 'Fear' is retained rather than softened to 'reverence' because the
    Hebrew term naturally carries that fuller weight, though reverential nuance is
    included in context.
- source_word: מְשַׂמַּחַת
  chosen: gladdens
  alternatives:
  - makes glad
  - rejoices
  lexicon: HALOT
  rationale: '''Gladdens'' gives a natural English verbal rendering of the causative
    sense, with לֵב as its object. It is slightly more literary than ''makes glad''
    while remaining clear.'
- source_word: לֵב
  chosen: the heart
  alternatives:
  - the mind
  - the inner self
  lexicon: HALOT
  rationale: Hebrew לֵב regularly denotes the inner person, including thought and
    emotion, but 'heart' is the standard and sufficiently transparent rendering here.
- source_word: וְנוֹתֶנֶת
  chosen: and gives
  alternatives:
  - and grants
  - and bestows
  lexicon: HALOT
  rationale: A straightforward rendering of the participial verb that matches the
    coordinate structure of the verse. 'Gives' is idiomatic and avoids over-elevating
    the diction.
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  lexicon: HALOT
  rationale: The noun overlaps semantically with the preceding verb, but the Hebrew
    intentionally piles up benefits. 'Joy' is concise and idiomatic.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - charm
  lexicon: HALOT
  rationale: חֵן can mean favor, grace, or attractiveness. 'Favor' best fits a wisdom
    context listing benefits bestowed by fearing the LORD, without importing later
    theological freight often attached to 'grace.'
- source_word: אֹרֶךְ יָמִים
  chosen: length of days
  alternatives:
  - long life
  - length of life
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for longevity. 'Length of days' preserves
    the Hebrew flavor while remaining understandable; 'long life' is possible but
    less formally transparent.
