- issue: Divergence between the Hebrew witness and the Greek parallel
  chosen_reading: Translate the extant Hebrew text as primary, while noting the Greek
    preserves a substantially different saying about the one who fears the Lord being
    blessed at the end and on the day of death.
  alternative_readings:
  - The one who fears the Lord will fare well in the end, and on the day of his death
    he will be blessed.
  rationale: Project policy gives primacy to the Hebrew Ben Sira where it survives,
    but the prompt flags a major mismatch and instructs that the Greek parallel be
    used as actual translation input. The Hebrew line is coherent and well-formed,
    so it is translated in the main text; the Greek's distinct form is preserved in
    a footnote as a significant alternative witness rather than harmonized into the
    main text.
