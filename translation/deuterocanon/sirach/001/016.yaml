translation:
  text: The beginning of wisdom is the fear of Yahweh, and it brings abundant peace and life and healing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek witness: ''She filled all their house with her desirable things, and the storehouses with her produce.'' This verse differs substantially from the extant Hebrew line.'
    reason: textual_variant
lexical_decisions:
- source_word: רֵאשִׁית
  chosen: beginning
  alternatives:
  - first part
  - chief part
  lexicon: HALOT
  rationale: The noun commonly denotes 'beginning' or 'first.' In this wisdom saying, 'beginning' is the most natural English and matches the Hebrew construction without over-interpreting whether the sense is temporal or foundational.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering in wisdom literature; no contextual pressure suggests a narrower gloss such as 'skill' here.
- source_word: יִרְאַת
  chosen: fear of
  alternatives:
  - reverence for
  lexicon: HALOT
  rationale: The construct form with the divine name yields the established biblical expression 'fear of the LORD.' 'Reverence' captures part of the sense but softens the weight of the Hebrew too much for the main text.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton is rendered 'the LORD' rather than transliterated.
- source_word: וּמַרְבָּה
  chosen: an abundance of
  alternatives:
  - much
  - increase of
  lexicon: HALOT
  rationale: The form points to abundance/increase. 'An abundance of' reads naturally in English and preserves the noun-like force better than the flatter 'much.'
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard gloss and fits the collocation with life and healing. Broader nuances such as well-being are real but need not displace the primary rendering here.'
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  lexicon: HALOT
  rationale: Though morphologically plural, the Hebrew commonly functions as the abstract singular 'life' in English.
- source_word: וּמַרְפֵּא
  chosen: healing
  alternatives:
  - health
  - remedy
  lexicon: HALOT
  rationale: The noun can denote healing or health. 'Healing' best preserves the active restorative sense and fits the sequence 'peace and life and healing.'
