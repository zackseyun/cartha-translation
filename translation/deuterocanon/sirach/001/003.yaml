theological_decisions:
- issue: Use of the Greek parallel's added 'and wisdom' absent from the Hebrew witness
  chosen_reading: Follow the extant Hebrew as the main text without adding 'and wisdom.'
  alternative_readings:
  - The Greek parallel reads 'the height of heaven and the breadth of the earth and
    the abyss and wisdom—who will trace out?'
  rationale: Zone 1 gives a high-confidence Hebrew text, and project policy gives
    primacy to the Hebrew where it survives in Sirach. The Greek parallel is treated
    as a real input and confirms the cosmological vocabulary, but its additional 'and
    wisdom' is not imported into the main text because it is absent from the Hebrew
    witness. The alternative is preserved in a footnote as a meaningful variant affecting
    interpretation of the verse's scope.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it
