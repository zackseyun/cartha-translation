id: SIR.1.10
reference: Sirach 1:10
source:
  edition: lxx-swete-1909
  text: φόβος κυρίου δόξα καὶ καύχημα, καὶ εὐφροσύνη καὶ στέφανος ἀγαλλιάματος.
  language: Greek
