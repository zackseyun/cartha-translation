translation:
  text: The fear of the Lord is glory and exultation, and gladness and a crown of
    rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The fear of the Lord is glory and exultation, and joy and a crown of
      jubilation.' The Greek piles up near-synonyms for honor and joy.
    reason: lexical_alternative
lexical_decisions:
- source_word: φόβος
  chosen: fear
  alternatives:
  - reverence
  - awe
  lexicon: BDAG
  rationale: The standard wisdom expression 'fear of the Lord' is best preserved literally.
    'Reverence' or 'awe' capture aspects of the sense, but 'fear' retains the established
    theological idiom and the fuller range of humble, obedient regard.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per project default. The article is supplied
    in English because the genitive construction 'fear of the Lord' is idiomatic and
    natural.
- source_word: δόξα
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: BDAG
  rationale: δόξα here denotes honor/exaltation associated with fearing the Lord.
    'Glory' preserves the weight and traditional resonance of the term in biblical
    diction.
- source_word: καύχημα
  chosen: boasting
  alternatives:
  - pride
  - ground for boasting
  - exultation
  lexicon: BDAG
  rationale: The noun commonly denotes boasting or a basis for boasting. 'Boasting'
    is more literal than 'pride' and avoids importing a purely negative moral sense;
    the verse presents this as legitimate exultation in relation to the Lord.
- source_word: εὐφροσύνη
  chosen: gladness
  alternatives:
  - joy
  - cheerfulness
  lexicon: BDAG
  rationale: '''Gladness'' fits the list of benefits and pairs well with the following
    phrase. ''Joy'' is possible, but using ''gladness'' avoids flattening the distinction
    from ἀγαλλίαμα.'
- source_word: στέφανος
  chosen: crown
  alternatives:
  - wreath
  - garland
  lexicon: BDAG
  rationale: στέφανος is a victor's wreath/crown. 'Crown' is the most natural English
    rendering and preserves the metaphor of honor bestowed.
- source_word: ἀγαλλιάματος
  chosen: rejoicing
  alternatives:
  - exultation
  - jubilation
  lexicon: BDAG
  rationale: The genitive likely qualifies 'crown' as a crown characterized by rejoicing.
    'Rejoicing' is clear, natural, and distinct enough from 'gladness' to preserve
    the poetic accumulation.
