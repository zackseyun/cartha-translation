id: SIR.1.24
reference: Sirach 1:24
source:
  edition: sefaria-ben-sira-kahana
  text: '[יִשְׂמַח בָּהּ וְתִשְׂמַח בּוֹ, וּבַל תַּעַזְבֵהוּ לְעוֹלָם וָעֶד.]'
  language: Hebrew
  pages:
  - 681
  - 722
  - 729
  - 744
  - 767
  - 768
  - 769
  confidence: high
  validation: major_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐν θησαυροῖς σοφίας παραβολαὶ ἐπιστήμης, βδέλυγμα δὲ ἁμαρτωλῷ θεοσέβεια.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 1:24
translation:
  text: He will rejoice in her, and she will rejoice in him; and do not forsake him
    forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Cairo Geniza Hebrew line in Kahana for this location reads approximately,
      'He will rejoice in her and she will rejoice in him, and do not forsake him
      forever and ever,' which does not match the Greek wording here; the main translation
      therefore follows the Greek witness for this verse.
    reason: textual_variant
  - marker: b
    text: Or 'parables of knowledge' / 'proverbs of understanding.'
    reason: lexical_alternative
  - marker: c
    text: Or 'piety' for 'godliness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν θησαυροῖς
  chosen: In the treasures of
  alternatives:
  - Among the treasures of
  - Within the treasuries of
  lexicon: LSJ
  rationale: The Hebrew witness in Zone 1 is clearly mismatched to this verse, so
    the Greek parallel functions as the usable translation base. ἐν with the dative
    is naturally rendered 'in'; θησαυροῖς denotes treasures or storehouses. 'Treasures'
    is more idiomatic and preserves the metaphor.
- source_word: σοφίας
  chosen: wisdom
  lexicon: LSJ
  rationale: 'Standard rendering of σοφία. The genitive is possessive/descriptive:
    the treasures belong to or consist in wisdom.'
- source_word: παραβολαὶ
  chosen: sayings
  alternatives:
  - parables
  - proverbs
  - illustrations
  lexicon: LSJ
  rationale: Although παραβολαί can mean 'parables' or 'proverbs,' in wisdom literature
    a broader term like 'sayings' best fits the genre and avoids importing the later
    Gospel-specific sense of 'parable.'
- source_word: ἐπιστήμης
  chosen: insightful
  alternatives:
  - of knowledge
  - of understanding
  - knowledgeable
  lexicon: LSJ
  rationale: The genitive qualifies the sayings as characterized by knowledge/understanding.
    Rendering it adjectivally as 'insightful' gives natural English while preserving
    the sense that these sayings convey understanding.
- source_word: βδέλυγμα
  chosen: an abomination
  alternatives:
  - detestable
  - a disgust
  lexicon: LSJ
  rationale: βδέλυγμα is a strong term for something detestable or abhorrent. 'An
    abomination' preserves the moral and religious force typical of biblical usage.
- source_word: ἁμαρτωλῷ
  chosen: to a sinner
  alternatives:
  - for a sinner
  - in the eyes of a sinner
  lexicon: LSJ
  rationale: 'The dative here is best taken as reference: godliness is abhorrent from
    the sinner''s standpoint. ''To a sinner'' is concise and idiomatic.'
- source_word: θεοσέβεια
  chosen: godliness
  alternatives:
  - piety
  - reverence for God
  lexicon: LSJ
  rationale: θεοσέβεια denotes reverence toward God or piety. 'Godliness' is accessible
    modern English and preserves the religious-ethical sense without sounding overly
    technical.
