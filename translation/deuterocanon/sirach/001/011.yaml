    reference: Sirach 1:11
translation:
  text: The fear of the LORD is glory and honor, greatness and a crown of splendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a substantially different reading: ''The fear of the Lord delights
      the heart, and gives gladness and joy and long life.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְאַת
  chosen: the fear of
  alternatives:
  - fear
  - reverence for
  lexicon: HALOT
  rationale: Construct form of יִרְאָה with יְהֹוָה; 'the fear of' preserves the Hebrew
    idiom common in wisdom literature. 'Reverence' captures part of the sense but
    is narrower and less textually direct.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows project doctrine for the divine name, preserving Jewish reverence
    convention and standard English Bible practice.
- source_word: כָּבוֹד
  chosen: glory
  alternatives:
  - honor
  - weight
  lexicon: HALOT
  rationale: In this paired list of benefits/qualities, 'glory' best reflects the
    elevated dignity conveyed by כָּבוֹד. 'Weight' is too literal in English here,
    and 'honor' is already used for the next term.
- source_word: וִיקָר
  chosen: honor
  alternatives:
  - preciousness
  - splendor
  - value
  lexicon: HALOT
  rationale: יקר can denote preciousness or honor. In parallel with כָּבוֹד, 'honor'
    gives a natural English pairing without collapsing the final תִּפְאָרֶת, which
    more naturally bears 'splendor'.
- source_word: וּגְדֻלָּה
  chosen: greatness
  alternatives:
  - majesty
  - exaltation
  lexicon: HALOT
  rationale: גדלה denotes greatness or majesty. 'Greatness' is the most direct rendering
    and fits the nominal series.
- source_word: וְעֲטֶרֶת
  chosen: and a crown of
  alternatives:
  - and the crown of
  - and a garland of
  lexicon: HALOT
  rationale: עטרת is literally 'crown of.' The indefinite article reads naturally
    in English within a predicate list. 'Garland' is possible in some contexts but
    less likely here.
- source_word: תִּפְאָרֶת
  chosen: splendor
  alternatives:
  - beauty
  - glory
  - majesty
  lexicon: HALOT
  rationale: תפארת often denotes beauty or glory, but 'splendor' avoids repetition
    with כָּבוֹד and suits the image 'crown of splendor.'
- source_word: φόβος κυρίου
  chosen: The fear of the LORD
  alternatives:
  - fear of the Lord
  lexicon: BDAG
  rationale: The Greek parallel confirms the standard wisdom expression and supports
    retaining 'fear' rather than softening to 'reverence'.
- source_word: τέρψει καρδίαν ... εὐφροσύνην ... χαρὰν ... μακροημέρευσιν
  chosen: not adopted in main text
  alternatives:
  - delights the heart, and gives gladness and joy and long life
  lexicon: BDAG
  rationale: The Greek parallel diverges substantially from the extant Hebrew, which
    presents a nominal list rather than a verbal promise. Because Hebrew survives
    for this verse and is the primary witness for Sirach where available, the main
    text follows the Hebrew while preserving the Greek sense in a footnote.
