lexical_decisions:
- source_word: ἕως καιροῦ
  chosen: Until the right time
  alternatives:
  - Until a time
  - Until the appointed time
  lexicon: LSJ
  rationale: The extant Hebrew in Zone 1 is clearly mismatched to the Greek parallel,
    so the Greek must guide the translation here. καιρός commonly denotes a fitting
    or appointed time rather than mere chronological time; 'the right time' preserves
    that nuance in natural English without over-specifying.
- source_word: κρύψει
  chosen: he will conceal
  alternatives:
  - he will hide
  - he will keep hidden
  lexicon: BDAG
  rationale: Future active of κρύπτω. 'Conceal' fits the formal sense and reads naturally
    in context of restrained speech.
- source_word: τοὺς λόγους αὐτοῦ
  chosen: his words
  alternatives:
  - what he says
  - his sayings
  lexicon: BDAG
  rationale: λόγοι is straightforwardly 'words' or 'sayings.' 'His words' is the most
    transparent rendering and avoids interpretive expansion.
- source_word: χείλη πολλῶν
  chosen: the lips of many
  alternatives:
  - many lips
  - many people
  lexicon: LSJ
  rationale: A literal rendering preserves the Hebrew-like idiom present in Greek
    wisdom style. It also keeps the poetic parallelism with 'his words' and 'his understanding.'
- source_word: ἐκδιηγήσεται
  chosen: will recount
  alternatives:
  - will tell in full
  - will declare
  lexicon: BDAG
  rationale: The verb suggests narrating or setting forth in detail. 'Recount' captures
    that sense better than the flatter 'tell' while remaining readable.
- source_word: σύνεσιν αὐτοῦ
  chosen: his understanding
  alternatives:
  - his insight
  - his discernment
  lexicon: BDAG
  rationale: σύνεσις in wisdom literature denotes understanding or insight. 'Understanding'
    is the broadest and most standard equivalent, suitable for consistency.
