translation:
  text: Desire wisdom, keep the commandments, and the Lord will supply her to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew line supplied for this verse does not match Sirach 1:25;
      the translation therefore follows the Greek witness here.
    reason: textual_variant
  - marker: b
    text: Or 'If you desire wisdom, keep the commandments, and the Lord will grant
      her to you.' The opening participle may be taken conditionally, and 'grant'
      is a possible alternative to 'supply.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιθυμήσας
  chosen: Desire
  alternatives:
  - If you desire
  - Set your desire on
  - Long for
  lexicon: BDAG
  rationale: The extant Hebrew in Zone 1 is clearly mismatched to this verse, so the
    Greek parallel must function as the actual translation base. The aorist participle
    can be rendered conditionally ('if you desire') or imperativally in context. Given
    the sequence of exhortations in the verse, an English imperative is the most natural
    optimal-equivalence rendering.
- source_word: σοφίαν
  chosen: wisdom
  lexicon: BDAG
  rationale: Standard rendering; personified as feminine later in the verse, which
    supports retaining 'her' for αὐτήν.
- source_word: διατήρησον
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: BDAG
  rationale: In commandment contexts, 'keep' is idiomatic modern English and preserves
    the covenantal-obediential sense without sounding overly technical.
- source_word: ἐντολάς
  chosen: the commandments
  alternatives:
  - commandments
  - the commands
  lexicon: BDAG
  rationale: The article is represented in English for naturalness and specificity.
    'Commandments' better matches biblical ethical-religious diction than the flatter
    'commands'.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows project default for κύριος. The article is retained for natural
    English syntax.
- source_word: χορηγήσει
  chosen: will supply
  alternatives:
  - will give
  - will grant
  - will furnish
  lexicon: BDAG
  rationale: '''Supply'' preserves the sense of generously providing, which is stronger
    than a bare ''give'' and fits the verb''s nuance.'
- source_word: σοι
  chosen: to you
  alternatives:
  - you
  lexicon: BDAG
  rationale: Explicit dative rendering keeps the clause clear and natural.
- source_word: αὐτήν
  chosen: her
  alternatives:
  - it
  lexicon: BDAG
  rationale: Because σοφία is grammatically feminine and personified throughout wisdom
    literature, 'her' better preserves the literary-theological texture than the impersonal
    'it'.
