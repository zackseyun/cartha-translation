theological_decisions:
- issue: Primary source selection for this verse
  chosen_reading: Translate from the Greek parallel rather than the mismatched Hebrew
    line in Zone 1.
  alternative_readings:
  - Attempt to translate the supplied Hebrew text as the verse
  rationale: The Hebrew given ('The angels of God will rejoice in her...') does not
    correspond to Sirach 1:25, while the Greek parallel does. Per project philosophy,
    translation should be anchored in the most original available witness, but source
    uncertainty must be stated honestly. Here the Hebrew witness as supplied is unusable
    for this verse, so the Greek serves as the effective base text.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives and
    from Greek where it does not; preserve source uncertainty honestly.'
- issue: Gendered reference to wisdom
  chosen_reading: Use 'her' for wisdom.
  alternative_readings:
  - Use 'it' for wisdom
  rationale: This preserves the feminine personification of wisdom in the source and
    aligns with the project's gender-accurate philosophy rather than flattening the
    imagery into an abstract neuter.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
