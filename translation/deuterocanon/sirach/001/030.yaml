theological_decisions:
- issue: Source-text priority where Hebrew and Greek witnesses conflict
  chosen_reading: Translate from the Greek proverb about water, fire, and almsgiving,
    while noting the Hebrew in Zone 1 appears to be a major mismatch.
  alternative_readings:
  - Translate the supplied Hebrew text about drawing near and finding life
  rationale: The Zone 1 Hebrew text does not correspond semantically to the verse
    reference and is flagged 'major_mismatch.' Per project philosophy, we translate
    from the most original viable witness available; here the Greek parallel is the
    only coherent witness for Sirach 1:30 in the prompt. The mismatch should be documented
    rather than silently harmonized.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives and
    from Greek where it does not; preserve source uncertainty honestly'
- issue: Rendering the expiatory claim of ἐξιλάσεται
  chosen_reading: makes atonement for sins
  alternative_readings:
  - expiates sins
  - covers sins
  rationale: The verse attributes real atoning efficacy to almsgiving in wisdom-saying
    form. The translation should preserve that theological tension rather than soften
    it into mere social benefit. 'Makes atonement for' is clear and faithful without
    importing later systematic categories.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
