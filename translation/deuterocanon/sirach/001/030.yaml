translation:
  text: Water puts out a blazing fire, and almsgiving makes atonement for sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew text supplied in Zone 1 for this verse appears to be mismatched
      to Sirach 1:30. The English translation therefore follows the Greek witness
      here: ''Water puts out a blazing fire, and almsgiving makes atonement for sins.'''
    reason: textual_variant
  - marker: b
    text: Or 'quenches a flaming fire'; the Greek image is proverbial.
    reason: lexical_alternative
  - marker: c
    text: '''Almsgiving'' refers specifically to giving to the poor; the Greek does
      not mean charity in only a broad or abstract sense.'
    reason: cultural_note
lexical_decisions:
- source_word: πῦρ φλογιζόμενον
  chosen: a blazing fire
  alternatives:
  - a fire being kindled
  - flaming fire
  lexicon: LSJ
  rationale: The extant Hebrew in Zone 1 is clearly mismatched to this verse, so the
    Greek parallel must function as the primary translatable text here. φλογιζόμενον
    describes fire in active flame; 'blazing' is idiomatic modern English that preserves
    the vividness without awkward literalism.
- source_word: ἀποσβέσει
  chosen: puts out
  alternatives:
  - quenches
  - extinguishes
  lexicon: LSJ
  rationale: A present-tense English proverbial statement best conveys the gnomic
    future Greek. 'Puts out' is more natural than 'quenches' while retaining the concrete
    image.
- source_word: ἐλεημοσύνη
  chosen: almsgiving
  alternatives:
  - charity
  - acts of mercy
  lexicon: LSJ
  rationale: The term specifically denotes giving to the needy, not abstract love
    or general mercy. 'Almsgiving' is the most precise English equivalent, even if
    slightly specialized; 'charity' is broader and potentially misleading.
- source_word: ἐξιλάσεται
  chosen: makes atonement for
  alternatives:
  - atones for
  - expiates
  lexicon: LSJ
  rationale: The verb carries expiatory/atoning force. 'Makes atonement for' is accessible
    modern English and preserves the theological weight better than the more technical
    'expiates'.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - sin
  lexicon: LSJ
  rationale: The Greek plural is retained in English as 'sins,' matching the object
    of atonement in this wisdom saying.
