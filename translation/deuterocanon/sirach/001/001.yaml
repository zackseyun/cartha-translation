translation:
  text: All wisdom is from the Lord, and it is with him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from YHWH''; Greek parallel: ''from the Lord.'' This draft renders
      ''the Lord'' in the main text for natural English and alignment with the parallel
      source.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: The Hebrew quantifier is comprehensive. 'All' is idiomatic in English
    and matches the universal scope also reflected by the Greek πᾶσα.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - skill
  - wise understanding
  lexicon: HALOT
  rationale: In Sirach this term carries the broad sapiential sense of wisdom rather
    than merely technical skill. The Greek σοφία confirms the standard sapiential
    meaning.
- source_word: מֵיהֹוָה
  chosen: from the Lord
  alternatives:
  - from YHWH
  - from the LORD
  lexicon: HALOT
  rationale: 'The Hebrew names YHWH. Per doctrine, the default rendering is ''the
    LORD,'' but because the Greek parallel has παρὰ Κυρίου and the immediate English
    sentence reads more naturally with ''from the Lord,'' this draft uses ''the Lord''
    while preserving the underlying divine name in the rationale. The sense is source/origin:
    wisdom comes from him.'
- source_word: וִעמּוֹ
  chosen: and it is with him
  alternatives:
  - and with him it is
  - and it remains with him
  lexicon: HALOT
  rationale: The preposition עם with pronominal suffix means 'with him.' The Hebrew
    verbless clause is naturally rendered with 'it is'; the Greek ἐστιν supports making
    the copula explicit in English.
- source_word: הִיא
  chosen: it
  alternatives:
  - she
  lexicon: HALOT
  rationale: Hebrew חָכְמָה is grammatically feminine, but English normally refers
    to the abstract noun 'wisdom' as 'it' in straightforward prose. This preserves
    meaning without importing personification not demanded by the verse.
- source_word: לְעוֹלָמִים
  chosen: forever
  alternatives:
  - for ages
  - for evermore
  - unto the ages
  lexicon: HALOT
  rationale: The plural form expresses enduring perpetuity. 'Forever' is clear modern
    English and fits the verse's claim that wisdom abides with God eternally. The
    Greek εἰς τὸν αἰῶνα points in the same direction.
