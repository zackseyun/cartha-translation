theological_decisions:
- issue: Rendering the divine name יהוה in a deuterocanonical Hebrew witness alongside
    Greek Κύριος
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  - Yahweh
  rationale: The Hebrew witness has the divine name, while the Greek parallel reads
    'from the Lord.' The project's default for YHWH is 'the LORD,' but 'the Lord'
    here preserves alignment with the Greek parallel and reads naturally in context
    without changing the referent. The decision is stylistic rather than doctrinal;
    the source still identifies Israel's God as the origin of wisdom.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
