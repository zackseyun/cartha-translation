translation:
  text: Happy is the man who meditates on her, and she is better for him than every
    treasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness here reads very differently: ''For the swing of his anger
      is his downfall.'' This likely reflects a different textual form or verse alignment
      than the extant Hebrew.'
    reason: textual_variant
  - marker: b
    text: Or 'Blessed is the man who ponders her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Happy is
  alternatives:
  - Blessed is
  lexicon: HALOT
  rationale: The Hebrew beatitude formula אַשְׁרֵי introduces a state of enviable
    well-being. 'Happy is' is natural modern English and fits the wisdom context,
    while 'Blessed is' remains a viable alternative with more traditional resonance.
- source_word: אֱנוֹשׁ
  chosen: the man
  alternatives:
  - a man
  - a person
  lexicon: HALOT
  rationale: The noun denotes a human being, often with emphasis on mortal man. Following
    the project's gender-accurate policy, 'the man' preserves the masculine singular
    form used representatively in Hebrew wisdom style.
- source_word: יֶהְגֶּה
  chosen: meditates
  alternatives:
  - ponders
  - muses on
  lexicon: HALOT
  rationale: The verb הגה in wisdom contexts commonly means to meditate, muse, or
    ponder. 'Meditates' best captures sustained reflective attention and suits the
    object 'on her' (wisdom).
- source_word: בָּהּ
  chosen: on her
  alternatives:
  - in her
  - on it
  lexicon: HALOT
  rationale: The feminine pronominal suffix points to a feminine antecedent, most
    naturally wisdom in the surrounding context. 'On her' preserves the personified
    feminine reference rather than flattening it to 'it'.
- source_word: וְטוֹבָה
  chosen: she is better
  alternatives:
  - and she is good
  - and it is good
  lexicon: HALOT
  rationale: Although the adjective can mean 'good,' the comparative phrase with מִן/מִכָּל
    favors a sense of superiority in value. Rendering the clause as 'she is better'
    makes the comparison explicit in idiomatic English.
- source_word: מִכָּל אוֹצָר
  chosen: than every treasure
  alternatives:
  - than all treasure
  - than any storehouse
  lexicon: HALOT
  rationale: אוֹצָר can denote treasure or a treasury/storehouse. In this wisdom saying,
    the sense is accumulated wealth or treasure. 'Every treasure' preserves the Hebrew
    totalizing force of מִכָּל while reading smoothly in English.
- source_word: ἡ γὰρ ῥοπὴ τοῦ θυμοῦ αὐτοῦ πτῶσις αὐτῷ
  chosen: not followed in main text
  alternatives:
  - for the swing of his anger is his downfall
  lexicon: LSJ
  rationale: The Greek parallel as given differs radically from the extant Hebrew
    and appears to reflect a different textual form or verse alignment. Because the
    Hebrew witness is the most original available here for this verse in this project,
    the main translation follows the Hebrew, while the Greek divergence is preserved
    in a footnote as a significant alternative witness.
