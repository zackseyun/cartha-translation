lexical_decisions:
- source_word: אֶל כָּל בָּשָׂר
  chosen: upon all flesh
  alternatives:
  - to all flesh
  - upon every creature
  - for all humanity
  lexicon: HALOT
  rationale: The Hebrew phrase literally means 'to all flesh,' an idiom for all living
    creatures or all humankind. 'Upon all flesh' is chosen because the Greek parallel
    has ἐπὶ πάντα τὰ ἔργα αὐτοῦ ('upon all his works') in the adjacent tradition,
    and the verb 'poured out' naturally governs 'upon.' 'Flesh' preserves the Hebrew
    idiom transparently rather than flattening it to 'humanity.'
- source_word: כִּרְצוֹנוֹ
  chosen: according to his will
  alternatives:
  - as he pleased
  - according to his desire
  lexicon: HALOT
  rationale: רָצוֹן here denotes will, pleasure, or desire. 'According to his will'
    is idiomatic modern English and preserves divine intentionality without sounding
    colloquial.
- source_word: נְתָנָהּ
  chosen: He poured her out
  alternatives:
  - he gave her
  - he bestowed her
  lexicon: HALOT
  rationale: The extant Hebrew as presented reads a form from נתן ('gave'), but the
    Greek parallel strongly supports a verb meaning 'poured out' (ἐξέχεεν) for wisdom
    in this context. Because the source validation flags a major mismatch and the
    task requires using the Greek parallel as actual translation input, the English
    follows the better-supported sense 'poured out' while documenting the Hebrew surface
    reading as an alternative.
- source_word: וַיִּתְּנָהּ
  chosen: and he gave her
  alternatives:
  - and he granted her
  - and he bestowed her
  lexicon: HALOT
  rationale: The second Hebrew verb clearly means 'and he gave her.' The feminine
    suffix refers back to wisdom. 'Gave' is the plain and sufficient rendering.
- source_word: לְאֹהֲבָיו
  chosen: to those who love him
  alternatives:
  - to his lovers
  - to his beloved ones
  - to those who love him dearly
  lexicon: HALOT
  rationale: The participial form means 'his lovers' in the sense of those who love
    him. 'Those who love him' is natural English and preserves the relational, covenantal
    sense without awkwardness.
