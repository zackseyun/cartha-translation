translation:
  text: He poured her out upon all flesh according to his will, and he gave her to
    those who love him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew as transmitted reads 'he gave her' in the first clause; the Greek
      parallel supports 'he poured her out,' which is followed here because the Hebrew
      witness for this verse is marked textually uncertain.
