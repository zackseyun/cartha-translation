translation:
  text: Blessed is the man who draws near to her, and who delights in her precepts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The supplied Hebrew witness in Zone 1 appears mismatched at this verse;
      the English here follows the Greek text: ''Until the appointed time, the patient
      one will endure, and afterward joy will be repaid to him.'''
    reason: textual_variant
  - marker: b
    text: Or 'the long-suffering one' for 'the patient one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως καιροῦ
  chosen: Until the appointed time
  alternatives:
  - until a time
  - until the right time
  lexicon: LSJ
  rationale: The extant Zone 1 Hebrew given is clearly mismatched to this verse, so
    the Greek parallel must carry the translation. καιρός commonly denotes a fitting
    or appointed time, not merely time in general; 'appointed time' preserves that
    nuance without overinterpreting.
- source_word: ἀνέξεται
  chosen: will endure
  alternatives:
  - will bear up
  - will be patient
  - will hold out
  lexicon: BDAG
  rationale: Future middle of ἀνέχω here conveys enduring or bearing with difficulty.
    'Will endure' is idiomatic and fits the context of delayed reward.
- source_word: μακρόθυμος
  chosen: the patient one
  alternatives:
  - the long-suffering one
  - the forbearing one
  - the patient man
  lexicon: BDAG
  rationale: The adjective functions substantivally. 'The patient one' preserves the
    singular and avoids importing a specifically male referent where the Greek adjective
    is generic. This also avoids flattening the ethical nuance into a mere abstract
    quality.
- source_word: ὕστερον
  chosen: afterward
  alternatives:
  - later
  - in the end
  lexicon: LSJ
  rationale: A straightforward temporal adverb; 'afterward' keeps the sequence clear
    and slightly more formal than 'later'.
- source_word: ἀναδώσει
  chosen: will be repaid
  alternatives:
  - will give back
  - will render
  - will repay
  lexicon: BDAG
  rationale: The verb means to give back or repay. Rendering it passively in English
    ('will be repaid to him') best captures the sense with εὐφροσύνη as the thing
    granted, while preserving the implied divine agency without adding an explicit
    subject absent from the Greek.
- source_word: εὐφροσύνη
  chosen: joy
  alternatives:
  - gladness
  - cheerfulness
  lexicon: BDAG
  rationale: The noun denotes gladness or joy. 'Joy' is the most natural modern English
    equivalent and carries the positive reward sense well.
