- issue: Divergence between extant Hebrew and Greek witnesses in both cola
  chosen_reading: Main text follows the Greek verse structure and core sense, while
    allowing the Hebrew witness to inform wording where possible.
  alternative_readings:
  - A more Hebrew-driven rendering such as 'More than all these wisdom is great, and
    truth has prevailed from eternity.'
  rationale: The Hebrew line in Kahana is bracketed and differs sharply from the Greek
    parallel, especially in predicates and the second colon. Since the task requires
    using the Hebrew where it survives but also using the Greek parallel as actual
    translation input, the most auditable solution is a main text that reflects the
    Greek's likely older sense while preserving the Hebrew alternative in footnotes.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual translation input; preserve source uncertainty honestly.'
