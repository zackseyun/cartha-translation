translation:
  text: Before all these, wisdom was created, and true understanding is from eternity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew reads more literally, 'More than all these wisdom is great,'
      while the Greek parallel reads, 'Before all things wisdom was created.' The
      main text follows the Greek sense because the Hebrew witness here appears divergent.
    reason: alternative_reading
  - marker: b
    text: The extant Hebrew second line reads, 'and truth has prevailed from eternity,'
      whereas the Greek reads, 'and understanding of prudence [is] from eternity.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִכָּל אֵלֶּה
  chosen: Before all these
  alternatives:
  - More than all these
  - Beyond all these
  lexicon: HALOT
  rationale: The Hebrew phrase literally uses מן with 'all these,' which can suggest
    comparison ('more than') or precedence depending on context. The Greek parallel
    reads προτέρα πάντων ('earlier than/before all'), strongly supporting a temporal
    sense. 'Before all these' best reflects the Hebrew in light of the Greek witness.
- source_word: רַבָּה
  chosen: was created
  alternatives:
  - is great
  - became great
  lexicon: HALOT
  rationale: The extant Hebrew reading רבה would normally mean 'is great' or 'became
    great,' but the Greek parallel has ἔκτισται ('has been created/was created').
    Given the high-confidence Hebrew line is bracketed and likely reflects a divergent
    or secondary form, the Greek helps recover the verse's sense. 'Was created' is
    therefore adopted for the main text as the most defensible rendering of the verse
    as preserved across witnesses, while the Hebrew alternative is preserved in a
    footnote.
- source_word: הַחָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering of חכמה. In this context it is personified or quasi-personified,
    but the text does not require capitalization.
- source_word: וְגָבְרָה
  chosen: is
  alternatives:
  - prevailed
  - grew strong
  - was mighty
  lexicon: HALOT
  rationale: 'The Hebrew verb means ''was strong/prevailed,'' but the Greek parallel
    supplies an existential-temporal clause for the second colon: ''understanding
    of prudence from eternity.'' To produce a coherent translation anchored in both
    witnesses, the English uses ''is from eternity'' for the clause, while preserving
    the Hebrew''s stronger verbal nuance in a footnote.'
- source_word: הָאֱמֶת
  chosen: 'true'
  alternatives:
  - truth
  lexicon: HALOT
  rationale: The Hebrew reads 'the truth,' but the Greek has σύνεσις φρονήσεως ('understanding
    of prudence/insight'). Because the Hebrew and Greek differ substantially here,
    the main text follows the Greek sense for the line's content while retaining 'true'
    as an adjectival signal of the Hebrew אמת in the composite rendering. A footnote
    preserves the Hebrew reading more directly.
- source_word: σύνεσις φρονήσεως
  chosen: true understanding
  alternatives:
  - understanding of prudence
  - insight of discernment
  lexicon: BDAG
  rationale: The Greek phrase is somewhat pleonastic, combining terms for understanding
    and practical discernment. 'True understanding' is idiomatic English and fits
    the wisdom context, while avoiding awkward literalism. It also allows some resonance
    with the Hebrew אמת ('truth') in the extant Hebrew witness.
- source_word: מֵעוֹלָם / ἐξ αἰῶνος
  chosen: from eternity
  alternatives:
  - from of old
  - from everlasting
  - from the age
  lexicon: HALOT; BDAG
  rationale: Both Hebrew and Greek point to primordial antiquity. 'From eternity'
    communicates the pretemporal or everlasting sense naturally in English and suits
    the theological-poetic register of wisdom literature.
