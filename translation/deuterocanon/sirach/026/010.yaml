theological_decisions:
- issue: Moral category conveyed by πορνεία in wisdom literature
  chosen_reading: sexual immorality
  alternative_readings:
  - prostitution
  - fornication
  - unchastity
  rationale: The verse is proverbial and observational, not legislating a narrow legal
    category. 'Sexual immorality' preserves the broad moral sense without importing
    a more specific doctrinal claim than the Greek itself makes.
