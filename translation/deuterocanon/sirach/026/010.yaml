translation:
  text: A woman's sexual immorality is known by the lifting of her eyes, and by her
    eyelids.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the restlessness / haughtiness / wandering of her eyes.' The Greek
      expression is difficult and may refer to an uplifted, roving, or suggestive
      look.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in her eyelids'; the phrase likely refers to what is revealed
      by her eye expression or glance.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορνεία
  chosen: sexual immorality
  alternatives:
  - prostitution
  - fornication
  - unchastity
  lexicon: BDAG
  rationale: The noun broadly denotes illicit sexual behavior. 'Sexual immorality'
    is the clearest modern umbrella term and avoids narrowing the sense to commercial
    prostitution unless context requires it.
- source_word: γυναικός
  chosen: a woman's
  alternatives:
  - of a woman
  - woman's
  lexicon: LSJ
  rationale: The genitive is naturally rendered possessively in English. The anarthrous
    form is generic rather than referring to a specific woman, so 'a woman's' fits
    the proverbial style.
- source_word: ἐν
  chosen: by
  alternatives:
  - in
  - through
  lexicon: BDAG
  rationale: Although literally 'in,' the repeated ἐν here marks the sphere or outward
    indicator by which the inner reality is recognized. English idiom is better served
    by 'by' in both clauses.
- source_word: μετεωρισμοῖς
  chosen: the lifting
  alternatives:
  - restless movement
  - haughtiness
  - wandering
  lexicon: LSJ
  rationale: The term can denote being raised up, uplifted, or unsettled movement.
    With 'of eyes' in this context, it most plausibly refers to an elevated or roving
    look. 'The lifting' preserves the visual image without over-interpreting it as
    either pride or flirtation alone.
- source_word: ὀφθαλμῶν
  chosen: of her eyes
  alternatives:
  - her eyes
  lexicon: BDAG
  rationale: Kept explicitly to preserve the Greek image tied to μετεωρισμοῖς; English
    could compress it, but the fuller phrase remains readable and transparent.
- source_word: βλεφάροις
  chosen: her eyelids
  alternatives:
  - her glance
  - her eyes
  lexicon: LSJ
  rationale: The Greek specifically names eyelids, likely as a metonym for facial
    expression or eye movement. Retaining 'eyelids' preserves the concrete imagery
    of the source rather than flattening it to 'glance.'
- source_word: γνωσθήσεται
  chosen: is known
  alternatives:
  - will be known
  - is recognized
  - becomes evident
  lexicon: BDAG
  rationale: The future passive can function proverbially. Present English communicates
    the gnomic force better than a strictly future rendering while preserving passive
    sense.
