theological_decisions:
- issue: Rendering αἰσχυντηρά in a virtue context
  chosen_reading: modest
  alternative_readings:
  - shamefaced
  - bashful
  rationale: The verse commends a traditional wisdom virtue associated with proper
    reserve and moral modesty, not humiliation or disgrace. 'Modest' preserves the
    commendatory sense without archaic diction.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
- issue: Value metaphor in οὐκ ἔστιν σταθμὸς πᾶς ἄξιος ἐγκρατοῦς ψυχῆς
  chosen_reading: no scale can weigh the worth of a self-controlled soul
  alternative_readings:
  - no measure is worthy of a self-controlled soul
  - there is no weighing instrument fit for a self-controlled soul
  rationale: The Greek is somewhat compressed. The chosen rendering makes explicit
    the implied idea of immeasurable worth while staying close to the weighing metaphor.
    This is an optimal-equivalence decision rather than a doctrinal one.
  doctrine_reference: Translation philosophy §1 and §6
