translation:
  text: Charm upon charm is a modest woman, and no scale can weigh the worth of a
    self-controlled soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grace upon grace is a shamefaced woman'; the Greek wording is compressed,
      and αἰσχυντηρά can be rendered more literally as 'shamefaced' or 'bashful.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  chosen: charm
  alternatives:
  - grace
  - favor
  - beauty
  lexicon: LSJ
  rationale: 'In this wisdom context describing a woman''s attractiveness or pleasing
    quality, χάρις is better rendered as ''charm'' than the more theological ''grace.''
    The repeated phrase χάρις ἐπὶ χάριτι is an idiomatic intensification: ''charm
    upon charm.'''
- source_word: ἐπὶ χάριτι
  chosen: upon charm
  alternatives:
  - added to grace
  - grace upon grace
  lexicon: LSJ
  rationale: The preposition ἐπί with dative here expresses addition or accumulation.
    A literal-but-natural English rendering is 'upon charm,' preserving the emphatic
    repetition without importing Johannine resonance from 'grace upon grace.'
- source_word: γυνὴ
  chosen: woman
  alternatives:
  - wife
  lexicon: LSJ
  rationale: γυνή can mean either 'woman' or 'wife.' With no possessive or marital
    context in this line, the broader 'woman' is preferable.
- source_word: αἰσχυντηρά
  chosen: modest
  alternatives:
  - shamefaced
  - bashful
  - reserved
  lexicon: LSJ
  rationale: The adjective denotes one characterized by proper shame/modesty. 'Shamefaced'
    is too archaic for the project's style, while 'modest' communicates the virtue
    positively in modern English.
- source_word: σταθμός
  chosen: scale
  alternatives:
  - balance
  - measure
  - weight
  lexicon: LSJ
  rationale: σταθμός refers to a weighing instrument or standard of measure. 'Scale'
    is idiomatic in English and fits the metaphor of inestimable worth.
- source_word: πᾶς ἄξιος
  chosen: can weigh the worth
  alternatives:
  - is worthy
  - is adequate
  - is sufficient
  lexicon: LSJ
  rationale: The Greek phrase literally says 'there is no scale at all worthy of...'
    In English, the idiomatic sense is that no scale is adequate to assess or weigh
    the value. This slight restructuring preserves the metaphor while reading naturally.
- source_word: ἐγκρατοῦς ψυχῆς
  chosen: of a self-controlled soul
  alternatives:
  - of a disciplined spirit
  - of a temperate soul
  lexicon: LSJ
  rationale: ἐγκρατής denotes self-control or mastery over oneself. 'Self-controlled
    soul' preserves both the ethical force and the ψυχή language, avoiding over-interpretation
    as merely emotional restraint.
