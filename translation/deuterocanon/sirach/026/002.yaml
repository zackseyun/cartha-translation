translation:
  text: A capable wife gladdens her husband, and he will spend his years in pleasantness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and he will complete his years in peace.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אֵשֶׁת חַיִל
  chosen: a capable wife
  alternatives:
  - a valiant wife
  - a worthy wife
  - an excellent wife
  lexicon: HALOT
  rationale: The Hebrew phrase can denote strength, competence, worth, or valor. In
    wisdom literature, for a wife it commonly points to proven excellence and capability
    rather than martial valor. 'Capable' preserves the breadth of חַיִל in idiomatic
    modern English without sounding archaic like 'virtuous' or overly interpretive
    like 'excellent.' The Greek parallel γυνὴ ἀνδρεία supports a sense of strength/capability.
- source_word: תְּדַּשֵּׁן
  chosen: gladdens
  alternatives:
  - enriches
  - refreshes
  - makes prosperous
  - fattens
  lexicon: HALOT
  rationale: Literally the verb evokes making fat or luxuriant, a Hebrew image for
    thriving well-being. In this context, with the Greek εὐφραίνει, the sense is that
    such a wife brings joy and flourishing to her husband. 'Gladdens' captures the
    experiential result in natural English while remaining anchored in both Hebrew
    imagery and the Greek witness.
- source_word: לְבַעֲלָהּ
  chosen: her husband
  alternatives:
  - for her husband
  - to her husband
  lexicon: HALOT
  rationale: בעל here plainly means 'husband.' English idiom prefers 'gladdens her
    husband' over a more wooden prepositional rendering.
- source_word: וּשְׁנֵי חַיָּיו
  chosen: his years
  alternatives:
  - the years of his life
  - his lifetime
  lexicon: HALOT
  rationale: The Hebrew literally says 'the years of his life.' 'His years' is a concise
    English equivalent that preserves the temporal emphasis.
- source_word: יְבַלֶּה
  chosen: he will spend
  alternatives:
  - he will pass
  - he will complete
  - he will wear out
  lexicon: HALOT
  rationale: In context the verb refers to passing or spending one's life/time. 'He
    will spend' is the most natural English expression for years lived out.
- source_word: בַנְעִימִים
  chosen: in pleasantness
  alternatives:
  - in delights
  - pleasantly
  - in peace
  lexicon: HALOT
  rationale: The Hebrew points to pleasant or delightful circumstances. The Greek
    parallel reads ἐν εἰρήνῃ ('in peace'), which may reflect an interpretive rendering
    or variant. Since the Hebrew witness is primary here and is high-confidence, the
    main text follows its sense with 'in pleasantness,' while preserving the Greek-supported
    alternative in a footnote.
