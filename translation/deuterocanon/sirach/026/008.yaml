translation:
  text: A wicked wife is a shaking yoke for oxen; whoever takes hold of her is like
    one who grabs a scorpion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek βοοζύγιον σαλευόμενον is difficult and highly metaphorical; it likely
      refers to an ox-yoke that is jolting or unstable, expressing the disruptive
      burden of a wicked wife.
    reason: lexical_alternative
lexical_decisions:
- source_word: βοοζύγιον
  chosen: yoke for oxen
  alternatives:
  - ox-yoke
  - team of oxen under a yoke
  lexicon: LSJ
  rationale: The compound literally evokes oxen and yoking. In context it functions
    as the image compared to the wicked wife. 'Yoke for oxen' preserves the concrete
    agricultural metaphor without overcommitting to a more interpretive paraphrase.
- source_word: σαλευόμενον
  chosen: shaking
  alternatives:
  - shaken
  - unstable
  - tottering
  lexicon: BDAG
  rationale: The participle denotes being moved or shaken. 'Shaking' keeps the vivid
    instability of the image; 'unstable' is smoother but less concrete.
- source_word: γυνὴ πονηρά
  chosen: a wicked wife
  alternatives:
  - an evil woman
  - a bad wife
  lexicon: LSJ
  rationale: γυνή can mean 'woman' or 'wife'; in this domestic wisdom context 'wife'
    best fits. πονηρά is morally negative; 'wicked' preserves that stronger ethical
    sense better than 'bad'.
- source_word: ὁ κρατῶν αὐτῆς
  chosen: whoever takes hold of her
  alternatives:
  - he who restrains her
  - the one who seizes her
  lexicon: BDAG
  rationale: κρατέω can mean seize, grasp, or hold fast. Given the following simile
    of grabbing a scorpion, the tactile sense 'takes hold of' best matches the imagery.
    'Restrains' is possible but more interpretive.
- source_word: δρασσόμενος
  chosen: grabs
  alternatives:
  - seizes
  - takes in hand
  lexicon: LSJ
  rationale: The verb refers to grasping with the hand. 'Grabs' is vivid, natural
    English and aligns with the warning image.
- source_word: σκορπίου
  chosen: a scorpion
  lexicon: LSJ
  rationale: Straightforward zoological term; the singular indefinite works naturally
    in English.
