translation:
  text: One who turns back from righteousness to sin—the Lord will prepare him for
    the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'One who brings himself back from righteousness to sin.' The Greek participle
      can more literally suggest being brought or led back, but here it denotes reverting
      from a righteous path.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπανάγων
  chosen: turns back
  alternatives:
  - brings back
  - returns
  - leads back
  lexicon: LSJ
  rationale: The participle from ἐπανάγω literally suggests bringing or leading back,
    but with ἀπὸ δικαιοσύνης ἐπὶ ἁμαρτίαν the sense is of reverting from a right course
    to sin. 'Turns back' captures the moral reversal idiomatically without overparaphrasing.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: The phrase contrasts moral rightness with ἁμαρτία. Per doctrine defaults,
    'righteousness' is preferred, while 'justice' is less fitting in this individual
    ethical contrast.
- source_word: ἁμαρτίαν
  chosen: sin
  alternatives:
  - wrongdoing
  lexicon: LSJ
  rationale: Standard and direct rendering in a moral-religious context.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the master
  lexicon: LSJ
  rationale: Per doctrine default for κύριος, 'the Lord' best matches biblical usage
    and the likely reference to God in wisdom literature.
- source_word: ἑτοιμάσει
  chosen: will prepare
  alternatives:
  - will make ready
  - will appoint
  lexicon: LSJ
  rationale: The future verb straightforwardly means 'prepare' or 'make ready.' 'Will
    prepare' preserves the imagery and leaves the exact nuance of divine judgment
    intact.
- source_word: εἰς ῥομφαίαν
  chosen: for the sword
  alternatives:
  - to the sword
  - for slaughter by the sword
  lexicon: LSJ
  rationale: ῥομφαία is a large sword and often metonymic for violent judgment. 'For
    the sword' is concise, natural English and preserves the image without specifying
    more than the Greek states.
