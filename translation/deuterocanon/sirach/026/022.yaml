theological_decisions:
- issue: Nature of divine judgment in 'the Lord will prepare him for the sword'
  chosen_reading: A statement of divine judgment against one who reverts from righteousness
    to sin.
  alternative_readings:
  - A more general providential consequence rather than direct punitive action
  rationale: The explicit subject ὁ κύριος and the future ἑτοιμάσει present the Lord
    as the actor. The translation preserves that agency without expanding into a fuller
    doctrine of retribution beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
