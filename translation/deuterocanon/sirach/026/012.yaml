translation:
  text: Guard yourself against an impudent eye, and do not be surprised if she sins
    against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'Guard yourself from/behind an impudent eye.' The prepositional
      phrase is idiomatic and difficult; the translation gives the likely sense.
    reason: lexical_alternative
  - marker: b
    text: The Greek does not explicitly state 'she' here; the feminine subject is
      inferred from the surrounding context about a morally wayward woman.
    reason: alternative_reading
lexical_decisions:
- source_word: ὀπίσω
  chosen: against
  alternatives:
  - from
  - after
  - because of
  lexicon: LSJ
  rationale: The phrase ὀπίσω ἀναιδοῦς ὀφθαλμοῦ is idiomatic and difficult in isolation.
    A highly literal 'behind/from an impudent eye' is awkward in English. In context
    with φύλαξαι ('guard yourself'), the sense is protective avoidance with reference
    to the shameless gaze; 'against' communicates the adversative/protective force
    in natural English while remaining anchored to the Greek construction.
- source_word: ἀναιδοῦς
  chosen: impudent
  alternatives:
  - shameless
  - brazen
  lexicon: LSJ
  rationale: ἀναιδής denotes shamelessness or lack of modesty. 'Impudent' preserves
    the moral-social sense of brazenness in a concise, readable way. 'Shameless' is
    possible and perhaps more literal, but 'impudent eye' reads more idiomatically
    in English.
- source_word: ὀφθαλμοῦ
  chosen: eye
  alternatives:
  - look
  - gaze
  lexicon: LSJ
  rationale: The Greek uses the concrete noun 'eye.' Retaining 'eye' preserves the
    vividness of the source, while the adjective supplies the moral characterization.
- source_word: φύλαξαι
  chosen: Guard yourself
  alternatives:
  - beware
  - keep watch against
  - protect yourself
  lexicon: LSJ
  rationale: Aorist imperative of φυλάσσω. 'Guard yourself' is a direct and natural
    imperative that preserves the reflexive protective sense implied by the context.
- source_word: μὴ θαυμάσῃς
  chosen: do not be surprised
  alternatives:
  - do not marvel
  - do not be astonished
  lexicon: LSJ
  rationale: 'θαυμάζω can mean marvel or be surprised. In this warning context, ''do
    not be surprised'' best fits the pragmatic sense: the behavior warned about should
    not catch the hearer off guard.'
- source_word: ἐὰν
  chosen: if
  alternatives:
  - when
  lexicon: LSJ
  rationale: The particle normally introduces a conditional clause. Although the sense
    may verge toward expectation, 'if' is the straightforward rendering and avoids
    overstating inevitability.
- source_word: εἰς σέ
  chosen: against you
  alternatives:
  - toward you
  - with respect to you
  lexicon: LSJ
  rationale: With πλημμελέω, εἰς + accusative indicates the person wronged. 'Against
    you' expresses the relational offense clearly in English.
- source_word: πλημμελήσῃ
  chosen: sins against you
  alternatives:
  - does wrong to you
  - offends against you
  - acts improperly toward you
  lexicon: LSJ
  rationale: πλημμελέω denotes doing wrong, committing an offense, or sinning. 'Sins
    against you' preserves the moral weight of the Greek better than the flatter 'does
    wrong,' while fitting wisdom-literature style.
