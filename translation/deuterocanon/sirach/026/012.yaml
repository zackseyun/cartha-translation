theological_decisions:
- issue: Gender implied but not explicit in the Greek wording
  chosen_reading: Use 'she' in English to reflect the immediate literary context of
    warnings about a bad wife/woman, while noting that the pronoun is not explicit
    in the Greek clause.
  alternative_readings:
  - do not be surprised if it sins against you
  - do not be surprised if such a one sins against you
  - do not be surprised if there is wrongdoing against you
  rationale: The Greek verb has no explicit subject stated in the second clause; the
    feminine referent is inferred from the surrounding context in Sirach 26. Supplying
    'she' makes the English intelligible and contextually accurate, but the decision
    should be transparent because the pronoun is interpretive rather than formally
    present in the Greek text.
