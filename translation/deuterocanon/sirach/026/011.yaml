translation:
  text: Keep strict watch over a headstrong daughter, lest, finding freedom for herself,
    she make use of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'strengthen a guard over an unyielding daughter, lest,
      finding freedom for herself, she use it.' The source text is somewhat terse,
      so 'it' refers back to the freedom/ease she finds.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ ... θυγατρί
  chosen: over a ... daughter
  alternatives:
  - concerning a ... daughter
  - with respect to a ... daughter
  lexicon: LSJ
  rationale: ἐπί with the dative here introduces the object of concern or supervision;
    idiomatic English is 'over' in the context of keeping watch.
- source_word: ἀδιατρέπτως
  chosen: headstrong
  alternatives:
  - unmanageable
  - unyielding
  - incorrigible
  lexicon: LSJ
  rationale: The adverb modifies the sense of the daughter's disposition as not turning
    or not being swayed. In context of parental vigilance, 'headstrong' captures the
    behavioral force more naturally than a wooden 'unturningly' or the less idiomatic
    'inflexibly'.
- source_word: στερέωσον φυλακήν
  chosen: keep strict watch
  alternatives:
  - set a firm guard
  - establish a watch
  - make surveillance secure
  lexicon: LSJ
  rationale: 'The imperative plus object literally means to make/establish a guard
    firm. English idiom favors a verbal rendering: ''keep strict watch.'' This preserves
    both the guarding idea and the intensifying force of στερέωσον.'
- source_word: ἵνα μὴ
  chosen: lest
  alternatives:
  - so that not
  - that ... not
  lexicon: Greek grammar
  rationale: A concise and natural rendering of the negative purpose clause in elevated
    but still readable English.
- source_word: εὑροῦσα ἄνεσιν
  chosen: finding freedom
  alternatives:
  - finding ease
  - finding relief
  - finding opportunity
  lexicon: LSJ
  rationale: ἄνεσις can denote relaxation, ease, or freedom from restraint. In this
    context of supervision and self-directed action, 'freedom' best conveys release
    from restraint rather than mere comfort.
- source_word: ἑαυτῇ
  chosen: for herself
  alternatives:
  - to herself
  lexicon: Greek grammar
  rationale: The reflexive dative is best expressed idiomatically as 'for herself,'
    indicating that the freedom is obtained on her own behalf.
- source_word: χρήσηται
  chosen: she make use of it
  alternatives:
  - she use it
  - she take advantage of it
  lexicon: LSJ
  rationale: χράομαι means to use or make use of. The pronoun 'it' is supplied in
    English to refer back to the found freedom/ease implied by ἄνεσιν.
