translation:
  text: Like a thirsty traveler she opens her mouth, and from every nearby water she
    will drink; opposite every stake she will sit down, and before every arrow she
    will open her quiver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The imagery is metaphorical and likely refers to sexual indiscrimination:
      she takes whatever opportunity is near at hand.'
    reason: cultural_note
  - marker: b
    text: Greek 'stake' and 'arrow ... quiver' are retained literally. The exact force
      of the final image is debated, but it continues the verse’s sexual metaphor.
    reason: lexical_alternative
  - marker: c
    text: The Greek text of this verse is vivid but somewhat difficult, especially
      in the final clause; the translation stays close to the wording rather than
      resolving the metaphor more explicitly.
    reason: textual_variant
lexical_decisions:
- source_word: διψῶν
  chosen: thirsty
  alternatives:
  - thirsting
  - parched
  lexicon: LSJ
  rationale: The participle describes the traveler’s urgent condition. 'Thirsty' is
    natural English and preserves the simile’s force without over-paraphrasing.
- source_word: ὁδοιπόρος
  chosen: traveler
  alternatives:
  - wayfarer
  - journeyer
  lexicon: LSJ
  rationale: A straightforward rendering for one on the road. 'Traveler' is readable
    modern English; 'wayfarer' is more traditional but less current.
- source_word: ἀνοίγει
  chosen: opens
  alternatives:
  - opens wide
  lexicon: LSJ
  rationale: The verb is simple and concrete. The context already conveys eagerness,
    so 'opens' is sufficient without intensifying beyond the Greek.
- source_word: ἀπὸ παντὸς ὕδατος τοῦ σύνεγγυς
  chosen: from every nearby water
  alternatives:
  - from any water close at hand
  - from every water that is near
  lexicon: LSJ
  rationale: The phrase emphasizes indiscriminate drinking from whatever water is
    available nearby. 'Nearby water' keeps the image literal, though slightly idiomatic
    English might prefer 'any water close at hand.'
- source_word: πίεται
  chosen: she will drink
  alternatives:
  - she drinks
  lexicon: LSJ
  rationale: Future middle is best represented as future in English. The subject is
    understood from the surrounding context about a woman, so 'she' is supplied for
    coherence.
- source_word: κατέναντι παντὸς πασσάλου
  chosen: opposite every stake
  alternatives:
  - before every peg
  - beside every post
  lexicon: LSJ
  rationale: πάσσαλος is literally a stake or peg. The image is likely metaphorical
    and sexually charged in context, but the translation should preserve the concrete
    wording rather than interpret it away.
- source_word: καθίσεται
  chosen: she will sit down
  alternatives:
  - she will sit
  lexicon: LSJ
  rationale: The future middle indicates taking a seat or settling oneself. 'Sit down'
    captures the action naturally in English.
- source_word: ἔναντι βέλους
  chosen: before any arrow
  alternatives:
  - in front of any arrow
  - toward every arrow
  lexicon: LSJ
  rationale: The Greek is difficult and likely metaphorical. A formally close rendering
    is preferable here because the exact figurative force is uncertain.
- source_word: φαρέτραν
  chosen: quiver
  alternatives:
  - case for arrows
  lexicon: LSJ
  rationale: φαρέτρα normally means 'quiver.' Although the imagery is startling in
    context, the literal term should be retained and any interpretive explanation
    moved to a footnote.
