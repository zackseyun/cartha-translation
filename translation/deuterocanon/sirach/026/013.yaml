theological_decisions:
- issue: Sexual metaphor in a wisdom warning context
  chosen_reading: Retain the concrete imagery of drinking, stake, arrow, and quiver
    rather than replacing it with an explicit interpretive paraphrase about promiscuity.
  alternative_readings:
  - Paraphrase the verse as a direct statement about sexual indiscrimination
  rationale: The verse uses vivid metaphor to portray shameless sexual availability.
    Optimal equivalence here favors preserving the source imagery while allowing readers
    to perceive the warning from context. This avoids importing more explicit wording
    than the Greek itself states.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Subject pronoun not explicit in each clause
  chosen_reading: Use 'she' throughout for coherence with the immediate context about
    a woman/wife.
  alternative_readings:
  - Leave the subject implicit in English
  - Use a generic subject such as 'one'
  rationale: English requires an explicit subject for natural readability. The surrounding
    context makes the feminine referent clear, so supplying 'she' is warranted and
    not interpretively excessive.
  doctrine_reference: Translation philosophy §6
