translation:
  text: 'Over two things my heart is grieved, and over the third anger came upon me:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek wording is straightforward, but this verse is incomplete as a
      sentence by itself and introduces the list that follows.
    reason: cross_reference
lexical_decisions:
- source_word: Ἐπὶ δυτὶ
  chosen: Over two things
  alternatives:
  - For two things
  - At two things
  - Because of two things
  lexicon: LSJ
  rationale: The preposition ἐπί with the dative here marks the basis or occasion
    of grief. 'Over two things' is idiomatic English and preserves the enumerative
    setup of the saying.
- source_word: λελύπηται
  chosen: is grieved
  alternatives:
  - has been grieved
  - is distressed
  - suffers sorrow
  lexicon: LSJ
  rationale: Perfect middle/passive of λυπέω expresses a present state resulting from
    grief. 'Is grieved' gives natural English while retaining the stative force better
    than a simple past.
- source_word: ἡ καρδία μου
  chosen: my heart
  alternatives:
  - my inner being
  - my mind
  lexicon: LSJ
  rationale: A literal rendering is appropriate; 'heart' naturally conveys the seat
    of emotion in biblical style without unnecessary paraphrase.
- source_word: ἐπὶ τῷ τρίτῳ
  chosen: over the third
  alternatives:
  - because of the third
  - at the third thing
  lexicon: LSJ
  rationale: This mirrors the first clause and preserves the rhetorical progression
    from two items to a climactic third.
- source_word: θυμός
  chosen: anger
  alternatives:
  - wrath
  - rage
  - indignation
  lexicon: LSJ
  rationale: θυμός can denote strong anger or passionate indignation. 'Anger' is the
    clearest modern English choice here; 'wrath' would sound elevated beyond the context,
    and 'rage' may overstate it.
- source_word: μοι ἐπῆλθεν
  chosen: came upon me
  alternatives:
  - came over me
  - befell me
  - rose in me
  lexicon: LSJ
  rationale: The idiom ἐπέρχομαι with dative is well represented by 'came upon me.'
    It preserves the sense of anger overtaking the speaker without over-interpreting
    whether it is external or internal.
