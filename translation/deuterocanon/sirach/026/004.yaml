translation:
  text: Whether rich or poor, a good heart has a cheerful face at all times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the heart of rich and poor is good; the face is cheerful
      at every time.' The Greek is compressed, and the English supplies 'keeps' to
      make the relation between inner disposition and outward expression clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλουσίου
  chosen: rich
  alternatives:
  - wealthy
  lexicon: LSJ
  rationale: Genitive singular of πλούσιος, paired antithetically with πτωχοῦ. Rendered
    simply as 'rich' in idiomatic English.
- source_word: πτωχοῦ
  chosen: poor
  alternatives:
  - needy
  lexicon: LSJ
  rationale: Genitive singular of πτωχός, the counterpart to πλουσίου. 'Poor' preserves
    the socioeconomic contrast without overinterpreting degree of destitution.
- source_word: καρδία ἀγαθή
  chosen: a good heart
  alternatives:
  - a sound heart
  - a good disposition
  lexicon: LSJ
  rationale: The phrase denotes inward moral and emotional health. 'A good heart'
    is both natural English and close to the Greek imagery.
- source_word: ἐν παντὶ καιρῷ
  chosen: at all times
  alternatives:
  - in every season
  - at every time
  lexicon: LSJ
  rationale: Idiomatic temporal expression. 'At all times' communicates the general,
    ongoing sense more naturally than the more literal 'in every season.'
- source_word: πρόσωπον ἱλαρόν
  chosen: a cheerful face
  alternatives:
  - a glad face
  - a bright countenance
  lexicon: LSJ
  rationale: πρόσωπον is literally 'face,' and ἱλαρός conveys cheerfulness or gladness.
    'Cheerful face' preserves the concrete image while remaining readable modern English.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: LSJ
  rationale: Here δέ marks a mild contrast or transition from the preceding context.
    'But' best reflects the discourse movement in English.
