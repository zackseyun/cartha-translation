translation:
  text: Happy is the husband of a good wife, and the number of his days is doubled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed is' or 'Fortunate is' the husband of a good wife.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִשָּׁה טוֹבָה
  chosen: a good wife
  alternatives:
  - a good woman
  - a virtuous wife
  lexicon: HALOT
  rationale: The Hebrew phrase is straightforwardly 'good woman/wife.' In context
    with בַעֲלָהּ ('her husband/master'), 'wife' is the natural relational sense.
    'Good' preserves the broad moral and practical commendation without importing
    the more interpretive 'virtuous.' The Greek parallel γυναικὸς ἀγαθῆς supports
    this simple rendering.
- source_word: אַשְׁרֵי
  chosen: Happy is
  alternatives:
  - Blessed is
  - Fortunate is
  lexicon: HALOT
  rationale: אַשְׁרֵי is an exclamation of enviable well-being ('happy,' 'fortunate,'
    'blessed'). 'Happy is' is clear modern English and fits wisdom-style commendation.
    'Blessed' is possible, but here could suggest a more explicitly divine-bestowal
    nuance than the proverb itself states. The Greek μακάριος likewise supports 'happy/fortunate/blessed.'
- source_word: בַעֲלָהּ
  chosen: the husband of
  alternatives:
  - her husband
  - the man of
  lexicon: HALOT
  rationale: The Hebrew literally means 'her husband/master.' English idiom works
    best by restructuring the clause as 'the husband of a good wife.' This preserves
    the marital relation without the misleading connotations of 'master' in modern
    English. The Greek ὁ ἀνήρ confirms the sense 'husband/man' in marital context.
- source_word: וּמִסְפַּר יָמָיו
  chosen: and the number of his days
  alternatives:
  - and his days
  - and the count of his days
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew idiom and matches
    the Greek ἀριθμὸς τῶν ἡμερῶν αὐτοῦ. It keeps the proverbial style without over-paraphrasing
    to merely 'his life.'
- source_word: כִּפְלַיִם
  chosen: is doubled
  alternatives:
  - is twice as many
  - is twofold
  lexicon: HALOT
  rationale: The Hebrew means 'double, twofold.' 'Is doubled' is concise, idiomatic,
    and reflects both the Hebrew and the Greek διπλάσιος. It preserves the proverbial
    claim of increased longevity or fullness of life without forcing a hyper-literal
    numerical phrasing.
