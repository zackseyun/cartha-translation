theological_decisions:
- issue: Rendering of אַשְׁרֵי / μακάριος in wisdom-style beatitude language
  chosen_reading: Happy is
  alternative_readings:
  - Blessed is
  - Fortunate is
  rationale: The verse is sapiential commendation rather than an explicit pronouncement
    of covenantal blessing by God. 'Happy is' preserves the beatitude flavor in accessible
    English while avoiding unnecessary theological overstatement. The alternatives
    remain viable lexical options.
