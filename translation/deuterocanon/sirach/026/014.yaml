translation:
  text: A wife's grace delights her husband, and her understanding puts flesh on his
    bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her knowledge fattens his bones.' The Greek keeps a bodily metaphor
      for the strengthening effect of a wise wife.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  chosen: grace
  alternatives:
  - charm
  - favor
  - loveliness
  lexicon: BDAG
  rationale: χάρις commonly denotes grace, favor, or graciousness. Here it refers
    to the attractive gracious quality of the wife rather than saving grace; 'grace'
    preserves the compactness and moral-aesthetic sense better than the narrower 'charm'.
- source_word: γυναικός
  chosen: wife's
  alternatives:
  - woman's
  lexicon: BDAG
  rationale: Although γυνή can mean either 'woman' or 'wife,' the possessive relation
    to 'her husband' in the same clause makes 'wife' the natural contextual rendering.
- source_word: τέρψει
  chosen: delights
  alternatives:
  - gladdens
  - gives pleasure to
  lexicon: BDAG
  rationale: The future of τέρπω conveys giving pleasure or delight. 'Delights' is
    idiomatic and preserves the positive emotional force.
- source_word: ἐπιστήμη
  chosen: understanding
  alternatives:
  - knowledge
  - good sense
  - skill
  lexicon: BDAG
  rationale: ἐπιστήμη can mean knowledge or understanding. In this domestic wisdom
    context, 'understanding' best conveys practical, intelligent discernment rather
    than mere information.
- source_word: πιανεῖ
  chosen: puts flesh on
  alternatives:
  - fattens
  - strengthens
  - makes robust
  lexicon: LSJ
  rationale: The verb here has the sense of making fat or full. Because the object
    is 'his bones,' a literal 'fattens his bones' is awkward in English. 'Puts flesh
    on his bones' preserves the bodily metaphor of nourishing and strengthening without
    flattening it to an abstract term.
- source_word: τὰ ὀστᾶ αὐτοῦ
  chosen: his bones
  alternatives:
  - his frame
  lexicon: BDAG
  rationale: A literal rendering keeps the Hebrew-style bodily imagery present in
    the Greek. The phrase refers metaphorically to his physical and inner vitality.
