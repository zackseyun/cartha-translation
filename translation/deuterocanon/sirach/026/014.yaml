id: SIR.26.14
reference: Sirach 26:14
source:
  edition: lxx-swete-1909
  text: χάρις γυναικὸς τέρψει τὸν ἄνδρα αὐτῆς, καὶ τὰ ὀστᾶ αὐτοῦ πιανεῖ ἡ ἐπιστήμη
    αὐτῆς.
  language: Greek
  pages:
