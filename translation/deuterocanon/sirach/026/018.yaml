translation:
  text: A lamp shining brightly on a holy lampstand, and the beauty of a face at a
    mature age.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in settled maturity.' The Greek phrase ἐπὶ ἡλικίᾳ στασίμῃ is somewhat
      idiomatic, combining age with the idea of stability or settledness.
    reason: lexical_alternative
lexical_decisions:
- source_word: λύχνος
  chosen: lamp
  alternatives:
  - light
  lexicon: LSJ
  rationale: The noun denotes a portable lamp rather than light in the abstract. 'Lamp'
    preserves the concrete image in the comparison.
- source_word: ἐκλάμπων
  chosen: shining brightly
  alternatives:
  - flashing forth
  - giving light
  lexicon: LSJ
  rationale: The participle intensifies the image beyond simple existence of light.
    'Shining brightly' captures the vivid, active radiance in readable English.
- source_word: ἐπὶ λυχνίας ἁγίας
  chosen: on a holy lampstand
  alternatives:
  - upon a sacred lampstand
  - on a holy stand for a lamp
  lexicon: LSJ
  rationale: ἐπὶ with the genitive phrase here is naturally rendered locatively. ἁγίας
    is kept as 'holy' rather than generalized to 'splendid' or 'pure,' preserving
    the cultic or consecrated nuance of the Greek image.
- source_word: κάλλος προσώπου
  chosen: the beauty of a face
  alternatives:
  - facial beauty
  - beauty of countenance
  lexicon: LSJ
  rationale: A literal rendering best preserves the poetic parallelism. 'Face' is
    more natural modern English than 'countenance' while remaining concrete.
- source_word: ἐπὶ ἡλικίᾳ στασίμῃ
  chosen: at a mature age
  alternatives:
  - in settled maturity
  - in a stable season of life
  - in full age
  lexicon: LSJ
  rationale: ἡλικία can refer to age or stage of life, and στασίμῃ conveys firmness,
    settledness, or stability. 'At a mature age' communicates the sense of beauty
    fittingly joined to settled maturity without awkward literalism.
