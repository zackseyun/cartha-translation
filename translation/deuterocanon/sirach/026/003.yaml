translation:
  text: A good wife is a good gift; she will be given into the bosom of one who fears
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''in the portion of those who fear the Lord she will be
      given.'' The Hebrew reads ''into the bosom of one who fears God,'' using a more
      intimate image.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִשָּׁה טוֹבָה
  chosen: a good wife
  alternatives:
  - a good woman
  lexicon: HALOT
  rationale: Although אִשָּׁה can mean either 'woman' or 'wife,' the wisdom context
    and the Greek parallel γυνὴ ἀγαθή support the marital sense here. The verse speaks
    of her as a gift allotted to a God-fearing man, which fits 'wife' more naturally
    than the broader 'woman.'
- source_word: מַתָּנָה טוֹבָה
  chosen: a good gift
  alternatives:
  - a fine gift
  lexicon: HALOT
  rationale: מַתָּנָה denotes a gift given. 'Good gift' preserves the repetition of
    טוֹבָה and the concise proverbial style better than a more idiomatic but less
    literal alternative.
- source_word: בְּחֵיק
  chosen: into the bosom of
  alternatives:
  - into the lap of
  - to the embrace of
  lexicon: HALOT
  rationale: בְּחֵיק literally refers to the bosom or lap. The phrase is idiomatic
    for close personal possession or intimate relation. 'Into the bosom of' keeps
    the Hebrew imagery and matches the relational nuance, while the Greek ἐν μερίδι
    ('in the portion of') suggests allotted possession; the Hebrew witness is primary
    here, so the concrete image is retained.
- source_word: יֵרֵא אֱלֹהִים
  chosen: one who fears God
  alternatives:
  - a God-fearing man
  - one who fears the Lord
  lexicon: HALOT
  rationale: The Hebrew literally says 'fearer of God.' 'One who fears God' is natural
    modern English and preserves the singular individual sense without adding explicit
    male wording not present in the phrase itself, though the marital context implies
    a husband. 'God' follows the Hebrew אֱלֹהִים; the Greek has Κύριον ('Lord'), but
    the Hebrew witness is primary.
- source_word: תִּנָּתֵן
  chosen: she will be given
  alternatives:
  - will be given
  - is given
  lexicon: HALOT
  rationale: The Niphal imperfect is best rendered as a passive future here. Supplying
    'she' makes explicit the subject carried over from 'a good wife' and yields clear
    English.
