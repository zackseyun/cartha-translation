translation:
  text: 'From three things my heart was afraid, and before a fourth I prayed:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'at the fourth face.' This may mean 'concerning the fourth
      person' or more generally 'the fourth thing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τριῶν
  chosen: three things
  alternatives:
  - because of three things
  - at three things
  - from three
  lexicon: LSJ
  rationale: The preposition ἀπό with a numeral here idiomatically introduces the
    objects causing fear. English needs an implied noun; 'things' is supplied for
    clarity without over-specifying the referents, which are listed in the following
    verse(s).
- source_word: εὐλαβήθη
  chosen: feared
  alternatives:
  - was in dread
  - was apprehensive
  - reverenced
  lexicon: BDAG
  rationale: The verb εὐλαβέομαι can denote caution, reverent fear, or dread depending
    on context. Here the context is a list of troubling social situations, so 'feared'
    best captures the sense of apprehension rather than reverence.
- source_word: ἡ καρδία μου
  chosen: my heart
  alternatives:
  - I
  - my mind
  lexicon: LSJ
  rationale: A literal rendering preserves the Hebrew/Greek anthropological idiom
    of the heart as the seat of inner response. This is natural enough in English
    and should not be flattened to merely 'I'.
- source_word: ἐπὶ τῷ τετάρτῳ προσώπῳ
  chosen: at the fourth face
  alternatives:
  - at the fourth thing
  - concerning the fourth person
  - before the fourth face
  lexicon: LSJ
  rationale: The Greek reads literally 'at/upon the fourth face.' πρόσωπον can mean
    face, person, or outward appearance. Because the next verse enumerates persons/types,
    'person' is interpretively possible; however, the source text says πρόσωπον, and
    'face' preserves the vivid idiom while remaining intelligible. The unusual phrasing
    is retained rather than normalized away.
- source_word: ἐδεήθην
  chosen: I prayed
  alternatives:
  - I entreated
  - I begged
  lexicon: BDAG
  rationale: δέομαι often means to implore or pray. In this wisdom context, where
    the speaker turns to God in response to a feared prospect, 'I prayed' is the most
    natural concise rendering.
