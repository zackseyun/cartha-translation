translation:
  text: A quiet wife is a gift from the Lord, and there is no equivalent for a disciplined
    soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no exchange for a well-instructed soul.' The Greek πεπαιδευμένης
      ψυχῆς can emphasize instruction as well as discipline.
    reason: lexical_alternative
lexical_decisions:
- source_word: δόσις
  chosen: gift
  alternatives:
  - giving
  - present
  lexicon: LSJ
  rationale: In this proverbial statement, δόσις denotes something given, not the
    act of giving. 'Gift' is the most natural English equivalent in context.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: 'Genitive of source: the wife is presented as a gift coming from the
    Lord. Following project defaults, κύριος is rendered ''Lord''; with the article
    in English for idiomatic sense in this construction.'
- source_word: γυνὴ
  chosen: wife
  alternatives:
  - woman
  lexicon: LSJ
  rationale: Although γυνή can mean either 'woman' or 'wife,' the surrounding context
    in Sirach 26 concerns marriage and the character of a spouse, so 'wife' best fits.
- source_word: σιγηρά
  chosen: quiet
  alternatives:
  - silent
  - reserved
  lexicon: LSJ
  rationale: The adjective describes restrained speech or calm demeanor. 'Quiet' preserves
    the positive proverbial sense without overstating it as absolute muteness, which
    'silent' might imply.
- source_word: οὐκ ἔστιν
  chosen: there is no
  alternatives:
  - there is not
  lexicon: LSJ
  rationale: Standard existential rendering in English.
- source_word: ἀντάλλαγμα
  chosen: equivalent
  alternatives:
  - exchange
  - compensation
  - price
  lexicon: LSJ
  rationale: The sense is that nothing can match or be given in exchange for such
    a quality. 'Equivalent' communicates incomparable value in smooth English.
- source_word: πεπαιδευμένης
  chosen: disciplined
  alternatives:
  - well-instructed
  - trained
  - educated
  lexicon: LSJ
  rationale: From παιδεύω, the participle can denote one formed by instruction and
    discipline. 'Disciplined' captures both moral formation and self-control, fitting
    the wisdom context better than merely academic 'educated.'
- source_word: ψυχῆς
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: LSJ
  rationale: ψυχή here refers to the inner person or character. 'Soul' preserves the
    moral-spiritual register of wisdom literature, though 'self' is a possible alternative.
