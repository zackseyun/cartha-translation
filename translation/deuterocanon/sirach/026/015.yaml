theological_decisions:
- issue: Sense of πεπαιδευμένης ψυχῆς in relation to the wife described
  chosen_reading: The phrase refers to the inner character being formed and disciplined,
    expressing the incomparable worth of such a wife/personality.
  alternative_readings:
  - '''a well-instructed mind'''
  - '''an educated person'''
  rationale: The Greek does not explicitly repeat 'wife' after the first clause, but
    the proverb's parallelism strongly links the second clause to the same commendation
    of character. Rendering ψυχή as 'soul' and πεπαιδευμένης as 'disciplined' preserves
    the wisdom-literature emphasis on moral formation rather than formal education
    alone.
