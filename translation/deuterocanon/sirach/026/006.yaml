translation:
  text: Slander in a city, and an assembly of a mob, and a false accusation—all these
    are more grievous than death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text is a compressed list with elliptical genitives ('slander
      of/in a city,' 'assembly of a crowd'). The translation makes the sense explicit
      in idiomatic English.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαβολὴν
  chosen: Slander
  alternatives:
  - calumny
  - defamation
  - malicious accusation
  lexicon: LSJ
  rationale: The noun denotes slanderous accusation or defamation. 'Slander' is concise,
    natural English and fits the vice-list style of the verse better than the more
    technical 'calumny' or the broader 'defamation'.
- source_word: πόλεως
  chosen: in a city
  alternatives:
  - of a city
  - against a city
  lexicon: LSJ
  rationale: 'The genitive is terse and somewhat elliptical in this list. ''In a city''
    best conveys the social setting in idiomatic English: slander occurring within
    civic life. ''Of a city'' is too ambiguous in English, and ''against a city''
    over-specifies hostility toward the city itself.'
- source_word: ἐκκλησίαν
  chosen: assembly
  alternatives:
  - gathering
  - congregation
  lexicon: LSJ
  rationale: In this wisdom context the word refers to an assembled group, not specifically
    a religious congregation or later ecclesial sense. 'Assembly' preserves the formal
    sense without importing church language.
- source_word: ὄχλου
  chosen: of a mob
  alternatives:
  - of a crowd
  - of the multitude
  lexicon: LSJ
  rationale: Although ὄχλος can mean 'crowd,' here the pairing with other social evils
    suggests a disorderly, dangerous mass. 'Mob' captures the negative force more
    clearly than the neutral 'crowd'.
- source_word: καταψευσμόν
  chosen: a false accusation
  alternatives:
  - a lie
  - false testimony
  - slander
  lexicon: LSJ
  rationale: The term points to speaking falsely against someone. 'False accusation'
    distinguishes it from the earlier διαβολή while preserving the forensic or interpersonal
    sense better than the generic 'lie'.
- source_word: ὑπὲρ θάνατον
  chosen: worse than death
  alternatives:
  - beyond death
  - more than death
  lexicon: LSJ
  rationale: The comparative idiom in context expresses surpassing death in badness.
    'Worse than death' is the clearest idiomatic English rendering.
- source_word: πάντα
  chosen: all these
  alternatives:
  - all things
  - everything
  lexicon: LSJ
  rationale: The neuter plural sums up the preceding items. 'All these' makes the
    anaphoric reference explicit in English.
- source_word: μοχθηρά
  chosen: are worse
  alternatives:
  - are evil
  - are grievous
  - are wicked
  lexicon: LSJ
  rationale: 'The adjective means bad, evil, or grievous. In combination with ὑπὲρ
    θάνατον, English requires a comparative sense: these things are more grievous
    or worse than death. ''Are worse'' communicates the full clause naturally.'
