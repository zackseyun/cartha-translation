theological_decisions:
- issue: Referent of the final singular pronoun αὐτόν after a list of three grievances
  chosen_reading: The final clause is rendered generically as applying to the one
    who turns back from righteousness to sin.
  alternative_readings:
  - The pronoun could be taken distributively over the whole list
  - The syntax may be textually awkward, with the final item especially singled out
    for judgment
  rationale: Because αὐτόν is singular and follows most directly after the singular
    participial phrase, the most natural reading is that divine judgment particularly
    targets the apostate from righteousness. The English dash helps mark the shift
    and preserve the Greek's abruptness without over-resolving the syntax.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Rendering δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: In this wisdom context the contrast is between upright conduct and sin,
    so 'righteousness' better preserves the moral-religious sense than 'justice.'
  doctrine_reference: 'Contested terms table: δικαιοσύνη → righteousness by default'
