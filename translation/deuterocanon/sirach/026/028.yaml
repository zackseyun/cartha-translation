id: SIR.26.28
reference: Sirach 26:28
source:
  edition: lxx-swete-1909
  text: Ἐπὶ δυτὶ λελύπηται ἡ καρδία μου, καὶ ἐπὶ τῷ τρίτῳ θυμός μοι ἐπῆλθεν· ἀνὴρ
    πολεμιστὴς ὑστερῶν διʼ ἔνδειαν, καὶ ἄνδρες συνετοὶ ἐὰν σκυβαλωθῶσιν, ἐπανάγων
    ἀπὸ δικαιοσύνης ἐπὶ ἁμαρτίαν· ὁ κύριος ἑτοιμάσει εἰς ῥομφαίαν αὐτόν.
  language: Greek
  pages:
  - 714
  confidence: high
  validation: agree
translation:
  text: 'Over two things my heart is grieved, and over a third anger has come upon
    me: a warrior brought low by poverty, and men of understanding if they are treated
    like refuse, and one who turns back from righteousness to sin—the Lord will prepare
    him for the sword.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if they are treated as rubbish' or 'if they are cast aside as dung';
      the Greek verb is built on a word for refuse and expresses contemptuous degradation.
    reason: lexical_alternative
  - marker: b
    text: The final singular 'him' most naturally refers to the one who turns back
      from righteousness to sin, though the Greek list is syntactically compressed
      and some readers may hear the judgment clause as summing up the whole saying.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐπὶ δυτὶ
  chosen: Over two things
  alternatives:
  - For two things
  - At two things
  lexicon: LSJ
  rationale: Idiomatic rendering of ἐπί with dative plus numeral introducing the items
    that cause grief. 'Over two things' preserves the lament formula naturally in
    English.
- source_word: λελύπηται ἡ καρδία μου
  chosen: my heart is grieved
  alternatives:
  - my heart has been saddened
  - my heart is distressed
  lexicon: LSJ
  rationale: Perfect passive/middle of λυπέω conveys a present state resulting from
    grief. 'My heart is grieved' is both natural and close to the Greek.
- source_word: θυμός μοι ἐπῆλθεν
  chosen: anger has come upon me
  alternatives:
  - wrath came over me
  - rage came upon me
  lexicon: LSJ
  rationale: The phrase denotes anger arising or overtaking the speaker. 'Anger has
    come upon me' preserves the vividness without overstating θυμός as 'rage'.
- source_word: ἀνὴρ πολεμιστὴς
  chosen: a warrior
  alternatives:
  - a fighting man
  - a man of war
  lexicon: LSJ
  rationale: The phrase refers to a man characterized by warfare. 'Warrior' is concise,
    natural, and preserves the masculine singular.
- source_word: ὑστερῶν διʼ ἔνδειαν
  chosen: brought low by poverty
  alternatives:
  - lacking because of want
  - reduced through poverty
  - suffering need through destitution
  lexicon: LSJ
  rationale: ὑστερέω here means to be in want or to fall short; διʼ ἔνδειαν specifies
    poverty/lack as the cause. 'Brought low by poverty' captures both deprivation
    and humiliation in readable English.
- source_word: ἄνδρες συνετοὶ
  chosen: men of understanding
  alternatives:
  - intelligent men
  - wise men
  - sensible men
  lexicon: LSJ
  rationale: συνετός denotes understanding, discernment, intelligence. 'Men of understanding'
    preserves the masculine plural and the moral-intellectual nuance.
- source_word: ἐὰν σκυβαλωθῶσιν
  chosen: if they are treated like refuse
  alternatives:
  - if they are cast aside as dung
  - if they are made contemptible
  - if they are treated as rubbish
  lexicon: LSJ
  rationale: The verb from σκύβαλον evokes being treated as refuse, filth, or something
    thrown away. 'Treated like refuse' preserves the contemptuous force without using
    a cruder English term in the main text.
- source_word: ἐπανάγων ἀπὸ δικαιοσύνης ἐπὶ ἁμαρτίαν
  chosen: one who turns back from righteousness to sin
  alternatives:
  - one returning from righteousness to sin
  - one led back from righteousness into sin
  lexicon: LSJ
  rationale: The participle is somewhat abrupt after the prior items, but the sense
    is of reverting from a righteous course to sinful conduct. 'Turns back' captures
    the retrogressive force of ἐπανάγω. δικαιοσύνη is rendered 'righteousness' per
    project default outside contexts demanding 'justice'.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: LSJ
  rationale: Per doctrine, κύριος defaults to 'Lord.' In Sirach's Greek this refers
    to God without requiring the small-caps convention reserved for explicit Hebrew
    YHWH in the Hebrew Bible corpus.
- source_word: ἑτοιμάσει εἰς ῥομφαίαν αὐτόν
  chosen: will prepare him for the sword
  alternatives:
  - will appoint him for the sword
  - will make him ready for the sword
  lexicon: LSJ
  rationale: The idiom indicates divine appointment to destruction by the sword. 'Prepare
    him for the sword' is formally close and preserves the ominous judicial tone.
