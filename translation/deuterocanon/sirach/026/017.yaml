theological_decisions:
- issue: Gendered household language
  chosen_reading: good wife ... his house
  alternative_readings:
  - good woman ... the household
  - good wife ... her house
  rationale: The Greek specifically uses γυναικός in a context that points to marriage,
    and αὐτοῦ is masculine. Following the project's gender-accurate principle, the
    translation preserves the source's household framing rather than neutralizing
    it.
