translation:
  text: Like the sun rising in the heights of the Lord, so is the beauty of a good
    wife in the ordering of his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the adornment of his house.' The Greek word can refer both to orderly
      arrangement and to adornment.
    reason: lexical_alternative
  - marker: b
    text: Some translators render 'good woman' instead of 'good wife,' but the household
      context favors 'wife' here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥλιος ἀνατέλλων
  chosen: the sun rising
  alternatives:
  - a rising sun
  - the sun as it rises
  lexicon: LSJ
  rationale: The participial phrase is naturally rendered as an image in motion. 'The
    sun rising' preserves the vivid comparison without over-literal awkwardness.
- source_word: ἐν ὑψίστοις Κυρίου
  chosen: in the heights of the Lord
  alternatives:
  - in the highest places of the Lord
  - in the Lord's heights
  - in the heights of heaven
  lexicon: LSJ
  rationale: ὑψίστοις is plural and denotes lofty heights. Retaining 'of the Lord'
    follows the genitive Κυρίου in the Greek rather than smoothing to 'heaven,' though
    the sense is heavenly exaltation.
- source_word: κάλλος
  chosen: beauty
  alternatives:
  - splendor
  - loveliness
  lexicon: LSJ
  rationale: '''Beauty'' is the straightforward lexical equivalent and fits the proverb''s
    comparison.'
- source_word: ἀγαθῆς γυναικός
  chosen: of a good wife
  alternatives:
  - of a good woman
  lexicon: LSJ
  rationale: Although γυνή can mean either 'woman' or 'wife,' the household context
    in the following phrase strongly favors 'wife.' 'Good' preserves ἀγαθῆς without
    importing narrower moral adjectives such as 'virtuous.'
- source_word: ἐν κόσμῳ
  chosen: in the ordering
  alternatives:
  - in the adornment
  - in the arrangement
  - in the ornament
  lexicon: LSJ
  rationale: κόσμος can denote order, arrangement, or adornment. In a household setting,
    'ordering' best captures both the sense of proper arrangement and the resulting
    beauty, without reducing the phrase to mere decoration.
- source_word: οἰκίας αὐτοῦ
  chosen: of his house
  alternatives:
  - of her house
  - of the household
  lexicon: LSJ
  rationale: The Greek reads the masculine possessive αὐτοῦ. 'His house' is therefore
    the most direct rendering, even though the broader sense is the household shared
    by husband and wife.
