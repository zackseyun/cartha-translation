id: SIR.26.29
reference: Sirach 26:29
source:
  edition: lxx-swete-1909
  text: Μόλις ἐξελεῖται ἔμπορος ἀπὸ πλημμελείας, καὶ οὐ δικαιωθήσεται κάπηλος ἀπὸ
    ἁμαρτίας.
  language: Greek
  pages:
  - 715
  confidence: high
  validation: agree
translation:
  text: A merchant will scarcely be kept from wrongdoing, and a shopkeeper will not
    be declared righteous from sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will hardly escape wrongdoing.' The Greek verb can mean 'escape' or
      'extricate oneself from.'
    reason: lexical_alternative
  - marker: b
    text: '''Shopkeeper'' renders a Greek term for a small-scale retailer, sometimes
      with a negative social connotation.'
    reason: cultural_note
lexical_decisions:
- source_word: Μόλις
  chosen: scarcely
  alternatives:
  - hardly
  - with difficulty
  lexicon: LSJ
  rationale: Conveys the adverbial sense of something barely or with great difficulty
    happening. 'Scarcely' fits natural English and preserves the proverb-like force.
- source_word: ἐξελεῖται
  chosen: will keep himself from
  alternatives:
  - will escape
  - will be delivered from
  lexicon: LSJ
  rationale: Middle voice with ἀπό suggests extricating oneself from or avoiding involvement
    in something. 'Keep himself from' communicates practical avoidance in idiomatic
    English better than the more wooden 'be delivered from' in this wisdom context.
- source_word: ἔμπορος
  chosen: merchant
  alternatives:
  - trader
  - businessman
  lexicon: LSJ
  rationale: Refers to a trader engaged in commerce. 'Merchant' is the most precise
    and suitably neutral English term in a wisdom saying about trade.
- source_word: πλημμελείας
  chosen: wrongdoing
  alternatives:
  - offense
  - transgression
  - dishonesty
  lexicon: LSJ
  rationale: The noun denotes fault, offense, or wrongdoing broadly. 'Wrongdoing'
    preserves the general moral sense without narrowing it too specifically to commercial
    fraud, though that may be implied by context.
- source_word: δικαιωθήσεται
  chosen: will be declared righteous
  alternatives:
  - will be justified
  - will be acquitted
  lexicon: LSJ
  rationale: The passive of δικαιόω commonly carries a forensic sense. 'Will be declared
    righteous' preserves that sense clearly in modern English, while 'justified' could
    sound overly theological or technical here.
- source_word: κάπηλος
  chosen: shopkeeper
  alternatives:
  - retailer
  - huckster
  - peddler
  lexicon: LSJ
  rationale: The term refers to a small-scale seller or tavern-keeper/retailer, often
    with a negative connotation in moral discourse. 'Shopkeeper' is the clearest neutral
    equivalent; the implied suspicion of petty trade is carried by the verse as a
    whole rather than forced into the noun itself.
- source_word: ἁμαρτίας
  chosen: sin
  alternatives:
  - guilt
  - offense
  lexicon: LSJ
  rationale: Standard moral-religious term. 'Sin' should be retained rather than weakened,
    since the verse moves from general wrongdoing to explicitly moral culpability.
