translation:
  text: A jealous wife is heartache and grief when set against another woman, and
    a scourge of the tongue that associates with everyone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a rival wife ... over another wife.' The Greek ἀντίζηλος with ἐπὶ γυναικί
      may point to rivalry with another woman, possibly another wife, but the wording
      is compressed and can also be read more generally as jealousy directed against
      another woman.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult. The Greek literally speaks of 'a scourge
      of the tongue, communicating/being shared with all,' which may mean speech that
      lashes everyone indiscriminately.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄλγος καρδίας
  chosen: heartache
  alternatives:
  - pain of heart
  - anguish of heart
  - heart-pain
  lexicon: LSJ
  rationale: The phrase is idiomatic rather than anatomical. 'Heartache' gives natural
    English while preserving the emotional force of inner pain.
- source_word: πένθος
  chosen: grief
  alternatives:
  - mourning
  - sorrow
  lexicon: LSJ
  rationale: The term denotes sorrow or mourning. 'Grief' fits the parallel with 'heartache'
    and reads naturally in English without over-specifying ritual mourning.
- source_word: γυνὴ ἀντίζηλος
  chosen: a jealous wife
  alternatives:
  - a rival wife
  - a contentious wife
  - an envious wife
  lexicon: LSJ
  rationale: ἀντίζηλος can denote jealousy or rivalry. In this domestic context, 'jealous
    wife' best captures the emotional and relational sense; 'rival wife' is possible
    but would imply a more specific polygynous arrangement than the Greek alone requires.
- source_word: ἐπὶ γυναικί
  chosen: when set against another woman
  alternatives:
  - toward a woman
  - against a woman
  - over another wife
  lexicon: LSJ
  rationale: The prepositional phrase is terse and somewhat awkward in Greek. Rendering
    it as 'when set against another woman' preserves the adversative/relational sense
    without forcing a narrower interpretation. Because the source validation flags
    a mismatch, a slightly more explicit English phrase helps reflect the likely sense
    while acknowledging the compressed Greek.
- source_word: μάστιξ γλώσσης
  chosen: a scourge of the tongue
  alternatives:
  - a whip of the tongue
  - a tongue's lash
  lexicon: LSJ
  rationale: The metaphor is vivid and should be preserved. 'Scourge of the tongue'
    is idiomatic enough in English and keeps the image of verbal abuse or cutting
    speech.
- source_word: πᾶσιν ἐπικοινωνοῦσα
  chosen: shared with everyone
  alternatives:
  - communicating with all
  - associating with all
  - common to all
  lexicon: LSJ
  rationale: The participle suggests extending or making something common among all.
    In context it likely means the verbal scourge reaches everyone or is indiscriminately
    directed. 'Shared with everyone' preserves that breadth, though the Greek expression
    is somewhat difficult.
