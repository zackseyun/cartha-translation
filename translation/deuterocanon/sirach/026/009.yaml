translation:
  text: A drunken wife is great anger, and she will not cover her shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A drunken woman is great anger'; Greek γυνή can mean either 'woman'
      or 'wife,' though the household context favors 'wife.'
    reason: lexical_alternative
  - marker: b
    text: The Greek is terse and literally reads 'great anger, a drunken wife'; the
      translation preserves the appositional force rather than smoothing it into a
      fuller paraphrase.
    reason: lexical_alternative
  - marker: c
    text: '''Shame'' may also be understood as ''disgrace'' or ''indecency.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργὴ μεγάλη
  chosen: great anger
  alternatives:
  - a great wrath
  - a source of great anger
  - great indignation
  lexicon: LSJ
  rationale: 'The Greek is verbless and appositional: literally ''great anger [is]
    a drunken wife.'' Rendering it as ''great anger'' preserves the terse nominal
    force without adding too much interpretation. ''A source of great anger'' is smoother
    English but imports an explanatory relation not explicitly stated.'
- source_word: γυνὴ
  chosen: wife
  alternatives:
  - woman
  lexicon: LSJ
  rationale: In Sirach's household-instruction context, γυνή commonly refers to a
    wife rather than a woman in general. 'Wife' best fits the domestic setting of
    the surrounding material.
- source_word: μέθυσος
  chosen: drunken
  alternatives:
  - given to drink
  - drunkard
  lexicon: LSJ
  rationale: The adjective describes habitual or characteristic drunkenness. 'Drunken'
    is concise and natural in English; 'drunkard' would recast the adjective as a
    noun.
- source_word: ἀσχημοσύνην
  chosen: shame
  alternatives:
  - disgrace
  - indecency
  lexicon: LSJ
  rationale: The term can denote shameful exposure, disgrace, or indecency. 'Shame'
    is broad enough to preserve the ambiguity between moral disgrace and exposed impropriety.
    'Indecency' is possible but narrower and more interpretive.
- source_word: οὐ συγκαλύψει
  chosen: will not cover
  alternatives:
  - will not conceal
  - will not hide
  lexicon: LSJ
  rationale: The compound verb literally means 'cover over, conceal.' 'Will not cover'
    keeps the metaphor present in the Greek, while remaining understandable in English.
