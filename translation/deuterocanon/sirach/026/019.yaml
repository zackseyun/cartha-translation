translation:
  text: Golden pillars on a silver base, and beautiful feet on the breast of one who
    stands firm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek image is compressed and somewhat difficult: literally, ''beautiful
      feet on breasts of one steadfast/stable.'' The translation takes εὐσταθοῦς substantivally
      (''one who stands firm'') and στέρνοις as the chest or breast area.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στύλοι
  chosen: pillars
  alternatives:
  - columns
  lexicon: LSJ
  rationale: The plural noun denotes upright supporting structures. 'Pillars' is the
    most natural English equivalent in a poetic comparison; 'columns' is possible
    but sounds more architectural and less proverbial.
- source_word: χρύσεοι
  chosen: golden
  alternatives:
  - of gold
  lexicon: LSJ
  rationale: The adjective modifies 'pillars' and is rendered adjectivally for smooth
    English. 'Golden' preserves the imagery without implying mere color rather than
    material in this context.
- source_word: βάσεως ἀργυρᾶς
  chosen: a silver base
  alternatives:
  - a base of silver
  - a silver foundation
  lexicon: LSJ
  rationale: The genitive phrase describes what the pillars rest upon. 'Base' is the
    most direct rendering of βάσις here; 'foundation' is broader and less concrete.
- source_word: πόδες
  chosen: feet
  alternatives:
  - steps
  - legs
  lexicon: LSJ
  rationale: The literal noun is 'feet.' Although the image is metaphorical and could
    suggest gait or stance, the Greek itself names the feet, so the translation keeps
    the concrete term.
- source_word: ὡραῖοι
  chosen: beautiful
  alternatives:
  - graceful
  - lovely
  - comely
  lexicon: LSJ
  rationale: The adjective conveys beauty or attractiveness. 'Beautiful' is clear
    modern English and fits the poetic parallel with precious materials.
- source_word: στέρνοις
  chosen: the breast
  alternatives:
  - the chest
  - the bosom
  lexicon: LSJ
  rationale: The plural dative literally refers to the breast/chest area. English
    idiom prefers a singular collective expression here. 'Breast' preserves the bodily
    image more closely than the more clinical 'chest.'
- source_word: εὐσταθοῦς
  chosen: one who stands firm
  alternatives:
  - the steadfast one
  - the stable one
  lexicon: LSJ
  rationale: The adjective means firm, steady, or well-grounded. Because it is substantival
    in context, 'one who stands firm' makes the sense explicit in natural English
    while preserving the image of stability.
