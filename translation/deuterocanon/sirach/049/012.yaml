    reason: textual_variant
lexical_decisions:
- source_word: גם
  chosen: So also
  alternatives:
  - also
  - likewise
  lexicon: HALOT
  rationale: Introduces this figure as another example in the sequence of remembered
    leaders; 'So also' fits the commemorative style better than a bare 'also'.
- source_word: יהושע בן יהוצדק
  chosen: Yehoshua son of Jehozadak
  alternatives:
  - Joshua son of Jehozadak
  - Jesus son of Josedek
  rationale: Personal names are transliterated by project policy. The Hebrew witness
    has the full Hebrew form; the Greek confirms the identification.
- source_word: וירימו
  chosen: they raised up
  alternatives:
  - they lifted up
  - they built up
  lexicon: HALOT
  rationale: The Hebrew verb means 'raise/lift up.' 'Raised up' preserves the temple-building
    sense without over-specifying beyond the wording. The Greek ἀνύψωσαν supports
    this upward/exalting nuance.
- source_word: היכל קדש
  chosen: a holy temple
  alternatives:
  - the holy temple
  - a sanctuary of holiness
  lexicon: HALOT
  rationale: היכל is best rendered 'temple' here. The absence of the article in Hebrew
    favors 'a holy temple' rather than 'the holy temple,' though English idiom could
    allow either. The Greek οἶκον plus the sacred context supports temple language.
- source_word: ומכונן
  chosen: established
  alternatives:
  - founded
  - made firm
  - prepared
  lexicon: HALOT
  rationale: The participial/passive-like form conveys something set firmly in place.
    'Established' is natural English and matches the sense of durable founding. The
    Greek ἡτοιμασμένον points to a prepared/appointed state; 'established' captures
    the result in context.
- source_word: לכבוד עולם
  chosen: for everlasting glory
  alternatives:
  - for eternal honor
  - for the glory of the age
  - unto everlasting splendor
  lexicon: HALOT
  rationale: כבוד is 'glory/honor'; עולם here carries enduring duration. 'Everlasting
    glory' is idiomatic and preserves the elevated register of the praise.
- source_word: אשר במצוק הקימו מזבח
  chosen: omitted from main text
  alternatives:
  - who in distress set up an altar
  - who in a narrow place established an altar
  lexicon: HALOT
  rationale: This clause appears in brackets in the Hebrew edition and is not reflected
    in the Greek parallel for this verse. Because the Hebrew line is textually uncertain/editorial,
    it should not control the main text but is worth preserving in a footnote as an
    alternative reading.
- source_word: οἱ ἐν ἡμέραις αὐτῶν
  chosen: in their days
  alternatives:
  - in his days
  lexicon: BDAG
  rationale: The Greek has a plural subject phrase, likely referring to Yehoshua and
    his associates/generation, while the Hebrew wording as presented moves directly
    to a plural verb. 'In their days' best accounts for the extant wording and avoids
    forcing singularization.
