theological_decisions:
- issue: How to construe the difficult clause 'ביד ירמיהו' in relation to the city's
    destruction and Jeremiah's suffering
  chosen_reading: Retain the idiom 'by the hand of Yirmeyahu' in the main text, with
    the following clause explaining that the people had afflicted the prophet whom
    God formed for prophetic service.
  alternative_readings:
  - render more dynamically as 'because of Jeremiah'
  - 'connect the phrase more loosely: ''as Jeremiah had foretold'''
  rationale: The Hebrew is somewhat compressed, and the Greek parallel also preserves
    'in/by the hand of Jeremiah.' Rather than resolve the syntax too aggressively,
    the main text keeps the idiom and the footnote notes a smoother interpretive option.
    This preserves source-level tension rather than importing a fully harmonized explanation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
