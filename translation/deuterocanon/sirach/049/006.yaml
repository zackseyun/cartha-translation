translation:
  text: They set the holy city on fire, and made its streets desolate, by the hand
    of Yirmeyahu; for they afflicted him, though he had been formed in the womb as
    a prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through Yirmeyahu,' that is, in connection with his prophetic ministry
      or warning. The Hebrew idiom 'by the hand of' is retained in the main text;
      the syntax here is compressed.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'paths/ways'; in the context of a city, 'streets' conveys the sense.
    reason: lexical_alternative
  - marker: c
    text: The line echoes Yirmeyahu's calling from the womb; compare Jeremiah 1:5.
    reason: cross_reference
lexical_decisions:
- source_word: ויציתו
  chosen: they set ... on fire
  alternatives:
  - they kindled
  - they burned
  lexicon: HALOT
  rationale: The verb denotes igniting/burning. In context with 'city,' idiomatic
    English is 'set ... on fire,' which preserves the destructive action more naturally
    than the more wooden 'kindled.'
- source_word: קרית קדש
  chosen: the holy city
  alternatives:
  - the sacred city
  - the city of holiness
  lexicon: HALOT
  rationale: The Hebrew construct naturally yields 'holy city.' The Greek parallel
    ἐκλεκτὴν πόλιν ἁγιάσματος differs somewhat ('chosen city of the sanctuary'), but
    the Hebrew witness is primary here and supports the familiar, direct rendering.
- source_word: וישמו
  chosen: made ... desolate
  alternatives:
  - laid ... waste
  - desolated
  lexicon: HALOT
  rationale: From a root meaning to devastate or make desolate. 'Made ... desolate'
    is clear modern English and matches the ruin imagery.
- source_word: ארחתיה
  chosen: its streets
  alternatives:
  - its roads
  - its paths
  - its ways
  lexicon: HALOT
  rationale: Although the noun can mean paths/ways, in the context of a city the sense
    is its thoroughfares or streets. This is also supported by the Greek ὁδοὺς αὐτῆς.
- source_word: ביד ירמיהו
  chosen: by the hand of Yirmeyahu
  alternatives:
  - through Yirmeyahu
  - at Yirmeyahu's hand
  - because of Yirmeyahu
  lexicon: HALOT
  rationale: The Hebrew idiom 'by the hand of' often means 'through' or 'by means
    of.' Here it likely indicates that these events came in connection with Jeremiah's
    prophetic agency. I preserved the idiom in English because it is intelligible
    and keeps the Hebrew texture, while the footnote preserves the smoother alternative.
- source_word: כי ענוהו
  chosen: for they afflicted him
  alternatives:
  - for they humbled him
  - for they mistreated him
  lexicon: HALOT
  rationale: 'The clause explains the relation to Jeremiah: the people oppressed or
    afflicted him. ''Afflicted'' best captures unjust harsh treatment without over-specifying
    the manner.'
- source_word: מרחם נוצר נביא
  chosen: had been formed in the womb as a prophet
  alternatives:
  - was fashioned from the womb a prophet
  - was created from the womb to be a prophet
  lexicon: HALOT
  rationale: This alludes to Jeremiah's prophetic calling from the womb (cf. Jer 1:5).
    'Formed in the womb as a prophet' is natural English and preserves the prenatal
    prophetic designation.
- source_word: ירמיהו
  chosen: Yirmeyahu
  alternatives:
  - Jeremiah
  rationale: Per project philosophy, personal names are transliterated rather than
    replaced by traditional Anglicized forms.
