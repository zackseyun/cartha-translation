theological_decisions:
- issue: Metaphorical force of 'horn'
  chosen_reading: Retain 'horn' in the main text rather than interpretively rendering
    it as 'power.'
  alternative_readings:
  - their strength
  - their power
  rationale: The verse laments the surrender of Israel/Judah's strength and honor,
    but the source expresses this through the established biblical image of the horn.
    Preserving the metaphor maintains literary and theological texture while remaining
    understandable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Handling a likely Hebrew textual irregularity in לאחור
  chosen_reading: 'Translate according to the sense supported by the Greek parallel:
    ''to others.'''
  alternative_readings:
  - backward
  - to the rear
  rationale: Because the Hebrew witness appears slightly irregular here and the prompt
    explicitly instructs that the Greek parallel be used as actual translation input,
    the translation follows the best recoverable sense rather than a wooden but likely
    misleading rendering.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach translated from Hebrew where it
    survives, with Greek kept in view; user task requirement on parallel source'
