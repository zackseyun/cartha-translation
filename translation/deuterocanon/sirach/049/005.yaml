translation:
  text: And they gave their horn backward, and their glory to a foolish foreign nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads an unusual form here ('backward' or similar), but the Greek
      parallel supports the sense 'to others.'
    reason: textual_variant
  - marker: b
    text: Or 'their strength' for 'their horn'; the Hebrew and Greek both preserve
      the horn metaphor for power.
    reason: lexical_alternative
lexical_decisions:
- source_word: קרנם
  chosen: their horn
  alternatives:
  - their strength
  - their power
  lexicon: HALOT
  rationale: Hebrew קֶרֶן literally means 'horn' and commonly functions metaphorically
    for strength, might, or royal power. The Greek parallel κέρας confirms the literal-metaphorical
    image. 'Horn' is retained in the main text to preserve the biblical metaphor rather
    than flattening it to interpretation.
- source_word: לאחור
  chosen: to others
  alternatives:
  - backward
  - to another
  - to strangers
  lexicon: HALOT
  rationale: The Hebrew form is somewhat awkward in this witness, but the Greek parallel
    ἑτέροις strongly supports the sense 'to others.' Given the source validation note
    of minor mismatch and the clear Greek consistency check, 'to others' best reflects
    the likely sense without overreaching.
- source_word: כבודם
  chosen: their glory
  alternatives:
  - their honor
  lexicon: HALOT
  rationale: כָּבוֹד often denotes glory, honor, or splendor. 'Glory' fits the elevated
    poetic register and matches the Greek δόξα.
- source_word: גוי
  chosen: nation
  alternatives:
  - people
  - gentile nation
  lexicon: HALOT
  rationale: גּוֹי is most straightforwardly 'nation.' 'Nation' preserves the political-collective
    sense in context.
- source_word: נבל
  chosen: foolish
  alternatives:
  - senseless
  - base
  - godless
  lexicon: HALOT
  rationale: נָבָל can denote folly with moral overtones. 'Foolish' is the most accessible
    rendering and preserves the evaluative force without importing a more specific
    theological category than the text states.
- source_word: נכרי
  chosen: foreign
  alternatives:
  - alien
  - strange
  lexicon: HALOT
  rationale: נָכְרִי means foreign or alien. 'Foreign' is natural modern English and
    aligns with the Greek ἀλλότριος.
