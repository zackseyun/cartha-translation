translation:
  text: Except for David, Hezekiah, and Josiah, all of them acted corruptly; the kings
    of Judah abandoned the law of the Most High, until they came to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all of them committed offense' (following the Greek more closely);
      the Hebrew says literally that they 'corrupted' or 'ruined.'
    reason: lexical_alternative
  - marker: b
    text: The final phrase is terse in the Hebrew ('until completion/end'); the Greek
      reads, 'the kings of Judah came to an end/failed.'
    reason: alternative_reading
lexical_decisions:
- source_word: לבד / παρὲξ
  chosen: Except for
  alternatives:
  - besides
  - apart from
  lexicon: HALOT / BDAG
  rationale: The Hebrew לבד and Greek παρὲξ both mark exception. 'Except for' is the
    clearest modern English rendering in context, introducing the three righteous
    kings as exceptions to the general indictment.
- source_word: השחיטו / πλημμελίαν ἐπλημμέλησαν
  chosen: acted corruptly
  alternatives:
  - dealt ruinously
  - committed offense
  - acted unfaithfully
  - sinned grievously
  lexicon: HALOT / BDAG
  rationale: The Hebrew root שחת in Hifil can denote corrupting or ruining; the Greek
    paraphrases with a cognate expression for committing offense or transgression.
    'Acted corruptly' preserves the moral force without over-specifying a single kind
    of sin, and fits the summary judgment on the kings.
- source_word: ויעזבו / κατέλιπον
  chosen: abandoned
  alternatives:
  - forsook
  - left
  lexicon: HALOT / BDAG
  rationale: Both Hebrew and Greek convey deliberate departure from covenantal obligation.
    'Abandoned' is strong, natural English and captures the culpable force better
    than the more neutral 'left.'
- source_word: תורת עליון / τὸν νόμον τοῦ ὑψίστου
  chosen: the law of the Most High
  alternatives:
  - the instruction of the Most High
  lexicon: HALOT / BDAG
  rationale: תורה can mean instruction, but with Greek νόμος and the royal-covenantal
    context, 'law' is the best main-text rendering. 'Most High' straightforwardly
    renders עליון / ὕψιστος as a divine title.
- source_word: מלכי יהודה
  chosen: the kings of Judah
  alternatives:
  - Judah's kings
  lexicon: HALOT
  rationale: A direct rendering preserves the historical reference and matches the
    Greek οἱ βασιλεῖς Ἰούδα.
- source_word: עד תמם / ἐξέλιπον
  chosen: until they came to an end
  alternatives:
  - until they were finished
  - and they perished
  - they failed
  lexicon: HALOT / BDAG
  rationale: The Hebrew phrase is somewhat terse and the Greek ἐξέλιπον suggests coming
    to an end or failing. 'Until they came to an end' preserves the endpoint sense
    without forcing a narrower interpretation such as death alone or extinction alone.
