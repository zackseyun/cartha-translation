theological_decisions:
- issue: How to construe the final clause עד תמם in light of the Greek ἐξέλιπον
  chosen_reading: 'The clause is rendered as the outcome of the kings'' abandonment:
    ''until they came to an end.'''
  alternative_readings:
  - '''the kings of Judah failed/vanished'' as a separate finite clause'
  - '''until they were consumed/completed'' with a more idiomatic Hebrew emphasis'
  rationale: The Hebrew wording in Kahana is concise and slightly awkward, while the
    Greek gives an interpretive equivalent rather than a strict literal mirror. Rendering
    it as an outcome clause best accounts for both witnesses and preserves the warning
    tone of the verse without overstating the exact mode of their end.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy with Greek parallel kept in view.
