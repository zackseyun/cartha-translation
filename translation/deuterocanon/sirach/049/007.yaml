theological_decisions:
- issue: Intertextual echo of Jeremiah's prophetic commission
  chosen_reading: Preserve the sequence of infinitives in a way that clearly echoes
    Jeremiah 1:10 while following the extant Hebrew wording of Sirach.
  alternative_readings:
  - Conform the line more closely to Jeremiah in English
  - Follow the shorter Greek sequence and omit the final positive verb
  rationale: The Hebrew witness strongly echoes Jeremiah's call language, and the
    Greek parallel confirms the general sense though with a shorter ending. The translation
    keeps the allusive cadence without importing exact Jeremiah wording where Sirach's
    Hebrew differs.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Final verb ולהשגיב versus Greek shorter text
  chosen_reading: Include the Hebrew final verb as 'to raise high' in the main text,
    with the Greek shorter form noted in a footnote.
  alternative_readings:
  - Omit the final verb and end with 'to plant'
  - Render more specifically as 'to make secure' or 'to exalt'
  rationale: Zone 1 primacy favors the surviving Hebrew for Sirach where extant. Because
    the Greek parallel lacks an equivalent final verb and the Hebrew form carries
    some semantic openness, the main text follows Hebrew and the footnote preserves
    the Greek evidence and lexical uncertainty.
  doctrine_reference: Translation philosophy §§1, 3, 5
