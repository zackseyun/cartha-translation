translation:
  text: to uproot and to tear down and to destroy, to overthrow; and likewise to build
    and to plant and to raise high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew ends with an additional positive verb, likely meaning 'to raise
      high,' 'to set on high,' or 'to make secure.' The Greek parallel is shorter
      here, ending with 'to build and to plant.'
    reason: textual_variant
  - marker: b
    text: This line deliberately echoes Jeremiah's prophetic commission in Jeremiah
      1:10, though Sirach's Hebrew wording is not identical.
    reason: cross_reference
lexical_decisions:
- source_word: לנתוש
  chosen: to uproot
  alternatives:
  - to pluck up
  lexicon: HALOT
  rationale: The infinitive from נתש denotes pulling up by the roots. 'Uproot' is
    clear modern English and preserves the Jeremiah allusion better than a looser
    'remove'.
- source_word: לנתוץ
  chosen: to tear down
  alternatives:
  - to break down
  - to demolish
  lexicon: HALOT
  rationale: נתץ commonly refers to pulling down structures. 'Tear down' is natural
    and keeps the concrete destructive force.
- source_word: ולהאביד
  chosen: to destroy
  alternatives:
  - to make perish
  - to wipe out
  lexicon: HALOT
  rationale: אבד in the causative conveys causing ruin or destruction. 'Destroy' is
    the most straightforward rendering in this sequence of judgment verbs.
- source_word: להרוס
  chosen: to overthrow
  alternatives:
  - to pull down
  - to demolish
  - to ruin
  lexicon: HALOT
  rationale: הרס overlaps with the previous demolition language, so varying the English
    avoids wooden repetition while preserving the sense of ruin. 'Overthrow' also
    fits a prophetic commission context.
- source_word: וכן
  chosen: and likewise
  alternatives:
  - and so also
  - also
  lexicon: HALOT
  rationale: וכן marks the balancing positive half of the commission. 'And likewise'
    clearly signals the parallelism.
- source_word: לבנות
  chosen: to build
  alternatives:
  - to rebuild
  lexicon: HALOT
  rationale: The Hebrew simply says 'to build'; 'rebuild' would add nuance not explicit
    in the text.
- source_word: לנטע
  chosen: to plant
  lexicon: HALOT
  rationale: Standard rendering of נטע, and it preserves the prophetic pairing with
    'build'.
- source_word: ולהשגיב
  chosen: to raise high
  alternatives:
  - to exalt
  - to make secure
  - to set on high
  lexicon: HALOT
  rationale: The Hebrew here differs from the familiar Jeremiah formula and likely
    reflects a positive verb from שגב. 'Raise high' preserves the exaltation/protection
    sense without overcommitting to one narrower nuance. The Greek parallel instead
    has only 'to plant,' lacking this final Hebrew verb, so the rendering should remain
    somewhat open.
