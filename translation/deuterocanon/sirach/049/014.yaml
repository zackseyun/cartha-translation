translation:
  text: Few have been created on earth like Enoch, and he too was taken up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Few have been created on earth like Enoch, and he too was taken
      …'' The final Hebrew word is difficult here; the Greek parallel reads ''from
      the earth,'' which is followed in the main text.'
    reason: textual_variant
  - marker: b
    text: Greek has the stronger wording 'not even one was created like Enoch on the
      earth.' The Hebrew witness reads 'few' rather than an absolute 'no one.'
    reason: alternative_reading
  - marker: c
    text: Or 'was taken up.' The wording recalls the tradition of Enoch's removal
      by God (compare Gen 5:24).
    reason: lexical_alternative
lexical_decisions:
- source_word: מעט
  chosen: Few
  alternatives:
  - Hardly any
  - No one
  lexicon: HALOT
  rationale: The Hebrew quantifier means 'few' or 'little.' Although the Greek parallel
    has the stronger οὐδὲ εἷς ('not even one'), the Hebrew witness is primary here
    and supports 'few' rather than an absolute negation. This also honestly reflects
    the minor mismatch between the witnesses.
- source_word: נוצרו
  chosen: have been created
  alternatives:
  - were formed
  - came into being
  lexicon: HALOT
  rationale: The passive plural from יצר/נצר-like transmission here is best rendered
    as a divine-passive style 'have been created/formed.' 'Created' fits the comparison
    of extraordinary human beings and aligns reasonably with the Greek ἐκτίσθη ('was
    created').
- source_word: כחנוך
  chosen: like Enoch
  alternatives:
  - such as Enoch
  - as Enoch
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like Enoch' is the most natural modern
    English rendering.
- source_word: וגם הוא
  chosen: and he too
  alternatives:
  - and even he
  - for he also
  lexicon: HALOT
  rationale: This keeps the additive emphasis without sounding wooden. It also corresponds
    well to the Greek καὶ γὰρ αὐτός in sense.
- source_word: נלקח
  chosen: was taken
  alternatives:
  - was taken up
  - was removed
  lexicon: HALOT
  rationale: The verb לקח in this context alludes to Enoch's being taken by God. 'Was
    taken' preserves the biblical idiom and avoids over-specifying ascent in the main
    text, while the Greek ἀνελήμφθη supports the nuance 'taken up' as an alternative.
- source_word: פנים
  chosen: from the earth
  alternatives:
  - before him
  - into the presence
  lexicon: HALOT
  rationale: The Hebrew reading פנים is difficult in context and likely reflects a
    textual issue; the Greek parallel reads ἀπὸ τῆς γῆς ('from the earth'). Because
    the Hebrew line has a minor mismatch and the Greek is supplied as an actual translation
    input, 'from the earth' best captures the intended sense while acknowledging the
    Hebrew difficulty in a footnote.
