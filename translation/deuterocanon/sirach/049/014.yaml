theological_decisions:
- issue: How explicitly to render Enoch's translation/removal
  chosen_reading: was taken from the earth
  alternative_readings:
  - was taken up
  - was taken into God's presence
  rationale: The verse echoes the tradition of Enoch's exceptional removal. The Hebrew
    alone is textually awkward at the end, while the Greek clarifies the sense. The
    main text preserves the restrained wording 'was taken from the earth' without
    importing a fuller doctrinal explanation not stated directly in this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
