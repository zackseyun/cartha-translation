  parallel_sources:
  - edition: lxx-swete-1909
    text: μνημόσυνον Ἰωσείου εἰς σύνθεσιν θυμιάματος. ἐσκευασμένον ἔργῳ μυρεψοῦ· ἐν
      παντὶ στόματι ὡς μέλι γλυκανθήσεται, καὶ ὡς μουσικὰ ἐν συμποσίῳ οἴνου.
