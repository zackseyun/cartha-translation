theological_decisions:
- issue: Whether to render the final clause as interpersonal mercy or God-directed
    piety
  chosen_reading: God-directed faithful devotion
  alternative_readings:
  - he showed kindness
  - he strengthened godliness/piety
  rationale: The surviving Hebrew says 'did חסד,' which by itself could suggest kindness/mercy,
    but the Greek parallel interprets the clause in explicitly religious terms ('strengthened
    piety'). In context, this verse praises Hezekiah's reforming fidelity, so the
    main text adopts a rendering that preserves the devotional dimension without overcommitting
    to the Greek's intensified verb.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy with parallel source used as actual
    input.'
