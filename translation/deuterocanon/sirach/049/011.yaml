theological_decisions:
- issue: Metaphorical image of Zerubbabel as a seal/signet on the right hand
  chosen_reading: Retain the metaphor directly without explicating its honor/covenantal
    implications in the main text.
  alternative_readings:
  - He was like a seal on the right hand
  - He was like a signet on the right hand
  rationale: The verse alludes to honor, chosenness, and preciousness, likely echoing
    prophetic imagery, but the text itself states only the simile. To avoid importing
    interpretation, the translation preserves the image and leaves fuller resonance
    to a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; never import
    doctrinal claims the text does not make.
