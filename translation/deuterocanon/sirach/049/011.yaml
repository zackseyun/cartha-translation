translation:
  text: How shall we praise Zerubbabel? He was like a signet ring on the right hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How shall we magnify Zerubbabel?' The Greek parallel has 'magnify,'
      while the Hebrew wording supports 'praise' or 'extol.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like a seal' or 'like a signet.' The image likely evokes honor and special
      value; compare the prophetic use of 'signet' imagery in Haggai 2:23.
    reason: cross_reference
lexical_decisions:
- source_word: מה נהללה
  chosen: How shall we praise
  alternatives:
  - How shall we magnify
  - How shall we extol
  lexicon: HALOT
  rationale: 'The Hebrew interrogative plus cohortative/volitive form expresses rhetorical
    admiration: ''How shall we praise...?'' The Greek parallel μεγαλύνωμεν supports
    a sense of exalting or praising. ''Praise'' is natural modern English and preserves
    the rhetorical question without over-literal awkwardness.'
- source_word: זרבבל
  chosen: Zerubbabel
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: על יד ימין
  chosen: on the right hand
  alternatives:
  - at the right hand
  - upon the right hand
  lexicon: HALOT
  rationale: The Hebrew phrase literally refers to the right hand. The Greek parallel
    ἐπὶ δεξιᾶς χειρός confirms this imagery. 'On the right hand' is a clear, sufficiently
    formal rendering.
- source_word: כחותם
  chosen: like a signet ring
  alternatives:
  - like a seal
  - like a signet
  lexicon: HALOT
  rationale: חותם denotes a seal/signet. In this simile, English 'signet ring' best
    conveys an object worn on the hand, matching the Hebrew and the Greek σφραγίς
    in context. 'Seal' alone could sound too abstract or detached from the hand imagery.
