translation:
  text: Shem and Seth and Enosh were honored, and above every living thing was Adam
    in glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Shem and Seth and Enosh were remembered/visited.'' The Greek
      parallel lacks ''Enosh'' here and instead reads ''Shem and Seth were glorified
      among men.'''
    reason: textual_variant
  - marker: b
    text: 'The Hebrew ending is difficult as transmitted; the Greek parallel reads
      ''Adam'' explicitly: ''and Adam was above every living creature in the creation.'''
    reason: textual_variant
lexical_decisions:
- source_word: ושם ושת
  chosen: Shem and Seth
  rationale: Proper names are transliterated. The Hebrew names correspond to the Greek
    Σὴμ καὶ Σὴθ.
- source_word: ואנוש
  chosen: (not represented in main text)
  alternatives:
  - Enosh
  rationale: The Hebrew witness includes 'and Enosh,' but the Greek parallel instead
    reads 'among men they were glorified' (ἐν ἀνθρώποις ἐδοξάσθησαν) after Shem and
    Seth. Because the Hebrew line appears textually unstable at this point and the
    Greek provides a coherent parallel sense, the main text follows the two-name structure
    supported by the Greek, while preserving the Hebrew's 'Enosh' in a footnote as
    a textual variant.
- source_word: נפקדו
  chosen: were honored
  alternatives:
  - were remembered
  - were visited
  - were appointed
  - were noted
  lexicon: HALOT
  rationale: In this context of praise for ancestral figures, the passive sense conveys
    favorable recognition. The Greek ἐδοξάσθησαν ('were glorified/honored') supports
    rendering the Hebrew idiom here as public honor rather than literal 'visited.'
- source_word: ועל כל חי
  chosen: above every living thing
  alternatives:
  - over all living beings
  - beyond every creature
  lexicon: HALOT
  rationale: כל חי is a broad expression for living creatures/beings. 'Above every
    living thing' preserves the comparative force and aligns with the Greek ὑπὲρ πᾶν
    ζῷον.
- source_word: תפארת
  chosen: glory
  alternatives:
  - splendor
  - beauty
  - honor
  lexicon: HALOT
  rationale: The noun denotes honor/splendor. 'Glory' fits the elevated style of the
    verse and resonates with the Greek's honor language in the parallel line.
- source_word: עמם
  chosen: Adam’s
  alternatives:
  - their people
  - with them
  lexicon: HALOT
  rationale: The Hebrew consonants as given are difficult in context, while the Greek
    parallel explicitly reads Ἀδάμ. The sense of the line is that Adam surpasses all
    living creatures in created glory/status. The main text therefore follows the
    Greek-supported reading 'Adam’s,' treating the Hebrew form as corrupt or miscopied
    at this point.
