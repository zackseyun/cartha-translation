theological_decisions:
- issue: Identity of the final comparative subject
  chosen_reading: The verse concludes with Adam as the one whose glory stands above
    every living thing.
  alternative_readings:
  - The Hebrew as transmitted could be construed more obscurely with a form like 'their
    people' or 'with them' rather than 'Adam'.
  rationale: This is not primarily a doctrinal issue but a text-critical and interpretive
    one. The Greek parallel gives a clear reading with Ἀδάμ, and this yields a coherent
    climax in the catalog of honored ancestors. The Hebrew wording appears unstable
    enough that the Greek should inform the translation.
  doctrine_reference: 'PHILOSOPHY.md: use Hebrew where it survives, with Greek parallel
    as actual translation input for Sirach.'
