translation:
  text: Like Joseph, a man was born; and even his body was cared for.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''But Joseph became a man, leader of his brothers, support
      of the people, and his bones were cared for.'' The Hebrew witness here is shorter.'
    reason: alternative_reading
  - marker: b
    text: The phrase 'his body was cared for' likely refers to the later honoring
      and burial of Joseph's remains; compare the tradition reflected in Exodus 13:19
      and Joshua 24:32.
    reason: cross_reference
lexical_decisions:
- source_word: כיוסף
  chosen: Like Joseph
  alternatives:
  - As with Joseph
  - Joseph likewise
  lexicon: HALOT
  rationale: The prefixed כ is comparative ('like/as'). The Hebrew is elliptical,
    and the Greek parallel explicitly names Joseph. Rendering 'Like Joseph' preserves
    the comparison while allowing the following clause to stand as a commendation
    in Joseph's pattern.
- source_word: אם נולד גבר
  chosen: a man was born
  alternatives:
  - was there born a man
  - a mighty man was born
  lexicon: HALOT
  rationale: Taken straightforwardly, נולד גבר means 'a man was born.' The phrase
    is somewhat abrupt in Hebrew; the Greek expands with praise of Joseph as a leader
    among brothers and support of the people. The Hebrew witness here is shorter,
    so the translation keeps the concise wording rather than importing the Greek expansion
    into the main text.
- source_word: גבר
  chosen: man
  alternatives:
  - strong man
  - mighty man
  lexicon: HALOT
  rationale: גבר can carry connotations of strength or manliness, but the immediate
    phrase is best rendered simply 'man.' This follows the project's gender-accurate
    policy and avoids overstating a nuance not required by the Hebrew.
- source_word: גויתו
  chosen: his body
  alternatives:
  - his corpse
  - his remains
  lexicon: HALOT
  rationale: גויה often refers to the body, especially a dead body/corpse. Because
    the clause concerns posthumous care and the Greek parallel has 'his bones,' 'body'
    is a natural English rendering that preserves the Hebrew wording without becoming
    overly specific.
- source_word: נפקדה
  chosen: was cared for
  alternatives:
  - was attended to
  - was visited
  - was remembered
  lexicon: HALOT
  rationale: The passive of פקד can denote being attended to, cared for, or looked
    after. In context—Joseph's remains receiving later attention/burial honors—'was
    cared for' communicates the sense clearly. The Greek parallel supports a funerary/posthumous
    sense ('his bones were cared for/visited').
