theological_decisions:
- issue: Whether to harmonize the Hebrew משובה with the Greek ἐπιστροφή in a more
    positive sense ('repentance/return')
  chosen_reading: Retain the Hebrew-leaning 'backsliding' in the main text
  alternative_readings:
  - our turning
  - the people's return/repentance
  rationale: Zone 1 primacy favors the surviving Hebrew witness where extant, but
    the Greek parallel is a real input and shows that the line was understood in a
    more positive restoration framework. The main text therefore follows the Hebrew
    lexical value, while the alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Whether הבל should be rendered interpretively as 'idols'
  chosen_reading: Render as 'emptiness'
  alternative_readings:
  - idols
  - worthless things
  rationale: The anti-idolatry polemic is likely, but the Hebrew term itself is broader
    and metaphorical. 'Emptiness' preserves the source image and avoids importing
    a narrower object term not explicitly present.
  doctrine_reference: 'Translation philosophy: optimal equivalence; never paraphrase
    beyond what the source text warrants.'
