theological_decisions:
- issue: Whether to expand the verse toward Ezekiel 1's divine-glory imagery using
    the Greek parallel
  chosen_reading: Keep the Hebrew-based concise wording in the main text while allowing
    the Greek to inform the sense of 'vision.'
  alternative_readings:
  - Ezekiel saw the vision of glory that was shown him on the chariot of the cherubim.
  rationale: The project's philosophy gives primacy to the surviving Hebrew of Sirach
    where available, while also using the Greek parallel as a real input. Here the
    Hebrew is extant but somewhat compressed and possibly uncertain at זני. Therefore
    the main text follows the Hebrew closely, with the fuller Greek-based alternative
    preserved in a footnote rather than imported into the translation body.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    use Greek parallel as consistency check/input; preserve ambiguity rather than
    over-resolve.'
