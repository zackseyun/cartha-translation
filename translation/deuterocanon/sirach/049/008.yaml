lexical_decisions:
- source_word: וחזקאל
  chosen: Ezekiel
  lexicon: HALOT
  rationale: Proper name; standard English transliteration of the Hebrew prophet's
    name.
- source_word: ראה
  chosen: saw
  alternatives:
  - beheld
  lexicon: HALOT
  rationale: Simple past of the common verb 'to see'; 'saw' is the most natural modern
    English rendering.
- source_word: מראה
  chosen: a vision
  alternatives:
  - an appearance
  - a sight
  lexicon: HALOT
  rationale: In prophetic context מראה commonly denotes a visionary sight rather than
    a merely visual appearance. The Greek parallel ὅρασιν supports 'vision'.
- source_word: ויגד
  chosen: described
  alternatives:
  - told
  - declared
  - reported
  lexicon: HALOT
  rationale: The verb נגד in Hifil means to tell or declare. Because the object is
    not a simple speech report but the features/categories of the chariot vision,
    'described' best captures the sense in idiomatic English.
- source_word: זני
  chosen: the kinds of
  alternatives:
  - the forms of
  - the species of
  - the details of
  lexicon: HALOT
  rationale: The Hebrew as transmitted reads זני, likely 'kinds/sorts of.' This is
    somewhat unusual in context, but it is the primary Hebrew witness and may refer
    to the various forms/aspects of the chariot vision. The Greek parallel instead
    has 'vision of glory ... on a chariot of cherubim,' which suggests the Hebrew
    may be compressed or textually uncertain. 'The kinds of' preserves the Hebrew
    wording most transparently while remaining intelligible.
- source_word: מרכבה
  chosen: the chariot
  alternatives:
  - the chariot-throne
  lexicon: HALOT
  rationale: מרכבה literally means 'chariot.' In Ezekiel's context it evokes the divine
    chariot vision, but the Hebrew here does not explicitly add 'cherubim' as the
    Greek does, so the main text keeps the simpler rendering.
