translation:
  text: Every counselor waves his hand, but there is a counselor whose advice is for
    himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is difficult at the end of the verse in the supplied witness; the
      Greek parallel reads 'but there is one who gives counsel for himself,' which
      supports the sense adopted here.
    reason: textual_variant
  - marker: b
    text: 'Or, more dynamically: ''Every counselor offers advice, but some counsel
      for their own benefit.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: 'The distributive sense fits the proverb-like statement: each counselor,
    taken generically, does this.'
- source_word: יועץ
  chosen: counselor
  alternatives:
  - advisor
  - one who gives advice
  lexicon: HALOT
  rationale: A straightforward rendering of the participial/noun form for one who
    gives counsel. 'Counselor' preserves the wisdom-literature register better than
    the more modern 'advisor'.
- source_word: יניף יד
  chosen: waves his hand
  alternatives:
  - gestures with his hand
  - brandishes his hand
  lexicon: HALOT
  rationale: The Hebrew idiom is somewhat opaque in isolation, but literally refers
    to lifting/waving the hand. Given the Greek parallel 'puts forth/exalts counsel,'
    the sense is of readily offering advice. The main text keeps the Hebrew image
    rather than flattening it entirely.
- source_word: אך
  chosen: but
  alternatives:
  - however
  - yet
  lexicon: HALOT
  rationale: Marks contrast between the general statement and the warning exception.
- source_word: יש
  chosen: there is
  alternatives:
  - there exists
  lexicon: HALOT
  rationale: Simple existential construction in English.
- source_word: דרך
  chosen: whose advice is for
  alternatives:
  - inclined toward
  - on the way to
  - for the benefit of
  lexicon: HALOT
  rationale: The Hebrew reading is difficult here ('דרך אל לץ' in the supplied text),
    and the Greek parallel has εἰς αὐτόν, 'for himself.' In light of the parallel
    and the immediate context warning against self-interested counsel, the translation
    expresses destination/benefit rather than a literal 'way.' This is a contextually
    guided rendering from the Hebrew with Greek support.
- source_word: אל לץ
  chosen: himself
  alternatives:
  - a mocker
  - to him
  - for him
  lexicon: HALOT
  rationale: The supplied Hebrew appears to read אל לץ, which is textually awkward
    in context and may reflect minor corruption or mismatch; the Greek parallel clearly
    reads 'for himself.' Because the source validation notes a minor mismatch and
    the Greek is provided as an actual parallel input, 'himself' best captures the
    likely sense without overcommitting to the problematic Hebrew surface form.
