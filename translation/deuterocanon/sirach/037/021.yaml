theological_decisions:
- issue: Relation of Hebrew and Greek witnesses
  chosen_reading: Translate the extant Hebrew exhortation about prayer and divine
    direction as the main text.
  alternative_readings:
  - 'Greek witness: ''For grace was not given to him from the Lord, because he was
    deprived of all wisdom.'''
  rationale: The project philosophy gives primacy to the Hebrew where Sirach survives
    in Hebrew. The Greek parallel here reflects a substantially different line rather
    than a minor lexical variation, so it should not replace the Hebrew main text.
    Because the divergence is material, it is preserved in a footnote as a textual
    variant rather than silently ignored.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    use Greek parallel as actual input while keeping Hebrew primary.'
