  - marker: a
    text: Greek reads, 'The wise man among his people will inherit trust, and his
      name will live forever.' The Hebrew and Greek differ substantially here.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיֵשׁ
  chosen: There is
  alternatives:
  - and there is
  - now there is
  lexicon: HALOT
  rationale: Existential opening; simple English 'There is' best reflects the Hebrew
    without overemphasizing the conjunction.
- source_word: חָכָם
  chosen: a wise man
  alternatives:
  - a wise one
  - a sage
  lexicon: HALOT
  rationale: Masculine singular noun; 'wise man' preserves the gendered singular form
    and matches the representative sense of the Hebrew.
- source_word: בִּדְבָרוֹ
  chosen: for his speech
  alternatives:
  - by his word
  - in his speaking
  - because of what he says
  lexicon: HALOT
  rationale: 'The beth preposition with דָּבָר here is best taken instrumentally/causally
    in context: he is despised on account of his manner of speaking or what he says.
    ''For his speech'' is concise and natural while staying close to the Hebrew.'
- source_word: נִמְאָס
  chosen: is despised
  alternatives:
  - is rejected
  - is loathed
  lexicon: HALOT
  rationale: The Niphal of מאס conveys being rejected or despised. 'Despised' fits
    the social sense and reads naturally in English.
- source_word: וּמִכָּל מַאֲכָל תַּעֲנוּג
  chosen: of every pleasant food
  alternatives:
  - of every delightful food
  - of every delicacy
  - from every pleasurable food
  lexicon: HALOT
  rationale: The phrase denotes enjoyable or choice food. 'Pleasant food' keeps the
    concrete imagery without becoming overly idiomatic.
- source_word: נִבְצָר
  chosen: is deprived
  alternatives:
  - is withheld
  - is cut off
  - is excluded
  lexicon: HALOT
  rationale: Given the context with מִן, the sense is that such food is withheld from
    him or inaccessible to him. 'Is deprived' communicates the resulting lack clearly
    in idiomatic English.
- source_word: 'Greek parallel: ὁ σοφὸς ἐν τῷ λαῷ αὐτοῦ κληρονομήσει πίστιν, καὶ τὸ
    ὄνομα αὐτοῦ ζήσεται εἰς τὸν αἰῶνα'
  chosen: used as a control but not followed in the main text
  alternatives:
  - the wise man among his people will inherit trust, and his name will live forever
  lexicon: BDAG
  rationale: The Greek parallel diverges substantially from the extant Hebrew. Per
    project philosophy, the surviving Hebrew is primary for Sirach where available,
    but the Greek was considered as an actual input and confirms that the textual
    tradition here is unstable enough to merit a footnote.
