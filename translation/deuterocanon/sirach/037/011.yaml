translation:
  text: He will speak to you of the good of your way, but then stand opposite to watch
    your downfall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is terse and somewhat uncertain here. The final phrase may also be
      rendered 'to watch your misfortune' or 'to watch your poverty.' The Greek parallel
      for this verse instead preserves a fuller warning not to rely on certain kinds
      of people for counsel.
    reason: alternative_reading
lexical_decisions:
- source_word: ואמר לך
  chosen: He will speak to you
  alternatives:
  - he will say to you
  - he will tell you
  lexicon: HALOT
  rationale: The Hebrew verb אמר is the ordinary verb 'say/speak.' 'Speak to you'
    is natural English and preserves the direct personal address.
- source_word: מטוב דרכך
  chosen: of the good of your way
  alternatives:
  - about how good your way is
  - for the good of your way
  - from the goodness of your way
  lexicon: HALOT
  rationale: The phrase is somewhat compressed. With מן before טוב, the sense is best
    taken as speaking approvingly concerning one's course or conduct. In idiomatic
    English this points to flattering or affirming someone's chosen path. I preserve
    the underlying imagery of 'way' rather than flattening it to 'plans' or 'conduct'
    alone.
- source_word: דרכך
  chosen: your way
  alternatives:
  - your path
  - your course
  lexicon: HALOT
  rationale: דרך commonly means 'way/path' literally and metaphorically. 'Way' keeps
    the Hebrew metaphor and fits wisdom literature style.
- source_word: וקם מנגד
  chosen: but then stand opposite
  alternatives:
  - and stand against you
  - and rise up opposite
  - and stand aside facing you
  lexicon: HALOT
  rationale: מנגד conveys being opposite, in front of, or over against. In context
    it suggests taking a position not of support but of detached or hostile observation.
    'Stand opposite' preserves the spatial metaphor while allowing the implied adversarial
    nuance.
- source_word: להביט
  chosen: to watch
  alternatives:
  - to look at
  - to gaze upon
  - to observe
  lexicon: HALOT
  rationale: הביט means to look attentively. 'Watch' best conveys deliberate observation
    in this context.
- source_word: רישך
  chosen: your downfall
  alternatives:
  - your poverty
  - your want
  - your evil
  - your misfortune
  lexicon: HALOT
  rationale: The Hebrew form is difficult and likely reflects a noun related to poverty,
    need, or calamity; the Greek parallel in this verse cluster depicts unreliable
    counselors and supports a negative outcome rather than a neutral 'head' reading.
    'Your downfall' captures the contextual force in readable English while acknowledging
    that a more literal rendering such as 'your misfortune' is possible.
