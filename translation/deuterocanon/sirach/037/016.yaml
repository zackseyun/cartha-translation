translation:
  text: A vain worker for his task, a vain guard for one who brings forth evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek reads instead: “And over all these things pray to the Most High,
      that he may direct your way in truth.” The Hebrew and Greek differ substantially
      here.'
    reason: textual_variant
lexical_decisions:
- source_word: פועל
  chosen: worker
  alternatives:
  - doer
  - laborer
  lexicon: HALOT
  rationale: The noun denotes one who does or works. 'Worker' is natural English and
    preserves the concrete agent sense better than the more abstract 'doer.'
- source_word: שוא
  chosen: vain
  alternatives:
  - worthless
  - in vain
  - 'false'
  lexicon: HALOT
  rationale: The Hebrew term commonly carries the sense of emptiness, futility, or
    worthlessness. 'Vain' preserves the terse proverbial style and can modify both
    clauses symmetrically.
- source_word: מלאכתו
  chosen: his task
  alternatives:
  - his work
  - his labor
  lexicon: HALOT
  rationale: The noun refers to work or occupation. 'His task' fits the proverb-like
    line and avoids awkward repetition with 'worker,' while still reflecting the underlying
    sense of assigned work.
- source_word: שומר
  chosen: guard
  alternatives:
  - watchman
  - keeper
  lexicon: HALOT
  rationale: The participial/noun form denotes one who watches or guards. 'Guard'
    is concise and suits the parallelism with 'worker.'
- source_word: מוציא רע
  chosen: one who brings forth evil
  alternatives:
  - one who produces evil
  - an evildoer
  - one who speaks evil
  lexicon: HALOT
  rationale: Literally the phrase is 'one bringing out evil.' Because the exact nuance
    is uncertain in this difficult Hebrew line, the translation stays relatively close
    to the wording rather than collapsing it into the interpretive 'evildoer.' This
    also leaves room for the Greek parallel, which differs substantially.
