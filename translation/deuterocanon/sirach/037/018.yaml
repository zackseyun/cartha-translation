theological_decisions:
- issue: Anthropological term לב/לבב
  chosen_reading: heart
  alternative_readings:
  - mind
  - inner self
  rationale: No doctrinal controversy is at stake, but the term carries the Hebrew
    sense of the inner person, not merely emotion. 'Heart' preserves biblical diction
    and theological texture better than 'mind.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Implicit consequence in יגיע אליו
  chosen_reading: it will reach him also
  alternative_readings:
  - he too will stumble
  - your trouble will affect him too
  rationale: The Hebrew is terse and the exact subject is implicit. I avoided over-resolving
    the line into a more interpretive paraphrase. The chosen rendering preserves the
    ambiguity while remaining readable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
