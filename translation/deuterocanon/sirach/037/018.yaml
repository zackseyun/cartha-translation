translation:
  text: But with one whose heart is like your heart, if you stumble, he will be affected
    also.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''his heart is like your heart.'' This may also be expressed as
      ''one who is like-minded with you,'' but ''heart'' is retained to preserve the
      Hebrew idiom.'
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is terse in Hebrew: literally, ''if you stumble, it will
      reach him.'' The sense is that your misstep or trouble affects such a person
      as well.'
    reason: alternative_reading
lexical_decisions:
- source_word: אך
  chosen: But
  alternatives:
  - Only
  - Yet
  - However
  lexicon: HALOT
  rationale: Introduces a contrast or limitation with the preceding counsel; 'But'
    is the most natural concise English adversative here.
- source_word: עם
  chosen: with
  alternatives:
  - with regard to
  - as for
  lexicon: HALOT
  rationale: The preposition here introduces the person in relation to whom the advice
    applies; 'with' preserves the compact Hebrew construction.
- source_word: לבבו כלבבך
  chosen: whose heart is like your heart
  alternatives:
  - of one whose heart is as your heart
  - who is like-minded with you
  lexicon: HALOT
  rationale: Literally 'his heart is like your heart.' 'Heart' in Hebrew includes
    inner disposition and intention. I retained 'heart' rather than flattening to
    'mind' to preserve the Hebrew anthropology, while phrasing it idiomatically in
    English.
- source_word: אם תכשל
  chosen: if you stumble
  alternatives:
  - if you fail
  - if you fall
  lexicon: HALOT
  rationale: The verb denotes stumbling or faltering. 'Stumble' preserves the metaphor
    and allows either moral or practical failure, fitting wisdom literature.
- source_word: יגיע אליו
  chosen: it will reach him also
  alternatives:
  - he will be affected by it too
  - it will come upon him also
  lexicon: HALOT
  rationale: The Hebrew verb suggests something reaching or extending to another person.
    Because the subject is implicit, 'it' is supplied in English, referring to the
    consequence of the addressee's stumbling. This also aligns with the Greek parallel's
    concern with the heart's changeability and its effects, though the Hebrew wording
    remains primary.
