translation:
  text: A friend fights with a stranger for a good thing, and in the face of cities
    he will take up a shield.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''A companion suffers with a friend for the sake of his stomach,
      and in the face of war he will take up a shield.'' The Hebrew and Greek differ
      notably in the first clause and in ''cities''/''war.'' The main text follows
      the extant Hebrew witness, with the Greek kept as a significant alternative.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'good' may also mean 'benefit' or 'advantage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוהב
  chosen: a friend
  alternatives:
  - one who loves
  - a lover
  lexicon: HALOT
  rationale: Although the participle literally means 'loving' or 'one who loves,'
    in wisdom context it functions substantivally for a companion/friend. The Greek
    parallel ἑταῖρος φίλῳ supports reading the line in terms of companionship rather
    than abstract affection.
- source_word: טוב
  chosen: a good thing
  alternatives:
  - good
  - benefit
  lexicon: HALOT
  rationale: The Hebrew lacks an explicit object marker and can denote 'good' in a
    broad sense. 'A good thing' preserves the Hebrew's terseness while allowing the
    sense of advantage/benefit reflected by the Greek χάριν.
- source_word: נלחם עם זר
  chosen: fights with a stranger
  alternatives:
  - contends with an outsider
  - fights against a stranger
  lexicon: HALOT
  rationale: The preposition עם can mean 'with' in either associative or adversative
    senses, but here the context favors conflict involving a stranger/outsider. I
    render it idiomatically as conflict with a stranger while preserving the Hebrew
    wording rather than importing the Greek's more interpretive 'for the sake of the
    belly.'
- source_word: זר
  chosen: stranger
  alternatives:
  - outsider
  - foreigner
  lexicon: HALOT
  rationale: '''Stranger'' best preserves the broad Hebrew sense of someone outside
    one''s circle. ''Foreigner'' would over-specify ethnicity or nationality.'
- source_word: נגד ערים
  chosen: in the face of cities
  alternatives:
  - before cities
  - against cities
  lexicon: HALOT
  rationale: The Hebrew literally reads 'opposite/before cities,' which is somewhat
    difficult. I preserve the spatial-confrontational sense with 'in the face of cities.'
    The Greek parallel has ἔναντι πολέμου ('in the face of war'), suggesting some
    textual instability or interpretive smoothing; the Hebrew witness remains primary
    here.
- source_word: יחזיק צנה
  chosen: he will take up a shield
  alternatives:
  - he will grasp a shield
  - he will hold fast a shield
  lexicon: HALOT
  rationale: The idiom of 'grasping/holding' a shield naturally means arming oneself.
    'Take up a shield' is idiomatic modern English and fits the martial image.
- source_word: צנה
  chosen: shield
  alternatives:
  - large shield
  - buckler
  lexicon: HALOT
  rationale: צנה denotes a shield, often a large one. 'Shield' is the clearest general
    rendering; 'buckler' is archaic and 'large shield' is unnecessarily specific in
    the main text.
