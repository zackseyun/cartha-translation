translation:
  text: 'For he too will think for himself: “Why should this fall to him?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is terse and somewhat difficult here. The Greek parallel reads, 'Do
      not take counsel with one who looks askance at you, and hide your plan from
      those who are jealous of you,' which supports the sense that the other person
      is calculating from self-interest or ill will.
    reason: alternative_reading
  - marker: b
    text: 'Or ''For he too will think about himself: “Why should this befall him?”''
      The Hebrew wording allows some uncertainty about whether the final pronoun points
      to the counselor himself or to another person.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the surrounding warning; 'for' fits concise
    wisdom-style explanation.
- source_word: גם הוא
  chosen: he too
  alternatives:
  - he also
  - that one too
  lexicon: HALOT
  rationale: Marks the other person as likewise self-interested; 'he too' is natural
    English and preserves the additive force.
- source_word: לנפשך
  chosen: for himself
  alternatives:
  - about himself
  - for your life/soul
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult ('for your soul/life'), but in
    context with the Greek parallel about one who has hostile or jealous intent, the
    sense is reflexive self-interest rather than concern for the addressee. Rendering
    the idiomatically probable sense avoids a misleadingly literal 'for your soul.'
- source_word: יחשב
  chosen: will think
  alternatives:
  - will reckon
  - will consider
  - will devise
  lexicon: HALOT
  rationale: Basic sense is mental calculation or consideration. 'Will think' is clear
    modern English; the context implies calculating from his own interest.
- source_word: למה זה
  chosen: Why should this
  alternatives:
  - Why this?
  - For what reason this
  lexicon: HALOT
  rationale: Represents the interrogative phrase naturally in English while preserving
    the rhetorical question.
- source_word: אליו יפול
  chosen: fall to him
  alternatives:
  - come upon him
  - befall him
  lexicon: HALOT
  rationale: The idiom of something 'falling' to someone can mean coming to one's
    lot or befalling one. 'Fall to him' preserves the metaphor and leaves the exact
    nuance open.
