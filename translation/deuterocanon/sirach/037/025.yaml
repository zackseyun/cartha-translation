translation:
  text: There is a wise man who becomes wise for many, but for himself he is worthless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גוֹאָל is difficult. It may carry the sense of being defiled, tainted,
      or otherwise of no value to oneself; 'worthless' reflects the contrast in context.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek tradition at this point reads a different saying: ''The life
      of a man is by the number of days, but the days of Israel are innumerable.''
      The Hebrew and Greek here do not match closely.'
    reason: textual_variant
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is
  alternatives:
  - There exists
  lexicon: HALOT
  rationale: Existential particle introducing a general observation; 'There is' is
    natural modern English.
- source_word: חָכָם
  chosen: wise man
  alternatives:
  - wise person
  - sage
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and presents a representative
    type. Per project philosophy, gender-accurate 'wise man' is preferred over neutralizing.
    'Sage' is possible but slightly more interpretive.
- source_word: לְרַבִּים
  chosen: for many
  alternatives:
  - to many
  - among many
  lexicon: HALOT
  rationale: 'The preposition ל with רבים here is best taken in a benefactive/reference
    sense: his wisdom extends to many others. ''For many'' captures that broad usefulness
    without over-specifying instruction.'
- source_word: נֶחְכָּם
  chosen: becomes wise
  alternatives:
  - is wise
  - shows himself wise
  - acts wisely
  lexicon: HALOT
  rationale: The nifal form naturally suggests becoming or showing oneself wise. In
    context, it describes one recognized as wise in relation to many. 'Becomes wise'
    preserves the verbal force while remaining idiomatic.
- source_word: וּלְנַפְשׁוֹ
  chosen: but for himself
  alternatives:
  - yet for his own life
  - but to himself
  lexicon: HALOT
  rationale: נפש can mean self, life, or soul. Here the contrast is reflexive and
    practical, not metaphysical, so 'for himself' best fits the proverb's point.
- source_word: גוֹאָל
  chosen: worthless
  alternatives:
  - defiled
  - polluted
  - tainted
  - loathsome
  lexicon: HALOT
  rationale: The Hebrew form is difficult, but in this context it contrasts public
    wisdom with personal failure. 'Worthless' conveys the negative evaluative sense
    in a concise, proverbial way. The Greek parallel for this verse diverges substantially
    and does not control the Hebrew here, but it confirms that the textual tradition
    is unstable enough to warrant noting the lexical uncertainty.
