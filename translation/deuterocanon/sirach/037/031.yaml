theological_decisions:
- issue: Sense of בחיי עולם
  chosen_reading: 'an expression of enduring permanence using life-language: ''for
    everlasting life'''
  alternative_readings:
  - forever
  - for all generations
  - in eternal life
  rationale: The Hebrew can be heard either as an idiom for perpetual duration or
    as language that shades toward eschatological everlasting life. The main text
    preserves the source's life-language without over-defining the theology. This
    avoids flattening the phrase to mere 'forever' while also not forcing a fully
    developed afterlife doctrine into the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
