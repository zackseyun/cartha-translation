translation:
  text: A wise man among his people will inherit honor, and his name will endure for
    all time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his name will stand forever.' The Hebrew literally says 'his name stands
      in the life of eternity,' an expression that may denote enduring remembrance
      and may also carry overtones of everlasting life.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel differs substantially here: ''Through greed many have
      died, but the one who is attentive will add life.'' The main translation follows
      the extant Hebrew witness, with the Greek kept in view as a parallel source.'
    reason: alternative_reading
lexical_decisions:
- source_word: חכם
  chosen: wise man
  alternatives:
  - wise one
  - sage
  lexicon: HALOT
  rationale: The Hebrew adjective/noun denotes a wise person. 'Wise man' preserves
    the masculine singular form and representative force of the Hebrew in keeping
    with the project's gender-accurate policy; 'sage' is possible but sounds more
    interpretive and less direct.
- source_word: עם
  chosen: his people
  alternatives:
  - the people
  - his nation
  lexicon: HALOT
  rationale: 'With the preposition, the phrase is best taken socially/corporately:
    the wise man in relation to his own people/community. ''His people'' reflects
    the likely possessive sense in context and yields natural English.'
- source_word: ינחל
  chosen: will inherit
  alternatives:
  - will obtain
  - will receive as a possession
  lexicon: HALOT
  rationale: The verb נחל commonly means 'inherit' or 'take possession.' 'Will inherit'
    preserves the concrete metaphor of receiving honor as an enduring possession rather
    than merely gaining it.
- source_word: כבוד
  chosen: honor
  alternatives:
  - glory
  - esteem
  lexicon: HALOT
  rationale: In this wisdom context, 'honor' fits social reputation and public esteem
    better than the weightier 'glory,' while remaining faithful to the Hebrew.
- source_word: שמו
  chosen: his name
  lexicon: HALOT
  rationale: A straightforward rendering. In wisdom literature, 'name' often carries
    the sense of reputation or memorial, but the literal expression should be retained
    in English.
- source_word: עומד
  chosen: will endure
  alternatives:
  - stands
  - remains
  lexicon: HALOT
  rationale: Although literally 'stands,' idiomatic English prefers 'will endure'
    for a name/reputation continuing through time. This is supported by the Greek
    parallel's emphasis on life being added/continued, which keeps the sense of ongoing
    duration in view.
- source_word: בחיי עולם
  chosen: for everlasting life
  alternatives:
  - forever
  - throughout eternal life
  - for all time
  lexicon: HALOT
  rationale: Literally the phrase is 'in the life/lives of eternity.' The Hebrew points
    to enduring permanence. 'For everlasting life' preserves the life-language of
    the source more clearly than the flatter 'forever,' though the phrase may also
    idiomatically mean perpetual remembrance.
