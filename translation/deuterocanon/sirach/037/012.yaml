translation:
  text: Do not consult with your father-in-law, and conceal a secret from one who
    is jealous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel preserved in Swete differs substantially here, reading
      instead about keeping company with a godly man whom you know to be keeping the
      commandments. The Hebrew witness behind this translation advises against consulting
      a father-in-law and against revealing a secret to a jealous person.
    reason: textual_variant
lexical_decisions:
- source_word: אל תועץ
  chosen: Do not consult
  alternatives:
  - Do not take counsel
  - Do not advise yourself with
  lexicon: HALOT
  rationale: The negative imperative plus the Hitpael-like/reflexive sense of יעץ
    here is best rendered as a prohibition against seeking counsel. 'Consult' is natural
    modern English and preserves the advisory context.
- source_word: חמיך
  chosen: your father-in-law
  alternatives:
  - your wife's father
  - your in-law
  lexicon: HALOT
  rationale: The Hebrew specifically denotes a father-in-law, not in-laws generally.
    The singular possessive is retained.
- source_word: וממקנא
  chosen: from one who is jealous
  alternatives:
  - from an envious man
  - from a rival
  lexicon: HALOT
  rationale: The preposition מן with מקנא yields 'from one who is jealous/envious.'
    Because the following verb is 'hide,' the sense is to withhold disclosure from
    such a person. 'Jealous' stays close to the Hebrew, though 'envious' is a viable
    nuance.
- source_word: העלים סוד
  chosen: hide a secret
  alternatives:
  - conceal a secret
  - keep a secret hidden
  lexicon: HALOT
  rationale: The idiom means to conceal or withhold a secret. In English, 'hide a
    secret from...' clearly expresses the action and fits the imperative force implied
    by the parallel prohibition.
