translation:
  text: A bad friend looks to the table, but in a time of distress he will stand opposite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'has his eye on the table'—that is, he is present for
      the benefits of fellowship or food.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'stand opposite'; the Greek likewise has 'will be opposite.' This
      may imply standing aloof or even taking an adversarial position in trouble.
    reason: alternative_reading
lexical_decisions:
- source_word: מרע
  chosen: a bad friend
  alternatives:
  - an evil companion
  - a harmful friend
  lexicon: HALOT
  rationale: The Hebrew form denotes one who is bad/harmful in the role of a companion
    or friend. The parallel Greek ἑταῖρος φίλου points to a companion/friend relationship,
    and the verse contrasts false friendliness in prosperity with opposition in trouble.
    'A bad friend' is idiomatic modern English and preserves the moral evaluation.
- source_word: אוהב
  chosen: friend
  alternatives:
  - companion
  - one who loves
  lexicon: HALOT
  rationale: Although literally related to 'loving,' in context with מרע and the Greek
    φίλου it functions substantivally for a friend/associate rather than emphasizing
    affection as an action. Rendering it as 'friend' keeps the social sense clear.
- source_word: מביט אל שלחן
  chosen: looks to the table
  alternatives:
  - has his eye on the table
  - looks toward the table
  lexicon: HALOT
  rationale: The idiom suggests interest in shared feasting or material benefit. A
    more interpretive rendering like 'has his eye on your table' would sharpen the
    implication but goes beyond the explicit wording. 'Looks to the table' preserves
    the image while allowing the reader to infer opportunism.
- source_word: שׁלחן
  chosen: table
  alternatives:
  - meal
  - feast
  lexicon: HALOT
  rationale: The concrete noun is retained. The context implies table fellowship and
    provision, but 'table' best preserves the Hebrew image and aligns with the Greek
    ἐν εὐφροσύνῃ as a consistency check.
- source_word: בעת מצוקה
  chosen: in a time of distress
  alternatives:
  - at a time of trouble
  - in time of affliction
  lexicon: HALOT
  rationale: מצוקה denotes distress, trouble, or straits. 'In a time of distress'
    is natural English and matches the contrast with prosperity/feasting in the first
    colon.
- source_word: מנגד יעמד
  chosen: he will stand opposite
  alternatives:
  - he will stand against you
  - he will stand aloof
  - he will stand facing you
  lexicon: HALOT
  rationale: The Hebrew literally means to stand opposite/in front of. The Greek ἔσται
    ἀπέναντι confirms the sense of being opposite rather than supportive. 'Stand opposite'
    preserves the ambiguity between mere non-support and active opposition; a stronger
    gloss like 'stand against you' is possible but more interpretive.
