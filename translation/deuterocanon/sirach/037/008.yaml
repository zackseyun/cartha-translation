translation:
  text: Every counselor says, “See!” but there is a counselor who trips him up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'See!' is difficult and may reflect a terse claim of insight or direction.
      The Greek parallel has a fuller warning about protecting yourself from a counselor,
      since he also counsels for himself.
    reason: alternative_reading
  - marker: b
    text: Or 'who takes advantage of him.' The Hebrew literally says 'treads on him,'
      likely expressing harmful or self-serving counsel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: 'The distributive sense fits the proverb-like statement: each counselor
    tends to offer his own view.'
- source_word: יועץ
  chosen: counselor
  alternatives:
  - advisor
  - one who gives counsel
  lexicon: HALOT
  rationale: '''Counselor'' is the most natural English equivalent in wisdom literature
    and preserves the repeated noun across the verse.'
- source_word: אומר
  chosen: says
  alternatives:
  - declares
  lexicon: HALOT
  rationale: Simple present suits the gnomic force of the Hebrew.
- source_word: חזה
  chosen: See!
  alternatives:
  - Look!
  - I have seen
  - Have a vision
  lexicon: HALOT
  rationale: The Hebrew form is terse and somewhat uncertain in this line. In context
    it appears to represent the counselor's confident directive or claim of insight.
    'See!' preserves the abruptness of the Hebrew while acknowledging the difficulty.
    The Greek parallel reflects a substantially different wording, indicating textual
    instability.
- source_word: אך
  chosen: but
  alternatives:
  - however
  - yet
  lexicon: HALOT
  rationale: Marks the adversative turn between the general statement and the warning
    about a self-interested counselor.
- source_word: דורך
  chosen: treads on
  alternatives:
  - tramples
  - steps over
  - takes advantage of
  lexicon: HALOT
  rationale: The Hebrew participle from דרך literally suggests stepping/treading.
    Because the object is a person ('him'), the idiomatic sense may be exploitative;
    however, the literal image is retained in the main text for transparency.
- source_word: עליו
  chosen: on him
  alternatives:
  - against him
  - over him
  - upon him
  lexicon: HALOT
  rationale: '''On him'' is the most direct rendering of the prepositional phrase,
    though the sense may be hostile or exploitative.'
