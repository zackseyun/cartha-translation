theological_decisions:
- issue: Use of Hebrew Cairo Geniza text versus Greek parallel where the Hebrew is
    difficult
  chosen_reading: Main text follows the extant Hebrew, with the Greek used to confirm
    that the verse warns against self-interested counsel rather than neutral advice.
  alternative_readings:
  - 'A smoother rendering based more heavily on the Greek: ''Guard yourself from a
    counselor ... for he will also counsel for himself'''
  rationale: Per project philosophy, the surviving Hebrew has primacy for Sirach where
    extant. Here the Hebrew is concise and somewhat opaque, while the Greek preserves
    a fuller warning. The translation keeps the Hebrew wording in the main text and
    documents the Greek-based alternative in a footnote rather than replacing the
    Hebrew sense wholesale.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is primary where it survives;
    preserve ambiguity rather than resolve it'
