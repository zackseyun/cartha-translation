translation:
  text: The root of the plans of the heart—four branches will flourish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The surviving Hebrew here is difficult and differs sharply from the Greek.
      The main text follows the clearer Greek witness: ''A wise man instructs his
      own people, and the fruits of his understanding are trustworthy.'''
    reason: textual_variant
  - marker: b
    text: Hebrew witness literally preserves an obscure phrase, approximately 'the
      uprooting/crown of the schemes of the heart; four shoulders(?) will blossom,'
      but the wording is uncertain and likely corrupt or poorly preserved.
    reason: alternative_reading
lexical_decisions:
- source_word: עקרת תחבולות לבב
  chosen: '[not followed in main text]'
  alternatives:
  - uprooting/crown of the schemes of the heart
  - main support for a difficult Hebrew reading
  lexicon: HALOT
  rationale: The extant Hebrew in Kahana is highly obscure here and does not yield
    a confident, natural sense in context. Because the parallel Greek witness is clear
    and the prompt directs that the Greek be used as actual translation input alongside
    the Hebrew, the main translation follows the Greek sense rather than forcing an
    uncertain rendering from the difficult Hebrew phrase.
- source_word: ἀνὴρ σοφός
  chosen: a wise man
  alternatives:
  - a wise person
  - a wise one
  lexicon: BDAG
  rationale: The Greek explicitly uses the masculine singular 'man.' Per project philosophy,
    gender-accurate rendering is preferred over flattening to gender-neutral language
    when the source is masculine with representative force.
- source_word: τὸν ἑαυτοῦ λαόν
  chosen: his own people
  alternatives:
  - his people
  - his own nation
  lexicon: BDAG
  rationale: λαός commonly means 'people.' 'His own people' preserves ἑαυτοῦ and reads
    naturally in English without overstating ethnic or national nuance.
- source_word: παιδεύσει
  chosen: instructs
  alternatives:
  - will instruct
  - disciplines
  - trains
  lexicon: BDAG
  rationale: Although the Greek form is future, English wisdom-style sayings often
    use the present gnomic sense naturally. 'Instructs' fits the educational context
    better than the harsher 'disciplines,' while still reflecting παιδεύω.
- source_word: οἱ καρποὶ
  chosen: the fruits
  alternatives:
  - the fruit
  - the results
  lexicon: BDAG
  rationale: The plural is explicit in Greek. 'Fruits' preserves the metaphor and
    avoids flattening to an abstract paraphrase like 'results.'
- source_word: τῆς συνέσεως αὐτοῦ
  chosen: of his understanding
  alternatives:
  - of his insight
  - of his discernment
  lexicon: BDAG
  rationale: σύνεσις denotes understanding or insight. 'Understanding' is clear, idiomatic,
    and suitably broad for wisdom literature.
- source_word: πιστοί
  chosen: trustworthy
  alternatives:
  - faithful
  - reliable
  - sure
  lexicon: BDAG
  rationale: In this context the predicate describes the dependable quality of the
    wise man's outcomes. 'Trustworthy' communicates that sense in modern English better
    than the more relational 'faithful.'
