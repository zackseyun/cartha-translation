translation:
  text: Is there not grief that reaches to death, when a companion and friend turns
    into an enemy?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a companion like your own soul'; the Greek parallel has
      'a companion and friend.' The main text reflects the shared sense of intimate
      friendship.
    reason: lexical_alternative
lexical_decisions:
- source_word: הלא
  chosen: Is there not
  alternatives:
  - Is there not indeed
  - Surely there is
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. The Greek οὐχί
    confirms the interrogative force rather than a flat assertion.
- source_word: דין
  chosen: grief
  alternatives:
  - sorrow
  - pain
  - judgment
  lexicon: HALOT
  rationale: In context with מגיע אל מות ('reaches to death') and supported by Greek
    λύπη, the sense is emotional distress, not legal 'judgment.' 'Grief' fits idiomatic
    English and the lament context.
- source_word: מגיע אל מות
  chosen: reaches to death
  alternatives:
  - extends to death
  - goes as far as death
  - unto death
  lexicon: HALOT
  rationale: Keeps the Hebrew image of something arriving up to the point of death.
    The Greek ἕως θανάτου supports the extent/intensity sense. 'Reaches to death'
    is natural while remaining close to the source.
- source_word: רע
  chosen: companion
  alternatives:
  - associate
  - neighbor
  - friend
  lexicon: HALOT
  rationale: Here רע is relational and paired with כנפשך ('as your own soul/self')
    and with the Greek ἑταῖρος. 'Companion' preserves closeness without collapsing
    the next relational term.
- source_word: כנפשך
  chosen: and friend
  alternatives:
  - like yourself
  - as your own soul
  - your intimate friend
  lexicon: HALOT
  rationale: The Hebrew literally means 'like your own soul/self,' an idiom for deep
    personal closeness. Since the Greek parallel reads καὶ φίλος ('and friend'), rendering
    the pair as 'a companion and friend' communicates the idiomatic force in readable
    English. The more literal nuance is preserved in a footnote.
- source_word: נהפך לצר
  chosen: turns into an enemy
  alternatives:
  - is changed into an adversary
  - becomes hostile
  - turns to enmity
  lexicon: HALOT
  rationale: Captures the reversal implied by נהפך and the personal hostility of צר.
    The Greek τρεπόμενος εἰς ἔχθραν likewise emphasizes a change into enmity.
