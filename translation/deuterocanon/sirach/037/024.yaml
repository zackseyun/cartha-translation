lexical_decisions:
- source_word: טוב
  chosen: good
  alternatives:
  - prosperity
  - well-being
  lexicon: HALOT
  rationale: The plain antonymic pairing with רעה favors the broad moral/experiential
    sense 'good' rather than a narrower material sense such as 'prosperity.'
- source_word: רעה
  chosen: evil
  alternatives:
  - harm
  - misfortune
  - calamity
  lexicon: HALOT
  rationale: In the fixed contrast טוב ורעה, 'evil' best preserves the stark polarity
    of the Hebrew. 'Harm' or 'misfortune' are possible in wisdom contexts, but the
    verse's parallel with life and death supports a comprehensive contrast rather
    than a merely circumstantial one.
- source_word: חיים
  chosen: life
  lexicon: HALOT
  rationale: Standard rendering; paired with מות in a conventional merism.
- source_word: מות
  chosen: death
  lexicon: HALOT
  rationale: Standard rendering; the pair 'life and death' is idiomatic and should
    remain direct in English.
- source_word: ומושלת
  chosen: rules
  alternatives:
  - has dominion
  - governs
  - prevails
  lexicon: HALOT
  rationale: From משל in the sense of exercising rule or dominion. 'Rules' is concise,
    natural English and preserves the force of control without sounding archaic.
- source_word: בם כליל
  chosen: over them all
  alternatives:
  - over all of them
  - entirely over them
  lexicon: HALOT
  rationale: The phrase indicates comprehensive scope. Rendering it as 'over them
    all' communicates that the tongue's sway extends across the whole set named in
    the verse.
- source_word: לשון
  chosen: the tongue
  alternatives:
  - speech
  - the spoken word
  lexicon: HALOT
  rationale: The Hebrew concrete noun is retained metaphorically in English, as in
    biblical wisdom literature where 'tongue' stands for speech and its power. This
    also aligns with the verse's aphoristic style.
