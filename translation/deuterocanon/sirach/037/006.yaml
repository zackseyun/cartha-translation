translation:
  text: Do not forget a friend in your heart, and do not neglect him when you have
    wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew text is difficult in the second line; the Greek parallel reads, 'and
      do not be unmindful of him in your possessions,' which supports the sense 'do
      not neglect him when you have wealth.'
    reason: textual_variant
  - marker: b
    text: Or 'do not forsake him in your prosperity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אל תשכח
  chosen: Do not forget
  alternatives:
  - Do not be forgetful of
  - Do not fail to remember
  lexicon: HALOT
  rationale: The Hebrew imperative with negation is straightforwardly prohibitive.
    'Do not forget' is natural modern English and matches the Greek μὴ ἐπιλάθῃ.
- source_word: חבר
  chosen: a friend
  alternatives:
  - a companion
  - an associate
  lexicon: HALOT
  rationale: The noun denotes a friend/companion. 'Friend' best fits the relational
    and ethical context, and aligns with Greek φίλου.
- source_word: בקרב
  chosen: in your heart
  alternatives:
  - within you
  - in your inner being
  lexicon: HALOT
  rationale: The Hebrew literally means 'in the midst/interior,' but the Greek parallel
    reads ἐν τῇ ψυχῇ σου ('in your soul'). Given the source mismatch note and the
    Greek as actual translation input, 'in your heart' captures the inward sense idiomatically
    in English without over-literal awkwardness.
- source_word: ואל תעזבהן
  chosen: and do not neglect him
  alternatives:
  - and do not forsake him
  - and do not abandon him
  lexicon: HALOT
  rationale: The Hebrew form as transmitted is difficult because the suffix appears
    plural/feminine, while the sense and Greek αὐτοῦ point to a singular masculine
    object referring to the friend. 'Neglect him' reflects the ethical force in context
    and corresponds well to Greek μὴ ἀμνημονήσῃς αὐτοῦ ('do not be unmindful of him'),
    while honestly smoothing an evidently unstable Hebrew form.
- source_word: בשללך
  chosen: when you have wealth
  alternatives:
  - in your prosperity
  - amid your possessions
  - with your goods
  lexicon: HALOT
  rationale: The Hebrew reading is uncertain in this composite Geniza edition, and
    the Greek has ἐν χρήμασίν σου ('in your possessions/wealth'). 'When you have wealth'
    expresses the situational sense clearly in modern English and avoids overcommitting
    to a problematic Hebrew form.
