lexical_decisions:
- source_word: כל אוהב
  chosen: Every friend
  alternatives:
  - Every lover
  - Everyone who loves
  lexicon: HALOT
  rationale: The Hebrew אוהב can mean 'one who loves' or 'friend.' The Greek parallel
    has Πᾶς φίλος ('every friend'), which strongly supports taking the Hebrew here
    in the social sense 'friend' rather than the broader verbal sense. This also fits
    the proverb's contrast between professed and merely nominal friendship.
- source_word: אומר
  chosen: says
  alternatives:
  - declares
  - claims
  lexicon: HALOT
  rationale: A straightforward speech verb. 'Says' preserves the simple proverbial
    style without over-interpreting the force as boastful or formal.
- source_word: אהבתי
  chosen: I love
  alternatives:
  - I have loved
  - I am devoted to
  lexicon: HALOT
  rationale: The perfect form can be rendered idiomatically in English present speech
    as 'I love.' In direct quotation this sounds natural and matches the Greek Ἐφίλιασα
    in sense without forcing an English present perfect.
- source_word: אך
  chosen: but
  alternatives:
  - however
  - yet
  lexicon: HALOT
  rationale: Marks the adversative turn between verbal profession and reality. 'But'
    is the most natural concise English equivalent.
- source_word: יש
  chosen: there is
  alternatives:
  - there exists
  lexicon: HALOT
  rationale: Existential particle best rendered simply in English.
- source_word: אהב שם אהב
  chosen: a friend who is a friend in name only
  alternatives:
  - a friend only by name
  - a so-called friend
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed and the Greek parallel clarifies the
    sense with ὀνόματι μόνον φίλος, 'a friend only in name.' The chosen rendering
    makes the idiom explicit in readable English while staying close to the source
    contrast.
