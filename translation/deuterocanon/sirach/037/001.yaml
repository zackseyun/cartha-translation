translation:
  text: Every friend says, “I love him,” but there is a friend who is a friend in
    name only.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a compressed expression, literally something like 'a friend,
      there—a friend by name'; the Greek parallel clarifies the sense as 'a friend
      only in name.'
