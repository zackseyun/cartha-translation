translation:
  text: The beginning of every deed is a word, and the beginning of every work is
    a thought.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness here reads a different saying: ''There is one who is
      wise for his own soul, and the fruits of his understanding are trustworthy on
      his mouth.'''
    reason: alternative_reading
  - marker: b
    text: Or 'matter/thing' for 'word' (Hebrew dabar); the Hebrew term can carry either
      sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'plan' for 'thought' (Hebrew machashevet).
    reason: lexical_alternative
lexical_decisions:
- source_word: ראש
  chosen: the beginning of
  alternatives:
  - head of
  - chief of
  - first of
  lexicon: HALOT
  rationale: In this aphoristic context, ראש introduces what comes first or stands
    at the start. 'The beginning of' fits both cola naturally in English and preserves
    the Hebrew parallelism better than the more literal but less idiomatic 'head of.'
- source_word: כל
  chosen: every
  alternatives:
  - all
  - each
  lexicon: HALOT
  rationale: The distributive sense is best conveyed by 'every' in both clauses, matching
    the proverb-like generalization.
- source_word: מעשה
  chosen: deed
  alternatives:
  - act
  - action
  - work
  lexicon: HALOT
  rationale: Because the second colon already uses פועל, rendering מעשה as 'deed'
    helps preserve the distinction between the two near-synonyms while keeping both
    within the semantic field of human action.
- source_word: דבר
  chosen: a word
  alternatives:
  - speech
  - matter
  - thing
  lexicon: HALOT
  rationale: 'The Hebrew דבר can mean ''word'' or ''thing/matter.'' Here ''a word''
    best fits the antithesis with ''thought'' in the second colon: outward expression
    precedes action, while inward reflection stands at the head of work. The Greek
    parallel for this verse diverges substantially and does not control the Hebrew
    wording here.'
- source_word: פועל
  chosen: work
  alternatives:
  - labor
  - deed
  - activity
  lexicon: HALOT
  rationale: '''Work'' is a natural rendering and maintains a slight distinction from
    מעשה (''deed''). The pair ''deed/work'' reflects the Hebrew''s near-parallel without
    collapsing it into identical English terms.'
- source_word: היא
  chosen: is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: The feminine pronoun agrees with מחשבת and functions as a simple copula
    in English. Explicitly rendering it as 'is' yields clear, idiomatic English.
- source_word: מחשבת
  chosen: thought
  alternatives:
  - plan
  - purpose
  - reflection
  lexicon: HALOT
  rationale: מחשבת can denote thought, intention, or plan. 'Thought' preserves the
    broad sense and keeps the proverb concise. 'Plan' would narrow the meaning too
    much, though it remains a viable interpretive alternative.
