theological_decisions:
- issue: Divergence between the extant Hebrew and the Greek parallel
  chosen_reading: Translate the Hebrew as the primary witness, while noting the Greek
    preserves a substantially different sentence.
  alternative_readings:
  - 'Greek: ''There is one who is wise for his own soul, and the fruits of his understanding
    are trustworthy on his mouth.'''
  rationale: For Sirach, where Hebrew survives, project policy gives primacy to the
    Hebrew witness. Here the Greek parallel is not a close verbal equivalent but a
    different saying, so it cannot simply be harmonized into the main text. The English
    draft therefore follows the Hebrew, with the Greek divergence preserved in a footnote
    for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input while keeping Hebrew primacy.'
