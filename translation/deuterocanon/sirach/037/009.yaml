translation:
  text: Guard yourself from a counselor, and know beforehand what his need is.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''what his interest is''—the Hebrew can refer not only to need in a
      strict sense but also to what concerns or motivates him. The Greek parallel
      expands the thought differently: ''and he will stand opposite to see what will
      happen to you.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מיועץ
  chosen: from a counselor
  alternatives:
  - from an adviser
  - against a counselor
  lexicon: HALOT
  rationale: The preposition מן with יועץ yields 'from a counselor' in the sense of
    guarding oneself against or being wary of such a person. 'Counselor' preserves
    the noun's advisory role more directly than 'adviser,' while the English verb
    'guard yourself' carries the cautionary force.
- source_word: שמור נפשך
  chosen: Guard yourself
  alternatives:
  - watch yourself
  - protect your life
  lexicon: HALOT
  rationale: Literally 'guard your soul/life.' In idiomatic English, 'guard yourself'
    best conveys the reflexive warning without over-literal awkwardness. 'Protect
    your life' is too narrow, since נפש here refers to the person/self, not merely
    physical survival.
- source_word: ודע לפנים
  chosen: and know beforehand
  alternatives:
  - and know in advance
  - and know first
  lexicon: HALOT
  rationale: לפנים here functions adverbially as 'beforehand/in advance.' 'Know beforehand'
    is natural English and preserves the temporal sense of prudent prior discernment.
- source_word: מה צרכו
  chosen: what his need is
  alternatives:
  - what he wants
  - what his interest is
  - what he requires
  lexicon: HALOT
  rationale: צרך denotes need, requirement, or interest. In context of evaluating
    a counselor's motives, 'what his need is' stays close to the Hebrew while allowing
    the implied sense of personal interest. The Greek parallel points toward concern
    for what may happen to the addressee, but the Hebrew wording is better represented
    by 'need' rather than a more interpretive 'interest' in the main text.
