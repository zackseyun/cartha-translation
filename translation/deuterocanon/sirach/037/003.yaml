translation:
  text: Alas for an evil companion! Why were you created, to fill the face of the
    world with deceit?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Alas for an evil thought, from where did you roll in,
      to cover the dry land with deceit?'' The Greek supports understanding the difficult
      Hebrew term as ''thought/device'' and has ''cover'' where the Hebrew reads ''fill.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הוי
  chosen: Alas
  alternatives:
  - Woe
  - Ah
  lexicon: HALOT
  rationale: An exclamatory lament/interjection. 'Alas' fits the denunciatory yet
    reflective tone better than the harsher 'Woe' in this wisdom context.
- source_word: רע
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: HALOT
  rationale: The Hebrew adjective denotes moral evil here, confirmed by the Greek
    πονηρόν. 'Evil' is the most direct and weighty rendering.
- source_word: יאמר
  chosen: thought
  alternatives:
  - utterance
  - saying
  lexicon: HALOT
  rationale: The Hebrew consonantal reading as transmitted is difficult if taken from
    אמר ('say'). The Greek parallel has ἐνθύμημα, 'thought/device,' which strongly
    supports understanding the line as addressing an evil thought or scheme rather
    than a spoken saying. This uses the Greek as an actual translation control where
    the Hebrew is likely corrupt or graphically confused.
- source_word: מדוע כן נוצרתי
  chosen: why were you created
  alternatives:
  - why were you formed thus
  - why have you come into being like this
  lexicon: HALOT
  rationale: A direct rhetorical question addressed to the evil thought/device. Passive
    'were you created' reflects נוצרתי as transmitted, while keeping the personified
    address.
- source_word: למלא
  chosen: to fill
  alternatives:
  - to cover
  lexicon: HALOT
  rationale: The Hebrew infinitive plainly means 'to fill.' The Greek parallel reads
    καλύψαι ('to cover'), which may reflect a different Vorlage or interpretive rendering.
    Because the Hebrew witness is high-confidence here, 'to fill' is retained in the
    main text, with the Greek nuance preserved in a footnote.
- source_word: פני תבל
  chosen: the face of the world
  alternatives:
  - the world
  - the inhabited world
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom and imagery. 'World'
    is smoother than 'inhabited earth' in modern English while still matching תבל.
- source_word: תרמית
  chosen: deceit
  alternatives:
  - treachery
  - fraud
  lexicon: HALOT
  rationale: The noun denotes deception or deceitfulness. 'Deceit' is concise and
    idiomatic, and aligns with the Greek ἐν δολιότητι.
