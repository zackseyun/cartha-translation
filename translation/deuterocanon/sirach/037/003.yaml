theological_decisions:
- issue: Use of Hebrew as primary witness with Greek parallel informing a difficult
    word
  chosen_reading: Address to an 'evil thought' rather than an 'evil saying/friend'
  alternative_readings:
  - Alas for an evil saying
  - Alas, evil companion/friend
  rationale: The Hebrew text as printed is awkward at יאמר if read straightforwardly.
    The Greek parallel explicitly reads 'evil thought/device' (πον ηρὸν ἐνθύμημα),
    which makes coherent sense of the personified denunciation. Since the project
    philosophy gives primacy to the most original witness available but requires the
    Greek parallel to be used as actual input, the main text follows the Hebrew line
    while allowing the Greek to clarify the likely sense of the difficult term.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    use Greek parallel as actual translation input'
