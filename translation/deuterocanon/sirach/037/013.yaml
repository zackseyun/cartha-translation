translation:
  text: Consult with a woman about her rival, and with a coward about war;[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew witness here is difficult and differs sharply from the Greek,
      which reads approximately: ''one who is in his soul according to your soul,
      and if you stumble, he will suffer with you''—that is, a kindred friend who
      shares your pain. The Hebrew term rendered ''coward'' is uncertain; alternatives
      such as ''rebel'' or ''deserter'' have been proposed.'
    reason: textual_variant
lexical_decisions:
- source_word: עִם
  chosen: with / consult with
  alternatives:
  - with
  - from
  lexicon: HALOT
  rationale: The preposition introduces the person from whom counsel is sought in
    this string of warnings about unsuitable advisers. English 'consult with' makes
    the implied advisory context explicit without over-paraphrasing.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - wife
  - woman
  lexicon: HALOT
  rationale: The Hebrew is the common noun 'woman/wife' without possessive marking.
    'A woman' is the least interpretively loaded rendering. A more specific relational
    sense is possible only by inference from context.
- source_word: צָרָהּ
  chosen: her rival
  alternatives:
  - her co-wife
  - her adversary
  - her distress
  lexicon: HALOT
  rationale: Given the parallel Greek and the advisory context, the sense is a female
    rival/competitor rather than 'distress.' In Hebrew usage the noun can denote a
    rival wife or female adversary. 'Her rival' preserves the broad sense without
    forcing the narrower 'co-wife.'
- source_word: מָרֵד
  chosen: a coward
  alternatives:
  - a rebel
  - one who shrinks back
  - a deserter
  lexicon: HALOT
  rationale: The Hebrew reading is difficult and the verse is marked by source mismatch.
    The Greek parallel points to an intimate/sympathetic friend rather than this Hebrew
    phrase, suggesting corruption or divergence in the Hebrew tradition. Within the
    extant Hebrew line, rendering the term as someone unreliable in battle best fits
    the immediate collocation with 'his warfare.' 'Coward' communicates that sense
    in readable English while acknowledging uncertainty in a footnote.
- source_word: מִלְחַמְתּוֹ
  chosen: his warfare
  alternatives:
  - his battle
  - war
  lexicon: HALOT
  rationale: The noun denotes warfare/battle. 'His warfare' keeps the possessive force
    and the concrete military sense, though idiomatic English could also use 'battle.'
