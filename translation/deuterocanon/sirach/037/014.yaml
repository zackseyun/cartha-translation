translation:
  text: Do not bargain with a merchant, nor over buying and selling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek parallel reads, 'And establish the counsel of your heart, for there
      is none more faithful to you than it.' The surviving Hebrew here differs substantially
      from the Greek tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: עם
  chosen: with
  alternatives:
  - against
  - in company with
  lexicon: HALOT
  rationale: 'Preposition marking association in the prohibition: the warning concerns
    engaging with a certain kind of person in negotiation.'
- source_word: סוחר
  chosen: merchant
  alternatives:
  - trader
  - dealer
  lexicon: HALOT
  rationale: '''Merchant'' best fits a person professionally engaged in trade. ''Trader''
    is possible, but ''merchant'' sounds more natural and stable in English wisdom-style
    instruction.'
- source_word: אל תתגר
  chosen: do not bargain
  alternatives:
  - do not contend
  - do not provoke yourself
  - do not engage in trade
  lexicon: HALOT
  rationale: In context with 'merchant' and the following commercial phrase, the verb
    most plausibly refers to entering into bargaining or haggling. A more general
    'contend' is possible, but the commercial setting narrows the sense.
- source_word: ממקנה
  chosen: about a purchase
  alternatives:
  - from an acquisition
  - concerning buying
  - over merchandise acquired
  lexicon: HALOT
  rationale: The noun derives from acquisition/purchase. Rendering it as 'purchase'
    keeps the commercial parallel with 'sale' and yields intelligible English.
- source_word: ממכר
  chosen: sale
  alternatives:
  - merchandise
  - that which is sold
  - selling
  lexicon: HALOT
  rationale: 'The paired commercial terms are best rendered as transaction language:
    ''purchase'' and ''sale.'' This preserves the Hebrew contrast and matches the
    verse''s practical wisdom tone.'
- source_word: ו־
  chosen: nor
  alternatives:
  - and
  - and do not
  lexicon: HALOT
  rationale: Given the two parallel prohibitions, 'nor' conveys the continuing negative
    force smoothly in English.
- source_word: καὶ βουλὴν καρδίας στήσον
  chosen: kept in view as a divergent Greek parallel, not followed in the main text
  alternatives:
  - and establish the counsel of your heart
  lexicon: BDAG
  rationale: The Greek parallel in Swete differs substantially from the extant Hebrew
    and appears to reflect a different line of transmission. Because Hebrew survives
    for this verse, the main translation follows the Hebrew witness, while the Greek
    is preserved in a footnote as a significant alternative.
