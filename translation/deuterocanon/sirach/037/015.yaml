translation:
  text: With an evil man, do not repay kindness, nor with a cruel man for the good
    of the flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The surviving Cairo Geniza Hebrew for this verse is badly mismatched here
      and reads roughly, 'With an evil man over the repayment of kindness, and a cruel
      one over the good of flesh.' Because that wording is contextually incoherent,
      the main text follows the Greek parallel, which gives the sense of praying to
      the Most High for guidance.
    reason: textual_variant
lexical_decisions:
- source_word: עם
  chosen: And more than all this
  alternatives:
  - with
  - besides this
  - in addition
  lexicon: HALOT
  rationale: The Hebrew as transmitted in Kahana ('עם איש רע...') is severely mismatched
    to the Greek parallel and does not yield the expected sense for this verse in
    context. The Greek continuation formula corresponding to the surrounding admonitions
    is best represented idiomatically as an additive transition, 'and more than all
    this.' This honestly reflects reliance on the Greek parallel where the Hebrew
    witness appears corrupt for this verse.
- source_word: איש רע
  chosen: pray
  alternatives:
  - evil man
  - bad man
  lexicon: HALOT
  rationale: The extant Hebrew wording 'with an evil man' does not cohere with the
    Greek parallel or the immediate context and is judged corrupt/misaligned here.
    The main translation therefore follows the Greek sense of exhortation to prayer
    rather than forcing a nonsensical rendering from the damaged Hebrew witness.
- source_word: על תגמול חסד
  chosen: to the Most High
  alternatives:
  - for the repayment of kindness
  lexicon: HALOT
  rationale: This Hebrew phrase belongs to the mismatched reading and does not align
    with the Greek verse. The translation uses the Greek referent 'the Most High'
    as the intelligible source-based reading for this verse.
- source_word: ואכזרי על טוב בשר
  chosen: that he may direct your way in truth
  alternatives:
  - and a cruel one over the good of flesh
  lexicon: HALOT
  rationale: The Hebrew line as preserved is not translatable into the contextual
    sense expected here and appears to belong to another textual state or to be corrupt.
    The Greek parallel supplies a coherent petition about God directing one's path
    in truth, which fits the surrounding counsel material.
- source_word: ὕψιστος
  chosen: the Most High
  alternatives:
  - God Most High
  lexicon: BDAG
  rationale: Standard rendering for the divine title in Jewish wisdom literature;
    preserves the reverential title without overexpansion.
- source_word: κατευθύνω
  chosen: direct
  alternatives:
  - make straight
  - guide
  lexicon: BDAG
  rationale: '''Direct'' balances formal fidelity with natural English and preserves
    the sense of ordering one''s course.'
- source_word: ὁδός
  chosen: way
  alternatives:
  - path
  - course
  lexicon: BDAG
  rationale: '''Way'' is the most idiomatic biblical-wisdom term and retains moral
    as well as practical nuance.'
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - faithfulness
  - uprightness
  lexicon: BDAG
  rationale: '''Truth'' is the straightforward rendering and suits the prayer that
    one''s way be directed in accordance with what is true/right.'
