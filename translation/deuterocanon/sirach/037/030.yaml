translation:
  text: A wise man for himself will be filled with delight, and all who see him will
    call him happy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'all who see him'; the transmitted form appears orthographically
      irregular in the final word, but the sense is clear from the context.
    reason: textual_variant
  - marker: b
    text: 'Greek has a substantially different line here: ''For in many foods there
      will be pain, and greed will come near to cholera/bilious sickness.'' The Hebrew
      witness preserved in the Cairo Geniza is followed for the main text as the primary
      source where extant.'
    reason: alternative_reading
lexical_decisions:
- source_word: חכם
  chosen: wise man
  alternatives:
  - wise person
  - the wise
  lexicon: HALOT
  rationale: The Hebrew adjective/noun denotes a wise person; the masculine singular
    form is preserved as 'wise man' in keeping with the project's gender-accurate
    policy, while still functioning proverbially.
- source_word: לנפשו
  chosen: for himself
  alternatives:
  - for his own soul
  - in himself
  lexicon: HALOT
  rationale: Literally 'for his soul/self.' In Hebrew נפש often refers to the self
    or person, not only the immaterial soul. 'For himself' gives natural English while
    preserving the reflexive sense.
- source_word: ישבע
  chosen: will be filled
  alternatives:
  - will be satisfied
  - will have his fill
  lexicon: HALOT
  rationale: The verb שבע commonly means 'be sated/satisfied.' 'Will be filled' fits
    the idiom with 'delight' and avoids over-literal food imagery in the Hebrew line,
    while remaining compatible with the Greek parallel's concern with appetite and
    excess in the surrounding context.
- source_word: תענוג
  chosen: delight
  alternatives:
  - pleasure
  - enjoyment
  lexicon: HALOT
  rationale: The noun denotes pleasure or delight. 'Delight' is concise and suitably
    elevated without sounding archaic.
- source_word: ויאשרוהו
  chosen: will call him happy
  alternatives:
  - will bless him
  - will pronounce him fortunate
  lexicon: HALOT
  rationale: From אשר in the sense 'declare happy/fortunate' rather than covenantal
    blessing. 'Call him happy' is idiomatic English and reflects the public recognition
    implied by the verb.
- source_word: כל רואינו
  chosen: all who see him
  alternatives:
  - all his onlookers
  - everyone who sees him
  lexicon: HALOT
  rationale: The consonantal text as given appears to reflect 'all who see him,' likely
    with an orthographic irregularity in the suffix. This sense fits the parallelism
    and yields coherent Hebrew. 'All who see him' is the most natural English rendering.
