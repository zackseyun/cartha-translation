theological_decisions:
- issue: Use of Hebrew over divergent Greek parallel
  chosen_reading: Translate from the extant Hebrew witness for this verse, while noting
    that the Greek parallel in Swete reflects a substantially different text about
    divinations and dreams.
  alternative_readings:
  - 'Greek parallel: ''Divinations and omens and dreams are vain, and the heart imagines
    like that of a woman in labor.'''
  rationale: Per project philosophy, surviving Hebrew Sirach is primary where available.
    However, the source is flagged 'major_mismatch,' and the Greek is not a minor
    variant but a different saying entirely, so the divergence must be documented
    rather than harmonized away.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is translated from Hebrew where
