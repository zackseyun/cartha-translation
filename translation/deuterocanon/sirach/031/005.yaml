translation:
  text: One who eagerly pursues gain will not go unpunished, and one who loves profit
    will go astray by it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The surviving Hebrew reads a saying about pursuing gain and loving profit.
      The Greek parallel at this verse instead reads: ''Divinations and omens and
      dreams are vain, and the heart imagines like that of a woman in labor.'' This
      appears to reflect a substantially different textual tradition.'
    reason: textual_variant
  - marker: b
    text: Or 'gold/wealth' for 'gain' in the first line; the Hebrew term may denote
      material wealth more specifically.
    reason: lexical_alternative
  - marker: c
    text: Or 'price/payment' for 'profit' in the second line.
    reason: lexical_alternative
lexical_decisions:
- source_word: רודף
  chosen: pursues
  alternatives:
  - chases
  - runs after
  lexicon: HALOT
  rationale: The participle denotes active, ongoing pursuit. 'Pursues' is idiomatic
    and preserves the moral sense of deliberate chasing after something.
- source_word: חרוץ
  chosen: gain
  alternatives:
  - gold
  - wealth
  - money
  lexicon: HALOT
  rationale: In this context the noun most plausibly refers to material gain/wealth
    rather than literal gold. The parallel with מחיר ('profit/price') supports a broader
    economic sense rather than a specific metal.
- source_word: לא ינקה
  chosen: will not go unpunished
  alternatives:
  - will not be innocent
  - will not be acquitted
  lexicon: HALOT
  rationale: The idiom commonly means escaping punishment or being held guiltless.
    In wisdom context, 'will not go unpunished' communicates the consequence clearly
    in modern English.
- source_word: אוהב
  chosen: one who loves
  alternatives:
  - the lover of
  - whoever loves
  lexicon: HALOT
  rationale: A participial substantive is best rendered generically as 'one who loves,'
    matching the parallel structure with the first colon.
- source_word: מחיר
  chosen: profit
  alternatives:
  - gain
  - price
  - payment
  lexicon: HALOT
  rationale: Although מחיר can mean 'price' or 'payment,' here the wisdom saying targets
    attachment to financial advantage. 'Profit' fits the economic-moral sense and
    differentiates it slightly from חרוץ while preserving the parallelism.
- source_word: בו
  chosen: by it
  alternatives:
  - in it
  - through it
  lexicon: HALOT
  rationale: 'The preposition with pronominal suffix is taken instrumentally/causally:
    the loved profit becomes the means or cause of straying. ''By it'' is concise
    and natural.'
- source_word: ישגה
  chosen: will go astray
  alternatives:
  - will err
  - will be led astray
  lexicon: HALOT
  rationale: The verb conveys wandering into error. 'Will go astray' preserves both
    moral and practical deviation without overinterpreting agency.
