translation:
  text: '[And if they press you to eat, leave the banquet,] and you will find rest.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The surviving Hebrew reads, '[And if they press you to eat, leave the banquet,]
      and you will find rest.' The Greek parallel supplied here instead reads, 'and
      he who deprives a hired worker of wages is one who pours out blood,' indicating
      a major textual mismatch or different verse alignment.
    reason: textual_variant
lexical_decisions:
- source_word: ואם
  chosen: And if
  alternatives:
  - If
  lexicon: HALOT
  rationale: Standard conditional conjunction with prefixed waw; rendered naturally
    as the start of a conditional clause.
- source_word: יפצירו
  chosen: they press
  alternatives:
  - they urge
  - they insist
  lexicon: HALOT
  rationale: The verb conveys urging or pressing someone insistently. 'Press' preserves
    the social pressure implied in the banquet setting better than the softer 'urge'.
- source_word: בך
  chosen: you
  alternatives:
  - upon you
  lexicon: HALOT
  rationale: Preposition plus pronominal suffix marks the person being pressed; idiomatic
    English absorbs the preposition into the verb phrase 'press you'.
- source_word: לאכול
  chosen: to eat
  alternatives:
  - to dine
  lexicon: HALOT
  rationale: Infinitive of אכל is straightforwardly 'to eat.' 'Dine' would add social
    nuance not explicit in the Hebrew.
- source_word: סור
  chosen: leave
  alternatives:
  - turn aside from
  - withdraw from
  lexicon: HALOT
  rationale: Imperative of סור means turn aside/depart. In context of a meal setting,
    'leave' is the clearest natural English equivalent.
- source_word: מן
  chosen: from
  lexicon: HALOT
  rationale: Standard preposition indicating separation.
- source_word: הסבה
  chosen: the banquet
  alternatives:
  - the table
  - the company at table
  - the dining circle
  lexicon: HALOT
  rationale: In Ben Sira's meal context, הסבה refers to the reclining meal setting
    or banquet company. 'Banquet' communicates the social meal scene more clearly
    than the overly literal but potentially misleading 'reclining' or bare 'table'.
- source_word: ותמצא
  chosen: and you will find
  alternatives:
  - then you will find
  lexicon: HALOT
  rationale: Simple waw + imperfect continuation; rendered as a result clause in natural
    English.
- source_word: נחת
  chosen: rest
  alternatives:
  - ease
  - relief
  - contentment
  lexicon: HALOT
  rationale: נחת denotes ease, rest, or relief. 'Rest' is concise and preserves the
    sense of finding calm by withdrawing from social pressure.
