translation:
  text: In all your deeds be modest, and no disaster will touch you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a substantially different reading here: ''One builds and another
      tears down; what have they gained more than toil?'' This verse is translated
      from the extant Hebrew, which differs markedly from the Greek tradition.'
    reason: textual_variant
lexical_decisions:
- source_word: בכל
  chosen: In all
  alternatives:
  - In every
  - With respect to all
  lexicon: HALOT
  rationale: The preposition ב with כל is naturally rendered comprehensively as 'in
    all,' introducing the sphere in which the exhortation applies.
- source_word: מעשיך
  chosen: your deeds
  alternatives:
  - your actions
  - your works
  lexicon: HALOT
  rationale: מעשים refers to acts or conduct. 'Deeds' preserves the moral-practical
    sense better than the more neutral 'actions,' while remaining natural English.
- source_word: היה
  chosen: be
  alternatives:
  - become
  - conduct yourself as
  lexicon: HALOT
  rationale: Imperatival force from היה with predicate adjective is best conveyed
    by simple English imperative 'be.'
- source_word: צנוע
  chosen: modest
  alternatives:
  - humble
  - restrained
  - self-controlled
  lexicon: HALOT
  rationale: צנוע denotes modesty, reserve, or humility in bearing. 'Modest' best
    matches the Hebrew wording directly. 'Humble' is possible, but 'modest' preserves
    the social-ethical nuance of restrained conduct.
- source_word: וכל
  chosen: and no
  alternatives:
  - and every ... not
  - then no
  lexicon: HALOT
  rationale: The conjunction plus negative result clause is idiomatically rendered
    'and no...' in English.
- source_word: אסון
  chosen: disaster
  alternatives:
  - calamity
  - harm
  - misfortune
  lexicon: HALOT
  rationale: אסון commonly denotes serious harm or calamity. 'Disaster' communicates
    substantial adverse event without over-specifying physical injury alone.
- source_word: לא יגע בך
  chosen: will touch you
  alternatives:
  - will reach you
  - will strike you
  - will befall you
  lexicon: HALOT
  rationale: נגע literally means 'touch/reach/strike.' 'Will touch you' preserves
    the Hebrew image and remains idiomatic in English for harm approaching someone.
- source_word: εἷς οἰκοδομῶν καὶ εἷς καθαιρῶν, τί ὠφέλησαν πλεῖον ἢ κόπους;
  chosen: used as a secondary control only, not translated in the main text
  alternatives:
  - One builds and another tears down; what have they gained except toil?
  lexicon: BDAG
  rationale: The Greek parallel diverges sharply from the Hebrew witness and appears
    to reflect a different textual form for this verse. Per source hierarchy, the
    surviving Hebrew is primary for Sirach where available, but the Greek materially
    affects confidence and should be preserved in a footnote as an alternative textual
    tradition.
