translation:
  text: An evil eye hates God, and he created nothing worse than it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally 'an evil eye,' a Hebrew idiom for a stingy, begrudging, or envious
      person.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel for this verse differs sharply, reading instead: ''for
      their hope is in the one who saves them.'' This appears to reflect a substantially
      different textual form.'
    reason: textual_variant
lexical_decisions:
- source_word: רע עין
  chosen: an evil eye
  alternatives:
  - a stingy person
  - a grudging eye
  - envy
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'evil of eye/evil eye' and commonly
    denotes stinginess, envy, or begrudging selfishness. Because Ben Sira often uses
    concrete idiom, the main text preserves the literal expression 'evil eye' for
    transparency, while the semantic alternatives remain available for interpretation.
- source_word: שונא
  chosen: hates
  alternatives:
  - is hateful to
  - abhors
  lexicon: HALOT
  rationale: The verb straightforwardly means 'hate.' Given the Hebrew syntax, the
    most natural reading is that the subject 'evil eye' hates God/El, rather than
    that God hates the evil eye. This keeps closest to the extant Hebrew wording.
- source_word: אל
  chosen: God
  alternatives:
  - God/El
  - mighty one
  lexicon: HALOT
  rationale: In wisdom literature אל can function as the divine name/title 'God.'
    'God' is the clearest English rendering here.
- source_word: ורע ממנו לא ברא
  chosen: and he created nothing worse than it
  alternatives:
  - and nothing worse than him was created
  - and no worse thing was made than this
  lexicon: HALOT
  rationale: The clause is terse and somewhat ambiguous in pronominal reference. The
    verb ברא strongly suggests creation language, and the masculine singular pronoun
    can point back to the person/trait just mentioned. English 'he created nothing
    worse than it' preserves the likely divine subject while allowing the referent
    to remain the evil-eye disposition.
