  chosen_reading: Retain 'evil eye' in the main text
  alternative_readings:
  - stinginess
  - grudging disposition
  - envy
  rationale: The phrase is a recognizable biblical idiom for a miserly or begrudging
    attitude, especially in meal contexts, but the Hebrew wording itself is concrete
    and proverbial. Preserving the idiom maintains transparency to the source while
    allowing a footnote to explain the sense.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Source-level mismatch between Hebrew and Greek parallel
  chosen_reading: Translate the extant Hebrew as primary, while noting the Greek parallel
    diverges substantially
  alternative_readings:
