translation:
  text: Do not say, “It is enough for him”; remember that an evil eye is evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''evil eye'' commonly refers to a stingy, grudging, or envious
      disposition.'
    reason: lexical_alternative
  - marker: b
    text: The supplied Greek parallel for this reference reads, 'The spirit of those
      who fear the Lord will live,' which does not match the Hebrew wording here and
      likely reflects a different textual alignment or verse numbering.
    reason: textual_variant
lexical_decisions:
- source_word: אל תאמר
  chosen: Do not say
  alternatives:
  - Do not think
  - Do not say to yourself
  lexicon: HALOT
  rationale: Straightforward negative imperative from אמר. English imperative preserves
    the direct admonition.
- source_word: ספוק
  chosen: there is enough
  alternatives:
  - sufficiency
  - satisfaction
  - plenty
  lexicon: HALOT
  rationale: The noun/idea denotes sufficiency or adequacy. In context of table manners
    and generosity, an idiomatic English clause is needed; 'there is enough' best
    captures the sense without over-paraphrasing.
- source_word: עליו
  chosen: for him
  alternatives:
  - for that person
  - for him/it
  lexicon: HALOT
  rationale: The preposition with pronominal suffix most naturally means 'for him'
    here, likely referring to another diner or recipient. 'For him' keeps the Hebrew's
    masculine singular and the likely interpersonal sense.
- source_word: זכור
  chosen: remember
  alternatives:
  - keep in mind
  - recall
  lexicon: HALOT
  rationale: Imperative retained directly; 'remember' is concise and natural.
- source_word: רעה עין רעה
  chosen: an evil eye is evil
  alternatives:
  - a grudging eye is bad
  - a stingy eye is wicked
  - a mean eye is harmful
  lexicon: HALOT
  rationale: The Hebrew repeats רעה with עין, producing a terse aphoristic warning.
    'Evil eye' preserves the idiom and its moral force; the predicate 'is evil' keeps
    the repetition visible rather than flattening it into a single adjective like
    'stingy.'
