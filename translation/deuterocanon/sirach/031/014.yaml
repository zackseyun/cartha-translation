  rationale: Project policy gives primacy to the surviving Hebrew of Sirach where
    extant. Here the supplied Greek parallel ('The spirit of those who fear the Lord
    will live') does not correspond to the Hebrew line and appears to reflect a different
    verse or textual alignment. The English therefore follows the Hebrew, with the
