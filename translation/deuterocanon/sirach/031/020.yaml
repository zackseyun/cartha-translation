theological_decisions:
- issue: Gendered expression in איש כמוך
  chosen_reading: Retain 'a man like yourself' in the main text
  alternative_readings:
  - a person like you
  - someone like yourself
  rationale: The Hebrew witness uses the masculine noun איש. Per doctrine, gender-accurate
    rendering is preferred over neutralizing the expression. Because the saying is
    proverbial and broadly applicable, an inclusive alternative is worth preserving
    in a footnote rather than replacing the source's wording in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Divergence between Hebrew and Greek witnesses
  chosen_reading: Translate from the Hebrew as the primary witness, while noting the
    Greek parallel as a substantially different reading
  alternative_readings:
  - 'Translate the Greek parallel: ''lifting up the soul and enlightening the eyes,
    giving healing, life, and blessing'''
  rationale: For Sirach, surviving Hebrew is primary where available. Here the Greek
    parallel is not a close verbal equivalent but a markedly different line, and the
    prompt flags a major mismatch. Therefore the main text follows the Hebrew, with
    the Greek preserved in a footnote as an alternative witness rather than harmonized
    into the translation.
  doctrine_reference: PHILOSOPHY.md 'What we are translating' and user instruction
    to use parallel source as actual input while keeping Greek in view
