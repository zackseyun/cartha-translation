translation:
  text: Know that your neighbor is a man like yourself, and eat what is set before
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more inclusively, 'your neighbor is a person like yourself.' The Hebrew
      reads literally 'a man like you.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek witness here differs substantially: ''lifting up the soul and
      enlightening the eyes, giving healing, life, and blessing.'' The Hebrew and
      Greek appear to preserve different forms of the verse.'
    reason: alternative_reading
lexical_decisions:
- source_word: דע
  chosen: Know
  alternatives:
  - Recognize
  - Understand
  lexicon: HALOT
  rationale: Imperative of ידע. 'Know' is the most direct and natural English imperative,
    preserving the exhortational force without over-interpreting it as reflective
    insight alone.
- source_word: רעך
  chosen: your neighbor
  alternatives:
  - your companion
  - your fellow
  lexicon: HALOT
  rationale: רֵעַ commonly means friend, companion, or neighbor. 'Neighbor' best preserves
    the ethical/social sense of another person in relation to oneself, fitting the
    comparison that follows.
- source_word: איש כמוך
  chosen: a man like yourself
  alternatives:
  - a person like you
  - one like yourself
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular, literally 'a man like you.'
    Following the project's gender-accurate policy, the main text keeps 'man' rather
    than flattening to a neutral term. 'Like yourself' gives idiomatic English while
    preserving the comparison.
- source_word: ואכול
  chosen: and eat
  alternatives:
  - so eat
  - therefore eat
  lexicon: HALOT
  rationale: Simple imperative with conjunction. 'And eat' preserves the paratactic
    Hebrew style; stronger inferential renderings would add logical force not explicit
    in the text.
- source_word: דבר
  chosen: what
  alternatives:
  - the thing
  - whatever
  lexicon: HALOT
  rationale: Here דָּבָר functions idiomatically as 'thing/what' in the phrase 'what
    is set before you.' Rendering it explicitly as 'thing' would sound wooden in English.
- source_word: ששם לפניך
  chosen: is set before you
  alternatives:
  - is placed before you
  - has been put before you
  lexicon: HALOT
  rationale: This idiom naturally refers to food served at table. 'Is set before you'
    is idiomatic English and matches the meal context. The Greek parallel for this
    verse diverges substantially, so the Hebrew table-setting idiom governs the translation.
