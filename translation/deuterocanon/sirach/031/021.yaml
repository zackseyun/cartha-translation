lexical_decisions:
- source_word: חדל
  chosen: stop
  alternatives:
  - cease
  - desist
  - leave off
  lexicon: HALOT
  rationale: The imperative calls for ending one's eating/drinking. 'Stop' is idiomatic
    modern English and fits the banquet context better than the more formal 'cease.'
- source_word: ראשון
  chosen: be the first
  alternatives:
  - first
  - before others
  lexicon: HALOT
  rationale: 'Taken adverbially/predicatively with the imperative: the hearer is urged
    to stop before others do, showing restraint.'
- source_word: בעבור
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: Here it introduces purpose or motive. 'For the sake of' best captures
    the ethical motivation in context.
- source_word: מוסר
  chosen: good manners
  alternatives:
  - discipline
  - instruction
  - propriety
  lexicon: HALOT
  rationale: Although מוסר often means 'discipline' or 'instruction,' in this meal-setting
    it points to cultivated propriety/courtesy. 'Good manners' makes the social-ethical
    sense clear in natural English.
- source_word: גרגרן
  chosen: glutton
  alternatives:
  - greedy eater
  - gourmand
  lexicon: HALOT
  rationale: The noun denotes one who eats greedily. 'Glutton' is concise and morally
    weighted in a way that matches the warning.
- source_word: פן
  chosen: lest
  alternatives:
  - so that not
  - or else
  lexicon: HALOT
  rationale: A standard warning particle introducing the negative consequence. 'Lest'
    preserves the concise admonitory force.
- source_word: תמאס
  chosen: you be loathed
  alternatives:
  - you be despised
  - you become disgusting
  - you be hated
  lexicon: HALOT
  rationale: From מאס, 'reject/despise.' In context the sense is that greedy behavior
    makes one repulsive to others. 'Be loathed' captures the social revulsion more
    strongly than the flatter 'despised.'
