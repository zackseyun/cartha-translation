translation:
  text: My son, if you sit at a great table, do not open your throat over it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'do not open your throat over it' is an idiom warning against greed
      or ravenous appetite at a rich host's table; compare the more interpretive sense
      'do not be greedy over it.'
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel supplied here does not correspond to the Hebrew verse
      and appears mismatched for this reference, so the translation is anchored in
      the Hebrew witness.
    reason: textual_variant
lexical_decisions:
- source_word: בני
  chosen: My son
  alternatives:
  - Son
  - Child
  lexicon: HALOT
  rationale: Vocative address with 1cs suffix; 'My son' preserves the paternal instructional
    tone typical of wisdom literature better than the bare 'Son.' 'Child' would flatten
    the masculine singular form and the genre's conventional address.
- source_word: אם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: Conditional particle; 'if' keeps the straightforward protasis. 'When'
    would imply expected occurrence rather than simple condition.
- source_word: על שלחן גדול
  chosen: at a great table
  alternatives:
  - at a rich table
  - at an important man's table
  - at a large table
  lexicon: HALOT
  rationale: על with ישב in context is naturally rendered 'sit at.' גדול may denote
    greatness in quality/status as well as size; 'great table' preserves the Hebrew's
    compactness and leaves the social nuance intact without over-interpreting as either
    physical size or luxury alone.
- source_word: ישבת
  chosen: you sit
  alternatives:
  - you have sat
  - you are seated
  lexicon: HALOT
  rationale: Though formally perfect, in this instructional conditional it functions
    naturally as present/general condition in English. 'You sit' gives idiomatic wisdom-style
    instruction.
- source_word: אל תפתח
  chosen: do not open
  alternatives:
  - do not widen
  - do not stretch open
  lexicon: HALOT
  rationale: Direct rendering of the prohibition. The idiom depends on the object
    for its force, so the simple verb should be preserved.
- source_word: גרנך
  chosen: your throat
  alternatives:
  - your gullet
  - your appetite
  - your mouth
  lexicon: HALOT
  rationale: גרון literally means 'throat.' Here it forms an idiom warning against
    greedy appetite. 'Throat' preserves the vivid Hebrew image; 'appetite' interprets
    the metaphor, and 'mouth' is less exact.
