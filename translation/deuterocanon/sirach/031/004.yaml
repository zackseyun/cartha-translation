theological_decisions:
- issue: Textual basis in a verse with major mismatch between Hebrew forms and a divergent
    Greek parallel
  chosen_reading: Translate from the extant Hebrew witness, prioritizing the line
    'עמל עני לחסר כחו, ואם ינוח לא נחה לו' but rendering the second colon in a way
    that acknowledges the alternate Hebrew form 'יהיה צריך.'
  alternative_readings:
  - 'Translate the alternate Hebrew form: ''A poor man labors to maintain his household,
    and if he rests, he will be in need.'''
  - 'Translate the Greek parallel as the main text: ''From uncleanness what can be
    cleansed? And from falsehood what can be true?'''
  rationale: Per project philosophy for Sirach, Hebrew is primary where it survives.
    Here the Kahana Zone 1 data itself preserves conflicting Hebrew lines and a Greek
    parallel from a wholly different text tradition. Because the Hebrew witness survives
    but is unstable, the draft keeps the core Hebrew image of the poor man's exhausting
    labor and continuing need, while documenting the alternatives rather than presenting
    the wording as certain.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    preserve source uncertainty honestly'
