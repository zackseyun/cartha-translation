translation:
  text: A poor man labors until his strength is spent, and if he rests, he is still
    in need.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew witnesses in the supplied source diverge: one form reads, ''A poor
      man labors to maintain his household, and if he rests, he will be in need'';
      another reads, ''A poor man labors until his strength is spent, and if he rests,
      there is no rest for him.'''
    reason: textual_variant
  - marker: b
    text: 'The Greek parallel supplied here has a different saying altogether: ''From
      uncleanness what can be cleansed? And from falsehood what can be true?'' This
      suggests a major textual divergence in the tradition for this verse.'
    reason: textual_variant
lexical_decisions:
- source_word: עמל
  chosen: labors
  alternatives:
  - toils
  - works hard
  lexicon: HALOT
  rationale: The Hebrew verbal idea denotes strenuous labor. 'Labors' is natural modern
    English and preserves the sense of exhausting effort better than the flatter 'works.'
- source_word: עני
  chosen: poor man
  alternatives:
  - poor person
  - the poor man
  lexicon: HALOT
  rationale: The singular masculine noun is retained with gender-accurate force per
    project philosophy. In wisdom style it represents a typical case, so 'poor man'
    is preferable to a gender-neutral recasting.
- source_word: לחסר כחו
  chosen: until his strength is spent
  alternatives:
  - to the loss of his strength
  - until he lacks strength
  - to exhaust his strength
  lexicon: HALOT
  rationale: The Hebrew phrase combines lack/deprivation with strength. The chosen
    rendering communicates the result idiomatically in English while preserving the
    causal sense of labor leading to depletion.
- source_word: ואם ינוח
  chosen: and if he rests
  alternatives:
  - but if he rests
  - and when he rests
  lexicon: HALOT
  rationale: The conditional particle with the verb 'rest' is straightforward. 'And
    if' keeps the Hebrew coordination without overinterpreting contrast.
- source_word: לא נחה לו / יהיה צריך
  chosen: he is still in need
  alternatives:
  - he has no rest
  - he remains needy
  - he will be in want
  lexicon: HALOT
  rationale: 'Zone 1 Hebrew shows a major mismatch between two forms of the verse:
    one line reads ''he will be in need,'' another ''there is no rest for him.'' The
    Greek parallel in Zone 1 is entirely different, indicating textual instability.
    The chosen English follows the more coherent Hebrew sense of ongoing need after
    rest, while smoothing the future/present nuance into idiomatic English. The alternative
    ''he has no rest'' is preserved in a footnote because it is supported by one Hebrew
    form.'
