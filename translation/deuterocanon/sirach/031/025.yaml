translation:
  text: Years of life come from a sound stomach; one rises in the morning, and his
    life is with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel has a substantially different reading here: ''Bread
      for the needy is the life of the poor; the one who deprives them of it is a
      man of blood.'' This likely reflects a different textual form than the extant
      Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: שנות חיים
  chosen: Years of life
  alternatives:
  - length of life
  - life-years
  lexicon: HALOT
  rationale: A straightforward rendering of the Hebrew phrase, preserving the idiom
    of longevity rather than collapsing it into a more interpretive expression.
- source_word: קרב
  chosen: stomach
  alternatives:
  - inward parts
  - belly
  lexicon: HALOT
  rationale: In this context of eating and drinking, the bodily sense is primary.
    'Stomach' communicates the practical sense more clearly than the broader 'inward
    parts.'
- source_word: תולל
  chosen: sound
  alternatives:
  - healthy
  - untroubled
  - moderate
  lexicon: HALOT
  rationale: The Hebrew form is difficult, and the source validation flags a major
    mismatch. In context, the line contrasts bodily well-being with the aftereffects
    of excess; 'sound' captures a state of bodily health without overcommitting to
    a narrower reconstruction. The Greek parallel points to a different text and therefore
    serves only as a consistency check, not the base wording here.
- source_word: וקם בבקר
  chosen: one rises in the morning
  alternatives:
  - and he gets up in the morning
  - he rises early
  lexicon: HALOT
  rationale: This keeps the Hebrew sequence and the practical image of waking after
    a night's rest. 'One rises' gives natural English while preserving the generic
    force.
- source_word: ונפשו אתו
  chosen: his life is with him
  alternatives:
  - his soul is with him
  - he is himself
  lexicon: HALOT
  rationale: נפש can mean 'soul,' 'life,' or the living self. Here the idiom points
    to being alive and well after sleep, likely after a context of moderation in drinking.
    'His life is with him' preserves the Hebrew flavor while remaining intelligible.
