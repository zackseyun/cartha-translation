translation:
  text: Blessed is the man who is found blameless, and after wealth has not gone astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew text is difficult in the second clause. The sense is likely that
      the man has not gone astray in relation to wealth; alternatively, 'who has not
      gone astray after wealth' or 'who has not been led astray by money.'
    reason: alternative_reading
  - marker: b
    text: The Greek parallel for this verse differs substantially from the surviving
      Hebrew wording, so the translation follows the Hebrew while acknowledging uncertainty
      in the clause about wealth.
    reason: textual_variant
lexical_decisions:
- source_word: אשרי
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: HALOT
  rationale: Standard beatitude formula; 'Blessed' preserves the wisdom-literature
    tone better than the more subjective 'Happy.'
- source_word: איש
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and fits the project's
    gender-accurate policy. In wisdom style it can be representative, but 'man' best
    matches the source form.
- source_word: נמצא
  chosen: is found
  alternatives:
  - proves to be
  - is discovered to be
  lexicon: HALOT
  rationale: Passive sense is straightforward in Hebrew and preserves the evaluative
    nuance of being shown or found to be such.
- source_word: תמים
  chosen: blameless
  alternatives:
  - whole
  - integrity
  - perfect
  lexicon: HALOT
  rationale: In ethical context this denotes moral integrity rather than sinless perfection;
    'blameless' is idiomatic and fits wisdom usage.
- source_word: ויחר
  chosen: and after
  alternatives:
  - and behind
  - and concerning
  lexicon: HALOT
  rationale: 'The Hebrew here is textually difficult in Kahana''s composite reading.
    In context with ממון and לא נלוז, and with the Greek parallel indicating integrity
    in relation to possessions, the phrase is best taken adverbially/relationally:
    the man did not go astray in connection with wealth. ''After wealth'' is a literal
    but somewhat awkward way to preserve the probable sense without overreconstructing.'
- source_word: ממון
  chosen: wealth
  alternatives:
  - money
  - riches
  lexicon: HALOT
  rationale: Refers broadly to material possessions; 'wealth' is broad and natural
    in English.
- source_word: לא נלוז
  chosen: has not gone astray
  alternatives:
  - has not swerved
  - has not been perverted
  - has not turned aside
  lexicon: HALOT
  rationale: The verb conveys deviation from the right path. In this context it likely
    means moral deflection because of wealth.
