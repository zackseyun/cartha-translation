theological_decisions:
- issue: Textual and source-level difficulty in the Hebrew clause involving wealth
  chosen_reading: Translate the extant Hebrew with support from the Greek parallel,
    yielding a sense of moral integrity in relation to wealth.
  alternative_readings:
  - Blessed is the man who is found blameless, and who has not gone astray after wealth.
  - Blessed is the man who is found blameless, and who has not been led astray by
    money.
  rationale: Zone 1 marks the Hebrew witness with major mismatch, and the clause ויחר
    ממון לא נלוז is awkward as transmitted. The Greek parallel supplied here does
    not closely match the Hebrew wording, which increases uncertainty. Still, the
    Hebrew clearly contains 'wealth' and 'not gone astray,' so the translation preserves
    that core sense while avoiding a stronger reconstruction than the evidence warrants.
  doctrine_reference: 'PHILOSOPHY.md: preserve source uncertainty honestly; translate
    from Hebrew where it survives while keeping Greek in view.'
