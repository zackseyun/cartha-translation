- issue: Source-witness divergence between Hebrew and Greek parallel
  chosen_reading: Translate the extant Hebrew as primary, while acknowledging that
    the Greek parallel reflects a substantially different line.
  alternative_readings:
  - For dreams have led many astray, and those hoping in them have fallen.
  rationale: For Sirach, surviving Hebrew is primary where extant. Here the Hebrew
    line about a stumbling block for a fool differs markedly from the Greek line about
    dreams misleading many, indicating a major textual divergence rather than a minor
    lexical variation. The main text therefore follows the Hebrew witness, and the
    Greek is preserved in a footnote due to the material mismatch.
