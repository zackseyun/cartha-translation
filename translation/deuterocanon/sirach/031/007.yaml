translation:
  text: For it is a stumbling block to a fool, and every simpleton is ensnared by
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''For dreams have led many astray, and those hoping in
      them have fallen.'' The Hebrew and Greek witnesses differ substantially here.'
    reason: alternative_reading
lexical_decisions:
- source_word: תקלה
  chosen: stumbling block
  alternatives:
  - offense
  - snare
  - cause of ruin
  lexicon: HALOT
  rationale: The noun denotes something over which one stumbles or is brought to ruin.
    'Stumbling block' preserves the concrete metaphor and moral danger better than
    a flatter 'offense.'
- source_word: אויל
  chosen: fool
  alternatives:
  - senseless person
  - stupid person
  lexicon: HALOT
  rationale: A standard wisdom-term for a morally and intellectually deficient person.
    'Fool' matches biblical wisdom diction and is more idiomatic than 'senseless person.'
- source_word: פותה
  chosen: simpleton
  alternatives:
  - naive person
  - gullible one
  - simple person
  lexicon: HALOT
  rationale: The term refers to one who is easily deceived or naive. 'Simpleton' captures
    the wisdom-literature nuance of credulous simplicity more sharply than the broader
    'simple person.'
- source_word: יוקש
  chosen: is ensnared
  alternatives:
  - is trapped
  - is caught
  lexicon: HALOT
  rationale: The passive verbal form evokes being caught in a trap. 'Is ensnared'
    preserves the figurative trap imagery and pairs well with the preceding metaphor.
- source_word: בו
  chosen: by it
  alternatives:
  - in it
  - through it
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the unnamed object in context. 'By
    it' is the most natural English rendering with the passive 'is ensnared.'
