translation:
  text: Even if you sit among many, do not reach out your hand before your companion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, do not take food ahead of another person at the table.
    reason: cultural_note
  - marker: b
    text: The Greek parallel in Swete differs sharply here and reads a line about
      'the mockeries of the lawless' not being for favor; the Hebrew witness is therefore
      followed as the primary text for this verse, with the Greek kept in view as
      a divergent parallel.
    reason: textual_variant
lexical_decisions:
- source_word: וגם אם
  chosen: Even if
  alternatives:
  - And even if
  - Also if
  lexicon: HALOT
  rationale: Introduces a concessive circumstance. 'Even if' gives natural English
    while preserving the force of the Hebrew sequence.
- source_word: בין רבים
  chosen: among many
  alternatives:
  - among a crowd
  - in the company of many
  lexicon: HALOT
  rationale: The phrase refers to being seated in a larger social setting, likely
    at a meal. 'Among many' stays close to the Hebrew without over-specifying 'crowd'.
- source_word: ישבת
  chosen: you sit
  alternatives:
  - you are seated
  - you have sat
  lexicon: HALOT
  rationale: The perfect can function in conditional instruction with present/general
    force. 'You sit' is idiomatic in English proverbial style.
- source_word: לפני
  chosen: before
  alternatives:
  - in front of
  - ahead of
  lexicon: HALOT
  rationale: Here the preposition marks precedence rather than mere spatial position.
    'Before' best conveys acting ahead of another person at table.
- source_word: רע
  chosen: your companion
  alternatives:
  - your neighbor
  - your fellow
  lexicon: HALOT
  rationale: In wisdom context רע commonly means a fellow person/associate rather
    than specifically 'evil' or covenantal 'neighbor.' 'Companion' fits the meal-setting
    and avoids misleading modern political or legal connotations of 'neighbor'.
- source_word: אל תושיט יד
  chosen: do not reach out your hand
  alternatives:
  - do not stretch out your hand
  - do not put forth your hand
  lexicon: HALOT
  rationale: A literal but natural rendering that preserves the table-etiquette image.
    It likely means not grabbing food ahead of another diner.
