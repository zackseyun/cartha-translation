translation:
  text: Stretch out your hand to the place he looks at, and do not reach with him
    into the dish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek tradition here reads, 'Happy is the soul of the one who fears
      the Lord.' The Hebrew witness preserved in the Cairo Geniza gives a different
      line about table manners, and the source tradition is uncertain at this point.
    reason: alternative_reading
lexical_decisions:
- source_word: מקום
  chosen: the place
  alternatives:
  - the spot
  - the portion
  lexicon: HALOT
  rationale: The Hebrew noun ordinarily means 'place.' In this table-setting context
    it refers to the place/portion before the other diner, so 'the place' keeps the
    concrete wording while remaining intelligible.
- source_word: יביט
  chosen: he looks at
  alternatives:
  - he gazes at
  - he turns toward
  lexicon: HALOT
  rationale: 'From נבט/הביט, ''to look.'' ''He looks at'' is the most natural modern
    English and preserves the etiquette sense: notice where the other person''s attention/claim
    lies.'
- source_word: תושיט יד
  chosen: stretch out your hand
  alternatives:
  - extend your hand
  - put out your hand
  lexicon: HALOT
  rationale: The idiom is literal and fits dining etiquette. 'Stretch out your hand'
    is clear, slightly formal, and close to the Hebrew.
- source_word: אל תחד
  chosen: do not reach
  alternatives:
  - do not thrust
  - do not join in
  lexicon: HALOT
  rationale: The Hebrew form is textually difficult in this composite Geniza witness,
    but in context it clearly prohibits simultaneous grabbing at shared food. 'Do
    not reach' captures the practical force without overclaiming a more specific nuance.
- source_word: עמו
  chosen: with him
  alternatives:
  - together with him
  - alongside him
  lexicon: HALOT
  rationale: The preposition indicates acting simultaneously with the other diner.
    'With him' is concise and preserves the masculine singular of the source.
- source_word: בטנא
  chosen: into the dish
  alternatives:
  - into the basket
  - into the bowl
  lexicon: HALOT
  rationale: Although the underlying noun can denote a basket/container, in this meal
    context the sense is the shared serving vessel. 'Dish' communicates the dining
    setting better in English while staying within the semantic range.
- source_word: φοβουμένου τὸν Κύριον μακαρία ἡ ψυχή
  chosen: not adopted in main text
  alternatives:
  - Happy is the soul of the one who fears the Lord
  lexicon: BDAG
  rationale: The Greek parallel supplied here differs radically from the Hebrew line
    and appears to reflect a different textual tradition or verse alignment. Because
    Hebrew survives for this verse, the main text follows the Hebrew witness, while
    the Greek is preserved in a footnote as a significant alternative tradition.
