translation:
  text: Many have been ruined by gold, and by trusting in pearls; they did not find
    escape from evil, nor deliverance on the day of wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew פנינים may mean 'pearls' or more broadly costly gems/jewels.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek witness differs substantially here: ''Unless it is sent from
      the Most High in visitation, do not give your heart to them.'' The Hebrew text
      used for the main translation instead warns that trust in wealth does not save
      from evil or from the day of wrath.'
    reason: textual_variant
lexical_decisions:
- source_word: חבולי
  chosen: have been ruined
  alternatives:
  - have been ensnared
  - have been wounded
  - have been brought to ruin
  lexicon: HALOT
  rationale: In context with wealth as the cause, the participial form points to people
    harmed or brought down by gold. 'Have been ruined' captures the moral and practical
    downfall more idiomatically than the more literal 'wounded' or 'ensnared.'
- source_word: זהב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward lexical rendering; here it represents wealth in precious
    metal form.
- source_word: הבוטח
  chosen: by trusting in
  alternatives:
  - the one who trusts in
  - and he who trusts in
  lexicon: HALOT
  rationale: The Hebrew shifts from a plural statement to a singular participial expression.
    Rendering it as 'by trusting in' smooths the syntax in English while preserving
    the causal sense that reliance on jewels leads to downfall.
- source_word: פנינים
  chosen: pearls
  alternatives:
  - precious stones
  - corals
  - jewels
  lexicon: HALOT
  rationale: The term can denote costly gems more broadly, but 'pearls' is a common
    and defensible rendering. Because the exact referent may be broader than literal
    pearls, an alternative is preserved in a footnote.
- source_word: להנצל
  chosen: find escape
  alternatives:
  - be delivered
  - be rescued
  lexicon: HALOT
  rationale: The infinitive expresses successful rescue sought but not attained. 'Find
    escape' fits the idiom 'did not find' in English.
- source_word: מרעה
  chosen: from evil
  alternatives:
  - from harm
  - from disaster
  - from calamity
  lexicon: HALOT
  rationale: The noun may denote moral evil or disastrous misfortune. In this wisdom
    context of judgment on misplaced trust, 'evil' preserves the broader sense, while
    the more concrete alternatives remain possible.
- source_word: להושע
  chosen: deliverance
  alternatives:
  - salvation
  - rescue
  lexicon: HALOT
  rationale: The verb is from the salvation/deliverance root. 'Deliverance' avoids
    importing later doctrinal freight from 'salvation' while retaining the seriousness
    of divine rescue.
- source_word: ביום עברה
  chosen: on the day of wrath
  alternatives:
  - in the day of fury
  - on the day of anger
  lexicon: HALOT
  rationale: This phrase naturally evokes a time of judgment. 'Wrath' best conveys
    the gravity of עברה in wisdom and prophetic diction.
- source_word: ἐπισκοπῇ (Greek parallel)
  chosen: wrath/judgment context reflected indirectly
  alternatives:
  - visitation
  - inspection
  lexicon: BDAG
  rationale: The Greek parallel diverges substantially, speaking of something sent
    from the Most High in visitation. Because the Hebrew witness is primary where
    extant, the main text follows Hebrew; however, the Greek confirms a judgment setting
    and is noted as a textual alternative rather than adopted.
