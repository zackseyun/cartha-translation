translation:
  text: Listen, my son, and accept my words; do not mock me, and in the end you will
    find my words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew תלעיז may also mean 'mock me' or 'scoff at me,' not only 'reject
      me.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel tradition at this verse number has a different saying:
      ''So also a man fasting for his sins and going again and doing the same things—who
      will hear his prayer? And what did he gain by humbling himself?'' This reflects
      a major textual mismatch in verse alignment/content.'
    reason: textual_variant
lexical_decisions:
- source_word: שמע
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative of שמע commonly means 'hear/listen.' 'Listen' fits modern
    English while preserving the call for attentive reception.
- source_word: בני
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular with a filial address. Per
    gender-accurate policy, 'my son' is retained rather than neutralizing to 'my child'.
- source_word: וקח
  chosen: accept
  alternatives:
  - take
  - receive
  lexicon: HALOT
  rationale: Literally 'take,' but in context of instruction 'accept' best conveys
    receiving teaching without sounding wooden. This is an optimal-equivalence rendering.
- source_word: אמרי
  chosen: my words
  alternatives:
  - my sayings
  - what I say
  lexicon: HALOT
  rationale: Plural construct from אמר, referring to the speaker's utterances/instruction.
    'My words' is straightforward and sufficiently formal.
- source_word: תלעיז
  chosen: reject
  alternatives:
  - mock
  - scoff at
  - deride
  lexicon: HALOT
  rationale: The Hebrew verb can suggest speaking against, mocking, or treating with
    contempt. In this admonitory context, 'reject' captures the practical force of
    refusing the teacher's instruction. Because the exact nuance may also be 'mock/scoff
    at,' that alternative is preserved in a footnote.
- source_word: עליי
  chosen: me
  alternatives:
  - against me
  - at me
  lexicon: HALOT
  rationale: With תלעיז the preposition marks the object of contempt or opposition.
    English idiom prefers 'reject me' in the main line, though 'mock me/scoff at me'
    would retain the preposition more overtly.
- source_word: ובאחרית
  chosen: and in the end
  alternatives:
  - and afterward
  - and at the last
  lexicon: HALOT
  rationale: אחרית often denotes the latter end or outcome. 'In the end' is idiomatic
    and preserves the temporal/resultative sense.
- source_word: תמצא
  chosen: you will find
  alternatives:
  - you will discover
  - you will attain
  lexicon: HALOT
  rationale: Standard future of מצא. 'Find' is the most direct rendering.
- source_word: דברי
  chosen: my words
  alternatives:
  - my teaching
  - my sayings
  lexicon: HALOT
  rationale: The repeated noun ties the conclusion back to the opening exhortation.
    Retaining 'my words' preserves the repetition in Hebrew.
