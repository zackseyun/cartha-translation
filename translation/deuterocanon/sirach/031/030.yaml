translation:
  text: Listen, my son, and do not despise me; in the end you will grasp my words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel source supplied for this verse has a completely different
      saying: ''One who is washed from a dead body and then touches it again—what
      has he gained by his washing?'' This appears to reflect a major verse-alignment
      or textual-tradition mismatch; the main text follows the extant Hebrew witness.'
    reason: textual_variant
lexical_decisions:
- source_word: שמע
  chosen: Listen
  alternatives:
  - Hear
  - Obey
  lexicon: HALOT
  rationale: Imperative of שמע commonly means 'hear/listen'; 'Listen' fits direct
    instruction in natural English while preserving the call to attentive reception.
    'Obey' would over-interpret the imperative here.
- source_word: בני
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular and vocative. Per gender-accurate
    philosophy, 'my son' is preferred over the more neutral 'my child'.
- source_word: תבוז
  chosen: despise
  alternatives:
  - scorn
  - disdain
  lexicon: HALOT
  rationale: בזה in this stem conveys treating with contempt. 'Despise' is a strong
    but standard rendering and suits the admonitory tone.
- source_word: ובאחרית
  chosen: in the end
  alternatives:
  - afterward
  - in the latter end
  lexicon: HALOT
  rationale: אחרית here points to the eventual outcome of heeding instruction. 'In
    the end' is idiomatic modern English and preserves the temporal/resultative sense.
- source_word: תשיג
  chosen: will grasp
  alternatives:
  - will attain
  - will understand
  - will comprehend
  lexicon: HALOT
  rationale: The verb נשׂג can denote reaching or attaining; in context with 'my words'
    it likely means coming to apprehend or take hold of their meaning. 'Will grasp'
    preserves both the metaphor of reaching and the sense of understanding better
    than the more abstract 'understand' alone.
- source_word: אמרי
  chosen: my words
  alternatives:
  - my sayings
  - what I say
  lexicon: HALOT
  rationale: אמרים are spoken words/sayings. 'My words' is straightforward and sufficiently
    formal without sounding archaic.
