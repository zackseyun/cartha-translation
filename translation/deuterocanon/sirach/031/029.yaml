translation:
  text: Even if you are constrained, wait for delicacies again and again, and it will
    bring you rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel reads, 'One praying and one cursing—which voice will
      the Master listen to?' This reflects a substantially different textual tradition
      from the extant Hebrew here.
    reason: alternative_reading
  - marker: b
    text: The Hebrew of this verse is uncertain and differs sharply from the Greek
      witness; 'you are constrained' renders a difficult form that may mean 'you are
      compelled' or 'you are under pressure.'
    reason: textual_variant
lexical_decisions:
- source_word: וגם
  chosen: Even
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Introduces an additional admonition; 'Even' fits the concessive force
    in English when followed by 'if.'
- source_word: אם
  chosen: if
  lexicon: HALOT
  rationale: Standard conditional particle.
- source_word: נאנסתה
  chosen: you are constrained
  alternatives:
  - you are compelled
  - you are forced
  - you are violated
  lexicon: HALOT
  rationale: From אנס, conveying compulsion or being under pressure. In this dining-context
    verse, 'constrained' best preserves the sense of being pressed or restricted without
    importing a sexual sense that the context does not support. The form is textually
    awkward, and the Hebrew witness is marked with mismatch, so a broader English
    term is preferable.
- source_word: במטעמים
  chosen: for delicacies
  alternatives:
  - for tasty foods
  - for choice dishes
  lexicon: HALOT
  rationale: מטעמים refers to savory or choice foods/delicacies. 'Delicacies' is concise
    and suitably elevated without being archaic.
- source_word: קוה קוה
  chosen: wait ... again and again
  alternatives:
  - hope repeatedly
  - be patient, be patient
  - wait eagerly
  lexicon: HALOT
  rationale: The doubled imperative/intensive form suggests repeated or emphatic waiting.
    'Wait ... again and again' preserves the repetition more transparently than collapsing
    it into a single verb.
- source_word: וינוח
  chosen: it will bring you rest
  alternatives:
  - you will rest
  - and it will settle
  lexicon: HALOT
  rationale: From נוח, 'to rest/be at ease.' Given the syntax and the uncertain Hebrew,
    this rendering captures the practical result of patient restraint in context.
- source_word: לך
  chosen: you
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: Dative of advantage; absorbed naturally into English as the beneficiary
    of the resulting rest.
