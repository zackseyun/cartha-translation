- issue: Primary-source divergence between Hebrew and Greek parallel
  chosen_reading: Translate the extant Hebrew as the main text while acknowledging
    that the Greek parallel reflects a substantially different verse.
  alternative_readings:
  - 'Greek parallel: ''One praying and one cursing—which voice will the Master listen
    to?'''
  rationale: Project policy gives primacy to the Hebrew where Sirach survives in Hebrew,
    but the source record flags this verse as a major mismatch and the Greek is not
    merely a minor variant. Therefore the English main text follows the Hebrew witness
    with an explicit footnote preserving the Greek alternative for auditability.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives in Sirach;
