theological_decisions:
- issue: Dynastic promise language in 'a root from him'
  chosen_reading: retain the metaphor of a continuing Davidic line without making
    an explicit messianic claim
  alternative_readings:
  - a descendant from him
  - a messianic root from him
  rationale: The verse speaks of continuity for the house of David. While 'root' can
    resonate with later messianic usage, this verse itself need not be expanded into
    an explicit messianic statement. The translation preserves the image and leaves
    theological resonance to readers.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
