translation:
  text: And he gave a remnant to Jacob, and to the house of David a root from him.
    And Solomon lay down with his fathers, and left behind him one of his offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a root from him'; that is, a continuing line from David through
      Solomon. The image may also be rendered 'a descendant from him.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word after 'Solomon lay down' is uncertain in this witness. The
      Greek parallel reads 'with his fathers,' which is followed here.
    reason: textual_variant
  - marker: c
    text: Or 'an heir' or 'a descendant.' The Hebrew term is rare/uncertain, but the
      sense is that Solomon left a successor from his own line.
    reason: alternative_reading
lexical_decisions:
- source_word: שארית / κατάλιμμα
  chosen: a remnant
  alternatives:
  - what remains
  - survivors
  - a remainder
  lexicon: HALOT; BDAG
  rationale: Both the Hebrew שארית and Greek κατάλιμμα denote what is left over or
    preserved. 'Remnant' is the most natural biblical-English rendering and preserves
    the covenantal/dynastic nuance of a surviving line.
- source_word: שורש / ῥίζαν
  chosen: a root
  alternatives:
  - a rootstock
  - a descendant line
  lexicon: HALOT; BDAG
  rationale: The Hebrew שרש and Greek ῥίζα both literally mean 'root.' Here it is
    metaphorical for dynastic continuation from David through Solomon. 'Root' keeps
    the image rather than flattening it into interpretation.
- source_word: וישכב ... / ἀνεπαύσατο
  chosen: lay down with his fathers
  alternatives:
  - rested with his fathers
  - fell asleep with his fathers
  lexicon: HALOT; BDAG
  rationale: The Hebrew idiom וישכב with reference to death is well represented by
    'lay down with his fathers.' The Greek parallel only preserves 'rested ... with
    the fathers,' supporting the death idiom. This rendering keeps the Hebrew flavor
    while remaining understandable.
- source_word: מיושש
  chosen: with his fathers
  alternatives:
  - worn out
  - aged
  - exhausted
  lexicon: HALOT
  rationale: The Hebrew form in Kahana is textually difficult and the verse is marked
    major_mismatch. The Greek parallel reads μετὰ τῶν πατέρων, strongly supporting
    a Vorlage meaning 'with his fathers' rather than an adjective such as 'aged' or
    'worn out.' The translation therefore follows the better-supported sense while
    acknowledging uncertainty in a footnote.
- source_word: מנון
  chosen: one of his offspring
  alternatives:
  - an heir
  - a descendant
  - a son
  lexicon: HALOT
  rationale: The Hebrew term is uncommon/uncertain in this form, but context clearly
    points to a successor from Solomon's line. 'One of his offspring' is broad enough
    to reflect the lexical uncertainty while fitting the dynastic context. It avoids
    overcommitting to 'son' if the text is less specific.
