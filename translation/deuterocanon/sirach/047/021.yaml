translation:
  text: to divide the people into two tribes, and from Ephraim to raise up a lawless
    kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''for rule to become divided, and from Ephraim to begin a disobedient
      kingdom.'' The Hebrew more explicitly says ''to divide the people into two tribes.'''
    reason: alternative_reading
  - marker: b
    text: Or 'a violent kingdom' or 'a rebellious kingdom.' Hebrew חמס can denote
      violence or wrongdoing; the Greek parallel emphasizes disobedience/rebellion.
    reason: lexical_alternative
lexical_decisions:
- source_word: לחלק
  chosen: to divide
  alternatives:
  - to split
  - to apportion
  lexicon: HALOT
  rationale: The infinitive construct of חלק here denotes causing division rather
    than simple distribution. In context with 'the people' and 'two tribes,' 'to divide'
    best captures the political schism reflected also by the Greek δίχα.
- source_word: העם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם commonly means 'people.' Here it refers to the covenant people as
    a political whole before division; 'the people' is more direct than 'the nation'
    and preserves the Hebrew wording.
- source_word: לשני שבטים
  chosen: into two tribes
  alternatives:
  - into two tribal groups
  lexicon: HALOT
  rationale: שבטים is literally 'tribes.' Although historically the split is between
    Judah and the northern kingdom, the Hebrew says 'two tribes,' and the translation
    preserves that formal feature.
- source_word: ומאפרים
  chosen: and from Ephraim
  alternatives:
  - and out of Ephraim
  - and in Ephraim
  lexicon: HALOT
  rationale: The prefixed מן most naturally means 'from/out of.' The phrase introduces
    the origin or locus of the ensuing kingdom. 'From Ephraim' is concise and leaves
    the exact nuance broad enough to fit the Hebrew and the Greek ἐξ Ἐφραὶμ.
- source_word: ממלכת
  chosen: kingdom
  alternatives:
  - royal rule
  - reign
  lexicon: HALOT
  rationale: ממלכה denotes a kingdom or realm. 'Kingdom' fits the political sense
    and aligns with the Greek βασιλεία.
- source_word: חמס
  chosen: lawless
  alternatives:
  - violent
  - oppressive
  - rebellious
  lexicon: HALOT
  rationale: חמס often carries the sense of violence or wrongdoing, but the Greek
    parallel reads ἀπειθῆ ('disobedient/rebellious'), suggesting a morally illegitimate
    kingdom rather than merely a violent one. 'Lawless' captures broad wickedness
    and political-religious illegitimacy without overcommitting to physical violence
    alone.
- source_word: γενέσθαι δίχα τυραννίδα
  chosen: to divide the people into two tribes
  alternatives:
  - for tyranny to become divided
  - for rule to be split in two
  lexicon: BDAG
  rationale: The Greek differs somewhat from the Hebrew, speaking of divided rule/tyranny
    rather than explicitly 'the people.' Because the Hebrew is the primary witness
    here, the main text follows it, while the Greek confirms the idea of political
    division.
- source_word: ἄρξαι βασιλείαν ἀπειθῆ
  chosen: to raise up a lawless kingdom
  alternatives:
  - to begin a rebellious kingdom
  - to establish a disobedient kingdom
  lexicon: BDAG
  rationale: The Greek verbal idea 'to begin/rule' plus 'a disobedient kingdom' supports
    understanding the Hebrew phrase as the emergence of an illegitimate northern monarchy.
    'Raise up' expresses emergence in idiomatic English while preserving the sense.
