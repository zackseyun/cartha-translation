theological_decisions:
- issue: Characterization of the northern kingdom arising from Ephraim
  chosen_reading: lawless kingdom
  alternative_readings:
  - violent kingdom
  - rebellious kingdom
  - disobedient kingdom
  rationale: The Hebrew חמס can suggest violence or wrongdoing, while the Greek ἀπειθῆ
    points toward rebellion/disobedience. 'Lawless' preserves the moral condemnation
    without narrowing it to either physical violence alone or merely political revolt.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
