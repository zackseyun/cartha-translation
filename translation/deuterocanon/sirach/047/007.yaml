theological_decisions:
- issue: Historical sense of David's action toward Philistine cities
  chosen_reading: Retain the Hebrew's concise wording about giving cities among the
    Philistines, without expanding it into a fuller paraphrase about destroying enemies.
  alternative_readings:
  - He subdued the Philistines on every side
  - He took cities from the Philistines
  rationale: The Greek parallel expands the military sense, but the Hebrew witness
    is primary here and should govern the main translation. The Greek does, however,
    support understanding the verse as describing David's lasting humiliation of Philistine
    power.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence'
