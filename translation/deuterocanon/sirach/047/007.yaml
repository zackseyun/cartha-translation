translation:
  text: He gave cities among the Philistines, and to this day he has broken their
    horn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'cities from the Philistines' or 'in Philistia.' The Hebrew
      expression is compressed; the Greek parallel makes clear that the sense is David's
      lasting defeat of the Philistines.
    reason: alternative_reading
  - marker: b
    text: '''Horn'' is a biblical image for strength or power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ויתן
  chosen: he gave
  alternatives:
  - he set
  - he granted
  lexicon: HALOT
  rationale: The Hebrew verb נתן most straightforwardly means 'give/put/set.' In this
    context with 'cities' and the Greek parallel's broader description of subduing
    enemies, 'he gave' preserves the Hebrew wording while allowing the sense that
    David assigned or took possession of cities from/among the Philistines.
- source_word: בפלשתים
  chosen: among the Philistines
  alternatives:
  - against the Philistines
  - from the Philistines
  - in Philistia
  lexicon: HALOT
  rationale: The preposition ב with an ethnonym is somewhat compressed here. The Hebrew
    alone could be read several ways, but the Greek parallel explicitly mentions humiliating
    the Philistines and breaking their horn. 'Among the Philistines' stays close to
    the Hebrew form while fitting the idea of cities located in Philistine territory
    or taken in relation to them.
- source_word: ערים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: The ordinary sense is 'cities/towns.' 'Cities' is the more standard biblical
    rendering and suits the military-political context.
- source_word: שבר
  chosen: has broken
  alternatives:
  - broke
  - shattered
  lexicon: HALOT
  rationale: The verb means 'break.' The perfect with ועד היום is well represented
    in English by 'has broken ... to this day,' expressing an effect enduring into
    the present of the speaker.
- source_word: קרנם
  chosen: their horn
  alternatives:
  - their strength
  - their power
  lexicon: HALOT
  rationale: '''Horn'' is the literal Hebrew image and is also confirmed by the Greek
    κέρας. Since ''horn'' is a common biblical metaphor for strength or power, the
    literal image should be preserved rather than flattened in the main text.'
