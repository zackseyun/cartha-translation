translation:
  text: And after him Nathan arose, to stand before David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Nathan arose to prophesy in the days of David.'' The
      Hebrew reads ''to stand before David.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וגם
  chosen: And
  alternatives:
  - And also
  - Also
  lexicon: HALOT
  rationale: Introduces continuation from the preceding context. The additive force
    of גם is present, but in smooth English the simple conjunction 'And' carries the
    linkage without overloading the line.
- source_word: אחריו
  chosen: after him
  alternatives:
  - after this one
  - afterward
  lexicon: HALOT
  rationale: The Hebrew points to succession after the previously mentioned figure.
    'After him' preserves the personal referent more clearly than the more adverbial
    'afterward.'
- source_word: עמד
  chosen: arose
  alternatives:
  - stood
  - appeared
  - came forward
  lexicon: HALOT
  rationale: Although the Hebrew verb literally means 'stood,' the Greek parallel
    has ἀνέστη ('arose'), and in context the sense is emergence onto the scene in
    succession. 'Arose' captures that idiom in English while remaining close to both
    witnesses.
- source_word: נתן
  chosen: Nathan
  rationale: Personal name transliterated by standard English convention, in keeping
    with project policy to transliterate names rather than translate them.
- source_word: להתיצב
  chosen: to stand before
  alternatives:
  - to present himself before
  - to take his stand before
  lexicon: HALOT
  rationale: The hitpael infinitive of יצב conveys taking one's stand or presenting
    oneself. 'To stand before' is concise and preserves the court/prophetic posture
    implied by the Hebrew.
- source_word: לפני דוד
  chosen: before David
  alternatives:
  - in David's presence
  - in the days of David
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'before David.' The Greek parallel reads 'in
    the days of David,' which likely reflects an interpretive smoothing toward Nathan's
    prophetic activity during David's reign. The main text follows the extant Hebrew
    witness while preserving the Greek-based alternative in a footnote.
