theological_decisions:
- issue: Referent of the 'honored name'
  chosen_reading: The phrase refers to the divine name associated with Israel and
    called over Solomon/Israel, without specifying more than the text states.
  alternative_readings:
  - A direct reference to Solomon bearing the LORD's name
  - A broader statement about Israel's covenant identity
  rationale: Both Hebrew and Greek point to a revered divine name connected with Israel,
    but the verse does not explicitly unpack the theological mechanism. The translation
    preserves the allusive covenantal language without importing a fuller doctrinal
    explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
