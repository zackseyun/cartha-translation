translation:
  text: You were called by the honored name, the one invoked over Israel; and you
    amassed gold like iron, and multiplied silver like lead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the name called over Israel.' The Hebrew idiom can denote a name invoked
      upon, belonging to, or resting over someone; the Greek parallel likewise supports
      this sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: נקראת בשם הנכבד
  chosen: You were called by the honored name
  alternatives:
  - You were called by the glorious name
  - You were named with the noble name
  lexicon: HALOT
  rationale: The Hebrew passive נקראת with בשם naturally yields 'were called by/name[d]
    with.' הנכבד denotes something weighty, honored, or glorious. 'Honored' preserves
    the dignity of the title without overreaching into interpretive expansion. The
    second person is retained from the Hebrew/Greek context addressing Solomon.
- source_word: הנקרא על ישראל
  chosen: the one invoked over Israel
  alternatives:
  - which is called upon Israel
  - which is named over Israel
  lexicon: HALOT
  rationale: The phrase recalls the idiom of a name being called over someone, indicating
    belonging, consecration, or divine claim. The Greek ἐπικεκλημένου supports an
    'invoked/called upon' sense. 'Invoked over Israel' is slightly more idiomatic
    in English while preserving the underlying Hebrew construction.
- source_word: ותצבר
  chosen: and you amassed
  alternatives:
  - and you gathered
  - and you heaped up
  lexicon: HALOT
  rationale: The verb denotes collecting or storing up wealth. 'Amassed' fits the
    context of royal accumulation and reads naturally in modern English.
- source_word: כברזל זהב
  chosen: gold like iron
  alternatives:
  - gold as if it were iron
  lexicon: HALOT
  rationale: 'The simile emphasizes abundance: gold became as common as iron. A concise
    formal rendering best preserves the image.'
- source_word: וכעפרת הרבית כסף
  chosen: and multiplied silver like lead
  alternatives:
  - and made silver abundant like lead
  - and increased silver as lead
  lexicon: HALOT
  rationale: עפרת here denotes lead, confirmed by the Greek μόλιβος/lead in the parallel
    source. הרבית expresses increase or multiplication. 'Multiplied silver like lead'
    preserves the compact poetic comparison.
