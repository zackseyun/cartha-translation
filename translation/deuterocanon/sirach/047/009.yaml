translation:
  text: With songs in the gardens he made preparation before the altar, and he arranged
    the sound of psalm and harps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with songs in the gardens' is uncertain. The Greek parallel reads,
      'he stationed singers opposite the altar, and by their sound to sweeten melodies,'
      suggesting a different underlying text or a corrupt Hebrew phrase.
    reason: textual_variant
  - marker: b
    text: Or 'lyres' for 'harps'; the Hebrew term denotes a stringed instrument.
    reason: lexical_alternative
lexical_decisions:
- source_word: בגינות שיר
  chosen: With songs in the gardens
  alternatives:
  - With musical settings of song
  - With choirs/singers in rows
  - With songs accompanied by stringed music
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult. בגינות naturally suggests 'with/in
    gardens' or possibly 'with stringed instruments' only if emended toward נגינות;
    the Greek parallel instead has 'he stationed singers before the altar.' Because
    Zone 1 gives the Hebrew phrase בגינות שיר, the draft keeps the Hebrew-facing sense
    'with songs in the gardens' rather than importing the Greek's singers into the
    main text. The phrase is marked by footnote as textually/lexically uncertain.
- source_word: הכין
  chosen: made preparation
  alternatives:
  - prepared
  - established
  - set in order
  lexicon: HALOT
  rationale: הכין commonly means 'prepare, make ready, establish.' 'Made preparation'
    preserves the verbal sense without over-specifying the object, which is not explicit
    in the Hebrew clause.
- source_word: לפני מזבח
  chosen: before the altar
  alternatives:
  - in front of the altar
  - before an altar
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase. The absence
    of the article on מזבח in Hebrew does not require indefiniteness in English in
    this cultic context.
- source_word: וקול
  chosen: and ... the sound
  alternatives:
  - and the voice
  - and the music
  lexicon: HALOT
  rationale: קול can mean 'voice' or 'sound.' Here, with musical terms following,
    'sound' best fits the collocation.
- source_word: מזמור
  chosen: psalm
  alternatives:
  - song
  - melody
  lexicon: HALOT
  rationale: מזמור is a musical song, often rendered 'psalm.' Since the context is
    temple praise, 'psalm' preserves the liturgical nuance.
- source_word: ונבלים
  chosen: and harps
  alternatives:
  - and lyres
  - and stringed instruments
  lexicon: HALOT
  rationale: נבלים refers to stringed instruments, commonly 'harps' or 'lyres.' 'Harps'
    is a familiar and acceptable rendering, though the exact instrument class may
    overlap with lyres.
- source_word: תקן
  chosen: he arranged
  alternatives:
  - he set in order
  - he established
  - he regulated
  lexicon: HALOT
  rationale: תקן conveys setting in order or arranging. 'Arranged' fits the musical/cultic
    context naturally.
