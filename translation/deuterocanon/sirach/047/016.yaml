- issue: Use of the Hebrew Cairo Geniza text versus the divergent Greek parallel
  chosen_reading: Main text follows the extant Hebrew witness while consulting the
    Greek as a control.
  alternative_readings:
  - Greek-based rendering such as 'Your name reached distant islands, and you were
    loved in your peace.'
