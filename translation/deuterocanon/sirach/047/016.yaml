translation:
  text: You covered the earth with your wisdom, and you filled the heights with praise-song.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Your name reached distant islands, and you were loved
      in your peace.'' The Greek reflects a substantially different textual form from
      the extant Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: כסית
  chosen: covered
  alternatives:
  - clothed
  - overspread
  lexicon: HALOT
  rationale: The Hebrew verb כסה commonly means 'cover.' 'Covered the earth' preserves
    the concrete metaphor of wisdom spreading broadly. 'Clothed' is possible in some
    contexts but is less direct here.
- source_word: בחכמתך
  chosen: with your wisdom
  alternatives:
  - by your wisdom
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'with' or 'by.' 'With your wisdom'
    reads naturally in English while preserving the instrumental sense.
- source_word: ותקלס
  chosen: you filled
  alternatives:
  - you praised
  - you adorned
  - you made resound
  lexicon: HALOT
  rationale: The Hebrew form is difficult, and the Greek parallel speaks of the fame
    reaching distant islands and being loved in peace, showing some textual divergence.
    In the immediate Hebrew phrase with במרום שירה, the sense appears to be that the
    heights/heavens were filled or adorned with song. 'You filled' best accounts for
    the collocation with 'praise-song' without forcing a later Hebrew sense of direct
    verbal praise.
- source_word: במרום
  chosen: the heights
  alternatives:
  - the height
  - heaven
  - the heavens
  lexicon: HALOT
  rationale: מרום can denote a lofty place, the heights, or heaven. 'The heights'
    preserves the poetic spatial imagery and avoids over-specifying cosmology where
    the Hebrew is somewhat open.
- source_word: שירה
  chosen: praise-song
  alternatives:
  - song
  - singing
  - song of praise
  lexicon: HALOT
  rationale: שירה is 'song' or 'singing'; in context of Solomon's celebrated worship
    and wisdom, 'praise-song' makes explicit the likely laudatory force while remaining
    close to the Hebrew.
