translation:
  text: For he called on God Most High, and he gave strength to his right hand, to
    drive back a man skilled in war and to raise up the horn of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the Hebrew more strictly, 'God Most High.' The Greek parallel
      reads 'the Lord, the Most High.'
    reason: alternative_reading
  - marker: b
    text: '''Horn'' is a biblical image for strength, honor, or power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קרא אל
  chosen: called on
  alternatives:
  - called to
  - invoked
  lexicon: HALOT
  rationale: The idiom means to call upon or invoke for help, fitting the context
    of David appealing to God before victory. 'Called on' is natural English and preserves
    the prayer/invocation sense.
- source_word: אל עליון
  chosen: the Lord Most High
  alternatives:
  - God Most High
  - the Most High God
  lexicon: HALOT
  rationale: The Hebrew reads 'God Most High,' while the Greek parallel has 'the Lord,
    the Most High.' Because the Greek is to be used as an actual input and 'called
    on the Lord Most High' is idiomatic in English, this rendering reflects the combined
    witness without materially changing the sense.
- source_word: ויתן בימינו עז
  chosen: he gave strength to his right hand
  alternatives:
  - he put might in his right hand
  - he gave power into his right hand
  lexicon: HALOT
  rationale: The Hebrew literally speaks of giving strength in/to his right hand,
    an idiom for empowering him for action. 'Strength to his right hand' keeps the
    bodily image while remaining readable. The subject is best taken as God giving
    strength to David.
- source_word: להדוף
  chosen: to drive back
  alternatives:
  - to thrust away
  - to strike down
  - to repel
  lexicon: HALOT
  rationale: The verb denotes pushing or repelling. In this military context, 'drive
    back' captures the force without over-specifying the manner of defeat.
- source_word: איש יודע מלחמות
  chosen: a man skilled in war
  alternatives:
  - a warrior experienced in battle
  - a man knowing war
  - a seasoned fighter
  lexicon: HALOT
  rationale: The Hebrew phrase literally means 'a man knowing wars/battle.' 'Skilled
    in war' is concise, natural English that preserves the sense of military expertise,
    likely alluding to Goliath.
- source_word: ולהרים את קרן ישראל
  chosen: to raise up the horn of Israel
  alternatives:
  - to exalt the strength of Israel
  - to lift up Israel's horn
  lexicon: HALOT
  rationale: '''Horn'' is a standard biblical metaphor for strength, honor, or power.
    Retaining the image preserves the biblical idiom and poetic force; its meaning
    can be clarified in a footnote.'
