translation:
  text: In his youth he struck down a warrior and removed everlasting disgrace; when
    he raised his hand with the sling, he shattered the glory of Goliath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and removed reproach from the people.'' The Hebrew reads ''removed
      everlasting disgrace.'''
    reason: alternative_reading
  - marker: b
    text: Greek explicitly says 'giant' and speaks of casting down 'the boast/pride
      of Goliath,' clarifying that the verse refers to David's defeat of Goliath.
