lexical_decisions:
- source_word: בנעוריו
  chosen: In his youth
  alternatives:
  - In his young manhood
  - While he was young
  lexicon: HALOT
  rationale: The Hebrew refers to David's youthful period. 'In his youth' is natural
    modern English and matches the temporal force without over-specifying age.
- source_word: הכה גבור
  chosen: he struck down a warrior
  alternatives:
  - he struck a mighty man
  - he killed a giant
  lexicon: HALOT
  rationale: The Hebrew reads 'struck a warrior/mighty man,' while the Greek explicitly
    interprets the referent as a giant. Because the Hebrew witness is primary here,
    'warrior' preserves the lexical sense of גבור; 'struck down' reflects the lethal
    outcome implied by context and confirmed by the Greek parallel.
- source_word: ויסר חרפת עולם
  chosen: and removed everlasting disgrace
  alternatives:
  - and took away eternal reproach
  - and removed reproach from the people
  lexicon: HALOT
  rationale: The Hebrew literally speaks of removing 'everlasting reproach/disgrace.'
    The Greek has 'reproach from the people,' likely an interpretive or variant expansion.
    Since the Hebrew survives, the main text follows it. 'Disgrace' is chosen for
    readable modern English; 'everlasting' preserves עולם without softening.
- source_word: בהניפו ידו
  chosen: when he raised his hand
  alternatives:
  - when he lifted his hand
  - by brandishing his hand
  lexicon: HALOT
  rationale: This infinitive construct gives the circumstance of David's action. 'Raised
    his hand' is idiomatic and fits the narrative action of preparing the sling.
- source_word: על קלע
  chosen: with the sling
  alternatives:
  - against the sling-stone
  - with a sling
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat compressed. The Greek clarifies the sense
    with 'in the stone of a sling/sling-stone.' English 'with the sling' best captures
    the instrument in smooth idiom while remaining anchored in the Hebrew action.
- source_word: וישבר תפארת גלית
  chosen: he shattered the glory of Goliath
  alternatives:
  - he broke the pride of Goliath
  - he cast down the boast of Goliath
  lexicon: HALOT
  rationale: תפארת can denote glory, splendor, or boastful pride. The Greek γαυρίαμα
    points toward 'pride/boast.' The Hebrew wording, however, supports 'glory' broadly.
    'Shattered the glory of Goliath' preserves the Hebrew image while allowing the
    humiliating sense to be heard in context.
