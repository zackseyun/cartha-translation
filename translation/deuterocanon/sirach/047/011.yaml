theological_decisions:
- issue: Nature of God's action toward David's sin
  chosen_reading: The verse speaks of the LORD passing over/remitting David's transgression
    without expanding the theology beyond the text.
  alternative_readings:
  - The LORD forgave his sin
  - The LORD removed his sins
  rationale: The Hebrew and Greek both indicate divine remission, but the Hebrew image
    is retained in the main text. No broader doctrinal claim about atonement or unconditional
    approval is imported.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Dynastic grant wording
  chosen_reading: Render the Hebrew as 'a statute of kingship' in the main text.
  alternative_readings:
  - a covenant of kings
  - a royal covenant
  rationale: The Greek parallel reads διαθήκην βασιλέων ('covenant of kings'), but
    the extant Hebrew witness has חוק ממלכת. Because Hebrew is the primary witness
    where it survives, the main text follows Hebrew while preserving the Greek-aligned
    alternative in a footnote.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    alternatives in footnotes where significant.
