translation:
  text: The LORD also passed over his transgression, and exalted his horn forever;
    he gave him a statute of kingship, and established his throne as far as Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''The Lord removed his sins.'' The Hebrew more literally says ''passed
      over his transgression.'''
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''and gave him a covenant of kings, and a throne of glory in Israel.''
      The Hebrew reads ''a statute of kingship'' and ''established his throne as far
      as Jerusalem.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  - Lord
  lexicon: HALOT
  rationale: Follows project default for the divine name, preserving the Hebrew source
    while matching established English convention for YHWH.
- source_word: העביר
  chosen: passed over
  alternatives:
  - removed
  - took away
  - forgave
  lexicon: HALOT
  rationale: The Hebrew verb literally suggests causing to pass away/pass over. 'Passed
    over' preserves the Hebrew image better than the Greek-aligned 'removed,' while
    still conveying divine pardon in context.
- source_word: פשעו
  chosen: his transgression
  alternatives:
  - his sin
  - his rebellion
  - his offense
  lexicon: HALOT
  rationale: פשע often carries the sense of transgression or rebellion rather than
    the more general 'sin.' 'Transgression' is both accurate and readable here.
- source_word: וירם
  chosen: and exalted
  alternatives:
  - raised high
  - lifted up
  lexicon: HALOT
  rationale: A standard rendering for רום in honor/status contexts; it fits the royal
    idiom that follows.
- source_word: קרנו
  chosen: his horn
  alternatives:
  - his strength
  - his power
  lexicon: HALOT
  rationale: The Hebrew metaphor 'horn' is common for royal strength and honor. It
    should be preserved in the main text rather than flattened, since the image remains
    intelligible in biblical English.
- source_word: לעולם
  chosen: forever
  alternatives:
  - for eternity
  - for all time
  lexicon: HALOT
  rationale: Natural English rendering of the Hebrew idiom, matching the enduring
    dynastic sense in context.
- source_word: חוק ממלכת
  chosen: a statute of kingship
  alternatives:
  - a royal decree
  - a law of kingship
  - a covenant of kingship
  lexicon: HALOT
  rationale: The Hebrew text reads חוק ממלכת, literally something like 'statute of
    kingship/kingdom.' 'Statute of kingship' stays close to the Hebrew without importing
    the Greek's different reading 'covenant of kings.'
- source_word: וכסאו הכין
  chosen: and established his throne
  alternatives:
  - and made his throne firm
  - and prepared his throne
  lexicon: HALOT
  rationale: הכין in this context means to make firm or establish. 'Established' is
    idiomatic and preserves the dynastic sense.
- source_word: עד ירושלים
  chosen: as far as Jerusalem
  alternatives:
  - in Jerusalem
  - unto Jerusalem
  - over Jerusalem
  lexicon: HALOT
  rationale: The Hebrew preposition עד normally means 'up to/as far as.' This is somewhat
    awkward in English and may reflect a textual issue when compared with the Greek
    'in Israel,' but the translation should remain anchored in the Hebrew witness.
