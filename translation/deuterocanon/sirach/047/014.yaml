theological_decisions:
- issue: Temple language and divine-name idiom
  chosen_reading: Retain 'house for his name' rather than interpretively replacing
    it with 'temple for the LORD.'
  alternative_readings:
  - temple for the LORD
  - house in honor of the LORD
  rationale: 'The Hebrew idiom is theologically significant: the sanctuary is associated
    with God''s name dwelling there, not with a crude notion of containing God. Preserving
    the idiom maintains biblical-theological nuance without importing extra wording
    absent from the verse.'
  doctrine_reference: Translation philosophy §§1, 5
- issue: Force of לעד
  chosen_reading: Translate as 'forever' in the main text.
  alternative_readings:
  - for all time
  - perpetually
  rationale: The verse praises Solomon's temple in idealized permanence language.
    Rendering it straightforwardly as 'forever' preserves the text's rhetoric without
    attempting to resolve historical tension created by the temple's later destruction.
  doctrine_reference: Translation philosophy §3
