- issue: Use of Hebrew over divergent Greek parallel in a recovered Sirach verse
  chosen_reading: Translate the extant Hebrew main line as the base text, while allowing
    the Greek to inform ambiguous imagery.
  alternative_readings:
  - A Greek-based rendering emphasizing the soul covering the earth and filling it
    with enigmatic parables
  rationale: Project policy gives primacy to the surviving Hebrew of Sirach where
    extant. The Greek here appears substantially different, likely reflecting a variant
    Vorlage or expansion. Therefore the main text follows the Hebrew, but the Greek
    is preserved in a footnote because it represents a major alternative ancient reading.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
