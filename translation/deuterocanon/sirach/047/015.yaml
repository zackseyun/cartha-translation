translation:
  text: How wise you were in your youth, and instruction overflowed like the Nile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a substantially different reading here: ''Your soul covered the
      earth, and you filled it with parables of riddles.'' This likely reflects a
      different Hebrew Vorlage or a divergent textual tradition.'
    reason: alternative_reading
lexical_decisions:
- source_word: מה
  chosen: How
  alternatives:
  - How great
  - What
  lexicon: HALOT
  rationale: 'Exclamatory מה introduces admiration rather than a question here, so
    ''How'' best captures the sense: ''How wise you were...''.'
- source_word: חכמת
  chosen: wise you were
  alternatives:
  - your wisdom was great
  - you became wise
  lexicon: HALOT
  rationale: From חכם in a stative/exclamatory sense. English idiom prefers predicative
    wording rather than the more wooden 'your wisdom was...'.
- source_word: בנעוריך
  chosen: in your youth
  alternatives:
  - when you were young
  - in your young days
  lexicon: HALOT
  rationale: A straightforward temporal phrase referring to Solomon's early life;
    'in your youth' is natural and sufficiently formal.
- source_word: ותצף
  chosen: overflowed
  alternatives:
  - floated
  - surged
  - was covered
  lexicon: HALOT
  rationale: The Hebrew verb suggests overflowing or surging up. The Greek parallel
    speaks of filling abundantly, which supports an image of profuse abundance rather
    than mere motion on the surface.
- source_word: כיאר
  chosen: like the Nile
  alternatives:
  - like a river
  - like the River
  lexicon: HALOT
  rationale: יאר in biblical and post-biblical Hebrew commonly denotes the Nile. Given
    wisdom literature's stock image of abundant waters, 'like the Nile' preserves
    the specific allusion better than the generic 'river'.
- source_word: מוסר
  chosen: instruction
  alternatives:
  - discipline
  - teaching
  - wisdom
  lexicon: HALOT
  rationale: מוסר often carries the sense of formative instruction or discipline.
    Here, in praise of Solomon's wisdom, 'instruction' best fits the idea of cultivated
    understanding overflowing from him. The Greek parallel's different wording ('parables
    of riddles') suggests textual divergence, but the Hebrew witness should govern
    where extant.
