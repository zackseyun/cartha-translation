theological_decisions:
- issue: How explicitly to state David's election/distinction in the simile
  chosen_reading: Render the comparison as David being 'from Israel' in a context
    that implies being set apart, rather than expanding to a doctrinal paraphrase
    such as 'chosen by God from Israel.'
  alternative_readings:
  - so David was chosen from Israel
  - so David was set apart from among the sons of Israel
  rationale: The verse itself compares David to a consecrated sacrificial portion,
    implying distinction and honor, but it does not explicitly mention God choosing
    him in this line. The translation preserves the theological force of election
    without importing wording absent from the source.
  doctrine_reference: Preserve theological tension rather than resolve it; never import
    doctrinal claims the text does not make.
