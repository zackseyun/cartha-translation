translation:
  text: As the fat set apart from the sacred offering, so was David from Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'As the fat set apart from the offering of well-being,
      so David was set apart from among the sons of Israel.' The Greek reads 'from
      the offering of well-being' and makes the separative sense explicit.
    reason: alternative_reading
  - marker: b
    text: The Hebrew wording is terse at 'from the sacred offering'; the Greek parallel
      helps clarify the sacrificial comparison.
    reason: textual_variant
lexical_decisions:
- source_word: כחלב
  chosen: as the fat
  alternatives:
  - like the fat
  - as choice fat
  lexicon: HALOT
  rationale: חֵלֶב ordinarily denotes fat. The comparison is cultic and concrete,
    not metaphorical enough to justify an abstract rendering like 'best part' in the
    main text, though that sense is implied by the simile.
- source_word: מורם
  chosen: set apart
  alternatives:
  - lifted up
  - offered up
  - separated
  lexicon: HALOT
  rationale: The passive participial form from רום in sacrificial context points to
    something elevated/removed as a designated portion. 'Set apart' communicates the
    cultic distinction clearly in modern English, while the Greek ἀφωρισμένον ('separated')
    supports this sense.
- source_word: מקדש
  chosen: from the sacred offering
  alternatives:
  - from a holy thing
  - from the sanctuary offering
  - from what is consecrated
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed. Taken with the Greek σωτηρίου, the
    line refers to sacrificial meat/portion rather than the physical sanctuary. 'Sacred
    offering' preserves the cultic sense without overcommitting to a narrower technical
    term that the Hebrew here does not fully spell out.
- source_word: כן דוד מישראל
  chosen: so was David from Israel
  alternatives:
  - so David was set apart from Israel
  - so David from among Israel
  - so was David among the sons of Israel
  lexicon: HALOT
  rationale: The comparison marks David as distinguished/selected out of Israel. The
    Hebrew is terse; the Greek explicitly has ἀπὸ τῶν υἱῶν Ἰσραήλ, supporting 'from
    Israel' as an elative/separative sense. The English keeps the simile concise while
    preserving the implied election.
