translation:
  text: A broad folly and lacking understanding was Rehoboam, who caused the people
    to revolt by his counsel, until one arose—may there be no remembrance of him—Jeroboam
    son of Nebat, who sinned and caused Israel to sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew witness here is compressed and the verse division appears unstable;
      the Greek parallel preserves a fuller wording, including 'and gave Ephraim a
      way of sin.' That fuller clause is not carried into the main text because it
      is not explicit in the surviving Hebrew line here.
    reason: textual_variant
  - marker: b
    text: Or 'divided the people by his counsel.' The underlying Hebrew is difficult,
      and the Greek parallel supports the sense that Rehoboam caused the people's
      defection through his policy.
    reason: lexical_alternative
lexical_decisions:
- source_word: רחב אולת
  chosen: a people’s folly
  alternatives:
  - great folly
  - broad folly
  - folly in abundance
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult and likely compressed; with the
    Greek parallel λαοῦ ἀφροσύνην, the sense is that what followed from Solomon's
    line was folly affecting the people. Rendering the phrase idiomatically as 'a
    people’s folly' preserves the corporate effect without overcommitting to a precise
    reconstruction of the damaged/compressed Hebrew.
- source_word: חסר בינה
  chosen: lacking understanding
  alternatives:
  - deficient in understanding
  - without discernment
  lexicon: HALOT
  rationale: A straightforward rendering of the Hebrew phrase, matching the Greek
    ἐλαττούμενον συνέσει. 'Lacking understanding' is natural modern English and preserves
    the evaluative force.
- source_word: רחבעם
  chosen: Rehoboam
  rationale: Personal name transliterated by standard English convention, per project
    philosophy.
- source_word: הפריע בעצתו עם
  chosen: led the people into revolt by his counsel
  alternatives:
  - divided the people by his counsel
  - caused the people to rebel through his advice
  lexicon: HALOT
  rationale: 'The Hebrew verb is difficult in this witness, but the Greek ὃς ἀπεστέτησεν
    λαὸν ἐκ βουλῆς αὐτοῦ clarifies the sense: Rehoboam caused the people''s defection
    through his policy/counsel. ''Led the people into revolt'' captures the political
    rupture more clearly than a wooden ''separated''.'
- source_word: ירבעם בן נבט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam son of Nabat
  rationale: Name transliterated in standard biblical English form; 'Nebat' follows
    common English convention for נבט/Ναβάτ.
- source_word: חטא והחטיא את ישראל
  chosen: sinned and caused Israel to sin
  alternatives:
  - committed sin and made Israel sin
  - sinned and led Israel into sin
  lexicon: HALOT
  rationale: This preserves the Hebrew causative distinction and aligns with the Greek
    ἐξήμαρτεν ... καὶ ἔδωκεν ... ὁδὸν ἁμαρτίας in overall sense. 'Caused Israel to
    sin' is concise and faithful.
