    text: καὶ κατέλιπεν μετʼ αὐτὸν ἐκ τοῦ σπέρματος αὐτοῦ λαοῦ ἀφροσύνην, ἐλαττούμενον
      συνέσει, Ῥοβοάμ, ὃς ἀπεστέτησεν λαὸν ἐκ βουλῆς αὐτοῦ, καὶ Ἰεροβοὰμ υἱὸν Ναβάτ,
