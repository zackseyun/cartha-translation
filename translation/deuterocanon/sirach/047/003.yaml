translation:
  text: He played with young lions as with a kid, and with bears as with calves of
    Bashan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and with bears as with lambs of sheep,'' making the second comparison
      more explicit than the Hebrew ''the young of Bashan.'''
    reason: alternative_reading
  - marker: b
    text: Bashan was known for its strong, well-fed livestock; the Hebrew likely evokes
      tame young animals by that regional image.
    reason: cultural_note
lexical_decisions:
- source_word: לכפירים
  chosen: with young lions
  alternatives:
  - with lions
  - among young lions
  lexicon: HALOT
  rationale: כפירים denotes young lions/lion cubs rather than lions generically. The
    prefixed ל is best taken here in a comparative/associative sense within the poetic
    line, supported by the Greek ἐν λέουσιν; English 'with young lions' is natural
    and preserves the image.
- source_word: שחק
  chosen: played
  alternatives:
  - sported
  - frolicked
  - toyed
  lexicon: HALOT
  rationale: The verb conveys playful action. 'Played' is the clearest modern English
    equivalent and matches the simile's tone without becoming colloquial.
- source_word: כגדי
  chosen: as with a kid
  alternatives:
  - like a young goat
  - as with a goat-kid
  lexicon: HALOT
  rationale: גדי is a young goat, 'kid.' Because the syntax compares David's handling
    of lions to his handling of a small domestic animal, 'as with a kid' preserves
    the comparative force and compactness.
- source_word: ולדבים
  chosen: and with bears
  alternatives:
  - and among bears
  lexicon: HALOT
  rationale: The conjunction plus preposition continues the parallel image. 'With
    bears' reads smoothly in English and aligns with the first colon.
- source_word: כבני בשן
  chosen: as with the young of Bashan
  alternatives:
  - like the offspring of Bashan
  - as with lambs of Bashan
  - as with sheep's lambs
  lexicon: HALOT
  rationale: The Hebrew literally reads 'as sons/young of Bashan.' The Greek interprets
    this as 'lambs of sheep,' likely smoothing an idiom or reading a related pastoral
    image. Since the Hebrew survives and is primary, the translation keeps the more
    literal 'young of Bashan,' understanding Bashan as a region famed for well-fed
    livestock. This preserves the Hebrew wording while allowing the comparison to
    domesticated young animals.
