translation:
  text: Solomon reigned in days of peace, and God gave him rest all around, so that
    he might build a house for his name and prepare a sanctuary forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Hebrew line is shorter: ''Solomon reigned in days of peace,
      and God gave him rest on every side.'' The Greek parallel adds the purpose clause
      about building a house for God''s name and preparing a sanctuary forever.'
    reason: textual_variant
lexical_decisions:
- source_word: שְׁלֹמֹה
  chosen: Solomon
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: מלך
  chosen: reigned
  alternatives:
  - was king
  lexicon: HALOT
  rationale: Verbal form is best rendered as an action, 'reigned,' in natural English.
- source_word: בימי שלוה
  chosen: in days of peace
  alternatives:
  - in peaceful days
  - in days of tranquility
  lexicon: HALOT
  rationale: The Hebrew phrase denotes a period characterized by peace or tranquility.
    'Days of peace' is clear and preserves the temporal idiom.
- source_word: ואל הניח לו מסביב
  chosen: and God gave him rest on every side
  alternatives:
  - and God let him rest all around
  - and God granted him quiet on every side
  lexicon: HALOT; LSJ
  rationale: The Hebrew as transmitted appears slightly irregular ('ואל'), but the
    Greek parallel explicitly reads 'to whom God gave rest all around' (ᾧ ὁ θεὸς κατέπαυσεν
    κυκλόθεν). Because the task requires using the Greek parallel as actual translation
    input, the subject 'God' is made explicit in English. 'On every side' is idiomatic
    for מסביב / κυκλόθεν.
- source_word: ᾧ ὁ θεὸς κατέπαυσεν κυκλόθεν
  chosen: God gave him rest on every side
  alternatives:
  - God caused him to rest all around
  lexicon: LSJ
  rationale: The Greek confirms the likely sense of the Hebrew line and clarifies
    the subject. 'Gave him rest' is idiomatic and fits biblical usage.
- source_word: ἵνα στήσῃ οἶκον ἐπʼ ὀνόματι αὐτοῦ
  chosen: so that he might build a house for his name
  alternatives:
  - so that he might establish a house for his name
  lexicon: LSJ
  rationale: This clause is present in the Greek parallel but absent from the extant
    Hebrew line in Zone 1. Since the prompt instructs that the Greek parallel be used
    as actual translation input, it is included in the main text. 'Build a house for
    his name' reflects temple-building language naturally in English.
- source_word: καὶ ἑτοιμάσῃ ἁγίασμα εἰς τὸν αἰῶνα
  chosen: and prepare a sanctuary forever
  alternatives:
  - and prepare a holy place forever
  - and make ready a sanctuary for eternity
  lexicon: LSJ
  rationale: The Greek continues the purpose clause. 'Sanctuary' is the most natural
    rendering of ἁγίασμα here. 'Forever' preserves εἰς τὸν αἰῶνα without over-expansion.
