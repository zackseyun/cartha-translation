lexical_decisions:
- source_word: כסלך
  chosen: your strength
  alternatives:
  - your loins
  - your vigor
  - your folly
  lexicon: HALOT
  rationale: In context the rebuke concerns sexual surrender; the Greek parallel has
    τὰς λαγόνας σου ('your loins'). The Hebrew form is difficult, but 'your strength'
    best captures the idiomatic sense without becoming overly anatomical in English,
    while preserving the idea of virile power yielded to women.
- source_word: ותתן
  chosen: you gave
  alternatives:
  - you handed over
  - you yielded
  lexicon: HALOT
  rationale: A straightforward rendering of נתן. 'Gave' keeps the directness of the
    accusation; the nuance of yielding is supplied by context.
- source_word: לנשים
  chosen: to women
  alternatives:
  - for women
  lexicon: HALOT
  rationale: The preposition ל is naturally rendered 'to' here, indicating the direction
    of what was given over.
- source_word: ותמשילם
  chosen: let them rule
  alternatives:
  - you made them rule
  - you allowed them dominion
  lexicon: HALOT
  rationale: From משל in the causative sense of causing or allowing to rule. Because
    the object suffix refers back to 'women,' English must make the implied object
    explicit as 'them.' 'Let them rule' is idiomatic and preserves the reproach.
- source_word: בגויתך
  chosen: over your body
  alternatives:
  - over your person
  - in your body
  - over your flesh
  lexicon: HALOT
  rationale: גויה denotes the body/corpse; here plainly the physical person. The Greek
    parallel ἐν τῷ σώματί σου supports 'body.' 'Over your body' expresses the domination
    implied by the verb more clearly in English than a wooden 'in your body.'
