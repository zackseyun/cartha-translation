theological_decisions:
- issue: Relationship between the Hebrew image of a צניף and the Greek parallel's
    'diadem of glory'
  chosen_reading: Main text follows the Hebrew witness with 'turban,' while preserving
    the Greek royalizing alternative in a footnote.
  alternative_readings:
  - diadem
  - diadem of glory
  rationale: The project prioritizes the Hebrew for extant Sirach Hebrew, but the
    Greek is an actual translation input and may reflect an interpretive or variant
    tradition emphasizing kingship. Keeping 'turban' in the main text respects source
    primacy; the footnote preserves the significant alternative.
  doctrine_reference: Translation philosophy §1, §3
