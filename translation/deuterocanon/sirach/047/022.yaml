translation:
  text: But God will not abandon mercy, nor let any of his words fall to the ground.
    He will not cut off offspring and descendant from his chosen one, and he will
    not destroy the seed of the one who loved him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''But the Lord will certainly not abandon his mercy, and
      he will certainly not destroy any of his works.'' The Hebrew here instead reads,
      ''nor let any of his words fall to the ground.'''
    reason: textual_variant
  - marker: b
    text: Hebrew 'his chosen one' may be read from a form that could be taken as plural
      ('his chosen ones'), but the Greek parallel supports the singular.
    reason: alternative_reading
lexical_decisions:
- source_word: אל
  chosen: God
  alternatives:
  - the Lord
  lexicon: HALOT
  rationale: The Hebrew reads אל, a generic divine title rather than the Tetragrammaton.
    'God' reflects the Hebrew witness directly, while the Greek parallel has Κύριος
    ('Lord'). Because the Hebrew is the primary witness here, 'God' is preferred in
    the main text.
- source_word: יטוש
  chosen: abandon
  alternatives:
  - forsake
  - leave
  lexicon: HALOT
  rationale: '''Abandon'' gives the sense of not casting off or forsaking, in clear
    modern English.'
- source_word: חסד
  chosen: mercy
  alternatives:
  - steadfast love
  - kindness
  lexicon: HALOT
  rationale: In this context, with God as subject and covenantal preservation in view,
    'mercy' fits the immediate sense well and aligns with the Greek ἔλεος. 'Steadfast
    love' is possible, but 'mercy' is more concise and matches the parallel witness.
- source_word: ולא יפיל מדבריו ארצה
  chosen: nor let any of his words fall to the ground
  alternatives:
  - nor cast any of his words to the ground
  - nor let anything from his words fail
  lexicon: HALOT
  rationale: This Hebrew idiom is well represented by 'let ... fall to the ground,'
    conveying that God's spoken word does not fail. 'Any of his words' makes explicit
    the distributive sense. The Greek parallel differs here ('nor be corrupted from
    his works'), so the Hebrew idiom is retained and the divergence noted in a footnote.
- source_word: לא יכרית
  chosen: He will not cut off
  alternatives:
  - he will not wipe out
  - he will not exterminate
  lexicon: HALOT
  rationale: The verb commonly denotes cutting off or eliminating. 'Cut off' preserves
    the covenantal and dynastic nuance without over-paraphrase.
- source_word: לבחיריו
  chosen: from his chosen one
  alternatives:
  - from his chosen ones
  - for his chosen one
  lexicon: HALOT
  rationale: The Hebrew consonantal form could be read as plural, but the Greek parallel
    has singular ἐκλεκτοῦ αὐτοῦ ('his chosen one'), and the context concerns the Davidic
    line in the singular. Thus singular is preferred.
- source_word: נין ונכד
  chosen: offspring and descendant
  alternatives:
  - son and grandson
  - posterity
  lexicon: HALOT
  rationale: The pair denotes continuing lineage across generations. 'Offspring and
    descendant' preserves the twofold expression without forcing an overly narrow
    biological sequence in English.
- source_word: זרע
  chosen: seed
  alternatives:
  - offspring
  - descendants
  lexicon: HALOT
  rationale: '''Seed'' is a standard biblical rendering and preserves the dynastic/covenantal
    resonance. It remains natural enough here in modern English.'
- source_word: אובהו
  chosen: the one who loved him
  alternatives:
  - his beloved
  - the one who loves him
  lexicon: HALOT
  rationale: The form is best taken as referring to one who loved God; the Greek parallel
    supports this with τοῦ ἀγαπήσαντος αὐτόν, an aorist participle. This likely points
    to David in context.
- source_word: ישמיד
  chosen: destroy
  alternatives:
  - annihilate
  - wipe out
  lexicon: HALOT
  rationale: '''Destroy'' is strong and direct, matching the force of the Hebrew without
    sounding overly technical.'
