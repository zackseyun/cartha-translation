theological_decisions:
- issue: Divine title in the opening clause
  chosen_reading: God
  alternative_readings:
  - the Lord
  rationale: The primary Hebrew witness has אל ('God'), while the Greek parallel reads
    Κύριος ('Lord'). Following original-language primacy for this verse's surviving
    Hebrew, the main text uses 'God,' while preserving the Greek-based alternative
    in a footnote because the divergence is significant.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Contested terms table for κύριος / YHWH not directly applicable because Hebrew
    here is אל, not YHWH.'
- issue: Number of 'chosen' in the dynastic promise
  chosen_reading: his chosen one
  alternative_readings:
  - his chosen ones
  rationale: Although the Hebrew form could suggest a plural reading in isolation,
    the immediate context is the Davidic dynasty and the Greek parallel strongly supports
    the singular. The singular better fits the verse's focus on one elect royal figure
    whose line continues.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; here the ambiguity is limited and the parallel source clarifies the likely
    sense.'
