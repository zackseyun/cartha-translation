lexical_decisions:
- source_word: ותתן מום
  chosen: You put a blemish
  alternatives:
  - You gave a blemish
  - You brought a stain
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'you gave a blemish.' In English, 'put
    a blemish' communicates the causative sense naturally while preserving the concrete
    image of disgrace. The Greek μῶμον confirms the sense of a defect/stain rather
    than a vague dishonor.
- source_word: בכבודך
  chosen: on your honor
  alternatives:
  - on your glory
  - in your honor
  lexicon: HALOT
  rationale: כבוד can mean 'glory' or 'honor.' In this rebuke to Solomon, 'honor'
    better conveys personal royal dignity in idiomatic English. The Greek δόξα supports
    either, but 'honor' fits the moral context.
- source_word: ותחלל
  chosen: and profaned
  alternatives:
  - and defiled
  - and desecrated
  lexicon: HALOT
  rationale: חלל in the piel commonly means to profane or defile what should be holy.
    'Profaned' preserves the strong moral-religious force, fitting the context of
    sexual and covenantal violation.
- source_word: יצועיך
  chosen: your bed
  alternatives:
  - your couch
  - your marriage bed
  lexicon: HALOT
  rationale: The Hebrew refers literally to a bed or couch, often with sexual connotations.
    'Your bed' is concise and preserves the metaphor; the sexual sense is clear from
    context. The Greek parallel has τὸ σπέρμα σου ('your seed'), suggesting a divergent
    Vorlage or interpretive rendering, but the Hebrew witness here is clear and primary.
- source_word: להביא אף
  chosen: bringing wrath
  alternatives:
  - to bring anger
  - so as to bring wrath
  lexicon: HALOT
  rationale: The infinitive expresses result or consequence. 'Bringing wrath' gives
    smooth English while retaining the causal force. אף here is best rendered 'wrath'
    rather than mere irritation.
- source_word: על צאצאיך
  chosen: on your offspring
  alternatives:
  - on your descendants
  - on your children
  lexicon: HALOT
  rationale: צאצאים denotes descendants/offspring. 'Offspring' is broad enough to
    include the dynastic consequences in view. The Greek τέκνα σου ('your children')
    is slightly narrower; the Hebrew is preferred.
- source_word: ואנחה
  chosen: and groaning
  alternatives:
  - and a sigh
  - and anguish
  lexicon: HALOT
  rationale: אנחה denotes groaning, sighing, or lament. 'Groaning' best matches the
    weight of the consequence and works well in parallel with 'wrath.'
- source_word: על משכבך
  chosen: on your couch
  alternatives:
  - on your bed
  - over your bed
  lexicon: HALOT
  rationale: משכב is a lying-place, bed, or couch. Since 'bed' was already used for
    יצועיך, 'couch' avoids awkward repetition while preserving the image. The phrase
    likely refers to personal anguish in later life.
