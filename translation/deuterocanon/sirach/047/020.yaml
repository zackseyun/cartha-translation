theological_decisions:
- issue: Relation of the final clause to Solomon's sin and its consequences
  chosen_reading: 'The verse describes the consequences of Solomon''s sexual/marital
    unfaithfulness: wrath upon his descendants and personal groaning in his later
    life.'
  alternative_readings:
  - The final clause could be read more loosely as lament over his folly rather than
    groaning on his bed/couch.
  rationale: The Hebrew text explicitly mentions 'your bed/couch' in both cola, creating
    a deliberate linkage between sexual misconduct and its consequences. The Greek's
    final phrase differs ('upon your folly'), so the Hebrew is followed as the primary
    witness, with the Greek preserved in a footnote as an alternative textual form.
