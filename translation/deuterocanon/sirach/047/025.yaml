translation:
  text: He gave Ephraim a stumbling block, to drive them from their land; and his
    sin grew very great, and he sold himself to every evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''their sins multiplied greatly ... and they sought out every wickedness,
      until vengeance came upon them.'' The Hebrew witness here is more singular and
      shorter.'
    reason: alternative_reading
lexical_decisions:
- source_word: ויתן
  chosen: He gave over
  alternatives:
  - He gave
  - He handed over
  lexicon: HALOT
  rationale: The basic sense is 'and he gave,' but in context with 'to a stumbling
    block' it carries the force of giving over into harmful consequence. 'Gave over'
    preserves the causative nuance without overparaphrasing.
- source_word: לאפרים
  chosen: Ephraim
  alternatives:
  - to Ephraim
  - for Ephraim
  lexicon: HALOT
  rationale: Kept as the tribal/northern-kingdom name rather than interpreting it
    as 'Israel,' since the Hebrew explicitly names Ephraim.
- source_word: מכשול
  chosen: a stumbling block
  alternatives:
  - an obstacle
  - a cause of downfall
  lexicon: HALOT
  rationale: '''Stumbling block'' is the most transparent rendering of the Hebrew
    and preserves the metaphor of something causing downfall. It also fits the following
    infinitive clause about expulsion from the land.'
- source_word: להדיחם
  chosen: to drive them
  alternatives:
  - to banish them
  - to thrust them away
  lexicon: HALOT
  rationale: The verb denotes driving away or causing removal. 'Drive them' is natural
    English and leaves room for the following phrase 'from their land.'
- source_word: מאדמתם
  chosen: from their land
  alternatives:
  - from their soil
  - from their ground
  lexicon: HALOT
  rationale: '''Land'' is idiomatic and suits the covenantal-national sense better
    than the more physical ''soil'' or ''ground.'''
- source_word: ותגדל חטאתו מאד
  chosen: his sin grew very great
  alternatives:
  - his sin became very great
  - their sins multiplied greatly
  lexicon: HALOT
  rationale: The Hebrew as given is singular ('his sin'), likely referring to the
    king just mentioned in context. The Greek parallel has plural ('their sins multiplied
    greatly'), which suggests a broader communal application, but the main text follows
    the extant Hebrew witness while preserving the Greek-based alternative in a footnote.
- source_word: ולכל רעה התמכר
  chosen: he sold himself to every evil
  alternatives:
  - he gave himself over to every evil
  - he became addicted to every evil
  lexicon: HALOT
  rationale: The hitpael of מכר literally evokes selling oneself. 'Sold himself to
    every evil' preserves the metaphor and moral force better than the more interpretive
    'became addicted.'
