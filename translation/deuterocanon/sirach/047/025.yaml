theological_decisions:
- issue: Singular Hebrew versus plural Greek in the second colon
  chosen_reading: 'Follow the Hebrew singular in the main text: ''his sin grew very
    great,'' while preserving the Greek plural in a footnote.'
  alternative_readings:
  - their sins multiplied greatly
  rationale: For Sirach, surviving Hebrew is primary where extant. Here the Cairo
    Geniza Hebrew points to a singular subject, likely the ruler in context, while
    the Greek reflects a pluralized communal reading. Because the source validation
    flags a major mismatch and the Greek is a real parallel witness, the alternative
    should be preserved for auditability.
  doctrine_reference: 'PHILOSOPHY.md: Original-language primacy; preserve source uncertainty
    honestly'
- issue: Interpretation of moral agency in התמכר
  chosen_reading: Use the self-enslaving metaphor 'sold himself to every evil.'
  alternative_readings:
  - gave himself over to every evil
  rationale: This keeps the Hebrew image of self-sale into wickedness without importing
    later doctrinal categories. It is morally weighty but still readable modern English.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; do not paraphrase beyond
    the source'
