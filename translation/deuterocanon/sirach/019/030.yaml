id: SIR.19.30
reference: Sirach 19:30
source:
  edition: lxx-swete-1909
  text: στολισμὸς ἀνδρὸς καὶ γέλως ὀδόντων καὶ βήματα ἀνθρώπου ἀναγγέλλει τὰ περὶ
    αὐτοῦ.
  language: Greek
  pages:
  - 699
  confidence: high
  validation: minor_mismatch
translation:
  text: A man's attire, and the laughter of his teeth, and a person's steps proclaim
    what is about him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the smile of his teeth.' The Greek literally says 'the laughter of teeth,'
      an idiom for facial expression shown in the teeth.
    reason: lexical_alternative
lexical_decisions:
- source_word: στολισμὸς
  chosen: attire
  alternatives:
  - adornment
  - dress
  - appearance
  lexicon: LSJ
  rationale: The noun denotes adornment or outward arrangement. 'Attire' fits the
    context of visible external presentation better than the more abstract 'adornment,'
    while avoiding overinterpretation toward moral 'appearance.'
- source_word: ἀνδρὸς
  chosen: man's
  alternatives:
  - a man's
  - of a man
  lexicon: LSJ
  rationale: The Greek is singular masculine. Per gender-accurate policy, 'man's'
    preserves the source form rather than neutralizing it. In this wisdom context
    it functions representatively, but the singular masculine should remain visible.
- source_word: γέλως ὀδόντων
  chosen: the laughter of his teeth
  alternatives:
  - the smile of his teeth
  - the showing of the teeth
  lexicon: LSJ
  rationale: Literally the phrase is 'laughter of teeth.' This likely refers to smiling
    or the expression shown in the teeth, but the Greek image is unusual enough that
    a relatively literal rendering is preferable in the main text. A smoother alternative
    is preserved in a footnote.
- source_word: βήματα ἀνθρώπου
  chosen: a person's steps
  alternatives:
  - a man's steps
  - the gait of a person
  lexicon: LSJ
  rationale: βήματα are steps or gait. 'Steps' is the most direct rendering. ἀνθρώπου
    is more general than ἀνδρός, so 'a person's' reflects the lexical shift in the
    Greek.
- source_word: ἀναγγέλλει
  chosen: proclaim
  alternatives:
  - announce
  - make known
  - reveal
  lexicon: LSJ
  rationale: The verb means to report or make known. 'Proclaim' preserves the declarative
    force without sounding overly technical.
- source_word: τὰ περὶ αὐτοῦ
  chosen: what is about him
  alternatives:
  - the things concerning him
  - what concerns him
  - what he is like
  lexicon: LSJ
  rationale: The phrase is literally 'the things concerning him.' 'What is about him'
    keeps the broad sense and avoids narrowing it either to reputation alone or to
    character alone.
