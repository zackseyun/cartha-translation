id: SIR.19.27
reference: Sirach 19:27
source:
  edition: lxx-swete-1909
  text: συγκύφων πρόσωπον καὶ ἑτεροκωφῶν, ὅπου οὐκ ἐπεγνώσθη προφθάσει σε·
  language: Greek
  pages:
  - 699
  confidence: high
  validation: minor_mismatch
translation:
  text: One who lowers his face and pretends not to hear—where he is not recognized,
    he will get the better of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acts deaf' for 'pretends not to hear'; the Greek participle depicts
      someone feigning deafness or turning a deaf ear.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will outstrip you' / 'he will anticipate you'; the Greek verb means
      to come before someone, here likely in the sense of gaining advantage.
    reason: lexical_alternative
lexical_decisions:
- source_word: συγκύφων
  chosen: lowers
  alternatives:
  - bends down
  - stoops
  - hangs down
  lexicon: LSJ
  rationale: The participle denotes a stooping or bending posture. 'Lowers' fits idiomatic
    English when paired with 'his face' and preserves the bodily gesture without over-literal
    awkwardness.
- source_word: πρόσωπον
  chosen: face
  alternatives:
  - countenance
  lexicon: LSJ
  rationale: The ordinary sense is 'face.' 'Countenance' is possible but too elevated
    for the project's modern-English style.
- source_word: ἑτεροκωφῶν
  chosen: pretends not to hear
  alternatives:
  - acts deaf
  - feigns deafness
  lexicon: LSJ
  rationale: The rare participle suggests behaving as though deaf or turning a deaf
    ear. 'Pretends not to hear' communicates the intentional social pose more naturally
    than the more wooden 'acts deaf.'
- source_word: ὅπου
  chosen: where
  alternatives:
  - when
  - wherever
  lexicon: LSJ
  rationale: 'The adverb is most naturally locative here: ''where he is not recognized.''
    A temporal rendering is possible but less direct from the Greek wording.'
- source_word: οὐκ ἐπεγνώσθη
  chosen: he is not recognized
  alternatives:
  - he is not noticed
  - he is not known
  lexicon: LSJ
  rationale: The passive of ἐπιγινώσκω can mean 'be recognized' or 'be known.' 'Recognized'
    best fits the social setting implied by deceptive bodily behavior.
- source_word: προφθάσει
  chosen: he will get ahead of you
  alternatives:
  - he will outstrip you
  - he will anticipate you
  - he will forestall you
  lexicon: LSJ
  rationale: The verb means to come before, anticipate, or outpace. In this wisdom
    context, 'get ahead of you' captures the practical sense of gaining advantage
    over another without sounding archaic.
