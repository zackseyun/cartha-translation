theological_decisions:
- issue: Moral evaluation of skillful behavior
  chosen_reading: The verse condemns a kind of exact or careful cleverness as unjust,
    rather than praising prudence.
  alternative_readings:
  - The first clause could be read more neutrally as 'There is a precise shrewdness'
    before the second clause supplies the negative judgment.
  rationale: Because αὕτη ἄδικος directly evaluates the preceding πανουργία, the main
    line should preserve the negative thrust. Wisdom context also often contrasts
    true prudence with manipulative cleverness.
- issue: Sense of κρίμα in the final clause
  chosen_reading: Rendered as 'judgment' and left somewhat open.
  alternative_readings:
  - '''justice'''
  - '''verdict'''
  rationale: The Greek does not force a single narrower English equivalent. Preserving
    'judgment' keeps the legal-ethical breadth and avoids importing a more specific
    doctrinal or juridical claim than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
