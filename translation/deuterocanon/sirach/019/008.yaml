translation:
  text: For he has heard you and has guarded himself against you, and in time he will
    hate you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has guarded you' / 'has observed you.' The Greek verb can denote guarding,
      keeping, or watching; here the context favors the idea that the hearer has taken
      note of you and will later turn against you.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκήκοεν
  chosen: has heard
  alternatives:
  - heard
  - has listened
  lexicon: BDAG
  rationale: Perfect tense of ἀκούω indicates a completed act with present relevance;
    'has heard' preserves that force better than simple past.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Connects this warning to the preceding instruction with explanatory force;
    'for' is concise and natural.
- source_word: ἐφυλάξατό
  chosen: has kept watch on
  alternatives:
  - has guarded
  - has observed
  - has kept
  lexicon: BDAG
  rationale: From φυλάσσω in middle form. In this context of overheard speech and
    later hostility, the sense is not protective guarding but keeping an eye on or
    noting someone. 'Has kept watch on' best captures the ominous surveillance implied
    by the following clause.
- source_word: σε
  chosen: you
  lexicon: BDAG
  rationale: Direct object in both clauses; singular 'you' matches the Greek.
- source_word: ἐν καιρῷ
  chosen: in time
  alternatives:
  - at the right time
  - in due time
  - when the time comes
  lexicon: BDAG
  rationale: Idiomatic temporal phrase indicating a future occasion or opportune moment.
    'In time' is compact and preserves the sense that hostility will emerge later.
- source_word: μισήσει
  chosen: he will hate
  alternatives:
  - he will come to hate
  - he will be hostile to
  lexicon: BDAG
  rationale: Future of μισέω. 'Will hate' is the plain lexical sense and should not
    be softened; the verse warns of eventual enmity.
