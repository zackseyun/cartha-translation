theological_decisions:
- issue: Whether ἔμφοβος should be expanded to 'fearing the Lord'
  chosen_reading: fear
  alternative_readings:
  - fearing the Lord
  - reverent
  rationale: The Greek text does not state the object of fear. Given Sirach's broader
    theology, reverential fear of God is plausible, but adding 'the Lord' would import
    content not explicit in this verse. The translation therefore preserves the ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
