translation:
  text: A fool will suffer pangs at the sight of a word, like a woman in labor at
    the sight of a baby.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literally, ''from the face/presence of a word ... as from the face/presence
      of a baby.'' The Greek idiom expresses cause: the fool is seized with pain on
      account of a word, as a woman giving birth is on account of the baby.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ προσώπου
  chosen: because of
  alternatives:
  - at the presence of
  - from before
  - on account of
  lexicon: LSJ
  rationale: The idiom literally means 'from the face/presence of,' but in context
    it expresses cause or occasion. 'Because of' gives clear English while preserving
    the causal force of the Greek idiom.
- source_word: λόγου
  chosen: a word
  alternatives:
  - a matter
  - a report
  - speech
  lexicon: LSJ
  rationale: λόγος can mean 'word,' 'matter,' or 'report.' Here the singular with
    the comparison suggests a spoken word or piece of information that triggers the
    fool's distress. 'A word' is the most direct rendering and keeps the proverb-like
    compactness.
- source_word: ὠδινήσει
  chosen: will suffer pangs
  alternatives:
  - will be in labor
  - will writhe in pain
  - will be distressed
  lexicon: LSJ
  rationale: The verb evokes labor pains or acute anguish. Since the second clause
    explicitly compares the fool to a woman giving birth, 'will suffer pangs' preserves
    the childbirth imagery without awkwardly saying the fool 'will be in labor' literally.
- source_word: μωρός
  chosen: a fool
  alternatives:
  - the foolish man
  - a stupid person
  lexicon: LSJ
  rationale: μωρός is the standard wisdom-term for a morally or practically foolish
    person. 'A fool' is idiomatic, concise, and fits wisdom-literature style.
- source_word: βρέφους
  chosen: a baby
  alternatives:
  - an infant
  - a child
  lexicon: LSJ
  rationale: βρέφος denotes a very young child, especially an infant/newborn. In the
    childbirth comparison, 'baby' is the most natural modern English equivalent.
- source_word: ἡ τίκτουσα
  chosen: a woman in labor
  alternatives:
  - the one giving birth
  - the mother giving birth
  - she who bears
  lexicon: LSJ
  rationale: Literally 'the one giving birth.' 'A woman in labor' is natural English
    and keeps the active childbirth image that explains the metaphor in the first
    clause.
