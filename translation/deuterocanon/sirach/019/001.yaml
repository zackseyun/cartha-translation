translation:
  text: One who works at this will not become rich, and one who despises small things
    will be ruined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel reads, 'A drunken worker will not become rich,' making
      explicit the kind of worker implied by the Hebrew's terse 'worker in this.'
    reason: alternative_reading
  - marker: b
    text: 'The Greek parallel adds the nuance ''little by little'' to the final clause:
      ''the one who despises small things will fall little by little.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: פּוֹעֵל
  chosen: worker
  alternatives:
  - laborer
  - one who works
  lexicon: HALOT
  rationale: The Hebrew participle denotes one who practices or works at something.
    'Worker' is concise and natural English, and it aligns with the Greek parallel
    ἐργάτης.
- source_word: זֹאת
  chosen: in this
  alternatives:
  - this
  - such a thing
  lexicon: HALOT
  rationale: The Hebrew text literally has 'worker of this,' which is somewhat elliptical.
    The Greek parallel specifies the kind of worker as 'a drunken worker' (ἐργάτης
    μέθυσος). Because the Hebrew witness is primary but slightly terse, 'in this'
    preserves the demonstrative without over-importing the Greek wording into the
    main text.
- source_word: לֹא יַעֲשִׁיר
  chosen: will not become rich
  alternatives:
  - will not prosper
  - will not grow wealthy
  lexicon: HALOT
  rationale: 'The Hifil of עשר commonly means to become rich or make rich. Here the
    intransitive sense fits: the person will not attain wealth.'
- source_word: וְבוֹזֶה
  chosen: and one who despises
  alternatives:
  - and whoever scorns
  - and one who treats with contempt
  lexicon: HALOT
  rationale: בזה carries the sense of despising or holding in contempt. 'Despises'
    is direct and idiomatic.
- source_word: מְעוּטִים
  chosen: small things
  alternatives:
  - little things
  - small amounts
  - few things
  lexicon: HALOT
  rationale: The plural adjective/noun can denote things that are few or small. Given
    the Greek τὰ ὀλίγα, the sense is not merely numerical but what is slight or insignificant.
    'Small things' communicates the proverb's broader force.
- source_word: יִתְעַרְעָר
  chosen: will be ruined
  alternatives:
  - will totter
  - will collapse
  - will fall apart
  lexicon: HALOT
  rationale: The reflexive form suggests being shaken, destabilized, or brought down.
    The Greek parallel has κατὰ μικρὸν πεσεῖται, 'will fall little by little.' 'Will
    be ruined' captures the end result in clear English, while the gradual nuance
    is preserved in a footnote.
