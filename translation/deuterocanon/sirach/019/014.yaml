translation:
  text: Reprove a friend, for often there is slander, and do not believe every word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not trust every report.' The Greek says 'every word,' but in context
      it refers to what is said about someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγξον
  chosen: Reprove
  alternatives:
  - Correct
  - Confront
  - Expose
  lexicon: LSJ
  rationale: The imperative of ἐλέγχω commonly means to rebuke, reprove, or bring
    to account. 'Reprove' preserves the moral and interpersonal force without over-specifying
    a hostile confrontation.
- source_word: φίλον
  chosen: a friend
  alternatives:
  - your friend
  - a companion
  lexicon: LSJ
  rationale: The anarthrous singular naturally reads generically. 'A friend' keeps
    the proverb-like force; 'your friend' is possible in English but adds possessive
    specificity not explicit in the Greek.
- source_word: πολλάκις
  chosen: often
  alternatives:
  - many times
  - frequently
  lexicon: LSJ
  rationale: The adverb straightforwardly means 'often' or 'frequently.' 'Often' is
    concise and idiomatic.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - since
  lexicon: LSJ
  rationale: The conjunction gives the reason for the imperative. 'For' preserves
    the explanatory connection in a proverbial style.
- source_word: γίνεται
  chosen: there is
  alternatives:
  - it happens
  - it arises
  - it comes about
  lexicon: LSJ
  rationale: Although literally 'comes to be' or 'happens,' the idiom with an abstract
    noun in English is best rendered 'there is' to communicate the existence/occurrence
    of the situation naturally.
- source_word: διαβολή
  chosen: slander
  alternatives:
  - calumny
  - false accusation
  - backbiting
  lexicon: LSJ
  rationale: διαβολή denotes slanderous accusation or defamation. 'Slander' is the
    clearest modern English equivalent and fits the warning against credulity.
- source_word: μὴ παντὶ λόγῳ πίστευε
  chosen: do not believe every word
  alternatives:
  - do not trust every report
  - do not believe every statement
  lexicon: LSJ
  rationale: λόγος here is best taken as 'word,' 'report,' or 'statement' in context.
    'Believe every word' is idiomatic English and matches the warning not to accept
    every allegation uncritically.
