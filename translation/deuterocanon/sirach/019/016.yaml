theological_decisions:
- issue: Force of 'δὸς τόπον νόμῳ Ὑψίστου'
  chosen_reading: an exhortation to yield to or make room for the law of the Most
    High as the controlling norm after rebuking one's neighbor
  alternative_readings:
  - allow the law of the Most High to take its course
  - defer punitive action in submission to the law of the Most High
  rationale: The Greek idiom 'give place' is somewhat open in English, but in context
    it contrasts personal threatening with submission to divine legal/moral order.
    The translation preserves the literal metaphor while allowing the reader to hear
    the ethical point.
