translation:
  text: Rebuke your neighbor before you threaten, and give place to the law of the
    Most High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make room for the law of the Most High,' that is, yield your response
      to its guidance rather than escalating to threats.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγξον
  chosen: Rebuke
  alternatives:
  - Correct
  - Confront
  - Reprove
  lexicon: BDAG
  rationale: The imperative calls for direct verbal correction or exposure of fault.
    'Rebuke' preserves the moral seriousness better than the softer 'correct' while
    remaining natural English.
- source_word: τὸν πλησίον σου
  chosen: your neighbor
  alternatives:
  - your companion
  - the one near you
  lexicon: BDAG
  rationale: πλησίον commonly denotes one's fellow or neighbor in ethical instruction.
    'Your neighbor' is the standard clear rendering and fits wisdom-context exhortation.
- source_word: πρὶν ἢ
  chosen: before
  alternatives:
  - rather than
  - prior to the time when
  lexicon: BDAG
  rationale: 'The phrase introduces a temporal priority: one should first confront
    the person, then only afterward consider harsher action. ''Before'' is the most
    straightforward rendering.'
- source_word: ἀπειλῆσαι
  chosen: you threaten
  alternatives:
  - you make a threat
  - you become angry
  lexicon: LSJ
  rationale: The verb normally means 'to threaten.' Given the direct contrast with
    prior rebuke, the sense is escalation from correction to threat. The infinitive
    is rendered idiomatically with an English finite verb after 'before.'
- source_word: δὸς τόπον
  chosen: give place
  alternatives:
  - make room
  - yield
  - give scope
  lexicon: BDAG
  rationale: The idiom literally means 'give place/room.' Here it likely means to
    yield oneself to or make room for the governing authority of the law. Retaining
    'give place' keeps the metaphor visible, though slightly formal.
- source_word: νόμῳ
  chosen: the law
  alternatives:
  - law
  - instruction
  lexicon: BDAG
  rationale: νόμος here most naturally refers to divine law/instruction. 'The law'
    is appropriate because it is qualified by 'of the Most High' and signals a recognized
    moral standard.
- source_word: Ὑψίστου
  chosen: the Most High
  alternatives:
  - the Highest
  lexicon: BDAG
  rationale: A standard divine title in Jewish Greek. 'The Most High' is established,
    natural English and preserves the reverential title.
