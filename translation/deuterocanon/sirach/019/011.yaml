translation:
  text: An arrow stuck in a fleshy thigh—so is a word in the belly of a fool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'An arrow lodged in the thigh's flesh'; the Greek wording is compressed
      and may be construed slightly differently, but the image is of an arrow embedded
      in the flesh of the thigh.
    reason: lexical_alternative
lexical_decisions:
- source_word: βέλος
  chosen: arrow
  alternatives:
  - dart
  - missile
  lexicon: LSJ
  rationale: The noun denotes a projectile weapon, most naturally an 'arrow' in idiomatic
    English. 'Arrow' preserves the proverb's vivid bodily image.
- source_word: πεπηγὸς
  chosen: stuck
  alternatives:
  - fixed
  - embedded
  - driven in
  lexicon: LSJ
  rationale: Perfect participle of πήγνυμι, indicating something fastened or lodged
    in place. 'Stuck' is natural modern English and conveys the continuing state of
    being lodged.
- source_word: ἐν μηρῷ
  chosen: in the thigh
  alternatives:
  - in the leg
  - in the loins
  lexicon: LSJ
  rationale: μηρός is specifically 'thigh.' 'Leg' is too broad, and 'loins' is less
    precise here. The concrete body-part image should be retained.
- source_word: σαρκός
  chosen: of flesh
  alternatives:
  - of the body
  - in flesh
  lexicon: LSJ
  rationale: The genitive is somewhat awkward in English but should be preserved rather
    than flattened away. Here σάρξ is literal, not theological; 'of flesh' keeps the
    physical sense and the starkness of the image.
- source_word: λόγος
  chosen: word
  alternatives:
  - matter
  - report
  - statement
  lexicon: LSJ
  rationale: In this proverb the point is a spoken word or utterance retained internally.
    'Word' is the most direct and suitably broad rendering.
- source_word: ἐν κοιλίᾳ
  chosen: in the belly
  alternatives:
  - in the stomach
  - within
  - in the inner being
  lexicon: LSJ
  rationale: κοιλία literally means 'belly' or 'stomach.' In wisdom literature it
    can suggest the inner self, but the proverb intentionally parallels the bodily
    image of the first colon, so 'belly' best preserves the concrete metaphor.
- source_word: μωροῦ
  chosen: of a fool
  alternatives:
  - of a foolish man
  - of the foolish
  lexicon: LSJ
  rationale: μωρός in wisdom context is the morally and intellectually foolish person.
    'A fool' is concise, idiomatic, and preserves the singular proverbial type.
