translation:
  text: Rot and worms will inherit him, and a reckless soul will be taken away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a reckless soul' or 'a presumptuous person'; the Greek adjective can
      denote daring in a negative sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: σήπη
  chosen: rot
  alternatives:
  - decay
  - corruption
  lexicon: LSJ
  rationale: σήπη denotes rottenness or decay. 'Rot' is concise, vivid, and fits the
    paired image with worms in a judgment context.
- source_word: σκώληκες
  chosen: worms
  alternatives:
  - maggots
  lexicon: LSJ
  rationale: The plural refers broadly to worms/grubs associated with bodily decay.
    'Worms' is the standard broad rendering and avoids over-specifying the species.
- source_word: κληρονομήσουσιν
  chosen: will inherit
  alternatives:
  - will possess
  - will take as their portion
  lexicon: LSJ
  rationale: The verb literally means 'will inherit' or 'receive as a possession.'
    Retaining 'inherit' preserves the striking metaphor that decay and worms come
    to possess the man.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - that man
  - the one
  lexicon: Greek grammar
  rationale: The pronoun is masculine singular. 'Him' is the most direct rendering
    and preserves the gendered singular reference of the Greek.
- source_word: ψυχὴ
  chosen: soul
  alternatives:
  - life
  - person
  lexicon: LSJ
  rationale: ψυχή can mean soul, life, or self. Here, paired with the adjective and
    followed by a verb of removal, 'soul' best preserves the anthropological and moral
    weight of the Greek without flattening it to merely 'person'.
- source_word: τολμηρά
  chosen: bold
  alternatives:
  - reckless
  - daring
  - presumptuous
  lexicon: LSJ
  rationale: τολμηρός can be positive ('bold') or negative ('reckless, presumptuous')
    depending on context. Given the surrounding warning context in Sirach 19 and the
    punitive outcome, the sense is morally negative; however, 'bold' in English can
    carry that edge in context while staying closer to the lexical core. The stronger
    interpretive alternatives are preserved here rather than forced into the main
    text.
- source_word: ἐξαρθήσεται
  chosen: will be taken away
  alternatives:
  - will be lifted up
  - will be removed
  - will be carried off
  lexicon: LSJ
  rationale: The future passive of ἐξαίρω commonly means 'be taken away' or 'removed.'
    In this context of judgment, 'will be taken away' communicates loss/destruction
    without overcommitting to a more specific mechanism.
