translation:
  text: Reprove a friend, lest perhaps he did not say it; and if he did say it, so
    that he may not repeat it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Reprove a friend'; the Greek imperative can carry either an investigatory
      sense ('question/examine') or a corrective sense ('reprove'). The following
      clause favors first verifying the matter.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγξον
  chosen: Question
  alternatives:
  - Reprove
  - Examine
  - Confront
  lexicon: LSJ
  rationale: The imperative ἐλέγχω can mean expose, test, question, or reprove depending
    on context. Here the following clause ('perhaps he did not say it') points first
    to verifying the report before condemning the friend, so 'Question' best captures
    the investigatory force without prematurely implying guilt. 'Reprove' is possible
    but too strong at the outset.
- source_word: τὸν φίλον
  chosen: a friend
  alternatives:
  - your friend
  - the friend
  lexicon: LSJ
  rationale: The article with φίλος in proverbial instruction is naturally rendered
    generically in English. 'A friend' reads idiomatically while preserving the sense
    of a relational peer under discussion.
- source_word: μή ποτε
  chosen: perhaps
  alternatives:
  - lest perhaps
  - it may be that
  lexicon: LSJ
  rationale: 'In this context μή ποτε introduces a cautionary possibility: the friend
    may not actually have said the reported words. ''Perhaps'' gives the practical
    sense in clear English.'
- source_word: οὐκ εἶπεν
  chosen: he did not say it
  alternatives:
  - he has not spoken
  - he did not speak
  lexicon: LSJ
  rationale: English requires an object to make the implied accusation/report explicit.
    'Say it' naturally supplies the understood content without adding new information.
- source_word: εἰ εἴρηκεν
  chosen: if he did say it
  alternatives:
  - if he has said it
  - and if he said it
  lexicon: LSJ
  rationale: The perfect can be represented idiomatically in English by a simple past-oriented
    expression in this proverb. 'Did say it' balances the previous clause and keeps
    the implied object consistent.
- source_word: ἵνα μὴ δευτερώσῃ
  chosen: so that he may not repeat it
  alternatives:
  - so that he may not do it a second time
  - so that he may not say it again
  lexicon: LSJ
  rationale: δευτερόω here means to do or say something a second time. Because the
    context is speech ('say'), 'repeat it' is the most natural English rendering and
    preserves the purpose of confronting the friend if the report is true.
