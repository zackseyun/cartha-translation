translation:
  text: Never repeat a word, and nothing will be taken from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Never repeat a matter, and you will lose nothing.' The Greek λόγον can
      mean 'word,' 'statement,' or 'matter,' and ἐλαττονωθῇ can be rendered more literally
      as 'be diminished.'
    reason: lexical_alternative
  - marker: b
    text: The Greek source here is marked with source-validation uncertainty ('major_mismatch').
      The translation follows the extant Swete wording as given.
    reason: textual_variant
lexical_decisions:
- source_word: μηδέποτε
  chosen: Never
  alternatives:
  - not ever
  - at no time
  lexicon: LSJ
  rationale: Adverb of emphatic negation with temporal force; 'Never' is concise and
    natural in English while preserving the prohibition's strength.
- source_word: δευτερώσῃς
  chosen: repeat
  alternatives:
  - say a second time
  - duplicate
  lexicon: LSJ
  rationale: From δευτερόω, literally 'make second' or 'do a second time.' With λόγον
    as object, the idiomatic sense is to repeat or retell a matter. 'Repeat' best
    captures the warning against saying something again, likely in the sense of repeating
    a report or disclosure.
- source_word: λόγον
  chosen: a word
  alternatives:
  - a matter
  - a report
  - a statement
  lexicon: LSJ
  rationale: λόγος can mean 'word,' 'statement,' or 'matter.' Here the singular object
    of 'repeat' is likely proverbial and broad. 'A word' keeps the Greek's lexical
    form while still idiomatic in English; the broader sense is noted among alternatives.
- source_word: οὐθέν
  chosen: nothing
  alternatives:
  - in no way
  - not at all
  lexicon: LSJ
  rationale: Neuter accusative used adverbially/substantivally with the following
    negated future passive; 'nothing' is the most straightforward rendering.
- source_word: οὐ μὴ ἐλαττονωθῇ
  chosen: will be taken from you
  alternatives:
  - will be diminished for you
  - will be reduced for you
  - you will lose nothing
  lexicon: LSJ
  rationale: The strong negation οὐ μή with passive of ἐλαττονόω conveys emphatic
    assurance that nothing will be diminished or lost. 'Will be taken from you' expresses
    the practical sense in clear English, though 'diminished' is more formally literal.
