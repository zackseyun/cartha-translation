id: SIR.19.18
reference: Sirach 19:18
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἔστιν σοφία πονηρίας ἐπιστήμη, καὶ οὐκ ἔστιν ὅπου βουλὴ ἁμαρτωλῶν
    φρόνησις.
