theological_decisions:
- issue: Whether the verse grants any positive status to morally corrupt cleverness
  chosen_reading: The verse denies that knowledge directed toward evil counts as wisdom,
    and denies that sinners' counsel constitutes true understanding.
  alternative_readings:
  - The verse could be read more weakly as saying evil knowledge is merely distinct
    from wisdom, not wholly excluded from it.
  rationale: The double οὐκ ἔστιν gives a strong negation in both cola. The translation
    preserves the moral claim of wisdom literature without importing later doctrinal
    categories.
  doctrine_reference: Translation philosophy §§1, 3, 6
