translation:
  text: And the knowledge of evil is not wisdom, and where the counsel of sinners
    is, there is no understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “there is no wisdom in expertise at wickedness.” The Greek contrasts
      σοφία (“wisdom”), ἐπιστήμη (“knowledge”), and φρόνησις (“understanding/prudence”).
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφία
  chosen: wisdom
  alternatives:
  - skill
  - insight
  lexicon: LSJ
  rationale: Standard rendering in wisdom literature; preserves the moral-intellectual
    sense central to Sirach.
- source_word: πονηρίας
  chosen: of evil
  alternatives:
  - of wickedness
  - of vice
  lexicon: LSJ
  rationale: Genitive modifying ἐπιστήμη; 'evil' is the broadest and most natural
    English equivalent, fitting the moral contrast of the verse.
- source_word: ἐπιστήμη
  chosen: knowledge
  alternatives:
  - understanding
  - expertise
  lexicon: LSJ
  rationale: The phrase ἐπιστήμη πονηρίας denotes knowledge directed toward evil;
    'knowledge' best preserves the lexical distinction from σοφία and φρόνησις in
    the same verse.
- source_word: βουλή
  chosen: counsel
  alternatives:
  - plan
  - purpose
  - deliberation
  lexicon: LSJ
  rationale: Refers to the deliberative advice or scheme of sinners. 'Counsel' fits
    both wisdom-literature style and the moral context better than the more neutral
    'plan'.
- source_word: ἁμαρτωλῶν
  chosen: sinners’
  alternatives:
  - of sinners
  - sinful people's
  lexicon: LSJ
  rationale: A straightforward possessive rendering of the genitive; 'sinners' is
    the standard moral category in biblical English and remains readable.
- source_word: φρόνησις
  chosen: understanding
  alternatives:
  - prudence
  - good sense
  - discernment
  lexicon: LSJ
  rationale: In this context φρόνησις is practical moral discernment. 'Understanding'
    is clear modern English and avoids overloading the line with near-synonyms, while
    still conveying sound judgment.
- source_word: οὐκ ἔστιν ὅπου
  chosen: where ... is, there is no
  alternatives:
  - there is no place where
  - nowhere is there
  lexicon: LSJ
  rationale: This idiom is rendered in idiomatic English as a locative clause. It
    preserves the sense that in any setting characterized by sinners' counsel, understanding
    is absent.
