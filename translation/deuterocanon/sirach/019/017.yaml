theological_decisions:
- issue: Rendering of Κυρίου
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The Greek source reads Κυρίου, and the project's default rendering for
    κύριος is 'Lord.' Since this is Sirach in Greek rather than a direct Hebrew YHWH
    form in the source line, 'the Lord' best matches the source wording while preserving
    the sapiential theological sense.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord'
- issue: Nuance of φόβος in wisdom theology
  chosen_reading: fear of the Lord
  alternative_readings:
  - reverence for the Lord
  rationale: The phrase should retain the productive theological tension of awe, reverence,
    and fear rather than be softened to a purely modern affective term. The source
    does not require reduction to 'reverence' alone.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
