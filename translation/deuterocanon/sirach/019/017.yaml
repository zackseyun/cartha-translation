translation:
  text: All wisdom is fear of the Lord, and in all wisdom there is the practice of
    the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reverence for the Lord.' The Greek phrase traditionally rendered 'fear
      of the Lord' includes awe-filled reverence, but the main text keeps the stronger
      wording of the source expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'and in all wisdom is observance of the law.' The Greek wording can be
      rendered more formally with 'doing' or 'observance' instead of 'practice.'
    reason: alternative_reading
lexical_decisions:
- source_word: Πᾶσα
  chosen: All
  alternatives:
  - Every
  lexicon: LSJ
  rationale: The adjective is distributive and comprehensive. 'All' reads naturally
    in English while preserving the universal scope of the Greek.
- source_word: σοφία
  chosen: wisdom
  alternatives:
  - skill
  - understanding
  lexicon: LSJ
  rationale: In Sirach, σοφία consistently carries the moral-religious sense of wisdom
    rather than mere technical skill, so 'wisdom' is the best established and contextually
    fitting gloss.
- source_word: φόβος Κυρίου
  chosen: fear of the Lord
  alternatives:
  - reverence for the Lord
  lexicon: LSJ
  rationale: This is a standard sapiential expression. 'Fear of the Lord' preserves
    the traditional and lexical force of φόβος without reducing it to mere respect;
    'Lord' follows the project's default for κύριος.
- source_word: ἐν πάσῃ σοφίᾳ
  chosen: in all wisdom
  alternatives:
  - with all wisdom
  - in every kind of wisdom
  lexicon: LSJ
  rationale: The prepositional phrase is retained fairly literally. 'In all wisdom'
    best mirrors the Greek structure and allows the second clause to stand as a general
    principle parallel to the first.
- source_word: ποίησις
  chosen: there is the practice
  alternatives:
  - is the doing
  - is observance
  - is performance
  lexicon: LSJ
  rationale: ποίησις denotes doing or making. Because it governs νόμου in a moral-legal
    context, 'the practice' communicates active observance in idiomatic English while
    staying close to the Greek sense.
- source_word: νόμου
  chosen: of the law
  alternatives:
  - of law
  - of instruction
  lexicon: LSJ
  rationale: νόμος in Jewish wisdom literature normally refers to the law/Torah. 'The
    law' is the most natural English rendering here; 'instruction' is possible but
    too diffuse for this context.
