theological_decisions:
- issue: Moral versus merely verbal nuance of ἥμαρτεν in wisdom literature
  chosen_reading: sinned
  alternative_readings:
  - erred
  - offended
  rationale: The verse speaks of failure in speech as morally significant, not merely
    mistaken. 'Sinned' preserves that ethical weight without importing later doctrinal
    categories.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; ἁμαρτάνω should retain
    moral force where context supports it.'
