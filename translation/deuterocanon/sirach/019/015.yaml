translation:
  text: There is one who slips and not from the soul, and who has not sinned with
    his tongue?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is one who slips, but not intentionally'; literally, 'there is
      one slipping, and not from the soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστιν
  chosen: may
  alternatives:
  - there is
  - is
  lexicon: LSJ
  rationale: The existential opening with an implied generic subject is rendered idiomatically
    in English as a possibility statement ('may'), which fits the proverbial style
    better than a wooden 'there is.'
- source_word: ὀλισθάνων
  chosen: slip
  alternatives:
  - stumble
  - fall
  lexicon: LSJ
  rationale: The participle denotes slipping or stumbling. 'Slip' works well in English
    for a moral or verbal lapse without over-specifying a physical fall.
- source_word: οὐκ ἀπὸ ψυχῆς
  chosen: not mean it
  alternatives:
  - not from the soul
  - not intentionally
  - not from the heart
  lexicon: LSJ
  rationale: Literally 'not from the soul/self.' In context it contrasts an inadvertent
    lapse with deliberate wrongdoing, so 'not mean it' captures the idiomatic sense
    in readable English. 'Not intentionally' is possible, but 'not mean it' better
    matches the personal, proverbial tone.
- source_word: τίς οὐχ ἥμαρτεν
  chosen: who has not sinned
  alternatives:
  - who has not erred
  - who has not offended
  lexicon: LSJ
  rationale: The rhetorical question expects the answer 'no one.' 'Sinned' is the
    standard rendering of ἁμαρτάνω and preserves the moral force of the statement.
- source_word: ἐν τῇ γλώσσῃ αὐτοῦ
  chosen: with his tongue
  alternatives:
  - by his tongue
  - in his speech
  - with his speech
  lexicon: LSJ
  rationale: The Greek is literally 'in his tongue,' an idiom for speech. 'With his
    tongue' preserves the bodily metaphor more closely than the abstract 'in speech.'
- source_word: implicit generic masculine
  chosen: A man ... his tongue
  alternatives:
  - Someone ... their tongue
  - A person ... their tongue
  rationale: The Greek uses a generic masculine form in proverbial discourse. Per
    project philosophy, a gender-accurate rendering is preferred where the source
    carries representative generic force.
