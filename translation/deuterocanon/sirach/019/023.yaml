translation:
  text: He stoops his face and pretends to be deaf; where he is not recognized, he
    will outwit you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will forestall you' / 'he will outstrip you.' The Greek verb means
      to come before someone or gain an advantage by acting first.
    reason: lexical_alternative
  - marker: b
    text: The Greek text of this verse is terse and somewhat difficult; the sense
      is that a deceptive person adopts a humble or unresponsive posture in order
      to gain advantage when unnoticed or unrecognized.
    reason: textual_variant
lexical_decisions:
- source_word: συγκύφων
  chosen: stoops
  alternatives:
  - bends down
  - hunches over
  lexicon: LSJ
  rationale: The participle denotes bending or stooping the body. 'Stoops' is concise
    and idiomatic in English, preserving the physical posture that suggests affected
    humility or concealment.
- source_word: πρόσωπον
  chosen: face
  alternatives:
  - countenance
  lexicon: LSJ
  rationale: The ordinary sense is 'face.' 'Countenance' is possible but less natural
    in modern English.
- source_word: ἑτεροκωφῶν
  chosen: pretends to be deaf
  alternatives:
  - acts as if deaf
  - feigns deafness
  lexicon: LSJ
  rationale: The rare verb suggests behaving like one who is deaf, not literal deafness.
    'Pretends to be deaf' makes the deceptive force explicit in readable English.
- source_word: ὅπου
  chosen: where
  alternatives:
  - when
  - wherever
  lexicon: LSJ
  rationale: The adverb naturally means 'where.' Given the context, it introduces
    the circumstance/location in which the schemer is unrecognized.
- source_word: οὐκ ἐπεγνώσθη
  chosen: he is not recognized
  alternatives:
  - he is not noticed
  - he is not found out
  lexicon: LSJ
  rationale: The passive of ἐπιγινώσκω is best taken as 'be recognized/identified.'
    'Found out' is interpretive; 'recognized' stays closer to the Greek while fitting
    the context of concealed intent.
- source_word: προφθάσει
  chosen: he will get ahead of you
  alternatives:
  - he will forestall you
  - he will outstrip you
  lexicon: LSJ
  rationale: The future of προφθάνω means to come before, anticipate, or get ahead
    of someone. 'Get ahead of you' communicates the practical sense in modern English;
    'forestall' is more formal and could be footnoted as a lexical alternative.
- source_word: σε
  chosen: you
  lexicon: LSJ
  rationale: Direct object singular, naturally rendered 'you.'
