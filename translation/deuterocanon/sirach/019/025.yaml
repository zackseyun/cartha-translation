translation:
  text: A man is recognized by his appearance, and a man of understanding is recognized
    by the expression of his face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'from the meeting of the face.' The phrase likely refers
      to what a person's face shows in an encounter.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ ὁράσεως
  chosen: by his appearance
  alternatives:
  - from what is seen
  - by sight
  - from appearance
  lexicon: LSJ
  rationale: The preposition ἀπό with the noun ὅρασις here indicates the basis from
    which recognition is made. 'Appearance' gives natural English while preserving
    the idea of visible presentation rather than inward character.
- source_word: ἐπιγνωσθήσεται
  chosen: is recognized
  alternatives:
  - will be recognized
  - is known
  lexicon: BDAG
  rationale: Future passive can function gnomicly in wisdom literature. Present English
    better conveys a general truth in idiomatic form without losing the passive sense.
- source_word: ἀνήρ
  chosen: a man
  alternatives:
  - a person
  - a male
  lexicon: LSJ
  rationale: The Greek is singular masculine and in a wisdom-saying context. Per project
    philosophy, the gendered form is retained unless context clearly demands a neutral
    rendering.
- source_word: ἀπὸ ἀπαντήσεως προσώπου
  chosen: by the expression of his face when he meets you
  alternatives:
  - by the meeting of the face
  - from facial encounter
  - by the look on his face at a meeting
  lexicon: LSJ
  rationale: This phrase is somewhat awkward literally. ἀπάντησις is 'meeting/encounter,'
    and προσώπου is 'face.' The sense is that one can discern a wise person from the
    look on his face in interpersonal encounter. The chosen rendering makes the idiom
    intelligible in modern English while staying close to the Greek imagery.
- source_word: νοήμων
  chosen: a man of understanding
  alternatives:
  - an intelligent man
  - a prudent man
  - one with understanding
  lexicon: LSJ
  rationale: νοήμων denotes understanding, intelligence, or discernment. 'A man of
    understanding' fits wisdom-literature diction and preserves the moral-intellectual
    nuance better than merely 'intelligent'.
