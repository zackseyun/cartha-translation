translation:
  text: Question a friend, lest perhaps he did not do it; and if he did do it, so
    that he may not do it again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Reprove a friend … lest he add to it.' The opening verb can mean 'reprove'
      or 'confront,' and the final clause may be understood more sharply as a warning
      against repeating or increasing the act.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγξον
  chosen: Question
  alternatives:
  - Reprove
  - Confront
  - Examine
  lexicon: LSJ
  rationale: The imperative can mean expose, test, reprove, or question. In this context,
    followed by clauses about whether the friend actually did the thing, the sense
    is to confront by inquiry rather than immediate condemnation. 'Question' preserves
    the investigative force without overstating punitive rebuke.
- source_word: φίλον
  chosen: a friend
  alternatives:
  - your friend
  - friend
  lexicon: LSJ
  rationale: Anarthrous singular object; English idiom naturally supplies the article.
    'A friend' keeps the proverbial/general force.
- source_word: μή ποτε
  chosen: perhaps
  alternatives:
  - lest
  - in case
  lexicon: LSJ
  rationale: 'Here μή ποτε introduces cautionary possibility: one should check first
    because it may be that the friend did not do it. ''Perhaps'' communicates that
    uncertainty clearly in modern English.'
- source_word: οὐκ ἐποίησεν
  chosen: he did not do it
  alternatives:
  - he has not done it
  - he did not act
  lexicon: LSJ
  rationale: ποιέω is broad, but English needs an object implied from context. 'Do
    it' is the most natural way to carry the unspecified alleged act.
- source_word: καὶ εἴ τι ἐποίησεν
  chosen: and if he did do something
  alternatives:
  - and if he has done anything
  - and if he did anything
  lexicon: LSJ
  rationale: τι is indefinite ('something/anything'). The phrase contrasts with the
    previous possibility that he did nothing. 'Did do something' preserves the contrast
    and emphasis.
- source_word: προσθῇ
  chosen: add to it
  alternatives:
  - continue it
  - repeat it
  - do more
  lexicon: LSJ
  rationale: From προστίθημι, literally 'add.' In ethical contexts it can mean continue
    or repeat an action. 'Add to it' keeps the literal image while allowing the moral
    sense that he should not go further in the wrongdoing.
