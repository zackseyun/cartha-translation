id: SIR.19.29
reference: Sirach 19:29
source:
  edition: lxx-swete-1909
  text: ἀπὸ ὁράσεως ἐπιγνωσθήσεται ἀνήρ, καὶ ἀπὸ ἀπαντήσεως προσώπου ἐπιγνωσθήσεται
    νοήμων.
  language: Greek
  pages:
  - 699
  confidence: high
  validation: agree
translation:
  text: From appearance a man is recognized, and from the expression of the face one
    who has understanding is recognized.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the bearing of the face a discerning person will be recognized.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁράσεως
  chosen: appearance
  alternatives:
  - sight
  - look
  - outward appearance
  lexicon: LSJ
  rationale: In the phrase ἀπὸ ὁράσεως, the sense is what is seen about a person—his
    visible appearance—rather than the act of seeing itself. 'Appearance' is natural
    English and fits the proverb's concern with discernible outward signs.
- source_word: ἐπιγνωσθήσεται
  chosen: will be recognized
  alternatives:
  - will be known
  - will be discerned
  lexicon: BDAG
  rationale: The future passive indicates that the person is identified or recognized
    by others on the basis of visible cues. 'Recognized' captures this external discernment
    better than the broader 'known'.
- source_word: ἀνήρ
  chosen: a man
  alternatives:
  - a person
  - a husband
  lexicon: LSJ
  rationale: The Greek is singular masculine and proverbial. Per project philosophy,
    gender-accurate language is preferred where the source is masculine with representative
    force. 'A man' preserves the form and tone of the maxim.
- source_word: ἀπαντήσεως προσώπου
  chosen: the expression of the face
  alternatives:
  - facial meeting
  - encounter of the face
  - bearing of the face
  - countenance
  lexicon: LSJ
  rationale: The phrase is idiomatic and refers to what one meets in the face—its
    bearing or expression. 'Expression of the face' communicates the observable facial
    demeanor in clear modern English without archaic 'countenance'.
- source_word: νοήμων
  chosen: one who has understanding
  alternatives:
  - an intelligent person
  - a discerning person
  - the prudent
  lexicon: LSJ
  rationale: νοήμων denotes understanding, intelligence, or discernment. 'One who
    has understanding' preserves the wisdom-literature register and avoids over-psychologizing
    the term.
