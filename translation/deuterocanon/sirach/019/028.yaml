theological_decisions:
- issue: Moral point of the verse
  chosen_reading: The verse teaches that inability to commit sin does not equal righteousness;
    given opportunity, the person will act wickedly.
  alternative_readings:
  - The verse could be read more narrowly as referring to doing harm to others rather
    than evil in general.
  rationale: 'The pairing of ἁμαρτεῖν and κακοποιήσει presents a general moral diagnosis:
    external incapacity is not true virtue. The English keeps both terms morally weighty
    without narrowing the application beyond the Greek.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English, not archaic or academic.'
