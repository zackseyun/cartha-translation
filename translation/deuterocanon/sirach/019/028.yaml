id: SIR.19.28
reference: Sirach 19:28
source:
  edition: lxx-swete-1909
  text: καὶ ἐὰν ὑπὸ ἐλαττώματος ἰσχύος κωλυθῇ ἁμαρτεῖν, ἐὰν εὕρῃ καιρὸν κακοποιήσει.
  language: Greek
  pages:
  - 699
  confidence: high
  validation: agree
translation:
  text: And if he is prevented from sinning by lack of strength, when he finds an
    opportunity, he will do evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will do harm'; the Greek verb can denote doing evil generally or
      harming others more specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλαττώματος
  chosen: lack
  alternatives:
  - deficiency
  - shortcoming
  - weakness
  lexicon: LSJ
  rationale: 'The genitive with ὑπό expresses the cause: he is hindered because of
    a deficiency. ''Lack'' is concise and natural in English, and it pairs well with
    ''of strength'' to reflect the Greek construction without overinterpreting the
    deficiency morally.'
- source_word: ἰσχύος
  chosen: strength
  alternatives:
  - power
  - ability
  - force
  lexicon: LSJ
  rationale: ἰσχύς commonly denotes strength or capability. 'Strength' best fits the
    immediate sense that the person does not refrain from sin out of virtue but because
    he lacks the capacity to carry it out.
- source_word: κωλυθῇ
  chosen: is prevented
  alternatives:
  - is hindered
  - is restrained
  - is kept from
  lexicon: LSJ
  rationale: The passive subjunctive after ἐὰν is well represented by 'is prevented.'
    This preserves the external or circumstantial hindrance implied by the Greek better
    than a more internal term like 'restrained.'
- source_word: ἁμαρτεῖν
  chosen: from sinning
  alternatives:
  - to sin
  - from doing wrong
  lexicon: LSJ
  rationale: The infinitive depends on κωλυθῇ. 'From sinning' is idiomatic after 'prevented'
    and preserves the moral category explicit in the Greek.
- source_word: καιρόν
  chosen: an opportunity
  alternatives:
  - a suitable time
  - the right moment
  - occasion
  lexicon: LSJ
  rationale: καιρός here is not merely chronological time but a favorable occasion.
    'An opportunity' communicates that nuance clearly in modern English.
- source_word: κακοποιήσει
  chosen: he will do evil
  alternatives:
  - he will do harm
  - he will act wickedly
  - he will do wrong
  lexicon: LSJ
  rationale: The future verb indicates harmful or wicked action once opportunity arises.
    'He will do evil' preserves the moral force and keeps the wording broad enough
    to match the Greek without specifying a particular victim or act.
