translation:
  text: There is one who plots evil, bent low in gloom, and inwardly he is full of
    deceit;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stooped in melancholy' or 'bowed down in blackness'; the Greek wording
      can suggest either a dark mood or a darkened appearance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστιν
  chosen: There is
  alternatives:
  - There exists
  - One may be
  lexicon: LSJ
  rationale: Introduces a general type of person; idiomatic English uses existential
    'There is' to mirror the Greek opening.
- source_word: πονηρευόμενος
  chosen: who plots evil
  alternatives:
  - acting wickedly
  - devising evil
  - being malicious
  lexicon: LSJ
  rationale: The middle/passive participial form suggests active engagement in wicked
    intent or scheming, not merely a static moral quality. 'Plots evil' captures deliberateness
    better than the flatter 'is wicked.'
- source_word: συγκεκυφώς
  chosen: bent low
  alternatives:
  - stooped
  - downcast
  - hunched over
  lexicon: LSJ
  rationale: Perfect participle of a verb meaning to bend or stoop. 'Bent low' preserves
    the physical metaphor and leaves open whether the posture is literal, affective,
    or performative.
- source_word: μελανίᾳ
  chosen: in gloom
  alternatives:
  - in melancholy
  - in blackness
  - in sullenness
  lexicon: LSJ
  rationale: The noun can denote blackness or a darkened mood. 'In gloom' is natural
    English and preserves the ambiguity between outward dark appearance and inward
    moroseness better than the more clinical 'melancholy.'
- source_word: τὰ ἐντὸς αὐτοῦ
  chosen: inwardly
  alternatives:
  - the things within him
  - his inner parts
  - what is inside him
  lexicon: LSJ
  rationale: The phrase refers to the inner self rather than anatomy in this context.
    'Inwardly' gives idiomatic English while preserving the contrast between outward
    posture and inner reality.
- source_word: πλήρης δόλου
  chosen: full of deceit
  alternatives:
  - filled with guile
  - full of treachery
  - full of fraud
  lexicon: LSJ
  rationale: δόλος commonly denotes deceit or guile. 'Deceit' is clear modern English
    and fits the moral portrait of concealed wickedness.
