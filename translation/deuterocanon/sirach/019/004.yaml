theological_decisions:
- issue: Anthropological term ψυχή
  chosen_reading: soul
  alternative_readings:
  - self
  - life
  rationale: In wisdom literature ψυχή can denote the self or life, but 'soul' preserves
    the Greek term's moral-anthropological force here. The phrase describes sin as
    self-directed harm; the alternative is worth preserving in a footnote because
    English readers may hear 'soul' too narrowly.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
