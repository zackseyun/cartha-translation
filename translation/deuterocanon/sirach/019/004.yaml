  confidence: high
  validation: agree
translation:
  text: He who trusts too quickly is light of heart, and he who sins against his own
    soul will go astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against himself' or 'to his own harm'; Greek 'against his own soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταχὺ
  chosen: too quickly
  alternatives:
  - quickly
  - hastily
  lexicon: LSJ
  rationale: Adverb modifying ἐμπιστεύων. 'Too quickly' brings out the proverb's negative
    force in context better than a merely temporal 'quickly,' without overparaphrasing.
- source_word: ἐμπιστεύων
  chosen: trusts
  alternatives:
  - believes
  - puts confidence in
  lexicon: LSJ
  rationale: The verb denotes placing trust or confidence. 'Trusts' is natural English
    and fits the wisdom context about credulity.
- source_word: κοῦφος καρδίᾳ
  chosen: light of heart
  alternatives:
  - light-minded
  - fickle in heart
  - empty-hearted
  lexicon: LSJ
  rationale: κοῦφος literally suggests lightness; with καρδίᾳ it describes a shallow
    or unstable inner disposition. 'Light of heart' preserves the metaphor more transparently
    than an interpretive paraphrase like 'gullible'.
- source_word: ἁμαρτάνων
  chosen: sins
  alternatives:
  - does wrong
  - misses the mark
  lexicon: LSJ
  rationale: Standard rendering for the participle; no contextual reason to weaken
    it.
- source_word: εἰς ψυχὴν αὐτοῦ
  chosen: against his own soul
  alternatives:
  - against himself
  - to his own harm
  - against his own life
  lexicon: LSJ
  rationale: The preposition εἰς with ψυχή here points to harm directed toward oneself.
    'Against his own soul' keeps the source wording and moral weight, while still
    being intelligible in English.
- source_word: πλημμελήσει
  chosen: will go wrong
  alternatives:
  - will offend
  - will fail
  - will commit an error
  lexicon: LSJ
  rationale: Future of πλημμελέω, to make a false step or do wrong. 'Will go wrong'
    captures the resultative moral sense in readable English without sounding overly
    technical.
