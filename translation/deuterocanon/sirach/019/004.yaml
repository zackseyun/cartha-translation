id: SIR.19.4
reference: Sirach 19:4
source:
  edition: lxx-swete-1909
  text: ὁ ταχὺ ἐμπιστεύων κοῦφος καρδίᾳ, καὶ ὁ ἁμαρτάνων εἰς ψυχὴν αὐτοῦ πλημμελήσει.
  language: Greek
  pages:
  - 681
  - 696
  - 697
  - 698
  - 699
  - 700
  - 701
