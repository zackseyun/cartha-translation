translation:
  text: Have you heard a word? Let it die with you; take courage, it will not burst
    you open.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a matter' or 'a report' for 'a word' (λόγον).
    reason: lexical_alternative
  - marker: b
    text: 'The Greek image is vivid: ''it will not burst you open,'' meaning the secret
      will not destroy you if you keep it.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀκήκοας
  chosen: Have you heard
  alternatives:
  - You have heard
  - Did you hear
  lexicon: BDAG
  rationale: Perfect form of ἀκούω used rhetorically; English present perfect preserves
    the completed hearing with present relevance.
- source_word: λόγον
  chosen: a word
  alternatives:
  - a matter
  - a report
  - something
  lexicon: BDAG
  rationale: λόγος here likely refers to a spoken matter or confidential report. 'Word'
    keeps the concise proverbial style and allows the broader sense without over-specifying.
- source_word: συναποθανέτω σοι
  chosen: Let it die with you
  alternatives:
  - Let it perish with you
  - Let it die along with you
  lexicon: LSJ
  rationale: 'The imperative of συναποθνῄσκω is metaphorical: what was heard should
    go no further. ''Let it die with you'' is idiomatic and preserves the vivid image
    of secrecy.'
- source_word: θάρσει
  chosen: take courage
  alternatives:
  - be confident
  - have no fear
  lexicon: BDAG
  rationale: Imperative from θαρσέω. In context it reassures the hearer that keeping
    the matter secret is bearable. 'Take courage' preserves the exhortational tone
    better than the flatter 'be confident.'
- source_word: οὐ μή
  chosen: will not
  alternatives:
  - certainly will not
  - by no means will
  lexicon: BDAG
  rationale: Strong negation. English 'will not' is natural in the proverb; the force
    is reinforced by context without needing a wooden double negative.
- source_word: ῥήξει
  chosen: burst you open
  alternatives:
  - tear you apart
  - break you
  - split you open
  lexicon: LSJ
  rationale: 'Future of ῥήγνυμι, literally ''break, burst, rend.'' The image is hyperbolic:
    a secret will not cause internal rupture if kept. ''Burst you open'' preserves
    the bodily vividness better than the more abstract ''harm you.'''
