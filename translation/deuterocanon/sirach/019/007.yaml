theological_decisions:
- issue: Interpretive force of the clause καὶ εἰ μή ἐστίν σοι ἁμαρτία
  chosen_reading: 'Render the clause as an exception: ''unless it is a sin for you,''
    implying that disclosure may be warranted if silence would be sinful.'
  alternative_readings:
  - 'Render more literally: ''and if it is not a sin for you, do not reveal it,''
    which can sound like an additional condition without clear logic'
  - Interpret the line as absolute secrecy with no exception
  rationale: The Greek wording is terse and can sound awkward if translated woodenly.
    In wisdom context, the most coherent sense is that one should not divulge a matter
    to anyone, except in a case where withholding it would itself be sinful. This
    preserves the ethical tension in the line rather than flattening it.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
