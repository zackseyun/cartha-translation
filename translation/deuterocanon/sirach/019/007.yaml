translation:
  text: Do not tell it to friend or foe, and if it is not a sin for you, do not reveal
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'with a friend and with an enemy do not recount, and
      if it is not a sin for you, do not reveal.' The Greek clause is terse; the main
      text brings out the likely sense that disclosure is permitted only if silence
      would be sinful.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν φίλῳ καὶ ἐν ἐχθρῷ
  chosen: to friend or foe
  alternatives:
  - with a friend and with an enemy
  - among friend and enemy
  - to a friend or to an enemy
  lexicon: LSJ
  rationale: The paired datives after the prohibition idiomatically mark the parties
    to whom one might speak. 'Friend or foe' is a concise English equivalent that
    preserves the contrast and proverbial force without over-literal awkwardness.
- source_word: μὴ διηγοῦ
  chosen: Do not tell it
  alternatives:
  - do not recount
  - do not relate
  - do not narrate
  lexicon: BDAG
  rationale: The verb means to tell or recount in detail. In context the object is
    left implicit in Greek, referring back to a matter heard or known; English naturally
    supplies 'it.' 'Tell' is the most readable rendering here.
- source_word: καὶ εἰ μή ἐστίν σοι ἁμαρτία
  chosen: and unless it is a sin for you
  alternatives:
  - and if it is not a sin for you
  - unless it would be sin for you
  - if no guilt attaches to you
  lexicon: LSJ
  rationale: 'The Greek is somewhat elliptical. A very literal rendering would be
    ''and if it is not for you a sin,'' but in context the sense is concessive/exceptive:
    do not disclose a matter, except perhaps where silence itself would be sinful.
    Rendering with ''unless'' makes the logic clear in natural English while staying
    close to the Greek.'
- source_word: μὴ ἀποκάλυπτε
  chosen: do not reveal it
  alternatives:
  - do not disclose it
  - do not uncover it
  lexicon: BDAG
  rationale: ἀποκαλύπτω here means to disclose or reveal hidden information. 'Reveal
    it' is straightforward modern English and pairs well with the earlier 'tell it'
    while preserving the stronger sense of making something known.
