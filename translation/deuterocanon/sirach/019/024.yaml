theological_decisions:
- issue: Nature of the person's restraint from sin
  chosen_reading: The verse describes someone who does not sin only because he lacks
    the power or ability, not because of genuine righteousness.
  alternative_readings:
  - The weakness could be moral rather than physical strength.
  rationale: The Greek explicitly grounds the restraint in ἐλάττωμα ἰσχύος ('lack/deficiency
    of strength'). The translation should preserve that the person's abstention is
    circumstantial, and the future clause shows his intent when opportunity arises.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
