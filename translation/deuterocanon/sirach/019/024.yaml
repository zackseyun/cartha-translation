translation:
  text: And if he is prevented from sinning by lack of strength, when he finds an
    opportunity he will do evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through weakness' for 'by lack of strength.' The Greek phrase can denote
      deficient power or inability more generally.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'when he finds a time'; here 'time' means an opportune occasion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  chosen: if
  alternatives:
  - even if
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause; simple 'if' best fits the syntax in
    both occurrences.
- source_word: ὑπὸ ἐλαττώματος ἰσχύος
  chosen: by lack of strength
  alternatives:
  - through weakness
  - because of deficient strength
  lexicon: LSJ
  rationale: The phrase denotes deficiency or insufficiency of power/ability. 'By
    lack of strength' is natural English and preserves the causal sense of ὑπό with
    the genitive phrase.
- source_word: κωλυθῇ
  chosen: is prevented
  alternatives:
  - is hindered
  - is restrained
  lexicon: BDAG
  rationale: Passive subjunctive meaning to be hindered or prevented. 'Is prevented'
    clearly conveys external or circumstantial inability rather than moral reform.
- source_word: ἁμαρτεῖν
  chosen: from sinning
  alternatives:
  - to sin
  lexicon: BDAG
  rationale: Complement of κωλυθῇ; English idiom prefers 'prevented from sinning.'
- source_word: εὕρῃ καιρόν
  chosen: finds an opportunity
  alternatives:
  - finds a suitable time
  - finds occasion
  lexicon: BDAG
  rationale: καιρός here is the opportune or fitting moment, not merely chronological
    time. 'Opportunity' captures the moral sense well in context.
- source_word: κακοποιήσει
  chosen: he will do evil
  alternatives:
  - he will act wickedly
  - he will do harm
  lexicon: BDAG
  rationale: Future of κακοποιέω, to do evil or commit wrongdoing. 'Do evil' is broad
    enough to match the Greek and links naturally with the prior mention of sinning.
- source_word: καὶ
  chosen: And
  alternatives:
  - But
  - Indeed
  lexicon: BDAG
  rationale: Simple connective continuing the thought from the previous verse; 'And'
    preserves the Greek flow without overinterpreting contrast.
