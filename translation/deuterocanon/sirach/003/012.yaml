theological_decisions:
- issue: Divergence between Hebrew and Greek parallel in the verse's central exhortation
  chosen_reading: 'Follow the Hebrew primary witness: ''be strong in honoring your
    father ... do not forsake him.'''
  alternative_readings:
  - 'Follow the Greek more closely: ''support your father in his old age, and do not
    grieve him during his life.'''
  rationale: 'For Sirach, surviving Hebrew is primary where extant. Here the Hebrew
    and Greek are not identical in wording: the Greek makes explicit the father''s
    old age and emotional harm, while the Hebrew emphasizes firmness in honor and
    not abandoning him. The English main text therefore follows the Hebrew, while
    preserving the Greek-aligned sense in a footnote because it is a significant ancient
    parallel and may reflect either interpretive expansion or a different Vorlage.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual translation input without displacing the primary witness.'
