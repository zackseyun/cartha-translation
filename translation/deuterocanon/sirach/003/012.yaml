lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative address from בן with 1cs suffix. 'My son' preserves the masculine
    singular form and the parental instructional tone of Hebrew wisdom literature;
    the Greek τέκνον is broader ('child'), but the Hebrew witness is primary here
    and is clear.
- source_word: הִתְחַזֵּק
  chosen: be strong
  alternatives:
  - strengthen yourself
  - take hold
  - support
  lexicon: HALOT
  rationale: 'Hitpael imperative of חזק commonly conveys strengthening oneself or
    showing firmness. ''Be strong'' is the most natural English imperative while retaining
    the Hebrew image. The Greek parallel ἀντιλαβοῦ (''take hold of, support'') points
    toward practical support in old age, but the Hebrew wording is best represented
    by ''be strong,'' with the following phrase specifying the sphere: honoring one''s
    father.'
- source_word: בִּכִבּוּד
  chosen: in honoring
  alternatives:
  - with honor toward
  - in the honor of
  - to honor
  lexicon: HALOT
  rationale: The preposition ב plus כיבוד ('honor') is somewhat idiomatic. 'In honoring'
    preserves the Hebrew construction while yielding readable English. It expresses
    steadfastness in the practice of honoring, not merely an abstract state.
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Straightforward possessive noun; retained literally.
- source_word: וְאַל תַּעַזְבֵהוּ
  chosen: and do not forsake him
  alternatives:
  - and do not abandon him
  - and do not leave him
  lexicon: HALOT
  rationale: עזב commonly means leave, forsake, abandon. 'Forsake' best captures the
    moral force in a filial-duty context. The Greek μὴ λυπήσῃς αὐτόν ('do not grieve
    him') differs, but the Hebrew witness here is strong and supports a stronger obligation
    of continued care.
- source_word: כָּל יְמֵי חַיֶּיךָ
  chosen: all the days of your life
  alternatives:
  - throughout your life
  - as long as you live
  lexicon: HALOT
  rationale: A standard Hebrew idiom for lifelong duration. 'All the days of your
    life' is transparent and faithful, with only slight formal weight.
