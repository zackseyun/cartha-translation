translation:
  text: Do not seek what is too wondrous for you, and do not search out what is hidden
    from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following the Greek parallel more closely: ''Do not seek what is harder
      than you, and do not examine what is stronger than you.'' The Hebrew emphasizes
      what is too wondrous and hidden; the Greek emphasizes what exceeds your capacity.'
    reason: alternative_reading
lexical_decisions:
- source_word: פְּלָאוֹת
  chosen: what is too wondrous
  alternatives:
  - wonders
  - marvels
  - things beyond you
  - things too difficult
  lexicon: HALOT
  rationale: The Hebrew plural from פלא denotes extraordinary or wondrous things.
    In context, with מִמְּךָ and the Greek χαλεπότερά σου, the sense is not merely
    'miracles' but matters beyond one's proper reach or capacity. 'What is too wondrous
    for you' preserves the Hebrew imagery while communicating the practical force.
- source_word: מִמְּךָ
  chosen: for you
  alternatives:
  - from you
  - beyond you
  - than you
  lexicon: HALOT
  rationale: Literally 'from you,' but idiomatically with the preceding noun it marks
    what lies beyond one's sphere or capacity. 'For you' in English works naturally
    with 'too wondrous' and reflects the comparative force supported by the Greek
    parallel.
- source_word: אַל תִּדְרוֹשׁ
  chosen: do not seek
  alternatives:
  - do not inquire into
  - do not pursue
  lexicon: HALOT
  rationale: דרש commonly means seek, inquire, or investigate. 'Seek' is concise and
    preserves the imperative force without over-specifying the mode of inquiry.
- source_word: וּמְכֻסֶּה
  chosen: what is hidden
  alternatives:
  - the concealed thing
  - what is covered
  - what is secret
  lexicon: HALOT
  rationale: From כסה, 'to cover, conceal.' 'What is hidden' is the most natural English
    equivalent and matches the parallelism with the first colon.
- source_word: אַל תַּחְקוֹר
  chosen: do not search out
  alternatives:
  - do not investigate
  - do not examine
  - do not probe
  lexicon: HALOT
  rationale: חקר carries the sense of searching out, probing, or investigating thoroughly.
    'Search out' preserves the stronger, more investigative nuance relative to the
    first verb.
- source_word: χαλεπότερά σου / ἰσχυρότερά σου
  chosen: used as semantic support for 'too wondrous for you' / 'hidden from you'
  alternatives:
  - harder than you
  - stronger than you
  lexicon: BDAG
  rationale: The Greek parallel does not match the Hebrew word-for-word, but it confirms
    the verse's sense of warning against pursuing matters beyond one's capacity. It
    supports an English rendering that communicates limitation rather than mere curiosity
    about miracles or secrets.
