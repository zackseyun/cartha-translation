theological_decisions:
- issue: How to handle the Hebrew-Greek mismatch in the final clause
  chosen_reading: Retain the Hebrew-based plural sense in the main text ('they were
    planted') while preserving the Greek singular-root image in a footnote.
  alternative_readings:
  - for an evil plant has taken root in him
  - because a plant of wickedness has rooted in him
  rationale: Zone 1 gives Hebrew primacy where extant, but the Greek parallel is to
    be used as actual translation input. The Hebrew wording appears textually awkward
    at the end, while the Greek offers a smoother singular explanation focused on
    the inner source of the scoffer's condition. The main text remains anchored in
    the Hebrew witness; the footnote preserves the Greek-based alternative and documents
    the uncertainty.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    use Greek parallel as actual translation input; preserve source uncertainty honestly.'
