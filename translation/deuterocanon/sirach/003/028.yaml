translation:
  text: Do not rush to heal the wound of a scoffer, for there is no healing for it,
    because they were planted from an evil planting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''for a plant of wickedness has taken root in him.'' The
      Hebrew final clause is textually awkward and appears in plural form.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תָּרוּץ
  chosen: Do not rush
  alternatives:
  - Do not run
  - Do not hasten
  lexicon: HALOT
  rationale: The Hebrew verb רוץ literally means 'run,' but in this prohibitive infinitive-like
    construction it idiomatically conveys hasty action. 'Do not rush' preserves the
    metaphor while sounding natural in English.
- source_word: לְרַפְּאוֹת
  chosen: to heal
  alternatives:
  - to cure
  lexicon: HALOT
  rationale: רפא commonly means 'heal' or 'cure.' 'Heal' fits both the medical metaphor
    and the wisdom context, and aligns with the following noun רְפוּאָה ('healing').
- source_word: מַכַּת
  chosen: the wound
  alternatives:
  - the blow
  - the injury
  lexicon: HALOT
  rationale: מכה can denote a blow, plague, or wound. Here, with 'heal,' 'wound' best
    preserves the injury metaphor in coherent English.
- source_word: לֵץ
  chosen: a scoffer
  alternatives:
  - a mocker
  lexicon: HALOT
  rationale: לץ in wisdom literature denotes a contemptuous, arrogant mocker resistant
    to correction. 'Scoffer' is the standard wisdom-term equivalent and better captures
    the moral posture than the more casual 'mocker.'
- source_word: אֵין לָהּ רְפוּאָה
  chosen: there is no healing for it
  alternatives:
  - it has no cure
  - there is no remedy for it
  lexicon: HALOT
  rationale: The phrase states incurability. 'There is no healing for it' keeps the
    lexical tie to רפא/רפואה and preserves the metaphor established in the first colon.
- source_word: מִנֶּטַע רַע
  chosen: from an evil planting
  alternatives:
  - from an evil plant
  - from a bad stock
  lexicon: HALOT
  rationale: נטע can refer to a planting or what is planted. Because the Greek parallel
    has φυτὸν ('plant') and the Hebrew passive plural verb follows, the image is botanical/origin-based.
    'Evil planting' preserves the metaphor without over-specifying a single plant.
- source_word: נִטְעוֹ
  chosen: they were planted
  alternatives:
  - it was planted
  - he was planted
  lexicon: HALOT
  rationale: The Hebrew form as transmitted is plural, which creates a mismatch with
    the singular 'wound' and 'scoffer.' The Greek parallel reads singular with reference
    to what has taken root in the proud person. To stay anchored in the Hebrew while
    acknowledging the transmitted form, the English keeps the plural sense in the
    final clause. This reflects the source-level minor mismatch honestly rather than
    silently normalizing it.
