translation:
  text: A heavy heart multiplies its pains, and one who behaves recklessly adds sin
    upon sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''a hard heart will be afflicted in the end'' and ''a hard
      heart will be weighed down in the end.'''
    reason: alternative_reading
  - marker: b
    text: The Hebrew term rendered 'behaves recklessly' is difficult and may also
      suggest acting wildly, self-delusion, or boastful arrogance.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב כָּבֵד
  chosen: a heavy heart
  alternatives:
  - a hard heart
  - a burdened heart
  - a stubborn heart
  lexicon: HALOT
  rationale: The Hebrew witness reads literally 'a heavy heart.' In Hebrew idiom this
    can suggest dullness, burden, or obstinacy. The Greek parallel has καρδία σκληρά
    ('hard heart'), showing a divergent or interpretive tradition. Because the Hebrew
    is the primary witness here and is high-confidence, the main text preserves the
    Hebrew image 'heavy heart,' while the Greek-based alternative is preserved in
    a footnote.
- source_word: יִרְבּוּ
  chosen: multiplies
  alternatives:
  - increases
  - will have many
  lexicon: HALOT
  rationale: The verb means 'be many/increase.' 'Multiplies' keeps the causative/result
    sense in smooth English with the following object 'its pains.'
- source_word: מַכְאֹבָיו
  chosen: its pains
  alternatives:
  - its sorrows
  - its sufferings
  - its griefs
  lexicon: HALOT
  rationale: מַכְאוֹב denotes pain or suffering. 'Pains' is the most direct rendering
    and fits both physical and inward distress. The suffix is retained with 'its'
    referring back to the heart.
- source_word: וּמִתְהוֹלֵל
  chosen: one who behaves recklessly
  alternatives:
  - the self-deluded person
  - one who raves
  - the arrogant boaster
  - one who acts wildly
  lexicon: HALOT
  rationale: The hitpolel form from הלל/related development is difficult and context-sensitive.
    In wisdom context, it points to undisciplined, self-exalting, or reckless conduct
    rather than mere emotional frenzy. 'One who behaves recklessly' captures the practical
    moral sense without overcommitting to a narrower nuance. The source validation
    notes a major mismatch, so a lexical-alternative footnote preserves the uncertainty.
- source_word: מוֹסִיף
  chosen: adds
  alternatives:
  - increases
  - keeps adding
  lexicon: HALOT
  rationale: 'Straightforward participial sense: ''adds'' or ''continues adding.''
    ''Adds'' is concise and idiomatic.'
- source_word: עָוֹן עַל עָוֹן
  chosen: sin upon sin
  alternatives:
  - guilt upon guilt
  - iniquity upon iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity or guilt, but in this moral exhortation 'sin
    upon sin' is the clearest modern English and preserves the piling-up image of
    עַל.
