translation:
  text: A father's blessing establishes roots, but a mother's curse uproots a plant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''For a father''s blessing strengthens the houses of children,
      but a mother''s curse uproots foundations.'' The Hebrew witness instead uses
      agricultural imagery: ''root'' and ''plant.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בִּרְכַת
  chosen: blessing
  alternatives:
  - blessing spoken over
  - benediction
  lexicon: HALOT
  rationale: The noun plainly denotes a blessing pronounced by the father. 'Blessing'
    is the natural, readable English equivalent and preserves the proverb's moral
    force.
- source_word: אָב
  chosen: father's
  alternatives:
  - of a father
  lexicon: HALOT
  rationale: The construct phrase בִּרְכַת אָב is most naturally rendered possessively
    in English. Singular 'father' matches the Hebrew and the paired singular 'mother'
    in the second colon.
- source_word: תְּיַסֵּד
  chosen: establishes
  alternatives:
  - founds
  - sets firm
  - makes secure
  lexicon: HALOT
  rationale: From יסד, the sense is to found or establish firmly. 'Establishes' fits
    both the Hebrew and the proverb style, while also aligning with the Greek στηρίζει
    ('strengthens/establishes') as a consistency check.
- source_word: שֹׁרֶשׁ
  chosen: root
  alternatives:
  - foundation
  lexicon: HALOT
  rationale: The Hebrew witness reads 'root,' and original-language primacy favors
    retaining that image. The Greek parallel has 'houses of children' / 'foundations,'
    showing a different metaphorical development, but the Hebrew is clear and should
    govern the main text.
- source_word: וְקִלְלַת
  chosen: but a curse
  alternatives:
  - and a curse
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but English proverb style
    and the antithetical parallelism favor 'but,' making the contrast explicit without
    adding meaning beyond the Hebrew poetic structure.
- source_word: אֵם
  chosen: a mother's
  alternatives:
  - of a mother
  lexicon: HALOT
  rationale: Possessive English best reflects the construct phrase and preserves the
    father/mother parallel.
- source_word: תִּנְתּשׁ
  chosen: uproots
  alternatives:
  - tears out
  - pulls up
  - plucks up
  lexicon: HALOT
  rationale: From נטש in this context, the image is of tearing up from the ground.
    'Uproots' is vivid, idiomatic, and matches the agricultural imagery of 'root'
    and 'plant.'
- source_word: נֶטַע
  chosen: a plant
  alternatives:
  - a planting
  - what is planted
  - a shoot
  lexicon: HALOT
  rationale: The noun denotes something planted. 'Plant' is concise and natural in
    English, preserving the agricultural metaphor. 'Planting' is possible but sounds
    more abstract here.
