  chosen_reading: 'Retain the Hebrew agricultural imagery: ''establishes a root ...
    uproots a plant.'''
  alternative_readings:
  - 'Follow the Greek parallel more closely: ''a father''s blessing strengthens the
    houses of children, but a mother''s curse uproots foundations.'''
  rationale: For Sirach, where Hebrew survives, the project translates from the Hebrew
    witness while consulting the Greek as an actual input and consistency check. Here
    the Hebrew is high-confidence and coherent, so its imagery governs the main text.
    The Greek reflects a notable variant or interpretive reshaping and is preserved
    in a footnote rather than replacing the Hebrew.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition; PHILOSOPHY.md on translating Sirach from Hebrew where it survives.
