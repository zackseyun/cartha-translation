theological_decisions:
- issue: Divergence between the Hebrew second colon and the Greek parallel
  chosen_reading: 'Translate the extant Hebrew as primary: honoring one''s mother
    is described in relation to repaying God.'
  alternative_readings:
  - 'Translate with the Greek: ''whoever obeys the Lord will give rest to his mother'''
  rationale: PHILOSOPHY gives original-language primacy to the Hebrew for Sirach where
    Hebrew survives, while also requiring the Greek parallel to be used as a real
    input. Here the Hebrew and Greek differ substantially in the second colon. Because
    the Hebrew witness is present and high-confidence, the main text follows it; the
    Greek alternative is preserved in a footnote due to the significance of the divergence.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; DOCTRINE.md:
    preserve theological tension rather than resolve it silently'
