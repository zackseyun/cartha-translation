id: SIR.3.6
reference: Sirach 3:6
source:
  edition: sefaria-ben-sira-kahana
  text: '[מְכַבֵּד אָבִיו יִרְבּוּ יָמָיו, וּגְמוּל אֱלֹהִים עַל] מְכַבֵּד אִמּוֹ.'
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ὁ δοξάζων πατέρα μακροημερεύσει, καὶ ὁ εἰσακούων κυρίου ἀναπαύσει μητέρα
      αὐτοῦ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 3:6
translation:
  text: Whoever honors his father will have long days, and whoever honors his mother
    is repaying God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and whoever obeys the Lord will give rest to his mother.''
      The Hebrew and Greek differ substantially in the second line.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְכַבֵּד
  chosen: honors
  alternatives:
  - glorifies
  - esteems
  lexicon: HALOT
  rationale: The participle from כבד in this ethical context denotes giving due honor
    or respect to a parent. 'Honors' is idiomatic English and aligns with the commandment
    tradition without sounding archaic.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - father
  lexicon: HALOT
  rationale: The Hebrew has the singular noun with 3ms suffix. 'His father' preserves
    the individualizing force of the participial construction.
- source_word: יִרְבּוּ יָמָיו
  chosen: will have long days
  alternatives:
  - his days will be many
  - will live long
  lexicon: HALOT
  rationale: Literally, 'his days will be many.' 'Will have long days' keeps the Hebrew
    imagery more closely than the smoother 'will live long,' while remaining understandable
    in English.
- source_word: וּגְמוּל אֱלֹהִים עַל
  chosen: is repaying God
  alternatives:
  - is a recompense to God
  - renders repayment before God
  - receives God's reward
  lexicon: HALOT
  rationale: The Hebrew phrase is compressed and somewhat awkward as transmitted,
    but in context it most naturally means that honoring one's mother counts as repayment
    directed toward God. The Greek parallel reads differently ('whoever obeys the
    Lord will give rest to his mother'), but the Hebrew is the primary witness here
    and is sufficiently coherent to translate. 'Is repaying God' expresses the predicative
    sense concisely.
- source_word: אִמּוֹ
  chosen: his mother
  alternatives:
  - mother
  lexicon: HALOT
  rationale: The 3ms suffix should be represented in English for consistency with
    the first colon and the Hebrew syntax.
