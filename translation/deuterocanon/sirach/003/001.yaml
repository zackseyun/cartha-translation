id: SIR.3.1
reference: Sirach 3:1
source:
  edition: sefaria-ben-sira-kahana
  text: '[שִׁמְעוּ בָנִים מִשְׁפַט אָב, וַעֲשׂוּ לְמַעַן תִּחְיוּ.]'
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: Ἐμοῦ τοῦ πατρὸς ἀκούσατε, τέκνα, καὶ οὕτως ποιήσατε, ἵνα σωθῆτε.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 3:1
translation:
  text: Listen, children, to a father's instruction, and do so that you may live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Listen to me, your father ... so that you may be saved.'' The
      Hebrew witness reads more generically, ''to a father''s instruction ... so that
      you may live.'''
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Listen
  alternatives:
  - Hear
  - Obey
  lexicon: HALOT
  rationale: Imperative plural of שמע. 'Listen' preserves the call to attentive hearing
    without prematurely collapsing it into 'obey,' though obedience is implied by
    the following command to act.
- source_word: בָנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Though formally masculine plural, the address is representative/generic
    in wisdom instruction. 'Children' communicates the intended filial audience in
    natural English while avoiding an unnecessarily male-restricted sense.
- source_word: מִשְׁפַט
  chosen: instruction
  alternatives:
  - judgment
  - ordinance
  - rule
  lexicon: HALOT
  rationale: In this context 'mishpat of a father' refers not to a legal verdict but
    to the father's authoritative directive or disciplined instruction. The Greek
    ἀκούσατε ... τοῦ πατρὸς supports an exhortational sense rather than courtroom
    language.
- source_word: אָב
  chosen: a father's
  alternatives:
  - your father’s
  - of a father
  lexicon: HALOT
  rationale: The Hebrew lacks an explicit pronominal suffix, unlike the Greek Ἐμοῦ
    τοῦ πατρὸς ('of me, the father'). Because the Hebrew is the primary witness here,
    the English should not import 'my' or 'your' into the main text. 'A father's'
    preserves the generic wisdom address while remaining idiomatic.
- source_word: וַעֲשׂוּ
  chosen: act accordingly
  alternatives:
  - do
  - act
  - put it into practice
  lexicon: HALOT
  rationale: A simple imperative of עשה, but in English bare 'do' is too vague. 'Act
    accordingly' captures the sense of carrying out the father's instruction and fits
    the parallel with 'listen.'
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake that
  lexicon: HALOT
  rationale: Standard purpose clause marker; 'so that' is clear modern English.
- source_word: תִּחְיוּ
  chosen: you may live
  alternatives:
  - you may survive
  - you may be saved
  lexicon: HALOT
  rationale: From חיה, 'live.' The Greek σωθῆτε suggests 'be saved' in the extant
    Greek tradition, but the Hebrew witness here supports the more concrete 'live.'
    The main text follows the Hebrew while preserving the Greek alternative in a footnote.
