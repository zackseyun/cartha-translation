theological_decisions:
- issue: Primary-witness divergence between Hebrew and Greek in the father's self-reference
  chosen_reading: Follow the Hebrew's generic 'a father' in the main text
  alternative_readings:
  - '''my father'' / ''of me, the father'' reflected in the Greek'
  rationale: The project prioritizes the Hebrew for Sirach where extant. The Greek
    parallel is used as an input and consistency check, but its explicit first-person
    framing is not imported into the main text against the Hebrew wording.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; original-language
    primacy over translation tradition'
- issue: 'Outcome clause: ''live'' versus Greek ''be saved'''
  chosen_reading: Render the Hebrew as 'so that you may live'
  alternative_readings:
  - '''so that you may be saved'''
  rationale: The Hebrew text clearly reads תחיו ('you may live'). The Greek σωθῆτε
    is a meaningful alternative witness and may reflect interpretive expansion or
    a different Vorlage, so it is preserved in a footnote rather than adopted into
    the main text.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it; PHILOSOPHY.md: Hebrew primacy in Sirach where extant'
