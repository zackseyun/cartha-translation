translation:
  text: My son, honor your father in word and deed, so that all blessings may come
    upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''so that blessing may come upon you from him,'' making
      the father the more explicit source of the blessing.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: The Hebrew directly addresses a male child/son. Per gender-accurate policy,
    the masculine singular is preserved rather than neutralized.
- source_word: בְּמַאֲמָר
  chosen: in word
  alternatives:
  - by speech
  - in what you say
  lexicon: HALOT
  rationale: The noun refers to utterance/speech. 'In word' pairs naturally with the
    following 'in deed' and is supported by the Greek λόγῳ.
- source_word: וּבְמַעֲשֶׂה
  chosen: and deed
  alternatives:
  - and action
  - and work
  lexicon: HALOT
  rationale: Refers to concrete action. 'Deed' preserves the compact ethical pairing
    'word and deed,' also echoed by the Greek ἐν ἔργῳ καὶ λόγῳ.
- source_word: כַּבֵּד
  chosen: honor
  alternatives:
  - glorify
  - give weight to
  - show honor to
  lexicon: HALOT
  rationale: In filial-ethics context, כבד means to honor or treat with due weight/respect.
    'Honor' is the standard and clearest English equivalent here.
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct object of the imperative; straightforward possessive rendering.
- source_word: עֲבוּר
  chosen: so that
  alternatives:
  - in order that
  - because of this
  lexicon: HALOT
  rationale: Here it introduces purpose/result. 'So that' gives natural English while
    preserving the causal-purpose force.
- source_word: יַשִׂיגוּךָ
  chosen: may come upon you
  alternatives:
  - may overtake you
  - may reach you
  lexicon: HALOT
  rationale: Literally 'may reach/overtake you.' In English, blessings 'come upon'
    someone more idiomatically than 'overtake' in this context, while still reflecting
    the Hebrew image of blessings arriving to the person.
- source_word: כֹּל בְּרָכוֹת
  chosen: every blessing
  alternatives:
  - all blessings
  lexicon: HALOT
  rationale: The Hebrew is plural, 'all blessings,' but idiomatic English often uses
    the distributive singular 'every blessing.' This also fits the singular εὐλογία
    in the Greek parallel, likely functioning collectively.
