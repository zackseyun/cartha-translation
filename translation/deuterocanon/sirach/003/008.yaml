theological_decisions:
- issue: Scope of the promised blessing
  chosen_reading: general blessing from honoring one's father, without specifying
    divine or paternal source in the main text
  alternative_readings:
  - blessing from God
  - blessing from your father
  rationale: The Hebrew says 'that all/every blessings may reach you' without an explicit
    source. The Greek parallel adds 'from him' (παρ᾽ αὐτοῦ), which could point to
    the father. Because the Hebrew is the primary witness where extant, the main text
    preserves its broader wording, while the Greek-specific nuance is retained in
    a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
