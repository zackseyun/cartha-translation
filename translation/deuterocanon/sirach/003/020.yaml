translation:
  text: For the mercies of God are many, and to the humble he reveals his secret.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''For great is the dominion of the Lord, and he is glorified
      by the humble.'' The Hebrew witness here differs substantially from the Greek.'
    reason: alternative_reading
  - marker: b
    text: Or 'his counsel.' The Hebrew word can mean a secret shared in intimate confidence,
      not only hidden information.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  chosen: many
  alternatives:
  - great
  - numerous
  lexicon: HALOT
  rationale: The Hebrew predicate adjective naturally yields 'are many' with רַחֲמֵי.
    Although the Greek parallel reflects a different reading ('great is the dominion/power
    of the Lord'), the Hebrew witness is primary here and is high-confidence.
- source_word: רַחֲמֵי
  chosen: mercies
  alternatives:
  - compassion
  - acts of mercy
  lexicon: HALOT
  rationale: Plural 'mercies' preserves the Hebrew plural form and conveys repeated
    or abundant compassionate dealings. 'Compassion' is possible, but 'mercies' better
    matches the concrete plural nuance.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The Hebrew explicitly has 'God,' not 'the Lord.' The Greek parallel reads
    κυρίου ('Lord'), but the main text should follow the extant Hebrew witness.
- source_word: וְלַעֲנָוִים
  chosen: to the humble
  alternatives:
  - to the lowly
  - to the meek
  lexicon: HALOT
  rationale: '''The humble'' best captures the ethical and social sense of ענוים in
    wisdom literature. ''Meek'' is possible but sounds narrower and more tradition-laden
    in modern English.'
- source_word: יְגַלֶּה
  chosen: he reveals
  alternatives:
  - he uncovers
  - he makes known
  lexicon: HALOT
  rationale: '''Reveals'' is the most natural English equivalent for גלה with an object
    like סוד, preserving the sense of disclosure without over-paraphrase.'
- source_word: סוֹדוֹ
  chosen: his secret
  alternatives:
  - his counsel
  - his confidential plan
  lexicon: HALOT
  rationale: סוד can denote secret, confidential counsel, or intimate counsel. 'His
    secret' is the most direct rendering; the broader nuance of 'counsel' is worth
    preserving in a footnote because the term can imply divine confidential counsel
    rather than merely hidden information.
