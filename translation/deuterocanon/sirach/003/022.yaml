theological_decisions:
- issue: Reconciling the Hebrew הוּרְשֵׁיתָ with the Greek parallel προσετάγη
  chosen_reading: Render the clause as obligation ('what you have been commanded')
  alternative_readings:
  - what you have been permitted
  - what you have been entrusted with
  rationale: Zone 1 gives a Hebrew reading that, taken alone, could suggest permission
    or authorization, but the Greek parallel explicitly reads 'what was commanded
    to you.' Because the task requires using the Greek as actual translation input
    and the source is marked minor_mismatch, the main text follows the stronger convergent
    sense of an assigned or commanded sphere of concern, while preserving the Hebrew-based
    alternative in a footnote.
