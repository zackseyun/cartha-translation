translation:
  text: Consider what you have been commanded, and you have no business with hidden
    things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''what you have been permitted/authorized''; the Greek parallel
      reads ''what was commanded to you.'' The main text follows the Greek-supported
      sense of what has been assigned to your concern.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּמֶּה
  chosen: what
  alternatives:
  - that which
  - in what
  lexicon: HALOT
  rationale: Introduces the object of reflection. In context, idiomatic English is
    better served by 'what' rather than a more wooden 'in what.'
- source_word: הוּרְשֵׁיתָ
  chosen: you have been commanded
  alternatives:
  - you have been permitted
  - you have been authorized
  - you have been assigned
  lexicon: HALOT
  rationale: The Hebrew form could suggest 'you were permitted/authorized,' but the
    Greek parallel προσετάγη ('was commanded/ordered') strongly supports a sense of
    what has been laid upon the hearer as an obligation. Given the minor mismatch
    note and the instruction to use the Greek as actual translation input, 'commanded'
    best reflects the recoverable sense.
- source_word: הִתְבּוֹנֵן
  chosen: consider
  alternatives:
  - reflect on
  - give thought to
  - understand
  lexicon: HALOT
  rationale: The verb calls for thoughtful attention. 'Consider' is concise, natural
    English and matches the wisdom context better than the more cognitive 'understand'
    or the more expansive 'reflect on.'
- source_word: וְאֵין לְךָ עֵסֶק
  chosen: you have no business
  alternatives:
  - you have no concern
  - you have no need
  - it is not for you to deal with
  lexicon: HALOT
  rationale: The Hebrew idiom means that such matters are not the hearer's proper
    domain. 'You have no business' preserves the admonitory force. The Greek χρεία
    would support 'need,' but the Hebrew עֵסֶק points more toward involvement or occupation
    than mere necessity.
- source_word: בְּנִסְתָּרוֹת
  chosen: with hidden things
  alternatives:
  - with secret things
  - with mysteries
  lexicon: HALOT
  rationale: The plural refers to matters concealed from human inquiry. 'Hidden things'
    is clear and direct; 'secret things' is possible, and 'mysteries' risks importing
    later theological associations not required by the text.
