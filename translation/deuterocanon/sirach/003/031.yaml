theological_decisions:
- issue: Gendered generic singular in wisdom saying
  chosen_reading: A man who does good
  alternative_readings:
  - one who does good
  rationale: The Hebrew uses a masculine singular form with representative force.
    Per doctrine, the translation preserves the gendered singular rather than flattening
    it to a neutral plural or abstract expression, while the generic sense remains
    clear from context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Whether to follow the Hebrew or assimilate to the divergent Greek parallel
    in the first colon
  chosen_reading: Follow the Hebrew first colon and use the Greek to confirm the second
    colon's sense
  alternative_readings:
  - 'Translate toward the Greek: ''The one who repays favors remembers for the future'''
  rationale: For Sirach, where Hebrew survives, the Hebrew witness is primary. Here
    the Greek first colon differs substantially from the Hebrew, while the second
    colon is conceptually close. The main text therefore follows the Hebrew wording,
    with the Greek divergence preserved in a footnote for transparency.
  doctrine_reference: PHILOSOPHY.md §What we are translating; Zone 1 instruction on
    Hebrew primacy for surviving Sirach
