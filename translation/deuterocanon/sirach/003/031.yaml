translation:
  text: A man who does good will be called blessed for his ways, and at the time of
    his stumbling he will find support.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''The one who repays favors remembers for what comes afterward'';
      the Greek first line differs substantially from the extant Hebrew, though both
      agree in the second line that support is found in a time of falling.'
    reason: alternative_reading
lexical_decisions:
- source_word: פועל טוב
  chosen: A man who does good
  alternatives:
  - one who does good
  - a doer of good
  lexicon: HALOT
  rationale: The Hebrew phrase literally denotes one doing good. Because פועל is a
    masculine singular participial/noun form, 'a man who does good' preserves the
    gendered singular shape of the Hebrew in line with the project's gender-accurate
    policy, while still conveying the generic sense. 'Doer of good' is more wooden.
- source_word: יקראנו
  chosen: will be called blessed
  alternatives:
  - will call him
  - will proclaim him
  - will be named
  lexicon: HALOT
  rationale: 'The Hebrew form with pronominal suffix most naturally means ''will call
    him.'' In context, with בדרכיו (''for/by his ways''), the sense is that such a
    person is publicly acclaimed or pronounced fortunate because of his conduct. The
    Greek parallel shifts to ''the one who repays favors remembers for later,'' but
    the Hebrew witness is primary here and supports a passive-like English idiom:
    ''will be called blessed.'' This brings out the implied commendatory object without
    over-paraphrasing.'
- source_word: בדרכיו
  chosen: for his ways
  alternatives:
  - because of his ways
  - in his ways
  - for his conduct
  lexicon: HALOT
  rationale: Literally 'in/by his ways.' In wisdom literature 'ways' commonly denotes
    conduct or manner of life. 'For his ways' keeps the metaphor while remaining intelligible;
    'conduct' is interpretive but possible.
- source_word: בעת מוטו
  chosen: at the time of his stumbling
  alternatives:
  - at the time of his fall
  - when he totters
  lexicon: HALOT
  rationale: מוט denotes slipping, tottering, or collapse. The Greek parallel has
    'in a time of falling' (ἐν καιρῷ πτώσεως), confirming a sense of downfall or stumbling.
    'Stumbling' preserves the metaphor and avoids implying final ruin as strongly
    as 'fall' might.
- source_word: ימצא משען
  chosen: he will find support
  alternatives:
  - he will find a support
  - he will find a prop
  - he will find a stay
  lexicon: HALOT
  rationale: משען is something leaned on for support. The Greek στήριγμα likewise
    means support or firm stay. 'Support' is natural modern English and fits both
    literal and metaphorical senses.
