theological_decisions:
- issue: Rendering the parental terms in a gender-accurate but generic proverb context
  chosen_reading: the father ... the mother's authority ... her children
  alternative_readings:
  - parents ... parental authority
  rationale: The Hebrew explicitly distinguishes father and mother and should not
    be flattened into a gender-neutral collective. This follows the project's gender-accurate
    principle and preserves the verse's balanced parallelism.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
- issue: How to express the social-legal force of משפט האם
  chosen_reading: the mother's authority
  alternative_readings:
  - the mother's right
  - the mother's judgment
  rationale: The verse teaches divinely established filial obligation toward both
    parents. 'Authority' best captures the legal-relational force without importing
    later doctrinal structures. The alternative 'right' is possible but less idiomatic
    in this sentence.
