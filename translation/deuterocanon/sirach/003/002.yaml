id: SIR.3.2
reference: Sirach 3:2
source:
  edition: sefaria-ben-sira-kahana
  text: '[כִּי יְהֹוָה כִּבֵּד הָאָב לִפְנֵי הַבָּנִים, וּמִשְׁפַּט הָאֵם קִיֵּם עַל
    יְלָדֶיהָ.]'
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ὁ γὰρ Κύριος ἐδόξασεν πατέρα ἐπὶ τέκνοις, καὶ κρίσιν μητρὸς ἐστερέωσεν ἐφ᾽
      υἱοῖς.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 3:2
translation:
  text: For the LORD honored the father above the children, and he established the
    mother's authority over her children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confirmed the mother's right over her children.' Hebrew mishpat can
      mean 'judgment,' 'justice,' or a legal 'right/claim'; here it likely refers
      to the mother's rightful authority within the family.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel reads 'sons' in the second line, while the extant Hebrew
      has 'her children.' The translation follows the Hebrew as the primary witness
      here.
    reason: textual_variant
lexical_decisions:
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  - the Lord
  lexicon: HALOT
  rationale: 'Follows project doctrine for the divine name YHWH: render as ''the LORD''
    in line with Jewish reverence tradition and the Kyrios pattern in the Greek parallel.'
- source_word: כִּבֵּד
  chosen: honored
  alternatives:
  - glorified
  - gave honor to
  - made weighty
  lexicon: HALOT
  rationale: The Hebrew verb כבד in the piel commonly means to honor or give weight
    to. 'Honored' is natural modern English and fits the parental-respect context
    better than the more elevated 'glorified,' while remaining close to the Greek
    ἐδόξασεν.
- source_word: הָאָב
  chosen: the father
  alternatives:
  - a father
  - father
  lexicon: HALOT
  rationale: The definite singular in Hebrew is best preserved. In context it functions
    generically, but the singular form is part of the proverb-like instruction.
- source_word: לִפְנֵי הַבָּנִים
  chosen: before the children
  alternatives:
  - in the presence of the children
  - over the children
  - among the children
  lexicon: HALOT
  rationale: The Hebrew preposition literally means 'before/in front of.' The Greek
    parallel ἐπὶ τέκνοις suggests a relational sense of precedence or standing with
    respect to children. 'Before the children' preserves the Hebrew image while conveying
    priority of honor.
- source_word: וּמִשְׁפַּט
  chosen: authority
  alternatives:
  - judgment
  - right
  - claim
  - ordinance
  lexicon: HALOT
  rationale: Although משפט often means 'judgment' or 'justice,' in this familial legal-social
    context it denotes the mother's rightful claim or authority. The Greek κρίσιν
    can also carry the sense of legal right. 'Authority' communicates the practical
    force in idiomatic English.
- source_word: הָאֵם
  chosen: the mother's
  alternatives:
  - the mother
  - a mother
  lexicon: HALOT
  rationale: Rendered possessively in English to fit the phrase 'the mother's authority,'
    preserving the definite singular while producing natural syntax.
- source_word: קִיֵּם
  chosen: established
  alternatives:
  - confirmed
  - upheld
  - made firm
  lexicon: HALOT
  rationale: The verb means to make firm or confirm. 'Established' matches both the
    Hebrew and the Greek ἐστερέωσεν and clearly expresses that God has fixed or validated
    the mother's standing.
- source_word: עַל יְלָדֶיהָ
  chosen: over her children
  alternatives:
  - concerning her children
  - upon her children
  - with respect to her children
  lexicon: HALOT
  rationale: The preposition על here marks scope or authority relation. 'Over her
    children' best fits the sense when paired with 'authority,' and the suffix specifically
    indicates 'her children,' more precise than the Greek's broader 'sons'/'children'
    wording.
