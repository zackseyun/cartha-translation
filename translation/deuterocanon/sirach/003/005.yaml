id: SIR.3.5
reference: Sirach 3:5
source:
  edition: sefaria-ben-sira-kahana
  text: '[מְכַבֵּד אָבִיו יִשְׂמַח בִּבְנוֹ, וּתְפִלָתוֹ יִשְׁמַע וְיַעֲנֶה.]'
  language: Hebrew
  pages:
  - 665
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: τιμῶν πατέρα εὐφρανθήσεται ὑπὸ τέκνων, καὶ ὡς ὁ ἀποθησαυρίζων ὁ δοξάζων
      μητέρα αὐτοῦ· καὶ ἐν ἡμέρᾳ προσευχῆς αὐτοῦ εἰσακουσθήσεται.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 3:5
translation:
  text: Whoever honors his father will rejoice in his son, and his prayer will be
    heard and answered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has 'will rejoice through children' rather than the Hebrew singular
      'in his son.'
    reason: alternative_reading
  - marker: b
    text: The Greek parallel reads only 'will be heard' at the end; the Hebrew witness
      adds 'and answered.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְכַבֵּד
  chosen: honors
  alternatives:
  - glorifies
  - gives weight to
  - respects
  lexicon: HALOT
  rationale: From כבד in the piel/participle sense of honoring or giving due weight.
    'Honors' is idiomatic English and preserves the ethical force better than the
    more wooden 'glorifies.'
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his parent
  lexicon: HALOT
  rationale: The Hebrew specifically says 'his father,' not a gender-neutral equivalent.
    This follows the gender-accurate policy and matches the source text.
- source_word: יִשְׂמַח
  chosen: will rejoice
  alternatives:
  - will be glad
  - will find joy
  lexicon: HALOT
  rationale: The verb denotes joy/rejoicing. 'Will rejoice' is a clear, direct future
    rendering that fits wisdom-style promise language.
- source_word: בִּבְנוֹ
  chosen: in his son
  alternatives:
  - because of his son
  - through his son
  - in his children
  lexicon: HALOT
  rationale: The Hebrew literally reads 'in his son.' This likely expresses rejoicing
    with reference to or because of one's son/offspring. The Greek parallel has plural
    'children,' but the primary Hebrew witness supports singular. The main text keeps
    the Hebrew singular; the broader sense is preserved by context.
- source_word: וּתְפִלָתוֹ
  chosen: and his prayer
  alternatives:
  - and his plea
  lexicon: HALOT
  rationale: תפלה is the standard term for prayer. 'Prayer' is the natural and sufficiently
    broad English equivalent.
- source_word: יִשְׁמַע וְיַעֲנֶה
  chosen: will be heard and answered
  alternatives:
  - will be heard
  - will be listened to and answered
  - he will hear and answer
  lexicon: HALOT
  rationale: 'The Hebrew sequence naturally yields a passive sense in English for
    the prayer: it will be heard and answered. This also aligns with the Greek parallel''s
    ''will be heard'' while preserving the additional Hebrew verb ''and answered,''
    which should not be omitted.'
