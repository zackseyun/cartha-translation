translation:
  text: Do not probe into what is beyond you, for what is too great for you has been
    shown to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not investigate things greater than you.' The Hebrew verb is difficult,
      and the Greek parallel reads, 'Do not be over-curious in your many works.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew could also be read, 'for you have seen many things beyond you,' but
      the Greek parallel supports, 'what is too great for you has been shown to you.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיוֹתֵר מִמְּךָ
  chosen: what is beyond you
  alternatives:
  - what is too great for you
  - things greater than you
  lexicon: HALOT
  rationale: The Hebrew phrase denotes what exceeds one's proper scope or capacity.
    'What is beyond you' gives natural English while preserving the comparative sense.
    The Greek parallel's ἐν τοῖς περισσοῖς likewise points to matters exceeding due
    bounds.
- source_word: אַל תַּמֵּר
  chosen: do not probe into
  alternatives:
  - do not seek out
  - do not meddle with
  - do not investigate
  lexicon: HALOT
  rationale: The verb is somewhat difficult in this form, but in context and with
    the Greek μὴ περιεργάζου it clearly warns against over-curious inquiry into matters
    beyond one's station. 'Probe into' captures active investigation without sounding
    overly technical.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' preserves the concise
    explanatory force.
- source_word: רַב מִמְּךָ
  chosen: what is too great for you
  alternatives:
  - much more than you
  - greater things than you
  lexicon: HALOT
  rationale: The phrase indicates matters surpassing human measure or competence.
    'Too great for you' is idiomatic and fits the wisdom context of human limitation.
- source_word: הָרְאֵיתָ
  chosen: has been shown to you
  alternatives:
  - you have seen
  - you were made to see
  lexicon: HALOT
  rationale: 'Although the Hebrew form could be read actively (''you have seen''),
    the Greek ὑπεδείχθη σοι strongly supports a passive sense: these surpassing matters
    have already been shown to the hearer. The passive also fits the admonition: do
    not overreach, because sufficient revelation has already been given.'
