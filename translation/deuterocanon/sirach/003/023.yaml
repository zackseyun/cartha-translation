theological_decisions:
- issue: Voice of הָרְאֵיתָ in relation to the Greek parallel
  chosen_reading: 'passive sense: ''has been shown to you'''
  alternative_readings:
  - 'active sense: ''you have seen'''
  rationale: 'The extant Hebrew consonantal form can suggest an active reading, but
    the Greek parallel is to be used as actual translation input and clearly reads
    a passive idea (''has been shown to you''). The passive yields coherent wisdom
    theology: one should not pry into transcendent matters because more than enough
    has already been disclosed. This preserves the text''s warning against speculative
    overreach without importing later doctrinal claims.'
