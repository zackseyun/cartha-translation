theological_decisions:
- issue: Implied reward imagery in filial piety
  chosen_reading: The verse compares honoring one's mother to storing up treasure,
    preserving the wisdom metaphor without specifying whether the treasure is earthly,
    heavenly, or metaphorical.
  alternative_readings:
  - material prosperity
  - heavenly reward
  - general moral benefit
  rationale: The Greek states the simile but does not define the nature of the 'treasure.'
    To avoid importing a doctrinally specific reward theology, the translation keeps
    the metaphor open.
  doctrine_reference: Preserve theological tension rather than resolve it.
