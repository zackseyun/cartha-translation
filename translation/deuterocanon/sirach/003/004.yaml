id: SIR.3.4
reference: Sirach 3:4
source:
  edition: lxx-swete-1909
  text: καὶ ὡς ὁ ἀποθησαυρίζων ὁ δοξάζων μητέρα αὐτοῦ.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And whoever honors his mother is like one who stores up treasure.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοξάζων
  chosen: honors
  alternatives:
  - glorifies
  - gives honor to
  lexicon: BDAG
  rationale: In this wisdom context, δοξάζω refers to giving due honor or esteem to
    one's mother, not to glorifying in a strongly cultic sense. 'Honors' is natural
    English and matches the filial-duty theme of the surrounding verses.
- source_word: ἀποθησαυρίζων
  chosen: stores up treasure
  alternatives:
  - treasures up
  - lays up treasure
  lexicon: LSJ
  rationale: The participle literally denotes storing up in a treasury. 'Stores up
    treasure' preserves the concrete metaphor and communicates the idea of accumulating
    lasting value or reward without paraphrasing it away.
- source_word: μητέρα αὐτοῦ
  chosen: his mother
  alternatives:
  - his own mother
  lexicon: BDAG
  rationale: The Greek is explicitly singular and masculine in form, typical of proverbial
    instruction. Per project philosophy, the gendered form is retained rather than
    neutralized.
- source_word: ὡς
  chosen: is like
  alternatives:
  - is as
  - is like someone who
  lexicon: BDAG
  rationale: The comparative particle introduces a simile. Supplying 'is like' makes
    the verbless Greek idiomatic in English while preserving the comparison.
