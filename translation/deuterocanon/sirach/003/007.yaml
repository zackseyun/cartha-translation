theological_decisions:
- issue: Strength of filial obligation imagery
  chosen_reading: Retain the simile of serving parents 'as masters' without softening
    it to mere respect or attendance.
  alternative_readings:
  - serve his parents dutifully
  - wait on those who gave him birth
  rationale: The Greek explicitly uses δεσπόταις and δουλεύσει, a deliberately strong
    image of subordination. Softening the language would reduce the ethical force
    of the verse beyond what the source warrants.
