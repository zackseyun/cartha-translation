id: SIR.3.7
reference: Sirach 3:7
source:
  edition: lxx-swete-1909
  text: καὶ ὡς δεσπόταις δουλεύσει ἐν τοῖς γεννήσασιν αὐτόν.
  language: Greek
  pages:
  - 665
  confidence: high
translation:
  text: and he will serve those who begot him as masters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as lords'; the Greek term denotes persons exercising full authority,
      here used as a strong comparison for honoring one's parents.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσπόταις
  chosen: masters
  alternatives:
  - lords
  - owners
  lexicon: BDAG
  rationale: δεσπότης denotes one with authority or ownership. In this filial context,
    'masters' preserves the strong comparison without importing a specifically political
    sense ('lords') or an ownership sense too literal for parents ('owners').
- source_word: δουλεύσει
  chosen: will serve
  alternatives:
  - will be a slave to
  - will render service to
  lexicon: BDAG
  rationale: The future of δουλεύω means to serve in a subordinate capacity. Because
    the comparison to 'masters' already conveys the strength of the obligation, 'will
    serve' is the most natural English while retaining the force of the Greek.
- source_word: ἐν τοῖς γεννήσασιν αὐτόν
  chosen: those who begot him
  alternatives:
  - his parents
  - those who gave him birth
  lexicon: BDAG
  rationale: The participle γεννήσασιν literally means 'those who begot/gave birth
    to' him. 'Those who begot him' stays close to the Greek and preserves the explicit
    grounding in parentage rather than using the more interpretive 'parents'.
