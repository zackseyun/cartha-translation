translation:
  text: The heart of the wise understands the sayings of the wise, and an attentive
    ear rejoices in wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sayings' could also be rendered 'proverbs' or 'parables'; the Greek
      parallel has 'parable' in the singular.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel differs in the second line, reading approximately 'and
      the ear of a hearer is the desire of a wise man,' while the extant Hebrew reads
      'and an attentive ear rejoices in wisdom.' The translation follows the Hebrew
      as the primary witness here.
    reason: textual_variant
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Hebrew anthropology לֵב commonly denotes the inner faculty of thought
    and understanding, not merely emotion. 'Heart' preserves the Hebrew image while
    remaining natural in English.
- source_word: חָכָם
  chosen: the wise
  alternatives:
  - a wise person
  - the wise man
  lexicon: HALOT
  rationale: The singular adjective/noun is used generically. 'The wise' is concise,
    idiomatic, and avoids over-specifying gender while preserving the representative
    sense.
- source_word: יָבִין
  chosen: understands
  alternatives:
  - discerns
  - comprehends
  lexicon: HALOT
  rationale: בין here denotes grasping the meaning of instruction. 'Understands' is
    the most straightforward rendering in context.
- source_word: מִשְׁלֵי
  chosen: the sayings
  alternatives:
  - proverbs
  - parables
  - maxims
  lexicon: HALOT
  rationale: Although משל can mean 'proverb' or 'parable,' in wisdom context and with
    the Greek παραβολήν as a check, the sense is broader than the canonical book title
    'Proverbs.' 'Sayings' communicates wise aphoristic speech without narrowing the
    genre too much.
- source_word: חֲכָמִים
  chosen: of the wise
  alternatives:
  - of wise men
  - of sages
  lexicon: HALOT
  rationale: The plural refers to wise teachers or sages. 'Of the wise' is natural
    and keeps the generic force.
- source_word: אֹזֶן
  chosen: ear
  alternatives:
  - hearing
  - an ear
  lexicon: HALOT
  rationale: The concrete image is retained in Hebrew style; English can naturally
    say 'an attentive ear.'
- source_word: מַקְשֶׁבֶת
  chosen: attentive
  alternatives:
  - listening
  - heedful
  lexicon: HALOT
  rationale: From קשב, the participle describes an ear that pays close attention.
    'Attentive' is idiomatic in English and captures the active listening sense.
- source_word: לְחָכְמָה
  chosen: in wisdom
  alternatives:
  - to wisdom
  - for wisdom
  lexicon: HALOT
  rationale: The Hebrew preposition could be rendered more literally as 'to wisdom,'
    but the clause in English is smoother as 'rejoices in wisdom.' The Greek parallel's
    wording is somewhat divergent here, but the Hebrew supports joy associated with
    wisdom itself.
- source_word: תִּשְׂמָח
  chosen: rejoices
  alternatives:
  - delights
  - is glad
  lexicon: HALOT
  rationale: שמח denotes joy or gladness. 'Rejoices' preserves the elevated wisdom
    tone and fits the parallelism.
