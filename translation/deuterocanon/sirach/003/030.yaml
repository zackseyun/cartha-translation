theological_decisions:
- issue: Meaning of צדקה in relation to atonement language
  chosen_reading: צדקה is rendered 'almsgiving,' yielding the sense that acts of mercy
    toward the poor are said to make atonement for sin.
  alternative_readings:
  - '''righteousness makes atonement for sin'''
  rationale: The Hebrew term can denote righteousness more broadly, but the Greek
    parallel explicitly interprets it as ἐλεημοσύνη, 'almsgiving.' In Ben Sira this
    is a recurring semantic development. Retaining 'makes atonement' preserves the
    text's own theological claim without softening it, while 'almsgiving' prevents
    the verse from being generalized into abstract moral uprightness.
  doctrine_reference: 'Translation philosophy: original-language primacy with parallel-source
    input; preserve theological tension rather than flattening it.'
