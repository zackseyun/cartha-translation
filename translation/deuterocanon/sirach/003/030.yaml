translation:
  text: Water extinguishes a blazing fire; so almsgiving makes atonement for sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charity'; Hebrew צדקה can also mean 'righteousness,' but the Greek parallel
      reads 'almsgiving' (ἐλεημοσύνη), which likely reflects the intended sense here.
    reason: lexical_alternative
  - marker: b
    text: Greek has 'sins' (plural). The Hebrew 'sin' may be understood generically.
    reason: alternative_reading
lexical_decisions:
- source_word: אש לוהטת
  chosen: a blazing fire
  alternatives:
  - a burning fire
  - a flaming fire
  - a fire burning hot
  lexicon: HALOT
  rationale: The Hebrew phrase literally denotes fire that is burning intensely. 'Blazing
    fire' is natural English and preserves the image of intense flame; the Greek φλογιζόμενον
    confirms the sense of a fire in full blaze.
- source_word: יכבו
  chosen: extinguishes
  alternatives:
  - quenches
  - puts out
  lexicon: HALOT
  rationale: The verb means to put out or quench a fire. 'Extinguishes' is slightly
    more idiomatic with 'fire' in modern English, while retaining the concrete image.
    The Greek ἀποσβέσει supports this sense.
- source_word: מים
  chosen: Water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: The singular collective 'water' is the most natural English rendering
    here and matches the proverb-like style.
- source_word: כן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: This marks the comparison between the two cola. 'So' is concise and idiomatic
    in English proverbial style.
- source_word: צדקה
  chosen: almsgiving
  alternatives:
  - charity
  - righteousness
  lexicon: HALOT
  rationale: Although צדקה can mean 'righteousness,' in Ben Sira and in this parallelism
    it carries the concrete sense of charitable giving to the needy. The Greek parallel
    ἐλεημοσύνη explicitly means 'almsgiving/mercy-giving,' which strongly guides the
    rendering here. 'Almsgiving' is more precise than the broader 'charity' and avoids
    importing the abstract sense 'righteousness' into a context about acts of mercy.
- source_word: תכפר
  chosen: makes atonement for
  alternatives:
  - atones for
  - covers
  - expiates
  lexicon: HALOT
  rationale: The verb כפר in piel commonly denotes making atonement. 'Makes atonement
    for' is transparent and accessible English. The Greek ἐξιλάσεται likewise points
    to expiation/atonement language. This preserves the text's theological force without
    substituting a weaker idiom such as 'makes up for'.
- source_word: חטאת
  chosen: sin
  alternatives:
  - sins
  - sin offering
  lexicon: HALOT
  rationale: In this context the noun refers to sin/guilt, not a sin offering. The
    Hebrew form can be collective, and the Greek has plural ἁμαρτίας ('sins'). English
    singular 'sin' works generically and proverbially; the plural sense is preserved
    as an alternative.
