theological_decisions:
- issue: Gendered proverbial subject
  chosen_reading: For a man's honor
  alternative_readings:
  - For a person's honor
  - For one's honor
  rationale: The Hebrew uses אִישׁ, a masculine singular noun with representative
    force. Per doctrine, gender-accurate rendering is preferred over flattening to
    gender-neutral language unless context demands otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of מְקַלֵּל in filial ethics context
  chosen_reading: one who dishonors his mother
  alternative_readings:
  - one who curses his mother
  rationale: The immediate parallel is honor/disgrace, and the Greek witness reflects
    disgrace language rather than an explicit cursing verb. The chosen rendering preserves
    the broader semantic force without excluding verbal abuse; the narrower alternative
    is preserved in a footnote for auditability.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
