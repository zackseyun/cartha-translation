translation:
  text: For a man's honor is the honor of his father, and one who dishonors his mother
    multiplies sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'one who curses his mother multiplies sin.' The Hebrew verb can specifically
      mean 'curse,' though here the honor/shame parallel and the Greek witness support
      the broader sense 'dishonor.'
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel reads, 'for a man's glory is from the honor of his father,
      and a mother in disgrace is a reproach to her children,' reflecting a somewhat
      different second line than the extant Hebrew.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In this wisdom context כבוד refers to social honor/reputation rather
    than visible splendor. The Greek parallel δόξα could suggest 'glory,' but 'honor'
    better fits both the Hebrew construct relation and the filial-ethics setting.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and the doctrine prefers gender-accurate
    rendering where representative force is present. 'A man' preserves the source
    form while still functioning proverbially.
- source_word: כִּבּוּד אָבִיו
  chosen: the honor of his father
  alternatives:
  - from the honor of his father
  - is from honoring his father
  lexicon: HALOT
  rationale: The Hebrew phrase is terse and somewhat elliptical. The Greek parallel
    ἐκ τιμῆς πατρὸς αὐτοῦ points toward a relation of derivation ('from the honor
    of his father'), but the Hebrew as transmitted most naturally reads appositionally/equationally.
    Rendering 'is the honor of his father' preserves the Hebrew wording while communicating
    the close identification between a man's honor and his father's honor.
- source_word: וּמַרְבֶּה
  chosen: multiplies
  alternatives:
  - increases
  - abounds in
  lexicon: HALOT
  rationale: 'The Hiphil conveys causing increase. ''Multiplies'' is concise and preserves
    the active force: the person''s action increases sin.'
- source_word: חֵטְא
  chosen: sin
  alternatives:
  - guilt
  - offense
  lexicon: HALOT
  rationale: The noun denotes sin/offense broadly. 'Sin' is the most direct and theologically
    transparent rendering in this ethical admonition.
- source_word: מְקַלֵּל אִמּוֹ
  chosen: one who dishonors his mother
  alternatives:
  - one who curses his mother
  - one who reviles his mother
  lexicon: HALOT
  rationale: The verb קלל in Piel can mean 'curse' or more broadly 'treat with contempt/disgrace.'
    The Greek parallel shifts to μήτηρ ἐν ἀδοξίᾳ ('a mother in dishonor/disgrace'),
    supporting a shame/disgrace sense in context. 'Dishonors' fits the honor-shame
    parallelism with the first colon better than the narrower 'curses,' while preserving
    the seriousness of filial contempt.
