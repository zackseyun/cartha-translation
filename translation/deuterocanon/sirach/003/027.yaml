theological_decisions:
- issue: Divergence between the extant Hebrew and Greek witnesses for Sirach 3:27
  chosen_reading: Translate the Hebrew line as the primary witness for this verse,
    while noting the Greek preserves a substantially different saying.
  alternative_readings:
  - 'Greek: ''A hard heart will be weighed down with pains, and the sinner will add
    sins upon sins.'''
  rationale: For Hebrew Sirach where the Hebrew survives, project policy gives original-language
    primacy to the Hebrew witness. Here the Greek parallel is not a minor variant
    but a different proverb, so it should not control the main text; however, the
    divergence is significant enough to preserve in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    use Greek in view'
