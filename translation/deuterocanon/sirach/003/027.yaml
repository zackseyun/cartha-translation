translation:
  text: Without the pupil, light is lacking; and without knowledge, wisdom is lacking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Greek witness reads a different saying here: ''A hard heart
      will be weighed down with pains, and the sinner will add sins upon sins.'''
    reason: textual_variant
lexical_decisions:
- source_word: בְּאֵין
  chosen: without
  alternatives:
  - in the absence of
  - when there is no
  lexicon: HALOT
  rationale: The preposition with אין expresses lack or absence. 'Without' is concise
    and natural in English while preserving the proverb-like parallelism.
- source_word: אִישׁוֹן
  chosen: pupil
  alternatives:
  - eyeball
  - little man of the eye
  lexicon: HALOT
  rationale: In context with 'light,' the word refers to the eye's pupil. 'Pupil'
    gives the plain anatomical sense in modern English. The more literal idiomatic
    background ('little man of the eye') would obscure the proverb.
- source_word: יֶחְסַר / תֶּחְסַר
  chosen: is lacking
  alternatives:
  - fails
  - is absent
  - decreases
  lexicon: HALOT
  rationale: The verb חסר denotes lacking or being deficient. Rendering both occurrences
    consistently as 'is lacking' preserves the Hebrew repetition and the balanced
    structure of the line.
- source_word: אוֹר
  chosen: light
  alternatives:
  - brightness
  lexicon: HALOT
  rationale: The basic sense is 'light.' This also fits the concrete image of sight
    in the first colon.
- source_word: דַעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: The noun commonly means 'knowledge.' Although 'understanding' is possible
    in wisdom literature, 'knowledge' best matches the lexical form here and keeps
    the parallel with 'wisdom' distinct.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - skill
  - wise judgment
  lexicon: HALOT
  rationale: The standard wisdom-literature sense is intended. 'Wisdom' is the natural
    and consistent rendering.
