theological_decisions:
- issue: Hebrew רחמים versus Greek χάριν in the promise clause
  chosen_reading: before God you will find mercy
  alternative_readings:
  - before the Lord you will find favor
  - before the Lord you will find grace
  rationale: The Hebrew witness is primary for extant Sirach and clearly reads רחמים,
    'mercy/compassion.' The Greek parallel likely reflects either a different Vorlage
    or an interpretive smoothing toward 'favor/grace.' To preserve source primacy
    without hiding the divergence, the Hebrew-based reading stands in the main text
    and the Greek alternative is footnoted.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Divine title in the Greek parallel (Κυρίου) versus Hebrew אֵל
  chosen_reading: God
  alternative_readings:
  - Lord
  rationale: Because the Hebrew witness is primary and reads El rather than the covenant
    name or its surrogate, 'God' is preferred in the main text. The Greek's 'Lord'
    is noted only indirectly through the alternative footnote on the clause.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; contested terms table for κύριος.'
