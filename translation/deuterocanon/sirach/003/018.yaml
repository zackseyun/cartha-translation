translation:
  text: Make yourself small in all greatness, and before God you will find mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''As great as you are, so humble yourself, and before the Lord you
      will find favor.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מַעֵט
  chosen: humble
  alternatives:
  - make small
  - diminish
  - lower
  lexicon: HALOT
  rationale: The Hebrew imperative literally means to make small or lessen yourself.
    In context, with מכל גדולה and supported by the Greek ταπείνου σεαυτόν, the idiomatic
    sense is self-humbling rather than physical reduction. 'Humble yourself' best
    captures the ethical force in natural English.
- source_word: נַפְשְׁךָ
  chosen: yourself
  alternatives:
  - your soul
  - your life
  lexicon: HALOT
  rationale: Though nephesh is literally 'soul' or 'self,' in this reflexive construction
    it functions idiomatically as the person himself. English 'yourself' conveys the
    reflexive sense more clearly than 'your soul' here.
- source_word: מִכָּל גְּדוּלָה
  chosen: the greater you are
  alternatives:
  - from all greatness
  - in the face of every greatness
  - from every exaltation
  lexicon: HALOT
  rationale: 'The Hebrew wording is somewhat compressed and could be read woodenly
    as ''lessen yourself from all greatness.'' The Greek parallel clarifies the comparative
    sense: ''as great as you are, so humble yourself.'' Rendering it as ''The greater
    you are'' communicates the intended proportional exhortation while remaining anchored
    in both witnesses.'
- source_word: לִפְנֵי אֵל
  chosen: before God
  alternatives:
  - before God Almighty
  - in the presence of God
  lexicon: HALOT
  rationale: El here is the common Semitic word for God. 'Before God' is the most
    direct and natural rendering of the prepositional phrase.
- source_word: תִּמְצָא רַחֲמִים
  chosen: you will find mercy
  alternatives:
  - you will find compassion
  - you will find favor
  lexicon: HALOT
  rationale: The Hebrew says 'mercy/compassion,' while the Greek parallel has χάριν,
    'favor/grace.' Since the Hebrew is the primary witness where extant, 'mercy' is
    retained in the main text, with the Greek-supported alternative preserved in a
    footnote.
