translation:
  text: Do not glorify yourself in your father's disgrace, for it is no honor to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not glorify yourself through your father's disgrace.' The Hebrew
      reflexive verb can suggest seeking honor for oneself, and the Greek parallel
      likewise uses language of glory/honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - You must not
  lexicon: HALOT
  rationale: Standard negative prohibition introducing the imperative.
- source_word: תִּתְכַּבֵּד
  chosen: honor yourself
  alternatives:
  - glorify yourself
  - boast
  - make yourself important
  lexicon: HALOT
  rationale: Hitpael of כבד carries a reflexive sense, 'make oneself honored' or 'gain
    honor for oneself.' 'Honor yourself' preserves the reflexive force better than
    the more interpretive 'boast.' The Greek δόξαζε likewise supports the sense of
    seeking glory/honor.
- source_word: בְּקְלוֹן
  chosen: in ... disgrace
  alternatives:
  - through ... shame
  - by means of ... dishonor
  lexicon: HALOT
  rationale: קלון denotes shame, disgrace, dishonor. The preposition ב here is best
    rendered idiomatically as 'in' or instrumentally 'through/by.' 'In your father's
    disgrace' keeps the Hebrew structure while remaining natural enough in English.
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Straightforward possessive noun; singular should be preserved.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition; 'for' is concise and natural
    in wisdom style.
- source_word: לֹא כָבוֹד הוּא לָךְ
  chosen: it is no honor to you
  alternatives:
  - it is not glory for you
  - it brings you no honor
  lexicon: HALOT
  rationale: כבוד here means honor/glory/repute. 'It is no honor to you' is a clear
    English rendering that preserves the nominal structure and the moral point. The
    Greek οὐ γάρ ἐστίν σοι δόξα confirms the sense.
