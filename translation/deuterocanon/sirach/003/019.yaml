theological_decisions:
- issue: Whether to render πραέσιν as 'meek,' 'gentle,' or 'humble'
  chosen_reading: the gentle
  alternative_readings:
  - the meek
  - the humble
  rationale: The verse contrasts socially elevated persons with those of a mild, non-self-assertive
    disposition. 'Gentle' is the best optimal-equivalence rendering in modern English.
    'Meek' is possible and worth preserving as a lexical alternative because of its
    biblical resonance.
