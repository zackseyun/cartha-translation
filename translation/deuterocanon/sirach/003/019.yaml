id: SIR.3.19
reference: Sirach 3:19
source:
  edition: lxx-swete-1909
  text: πολλοὶ εἰσιν ὑψηλοὶ καὶ ἐπίδοξοι· ἀλλὰ πραέσιν ἀποκαλύπτεται μυστήρια.
  language: Greek
  pages: []
  confidence: high
translation:
  text: Many are lofty and renowned, but mysteries are revealed to the gentle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the meek' or 'the humble.' The Greek πραέσιν can denote those who are
      mild, gentle, or meek in disposition.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: Many
  alternatives:
  - Many people
  - There are many
  lexicon: LSJ
  rationale: An indefinite plural used substantivally. 'Many' is concise and natural
    in English, preserving the proverb-like force without adding 'people.'
- source_word: ὑψηλοὶ
  chosen: lofty
  alternatives:
  - great
  - high
  - exalted
  lexicon: LSJ
  rationale: Literally 'high'; here used of status or self-elevation. 'Lofty' preserves
    both social elevation and the moral nuance that contrasts with 'the gentle.'
- source_word: ἐπίδοξοι
  chosen: renowned
  alternatives:
  - distinguished
  - glorious
  - notable
  lexicon: LSJ
  rationale: The term denotes being held in repute or expectation of honor. 'Renowned'
    fits the public-status sense in smooth modern English.
- source_word: πραέσιν
  chosen: the gentle
  alternatives:
  - the meek
  - the humble
  lexicon: LSJ
  rationale: Dative plural of πραΰς. 'Gentle' best captures the character trait in
    accessible English without importing the stronger social-religious connotations
    of 'meek' or the slightly different semantic field of 'humble.' The contrast is
    with the lofty and renowned, so a quiet, non-self-assertive disposition is in
    view.
- source_word: ἀποκαλύπτεται
  chosen: are revealed
  alternatives:
  - is revealed
  - becomes known
  lexicon: LSJ
  rationale: Present passive. The plural English subject 'mysteries' calls for 'are
    revealed.' Passive voice should be preserved because the text does not specify
    the revealer.
- source_word: μυστήρια
  chosen: mysteries
  alternatives:
  - secret things
  - hidden things
  lexicon: LSJ
  rationale: Plural noun meaning hidden or secret matters. 'Mysteries' is the most
    direct rendering and preserves the text's weight without overexplaining.
