theological_decisions:
- issue: Atonement language in wisdom context
  chosen_reading: 'Retain explicit atonement wording: ''makes atonement for his sins.'''
  alternative_readings:
  - covers his sins
  - wins forgiveness for sins
  rationale: Both the Hebrew כפר and the Greek ἐξιλάσεται carry expiatory force. The
    verse should not be flattened into a vague moral benefit; it presents honoring
    one's father as having sin-removing significance within Ben Sira's wisdom theology.
    'Makes atonement' preserves that theological weight without importing later doctrinal
    systems.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered filial terms
  chosen_reading: Use 'father' and 'mother' rather than gender-neutral 'parents.'
  alternative_readings:
  - parents
  rationale: The source text names father and mother separately, and the second colon
    depends on that parallelism. Gender-accurate rendering matches the Hebrew wording
    and project philosophy.
  doctrine_reference: Translation philosophy §4
