id: SIR.3.3
reference: Sirach 3:3
source:
  edition: sefaria-ben-sira-kahana
  text: '[מְכַבֵּד אָב תְּכֻפַּר חַטָּאתוֹ, וְגוֹנֵז אוֹצָר מְכַבֵּד אִמּוֹ.]'
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ὁ τιμῶν πατέρα ἐξιλάσεται ἁμαρτίας·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 3:3
translation:
  text: Whoever honors his father makes atonement for his sins, and whoever honors
    his mother stores up treasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has 'his sin' in the singular; the Greek parallel reads 'sins,' which
      is likely collective in sense. The translation follows the collective sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'lays up treasure.' The image is of storing away reward like wealth in
      reserve.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַבֵּד
  chosen: honors
  alternatives:
  - glorifies
  - respects
  lexicon: HALOT
  rationale: From כבד in the piel/participle sense of giving due honor. 'Honors' is
    the most natural English equivalent here and aligns with the ethical command implied
    by the verse; 'respects' is weaker, and 'glorifies' is too elevated for filial
    duty.
- source_word: אָב
  chosen: father
  alternatives:
  - parent
  lexicon: HALOT
  rationale: The Hebrew is specifically singular masculine 'father,' not a generic
    'parent.' Gender-accurate rendering follows project philosophy.
- source_word: תְּכֻפַּר
  chosen: makes atonement
  alternatives:
  - is atoned for
  - obtains expiation for
  lexicon: HALOT
  rationale: The Hebrew passive/intensive form from כפר, read with the Greek ἐξιλάσεται,
    conveys expiation/atonement. English 'makes atonement' captures the result idiomatically
    in relation to the subject ('whoever honors his father...'). A strictly passive
    rendering ('his sin is atoned for') is possible, but the Greek supports a more
    active-result sense.
- source_word: חַטָּאתוֹ
  chosen: his sins
  alternatives:
  - his sin
  lexicon: HALOT
  rationale: Hebrew singular can function collectively, but the Greek parallel has
    plural ἁμαρτίας. Rendering as 'his sins' reflects the parallel source and communicates
    the likely collective sense in natural English.
- source_word: וְגוֹנֵז אוֹצָר
  chosen: stores up treasure
  alternatives:
  - lays up treasure
  - hoards treasure
  lexicon: HALOT
  rationale: גנז means to store up or lay away; אוצר is treasure/store. 'Stores up
    treasure' is idiomatic and avoids the negative connotation of 'hoards,' while
    preserving the metaphor of accumulated reward.
- source_word: אִמּוֹ
  chosen: his mother
  alternatives:
  - mother
  lexicon: HALOT
  rationale: The pronominal suffix is explicit in Hebrew; 'his mother' preserves the
    parallelism with 'his father' and the verse's individualizing force.
