theological_decisions:
- issue: Hebrew 'heavy heart' versus Greek parallel 'hard heart'
  chosen_reading: Translate the Hebrew main witness as 'a heavy heart' in the main
    text.
  alternative_readings:
  - a hard heart
  rationale: For Sirach, surviving Hebrew is primary where available. The Greek parallel
    likely reflects either a variant Vorlage or an interpretive rendering. To preserve
    transparency and theological tension about the character of the heart being described,
    the Greek-based alternative is footnoted rather than adopted into the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Generic masculine/proverbial subject
  chosen_reading: Use 'one who' rather than a masculine pronoun.
  alternative_readings:
  - he who
  rationale: The Hebrew proverb is generic rather than specifically male. This preserves
    the representative force in natural modern English without obscuring the source's
    intent.
  doctrine_reference: Translation philosophy §4
