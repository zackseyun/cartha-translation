id: SIR.3.25
reference: Sirach 3:25
source:
  edition: sefaria-ben-sira-kahana
  text: לֵב כָּבֵד תִּבְאַשׁ אַחֲרִיתוֹ, וְאֹוהֵב טוֹבוֹת יִנְהַג בָּהֶם.
  language: Hebrew
  pages: []
  confidence: high
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: καὶ ἀγάνων κίνδυνον ἐν αὐτῷ ἐμπεσεῖται· καρδία σκληρὰ κακωθήσεται ἐπ᾽ ἐσχάτων,
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 3:25
translation:
  text: A heavy heart will come to ruin in the end, and one who loves good things
    will be led by them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''a hard heart will be afflicted at the last.'' The Hebrew
      reads literally ''a heavy heart will become foul at its end.'''
    reason: alternative_reading
  - marker: b
    text: Or 'will become foul'—the Hebrew verb is more literally 'to stink' or 'to
      become rotten,' here expressing a disastrous outcome.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב כָּבֵד
  chosen: a heavy heart
  alternatives:
  - a hard heart
  - a stubborn heart
  lexicon: HALOT
  rationale: The Hebrew literally reads 'a heavy heart.' While the Greek parallel
    has καρδία σκληρά ('hard heart'), the primary witness here is the Hebrew, and
    'heavy heart' should be preserved in the main text. It likely conveys a morally
    or spiritually burdened/disordered inner life rather than mere sadness. The Greek
    supports an interpretive alternative ('hard heart'), which is preserved in a footnote
    rather than replacing the Hebrew sense.
- source_word: תִּבְאַשׁ
  chosen: will come to ruin
  alternatives:
  - will become foul
  - will rot
  - will fare badly
  lexicon: HALOT
  rationale: The verb's basic sense is 'to stink/become foul,' but in context with
    'its end' it idiomatically points to a bad outcome or ruin. 'Will come to ruin'
    communicates the result in natural English without flattening the warning. A more
    literal alternative is preserved in a footnote.
- source_word: אַחֲרִיתוֹ
  chosen: in the end
  alternatives:
  - its end
  - his end
  - at the last
  lexicon: HALOT
  rationale: The term denotes latter end/outcome. 'In the end' is idiomatic modern
    English and avoids overcommitting to either an impersonal 'its end' or a masculine-personal
    'his end' where the proverb is generic.
- source_word: וְאֹוהֵב טוֹבוֹת
  chosen: and one who loves good things
  alternatives:
  - and one who loves blessings
  - and one who loves pleasures
  - and a lover of good things
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat broad. 'Good things' keeps the lexical
    openness of טוֹבוֹת. Depending on context it could shade toward benefits, pleasures,
    or good gifts; the Greek parallel's opening phrase is textually and semantically
    difficult, so the Hebrew remains primary.
- source_word: יִנְהַג בָּהֶם
  chosen: will be guided by them
  alternatives:
  - will conduct himself in them
  - will be led by them
  - will walk in them
  lexicon: HALOT
  rationale: The verb נהג commonly means to lead/guide/drive. With the prepositional
    phrase, the sense is that the person's course is directed by the 'good things'
    he loves. 'Will be guided by them' is clear English and preserves the passive/resultative
    nuance.
