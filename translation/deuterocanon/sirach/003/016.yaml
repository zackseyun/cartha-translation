theological_decisions:
- issue: Whether to follow the Hebrew 'his Creator' or the Greek parallel 'by the
    Lord' in the second colon
  chosen_reading: his Creator
  alternative_readings:
  - by the Lord
  rationale: The project gives primacy to the Hebrew witness for Sirach where extant.
    Here the Hebrew is clear and high-confidence. The Greek parallel was used as a
    consistency check and supports the sense of divine judgment, but the more specific
    Hebrew wording should stand in the main text.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation
    tradition; Contested terms table for κύριος → Lord
- issue: How strongly to render מֵזִיד in light of Greek βλάσφημος
  chosen_reading: is insolent
  alternative_readings:
  - is presumptuous
  - is a blasphemer
  rationale: The Hebrew term points to arrogant presumption rather than explicitly
    verbal blasphemy. The Greek likely interprets the offense more sharply. To preserve
    the Hebrew's plain sense without flattening the severity, 'is insolent' was chosen,
    with stronger alternatives preserved in a footnote.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
