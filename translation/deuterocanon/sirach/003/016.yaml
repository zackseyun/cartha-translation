translation:
  text: For one who despises his father is insolent, and one who curses his mother
    provokes his Creator.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acts presumptuously'; the Greek parallel intensifies this as 'is a blasphemer.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek parallel: ''is cursed by the Lord.'' The Hebrew reads ''is cursed
      by his Creator.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מֵזִיד
  chosen: is insolent
  alternatives:
  - acts presumptuously
  - is reckless
  - is a blasphemer
  lexicon: HALOT
  rationale: The Hebrew participial form from זיד conveys arrogant, presumptuous behavior.
    In this clause it functions predicatively after 'one who despises his father.'
    The Greek parallel βλάσφημος points toward a strongly condemnatory characterization,
    but the Hebrew is better represented by 'insolent' or 'presumptuous' than by the
    more specifically theological 'blasphemer.' 'Is insolent' gives natural English
    while preserving the moral force.
- source_word: בּוֹזֶה
  chosen: despises
  alternatives:
  - scorns
  - treats with contempt
  lexicon: HALOT
  rationale: בזה denotes despising or holding in contempt. 'Despises' is direct, idiomatic,
    and matches the filial-honor context without overexpansion.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - father
  lexicon: HALOT
  rationale: The pronominal suffix is explicit and should be retained in English.
- source_word: וּמַכְעִיס
  chosen: one who provokes
  alternatives:
  - one who angers
  - one who enrages
  lexicon: HALOT
  rationale: The Hifil participle of כעס means to cause anger or provoke. The Greek
    παροργίζων similarly supports 'provokes.' This keeps the active causative sense.
- source_word: בּוֹרְאוֹ
  chosen: his Creator
  alternatives:
  - his maker
  - the one who created him
  lexicon: HALOT
  rationale: The Hebrew literally means 'his creator.' This is the more original witness
    and should be followed. It also sharpens the theological point that dishonoring
    one's mother is offense before God. The Greek parallel has 'cursed by the Lord,'
    likely an interpretive rendering; the Hebrew's explicit 'Creator' is preserved.
- source_word: מְקַלֵּל
  chosen: is cursed
  alternatives:
  - is accursed
  - brings a curse
  lexicon: HALOT
  rationale: 'In context with ''his Creator,'' the participle is best taken predicatively/passively
    in sense: the one who curses or dishonors his mother stands under curse from his
    Creator. The Greek κεκατηραμένος ὑπὸ Κυρίου strongly supports this passive/resultative
    understanding. ''Is cursed'' is concise and clear.'
- source_word: אִמּוֹ
  chosen: his mother
  alternatives:
  - mother
  lexicon: HALOT
  rationale: The pronominal suffix is explicit and should be retained. 'Mother' matches
    the parental parallelism with 'father.'
