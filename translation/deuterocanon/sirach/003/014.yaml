translation:
  text: A father's righteousness will not be wiped away, and in place of sins it will
    be planted for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''For a father''s almsgiving will not be forgotten, and instead
      of sins it will be built up for you.'' The Greek reflects a somewhat different
      wording, especially ''almsgiving'' and ''will be built up.'''
    reason: alternative_reading
lexical_decisions:
- source_word: צִדְקַת אָב
  chosen: a father's righteousness
  alternatives:
  - a father's charity
  - a father's almsgiving
  - the righteousness due to a father
  lexicon: HALOT
  rationale: The Hebrew literally reads 'righteousness of a father.' While the Greek
    parallel has ἐλεημοσύνη ('almsgiving/mercy'), the Hebrew witness is primary here
    and favors the broader moral term 'righteousness.' 'A father's righteousness'
    best preserves the genitive sense and leaves open whether this refers to righteous
    care shown toward one's father or the father's own righteous standing. The immediate
    context about honoring parents supports a filial-duty nuance, but the wording
    itself is broader than 'almsgiving.'
- source_word: לֹא תִּמָּחֶה
  chosen: will not be wiped away
  alternatives:
  - will not be blotted out
  - will not be erased
  lexicon: HALOT
  rationale: The Niphal of מחה commonly conveys being wiped out, blotted out, or erased.
    'Wiped away' is natural modern English while retaining the metaphor of removal
    from record or memory.
- source_word: וּתְמוּר
  chosen: and in place of
  alternatives:
  - and instead of
  - and as compensation for
  lexicon: HALOT
  rationale: תמור marks exchange or substitution. 'In place of' preserves the substitutional
    sense without over-interpreting the mechanism.
- source_word: חַטָּאת
  chosen: sins
  alternatives:
  - sin
  - sin-offering
  lexicon: HALOT
  rationale: In this wisdom context, the plural sense reflected in the Greek ἁμαρτιῶν
    is most likely, referring to moral failures rather than a cultic 'sin offering.'
    English plural 'sins' best matches the sense of offenses being countered.
- source_word: הִיא תְּנַתֵּעַ
  chosen: it will be planted for you
  alternatives:
  - it will be established for you
  - it will take root for you
  - you will be built up
  lexicon: HALOT
  rationale: The Hebrew verb appears to derive from נטע, 'to plant.' This yields the
    image that the righteous act is planted on the person's behalf. The Greek parallel
    instead reads 'it will be built up for you,' suggesting either a different Vorlage
    or interpretive rendering. Because the Hebrew is the primary witness and is intelligible,
    'it will be planted for you' is retained in the main text, with the Greek-based
    alternative preserved in a footnote.
