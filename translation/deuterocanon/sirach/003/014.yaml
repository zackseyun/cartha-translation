theological_decisions:
- issue: Whether the verse promises merit that offsets sin
  chosen_reading: The translation preserves the text's substitution language ('in
    place of sins') without specifying a later doctrinal mechanism of atonement or
    merit.
  alternative_readings:
  - The act is remembered favorably despite sins
  - The act atones for sins
  - The act leads to restoration or rebuilding after sin
  rationale: Ben Sira uses strong moral-recompense language. The translation should
    not flatten this into mere remembrance, nor should it import a fully developed
    doctrine of atonement beyond what the verse states. The wording keeps the tension
    and lets the text speak in its own wisdom-framework idiom.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
