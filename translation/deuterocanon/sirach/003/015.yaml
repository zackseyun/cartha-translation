translation:
  text: In the day of distress it will be remembered for your benefit; like heat upon
    frost, your sins will melt away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the Greek more closely, 'like fair weather upon frost, so
      your sins will be dissolved.' The Hebrew reads 'heat upon frost,' while the
      Greek parallel has 'fair weather upon frost.' Both convey the image of frost
      disappearing.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיוֹם צָרָה
  chosen: In the day of distress
  alternatives:
  - In time of trouble
  - On the day of affliction
  lexicon: HALOT
  rationale: צָרָה commonly denotes distress, trouble, or affliction. 'Distress' preserves
    the gravity of the Hebrew while remaining natural English. The preposition בְּיוֹם
    is rendered idiomatically as 'In the day of' rather than hyper-literally.
- source_word: תִּזָּכֵר לָךְ
  chosen: it will be remembered for your benefit
  alternatives:
  - it will be remembered for you
  - you will be remembered
  lexicon: HALOT
  rationale: The feminine singular verb likely refers back to the filial piety/almsgiving
    theme of the immediate context. The dative לָךְ is best taken as advantage ('for
    your benefit') rather than merely indirect object. This also aligns with the Greek
    ἀναμνησθήσεταί σου, which supports the sense that the deed comes into remembrance
    on the person's behalf.
- source_word: כְּחֹם עַל כְּפוֹר
  chosen: like heat upon frost
  alternatives:
  - like warmth on ice
  - as fair weather upon frost
  lexicon: HALOT
  rationale: 'The Hebrew imagery is concrete: חֹם is ''heat'' and כְּפוֹר is ''frost.''
    Although the Greek has εὐδία (''fair weather/calm weather''), the Hebrew witness
    is primary here and gives a more direct melting image. ''Heat upon frost'' preserves
    the simile''s vividness and explains the following clause naturally.'
- source_word: לְהַשְׁבִּית עֲוֹנֶיךָ
  chosen: your sins will melt away
  alternatives:
  - to make your iniquities cease
  - to wipe out your guilt
  lexicon: HALOT
  rationale: The infinitive לְהַשְׁבִּית literally means 'to cause to cease/remove.'
    Because it follows the frost simile, an English rendering that carries the image
    forward is justified. 'Sins' is chosen over 'iniquities' for readability, though
    the Hebrew עָוֹן can include guilt as well as sin. The Greek ἀναλυθήσονται ('will
    be dissolved') supports the image-based rendering 'melt away'.
