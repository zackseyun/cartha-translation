translation:
  text: My son, in your prosperity walk in humility, and you will be loved more than
    a giver of gifts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Child, conduct your works in meekness, and you will be
      loved by an acceptable person.'' The Hebrew witness instead reads, ''My son,
      in your prosperity walk in humility, and you will be loved more than a giver
      of gifts.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - Child
  - My child
  lexicon: HALOT
  rationale: Direct address with masculine singular noun plus first-person suffix.
    Rendered gender-accurately per project philosophy. The Greek parallel has Τέκνον
    ('child'), which supports filial address, but the Hebrew witness is primary here
    and specifically says 'my son'.
- source_word: בְּעָשְׁרְךָ
  chosen: in your prosperity
  alternatives:
  - in your wealth
  - when you are rich
  lexicon: HALOT
  rationale: From עֹשֶׁר/wealth. 'In your prosperity' captures the state of having
    wealth without sounding narrowly materialistic in English, while still reflecting
    the Hebrew. The Greek parallel instead reads 'in meekness your works conduct,'
    suggesting a different Vorlage or interpretive rendering; because the Hebrew is
    extant and high-confidence, the translation follows the Hebrew while keeping the
    Greek in view.
- source_word: הִתְהַלֵּךְ
  chosen: walk
  alternatives:
  - conduct yourself
  - go about
  lexicon: HALOT
  rationale: Hitpael imperative of הלך, often idiomatic for one's manner of life.
    'Walk' preserves the metaphor and remains natural in English.
- source_word: בַּעֲנָוָה
  chosen: in humility
  alternatives:
  - with humility
  - in meekness
  lexicon: HALOT
  rationale: ענוה denotes humility/meekness. 'Humility' fits the ethical exhortation
    and pairs well with 'walk.' 'Meekness' is possible and is reflected in the Greek
    πραΰτης, but 'humility' is more idiomatic here.
- source_word: וְתֵאָהֵב
  chosen: and you will be loved
  alternatives:
  - and be loved
  - and you will become beloved
  lexicon: HALOT
  rationale: 'Nifal/imperfect sense is passive or reflexive-like: the addressee becomes
    the object of others'' love. The future-like English fits the exhortation-result
    structure.'
- source_word: מִנּוֹתֵן מַתָּנוֹת
  chosen: more than a giver of gifts
  alternatives:
  - more than one who gives gifts
  - beyond a gift-giver
  lexicon: HALOT
  rationale: Comparative מן plus participial phrase. The sense is that humble conduct
    wins affection beyond what generosity or patronage can secure. 'Giver of gifts'
    is concise and clear.
