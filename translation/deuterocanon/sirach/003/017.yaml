theological_decisions:
- issue: Primary-source alignment between extant Hebrew and divergent Greek parallel
  chosen_reading: 'Follow the Hebrew wording as the main text: prosperity/wealth,
    humility, and being loved more than a giver of gifts.'
  alternative_readings:
  - 'Greek-based rendering: ''Child, conduct your works in meekness, and you will
    be loved by an acceptable man/person.'''
  rationale: For Sirach, the project translates from the Hebrew where it survives,
    while using the Greek parallel as real input and consistency check. Here the Greek
    differs substantially from the Hebrew, especially in the first colon and final
    comparison. Since the Hebrew witness is extant and marked high confidence, it
    governs the main translation; the Greek alternative is preserved in a footnote
    for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; DOCTRINE.md:
    preserve theological/interpretive tension rather than resolve it silently.'
