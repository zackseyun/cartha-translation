theological_decisions:
- issue: Divergence between Hebrew and Greek witnesses
  chosen_reading: Translate from the extant Hebrew witness as primary, while allowing
    the Greek parallel to confirm the verse's admonitory character without controlling
    the wording.
  alternative_readings:
  - 'Greek witness: ''Do not litigate with a judge, for they will judge for him according
    to his standing/glory.'''
  rationale: For Sirach, where Hebrew survives, project policy gives Hebrew primacy.
    Here the Greek parallel reflects a substantially different saying, so it cannot
    simply be harmonized into the Hebrew line. The English therefore follows the Hebrew
    directly, with the Greek divergence preserved as a textual-variant footnote for
    transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    use Greek parallel as actual input while keeping Hebrew primacy.'
