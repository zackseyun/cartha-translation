    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:14
translation:
  text: Do not prosper in the inheritance of a wicked man, lest you be burned by the
    sparks of his fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek witness (Swete/LXX) reads a different saying here: ''Do not litigate
      with a judge, for they will judge for him according to his standing.'' The Hebrew
      Cairo Geniza text instead warns against involvement in the inheritance of a
      wicked man.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּצְלַח
  chosen: Do not prosper
  alternatives:
  - Do not succeed
  - Do not thrive
  lexicon: HALOT
  rationale: The Hebrew verb צלח commonly denotes succeeding or prospering. In this
    admonitory context, 'Do not prosper' preserves the Hebrew wording's unusual force
    rather than smoothing it into a looser paraphrase. It likely warns against seeking
    advancement through association with a wicked person's estate or legacy.
- source_word: בְּנַחֲלַת
  chosen: in the inheritance of
  alternatives:
  - by the inheritance of
  - through the estate of
  - in the possession of
  lexicon: HALOT
  rationale: נחלה ordinarily means inheritance, estate, or hereditary possession.
    'Inheritance' is the most direct rendering and keeps the concrete social-economic
    image. The preposition בְּ is rendered 'in' to reflect involvement within that
    sphere rather than merely proximity.
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - the wicked
  - a wicked person
  lexicon: HALOT
  rationale: The singular noun is rendered with a singular English expression. 'Wicked
    man' is gender-accurate to the masculine singular form and fits the wisdom-literature
    style of warning against a representative evildoer.
- source_word: פֶּן תְּבֹעַר
  chosen: lest you be burned
  alternatives:
  - lest you burn
  - or you may be consumed
  lexicon: HALOT
  rationale: בער in the passive-like sense here conveys being set ablaze or consumed.
    'Be burned' is idiomatic and preserves the warning's vivid consequence.
- source_word: בִּשְׁבִיב
  chosen: by the sparks of
  alternatives:
  - in the flame of
  - by the blaze of
  - by the embers of
  lexicon: HALOT
  rationale: שביב denotes spark, flame, or fiery flash. 'Sparks' best matches the
    plural-like collective sense in context and explains how even a secondary effect
    of the wicked person's fire can harm the hearer.
- source_word: אִשּׁוֹ
  chosen: his fire
  alternatives:
  - its fire
  lexicon: HALOT
  rationale: The suffix is masculine singular, naturally referring back to the wicked
    man. 'His fire' preserves the metaphor of destructive danger issuing from him
    or from what belongs to him.
