id: SIR.8.13
reference: Sirach 8:13
source:
  edition: sefaria-ben-sira-kahana
  text: כִּי מִמֶּנּוּ תִּקַּח שֶׂכֶל, בְּעֵת צֹרֶךְ לְהַשִׁיב פִּתְגָּם.
  language: Hebrew
  pages:
  - 677
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ ἐγγυήσῃ ὑπὲρ δύναμίν σου, καὶ ἐὰν ἐγγυήσῃ, ὡς ἀποτίσων φρόντιζε.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:13
translation:
  text: For from him you will gain understanding, at a time of need to answer a saying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a substantially different reading here: ''Do not give surety
      beyond your means, and if you do give surety, be concerned as one who will repay.''
      The Hebrew Cairo Geniza text is followed for the main translation because Hebrew
      survives for this verse, but the divergence is significant.'
    reason: textual_variant
lexical_decisions:
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - from it
  - through him
  lexicon: HALOT
  rationale: The Hebrew preposition with pronominal suffix most naturally means 'from
    him.' The antecedent is the person referenced in the surrounding context; the
    masculine personal sense fits better than an impersonal 'from it.'
- source_word: תִּקַּח
  chosen: you will gain
  alternatives:
  - you will take
  - you will receive
  lexicon: HALOT
  rationale: Although literally 'take,' in English 'gain' better conveys acquiring
    wisdom or practical understanding from a person without sounding wooden. This
    is an optimal-equivalence choice preserving the acquisition sense.
- source_word: שֶׂכֶל
  chosen: sense
  alternatives:
  - understanding
  - prudence
  - insight
  lexicon: HALOT
  rationale: שכל here denotes practical good judgment rather than abstract intellect.
    'Sense' is concise and idiomatic in modern English, while still preserving the
    wisdom-context nuance. 'Understanding' was possible but less pointed in this context.
- source_word: בְּעֵת צֹרֶךְ
  chosen: when there is need
  alternatives:
  - at a time of need
  - when necessary
  lexicon: HALOT
  rationale: The phrase marks circumstance or occasion. 'When there is need' keeps
    the temporal force of בעֵת while sounding natural in English.
- source_word: לְהַשִׁיב
  chosen: to answer
  alternatives:
  - to reply
  - to respond
  - to return
  lexicon: HALOT
  rationale: In context with פִּתְגָּם, the verb means giving a response. 'Answer'
    is the most straightforward English rendering.
- source_word: פִּתְגָּם
  chosen: a saying
  alternatives:
  - a proverb
  - a word
  - an utterance
  - a matter
  lexicon: HALOT
  rationale: The term can denote a maxim, pronouncement, or spoken formulation. 'A
    saying' is broad enough to preserve the Hebrew while fitting the wisdom setting.
    'Proverb' is possible but too specific; 'matter' is too vague.
