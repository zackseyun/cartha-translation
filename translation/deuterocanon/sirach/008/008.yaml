theological_decisions:
- issue: Gendered singular address and object
  chosen_reading: Render the Hebrew singular masculine as 'old man' and 'you too'
    rather than neutralizing to 'an elderly person.'
  alternative_readings:
  - Do not shame an elderly person; remember that you too will grow old.
  rationale: The Hebrew uses singular masculine forms (אֱנוֹשׁ ... יָשִׁישׁ). Under
    the project's gender-accurate policy, the translation keeps the masculine singular
    where it appears representative but concrete. The warning remains broadly applicable
    without erasing the source form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Use of the Greek parallel in a divergent verse
  chosen_reading: Translate the surviving Hebrew as primary, while allowing the Greek
    to inform the social nuance of honoring the aged/wise rather than importing the
    Greek's substantially different wording into the main text.
  alternative_readings:
  - Translate toward the Greek sense about attending to the sayings of the wise.
  rationale: For Sirach, where Hebrew survives, the project translates from the Hebrew
    witness. Here the Greek parallel is notably different in wording, so it serves
    as a consistency check rather than the base text. The main text therefore follows
    the Hebrew directly, with a footnote preserving the Greek alternative tradition.
  doctrine_reference: PHILOSOPHY.md 'What we are translating'
