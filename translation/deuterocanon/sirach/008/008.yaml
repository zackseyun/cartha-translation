translation:
  text: Do not shame an old man; remember that you too will be numbered among the
    elders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek tradition reads instead: ''Do not disregard the discourse of the
      wise, and occupy yourself with their proverbs; for from them you will learn
      instruction and how to serve great men.'' The Hebrew witness here preserves
      a different admonition about honoring the aged.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תְּבַיֵּשׁ
  chosen: Do not shame
  alternatives:
  - Do not disgrace
  - Do not embarrass
  - Do not put to shame
  lexicon: HALOT
  rationale: 'The piel of בוש here is causative: causing someone to experience shame/disgrace.
    ''Do not shame'' is concise, natural English and preserves the ethical force better
    than the more internal ''do not be ashamed.'''
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - person
  - human being
  lexicon: HALOT
  rationale: The noun denotes a human/person, here specified by the following adjective
    as elderly. In idiomatic English, 'old man' best matches the singular masculine
    form and the verse's direct social instruction. This follows the project's gender-accurate
    policy rather than flattening to a neutral plural.
- source_word: יָשִׁישׁ
  chosen: old
  alternatives:
  - aged
  - elderly
  lexicon: HALOT
  rationale: The adjective denotes advanced age. 'Old' is the most direct and idiomatic
    modifier with 'man' in English; 'aged' sounds more formal and 'elderly' more clinical.
- source_word: זְכֹר
  chosen: remember
  alternatives:
  - keep in mind
  - consider
  lexicon: HALOT
  rationale: Imperative זכר regularly means 'remember.' It preserves the admonitory
    logic linking the prohibition to the reader's own future aging.
- source_word: תִמָּנֶה
  chosen: will be numbered
  alternatives:
  - will be counted
  - will be reckoned
  lexicon: HALOT
  rationale: מנה in the nifal/passive sense naturally yields 'be numbered/counted.'
    'Will be numbered' preserves the passive nuance and the sense of joining a class
    or group.
- source_word: מִזְּקֵנִים
  chosen: among the elders
  alternatives:
  - among the old
  - with the aged
  lexicon: HALOT
  rationale: Literally 'from/among old ones, elders.' 'Among the elders' is idiomatic
    and reflects social standing as well as age. The Greek parallel points in the
    direction of respect for the wise/older generation, supporting this communal sense
    rather than a merely biological 'old people.'
