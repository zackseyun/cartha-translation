  text: אַל תָּרִיב עִם אִישׁ גָּדוֹל, לָמָּה תִשּׁוֹם עַל יָדוֹ.
  language: Hebrew
  pages:
  - 676
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: Μὴ διαμάχου μετὰ ἀνθρώπου δυνάστου, μή ποτε ἐμπέσῃς εἰς τὰς χεῖρας αὐτοῦ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:1
translation:
  text: Do not quarrel with a great man, lest you fall into his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads more literally, 'why should you be placed in his hand?' The
      Greek parallel supports the smoother sense, 'lest you fall into his hands.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תָּרִיב
  chosen: Do not quarrel
  alternatives:
  - Do not contend
  - Do not dispute
  - Do not strive
  lexicon: HALOT
  rationale: The Hebrew prohibition with ריב warns against entering into conflict
    or litigation. 'Quarrel' is natural modern English and fits both the Hebrew and
    the Greek διαμάχου, while remaining stronger than mere disagreement.
- source_word: עִם אִישׁ גָּדוֹל
  chosen: with a powerful man
  alternatives:
  - with a great man
  - with an important man
  - with a mighty man
  lexicon: HALOT
  rationale: Hebrew גדול literally means 'great,' but in this wisdom context, and
    confirmed by the Greek δυνάστου ('ruler/powerful one'), the sense is social or
    political power rather than moral greatness or physical size. 'Powerful man' best
    conveys the warning's practical force.
- source_word: לָמָּה תִשּׁוֹם עַל יָדוֹ
  chosen: lest you fall into his hands
  alternatives:
  - why should you be placed in his hand
  - so that you may not be put into his hand
  lexicon: HALOT
  rationale: 'The Hebrew as transmitted is somewhat awkward, with לָמָּה literally
    ''why,'' but the Greek parallel clearly reflects a warning clause: ''lest perhaps
    you fall into his hands.'' Given the parallel source and the likely idiomatic
    force, ''lest you fall into his hands'' communicates the intended consequence
    naturally in English. The plural ''hands'' follows the Greek idiom and standard
    English expression, even though the Hebrew has singular ''hand'' in the extant
    text.'
