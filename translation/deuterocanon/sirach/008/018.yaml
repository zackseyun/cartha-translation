id: SIR.8.18
reference: Sirach 8:18
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תּשָּׁפֵט עִם שׁוֹפֵט, כִּי כִּרְצוֹנוֹ יִשְׁפֹּט.
  language: Hebrew
  pages:
  - 677
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐνώπιον ἀλλοτρίου μὴ ποιήσῃς κρυπτόν, οὐ γὰρ γινώσκεις τί τέξεται.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:18
translation:
  text: Do not contend with a judge, for he will judge according to his own will.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a different saying here: ''Before a stranger do not do anything
      secret, for you do not know what it will bring forth.'' The Hebrew Cairo Geniza
      witness is followed for the main text because Hebrew survives for this verse,
      but the divergence is substantial and should be noted.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - You shall not
  lexicon: HALOT
  rationale: Standard negative prohibition introducing wisdom instruction; simple
    imperative English best matches the concise Hebrew warning.
- source_word: תּשָּׁפֵט
  chosen: contend
  alternatives:
  - litigate
  - enter into judgment
  - dispute
  lexicon: HALOT
  rationale: Although the root שפט often means 'judge,' with עִם plus 'a judge' the
    sense is adversarial legal contention rather than the act of judging. 'Contend'
    preserves the warning against taking a case up against a judicial authority without
    over-specifying courtroom procedure.
- source_word: עִם שׁוֹפֵט
  chosen: with a judge
  alternatives:
  - against a judge
  lexicon: HALOT
  rationale: The preposition is literally 'with,' but in English the adversarial sense
    is carried by 'contend with.' This keeps the Hebrew construction visible while
    yielding natural English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition; 'for' is concise and fits
    wisdom style.
- source_word: כִּרְצוֹנוֹ
  chosen: according to his own will
  alternatives:
  - as he pleases
  - according to his desire
  lexicon: HALOT
  rationale: רָצוֹן here denotes personal will or pleasure. 'According to his own
    will' preserves the warning that the judge's decision follows his own preference
    or authority. 'As he pleases' is possible but slightly more idiomatic and less
    transparent.
- source_word: יִשְׁפֹּט
  chosen: he will judge
  alternatives:
  - he will decide
  - he will render judgment
  lexicon: HALOT
  rationale: The same root as earlier is retained for consistency. 'Judge' keeps the
    legal frame explicit.
