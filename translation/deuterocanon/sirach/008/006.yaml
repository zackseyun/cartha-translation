id: SIR.8.6
reference: Sirach 8:6
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תְּרַגִּיל אִישׁ אֱוִיל, פֶּן יָבוּז לִנְדִיבִים
  language: Hebrew
  pages:
  - 676
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ ἀτιμάσῃς ἄνθρωπον ἐν γήρει αὐτοῦ, καὶ γὰρ ἐξ ἡμῶν γηράσκουσιν.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:6
translation:
  text: Do not become familiar with a foolish man, lest he show contempt for nobles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not dishonor a man in his old age, for some of us
      too are growing old.'' The Greek differs substantially from the extant Hebrew
      in this verse.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - You shall not
  lexicon: HALOT
  rationale: Standard negative prohibition introducing the admonition.
- source_word: תְּרַגִּיל
  chosen: grow accustomed to
  alternatives:
  - associate with regularly
  - make familiar
  - train
  lexicon: HALOT
  rationale: From רגל in the causative/intensive sense of making habitual or becoming
    familiar with. 'Grow accustomed to' preserves the warning against habitual association
    better than a flatter 'associate with.'
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - someone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine. Per project philosophy, a gender-accurate
    rendering is preferred unless context clearly universalizes beyond the masculine
    form.
- source_word: אֱוִיל
  chosen: foolish
  alternatives:
  - fool
  - stupid
  lexicon: HALOT
  rationale: Used adjectivally with אִישׁ. 'Foolish man' is natural English and preserves
    the wisdom-literature moral category without the harshness or modern connotations
    of 'stupid.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: Introduces the negative consequence clause succinctly and idiomatically.
- source_word: יָבוּז
  chosen: he show contempt
  alternatives:
  - he despise
  - he scorn
  lexicon: HALOT
  rationale: בוז denotes contempt or despising. 'Show contempt' makes the social action
    explicit in contemporary English while remaining close to the Hebrew sense.
- source_word: לִנְדִיבִים
  chosen: for nobles
  alternatives:
  - for the generous
  - for princes
  - for honorable people
  lexicon: HALOT
  rationale: נדיבים can denote nobles/princely persons, though the root also carries
    the sense of generosity. Given the social setting of wisdom instruction and the
    Greek parallel's different reading, 'nobles' best fits the Hebrew witness while
    preserving the likely class/status nuance.
