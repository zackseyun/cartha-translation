id: SIR.8.11
reference: Sirach 8:11
source:
  edition: sefaria-ben-sira-kahana
  text: '[וְאַף שִׂיחוֹת חוֹל מֵהֶם לֹא, תִבְזֶה] לְהִתְיַצֵּב לִפְנֵי שָׂרִים, כִּי
    מִמֶּנּוּ תִּלְמַד לֶקַח.'
  language: Hebrew
  pages:
  - 677
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ ἐξαναστῇς ἀπὸ προσώπου ὑβριστοῦ, ἵνα μὴ ἐγκαθίσῃ ὡς ἔνεδρον τῷ στόματί
      σου.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:11
translation:
  text: Do not despise even his ordinary conversation, for from him you will learn
    instruction for standing before rulers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not rise up from before an insolent man, lest he sit
      as an ambush against your mouth.'' The Greek tradition here differs substantially
      from the extant Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׂיחוֹת חוֹל
  chosen: ordinary conversation
  alternatives:
  - common talk
  - secular talk
  - mundane speech
  lexicon: HALOT
  rationale: שִׂיחוֹת denotes talk/conversation, and חוֹל here contrasts with what
    is elevated or formal, pointing to everyday or ordinary speech rather than morally
    bad speech. 'Ordinary conversation' preserves the sense without implying profanity.
- source_word: תִבְזֶה
  chosen: do not despise
  alternatives:
  - do not scorn
  - do not treat with contempt
  lexicon: HALOT
  rationale: The verb carries the sense of holding in contempt. 'Despise' is concise
    and natural in English.
- source_word: לְהִתְיַצֵּב לִפְנֵי שָׂרִים
  chosen: for standing before rulers
  alternatives:
  - to present yourself before princes
  - for appearing before officials
  lexicon: HALOT
  rationale: 'The infinitive phrase expresses purpose or practical outcome: one learns
    how to conduct oneself in the presence of high officials. ''Rulers'' is broader
    and more idiomatic than ''princes'' while still fitting שָׂרִים.'
- source_word: לֶקַח
  chosen: instruction
  alternatives:
  - learning
  - insight
  - good sense
  lexicon: HALOT
  rationale: לֶקַח often denotes instruction or teaching received. 'Instruction' fits
    the didactic context and the practical wisdom being learned from such a person.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - from such a man
  - from that person
  lexicon: HALOT
  rationale: The masculine singular pronoun refers back to the wise or experienced
    person in context. 'From him' keeps the gender-accurate singular of the Hebrew.
