id: SIR.8.2
reference: Sirach 8:2
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תָּרִיב עִם קָשֶׁה מִמְּךָ, לָמָּה תִפּוֹל בְּיָדוֹ.
  language: Hebrew
  pages:
  - 676
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ ἔριζε μετὰ ἀνθρώπου πλουσίου, μὴ ποτε ἀντιστήσῃ σου τὴν ὁλκήν· πολλοὺς
      γὰρ ἀπώλεσεν τὸ χρυσίον, καὶ καρδίας βασιλέων ἐξέκλινεν.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:2
translation:
  text: Do not quarrel with one harder than you, lest you fall into his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew reads ''one harder than you.'' The Greek parallel has ''a rich
      man'' and expands the warning: ''lest he outweigh you ... for gold has destroyed
      many.'' The main text follows the surviving Hebrew witness as primary.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew word rendered 'lest' is literally 'why,' but the clause is best
      understood as a warning of what may happen if one quarrels with a more formidable
      person.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - You shall not
  lexicon: HALOT
  rationale: Standard negative prohibition introducing wisdom instruction; simple
    imperative English best matches the admonitory tone.
- source_word: תָּרִיב
  chosen: quarrel
  alternatives:
  - contend
  - dispute
  - strive
  lexicon: HALOT
  rationale: From ריב, denoting entering into contention or dispute. 'Quarrel' is
    natural modern English and fits a personal conflict warning better than the more
    formal 'contend.' The Greek ἔριζε likewise supports a sense of contentious disputing.
- source_word: עִם
  chosen: with
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition normally means 'with'; in English 'quarrel with' is idiomatic
    and preserves the interpersonal sense.
- source_word: קָשֶׁה
  chosen: harder
  alternatives:
  - stronger
  - harsh
  - difficult
  lexicon: HALOT
  rationale: The Hebrew adjective literally means 'hard' or 'severe.' In context with
    מִמְּךָ ('than you'), it likely refers to someone tougher or more formidable.
    'Harder' preserves the Hebrew image while remaining intelligible. The Greek parallel
    reads 'rich man,' showing a divergent Vorlage or interpretive tradition, but the
    Hebrew witness is primary here.
- source_word: מִמְּךָ
  chosen: than you
  alternatives:
  - than yourself
  lexicon: HALOT
  rationale: Comparative construction with קָשֶׁה; straightforwardly rendered 'than
    you.'
- source_word: לָמָּה
  chosen: lest
  alternatives:
  - why
  - so that not
  lexicon: HALOT
  rationale: Although לָמָּה ordinarily means 'why,' in this context the sense is
    difficult if taken interrogatively. The clause functions as a warning of consequence,
    and the Greek parallel's μή ποτε supports a preventive sense. Rendering 'lest'
    communicates the likely intended force without over-paraphrase, while acknowledging
    a probable textual or idiomatic irregularity in the Hebrew.
- source_word: תִפּוֹל
  chosen: you fall
  alternatives:
  - you be cast down
  - you collapse
  lexicon: HALOT
  rationale: From נפל, 'fall.' The simple verb works well in the warning clause and
    can imply defeat without needing to make that implication explicit.
- source_word: בְּיָדוֹ
  chosen: into his hand
  alternatives:
  - under his power
  - by his hand
  lexicon: HALOT
  rationale: Literally 'in/into his hand.' 'Into his hand' preserves the Hebrew idiom
    of coming under someone's control or power, while remaining understandable in
    English.
