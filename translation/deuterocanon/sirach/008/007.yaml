theological_decisions:
- issue: Hebrew vs. Greek parallel in the closing clause
  chosen_reading: remember that we all are liable
  alternative_readings:
  - remember that we all die
  - remember that we all come to our end
  rationale: The primary witness for this verse is the extant Hebrew, which ends with
    כֻּלָּנוּ חַיָּבִים ('we all are liable/guilty/obligated'). The Greek parallel
    instead reads πάντες τελευτῶμεν ('we all die/come to our end'). Because the translation
    policy gives primacy to the most original available witness where Hebrew survives,
    the main text follows the Hebrew, while the Greek-based alternative is preserved
    in a footnote due to its interpretive significance and because the source validation
    notes a minor mismatch.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew Sirach where it survives;
    use Greek parallel as actual input while keeping Hebrew primary'
- issue: Repentance language
  chosen_reading: turns back from transgression
  alternative_readings:
  - repents of sin
  rationale: The Hebrew expresses turning/returning from wrongdoing rather than using
    a specialized doctrinal term. The chosen rendering preserves that moral movement
    without narrowing it to later theological terminology.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it; avoid importing doctrinal claims the text does not make'
