  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ ἐπίχαιρε ἐπὶ νεκρῷ· μνήσθητι ὅτι πάντες τελευτῶμεν.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:7
translation:
  text: Do not shame a man who turns back from transgression; remember that we all
    are liable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not rejoice over the dead; remember that we all come
      to our end.'' The Hebrew witness here differs in both halves of the verse, so
      the main text follows the surviving Hebrew while preserving the Greek reading
      as an alternative.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּכְלִים
  chosen: Do not shame
  alternatives:
  - Do not disgrace
  - Do not humiliate
  - Do not reproach
  lexicon: HALOT
  rationale: The Hifil of כלם commonly conveys putting someone to shame or disgracing
    them. 'Do not shame' is concise, natural English and preserves the interpersonal
    force without overinterpreting the manner of the shame.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine. Following the project's gender-accurate
    policy, 'a man' preserves the source form and representative force better than
    a neutral substitute.
- source_word: שָׁב
  chosen: turns back
  alternatives:
  - repents
  - returns
  lexicon: HALOT
  rationale: The participle from שוב denotes turning/returning. In context of sin,
    'turns back' captures repentance language without importing a more technical theological
    term than the Hebrew itself uses. 'Repents' is possible but slightly more interpretive.
- source_word: מִפֶּשֶׁע
  chosen: from transgression
  alternatives:
  - from rebellion
  - from offense
  - from sin
  lexicon: HALOT
  rationale: פשע often denotes transgression or rebellion. 'Transgression' preserves
    the moral-legal nuance and matches wisdom-style diction better than the broader
    'sin.'
- source_word: זְכֹר
  chosen: remember
  alternatives:
  - keep in mind
  - recall
  lexicon: HALOT
  rationale: A straightforward imperative; 'remember' is the most direct and idiomatic
    rendering.
- source_word: כֻּלָּנוּ
  chosen: we all
  alternatives:
  - all of us
  lexicon: HALOT
  rationale: This is the natural English equivalent and preserves the inclusive force.
- source_word: חַיָּבִים
  chosen: are liable
  alternatives:
  - are guilty
  - are debtors
  - must die
  lexicon: HALOT
  rationale: The Hebrew adjective can denote being liable, obligated, or guilty. 'Are
    liable' best fits the Hebrew witness while allowing the implied exposure to judgment
    or death. The Greek parallel reads 'we all die/come to an end,' which suggests
    mortality as the practical sense, but the Hebrew wording is broader and should
    govern the main text.
