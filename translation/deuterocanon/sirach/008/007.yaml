id: SIR.8.7
reference: Sirach 8:7
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תַּכְלִים אִישׁ שָׁב מִפֶּשֶׁע, זְכֹר כִּי כֻּלָּנוּ חַיָּבִים.
  language: Hebrew
  pages:
  - 676
