id: SIR.8.4
reference: Sirach 8:4
source:
  edition: sefaria-ben-sira-kahana
  text: כִּי רַבִּים הִפְחִיז זָהָב, וְהוּא יַשְׂגֶּה לֵב נְדִיבִים.
  language: Hebrew
  pages:
  - 676
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ πρόσπαιζε ἀπαιδεύτῳ, ἵνα μὴ ἀτιμάζωνται οἱ πρόγονοί σου.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:4
translation:
  text: For many has gold ruined, and it leads astray the heart of nobles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a substantially different reading here: ''Do not mock an uneducated
      person, lest your ancestors be dishonored.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the heart of generous men'; the Hebrew term can denote nobles, princes,
      or generous persons.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  chosen: many
  alternatives:
  - multitudes
  - many people
  lexicon: HALOT
  rationale: The adjective/substantive plainly denotes a large number of persons.
    'Many' is the most natural concise English equivalent.
- source_word: הִפְחִיז
  chosen: has ruined
  alternatives:
  - has made reckless
  - has unsettled
  - has led astray
  lexicon: HALOT
  rationale: The verb is difficult and somewhat rare; in context with 'gold' as subject
    and the parallel colon about misleading the heart, it conveys destructive moral
    destabilization. 'Has ruined' captures the result in idiomatic English while remaining
    anchored to the Hebrew sense of causing reckless or disastrous behavior.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: יַשְׂגֶּה
  chosen: leads astray
  alternatives:
  - misleads
  - causes to err
  lexicon: HALOT
  rationale: From a verb of going astray/causing error. 'Leads astray' preserves the
    moral sense and fits the wisdom context.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  lexicon: HALOT
  rationale: In Hebrew anthropology 'heart' is the seat of thought and desire. Retaining
    'heart' preserves the source imagery.
- source_word: נְדִיבִים
  chosen: nobles
  alternatives:
  - generous men
  - princes
  lexicon: HALOT
  rationale: The noun can denote nobles/princely persons and also the generous. In
    this context, with wealth and social status in view, 'nobles' best fits; the alternative
    nuance is worth preserving in a footnote.
