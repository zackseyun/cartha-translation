id: SIR.8.17
reference: Sirach 8:17
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תַּעֲרֹב יָתֵר מִמְּךָ, וְאִם עָרַבְתָּ כִּמְשַׁלֵּם.
  language: Hebrew
  pages:
  - 677
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μετὰ μωροῦ μὴ συμβουλεύου, οὐ γὰρ δυνήσεται λόγον στέξαι.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:17
translation:
  text: Do not pledge yourself for one stronger than you; and if you have pledged
    yourself, act as one who must pay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew ''for one greater than you'' or ''for one beyond you''; the sense
      is someone whose obligation exceeds your capacity or standing. The Greek parallel
      reads differently: ''Do not take counsel with a fool, for he will not be able
      to keep a matter.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּעֲרֹב
  chosen: Do not pledge yourself
  alternatives:
  - Do not become surety
  - Do not give security
  - Do not go guarantor
  lexicon: HALOT
  rationale: The verb ערב in this stem commonly refers to giving surety or becoming
    a guarantor for another. 'Pledge yourself' communicates the financial/legal sense
    in readable modern English while preserving the reflexive force implied by the
    context.
- source_word: יָתֵר מִמְּךָ
  chosen: for one stronger than you
  alternatives:
  - for one greater than you
  - for one beyond your means
  - for one superior to you
  lexicon: HALOT
  rationale: יתר can denote excess, superiority, or greater status/power. In this
    warning about suretyship, the sense is someone beyond one's capacity or standing.
    'Stronger than you' captures the practical imbalance more naturally than the more
    wooden 'greater than you.'
- source_word: וְאִם עָרַבְתָּ
  chosen: and if you have pledged yourself
  alternatives:
  - and if you have become surety
  - and if you have given security
  lexicon: HALOT
  rationale: Repeats the same legal-financial verb as the first clause, so the English
    should remain correspondingly consistent.
- source_word: כִּמְשַׁלֵּם
  chosen: act as one who must pay
  alternatives:
  - as one paying
  - like a payer
  - as though you were paying in full
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: one should regard oneself as effectively
    liable for payment. ''Act as one who must pay'' makes the implied obligation explicit
    in idiomatic English without overparaphrasing.'
