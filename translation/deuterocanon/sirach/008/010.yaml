  text: אַל תִּטֹּשׁ שִׂיחַת חֲכָמִים, וּבְחִידֹתֵיהֶם הִתְרַפֵּשׂ.
  language: Hebrew
  pages:
  - 677
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ ἔκκαιε ἄνθρακας ἁμαρτωλοῦ, μὴ ἐμπυρισθῇς ἐν πυρὶ φλογὸς αὐτοῦ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:10
translation:
  text: Do not abandon the discourse of the wise, and busy yourself with their riddles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'apply yourself to their riddles.' The Hebrew verb here is somewhat uncommon,
      but the sense is active engagement with the wise person's difficult sayings.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel for this verse reads instead: ''Do not kindle the coals
      of a sinner, lest you be burned in the fire of his flame.'' This reflects a
      substantially different textual tradition from the extant Hebrew.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּטֹּשׁ
  chosen: Do not abandon
  alternatives:
  - Do not forsake
  - Do not leave
  lexicon: HALOT
  rationale: נטש commonly means to leave, forsake, or abandon. 'Abandon' is natural
    modern English and preserves the force of a deliberate turning away.
- source_word: שִׂיחַת
  chosen: the discourse
  alternatives:
  - conversation
  - talk
  - meditation
  lexicon: HALOT
  rationale: שיחה can denote speech, discourse, or reflective talk. In context with
    'of the wise' and the following call to engage their riddles, 'discourse' best
    captures sustained wise instruction rather than casual conversation.
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise men
  - sages
  lexicon: HALOT
  rationale: The Hebrew is masculine plural but refers to wise persons as a class.
    'The wise' preserves the representative sense without over-specifying gender,
    while remaining close to the source.
- source_word: וּבְחִידֹתֵיהֶם
  chosen: with their riddles
  alternatives:
  - in their riddles
  - with their sayings
  - with their enigmas
  lexicon: HALOT
  rationale: חידה denotes a riddle, enigmatic saying, or puzzle. 'Riddles' is the
    most direct rendering and fits wisdom literature's use of difficult sayings requiring
    reflection.
- source_word: הִתְרַפֵּשׂ
  chosen: busy yourself
  alternatives:
  - occupy yourself
  - apply yourself
  - search diligently
  lexicon: HALOT
  rationale: The reflexive imperative here calls for active engagement or preoccupation.
    'Busy yourself' communicates intentional involvement with the wise person's difficult
    sayings. The exact nuance is somewhat rare/uncertain, so a footnote preserves
    a close alternative.
