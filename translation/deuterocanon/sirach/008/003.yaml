id: SIR.8.3
reference: Sirach 8:3
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תַּחֲרֹשׁ עַל אִישׁ לֹא הוֹן, פֶּן יִשְׁקֹל מְחִירְךָ וְאָבָדְתָּ.
  language: Hebrew
  pages:
