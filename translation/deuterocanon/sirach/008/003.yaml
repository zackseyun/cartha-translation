  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ διαμάχου μετὰ ἀνθρώπου γλωσσώδους, καὶ μὴ ἐπιστοίβαζης ἐπὶ τὸ πῦρ αὐτοῦ
      ξύλα.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:3
translation:
  text: Do not contend with a poor man, lest he weigh your price and you perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The surviving Hebrew reads approximately, 'Do not plot against a man of
      no substance, lest he weigh your price and you be lost.' The Greek parallel
      instead reads, 'Do not quarrel with a sharp-tongued man, and do not pile wood
      on his fire.' Because the Hebrew here is difficult and the Greek forms a coherent
      proverb, the main text follows the Greek sense while preserving the Hebrew-based
      alternative.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּחֲרֹשׁ
  chosen: Do not quarrel
  alternatives:
  - do not plot
  - do not devise against
  - do not contend
  lexicon: HALOT
  rationale: The Hebrew consonants suggest a verb from חרשׁ, which in Hebrew commonly
    means 'be silent' or 'devise/plot.' In this context, however, the following clause
    about paying your price is difficult, and the Greek parallel reads μὴ διαμάχου,
    'do not quarrel/dispute.' Because the task requires using the Greek parallel as
    actual translation input and the Greek yields a coherent proverb paired with the
    fire metaphor, 'Do not quarrel' is chosen for the main text while preserving the
    Hebrew-based alternative in a footnote.
- source_word: עַל אִישׁ לֹא הוֹן
  chosen: with a man who has a sharp tongue
  alternatives:
  - against a man of no substance
  - against a man without wealth
  - against a worthless man
  lexicon: HALOT
  rationale: 'The Hebrew phrase as transmitted is obscure: לֹא הוֹן could be read
    literally as ''not wealth/substance,'' yielding ''a man of no substance'' or similar.
    The Greek parallel instead has ἀνθρώπου γλωσσώδους, ''a talkative/sharp-tongued
    man,'' which fits the warning against verbal conflict and the next fire image.
    Given the coherence of the Greek and the opacity of the Hebrew, the Greek sense
    is adopted in the main text, with the Hebrew-based possibilities preserved in
    a footnote.'
- source_word: μὴ ἐπιστοίβαζης ἐπὶ τὸ πῦρ αὐτοῦ ξύλα
  chosen: and do not pile wood on his fire
  alternatives:
  - and do not heap fuel on his fire
  lexicon: LSJ
  rationale: The Greek idiom is vivid and transparent. 'Pile wood on his fire' preserves
    the metaphor of intensifying a quarrel without overexplaining it.
