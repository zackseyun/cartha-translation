theological_decisions:
- issue: Gendered wording of אִישׁ in wisdom instruction
  chosen_reading: a man stronger than you
  alternative_readings:
  - someone stronger than you
  rationale: The source uses the masculine singular noun אִישׁ. Per doctrine, gender-accurate
    rendering is preferred unless context clearly demands neutralization. Here the
    saying is framed as masculine wisdom address, so 'man' is retained in the main
    text.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Use of Hebrew as primary witness with Greek parallel in view
  chosen_reading: Translate the Hebrew loan-warning directly, without importing the
    divergent Greek wording about quarreling with a hot-tempered man.
  alternative_readings:
  - Translate from the Greek parallel instead
  - Conflate Hebrew and Greek into a generalized warning
  rationale: For Sirach, surviving Hebrew is primary where available. The Greek parallel
    here reflects a substantially different saying, so it serves as a consistency
    check and evidence of textual divergence, not as wording to be merged into the
    main translation. The divergence is significant enough to preserve in a footnote.
  doctrine_reference: PHILOSOPHY.md 'What we are translating' and task requirement
    to use the parallel as actual input while keeping the Hebrew primary
