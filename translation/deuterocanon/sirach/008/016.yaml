translation:
  text: Do not lend to a man stronger than you; and if you do lend, regard it as lost.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness here reads a different warning: ''Do not fight with a
      hot-tempered man, and do not travel through the wilderness with him ... where
      there is no help, he will strike you down.'' The surviving Hebrew instead warns
      against lending to someone stronger than you.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - You shall not
  - Never
  lexicon: HALOT
  rationale: Standard negative prohibition in wisdom instruction; 'Do not' gives clear,
    natural English without adding force beyond the Hebrew.
- source_word: תַּלְוֶה
  chosen: lend
  alternatives:
  - make a loan to
  - become surety for
  lexicon: HALOT
  rationale: From the root לוה in the Hiphil, the plain sense here is to lend or extend
    a loan. 'Lend' is the most direct and idiomatic rendering. The following clause
    about loss confirms a financial-loan context.
- source_word: אִישׁ חָזָק מִמְּךָ
  chosen: a man stronger than you
  alternatives:
  - a powerful man above you
  - someone stronger than you
  lexicon: HALOT
  rationale: The Hebrew is gendered singular ('man') and the project prefers gender-accurate
    renderings where the source is masculine. חָזָק with מִמְּךָ denotes one stronger
    or more powerful than the addressee; 'stronger than you' preserves the comparative
    force naturally.
- source_word: וְאִם הִלְוִיתָ
  chosen: and if you do lend
  alternatives:
  - but if you have lent
  - and if you lend
  lexicon: HALOT
  rationale: The clause is conditional and practical, moving from prohibition to contingency.
    'If you do lend' captures the concessive sense in smooth English.
- source_word: כִּמְאַבֵּד
  chosen: regard it as lost
  alternatives:
  - as one destroying
  - as though you had lost it
  - consider it gone
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: treat the loan as something lost. Because
    the Hebrew expression is elliptical, ''regard it as lost'' makes the implied object
    explicit in English while staying close to the sense. This also fits the wisdom
    warning about inability to recover a loan from a stronger person.'
