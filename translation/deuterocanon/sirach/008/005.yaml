id: SIR.8.5
reference: Sirach 8:5
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תִּינָץ עִם אִישׁ לָשׁוֹן, וְאַל תִּתֵּן עַל אֵשׁ עֵץ.
  language: Hebrew
  pages:
  - 676
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ ὀνείδιζε ἄνθρωπον ἀποστρέφοντα ἀπὸ ἁμαρτίας· μνήσθητι ὅτι πάντες ἐσμὲν
      ἐν ἐπιτιμίοις.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:5
translation:
  text: Do not quarrel with a man of tongue, and do not put wood on the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek witness: ''Do not reproach a man who turns away from sin; remember
      that we all are subject to rebukes.'' The Hebrew preserved here instead warns
      against quarreling with a verbally dangerous person and against feeding the
      conflict.'
    reason: alternative_reading
  - marker: b
    text: '''A man of tongue'' is a Hebrew idiom for a person marked by harmful or
      contentious speech.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - must not
  - do not ever
  lexicon: HALOT
  rationale: Negative prohibition particle introducing each admonition; standard imperative
    negation in English is 'Do not.'
- source_word: תִּינָץ
  chosen: quarrel
  alternatives:
  - contend
  - strive
  - provoke
  lexicon: HALOT
  rationale: The verb denotes entering into strife or contention. 'Quarrel' is idiomatic
    modern English and fits the wisdom context better than the more formal 'contend.'
- source_word: עִם
  chosen: with
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition naturally marks association/opposition in a dispute.
    'With' is the most straightforward English equivalent in this construction.
- source_word: אִישׁ לָשׁוֹן
  chosen: a man of tongue
  alternatives:
  - a sharp-tongued man
  - a slanderer
  - a talkative man
  lexicon: HALOT
  rationale: Literally 'a man of tongue,' an idiom for a verbally dangerous or contentious
    person. The literal rendering is preserved in the main text for transparency and
    proverbial force, while the sense is clarified by the parallel image of feeding
    a fire. More interpretive options were possible, but the Hebrew idiom is still
    intelligible in English.
- source_word: תִּתֵּן
  chosen: put
  alternatives:
  - add
  - give
  lexicon: HALOT
  rationale: The common verb 'give/put' in this context means to place or add fuel.
    'Put' is natural English; 'add' is possible but slightly more interpretive.
- source_word: עַל אֵשׁ עֵץ
  chosen: wood on the fire
  alternatives:
  - fuel onto the fire
  - sticks on the fire
  lexicon: HALOT
  rationale: 'The phrase is concrete and proverbial: adding wood intensifies a fire.
    ''Wood on the fire'' preserves the imagery directly and clearly.'
