theological_decisions:
- issue: Divergence between Hebrew and Greek witnesses
  chosen_reading: Translate the extant Hebrew as the primary text, while allowing
    the Greek parallel to inform interpretation of the warning as restraint toward
    verbally harmful or morally frail people.
  alternative_readings:
  - 'Greek: ''Do not reproach a man who turns away from sin; remember that we all
    deserve rebuke.'''
  rationale: For Sirach, where Hebrew survives, project policy gives primacy to the
    Hebrew witness. Here the Greek is not a close verbal equivalent but likely reflects
    a different Vorlage or substantial textual development. The Hebrew yields a coherent
    wisdom saying with a matching metaphor in the second colon, so it is translated
    in the main text. The Greek alternative is significant enough to preserve in a
    footnote because it represents a materially different form of the verse.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    use Greek parallel as actual input without displacing Hebrew primacy.'
