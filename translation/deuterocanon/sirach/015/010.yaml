translation:
  text: Praise is spoken by the mouth of the wise, and one who rules it will teach
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek parallel reads, 'and the Lord will prosper him' (or 'it'), differing
      substantially from the surviving Hebrew second line.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּפֶה
  chosen: by the mouth of
  alternatives:
  - in the mouth of
  - from the mouth of
  lexicon: HALOT
  rationale: The preposition ב with פה can indicate instrument or sphere. 'By the
    mouth of' gives natural English while preserving the Hebrew image of speech issuing
    through the wise person's mouth.
- source_word: חָכָם
  chosen: the wise
  alternatives:
  - a wise man
  - the wise man
  lexicon: HALOT
  rationale: The singular adjective/noun is generic. 'The wise' preserves the representative
    force without over-specifying gender, while still reflecting a singular class
    representative.
- source_word: תֵּאָמֵר
  chosen: is spoken
  alternatives:
  - will be spoken
  - is said
  lexicon: HALOT
  rationale: The Niphal imperfect can be rendered as a general present in proverbial
    style. 'Is spoken' fits the wisdom context better than a strictly future sense.
- source_word: תְּהִלָּה
  chosen: praise
  alternatives:
  - a hymn of praise
  - renown
  lexicon: HALOT
  rationale: The noun most naturally means 'praise' here. The Greek αἶνος supports
    this sense. No object is supplied in the Hebrew, so the concise 'praise' is preferable.
- source_word: וּמשֵׁל
  chosen: one who rules
  alternatives:
  - a ruler
  - one who has mastery
  lexicon: HALOT
  rationale: Taken as a participial/noun form from משל, denoting one who governs or
    exercises mastery. The wording keeps the verbal force and leaves open whether
    the object is wisdom, praise, or speech.
- source_word: בָּהּ
  chosen: it
  alternatives:
  - in it
  - over it
  - by it
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular and its antecedent is not
    fully explicit. The most immediate Hebrew antecedent is תְּהִלָּה ('praise'),
    though the Greek diverges with 'him/it.' Rendering simply 'it' preserves the ambiguity
    without forcing an interpretation.
- source_word: יִלַמְּדֶנָּה
  chosen: will teach it
  alternatives:
  - teaches it
  - will make it known
  - will instruct in it
  lexicon: HALOT
  rationale: From למד, 'teach.' The suffix likely refers back to the feminine antecedent.
    'Will teach it' is formally close to the Hebrew, even though the idiom is somewhat
    compressed in English.
