theological_decisions:
- issue: How to construe the final clause with תּוֹרִישֶׁנּוּ in light of the Hebrew-Greek
    alignment
  chosen_reading: The clause means that an everlasting name becomes the person's inheritance.
  alternative_readings:
  - he will inherit an everlasting name
  - it will bestow on him an everlasting name
  rationale: The Hebrew form can be understood in more than one way, but all converge
    on the idea of receiving an enduring name as inheritance. The Greek parallel supports
    inheritance language explicitly. The chosen English keeps the inheritance motif
    while reading smoothly and staying close to both witnesses.
