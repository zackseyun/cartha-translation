id: SIR.15.6
reference: Sirach 15:6
source:
  edition: sefaria-ben-sira-kahana
  text: שָׂשׂוֹן וְשִׂמְחָה יִמְצָא, וְשֵׂם עוֹלָם תּוֹרִישֶׁנּוּ.
  language: Hebrew
  pages:
  - 690
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: εὐφροσύνην καὶ στέφανον ἀγαλλιάματος καὶ ὄνομα αἰώνιον κατακληρονομήσει.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:6
translation:
  text: He will find gladness and joy, and an everlasting name will be his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will inherit an everlasting name.' The Hebrew verb can be construed
      this way, and the Greek parallel explicitly uses inheritance language.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂשׂוֹן
  chosen: gladness
  alternatives:
  - rejoicing
  - exultation
  - mirth
  lexicon: HALOT
  rationale: The Hebrew denotes joyful delight. 'Gladness' preserves the emotional
    sense in natural English while avoiding overstatement. The paired Greek εὐφροσύνην
    supports a sense of joyfulness rather than a specifically cultic or vocal 'rejoicing'.
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  - merriment
  lexicon: HALOT
  rationale: Used alongside שָׂשׂוֹן as a near-synonym, it is best rendered with a
    distinct but closely related English term. 'Joy' gives a clear modern equivalent
    and preserves the poetic pairing.
- source_word: יִמְצָא
  chosen: will find
  alternatives:
  - will obtain
  - will attain
  lexicon: HALOT
  rationale: The basic sense of מצא is 'find.' Although context implies receiving
    or coming into possession, 'will find' keeps closer to the Hebrew and remains
    idiomatic in English.
- source_word: שֵׂם עוֹלָם
  chosen: an everlasting name
  alternatives:
  - an eternal name
  - a lasting reputation
  lexicon: HALOT
  rationale: Literally 'a name of eternity/forever.' 'Everlasting name' preserves
    the Hebrew imagery of enduring renown. The Greek ὄνομα αἰώνιον confirms this sense.
    'Reputation' would interpret the metaphor rather than translate it.
- source_word: תּוֹרִישֶׁנּוּ
  chosen: will be his inheritance
  alternatives:
  - he will inherit
  - it will bequeath to him
  - it will cause him to inherit
  lexicon: HALOT
  rationale: The Hiphil of ירש can mean 'cause to inherit' or 'give as an inheritance.'
    With the suffix, the Hebrew is somewhat compressed. The Greek κατακληρονομήσει
    points toward inheritance language. 'Will be his inheritance' conveys the result
    clearly in English without forcing a more technical syntactic reconstruction than
    the surviving Hebrew warrants.
