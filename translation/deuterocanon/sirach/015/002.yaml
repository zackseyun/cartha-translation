    text: καὶ ὑπαντήσεται αὐτῷ ὡς μήτηρ, καὶ ὡς γυνὴ παρθενείας προσδέξεται αὐτόν·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:2
translation:
  text: She will meet him like a mother, and receive him like the wife of his youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''like a woman of virginity,'' that is, like a young bride or virginal
      wife.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְקִדְּמַתְהוּ
  chosen: will meet him
  alternatives:
  - will come before him
  - will greet him
  - will go to meet him
  lexicon: HALOT
  rationale: From קדם in the sense of coming before or meeting someone. The Greek
    ὑπαντήσεται confirms an active sense of going to meet. 'Will meet him' is natural
    English and preserves the initiative of Wisdom.
- source_word: כָאֵם
  chosen: like a mother
  alternatives:
  - as a mother
  lexicon: HALOT
  rationale: Straightforward comparison. 'Like a mother' keeps the simile explicit
    and matches the Hebrew כ and Greek ὡς.
- source_word: וּכְאֵשֶׁת נְעוּרִים
  chosen: like a wife of his youth
  alternatives:
  - like a youthful wife
  - like the wife of his youth
  - like a bride of youth
  lexicon: HALOT
  rationale: The Hebrew idiom אֵשֶׁת נְעוּרִים naturally means a wife associated with
    one's youth, often implying early-marriage affection and intimacy. The Greek γυνὴ
    παρθενείας points toward a youthful/virginal bride, but since the Hebrew witness
    is primary here, 'wife of his youth' best reflects the source while remaining
    intelligible. The possessive 'his' is supplied idiomatically in English from the
    Hebrew construction.
- source_word: תְּקַבְּלֶנּוּ
  chosen: receive him
  alternatives:
  - welcome him
  - accept him
  lexicon: HALOT
  rationale: From קבל, 'receive/accept.' The Greek προσδέξεται supports 'receive'
    or 'welcome.' 'Receive him' is slightly more formal and parallels the first colon
    well.
