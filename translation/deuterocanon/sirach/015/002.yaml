theological_decisions:
- issue: Personification of Wisdom as female in maternal and marital imagery
  chosen_reading: 'Retain feminine personal imagery: ''She will meet... receive...'''
  alternative_readings:
  - Use impersonal 'it' for wisdom
  - Abstract the imagery into non-personal language
  rationale: The Hebrew verbs are feminine and the verse explicitly compares Wisdom
    to a mother and a wife. Preserving the feminine personification is faithful to
    the source and avoids flattening the poetic theology of Wisdom.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering אֵשֶׁת נְעוּרִים in light of Greek γυνὴ παρθενείας
  chosen_reading: 'Main text follows the Hebrew: ''wife of his youth'''
  alternative_readings:
  - wife in her virginity
  - virginal wife
  - young bride
  rationale: Because Hebrew survives for this verse, it has primacy. The Greek suggests
    a nuance of virginity or bridal youth worth preserving in a footnote, but the
    main text should reflect the Hebrew idiom rather than harmonize fully to the Greek.
  doctrine_reference: Translation philosophy §1; PHILOSOPHY.md on Hebrew primacy for
    extant Sirach Hebrew
