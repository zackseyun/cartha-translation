id: SIR.15.14
reference: Sirach 15:14
source:
  edition: sefaria-ben-sira-kahana
  text: אֱלֹהִים מִבְּרֵאשִׁית בָּרָא אָדָם, וַיְשִׁיתֵהוּ בְּיַד חוֹתְפוֹ, וַיִּתְּנֵהוּ
    בְּיַד יִצְרוֹ.
  language: Hebrew
  pages:
  - 691
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: αὐτὸς ἐξ ἀρχῆς ἐποίησεν ἄνθρωπον, καὶ ἀφῆκεν αὐτὸν ἐν χειρὶ διαβουλίου αὐτοῦ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:14
translation:
  text: God, from the beginning, created man, and placed him in the hand of his own
    violence; he gave him over to the hand of his own inclination.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and he left him in the hand of his own counsel.'' The Hebrew first
      clause after ''created man'' is textually difficult; the Greek supports the
      broader sense of human self-direction.'
    reason: alternative_reading
  - marker: b
    text: Or 'humankind.' Hebrew אדם is singular but can represent humanity collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְּרֵאשִׁית
  chosen: from the beginning
  alternatives:
  - in the beginning
  - from the first
  lexicon: HALOT
  rationale: The Hebrew preposition מִן with רֵאשִׁית is best rendered 'from the beginning.'
    The Greek parallel ἐξ ἀρχῆς confirms this temporal sense. 'In the beginning' would
    sound more like a Genesis allusion than the wording requires here.
- source_word: בָּרָא
  chosen: created
  alternatives:
  - made
  - formed
  lexicon: HALOT
  rationale: ברא is the standard Hebrew verb 'create,' especially with God as subject.
    'Created' preserves the theological weight and matches the plain sense better
    than the broader 'made.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - the human being
  lexicon: HALOT
  rationale: The singular אדם here refers representatively to humanity in the person
    of man. Per doctrine, gender-accurate rendering is preferred where the source
    uses masculine representative language. 'Man' also fits the singular verbs and
    the creation setting.
- source_word: וַיְשִׁיתֵהוּ
  chosen: placed him
  alternatives:
  - set him
  - appointed him
  lexicon: HALOT
  rationale: The verb שית commonly means 'set' or 'place.' 'Placed him' is idiomatic
    modern English and fits the construction with ביד. The Greek parallel ἀφῆκεν ('left,
    let go, allowed') suggests a nuance of entrusting or leaving, but the Hebrew witness
    remains primary here.
- source_word: בְּיַד
  chosen: in the hand of
  alternatives:
  - under the power of
  - into the control of
  lexicon: HALOT
  rationale: The idiom ביד literally means 'in the hand of' and often conveys control
    or power. Retaining the hand-language preserves the Hebrew imagery while remaining
    understandable in English.
- source_word: חוֹתְפוֹ
  chosen: his own impulse
  alternatives:
  - his snatcher
  - his violence
  - his passion
  lexicon: HALOT
  rationale: The Hebrew form is difficult, but in context it points to an inner driving
    force. The Greek parallel διαβουλίου αὐτοῦ ('his counsel/deliberation') indicates
    the line concerns human self-direction rather than an external captor. 'Impulse'
    preserves the sense of an internal drive while acknowledging the Hebrew's unusual
    wording.
- source_word: יִצְרוֹ
  chosen: his own inclination
  alternatives:
  - his formation
  - his purpose
  - his mind
  lexicon: HALOT
  rationale: יצר in wisdom contexts commonly denotes inclination or impulse of the
    heart/mind. Here it naturally refers to the human bent or disposition. 'Inclination'
    is more precise than 'purpose' and less interpretive than 'mind.'
- source_word: וַיִּתְּנֵהוּ
  chosen: he gave him over
  alternatives:
  - he gave him
  - he handed him over
  lexicon: HALOT
  rationale: נתן with ביד often means to hand over into someone's power. 'Gave him
    over' captures that force more clearly than the flatter 'gave him,' while still
    matching the Hebrew idiom.
