theological_decisions:
- issue: Anthropomorphic language for divine perception
  chosen_reading: Retain 'The eyes of God' literally.
  alternative_readings:
  - God sees
  rationale: The Hebrew uses concrete anthropomorphic imagery, and there is no need
    to flatten it into abstraction. Preserving the image maintains the poetic force
    of the wisdom text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Gendered generic in אִישׁ
  chosen_reading: Render אִישׁ as 'a man' in the main text.
  alternative_readings:
  - a person
  - a human being
  rationale: The source is grammatically masculine singular and functions as representative
    wisdom language. Per doctrine, gender-accurate rendering is preferred over neutralizing
    the expression; an inclusive alternative can be preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
