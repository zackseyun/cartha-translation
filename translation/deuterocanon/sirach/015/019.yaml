id: SIR.15.19
reference: Sirach 15:19
source:
  edition: sefaria-ben-sira-kahana
  text: עֵינֵי אֵל יִרְאוּ מַעֲשָׂיו, וְהוּא יַכִּיר כָּל מִפְעַל אִישׁ.
  language: Hebrew
  pages:
  - 691
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: καὶ οἱ ὀφθαλμοὶ αὐτοῦ ἐπὶ τοὺς φοβουμένους αὐτόν, καὶ αὐτὸς ἐπιγνώσεται
      πᾶν ἔργον ἀνθρώπου· 2020
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:19
translation:
  text: The eyes of God see his works, and he recognizes every deed of a man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every deed of a person.' The Hebrew reads 'of a man' (אִישׁ), a masculine
      singular form often used generically in wisdom literature.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel differs in the first clause, reading, 'his eyes are upon
      those who fear him,' while agreeing in sense that God fully knows human deeds.
    reason: alternative_reading
lexical_decisions:
- source_word: עֵינֵי
  chosen: The eyes of
  alternatives:
  - the sight of
  - the gaze of
  lexicon: HALOT
  rationale: A straightforward anthropomorphic plural construct. 'The eyes of' preserves
    the Hebrew image and matches the Greek ὀφθαλμοί.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Almighty
  - the Mighty One
  lexicon: HALOT
  rationale: The Hebrew reads אֵל, a common divine title. 'God' is the most natural
    English equivalent here; no covenant name is present, so 'the LORD' would be incorrect.
- source_word: יִרְאוּ
  chosen: see
  alternatives:
  - look upon
  - behold
  lexicon: HALOT
  rationale: Simple qal sense of seeing. 'See' is clear modern English and preserves
    the directness of the Hebrew.
- source_word: מַעֲשָׂיו
  chosen: his works
  alternatives:
  - his deeds
  - his actions
  lexicon: HALOT
  rationale: The suffix is singular masculine, most naturally referring to the human
    subject implied in the following clause ('a man'). The Greek parallel has πᾶν
    ἔργον ἀνθρώπου in the second colon and differs in the first colon, but the Hebrew
    witness should govern here. 'Works' keeps the lexical link with מעשה, while 'deeds'
    is used in the second colon to avoid awkward repetition in English.
- source_word: וְהוּא
  chosen: and he
  alternatives:
  - and He
  lexicon: HALOT
  rationale: The pronoun refers to God in context. Lowercase 'he' follows normal modern
    English Bible style outside traditions that capitalize divine pronouns.
- source_word: יַכִּיר
  chosen: recognizes
  alternatives:
  - knows
  - discerns
  - acknowledges
  lexicon: HALOT
  rationale: The verb from נכר/הכיר carries the sense of recognizing or discerning.
    'Recognizes' preserves the nuance of full awareness better than the flatter 'knows'.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: With a singular following noun, 'every' is idiomatic English.
- source_word: מִפְעַל
  chosen: deed
  alternatives:
  - work
  - action
  lexicon: HALOT
  rationale: A term for what is done or produced. 'Deed' fits the moral context and
    differentiates it slightly from 'works' in the first colon while remaining semantically
    close.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: HALOT
  rationale: The Hebrew is singular masculine אישׁ. Per project philosophy, gender-accurate
    rendering is preferred where the source uses masculine representative language.
    Here 'a man' preserves the form while still functioning generically in wisdom
    style.
