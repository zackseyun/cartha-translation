theological_decisions:
- issue: Human moral agency in the verse's presentation of alternatives
  chosen_reading: The verse states that life and death are set before people and that
    what a person desires is what will be given to him, without adding a doctrinal
    explanation of how divine sovereignty and human choice relate.
  alternative_readings:
  - A stronger free-will reading emphasizing autonomous human self-determination
  - A stronger determinist reading supplying divine causation more explicitly
  rationale: The Hebrew and Greek both present a choice framework but do not resolve
    broader theological debates. The translation preserves that tension by rendering
    the alternatives and the passive 'will be given to him' without importing further
    doctrinal claims.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
- issue: Gendered language in אָדָם / generic singular suffixes
  chosen_reading: Use 'human beings' for לִבְנֵי אָדָם and retain the generic singular
    'he ... him' for the following clauses.
  alternative_readings:
  - Use fully singular 'man' throughout
  - Use pluralized inclusive rendering such as 'people ... what they desire will be
    given to them'
  rationale: The source begins with a collective expression for humanity and then
    shifts to a generic singular. Following the project's gender-accurate policy,
    'human beings' reflects the collective sense of אָדָם here, while 'he/him' preserves
    the singular grammar of the subsequent verbs and pronouns.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
