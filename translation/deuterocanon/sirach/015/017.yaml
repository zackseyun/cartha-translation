translation:
  text: Before human beings are life and death, and whichever he desires will be given
    to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For human beings are life and death'; the Hebrew preposition can be
      read that way, but the Greek parallel supports the sense 'before human beings.'
    reason: alternative_reading
  - marker: b
    text: Or, 'whatever he chooses will be given to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי אָדָם
  chosen: Before human beings
  alternatives:
  - For human beings
  - To the sons of man
  - Before man
  lexicon: HALOT
  rationale: The Hebrew phrase literally means 'to/for the sons of man,' but the Greek
    parallel ἔναντι ἀνθρώπων strongly supports a sense of presentation or setting
    before people. 'Before human beings' captures both the Hebrew idiom in context
    and the Greek witness, while avoiding an overly wooden 'sons of man.'
- source_word: חַיִּים וָמָוֶת
  chosen: life and death
  lexicon: HALOT
  rationale: A straightforward merism of alternatives set before a person. The plural
    form חַיִּים is idiomatically rendered 'life.'
- source_word: אֲשֶׁר יַחְפֹּץ
  chosen: whichever he desires
  alternatives:
  - whatever he chooses
  - that which he delights in
  lexicon: HALOT
  rationale: חפץ denotes desire, delight, or willing. The Greek εὐδοκήσῃ also points
    to taking pleasure in or choosing. 'Whichever he desires' preserves the volitional
    nuance without overinterpreting it.
- source_word: יִנָּתֵן לוֹ
  chosen: will be given to him
  alternatives:
  - shall be given him
  - will be granted to him
  lexicon: HALOT
  rationale: The passive of נתן is naturally rendered 'will be given.' This keeps
    the text's passive formulation rather than specifying an agent not named in the
    verse.
