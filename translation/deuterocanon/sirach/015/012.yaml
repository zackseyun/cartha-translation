id: SIR.15.12
reference: Sirach 15:12
source:
  edition: sefaria-ben-sira-kahana
  text: פֶּן תֹּאמַר הוּא הִתְקִילָנִי, כִּי אֵין צֹרֶךְ בְּאַנְשֵׁי חָמָס.
  language: Hebrew
  pages:
  - 690
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ εἴπῃς ὅτι Αὐτός με ἐπλάνησεν· οὐ γὰρ χρείαν ἔχει ἀνδρὸς ἁμαρτωλοῦ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:12
translation:
  text: Do not say, “He made me stumble,” for he has no need of violent men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: “He led me astray,” with a broader sense than the Hebrew
      “made me stumble.”'
    reason: alternative_reading
  - marker: b
    text: Greek parallel reads “sinful man” where the Hebrew has “violent men.”
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: Do not
  alternatives:
  - lest
  - otherwise
  lexicon: HALOT
  rationale: In prohibitive wisdom instruction, פן + imperfect functions idiomatically
    as a warning against saying something. English 'Do not say' communicates the force
    more naturally than the more formal 'Lest you say.'
- source_word: תֹּאמַר
  chosen: say
  alternatives:
  - declare
  - claim
  lexicon: HALOT
  rationale: The common verb 'say' fits the direct-speech introduction without adding
    rhetorical weight not present in the Hebrew.
- source_word: הוּא
  chosen: He
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The pronoun refers to God in context. Capitalized 'He' is used here to
    reflect the referent in English discourse, not to add content beyond the context.
- source_word: הִתְקִילָנִי
  chosen: made me stumble
  alternatives:
  - caused me to stumble
  - tripped me up
  - led me astray
  lexicon: HALOT
  rationale: The Hebrew points to causing stumbling/offense. 'Made me stumble' preserves
    the concrete metaphor and aligns with the Greek parallel ἐπλάνησεν only insofar
    as both deny that God is the cause of human sin. 'Led me astray' would lean too
    far toward the Greek and away from the surviving Hebrew wording.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: '''For'' gives a natural explanatory connection in English and preserves
    the causal relation between the prohibition and its rationale.'
- source_word: אֵין צֹרֶךְ
  chosen: has no need
  alternatives:
  - there is no need for
  - does not require
  lexicon: HALOT
  rationale: With the implied subject carried from context, 'he has no need' is the
    most direct English rendering. It keeps the aphoristic style and matches the Greek
    χρείαν ἔχει.
- source_word: בְּאַנְשֵׁי
  chosen: of men
  alternatives:
  - for men
  - of people
  lexicon: HALOT
  rationale: The preposition with 'need' is idiomatically rendered 'need of.' 'Men'
    reflects the masculine Hebrew form אַנְשֵׁי and the generic class reference; the
    phrase is then rendered as the idiomatic whole 'violent men.'
- source_word: חָמָס
  chosen: violent
  alternatives:
  - wrongdoing
  - lawless
  - wicked
  lexicon: HALOT
  rationale: חמס commonly denotes violence or violent wrongdoing. 'Violent' best captures
    the concrete moral sense here and avoids flattening it into a generic 'wicked.'
    The Greek parallel's ἁμαρτωλοῦ ('sinful') is broader, but the Hebrew witness is
    more specific and should govern the translation.
