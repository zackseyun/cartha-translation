theological_decisions:
- issue: Whether to follow the Hebrew 'made me stumble' or the Greek parallel 'led
    me astray' more closely in describing what one must not attribute to God
  chosen_reading: 'Follow the Hebrew main witness: ''He made me stumble'''
  alternative_readings:
  - He led me astray
  rationale: The project translates Sirach from the Hebrew where it survives, while
    using the Greek parallel as a real input and consistency check. Here the Hebrew
    is extant and high-confidence, so its more concrete stumbling language governs
    the main text. The Greek alternative is worth preserving in a footnote because
    it reflects a broader interpretive tradition and slightly shifts the nuance from
    causing a stumble to leading astray.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    theological tension/alternatives in footnotes where meaningful'
- issue: Whether 'violent men' should be generalized to 'sinners' under influence
    of the Greek parallel
  chosen_reading: violent men
  alternative_readings:
  - sinful man
  - sinners
  rationale: The Hebrew explicitly says אַנְשֵׁי חָמָס, a more specific moral category
    than the Greek ἀνδρὸς ἁμαρτωλοῦ. Retaining 'violent men' honors original-language
    primacy and preserves the sharper ethical term in the Hebrew witness.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition;
    gender-accurate over gender-neutral'
