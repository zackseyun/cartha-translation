id: SIR.15.1
reference: Sirach 15:1
source:
  edition: sefaria-ben-sira-kahana
  text: כִּי יְרֵא יְהֹוָה יַעֲשֶׂה זֹאת, וְתוֹפֵשׂ תּוֹרָה יַדְרִיכֶנָּה.
  language: Hebrew
  pages:
  - 690
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: Ὁ φοβούμενος Κύριον ποιήσει αὐτό, καὶ ὁ ἐγκρατὴς τοῦ νόμου καταλήμψεται αὐτήν·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:1
translation:
  text: He who fears Yahweh will do this, and he who grasps the law will attain her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew תּוֹרָה can also be rendered 'Torah' or more broadly 'instruction.'
    reason: lexical_alternative
  - marker: b
    text: The final verb is difficult in the extant Hebrew; the Greek parallel reads 'will attain her,' supporting the sense that the one who holds fast to the law comes to Wisdom.
    reason: textual_variant
lexical_decisions:
- source_word: יְרֵא
  chosen: he who fears
  alternatives:
  - the one who fears
  - whoever fears
  lexicon: HALOT
  rationale: 'The participial form functions substantivally: ''the one who fears.'' ''He who fears'' preserves the masculine singular form and proverbial style while remaining natural English.'
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the divine name is rendered 'the LORD' rather than transliterated.
- source_word: יַעֲשֶׂה זֹאת
  chosen: will do this
  alternatives:
  - will act thus
  - will do these things
  lexicon: HALOT
  rationale: The Hebrew is singular feminine demonstrative 'this.' The immediate context points forward/back to the way of wisdom; the Greek likewise has singular αὐτό. 'Will do this' is the most direct rendering without over-interpreting.
- source_word: וְתוֹפֵשׂ
  chosen: and he who grasps
  alternatives:
  - and whoever holds fast to
  - and the one who seizes
  lexicon: HALOT
  rationale: תפש conveys taking hold of or grasping. 'Grasps' keeps the concrete metaphor and pairs well with Torah/law as something firmly held.
- source_word: תּוֹרָה
  chosen: the law
  alternatives:
  - instruction
  - Torah
  lexicon: HALOT
  rationale: Given Ben Sira's Jewish sapiential setting, תּוֹרָה can mean both instruction and the Torah. The Greek parallel has νόμος, supporting 'law.' 'The law' is concise and idiomatic, while the lexical alternative 'Torah' is preserved in a footnote because the Hebrew term carries covenantal nuance beyond generic law.
- source_word: יַדְרִיכֶנָּה
  chosen: will attain her
  alternatives:
  - will reach her
  - will be guided by her
  - will obtain her
  lexicon: HALOT
  rationale: The Hebrew form as transmitted is somewhat awkward against the Greek, which reads καταλήμψεται αὐτήν ('will attain/lay hold of her'). In context the feminine object is Wisdom from the surrounding passage. Because the source validation notes a minor mismatch and the Greek parallel is to be used as actual input, 'will attain her' best reflects the likely sense without reproducing a difficult Hebrew form woodenly.
