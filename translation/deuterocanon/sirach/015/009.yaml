id: SIR.15.9
reference: Sirach 15:9
source:
  edition: sefaria-ben-sira-kahana
  text: לֹא נָאֲתָה תְהִלָּה בְּפִי רָשָׂע, כִּי לֹא מֵאֵל נֶחְלְקָה לּוֹ.
  language: Hebrew
  pages:
  - 690
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: Οὐχ ὡραῖος αἶνος ἐν στόματι ἁμαρτωλοῦ, ὅτι οὐ παρὰ Κυρίου ἀπεστάλη·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:9
translation:
  text: Praise is not fitting in the mouth of a wicked man, for it has not been allotted
    to him from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''for it was not sent from the Lord.'' The Hebrew reads, more literally,
      ''for it has not been allotted to him from God.'''
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא נָאֲתָה
  chosen: is not fitting
  alternatives:
  - is not becoming
  - is not suitable
  - is not beautiful
  lexicon: HALOT
  rationale: The Hebrew expresses propriety or suitability rather than aesthetic beauty
    alone. The Greek parallel οὐχ ὡραῖος likewise points to what is seemly/fitting.
    'Is not fitting' gives clear modern English while preserving the moral sense.
- source_word: תְהִלָּה
  chosen: Praise
  alternatives:
  - praise song
  - commendation
  lexicon: HALOT
  rationale: The noun commonly means praise. In context it refers to praise spoken
    by the mouth, not specifically a song, so the simple 'Praise' is best.
- source_word: בְּפִי
  chosen: in the mouth of
  alternatives:
  - on the lips of
  - from the mouth of
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the Hebrew idiom and matches the
    Greek ἐν στόματι. 'In the mouth of' is natural enough in English and keeps the
    concrete imagery.
- source_word: רָשָׂע
  chosen: wicked man
  alternatives:
  - wicked person
  - evildoer
  - sinner
  lexicon: HALOT
  rationale: The Hebrew is singular masculine. Per project philosophy, gender-accurate
    rendering is preferred where the source is masculine. 'Wicked man' also distinguishes
    the Hebrew from the Greek parallel ἁμαρτωλοῦ ('sinner'), while still overlapping
    in sense.
- source_word: נֶחְלְקָה לּוֹ
  chosen: has not been allotted to him
  alternatives:
  - has not been assigned to him
  - has not been given to him
  - has not been distributed to him
  lexicon: HALOT
  rationale: 'From חלק in the passive/reflexive sense of apportioning or allotting.
    This is more precise than simply ''given'' and explains why praise is unfitting:
    it is not his proper share. The Greek parallel ἀπεστάλη (''was sent'') reflects
    a different construal, but the Hebrew witness is primary here.'
- source_word: מֵאֵל
  chosen: from God
  alternatives:
  - by God
  - from the Mighty One
  lexicon: HALOT
  rationale: אל here is best rendered 'God.' 'From God' follows the preposition directly
    and preserves the source's claim that true praise is divinely apportioned.
