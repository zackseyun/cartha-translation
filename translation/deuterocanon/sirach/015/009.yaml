theological_decisions:
- issue: Relationship between Hebrew and Greek in the second colon
  chosen_reading: Follow the Hebrew sense 'it has not been allotted to him from God'
    in the main text.
  alternative_readings:
  - '''for it was not sent from the Lord'' (reflecting the Greek parallel)'
  rationale: The extant Hebrew is the most original Zone 1 witness for this verse
    and is high-confidence. The Greek parallel appears to reflect either a different
    Vorlage or an interpretive rendering. The Hebrew's allotment imagery is coherent
    and should govern the main translation, while the Greek-based alternative is preserved
    in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    use Greek parallel as actual input without displacing Hebrew primacy.'
