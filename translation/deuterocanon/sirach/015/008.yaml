theological_decisions:
- issue: Referent and personification of the feminine pronoun
  chosen_reading: The verse continues the personified Wisdom theme, so the pronoun
    is rendered 'she/her.'
  alternative_readings:
  - An abstract rendering with 'it' treating wisdom as an impersonal quality
  rationale: The immediate context in Sirach 15 speaks of wisdom in feminine personal
    terms. Preserving the feminine pronoun maintains the literary and theological
    texture of wisdom personification without overinterpreting beyond the text.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
