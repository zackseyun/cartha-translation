  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μακρὰν ἐστιν ὑπερηφανίας, καὶ ἄνδρες ψεύσται οὐ μὴ μνησθήσονται αὐτῆς.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:8
translation:
  text: She is far from scoffers, and men of falsehood will not remember her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''She is far from pride, and lying men will certainly not remember
      her.'' The Hebrew reads ''scoffers'' where the Greek has ''pride,'' likely reflecting
      a different Vorlage or interpretive rendering.'
    reason: alternative_reading
lexical_decisions:
- source_word: רְחוֹקָה
  chosen: far from
  alternatives:
  - distant from
  - remote from
  lexicon: HALOT
  rationale: The adjective denotes distance. 'Far from' is natural English and preserves
    the metaphorical separation from a class of people.
- source_word: הִיא
  chosen: she
  alternatives:
  - it
  lexicon: HALOT
  rationale: The feminine pronoun refers back to Wisdom in the context (feminine in
    Hebrew and personified as a woman). 'She' preserves the personification better
    than 'it'.
- source_word: מִלֵּצִים
  chosen: scoffers
  alternatives:
  - mockers
  - scorners
  lexicon: HALOT
  rationale: לץ commonly denotes a derisive, arrogant mocker. 'Scoffers' fits wisdom-literature
    usage and matches the moral tone. The Greek parallel's ὑπερηφανίας points toward
    the proud/arrogant sphere, but the Hebrew witness specifically names scoffers,
    so the Hebrew is followed.
- source_word: וְאַנְשֵׁי כָזָב
  chosen: men of falsehood
  alternatives:
  - liars
  - false men
  - deceitful men
  lexicon: HALOT
  rationale: Literally 'men of falsehood.' This keeps the Hebrew idiom visible while
    remaining readable. The Greek parallel has 'lying men,' which supports the sense.
    'Men' is retained per gender-accurate policy because the Hebrew form is masculine
    plural.
- source_word: לֹא יִזְכְּרוּהָ
  chosen: will not remember her
  alternatives:
  - will not mention her
  - will not call her to mind
  lexicon: HALOT
  rationale: זכר in the Qal commonly means remember or call to mind. 'Remember her'
    is the most straightforward rendering. The Greek μνησθήσονται confirms the memory/remembrance
    sense rather than verbal mention.
