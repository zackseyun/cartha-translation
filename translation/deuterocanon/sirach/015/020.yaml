id: SIR.15.20
reference: Sirach 15:20
source:
  edition: sefaria-ben-sira-kahana
  text: לֹא צִוָּה אֱנוֹשׁ לַחֲטֹא, וְלֹא הֶחֱלִים אַנְשֵׁי כָזָב.<br><small>(כ)</small>
    וְלֹא מְרַחֵם עַל עֹשֶׂה שָׁוְא, וְעַל מְגַלֶּה סוֹד.
  language: Hebrew
  pages:
  - 691
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: καὶ οὐκ ἐνετείλατο οὐδενὶ ἀσεβεῖν, καὶ οὐκ ἔδωκεν ἄνεσιν οὐδενὶ ἁμαρτάνειν.
      ¶ C
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:20
translation:
  text: He did not command anyone to sin, and he did not strengthen liars. And he
    does not have mercy on one who does what is vain, and on one who reveals a secret.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''He did not command a man to sin, and he did not … men of falsehood.''
      The second clause is difficult in the surviving Hebrew; the Greek reads, ''and
      he did not give anyone permission to sin.'''
    reason: textual_variant
lexical_decisions:
- source_word: לֹא צִוָּה
  chosen: did not command
  alternatives:
  - has not commanded
  - did not order
  lexicon: HALOT
  rationale: Straightforward negated perfect of צוה, best rendered with simple past
    in English for a gnomic statement.
- source_word: אֱנוֹשׁ
  chosen: anyone
  alternatives:
  - man
  - a human being
  - mortals
  lexicon: HALOT
  rationale: Although אֱנוֹשׁ often means 'man' or 'mortal,' the paired Greek οὐδενί
    ('no one') supports an indefinite sense here. 'Anyone' preserves the universal
    force without awkwardness.
- source_word: לַחֲטֹא
  chosen: to sin
  alternatives:
  - to miss the mark
  - to do wrong
  lexicon: HALOT
  rationale: Standard rendering of חטא in an ethical context.
- source_word: וְלֹא הֶחֱלִים
  chosen: did not permit
  alternatives:
  - did not allow
  - did not give leave
  lexicon: HALOT
  rationale: The Hebrew form is somewhat unusual, but the Greek parallel ἔδωκεν ἄνεσιν
    ('gave leave/permission') clarifies the sense. 'Permit' is concise and natural.
- source_word: אַנְשֵׁי כָזָב
  chosen: anyone
  alternatives:
  - men of falsehood
  - false men
  - liars
  lexicon: HALOT
  rationale: The Hebrew phrase as transmitted is difficult and likely reflects a textual
    problem or idiomatic compression. Since the Greek parallel again reads οὐδενί
    ('no one'), the main text follows the clearer universal sense rather than importing
    a narrower class such as 'liars' into the line.
- source_word: ἀσεβεῖν
  chosen: to be ungodly
  alternatives:
  - to act wickedly
  - to be impious
  lexicon: BDAG
  rationale: The Greek parallel distinguishes ἀσεβεῖν from ἁμαρτάνειν. Rendering the
    first as 'to be ungodly' preserves that distinction better than using 'sin' for
    both clauses.
- source_word: ἁμαρτάνειν
  chosen: to sin
  alternatives:
  - to do wrong
  lexicon: BDAG
  rationale: Standard rendering, and it pairs naturally with the first clause's 'be
    ungodly'.
