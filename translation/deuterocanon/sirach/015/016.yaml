theological_decisions:
- issue: Human moral agency emphasized by the verse
  chosen_reading: The verse is rendered as a genuine presentation of choice without
    importing later doctrinal qualifiers.
  alternative_readings:
  - A stronger determinist construal that minimizes the force of the imperative
  rationale: Both the Hebrew and Greek present alternatives before the hearer and
    command an act of choosing/reaching. The translation preserves that tension plainly
    and does not soften the agency language.
