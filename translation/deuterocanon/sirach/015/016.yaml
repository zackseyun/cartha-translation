id: SIR.15.16
reference: Sirach 15:16
source:
  edition: sefaria-ben-sira-kahana
  text: מוּצָק לְפָנֶיךָ אֵשׁ וָמָיִם, בַּאֲשֶׁר תַּחְפֹּץ שְׁלַח יָדֶיךָ.
  language: Hebrew
  pages:
  - 691
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: παρέθηκέν σοι πῦρ καὶ ὕδωρ, οὗ ἐὰν θέλῃς ἐκτενεῖς τὴν χεῖρά σου·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:16
translation:
  text: Fire and water are set before you; whichever you choose, stretch out your
    hand to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has an unusual form at the start ('מוּצָק'); the sense 'are set before
      you' is supported by the parallel Greek, 'he has set before you.'
    reason: textual_variant
lexical_decisions:
- source_word: מוּצָק
  chosen: are set
  alternatives:
  - is poured out
  - is placed
  lexicon: HALOT
  rationale: The Hebrew form in this witness is unusual, but in context with לְפָנֶיךָ
    and the Greek παρέθηκέν σοι it clearly conveys presentation/placement before the
    person. 'Are set' gives natural English while preserving the image of options
    placed before someone.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in front of you
  lexicon: HALOT
  rationale: A straightforward spatial idiom meaning 'before you/in front of you.'
    'Before you' is idiomatic and matches the moral-choice framing.
- source_word: אֵשׁ וָמָיִם
  chosen: Fire and water
  lexicon: HALOT
  rationale: Concrete paired opposites retained literally, as in the Hebrew and supported
    by the Greek πῦρ καὶ ὕδωρ.
- source_word: בַּאֲשֶׁר תַּחְפֹּץ
  chosen: whichever you choose
  alternatives:
  - whatever you desire
  - whichever you wish
  lexicon: HALOT
  rationale: חפץ denotes desire/will. In this context of moral agency, 'choose' brings
    out volition clearly in English without over-paraphrasing; 'whichever' reflects
    the open alternative set.
- source_word: שְׁלַח יָדֶיךָ
  chosen: stretch out your hand to it
  alternatives:
  - send forth your hand
  - put out your hand
  lexicon: HALOT
  rationale: The idiom means to extend one's hand toward something. The Greek singular
    χεῖρά σου supports a singular collective sense in English. Adding 'to it' makes
    the object explicit in natural English from the context of the alternatives set
    before the hearer.
