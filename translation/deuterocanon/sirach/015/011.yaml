theological_decisions:
- issue: Whether the verse denies divine causation of sin by source ('from God') or
    by occasion ('because of God')
  chosen_reading: The main text uses 'from God,' denying that one's transgression
    originates in God.
  alternative_readings:
  - My transgression is because of God
  - I fell away through the Lord
  rationale: The Hebrew primary witness explicitly reads מֵאֵל פִּשְׁעִי, which most
    naturally speaks of source/origin. The Greek parallel reflects a related but not
    identical formulation ('Through the Lord I departed/fell away'). To remain anchored
    in the Hebrew while preserving the Greek's nuance, the main text follows the Hebrew
    and the Greek-based alternative is footnoted.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
- issue: Whether to render פשע with a stronger rebellion nuance
  chosen_reading: transgression
  alternative_readings:
  - rebellion
  - sin
  rationale: The verse concerns moral culpability before God. 'Transgression' preserves
    the seriousness and likely willful nuance of פשע without making the line sound
    overly technical or political in English.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic'
