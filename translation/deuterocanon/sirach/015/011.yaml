  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ εἴπῃς ὅτι Διὰ Κύριον ἀπέστην· ἃ γὰρ ἐμίσησεν, οὐ ποιήσεις.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:11
translation:
  text: Do not say, “My transgression is from God,” for he has not done what he hates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: “Do not say, ‘Through the Lord I fell away,’ for you will
      not do what he hated.” The Greek reflects a related but not identical wording
      to the surviving Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֹּאמַר
  chosen: Do not say
  alternatives:
  - Do not say to yourself
  - Never say
  lexicon: HALOT
  rationale: Straightforward negative imperative in Hebrew; concise English preserves
    the direct prohibition.
- source_word: מֵאֵל
  chosen: from God
  alternatives:
  - because of God
  - by God
  lexicon: HALOT
  rationale: 'The preposition מִן with אֵל most naturally indicates source/origin
    here: one must not attribute one''s sin to God as its source. The Greek parallel
    Διὰ Κύριον could suggest ''because of the Lord,'' but the Hebrew witness is primary
    and clearer for source attribution.'
- source_word: פִּשְׁעִי
  chosen: my transgression
  alternatives:
  - my rebellion
  - my offense
  - my sin
  lexicon: HALOT
  rationale: פשע commonly denotes transgression/rebellion, often with a willful nuance.
    'Transgression' preserves the moral seriousness without over-specifying political
    rebellion. 'Sin' is possible but less precise.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' keeps the proverbial,
    wisdom-style cadence.
- source_word: אֶת אֲשֶׁר שָׂנֵא
  chosen: what he hates
  alternatives:
  - that which he hates
  - the thing he hates
  lexicon: HALOT
  rationale: This relative construction is naturally rendered idiomatically in English
    as 'what he hates.' The implied subject of 'hates' is God from the prior clause.
- source_word: לֹא עָשָה
  chosen: he has not done
  alternatives:
  - he did not do
  - he does not do
  lexicon: HALOT
  rationale: The Hebrew perfect can be rendered as a gnomic perfect in English. 'He
    has not done' fits the immediate argument and preserves the completed verbal form
    while still sounding natural. The Greek parallel has future οὐ ποιήσεις ('you
    will not do'), but the Hebrew witness supported by source confidence is primary
    here.
