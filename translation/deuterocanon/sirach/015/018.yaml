  text: סָפְקָה חָכְמַת יְהֹוָה, אַמִּיץ גְּבוּרוֹת וְחוֹזֶה כֹל.
  language: Hebrew
  pages:
  - 691
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ὅτι πολλὴ σοφία τοῦ κυρίου· ἰσχυρὸς ἐν δυναστείᾳ καὶ βλέπων τὰ πάντα· 1919
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:18
translation:
  text: For the wisdom of Yahweh is abundant; he is mighty in power and sees all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew סָפְקָה may suggest 'is sufficient' or 'has supplied,' but the Greek parallel reads 'great/abundant,' supporting the sense 'is abundant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סָפְקָה
  chosen: is abundant
  alternatives:
  - is sufficient
  - has supplied
  - is great
  lexicon: HALOT
  rationale: The Hebrew form conveys abundance/sufficiency. In context with חָכְמַת יְהוָה and supported by the Greek πολλὴ, the sense is not that wisdom merely 'suffices' but that it is plentiful or great. 'Is abundant' gives natural English while preserving the predicative force.
- source_word: חָכְמַת
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חכמה. No contextual reason to vary.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name is rendered 'the LORD' rather than transliterated forms.
- source_word: אַמִּיץ
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: HALOT
  rationale: The adjective denotes strength or might. 'Mighty' fits the elevated register and pairs well with the following noun.
- source_word: גְּבוּרוֹת
  chosen: in power
  alternatives:
  - in mighty deeds
  - in strength
  - in acts of power
  lexicon: HALOT
  rationale: The plural can denote mighty acts or strength/power. The Greek parallel ἰσχυρὸς ἐν δυναστείᾳ points toward a more abstract sense of dominion/power here rather than discrete deeds, so 'in power' is preferred.
- source_word: וְחוֹזֶה כֹל
  chosen: and sees all things
  alternatives:
  - and beholds everything
  - and sees all
  lexicon: HALOT
  rationale: חזה is 'see/behold.' With כל, the line expresses comprehensive divine perception. 'Sees all things' is idiomatic and reflects the Greek βλέπων τὰ πάντα.
