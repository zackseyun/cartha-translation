  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: οὐ μὴ καταλήμψονται αὐτὴν ἄνθρωποι ἀσύνετοι, καὶ ἄνδρες ἁμαρτωλοὶ οὐ μὴ
      ἴδωσιν αὐτήν·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:7
translation:
  text: Men of falsehood will not attain her, and men of insolence will not see her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'men of falsehood.' The Greek parallel reads 'senseless people,'
      which may reflect a different Vorlage or an interpretive rendering.
    reason: alternative_reading
  - marker: b
    text: The Hebrew verb is difficult if read woodenly as 'guide her'; the Greek
      parallel supports the sense 'grasp' or 'attain' her.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יַדְרִיכוּהָ
  chosen: will not attain her
  alternatives:
  - will not guide her
  - will not reach her
  - will not overtake her
  lexicon: HALOT
  rationale: The Hebrew form from דרך in this context is difficult if taken in its
    common Hiphil sense 'lead/guide,' since the object is Wisdom and the parallel
    colon speaks of failing to see her. The Greek parallel οὐ μὴ καταλήμψονται αὐτήν
    supports the sense of reaching, grasping, or attaining rather than guiding. 'Attain'
    fits the wisdom context and preserves the idea that such people cannot come into
    possession of her.
- source_word: מְתֵי שָׁוְא
  chosen: men of falsehood
  alternatives:
  - worthless men
  - vain men
  - deceitful men
  lexicon: HALOT
  rationale: מתי is a construct plural meaning 'men of,' and שוא commonly denotes
    falsehood, emptiness, or worthlessness. 'Men of falsehood' keeps the Hebrew idiom
    and matches the moral contrast of the verse. The Greek ἄνθρωποι ἀσύνετοι points
    in a somewhat different direction ('senseless people'), but the Hebrew witness
    is primary here.
- source_word: וְאַנְשֵׁי זָדוֹן
  chosen: men of insolence
  alternatives:
  - arrogant men
  - presumptuous men
  - wicked men
  lexicon: HALOT
  rationale: זדון denotes pride, insolence, or presumptuous rebellion. 'Men of insolence'
    preserves the moral quality without flattening it to the broader 'wicked.' It
    also keeps a degree of formal correspondence with the Hebrew construct phrase.
- source_word: לֹא יִרְאוּהָ
  chosen: will not see her
  alternatives:
  - will not perceive her
  - will not behold her
  lexicon: HALOT
  rationale: ראה is straightforwardly 'see.' In wisdom literature this can imply perception
    or recognition, but the plain verb should be retained in English unless context
    requires expansion. The Greek οὐ μὴ ἴδωσιν confirms the basic sense.
