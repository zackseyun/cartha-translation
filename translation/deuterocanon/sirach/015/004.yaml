theological_decisions:
- issue: Referent and gender of the pronouns
  chosen_reading: Render the feminine suffixes as 'her,' referring to personified
    wisdom.
  alternative_readings:
  - Use 'it' to make the English less personified
  rationale: The Hebrew repeatedly uses feminine forms, and the immediate context
    in Sirach personifies wisdom as a woman. Following the source's gendered imagery
    accords with the project's gender-accurate policy and preserves the literary theology
    of wisdom personification.
