  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: στηριχθήσεται ἐπʼ αὐτὴν καὶ οὐ μὴ κλιθῇ· καὶ ἐπʼ αὐτῆς ἐφέξει καὶ οὐ μὴ
      καταισχυνθῇ·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 15:4
translation:
  text: He will lean on her and not be shaken; he will trust in her and not be put
    to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, Wisdom, personified as a woman in the surrounding context.
    reason: cross_reference
  - marker: b
    text: Or 'and not totter' / 'and not be moved.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and not be ashamed'; the phrase can also carry the sense 'and not be
      disappointed' when trust proves well placed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁעַן
  chosen: he will lean on
  alternatives:
  - he will be supported by
  - he will rely on
  lexicon: HALOT
  rationale: From שׁען, 'to lean on, rely upon.' With עָלֶיהָ ('upon her'), the concrete
    image of leaning is primary in the Hebrew, and the Greek στηριχθήσεται ἐπʼ αὐτὴν
    supports a sense of being firmly established upon/against her. 'Lean on' preserves
    the metaphor while naturally conveying reliance.
- source_word: עָלֶיהָ
  chosen: on her
  alternatives:
  - upon her
  lexicon: HALOT
  rationale: Refers back to personified wisdom in the surrounding context. 'On her'
    is idiomatic modern English while preserving the feminine personification present
    in the Hebrew.
- source_word: וְלֹא יִמּוֹט
  chosen: and not be shaken
  alternatives:
  - and not totter
  - and not be moved
  lexicon: HALOT
  rationale: מוֹט commonly denotes slipping, tottering, or being moved. 'Be shaken'
    communicates resulting instability in clear modern English. The Greek οὐ μὴ κλιθῇ
    likewise points to not being bent aside or made to give way.
- source_word: וּבָהּ יִבְטַח
  chosen: he will trust in her
  alternatives:
  - he will rely on her
  - in her he will be confident
  lexicon: HALOT
  rationale: בטח means 'to trust, feel secure.' 'Trust in her' is the most direct
    and transparent rendering, preserving both the relational and confidence sense.
- source_word: וְלֹא יֵבוֹשׁ
  chosen: and not be put to shame
  alternatives:
  - and not be ashamed
  - and not be disappointed
  lexicon: HALOT
  rationale: בוש often carries the sense of being shamed or disappointed because one's
    confidence fails. 'Be put to shame' best preserves the covenantal/public dimension
    and aligns with the Greek καταισχυνθῇ.
