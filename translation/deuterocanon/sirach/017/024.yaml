theological_decisions:
- issue: Force of 'as one who no longer exists' in relation to the dead
  chosen_reading: Render as rhetorical comparison, not as a doctrinal denial of any
    postmortem existence.
  alternative_readings:
  - Translate more literally as 'as one who is not'
  rationale: The verse contrasts the dead with the living in terms of active thanksgiving
    in this life. The wording is best taken phenomenologically and rhetorically within
    wisdom literature, not as a systematic statement about the ontology of the dead.
    'No longer exists' communicates the comparison in idiomatic English while avoiding
    overreading.
  doctrine_reference: Preserve theological tension rather than resolve it
