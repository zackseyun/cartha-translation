translation:
  text: From the dead, as from one who no longer exists, praise perishes; but one
    who is alive and well will praise the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confession'; the Greek noun can denote acknowledgment or thankful praise.
      Here 'thanksgiving' best fits the parallel with 'will praise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ νεκροῦ
  chosen: From the dead
  alternatives:
  - From a dead person
  - Away from the dead
  lexicon: BDAG
  rationale: 'The preposition ἀπό with the genitive here marks source or point of
    departure: praise/thanksgiving does not come from the dead. ''From the dead''
    is concise and natural, while preserving the singular collective force of νεκροῦ.'
- source_word: ὡς μηδὲ ὄντος
  chosen: as from one who no longer exists
  alternatives:
  - as from one who is not
  - as from one who is nothing
  lexicon: BDAG
  rationale: 'The phrase intensifies the comparison: the dead are likened to one not
    existing. ''No longer exists'' communicates the idiomatic force in readable English
    without making a metaphysical claim beyond the verse''s rhetorical point.'
- source_word: ἀπόλλυται
  chosen: perishes
  alternatives:
  - is lost
  - comes to an end
  lexicon: BDAG
  rationale: ἀπόλλυμι in the middle/passive can mean 'perish' or 'be lost.' 'Perishes'
    fits the gnomic style and keeps the vividness of the Greek better than the flatter
    'comes to an end.'
- source_word: ἐξομολόγησις
  chosen: thanksgiving
  alternatives:
  - confession
  - praise
  lexicon: LEH
  rationale: In LXX usage ἐξομολόγησις often denotes thankful praise or thanksgiving
    to God, not merely confession of sin. Because the second colon uses αἰνέσει ('will
    praise'), rendering this noun as 'thanksgiving' preserves the semantic distinction
    between the two cola.
- source_word: ζῶν
  chosen: one who is alive
  alternatives:
  - the living person
  - he who lives
  lexicon: BDAG
  rationale: The participle functions substantivally. 'One who is alive' is natural
    English and avoids unnecessary archaism.
- source_word: ὑγιὴς
  chosen: well
  alternatives:
  - healthy
  - sound
  lexicon: BDAG
  rationale: ὑγιής means healthy or sound. 'Well' is idiomatic in English alongside
    'alive' and suits the concise wisdom style.
- source_word: αἰνέσει
  chosen: will praise
  alternatives:
  - shall praise
  - praises
  lexicon: BDAG
  rationale: Future indicative in a gnomic statement can be rendered straightforwardly
    as future in English. 'Will praise' preserves the verbal form and the contrast
    with the first colon.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the lord
  lexicon: BDAG
  rationale: Following the project's default for κύριος, 'the Lord' is the appropriate
    rendering in this Jewish scriptural context.
