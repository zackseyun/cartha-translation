theological_decisions:
- issue: Anthropomorphic language for divine perception
  chosen_reading: Retain the concrete image 'He set his eye upon their hearts'
  alternative_readings:
  - He watched over their hearts
  - He turned his attention to their hearts
  rationale: The Greek uses vivid anthropomorphic imagery. In keeping with the project's
    philosophy, the translation preserves the image rather than smoothing it into
    abstraction. This also maintains the tension between bodily metaphor ('eye') and
    inward human reality ('hearts').
