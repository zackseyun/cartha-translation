translation:
  text: He set his eye upon their hearts, to show them the greatness of his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his gaze'; literally 'his eye.' The Greek uses a singular anthropomorphic
      image.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθηκεν
  chosen: He set
  alternatives:
  - He placed
  - He fixed
  lexicon: LSJ
  rationale: A straightforward past-tense rendering of τίθημι. 'Set' is idiomatic
    and preserves the concrete verbal force without overinterpreting duration.
- source_word: τὸν ὀφθαλμὸν αὐτοῦ
  chosen: his eye
  alternatives:
  - his gaze
  - his eyes
  lexicon: LSJ
  rationale: The Greek is singular, literally 'his eye.' English can preserve the
    singular idiomatically here. 'His gaze' is possible but slightly more interpretive
    than the concrete image.
- source_word: ἐπὶ τὰς καρδίας αὐτῶν
  chosen: upon their hearts
  alternatives:
  - on their hearts
  - toward their hearts
  - upon their minds
  lexicon: LSJ
  rationale: καρδία in biblical Greek commonly denotes the inner person, including
    thought and will, but 'hearts' best preserves the source metaphor and theological
    texture. 'Upon' matches ἐπί naturally in this context.
- source_word: δεῖξαι
  chosen: to show
  alternatives:
  - to reveal
  - to make known
  lexicon: LSJ
  rationale: The infinitive expresses purpose. 'To show' is the most direct rendering
    and keeps the visual linkage with 'eye' in the preceding clause.
- source_word: τὸ μεγαλεῖον
  chosen: the greatness
  alternatives:
  - the majesty
  - the magnificence
  - the great deed
  lexicon: LSJ
  rationale: The noun denotes greatness or magnificence. 'The greatness' best fits
    the following genitive 'of his works' and avoids narrowing the sense to either
    abstract majesty or a single deed.
- source_word: τῶν ἔργων αὐτοῦ
  chosen: of his works
  alternatives:
  - of his deeds
  - of what he has done
  lexicon: LSJ
  rationale: ἔργα is well rendered as 'works' in wisdom literature, preserving both
    divine action and the broader scope of God's acts. 'Deeds' is possible but slightly
    less resonant in this context.
