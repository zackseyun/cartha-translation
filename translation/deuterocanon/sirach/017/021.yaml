translation:
  text: Return to the Lord and leave sins behind; pray before his face and lessen
    stumbling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pray in his presence.' The Greek literally says 'pray before [the] face,'
      an idiom for approaching God directly.
    reason: lexical_alternative
  - marker: b
    text: Or 'lessen the stumbling block' or 'reduce what causes stumbling.' The Greek
      term can refer to an obstacle or cause of moral stumbling.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐπίστρεφε
  chosen: Return
  alternatives:
  - Turn back
  - Repent
  lexicon: LSJ
  rationale: Imperative of ἐπιστρέφω, commonly 'turn/return.' 'Return' preserves the
    relational movement back to God without importing the fuller theological freight
    of 'repent' beyond the verb itself.
- source_word: ἐπὶ Κύριον
  chosen: to the Lord
  alternatives:
  - toward the Lord
  lexicon: LSJ
  rationale: With ἐπιστρέφω, ἐπί + accusative expresses direction toward a person.
    'To the Lord' is idiomatic English and preserves the covenantal title κύριος as
    'Lord' per doctrine.
- source_word: ἀπόλειπε
  chosen: leave behind
  alternatives:
  - forsake
  - abandon
  lexicon: LSJ
  rationale: Imperative of ἀπολείπω. 'Leave behind' is clear modern English and conveys
    decisive separation from sins without sounding archaic like 'forsake'.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - sinful acts
  lexicon: LSJ
  rationale: Plural noun naturally rendered 'sins.' The plural is retained rather
    than abstracting to singular 'sin.'
- source_word: δεήθητι
  chosen: pray
  alternatives:
  - make supplication
  - entreat
  lexicon: LSJ
  rationale: Aorist middle imperative of δέομαι, denoting petitionary prayer. 'Pray'
    is readable; the more specific nuance of supplication is partly carried by context
    and noted by the alternative.
- source_word: κατὰ πρόσωπον
  chosen: before his face
  alternatives:
  - before him
  - in his presence
  lexicon: LSJ
  rationale: Literally 'before the face.' Because no explicit object is stated in
    Greek, the phrase is somewhat compressed. 'Before his face' preserves the vivid
    anthropomorphic idiom and the likely implied referent from 'the Lord.'
- source_word: σμίκρυνον
  chosen: lessen
  alternatives:
  - reduce
  - make small
  lexicon: LSJ
  rationale: Imperative meaning to make smaller or diminish. 'Lessen' is concise and
    natural in English.
- source_word: πρόσκομμα
  chosen: stumbling
  alternatives:
  - stumbling block
  - offense
  - cause of stumbling
  lexicon: LSJ
  rationale: πρόσκομμα can denote an obstacle or cause of stumbling. Here the singular
    abstractly suits 'stumbling' as a state or occasion of moral failure. 'Stumbling
    block' is possible but sounds more concrete than the immediate ethical exhortation
    may require.
