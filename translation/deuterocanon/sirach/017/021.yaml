theological_decisions:
- issue: Anthropomorphic phrase κατὰ πρόσωπον with no explicit pronoun
  chosen_reading: Rendered as 'before his face,' with 'his' supplied from the immediately
    preceding 'the Lord.'
  alternative_readings:
  - before him
  - in his presence
  rationale: The Greek idiom is elliptical in English if left without an implied referent.
    Supplying 'his' makes the prayer's object explicit while preserving the vividness
    of the source phrase. This does not add a new theological claim, only clarifies
    the antecedent already present in context.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Ethical force of πρόσκομμα
  chosen_reading: Rendered abstractly as 'stumbling' rather than concretely as 'stumbling
    block.'
  alternative_readings:
  - stumbling block
  - cause of offense
  rationale: The verse pairs turning to the Lord, leaving sins, praying, and diminishing
    what leads to moral failure. The abstract rendering fits the exhortational sequence
    without over-specifying whether the obstacle is internal sin, external occasion,
    or offense to others.
  doctrine_reference: Translation philosophy §§1, 5
