id: SIR.17.29
reference: Sirach 17:29
source:
  edition: lxx-swete-1909
  text: ὡς μεγάλη ἡ ἐλεημοσύνη τοῦ κυρίου, καὶ ἐξιλασμὸς τοῖς ἐπιστρέφουσιν ἐπʼ αὐτόν.
  language: Greek
  pages:
  - 695
  confidence: high
  validation: minor_mismatch
translation:
  text: How great is the mercy of the Lord, and his atonement for those who turn to
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'expiation'; more technically, 'propitiation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς μεγάλη
  chosen: How great
  alternatives:
  - How great indeed
  - So great
  lexicon: LSJ
  rationale: The exclamatory ὡς with adjective is best rendered as an exclamation,
    not a comparison. 'How great' preserves the force naturally in English.
- source_word: ἐλεημοσύνη
  chosen: mercy
  alternatives:
  - compassion
  - merciful kindness
  - almsgiving
  lexicon: LSJ
  rationale: In this context, with τοῦ κυρίου and paired with ἐξιλασμός, the sense
    is the Lord's merciful compassion, not 'almsgiving.' 'Mercy' is concise, idiomatic,
    and theologically fitting.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Follows the project's default rendering for κύριος as a divine title.
    The article is retained for natural English in this clause.
- source_word: ἐξιλασμός
  chosen: atonement
  alternatives:
  - expiation
  - means of atonement
  - propitiation
  lexicon: LSJ
  rationale: The noun denotes removal of guilt / reconciliation. 'Atonement' is accessible
    modern English and avoids the more technical 'propitiation,' while still preserving
    sacrificial-reconciliatory force.
- source_word: τοῖς ἐπιστρέφουσιν
  chosen: for those who turn back
  alternatives:
  - for those who return
  - for those who turn
  lexicon: LSJ
  rationale: ἐπιστρέφω in religious contexts commonly means turning back/returning
    to God. 'Turn back' preserves the repentance nuance more clearly than the flatter
    'return.'
- source_word: ἐπʼ αὐτόν
  chosen: to him
  alternatives:
  - toward him
  - upon him
  lexicon: LSJ
  rationale: With ἐπιστρέφω, the phrase idiomatically means turning back to someone,
    here the Lord. 'To him' is the most natural English rendering.
