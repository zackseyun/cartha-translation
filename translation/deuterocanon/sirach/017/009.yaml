translation:
  text: so that they might recount the mighty deeds of his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the great things of his works' or 'the mighty deeds of his works.' The
      Greek phrase τὰ μεγαλεῖα can be rendered more concretely, but 'the greatness'
      best captures the sense in idiomatic English here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' gives clear, natural English while preserving
    the purposive force of the conjunction.
- source_word: διηγῶνται
  chosen: they might recount
  alternatives:
  - they may tell
  - they might declare
  - they might narrate
  lexicon: BDAG
  rationale: The verb carries the sense of relating or recounting in speech. 'Recount'
    preserves the verbal, reportive nuance better than the broader 'tell' and fits
    the subjunctive after ἵνα with 'might'.
- source_word: τὰ μεγαλεῖα
  chosen: the greatness
  alternatives:
  - the great things
  - the mighty deeds
  - the wonders
  lexicon: LSJ
  rationale: The plural noun can denote great or mighty acts, but in this construction
    with 'of his works' an abstract rendering, 'the greatness,' reads naturally in
    English while still reflecting the sense of what is magnificent about God's deeds.
    'Mighty deeds' is possible, but would risk redundancy with 'works' immediately
    following.
- source_word: τῶν ἔργων
  chosen: of his works
  alternatives:
  - of his deeds
  - of the things he has done
  lexicon: BDAG
  rationale: ἔργα commonly means works or deeds. 'Works' keeps closer formal correspondence
    to the Greek and avoids over-interpreting the phrase.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - —
  lexicon: BDAG
  rationale: Straightforward possessive pronoun referring back to God in the context.
