theological_decisions:
- issue: Possessive pronoun in 'voice' clause
  chosen_reading: 'Rendered the final clause as referring to God''s voice: ''their
    ears heard the glory of his voice.'''
  alternative_readings:
  - their ears heard the glory of their voice
  rationale: The transmitted Swete text reads αὐτῶν twice, yielding a literal 'their
    ears heard the glory of their voice,' which is awkward and contextually unlikely.
    Since the verse describes divine revelation to the people, the most coherent sense
    is that they heard the glory of God's voice. Because the source is marked major_mismatch
    and the Greek is internally difficult, the alternative is preserved in a footnote
    rather than silently ignored.
  doctrine_reference: Preserve theological tension rather than resolve it; mention
    source-level uncertainty honestly.
