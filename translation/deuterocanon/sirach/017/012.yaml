translation:
  text: Their eyes saw a majestic glory, and their ears heard the glory of his voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''their ears heard the glory of their voice.'' The transmitted text
      is difficult; the main rendering takes the sense to be God''s voice in context.'
    reason: textual_variant
lexical_decisions:
- source_word: μεγαλεῖον
  chosen: majestic
  alternatives:
  - great
  - majesty
  - magnificent
  lexicon: LSJ
  rationale: Used adjectivally with δόξης to express grandeur or majesty. 'Majestic'
    gives natural English while preserving the sense of greatness attached to the
    glory.
- source_word: δόξης
  chosen: glory
  alternatives:
  - splendor
  - honor
  lexicon: LSJ
  rationale: δόξα in this context denotes manifested splendor rather than mere reputation.
    'Glory' is the most theologically and literarily fitting rendering in biblical
    English.
- source_word: εἶδον
  chosen: saw
  alternatives:
  - beheld
  lexicon: LSJ
  rationale: Simple past of seeing; 'saw' is clear modern English and sufficient for
    the direct sensory statement.
- source_word: οἱ ὀφθαλμοὶ αὐτῶν
  chosen: their eyes
  alternatives:
  - they
  lexicon: LSJ
  rationale: The Greek explicitly names the eyes, so the translation preserves the
    bodily organ for the parallelism with 'their ears'.
- source_word: δόξαν φωνῆς αὐτῶν
  chosen: the glory of his voice
  alternatives:
  - the glorious sound of his voice
  - the glory of their voice
  lexicon: LSJ
  rationale: The phrase is difficult in Greek. Retaining 'glory' keeps the repeated
    δόξα and preserves the elevated style. The possessive is rendered 'his' because
    the sense in context is God's voice, even though the transmitted Greek has αὐτῶν
    ('their'), which likely reflects a textual or transmission difficulty.
- source_word: ἤκουσεν τὸ οὖς αὐτῶν
  chosen: their ears heard
  alternatives:
  - their ear heard
  lexicon: LSJ
  rationale: Although Greek has singular 'ear,' English idiom prefers plural with
    the distributive possessive in this parallel construction.
