translation:
  text: Return to the Most High and turn away from unrighteousness, and hate what
    is abominable intensely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back to the Most High.' The Greek imperative can be rendered with
      either 'return' or 'turn back,' both expressing repentance and renewed orientation
      toward God.
    reason: lexical_alternative
  - marker: b
    text: '''Unrighteousness'' may also be rendered ''injustice'' or ''wrongdoing,''
      depending on whether the emphasis is taken as broad moral evil or a more specific
      unjust act.'
    reason: lexical_alternative
  - marker: c
    text: The Greek text in this section of Sirach is the primary witness used here;
      source validation notes a mismatch in the transmission history of the verse,
      so the rendering stays closely tied to the extant Greek wording.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπάναγε
  chosen: Return
  alternatives:
  - Turn back
  - Come back
  lexicon: LSJ
  rationale: Imperative calling for a renewed movement back toward God. 'Return' is
    idiomatic in biblical exhortation and preserves the repentance nuance better than
    the more spatial 'come back'.
- source_word: ἐπὶ Ὕψιστον
  chosen: to the Most High
  alternatives:
  - toward the Most High
  lexicon: LSJ
  rationale: With the imperative verb, the phrase expresses direction toward God.
    'To the Most High' is natural English and preserves Ὕψιστον as a divine title
    rather than a mere adjective.
- source_word: ἀπόστρεφε
  chosen: turn away from
  alternatives:
  - turn back from
  - avoid
  lexicon: LSJ
  rationale: A present imperative of ongoing moral reorientation. 'Turn away from'
    matches the ethical force without over-paraphrasing.
- source_word: ἀπὸ ἀδικίας
  chosen: from unrighteousness
  alternatives:
  - from injustice
  - from wrongdoing
  lexicon: LSJ
  rationale: ἀδικία can denote injustice or wrongdoing; 'unrighteousness' best preserves
    the broad moral-religious sense in this wisdom context and aligns with the project's
    default handling of δικ- terms where moral standing is in view.
- source_word: σφόδρα
  chosen: intensely
  alternatives:
  - greatly
  - utterly
  - strongly
  lexicon: LSJ
  rationale: The adverb heightens the command to hate what is detestable. 'Intensely'
    is readable modern English and keeps the emphatic force.
- source_word: μίσησον
  chosen: hate
  alternatives:
  - detest
  lexicon: LSJ
  rationale: The verb is strong and should remain strong in English. 'Hate' preserves
    the severity of the imperative better than a softened alternative.
- source_word: βδέλυγμα
  chosen: abomination
  alternatives:
  - what is detestable
  - detestable thing
  lexicon: LSJ
  rationale: A standard biblical term for something morally loathsome or ritually
    detestable. 'Abomination' preserves the gravity and recognizable biblical register,
    though the more explanatory alternatives remain possible.
