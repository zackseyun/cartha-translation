translation:
  text: He added knowledge to them, and he bequeathed to them the law of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the life-giving law.' The Greek phrase is literally 'law of life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέθηκεν
  chosen: he added
  alternatives:
  - he gave additionally
  - he increased
  lexicon: LSJ
  rationale: 'Aorist of προστίθημι, here with double object sense: God ''added'' something
    to humanity beyond prior gifts. ''He added'' is the most direct and natural English
    rendering.'
- source_word: ἐπιστήμην
  chosen: knowledge
  alternatives:
  - understanding
  - skill
  - discernment
  lexicon: LSJ
  rationale: ἐπιστήμη commonly denotes knowledge or understanding. 'Knowledge' best
    matches the broad intellectual/moral sense in this context without over-specifying
    technical skill.
- source_word: νόμον ζωῆς
  chosen: the law of life
  alternatives:
  - a law of life
  - the law for life
  - life-giving law
  lexicon: LSJ
  rationale: The anarthrous Greek noun νόμον with genitive ζωῆς is rendered with the
    English definite article for idiomatic sense and because the phrase likely refers
    to a specific divinely given ordering for human life. 'Law of life' preserves
    the genitival relationship more transparently than the interpretive 'life-giving
    law'.
- source_word: ἐκληροδότησεν
  chosen: he allotted
  alternatives:
  - he bequeathed
  - he gave as an inheritance
  - he assigned
  lexicon: LSJ
  rationale: The verb carries inheritance/distribution nuance from κληροδοτέω. 'Allotted'
    preserves the sense of assigning a share without sounding overly legalistic or
    archaic like 'bequeathed.'
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - them
  lexicon: LSJ
  rationale: Repeated dative pronoun is retained in both clauses for clarity and to
    reflect the Greek emphasis on the recipients.
