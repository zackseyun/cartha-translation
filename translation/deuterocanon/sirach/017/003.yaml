translation:
  text: And he clothed them with strength, and made them according to his image.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in his image.' The Greek phrase echoes Genesis creation language.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέδυσεν
  chosen: clothed
  alternatives:
  - arrayed
  - endowed
  lexicon: LSJ
  rationale: The verb literally means 'to clothe' or 'put on.' In this context with
    ἰσχύν as the object, English 'clothed ... with' preserves the metaphor more transparently
    than a flattened 'endowed,' while still reading naturally.
- source_word: ἰσχύν
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: LSJ
  rationale: ἰσχύς commonly denotes strength or might. 'Strength' is the most natural
    modern English rendering here and avoids overstating the term as abstract 'power.'
- source_word: κατ᾿ εἰκόνα αὐτοῦ
  chosen: according to his image
  alternatives:
  - in his image
  - after his image
  lexicon: LSJ
  rationale: The phrase echoes Genesis creation language. 'According to his image'
    closely reflects κατά + accusative and preserves the intertextual resonance without
    forcing a more idiomatic but slightly less literal 'in his image.'
- source_word: ἐποίησεν
  chosen: made
  alternatives:
  - created
  - formed
  lexicon: LSJ
  rationale: ποιέω is a broad verb meaning 'make/do.' 'Made' is the most direct equivalent
    here. 'Created' would import a more specific nuance not demanded by the Greek
    wording of this clause.
- source_word: αὐτούς
  chosen: them
  lexicon: LSJ
  rationale: The plural pronoun refers to human beings collectively. 'Them' preserves
    the plural reference straightforwardly in English.
