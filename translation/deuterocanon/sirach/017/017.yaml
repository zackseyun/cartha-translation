theological_decisions:
- issue: Divine omniscience implied by exposed human sin
  chosen_reading: The verse states that human injustices and sins are fully visible
    to God/the Lord without expanding into a broader doctrinal paraphrase.
  alternative_readings:
  - A more dynamic rendering such as 'none of their sins escaped the Lord's notice'
  rationale: The Greek presents exposure before God, not an explicit doctrinal statement
    beyond that. The translation preserves the text's imagery and theological weight
    without importing extra formulation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
