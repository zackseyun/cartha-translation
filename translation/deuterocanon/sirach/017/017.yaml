translation:
  text: Their injustices were not hidden from him, and every sin of theirs was before
    the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did not escape his notice.' The Greek more literally says 'were not
      hidden from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐκρύβησαν
  chosen: were not hidden
  alternatives:
  - were not concealed
  - did not escape notice
  lexicon: LSJ
  rationale: The passive form naturally yields 'were not hidden.' This preserves the
    image of deeds lying exposed before God more directly than the more interpretive
    'did not escape notice.'
- source_word: αἱ ἀδικίαι
  chosen: their injustices
  alternatives:
  - their wrongs
  - their unrighteous acts
  lexicon: LSJ
  rationale: ἀδικία commonly denotes injustice or wrongdoing. 'Injustices' keeps the
    lexical link to acts contrary to right, while avoiding the more abstract theological
    term 'unrighteousness' in this wisdom context.
- source_word: ἀπ᾿ αὐτοῦ
  chosen: from him
  alternatives:
  - before him
  - from his sight
  lexicon: LSJ
  rationale: The preposition ἀπό with the genitive is most straightforwardly 'from
    him.' In English, 'hidden from him' idiomatically conveys concealment from God's
    awareness.
- source_word: πᾶσα ἁμαρτία
  chosen: every sin
  alternatives:
  - all sin
  - every offense
  lexicon: LSJ
  rationale: The distributive singular is best represented by 'every sin,' emphasizing
    each individual act rather than sin in the abstract.
- source_word: ἔναντι Κυρίου
  chosen: before the Lord
  alternatives:
  - in the presence of the Lord
  - before the LORD
  lexicon: LSJ
  rationale: ἔναντι means 'before' or 'in the presence of.' 'Before the Lord' is concise
    and natural. Following doctrine, κύριος is rendered 'Lord,' not 'LORD,' since
    the Greek source here reads Κυρίου rather than the Hebrew divine name directly.
