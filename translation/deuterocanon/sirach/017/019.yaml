theological_decisions:
- issue: Nature of divine action in judgment language
  chosen_reading: Retain the anthropomorphic and retributive wording ('he will rise
    up and repay them') without softening it into abstract providence.
  alternative_readings:
  - He will act against them and give them what they deserve
  - He will bring their deeds back upon them
  rationale: The Greek presents personal divine action and reciprocal judgment. The
    translation preserves that tension and does not dilute it into impersonal consequence
    alone.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
