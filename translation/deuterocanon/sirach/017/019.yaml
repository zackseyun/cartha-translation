translation:
  text: After this he will rise up and repay them, and he will bring their repayment
    upon their head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will arise.' The Greek verb is literally 'rise up,' portraying decisive
      action.
    reason: lexical_alternative
  - marker: b
    text: '''Upon their head'' is an idiom meaning the consequences of their actions
      return upon themselves.'
    reason: cultural_note
lexical_decisions:
- source_word: μετὰ ταῦτα
  chosen: After this
  alternatives:
  - Afterward
  - Then after these things
  lexicon: LSJ
  rationale: Temporal sequence is explicit; 'After this' is natural modern English
    while staying close to the Greek.
- source_word: ἐξαναστήσεται
  chosen: he will rise up
  alternatives:
  - he will arise
  - he will stand up
  lexicon: LSJ
  rationale: The verb literally denotes rising up. Retaining 'rise up' preserves the
    vivid anthropomorphic action rather than flattening it to a mere future auxiliary.
- source_word: ἀνταποδώσει
  chosen: repay
  alternatives:
  - requite
  - pay back
  - render in return
  lexicon: LSJ
  rationale: The context is recompense in response to prior conduct. 'Repay' is concise,
    idiomatic, and preserves the reciprocal sense.
- source_word: τὸ ἀνταπόδομα
  chosen: their repayment
  alternatives:
  - their recompense
  - their due return
  - their requital
  lexicon: LSJ
  rationale: Using the cognate noun 'repayment' preserves the lexical connection with
    ἀνταποδώσει/ἀποδώσει. 'Recompense' is possible, but 'repayment' better reflects
    the repeated pay-back language in the Greek.
- source_word: εἰς κεφαλὴν αὐτῶν
  chosen: upon their head
  alternatives:
  - on their own head
  - back on their head
  lexicon: LSJ
  rationale: This is a standard idiom for consequences returning upon the guilty person.
    'Upon their head' keeps the biblical idiom intact and readable.
- source_word: ἀποδώσει
  chosen: he will return
  alternatives:
  - he will repay
  - he will render
  lexicon: LSJ
  rationale: A different English verb here helps reflect the Greek's climactic restatement
    without sounding mechanically repetitive, while still preserving the semantic
    field of recompense.
