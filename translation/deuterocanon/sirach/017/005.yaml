theological_decisions:
- issue: Anthropological sense of καρδία in a list of human faculties
  chosen_reading: Render literally as 'heart' while allowing the infinitive 'to think
    with' to show its cognitive function.
  alternative_readings:
  - mind
  - understanding
  rationale: The verse reflects biblical anthropology in which the heart is not merely
    emotional but also intellectual and volitional. Translating 'heart' preserves
    that tension rather than collapsing it into a modern psychological category.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Whether to smooth the list into abstract faculties
  chosen_reading: Keep the mixed concrete list ('tongue ... eyes, ears and a heart')
    rather than paraphrasing as speech/sight/hearing/intelligence.
  alternative_readings:
  - speech, sight, hearing, and understanding
  rationale: The Greek itself lists organs/faculties in a compact sequence. Preserving
    that form better reflects the source text and avoids over-interpretation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
