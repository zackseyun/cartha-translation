translation:
  text: He gave them counsel and a tongue and eyes, ears and a heart, to reason with.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliberation' for 'counsel'; the Greek term can denote the capacity
      for considered judgment.
    reason: lexical_alternative
  - marker: b
    text: '''Heart'' here carries the biblical sense of the inner faculty of thought
      and will, not merely emotion.'
    reason: cultural_note
lexical_decisions:
- source_word: διαβούλιον
  chosen: counsel
  alternatives:
  - deliberation
  - purpose
  - understanding
  lexicon: LSJ
  rationale: The noun denotes the capacity for deliberation or counsel. 'Counsel'
    is concise and natural in English while preserving the idea of reasoned judgment
    better than the more abstract 'purpose.'
- source_word: γλῶσσαν
  chosen: a tongue
  alternatives:
  - speech
  - language
  lexicon: LSJ
  rationale: The Greek names the bodily organ, likely by metonymy for speech. Retaining
    'tongue' preserves the concrete sequence of faculties/body parts listed in the
    verse.
- source_word: ὀφθαλμούς
  chosen: eyes
  alternatives:
  - sight
  lexicon: LSJ
  rationale: The plural concrete noun fits the catalog of human faculties and body
    parts; 'sight' would shift from organ to function.
- source_word: ὦτα
  chosen: ears
  alternatives:
  - hearing
  lexicon: LSJ
  rationale: As with 'eyes,' the concrete plural is best preserved in translation.
- source_word: καρδίαν
  chosen: a heart
  alternatives:
  - mind
  - understanding
  lexicon: LSJ
  rationale: In biblical anthropology 'heart' is the seat of inner thought and will.
    Rendering it literally preserves that conceptual world; the following infinitive
    clarifies its cognitive role.
- source_word: ἔδωκεν
  chosen: He gave
  alternatives:
  - he granted
  - he bestowed
  lexicon: LSJ
  rationale: Simple past 'gave' is the most direct rendering and suits the straightforward
    enumerative style.
- source_word: διανοεῖσθαι
  chosen: to think with
  alternatives:
  - to understand
  - to reason
  - to reflect
  lexicon: LSJ
  rationale: The infinitive expresses the purpose or result of the gifts listed. 'To
    think with' makes explicit in idiomatic English that these faculties were given
    for rational reflection, while staying close to the Greek sense of mental activity.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: LSJ
  rationale: English idiom absorbs the indirect object naturally after 'gave'; the
    sense remains unchanged.
