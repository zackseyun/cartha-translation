theological_decisions:
- issue: Sense of ἐπάνοδον in a repentance context
  chosen_reading: a return
  alternative_readings:
  - a way back
  - restoration
  rationale: 'The verse speaks of divine response to repentance, but the noun itself
    need not be expanded into a full doctrinal statement. ''A return'' preserves the
    theological openness of the Greek: return to God, restoration, or renewed standing
    may all be implied by context without being specified in the wording.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of ὑπομονήν after παρεκάλεσεν ἐκλείποντας
  chosen_reading: he encouraged those who were failing with patience
  alternative_readings:
  - he encouraged those who were failing to be patient
  - he comforted the fainthearted with endurance
  rationale: The Greek is compact and allows more than one construal. The chosen rendering
    stays close to the syntax without over-resolving whether patience is the means
    supplied by God or the quality urged upon the failing. Because the source validation
    flags a major mismatch, a footnote preserves the main alternative construal.
  doctrine_reference: Preserve theological tension rather than resolve it.
