theological_decisions:
- issue: Anthropomorphic language for divine knowledge
  chosen_reading: Retain the concrete expression 'his eyes are continually upon their
    ways.'
  alternative_readings:
  - His gaze is always on their conduct
  - He continually watches their ways
  rationale: The Greek uses bodily imagery ('eyes') to express God's constant awareness.
    Following the translation philosophy, the draft preserves the source's theological
    tension and imagery rather than flattening it into abstraction.
  doctrine_reference: Translation philosophy §3, §6
- issue: Force of the sun comparison
  chosen_reading: 'Translate as a simile of manifest visibility: ''before him like
    the sun.'''
  alternative_readings:
  - clear as the sun before him
  - in plain sight before him
  rationale: The text does not explicitly say 'clear' or 'plain,' but the comparison
    to the sun implies open visibility. The chosen rendering stays close to the Greek
    while allowing the implication to be heard.
  doctrine_reference: Translation philosophy §1, §6
