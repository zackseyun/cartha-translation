translation:
  text: All their works are before him like the sun, and his eyes are continually
    upon their ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'All their deeds are before him as the sun.' The comparison likely emphasizes
      that human actions are fully exposed before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅπαντα
  chosen: all
  alternatives:
  - everything
  lexicon: LSJ
  rationale: The adjective intensifies totality; 'all' is idiomatic with the following
    plural noun phrase 'their works.'
- source_word: τὰ ἔργα
  chosen: works
  alternatives:
  - deeds
  - actions
  lexicon: LSJ
  rationale: ἔργα commonly denotes deeds or works. 'Works' preserves the broader scope
    of conduct and outcomes without narrowing to isolated acts.
- source_word: ὡς ὁ ἥλιος
  chosen: like the sun
  alternatives:
  - as the sun
  - in the light of the sun
  lexicon: LSJ
  rationale: The comparison is explicit with ὡς. 'Like the sun' keeps the simile concise
    and natural in English, conveying manifest visibility before God.
- source_word: ἐναντίον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: LSJ
  rationale: ἐναντίον regularly means 'before' or 'in the presence of.' 'Before him'
    is the most natural English rendering here and fits the judicial/observational
    context.
- source_word: οἱ ὀφθαλμοὶ αὐτοῦ
  chosen: his eyes
  lexicon: LSJ
  rationale: A straightforward anthropomorphic expression for divine perception; no
    need to paraphrase into 'his sight' since the Greek uses 'eyes.'
- source_word: ἐνδελεχεῖς
  chosen: continually
  alternatives:
  - unceasing
  - constant
  - attentive
  lexicon: LSJ
  rationale: The adjective conveys persistence or uninterrupted attentiveness. Rendering
    it adverbially in English ('are continually upon') produces natural syntax while
    preserving the sense of ongoing watchfulness.
- source_word: ἐπὶ τὰς ὁδοὺς αὐτῶν
  chosen: upon their ways
  alternatives:
  - on their paths
  - upon their conduct
  lexicon: LSJ
  rationale: ὁδοί literally means 'ways' or 'paths' and often extends metaphorically
    to manner of life. 'Ways' preserves both the literal image and the ethical nuance.
