id: SIR.17.30
reference: Sirach 17:30
source:
  edition: lxx-swete-1909
  text: οὐ γὰρ δύναται πάντα εἶναι ἐν ἀνθρώποις, ὅτι οὐκ ἀθάνατος υἱὸς ἀνθρώπου.
  language: Greek
  pages:
  - 695
  confidence: high
  validation: minor_mismatch
translation:
  text: For not everything can be among human beings, because a son of man is not
    immortal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'a son of man,' a Hebrew-style expression meaning a mortal human being,
      not a messianic title in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ δύναται
  chosen: For ... cannot
  alternatives:
  - for ... is not able
  - for ... does not have power
  lexicon: BDAG
  rationale: δύναται expresses ability or capacity. 'Cannot' is the most natural English
    rendering here and fits the general statement introduced by γάρ.
- source_word: πάντα εἶναι ἐν ἀνθρώποις
  chosen: everything can be in human beings
  alternatives:
  - all things can be among people
  - everything can exist in men
  lexicon: BDAG
  rationale: The phrase is somewhat compressed in Greek. A literal rendering preserves
    the sense that the full range of qualities or capacities is not found within humans.
    'Human beings' reflects ἀνθρώποις as generic humanity rather than males specifically.
- source_word: ἀνθρώποις
  chosen: human beings
  alternatives:
  - people
  - men
  lexicon: BDAG
  rationale: Although the Greek is grammatically masculine/plural, the sense is generic.
    'Human beings' communicates humanity broadly and avoids implying males only, while
    remaining faithful to the referent.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Here ὅτι gives the reason for the preceding statement. 'Because' makes
    the logic explicit in clear modern English.
- source_word: οὐκ ἀθάνατος
  chosen: is not immortal
  alternatives:
  - is not deathless
  lexicon: LSJ
  rationale: ἀθάνατος means 'immortal' or 'deathless.' 'Immortal' is standard, clear
    English and suits the wisdom context.
- source_word: υἱὸς ἀνθρώπου
  chosen: a son of man
  alternatives:
  - a human being
  - man
  lexicon: BDAG
  rationale: The idiom literally reads 'son of man.' In Sirach this is not a messianic
    title but a Semitic-style expression for a human mortal. The main text keeps the
    literal phrase for transparency, while the surrounding wording clarifies the generic
    sense.
