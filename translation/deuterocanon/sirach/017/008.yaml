translation:
  text: and they will praise the name of holiness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'name of holiness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄνομα
  chosen: name
  alternatives:
  - renown
  lexicon: LSJ
  rationale: The ordinary sense 'name' fits the phrase naturally and preserves the
    biblical idiom of praising a name as representing the person and reputation.
- source_word: ἁγιασμοῦ
  chosen: holy
  alternatives:
  - of holiness
  - sanctification
  lexicon: LSJ
  rationale: The genitive literally means 'of holiness/sanctification.' In English,
    'the holy name' is the most natural equivalent and conveys the attributive force
    without awkwardness. 'Sanctification' would sound overly technical here.
- source_word: αἰνέσουσιν
  chosen: they will praise
  alternatives:
  - they will extol
  - they will sing praise to
  lexicon: LSJ
  rationale: Future active of αἰνέω, meaning to praise or extol. 'They will praise'
    is clear, direct, and fits the simple future sense.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - even
  lexicon: LSJ
  rationale: The conjunction straightforwardly links this clause to the preceding
    context; 'and' is the default and sufficient rendering.
