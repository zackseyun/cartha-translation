theological_decisions:
- issue: Anthropological expression οἱ ἄνθρωποι πάντες
  chosen_reading: all men
  alternative_readings:
  - all people
  - all humans
  rationale: The Greek is grammatically masculine with generic force. Following the
    project's gender-accurate policy, the main text keeps 'men' while understanding
    it representatively of humankind.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of δύναμιν in a heavenly context
  chosen_reading: host
  alternative_readings:
  - power
  - might
  rationale: The context contrasts God's oversight of the heavenly realm with human
    frailty. 'Host' best captures a likely collective/cosmic sense and avoids the
    awkwardness of 'power of the height of heaven.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
