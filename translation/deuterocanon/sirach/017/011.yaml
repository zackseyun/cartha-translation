translation:
  text: He established with them an everlasting covenant, and showed them his judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an eternal covenant' or 'an age-long covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his ordinances' or 'his decrees.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκην
  chosen: covenant
  alternatives:
  - agreement
  - testament
  lexicon: BDAG
  rationale: In biblical Greek, διαθήκη regularly carries covenantal force rather
    than a mere mutual agreement. 'Covenant' preserves the theological and scriptural
    resonance appropriate to Sirach.
- source_word: αἰῶνος
  chosen: everlasting
  alternatives:
  - eternal
  - age-long
  lexicon: BDAG
  rationale: The genitive qualifies the covenant as enduring through the age(s). 'Everlasting'
    is idiomatic English for covenant language and fits wisdom-literature usage better
    than the more abstract 'eternal,' while still conveying enduring permanence.
- source_word: ἔστησεν
  chosen: established
  alternatives:
  - set up
  - confirmed
  - made
  lexicon: BDAG
  rationale: The verb here denotes instituting or firmly setting something in place.
    'Established' conveys durable enactment better than the flatter 'made'.
- source_word: μετ᾿ αὐτῶν
  chosen: with them
  alternatives:
  - for them
  - among them
  lexicon: BDAG
  rationale: The preposition μετά with the genitive naturally means 'with.' This preserves
    the relational aspect of the covenant.
- source_word: τὰ κρίματα αὐτοῦ
  chosen: his judgments
  alternatives:
  - his ordinances
  - his decrees
  - his rules
  lexicon: BDAG
  rationale: κρίματα can denote judicial decisions, ordinances, or judgments. 'Judgments'
    is the most direct rendering and preserves the biblical legal-covenantal register.
    'Ordinances' is possible, but the Greek term does not require that narrower procedural
    sense here.
- source_word: ὑπέδειξεν
  chosen: showed
  alternatives:
  - made known
  - pointed out
  - revealed
  lexicon: BDAG
  rationale: The verb means to indicate or show. 'Showed' is simple, direct, and fits
    the parallel structure of the verse; 'made known' is interpretive but possible.
