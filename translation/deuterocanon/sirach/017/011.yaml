theological_decisions:
- issue: Covenantal wording in a wisdom-text context
  chosen_reading: everlasting covenant
  alternative_readings:
  - eternal covenant
  - age-long covenant
  rationale: The Greek plainly presents covenant language, and the translation should
    preserve that theological weight without reducing it to a generic agreement. 'Everlasting
    covenant' is the most natural English rendering for this scriptural idiom.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering κρίματα in covenant context
  chosen_reading: judgments
  alternative_readings:
  - ordinances
  - decrees
  rationale: The text does not force a purely legislative nuance; 'judgments' preserves
    the broader semantic range and biblical diction, allowing both judicial and normative
    force to remain in view.
  doctrine_reference: Translation philosophy §§1, 5
