theological_decisions:
- issue: Scope of human rule implied by ἐξουσίαν τῶν ἐπ᾿ αὐτῆς
  chosen_reading: humanity is granted authority over the things on the earth
  alternative_readings:
  - humanity is given authority over the earth itself
  - humanity is given power over earthly life in general
  rationale: The phrase likely continues the creation theme from the preceding context
    and points to human stewardship over earthly creatures/things rather than absolute
    ownership of the planet. The English keeps the pronoun 'it' to reflect the Greek
    ellipsis and avoid over-specifying beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
