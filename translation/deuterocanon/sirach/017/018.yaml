theological_decisions:
- issue: Subject of the future verb συντηρήσει
  chosen_reading: an implicit singular subject, best understood generically ('he will
    preserve')
  alternative_readings:
  - God will preserve
  - one will preserve
  rationale: The Greek leaves the subject unstated. Within the verse's proverbial
    style, a generic singular subject is the least interpretively loaded and stays
    closest to the wording. Because the broader context may speak of divine recompense,
    'God will preserve' is possible as an interpretive reading, but the verse itself
    does not explicitly name God in this clause.
  doctrine_reference: Preserve theological tension rather than resolve it.
