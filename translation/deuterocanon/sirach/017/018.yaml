translation:
  text: A man's almsgiving is like a seal with him, and he will preserve a person's
    kindness like the pupil of the eye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God will preserve a person's kindness like the pupil of the eye.' The
      Greek verb has no explicit subject; the broader context may suggest God, but
      the clause itself leaves it unstated.
    reason: alternative_reading
  - marker: b
    text: Literally, 'like the pupil of the eye'; compare the English idiom 'like
      the apple of the eye.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεημοσύνη
  chosen: almsgiving
  alternatives:
  - charity
  - merciful deed
  lexicon: BDAG
  rationale: In Hellenistic Jewish usage the term commonly denotes acts of mercy expressed
    in giving to the needy. 'Almsgiving' is more specific and historically accurate
    than the broader 'charity,' and fits Sirach's recurring emphasis on concrete merciful
    giving.
- source_word: ἀνδρός
  chosen: a man's
  alternatives:
  - of a man
  - a person's
  lexicon: LSJ
  rationale: The Greek is singular masculine. Following the project's gender-accurate
    policy, 'a man's' preserves the grammatical form. The second colon broadens to
    ἀνθρώπου, so the verse itself uses two related but distinct human terms.
- source_word: σφραγίς
  chosen: seal
  alternatives:
  - signet
  - signet ring
  lexicon: LSJ
  rationale: The image is of something kept close and carefully guarded as a mark
    of value and identity. 'Seal' is the most direct rendering and leaves the metaphor
    intact without over-specifying the object.
- source_word: μετ᾿ αὐτοῦ
  chosen: with him
  alternatives:
  - beside him
  - in his keeping
  lexicon: LSJ
  rationale: The prepositional phrase is straightforward. 'With him' preserves the
    compact Greek expression and supports the metaphor of something kept close.
- source_word: χάριν
  chosen: kindness
  alternatives:
  - favor
  - gracious deed
  - grace
  lexicon: BDAG
  rationale: Here χάρις most naturally refers to a beneficent act or favor shown by
    a person, parallel to ἐλεημοσύνη in the first colon. 'Kindness' is natural English
    and avoids importing later theological freight associated with 'grace'.
- source_word: ἀνθρώπου
  chosen: a person's
  alternatives:
  - of a man
  - human
  lexicon: LSJ
  rationale: Unlike ἀνδρός, this noun is the broader term for a human being. 'A person's'
    reflects that broader sense in idiomatic English while preserving the singular.
- source_word: κόρην
  chosen: the pupil of the eye
  alternatives:
  - the apple of the eye
  - the eyeball
  lexicon: LSJ
  rationale: Literally the word denotes the pupil; idiomatically it can evoke the
    cherished 'apple of the eye.' The more literal rendering keeps the bodily metaphor
    transparent while still conveying careful protection.
- source_word: συντηρήσει
  chosen: he will preserve
  alternatives:
  - he will keep safe
  - he will guard
  lexicon: BDAG
  rationale: Future active singular. 'Preserve' fits both the object and the comparison
    with guarding the eye, while remaining close to the Greek.
