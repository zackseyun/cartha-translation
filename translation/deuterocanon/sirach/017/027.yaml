theological_decisions:
- issue: Meaning of ᾅδης in wisdom literature context
  chosen_reading: Hades as the realm of the dead, without importing later detailed
    doctrines of hell
  alternative_readings:
  - the grave
  - Sheol
  rationale: The verse contrasts the dead with the living as worshipers. Rendering
    ᾅδης as 'Hades' preserves the Greek term's scope and avoids overstating a doctrine
    of final punishment not explicit here.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
