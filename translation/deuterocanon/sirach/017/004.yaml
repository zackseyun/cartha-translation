theological_decisions:
- issue: Representative singular pronoun for humanity
  chosen_reading: Retain singular 'his' and 'him' for the human being as representative
    man.
  alternative_readings:
  - Use plural 'their' and 'them' to make the collective sense explicit
  rationale: The Greek uses singular forms, likely referring back to humanity/man
    in representative singular form. Per doctrine, gender-accurate rendering is preferred
    over flattening to gender-neutral plurals when the source uses masculine representative
    language.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of σάρξ in a non-Pauline, literal-collective sense
  chosen_reading: Translate as 'flesh' in the phrase 'all flesh.'
  alternative_readings:
  - all living beings
  - every creature
  rationale: The doctrine specifies 'flesh' for literal uses of σάρξ. Here the phrase
    is idiomatic and collective, not metaphorical or moral, so 'all flesh' best preserves
    the source while remaining understandable.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
