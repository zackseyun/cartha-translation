translation:
  text: From the dead, as from one who no longer exists, praise perishes; but one
    who is alive and well will praise the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thanksgiving perishes'; the Greek noun can also mean 'confession,' but
      here the parallel with 'will praise the Lord' favors the sense of praise or
      thanksgiving.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ νεκροῦ
  chosen: From the dead
  alternatives:
  - From a dead person
  - From the deceased
  lexicon: BDAG
  rationale: The singular with ἀπό is best rendered generically. 'From the dead' is
    concise and idiomatic in English while preserving the sense that praise does not
    come from a dead person.
- source_word: ὡς μηδὲ ὄντος
  chosen: as from one who no longer exists
  alternatives:
  - as from one who is not
  - as from one who is as good as nonexistent
  lexicon: BDAG
  rationale: The participial phrase intensifies the condition of death by comparing
    the dead to one not existing. 'No longer exists' communicates the force clearly
    in modern English without implying a metaphysical denial beyond the verse's rhetorical
    point.
- source_word: ἀπόλλυται
  chosen: perishes
  alternatives:
  - is lost
  - comes to an end
  - disappears
  lexicon: BDAG
  rationale: The verb denotes destruction or disappearance. 'Perishes' preserves the
    gravity and compactness of the Greek better than the flatter 'is lost'.
- source_word: ἐξομολόγησις
  chosen: praise
  alternatives:
  - confession
  - thanksgiving
  - acknowledgment
  lexicon: LEH
  rationale: In this context, paired with αἰνέσει and directed toward the Lord, the
    noun refers to thankful praise rather than confession of sin. 'Praise' best fits
    the parallelism and immediate context.
- source_word: ζῶν καὶ ὑγιὴς
  chosen: one who is alive and well
  alternatives:
  - the living and healthy person
  - one who lives and is sound
  lexicon: BDAG
  rationale: The phrase contrasts with the dead and describes a person in full living
    condition. 'Alive and well' is natural English and preserves both elements.
- source_word: αἰνέσει
  chosen: will praise
  alternatives:
  - shall praise
  - gives praise to
  lexicon: BDAG
  rationale: Future sense fits the Greek form and the proverbial contrast. 'Will praise'
    is straightforward modern English.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος defaults to 'Lord.' In this Jewish wisdom
    context it refers to God.
