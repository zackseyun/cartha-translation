theological_decisions:
- issue: Anthropomorphic language for divine knowledge
  chosen_reading: Retain 'before him' and 'from his eyes' as personal, visual language
    for God.
  alternative_readings:
  - Paraphrase as 'known to him' or 'from his sight'
  rationale: The Greek uses concrete visual imagery to express God's constant awareness
    of human conduct. Preserving that imagery maintains the wisdom-text tone and avoids
    flattening the theological force into abstraction.
