translation:
  text: Their ways are always before him; they will not be hidden from his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their conduct is continually before him'; 'ways' can refer to a person's
      manner of life, not only literal paths.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱ ὁδοὶ
  chosen: ways
  alternatives:
  - paths
  - conduct
  lexicon: LSJ
  rationale: ὁδοί literally means 'ways/roads,' but in wisdom literature commonly
    extends to one's manner of life or conduct. 'Ways' preserves the metaphor while
    remaining natural English.
- source_word: ἐναντίον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: LSJ
  rationale: The phrase denotes being set before someone, especially within their
    sight or presence. 'Before him' is idiomatic and keeps the visual/judicial sense
    without over-literalizing 'face.'
- source_word: διὰ παντός
  chosen: always
  alternatives:
  - continually
  - at all times
  lexicon: LSJ
  rationale: The idiom means continuously or at all times. 'Always' is the clearest
    modern equivalent.
- source_word: οὐ κρυβήσονται
  chosen: will not be hidden
  alternatives:
  - will not be concealed
  - cannot be hidden
  lexicon: LSJ
  rationale: Future passive of κρύπτω. 'Will not be hidden' closely reflects the Greek
    form and leaves the statement as assertion rather than paraphrased modal force.
- source_word: ἀπὸ τῶν ὀφθαλμῶν αὐτοῦ
  chosen: from his eyes
  alternatives:
  - from his sight
  - from before his eyes
  lexicon: LSJ
  rationale: A literal rendering is appropriate here because the anthropomorphic expression
    is transparent in English and reinforces divine omniscience.
