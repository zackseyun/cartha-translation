translation:
  text: For each nation he appointed a ruler, and Israel is the Lord’s own portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'and Israel is the Lord’s portion.' The translation uses
      'but' to reflect the likely contrast in sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκάστῳ
  chosen: for each
  alternatives:
  - to each
  - for every
  lexicon: LSJ
  rationale: Dative with ἔθνει is distributive; 'for each' gives clear English sense
    without over-literal stiffness.
- source_word: ἔθνει
  chosen: nation
  alternatives:
  - people
  - gentile nation
  lexicon: LSJ
  rationale: In this context the word refers broadly to the various peoples/nations
    of the world, not specifically 'Gentiles' in contrast to Jews. 'Nation' best fits
    the distributive statement.
- source_word: κατέστησεν
  chosen: appointed
  alternatives:
  - set over
  - established
  lexicon: LSJ
  rationale: The verb commonly means to appoint or set someone in a position. 'Appointed'
    is idiomatic and preserves the sense of assigning authority.
- source_word: ἡγούμενον
  chosen: a ruler
  alternatives:
  - a leader
  - one who governs
  lexicon: LSJ
  rationale: The participle denotes one who leads or governs. 'Ruler' fits the governance
    context and pairs naturally with 'appointed.'
- source_word: μερὶς
  chosen: portion
  alternatives:
  - share
  - inheritance
  lexicon: LSJ
  rationale: The noun means a share or portion. 'Portion' preserves the covenantal
    allotment imagery and echoes biblical diction without becoming archaic.
- source_word: Κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  lexicon: LSJ
  rationale: Genitive possessive rendered naturally in English. Per doctrine, κύριος
    defaults to 'Lord.'
- source_word: Ἰσραήλ
  chosen: Israel
  lexicon: LSJ
  rationale: Standard transliteration of the people/nation name.
- source_word: ἐστιν
  chosen: is
  lexicon: LSJ
  rationale: Simple copula; no reason to expand beyond the Greek.
