theological_decisions:
- issue: Contrast between the nations and Israel
  chosen_reading: Rendered the second clause adversatively with 'but Israel is the
    Lord’s own portion.'
  alternative_readings:
  - and Israel is the Lord’s portion
  rationale: 'Although καί is formally ''and,'' the sense in context is contrastive:
    the nations are assigned rulers, whereas Israel uniquely belongs to the Lord.
    Using ''but'' makes the implied contrast explicit in natural English without adding
    a new doctrinal claim. ''Own'' lightly brings out the possessive force of μερὶς
    Κυρίου while remaining within the semantic range.'
  doctrine_reference: DOCTRINE.md §§1, 6
