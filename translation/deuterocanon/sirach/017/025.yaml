translation:
  text: How great is the mercy of the Lord, and his atonement for those who turn to
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'propitiation' or 'expiation' for those who return to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς μεγάλη
  chosen: How great
  alternatives:
  - As great
  - So great
  lexicon: LSJ
  rationale: 'The exclamatory use of ὡς with an adjective is best rendered as an exclamation
    in English: ''How great.'' This preserves the force better than a more wooden
    ''as great.'''
- source_word: ἐλεημοσύνη
  chosen: mercy
  alternatives:
  - almsgiving
  - compassion
  - merciful kindness
  lexicon: BDAG/LSJ
  rationale: Although ἐλεημοσύνη can mean 'almsgiving' in some contexts, here with
    'of the Lord' it refers to his merciful action or mercy. 'Mercy' is the most natural
    and contextually fitting rendering.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the master
  lexicon: BDAG/LSJ
  rationale: κύριος is rendered 'Lord' per project default and because in this Jewish
    wisdom context it denotes God reverentially, not a human master.
- source_word: ἐξιλασμός
  chosen: atonement
  alternatives:
  - propitiation
  - expiation
  - means of forgiveness
  lexicon: LSJ
  rationale: ἐξιλασμός denotes the removal of guilt or the making of atonement. 'Atonement'
    is accessible modern English and avoids importing a narrower doctrinal theory.
    More technical alternatives are preserved as lexical possibilities.
- source_word: τοῖς ἐπιστρέφουσιν
  chosen: for those who turn back
  alternatives:
  - for those who return
  - for those who repent
  lexicon: BDAG/LSJ
  rationale: ἐπιστρέφω literally means 'turn/turn back, return.' 'Turn back' preserves
    the metaphor of repentance/return to God without over-interpreting it as a technical
    term.
- source_word: ἐπ᾿ αὐτόν
  chosen: to him
  alternatives:
  - toward him
  - upon him
  lexicon: BDAG/LSJ
  rationale: With ἐπιστρέφω, the phrase expresses movement or orientation back toward
    God. 'To him' is idiomatic English and captures the relational direction.
