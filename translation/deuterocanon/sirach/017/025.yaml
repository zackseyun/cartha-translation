theological_decisions:
- issue: Meaning of ἐξιλασμός in relation to divine forgiveness
  chosen_reading: atonement
  alternative_readings:
  - propitiation
  - expiation
  rationale: The verse states that the Lord provides ἐξιλασμός for those who turn
    back to him. 'Atonement' preserves the theological weight while avoiding commitment
    to a specific later doctrinal model of how atonement works. This aligns with the
    project's preference for accessible but theologically serious language.
  doctrine_reference: 'DOCTRINE.md: avoid ecclesiastical jargon where accessible English
    can preserve the sense; preserve theological tension rather than over-resolve.'
