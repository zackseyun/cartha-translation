id: SIR.17.26
reference: Sirach 17:26
source:
  edition: lxx-swete-1909
  text: οὐ γὰρ δύναται πάντα εἶναι ἐν ἀνθρώποις, ὅτι οὐκ ἀθάνατος υἱὸς ἀνθρώπου.
  language: Greek
