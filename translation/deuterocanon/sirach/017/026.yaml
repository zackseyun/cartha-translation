theological_decisions:
- issue: Whether υἱὸς ἀνθρώπου should be rendered as a title or generic human reference
  chosen_reading: 'generic human reference: ''a son of man'''
  alternative_readings:
  - a human being
  - man
  - the Son of Man
  rationale: In this wisdom context the phrase denotes mortal humanity, not an exalted
    or messianic figure. The lack of article and the explanatory clause about mortality
    favor a generic reading. Retaining 'son of man' preserves the source idiom without
    importing later christological associations.
