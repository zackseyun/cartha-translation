translation:
  text: For not everything can be among human beings, because a son of man is not
    immortal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a human being is not immortal.' The Greek literally reads 'a son of
      man,' here a generic expression for a mortal human, not a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ
  chosen: For not
  alternatives:
  - because not
  - for
  lexicon: BDAG
  rationale: γάρ gives an explanatory ground linking this line to the preceding context;
    'For' preserves that connection without overinterpreting.
- source_word: δύναται
  chosen: can be
  alternatives:
  - is able to be
  - is possible
  lexicon: BDAG
  rationale: The verb expresses capability/possibility. 'Can be' is idiomatic English
    and keeps the impersonal sense with πάντα as subject.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - the whole
  lexicon: BDAG
  rationale: Neuter plural used comprehensively. 'Everything' is natural English and
    preserves the broad scope.
- source_word: ἐν ἀνθρώποις
  chosen: in human beings
  alternatives:
  - among men
  - in people
  - in humans
  lexicon: BDAG
  rationale: ἀνθρώποις is generic for humanity, not specifically male. 'In human beings'
    best reflects the inclusive sense while preserving the preposition ἐν rather than
    shifting to a looser paraphrase.
- source_word: ἀθάνατος
  chosen: immortal
  alternatives:
  - deathless
  - not subject to death
  lexicon: BDAG
  rationale: The adjective straightforwardly means 'immortal.' This concise rendering
    preserves the contrast with human limitation.
- source_word: υἱὸς ἀνθρώπου
  chosen: a son of man
  alternatives:
  - a human being
  - man
  - the son of man
  lexicon: BDAG
  rationale: The phrase here is anarthrous and generic, not a messianic title. 'A
    son of man' preserves the Semitic idiom and the gender-accurate singular of the
    Greek, while signaling mortal humanity. A more interpretive 'a human being' is
    possible but loses the idiomatic force.
