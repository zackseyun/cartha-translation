- issue: Anthropological expression σάρκα καὶ αἷμα
  chosen_reading: flesh and blood
  alternative_readings:
  - mortal humanity
  - human beings
  rationale: The verse contrasts the sun's limited endurance with the moral frailty
    of humans. Preserving the idiom keeps the text's embodied anthropology without
    importing later doctrinal nuance.
