id: SIR.17.31
reference: Sirach 17:31
source:
  edition: lxx-swete-1909
  text: τί φωτεινότερον ἡλίου; καὶ τοῦτο ἐκλείπει, καὶ πονηρὸς ἐνθυμήσεται σάρκα καὶ
    αἷμα.
  language: Greek
  pages:
  - 695
  confidence: high
  validation: minor_mismatch
translation:
  text: What is brighter than the sun? Yet even this fails, and flesh and blood devises
    evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and even this is eclipsed' or 'and this too disappears'; the Greek verb
      can denote failing, ceasing, or being eclipsed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'flesh and blood,' an idiom for mortal human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  chosen: What
  alternatives:
  - Who
  lexicon: LSJ
  rationale: Introduces a rhetorical question about comparative brightness; 'what'
    fits the impersonal comparison better than 'who'.
- source_word: φωτεινότερον
  chosen: brighter
  alternatives:
  - more radiant
  - more shining
  lexicon: LSJ
  rationale: Comparative adjective from φωτεινός; 'brighter' is the most natural concise
    English comparative in context.
- source_word: ἡλίου
  chosen: than the sun
  alternatives:
  - of the sun
  lexicon: LSJ
  rationale: 'Genitive after a comparative is naturally rendered in English with ''than'':
    ''brighter than the sun.'''
- source_word: καὶ τοῦτο ἐκλείπει
  chosen: Yet even this fails
  alternatives:
  - and even this is eclipsed
  - and this too disappears
  - and even this comes to an end
  lexicon: LSJ
  rationale: ἐκλείπει can denote failing, ceasing, or being eclipsed. In this wisdom
    context, the point is the sun's own limitation or passing, not specifically an
    astronomical eclipse, so 'fails' captures the broader sense. 'Yet' brings out
    the adversative force naturally in English.
- source_word: πονηρὸς
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: LSJ
  rationale: Predicative/adverbial sense with the following verb is best conveyed
    by 'evil' in a moral sense.
- source_word: ἐνθυμήσεται
  chosen: devises
  alternatives:
  - thinks
  - considers
  - plans
  lexicon: LSJ
  rationale: The future middle of ἐνθυμέομαι can mean to ponder or consider inwardly;
    here with πονηρόν and the subject 'flesh and blood,' it carries the sense of inwardly
    conceiving or devising evil.
- source_word: σάρκα καὶ αἷμα
  chosen: flesh and blood
  alternatives:
  - a human being
  - mortal humanity
  lexicon: LSJ
  rationale: This is a fixed anthropological expression for mortal human beings. The
    idiom is preserved in English because it is natural and retains the concrete force
    of the Greek.
