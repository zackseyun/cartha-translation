theological_decisions:
- issue: Meaning of ᾅδης in wisdom literature context
  chosen_reading: Hades as the realm of the dead, not a developed doctrine of final
    punishment
  alternative_readings:
  - the grave
  - Sheol
  rationale: The verse contrasts the dead with the living in their capacity to praise
    God. The text does not require later doctrinal notions of hell; it speaks of the
    underworld / abode of the dead.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
