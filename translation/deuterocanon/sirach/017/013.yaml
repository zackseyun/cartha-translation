translation:
  text: And he said to them, “Beware of every injustice,” and he commanded each of
    them concerning his neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Take heed from every wrong' or 'Be on guard against every unjust thing.'
      The Greek wording is concise and allows several close English renderings.
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  chosen: Watch yourselves
  alternatives:
  - Take heed
  - Be on guard
  - Pay attention
  lexicon: BDAG
  rationale: The imperative προσέχετε can mean 'pay attention,' 'beware,' or 'be on
    guard.' With ἀπό plus a negative object ('from every injustice'), the sense is
    cautionary rather than merely attentive. 'Watch yourselves' gives natural English
    while preserving the reflexive force implied in the warning.
- source_word: ἀπὸ παντὸς ἀδίκου
  chosen: against every injustice
  alternatives:
  - from every wrong
  - from all unrighteousness
  - from every unjust thing
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek. ἄδικος/ἄδικον language can
    denote what is unjust, wrongful, or unrighteous. 'Every injustice' best captures
    the ethical scope without sounding overly abstract or importing later Pauline
    technical usage. 'Against' fits idiomatic English after 'watch yourselves.'
- source_word: ἐνετείλατο
  chosen: he commanded
  alternatives:
  - he instructed
  - he gave orders
  lexicon: BDAG
  rationale: The verb denotes giving a charge or command. 'He commanded' preserves
    the authoritative force better than the softer 'instructed.'
- source_word: ἑκάστῳ
  chosen: each of them
  alternatives:
  - to each one
  - to each
  lexicon: BDAG
  rationale: 'The dative singular distributive sense is explicit: the command applies
    individually. ''Each of them'' makes that clear in smooth English.'
- source_word: περὶ τοῦ πλησίον
  chosen: concerning his neighbor
  alternatives:
  - about his neighbor
  - regarding the neighbor
  - with respect to his fellow
  lexicon: BDAG
  rationale: πλησίον in ethical contexts commonly means 'neighbor' or 'fellow human
    being.' 'Neighbor' preserves the biblical moral register and interhuman focus.
    The singular is retained because the Greek is singular and distributive.
