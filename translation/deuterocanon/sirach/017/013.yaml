theological_decisions:
- issue: Ethical scope of ἀδίκου language
  chosen_reading: Rendered as 'injustice' rather than 'unrighteousness.'
  alternative_readings:
  - every wrong
  - all unrighteousness
  rationale: In Sirach's wisdom context, the warning concerns unjust conduct toward
    others rather than a technical doctrinal category. 'Injustice' foregrounds the
    social-ethical dimension that is reinforced by the following phrase about one's
    neighbor.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
- issue: Singular 'neighbor' with distributive force
  chosen_reading: 'Retained singular: ''each of them concerning his neighbor.'''
  alternative_readings:
  - each concerning their neighbors
  - each about one another
  rationale: The Greek uses singular distributive wording. Retaining singular preserves
    the source structure and the personal ethical focus, while still being understandable
    in modern English.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral'
