theological_decisions:
- issue: Use of Hebrew as primary witness with Greek parallel showing a substantially
    different form of the verse
  chosen_reading: Translate the extant Hebrew main line while allowing the Greek to
    inform the sense of the warning without replacing the Hebrew.
  alternative_readings:
  - 'Translate from the Greek as the main text: ''Turn your eye away from a beautiful
    woman, and do not gaze at another''s beauty...'''
  rationale: For Sirach, where Hebrew survives, project policy gives Hebrew primacy.
    Here the Greek parallel appears to reflect a fuller or different recension, expanding
    the admonition toward visual temptation, while the Hebrew is shorter and focused
    on giving oneself to a prostitute and risking one's inheritance. The main text
    therefore follows the Hebrew, but the Greek alternative is significant enough
    to preserve in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly.'
