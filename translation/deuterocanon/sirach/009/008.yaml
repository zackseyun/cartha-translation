translation:
  text: Do not give yourself to a prostitute, lest you squander your inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Turn your eye away from a beautiful woman, and do not study another''s
      beauty; for by a woman''s beauty many have gone astray, and from this passion
      blazes up like fire.'' The Greek witness here is substantially fuller than the
      surviving Hebrew.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'your inheritance' may refer to one's estate or hereditary portion;
      the warning is that sexual folly can divert or forfeit what belongs to you.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּתֵּן
  chosen: Do not give
  alternatives:
  - Do not hand over
  - Do not devote
  lexicon: HALOT
  rationale: The negative imperative plus נתן is naturally rendered 'do not give.'
    In English, with the reflexive object supplied by context through 'yourself,'
    this conveys yielding oneself over without over-paraphrasing.
- source_word: לְזוֹנָה
  chosen: to a prostitute
  alternatives:
  - to a harlot
  - to a sexually immoral woman
  lexicon: HALOT
  rationale: זוֹנָה specifically denotes a prostitute/fornicating woman. 'Prostitute'
    is the clearest modern English equivalent; 'harlot' is archaic, and the broader
    'sexually immoral woman' is less precise than the Hebrew.
- source_word: נַפְשְׁךָ
  chosen: yourself
  alternatives:
  - your soul
  - your life
  lexicon: HALOT
  rationale: נפש often denotes the self/person/life, not merely the immaterial soul.
    In this warning context, 'give yourself' is idiomatic English and best reflects
    the Hebrew sense of yielding one's whole person.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that you do not
  lexicon: HALOT
  rationale: פן introduces a warning about undesirable consequence. 'Lest' preserves
    the concise admonitory force better than more expanded alternatives.
- source_word: תָּסֵב
  chosen: you turn away
  alternatives:
  - you lose
  - you alienate
  - you forfeit
  lexicon: HALOT
  rationale: From סבב/סוּב in a causative or resultative sense, the Hebrew points
    to causing one's inheritance to be diverted or turned aside. Because the exact
    nuance is somewhat uncertain and the Greek parallel differs substantially, 'turn
    away' stays closer to the Hebrew wording while leaving the consequence implicit.
- source_word: נַחֲלָתֶךָ
  chosen: your inheritance
  alternatives:
  - your estate
  - your heritage
  - your portion
  lexicon: HALOT
  rationale: נחלה commonly means inheritance, property, or hereditary portion. 'Inheritance'
    is the most direct rendering and preserves both material and familial overtones.
