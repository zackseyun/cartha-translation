translation:
  text: Do not give your soul to a woman, to let her tread on your heights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Do not give your soul to a woman, for her to step upon your strength.''
      The Greek clarifies the metaphor as a warning against yielding one''s power
      or standing.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'your heights' may be a figurative expression for one's position,
      dignity, or strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תַּקְנֶא
  chosen: Do not give
  alternatives:
  - Do not be jealous
  - Do not hand over
  lexicon: HALOT
  rationale: The Hebrew consonants suggest a difficult form, but the Greek parallel
    μὴ δῷς ('do not give') strongly supports reading the sense as prohibition against
    yielding oneself, not jealousy. Since the task requires using the Greek parallel
    as actual input, the main text follows the clearer sense attested by the Greek
    while remaining compatible with the Hebrew context.
- source_word: נַפְשְׁךָ
  chosen: your soul
  alternatives:
  - yourself
  - your life
  lexicon: HALOT
  rationale: נפש often means the self or life, but 'soul' preserves the literal wording
    and matches the Greek ψυχή. In this wisdom context it refers to one's inner self
    or whole person; the more idiomatic sense is preserved by the surrounding English.
- source_word: לְאִשָּׁה
  chosen: to a woman
  alternatives:
  - to a wife
  lexicon: HALOT
  rationale: The Hebrew and Greek both use the common term for 'woman/wife' without
    possessive marking. 'Woman' is the broader and less interpretively restrictive
    choice here.
- source_word: לְהַדְרִיכָהּ
  chosen: so as to let her tread
  alternatives:
  - to let her lead
  - to let her direct
  lexicon: HALOT
  rationale: The Hebrew verb as transmitted can suggest causing to tread/step or leading,
    and the Greek ἐπιβῆναι ('to step upon, mount') clarifies the image of stepping
    onto something. The translation preserves that concrete imagery rather than abstracting
    it to 'control' or 'dominate'.
- source_word: עַל בָּמוֹתֶיךָ
  chosen: on your heights
  alternatives:
  - on your high places
  - on your strength
  lexicon: HALOT
  rationale: Hebrew במותיך literally means 'your heights/high places.' The Greek renders
    interpretively as ἐπὶ τὴν ἰσχύν σου ('upon your strength'), showing an understood
    metaphor of personal power or standing. The main text keeps the Hebrew image,
    while the Greek-based interpretive sense is preserved in a footnote.
