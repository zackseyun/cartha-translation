translation:
  text: Do not keep company with a prostitute, lest you be caught by her enticements.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'by her leqachot' is difficult; the Greek parallel reads 'in her
      devices/attempts,' supporting the sense 'by her enticements' or 'by her schemes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִם
  chosen: with / keep company with
  alternatives:
  - with
  - among
  lexicon: HALOT
  rationale: The preposition literally means 'with,' but in this prohibition the idiomatic
    sense is association or companionship. 'Keep company with' brings out the relational
    warning in natural English without over-paraphrasing.
- source_word: זוֹנָה
  chosen: a prostitute
  alternatives:
  - a harlot
  - a whore
  lexicon: HALOT
  rationale: The Hebrew denotes a prostitute. 'Prostitute' is the clearest modern
    English equivalent; the alternatives are either archaic or overly harsh in tone.
- source_word: אַל תִּסְתַּיֵּד
  chosen: do not keep company
  alternatives:
  - do not associate
  - do not consort
  - do not become intimate
  lexicon: HALOT
  rationale: The Hebrew verb is somewhat unusual and the Greek parallel μετὰ ψαλλούσης
    μὴ ἐνδελέχιζε points to sustained association or lingering company. 'Keep company'
    captures the warning against ongoing involvement better than a bare 'be with.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that you may not
  lexicon: HALOT
  rationale: This introduces a warning of undesirable consequence. 'Lest' is concise
    and natural in wisdom-style English.
- source_word: תִּלָּכֵד
  chosen: you be caught
  alternatives:
  - you be trapped
  - you be ensnared
  lexicon: HALOT
  rationale: The passive verb conveys being captured in a snare. 'Caught' is idiomatic
    and readable; 'ensnared' is possible but more figurative and less natural for
    contemporary readers.
- source_word: בְּלִקְחֹתֶיהָ
  chosen: by her enticements
  alternatives:
  - by what she takes
  - by her gains
  - in her snares
  lexicon: HALOT
  rationale: The Hebrew form is difficult, and the Greek parallel ἐν τοῖς ἐπιχειρήμασιν
    αὐτῆς suggests schemes, attempts, or devices. 'Her enticements' best fits the
    context of seduction and preserves the warning's moral force while acknowledging
    the semantic uncertainty.
