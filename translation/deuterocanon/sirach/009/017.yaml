translation:
  text: Keep far from a man who has power to kill, and do not fear the terrors of
    death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness here reads a substantially different saying: ''Let righteous
      men be your table companions, and let your boasting be in the fear of the Lord.''
      The main text follows the extant Hebrew, which survives for this verse.'
    reason: textual_variant
lexical_decisions:
- source_word: רְחַק
  chosen: Keep far from
  alternatives:
  - Be far from
  - Stay away from
  lexicon: HALOT
  rationale: Imperative from רחק, calling for deliberate distancing. 'Keep far from'
    preserves the force of command while sounding natural in English.
- source_word: מֵאִישׁ
  chosen: from a man
  alternatives:
  - from a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine אישׁ. Per gender-accurate philosophy,
    'man' is retained rather than neutralized, especially since the warning concerns
    a paradigmatic powerful male figure in wisdom instruction.
- source_word: שַׁלִּיט
  chosen: who has power
  alternatives:
  - ruler
  - powerful man
  - one in authority
  lexicon: HALOT
  rationale: שַׁלִּיט denotes one possessing authority or power. In this immediate
    construction, linked with 'to kill,' the emphasis is not office-title alone but
    actual capacity. 'Who has power' best captures the functional sense without overcommitting
    to a formal political office.
- source_word: לַהֲרוֹג
  chosen: to kill
  alternatives:
  - to put to death
  - to slay
  lexicon: HALOT
  rationale: The infinitive plainly denotes killing. 'To kill' is the most direct
    and natural rendering; 'put to death' would suggest a more judicial nuance than
    the Hebrew itself requires.
- source_word: וְאַל תִּפְחַד
  chosen: and do not fear
  alternatives:
  - and do not be afraid of
  lexicon: HALOT
  rationale: Straightforward negative imperative. 'Do not fear' is concise and idiomatic.
- source_word: פַּחֲדֵי מַוֶת
  chosen: the terrors of death
  alternatives:
  - the fears of death
  - deathly terrors
  - the dread of death
  lexicon: HALOT
  rationale: The plural construct literally suggests 'fears/terrors of death.' English
    idiom favors 'the terrors of death,' which preserves the intensity better than
    the flatter 'fears of death.' The Greek parallel in Zone 1 diverges substantially,
    so the Hebrew governs the main rendering here.
