translation:
  text: Turn your eyes away from a graceful woman, and do not gaze at beauty that
    is not yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not sit at all with another man''s wife, and do not
      drink wine with her, lest your soul turn aside to her and by your spirit you
      slip into destruction.'' The Hebrew witness here is shorter and more general.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַעֲלִים עַיִן
  chosen: Turn your eyes away
  alternatives:
  - Hide your eye
  - Look away
  lexicon: HALOT
  rationale: The idiom literally means 'hide the eye' or 'conceal the eye,' but in
    context it functions as an exhortation to avert one's gaze. 'Turn your eyes away'
    preserves the plural English idiom naturally while reflecting the Hebrew sense
    better than a wooden literalism.
- source_word: אֵשֶׁת חֵן
  chosen: a graceful woman
  alternatives:
  - a charming woman
  - a beautiful woman
  lexicon: HALOT
  rationale: The phrase is literally 'a woman of grace/charm.' 'Graceful woman' preserves
    the Hebrew noun חֵן as attractiveness or charm without collapsing it entirely
    into physical beauty, which is then separately named in the next clause.
- source_word: תַּבִּיט
  chosen: gaze
  alternatives:
  - look
  - stare
  lexicon: HALOT
  rationale: The verb for looking here is stronger than a mere glance in this warning
    context. 'Gaze' captures sustained looking and fits the parallel prohibition.
- source_word: יֹפִי
  chosen: beauty
  alternatives:
  - loveliness
  - fairness
  lexicon: HALOT
  rationale: '''Beauty'' is the most direct and natural rendering of the noun, matching
    the warning against visual desire.'
- source_word: לֹא לָךְ
  chosen: that is not yours
  alternatives:
  - not belonging to you
  - not for you
  lexicon: HALOT
  rationale: The Hebrew is concise and possessive. 'That is not yours' is idiomatic
    English and preserves the moral boundary implied by the text. The Greek parallel
    expands the warning toward another man's wife, but the Hebrew wording is broader,
    so the translation follows the Hebrew while allowing the broader ethical force
    to stand.
