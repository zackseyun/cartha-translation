translation:
  text: Do not be jealous of the wife in your bosom, lest you teach against yourself
    an evil lesson.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not envy your wife.' The Hebrew verb can cover both jealousy and
      envy, but the marital context favors 'be jealous.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the wife in your bosom,' an idiom for one's intimate wife.
    reason: cultural_note
  - marker: c
    text: The Hebrew reads simply 'evil,' while the Greek parallel has 'evil instruction/discipline.'
      The translation makes that sense explicit as 'an evil lesson.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תְּקַנֵּא
  chosen: Do not be jealous
  alternatives:
  - Do not envy
  - Do not be suspiciously jealous
  lexicon: HALOT
  rationale: The Hebrew קנא in the piel can denote jealousy/zeal. In the marital context,
    'be jealous' best matches the plain sense and aligns with the Greek ζήλου. 'Envy'
    is possible in English for jealousy generally, but here marital jealousy is more
    natural.
- source_word: אֵשֶׁת חֵיקֶךָ
  chosen: the wife in your bosom
  alternatives:
  - your wife
  - the wife of your embrace
  lexicon: HALOT
  rationale: חיק literally means 'bosom' or 'lap,' an intimate idiom for one's own
    wife. Retaining 'in your bosom' preserves the Hebrew imagery and is supported
    by the Greek τοῦ κόλπου σου. A simpler 'your wife' would lose the metaphorical
    force.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that you do not
  lexicon: HALOT
  rationale: The particle introduces a warning of undesirable result. 'Lest' is concise
    and accurately conveys the cautionary force.
- source_word: תִּלְמַד עָלֶיךָ
  chosen: you teach against yourself
  alternatives:
  - you learn for yourself
  - you bring upon yourself
  lexicon: HALOT
  rationale: The Hebrew as pointed in Kahana reads a causative/teaching sense from
    למד, 'teach,' with עליך 'against/upon yourself.' The Greek parallel μηδὲ δίδαξῃς
    ἐπὶ σεαυτόν strongly supports 'teach' rather than 'learn.' 'Against yourself'
    preserves the adversative sense of על.
- source_word: רָעָה
  chosen: an evil lesson
  alternatives:
  - evil
  - harm
  - wickedness
  lexicon: HALOT
  rationale: The Hebrew has simply 'evil,' while the Greek expands to παιδείαν πονηράν,
    'evil instruction/discipline.' Because the task directs use of the Greek parallel
    as actual input, rendering the object as 'an evil lesson' makes explicit what
    is implied by the Hebrew construction and reflected in the Greek, while remaining
    close to the source warning.
