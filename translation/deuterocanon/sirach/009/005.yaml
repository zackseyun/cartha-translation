translation:
  text: Do not debase yourself by what your eyes see, nor be desolated after her house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not scrutinize a virgin, lest you stumble in the reproaches/penalties
      connected with her.'' The Hebrew and Greek differ substantially in this verse.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'after her house' is difficult and may imply pursuing her household
      or being ruined because of involvement with her domestic sphere.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהִתְנַבֵּל
  chosen: debase yourself
  alternatives:
  - disgrace yourself
  - make yourself vile
  - humiliate yourself
  lexicon: HALOT
  rationale: From נבל in the hitpael/reflexive sense, the Hebrew points to making
    oneself contemptible or degraded. 'Debase yourself' preserves the reflexive force
    and moral warning better than a flatter 'disgrace yourself.'
- source_word: בְּמַרְאֵה עֵינֵיךָ
  chosen: by what your eyes see
  alternatives:
  - at the sight before your eyes
  - through the appearance seen by your eyes
  lexicon: HALOT
  rationale: Literally 'by the sight/appearance of your eyes.' The phrase warns against
    visual enticement. The chosen rendering is idiomatic English while staying close
    to the Hebrew wording.
- source_word: וּלְשׁוֹמֵם
  chosen: be desolated
  alternatives:
  - be appalled
  - be ruined
  - be devastated
  lexicon: HALOT
  rationale: From שמם, which can denote being desolated, appalled, or laid waste.
    In this context the warning likely concerns the ruin or devastation that follows
    illicit pursuit. 'Be desolated' keeps the starkness of the Hebrew, though the
    exact nuance is difficult.
- source_word: אֲחַר בֵּיתָהּ
  chosen: after her house
  alternatives:
  - in pursuit of her household
  - because of her home
  - following her into her house
  lexicon: HALOT
  rationale: The Hebrew is terse and somewhat awkward. Literally 'after her house.'
    The Greek parallel instead reads 'a virgin do not scrutinize, lest you stumble
    in her penalties/reproaches,' showing a substantially different line. Because
    the Hebrew witness is our primary source where extant, the main text stays close
    to it, but the phrase is footnoted as textually uncertain.
