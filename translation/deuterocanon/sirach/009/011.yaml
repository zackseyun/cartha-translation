translation:
  text: Do not dine with her husband, and do not sit drinking with him while drunk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel reads, 'Do not envy the glory of a sinner, for you do
      not know what his downfall will be.' The surviving Hebrew here differs substantially
      from the Greek tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: עִם
  chosen: with
  lexicon: HALOT
  rationale: Basic preposition indicating association; retained straightforwardly
    in both clauses.
- source_word: בַּעְלָהּ
  chosen: her husband
  alternatives:
  - her master
  lexicon: HALOT
  rationale: In this context בעל with 3fs suffix plainly refers to a married woman's
    husband, not a generic owner/master. The warning concerns social interaction with
    a married woman's husband.
- source_word: אַל תִּטְעָם
  chosen: do not dine
  alternatives:
  - do not taste
  - do not eat
  lexicon: HALOT
  rationale: Though the verb literally relates to tasting, in context with עִם plus
    a person it idiomatically refers to sharing food. 'Dine' captures the social meal
    setting better than the overly literal 'taste' and the flatter 'eat'.
- source_word: וְאַל תָּסֵב
  chosen: and do not sit drinking
  alternatives:
  - and do not recline
  - and do not sit
  lexicon: HALOT
  rationale: The verb can denote sitting/reclining at table. Because the following
    שִׁכּוֹר specifies a drinking context, 'sit drinking' makes the meal/drinking
    scene explicit in natural English while preserving the table-setting sense.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Refers back to the husband; retained directly.
- source_word: שִׁכּוֹר
  chosen: while drunk
  alternatives:
  - drunk
  - in drunkenness
  lexicon: HALOT
  rationale: The Hebrew adjective/noun denotes drunkenness or a drunken state. Rendered
    adverbially in English to modify the act of sitting/drinking with him. This preserves
    the warning against convivial drunken association.
