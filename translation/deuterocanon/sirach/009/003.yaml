theological_decisions:
- issue: Sense of 'strange woman' in wisdom context
  chosen_reading: Render as 'strange woman' in the main text, preserving the moral-warning
    category without reducing it to ethnicity alone.
  alternative_readings:
  - foreign woman
  - immoral woman
  - prostitute
  rationale: The Hebrew wording is literal and should be preserved where possible,
    but the Greek parallel indicates the warning concerns illicit sexual entanglement.
    Using 'strange woman' keeps the source metaphor and wisdom-tradition resonance
    while avoiding an ethnically charged reading as the sole sense. Alternatives are
    preserved in a footnote for transparency.
