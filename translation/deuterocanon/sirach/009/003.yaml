translation:
  text: Do not approach a strange woman, lest you fall into her snares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a foreign woman'; in wisdom literature the phrase can denote a woman
      outside proper bounds, and the Greek parallel points toward a sexually improper
      association.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּקְרַב
  chosen: Do not approach
  alternatives:
  - Do not come near
  - Do not draw near
  lexicon: HALOT
  rationale: The Hebrew imperative with negation gives a direct prohibition. 'Approach'
    is natural modern English and preserves the warning against entering proximity
    or involvement. The Greek ὑπάντα likewise supports the sense of going toward or
    associating with.
- source_word: אִשָּׁה זָרָה
  chosen: a strange woman
  alternatives:
  - a foreign woman
  - an immoral woman
  - a prostitute
  lexicon: HALOT
  rationale: The Hebrew literally means 'a strange/foreign woman.' In wisdom literature
    this expression often denotes a woman outside proper covenantal or marital bounds,
    not merely an ethnically foreign woman. The Greek γυναικὶ ἑταιριζομένῃ points
    toward a sexually improper or promiscuous association. 'Strange woman' keeps the
    traditional wisdom-literature category while avoiding over-specification such
    as 'prostitute,' which the Hebrew does not explicitly state. 'Foreign woman' is
    possible but may mislead modern readers toward ethnicity alone.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that you do not
  lexicon: HALOT
  rationale: This particle introduces a warning about undesirable consequence. 'Lest'
    is concise and fits proverbial style, though slightly elevated; it remains clear
    in context.
- source_word: תִּפּוֹל
  chosen: you fall
  alternatives:
  - you be caught
  - you stumble
  lexicon: HALOT
  rationale: The Hebrew verb is literally 'fall.' The Greek ἐμπέσῃς ('fall into')
    confirms that imagery. Retaining 'fall' preserves the metaphor of being ensnared
    rather than flattening it into an interpretive paraphrase.
- source_word: בִּמְצוּדֹתֶיהָ
  chosen: into her snares
  alternatives:
  - into her traps
  - in her nets
  lexicon: HALOT
  rationale: The noun denotes hunting devices such as nets or snares. The Greek παγίδες
    likewise means traps/snares. 'Snares' preserves the metaphorical moral danger
    and reads idiomatically with 'fall into.'
