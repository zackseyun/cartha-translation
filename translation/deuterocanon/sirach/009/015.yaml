translation:
  text: Do not envy a wicked man, for you do not know what his day will be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness reads a different saying here: ''According to your strength,
      consider your neighbors, and take counsel with the wise.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תְּקַנֵּא
  chosen: Do not envy
  alternatives:
  - Do not be jealous of
  - Do not be envious of
  lexicon: HALOT
  rationale: The prohibition with קנא in this stem naturally conveys envy/jealousy
    toward another person. 'Do not envy' is concise, idiomatic English and fits wisdom-style
    admonition.
- source_word: בְּאִישׁ רָשָׁע
  chosen: a wicked man
  alternatives:
  - an evil man
  - a guilty man
  lexicon: HALOT
  rationale: איש is singular 'man,' and the doctrine prefers gender-accurate rendering
    where the source is masculine. רשע is well rendered 'wicked' in wisdom contexts,
    denoting moral corruption rather than merely criminal guilt.
- source_word: כִּי לֹא תֵּדֵע
  chosen: for you do not know
  alternatives:
  - because you do not know
  lexicon: HALOT
  rationale: כִּי here gives the reason for the prohibition. 'For' preserves the proverbial,
    formal-wisdom tone while remaining natural in modern English.
- source_word: מַה יּוֹמוֹ
  chosen: what his day will bring
  alternatives:
  - what his day is
  - what his end will be
  - what awaits him in his day
  lexicon: HALOT
  rationale: The Hebrew literally reads 'what his day [is/will be],' which is terse
    and somewhat idiomatic. Given the Greek parallel's substantially different wording,
    the Hebrew likely points to the uncertain outcome awaiting the wicked. 'What his
    day will bring' preserves the metaphor of 'day' while making the sense intelligible
    in English without over-specifying 'end.'
