translation:
  text: New wine, a new friend; when it grows old, you may drink it with pleasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text of this verse is proverb-like but textually difficult in
      its final clause. The Greek parallel supplied here reflects a substantially
      different reading ('Know that you walk in the midst of snares...'), so this
      translation follows the surviving Hebrew witness rather than the divergent Greek
      form.
    reason: textual_variant
  - marker: b
    text: Or, more literally, 'New wine, a new friend; and when old, afterward perhaps
      you will drink it.' The sense is that a friendship, like wine, is best enjoyed
      once it has matured.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַיִן חָדָשׁ
  chosen: new wine
  alternatives:
  - fresh wine
  lexicon: HALOT
  rationale: 'The Hebrew phrase is straightforward: יַיִן means ''wine'' and חָדָשׁ
    means ''new.'' ''New wine'' is the natural English equivalent and preserves the
    proverb''s parallelism with ''new friend.'''
- source_word: אוֹהֵב חָדָשׁ
  chosen: a new friend
  alternatives:
  - love a new friend
  - a friend is new
  lexicon: HALOT
  rationale: The Hebrew as transmitted is elliptical and somewhat awkward in isolation.
    In context and in light of the proverb structure, the sense is that a new friend
    corresponds to new wine. Rendering it nominally as 'a new friend' preserves the
    terse parallel while producing intelligible English. The Greek parallel for this
    verse in the prompt is clearly from a different textual form, so the Hebrew witness
    governs despite source-level mismatch.
- source_word: וְיָשָׁן
  chosen: when it grows old
  alternatives:
  - and when it is old
  - but old
  lexicon: HALOT
  rationale: יָשָׁן means 'old.' Because the proverb compares maturation over time,
    'when it grows old' makes the temporal force explicit in idiomatic English while
    staying close to the Hebrew sense.
- source_word: אַחַר אוּלַי
  chosen: you may
  alternatives:
  - afterward perhaps
  - then perhaps
  lexicon: HALOT
  rationale: 'The phrase is textually difficult. Taken together, it conveys a tentative
    future sense: ''afterward/perhaps.'' English ''you may'' captures the permissive-probabilistic
    nuance without overtranslating a corrupt or uncertain phrase. This is one of the
    places where the Hebrew wording appears unstable.'
- source_word: תִּשְׁתֶּינוּ
  chosen: drink it with pleasure
  alternatives:
  - drink it
  - drink us/him
  lexicon: HALOT
  rationale: The form likely reflects a difficult or defective transmission. The broader
    sense in this well-known proverb is that aged wine is enjoyed. 'Drink it with
    pleasure' brings out the idiomatic force suggested by the context, though the
    underlying pronominal ending is not fully secure in the surviving Hebrew.
