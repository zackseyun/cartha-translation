translation:
  text: Lest your heart turn aside to her, and in blood you be brought down to the
    Pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has 'to her' (feminine singular); the sense may depend on the preceding
      context. The Greek parallel instead refers to 'the ungodly,' which supports
      the more general 'to them' here.
    reason: alternative_reading
  - marker: b
    text: Or 'through bloodshed' or 'with bloodguilt'; Hebrew 'in bloods' often carries
      the sense of violent bloodshed or bloodguilt.
    reason: lexical_alternative
  - marker: c
    text: '''The Pit'' may also be rendered ''the grave'' or ''destruction.'' The
      Greek parallel has ''Hades,'' pointing to death/the underworld as the outcome
      in view.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: Lest
  alternatives:
  - so that not
  - otherwise
  lexicon: HALOT
  rationale: Introduces a warning of undesirable consequence. 'Lest' preserves the
    admonitory force concisely in elevated but still readable English.
- source_word: תַּטֶּה
  chosen: turn aside
  alternatives:
  - incline
  - turn
  - be swayed
  lexicon: HALOT
  rationale: From נטה, here of the heart's inclination. 'Turn aside' captures moral
    deviation better than the more neutral 'incline' and fits the warning context.
- source_word: אֵלֶיהָ
  chosen: to them
  alternatives:
  - to her
  - toward it
  lexicon: HALOT
  rationale: The Hebrew form is feminine singular ('to her'), but the immediate antecedent
    is not present in this isolated verse and the Greek parallel speaks of the ungodly
    in the plural. Given the source-validation note of minor mismatch and the parallel
    Greek, 'to them' best represents the likely sense while acknowledging a textual/antecedent
    difficulty.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: Standard Hebrew anthropological term for the inner will and desire. 'Heart'
    is the most natural and faithful rendering.
- source_word: וּבְדָמִים
  chosen: in blood
  alternatives:
  - through bloodshed
  - with bloodguilt
  lexicon: HALOT
  rationale: The plural דמים often denotes bloodshed or bloodguilt. Because the syntax
    is compressed and somewhat difficult, 'in blood' keeps the Hebrew image close
    while allowing the English to convey violent consequence. The more interpretive
    alternatives are preserved in a footnote.
- source_word: תִּטֶּה
  chosen: be brought down
  alternatives:
  - turn aside
  - be inclined
  - be cast
  lexicon: HALOT
  rationale: The same verb נטה appears again, but a strictly identical gloss ('turn
    aside') before 'to the Pit' is awkward in English. In context with 'to the Pit,'
    the sense is movement downward toward ruin; 'be brought down' expresses the likely
    resultative force without overparaphrasing.
- source_word: אֶל שָׁחַת
  chosen: to the Pit
  alternatives:
  - to the grave
  - to destruction
  - to the pit
  lexicon: HALOT
  rationale: שחת can denote a pit, grave, or destruction. Capitalizing 'Pit' signals
    a realm of ruin/death rather than a mere hole, and aligns with the Greek parallel's
    reference to Hades, while remaining a translation rather than an interpretation.
