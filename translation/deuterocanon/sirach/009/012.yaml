theological_decisions:
- issue: Use of the Greek parallel where the Hebrew wording is syntactically difficult
    and may reflect a minor mismatch
  chosen_reading: Translate primarily from the Hebrew warning about the heart turning
    and descent to the Pit, while allowing the Greek parallel to inform the plural
    reference and death/underworld nuance.
  alternative_readings:
  - 'A more literal rendering of the Hebrew feminine singular: ''Lest your heart turn
    aside to her, and in blood turn to the pit.'''
  - A Greek-led rendering emphasizing approval of the ungodly and lack of vindication
    until Hades.
  rationale: The project philosophy gives primacy to the surviving Hebrew of Sirach
    where available, but the prompt explicitly requires using the Greek parallel as
    actual translation input. Here the Hebrew is terse and the antecedent of 'to her'
    is unclear in isolation, while the Greek points to association with the ungodly
    and an underworld outcome. The main text therefore stays anchored in the Hebrew
    while using the Greek to clarify the likely collective sense and the deathly force
    of שחת.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    parallel Greek as input alongside Hebrew.'
