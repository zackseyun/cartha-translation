translation:
  text: Do not gaze at a virgin, lest you be caught in the penalties concerning her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek reads: ''Do not look around in the streets of a city, and do not
      wander in its deserted places.'' The surviving Hebrew and Greek witnesses differ
      substantially here.'
    reason: alternative_reading
  - marker: b
    text: Or 'lest you be caught in the penalties connected with her.' The Hebrew
      phrase is compressed and may refer to the consequences attached to involvement
      with her.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּבְתוּלָה
  chosen: at a virgin
  alternatives:
  - upon a virgin
  - at a maiden
  - among maidens
  lexicon: HALOT
  rationale: The Hebrew noun בְּתוּלָה ordinarily denotes a virgin/young unmarried
    woman. 'Virgin' preserves the lexical specificity better than the broader 'maiden.'
    The preposition with the following verb is rendered idiomatically in English as
    'gaze at.'
- source_word: אַל תִּתְבּוֹנֵן
  chosen: Do not gaze
  alternatives:
  - do not look intently
  - do not contemplate
  - do not fix your attention
  lexicon: HALOT
  rationale: The hitbonen form conveys attentive or lingering looking, not a mere
    glance. 'Gaze' captures the warning against sustained visual attention in a concise,
    natural way.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: The particle introduces a warning of possible consequence. 'Lest' is
    concise and preserves the admonitory force.
- source_word: תִּוָּקֵש
  chosen: you be ensnared
  alternatives:
  - you be trapped
  - you be caught
  - you be sought out
  lexicon: HALOT
  rationale: Given the context of moral warning and the following phrase about punishment/penalties,
    the passive is best understood as being caught up or trapped in consequences,
    not simply 'sought.' 'Ensnared' fits the wisdom context and the likely semantic
    force.
- source_word: בַּעֲנָשֶׁיהָ
  chosen: by the penalties concerning her
  alternatives:
  - in her punishments
  - with her penalties
  - through the punishment attached to her
  lexicon: HALOT
  rationale: 'The noun עֹנֶשׁ refers to punishment or penalty. The suffix is feminine
    singular (''her''). Because the exact relation is compressed in Hebrew, ''the
    penalties concerning her'' preserves the ambiguity: penalties connected with involvement
    with her, rather than implying she herself is punished alone.'
- source_word: μὴ περιβλέπου ἐν ῥύμαις πόλεως, καὶ ἐν ταῖς ἐρήμοις αὐτῆς μὴ πλανῶ
  chosen: used as a control against overreading the Hebrew
  alternatives:
  - do not look around in the streets of a city, and do not wander in its deserted
    places
  lexicon: BDAG
  rationale: The Greek parallel diverges substantially from the extant Hebrew, warning
    against roaming city streets rather than gazing at a virgin. Because the project
    prioritizes the surviving Hebrew for Sirach where available, the Greek is consulted
    as a parallel input and signals textual instability, but it does not control the
    main translation here.
