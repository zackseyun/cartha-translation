theological_decisions:
- issue: Divergence between Hebrew and Greek witnesses
  chosen_reading: Translate the extant Hebrew as primary, while allowing the Greek
    to inform interpretation of the social-moral warning.
  alternative_readings:
  - Do not give your soul to prostitutes, lest you lose your inheritance.
  rationale: Per project philosophy for Sirach, the surviving Hebrew is primary where
    extant. Here the Hebrew warns against association with musical/entertaining women
    and being 'burned by their mouths,' while the Greek presents a more explicit moralizing
    equivalent about prostitutes and loss of inheritance. The main text follows the
    Hebrew wording; the Greek alternative is preserved in a footnote because it materially
    affects interpretation.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    use Greek parallel as actual input'
