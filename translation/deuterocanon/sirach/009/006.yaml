translation:
  text: Do not consort with singing women, lest you be burned by their mouths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Do not give your soul to prostitutes, lest you lose your inheritance.''
      The Greek makes the sexual-moral warning explicit where the Hebrew speaks of
      ''singing women'' and being burned ''by their mouths.'''
    reason: alternative_reading
lexical_decisions:
- source_word: עִם
  chosen: with
  alternatives:
  - among
  - in company with
  lexicon: HALOT
  rationale: Standard preposition marking association; in English the idiom is better
    carried by 'consort with' in combination with the verb.
- source_word: מְנַגְּנוֹת
  chosen: singing women
  alternatives:
  - female musicians
  - women performers
  lexicon: HALOT
  rationale: From the root נגן, referring to women engaged in musical performance.
    'Singing women' is idiomatic and preserves the feminine plural. 'Female musicians'
    is possible, but the Greek parallel's πόρναις suggests the warning concerns sexually
    enticing entertainers rather than music in the abstract; 'singing women' keeps
    the Hebrew image while allowing that social connotation.
- source_word: אַל
  chosen: do not
  alternatives:
  - you shall not
  lexicon: HALOT
  rationale: Regular negative particle for prohibition.
- source_word: תִּדְמוֹךְ
  chosen: consort
  alternatives:
  - press close
  - associate closely
  - lean on
  lexicon: HALOT
  rationale: The verb is somewhat rare/uncertain in this form, but in context it warns
    against close involvement or intimate association. 'Consort' captures social and
    potentially sexual association without overtranslating. The Greek parallel supports
    a warning against giving oneself over to immoral women.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: Standard marker of negative consequence.
- source_word: יִשְׂרְפֻךָ
  chosen: you be burned
  alternatives:
  - they burn you
  - you be consumed
  lexicon: HALOT
  rationale: Literal burning metaphor retained. The feminine plural subject implied
    by the previous noun fits the warning imagery. The metaphor likely refers to ruin
    through seductive speech or involvement.
- source_word: בְּפִיפִיֹתָם
  chosen: by their mouths
  alternatives:
  - by their speech
  - by their lips
  lexicon: HALOT
  rationale: 'Literally related to ''mouths''; the unusual plural/intensive form likely
    points to speech or seductive words. ''By their mouths'' preserves the concrete
    Hebrew image, though the sense is instrumental: ruin through what they say or
    sing.'
