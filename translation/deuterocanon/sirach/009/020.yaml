translation:
  text: By your strength acquire your friend, and associate yourself with the wise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to your ability, gain a friend.' The Hebrew can denote strength
      in the sense of capacity or means.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb here is uncommon in this form; the Greek parallel reads
      more specifically, 'take counsel with the wise.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכֹחֲךָ
  chosen: by your strength
  alternatives:
  - according to your ability
  - with your means
  lexicon: HALOT
  rationale: The Hebrew literally refers to one's strength or capacity. The Greek
    parallel κατὰ τὴν ἰσχύν σου supports the sense of acting in proportion to one's
    ability. 'By your strength' preserves the Hebrew image while remaining intelligible;
    the broader sense of means/ability is noted in alternatives.
- source_word: קְנֵה
  chosen: acquire
  alternatives:
  - gain
  - win
  lexicon: HALOT
  rationale: The verb commonly means 'acquire' or 'buy.' In context it refers to securing
    or gaining a friend, not commercial purchase. 'Acquire' keeps the formal link
    to the Hebrew while allowing the relational sense; 'win' is possible but more
    interpretive.
- source_word: רֵעֶךָ
  chosen: your friend
  alternatives:
  - your companion
  - your neighbor
  lexicon: HALOT
  rationale: The noun can mean friend, companion, or neighbor. Given the immediate
    relational context and the Greek τοὺς πλησίον as a broader relational parallel,
    'your friend' best fits the Hebrew line as preserved.
- source_word: וְעִם חֲכָמִים
  chosen: with the wise
  alternatives:
  - with wise men
  - with sages
  lexicon: HALOT
  rationale: The masculine plural is rendered representationally as 'the wise' rather
    than 'wise men' for natural English, while still reflecting a class of wise persons.
    This avoids unnecessary narrowing while preserving the source sense.
- source_word: תִּסְתַּיָּד
  chosen: associate yourself
  alternatives:
  - equip yourself
  - keep company
  - take counsel
  lexicon: HALOT
  rationale: The Hebrew form is somewhat uncommon and context-sensitive. The Greek
    parallel μετὰ σοφῶν συμβούλευον points toward keeping company with / taking counsel
    with the wise. 'Associate yourself' captures the relational force without overcommitting
    to the narrower 'take counsel,' while acknowledging the Greek's interpretive help.
