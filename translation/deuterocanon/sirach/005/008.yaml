theological_decisions:
- issue: Relation of this clause to the Greek parallel, which reads a substantially
    different warning about unjust wealth and the day of visitation
  chosen_reading: Translate the extant Hebrew directly as the main text, while preserving
    the Greek as a textual-variant footnote
  alternative_readings:
  - 'Greek: ''Do not rely on unrighteous riches, for they will profit you nothing
    in the day of calamity/visitation.'''
  rationale: For Sirach, where Hebrew survives, project policy gives primacy to the
    Hebrew witness. Here the Greek parallel is not a close verbal equivalent but a
    different line, so it materially affects the verse. The Hebrew is therefore translated
    as the main text, and the Greek is preserved in a footnote as a significant textual
    variant.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input while keeping Hebrew primacy'
