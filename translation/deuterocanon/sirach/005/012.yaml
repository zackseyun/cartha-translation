theological_decisions:
- issue: Whether עֶבְרָה should be rendered generically as anger or with stronger
    judicial/theological force as wrath
  chosen_reading: wrath
  alternative_readings:
  - anger
  - fury
  - judgment
  rationale: In wisdom literature, 'the day of wrath' naturally carries a judicial
    sense and aligns with the warning that wealth cannot save in a time of reckoning.
    The Hebrew itself says 'wrath,' not explicitly 'God's wrath,' so the translation
    preserves the stronger term without importing an explicit subject.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Use of the Hebrew witness versus the divergent Greek parallel
  chosen_reading: Translate the Hebrew as primary for this verse
  alternative_readings:
  - 'Greek parallel: ''If you have understanding, answer your neighbor; but if not,
    let your hand be upon your mouth.'''
  rationale: Per project philosophy for Sirach, the surviving Hebrew is primary where
    available. The Greek parallel for this verse is substantially different and likely
    reflects a different textual form; it should inform awareness of textual complexity
    but not override the extant Hebrew witness.
  doctrine_reference: Original-language primacy over translation tradition; for Sirach,
    translate from Hebrew where it survives and from Greek where it does not.
