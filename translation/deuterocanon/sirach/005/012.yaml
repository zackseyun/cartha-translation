id: SIR.5.12
reference: Sirach 5:12
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תִּבְטַח עַל נִכְסֵי שֶׁקֶר, כִּי לֹא יוֹעִילוּ בְּיוֹם עֶבְרָה.
  language: Hebrew
  pages:
  - 671
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: εἰ ἔστιν σοι σύνεσις, ἀποκρίθητι τῷ πλησίον· εἰ δὲ μή, ἡ χείρ σου ἔστω ἐπὶ
