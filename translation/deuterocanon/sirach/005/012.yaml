    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 5:12
translation:
  text: Do not trust in deceitful wealth, for it will not profit in the day of wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel tradition for this verse reads instead: ''If you have
      understanding, answer your neighbor; but if not, let your hand be upon your
      mouth.'' The Hebrew witness here is substantially different, and this translation
      follows the extant Hebrew as primary.'
    reason: textual_variant
  - marker: b
    text: Or 'false wealth,' 'fraudulent riches,' or 'wealth of falsehood.' The Hebrew
      can describe wealth marked by deception, whether because it is dishonestly gained
      or because it proves unreliable.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - You must not
  lexicon: HALOT
  rationale: Standard negative imperative in Hebrew wisdom instruction; simple prohibition
    fits the tone without over-intensifying.
- source_word: תִּבְטַח
  chosen: trust
  alternatives:
  - rely
  - put confidence
  lexicon: HALOT
  rationale: The verb denotes placing confidence in something. 'Trust' is the most
    direct and idiomatic English equivalent in a wisdom admonition.
- source_word: עַל
  chosen: in
  alternatives:
  - 'on'
  - upon
  lexicon: HALOT
  rationale: Although literally 'on/upon,' English idiom with 'trust' normally takes
    'in.' This is a documented shift for readable modern English.
- source_word: נִכְסֵי
  chosen: wealth
  alternatives:
  - possessions
  - property
  - riches
  lexicon: HALOT
  rationale: The noun refers to assets or property. 'Wealth' best captures the collective
    sense in natural English and suits the warning context.
- source_word: שֶׁקֶר
  chosen: deceitful
  alternatives:
  - 'false'
  - fraudulent
  - vain
  lexicon: HALOT
  rationale: The Hebrew denotes falsehood/deception. 'Deceitful wealth' conveys wealth
    characterized by falsehood, whether unreliable or dishonestly gained, without
    narrowing the sense too much.
- source_word: לֹא יוֹעִילוּ
  chosen: will not profit
  alternatives:
  - will not help
  - will be of no use
  - will not benefit
  lexicon: HALOT
  rationale: The verb means to be of benefit or avail. 'Will not profit' preserves
    the economic resonance of the context while remaining idiomatic.
- source_word: בְּיוֹם
  chosen: in the day of
  alternatives:
  - on the day of
  - when
  lexicon: HALOT
  rationale: A fairly formal temporal phrase is appropriate here and preserves the
    proverbial cadence.
- source_word: עֶבְרָה
  chosen: wrath
  alternatives:
  - fury
  - overflowing anger
  - judgment
  lexicon: HALOT
  rationale: The noun commonly denotes wrath or fury. 'Wrath' preserves the moral
    and possibly divine-judicial force better than the more generic 'anger.'
