theological_decisions:
- issue: Relation between divine forgiveness and continued wrongdoing
  chosen_reading: The verse warns against presuming upon forgiveness as a basis for
    continuing in sin.
  alternative_readings:
  - The verse could be read more weakly as a general caution not to be overconfident
    about pardon.
  rationale: The Hebrew syntax links reliance on forgiveness with the adding of one
    sin to another. The Greek parallel expands the warning into delaying repentance
    until judgment comes, which supports the interpretation of presumptuous moral
    delay rather than a denial of forgiveness itself.
  doctrine_reference: Translation philosophy §1, §3
