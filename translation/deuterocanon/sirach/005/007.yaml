  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ ἀνάμενε ἐπιστρέψαι πρὸς Κύριον, καὶ μὴ ὑπερβάλλου ἡμέραν ἐξ ἡμέρας· ἐξάπινα
      γὰρ ἐξελεύσεται ὀργὴ Κυρίου, καὶ ἐν καιρῷ ἐκδικήσεως ἐξολῇ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 5:7
translation:
  text: Do not rely on forgiveness to add sin to sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not delay turning to the Lord, and do not put it off
      from day to day; for suddenly the Lord’s wrath will come forth, and at the time
      of punishment you will perish.'' The Hebrew surviving here is shorter and focuses
      specifically on presuming upon forgiveness while continuing in sin.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֶל
  chosen: on / for
  alternatives:
  - toward
  - concerning
  lexicon: HALOT
  rationale: With בָּטַח the preposition marks the object of reliance. In English,
    'rely on' best conveys the idiom naturally.
- source_word: סְלִיחָה
  chosen: forgiveness
  alternatives:
  - pardon
  lexicon: HALOT
  rationale: The noun denotes pardon/remission of guilt. 'Forgiveness' is the clearest
    modern English equivalent and fits wisdom exhortation style.
- source_word: אַל תִּבְטָח
  chosen: Do not rely
  alternatives:
  - do not trust
  - do not be confident
  lexicon: HALOT
  rationale: The Hebrew verb בטח means to trust/rely on. 'Do not rely' fits the warning
    against presumptuous confidence in pardon better than the more general 'trust.'
- source_word: לְהוֹסִיף
  chosen: so as to add
  alternatives:
  - to continue adding
  - to increase
  lexicon: HALOT
  rationale: 'The infinitive expresses result or purpose: relying on forgiveness in
    a way that leads one to keep piling up wrongdoing. ''So as to add'' preserves
    that linkage.'
- source_word: עָוֹן
  chosen: sin
  alternatives:
  - iniquity
  - guilt
  lexicon: HALOT
  rationale: Although עָוֹן can denote guilt or iniquity, in this collocation 'add
    sin to sin' is the most idiomatic and contextually clear rendering in English.
    'Iniquity' would sound archaic here, and 'guilt' would shift the sense from act
    to consequence.
- source_word: עַל עָוֹן
  chosen: to sin
  alternatives:
  - upon sin
  - to iniquity
  lexicon: HALOT
  rationale: The repeated noun with עַל is a Hebrew intensifying construction meaning
    to pile one offense on another. English idiom is best captured by 'sin to sin'
    rather than a wooden 'iniquity upon iniquity.'
