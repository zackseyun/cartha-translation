theological_decisions:
- issue: Referent of the pronominal suffixes ('with him,' 'his wrath')
  chosen_reading: God is the implied referent.
  rationale: 'In context the verse grounds an exhortation about repentance by appealing
    to God''s character: both mercy and anger belong to him, and his wrath settles
    on the wicked. No explicit divine name appears in the Hebrew line, but the context
    makes the referent clear.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; here the context sufficiently resolves the referent without importing extra
    claims.'
- issue: Use of Hebrew witness with Greek parallel that differs substantially
  chosen_reading: Translate the surviving Hebrew as primary, while preserving the
    Greek line as an alternative textual tradition in a footnote.
  alternative_readings:
  - 'Greek: ''Do not winnow with every wind, and do not walk in every path; so is
    the double-tongued sinner.'''
  rationale: Project policy gives original-language primacy to the Hebrew where Sirach
    survives in Hebrew. However, the Greek parallel for this verse is substantially
    different and likely reflects a divergent textual tradition or displacement. Because
    the difference materially affects interpretation, it should be preserved in a
    footnote rather than ignored.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    parallel Greek as actual input and preserve significant alternatives.'
