id: SIR.5.9
reference: Sirach 5:9
source:
  edition: sefaria-ben-sira-kahana
  text: כִּי רַחֲמִים וְאַף עִמּוֹ, וְאֵל רְשָעִים יָנוּחַ רָגְזוֹ.
  language: Hebrew
  pages:
  - 670
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ λίκμα ἐν παντὶ ἀνέμῳ, καὶ μὴ πορεύου ἐν πάσῃ ἀτραπῷ· οὕτως ὁ ἁμαρτωλὸς
      ὁ δίγλωσσος.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 5:9
translation:
  text: For mercy and anger are with him, and his wrath comes to rest on the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek tradition reads instead: ''Do not winnow with every wind, and do
      not walk in every path; so is the double-tongued sinner.'' This differs substantially
      from the extant Hebrew and likely reflects a different textual form of the verse.'
    reason: textual_variant
lexical_decisions:
- source_word: רַחֲמִים
  chosen: mercy
  alternatives:
  - compassion
  - mercies
  lexicon: HALOT
  rationale: The plural abstract noun commonly denotes compassionate mercy. 'Mercy'
    is the most natural singular abstract rendering in English and fits the balanced
    pair with 'anger.'
- source_word: אַף
  chosen: anger
  alternatives:
  - wrath
  - nose
  lexicon: HALOT
  rationale: Though literally 'nose,' in Hebrew idiom it regularly means anger. 'Anger'
    avoids overloading the verse with two instances of 'wrath,' since רָגְזוֹ later
    supplies the stronger term.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - belong to him
  - are his
  lexicon: HALOT
  rationale: The preposition is straightforwardly rendered 'with him.' In context
    it expresses that both mercy and anger reside with God.
- source_word: אֵל
  chosen: 'on'
  alternatives:
  - toward
  - against
  - unto
  lexicon: HALOT
  rationale: Here the preposition marks the object/target of the resting wrath. 'On'
    is idiomatic in English for wrath coming to rest upon someone.
- source_word: רְשָעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: The plural substantive is well represented by 'the wicked,' a concise
    and natural English collective.
- source_word: יָנוּחַ
  chosen: comes to rest
  alternatives:
  - rests
  - settles
  - abides
  lexicon: HALOT
  rationale: The verb נוח means to rest or settle. 'Comes to rest' preserves the verbal
    movement and fits the future/imperfect sense better than a static present.
- source_word: רָגְזוֹ
  chosen: his wrath
  alternatives:
  - his anger
  - his rage
  lexicon: HALOT
  rationale: This noun denotes agitation/anger. 'His wrath' gives the second colon
    a stronger judicial force and differentiates it from אַף in the first colon.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: The conjunction introduces the reason for the preceding admonition in
    context, so 'For' is the best discourse-level rendering.
