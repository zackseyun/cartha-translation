theological_decisions:
- issue: Anthropological idiom of 'heart and eyes'
  chosen_reading: Retain the concrete Hebrew imagery in the main text
  alternative_readings:
  - Do not follow your own desires
  - Do not be led by your passions
  rationale: The verse warns against self-directed desire using standard Hebrew idiom.
    Preserving 'heart and eyes' maintains the text's theological anthropology and
    intertextual resonance rather than reducing it to a generalized moral paraphrase.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Rendering חֲמוּדוֹת רָעָה
  chosen_reading: evil desires
  alternative_readings:
  - evil delights
  - wicked cravings
  - coveted evil things
  rationale: The phrase is somewhat compressed in Hebrew. 'Evil desires' best communicates
    the moral thrust in readable English while staying close to the source. The alternative
    'coveted things' is possible lexically, but the verbal context of following one's
    heart and eyes favors inward desire.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5, 6
