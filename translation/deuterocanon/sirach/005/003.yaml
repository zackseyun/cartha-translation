translation:
  text: Do not go after your heart and your eyes, to walk in evil desires.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not follow your heart and your eyes, to walk in wicked cravings.'
      The Hebrew phrase 'heart and eyes' is a concrete idiom for inward desire and
      outward attraction.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel for this verse differs substantially: ''And do not say,
      “Who will overpower me?” for the Lord will surely take vengeance on you.'' The
      Hebrew witness is therefore followed here as the primary text, with the Greek
      kept in view as a divergent parallel tradition.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תֵּלֵךְ
  chosen: Do not go
  alternatives:
  - Do not walk
  - Do not follow
  lexicon: HALOT
  rationale: הלך literally means 'go/walk.' 'Go after' preserves the idiom with אַחֲרֵי
    and reads naturally in English without over-paraphrasing.
- source_word: אַחֲרֵי לִבְּךָ וְעֵינֵיךָ
  chosen: after your heart and your eyes
  alternatives:
  - according to your heart and your eyes
  - after your mind and your eyes
  lexicon: HALOT
  rationale: The Hebrew names the inner desire ('heart') and outward attraction ('eyes').
    Keeping both terms preserves the concrete anthropology and echoes biblical idiom
    rather than collapsing them into a single abstract phrase.
- source_word: לָלֶכֶת
  chosen: to walk
  alternatives:
  - so as to go
  - into walking
  lexicon: HALOT
  rationale: The infinitive of הלך is retained as 'to walk,' preserving the verbal
    linkage with the opening prohibition while remaining intelligible in English.
- source_word: בַּחֲמוּדוֹת
  chosen: in desires
  alternatives:
  - in delights
  - in lusts
  - in coveted things
  lexicon: HALOT
  rationale: From חמד, the noun can denote desirable or coveted things. In this context,
    with 'evil' qualifying it and with the Greek parallel warning against presumptuous
    self-will in the surrounding context, 'desires' best captures the moral sense
    without sounding overly archaic.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: HALOT
  rationale: רעה here morally qualifies the desires. 'Evil' is the most direct and
    weighty rendering.
