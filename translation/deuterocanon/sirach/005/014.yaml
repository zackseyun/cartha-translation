theological_decisions:
- issue: Relation of the Hebrew line to the Greek parallel, which reflects a different
    form of the verse emphasizing slander and double speech
  chosen_reading: Translate the extant Hebrew directly as an exhortation to settled
    understanding and single speech, while preserving the Greek's anti-double-tongued
    nuance in a footnote.
  alternative_readings:
  - Greek-based rendering such as 'Do not be called a whisperer, and do not lie in
    wait with your tongue ... condemnation is upon the double-tongued.'
  rationale: For Sirach, where Hebrew survives, project policy gives primacy to the
    Hebrew witness. However, the Greek parallel is substantially different and likely
    reflects either a divergent Vorlage or a freer development. The Hebrew's 'let
    your word be one' overlaps conceptually with the Greek's warning against duplicity,
    so the main text follows Hebrew and the footnote preserves the Greek-side nuance
    honestly.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    use Greek parallel as actual input without displacing Hebrew primacy.'
