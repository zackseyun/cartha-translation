id: SIR.5.14
reference: Sirach 5:14
source:
  edition: sefaria-ben-sira-kahana
  text: הֱיֶה סָמוּךְ עַל דַּעְתֶּךָ, וְאֶחָד יְהִי דְבָרֶךָ.
  language: Hebrew
