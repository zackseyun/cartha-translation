  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ κληθῇς ψίθυρος, καὶ τῇ γλώσσῃ σου μὴ ἐνεδρευθῇς· ἐπὶ γὰρ τῷ κλέπτῃ ἐστὶν
      αἰσχύνη, καὶ κατάγνωσις πονηρὰ ἐπὶ διγλώσσου.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 5:14
translation:
  text: Be firm in your understanding, and let your word be one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not be called a whisperer ... condemnation is upon
      the double-tongued.'' This supports the sense that ''let your word be one''
      warns against divided or duplicitous speech.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֱיֶה
  chosen: Be
  alternatives:
  - Become
  lexicon: HALOT
  rationale: Imperative of היה; straightforward exhortation. 'Be' fits the gnomic
    instruction better than the more process-oriented 'become'.
- source_word: סָמוּךְ
  chosen: firm
  alternatives:
  - steadfast
  - supported
  - reliable
  lexicon: HALOT
  rationale: The passive/adj. sense from סמך suggests being supported, established,
    or steady. In English idiom with 'on your understanding,' 'be firm' best conveys
    settled stability without awkward literalism. 'Supported' would be too wooden;
    'steadfast' is possible but slightly more elevated.
- source_word: עַל דַּעְתֶּךָ
  chosen: in your understanding
  alternatives:
  - in your knowledge
  - in your judgment
  - upon your mind
  lexicon: HALOT
  rationale: דעת can denote knowledge, understanding, or discernment. Here the wisdom
    context favors an internal, considered grasp rather than mere information. English
    idiom prefers 'firm in your understanding' over the more literal 'firm upon your
    understanding.'
- source_word: וְאֶחָד
  chosen: one
  alternatives:
  - single
  - consistent
  - undivided
  lexicon: HALOT
  rationale: The Hebrew literally says 'one.' Because the following noun is singular
    ('your word'), the sense is that one's speech should be single/consistent rather
    than double. Retaining 'one' preserves the compact Hebrew expression while allowing
    the reader to hear the ethical force.
- source_word: יְהִי
  chosen: let ... be
  alternatives:
  - may ... be
  lexicon: HALOT
  rationale: Jussive of היה; 'let your word be' is the natural English equivalent
    for an exhortation.
- source_word: דְבָרֶךָ
  chosen: your word
  alternatives:
  - your speech
  - what you say
  lexicon: HALOT
  rationale: דבר can mean word, speech, or matter. 'Your word' preserves the singular
    and pairs well with 'one,' while still naturally implying speech/conversation
    in wisdom instruction.
