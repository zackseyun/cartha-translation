id: SIR.5.2
reference: Sirach 5:2
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תִּשָּׁעֵן עַל כֹּחֶךָ, לָלֶכֶת אַחַר תַּאֲוַת נַפְשֶׁךָ.
  language: Hebrew
  pages:
  - 670
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ ἐξακολούθει τῇ ψυχῇ σου καὶ τῇ ἰσχύι σου, πορεύεσθαι ἐν ἐπιθυμίαις καρδίας
      σου·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 5:2
translation:
  text: Do not rely on your own strength to walk after the desire of your soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not follow yourself and your strength, to walk in the desires of
      your heart,' reflecting the Greek parallel more closely; the Hebrew reads 'Do
      not rely on your strength, to walk after the desires of your soul.'
    reason: alternative_reading
  - marker: b
    text: '''Your soul'' can also mean ''yourself'' or ''your life'' in Hebrew usage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּשָּׁעֵן
  chosen: Do not rely
  alternatives:
  - Do not lean on
  - Do not depend on
  lexicon: HALOT
  rationale: The Hebrew verb from שׁען literally means 'lean on' or 'rely on.' In
    English, 'rely on' best conveys the metaphor's sense without sounding wooden,
    while preserving the warning against self-dependence.
- source_word: כֹּחֶךָ
  chosen: your own strength
  alternatives:
  - your strength
  - your power
  lexicon: HALOT
  rationale: 'כֹּחַ commonly means strength or power. ''Strength'' fits the moral
    exhortation well, and ''your own'' makes explicit the reflexive force implied
    by the possessive in context: the warning is against trusting one''s personal
    capacity.'
- source_word: לָלֶכֶת
  chosen: to walk
  alternatives:
  - to go
  - so as to walk
  lexicon: HALOT
  rationale: The infinitive 'to walk' is retained rather than flattened to 'go' because
    biblical Hebrew often uses 'walk' for conduct or manner of life. Here it introduces
    the result or purpose of relying on one's own strength.
- source_word: אַחַר
  chosen: after
  alternatives:
  - following
  - according to
  lexicon: HALOT
  rationale: The preposition literally means 'after.' Retaining 'after' preserves
    the idiom 'walk after,' a recognizable biblical expression for following desires,
    while remaining understandable in modern English.
- source_word: תַּאֲוַת
  chosen: the desires of
  alternatives:
  - the craving of
  - the lusts of
  lexicon: HALOT
  rationale: תַּאֲוָה denotes desire, craving, or lust. 'Desires' is broad and readable
    modern English, avoiding an overly sexual narrowing that 'lusts' could suggest.
- source_word: נַפְשֶׁךָ
  chosen: your soul
  alternatives:
  - yourself
  - your life
  - your appetite
  lexicon: HALOT
  rationale: The Hebrew נפשׁ can mean soul, self, life, or appetite depending on context.
    Because the Greek parallel has ψυχή and the Hebrew phrase is paired with desire-language,
    'your soul' preserves the anthropological texture of the source while remaining
    intelligible. The more idiomatic alternative 'yourself' is possible but loses
    the source's wording.
