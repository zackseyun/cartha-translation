theological_decisions:
- issue: Anthropological term נַפְשֶׁךָ / ψυχῇ σου
  chosen_reading: your soul
  alternative_readings:
  - yourself
  - your life
  rationale: The verse warns against self-directed desire. Rendering נפשׁ/ψυχή as
    'soul' preserves the source-language anthropology and avoids reducing the term
    to mere reflexive emphasis. Because English readers may hear 'soul' more narrowly
    than Hebrew or Greek intend, alternatives are preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
