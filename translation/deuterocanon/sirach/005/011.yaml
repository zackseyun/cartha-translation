theological_decisions:
- issue: Implied referent of the pronominal suffix in 'his wrath'
  chosen_reading: The referent is God/the Lord implied by the surrounding warning
    context.
  alternative_readings:
  - an unspecified authority figure
  rationale: Although the verse itself does not repeat the divine name, the warning
    about wrath and vengeance in this context most naturally refers to God. The translation
    keeps the pronoun rather than inserting 'God's' so as not to overstate what the
    Hebrew explicitly says.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
