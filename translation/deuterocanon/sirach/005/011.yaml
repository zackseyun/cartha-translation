    reference: Sirach 5:11
translation:
  text: For suddenly his wrath will come forth, and at the time of vengeance you will
    be swept away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel for this verse reads quite differently: ''Be swift in
      your hearing, and with patience speak an answer.'' The English main text follows
      the extant Hebrew witness here, where the wording diverges substantially from
      the Greek tradition.'
    reason: textual_variant
lexical_decisions:
- source_word: פִתְאֹם
  chosen: suddenly
  alternatives:
  - all at once
  - unexpectedly
  lexicon: HALOT
  rationale: Standard adverbial sense 'suddenly.' It fits both the Hebrew warning
    context and the Greek parallel's emphasis on promptness and consequence.
- source_word: יֵצֵא
  chosen: will come forth
  alternatives:
  - will go out
  - will break out
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out/come out.' 'Come forth' preserves
    the image of wrath emerging without flattening it into a purely idiomatic 'break
    out,' though that is a plausible alternative.
- source_word: זַעְמוֹ
  chosen: his wrath
  alternatives:
  - his anger
  - his fury
  lexicon: HALOT
  rationale: זעם denotes strong indignation/wrath. 'Wrath' better preserves the severity
    of the warning than the milder 'anger.' The pronominal suffix is retained as 'his,'
    with God as the implied referent from context.
- source_word: וּבְעֵת
  chosen: and at the time of
  alternatives:
  - and in the time of
  - when
  lexicon: HALOT
  rationale: A fairly formal rendering that preserves the temporal construction. 'When'
    would be smoother but less transparent to the Hebrew phrasing.
- source_word: נָקָם
  chosen: vengeance
  alternatives:
  - punishment
  - avenging
  lexicon: HALOT
  rationale: נָקָם most directly denotes vengeance/avenging. 'Vengeance' preserves
    the judicial-retributive force better than the more generalized 'punishment.'
- source_word: תִּסָּפֶה
  chosen: you will be swept away
  alternatives:
  - you will perish
  - you will be consumed
  - you will be destroyed
  lexicon: HALOT
  rationale: From ספה in the Niphal/Qal passive-like sense of being swept away, destroyed,
    or perishing. 'Swept away' preserves the vividness and avoids over-specifying
    the mode of destruction. It also suits wisdom-warning rhetoric.
