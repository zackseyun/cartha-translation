id: SIR.5.1
reference: Sirach 5:1
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תִּשָּׁעֵן עַל חֵילֶךָ, וְאַל תֹּאמַר יֵשׁ לְאֵל יָדִי.
  language: Hebrew
  pages:
  - 670
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μὴ ἔπεχε ἐπὶ τοῖς χρήμασίν σου, καὶ μὴ εἴπῃς Αὐτάρκη μοί ἐστιν.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 5:1
translation:
  text: Do not rely on your wealth, and do not say, “I have the power.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'there is to the power of my hand'; the Greek parallel
      reflects the sense 'I am self-sufficient' or 'it is enough for me.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּשָּׁעֵן
  chosen: Do not rely
  alternatives:
  - Do not lean on
  - Do not depend on
  lexicon: HALOT
  rationale: The Hebrew verb from שׁען literally means 'lean on' but commonly carries
    the figurative sense of trusting or relying upon something. 'Rely' gives clear
    modern English while preserving the metaphorical force.
- source_word: חֵילֶךָ
  chosen: your wealth
  alternatives:
  - your strength
  - your resources
  - your riches
  lexicon: HALOT
  rationale: חַיִל can denote strength, army, capability, or wealth. The Greek parallel
    χρήμασιν ('possessions, money') strongly supports the economic sense here. 'Wealth'
    best fits the warning against self-sufficiency grounded in possessions.
- source_word: יֵשׁ לְאֵל יָדִי
  chosen: My power is enough for me
  alternatives:
  - My hand has strength
  - I have sufficient power
  - My own strength is sufficient for me
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat compressed and awkward in transmission.
    Literally it involves 'there is to the power of my hand,' an idiom for ability
    or power. The Greek parallel Αὐτάρκη μοί ἐστιν ('it is sufficient for me' / 'I
    am self-sufficient') clarifies the sense as self-sufficiency. 'My power is enough
    for me' preserves the Hebrew reference to one's own power while expressing the
    likely meaning idiomatically.
