theological_decisions:
- issue: Rendering a difficult Hebrew clause with Greek parallel in view
  chosen_reading: The second prohibition warns against claiming self-sufficiency grounded
    in one's own power.
  alternative_readings:
  - do not say, 'My hand has power'
  - do not say, 'I have enough'
  rationale: The Hebrew witness is primary, but the clause יֵשׁ לְאֵל יָדִי is terse
    and potentially unstable. The Greek parallel provides a strong consistency check,
    pointing to the idea of sufficiency/self-sufficiency. The chosen rendering keeps
    the Hebrew's 'power/hand' concept without flattening the sense into a bare statement
    of possession.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, using
    Greek parallel as actual translation input'
