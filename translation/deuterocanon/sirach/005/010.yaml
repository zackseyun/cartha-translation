theological_decisions:
- issue: Whether to make explicit that the return is repentance toward God
  chosen_reading: 'Keep the text''s implicit wording: ''returning to him'''
  alternative_readings:
  - return to the Lord
  - repent and return to him
  rationale: The Hebrew שוב can imply repentance, and the antecedent of 'him' is likely
    God from the surrounding context. But the verse itself does not state a divine
    title here, so the translation preserves the text's theological restraint rather
    than making the repentance language more explicit than the source does.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: How to handle the difficult verb תתעבר in the second colon
  chosen_reading: Render contextually as 'do not put it off'
  alternative_readings:
  - do not delay
  - do not pass by
  - do not be negligent
  rationale: The Hebrew form is somewhat uncertain in isolation, but the parallelism
    with 'do not delay in returning' and the phrase 'from day to day' strongly support
    the sense of postponement. The Greek parallel in this location diverges substantially
    from the Hebrew tradition and does not control the translation here, so the Hebrew
    contextual sense is preferred.
  doctrine_reference: Translation philosophy §§1, 5
