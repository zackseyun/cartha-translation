id: SIR.5.10
reference: Sirach 5:10
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תְּאַחֵר לָשׁוּב אֵלָיו, וְאַל תִּתְעַבֵּר מִיּוֹם אֶל יוֹם.
  language: Hebrew
  pages:
  - 670
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἴσθι ἐστηριγμένος ἐν συνέσει σου, καὶ εἷς ἔστω σου ὁ λόγος.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 5:10
translation:
  text: Do not delay to return to him, and do not put it off from day to day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not postpone it from one day to the next.' The second clause uses
      a difficult Hebrew verb, but the context clearly points to repeated delay.
    reason: lexical_alternative
  - marker: b
    text: '''Returning to him'' likely refers to turning back to God in repentance,
      though the Hebrew says simply ''to him.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Standard negative imperative particle introducing prohibition; simple
    'Do not' best matches the Hebrew force in readable English.
- source_word: תְּאַחֵר
  chosen: delay
  alternatives:
  - be late
  - postpone
  lexicon: HALOT
  rationale: From אחר in the Hiphil/causative sense 'delay, postpone.' 'Delay' fits
    naturally with the infinitive that follows and preserves the warning against hesitation.
- source_word: לָשׁוּב
  chosen: in returning
  alternatives:
  - to return
  - to turn back
  lexicon: HALOT
  rationale: שוב commonly means 'return/turn back.' Here it likely carries the moral-religious
    sense of returning to God. 'Returning' keeps the repentance nuance without overloading
    the line with later doctrinal terminology.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to God
  - to the Lord
  lexicon: HALOT
  rationale: The Hebrew pronoun is explicit but its antecedent is implicit from context.
    The verse itself says only 'to him,' so the translation preserves that wording
    rather than importing a divine title not present in the line.
- source_word: תִּתְעַבֵּר
  chosen: put it off
  alternatives:
  - defer
  - postpone
  - delay yourself
  lexicon: HALOT
  rationale: The form is difficult, but in context with 'from day to day' and alongside
    the first colon's prohibition against delay, the sense is to defer or put something
    off. 'Put it off' is idiomatic modern English and captures the practical force
    of the warning.
- source_word: מִיּוֹם אֶל יוֹם
  chosen: from day to day
  alternatives:
  - day after day
  - from one day to the next
  lexicon: HALOT
  rationale: A Hebrew idiom for repeated postponement over successive days. 'From
    day to day' is both literal and natural in English.
