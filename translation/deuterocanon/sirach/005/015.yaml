translation:
  text: Be quick to listen, and with patience give an answer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with length of spirit,' an idiom for patience or restrained temper.
    reason: lexical_alternative
  - marker: b
    text: Or 'with patience return a word' / 'reply with a saying.' The Hebrew phrase
      is concise, and 'answer' brings out the likely sense in context.
    reason: alternative_reading
  - marker: c
    text: The Greek parallel for this verse differs substantially from the extant
      Hebrew and appears to reflect a different textual form; the translation here
      follows the surviving Hebrew witness as the primary source.
    reason: textual_variant
lexical_decisions:
- source_word: הֱיֶה מְמַהֵר
  chosen: Be quick
  alternatives:
  - Be swift
  - Hasten to be
  lexicon: HALOT
  rationale: The imperative plus participial form conveys readiness or promptness.
    'Be quick' is idiomatic modern English and preserves the exhortational force without
    sounding wooden.
- source_word: לְהַאֲזִין
  chosen: to listen
  alternatives:
  - to hear attentively
  - to give ear
  lexicon: HALOT
  rationale: The verb denotes attentive hearing rather than mere auditory reception.
    'Listen' captures the active, responsive sense in clear English.
- source_word: וּבְאֶרֶךְ רוּחַ
  chosen: with patience
  alternatives:
  - with long-suffering
  - with forbearance
  - with a long spirit
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'with length of spirit,' a standard
    expression for patience or slowness to react. 'With patience' is the most natural
    English equivalent while preserving the ethical sense of restrained response.
- source_word: הָשֵׁב
  chosen: give
  alternatives:
  - return
  - reply
  - answer
  lexicon: HALOT
  rationale: In context with the following noun, the verb means to return or give
    back a response. English requires a smoother idiom; 'give' works naturally in
    the phrase 'give an answer' while preserving the responsive sense.
- source_word: פִּתְגָּם
  chosen: an answer
  alternatives:
  - a saying
  - a word
  - a response
  lexicon: HALOT
  rationale: Although the noun can denote a word, utterance, or saying, in this context
    after 'listen' and with the responsive verb it most naturally refers to one's
    spoken reply. 'Answer' best fits the parallelism and practical wisdom setting.
