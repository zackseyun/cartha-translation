  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: δόξα καὶ ἀτιμία ἐν λαλιά, καὶ γλῶσσα ἀνθρώπου πτῶσις αὐτῷ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 5:13
translation:
  text: Do not be a winnower to every wind, or walk on the path of the storm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שִׁבֹּלֶת is uncertain here. It may mean 'storm' or 'torrent'; elsewhere
      it can also mean an 'ear of grain.' The translation follows the sense that best
      matches the parallel image of 'every wind.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel text reads quite differently: ''Honor and dishonor are
      in speech, and a man''s tongue is his downfall.'' The main translation follows
      the extant Hebrew witness, which is the primary source for this verse where
      available.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּהְיֶה
  chosen: Do not be
  alternatives:
  - Do not become
  - Do not act as
  lexicon: HALOT
  rationale: Standard negative prohibition with היה; simple imperative-style English
    best matches the admonitory tone.
- source_word: זוֹרֶה
  chosen: a winnower
  alternatives:
  - one who scatters
  - one who tosses grain
  lexicon: HALOT
  rationale: From זרה in the agricultural sense of winnowing/scattering grain in the
    wind. 'Winnower' preserves the concrete metaphor better than a generalized 'scatterer.'
- source_word: לְכָל רוּחַ
  chosen: to every wind
  alternatives:
  - for every wind
  - with every wind
  lexicon: HALOT
  rationale: The idiom evokes instability and susceptibility to every shifting influence.
    'To every wind' keeps the Hebrew image concise and natural in English.
- source_word: וּפוֹנֶה
  chosen: or turn
  alternatives:
  - and turn
  - and veer
  lexicon: HALOT
  rationale: The conjunction can be rendered simply, but in English the second clause
    continues the prohibition naturally as 'or turn.' This avoids implying a separate
    positive action and keeps the parallel warning force.
- source_word: דֶרֶך
  chosen: along the path of
  alternatives:
  - toward the way of
  - in the way of
  lexicon: HALOT
  rationale: Construct-like relation with the following noun is best represented by
    'path of.' Adding 'along' makes the verbal phrase idiomatic with 'turn' while
    preserving the directional sense.
- source_word: שִׁבֹּלֶת
  chosen: the storm
  alternatives:
  - the torrent
  - the flood
  - the ear of grain
  lexicon: HALOT
  rationale: In this context the Hebrew is difficult. Given the parallel with 'every
    wind' and the warning against instability, a weather-related sense fits best.
    The Greek parallel for this verse diverges substantially and does not control
    the Hebrew here, but it confirms that the line is proverb-like and admonitory.
    Because שבלת can bear other senses, the uncertainty is preserved in a footnote.
