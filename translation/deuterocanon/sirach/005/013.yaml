id: SIR.5.13
reference: Sirach 5:13
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תִּהְיֶה זוֹרֶה לְכָל רוּחַ, וּפוֹנֶה דֶרֶך שִׁבֹּלֶת.
  language: Hebrew
  pages:
