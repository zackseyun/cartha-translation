theological_decisions:
- issue: Rendering of the divine attribute אֶרֶךְ אַפַּיִם
  chosen_reading: God is patient
  alternative_readings:
  - God is slow to anger
  - God is long-suffering
  rationale: The verse warns against abusing divine forbearance as license to sin.
    'Patient' communicates the sense in contemporary English without importing a denial
    of judgment. Because 'slow to anger' is the more literal and traditional biblical
    idiom, it is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: readable modern English, not archaic or academic;
    preserve theological tension rather than resolve it'
