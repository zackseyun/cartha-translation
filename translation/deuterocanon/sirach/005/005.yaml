id: SIR.5.5
reference: Sirach 5:5
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תֹּאמַר חָטָאתִי, וְמַה יֵעָשֶה לִי – מְאוּמָה, כִּי אֵל אֶרֶךְ אַפַּיִם
    הוּא.
  language: Hebrew
  pages:
  - 670
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: περὶ ἐξιλασμοῦ μὴ ἄφοβος γίνου, προσθεῖναι ἁμαρτίαν ἐφʼ ἁμαρτίαις·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 5:5
translation:
  text: Do not say, “I have sinned, and what has been done to me? Nothing,” for God
    is patient.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “for God is slow to anger.”
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel reads differently: “Do not be without fear concerning
      atonement, to add sin upon sins.” The Hebrew witness here warns against saying
      that sin brings no consequence because God is patient; both forms caution against
      presuming on divine mercy.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֹּאמַר
  chosen: Do not say
  alternatives:
  - Do not say to yourself
  - Never say
  lexicon: HALOT
  rationale: Straightforward negative imperative in Hebrew; a direct prohibition is
    best preserved in English.
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: HALOT
  rationale: The perfect form naturally renders as a completed act with present relevance;
    'I have sinned' fits the speaker's self-justifying reflection.
- source_word: וְמַה יֵעָשֶה לִי
  chosen: and what has happened to me?
  alternatives:
  - and what will be done to me?
  - and what will happen to me?
  lexicon: HALOT
  rationale: The Hebrew can be heard either as future/passive ('what will be done
    to me?') or as a rhetorical reflection on consequences already absent. The following
    'nothing' favors the idiomatic English retrospective sense 'what has happened
    to me?' The Greek parallel likewise frames the warning against fearless sinning
    because of presumed impunity.
- source_word: מְאוּמָה
  chosen: Nothing
  alternatives:
  - not a thing
  - anything
  lexicon: HALOT
  rationale: 'Here the noun functions elliptically as the answer to the rhetorical
    question: no consequence at all. ''Nothing'' is the clearest idiomatic rendering.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibited attitude; 'for' preserves the
    explanatory connection compactly.
- source_word: אֵל
  chosen: God
  alternatives:
  - the Mighty One
  lexicon: HALOT
  rationale: Common Semitic designation for God; in this wisdom context 'God' is the
    natural English rendering.
- source_word: אֶרֶךְ אַפַּיִם
  chosen: is patient
  alternatives:
  - is slow to anger
  - is long-suffering
  lexicon: HALOT
  rationale: Literally 'long of nostrils/faces,' an idiom for slowness to anger. 'Is
    patient' fits the immediate logic of presumed delayed judgment, while remaining
    accessible. The more literal alternative is worth preserving in a footnote because
    it is a common biblical idiom.
- source_word: הוּא
  chosen: is
  alternatives:
  - he is
  lexicon: HALOT
  rationale: The pronoun is naturally absorbed into the English copular clause; explicit
    'he' is unnecessary after 'God'.
