theological_decisions:
- issue: Whether to import the longer Greek continuation about mercy and wrath into
    the main text
  chosen_reading: Translate only the extant Hebrew clause for this verse, while preserving
    the Greek continuation in a footnote as a parallel expansion.
  alternative_readings:
  - Conflate the Hebrew and Greek into a longer composite verse
  rationale: The primary witness for this verse is the surviving Hebrew, which here
    contains only the prohibition clause. The Greek parallel continues with an explanatory
    warning about mercy and wrath. Because the task specifies translating from the
    most-original available witness while using the Greek as actual input, the Hebrew
    governs the main text and the Greek is preserved as a significant alternative/parallel
    note rather than merged into the verse.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    source uncertainty honestly.
