id: SIR.5.6
reference: Sirach 5:6
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תֹּאמַר רַחוּם יהוה, וְכָל עֲוֹנוֹתַי יִמְחֶה.
  language: Hebrew
  pages:
  - 670
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: καὶ μὴ εἴπῃς Ὁ οἰκτειρμὸς αὐτοῦ πολύς, τὸ πλῆθος τῶν ἁμαρτιῶν μου ἐξιλάσεται·
      ἔλεος γὰρ καὶ ὀργὴ παρʼ αὐτοῦ, καὶ ἐπὶ ἁμαρτωλοὺς καταπαύσει ὁ θυμὸς αὐτοῦ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 5:6
translation:
  text: Do not say, “The LORD is compassionate; he will blot out all my iniquities.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek continues: “for his mercy is great; he will atone for the multitude
      of my sins,” and then adds a warning about both mercy and wrath coming from
      him, with his anger resting on sinners.'
    reason: alternative_reading
  - marker: b
    text: Or “merciful” for “compassionate.”
    reason: lexical_alternative
  - marker: c
    text: Or “blot out” for “wipe away.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תֹּאמַר
  chosen: Do not say
  alternatives:
  - Do not say to yourself
  - Never say
  lexicon: HALOT
  rationale: Straightforward negative prohibition with אמר. A direct imperative in
    English best matches the Hebrew without adding reflexive nuance not present in
    the text.
- source_word: רַחוּם
  chosen: compassionate
  alternatives:
  - merciful
  - full of compassion
  lexicon: HALOT
  rationale: רחום denotes compassion/mercy as a divine attribute. 'Compassionate'
    is clear modern English and avoids slightly church-traditional inertia in 'merciful,'
    while preserving the sense of divine pity.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name is rendered 'the LORD' in continuity with
    Jewish reverence practice and the project's stated default.
- source_word: וְכָל עֲוֹנוֹתַי
  chosen: all my iniquities
  alternatives:
  - all my sins
  - all my guilt
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or sinful wrongdoing. 'Iniquities' preserves
    the moral weight and plural concreteness of the Hebrew better than the flatter
    'sins,' while still being intelligible in modern English.
- source_word: יִמְחֶה
  chosen: he will wipe away
  alternatives:
  - he will blot out
  - he will erase
  lexicon: HALOT
  rationale: מחה literally carries the sense of wiping/blotting out. 'Wipe away' is
    natural English that preserves the metaphor; 'blot out' is a viable alternative
    but more traditional in register.
