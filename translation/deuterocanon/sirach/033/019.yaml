theological_decisions:
- issue: Gendered reference in address to social elites
  chosen_reading: you great men of the people
  alternative_readings:
  - you great ones of the people
  - you nobles of the people
  rationale: Following the project's gender-accurate principle, the masculine Greek
    is retained as masculine rather than neutralized. The verse addresses male leaders
    in public life, so 'men' is justified by the source form and context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering ἐκκλησία
  chosen_reading: assembly
  alternative_readings:
  - congregation
  - church
  rationale: The deuterocanonical Greek here refers to the gathered body, not specifically
    the later Christian institution. 'Assembly' avoids importing ecclesiastical overtones
    the text itself does not require.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
