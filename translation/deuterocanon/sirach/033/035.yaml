  - 769
  validation: no_reference
translation:
  text: Settle a stranger with you, and he will throw you into turmoil, and estrange
    you from your own.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from your own household' or 'from what is your own.' The Greek τῶν ἰδίων
      σου is broad and can refer to one's own people, household, or belongings; the
      context favors estrangement from one's proper circle.
    reason: lexical_alternative
lexical_decisions:
- source_word: παροίκισον
  chosen: Settle ... with you
  alternatives:
  - Lodge
  - Let dwell as a resident
  - Take in as a sojourner
  lexicon: LSJ
  rationale: Imperative from παροικίζω, meaning to cause someone to dwell beside or
    as a resident alien. 'Settle ... with you' captures the causative sense more naturally
    than the stiffer 'make dwell,' while keeping the warning about bringing an outsider
    into one's household or sphere.
- source_word: ἀλλότριον
  chosen: a stranger
  alternatives:
  - an outsider
  - a foreigner
  - another man's servant
  lexicon: LSJ
  rationale: The adjective means belonging to another, foreign, or alien. In this
    wisdom context it refers broadly to someone not of one's own household or circle.
    'Stranger' is concise and idiomatic; 'foreigner' would over-specify ethnicity,
    and 'outsider' is possible but less concrete.
- source_word: διαστρέψει
  chosen: will throw you into turmoil
  alternatives:
  - will upset you
  - will ruin you
  - will pervert/distort you amid troubles
  lexicon: LSJ
  rationale: διαστρέφω can mean to turn awry, upset, or ruin. With ἐν ταραχαῖς ('in
    disturbances/troubles'), the sense is practical disruption rather than moral perversion.
    'Throw you into turmoil' conveys both the force of the verb and the resulting
    state.
- source_word: ἐν ταραχαῖς
  chosen: into turmoil
  alternatives:
  - in troubles
  - amid disturbances
  - in confusion
  lexicon: LSJ
  rationale: ταραχαί denotes disturbances, troubles, or turmoil. Rendering the phrase
    idiomatically with the verb as 'into turmoil' gives natural English while preserving
    the sense of disruptive unrest.
- source_word: ἀπαλλοτριώσει
  chosen: estrange
  alternatives:
  - alienate
  - make a stranger
  - separate
  lexicon: LSJ
  rationale: The verb means to make alien or estrange. 'Estrange' fits the relational
    warning and pairs well with the following phrase.
- source_word: τῶν ἰδίων σου
  chosen: from your own people
  alternatives:
  - from your own household
  - from your own possessions
  - from your own family
  lexicon: LSJ
  rationale: Literally 'from your own things/one's own.' In context, the warning is
    relational and social rather than about property alone. 'Your own people' best
    captures the likely sense of those who belong to one's proper circle, while avoiding
    an overly narrow 'family' or overly material 'possessions'.
