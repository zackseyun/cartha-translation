id: SIR.33.35
reference: Sirach 33:35
source:
  edition: lxx-swete-1909
  text: παροίκισον ἀλλότριον, καὶ διαστρέψει σε ἐν ταραχαῖς, καὶ ἀπαλλοτριώσει σε
    τῶν ἰδίων σου.
  language: Greek
  pages:
  - 681
  - 722
