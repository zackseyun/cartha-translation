theological_decisions:
- issue: Force of the imperative in a prayer-like address to God
  chosen_reading: 'Rendered as a wish/prayer: ''may they know you'''
  alternative_readings:
  - let them know you
  rationale: The Greek imperative can be translated woodenly as 'let them know,' but
    in English a prayerful optative-style rendering better reflects the discourse
    without changing the underlying force.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source sense in
    readable modern English'
- issue: Nuance between ἐπιγινώσκω and γινώσκω
  chosen_reading: English does not sharply distinguish them here; both are rendered
    with 'know' while the comparison is preserved
  alternative_readings:
  - '''fully know'' for ἐπιγνώτωσάν contrasted with ''know'' for ἔγνωμεν'
  rationale: Although ἐπιγινώσκω can imply fuller recognition, forcing 'fully know'
    in the main text would overstate a nuance that may not be contrastive in this
    line. The Greek comparison itself carries the rhetorical weight.
  doctrine_reference: 'DOCTRINE.md: never paraphrase beyond what the source warrants'
