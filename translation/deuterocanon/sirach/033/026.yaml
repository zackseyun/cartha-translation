translation:
  text: Put your slave to work, and you will find rest; let his hands be idle, and
    he will seek freedom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek παιδί literally means 'child' or 'boy,' but here it refers to a household
      dependent under authority; 'servant' is a possible alternative, though the context
      of seeking freedom supports the stronger sense 'slave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔργασαι
  chosen: Put ... to work
  alternatives:
  - Make ... work
  - Employ
  lexicon: LSJ
  rationale: Aorist imperative of ἐργάζομαι used transitively here with ἐν + dative
    object in Sirach's idiom. 'Put to work' is natural English and preserves the command's
    force without sounding awkwardly literal.
- source_word: ἐν παιδί
  chosen: your slave
  alternatives:
  - with a servant
  - with a slave
  - with a boy
  lexicon: LSJ
  rationale: Although παιδί literally relates to 'child/boy,' in this wisdom context
    it refers to a subordinate household dependent, as the second clause's 'he will
    seek freedom' shows. Following the project's doctrine on bonded-status terms,
    'slave' best reflects the social reality more clearly than 'servant.' 'Your' is
    supplied idiomatically in English because the imperative addresses the hearer
    concerning his own household dependent.
- source_word: εὑρήσεις ἀνάπαυσιν
  chosen: you will find rest
  alternatives:
  - you will find relief
  - you will have rest
  lexicon: LSJ
  rationale: Straightforward future plus object. 'Find rest' is idiomatic and preserves
    the concrete result of the command.
- source_word: ἄνες
  chosen: leave ... idle
  alternatives:
  - relax
  - let go
  - give ease to
  lexicon: LSJ
  rationale: Imperative of ἀνίημι here means to slacken or let up. Because χεῖρας
    αὐτῷ follows, the sense is not merely 'release him' but 'let his hands go slack,'
    i.e., leave him idle.
- source_word: χεῖρας αὐτῷ
  chosen: his hands
  alternatives:
  - his hand
  - his labor
  lexicon: LSJ
  rationale: Literal 'hands' is retained because it is intelligible in English and
    conveys the concrete image of ceasing labor.
- source_word: ζητήσει ἐλευθερίαν
  chosen: he will seek freedom
  alternatives:
  - he will look for liberty
  - he will demand freedom
  lexicon: LSJ
  rationale: ἐλευθερία is best rendered 'freedom.' 'Seek' matches ζητήσει without
    overstating it as a formal demand.
