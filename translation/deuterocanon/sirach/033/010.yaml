translation:
  text: Hasten the time and remember the oath, and let them recount your mighty deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text of this verse is marked by source validation as uncertain
      ('major mismatch'). This translation follows the extant Greek wording without
      conjectural reconstruction.
    reason: textual_variant
  - marker: b
    text: Or 'the appointed time' for 'the time' (Greek καιρόν).
