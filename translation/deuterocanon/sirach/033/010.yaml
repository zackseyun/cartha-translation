lexical_decisions:
- source_word: σπεῦσον
  chosen: Hasten
  alternatives:
  - Make haste
  - Speed
  lexicon: LSJ
  rationale: Aorist imperative of σπεύδω, calling for urgent action. 'Hasten' preserves
    the imperative force and elevated tone without over-paraphrasing.
- source_word: καιρόν
  chosen: the time
  alternatives:
  - the appointed time
  - the season
  lexicon: LSJ
  rationale: καιρός often means a fitting or appointed time. 'The time' is concise
    and natural in English while leaving the precise nuance open; 'appointed time'
    is possible but slightly more interpretive.
- source_word: μνήσθητι
  chosen: remember
  alternatives:
  - be mindful of
  - call to mind
  lexicon: LSJ
  rationale: Aorist middle imperative of μιμνῄσκομαι. 'Remember' is the most direct
    and idiomatic rendering.
- source_word: ὁρκισμοῦ
  chosen: the oath
  alternatives:
  - the sworn promise
  - the adjuration
  lexicon: LSJ
  rationale: ὁρκισμός denotes an oath or sworn commitment. 'The oath' is the plain
    lexical sense and fits likely covenantal or petitionary context.
- source_word: ἐκδιηγησάσθωσαν
  chosen: let them recount
  alternatives:
  - let them declare fully
  - let them tell out
  lexicon: LSJ
  rationale: Third person imperative from ἐκδιηγέομαι, with the sense of narrating
    in detail. 'Let them recount' captures both the jussive force and the narrative
    nuance.
- source_word: τὰ μεγαλεῖά
  chosen: your mighty deeds
  alternatives:
  - your great acts
  - your greatnesses
  lexicon: LSJ
  rationale: The plural neuter often refers to great acts or mighty deeds, especially
    divine acts worthy of praise. 'Your mighty deeds' is idiomatic and preserves the
    likely sense better than the overly literal 'greatnesses'.
