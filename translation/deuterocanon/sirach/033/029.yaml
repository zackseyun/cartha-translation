translation:
  text: For idleness has taught much evil.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πολλὴν
  chosen: much
  alternatives:
  - great
  - many things
  lexicon: LSJ
  rationale: The adjective modifies κακίαν in the singular. In English, 'much evil'
    naturally conveys a large amount of evil or wickedness better than the more awkward
    'great evil' here, while preserving the quantitative force.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: This conjunction gives the reason for the surrounding admonition. 'For'
    preserves the explanatory connection in a concise, formal way.
- source_word: κακίαν
  chosen: evil
  alternatives:
  - wickedness
  - malice
  - vice
  lexicon: LSJ
  rationale: κακία can denote badness, wickedness, or vice broadly. 'Evil' best fits
    the general moral sense in this proverb-like statement without narrowing it to
    interpersonal 'malice' or a more technical vice list.
- source_word: ἐδίδαξεν
  chosen: has taught
  alternatives:
  - taught
  - has produced
  - has trained in
  lexicon: LSJ
  rationale: The aorist states what idleness does in a gnomic sense. English present
    perfect ('has taught') idiomatically captures the proverbial observation that
    idleness proves to be an instructor in evil. 'Produced' is interpretive and less
    faithful to the pedagogical metaphor.
- source_word: ἡ ἀργία
  chosen: idleness
  alternatives:
  - laziness
  - inactivity
  - sloth
  lexicon: LSJ
  rationale: ἀργία denotes idleness or inactivity. 'Idleness' is the most direct and
    natural rendering, preserving the idea of being unoccupied without importing the
    more moralized tone of 'sloth' or the colloquial feel of 'laziness'.
