translation:
  text: In the wrath of fire, let the one who escapes be consumed, and let those who
    wrong your people find destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ὁ σωζόμενος could also be rendered 'the one being saved' or more idiomatically
      'the survivor.' The context favors the sense of one who has escaped only to
      face further judgment.
    reason: lexical_alternative
  - marker: b
    text: The source witness supplied for this verse is marked as a major mismatch
      against expected verse alignment in Sirach. This translation therefore follows
      the provided Greek text directly rather than harmonizing to another tradition.
    reason: textual_variant
lexical_decisions:
- source_word: ἐν ὀργῇ πυρὸς
  chosen: In the wrath of fire
  alternatives:
  - In fiery wrath
  - By the wrath of fire
  lexicon: LSJ
  rationale: Rendered closely to preserve the vivid genitival expression. The phrase
    is unusual and forceful; 'wrath of fire' keeps the imagery and avoids over-interpreting
    whether the fire itself is wrathful or is the instrument of wrath.
- source_word: καταβρωθήτω
  chosen: let ... be consumed
  alternatives:
  - let ... be devoured
  - let ... be eaten up
  lexicon: LSJ
  rationale: A jussive/passive sense is required by the imperative form. 'Be consumed'
    is idiomatic in English for destructive fire while still reflecting the underlying
    idea of being devoured.
- source_word: ὁ σωζόμενος
  chosen: the one who escapes
  alternatives:
  - the one being saved
  - the survivor
  lexicon: BDAG
  rationale: Although the participle can mean 'the one being saved,' in this judgment
    context it most naturally refers to one who has escaped prior destruction. 'The
    survivor' is possible, but 'the one who escapes' better preserves the participial
    force and the irony of even the escapee being consumed.
- source_word: οἱ ἀδικοῦντες
  chosen: those who wrong
  alternatives:
  - those who do injustice to
  - the evildoers against
  lexicon: BDAG
  rationale: The participle here governs an object ('your people'). 'Those who wrong'
    is natural modern English and preserves the active sense of committing injustice
    against someone.
- source_word: τὸν λαόν σου
  chosen: your people
  alternatives:
  - your nation
  lexicon: LSJ
  rationale: λαός regularly means 'people' in a collective covenantal/national sense.
    'Your people' is the most direct and biblically natural rendering.
- source_word: εὕροισαν ἀπώλειαν
  chosen: let ... find destruction
  alternatives:
  - may ... meet destruction
  - let ... find ruin
  lexicon: BDAG
  rationale: The optative/jussive force is carried with 'let.' 'Destruction' is chosen
    over 'ruin' because ἀπώλεια often denotes decisive destruction, fitting the imprecatory
    tone.
