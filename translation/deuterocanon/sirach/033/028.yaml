translation:
  text: Put him to work, so that he may not be idle;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔμβαλε
  chosen: Put ... to
  alternatives:
  - set ... to
  - throw ... into
  lexicon: LSJ
  rationale: From ἐμβάλλω, literally 'throw in/into,' but in this idiom with εἰς ἐργασίαν
    it means to put or set someone into labor/work. 'Put him to work' is natural English
    that preserves the imperative force without over-literal awkwardness.
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - it
  - him/her
  lexicon: Greek grammar
  rationale: The pronoun is masculine singular accusative, referring to the male slave/servant
    in the surrounding context. Per gender-accurate policy, 'him' best matches the
    source.
- source_word: εἰς ἐργασίαν
  chosen: to work
  alternatives:
  - into labor
  - into employment
  - to labor
  lexicon: LSJ
  rationale: ἐργασία denotes work, labor, or occupation. In English idiom after ἔμβαλε,
    'put him to work' is clearer and more natural than the more wooden 'put him into
    labor/work.'
- source_word: ἵνα μὴ ἀργῇ
  chosen: so that he may not be idle
  alternatives:
  - lest he be idle
  - so that he does not become lazy
  lexicon: LSJ
  rationale: ἀργέω means to be idle, inactive, or unemployed. 'Be idle' is the most
    direct sense. 'Lazy' would import a moral nuance stronger than the Greek requires,
    while 'lest' is more formal than needed.
