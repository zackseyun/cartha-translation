theological_decisions:
- issue: Rendering of the male singular object in a slavery context
  chosen_reading: him
  alternative_readings:
  - him/her
  rationale: The verse addresses a male singular subordinate in context; using 'him'
    preserves the grammatical gender and social setting of the source rather than
    neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Degree of literalness for ἔμβαλε εἰς ἐργασίαν
  chosen_reading: Put him to work
  alternative_readings:
  - Set him to labor
  - Throw him into work
  rationale: Optimal equivalence favors an idiomatic English imperative that still
    reflects the concrete Greek expression. Overly literal renderings would sound
    unnatural and obscure the command's plain sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
