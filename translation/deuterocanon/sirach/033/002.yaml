lexical_decisions:
- source_word: שׂוֹנֵא
  chosen: one who hates
  alternatives:
  - the hater of
  - he who hates
  lexicon: HALOT
  rationale: The participle functions substantivally, describing a type of person.
    'One who hates' is natural modern English while preserving the force of active
    hostility.
- source_word: תוֹרָה
  chosen: instruction
  alternatives:
  - law
  - teaching
  lexicon: HALOT
  rationale: In Ben Sira, תורה can mean instruction/teaching broadly, not only codified
    law. 'Instruction' fits the wisdom context and avoids narrowing the sense to legal
    code alone. 'Law' remains a viable alternative and is preserved in a footnote
    because the Hebrew term can carry that resonance.
- source_word: יֶחְכַּם
  chosen: will not become wise
  alternatives:
  - will not be wise
  - will not grow wise
  lexicon: HALOT
  rationale: The Hiphil/imperfect sense is well represented by an ingressive/resultative
    English expression. 'Become wise' captures the process/outcome better than the
    flatter 'be wise.'
- source_word: מִתְמוֹטֵט
  chosen: is tossed about
  alternatives:
  - totters
  - is shaken
  - is driven about
  lexicon: HALOT
  rationale: The reflexive/passive nuance in context with the storm-and-ship image
    suggests instability under external force. 'Is tossed about' communicates the
    metaphor clearly in idiomatic English.
- source_word: בְּמִסְעָר
  chosen: in a storm
  alternatives:
  - in the tempest
  - by a storm
  lexicon: HALOT
  rationale: The noun denotes storm/tempest. 'In a storm' is concise and natural,
    and works well with the ship simile.
- source_word: כָּאֳנִיָּה
  chosen: like a ship
  alternatives:
  - as a ship
  - like a boat
  lexicon: HALOT
  rationale: The comparison is straightforward. 'Ship' better matches the gravity
    of the storm image than the smaller-scale 'boat.'
