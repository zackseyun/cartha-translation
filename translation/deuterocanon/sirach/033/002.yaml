translation:
  text: One who hates instruction will not become wise, and he is tossed about in
    a storm like a ship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''law'': the Hebrew תורה can mean ''instruction,'' ''teaching,'' or
      ''law.'''
