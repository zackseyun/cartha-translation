translation:
  text: For it is better that your children should have need of you than that you
    should look to the hands of your sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'than that you should depend on your sons.' The Greek
      literally says 'look to the hands of your sons,' using 'hands' as an image of
      support or provision.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖσσον
  chosen: better
  alternatives:
  - preferable
  - superior
  lexicon: LSJ
  rationale: Comparative adjective expressing what is more advantageous or preferable;
    'better' is the natural modern English equivalent.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: LSJ
  rationale: The Greek uses the broader term for children, not specifically male offspring.
    'Children' preserves that breadth, even though 'sons' appears later with υἱῶν.
- source_word: δεηθῆναί
  chosen: should have need of
  alternatives:
  - should need
  - should ask from
  - should be in want of
  lexicon: LSJ
  rationale: From δέομαι, here with genitive σου, meaning to need someone or be dependent
    on someone. 'Should have need of you' preserves the relational dependence more
    clearly than the flatter 'should need you.'
- source_word: ἐμβλέπειν
  chosen: should look to
  alternatives:
  - should look at
  - should depend on
  - should turn one's eyes to
  lexicon: LSJ
  rationale: Literally 'to look into/upon,' but with εἰς χεῖρας it idiomatically conveys
    looking toward someone for support. 'Look to' keeps the image while signaling
    dependence.
- source_word: εἰς χεῖρας
  chosen: to the hands
  alternatives:
  - into the hands
  - for help from the hands
  lexicon: LSJ
  rationale: The phrase is retained fairly literally because 'hands' evokes practical
    support or provision. A more interpretive rendering like 'for support from' would
    lose the concrete imagery.
- source_word: υἱῶν
  chosen: sons
  alternatives:
  - children
  lexicon: LSJ
  rationale: Unlike τέκνα earlier, this term is specifically 'sons.' The English should
    preserve the shift in wording rather than harmonize both terms.
