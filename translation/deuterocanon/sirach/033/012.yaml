translation:
  text: Crush the heads of the rulers of the enemies, who say, “There is no one except
    us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “There is none but us,” preserving the same boastful claim more formally.
    reason: lexical_alternative
  - marker: b
    text: The Greek source for this verse is marked with source-validation uncertainty
      ('major_mismatch'); this translation follows the Zone 1 Greek wording as given.
    reason: textual_variant
lexical_decisions:
- source_word: σύντριψον
  chosen: Crush
  alternatives:
  - Break
  - Shatter
  lexicon: LSJ
  rationale: Aorist imperative of συντρίβω, conveying forceful breaking or smashing.
    'Crush' is vivid, natural English and fits the violent metaphor without overexpanding
    it.
- source_word: κεφαλὰς
  chosen: heads
  lexicon: LSJ
  rationale: Literal plural of κεφαλή. The image is concrete and should be preserved
    rather than softened into a figurative paraphrase.
- source_word: ἀρχόντων
  chosen: rulers
  alternatives:
  - princes
  - leaders
  lexicon: LSJ
  rationale: Genitive plural of ἄρχων, denoting those in authority. 'Rulers' best
    captures political or governing authority in clear modern English.
- source_word: ἐχθρῶν
  chosen: of the enemies
  alternatives:
  - enemy rulers
  - hostile rulers
  lexicon: LSJ
  rationale: The genitive most naturally qualifies the rulers as belonging to or representing
    enemies. 'Rulers of the enemies' stays close to the Greek structure while remaining
    intelligible.
- source_word: λεγόντων
  chosen: who say
  alternatives:
  - saying
  lexicon: LSJ
  rationale: Present participle modifying the rulers/enemies. Relative-clause English
    is smoother than a bare participial construction and preserves the ongoing characterization.
- source_word: Οὐκ ἔστιν πλὴν ἡμῶν
  chosen: There is no one except us
  alternatives:
  - There is none but us
  - There is no one besides us
  lexicon: LSJ
  rationale: 'πλήν with the genitive pronoun expresses exclusion: no one apart from
    us. The chosen rendering is idiomatic modern English while preserving the boastful
    exclusivity of the claim.'
