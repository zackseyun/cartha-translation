theological_decisions:
- issue: Rendering of the divine name יְהֹוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Project doctrine specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and common biblical English usage.
  doctrine_reference: 'DOCTRINE.md contested terms: יְהוָה YHWH → the LORD'
- issue: How strongly to state protection from רָע
  chosen_reading: will not meet with evil
  alternative_readings:
  - will suffer no harm at all
  - evil will never happen to him
  rationale: The verse should not be made to promise absolute immunity from all suffering,
    since the second colon explicitly allows for a time of testing/trial followed
    by escape. The chosen wording preserves the proverb's confidence without flattening
    its tension.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
