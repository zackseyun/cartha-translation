lexical_decisions:
- source_word: δόξασον
  chosen: Honor
  alternatives:
  - Glorify
  - Give honor to
  lexicon: LSJ
  rationale: Imperative of δοξάζω. In this context, 'honor' is more natural English
    for an imperative directed toward body parts or symbols of power, while still
    preserving the sense of ascribing weight or glory. 'Glorify' is possible but sounds
    more elevated and less idiomatic here.
- source_word: χεῖρα
  chosen: the hand
  alternatives:
  - hand
  lexicon: LSJ
  rationale: χείρ is straightforwardly 'hand.' The article is not explicit in Greek
    here, but English idiom naturally uses 'the hand' in a paired expression with
    'the right arm.'
- source_word: βραχίονα
  chosen: arm
  alternatives:
  - forearm
  lexicon: LSJ
  rationale: βραχίων commonly means 'arm' and in biblical Greek often carries connotations
    of strength or power. 'Forearm' would be overly anatomical and less likely in
    this literary context.
- source_word: δεξιόν
  chosen: right
  alternatives:
  - right-hand
  - right-side
  lexicon: LSJ
  rationale: As an adjective modifying 'arm,' δεξιόν is best rendered 'right.' This
    preserves the common biblical association of the right side with strength, favor,
    or power without over-interpreting.
