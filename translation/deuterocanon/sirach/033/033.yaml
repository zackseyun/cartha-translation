translation:
  text: Fodder and a rod and loads are for a donkey; bread and discipline and work
    are for a slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'household servant'; Greek οἰκέτῃ refers specifically to a domestic slave/servant.
    reason: lexical_alternative
lexical_decisions:
- source_word: χορτάσματα
  chosen: Fodder
  alternatives:
  - feed
  - provender
  lexicon: LSJ
  rationale: Plural noun referring to what is fed to animals; 'fodder' is natural
    English for a donkey's feed and preserves the concrete image better than the broader
    'feed'.
- source_word: ῥάβδος
  chosen: rod
  alternatives:
  - staff
  - stick
  lexicon: LSJ
  rationale: In this proverb-like context, the term denotes an instrument of control/correction
    rather than a walking staff; 'rod' best preserves that force.
- source_word: φορτία
  chosen: loads
  alternatives:
  - burdens
  - cargo
  lexicon: LSJ
  rationale: The word denotes things borne by a beast of burden. 'Loads' fits the
    donkey image idiomatically; 'burdens' is possible but slightly more abstract.
- source_word: ὄνῳ
  chosen: for a donkey
  alternatives:
  - to a donkey
  lexicon: LSJ
  rationale: Dative of reference/advantage in a nominal proverb. 'For a donkey' reads
    naturally in English while preserving the sense.
- source_word: ἄρτος
  chosen: bread
  alternatives:
  - food
  lexicon: LSJ
  rationale: The Greek specifically says 'bread.' Although it can stand metonymically
    for food, the concrete term should be retained.
- source_word: παιδεία
  chosen: discipline
  alternatives:
  - instruction
  - training
  - correction
  lexicon: LSJ
  rationale: The term can include education/training, but paired with 'rod' in the
    first colon and in a household-management saying, 'discipline' best captures the
    corrective and formative sense without over-narrowing to punishment alone.
- source_word: ἔργον
  chosen: work
  alternatives:
  - labor
  - task
  lexicon: LSJ
  rationale: Simple, broad term for labor or assigned work. 'Work' is the most direct
    and readable rendering.
- source_word: οἰκέτῃ
  chosen: slave
  alternatives:
  - servant
  - household servant
  lexicon: LSJ
  rationale: An οἰκέτης is a household slave/servant. In keeping with project philosophy,
    where bonded status is socially salient, 'slave' is preferred over the softer
    'servant.' The household nuance is real but not necessary to state in the main
    text.
