theological_decisions:
- issue: Rendering of οἰκέτῃ in a household subordination context
  chosen_reading: slave
  alternative_readings:
  - servant
  - household servant
  rationale: The verse concerns the provisioning and control of a socially subordinate
    household laborer. Following the doctrine's guidance on δοῦλος-like bonded terms,
    the translation should not mute the bonded status with 'servant.' Since οἰκέτης
    specifically refers to a household slave/servant, the household nuance is noted
    in lexical decisions, but 'slave' best preserves the social reality in concise
    English.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Contested terms table on δοῦλος ''servant / slave (context-dependent)'''
