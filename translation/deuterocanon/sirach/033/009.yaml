lexical_decisions:
- source_word: ἔξαρον
  chosen: Raise up
  alternatives:
  - Lift up
  - Exalt
  - Rouse
  lexicon: LSJ
  rationale: Taken as an imperative from ἐξαίρω/related form, with the sense of causing
    to arise or lifting up. In this terse poetic line, 'Raise up' best preserves the
    force without overinterpreting whether the sense is physical elevation or stirring
    into action.
- source_word: ἀντίδικον
  chosen: an adversary
  alternatives:
  - an opponent
  - an accuser
  lexicon: BDAG
  rationale: The noun commonly denotes an opponent in dispute or litigation, and more
    broadly an adversary. 'Adversary' fits the parallelism with ἐχθρόν and preserves
    the hostile sense without narrowing it to a courtroom setting.
- source_word: ἔκτριψον
  chosen: wipe out
  alternatives:
  - destroy
  - rub out
  - erase
  lexicon: LSJ
  rationale: Imperative from ἐκτρίβω, literally 'rub out' or 'wear away,' but in hostile
    context it carries the stronger sense of eliminating or destroying. 'Wipe out'
    conveys the vividness and severity in natural English.
- source_word: ἐχθρόν
  chosen: an enemy
  alternatives:
  - the enemy
  - a foe
  lexicon: BDAG
  rationale: Standard rendering for a hostile person. The anarthrous singular is naturally
    represented in English as 'an enemy' in this gnomic, parallel line.
