translation:
  text: Have mercy on the people, O Lord, who are called by your name, and on Israel,
    whom you made equal to a firstborn son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'and Israel, make him like the firstborn.' The Greek wording
      at the end of the verse is syntactically difficult, and the final verb may be
      understood as a fresh petition rather than as describing God's prior treatment
      of Israel.
    reason: alternative_reading
  - marker: b
    text: '''Called by your name'' is a biblical idiom meaning marked out as belonging
      to God.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐλέησον
  chosen: Have mercy
  alternatives:
  - Show mercy
  - Be merciful to
  lexicon: BDAG
  rationale: Aorist imperative of ἐλεέω, expressing a direct plea for compassionate
    action. 'Have mercy' is idiomatic, solemn, and preserves the prayerful force.
- source_word: λαόν
  chosen: the people
  alternatives:
  - a people
  - your people
  lexicon: BDAG
  rationale: The anarthrous noun in this prayer context naturally refers to the covenant
    people as a collective. 'The people' stays close to the Greek without adding 'your,'
    which is implied but not explicit.
- source_word: Κύριε
  chosen: O Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Vocative κύριε is best rendered 'O Lord' in direct address, preserving
    the prayer form and matching the project's default rendering for κύριος.
- source_word: κεκλημένον ἐπ᾽ ὀνόματί σου
  chosen: who are called by your name
  alternatives:
  - called upon your name
  - named by your name
  - who bear your name
  lexicon: BDAG
  rationale: This is a standard biblical idiom for belonging to or being identified
    with God. 'Who are called by your name' preserves the idiom most transparently
    in English.
- source_word: Ἰσραήλ
  chosen: Israel
  lexicon: BDAG
  rationale: Proper name transliterated according to standard convention.
- source_word: ὃν
  chosen: whom
  alternatives:
  - which
  lexicon: BDAG
  rationale: Masculine singular relative pronoun referring to Israel as a collective
    singular. 'Whom' fits the personal/national referent.
- source_word: πρωτογόνῳ
  chosen: a firstborn son
  alternatives:
  - the firstborn
  - a firstborn
  - your firstborn
  lexicon: BDAG
  rationale: πρωτογόνος/πρωτογόνῳ evokes the biblical status of firstborn sonship
    for Israel. English needs 'son' to make the comparison natural and explicit, though
    it is implied rather than separately stated in the Greek form here.
- source_word: ὁμοίωσον
  chosen: you made like
  alternatives:
  - you likened
  - you made comparable to
  - make like
  lexicon: BDAG
  rationale: The form is textually and syntactically difficult in isolation. In context
    it points to God's treating Israel as like a firstborn. Rendering it as a past
    action ('you made like') best fits the relative clause about Israel and yields
    coherent English from the transmitted Greek.
