theological_decisions:
- issue: Israel's 'firstborn' status
  chosen_reading: The verse refers to Israel as being treated like a firstborn son
    before God.
  alternative_readings:
  - 'The text could be taken as an imperative request: ''make Israel like the firstborn.'''
  rationale: The Greek wording is compressed and somewhat awkward, but within biblical
    idiom the comparison strongly evokes Israel's filial status before God (cf. Exod
    4:22 conceptually). The main text preserves that sense while avoiding overstatement
    beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
