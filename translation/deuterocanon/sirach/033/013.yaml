lexical_decisions:
- source_word: συνάγαγε
  chosen: Gather
  alternatives:
  - Assemble
  - Bring together
  lexicon: LSJ
  rationale: Aorist imperative of συνάγω, naturally rendered as a direct command.
    'Gather' is concise and idiomatic while preserving the imperative force.
- source_word: πάσας
  chosen: all
  alternatives:
  - every
  lexicon: LSJ
  rationale: πάσας modifies φυλάς comprehensively. 'All' is the most natural English
    equivalent here.
- source_word: φυλάς
  chosen: tribes
  alternatives:
  - clans
  lexicon: LSJ
  rationale: In biblical ethnic/Israelite context, φυλή is standardly 'tribe.' 'Clans'
    would understate the established covenantal-tribal sense.
- source_word: Ἰακώβ
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: LSJ
  rationale: The Greek text explicitly reads Ἰακώβ. Retaining 'Jacob' preserves the
    source wording and the ancestral reference behind the tribal designation.
