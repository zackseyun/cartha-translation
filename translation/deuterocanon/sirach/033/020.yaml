translation:
  text: To son and wife, to brother and friend, do not give authority over yourself
    during your lifetime; and do not give your property to another, lest you regret
    it and have to plead for it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not give control over yourself.' The Greek speaks of granting ἐξουσία,
      authority or power, over oneself.
    reason: lexical_alternative
  - marker: b
    text: Or 'your possessions' or 'your money.' The Greek χρήματα can refer broadly
      to property, goods, or money.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'lest, having regretted it, you be in need concerning them.'
      The sense is that after giving away your assets, you may have to ask for them
      back.
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱῷ
  chosen: son
  alternatives:
  - child
  lexicon: LSJ
  rationale: The Greek is specifically masculine singular, 'son,' not a gender-neutral
    term. Following the project's gender-accurate principle, 'son' is retained.
- source_word: γυναικί
  chosen: wife
  alternatives:
  - woman
  lexicon: LSJ
  rationale: In this household-relational list, 'wife' best fits the social context
    and the common sense of γυνή when contrasted with son, brother, and friend.
- source_word: ἀδελφῷ
  chosen: brother
  alternatives:
  - sibling
  lexicon: LSJ
  rationale: The Greek is masculine singular and should be rendered straightforwardly
    as 'brother' rather than neutralized.
- source_word: φίλῳ
  chosen: friend
  alternatives:
  - companion
  lexicon: LSJ
  rationale: '''Friend'' is the plain and natural rendering in this relational list.'
- source_word: μὴ δῷς ἐξουσίαν ἐπὶ σέ
  chosen: do not give authority over yourself
  alternatives:
  - do not hand over power over yourself
  - do not give control over yourself
  lexicon: LSJ
  rationale: ἐξουσία denotes authority, right, or power. With ἐπὶ σέ, the sense is
    granting someone governing power over one's own person or affairs. 'Authority
    over yourself' preserves the formal structure while remaining idiomatic.
- source_word: ἐν ζωῇ σου
  chosen: during your lifetime
  alternatives:
  - in your life
  - while you live
  lexicon: LSJ
  rationale: This phrase marks the temporal scope of the warning. 'During your lifetime'
    is clear modern English and captures the force well.
- source_word: ἑτέρῳ
  chosen: another
  alternatives:
  - someone else
  - a different person
  lexicon: LSJ
  rationale: The indefinite dative is naturally rendered 'to another' here.
- source_word: τὰ χρήματά σου
  chosen: your property
  alternatives:
  - your possessions
  - your money
  - your goods
  lexicon: LSJ
  rationale: χρήματα can mean money, goods, or property broadly. Because the warning
    concerns handing over one's assets in a general sense, 'property' best captures
    the breadth without narrowing it to cash alone.
- source_word: ἵνα μὴ μεταμεληθεὶς
  chosen: lest you regret it
  alternatives:
  - so that you may not later regret it
  - lest, having changed your mind
  lexicon: LSJ
  rationale: μεταμέλομαι commonly means to regret or change one's mind afterward.
    In context, the practical sense is future regret over having transferred one's
    assets.
- source_word: δέῃ περὶ αὐτῶν
  chosen: have to plead for it
  alternatives:
  - be in need concerning them
  - have to ask for them back
  - beg for them
  lexicon: LSJ
  rationale: δέω in this form here conveys being in need and thus having to ask or
    plead concerning the transferred possessions. 'Have to plead for it' communicates
    the humiliating dependence implied by the warning. The singular 'it' in English
    refers collectively to the property just mentioned.
