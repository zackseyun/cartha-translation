translation:
  text: Be on guard against an evildoer, for he devises evil, lest he bring disgrace
    upon you forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Beware of an evildoer, for he plots wicked things, lest he give you
      reproach forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόσεχε
  chosen: Be on guard
  alternatives:
  - Beware
  - Pay attention
  lexicon: LSJ
  rationale: Imperative of προσέχω here carries the sense of being cautious or watchful
    toward someone, not merely paying attention. 'Be on guard' captures the warning
    force in natural English.
- source_word: ἀπὸ κακούργου
  chosen: against a wrongdoer
  alternatives:
  - from an evildoer
  - from a criminal
  lexicon: LSJ
  rationale: κακοῦργος denotes a bad or harmful person, one who does evil. 'Wrongdoer'
    is broad and readable, fitting wisdom-context moral warning better than the narrower
    'criminal.' The preposition ἀπό with πρόσεχε is represented idiomatically as 'against'
    in English.
- source_word: πονηρὰ
  chosen: evil
  alternatives:
  - wicked things
  - harmful things
  lexicon: LSJ
  rationale: 'Neuter plural used substantivally: the person devises evil things or
    evil schemes. ''Evil'' is concise and preserves the moral force.'
- source_word: τεκταίνεται
  chosen: devises
  alternatives:
  - plots
  - contrives
  - crafts
  lexicon: LSJ
  rationale: The verb suggests skillful contrivance or scheming. 'Devises' preserves
    intentional planning without over-specifying covert conspiracy, though 'plots'
    is a close alternative.
- source_word: μή ποτε
  chosen: lest
  alternatives:
  - so that he may not
  - in case
  lexicon: LSJ
  rationale: Introduces a warning about possible consequence. 'Lest' is concise and
    fits English wisdom style without becoming archaic in this context.
- source_word: μῶμον
  chosen: disgrace
  alternatives:
  - blame
  - reproach
  - stain
  lexicon: LSJ
  rationale: μῶμος can mean blame, reproach, or blemish. In context of what a wrongdoer
    may bring upon someone, 'disgrace' communicates public reproach or damaging dishonor
    in idiomatic English.
- source_word: εἰς τὸν αἰῶνα
  chosen: ever
  alternatives:
  - forever
  - for all time
  lexicon: LSJ
  rationale: Literally 'into the age/forever,' but in this warning context it likely
    intensifies the enduring nature of the reproach. 'Ever' fits the idiom 'bring
    disgrace upon you' and avoids overstating metaphysical perpetuity while preserving
    the force.
- source_word: δῷ σοι
  chosen: bring upon you
  alternatives:
  - give you
  - inflict on you
  lexicon: LSJ
  rationale: Though literally 'give to you,' English idiom with μῶμον is better expressed
    as 'bring upon you' to convey causing reproach or disgrace.
