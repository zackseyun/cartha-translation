id: SIR.33.34
reference: Sirach 33:34
source:
  edition: lxx-swete-1909
  text: πρόσεχε ἀπὸ κακούργου, πονηρὰ γὰρ τεκταίνεται, μή ποτε μῶμον εἰς τὸν αἰῶνα
    δῷ σοι.
