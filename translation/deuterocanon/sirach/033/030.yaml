theological_decisions:
- issue: Ethically difficult slave-discipline language in Sirach
  chosen_reading: Retain the text's direct instructions about labor, obedience, and
    fetters without softening them into generic service language.
  alternative_readings:
  - Render more euphemistically with 'servant' and 'restraint'
  rationale: The Greek plainly speaks of coercive labor and physical restraint. In
    keeping with original-language primacy and transparency, the translation should
    not mute the social reality of the text, even where it is morally difficult for
    modern readers.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    readable modern English, not paraphrase'
- issue: Meaning of 'all flesh' in the admonition clause
  chosen_reading: Translate literally as 'any flesh' in the main text, preserving
    the anthropological wording.
  alternative_readings:
  - any person
  - any human being
  rationale: Although the phrase idiomatically refers to human beings, the Greek uses
    σάρξ. Preserving 'flesh' keeps the source wording and the tension between stern
    discipline and the warning against excess toward human beings generally.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms'
