translation:
  text: Set him to work as is fitting for him, and if he does not obey discipline,
    make his fetters heavy; but do not be excessive with any flesh, and do nothing
    without judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be excessive with anyone'; Greek 'with any flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἔργα κατάστησον
  chosen: Set him to work
  alternatives:
  - appoint him to tasks
  - put him to labor
  lexicon: LSJ
  rationale: The phrase combines appointment/placement (καθίστημι) with work/tasks
    (ἔργα). 'Set him to work' is idiomatic modern English that preserves the directive
    force without over-paraphrasing.
- source_word: καθὼς πρέπει αὐτῷ
  chosen: as is fitting for him
  alternatives:
  - as is appropriate for him
  - as befits him
  lexicon: LSJ
  rationale: πρέπει conveys what is proper or suitable. 'As is fitting for him' keeps
    the moral/practical sense of suitability in readable English.
- source_word: κἂν μὴ πειθαρχῇ
  chosen: if he does not obey discipline
  alternatives:
  - if he is not obedient
  - if he refuses instruction
  lexicon: LSJ
  rationale: πειθαρχέω is more than generic hearing; it denotes obedience to rule,
    authority, or discipline. 'Obey discipline' preserves that nuance better than
    the flatter 'obey' alone.
- source_word: βάρυνον τὰς πέδας αὐτοῦ
  chosen: make his fetters heavy
  alternatives:
  - weigh down his shackles
  - tighten his chains
  lexicon: LSJ
  rationale: πέδαι are fetters/shackles for restraint. 'Make his fetters heavy' is
    a close rendering of βάρυνον while avoiding interpretive expansion beyond the
    Greek.
- source_word: μὴ περισσεύσῃς
  chosen: do not be excessive
  alternatives:
  - do not go too far
  - do not overdo it
  lexicon: LSJ
  rationale: περισσεύω can mean abound or exceed. In this prohibitive context, the
    sense is exceeding proper measure. 'Do not be excessive' captures the warning
    against overreach.
- source_word: ἐν πάσῃ σαρκί
  chosen: with any flesh
  alternatives:
  - with anyone
  - toward any human being
  lexicon: LSJ
  rationale: σάρξ literally means 'flesh.' Here it functions idiomatically for human
    beings, but the Greek wording is concrete. 'With any flesh' preserves the source
    texture while remaining intelligible; a footnote preserves the more idiomatic
    alternative.
- source_word: ἄνευ κρίσεως
  chosen: without judgment
  alternatives:
  - without due judgment
  - without discernment
  lexicon: LSJ
  rationale: κρίσις here denotes judgment, decision, or discernment. 'Without judgment'
    is concise and faithful, allowing the ethical sense of acting without proper consideration.
- source_word: μὴ ποιήσῃς μηδέν
  chosen: do nothing
  alternatives:
  - do not do anything
  - do nothing at all
  lexicon: LSJ
  rationale: The double-negative prohibition is naturally rendered in English as 'do
    nothing.' This preserves the absolute force of the command.
