id: SIR.33.37
reference: Sirach 33:37
source:
  edition: lxx-swete-1909
  text: ὅταν κτήσῃ φίλον, ἐν πειρασμῷ κτῆσαι αὐτόν, καὶ μὴ ταχὺ ἐμπιστεύσῃς αὐτῷ.
  language: Greek
  pages:
  - 681
  - 722
  - 724
  - 725
  - 729
  - 732
  - 733
  - 744
  - 767
  - 768
  - 769
  validation: no_reference
translation:
  text: When you acquire a friend, acquire him through testing, and do not quickly
    put your trust in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acquire him in a time of testing' or 'gain him by trial.' The Greek
      phrase ἐν πειρασμῷ can be rendered in several closely related ways.
    reason: lexical_alternative
lexical_decisions:
- source_word: κτήσῃ
  chosen: acquire
  alternatives:
  - gain
  - make
  lexicon: LSJ
  rationale: κτάομαι commonly means to acquire or gain possession of. In this wisdom
    context, 'acquire a friend' preserves the deliberate, formal sense of entering
    friendship without flattening it to the more idiomatic but less literal 'make
    a friend.'
- source_word: φίλον
  chosen: friend
  lexicon: LSJ
  rationale: The direct object is singular 'friend.' This is straightforward and should
    remain singular in English.
- source_word: ἐν πειρασμῷ
  chosen: through testing
  alternatives:
  - in a test
  - in trial
  - by trial
  lexicon: BDAG
  rationale: πειρασμός can denote testing, trial, or temptation depending on context.
    Here the wisdom setting concerns proving a person's reliability, so 'through testing'
    communicates means and purpose naturally in English while staying close to the
    Greek.
- source_word: κτῆσαι
  chosen: acquire
  alternatives:
  - gain
  - secure
  lexicon: LSJ
  rationale: Repeating 'acquire' reflects the Greek repetition of κτάομαι and preserves
    the proverb-like force of the line.
- source_word: μὴ ταχὺ
  chosen: do not quickly
  alternatives:
  - not hastily
  - do not soon
  lexicon: LSJ
  rationale: ταχὺ modifies the trusting action with the sense of haste. 'Do not quickly'
    is clear modern English and preserves the warning against premature confidence.
- source_word: ἐμπιστεύσῃς
  chosen: put your trust in
  alternatives:
  - trust
  - confide in
  lexicon: BDAG
  rationale: ἐμπιστεύω means to trust or place confidence in. 'Put your trust in'
    slightly expands the English to make the dative construction natural and to preserve
    the relational weight of the warning.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - that person
  lexicon: Greek grammar
  rationale: The Greek is grammatically masculine singular. Per project philosophy,
    the translation remains gender-accurate rather than neutralized.
