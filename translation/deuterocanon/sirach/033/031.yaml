translation:
  text: If you have a slave, let him be as yourself, because you acquired him with
    blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' or 'household servant'; the Greek οἰκέτης often refers to a
      member of the household staff, but here the context of acquisition makes the
      bonded sense prominent.
    reason: lexical_alternative
  - marker: b
    text: Literally 'because with blood you acquired him.' The phrase likely expresses
      costly acquisition rather than specifying whose blood is in view.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκέτης
  chosen: slave
  alternatives:
  - servant
  - household servant
  lexicon: BDAG
  rationale: Although οἰκέτης can denote a household servant, in this context the
    person is one whom the master 'acquired' (ἐκτήσω), which makes the bonded status
    salient. Per project doctrine on context-dependent rendering of servitude terms,
    'slave' best preserves the social reality rather than softening it to 'servant'.
- source_word: ἔστω ὡς σύ
  chosen: let him be as yourself
  alternatives:
  - let him be like you
  - treat him as yourself
  lexicon: LSJ
  rationale: 'The Greek is literally existential/imperatival: ''let him be as you.''
    This can imply treatment, but the wording is more direct than an interpretive
    expansion such as ''treat him as yourself.'' The chosen rendering stays close
    to the Greek while remaining idiomatic.'
- source_word: ἐν αἵματι
  chosen: with blood
  alternatives:
  - at the cost of blood
  - with your lifeblood
  lexicon: LSJ
  rationale: The phrase is literally 'in/with blood.' In context it likely refers
    to costly acquisition, possibly at risk to life or with great personal cost. 'With
    blood' preserves the vivid metaphor without over-interpreting whose blood is meant.
- source_word: ἐκτήσω
  chosen: you acquired
  alternatives:
  - you bought
  - you gained
  - you obtained
  lexicon: BDAG
  rationale: '''Acquired'' is broad enough to reflect κτάομαι without forcing a strictly
    commercial nuance, while still fitting the ownership context. ''Bought'' is possible,
    but the Greek itself does not explicitly specify purchase money.'
