theological_decisions:
- issue: Rendering of the divine name יְהֹוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the suffix in וְתוֹרָתוֹ
  chosen_reading: his instruction (the discerning man's instruction)
  alternative_readings:
  - his law (the LORD's law/instruction)
  rationale: The immediate Hebrew syntax most naturally points to the previously mentioned 'discerning man.' However, because the phrase could be heard as referring back to the LORD, the alternative is preserved in a footnote. This also honestly reflects source-level uncertainty, especially given the major mismatch with the Greek parallel.
