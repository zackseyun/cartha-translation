translation:
  text: Just as you were sanctified among us before them, so also be magnified among
    them before us;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you were shown holy among us in their sight.' The Greek passive 'you
      were sanctified' is a biblical idiom for God being acknowledged as holy.
    reason: lexical_alternative
  - marker: b
    text: 'The final verb is an optative of wish: ''may you be magnified'' is also
      possible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: LSJ
  rationale: Introduces a comparison that is completed by οὕτως; 'just as' preserves
    the formal parallel clearly in modern English.
- source_word: ἐνώπιον αὐτῶν
  chosen: before them
  alternatives:
  - in their sight
  - in their presence
  lexicon: BDAG
  rationale: The phrase denotes being in someone's presence or sight. 'Before them'
    is concise and preserves the relational symmetry with ἐναντίον ἡμῶν later in the
    verse.
- source_word: ἡγιάσθης
  chosen: you were sanctified
  alternatives:
  - you were shown holy
  - you were hallowed
  lexicon: BDAG
  rationale: Aorist passive of ἁγιάζω. In context addressed to God, the sense is not
    that God became holy, but that God was acknowledged or displayed as holy. 'Were
    sanctified' keeps the source wording transparent, while the theological note explains
    the idiomatic force.
- source_word: ἐν ἡμῖν
  chosen: among us
  alternatives:
  - in us
  - through us
  lexicon: BDAG
  rationale: With persons as object, ἐν can indicate sphere or location within a community.
    'Among us' is the most natural English here and fits the communal setting.
- source_word: οὕτως
  chosen: so also
  alternatives:
  - so
  - thus
  lexicon: LSJ
  rationale: Marks the apodosis of the comparison. 'So also' makes the balancing structure
    explicit in English.
- source_word: ἐναντίον ἡμῶν
  chosen: before us
  alternatives:
  - in our sight
  - in our presence
  lexicon: BDAG
  rationale: Like ἐνώπιον, this phrase indicates presence/sight. 'Before us' preserves
    the parallelism and avoids over-interpretation.
- source_word: μεγαλυνθείης
  chosen: be magnified
  alternatives:
  - be exalted
  - show yourself great
  - be glorified
  lexicon: BDAG
  rationale: Optative passive of μεγαλύνω, here functioning as a wish/prayer. 'Be
    magnified' preserves the liturgical and doxological tone without importing a stronger
    interpretive gloss like 'glorified.'
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - in them
  - through them
  lexicon: BDAG
  rationale: Parallel to ἐν ἡμῖν. 'Among them' best conveys manifestation within a
    people group rather than inward transformation of individuals.
