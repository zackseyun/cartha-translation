theological_decisions:
- issue: Predication of holiness to God in ἡγιάσθης
  chosen_reading: Retain the literal passive 'you were sanctified' in the main text,
    understood as 'you were shown/acknowledged as holy.'
  alternative_readings:
  - you were shown holy
  - you were hallowed
  rationale: Because the addressee is God, the verb cannot imply that God became holy.
    The Greek passive reflects biblical idiom in which God is sanctified by being
    recognized as holy before the nations. The main text keeps the source-language
    form transparent while allowing the idiomatic sense to be explained in documentation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
- issue: Force of μεγαλυνθείης
  chosen_reading: 'Render as a prayer-wish: ''be magnified.'''
  alternative_readings:
  - may you be magnified
  - be exalted
  rationale: The optative expresses a wish or petition. English can convey this either
    with 'may' or with a jussive-style 'be.' The shorter 'be magnified' preserves
    the elevated prayer tone and matches the verse's parallelism.
  doctrine_reference: 'DOCTRINE.md: Readable modern English, not archaic or academic.'
