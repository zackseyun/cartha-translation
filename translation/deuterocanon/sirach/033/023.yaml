translation:
  text: In all your works be preeminent; do not give a blemish to your honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be surpassing/exceling' for 'be outstanding.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not bring a blemish upon your reputation/glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πᾶσι τοῖς ἔργοις σου
  chosen: In all your works
  alternatives:
  - In all your deeds
  - In everything you do
  lexicon: LSJ
  rationale: ἔργα commonly means works/deeds. 'Works' stays closer to the Greek while
    remaining natural English; the phrase is comprehensive because of πᾶσι.
- source_word: γίνου
  chosen: be
  alternatives:
  - become
  - prove yourself
  lexicon: LSJ
  rationale: Present middle imperative of γίνομαι here functions idiomatically as
    an exhortation to conduct oneself in a certain way. 'Be' is the most natural imperative
    in English.
- source_word: ὑπεράγων
  chosen: outstanding
  alternatives:
  - surpassing
  - exceling
  - superior
  lexicon: LSJ
  rationale: The participial/adjectival sense conveys excelling beyond the ordinary.
    'Outstanding' captures the commendatory force in idiomatic modern English without
    sounding overly comparative or wooden.
- source_word: μὴ δῷς
  chosen: do not give
  alternatives:
  - do not bring
  - do not allow
  lexicon: LSJ
  rationale: The aorist subjunctive with μή gives a prohibition. 'Do not give' is
    formally close to the Greek and works with the object μῶμον.
- source_word: μῶμον
  chosen: a blemish
  alternatives:
  - a stain
  - fault
  - disgrace
  lexicon: LSJ
  rationale: μῶμος/μῶμον denotes blame, blemish, or reproach. 'Blemish' preserves
    the concrete metaphor and fits the honor/shame context; 'disgrace' is interpretive
    and stronger.
- source_word: ἐν τῇ δόξῃ σου
  chosen: to your honor
  alternatives:
  - in your glory
  - upon your reputation
  lexicon: LSJ
  rationale: δόξα can mean glory, honor, or reputation. In this wisdom context about
    personal conduct, 'honor' best conveys social esteem without over-theologizing
    'glory.' The preposition is rendered idiomatically in English as 'to' rather than
    a wooden 'in.'
