id: SIR.33.21
reference: Sirach 33:21
source:
  edition: lxx-swete-1909
  text: ἕως ἔτι ζῇς καὶ πνοὴ ἐν σοί, μὴ ἀλλάξῃς σεαυτὸν πάσῃ σαρκί.
  language: Greek
  pages:
