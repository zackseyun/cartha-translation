- issue: Rendering servile status in οἰκέτῃ
  chosen_reading: slave
  alternative_readings:
  - servant
  - household servant
  rationale: The verse concerns coercive restraint and punishment; the bonded nature
    of the person's status is contextually salient. Following the project's doctrine
    on servile terminology, 'slave' is preferred where that social reality matters.
