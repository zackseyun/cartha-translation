translation:
  text: A yoke and a strap will bend the neck, and for a wicked slave there are racks
    and tortures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' or 'household servant' for Greek οἰκέτῃ; the main text uses
      'slave' because the context emphasizes bonded status and coercive discipline.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζυγός
  chosen: yoke
  alternatives:
  - balance
  - pair of scales
  lexicon: LSJ
  rationale: In this context with bending the neck, the concrete sense 'yoke' is plainly
    intended rather than an instrument for weighing.
- source_word: ἱμάς
  chosen: strap
  alternatives:
  - thong
  - lash
  lexicon: LSJ
  rationale: The word denotes a leather strap or thong. 'Strap' is clear modern English
    and fits the image of restraint alongside 'yoke'.
- source_word: κάμψουσιν
  chosen: will bend
  alternatives:
  - will bow
  - will force down
  lexicon: LSJ
  rationale: Future active plural from κάμπτω. 'Will bend' preserves the physical
    image without overinterpreting the degree of coercion.
- source_word: τράχηλον
  chosen: the neck
  alternatives:
  - a neck
  lexicon: LSJ
  rationale: The singular object is generic; English idiom naturally uses 'the neck'
    for a representative statement.
- source_word: οἰκέτῃ
  chosen: slave
  alternatives:
  - servant
  - household servant
  lexicon: BDAG
  rationale: Although οἰκέτης can denote a household servant, the context is coercive
    discipline and bonded status is salient. Per project philosophy on δουλος-related
    servile terms, 'slave' better preserves the social reality than the softer 'servant'.
- source_word: κακούργῳ
  chosen: wicked
  alternatives:
  - criminal
  - evildoing
  - bad
  lexicon: LSJ
  rationale: As an attributive adjective modifying οἰκέτῃ, it characterizes the slave
    as morally bad or troublesome. 'Wicked' is concise and weighty without narrowing
    to a legal category like 'criminal'.
- source_word: στρέβλαι
  chosen: racks
  alternatives:
  - torture-racks
  - twistings
  lexicon: LSJ
  rationale: The noun refers to instruments of torture, especially the rack. 'Racks'
    keeps the concrete plural and avoids paraphrase.
- source_word: βάσανοι
  chosen: tortures
  alternatives:
  - torments
  - punishments
  lexicon: LSJ
  rationale: The term commonly denotes torture or severe torment. 'Tortures' preserves
    the harshness of the Greek and distinguishes it from ordinary punishment.
