id: SIR.33.39
reference: Sirach 33:39
source:
  edition: lxx-swete-1909
  text: καὶ ἔστιν φίλος μεταβαλλόμενος εἰς ἔχθραν, καὶ μάχην ὀνειδισμοῦ σου ἀποκαλύψει.
  language: Greek
  pages:
  - 681
  - 722
  - 724
  - 725
  - 729
  - 732
  - 733
  - 744
  - 767
  - 768
  - 769
  validation: no_reference
translation:
  text: And there is a friend who changes into enmity, and he will expose a quarrel
    to your disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turns into hostility'; the Greek uses the abstract noun 'enmity' rather
      than 'enemy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will reveal a quarrel as a reproach against you.' The Greek phrase
      is compact and may emphasize either the quarrel itself or the disgrace it brings.
    reason: alternative_reading
lexical_decisions:
- source_word: φίλος
  chosen: friend
  alternatives:
  - companion
  lexicon: LSJ
  rationale: The ordinary sense is a personal friend or companion. 'Friend' best matches
    the relational force in context.
- source_word: μεταβαλλόμενος
  chosen: changes into
  alternatives:
  - turns into
  - is altered into
  - becomes
  lexicon: LSJ
  rationale: The participle conveys change of state. 'Changes into' preserves the
    processive sense without over-paraphrase.
- source_word: εἰς ἔχθραν
  chosen: into enmity
  alternatives:
  - into hostility
  - into hatred
  - into an enemy
  lexicon: LSJ
  rationale: The Greek noun is abstract ('enmity/hostility'), not the personal noun
    'enemy.' 'Into enmity' keeps the source form, though English is slightly less
    idiomatic.
- source_word: μάχην
  chosen: a quarrel
  alternatives:
  - a fight
  - strife
  - contention
  lexicon: LSJ
  rationale: In wisdom context this likely refers to a dispute or conflict rather
    than literal combat. 'Quarrel' is natural modern English and fits the social setting.
- source_word: ὀνειδισμοῦ
  chosen: to your disgrace
  alternatives:
  - of your reproach
  - for your shame
  - as a reproach against you
  lexicon: LSJ
  rationale: The genitive can denote the reproachful or shameful character of the
    exposed quarrel. 'To your disgrace' communicates the result in idiomatic English
    while preserving the dishonor motif.
- source_word: ἀποκαλύψει
  chosen: he will expose
  alternatives:
  - he will reveal
  - he will uncover
  - he will disclose
  lexicon: LSJ
  rationale: The verb means to uncover or reveal. 'Expose' fits the hostile context,
    suggesting disclosure that brings shame.
