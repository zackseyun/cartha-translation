translation:
  text: For there is a friend in his own time, and he will certainly not remain in
    the day of your distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there is a friend for a time' or 'when it suits him,' highlighting
      the idea of friendship that lasts only under favorable conditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: φίλος
  chosen: friend
  alternatives:
  - companion
  lexicon: BDAG
  rationale: The ordinary sense is a personal friend or companion. 'Friend' is the
    most natural and direct English equivalent here.
- source_word: ἐν καιρῷ αὐτοῦ
  chosen: in his own time
  alternatives:
  - at his time
  - when it suits him
  - for a time
  lexicon: BDAG
  rationale: καιρός denotes a fitting or appointed time. With αὐτοῦ, the phrase most
    naturally points to the friend's own favorable time or occasion. 'In his own time'
    preserves the ambiguity without over-interpreting it as purely selfish, though
    the context suggests conditional friendship.
- source_word: οὐ μὴ παραμείνῃ
  chosen: he will certainly not remain
  alternatives:
  - he will by no means stay
  - he will not continue
  lexicon: BDAG
  rationale: οὐ μή with the subjunctive is an emphatic negation. 'Will certainly not
    remain' captures both the future force and the strong denial.
- source_word: ἐν ἡμέρᾳ θλίψεώς σου
  chosen: in the day of your distress
  alternatives:
  - in the day of your affliction
  - when you are in trouble
  lexicon: BDAG
  rationale: θλῖψις commonly denotes distress, affliction, or trouble. 'Distress'
    is clear modern English and preserves the gravity of the term; 'day of your distress'
    keeps the idiomatic temporal expression.
