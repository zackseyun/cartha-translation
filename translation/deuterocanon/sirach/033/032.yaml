translation:
  text: On the day the days of your life are completed, and at the time of death,
    give an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'in the day of the completion of the days of your life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἡμέρᾳ
  chosen: On the day
  alternatives:
  - In the day
  - At the day
  lexicon: LSJ
  rationale: The preposition ἐν with a temporal dative is naturally rendered in English
    as 'on' or 'at.' 'On the day' is idiomatic and preserves the temporal specificity
    of the Greek.
- source_word: συντελείας
  chosen: are completed
  alternatives:
  - come to an end
  - fulfillment
  - consummation
  lexicon: LSJ
  rationale: The noun means completion or consummation. In the phrase 'day of the
    completion of the days of your life,' a more natural English restructuring is
    needed. Rendering the sense verbally as 'are completed' preserves the meaning
    without wooden awkwardness.
- source_word: ἡμερῶν ζωῆς σου
  chosen: your life's days
  alternatives:
  - the days of your life
  - your days of life
  lexicon: LSJ
  rationale: The genitive chain literally means 'the days of your life.' 'Your life's
    days' is concise and keeps the Hebrew-like idiom, though still understandable
    in English.
- source_word: καιρῷ τελευτῆς
  chosen: the time of death
  alternatives:
  - the time of your end
  - the season of death
  - the time of departure
  lexicon: LSJ
  rationale: καιρός here is a fitting or appointed time, and τελευτή commonly means
    end or death. 'The time of death' is the clearest direct rendering in context.
- source_word: διδὸς
  chosen: give
  alternatives:
  - grant
  - bestow
  - distribute
  lexicon: LSJ
  rationale: The imperative is straightforward. 'Give' is simple, direct, and broad
    enough to cover the legal/familial act implied by the object.
- source_word: κληρονομίαν
  chosen: an inheritance
  alternatives:
  - the inheritance
  - a legacy
  - property allotment
  lexicon: LSJ
  rationale: κληρονομία denotes inheritance or hereditary property. 'An inheritance'
    is the most transparent English equivalent. The anarthrous Greek does not require
    'the inheritance,' and the indefinite English reads naturally as an instruction
    to make one's bequest.
