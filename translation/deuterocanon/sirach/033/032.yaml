theological_decisions:
- issue: Whether κληρονομίαν should be rendered with a more interpretive term like
    'legacy' or retained as the more concrete 'inheritance.'
  chosen_reading: an inheritance
  alternative_readings:
  - a legacy
  rationale: The verse gives practical wisdom about disposition of property at life's
    end. 'Inheritance' preserves the legal/familial concreteness of the Greek without
    importing broader metaphorical overtones.
