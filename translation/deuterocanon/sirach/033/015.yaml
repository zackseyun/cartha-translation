id: SIR.33.15
reference: Sirach 33:15
source:
  edition: lxx-swete-1909
  text: καὶ οὕτως ἔμβλεψον εἰς πάντα τὰ ἔργα τοῦ ὑψίστου, δύο δύο, ἓν κατέναντι τοῦ
    ἑνός.
  language: Greek
  pages:
  - 681
  - 722
  - 724
  - 725
  - 728
  - 729
  - 732
  - 733
  - 744
  - 767
