  confidence: high
  validation: no_reference
translation:
  text: 'And so look at all the works of the Most High: two by two, one opposite the
    other.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one corresponding to the other.' The Greek can express either opposition
      or matched correspondence; the context of paired contrasts supports the main
      rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔμβλεψον
  chosen: look at
  alternatives:
  - consider
  - observe
  - behold
  lexicon: LSJ
  rationale: The imperative calls for directed attention. 'Look at' is natural modern
    English and preserves the visual/examining force without sounding archaic like
    'behold.'
- source_word: πάντα τὰ ἔργα
  chosen: all the works
  alternatives:
  - all the deeds
  - everything that has been made
  lexicon: LSJ
  rationale: ἔργα here refers broadly to the Most High's works or productions. 'Works'
    keeps the breadth and echoes wisdom-language about God's ordered creation and
    acts.
- source_word: τοῦ ὑψίστου
  chosen: of the Most High
  alternatives:
  - of the Highest
  lexicon: LSJ
  rationale: ὁ ὕψιστος is a standard divine title. 'The Most High' is the established
    and clear English equivalent.
- source_word: δύο δύο
  chosen: two by two
  alternatives:
  - in pairs
  - two and two
  lexicon: LSJ
  rationale: The distributive repetition naturally conveys pairing. 'Two by two' is
    idiomatic and preserves the repetitive structure better than the more interpretive
    'in pairs.'
- source_word: ἓν κατέναντι τοῦ ἑνός
  chosen: one opposite the other
  alternatives:
  - one corresponding to the other
  - one over against the other
  - one facing the other
  lexicon: LSJ
  rationale: κατέναντι conveys opposition, correspondence, or being set over against.
    'One opposite the other' best preserves the antithetical/paired arrangement in
    context without over-interpreting it as mere similarity.
