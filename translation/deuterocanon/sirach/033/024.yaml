translation:
  text: On the day your life comes to its end, and at the time of death, distribute
    your inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the completion of the days of your life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἡμέρᾳ
  chosen: On the day
  alternatives:
  - In the day
  - At the day
  lexicon: LSJ
  rationale: A natural temporal rendering of ἐν with the dative; 'on the day' is idiomatic
    English and preserves the specific time reference.
- source_word: συντελείας
  chosen: comes to its end
  alternatives:
  - completion
  - consummation
  - end
  lexicon: LSJ
  rationale: The noun denotes completion or bringing to an end. In context with 'days
    of your life,' an English verbal phrase communicates the sense clearly without
    sounding wooden.
- source_word: ἡμερῶν ζωῆς σου
  chosen: your life
  alternatives:
  - the days of your life
  - your lifetime
  lexicon: LSJ
  rationale: Literally 'the days of your life.' Because English commonly compresses
    this idiom, 'your life' gives the same sense smoothly. The preceding phrase 'comes
    to its end' still reflects the plural-days idiom implicitly.
- source_word: καιρῷ
  chosen: time
  alternatives:
  - season
  - appointed time
  lexicon: LSJ
  rationale: Here καιρός marks a fitting or appointed time. 'Time' is the most natural
    English choice in this context.
- source_word: τελευτῆς
  chosen: death
  alternatives:
  - end
  - departure
  lexicon: LSJ
  rationale: In this context τελευτή refers concretely to death, not merely an abstract
    ending. 'Death' makes the sense explicit and matches the parallelism with the
    end of life.
- source_word: διάδος
  chosen: distribute
  alternatives:
  - give
  - apportion
  - hand over
  lexicon: LSJ
  rationale: As an imperative from διαδίδωμι, the verb suggests giving out or distributing.
    'Distribute' fits the object 'inheritance' and the context of assigning property
    at life's end.
- source_word: κληρονομίαν
  chosen: inheritance
  alternatives:
  - estate
  - property allotment
  - heritage
  lexicon: LSJ
  rationale: The term denotes inherited property or an inheritance portion. 'Inheritance'
    is the most direct and standard rendering, while also fitting the legal/familial
    context.
