lexical_decisions:
- source_word: ἔγειρον
  chosen: Stir up
  alternatives:
  - Raise up
  - Arouse
  - Awaken
  lexicon: LSJ
  rationale: Imperative from ἐγείρω. In this context with θυμός, the sense is to rouse
    or provoke into active expression rather than literally 'raise.' 'Stir up' is
    idiomatic modern English and preserves the imperative force.
- source_word: θυμόν
  chosen: anger
  alternatives:
  - fury
  - passion
  - rage
  lexicon: LSJ
  rationale: θυμός can denote anger, spiritedness, or wrathful passion. Here paired
    with ὀργή in a parallel command, 'anger' keeps the distinction without over-intensifying
    both terms. 'Fury' would make the two nouns too synonymous in English.
- source_word: ἔκχεον
  chosen: pour out
  alternatives:
  - spill out
  - shed
  lexicon: LSJ
  rationale: Imperative from ἐκχέω, commonly 'pour out.' This is the natural English
    equivalent and preserves the vivid metaphor of wrath being discharged like liquid.
- source_word: ὀργήν
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: LSJ
  rationale: ὀργή often denotes settled or expressed anger. Rendering it 'wrath' differentiates
    it from θυμός in the same line and preserves the elevated moral force of the term.
