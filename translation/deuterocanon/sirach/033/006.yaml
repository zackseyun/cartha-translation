lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: LSJ
  rationale: Introduces the ground or reason for the petition; 'For' fits natural
    English while preserving the causal force.
- source_word: θεὸς
  chosen: God
  alternatives:
  - god
  lexicon: LSJ
  rationale: Anarthrous predicate with monotheistic force in context; capitalized
    'God' reflects the unique deity addressed.
- source_word: πλὴν σοῦ
  chosen: except you
  alternatives:
  - besides you
  - apart from you
  lexicon: LSJ
  rationale: Expresses exclusive exception. 'Except you' is concise and idiomatic
    in English.
- source_word: Κύριε
  chosen: Lord
  lexicon: LSJ
  rationale: Direct address to God; matches the project's default rendering for κύριος.
- source_word: ἐγκαίνισον
  chosen: Renew
  alternatives:
  - make new
  - dedicate anew
  lexicon: LSJ
  rationale: Imperative asking God to do afresh what he has done before. 'Renew' best
    captures the verbal sense in this prayer context without over-specifying cultic
    dedication.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - tokens
  - portents
  lexicon: LSJ
  rationale: Standard rendering for σημεῖα, especially for divine acts that signify
    God's power.
- source_word: ἀλλοίωσον
  chosen: alter
  alternatives:
  - change
  - transform
  lexicon: LSJ
  rationale: The imperative means to change or make different. 'Alter' preserves the
    verbal distinction from 'renew' in the previous clause and avoids overstating
    the sense as total transformation.
- source_word: θαυμάσια
  chosen: wonders
  alternatives:
  - marvels
  - wonderful deeds
  lexicon: LSJ
  rationale: Refers to extraordinary divine acts. 'Wonders' is the most natural paired
    term with 'signs' in biblical English while remaining accessible.
