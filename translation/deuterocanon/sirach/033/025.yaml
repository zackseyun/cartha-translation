  - a household servant
  rationale: The verse reflects ancient household hierarchy and control. Using 'slave'
    rather than the softer 'servant' better represents the social reality of οἰκέτης
    in many contexts and aligns with the project's guidance to avoid translation-tradition
    softening where bonded status is in view.
