translation:
  text: Fodder and a rod and loads are for a donkey; bread and discipline and work
    are for a slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a household servant.' Greek οἰκέτῃ refers to a member of the household
      in servile status; 'slave' is used here to preserve that bonded sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: χορτάσματα
  chosen: fodder
  alternatives:
  - feed
  - provender
  lexicon: LSJ
  rationale: The plural denotes animal feed/fodder rather than human food. 'Fodder'
    is natural English for what is given to a donkey in this comparison.
- source_word: ῥάβδος
  chosen: rod
  alternatives:
  - staff
  - stick
  lexicon: LSJ
  rationale: The word commonly means rod/staff. In this proverb-like context it likely
    implies corrective control, but 'rod' preserves the concrete image without over-interpreting.
- source_word: φορτία
  chosen: loads
  alternatives:
  - burdens
  - cargo
  lexicon: LSJ
  rationale: The plural refers to what a donkey carries. 'Loads' is idiomatic and
    concrete; 'burdens' could sound more metaphorical than the Greek requires.
- source_word: ὄνῳ
  chosen: a donkey
  alternatives:
  - an ass
  - the donkey
  lexicon: LSJ
  rationale: Dative singular after an implied 'are for.' 'Donkey' is clear modern
    English and avoids archaic 'ass.' The anarthrous Greek is well represented by
    the English indefinite.
- source_word: ἄρτος
  chosen: bread
  alternatives:
  - food
  lexicon: LSJ
  rationale: The Greek specifically says 'bread.' While it can stand for food generally,
    retaining 'bread' preserves the concrete parallelism.
- source_word: παιδεία
  chosen: discipline
  alternatives:
  - instruction
  - training
  - correction
  lexicon: LSJ
  rationale: In this context, paired with bread and work for an οἰκέτης, the term
    includes corrective training/discipline rather than mere education. 'Discipline'
    best fits the household-management saying while preserving the semantic breadth
    of παιδεία.
- source_word: ἔργον
  chosen: work
  alternatives:
  - labor
  - task
  lexicon: LSJ
  rationale: Simple, direct rendering of the noun in a practical household context.
- source_word: οἰκέτῃ
  chosen: a slave
  alternatives:
  - a servant
  - a household servant
  lexicon: LSJ
  rationale: Although οἰκέτης can denote a household servant, it refers to a bonded
    household dependent rather than a free employee. Per project doctrine, 'slave'
    is preferred where bonded status is salient; the household comparison here makes
    that status more explicit than 'servant' would.
