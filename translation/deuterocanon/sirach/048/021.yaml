theological_decisions:
- issue: Divergence between Hebrew and Greek parallel in the second clause
  chosen_reading: 'Follow the Hebrew: ''threw it into confusion with a plague'''
  alternative_readings:
  - 'Follow the Greek: ''his angel destroyed them'''
  rationale: The project prioritizes the surviving Hebrew of Sirach where available.
    Here the Hebrew gives a plague/confusion formulation, while the Greek explicitly
    attributes the destruction to God's angel, echoing the Hezekiah narrative. Because
    the Hebrew is the primary witness for this verse in Zone 1 and is high-confidence,
    the main text follows it, while the Greek's fuller alternative is preserved in
    a footnote.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it
