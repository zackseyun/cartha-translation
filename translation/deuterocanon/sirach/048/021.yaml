lexical_decisions:
- source_word: ויך
  chosen: He struck
  alternatives:
  - He smote
  - He struck down
  lexicon: HALOT
  rationale: The Hebrew verb נכה commonly means 'strike' or 'smite.' 'He struck' is
    clear modern English and preserves the direct, forceful action without archaic
    diction.
- source_word: מחנה אשור
  chosen: the camp of Assyria
  alternatives:
  - the Assyrian camp
  - the camp of the Assyrians
  lexicon: HALOT
  rationale: The construct phrase is most literally 'the camp of Assyria.' This keeps
    the Hebrew wording close while remaining natural in English. The Greek parallel
    has 'the camp of the Assyrians,' which supports the sense.
- source_word: ויהמם
  chosen: threw it into confusion
  alternatives:
  - routed it
  - threw them into panic
  - confounded it
  lexicon: HALOT
  rationale: The verb המם often denotes causing panic, confusion, or discomfiture.
    'Threw it into confusion' captures the causative sense and fits the singular object
    'camp' in the Hebrew. The Greek parallel instead reads 'destroyed them,' likely
    reflecting an interpretive or variant tradition, so the Hebrew sense is preferred
    in the main text.
- source_word: במגפה
  chosen: with a plague
  alternatives:
  - by a plague
  - with pestilence
  lexicon: HALOT
  rationale: מגפה denotes a plague or pestilence. 'With a plague' is straightforward
    and preserves the instrumental sense of the preposition ב.
