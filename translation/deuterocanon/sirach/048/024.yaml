theological_decisions:
- issue: Sense of prophetic inspiration in 'ברוח גבורה'
  chosen_reading: By a spirit of might
  alternative_readings:
  - In a great spirit
  rationale: The Hebrew wording suggests prophetic perception empowered by a spirit
    characterized by might. The Greek parallel's 'in a great spirit' supports a related
    but less specific sense. The main text follows the Hebrew while preserving the
    Greek-shaped alternative in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve ambiguity where genuine.'
