translation:
  text: How fearsome you are, Elijah! And who like you can boast?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''How you were glorified, Elijah, in your wonders; and
      who is like you to boast?'' The Hebrew reads more literally, ''How fearsome
      you are, Elijah,'' which this translation follows.'
    reason: alternative_reading
lexical_decisions:
- source_word: מה נורא
  chosen: How fearsome
  alternatives:
  - How awesome
  - How terrible
  - How glorious
  lexicon: HALOT
  rationale: The Hebrew exclamatory מה with נורא expresses astonished admiration at
    Elijah's awe-inspiring character. 'Fearsome' preserves the element of dread/awe
    better than the more flattened modern 'awesome.' The Greek parallel ὡς ἐδοξάσθης
    ('how you were glorified') points toward exalted admiration, but the Hebrew witness
    is primary here and supports an awe-laden rendering rather than simple 'glorious.'
- source_word: אתה
  chosen: you are
  alternatives:
  - you were
  lexicon: Hebrew grammar
  rationale: The independent pronoun in this verbless exclamation is naturally rendered
    in present English as 'you are.' Although the Greek has an aorist/passive form
    ('you were glorified'), the Hebrew surviving text is primary and does not require
    a past tense.
- source_word: אליהו
  chosen: Elijah
  rationale: Standard English transliteration of the personal name אֵלִיָּהוּ.
- source_word: ואשר כמוך יתפאר
  chosen: And who is there like you, to boast?
  alternatives:
  - And who like you can boast?
  - and who can glory like you?
  - and who is like you in boasting?
  lexicon: HALOT
  rationale: 'The Hebrew as transmitted appears to have אשר where one might expect
    מי, but in context and with support from the Greek parallel καὶ τίς ὅμοιός σοι
    καυχᾶσθαι; the sense is clearly rhetorical: ''who is like you, to boast?'' ''Boast''
    is preferred as the ordinary sense of יתפאר here, while ''glory'' is possible
    but less idiomatic in modern English. The wording preserves the rhetorical force
    without overcorrecting the Hebrew text.'
