  rationale: The project philosophy gives primacy to the original-language witness
    available for Sirach, which here is the surviving Hebrew. The Greek parallel is
    used as an actual input and helps clarify the second colon, especially the rhetorical
    question, but it should not override the Hebrew's distinct nuance נורא ('fearsome,
    awe-inspiring').
