theological_decisions:
- issue: Repentance language in לא שב versus Greek μετενόησεν
  chosen_reading: did not turn back
  alternative_readings:
  - did not repent
  rationale: The Hebrew witness is primary where extant, and שוב should be represented
    with its concrete turning imagery. The Greek confirms the moral-religious sense,
    so the English must not sound merely spatial; 'turn back' preserves both the Hebrew
    metaphor and the repentance idea without over-interpreting.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve ambiguity
    where possible'
- issue: Scope of ארץ in בכל הארץ
  chosen_reading: throughout the earth
  alternative_readings:
  - throughout every land
  - throughout the land
  rationale: In an exile context, the phrase naturally widens beyond a single territory
    to worldwide dispersion. The Greek parallel supports a broad distributive sense.
    The alternative 'throughout every land' is also defensible and is preserved in
    a footnote because English readers may hear 'earth' as global in a modern sense.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve significant alternatives
    in footnotes'
