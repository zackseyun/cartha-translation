id: SIR.48.15
reference: Sirach 48:15
source:
  edition: sefaria-ben-sira-kahana
  text: בכל זאת לא שב העם, ולא חדלו מחטאתם.<br><small>(טו)</small> עד אשר נסחו מארצם,
    ויפוצו בכל הארץ.
  language: Hebrew
  pages:
  - 763
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐν πᾶσιν τούτοις οὐ μετενόησεν ὁ λαός, καὶ οὐκ ἀπέστησαν ἀπὸ τῶν ἁμαρτιῶν,
      ἕως ἐπρονομεύθησαν ἀπὸ τῆς γῆς αὐτῶν καὶ ἐσκορπίσθησαν ἐν πάσῃ τῇ γῇ, καὶ κατελείφθη
      ὁ λαὸς ὀλιγοστός, καὶ ἄρχων τῷ οἴκῳ Δαυείδ.
    kind: greek_parallel
