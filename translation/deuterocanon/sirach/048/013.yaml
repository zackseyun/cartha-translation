id: SIR.48.13
reference: Sirach 48:13
source:
  edition: sefaria-ben-sira-kahana
  text: מימיו לא זע מכל, ולא משל ברוחו כל בשר.<br><small>(יג)</small> כל דבר לא נפלא
    ממנו, ומתחתיו נברא בשרו.
  language: Hebrew
  pages:
  - 763
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: πᾶς λόγος οὐχ ὑπερῆρεν αὐτόν, καὶ ἐν κοιμήσει ἐπροφήτευσεν τὸ σῶμα αὐτοῦ·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:13
translation:
  text: In his days he did not tremble before anyone, and no flesh mastered his spirit.
    No word was too wondrous for him, and beneath him his flesh was created.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final line follows the Greek parallel, which reads 'and in sleep his
      body prophesied.' The extant Hebrew here is difficult and may reflect a textual
      problem.
    reason: textual_variant
  - marker: b
    text: Or 'No matter was too wondrous for him.' Hebrew davar can mean 'word' or
      'matter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מימיו
  chosen: In his days
  alternatives:
  - During his lifetime
  - In his lifetime
  lexicon: HALOT
  rationale: Temporal idiom marking the period of Elijah/Elisha's life; 'In his days'
    is a natural, sufficiently formal rendering.
- source_word: לא זע מכל
  chosen: he did not tremble before anyone
  alternatives:
  - he was not shaken by anything
  - he did not move from anything
  lexicon: HALOT
  rationale: The Hebrew verb זוע/זע conveys shaking or trembling. With מכל, the sense
    is that he was not intimidated or shaken by anyone/anything. 'Before anyone' captures
    the likely personal force in context about prophetic fearlessness.
- source_word: ולא משל ברוחו כל בשר
  chosen: and no flesh mastered his spirit
  alternatives:
  - and no human being ruled over his spirit
  - and no mortal had power over his spirit
  lexicon: HALOT
  rationale: כל בשר literally 'all flesh' is an idiom for humanity/mortals. 'No flesh'
    preserves the Hebrew texture while remaining intelligible. משל ברוחו is best rendered
    as exercising dominion over his spirit.
- source_word: כל דבר לא נפלא ממנו
  chosen: No word was too wondrous for him
  alternatives:
  - No matter was hidden from him
  - No thing was beyond him
  lexicon: HALOT
  rationale: The Hebrew reads 'every word/thing was not too extraordinary from him.'
    Because the Greek parallel has πᾶς λόγος, 'word' is retained rather than smoothing
    to 'thing,' though the phrase may carry the broader sense of matter or utterance.
    'Too wondrous for him' reflects נפלא without overinterpreting as 'hidden.'
- source_word: ומתחתיו נברא בשרו
  chosen: and in his sleep his body prophesied
  alternatives:
  - and after him his flesh was created
  - and beneath him his flesh was formed
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult and appears mismatched/corrupt
    here. The Greek parallel reads clearly, 'and in sleep his body prophesied.' Given
    the source validation note 'minor_mismatch' and the strong coherence of the Greek
    with the context of Elisha's posthumous prophetic power, the English follows the
    Greek sense for this colon while acknowledging the Hebrew difficulty in a footnote.
