- issue: Use of Hebrew vs. Greek in a difficult final colon
  chosen_reading: 'Mainly Hebrew for the verse, but the final colon is rendered according
    to the Greek parallel: ''and in his sleep his body prophesied.'''
  alternative_readings:
  - A more literal rendering of the extant Hebrew would be obscure and likely misleading,
    e.g. 'and beneath/after him his flesh was created.'
  rationale: For Sirach we prioritize the surviving Hebrew where extant, but the final
    Hebrew colon appears textually problematic in this witness and does not yield
    a coherent sense in context. The Greek parallel provides a clear reading that
    fits the surrounding praise of Elisha, including his power after death. This preserves
    source honesty rather than forcing a dubious Hebrew literalism.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, using
    Greek parallel as actual translation input for Sirach when needed; preserve source
    uncertainty honestly.'
