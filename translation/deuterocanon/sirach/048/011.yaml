theological_decisions:
- issue: Relationship between the Hebrew and Greek forms of the verse
  chosen_reading: Translate the extant Hebrew as the primary text, while preserving
    the notable Greek expansion in a footnote.
  alternative_readings:
  - 'Greek: ''Happy are those who saw you and those adorned in love, for we also shall
    surely live.'''
  rationale: Per project philosophy, the surviving Hebrew witness has primacy for
    Sirach where extant. However, the Greek parallel differs substantially in the
    second half, so the divergence is significant enough to preserve for auditability
    rather than silently ignore.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input'
