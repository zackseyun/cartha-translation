id: SIR.48.11
reference: Sirach 48:11
source:
  edition: sefaria-ben-sira-kahana
  text: אשרי ראך ומת, ואשריך כי חיה תחיה.
  language: Hebrew
  pages:
  - 763
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: μακάριοι οἱ ἰδόντες σε καὶ οἱ ἐν ἀγαπήσει κεκοσμημένοι, καὶ γὰρ ἡμεῖς ζωῇ
      ζησόμεθα.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:11
translation:
  text: Happy is the one who saw you and died, and happy are you, for you will surely
    live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Happy are those who saw you and those adorned in love,
      for we also shall live.'' The Hebrew witness instead reads, ''and happy are
      you, for you will surely live.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אשרי
  chosen: Happy is / happy are
  alternatives:
  - Blessed is / blessed are
  - Fortunate is / fortunate are
  lexicon: HALOT
  rationale: The Hebrew beatitude formula אשרי commonly conveys enviable blessedness
    or happiness. 'Happy' is more natural modern English here than the more liturgical
    'blessed,' while still preserving the exclamatory beatitude sense.
- source_word: ראך
  chosen: saw you
  alternatives:
  - has seen you
  - beheld you
  lexicon: HALOT
  rationale: Qal perfect with 2ms suffix from ראה. Simple past 'saw you' fits the
    Hebrew form and the poetic context addressed to Elijah.
- source_word: ומת
  chosen: and died
  alternatives:
  - then died
  - though he died
  lexicon: HALOT
  rationale: The conjunction plus perfect is rendered straightforwardly. I avoided
    importing an interpretive concessive ('though he died') not explicit in the Hebrew,
    even though the sense may imply blessedness despite death.
- source_word: ואשריך
  chosen: and happy are you
  alternatives:
  - and blessed are you
  - and happy for you
  lexicon: HALOT
  rationale: The suffix makes this a direct second-person beatitude. Rendering it
    as a fresh clause preserves the parallelism and direct address.
- source_word: כי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כי introduces the ground for the second beatitude. 'For' preserves
    the explanatory force without overinterpreting.
- source_word: חיה תחיה
  chosen: you will surely live
  alternatives:
  - you shall indeed live
  - you will live life
  - you will truly live
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    'You will surely live' is a standard and clear way to reflect the emphatic Hebrew
    construction.
