theological_decisions:
- issue: Use of the Hebrew witness versus the fuller Greek parallel
  chosen_reading: Translate the extant Hebrew clause as the main text, without importing
    the Greek continuation into this verse's English line.
  alternative_readings:
  - 'A fuller Greek text continues: ''and the Holy One from heaven quickly heard them,
    and delivered them by the hand of Isaiah.'''
  rationale: The Hebrew is the most original available Zone 1 witness for this verse
    and should govern the main translation. The Greek parallel is still used as a
    control on sense, especially for the prayer language, but its additional material
    is not present in the Hebrew clause supplied here and should be preserved as a
    footnote rather than silently incorporated.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    use Greek parallel as actual input while keeping Hebrew primary.'
