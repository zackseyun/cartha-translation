translation:
  text: Then they called to God Most High, and spread out their hands to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel continues, 'and the Holy One from heaven quickly heard
      them, and delivered them by the hand of Isaiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: ויקראו
  chosen: they called
  alternatives:
  - they cried out
  - they invoked
  lexicon: HALOT
  rationale: The Hebrew qaraʾ here denotes calling upon God in prayer. 'Called' is
    the most natural base rendering in English, while the context already implies
    urgent appeal. The Greek parallel ἐπεκαλέσαντο supports the sense 'called upon/invoked.'
- source_word: אל
  chosen: to God
  alternatives:
  - to the Mighty One
  - to God
  lexicon: HALOT
  rationale: The first אל functions as the common Semitic word for God rather than
    a proper name. Rendering it 'God' is clear and idiomatic.
- source_word: עליון
  chosen: Most High
  alternatives:
  - the Most High
  - Exalted One
  lexicon: HALOT
  rationale: ʿElyon is a divine title meaning 'Most High.' Because it follows 'God'
    appositionally, 'God Most High' preserves the Hebrew compactness better than expanding
    to 'God, the Most High.'
- source_word: ויפרשו
  chosen: spread out
  alternatives:
  - stretched out
  - extended
  lexicon: HALOT
  rationale: The verb פרש in this context refers to extending the hands in prayer.
    'Spread out' is idiomatic and reflects the prayer gesture well.
- source_word: כפים
  chosen: their hands
  alternatives:
  - their palms
  lexicon: HALOT
  rationale: Though כפים can more specifically denote palms, English normally says
    'hands' for this prayer posture. This avoids awkwardness while preserving the
    gesture.
- source_word: אליו
  chosen: to him
  alternatives:
  - toward him
  lexicon: HALOT
  rationale: The preposition marks direction toward God. 'To him' is smooth English;
    'toward him' is possible but less natural here.
