id: SIR.48.14
reference: Sirach 48:14
source:
  edition: sefaria-ben-sira-kahana
  text: בחייו עשה נפלאות, ובמותו תמהי מעשה.
  language: Hebrew
  pages:
  - 763
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: καὶ ἐν ζωῇ αὐτοῦ ἐποίησεν τέρατα, καὶ ἐν τελευτῇ θαυμάσια τὰ ἔργα αὐτοῦ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:14
translation:
  text: In his life he did wonders, and in his death his deeds were marvelous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the Greek more closely, 'and at his end his works were marvelous.'
      The Hebrew reads 'and in his death,' with a slightly difficult form in the final
      clause; the Greek confirms the sense of wondrous deeds associated with his death.
    reason: alternative_reading
lexical_decisions:
- source_word: בחייו
  chosen: In his life
  alternatives:
  - During his lifetime
  - While he lived
  lexicon: HALOT
  rationale: The preposition ב with חַיִּים here is temporal, referring to the period
    of Elisha's life. 'In his life' is concise and matches the parallel Greek ἐν ζωῇ
    αὐτοῦ.
- source_word: עשה
  chosen: he did
  alternatives:
  - he performed
  - he worked
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' 'Did' preserves the Hebrew's simplicity;
    the object 'wonders' carries the extraordinary sense, so a more elevated verb
    is unnecessary.
- source_word: נפלאות
  chosen: wonders
  alternatives:
  - marvels
  - wonderful deeds
  lexicon: HALOT
  rationale: נפלאות denotes extraordinary or wondrous acts. 'Wonders' is idiomatic
    in biblical English and aligns well with the Greek τέρατα, while avoiding over-interpretation.
- source_word: ובמותו
  chosen: and in his death
  alternatives:
  - and at his death
  - even in death
  lexicon: HALOT
  rationale: The Hebrew literally reads 'and in his death.' The Greek parallel has
    ἐν τελευτῇ, 'at/in his end.' 'In his death' preserves the Hebrew form while still
    making sense in context, referring to what occurred in connection with his death.
- source_word: תמהי
  chosen: were marvelous
  alternatives:
  - were wondrous
  - caused astonishment
  lexicon: HALOT
  rationale: The form is somewhat unusual/uncertain in the Hebrew witness, but in
    context and with the Greek θαυμάσια it clearly conveys wonder or astonishment.
    Rendering it predicatively as 'were marvelous' gives natural English while reflecting
    both witnesses.
- source_word: מעשה
  chosen: his works
  alternatives:
  - his deeds
  - his acts
  lexicon: HALOT
  rationale: Although the Hebrew consonantal text appears as singular מעשה, the sense
    is collective and the Greek explicitly reads plural τὰ ἔργα αὐτοῦ. 'His works'
    best reflects the likely intended collective/plural sense without forcing a wooden
    singular in English.
