theological_decisions:
- issue: Whether to specify 'the Lord' in the opening phrase on the basis of the Greek
    parallel
  chosen_reading: Kept the Hebrew-centered rendering 'By his word' in the main text
  alternative_readings:
  - By the word of the Lord he shut up heaven
  rationale: Zone 1 gives a surviving Hebrew witness, which is primary for Sirach
    where extant. The Greek parallel appears to interpret or expand the line with
    Κυρίου. Because the Hebrew wording is somewhat compressed and the verse context
    already identifies Elijah as acting under divine authority, the main text preserves
    the Hebrew-centered sense while the alternative is retained in a footnote for
    transparency.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve source uncertainty honestly.'
