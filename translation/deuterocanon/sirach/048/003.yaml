    reference: Sirach 48:3
translation:
  text: By his word he restrained the heavens, and brought down fire three times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''By the word of the Lord he shut up heaven.'' The Hebrew
      is more compressed at this point, so the main text follows the surviving Hebrew
      witness while preserving the Greek''s more explicit wording.'
    reason: alternative_reading
  - marker: b
    text: Literally, 'three fires'; the sense is likely that he brought down fire
      on three occasions.
    reason: lexical_alternative
lexical_decisions:
- source_word: בדבר
  chosen: By his word
  alternatives:
  - At a word
  - By the word
  lexicon: HALOT
  rationale: The Hebrew preposition ב with דבר naturally yields an instrumental sense,
    'by/with a word.' Given the Elijah context, the suffixless phrase is best understood
    as referring to Elijah's spoken word, while the Greek parallel ἐν λόγῳ Κυρίου
    may reflect an interpretive expansion toward 'the Lord's word.' The Hebrew witness
    is primary here, so the main text keeps the simpler wording.
- source_word: אל
  chosen: his
  alternatives:
  - God's
  - the Lord's
  - ': implicit subject marker only'
  lexicon: HALOT
  rationale: The phrase בדבר אל is textually awkward in the Hebrew as transmitted.
    In context it points to Elijah, the subject of the surrounding verses, acting
    by his spoken command. The Greek parallel supports a sense involving authoritative
    speech. Rendering 'his' makes the clause intelligible in English while staying
    close to the Hebrew context without importing 'the Lord' directly into the main
    text.
- source_word: עצר
  chosen: restrained
  alternatives:
  - shut up
  - withheld
  - stopped
  lexicon: HALOT
  rationale: The verb denotes restraining or shutting up. In Elijah's story the heavens
    are withheld from giving rain, so 'restrained the heavens' preserves the image
    without over-specifying rain, which the Hebrew here does not explicitly mention.
- source_word: שמים
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: Hebrew שמים is formally plural and often rendered 'heavens.' Here it
    likely refers to the sky as the source of rain, but 'the heavens' preserves the
    biblical register and matches the Greek οὐρανόν conceptually.
- source_word: ויורד
  chosen: brought down
  alternatives:
  - caused to come down
  - sent down
  lexicon: HALOT
  rationale: 'The hiphil-like sense is causative: Elijah caused fire to descend. ''Brought
    down'' is concise, natural English and preserves the causative force.'
- source_word: שלוש אשות
  chosen: fire three times
  alternatives:
  - three fires
  - fire on three occasions
  lexicon: HALOT
  rationale: The Hebrew literally reads 'three fires,' but in English this could suggest
    three separate flames rather than three episodes. The Greek τρὶς πῦρ supports
    an adverbial sense, 'three times [fire].' The chosen rendering communicates the
    likely meaning clearly.
