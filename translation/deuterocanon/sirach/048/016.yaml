    reference: Sirach 48:16
translation:
  text: A remnant was left to Judah, and to the house of David a ruler. Some of them
    did what was right, but some of them greatly increased apostasy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''some of them multiplied sins.'' The Hebrew reads more
      sharply, ''greatly multiplied apostasy/treachery.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וישאר
  chosen: was left
  alternatives:
  - remained
  - was preserved
  lexicon: HALOT
  rationale: Nifal/passive sense of שׁאר indicates what remained or was left over.
    'Was left' is natural English and preserves the passive nuance.
- source_word: ליהודה
  chosen: to Judah
  alternatives:
  - for Judah
  lexicon: HALOT
  rationale: 'The preposition ל here marks relation/possession with the passive clause:
    a remnant was left to Judah. ''To Judah'' keeps the Hebrew structure without overinterpreting.'
- source_word: מזער
  chosen: a remnant
  alternatives:
  - a little
  - something small
  - a few
  lexicon: HALOT
  rationale: The noun/adverbial form denotes smallness or a tiny amount. In context,
    after dynastic and national judgment, 'a remnant' best captures the idiomatic
    sense of only a small surviving portion.
- source_word: בית דוד
  chosen: the house of David
  alternatives:
  - David's house
  - the Davidic house
  lexicon: HALOT
  rationale: Standard dynastic expression; 'house of David' preserves the biblical
    idiom and its royal lineage sense.
- source_word: קצין
  chosen: a ruler
  alternatives:
  - a prince
  - a leader
  - a chief
  lexicon: HALOT
  rationale: קצין denotes one in authority. 'Ruler' is broad and clear in modern English,
    fitting the dynastic context without importing a more specific title than the
    Hebrew gives.
- source_word: עשו יושר
  chosen: did what was right
  alternatives:
  - acted uprightly
  - practiced uprightness
  lexicon: HALOT
  rationale: The idiom combines עשה with יֹשֶׁר/uprightness. 'Did what was right'
    is idiomatic English and communicates moral rectitude clearly.
- source_word: הפליאו
  chosen: greatly multiplied
  alternatives:
  - went to extremes in
  - surpassed in
  - did exceedingly
  lexicon: HALOT
  rationale: The Hifil of פלא can intensify or denote doing extraordinarily. In light
    of the Greek parallel ἐπλήθυναν ('multiplied'), the sense here is intensification/abundance
    rather than wonder-working.
- source_word: מעל
  chosen: apostasy
  alternatives:
  - treachery
  - unfaithfulness
  - transgression
  lexicon: HALOT
  rationale: מעל often denotes breach of faith or covenantal unfaithfulness, stronger
    than generic 'sin.' 'Apostasy' captures the religious-political betrayal implied
    here, while the Greek parallel broadens it to sins generally.
