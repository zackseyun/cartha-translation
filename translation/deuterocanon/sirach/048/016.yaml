theological_decisions:
- issue: How strongly to render מעל in a royal-history summary
  chosen_reading: apostasy
  alternative_readings:
  - treachery
  - unfaithfulness
  - sins
  rationale: The Hebrew witness uses מעל, a term of faithless breach, while the Greek
    parallel has the broader ἁμαρτίας ('sins'). Because the Hebrew is primary where
    extant, the main text keeps the sharper covenantal sense as 'apostasy,' while
    preserving the broader Greek-aligned alternative in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve tension rather than resolve it'
