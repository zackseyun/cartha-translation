id: SIR.48.18
reference: Sirach 48:18
source:
  edition: sefaria-ben-sira-kahana
  text: בימיו עלה סנחריב, וישלח את רבשקה.<br><small>(יח)</small> ויט ידו על ציון,
    ויגדף אל בגאונו.
  language: Hebrew
  pages:
  - 764
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐν ἡμέραις αὐτοῦ ἀνέβη Σενναχηρεὶμ καὶ ἀπέστειλεν Ῥαψάκην, καὶ ἀπῆρεν· καὶ
      ἐπῆρεν ἡ χεὶρ αὐτοῦ ἐπὶ Σειών, καὶ ἐμεγαλαύχησεν ὑπερηφανίᾳ αὐτοῦ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:18
translation:
  text: In his days Sennacherib came up and sent Rabshakeh; he stretched out his hand
    against Zion and blasphemed in his pride.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and he boasted in his arrogance.'' The Hebrew witness
      instead speaks of blasphemous speech, which is followed in the main text.'
    reason: alternative_reading
lexical_decisions:
- source_word: עלה
  chosen: came up
  alternatives:
  - went up
  - advanced
  lexicon: HALOT
  rationale: The Hebrew verb commonly means 'go up/come up,' especially for a military
    advance. 'Came up' is idiomatic in English narrative and preserves the directional/military
    sense reflected also by Greek ἀνέβη.
- source_word: וישלח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Straightforward rendering of שלח. 'Sent' is clear modern English and
    fits the historical narrative style.
- source_word: רבשקה
  chosen: Rabshakeh
  alternatives:
  - the Rabshakeh
  lexicon: HALOT
  rationale: Treated here as the known Assyrian title/name conventionally transliterated
    'Rabshakeh.' The Hebrew lacks the article in this witness, so simple transliteration
    is preferred in the main text.
- source_word: ויט ידו
  chosen: he stretched out his hand
  alternatives:
  - he raised his hand
  - he turned his hand
  lexicon: HALOT
  rationale: The Hebrew idiom with נטה יד can mean to stretch out the hand against
    someone in hostile action. Although the Greek has ἐπῆρεν ἡ χεὶρ αὐτοῦ ('he lifted
    his hand'), the Hebrew witness supports 'stretched out his hand,' which conveys
    aggressive intent without overparaphrase.
- source_word: על ציון
  chosen: against Zion
  alternatives:
  - upon Zion
  - toward Zion
  lexicon: HALOT
  rationale: With hostile gesture/action, על is best rendered 'against' in English.
    This makes the adversarial force explicit and natural.
- source_word: ויגדף
  chosen: blasphemed
  alternatives:
  - reviled
  - defied
  lexicon: HALOT
  rationale: גדף denotes abusive speech with impious force, often against God. Because
    the context is Sennacherib's arrogant assault on Zion and, by implication, Israel's
    God, 'blasphemed' best preserves the theological weight. 'Reviled' is possible
    but weaker.
- source_word: אל
  chosen: blasphemed
  alternatives:
  - against God
  - toward God
  lexicon: HALOT
  rationale: The Hebrew text reads ויגדף אל בגאונו, where אל may point to the object
    of blasphemy ('God') or function elliptically. The Greek parallel instead reads
    ἐμεγαλαύχησεν ὑπερηφανίᾳ αὐτοῦ ('he boasted in his arrogance/pride'). Given the
    Hebrew witness's explicit גדף, the main text preserves the blasphemous sense,
    while the object is left implicit in English rather than supplied too strongly.
- source_word: בגאונו
  chosen: in his pride
  alternatives:
  - in his arrogance
  - with his haughtiness
  lexicon: HALOT
  rationale: גאון here denotes arrogant exaltation. 'Pride' is concise and natural;
    'arrogance' is preserved as a footnote-worthy alternative because the Greek ὑπερηφανία
    emphasizes haughtiness.
