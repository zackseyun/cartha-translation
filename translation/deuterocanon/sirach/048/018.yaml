theological_decisions:
- issue: Relation between the Hebrew ending ('and he blasphemed in his pride') and
    the Greek parallel ('and he boasted in his arrogance')
  chosen_reading: 'Follow the surviving Hebrew as primary, rendering the final clause
    with explicit impious speech: ''and blasphemed in his pride.'''
  alternative_readings:
  - and boasted in his arrogance
  - and reviled in his pride
  rationale: Per project philosophy, the extant Hebrew witness has primacy for Sirach
    where it survives, while the Greek is used as a real input and consistency check.
    Here the Hebrew gives a sharper theological claim than the Greek. Because the
    Greek preserves a notable alternative nuance, it is retained in a footnote rather
    than replacing the Hebrew-based main text.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    DOCTRINE.md: preserve theological tension rather than resolve it silently.'
