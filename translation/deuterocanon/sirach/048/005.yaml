theological_decisions:
- issue: Divine agency formula at the end of the verse
  chosen_reading: by the will of the LORD
  alternative_readings:
  - by the word of the Most High
  rationale: The Hebrew Cairo Geniza witness is the most original available source
    for this verse and reads כרצון יהוה, while the Greek parallel reads ἐν λόγῳ Ὑψίστου.
    Because the difference affects how Elijah's miracle is framed—divine will versus
    divine word—the Hebrew is followed in the main text and the Greek is preserved
    in a footnote for transparency.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it silently.'
