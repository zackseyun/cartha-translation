id: SIR.48.5
reference: Sirach 48:5
source:
  edition: sefaria-ben-sira-kahana
  text: המקים גוע ממות, ומשאול כרצון יהוה.
  language: Hebrew
  pages:
  - 763
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ὁ ἐγείρας νεκρὸν ἐκ θανάτου καὶ ἐξ ᾅδου ἐν λόγῳ Ὑψίστου·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:5
translation:
  text: who raised up a corpse from death, and from Sheol, by the will of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''by the word of the Most High.'' The Hebrew witness reads
      ''by the will of the LORD.'''
    reason: textual_variant
lexical_decisions:
- source_word: המקים
  chosen: who raised up
  alternatives:
  - who establishes
  - who causes to rise
  - who resurrected
  lexicon: HALOT
  rationale: The Hifil participle of קום here describes Elijah's act of bringing the
    dead back to life. In context with גוע ממות and the Greek ὁ ἐγείρας, 'raised up'
    best captures revivification without over-specifying later resurrection theology.
- source_word: גוע
  chosen: a dead man
  alternatives:
  - a corpse
  - one who had died
  - the dead
  lexicon: HALOT
  rationale: The Hebrew form here denotes one who has expired/died. 'A dead man' is
    idiomatic and matches the singular object reflected in the Greek νεκρόν. 'Corpse'
    is too physical and abrupt for the poetic encomium.
- source_word: ממות
  chosen: from death
  alternatives:
  - out of death
  - from dying
  lexicon: HALOT
  rationale: The preposition מן with מות is straightforwardly separative. 'From death'
    preserves the compact Hebrew and aligns with the Greek ἐκ θανάτου.
- source_word: ומשאול
  chosen: and from Sheol
  alternatives:
  - and from the grave
  - and from Hades
  - and from the underworld
  lexicon: HALOT
  rationale: Sheol is the Hebrew term in the source and is best transliterated here
    to preserve its Israelite conceptual world. The Greek parallel has ᾅδου, confirming
    an underworld/death-realm sense, but 'Sheol' avoids importing later Greek or English
    associations tied to 'Hades' or flattening it to merely 'grave'.
- source_word: כרצון יהוה
  chosen: by the will of the LORD
  alternatives:
  - according to the will of the LORD
  - at the desire of the LORD
  - by the word of the Most High
  lexicon: HALOT
  rationale: The Hebrew witness reads כרצון יהוה, literally 'according to/by the will
    of YHWH.' This should govern the main text because Hebrew is the primary witness
    here. The Greek parallel reads ἐν λόγῳ Ὑψίστου ('by the word of the Most High'),
    which is a significant variant and is preserved in a footnote rather than adopted
    into the main text.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the Lord
  lexicon: HALOT
  rationale: Per project doctrine, YHWH is rendered 'the LORD' following Jewish reverence
    tradition and longstanding English convention for the divine name.
