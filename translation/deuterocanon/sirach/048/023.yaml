translation:
  text: In his days the sun stood still, and life was added to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the king's life was extended; the referent is Hezekiah in the surrounding
      context.
    reason: cross_reference
  - marker: b
    text: 'Greek: ''he impeded the sun'' or ''the sun was hindered,'' a difficult
      expression corresponding to the Hebrew ''the sun stood still.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עמד
  chosen: stood still
  alternatives:
  - stood
  - stopped
  lexicon: HALOT
  rationale: The Hebrew verb literally means 'stood,' but in context with 'the sun'
    it refers to the sun's halting in its course. 'Stood still' communicates the idiomatic
    sense clearly in modern English while remaining close to the Hebrew. The Greek
    parallel's unusual ἀνεπόδισεν supports an idea of interruption/impediment rather
    than mere posture.
- source_word: השמש
  chosen: the sun
  lexicon: HALOT
  rationale: Straightforward rendering of the Hebrew noun with article.
- source_word: ונוסף
  chosen: was added
  alternatives:
  - was increased
  - was prolonged
  lexicon: HALOT
  rationale: The passive-like sense 'was added' preserves the Hebrew wording and allows
    the following object 'life' to remain explicit. A more interpretive rendering
    like 'was prolonged' is possible but less transparent to the source wording.
- source_word: חיי
  chosen: life
  alternatives:
  - the life
  - the lifetime
  lexicon: HALOT
  rationale: Although the Hebrew form is plural/construct ('life/lives of'), English
    idiom prefers singular 'life' here. This also aligns with the Greek singular ζωὴν.
- source_word: המלך
  chosen: the king
  lexicon: HALOT
  rationale: The Hebrew has the definite noun 'the king.' Although the referent is
    Hezekiah from context, the verse itself uses the title, so the translation preserves
    it rather than substituting the name.
