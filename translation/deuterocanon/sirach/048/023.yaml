theological_decisions:
- issue: Whether to make the allusion explicit by naming Hezekiah in the main text
  chosen_reading: Retain 'the king'
  alternative_readings:
  - the king Hezekiah
  - Hezekiah
  rationale: The source text says 'the king,' and the surrounding context already
    identifies the figure. Preserving the title avoids importing explanatory material
    into the verse itself.
