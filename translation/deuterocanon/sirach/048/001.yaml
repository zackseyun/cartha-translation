theological_decisions:
- issue: Whether to identify the prophet explicitly as Elijah in the main text
  chosen_reading: Do not insert the name; translate the Hebrew as 'a prophet' and
    preserve the Greek identification in a footnote.
  alternative_readings:
  - Then Elijah the prophet arose like fire
  rationale: The Hebrew primary witness for this verse does not name Elijah, while
    the Greek parallel does. Since the translation is anchored in the extant Hebrew
    where available, the main text should not import the proper name from the Greek.
    However, because the Greek tradition explicitly identifies him and the chapter
    context concerns Elijah, the alternative is worth preserving in a footnote for
    transparency.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it
- issue: Whether to harmonize the second colon to the Greek 'his word burned like
    a torch'
  chosen_reading: Retain the Hebrew image 'his words were like a blazing furnace.'
  alternative_readings:
  - and his word burned like a torch
  rationale: The Hebrew and Greek differ materially in imagery and number. Since the
    Hebrew survives and is the primary witness, its furnace image and plural 'words'
    should stand in the main text. The Greek alternative is significant enough to
    note as a textual/parallel variant.
  doctrine_reference: Original-language primacy over translation tradition
