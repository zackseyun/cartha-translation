id: SIR.48.1
reference: Sirach 48:1
source:
  edition: sefaria-ben-sira-kahana
  text: עד אשר קם נביא כאש, ודבריו כתנור בוער.
  language: Hebrew
  pages:
  - 762
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: καὶ ἀνέστη Ἠλίας προφήτης ὡς πῦρ, καὶ ὁ λόγος αὐτοῦ ὡς λαμπὰς ἐκαίετο·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:1
translation:
  text: Then a prophet arose like fire, and his words were like a blazing furnace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Then Elijah the prophet arose like fire.'' The Hebrew here reads
      simply ''a prophet arose like fire,'' though the context clearly concerns Elijah.'
    reason: alternative_reading
  - marker: b
    text: 'Greek parallel: ''his word burned like a torch.'' Hebrew: ''his words were
      like a blazing furnace.'''
    reason: textual_variant
lexical_decisions:
- source_word: עד אשר
  chosen: Then
  alternatives:
  - Until
  - Afterward
  lexicon: HALOT
  rationale: The Hebrew idiom can mark transition in narrative sequence rather than
    strict temporal limit. Given the verse opens a new section praising Elijah, and
    the Greek has simple καὶ ἀνέστη ('and ... arose'), 'Then' best captures the forward
    movement in readable English without overcommitting to an explicit 'until' construction
    detached from the prior verse.
- source_word: קם
  chosen: arose
  alternatives:
  - stood up
  - appeared
  - came forth
  lexicon: HALOT
  rationale: '''Arose'' is the natural idiomatic rendering for the emergence of a
    prophetic figure and aligns with the Greek ἀνέστη. It preserves the elevated tone
    better than ''appeared'' or the overly literal ''stood up''.'
- source_word: נביא
  chosen: a prophet
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: The Hebrew lacks the proper name here, though the context identifies
    Elijah. Rendering it as 'a prophet' follows the Hebrew wording; the Greek names
    Elijah explicitly, but the primary witness is the Hebrew and the indefinite expression
    is still intelligible in context.
- source_word: כאש
  chosen: like fire
  alternatives:
  - as fire
  - like a fire
  lexicon: HALOT
  rationale: A straightforward simile. 'Like fire' is idiomatic and preserves the
    vivid comparison shared by the Greek ὡς πῦρ.
- source_word: ודבריו
  chosen: and his words
  alternatives:
  - and his word
  - and what he said
  lexicon: HALOT
  rationale: The plural is explicit in the Hebrew and suits the poetic parallelism.
    Although the Greek has singular ὁ λόγος αὐτοῦ, the Hebrew witness is primary here.
- source_word: כתנור בוער
  chosen: were like a blazing furnace
  alternatives:
  - were like a burning oven
  - were like a furnace on fire
  lexicon: HALOT
  rationale: תנור is an oven/furnace; in English poetic register, 'blazing furnace'
    conveys the image naturally and forcefully. 'Oven' is possible but sounds domestic
    and weaker in this context. The Greek's λαμπάς ('torch') reflects a different
    image, so the Hebrew furnace imagery is retained in the main text.
