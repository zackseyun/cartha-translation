  parallel_sources:
  - edition: lxx-swete-1909
    text: ἕως τοῦ αἰῶνος ὑπέδειξεν τὰ ἐσόμενα καὶ τὰ ἀπόκρυφα πρὶν ἢ παραγενέσθαι
      αὐτά.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:25
translation:
  text: He declared what would be until eternity, and hidden things before they came.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forever' or 'to the end of the age' for 'until eternity.' The Hebrew
      עד עולם and Greek ἕως τοῦ αἰῶνος both express an unbounded future span.
    reason: lexical_alternative
  - marker: b
    text: '''Hidden things'' could also be rendered ''secret things'' or ''concealed
      things.'' The Greek parallel has ''the hidden things'' (τὰ ἀπόκρυφα).'
    reason: lexical_alternative
lexical_decisions:
- source_word: עד עולם
  chosen: until eternity
  alternatives:
  - forever
  - to the end of time
  - for all time
  lexicon: HALOT
  rationale: The Hebrew phrase literally combines 'until' with 'eternity/age.' The
    Greek parallel ἕως τοῦ αἰῶνος supports a temporal sense extending indefinitely.
    'Until eternity' preserves the source's elevated idiom better than the flatter
    'forever,' while still being intelligible.
- source_word: הגיד
  chosen: declared
  alternatives:
  - told
  - made known
  - announced
  - showed
  lexicon: HALOT
  rationale: The verb means to tell or make known. 'Declared' fits the prophetic context
    of Elijah/Elisha in this section and matches the solemn tone. The Greek ὑπέδειξεν
    could suggest 'showed' or 'indicated,' but the Hebrew witness is primary here
    and supports a verbal proclamation.
- source_word: נהיות
  chosen: what would be
  alternatives:
  - things to come
  - future events
  - what was to happen
  lexicon: HALOT
  rationale: This noun refers to coming events or future happenings. 'What would be'
    is concise and natural English while preserving the future-oriented sense. The
    Greek τὰ ἐσόμενα confirms this meaning.
- source_word: ונסתרות
  chosen: and hidden things
  alternatives:
  - and secret things
  - and concealed things
  lexicon: HALOT
  rationale: The plural noun denotes things hidden or concealed. 'Hidden things' is
    the most natural modern rendering and aligns with Greek τὰ ἀπόκρυφα without importing
    later technical meanings such as 'apocryphal.'
- source_word: לפני בואן
  chosen: before they came
  alternatives:
  - before their coming
  - before they happened
  - before they arrived
  lexicon: HALOT
  rationale: Literally 'before their coming.' Because the antecedent is future events
    and hidden things, idiomatic English can render this as 'before they came.' The
    Greek πρὶν ἢ παραγενέσθαι αὐτά similarly points to their occurrence/arrival.
