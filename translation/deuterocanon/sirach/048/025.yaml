theological_decisions:
- issue: Temporal scope of prophetic knowledge
  chosen_reading: He declared what would be until eternity
  alternative_readings:
  - He showed things that would be forever
  - He declared future things to the end of the age
  rationale: The verse praises prophetic disclosure of future and hidden matters.
    The wording should preserve the expansive temporal claim without overstating it
    into a systematic doctrine of exhaustive omniscience. 'Until eternity' stays close
    to the Hebrew and Greek while leaving the poetic scope intact.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
