theological_decisions:
- issue: Divergence between the Hebrew witness and the Greek parallel for Sirach 48:8
  chosen_reading: 'Main text follows the extant Hebrew: ''You made heard at Sinai
    rebukes, and at Horeb judgments of vengeance.'''
  alternative_readings:
  - 'Greek parallel reflects a different text: ''anointing kings for retribution,
    and prophets as successors after him'' (sense only)'
  rationale: Per project philosophy, Hebrew is primary for Sirach where it survives.
    Here the Greek is not merely a stylistic variant but a different line of text.
    The translation therefore follows the Hebrew witness in the main text and preserves
    the Greek-based alternative in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    preserve source uncertainty honestly'
