id: SIR.48.8
reference: Sirach 48:8
source:
  edition: sefaria-ben-sira-kahana
  text: השמע בסיני תוכחות, ובחורב משפטי נקם.
  language: Hebrew
  pages:
  - 763
  confidence: high
  validation: agree
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ὁ χρίων βασιλεῖς εἰς ἀνταπόδομα, καὶ προφήτας διαδόχους μετʼ αὐτόν·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:8
translation:
  text: You made heard at Sinai rebukes, and at Horeb judgments of vengeance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel has a substantially different reading here, with the
      sense: ''anointing kings for retribution, and prophets as successors after him.''
      The Hebrew and Greek appear to reflect different textual forms of the verse.'
    reason: textual_variant
lexical_decisions:
- source_word: השמע
  chosen: You made heard
  alternatives:
  - You caused to be heard
  - You proclaimed
  - You anointed
  lexicon: HALOT
  rationale: 'From the Hebrew Hiphil of שמע, the plain sense is causative: ''cause
    to hear / make heard.'' The Hebrew witness is primary for this verse. The Greek
    parallel reflects a substantially different text (''anointing kings...''), so
    the main text follows the extant Hebrew while preserving the Greek-based alternative
    in a footnote.'
- source_word: בסיני
  chosen: at Sinai
  alternatives:
  - in Sinai
  lexicon: HALOT
  rationale: The preposition ב with a place name is naturally rendered 'at' in English
    for the location of the event.
- source_word: תוכחות
  chosen: rebukes
  alternatives:
  - reproofs
  - corrections
  - warnings
  lexicon: HALOT
  rationale: תוכחות commonly denotes reproofs or rebukes. 'Rebukes' best preserves
    the forceful admonitory sense in concise modern English.
- source_word: ובחורב
  chosen: and at Horeb
  alternatives:
  - and in Horeb
  lexicon: HALOT
  rationale: As with Sinai, English idiom prefers 'at' for the location.
- source_word: משפטי
  chosen: judgments of
  alternatives:
  - judgments for
  - decrees of
  - acts of judgment of
  lexicon: HALOT
  rationale: Construct form of משפט is most straightforwardly rendered 'judgments
    of.' This keeps the formal linkage to the following noun.
- source_word: נקם
  chosen: vengeance
  alternatives:
  - vengeful punishment
  - avenging
  - retribution
  lexicon: HALOT
  rationale: נקם denotes vengeance or avenging. 'Vengeance' is the most direct lexical
    equivalent, though in context it can imply punitive judgment.
