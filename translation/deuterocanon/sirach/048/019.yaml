translation:
  text: Then they melted in the pride of their heart, and they writhed like a woman
    giving birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Then their heart and hands were shaken, and they were in labor
      pains like women giving birth.'' The Hebrew witness is followed in the main
      text, with the Greek consulted as a parallel.'
    reason: alternative_reading
lexical_decisions:
- source_word: נמוגו
  chosen: melted
  alternatives:
  - were shaken
  - grew faint
  - dissolved
  lexicon: HALOT
  rationale: The Hebrew verb conveys melting away or losing firmness, a vivid idiom
    for collapse in courage. 'Melted' preserves the Hebrew image better than the Greek
    parallel's more interpretive 'were shaken,' while still reading naturally in English.
- source_word: בגאון לבם
  chosen: in the pride of their heart
  alternatives:
  - because of the swelling of their heart
  - in the arrogance of their heart
  - their heart in pride
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat compressed. גאון can denote pride, exaltation,
    or swelling. Given the context of panic before threat, the sense is likely an
    inner swelling or proud confidence collapsing. 'In the pride of their heart' stays
    close to the Hebrew wording while remaining intelligible. The singular 'heart'
    reflects the collective sense of לבם.
- source_word: ויחילו
  chosen: they writhed
  alternatives:
  - they trembled
  - they were in labor pains
  - they were seized with anguish
  lexicon: HALOT
  rationale: The verb is associated with writhing, trembling, or labor pains. Because
    the next phrase explicitly compares them to a woman giving birth, 'they writhed'
    avoids redundancy while preserving the bodily image of anguish.
- source_word: כיולדה
  chosen: like a woman giving birth
  alternatives:
  - like a woman in labor
  - like those giving birth
  lexicon: HALOT
  rationale: The singular participial form naturally points to a woman in childbirth.
    'Like a woman giving birth' is idiomatic modern English and keeps the simile explicit.
- source_word: τότε ἐσαλεύθησαν καρδία καὶ χεῖρες αὐτῶν
  chosen: Then they melted ...
  alternatives:
  - Then their heart and hands were shaken
  lexicon: BDAG
  rationale: The Greek parallel expands the image to 'heart and hands,' likely reflecting
    an interpretive or variant tradition. Since the Hebrew is the primary witness
    here, the main text follows the Hebrew, but the Greek confirms the sense of panic
    and instability.
