translation:
  text: who brought down kings to destruction, and nobles from their beds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the pit'; Hebrew שחת can denote a pit or ruin/destruction. The Greek
      parallel reads 'to destruction.'
    reason: lexical_alternative
  - marker: b
    text: Or 'nobles' or 'the honored ones.'
    reason: lexical_alternative
  - marker: c
    text: The line likely echoes Elijah's judgments on kings and high-ranking figures,
      including a king confined to his bed (compare 2 Kings 1).
    reason: cross_reference
lexical_decisions:
- source_word: המוריד
  chosen: who brought down
  alternatives:
  - who cast down
  - who led down
  lexicon: HALOT
  rationale: The Hiphil participle of ירד here describes Elijah's action of causing
    rulers to descend from power or life. 'Brought down' is idiomatic English and
    preserves both the concrete downward motion and the figurative overthrow. The
    Greek καταγαγών supports this sense.
- source_word: מלכים
  chosen: kings
  alternatives:
  - rulers
  lexicon: HALOT
  rationale: The Hebrew specifically says 'kings,' and there is no contextual reason
    to generalize to 'rulers.'
- source_word: על שחת
  chosen: to destruction
  alternatives:
  - to the pit
  - into ruin
  lexicon: HALOT
  rationale: שחת can denote pit, grave, or destruction/corruption. In this context
    of Elijah's judgment on kings, the phrase most naturally conveys their downfall
    unto ruin or death. The Greek εἰς ἀπώλειαν strongly supports an abstract/resultative
    sense, 'to destruction,' rather than a literal 'pit.'
- source_word: ונכבדים
  chosen: and honored men
  alternatives:
  - and nobles
  - and glorious ones
  lexicon: HALOT
  rationale: The passive/adj. form from כבד denotes persons of weight, honor, or distinction.
    'Honored men' preserves the broad sense without narrowing too quickly to hereditary
    nobility, while still matching the parallel with kings. The Greek δεδοξασμένους
    likewise points to persons held in honor/glory.
- source_word: ממטותם
  chosen: from their beds
  alternatives:
  - from their couches
  lexicon: HALOT
  rationale: מטות are beds or couches. 'Beds' is the more natural modern English choice
    and fits the allusion to Elijah's word against the sick king in bed (cf. 2 Kings
    1), while remaining literal.
