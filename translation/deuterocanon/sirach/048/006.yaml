theological_decisions:
- issue: Whether to render the second colon as a general social reversal or as an
    allusion to Elijah's judgment on a bedridden king and other dignitaries
  chosen_reading: Retain the concrete wording 'honored men from their beds' without
    making the allusion explicit in the main text.
  alternative_readings:
  - render more interpretively as 'nobles from their sickbeds'
  - render more generally as 'the honored from their couches'
  rationale: The Hebrew and Greek both preserve the concrete image of distinguished
    persons associated with beds/couches. The likely narrative allusion should inform
    interpretation but not be imported into the translation beyond what the words
    state.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
