id: SIR.48.22
reference: Sirach 48:22
source:
  edition: sefaria-ben-sira-kahana
  text: כי עשה יחזקיהו את הטוב, ויחזק בדרכי דוד.<br><small>(כב)</small> [כאשר צוהו
    ישעיה הנביא, המהלל בנביאים.]
  language: Hebrew
  pages:
  - 764
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where
    the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced
    in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐποίησεν γὰρ Ἐζεκίας τὸ ἀρεστὸν Κυρίῳ, καὶ ἐνίσχυσεν ἐν ὁδοῖς Δαυεὶδ τοῦ
      πατρὸς αὐτοῦ, ἃς ἐνετείλατο Ἡσαίας ὁ προφήτης ὁ μέγας καὶ πιστὸς ἐν ὁράσει αὐτοῦ.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 48:22
translation:
  text: For Hezekiah did what was good, and was strong in the ways of David, as Isaiah
    the prophet commanded him, the one praised among the prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''did what was pleasing to the Lord.'' The extant Hebrew reads simply
      ''did what was good.'''
    reason: alternative_reading
  - marker: b
    text: Greek instead describes Isaiah as 'the great prophet, faithful in his vision.'
      The Hebrew reads 'praised among the prophets.'
    reason: textual_variant
lexical_decisions:
- source_word: כי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanatory statement about Hezekiah in relation to the
    surrounding praise; 'For' preserves the connective force naturally in English.
- source_word: עשה ... את הטוב
  chosen: did what was good
  alternatives:
  - did the good
  - did what was right
  lexicon: HALOT
  rationale: The Hebrew literally says 'did the good.' 'Did what was good' is idiomatic
    English and preserves the moral evaluation. The Greek parallel has τὸ ἀρεστὸν
    Κυρίῳ ('what was pleasing to the Lord'), but the Hebrew witness lacks 'to the
    Lord,' so it is not imported into the main text.
- source_word: ויחזק
  chosen: was strong
  alternatives:
  - strengthened himself
  - grew strong
  - held firm
  lexicon: HALOT
  rationale: The verb from חזק can be intransitive/reflexive in context. 'Was strong'
    fits the Hebrew wording and aligns broadly with the Greek ἐνίσχυσεν without over-specifying
    an object not present in Hebrew.
- source_word: בדרכי דוד
  chosen: in the ways of David
  alternatives:
  - in David's ways
  - in the paths of David
  lexicon: HALOT
  rationale: A standard biblical idiom for conduct patterned after an ancestor. 'Ways'
    is the most transparent and conventional rendering.
- source_word: כאשר צוהו
  chosen: as ... commanded him
  alternatives:
  - just as ... instructed him
  - as ... charged him
  lexicon: HALOT
  rationale: The Hebrew clause is straightforward. 'Commanded him' preserves the stronger
    force of צוה. The Greek differs by making the relative clause modify 'ways' ('which
    Isaiah commanded'), but the Hebrew more naturally refers to Hezekiah as the object.
- source_word: ישעיה הנביא
  chosen: Isaiah the prophet
  alternatives:
  - the prophet Isaiah
  lexicon: HALOT
  rationale: Both are possible in English; this order follows the Hebrew sequence
    while remaining natural.
- source_word: המהלל בנביאים
  chosen: the one praised among the prophets
  alternatives:
  - who was praised among the prophets
  - celebrated among the prophets
  lexicon: HALOT
  rationale: The Hebrew phrase is appositional and somewhat compressed. 'Praised among
    the prophets' preserves the passive sense of המהלל as transmitted in the Hebrew
    witness. It is retained despite the Greek parallel's different description ('great
    and faithful in his vision'), because the Hebrew is the primary witness here.
