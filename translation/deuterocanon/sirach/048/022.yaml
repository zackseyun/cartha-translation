theological_decisions:
- issue: Whether to include 'to the Lord' from the Greek parallel
  chosen_reading: Omitted from the main text
  alternative_readings:
  - did what was pleasing to the Lord
  rationale: The primary Hebrew witness reads only 'did the good/what was good.' Since
    Hebrew is extant for this verse, the Greek expansion or interpretive clarification
    should not override it. The alternative is preserved in a footnote because the
    Greek parallel is a meaningful witness.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; for Sirach, translate from Hebrew where it survives while keeping Greek
    in view.'
- issue: How to handle the divergent final description of Isaiah
  chosen_reading: 'Followed the Hebrew: ''the one praised among the prophets'''
  alternative_readings:
  - the great prophet, faithful in his vision
  - the prophet, great and faithful in his vision
  rationale: The Hebrew and Greek differ materially in the final appositional phrase.
    Because the Hebrew survives, it governs the main text. The Greek reading is significant
    enough to preserve in a footnote as an alternative witness.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    significant alternatives in footnotes.
