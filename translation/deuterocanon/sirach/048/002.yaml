translation:
  text: He broke their staff of bread, and in his zeal he diminished them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'staff of bread,' an idiom for the food supply; the Greek parallel
      reads 'he brought famine upon them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וישבר
  chosen: He broke
  alternatives:
  - he shattered
  - he broke in pieces
  lexicon: HALOT
  rationale: The Hebrew verb שבר in this form straightforwardly means 'break.' The
    singular subject aligns with the Greek ὃς ἐπήγαγεν, continuing the description
    of Elijah's acts. 'He broke' preserves the concrete metaphor without overinterpreting
    it.
- source_word: מטה לחם
  chosen: staff of bread
  alternatives:
  - supply of bread
  - bread support
  lexicon: HALOT
  rationale: This Hebrew idiom means the support or sustaining supply of bread, i.e.,
    food provision. I retained the literal 'staff of bread' in the main text because
    it is a recognizable biblical idiom and reflects the Hebrew closely; the sense
    can be clarified by footnote. The Greek parallel λιμόν ('famine') confirms that
    the idiom refers to deprivation of food.
- source_word: ובקנאתו
  chosen: and in his zeal
  alternatives:
  - and by his zeal
  - and in his jealousy
  lexicon: HALOT
  rationale: קנאה can denote zeal or jealousy. In context, referring to Elijah's ardent
    zeal for God and its effect, 'zeal' is the better English choice. The preposition
    ב is rendered 'in' to preserve the Hebrew phrasing while remaining natural enough
    in English.
- source_word: המעיטם
  chosen: he made them few
  alternatives:
  - he reduced them
  - he diminished them
  lexicon: HALOT
  rationale: The hiphil of מעט means to make small/few, reduce. 'He made them few'
    preserves the resultative force and matches the Greek ὠλιγοποίησεν ('made few').
- source_word: λιμόν
  chosen: famine
  alternatives:
  - hunger
  lexicon: BDAG
  rationale: The Greek parallel explicitly interprets the Hebrew idiom מטה לחם as
    famine. This supports understanding the clause as an act of causing food shortage,
    even though the Hebrew wording is retained more literally in the translation.
