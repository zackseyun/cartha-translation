translation:
  text: By his lips the sinner will be caught, and the reviler and the proud will
    stumble by them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In his lips the sinner will be left behind'; the Greek verb can more
      literally mean 'will be left' or 'will be abandoned,' but in context it likely
      means being trapped or undone by one's own speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τοῖς χείλεσιν αὐτοῦ
  chosen: By his lips
  alternatives:
  - In his lips
  - With his lips
  - By his mouth
  lexicon: BDAG
  rationale: The preposition ἐν with an instrumental or locative nuance here is best
    rendered idiomatically as 'by' to express means or agency in English. 'Lips' preserves
    the concrete imagery of speech better than the more generalized 'mouth'.
- source_word: καταλειφθήσεται
  chosen: will be caught
  alternatives:
  - will be left behind
  - will be abandoned
  - will be ensnared
  lexicon: LSJ
  rationale: Although the verb commonly means 'to leave behind' or 'abandon,' in this
    context with speech as the instrument and parallel to 'will stumble,' the sense
    is that the sinner is trapped or brought down by his own words. 'Will be caught'
    conveys the likely idiomatic force in readable English without over-paraphrasing.
- source_word: ἁμαρτωλός
  chosen: the sinner
  alternatives:
  - a sinner
  - the sinful man
  lexicon: BDAG
  rationale: The singular substantive is naturally rendered 'the sinner.' The article
    can be generic, but English often uses 'the sinner' proverbially in wisdom-style
    statements.
- source_word: λοίδορος
  chosen: the reviler
  alternatives:
  - the abusive speaker
  - the slanderer
  - the insult-giver
  lexicon: BDAG
  rationale: '''Reviler'' is concise and accurate for one who speaks abusively or
    insultingly. It preserves the verbal-ethical focus of the Greek.'
- source_word: ὑπερήφανος
  chosen: the proud
  alternatives:
  - the arrogant
  - the haughty
  lexicon: BDAG
  rationale: '''The proud'' is the most natural and broadly understandable rendering,
    while still carrying the moral sense of arrogant self-exaltation.'
- source_word: σκανδαλισθήσονται
  chosen: will stumble
  alternatives:
  - will be caused to stumble
  - will be tripped up
  - will fall into offense
  lexicon: BDAG
  rationale: In wisdom context, 'will stumble' communicates downfall or being tripped
    up. It is idiomatic and preserves the metaphor without importing later technical
    theological senses.
- source_word: ἐν αὐτοῖς
  chosen: by them
  alternatives:
  - in them
  - through them
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to the lips/words. 'By them' expresses
    instrumentality in English and keeps the parallel with the first clause.
