theological_decisions:
- issue: Moral force of ἐπιθυμία
  chosen_reading: Rendered broadly as 'desire' rather than the narrower 'lust.'
  alternative_readings:
  - lust
  - craving
  rationale: The Greek noun can carry morally negative desire without being limited
    to sexual lust. A broader rendering preserves the text's scope and lets the immediate
    context define the ethical valence.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    lexical scope unless context demands narrowing.'
