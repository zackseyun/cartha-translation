translation:
  text: and turn desire away from me;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lust' or 'craving.' The Greek term can denote strong desire in a morally
      negative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμίαν
  chosen: desire
  alternatives:
  - craving
  - lust
  - evil desire
  lexicon: BDAG
  rationale: The noun can denote desire broadly, often with a negative moral sense
    in context. Here the prayer asks God to remove an inward impulse; 'desire' is
    the most transparent base rendering and avoids over-specifying sexual lust where
    the Greek phrase itself does not explicitly do so. The surrounding context in
    Sirach concerns appetites and discipline, so the negative force is carried by
    context rather than by an intensified English gloss.
- source_word: ἀπόστρεψον
  chosen: turn away
  alternatives:
  - remove
  - turn back
  - divert
  lexicon: LSJ
  rationale: The aorist imperative asks for decisive action. 'Turn away' closely reflects
    the verbal image of causing something to be turned from the speaker, while remaining
    natural English. 'Remove' is possible but less image-rich than the Greek.
- source_word: ἀπʼ ἐμοῦ
  chosen: from me
  alternatives:
  - away from me
  - from within me
  lexicon: BDAG
  rationale: The prepositional phrase marks separation from the speaker. In idiomatic
    English, attaching 'away' to the verb and keeping 'from me' here best preserves
    the sense without adding the more interpretive 'from within me'.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: This continues the prayer from the previous line, so the simple connective
    'and' is appropriate and preserves the verse's dependence on its context.
