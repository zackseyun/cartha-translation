theological_decisions:
- issue: Distinction between ἄγνοιαι and ἁμαρτίαι
  chosen_reading: Render the two terms distinctly as 'ignorances' and 'sins'
  alternative_readings:
  - Render both more generally as 'errors' and 'sins'
  - Interpret ἄγνοιαι specifically as 'sins of ignorance'
  rationale: The verse appears to distinguish failings rooted in ignorance from sins
    more broadly. Preserving that tension is preferable to flattening the pair into
    near-synonyms. At the same time, the Greek wording does not require the more technical
    phrase 'sins of ignorance,' so the main text remains restrained.
  doctrine_reference: Translation philosophy §3, §5
- issue: Hostile nuance of ἐπιχαρεῖταί μοι
  chosen_reading: Use 'rejoice over me' in the main text
  alternative_readings:
  - gloat over me
  rationale: The context clearly implies hostile triumph, but the Greek verb itself
    can be rendered more literally. The less interpretive main-text choice preserves
    transparency while allowing the hostile nuance to remain evident from 'my enemy.'
  doctrine_reference: Translation philosophy §1, §6
