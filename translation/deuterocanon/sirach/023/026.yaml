theological_decisions:
- issue: Moral consequence language applied to the adulterous woman in context
  chosen_reading: Retain the verse's stark statement of enduring public disgrace without
    softening or expanding it.
  alternative_readings:
  - Soften to a more general statement about bad reputation
  - Expand to explicit divine judgment language
  rationale: The Greek speaks of lasting memory, curse, and disgrace, but does not
    explicitly add further theological explanation in this clause. The translation
    preserves the severity of the wisdom warning without importing extra doctrinal
    claims.
