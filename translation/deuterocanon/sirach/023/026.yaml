translation:
  text: She will leave her memory for a curse, and her disgrace will not be wiped
    away.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καταλείψει
  chosen: will leave
  alternatives:
  - will abandon
  - will leave behind
  lexicon: BDAG
  rationale: Future of καταλείπω. In this context it refers to what remains after
    her, not to abandoning a person; 'will leave' is the most natural and sufficiently
    formal rendering.
- source_word: εἰς κατάραν
  chosen: for a curse
  alternatives:
  - as a curse
  - into a curse
  lexicon: BDAG
  rationale: The preposition εἰς with accusative expresses result or outcome. 'For
    a curse' conveys that her remembered name becomes something invoked negatively,
    while remaining idiomatic English.
- source_word: τὸ μνημόσυνον αὐτῆς
  chosen: her memory
  alternatives:
  - her remembrance
  - her memorial
  lexicon: BDAG
  rationale: μνημόσυνον can denote remembrance or memorial. Here the sense is the
    lasting remembrance of her reputation, not a physical memorial object, so 'her
    memory' best fits modern English.
- source_word: τὸ ὄνειδος αὐτῆς
  chosen: her disgrace
  alternatives:
  - her reproach
  - her shame
  - her dishonor
  lexicon: BDAG
  rationale: ὄνειδος denotes reproach, disgrace, or public shame. 'Disgrace' captures
    both the shame itself and its social dimension in clear contemporary English.
- source_word: οὐκ ἐξαλειφθήσεται
  chosen: will not be wiped away
  alternatives:
  - will not be blotted out
  - will not be erased
  lexicon: BDAG
  rationale: Future passive of ἐξαλείφω, literally 'wipe out/blot out.' 'Wiped away'
    preserves the metaphor and reads naturally; 'blotted out' is possible but more
    archaic in this context.
