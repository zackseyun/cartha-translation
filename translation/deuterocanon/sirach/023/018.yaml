theological_decisions:
- issue: Whether to make the sexual/marital implication explicit in the main text
  chosen_reading: Keep the euphemistic wording 'strays from his bed' in the main text
  alternative_readings:
  - A man who leaves his marriage bed
  - A man committing adultery
  rationale: The immediate context in Sirach 23 concerns sexual sin and hidden adultery,
    so the implication is strong. However, this clause itself uses indirect language
    rather than an explicit term for adultery. To avoid importing more specificity
    than the source states, the main text preserves the euphemism and lets context
    supply the force.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
