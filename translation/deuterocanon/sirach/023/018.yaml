translation:
  text: A man transgressing from his bed says in his soul, “Who sees me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'A man who leaves his marriage bed.' The
      Greek says literally 'a man transgressing/straying from his bed,' a euphemistic
      expression in this context of sexual sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  chosen: A man
  alternatives:
  - A person
  - Someone
  lexicon: LSJ
  rationale: The Greek is singular and grammatically masculine. In this context it
    introduces a representative individual rather than humanity in the abstract. Per
    project philosophy, a gender-accurate rendering is preferred over flattening to
    a neutral term.
- source_word: παραβαίνων
  chosen: who strays
  alternatives:
  - who transgresses
  - who goes astray
  - who oversteps
  lexicon: LSJ
  rationale: The participle literally conveys crossing over or transgressing. In context
    with 'from his bed' it likely refers euphemistically to sexual unfaithfulness
    or leaving the marriage bed. 'Strays' preserves the moral deviation without over-specifying
    beyond the Greek wording.
- source_word: ἀπὸ τῆς κλίνης αὐτοῦ
  chosen: from his bed
  alternatives:
  - from his couch
  - from his marriage bed
  lexicon: LSJ
  rationale: κλίνη can mean bed or couch. 'Bed' is the most natural English here.
    'Marriage bed' would make the implied adultery more explicit, but the Greek itself
    leaves that implication to context, so the simpler wording is retained.
- source_word: λέγων ἐν τῇ ψυχῇ αὐτοῦ
  chosen: says in his soul
  alternatives:
  - says to himself
  - says in his heart
  lexicon: LSJ
  rationale: The phrase is an internal-speech formula. 'Says in his soul' is slightly
    more literal and preserves the anthropological language of ψυχή, while remaining
    understandable in English. 'Says to himself' is idiomatic but loses that lexical
    texture.
- source_word: Τίς με ὁρᾷ;
  chosen: Who sees me?
  alternatives:
  - Who is watching me?
  - Who can see me?
  lexicon: LSJ
  rationale: A straightforward present-tense question. 'Who sees me?' is the closest
    natural rendering and preserves the speaker's assumption of secrecy.
