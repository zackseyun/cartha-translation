translation:
  text: So also a woman who leaves her husband and presents an heir from another man;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from a stranger.' The Greek ἐξ ἀλλοτρίου refers to someone outside the
      marriage; 'by another man' makes that sense explicit in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ
  chosen: So also
  alternatives:
  - Likewise
  - In the same way also
  lexicon: LSJ
  rationale: Connective phrase linking this line to the preceding comparison or example;
    'So also' preserves the inferential and comparative force without overexpansion.
- source_word: γυνή
  chosen: a woman
  alternatives:
  - the woman
  - wife
  lexicon: LSJ
  rationale: Although γυνή can mean 'wife,' the phrase already specifies 'her husband'
    (τὸν ἄνδρα), so 'a woman' is the more natural English here while retaining the
    marital context.
- source_word: καταλιποῦσα
  chosen: who leaves
  alternatives:
  - having left
  - forsaking
  - abandons
  lexicon: LSJ
  rationale: Aorist participle describing the woman's action. 'Who leaves' gives clear
    English in a proverbial statement; 'abandons' would add a stronger moral coloring
    than the Greek itself requires.
- source_word: τὸν ἄνδρα
  chosen: her husband
  alternatives:
  - the husband
  - her man
  lexicon: LSJ
  rationale: In context ἀνήρ refers to the woman's spouse, so 'her husband' is the
    idiomatic and contextually precise rendering.
- source_word: παριστῶσα
  chosen: presents
  alternatives:
  - produces
  - brings forward
  - sets forth
  lexicon: LSJ
  rationale: The participle likely means presenting or producing a child as heir.
    'Presents' stays close to the Greek while allowing the legal/familial nuance to
    remain implicit.
- source_word: κληρονόμον
  chosen: an heir
  alternatives:
  - a successor
  - an inheritor
  lexicon: LSJ
  rationale: The noun denotes one who inherits. 'Heir' is the standard concise English
    equivalent and fits the family-law setting.
- source_word: ἐξ ἀλλοτρίου
  chosen: by another man
  alternatives:
  - from a stranger
  - from another
  - by an outsider
  lexicon: LSJ
  rationale: ἀλλότριος here means someone not belonging to the husband, i.e., another
    man. 'By another man' makes the adultery/illegitimacy implication explicit in
    idiomatic English. 'From a stranger' could misleadingly suggest unfamiliarity
    rather than non-marital paternity.
