theological_decisions:
- issue: Moral-legal force of the proverb concerning adultery and illegitimate inheritance
  chosen_reading: Render the line straightforwardly as describing a woman leaving
    her husband and producing an heir by another man, without adding interpretive
    labels such as 'adulteress' in the main text.
  alternative_readings:
  - So also a wife who abandons her husband and bears an heir by a stranger
  rationale: The Greek states the act and its consequence rather than explicitly naming
    the woman with a moral title in this verse. The translation preserves the text's
    own wording and leaves the condemnation to the surrounding context.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
