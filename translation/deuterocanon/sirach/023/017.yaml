theological_decisions:
- issue: Whether to make the metaphor explicit as sexual appetite rather than preserve
    the bread imagery
  chosen_reading: 'Preserve the metaphor in the main text: ''every bread is sweet.'''
  alternative_readings:
  - '''every kind of food is sweet'''
  - '''every woman is desirable'''
  rationale: The Greek text itself uses bread imagery, likely proverbially for indiscriminate
    appetite. Making the sexual referent explicit would over-interpret beyond the
    wording. The surrounding context already signals sexual immorality.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Whether τελευτήσῃ should be rendered specifically as death or more broadly
    as end/ruin
  chosen_reading: Render broadly as 'comes to his end.'
  alternative_readings:
  - '''until he dies'''
  rationale: The verb can denote death, but the wisdom context allows a broader moral
    endpoint. The broader rendering preserves theological tension rather than resolving
    it too narrowly.
  doctrine_reference: Translation philosophy §3
