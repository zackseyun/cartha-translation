translation:
  text: To a promiscuous man every bread is sweet; he will not stop until he comes
    to his end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'every kind of bread is sweet.' The image likely suggests indiscriminate
      appetite rather than bread alone.
    reason: lexical_alternative
  - marker: b
    text: Or, 'until he dies.' The Greek can refer specifically to death, though 'comes
      to his end' also preserves the broader sense of final ruin.
    reason: alternative_reading
lexical_decisions:
- source_word: πόρνῳ
  chosen: promiscuous
  alternatives:
  - fornicating
  - sexually immoral
  - whoring
  lexicon: BDAG
  rationale: πόρνος/πόρνῃ language denotes sexual immorality broadly, not necessarily
    only prostitution. In this proverb-like context modifying ἄνθρωπος, 'promiscuous
    man' communicates habitual illicit sexual behavior in readable modern English
    without narrowing the sense too much.
- source_word: πᾶς ἄρτος
  chosen: every bread
  alternatives:
  - every loaf
  - all food
  - every kind of bread
  lexicon: LSJ
  rationale: The Greek is literally 'every bread.' In context it is metaphorical for
    any available gratification/partner, but the image should be preserved rather
    than flattened to 'all food.' English keeps the singular collective idiom with
    minimal adjustment.
- source_word: ἡδύς
  chosen: sweet
  alternatives:
  - pleasant
  - delightful
  - tasty
  lexicon: BDAG
  rationale: ἡδύς commonly means 'sweet' or 'pleasant.' 'Sweet' preserves the sensory
    metaphor attached to bread and the moral irony of illicit desire.
- source_word: οὐ μὴ κοπάσῃ
  chosen: he will not stop
  alternatives:
  - he will not cease
  - he will not grow weary
  - he will not desist
  lexicon: BDAG
  rationale: οὐ μή with the subjunctive gives strong negation. κοπάζω can mean cease/abate.
    'He will not stop' is idiomatic modern English and captures the force of persistent,
    unrestrained behavior.
- source_word: ἕως ἂν τελευτήσῃ
  chosen: until he comes to his end
  alternatives:
  - until he dies
  - until he is finished
  - until he reaches his end
  lexicon: BDAG
  rationale: τελευτάω can mean 'come to an end' or 'die.' The phrase may imply literal
    death while also carrying a proverbial sense of final ruin. 'Comes to his end'
    preserves that breadth better than the narrower 'dies.'
