theological_decisions:
- issue: Double divine address with both κύριε and δέσποτα
  chosen_reading: Render as 'Lord, Father and Master of my life'
  alternative_readings:
  - Lord, Father and Sovereign of my life
  - O Lord, Father and ruler of my life
  rationale: The verse stacks titles in prayer. Keeping both 'Lord' and 'Master' preserves
    the rhetorical weight and avoids collapsing distinct Greek terms into one English
    title.
  doctrine_reference: 'DOCTRINE.md: Translate titles; contested terms table for κύριος
    → Lord'
- issue: Force of ἐν αὐτοῖς at the end of the verse
  chosen_reading: Translate idiomatically as 'by them' in the main text
  alternative_readings:
  - in them
  - among them
  rationale: The Greek preposition ἐν with the plural pronoun is terse and could be
    rendered more literally, but in English 'fall in them' is opaque. 'By them' best
    communicates the likely sense of falling through their influence or devices, while
    preserving alternatives in a footnote.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve ambiguity where
    genuine'
