translation:
  text: Lord, Father and Master of my life, do not abandon me to their counsel; do
    not let me fall among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their counsel.' The Greek phrase is literally 'in their counsel,'
      but in English the sense is likely being given over to their plan or advice.
    reason: lexical_alternative
  - marker: b
    text: Or 'in them' or 'among them.' The final phrase is compressed in Greek and
      may refer to falling through their influence or within their schemes.
    reason: alternative_reading
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Vocative of κύριος used as a divine address/title. Per doctrine defaults,
    'Lord' is the standard rendering rather than 'Master' in such address.
- source_word: πάτερ
  chosen: Father
  lexicon: LSJ
  rationale: Direct vocative address to God; 'Father' is the plain and natural equivalent.
- source_word: δέσποτα
  chosen: Master
  alternatives:
  - Sovereign
  - Lord
  lexicon: LSJ
  rationale: δέσποτα is distinct from κύριε in the same clause, so rendering it also
    as 'Lord' would flatten the double address. 'Master' preserves the authority nuance
    while remaining readable.
- source_word: ζωῆς μου
  chosen: of my life
  alternatives:
  - over my life
  lexicon: LSJ
  rationale: 'The genitive most naturally attaches to ''Father and Master'': ''Father
    and Master of my life.'' ''Over my life'' is interpretive and less direct.'
- source_word: μὴ ἐγκαταλίπῃς με
  chosen: do not abandon me
  alternatives:
  - do not forsake me
  - do not leave me
  lexicon: LSJ
  rationale: ἐγκαταλείπω commonly means leave behind, forsake, abandon. 'Abandon'
    is strong but natural English and fits the prayerful plea.
- source_word: ἐν βουλῇ αὐτῶν
  chosen: to their counsel
  alternatives:
  - in their counsel
  - to their plan
  lexicon: LSJ
  rationale: βουλή can mean counsel, purpose, or plan. With ἐγκαταλίπῃς, English idiom
    favors 'abandon me to their counsel' rather than the more wooden 'in their counsel.'
    This preserves the sense of being handed over to hostile designs.
- source_word: μὴ ἀφῇς με
  chosen: do not let me
  alternatives:
  - do not permit me
  - do not leave me
  lexicon: LSJ
  rationale: 'ἀφίημι here functions permissively: ''allow/let.'' ''Do not let me''
    is the clearest idiomatic rendering in context.'
- source_word: πεσεῖν
  chosen: fall
  alternatives:
  - stumble
  - collapse
  lexicon: LSJ
  rationale: The infinitive of πίπτω is straightforwardly 'to fall.' No contextual
    pressure requires a more interpretive gloss.
- source_word: ἐν αὐτοῖς
  chosen: by them
  alternatives:
  - among them
  - in them
  lexicon: LSJ
  rationale: The phrase is somewhat compressed. A literal 'in them' is unclear in
    English. Given the preceding plural referent and the hostile context, 'by them'
    best conveys falling through their agency or because of them, while preserving
    the ambiguity enough to footnote alternatives.
