id: SIR.23.11
reference: Sirach 23:11
source:
  edition: lxx-swete-1909
  text: ἀνὴρ πολύορκος πλησθήσεται ἀνομίας, καὶ οὐκ ἀποστήσεται ἀπὸ τοῦ οἴκου αὐτοῦ
    μάστιξ· ἐὰν πλημμελήσῃ, ἁμαρτία αὐτοῦ ἐπʼ αὐτῷ, κἂν ὑπερίδῃ, ἥμαρτεν δισσῶς· καὶ
    εἰ διὰ κενῆς ὤμοσεν, οὐ δικαιωθήσεται, πλησθήσεται γὰρ ἐπαγωγῶν ὁ οἶκος αὐτοῦ.
  language: Greek
