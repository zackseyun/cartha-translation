translation:
  text: A man who swears many oaths will be filled with lawlessness, and the whip
    will not depart from his house. If he stumbles, his sin is upon him; and if he
    overlooks it, he has sinned doubly. And if he swore in vain, he will not be justified,
    for his house will be filled with afflictions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the scourge will not depart from his house.' The Greek μάστιξ can denote
      a literal whip or, figuratively, a scourge of punishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'if he ignores it, he has sinned twice over.' The sense is that treating
      the offense lightly compounds the guilt.
    reason: lexical_alternative
  - marker: c
    text: Or 'if he swore falsely' / 'if he took an empty oath.' The Greek literally
      speaks of swearing 'through emptiness.'
    reason: lexical_alternative
  - marker: d
    text: The final term is difficult; it likely means imposed troubles or punitive
      afflictions coming upon the household.
    reason: textual_variant
lexical_decisions:
- source_word: ἀνὴρ
  chosen: A man
  alternatives:
  - A person
  - A human being
  lexicon: LSJ
  rationale: The Greek is grammatically masculine singular and presents a representative
    individual. Per project philosophy, a gender-accurate rendering is preferred over
    flattening to a neutral term.
- source_word: πολύορκος
  chosen: who swears many oaths
  alternatives:
  - much-swearing
  - given to many oaths
  - often swearing
  lexicon: LSJ
  rationale: The adjective denotes one characterized by frequent oath-taking. English
    idiom is clearer with a relative clause than with a compressed adjective like
    'much-swearing'.
- source_word: πλησθήσεται ἀνομίας
  chosen: will be filled with lawlessness
  alternatives:
  - will be full of wrongdoing
  - will be filled with iniquity
  lexicon: LSJ
  rationale: ἀνομία is more than generic error; it conveys violation of moral order
    or law. 'Lawlessness' preserves that weight while remaining readable.
- source_word: μάστιξ
  chosen: the whip
  alternatives:
  - scourge
  - plague
  - punishment
  lexicon: LSJ
  rationale: The noun literally denotes a whip/scourge and can extend metaphorically
    to chastisement. 'The whip' preserves the vivid image of punitive judgment better
    than the more abstract 'punishment.'
- source_word: πλημμελήσῃ
  chosen: he stumbles
  alternatives:
  - he transgresses
  - he commits an offense
  - he errs
  lexicon: LSJ
  rationale: The verb can mean to make a mistake or commit a fault. 'Stumbles' preserves
    the moral-failure sense without over-specifying a legal category, fitting wisdom
    style.
- source_word: ἁμαρτία αὐτοῦ ἐπʼ αὐτῷ
  chosen: his sin is upon him
  alternatives:
  - his guilt rests on him
  - he bears his sin
  lexicon: LSJ
  rationale: This keeps the concrete Greek idiom rather than smoothing it away. It
    communicates personal liability for the offense.
- source_word: ὑπερίδῃ
  chosen: he overlooks it
  alternatives:
  - he ignores it
  - he disregards it
  - he passes over it
  lexicon: LSJ
  rationale: The verb means to overlook or disregard. Here it likely refers to treating
    the offense lightly rather than repenting of it. 'Overlooks it' preserves that
    nuance.
- source_word: ἥμαρτεν δισσῶς
  chosen: he has sinned doubly
  alternatives:
  - he has sinned twice over
  - he has committed a double sin
  lexicon: LSJ
  rationale: The adverbial force of δισσῶς is best preserved by 'doubly,' indicating
    compounded guilt.
- source_word: διὰ κενῆς ὤμοσεν
  chosen: he swore in vain
  alternatives:
  - he swore falsely
  - he swore for nothing
  - he took an empty oath
  lexicon: LSJ
  rationale: The phrase literally involves emptiness/vanity. 'Swore in vain' is idiomatic
    English that preserves the sense of an empty or baseless oath without forcing
    the narrower idea of perjury.
- source_word: οὐ δικαιωθήσεται
  chosen: he will not be justified
  alternatives:
  - he will not be acquitted
  - he will not be cleared
  lexicon: LSJ
  rationale: The verb is the standard term for being declared righteous or cleared.
    'Justified' is the most direct rendering, though in this wisdom context it carries
    judicial vindication rather than later Pauline technicality.
- source_word: ἐπαγωγῶν
  chosen: afflictions
  alternatives:
  - visitations
  - penalties
  - calamities
  lexicon: LSJ
  rationale: The term is difficult and contextually refers to imposed troubles or
    punishments coming upon the household. 'Afflictions' is broad enough to preserve
    the sense without overclaiming a narrower technical meaning.
