theological_decisions:
- issue: Force of δικαιωθήσεται in wisdom literature
  chosen_reading: 'judicial/moral vindication: ''he will not be justified'''
  alternative_readings:
  - he will not be acquitted
  - he will not be cleared
  rationale: The context concerns guilt from oath-taking and resulting punishment
    on the household. The rendering should preserve the judicial flavor of the Greek
    without importing later doctrinal debates about justification.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; preserve source meaning
    without importing doctrinal claims'
