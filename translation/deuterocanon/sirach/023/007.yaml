translation:
  text: Hear instruction for the mouth, children, and the one who keeps it will certainly
    not be caught.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hear discipline of the mouth' or 'Hear instruction about speech.' The
      Greek expression is compact and can be rendered more formally or more idiomatically.
    reason: lexical_alternative
  - marker: b
    text: '''Will certainly not be caught'' translates an emphatic Greek negation;
      alternatively, ''will by no means be taken.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Παιδείαν
  chosen: instruction
  alternatives:
  - discipline
  - training
  lexicon: BDAG
  rationale: παιδεία can denote discipline, training, or instruction. In this wisdom
    context introducing speech ethics, 'instruction' best fits the exhortational sense
    without losing the formative nuance.
- source_word: στόματος
  chosen: for the mouth
  alternatives:
  - of the mouth
  - about speech
  lexicon: BDAG
  rationale: The genitive literally means 'of the mouth.' In idiomatic English, 'instruction
    for the mouth' conveys instruction governing speech. 'About speech' is interpretive;
    'for the mouth' stays closer to the Greek while remaining understandable.
- source_word: ἀκούσατε
  chosen: Hear
  alternatives:
  - listen to
  - heed
  lexicon: BDAG
  rationale: Aorist imperative calling for attentive reception. 'Hear' is concise
    and suitably formal for wisdom exhortation; 'heed' adds obedience more explicitly
    than the verb itself requires.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - my children
  lexicon: BDAG
  rationale: τέκνα is vocative plural, naturally 'children.' 'Sons' would be too narrow,
    and 'my children' adds a possessive not present in the Greek.
- source_word: ὁ φυλάσσων
  chosen: the one who keeps it
  alternatives:
  - whoever guards it
  - the one who observes it
  lexicon: BDAG
  rationale: φυλάσσω commonly means keep, guard, or observe. Because the object is
    implicit from the preceding instruction, 'keeps it' makes the English complete
    while preserving the sense of careful observance.
- source_word: οὐ μὴ
  chosen: will certainly not
  alternatives:
  - will by no means
  - shall never
  lexicon: BDAG
  rationale: The emphatic negation οὐ μή with the following verb strongly denies the
    outcome. 'Will certainly not' captures the force in natural modern English.
- source_word: ἁλῷ
  chosen: be caught
  alternatives:
  - be taken
  - be captured
  - be convicted
  lexicon: BDAG
  rationale: From ἁλίσκομαι, 'to be caught/taken.' In context of sinful speech and
    its consequences, 'be caught' works both literally and morally without over-specifying
    legal conviction.
