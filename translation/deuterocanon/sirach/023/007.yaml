theological_decisions:
- issue: Implicit object of 'keeps'
  chosen_reading: Supplied as 'it,' referring to the instruction for speech.
  alternative_readings:
  - 'Leave the object implicit in English: ''the one who keeps will certainly not
    be caught'''
  rationale: English normally requires an object here, and the nearest antecedent
    is the instruction just mentioned. Supplying 'it' clarifies without adding a new
    concept.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the final clause
  chosen_reading: 'General consequence: the one who keeps this instruction will not
    be ensnared.'
  alternative_readings:
  - 'More juridical: ''will not be convicted'''
  rationale: The verse is wisdom instruction about speech, so a broad warning about
    being caught in wrongdoing or its consequences fits better than a narrowly forensic
    rendering.
  doctrine_reference: Translation philosophy §6
