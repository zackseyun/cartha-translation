theological_decisions:
- issue: Referent of 'wrath'
  chosen_reading: wrath is left unspecified in the main text
  alternative_readings:
  - God's wrath
  - punishment
  rationale: The Greek says only ὀργήν ('wrath/anger') without naming God. Supplying
    'God's' would import a theological specification not explicit in the source, though
    divine wrath is likely in context.
  doctrine_reference: Preserve theological tension rather than resolve it; never import
    doctrinal claims the text does not make.
