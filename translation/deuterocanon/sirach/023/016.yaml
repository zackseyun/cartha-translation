translation:
  text: Two kinds multiply sins, and the third will bring wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the third kind will bring anger.' The Greek leaves the noun implied
      after 'the third.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δύο
  chosen: Two
  alternatives:
  - There are two
  lexicon: LSJ
  rationale: Straightforward cardinal numeral introducing a counted saying.
- source_word: εἴδη
  chosen: kinds
  alternatives:
  - sorts
  - forms
  - species
  lexicon: LSJ
  rationale: εἶδος here denotes categories or types rather than visual appearance;
    'kinds' is natural modern English and fits wisdom-style enumeration.
- source_word: πληθύνουσιν
  chosen: multiply
  alternatives:
  - increase
  - make many
  lexicon: LSJ
  rationale: The verb means to increase or multiply. 'Multiply' preserves the vivid
    sense that these things cause sins to become more numerous.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - sin
  lexicon: LSJ
  rationale: Plural object is explicit in Greek and should be retained.
- source_word: τὸ τρίτον
  chosen: the third
  alternatives:
  - a third thing
  - the third kind
  lexicon: LSJ
  rationale: Neuter singular with article points to a third item in the sequence.
    English can preserve the elliptical form 'the third' without over-specifying.
- source_word: ἐπάξει
  chosen: will bring
  alternatives:
  - will bring on
  - will cause
  lexicon: LSJ
  rationale: Future of ἐπάγω, here in the sense of bringing upon or causing. 'Will
    bring' is concise and idiomatic.
- source_word: ὀργήν
  chosen: wrath
  alternatives:
  - anger
  lexicon: LSJ
  rationale: In wisdom and biblical moral discourse, 'wrath' better preserves the
    gravity of punitive anger than the flatter 'anger.' The object is left without
    an explicit subject in Greek, so English likewise avoids adding 'God's'.
