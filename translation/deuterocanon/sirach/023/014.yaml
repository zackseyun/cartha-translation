translation:
  text: Remember your father and your mother, for you sit in the midst of great men;
    lest you be forgotten before them, and by your habit become foolish, and wish
    that you had not been born, and curse the day of your birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'lest you forget yourself before them,' that is, lose proper restraint
      in their presence. The Greek form can be understood in more than one way here.
    reason: alternative_reading
  - marker: b
    text: '''Great men'' renders a masculine term for socially powerful or high-ranking
      men; alternatives include ''nobles'' or ''great ones.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητι
  chosen: Remember
  alternatives:
  - Keep in mind
  - Be mindful of
  lexicon: BDAG
  rationale: Aorist imperative calling for active recollection. 'Remember' is direct
    and idiomatic.
- source_word: πατρὸς καὶ μητρός σου
  chosen: your father and your mother
  alternatives:
  - your parents
  lexicon: BDAG
  rationale: The Greek names each parent individually; preserving both terms keeps
    the concrete familial reference rather than flattening to the collective 'parents'.
- source_word: ἀνὰ μέσον
  chosen: in the midst of
  alternatives:
  - among
  lexicon: BDAG
  rationale: Literally 'in the midst of'; retained with slightly elevated but still
    readable English to reflect the formal setting.
- source_word: μεγιστάνων
  chosen: great men
  alternatives:
  - nobles
  - magnates
  - important men
  lexicon: LSJ
  rationale: Refers to high-status or powerful persons. 'Great men' preserves the
    masculine form and representative social rank more closely than the more interpretive
    'nobles.'
- source_word: συνεδρεύει
  chosen: you sit
  alternatives:
  - you are seated
  - you sit in council
  lexicon: LSJ
  rationale: The verb denotes sitting together, often in council or company. Given
    the immediate context, 'you sit' is concise and leaves the social setting implied
    by 'in the midst of great men.'
- source_word: μή ποτε
  chosen: lest
  alternatives:
  - so that not
  - in case
  lexicon: BDAG
  rationale: Introduces a warning about possible consequence. 'Lest' is compact and
    fits wisdom-style admonition.
- source_word: ἐπιλαθῇ ἐνώπιον αὐτῶν
  chosen: you be forgotten before them
  alternatives:
  - you forget yourself before them
  - you be overlooked in their presence
  lexicon: BDAG
  rationale: The middle/passive form of ἐπιλανθάνομαι is difficult. The most natural
    reading from the Greek form is passive-like, 'be forgotten,' though the context
    also suggests a lapse of self-control or propriety. The chosen rendering stays
    close to the form while allowing the following clauses to explain the shameful
    outcome.
- source_word: τῷ ἐθισμῷ σου
  chosen: by your habit
  alternatives:
  - through your accustomed behavior
  - by your bad habit
  - through your familiarity
  lexicon: LSJ
  rationale: ἐθισμός denotes habit or customary behavior. The dative is instrumental.
    'By your habit' is literal, though the context implies an ingrained manner that
    becomes inappropriate in elite company.
- source_word: μωρανθῇς
  chosen: become foolish
  alternatives:
  - be made foolish
  - act like a fool
  lexicon: BDAG
  rationale: Passive/subjunctive from μωραίνω, here indicating becoming foolish or
    being shown foolish. 'Become foolish' is natural English and preserves the resultative
    sense.
- source_word: θελήσεις εἰ μὴ ἐγεννήθης
  chosen: wish that you had not been born
  alternatives:
  - desire not to have been born
  lexicon: BDAG
  rationale: Idiomatic expression of deep regret. English requires smoothing the clause
    into natural idiom.
- source_word: τὴν ἡμέραν τοῦ τοκετοῦ σου
  chosen: the day of your birth
  alternatives:
  - the day you were born
  - the day of your delivery
  lexicon: LSJ
  rationale: τοκετός is childbirth/birth. 'The day of your birth' is clear and suitably
    formal.
- source_word: μὴ καταράσῃ
  chosen: and not curse
  alternatives:
  - and do not curse
  - without cursing
  lexicon: BDAG
  rationale: The Greek continues the chain of feared consequences. In English, 'and
    not curse' preserves the connection to the preceding wish, though the sense is
    effectively 'and [lest you] curse.'
