theological_decisions:
- issue: Gendered social term μεγιστάνων
  chosen_reading: great men
  alternative_readings:
  - great ones
  - important people
  - nobles
  rationale: Following the project's gender-accurate policy, the masculine social
    term is retained as 'men' rather than neutralized. The context is a public male
    elite setting in ancient wisdom instruction.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Ambiguity of ἐπιλαθῇ ἐνώπιον αὐτῶν
  chosen_reading: you be forgotten before them
  alternative_readings:
  - you forget yourself before them
  - you be overlooked in their presence
  rationale: The Greek form most naturally permits a passive-like sense, but the context
    could support a reflexive nuance of losing proper restraint before dignitaries.
    The main text follows the form more closely, while the alternatives are preserved
    in a footnote for transparency.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
