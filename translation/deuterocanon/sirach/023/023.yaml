id: SIR.23.23
reference: Sirach 23:23
source:
  edition: lxx-swete-1909
  text: πρῶτον μὲν γὰρ ἐν νόμῳ Ὑψίστου ἠπείθησεν, καὶ δεύτερον εἰς ἄνδρα ἑαυτῆς ἐπλημμέλησεν·
    καὶ τὸ τρίτον ἐν πορνείᾳ ἐμοιχεύθη, ἐξ ἀλλοτρίου ἀνδρὸς τέκνα παρέστησεν.
