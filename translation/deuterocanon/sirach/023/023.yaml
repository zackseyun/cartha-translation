theological_decisions:
- issue: Moral progression in the three accusations
  chosen_reading: 'Render the three clauses distinctly: disobedience to divine law,
    offense against husband, then adultery and bearing children by another man.'
  alternative_readings:
  - Collapse the second and third clauses into a single accusation of marital infidelity
  rationale: The Greek intentionally enumerates three offenses. Keeping them distinct
    preserves the rhetoric and avoids flattening the moral progression.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Rendering Ὑψίστου
  chosen_reading: Most High
  alternative_readings:
  - Highest
  - Most High God
  rationale: This translates the divine title rather than transliterating or expanding
    it, in line with the project's policy to translate titles and avoid adding words
    not present.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
