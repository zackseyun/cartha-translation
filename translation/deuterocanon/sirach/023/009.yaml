theological_decisions:
- issue: Referent of 'the Holy One' in a wisdom warning about speech
  chosen_reading: Treat τοῦ ἁγίου as a reverential divine title, yielding 'the Holy
    One.'
  alternative_readings:
  - understand it metonymically as 'the holy name'
  - render more generically as 'what is holy'
  rationale: In context the verse warns against casual oath-taking and irreverent
    use of sacred speech. Rendering the phrase as a divine title preserves the likely
    referent without expanding the text beyond the Greek. The alternative 'holy name'
    is interpretively strong and is better preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Ethical force of the prohibition
  chosen_reading: The verse forbids habitual oath-taking and habitual invocation of
    God's name, not every possible solemn oath in every context.
  alternative_readings:
  - an absolute ban on all oath forms
  rationale: The repeated habituation language (ἐθίζω / συνεθίζω) targets practiced,
    casual, or frequent use. The translation therefore keeps the focus on becoming
    accustomed rather than importing a broader doctrinal prohibition not explicit
    in the verse.
  doctrine_reference: Original-language primacy over translation tradition
