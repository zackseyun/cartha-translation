translation:
  text: Do not accustom your mouth to an oath, and do not become accustomed to invoking
    the Holy One by name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not become accustomed to invoking the holy name.' The Greek ὀνομασίᾳ
      τοῦ ἁγίου can be understood as naming or invoking the Holy One, with the sense
      of reverent misuse of the divine name in view.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅρκῳ
  chosen: to an oath
  alternatives:
  - to swearing
  - with an oath
  lexicon: BDAG
  rationale: Dative with ἐθίζω expresses the practice to which one becomes accustomed.
    'To an oath' preserves the singular noun and the warning against habitual oath-taking
    more closely than the broader verbal abstraction 'swearing.'
- source_word: μὴ ἐθίσῃς
  chosen: Do not accustom
  alternatives:
  - Do not train
  - Do not get used
  lexicon: LSJ
  rationale: ἐθίζω means to accustom or habituate. The prohibitive aorist is well
    rendered by 'Do not accustom,' keeping the causative nuance with 'your mouth'
    as object.
- source_word: τὸ στόμα σου
  chosen: your mouth
  alternatives:
  - your speech
  lexicon: BDAG
  rationale: A literal rendering fits natural English and preserves the embodied idiom
    of speech ethics in wisdom literature.
- source_word: ὀνομασίᾳ
  chosen: naming
  alternatives:
  - invocation
  - mentioning by name
  lexicon: LSJ
  rationale: The noun denotes use of a name or naming. 'Naming' is concise and natural,
    while still allowing the sense of invoking the divine name in speech.
- source_word: τοῦ ἁγίου
  chosen: the Holy One
  alternatives:
  - the holy one
  - the Holy Name
  - the sacred one
  lexicon: LSJ
  rationale: The genitive likely refers reverentially to God as 'the Holy One.' 'Holy
    One' is a clear English title and avoids over-interpreting the phrase as explicitly
    'name of the Holy One' in the main text, though that sense is implicated by the
    construction.
- source_word: μὴ συνεθισθῇς
  chosen: do not become habituated
  alternatives:
  - do not get accustomed
  - do not be trained into the habit
  lexicon: LSJ
  rationale: The compound verb intensifies the idea of becoming thoroughly accustomed.
    'Become habituated' reflects the passive/inchoative sense and distinguishes it
    slightly from the first clause's ἐθίζω.
