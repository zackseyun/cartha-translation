translation:
  text: Do not let the appetite of the belly and sexual indulgence overtake me, and
    do not give me over to a shameless soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sexual relations'; the Greek term can denote sexual union more neutrally,
      but here the surrounding prayer against vice supports the rendering 'sexual
      indulgence.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not hand me over to a shameless self.' The Greek literally reads
      'a shameless soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κοιλίας
  chosen: of the belly
  alternatives:
  - of the stomach
  - for the womb
  lexicon: LSJ
  rationale: Genitive dependent on ὄρεξις; in this wisdom context it refers to bodily
    appetite, best rendered idiomatically but still transparently as 'of the belly'
    rather than the more clinical 'stomach.'
- source_word: ὄρεξις
  chosen: appetite
  alternatives:
  - desire
  - craving
  lexicon: LSJ
  rationale: Denotes appetite or desire, here specifically bodily craving. 'Appetite'
    fits the collocation with κοιλία and preserves the moral sense without over-intensifying
    to 'craving.'
- source_word: συνουσιασμός
  chosen: sexual indulgence
  alternatives:
  - intercourse
  - sexual relations
  - licentiousness
  lexicon: LSJ
  rationale: The noun is related to sexual union/association. In this prayer against
    vice, a bare 'intercourse' could sound morally neutral in English, while 'licentiousness'
    may overstate the term. 'Sexual indulgence' captures the negative ethical force
    implied by the context.
- source_word: μὴ καταλαβέτωσάν με
  chosen: Do not let ... overtake me
  alternatives:
  - may ... not seize me
  - do not let ... take hold of me
  lexicon: LSJ
  rationale: The aorist imperative with καταλαμβάνω conveys being seized, overtaken,
    or mastered. 'Overtake me' is natural English and preserves the sense of being
    overcome by these impulses.
- source_word: ψυχὴ ἀναιδεῖ
  chosen: a shameless soul
  alternatives:
  - an impudent soul
  - a brazen desire
  - a shameless self
  lexicon: LSJ
  rationale: ψυχή here refers to the inner self/person, and ἀναιδής denotes shamelessness
    or brazenness. 'A shameless soul' keeps the anthropological language of the Greek
    while remaining intelligible.
- source_word: μὴ παραδῷς με
  chosen: do not give me over
  alternatives:
  - do not hand me over
  - do not surrender me
  lexicon: LSJ
  rationale: παραδίδωμι often means hand over or give over. 'Give me over' is idiomatic
    in English and preserves the sense of being delivered into the power of something.
