theological_decisions:
- issue: Moral force of συνουσιασμός in a vice-context
  chosen_reading: Render with negative ethical coloring as 'sexual indulgence'
  alternative_readings:
  - intercourse
  - sexual relations
  rationale: The immediate context is a prayer for restraint from sinful speech and
    passions. A morally neutral rendering would under-translate the vice-list setting,
    while a stronger term like 'debauchery' would go beyond the lexical evidence.
    'Sexual indulgence' preserves the ethical warning without importing more than
    the Greek warrants.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without paraphrase.'
- issue: Whether ψυχή should be rendered concretely or anthropologically
  chosen_reading: Retain 'soul' in the main text
  alternative_readings:
  - self
  - desire
  rationale: Although 'self' would be smoother in modern English, the Greek explicitly
    uses ψυχή. Retaining 'soul' preserves the text's anthropological register and
    theological texture while remaining understandable.
  doctrine_reference: 'Translation philosophy: readable modern English without flattening
    theological weight.'
