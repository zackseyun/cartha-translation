translation:
  text: Do not accustom your mouth to crude ignorance, for in it there is a word of
    sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not accustom your mouth to foul ignorance,' with the adjective possibly
      stressing coarse or indecent speech.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for in it there is a word of sin'; this may mean 'sinful speech'
      or speech that gives expression to sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαιδευσίαν
  chosen: ignorance
  alternatives:
  - lack of discipline
  - boorishness
  - rudeness
  - undisciplined speech
  lexicon: LSJ
  rationale: The noun denotes lack of education/training and, by extension, uncultivated
    or ill-bred behavior. In this context, paired with speech and followed by a warning
    about sinful language, 'ignorance' captures the core sense while allowing the
    modifying adjective to carry the crudeness of expression.
- source_word: ἀσυρῆ
  chosen: crude
  alternatives:
  - filthy
  - obscene
  - foul
  - shameful
  lexicon: LSJ
  rationale: The adjective is rare and contextually tied to improper speech. 'Crude'
    conveys coarse, indecent verbal behavior without over-specifying sexual obscenity,
    which the Greek does not explicitly require.
- source_word: μὴ συνεθίσῃς
  chosen: do not accustom
  alternatives:
  - do not train
  - do not habituate
  - do not get used to
  lexicon: LSJ
  rationale: The verb means to make customary or habitual. 'Do not accustom' preserves
    the warning against forming a settled habit in speech.
- source_word: τὸ στόμα σου
  chosen: your mouth
  alternatives:
  - your speech
  - your tongue
  lexicon: LSJ
  rationale: A literal rendering is natural English here and preserves the bodily
    metaphor for speech found in the Greek.
- source_word: ἔστιν γὰρ ἐν αὐτῇ
  chosen: for in it there is
  alternatives:
  - for in it lies
  - for it contains
  lexicon: LSJ
  rationale: The phrase gives the reason for the prohibition. 'In it' most naturally
    refers back to the crude ignorance/coarse manner of speech just mentioned.
- source_word: λόγος ἁμαρτίας
  chosen: a word of sin
  alternatives:
  - sinful speech
  - a sinful word
  - speech that leads to sin
  lexicon: LSJ
  rationale: 'A relatively formal rendering preserves the compactness and ambiguity
    of the Greek: it can mean speech characterized by sin or speech that expresses
    sin. ''A word of sin'' keeps that breadth better than a more interpretive paraphrase.'
