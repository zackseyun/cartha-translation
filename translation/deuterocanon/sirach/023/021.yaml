theological_decisions:
- issue: Referent of the masculine demonstrative and verbs
  chosen_reading: The verse speaks specifically of the adulterous man from the immediate
    context, so masculine language is retained.
  alternative_readings:
  - A gender-neutral rendering such as 'this person'
  rationale: The Greek uses masculine forms and the surrounding passage contrasts
    the adulterous woman and adulterous man. Per doctrine, gender-accurate wording
    is preferred over flattening to generic language.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Force of ἐκδικηθήσεται
  chosen_reading: Public punitive judgment ('will be punished') rather than a narrower
    sense of personal vengeance.
  alternative_readings:
  - will be avenged on
  rationale: In context the saying concerns divine/moral retribution manifested publicly,
    not merely private revenge. The English should communicate judgment without importing
    extra doctrinal specificity.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy over translation tradition
