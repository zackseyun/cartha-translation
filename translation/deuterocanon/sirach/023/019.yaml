lexical_decisions:
- source_word: ὀφθαλμοὶ
  chosen: eyes
  alternatives:
  - sight
  - gaze
  lexicon: LSJ
  rationale: The noun is literally 'eyes.' In this terse clause, a concrete rendering
    best preserves the Greek imagery rather than abstracting to 'sight' or 'gaze'.
- source_word: ἀνθρώπων
  chosen: of men
  alternatives:
  - of people
  - human
  lexicon: LSJ
  rationale: The genitive plural means 'of human beings/men.' Given the source's masculine/generic
    form and the project's gender-accurate policy, 'of men' is retained rather than
    smoothing to 'people.'
- source_word: φόβος
  chosen: fear
  alternatives:
  - terror
  - dread
  - object of fear
  lexicon: LSJ
  rationale: The noun normally means 'fear.' The clause is elliptical and difficult;
    a formally close rendering preserves the ambiguity. 'Terror' or 'dread' would
    over-interpret intensity, while 'object of fear' is interpretive rather than lexical.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - of him
  - for him
  lexicon: LSJ
  rationale: The genitive pronoun is rendered straightforwardly as 'his.' Because
    the Greek clause is compressed, the exact relation may be possessive or descriptive,
    but 'his' best mirrors the form without resolving the ambiguity.
