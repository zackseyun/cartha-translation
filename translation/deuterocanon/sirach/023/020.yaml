translation:
  text: Before all things were created, it was known to him; so also after they are
    completed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Before all things were created, he knew it; likewise after completion.'
      The Greek form ἔγνωσται can be represented in more than one way in English,
      though the sense of complete prior knowledge is clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὶν ἢ
  chosen: Before
  alternatives:
  - before that
  - prior to
  lexicon: LSJ
  rationale: Introduces temporal priority straightforwardly; 'Before' is idiomatic
    and preserves the clause's force.
- source_word: κτισθῆναι
  chosen: were created
  alternatives:
  - came to be created
  - were formed
  lexicon: LSJ
  rationale: Aorist passive infinitive of κτίζω, naturally rendered 'were created.'
    This preserves the passive sense without overcomplicating the English.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  - the whole of creation
  lexicon: LSJ
  rationale: A broad totalizing expression. 'All things' is slightly more formal and
    matches the comprehensive scope of the Greek better than the more colloquial 'everything.'
- source_word: ἔγνωσται
  chosen: it was known
  alternatives:
  - he has known it
  - it has been known
  lexicon: LSJ
  rationale: Perfect passive/middle form of γινώσκω. In context with αὐτῷ, the sense
    is that the whole matter was already known to God. 'It was known' gives clear
    English while preserving the stative/resultative force. The impersonal singular
    is represented by 'it,' referring to the totality just mentioned.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - by him
  lexicon: LSJ
  rationale: Dative is best taken as indirect object ('to him') rather than agent
    ('by him') here, yielding the sense of divine foreknowledge.
- source_word: οὕτως καὶ
  chosen: so also
  alternatives:
  - likewise
  - and so too
  lexicon: LSJ
  rationale: Marks the parallel between what is known before creation and what is
    known after completion. 'So also' preserves the explicit comparative structure.
- source_word: μετὰ τὸ συντελεσθῆναι
  chosen: after they are completed
  alternatives:
  - after completion
  - after all is finished
  lexicon: LSJ
  rationale: Articular infinitive with μετά indicates time subsequent to completion.
    Rendering with plural 'they are completed' ties the phrase back to τὰ πάντα ('all
    things') and keeps the parallelism visible.
