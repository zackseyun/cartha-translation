theological_decisions:
- issue: Meaning of 'fear of the Lord' in wisdom literature
  chosen_reading: Retain the traditional phrase 'the fear of the Lord' rather than
    paraphrasing it as reverence or piety.
  alternative_readings:
  - reverence for the Lord
  - awe of the Lord
  rationale: The phrase is a central wisdom expression with theological depth that
    includes reverence, awe, and obedient posture. Paraphrasing would narrow or flatten
    the concept. The traditional wording is both accurate and recognizable.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms; κύριος → Lord'
