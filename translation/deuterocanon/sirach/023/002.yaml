theological_decisions:
- issue: Metaphorical language of chastisement in relation to wisdom
  chosen_reading: Retain the concrete imagery of 'whips' and 'discipline of wisdom'
    as a prayer for severe moral correction
  alternative_readings:
  - Soften to 'restraint' or 'guidance'
  rationale: The verse asks for painful corrective discipline over the inner life.
    Softening the imagery would reduce the moral seriousness and the sapiential theology
    of chastening.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Problematic pronoun in 'their sins'
  chosen_reading: Preserve 'their sins' in the main text and note the difficulty
  alternative_readings:
  - Emend in translation to 'my sins' for smoother sense
  rationale: The source text as given reads αὐτῶν ('their'). Because the wording is
    auditable and the source confidence is high despite minor mismatch, the translation
    should not silently resolve the difficulty. The smoother alternative is preserved
    in a footnote rather than imported into the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
