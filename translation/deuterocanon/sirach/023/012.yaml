translation:
  text: There is a word wrapped in death; may it not be found in the inheritance of
    Jacob. For all these things will depart from the godly, and they will not wallow
    in sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clothed with death' or 'surrounded by death.' The Greek image is of
      a kind of speech enveloped in death.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέξις
  chosen: word
  alternatives:
  - speech
  - expression
  - utterance
  lexicon: LSJ
  rationale: λέξις here refers to a spoken expression or form of speech. 'Word' is
    concise and natural in English while preserving the singular focus of the Greek.
- source_word: ἀντιπεριβεβλημένη
  chosen: wrapped in
  alternatives:
  - clothed with
  - surrounded by
  - enveloped in
  lexicon: LSJ
  rationale: The participle conveys being clothed or enveloped around. 'Wrapped in'
    preserves the vivid metaphor without sounding overly wooden; 'clothed with death'
    is possible but less idiomatic in modern English.
- source_word: θανάτῳ
  chosen: death
  lexicon: LSJ
  rationale: A straightforward rendering of the dative after the participle; the phrase
    depicts a deadly or death-laden kind of speech.
- source_word: μὴ εὑρεθήτω
  chosen: may it not be found
  alternatives:
  - let it not be found
  - do not let it be found
  lexicon: LSJ
  rationale: The third-person imperative/jussive sense is best conveyed by 'may it
    not be found,' which preserves the prayer-like or exhortatory force.
- source_word: ἐν κληρονομίᾳ Ἰακώβ
  chosen: in the inheritance of Jacob
  alternatives:
  - among Jacob's inheritance
  - within Jacob's heritage
  lexicon: LSJ
  rationale: κληρονομία can mean inheritance or heritage. 'Inheritance of Jacob' keeps
    the covenantal, communal sense and stays close to the Greek wording.
- source_word: εὐσεβῶν
  chosen: the godly
  alternatives:
  - the pious
  - the devout
  lexicon: LSJ
  rationale: '''The godly'' communicates reverent, faithful people in accessible modern
    English. ''Pious'' can sound pejorative or archaic; ''devout'' is possible but
    slightly narrower.'
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all this
  - all such things
  lexicon: LSJ
  rationale: The plural demonstrative plus πᾶς points back broadly to the kinds of
    sinful speech under discussion in the context. 'All these things' preserves the
    plural breadth.
- source_word: ἀποστήσεται
  chosen: will depart
  alternatives:
  - will stay away
  - will be removed
  lexicon: LSJ
  rationale: The future middle here indicates separation or withdrawal. 'Will depart'
    is a close rendering and leaves the subject as 'all these things,' matching the
    Greek syntax.
- source_word: ἐγκυλισθήσονται
  chosen: will not wallow
  alternatives:
  - will not roll themselves
  - will not be entangled
  - will not mire themselves
  lexicon: LSJ
  rationale: The verb evokes rolling in or wallowing. 'Wallow' preserves the strong
    moral image of indulgent immersion in sin better than a flatter term like 'be
    involved.'
- source_word: ἐν ἁμαρτίαις
  chosen: in sins
  alternatives:
  - in sin
  - in sinful acts
  lexicon: LSJ
  rationale: The Greek is plural. 'In sins' keeps the plural concrete sense, referring
    to acts or patterns of wrongdoing rather than an abstract principle alone.
