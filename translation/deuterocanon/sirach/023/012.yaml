theological_decisions:
- issue: Identity of 'Jacob' in 'the inheritance of Jacob'
  chosen_reading: A covenant people designation referring to the community descended
    from Jacob/Israel
  alternative_readings:
  - A narrower reference to ethnic Israel alone
  - A purely metaphorical label for the righteous
  rationale: The phrase is retained as 'the inheritance of Jacob' rather than interpreted
    more explicitly. This preserves the text's covenantal language without importing
    later theological conclusions about the scope of the community.
  doctrine_reference: Preserve theological tension rather than resolve it.
