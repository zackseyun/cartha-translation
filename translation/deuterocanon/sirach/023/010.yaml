theological_decisions:
- issue: Reference of 'naming' in the phrase 'swearing and naming continually'
  chosen_reading: An allusion to invoking the divine name in habitual oath-taking
    or irreverent speech
  alternative_readings:
  - general naming/cursing without explicit reference to God
  rationale: Within the immediate context about speech and oaths, 'naming' most naturally
    refers to uttering the divine name. The translation preserves this by capitalizing
    'the Name' while avoiding an explicit insertion of 'God' not present in the Greek.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
