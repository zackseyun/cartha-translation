translation:
  text: For just as a servant being constantly examined will not be spared bruises,
    so also one who swears and names the Name continually will never be cleansed from
    sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and invoking the name continually.' The Greek likely refers to repeated
      use of the divine name in oath-taking or irreverent speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκέτης
  chosen: slave
  alternatives:
  - servant
  - household servant
  lexicon: BDAG
  rationale: Although οἰκέτης can denote a household servant, the comparison stresses
    subjection to repeated scrutiny and punishment; 'slave' better preserves the bonded
    status and fits project guidance to use stronger language where dependence is
    salient.
- source_word: ἐξεταζόμενος ἐνδελεχῶς
  chosen: under constant examination
  alternatives:
  - being examined thoroughly
  - being continually questioned/tested
  lexicon: BDAG
  rationale: The participle with ἐνδελεχῶς conveys repeated or persistent scrutiny
    rather than a single inspection. 'Under constant examination' captures the durative
    force in readable English.
- source_word: ἀπὸ μώλωπος οὐκ ἐλαττωθήσεται
  chosen: will not be free from bruises
  alternatives:
  - will not be diminished from bruising
  - will not escape welts
  lexicon: LSJ
  rationale: μώλωψ denotes a bruise or welt from beating. The idiom with ἀπό is awkward
    literally; the sense is that such a person does not come away without bruises.
    'Will not be free from bruises' expresses the result naturally.
- source_word: ὁ ὀμνύων
  chosen: one who keeps swearing
  alternatives:
  - the one who swears
  - one who takes oaths
  lexicon: BDAG
  rationale: The present participle in this proverbial comparison suggests habitual
    action. 'Keeps swearing' brings out the ongoing practice.
- source_word: καὶ ὀνομάζων
  chosen: and naming the Name
  alternatives:
  - and invoking the name
  - and naming [God]
  lexicon: BDAG
  rationale: In this context, alongside oath-taking, ὀνομάζω likely means invoking
    the divine name in speech. 'Naming the Name' preserves the reverential and likely
    elliptical force without over-specifying beyond the Greek.
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - constantly
  - all the time
  lexicon: BDAG
  rationale: The phrase marks repeated, ongoing behavior. 'Continually' is concise
    and suitably formal.
- source_word: ἀπὸ ἁμαρτίας οὐ μὴ καθαρισθῇ
  chosen: will never be cleansed from sin
  alternatives:
  - will certainly not be purified from sin
  - will not be cleared of sin
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is emphatic negation. καθαρίζω here
    carries moral/religious cleansing rather than mere acquittal, so 'be cleansed
    from sin' best fits the wisdom context.
