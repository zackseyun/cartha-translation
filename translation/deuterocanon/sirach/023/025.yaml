translation:
  text: Her children will not spread out into a root, and her branches will not bear
    fruit;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Her children will not take root.' The Greek literally says 'will not
      spread out into a root,' an idiomatic botanical image for failing to become
      established.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαδώσουσιν
  chosen: will spread out
  alternatives:
  - will extend
  - will propagate
  - will take root
  lexicon: LSJ
  rationale: The verb literally conveys spreading through or abroad. In this metaphorical
    context with εἰς ῥίζαν following, 'will spread out' preserves the image without
    over-interpreting it as the result-state 'take root.'
- source_word: τὰ τέκνα αὐτῆς
  chosen: her children
  alternatives:
  - her offspring
  lexicon: LSJ
  rationale: τέκνα naturally means 'children' or 'offspring.' 'Children' is more direct
    and readable, while still fitting the familial metaphor for descendants.
- source_word: εἰς ῥίζαν
  chosen: into a root
  alternatives:
  - as a root
  - to take root
  - into rootedness
  lexicon: LSJ
  rationale: The Greek is somewhat compressed and idiomatic. A more dynamic rendering
    like 'take root' is possible, but 'into a root' more transparently reflects the
    source wording and preserves the plant metaphor alongside the following 'branches'
    and 'fruit.'
- source_word: οἱ κλάδοι αὐτῆς
  chosen: her branches
  alternatives:
  - her boughs
  lexicon: LSJ
  rationale: κλάδοι are branches or shoots. 'Branches' is the clearest modern English
    equivalent and maintains the extended botanical metaphor.
- source_word: οὐ δώσουσιν καρπόν
  chosen: will not bear fruit
  alternatives:
  - will not give fruit
  - will not produce fruit
  lexicon: LSJ
  rationale: Although the verb is literally 'give,' English idiom in agricultural
    metaphor is 'bear fruit.' This is a standard optimal-equivalence rendering that
    preserves the image and sense.
