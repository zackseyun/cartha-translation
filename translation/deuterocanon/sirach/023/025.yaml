theological_decisions:
- issue: Metaphorical judgment on the adulterous woman and her line in context
  chosen_reading: Retain the familial and botanical imagery without explicating the
    moral consequence beyond the verse itself.
  alternative_readings:
  - Interpret more explicitly as 'her descendants will not take root, and her offspring
    will be barren'
  rationale: The verse is part of a judgment oracle in context, but the Greek itself
    states the consequence through metaphor. The translation preserves that tension
    and does not import explanatory moral language not present in the text.
