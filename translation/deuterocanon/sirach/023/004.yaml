theological_decisions:
- issue: Moral sense of μετεωρισμὸν ὀφθαλμῶν
  chosen_reading: an idiom for proud or haughty eyes
  alternative_readings:
  - restless eyes
  - wandering eyes
  rationale: In this wisdom-prayer context, the phrase most naturally denotes arrogance
    expressed in one's look, matching common biblical moral imagery about 'lofty eyes.'
    More literal renderings like 'restlessness of eyes' are possible but less clear
    in English and less fitting to the vice list context.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    contextual variance of key terms.
