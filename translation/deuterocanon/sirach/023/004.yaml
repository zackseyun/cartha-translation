translation:
  text: Lord, Father and God of my life, do not give me haughty eyes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lofty eyes' or 'arrogant eyes'; the Greek phrase may also be understood
      more literally as 'restlessness of eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Vocative of κύριος used as a divine address; 'Lord' follows the project's
    default rendering for κύριος and fits prayer language naturally.
- source_word: πάτερ
  chosen: Father
  lexicon: LSJ
  rationale: Direct vocative address to God; 'Father' is the plain and natural equivalent.
- source_word: θεὲ ζωῆς μου
  chosen: God of my life
  alternatives:
  - God who gives me life
  - God of my living
  lexicon: LSJ
  rationale: A genitival expression best kept fairly literal. 'God of my life' preserves
    the prayer's compact parallelism with 'Lord' and 'Father' without over-interpreting
    the genitive.
- source_word: μετεωρισμὸν
  chosen: haughty
  alternatives:
  - arrogant
  - wandering
  - restless
  lexicon: LSJ
  rationale: The noun can denote upliftedness/exaltation and by extension arrogance;
    with 'of eyes' it idiomatically points to proud or lofty eyes rather than literal
    physical motion. 'Haughty' captures the moral sense concisely in English.
- source_word: ὀφθαλμῶν
  chosen: eyes
  lexicon: LSJ
  rationale: Literal body-part term, retained because the Greek expresses the vice
    through the image of the eyes.
- source_word: μὴ δῷς μοι
  chosen: do not give me
  alternatives:
  - do not grant me
  - do not let me have
  lexicon: LSJ
  rationale: A straightforward prohibitive aorist subjunctive with δίδωμι in prayer.
    'Do not give me' is both literal and idiomatic.
