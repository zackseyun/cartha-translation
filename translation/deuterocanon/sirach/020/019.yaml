translation:
  text: An ungracious person is an untimely saying; in the mouth of the undisciplined
    it will be repeated continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'An unpleasant person is an ill-timed tale'; both halves are terse and
      somewhat elliptical in Greek, so several closely related renderings are possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄχαρις
  chosen: ungracious
  alternatives:
  - without grace
  - unpleasant
  - ungrateful
  lexicon: LSJ
  rationale: The adjective denotes someone lacking grace, charm, or gratitude. 'Ungracious'
    best preserves the character description without narrowing it only to ingratitude.
    It also fits the proverb's concern with social impropriety.
- source_word: μῦθος
  chosen: saying
  alternatives:
  - story
  - tale
  - speech
  - word
  lexicon: LSJ
  rationale: Here the term refers to an utterance or remark rather than a developed
    narrative. 'Saying' fits the concise proverbial context better than 'story' or
    'tale'.
- source_word: ἄκαιρος
  chosen: untimely
  alternatives:
  - inopportune
  - out of season
  - ill-timed
  lexicon: LSJ
  rationale: The sense is something spoken at the wrong time. 'Untimely' is concise
    and natural English while preserving the temporal impropriety.
- source_word: ἀπαίδευτος
  chosen: undisciplined
  alternatives:
  - uneducated
  - untrained
  - uninstructed
  lexicon: LSJ
  rationale: The word often means lacking formation, instruction, or proper discipline.
    'Undisciplined' captures moral-social lack of training better than merely intellectual
    'uneducated'.
- source_word: ἐνδελεχισθήσεται
  chosen: will be repeated continually
  alternatives:
  - will persist
  - will be prolonged
  - will be kept up constantly
  lexicon: LSJ
  rationale: The future passive conveys continuance or repeated occurrence. In context,
    the point is that such an ill-timed saying keeps being said by the undisciplined.
    'Will be repeated continually' makes the idiomatic force clear in English.
- source_word: ἐν στόματι
  chosen: in the mouth of
  alternatives:
  - on the lips of
  - by
  lexicon: LSJ
  rationale: This is a common idiom for speech proceeding from someone. 'In the mouth
    of' preserves the imagery and remains understandable in English proverb style.
