translation:
  text: The character of a lying man is dishonor, and his shame is continually with
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The disposition of a false man is disgrace, and his shame is constantly
      with him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦθος
  chosen: character
  alternatives:
  - habit
  - custom
  - disposition
  lexicon: LSJ
  rationale: ἦθος here denotes a person's settled moral disposition or characteristic
    way of being. 'Character' best captures this in natural English without reducing
    it merely to repeated behavior ('habit') or social convention ('custom').
- source_word: ἀνθρώπου ψευδοῦς
  chosen: of a lying man
  alternatives:
  - of a false man
  - of a deceitful person
  - of a lying person
  lexicon: LSJ
  rationale: 'The genitive phrase describes the kind of person in view: a man characterized
    by falsehood. ''Lying man'' preserves the masculine singular of the Greek and
    keeps the focus on habitual falsehood. ''False man'' is possible but less idiomatic
    in modern English.'
- source_word: ἀτιμία
  chosen: dishonor
  alternatives:
  - disgrace
  - ignominy
  lexicon: LSJ
  rationale: ἀτιμία denotes a state of shameful dishonor or loss of honor. 'Dishonor'
    is concise and readable, while 'disgrace' would also fit but slightly shifts toward
    the emotional/social result rather than the condition named.
- source_word: αἰσχύνη
  chosen: shame
  alternatives:
  - disgrace
  lexicon: LSJ
  rationale: αἰσχύνη is the shame attached to the liar. 'Shame' is the most direct
    and transparent rendering and pairs well with the preceding 'dishonor' without
    collapsing the two terms into one English word.
- source_word: μετʼ αὐτοῦ
  chosen: with him
  alternatives:
  - attends him
  - remains with him
  lexicon: LSJ
  rationale: The prepositional phrase is straightforwardly rendered 'with him.' More
    interpretive options like 'attends him' are possible but unnecessary in the main
    text.
- source_word: ἐνδελεχῶς
  chosen: continually
  alternatives:
  - constantly
  - unceasingly
  - persistently
  lexicon: LSJ
  rationale: ἐνδελεχῶς conveys continuity or persistence. 'Continually' gives clear
    modern English and reflects the enduring nature of the shame.
