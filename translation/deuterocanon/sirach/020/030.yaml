translation:
  text: Hidden wisdom and an unseen treasure—what benefit is there in either of them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'what profit is there in both?' The Greek ἐν ἀμφοτέροις
      refers to the two items together; the main text uses idiomatic English to express
      the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφία
  chosen: wisdom
  alternatives:
  - skill
  - understanding
  lexicon: LSJ
  rationale: The standard sense in wisdom literature is 'wisdom'; this best fits Sirach's
    thematic emphasis and the parallel with 'treasure' as something valuable.
- source_word: κεκρυμμένη
  chosen: hidden
  alternatives:
  - concealed
  - kept secret
  lexicon: LSJ
  rationale: The perfect passive participle denotes something having been hidden/concealed.
    'Hidden' is concise and idiomatic in English.
- source_word: θησαυρός
  chosen: treasure
  alternatives:
  - store
  - storehouse of valuables
  lexicon: LSJ
  rationale: The noun commonly means 'treasure' or 'treasury'; here, in parallel with
    wisdom, the concrete image of 'treasure' is most natural.
- source_word: ἀφανής
  chosen: unseen
  alternatives:
  - invisible
  - hidden
  - not apparent
  lexicon: LSJ
  rationale: ἀφανής can mean unseen or hidden from view. Since κεκρυμμένη already
    covers 'hidden,' 'unseen' preserves the parallelism without awkward repetition.
- source_word: τίς ὠφέλεια
  chosen: what benefit is there
  alternatives:
  - what profit is there
  - what use is there
  lexicon: LSJ
  rationale: This idiom asks about practical advantage. 'Benefit' is clear modern
    English and preserves the evaluative force.
- source_word: ἐν ἀμφοτέροις
  chosen: in either of them
  alternatives:
  - in both
  - in the two together
  lexicon: LSJ
  rationale: Although ἀμφότεροι formally means 'both,' the rhetorical question concerns
    the usefulness of each when inaccessible; idiomatic English expresses this as
    'either of them' while still referring to the pair as a whole.
