translation:
  text: A proverb will be rejected from the mouth of a fool, for he will certainly
    not speak it at its proper time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A parable will be rejected from the mouth of a fool,' if παραβολή is
      taken more broadly than 'proverb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ στόματος
  chosen: from the mouth of
  alternatives:
  - by
  - out of the mouth of
  lexicon: LSJ
  rationale: The prepositional phrase marks source/origin of the saying. 'From the
    mouth of' preserves the concrete idiom and the rhetorical force of the proverb
    coming from an unsuitable speaker.
- source_word: μωροῦ
  chosen: a fool
  alternatives:
  - the foolish man
  - a stupid person
  lexicon: LSJ
  rationale: μωρός in wisdom literature denotes a morally and practically foolish
    person, not merely someone unintelligent. 'A fool' is the standard concise English
    equivalent.
- source_word: ἀποδοκιμασθήσεται
  chosen: will be rejected
  alternatives:
  - will be disapproved
  - will be despised
  - will be repudiated
  lexicon: LSJ
  rationale: The future passive indicates that the proverb itself meets with rejection
    because of its source. 'Rejected' is natural English and preserves the passive
    sense without overinterpreting the social setting.
- source_word: παραβολή
  chosen: a proverb
  alternatives:
  - a parable
  - a maxim
  - a saying
  lexicon: LSJ
  rationale: In Sirach's wisdom context, παραβολή commonly refers to a proverb or
    wise saying rather than a narrative parable. 'Proverb' best fits the genre and
    immediate sense.
- source_word: οὐ γὰρ μὴ
  chosen: for he will certainly not
  alternatives:
  - for he will by no means
  - for he surely will not
  lexicon: Greek grammar / LSJ
  rationale: The emphatic negation strengthens the future denial. 'Will certainly
    not' communicates the force in idiomatic modern English.
- source_word: εἴπῃ αὐτὴν
  chosen: speak it
  alternatives:
  - say it
  - utter it
  lexicon: LSJ
  rationale: λέγω here refers to voicing the proverb. 'Speak it' reads smoothly with
    the following temporal phrase.
- source_word: ἐν καιρῷ αὐτῆς
  chosen: at its proper time
  alternatives:
  - in its time
  - at the right moment
  - seasonably
  lexicon: LSJ
  rationale: καιρός denotes the fitting or opportune time. 'At its proper time' preserves
    both temporal and appropriateness nuances, and αὐτῆς is taken as referring to
    the proverb's fitting occasion.
