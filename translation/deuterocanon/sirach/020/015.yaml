translation:
  text: Today he lends, and tomorrow he demands it back; such a man is hateful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'such a person is hated' or 'detestable.' The Greek adjective μισητός
      can be understood either as describing the man's odious character or the reaction
      he provokes.
    reason: lexical_alternative
lexical_decisions:
- source_word: σήμερον
  chosen: Today
  alternatives:
  - today
  lexicon: LSJ
  rationale: Temporal adverb marking immediate present action; rendered straightforwardly
    as 'Today' to preserve the proverb's contrast with 'tomorrow'.
- source_word: δανιεῖ
  chosen: he lends
  alternatives:
  - he will lend
  - he loans
  lexicon: LSJ
  rationale: Future form of δανείζω/δανείω in proverbial style can be rendered naturally
    in English as present-future gnomic action. 'He lends' fits the aphoristic sense
    better than a rigid future.
- source_word: αὔριον
  chosen: tomorrow
  alternatives:
  - the next day
  lexicon: LSJ
  rationale: Maintains the sharp temporal contrast with σήμερον in concise proverbial
    form.
- source_word: ἀπαιτήσει
  chosen: he demands it back
  alternatives:
  - he asks back
  - he exacts repayment
  - he demands repayment
  lexicon: LSJ
  rationale: ἀπαιτέω can mean demand back, exact, or require. Because the object is
    implicit from the lending context, 'it back' makes the English clear without adding
    more than the Greek implies.
- source_word: μισητὸς
  chosen: hateful
  alternatives:
  - hated
  - detestable
  lexicon: LSJ
  rationale: The adjective can denote 'hateful' or 'hated.' Here the sense is that
    such a person is odious/disliked because of this behavior. 'Hateful' preserves
    the evaluative force concisely, though 'hated' is a viable contextual alternative.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - person
  - human being
  lexicon: LSJ
  rationale: The Greek is singular masculine and refers to a representative human
    type. Per doctrine, gender-accurate rendering is preferred; 'man' preserves the
    proverbial characterization.
- source_word: ὁ τοιοῦτος
  chosen: such a
  alternatives:
  - that sort of
  - this kind of
  lexicon: LSJ
  rationale: Idiomatic demonstrative-adjectival phrase identifying the type of person
    just described; 'such a' is the most natural concise English equivalent in this
    construction.
