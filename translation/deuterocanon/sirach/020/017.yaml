translation:
  text: Those who eat my bread are evil of tongue; how often, and how many, will laugh
    at him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will mock him.' The Greek verb can carry the stronger sense of ridicule,
      not merely laughter.
    reason: lexical_alternative
  - marker: b
    text: The Greek of the second clause is abrupt and may reflect a compressed or
      difficult text; the translation stays close to the extant wording rather than
      smoothing it heavily.
    reason: textual_variant
lexical_decisions:
- source_word: οἱ ἐσθίοντες
  chosen: those who eat
  alternatives:
  - the ones eating
  - those who partake
  lexicon: LSJ
  rationale: Present participle used substantivally; 'those who eat' is natural English
    and preserves the ongoing/general sense.
- source_word: τὸν ἄρτον μου
  chosen: my bread
  alternatives:
  - my food
  - bread from me
  lexicon: LSJ
  rationale: Literal 'my bread' is idiomatic in Greek and English for table fellowship
    or received provision; no need to flatten to 'food.'
- source_word: φαῦλοι
  chosen: evil
  alternatives:
  - base
  - worthless
  - bad
  lexicon: LSJ
  rationale: φαῦλος can denote morally poor, paltry, or base. Here with 'tongue' it
    points to corrupt or malicious speech; 'evil' best captures the moral force succinctly.
- source_word: γλώσσῃ
  chosen: with the tongue
  alternatives:
  - in speech
  - by tongue
  lexicon: LSJ
  rationale: Instrumental dative. 'With the tongue' keeps the concrete metaphor of
    speech rather than abstracting it away.
- source_word: ποσάκις
  chosen: how often
  alternatives:
  - how many times
  lexicon: LSJ
  rationale: Idiomatic interrogative adverb; 'how often' is concise and natural.
- source_word: καὶ ὅσοι
  chosen: and how many
  alternatives:
  - and how many people
  - even how many
  lexicon: LSJ
  rationale: Taken as a second exclamatory/interrogative element paired with ποσάκις.
    The Greek is somewhat abrupt, so the English preserves that rhetorical force.
- source_word: καταγελάσονται
  chosen: will laugh at
  alternatives:
  - will mock
  - will ridicule
  lexicon: LSJ
  rationale: The verb can mean laugh down, mock, or deride. 'Laugh at' is the most
    direct lexical equivalent; the mocking sense remains available from context.
- source_word: αὐτοῦ
  chosen: him
  alternatives:
  - it
  - such a one
  lexicon: LSJ
  rationale: Masculine/genitive object after καταγελάω is most naturally personal
    here. 'Him' is the straightforward rendering, though the referent remains contextually
    somewhat compressed.
