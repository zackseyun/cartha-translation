translation:
  text: There is one who destroys his own life through shame, and because of a foolish
    face he will lose it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his soul' for 'his own life'; Greek ψυχή can mean 'life,' 'self,' or
      'soul.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from a foolish face/countenance.' The phrase likely refers to
      a foolish or senseless facial expression or outward demeanor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολλύων
  chosen: destroys
  alternatives:
  - ruins
  - loses
  lexicon: BDAG
  rationale: The participle from ἀπόλλυμι can mean destroy, ruin, or lose. Here, with
    τὴν ψυχὴν αὐτοῦ as object and then a second clause repeating ἀπολεῖ, 'destroys'
    best preserves the severity and verbal linkage without flattening the first clause
    into mere emotional harm.
- source_word: τὴν ψυχὴν αὐτοῦ
  chosen: his own life
  alternatives:
  - his soul
  - himself
  lexicon: BDAG
  rationale: ψυχή can denote soul, life, or self. In wisdom literature and in a context
    of self-destruction, 'life' is the most natural English rendering and avoids importing
    a narrower anthropological claim about the immaterial soul. 'Own' makes the reflexive
    force clear in English.
- source_word: διʼ αἰσχύνην
  chosen: through shame
  alternatives:
  - because of shame
  - from shame
  lexicon: LSJ
  rationale: διά with the accusative commonly expresses cause or means. 'Through shame'
    is concise and preserves the causal/instrumental sense; the shame is what leads
    to the self-destructive outcome.
- source_word: ἀπὸ ἄφρονος προσώπου
  chosen: because of a foolish expression
  alternatives:
  - from a foolish face
  - because of a fool's countenance
  - because of a shameless look
  lexicon: LSJ
  rationale: Literally the phrase is 'from a foolish face/countenance.' In idiomatic
    English, 'expression' best captures πρόσωπον as outward facial presentation. ἄφρων
    here is taken adjectivally with πρόσωπον, describing a senseless or foolish look/expression.
    This avoids an overly wooden 'face' while staying close to the image.
- source_word: ἀπολεῖ αὐτήν
  chosen: he will lose it
  alternatives:
  - he will destroy it
  - he will ruin it
  lexicon: BDAG
  rationale: 'Future ἀπολεῖ echoes the earlier participle. With αὐτήν referring back
    to ψυχή, ''lose it'' is idiomatic English and preserves the resultative sense.
    Using ''lose'' here also gives a natural progression: he destroys his life and
    so will lose it.'
