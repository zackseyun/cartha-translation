id: SIR.20.25
reference: Sirach 20:25
source:
  edition: lxx-swete-1909
  text: αἱρετὸν κλέπτης ἢ ἐνδελεχίζων ψεύδει, ἀμφότεροι δὲ ἀπώλειαν κληρονομήσουσιν.
  language: Greek
  pages:
