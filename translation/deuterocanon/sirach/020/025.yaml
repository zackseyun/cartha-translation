translation:
  text: A thief is preferable to one who persists in lying; yet both will inherit
    destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'A thief is to be chosen rather than one who persists
      in lying.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱρετὸν
  chosen: is preferable
  alternatives:
  - is to be chosen
  - is preferable/choiceworthy
  lexicon: LSJ
  rationale: The adjective means 'choiceworthy' or 'preferable.' In idiomatic English,
    'is preferable' best conveys the comparative sense in this proverb.
- source_word: κλέπτης
  chosen: a thief
  alternatives:
  - thief
  - robber
  lexicon: LSJ
  rationale: κλέπτης ordinarily denotes a thief rather than a violent robber. 'A thief'
    is the straightforward lexical equivalent.
- source_word: ἐνδελεχίζων
  chosen: one who persists
  alternatives:
  - one who continues
  - one who is constant
  - one who practices continually
  lexicon: LSJ
  rationale: The participle conveys ongoing, habitual action. 'One who persists' captures
    the durative force naturally in English.
- source_word: ψεύδει
  chosen: in lying
  alternatives:
  - in falsehood
  - with a lie
  - in deceit
  lexicon: LSJ
  rationale: The dative here is best taken with the participle to express the sphere
    or practice in which the person persists. 'In lying' is concise and idiomatic.
- source_word: ἀμφότεροι
  chosen: both
  alternatives:
  - both of them
  lexicon: LSJ
  rationale: Simple dual-inclusive term; 'both' is sufficient.
- source_word: ἀπώλειαν
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: LSJ
  rationale: ἀπώλεια here denotes ruin or destruction as the outcome awaiting them.
    'Destruction' is clear and weighty without importing later technical theological
    nuance.
- source_word: κληρονομήσουσιν
  chosen: will inherit
  alternatives:
  - will receive as their lot
  - will come into possession of
  lexicon: LSJ
  rationale: 'The verb literally means ''will inherit.'' Retaining ''inherit'' preserves
    the proverb''s irony: what they receive as their portion is destruction.'
