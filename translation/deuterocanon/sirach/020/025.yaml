theological_decisions:
- issue: Moral comparison in the proverb
  chosen_reading: The verse states that a thief is preferable to a habitual liar,
    without excusing theft; both still face destruction.
  alternative_readings:
  - The verse could be read as hyperbolic wisdom rhetoric emphasizing the especially
    destructive nature of persistent lying.
  rationale: The Greek makes a real comparison ('a thief is preferable'), but the
    second clause prevents any moral endorsement of theft by condemning both outcomes.
  doctrine_reference: Preserve theological tension rather than resolve it.
