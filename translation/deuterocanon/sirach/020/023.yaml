translation:
  text: There is one who promises a favor out of shame to a friend, and so acquires
    him as an enemy for nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without cause' for 'for nothing'; the Greek adverb can express either
      pointlessness or lack of just cause.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριν
  chosen: a favor
  alternatives:
  - kindness
  - grace
  lexicon: LSJ
  rationale: In this wisdom context χάρις/χάριν refers to a favor or act of kindness
    rather than theological 'grace.' 'A favor' fits the social setting of promising
    help to a friend.
- source_word: αἰσχύνης
  chosen: out of shame
  alternatives:
  - because of shame
  - from embarrassment
  lexicon: LSJ
  rationale: 'The genitive indicates motive or cause: the promise is made under the
    pressure of shame, not from genuine generosity. ''Out of shame'' is concise and
    natural English.'
- source_word: ἐπαγγελλόμενος
  chosen: promises
  alternatives:
  - makes a promise of
  - undertakes to give
  lexicon: LSJ
  rationale: The participle describes the person's action of promising a favor. 'Promises'
    gives clear idiomatic English without over-expanding the Greek.
- source_word: φίλῳ
  chosen: to a friend
  alternatives:
  - for a friend
  lexicon: LSJ
  rationale: The dative is best represented here as the recipient of the promised
    favor. 'To a friend' is the most straightforward rendering.
- source_word: ἐκτήσατο
  chosen: has acquired
  alternatives:
  - has gained
  - has made for himself
  lexicon: LSJ
  rationale: 'The verb means to acquire or gain for oneself. ''Has acquired'' preserves
    the ironic force: by this shame-driven promise he ends up obtaining the opposite
    of what he intended.'
- source_word: ἐχθρόν
  chosen: an enemy
  alternatives:
  - hostile foe
  lexicon: LSJ
  rationale: Standard rendering of the noun; no contextual reason to soften it.
- source_word: δωρεάν
  chosen: for nothing
  alternatives:
  - without cause
  - gratuitously
  lexicon: LSJ
  rationale: The adverb can mean 'gratis' or 'without cause.' Here it most naturally
    means that he has made an enemy to no purpose / at no gain to himself. 'For nothing'
    preserves that irony in readable English.
