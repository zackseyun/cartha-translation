translation:
  text: Hospitality and gifts blind the eyes of the wise, and like a muzzle on the
    mouth they turn away rebukes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guest-gifts' for 'hospitality'; the Greek ξένια can refer to hospitality
      shown to a guest or to gifts associated with guest-friendship.
    reason: lexical_alternative
  - marker: b
    text: '''Gifts'' here carries the sense of favors that can corrupt judgment; the
      Greek does not explicitly say ''bribes.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ξένια
  chosen: hospitality
  alternatives:
  - guest-gifts
  - entertainment
  - presents for guests
  lexicon: LSJ
  rationale: The noun can denote hospitality or gifts offered in the context of hosting/guest-friendship.
    In this wisdom context, paired with δῶρα and functioning as a corrupting inducement,
    'hospitality' best captures the social favor involved without collapsing it into
    the same sense as 'gifts.'
- source_word: δῶρα
  chosen: gifts
  alternatives:
  - presents
  - bribes
  lexicon: LSJ
  rationale: Literally 'gifts.' Although the moral force here approaches bribery,
    the Greek does not explicitly use a word meaning 'bribe,' so 'gifts' preserves
    the source wording while allowing the context to convey the corrupting effect.
- source_word: ἀποτυφλοῖ
  chosen: blind
  alternatives:
  - make blind
  - darken
  lexicon: LSJ
  rationale: A strong verb meaning to blind or render sightless. 'Blind' is concise
    and preserves the metaphor of moral/perceptual impairment.
- source_word: ὀφθαλμοὺς σοφῶν
  chosen: the eyes of the wise
  alternatives:
  - wise men's eyes
  - the eyes of wise people
  lexicon: LSJ
  rationale: A straightforward genitive construction. 'The wise' is natural English
    and preserves the representative force without over-specifying gender.
- source_word: φιμός
  chosen: muzzle
  alternatives:
  - gag
  - halter
  lexicon: LSJ
  rationale: The image is specifically a muzzle placed on the mouth. 'Muzzle' preserves
    the concrete metaphor better than the more interpretive 'gag.'
- source_word: ἀποτρέπει
  chosen: turn away
  alternatives:
  - ward off
  - divert
  - prevent
  lexicon: LSJ
  rationale: The verb means to turn aside or avert. 'Turn away' keeps the metaphorical
    sense that rebukes are deflected or suppressed.
- source_word: ἐλεγμούς
  chosen: rebukes
  alternatives:
  - reproofs
  - corrections
  - convictions
  lexicon: LSJ
  rationale: In wisdom literature this refers to verbal reproof or censure. 'Rebukes'
    is idiomatic modern English and retains the moral force.
