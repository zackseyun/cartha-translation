translation:
  text: There is one who keeps silent and is considered wise, and there is one who
    is despised because of much talk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''There is one who keeps silent because he has no answer, and there
      is one who keeps silent, knowing the right time.'' The Hebrew witness preserved
      here differs substantially; the main text follows the extant Hebrew as the primary
      source for Sirach where available.'
    reason: alternative_reading
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is one who
  alternatives:
  - There is
  - One may be
  lexicon: HALOT
  rationale: The existential יֵשׁ introduces a type of person. Rendering it as 'There
    is one who' brings the Hebrew idiom into natural English while preserving the
    proverb's parallel structure.
- source_word: מַחֲרִישׁ
  chosen: keeps silent
  alternatives:
  - is silent
  - holds his peace
  lexicon: HALOT
  rationale: The participle from חרש denotes remaining silent. 'Keeps silent' preserves
    the durative, character-type sense of the Hebrew better than a simple stative
    'is silent.' The Greek parallel σιωπῶν confirms the sense of silence.
- source_word: וְנֶחְשָׁב
  chosen: is considered
  alternatives:
  - is thought
  - is reckoned
  lexicon: HALOT
  rationale: The Niphal conveys being regarded or accounted as something by others.
    'Is considered' is clear modern English and fits the social-evaluative sense of
    the saying.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - a wise man
  - skillful
  lexicon: HALOT
  rationale: The adjective here denotes wisdom in the ordinary sapiential sense. 'Wise'
    is the direct and idiomatic rendering. Although grammatically masculine, the saying
    is generic, so English need not add 'man.'
- source_word: נִמְאָס
  chosen: is despised
  alternatives:
  - is rejected
  - is disdained
  lexicon: HALOT
  rationale: The verb מאס carries the sense of being rejected or treated with contempt.
    'Is despised' best matches the social contrast with 'is considered wise' in the
    first colon.
- source_word: בְּרוֹב
  chosen: because of much
  alternatives:
  - for much
  - through abundance of
  lexicon: HALOT
  rationale: 'The preposition ב with רֹב here expresses cause or occasion: the person
    is despised on account of an abundance of speech. ''Because of much'' makes that
    causal force explicit in natural English.'
- source_word: שִׂיחַ
  chosen: talk
  alternatives:
  - speech
  - conversation
  lexicon: HALOT
  rationale: שיח can denote speech or talk. In this proverb contrasting silence with
    excessive speaking, 'talk' is the most idiomatic and pointed English choice. The
    Greek parallel differs here, but the Hebrew witness is primary and coherent.
