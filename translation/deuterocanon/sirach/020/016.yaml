translation:
  text: A fool will say, “I have no friend, and there is no gratitude for my good
    deeds.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no thanks for my benefactions.' The Greek χάρις can mean 'gratitude,'
      'thanks,' or 'favor,' and τοῖς ἀγαθοῖς μου can mean 'my good things' or 'my
      good deeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μωρός
  chosen: a fool
  alternatives:
  - a foolish man
  - the fool
  lexicon: LSJ
  rationale: The noun denotes a foolish person in wisdom literature. 'A fool' gives
    a natural English generic singular and fits the proverb-like character of the
    line.
- source_word: ἐρεῖ
  chosen: will say
  alternatives:
  - says
  - may say
  lexicon: LSJ
  rationale: Future indicative is best represented straightforwardly as 'will say.'
    In proverbial context English can use present, but preserving the Greek future
    keeps the form without harming readability.
- source_word: Οὐχ ὑπάρχει μοι φίλος
  chosen: I have no friend
  alternatives:
  - there is no friend for me
  - no friend belongs to me
  lexicon: LSJ
  rationale: The idiom with ὑπάρχει plus dative expresses possession/existence relative
    to the speaker. 'I have no friend' is the clearest idiomatic English equivalent.
- source_word: χάρις
  chosen: gratitude
  alternatives:
  - thanks
  - favor
  - grace
  lexicon: LSJ
  rationale: In this context the sense is responsive appreciation shown for benefactions,
    not theological 'grace.' 'Gratitude' best captures the social-moral sense that
    no one appreciates what he has done.
- source_word: τοῖς ἀγαθοῖς μου
  chosen: for my good deeds
  alternatives:
  - for my good things
  - for my benefits
  - for my good acts
  lexicon: LSJ
  rationale: The plural adjective used substantivally refers to the good things or
    benefactions done by the speaker. 'Good deeds' communicates moral benefactions
    naturally in English.
