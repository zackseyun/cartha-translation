id: SIR.20.9
reference: Sirach 20:9
source:
  edition: lxx-swete-1909
  text: ἔστιν δόσις ἣ οὐ λυσιτελήσει σοι, καὶ ἔστιν δόσις ἧς τὸ ἀνταπόδομα διπλοῦν.
  language: Greek
