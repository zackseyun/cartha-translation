translation:
  text: There is a gift that will not profit you, and there is a gift whose repayment
    is double.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is giving that will not benefit you, and there is giving whose
      return is twofold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δόσις
  chosen: gift
  alternatives:
  - giving
  - present
  lexicon: LSJ
  rationale: δόσις denotes an act or instance of giving, and in this proverb-like
    context 'gift' is the most natural concise English rendering. 'Giving' is possible
    but less idiomatic here; 'present' is too narrow and concrete.
- source_word: λυσιτελήσει
  chosen: will profit
  alternatives:
  - will be advantageous
  - will benefit
  lexicon: LSJ
  rationale: The future verb conveys usefulness or advantage. 'Will profit' preserves
    the concise proverbial tone and can apply broadly, not only financially.
- source_word: σοι
  chosen: you
  alternatives:
  - for you
  - to you
  lexicon: Greek grammar
  rationale: The dative marks the person affected. In English, 'profit you' is idiomatic
    and sufficiently represents the dative without over-translating.
- source_word: ἀνταπόδομα
  chosen: repayment
  alternatives:
  - return
  - recompense
  lexicon: LSJ
  rationale: The noun refers to what is given back in return. 'Repayment' fits the
    reciprocal sense clearly; 'return' is possible but slightly less explicit, while
    'recompense' sounds more formal than the surrounding style.
- source_word: διπλοῦν
  chosen: double
  alternatives:
  - twofold
  lexicon: LSJ
  rationale: διπλοῦν straightforwardly means 'double' or 'twofold.' 'Double' is clearer
    and more natural in modern English.
