id: SIR.20.3
reference: Sirach 20:3
source:
  edition: lxx-swete-1909
  text: ἐπιθυμία εὐνούχου ἀποπαρθενῶσαι νεάνιδα, οὕτως ὁ ποιῶν ἐν βίᾳ κρίματα.
  language: Greek
