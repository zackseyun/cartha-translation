theological_decisions:
- issue: Interpretation of the proverb's moral point
  chosen_reading: The comparison condemns coercive or violent administration of judgment
    as something fundamentally unfitting or frustrated, like a eunuch's desire to
    deflower a young woman.
  alternative_readings:
  - The saying may emphasize impotence or absurdity rather than moral wrong alone.
  rationale: The Greek presents a simile without explicit explanation. The main text
    preserves the image and leaves the precise nuance implicit, while the translation
    of ἐν βίᾳ as 'by force' keeps the ethical critique visible without over-expanding
    the proverb.
  doctrine_reference: Preserve theological tension rather than resolve it.
