translation:
  text: Like a eunuch’s desire to deflower a young woman, so is one who renders judgments
    by force.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with violence.' The Greek phrase ἐν βίᾳ can emphasize coercion or violent
      action.
    reason: lexical_alternative
  - marker: b
    text: The proverb's image may stress either the wrongness of coercive judgment
      or its frustrated incongruity and futility.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιθυμία
  chosen: desire
  alternatives:
  - lust
  - longing
  lexicon: BDAG
  rationale: The noun denotes desire or craving broadly. 'Desire' is the most natural
    English equivalent here and preserves the proverb's comparison without over-specifying
    sexual passion beyond what the context already implies.
- source_word: εὐνούχου
  chosen: eunuch’s
  alternatives:
  - castrated man’s
  lexicon: BDAG
  rationale: '''Eunuch'' is the standard and precise rendering for εὐνοῦχος. It preserves
    the cultural and physical sense relevant to the proverb''s image.'
- source_word: ἀποπαρθενῶσαι
  chosen: to deflower
  alternatives:
  - to violate the virginity of
  - to have intercourse with
  lexicon: LSJ
  rationale: The verb literally concerns depriving a girl of virginity. 'Deflower'
    is concise and semantically close, though somewhat literary; it best captures
    the specific act implied by the Greek better than the vaguer 'have intercourse
    with.'
- source_word: νεάνιδα
  chosen: a young woman
  alternatives:
  - a maiden
  - a girl
  lexicon: BDAG
  rationale: The term denotes a young female. 'Young woman' is readable modern English
    and avoids the archaic tone of 'maiden,' while still fitting the sexual context.
- source_word: οὕτως
  chosen: so is
  alternatives:
  - thus is
  - in the same way is
  lexicon: BDAG
  rationale: This introduces the proverb's comparison. 'So is' is idiomatic and preserves
    the analogical force.
- source_word: ὁ ποιῶν
  chosen: one who executes
  alternatives:
  - the one doing
  - who carries out
  lexicon: BDAG
  rationale: Although literally 'the one doing,' the object κρίματα calls for a judicial
    sense. 'Executes' fits the collocation in English with 'judgments' and conveys
    active implementation.
- source_word: ἐν βίᾳ
  chosen: by force
  alternatives:
  - with violence
  - violently
  lexicon: BDAG
  rationale: The phrase indicates coercion or violent compulsion. 'By force' is clear,
    direct, and works naturally with 'executes judgments.'
- source_word: κρίματα
  chosen: judgments
  alternatives:
  - justice
  - legal decisions
  - sentences
  lexicon: BDAG
  rationale: The plural refers to judicial decisions or acts of judgment. 'Judgments'
    is the most direct rendering; 'justice' would be more interpretive and less formally
    tied to the Greek plural noun.
