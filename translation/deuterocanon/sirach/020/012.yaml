translation:
  text: A wise man will make himself beloved by his words, but the favors of fools
    will be poured out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the graces/charms of fools will be poured out.' The Greek χάριτες can
      denote gracious acts, attractiveness, or charm; 'favors' was chosen as the clearest
      contextual rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφὸς
  chosen: wise man
  alternatives:
  - wise person
  - the wise
  lexicon: LSJ
  rationale: The adjective is articular and masculine singular, functioning substantivally.
    Following the project's gender-accurate policy, 'wise man' preserves the masculine
    singular representative form better than a neutral plural or abstract rendering.
- source_word: ἐν λόγῳ
  chosen: by his words
  alternatives:
  - in speech
  - with a word
  - in his speaking
  lexicon: LSJ
  rationale: 'The phrase indicates means or sphere. ''By his words'' gives natural
    English and captures the instrumental sense in context: the wise person wins affection
    through speech.'
- source_word: ἑαυτὸν προσφιλῆ ποιήσει
  chosen: will make himself beloved
  alternatives:
  - will make himself dear
  - will make himself pleasing
  - will make himself loved
  lexicon: LSJ
  rationale: προσφιλής means dear, beloved, pleasing to someone. 'Will make himself
    beloved' preserves the reflexive construction and the relational sense without
    sounding awkward.
- source_word: χάριτες
  chosen: favors
  alternatives:
  - graces
  - kindnesses
  - charms
  lexicon: LSJ
  rationale: In this wisdom context, plural χάριτες most naturally refers to favorable
    acts or displays of graciousness rather than abstract 'graces.' 'Favors' fits
    the contrast with the wise man's effective speech and the fool's indiscriminate
    giving or charm.
- source_word: μωρῶν
  chosen: of fools
  alternatives:
  - of the foolish
  - belonging to fools
  lexicon: LSJ
  rationale: A straightforward possessive genitive; 'of fools' is concise and idiomatic.
- source_word: ἐκχυθήσονται
  chosen: will be poured out
  alternatives:
  - will be spilled
  - will gush out
  - will be squandered
  lexicon: LSJ
  rationale: The future passive of ἐκχέω is literally 'be poured out.' The metaphor
    likely suggests wasteful or indiscriminate outpouring, but the main text keeps
    the image rather than interpreting it more strongly as 'squandered.'
