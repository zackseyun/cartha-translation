id: SIR.20.14
reference: Sirach 20:14
source:
  edition: lxx-swete-1909
  text: ὀλίγα δώσει καὶ πολλὰ ὀνειδίσει, καὶ ἀνοίξει τὸ στόμα αὐτοῦ ὡς κῆρυξ·
  language: Greek
