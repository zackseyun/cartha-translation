translation:
  text: He gives little and heaps on many reproaches, and he opens his mouth like
    a herald.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will give little and reproach much'; the Greek futures can be rendered
      more literally, but here they likely express a general pattern of behavior in
      proverbial style.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀλίγα
  chosen: little
  alternatives:
  - a few things
  - little things
  lexicon: LSJ
  rationale: Neuter plural used adverbially/objectively with δώσει; in idiomatic English
    'gives little' best captures the sense of meager giving without awkward literalism.
- source_word: δώσει
  chosen: he gives
  alternatives:
  - he will give
  lexicon: LSJ
  rationale: Future can function gnomicly in wisdom literature, expressing characteristic
    behavior. Present English better conveys the proverbial force.
- source_word: πολλὰ
  chosen: many
  alternatives:
  - much
  - a lot of
  lexicon: LSJ
  rationale: Neuter plural with ὀνειδίσει refers to numerous reproaches/insults. 'Many'
    fits the countable sense better than 'much'.
- source_word: ὀνειδίσει
  chosen: heaps on many reproaches
  alternatives:
  - reproaches greatly
  - insults repeatedly
  - casts many reproaches
  lexicon: LSJ
  rationale: From ὀνειδίζω, 'to reproach, taunt, insult.' The construction πολλὰ ὀνειδίσει
    is more vivid than a flat 'reproaches much'; 'heaps on many reproaches' preserves
    the piling-up sense in natural English.
- source_word: ἀνοίξει τὸ στόμα αὐτοῦ
  chosen: he opens his mouth
  alternatives:
  - he opens up his mouth
  - he speaks out
  lexicon: LSJ
  rationale: A common idiom for beginning to speak. Retained fairly literally because
    the image is transparent in English and prepares for the simile that follows.
- source_word: ὡς κῆρυξ
  chosen: like a herald
  alternatives:
  - like a crier
  - like a public announcer
  lexicon: LSJ
  rationale: κῆρυξ denotes a herald or public announcer. 'Herald' preserves the formal,
    public, loud-speaking image better than more colloquial alternatives.
