translation:
  text: A wise man keeps silent until the right time, but a fool does not observe
    the right time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''does not observe the proper time.'' The Hebrew literally says ''does
      not keep time.'' The Greek parallel for this verse reads quite differently:
      ''The one who abounds in speech will be detested, and the one who acts high-handedly
      will be hated.'''
    reason: alternative_reading
lexical_decisions:
- source_word: חָכָם
  chosen: a wise man
  alternatives:
  - a wise person
  - the wise man
  lexicon: HALOT
  rationale: The Hebrew singular masculine noun denotes a wise person in proverbial
    style. Per project philosophy, the grammatically masculine form is rendered gender-accurately
    as 'man' in this representative saying rather than neutralized.
- source_word: יַחֲרִישׁ
  chosen: keeps silent
  alternatives:
  - is silent
  - holds his peace
  lexicon: HALOT
  rationale: The verb means to be silent or keep silent. 'Keeps silent' gives a natural
    English present sense in a proverb and preserves the volitional nuance better
    than a simple stative rendering.
- source_word: עַד עֵת
  chosen: until the right time
  alternatives:
  - until a time
  - until the proper time
  - until the occasion
  lexicon: HALOT
  rationale: Literally 'until time,' but in wisdom usage עֵת commonly means an appropriate
    or fitting time. 'The right time' makes the idiomatic sense clear in modern English
    without over-paraphrasing.
- source_word: וּכְסִיל
  chosen: but a fool
  alternatives:
  - and a fool
  - but the fool
  lexicon: HALOT
  rationale: The conjunction can be simply 'and,' but the proverb sets a contrast
    between wise man and fool, so 'but' best reflects the adversative force in context.
- source_word: לֹא יִשְׁמוֹר עֵת
  chosen: does not keep time
  alternatives:
  - does not observe the right time
  - does not wait for the proper time
  - does not guard the occasion
  lexicon: HALOT
  rationale: The Hebrew is literally 'does not keep/observe time.' Retaining 'keep
    time' preserves the concise Hebrew wording and the parallel with the first colon,
    while still being intelligible as failing to observe proper timing. The Greek
    parallel differs substantially and points instead toward excessive speech and
    hated domineering behavior, which supports the broader wisdom idea of mistimed
    speech but not a more specific English rendering here.
