id: SIR.20.21
reference: Sirach 20:21
source:
  edition: lxx-swete-1909
  text: ἔστιν κωλυόμενος ἁμαρτάνειν ἀπὸ ἐνδείας, καὶ ἐν τῇ ἀναπαύσει αὐτοῦ οὐ κατανυγήσεται.
  language: Greek
