theological_decisions:
- issue: Moral implication of poverty preventing sin
  chosen_reading: The verse states that poverty can restrain a person from committing
    sin and that such a person, when at rest, is free from inward compunction.
  alternative_readings:
  - The verse could be read more generally as lack preventing wrongdoing without implying
    moral virtue in poverty itself.
  rationale: The Greek makes an observational wisdom claim, not a doctrinal claim
    that poverty is inherently righteous. The translation preserves the statement
    without importing praise of poverty beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
