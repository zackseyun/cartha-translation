translation:
  text: There is one who is prevented from sinning by poverty, and in his rest he
    will feel no remorse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through want' or 'because of need.' The Greek phrase points to lack
      or poverty as the reason the person is restrained.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he will not be pierced/stung.' The sense is that he will feel
      no inward compunction or remorse.
    reason: lexical_alternative
lexical_decisions:
- source_word: κωλυόμενος
  chosen: is kept from
  alternatives:
  - is hindered from
  - is prevented from
  lexicon: BDAG
  rationale: The participle denotes being restrained or prevented. 'Is kept from'
    is natural English and preserves the passive sense without overformal stiffness.
- source_word: ἁμαρτάνειν
  chosen: sinning
  alternatives:
  - to sin
  - doing wrong
  lexicon: BDAG
  rationale: The infinitive plainly means 'to sin.' 'Sinning' fits the English syntax
    after 'kept from' and preserves the moral-religious force of the Greek.
- source_word: ἀπὸ ἐνδείας
  chosen: by poverty
  alternatives:
  - through want
  - because of need
  - from lack
  lexicon: LSJ
  rationale: 'ἐνδεία denotes want, need, or poverty. ''By poverty'' concisely expresses
    the causal sense here: lack of means restrains the person from sinning.'
- source_word: ἀναπαύσει
  chosen: rest
  alternatives:
  - repose
  - quiet
  - ease
  lexicon: LSJ
  rationale: The noun refers to a state of rest or repose. 'Rest' is the most straightforward
    rendering and leaves open whether the sense is physical quiet, relief, or settled
    condition.
- source_word: οὐ κατανυγήσεται
  chosen: he will feel no remorse
  alternatives:
  - he will not be pierced with grief
  - he will not be stung
  - he will not be troubled
  lexicon: LSJ
  rationale: The verb can convey being struck or pierced inwardly, hence compunction
    or remorse. 'Feel no remorse' communicates the idiomatic sense in clear modern
    English better than a wooden metaphor.
