    text: ἄνθρωπος σοφὸς σιγήσει ἕως καιροῦ, ὁ δὲ λαπιστὴς καὶ ἄφρων ὑπερβήσεται καιρόν.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
