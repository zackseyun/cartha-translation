translation:
  text: Better is a man who hides his foolishness than a man who hides his wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Better is a person who hides his folly than one who hides his wisdom.'
      The Greek ἄνθρωπος can be generic ('person'), but the main text keeps the masculine
      singular form of the proverb.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρείσσων
  chosen: Better is
  alternatives:
  - is better
  - superior is
  lexicon: LSJ
  rationale: Comparative adjective introducing a proverbial comparison. 'Better is'
    preserves the aphoristic force and mirrors the Greek structure naturally in English.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: LSJ
  rationale: The Greek uses the singular generic 'man/person.' Per project philosophy,
    a gender-accurate rendering is preferred where the source is masculine with representative
    force. 'A man' keeps the proverbial style and matches the repeated Greek noun.
- source_word: ἀποκρύπτων
  chosen: who hides
  alternatives:
  - concealing
  - covering up
  - keeping hidden
  lexicon: LSJ
  rationale: Present participle describing the kind of person in view. 'Who hides'
    is idiomatic, concise, and preserves the repeated verbal parallelism.
- source_word: μωρίαν
  chosen: foolishness
  alternatives:
  - folly
  - stupidity
  lexicon: LSJ
  rationale: μωρία denotes folly or foolishness. 'Foolishness' is accessible modern
    English and fits the moral tone without sounding overly harsh or colloquial.
- source_word: σοφίαν
  chosen: wisdom
  alternatives:
  - good sense
  lexicon: LSJ
  rationale: Standard rendering for σοφία. In Sirach, 'wisdom' is a key term and should
    be preserved consistently unless context demands otherwise.
