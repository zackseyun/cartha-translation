translation:
  text: There is one who buys much for little, and repays it sevenfold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek ''them'' could also be rendered more literally: ''and repaying them
      sevenfold.'' The pronoun is plural in form, though English may treat the purchased
      goods or their value collectively.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek source is concise and somewhat compressed: the sense may be either
      that someone buys many things cheaply and later pays back seven times as much,
      or more generally that an apparent bargain proves very costly.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔστιν
  chosen: There is one who
  alternatives:
  - There is
  - Someone
  lexicon: LSJ
  rationale: The existential formula introduces a type of person or case in wisdom
    style. Rendering it as 'There is one who' brings out the implied subject naturally
    in English without over-paraphrasing.
- source_word: ἀγοράζων
  chosen: buys
  alternatives:
  - purchases
  - acquires in the market
  lexicon: LSJ
  rationale: The participle from ἀγοράζω denotes buying or purchasing. 'Buys' is the
    most natural modern English equivalent and preserves the commercial imagery.
- source_word: πολλὰ
  chosen: much
  alternatives:
  - many things
  - a great deal
  lexicon: LSJ
  rationale: Neuter plural used adverbially/objectively in a commercial context can
    be rendered idiomatically as 'much' in English. 'Many things' is possible but
    less smooth.
- source_word: ὀλίγου
  chosen: for little
  alternatives:
  - for a little
  - at small cost
  - cheaply
  lexicon: LSJ
  rationale: The genitive after a buying expression indicates price. 'For little'
    keeps the concise proverbial force and reflects low cost without adding interpretive
    color.
- source_word: ἀποτιννύων
  chosen: repays
  alternatives:
  - pays back
  - renders back
  - returns
  lexicon: LSJ
  rationale: The verb means to pay what is due or repay. 'Repays' best fits the financial/proverbial
    frame and leaves open whether the repayment is literal or figurative.
- source_word: αὐτὰ
  chosen: it
  alternatives:
  - them
  - these things
  lexicon: LSJ
  rationale: Although formally plural, the pronoun likely refers collectively to what
    was bought or to the amount/value involved. Singular 'it' reads idiomatically
    in English; the plural alternative is preserved in a footnote because the referent
    is somewhat compressed in Greek.
- source_word: ἑπταπλάσιον
  chosen: sevenfold
  alternatives:
  - seven times as much
  - seven times over
  lexicon: LSJ
  rationale: The term denotes a sevenfold measure. 'Sevenfold' preserves the compact
    proverbial style and avoids over-specifying whether the multiplication is of price,
    value, or return.
