theological_decisions:
- issue: 'Sense of the second colon: whether pleasing the powerful means morally ''atoning
    for injustice'' or more pragmatically ''covering over wrongdoing'''
  chosen_reading: 'Retain the atonement language in the main text: ''will make atonement
    for injustice.'''
  alternative_readings:
  - will cover over wrongdoing
  - will appease for injustice
  rationale: The Greek verb ἐξιλάσεται naturally carries expiatory/appeasement force.
    Although the proverb may be ironic or pragmatic in context, the text itself uses
    stronger cultic-moral language, so the translation preserves that tension rather
    than flattening it into mere social maneuvering.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without erasing lexical weight.'
