translation:
  text: The one who works the land will raise up his grain heap, and the one who pleases
    great men will atone for injustice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will cover over wrongdoing.' The Greek says 'will make atonement for
      injustice,' which may describe the practical effect of winning the favor of
      powerful people.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐργαζόμενος
  chosen: the one who works
  alternatives:
  - he who labors
  - the worker
  lexicon: BDAG
  rationale: Present middle participle used substantivally; a generic personal expression
    is best rendered in clear modern English as 'the one who works' rather than a
    more wooden participial form.
- source_word: γῆν
  chosen: the land
  alternatives:
  - ground
  - soil
  - earth
  lexicon: LSJ
  rationale: In an agricultural proverb, γῆ refers to cultivated land/ground. 'The
    land' is idiomatic and broad enough to cover farmland without over-specifying.
- source_word: ἀνυψώσει
  chosen: will raise up
  alternatives:
  - will increase
  - will lift high
  - will exalt
  lexicon: BDAG
  rationale: The verb literally means 'raise up' or 'lift up.' In context it likely
    implies increasing the produce heap, but the more literal 'raise up' preserves
    the image while remaining intelligible.
- source_word: θιμωνιὰν
  chosen: grain heap
  alternatives:
  - harvest heap
  - stack
  - threshing heap
  lexicon: LSJ
  rationale: The noun denotes a heap of harvested grain or sheaves. 'Grain heap' preserves
    the agrarian image more clearly for modern readers than the less familiar 'stack'
    alone.
- source_word: ἀρέσκων
  chosen: pleases
  alternatives:
  - curries favor with
  - seeks to please
  lexicon: BDAG
  rationale: The participle straightforwardly means 'pleasing.' A more interpretive
    rendering like 'curries favor with' would import a negative nuance not explicit
    in the Greek.
- source_word: μεγιστᾶσιν
  chosen: great men
  alternatives:
  - the great
  - rulers
  - magnates
  lexicon: LSJ
  rationale: The dative plural refers to socially powerful or eminent persons. 'Great
    men' is gender-accurate to the masculine form and fits the social-status sense
    better than the more specific 'rulers,' which the text does not require.
- source_word: ἐξιλάσεται
  chosen: will make atonement for
  alternatives:
  - will appease
  - will expiate
  - will obtain pardon for
  lexicon: BDAG
  rationale: The verb belongs to atonement/expiation language. 'Make atonement for'
    preserves that semantic weight without using more technical or archaic wording.
    In this proverb it likely means covering over or remedying wrongdoing in relation
    to the powerful.
- source_word: ἀδικίαν
  chosen: injustice
  alternatives:
  - wrongdoing
  - unrighteousness
  lexicon: BDAG
  rationale: ἀδικία can denote injustice or wrongdoing. 'Injustice' keeps the moral-social
    sense and pairs naturally with the atonement language; 'wrongdoing' is possible
    but slightly flatter.
