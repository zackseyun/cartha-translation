translation:
  text: How good it is to reprove rather than to become angry, and the one who confesses
    will be kept from loss.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who acknowledges it will be spared disadvantage.' The Greek
      leaves the object of 'confesses/acknowledges' unstated and the noun for the
      consequence can mean loss, damage, or disadvantage.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς καλὸν
  chosen: How good it is
  alternatives:
  - How fitting
  - How excellent
  lexicon: LSJ
  rationale: Exclamatory idiom introducing a moral evaluation. 'How good it is' preserves
    the force naturally in English without overformal stiffness.
- source_word: ἐλέγξαι
  chosen: to reprove
  alternatives:
  - to rebuke
  - to expose
  - to correct
  lexicon: BDAG
  rationale: The aorist infinitive here denotes verbal correction/censure. 'Reprove'
    fits wisdom-literature moral instruction better than the harsher 'rebuke' and
    is more specific than 'correct'.
- source_word: ἢ θυμοῦσθαι
  chosen: rather than to become angry
  alternatives:
  - than to be angry
  - than to rage
  lexicon: BDAG
  rationale: θυμόομαι refers to becoming angry or wrathful. 'Become angry' captures
    the inceptive verbal sense and contrasts well with constructive reproof.
- source_word: ὁ ἀνθομολογούμενος
  chosen: the one who confesses
  alternatives:
  - the one who admits it
  - the one who acknowledges his fault
  - the one who agrees openly
  lexicon: LSJ
  rationale: The participle can mean confessing or openly acknowledging. In this ethical
    context, 'confesses' best conveys admission of wrongdoing, though the object is
    implicit in Greek.
- source_word: ἀπὸ ἐλαττώσεως
  chosen: from loss
  alternatives:
  - from damage
  - from deficiency
  - from blame
  lexicon: LSJ
  rationale: ἐλάττωσις can denote diminution, loss, or disadvantage. 'From loss' is
    broad and idiomatic, preserving the idea of being spared harmful consequence without
    over-specifying whether material, social, or moral loss is intended.
- source_word: κωλυθήσεται
  chosen: will be kept from
  alternatives:
  - will be prevented from
  - will be hindered from
  lexicon: BDAG
  rationale: Future passive of κωλύω. With ἀπό, the sense is being kept away from
    or spared. 'Will be kept from' is natural English and suits the proverb's outcome
    statement.
