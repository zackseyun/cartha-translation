translation:
  text: A lie is a shameful blemish in a person; in the mouth of the undisciplined
    it will be continually present.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A lie is an evil blemish in a person'; the Greek ἐν ἀνθρώπῳ is a generic
      singular, and μῶμος can also be rendered 'disgrace' or 'reproach.'
    reason: lexical_alternative
  - marker: b
    text: '''Undisciplined'' translates a term that can also mean ''uninstructed''
      or ''uneducated,'' but here likely carries a moral-wisdom sense rather than
      merely lack of schooling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μῶμος
  chosen: shameful blemish
  alternatives:
  - blemish
  - disgrace
  - reproach
  lexicon: LSJ
  rationale: μῶμος denotes a blot, blemish, or reproach. 'Blemish' preserves the concrete
    metaphor, while 'shameful' brings out the negative evaluative force in idiomatic
    English.
- source_word: πονηρός
  chosen: shameful
  alternatives:
  - evil
  - bad
  - wicked
  lexicon: BDAG/LSJ
  rationale: Here πονηρός modifies μῶμος and intensifies its negative quality. 'Shameful'
    fits the moral-social sense in context better than the more abstract 'evil blemish'.
- source_word: ἐν ἀνθρώπῳ
  chosen: in a man
  alternatives:
  - in a person
  - in humanity
  lexicon: BDAG/LSJ
  rationale: The singular generic ἄνθρωπος is best represented by 'man' under the
    project's gender-accurate policy, since the sense is representative/generic rather
    than specifically male-exclusive.
- source_word: ψεῦδος
  chosen: a lie
  alternatives:
  - falsehood
  - lying
  lexicon: BDAG/LSJ
  rationale: ψεῦδος can mean 'lie' or 'falsehood.' 'A lie' reads naturally as the
    predicate noun and keeps the proverb concrete and pointed.
- source_word: ἀπαίδευτος
  chosen: undisciplined
  alternatives:
  - uneducated
  - uninstructed
  - untrained
  lexicon: BDAG/LSJ
  rationale: ἀπαίδευτος in wisdom literature often refers not merely to lack of schooling
    but to lack of moral formation. 'Undisciplined' captures that ethical-wisdom nuance
    better than 'uneducated.'
- source_word: ἐνδελεχισθήσεται
  chosen: will be continually present
  alternatives:
  - will persist
  - will continue
  - will be incessant
  lexicon: LSJ
  rationale: The future passive conveys ongoing continuance or persistence. 'Will
    be continually present' expresses the durative sense in clear English while fitting
    the image of something habitually found in the mouth.
