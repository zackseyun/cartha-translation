translation:
  text: My soul clung to her, and I did not turn my face away from her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel at this point is substantially longer and differs in
      wording, adding lines about diligent practice, stretching out the hands on high,
      and mourning over wisdom's hidden things. The main text follows the surviving
      Hebrew witness.
    reason: textual_variant
lexical_decisions:
- source_word: חַשְׁקָה
  chosen: clung
  alternatives:
  - was attached
  - desired
  - longed
  lexicon: HALOT
  rationale: The Hebrew verb from חשק can denote strong attachment, desire, or cleaving.
    In this wisdom context with wisdom personified as a woman, 'clung' preserves both
    affection and committed attachment better than the more purely emotional 'desired.'
    The Greek parallel differs substantially here, so the Hebrew witness is given
    primacy while allowing for an attachment-oriented sense.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  - my life
  - my being
  lexicon: HALOT
  rationale: נפש commonly means soul, self, or life. 'My soul' keeps the Hebrew idiom
    and the verse's elevated devotional tone. A flatter rendering like 'I' would lose
    the anthropological texture.
- source_word: בָּהּ
  chosen: to her
  alternatives:
  - in her
  - with her
  lexicon: HALOT
  rationale: The preposition ב with חשק is idiomatically rendered in English as attachment
    'to' someone or something. Because wisdom is personified in the surrounding context,
    'her' is retained.
- source_word: וּפָנַי
  chosen: my face
  alternatives:
  - my presence
  - my attention
  lexicon: HALOT
  rationale: The Hebrew literally says 'my face.' Retaining the concrete image fits
    biblical idiom and pairs naturally with 'turn away.'
- source_word: לֹא אַהֲפֹך
  chosen: I did not turn away
  alternatives:
  - I did not turn
  - I would not turn
  lexicon: HALOT
  rationale: The verb הפך here is best understood in context as turning away or turning
    aside. English normally requires the directional nuance to make sense with 'my
    face.'
- source_word: מִמֶּנָּה
  chosen: from her
  alternatives:
  - away from her
  lexicon: HALOT
  rationale: מן marks separation. 'From her' is the direct rendering; the fuller sense
    'away from her' is already carried by the English verb phrase 'turn away.'
