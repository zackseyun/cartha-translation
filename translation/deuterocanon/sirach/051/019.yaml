theological_decisions:
- issue: Personification of wisdom as feminine
  chosen_reading: Retain feminine pronouns ('her')
  alternative_readings:
  - render non-personally as 'it'
  rationale: The Hebrew explicitly uses feminine forms, consistent with personified
    wisdom in Sirach. Retaining 'her' preserves the literary and theological texture
    of the passage rather than flattening wisdom into an abstract concept.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve
    source intent'
- issue: Primary witness versus divergent Greek parallel
  chosen_reading: Translate from the extant Hebrew while consulting the Greek as a
    control
  alternative_readings:
  - follow the Greek's substantially different wording
  rationale: For Sirach where Hebrew survives, the project philosophy gives primacy
    to the Hebrew witness. The Greek parallel for this verse is notably expanded and
    divergent, so it informs interpretation but does not override the Hebrew wording
    here.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    parallel as actual input without displacing original-language primacy'
