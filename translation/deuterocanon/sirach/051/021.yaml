lexical_decisions:
- source_word: מֵעַי
  chosen: my inward parts
  alternatives:
  - my belly
  - my heart
  - my inner being
  lexicon: HALOT
  rationale: מֵעֶה literally denotes the inner organs/entrails and often functions
    idiomatically for deep inward emotion. 'My inward parts' preserves the bodily
    metaphor more transparently than the more interpretive 'my heart' or the narrower
    'my belly.' The Greek κοιλία likewise points to the inner cavity rather than specifically
    the heart.
- source_word: יֵחַמּוּ
  chosen: burned
  alternatives:
  - grew hot
  - were warmed
  - was stirred
  lexicon: HALOT
  rationale: From חמה/חמם, the sense is becoming hot. In context with 'like an oven,'
    'burned' best captures the intensity of desire/zeal. The Greek ἐταράχθη ('was
    troubled/stirred') reflects a different nuance, but the Hebrew image of heat is
    primary in this witness.
- source_word: כַּתַּנּוּר
  chosen: like an oven
  alternatives:
  - as a furnace
  lexicon: HALOT
  rationale: תנור is an oven; 'oven' is the most direct and natural rendering. 'Furnace'
    would heighten the image beyond the ordinary Hebrew term.
- source_word: לְהַבִּיט בָּהּ
  chosen: as I looked toward her
  alternatives:
  - to look at her
  - in looking upon her
  - to behold her
  lexicon: HALOT
  rationale: The infinitive להביט with ב marks looking toward/upon. Rendering it temporally
    ('as I looked toward her') fits the Hebrew syntax in context and keeps the action
    linked to the inward burning. 'Toward' slightly preserves the preposition better
    than a flat object construction.
- source_word: בַּעֲבוּר כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - because of this
  lexicon: HALOT
  rationale: This idiom introduces the consequence drawn from the preceding experience.
    'Therefore' is concise and natural English.
- source_word: לֹא אֶעֶזְבֶנָּה
  chosen: I will not forsake her
  alternatives:
  - I will not leave her
  - I will not abandon her
  lexicon: HALOT
  rationale: עזב commonly means leave/forsake. 'Forsake' suits the elevated register
    of wisdom poetry and the personal attachment to feminine Wisdom. The Greek parallel
    instead reads 'therefore I acquired a good possession,' indicating a substantial
    variant, but the Hebrew witness here supports a vow of continued attachment.
