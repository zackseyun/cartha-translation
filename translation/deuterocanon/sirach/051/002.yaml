translation:
  text: You spared my flesh from the pit, and from the hand of Sheol you delivered
    my foot. You rescued me from the slander of the people, from the scourge of a
    slanderous tongue and from the lips of those who speak lies. You were with me
    against those who rose against me; you helped me according to the abundance of
    your steadfast love.
