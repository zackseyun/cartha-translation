lexical_decisions:
- source_word: ἐξομολογοῦμαι
  chosen: I give thanks
  alternatives:
  - I confess
  - I praise
  lexicon: BDAG
  rationale: In this thanksgiving context, the Greek verb most naturally expresses
    grateful acknowledgment rather than confession of sin. 'I give thanks' is clear
    modern English and fits the parallel praise context in Sirach.
- source_word: τῷ ὀνόματί σου
  chosen: to your name
  alternatives:
  - your name
  lexicon: BDAG
  rationale: The dative is retained with 'to' to preserve the Hebrew/Greek idiom of
    directed thanksgiving while remaining natural in English.
- source_word: σκεπαστής
  chosen: shelter
  alternatives:
  - protector
  - covering
  - defender
  lexicon: LSJ
  rationale: The noun denotes one who covers/protects. 'Shelter' captures the protective
    sense in idiomatic English without over-personalizing into a title like 'Defender.'
- source_word: βοηθός
  chosen: helper
  alternatives:
  - help
  - protector
  lexicon: BDAG
  rationale: '''Helper'' is the straightforward lexical equivalent and pairs well
    with ''shelter'' in the coordinate structure.'
- source_word: ἐγένου μοι
  chosen: you became my
  alternatives:
  - you were for me
  - you proved to be for me
  lexicon: BDAG
  rationale: The aorist middle of γίνομαι is best represented as 'became' or 'proved
    to be.' 'You became my' preserves the verbal force and reads naturally with the
    predicate nouns.
