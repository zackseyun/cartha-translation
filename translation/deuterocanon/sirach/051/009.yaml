translation:
  text: And I raised my voice from the earth, and from the gates of Sheol I cried
    out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the land.' The Hebrew reads 'from the earth/land,' while the Greek
      parallel reflects 'upon the earth,' indicating a minor divergence in the witnesses.
    reason: textual_variant
  - marker: b
    text: '''Sheol'' is the Hebrew term for the realm of the dead; alternatively,
      ''the grave'' or ''the underworld.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָרִים
  chosen: I raised
  alternatives:
  - I lifted up
  - I exalted
  lexicon: HALOT
  rationale: From רום in the Hifil-like sense of lifting/raising. With קוֹלִי ('my
    voice') as object, 'raised' is idiomatic English and preserves the concrete image
    better than the more interpretive Greek-aligned 'offered up my supplication'.
- source_word: מֵאֶרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  - upon the earth
  lexicon: HALOT
  rationale: The Hebrew preposition מן with אֶרֶץ most naturally yields 'from the
    earth/land.' The Greek parallel has ἐπὶ γῆν ('upon the earth'), suggesting some
    textual or interpretive divergence, but the Hebrew witness is primary here. 'Earth'
    best preserves the broad, poetic sense.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - my sound
  - my cry
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' or 'sound.' Since the verb already conveys
    the act of raising it, 'my voice' is the most direct rendering; 'my cry' would
    front-load the distress nuance that is better expressed in the second colon.
- source_word: וּמִּשַּׁעֲרֵי
  chosen: and from the gates of
  alternatives:
  - and from the entrances of
  - and from the portals of
  lexicon: HALOT
  rationale: שַׁעַר in the plural construct is literally 'gates of.' The phrase is
    a standard metaphor for the threshold of death/the underworld and should be kept
    concrete.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the underworld
  - Hades
  lexicon: HALOT
  rationale: Retaining 'Sheol' preserves the Hebrew concept without collapsing it
    into later or narrower English categories. 'Grave' is too weak, and 'Hades' would
    import Greek terminology not present in the Hebrew main witness.
- source_word: שִׁוַּעְתִּי
  chosen: I cried for help
  alternatives:
  - I cried out
  - I pleaded
  - I called for rescue
  lexicon: HALOT
  rationale: The verb שוע carries the sense of crying out for aid. 'I cried for help'
    makes the petitionary force explicit and aligns well with the Greek ἐδεήθην ('I
    implored/begged') without overtranslating.
