  text: מַעֲשֵׂיכֶם עֲשׂוּ בִצְדָקָה, וְהוּא נוֹתֵן לָכֶם שְׂכַרְכֶם בְּעִתּוֹ.<br><small>(ל)</small>
    בָּרוּךְ יְהֹוָה לְעוֹלָם, וּמְשֻׁבָּח שְׁמוֹ לְדֹר וָדֹר.
  language: Hebrew
  pages:
