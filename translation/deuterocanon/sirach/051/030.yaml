translation:
  text: Do your work in righteousness, and he will give you your reward in its time.
    Blessed is the LORD forever, and praised is his name from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in due time' or 'at his time'; the Hebrew בְּעִתּוֹ and Greek ἐν καιρῷ
      αὐτοῦ can be understood as the proper time for the reward, and some hear the
      pronoun as referring to God rather than to the reward.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֵׂיכֶם עֲשׂוּ
  chosen: Do your work
  alternatives:
  - Do your deeds
  - Perform your works
  - Work at your task
  lexicon: HALOT
  rationale: The Hebrew combines the noun 'your deeds/work' with the imperative 'do/make.'
    The Greek parallel has ἐργάξεσθε τὸ ἔργον ὑμῶν ('work your work'), supporting
    an idiomatic English rendering rather than a wooden repetition. 'Do your work'
    preserves the imperative force and the practical sense.
- source_word: בִצְדָקָה
  chosen: in righteousness
  alternatives:
  - with righteousness
  - justly
  - in justice
  lexicon: HALOT
  rationale: 'The preposition ב plus צְדָקָה can denote manner: acting in righteousness/right
    conduct. ''In righteousness'' keeps the key term visible and aligns with the project''s
    default preference to preserve theological vocabulary where natural. ''Justly''
    is possible but slightly more interpretive.'
- source_word: וְהוּא
  chosen: he
  alternatives:
  - He (God)
  - the LORD
  lexicon: HALOT
  rationale: The pronoun refers back to God implicitly in context. Rendering it as
    'he' follows the Hebrew wording without over-specifying; the following blessing
    names the LORD explicitly.
- source_word: נוֹתֵן לָכֶם שְׂכַרְכֶם
  chosen: will give you your reward
  alternatives:
  - gives you your wages
  - will pay you your recompense
  lexicon: HALOT
  rationale: שכר can mean wages, reward, or recompense. 'Reward' fits wisdom literature
    and avoids implying a merely commercial transaction, while still matching the
    Greek μισθός. The future auxiliary in English reflects the promissory sense of
    the Hebrew participle in context.
- source_word: בְּעִתּוֹ
  chosen: in its time
  alternatives:
  - in due time
  - at its appointed time
  - in his time
  lexicon: HALOT
  rationale: The Hebrew likely means 'in its/his time,' and the Greek ἐν καιρῷ αὐτοῦ
    likewise allows either 'in its season' or 'at his time.' 'In its time' reads naturally
    in English and links the reward to its proper season. Because the pronominal reference
    can be heard differently, the alternative is preserved in a footnote.
- source_word: בָּרוּךְ יְהֹוָה לְעוֹלָם
  chosen: Blessed is the LORD forever
  alternatives:
  - Blessed be the LORD forever
  lexicon: HALOT
  rationale: The Hebrew blessing formula can be rendered either as a declaration or
    a jussive-like doxology in English. 'Blessed is the LORD forever' stays close
    to the predicative Hebrew while remaining idiomatic. 'the LORD' follows the project's
    default rendering of YHWH.
- source_word: וּמְשֻׁבָּח שְׁמוֹ לְדֹר וָדֹר
  chosen: and praised is his name from generation to generation
  alternatives:
  - and his name is praised from generation to generation
  - and praiseworthy is his name for all generations
  lexicon: HALOT
  rationale: מְשֻׁבָּח denotes being praised/praiseworthy. 'Praised is his name' preserves
    the doxological cadence and parallelism with the previous clause. לְדֹר וָדֹר
    is a standard idiom for enduring praise across successive generations.
