theological_decisions:
- issue: Rendering the divine name יְהֹוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD,' following Jewish
    reverence tradition and longstanding English convention while distinguishing the
    covenant name from generic 'Lord.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether צְדָקָה should be rendered with ethical-theological terminology or
    a more secular equivalent
  chosen_reading: righteousness
  alternative_readings:
  - justice
  - what is right
  rationale: The verse exhorts morally upright action before God and promises divine
    recompense. 'Righteousness' preserves the wisdom-theological register; 'justice'
    remains a viable contextual alternative but is not required by this verse.
  doctrine_reference: DOCTRINE.md Contested terms principle on preserving key terms
