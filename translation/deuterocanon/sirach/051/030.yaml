  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐργάξεσθε τὸ ἔργον ὑμῶν πρὸ καιροῦ, καὶ δώσει τὸν μισθὸν ὑμῶν ἐν καιρῷ αὐτοῦ.
    kind: greek_parallel
