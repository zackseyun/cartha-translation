  parallel_sources:
  - edition: lxx-swete-1909
    text: τὴν ψυχήν μου κατεύθυνα εἰς αὐτήν, καρδίαν ἐκτησάμην μετʼ αὐτῶν ἀπʼ ἀρχῆς,
      καὶ ἐν καθαρσμῷ εὗρον αὐτήν· διὰ τοῦτο οὐ μὴ ἐγκαταλειφθῶ.
