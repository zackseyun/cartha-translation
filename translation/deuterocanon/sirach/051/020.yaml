theological_decisions:
- issue: Personification of wisdom as feminine
  chosen_reading: Retain feminine pronouns ('her') throughout.
  alternative_readings:
  - Use 'it' for abstract wisdom
  rationale: The Hebrew repeatedly uses feminine forms for wisdom, and the verse's
    rhetoric depends on that personification. Preserving 'her' keeps the literary
    and theological texture without adding doctrinal claims.
  doctrine_reference: 'Translation philosophy: preserve source meaning; do not flatten
    significant imagery.'
