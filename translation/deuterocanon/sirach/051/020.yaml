translation:
  text: I gave my soul after her, and for everlasting ages I will not turn away from
    her. In purity I found her, and from the beginning I acquired a heart for her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I gave my soul after her,' an idiom of devoted pursuit.
    reason: lexical_alternative
  - marker: b
    text: Or 'forever and ever'; Hebrew, 'for everlasting ages.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew reads 'I acquired a heart for her from the beginning.' The Greek
      parallel differs somewhat in this clause, reading more like 'I acquired a heart
      from the beginning together with them/with it,' but both witnesses support the
      sense of an inward disposition toward wisdom from the outset.
    reason: alternative_reading
lexical_decisions:
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my self
  lexicon: HALOT
  rationale: נפש commonly denotes the self or life, but 'my soul' preserves the elevated,
    personal force of the Hebrew in wisdom-seeking language and aligns with the Greek
    ψυχήν.
- source_word: נָתַתִּי אַחֲרֶיהָ
  chosen: I gave ... after her
  alternatives:
  - I devoted myself to her
  - I set myself in pursuit of her
  - I followed after her
  lexicon: HALOT
  rationale: Literally 'I gave [my soul] after her.' The idiom conveys committed pursuit.
    The English keeps the concrete imagery rather than flattening it into pure paraphrase,
    while remaining intelligible.
- source_word: וּלְנֵצַח נְצָחִים
  chosen: for everlasting ages
  alternatives:
  - forever and ever
  - for eternity
  - to the ages of ages
  lexicon: HALOT
  rationale: The doubled expression intensifies duration. 'For everlasting ages' preserves
    the emphatic Hebrew without importing later liturgical phrasing too strongly.
    It also reflects the solemnity of the line.
- source_word: לֹא אַטֶּה מִמֶּנָּה
  chosen: I will not turn away from her
  alternatives:
  - I will not depart from her
  - I will not incline away from her
  lexicon: HALOT
  rationale: The verb נטה can mean turn aside or incline. In context of fidelity to
    wisdom, 'turn away from her' is natural English and preserves the relational image.
- source_word: וּבְטָהֳרָה
  chosen: In purity
  alternatives:
  - with purity
  - in purification
  - through purity
  lexicon: HALOT
  rationale: The preposition and noun can be read adverbially or instrumentally. 'In
    purity' best preserves the Hebrew's compactness and matches the Greek ἐν καθαρσμῷ,
    while leaving open whether purity is the sphere or means of finding wisdom.
- source_word: מְצָאתִיהָ
  chosen: I found her
  alternatives:
  - I attained her
  - I discovered her
  lexicon: HALOT
  rationale: Straightforward rendering of מצא with wisdom personified as feminine.
    'Found her' is both literal and idiomatic.
- source_word: וְלֵב קָנִיתִי לָהּ
  chosen: I acquired a heart for her
  alternatives:
  - I gained understanding for her
  - I won a heart for her
  - I acquired heart for her
  lexicon: HALOT
  rationale: The Hebrew is somewhat idiomatic and the Greek differs here. Retaining
    'heart' preserves the Hebrew anthropological term לב and avoids over-interpreting
    it as merely 'understanding.' 'Acquired a heart for her' conveys the gaining of
    inward disposition or resolve toward wisdom.
- source_word: מִתְּחִלָּתָהּ
  chosen: from the beginning
  alternatives:
  - from her beginning
  - from the outset
  lexicon: HALOT
  rationale: The phrase most naturally means 'from the beginning/from the outset.'
    Given the textual complexity and the Greek ἀπʼ ἀρχῆς, this rendering is the most
    defensible and readable.
