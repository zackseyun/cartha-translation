translation:
  text: My soul came near to death, and my life to the depths of Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul touched death.' The Hebrew verb is literally 'touched/reached,'
      but here likely means 'came near,' as reflected by the Greek parallel 'drew
      near to death.'
    reason: lexical_alternative
  - marker: b
    text: '''Sheol'' is the Hebrew term for the realm of the dead; the Greek parallel
      has ''Hades below.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּגַּע
  chosen: came near
  alternatives:
  - touched
  - reached
  lexicon: HALOT
  rationale: The verb נגע literally means 'touch' or 'reach,' but with לַמָּוֶת ('to
    death') the idiomatic sense is proximity rather than physical contact. The Greek
    parallel ἤγγισεν ('drew near') confirms this reading, so 'came near' best captures
    the sense in natural English.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my self
  lexicon: HALOT
  rationale: נפש can denote life, self, or soul. Here, because the second colon already
    uses חַיָּתִי ('my life'), preserving 'my soul' in the first colon maintains the
    Hebrew poetic parallelism rather than flattening both lines into the same English
    term.
- source_word: חַיָּתִי
  chosen: my life
  alternatives:
  - my living being
  - my soul
  lexicon: HALOT
  rationale: In parallel with נַפְשִׁי, this term refers to the speaker's life-force
    or life. 'My life' is the clearest idiomatic rendering and matches the Greek ἡ
    ζωή μου.
- source_word: לִשְׁאוֹל
  chosen: to Sheol
  alternatives:
  - to the grave
  - to Hades
  - to the underworld
  lexicon: HALOT
  rationale: Sheol is the Hebrew term for the realm of the dead. Transliteration preserves
    the source-world concept better than 'grave,' which is too narrow, and avoids
    importing the fuller Greek mythological associations of 'Hades,' though the Greek
    parallel does use ᾅδου.
- source_word: תַּחְתִּיּוֹת
  chosen: the depths
  alternatives:
  - the lowest places
  - the lower regions
  - the nethermost parts
  lexicon: HALOT
  rationale: The plural form denotes the lowest or deepest regions. 'The depths of
    Sheol' is concise, natural English that preserves the intensifying force of the
    Hebrew and aligns with the Greek κάτω ('below').
