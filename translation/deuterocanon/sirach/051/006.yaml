theological_decisions:
- issue: Rendering שְׁאוֹל in a deuterocanonical Hebrew verse with Greek parallel
    ᾅδης
  chosen_reading: Sheol
  alternative_readings:
  - Hades
  - the grave
  - the underworld
  rationale: The Hebrew witness is primary where extant, so the specifically Hebrew
    term is preserved in transliteration. The Greek parallel supports the general
    sense 'realm of the dead' but does not require replacing the Hebrew concept with
    a Greek one. This preserves source-language texture without making a stronger
    doctrinal claim about the afterlife than the text itself makes.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy over translation tradition'
