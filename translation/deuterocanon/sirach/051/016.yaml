id: SIR.51.16
reference: Sirach 51:16
source:
  edition: lxx-swete-1909
  text: ἔκλινα ὀλίγον τὸ οὖς μου καὶ ἐδεξάμην, καὶ πολλὴν εὗρον ἐμαυτῷ παιδείαν·
  language: Greek
