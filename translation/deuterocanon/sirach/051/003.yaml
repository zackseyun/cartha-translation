translation:
  text: from the snare of those watching for my stumbling, and from the hand of those
    seeking my life. You saved me from many troubles, and from the distress of a flame
    all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those watching for my fall' or 'those watching my limp/stumbling.'
      The Hebrew phrase is idiomatic and slightly uncertain.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew reads 'from the distress of a flame all around.' The Greek parallel
      at this point differs substantially, expanding the description of rescue rather
      than preserving this exact wording.
    reason: textual_variant
lexical_decisions:
- source_word: מִמּוֹקֵשׁ
  chosen: from the snare
  alternatives:
  - from the trap
  lexicon: HALOT
  rationale: מוֹקֵשׁ denotes a snare or trap. 'Snare' preserves the metaphorical sense
    of entrapment and matches the poetic register.
- source_word: צוֹפֵי צַלְעִי
  chosen: those watching for my stumbling
  alternatives:
  - those watching my limp
  - those lying in wait for my fall
  lexicon: HALOT
  rationale: צוֹפֵי is 'watchers/watchful ones'; צַלְעִי likely refers to limping,
    stumbling, or downfall. In context of hostile surveillance, the idiom points to
    enemies waiting for a misstep. 'My stumbling' communicates the sense without over-literal
    awkwardness.
- source_word: וּמִּיַד
  chosen: and from the hand of
  alternatives:
  - and from
  lexicon: HALOT
  rationale: Hebrew 'hand' often marks power or control. Retaining 'hand of' preserves
    the concrete Hebrew idiom and the poetic parallelism.
- source_word: מְבַקְשֵׁי נַפְשִׁי
  chosen: those seeking my life
  alternatives:
  - those seeking my soul
  - those trying to kill me
  lexicon: HALOT
  rationale: נפשׁ here in a threat context means life rather than the immaterial soul.
    'Those seeking my life' is both idiomatic English and faithful to the Hebrew.
- source_word: מֵרַבּוֹת צָרוֹת
  chosen: from many troubles
  alternatives:
  - from great troubles
  - from many distresses
  lexicon: HALOT
  rationale: The phrase can be read quantitatively ('many troubles') or intensively
    ('great troubles'). The Hebrew form naturally supports plurality, so 'many troubles'
    is preferred while preserving the broad sense of affliction.
- source_word: הוֹשַׁעְתָּנִי
  chosen: you saved me
  alternatives:
  - you delivered me
  lexicon: HALOT
  rationale: The verb ישׁע commonly means save/deliver. 'You saved me' is direct,
    natural, and preserves the personal address to God.
- source_word: וּמִמְּצוּקוֹת
  chosen: and from the distress of
  alternatives:
  - and from the straits of
  - and from the anguish of
  lexicon: HALOT
  rationale: מְצוּקוֹת denotes distress, straits, or severe pressure. The construct
    relation with the following noun is difficult, but 'distress of' best preserves
    the Hebrew linkage.
- source_word: שַׁלְהֶבֶת
  chosen: a flame
  alternatives:
  - blaze
  - flame
  lexicon: HALOT
  rationale: שלהבת is flame or blazing fire. The singular 'a flame' reflects the Hebrew
    while allowing the phrase to function metaphorically or literally.
- source_word: מִסָּבִיב
  chosen: all around
  alternatives:
  - from all around
  - surrounding me
  lexicon: HALOT
  rationale: The adverb conveys encirclement. 'All around' is concise and idiomatic
    in English, preserving the sense of surrounding danger.
