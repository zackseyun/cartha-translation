theological_decisions:
- issue: Whether to render נפשי as 'my soul' or 'my life'
  chosen_reading: my life
  alternative_readings:
  - my soul
  rationale: In a context of enemies, snares, and rescue, the Hebrew idiom 'seek the
    נפשׁ' refers to seeking someone's life, not making a statement about the soul's
    ontology.
  doctrine_reference: 'Translation philosophy: preserve source sense without importing
    doctrinal claims.'
- issue: Whether the final colon refers to literal fire or metaphorical affliction
  chosen_reading: from the distress of a flame all around
  alternative_readings:
  - from surrounding fiery distress
  - from distress, a blaze all around
  rationale: The Hebrew permits either a literal or metaphorical image. The translation
    keeps the concrete image of flame without resolving the ambiguity beyond what
    the text warrants. The Greek parallel differs substantially and points to a broader
    rescue context, but the Hebrew witness is primary here.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
