theological_decisions:
- issue: Relation between the Hebrew wording and the Greek parallel in a wisdom-seeking
    context
  chosen_reading: The main text retains the Hebrew statement about prayer in youth
    and finding much knowledge, while incorporating the Greek's explicit feminine
    object as 'for her' to make the referent to wisdom clear.
  alternative_readings:
  - I prayed in my youth, and I found much knowledge.
  - Before the temple I asked for her, and to the end I will seek her.
  rationale: Zone 1 gives a high-confidence Hebrew witness, so it remains primary.
    However, the task requires the Greek parallel to be used as actual translation
    input. The Greek appears to reflect a fuller or divergent line emphasizing prayer
    for wisdom herself. Because the immediate context of Sirach 51 is a wisdom poem,
    adding 'for her' best integrates the witnesses without replacing the Hebrew line
    with the substantially different Greek wording. The stronger Greek divergence
    is preserved in a footnote rather than imported wholesale into the main text.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is primary where it survives;
    parallel Greek used as translation input. DOCTRINE.md: preserve tension rather
    than over-resolve.'
