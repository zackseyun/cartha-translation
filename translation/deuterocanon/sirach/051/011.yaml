lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  - So
  lexicon: HALOT
  rationale: Temporal adverb marking the transition from the preceding vow of praise/prayer to the divine response. 'Then' is the most natural concise English equivalent.
- source_word: שָׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: With יְהוָה as subject and קוֹלִי as object, the plain sense is that the LORD heard the speaker's voice. Using 'heard' preserves the Hebrew verbal distinction from the following וַיַּאֲזִין.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - my cry
  lexicon: HALOT
  rationale: The Hebrew literally says 'my voice.' Although 'cry' could be idiomatic in prayer contexts, the source text does not require that nuance, and the Greek also supports a straightforward hearing of the petition.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּאֲזִין
  chosen: he listened to
  alternatives:
  - gave ear to
  - paid attention to
  lexicon: HALOT
  rationale: This verb is stronger/more attentive than simple 'hear.' Rendering it 'listened to' preserves the parallelism and progression from hearing to attentive response in readable modern English.
- source_word: תַּחֲנוּנָי
  chosen: my supplications
  alternatives:
  - my pleas
  - my entreaties
  lexicon: HALOT
  rationale: The noun denotes earnest pleas for favor or mercy. 'Supplications' best preserves the prayerful register without becoming archaic; 'pleas' is possible but slightly flatter. The Greek δέησις likewise points to petitionary prayer.
