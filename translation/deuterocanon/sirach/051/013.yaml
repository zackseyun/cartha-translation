theological_decisions:
- issue: Use of the Hebrew witness versus the Greek parallel
  chosen_reading: Translate primarily from the surviving Hebrew, while allowing the
    Greek to inform coherence and confirm the theme of youthful pursuit of wisdom.
  alternative_readings:
  - 'Follow the Greek more closely: ''While I was still young, before I went astray,
    I sought wisdom openly in my prayer.'''
  rationale: For Sirach where Hebrew survives, project policy gives Hebrew primacy.
    Here the Hebrew and Greek differ substantially in wording, so the main text follows
    the Hebrew witness rather than harmonizing to the Greek. The Greek alternative
    is significant enough to preserve in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is translated from the Hebrew
    where it survives; parallel Greek is used as actual input but does not override
    the Hebrew witness.'
