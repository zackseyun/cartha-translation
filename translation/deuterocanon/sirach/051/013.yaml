translation:
  text: I was young, and I loved wisdom; I desired her and sought her out. In faithfulness
    my foot walked; from my youth, O Lord, I learned wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'In faithfulness'; alternatively, 'In truth my foot walked.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel differs notably: ''While I was still young, before I
      went astray, I sought wisdom openly in my prayer.'' The main text follows the
      surviving Hebrew witness.'
    reason: alternative_reading
lexical_decisions:
- source_word: נַעַר
  chosen: young
  alternatives:
  - a youth
  - young man
  lexicon: HALOT
  rationale: The Hebrew denotes youthfulness. 'Young' fits idiomatic English after
    'when I was still' and avoids over-specifying gender where the first-person speaker
    is already explicit.
- source_word: וָאוֹהַב
  chosen: I loved
  alternatives:
  - I came to love
  - I desired
  lexicon: HALOT
  rationale: The bracketed Hebrew in Kahana reads straightforwardly 'and I loved.'
    This is retained rather than assimilating to the Greek's different wording, while
    the Greek helps confirm the verse's theme of early pursuit of wisdom.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חכמה in Sirach; personified by following feminine
    pronominal references.
- source_word: וְחָפַצְתִּי בָהּ
  chosen: I desired her
  alternatives:
  - I delighted in her
  - I took pleasure in her
  lexicon: HALOT
  rationale: חפץ conveys desire/delight. 'Desired her' pairs naturally with the personified
    'wisdom' and with the next verb 'sought her out.'
- source_word: וּבִקַּשְׁתִיהָ
  chosen: sought her out
  alternatives:
  - sought her
  - searched for her
  lexicon: HALOT
  rationale: בקש means seek. 'Sought her out' gives the active, intentional sense
    in readable English.
- source_word: בַּאֲמִתָּהּ
  chosen: In faithfulness
  alternatives:
  - In truth
  - truly
  lexicon: HALOT
  rationale: אמת can mean truth, faithfulness, reliability. Here, with 'my foot walked,'
    it likely describes the manner/path of conduct. 'In faithfulness' best captures
    ethical steadfastness, though 'in truth' remains possible and is preserved in
    a footnote.
- source_word: דָּרְכָה רַגְלִי
  chosen: my foot walked
  alternatives:
  - my foot trod
  - I walked
  lexicon: HALOT
  rationale: The Hebrew is literally 'my foot trod/walked.' Retaining 'my foot' preserves
    the concrete Hebrew idiom without becoming unnatural.
- source_word: מִנְּעוּרַי
  chosen: from my youth
  alternatives:
  - since my youth
  - from my young days
  lexicon: HALOT
  rationale: A standard temporal expression indicating the beginning point of lifelong
    practice.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - O Lord
  lexicon: HALOT
  rationale: The Hebrew reads אדני. Because it stands in direct address before the
    clause 'from my youth ... I learned wisdom,' 'Lord' is the most natural English
    rendering. The absence of a possessive suffix argues against 'my Lord'; an exclamatory
    'O Lord' is possible but not required.
- source_word: לָמַדְתִּי
  chosen: I learned
  alternatives:
  - I studied
  - I was taught
  lexicon: HALOT
  rationale: The verb most naturally means 'I learned.' 'Studied' narrows the sense
    too much, and 'was taught' would shift the voice.
