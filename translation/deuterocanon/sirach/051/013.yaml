  text: אֲנִי נַעַר הָיִיתִי [וָאוֹהַב חָכְמָה], וְחָפַצְתִּי בָהּ וּבִקַּשְׁתִיהָ.<br><small>(יג)</small>
    בַּאֲמִתָּהּ דָּרְכָה רַגְלִי, אֲדֹנָי מִנְּעוּרַי חָכְמָה לָמַדְתִּי.
  language: Hebrew
  pages:
  - 681
  - 722
  - 729
  - 744
  - 766
  - 767
  - 768
