  text: וַיִּפְדֵּנִי מִכָּל רָע, וַיְמַלְּטֵנִי בְּיוֹם צָרָה.<br><small>(יב)</small>
    עַל כֵּן הוֹדֵיתִי וַאֲהַלְלָה, וַאֲבָרְכָה אֶת שֵׁם יְהֹוָה.<br>הוֹדוּ לַיהֹוָה
    כִּי טוֹב, כִּי לְעוֹלָם חַסְדּוֹ.<br>הוֹדוּ לְאֵל הַתִּשְׁבָּחוֹת, כִּי לְעוֹלָם
    חַסְדּוֹ.<br>הוֹדוּ לְשׁוֹמֵר יִשְׂרָאֵל, כִּי לְעוֹלָם חַסְדּוֹ.<br>הוֹדוּ לְיוֹצֵר
    הַכֹּל, כִּי לְעוֹלָם חַסְדּוֹ.<br>הוֹדוּ לְגוֹאֵל יִשְׂרָאֵל, כִּי לְעוֹלָם חַסְדּוֹ.<br>הוֹדוּ
    לִמְקַבֵּץ נִדְחֵי יִשְׂרָאֵל, כִּי לְעוֹלָם חַסְדּוֹ.<br>הוֹדוּ לְבוֹנֶה עִירוֹ
    וּמִקְדָּשׁוֹ, כִּי לְעוֹלָם חַסְדּוֹ.<br>הוֹדוּ לַמַּצְמִיחַ קֶרֶן לְבֵית דָּוִד,
    כִּי לְעוֹלָם חַסְדּוֹ.<br>הוֹדוּ לְבוֹחֵר בִּבְנֵי צָדוֹק לְכֹהֵן, כִּי לְעוֹלָם
    חַסְדּוֹ.<br>הוֹדוּ לְמָגֵן אַבְרָהָם, כִּי לְעוֹלָם חַסְדּוֹ.<br>הוֹדוּ לְצוּר
    יִצְחָק, כִּי לְעוֹלָם חַסְדּוֹ.<br>הוֹדוּ לְאַבִּיר יַעֲקֹב, כִּי לְעוֹלָם חַסְדּוֹ.<br>הוֹדוּ
    לְבוֹחֵר בְּצִיּוֹן, כִּי לְעוֹלָם חַסְדּוֹ.<br>הוֹדוּ לְמֶלֶךְ מַלְכֵי מְלָכִים,
    כִּי לְעוֹלָם חַסְדּוֹ.<br>וַיָּרֶם קֶרֶן לְעַמּוֹ, תְּהִלָּה לְכָל חֲסִידָיו,
    לִבְנֵי יִשְׂרָאֵל עַם קְרוֹבוֹ, הַלְלוּ-יָהּ.
