theological_decisions:
- issue: Whether סכלים should be rendered as a moral rebuke ('fools') or as those
    lacking education/instruction
  chosen_reading: you who are unlearned
  alternative_readings:
  - you fools
  - you simple ones
  rationale: In this wisdom-school invitation, the immediate context is pedagogical
    rather than condemnatory. The Greek parallel strongly supports an educational
    nuance. The chosen rendering preserves the call to the inexperienced without importing
    a harsher moral judgment than the verse requires.
  doctrine_reference: 'Translation philosophy: preserve source plain sense; readable
    modern English; document contextual variance.'
