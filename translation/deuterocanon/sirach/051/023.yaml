translation:
  text: Turn to me, you who are simple, and lodge in the house of my instruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Draw near to me'; the Greek parallel reads 'Draw near to me, you who
      are untrained, and lodge in the house of instruction.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'you who are unlearned'; alternatively, 'you fools' or 'you simple
      ones.' The Greek parallel favors the sense of those lacking instruction rather
      than a purely moral insult.
    reason: alternative_reading
lexical_decisions:
- source_word: פְּנוּ אֵלַי
  chosen: Turn to me
  alternatives:
  - Come to me
  - Draw near to me
  lexicon: HALOT
  rationale: The Hebrew imperative from פנה naturally means 'turn' or 'turn toward.'
    'Turn to me' preserves the Hebrew wording, while the Greek parallel Ἐγγίσατε πρὸς
    μέ ('draw near to me') confirms an invitational sense. 'Turn to me' best balances
    fidelity to the Hebrew with readable English.
- source_word: סְכָלִים
  chosen: you who are unlearned
  alternatives:
  - fools
  - simple ones
  - ignorant ones
  lexicon: HALOT
  rationale: The Hebrew term can denote the foolish or intellectually undisciplined.
    The Greek parallel ἀπαίδευτοι means 'uneducated, undisciplined, untrained,' which
    points here less to moral denunciation than to lack of instruction. 'You who are
    unlearned' preserves the pedagogical context and avoids overstating the insult
    as 'fools.'
- source_word: וְלִינוּ
  chosen: and lodge
  alternatives:
  - and stay
  - and spend the night
  - and dwell
  lexicon: HALOT
  rationale: The verb לין commonly means 'lodge' or 'spend the night.' The Greek αὐλίσθητε
    likewise suggests lodging or taking up quarters. 'Lodge' keeps the metaphor of
    entering and remaining within a place of learning, without flattening it to the
    weaker 'stay.'
- source_word: בְּבֵית מִדְרָשִׁי
  chosen: in the house of my instruction
  alternatives:
  - in my house of study
  - in my schoolhouse
  - in the house of learning
  lexicon: HALOT
  rationale: Literally 'in the house of my study/instruction.' Because מדרש here denotes
    a place associated with seeking and receiving teaching, and the Greek has οἴκῳ
    παιδείας ('house of instruction/discipline'), 'house of my instruction' best reflects
    both witnesses. 'House of study' is possible but sounds more institutionally Jewish
    in later technical ways that may over-specify the ancient sense.
