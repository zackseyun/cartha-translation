translation:
  text: 'And I will exalt you: O LORD, you are my Father, for you are the mighty one
    of my salvation. Do not let me fall slack in the day of distress, in the day of
    ruin and desolation.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''I called upon the Lord, the father of my lord.'' The Hebrew reads,
      ''O LORD, you are my Father.'''
    reason: alternative_reading
  - marker: b
    text: Greek has 'do not abandon me in days of affliction,' while the Hebrew reads
      more literally, 'do not let me fall slack' or 'do not let me grow weak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲרוֹמֵם
  chosen: And I will exalt you
  alternatives:
  - And I exalted
  - And I will praise you
  - And I will extol you
  lexicon: HALOT
  rationale: From רומם, 'to exalt, extol.' The prefixed waw with imperfect can be
    rendered as a forward-moving first-person declaration in context. 'Exalt' preserves
    the elevated register without over-paraphrasing. The object 'you' is implicit
    from the prayer context and made explicit in English for clarity.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name is rendered 'the LORD' rather than transliterated.
- source_word: אָבִי
  chosen: my Father
  alternatives:
  - father of my lord
  lexicon: HALOT
  rationale: The Hebrew witness reads plainly 'my Father.' The Greek parallel has
    'father of my lord,' which likely reflects a different Vorlage or interpretive
    development. Since Hebrew is primary where extant, the main text follows 'my Father,'
    while the Greek alternative is preserved in a footnote.
- source_word: גִּבּוֹר
  chosen: the mighty one
  alternatives:
  - mighty
  - warrior
  - strong one
  lexicon: HALOT
  rationale: גבור can function substantivally. 'The mighty one' fits the nominal clause
    and avoids importing specifically martial nuance unless context requires it.
- source_word: יִשְׁעִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - my help
  lexicon: HALOT
  rationale: From ישע, denoting salvation/deliverance. 'My salvation' preserves the
    theological weight and matches the possessive form.
- source_word: אַל תַּרְפֵּנִי
  chosen: Do not let me fall slack
  alternatives:
  - Do not abandon me
  - Do not forsake me
  - Do not let me grow weak
  lexicon: HALOT
  rationale: The Hebrew derives from רפה, 'to slacken, grow weak, let drop,' not the
    Greek ἐγκαταλιπεῖν 'abandon.' The rendering keeps the Hebrew image of weakening
    or being let go slack. Because English idiom is less natural here, the phrase
    is slightly smoothed with 'let me fall slack' rather than a bare literalism.
- source_word: בְּיוֹם צָרָה
  chosen: in the day of distress
  alternatives:
  - in the day of trouble
  - on the day of affliction
  lexicon: HALOT
  rationale: צָרָה commonly denotes distress or trouble. 'Distress' is natural modern
    English and preserves the gravity.
- source_word: שׁוֹאָה
  chosen: ruin
  alternatives:
  - devastation
  - calamity
  lexicon: HALOT
  rationale: The noun denotes destructive ruin or devastation. 'Ruin' is concise and
    pairs well with the following term.
- source_word: מְשׁוֹאָה
  chosen: desolation
  alternatives:
  - crash
  - devastation
  - catastrophe
  lexicon: HALOT
  rationale: Likely a cognate/intensive disaster term paired with שׁוֹאָה. 'Desolation'
    gives a distinct but related sense, preserving the Hebrew's doubled calamity language
    rather than collapsing both nouns into one English gloss.
