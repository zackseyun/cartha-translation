theological_decisions:
- issue: Divergence between Hebrew and Greek in the address to God
  chosen_reading: Follow the extant Hebrew 'O LORD, you are my Father' in the main
    text
  alternative_readings:
  - Follow the Greek 'I called upon the Lord, the father of my lord'
  rationale: The project prioritizes the Hebrew witness for Sirach where extant. The
    Greek remains an important control and may preserve an alternate Vorlage, but
    the Hebrew here is coherent and direct. The Greek difference is significant enough
    to preserve in a footnote rather than silently ignore.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    preserve significant alternatives in footnotes'
- issue: Meaning of the plea אַל תַּרְפֵּנִי
  chosen_reading: Render according to Hebrew weakening/slackening imagery rather than
    Greek abandonment language
  alternative_readings:
  - Do not abandon me
  - Do not forsake me
  rationale: The Hebrew and Greek differ materially. Since the Hebrew survives, the
    main text should reflect רפה rather than harmonize to the Greek ἐγκαταλιπεῖν.
    The more familiar abandonment sense is preserved in a footnote as a Greek-based
    alternative.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it silently'
