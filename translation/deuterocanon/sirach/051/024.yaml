theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ in wisdom exhortation
  chosen_reading: your soul
  alternative_readings:
  - your life
  - you yourselves
  rationale: The verse speaks of deep desire and lack in a wisdom-instruction setting.
    Rendering נֶפֶשׁ as 'soul' preserves the text's existential and spiritual resonance
    without importing a technical doctrine of the soul. Alternatives are possible
    but flatten the register.
  doctrine_reference: Translation philosophy §4, gender-accurate over gender-neutral;
    preserve source intent and theological tension rather than flattening.
