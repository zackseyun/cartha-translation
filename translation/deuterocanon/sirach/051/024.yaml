translation:
  text: How long will you keep lacking these things, while your soul is very thirsty?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''How long will you lack from these and these, and your soul will
      be very thirsty?'' The Greek parallel reads more idiomatically, ''How long do
      you say that you are lacking in these things, while your souls thirst greatly?''
      The main text follows the Hebrew as primary while using the Greek to clarify
      the sense.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal question introducing rebuke or exhortation; 'How long'
    is natural modern English and preserves the force.
- source_word: תַחְסְרוּן
  chosen: will you keep lacking
  alternatives:
  - will you be deprived of
  - do you fall short of
  lexicon: HALOT
  rationale: From חסר, 'to lack, be without.' The imperfect in this interrogative
    context suggests ongoing condition, so 'will you keep lacking' captures the durative
    force better than a simple present.
- source_word: מִן אֵלּוּ וְאֵלּוּ
  chosen: these things
  alternatives:
  - these
  - such things
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat awkward in isolation, and the Greek ἐν
    τούτοις supports reference to the matters just discussed. 'These things' gives
    a clear English object without over-specifying.
- source_word: וְנַפְשְׁכֶם
  chosen: your soul
  alternatives:
  - your life
  - you yourselves
  lexicon: HALOT
  rationale: נפש can mean soul, life, or self. Here, with the predicate 'thirsty,'
    the idiom points to the inner person in longing. 'Your soul' preserves the anthropological
    weight and matches wisdom-style diction.
- source_word: צְמֵאָה מְאֹד תִּהְיֶה
  chosen: is very thirsty
  alternatives:
  - will be very thirsty
  - thirsts greatly
  lexicon: HALOT
  rationale: The Hebrew has a future form 'will be,' while the Greek has present διψῶσι,
    'are thirsty.' Given the parallel source and the likely rhetorical sense describing
    their current needy state, present English reads best while preserving the strong
    adverb 'very' from מְאֹד / σφόδρα.
