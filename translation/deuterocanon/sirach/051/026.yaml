lexical_decisions:
- source_word: וְצַוְּארֵיכֶם
  chosen: your neck
  alternatives:
  - your necks
  lexicon: HALOT
  rationale: The Hebrew form is plural ('your necks'), but idiomatic English commonly
    uses the singular collective 'your neck' in exhortations addressed to a group.
    This preserves the bodily image without awkwardness.
- source_word: בְּעֻלָּהּ
  chosen: under her yoke
  alternatives:
  - into her yoke
  - to her yoke
  lexicon: HALOT
  rationale: The Hebrew is difficult in isolation, but the Greek parallel clearly
    supports the yoke imagery (ὑπὸ ζυγόν). The sense is submission to Wisdom's discipline.
    'Under her yoke' is the most natural English expression for the metaphor.
- source_word: הָבִיאוּ
  chosen: Bring
  alternatives:
  - put
  - lead
  lexicon: HALOT
  rationale: Imperative plural from 'bring/bring in.' 'Bring your neck under her yoke'
    preserves the active exhortation and works naturally in English.
- source_word: וּמַשָּׂאָהּ
  chosen: her burden
  alternatives:
  - her load
  lexicon: HALOT
  rationale: The noun denotes a load or burden. Since the line already uses yoke imagery,
    'burden' fits the metaphorical call to accept Wisdom's discipline.
- source_word: תִּשָּׂא נַפְשְׁכֶם
  chosen: let your soul bear
  alternatives:
  - let your life bear
  - let yourselves bear
  - receive instruction
  lexicon: HALOT; LXX Greek comparison
  rationale: The Hebrew literally speaks of the soul/person bearing the burden, while
    the Greek parallel has 'let your soul receive instruction.' Because the Hebrew
    witness is primary here and coherent, the main text keeps the bearing imagery.
    'Soul' is retained rather than flattened to 'self' to preserve the source's anthropological
    diction.
- source_word: קְרוּבָה הִיא
  chosen: She is near
  alternatives:
  - It is near
  lexicon: HALOT
  rationale: The feminine predicate naturally refers to Wisdom, personified as 'she'
    in this context.
- source_word: לִמְבַקְשֶׁיהָ
  chosen: to those who seek her
  alternatives:
  - for her seekers
  lexicon: HALOT
  rationale: This renders the participial form idiomatically while preserving the
    active pursuit of Wisdom.
- source_word: וְנוֹתֵן נַפְשׁוֹ
  chosen: the one who gives himself
  alternatives:
  - who gives his soul
  - who devotes himself
  lexicon: HALOT
  rationale: Literally 'gives his soul/life.' In context this means self-giving devotion
    in pursuit of Wisdom, not death. 'Gives himself' is clear modern English while
    preserving the force of personal commitment.
- source_word: מוֹצֵא אֹתָהּ
  chosen: finds her
  alternatives:
  - discovers her
  lexicon: HALOT
  rationale: Straightforward rendering of the Hebrew verb, matching the personified
    feminine object, Wisdom.
