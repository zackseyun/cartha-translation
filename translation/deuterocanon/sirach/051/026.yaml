theological_decisions:
- issue: Personification of Wisdom
  chosen_reading: Use feminine pronouns ('her,' 'she') throughout.
  alternative_readings:
  - Use 'it' for abstract wisdom
  rationale: The Hebrew grammar is feminine and the verse presents Wisdom as a personified
    female figure. Preserving this imagery is more faithful than abstracting it away.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source''s plain sense.'
- issue: Relation between Hebrew and Greek in the second colon
  chosen_reading: Main text follows the Hebrew 'bear her burden,' with Greek instructional
    nuance preserved in a footnote.
  alternative_readings:
  - '''let your soul receive instruction'' based on the Greek parallel'
  rationale: The project translates Sirach from the Hebrew where it survives, while
    using the Greek as actual input and consistency check. Here the Hebrew is extant
    and coherent, but the Greek reflects an interpretive or variant tradition worth
    preserving.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as input and preserve significant alternatives in footnotes.'
