translation:
  text: 'I opened my mouth and spoke of her: acquire wisdom for yourselves without
    silver.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew and Greek both use a feminine pronoun here, likely referring to wisdom
      as a personified female figure; alternatively, it could be rendered more abstractly
      as 'and spoke about it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי פָתַחְתִי
  chosen: I opened my mouth
  alternatives:
  - I opened my lips
  - I spoke out
  lexicon: HALOT
  rationale: A standard Hebrew idiom for beginning to speak. Rendering it literally
    preserves the vividness and matches the Greek ἤνοιξα τὸ στόμα μου.
- source_word: וְדִבַּרְתִּי בָהּ
  chosen: and spoke of her
  alternatives:
  - and spoke in her
  - and spoke about her
  lexicon: HALOT
  rationale: The feminine singular suffix most naturally refers back to wisdom, personified
    as feminine in Hebrew. 'Spoke of her' is idiomatic English that preserves the
    personal feminine reference better than a more abstract rendering.
- source_word: קְנוּ לָכֶם
  chosen: acquire for yourselves
  alternatives:
  - buy for yourselves
  - get for yourselves
  - obtain for yourselves
  lexicon: HALOT
  rationale: קנה can mean 'buy' or more broadly 'acquire.' Because the next phrase
    says 'without silver,' the commercial metaphor is active, but in English 'acquire'
    best carries both the metaphorical and practical sense of gaining wisdom.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: The plain sense is wisdom, personified in the preceding clause by the
    feminine suffix. This keeps the conceptual continuity of the verse.
- source_word: בְּלֹא כָסֶף
  chosen: without silver
  alternatives:
  - without money
  - without payment
  lexicon: HALOT
  rationale: The Hebrew says literally 'without silver,' echoed by the Greek ἄνευ
    ἀργυρίου. Retaining 'silver' preserves the concrete economic imagery rather than
    flattening it to the more generic 'money'.
