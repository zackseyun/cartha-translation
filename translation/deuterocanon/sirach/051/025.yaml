theological_decisions:
- issue: Referent of the feminine suffix in 'and I spoke of her'
  chosen_reading: The suffix refers to wisdom, personified as feminine.
  alternative_readings:
  - The suffix could be taken more loosely as 'of it,' referring to instruction or
    the subject matter generally.
  rationale: Given the immediate imperative 'acquire wisdom' and the common personification
    of wisdom in Sirach, the feminine pronoun is best preserved in English as 'her.'
    This reflects the Hebrew grammar and literary theology without importing later
    doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
