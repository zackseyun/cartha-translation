translation:
  text: from choking fire all around, and from the midst of a fire that I did not
    kindle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew of this verse is difficult and differs sharply from the
      Greek. A more Hebrew-shaped rendering of the latter half would read something
      like, 'from the womb of the deep, from my mother,' but the sense is obscure
      in context.
    reason: textual_variant
lexical_decisions:
- source_word: מְכַבּוֹת
  chosen: choking
  alternatives:
  - quenchings
  - extinguishings
  - smothering
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult and likely corrupt or at least
    obscure in this line; the parallel Greek ἀπὸ πνιγμοῦ ('from choking/suffocation')
    provides the clearest sense. I therefore render the opening according to the Greek-supported
    sense rather than forcing a wooden gloss from the problematic Hebrew form.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Straightforward lexical rendering in Hebrew, also confirmed by Greek
    πυρᾶς/πυρός.
- source_word: לְאֵין פֶּחָה
  chosen: all around
  alternatives:
  - without blowing
  - without bellows
  lexicon: HALOT
  rationale: The Hebrew phrase is highly uncertain in context and does not yield a
    secure idiomatic sense. The Greek κυκλόθεν ('all around') appears to preserve
    the line's intelligible meaning, so the translation follows the Greek here while
    noting the Hebrew uncertainty.
- source_word: מֵרֶחֶם תְּהוֹם לְאִמִּי
  chosen: from the midst of a fire that I did not kindle
  alternatives:
  - from my mother's womb to the abyss
  - from the womb of the deep, my mother
  lexicon: HALOT
  rationale: The extant Hebrew here diverges sharply from the Greek and appears textually
    unstable ('from the womb of the deep to my mother' is not coherent in context).
    Since the task requires using the Greek parallel as actual translation input,
    and because the Greek yields a coherent continuation matching the surrounding
    deliverance theme, I adopt the Greek sense for the main text and preserve the
    Hebrew-based alternative in a footnote.
- source_word: οὗ οὐκ ἐξέκαυσα
  chosen: that I did not kindle
  alternatives:
  - which did not burn me
  - from which I was not burned
  lexicon: BDAG
  rationale: The Greek verb ἐκκαίω normally means 'kindle, set ablaze' in active usage.
    The first-person active form naturally yields 'I did not kindle,' not 'I was not
    burned.' This also fits the motif of deliverance from a fire not of the speaker's
    making.
