translation:
  text: From her blossom, like a ripening cluster of grapes, my heart rejoiced in
    her; my foot trod in uprightness; from my youth I tracked her down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a reddening cluster of grapes'; the Greek image may emphasize the
      grapes taking on color as they ripen.
    reason: lexical_alternative
  - marker: b
    text: Or 'my foot stepped in straightness' or 'on a straight path'; the Greek
      can carry both literal path imagery and moral uprightness.
    reason: lexical_alternative
  - marker: c
    text: Or 'I traced her' / 'I sought her out'; the Greek verb literally evokes
      tracking by footprints.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ ἄνθους
  chosen: From her blossom
  alternatives:
  - From the flower
  - From blossom
  lexicon: LSJ
  rationale: ἄνθος denotes a flower or blossom. Because the following pronoun ἐν αὐτῇ
    refers back to personified wisdom, rendering with 'her blossom' makes the metaphor
    cohere in English without losing the genitival sense implied by the Greek context.
- source_word: ὡς περκάζουσης σταφυλῆς
  chosen: like a ripening cluster of grapes
  alternatives:
  - like a reddening grape cluster
  - like an early-ripe bunch of grapes
  lexicon: LSJ
  rationale: σταφυλή is a cluster/bunch of grapes. περκάζουσης describes the grapes
    as coming to color/ripeness. 'Ripening cluster of grapes' is natural modern English
    and preserves the agricultural image better than a more obscure color-term.
- source_word: εὐφράνθη
  chosen: rejoiced
  alternatives:
  - was gladdened
  - was delighted
  lexicon: BDAG
  rationale: The passive/deponent sense here expresses inward gladness. 'My heart
    rejoiced' is idiomatic and preserves the emotional force.
- source_word: ἡ καρδία μου
  chosen: my heart
  lexicon: BDAG
  rationale: Standard rendering; in biblical idiom it denotes the inner self/seat
    of joy, and no paraphrase is needed.
- source_word: ἐν αὐτῇ
  chosen: in her
  alternatives:
  - because of her
  - with her
  lexicon: BDAG
  rationale: The pronoun most naturally refers to personified wisdom pursued throughout
    the context. 'In her' preserves the Greek preposition and the intimate, participatory
    sense, though causal nuance is possible.
- source_word: ἐπέβη ὁ πούς μου
  chosen: my foot walked
  alternatives:
  - my foot stepped
  - my foot set itself
  lexicon: LSJ
  rationale: Literally 'my foot stepped/went upon.' In context of moral conduct followed
    by ἐν εὐθύτητι, 'my foot walked' gives clear English while retaining the singular
    'foot' image.
- source_word: ἐν εὐθύτητι
  chosen: in uprightness
  alternatives:
  - on a straight path
  - in straightness
  lexicon: LSJ
  rationale: εὐθύτης can denote straightness or uprightness. Given the ethical context
    of seeking wisdom, 'uprightness' best conveys both moral and path imagery.
- source_word: ἐκ νεότητός μου
  chosen: from my youth
  alternatives:
  - since my youth
  lexicon: BDAG
  rationale: A straightforward temporal expression; 'from my youth' is both literal
    and idiomatic.
- source_word: ἴχνευον
  chosen: I tracked her down
  alternatives:
  - I traced her
  - I sought her out
  - I followed her tracks
  lexicon: LSJ
  rationale: The verb literally means to track by footprints, investigate, or trace
    out. Because the verse already uses foot/path imagery, 'tracked her down' preserves
    the vivid metaphor of persistent pursuit better than the flatter 'sought.'
