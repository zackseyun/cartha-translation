translation:
  text: from lips of wickedness and from those who smear lies, and from the arrows
    of a deceitful tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel reads, 'from an unclean tongue and a false word,' rather
      than 'from lips of wickedness ... and the arrows of a deceitful tongue.' Since
      Hebrew survives for this verse, the main text follows the Hebrew witness; the
      Greek is preserved here because the difference is substantial.
    reason: alternative_reading
lexical_decisions:
- source_word: מִשִׂפְתֵי
  chosen: from lips of
  alternatives:
  - from the lips of
  lexicon: HALOT
  rationale: The prefixed מִן marks source/deliverance 'from,' and שפה in the dual/plural
    commonly means 'lips.' Retaining the concrete image fits the poetic parallelism
    with 'tongue.'
- source_word: זִמָּה
  chosen: wickedness
  alternatives:
  - depravity
  - lewdness
  - evil scheme
  lexicon: HALOT
  rationale: זִמָּה can denote wickedness, depravity, or especially sexual infamy
    in some contexts. Here, paired with falsehood and deceitful speech, a broader
    moral sense best fits the verbal context rather than specifically sexual misconduct.
- source_word: וְטֹפְלֵי שֶׁקֶר
  chosen: those who smear lies
  alternatives:
  - those who forge lies
  - those who frame falsehood
  - plasterers of lies
  lexicon: HALOT
  rationale: טפל in Hebrew can carry the sense of smearing/plastering and by extension
    attaching or concocting falsehood. The participial form suggests persons characterized
    by manufacturing or spreading lies. 'Smear lies' preserves the metaphor while
    remaining intelligible.
- source_word: וְחִצֵּי
  chosen: and from the arrows of
  alternatives:
  - and the arrows of
  lexicon: HALOT
  rationale: Although the second colon lacks an explicit preposition in Hebrew, the
    initial מִן naturally carries over in the series of dangers from which the speaker
    is delivered. 'Arrows' preserves the violent metaphor for harmful speech.
- source_word: לְשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  lexicon: HALOT
  rationale: The literal 'tongue' is preferable in wisdom poetry, especially alongside
    'lips,' because the bodily imagery sharpens the metaphor of destructive speech.
- source_word: מִרְמָה
  chosen: deceitful
  alternatives:
  - deceit
  - treachery
  lexicon: HALOT
  rationale: Rendered adjectivally in English ('a deceitful tongue') for natural syntax,
    while preserving the noun's sense of deceit/treachery as the tongue's defining
    quality.
- source_word: ἀπὸ γλώσσης ἀκαθάρτου καὶ λόγου ψευδοῦς
  chosen: not adopted in main text
  alternatives:
  - from an unclean tongue and a false word
  lexicon: BDAG
  rationale: The Greek parallel differs notably from the extant Hebrew, reading 'from
    an unclean tongue and a false word' and in Swete also linking with the previous
    verse's 'depth of Hades.' Because Hebrew survives here and is the primary witness
    for Sirach where extant, the main text follows the Hebrew while preserving the
    Greek difference in a footnote.
