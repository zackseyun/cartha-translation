theological_decisions:
- issue: Rendering of פָדִיתָ in a thanksgiving context
  chosen_reading: you have redeemed
  alternative_readings:
  - you have delivered
  - you have ransomed
  rationale: The verse is a prayer of thanksgiving for rescue, but פדה carries more
    than mere escape; it can denote redemption/ransom. 'Redeemed' preserves that theological
    depth without overstating a later doctrinal framework.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether to interpret שִׁמְךָ מָעוֹז חַיַּי dynamically
  chosen_reading: your name, the stronghold of my life
  alternative_readings:
  - your name is the refuge of my life
  - your name, my life's refuge
  rationale: The Hebrew permits an appositional reading. Keeping the metaphor concrete
    preserves the poetic theology of God's name as protective strength rather than
    reducing it to a generalized statement of help.
  doctrine_reference: Translation philosophy §3, §6
