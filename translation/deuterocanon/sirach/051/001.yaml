translation:
  text: I will praise you, God of my salvation; I will give thanks to you, God of
    my father. I will declare your name, the stronghold of my life, for you have redeemed
    my soul from death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will recount your name as the stronghold of my life.' The Hebrew
      phrase may be read appositionally ('your name, the stronghold of my life') or
      with a slightly more explicit verbal link.
    reason: lexical_alternative
  - marker: b
    text: '''My soul'' may also be rendered ''my life'' or ''my self''; the Hebrew
      nephesh can carry any of these senses depending on context.'
    reason: lexical_alternative
  - marker: c
    text: The Greek parallel begins, 'I will give thanks to you, Lord King, and I
      will praise you, God my savior,' reflecting a somewhat different opening formulation
      than the extant Hebrew.
    reason: textual_variant
lexical_decisions:
- source_word: אֲהַלְלֶךָּ
  chosen: I will praise you
  alternatives:
  - I will extol you
  - I will glorify you
  lexicon: HALOT
  rationale: הלך/הלל in the piel commonly denotes praise. 'Praise' is the most natural
    modern English equivalent and fits the parallel with אוֹדְךָ.
- source_word: אֱלֹהֵי יִשְׁעִי
  chosen: God of my salvation
  alternatives:
  - God my savior
  - God of my deliverance
  lexicon: HALOT
  rationale: The construct phrase is most directly rendered 'God of my salvation.'
    This preserves the Hebrew genitive and echoes biblical diction without becoming
    archaic.
- source_word: אוֹדְךָ
  chosen: I will give thanks to you
  alternatives:
  - I will thank you
  - I will praise you
  lexicon: HALOT
  rationale: ידה in the hifil often carries the sense of giving thanks or confessing/praising.
    Here, alongside אהללך, 'give thanks' preserves the semantic distinction between
    the two parallel verbs.
- source_word: אֱלֹהֵי אָבִי
  chosen: God of my father
  alternatives:
  - God of my ancestors
  - God of my fathers
  lexicon: HALOT
  rationale: The singular אָבִי is explicit in the Hebrew. 'God of my father' should
    be retained rather than generalized to 'ancestors.'
- source_word: אֲסַפְּרָה
  chosen: I will declare
  alternatives:
  - I will recount
  - I will tell
  lexicon: HALOT
  rationale: ספר in this context means to recount or declare. 'Declare' suits the
    public, praise-oriented context and reads smoothly in English.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: In biblical Hebrew 'name' can imply revealed character or reputation,
    but the literal 'your name' best preserves the source expression and its theological
    resonance.
- source_word: מָעוֹז חַיַּי
  chosen: the stronghold of my life
  alternatives:
  - my life's refuge
  - the refuge of my life
  - my strong refuge
  lexicon: HALOT
  rationale: מָעוֹז denotes a place of strength, refuge, or stronghold. The Hebrew
    apposition after 'your name' is preserved most transparently as 'your name, the
    stronghold of my life.' This keeps the metaphor concrete rather than flattening
    it to an abstract 'help.'
- source_word: פָדִיתָ
  chosen: you have redeemed
  alternatives:
  - you have ransomed
  - you have delivered
  lexicon: HALOT
  rationale: פדה often means redeem or ransom. 'Redeemed' preserves the covenantal
    and theological weight better than the more generic 'delivered,' while still fitting
    the context of rescue from death.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my self
  lexicon: HALOT
  rationale: נפש can mean soul, life, or self. Because the phrase is 'redeemed my
    soul from death,' 'my soul' preserves the Hebrew wording and poetic force. The
    alternative 'my life' is possible but less literal and less evocative here.
