translation:
  text: Yahweh has given me the reward of my lips; therefore I acquired her as a good possession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, 'The Lord gave me a tongue as my reward, and with it I will praise him.'
    reason: alternative_reading
  - marker: b
    text: '''Her'' refers to Wisdom in the surrounding context.'
    reason: cross_reference
lexical_decisions:
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  - the Lord
  lexicon: HALOT
  rationale: Follows project default for the divine name, preserving the Hebrew referent while matching established English convention.
- source_word: שְׂכַר
  chosen: reward
  alternatives:
  - wages
  - recompense
  lexicon: HALOT
  rationale: '''Reward'' best fits the positive sense here and reads naturally in English; ''wages'' is possible but sounds overly transactional.'
- source_word: שִׂפְתוֹתָי
  chosen: my lips
  alternatives:
  - my speech
  - my praise
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew idiom. In context it likely refers to praise or confession voiced by the speaker, but the concrete image 'lips' should be retained in the main text.
- source_word: בַּעֲבוּר כֵּן
  chosen: therefore
  alternatives:
  - for that reason
  - because of this
  lexicon: HALOT
  rationale: This compactly conveys the causal/resultative force of the Hebrew phrase in readable English.
- source_word: קְנִיתִיהָ
  chosen: I acquired her
  alternatives:
  - I gained her
  - I bought her
  lexicon: HALOT
  rationale: The verb commonly means acquire/buy. 'Acquired' preserves the broad sense without forcing a commercial nuance. The feminine suffix points back to Wisdom in the surrounding context.
- source_word: קִנְיָן טוֹב
  chosen: a good possession
  alternatives:
  - a good acquisition
  - a precious possession
  lexicon: HALOT
  rationale: This keeps the wordplay with קנה ('acquire') and קנין ('possession/acquisition'). 'Good possession' is slightly formal but preserves the Hebrew linkage better than a looser paraphrase.
- source_word: αἰνέσω αὐτόν
  chosen: not adopted in main text
  alternatives:
  - and with it I will praise him
  lexicon: BDAG
  rationale: The Greek parallel diverges notably from the extant Hebrew, reading about praising God with the given tongue. Because the Hebrew witness is primary where extant, the main text follows Hebrew, while the Greek alternative is preserved in a footnote.
