theological_decisions:
- issue: Relation between the Hebrew wording and the Greek parallel in the second
    colon
  chosen_reading: Translate the Hebrew as a statement about others gaining wealth
    through the speaker's instruction, while allowing the Greek to inform the mediating
    sense.
  alternative_readings:
  - 'Take the line imperatively from the Greek: ''Receive instruction for a great
    sum of silver, and acquire much gold by it.'''
  - Render בִּי more literally as 'in me' and leave the sense more opaque.
  rationale: Zone 1 gives a high-confidence Hebrew witness, which is primary for extant
    Hebrew Sirach. The Hebrew syntax is declarative ('Many heard... and they acquired...'),
    unlike the Greek imperative. Since the task requires keeping the Greek in view,
    the Greek parallel is used to clarify that the final prepositional phrase likely
    expresses means connected with instruction/wisdom. The main text therefore follows
    the Hebrew witness while preserving the notable Greek alternative in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input without displacing the more original extant witness.'
