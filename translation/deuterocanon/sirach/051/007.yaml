translation:
  text: I turned all around, and there was no one to help me; I looked for support,
    and there was none.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I looked for support''; the Greek parallel reads more explicitly,
      ''looking for help from men, and there was none.'' The translation follows the
      Hebrew while allowing the Greek to confirm the sense of sought human assistance.'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶפְנֶה
  chosen: I turned
  alternatives:
  - I turned myself
  - I looked
  lexicon: HALOT
  rationale: The Hebrew verb פנה in this form naturally means 'turn' or 'turn oneself.'
    In context with סָבִיב, it conveys looking around in every direction. 'I turned'
    keeps the bodily image while allowing the implied searching sense.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: The adverb intensifies the sense of searching in every direction. 'All
    around' is idiomatic modern English and reflects the Hebrew well; the Greek πάντοθεν
    supports the distributive sense.
- source_word: עוֹזֵר
  chosen: to help
  alternatives:
  - helper
  - one helping
  lexicon: HALOT
  rationale: The participle denotes someone acting as a helper. Rendering it verbally
    in English after 'there was no one' produces natural syntax without losing the
    agentive sense.
- source_word: וַאֲצַפֶּה
  chosen: I looked for
  alternatives:
  - I waited for
  - I hoped for
  - I watched for
  lexicon: HALOT
  rationale: The Hebrew צפה can mean watch/look out or await. In this parallel line,
    with the object 'support' and the Greek ἐμβλέπων ('looking toward'), the sense
    is active searching rather than temporal waiting. 'I looked for' best fits both
    witnesses.
- source_word: סוֹמֵךְ
  chosen: support
  alternatives:
  - one supporting
  - upholder
  - help
  lexicon: HALOT
  rationale: The Hebrew participle from סמך can denote one who supports or the act/resource
    of support. The Greek ἀντίλημψις points toward 'help/support' rather than a named
    person. 'Support' preserves the abstract object sought, while still matching the
    Hebrew sense.
- source_word: וְאָיִן
  chosen: there was none
  alternatives:
  - and there was not
  - and there was no one
  lexicon: HALOT
  rationale: This concise existential negation closes the line emphatically. 'There
    was none' mirrors the Hebrew terseness and fits the likely abstract sense of סוֹמֵךְ
    in context.
