translation:
  text: May my soul rejoice in my old age, and may you not be put to shame by my song.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''May your soul rejoice in his mercy, and may you not be
      put to shame in his praise.'' The Hebrew witness instead reads ''my soul,''
      ''my old age,'' and ''my song.'''
    reason: alternative_reading
lexical_decisions:
- source_word: תִּשְׂמַח
  chosen: May ... rejoice
  alternatives:
  - rejoices
  - let ... rejoice
  - be glad
  lexicon: HALOT
  rationale: Rendered as a jussive/wish, 'May ... rejoice,' which fits the volitional
    force of the Hebrew and aligns with the parallel Greek optative εὐφρανθείη.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  - my life
  - my self
  lexicon: HALOT
  rationale: Kept as 'my soul' rather than flattening to 'I' in order to preserve
    the Hebrew idiom and the personal, inward sense of rejoicing.
- source_word: בְּשֵׂיבָתִי
  chosen: in my old age
  alternatives:
  - in my gray hair
  - in my old years
  lexicon: HALOT
  rationale: שֵׂיבָה commonly denotes gray hair/old age. 'In my old age' communicates
    the idiomatic sense in natural English better than the more literal but less idiomatic
    'in my gray hair.'
- source_word: וְלֹא תֵבוֹשוּ
  chosen: and may you not be put to shame
  alternatives:
  - and do not be ashamed
  - and you will not be ashamed
  lexicon: HALOT
  rationale: The 2mp form in the Hebrew points to a plural addressee, unlike the first-person
    framing of the first colon. The Greek likewise has a second-person plural optative.
    'Be put to shame' preserves the passive/shame nuance of בוש better than the flatter
    'be ashamed.'
- source_word: בְּשִׁירָתִי
  chosen: in my song
  alternatives:
  - in my singing
  - in my praise
  lexicon: HALOT
  rationale: The Hebrew points most directly to 'my song/singing.' The Greek parallel
    reads 'his praise,' which likely reflects a different Vorlage or interpretive
    development. Since the Hebrew witness is primary here and high-confidence, the
    main text follows 'my song' while preserving the Greek-aligned alternative in
    a footnote.
