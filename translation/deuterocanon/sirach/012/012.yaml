translation:
  text: Be to him like one who reveals a secret, and he will not find a way to ruin
    you; and know the outcome of jealousy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like one uncovering a secret.' The image likely means to treat such
      a person with caution, as one would someone who exposes confidential matters.
    reason: lexical_alternative
  - marker: b
    text: Or 'know the outcome of envy.' Hebrew 'the end of jealousy/envy'; the Greek
      parallel expands the warning and makes the eventual consequence more explicit.
    reason: alternative_reading
lexical_decisions:
- source_word: הֱיֵה לוֹ
  chosen: Be to him
  alternatives:
  - Be toward him
  - Act toward him
  lexicon: HALOT
  rationale: Imperative of היה with ל conveys one's stance or manner toward someone.
    'Be to him' is slightly formal but preserves the directness of the Hebrew better
    than a more interpretive paraphrase.
- source_word: כִּמְגַלֶּה רָז
  chosen: like one who reveals a secret
  alternatives:
  - as one uncovering a secret
  - like a revealer of a secret
  lexicon: HALOT
  rationale: 'מגלה is a participle from גלה, ''uncover/reveal''; רז is ''secret, mystery.''
    The simile is retained. ''Reveals a secret'' is idiomatic English and preserves
    the warning image from the Hebrew. The sense is likely ironic or cautionary in
    context: treat him as one would treat a person who discloses secrets, i.e., with
    guarded distance.'
- source_word: וְלֹא יִמְצָא
  chosen: and he will find no way
  alternatives:
  - and he will not find
  - so that he does not find
  lexicon: HALOT
  rationale: The Hebrew literally says 'and he will not find.' In English, adding
    'way' makes the infinitive phrase that follows natural without materially expanding
    the sense.
- source_word: לְהַשְׁחִיתְךָ
  chosen: to ruin you
  alternatives:
  - to destroy you
  - to corrupt you
  - to harm you
  lexicon: HALOT
  rationale: The Hiphil of שחת can mean destroy, ruin, spoil, or corrupt. Given the
    interpersonal warning context, 'ruin you' captures hostile damage without overstating
    to physical annihilation. 'Destroy you' was possible but sounds too absolute here.
- source_word: וְדַע
  chosen: and know
  alternatives:
  - then know
  - so you will know
  lexicon: HALOT
  rationale: A straightforward imperative. The Greek parallel has a future-like result
    clause ('at the end you will recognize'), but the Hebrew witness reads an imperative,
    so the translation follows the Hebrew while keeping the Greek in view.
- source_word: אַחֲרִית
  chosen: the end
  alternatives:
  - the outcome
  - the latter end
  - the final result
  lexicon: HALOT
  rationale: אַחֲרִית commonly denotes end, latter end, or outcome. 'The end' is concise
    and preserves the Hebrew idiom; the contextual sense is effectively 'outcome,'
    which is preserved in a footnote alternative.
- source_word: קִנְאָה
  chosen: jealousy
  alternatives:
  - envy
  - zeal
  lexicon: HALOT
  rationale: קנאה can denote jealousy, envy, or zeal depending on context. Here, in
    a warning about an enemy's harmful intent, 'jealousy' best fits the destructive
    relational sense. 'Envy' is a viable alternative and is preserved in a footnote.
