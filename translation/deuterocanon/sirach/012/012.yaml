- issue: Use of Hebrew imperative versus Greek expanded warning
  chosen_reading: Follow the extant Hebrew as the primary text while allowing the
    Greek to inform interpretation of the warning tone.
  alternative_readings:
  - Translate more closely to the Greek parallel's wording about not seating the enemy
    near you or at your right hand
  rationale: Project policy gives primacy to the surviving Hebrew of Sirach where
    available. This verse shows a notable divergence between the concise Hebrew and
    the fuller Greek. The English therefore translates the Hebrew directly, but the
    Greek confirms that the verse's thrust is practical caution against an enemy's
    eventual usurpation or harm.
