translation:
  text: Twice as much evil will overtake him in time of distress; in every good thing
    it will reach him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Cairo Geniza Hebrew for this verse is substantially different,
      reading approximately: ''A double measure of evil will overtake him in time
      of need; in every good thing it will reach him.'' Because that wording diverges
      sharply from the surrounding context, the Greek reading is followed in the main
      text here.'
    reason: alternative_reading
lexical_decisions:
- source_word: δὸς / implied Hebrew exhortation context
  chosen: Give
  alternatives:
  - Give alms
  - Give help
  lexicon: BDAG
  rationale: The Hebrew line in Zone 1 appears divergent and difficult, while the
    Greek parallel offers a clear imperative matching the surrounding context of Sirach
    12. 'Give' is broad and faithful, avoiding the over-specification of 'give alms'
    where the object is not stated in this verse itself.
- source_word: τῷ εὐσεβεῖ
  chosen: to the godly
  alternatives:
  - to the devout
  - to the pious
  lexicon: BDAG
  rationale: The Greek adjective denotes one who is reverent or godly. 'Godly' is
    natural modern English and preserves the religious-moral sense better than the
    somewhat formal 'pious.'
- source_word: μὴ ἀντιλάβῃ
  chosen: do not support
  alternatives:
  - do not help
  - do not come to the aid of
  lexicon: BDAG
  rationale: The verb can mean to take hold of in order to help or support. 'Support'
    fits the ethical instruction and reads smoothly in English, while still conveying
    practical assistance.
- source_word: τοῦ ἁμαρτωλοῦ
  chosen: the sinner
  alternatives:
  - a sinner
  - the sinful person
  lexicon: BDAG
  rationale: The singular substantive is well represented by 'the sinner.' This keeps
    the proverbial, class-based force of the Greek without unnecessary expansion.
- source_word: פִּי שְׁנַיִם רָעָה תַּשִּׂיג בְּעֵת צֹרֶךְ, בְּכָל טוֹבָה תַּגִּיעַ
    אֵלָיו
  chosen: treated as a divergent Hebrew witness, not followed in the main text
  alternatives:
  - A double measure of evil will overtake him in time of need; in every good thing
    it will reach him
  - similar reconstructions from the extant Hebrew
  lexicon: HALOT
  rationale: The extant Hebrew witness in Kahana differs sharply from the Greek and
    from the immediate context of Sirach 12:1-7, which is framed as direct instruction
    about whom to benefit. Because the task directs use of the Hebrew where it survives
    but also requires the Greek parallel as actual translation input, the Greek is
    followed for the main text here as the more coherent reading in context, while
    the Hebrew divergence is preserved in a footnote.
