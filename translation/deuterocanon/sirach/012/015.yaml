translation:
  text: Afterward you will attain my words, and for my sister you will sigh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is difficult here, especially the phrase rendered ''for my sister.''
      The Greek witness reads instead: ''He will remain with you for an hour, and
      if you turn aside, he will not endure,'' reflecting a substantially different
      text or interpretation.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְאָחוֹר
  chosen: Afterward
  alternatives:
  - later
  - in the end
  - afterward
  lexicon: HALOT
  rationale: The phrase marks a later point in time. 'Afterward' is concise and preserves
    the temporal sense without overinterpreting whether it means 'too late' or simply
    'later.'
- source_word: תַּשִּׂיג
  chosen: you will attain
  alternatives:
  - you will reach
  - you will overtake
  - you will grasp
  lexicon: HALOT
  rationale: From נשׂג, the basic sense is to reach or overtake. With 'my words' as
    object, 'attain' best conveys coming to understand or appreciate them, while still
    reflecting the literal idea of reaching them. The Greek parallel supports a sense
    of delayed realization rather than physical pursuit.
- source_word: אֲמָרַי
  chosen: my words
  alternatives:
  - my sayings
  - what I said
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun with first-person suffix.
    'My words' is more direct and less stylized than 'my sayings.'
- source_word: וּלְאַחְוָתִי
  chosen: for my sister
  alternatives:
  - for my kin
  - for my companion
  - for my brotherhood
  lexicon: HALOT
  rationale: The Hebrew form is difficult and may reflect a noun related to 'sister/brotherhood/companionship.'
    The consonantal form most naturally suggests 'my sister,' so the main text preserves
    the Hebrew witness as transmitted. Because the line is textually difficult and
    the Greek parallel differs substantially, the uncertainty is preserved in a footnote.
- source_word: תִּתְאַנָּח
  chosen: you will sigh
  alternatives:
  - you will groan
  - you will lament
  lexicon: HALOT
  rationale: The verb denotes sighing or groaning. 'You will sigh' is the most natural
    modern English equivalent and leaves the emotional force understated rather than
    interpretively heightened.
