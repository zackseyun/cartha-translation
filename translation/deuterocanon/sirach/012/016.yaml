translation:
  text: Who will pity a snake charmer who is bitten, or anyone who goes near a beast
    of prey?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a beast of tooth/teeth,' meaning a dangerous predatory animal.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel in Swete differs substantially at this point, reading
      about an enemy who speaks sweetly with his lips while plotting violence in his
      heart. Because Hebrew survives for this verse and is the primary witness for
      extant Hebrew Sirach, the main text follows the Hebrew here.
    reason: textual_variant
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is there that
  - Who would
  lexicon: HALOT
  rationale: Interrogative opening introducing a rhetorical question; simple 'Who'
    is natural English and preserves the force.
- source_word: יוּחַן
  chosen: will pity
  alternatives:
  - will show favor to
  - will have compassion on
  lexicon: HALOT
  rationale: From חנן in the passive/reflexive sense of receiving favor or pity. In
    this proverb-like context, 'will pity' is the most idiomatic English for the rhetorical
    question about someone suffering the predictable consequence of rash behavior.
- source_word: חוֹבֵר
  chosen: snake charmer
  alternatives:
  - one who charms
  - charmer
  lexicon: HALOT
  rationale: Hebrew חבר here refers to one who practices charming/incantation, especially
    of snakes. The following נָשׁוּךְ ('bitten') makes the object of charming explicit
    in context, so 'snake charmer' brings out the sense without over-paraphrasing.
- source_word: נָשׁוּךְ
  chosen: who is bitten
  alternatives:
  - bitten
  - having been bitten
  lexicon: HALOT
  rationale: Passive participle describing the charmer after the expected injury.
    Relative-clause English reads smoothly while preserving the passive sense.
- source_word: וְכָל הַקָּרֵב
  chosen: or anyone who goes near
  alternatives:
  - and everyone who approaches
  - and anyone drawing near
  lexicon: HALOT
  rationale: The conjunction links a parallel case. 'Or anyone who goes near' fits
    the English rhetorical comparison better than a wooden 'and everyone who approaches'.
- source_word: אֶל חַיַּת שֵׁן
  chosen: a beast of prey
  alternatives:
  - a toothed beast
  - a wild beast with teeth
  - a ravenous animal
  lexicon: HALOT
  rationale: Literally 'a beast of tooth/teeth,' an idiom for a dangerous predatory
    animal. 'Beast of prey' conveys the idiomatic force in clear modern English.
