translation:
  text: Do good to the righteous, and you will find repayment—if not from him, then
    from the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''if not from him, then from the Most High.'' The Hebrew witness
      reads ''from the LORD.'''
    reason: textual_variant
lexical_decisions:
- source_word: הֵיטִב
  chosen: Do good
  alternatives:
  - Be good
  - Act kindly
  - Benefit
  lexicon: HALOT
  rationale: Hiphil imperative of יטב here calls for active beneficence toward another
    person. 'Do good' is idiomatic, direct, and matches the parallel Greek εὖ ποίησον.
- source_word: לַצַּדִּיק
  chosen: to the righteous
  alternatives:
  - to the just
  - to the righteous man
  - to the godly
  lexicon: HALOT
  rationale: The Hebrew points to 'the righteous' as the recipient of beneficence.
    The Greek parallel has εὐσεβεῖ ('the godly/pious'), which supports an ethically/religiously
    upright person. 'The righteous' stays closer to the Hebrew while remaining natural
    English.
- source_word: תִּמְצָא
  chosen: you will find
  alternatives:
  - you will receive
  - you will obtain
  lexicon: HALOT
  rationale: The verb literally means 'find.' In context it introduces the result
    of doing good. Retaining 'find' preserves the Hebrew idiom while still communicating
    expected outcome.
- source_word: תַשְׁלוּמַת
  chosen: repayment
  alternatives:
  - recompense
  - reward
  - return
  lexicon: HALOT
  rationale: The noun denotes repayment or recompense. 'Repayment' is clear modern
    English and fits both the Hebrew and the Greek ἀνταπόδομα. 'Reward' is possible
    but can sound more positive and less reciprocal than the source term.
- source_word: אִם לֹא מִמֶּנוּ
  chosen: if not from him
  alternatives:
  - if not from that person
  - if not from him personally
  lexicon: HALOT
  rationale: The Hebrew explicitly uses a masculine singular pronominal form, matching
    the singular righteous recipient. Per project philosophy, the masculine singular
    is preserved rather than neutralized.
- source_word: מֵיְהֹוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  - from the Lord
  lexicon: HALOT
  rationale: The Hebrew divine name is rendered 'the LORD' per doctrine. The Greek
    parallel reads 'from the Most High' (παρὰ Ὑψίστου), but since the primary witness
    here is Hebrew, the main text follows YHWH while preserving the Greek alternative
    in a footnote.
