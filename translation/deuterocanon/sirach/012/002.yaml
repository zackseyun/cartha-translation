theological_decisions:
- issue: Divine title in the final clause differs between Hebrew and Greek witnesses
  chosen_reading: from the LORD
  alternative_readings:
  - from the Most High
  rationale: Because Hebrew survives for this verse and is the primary witness for
    extant Hebrew Sirach, the main text follows מֵיְהֹוָה. The Greek parallel's 'from
    the Most High' is a meaningful variant and is preserved in a footnote rather than
    silently harmonized.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Contested terms table for יְהוָה YHWH → the LORD'
- issue: Gendered singular pronoun for the righteous recipient
  chosen_reading: him
  alternative_readings:
  - that person
  - them
  rationale: The Hebrew singular masculine suffix and the Greek singular αὐτοῦ both
    point to a singular male grammatical referent. Per gender-accurate policy, the
    translation preserves 'him' rather than flattening to a neutral plural.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
