theological_decisions:
- issue: Sense of the final clause לְטוֹבָתָךְ in light of the Greek parallel καὶ
    ἔσται χάρις τοῖς ἀγαθοῖς σου
  chosen_reading: 'The clause refers to a favorable outcome or response connected
    to one''s act of kindness: ''there will be hope for your kindness.'''
  alternative_readings:
  - there will be hope for your welfare
  - there will be thanks for your good deeds
  rationale: The Hebrew by itself could suggest 'hope for your welfare/benefit,' but
    the Greek parallel points toward recompense or gratitude connected with the beneficent
    acts themselves. To avoid overcommitting either to material self-benefit or explicit
    human gratitude, the main text keeps the broader 'hope for your kindness,' while
    preserving the more explicit Greek-shaped alternative in a footnote.
  doctrine_reference: Preserve theological/interpretive tension rather than resolve
    it; original-language primacy with parallel source kept in view.
