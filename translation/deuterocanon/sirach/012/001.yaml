translation:
  text: If you do good, know to whom you do good, and there will be hope for your
    kindness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following the Greek more explicitly: ''and there will be thanks for
      your good deeds.'' The Hebrew could also be understood as ''there will be hope
      for your welfare.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Standard conditional particle. 'If' preserves the conditional force without
    implying certainty.
- source_word: תֵּטִיב
  chosen: you do good
  alternatives:
  - you act well
  - you benefit
  lexicon: HALOT
  rationale: From היטיב, here in the sense of doing good/benefiting someone. 'Do good'
    matches both the Hebrew idiom and the Greek εὖ ποιῇς/ποιεῖς, while remaining natural
    English.
- source_word: תֵּדַע
  chosen: know
  alternatives:
  - learn
  - discern
  lexicon: HALOT
  rationale: 'Imperatival sense in context: one should know or be aware. ''Know''
    is the most direct rendering and aligns with Greek γνῶθι.'
- source_word: לְמִי
  chosen: to whom
  alternatives:
  - for whom
  lexicon: HALOT
  rationale: The preposition ל marks the recipient. 'To whom' is slightly more formal
    but fits the repeated verbal pattern 'do good to whom' and reflects the Hebrew
    closely.
- source_word: וִיהִי
  chosen: and there will be
  alternatives:
  - and let there be
  - so there will be
  lexicon: HALOT
  rationale: 'The form can be read with jussive coloring, but in this wisdom context
    the resultative sense is best captured as future consequence: ''and there will
    be.'' This also corresponds well to Greek καὶ ἔσται.'
- source_word: תִקְוָה
  chosen: hope
  alternatives:
  - expectation
  - prospect
  lexicon: HALOT
  rationale: The Hebrew noun commonly means hope/expectation. 'Hope' is idiomatic
    and preserves the wisdom motif of anticipated good outcome.
- source_word: לְטוֹבָתָךְ
  chosen: for your kindness
  alternatives:
  - for your good deed
  - for your benefit
  lexicon: HALOT
  rationale: Literally 'for your good/goodness/benefit.' The Greek parallel reads
    χάρις τοῖς ἀγαθοῖς σου ('grace/thanks for your good deeds'), which suggests the
    phrase refers to the beneficent act rather than merely the benefactor's welfare.
    'For your kindness' captures the sense of a good deed done to another while remaining
    readable. 'For your benefit' was possible from the Hebrew alone, but the Greek
    parallel weighs toward the deed-oriented sense.
