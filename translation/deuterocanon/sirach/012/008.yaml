translation:
  text: A friend is not known in prosperity, and an enemy is not hidden in adversity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''A lover/friend is not known in good fortune, and a hater/enemy
      is not hidden in adversity.'' The Greek parallel differs in the first clause,
      reading roughly ''A friend will not be avenged/requited in good things,'' but
      the surviving Hebrew is the primary witness here and yields a balanced proverb
      contrasting prosperity with adversity.'
    reason: textual_variant
lexical_decisions:
- source_word: אוֹהֵב
  chosen: a friend
  alternatives:
  - one who loves
  - a lover
  lexicon: HALOT
  rationale: In this wisdom context, the participle denotes a person characterized
    by friendship/love rather than romantic love. The Greek φίλος supports the relational
    sense 'friend.' Indefinite English fits the gnomic statement.
- source_word: לֹא יִוָּדַע
  chosen: is not recognized
  alternatives:
  - is not known
  - does not become known
  lexicon: HALOT
  rationale: The Niphal of ידע here conveys being known or recognized. 'Recognized'
    best captures the idea that prosperity does not reveal who a true friend is. The
    Greek ἐκδικηθήσεται in Swete appears divergent, but the Hebrew witness is primary
    here and the parallel second colon with 'hidden' favors a recognition/concealment
    contrast.
- source_word: בַּטּוֹבָה
  chosen: in prosperity
  alternatives:
  - in good fortune
  - in good times
  - in benefit
  lexicon: HALOT
  rationale: Though literally 'in good,' the idiomatic sense in this proverb is favorable
    circumstances or prosperity. 'Prosperity' gives clear modern English and matches
    the antithesis with adversity.
- source_word: וְלֹא יְכֻסֶּה
  chosen: is not hidden
  alternatives:
  - is not concealed
  - cannot be covered over
  lexicon: HALOT
  rationale: The Pual/passive sense of כסה is straightforwardly 'be covered/hidden.'
    In context, adversity exposes an enemy rather than concealing him.
- source_word: בְרָעָה
  chosen: in adversity
  alternatives:
  - in trouble
  - in evil
  - in bad times
  lexicon: HALOT
  rationale: Here רעה refers to misfortune or adverse circumstances, not moral evil.
    'Adversity' preserves the wisdom-register contrast with prosperity.
- source_word: שׂוֹנֵא
  chosen: an enemy
  alternatives:
  - one who hates
  - a hater
  lexicon: HALOT
  rationale: The participle denotes a hostile person. 'Enemy' is the natural English
    equivalent in this proverb, and the Greek ἐχθρός confirms this sense.
