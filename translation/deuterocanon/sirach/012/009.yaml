translation:
  text: In a man's prosperity even an enemy is friendly, but in his adversity even
    a friend keeps apart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'even an enemy becomes a friend.' The Hebrew uses רֵעַ in the first
      line, which can denote 'friend/companion'; the main text renders it more cautiously
      as 'is friendly' to preserve the proverb's irony and avoid overstating a genuine
      reconciliation.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטוֹבַת
  chosen: in ... prosperity
  alternatives:
  - in ... good fortune
  - in ... well-being
  - in ... good times
  lexicon: HALOT
  rationale: The noun from טוב here denotes a person's favorable condition or success.
    'Prosperity' fits the contextual contrast with רָעָה/adversity and matches the
    social observation of relationships changing with circumstances.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and proverbial. Per project philosophy,
    gender-accurate rendering is preferred where the source uses masculine representative
    language. The saying is generic, but 'a man' preserves the form of the Hebrew.
- source_word: שׂוֹנֵא
  chosen: an enemy
  alternatives:
  - one who hates
  - a hater
  lexicon: HALOT
  rationale: Although literally 'one who hates,' in context the relational sense 'enemy'
    is the most natural English equivalent and aligns with the Greek ἐχθροί.
- source_word: רֵעַ
  chosen: is friendly
  alternatives:
  - becomes a friend
  - is a companion
  lexicon: HALOT
  rationale: The Hebrew text reads 'even an enemy, reaʿ,' where רֵעַ can denote friend/companion
    or friendly relation. Because the second colon explicitly uses רֵעַ for 'friend,'
    rendering the first as 'is friendly' preserves the wordplay without forcing the
    stronger claim that the enemy truly becomes a friend.
- source_word: וּבְרָעָתוֹ
  chosen: but in his adversity
  alternatives:
  - and in his trouble
  - and in his misfortune
  - and in his evil
  lexicon: HALOT
  rationale: Here רָעָה refers to bad circumstances rather than moral evil. 'Adversity'
    gives a clear English contrast to 'prosperity' and fits both the Hebrew and the
    Greek ἐν τοῖς κακοῖς / ἐν λύπῃ context.
- source_word: בּוֹדֵד
  chosen: keeps apart
  alternatives:
  - is isolated
  - withdraws
  - separates himself
  lexicon: HALOT
  rationale: The participial/adjectival form conveys being separated or standing alone.
    In context of a friend's response to adversity, 'keeps apart' idiomatically expresses
    withdrawal while preserving the relational nuance. The Greek διαχωρισθήσεται supports
    the idea of separation.
