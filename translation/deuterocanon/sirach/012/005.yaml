translation:
  text: Do not give him your bread, lest by it he set himself against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''bread-vessels/items of bread''; the wording is difficult. The
      Greek parallel more clearly supports the sense ''bread'' or ''food.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'lest by them he dominate you.' The Greek parallel reads more strongly
      in the sense of gaining power over you.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּלֵי לָחֶם
  chosen: your bread
  alternatives:
  - food
  - provisions
  - bread
  lexicon: HALOT
  rationale: The Hebrew phrase is textually difficult. Literally it appears to involve
    'vessels/items of bread,' but in context and in light of the Greek parallel ἐμπόδισον
    τοὺς ἄρτους αὐτοῦ ('withhold his breads/food'), the sense is plainly food or bread
    given to the wicked person. 'Your bread' gives clear English while staying close
    to the concrete imagery.
- source_word: אַל תִּתֵּן לוֹ
  chosen: Do not give him
  alternatives:
  - you shall not give to him
  - do not give to him
  lexicon: HALOT
  rationale: Straightforward prohibition. English drops the explicit preposition before
    the pronoun for natural style.
- source_word: לָמָּה
  chosen: lest
  alternatives:
  - why
  - for why
  - otherwise
  lexicon: HALOT
  rationale: Although לָמָּה normally means 'why,' the clause as transmitted is awkward
    in Hebrew. The Greek parallel has ἵνα μὴ ('lest'), which likely reflects the intended
    sense of warning/result. Given the minor mismatch note and the coherence of the
    Greek, 'lest' best represents the verse's force without over-paraphrase.
- source_word: בָם
  chosen: by it
  alternatives:
  - by them
  - through them
  lexicon: HALOT
  rationale: The Hebrew pronoun is plural ('by them'), matching the difficult plural
    expression at the start; English smooths to singular because 'bread' is a mass
    noun in the main rendering. The instrumental sense is retained.
- source_word: יַקְבִּיל אֵלֶיךָ
  chosen: he set himself against you
  alternatives:
  - he oppose you
  - he confront you
  - he prevail over you
  - he dominate you
  lexicon: HALOT
  rationale: The Hebrew verb here likely carries the sense of coming against or opposing.
    The Greek parallel δυναστεύσῃ ('dominate, tyrannize over') suggests hostile advantage
    gained through the gift. 'Set himself against you' preserves the adversarial sense
    without overstating beyond the Hebrew witness.
