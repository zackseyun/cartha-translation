theological_decisions:
- issue: Use of the Hebrew witness with a difficult clause and Greek parallel
  chosen_reading: Translate primarily from the extant Hebrew, but allow the Greek
    parallel to clarify the awkward לָמָּה clause and the hostile-result sense of
    the final verb.
  alternative_readings:
  - 'A more literal but obscure rendering: ''Items of bread do not give him; why,
    by them he will meet you/opposite you.'''
  - 'A Greek-leaning rendering: ''Withhold his bread from him, lest by it he dominate
    you.'''
  rationale: The project philosophy gives primacy to the original-language witness
    available for Sirach, which here is Hebrew, but explicitly instructs that the
    Greek parallel be used as actual translation input. Because the Hebrew is marked
    with minor mismatch and contains a syntactically awkward phrase, the Greek helps
    establish the intended warning without replacing the Hebrew entirely.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    parallel Greek as actual translation input.'
