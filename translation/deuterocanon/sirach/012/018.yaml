- issue: Use of Hebrew primary witness versus Greek parallel where the Hebrew is terse
    and differs substantially from the fuller Greek.
  chosen_reading: Translate the extant Hebrew as the main text, while preserving the
    Greek's fuller hostile-gesture description in a footnote.
  alternative_readings:
