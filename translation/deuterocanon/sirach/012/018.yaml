    much and alter his face.'''
  rationale: Project policy gives primacy to the surviving Hebrew of Sirach where
    extant. Here the Hebrew is brief and somewhat opaque, while the Greek appears
    to reflect either an expanded Vorlage or interpretive development. The main translation
    therefore follows the Hebrew, but the Greek is significant enough to preserve
    for auditability and interpretation.
