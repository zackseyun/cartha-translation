translation:
  text: He will not pass by until he has kindled a fire in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''He will shake his head and clap his hands, and he will
      whisper much and alter his face.'' This fuller wording likely interprets the
      hostile behavior described tersely in the Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יַעֲבֹר
  chosen: he will not pass by
  alternatives:
  - he will not go away
  - he will not move on
  lexicon: HALOT
  rationale: The Hebrew verb עבר commonly means 'pass by' or 'pass on.' In context
    it conveys persistence rather than literal travel only. 'Pass by' preserves the
    idiom and fits the warning tone.
- source_word: עַד
  chosen: until
  alternatives:
  - before
  lexicon: HALOT
  rationale: The preposition marks the endpoint of the hostile action. 'Until' is
    the natural temporal rendering.
- source_word: תִּבְעַר
  chosen: he has kindled
  alternatives:
  - it burns
  - he burns up
  - he sets ablaze
  lexicon: HALOT
  rationale: 'בער in the piel/qal semantic field can denote burning or kindling. Given
    the following object ''fire'' and the hostile-person context, an active causative
    sense is most likely: he kindles or stirs up a fire.'
- source_word: בּוֹ
  chosen: in him
  alternatives:
  - against him
  - within him
  lexicon: HALOT
  rationale: The pronominal suffix most straightforwardly means 'in him.' Because
    the verse likely describes an enemy's harmful intent toward another person, 'in
    him' is retained in the main text, while the broader hostile sense is noted by
    the Greek parallel in a footnote.
- source_word: אֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: The noun is indefinite in Hebrew. 'A fire' sounds natural in English
    and preserves the metaphor of inflamed harm or strife.
