translation:
  text: So is one who associates with a man of insolence and wallows in his sins.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[a]'
    text: 'The Greek witness differs substantially here: ''If evil should meet you,
      you will find him there before you, and as one helping he will trip up your
      heel.'' The Hebrew surviving in the Cairo Geniza instead reads about associating
      with an insolent man and rolling about in his sins.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֵּן
  chosen: So is
  alternatives:
  - Thus
  - Likewise
  lexicon: HALOT
  rationale: Introduces a comparison or application from the preceding verse. 'So
    is' keeps the proverbial force in natural English.
- source_word: חוֹבֵר
  chosen: one who associates with
  alternatives:
  - a companion of
  - one who joins himself to
  - one who befriends
  lexicon: HALOT
  rationale: From חבר in the sense of joining/associating. 'Associates with' is broad
    enough to cover social attachment without overstating intimacy. The participial
    force is preserved by 'one who associates with.'
- source_word: אֶל
  chosen: with
  alternatives:
  - to
  lexicon: HALOT
  rationale: 'Though literally ''to,'' English idiom with חבר requires ''with'': ''associates
    with a man...''.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular. Per project philosophy,
    the gendered form is retained unless context clearly demands a generic neutral
    rendering.
- source_word: זָדוֹן
  chosen: insolence
  alternatives:
  - arrogance
  - presumption
  - wickedness
  lexicon: HALOT
  rationale: זדון often denotes proud, presumptuous wrongdoing. 'Insolence' captures
    the arrogant moral posture of the person better than the broader 'wickedness.'
- source_word: וּמִתְגֹלֵל
  chosen: and rolls about
  alternatives:
  - and wallows
  - and entangles himself
  - and is involved
  lexicon: HALOT
  rationale: The hitpael of גלל suggests rolling oneself about. 'Rolls about' stays
    close to the Hebrew image; 'wallows' is possible but slightly more interpretive.
    The Greek parallel points toward involvement in the evildoer's harm, but the Hebrew
    image should govern where extant.
- source_word: בַּעֲוֹנֹתָיו
  chosen: in his sins
  alternatives:
  - in his guilt
  - in his iniquities
  lexicon: HALOT
  rationale: 'עון can denote guilt/iniquity/sin. In this context, ''sins'' is the
    clearest modern English rendering and fits the image of sharing in or becoming
    enmeshed in the evildoer''s wrongdoing. The suffix is best taken as referring
    to the insolent man: ''his sins.'''
