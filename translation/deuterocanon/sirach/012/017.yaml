  chosen_reading: Translate the extant Hebrew as primary, while acknowledging the
    Greek preserves a substantially different line.
  alternative_readings:
  - 'Greek: ''If evil should meet you, you will find him there before you, and as
    one helping he will trip up your heel.'''
  rationale: Project policy gives primacy to the Hebrew witness for Sirach where it
    survives. Here the Greek parallel is not merely a stylistic variant but a different
    formulation. The main text therefore follows the Hebrew, while the Greek alternative
    is preserved in a footnote because it materially affects interpretation of the
    warning.
