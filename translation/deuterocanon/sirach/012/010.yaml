translation:
  text: Do not trust an enemy forever, for as bronze rusts, so does his evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is somewhat difficult in the final clause; the Greek parallel supports
      the sense 'for as bronze rusts, so does his wickedness.'
    reason: textual_variant
  - marker: b
    text: Or 'his wickedness' for 'his evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תַּאֲמִין
  chosen: Do not trust
  alternatives:
  - Do not believe
  - Never put faith in
  lexicon: HALOT
  rationale: The Hebrew אמן in the Hifil commonly means to trust or place confidence
    in. In context with a hostile person, 'trust' is the most natural English equivalent.
    The Greek πιστεύσῃς supports this sense.
- source_word: בְּשׂוֹנֵא
  chosen: an enemy
  alternatives:
  - one who hates
  - the one who hates
  lexicon: HALOT
  rationale: The participial form literally means 'one who hates,' but in idiomatic
    English and in light of the Greek ἐχθρός, 'enemy' best captures the relational
    force.
- source_word: לָעַד
  chosen: forever
  alternatives:
  - ever
  - for all time
  lexicon: HALOT
  rationale: The phrase warns against enduring confidence in an enemy. 'Forever' is
    idiomatic and preserves the temporal absolute force.
- source_word: כנחשת
  chosen: as bronze
  alternatives:
  - like copper
  - like brass
  lexicon: HALOT
  rationale: The Hebrew points to a copper/bronze metal term; English 'bronze' is
    a standard rendering and aligns well with the Greek χαλκός. 'Brass' is traditional
    but less precise.
- source_word: רועו
  chosen: his evil
  alternatives:
  - his wickedness
  - his malice
  lexicon: HALOT
  rationale: The noun denotes evil or wickedness. 'His evil' is slightly more literal,
    while still intelligible; the Greek πονηρία confirms the moral sense.
- source_word: יחליא
  chosen: rusts
  alternatives:
  - corrodes
  - becomes tarnished
  lexicon: HALOT
  rationale: The Hebrew form is difficult, but the Greek parallel ἰοῦται clearly points
    to oxidation/corrosion of metal. 'Rusts' is concise and vivid in English, though
    technically bronze corrodes rather than rusts; the image is preserved naturally.
