theological_decisions:
- issue: Use of the Greek parallel to clarify a difficult Hebrew verb/image
  chosen_reading: 'Render the metal image as corrosion/rusting: ''as bronze rusts,
    so does his evil.'''
  alternative_readings:
  - for like bronze, his evil sickens
  - for his evil is diseased like bronze
  rationale: The Hebrew clause כי כנחשת רועו יחליא is awkward in isolation, especially
    the verb יחליא. The Greek parallel 'for as bronze rusts, so his wickedness' provides
    a strong control on the sense and yields a coherent proverb. This is a lexical/text-critical
    clarification rather than a doctrinal issue, but it materially affects translation.
  doctrine_reference: 'PHILOSOPHY.md: for Sirach, translate from Hebrew where it survives,
    using the Greek parallel as actual translation input.'
