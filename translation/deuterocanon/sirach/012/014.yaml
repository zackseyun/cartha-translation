translation:
  text: Do not seat him at your right hand, lest he seek your seat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not seat him on your right, or he will seek your place.' The Hebrew
      'your seat' can also imply your position or status, not only a literal chair.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - You must not
  lexicon: HALOT
  rationale: Standard negative prohibition introducing the warning.
- source_word: תּוֹשִׁיבֵהוּ
  chosen: seat him
  alternatives:
  - cause him to sit
  - let him sit
  lexicon: HALOT
  rationale: Hiphil of ישב with object suffix naturally means 'cause him to sit' or
    'seat him.' 'Seat him' is concise modern English and preserves the causative sense
    better than simply 'let him sit.'
- source_word: לִימִינֶךָ
  chosen: at your right hand
  alternatives:
  - on your right
  - to your right
  lexicon: HALOT
  rationale: Literally 'to/at your right hand.' In context this implies a place of
    honor or privileged proximity. 'At your right hand' preserves the idiomatic force
    and social nuance.
- source_word: לָמָּה
  chosen: lest
  alternatives:
  - otherwise
  - for why
  - so that not
  lexicon: HALOT
  rationale: Although literally 'why?,' in this wisdom context it introduces the undesirable
    consequence to be avoided. The Greek parallel also supports a consequential warning
    rather than a direct interrogative. 'Lest' best captures the sense in idiomatic
    English without over-paraphrase.
- source_word: יְבַקֵּשׁ
  chosen: he seek
  alternatives:
  - he try to obtain
  - he desire
  - he look for
  lexicon: HALOT
  rationale: בקש commonly means 'seek' or 'try to obtain.' 'Seek' is broad enough
    to include ambition for status and fits the warning context.
- source_word: מוֹשָׁבֶךָ
  chosen: your seat
  alternatives:
  - your place
  - your position
  lexicon: HALOT
  rationale: מושב denotes a seat, dwelling place, or position. Here, with the immediate
    seating imagery, 'your seat' preserves the concrete metaphor while also implying
    one's place or status.
