- issue: Use of Hebrew Cairo Geniza text with Greek parallel in a wisdom warning about
    association with a sinner
  chosen_reading: Translate the extant Hebrew directly, while allowing the Greek parallel
    to confirm that the warning concerns granting honor/proximity to a morally dangerous
    person.
  alternative_readings:
