translation:
  text: For God also hates evildoers, and will repay the wicked with vengeance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''God also hates evildoers''; Greek: ''the Most High hated sinners.''
      The main text follows the Greek divine title while keeping the Hebrew sense
      in view.'
    reason: textual_variant
  - marker: b
    text: Greek has 'the ungodly' where the Hebrew has 'the wicked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל / ὁ ὕψιστος
  chosen: the Most High
  alternatives:
  - God
  - the high God
  lexicon: HALOT / BDAG
  rationale: The Hebrew reads אֵל ('God'), while the Greek parallel has ὁ ὕψιστος
    ('the Most High'). Given the major mismatch flag and the instruction to use the
    Greek parallel as actual translation input, 'the Most High' best reflects the
    likely sense behind the tradition while remaining a natural divine title in English.
- source_word: שֹׂנֵא
  chosen: hates
  alternatives:
  - is hostile to
  - rejects
  lexicon: HALOT
  rationale: The verb straightforwardly denotes hatred. Softer renderings weaken the
    force of the Hebrew and Greek (ἐμίσησεν). Present tense is used in English as
    a general truth, despite the Greek aorist, because the Hebrew participle naturally
    expresses an ongoing characterization.
- source_word: רָעִים
  chosen: evildoers
  alternatives:
  - the wicked
  - evil people
  lexicon: HALOT
  rationale: The Hebrew literally means 'evil ones/evildoers.' 'Evildoers' preserves
    the active moral sense. 'The wicked' is possible, but that term is already used
    in the second colon for לָרְשָׁעִים, so varying the English helps reflect the
    Hebrew distinction.
- source_word: לָרְשָׁעִים / τοῖς ἀσεβέσιν
  chosen: the wicked
  alternatives:
  - the ungodly
  - the impious
  lexicon: HALOT / BDAG
  rationale: Hebrew רְשָׁעִים commonly means 'the wicked.' The Greek ἀσεβέσιν leans
    toward 'ungodly/impious,' but 'the wicked' is the more natural rendering from
    the Hebrew witness and fits the moral contrast of the verse. The Greek nuance
    is worth preserving in a footnote.
- source_word: יָשִׁיב / ἀποδώσει
  chosen: will repay
  alternatives:
  - will return
  - will render
  - will pay back
  lexicon: HALOT / BDAG
  rationale: Both Hebrew and Greek support the sense of requital. 'Will repay' is
    idiomatic and preserves the judicial sense without sounding colloquial.
- source_word: נָקָם / ἐκδίκησιν
  chosen: vengeance
  alternatives:
  - vengeful punishment
  - retribution
  lexicon: HALOT / BDAG
  rationale: The noun denotes vengeance or avenging justice. 'Vengeance' is the most
    direct equivalent; 'retribution' is possible but less vivid. The phrase 'repay
    ... with vengeance' preserves the source's strong warning tone.
