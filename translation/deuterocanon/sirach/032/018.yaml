translation:
  text: A wise man will not take a bribe, but a proud scoffer will not keep the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew זד ולץ may also be read as two character labels, 'the insolent and
      the scoffer,' rather than the combined expression 'an insolent scoffer.'
    reason: alternative_reading
  - marker: b
    text: Or 'instruction' for 'the law'; Hebrew תורה can denote authoritative teaching
      more broadly, not only legal statute.
    reason: lexical_alternative
  - marker: c
    text: The Greek parallel supplied here does not align with this Hebrew line, so
      the translation follows the extant Hebrew witness primarily.
    reason: textual_variant
lexical_decisions:
- source_word: איש חכם
  chosen: a wise man
  alternatives:
  - a wise person
  - a wise one
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular ('man'). Per the project's
    gender-accurate policy, 'man' is retained rather than neutralizing to 'person,'
    while still functioning proverbially.
- source_word: לא יקח
  chosen: will not take
  alternatives:
  - does not take
  - will not accept
  lexicon: HALOT
  rationale: The yiqtol here expresses characteristic conduct in a wisdom saying.
    'Will not take' preserves the Hebrew verbal sense and reads naturally in English.
- source_word: שחד
  chosen: a bribe
  alternatives:
  - bribery
  - a payoff
  lexicon: HALOT
  rationale: Standard Hebrew term for a bribe. 'A bribe' is the clearest and most
    direct rendering in modern English.
- source_word: זד
  chosen: an insolent one
  alternatives:
  - a presumptuous man
  - the arrogant
  lexicon: HALOT
  rationale: The noun/adjectival form denotes a proud, presumptuous, or insolent person.
    Because it is paired with 'לץ' as a character type, an individualized rendering
    is appropriate. In the final English, it is combined with the following term for
    smoother idiomatic sense.
- source_word: לץ
  chosen: scoffer
  alternatives:
  - mocker
  - scorner
  lexicon: HALOT
  rationale: In wisdom literature this term regularly denotes a contemptuous mocker.
    'Scoffer' preserves the moral-wisdom nuance better than the more casual 'mocker.'
- source_word: זד ולץ
  chosen: an insolent scoffer
  alternatives:
  - a presumptuous mocker
  - the arrogant and the scoffer
  lexicon: HALOT
  rationale: The Hebrew lacks a conjunction and may function as a hendiadys-like pairing
    of near-synonymous character labels. Rendering the pair as a single composite
    expression gives coherent English while preserving both descriptors. Because the
    text is marked with minor mismatch and the Greek parallel is from a different
    line, this remains somewhat uncertain; the alternative of two separate subjects
    is preserved in a footnote.
- source_word: לא ישמור
  chosen: will not keep
  alternatives:
  - does not observe
  - will not guard
  lexicon: HALOT
  rationale: שמר with תורה commonly means to keep/observe. 'Keep' is concise and idiomatic.
- source_word: תורה
  chosen: the law
  alternatives:
  - instruction
  - teaching
  lexicon: HALOT
  rationale: While תורה can mean 'instruction,' in this ethical context 'the law'
    best conveys a recognized body of moral teaching. 'Instruction' is a viable alternative
    and is preserved in a footnote because the term can be broader than legal code.
