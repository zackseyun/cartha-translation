theological_decisions:
- issue: Compressed phrase שיר אל
  chosen_reading: a song of God
  alternative_readings:
  - a song to God
  - a godly song
  rationale: The Hebrew permits more than one relation between 'song' and 'God.' The
    main text keeps the ambiguity relatively open with 'song of God,' while a footnote
    preserves the more directional reading 'song to God.' This avoids importing a
    narrower liturgical claim than the wording itself demands.
