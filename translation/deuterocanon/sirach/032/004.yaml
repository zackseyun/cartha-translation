translation:
  text: Like a seal on a pouch of gold is a song of God at a banquet of wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a song to God.' The Hebrew phrase is compressed and may denote a song
      directed to God rather than simply a God-related song.
    reason: lexical_alternative
  - marker: b
    text: The preceding Hebrew lines in this verse unit are textually difficult in
      transmission; this closing comparison is the clearest portion and is translated
      directly from the surviving Hebrew, with the Greek kept in view as a consistency
      check.
    reason: textual_variant
lexical_decisions:
- source_word: כחותם
  chosen: Like a seal
  alternatives:
  - As a seal
  - Like a signet
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Seal' is the most straightforward rendering
    of חותם here; 'signet' is possible but more specific than the Hebrew requires.
- source_word: על כיס זהב
  chosen: on a pouch of gold
  alternatives:
  - on a bag of gold
  - upon a purse of gold
  lexicon: HALOT
  rationale: כיס denotes a pouch, purse, or bag, especially for valuables or money.
    'Pouch of gold' preserves the concrete image and fits the comparison naturally
    in English.
- source_word: שיר
  chosen: a song
  alternatives:
  - song
  - singing
  lexicon: HALOT
  rationale: The singular noun is best rendered concretely as 'a song' in this proverb-like
    comparison.
- source_word: אל
  chosen: of God
  alternatives:
  - to God
  - godly
  - divine
  lexicon: HALOT
  rationale: The phrase שיר אל is somewhat compressed. 'Of God' best preserves the
    genitival force and allows the line to mean a God-directed or God-related song
    without over-specifying. 'To God' is plausible but more interpretive.
- source_word: על משתה היין
  chosen: at a banquet of wine
  alternatives:
  - over a wine banquet
  - at a drinking feast
  - at a wine feast
  lexicon: HALOT
  rationale: משתה is a feast or banquet, often involving drinking; היין specifies
    wine. 'At a banquet of wine' keeps the Hebrew imagery while remaining readable.
    The preposition על here is rendered idiomatically as 'at' in context.
