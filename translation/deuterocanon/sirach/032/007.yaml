translation:
  text: Speak, young man, if there is need for you to do so, with restraint, two or
    three times if you are asked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew בחזק is uncertain in this line. The rendering 'with restraint' follows
      the verse's context of measured speech and is checked against the Greek parallel,
      which differs substantially in transmitted form.
    reason: textual_variant
  - marker: b
    text: Or possibly 'briefly' or 'carefully'; the Hebrew witness for this verse
      is textually difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: דבר
  chosen: Speak
  alternatives:
  - Say
  - Speak up
  lexicon: HALOT
  rationale: Imperative of דבר, straightforwardly an exhortation to speak. 'Speak'
    is natural English and preserves the direct command.
- source_word: נער
  chosen: young man
  alternatives:
  - youth
  - young person
  lexicon: HALOT
  rationale: The Hebrew noun is masculine singular and ordinarily denotes a young
    male. Per gender-accurate policy, 'young man' best matches the source rather than
    neutralizing it.
- source_word: אם צריך אתה
  chosen: if there is need for you to do so
  alternatives:
  - if necessary
  - if you are needed
  lexicon: HALOT
  rationale: The phrase indicates necessity or appropriateness of speaking. The fuller
    English wording preserves the explicit second-person element ('you') while reading
    naturally.
- source_word: בחזק
  chosen: with restraint
  alternatives:
  - briefly
  - firmly
  - carefully
  lexicon: HALOT
  rationale: The Hebrew here is difficult, and the source validation flags a mismatch.
    In context—advice about a young man speaking sparingly in an assembly—and with
    the Greek parallel in view, the sense is controlled, measured speech rather than
    forcefulness. 'With restraint' captures that likely intent without overcommitting
    to a more specific reconstruction.
- source_word: פעמים ושלש
  chosen: two or three times
  alternatives:
  - once or twice
  - repeatedly
  lexicon: HALOT
  rationale: Literally 'twice and thrice / times and three.' The idiom points to limited
    repetition. 'Two or three times' is the closest natural rendering.
- source_word: אם ישאלך
  chosen: if you are asked
  alternatives:
  - if someone asks you
  - when you are questioned
  lexicon: HALOT
  rationale: Passive-style English best conveys the Hebrew condition without adding
    an explicit subject not present in the text.
