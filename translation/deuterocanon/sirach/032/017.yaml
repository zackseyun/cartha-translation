translation:
  text: A wise man will incline himself to reproof, but one who is deceived will follow
    his own desire. A wise man will not conceal anger, but a scoffer will not guard
    his tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek witness: ''He will not disregard the plea of an orphan, nor a widow
      when she pours out her complaint.'' The Hebrew witness preserved here differs
      substantially from the Greek at this verse.'
    reason: alternative_reading
lexical_decisions:
- source_word: איש חכם
  chosen: a wise man
  alternatives:
  - a wise person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and proverbial. Per project
    philosophy, a gender-accurate rendering is preferred over flattening to gender-neutral
    language.
- source_word: יטה
  chosen: will incline himself
  alternatives:
  - will turn
  - will pay heed
  lexicon: HALOT
  rationale: The verb literally conveys bending/turning. 'Incline himself' preserves
    the metaphor of a wise person leaning toward correction rather than merely receiving
    it abstractly.
- source_word: תוכחות
  chosen: reproof
  alternatives:
  - rebuke
  - correction
  lexicon: HALOT
  rationale: The plural noun denotes admonitions/rebukes. 'Reproof' fits proverbial
    wisdom style and keeps the corrective force without over-paraphrase.
- source_word: ואחר צרכו ימשך
  chosen: will follow his own desire
  alternatives:
  - will be drawn after his need
  - will go after what he wants
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic. צרכו can mean need/desire/what suits
    him, and ימשך suggests being drawn after. In context contrasting wisdom with gullibility,
    'follow his own desire' gives the likely sense in natural English while staying
    close to the Hebrew.
- source_word: נפתה
  chosen: one who is deceived
  alternatives:
  - the gullible man
  - the simpleton
  lexicon: HALOT
  rationale: The passive/reflexive sense of the root points to one who is easily led
    astray or naive. 'One who is deceived' preserves that vulnerability without importing
    a more technical wisdom-term not present in the Hebrew.
- source_word: לא יכסה כחמה
  chosen: will not conceal anger
  alternatives:
  - will not cover over wrath
  - will not hide indignation
  lexicon: HALOT
  rationale: The Hebrew as transmitted reads 'will not conceal anger/wrath.' Though
    the exact nuance is somewhat difficult, this is the most direct rendering of the
    extant Hebrew. It may imply that wise anger is not hypocritically masked, or that
    a wise man does not suppress justified reaction inappropriately.
- source_word: לץ
  chosen: a scoffer
  alternatives:
  - a mocker
  lexicon: HALOT
  rationale: לץ is the standard wisdom term for the insolent mocker. 'Scoffer' is
    concise and preserves the moral-psychological category familiar in wisdom literature.
- source_word: לא ישמר לשונו
  chosen: will not guard his tongue
  alternatives:
  - will not watch his tongue
  - will not keep his tongue in check
  lexicon: HALOT
  rationale: '''Guard his tongue'' is a transparent idiom in English and closely reflects
    the Hebrew imagery of restraint in speech.'
