lexical_decisions:
- source_word: כרביד
  chosen: Like a gold ornament
  alternatives:
  - Like a necklace of gold
  - Like a chain of gold
  lexicon: HALOT
  rationale: רביד denotes an ornament or necklace worn on the neck. 'Ornament' preserves
    the image without over-specifying the exact form, while the prefixed כ marks the
    simile.
- source_word: נפך
  chosen: onyx
  alternatives:
  - carbuncle
  - garnet
  - turquoise
  lexicon: HALOT
  rationale: The gemstone term is uncertain in precise modern identification. 'Onyx'
    fits a common traditional identification and works well in parallel with sapphire,
    while the uncertainty is preserved in a footnote.
- source_word: ספיר
  chosen: sapphire
  alternatives:
  - lapis lazuli
  lexicon: HALOT
  rationale: ספיר is conventionally rendered 'sapphire,' though the ancient stone
    may have referred to lapis lazuli. The standard English term is retained, with
    the ancient-modern identification issue noted in a footnote.
- source_word: כך נאים
  chosen: so are
  alternatives:
  - so fitting are
  - so lovely are
  lexicon: HALOT
  rationale: The phrase draws a comparison of attractiveness or suitability. 'So are'
    keeps the simile concise and natural in English while allowing 'beautiful words'
    to carry the evaluative force.
- source_word: דברים יפים
  chosen: beautiful words
  alternatives:
  - pleasant words
  - fine words
  - gracious words
  lexicon: HALOT
  rationale: The Hebrew emphasizes the attractiveness or excellence of the speech.
    'Beautiful words' preserves the aesthetic comparison to jewelry more directly
    than the flatter 'pleasant words.'
- source_word: על משתה היין
  chosen: at a banquet of wine
  alternatives:
  - over a wine feast
  - during a drinking banquet
  - at a wine banquet
  lexicon: HALOT
  rationale: משתה היין refers to a feast characterized by wine. 'At a banquet of wine'
    is slightly formal but preserves the concrete social setting and echoes the Hebrew
    construct closely.
