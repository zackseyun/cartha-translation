translation:
  text: In all your deeds guard yourself, for the one who does this keeps the commandment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guard your soul' or 'guard your life'; Hebrew nephesh can mean 'self,'
      'soul,' or 'life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whoever does this keeps a commandment.' The singular 'commandment' may
      be understood generically.
    reason: lexical_alternative
lexical_decisions:
- source_word: בכל
  chosen: In all
  alternatives:
  - With all
  - In every
  lexicon: HALOT
  rationale: Preposition ב with כל naturally gives a comprehensive sense, introducing
    the sphere in which the exhortation applies.
- source_word: מעשיך
  chosen: your deeds
  alternatives:
  - your actions
  - your works
  lexicon: HALOT
  rationale: מעשים refers to concrete acts or conduct. 'Deeds' preserves moral weight
    better than the more neutral 'actions,' while remaining natural English.
- source_word: שמור
  chosen: guard
  alternatives:
  - keep watch over
  - protect
  - be careful about
  lexicon: HALOT
  rationale: The imperative of שמר commonly means 'keep/guard/watch.' Here 'guard'
    fits the reflexive object and conveys vigilant moral self-watch rather than mere
    preservation.
- source_word: נפשך
  chosen: yourself
  alternatives:
  - your soul
  - your life
  lexicon: HALOT
  rationale: נפש can mean soul, life, or self/person. In this wisdom context, with
    the idiom 'guard your נפש,' the sense is practical self-watch over one's whole
    person and conduct. 'Yourself' communicates that idiomatic force in clear English
    without importing later dualistic connotations of 'soul.'
- source_word: כי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the rationale for the imperative. 'For' is concise and natural
    in English wisdom style.
- source_word: עושה זה
  chosen: the one who does this
  alternatives:
  - whoever does this
  - he who does this
  lexicon: HALOT
  rationale: A participial construction with demonstrative. 'The one who does this'
    is gender-accurate and readable modern English, preserving the generic force.
- source_word: שומר מצוה
  chosen: keeps the commandment
  alternatives:
  - keeps a commandment
  - keeps the command
  - obeys the commandment
  lexicon: HALOT
  rationale: The Hebrew is singular and anarthrous/collective in form. 'Keeps the
    commandment' best reflects wisdom-style moral instruction, likely referring generically
    to God's commandment as a whole rather than one isolated precept. 'Obeys' is interpretive;
    'keeps' stays closer to שמר and echoes the verbal linkage with the first clause.
