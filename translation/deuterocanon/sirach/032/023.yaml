theological_decisions:
- issue: Rendering of נפש in a wisdom exhortation
  chosen_reading: yourself
  alternative_readings:
  - your soul
  - your life
  rationale: The Hebrew נפש often denotes the whole self or life, not only an immaterial
    soul. Given the ethical context ('in all your deeds'), the verse urges comprehensive
    self-guarding in conduct. Rendering it as 'yourself' preserves the practical force
    and avoids overstating a later theological anthropology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Generic human reference in עושה זה
  chosen_reading: the one who does this
  alternative_readings:
  - he who does this
  - whoever does this
  rationale: The Hebrew masculine singular has representative force. Following the
    project's gender-accurate policy, the English should preserve generic reference
    without unnecessarily masculinizing the statement.
  doctrine_reference: Translation philosophy §4
