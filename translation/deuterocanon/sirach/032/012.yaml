- issue: Relationship between Hebrew and Greek witnesses in a divergent wisdom exhortation
  chosen_reading: Follow the extant Hebrew as the main text while noting the Greek's
    substantially different wording in a footnote.
  alternative_readings:
  - Give to the Most High according to his gift, and with a good eye according to
    what your hand finds.
  rationale: For Sirach, where Hebrew survives, the project translates from the Hebrew
    witness while using the Greek as a real input and consistency check. Here the
    Greek parallel differs markedly from the Hebrew, so the main text follows the
    Hebrew without harmonizing away the divergence.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
