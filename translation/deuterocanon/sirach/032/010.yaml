  - charm
  rationale: This is not a doctrinally loaded salvation-context use; 'favor' preserves
    the social/ethical sense of winning approval before the onset of shame. 'Grace'
    is preserved as an alternative but not preferred in the main text to avoid over-theologizing
    a wisdom saying.
