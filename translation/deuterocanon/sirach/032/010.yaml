translation:
  text: Before hail, lightning flashes forth; and before shame, favor goes forth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grace' for 'favor' (Hebrew חֵן).
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel for this verse differs substantially: ''With a good
      eye glorify the Lord, and do not diminish the firstfruits of your hands.'' The
      main text follows the extant Hebrew witness here.'
    reason: alternative_reading
lexical_decisions:
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - ahead of
  - in advance of
  lexicon: HALOT
  rationale: 'Temporal/sequential sense fits both cola: one thing precedes another.'
- source_word: בָרָד
  chosen: hail
  lexicon: HALOT
  rationale: Standard Hebrew noun for hail; the weather-image is straightforward.
- source_word: יִנְצַח
  chosen: flashes forth / goes forth
  alternatives:
  - appears first
  - prevails
  - shines out
  lexicon: HALOT
  rationale: 'In this Hebrew Ben Sira context, the verb is best taken in a sense of
    coming forth or appearing beforehand, not ''conquers/prevails.'' The parallelism
    with lightning before hail and favor before shame points to antecedent manifestation.
    English varies by colon to reflect the natural collocate: lightning ''flashes
    forth,'' favor ''goes forth.'' This is a documented contextual variation of one
    Hebrew form.'
- source_word: בָּרָק
  chosen: lightning
  lexicon: HALOT
  rationale: Standard rendering for the meteorological term; it pairs naturally with
    hail.
- source_word: בוֹשׁ
  chosen: shame
  alternatives:
  - disgrace
  lexicon: HALOT
  rationale: The noun denotes shame/disgrace. 'Shame' is the more direct and idiomatic
    English equivalent here.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - charm
  lexicon: HALOT
  rationale: The Hebrew can mean favor, grace, or charm. 'Favor' best suits the proverb-like
    sequence and avoids importing stronger theological freight than the context requires.
    'Grace' remains a viable lexical alternative.
