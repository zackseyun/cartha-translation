translation:
  text: If they have made you the leader, do not exalt yourself; be among them like
    one of them. Care for them, and then recline; prepare what is needed, and then
    take your place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The opening clause in the Hebrew witness is bracketed in Kahana''s edition:
      ''If they have made you the leader, do not exalt yourself.'' The surrounding
      lines strongly support this banquet-host setting, and the Greek parallel also
      reflects meal-related instruction in this section, though it differs substantially
      in wording.'
    reason: textual_variant
  - marker: b
    text: Or 'look after them' for 'Care for them.' The Hebrew verb can emphasize
      practical concern as well as inward solicitude.
    reason: lexical_alternative
  - marker: c
    text: '''Recline'' reflects the posture customary at formal ancient meals.'
    reason: cultural_note
lexical_decisions:
- source_word: ראש נבחרת
  chosen: the leader
  alternatives:
  - head of the company
  - chief of the gathering
  - leader of the banquet
  lexicon: HALOT
  rationale: The Hebrew phrase literally denotes the head/chief of a selected group
    or company. In context, with the following instructions about caring for others
    and then reclining, it refers to the person presiding over a meal or gathering.
    'Leader' is natural English and preserves the role without over-specifying beyond
    the Hebrew.
- source_word: אל תתרומם
  chosen: do not exalt yourself
  alternatives:
  - do not lift yourself up
  - do not become proud
  lexicon: HALOT
  rationale: The reflexive sense conveys self-elevation or self-exaltation. 'Do not
    exalt yourself' keeps the moral force and the humility theme more directly than
    the interpretive 'do not become proud.'
- source_word: היה להם כאחד מהם
  chosen: be among them like one of them
  alternatives:
  - be to them as one of them
  - be like one of their number
  lexicon: HALOT
  rationale: This clause urges the presiding person not to separate himself socially
    from the others. 'Be among them like one of them' expresses both solidarity and
    humility in idiomatic English.
- source_word: דאג להם
  chosen: Care for them
  alternatives:
  - be concerned for them
  - look after them
  lexicon: HALOT
  rationale: The verb carries the sense of attending to or being concerned for others.
    In banquet context it likely includes practical hosting care. 'Care for them'
    is broad enough to include both concern and service.
- source_word: תסב
  chosen: recline
  alternatives:
  - sit down
  - take your seat at table
  lexicon: HALOT
  rationale: At ancient meals, reclining was the normal posture at table. Rendering
    it as 'recline' preserves the cultural setting more accurately than simply 'sit
    down.'
- source_word: הכן מרכם
  chosen: prepare what is needed
  alternatives:
  - set their place in order
  - prepare their provisions
  - arrange their service
  lexicon: HALOT
  rationale: The transmitted Hebrew here is somewhat difficult, but in context it
    refers to making the necessary arrangements for the guests/meal before taking
    one's own place. 'Prepare what is needed' reflects the likely sense while honestly
    avoiding false precision.
- source_word: תרבץ
  chosen: take your place
  alternatives:
  - lie down
  - recline
  - settle down
  lexicon: HALOT
  rationale: The verb can denote lying down or taking a settled position. Since 'recline'
    already renders the earlier table verb, 'take your place' gives smooth English
    while fitting the meal setting and sequence of actions.
