translation:
  text: Do not trust in a treacherous way, and in the end be on guard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew מחתף is difficult; it likely refers to something that causes stumbling
      or falling. Possible renderings include 'a slippery way' or 'a treacherous path.'
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel supplied with the source appears to reflect a different
      verse and was not followed where it conflicts with the extant Hebrew witness.
    reason: textual_variant
lexical_decisions:
- source_word: אל תבטח
  chosen: Do not trust
  alternatives:
  - Do not rely on
  - Do not be confident in
  lexicon: HALOT
  rationale: בטח commonly denotes trusting or relying on something. 'Do not trust'
    is direct and idiomatic, preserving the warning tone without overinterpreting
    the object of trust.
- source_word: בדרך
  chosen: in a way
  alternatives:
  - on a path
  - in a course
  lexicon: HALOT
  rationale: דרך can mean literal road or figurative course of conduct. Here the admonitory
    context favors a figurative sense, but 'way' preserves the Hebrew metaphor and
    can still suggest conduct.
- source_word: מחתף
  chosen: of stumbling
  alternatives:
  - that causes a fall
  - slippery
  - treacherous
  lexicon: HALOT
  rationale: The form is difficult, but in context it points to something causing
    a slip, snare, or fall. 'Of stumbling' keeps the warning concise and close to
    the likely Hebrew sense without forcing a more specific reconstruction. The Greek
    parallel in the prompt is clearly unrelated to this Hebrew verse, so it cannot
    control the rendering here.
- source_word: ובאחריתך
  chosen: and in your end
  alternatives:
  - and as for your future
  - and at the end
  - and in your latter days
  lexicon: HALOT
  rationale: אחרית can mean end, outcome, or future. 'In your end' is somewhat formal
    but preserves the Hebrew's focus on one's eventual outcome rather than merely
    the next step.
- source_word: השמר
  chosen: be on guard
  alternatives:
  - beware
  - take care
  - watch yourself
  lexicon: HALOT
  rationale: השמר is a reflexive/passive imperative meaning to guard oneself or beware.
    'Be on guard' is natural modern English and retains the sense of vigilant caution.
