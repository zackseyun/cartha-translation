translation:
  text: Before hail, lightning flashes forth; and before a modest man, favor goes
    before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness supplied here reads instead, 'The sacrifice of a righteous
      man is acceptable, and its memorial will not be forgotten,' reflecting a different
      textual tradition or verse alignment than the extant Hebrew.
    reason: textual_variant
  - marker: b
    text: Or 'the humble' / 'the lowly' for 'a modest man.' The Hebrew term can denote
      one who is humble or brought low.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - ahead of
  lexicon: HALOT
  rationale: 'Temporal/sequential sense fits both cola: one thing precedes another.'
- source_word: בָרָד
  chosen: hail
  lexicon: HALOT
  rationale: Standard sense of the noun; the image is meteorological.
- source_word: יִנְצַח
  chosen: flashes forth / goes before
  alternatives:
  - prevails
  - appears first
  - is conspicuous
  lexicon: HALOT
  rationale: The verb is difficult in this Hebrew context. Given the parallel structure
    with לִפְנֵי ('before') and the natural image 'lightning before hail,' a sense
    of preceding/appearing first best fits. I vary the English slightly across the
    two cola for idiomatic clarity while preserving the same underlying idea of prior
    appearance.
- source_word: בָּרָק
  chosen: lightning
  lexicon: HALOT
  rationale: Standard lexical meaning; paired naturally with hail in a weather proverb.
- source_word: דַכָּא
  chosen: a modest man
  alternatives:
  - the humble
  - the lowly
  - the crushed
  lexicon: HALOT
  rationale: The Hebrew can denote one who is lowly/humble, though in some contexts
    it can mean crushed or oppressed. Here, in a wisdom saying about social conduct
    and the gaining of favor, 'modest man' or 'humble man' best fits the ethical sense.
    'Man' preserves the masculine singular form per project philosophy.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - charm
  lexicon: HALOT
  rationale: In wisdom/social contexts חֵן commonly denotes favor or gracious acceptance.
    'Favor' is the clearest modern English choice here.
