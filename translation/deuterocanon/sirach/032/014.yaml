translation:
  text: One who seeks what pleases God will accept instruction, and the one who seeks
    him early will receive an answer through his prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek tradition: ''Do not offer bribes, for he will not accept them.''
      The extant Hebrew witness here differs substantially from the Greek.'
    reason: textual_variant
lexical_decisions:
- source_word: דורש
  chosen: one who seeks
  alternatives:
  - one who inquires after
  - the seeker
  lexicon: HALOT
  rationale: The participle denotes an ongoing seeker/inquirer. 'One who seeks' is
    natural English and preserves the habitual sense.
- source_word: חפצי אל
  chosen: what pleases God
  alternatives:
  - the delights of God
  - God's desires
  - the things God desires
  lexicon: HALOT
  rationale: The construct is somewhat compressed. 'What pleases God' captures the
    sense of seeking God's will/pleasure in idiomatic English without over-paraphrasing.
    'God's desires' is possible but less natural in context.
- source_word: יקח לקח
  chosen: will accept instruction
  alternatives:
  - will take teaching
  - will receive a lesson
  lexicon: HALOT
  rationale: The idiom literally 'take instruction/teaching' means to accept or receive
    correction/teaching. 'Accept instruction' is idiomatic and fits wisdom literature.
- source_word: ומשחרהו
  chosen: and the one who seeks him early
  alternatives:
  - and whoever rises early for him
  - and whoever diligently seeks him
  lexicon: HALOT
  rationale: From שׁחר in the sense of seeking early/earnestly. Because the suffix
    likely refers to God, 'seeks him early' preserves both the temporal and devotional
    nuance. English readers can infer earnestness from the idiom.
- source_word: ישיג מענה
  chosen: will receive an answer
  alternatives:
  - will obtain an answer
  - will attain a response
  lexicon: HALOT
  rationale: The Hebrew literally means 'will obtain an answer.' 'Receive an answer'
    is smoother modern English while preserving the result.
- source_word: ויענהו בתפלתו
  chosen: through his prayer
  alternatives:
  - in his prayer
  - by his prayer
  lexicon: HALOT
  rationale: The phrase explains the means or sphere in which the answer comes. 'Through
    his prayer' communicates that the answer is connected with prayer without forcing
    a more specific interpretation.
- source_word: μὴ δωροκόπει
  chosen: not adopted in main text
  alternatives:
  - do not offer bribes
  - do not try to bribe
  lexicon: BDAG
  rationale: The Greek parallel in Swete diverges sharply from the extant Hebrew,
    reading 'Do not offer bribes, for he will not accept [them].' Because the project
    translates Sirach from Hebrew where it survives, the Hebrew remains primary; however,
    the Greek is significant enough to preserve in a footnote as an alternative textual
    tradition.
