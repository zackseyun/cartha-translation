translation:
  text: Do nothing without counsel, and after you act, do not regret it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'do not be vexed/angry.' The Hebrew can denote becoming
      upset after one's action; the main text renders the likely sense in this wisdom
      context as regret or self-reproach.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel supplied here does not align with the Hebrew wording
      of this verse, so the translation follows the extant Hebrew witness as the primary
      source.
    reason: textual_variant
lexical_decisions:
- source_word: בלא עצה
  chosen: without counsel
  alternatives:
  - without advice
  - without deliberation
  lexicon: HALOT
  rationale: The phrase literally means 'without counsel/advice.' 'Counsel' preserves
    the wisdom-literature register and can include both receiving advice and acting
    with deliberation.
- source_word: אל תפעל
  chosen: do nothing
  alternatives:
  - do not act
  - do not undertake
  lexicon: HALOT
  rationale: 'With דבר as object, the sense is broad: ''do not do/undertake anything.''
    ''Do nothing'' is idiomatic English that preserves the prohibition''s scope.'
- source_word: דבר
  chosen: nothing / anything
  alternatives:
  - a thing
  - a matter
  lexicon: HALOT
  rationale: In negative commands, דבר often has the broad sense 'anything.' Rendering
    the clause as 'Do nothing' communicates the idiomatic force better than 'Do not
    do a thing.'
- source_word: ואחר מעשיך
  chosen: and after you act
  alternatives:
  - and after your deed
  - and after your actions
  lexicon: HALOT
  rationale: The Hebrew is literally 'and after your deed(s).' English expresses this
    more naturally as a temporal clause, 'after you act,' while preserving the sequence
    of action followed by emotional response.
- source_word: אל תתקצף
  chosen: do not regret it
  alternatives:
  - do not be vexed
  - do not be angry
  - do not be upset
  lexicon: HALOT
  rationale: The reflexive form from קצף can denote becoming upset or vexed. In this
    context—after acting with counsel—the point is to avoid vexation or self-reproach
    after the fact. 'Do not regret it' best captures the practical wisdom sense in
    natural English, though a more literal alternative is preserved in a footnote.
