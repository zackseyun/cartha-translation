translation:
  text: Speak briefly, though you know much, and be like one who knows and yet keeps
    silent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew text is somewhat compressed and may be elliptical: literally, something
      like ''Speak little—much; and be like one knowing and keeping silent together.''
      The translation brings out the likely sense of restrained speech. The Greek
      parallel for this verse in Swete does not correspond to this Hebrew line, so
      the Hebrew is followed as the primary witness here.'
    reason: textual_variant
lexical_decisions:
- source_word: כל
  chosen: briefly
  alternatives:
  - in sum
  - completely
  - all
  lexicon: HALOT
  rationale: 'In this compressed wisdom saying, the form is best taken adverbially
    in context with לאמר: not ''say everything'' but ''speak concisely / in few words.''
    This fits the parallel with ''much'' and the exhortation to restrained speech.'
- source_word: לאמר
  chosen: speak
  alternatives:
  - say
  - utter
  lexicon: HALOT
  rationale: Infinitive construct of אמר used with the preceding adverbial idea; 'speak'
    is natural modern English in a wisdom instruction.
- source_word: ומעט
  chosen: briefly
  alternatives:
  - a little
  - few words
  lexicon: HALOT
  rationale: 'מעט literally means ''little/few.'' In English the sense is adverbial:
    speak in few words, hence ''briefly.'' It balances הרבה (''much'') in the next
    phrase.'
- source_word: הרבה
  chosen: though you know much
  alternatives:
  - much
  - many things
  lexicon: HALOT
  rationale: The Hebrew as transmitted is elliptical. Read with the following colon
    and checked against the Greek's concern for decorous conduct, the sense is not
    merely 'a little much' but 'even if much is known, say little.' Supplying 'you
    know' makes the proverb intelligible in English without over-paraphrasing.
- source_word: ודמה
  chosen: and be like
  alternatives:
  - and resemble
  - and appear as
  lexicon: HALOT
  rationale: The verb carries the sense of being like or resembling. 'Be like' gives
    a straightforward imperative-like continuation in English.
- source_word: ליודע
  chosen: one who knows
  alternatives:
  - a knowledgeable person
  - the one who knows
  lexicon: HALOT
  rationale: 'The prefixed ל here is best understood in an idiomatic comparative sense
    after דמה: ''be like one who knows.'''
- source_word: ומחריש
  chosen: and yet keeps silent
  alternatives:
  - while being silent
  - and is silent
  lexicon: HALOT
  rationale: חרש in Hifil/participle usage commonly means to be silent or keep silent.
    'Keeps silent' preserves the active restraint emphasized in wisdom literature.
- source_word: יחדו
  chosen: yet
  alternatives:
  - together
  - at once
  - altogether
  lexicon: HALOT
  rationale: 'Literally ''together,'' but in this line it functions idiomatically
    to join the qualities: one who knows and at the same time remains silent. English
    ''yet'' or ''at the same time'' conveys the force more naturally.'
