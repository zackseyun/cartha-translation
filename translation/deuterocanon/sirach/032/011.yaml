translation:
  text: At the table, do not multiply words, even if a matter has arisen in your heart.
    When it is time to depart, do not linger; go home and fulfill your desire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''In every gift make your face cheerful, and with gladness
      dedicate the tithe.'' The Hebrew and Greek witnesses differ substantially in
      this verse.'
    reason: alternative_reading
lexical_decisions:
- source_word: בעת מפקד
  chosen: When it is time to depart
  alternatives:
  - At the appointed time
  - When you are dismissed
  - At the time of mustering/visitation
  lexicon: HALOT
  rationale: The Hebrew phrase is difficult in isolation. בעת is straightforwardly
    'at the time of/when.' מפקד can denote appointment, mustering, oversight, or a
    set occasion. In this banquet-context, and with the following imperatives about
    not delaying and going home, the sense is best taken as the moment of dismissal
    or departure rather than a military 'muster.' The Greek parallel diverges strongly
    here and does not control the Hebrew, but it confirms that this verse is textually
    fluid.
- source_word: אל תתאחר
  chosen: do not linger
  alternatives:
  - do not delay
  - do not stay late
  lexicon: HALOT
  rationale: The verb means to delay or tarry. 'Do not linger' fits idiomatic modern
    English and the social setting of leaving a gathering.
- source_word: פטר לביתך
  chosen: go home
  alternatives:
  - depart to your house
  - be dismissed to your house
  lexicon: HALOT
  rationale: פטר carries the sense of departing or being let go; לביתך is literally
    'to your house.' 'Go home' is a natural optimal-equivalence rendering.
- source_word: ושלם רצון
  chosen: and do what pleases you
  alternatives:
  - and fulfill your desire
  - and complete your pleasure
  - and satisfy your wish
  lexicon: HALOT
  rationale: רצון commonly denotes will, desire, or pleasure. The collocation with
    שלם suggests carrying out or fulfilling one's desire/wish. 'Do what pleases you'
    is idiomatic and preserves the sense without over-literal awkwardness.
