translation:
  text: until he judges the judgment of his people and gladdens them with his mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'until he decides the case of his people' or 'until he executes justice
      for his people.' The Greek expression is formally repetitive and may function
      as an idiom for rendering judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως
  chosen: until
  alternatives:
  - while
  - up to the time when
  lexicon: LSJ
  rationale: Temporal conjunction marking the endpoint of the preceding action; 'until'
    is the most natural and sufficiently formal English equivalent.
- source_word: κρίνῃ
  chosen: he judges
  alternatives:
  - he decides
  - he gives judgment
  lexicon: BDAG
  rationale: Subjunctive after ἕως, but in English a simple present best conveys the
    sense in this clause. 'Judges' preserves the verbal link with κρίσιν.
- source_word: τὴν κρίσιν
  chosen: the judgment
  alternatives:
  - the case
  - justice
  - the cause
  lexicon: LSJ
  rationale: The phrase κρίνειν τὴν κρίσιν is somewhat pleonastic in Greek and can
    mean to decide a case or execute judgment. 'Judge the judgment' is wooden but
    transparent; 'the judgment' keeps the lexical repetition auditable while remaining
    intelligible in context.
- source_word: τοῦ λαοῦ αὐτοῦ
  chosen: of his people
  alternatives:
  - for his people
  - concerning his people
  lexicon: LSJ
  rationale: Genitive most naturally linked to κρίσιν. 'Of his people' preserves the
    Greek construction without over-interpreting whether the sense is judgment belonging
    to, concerning, or on behalf of the people.
- source_word: εὐφράνει
  chosen: gladdens
  alternatives:
  - makes glad
  - rejoices
  lexicon: LSJ
  rationale: 'Causative sense is clear: he causes them to rejoice. ''Gladdens'' is
    concise and preserves the transitive force better than the intransitive ''rejoices''.'
- source_word: ἐν τῷ ἐλέει αὐτοῦ
  chosen: with his mercy
  alternatives:
  - in his mercy
  - by his mercy
  - through his mercy
  lexicon: LSJ
  rationale: The preposition ἐν here is instrumental or associative. 'With his mercy'
    is idiomatic in English and communicates that mercy is the means or sphere by
    which they are gladdened.
