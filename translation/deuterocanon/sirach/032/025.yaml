theological_decisions:
- issue: Rendering the judicial phrase κρίνῃ τὴν κρίσιν
  chosen_reading: until he judges the judgment of his people
  alternative_readings:
  - until he decides the case of his people
  - until he executes justice for his people
  rationale: The Greek wording is formally repetitive and leaves open whether the
    emphasis is on adjudication, vindication, or justice rendered. The main text stays
    close to the source rather than resolving the nuance beyond what the Greek explicitly
    states. Alternatives are preserved in a footnote because they may better capture
    the idiom in English.
  doctrine_reference: Translation philosophy §§1, 3, 5
