translation:
  text: Do not walk on a path full of obstacles, and do not stumble over the same
    hazard twice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a path of מוקשות.' The term may suggest snares, traps, or stumbling
      obstacles; the translation 'full of obstacles' follows the verse's parallel
      emphasis on stumbling.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel in Swete differs substantially here ('He who serves with
      favor will be accepted, and his petition will reach to the clouds'), indicating
      a major divergence in the textual tradition. The main text follows the extant
      Hebrew witness, which is the primary source where preserved for Sirach.
    reason: textual_variant
lexical_decisions:
- source_word: בדרך
  chosen: on a path
  alternatives:
  - in a way
  - by a road
  lexicon: HALOT
  rationale: דרך commonly means 'way, road, path.' In this admonitory context, 'path'
    preserves both the literal image and the metaphorical sense of one's course of
    conduct.
- source_word: מוקשות
  chosen: full of obstacles
  alternatives:
  - of snares
  - of traps
  - of stumbling blocks
  lexicon: HALOT
  rationale: The form points to things that ensnare or trip a person up. Because the
    following clause explicitly uses stumbling language (תתקל / נגף), rendering it
    as 'obstacles' best fits the parallelism without overcommitting to hidden 'snares'
    alone. The phrase 'full of obstacles' brings out the plural collective force.
- source_word: אל תלך
  chosen: Do not walk
  alternatives:
  - Do not go
  lexicon: HALOT
  rationale: הלך is the standard verb 'walk/go.' 'Walk' better preserves the wisdom-style
    metaphor of conduct and matches the imagery of the verse.
- source_word: ואל תתקל
  chosen: and do not stumble
  alternatives:
  - and do not strike against
  - and do not trip
  lexicon: HALOT
  rationale: The hitpael of תקל in context denotes coming to grief by stumbling. 'Stumble'
    is idiomatic English and aligns with the hazard imagery.
- source_word: בנגף
  chosen: over the same hazard
  alternatives:
  - at a stumbling block
  - against a blow
  - over a cause of falling
  lexicon: HALOT
  rationale: נגף can denote a blow, plague, or stumbling-causing obstacle. Here, with
    תתקל and the wisdom context, the sense is a thing that causes one to fall. 'Hazard'
    is natural English and broad enough to preserve the concrete-metaphorical overlap.
- source_word: פעמים
  chosen: twice
  alternatives:
  - repeatedly
  - two times
  lexicon: HALOT
  rationale: 'The adverbial sense is straightforwardly numerical: ''twice.'' To make
    the English idiomatic, it is attached to the whole warning as ''the same hazard
    twice,'' expressing repeated failure.'
