theological_decisions:
- issue: Whether תורה should be rendered broadly as 'instruction' or more specifically
    as 'the law'
  chosen_reading: the law
  alternative_readings:
  - instruction
  - teaching
  rationale: The Hebrew witness is primary where extant, and in this sapiential Jewish
    context תורה plausibly refers to the Torah as divine law, not merely generic advice.
    The translation preserves that covenantal-religious force without overinterpreting
    beyond the text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; consistency of key
    terms'
- issue: How to handle the difficult Hebrew ומתלהלה in a verse where the Greek parallel
    diverges sharply
  chosen_reading: the one who plays the hypocrite
  alternative_readings:
  - the pretender
  - the self-deluding one
  - the frivolous one
  rationale: Because the Hebrew is the primary witness for extant Sirach and this
    line is textually difficult, the rendering should reflect uncertainty without
    flattening the contrast. The chosen wording conveys insincere religious posture,
    which fits the antithesis to sincerely seeking the law. A footnote preserves the
    lexical uncertainty.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition'
