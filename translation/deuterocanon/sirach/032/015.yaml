translation:
  text: Whoever seeks the law will obtain it, but the one who acts arrogantly will
    be ensnared by it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew ומתלהלה is uncertain; it may mean 'the pretender,' 'the self-deluding
      one,' or a similarly insincere person.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel for this verse differs substantially: ''And do not persist
      in an unjust sacrifice, for the Lord is judge, and with him there is no partiality.''
      The Hebrew and Greek witnesses appear to reflect different textual forms here.'
    reason: textual_variant
lexical_decisions:
- source_word: דורש
  chosen: seeks
  alternatives:
  - inquires after
  - studies
  - expounds
  lexicon: HALOT
  rationale: The participle from דרש commonly means to seek, inquire, or pursue. In
    this wisdom context, 'seeks' best captures active earnest pursuit of instruction
    without narrowing it to formal study or public exposition.
- source_word: תורה
  chosen: the law
  alternatives:
  - instruction
  - teaching
  lexicon: HALOT
  rationale: Hebrew תורה can mean instruction broadly, but in Ben Sira it often carries
    the sense of the Torah/law as authoritative divine teaching. 'The law' preserves
    that weight while remaining idiomatic. 'Instruction' is possible, but the Greek
    parallel's very different text does not override the Hebrew witness here.
- source_word: יפיקנה
  chosen: will grasp it
  alternatives:
  - will obtain it
  - will bring it forth
  - will attain it
  lexicon: HALOT
  rationale: From הפיק, the form here likely conveys obtaining or drawing out what
    is sought. 'Will grasp it' expresses successful appropriation of the law's meaning
    or benefit in readable English. 'Obtain it' is possible, but 'grasp' better fits
    wisdom literature's emphasis on understanding.
- source_word: ומתלהלה
  chosen: the one who plays the hypocrite
  alternatives:
  - the pretender
  - the self-deluding one
  - the frivolous one
  lexicon: HALOT
  rationale: The Hebrew is difficult and the source is marked major_mismatch. The
    form appears to denote someone acting falsely or affectingly rather than sincerely.
    The Greek parallel for this verse is substantially different and cannot settle
    the exact nuance, but 'plays the hypocrite' best captures performative insincerity
    in contrast to genuinely seeking the law.
- source_word: יוקש
  chosen: will be caught
  alternatives:
  - will be snared
  - will stumble
  lexicon: HALOT
  rationale: From יקש/יקשׁ, the passive sense 'be snared/caught' is straightforward.
    'Will be caught' is idiomatic and clear; 'snared' remains a viable more literal
    alternative.
- source_word: בו
  chosen: by it
  alternatives:
  - in it
  - by him
  lexicon: HALOT
  rationale: 'The pronominal suffix is ambiguous in isolation. Given the immediate
    antecedent תורה, ''by it'' most naturally means the hypocrite is trapped by the
    very law he handles insincerely. This also preserves the antithetical parallelism:
    the sincere seeker gains the law; the insincere person is trapped by it.'
