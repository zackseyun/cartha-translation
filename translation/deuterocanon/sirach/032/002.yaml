theological_decisions:
- issue: Use of Hebrew as primary witness with Greek kept in view
  chosen_reading: Translate the extant Hebrew banquet-context line directly, while
    allowing the Greek parallel to confirm a moral/instructional nuance rather than
    replacing the Hebrew wording.
  alternative_readings:
  - A Greek-based rendering such as 'He who keeps the commandments offers a peace
    offering'
  rationale: The project philosophy gives primacy to the surviving Hebrew of Sirach
    where extant. Here the Hebrew and Greek differ substantially, so the main text
    follows the Hebrew witness rather than harmonizing to the Greek. The Greek is
    still considered as a control on semantic range, especially for מוסר, but not
    allowed to override the Hebrew line.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    parallel Greek as actual input without displacing original-language primacy.'
