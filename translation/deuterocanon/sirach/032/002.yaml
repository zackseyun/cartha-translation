translation:
  text: so that you may rejoice in their honor, and receive a reward for your instruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel reads very differently here: ''He who pays attention
      to the commandments offers a peace offering.'' The main text follows the extant
      Hebrew witness, which is the primary source for Sirach where preserved.'
    reason: alternative_reading
  - marker: b
    text: Or 'discipline' or 'good order' for 'instruction.' The Hebrew מוסר can carry
      several wisdom-related senses.
    reason: lexical_alternative
lexical_decisions:
- source_word: למען
  chosen: so that
  alternatives:
  - in order that
  - for the sake that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: תשמח
  chosen: you may rejoice
  alternatives:
  - you may be glad
  - you may take joy
  lexicon: HALOT
  rationale: The verb שמח denotes joy/rejoicing. 'Rejoice' preserves the elevated
    but still readable tone better than the flatter 'be glad'.
- source_word: בכבודם
  chosen: in their honor
  alternatives:
  - at their honor
  - because of their honor
  - in the honor shown them
  lexicon: HALOT
  rationale: כבוד commonly means 'honor' or 'glory.' With ב, the sense is rejoicing
    in connection with the guests' honor. 'In their honor' is concise and idiomatic,
    while leaving open whether the honor is possessed by them or shown to them.
- source_word: ועל
  chosen: and for
  alternatives:
  - and on account of
  - and concerning
  lexicon: HALOT
  rationale: Links the second clause with a sense of basis or occasion. In English,
    'and receive a reward for...' best conveys the construction.
- source_word: מוסר
  chosen: instruction
  alternatives:
  - discipline
  - good order
  - correction
  lexicon: HALOT
  rationale: מוסר can mean discipline, correction, or instruction. In this banquet-host
    context, the sense is likely the wise ordering/guidance just given. 'Instruction'
    fits the ethical-wisdom register and avoids overreading punitive 'discipline.'
    The Greek parallel about attending to commandments points in the direction of
    moral guidance, supporting an instructional nuance.
- source_word: תשא
  chosen: receive
  alternatives:
  - bear
  - carry off
  - obtain
  lexicon: HALOT
  rationale: נשא literally means 'lift/carry,' but with שכר the idiomatic sense is
    to receive or obtain a reward. 'Receive' is the clearest English equivalent here.
- source_word: שכר
  chosen: a reward
  alternatives:
  - wages
  - payment
  - recompense
  lexicon: HALOT
  rationale: שכר denotes compensation or reward. 'Reward' fits the wisdom context
    better than the more commercial 'wages'.
