translation:
  text: He who keeps the law guards his life, and he who trusts in the LORD will not
    be put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel at this verse differs substantially: ''until he repays
      a man according to his deeds, and the works of men according to their thoughts.''
      The main text follows the extant Hebrew witness here.'
    reason: textual_variant
lexical_decisions:
- source_word: נוצר
  chosen: keeps
  alternatives:
  - guards
  - observes
  lexicon: HALOT
  rationale: The participle from נצר can mean guard/keep/watch. With תורה as object,
    idiomatic English favors 'keeps the law' while still preserving the sense of careful
    observance.
- source_word: תורה
  chosen: the law
  alternatives:
  - instruction
  - teaching
  lexicon: HALOT
  rationale: Torah can mean instruction broadly, but in wisdom literature with covenantal-religious
    force it commonly refers to the law/instruction of God. 'The law' is concise and
    natural here, while the parallel mention of trusting in the LORD supports a covenantal
    sense.
- source_word: שומר נפשו
  chosen: guards his life
  alternatives:
  - keeps his soul
  - preserves himself
  lexicon: HALOT
  rationale: נפש here is best rendered by 'life' rather than the more misleading modern
    English 'soul.' The phrase expresses self-preservation, and 'guards his life'
    preserves the Hebrew imagery and parallel with נוצר/שומר.
- source_word: ובוטח ביהוה
  chosen: and he who trusts in the LORD
  alternatives:
  - and one trusting in the LORD
  - and whoever trusts in the LORD
  lexicon: HALOT
  rationale: The participial construction is rendered with a generic singular English
    clause for readability. יהוה follows project doctrine as 'the LORD.' 'Trusts'
    best captures בטח in this context.
- source_word: לא יבוש
  chosen: will not be put to shame
  alternatives:
  - will not be ashamed
  - will not be disappointed
  lexicon: HALOT
  rationale: בוש often carries the sense of being shamed or disappointed through failed
    reliance. 'Will not be put to shame' preserves both the passive/resultative nuance
    and the common biblical idiom, especially fitting after 'trusts in the LORD.'
