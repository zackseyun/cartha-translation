translation:
  text: Like settings of gold and a seal of beryl, so is the sound of a psalm with
    the sweetness of new wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel supplied for this verse reads, 'Do not appear before
      the Lord empty,' reflecting a different verse tradition or numbering. The main
      translation follows the extant Hebrew witness.
    reason: textual_variant
  - marker: b
    text: Or 'a signet of emerald.' The identification of ברקת is uncertain; 'beryl'
      is a common scholarly choice.
    reason: lexical_alternative
lexical_decisions:
- source_word: מלואות פז
  chosen: settings of gold
  alternatives:
  - fillings of fine gold
  - inlays of gold
  - mountings of gold
  lexicon: HALOT
  rationale: The phrase is elliptical and poetic. With פז meaning fine gold, מלואות
    likely refers to what fills or sets a precious object, especially in jewelry imagery.
    'Settings of gold' gives clear English while preserving the ornamental comparison.
- source_word: חותם ברקת
  chosen: a seal of beryl
  alternatives:
  - a signet of emerald
  - a seal-ring of beryl
  lexicon: HALOT
  rationale: חותם commonly means seal or signet. ברקת is a precious stone traditionally
    identified as beryl or emerald. 'Seal of beryl' keeps the compact Hebrew image
    without over-specifying ring where the text itself does not require it.
- source_word: קול מזמור
  chosen: the sound of a psalm
  alternatives:
  - the voice of song
  - the sound of music
  - the sound of a hymn
  lexicon: HALOT
  rationale: קול is 'sound/voice' and מזמור is a song or psalm, often accompanied
    by music. 'The sound of a psalm' preserves the liturgical-poetic flavor better
    than the broader 'music.'
- source_word: על נועם תירוש
  chosen: with the sweetness of new wine
  alternatives:
  - over the pleasantness of new wine
  - along with delightful wine
  - to the accompaniment of sweet new wine
  lexicon: HALOT
  rationale: תירוש is new wine. נועם denotes pleasantness or sweetness. The preposition
    על is difficult here; in context of comparison imagery, 'with' communicates accompaniment
    or association in idiomatic English without forcing a wooden rendering. This also
    fits the banquet setting in the surrounding context.
