translation:
  text: In all your ways guard yourself, for everyone who does these things keeps
    the commandment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew witness for this verse in Kahana includes before the verse number:
      ''Do not trust in the way of the wicked, and in your paths be careful.'' Because
      this clause stands before the verse marker and does not match the Greek parallel
      for Sirach 32:22, it is likely adjacent material rather than part of this verse.'
    reason: textual_variant
lexical_decisions:
- source_word: בכל דרכיך
  chosen: In all your ways
  alternatives:
  - In all your paths
  - In everything you do
  lexicon: HALOT
  rationale: A fairly literal rendering of the idiom דרכים as one's courses of conduct.
    'Ways' preserves the Hebrew metaphor and reads naturally in English.
- source_word: שמור נפשך
  chosen: guard yourself
  alternatives:
  - watch yourself
  - guard your life
  - keep your soul
  lexicon: HALOT
  rationale: נפש here most naturally refers to the person/life rather than an abstract
    'soul.' 'Guard yourself' captures the reflexive force and practical ethical warning
    in context.
- source_word: כי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the rationale for the exhortation. 'For' keeps the proverbial
    explanatory connection concise.
- source_word: כל עושה אלה
  chosen: everyone who does these things
  alternatives:
  - whoever does these things
  - everyone doing these things
  lexicon: HALOT
  rationale: The participial phrase is generic. 'Everyone who does these things' is
    clear modern English and preserves the representative force.
- source_word: שומר מצוה
  chosen: keeps the commandment
  alternatives:
  - keeps the commandment of the Law
  - keeps a commandment
  - obeys the commandment
  lexicon: HALOT
  rationale: The singular מצוה is best retained as 'the commandment,' likely functioning
    collectively or as a summary of God's instruction. 'Keeps' preserves the Hebrew
    ethical idiom better than the flatter 'obeys.'
- source_word: אל תבטח בדרך רשעים, ובארחותיך הזהר
  chosen: omitted from main text as likely carryover/mismatch from adjacent material
  alternatives:
  - Do not trust in the way of the wicked, and be careful in your paths
  lexicon: HALOT
  rationale: The Zone 1 Hebrew presents an extra clause before the verse marker, while
    the Greek parallel for Sirach 32:22 is entirely different and aligns only with
    the post-marker Hebrew line. Given the validation note 'minor_mismatch' and the
    verse marker placement, the pre-marker clause is best treated as adjacent-text
    carryover rather than part of v. 22.
