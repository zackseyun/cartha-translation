theological_decisions:
- issue: Scope of מצוה in wisdom context
  chosen_reading: the commandment
  alternative_readings:
  - a commandment
  - the Law's commandment
  rationale: The text does not explicitly specify Torah as such, so the translation
    avoids importing a narrower doctrinal claim. The singular is preserved as written,
    while allowing its wisdom-literature sense of faithful obedience to divine instruction.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
