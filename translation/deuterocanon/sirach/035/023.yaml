lexical_decisions:
- source_word: תאר
  chosen: beauty
  alternatives:
  - form
  - appearance
  - figure
  lexicon: HALOT
  rationale: The noun denotes outward form or comeliness. In context with 'woman'
    and the effect on the observer, 'beauty' best captures the sense in natural English
    without narrowing it merely to bodily shape.
- source_word: יחליץ פנים
  chosen: brightens the face
  alternatives:
  - refreshes the face
  - changes the face
  - enlivens the countenance
  lexicon: HALOT
  rationale: The idiom is difficult, but the Hebrew suggests producing a visible effect
    on the face/countenance. 'Brightens the face' conveys the positive enlivening
    effect in readable English. The Greek parallel for this verse is substantially
    different, so the Hebrew witness governs here while the idiomatic uncertainty
    is acknowledged.
- source_word: מחמד עין
  chosen: delight of the eye
  alternatives:
  - desirable sight
  - lovely thing to behold
  - what the eye desires
  lexicon: HALOT
  rationale: The phrase literally refers to something desired or precious to the eye.
    'Delight of the eye' preserves both the visual and desirability components in
    idiomatic English.
- source_word: יגבר
  chosen: surpasses
  alternatives:
  - prevails over
  - is stronger than
  - excels
  lexicon: HALOT
  rationale: The verb commonly means to be strong or prevail. In this comparative
    poetic context, 'surpasses' expresses superiority in smooth English.
