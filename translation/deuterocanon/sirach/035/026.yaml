translation:
  text: Who will trust an armed troop, leaping from city to city?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The supplied Greek parallel for this verse differs completely: ''Understand
      that I have not labored for myself alone, but for all who seek instruction.''
      The Hebrew witness is therefore followed here as the primary text.'
    reason: textual_variant
lexical_decisions:
- source_word: מי
  chosen: Who will
  alternatives:
  - Who
  - Who would
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question; English future
    'will' fits the proverbial force of the Hebrew.
- source_word: יאמין
  chosen: trust
  alternatives:
  - believe
  - have confidence in
  lexicon: HALOT
  rationale: From אמן in the Hifil, here meaning to place trust or confidence in someone/something,
    not merely to believe a proposition.
- source_word: בגדוד
  chosen: a troop
  alternatives:
  - a band
  - a company
  lexicon: HALOT
  rationale: גדוד denotes a troop, band, or raiding company. 'Troop' preserves the
    military sense while remaining natural English.
- source_word: צבא
  chosen: of an army
  alternatives:
  - of soldiers
  - military
  lexicon: HALOT
  rationale: צבא marks the military sphere and likely qualifies גדוד. Rendering the
    construct-like relation as 'a troop of an army' keeps both nouns visible rather
    than collapsing them.
- source_word: המדלג
  chosen: leaping
  alternatives:
  - skipping
  - jumping
  - darting
  lexicon: HALOT
  rationale: דלג literally means to leap or spring. 'Leaping' preserves the vivid
    motion and suggests instability or restlessness in context.
- source_word: מעיר אל עיר
  chosen: from city to city
  alternatives:
  - from one city to another
  lexicon: HALOT
  rationale: A straightforward idiom of repeated movement; 'from city to city' is
    concise and natural.
