- issue: Source divergence between the Hebrew witness and the Greek parallel for this
    verse
  chosen_reading: Translate the extant Hebrew as the primary text, while noting the
    Greek parallel is entirely different in content.
  alternative_readings:
  - 'Greek parallel: ''Understand that I have not labored for myself alone, but for
    all who seek instruction.'''
  rationale: For Sirach, the project translates from Hebrew where it survives. Here
    the Zone 1 Hebrew presents a proverb about trusting a roaming military troop,
    while the supplied Greek parallel reflects a different verse altogether and cannot
    be harmonized with the Hebrew. The main text therefore follows the Hebrew witness,
    with the Greek divergence preserved in a footnote due to material source uncertainty.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
    source uncertainty honestly'
