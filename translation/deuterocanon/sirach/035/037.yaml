id: SIR.35.37
reference: Sirach 35:37
source:
  edition: lxx-swete-1909
  text: πολλὴν γὰρ κακίαν ἐδίδαξεν ἡ ἀργία·
  language: Greek
  pages:
  - 729
  validation: no_reference
translation:
  text: For idleness has taught much evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For laziness has taught much evil.' The Greek ἀργία can denote idleness,
      laziness, or inactivity; 'idleness' was chosen as the broadest and most natural
      fit in this wisdom context.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλὴν
  chosen: much
  alternatives:
  - great
  - many
  lexicon: LSJ
  rationale: πολύς with an abstract noun commonly conveys degree/extent rather than
    count. Since κακία is singular and abstract here, 'much' fits better than 'many';
    'great' is possible but sounds less natural in English with 'evil' in this construction.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: γάρ marks explanation or grounding. 'For' preserves the connective force
    succinctly and transparently.
- source_word: κακίαν
  chosen: evil
  alternatives:
  - wickedness
  - malice
  - vice
  lexicon: LSJ
  rationale: κακία can denote badness, vice, or wickedness broadly. In this wisdom
    context, 'evil' best captures the broad moral sense without narrowing it to interpersonal
    'malice' or the more technical-sounding 'vice'.
- source_word: ἐδίδαξεν
  chosen: has taught
  alternatives:
  - taught
  - has instructed
  - has produced
  lexicon: LSJ
  rationale: The aorist states a general truth from observed reality. English present
    perfect ('has taught') idiomatically conveys enduring experiential force in proverbial
    style. 'Produced' would over-interpret the metaphor; the Greek explicitly uses
    the language of teaching.
- source_word: ἡ ἀργία
  chosen: idleness
  alternatives:
  - laziness
  - sloth
  - inactivity
  lexicon: LSJ
  rationale: ἀργία denotes idleness or laziness, literally being without work. 'Idleness'
    preserves the state described and fits wisdom-language well. 'Sloth' is more traditional
    but more theological/archaic in tone; 'laziness' is possible but slightly more
    colloquial and character-focused than the Greek noun requires.
