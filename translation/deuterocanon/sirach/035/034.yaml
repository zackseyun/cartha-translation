theological_decisions:
- issue: Ethical-social force of παιδί and ἐλευθερία in a household-discipline proverb
  chosen_reading: Translate straightforwardly as a wisdom saying about disciplining
    a child, without softening the social hierarchy or importing modern political
    connotations into 'freedom.'
  alternative_readings:
  - Render παιδί as 'servant' or 'slave-boy'
  - Render ἐλευθερία as 'license' or 'self-will'
  rationale: The Greek text itself says παιδί, normally 'child' or 'young servant,'
    and the immediate proverb reads most naturally as child-discipline instruction.
    'Freedom' is the lexical meaning of ἐλευθερία, but the rationale notes that the
    context is domestic independence from restraint, not an abstract doctrine of liberty.
  doctrine_reference: Translation philosophy §§1, 5, 6
