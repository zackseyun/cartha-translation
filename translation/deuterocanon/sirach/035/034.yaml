id: SIR.35.34
reference: Sirach 35:34
source:
  edition: lxx-swete-1909
  text: ἔργασαι ἐν παιδί, καὶ εὑρήσεις ἀνάπαυσιν· ἄνες χεῖρας αὐτῷ, καὶ ζητήσει ἐλευθερίαν.
  language: Greek
  pages:
  - 729
  validation: no_reference
translation:
  text: Put a child to work, and you will find rest; leave his hands idle, and he
    will seek freedom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Work with a child ... loosen his hands for him.' The
      Greek imagery suggests keeping a child occupied and not allowing idleness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔργασαι
  chosen: Put ... to work
  alternatives:
  - Set ... to work
  - Employ
  - Make ... labor
  lexicon: LSJ
  rationale: Aorist imperative of ἐργάζομαι used transitively here with ἐν παιδί.
    The sense is to keep a child occupied with work. 'Put ... to work' is idiomatic
    modern English and preserves the imperative force without sounding overly harsh
    or wooden.
- source_word: ἐν παιδί
  chosen: a child
  alternatives:
  - with a child
  - in a child
  - on a child
  - in a servant-boy
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek. In context it means dealing
    with or employing a child/youth. English requires expansion; 'a child' best captures
    παιδί in this wisdom context. 'Put a child to work' reflects the practical sense
    better than a literal but opaque 'work in a child' or 'work with a child.'
- source_word: εὑρήσεις ἀνάπαυσιν
  chosen: you will find rest
  alternatives:
  - you will find relief
  - you will gain repose
  lexicon: LSJ
  rationale: ἀνάπαυσις commonly denotes rest or relief. 'Find rest' is natural English
    and preserves the proverbial result clause.
- source_word: ἄνες
  chosen: leave ... idle
  alternatives:
  - relax
  - let go
  - give slack to
  - release
  lexicon: LSJ
  rationale: Imperative of ἀνίημι. Literally 'let loose' or 'relax,' but with 'hands'
    as object the idiom points to loosening discipline or allowing idleness. 'Leave
    his hands idle' makes explicit the practical sense in English while staying close
    to the image.
- source_word: χεῖρας αὐτῷ
  chosen: his hands
  alternatives:
  - his control
  - his activity
  - his labor
  lexicon: LSJ
  rationale: χείρ is literally 'hand.' Here the plural likely stands metonymically
    for activity/work. Retaining 'hands' preserves the concrete imagery of the Greek
    proverb.
- source_word: ζητήσει ἐλευθερίαν
  chosen: he will seek freedom
  alternatives:
  - he will seek liberty
  - he will demand independence
  - he will look for release
  lexicon: LSJ
  rationale: ἐλευθερία is 'freedom/liberty.' In this household-discipline context
    it refers to throwing off restraint rather than a developed political ideal. 'Seek
    freedom' is the most direct rendering and preserves the warning of the proverb.
