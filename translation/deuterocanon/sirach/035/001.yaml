translation:
  text: If they made you a leader, do not exalt yourself; be among them as one of
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The supplied Hebrew witness for this reference reads, 'Save us, God of all,
      and put your fear upon all the nations.' Because that wording does not match
      the Greek verse attached to Sirach 35:1, the main translation follows the Greek
      here and notes the mismatch openly.
    reason: textual_variant
lexical_decisions:
- source_word: Ἡγούμενόν
  chosen: leader
  alternatives:
  - ruler
  - governor
  - chief
  lexicon: BDAG
  rationale: The Greek parallel source gives the coherent sense for this verse despite
    the Hebrew mismatch. ἡγούμενος denotes one who leads or has charge. 'Leader' is
    natural modern English and avoids overstating formal political office.
- source_word: κατέστησαν
  chosen: they made
  alternatives:
  - they appointed
  - they set
  lexicon: BDAG
  rationale: The verb indicates appointment or establishment into a role. 'They made
    you' is idiomatic and keeps the indefinite plural subject present in the Greek.
- source_word: μὴ ἐπαίρου
  chosen: do not exalt yourself
  alternatives:
  - do not be proud
  - do not lift yourself up
  lexicon: BDAG
  rationale: The reflexive sense of self-elevation is important in context. 'Do not
    exalt yourself' preserves the metaphor and moral force better than the flatter
    'do not be proud.'
- source_word: γίνου
  chosen: be
  alternatives:
  - become
  lexicon: BDAG
  rationale: In this exhortational context, English 'be' best conveys the imperative
    of conduct.
- source_word: ὡς εἷς ἐξ αὐτῶν
  chosen: as one of them
  alternatives:
  - like one of them
  - as one from among them
  lexicon: BDAG
  rationale: This phrase stresses solidarity and humility. 'As one of them' is concise
    and natural while preserving the comparison.
