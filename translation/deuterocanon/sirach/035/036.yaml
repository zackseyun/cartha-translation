id: SIR.35.36
reference: Sirach 35:36
source:
  edition: lxx-swete-1909
  text: ἔμβαλε αὐτὸν εἰς ἐργασίαν, ἵνα μὴ ἀργῇ,
  language: Greek
  pages:
  - 729
  validation: no_reference
translation:
  text: Put him to work, so that he may not be idle,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔμβαλε
  chosen: Put
  alternatives:
  - set
  - assign
  - throw
  lexicon: LSJ
  rationale: Aorist imperative of ἐμβάλλω, literally 'throw/put into.' In this idiom
    with εἰς ἐργασίαν it means to place or set someone into labor. 'Put' is natural
    English and preserves the imperative force without over-literal awkwardness.
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - it
  - that one
  lexicon: Greek grammar
  rationale: The accusative singular pronoun refers to a male person in context. 'Him'
    is the straightforward gender-accurate rendering.
- source_word: εἰς ἐργασίαν
  chosen: to work
  alternatives:
  - into labor
  - to labor
  - to a task
  lexicon: LSJ
  rationale: ἐργασία denotes work, labor, or occupation. With ἔμβαλε, the phrase is
    idiomatic for assigning someone to labor. 'To work' is concise, readable, and
    faithful to the sense.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: Greek grammar
  rationale: Introduces purpose. 'So that' gives clear modern English while preserving
    the purposive force.
- source_word: μὴ ἀργῇ
  chosen: he may not be idle
  alternatives:
  - he may not be lazy
  - he may not be unemployed
  - he may not do nothing
  lexicon: LSJ
  rationale: ἀργέω means to be idle, inactive, or unemployed. 'Be idle' best matches
    the moral and practical sense here without importing a stronger character judgment
    like 'lazy' beyond the Greek.
