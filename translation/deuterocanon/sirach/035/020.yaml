translation:
  text: The palate tests the flavors of speech, and an understanding heart the flavors
    of falsehood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The palate tests the taste of speech, and a discerning heart the taste
      of lies.' The Hebrew repeats the taste metaphor in both halves of the line.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel in Swete differs substantially here ('Do not go on a
      path of stumbling...'), indicating a major textual divergence; the translation
      follows the extant Hebrew witness as the primary source for this verse.
    reason: textual_variant
lexical_decisions:
- source_word: חך
  chosen: the palate
  alternatives:
  - the mouth
  - the tongue
  - the taste
  lexicon: HALOT
  rationale: The Hebrew literally denotes the palate as the organ of taste. Retaining
    'palate' preserves the proverb's sensory metaphor more precisely than the broader
    'mouth' or 'tongue'.
- source_word: בוחן
  chosen: tests
  alternatives:
  - examines
  - proves
  - discerns
  lexicon: HALOT
  rationale: '''Tests'' fits the wisdom context and matches the tasting metaphor:
    the palate tests flavors. It also naturally parallels the heart''s discerning
    function in the second colon.'
- source_word: מטעמי
  chosen: the flavors of
  alternatives:
  - the tastes of
  - the savor of
  - the sense of
  lexicon: HALOT
  rationale: From a noun related to taste/flavor. 'Flavors of' keeps the concrete
    metaphor in both cola. Although more idiomatic English might shift the second
    colon to 'discerns lies,' the Hebrew repeats the taste imagery, so it is preserved.
- source_word: דבר
  chosen: speech
  alternatives:
  - a word
  - a matter
  - words
  lexicon: HALOT
  rationale: The singular collective sense is best represented by 'speech' here, referring
    to spoken expression generally rather than one isolated word.
- source_word: לב מבין
  chosen: an understanding heart
  alternatives:
  - a discerning heart
  - an intelligent mind
  lexicon: HALOT
  rationale: Hebrew anthropology locates understanding in the heart. 'Understanding
    heart' preserves that idiom while remaining readable. 'Discerning heart' is possible,
    but 'understanding' more directly reflects מבין.
- source_word: כזב
  chosen: falsehood
  alternatives:
  - lies
  - deceit
  - what is false
  lexicon: HALOT
  rationale: '''Falsehood'' is broad enough to cover deceitful speech generally, not
    only individual lies. It also balances the abstract collective sense of ''speech''
    in the first colon.'
