theological_decisions:
- issue: Meaning of σάρξ in this wisdom context
  chosen_reading: flesh = mortal human being(s), not sinful nature
  alternative_readings:
  - flesh as bodily desire
  - flesh as sinful nature
  rationale: In Sirach's wisdom setting, πάσῃ σαρκί is a conventional expression for
    human beings in their frailty/mortality. Rendering it as 'sinful nature' would
    import later theological usage not warranted by this context.
  doctrine_reference: 'DOCTRINE.md: σάρξ = flesh (literal) / sinful nature (metaphorical),
    context-dependent'
- issue: Force of μὴ ἀλλάξῃς σεαυτὸν πάσῃ σαρκί
  chosen_reading: a warning against putting oneself under the control or judgment
    of mere mortals
  alternative_readings:
  - do not make yourself like every human
  - do not change yourself for anyone
  rationale: The Greek idiom is somewhat compressed. The chosen rendering reflects
    the likely ethical sense of not surrendering oneself to human pressure or domination,
    while preserving the lexical link to 'flesh.' Because the wording is somewhat
    idiomatic, an alternative is preserved in a footnote.
