id: SIR.35.29
reference: Sirach 35:29
source:
  edition: lxx-swete-1909
  text: ἕως ἔτι ζῇς καὶ πνοὴ ἐν σοί, μὴ ἀλλάξῃς σεαυτὸν πάσῃ σαρκί.
  language: Greek
  pages:
  - 729
  validation: no_reference
translation:
  text: As long as you still live and have breath in you, do not yield yourself to
    any flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'do not change yourself for any flesh.' The Greek wording
      is idiomatic and may carry the sense of not yielding yourself to mere mortals.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως ἔτι
  chosen: As long as you still
  alternatives:
  - while still
  - so long as yet
  lexicon: LSJ
  rationale: The phrase marks continuing duration with emphasis on the present remaining
    time. 'As long as you still' gives natural English while preserving the temporal
    force.
- source_word: ζῇς
  chosen: live
  alternatives:
  - are alive
  lexicon: LSJ
  rationale: 'Second-person singular present subjunctive after ἕως is naturally rendered
    with an English present: ''you live''/''you are alive.'' ''Live'' is concise and
    idiomatic.'
- source_word: πνοὴ
  chosen: breath
  alternatives:
  - spirit
  - life-breath
  lexicon: LSJ
  rationale: The ordinary sense is physical breath or breath of life. 'Breath' best
    fits the parallel with being alive and avoids importing a stronger anthropological
    claim such as 'spirit.'
- source_word: ἐν σοί
  chosen: in you
  alternatives:
  - within you
  lexicon: LSJ
  rationale: A straightforward locative expression. 'In you' is simple and preserves
    the Greek image.
- source_word: μὴ ἀλλάξῃς
  chosen: do not give yourself over
  alternatives:
  - do not change yourself
  - do not hand yourself over
  - do not submit yourself
  lexicon: LSJ
  rationale: Although ἀλλάσσω commonly means 'change' or 'exchange,' with reflexive
    σεαυτόν and dative πάσῃ σαρκί the sense is not mere self-alteration but yielding
    or transferring oneself to another's control. 'Give yourself over' captures the
    ethical warning in readable English while remaining anchored in the transfer/exchange
    idea.
- source_word: σεαυτὸν
  chosen: yourself
  lexicon: LSJ
  rationale: Reflexive direct object; explicitly retained because it is significant
    to the warning's force.
- source_word: πάσῃ σαρκί
  chosen: to any flesh
  alternatives:
  - to any person
  - to all flesh
  - to any mortal
  lexicon: LSJ
  rationale: σάρξ here is not the Pauline metaphor 'sinful nature' but the common
    Semitic/Greek expression for mortal human beings. 'Any flesh' preserves the source
    wording and its broad scope; 'any person' is interpretive and smoother but less
    transparent.
