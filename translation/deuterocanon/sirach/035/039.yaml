translation:
  text: The prayer of the humble has passed through the clouds, and until it draws
    near, it will not be comforted;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pierced the clouds'; the Greek image is of the humble person's prayer
      rising unhindered into God's presence.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek is slightly ambiguous: ''until it/he draws near, he/it will not
      be comforted.'' The translation takes the prayer as drawing near and the humble
      person as the one not yet comforted.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσευχὴ
  chosen: prayer
  alternatives:
  - petition
  lexicon: LSJ
  rationale: Standard sense in context of appeal to God; 'prayer' is the most natural
    modern English rendering.
- source_word: ταπεινοῦ
  chosen: of the humble
  alternatives:
  - of the lowly
  - of the afflicted
  lexicon: LSJ
  rationale: The genitive likely describes a humble/lowly person rather than merely
    social status. 'Humble' preserves the moral-spiritual nuance without over-specifying
    affliction.
- source_word: νεφέλας διῆλθεν
  chosen: has passed through the clouds
  alternatives:
  - pierced the clouds
  - went through the clouds
  lexicon: LSJ
  rationale: Aorist with vivid imagery of prayer rising unhindered to God. 'Passed
    through' is transparent and avoids adding interpretive force beyond the Greek.
- source_word: ἕως συνεγγίσῃ
  chosen: until it draws near
  alternatives:
  - until he draws near
  - until it comes near
  lexicon: LSJ
  rationale: 'The subject is somewhat ambiguous in isolation, but the nearest antecedent
    in the clause is the prayer. Rendering ''it draws near'' preserves the flow of
    the image: the prayer reaches its destination.'
- source_word: οὐ μὴ παρακληθῇ
  chosen: he will not be comforted
  alternatives:
  - he will not be consoled
  - it will not cease
  lexicon: LSJ
  rationale: Passive of παρακαλέω commonly means 'be comforted/consoled.' The masculine/generic
    sense likely refers to the humble person, not the prayer itself. This preserves
    the Greek's shift from the prayer to the pray-er.
