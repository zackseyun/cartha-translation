id: SIR.35.39
reference: Sirach 35:39
source:
  edition: lxx-swete-1909
  text: εἰ ἔστιν σοι οἰκέτης, ἔστω ὡς σύ, ὅτι ἐν αἵματι ἐκτήσω αὐτόν. εἰ ἔστιν σοι
    οἰκέτης, ἄγε αὐτὸν ὡς σεαυτόν, ὅτι ὡς ἡ ψυχή σου ἐπιδέησις αὐτόν. ἐὰν κακώσῃς
    αὐτὸν καὶ ἀπάρᾳς ἀποδρᾷ, ἐν ποίᾳ ὁδῷ ζητήσεις αὐτόν; XXXI (XXXIV) Κεναὶ ἐλπίδες
    καὶ ψευδεῖς ἀσυνέτῳ ἀνδρί, καὶ ἐνύπνια ἀναπτεροῦσιν ἄφρονας. ὡς δρασσόμενος σκιᾶς
    καὶ διώκων ἄνεμον, οὕτως ὁ ἐπέχων ἐνυπνίοις· τοῦτο κατὰ τούτου ὅρασις ἐνυπνίων,
    κατέναντι προσώπου ὁμοίωμα προσώπου. ἀπὸ ἀκαθάρτου τί καθαρισθήσεται; καὶ ἀπὸ
    ψευδοῦς τί ἀληθεύσει; μαντεῖαι καὶ οἰωνισμοὶ καὶ ἐνύπνια μάταιά ἐστιν, καὶ ὡς
    ὠδινούσης φαντάζεται καρδία. ἐὰν μὴ παρὰ Ὑψίστου ἀποσταλῇ ἐν ἐπισκοπῇ, μὴ δῷς
    εἰς αὐτὰ τὴν καρδίαν σου· πολλοὺς ἐπλάνησεν τὰ ἐνύπνια, καὶ ἐξέπεσον ἐλπίζοντες
    ἐπʼ αὐτοῖς. ἄνευ ψεύδους συντελεσθήσεται νόμος, καὶ σοφία στόματι πιστῷ τελείωσις.
    Ἀνὴρ πεπαιδευμένος ἔγνω πολλά, καὶ ὁ πολύπειρος ἐκδιηγήσεται σύνεσιν· ὃς οὐκ ἐπειράθη
    ὀλίγα οἶδεν, ὁ δὲ πεπλανημένος πληθυνεῖ πανουργίαν. πολλὰ ἑώρακα ἐν τῇ ἀποπλανήσει
    μου, καὶ πλείονα τῶν λόγων μου σύνεσίς μου· πλεονάκις ἕως θανάτου ἐκινδύνευσα,
    καὶ διεσώθην τούτων χάριν. πνεῦμα φοβουμένων Κύριον ζήσεται, ἡ γὰρ ἐλπὶς αὐτῶν
    ἐπὶ τὸν σώζοντα αὐτούς· ὁ φοβούμενος Κύριον οὐ μὴ εὐλαβηθήσεται, καὶ οὐ μὴ δειλιάσει,
    ὅτι αὐτὸς ἐλπὶς αὐτοῦ. φοβουμένου τὸν κύριον μακαρία ἡ ψυχή· τίνι ἐπέχει; καὶ
    τίς ἀντιστήριγμα αὐτοῦ; οἱ ὀφθαλμοὶ Κυρίου ἐπὶ τοὺς ἀγαπῶντας αὐτόν, ὑπερασπισμὸς
    δυναστείας καὶ στήριγμα ἰσχύος, σκέπη ἀπὸ καύσωνος καὶ σκέπη ἀπὸ μεσημβρίας, φυλακὴ
    ἀπὸ προσκόμματος καὶ βοήθεια ἀπὸ πτώματος· ἀνυψῶν ψυχὴν καὶ φωτίζων ὀφθαλμούς,
    ἴασιν διδοὺς ζωὴν καὶ εὐλογίαν. Θυσιάζων ἐξ ἀδίκου, προσφορὰ μεμωκημένη, καὶ οὐκ
    εἰς εὐδοκίαν μωκήματα ἀνόμων· οὐκ εὐδοκεῖ ὁ ὕψιστος ἐν προσφοραῖς ἀσεβῶν, οὐδὲ
    ἐν πλήθει θυσιῶν ἐξιλάσκεται ἁμαρτίας. θύων υἱὸν ἔναντι τοῦ πατρὸς αὐτοῦ ὁ προσάγων
    θυσίαν ἐκ χρημάτων πενήτων. ἄρτος ἐπιδεομένων ζωὴ πτωχῶν, ὁ ἀποστερῶν αὐτὴν ἄνθρωπος
    αἱμάτων. φονεύων τὸν πλησίον ὁ ἀφαιρούμενος συμβίωσιν, καὶ ἐκχέων αἷμα ὁ ἀποστερῶν
    μισθὸν μισθίου. εἷς οἰκοδομῶν καὶ εἷς καθαιρῶν, τί ὠφέλησαν πλεῖον ἢ κόπου; εἷς
    εὐχόμενος καὶ εἷς καταρώμενος, τίνος φωνῆς εἰσακούσεται ὁ δεσπότης; βαπτιζόμενος
    ἀπὸ νεκροῦ καὶ πάλιν ἁπτόμενος αὐτοῦ, τί ὠφέλησεν τῷ λουτρῷ αὐτοῦ; οὕτως ἄνθρωπος
    νηστεύων ἐπὶ τῶν ἁμαρτιῶν αὐτοῦ καὶ πάλιν πορευόμενος καὶ τὰ αὐτὰ ποιῶν· τῆς προσευχῆς
    αὐτοῦ τίς εἰσακούσεται; καὶ τί ὠφέλησεν ἐν τῷ ταπεινωθῆναι αὐτόν; ΧΧΧΙΙ (ΧΧΧV)
    Ὁ συντηρῶν νόμον πλεονάζει προσφοράς, θυσιάζων σωτήριον ὁ προσέχων ἐντολαῖς· {
    ἀνταποδιδοὺς χάριν ὁ προσφέρων σεμίδαλιν, καὶ ὁ ποιῶν ἐλεημοσύνας θυσιάζων αἰνέσεως.
    εὐδοκία Κυρίου ἀποστῆναι ἀπὸ πονηρίας, καὶ ἐξιλασμὸς ἀποστῆναι ἀπὸ ἀδικίας. μὴ
    ὀφθῇς ἐν προσώπῳ Κυρίου κενός, πάντα γὰρ ταῦτα χάριν ἐντολῆς. προσφορὰ δικαίου
    λιπαίνει θυσιαστήριον, καὶ ἡ εὐωδία αὐτῆς ἔναντι Ὑψίστου· θυσία ἀνδρὸς δικαίου
    δεκτή, καὶ τὸ μνημόσυνον αὐτῆς οὐκ ἐπιλησθήσεται. ἐν ἀγαθῷ ὀφθαλμῷ δόξασον τὸν
    κύριον, καὶ μὴ μικρύνῃς ἀπαρχὴν χειρῶν σου· ἐν πάσῃ δόσει ἱλάρωσον τὸ πρόσωπόν
    σου, καὶ ἐν εὐφροσύνῃ ἁγίασον δεκάτην. δὸς Ὑψίστῳ κατὰ τὴν δόσιν αὐτοῦ, καὶ ἐν
    ἀγαθῷ ὀφθαλμῷ καθ' εὕρεμα χειρός· ὅτι Κύριος ἀνταποδιδοὺς ἐστίν, καὶ ἑπταπλᾶ ἀνταποδώσει
    σοι. μὴ δωροκόπει, οὐ γὰρ προσδέξεται· καὶ μὴ ἔπεχε θυσία ἄδικῳ, ὅτι Κύριος κριτής
    ἐστιν, καὶ οὐκ ἔστιν παρ' αὐτῷ δόξα προσώπου. οὐ λήμψεται πρόσωπον ἐπὶ πτωχοῦ,
    καὶ δέησιν ἠδικημένου εἰσακούσεται· οὐ μὴ ὑπερίδῃ ἱκετίαν ὀρφανοῦ, καὶ χήραν ἐὰν
    ἐκχέῃ λαλιάν. { οὐχὶ δάκρυα χήρας ἐπὶ σιαγόνα καταβαίνει, καὶ ἡ καταβόησις ἐπὶ
    τῷ καταγαγόντι αὐτά; θεραπεύων ἐν εὐδοκίᾳ δεχθήσεται, καὶ ἡ δέησις αὐτοῦ ἕως νεφελῶν
    συνάψει· προσευχὴ ταπεινοῦ νεφέλας διῆλθεν, καὶ ἕως συνεγγίσῃ, οὐ μὴ παρακληθῇ·
    καὶ οὐ μὴ ἀποστῇ ἕως ἐπισκέψηται ὁ ὕψιστος, καὶ κρινεῖ δικαίως καὶ ποιήσει κρίσιν.
    § C καὶ ὁ κύριος οὐ μὴ βραδύνῃ οὐδὲ μὴ μακροθυμήσει ἐπʼ αὐτοῖς, ἕως ἂν συντρίψῃ
    ὀσφὺν ἀνελεημόνων, καὶ τοῖς ἔθνεσιν ἀνταποδώσει ἐκδίκησιν· ἕως ἐξάρῃ πλῆθος ὑβριστῶν
    καὶ σκῆπτρα ἀδίκων συντρίψει· ἕως ἀνταποδῷ ἀνθρώπῳ κατὰ τὰς πράξεις αὐτοῦ, καὶ
    τὰ ἔργα τῶν ἀνθρώπων κατὰ τὰ ἐνθυμήματα αὐτῶν· ἕως κρίνῃ τὴν κρίσιν τοῦ λαοῦ αὐτοῦ
    καὶ εὐφράνει αὐτοὺς ἐν τῷ ἐλέει αὐτοῦ. ὡραῖον ἔλεος ἐν καιρῷ θλίψεως αὐτοῦ, ὡς
    νεφέλαι ὑετοῦ ἐν καιρῷ ἀβροχίας. Ἐλέησον ἡμᾶς, δέσποτα ὁ θεὸς πάντων, καὶ ἐπίβλεψον,
    καὶ ἐπίβαλε τὸν φόβον σου ἐπὶ πάντα τὰ ἔθνη· ἔπαρον τὴν χεῖρά σου ἐπὶ ἔθνη ἀλλότρια,
    καὶ ἰδέτωσαν τὴν δυναστείαν σου. ὥσπερ ἐνώπιον αὐτῶν ἡγιάσθης ἐν ἡμῖν, οὕτως ἐνώπιον
    ἡμῶν μεγαλυνθείης ἐν αὐτοῖς· καὶ ἐπιγνώτωσάν σε καθάπερ καὶ ἡμεῖς ἐπέγνωμεν, ὅτι
    οὐκ ἔστιν θεὸς πλὴν σοῦ, Κύριε. ἐγκαίνισον σημεῖα καὶ ἀλλοίωσον θαυμάσια, δόξασον
    χεῖρα καὶ βραχίονα δεξιόν· ἔγειρον θυμὸν καὶ ἔκχεον ὀργήν, ἔξαρον ἀντίδικον καὶ
    ἔκτριψον ἐχθρόν. σπεῦσον καιρὸν καὶ μνήσθητι ὁρκισμοῦ, καὶ ἐκδιηγήσασθωσαν τὰ
    μεγαλεῖά σου. ἐν ὀργῇ πυρὸς καταβρωθήτω ὁ σωζόμενος, καὶ οἱ ἀδικοῦντες τὸν λαόν
    σου εὕροισαν ἀπώλειαν. σύντριψον κεφαλὰς ἀρχόντων ἐχθρῶν, λεγόντων Οὐκ ἔστιν πλὴν
    ἡμῶν. 13a σύναγε πάσας φυλὰς Ἰακώβ,¶ 16b καὶ κατακληρονομήσεις αὐτοὺς καθὼς ἀπʼ
    ἀρχῆς. ἐλέησον λαόν, Κύριε, κεκλημένον ἐπʼ ὀνόματί σου, καὶ Ἰσραὴλ ὃν πρωτόγονον
    ὡμοίωσας. οἰκτείρησον πόλιν ἁγιάσματός σου, Ἰερουσαλήμ, πόλιν καταπαύματός σου·
    πλῆσον Σιὼν ἀρεταλογίας σου, καὶ ἀπὸ τῆς δόξης σου τὸν λαόν σου. δὸς μαρτύριον
    τοῖς ἐν ἀρχῇ κτίσμασίν σου, καὶ ἔγειρον προφητείας τὰς ἐπʼ ὀνόματί σου· δὸς μισθὸν
    τοῖς ὑπομένουσίν σε, καὶ οἱ προφῆταί σου ἐμπιστευθήτωσαν. εἰσάκουσον, Κύριε, δεήσεως
    τῶν ἱκετῶν σου κατὰ τὴν εὐλογίαν Ἀαρὼν περὶ τοῦ λαοῦ σου, καὶ γνώσονται πάντες
    οἱ ἐπὶ τῆς γῆς ὅτι Κύριος εἶ, ὁ θεὸς τῶν αἰώνων. Πᾶν βρῶμα φάγεται κοιλία, ἔστιν
    δὲ βρῶμα βρώματος κάλλιον. φάρυγξ γίνεται βρώματα θήρας, οὕτως καρδία συνετὴ λόγους
    ψευδεῖς. καρδία στρεβλὴ δώσει λύπην, καὶ ἄνθρωπος πολύπειρος ἀνταποδώσει αὐτῷ.
    πάντα ἄρρενα ἐπιδέξεται γυνή, ἔστιν δὲ θυγάτηρ θυγατρὸς κρείσσον. κάλλος γυναικὸς
    ἱλαρύνει πρόσωπον, καὶ ὑπὲρ πᾶσαν ἐπιθυμίαν ἀνθρώπου ὑπεράγει· εἰ ἔστιν ἐπὶ γλώσσης
    αὐτῆς ἔλεος καὶ πραΰτης, οὐκ ἔστιν ὁ ἀνὴρ αὐτῆς καθ᾽ υἱοὺς ἀνθρώπων. ὁ κτώμενος
    γυναῖκα ἐνάρχεται κτήσεως, βοηθὸν κατ᾽ αὐτὸν καὶ στύλον ἀναπαύσεως. οὗ οὐκ ἔστιν
    φραγμός, διαρπαγήσεται κτῆμα· καὶ οὗ οὐκ ἔστιν γυνή, στενάξει πλανώμενος. τίς
    γὰρ πιστεύσει εὐζώνῳ λῃστῇ σφαλλομένῳ ἐκ πόλεως εἰς πόλιν; οὕτως ἀνθρώπῳ μὴ ἔχοντι
    νοσσιὰν καὶ καταλύοντι οὗ ἐὰν ὀψίσῃ.
