theological_decisions:
- issue: Ambiguity of subject in the second colon
  chosen_reading: The prayer draws near, while the humble person is the one not comforted
    until God responds.
  alternative_readings:
  - The humble person draws near and is not comforted until then
  - The prayer itself is personified throughout the whole verse
  rationale: The Greek allows some ambiguity because the first clause centers on 'prayer'
    while the passive verb can naturally refer to the person praying. The chosen rendering
    preserves the poetic movement without over-resolving the imagery.
  doctrine_reference: Preserve theological tension rather than resolve it.
