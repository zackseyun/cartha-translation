translation:
  text: Any food is shut up in the belly, but one kind of food is more pleasant than
    another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is slightly compressed: literally, ''there is food from food that
      is pleasant.'' The sense is comparative: one kind of food is more pleasant than
      another.'
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel in this location differs substantially from the extant
      Hebrew and appears to reflect a different line of text; the translation here
      follows the Hebrew witness as the primary source.
    reason: textual_variant
lexical_decisions:
- source_word: כל מאכל
  chosen: Any food
  alternatives:
  - All food
  - Every kind of food
  lexicon: HALOT
  rationale: כל with a singular noun can express totality distributively. 'Any food'
    gives natural English while preserving the general statement.
- source_word: תסגר
  chosen: is shut up
  alternatives:
  - is enclosed
  - is confined
  - is shut in
  lexicon: HALOT
  rationale: 'The Niphal/passive sense fits the clause: food ends up enclosed in the
    stomach. ''Is shut up'' preserves the concrete image better than a more interpretive
    paraphrase.'
- source_word: בבטן
  chosen: in the belly
  alternatives:
  - in the stomach
  - in the womb
  lexicon: HALOT
  rationale: In this context of eating, 'belly' clearly refers to the digestive organ,
    not womb. 'Belly' keeps the earthy concreteness of the Hebrew better than the
    more clinical 'stomach'.
- source_word: אך
  chosen: but
  alternatives:
  - yet
  - however
  lexicon: HALOT
  rationale: Marks contrast between the common fate of all food in digestion and the
    differing experience of taste or pleasure.
- source_word: יש מאכל ממאכל
  chosen: one kind of food ... than another
  alternatives:
  - there is food better than food
  - one food ... than another
  lexicon: HALOT
  rationale: The comparative construction is somewhat compressed in Hebrew. Rendering
    it idiomatically as a comparison between kinds of food best conveys the sense
    without over-literal awkwardness.
- source_word: תנעם
  chosen: is more pleasant
  alternatives:
  - is sweeter
  - is more agreeable
  - gives more delight
  lexicon: HALOT
  rationale: From נעם, expressing pleasantness or agreeableness. 'More pleasant' fits
    the comparative sense implied by ממאכל and avoids narrowing the meaning to sweetness
    alone.
