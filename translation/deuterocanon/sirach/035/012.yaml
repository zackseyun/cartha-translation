translation:
  text: Fill Zion with your splendor, and your temple with your glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness at this verse reads very differently ('There play, and
      carry out your thoughts, and do not sin with a proud word'), indicating a substantial
      textual divergence from the extant Hebrew form.
    reason: textual_variant
lexical_decisions:
- source_word: מלא
  chosen: Fill
  alternatives:
  - Satisfy
  - Make full
  lexicon: HALOT
  rationale: 'Imperative sense from מלא is straightforward: a request that Zion and
    the temple be filled. ''Fill'' is the most natural and direct English equivalent.'
- source_word: ציון
  chosen: Zion
  alternatives:
  - Jerusalem
  lexicon: HALOT
  rationale: Proper place-name; transliterated rather than interpreted. Although Zion
    can metonymically refer to Jerusalem, the Hebrew names Zion specifically.
- source_word: הודך
  chosen: your splendor
  alternatives:
  - your majesty
  - your beauty
  - your glory
  lexicon: HALOT
  rationale: הוד commonly denotes splendor, majesty, or stately radiance. 'Splendor'
    fits well here and avoids repeating 'glory' in both cola, preserving the poetic
    distinction between הוד and כבוד.
- source_word: ומכבודך
  chosen: and your temple with your glory
  alternatives:
  - and from your glory [fill] your temple
  - and with your glory [fill] your temple
  lexicon: HALOT
  rationale: The Hebrew is elliptical in the second colon, with the verb understood
    from the first. The prefixed מ in מכבודך is best taken in context as indicating
    the filling substance/source, idiomatically rendered 'with your glory' in English.
    This yields a clear parallel line.
- source_word: היכלך
  chosen: your temple
  alternatives:
  - your palace
  - your sanctuary
  lexicon: HALOT
  rationale: היכל can mean palace or temple, but in this prayer context paired with
    Zion it refers to God's temple/sanctuary. 'Temple' is the clearest modern English
    rendering.
- source_word: כבודך
  chosen: your glory
  alternatives:
  - your honor
  - your majesty
  lexicon: HALOT
  rationale: כבוד regularly denotes glory/honor. 'Glory' is the standard and best
    contextual fit in a prayer for divine presence to fill the temple.
