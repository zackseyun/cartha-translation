theological_decisions:
- issue: Poetic distinction between הוד and כבוד
  chosen_reading: Render הוד as 'splendor' and כבוד as 'glory'
  alternative_readings:
  - Render both as 'glory' for smoother English
  - Render הוד as 'majesty' and כבוד as 'glory'
  rationale: The Hebrew uses two related but distinct terms for divine radiance/honor.
    Preserving the distinction reflects the poetic texture without importing extra
    theology.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
- issue: Use of Hebrew as primary witness with Greek kept in view
  chosen_reading: Translate the extant Hebrew prayer line as the main text
  alternative_readings:
  - Follow the Greek parallel wording instead
  rationale: For Sirach, where Hebrew survives, the project translates from the Hebrew
    witness while consulting the Greek. The Greek parallel here diverges substantially
    and appears to reflect a different textual form, so it is not used for the main
    wording of this verse.
  doctrine_reference: PHILOSOPHY.md § What we are translating
