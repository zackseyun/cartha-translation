id: SIR.35.35
reference: Sirach 35:35
source:
  edition: lxx-swete-1909
  text: ζυγὸς καὶ ἱμὰς κάμψουσιν τράχηλον, καὶ οἰκέτῃ κακούργῳ στρέβλαι καὶ βάσανοι·
  language: Greek
  pages:
  - 729
  validation: no_reference
translation:
  text: A yoke and a strap will bend the neck, and for a wicked servant there are
    racks and tortures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a wicked servant, racks and tortures.' The Greek οἰκέτης can denote
      a household servant, but the coercive context here favors 'slave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ζυγός
  chosen: yoke
  alternatives:
  - balance
  - pair
  lexicon: LSJ
  rationale: In this context with neck-bending imagery, the concrete sense 'yoke'
    is plainly intended, not the unrelated sense of a balance.
- source_word: ἱμάς
  chosen: strap
  alternatives:
  - thong
  - lash
  lexicon: LSJ
  rationale: The word denotes a leather strap or thong. 'Strap' is clear modern English
    and fits the image of restraint alongside 'yoke.'
- source_word: κάμψουσιν
  chosen: will bend
  alternatives:
  - will bow
  - will force down
  lexicon: LSJ
  rationale: Future active plural from κάμπτω. 'Will bend' preserves the physical
    image without overinterpreting the degree of coercion.
- source_word: τράχηλον
  chosen: the neck
  alternatives:
  - neck
  lexicon: LSJ
  rationale: Direct anatomical reference; English idiom naturally takes the article
    here.
- source_word: οἰκέτῃ
  chosen: slave
  alternatives:
  - servant
  - household servant
  lexicon: LSJ
  rationale: Although οἰκέτης can denote a household servant, the surrounding imagery
    is coercive and punitive, so the bonded status is salient. Per doctrine on δουλος-related
    servile terms, 'slave' better preserves the force than the softer 'servant.'
- source_word: κακούργῳ
  chosen: wicked
  alternatives:
  - criminal
  - evildoing
  - bad
  lexicon: LSJ
  rationale: As an adjective modifying οἰκέτῃ, it characterizes the slave as morally
    bad or troublesome. 'Wicked' is concise and preserves moral force; 'criminal'
    would narrow the sense too much.
- source_word: στρέβλαι
  chosen: racks
  alternatives:
  - twisting devices
  - instruments of torture
  lexicon: LSJ
  rationale: The noun refers to instruments of torture, especially the rack. 'Racks'
    keeps the concrete plural and matches the punitive parallelism with βάσανοι.
- source_word: βάσανοι
  chosen: tortures
  alternatives:
  - torments
  - tests by torture
  lexicon: LSJ
  rationale: In this context the punitive sense is primary. 'Tortures' is the most
    direct and natural rendering in English.
