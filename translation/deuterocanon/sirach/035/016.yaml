translation:
  text: And all the ends of the earth will know that you are the eternal God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek tradition reads: ''Those who fear the Lord will find judgment, and
      they will kindle righteous deeds like light.'' The Hebrew witness here preserves
      a substantially different line.'
    reason: textual_variant
  - marker: b
    text: Or 'the eternal God' / 'the everlasting God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וידעו
  chosen: will know
  alternatives:
  - shall know
  - may know
  - let ... know
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed waw in poetic/wisdom context is best rendered
    as a future/resultative statement here: ''will know.'' This follows the straightforward
    Hebrew sense and fits the prayer-like declaration of universal recognition.'
- source_word: כל אפסי ארץ
  chosen: all the ends of the earth
  alternatives:
  - all the remotest parts of the earth
  - all the extremities of the earth
  lexicon: HALOT
  rationale: אפסי ארץ is a standard Hebrew idiom for the farthest reaches of the world.
    'Ends of the earth' is the most natural and recognizable English equivalent while
    remaining formally close.
- source_word: אלהי עולם
  chosen: the God of eternity
  alternatives:
  - the eternal God
  - God forever
  - the everlasting God
  lexicon: HALOT
  rationale: The Hebrew construct literally reads 'God of eternity/forever.' I chose
    'the God of eternity' to preserve the noun עולם rather than converting it into
    an adjective. This keeps the Hebrew texture while remaining intelligible. 'The
    eternal God' is smoother English but slightly more interpretive.
- source_word: אתה
  chosen: you are
  alternatives:
  - you alone are
  lexicon: HALOT
  rationale: The pronoun is explicit and emphatic in Hebrew, but there is no lexical
    basis for adding 'alone.' English naturally conveys the clause as 'you are,' with
    the pronoun itself carrying the emphasis.
