theological_decisions:
- issue: Gendered distinction between τέκνα and υἱῶν
  chosen_reading: Render τέκνα as 'children' and υἱῶν as 'sons'
  alternative_readings:
  - Render both as 'children' for smoother English
  rationale: The Greek intentionally uses a broader term first and a narrower masculine
    term second. Preserving that distinction is more transparent to the source and
    aligns with the project's gender-accurate policy.
