id: SIR.35.30
reference: Sirach 35:30
source:
  edition: lxx-swete-1909
  text: κρεῖσσον γάρ ἐστιν τὰ τέκνα δεηθῆναί σου ἢ σὲ ἐμβλέπειν εἰς χεῖρας υἱῶν σου.
  language: Greek
  pages:
  - 729
  validation: no_reference
translation:
  text: For it is better that your children should beg from you than that you should
    look to the hands of your sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ask from you' rather than 'beg from you'; the Greek verb can denote
      earnest petition more generally.
    reason: lexical_alternative
  - marker: b
    text: Literally 'look to the hands of your sons,' an image of depending on them
      for support.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖσσον
  chosen: better
  alternatives:
  - superior
  - preferable
  lexicon: LSJ
  rationale: Comparative adjective introducing a value judgment; 'better' is the most
    natural modern English equivalent.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: LSJ
  rationale: τέκνα is broader than υἱοί and naturally means 'children.' The verse
    then contrasts this with the more specific υἱῶν later, so preserving the distinction
    is important.
- source_word: δεηθῆναί
  chosen: should beg
  alternatives:
  - should ask
  - should entreat
  - should be in need of
  lexicon: LSJ
  rationale: From δέομαι, here in the sense of asking earnestly or imploring for help.
    In context of dependence within a household economy, 'beg' best conveys the force
    of needy petition, though stronger than a bare 'ask.'
- source_word: ἐμβλέπειν
  chosen: should look to
  alternatives:
  - should look upon
  - should depend on
  - should gaze at
  lexicon: LSJ
  rationale: Literally 'to look at/upon,' but with εἰς χεῖρας it idiomatically suggests
    looking toward someone for provision or help. 'Look to' preserves the image while
    making the dependence clear.
- source_word: εἰς χεῖρας
  chosen: to the hands
  alternatives:
  - upon the hands
  - for help from the hands
  lexicon: LSJ
  rationale: The Greek is concrete and should be retained. 'Hands' evokes the means
    of support or provision; keeping the bodily image avoids over-paraphrase.
- source_word: υἱῶν
  chosen: sons
  alternatives:
  - children
  lexicon: LSJ
  rationale: Unlike τέκνα earlier, υἱῶν is specifically 'sons.' The translation preserves
    the source's gendered distinction in keeping with the project's gender-accurate
    policy.
