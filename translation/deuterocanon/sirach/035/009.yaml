theological_decisions:
- issue: Source divergence between the surviving Hebrew and the Greek parallel
  chosen_reading: Translate the extant Hebrew as the primary text for this verse,
    while noting the Greek parallel reflects a substantially different line.
  alternative_readings:
  - 'Greek parallel: ''In the midst of nobles do not make yourself equal, and when
    another is speaking do not babble much.'''
  rationale: For Sirach, the project translates from Hebrew where it survives. Here
    the Hebrew witness presents a restoration prayer, while the Greek parallel in
    Swete is a different saying entirely, indicating a verse-numbering or textual
    mismatch. The English main text therefore follows the Hebrew, and the Greek is
    preserved in a footnote as a textual-variant-level note because it materially
    affects the verse's content.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve
