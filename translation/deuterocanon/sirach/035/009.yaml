translation:
  text: Gather all the tribes of Jacob, and let them receive their inheritance as
    in former days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel at this verse reads instead: ''In the midst of nobles
      do not make yourself equal, and when another is speaking do not babble much.''
      This appears to reflect a different textual line or verse alignment than the
      surviving Hebrew.'
    reason: textual_variant
lexical_decisions:
- source_word: אסוף
  chosen: Gather
  alternatives:
  - Collect
  - Assemble
  lexicon: HALOT
  rationale: Imperative from אסף, calling for bringing together what is scattered.
    'Gather' is natural modern English and preserves the summons-like force.
- source_word: כל שבטי יעקב
  chosen: all the tribes of Jacob
  alternatives:
  - every tribe of Jacob
  - all Jacob's tribes
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Tribes of Jacob' preserves the ancestral/covenantal
    framing better than a more paraphrastic possessive.
- source_word: ויתנחלו
  chosen: let them receive their inheritance
  alternatives:
  - and let them inherit
  - and let them possess their inheritance
  - and may they be allotted an inheritance
  lexicon: HALOT
  rationale: From נחל in the hitpael/nifal-related inheritance sense, referring to
    obtaining an allotted inheritance. 'Receive their inheritance' makes explicit
    the land/allotment nuance in idiomatic English without over-specifying the object
    beyond what the verb implies.
- source_word: כימי קדם
  chosen: as in former days
  alternatives:
  - as in days of old
  - as in ancient days
  lexicon: HALOT
  rationale: An idiom meaning the earlier, ancient time. 'Former days' is readable
    modern English while retaining the backward-looking restoration sense.
