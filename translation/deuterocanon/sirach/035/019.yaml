translation:
  text: Any male will accept a woman, but a man will choose a young woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do nothing without counsel, and when you act, do not
      regret it.'' The Greek tradition here reflects a substantially different text
      from the extant Hebrew.'
    reason: textual_variant
lexical_decisions:
- source_word: כָּל זָכָר
  chosen: Any male
  alternatives:
  - Every male
  - Any man
  lexicon: HALOT
  rationale: The Hebrew is explicitly biological/gendered ('male'), not the more common
    איש in the first colon. 'Any male' preserves the sharper contrast with the second
    colon, where איש appears. 'Every male' is possible, but 'any' better conveys the
    proverb-like generalization in idiomatic English.
- source_word: תְּקַבֵּל
  chosen: will accept
  alternatives:
  - receives
  - takes
  lexicon: HALOT
  rationale: קבל commonly means receive/accept. 'Accept' fits the relational context
    without over-specifying marriage or sexual union. 'Takes' would sound too forceful
    and import nuance not explicit in the Hebrew.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - wife
  lexicon: HALOT
  rationale: The noun can mean 'woman' or 'wife.' Here the saying is generic and contrasts
    with עלמה in the second colon; 'woman' is the less interpretively loaded choice.
    'Wife' would narrow the sense to marriage, which the Hebrew does not explicitly
    mark.
- source_word: אַךְ
  chosen: but
  alternatives:
  - yet
  - however
  - only
  lexicon: HALOT
  rationale: The conjunction marks contrast between indiscriminate acceptance and
    selective choice. 'But' is the clearest natural English rendering.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The second colon shifts from זכר to איש. Rendering it 'a man' preserves
    the lexical distinction and the gender-accurate wording of the Hebrew.
- source_word: יִבְחַר
  chosen: will choose
  alternatives:
  - selects
  - prefers
  lexicon: HALOT
  rationale: בחר straightforwardly means choose/select. 'Will choose' keeps the proverbial
    future and the deliberative nuance.
- source_word: עַלְמָה
  chosen: a young woman
  alternatives:
  - a maiden
  - a virgin
  lexicon: HALOT
  rationale: עלמה denotes a young woman of marriageable age; 'young woman' is the
    most defensible default. 'Maiden' is archaic, and 'virgin' is too specific for
    the lexical evidence. This is a significant lexical choice because of the term's
    broader interpretive history elsewhere.
