id: SIR.35.33
reference: Sirach 35:33
source:
  edition: lxx-swete-1909
  text: χορτάσματα καὶ ῥάβδος καὶ φορτία ὄνῳ, ἄρτος καὶ παιδεία καὶ ἔργον οἰκέτῃ.
  language: Greek
  pages:
  - 729
  validation: no_reference
translation:
  text: Fodder and a stick and loads are for a donkey; bread and discipline and work
    are for a slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a rod' for ῥάβδος.
    reason: lexical_alternative
  - marker: b
    text: Or 'instruction' or 'training' for 'discipline' (παιδεία).
    reason: lexical_alternative
  - marker: c
    text: Greek οἰκέτῃ refers specifically to a household slave or servant; 'household
      slave' is a more explicit alternative.
    reason: lexical_alternative
lexical_decisions:
- source_word: χορτάσματα
  chosen: fodder
  alternatives:
  - feed
  - provender
  lexicon: LSJ
  rationale: Refers to animal feed, especially what satisfies hunger; 'fodder' is
    natural English for what is given to a donkey.
- source_word: ῥάβδος
  chosen: a stick
  alternatives:
  - a rod
  - a staff
  lexicon: LSJ
  rationale: The term can mean rod, staff, or stick. In this proverb-like list about
    managing a donkey, 'stick' is the most idiomatic and least overinterpreted English;
    'rod' could sound more formal or disciplinary than the immediate image requires.
- source_word: φορτία
  chosen: loads
  alternatives:
  - burdens
  - cargo
  lexicon: LSJ
  rationale: The plural denotes things carried by a beast of burden. 'Loads' fits
    the concrete sense better than the more abstract 'burdens'.
- source_word: ὄνῳ
  chosen: for a donkey
  alternatives:
  - to a donkey
  lexicon: LSJ
  rationale: Dative of reference/suitability in a nominal clause; 'for a donkey' communicates
    what belongs to or suits a donkey in context.
- source_word: ἄρτος
  chosen: bread
  alternatives:
  - food
  lexicon: LSJ
  rationale: The Greek specifically says 'bread.' Although it can stand broadly for
    food, there is no need to generalize here.
- source_word: παιδεία
  chosen: discipline
  alternatives:
  - instruction
  - training
  - correction
  lexicon: LSJ
  rationale: In this triad paired with bread and work for a household slave, the sense
    is practical correction/training rather than abstract education alone. 'Discipline'
    best preserves that force while remaining readable.
- source_word: ἔργον
  chosen: work
  alternatives:
  - labor
  - task
  lexicon: LSJ
  rationale: Simple, direct rendering of the noun in a household-labor context.
- source_word: οἰκέτῃ
  chosen: a slave
  alternatives:
  - a servant
  - a household slave
  lexicon: LSJ
  rationale: An οἰκέτης is a household slave/servant. Following project philosophy,
    'slave' is preferred where bonded status is salient; here the proverb concerns
    the management of a dependent household laborer, so the bonded aspect should not
    be softened away. 'Household slave' is more precise but heavier than the terse
    parallelism of the line.
