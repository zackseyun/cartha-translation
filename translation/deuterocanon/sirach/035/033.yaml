theological_decisions:
- issue: Rendering of οἰκέτῃ in a wisdom saying about household labor
  chosen_reading: a slave
  alternative_readings:
  - a servant
  - a household slave
  rationale: Although this is not a major doctrinal crux, the project's stated policy
    prefers 'slave' over 'servant' where the bonded nature is salient. In this context
    the saying compares a donkey's provisions and implements with those assigned to
    an οἰκέτης, so preserving the social asymmetry matters.
