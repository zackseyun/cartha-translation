theological_decisions:
- issue: Covenantal identity in 'called by your name'
  chosen_reading: Retain the idiom as a marker of divine ownership/covenant association
  alternative_readings:
  - Interpret more dynamically as 'who belong to you'
  rationale: The Hebrew idiom carries theological resonance found elsewhere in Scripture.
    Preserving it maintains the text's covenantal texture without adding interpretation
    beyond the wording.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
- issue: Meaning of קניתה with Israel as firstborn
  chosen_reading: Render as 'whom you acquired'
  alternative_readings:
  - whom you created
  - whom you possessed
  - whom you purchased
  rationale: The verb is semantically broad. 'Acquired' best fits the covenantal-historical
    sense of God taking Israel as his own, while avoiding a stronger doctrinal claim
    not explicit in the verse. Alternative nuances are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; do not import doctrinal
    claims the text does not make.'
