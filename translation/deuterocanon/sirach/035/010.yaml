translation:
  text: Have mercy on the people called by your name, on Israel, your firstborn, whom
    you acquired.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who bear your name.' The Hebrew idiom denotes a people identified as
      belonging to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'whom you possessed,' 'whom you purchased,' or possibly 'whom you created.'
      The Hebrew verb can carry several related senses.
    reason: alternative_reading
  - marker: c
    text: The Greek parallel in Swete reads a substantially different line here, reflecting
      a different textual tradition; this translation follows the extant Hebrew witness.
    reason: textual_variant
lexical_decisions:
- source_word: רַחֵם
  chosen: Have mercy
  alternatives:
  - Show compassion
  - Pity
  lexicon: HALOT
  rationale: Imperative of רחם, a plea for compassionate action. 'Have mercy' is idiomatic,
    weighty, and fits prayer language without sounding archaic.
- source_word: עַל־עָם
  chosen: on the people
  alternatives:
  - on a people
  - on your people
  lexicon: HALOT
  rationale: עם here is a collective singular. The absence of an explicit possessive
    in Hebrew is preserved; 'the people' is more literal than 'your people,' though
    the following phrase identifies them as God's people.
- source_word: נִקְרָא בִּשְׁמֶךָ
  chosen: called by your name
  alternatives:
  - who bear your name
  - named by your name
  lexicon: HALOT
  rationale: This is a standard covenantal expression for belonging/identification.
    'Called by your name' preserves the Hebrew idiom and its biblical resonance.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name transliterated per project philosophy.
- source_word: בְּכוֹר
  chosen: firstborn
  alternatives:
  - your firstborn
  - firstborn son
  lexicon: HALOT
  rationale: The noun means 'firstborn.' Although filial nuance is present, the Hebrew
    text here does not explicitly add 'son' or the possessive suffix, so the simpler
    rendering is preferred.
- source_word: קָנִיתָה
  chosen: you acquired
  alternatives:
  - you created
  - you possessed
  - you purchased
  lexicon: HALOT
  rationale: From קנה, which can mean acquire/possess/create depending on context.
    In relation to Israel as God's firstborn people, 'acquired' best captures covenantal
    possession without overcommitting to either commercial 'purchased' or cosmological
    'created.' The Greek parallel in Swete is unrelated here and likely reflects a
    different textual tradition, so the Hebrew governs.
