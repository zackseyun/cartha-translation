translation:
  text: Hasten the end and attend to the appointed time, for who will tell you what
    you should do?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel tradition here reads very differently: ''Speak, young
      man, if there is need of you, scarcely twice if you are asked.'' This appears
      to reflect a different textual form rather than a close translation of the extant
      Hebrew.'
    reason: textual_variant
  - marker: b
    text: Hebrew 'what you will do' can also be rendered 'what to do'; the translation
      'what you should do' brings out the practical force of the rhetorical question.
    reason: lexical_alternative
lexical_decisions:
- source_word: החיש
  chosen: Hasten
  alternatives:
  - Make haste for
  - Speed
  lexicon: HALOT
  rationale: Imperative from חושׁ, calling for urgency. 'Hasten' preserves the direct
    imperative force without adding an object beyond the Hebrew.
- source_word: קץ
  chosen: the end
  alternatives:
  - an end
  - the outcome
  lexicon: HALOT
  rationale: קץ commonly means 'end' or 'termination.' With the imperative, the phrase
    is terse and somewhat elliptical; 'the end' best reflects the Hebrew while allowing
    the line's proverbial force to stand.
- source_word: ופקוד
  chosen: and attend to
  alternatives:
  - and visit
  - and appoint
  - and take note of
  lexicon: HALOT
  rationale: פקד has a broad semantic range including attend, visit, appoint, or take
    account of. In this context with מועד, 'attend to' best captures active regard
    for the fixed time without overcommitting to a technical sense.
- source_word: מועד
  chosen: the appointed time
  alternatives:
  - the set time
  - the season
  - the meeting time
  lexicon: HALOT
  rationale: מועד often denotes an appointed or fixed time. 'Appointed time' is the
    most natural English equivalent and preserves the sense of a divinely or otherwise
    fixed occasion.
- source_word: כי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding imperatives; 'for' is concise
    and natural.
- source_word: מי יאמר לך
  chosen: who will tell you
  alternatives:
  - who can tell you
  - who is there to tell you
  lexicon: HALOT
  rationale: The Hebrew is straightforward future/interrogative. 'Who will tell you'
    preserves the directness and rhetorical force.
- source_word: מה תעשה
  chosen: what you should do
  alternatives:
  - what you will do
  - what to do
  lexicon: HALOT
  rationale: Literally 'what you will do,' but in English the idiomatic force in this
    rhetorical question points to guidance or instruction. 'What you should do' brings
    out that practical sense while remaining close to the Hebrew. The Greek parallel
    in Swete is markedly different and does not control the translation here, but
    it confirms that the tradition around this verse is unstable enough to warrant
    noting the Hebrew's direct sense.
