id: SIR.35.31
reference: Sirach 35:31
source:
  edition: lxx-swete-1909
  text: ἐν πᾶσι τοῖς ἔργοις σου γίνου ὑπεράγων, μὴ δῷς μῶμον ἐν τῇ δόξῃ σου.
  language: Greek
  pages:
  - 729
  validation: no_reference
translation:
  text: In all your works be preeminent; do not give a blemish to your honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not bring a blemish upon your reputation'; Greek 'glory' here likely
      carries the sense of honor or good name.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πᾶσι τοῖς ἔργοις σου
  chosen: In all your works
  alternatives:
  - In everything you do
  - In all your deeds
  lexicon: LSJ
  rationale: A straightforward rendering of the prepositional phrase. 'Works' preserves
    the lexical link with ἔργα while remaining natural English; 'everything you do'
    is possible but slightly more dynamic.
- source_word: γίνου
  chosen: be
  alternatives:
  - become
  - show yourself
  lexicon: LSJ
  rationale: The present middle imperative of γίνομαι here functions idiomatically
    as an exhortation to conduct or character. 'Be' is concise and natural in English;
    'become' sounds overly process-oriented in this context.
- source_word: ὑπεράγων
  chosen: outstanding
  alternatives:
  - surpassing
  - excellent
  - preeminent
  lexicon: LSJ
  rationale: The participial/adjectival sense conveys excelling beyond the ordinary.
    'Outstanding' captures the comparative force in idiomatic modern English without
    sounding inflated; 'surpassing' is more literal but less natural here.
- source_word: μὴ δῷς
  chosen: do not give
  alternatives:
  - do not bring
  - do not cause
  lexicon: LSJ
  rationale: The aorist subjunctive with μή gives a prohibition. 'Do not give' stays
    close to the Greek; in English the object phrase clarifies the idiom.
- source_word: μῶμον
  chosen: a blemish
  alternatives:
  - a stain
  - fault
  - disgrace
  lexicon: LSJ
  rationale: μῶμος/μῶμον denotes blame, blemish, or reproach. 'Blemish' preserves
    the concrete metaphor and fits the honor-language of the clause. 'Disgrace' is
    interpretive and stronger than necessary.
- source_word: ἐν τῇ δόξῃ σου
  chosen: to your honor
  alternatives:
  - in your glory
  - upon your reputation
  lexicon: LSJ
  rationale: 'δόξα can mean glory, honor, or reputation. In this wisdom context, the
    sense is one''s honor or good name rather than radiant ''glory.'' Rendering the
    preposition idiomatically as ''to'' produces natural English: ''do not give a
    blemish to your honor.'''
