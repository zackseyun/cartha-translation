theological_decisions:
- issue: Rendering of עבדיך in address to God
  chosen_reading: your servants
  alternative_readings:
  - your slaves
  rationale: The project prefers 'slave' where bonded status is theologically salient,
    but here the prayer idiom emphasizes worshipful service and covenant relation
    rather than social bondage. 'Servants' better matches the source intent in context.
  doctrine_reference: 'DOCTRINE.md: δοῦλος / servant-slave context-dependent principle
    applied analogically to Hebrew עבד'
- issue: Sense of כרצונך
  chosen_reading: according to your favor
  alternative_readings:
  - according to your will
  rationale: Choosing 'favor' preserves the likely benevolent nuance of רצון in a
    petition for divine hearing. 'According to your will' is possible but can sound
    more abstract and less relational than the Hebrew likely intends.
  doctrine_reference: 'DOCTRINE.md: preserve source plain sense over translation tradition'
