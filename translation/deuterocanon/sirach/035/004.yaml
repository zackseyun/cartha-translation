translation:
  text: Where there is listening, do not pour out speech, and do not show off wisdom
    at the wrong time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The supplied Hebrew witness in Zone 1 appears mismatched to Sirach 35:4;
      the translation therefore follows the Greek parallel, which reads a warning
      about speaking and displaying wisdom at an inappropriate time.
    reason: textual_variant
  - marker: b
    text: Or 'Where there is an audience, do not pour out talk.' The Greek ἀκρόαμα
      can refer either to listening/hearing or to an audience.
    reason: lexical_alternative
  - marker: c
    text: Or 'do not play the wise man at the wrong time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  chosen: Where
  alternatives:
  - Wherever
  - In a place where
  lexicon: LSJ
  rationale: The Hebrew witness given in Zone 1 appears mismatched to this verse,
    while the Greek parallel aligns with the expected sense of Sirach 35:4. ὅπου is
    best rendered as a locative/concessive 'where' introducing the circumstance.
- source_word: ἀκρόαμα
  chosen: there is listening
  alternatives:
  - there is an audience
  - hearing
  lexicon: BDAG
  rationale: The noun denotes hearing/listening or an audience. 'There is listening'
    preserves the situational sense without over-specifying a formal audience; the
    context is about restraint in speech.
- source_word: μὴ ἐκχέῃς
  chosen: do not pour out
  alternatives:
  - do not spill
  - do not gush out
  lexicon: BDAG
  rationale: The verb literally means 'pour out.' Retaining the metaphor gives the
    line vividness and reflects the Greek closely; pairing it with 'speech' makes
    the idiom intelligible in English.
- source_word: λαλιάν
  chosen: speech
  alternatives:
  - talk
  - words
  lexicon: BDAG
  rationale: λαλιά can mean speech, talk, or manner of speaking. 'Speech' is natural
    and slightly weightier than 'talk,' fitting wisdom literature.
- source_word: ἀκαίρως
  chosen: at the wrong time
  alternatives:
  - inopportunely
  - out of season
  - untimely
  lexicon: BDAG
  rationale: The adverb means 'at an inappropriate time.' 'At the wrong time' is clear
    modern English and preserves the wisdom emphasis on fittingness.
- source_word: μὴ σοφίζου
  chosen: do not show off wisdom
  alternatives:
  - do not play the wise man
  - do not act wise
  - do not display wisdom
  lexicon: BDAG
  rationale: The middle/passive form here carries the sense of making oneself appear
    wise or parading wisdom. 'Do not show off wisdom' captures the warning against
    ostentatious cleverness better than the flatter 'do not be wise.'
