translation:
  text: And again, if there is healing for the tongue, it is not among human beings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Hebrew line in the supplied Cairo Geniza witness appears mismatched
      or corrupt at this verse; the translation therefore follows the Greek parallel,
      which reads coherently: ''Whoever trusts in the law gives heed to the commandments,
      and whoever trusts in the Lord will not be diminished.'''
    reason: textual_variant
  - marker: b
    text: '''Will not be diminished'' could also be rendered ''will not be brought
      low'' or, more interpretively, ''will not lack.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πιστεύων / ה[implicit trust concept from parallel]
  chosen: whoever trusts
  alternatives:
  - the one who believes
  - whoever has faith
  lexicon: BDAG
  rationale: The extant Hebrew in Zone 1 appears corrupt or mismatched to this verse,
    while the Greek parallel provides a clear sense built on πιστεύω. 'Trusts' best
    conveys reliance in idiomatic modern English and fits both clauses.
- source_word: νόμῳ
  chosen: the law
  alternatives:
  - Law
  - instruction
  lexicon: BDAG
  rationale: In Sirach's Jewish wisdom context, νόμος refers to the Torah/the law.
    Lowercase 'the law' is readable English while still signaling the covenantal instruction.
- source_word: προσέχει
  chosen: gives heed to
  alternatives:
  - pays attention to
  - keeps
  - attends to
  lexicon: BDAG
  rationale: '''Gives heed to'' preserves the attentiveness of προσέχω without overtranslating
    it as full obedience (''keeps'').'
- source_word: ἐντολαῖς
  chosen: the commandments
  alternatives:
  - the commands
  - the commandments of the law
  lexicon: BDAG
  rationale: A standard and transparent rendering that matches the religious-ethical
    register of the verse.
- source_word: Κυρίῳ
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord'. Here the Greek deuterocanonical
    source uses Κυρίῳ; 'the Lord' is the project's default rendering.
- source_word: οὐκ ἐλαττωθήσεται
  chosen: will not be diminished
  alternatives:
  - will not be brought low
  - will not lack
  - will not be disappointed
  lexicon: BDAG
  rationale: The future passive of ἐλαττόω most directly means 'be diminished' or
    'made less.' This preserves the lexical force without importing a more interpretive
    result such as 'disappointed.'
