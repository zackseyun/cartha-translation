id: SIR.35.28
reference: Sirach 35:28
source:
  edition: lxx-swete-1909
  text: υἱῷ καὶ γυναικί, ἀδελφῷ καὶ φίλῳ μὴ δῷς ἐξουσίαν ἐπὶ σὲ ἐν ζωῇ σου· καὶ μὴ
    δῷς ἑτέρῳ τὰ χρήματά σου, ἵνα μὴ μεταμεληθεὶς δέῃ περὶ αὐτῶν.
  language: Greek
  pages:
  - 729
  validation: no_reference
translation:
  text: Do not give authority over yourself in your lifetime to son or wife, brother
    or friend; and do not give your property to another, lest you regret it and have
    to ask for it back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest, after regretting it, you be reduced to asking about them / pleading
      for them.' The Greek final clause is somewhat compressed, and the exact nuance
      of δέῃ περὶ αὐτῶν may be understood more literally as 'be in need concerning
      them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ δῷς ἐξουσίαν
  chosen: do not give authority
  alternatives:
  - do not hand over power
  - do not grant control
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority, right, or power. 'Give authority'
    preserves the concrete verbal construction and the warning against surrendering
    personal control, while remaining natural English.
- source_word: ἐπὶ σὲ
  chosen: over yourself
  alternatives:
  - over you
  - against you
  lexicon: LSJ
  rationale: With ἐξουσίαν, ἐπὶ σέ conveys authority exercised over the person. 'Over
    yourself' fits idiomatic English after 'give authority' and makes explicit the
    reflexive sense implied by the context.
- source_word: ἐν ζωῇ σου
  chosen: in your lifetime
  alternatives:
  - while you live
  - during your life
  lexicon: BDAG
  rationale: The phrase marks the time during which one should not relinquish control.
    'In your lifetime' is concise and idiomatic, preserving the temporal force.
- source_word: υἱῷ καὶ γυναικί, ἀδελφῷ καὶ φίλῳ
  chosen: to son or wife, brother or friend
  alternatives:
  - to a son and a wife, a brother and a friend
  - to your son or wife, your brother or friend
  lexicon: LSJ
  rationale: The datives list close relations to whom one might be tempted to yield
    control. English uses 'or' naturally in prohibitive lists of examples. Articles
    and possessives are not explicit in Greek, so they are omitted.
- source_word: τὰ χρήματά σου
  chosen: your property
  alternatives:
  - your money
  - your possessions
  - your assets
  lexicon: BDAG
  rationale: χρήματα can mean money or possessions/property more broadly. Since the
    warning concerns transferring one's means to another and later needing them back,
    'property' best captures the broader scope without sounding overly technical.
- source_word: ἑτέρῳ
  chosen: to another
  alternatives:
  - to someone else
  - to a different person
  lexicon: BDAG
  rationale: ἕτερος here refers generally to another person. 'To another' is simple
    and sufficiently literal.
- source_word: ἵνα μὴ μεταμεληθεὶς
  chosen: lest you regret it
  alternatives:
  - so that you may not later regret it
  - lest, having changed your mind
  lexicon: BDAG
  rationale: μεταμέλομαι denotes regret or remorse, often after an action. 'Lest you
    regret it' captures the participle's practical sense in smooth English.
- source_word: δέῃ περὶ αὐτῶν
  chosen: have to ask for it back
  alternatives:
  - have to beg concerning them
  - be in need because of them
  - have to request them
  lexicon: BDAG
  rationale: δέω in this form can mean be in need or lack, but in context with περὶ
    αὐτῶν after giving away one's property, the sense is needing to ask for those
    things back. This rendering makes the implied consequence explicit and coherent
    in English. Singular 'it' is used idiomatically for collective property.
