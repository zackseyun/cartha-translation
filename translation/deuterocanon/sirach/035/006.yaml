translation:
  text: Stir up anger and pour out wrath; humble the foe and drive back the enemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel in Swete differs sharply here and reads a line about
      an emerald seal in gold workmanship and music with pleasant wine. The Hebrew
      witness is well attested in the Cairo Geniza tradition and is followed here
      as the primary source for this verse.
    reason: textual_variant
lexical_decisions:
- source_word: העיר
  chosen: Stir up
  alternatives:
  - Awaken
  - Rouse
  lexicon: HALOT
  rationale: Imperative from עור in the causative sense, calling for arousing or stirring
    into action. 'Stir up' is idiomatic modern English and preserves the force of
    an urgent imperative.
- source_word: אף
  chosen: anger
  alternatives:
  - nose
  - wrath
  lexicon: HALOT
  rationale: Though literally 'nose,' אף commonly denotes anger. Here paired with
    חמה, it is best rendered as 'anger' to preserve the poetic parallel without collapsing
    both terms into the same English word.
- source_word: ושפוך
  chosen: and pour out
  alternatives:
  - and spill
  - and unleash
  lexicon: HALOT
  rationale: The verb שפך literally means 'pour out.' This concrete image is common
    in expressions of divine judgment and should be retained rather than paraphrased.
- source_word: חמה
  chosen: wrath
  alternatives:
  - heat
  - rage
  - fury
  lexicon: HALOT
  rationale: חמה can denote heat or rage; in this judicial/prayer context 'wrath'
    best conveys intense punitive anger and complements 'anger' in the previous colon.
- source_word: והכניע
  chosen: humble
  alternatives:
  - subdue
  - bring low
  lexicon: HALOT
  rationale: The verb כנע means to humble or subdue. 'Humble' preserves the literal
    lowering motif and fits the parallelism with the following command against the
    enemy.
- source_word: צר
  chosen: the foe
  alternatives:
  - the adversary
  - the oppressor
  - the enemy
  lexicon: HALOT
  rationale: צר denotes an adversary or hostile oppressor. 'Foe' gives a concise singular
    object and avoids repeating 'enemy' immediately before the final colon.
- source_word: והדוף
  chosen: and drive back
  alternatives:
  - and thrust away
  - and repel
  lexicon: HALOT
  rationale: From הדף, meaning to push away or drive off. 'Drive back' is natural
    English and preserves the military/judicial force of repelling hostile powers.
- source_word: אויב
  chosen: the enemy
  alternatives:
  - the one who hates
  - the hostile one
  lexicon: HALOT
  rationale: אויב is the standard term for enemy. Retaining it in the final colon
    preserves the climactic parallelism of the Hebrew.
