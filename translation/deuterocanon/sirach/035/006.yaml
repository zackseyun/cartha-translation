theological_decisions:
- issue: Addressee and implied subject of the imperatives
  chosen_reading: The verse is rendered as a direct petition to God with second-person
    imperatives left implicit in English.
  alternative_readings:
  - A generalized exhortation without explicit divine addressee
  rationale: The Hebrew consists of imperative verbs without an expressed subject,
    but in context this is a prayer addressed to God. English imperatives naturally
    preserve that force without adding 'O Lord,' which the verse itself does not state.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import claims the text does not make.
