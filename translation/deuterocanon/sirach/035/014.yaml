translation:
  text: Give the recompense of those who wait for you, and let your prophets be found
    faithful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those who hope in you.' The Hebrew verb can carry both waiting and
      hoping.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek witness reads quite differently here, with the sense: ''He who
      fears the Lord will receive instruction, and those who rise early will find
      favor.'' This likely reflects a different textual form.'
    reason: alternative_reading
lexical_decisions:
- source_word: תן
  chosen: Give
  alternatives:
  - Grant
  - Render
  lexicon: HALOT
  rationale: Imperative of נתן, a direct petition to God. 'Give' is the most natural
    and sufficiently formal English imperative here.
- source_word: פעלת
  chosen: the reward
  alternatives:
  - the work
  - the recompense
  - the deed
  lexicon: HALOT
  rationale: Although פעלה can denote 'work/deed,' in context with divine response
    to those who hope/wait for God it most plausibly refers to what is due or effected
    for them, i.e., their recompense/reward. The Greek parallel's favorable-result
    language (εὐδοκίαν) supports a benefactive sense rather than merely 'work.' 'Reward'
    communicates the likely sense in idiomatic English.
- source_word: קוויך
  chosen: those who wait for you
  alternatives:
  - those who hope in you
  - those who look for you
  lexicon: HALOT
  rationale: From קוה, which can mean 'wait for' or 'hope in.' 'Wait for you' preserves
    the temporal-expectant nuance while still implying trust. Because English readers
    may also hear 'hope in you,' that alternative is preserved in a footnote.
- source_word: ונביאיך
  chosen: and your prophets
  lexicon: HALOT
  rationale: 'Straightforward construct with pronominal suffix: ''and your prophets.''
    Retained literally.'
- source_word: יאמנו
  chosen: be found faithful
  alternatives:
  - be confirmed
  - be believed
  - prove true
  lexicon: HALOT
  rationale: From אמן, here likely expressing verification or vindication of the prophets
    as trustworthy/true. The Greek parallel differs substantially, so the Hebrew is
    primary; 'be found faithful' captures both reliability and vindication in context
    without overcommitting to a narrower forensic sense.
