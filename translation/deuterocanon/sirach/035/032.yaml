id: SIR.35.32
reference: Sirach 35:32
source:
  edition: lxx-swete-1909
  text: ἐν ἡμέρᾳ συντελείας ἡμερῶν ζωῆς σου καὶ ἐν καιρῷ τελευτῆς διάδος κληρονομίαν.
  language: Greek
  pages:
  - 729
  validation: no_reference
translation:
  text: On the day your life's days are completed, and at the time of your death,
    distribute the inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the end of your life'; the Greek literally speaks of the completion
      of the days of your life.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἡμέρᾳ
  chosen: On the day
  alternatives:
  - In the day
  - At the day
  lexicon: BDAG
  rationale: The preposition ἐν with a temporal dative is naturally rendered as a
    temporal expression in English. 'On the day' is idiomatic and preserves the specific
    time reference.
- source_word: συντελείας
  chosen: are completed
  alternatives:
  - consummation
  - end
  - completion
  lexicon: BDAG
  rationale: 'The noun denotes completion or bringing to an end. In the phrase ''day
    of the completion of the days of your life,'' English reads more naturally by
    expressing the sense verbally: ''when your life''s days are completed.'' This
    preserves the formal sense without awkwardness.'
- source_word: ἡμερῶν ζωῆς σου
  chosen: your life's days
  alternatives:
  - the days of your life
  - your days of life
  lexicon: BDAG
  rationale: The genitive construction literally means 'the days of your life.' The
    chosen rendering keeps the Hebrew-like idiom visible while remaining readable.
    The full English line also reflects the sense as 'your life's days are completed.'
- source_word: καιρῷ τελευτῆς
  chosen: the time of your death
  alternatives:
  - the season of your end
  - the time of your departure
  lexicon: BDAG
  rationale: καιρός here is a fitting or appointed time, and τελευτή means end or
    death. 'The time of your death' is the clearest modern English rendering and does
    not soften the mortality in the Greek.
- source_word: διάδος
  chosen: distribute
  alternatives:
  - give
  - apportion
  - hand over
  lexicon: BDAG
  rationale: This aorist imperative calls for an act of giving out or assigning. 'Distribute'
    fits the context of inheritance allocation better than the more generic 'give'
    and preserves the sense of deliberate apportionment.
- source_word: κληρονομίαν
  chosen: the inheritance
  alternatives:
  - inheritance
  - your inheritance
  - the estate
  lexicon: BDAG
  rationale: κληρονομία refers to an inheritance or hereditary property. 'The inheritance'
    is a natural English object for the imperative and avoids over-specifying with
    'estate,' while the article helps the sentence read idiomatically in English.
