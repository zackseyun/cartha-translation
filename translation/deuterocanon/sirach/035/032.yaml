theological_decisions:
- issue: Whether to soften τελευτή as 'end' rather than 'death'
  chosen_reading: death
  alternative_readings:
  - end
  - departure
  rationale: The Greek term can denote end generally, but in this context of final
    disposition of inheritance it most naturally refers to death. Rendering it as
    'death' preserves the practical and moral force of the instruction without importing
    additional theology.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve source plain sense over tradition.'
