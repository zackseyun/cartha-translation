- issue: Rendering of σάρξ in a wisdom admonition
  chosen_reading: flesh
  alternative_readings:
  - person
  - human being
  - anyone
  rationale: DOCTRINE.md gives 'flesh' as the default literal rendering for σάρξ unless
    the context is metaphorical. Here the term likely means human beings generally,
    but the context does not require replacing the concrete term with an abstract
    equivalent. The more idiomatic sense is preserved in alternatives.
