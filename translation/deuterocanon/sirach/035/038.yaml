id: SIR.35.38
reference: Sirach 35:38
source:
  edition: lxx-swete-1909
  text: εἰς ἔργα κατάστησον καθὼς πρέπει αὐτῷ, κἂν μὴ πειθαρχῇ, βάρυνον τὰς πέδας
    αὐτοῦ. καὶ μὴ περισσεύσῃς ἐν πάσῃ σαρκί, καὶ ἄνευ κρίσεως μὴ ποιήσῃς μηδέν.
  language: Greek
  pages:
  - 729
  validation: no_reference
translation:
  text: Assign him work as is fitting for him; and if he does not obey discipline,
    make his fetters heavy. But do not be excessive with any flesh, and do nothing
    without judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''with anyone'' / ''toward any person.'' Greek: ''with any flesh.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἔργα κατάστησον
  chosen: Assign him work
  alternatives:
  - Set him to work
  - Appoint him to tasks
  lexicon: LSJ
  rationale: καθίστημι with εἰς + accusative can mean appointing or setting someone
    into a role or task. 'Assign him work' is natural English while preserving the
    directive force.
- source_word: καθὼς πρέπει αὐτῷ
  chosen: as is fitting for him
  alternatives:
  - as befits him
  - as is appropriate for him
  lexicon: LSJ
  rationale: πρέπει conveys what is fitting or proper. 'As is fitting for him' keeps
    the ethical/propriety nuance without sounding archaic.
- source_word: πειθαρχῇ
  chosen: obey discipline
  alternatives:
  - obey
  - submit
  - be compliant
  lexicon: LSJ
  rationale: πειθαρχέω is more than generic hearing; it is obedience to authority
    or rule. 'Obey discipline' reflects the disciplinary household/work context implied
    by the verse.
- source_word: βάρυνον τὰς πέδας αὐτοῦ
  chosen: make his fetters heavy
  alternatives:
  - weigh down his shackles
  - put heavy fetters on him
  lexicon: LSJ
  rationale: πέδαι are fetters/shackles, literally restraints on the feet. 'Make his
    fetters heavy' stays close to the Greek and avoids over-specifying beyond the
    text.
- source_word: μὴ περισσεύσῃς
  chosen: do not be excessive
  alternatives:
  - do not go too far
  - do not exceed proper measure
  lexicon: LSJ
  rationale: περισσεύω here carries the sense of exceeding due measure. 'Do not be
    excessive' captures the warning against overdoing severity.
- source_word: ἐν πάσῃ σαρκί
  chosen: with any flesh
  alternatives:
  - toward any person
  - with anyone
  lexicon: LSJ
  rationale: σάρξ literally means 'flesh.' In this wisdom context it refers broadly
    to human beings/mortals. Following doctrine, the literal 'flesh' is retained because
    the usage is not clearly metaphorical; this also preserves the earthy anthropological
    tone.
- source_word: ἄνευ κρίσεως
  chosen: without judgment
  alternatives:
  - without discernment
  - without due consideration
  - without justice
  lexicon: LSJ
  rationale: κρίσις can denote judgment, decision, or discernment. 'Without judgment'
    is broad enough to include prudent evaluation and judicial fairness, fitting the
    admonitory context.
- source_word: μὴ ποιήσῃς μηδέν
  chosen: do nothing
  alternatives:
  - do not do anything
  lexicon: LSJ
  rationale: The double-negative construction is idiomatic prohibition. 'Do nothing'
    is concise and natural English.
