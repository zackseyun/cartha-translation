theological_decisions:
- issue: Anthropomorphic language for divine power
  chosen_reading: Retain 'hand,' 'arm,' and 'right hand' literally
  alternative_readings:
  - Paraphrase as 'power' or 'might'
  rationale: The Hebrew uses bodily imagery for divine action. Following the project's
    preference for source-text primacy and preserving theological texture, the anthropomorphic
    metaphors are kept rather than flattened into abstraction.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Use of the Greek parallel where the Hebrew is terse and somewhat abrupt
  chosen_reading: Follow the Hebrew as primary while allowing the Greek to confirm
    that the verse is a petition for renewed displays of divine power
  alternative_readings:
  - Translate more freely toward the Greek's different wording
  rationale: Zone 1 identifies the Hebrew as the primary witness with high confidence.
    The Greek parallel is substantially different in wording, so it serves as a consistency
    check rather than the base text here.
