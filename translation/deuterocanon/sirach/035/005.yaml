translation:
  text: Renew a sign and repeat a wonder; glorify the hand and strengthen the arm
    and the right hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel in Swete differs substantially here, reading imagery
      about a seal of carbuncle on golden ornament and musical harmony at a wine banquet.
      Because the Hebrew witness is extant and marked high-confidence, the translation
      follows the Hebrew; the Greek is noted as a significant parallel divergence.
    reason: textual_variant
lexical_decisions:
- source_word: חדש
  chosen: Renew
  alternatives:
  - Make new
  - Repeat
  lexicon: HALOT
  rationale: The imperative asks for a fresh manifestation or renewal. 'Renew' preserves
    the verbal force without over-interpreting whether the act is repetition or new
    display.
- source_word: אות
  chosen: a sign
  alternatives:
  - a token
  - an omen
  lexicon: HALOT
  rationale: '''Sign'' is the standard and most transparent rendering for אות in biblical
    Hebrew, especially in contexts of divine display.'
- source_word: ושנה
  chosen: and repeat
  alternatives:
  - and renew
  - and do again
  lexicon: HALOT
  rationale: From שנה in the sense 'repeat/do a second time.' Paired with 'sign' and
    'wonder,' it naturally calls for another mighty act.
- source_word: מופת
  chosen: a wonder
  alternatives:
  - a portent
  - a marvel
  lexicon: HALOT
  rationale: '''Wonder'' fits biblical idiom for extraordinary divine acts. ''Portent''
    is possible but less natural in modern English.'
- source_word: האדר
  chosen: glorify
  alternatives:
  - magnify
  - make majestic
  lexicon: HALOT
  rationale: The imperative likely calls for displaying majesty. 'Glorify' communicates
    manifested splendor in readable English.
- source_word: יד
  chosen: the hand
  lexicon: HALOT
  rationale: A common anthropomorphic image for power. Retained literally rather than
    paraphrased as 'power' to preserve the Hebrew imagery.
- source_word: ואמץ
  chosen: and strengthen
  alternatives:
  - and make strong
  - and show strength in
  lexicon: HALOT
  rationale: The verb conveys strengthening or making firm. 'Strengthen' is the most
    direct English equivalent.
- source_word: זרוע
  chosen: the arm
  lexicon: HALOT
  rationale: Literal rendering preserves the stock biblical metaphor of active power.
- source_word: וימין
  chosen: and the right hand
  alternatives:
  - and the right arm
  lexicon: HALOT
  rationale: The Hebrew noun is specifically 'right hand.' Though somewhat appositional
    with 'arm,' it is best preserved literally.
