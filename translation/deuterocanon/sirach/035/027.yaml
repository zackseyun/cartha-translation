translation:
  text: So is the man who has no nest, resting wherever evening overtakes him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew text is somewhat terse and may be textually uncertain. The line is
      translated from the surviving Hebrew, with the Greek tradition kept in view
      as a consistency check.
    reason: textual_variant
  - marker: b
    text: Or 'who has no home.' The Hebrew literally says 'who has no nest,' preserving
      the image of a creature without a fixed place to settle.
    reason: lexical_alternative
lexical_decisions:
- source_word: כן
  chosen: So also
  alternatives:
  - Thus
  - Likewise
  lexicon: HALOT
  rationale: Introduces a comparison or analogy. 'So also' preserves the proverbial
    simile force in natural English.
- source_word: איש
  chosen: the man
  alternatives:
  - a man
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine. Per project philosophy, a gender-accurate
    rendering is preferred unless context clearly universalizes beyond the masculine
    form. Here the proverb speaks of a representative individual, so 'the man' preserves
    the source form.
- source_word: אשר לא קן
  chosen: who has no nest
  alternatives:
  - who has no home
  - who has no resting place
  lexicon: HALOT
  rationale: קן literally means 'nest.' Although metaphorical for dwelling or home,
    retaining 'nest' preserves the image and fits the verse's comparison. 'Home' is
    interpretive and smoother, but less transparent to the Hebrew imagery.
- source_word: המרגיע
  chosen: finding rest
  alternatives:
  - resting
  - settling down
  - who rests
  lexicon: HALOT
  rationale: From the root רגע/רגע in a causative or participial form related to quieting/resting.
    'Finding rest' conveys the ongoing participial sense in idiomatic English without
    overcommitting to a technical stem analysis in a textually uncertain line.
- source_word: כאשר יערב
  chosen: wherever evening overtakes him
  alternatives:
  - when evening comes
  - as evening falls
  - where evening finds him
  lexicon: HALOT
  rationale: The phrase points to the arrival of evening as the determining circumstance
    for where the person rests. 'Wherever evening overtakes him' brings out the implied
    lack of fixed lodging more clearly than a simple temporal clause.
