translation:
  text: Bring your gift with a cheerful eye, and dedicate your tithe with gladness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew of this verse is difficult and appears partially corrupt
      in places; the Greek parallel has been used to recover the likely sense, especially
      in the first two clauses.
