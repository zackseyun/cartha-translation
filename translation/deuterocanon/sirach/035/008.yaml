lexical_decisions:
- source_word: השבת
  chosen: sum up
  alternatives:
  - bring back
  - return
  - conclude
  lexicon: HALOT
  rationale: The Hebrew form from שוב in this context is difficult if taken literally
    as 'return.' In light of the Greek parallel κεφαλαίωσον ('sum up, bring to a head'),
    the sense is to bring speech to a concise conclusion or summary. 'Sum up' is idiomatic
    modern English and fits both witnesses.
- source_word: ראש
  chosen: sum up
  alternatives:
  - head
  - chief point
  - beginning
  lexicon: HALOT
  rationale: Literally 'head,' but paired with השבת it likely contributes the idiom
    of bringing something to its main point. The Greek κεφαλαίωσον confirms a 'head/sum'
    sense rather than a literal anatomical or positional one.
- source_word: פאתי
  chosen: your speech
  alternatives:
  - your utterance
  - your words
  - the edges/corners
  lexicon: HALOT
  rationale: The Hebrew reading is textually awkward as transmitted, and on its own
    could suggest 'corners/edges.' The Greek parallel has λόγον ('word, speech'),
    which likely reflects the intended sense of the line. 'Your speech' gives a natural
    singular collective in English and matches the admonitory style.
- source_word: מואב
  chosen: in few words say much
  alternatives:
  - Moab
  - many things
  - abundance
  lexicon: HALOT
  rationale: The Hebrew as pointed in Kahana appears corrupt or highly uncertain here;
    a literal 'Moab' makes no contextual sense. The Greek parallel ἐν ὀλίγοις πολλά
    ('in few things/words, many') supplies the coherent instructional sense. The English
    rendering follows the recoverable meaning rather than the opaque surface form
    of the damaged Hebrew witness.
- source_word: האומר
  chosen: be like one who knows
  alternatives:
  - the one who says
  - one speaking
  lexicon: HALOT
  rationale: 'The extant Hebrew wording diverges sharply from the Greek here, but
    the verse''s second colon in Greek clearly gives an imperative comparison: γίνου
    ὡς γινώσκων, ''be as one knowing.'' Since the task requires using the Greek parallel
    as actual input where the Hebrew is uncertain, this clause is rendered from the
    clearer parallel sense.'
- source_word: γίνου ὡς γινώσκων
  chosen: Be like one who knows
  alternatives:
  - Be as one understanding
  - Act like someone knowledgeable
  lexicon: BDAG
  rationale: This Greek clause is straightforward and likely preserves the intended
    wisdom exhortation where the Hebrew is unstable. 'One who knows' is concise and
    preserves the participial force.
- source_word: ἅμα σιωπῶν
  chosen: and yet keeps silent
  alternatives:
  - while also being silent
  - and at the same time remaining silent
  lexicon: BDAG
  rationale: The phrase commends restraint alongside knowledge. 'And yet keeps silent'
    captures the paradoxical wisdom tone in idiomatic English better than a wooden
    temporal rendering.
