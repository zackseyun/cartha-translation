translation:
  text: My son, do not mock the life of the poor, and do not grieve a poor and bitter
    soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Do not deprive the poor of his life,'' which may also be understood
      as ''Do not deprive the poor of his livelihood.'''
    reason: alternative_reading
  - marker: b
    text: Hebrew 'soul' here can also mean 'life,' 'self,' or 'person.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: The Hebrew directly addresses a male child/son in the conventional wisdom-teaching
    formula. Following the project's gender-accurate policy, 'My son' preserves the
    source form better than the more neutral 'My child,' though the instruction has
    broader applicability.
- source_word: אַל תִּלְעַג
  chosen: do not mock
  alternatives:
  - do not ridicule
  - do not laugh at
  lexicon: HALOT
  rationale: The verb conveys derision or scorn. 'Mock' is concise, natural English
    and preserves the ethical force of forbidding contempt toward the poor.
- source_word: לְחַיֵּי עָנִי
  chosen: the life of the poor
  alternatives:
  - the livelihood of the poor
  - the living of the poor
  lexicon: HALOT
  rationale: The Hebrew literally reads 'to/at the life of a poor person.' The Greek
    parallel has 'do not deprive the life of the poor,' which supports understanding
    this as the poor person's life-condition or means of living. 'The life of the
    poor' keeps the Hebrew wording while remaining intelligible.
- source_word: וְאַל תַּדְאִיב
  chosen: do not grieve
  alternatives:
  - do not cause pain to
  - do not sadden
  lexicon: HALOT
  rationale: The verb means to cause pain, sorrow, or grief. 'Do not grieve' is a
    natural imperative in English and captures the emotional harm in view.
- source_word: נֶפֶשׁ
  chosen: soul
  alternatives:
  - life
  - person
  - self
  lexicon: HALOT
  rationale: In Hebrew wisdom literature, nephesh can denote life, self, or inner
    being. Here, paired with 'bitter,' it points to the afflicted inner life of the
    poor person. 'Soul' preserves that depth, though the semantic range includes 'person'
    or 'life.'
- source_word: עָנֵי
  chosen: poor
  alternatives:
  - afflicted
  - needy
  lexicon: HALOT
  rationale: The adjective denotes one who is poor or afflicted. Since the verse's
    social-ethical concern is material vulnerability, 'poor' is the clearest main
    rendering.
- source_word: וּמַר נָפֶשׁ
  chosen: and bitter soul
  alternatives:
  - and embittered in soul
  - and one bitter of soul
  lexicon: HALOT
  rationale: The phrase literally means 'and bitter of soul.' It likely further characterizes
    the poor person as deeply distressed. Rendering it as 'and bitter soul' keeps
    the compact Hebrew parallelism while reading naturally enough in English.
