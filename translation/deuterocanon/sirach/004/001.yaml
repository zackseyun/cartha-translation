theological_decisions:
- issue: Relationship between the Hebrew and Greek witnesses in the first colon
  chosen_reading: Translate the Hebrew main text as 'do not mock the life of the poor'
    while allowing the Greek to inform the sense of social harm.
  alternative_readings:
  - '''do not deprive the poor of his livelihood'' (guided more strongly by the Greek
    ἀποστερήσῃς)'
  rationale: The Hebrew witness is primary where extant, but the Greek parallel is
    an actual input and suggests that the prohibition concerns not merely inward contempt
    but harmful treatment of the poor person's life-condition. The main text stays
    anchored in the Hebrew wording, with the Greek-supported alternative preserved
    in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual translation input'
- issue: Gendered address in wisdom instruction
  chosen_reading: '''My son'''
  alternative_readings:
  - '''My child'''
  rationale: The source uses a masculine singular filial address typical of wisdom
    literature. Per doctrine, gender-accurate rendering is preferred over neutralization
    unless context demands otherwise.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
