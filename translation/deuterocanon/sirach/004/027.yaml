translation:
  text: Do not abase yourself before a fool, and do not show partiality before rulers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'do not spread out your soul/self to a fool'; the Greek parallel
      clarifies the idiom as self-abasement before a foolish person.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the second line is less transparent in isolation and could
      be taken differently, but the Greek parallel reads 'do not accept the face of
      a ruler,' supporting the sense 'do not show partiality before rulers.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּצַּע
  chosen: Do not abase yourself
  alternatives:
  - Do not spread yourself out
  - Do not humble yourself
  - Do not lay yourself down
  lexicon: HALOT
  rationale: The Hebrew verb from יצע literally suggests spreading out or laying down,
    and the Greek parallel ὑποστρώσῃς σεαυτόν clarifies the idiom as making oneself
    a mat/underlay before someone. In context this is metaphorical self-debasement
    before a contemptible person, so 'abase yourself' best captures the sense in natural
    English while remaining anchored to the imagery.
- source_word: לְנָבָל
  chosen: before a fool
  alternatives:
  - for a fool
  - to a fool
  - before a disgraceful man
  lexicon: HALOT
  rationale: נבל commonly denotes a fool in the moral sense, not merely an unintelligent
    person. The preposition ל with the idiom is rendered 'before' in light of the
    Greek ἀνθρώπῳ μωρῷ and the social posture implied by the clause.
- source_word: נַפְשֶׁךָ
  chosen: yourself
  alternatives:
  - your soul
  - your life
  - your person
  lexicon: HALOT
  rationale: Hebrew נפש often refers to the self or person, not narrowly the immaterial
    soul. English idiom requires an object for the reflexive sense of the verb here,
    and the Greek σεαυτόν confirms that the intended sense is 'yourself.'
- source_word: וְאַל תַּאֲמֵן
  chosen: do not show partiality
  alternatives:
  - do not favor
  - do not trust
  - do not be compliant
  lexicon: HALOT
  rationale: The consonantal form could suggest 'trust,' but the Greek parallel μὴ
    λάβῃς πρόσωπον points strongly to the idiom of showing favor/partiality, likely
    reflecting a Hebrew sense aligned with 'accept a face.' Given the parallel source
    is to be used as actual translation input, 'show partiality' best represents the
    clause's likely meaning.
- source_word: לִפְּנֵי מוֹשְׁלִים
  chosen: before rulers
  alternatives:
  - in the presence of rulers
  - before powerful men
  - before princes
  lexicon: HALOT
  rationale: מושלים are those who rule or exercise authority. 'Rulers' is the most
    direct and broadly understandable rendering. 'Before' preserves the social setting
    of appearing in their presence.
