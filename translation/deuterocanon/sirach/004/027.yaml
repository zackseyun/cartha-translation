- issue: Interpretation of the second colon, where the Hebrew form תַּאֲמֵן could
    be read in a way not obviously matching the Greek parallel
  chosen_reading: Render the line as a warning against showing partiality before rulers
  alternative_readings:
  - do not trust in the presence of rulers
  - do not be compliant before rulers
  rationale: 'The Hebrew witness is primary, but the Greek parallel is explicitly
    provided as translation input and strongly supports the social-judicial idiom
    of favoring persons (''receive a face''). Because the Hebrew wording here is less
    transparent in isolation, the Greek helps disambiguate the intended sense. This
    preserves the proverb''s parallelism: do not debase yourself before fools, and
    do not curry favor or show partiality before the powerful.'
  doctrine_reference: 'Translation philosophy: original-language primacy with parallel-source
