- issue: Use of the Hebrew witness versus the shorter Greek parallel
  chosen_reading: Translate the fuller Hebrew text as primary, while allowing the
    Greek to confirm the verse's concern for the distressed poor.
  alternative_readings:
  - 'A shorter rendering based mainly on the Greek: ''Do not refuse a suppliant in
    distress, and do not turn your face away from the poor.'''
