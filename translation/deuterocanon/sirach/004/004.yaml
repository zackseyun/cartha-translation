translation:
  text: Do not withhold a gift from your poor man, and do not despise the request
    of the poor, nor give him occasion to curse you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not refuse a suppliant in distress, and do not turn
      your face away from the poor.'' The Greek witness is shorter and lacks the final
      clause about giving occasion for a curse.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּמְנַע
  chosen: Do not withhold
  alternatives:
  - Do not refuse
  - Do not deny
  lexicon: HALOT
  rationale: מנע commonly means to withhold or keep back. 'Withhold' best fits the
    Hebrew wording and preserves the ethical force of refusing needed aid.
- source_word: מַתָּן
  chosen: a gift
  alternatives:
  - charity
  - alms
  lexicon: HALOT
  rationale: The noun denotes a gift or giving. 'Gift' is the most direct rendering
    from the Hebrew; 'charity' or 'alms' would narrow the sense beyond the source
    wording, though the context is aid to the needy.
- source_word: מִמִּסְכֵּנֶךָ
  chosen: from your poor man
  alternatives:
  - from your needy one
  - from the one dependent on you
  lexicon: HALOT
  rationale: The Hebrew is literally 'from your poor/needy one.' The pronominal suffix
    is preserved with 'your,' indicating the poor person in relation to the addressee's
    responsibility. 'Poor man' is gender-accurate to the masculine form, though contextually
    representative.
- source_word: וְלֹא תִבְזֶה
  chosen: and do not despise
  alternatives:
  - and do not disdain
  - and do not treat with contempt
  lexicon: HALOT
  rationale: בזה carries the sense of despising or treating as insignificant. 'Despise'
    is concise and strong, matching the moral tone.
- source_word: שְׁאֵלוֹת דָּל
  chosen: the request of the poor
  alternatives:
  - the plea of the poor
  - the petitions of a poor man
  lexicon: HALOT
  rationale: שאלות are requests or petitions; דל is poor/lowly. The singular collective
    sense in English reads naturally as 'the request of the poor.' The Greek parallel's
    'suppliant in distress' supports a sense of earnest appeal.
- source_word: וְלֹא תִתֵּן לוֹ מָקוֹם
  chosen: nor give him occasion
  alternatives:
  - nor give him room
  - nor give him a chance
  lexicon: HALOT
  rationale: Literally 'do not give him place.' In idiomatic English here, 'give him
    occasion' best conveys providing grounds or opportunity for the next action.
- source_word: לְקַלְלֶךָ
  chosen: to curse you
  alternatives:
  - to revile you
  - to call down a curse on you
  lexicon: HALOT
  rationale: קלל in this stem means to curse. The direct rendering preserves the warning
    that mistreatment of the poor may provoke an imprecation against the offender.
