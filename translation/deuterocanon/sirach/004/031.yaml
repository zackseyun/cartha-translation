translation:
  text: Do not be proud in your speech, and slack and negligent in your work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a different form of the saying: ''Do not let your hand be stretched
      out to receive, and drawn back when repaying.'''
    reason: textual_variant
lexical_decisions:
- source_word: גַבְהָן
  chosen: proud
  alternatives:
  - haughty
  - arrogant
  - lofty
  lexicon: HALOT
  rationale: The adjective conveys hauteur or arrogance. 'Proud' is natural modern
    English and fits the warning about one's tongue/speech without sounding overly
    elevated. 'Haughty' is possible but more archaic in tone.
- source_word: בִּלְשׁוֹנֶךָ
  chosen: in your speech
  alternatives:
  - with your tongue
  - in your tongue
  lexicon: HALOT
  rationale: Literally 'in your tongue,' but in English this idiom is best rendered
    'in your speech' to communicate manner of speaking rather than the physical organ.
    This is a modest dynamic adjustment consistent with optimal equivalence.
- source_word: רָפוּי
  chosen: slack
  alternatives:
  - lax
  - idle
  - weak
  lexicon: HALOT
  rationale: The term denotes looseness, feebleness, or lack of firmness. 'Slack'
    preserves the sense of being lax in action and pairs well with the following near-synonym.
- source_word: רָשִׁישׁ
  chosen: negligent
  alternatives:
  - careless
  - feeble
  - indolent
  lexicon: HALOT
  rationale: The word is comparatively rare and contextually overlaps with רפוי. 'Negligent'
    captures failure of diligence in work. Using a second English term preserves the
    Hebrew's doubled censure rather than collapsing both into one gloss.
- source_word: בִּמְלַאכְתֶּךָ
  chosen: in your work
  alternatives:
  - in your labor
  - in your task
  - in your business
  lexicon: HALOT
  rationale: The noun refers broadly to work, occupation, or task. 'Work' is the clearest
    modern equivalent and suits the practical ethical instruction.
- source_word: μὴ ἔστω ἡ χείρ σου ἐκτεταμένη εἰς τὸ λαβεῖν, καὶ ἐν τῷ ἀποδιδόναι συνεσταλμένη
  chosen: used as a secondary control, not the base text
  alternatives:
  - let not your hand be stretched out to receive and drawn back in repaying
  lexicon: BDAG
  rationale: The Greek parallel reflects a substantially different form of the saying,
    focusing on generosity versus greed. Because the Hebrew survives with high confidence,
    the Hebrew is translated as the primary witness. The Greek is important enough
    to preserve in a footnote as an alternative textual form rather than harmonize
    into the main text.
