theological_decisions:
- issue: Divergence between surviving Hebrew and Greek forms of Sirach 4:31
  chosen_reading: Translate the extant Hebrew as the main text
  alternative_readings:
  - 'Translate the Greek form: ''Do not let your hand be stretched out to receive,
    and be closed when repaying/giving back.'''
  rationale: For Sirach, the project translates from the Hebrew where it survives
    and from the Greek where it does not. Here the Hebrew witness is present and marked
    high confidence, so it governs the main rendering. The Greek is not merely stylistic
    variation but a materially different saying, so it should be preserved transparently
    in a footnote rather than blended into the English text.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives;
    preserve source uncertainty honestly'
