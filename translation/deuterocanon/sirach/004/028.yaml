translation:
  text: Do not sit with an unjust judge, for with him judgment will be according to
    his pleasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a substantially different reading here: ''Fight for the truth
      until death, and the Lord God will fight for you.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֵּשֵׁב
  chosen: Do not sit
  alternatives:
  - Do not dwell
  - Do not take your seat
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'do not sit,' which in context means
    not to join or align oneself with such a person in deliberation or association.
    'Sit' is retained for formal transparency while remaining natural in English.
- source_word: שׁוֹפֵט
  chosen: judge
  alternatives:
  - ruler
  - one who judges
  lexicon: HALOT
  rationale: The noun denotes one who renders judgment. 'Judge' is the most direct
    and contextually appropriate English equivalent.
- source_word: עַוָּל
  chosen: unjust
  alternatives:
  - wicked
  - perverse
  - unrighteous
  lexicon: HALOT
  rationale: The adjective describes moral crookedness in judicial conduct. 'Unjust'
    fits the legal context better than the broader 'wicked' and is clearer than the
    more theological 'unrighteous'.
- source_word: כַאֲשֶׁר כִּרְצוֹנוֹ
  chosen: as he pleases
  alternatives:
  - according to his will
  - as he desires
  lexicon: HALOT
  rationale: The phrase indicates arbitrariness governed by personal desire rather
    than justice. 'As he pleases' communicates that sense idiomatically in modern
    English.
- source_word: תִּשְׁפּוֹט עִמּוֹ
  chosen: with him judgment will be
  alternatives:
  - you will judge with him
  - one judges with him
  - it will be judged with him
  lexicon: HALOT
  rationale: 'The Hebrew form is somewhat awkward in English if rendered woodenly.
    Given the context and the Greek parallel''s emphasis on contending for truth in
    a different textual tradition, the Hebrew here is best taken as describing the
    character of judgment in his company: judgment with such a man follows his own
    pleasure. This preserves the legal sense without forcing a second-person reading
    that is less natural in context.'
