translation:
  text: For there is a shame that brings guilt, and there is a shame that is glory
    and favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the Greek more closely, 'a shame that leads to sin.' The Hebrew
      phrase is compressed and may also be understood as 'bearing iniquity.'
    reason: alternative_reading
  - marker: b
    text: Or 'honor and grace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּשֶׁת
  chosen: shame
  alternatives:
  - disgrace
  - embarrassment
  lexicon: HALOT
  rationale: The Hebrew noun denotes shame/disgrace. 'Shame' best preserves the moral
    and social weight of the term and matches the Greek αἰσχύνη. 'Embarrassment' is
    too weak and modern; 'disgrace' is possible but less flexible in the parallel
    contrast.
- source_word: מַשְׂאֵת עָוֹן
  chosen: brings guilt
  alternatives:
  - bearing iniquity
  - leading to sin
  - incurring guilt
  lexicon: HALOT
  rationale: The Hebrew phrase is difficult. In light of the Greek parallel ἐπάγουσα
    ἁμαρτίαν ('bringing on sin'), the sense is that one kind of shame results in culpability.
    'Brings guilt' reflects the Hebrew עָוֹן naturally in English while preserving
    the causal force. 'Bearing iniquity' is more formally tied to נשׂא idiomatically
    but reads awkwardly here; 'leading to sin' follows the Greek more closely but
    underrepresents the Hebrew noun עָוֹן.
- source_word: עָוֹן
  chosen: guilt
  alternatives:
  - iniquity
  - sin
  lexicon: HALOT
  rationale: 'עָוֹן can denote iniquity or the guilt/consequence of sin. Here ''guilt''
    fits the resultative sense of the phrase and differentiates the two kinds of shame:
    one is blameworthy, the other honorable.'
- source_word: כָּבוֹד
  chosen: glory
  alternatives:
  - honor
  lexicon: HALOT
  rationale: The Hebrew means honor/glory. 'Glory' preserves the elevated register
    and aligns with the Greek δόξα. 'Honor' is a viable alternative and may be stylistically
    smoother, but 'glory' better reflects the source pairing with 'favor'.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - acceptance
  lexicon: HALOT
  rationale: חֵן commonly means favor/grace. 'Favor' is chosen because it is idiomatic
    in English and avoids importing later theological freight that 'grace' can carry,
    while still matching the social commendation implied by the Hebrew and Greek χάρις.
