theological_decisions:
- issue: Interpretation of the first clause's difficult Hebrew phrase in light of
    the Greek parallel
  chosen_reading: One kind of shame results in guilt/blameworthiness
  alternative_readings:
  - One kind of shame leads to sin
  - There is shame in bearing iniquity
  rationale: The Hebrew מַשְׂאֵת עָוֹן is somewhat compressed, but the Greek parallel
    clarifies a negative-result sense. The translation preserves the Hebrew witness
    as primary while using the Greek as a consistency check, yielding an English line
    that communicates moral consequence without overcommitting to a more speculative
    reconstruction.
