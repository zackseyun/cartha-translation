theological_decisions:
- issue: Divine filial language for the righteous caregiver
  chosen_reading: God will call you son
  alternative_readings:
  - you will be like a son of the Most High
  rationale: The Hebrew witness directly states that God will call the addressee 'son,'
    whereas the Greek parallel has 'you will be as a son of the Most High.' The translation
    follows the Hebrew as the primary witness where extant, while preserving the Greek's
    slightly softened comparison in a footnote. This keeps the filial promise strong
    without importing later doctrinal categories beyond the text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it.'
