translation:
  text: And God will call you son, and he will show you favor and deliver you from
    the Pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and you will be like a son of the Most High, and he will love
      you more than your mother.'' The Hebrew witness instead reads, ''And God will
      call you son, and he will show you favor and deliver you from the Pit.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵל
  chosen: And God
  alternatives:
  - and God
  - and the Mighty One
  lexicon: HALOT
  rationale: The Hebrew אל here is best taken as the common divine designation 'God,'
    matching the parallel Greek's reference to the Most High. 'Mighty One' is possible
    lexically but less natural in English here and less clearly personal in this promise
    formula.
- source_word: יִקְרָאֲךָ בֵּן
  chosen: will call you son
  alternatives:
  - will call you a son
  - will call you his son
  lexicon: HALOT
  rationale: The Hebrew literally says 'will call you son.' English can omit the article
    for a predicative sense. 'His son' makes the filial relation explicit but adds
    a possessive not present in the Hebrew. The singular masculine 'son' is retained
    in line with the source wording and the project's gender-accurate policy.
- source_word: וְיָחְנְךָ
  chosen: he will show you favor
  alternatives:
  - he will be gracious to you
  - he will have mercy on you
  lexicon: HALOT
  rationale: From חנן, the core sense is to show favor or be gracious. 'Show you favor'
    is clear modern English and preserves the gracious initiative. 'Be gracious to
    you' is more formal; 'have mercy on you' shifts the nuance toward compassion rather
    than favor.
- source_word: וְיַצִּילְךָ
  chosen: and deliver you
  alternatives:
  - and rescue you
  - and save you
  lexicon: HALOT
  rationale: נצל commonly means deliver/rescue. 'Deliver' fits biblical register without
    sounding archaic here and leaves the object of deliverance explicit in the following
    phrase.
- source_word: מִשָׁחַת
  chosen: from the Pit
  alternatives:
  - from the grave
  - from destruction
  - from the pit
  lexicon: HALOT
  rationale: שחת can denote a pit, grave, or destruction. Capitalizing 'Pit' signals
    a realm-of-death sense in readable English without overdefining it as final condemnation.
    The Greek parallel diverges here, reading instead that the Most High will love
    you more than your mother; this supports treating the Hebrew wording on its own
    terms while preserving the Greek alternative in a footnote.
