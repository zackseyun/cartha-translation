translation:
  text: Incline your ear to the poor, and answer him peacefully with humility.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Make yourself beloved to the assembly, and bow your head
      low to a great man.'' This reflects a substantially different textual form from
      the extant Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַט
  chosen: Incline
  alternatives:
  - Turn
  - Bend
  lexicon: HALOT
  rationale: Imperative of נטה, literally 'stretch out/turn/incline.' 'Incline' preserves
    the idiom 'incline your ear' in clear modern English without over-paraphrasing.
- source_word: לֶעָנִי
  chosen: to the poor
  alternatives:
  - to the afflicted
  - to the needy
  lexicon: HALOT
  rationale: עני commonly denotes one who is poor, afflicted, or socially vulnerable.
    'The poor' is the most direct and natural rendering here, fitting the ethical
    context of attending to the vulnerable.
- source_word: אָזְנֶךָ
  chosen: your ear
  alternatives:
  - your hearing
  lexicon: HALOT
  rationale: Literal body-part idiom is retained because it is transparent in English
    and conveys attentive listening.
- source_word: וַהֲשִׁיבֵהוּ
  chosen: and answer him
  alternatives:
  - and reply to him
  - and restore him
  lexicon: HALOT
  rationale: From שוב in the Hiphil, here in conversational context meaning 'answer/respond.'
    'Answer him' best fits the immediate parallel with listening. 'Restore him' is
    lexically possible in other contexts but not suitable here.
- source_word: שָׁלוֹם
  chosen: peaceably
  alternatives:
  - with peace
  - peace
  - gently
  lexicon: HALOT
  rationale: שלום here functions adverbially with the response. 'Peaceably' preserves
    the semantic link to peace/well-being while reading naturally in English. The
    Greek parallel points in a different direction, but the Hebrew witness is primary
    here.
- source_word: בַּעֲנָוָה
  chosen: with humility
  alternatives:
  - meekly
  - gently
  lexicon: HALOT
  rationale: ענוה denotes humility/meekness. 'With humility' is the clearest modern
    rendering and preserves the moral posture commanded by the verse.
