translation:
  text: Wisdom has instructed her children, and she gives heed to all who understand
    her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and she lays hold of those who seek her.'' The surviving
      Hebrew reads, ''and she bears witness for all who have understanding in her.'''
    reason: alternative_reading
lexical_decisions:
- source_word: חָכְמוֹת
  chosen: Wisdom
  alternatives:
  - wisdoms
  lexicon: HALOT
  rationale: Although morphologically plural in form, this functions as the personified
    noun 'Wisdom' in Ben Sira. The Greek parallel has singular Ἡ σοφία, confirming
    a singular personified sense rather than a numerical plural.
- source_word: לִמְּדָה
  chosen: has instructed
  alternatives:
  - has taught
  - teaches
  lexicon: HALOT
  rationale: From למד, 'teach/instruct.' The perfect is rendered with English present
    perfect for a gnomic-personified statement. 'Instructed' fits wisdom literature
    style slightly better than the more classroom-specific 'taught.'
- source_word: בָנֶיהָ
  chosen: her children
  alternatives:
  - her sons
  lexicon: HALOT
  rationale: Hebrew בנים can mean sons specifically or children more broadly. Because
    personified Wisdom is maternal here and the referent is her adherents generally,
    'children' best conveys the sense without falsely narrowing to males.
- source_word: וְתָעִיד
  chosen: she bears witness
  alternatives:
  - she testifies
  - she gives testimony
  lexicon: HALOT
  rationale: From עוד/העיד, 'bear witness, testify.' 'Bears witness' preserves the
    juridical nuance and the active force of the verb. The Greek parallel differs
    substantially here, but the Hebrew witness is primary for this verse.
- source_word: לְכָל
  chosen: for all
  alternatives:
  - to all
  - against all
  lexicon: HALOT
  rationale: The preposition ל can be rendered several ways depending on context.
    With 'bear witness,' English idiom allows 'for' to convey favorable testimony;
    this best fits the likely commendatory sense toward those who understand Wisdom.
- source_word: מְבִינִים
  chosen: who have understanding
  alternatives:
  - the discerning
  - those who understand
  lexicon: HALOT
  rationale: From בין, referring to those possessing discernment. 'Who have understanding'
    keeps the verbal/intellectual nuance and reads naturally in English.
- source_word: בָּהּ
  chosen: in her
  alternatives:
  - of her
  - through her
  lexicon: HALOT
  rationale: The suffix most naturally refers back to personified Wisdom. 'In her'
    preserves the Hebrew preposition and the relational sense of understanding located
    in or with respect to Wisdom.
