theological_decisions:
- issue: Gendered personification of Wisdom
  chosen_reading: Retain feminine pronouns ('her') for Wisdom
  alternative_readings:
  - Use 'its' for abstract wisdom
  - Depersonalize as 'wisdom teaches those who understand'
  rationale: The Hebrew grammar personifies Wisdom as feminine, and the Greek parallel
    does the same. Retaining 'her' preserves the literary-theological portrayal rather
    than flattening it into abstraction.
  doctrine_reference: 'DOCTRINE.md: Preserve source meaning; gender-accurate over
    gender-neutral where the source intends it.'
- issue: Divergence between Hebrew and Greek parallel in the second colon
  chosen_reading: Translate the Hebrew second colon as primary text
  alternative_readings:
  - 'Greek: ''and lays hold of those who seek her'''
  rationale: For Sirach, surviving Hebrew is primary where extant. Here the Greek
    parallel reflects a notably different line, so the main text follows the Hebrew
    while preserving the Greek alternative in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate Ben Sira from Hebrew where it survives;
    use Greek parallel as actual input and preserve uncertainty honestly.'
