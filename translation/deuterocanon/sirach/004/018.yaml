theological_decisions:
- issue: Subject identification in the second clause
  chosen_reading: 'The subject is Wisdom: ''she will bind him.'''
  alternative_readings:
  - 'First-person divine/wisdom speech: ''I will bind him'''
  - Less likely impersonal reading
  rationale: The immediate context personifies Wisdom as the acting subject in this
    section. Although the Hebrew form is difficult, reading Wisdom as the subject
    best fits the literary flow and avoids introducing an abrupt speaker shift without
    clear warrant.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than hide it.
- issue: Use of Greek parallel to clarify difficult Hebrew
  chosen_reading: Primary translation remains anchored in the Hebrew, with the Greek
    used as a consistency check rather than replacing the Hebrew line.
  alternative_readings:
  - Translate more closely to the Greek expansion about returning straight and revealing
    secrets
  rationale: The Greek parallel for this verse appears substantially different and
    likely reflects a divergent textual form or expansion. Because the Hebrew witness
    is present and rated high confidence, the main text follows the Hebrew while preserving
    the Greek difference in a footnote.
  doctrine_reference: Original-language primacy over translation tradition; for Sirach,
    translate from Hebrew where it survives and use Greek in view.
