translation:
  text: If he turns aside and departs from her, she will bind him with bonds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek parallel reads quite differently here: ''Then she will come again
      straight to him, gladden him, and reveal to him her hidden things.'' This likely
      reflects a different textual form of Sirach.'
    reason: textual_variant
  - marker: b
    text: Hebrew 'bind him with bonds' may also be understood more specifically as
      'bind him with fetters' or, if the verb is read differently, 'I will bind him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - when
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' best preserves the Hebrew conditional
    force without overcommitting to temporal sequence.
- source_word: יָסוּר
  chosen: he turns aside
  alternatives:
  - he departs
  - he withdraws
  lexicon: HALOT
  rationale: From סור, commonly 'turn aside' or 'depart.' Chosen to preserve the image
    of deviation from a path, which coheres with the surrounding wisdom imagery and
    the Greek's movement language.
- source_word: וּנְטוֹתֵיהוּ
  chosen: and departs from her
  alternatives:
  - and turns away from her
  - and inclines away from her
  lexicon: HALOT
  rationale: The form is textually difficult, but in context it points to turning
    away from Wisdom. 'Departs from her' gives clear English sense while reflecting
    the relational object implied by the broader context and supported by the Greek
    parallel's reference to Wisdom.
- source_word: וַאֲסַרְתִיהוּ
  chosen: she will bind him
  alternatives:
  - I will bind him
  - then she bound him
  lexicon: HALOT
  rationale: The consonantal form could be read in more than one way, but the context
    of Wisdom's personified actions in the surrounding verses favors a third-person
    feminine subject, 'she,' referring to Wisdom. Future sense fits the conditional
    sequence in English.
- source_word: בָאֲסוּרִים
  chosen: with bonds
  alternatives:
  - in fetters
  - with chains
  - in prison
  lexicon: HALOT
  rationale: The noun denotes bonds or fetters. 'With bonds' is slightly more literal
    and broad than 'chains,' preserving the restraint imagery without specifying metal
    shackles.
