translation:
  text: Do not withhold a word at the right time, and do not hide your wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not hinder a word in a time of deliverance'' (or ''salvation'').
      The Hebrew witness instead reads ''in the world.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּמְנַע
  chosen: Do not withhold
  alternatives:
  - Do not hold back
  - Do not restrain
  lexicon: HALOT
  rationale: מנע commonly means to withhold or keep back. 'Do not withhold' preserves
    the prohibitive force and fits both speech and wisdom in context.
- source_word: דִּבֵּר
  chosen: a word
  alternatives:
  - speech
  - a matter
  lexicon: HALOT
  rationale: The Hebrew points to speech/wording; the Greek parallel has λόγον ('word/message').
    'A word' is concise and preserves the singular concrete expression.
- source_word: בָּעוֹלָם
  chosen: in the world
  alternatives:
  - in public
  - in the age
  lexicon: HALOT
  rationale: The extant Hebrew reads 'in the world,' which is unusual beside the Greek
    parallel 'in a time of deliverance/salvation.' Because Zone 1 gives the Hebrew
    as primary and confidence is high despite validation mismatch, the main text follows
    the Hebrew wording. 'In public' would be interpretive and would smooth away the
    source tension.
- source_word: וְאַל תַּצְפִּין
  chosen: and do not hide
  alternatives:
  - and do not conceal
  - and do not keep secret
  lexicon: HALOT
  rationale: צפן in the hiphil conveys hiding or concealing. 'Hide' is natural modern
    English and matches the parallel admonition not to withhold speech.
- source_word: אֶת חָכְמָתֶךָ
  chosen: your wisdom
  alternatives:
  - your wise teaching
  - your insight
  lexicon: HALOT
  rationale: חכמה is best rendered 'wisdom' here. The possessive is retained, referring
    to wisdom possessed and to be shared, not hidden.
