translation:
  text: Contend for righteousness until death, and the LORD will fight for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Fight for justice until death.' The Hebrew צֶדֶק can mean 'righteousness'
      or 'justice.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel in Swete reads a different sentence here: ''Do not be
      harsh in your tongue, and sluggish and slack in your works.'' The Hebrew Cairo
      Geniza witness is followed for the main text.'
    reason: textual_variant
lexical_decisions:
- source_word: עַד הַמָּוֶת
  chosen: until death
  alternatives:
  - to the point of death
  - even to death
  lexicon: HALOT
  rationale: The phrase marks the extent of steadfastness in struggle. 'Until death'
    is concise and natural, preserving the Hebrew's force without overstating martyrdom.
- source_word: הִנָּצֵה
  chosen: fight
  alternatives:
  - strive
  - contend
  - defend yourself
  lexicon: HALOT
  rationale: From נצה/התנצה in reflexive-imperative form, the sense is to engage in
    struggle or contention. 'Fight' best matches the parallel clause 'the LORD will
    fight for you' and preserves the martial imagery of the Hebrew.
- source_word: עַל הַצֶּדֶק
  chosen: for righteousness
  alternatives:
  - for justice
  - over the right
  - on behalf of what is right
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. Here 'for righteousness' preserves
    the moral quality of the cause while fitting wisdom-language usage. 'Justice'
    is possible, but 'righteousness' better reflects the broader ethical sense in
    this context.
- source_word: וַיהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  - the Lord
  lexicon: HALOT
  rationale: Per project doctrine, the divine name is rendered 'the LORD' in continuity
    with Jewish reverence practice and the traditional small-caps convention.
- source_word: נִלְחָם לָךְ
  chosen: will fight for you
  alternatives:
  - fights for you
  - will wage war for you
  - will battle on your behalf
  lexicon: HALOT
  rationale: 'Though the Hebrew form is formally a participle, in this exhortational
    context it naturally carries a future/result sense after the imperative: if one
    fights for righteousness, the LORD will fight on one''s behalf. This also yields
    clear English and preserves the parallelism.'
