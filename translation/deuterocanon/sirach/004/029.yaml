  rationale: The Hebrew term can support either nuance. In this wisdom context, the
    exhortation concerns moral rightness broadly, not only juridical justice. The
    alternative is preserved in a footnote because the semantic range is significant.
  doctrine_reference: DOCTRINE.md Contested terms principle on preserving alternatives
    where meaningful
