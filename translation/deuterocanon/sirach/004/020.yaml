  parallel_sources:
  - edition: lxx-swete-1909
    text: Συντήρησον καιρὸν καὶ φύλαξαι ἀπὸ πονηροῦ, καὶ περὶ τῆς ψυχῆς σου μὴ αἰσχυνθῇς·
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
