theological_decisions:
- issue: Anthropological nuance of נֶפֶשׁ / ψυχή
  chosen_reading: your own soul
  alternative_readings:
  - yourself
  - your life
  rationale: The verse warns against shame in matters touching one's inner moral life.
    Rendering with 'soul' preserves the text's anthropological weight without over-systematizing
    it. Alternatives remain viable and are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
