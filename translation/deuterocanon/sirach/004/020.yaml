translation:
  text: My son, keep the proper time and beware of evil, and do not be ashamed for
    your own soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'keep time' is difficult because the transmitted Hebrew includes
      הָמוֹן, a word usually meaning something like 'multitude,' 'wealth,' or 'tumult.'
      The Greek parallel reads simply 'keep/observe the proper time,' which is followed
      here as the clearest sense.
    reason: textual_variant
  - marker: b
    text: Or 'guard yourself from evil.' The Hebrew wording is awkward as transmitted,
      while the Greek parallel clearly has 'be on guard from evil.'
    reason: lexical_alternative
  - marker: c
    text: Or 'do not be ashamed for yourself' or 'for your life.' Hebrew נֶפֶשׁ and
      Greek ψυχή can mean 'soul,' 'self,' or 'life' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Direct address with masculine singular suffix; rendered gender-accurately
    per project philosophy. 'My child' is possible dynamically, but 'My son' better
    reflects the Hebrew form and wisdom-instruction setting.
- source_word: עֵת
  chosen: the proper time
  alternatives:
  - time
  - season
  - opportune time
  lexicon: HALOT
  rationale: Hebrew עֵת commonly means 'time/season.' In this context, supported by
    the Greek καιρόν, it likely carries the sense of a fitting or opportune time rather
    than time in the abstract, so 'the proper time' captures the idiom in readable
    English.
- source_word: הָמוֹן
  chosen: the proper time
  alternatives:
  - multitude
  - wealth
  - tumult
  lexicon: HALOT
  rationale: The Hebrew reading is difficult as transmitted. The Greek parallel has
    Συντήρησον καιρὸν ('keep/observe time'), with no equivalent for הָמוֹן. Given
    the high-confidence Hebrew line but the semantic awkwardness, the translation
    follows the clearer sense supported by the Greek and treats הָמוֹן as part of
    a corrupt or idiomatic expression underlying the sense of keeping the right time.
    This uncertainty is preserved in a footnote.
- source_word: שְׁמֹר
  chosen: keep
  alternatives:
  - observe
  - preserve
  lexicon: HALOT
  rationale: Basic imperative 'keep/observe.' 'Keep' works idiomatically with 'the
    proper time' and aligns with the Greek Συντήρησον.
- source_word: וּפְחַד מִרָע
  chosen: guard yourself from evil
  alternatives:
  - fear evil
  - beware of evil
  - keep away from evil
  lexicon: HALOT
  rationale: The Hebrew vocalization suggests 'fear from evil,' but the Greek φύλαξαι
    ἀπὸ πονηροῦ strongly supports a sense of guarding oneself or keeping away from
    evil. 'Guard yourself from evil' best reflects the parallel witness and yields
    coherent wisdom exhortation.
- source_word: נַפְשְׁךָ
  chosen: your own soul
  alternatives:
  - yourself
  - your life
  lexicon: HALOT
  rationale: נפש can mean soul, self, or life. Here, with Greek ψυχή, 'soul' preserves
    the moral and inward dimension of the admonition. 'Your own' brings out the possessive
    emphasis.
- source_word: אַל תֵּבוֹשׁ
  chosen: do not be ashamed
  alternatives:
  - do not feel shame
  - do not be put to shame
  lexicon: HALOT
  rationale: Straightforward negative imperative from בושׁ. 'Do not be ashamed' is
    the most natural English equivalent and matches the Greek μὴ αἰσχυνθῇς.
