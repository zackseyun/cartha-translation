translation:
  text: Do not show partiality against yourself, and do not be ashamed to your own
    downfall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew as transmitted may be read more literally, 'and do not stumble at
      your stumbling,' while the Greek parallel reads 'and do not be ashamed unto
      your fall.' The main text follows the sense supported by the Greek parallel
      for coherence.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּשָּׂא פָנֶיךָ
  chosen: Do not show partiality
  alternatives:
  - Do not lift up your face
  - Do not be partial
  - Do not favor
  lexicon: HALOT
  rationale: The Hebrew idiom נשא פנים literally involves 'lifting the face,' but
    idiomatically means showing favor or partiality. The Greek parallel μὴ λάβῃς πρόσωπον
    supports an idiomatic sense rather than a literal facial expression. 'Show partiality'
    is clear modern English and preserves the ethical force.
- source_word: עַל נַפְשֶׁךָ
  chosen: against yourself
  alternatives:
  - at the expense of yourself
  - with respect to yourself
  - against your own life
  lexicon: HALOT
  rationale: נפש here refers reflexively to the person's own self/life. With על after
    the idiom, the sense is not to show biased favor in a way directed toward oneself.
    'Against yourself' best captures the paradoxical warning in context and aligns
    with the Greek κατὰ τῆς ψυχῆς σου.
- source_word: וְאַל תִּכָּשֵׁל
  chosen: and do not be ashamed
  alternatives:
  - and do not stumble
  - and do not falter
  lexicon: HALOT
  rationale: The Hebrew as pointed in Kahana suggests כשל ('stumble'), but the Greek
    parallel has μὴ ἐντραπῇς ('do not be ashamed'). Given the high-confidence Hebrew
    witness yet the strong Greek consistency check, the line likely reflects a Hebrew
    reading or understanding connected with shame/hesitation before failure. For the
    main text, 'be ashamed' better fits the parallelism and yields coherent sense
    with the following phrase. The Hebrew-form alternative is preserved in a footnote.
- source_word: לְמִכְשׁוֹלֶיךָ
  chosen: to your own downfall
  alternatives:
  - into your stumbling
  - at your stumbling block
  - to your ruin
  lexicon: HALOT
  rationale: מכשול denotes a stumbling, obstacle, or cause of falling. The Greek εἰς
    πτῶσίν σου points to 'fall/downfall.' 'To your own downfall' is idiomatic English
    and preserves the warning that shame can lead to collapse.
