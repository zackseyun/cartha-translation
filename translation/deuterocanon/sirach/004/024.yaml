translation:
  text: For wisdom is made known in speech, and understanding in the answer of the
    tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and instruction in an utterance of the tongue.'' The
      Hebrew witness reads ''and understanding in the answer of the tongue.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בְאֹמֶר
  chosen: in speech
  alternatives:
  - by speech
  - in speaking
  - in a saying
  lexicon: HALOT
  rationale: The Hebrew noun from אמר denotes utterance/speaking. 'In speech' is natural
    English and matches the parallel Greek ἐν λόγῳ ('in word/speech') without over-specifying
    a single proverb-like 'saying'.
- source_word: נוֹדַעַת
  chosen: is made known
  alternatives:
  - is known
  - becomes known
  - is recognized
  lexicon: HALOT
  rationale: Nifal of ידע carries a passive/reflexive sense. 'Is made known' preserves
    the verbal force better than the flatter 'is known,' while still reading naturally.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חכמה; no contextual reason to vary.
- source_word: וּתְבוּנָה
  chosen: and understanding
  alternatives:
  - and discernment
  - and insight
  lexicon: HALOT
  rationale: תבונה commonly denotes understanding/discernment. 'Understanding' pairs
    well with 'wisdom' and keeps the parallelism clear.
- source_word: בְּמַעֲנֵה
  chosen: in the answer
  alternatives:
  - in response
  - in the reply
  lexicon: HALOT
  rationale: מענה is an answer or response. 'In the answer' preserves the concrete
    nominal form and reflects the Hebrew closely; the Greek παιδεία appears to reflect
    a different or interpretive tradition, but the Hebrew witness is primary here.
- source_word: לָשׁוֹן
  chosen: of the tongue
  alternatives:
  - of the tongue/speech
  - of the mouth
  lexicon: HALOT
  rationale: The Hebrew literally says 'tongue.' Retaining the body-part metaphor
    preserves the source texture; the Greek ἐν ῥήματι γλώσσης likewise supports keeping
    'tongue' rather than flattening to 'language' or 'speech'.
