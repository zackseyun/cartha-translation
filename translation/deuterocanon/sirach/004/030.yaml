translation:
  text: Do not be called double-tongued, and do not train your tongue to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a possessor of two [things],'' likely an idiom for divided or
      duplicitous speech; hence ''double-tongued.'''
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel reads, 'Do not be like a lion in your house, and do not
      be fanciful among your servants.' This differs sharply from the extant Hebrew
      and likely reflects a different textual form or interpretive tradition.
    reason: textual_variant
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - must not
  - you shall not
  lexicon: HALOT
  rationale: Standard negative prohibition in wisdom instruction; 'Do not' gives clear
    modern imperative force without over-formalizing.
- source_word: תִּקָּרֵא
  chosen: be called
  alternatives:
  - be named
  - be known as
  lexicon: HALOT
  rationale: Nifal of קרא naturally yields a passive sense, 'be called' or 'be named.'
    'Be called' preserves the Hebrew form closely and fits the admonitory style.
- source_word: בַּעַל שְׁתַּיִם
  chosen: double-tongued
  alternatives:
  - two-faced
  - of two tongues
  - double-speaking
  lexicon: HALOT
  rationale: The Hebrew literally reads 'master/possessor of two [things],' with the
    idiom clarified by the following reference to the tongue. 'Double-tongued' captures
    the sense of duplicitous or divided speech more precisely than the broader 'two-faced.'
    The Greek parallel differs substantially and appears to reflect another Vorlage
    or interpretive tradition, so the Hebrew surviving witness remains primary here.
- source_word: וְאֶל
  chosen: and ... to it
  alternatives:
  - and toward
  - and with respect to
  lexicon: HALOT
  rationale: The preposition is awkward in English if rendered woodenly. In context
    with the following verb, it points to habituation toward a kind of speech; 'to
    it' makes the object of habituation intelligible in English.
- source_word: לְשׁוֹנְךָ
  chosen: your tongue
  alternatives:
  - your speech
  - your mouth
  lexicon: HALOT
  rationale: Literal 'your tongue' is idiomatic in English and preserves the Hebrew
    image of speech as the moral instrument in view.
- source_word: אַל תַּרְגֵּל
  chosen: do not train
  alternatives:
  - do not accustom
  - do not habituate
  - do not make a habit
  lexicon: HALOT
  rationale: From רגל in the sense of accustoming or training oneself. 'Do not train'
    is concise and natural, while still conveying deliberate habituation. Because
    the object is 'your tongue,' the sense is to train it into duplicitous speech.
