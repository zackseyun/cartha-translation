translation:
  text: Love your life for the assembly, and bow your head still more to authority.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Cairo Geniza Hebrew line cited in Zone 1 does not match the Greek
      wording for this verse; the main translation therefore follows the Greek witness
      here.
    reason: textual_variant
  - marker: b
    text: Or 'calls down judgment on you' for 'cries out against you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καραμένου
  chosen: cries out against
  alternatives:
  - calls down judgment on
  - complains against
  - cries out
  lexicon: LSJ
  rationale: The Hebrew in Zone 1 appears corrupt or mismatched for this verse, while
    the Greek parallel gives a coherent sense. In context of oppression of the poor,
    the participle is best rendered as a hostile appeal directed against the addressee,
    not merely a neutral cry.
- source_word: ἐν πικρίᾳ ψυχῆς αὐτοῦ
  chosen: in the bitterness of his soul
  alternatives:
  - with a bitter soul
  - in his deep bitterness
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the emotional and moral force of
    the phrase. 'Soul' is retained rather than reduced to 'heart' or 'spirit' to reflect
    ψυχή and the Hebrew anthropological background.
- source_word: δέησις
  chosen: plea
  alternatives:
  - supplication
  - prayer
  - petition
  lexicon: BDAG
  rationale: '''Plea'' is accessible modern English and fits the context of an oppressed
    person appealing for help. ''Prayer'' is possible, but ''plea'' better preserves
    the urgent forensic tone.'
- source_word: ἐπακούσεται
  chosen: will hear
  alternatives:
  - will listen to
  - will answer
  lexicon: BDAG
  rationale: The verb primarily denotes hearing favorably. 'Will hear' is concise
    and leaves open the implied response without overtranslating to 'answer'.
- source_word: ὁ ποιήσας αὐτόν
  chosen: his Maker
  alternatives:
  - the one who made him
  - his Creator
  lexicon: BDAG
  rationale: This compact rendering preserves the theological point that God as creator
    is the one who hears the oppressed. 'Maker' is idiomatic and weighty without sounding
    technical.
