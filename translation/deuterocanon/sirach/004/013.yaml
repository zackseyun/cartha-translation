translation:
  text: Those who hold fast to her will find honor from the LORD, and they will be
    shown favor with the blessing of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''The one who holds her fast will inherit glory, and wherever he
      enters, the Lord will bless.'' The Hebrew reads ''will find honor from the LORD''
      and ''they will be shown favor with the blessing of the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְתֹמְכֶיהָ
  chosen: those who hold fast to her
  alternatives:
  - those who support her
  - those who uphold her
  lexicon: HALOT
  rationale: From תמך, 'to support, hold, uphold.' In context of personified wisdom,
    'hold fast to her' brings out committed attachment rather than mere external assistance.
    The Greek κρατῶν αὐτῆς ('the one holding her firmly') supports this stronger nuance.
- source_word: יִמְצְאוּ
  chosen: will find
  alternatives:
  - will obtain
  lexicon: HALOT
  rationale: The ordinary sense 'find' fits the Hebrew directly and reads naturally
    in English. Although the Greek has 'will inherit,' the Hebrew witness is primary
    here and is clear.
- source_word: כָבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: '''Honor'' fits the wisdom context of social and divine esteem. ''Glory''
    is possible and is reflected in the Greek δόξαν, but in English ''honor'' better
    matches the likely sense of bestowed esteem from God in this verse.'
- source_word: מֵיהֹוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  - from Jehovah
  lexicon: HALOT
  rationale: The source has the divine name YHWH. Per doctrine, the default rendering
    is 'the LORD.' The preposition מן is straightforwardly rendered 'from.'
- source_word: וְיֻחַנּוּ
  chosen: they will be shown favor
  alternatives:
  - they will receive favor
  - they will be treated graciously
  lexicon: HALOT
  rationale: Passive/Pual sense from חנן, 'to show favor, be gracious.' 'They will
    be shown favor' preserves the passive force and avoids overinterpreting the agent
    beyond the surrounding reference to the LORD.
- source_word: בְּבִרְכַּת יְהֹוָה
  chosen: with the blessing of the LORD
  alternatives:
  - by the blessing of the LORD
  - through the LORD's blessing
  lexicon: HALOT
  rationale: The beth preposition can be rendered instrumentally or associatively.
    'With the blessing of the LORD' is natural English and preserves the close connection
    between divine favor and divine blessing without forcing a narrower instrumental
    nuance.
