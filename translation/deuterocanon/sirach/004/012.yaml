lexical_decisions:
- source_word: אֹהֲבֶיהָ
  chosen: those who love her
  alternatives:
  - her lovers
  - those loving her
  lexicon: HALOT
  rationale: Active participial form with 3fs suffix referring to wisdom in context.
    Rendered as a natural English substantival participle.
- source_word: אָהֲבוּ חַיִּים
  chosen: love life
  alternatives:
  - have loved life
  - love lives
  lexicon: HALOT
  rationale: The Hebrew idiom straightforwardly expresses valuing or loving life.
    Present English fits the proverbial, gnomic sense better than a past tense. The
    Greek parallel likewise has present sense (ἀγαπᾷ ζωήν).
- source_word: וּמְבַקְשֶׁיהָ
  chosen: those who seek her diligently
  alternatives:
  - those who seek her
  - those who look for her early
  lexicon: HALOT
  rationale: Hebrew בקש means seek. The Greek parallel οἱ ὀρθρίζοντες πρὸς αὐτήν suggests
    early/eager seeking, which supports adding 'diligently' as an optimal-equivalence
    rendering without importing a specific time-of-day not present in the Hebrew witness.
- source_word: יָפִיקוּ
  chosen: will obtain
  alternatives:
  - will bring forth
  - will draw out
  - will secure
  lexicon: HALOT
  rationale: From הפיק, here in the sense of obtaining or bringing forth for oneself.
    In context with רצון, 'obtain' is the clearest idiomatic English. The Greek parallel
    differs in wording ('will be filled with gladness'), but the Hebrew witness is
    primary here and is coherent.
- source_word: רָצוֹן
  chosen: favor
  alternatives:
  - acceptance
  - goodwill
  - delight
  lexicon: HALOT
  rationale: With מן + divine name, the sense is favorable regard or acceptance from
    God. 'Favor' is concise and idiomatic in English.
- source_word: מֵיהֹוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  - from YHWH
  lexicon: HALOT
  rationale: Per project doctrine, the Tetragrammaton is rendered 'the LORD.'
