translation:
  text: Whoever listens to me will judge truly, and whoever gives ear to me will dwell
    securely in my inner chambers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Whoever obeys her will judge nations, and whoever approaches
      her will camp in confidence.'' The Hebrew witness differs notably in both clauses;
      the main text follows the surviving Hebrew while using the Greek to clarify
      the difficult final phrase.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'my inner chambers' continues the personification of Wisdom as a
      woman who receives the attentive into her household space.
    reason: cultural_note
lexical_decisions:
- source_word: שׁוֹמֵעַ לִי
  chosen: whoever listens to me
  alternatives:
  - the one who obeys me
  - whoever hears me
  lexicon: HALOT
  rationale: The Hebrew participle of שמע can mean hear, listen, or obey. The Greek
    parallel has ὁ ὑπακούων αὐτῆς ('the one obeying/listening to her'), confirming
    responsive hearing. 'Listens to me' preserves the auditory image while allowing
    the implied obedience.
- source_word: יִשׁפֹּט אֱמֶת
  chosen: will judge truly
  alternatives:
  - will judge truth
  - will judge rightly
  lexicon: HALOT
  rationale: The Hebrew reads literally 'will judge truth.' In idiomatic English,
    'judge truly' or 'judge rightly' best conveys the adverbial force. This also avoids
    importing the Greek's different object 'nations' (ἔθνη), since the Hebrew witness
    is primary here.
- source_word: וּמַאֲזִין לִי
  chosen: and whoever gives ear to me
  alternatives:
  - and whoever listens to me
  - and the one attentive to me
  lexicon: HALOT
  rationale: מאזין is a near-synonym to שומע but slightly more marked for attentiveness.
    'Gives ear to me' preserves the parallelism without flattening both cola into
    identical English.
- source_word: יִיחַן
  chosen: will dwell
  alternatives:
  - will encamp
  - will settle
  - will lodge
  lexicon: HALOT
  rationale: The form is difficult, and the Greek parallel κατασκηνώσει strongly supports
    the sense 'will camp/dwell.' 'Will dwell' gives natural English while retaining
    the habitation image.
- source_word: בַּחֲדָרַי
  chosen: in my inner chambers
  alternatives:
  - in my rooms
  - in my chambers
  lexicon: HALOT
  rationale: חדרים are inner rooms/chambers. Because Wisdom is personified as speaking,
    'my inner chambers' preserves the intimate domestic metaphor.
- source_word: מִבָּיִת
  chosen: securely
  alternatives:
  - at home
  - from the house
  - within the house
  lexicon: HALOT
  rationale: The Hebrew phrase is textually awkward in this line. The Greek parallel
    πεποιθώς ('confidently/securely') suggests the sense of secure habitation. Given
    the minor mismatch note and the difficult Hebrew, 'securely' best reflects the
    likely meaning while staying anchored to the parallel source.
