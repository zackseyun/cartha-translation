theological_decisions:
- issue: Divergence between Hebrew and Greek in the first colon
  chosen_reading: Follow the Hebrew 'will judge truly' in the main text
  alternative_readings:
  - 'Greek: ''will judge nations'''
  rationale: The project prioritizes the surviving Hebrew of Sirach where available.
    Here the Hebrew and Greek differ substantially; the Hebrew is the primary witness,
    while the Greek is used as a control and to illuminate difficult words, not to
    replace the Hebrew's sense.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
    Greek parallel as actual input while keeping Hebrew primary.'
- issue: Difficult final phrase מִבָּיִת
  chosen_reading: Render the line as secure dwelling rather than a literal 'from the
    house'
  alternative_readings:
  - 'more literal but obscure: ''will dwell in my chambers of a house/within a house'''
  - 'Greek-oriented: ''will camp in confidence'''
  rationale: The Hebrew ending is awkward and marked with minor source mismatch. The
    Greek parallel clarifies the line's overall sense as secure habitation. The chosen
    rendering preserves that sense without overstating certainty about the exact Hebrew
    syntax.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    uncertainty honestly.'
