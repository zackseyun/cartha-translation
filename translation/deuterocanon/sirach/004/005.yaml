translation:
  text: One crying out in bitter spirit and in the pain of his soul, and at the sound
    of his cry, his Rock will hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not turn your eye away from one begging, and do not
      give a man occasion to curse you.'' The Hebrew witness instead emphasizes that
      the afflicted person''s Rock will hear his cry.'
    reason: alternative_reading
lexical_decisions:
- source_word: צוֹעֵק
  chosen: one crying out
  alternatives:
  - the one who cries out
  - a crying person
  - the needy one
  lexicon: HALOT
  rationale: The Hebrew participle denotes a person in the act/state of crying out.
    The Greek parallel ἀπὸ δεομένου ('from one begging/entreating') confirms the sense
    of a needy petitioner. 'One crying out' preserves the vividness of the Hebrew
    while fitting the prohibition implied by the Greek.
- source_word: מַר רוּחַ
  chosen: in bitter spirit
  alternatives:
  - bitter in spirit
  - with a bitter spirit
  - embittered
  lexicon: HALOT
  rationale: Literally 'bitter of spirit.' 'In bitter spirit' keeps the Hebrew idiom
    readable in English and preserves the inner anguish rather than reducing it to
    a generalized emotional state.
- source_word: בִּכְאֵב נַפְשׁוֹ
  chosen: in the pain of his soul
  alternatives:
  - in his soul's pain
  - in his distress
  - in the pain of his life/self
  lexicon: HALOT
  rationale: כאב is pain, and נפש here refers to the inner self/life. 'Soul' is retained
    because the phrase points to deep personal anguish, not merely physical pain.
    This also matches the elevated moral tone of Sirach without becoming archaic.
- source_word: וּבְקוֹל צַעֲקָתוֹ
  chosen: at the sound of his cry
  alternatives:
  - by the voice of his outcry
  - when his cry is heard
  - at the voice of his cry
  lexicon: HALOT
  rationale: The phrase is literally 'and by/at the voice of his cry.' 'At the sound
    of his cry' is natural English that still reflects the auditory imagery of the
    Hebrew.
- source_word: צוּרוֹ
  chosen: his Rock
  alternatives:
  - his creator
  - his protector
  - God
  lexicon: HALOT
  rationale: The Hebrew literally reads 'his Rock,' a common divine epithet. It should
    be preserved rather than flattened to 'God,' since the metaphor is theologically
    meaningful. The Greek parallel lacks this wording and instead frames the warning
    as not giving a man occasion to curse you; the Hebrew witness is primary here,
    so the divine title is retained.
- source_word: יִשְׁמַע
  chosen: will hear
  alternatives:
  - hears
  - will listen
  lexicon: HALOT
  rationale: 'The yiqtol here is best rendered as future in this warning context:
    if one ignores the sufferer, God will hear the sufferer''s cry. ''Will hear''
    preserves the consequential force.'
