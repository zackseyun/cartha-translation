theological_decisions:
- issue: Relationship between the Hebrew witness and the Greek parallel
  chosen_reading: Translate the Hebrew as primary while allowing the Greek to shape
    the implied opening prohibition ('Do not turn your eyes away') and preserving
    the Greek's distinct wording in a footnote.
  alternative_readings:
  - A strictly Hebrew rendering without the opening prohibition
  - 'A Greek-based translation: ''Do not turn your eye away from one begging, and
    do not give a man occasion to curse you'''
  rationale: The Hebrew line as transmitted emphasizes the cry of the afflicted and
    God's hearing; the Greek preserves an explicit imperative that fits the surrounding
    context and likely reflects the sense of the verse in context. Because the task
    requires using the Greek parallel as actual input while keeping the Hebrew primary,
    the main text integrates the Greek's prohibition with the Hebrew's imagery and
    conclusion. The Greek's substantially different second colon is preserved in a
    footnote rather than replacing the Hebrew.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it
- issue: Rendering of נפש
  chosen_reading: soul
  alternative_readings:
  - self
  - life
  - inner being
  rationale: In wisdom literature נפש can denote the self or life, but here the collocation
    with pain and bitter spirit points to profound inward anguish. 'Soul' preserves
    that depth without forcing a later doctrinal anthropology.
