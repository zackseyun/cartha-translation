theological_decisions:
- issue: Use of Hebrew anthropological idiom versus smoothing to a single modern metaphor
  chosen_reading: Preserve the first colon's concrete Hebrew image ('inward parts')
    while rendering the second colon idiomatically as 'heart.'
  alternative_readings:
  - Render both cola with 'heart' for smoother English
  - Render both cola with 'inner being' for conceptual consistency
  rationale: The Hebrew witness is primary for this verse, and the paired terms מְעֵי
    and קֶרֶב are not identical. Retaining some distinction preserves the poetic texture
    and avoids flattening the source. The Greek parallel confirms the verse concerns
    the inner emotional life of the vulnerable, but does not require replacing the
    Hebrew imagery throughout.
  doctrine_reference: Translation philosophy §§1, 5
