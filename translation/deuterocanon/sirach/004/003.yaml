translation:
  text: Do not embitter the inward parts of the poor, and do not cause pain to the
    heart of the needy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'inward parts'; the Greek parallel has 'heart,' interpreting the
      phrase as the inner emotional life.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחְמִיר
  chosen: embitter
  alternatives:
  - make harsh
  - grieve
  - provoke
  lexicon: HALOT
  rationale: From the Hebrew root חמר in this context, the sense is to make bitter
    or harsh. Because the direct object is מְעֵי ('inward parts'), 'embitter' preserves
    the Hebrew idiom better than a flatter 'grieve.' The Greek parallel καρδίαν παρωργισμένην
    μὴ προσταράξῃς points toward disturbing or aggravating an already distressed inner
    life, which supports a rendering in the semantic range of embittering rather than
    merely withholding.
- source_word: מְעֵי
  chosen: inward parts
  alternatives:
  - bowels
  - inner being
  - heart
  lexicon: HALOT
  rationale: Hebrew מֵעֶה / מְעִים often denotes the inward parts as the seat of deep
    feeling or compassion. 'Inward parts' keeps the concrete Hebrew image without
    using archaic English 'bowels.' The Greek parallel uses καρδία ('heart'), showing
    an interpretive equivalent rather than a literal match; the main text preserves
    the Hebrew witness.
- source_word: דָךְ
  chosen: the poor
  alternatives:
  - the crushed
  - the oppressed
  - the lowly
  lexicon: HALOT
  rationale: דך commonly denotes one who is crushed, weak, or poor. In this wisdom
    context, 'the poor' is the clearest natural English rendering, while still overlapping
    with the social vulnerability implied by the Hebrew.
- source_word: קֶרֶב
  chosen: heart
  alternatives:
  - inner part
  - inner being
  - midst
  lexicon: HALOT
  rationale: Although קֶרֶב literally means the inner part or midst, in parallel with
    מְעֵי and in light of the Greek καρδίαν, the phrase refers to the inner emotional
    life. 'Heart' is idiomatic English and fits the poetic parallelism.
- source_word: עָנִי
  chosen: the needy
  alternatives:
  - the poor
  - the afflicted
  - the humble
  lexicon: HALOT
  rationale: עָנִי can mean poor, afflicted, or humble. Since דך has already been
    rendered 'the poor' in the first colon, 'the needy' preserves the semantic overlap
    while avoiding wooden repetition and reflecting the social dependence highlighted
    by the Greek προσδεομένου ('one in need').
- source_word: תַּכְאִיב
  chosen: cause pain
  alternatives:
  - hurt
  - grieve
  - afflict
  lexicon: HALOT
  rationale: From כאב, 'cause pain' is the straightforward causative sense. It preserves
    the concrete force of the Hebrew and matches the ethical prohibition against intensifying
    the suffering of the vulnerable.
