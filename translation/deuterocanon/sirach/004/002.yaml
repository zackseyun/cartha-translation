translation:
  text: Do not make a needy soul despair, and do not ignore a crushed soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not grieve a hungry soul, and do not provoke a man
      in his distress.'' The Hebrew witness is broader (''needy soul'' / ''crushed
      soul''), so the main text follows the Hebrew while preserving the Greek nuance
      here.'
    reason: alternative_reading
lexical_decisions:
- source_word: דֹּוֶוה נֶפֶשׁ חֲסֵרָה
  chosen: a needy soul
  alternatives:
  - a fainting soul
  - a suffering soul
  - a hungry soul
  lexicon: HALOT
  rationale: The Hebrew phrase combines distress/weakness (דוה) with lack/need (חסרה).
    The Greek parallel reads ψυχὴν πεινῶσαν ('a hungry soul'), which points toward
    deprivation rather than merely emotional sorrow. 'Needy soul' captures the Hebrew's
    broader sense of a person in want while remaining natural English and not narrowing
    the line to literal hunger alone.
- source_word: אַל תָּפוּחַ
  chosen: do not make ... despair
  alternatives:
  - do not grieve
  - do not afflict
  - do not cause to sigh
  lexicon: HALOT
  rationale: The verb is difficult, but in context it warns against worsening the
    condition of one already in want. The Greek λυπήσῃς supports the sense 'grieve/distress.'
    'Make ... despair' brings out the likely force of intensifying the needy person's
    inner collapse, fitting both the Hebrew context and the Greek witness.
- source_word: וְאַל תִּתְעַלֵּם
  chosen: and do not ignore
  alternatives:
  - and do not hide yourself from
  - and do not disregard
  lexicon: HALOT
  rationale: The hitpael of עלם commonly carries the sense of concealing oneself or
    pretending not to notice. 'Ignore' expresses this idiom clearly in modern English.
- source_word: מִמְּדֻכְדַּךְ נָפֶשׁ
  chosen: a crushed soul
  alternatives:
  - a downcast soul
  - a broken spirit
  - a depressed soul
  lexicon: HALOT
  rationale: מדוכדך denotes one who is crushed, dejected, or beaten down. 'Crushed
    soul' preserves the metaphorical weight and aligns with the verse's concern for
    the inwardly oppressed person.
