translation:
  text: Do not resist God, but humble yourself before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not contradict the truth, and be ashamed of your lack
      of instruction.'' The Hebrew witness instead reads, ''Do not resist God, but
      humble yourself before God.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּסָּרֵב
  chosen: Do not resist
  alternatives:
  - Do not refuse
  - Do not be stubborn
  - Do not contradict
  lexicon: HALOT
  rationale: The Hebrew verb in this form conveys refusal or resistance. 'Resist'
    best fits the immediate parallel with 'humble yourself' and preserves the adversative
    posture implied by the Hebrew. The Greek parallel μὴ ἀντίλεγε ('do not contradict/speak
    against') points in the same semantic direction, confirming a prohibition against
    opposing rather than merely declining.
- source_word: עִם הָאֵל
  chosen: God
  alternatives:
  - the Mighty One
  - God Almighty
  lexicon: HALOT
  rationale: אֵל here is the common divine title. In English, 'God' is the most natural
    rendering in this wisdom context. The preposition עִם is absorbed idiomatically
    into 'resist God' rather than rendered woodenly as 'with God.'
- source_word: וְאֶל אֱלֹהִים
  chosen: before God
  alternatives:
  - to God
  - before God himself
  lexicon: HALOT
  rationale: The Hebrew preposition אֶל literally means 'to/toward,' but with הִכָּנֵעַ
    in English the idiomatic sense is best expressed as 'humble yourself before God.'
    This also reflects the relational posture implied by the command.
- source_word: הִכָּנֵעַ
  chosen: humble yourself
  alternatives:
  - submit yourself
  - be subdued
  - yield
  lexicon: HALOT
  rationale: The niphal/implied reflexive sense here is one of becoming humble or
    submitting oneself. 'Humble yourself' is clear modern English and matches the
    ethical force of the wisdom instruction. 'Submit yourself' is possible, but 'humble
    yourself' better balances the Hebrew with the Greek parallel's call to be ashamed
    of one's lack of instruction.
