theological_decisions:
- issue: Whether to render שוב in a more explicitly penitential way
  chosen_reading: to turn back from iniquity
  alternative_readings:
  - to repent of sin
  rationale: The context concerns moral reversal, and the Greek parallel speaks of
    confessing sins, but the Hebrew wording itself emphasizes turning back rather
    than explicitly naming confession or repentance. The translation preserves that
    tension rather than resolving it into a technical penitential formula.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
