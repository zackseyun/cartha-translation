translation:
  text: Do not be ashamed to turn back from iniquity, and do not stand before the
    current of a river.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Do not be ashamed to confess your sins, and do not force the current
      of a river.'' The Hebrew and Greek differ in the first clause and slightly in
      the second; the English follows the extant Hebrew while using the Greek to clarify
      the river image.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֵּבוֹשׁ
  chosen: Do not be ashamed
  alternatives:
  - Do not be embarrassed
  - Do not feel shame
  lexicon: HALOT
  rationale: The Hebrew verb בוש commonly denotes shame or being put to shame. 'Do
    not be ashamed' is the most direct and idiomatic English rendering and aligns
    with the Greek μὴ αἰσχυνθῇς.
- source_word: לָשׁוּב
  chosen: to turn back
  alternatives:
  - to return
  - to repent
  lexicon: HALOT
  rationale: The infinitive of שוב literally means 'to return/turn back.' In context
    with 'from iniquity' it implies repentance, but 'turn back' preserves the Hebrew
    image without importing a more technical theological term than the text itself
    uses.
- source_word: מֵעָוֹן
  chosen: from iniquity
  alternatives:
  - from sin
  - from guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or sinful wrongdoing. 'Iniquity' preserves
    the moral weight and matches the preposition 'from.' The Greek parallel has 'your
    sins,' which supports a moral-fault sense, but the Hebrew witness should govern
    here.
- source_word: וְאַל תַּעֲמוֹד
  chosen: and do not stand
  alternatives:
  - and do not remain standing
  - and do not set yourself
  lexicon: HALOT
  rationale: עמד is straightforwardly 'stand.' The imperative force is preserved plainly
    in English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - against
  lexicon: HALOT
  rationale: The preposition literally means 'before/in front of.' In this warning
    image, 'before' is concise and natural, while still allowing the sense of facing
    something dangerous.
- source_word: שִׁבֹּלֶת
  chosen: the current of a river
  alternatives:
  - the stream
  - the flood
  - the torrent
  lexicon: HALOT
  rationale: The Hebrew שבלת can denote a flowing stream/current; the Greek parallel
    ῥοῦν ποταμοῦ ('current/flow of a river') strongly supports this sense rather than
    the more common 'ear of grain.' Because the Hebrew phrase is somewhat unusual
    and the Greek clarifies the image, 'the current of a river' best captures the
    likely meaning.
