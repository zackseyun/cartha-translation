translation:
  text: Rescue the oppressed from his oppressors, and do not let your spirit grow
    impatient when judging rightly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Incline your ear to the poor, and answer him peaceably
      with meekness.'' The Hebrew witness here instead speaks of rescuing the oppressed
      and not growing impatient in just judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹשַׁע
  chosen: Rescue
  alternatives:
  - Save
  - Deliver
  lexicon: HALOT
  rationale: Imperative of ישׁע calling for active intervention. 'Rescue' fits the
    immediate social-justice context better than the more theologically loaded 'save,'
    while preserving urgency.
- source_word: מוּצָק
  chosen: the oppressed
  alternatives:
  - the wronged
  - the one under pressure
  lexicon: HALOT
  rationale: The passive sense indicates a person being subjected to pressure or mistreatment.
    'The oppressed' is idiomatic and matches the ethical setting.
- source_word: מִמְּצִיקָיו
  chosen: from his oppressors
  alternatives:
  - from those who afflict him
  - from his tormentors
  lexicon: HALOT
  rationale: The noun/participle from the same pressure/oppression root naturally
    pairs with מוּצָק. 'Oppressors' preserves the social and judicial force of the
    line.
- source_word: וְאַל תָּקוֹץ רוּחֲךָ
  chosen: do not let your spirit grow impatient
  alternatives:
  - do not be vexed in spirit
  - do not lose heart
  - do not become disgusted in spirit
  lexicon: HALOT
  rationale: קוץ can convey impatience, vexation, or loathing. In context of rendering
    just judgment, the warning is against inward irritation or weariness that would
    hinder justice. 'Do not let your spirit grow impatient' is natural English while
    retaining the internal, affective sense.
- source_word: בְּמִשְׁפַט יֹשֶׁר
  chosen: when judging rightly
  alternatives:
  - in a just judgment
  - in upright judgment
  - in the judgment of uprightness
  lexicon: HALOT
  rationale: The phrase combines judicial action with uprightness. Rendering it verbally
    ('when judging rightly') gives clear English and reflects the practical exhortation.
    The Greek parallel points in a somewhat different direction ('answer him peaceably
    in meekness'), but the Hebrew witness is primary here and supports a judicial
    setting.
