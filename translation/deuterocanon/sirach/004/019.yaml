lexical_decisions:
- source_word: יָסוּר
  chosen: turns away
  alternatives:
  - departs
  - turns aside
  - goes astray
  lexicon: HALOT
  rationale: From סור, the Hebrew commonly means to turn aside/away or depart. 'Turns
    away' fits the Hebrew directly and aligns with the Greek parallel ἀποπλανηθῇ in
    the sense of deviating from Wisdom's path, without overinterpreting as full apostasy.
- source_word: מֵאַחֲרַי
  chosen: from me
  alternatives:
  - from following me
  - away from me
  lexicon: HALOT
  rationale: Literally 'from after me,' an idiom for ceasing to follow. In English,
    'from me' after 'turns away' communicates the sense naturally; the following relationship
    remains implicit from the idiom and context.
- source_word: אַשׁלִיכֶנּוּ
  chosen: I will cast him off
  alternatives:
  - I will throw him away
  - I will reject him
  - I will cast him out
  lexicon: HALOT
  rationale: The verb שלך is literally 'throw/cast.' 'Cast him off' preserves the
    force while fitting the relational context of Wisdom withdrawing support. 'Reject'
    is possible but less concrete than the Hebrew image.
- source_word: וְאַסְגִּירֶנּוּ
  chosen: and hand him over
  alternatives:
  - and deliver him up
  - and surrender him
  lexicon: HALOT
  rationale: From סגר in the causative sense of giving someone over into another's
    power. 'Hand him over' is idiomatic modern English and matches the judicial/abandonment
    nuance also reflected by the Greek παραδώσει.
- source_word: לַשֹׁדְדִים
  chosen: to plunderers
  alternatives:
  - to robbers
  - to spoilers
  lexicon: HALOT
  rationale: The Hebrew noun denotes plunderers/raiders. 'Plunderers' is the most
    direct rendering. The Greek parallel has 'into the hands of his downfall/fall,'
    suggesting a different Vorlage or interpretive rendering, but the Hebrew witness
    here is clear and primary.
