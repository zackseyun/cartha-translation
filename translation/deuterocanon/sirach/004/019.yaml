theological_decisions:
- issue: Primary-source alignment between Hebrew and Greek parallel
  chosen_reading: Follow the extant Hebrew 'hand him over to plunderers' in the main
    text.
  alternative_readings:
  - hand him over into the hands of his downfall
  - hand him over to his ruin
  rationale: For Sirach, surviving Hebrew is primary where extant. Here the Hebrew
    reads לַשֹׁדְדִים ('to plunderers'), while the Greek parallel reads εἰς χεῖρας
    πτώσεως αὐτοῦ ('into the hands of his fall/downfall'). Because the Hebrew witness
    is high-confidence and validated, the main text follows it, while the Greek-based
    alternative is preserved in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    preserve genuine ambiguity in footnotes'
