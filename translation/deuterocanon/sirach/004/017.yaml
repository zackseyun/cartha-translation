translation:
  text: And until his heart is filled with me, I will return and make him happy, and
    I will reveal my secrets to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''until she trusts his soul'' / ''until he entrusts his
      soul'' and ''she will test him in her ordinances,'' reflecting a fuller line
      about Wisdom''s testing before her favorable return.'
    reason: alternative_reading
  - marker: b
    text: Or 'bless him' or 'pronounce him happy' for 'make him happy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַד עֵת
  chosen: And until
  alternatives:
  - until the time when
  - and until the time
  lexicon: HALOT
  rationale: The phrase marks a temporal limit. 'And until' preserves the conjunction
    and the straightforward temporal sense without overloading the English.
- source_word: יִמָּלֵא לִבּוֹ בִּי
  chosen: his heart is filled with me
  alternatives:
  - his heart is full of me
  - his heart trusts in me
  - his heart is satisfied with me
  lexicon: HALOT
  rationale: The Hebrew literally speaks of the heart being filled 'with me.' Since
    Wisdom is personified as the speaker in context, retaining the first-person object
    preserves the imagery and theological tension better than interpretive expansions
    such as 'trusts in me.' The Greek parallel points in the direction of inward confidence,
    but the Hebrew witness should govern where extant.
- source_word: אָשׁוּב
  chosen: I will return
  alternatives:
  - then I will turn back
  - I will turn again
  lexicon: HALOT
  rationale: The verb שוב normally means 'return/turn back.' 'I will return' is the
    most natural English rendering and fits the personified Wisdom context, where
    after testing she turns favorably toward the disciple.
- source_word: אֲאַשְּׁרֶנּוֹ
  chosen: make him happy
  alternatives:
  - bless him
  - pronounce him happy
  - make him blessed
  lexicon: HALOT
  rationale: From אשר in the Piel/Hiphil-like usage, the sense is to declare or make
    happy/blessed. 'Make him happy' is readable modern English and avoids importing
    a heavier covenantal sense than the immediate context requires, while still reflecting
    favorable reversal after testing.
- source_word: וְגָלִיתִי לוֹ
  chosen: I will reveal to him
  alternatives:
  - I will uncover for him
  - I will disclose to him
  lexicon: HALOT
  rationale: גלה here means to uncover or reveal. 'Reveal' is idiomatic and preserves
    the sense of disclosure.
- source_word: מִסְתָּרִי
  chosen: my secrets
  alternatives:
  - my hidden things
  - my mystery
  - my secret counsels
  lexicon: HALOT
  rationale: The noun denotes hidden or secret things. The plural-like English 'my
    secrets' communicates the sense clearly. 'Mystery' would sound overly technical
    here; 'secret counsels' is possible but more interpretive.
