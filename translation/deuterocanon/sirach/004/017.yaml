theological_decisions:
- issue: Relation of the Hebrew line to the fuller Greek parallel, which includes
    testing and fear motifs absent from the Hebrew wording here
  chosen_reading: Translate the extant Hebrew as the main text while allowing the
    Greek to inform the sense of Wisdom's favorable return after prior testing.
  alternative_readings:
  - A Greek-based rendering that includes trust/testing language in the verse itself
  rationale: The project philosophy gives primacy to the Hebrew where Sirach survives
    in Hebrew. The Greek parallel helps confirm the broader context of Wisdom testing
    and then accepting the disciple, but its additional clauses should not be imported
    into the English main text when the Hebrew wording is available.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; original-language
    primacy'
