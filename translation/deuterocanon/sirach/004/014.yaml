theological_decisions:
- issue: Divine title in the second colon
  chosen_reading: God
  alternative_readings:
  - the Lord
  rationale: The Hebrew primary witness reads אֱלֹהִים, so the main text follows that.
    The Greek parallel reads ὁ κύριος, but the translation philosophy gives primacy
    to the original-language witness available for Sirach, here the Hebrew. The alternative
    is worth preserving because readers consulting the Greek tradition will encounter
    'the Lord.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Contested terms table for κύριος and יְהוָה'
- issue: Object of divine love in the second colon
  chosen_reading: those who love her dwelling
  alternative_readings:
  - those who love her
  rationale: The Hebrew witness appears to preserve a more difficult reading involving
    'house/dwelling,' while the Greek offers a smoother text, likely reflecting either
    a different Vorlage or a simplification. To avoid erasing the Hebrew evidence,
    the main text keeps the dwelling-language, but because the Hebrew is textually
    uncertain and the Greek is straightforward, the alternative is preserved in a
    footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; PHILOSOPHY.md on transparency and source uncertainty'
