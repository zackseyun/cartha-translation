translation:
  text: Those who minister to her minister to the Holy One, and God loves those who
    love her dwelling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and the Lord loves those who love her.'' The Hebrew here appears
      to preserve a more difficult reading involving her dwelling/abode.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְשָׁרְתֵי / מְשָׁרְתֶיהָ
  chosen: minister / minister to her
  alternatives:
  - serve / serve her
  - attend / attend her
  lexicon: HALOT
  rationale: From שרת, denoting service or attendance, often in sacred or official
    contexts. 'Minister' preserves the elevated register and matches the parallel
    Greek λατρεύοντες / λειτουργήσουσιν, which reinforces cultic or devoted service
    rather than casual help.
- source_word: קֹדֶשׁ
  chosen: the Holy One
  alternatives:
  - holiness
  - a holy thing
  - the sanctuary
  lexicon: HALOT
  rationale: The Hebrew phrase משרתי קדש is terse and somewhat elliptical. In light
    of the Greek ἁγίῳ ('to the holy [one/thing]') and the wisdom context personifying
    Wisdom, 'the Holy One' best conveys sacred reference in idiomatic English without
    reducing it to an abstract noun. The exact referent is somewhat compressed in
    Hebrew, so this rendering is interpretive but anchored by the Greek parallel.
- source_word: וֵאלֹהִים
  chosen: and God
  alternatives:
  - and the Lord
  lexicon: HALOT
  rationale: The Hebrew explicitly has אֱלֹהִים, not the divine name. Therefore 'God'
    is preferred over 'the Lord.' This also aligns with the Hebrew witness even though
    the Greek parallel reads ὁ κύριος.
- source_word: בֵּית [מוֹשָׁבָהּ אָהֵב]
  chosen: loves those who love her dwelling
  alternatives:
  - loves the house of her dwelling
  - loves those who love her
  - loves her abode
  lexicon: HALOT
  rationale: The Hebrew as transmitted appears to include 'house/dwelling' language,
    but the phrase is textually awkward; the bracketing signals editorial uncertainty.
    The Greek parallel has 'those who love her' rather than 'her dwelling.' To keep
    the Hebrew witness primary while acknowledging the Greek, the main text preserves
    the dwelling-language in a naturalized form. Because this is the most uncertain
    part of the verse, the simpler Greek-based alternative is preserved in a footnote.
- source_word: אָהֵב
  chosen: loves
  alternatives:
  - has affection for
  lexicon: HALOT
  rationale: Standard rendering of אהב. The repetition of love language is retained
    to mirror the source's rhetorical symmetry.
