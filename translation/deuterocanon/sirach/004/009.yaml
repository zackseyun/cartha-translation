translation:
  text: Be like a father to orphans, and in place of a husband to widows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a substantially different reading: ''Rescue the wronged from
      the hand of the wrongdoer, and do not be fainthearted when you judge.'' This
      likely reflects a different textual form of the verse.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֱיֵה
  chosen: Be like
  alternatives:
  - Become
  - Be
  lexicon: HALOT
  rationale: Imperative of היה. 'Be like' brings out the comparative force created
    by the following כְ without overstating a permanent ontological role.
- source_word: כְאָב
  chosen: like a father
  alternatives:
  - as a father
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like a father' is natural English and
    preserves the simile rather than making the addressee literally a father.
- source_word: לִיתוֹמִים
  chosen: to orphans
  alternatives:
  - for orphans
  - to the fatherless
  lexicon: HALOT
  rationale: יתומים are children deprived of a father or parents; 'orphans' is the
    clearest modern English. 'Fatherless' is possible but less idiomatic here.
- source_word: וּתְמוּר
  chosen: in place of
  alternatives:
  - as a substitute for
  - instead of
  lexicon: HALOT
  rationale: תמור conveys substitution or replacement. 'In place of' is concise and
    preserves the relational substitution implied by the Hebrew.
- source_word: בַּעַל
  chosen: a husband
  alternatives:
  - lord
  - master
  - owner
  lexicon: HALOT
  rationale: In this domestic context with widows, בעל refers to a woman's husband,
    not a generic master. The social-protective sense of the line requires 'husband'.
- source_word: לְאַלְמָנוֹת
  chosen: to widows
  alternatives:
  - for widows
  lexicon: HALOT
  rationale: אלמנות plainly means widows. 'To widows' matches the parallel structure
    with 'to orphans,' though the sense includes acting on their behalf.
- source_word: ἐξελοῦ ἀδικούμενον ἐκ χειρὸς ἀδικοῦντος
  chosen: not adopted in main text
  alternatives:
  - rescue the wronged from the hand of the wrongdoer
  lexicon: BDAG
  rationale: The Greek parallel in Swete differs substantially from the extant Hebrew
    and appears to reflect a different textual form. Because the Hebrew witness is
    the primary source where extant and is high-confidence here, the main translation
    follows the Hebrew while preserving the Greek-based alternative in a footnote.
