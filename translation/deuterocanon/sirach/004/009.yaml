theological_decisions:
- issue: Divergence between extant Hebrew Sirach and Greek parallel source
  chosen_reading: 'Follow the Hebrew: an exhortation to act as father/husband-substitute
    for vulnerable persons'
  alternative_readings:
  - 'Follow the Greek: ''Rescue the wronged from the hand of the wrongdoer, and do
    not be fainthearted when you judge'''
  rationale: Per project philosophy, Hebrew has primacy in Sirach where it survives.
    Here the Hebrew is high-confidence and validated, so it governs the main text.
    The Greek is still treated as real translation input and preserved as a significant
    alternative because it witnesses a materially different form of the verse.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives;
    use Greek alongside it'
