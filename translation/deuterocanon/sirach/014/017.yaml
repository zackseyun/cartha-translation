theological_decisions:
- issue: How to render the difficult final colon, where the Hebrew wording is terse/awkward
    but the Greek gives a clearer formulation of the universal law of death
  chosen_reading: for the everlasting decree is, “You shall surely die.”
  alternative_readings:
  - 'for the eternal law is: all that dies will die'
  - 'for it is an age-old statute: the dying pass away'
  rationale: This is not a doctrinally contested term but a source-level interpretive
    crux. The Hebrew גֹּוֵעַ יִגְוָעוּ is awkward in isolation; the Greek parallel
    appears to preserve or interpret the sense as the primordial decree of death.
    Since Zone 1 instructs that the Greek parallel be used as actual translation input,
    the main text follows the clearer sense while documenting the more literal Hebrew
    possibility in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: for Sirach, translate from Hebrew where it survives,
    using the Greek parallel as actual translation input when present; preserve source
    uncertainty honestly.'
