translation:
  text: All flesh wears out like a garment, and the everlasting decree is, “Dying,
    they shall die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew final clause literally reads something like “the dying die” or “one
      expiring, they expire,” a terse expression of universal mortality. The Greek
      parallel clarifies the sense as an age-old decree of death.
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל הַבָּשָׂר
  chosen: All flesh
  alternatives:
  - All humanity
  - Every mortal
  lexicon: HALOT
  rationale: Hebrew בשר literally means 'flesh' and here functions collectively for
    mortal living beings. 'All flesh' preserves the concrete Hebrew idiom and matches
    the Greek πᾶσα σὰρξ, while still clearly conveying universal mortality.
- source_word: כַּבֶּגֶד
  chosen: like a garment
  alternatives:
  - like clothing
  - like a robe
  lexicon: HALOT
  rationale: בגד is the ordinary word for garment/clothing. 'Garment' is slightly
    more formal and fits the simile of something that wears out.
- source_word: יִבְלֶה
  chosen: wears out
  alternatives:
  - grows old
  - decays
  lexicon: HALOT
  rationale: בלה denotes wearing out or becoming old from use. The Greek παλαιοῦται
    supports the sense of becoming old/worn. 'Wears out' is idiomatic in English and
    suits the garment comparison better than the more abstract 'decays.'
- source_word: וְחֹק עוֹלָם
  chosen: the everlasting decree
  alternatives:
  - the eternal statute
  - the age-old law
  lexicon: HALOT
  rationale: חק can mean statute, fixed ordinance, or decree. In this context it refers
    to the fixed universal rule of mortality. 'Everlasting decree' communicates both
    fixity and universality in natural English.
- source_word: גֹּוֵעַ יִגְוָעוּ
  chosen: You shall surely die
  alternatives:
  - the dying die
  - all who breathe their last will perish
  - dying, they die
  lexicon: HALOT
  rationale: 'The Hebrew as transmitted is difficult, but the underlying sense is
    universal death. The Greek parallel gives a clear interpretive rendering: ἡ γὰρ
    διαθήκη ἀπʼ αἰῶνος, Θανάτῳ ἀποθανῇ, echoing the emphatic construction ''you shall
    surely die.'' Because the prompt directs use of the Greek as actual translation
    input alongside the Hebrew, this clearer formulation is adopted in the main text
    while preserving the Hebrew-based alternative in a footnote.'
