translation:
  text: Go out after her in search, and keep watch at all her entrances.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more sharply, 'lie in wait at all her entrances'; the Greek parallel
      has 'ambush/lie in wait' imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָצֵאת
  chosen: Go out
  alternatives:
  - Go forth
  - Set out
  lexicon: HALOT
  rationale: Infinitive of יצא used imperativally in context; English imperative is
    the most natural rendering in this wisdom exhortation.
- source_word: אַחֲרֶיהָ
  chosen: after her
  alternatives:
  - behind her
  - in pursuit of her
  lexicon: HALOT
  rationale: Retains the personified feminine reference to wisdom from the surrounding
    context and preserves the pursuit imagery.
- source_word: בְחֵקֶר
  chosen: in search
  alternatives:
  - with searching
  - as an investigator
  - by investigation
  lexicon: HALOT
  rationale: The noun conveys searching/investigation. 'In search' gives idiomatic
    English while matching the Hebrew sense. The Greek ὡς ἰχνευτής ('as a tracker/searcher')
    confirms the investigative nuance.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: Straightforward conjunction plus quantifier; rendered idiomatically with
    the following plural noun.
- source_word: מְבוֹאֶיהָ
  chosen: her entrances
  alternatives:
  - her entryways
  - the places where she enters
  - her approaches
  lexicon: HALOT
  rationale: מבוא commonly denotes entrance/entryway. The Greek εἰσόδοις supports
    a concrete spatial image rather than an abstract 'ways.'
- source_word: יְרַצֵּד
  chosen: keep watch
  alternatives:
  - lie in wait
  - lurk
  - watch closely
  lexicon: HALOT
  rationale: The Hebrew verb is rare and somewhat uncertain, but the Greek ἐνέδρευε
    strongly supports the sense of waiting in ambush/keeping watch. 'Keep watch' preserves
    the vigilance image without importing a sinister tone too strongly into an exhortation
    about seeking wisdom.
