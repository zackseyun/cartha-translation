theological_decisions:
- issue: Personification of wisdom as feminine
  chosen_reading: Retain feminine pronouns ('her')
  alternative_readings:
  - Repeat 'wisdom' instead of pronouns
  - Use gender-neutral paraphrase
  rationale: The Hebrew suffixes are feminine singular, referring back to personified
    wisdom in the immediate context. Preserving 'her' maintains the literary and theological
    texture of wisdom personification without overinterpreting it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Force of the final surveillance metaphor
  chosen_reading: Render as 'keep watch' in the main text
  alternative_readings:
  - '''lie in wait'''
  - '''lurk at all her entrances'''
  rationale: The Greek parallel suggests ambush imagery, but in English 'lurk' can
    sound inappropriately sinister. 'Keep watch' preserves the active, patient attentiveness
    called for by the wisdom context, while the sharper alternative is preserved in
    a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
