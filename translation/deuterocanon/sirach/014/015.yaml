translation:
  text: Will you not leave your wealth to another, and your labor to those who divide
    the lot?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'to heirs by allotment' or 'to those who receive
      an allotted share.' The Hebrew 'to knowers of lot' is idiomatic, and the Greek
      parallel points to division of an inheritance or allotted portion.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Will you not
  alternatives:
  - Will you not indeed
  - Surely you will
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. English
    preserves the admonitory force better as a question than as a flat assertion.
- source_word: לְאַחֵר
  chosen: to another
  alternatives:
  - for another
  - to someone else
  lexicon: HALOT
  rationale: The Hebrew plainly indicates another person as beneficiary. 'To another'
    is concise and matches the rhetorical warning.
- source_word: תַּעֲזוֹב
  chosen: leave
  alternatives:
  - abandon
  - bequeath
  lexicon: HALOT
  rationale: The verb means leave behind. 'Bequeath' would over-specify a legal testamentary
    act not explicit in the Hebrew; 'abandon' sounds too negative. 'Leave' fits both
    Hebrew and the Greek καταλείψεις.
- source_word: חֵילֶךָ
  chosen: your wealth
  alternatives:
  - your substance
  - your possessions
  - your resources
  lexicon: HALOT
  rationale: In wisdom literature חיל commonly denotes wealth or material assets.
    'Wealth' is natural modern English and suits the context of possessions left to
    heirs.
- source_word: וִיגִיעֲךָ
  chosen: your labor
  alternatives:
  - your toil
  - the fruit of your labor
  lexicon: HALOT
  rationale: The noun denotes toil or what one has labored for. Because the Greek
    parallel has both πόνους and κόπους, the sense includes effort and its product.
    'Your labor' keeps the connection to personal exertion without over-paraphrasing
    to 'fruit of your labor'.
- source_word: לְיוֹדֵי גוֹרָל
  chosen: to those who divide the lot
  alternatives:
  - to those assigned by lot
  - to heirs by lot
  - to those who cast the lot
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat idiomatic and the Greek εἰς διαίρεσιν κλήρου
    clarifies the sense of allotment/inheritance by lot or division. 'Those who divide
    the lot' preserves the imagery of apportionment without collapsing it into an
    interpretive paraphrase like 'heirs.'
