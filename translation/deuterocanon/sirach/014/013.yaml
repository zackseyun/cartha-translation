translation:
  text: Before you die, do good to one you love, and according to what your hand can
    attain, give to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your friend'; the Greek parallel reads 'do good to a friend.'
    reason: alternative_reading
  - marker: b
    text: Literally, 'the attainment of your hand'; that is, according to your means
      or ability.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: Before
  alternatives:
  - before that
  - ere
  lexicon: HALOT
  rationale: Temporal marker introducing action to be taken prior to death; simple
    modern 'Before' best fits readable English.
- source_word: תָּמוּת
  chosen: you die
  alternatives:
  - you perish
  - you come to your end
  lexicon: HALOT
  rationale: Qal of מות plainly refers to dying. 'You die' is direct and idiomatic.
- source_word: הֵיטִב
  chosen: do good
  alternatives:
  - be good
  - treat well
  lexicon: HALOT
  rationale: Imperative of יטב in the Hiphil conveys doing good/benefiting someone.
    'Do good' preserves the benefactive force without over-specifying the manner.
- source_word: לְאוֹהֵב
  chosen: to one you love
  alternatives:
  - to a loved one
  - to your friend
  lexicon: HALOT
  rationale: Hebrew literally means 'to one loving' or 'to one you love'; the Greek
    φίλῳ supports a relational sense such as friend/beloved. 'One you love' stays
    closest to the Hebrew while remaining natural English.
- source_word: וְהַשִּׂיגַת יָדְךָ
  chosen: according to what your hand can attain
  alternatives:
  - according to your means
  - what your hand has acquired
  - as far as your ability reaches
  lexicon: HALOT
  rationale: The phrase combines attainment/reach with 'your hand,' denoting practical
    means or capacity. The Greek κατὰ τὴν ἰσχύν σου confirms a sense of ability/resources.
    This rendering preserves the Hebrew imagery while making the sense clear.
- source_word: תֶּן לוֹ
  chosen: give to him
  alternatives:
  - give him
  - grant to him
  lexicon: HALOT
  rationale: Simple imperative of נתן. 'Give to him' keeps the explicit indirect object
    and matches the benefactive instruction.
