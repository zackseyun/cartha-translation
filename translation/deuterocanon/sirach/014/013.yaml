theological_decisions:
- issue: Relational object of beneficence in לְאוֹהֵב / φίλῳ
  chosen_reading: one you love
  alternative_readings:
  - your friend
  - a loved one
  rationale: The Hebrew witness is primary and points to a beloved person broadly;
    the Greek parallel narrows toward 'friend.' The chosen rendering preserves the
    Hebrew's wider relational sense while remaining compatible with the Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; use parallel Greek as actual input while keeping Hebrew primary.'
