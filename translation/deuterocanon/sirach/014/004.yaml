translation:
  text: He who deprives himself will gather for another, and a stranger will revel
    in his goods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has singular 'stranger'; the Greek parallel reads 'others.' The English
      plural 'strangers' reflects the generic sense and the Greek support.
    reason: alternative_reading
lexical_decisions:
- source_word: מוֹנֵעַ
  chosen: deprives
  alternatives:
  - withholds from
  - denies
  lexicon: HALOT
  rationale: From מנע, 'to withhold/prevent.' In context with לְנַפְשׁוֹ, the sense
    is not merely generic withholding but refusing oneself what one has; 'deprives'
    captures the self-denial implied by the Hebrew and aligns with the Greek ὁ συνάγων
    ἀπὸ τῆς ψυχῆς αὐτοῦ ('the one gathering from his own soul').
- source_word: לְנַפְשׁוֹ
  chosen: himself
  alternatives:
  - his soul
  - his own life
  lexicon: HALOT
  rationale: נפש often literally means 'soul' or 'life,' but in idiomatic Hebrew after
    a verb of withholding it refers reflexively to oneself. English 'himself' is the
    most natural rendering here, while the Greek ψυχή confirms the underlying idiom
    without requiring a wooden 'his soul' in English.
- source_word: יִקְבֹּץ לְאַחֵר
  chosen: will gather for another
  alternatives:
  - stores up for another
  - collects for someone else
  lexicon: HALOT
  rationale: קבץ means 'gather/collect.' The future sense is straightforward. 'Gather
    for another' preserves the Hebrew wording closely, while still conveying the irony
    that the miser's accumulation benefits someone else.
- source_word: וּבְטוֹבָתוֹ
  chosen: in his goods
  alternatives:
  - in his good things
  - by his wealth
  - in his prosperity
  lexicon: HALOT
  rationale: טובה here is best taken concretely, as the good things or possessions
    a person has, supported by the Greek ἐν τοῖς ἀγαθοῖς αὐτοῦ. 'His goods' is concise,
    natural, and materially specific.
- source_word: יִתְבַּעְבֵּעַ
  chosen: will revel
  alternatives:
  - will luxuriate
  - will delight himself
  - will feast
  lexicon: HALOT
  rationale: The rare iterative/reflexive form suggests luxuriating or taking pleasure
    abundantly. The Greek τρυφήσουσιν points to indulgent enjoyment. 'Will revel'
    captures that sense without sounding archaic.
- source_word: זָר
  chosen: strangers
  alternatives:
  - another person
  - outsiders
  - foreigners
  lexicon: HALOT
  rationale: 'Though singular in Hebrew, זָר can function generically; the Greek ἕτεροι
    is plural. Rendering it as plural ''strangers'' gives idiomatic English and matches
    the parallel source''s distributive sense: others, not the miser himself, enjoy
    what he amassed.'
