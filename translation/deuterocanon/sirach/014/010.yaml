translation:
  text: An evil eye is stingy over bread, and there is meanness at his table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'evil eye' is an idiom for a grudging, stingy, or envious disposition.
      The Greek parallel likewise supports this sense.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew wording in the second clause is somewhat difficult; the Greek
      parallel reads in a way that supports the sense 'meanness' or 'miserliness at
      his table.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַיִן רַע / ὀφθαλμὸς πονηρός
  chosen: an evil eye
  alternatives:
  - a bad eye
  - a grudging eye
  - a stingy eye
  lexicon: HALOT; BDAG
  rationale: The Hebrew idiom 'evil eye' and the Greek equivalent both point to a
    miserly, envious disposition. Keeping the idiom in English preserves the source
    imagery and its moral force, while the following clause clarifies the sense.
- source_word: תָּעִיט / φθονερὸς
  chosen: is stingy
  alternatives:
  - begrudges
  - is envious
  - is grudging
  lexicon: HALOT; BDAG
  rationale: The Hebrew form is difficult, but in context and with the Greek parallel
    it denotes begrudging or miserly behavior regarding food. 'Is stingy' communicates
    the practical sense in natural English without losing the ethical nuance.
- source_word: לָחֶם / ἄρτος
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT; BDAG
  rationale: Both Hebrew and Greek literally say 'bread.' Retaining 'bread' preserves
    the concrete image and the common biblical use of bread as ordinary food.
- source_word: מְהוּמָה
  chosen: meanness
  alternatives:
  - miserliness
  - disturbance
  - disgrace
  lexicon: HALOT
  rationale: The Hebrew reading is somewhat uncertain, but in this context, supported
    by the Greek ἐνλεπής ('niggardly, scant, mean'), it points to a shabby or miserly
    condition at the table. 'Meanness' captures both the moral and social sense.
- source_word: שֻׁלְחָנוֹ / τράπεζα αὐτοῦ
  chosen: his table
  alternatives:
  - his dining table
  lexicon: HALOT; BDAG
  rationale: A straightforward rendering of the shared Hebrew-Greek image of one's
    table as the place of provision and hospitality.
