translation:
  text: Blessed is the man whom his soul has not reproached, and whose hope has not
    ceased.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew of the first clause is difficult in the extant Cairo Geniza witness;
      the Greek parallel reads 'whose soul has not condemned him,' which guides the
      rendering here. Possible nuances include 'reproached him' or 'shamed him.'
    reason: textual_variant
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  lexicon: HALOT
  rationale: Introduces a beatitude-like saying. 'Blessed is' preserves the wisdom-literature
    tone better than the more subjective 'Happy is.'
- source_word: אִישׁ
  chosen: the man
  alternatives:
  - the person
  - a man
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular. Per project philosophy,
    a gender-accurate rendering is preferred. In wisdom context it has representative
    force, but 'the man' best matches the source form.
- source_word: לֹא חִסַּדְתּוֹ נַפְשׁוֹ
  chosen: whose soul has not condemned him
  alternatives:
  - whose soul has not reproached him
  - whose heart has not shamed him
  lexicon: HALOT
  rationale: The Hebrew form is difficult in the extant witness and appears to have
    a minor mismatch; the Greek parallel κατέγνω ('condemned') strongly clarifies
    the sense. 'Soul' is retained for נַפְשׁוֹ rather than smoothing to 'conscience,'
    since the source says 'soul,' while the verbal sense is best rendered 'condemned
    him.'
- source_word: וְלֹא שָׁבְתָה
  chosen: has not ceased
  alternatives:
  - has not failed
  - has not come to an end
  lexicon: HALOT
  rationale: From שבת in the sense of ceasing/resting. 'Has not ceased' is a clear
    and direct rendering in context.
- source_word: תּוֹחַלְתּוֹ
  chosen: hope
  alternatives:
  - expectation
  lexicon: HALOT
  rationale: In wisdom literature this noun commonly denotes hope or expectation.
    'Hope' is the more natural English choice and aligns with the Greek ἐλπίς.
