translation:
  text: Happy is the man whose mouth has not caused him to slip, and whose heart has
    not condemned him in the sorrow of sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew text is difficult in the first clause; literally it reads something
      like 'whose mouth has not forsaken him.' The Greek parallel supports the sense
      'has not slipped by his mouth'—that is, has not stumbled in speech.
    reason: alternative_reading
  - marker: b
    text: Or 'whose heart has not reproached him with the grief of sin.' The Hebrew
      of this clause is also uncertain, and the Greek reads 'has not been pierced
      in the sorrow of sin.'
    reason: textual_variant
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Happy is
  alternatives:
  - Blessed is
  lexicon: HALOT
  rationale: The Hebrew beatitude formula אַשְׁרֵי introduces a state of enviable
    well-being. 'Happy is' is natural modern English and fits wisdom literature, while
    preserving the beatitude sense. 'Blessed is' is possible, but here the wisdom
    tone and lack of explicit divine-agent language favor 'Happy is'.
- source_word: אֱנוֹשׁ
  chosen: the man
  alternatives:
  - a man
  - a person
  lexicon: HALOT
  rationale: אֱנוֹשׁ denotes a human being, often with the nuance 'man' in wisdom
    style. Per the project's gender-accurate philosophy, 'the man' preserves the masculine
    singular representative form of the Hebrew. 'A person' would flatten that feature.
- source_word: לֹא עֲזָבוֹ פִיהוּ
  chosen: whose mouth has not caused him to slip
  alternatives:
  - whose mouth has not betrayed him
  - who has not sinned with his mouth
  lexicon: HALOT
  rationale: The Hebrew wording is difficult in the transmitted text ('his mouth has
    not left/forsaken him'), and the Greek parallel reads οὐκ ὠλίσθησεν ἐν στόματι
    αὐτοῦ, 'has not slipped by/in his mouth.' Using the Hebrew as primary but the
    Greek as an actual input, the sense is best represented as speech not causing
    moral stumbling. This rendering avoids over-literal obscurity while staying close
    to the likely sense.
- source_word: וְלֹא אָבַח עָלָיו
  chosen: has not condemned him
  alternatives:
  - has not barked against him
  - has not reproached him
  - has not accused him
  lexicon: HALOT
  rationale: The verb form is unusual and somewhat uncertain in Hebrew transmission.
    In context with 'his heart' as subject and with the Greek κατενύγη ('was pierced/stricken'),
    the line points to inward reproach or condemnation. 'Has not condemned him' captures
    the conscience-oriented sense in idiomatic English.
- source_word: דִּין לִבּוֹ
  chosen: his heart
  alternatives:
  - the judgment of his heart
  - his conscience
  lexicon: HALOT
  rationale: The Hebrew phrase includes both 'judgment' and 'heart,' suggesting the
    heart's inward verdict. English main text is smoother with 'his heart has not
    condemned him,' while the judicial nuance is preserved in the rationale. 'Conscience'
    is interpretive and not strictly lexical.
- source_word: בְּלֻפְי/בְּלֵוִי? reflected by Greek ἐν λύπῃ ἁμαρτίας
  chosen: in the sorrow of sin
  alternatives:
  - with grief for sin
  - in sinful grief
  lexicon: BDAG/HALOT
  rationale: 'The Greek parallel clearly supports a phrase involving grief/sorrow
    and sin. The Hebrew line is textually difficult, so the Greek helps stabilize
    the sense. ''In the sorrow of sin'' preserves the genitival ambiguity: sorrow
    arising from sin or sorrow associated with sin.'
