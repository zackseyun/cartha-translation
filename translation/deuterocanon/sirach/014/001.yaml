theological_decisions:
- issue: Beatitude wording
  chosen_reading: Happy is the man
  alternative_readings:
  - Blessed is the man
  rationale: This is a wisdom beatitude rather than an explicitly covenantal blessing
    formula. 'Happy' better communicates the Hebrew idiom in contemporary English
    without denying its moral weight.
  doctrine_reference: DOCTRINE.md Translation philosophy §§4, 6
- issue: Rendering a textually difficult Hebrew clause with Greek support
  chosen_reading: whose mouth has not caused him to slip ... whose heart has not condemned
    him in the sorrow of sin
  alternative_readings:
  - whose mouth has not betrayed him ... and he has not been pierced with the grief
    of sin
  - who has not sinned with his mouth ... and whose conscience does not reproach him
  rationale: The Hebrew witness is primary, but both cola contain difficulty or minor
    mismatch. The Greek parallel is therefore used as an actual translation input
    to clarify probable sense while keeping the English anchored to the Hebrew wording
    where possible.
  doctrine_reference: PHILOSOPHY.md 'What we are translating'; user task requirement
    on parallel source use
