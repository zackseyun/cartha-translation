theological_decisions:
- issue: Rendering of שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the underworld
  rationale: The Hebrew witness is extant and clear. Retaining 'Sheol' preserves the
    text's ancient conception of the realm of the dead without importing a more developed
    doctrine of hell or reducing it to mere burial. This follows the project's principle
    of preserving theological tension rather than resolving it.
  doctrine_reference: Translation philosophy §3; Contested terms table does not override
    this term.
- issue: Relationship between the Hebrew and Greek in the self-regarding imperative
  chosen_reading: pamper yourself
  alternative_readings:
  - deceive your soul
  - indulge yourself
  - delight yourself
  rationale: The Hebrew is primary for extant Sirach, but the Greek parallel was used
    as a control. The Greek's unusual wording ('deceive your soul') appears to reflect
    a hedonistic or self-indulgent sense in context, especially with 'seek pleasure.'
    The Hebrew פנק gives a clearer idiom, so the main text follows the Hebrew while
    preserving the Greek nuance in a footnote.
  doctrine_reference: Translation philosophy §1 and §3.
