id: SIR.14.7
reference: Sirach 14:7
source:
  edition: lxx-swete-1909
  text: κἂν εὖ ποιῇ, ἐν λήθῃ ποιεῖ, καὶ ἐπʼ ἐσχάτων ἐκφαίνει τὴν κακίαν αὐτοῦ.
  language: Greek
