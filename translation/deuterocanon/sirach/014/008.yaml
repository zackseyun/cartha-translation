translation:
  text: Evil is the man with an envious eye, turning away his face and despising lives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the man with an evil eye.' The Greek idiom can refer to a begrudging,
      envious disposition.
    reason: lexical_alternative
  - marker: b
    text: Or, 'souls' or 'persons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηρὸς
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: BDAG
  rationale: Predicate adjective describing the person's moral character, not merely
    unpleasantness. 'Evil' preserves the ethical force more strongly than 'bad.'
- source_word: ὁ βασκαίνων ὀφθαλμῷ
  chosen: the man with an envious eye
  alternatives:
  - the one who envies with his eye
  - the man with an evil eye
  - the grudging-eyed man
  lexicon: BDAG
  rationale: βασκαίνω can denote envy or the 'evil eye' concept. In this wisdom context
    about stinginess and meanness, 'with an envious eye' communicates the idiom's
    sense in accessible English while preserving the eye imagery. 'Man' is supplied
    to make the substantival participle natural in English and reflects the masculine
    singular form.
- source_word: ἀποστρέφων πρόσωπον
  chosen: turning away his face
  alternatives:
  - turning his face away
  - averting his face
  lexicon: BDAG
  rationale: A participial description of refusal or withholding. 'Turning away his
    face' is a close, readable rendering that preserves the concrete bodily image.
- source_word: ὑπερορῶν
  chosen: looking down on
  alternatives:
  - despising
  - overlooking
  - disregarding
  lexicon: BDAG
  rationale: The verb can mean to look down on, disdain, or disregard. 'Looking down
    on' preserves the visual metaphor and the contemptuous nuance better than the
    more abstract 'disregarding.'
- source_word: ψυχάς
  chosen: lives
  alternatives:
  - souls
  - persons
  lexicon: BDAG
  rationale: In this context ψυχή likely refers to people/living beings rather than
    an immaterial 'soul.' 'Lives' keeps the concrete human reference and avoids importing
    later anthropological assumptions. 'Persons' is possible, but 'lives' better matches
    the breadth of ψυχή.
