theological_decisions:
- issue: Rendering the idiom βασκαίνων ὀφθαλμῷ
  chosen_reading: with an envious eye
  alternative_readings:
  - with an evil eye
  rationale: The phrase can evoke the culturally loaded 'evil eye' idiom, but in Sirach's
    ethical context the practical sense is envy, stinginess, and begrudging attitude.
    The alternative is preserved in a footnote because the idiom is significant and
    traditional.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering ψυχάς
  chosen_reading: lives
  alternative_readings:
  - souls
  - persons
  rationale: To avoid importing a more technical theological sense of 'soul' where
    the Greek can simply denote persons/lives, the main text uses 'lives,' with alternatives
    documented for auditability.
  doctrine_reference: Translation philosophy §§1, 3
