translation:
  text: He who sets his heart on her ways, and considers her insights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and will gain understanding in her hidden things'' or
      ''in her secrets.'' The Hebrew reads ''her insights/understandings,'' which
      is followed in the main text.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַשָּׂם
  chosen: He who sets
  alternatives:
  - the one who places
  - who directs
  lexicon: HALOT
  rationale: 'The participle with article functions substantivally: ''the one who
    sets/places.'' ''He who sets'' preserves the singular masculine form in line with
    the project''s gender-accurate policy while remaining natural English.'
- source_word: עַל דְרָכֶיהַ לִבּוֹ
  chosen: his heart on her ways
  alternatives:
  - his mind on her paths
  - his heart upon her ways
  lexicon: HALOT
  rationale: Literally 'his heart on her ways.' 'Heart' should be retained rather
    than reduced to 'mind,' since Hebrew לב includes thought and intention. 'Ways'
    matches דרכים well and aligns with the Greek ὁδοὺς.
- source_word: וּבִתְבוּנֹתֶיהַ
  chosen: and considers her insights
  alternatives:
  - and reflects on her understandings
  - and gives thought to her hidden things
  lexicon: HALOT
  rationale: The Hebrew תבונותיה means 'her understandings/insights.' The Greek parallel
    has ἐν τοῖς ἀποκρύφοις αὐτῆς ('in her hidden things/secrets'), which suggests
    an interpretive tradition emphasizing wisdom's deeper matters. Because the Hebrew
    is the primary witness here and is high-confidence, the main text follows 'insights,'
    while the Greek-based nuance is preserved in a footnote.
- source_word: יִתְבּוֹנָן
  chosen: considers
  alternatives:
  - reflects
  - shows understanding
  - ponders
  lexicon: HALOT
  rationale: The hitbonen form conveys reflective consideration or attentive understanding.
    'Considers' is concise, idiomatic, and preserves the contemplative force without
    overtranslation.
