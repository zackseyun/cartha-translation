theological_decisions:
- issue: Personification of wisdom as feminine
  chosen_reading: her
  alternative_readings:
  - it
  rationale: Both the Hebrew and Greek personify wisdom with feminine forms. Rendering
    with 'her' preserves the literary and theological texture of Wisdom as a female
    personification rather than flattening it to an impersonal abstraction.
  doctrine_reference: Translation philosophy §§3, 4, 5
- issue: Masculine singular participant
  chosen_reading: He who sets his heart
  alternative_readings:
  - Whoever sets the heart
  - The one who sets his heart
  rationale: The Hebrew uses a masculine singular substantival participle. The project
    prefers gender-accurate rendering where the source is grammatically masculine
    and representative. 'He who' is natural and transparent here.
  doctrine_reference: Translation philosophy §4
