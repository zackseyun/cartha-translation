theological_decisions:
- issue: Hebrew-Greek divergence in the second colon
  chosen_reading: 'Follow the extant Hebrew: ''the work of his hands is dragged along
    behind him.'''
  alternative_readings:
  - 'Follow the Greek more closely: ''and the one who does it will depart with it.'''
  rationale: For Sirach, where Hebrew survives, the project gives primacy to the Hebrew
    witness. The Greek parallel was used as a consistency check and confirms the broader
    theme of transience, but it shifts the subject from the work to the worker. Because
    the Hebrew is high-confidence and validated, the main text follows it while preserving
    the Greek-based alternative in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives;
    preserve ambiguity/alternatives in footnotes where significant.'
