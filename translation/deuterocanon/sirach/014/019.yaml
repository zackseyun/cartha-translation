translation:
  text: All his works decay with rottenness, and the work of his hands is dragged
    along behind him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''and the one who does it will depart with it.'' The Hebrew instead
      speaks of the work of his hands being drawn along behind him.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Quantifier covering the totality of the person's output; 'All' is natural
    and sufficiently comprehensive in English.
- source_word: מַעֲשָׂיו
  chosen: his works
  alternatives:
  - his deeds
  - what he does
  lexicon: HALOT
  rationale: The noun refers broadly to what a person does or produces. 'Works' preserves
    the concrete and literary feel and aligns well with the parallel Greek ἔργον.
- source_word: רָקוֹב יִרְקָבוּ
  chosen: decay with rottenness
  alternatives:
  - surely rot
  - rot away
  - become rotten
  lexicon: HALOT
  rationale: The Hebrew combines a cognate form with the verb for emphasis. Rather
    than flattening it to a single English verb, 'decay with rottenness' preserves
    the intensive sense and echoes the image of corruption. The Greek σηπόμενον /
    ἐκλείπει confirms the sense of perishing through decay.
- source_word: וּפֹעַל
  chosen: and the work
  alternatives:
  - and the product
  - and the labor
  lexicon: HALOT
  rationale: Here פֹּעַל denotes the result or product of action. 'Work' keeps the
    semantic link with מַעֲשָׂיו while remaining idiomatic.
- source_word: יָדָיו
  chosen: of his hands
  alternatives:
  - his handiwork
  lexicon: HALOT
  rationale: The Hebrew idiom explicitly mentions the hands. 'Of his hands' preserves
    the concrete imagery; 'handiwork' was possible but slightly more interpretive.
- source_word: יִמָּשֵׁךְ אַחֲרָיו
  chosen: is dragged along behind him
  alternatives:
  - follows after him
  - is drawn after him
  - goes after him
  lexicon: HALOT
  rationale: The Niphal/passive-like sense of משך suggests being drawn or dragged.
    'Behind him' renders אַחֲרָיו directly. The Greek differs somewhat ('the one who
    does it will depart with it'), but the Hebrew witness is primary here; this rendering
    preserves the Hebrew image while acknowledging that the line depicts the work
    as trailing after its maker.
