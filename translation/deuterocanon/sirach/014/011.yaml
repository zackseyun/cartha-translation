translation:
  text: My son, if you have the means, do good to yourself, and present worthy offerings
    to the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Hebrew reads only, 'My son, if you have the means, do good to
      yourself.' The clause 'and present worthy offerings to the Lord' is preserved
      in the Greek parallel and may reflect a fuller text.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Direct vocative from Hebrew בֵּן with 1cs suffix. Although the Greek
    has Τέκνον ('child'), the Hebrew witness is primary here and explicitly masculine
    singular; per gender-accurate policy, 'My son' best reflects the source.
- source_word: אִם יֵשׁ לְךָ
  chosen: if you have
  alternatives:
  - if there is for you
  - if you possess
  lexicon: HALOT
  rationale: Idiomatic Hebrew existential construction meaning possession. Rendered
    naturally in English as 'if you have'.
- source_word: שָׁרֵית נַפְשֶׁךָ
  chosen: the means
  alternatives:
  - something left over
  - provision for yourself
  - surplus
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat compressed and unusual; in context it points
    to resources available to a person. The Greek parallel interprets the clause broadly
    ('as you have'), supporting a sense like available means or resources rather than
    a narrow literal 'remnant of your soul.' 'The means' gives the likely sense in
    readable English while staying anchored to the Hebrew.
- source_word: הֵיטִיב לָךְ
  chosen: do good to yourself
  alternatives:
  - benefit yourself
  - treat yourself well
  lexicon: HALOT
  rationale: Hiphil of יטב with reflexive sense via לָךְ. 'Do good to yourself' preserves
    the ethical tone without sounding colloquial.
- source_word: καθὼς ἐὰν ἔχῃς
  chosen: if you have the means
  alternatives:
  - according to what you have
  - as far as you are able
  lexicon: BDAG
  rationale: The Greek parallel helps clarify the difficult Hebrew phrase by expressing
    action in proportion to one's resources. This supports the English 'if you have
    the means' as an interpretive bridge between the witnesses.
- source_word: προσφορὰς Κυρίῳ ἀξίως πρόσαγε
  chosen: and present worthy offerings to the Lord
  alternatives:
  - and bring offerings to the Lord worthily
  - and offer fitting gifts to the Lord
  lexicon: BDAG
  rationale: This clause appears in the Greek parallel but is absent from the extant
    Hebrew line. Because the task requires using the parallel source as actual translation
    input, and because the Greek likely preserves a fuller form of the verse, it is
    included in the main text. 'Present worthy offerings' is clear modern English
    and preserves ἀξίως.
