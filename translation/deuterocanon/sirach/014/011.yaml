    yourself.'''
  rationale: For Sirach, Hebrew is primary where extant, but the prompt explicitly
    requires the Greek parallel to be used as actual translation input. Here the Greek
    supplies a coherent second colon that fits Ben Sira's style and the verse's ethical-sacrificial
