translation:
  text: He who camps around her house and drives his tent peg into her wall—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lodges near her house and fastens a peg in her walls.' The Greek parallel
      reads more explicitly 'near,' while the Hebrew vividly says 'around.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחוֹנֶה
  chosen: He who camps
  alternatives:
  - the one who encamps
  - he who lodges
  lexicon: HALOT
  rationale: From חנה, 'to camp/encamp.' The participial form gives a habitual or
    characteristic sense, well rendered by 'He who camps.' The Greek καταλύων supports
    the sense of lodging nearby, but the Hebrew image of encamping is more concrete
    and is retained.
- source_word: סְבִיבוֹת
  chosen: around
  alternatives:
  - all around
  - near
  lexicon: HALOT
  rationale: The Hebrew indicates surrounding proximity, not merely generic nearness.
    The Greek σύνεγγυς suggests 'near,' but the Hebrew more vividly conveys encamping
    around the house; 'around' preserves that imagery while remaining natural English.
- source_word: בֵּיתָהּ
  chosen: her house
  alternatives:
  - her home
  lexicon: HALOT
  rationale: Literal possessive construction. In context 'her' refers to Wisdom personified
    in the preceding verse; 'house' preserves the concrete metaphor.
- source_word: וְהֵבִיא
  chosen: drives
  alternatives:
  - brings
  - sets
  - plants
  lexicon: HALOT
  rationale: Although the verb is formally 'brings,' the object is tent pegs and the
    Greek πήξει ('will fasten/fix') clarifies the intended action. 'Drives' captures
    the idiomatic sense in English of setting a tent peg.
- source_word: יְתֵדָיו
  chosen: his tent peg
  alternatives:
  - his pegs
  - his stake
  lexicon: HALOT
  rationale: יתד is a peg/stake, especially a tent peg in encampment imagery. Singular
    'peg' is adopted in English to match the Greek πάσσαλον and to avoid awkwardness,
    though the Hebrew form may be plural or a plural with singular sense in context.
- source_word: בְּקִירָהּ
  chosen: into her wall
  alternatives:
  - in her wall
  - against her wall
  lexicon: HALOT
  rationale: קיר means 'wall.' With the preposition ב and the tent imagery, the sense
    is fastening the peg into or at her wall. 'Into her wall' best conveys the act
    of securing camp adjacent to Wisdom's dwelling.
