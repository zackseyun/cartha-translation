translation:
  text: Wealth is not fitting for a small-hearted man, and treasure is not fitting
    for a man with an evil eye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'small-hearted'; the Greek parallel suggests a petty or miserly person.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man with an evil eye,' an idiom for someone envious, stingy, or
      begrudging.
    reason: lexical_alternative
  - marker: c
    text: The Greek parallel reads, 'For a petty man wealth is not good, and for an
      envious man, why money?' This supports the sense of the Hebrew while differing
      slightly in phrasing.
    reason: alternative_reading
lexical_decisions:
- source_word: לְלֵב קָטֹן
  chosen: for a small-hearted man
  alternatives:
  - for a petty man
  - for a stingy man
  - for a mean-spirited man
  lexicon: HALOT
  rationale: The Hebrew literally combines 'heart' with 'small,' suggesting narrowness
    or pettiness of disposition. The Greek parallel μικρολόγῳ points toward a miserly/petty
    character. 'Small-hearted man' preserves the Hebrew image while remaining intelligible
    in English; more interpretive options like 'stingy man' are possible but flatten
    the metaphor too quickly.
- source_word: לֹא נָאוֶה
  chosen: is not fitting
  alternatives:
  - does not suit
  - is not becoming
  lexicon: HALOT
  rationale: The verb conveys what is suitable, proper, or becoming. 'Is not fitting'
    is natural modern English and preserves the evaluative sense without sounding
    archaic.
- source_word: עֹשֶׁר
  chosen: wealth
  alternatives:
  - riches
  - abundance
  lexicon: HALOT
  rationale: A standard rendering for material wealth. 'Wealth' works well in the
    first colon and avoids unnecessary repetition with the second colon, where a near-synonym
    can be used in English.
- source_word: וּלְאִישׁ רַע עַיִן
  chosen: for a man with an evil eye
  alternatives:
  - for an envious man
  - for a stingy man
  - for a begrudging man
  lexicon: HALOT
  rationale: The Hebrew idiom 'evil eye' commonly denotes stinginess, envy, or begrudging
    selfishness. The Greek βασκάνῳ likewise supports a hostile/envious sense. The
    main text keeps the idiom for transparency and auditability; its sense can be
    clarified in a footnote.
- source_word: חָרוּץ
  chosen: riches
  alternatives:
  - gold
  - money
  - treasure
  lexicon: HALOT
  rationale: In this context the word denotes material assets or wealth. The Greek
    parallel χρήματα confirms a money/possessions sense. 'Riches' gives good English
    style in parallel with 'wealth' while reflecting the semantic field.
