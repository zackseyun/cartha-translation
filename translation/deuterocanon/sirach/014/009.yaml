translation:
  text: In the eye of the greedy, his portion is too little, and by taking his neighbor’s
    share he destroys his own portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'In the eye of ... his portion is little.' The Hebrew term rendered
      'the greedy' is difficult in this manuscript tradition; the Greek parallel reads
      'the eye of the greedy is not filled with a portion,' which supports this sense.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּעֵין
  chosen: In the eye of
  alternatives:
  - In the sight of
  - To
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'in the eye of' to express how something
    appears to a person. Retaining 'eye' preserves the vividness of the Hebrew while
    remaining intelligible in English.
- source_word: כּוֹשֵׁל
  chosen: the greedy
  alternatives:
  - the miserly
  - the grasping
  - the covetous
  lexicon: HALOT
  rationale: The Hebrew form is difficult and the source is marked with mismatch;
    the Greek parallel has πλεονέκτου ('greedy/covetous person'), which strongly supports
    understanding the Hebrew here as referring to a grasping person rather than 'stumbling'
    in a literal sense. 'Greedy' is the clearest modern English rendering.
- source_word: מְעַט
  chosen: too little
  alternatives:
  - little
  - small
  lexicon: HALOT
  rationale: The sense is not merely that his portion is small objectively, but that
    it seems insufficient to him. 'Too little' brings out the evaluative force implied
    by the idiom and supported by the Greek, which says the greedy eye is not filled
    by a portion.
- source_word: חֶלְקוֹ
  chosen: his portion
  alternatives:
  - his share
  - his allotment
  lexicon: HALOT
  rationale: '''Portion'' fits wisdom literature well and allows the repetition in
    the verse to be heard. ''Share'' is possible, but ''portion'' better preserves
    the moral and proverbial tone.'
- source_word: וְלוֹקֵחַ
  chosen: by taking
  alternatives:
  - and taking
  - when he takes
  lexicon: HALOT
  rationale: The participial form links the second clause closely to the first as
    the greedy person's characteristic action. 'By taking' expresses means/result
    smoothly in English.
- source_word: חֵלֶק רֵעֵהוּ
  chosen: his neighbor’s share
  alternatives:
  - the portion of his companion
  - his fellow's portion
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor, companion, or fellow. 'Neighbor' is natural
    English and preserves the ethical dimension of wronging another person.
- source_word: מְאַבֵּד
  chosen: he destroys
  alternatives:
  - he ruins
  - he loses
  lexicon: HALOT
  rationale: The Hebrew causative form most naturally means 'destroys' or 'causes
    to perish.' Although 'loses' is possible as a consequence, 'destroys' better reflects
    the active verbal force and the moral warning.
