theological_decisions:
- issue: Use of the Greek parallel to resolve a difficult Hebrew reading
  chosen_reading: Render the subject as 'the greedy' and the first clause as a statement
    of insatiable greed.
  alternative_readings:
  - Render כושל more literally as 'the stumbling/failing one'
  - Translate the line more woodenly as 'In the eye of one who fails, his portion
    is little'
  rationale: The Hebrew witness is marked 'major_mismatch,' and כושל is not straightforward
    in context. The Greek parallel, treated as an actual translation input per instructions,
    reads 'The eye of the greedy is not satisfied with a portion,' which clarifies
    the proverb's sense. The English draft therefore follows the Hebrew where possible
    but lets the Greek guide the interpretation of the difficult term and the evaluative
    nuance of 'too little.'
