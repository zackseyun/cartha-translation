translation:
  text: One who looks in through her window, and at her doorway he will listen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will eavesdrop.' The Hebrew verb suggests close, intent listening;
      the Greek parallel has 'he will listen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׁקִיף
  chosen: One who looks in
  alternatives:
  - He who looks out/peers
  - The one who gazes
  lexicon: HALOT
  rationale: From שׁקף, 'to look out/down, peer.' With בְּעַד חֲלוֹנָה and the Greek
    παρακύπτων, the sense is not a casual glance but peering in/through an opening.
    'One who looks in' gives natural English while preserving the participial, proverbial
    force.
- source_word: בְּעַד חֲלוֹנָה
  chosen: through her window
  alternatives:
  - through the window
  - at her window
  lexicon: HALOT
  rationale: בְּעַד commonly means 'through' in spatial contexts. The Hebrew has singular
    'window' with 3fs suffix implied by context in the verse pair; the Greek likewise
    has 'through her windows/openings.' 'Through her window' best matches the image
    of peering through an aperture.
- source_word: וְעַל פְּתָחֶיהָ
  chosen: and at her doorway
  alternatives:
  - and at her doors
  - and upon her entrance
  lexicon: HALOT
  rationale: פתח can mean doorway/entrance/opening. Although the Hebrew form is plural
    with suffix ('her openings/doorways'), English idiom prefers a collective singular
    here. The Greek θυρώματα also points to door-openings. 'At her doorway' is idiomatic
    and keeps the architectural metaphor.
- source_word: יְצוֹתֵת
  chosen: he will listen
  alternatives:
  - he will eavesdrop
  - he will attend closely
  lexicon: HALOT
  rationale: The verb denotes listening attentively, often stealthily. The Greek ἀκροάσεται
    confirms an auditory sense. 'He will listen' is the broad, textually secure rendering;
    'eavesdrop' is possible but slightly over-specifies the motive.
