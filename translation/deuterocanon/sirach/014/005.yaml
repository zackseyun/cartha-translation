translation:
  text: If he is evil to himself, to whom will he do good? He will not enjoy his own
    good things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'he will not see his good.' The Hebrew idiom likely means he
      will not experience or enjoy the good that is his; the Greek parallel makes
      this sense explicit with 'will not rejoice in his possessions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַע
  chosen: is evil
  alternatives:
  - is bad
  - does harm
  lexicon: HALOT
  rationale: 'Predicate adjective with לְנַפְשׁוֹ: the sense is that a person acts
    badly toward himself or is harmful to himself. ''Is evil to himself'' preserves
    the moral force of the Hebrew and aligns with the Greek πονηρός, while still reading
    naturally in English.'
- source_word: לְנַפְשׁוֹ
  chosen: to himself
  alternatives:
  - to his own soul
  - for himself
  lexicon: HALOT
  rationale: נפש can mean 'soul,' 'self,' or 'life.' Here the idiom concerns one's
    treatment of oneself, so 'to himself' is the most natural English equivalent without
    importing a more technical anthropology.
- source_word: לְמִי
  chosen: to whom
  alternatives:
  - for whom
  lexicon: HALOT
  rationale: The interrogative asks who could benefit if the person does not even
    benefit himself. 'To whom' fits the verbal construction with 'do good' in English.
- source_word: יֵיטִיב
  chosen: will he do good
  alternatives:
  - will he be good
  - will he benefit
  lexicon: HALOT
  rationale: From יטב in the Hiphil, 'do good' or 'benefit.' 'Will he do good' keeps
    the ethical tone and mirrors the Hebrew contrast with being evil to himself.
- source_word: וְלֹא יִרְאֶה
  chosen: He will not enjoy
  alternatives:
  - he will not see
  - he will not experience
  lexicon: HALOT
  rationale: Literally 'he will not see,' but in Hebrew and supported by the Greek
    εὐφρανθήσεται in the parallel, the sense is experiential participation in good.
    'Enjoy' expresses the idiom clearly in modern English while remaining anchored
    in the source sense.
- source_word: בְּטוֹבָתוֹ
  chosen: his own good things
  alternatives:
  - his prosperity
  - his good
  - his wealth
  lexicon: HALOT
  rationale: טובה can denote goodness, welfare, prosperity, or good things. The Greek
    χρήμασιν points toward possessions/resources, but the Hebrew is slightly broader.
    'His own good things' preserves that breadth while still fitting the context of
    miserly self-denial.
