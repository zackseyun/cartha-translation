source:
  edition: sefaria-ben-sira-kahana
  text: וּלְאֵל יָדְךָ הִדָּשֵׁן, זְכוֹר כִּי לֹא בִשְׁאוֹל תַּעֲנוּג.<br><small>(יב)</small>
    וְלֹא מָוֶת יִתְמַהְמַהּ, וְחֹק לִשְׁאוֹל לֹא הֻגַּד לָךְ.
  language: Hebrew
  pages:
