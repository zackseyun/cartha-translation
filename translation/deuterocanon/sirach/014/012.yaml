theological_decisions:
- issue: Rendering שְׁאוֹל / ᾅδης
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the underworld
  - Hades
  rationale: The verse refers to the realm of the dead in Hebrew wisdom idiom, not
    specifically to later doctrinal notions of hell. 'Sheol' preserves the ancient
    Israelite concept and avoids importing later theological specificity.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
