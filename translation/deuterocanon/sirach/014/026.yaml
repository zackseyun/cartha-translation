translation:
  text: He sets his nest in her foliage, and lodges among her branches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''He will place his children in her shelter, and he will
      lodge under her branches.'' The Hebrew reads ''his nest'' and ''in her foliage.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָשִׂים
  chosen: He sets
  alternatives:
  - he places
  - he puts
  lexicon: HALOT
  rationale: The Hebrew verb from שׂים commonly means 'put/place/set.' 'Sets' is natural
    English for establishing a nest and preserves the concrete action without over-paraphrase.
- source_word: קִנּוֹ
  chosen: his nest
  alternatives:
  - his dwelling
  - his brood
  lexicon: HALOT
  rationale: The Hebrew plainly denotes a nest. Although the Greek parallel reads
    'his children,' the Hebrew witness is primary here and is coherent; 'nest' also
    fits the surrounding arboreal imagery.
- source_word: בְעָפְיָהּ
  chosen: in her foliage
  alternatives:
  - in her leaves
  - in her thicket
  lexicon: HALOT
  rationale: The form refers to leafy growth/foliage. 'Foliage' is idiomatic in English
    and suits the personified tree of wisdom in context. The feminine suffix is retained
    as 'her,' referring to wisdom/tree imagery.
- source_word: וּבַעֲנָפֶיהָ
  chosen: among her branches
  alternatives:
  - in her branches
  - under her branches
  lexicon: HALOT
  rationale: ענף means 'branch/bough.' 'Among her branches' fits the Hebrew preposition
    and the image of taking shelter within a tree. The Greek has 'under her branches,'
    which is a meaningful parallel but not followed in the main text because the Hebrew
    witness is available.
- source_word: יִתְלוֹנָן
  chosen: lodges
  alternatives:
  - spends the night
  - takes shelter
  - dwells
  lexicon: HALOT
  rationale: The verb conveys lodging or passing the night. 'Lodges' preserves the
    sense succinctly and matches the nesting imagery better than the more general
    'dwells.'
