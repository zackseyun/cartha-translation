theological_decisions:
- issue: Personification of wisdom as feminine
  chosen_reading: Render feminine references straightforwardly as 'her.'
  alternative_readings:
  - Replace with 'it' to depersonalize wisdom
  rationale: The surrounding context personifies wisdom as a woman. Preserving 'her'
    maintains the literary and theological imagery of the Hebrew and Greek.
  doctrine_reference: Translation philosophy §1, §3
- issue: Degree of idiomatic smoothing in habitation imagery
  chosen_reading: Retain concrete tent/lodging imagery rather than paraphrasing to
    abstract attachment to wisdom.
  alternative_readings:
  - He makes his home near her and lives well
  rationale: The verse uses vivid domestic/camping imagery to describe closeness to
    wisdom. Optimal equivalence here favors preserving the metaphor rather than flattening
    it into abstraction.
  doctrine_reference: Translation philosophy §1, §6
