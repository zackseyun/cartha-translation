translation:
  text: He pitches his tent beside her, and he lodges in a good dwelling-place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'upon/by her hand,' an idiom for nearness; compare the Greek
      'according to her hands.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and he dwells in a pleasant lodging.' The Hebrew wording is compact,
      and the Greek parallel suggests the sense of lodging in a good place.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנוֹטֶה
  chosen: he pitches
  alternatives:
  - he stretches out
  - he inclines
  - he sets up
  lexicon: HALOT
  rationale: From נטה, here in context with אהל 'tent,' the idiom means to spread
    or pitch a tent. 'He pitches' is natural English and matches the concrete image.
- source_word: אָהֳלוֹ
  chosen: his tent
  alternatives:
  - his shelter
  lexicon: HALOT
  rationale: אהל is the ordinary word for 'tent.' The image is literal and should
    be preserved rather than generalized.
- source_word: עַל יָדָהּ
  chosen: beside her hand
  alternatives:
  - by her side
  - near her
  - at her hand
  lexicon: HALOT
  rationale: Literally 'upon/by her hand.' In Hebrew this can denote proximity. The
    Greek κατὰ χεῖρας αὐτῆς confirms a locative sense of nearness. 'Beside her hand'
    keeps the Hebrew image while remaining intelligible; the more idiomatic 'by her
    side' is preserved as an alternative.
- source_word: וְשָׁכַן
  chosen: and he lodges
  alternatives:
  - and he dwells
  - and he settles
  lexicon: HALOT
  rationale: Though שכן often means 'dwell,' in parallel with tent imagery and supported
    by Greek καταλύσει, the sense here is taking up lodging/camping. 'Lodges' fits
    the immediate context better than the more permanent 'dwells.'
- source_word: שֹׁכֶן טוֹב
  chosen: a good dwelling-place
  alternatives:
  - a pleasant lodging
  - good things
  - a good abode
  lexicon: HALOT; LSJ
  rationale: The Hebrew as transmitted is somewhat compressed, literally something
    like 'a good dwelling.' The Greek ἐν καταλύματι ἀγαθῶν points to lodging in a
    good place/among good things. 'A good dwelling-place' preserves the habitation
    imagery without overinterpreting the plural nuance of the Greek.
