theological_decisions:
- issue: Gender of the personified antecedent (wisdom/tree imagery)
  chosen_reading: Render feminine Hebrew suffixes with 'its' rather than 'her' in
    English.
  alternative_readings:
  - Render as 'her shade' and 'her shelters' to preserve personified Wisdom more explicitly.
  rationale: The immediate imagery is arboreal/protective ('shade,' 'shelters'), and
    English naturally uses impersonal reference for a tree or its canopy. This avoids
    awkwardness while not denying the broader personification of wisdom in the context.
    The source's feminine morphology is a grammatical feature tied to the antecedent,
    not necessarily requiring 'her' in every English clause.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Generic subject representation
  chosen_reading: Use 'he' for the singular generic subject.
  alternative_readings:
  - the one who takes refuge
  - they take refuge
  rationale: The Hebrew verbal form is singular and the project's policy prefers gender-accurate
    renderings over flattening to plural/gender-neutral English when the source uses
    a singular generic form. Here 'he' preserves the proverbial singular style.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
