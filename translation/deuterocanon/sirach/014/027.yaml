translation:
  text: He takes refuge in its shade from the heat, and he will dwell in its shelters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following the Greek parallel more closely: ''He will be sheltered by
      it from the burning heat, and he will lodge in its glory.'' The Hebrew reads
      ''in its shelters,'' while the Greek has ''in its glory.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְחוֹסֶה
  chosen: He takes refuge
  alternatives:
  - and takes refuge
  - one who takes refuge
  - is sheltered
  lexicon: HALOT
  rationale: From חסה, denoting seeking refuge/protection. The Hebrew participial
    form can function generically; English present tense captures the proverbial sense.
    The Greek parallel σκεπασθήσεται ('will be sheltered') confirms the protective
    idea, but the Hebrew witness is primary here.
- source_word: בְּצִלָּהּ
  chosen: in its shade
  alternatives:
  - under its shadow
  - in her shade
  lexicon: HALOT
  rationale: צל commonly means shade/shadow. 'Shade' fits the concrete image with
    מֵחֹרֶב ('from the heat'). The feminine suffix refers back to wisdom as personified
    in the context; 'its' avoids over-personifying in English while preserving the
    antecedent.
- source_word: מֵחֹרֶב
  chosen: from the heat
  alternatives:
  - from scorching heat
  - from drought
  lexicon: HALOT
  rationale: חרב can denote heat/dryness/scorching conditions. The Greek καύματος
    strongly supports 'heat' or 'burning heat' here. 'From the heat' is natural English
    and preserves the image without over-expansion.
- source_word: וּבִמְעוֹנוֹתֶיהָ
  chosen: in its shelters
  alternatives:
  - in its dwellings
  - in its habitations
  - in its refuge-places
  lexicon: HALOT
  rationale: מעונות denotes dwelling places/habitations. In this context of protective
    imagery, 'shelters' brings out the function implied by the Hebrew and aligns with
    the Greek's sense of lodging/resting in what belongs to wisdom. It is a modest
    contextual rendering rather than a paraphrase.
- source_word: יִשְׁכֹּן
  chosen: he will dwell
  alternatives:
  - he will lodge
  - he will stay
  - he will settle
  lexicon: HALOT
  rationale: שכן means dwell, reside, settle. 'Dwell' preserves the elevated, wisdom-literature
    tone. The Greek καταλύσει could suggest 'lodge/stay,' but the Hebrew is well represented
    by 'dwell'.
