translation:
  text: You who fear the LORD, hope for good, and for everlasting joy and mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads 'hope for good things,' with the noun in the plural.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'mercy' could also be rendered 'steadfast love' or 'kindness'; the
      Greek parallel likewise has 'mercy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה
  chosen: You who fear the LORD
  alternatives:
  - Those who fear the LORD
  - Fearers of the LORD
  lexicon: HALOT
  rationale: The Hebrew is a vocative plural participial expression, directly addressing
    a group. Rendering it as 'You who fear the LORD' preserves the exhortational force
    better than a third-person description. 'the LORD' follows the project's default
    for יְהוָה.
- source_word: קַוּוּ
  chosen: hope
  alternatives:
  - wait
  - trust
  - set your hope
  lexicon: HALOT
  rationale: The imperative calls for expectant reliance. 'Hope' fits both the Hebrew
    and the Greek ἐλπίσατε, while remaining natural English. 'Wait' is too narrow
    here, and 'trust' shifts the semantic center.
- source_word: לְטוֹב
  chosen: for good
  alternatives:
  - for what is good
  - for good things
  lexicon: HALOT
  rationale: The Hebrew singular with prefixed ל can be rendered generally as 'for
    good.' The Greek εἰς ἀγαθά is plural ('good things'), but the Hebrew witness is
    primary here; 'for good' preserves the broad, open-ended sense while still fitting
    the Greek's positive expectation.
- source_word: וּלְשִׁמְחַת עוֹלָם
  chosen: and for everlasting joy
  alternatives:
  - and for eternal gladness
  - and for joy forever
  lexicon: HALOT
  rationale: שִׂמְחָה denotes joy/gladness; 'everlasting joy' is idiomatic and preserves
    עוֹלָם as enduring duration. It also aligns well with the Greek εὐφροσύνην αἰῶνος.
- source_word: וָחֶסֶד
  chosen: and mercy
  alternatives:
  - and steadfast love
  - and favor
  - and kindness
  lexicon: HALOT
  rationale: חֶסֶד can denote covenant loyalty, kindness, or mercy. In this coordinate
    series of hoped-for blessings, 'mercy' best matches the Greek ἐλέους and reads
    naturally in English without over-specifying covenantal nuance not explicit in
    this line.
