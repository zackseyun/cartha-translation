translation:
  text: Those who fear the LORD will seek his favor, and those who love him will learn
    his law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''and those who love him will be filled with the law.'''
    reason: alternative_reading
  - marker: b
    text: Or 'his instruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה
  chosen: those who fear the LORD
  alternatives:
  - the fearers of the LORD
  - those who revere the LORD
  lexicon: HALOT
  rationale: The Hebrew construct literally denotes people characterized by fearing
    YHWH. 'Those who fear the LORD' is natural English and preserves the covenantal/religious
    sense. 'the LORD' follows the project's default for YHWH.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name is rendered 'the LORD' rather than transliterated.
- source_word: יְבַקְּשׁוּ
  chosen: will seek
  alternatives:
  - seek
  - will pursue
  lexicon: HALOT
  rationale: The imperfect here expresses characteristic future/general action. 'Will
    seek' fits the Hebrew and aligns with the Greek ζητήσουσιν.
- source_word: רְצוֹנוֹ
  chosen: his favor
  alternatives:
  - his will
  - what pleases him
  - his good pleasure
  lexicon: HALOT
  rationale: Hebrew רצון commonly means favor, acceptance, or what is pleasing. The
    Greek εὐδοκίαν strongly supports the sense 'favor/good pleasure' rather than 'will'
    in the sense of command. 'His favor' is concise and idiomatic.
- source_word: וְאֹהֲבָיו
  chosen: and those who love him
  alternatives:
  - and his lovers
  - and those who love the LORD
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the LORD. 'Those who love him' is
    natural and preserves the personal devotion expressed in the Hebrew.
- source_word: יִלְמְדוּ
  chosen: will learn
  alternatives:
  - will study
  - will be taught
  lexicon: HALOT
  rationale: The Hebrew verb למד in qal most naturally means 'learn.' This follows
    the Hebrew witness directly. The Greek parallel has ἐμπλησθήσονται ('will be filled'),
    indicating a divergent Vorlage or interpretive rendering, but the Hebrew is the
    primary source here.
- source_word: תוֹרָתוֹ
  chosen: his law
  alternatives:
  - his instruction
  - his teaching
  lexicon: HALOT
  rationale: תורה can mean instruction broadly, but 'law' keeps the traditional and
    covenantal force and is supported by the Greek τοῦ νόμου. Because modern readers
    may hear only legal code, the alternative 'instruction' is worth preserving in
    a footnote.
