translation:
  text: Let us fall into the hand of the LORD, and not into the hand of man, for as
    his greatness is, so also is his mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has 'hands' in both clauses ('into the hands of the Lord ... not into
      the hands of men'), while the Hebrew witness reads singular 'hand.' The translation
      follows the Hebrew as the primary witness here.
    reason: textual_variant
  - marker: b
    text: Or 'his steadfast love.' Hebrew חֶסֶד can denote covenantal kindness or
      loyal love; the Greek parallel reads 'mercy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִפֹּל
  chosen: Let us fall
  alternatives:
  - Let us fall into
  - Let us entrust ourselves
  lexicon: HALOT
  rationale: The Hebrew cohortative plural from נפל expresses a volitional exhortation,
    best rendered 'Let us fall.' The following preposition phrase supplies 'into the
    hand.' 'Entrust ourselves' captures the sense but goes beyond the literal imagery
    preserved in both Hebrew and Greek.
- source_word: בְּיַד
  chosen: into the hand
  alternatives:
  - into the hands
  - under the power of
  lexicon: HALOT
  rationale: The Hebrew has singular 'hand,' matched by the Greek singular χεῖρας?
    Greek uses plural, but the Hebrew primary witness reads singular in both clauses.
    English idiom commonly allows singular here, and it preserves the Hebrew image.
    'Under the power of' is interpretive rather than translational.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton is rendered 'the LORD' rather than transliterated.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humanity
  - a human being
  - people
  lexicon: HALOT
  rationale: Here אָדָם stands in contrast to the LORD and functions generically for
    mortal human beings. 'Man' preserves the singular contrast and follows the project's
    gender-accurate policy for representative generic usage.
- source_word: כְּגָדְלוֹ
  chosen: as his greatness is
  alternatives:
  - according to his greatness
  - as great as he is
  lexicon: HALOT
  rationale: The comparative construction כ...כן is mirrored by 'as...so.' 'His greatness'
    is the most direct rendering of גֹּדֶל/גָּדְלוֹ, and the supplied verb 'is' makes
    natural English while preserving the structure.
- source_word: חַסְדּוֹ
  chosen: his mercy
  alternatives:
  - his steadfast love
  - his kindness
  lexicon: HALOT
  rationale: In this context חסד denotes the LORD's compassionate covenantal benevolence
    toward those who trust him. 'Mercy' fits the parallel Greek ἔλεος and the immediate
    sense of appealing to divine compassion rather than merely loyalty. 'Steadfast
    love' is possible but less natural in this proverb-like comparison.
