theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following Jewish reverence
    tradition and the Septuagintal pattern. This also aligns with the Greek parallel's
    Κυρίου.
  doctrine_reference: 'DOCTRINE.md contested terms: יְהוָה YHWH → the LORD'
- issue: Generic singular אָדָם in contrast with God
  chosen_reading: man
  alternative_readings:
  - humanity
  - human beings
  - people
  rationale: The verse contrasts divine and human hands in singular form. 'Man' preserves
    the singular rhetorical contrast without implying maleness specifically; this
    follows the project's gender-accurate-over-gender-neutral policy where representative
    generic force is present.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
