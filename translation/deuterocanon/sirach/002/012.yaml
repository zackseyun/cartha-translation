translation:
  text: Woe to the faint of heart and the slack hands, and to the sinner of crooked
    ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and to the wicked/sinner of crooked ways' or 'twisted
      paths'; the Greek parallel reads 'the sinner who walks on two paths,' which
      likely reflects the intended sense of divided or duplicitous conduct.
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: An interjection of lament/threat. 'Woe' preserves the prophetic and wisdom-register
    force better than the softer 'alas'.
- source_word: לְרַכֵּי לֵב
  chosen: to the faint of heart
  alternatives:
  - to the soft-hearted
  - to the timid-hearted
  - to the cowardly in heart
  lexicon: HALOT
  rationale: The Hebrew idiom literally suggests softness/tenderness of heart in a
    negative sense; the Greek parallel δειλαῖς καρδίαις supports the sense of timidity/cowardice
    rather than compassion. 'Faint of heart' is natural English and matches the warning
    context.
- source_word: וּרְפֵה יָדָיִם
  chosen: and the slack hands
  alternatives:
  - and weak hands
  - and feeble hands
  - and hands that hang limp
  lexicon: HALOT
  rationale: The phrase denotes weakened or enervated hands, a common idiom for lack
    of resolve or strength. 'Slack hands' keeps the concrete imagery while remaining
    readable; the Greek παρειμέναις likewise points to loosened/relaxed hands.
- source_word: וְלָרָשָׁע
  chosen: and to the sinner
  alternatives:
  - and to the wicked man
  - and to the wicked
  lexicon: HALOT
  rationale: Although רשע can mean 'wicked,' the Greek parallel ἁμαρτωλῷ specifically
    supports 'sinner.' This also avoids over-specifying moral character beyond the
    parallel witness.
- source_word: עִקֵּשׁ דְּרָכַיִם
  chosen: who walks on two paths
  alternatives:
  - crooked in ways
  - of twisted ways
  - who follows crooked paths
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult ('crooked of ways/paths'), and
    the source validation notes a minor mismatch. The Greek parallel ἐπιβαίνοντι ἐπὶ
    δύο τρίβους clarifies the sense as duplicity or vacillation between two ways.
    'Who walks on two paths' best reflects the parallel while remaining anchored to
    the Hebrew's path-language.
