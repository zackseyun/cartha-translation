translation:
  text: 'Look to the generations of old and see: who trusted in the LORD and was put
    to shame? Or who trusted in him and was abandoned? Or who called on him and was
    not answered?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''who remained in his fear and was abandoned?'' The extant Hebrew
      instead reads ''who trusted in him and was abandoned?'''
    reason: alternative_reading
  - marker: b
    text: 'Greek: ''who called on him, and he overlooked him?'' The Hebrew reads ''who
      called on him and was not answered?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבִּיטוּ
  chosen: Look
  alternatives:
  - Consider
  - Gaze
  lexicon: HALOT
  rationale: Imperative plural from נבט/הביט, calling the audience to direct attention.
    'Look' is natural modern English and fits the following object phrase.
- source_word: לְדוֹרוֹת רִאשׂוֹנִים
  chosen: to the generations of old
  alternatives:
  - to former generations
  - to ancient generations
  lexicon: HALOT
  rationale: The phrase points to earlier generations as historical precedent. 'Generations
    of old' preserves the elevated tone while remaining readable.
- source_word: הֶאֱמִין בַּיהוָה
  chosen: trusted in the LORD
  alternatives:
  - believed the LORD
  - had faith in the LORD
  lexicon: HALOT
  rationale: Though אמן can be rendered 'believe,' in this context of reliance and
    vindication the sense is practical trust. The divine name is rendered 'the LORD'
    per doctrine.
- source_word: וַיֵּבוֹשׁ
  chosen: was put to shame
  alternatives:
  - was ashamed
  - was disappointed
  lexicon: HALOT
  rationale: בוש often carries the sense of being shamed or disgraced after misplaced
    reliance. 'Was put to shame' best captures the resultative nuance and aligns with
    the Greek κατῃσχύνθη.
- source_word: בָּטַח בּוֹ
  chosen: trusted in him
  alternatives:
  - relied on him
  - felt secure in him
  lexicon: HALOT
  rationale: בטח is a core trust/reliance verb. 'Trusted in him' keeps the parallelism
    with the first clause, even though the Hebrew uses a different verb.
- source_word: וְנֶעֱזַב
  chosen: was abandoned
  alternatives:
  - was forsaken
  - was left
  lexicon: HALOT
  rationale: עזב here denotes being left without help. 'Abandoned' is clear modern
    English; 'forsaken' is possible but more archaic.
- source_word: קָרָא אֵלָיו
  chosen: called on him
  alternatives:
  - called to him
  - invoked him
  lexicon: HALOT
  rationale: This idiom commonly means appeal or prayer directed to God. 'Called on
    him' is idiomatic and preserves the religious sense.
- source_word: וְלֹא נֶעֱנָה
  chosen: was not answered
  alternatives:
  - did not receive an answer
  - was not heard
  lexicon: HALOT
  rationale: ענה in the passive means to be answered. 'Was not answered' is the most
    direct rendering; 'was not heard' would overinterpret.
- source_word: ἐνέμεινεν τῷ φόβῳ αὐτοῦ
  chosen: not adopted in main text
  alternatives:
  - continued in his fear
  - remained in fear of him
  lexicon: BDAG
  rationale: The Greek parallel diverges from the extant Hebrew, reading 'remained
    in his fear' where the Hebrew has 'trusted in him.' Because the Hebrew is the
    primary witness where extant and confidence is high, the main text follows Hebrew,
    while the Greek alternative is preserved in a footnote.
- source_word: ὑπερεῖδεν αὐτόν
  chosen: not answered (via Hebrew witness)
  alternatives:
  - overlooked him
  - disregarded him
  lexicon: BDAG
  rationale: The Greek asks whether God 'overlooked' the one who called on him, while
    the Hebrew says 'was not answered.' The Hebrew is followed as primary; the Greek
    nuance is worth preserving as an alternative.
