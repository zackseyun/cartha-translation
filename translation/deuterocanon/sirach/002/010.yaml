  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐμβλέψατε εἰς ἀρχαίας γενεὰς καὶ ἴδετε· τίς ἐνεπίστευσεν Κυρίῳ καὶ κατῃσχύνθη;
      ἢ τίς ἐνέμεινεν τῷ φόβῳ αὐτοῦ καὶ ἐγκατελείφθη; ἢ τίς ἐπεκαλέσατο αὐτόν, καὶ
      ὑπερεῖδεν αὐτόν;
