translation:
  text: You who fear Yahweh, trust in him, and your reward will not be delayed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and he will not let your reward remain overnight,' an idiom that is difficult in English; the Greek parallel reads, 'and you will certainly not lose your reward.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה
  chosen: You who fear the LORD
  alternatives:
  - Those who fear the LORD
  - Fearers of the LORD
  lexicon: HALOT
  rationale: The Hebrew is a masculine plural participial expression, vocative in context. English direct address is best conveyed with 'You who fear the LORD.' 'The LORD' follows the project's default for יְהוָה.
- source_word: הַאֲמִינוּ בּוֹ
  chosen: trust in him
  alternatives:
  - believe him
  - have faith in him
  lexicon: HALOT
  rationale: The imperative of אמן with ב conveys reliance/trust. 'Trust in him' is more natural and contextually apt in exhortation than the more cognitive 'believe him,' while remaining faithful to the Hebrew sense. The Greek πιστεύσατε αὐτῷ supports the semantic field of trust/belief.
- source_word: וְהוּא
  chosen: and
  alternatives:
  - and he
  - for he
  lexicon: HALOT
  rationale: The Hebrew explicitly has 'and he,' but idiomatic English expresses the result more naturally as 'and your reward will not be lost.' The subject is still understood from the clause. This is a modest optimal-equivalence smoothing supported by the Greek's shift in construction.
- source_word: לֹא יָלִין
  chosen: will not be lost
  alternatives:
  - will not tarry overnight
  - will not remain overnight
  - will not fail to remain
  lexicon: HALOT
  rationale: The Hebrew verb לין ordinarily means 'lodge/remain overnight,' which is difficult with 'your reward' as subject/object in English. The Greek parallel reads 'you will certainly not lose your reward' (οὐ μὴ ἀπολέσητε τὸν μισθὸν ὑμῶν), indicating the sense that the reward will not fail or disappear. 'Will not be lost' captures the likely intended meaning while honestly reflecting the Hebrew-Greek tension.
- source_word: שְׂכַרְכֶם
  chosen: your reward
  alternatives:
  - your wages
  - your recompense
  lexicon: HALOT
  rationale: שכר can mean wages or reward. In wisdom exhortation about divine recompense, 'reward' is the clearest and most natural English choice.
