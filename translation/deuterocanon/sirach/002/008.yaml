theological_decisions:
- issue: Rendering the divine name יְהֹוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Reconciling Hebrew and Greek clause sense in the final colon
  chosen_reading: your reward will not be lost
  alternative_readings:
  - he will not let your reward remain overnight
  - you will certainly not lose your reward
  rationale: The Hebrew wording is somewhat awkward literally, while the Greek gives a clear sense about not losing reward. The main text preserves the likely sense shared by both witnesses without overcommitting to a wooden literalism that obscures meaning.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source uncertainty honestly'
