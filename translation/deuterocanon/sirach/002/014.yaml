translation:
  text: Woe to you who have lost hope; what will you do at the visitation of the LORD?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''who have lost endurance'' or ''who have lost patience'' (τὴν ὑπομονήν),
      where the Hebrew reads ''hope.'''
    reason: alternative_reading
  - marker: b
    text: '''Visitation'' renders a Hebrew term that can denote the LORD''s intervening
      attention, often in judgment in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹי
  chosen: Woe
  alternatives:
  - Alas
  - Woe to
  lexicon: HALOT
  rationale: Interjection of lament/threat. 'Woe' preserves the prophetic force better
    than the softer 'alas.'
- source_word: אוֹבְדֵי תִּקְוָה
  chosen: who have lost hope
  alternatives:
  - destroyers of hope
  - those who have perished from hope
  - who have lost patience
  lexicon: HALOT
  rationale: The Hebrew phrase most naturally describes people whose hope has perished
    or been lost. The Greek parallel reads 'those who have lost endurance/patience'
    (τὴν ὑπομονήν), which likely reflects an interpretive equivalent. Since the Hebrew
    survives here and is primary, 'lost hope' is preferred in the main text while
    the Greek nuance is preserved in a footnote.
- source_word: תִּקְוָה
  chosen: hope
  alternatives:
  - expectation
  lexicon: HALOT
  rationale: Standard Hebrew sense is 'hope' or 'expectation.' In wisdom context,
    'hope' is the more natural and idiomatic English rendering.
- source_word: פְקוֹד
  chosen: visitation
  alternatives:
  - inspection
  - punishment
  - intervention
  lexicon: HALOT
  rationale: The noun from פקד can denote divine visitation in either mercy or judgment
    depending on context. Here, introduced by 'Woe' and a rhetorical warning, it carries
    a threatening sense, but 'visitation' preserves the Hebrew's broader theological
    register without over-specifying 'punishment' in the main text.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton is rendered 'the LORD' following Jewish
    reverence tradition and established English convention.
