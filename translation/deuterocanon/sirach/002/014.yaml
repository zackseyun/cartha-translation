theological_decisions:
- issue: Whether to render the final phrase as explicitly punitive ('when the LORD
    punishes') or more formally as 'at the visitation of the LORD'
  chosen_reading: at the visitation of the LORD
  alternative_readings:
  - when the LORD visits
  - when the LORD punishes
  rationale: The Hebrew פקד is semantically broader than direct punishment, though
    the context is clearly ominous. The chosen rendering preserves the theological
    tension of divine visitation while allowing the warning context to supply its
    negative force.
  doctrine_reference: Preserve theological tension rather than resolve it.
