translation:
  text: Trust in him, and he will uphold you; make your ways straight, and hope in
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Believe him' or 'Have faith in him.' The Hebrew and Greek can express
      trusting reliance, not only mental assent.
    reason: lexical_alternative
  - marker: b
    text: The middle clause is rendered as an exhortation, 'make your ways straight,'
      following both the Hebrew and the Greek. Some translations instead take it as
      a promise, 'he will direct/straighten your ways.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַאֲמֵן / πίστευσον
  chosen: Trust in him
  alternatives:
  - Believe him
  - Have faith in him
  lexicon: HALOT; BDAG
  rationale: The Hebrew imperative from אמן in the Hifil and the Greek πίστευσον both
    can denote trusting reliance, not mere intellectual belief. 'Trust in him' best
    captures the exhortational sense in context and reads naturally in English. 'Have
    faith in him' is possible, but 'trust' is more idiomatic here while preserving
    the sense.
- source_word: יַחֲזִיק בְּךָ / ἀντιλήμψεται σου
  chosen: he will uphold you
  alternatives:
  - he will support you
  - he will take hold of you
  - he will help you
  lexicon: HALOT; BDAG; LSJ
  rationale: The Hebrew החזיק ב plus person means to hold fast to, support, or sustain;
    the Greek ἀντιλαμβάνομαι likewise conveys taking hold in support or helping. 'Uphold
    you' preserves the metaphor of sustaining support without sounding wooden.
- source_word: יַשֵּׁר אָרְחוֹתֶיךָ / εὐθύνας τὰς ὁδούς σου
  chosen: make your ways straight
  alternatives:
  - direct your paths
  - straighten your paths
  lexicon: HALOT; BDAG; LSJ
  rationale: 'The Hebrew verb ישר means to make straight, and the Greek εὐθύνω confirms
    that sense. Because both Hebrew and Greek have the object ''your ways/paths,''
    the imperative is best taken as addressed to the reader: ''make your ways straight.''
    This follows the source wording more closely than shifting the subject to God
    (''he will direct your paths'').'
- source_word: אָרְחוֹתֶיךָ / ὁδούς σου
  chosen: your ways
  alternatives:
  - your paths
  lexicon: HALOT; BDAG
  rationale: Both Hebrew and Greek use a common metaphor for one's course of life.
    'Ways' is slightly broader and more idiomatic in English in wisdom literature,
    while still preserving the metaphor. 'Paths' remains a viable alternative.
- source_word: וְקַוֵּה אֵלָיו / καὶ ἔλπισον ἐπʼ αὐτόν
  chosen: and hope in him
  alternatives:
  - and wait for him
  - and set your hope on him
  lexicon: HALOT; BDAG
  rationale: The Hebrew קוה can mean wait for or hope in, and the Greek ἐλπίζω clearly
    points to hope. 'Hope in him' best reflects the combined witness and the devotional-wisdom
    context.
