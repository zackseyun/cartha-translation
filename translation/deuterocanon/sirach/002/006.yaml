theological_decisions:
- issue: Subject and force of the middle clause
  chosen_reading: 'The clause is an imperative to the reader: ''make your ways straight.'''
  alternative_readings:
  - 'The clause could be construed in some translations as a promise about God: ''he
    will direct/straighten your ways.'''
  rationale: The Hebrew form יַשֵּׁר and the Greek εὐθύνας are imperative in form
    within a sequence of exhortations. The syntax favors a continued address to the
    hearer rather than a sudden shift back to divine action. The translation preserves
    that exhortational flow.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
