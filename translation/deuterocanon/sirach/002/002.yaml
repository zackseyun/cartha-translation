translation:
  text: Prepare your heart, and be strong; and do not be alarmed in a time of calamity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''do not hurry in a time of affliction/visitation.'' The Hebrew
      emphasizes not being dismayed; the Greek highlights avoiding rash haste under
      trial.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָכֵן
  chosen: Set ... right
  alternatives:
  - prepare
  - make firm
  - direct/straighten
  lexicon: HALOT
  rationale: From כון in the Hiphil, the sense is to establish, prepare, or set in
    order. The Greek parallel εὐθυνον ('make straight/direct') supports an idea of
    inward alignment rather than mere advance preparation. 'Set your heart right'
    captures both the Hebrew and the Greek without sounding wooden.
- source_word: לִבְּךָ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: Hebrew לֵב/לֵבָב commonly denotes the inner person, including thought
    and resolve. 'Heart' is the standard and sufficiently broad English equivalent,
    and it preserves the biblical idiom.
- source_word: וְהִתְחַזֵּק
  chosen: be strong
  alternatives:
  - strengthen yourself
  - be steadfast
  - take courage
  lexicon: HALOT
  rationale: The hitpael/implied reflexive force of חזק can suggest strengthening
    oneself or showing firmness. The Greek καρτέρησον points toward endurance/steadfastness.
    'Be strong' is concise, natural, and broad enough to include firmness and endurance.
- source_word: וְאַל תִּבָּהֵל
  chosen: do not be alarmed
  alternatives:
  - do not be disturbed
  - do not panic
  - do not hurry
  lexicon: HALOT
  rationale: The Hebrew בהל commonly means to be dismayed, disturbed, or terrified.
    The Greek parallel μὴ σπεύσῃς literally suggests 'do not hurry,' but in context
    with affliction it likely reflects rash agitation. Since the Hebrew is the primary
    witness here and is high-confidence, 'do not be alarmed' best represents the warning
    against fearful agitation while remaining compatible with the Greek sense.
- source_word: בְּיוֹם אֵד
  chosen: in a time of calamity
  alternatives:
  - on the day of disaster
  - in the day of ruin
  - when trouble comes
  lexicon: HALOT
  rationale: Literally 'in the day of calamity/disaster.' English often uses 'time
    of calamity' more idiomatically for a general circumstance rather than a single
    calendar day. This preserves the sense while reading naturally. The Greek ἐν καιρῷ
    ἐπαγωγῆς ('in a time of onset/visitation/affliction') supports a broader temporal
    expression.
