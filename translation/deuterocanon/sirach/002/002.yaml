    contradictory so much as differently angled: Hebrew emphasizes dismay; Greek emphasizes
    rash haste. The main text follows the Hebrew as primary and preserves the Greek-leaning
    alternative in a footnote.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use
