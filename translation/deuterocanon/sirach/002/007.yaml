theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of חסד in light of the Greek parallel
  chosen_reading: mercy
  alternative_readings:
  - steadfast love
  - lovingkindness
  - kindness
  rationale: Because the Hebrew witness is paired with a Greek parallel that explicitly reads ἔλεος, 'mercy' is the most auditable and source-anchored rendering here. This avoids importing a fuller covenantal nuance that may be present in other contexts of חסד but is not foregrounded by the parallel witness in this verse.
