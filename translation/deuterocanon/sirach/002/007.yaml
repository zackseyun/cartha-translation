translation:
  text: You who fear Yahweh, wait for his mercy, and do not turn aside, lest you fall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew חסד often carries the sense of covenant loyalty or steadfast love; the Greek parallel reads 'mercy,' which supports the main text rendering here.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה / οἱ φοβούμενοι Κύριον
  chosen: You who fear the LORD
  alternatives:
  - Those who fear the LORD
  - Fearers of the Lord
  lexicon: HALOT; BDAG
  rationale: The Hebrew vocative-like plural construct and the Greek participial address both directly address a group characterized by reverence toward God. 'You who fear the LORD' preserves the direct exhortational force better than a third-person rendering. 'The LORD' follows the project's default for יְהוָה and aligns with the Greek Κύριον.
- source_word: חַכּוּ / ἀναμείνατε
  chosen: wait for
  alternatives:
  - wait
  - await
  - hope for
  lexicon: HALOT; BDAG
  rationale: Both Hebrew and Greek are imperatives calling for patient expectation. 'Wait for' is natural English and preserves the object relationship with 'his mercy.' 'Hope for' would add a more interpretive nuance than the source requires.
- source_word: לְחַסְדּוֹ / τὸ ἔλεος αὐτοῦ
  chosen: his mercy
  alternatives:
  - his steadfast love
  - his kindness
  lexicon: HALOT; BDAG
  rationale: Hebrew חסד can mean covenant loyalty, steadfast love, or kindness, but the Greek parallel renders it with ἔλεος, strongly supporting 'mercy' here. This also fits the paraenetic context of trusting divine compassion in trial.
- source_word: וְאַל תִּטּוּ / καὶ μὴ ἐκκλίνητε
  chosen: do not turn aside
  alternatives:
  - do not deviate
  - do not swerve
  - do not depart
  lexicon: HALOT; BDAG
  rationale: The verb denotes turning aside from a path or course. 'Turn aside' is idiomatic, preserves the metaphor of remaining on the right way, and matches the warning context.
- source_word: פֶּן תִּפֹלוּ / ἵνα μὴ πέσητε
  chosen: lest you fall
  alternatives:
  - so that you may not fall
  - or you will fall
  lexicon: HALOT; BDAG
  rationale: The Hebrew פן and Greek ἵνα μή both express negative purpose/result in warning form. 'Lest you fall' is concise, natural, and preserves the admonitory tone without over-specifying whether the fall is moral, spiritual, or circumstantial.
