translation:
  text: Woe to the heart that does not trust, for it also will not stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Woe to the slack heart, because it does not believe; therefore
      it will not be sheltered.'' The Hebrew reads ''heart'' and ''will not stand.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: An interjection of lament/threat. 'Woe' preserves the prophetic and wisdom-register
    force better than the softer 'Alas.'
- source_word: לְלֵב
  chosen: to the heart
  alternatives:
  - to the mind
  - to the inner self
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner person, including will and
    disposition. Retaining 'heart' preserves the Hebrew anthropology and matches the
    Greek καρδίᾳ.
- source_word: אֲשֶׁר לֹא יַאֲמִין
  chosen: that does not trust
  alternatives:
  - that does not believe
  - that has no faith
  lexicon: HALOT
  rationale: The verb אמן here, confirmed by Greek πιστεύει, denotes trusting/believing.
    'Trust' fits the wisdom context of reliance on God more naturally in modern English,
    while remaining faithful to the source sense.
- source_word: וְאַף הוּא
  chosen: for it also
  alternatives:
  - and even it
  - and it too
  lexicon: HALOT
  rationale: The phrase adds emphatic consequence. 'For it also' brings out the explanatory/resultative
    connection in smooth English while preserving the emphasis that this very heart
    shares the stated fate.
- source_word: לֹא יָקוּם
  chosen: will not stand
  alternatives:
  - will not rise
  - will not endure
  lexicon: HALOT
  rationale: Hebrew קום literally means 'rise/stand.' In this context, with the Greek's
    different but interpretive 'will not be sheltered/protected,' 'will not stand'
    best preserves the Hebrew wording while conveying failure to remain firm or survive.
