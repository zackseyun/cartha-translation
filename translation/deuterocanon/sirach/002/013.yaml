theological_decisions:
- issue: Rendering of the trust/belief verb in a wisdom exhortation
  chosen_reading: does not trust
  alternative_readings:
  - does not believe
  - has no faith
  rationale: The Hebrew and Greek both point to lack of believing/trusting. In this
    context of steadfast reliance under testing, 'trust' better communicates the practical
    covenantal sense without importing later doctrinal abstraction. This aligns with
    the project's default handling of πίστις-family terms while allowing contextual
    variation.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 3, 6; Contested terms
    table for πίστις'
