translation:
  text: Those who fear the LORD will not rebel against his ways, and those who love
    him will keep his paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''will not disobey his words'' instead of Hebrew ''will
      not rebel against his ways.'' The Hebrew Cairo Geniza witness is primary here,
      but the Greek supports the same overall sense of faithful obedience.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה
  chosen: those who fear the LORD
  alternatives:
  - those who revere the LORD
  - the fearers of the LORD
  lexicon: HALOT
  rationale: The Hebrew participial phrase denotes people characterized by fearing
    YHWH. 'Fear' preserves the covenantal and wisdom-language force better than the
    softer 'revere,' while remaining natural English. Per doctrine, יְהֹוָה is rendered
    'the LORD'.
- source_word: לֹא יַמְרוּ
  chosen: will not rebel
  alternatives:
  - will not disobey
  - will not be defiant
  lexicon: HALOT
  rationale: Hebrew מרה commonly carries the sense of rebellion or defiance, not mere
    failure to obey. The Greek parallel ἀπειθήσουσιν could support 'disobey,' but
    the Hebrew witness is primary here and points to stronger resistance language.
- source_word: בִּדְרָכָיו
  chosen: against his ways
  alternatives:
  - in his ways
  - his ways
  lexicon: HALOT
  rationale: With מרה, the preposition ב can mark the object against which rebellion
    is directed. 'Against his ways' makes the English relation explicit and reflects
    the Hebrew sense more clearly than a wooden 'in his ways.'
- source_word: וְאוֹהֲבָיו
  chosen: those who love him
  alternatives:
  - his lovers
  - those loving him
  lexicon: HALOT
  rationale: The participial form identifies a class of people by their love for God.
    'Those who love him' is idiomatic and preserves the personal object explicit in
    the suffix.
- source_word: יִצְרוּ
  chosen: will keep
  alternatives:
  - will guard
  - will preserve
  - will observe
  lexicon: HALOT
  rationale: The verb נצר often means keep, guard, or preserve. In wisdom/instruction
    contexts, 'keep' is the most natural English for faithful observance, while still
    allowing the nuance of careful guarding. The Greek συντηρήσουσιν likewise supports
    a sense of keeping/preserving.
- source_word: אָרְחוֹתָיו
  chosen: his paths
  alternatives:
  - his ways
  - his tracks
  lexicon: HALOT
  rationale: אָרַח/אֹרַח commonly denotes a path or course. Since the first colon
    already uses 'ways' for דרכים, rendering this second term as 'paths' preserves
    the Hebrew poetic variation rather than flattening both cola into the same English
    word.
