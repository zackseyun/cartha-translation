theological_decisions:
- issue: Rendering of the divine name יְהֹוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Project doctrine specifies 'the LORD' as the default rendering of YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH | the LORD'
- issue: Whether to render נַפְשְׁךָ / τὴν ψυχήν σου literally as 'your soul'
  chosen_reading: yourself
  alternative_readings:
  - your soul
  rationale: The verse exhorts whole-person readiness for coming hardship. Rendering
    literally as 'your soul' is possible, but in contemporary English it can suggest
    a narrower anthropology than the Hebrew/Greek intend. 'Yourself' preserves the
    full-person force without importing doctrinal claims.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Readable modern English, not archaic or academic'
