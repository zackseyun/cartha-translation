theological_decisions:
- issue: Referent of the pronoun 'him'
  chosen_reading: The pronoun refers to God, continuing the direct exhortation of
    the surrounding context.
  alternative_readings:
  - A more generic reference to wisdom or instruction
  rationale: The immediate context addresses trusting and fearing the Lord; both Hebrew
    and Greek use a masculine singular pronoun without reintroducing a new antecedent.
    Rendering 'him' preserves the personal divine referent without overexpansion.
- issue: Force of the promise in the final clause
  chosen_reading: A promise of being raised up or honored in one's final outcome,
    not necessarily material prosperity.
  alternative_readings:
  - Simple growth or increase
  - Prosperity at the end of life
  rationale: Both Hebrew גדל and Greek αὐξηθῇς can denote increase, but in wisdom
    exhortation the phrase with 'your latter end' points to one's ultimate outcome.
    'Exalted' avoids reducing the promise to wealth while still expressing elevation.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
