translation:
  text: Cling to him and do not turn away, so that you may be exalted in your latter
    end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that you may grow great in your latter end.' The Hebrew says 'grow/become
      great,' while the Greek parallel has 'be increased.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִדָּבֵק
  chosen: Cling
  alternatives:
  - Hold fast
  - Join yourself
  - Cleave
  lexicon: HALOT
  rationale: From דבק, conveying close attachment or adherence. 'Cling' is idiomatic
    modern English and preserves the force of steadfast attachment better than the
    more archaic 'cleave.' The Greek κολλήθητι supports the sense of attaching oneself
    closely.
- source_word: בּוֹ
  chosen: to him
  alternatives:
  - to it
  lexicon: HALOT
  rationale: Masculine singular pronominal suffix in context refers to God from the
    surrounding exhortation. English 'to him' makes the personal referent explicit
    and matches the Greek αὐτῷ.
- source_word: וְאַל תָּסוּר
  chosen: and do not turn away
  alternatives:
  - and do not depart
  - and do not withdraw
  lexicon: HALOT
  rationale: סור commonly means turn aside, depart, or withdraw. 'Do not turn away'
    is natural English and captures the relational and moral sense of not deviating
    from God. The Greek μὴ ἀποστῇς confirms the idea of not departing.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is clear modern English and preserves
    the clause's purposive force.
- source_word: תִּגְדַּל
  chosen: you may be exalted
  alternatives:
  - you may grow great
  - you may become great
  - you may prosper
  lexicon: HALOT
  rationale: גדל can mean become great or be magnified. In this wisdom context, with
    the Greek αὐξηθῇς ('you may be increased'), the sense is elevation or increase
    granted by God rather than mere physical growth. 'Be exalted' best conveys the
    honorific/resultative sense in idiomatic English while retaining theological restraint.
- source_word: בְּאַחֲרִיתֶךָ
  chosen: in your latter end
  alternatives:
  - at your end
  - in your future
  - in the end of your days
  lexicon: HALOT
  rationale: אַחֲרִית often denotes one's end, outcome, or latter days. 'In your latter
    end' preserves the wisdom-literature nuance of final outcome more precisely than
    the flatter 'in the future.' The Greek ἐπʼ ἐσχάτων σου supports an eschatological/final-outcome
    sense.
