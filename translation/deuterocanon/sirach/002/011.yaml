translation:
  text: For the LORD is compassionate and gracious; he forgives sins and saves in
    a time of distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'merciful and gracious.' The Hebrew רָחוּם וְחַנּוּן
      and the Greek οἰκτίρμων καὶ ἐλεήμων form a familiar biblical description of
      God's character.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָחוּם
  chosen: compassionate
  alternatives:
  - merciful
  - full of compassion
  lexicon: HALOT
  rationale: The Hebrew adjective denotes deep compassion or mercy. 'Compassionate'
    is natural modern English and pairs well with the following חַנּוּן without sounding
    archaic.
- source_word: חַנּוּן
  chosen: gracious
  alternatives:
  - merciful
  - kind
  lexicon: HALOT
  rationale: A standard covenantal descriptor meaning gracious/favor-showing. 'Gracious'
    preserves the familiar theological pairing with רָחוּם while remaining readable.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name is rendered 'the LORD' in continuity with
    Jewish reverence practice and the project's stated default.
- source_word: וְסוֹלֵחַ
  chosen: he forgives
  alternatives:
  - and forgives
  - pardons
  lexicon: HALOT
  rationale: The participial form expresses characteristic action. English finite
    verbal style communicates this naturally; 'forgives' is clearer and more common
    than 'pardons' here.
- source_word: לַעֲוֹנוֹת
  chosen: sins
  alternatives:
  - iniquities
  - guilt
  lexicon: HALOT
  rationale: Although עון can emphasize iniquity or guilt, the Greek parallel has
    ἁμαρτίας ('sins'), supporting the broader and more accessible rendering 'sins'
    in this context.
- source_word: וּמוֹשִׁיעַ
  chosen: and saves
  alternatives:
  - and delivers
  - and rescues
  lexicon: HALOT
  rationale: The hiphil participle from ישׁע can mean save/deliver. 'Saves' preserves
    the lexical connection to the common biblical salvation vocabulary and matches
    the Greek σώζει.
- source_word: בְּעֵת צָרָה
  chosen: in a time of distress
  alternatives:
  - in time of trouble
  - at the time of affliction
  lexicon: HALOT
  rationale: The phrase denotes a season or moment of trouble. 'In a time of distress'
    is idiomatic modern English and preserves the existential weight of צָרָה without
    archaic tone.
