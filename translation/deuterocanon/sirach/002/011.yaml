theological_decisions:
- issue: Rendering the divine name יְהֹוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the covenant name. Project doctrine specifies 'the LORD'
    as the default rendering for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to preserve the covenant formula pair as 'merciful and gracious'
    or render more idiomatically
  chosen_reading: compassionate and gracious
  alternative_readings:
  - merciful and gracious
  rationale: The Hebrew and Greek both present a standard divine-character formula.
    'Compassionate and gracious' preserves the sense while using slightly more contemporary
    English; the traditional alternative remains worth noting because of its biblical
    resonance.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
