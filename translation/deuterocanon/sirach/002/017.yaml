lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה
  chosen: those who fear the LORD
  alternatives:
  - the fearers of the LORD
  - those who revere the LORD
  lexicon: HALOT
  rationale: The Hebrew construct phrase denotes people characterized by fearing YHWH.
    'Those who fear the LORD' is idiomatic English and preserves the covenantal title
    per doctrine for יְהוָה. 'Revere' is possible but slightly softens the common
    biblical idiom of fear-of-the-LORD.
- source_word: יָכִינוּ לְבָבָם
  chosen: will prepare their hearts
  alternatives:
  - will make their hearts ready
  - will establish their hearts
  lexicon: HALOT
  rationale: כון in Hifil can mean prepare, make ready, or establish. In this wisdom
    context, 'prepare their hearts' best fits the ethical sense and aligns with the
    Greek ἑτοιμάσουσιν ('will prepare'). 'Establish' is possible but less natural
    here.
- source_word: לְבָבָם
  chosen: their hearts
  alternatives:
  - their inner selves
  - their minds
  lexicon: HALOT
  rationale: לֵבָב in Hebrew commonly denotes the inner person, including will and
    thought. 'Hearts' preserves the biblical metaphor in readable English without
    over-interpreting.
- source_word: וּלְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  lexicon: HALOT
  rationale: Literally 'before him.' This is clear in English and preserves the relational
    posture expressed by the Hebrew and Greek ἐνώπιον αὐτοῦ.
- source_word: יַכְנִיעוּ רוּחָם
  chosen: they will humble their spirits
  alternatives:
  - they will humble themselves
  - they will submit their spirit
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'their spirit,' while the Greek has 'their
    souls.' The Hebrew witness is primary here, so 'their spirits' preserves the anthropological
    term rather than flattening it to a reflexive paraphrase. 'Humble themselves'
    is smoother but omits a significant lexical element.
