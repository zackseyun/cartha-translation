translation:
  text: Accept whatever comes upon you, and in the changes of your humiliation be
    patient.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in your brokenness''; Greek parallel: ''in the changes of your
      humiliation.'' The main text follows the likely sense with both witnesses in
      view.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל הַבָּא עָלֶיךָ
  chosen: whatever comes upon you
  alternatives:
  - everything that comes upon you
  - whatever is brought upon you
  lexicon: HALOT
  rationale: The Hebrew literally means 'all that comes upon you.' 'Whatever comes
    upon you' is natural modern English and preserves the open-ended scope. The Greek
    parallel πᾶν ὃ ἐὰν ἐπαχθῇ σοι supports the sense of whatever is brought or comes
    upon a person.
- source_word: קַבֵּל
  chosen: accept
  alternatives:
  - receive
  - welcome
  lexicon: HALOT
  rationale: '''Accept'' best conveys an exhortation to receive circumstances without
    resistance. ''Receive'' is possible but less idiomatic here; ''welcome'' would
    overstate the positive nuance.'
- source_word: וּבְשִׁבְרְךָ
  chosen: in the changes of your humiliation
  alternatives:
  - in your brokenness
  - when you are broken
  - in the reversals of your affliction
  lexicon: HALOT
  rationale: 'The Hebrew consonantal reading suggests ''in your breaking/brokenness,''
    but the Greek parallel ἐν ἀλλάγμασιν ταπεινώσεώς σου points to a sense involving
    changing conditions or reversals connected with humiliation/affliction. Because
    the Hebrew source is marked minor_mismatch and the Greek is given as an actual
    parallel input, the rendering reflects both witnesses: ''changes'' from the Greek
    and ''humiliation'' from ταπείνωσις as the state of abasement. This avoids flattening
    the phrase into mere emotional sadness.'
- source_word: הַאֲרֵךְ רוּחַ
  chosen: be patient
  alternatives:
  - be long-suffering
  - be slow to anger
  - endure patiently
  lexicon: HALOT
  rationale: The idiom literally means 'lengthen spirit,' i.e., be patient/long-suffering.
    'Be patient' is the clearest modern English equivalent, while the Greek μακροθύμησον
    confirms the sense of patient endurance.
