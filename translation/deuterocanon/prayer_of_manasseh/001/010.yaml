id: MAN.1.10
reference: Prayer of Manasseh 1:10
source:
  edition: charles-1913-apot-vol1
  text: κατακαμπτόμενος πολλῷ δεσμῷ σιδηρῷ εἰς τὸ ἀνανεῦσαί με, καὶ οὐκ ἔστιν μοι
    ἄνεσις· διότι παρώργισα τὸν θυμόν σου καὶ τὸ πονηρὸν ἐνώπιόν σου ἐποίησα, στήσας
    βδελύγματα καὶ πληθύνας προσοχθίσματα.
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: I am bent down with many an iron bond, so that I cannot lift up my head, and
    there is no relief for me; because I provoked your wrath and did what is evil
    before you, setting up abominations and multiplying offenses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that I cannot recover myself' or 'so that I cannot look up again';
      the Greek infinitive may denote regaining composure or physically raising oneself.
    reason: lexical_alternative
  - marker: b
    text: '''Abominations'' likely refers to detestable, especially idolatrous, acts
      or objects.'
    reason: cultural_note
lexical_decisions:
- source_word: κατακαμπτόμενος
  chosen: I am bent down
  alternatives:
  - I am bowed down
  - I am weighed down
  lexicon: LSJ
  rationale: The participle conveys being bent or bowed under a burden. 'Bent down'
    is natural English and preserves the physical imagery without over-paraphrasing.
- source_word: πολλῷ δεσμῷ σιδηρῷ
  chosen: with many an iron bond
  alternatives:
  - with a great iron chain
  - by many iron fetters
  lexicon: LSJ
  rationale: δεσμός denotes a bond, fetter, or chain; σιδηρῷ specifies iron. The dative
    phrase is instrumental/circumstantial. 'Many an iron bond' reflects πολλῷ with
    the sense of heavy/much constraint while keeping the singular nouning of the Greek
    phrase. The phrase is somewhat idiomatic in Greek, so a slightly smoothed English
    rendering is warranted.
- source_word: εἰς τὸ ἀνανεῦσαί με
  chosen: so that I cannot lift up my head
  alternatives:
  - so as to let me recover myself
  - to enable me to look up again
  - for me to breathe again
  lexicon: LSJ
  rationale: The infinitive construction expresses result/purpose. ἀνανεύω can suggest
    raising oneself up, looking up, or recovering. In this penitential context and
    with the imagery of being bent down, 'lift up my head' best preserves the metaphor
    and sense of inability to rise.
- source_word: ἄνεσις
  chosen: relief
  alternatives:
  - release
  - rest
  - ease
  lexicon: BDAG
  rationale: ἄνεσις commonly denotes relief, easing, or release from pressure. 'Relief'
    fits the context of distress and restraint better than the more physical 'release'
    alone.
- source_word: παρώργισα
  chosen: I provoked
  alternatives:
  - I angered
  - I exasperated
  lexicon: LSJ
  rationale: The verb means to provoke to anger. 'Provoked' preserves the causative
    nuance better than simply 'angered'.
- source_word: τὸν θυμόν σου
  chosen: your wrath
  alternatives:
  - your anger
  - your fury
  lexicon: LSJ
  rationale: θυμός here refers to divine anger. 'Wrath' appropriately conveys solemn
    divine judgment in readable modern English.
- source_word: τὸ πονηρὸν ἐνώπιόν σου ἐποίησα
  chosen: did what is evil before you
  alternatives:
  - did evil in your sight
  - committed wickedness before you
  lexicon: LSJ
  rationale: This is a standard biblical idiom. 'Did what is evil before you' is clear
    modern English while preserving the Godward orientation of ἐνώπιόν σου.
- source_word: στήσας βδελύγματα
  chosen: setting up abominations
  alternatives:
  - erecting abominations
  - establishing detestable things
  lexicon: LSJ
  rationale: στήσας suggests setting up or erecting; βδελύγματα often refers to idolatrous
    abominations. 'Setting up abominations' preserves the likely cultic/idolatrous
    force without over-specifying.
- source_word: πληθύνας προσοχθίσματα
  chosen: multiplying offenses
  alternatives:
  - multiplying provocations
  - increasing hateful deeds
  lexicon: LSJ
  rationale: The rare noun carries the sense of things causing abhorrence or offense,
    especially before God. 'Offenses' is broad but fitting; 'provocations' is possible,
    but 'multiplying offenses' reads more naturally alongside the preceding confession.
