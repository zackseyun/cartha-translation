theological_decisions:
- issue: Rendering of divine anger language
  chosen_reading: your wrath
  alternative_readings:
  - your anger
  - your fury
  rationale: The Greek speaks directly of God's θυμός. 'Wrath' preserves the theological
    gravity of divine judgment without importing later doctrinal categories beyond
    the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Interpretation of the bodily metaphor in εἰς τὸ ἀνανεῦσαί με
  chosen_reading: so that I cannot lift up my head
  alternative_readings:
  - so that I cannot recover myself
  - so that I cannot breathe again
  rationale: The immediate image is of being bent down under iron bonds. Preserving
    the bodily metaphor maintains the penitential force and avoids flattening it into
    a merely psychological statement.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
