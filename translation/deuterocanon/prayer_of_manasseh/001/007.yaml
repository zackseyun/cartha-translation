id: MAN.1.7
reference: Prayer of Manasseh 1:7
source:
  edition: charles-1913-apot-vol1
  text: ὅτι σὺ εἶ κύριος ὕψιστος, εὔσπλαγχνος, μακρόθυμος καὶ πολυέλεος, καὶ μετανοῶν
    ἐπὶ κακίαις ἀνθρώπων.
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: For you are the Lord Most High, compassionate, patient, and abounding in mercy,
    and relenting concerning the evils of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'relenting concerning the evils of men'; the Greek verb can also be rendered
      'repenting,' but here it refers to God turning from judgment, not to moral repentance.
    reason: lexical_alternative
  - marker: b
    text: '''Men'' here is representative language for human beings generally.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a divine title.
    Here it functions as a title for God, not merely a polite address.
- source_word: ὕψιστος
  chosen: Most High
  alternatives:
  - highest
  - Most Exalted
  lexicon: LSJ
  rationale: A standard divine epithet meaning 'highest' or 'Most High.' 'Most High'
    is idiomatic English for this title and preserves its theological force.
- source_word: εὔσπλαγχνος
  chosen: compassionate
  alternatives:
  - merciful
  - tenderhearted
  lexicon: LSJ
  rationale: The term denotes deep compassion or tender mercy. 'Compassionate' is
    clear modern English and avoids redundancy with the later πολυέλεος.
- source_word: μακρόθυμος
  chosen: patient
  alternatives:
  - longsuffering
  - slow to anger
  lexicon: LSJ
  rationale: The word literally suggests being long-tempered or forbearing. 'Patient'
    is the most natural concise rendering in modern English; 'slow to anger' is interpretive
    and longer, while 'longsuffering' is archaic.
- source_word: πολυέλεος
  chosen: abounding in mercy
  alternatives:
  - very merciful
  - rich in mercy
  - full of mercy
  lexicon: LSJ
  rationale: The compound intensifies God's mercy. 'Abounding in mercy' captures both
    the fullness and ongoing abundance of mercy in idiomatic English.
- source_word: μετανοῶν
  chosen: relenting
  alternatives:
  - repenting
  - changing your mind
  lexicon: LSJ
  rationale: When predicated of God with ἐπί plus dative of calamities/evils, the
    sense is not moral repentance but relenting or turning from bringing judgment.
    'Relenting' best fits English theological usage without implying divine sinfulness.
- source_word: ἐπὶ κακίαις ἀνθρώπων
  chosen: over the evils of men
  alternatives:
  - concerning the evils of men
  - because of human wickedness
  - from punishing people for their evils
  lexicon: LSJ
  rationale: κακίαις can denote evils, wrongs, or wicked deeds. The phrase is somewhat
    compressed in Greek; 'over the evils of men' stays close to the wording while
    pairing naturally with 'relenting.' 'Men' preserves the masculine/generic ἀνθρώπων
    in line with the project's gender-accurate policy, here referring to humankind
    in representative masculine form.
