theological_decisions:
- issue: How to render μετανοῶν of God
  chosen_reading: relenting
  alternative_readings:
  - repenting
  - changing your mind
  rationale: The text attributes to God a change regarding human evils/judgments.
    In English, 'repenting' can wrongly imply prior wrongdoing by God. 'Relenting'
    preserves the biblical tension of divine responsiveness without importing moral
    fault.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Whether ἀνθρώπων should be rendered inclusively
  chosen_reading: men
  alternative_readings:
  - people
  - humankind
  rationale: The Greek uses the masculine plural/genitive form in a representative
    sense. Per project policy, gender-accurate rendering is preferred over flattening
    to a neutral term unless context demands otherwise. A footnote preserves the inclusive
    sense for modern readers.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
