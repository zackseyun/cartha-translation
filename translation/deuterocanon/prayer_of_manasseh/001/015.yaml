theological_decisions:
- issue: Meaning of πᾶσα ἡ δύναμις τῶν οὐρανῶν
  chosen_reading: a collective reference to the heavenly host praising God
  alternative_readings:
  - the total power of the heavens praises God
  - every heavenly power praises God
  rationale: The immediate context is doxological, and in biblical Greek celestial
    'powers' often refers to heavenly beings or hosts. Rendering it as 'host' preserves
    the likely personal/corporate sense without over-specifying angelology.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
