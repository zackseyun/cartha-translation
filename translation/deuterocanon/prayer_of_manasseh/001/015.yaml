id: MAN.1.15
reference: Prayer of Manasseh 1:15
source:
  edition: charles-1913-apot-vol1
  text: καὶ αἰνέσω σε διὰ παντὸς ἐν ταῖς ἡμέραις τῆς ζωῆς μου· ὅτι σὲ ὑμνεῖ πᾶσα ἡ
    δύναμις τῶν οὐρανῶν, καὶ σοῦ ἐστιν ἡ δόξα εἰς τοὺς αἰῶνας. ἀμήν.
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: And I will praise you continually all the days of my life, because all the
    host of the heavens sings praise to you, and yours is the glory forever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the heavenly host' or 'every power of heaven.' The Greek phrase
      can denote the heavenly hosts/beings rather than abstract cosmic power.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰνέσω
  chosen: I will praise
  alternatives:
  - I shall praise
  - I will extol
  lexicon: BDAG
  rationale: Future active of αἰνέω, denoting praise or commendation. 'I will praise'
    is clear, natural English and preserves the volitional/future sense.
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - always
  - unceasingly
  lexicon: BDAG
  rationale: The idiom means 'through all' in the sense of continuously or at all
    times. 'Continually' fits the prayerful register and pairs well with the following
    temporal phrase.
- source_word: ἐν ταῖς ἡμέραις τῆς ζωῆς μου
  chosen: all the days of my life
  alternatives:
  - during the days of my life
  - throughout my life
  lexicon: BDAG
  rationale: A conventional biblical expression meaning the span of one's earthly
    life. 'All the days of my life' preserves the imagery and cadence of the Greek.
- source_word: ὑμνεῖ
  chosen: sings praise
  alternatives:
  - hymns
  - praises
  lexicon: BDAG
  rationale: ὑμνέω can mean to sing a hymn or sing praise. 'Sings praise' communicates
    the musical nuance better than the more generic 'praises' and avoids the awkward
    verbal use 'hymns' in English.
- source_word: πᾶσα ἡ δύναμις τῶν οὐρανῶν
  chosen: all the host of the heavens
  alternatives:
  - all the power of the heavens
  - all the heavenly host
  - every power of heaven
  lexicon: LEH
  rationale: In Jewish-Greek usage, δύναμις in celestial contexts can denote heavenly
    powers/hosts rather than abstract 'power.' Given the phrase's liturgical setting
    and common biblical idiom, 'all the host of the heavens' best captures the collective
    heavenly beings. 'Heavenly host' is a close alternative, but the genitive plural
    οὐρανῶν is more literally reflected by 'of the heavens.'
- source_word: σοῦ ἐστιν ἡ δόξα
  chosen: yours is the glory
  alternatives:
  - the glory is yours
  - to you belongs the glory
  lexicon: BDAG
  rationale: This construction expresses possession emphatically. 'Yours is the glory'
    is idiomatic, concise, and preserves the doxological force.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: The phrase is a standard doxological expression for enduring eternity.
    'Forever' is the most natural modern English rendering, while more literal options
    can sound wooden.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Retained by transliteration as a conventional liturgical affirmation
    in English.
