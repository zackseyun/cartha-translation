theological_decisions:
- issue: Meaning of κόσμος in a cosmological creation formula
  chosen_reading: Rendered as 'order' rather than 'world'
  alternative_readings:
  - adornment
  - all that is in them
  rationale: 'The verse has already named ''heaven and earth''; taking κόσμος as ''world''
    would duplicate that idea awkwardly. In Greek usage, κόσμος often carries the
    sense of ordered arrangement or adornment. Here that sense fits the creation context:
    God made heaven and earth along with their full ordered array.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
