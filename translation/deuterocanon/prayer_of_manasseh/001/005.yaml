id: MAN.1.5
reference: Prayer of Manasseh 1:5
source:
  edition: charles-1913-apot-vol1
  text: ὃν πάντα φρίσσει καὶ τρέμει ἀπὸ προσώπου τῆς δυνάμεώς σου, ὅτι ἄστεκτος ἡ
    μεγαλοπρεπία τῆς δόξης σου, καὶ ἀνυπόστατος ἡ ὀργὴ τῆς ἐπὶ ἁμαρτωλοὺς ἀπειλῆς
    σου,
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: before whom all things shudder and tremble at the presence of your power,
    for the majesty of your glory is unendurable, and the wrath of your threat against
    sinners is unbearable,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the presence of your power'; literally, 'from the face/presence of
      your power.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the majesty of your glory cannot be withstood.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the wrath of your threatening against sinners is insupportable.'
    reason: lexical_alternative
  - marker: d
    text: Or "because of your power's presence, because".
    reason: previous_rendering
lexical_decisions:
- source_word: ὃν
  chosen: before whom
  alternatives:
  - whom
  - at whose presence
  lexicon: LSJ
  rationale: The relative pronoun refers back to God from the previous verse and governs
    the following reaction. In English, 'before whom' makes the implied sense of fearful
    presence explicit and fits the construction with ἀπὸ προσώπου.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: LSJ
  rationale: Neuter plural naturally denotes the totality of created things rather
    than specifically persons. 'All things' preserves the cosmic scope and remains
    idiomatic.
- source_word: φρίσσει
  chosen: shudder
  alternatives:
  - bristle
  - quake with fear
  lexicon: LSJ
  rationale: The verb can denote bristling or shivering in fear. 'Shudder' communicates
    visceral dread in natural English without over-literalizing the bodily image.
- source_word: τρέμει
  chosen: tremble
  alternatives:
  - quake
  - shake
  lexicon: LSJ
  rationale: Paired with φρίσσει, this intensifies fear. 'Tremble' is the standard
    and clear rendering, preserving the poetic parallelism.
- source_word: ἀπὸ προσώπου
  chosen: because of ... presence
  alternatives:
  - from before
  - before the face of
  - at the presence of
  lexicon: LSJ
  rationale: Literally 'from the face/presence of.' In this context it expresses the
    cause of fear arising from God's immediate presence. 'Because of ... presence'
    is idiomatic while retaining the underlying imagery.
- source_word: τῆς δυνάμεώς σου
  chosen: your power
  alternatives:
  - your might
  - your strength
  lexicon: LSJ
  rationale: δύναμις here denotes divine might. 'Power' is the broadest and most natural
    English equivalent.
- source_word: ἄστεκτος
  chosen: unendurable
  alternatives:
  - unbearable
  - not to be withstood
  - insupportable
  lexicon: LSJ
  rationale: The adjective conveys something that cannot be stood against or endured.
    'Unendurable' preserves the sense of overwhelming divine majesty without sounding
    archaic.
- source_word: μεγαλοπρεπία
  chosen: majesty
  alternatives:
  - magnificence
  - splendor
  lexicon: LSJ
  rationale: The term denotes grandeur or magnificence. 'Majesty' fits divine description
    well and pairs naturally with 'glory.'
- source_word: δόξης
  chosen: glory
  alternatives:
  - splendor
  - honor
  lexicon: LSJ
  rationale: '''Glory'' is the standard rendering and carries the theological weight
    of divine radiance and honor.'
- source_word: ἀνυπόστατος
  chosen: unbearable
  alternatives:
  - insupportable
  - not to be withstood
  - intolerable
  lexicon: LSJ
  rationale: The adjective indicates what cannot be sustained or endured. Since ἄστεκτος
    and ἀνυπόστατος are near-synonyms in parallel clauses, a slight English variation
    avoids awkward repetition while preserving the force.
- source_word: ὀργὴ
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: LSJ
  rationale: In reference to divine judgment, 'wrath' best preserves the solemn and
    judicial force.
- source_word: ἀπειλῆς σου
  chosen: your threat
  alternatives:
  - your warning
  - your menace
  lexicon: LSJ
  rationale: The noun denotes a threat or threatening declaration. 'Threat' is the
    most direct rendering; 'warning' would soften the severity too much.
- source_word: ἐπὶ ἁμαρτωλοὺς
  chosen: against sinners
  alternatives:
  - upon sinners
  - toward sinners
  lexicon: LSJ
  rationale: ἐπί with accusative here indicates direction or target. 'Against sinners'
    clearly conveys that the threatened wrath is directed toward sinners.
