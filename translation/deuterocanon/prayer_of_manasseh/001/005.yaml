  source_review: state/reviews/gemini/phase10_greek_apocrypha/deuterocanon/prayer_of_manasseh/001/005.job-72141.json
  category: awkward_english
  tier: 1
  from: because of your power's presence, because
  to: at the presence of your power, for
  rationale: '"power''s presence" is awkward English and obscures the Hebraic idiom
    ἀπὸ προσώπου ("from/at the presence of"). Furthermore, rendering both the causal
    force of ἀπὸ and the conjunction ὅτι with "because" creates clunky repetition.
    "at the presence of your power, for..." restores the elevated liturgical register.'
