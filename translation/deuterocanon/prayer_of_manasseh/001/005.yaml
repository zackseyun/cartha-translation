theological_decisions:
- issue: Anthropopathic language for divine wrath and threat
  chosen_reading: 'Retain strong personal language: ''the wrath of your threat against
    sinners.'''
  alternative_readings:
  - the threatened wrath against sinners
  - the anger of your warning against sinners
  rationale: The Greek explicitly attributes ὀργή and ἀπειλή to God. The translation
    preserves this judicial and relational language rather than softening it into
    an impersonal consequence. At the same time, it does not expand the text into
    a fuller doctrine of judgment beyond what is stated.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
