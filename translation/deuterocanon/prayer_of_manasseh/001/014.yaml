theological_decisions:
- issue: Whether to render ἐν ἐμοί more interpretively as 'to me/through me' or more
    literally as 'in me'
  chosen_reading: in me
  alternative_readings:
  - to me
  - through me
  - with me
  rationale: The Greek preposition is ἐν, and no contextual necessity forces a less
    literal rendering. Keeping 'in me' preserves the text's emphasis that God's goodness
    is displayed in the speaker's own case, while remaining intelligible in English.
  doctrine_reference: Translation philosophy §1, §3, §5
