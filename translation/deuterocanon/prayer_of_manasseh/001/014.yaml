id: MAN.1.14
reference: Prayer of Manasseh 1:14
source:
  edition: charles-1913-apot-vol1
  text: καὶ ἐν ἐμοὶ δείξεις τὴν χρηστότητά σου· ὅτι ἀνάξιον ὄντα σώσεις με κατὰ τὸ
    πολὺ ἔλεός σου,
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: and in me you will show your goodness; for you will save me, though I am unworthy,
    according to your abundant mercy,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to me' or 'through me'; Greek 'in me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δείξεις
  chosen: you will show
  alternatives:
  - you will display
  - you will demonstrate
  lexicon: BDAG
  rationale: Future active of δείκνυμι; 'show' is the most natural modern English
    rendering and preserves the direct sense without overinterpreting.
- source_word: ἐν ἐμοί
  chosen: in me
  alternatives:
  - to me
  - with me
  lexicon: BDAG
  rationale: The preposition ἐν is most directly 'in.' Here it likely means that God's
    goodness is shown in Manasseh's case/person. 'In me' preserves the Greek wording
    and theological force better than smoothing to 'to me.'
- source_word: χρηστότητά
  chosen: goodness
  alternatives:
  - kindness
  - benevolence
  lexicon: BDAG
  rationale: χρηστότης can denote kindness or goodness. 'Goodness' fits the broader
    statement about God's character, while still allowing the merciful nuance to be
    carried by ἔλεος later in the verse.
- source_word: ἀνάξιον ὄντα
  chosen: though I am unworthy
  alternatives:
  - being unworthy
  - while I am unworthy
  lexicon: BDAG
  rationale: The participial phrase literally means 'being unworthy.' Rendering it
    concessively as 'though I am unworthy' brings out the implied contrast with God's
    saving action in idiomatic English without adding content beyond the context.
- source_word: σώσεις
  chosen: you will save
  alternatives:
  - you will rescue
  - you will deliver
  lexicon: BDAG
  rationale: σῴζω commonly means 'save,' and in this penitential prayer the term naturally
    carries both rescue and salvific overtones. 'Save' preserves that theological
    breadth.
- source_word: κατὰ τὸ πολὺ ἔλεός σου
  chosen: according to your abundant mercy
  alternatives:
  - according to your great mercy
  - in keeping with your great compassion
  lexicon: BDAG
  rationale: κατά with the accusative expresses standard or measure, hence 'according
    to.' πολὺ with ἔλεος emphasizes magnitude; 'abundant mercy' is clear modern English
    and avoids flattening the phrase.
