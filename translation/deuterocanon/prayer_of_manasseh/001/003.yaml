id: MAN.1.3
reference: Prayer of Manasseh 1:3
source:
  edition: charles-1913-apot-vol1
  text: ὁ πεδήσας τὴν θάλασσαν τῷ λόγῳ τοῦ προστάγματός σου,
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: the one who bound the sea by the word of your command,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who restrained the sea by the word of your command.' The Greek image
      is more literally 'bound' or 'fettered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πεδήσας
  chosen: the one who bound
  alternatives:
  - who fettered
  - who restrained
  - who confined
  lexicon: LSJ
  rationale: Aorist participle of πεδάω/related form, literally involving binding
    or fettering. 'Bound' preserves the concrete metaphor while remaining natural
    English. 'Restrained' or 'confined' capture the sense but weaken the vivid imagery
    of binding.
- source_word: τὴν θάλασσαν
  chosen: the sea
  alternatives:
  - the waters
  lexicon: LSJ
  rationale: θάλασσα straightforwardly means 'sea.' 'Waters' would broaden the image
    beyond the Greek wording.
- source_word: τῷ λόγῳ
  chosen: by the word
  alternatives:
  - by the decree
  - by the utterance
  lexicon: BDAG
  rationale: λόγος here denotes spoken word or authoritative utterance. 'Word' is
    the most direct rendering and preserves the connection to divine speech.
- source_word: τοῦ προστάγματός σου
  chosen: of your command
  alternatives:
  - of your decree
  - of your ordinance
  lexicon: LSJ
  rationale: 'πρόσταγμα denotes an order or command. ''Command'' is clear, forceful,
    and fits the genitival construction with λόγῳ: ''by the word of your command.''
    ''Decree'' is possible but slightly more abstract.'
