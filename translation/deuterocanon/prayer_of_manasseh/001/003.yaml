theological_decisions:
- issue: Divine sovereignty over creation expressed through metaphor of binding the
    sea
  chosen_reading: Retain the concrete image 'bound the sea' rather than interpretively
    smoothing to 'set limits to the sea.'
  alternative_readings:
  - restrained the sea
  - confined the sea
  - set bounds for the sea
  rationale: The Greek uses a vivid participial expression of binding/fettering. Preserving
    the metaphor better reflects the text's portrayal of God's authority over chaotic
    creation without importing explanatory language not present in this clause.
  doctrine_reference: Translation philosophy §§1, 3, 6
