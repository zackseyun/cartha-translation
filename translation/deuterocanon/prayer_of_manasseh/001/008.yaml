id: MAN.1.8
reference: Prayer of Manasseh 1:8
source:
  edition: charles-1913-apot-vol1
  text: σὺ οὖν, κύριε ὁ θεὸς τῶν δικαίων, οὐκ ἔθου μετάνοιαν δικαίοις, τῷ Ἀβραὰμ καὶ
    Ἰσαὰκ καὶ Ἰακὼβ τοῖς οὐχ ἡμαρτηκόσιν σοι, ἀλλ' ἔθου μετάνοιαν ἐμοὶ τῷ ἁμαρτωλῷ,
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: So you, Lord, God of the righteous, did not appoint repentance for the righteous—for
    Abraham and Isaac and Jacob, who did not sin against you—but you appointed repentance
    for me, the sinner,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not set repentance before the righteous.' The verb can mean 'set'
      or 'appoint'; 'appoint' was chosen for clearer English with 'repentance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ οὖν
  chosen: So you
  alternatives:
  - Therefore you
  - And so you
  - But you
  lexicon: LSJ
  rationale: οὖν marks an inferential or resumptive transition. 'So you' preserves
    the connective force in natural English without becoming overly formal.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Direct address with the standard rendering 'Lord' follows project policy
    for κύριος and fits prayer language.
- source_word: ὁ θεὸς τῶν δικαίων
  chosen: God of the righteous
  alternatives:
  - God of righteous people
  - God of the just
  lexicon: LSJ
  rationale: A fairly literal rendering best preserves the genitival phrase and its
    theological weight in the prayer.
- source_word: οὐκ ἔθου
  chosen: did not appoint
  alternatives:
  - did not set
  - did not establish
  - did not place
  lexicon: LSJ
  rationale: τίθημι here means to set or appoint. 'Appoint' works idiomatically with
    μετάνοιαν in English and preserves the deliberate divine action implied.
- source_word: μετάνοιαν
  chosen: repentance
  alternatives:
  - a chance to repent
  - conversion
  lexicon: LSJ
  rationale: The noun denotes repentance/change of mind. 'Repentance' is the standard
    theological term and is sufficiently accessible here.
- source_word: δικαίοις
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: LSJ
  rationale: The dative is retained with a natural English equivalent. 'The righteous'
    matches the repeated δικ- language and keeps the contrast with 'the sinner.'
- source_word: τῷ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ
  chosen: for Abraham and Isaac and Jacob
  alternatives:
  - to Abraham and Isaac and Jacob
  lexicon: LSJ
  rationale: The appositional phrase identifies the righteous in view. 'For' matches
    the English construction with 'appoint repentance for' more naturally than 'to.'
- source_word: τοῖς οὐχ ἡμαρτηκόσιν σοι
  chosen: who did not sin against you
  alternatives:
  - who have not sinned against you
  - who did not sin before you
  lexicon: LSJ
  rationale: The perfect participle can be rendered with English past perfective force,
    but simple past is smoother here. 'Against you' captures σοι as the offended party.
- source_word: ἀλλ᾽ ἔθου μετάνοιαν ἐμοὶ
  chosen: but you appointed repentance for me
  alternatives:
  - but you set repentance before me
  - but you granted repentance to me
  lexicon: LSJ
  rationale: 'The adversative contrast is central: not for the righteous patriarchs,
    but for the speaker. Repeating ''appointed repentance'' preserves the Greek parallelism.'
- source_word: τῷ ἁμαρτωλῷ
  chosen: the sinner
  alternatives:
  - a sinner
  - the sinful one
  lexicon: LSJ
  rationale: With the article and dative in apposition to ἐμοί, 'the sinner' preserves
    the self-humbling force and rhetorical contrast with 'the righteous.'
