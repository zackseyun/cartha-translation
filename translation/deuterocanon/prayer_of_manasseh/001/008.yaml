theological_decisions:
- issue: The statement that Abraham, Isaac, and Jacob 'did not sin against you' could
    be softened to avoid tension with broader biblical portrayals of the patriarchs
    as sinners.
  chosen_reading: 'Retain the text''s direct wording: ''who did not sin against you.'''
  alternative_readings:
  - who did not sin greatly against you
  - who were not counted as sinners before you
  - who did not sin in this matter
  rationale: The Greek witness plainly says οὐχ ἡμαρτηκόσιν σοι without qualification.
    The translation should preserve the prayer's rhetoric rather than harmonize it
    with other passages or later theology.
  doctrine_reference: Preserve theological tension rather than resolve it.
