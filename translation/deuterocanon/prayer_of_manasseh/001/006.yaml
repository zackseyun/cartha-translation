theological_decisions:
- issue: Relationship of 'mercy' and 'promise' in the genitive construction τὸ ἔλεος
    τῆς ἐπαγγελίας σου
  chosen_reading: '''the mercy of your promise'''
  alternative_readings:
  - '''your promised mercy'''
  - '''the mercy shown in your promise'''
  rationale: 'The Greek formally reads ''the mercy of your promise.'' This could be
    smoothed idiomatically into ''your promised mercy,'' but the more literal rendering
    preserves the source structure and leaves the exact nuance open: mercy belonging
    to, expressed in, or guaranteed by God''s promise. This better fits the project''s
    aim to preserve theological tension where the source is not fully explicit.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
