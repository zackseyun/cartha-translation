id: MAN.1.6
reference: Prayer of Manasseh 1:6
source:
  edition: charles-1913-apot-vol1
  text: ἀμέτρητόν τε καὶ ἀνεξιχνίαστον τὸ ἔλεος τῆς ἐπαγγελίας σου·
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: and the mercy of your promise is immeasurable and unsearchable;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your promised mercy' or 'the mercy shown in your promise.' The Greek
      genitive can be understood in more than one closely related way.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμέτρητόν
  chosen: immeasurable
  alternatives:
  - without measure
  - countless
  lexicon: LSJ
  rationale: The adjective denotes something not able to be measured. 'Immeasurable'
    is natural modern English and preserves the quantitative force better than the
    more idiomatic but less precise 'countless.'
- source_word: ἀνεξιχνίαστον
  chosen: unsearchable
  alternatives:
  - inscrutable
  - past tracing out
  - unfathomable
  lexicon: LSJ
  rationale: The word conveys what cannot be tracked out or fully investigated. 'Unsearchable'
    stays close to the Greek image and pairs well with 'immeasurable.' 'Inscrutable'
    is possible but leans more interpretive and less concrete.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: LSJ
  rationale: ἔλεος commonly denotes mercy or compassion. 'Mercy' is the standard concise
    rendering and fits the prayer's penitential context.
- source_word: ἐπαγγελίας
  chosen: promise
  alternatives:
  - pledge
  - assurance
  lexicon: LSJ
  rationale: 'The genitive most naturally modifies ἔλεος: ''the mercy of your promise.''
    ''Promise'' is the most direct rendering of ἐπαγγελία and preserves the covenantal
    sense without overexpansion.'
- source_word: τε καὶ
  chosen: and
  alternatives:
  - both ... and
  lexicon: LSJ
  rationale: The paired particles intensify the coordination of the two adjectives.
    English does not require a wooden 'both ... and' here; a single 'and' yields natural
    style while preserving the linkage.
