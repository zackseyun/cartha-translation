theological_decisions:
- issue: Rendering of κύριος in divine address
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrinal guidance specifies 'Lord' as the default rendering for
    κύριος, matching biblical usage and preserving the prayer's address to God.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of ἀνομία
  chosen_reading: lawless deeds
  alternative_readings:
  - sins
  rationale: The text's penitential theology is sharpened by retaining the stronger
    nuance of lawlessness rather than flattening to the broader 'sins.' This preserves
    the moral gravity without importing extra doctrinal claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
