id: MAN.1.13
reference: Prayer of Manasseh 1:13
source:
  edition: charles-1913-apot-vol1
  text: αἰτοῦμαι δεόμενός σου, ἄνες μοι, κύριε, ἄνες μοι, καὶ μὴ συναπολέσῃς με ταῖς
    ἀνομίαις μου, μηδὲ εἰς τὸν αἰῶνα μηνίσας τηρήσῃς τὰ κακά μοι, μηδὲ καταδικάσῃς
    με ἐν τοῖς κατωτάτοις τῆς γῆς· ὅτι σὺ εἶ, κύριε, ὁ θεὸς τῶν μετανοούντων,
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: 'I beg you, pleading with you: forgive me, Lord, forgive me, and do not destroy
    me along with my lawless deeds, nor, being angry forever, keep my evils against
    me, nor condemn me in the lowest parts of the earth; for you, Lord, are the God
    of those who repent,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hold my evils against me.' The Greek phrase can be rendered more idiomatically
      this way.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the depths of the earth.' The expression refers to the lowest regions
      beneath the earth.
    reason: lexical_alternative
  - marker: c
    text: Or 'condemn me in the lowest parts'.
    reason: previous_rendering
lexical_decisions:
- source_word: αἰτοῦμαι
  chosen: I beg
  alternatives:
  - I ask
  - I request
  lexicon: BDAG
  rationale: The verb expresses earnest petition in prayer. 'I beg' better conveys
    the intensity of the plea in context than the flatter 'I ask' or 'I request'.
- source_word: δεόμενός
  chosen: as your suppliant
  alternatives:
  - imploring
  - beseeching you
  lexicon: BDAG
  rationale: The participle reinforces the pleading posture of the speaker. 'As your
    suppliant' preserves the prayerful, humble stance without becoming archaic.
- source_word: ἄνες
  chosen: forgive
  alternatives:
  - pardon
  - release
  lexicon: BDAG
  rationale: In this penitential context the imperative asks for remission of guilt.
    'Forgive' is the clearest modern English rendering; 'release' is too literal and
    'pardon' slightly more formal/legal.
- source_word: συναπολέσῃς
  chosen: destroy me along with
  alternatives:
  - wipe me out together with
  - destroy me with
  lexicon: BDAG
  rationale: The compound verb includes the sense of being destroyed together with
    something else. 'Along with' preserves the συν- force better than a simple 'destroy
    me with'.
- source_word: ταῖς ἀνομίαις μου
  chosen: my lawless deeds
  alternatives:
  - my sins
  - my acts of lawlessness
  lexicon: BDAG
  rationale: ἀνομία is stronger than a generic term for sin and carries the sense
    of lawlessness. 'Lawless deeds' is readable while preserving that nuance.
- source_word: μηνίσας
  chosen: being angry
  alternatives:
  - in wrath
  - having become angry
  lexicon: LSJ
  rationale: The participle modifies the following verb and expresses God's anger.
    'Being angry' is natural English and avoids over-interpreting the aspect.
- source_word: τηρήσῃς τὰ κακά μοι
  chosen: keep my evils against me
  alternatives:
  - keep my wrongs in mind against me
  - hold my evils against me
  lexicon: BDAG
  rationale: The phrase means to retain or preserve the speaker's evils in a way adverse
    to him. 'Keep ... against me' reflects the Greek closely; 'hold ... against me'
    is idiomatic but slightly more interpretive.
- source_word: ἐν τοῖς κατωτάτοις τῆς γῆς
  chosen: in the lowest parts of the earth
  alternatives:
  - in the depths of the earth
  - in the lowest regions of the earth
  lexicon: LSJ
  rationale: The superlative κατωτάτοις denotes the lowest places. The chosen rendering
    stays close to the Greek while remaining understandable.
- source_word: τῶν μετανοούντων
  chosen: those who repent
  alternatives:
  - the repentant
  - those who turn back
  lexicon: BDAG
  rationale: The participle denotes people characterized by repentance. 'Those who
    repent' is clear, natural, and preserves the verbal force.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' In this prayer context it functions
    as a divine address title.
