theological_decisions:
- issue: How to render φοβερῷ in relation to God's name
  chosen_reading: fearful
  alternative_readings:
  - awesome
  - fearsome
  rationale: The phrase describes God's name as inspiring reverent fear. 'Fearful'
    preserves that theological weight and avoids reducing the term to modern informal
    admiration. Because English readers may hear 'fearful' as 'afraid,' an alternative
    is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: readable modern English without flattening
    theological weight; preserve theological tension rather than resolve it.'
