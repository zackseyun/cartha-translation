id: MAN.1.4
reference: Prayer of Manasseh 1:4
source:
  edition: charles-1913-apot-vol1
  text: ὁ κλείσας τὴν ἄβυσσον καὶ σφραγισάμενος αὐτὴν τῷ φοβερῷ καὶ ἐνδόξῳ ὀνόματί
    σου,
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: who shut up the abyss and sealed it with your fearful and glorious name,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'awesome and glorious name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κλείσας
  chosen: who shut up
  alternatives:
  - who closed
  - who confined
  lexicon: LSJ
  rationale: Aorist participle modifying the addressee in a chain of relative descriptions.
    'Shut up' preserves the concrete force of κλείω better than the flatter 'closed'
    and fits the sense of restraining the abyss.
- source_word: τὴν ἄβυσσον
  chosen: the abyss
  alternatives:
  - the deep
  - the bottomless depth
  lexicon: LSJ
  rationale: ἄβυσσος in biblical Greek commonly denotes the primeval deep or unfathomable
    abyss. 'The abyss' is both natural English and preserves the theological/cosmic
    resonance better than 'the deep' here.
- source_word: σφραγισάμενος
  chosen: sealed
  alternatives:
  - set a seal on
  - sealed up
  lexicon: LSJ
  rationale: The middle participle conveys the act of sealing securely. 'Sealed' is
    concise and idiomatic; 'sealed up' is possible but slightly redundant after 'shut
    up.'
- source_word: αὐτὴν
  chosen: it
  alternatives:
  - the abyss
  lexicon: Greek grammar
  rationale: Direct object pronoun referring back to ἄβυσσον. English naturally uses
    'it' rather than repeating the noun.
- source_word: τῷ ... ὀνόματί σου
  chosen: with your ... name
  alternatives:
  - by your ... name
  - with the ... name of you
  lexicon: LSJ
  rationale: Instrumental dative is best rendered 'with your ... name,' expressing
    the means by which the abyss is sealed.
- source_word: φοβερῷ
  chosen: fearful
  alternatives:
  - awesome
  - terrible
  - fearsome
  lexicon: LSJ
  rationale: φοβερός can mean inspiring fear or awe. 'Fearful' keeps closer to the
    Greek form and preserves the solemn, reverential tone without importing modern
    colloquial connotations of 'awesome.'
- source_word: ἐνδόξῳ
  chosen: glorious
  alternatives:
  - majestic
  - full of glory
  lexicon: LSJ
  rationale: A standard rendering that clearly conveys honor and splendor, pairing
    well with 'fearful' in a liturgical context.
