theological_decisions:
- issue: Rendering the paired terms ἀνομίαι and ἀδικιῶν distinctly
  chosen_reading: Translate ἀνομίαι as 'lawless deeds' and ἀδικιῶν as 'unrighteous
    acts'
  alternative_readings:
  - Render both as 'sins' for smoother English
  - Render as 'iniquities' and 'transgressions' in traditional style
  rationale: The Greek uses two related but non-identical moral terms. Preserving
    the distinction supports transparency and avoids importing a flattened penitential
    vocabulary. The chosen renderings remain readable while reflecting the lexical
    variation in the source.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
- issue: Tone of penitential unworthiness
  chosen_reading: Retain 'I am not worthy to look up and see the height of heaven'
    as a strong statement of moral unfitness
  alternative_readings:
  - Soften to 'I cannot bear to look up'
  - Interpret as purely physical inability
  rationale: The text grounds the inability in the multitude of wrongs, indicating
    moral-spiritual unworthiness rather than mere emotion or posture. The translation
    preserves that theological tension without over-explaining it.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
