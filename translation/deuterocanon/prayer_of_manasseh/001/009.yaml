id: MAN.1.9
reference: Prayer of Manasseh 1:9
source:
  edition: charles-1913-apot-vol1
  text: διότι ἥμαρτον ὑπὲρ ἀριθμὸν ψάμμου θαλάσσης. ἐπληθύνθησαν αἱ ἀνομίαι μου, κύριε,
    ἐπληθύνθησαν αἱ ἀνομίαι μου, καὶ οὐκ εἰμὶ ἄξιος ἀτενίσαι καὶ ἰδεῖν τὸ ὕψος τοῦ
    οὐρανοῦ ἀπὸ τοῦ πλήθους τῶν ἀδικιῶν μου.
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: For I have sinned beyond the number of the sand of the sea. My lawless deeds
    have multiplied, Lord; my lawless deeds have multiplied, and I am not worthy to
    look up and see the height of heaven because of the multitude of my unrighteous
    acts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beyond counting like the sand of the sea.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek uses two different terms for wrongdoing here: first ''lawless
      deeds'' (ἀνομίαι), then ''unrighteous acts'' (ἀδικίαι/ἀδικιῶν).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥμαρτον
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: BDAG
  rationale: A present-result English perfect fits the Greek aorist well in this penitential
    prayer context, where the speaker's past sin bears on his present unworthiness.
- source_word: ὑπὲρ ἀριθμὸν
  chosen: beyond the number of
  alternatives:
  - more than
  - beyond counting of
  lexicon: LSJ
  rationale: This preserves the comparative force of ὑπέρ with ἀριθμός while keeping
    the phrase natural in English.
- source_word: ψάμμου θαλάσσης
  chosen: the sand of the sea
  alternatives:
  - sea sand
  - the sand by the sea
  lexicon: LSJ
  rationale: This is the most idiomatic literal rendering of the genitive phrase and
    preserves the biblical stock image of innumerability.
- source_word: ἀνομίαι
  chosen: lawless deeds
  alternatives:
  - iniquities
  - lawlessnesses
  - transgressions
  lexicon: BDAG
  rationale: ἀνομία denotes violation of law, not merely generic wrongdoing. 'Lawless
    deeds' preserves that sense better than the more traditional but less transparent
    'iniquities.' The plural is retained.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - O Lord
  lexicon: BDAG
  rationale: The vocative is naturally rendered 'Lord' in modern English. An added
    'O' would sound more archaic than the project's style prefers.
- source_word: οὐκ εἰμὶ ἄξιος
  chosen: I am not worthy
  alternatives:
  - I am unworthy
  lexicon: BDAG
  rationale: This is the standard and clear rendering of the worthiness expression,
    preserving the speaker's confession of unfitness.
- source_word: ἀτενίσαι
  chosen: to look up
  alternatives:
  - to gaze
  - to look intently
  lexicon: BDAG
  rationale: In context, paired with 'see the height of heaven,' the verb suggests
    directing one's gaze upward. 'Look up' captures the motion and remains readable.
- source_word: ἰδεῖν
  chosen: and see
  alternatives:
  - and behold
  lexicon: BDAG
  rationale: A simple coordinate rendering preserves the two-verb sequence without
    archaic diction.
- source_word: τὸ ὕψος τοῦ οὐρανοῦ
  chosen: the height of heaven
  alternatives:
  - heaven's height
  - the lofty height of heaven
  lexicon: LSJ
  rationale: This closely follows the Greek while remaining idiomatic. It conveys
    the exalted realm toward which the penitent feels unable to raise his eyes.
- source_word: ἀπὸ τοῦ πλήθους
  chosen: because of the multitude of
  alternatives:
  - from the multitude of
  - on account of the multitude of
  lexicon: BDAG
  rationale: Here ἀπό expresses cause or basis. 'Because of' communicates the causal
    sense more clearly than a wooden 'from.'
- source_word: ἀδικιῶν
  chosen: unrighteous acts
  alternatives:
  - wrongs
  - injustices
  - wicked deeds
  lexicon: BDAG
  rationale: To avoid flattening the distinction between ἀνομίαι and ἀδικιῶν into
    the same English term, this rendering preserves the semantic overlap while marking
    a shift in vocabulary. 'Unrighteous acts' reflects moral wrongness without over-specifying
    social injustice.
