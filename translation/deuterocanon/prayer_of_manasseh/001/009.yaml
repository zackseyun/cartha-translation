id: MAN.1.9
reference: Prayer of Manasseh 1:9
source:
  edition: charles-1913-apot-vol1
  text: διότι ἥμαρτον ὑπὲρ ἀριθμὸν ψάμμου θαλάσσης. ἐπλήθυναν αἱ ἀνομίαι μου, κύριε,
    ἐπλήθυναν αἱ ἀνομίαι μου, καὶ οὐκ εἰμὶ ἄξιος ἀτενίσαι καὶ ἰδεῖν τὸ ὕψος τοῦ οὐρανοῦ
    ἀπὸ τοῦ πλήθους τῶν ἀδικιῶν μου.
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: For I have sinned beyond the number of the sand of the sea. My lawless deeds
    have multiplied, Lord; my lawless deeds have multiplied, and I am not worthy to
    look up and see the height of heaven because of the multitude of my unrighteous
    acts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to gaze intently and see the height of heaven.' The Greek verb can emphasize
      fixed or intent looking, not merely upward direction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥμαρτον
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: BDAG
  rationale: Aorist verb of sinning. English present perfect fits the confessional
    context, expressing a past act with present moral consequence.
- source_word: ὑπὲρ ἀριθμὸν
  chosen: beyond the number of
  alternatives:
  - more than
  - beyond counting of
  lexicon: LSJ
  rationale: The phrase is comparative/intensive, indicating excess beyond numerical
    reckoning. 'Beyond the number of' stays close to the Greek while remaining natural.
- source_word: ψάμμου θαλάσσης
  chosen: the sand of the sea
  alternatives:
  - sea sand
  - the sand by the sea
  lexicon: LSJ
  rationale: A stock biblical image for innumerability. 'The sand of the sea' preserves
    the scriptural cadence and sense.
- source_word: ἐπλήθυναν
  chosen: have multiplied
  alternatives:
  - increased
  - became many
  lexicon: BDAG
  rationale: The verb denotes becoming numerous. 'Have multiplied' preserves both
    the quantitative force and the confessional tone.
- source_word: ἀνομίαι
  chosen: lawless deeds
  alternatives:
  - lawlessnesses
  - iniquities
  - transgressions
  lexicon: BDAG
  rationale: ἀνομία carries the sense of violation of God's law/order. 'Lawless deeds'
    is more transparent to modern readers than 'iniquities' while preserving the legal-moral
    force better than the broader 'sins.'
- source_word: κύριε
  chosen: Lord
  alternatives:
  - O Lord
  lexicon: BDAG
  rationale: Direct address to God. 'Lord' follows the project's default rendering
    for κύριος; the vocative particle sense can be conveyed without adding 'O' in
    modern English.
- source_word: οὐκ εἰμὶ ἄξιος
  chosen: I am not worthy
  alternatives:
  - I am unworthy
  lexicon: BDAG
  rationale: This is the straightforward sense of personal unworthiness; the fuller
    phrase reads naturally in English and preserves the solemn register.
- source_word: ἀτενίσαι
  chosen: to look up
  alternatives:
  - to gaze intently
  - to look steadily
  lexicon: BDAG
  rationale: The verb can mean to look intently or fix one's gaze. In context with
    'and see the height of heaven,' 'look up' captures both the physical upward orientation
    and the implied inability to face heaven.
- source_word: ἰδεῖν
  chosen: see
  alternatives:
  - behold
  lexicon: BDAG
  rationale: Simple verb of seeing. 'See' is preferred for readable modern English;
    'behold' would sound archaic.
- source_word: τὸ ὕψος τοῦ οὐρανοῦ
  chosen: the height of heaven
  alternatives:
  - heaven's height
  - the heights of heaven
  lexicon: LSJ
  rationale: Singular ὕψος is best represented by 'height.' This preserves the image
    of heaven's exalted loftiness without unnecessary expansion.
- source_word: ἀπὸ τοῦ πλήθους
  chosen: because of the multitude of
  alternatives:
  - from the multitude of
  - on account of the multitude of
  lexicon: BDAG
  rationale: Although ἀπό is literally 'from,' in this causal context 'because of'
    communicates the sense naturally in English.
- source_word: ἀδικιῶν
  chosen: unrighteous acts
  alternatives:
  - injustices
  - wrongdoings
  - iniquities
  lexicon: BDAG
  rationale: ἀδικία overlaps with wrongdoing/unrighteousness. To preserve the Greek
    distinction from ἀνομίαι in the same verse, a different English rendering is warranted.
    'Unrighteous acts' keeps the moral sense without collapsing it into the same gloss
    as 'lawless deeds.'
