theological_decisions:
- issue: Distinguishing ἀνομίαι and ἀδικιῶν within the same confession
  chosen_reading: Render ἀνομίαι as 'lawless deeds' and ἀδικιῶν as 'unrighteous acts'
  alternative_readings:
  - Render both as 'sins'
  - Render both as 'iniquities'
  rationale: The Greek uses two related but distinct moral terms. Preserving the distinction
    respects the source text's rhetorical fullness and avoids flattening the confession
    into repeated generic 'sin' language.
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, or documented exception
- issue: Rendering κύριε
  chosen_reading: Lord
  alternative_readings:
  - O Lord
  rationale: The project's contested-terms table sets κύριος to 'Lord' by default.
    The vocative force is retained by direct address without requiring archaic liturgical
    style.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
