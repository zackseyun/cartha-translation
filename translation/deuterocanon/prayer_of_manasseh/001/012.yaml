theological_decisions:
- issue: Rendering of moral term ἀνομία in a penitential prayer
  chosen_reading: lawless deeds
  alternative_readings:
  - iniquities
  - transgressions
  rationale: The verse confesses concrete violations before the Lord. 'Lawless deeds'
    preserves the semantic content of ἀνομία more directly than the traditional but
    less transparent 'iniquities.' This avoids importing later theological jargon
    while retaining moral gravity.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; consistency of key
    terms, or documented exception'
- issue: Rendering κύριε in direct address
  chosen_reading: Lord
  alternative_readings:
  - O Lord
  rationale: The project's default for κύριος is 'Lord.' Adding 'O' would heighten
    liturgical tone but is not demanded by the Greek vocative itself.
  doctrine_reference: 'DOCTRINE.md contested terms table: κύριος → Lord'
