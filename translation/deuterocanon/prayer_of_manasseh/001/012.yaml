id: MAN.1.12
reference: Prayer of Manasseh 1:12
source:
  edition: charles-1913-apot-vol1
  text: ἡμάρτηκα, κύριε, ἡμάρτηκα, καὶ τὰς ἀνομίας μου ἐγὼ γινώσκω·
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: I have sinned, Lord, I have sinned, and I myself know my lawless deeds;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my iniquities.' The Greek term denotes acts of lawlessness or violation
      of God's law.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμάρτηκα
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: BDAG
  rationale: Perfect active indicative of ἁμαρτάνω. The Greek perfect presents the
    sin as a completed act with present relevance; English present perfect best preserves
    that force in a penitential confession.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - O Lord
  lexicon: BDAG
  rationale: Vocative of κύριος. 'Lord' follows the project's default rendering for
    κύριος. An interjectional 'O' is possible in prayer language, but the Greek here
    does not require it, and modern readable English is served by the simple vocative.
- source_word: τὰς ἀνομίας
  chosen: my lawless deeds
  alternatives:
  - my lawless acts
  - my iniquities
  - my transgressions
  lexicon: BDAG
  rationale: ἀνομία denotes lawlessness, violation of law, not merely generic wrongdoing.
    'Lawless deeds' preserves the lexical connection to lawlessness more transparently
    than traditional 'iniquities,' while remaining natural English in a confessional
    context.
- source_word: γινώσκω
  chosen: know
  alternatives:
  - acknowledge
  - recognize
  lexicon: BDAG
  rationale: The verb's plain sense is cognitive knowledge. In context it implies
    confession/acknowledgment, but 'know' stays closer to the Greek and lets the penitential
    force arise from context.
- source_word: ἐγώ
  chosen: I myself
  alternatives:
  - I
  - even I
  lexicon: BDAG
  rationale: The explicit pronoun is unnecessary for basic grammar and therefore adds
    emphasis. 'I myself' reflects that emphasis in English without sounding archaic.
