theological_decisions:
- issue: Gendered covenantal language in τῶν πατέρων ἡμῶν
  chosen_reading: fathers
  alternative_readings:
  - ancestors
  rationale: The Greek explicitly says 'fathers,' and the phrase is a fixed biblical
    covenant formula. Per doctrine, gender-accurate rendering is preferred over neutralization
    unless context requires otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering σπέρμα in a lineage context
  chosen_reading: offspring
  alternative_readings:
  - seed
  - descendants
  rationale: The term carries covenant-lineage resonance, but in contemporary English
    'seed' can sound opaque here. 'Offspring' preserves the collective-singular nuance
    and theological continuity without unnecessary obscurity.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
