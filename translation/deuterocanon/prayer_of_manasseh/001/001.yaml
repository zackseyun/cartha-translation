id: MAN.1.1
reference: Prayer of Manasseh 1:1
source:
  edition: charles-1913-apot-vol1
  text: Κύριε παντοκράτωρ, ὁ θεὸς τῶν πατέρων ἡμῶν, τοῦ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακὼβ
    καὶ τοῦ σπέρματος αὐτῶν τοῦ δικαίου,
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: Lord Almighty, God of our fathers, of Abraham and Isaac and Jacob and of their
    righteous offspring,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seed.' The Greek term can also be rendered more literally as 'seed,'
      especially in covenant-lineage contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος used as a divine address. Per doctrine, the default
    rendering is 'Lord.' 'Master' is possible lexically but is less fitting for this
    prayer's covenantal invocation.
- source_word: παντοκράτωρ
  chosen: Almighty
  alternatives:
  - All-sovereign
  - Ruler of all
  lexicon: LEH
  rationale: A standard rendering for the divine title παντοκράτωρ in biblical Greek.
    'Almighty' is idiomatic, weighty, and preserves the title's theological force
    without awkwardness.
- source_word: ὁ θεὸς τῶν πατέρων ἡμῶν
  chosen: God of our fathers
  alternatives:
  - our fathers' God
  lexicon: LEH
  rationale: This is a conventional covenantal formula. 'God of our fathers' preserves
    the source structure and biblical resonance. Per doctrine, masculine 'fathers'
    is retained rather than neutralized.
- source_word: τοῦ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ
  chosen: of Abraham and Isaac and Jacob
  alternatives:
  - of Abraham, Isaac, and Jacob
  lexicon: LEH
  rationale: The repeated καί can be represented either more formally or with smoother
    English punctuation. The chosen wording keeps the repeated 'and' for solemn cadence
    while remaining natural.
- source_word: σπέρματος
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: LEH
  rationale: σπέρμα can mean 'seed' literally or 'offspring/descendants' figuratively.
    Here it refers to lineage. 'Offspring' preserves the singular collective sense
    better than the more diffuse 'descendants,' while avoiding overly literal 'seed'
    in the main text.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - his
  lexicon: LEH
  rationale: The pronoun naturally refers back to the plural patriarchs just named.
    'Their' best matches the immediate Greek antecedent structure.
- source_word: τοῦ δικαίου
  chosen: righteous
  alternatives:
  - just
  lexicon: LEH
  rationale: The adjective modifies 'offspring' in the Greek phrase. 'Righteous' is
    the most standard biblical rendering for δίκαιος-family language and preserves
    theological continuity with related terms.
