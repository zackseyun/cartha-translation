theological_decisions:
- issue: Metaphorical expression γόνυ καρδίας
  chosen_reading: Retain the metaphor as 'the knee of my heart' rather than interpretively
    flattening it to 'my heart in humility.'
  alternative_readings:
  - my heart's knee
  - I bow my heart in humility
  rationale: The text's theology of repentance is expressed through a vivid metaphor
    of inward kneeling. Preserving the image maintains the source's rhetorical and
    devotional force without importing extra explanation into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
