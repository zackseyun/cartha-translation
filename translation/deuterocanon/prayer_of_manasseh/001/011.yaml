id: MAN.1.11
reference: Prayer of Manasseh 1:11
source:
  edition: charles-1913-apot-vol1
  text: καὶ νῦν κλίνω γόνυ καρδίας, δεόμενος τῆς παρὰ σοῦ χρηστότητος·
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: And now I bend the knee of my heart, imploring the kindness from you;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I bow the knee of my heart.' The Greek keeps a vivid metaphor of inward
      kneeling.
    reason: lexical_alternative
  - marker: b
    text: Or 'for your kindness.' The phrase literally includes 'from you,' emphasizing
      that this benevolence proceeds from God.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  chosen: And now
  alternatives:
  - and now
  - so now
  lexicon: BDAG
  rationale: A straightforward temporal-transition phrase. 'And now' preserves the
    connective force of καὶ and the immediacy of νῦν without adding interpretive nuance.
- source_word: κλίνω
  chosen: I bend
  alternatives:
  - I bow
  - I incline
  lexicon: BDAG
  rationale: The verb literally denotes bending or inclining. 'I bend' keeps the embodied
    imagery and pairs naturally with 'knee.' 'I bow' is possible but slightly less
    tied to the concrete object γόνυ.
- source_word: γόνυ καρδίας
  chosen: the knee of my heart
  alternatives:
  - my heart's knee
  - the knees of my heart
  lexicon: BDAG
  rationale: The Greek is singular γόνυ with a genitive καρδίας. The phrase is metaphorical,
    combining bodily posture with inward humility. 'The knee of my heart' preserves
    the striking image more transparently than smoothing it into a paraphrase.
- source_word: δεόμενος
  chosen: begging
  alternatives:
  - imploring
  - entreating
  - asking
  lexicon: BDAG
  rationale: This participle conveys earnest supplication. 'Begging' best reflects
    the intensity of humble appeal in context, stronger than merely 'asking.'
- source_word: τῆς παρὰ σοῦ χρηστότητος
  chosen: for the kindness that comes from you
  alternatives:
  - for your kindness
  - for the goodness from you
  - for the mercy from you
  lexicon: BDAG
  rationale: χρηστότης commonly denotes kindness, goodness, or benevolence. 'Kindness'
    is accessible modern English and fits the prayerful appeal. The phrase παρὰ σοῦ
    is retained in sense by 'that comes from you,' rather than compressed away entirely.
