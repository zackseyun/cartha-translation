translation:
  text: and to strengthen them, so that they might defend themselves against those
    who attacked them in the time of distress, on the thirteenth day of the twelfth
    month, Adar, on that same day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to support them' or 'to reinforce them.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in the time of distress' may also be understood more generally
      as 'in a time of trouble' or 'in a time of affliction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεπισχύειν
  chosen: to strengthen
  alternatives:
  - to support
  - to reinforce
  lexicon: LSJ
  rationale: The infinitive conveys giving added strength or support. 'To strengthen'
    is natural English and preserves the causative sense without overparaphrasing.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is clear modern English while retaining
    the purposive force.
- source_word: θλίψεως
  chosen: distress
  alternatives:
  - affliction
  - trouble
  lexicon: LSJ
  rationale: The phrase ἐν καιρῷ θλίψεως denotes a time of pressure or calamity. 'Distress'
    is idiomatic and suitably weighty without sounding archaic.
- source_word: ἐπιθεμένους
  chosen: attacked
  alternatives:
  - set upon
  - assailed
  lexicon: BDAG
  rationale: From ἐπιτίθημι in a hostile sense. 'Attacked' best fits contemporary
    English and the military/violent context.
- source_word: ἀμύνωνται
  chosen: might defend themselves
  alternatives:
  - might ward off
  - might protect themselves
  lexicon: LSJ
  rationale: Middle voice indicates action for their own protection. 'Defend themselves'
    captures both the reflexive force and the legal-military context of authorized
    self-defense.
- source_word: τῇ τρισκαιδεκάτῃ τοῦ δωδεκάτου μηνὸς Ἀδὰρ
  chosen: on the thirteenth day of the twelfth month, Adar
  alternatives:
  - on the thirteenth of Adar, the twelfth month
  lexicon: LSJ
  rationale: The date formula is rendered explicitly and naturally in English while
    preserving the Hebrew month name by transliteration, per project policy on names.
- source_word: τῇ αὐτῇ ἡμέρᾳ
  chosen: on that same day
  alternatives:
  - on the same day
  lexicon: BDAG
  rationale: The article and adjective emphasize identity with the specified date.
    'That same day' preserves the emphasis slightly better in English.
