translation:
  text: But we find that the Jews, who have been handed over to destruction by that
    thrice-accursed man, are not criminals, but live by most righteous laws,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the thrice-cursed one.' The Greek uses an unusually strong insult
      (τρισαλιτήριος) for the man responsible.
    reason: lexical_alternative
  - marker: b
    text: Or 'but live by most just laws.' The Greek verb can mean 'conduct their
      civic life' according to such laws.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς δὲ
  chosen: But we
  alternatives:
  - And we
  - Now we
  lexicon: LSJ
  rationale: δέ marks contrast with the preceding accusation or policy; 'But we' preserves
    the adversative force naturally in English.
- source_word: τοὺς ... Ἰουδαίους
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: LSJ
  rationale: In Esther Greek, Ἰουδαῖοι refers to the Jewish people as an ethnic-religious
    group in the Persian court setting. 'Jews' is the standard and clearest English
    rendering here.
- source_word: ὑπὸ τοῦ τρισαλιτηρίου
  chosen: by that thrice-accursed man
  alternatives:
  - by the thrice-cursed one
  - by that utterly accursed man
  lexicon: LSJ
  rationale: The adjective τρισαλιτήριος is an intensive pejorative, literally 'thrice-accursed'
    or 'thrice-wretched.' Adding 'man' makes the referent explicit in idiomatic English,
    while 'that' preserves the contemptuous demonstrative force implied by the article
    in context.
- source_word: παραδεδομένους
  chosen: have been handed over
  alternatives:
  - have been delivered up
  - have been given over
  lexicon: LSJ
  rationale: The participle indicates being surrendered into another's power or fate.
    'Handed over' is natural modern English and preserves the passive sense.
- source_word: εἰς ἀφανισμόν
  chosen: to destruction
  alternatives:
  - for destruction
  - to annihilation
  lexicon: LSJ
  rationale: ἀφανισμός denotes destruction or obliteration. 'To destruction' fits
    the construction with παραδεδομένους and keeps the judicial-lethal force without
    over-specifying.
- source_word: εὑρίσκομεν
  chosen: we find
  alternatives:
  - we discover
  - we determine
  lexicon: LSJ
  rationale: The verb presents the king's conclusion after examination. 'We find'
    is concise and idiomatic in a royal or judicial register.
- source_word: οὐ κακούργους ὄντας
  chosen: are not criminals
  alternatives:
  - are not evildoers
  - are not wrongdoers
  lexicon: LSJ
  rationale: κακοῦργος can denote a criminal or evildoer. 'Criminals' suits the forensic
    context of an imperial review of charges.
- source_word: δικαιοτάτοις ... νόμοις
  chosen: most righteous laws
  alternatives:
  - most just laws
  - very righteous laws
  lexicon: LSJ
  rationale: δικαιότατος is the superlative of 'righteous/just.' 'Most righteous laws'
    preserves the superlative and moral-legal character of the term.
- source_word: πολιτευομένους
  chosen: are governed by
  alternatives:
  - live by
  - conduct themselves according to
  lexicon: LSJ
  rationale: Though the middle can mean 'conduct one's life as a citizen,' with νόμοις
    it naturally conveys ordering one's communal life by laws. 'Are governed by' captures
    the passive-like relation to the laws in smooth English.
