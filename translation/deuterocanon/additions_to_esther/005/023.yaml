theological_decisions:
- issue: Rendering σωτηρία in a deuterocanonical court narrative
  chosen_reading: deliverance
  alternative_readings:
  - salvation
  - rescue
  rationale: The verse concerns preservation of a people and their allies within the
    Persian setting. 'Deliverance' best fits the immediate narrative context while
    avoiding unnecessary narrowing to either purely secular 'rescue' or overtly soteriological
    'salvation.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
- issue: Force of μνημόσυνον τῆς ἀπωλείας
  chosen_reading: a memorial of destruction
  alternative_readings:
  - a remembrance of destruction
  - a reminder of their destruction
  rationale: The Greek is terse and somewhat elliptical. The chosen rendering preserves
    the solemn, judicial tone and leaves the exact nuance of the memorial expression
    intact rather than over-explaining it.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, §6'
