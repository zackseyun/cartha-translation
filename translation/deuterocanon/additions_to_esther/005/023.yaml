source:
  edition: lxx-swete-1909
  text: ὅπως καὶ νῦν καὶ μετὰ ταῦτα σωτηρία ἡμῖν καὶ τοῖς εὐνοοῦσιν Πέρσαις, τοῖς
    δὲ ἡμῖν ἐπι- βουλεύουσιν μνημόσυνον τῆς ἀπωλείας.
  language: Greek
