translation:
  text: since we are sons of the Most High, greatest, living God, who directs the
    kingdom for us and for our forefathers in the best order.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "children of the Most High, greatest, living God." The Greek has "sons,"
      which is retained in the main text to preserve the explicit filial wording.
    reason: lexical_alternative
  - marker: b
    text: Or "who guides/orders the kingdom for us and for our ancestors in the finest
      arrangement."
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὺς
  chosen: sons
  alternatives:
  - children
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and evokes filial status rather
    than a generic neutral term. Per doctrine, gender-accurate rendering is preferred
    unless context clearly demands neutralization.
- source_word: τοῦ ὑψίστου μεγίστου ζῶντος θεοῦ
  chosen: of the Most High, greatest, living God
  alternatives:
  - of the Most High and greatest living God
  - of the highest, greatest, living God
  lexicon: LEH
  rationale: This string piles up divine epithets in apposition. The translation preserves
    the elevated, accumulative style rather than smoothing it too much. Commas reflect
    the rhetorical sequence of titles.
- source_word: κατευθύνοντος
  chosen: who directs
  alternatives:
  - who guides
  - who orders
  - who steers
  lexicon: LEH
  rationale: The participle denotes directing or guiding. 'Directs' preserves both
    governance and providential ordering without overinterpreting.
- source_word: τὴν βασιλείαν
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  lexicon: LEH
  rationale: The noun most naturally refers here to the realm or royal dominion. 'Kingdom'
    is the most idiomatic and sufficiently broad English equivalent.
- source_word: ἡμῖν τε καὶ τοῖς προγόνοις ἡμῶν
  chosen: for us and for our forefathers
  alternatives:
  - for us and our ancestors
  - for us and our fathers
  lexicon: LEH
  rationale: πρόγονοι refers to forebears/ancestors. 'Forefathers' preserves the elevated
    register and the familial-historical sense in context.
- source_word: ἐν τῇ καλλίστῃ διαθέσει
  chosen: in the best order
  alternatives:
  - in the best arrangement
  - with the best disposition
  - in the finest ordering
  lexicon: LEH
  rationale: διάθεσις here concerns arrangement, ordering, or disposition. 'In the
    best order' communicates providentially excellent administration in natural English
    while staying close to the Greek superlative.
