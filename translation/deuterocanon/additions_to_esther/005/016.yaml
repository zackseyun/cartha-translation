theological_decisions:
- issue: Divine sonship language applied corporately
  chosen_reading: since we are sons of the Most High, greatest, living God
  alternative_readings:
  - since we are children of the Most High, greatest, living God
  rationale: The text uses explicit filial language and grounds the following claim
    in covenantal relationship to God. The rendering preserves that theological force
    without softening to a generic term.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Scope of God's action in directing the kingdom
  chosen_reading: who directs the kingdom for us and for our forefathers
  alternative_readings:
  - who has directed the kingdom for us and our ancestors
  - who orders the kingship on behalf of us and our forefathers
  rationale: The present participle is rendered as a general present, expressing God's
    ongoing providential governance rather than forcing a past-tense historical statement.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
