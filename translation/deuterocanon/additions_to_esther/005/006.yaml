theological_decisions:
- issue: Syntactic force of the genitive phrase τὴν τῶν ἐπικρατούντων ἀκέραιον εὐγνωμοσύνην
  chosen_reading: the phrase refers to the sincere goodwill belonging to those in
    power
  alternative_readings:
  - the sincere gratitude shown toward those in power
  rationale: The most straightforward reading takes τῶν ἐπικρατούντων as a subjective
    genitive modifying εὐγνωμοσύνην. Given the semantic range of εὐγνωμοσύνη as benevolence
    or good disposition, this yields a coherent sense in context. The alternative
    'gratitude toward those in power' is grammatically less natural here and contextually
    weaker.
