theological_decisions:
- issue: Meaning of προσκυνούμενον in a royal court context
  chosen_reading: honored by all
  alternative_readings:
  - bowed down to by all
  - reverenced by all
  - worshiped by all
  rationale: The verb can denote either homage to a human superior or worship of deity.
    In this narrative's imperial court setting, the context favors courtly obeisance
    rather than divine worship. To avoid overstating the theological force, the main
    text uses 'honored,' while a more literal alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English without importing doctrinal claims the text does not make.
