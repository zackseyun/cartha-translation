translation:
  text: We have attained such goodwill toward every nation that he is proclaimed our
    father and is continually honored by all as the second person to the royal throne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'bowed down to by all.' The Greek verb can denote prostration
      or homage before a superior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτυχεν
  chosen: we have attained
  alternatives:
  - it has happened
  - we have obtained
  - we have enjoyed
  lexicon: LSJ
  rationale: From τυγχάνω with genitive, here expressing obtaining or enjoying something.
    'We have attained' fits the first-person plural construction with φιλανθρωπίας
    and preserves the sense of having come into possession of favor/goodwill.
- source_word: φιλανθρωπίας
  chosen: goodwill
  alternatives:
  - kindness
  - benevolence
  - humanity
  lexicon: LSJ
  rationale: The term denotes benevolence or kindly disposition. 'Goodwill' is natural
    English here and avoids the misleadingly abstract 'humanity' while preserving
    the favorable disposition shown toward peoples.
- source_word: πρὸς πᾶν ἔθνος
  chosen: toward every nation
  alternatives:
  - for every nation
  - toward every people
  lexicon: LSJ
  rationale: ἔθνος in this courtly-political context refers to nations/peoples under
    imperial scope. 'Toward every nation' best reflects πρὸς plus accusative as direction
    of goodwill.
- source_word: ἐπὶ τοσοῦτον ὥστε
  chosen: such ... that
  alternatives:
  - to such an extent that
  - so greatly that
  lexicon: LSJ
  rationale: This idiom introduces result. Rendering it as 'such ... that' gives idiomatic
    English while preserving the consequential force.
- source_word: ἀναγορεύεσθαι
  chosen: is proclaimed
  alternatives:
  - is publicly declared
  - is hailed
  - is named
  lexicon: LSJ
  rationale: The verb carries the sense of public proclamation or formal designation.
    'Is proclaimed' preserves the official, courtly register.
- source_word: πατέρα
  chosen: father
  alternatives:
  - protector
  - patron
  lexicon: LSJ
  rationale: The Greek literally says 'father.' In royal-political rhetoric this can
    imply patronage, but the literal familial title should be preserved in the main
    text.
- source_word: προσκυνούμενον
  chosen: honored
  alternatives:
  - bowed down to
  - reverenced
  - worshiped
  lexicon: LSJ
  rationale: προσκυνέω can range from prostration before a superior to worship. In
    this Persian court setting, 'honored' avoids importing divine worship while still
    conveying deferential homage; the more literal bodily sense is preserved in a
    footnote.
- source_word: τὸ δεύτερον τοῦ Βασιλικοῦ θρόνου πρόσωπον
  chosen: the second person to the royal throne
  alternatives:
  - the second after the royal throne
  - the second face/personage of the royal throne
  - the one second to the royal throne
  lexicon: LSJ
  rationale: The phrase is awkwardly courtly Greek. πρόσωπον here is best taken as
    'person/personage,' and τὸ δεύτερον marks rank. 'The second person to the royal
    throne' communicates vice-regal status without over-paraphrasing.
- source_word: διατελεῖν
  chosen: is continually
  alternatives:
  - continues to be
  - remains
  - persists in being
  lexicon: LSJ
  rationale: The infinitive adds durative force to the status described. Rendering
    with 'is continually honored' captures the ongoing aspect in smoother English.
