translation:
  text: and to look ahead to what comes after these things, so as to grant the kingdom,
    undisturbed, to all people with peace,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to give attention to what follows.' The Greek προσέχειν can mean to
      attend to or consider; the translation 'look ahead to' brings out the future-oriented
      sense of the phrase 'the things after these.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the realm' or 'the royal rule.' Greek βασιλεία can refer to a kingdom
      as a domain or to kingship/reign more abstractly.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέχειν
  chosen: to look ahead to
  alternatives:
  - to attend to
  - to give attention to
  - to consider
  lexicon: LSJ
  rationale: The infinitive continues the petitionary sequence and here governs εἰς
    τὰ μετὰ ταῦτα ('to the things after these'). In context it is not mere mental
    attention in the abstract but consideration of future consequences, so 'to look
    ahead to' brings out the forward-looking sense in readable English.
- source_word: τὰ μετὰ ταῦτα
  chosen: what comes after these things
  alternatives:
  - the things after this
  - what follows
  lexicon: LSJ
  rationale: A temporal phrase referring to subsequent outcomes. 'What comes after
    these things' is slightly fuller English that preserves the future-oriented force
    without sounding wooden.
- source_word: Βασιλείαν
  chosen: the kingdom
  alternatives:
  - the realm
  - the royal rule
  lexicon: LSJ
  rationale: Although the context is Persian monarchy and 'kingdom' can denote either
    realm or reign, 'the kingdom' best preserves the Greek's broad political sense
    here without over-specifying either territory or abstract rule.
- source_word: ἀτάραχον
  chosen: undisturbed
  alternatives:
  - untroubled
  - free from turmoil
  - tranquil
  lexicon: LSJ
  rationale: The adjective describes the state in which the kingdom is to be provided.
    'Undisturbed' captures the political sense of being free from upheaval or agitation
    and fits the surrounding peace language.
- source_word: τοῖς πᾶσιν ἀνθρώποις
  chosen: to all people
  alternatives:
  - for all people
  - to all men
  lexicon: LSJ
  rationale: ἀνθρώποις is generic for human beings, not specifically males. 'All people'
    is gender-accurate to the sense while preserving the universal scope. 'To' is
    retained because it follows the Greek construction with παρέξεσθαι.
- source_word: μετʼ εἰρήνης
  chosen: with peace
  alternatives:
  - in peace
  - peacefully
  lexicon: LSJ
  rationale: The prepositional phrase modifies the granting/providing of the kingdom.
    'With peace' is the most direct rendering and preserves the noun rather than converting
    it into an adverb.
- source_word: παρέξεσθαι
  chosen: to grant
  alternatives:
  - to provide
  - to present
  - to bestow
  lexicon: LSJ
  rationale: The future middle infinitive conveys causing something to be available
    or granted. 'To grant' fits royal-political context and works naturally with 'the
    kingdom ... to all people.'
