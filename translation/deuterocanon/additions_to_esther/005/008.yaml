  text: καὶ προσέχειν εἰς τὰ μετὰ ταῦτα, εἰς τὸ τὴν Βασιλείαν ἀτάραχον τοῖς πᾶσιν
    ἀνθρώποις μετʼ εἰρήνης παρέξεσθαι,
  language: Greek
