theological_decisions:
- issue: Rendering divine sovereignty in ὁ πάντα δυναστεύων θεὸς
  chosen_reading: the God who rules over all
  alternative_readings:
  - the all-sovereign God
  - the God almighty over all
  rationale: The phrase emphasizes God's active sovereignty in reversing threatened
    annihilation. The chosen rendering preserves that theological force without importing
    later fixed title language not explicit in the Greek.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; readable modern English'
- issue: Rendering ἐκλεκτοῦ γένους
  chosen_reading: the chosen race
  alternative_readings:
  - the chosen people
  - the elect nation
  rationale: The Greek highlights Israel as God's chosen lineage/people. 'Race' best
    reflects γένος here, though modern English can hear it more narrowly; alternatives
    are preserved as lexical possibilities but the main text stays close to the source.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
