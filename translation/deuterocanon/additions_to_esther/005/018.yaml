translation:
  text: because the very man who had brought about these things was crucified at the
    gate of Susa with his whole household, since God, who rules over all, swiftly
    repaid him with the punishment he deserved,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was impaled' or 'was hanged on a stake.' The Greek verb can denote execution
      on a stake or cross; the exact Persian method need not have matched later Roman
      crucifixion.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὸ
  chosen: because
  alternatives:
  - for
  - on account of
  lexicon: LSJ
  rationale: Introduces the causal ground for the preceding statement. 'Because' is
    natural English and preserves the explanatory force.
- source_word: αὐτὸν τὸν ταῦτα ἐξεργασάμενον
  chosen: the very man who had brought about these things
  alternatives:
  - that very man who had done these things
  - the man himself who had accomplished these things
  lexicon: LSJ
  rationale: The article with αὐτόν is emphatic ('the very man himself'). ἐξεργάζομαι
    here means to bring about or carry out, especially in a harmful scheme. 'Brought
    about these things' preserves the reference without over-specifying.
- source_word: πρὸς ταῖς Σούσων πύλαις
  chosen: at the gate of Susa
  alternatives:
  - by the gates of Susa
  - near the gates of Susa
  lexicon: LSJ
  rationale: πρός with the dative here indicates location near/at. English idiom prefers
    singular 'the gate of Susa' for a city-gate setting, though the Greek is formally
    plural.
- source_word: ἐσταυρῶσθαι
  chosen: was crucified
  alternatives:
  - was impaled
  - was hanged on a stake
  lexicon: LSJ
  rationale: The verb literally denotes crucifixion/impalement. In Esther's Greek
    context Persian execution may not match later Roman crucifixion precisely, but
    'was crucified' is the most direct rendering of the Greek form. A footnote preserves
    the broader execution sense.
- source_word: σὺν τῇ πανοικίᾳ
  chosen: with his whole household
  alternatives:
  - with all his house
  - together with his entire family
  lexicon: LSJ
  rationale: πανοικία denotes the entire household. 'Whole household' is concise and
    includes family and dependents, not merely nuclear family.
- source_word: τὴν καταξίαν
  chosen: the punishment he deserved
  alternatives:
  - the due recompense
  - the fitting penalty
  lexicon: LSJ
  rationale: The noun conveys what is fitting or deserved, often in the sense of due
    recompense. In this judicial context 'the punishment he deserved' makes the sense
    explicit in natural English.
- source_word: τοῦ τὰ πάντα ἐπικρατοῦντος θεοῦ
  chosen: God, who rules over all
  alternatives:
  - God, who has power over all things
  - the God who prevails over all
  lexicon: LSJ
  rationale: ἐπικρατέω means to prevail over, have mastery over, or rule. 'Who rules
    over all' is clear, reverent, and preserves divine sovereignty without adding
    doctrinal freight.
- source_word: διὰ τάχους
  chosen: swiftly
  alternatives:
  - with speed
  - quickly
  lexicon: LSJ
  rationale: An idiomatic adverbial rendering fits English style while preserving
    the sense of rapid action.
- source_word: ἀποδόντος αὐτῷ κρίσιν
  chosen: repaid him with the punishment he deserved
  alternatives:
  - rendered judgment to him
  - paid him back with judgment
  lexicon: LSJ
  rationale: ἀποδίδωμι plus κρίσις expresses requital in judgment. Because τὴν καταξίαν
    and κρίσιν together intensify the idea of deserved judicial recompense, the English
    combines them smoothly as deserved punishment while retaining the notion of divine
    repayment.
