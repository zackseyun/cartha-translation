theological_decisions:
- issue: Divine action in judgment
  chosen_reading: God is presented as actively and swiftly repaying the offender with
    deserved judgment.
  alternative_readings:
  - A more muted rendering could leave the punishment less explicitly attributed to
    God.
  rationale: The genitive absolute and surrounding syntax directly attribute the judicial
    recompense to God. The translation preserves that agency without expanding into
    a broader doctrine of providence beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
