translation:
  text: And so you also, on your appointed festivals, keep a notable day with every
    kind of feasting,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your commemorative festivals' or 'your appointed feasts.' The Greek
      expression literally refers to festivals that bear a name or designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ὑμεῖς οὖν
  chosen: And so you also
  alternatives:
  - And you therefore also
  - Therefore you too
  lexicon: BDAG
  rationale: Carries forward an exhortational conclusion from the preceding context.
    'And so you also' preserves both the connective καί and inferential οὖν in readable
    English.
- source_word: ἐν ταῖς ἐπωνύμοις ὑμῶν ἑορταῖς
  chosen: on your named festivals
  alternatives:
  - in your appointed feasts
  - at your commemorative festivals
  lexicon: LSJ
  rationale: ἐπώνυμος literally relates to being named or bearing a name. In this
    context it likely refers to festivals designated by name in commemoration. 'Named
    festivals' stays close to the Greek without over-interpreting as merely 'appointed.'
    The preposition ἐν with a temporal festival expression is rendered idiomatically
    as 'on.'
- source_word: ἐπίσημον ἡμέραν
  chosen: a notable day
  alternatives:
  - a distinguished day
  - a marked day
  lexicon: BDAG
  rationale: ἐπίσημος denotes something marked, notable, or distinguished. 'Notable
    day' is natural English and preserves the commemorative force.
- source_word: μετὰ πάσης εὐωχίας
  chosen: with every kind of feasting
  alternatives:
  - with all rejoicing
  - with every festal celebration
  lexicon: LSJ
  rationale: εὐωχία commonly refers to feasting or festive enjoyment, often with food.
    'With every kind of feasting' reflects πάσης and keeps the concrete celebratory
    sense better than the broader 'rejoicing.'
- source_word: ἄγετε
  chosen: keep
  alternatives:
  - celebrate
  - observe
  lexicon: BDAG
  rationale: The imperative here calls for conducting or observing the day. 'Keep'
    is idiomatic for observance of a festival day and avoids sounding either too colloquial
    ('celebrate') or too formal ('observe').
