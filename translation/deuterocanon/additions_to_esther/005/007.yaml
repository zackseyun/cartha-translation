  text: σκοπεῖτε δὲ ἐξέστιν, οὐ τοσοῦτον ἐκ τῶν παλαιοτέρων ὡς παρεδώκαμεν ἱστοριῶν,
    ὅσα ἐστὶν παρὰ πόδας ὑμᾶς ἐξητοῦντας ἀνοσίως συντετελεσμένα τῇ τῶν ἀναξία δυναστευόντων
    λοιμότητι,
  language: Greek
