translation:
  text: But consider whether it is possible, not so much from the earlier histories
    that we have handed down as from the things lying at your feet, while you investigate,
    to discern how many lawless deeds have been accomplished by the pestilence of
    those who rule unworthily.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from what is before you' for 'from the things lying at your feet.' The
      Greek idiom emphasizes what is immediately at hand.
    reason: lexical_alternative
  - marker: b
    text: Or 'impiously' for 'lawlessly'; the Greek adverb can stress irreverence
      as well as wickedness.
    reason: lexical_alternative
  - marker: c
    text: '''Pestilence'' is likely metaphorical here, describing the destructive
      character of rulers who exercise power unworthily.'
    reason: cultural_note
lexical_decisions:
- source_word: σκοπεῖτε
  chosen: consider
  alternatives:
  - look
  - observe
  - take note
  lexicon: BDAG
  rationale: Imperative plural calling for attentive reflection rather than mere physical
    sight; 'consider' fits the rhetorical appeal in context.
- source_word: ἐξέστιν
  chosen: it is possible
  alternatives:
  - it is permitted
  - one may
  lexicon: BDAG
  rationale: Here the sense is capability/possibility in a rhetorical question-like
    appeal, not permission.
- source_word: παλαιοτέρων ... ἱστοριῶν
  chosen: the earlier histories
  alternatives:
  - older records
  - former accounts
  lexicon: LSJ
  rationale: ἱστορίαι in this context refers to historical accounts/records; 'earlier
    histories' preserves the comparative παλαιοτέρων.
- source_word: παρὰ πόδας ὑμᾶς
  chosen: lying at your feet
  alternatives:
  - before you
  - close at hand
  lexicon: LSJ
  rationale: The idiom literally means 'at your feet' and conveys immediacy or what
    is right before them. The more literal rendering is retained for transparency
    while remaining intelligible.
- source_word: ἐξητοῦντας
  chosen: while you investigate
  alternatives:
  - as you examine closely
  - while searching out
  lexicon: BDAG
  rationale: Conveys active inquiry or close examination; the participle is rendered
    temporally to fit English syntax.
- source_word: ἀνοσίως
  chosen: lawless
  alternatives:
  - impiously
  - wickedly
  - unholy
  lexicon: BDAG
  rationale: The adverb denotes conduct violating what is holy or right. 'Lawless'
    communicates grave moral violation in accessible English, though 'impiously' is
    a viable alternative.
- source_word: συντετελεσμένα
  chosen: have been accomplished
  alternatives:
  - have been carried out
  - have been brought to completion
  lexicon: BDAG
  rationale: Perfect participle/passive sense indicating deeds already brought about;
    'have been accomplished' preserves the completed aspect.
- source_word: λοιμότητι
  chosen: the pestilence
  alternatives:
  - the plague
  - the corruption
  lexicon: LSJ
  rationale: Literally denotes pestilence/plague. In context it is metaphorical for
    the destructive character of corrupt rulers; retaining 'pestilence' preserves
    the vivid image.
- source_word: τῇ τῶν ἀναξία δυναστευόντων λοιμότητι
  chosen: by the pestilence of those who rule unworthily
  alternatives:
  - by the plague of those exercising power unworthily
  - through the corruption of unworthy rulers
  lexicon: LSJ
  rationale: 'ἀναξία functions adverbially with δυναστευόντων: ''ruling unworthily.''
    δυναστεύω concerns exercising dominion/power. The phrase is rendered closely while
    preserving the metaphor in λοιμότης.'
