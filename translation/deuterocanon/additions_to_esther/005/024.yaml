translation:
  text: But every city or region as a whole that does not act according to these orders
    will be consumed with spear and fire in wrath; it will be made not only impassable
    to men, but also most hateful to wild animals and birds for all time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by spear and fire.' The Greek δόρατι is literally 'spear'; some render
      more generally as 'sword.'
    reason: lexical_alternative
  - marker: b
    text: '''Men'' here translates a masculine plural used generically for human beings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα ... πόλις ἢ χώρα τὸ σύνολον
  chosen: every city or region as a whole
  alternatives:
  - every city or district in its entirety
  - every city or land altogether
  lexicon: LSJ
  rationale: πᾶσα with πόλις ἢ χώρα gives the distributive sense 'every city or region,'
    while τὸ σύνολον intensifies the totality. 'As a whole' preserves that emphasis
    without awkward English.
- source_word: κατὰ ταῦτα
  chosen: according to these orders
  alternatives:
  - according to these things
  - in accordance with this decree
  lexicon: LSJ
  rationale: The phrase refers back to the contents of the royal command. 'According
    to these orders' makes the referent clear in context while staying close to the
    Greek.
- source_word: μὴ ποιήσῃ
  chosen: does not act
  alternatives:
  - does not do
  - does not carry out
  lexicon: LSJ
  rationale: ποιέω here means to do or carry out what has been commanded. 'Does not
    act' is idiomatic and fits the legal-decretal context.
- source_word: δόρατι καὶ πυρὶ
  chosen: with spear and fire
  alternatives:
  - by spear and fire
  - with the sword and fire
  lexicon: LSJ
  rationale: δόρυ literally denotes spear, though in some contexts it can stand more
    broadly for armed violence. Since the Greek specifically says δόρατι, 'spear'
    is retained rather than smoothing to the traditional 'sword.'
- source_word: καταναλωθήσεται μετʼ ὀργῆς
  chosen: will be consumed ... in wrath
  alternatives:
  - will be utterly destroyed in anger
  - will be devoured with wrath
  lexicon: LSJ
  rationale: καταναλίσκω conveys consuming or destroying; 'consumed' preserves the
    imagery. μετʼ ὀργῆς is rendered 'in wrath' to reflect the manner or accompanying
    disposition of the punishment.
- source_word: ἄβατος
  chosen: impassable
  alternatives:
  - inaccessible
  - unapproachable
  lexicon: LSJ
  rationale: ἄβατος literally means not to be gone into or traversed. 'Impassable'
    best fits the curse-like description of a devastated place.
- source_word: ἀνθρώποις
  chosen: men
  alternatives:
  - people
  - humankind
  lexicon: LSJ
  rationale: The dative plural is generic for human beings. Following the project's
    gender-accurate policy, 'men' is acceptable where the source uses the masculine
    generic; the sense remains humanity in general.
- source_word: θηρίοις καὶ πετεινοῖς
  chosen: wild animals and birds
  alternatives:
  - beasts and birds
  - animals and birds
  lexicon: LSJ
  rationale: θηρία are wild animals or beasts, and πετεινά are birds/flying creatures.
    'Wild animals and birds' is clear modern English.
- source_word: εἰς τὸν ἅπαντα χρόνον
  chosen: for all time
  alternatives:
  - forever
  - for the whole time
  lexicon: LSJ
  rationale: The phrase expresses enduring duration. 'For all time' preserves the
    solemn force without sounding overly idiomatic or interpretively absolute beyond
    the Greek.
- source_word: ἔχθιστος κατασταθήσεται
  chosen: will be made ... most hateful
  alternatives:
  - will become utterly loathed
  - will be made most detestable
  lexicon: LSJ
  rationale: The superlative ἔχθιστος means most hated/most hateful. Combined with
    κατασταθήσεται, it indicates being rendered into such a state. 'Most hateful'
    keeps the superlative force, even though the phrase is rhetorically stark.
