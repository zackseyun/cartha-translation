- issue: Generic masculine ἀνθρώποις
  chosen_reading: men
  alternative_readings:
  - people
  - humankind
  rationale: The Greek uses a masculine plural generically. Per doctrine, gender-accurate
    rendering is preferred over flattening to gender-neutral language when the source
    form is masculine and representative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Instrument of destruction in δόρατι
  chosen_reading: spear
  alternative_readings:
  - sword
  rationale: Although some English traditions generalize martial imagery to 'sword,'
    the Greek witness here specifically has δόρατι. Original-language primacy favors
    the more literal 'spear.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
