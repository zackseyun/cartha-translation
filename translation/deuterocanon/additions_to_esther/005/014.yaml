translation:
  text: For by these methods he thought that, once he had made us desolate, he would
    transfer the rule of the Persians to the Macedonians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having left us desolate' or 'after making us deserted.' The Greek participial
      phrase λαβὼν ἡμᾶς ἐρήμους is somewhat idiomatic, and the exact nuance of how
      the desolation is conceived may be expressed in more than one way in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ γὰρ τῶν τρόπων τούτων
  chosen: For by these methods
  alternatives:
  - For through these ways
  - For by such schemes
  lexicon: LSJ
  rationale: τρόποι can denote ways, manners, or methods. In this political/intrigue
    context, 'methods' communicates means or schemes without over-paraphrasing. γάρ
    is retained as 'For' to preserve the explanatory connection.
- source_word: ᾠήθη
  chosen: he thought
  alternatives:
  - he supposed
  - he imagined
  lexicon: LSJ
  rationale: The aorist passive/deponent form here conveys his assessment or assumption.
    'He thought' is straightforward modern English and fits the syntax with the following
    infinitive-like participial construction.
- source_word: λαβὼν ἡμᾶς ἐρήμους
  chosen: once he had made us desolate
  alternatives:
  - after taking us as desolate
  - having left us deserted
  - having made us a wasteland
  lexicon: LSJ
  rationale: The participle λαβών with predicate adjective ἐρήμους is idiomatic and
    difficult to render woodenly. The sense is that he expected to reduce 'us' to
    a desolate state. 'Once he had made us desolate' captures the prior action relative
    to the main verb and avoids an unnatural literalism.
- source_word: ἐρήμους
  chosen: desolate
  alternatives:
  - deserted
  - laid waste
  lexicon: LSJ
  rationale: ἐρήμους denotes being deserted, desolate, or laid waste. 'Desolate' preserves
    the broad devastation sense without forcing a specifically geographic image.
- source_word: τὴν τῶν Περσῶν ἐπικράτησιν
  chosen: the rule of the Persians
  alternatives:
  - the dominion of the Persians
  - the supremacy of the Persians
  - the Persian empire
  lexicon: LSJ
  rationale: ἐπικράτησις refers to dominance, mastery, or rule. 'The rule of the Persians'
    is clear and close to the Greek genitival construction. 'Empire' would be interpretive
    beyond the noun's direct sense.
- source_word: εἰς τοὺς Μακεδόνας μετάξει
  chosen: he would transfer ... to the Macedonians
  alternatives:
  - he would hand over ... to the Macedonians
  - he would remove ... to the Macedonians
  lexicon: LSJ
  rationale: μετάξει means to transfer or convey from one party to another. 'Transfer'
    best matches the political sense of shifting dominion. The future is represented
    with 'would transfer' under the scope of 'he thought' in English.
- source_word: τοὺς Μακεδόνας
  chosen: the Macedonians
  alternatives:
  - Macedon
  - the Greeks from Macedon
  lexicon: LSJ
  rationale: The ethnonym is best rendered directly as 'the Macedonians.' No expansion
    is warranted by the text.
