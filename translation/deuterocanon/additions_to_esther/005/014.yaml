- issue: Historical-political phrasing in a deuterocanonical Greek addition
  chosen_reading: Render the political claim straightforwardly without harmonizing
    it to later historical formulations.
  alternative_readings:
  - Translate more interpretively as 'the Persian kingdom to the Greeks'
  rationale: The Greek specifically names Persians and Macedonians and speaks of transferred
    rule. The translation preserves that wording rather than smoothing it into a generalized
    historical paraphrase.
