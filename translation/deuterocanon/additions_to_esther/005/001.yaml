translation:
  text: 'The following is a copy of the letter: Great King Artaxerxes to the rulers
    of the provinces, from India to Ethiopia, of one hundred twenty-seven satrapies,
    and to those who are loyal to our interests: greetings.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to those who think our things'—that is, those who support
      or favor the king's cause.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντίγραφον
  chosen: copy
  alternatives:
  - duplicate
  - transcript
  lexicon: LSJ
  rationale: The term denotes a written copy of a document. 'Copy' is the most natural
    modern English equivalent and fits the administrative context.
- source_word: ἐπιστολῆς
  chosen: letter
  alternatives:
  - epistle
  - document
  lexicon: LSJ
  rationale: In royal-administrative context this refers to a written communication.
    'Letter' is clear modern English without unnecessary archaism.
- source_word: τὰ ὑπογεγραμμένα
  chosen: the following
  alternatives:
  - what is written below
  - the things written underneath
  lexicon: LSJ
  rationale: This formula introduces the contents that follow. 'The following' captures
    the idiomatic force in readable English.
- source_word: Βασιλεὺς μέγας
  chosen: Great King
  alternatives:
  - the great king
  - King, the Great
  lexicon: LSJ
  rationale: This is a royal title, especially fitting Persian imperial style. Capitalizing
    both words reflects titular usage in English.
- source_word: σατραπείαις
  chosen: satrapies
  alternatives:
  - provinces
  lexicon: LSJ
  rationale: The Greek specifically uses the Persian administrative term rather than
    a generic word for provinces. Retaining 'satrapies' preserves historical specificity,
    while 'provinces' is supplied separately to render χωρῶν.
- source_word: χωρῶν ἄρχουσι
  chosen: the rulers of the provinces
  alternatives:
  - the governors of the regions
  - the rulers of the lands
  lexicon: LSJ
  rationale: The dative phrase identifies the recipients as officials governing territorial
    units. 'Rulers of the provinces' is idiomatic and sufficiently formal.
- source_word: τοῖς τὰ ἡμέτερα φρονοῦσι
  chosen: those who are loyal to our interests
  alternatives:
  - those who think our thoughts
  - those who are minded toward our affairs
  - those who are on our side
  lexicon: LSJ
  rationale: The idiom means those who are well-disposed toward the king's cause or
    interests. 'Loyal to our interests' conveys political allegiance without wooden
    literalism.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - hail
  lexicon: LSJ
  rationale: Standard epistolary salutation. 'Greetings' is the normal English equivalent
    in letter openings.
- source_word: ἑκατὸν εἴκοσι ἑπτὰ
  chosen: one hundred twenty-seven
  alternatives:
  - a hundred and twenty-seven
  lexicon: LSJ
  rationale: Straightforward numeral rendering in contemporary English style.
