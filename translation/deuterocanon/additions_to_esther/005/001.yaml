source:
  edition: lxx-swete-1909
  text: ΩΣ ἐστιν ἀντίγραφον τῆς ἐπιστολῆς τὰ ὑπογεγραμμένα Βασιλεὺς μέγας Ἀρταξέρξης
    τοῖς ἀπὸ τῆς Ἰνδικῆς ἕως τῆς Αἰθιοπίας ἑκατὸν εἴκοσι ἑπτὰ σατραπείαις χωρῶν ἄρχουσι
    καὶ τοῖς τὰ ἡμέτερα φρονοῦσι χαίρειν.
  language: Greek
