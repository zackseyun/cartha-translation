theological_decisions:
- issue: Use of 'savior' for Mordecai
  chosen_reading: Rendered σωτῆρα as 'savior' in its ordinary deliverer sense for
    Mordecai.
  alternative_readings:
  - deliverer
  - preserver
  rationale: The term is not uniquely theological and in this narrative context refers
    to Mordecai's role in preserving the king and the people. Retaining 'savior' reflects
    the Greek plainly while the rationale guards against importing later doctrinal
    associations.
  doctrine_reference: Translation philosophy §1, §6
- issue: Reference of 'their nation'
  chosen_reading: 'τούτων refers back to Mordecai and Esther collectively: ''their
    nation.'''
  alternative_readings:
  - his nation
  - the nation of these people
  rationale: The plural demonstrative most naturally points to the two named figures
    together, linking them with the Jewish people targeted for destruction.
  doctrine_reference: Translation philosophy §1, §5
