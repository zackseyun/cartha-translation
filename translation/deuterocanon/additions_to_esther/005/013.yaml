translation:
  text: having asked, by devious schemes of deceit, for the destruction of Mordecai,
    our savior and continual benefactor, and Esther, the blameless partner of the
    kingdom, together with all their nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverer' for 'savior' (σωτῆρα); the Greek here refers to Mordecai
      as one who saved or preserved, not necessarily as a formal title.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'by devious schemes of deceit' compresses several pejorative
      Greek terms for cunning, contrivance, and deceptive reasoning.
    reason: lexical_alternative
lexical_decisions:
- source_word: σωτῆρα
  chosen: savior
  alternatives:
  - deliverer
  - preserver
  lexicon: BDAG
  rationale: The noun denotes one who saves or delivers. 'Savior' is the most direct
    rendering and fits the courtly accusation here without softening the term to the
    less weighty 'helper.' In this context it refers to Mordecai as the one who preserved
    the king/realm, not a messianic title.
- source_word: διὰ παντὸς
  chosen: continual
  alternatives:
  - always
  - at all times
  - constant
  lexicon: LSJ
  rationale: The phrase conveys ongoing or constant action. 'Continual' reads naturally
    in English before 'benefactor' and preserves the durative sense.
- source_word: εὐεργέτην
  chosen: benefactor
  alternatives:
  - doer of good
  - one who has done good
  lexicon: LSJ
  rationale: In a royal-political setting, 'benefactor' captures both the sense of
    doing good and the public/courtly nuance of one who has rendered valuable service.
- source_word: ἄμεμπτον
  chosen: blameless
  alternatives:
  - irreproachable
  - faultless
  lexicon: BDAG
  rationale: The adjective means beyond reproach or blameless. 'Blameless' is idiomatic
    and preserves the moral-legal force without sounding overly technical.
- source_word: κοινωνὸν
  chosen: partner
  alternatives:
  - sharer
  - companion
  - participant
  lexicon: BDAG
  rationale: Here the word describes Esther's shared status in relation to the kingdom.
    'Partner' best conveys participation in royal standing without implying merely
    personal companionship.
- source_word: Βασιλείας
  chosen: the kingdom
  alternatives:
  - royalty
  - the kingship
  - the reign
  lexicon: LSJ
  rationale: The genitive likely refers to the royal realm or royal office in which
    Esther shares. 'The kingdom' is the most straightforward rendering from the Greek
    form and avoids over-interpreting it as 'queenly dignity.'
- source_word: σὺν παντὶ τῷ τούτων ἔθνει
  chosen: together with all their nation
  alternatives:
  - with all the nation belonging to them
  - along with all their people
  lexicon: LSJ
  rationale: ἔθνος can mean nation or people. 'Nation' preserves the collective-political
    sense, while 'their' reflects τούτων referring back to Mordecai and Esther.
- source_word: πολυπλόκοις μεθόδων παραλογισμοῖς
  chosen: by devious schemes of deceit
  alternatives:
  - by intricate contrivances of trickery
  - through many-twisted methods of false reasoning
  lexicon: LSJ
  rationale: The cluster is rhetorically dense and pejorative. 'Devious schemes of
    deceit' preserves the sense of cunning, complexity, and fraudulent intent in readable
    English. A more wooden rendering would be awkward and less clear.
- source_word: αἰτησάμενος
  chosen: having asked
  alternatives:
  - having petitioned
  - having requested
  lexicon: BDAG
  rationale: The participle refers to making a request, likely to the king. 'Having
    asked' is simple and accurate; the object of the request is supplied by the following
    phrase 'for the destruction.'
- source_word: εἰς ἀπώλειαν
  chosen: for the destruction
  alternatives:
  - for ruin
  - for annihilation
  - unto destruction
  lexicon: BDAG
  rationale: The phrase expresses intended outcome. 'For the destruction' is idiomatic
    and preserves the severity of the threat without overstating beyond the Greek.
