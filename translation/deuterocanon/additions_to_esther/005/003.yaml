translation:
  text: And they seek not only to mistreat those subject to us, but, unable to bear
    prosperity, they even attempt to scheme against their own benefactors;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unable to bear abundance' or 'unable to bear satiety'; the Greek κόρον
      can suggest overfull prosperity or surfeit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποτεταγμένους
  chosen: those subject to us
  alternatives:
  - those under us
  - our subjects
  - those subordinate to us
  lexicon: BDAG
  rationale: The participle from ὑποτάσσω denotes persons placed under authority.
    'Those subject to us' is clear modern English and preserves the relational sense
    without over-specifying political status as 'subjects.'
- source_word: ζητοῦσι κακοποιεῖν
  chosen: seek to mistreat
  alternatives:
  - seek to do evil to
  - seek to harm
  - seek to wrong
  lexicon: BDAG
  rationale: The construction means 'seek to do harm/evil to.' 'Mistreat' captures
    hostile action against persons in idiomatic English while remaining anchored to
    the verbal idea of doing evil.
- source_word: κόρον
  chosen: prosperity
  alternatives:
  - satiety
  - surfeit
  - fullness
  - abundance
  lexicon: LSJ
  rationale: κόρος can denote satiety to excess, hence overfull abundance leading
    to insolence. In this context, 'unable to bear prosperity' conveys that they cannot
    handle abundance or success, which fits the moral sense better than the more literal
    but opaque 'satiety.'
- source_word: οὐ δυνάμενοι φέρειν
  chosen: unable to bear
  alternatives:
  - not being able to endure
  - unable to tolerate
  lexicon: BDAG
  rationale: A straightforward rendering of the participial phrase; 'bear' is natural
    English and preserves the metaphor of enduring a condition.
- source_word: τοῖς ἑαυτῶν εὐεργέταις
  chosen: their own benefactors
  alternatives:
  - those who have benefited them
  - their beneficent patrons
  lexicon: BDAG
  rationale: εὐεργέτης means one who does good, a benefactor. 'Their own benefactors'
    preserves both the noun's social-moral force and the reflexive ἑαυτῶν.
- source_word: ἐπιχειροῦσι μηχανᾶσθαι
  chosen: attempt to scheme against
  alternatives:
  - undertake to plot against
  - try to contrive against
  - attempt treachery against
  lexicon: LSJ
  rationale: μηχανάομαι carries the sense of devising or plotting, often with hostile
    intent. Adding 'against' makes explicit the adversative force supplied by context
    and the dative object, while 'scheme' is readable modern English.
