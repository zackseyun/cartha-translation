translation:
  text: And after posting a copy of this letter in every place openly, to permit the
    Jews to make use of their own laws,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their own customs'; the Greek νόμιμα can refer to established laws or
      customary practices.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντίγραφον
  chosen: a copy
  alternatives:
  - the copy
  - a transcript
  lexicon: LSJ
  rationale: ἀντίγραφον denotes a copy or duplicate document. 'A copy' is natural
    English and fits the administrative context of a circulated royal letter.
- source_word: ἐπιστολῆς
  chosen: letter
  alternatives:
  - written decree
  - epistle
  lexicon: LSJ
  rationale: ἐπιστολή commonly means 'letter.' Although the context is an official
    edict, the Greek term itself is best represented by 'letter' rather than a more
    interpretive expansion.
- source_word: ἐκθέντες
  chosen: after posting
  alternatives:
  - having set forth
  - after publishing
  - after displaying
  lexicon: LSJ
  rationale: The participle from ἐκτίθημι here refers to publicly setting out the
    document. 'After posting' captures the public administrative action in idiomatic
    modern English while preserving the participial sense.
- source_word: ἐν παντὶ τόπῳ
  chosen: in every place
  alternatives:
  - in every location
  - everywhere
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the distributive force of the phrase.
    'Everywhere' is possible but slightly less concrete than the Greek.
- source_word: μετὰ παρρησίας
  chosen: openly
  alternatives:
  - with boldness
  - publicly
  lexicon: LSJ
  rationale: παρρησία often carries the sense of openness or frankness. In this context
    of public promulgation, 'openly' best conveys the manner without importing a psychological
    nuance of courage.
- source_word: ἐᾶν
  chosen: to permit
  alternatives:
  - to allow
  - to let
  lexicon: LSJ
  rationale: In this infinitival administrative context, ἐᾶν means to allow or permit.
    'To permit' suits the formal register of a royal decree.
- source_word: χρῆσθαι
  chosen: to make use of
  alternatives:
  - to observe
  - to practice
  - to use
  lexicon: LSJ
  rationale: χράομαι literally means 'to use' or 'make use of.' Here it refers to
    availing themselves of their ancestral legal customs. 'Make use of' stays close
    to the Greek while remaining intelligible.
- source_word: τοῖς ἑαυτῶν νομίμοις
  chosen: their own laws
  alternatives:
  - their own customs
  - their own lawful customs
  lexicon: LSJ
  rationale: νόμιμα can mean laws, customs, or established ordinances. In this Jewish
    communal setting it likely includes customary legal practices. 'Their own laws'
    is concise and suitably formal, while the broader sense 'customs' is preserved
    as an alternative.
