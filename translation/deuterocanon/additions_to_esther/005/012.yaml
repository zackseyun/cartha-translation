theological_decisions:
- issue: Meaning of πνεῦμα in a political-threat context
  chosen_reading: life/life-breath rather than an abstract 'spirit'
  alternative_readings:
  - spirit
  - breath
  rationale: The phrase 'deprive us of both our position and πνεῦμα' most naturally
    contrasts loss of status with loss of life. Rendering πνεῦμα as 'life' avoids
    importing later theological notions of the immaterial spirit where the context
    is mortal danger.
  doctrine_reference: Translation philosophy §1, §3
