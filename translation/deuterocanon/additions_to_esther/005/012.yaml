translation:
  text: But, unable to bear his arrogance, he made it his aim to deprive us of both
    our position and our very life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to deprive us of both our authority and our spirit/breath.' The Greek
      ἀρχή may mean 'rule,' 'office,' or 'authority,' and πνεῦμα may mean 'spirit,'
      'breath,' or 'life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐνέγκας
  chosen: unable to bear
  alternatives:
  - not enduring
  - not tolerating
  lexicon: LSJ
  rationale: Aorist participle of φέρω used idiomatically for enduring or bearing
    something. 'Unable to bear' gives natural English while preserving the causal
    force of the participle.
- source_word: τὴν ὑπερηφανίαν
  chosen: his arrogance
  alternatives:
  - his pride
  - his haughtiness
  lexicon: LSJ
  rationale: ὑπερηφανία denotes overbearing pride or arrogance. 'Arrogance' best captures
    the negative moral sense in contemporary English.
- source_word: ἐπετήδευσεν
  chosen: he made it his aim
  alternatives:
  - he attempted
  - he pursued
  - he contrived
  lexicon: LSJ
  rationale: The verb can mean to practice, pursue, or make it one's business to do
    something. 'Made it his aim' reflects deliberate intent without overstating success.
- source_word: τῆς ἀρχῆς
  chosen: our position
  alternatives:
  - our rule
  - our office
  - our authority
  lexicon: LSJ
  rationale: ἀρχή can denote rule, office, authority, or governing position. In this
    court setting, 'position' is broad enough to preserve the political sense without
    forcing a narrower institutional term.
- source_word: στερῆσαι
  chosen: to deprive
  alternatives:
  - to rob
  - to strip
  lexicon: LSJ
  rationale: στερέω commonly means to deprive or rob someone of something. 'Deprive'
    is the most straightforward and idiomatic here.
- source_word: ἡμᾶς
  chosen: us
  lexicon: LSJ
  rationale: Direct object referring to the speaker and associates; simple first-person
    plural is sufficient.
- source_word: καὶ τοῦ πνεύματος
  chosen: and our very life
  alternatives:
  - and spirit
  - and breath
  - and life
  lexicon: LSJ
  rationale: πνεῦμα can mean spirit, breath, or life-breath. In a deprivation formula
    following loss of position, the sense is likely life itself, i.e., life-breath.
    'Our very life' makes the idiom clear in English while preserving the climactic
    force.
