theological_decisions:
- issue: Description of God as morally opposed to evil
  chosen_reading: the God who always sees all things and hates evil
  alternative_readings:
  - the ever all-seeing God, the hater of evil
  - God who watches everything, hostile to wickedness
  rationale: The Greek piles up divine attributes in a compact genitival phrase. The
    chosen rendering preserves both omniscient oversight and moral opposition to evil
    without importing later doctrinal terminology.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
