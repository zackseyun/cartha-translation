theological_decisions:
- issue: Nature of the object Esther rejects
  chosen_reading: A general emblem/sign of royal exaltation worn on her head, rendered
    without over-identifying it as a crown.
  alternative_readings:
  - crown
  - diadem
  - headdress
  rationale: The Greek says 'the sign of my pride ... upon my head' rather than naming
    a specific item. The translation keeps the broader wording and lets the context
    imply royal adornment.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond the source text.'
- issue: Force of the impurity comparison
  chosen_reading: Retain the explicit menstrual imagery in the main text.
  alternative_readings:
  - unclean cloth
  - filthy rag
  rationale: The Greek explicitly names menstruation. The project philosophy favors
    readable modern English without flattening the text's gravity; therefore the vivid
    comparison should remain rather than be euphemized away.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; original-language primacy.'
