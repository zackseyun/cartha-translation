translation:
  text: You know my distress, that I loathe the sign of my pride, which is upon my
    head in the days of my appearance; I loathe it like a menstrual cloth, and I do
    not wear it in the days of my rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my distress' or 'my need' for 'my necessity.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the sign of my pride' likely refers to Esther's royal head ornament
      or emblem of status; the Greek does not specify the exact item.
    reason: cultural_note
  - marker: c
    text: Or 'in the days when I appear'—that is, when she appears publicly or in
      court.
    reason: lexical_alternative
  - marker: d
    text: Greek 'like a rag of menstruation,' an intentionally graphic expression
      of revulsion.
    reason: lexical_alternative
  - marker: e
    text: Or 'in the days of my rest/privacy,' contrasting with her public appearances.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάγκην
  chosen: necessity
  alternatives:
  - distress
  - compulsion
  - need
  lexicon: BDAG
  rationale: ἀνάγκη can denote necessity, distress, or compulsion. In Esther's prayer
    the sense is her pressing predicament/constraint before God. 'Necessity' preserves
    the formal force of the noun while remaining intelligible; 'distress' is possible
    but slightly more interpretive.
- source_word: βδελύσσομαι
  chosen: loathe
  alternatives:
  - abhor
  - detest
  lexicon: BDAG
  rationale: The verb expresses strong revulsion. 'Loathe' is forceful, natural English
    and fits both occurrences in the verse.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - mark
  - symbol
  - badge
  lexicon: BDAG
  rationale: σημεῖον is broadly 'sign' or 'mark.' Here it refers to the outward emblem
    of royal status. 'Sign' stays close to the Greek without over-specifying the object.
- source_word: ὑπερηφανίας
  chosen: pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: BDAG
  rationale: The noun can denote arrogance or haughtiness. In context Esther rejects
    the proud display associated with royal adornment. 'Pride' is concise and idiomatic,
    though the nuance is negative rather than commendatory.
- source_word: ὀπτασίας
  chosen: appearance
  alternatives:
  - public appearance
  - display
  - showing
  lexicon: LSJ
  rationale: Though ὀπτασία can mean vision/apparition in other contexts, here the
    phrase 'upon my head in the days of my ὀπτασία' points to occasions when she is
    seen publicly, i.e., her appearance before others. 'Appearance' best fits the
    immediate context.
- source_word: ῥάκος καταμηνίων
  chosen: menstrual rag
  alternatives:
  - filthy cloth of menstruation
  - menstrual cloth
  lexicon: LSJ
  rationale: ῥάκος is a rag or torn cloth; καταμήνια refers to monthly menstruation.
    The phrase is intentionally graphic, expressing ritual and visceral disgust. 'Menstrual
    rag' preserves that force without euphemistic softening.
- source_word: φορῶ
  chosen: wear
  alternatives:
  - put on
  - carry
  lexicon: BDAG
  rationale: In context of a head ornament or emblem, 'wear' is the natural English
    equivalent.
- source_word: ἡσυχίας
  chosen: quiet
  alternatives:
  - rest
  - privacy
  - seclusion
  lexicon: BDAG
  rationale: ἡσυχία denotes quietness, rest, or a state away from public activity.
    Here it contrasts with 'days of my appearance,' so 'quiet' preserves the contrast
    while leaving some breadth.
