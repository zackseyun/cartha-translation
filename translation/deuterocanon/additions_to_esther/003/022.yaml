translation:
  text: Remember, Lord; make yourself known in the time of our affliction, and encourage
    me, O King of the gods and ruler over every authority.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'show yourself' or 'be made known.' The Greek imperative γνώρισθητι
      can be rendered in more than one way in English.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'O King of the gods.' The phrase expresses God's supremacy over
      every claimed divine or ruling power.
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητι
  chosen: Remember
  alternatives:
  - Be mindful
  - Call to mind
  lexicon: BDAG
  rationale: Aorist middle imperative of μιμνῄσκομαι/μιμνήσκομαι used in prayer language,
    naturally rendered as a direct appeal, 'Remember.' This preserves the biblical
    idiom without paraphrase.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine, the default rendering is 'Lord.' In
    this prayer context it functions as a divine title, and 'Lord' is the most natural
    English equivalent.
- source_word: γνώρισθητι
  chosen: make yourself known
  alternatives:
  - be made known
  - show yourself
  lexicon: BDAG
  rationale: 'Aorist passive imperative of γνωρίζω, likely with middle/passive force
    in prayer: a request that God manifest himself. ''Make yourself known'' communicates
    the sense idiomatically in English while preserving the reflexive force better
    than the wooden ''be made known.'''
- source_word: ἐν καιρῷ θλίψεως ἡμῶν
  chosen: in the time of our affliction
  alternatives:
  - at the time of our distress
  - in our time of trouble
  lexicon: BDAG
  rationale: καιρός here is a decisive or fitting time; θλῖψις denotes affliction/distress.
    'In the time of our affliction' is formal enough to reflect the Greek while remaining
    readable.
- source_word: ἐμὲ θάρσυνον
  chosen: encourage me
  alternatives:
  - give me courage
  - strengthen my heart
  lexicon: BDAG
  rationale: Imperative of θαρσύνω, 'to embolden, encourage.' 'Encourage me' is concise
    and accurate; 'give me courage' is possible but slightly more interpretive.
- source_word: Βασιλεῦ τῶν θεῶν
  chosen: O King of the gods
  alternatives:
  - O King above the gods
  - O King of all divine beings
  lexicon: BDAG
  rationale: The Greek is literally 'King of the gods.' In this deuterocanonical prayer,
    the phrase expresses God's supremacy. The literal rendering should be preserved
    rather than softened, since the source text itself uses this superlative formulation.
- source_word: πάσης ἀρχῆς ἐπικρατῶν
  chosen: ruler over every authority
  alternatives:
  - having dominion over every ruler
  - prevailing over every power
  lexicon: BDAG
  rationale: ἀρχή can mean ruler, rule, authority, or power; ἐπικρατέω conveys exercising
    mastery over. 'Ruler over every authority' best captures the abstract and comprehensive
    force of the phrase in natural English.
