theological_decisions:
- issue: Rendering of exalted divine title τῶν θεῶν
  chosen_reading: O King of the gods
  alternative_readings:
  - O King above the gods
  - O King of heavenly powers
  rationale: The Greek wording is explicit and should not be flattened to avoid theological
    discomfort. In Jewish prayer language this expresses the Lord's supremacy over
    all so-called gods or heavenly powers, not polytheistic endorsement. A more interpretive
    rendering is preserved as an alternative only.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Voice and force of γνώρισθητι
  chosen_reading: make yourself known
  alternative_readings:
  - be made known
  - show yourself
  rationale: The passive form in prayer is best represented in English by a reflexive
    rendering that communicates divine self-manifestation. This preserves the theological
    sense of appeal for God's intervention without over-paraphrasing.
  doctrine_reference: Translation philosophy §§1, 6
