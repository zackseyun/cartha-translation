translation:
  text: to remove the decree from your mouth and to destroy your inheritance, and
    to shut the mouth of those who praise you, and to extinguish the glory of your
    house and your altar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to take away the decree from your mouth.' The phrase likely refers to
      abolishing or nullifying God's authoritative ordinance.
    reason: lexical_alternative
  - marker: b
    text: '''Your inheritance'' likely refers to the people or possession belonging
      to God; compare common biblical covenant language for Israel as God''s heritage.'
    reason: cross_reference
  - marker: c
    text: Or 'to silence the mouth of those who praise you.' The Greek idiom is kept
      more literally in the main text.
    reason: lexical_alternative
  - marker: d
    text: '''Your house'' probably refers to the temple, though the Greek says simply
      ''house.'''
    reason: cultural_note
lexical_decisions:
- source_word: ἐξᾶραι
  chosen: to remove
  alternatives:
  - to take away
  - to lift out
  lexicon: LSJ
  rationale: The infinitive continues the hostile purposes listed in the prayer. 'Remove'
    fits the sense of taking away or abolishing what proceeds from God's mouth without
    sounding overly physical.
- source_word: ὁρισμὸν
  chosen: the decree
  alternatives:
  - the ordinance
  - the fixed decision
  lexicon: LSJ
  rationale: ὁρισμός commonly denotes a fixed determination or decree. 'Decree' is
    natural English and suits the context of an authoritative utterance from God's
    mouth.
- source_word: στόματός σου
  chosen: your mouth
  lexicon: LSJ
  rationale: Retained literally because the Greek uses 'mouth' twice in close parallel.
    This preserves the imagery of authoritative speech and silenced praise.
- source_word: ἀφανίσαι
  chosen: to destroy
  alternatives:
  - to wipe out
  - to make disappear
  lexicon: LSJ
  rationale: A strong verb of causing to vanish or perish. 'Destroy' best matches
    the severity of the threat against God's inheritance.
- source_word: κληρονομίαν σου
  chosen: your inheritance
  alternatives:
  - your heritage
  - your possession
  lexicon: LSJ
  rationale: In biblical usage this can denote the people or possession belonging
    to God. 'Inheritance' preserves the covenantal resonance without over-specifying
    the referent.
- source_word: ἐμφράξαι
  chosen: to stop
  alternatives:
  - to shut
  - to silence
  lexicon: LSJ
  rationale: Literally 'to block up' or 'stop.' Because στόμα follows, 'stop the mouth'
    preserves the concrete idiom; 'silence' would smooth it but lose the parallelism.
- source_word: αἰνούντων σοι
  chosen: those praising you
  alternatives:
  - those who praise you
  - your praisers
  lexicon: LSJ
  rationale: A present participle describing worshipers. 'Those praising you' keeps
    the participial force and links naturally with 'mouth.'
- source_word: σβέσαι
  chosen: to extinguish
  alternatives:
  - to quench
  - to blot out
  lexicon: LSJ
  rationale: The verb is used for putting out fire or light. 'Extinguish' works metaphorically
    for glory while retaining the vivid image.
- source_word: δόξαν οἴκου σου
  chosen: the glory of your house
  alternatives:
  - the honor of your house
  lexicon: LSJ
  rationale: δόξα here likely refers to the splendor or honor associated with God's
    house, probably the temple. 'Glory' preserves biblical diction and theological
    weight.
- source_word: θυσιαστήριόν σου
  chosen: your altar
  lexicon: LSJ
  rationale: Standard rendering for altar. The final possessive keeps the direct address
    to God.
