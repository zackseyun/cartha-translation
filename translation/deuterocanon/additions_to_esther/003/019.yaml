theological_decisions:
- issue: Referent of 'your inheritance'
  chosen_reading: left as 'your inheritance' without specifying Israel explicitly
  alternative_readings:
  - your people
  - your heritage
  rationale: The Greek itself does not name the referent, though in context it points
    to the people belonging to God. Leaving the covenant term intact preserves the
    text's theological resonance without importing an interpretive expansion into
    the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
- issue: Temple imagery in 'your house and your altar'
  chosen_reading: rendered literally
  alternative_readings:
  - your temple and your altar
  rationale: While 'house' likely refers to the temple, the Greek says 'house.' The
    literal rendering preserves the source wording and lets the temple reference emerge
    from context.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition.'
