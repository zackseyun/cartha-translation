theological_decisions:
- issue: Covenantal language in εἰς κληρονομίαν αἰώνιον
  chosen_reading: Rendered as 'as an everlasting inheritance'
  alternative_readings:
  - for an eternal possession
  - as a perpetual heritage
  rationale: The phrase evokes covenant-election language without specifying whether
    Israel or the fathers are the inheritance/possession in a later theological sense.
    The translation preserves the covenantal register while avoiding doctrinal over-definition.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
