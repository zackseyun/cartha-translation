translation:
  text: I had heard from my birth, in the tribe of my ancestral family, that you,
    Lord, took Israel from among all the nations, and our fathers from among all their
    ancestors, as an everlasting inheritance, and you did for them what you spoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you fulfilled for them what you said.' The Greek reads more literally,
      'you did for them what you spoke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ ἤκουον
  chosen: I had heard
  alternatives:
  - I heard
  - I was hearing
  lexicon: BDAG
  rationale: Imperfect in a recollective context is best rendered as a past state
    of having heard/tradition received, not ongoing auditory action.
- source_word: ἐκ γενετῆς μου
  chosen: from my birth
  alternatives:
  - since my birth
  - from my origin
  lexicon: LSJ
  rationale: γενετή here refers to birth/origin; 'from my birth' is natural English
    and preserves the temporal sense.
- source_word: ἐν φυλῇ πατριάς μου
  chosen: in the tribe of my ancestral family
  alternatives:
  - in the tribe of my fathers
  - in my family tribe
  - among the tribe of my lineage
  lexicon: LSJ
  rationale: φυλή is 'tribe'; πατριά denotes clan/family lineage. 'Ancestral family'
    preserves the kinship sense without archaic phrasing.
- source_word: σύ, Κύριε
  chosen: you, Lord
  alternatives:
  - you, O Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default 'Lord.' The vocative force
    is preserved without requiring archaic 'O'.
- source_word: ἔλαβες
  chosen: took
  alternatives:
  - chose
  - received
  lexicon: BDAG
  rationale: λαμβάνω here has the sense of taking/selecting out from among others.
    'Took' stays close to the Greek while fitting the following prepositional phrase.
- source_word: ἐκ πάντων τῶν ἐθνῶν
  chosen: from among all the nations
  alternatives:
  - out of all the nations
  - from all the Gentiles
  lexicon: BDAG
  rationale: ἐκ with πάντων marks selection from a larger set. 'Nations' is the standard
    rendering for ἐθνῶν in this context; 'Gentiles' would over-interpret.
- source_word: τοὺς πατέρας ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: BDAG
  rationale: The Greek explicitly says 'fathers.' Per gender-accurate policy, the
    masculine kinship term is retained rather than neutralized.
- source_word: ἐκ πάντων τῶν προγόνων αὐτῶν
  chosen: from among all their ancestors
  alternatives:
  - out of all those before them
  - from all their forefathers
  lexicon: LSJ
  rationale: πρόγονοι means forebears/ancestors. 'Their' most naturally refers back
    to the fathers, preserving the Greek syntax.
- source_word: εἰς κληρονομίαν αἰώνιον
  chosen: as an everlasting inheritance
  alternatives:
  - for an eternal possession
  - as an inheritance forever
  lexicon: BDAG
  rationale: κληρονομία can denote inheritance/possession. 'As an everlasting inheritance'
    preserves both covenantal and enduring senses in idiomatic English.
- source_word: ἐποίησας αὐτοῖς ὅσα ἐλάλησας
  chosen: you did for them what you spoke
  alternatives:
  - you fulfilled for them what you said
  - you did for them all that you promised
  lexicon: BDAG
  rationale: The Greek literally says 'did ... what you spoke.' A more idiomatic 'fulfilled
    ... promised' is possible, but the chosen rendering stays closer to the wording
    while remaining understandable.
