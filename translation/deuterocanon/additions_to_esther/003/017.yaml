theological_decisions:
- issue: Rendering of δίκαιος in address to God
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: The verse is a confession acknowledging God's rightness over against
    the people's idolatry. 'Righteous' preserves that theological register without
    excluding judicial overtones. The alternative 'just' is preserved in a footnote
    because both are contextually plausible.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη family terms may require context-sensitive
    rendering; preserve alternatives in footnotes where significant.'
- issue: Rendering of κύριος
