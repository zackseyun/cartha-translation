translation:
  text: because we glorified their gods. You are righteous, Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we glorified their gods.'
    reason: lexical_alternative
  - marker: b
    text: Or 'You are just, Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνθʼ ὧν
  chosen: because
  alternatives:
  - for which reason
  - because of which things
  - therefore because
  lexicon: LSJ
  rationale: In this confessional context, ἀνθʼ ὧν introduces the ground for the preceding
    judgment or plea. 'Because' gives clear causal force in natural English without
    over-literal awkwardness.
- source_word: ἐδοξάσαμεν
  chosen: we gave glory to
  alternatives:
  - we glorified
  - we honored
  lexicon: BDAG
  rationale: From δοξάζω, the sense is to ascribe honor/glory. 'Gave glory to' preserves
    the verbal idea and the object relation more transparently than the more ecclesiastical
    'glorified.'
- source_word: τοὺς θεοὺς αὐτῶν
  chosen: their gods
  alternatives:
  - the gods of them
  - their deities
  lexicon: LSJ
  rationale: Straightforward plural with possessive pronoun. 'Their gods' is the most
    natural and direct rendering, preserving the polemical contrast with the Lord.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: δίκαιος can mean either 'righteous' or 'just.' Here it predicates God's
    moral rightness in response to Israel's sin and suffering. 'Righteous' better
    preserves the confessional-theological tone, while 'just' remains a viable alternative
    preserved in a footnote.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per project doctrine, the default rendering is 'Lord.'
    This also fits Septuagintal address to Israel's God.
