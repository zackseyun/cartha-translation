translation:
  text: because you made heaven and earth and everything marvelous under heaven,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every marvel under heaven' or 'everything marvelous under heaven.' The
      Greek participle θαυμαζόμενον denotes what is marvelous or wondered at.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: In this prayer context, ὅτι introduces the ground or reason for what
    precedes, so 'because' best conveys the causal force in natural English.
- source_word: ἐποίησας
  chosen: you made
  alternatives:
  - you created
  - you did
  lexicon: BDAG
  rationale: ποιέω commonly means 'make/do'; here with 'heaven and earth' it refers
    to divine making/creating. 'You made' stays close to the Greek while remaining
    idiomatic. 'Created' is possible but slightly more interpretive than the verb
    itself requires.
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν
  chosen: heaven and earth
  alternatives:
  - the heaven and the earth
  - sky and land
  lexicon: BDAG
  rationale: This is the standard merism for the totality of creation. 'Heaven and
    earth' is the established and accurate English equivalent; omitting the articles
    is idiomatic in English.
- source_word: πᾶν
  chosen: every
  alternatives:
  - all
  - everything
  lexicon: BDAG
  rationale: With the following singular participial expression, 'every' preserves
    the distributive sense more naturally than 'all' in English.
- source_word: θαυμαζόμενον
  chosen: wondrous thing
  alternatives:
  - marvel
  - thing that is marveled at
  - wonder
  lexicon: LSJ
  rationale: The participle literally denotes something wondered at or marvelous.
    Because English does not naturally say 'every thing being marveled at,' 'every
    wondrous thing' captures the sense with good readability while staying anchored
    to the Greek.
- source_word: ἐν τῇ ὑπʼ οὐρανόν
  chosen: under heaven
  alternatives:
  - beneath heaven
  - in what is under heaven
  lexicon: LSJ
  rationale: This idiom refers to the created realm beneath the sky/heaven. 'Under
    heaven' is both natural and faithful to the Greek expression.
