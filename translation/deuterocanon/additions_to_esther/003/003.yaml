theological_decisions:
- issue: Scope of creation language
  chosen_reading: The verse is rendered as a comprehensive statement about God's making
    of the cosmos and all marvelous things within the world order.
  alternative_readings:
  - Translate θαυμαζόμενον more concretely as 'all creation under heaven'
  - Translate ἐποίησας as 'created' to foreground creatio language
  rationale: The Greek explicitly names 'heaven and earth' and then adds 'every wondrous
    thing under heaven.' The translation preserves the broad creational scope without
    importing a more technical doctrinal formulation than the wording itself states.
  doctrine_reference: Translation philosophy §§1, 3, 6
