theological_decisions:
- issue: Whether κοίτην should be made explicit as sexual intercourse or marriage
    bed
  chosen_reading: the bed
  alternative_readings:
  - sexual union
  - the marriage bed
  rationale: The Greek metaphor is sufficiently clear but not maximally explicit.
    Rendering it as 'the bed' preserves the source imagery and avoids adding interpretive
    specificity not demanded by the text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; never paraphrase
    beyond what the source text warrants.'
- issue: Whether ἀνόμων should be rendered more interpretively as 'wicked'
  chosen_reading: lawless
  alternative_readings:
  - wicked
  rationale: The source term is specifically tied to lawlessness, not generic evil.
    Preserving that nuance better reflects original-language primacy and lexical transparency.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms or documented exception.'
