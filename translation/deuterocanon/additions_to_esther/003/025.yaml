translation:
  text: And you know that I hated the glory of the lawless, and I abhor the bed of
    the uncircumcised and of every foreigner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the marriage bed' or 'sexual union'; the Greek 'bed' can stand metonymically
      for marital or sexual relations.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμίσησα
  chosen: I hated
  alternatives:
  - I have hated
  - I detested
  lexicon: BDAG
  rationale: Aorist active indicative, straightforward past reference in the prayer
    context. 'Hated' preserves the strong force without softening to a weaker term.
- source_word: δόξαν
  chosen: the glory
  alternatives:
  - honor
  - splendor
  - prestige
  lexicon: BDAG
  rationale: δόξα here most naturally denotes status/splendor rather than mere reputation.
    'Glory' preserves the elevated register and the likely sense of royal or worldly
    magnificence.
- source_word: ἀνόμων
  chosen: of the lawless
  alternatives:
  - of the wicked
  - of outlaws
  lexicon: BDAG
  rationale: ἀνόμων literally means those without law / lawless ones. 'Lawless' keeps
    the lexical connection to νόμος and avoids importing a narrower moral category
    than the Greek itself states.
- source_word: βδελύσσομαι
  chosen: I abhor
  alternatives:
  - I detest
  - I loathe
  lexicon: BDAG
  rationale: The verb expresses strong revulsion. 'Abhor' is forceful and suitably
    solemn in this prayer setting.
- source_word: κοίτην
  chosen: the bed
  alternatives:
  - the marriage bed
  - sexual union
  - lying with
  lexicon: BDAG
  rationale: κοίτη can denote bed, marriage bed, or sexual intercourse. 'Bed' preserves
    the Greek image while allowing the likely marital/sexual implication to remain
    implicit rather than over-specifying.
- source_word: ἀπεριτμήτων
  chosen: of the uncircumcised
  alternatives:
  - of uncircumcised men
  lexicon: BDAG
  rationale: The genitive plural adjective is rendered literally. Adding 'men' would
    interpret beyond the text; the phrase likely refers to Gentiles marked by uncircumcision,
    but the Greek leaves the noun implicit.
- source_word: παντὸς ἀλλοτρίου
  chosen: of every foreigner
  alternatives:
  - of every outsider
  - of everything foreign
  - of every alien
  lexicon: BDAG
  rationale: ἀλλότριος can mean belonging to another, foreign, or alien. In this context,
    paired with 'uncircumcised,' it most naturally refers to a foreign person rather
    than an abstract foreign thing. 'Foreigner' is clear modern English.
