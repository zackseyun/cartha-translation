theological_decisions:
- issue: Nature of Esther's statement about submission to the king
  chosen_reading: A hypothetical statement of willingness to perform an act of extreme
    homage for Israel's rescue
  alternative_readings:
  - A literal report that she had done so
  - A broader statement about loving or honoring him
  rationale: The wording is best taken as expressing what she would have been capable
    of doing for Israel's deliverance, not necessarily narrating an actual act. The
    concrete phrase about the soles of his feet favors an image of extreme submission
    rather than generalized affection.
