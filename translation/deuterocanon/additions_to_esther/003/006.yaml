translation:
  text: for I could have kissed the soles of his feet for the salvation of Israel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for Israel's deliverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠδυνάμην
  chosen: I could have
  alternatives:
  - I was able to
  - I had the power to
  lexicon: BDAG
  rationale: The imperfect/middle form of δύναμαι here expresses capability in a past
    hypothetical or concessive sense within Esther's prayer. 'I could have' gives
    natural English and preserves the sense of ability without overstating actual
    action.
- source_word: φιλεῖν
  chosen: kissed
  alternatives:
  - loved
  - shown affection to
  lexicon: BDAG
  rationale: Although φιλέω can mean 'love' or 'have affection for,' with a bodily
    object ('the soles of his feet') it most naturally denotes the physical act of
    kissing as a gesture of submission or homage.
- source_word: πέλματα ποδῶν
  chosen: the soles of his feet
  alternatives:
  - the feet of his feet
  - his footsoles
  lexicon: LSJ
  rationale: πέλμα refers to the sole or bottom of the foot. Rendering the phrase
    idiomatically as 'the soles of his feet' preserves the vivid bodily imagery and
    the extremity of the act described.
- source_word: πρὸς σωτηρίαν Ἰσραήλ
  chosen: for the salvation of Israel
  alternatives:
  - for Israel's deliverance
  - toward the salvation of Israel
  lexicon: BDAG
  rationale: σωτηρία can be rendered 'salvation' or 'deliverance.' 'Salvation' keeps
    the lexical connection while remaining natural; in context it refers to Israel's
    rescue, not necessarily a developed doctrinal sense. 'For' captures πρὸς as indicating
    purpose or end.
