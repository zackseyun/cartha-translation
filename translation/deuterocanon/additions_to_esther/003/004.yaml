translation:
  text: And you are Lord of all, and there is no one who will oppose you, O Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'there is none who will set himself against you, Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a divine title.
    In this prayer context it addresses God directly, so 'Lord' preserves both authority
    and reverential force better than 'Master'.
- source_word: πάντων
  chosen: of all
  alternatives:
  - over all
  - of everything
  lexicon: LSJ
  rationale: The genitive plural after εἶ naturally yields 'Lord of all.' 'Over all'
    is possible in English sense, but 'of all' stays closer to the Greek construction
    while remaining idiomatic.
- source_word: οὐκ ἔστιν ὃς
  chosen: there is no one who
  alternatives:
  - no one can
  - there is none who
  lexicon: BDAG
  rationale: This idiom introduces a general negation of any possible opponent. 'There
    is no one who' is clear modern English and preserves the relative-clause structure
    better than the more interpretive 'no one can'.
- source_word: ἀντιτάξεται
  chosen: will oppose
  alternatives:
  - will set himself against
  - will resist
  lexicon: BDAG
  rationale: The future middle conveys standing in opposition. 'Will oppose' is concise
    and natural; 'will set himself against' is more wooden, and 'resist' is possible
    but slightly broader.
- source_word: σοι
  chosen: you
  alternatives:
  - against you
  lexicon: BDAG
  rationale: Rendered as the direct object/complement required by English after 'oppose.'
    The adversative sense is already carried by ἀντιτάξεται, so adding 'against' in
    the main gloss would overtranslate the pronoun itself.
- source_word: τῷ κυρίῳ
  chosen: O Lord
  alternatives:
  - to the Lord
  - the Lord
  lexicon: BDAG
  rationale: Although formally dative with article, in this prayer context it functions
    vocatively. 'O Lord' best reflects direct address in English and avoids the misleading
    sense 'oppose you to the Lord.'
