theological_decisions:
- issue: Rendering repeated κύριος in direct address to God
  chosen_reading: Lord ... O Lord
  alternative_readings:
  - Lord ... the Lord
  rationale: The verse uses κύριος twice, the second with article in a form that can
    function as direct address in Koine/LXX prayer style. Rendering the second occurrence
    vocatively preserves the devotional force and coherent sense of the line.
