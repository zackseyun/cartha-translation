translation:
  text: But I did this so that I might not place the glory of man above the glory
    of God; and I will bow down to no one except you, my lord, and I will not do these
    things in pride.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will not worship anyone except you, my Lord.' The Greek verb can
      refer either to bowing down in homage or to worship, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησα
  chosen: I did
  alternatives:
  - I have done
  - I acted
  lexicon: BDAG
  rationale: Aorist active first singular of ποιέω, rendered simply as a past action.
    'Did' is natural English and keeps the directness of the Greek.
- source_word: ἵνα μὴ θῶ
  chosen: so that I might not place
  alternatives:
  - so that I may not set
  - so that I might not put
  lexicon: BDAG
  rationale: θῶ from τίθημι literally means 'place/set.' 'Place' works idiomatically
    with 'glory' in English while preserving the metaphor of assigning higher status.
- source_word: δόξαν ἀνθρώπου
  chosen: the glory of a man
  alternatives:
  - human glory
  - the honor of a man
  lexicon: BDAG
  rationale: δόξα can mean glory, honor, or reputation. 'Glory' is retained for consistency
    with the following 'glory of God' and to preserve the theological contrast. ἀνθρώπου
    is singular, so 'of a man' is kept rather than generalized to 'human.'
- source_word: ὑπεράνω
  chosen: above
  alternatives:
  - over
  - higher than
  lexicon: BDAG
  rationale: 'The comparative sense is straightforward: one glory being elevated over
    another.'
- source_word: οὐ προσκυνήσω
  chosen: I will bow down
  alternatives:
  - I will not worship
  - I will not prostrate myself
  lexicon: BDAG
  rationale: προσκυνέω can denote bowing down or worship depending on context. Here
    Mordecai's refusal concerns an act of obeisance to a human, so 'bow down' preserves
    the physical/social act without overstating it as cultic worship.
- source_word: οὐδένα
  chosen: no one
  alternatives:
  - no person
  - nobody
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the accusative singular indefinite
    negative.
- source_word: πλὴν σοῦ
  chosen: except you
  alternatives:
  - except for you
  - other than you
  lexicon: BDAG
  rationale: πλήν marks exception. 'Except you' is concise and natural.
- source_word: τοῦ κυρίου μου
  chosen: my Lord
  alternatives:
  - my master
  lexicon: BDAG
  rationale: κύριος defaults to 'Lord' per doctrine. In this prayer context addressed
    to God, 'my Lord' is theologically and contextually fitting.
- source_word: οὐ ποιήσω αὐτὰ
  chosen: I will not do these things
  alternatives:
  - I will not do this
  - I will not act thus
  lexicon: BDAG
  rationale: The plural αὐτά is best represented explicitly as 'these things,' referring
    to the acts under discussion. This avoids flattening the plural into a singular
    abstraction.
- source_word: ἐν ὑπερηφανίᾳ
  chosen: in pride
  alternatives:
  - out of arrogance
  - with haughtiness
  lexicon: BDAG
  rationale: ὑπερηφανία denotes pride/arrogance. 'In pride' is close to the Greek
    construction and readable modern English.
