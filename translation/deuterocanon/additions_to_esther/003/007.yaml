theological_decisions:
- issue: Meaning of προσκυνέω in relation to refusal before a human authority
  chosen_reading: Rendered as 'bow down' rather than 'worship'
  alternative_readings:
  - worship
  - prostrate myself
  rationale: The verse grounds Mordecai's refusal in not exalting human glory above
    God's glory. The immediate act is obeisance before a human figure, so 'bow down'
    preserves the concrete action while allowing the theological motive to remain
    explicit in the surrounding clause.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it; translate from source plain sense'
- issue: Force of ἀνθρώπου
  chosen_reading: Singular 'a man' retained
  alternative_readings:
  - human
  - manankind's
  rationale: The Greek is singular and contrasts one human's glory with God's glory.
    Retaining 'a man' preserves the source form and avoids unnecessary abstraction.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral'
