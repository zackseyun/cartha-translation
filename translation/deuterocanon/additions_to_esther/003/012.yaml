translation:
  text: And taking off her garments of glory, she put on garments of distress and
    mourning; and instead of splendid perfumes, she filled her head with ashes and
    dung, and she humbled her body greatly, and every place of her joyful adornment
    she filled with the twisting of her hair.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instead of luxurious perfumes.' The Greek literally says 'proud perfumes,'
      likely referring to costly or ostentatious fragrances.
    reason: lexical_alternative
  - marker: b
    text: Or 'she covered her head with ashes and dung.' The Greek more literally
      says 'she filled her head.'
    reason: lexical_alternative
  - marker: c
    text: The final phrase is difficult. It may mean that the places once beautified
      for rejoicing were now marked by her hair left twisted or disheveled in mourning.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀφελομένη
  chosen: taking off
  alternatives:
  - removing
  - laying aside
  lexicon: LSJ
  rationale: Aorist middle participle from ἀφαιρέω, here describing Esther's deliberate
    removal of royal clothing before the main action. 'Taking off' is natural modern
    English and preserves the concrete action.
- source_word: τὰ ἱμάτια τῆς δόξης αὐτῆς
  chosen: her garments of glory
  alternatives:
  - her glorious garments
  - her splendid robes
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the genitival force and the contrast
    with mourning clothes. 'Glory' here denotes splendor/status rather than abstract
    honor alone.
- source_word: ἱμάτια στενοχωρίας καὶ πένθους
  chosen: garments of distress and mourning
  alternatives:
  - clothes of anguish and mourning
  - garments of affliction and grief
  lexicon: LSJ
  rationale: στενοχωρία can denote distress, anguish, or affliction. 'Distress' is
    readable and pairs well with 'mourning' while preserving the emotional and situational
    weight.
- source_word: ἀντὶ τῶν ὑπερηφάνων ἡδυσμάτων
  chosen: instead of proud perfumes
  alternatives:
  - instead of luxurious perfumes
  - instead of splendid sweet ointments
  lexicon: LSJ
  rationale: ἡδύσματα refers to sweet spices/perfumes/ointments. ὑπερήφανος literally
    means proud/haughty, but in this material context it likely characterizes costly,
    ostentatious cosmetics. 'Proud perfumes' keeps the Greek's vividness without over-paraphrasing;
    the more interpretive 'luxurious perfumes' is preserved as an alternative.
- source_word: σποδοῦ καὶ κοπριῶν
  chosen: ashes and dung
  alternatives:
  - ashes and refuse
  - ashes and filth
  lexicon: LSJ
  rationale: σποδός is ashes; κόπρια are dung/manure. The phrase is intentionally
    stark, marking radical self-abasement. 'Dung' is the most direct lexical equivalent
    and should not be softened without cause.
- source_word: ἔπλησεν τὴν κεφαλήν
  chosen: she filled her head
  alternatives:
  - she covered her head
  lexicon: LSJ
  rationale: The verb is literally 'filled.' In English this sounds unusual but reflects
    the force of the Greek and the intensity of the mourning act. 'Covered' is smoother
    but less exact.
- source_word: τὸ σῶμα ἐταπείνωσεν σφόδρα
  chosen: she humbled her body greatly
  alternatives:
  - she afflicted her body severely
  - she brought her body very low
  lexicon: LSJ
  rationale: ταπεινόω means humble, abase, bring low. Because the object is 'body,'
    the phrase suggests bodily self-abasement associated with mourning/fasting. 'Humbled
    her body greatly' preserves the lexical link without importing a specific ritual
    not stated.
- source_word: πάντα τόπον κόσμου ἀγαλλιάματος αὐτῆς
  chosen: every place of her joyful adornment
  alternatives:
  - every part adorned for her rejoicing
  - every place of her festive beauty
  lexicon: LSJ
  rationale: κόσμος here means adornment/ornament, not 'world.' ἀγαλλίαμα conveys
    exultation/joy. The phrase refers to the parts of her person formerly beautified
    for celebration. 'Joyful adornment' is concise and faithful.
- source_word: στρεπτῶν τριχῶν αὐτῆς
  chosen: the twisting of her hair
  alternatives:
  - her tangled hair
  - the tearing of her hair
  lexicon: LSJ
  rationale: The transmitted phrase is difficult, but στρεπτός naturally relates to
    twisting/plaiting. In context of mourning, it likely refers to disordered or twisted
    hair replacing normal adornment. 'The twisting of her hair' stays close to the
    Greek and avoids overconfidently choosing 'tearing,' which the wording does not
    clearly support.
