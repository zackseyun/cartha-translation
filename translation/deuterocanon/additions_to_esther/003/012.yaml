theological_decisions:
- issue: Intensity and physicality of Esther's mourning practices
  chosen_reading: Retain the stark bodily imagery ('ashes and dung,' 'humbled her
    body') without softening it into generalized sorrow.
  alternative_readings:
  - Use less graphic language such as 'ashes and filth' or 'afflicted herself'
  rationale: The verse emphasizes radical self-abasement in lament. Softening the
    imagery would reduce the force of the Greek and import modern sensibilities not
    present in the text.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Interpretation of difficult phrase στρεπτῶν τριχῶν αὐτῆς
  chosen_reading: Translate conservatively as 'the twisting of her hair' and preserve
    a smoother interpretive alternative in a footnote.
  alternative_readings:
  - her tangled hair
  - the disheveling of her hair
  rationale: The phrase is lexically awkward in English and somewhat uncertain in
    nuance. A conservative rendering in the main text best preserves auditability,
    while a footnote can note the likely sense of disordered mourning appearance.
  doctrine_reference: Translation philosophy §3
