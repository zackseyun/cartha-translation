translation:
  text: And now we have sinned before you, and you have handed us over into the hands
    of our enemies.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ νῦν
  chosen: And now
  alternatives:
  - and so now
  - but now
  lexicon: BDAG
  rationale: A straightforward connective plus temporal adverb. 'And now' preserves
    the prayer's flow without adding contrast not explicit in the Greek.
- source_word: ἡμάρτομεν
  chosen: we have sinned
  alternatives:
  - we sinned
  lexicon: BDAG
  rationale: Aorist active indicative of ἁμαρτάνω. In English prayer language, the
    present-perfect 'have sinned' naturally conveys a completed act with present consequence,
    fitting the confession context.
- source_word: ἐνώπιόν σου
  chosen: before you
  alternatives:
  - in your sight
  - in your presence
  lexicon: BDAG
  rationale: The phrase denotes being in God's sight/presence. 'Before you' is idiomatic,
    concise, and preserves the relational and judicial sense.
- source_word: παρέδωκας
  chosen: you have handed us over
  alternatives:
  - you delivered us over
  - you gave us over
  lexicon: BDAG
  rationale: The verb παραδίδωμι here expresses God giving his people into enemy power
    as judgment. 'Handed us over' is clear modern English and retains the force of
    transfer into another's control.
- source_word: εἰς χεῖρας
  chosen: into the hands of
  alternatives:
  - to the power of
  lexicon: BDAG
  rationale: A common idiom for being delivered into another's control. The literal
    'into the hands of' is natural in English and preserves the biblical idiom.
- source_word: τῶν ἐχθρῶν ἡμῶν
  chosen: our enemies
  alternatives:
  - those who hate us
  lexicon: BDAG
  rationale: Standard rendering of ἐχθροί. 'Our enemies' is direct and contextually
    appropriate.
