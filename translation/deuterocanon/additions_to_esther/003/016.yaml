theological_decisions:
- issue: Divine agency in Israel's judgment
  chosen_reading: The verse is rendered to state directly that God handed the people
    over to their enemies as a consequence of their sin.
  alternative_readings:
  - A softer rendering that obscures direct divine agency
  rationale: The Greek explicitly addresses God in the second person and uses παρέδωκας
    with God as subject. The translation should preserve the text's theological claim
    of divine judgment without dilution.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
