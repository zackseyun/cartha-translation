translation:
  text: And he said, “Lord, Lord, King of all dominion, because everything is in your
    power, and there is no one who can oppose you when you desire to save Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “King of all dominions.” The Greek phrase can denote all forms of might
      or rule, not only political kingdoms.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος used as a divine title in prayer. Per doctrine, κύριος
    is rendered 'Lord' rather than transliterated or expanded.
- source_word: βασιλεῦ πάντων κρατῶν
  chosen: King over all powers
  alternatives:
  - King of all dominions
  - King of all mights
  - King over every ruler
  lexicon: LSJ
  rationale: βασιλεύς is straightforwardly 'king.' κρατῶν, from κράτος, denotes powers/mights/dominions.
    'Over all powers' preserves the genitive sense and the broad scope without over-specifying
    political kingdoms.
- source_word: ἐν ἐξουσίᾳ σου
  chosen: in your authority
  alternatives:
  - in your power
  - under your authority
  lexicon: BDAG
  rationale: ἐξουσία can mean authority or power. 'Authority' best fits the royal
    and sovereign context and avoids flattening the nuance into mere ability.
- source_word: τὸ πᾶν
  chosen: everything
  alternatives:
  - the whole
  - all things
  lexicon: LSJ
  rationale: Idiomatic English requires a distributive rendering here. 'Everything'
    naturally conveys the totality under God's authority.
- source_word: ὁ ἀντιδρῶσων
  chosen: one who can oppose
  alternatives:
  - one who will resist
  - one who can withstand
  lexicon: LSJ
  rationale: 'The future participial form functions substantivally: ''the one who
    will/can oppose.'' In context of divine sovereignty, English idiom is best served
    by ''can oppose,'' expressing effective resistance rather than mere intention.'
- source_word: ἐν τῷ θέλειν σε
  chosen: when you desire
  alternatives:
  - when you will
  - in your willing
  lexicon: BDAG
  rationale: Articular infinitive with ἐν is temporal/circumstantial here. 'When you
    desire' is natural English and preserves the sense of divine volition.
- source_word: σῶσαι τὸν Ἰσραήλ
  chosen: to save Israel
  alternatives:
  - to deliver Israel
  lexicon: BDAG
  rationale: σῴζω commonly means save/deliver. 'Save' is the more direct rendering
    and suits the prayer's theological register.
