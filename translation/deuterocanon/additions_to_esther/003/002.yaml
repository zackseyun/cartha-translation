theological_decisions:
- issue: Rendering repeated divine address Κύριε, κύριε
  chosen_reading: Lord, Lord
  alternative_readings:
  - O Lord, Lord
  - Lord, my Lord
  rationale: The repetition is retained because it is present in the Greek and conveys
    urgency and reverence in prayer. No added possessive or interpretive expansion
    is warranted.
  doctrine_reference: 'DOCTRINE.md: κύριος default rendering ''Lord''; preserve source-text
    force without paraphrase.'
- issue: Scope of κρατῶν
  chosen_reading: all powers
  alternative_readings:
  - all dominions
  - all realms
  rationale: The phrase likely expresses God's sovereignty comprehensively, not merely
    over earthly kingdoms. 'Powers' preserves that breadth while remaining readable.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; original-language primacy
    over translation tradition.'
