translation:
  text: Put fitting words in my mouth before the lion, and turn his heart to hatred
    against the one who is warring against us, to his destruction and that of those
    who are of one mind with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Give a well-ordered word in my mouth.' The Greek λόγον εὔρυθμον can
      emphasize speech that is apt, well-framed, or suitably composed.
    reason: lexical_alternative
  - marker: b
    text: '''The lion'' is a metaphor for the king in Esther''s prayer; the Greek
      preserves the image rather than naming him directly.'
    reason: cultural_note
  - marker: c
    text: Or 'to his end' or 'to his ruin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὸς
  chosen: Put
  alternatives:
  - Give
  lexicon: BDAG
  rationale: Imperative of δίδωμι. 'Put' is more idiomatic in English with 'in my
    mouth,' while preserving the sense of granting/supplying speech.
- source_word: λόγον εὔρυθμον
  chosen: fitting words
  alternatives:
  - well-ordered speech
  - graceful speech
  - apt word
  lexicon: LSJ
  rationale: The phrase asks for speech that is suitably composed for the moment.
    'Fitting words' is natural modern English and preserves the idea of apt, well-framed
    speech without sounding overly technical.
- source_word: ἐνώπιον τοῦ λέοντος
  chosen: before the lion
  alternatives:
  - in the presence of the lion
  lexicon: BDAG
  rationale: A formal image retained from the Greek. In context the 'lion' is metaphorical
    for the king, but the text itself uses the image, so it is preserved rather than
    interpreted away.
- source_word: μετάθες τὴν καρδίαν αὐτοῦ
  chosen: turn his heart
  alternatives:
  - change his heart
  - transfer his heart
  lexicon: BDAG
  rationale: The imperative asks God to alter the king's inner disposition. 'Turn
    his heart' is idiomatic biblical English and preserves the metaphor of inward
    inclination.
- source_word: εἰς μῖσος
  chosen: to hatred
  alternatives:
  - into hatred
  - toward hatred
  lexicon: BDAG
  rationale: The preposition εἰς marks resulting direction. 'To hatred' works smoothly
    with 'turn his heart' and keeps the force of a redirected disposition.
- source_word: τοῦ πολεμοῦντος ἡμᾶς
  chosen: against the one who is warring against us
  alternatives:
  - against our enemy
  - against the one fighting us
  lexicon: BDAG
  rationale: 'The participle is singular and active: ''the one warring against us.''
    This likely refers to Haman specifically. The rendering keeps the verbal force
    rather than reducing it to the more interpretive ''enemy''.'
- source_word: εἰς συντέλειαν αὐτοῦ
  chosen: to his destruction
  alternatives:
  - to his end
  - to his ruin
  lexicon: LSJ
  rationale: συντέλεια here denotes an end brought to completion, in context a destructive
    end. 'Destruction' communicates the practical sense clearly.
- source_word: τῶν ὁμονοούντων αὐτῷ
  chosen: those who are of one mind with him
  alternatives:
  - his allies
  - those agreeing with him
  lexicon: BDAG
  rationale: The participle literally denotes those sharing his mind/purpose. 'Of
    one mind with him' preserves the lexical texture better than the more compressed
    'allies,' though the latter is conceptually close.
