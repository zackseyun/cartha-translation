theological_decisions:
- issue: Whether to interpret 'the lion' explicitly as the king
  chosen_reading: Retain the metaphor 'the lion' in the main text
  alternative_readings:
  - before the king
  rationale: The Greek text presents Esther's prayer with vivid metaphorical language.
    Preserving 'lion' maintains the literary and theological texture of prayer under
    threat, while readers can infer the royal referent from context.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source text says rather than flattening imagery.'
- issue: Whether to generalize the singular participle τοῦ πολεμοῦντος ἡμᾶς
  chosen_reading: 'Render as singular: ''the one who is warring against us'''
  alternative_readings:
  - our enemies
  - the enemy
  rationale: The Greek is singular, likely pointing to the chief adversary. Keeping
    the singular avoids importing a broader referent than the text states, while the
    following plural phrase covers his associates.
  doctrine_reference: 'Translation philosophy: never paraphrase beyond what the source
    text warrants.'
