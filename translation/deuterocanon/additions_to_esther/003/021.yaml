translation:
  text: Do not hand over your scepter, Lord, to those who do not exist, and do not
    let them gloat over our downfall; instead, turn their plan against them, and make
    an example of the one who began this attack against us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to nonentities' or 'to those who are nothing.' The Greek literally says
      'to those who do not exist.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ παραδῷς
  chosen: Do not hand over
  alternatives:
  - Do not give over
  - Do not surrender
  lexicon: BDAG
  rationale: παραδίδωμι commonly means to hand over, give over, or deliver up. 'Hand
    over' is natural English and preserves the force of yielding possession or control.
- source_word: τὸ σκῆπρόν σου
  chosen: your scepter
  alternatives:
  - your royal power
  - your rule
  lexicon: LSJ
  rationale: σκῆπτρον literally denotes a scepter, the emblem of royal authority.
    The literal image is clear and theologically significant, so it is retained rather
    than abstracted to 'power' or 'rule'.
- source_word: τοῖς μὴ οὖσιν
  chosen: to those who do not exist
  alternatives:
  - to nonentities
  - to those who are nothing
  lexicon: LSJ
  rationale: The phrase literally means 'to those not being.' In this prayer context
    it likely expresses contempt for idol-like or powerless opponents, but the Greek
    wording is stark. 'Those who do not exist' preserves the literal force while allowing
    readers to sense the rhetorical/theological edge.
- source_word: μὴ καταγελασάτωσαν
  chosen: do not let them gloat
  alternatives:
  - do not let them mock
  - do not let them laugh in scorn
  lexicon: BDAG
  rationale: καταγελάω means to laugh at, mock, or deride. In context of triumph over
    Israel's fall, 'gloat' captures hostile exultation in readable modern English,
    while still implying mockery.
- source_word: ἐν τῇ πτώσει ἡμῶν
  chosen: over our downfall
  alternatives:
  - at our fall
  - in our collapse
  lexicon: BDAG
  rationale: πτῶσις is literally a fall. In idiomatic English for national or communal
    ruin, 'downfall' best conveys the sense.
- source_word: στρέψον τὴν βουλὴν αὐτῶν ἐπʼ αὐτούς
  chosen: turn their plan against them
  alternatives:
  - turn their counsel upon them
  - reverse their scheme onto them
  lexicon: BDAG
  rationale: βουλή can mean counsel, purpose, or plan. In this hostile context 'plan'
    is the clearest modern rendering, and 'against them' captures ἐπʼ αὐτούς.
- source_word: τὸν δὲ ἀρξάμενον
  chosen: the one who began this attack
  alternatives:
  - the one who started it
  - the one who took the lead against us
  lexicon: BDAG
  rationale: ἀρξάμενον is 'the one who began' or 'the one who initiated.' Because
    the object is implicit from the hostile context ἐφʼ ἡμᾶς, English supplies 'this
    attack' to make the sense explicit without over-paraphrasing.
- source_word: ἐφʼ ἡμᾶς
  chosen: against us
  alternatives:
  - upon us
  - over us
  lexicon: BDAG
  rationale: With hostile force, ἐπί plus accusative is well rendered 'against us.'
- source_word: παραδειγμάτισον
  chosen: make an example of
  alternatives:
  - expose publicly
  - punish as a warning
  - hold up to disgrace
  lexicon: BDAG
  rationale: παραδειγματίζω can mean to expose publicly or make an example of someone.
    In this imprecatory prayer, 'make an example of' best captures punitive public
    judgment without narrowing the mode too much.
