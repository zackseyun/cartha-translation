theological_decisions:
- issue: Strength of δοῦλη in Esther's self-reference
  chosen_reading: your slave
  alternative_readings:
  - your servant
  rationale: The verse presents Esther's pious self-humbling before God. Rendering
    δοῦλη as 'slave' preserves the stronger subordination encoded in the Greek and
    aligns with the project's documented handling of δοῦλος/δοῦλη where bonded status
    is meaningful.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
- issue: Cultic nuance of οἶνον σπονδῶν
  chosen_reading: the wine of libations
  alternative_readings:
  - libation wine
  - wine of drink offerings
  rationale: The phrase likely signals wine associated with pagan ceremonial offering
    in the royal setting. The translation preserves that religious nuance without
    overexplaining in the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
