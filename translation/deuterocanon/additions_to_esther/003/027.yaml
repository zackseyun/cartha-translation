translation:
  text: And your slave did not eat at Haman’s table, and I did not honor the king’s
    banquet, nor did I drink the wine of libations;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your servant.' The Greek has 'your slave' (feminine), a stronger term
      of subordination.
    reason: lexical_alternative
  - marker: b
    text: That is, wine associated with libations or drink offerings, not merely ordinary
      wine.
    reason: cultural_note
lexical_decisions:
- source_word: ἡ δούλη σου
  chosen: your slave
  alternatives:
  - your servant
  lexicon: LSJ
  rationale: δοῦλη is the feminine form of δοῦλος. In this courtly prayer context
    Esther speaks of herself in a subordinated status before God; 'slave' preserves
    the stronger bonded sense better than the softer 'servant,' in line with project
    guidance to use 'slave' where the bonded nature is salient.
- source_word: ἔφαγεν
  chosen: did not eat
  alternatives:
  - partake
  - consume
  lexicon: LSJ
  rationale: A straightforward aorist of ἐσθίω. 'Did not eat' is the plain English
    equivalent and fits the negated sequence.
- source_word: τράπεζαν Ἁμάν
  chosen: at Haman’s table
  alternatives:
  - Haman's table
  - from Haman's table
  lexicon: LSJ
  rationale: Although τράπεζαν is literally 'table,' English idiom with eating naturally
    takes 'eat at someone's table.' This preserves the concrete image while reading
    naturally.
- source_word: ἐδόξασα
  chosen: did not honor
  alternatives:
  - did not glorify
  - did not esteem
  lexicon: LSJ
  rationale: δοξάζω can mean 'glorify,' 'honor,' or 'hold in honor.' Here the object
    is 'the king's banquet,' so 'honor' best conveys that Esther did not treat the
    royal feast as something to celebrate or esteem, without importing overtly theological
    'glorify' language.
- source_word: συμπόσιον βασιλέως
  chosen: the king’s banquet
  alternatives:
  - the king's feast
  - the king's drinking party
  lexicon: LSJ
  rationale: συμπόσιον denotes a banquet/feast, often with drinking. 'Banquet' is
    natural and suitably formal; 'drinking party' would be too colloquial, while 'feast'
    is possible but slightly less specific.
- source_word: οἶνον σπονδῶν
  chosen: the wine of libations
  alternatives:
  - libation wine
  - wine poured as an offering
  lexicon: LSJ
  rationale: σπονδαί are drink offerings/libations. The genitive construction is preserved
    clearly by 'wine of libations,' which keeps the cultic nuance that this was not
    merely ordinary wine.
