translation:
  text: And she was pleading with the Lord, the God of Israel, and said, “My Lord,
    our king, you alone are one; help me, who am alone and have no helper except you,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, “you alone are.” The Greek is elliptical here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδεῖτο
  chosen: was pleading
  alternatives:
  - was beseeching
  - was imploring
  - prayed
  lexicon: BDAG
  rationale: δέομαι conveys earnest entreaty rather than a neutral statement of prayer.
    'Was pleading' preserves the imperfect's ongoing sense and the urgency of Esther's
    appeal.
- source_word: Κυρίου θεοῦ Ἰσραήλ
  chosen: the Lord, the God of Israel
  alternatives:
  - the Lord God of Israel
  lexicon: LEH
  rationale: The genitival/appositional sequence is naturally rendered with both titles
    expressed. 'Lord' follows the project's default for κύριος.
- source_word: Κύριέ μου
  chosen: My Lord
  alternatives:
  - O Lord
  - Lord
  lexicon: LEH
  rationale: The possessive μου is explicit and should be represented. 'My Lord' preserves
    the direct address and personal dependence.
- source_word: ὁ βασιλεὺς ἡμῶν
  chosen: our king
  alternatives:
  - the king of us
  - our ruler
  lexicon: LEH
  rationale: The phrase addresses God as Israel's king. 'Our king' is the most natural
    English equivalent and preserves the royal theological title.
- source_word: σὺ εἶ μόνος
  chosen: you alone are one
  alternatives:
  - you alone are
  - you alone
  lexicon: LEH
  rationale: μόνος means 'alone/only.' The Greek as transmitted includes εἶ μόνος
    without an expressed predicate; the wording likely means that God alone stands
    as the sole one able to help. To stay close to the source while signaling the
    explicit numeral nuance, 'you alone are one' is retained, with a footnote preserving
    the smoother alternative.
- source_word: βοήθησόν μοι
  chosen: help me
  alternatives:
  - come to my aid
  - assist me
  lexicon: BDAG
  rationale: Aorist imperative of βοηθέω is a direct plea for aid. 'Help me' is simple,
    forceful, and fully adequate.
- source_word: τῇ μόνῃ
  chosen: who am alone
  alternatives:
  - to me alone
  - me, being alone
  lexicon: LEH
  rationale: The feminine dative singular agrees with the speaker and is best brought
    into idiomatic English as a descriptive relative phrase.
- source_word: μὴ ἔχουσῃ βοηθὸν
  chosen: have no helper
  alternatives:
  - having no helper
  - without help
  lexicon: BDAG
  rationale: The participial phrase describes Esther's condition. 'Have no helper'
    preserves the personal noun βοηθός rather than flattening it to an abstract noun.
- source_word: εἰ μὴ σέ
  chosen: except you
  alternatives:
  - unless you
  - but you alone
  lexicon: BDAG
  rationale: 'The exclusion is absolute: no helper exists apart from God. ''Except
    you'' is the clearest idiomatic rendering.'
