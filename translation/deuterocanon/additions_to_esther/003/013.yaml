theological_decisions:
- issue: Divine royal title in Esther's prayer
  chosen_reading: Rendered ὁ βασιλεὺς ἡμῶν as 'our king' and kept it as direct address
    to God.
  alternative_readings:
  - our ruler
  rationale: The text explicitly addresses the Lord as Israel's king. This should
    be preserved rather than softened, since it contributes to the theology of God's
    sovereignty over against the earthly king in Esther.
  doctrine_reference: Translate titles; transliterate names.
- issue: Elliptical confession in σὺ εἶ μόνος
  chosen_reading: Main text keeps a close rendering, 'you alone are one,' with a footnote
    noting the smoother sense 'you alone are.'
  alternative_readings:
  - you alone are
  - you alone
  rationale: The Greek wording is somewhat abrupt/elliptical. Rather than over-resolving
    the syntax, the main text stays close to the source and the footnote preserves
    the likely idiomatic sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
