translation:
  text: But rescue us by your hand, and help me, who am alone and have no one except
    you, Lord. You have knowledge of all things,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ῥῦσαι
  chosen: rescue
  alternatives:
  - deliver
  - save
  lexicon: BDAG
  rationale: Aorist imperative of ῥύομαι, a plea for deliverance from danger. 'Rescue'
    is vivid, natural English and fits the urgent prayer context without importing
    broader soteriological overtones that 'save' might suggest.
- source_word: ἐν χειρί σου
  chosen: by your hand
  alternatives:
  - in your hand
  - with your hand
  lexicon: LEH
  rationale: The phrase is a common biblical idiom for agency/power. 'By your hand'
    preserves the metaphor while communicating instrumental agency in idiomatic English.
- source_word: βοήθησόν μοι
  chosen: help me
  alternatives:
  - come to my aid
  - assist me
  lexicon: BDAG
  rationale: Straightforward imperative plus dative pronoun. 'Help me' is the most
    direct and natural rendering in prayer language.
- source_word: τῇ μόνῃ
  chosen: who am alone
  alternatives:
  - the one who is alone
  - being alone
  lexicon: LSJ
  rationale: The feminine dative singular agrees with the speaker and explains the
    basis for the plea. Rendering it relatively in English gives smooth sense while
    preserving Esther's isolation.
- source_word: μὴ ἔχουσῃ εἰ μὴ σέ
  chosen: have no one except you
  alternatives:
  - having no one but you
  - possess no one except you
  lexicon: BDAG
  rationale: The participial phrase continues the description of the speaker's helplessness.
    'No one except you' makes explicit the implied personal object in idiomatic English.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this prayer context it functions
    as a divine address.
- source_word: πάντων γνῶσιν ἔχεις
  chosen: You have knowledge of all things
  alternatives:
  - You know all things
  - You possess knowledge of everything
  lexicon: LEH
  rationale: This more formally reflects the noun γνῶσιν plus ἔχεις rather than collapsing
    it immediately to the verb 'know.' It preserves the elevated prayer style while
    remaining clear.
