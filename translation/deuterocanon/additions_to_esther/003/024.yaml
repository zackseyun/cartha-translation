source:
  edition: lxx-swete-1909
  text: ἡμᾶς δὲ ῥῦσαι ἐν χειρί σου, καὶ βοή- θησόν μοι τῇ μόνῃ καὶ μὴ ἔχουσῃ εἰ μὴ
    σέ, Κύριε. πάντων γνῶσιν ἔχεις,
  language: Greek
  pages:
