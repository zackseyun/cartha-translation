theological_decisions:
- issue: Motive for Mordecai's refusal to honor Haman
  chosen_reading: The verse presents the refusal as not arising from sinful self-exaltation
    but from another, unstated motive.
  alternative_readings:
  - The refusal was purely religious
  - The refusal was primarily political or personal
  rationale: The Greek explicitly denies motives of insolence, pride, and ambition,
    but it does not specify the positive motive in this verse. The translation preserves
    that restraint and does not import a fuller explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
