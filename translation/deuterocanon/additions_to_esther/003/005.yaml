translation:
  text: You know all things; you know, Lord, that it was not in insolence or in pride
    or in ambition that I did this—refusing to bow down to the proud Haman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'not to prostrate myself before proud Haman.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ πάντα γινώσκεις
  chosen: You know all things
  alternatives:
  - You know everything
  lexicon: BDAG
  rationale: A direct rendering preserves the emphatic address to God and the comprehensive
    scope of knowledge. 'All things' is slightly more formal and suits the prayerful
    tone.
- source_word: σὺ οἶδας
  chosen: you know
  alternatives:
  - you are aware
  lexicon: BDAG
  rationale: The repetition of two knowledge verbs is retained rather than collapsed,
    since the Greek uses both for emphasis in prayer.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a divine address.
- source_word: οὐκ ἐν ὕβρει
  chosen: not in insolence
  alternatives:
  - not in arrogance
  - not in outrage
  lexicon: LSJ
  rationale: ὕβρις denotes insolent, overbearing behavior. 'Insolence' best captures
    the moral tone without flattening it into a generic synonym.
- source_word: οὐδὲ ἐν ὑπερηφανείᾳ
  chosen: or in pride
  alternatives:
  - or in haughtiness
  lexicon: LSJ
  rationale: A straightforward rendering that distinguishes this term from ὕβρις while
    remaining natural English.
- source_word: οὐδὲ ἐν φιλοδοξίᾳ
  chosen: or in ambition
  alternatives:
  - or in love of honor
  - or in vainglory
  lexicon: LSJ
  rationale: φιλοδοξία can denote love of honor or ambition. 'Ambition' is the clearest
    modern equivalent here, referring to self-seeking motive.
- source_word: ἐποίησα τοῦτο
  chosen: I did this
  alternatives:
  - I acted this way
  lexicon: BDAG
  rationale: A simple, direct rendering that leaves the following infinitive phrase
    to explain what 'this' refers to.
- source_word: τὸ μὴ προσκυνεῖν
  chosen: refusing to bow down
  alternatives:
  - not to bow down
  - not to prostrate myself
  lexicon: BDAG
  rationale: The articular infinitive explains the content of 'this.' 'Refusing to
    bow down' makes the sense explicit in idiomatic English while preserving the volitional
    force.
- source_word: τὸν ὑπερήφανον Ἁμάν
  chosen: the proud Haman
  alternatives:
  - Haman the arrogant
  - haughty Haman
  lexicon: LSJ
  rationale: The adjective is retained rather than omitted, since it is part of Mordecai's
    moral characterization of Haman and helps explain the refusal.
