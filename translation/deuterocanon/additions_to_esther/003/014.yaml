translation:
  text: for my life is in my hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek literally, ''for my danger is in my hand.'' The translation renders
      the idiom by sense: ''my life is in my hand,'' that is, my life is in peril.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κίνδυνός
  chosen: my life
  alternatives:
  - my danger
  - my peril
  lexicon: LSJ
  rationale: Although κίνδυνος commonly means 'danger' or 'peril,' the idiom κίνδυνός
    μου ἐν χειρί μου is best rendered by its sense rather than woodenly. In context
    it expresses that one's life is at risk or held precariously, so 'my life' communicates
    the force of the idiom in natural English.
- source_word: ἐν χειρί μου
  chosen: is in my hand
  alternatives:
  - is at hand
  - is in my power
  lexicon: LSJ
  rationale: Formally the phrase is 'in my hand.' Here it participates in an idiomatic
    expression of precarious exposure or mortal risk. Retaining 'in my hand' preserves
    the metaphor while remaining intelligible in English.
- source_word: ὅτι
  chosen: for
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: ὅτι here introduces the reason or explanation for the preceding statement,
    so 'for' fits concise biblical English well.
