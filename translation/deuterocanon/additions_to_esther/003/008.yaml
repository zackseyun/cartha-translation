translation:
  text: And now, Lord God, King, God of Abraham, spare your people, because they are
    watching us for destruction and have desired to destroy your inheritance from
    the beginning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are watching us for ruin' or 'they have set their eyes on us for
      destruction.' The Greek expression is compressed and conveys hostile intent
      directed toward our downfall.
    reason: lexical_alternative
  - marker: b
    text: Or 'your inheritance from of old' / 'your ancient inheritance.'
    reason: alternative_reading
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Direct vocative of κύριος; per doctrine default, rendered 'Lord' rather
    than 'Master' to preserve biblical title usage.
- source_word: ὁ θεὸς ὁ βασιλεὺς
  chosen: God, King
  alternatives:
  - the God, the King
  - God the King
  lexicon: LSJ
  rationale: The appositional titles are retained compactly in English. 'God, King'
    preserves the stacked invocation without over-smoothing.
- source_word: φεῖσαι
  chosen: spare
  alternatives:
  - have mercy on
  - preserve
  lexicon: LSJ
  rationale: Aorist middle imperative of φείδομαι, commonly 'spare' in pleas for deliverance.
    'Have mercy on' is broader and less exact here.
- source_word: τοῦ λαοῦ σου
  chosen: your people
  alternatives:
  - your nation
  lexicon: LSJ
  rationale: λαός in covenantal prayer is best rendered 'people,' preserving the communal
    and covenantal sense.
- source_word: ἐπιβλέπουσιν ἡμῖν εἰς καταφθοράν
  chosen: they are looking upon us for destruction
  alternatives:
  - they are watching us for destruction
  - they are turning their eyes against us for ruin
  lexicon: LSJ
  rationale: The Greek is somewhat compressed. ἐπιβλέπω with εἰς + accusative conveys
    hostile regard directed toward ruin. 'Looking upon us for destruction' stays close
    to the wording while remaining intelligible.
- source_word: καταφθοράν
  chosen: destruction
  alternatives:
  - ruin
  - utter destruction
  lexicon: LSJ
  rationale: A strong term for ruin/destruction; 'destruction' is natural and weighty
    without over-interpretation.
- source_word: ἐπεθύμησαν
  chosen: have desired
  alternatives:
  - have planned
  - have longed
  lexicon: BDAG
  rationale: The verb denotes desire or intent. 'Have desired' preserves the lexical
    sense; the infinitive that follows supplies the hostile object of that desire.
- source_word: ἀπολέσαι
  chosen: to destroy
  alternatives:
  - to wipe out
  - to kill off
  lexicon: LSJ
  rationale: Standard rendering of ἀπόλλυμι in this context; 'destroy' is broad enough
    to fit the corporate object.
- source_word: τὴν ἐξ ἀρχῆς κληρονομίαν σου
  chosen: your inheritance from the beginning
  alternatives:
  - your inheritance from of old
  - the inheritance that has been yours from the beginning
  lexicon: LSJ
  rationale: κληρονομία can mean inheritance/possession. Here it refers to God's covenant
    people as his long-held inheritance. 'From the beginning' reflects ἐξ ἀρχῆς straightforwardly,
    though idiomatically it may mean 'from of old.'
