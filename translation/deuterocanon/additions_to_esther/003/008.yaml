theological_decisions:
- issue: Sense of 'your inheritance'
  chosen_reading: Refers to God's covenant people as his inherited possession
  alternative_readings:
  - Refers more broadly to the ancestral land or covenant heritage
  rationale: In this prayer context, λαός σου and κληρονομία σου are parallel covenantal
    designations for Israel. The English keeps 'inheritance' rather than specifying
    'people' again, preserving the theological metaphor.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of ἐξ ἀρχῆς
  chosen_reading: Rendered 'from the beginning' in the main text
  alternative_readings:
  - from of old
  - from ancient times
  rationale: The phrase is formally transparent and understandable in English. Because
    it may idiomatically point to ancient covenant possession rather than absolute
    beginning, an alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3
