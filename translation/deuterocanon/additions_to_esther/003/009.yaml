theological_decisions:
- issue: Covenantal nuance of μερίς in relation to Israel as God's possession
  chosen_reading: your portion
  alternative_readings:
  - your inheritance
  - your people as your allotted possession
  rationale: The Greek says 'your portion' and likely evokes covenant-possession language,
    but the verse does not explicitly restate 'people.' The main text keeps the metaphor
    concise while allowing the theological resonance to remain implicit.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of σεαυτῷ with ἐλυτρώσω
  chosen_reading: which I redeemed for yourself
  alternative_readings:
  - which you redeemed as your own
  - which I redeemed for your own possession
  rationale: The source text is first person ('I redeemed') with a reflexive dative
    ('for yourself'), an unusual but intelligible construction in prayer addressed
    to God. The rendering preserves the Greek form rather than smoothing it into a
    more interpretive phrase, while a footnote preserves a more idiomatic alternative.
  doctrine_reference: Translation philosophy §§1, 3
