translation:
  text: Do not overlook your portion, which I redeemed for yourself out of the land
    of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'which I redeemed as your own' or 'which I redeemed
      for your own possession.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ὑπερίδῃς
  chosen: Do not overlook
  alternatives:
  - Do not disregard
  - Do not pass over
  - Do not despise
  lexicon: LSJ
  rationale: ὑπεροράω commonly means to overlook, disregard, or treat with neglect.
    'Do not overlook' preserves the prohibitive force and fits the prayer context
    without overinterpreting the emotional tone.
- source_word: τὴν μερίδα σου
  chosen: your portion
  alternatives:
  - your share
  - your inheritance
  lexicon: LSJ
  rationale: μερίς often means portion or share. 'Portion' is broad enough to preserve
    possible covenantal overtones without forcing the more technical 'inheritance.'
- source_word: ἣν
  chosen: which
  alternatives:
  - that
  lexicon: Greek grammar
  rationale: The relative pronoun straightforwardly introduces the clause modifying
    'portion.' 'Which' reads naturally in formal modern English.
- source_word: σεαυτῷ
  chosen: for yourself
  alternatives:
  - for yourself as your own
  - to yourself
  lexicon: Greek grammar
  rationale: The reflexive dative is somewhat emphatic. 'For yourself' preserves the
    reflexive sense that God redeemed this people as his own possession, without adding
    explanatory wording to the main text.
- source_word: ἐλυτρώσω
  chosen: I redeemed
  alternatives:
  - I ransomed
  - I delivered
  lexicon: LSJ
  rationale: λυτρόω carries the sense of redeeming or ransoming, often with covenantal-salvific
    force. 'Redeemed' best preserves that theological weight in this exodus context.
- source_word: ἐκ γῆς Αἰγύπτου
  chosen: out of the land of Egypt
  alternatives:
  - from the land of Egypt
  - out of Egypt
  lexicon: LSJ
  rationale: This is a standard biblical expression. 'Out of the land of Egypt' preserves
    the full phrase and its resonance with exodus formula language.
