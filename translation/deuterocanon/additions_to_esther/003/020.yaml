theological_decisions:
- issue: Whether ματαίων should remain abstract ('worthless things/vanities') or be
    rendered with explicit anti-idolatry force
  chosen_reading: worthless idols
  alternative_readings:
  - worthless things
  - vanities
  - empty things
  rationale: The surrounding line concerns the nations' speech in praise and the exaltation
    of a merely human king, which strongly suggests idolatrous acclamation. Rendering
    the term as 'worthless idols' makes the implied object of false praise explicit,
    while a footnote preserves the more formally literal alternatives.
  doctrine_reference: Translation philosophy §1, §6
- issue: How explicitly to render σάρκινον in contrast to divine kingship
  chosen_reading: a king of flesh
  alternative_readings:
  - a mortal king
  - a merely human king
  rationale: The Greek itself uses the concrete term 'fleshly/of flesh.' Preserving
    that wording maintains the theological contrast between God and a human ruler
    without paraphrasing it away.
  doctrine_reference: Translation philosophy §1, §5
