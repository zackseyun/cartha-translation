translation:
  text: and to open the mouth of the nations to the praises of worthless things, and
    for a fleshly king to be marveled at forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the excellencies of worthless things' or 'for the praises of vanities.'
      The Greek is more literally 'into/toward the excellencies of worthless things.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''a mortal king'' or ''a merely human king.'' Greek: ''a king of flesh.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοῖξαι στόμα
  chosen: to open the mouth
  alternatives:
  - to open the lips
  - to give voice
  lexicon: LSJ
  rationale: A common idiom for enabling or occasioning speech. The more literal 'open
    the mouth' preserves the Greek image and fits the infinitive sequence of purpose/result
    in this prayer context.
- source_word: ἐθνῶν
  chosen: of the nations
  alternatives:
  - of the Gentiles
  - of the peoples
  lexicon: LSJ
  rationale: In LXX usage ἔθνη commonly refers to the non-Israelite nations. 'Nations'
    is the broadest and least interpretively loaded rendering here; 'Gentiles' would
    narrow the sense in a way not required by the immediate context.
- source_word: ἀρετὰς
  chosen: praises
  alternatives:
  - excellencies
  - virtues
  lexicon: LSJ
  rationale: Although ἀρετή often means 'virtue' or 'excellence,' in the phrase 'into/toward
    the ἀρεταί of worthless things' the sense is the ascription of excellencies or
    praises. English 'praises' communicates the rhetorical force more naturally than
    the awkward 'virtues of vanities.'
- source_word: ματαίων
  chosen: worthless idols
  alternatives:
  - worthless things
  - vanities
  - empty things
  lexicon: LSJ
  rationale: The adjective/substantive ματαῖος denotes emptiness or futility. In this
    anti-idolatry context, the referent is not mere abstractions but false objects
    of worship, so 'worthless idols' makes explicit the likely cultic sense while
    staying anchored in the Greek's pejorative force.
- source_word: θαυμασθῆναι
  chosen: to be marveled at
  alternatives:
  - to be admired
  - to be worshiped
  - to be held in awe
  lexicon: LSJ
  rationale: The passive infinitive means to be wondered at or admired. 'Worshiped'
    would overstate the lexical sense, though the context approaches idolatrous honor.
    'Be marveled at' preserves the verbal idea without importing a stronger cultic
    term.
- source_word: βασιλέα σάρκινον
  chosen: a king of flesh
  alternatives:
  - a fleshly king
  - a mortal king
  - a merely human king
  lexicon: LSJ
  rationale: σάρκινος literally means 'made of flesh' or 'fleshly.' Here it contrasts
    a human ruler with God. 'A king of flesh' keeps the vivid Greek expression; smoother
    alternatives like 'mortal king' interpret the metaphor more heavily than necessary.
- source_word: εἰς αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for all time
  lexicon: LSJ
  rationale: The idiom regularly means enduringly or forever. In context it expresses
    the blasphemous permanence of honor given to a human king.
