theological_decisions:
- issue: Self-designation δούλη in prayer
  chosen_reading: your slave
  alternative_readings:
  - your servant
  rationale: The verse presents Esther's humble self-reference before God. In line
    with the project's contested-terms guidance for δοῦλος/δούλη, 'slave' is used
    where bonded dependence is salient; 'servant' is preserved as an alternative because
    some readers may hear the prayer register differently.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1, §5'
- issue: Meaning of μεταβολή in Esther's prayer
  chosen_reading: my change
  alternative_readings:
  - my reversal
  - my changed circumstances
  rationale: The Greek leaves the nature of the change implicit. The translation preserves
    that ambiguity rather than specifying social status, fortune, or situation beyond
    the text.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3'
