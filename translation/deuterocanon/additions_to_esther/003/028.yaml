translation:
  text: And your slave has not rejoiced from the day of my change until now, except
    in you, Lord, God of Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your servant.' The Greek has the feminine form of 'slave/servant' (δούλη),
      a humble self-designation before God.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the day of my reversal' or 'since my circumstances changed.' The
      Greek phrase leaves the exact nature of the 'change' unstated.
    reason: alternative_reading
lexical_decisions:
- source_word: δούλη
  chosen: slave
  alternatives:
  - servant
  lexicon: BDAG
  rationale: Feminine form of δοῦλος. Following project guidance, 'slave' is preferred
    where the bonded status is foregrounded in humble address before God. Here Esther
    speaks of herself in self-abasing covenantal language; 'your slave' preserves
    that force better than the softer 'servant.'
- source_word: ηὐφράνθη
  chosen: has not rejoiced
  alternatives:
  - has not been glad
  - has not celebrated
  lexicon: BDAG
  rationale: The verb denotes being glad or rejoicing. 'Has not rejoiced' preserves
    the verbal and emotional force without overinterpreting the object of joy.
- source_word: ἀφʼ ἡμέρας μεταβολῆς μου
  chosen: from the day of my change
  alternatives:
  - since the day of my change
  - from the day of my reversal
  - from the day my circumstances changed
  lexicon: LSJ
  rationale: μεταβολή can denote change, alteration, or reversal. The phrase is somewhat
    compressed in Greek; 'from the day of my change' stays close to the wording while
    leaving the precise nature of the change implicit, as in the source.
- source_word: πλὴν ἐπὶ σοί
  chosen: except in you
  alternatives:
  - except because of you
  - except with respect to you
  - except upon you
  lexicon: BDAG
  rationale: πλήν marks exception, and ἐπί with dative here is best taken as the basis
    or sphere of the exception. 'Except in you' is concise, idiomatic enough, and
    preserves the sense that God alone is the ground of any joy.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine defaults, 'Lord' is the standard rendering.
- source_word: ὁ θεὸς Ἀβραάμ
  chosen: God of Abraham
  lexicon: BDAG
  rationale: A covenantal divine title. The article is naturally omitted in English
    in this title construction.
