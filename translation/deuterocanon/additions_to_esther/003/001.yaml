- issue: Rendering of κύριος in deuterocanonical Greek prayer language
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: Per doctrine, κύριος defaults to 'Lord.' Nothing in this immediate clause
    requires the covenant-name convention 'LORD,' and 'Master' would undertranslate
    the prayer address in this context.
