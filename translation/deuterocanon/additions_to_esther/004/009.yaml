theological_decisions:
- issue: Familial designation of the speaker to Esther
  chosen_reading: Retain the literal 'brother' in the main text
  alternative_readings:
  - Render more broadly as 'kinsman' or 'relative'
  rationale: This is not a major doctrinally contested term, but it can affect interpretation
    of the relationship. Because the Greek plainly says 'brother,' the translation
    preserves that lexical form and leaves broader relational interpretation to readers
    rather than resolving it in translation.
  doctrine_reference: Translation philosophy §1, §5
