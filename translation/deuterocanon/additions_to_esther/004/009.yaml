translation:
  text: And he said to her, “What is it, Esther? I am your brother; take courage.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What is the matter, Esther?'
    reason: lexical_alternative
  - marker: b
    text: Or 'I, your kinsman' if the term is understood more broadly than a literal
      sibling relationship.
    reason: alternative_reading
lexical_decisions:
- source_word: Τί ἐστιν
  chosen: What is it
  alternatives:
  - What is the matter?
  - What is it?
  lexicon: LSJ
  rationale: A natural English rendering of the idiomatic question that preserves
    the directness of the Greek without over-paraphrasing. 'What is the matter?' is
    possible, but 'What is it' stays closer to the wording.
- source_word: ἀδελφός
  chosen: brother
  alternatives:
  - kinsman
  - relative
  lexicon: LSJ
  rationale: The Greek word is literally 'brother.' In this court narrative context
    it may function more broadly for close kin or covenantal solidarity, but the source
    text uses the familial term directly, so 'brother' is retained.
- source_word: θάρσει
  chosen: take courage
  alternatives:
  - be courageous
  - be of good cheer
  - have courage
  lexicon: LSJ
  rationale: An imperative meaning 'be confident/courageous.' 'Take courage' is idiomatic
    modern English that preserves the exhortational force without sounding archaic
    like 'be of good cheer.'
- source_word: ἐγὼ ὁ ἀδελφός σου
  chosen: I am your brother
  alternatives:
  - I, your brother
  - I am your kinsman
  lexicon: LSJ
  rationale: The explicit pronoun plus nominal phrase is best represented as a full
    clause in English. This preserves the emphatic reassurance of the Greek.
