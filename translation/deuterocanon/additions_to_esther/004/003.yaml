translation:
  text: and one was kept under watch as one being pampered, but the other—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text for this verse segment is incomplete at the boundary in the
      provided witness, ending with 'but the other—'; the translation preserves that
      open-ended contrast rather than supplying missing words.
    reason: textual_variant
lexical_decisions:
- source_word: ἐτηρείδετο
  chosen: was kept under watch
  alternatives:
  - was guarded
  - was watched over
  - was kept
  lexicon: LSJ
  rationale: Imperfect/passive sense from τηρέω conveys being kept or watched. 'Under
    watch' preserves the custodial nuance without overcommitting to either protective
    or restrictive intent.
- source_word: τρυφερευομένη
  chosen: being pampered
  alternatives:
  - living luxuriously
  - being delicately treated
  - indulging in luxury
  lexicon: LSJ
  rationale: The participle denotes living softly or luxuriously. 'Being pampered'
    gives natural English and captures the passive nuance of being treated with luxury.
- source_word: καὶ τῇ μὲν μιᾷ ... ἡ δὲ
  chosen: and one ... but the other—
  alternatives:
  - and the one ... but the other
  - and to the one ... but the other
  lexicon: LSJ
  rationale: The correlative construction sets up a contrast between two women or
    parties. Because the surviving Greek here is fragmentary at the verse boundary,
    'one ... but the other—' preserves the unfinished contrast signaled by the text.
