translation:
  text: blushing in the full bloom of her beauty, and her face was cheerful as if
    affectionate, but her heart was constricted from fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flushed at the height of her beauty.' The Greek combines a participle
      meaning 'reddening/blushing' with a phrase for beauty at its peak.
    reason: lexical_alternative
  - marker: b
    text: Or 'her face was bright and pleasing.' The phrase 'as if beloved' preserves
      the Greek's comparative wording more closely.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρυθριῶσα
  chosen: blushing
  alternatives:
  - flushed
  - reddening
  lexicon: LSJ
  rationale: Present participle from ἐρυθριάω/ἐρυθριόω, describing a visible reddening.
    'Blushing' is natural English and preserves the embodied image without overexplaining.
- source_word: ἀκμῇ
  chosen: in the full bloom of
  alternatives:
  - at the height of
  - in the prime of
  lexicon: LSJ
  rationale: ἀκμή commonly denotes peak, prime, or full vigor. In combination with
    κάλλους it idiomatically points to beauty at its height. 'In the full bloom of'
    is readable and fitting for appearance.
- source_word: κάλλους
  chosen: her beauty
  alternatives:
  - her loveliness
  lexicon: LSJ
  rationale: κάλλος denotes beauty or loveliness. 'Beauty' is the most direct and
    standard rendering here.
- source_word: ἱλαρόν
  chosen: cheerful
  alternatives:
  - bright
  - pleasant
  - radiant
  lexicon: LSJ
  rationale: ἱλαρός conveys cheerfulness, gladness, or brightness of countenance.
    'Cheerful' best matches the emotional tone while remaining simple modern English.
- source_word: ὡς προσφιλές
  chosen: as if beloved
  alternatives:
  - as if winsome
  - as if pleasing
  - as if lovely
  lexicon: LSJ
  rationale: προσφιλής means beloved, dear, or pleasing. Because ὡς can mark comparison
    or appearance, 'as if beloved' preserves the slightly unusual Greek phrasing rather
    than flattening it into a mere adjective.
- source_word: ἀπεστενωμένη
  chosen: was constricted
  alternatives:
  - was distressed
  - was pressed tight
  - was oppressed
  lexicon: LSJ
  rationale: The participle suggests being drawn tight or compressed. Given the following
    phrase 'from fear,' 'was constricted' preserves the physical-metaphorical force
    of inward distress better than a generic 'distressed.'
- source_word: ἀπὸ τοῦ φόβου
  chosen: from fear
  alternatives:
  - because of fear
  lexicon: LSJ
  rationale: The preposition ἀπό here marks source or cause. 'From fear' is concise
    and faithful; 'because of fear' is possible but less direct.
