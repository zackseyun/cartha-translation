translation:
  text: And when she had become visible, after calling upon God, the overseer of all
    and Savior, she took up the two maids,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when she appeared.' The Greek participial phrase can be rendered more
      idiomatically this way.
    reason: lexical_alternative
  - marker: b
    text: '''Overseer of all'' may also be rendered ''watcher over all'' or ''the
      all-seeing God.'''
    reason: lexical_alternative
  - marker: c
    text: '''Maids'' refers to female attendants accompanying Esther.'
    reason: cultural_note
lexical_decisions:
- source_word: γενηθεῖσα ἐπιφανής
  chosen: when she had become visible
  alternatives:
  - when she appeared
  - having become conspicuous
  - when she became manifest
  lexicon: LSJ
  rationale: The participial phrase marks a change from concealment to public appearance.
    'Visible' preserves the basic sense of ἐπιφανής without overinterpreting it as
    splendor or fame; 'when she appeared' is possible but slightly smoother and less
    transparent to the Greek wording.
- source_word: ἐπικαλεσαμένη
  chosen: after calling upon
  alternatives:
  - calling on
  - invoking
  lexicon: BDAG
  rationale: The middle participle commonly means to call upon or invoke, especially
    in prayer. 'After calling upon' reflects the participial sequence leading into
    the main verb.
- source_word: τὸν πάντων ἐπόπτην θεὸν
  chosen: God, the overseer of all
  alternatives:
  - God, the watcher over all
  - God, who sees all
  - the all-seeing God
  lexicon: LSJ
  rationale: ἐπόπτης denotes one who watches over or oversees. 'Overseer of all' is
    a direct and intelligible rendering that preserves the title-like force without
    importing later technical meanings.
- source_word: σωτῆρα
  chosen: Savior
  alternatives:
  - deliverer
  lexicon: BDAG
  rationale: σωτήρ regularly means 'savior' or 'deliverer.' 'Savior' best preserves
    the elevated religious register of Esther's prayer context.
- source_word: παρέλαβεν
  chosen: she took up
  alternatives:
  - she took
  - she received
  - she took along
  lexicon: LSJ
  rationale: The verb can mean take, receive, or take along. In context Esther is
    physically taking the maids with her, and 'took up' fits the immediate movement
    while remaining close to the Greek.
- source_word: τὰς δύο ἅβρας
  chosen: the two maids
  alternatives:
  - the two servant girls
  - the two female attendants
  lexicon: LSJ
  rationale: ἅβρα refers to a delicate young woman, often in the sense of maid or
    female attendant. 'Maids' is concise and contextually appropriate, though 'female
    attendants' is possible in a more formal register.
