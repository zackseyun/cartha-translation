theological_decisions:
- issue: Rendering the divine title ἐπόπτην in relation to θεὸν καὶ σωτῆρα
  chosen_reading: God, the overseer of all and Savior
  alternative_readings:
  - God, who watches over all, and Savior
  - the all-seeing God and Savior
  rationale: The phrase attributes universal oversight and saving power to God in
    Esther's appeal. The chosen rendering preserves both predicates without collapsing
    them into a single adjectival paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
