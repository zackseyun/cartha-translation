theological_decisions:
- issue: Anthropomorphic language for God in 'your face'
  chosen_reading: Retain the literal anthropomorphic expression 'your face'
  alternative_readings:
  - your presence
  - your countenance
  rationale: The Greek uses πρόσωπον directly. The translation preserves the imagery
    rather than resolving it into an abstract theological paraphrase. This follows
    the project's preference to preserve the source text's tension and imagery unless
    context plainly demands otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Rendering χάρις-language in a description of God
  chosen_reading: Use 'grace' rather than 'favor' or 'graciousness'
  alternative_readings:
  - favor
  - graciousness
  rationale: Although χάρις can mean favor or graciousness, 'grace' best preserves
    the theological resonance of the term while remaining natural in English. Here
    it describes the Lord's face as characterized by grace.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5, 6
