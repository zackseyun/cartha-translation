reference: Additions to Esther 4:14
source:
  edition: lxx-swete-1909
  text: ὅτι θαυμαστὸς εἶ, κύριε, καὶ τὸ πρόσωπόν σου χαρίτων μεστόν.
  language: Greek
  pages:
  - 784
