translation:
  text: For you are wonderful, Lord, and your face is full of grace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your presence is full of favor' or 'your countenance is full of graciousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θαυμαστὸς
  chosen: wonderful
  alternatives:
  - marvelous
  - wondrous
  - to be wondered at
  lexicon: LSJ
  rationale: The adjective denotes something marvelous or worthy of wonder. 'Wonderful'
    is natural modern English and preserves the sense of awe without sounding archaic.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Direct address to God is best rendered 'Lord' in keeping with the project's
    default for κύριος and the prayer context.
- source_word: πρόσωπόν
  chosen: face
  alternatives:
  - presence
  - countenance
  lexicon: LSJ
  rationale: The literal sense is 'face.' While 'presence' could express an extended
    sense, the Greek here straightforwardly uses bodily imagery, and 'face' preserves
    that imagery.
- source_word: χαρίτων
  chosen: grace
  alternatives:
  - graciousness
  - favor
  - charms
  lexicon: LSJ
  rationale: The plural of χάρις can denote graces, favors, or gracious qualities.
    'Grace' in English can function collectively and fits the elevated devotional
    tone. 'Charms' would be misleading in English, and 'favor' is possible but less
    fitting with 'full of.'
- source_word: μεστόν
  chosen: full of
  alternatives:
  - filled with
  lexicon: LSJ
  rationale: The adjective means 'full' or 'replete.' 'Full of' is the most idiomatic
    rendering with the following genitive.
