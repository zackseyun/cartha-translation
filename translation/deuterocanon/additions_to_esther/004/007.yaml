translation:
  text: '...entirely covered with gold and costly stones, and he was very terrifying.
    And lifting up his face, blazing with splendor at the height of anger, he looked;
    and the queen fell and changed color in faintness, and she bent down upon the
    head of the delicate maidservant who was going before her.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text for this verse begins mid-description in the supplied witness;
      the opening words are not fully preserved here, so the translation marks the
      ellipsis rather than supplying a reconstruction such as 'he was clothed.'
    reason: textual_variant
  - marker: b
    text: Or 'all in gold and precious stones.'
    reason: lexical_alternative
  - marker: c
    text: Or 'her color changed as she grew faint.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅλος διὰ χρυσοῦ καὶ λίθων πολυτελῶν
  chosen: entirely covered with gold and costly stones
  alternatives:
  - all in gold and precious stones
  - wholly adorned with gold and expensive jewels
  lexicon: LSJ
  rationale: The phrase describes the king's appearance/clothing as fully arrayed
    in luxurious materials. 'Covered with' makes the elliptical Greek intelligible
    in English without over-specifying garments not named in the surviving text.
- source_word: φοβερὸς σφόδρα
  chosen: very terrifying
  alternatives:
  - very fearsome
  - exceedingly dreadful
  lexicon: LSJ
  rationale: φοβερός here describes the king's awe-inspiring and frightening appearance.
    'Terrifying' preserves the emotional force better than the milder 'fearsome.'
- source_word: ἄρας τὸ πρόσωπον αὐτοῦ
  chosen: lifting up his face
  alternatives:
  - raising his face
  - looking up
  lexicon: LSJ
  rationale: Aorist participle of αἴρω with πρόσωπον is rendered fairly literally.
    'Lifting up his face' preserves the vivid bodily movement before the hostile look.
- source_word: πεπυρωμένον δόξῃ
  chosen: blazing with splendor
  alternatives:
  - inflamed with glory
  - flushed with majesty
  lexicon: LSJ
  rationale: πεπυρωμένον literally suggests being set aflame/burning; with δόξῃ it
    conveys radiant, fiery majesty rather than literal combustion. 'Blazing with splendor'
    preserves both the fiery and regal sense in readable English.
- source_word: ἐν ἀκμῇ θυμοῦ
  chosen: at the height of anger
  alternatives:
  - in the peak of wrath
  - in the full force of rage
  lexicon: LSJ
  rationale: ἀκμή denotes a point of highest intensity. 'At the height of anger' communicates
    the idiom naturally while retaining the sense of anger at its peak.
- source_word: μετέβαλε τὸ χρῶμα αὐτῆς ἐν ἐκλύσει
  chosen: changed color in faintness
  alternatives:
  - her color changed as she grew faint
  - turned pale in weakness
  lexicon: LSJ
  rationale: The Greek indicates a visible change of complexion associated with collapse
    or faintness. 'Changed color in faintness' stays close to the wording while remaining
    understandable.
- source_word: κατέκυψεν
  chosen: she bent down
  alternatives:
  - she bowed down
  - she drooped
  lexicon: LSJ
  rationale: The verb can indicate bending or stooping downward. 'Bent down' fits
    the physical collapse scene without implying a deliberate act of reverence.
- source_word: ἅβρας
  chosen: delicate
  alternatives:
  - tender
  - graceful
  - luxurious
  lexicon: LSJ
  rationale: ἁβρός often conveys delicacy, softness, or refinement. 'Delicate' best
    fits the description of the attendant supporting the queen.
- source_word: τῆς προπορευομένης
  chosen: who was going before her
  alternatives:
  - who was preceding her
  - who walked in front of her
  lexicon: LSJ
  rationale: The participle marks the maidservant as the one leading or preceding
    the queen in procession. 'Going before her' is natural and close to the Greek.
