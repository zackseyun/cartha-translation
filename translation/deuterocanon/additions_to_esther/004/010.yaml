theological_decisions:
- issue: Force of the opening negation
  chosen_reading: 'A reassurance/prediction: ''You certainly will not die'''
  alternative_readings:
  - 'An imperative-like plea: ''Do not die'''
  rationale: The Greek construction οὐ μή + subjunctive normally expresses emphatic
    negation of a future event, not a prohibition. Rendering it as reassurance better
    reflects the grammar and avoids importing a different speech act.
