translation:
  text: You certainly will not die, for our decree is common.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for our decree applies to everyone alike.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴ ἀποθάνῃς
  chosen: You certainly will not die
  alternatives:
  - You will surely not die
  - Do not die
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is a strong negation, best represented
    as emphatic future denial rather than an imperative. 'Certainly will not die'
    preserves the force without sounding archaic.
- source_word: κοινὸν
  chosen: common
  alternatives:
  - shared
  - general
  - the same for all
  lexicon: LSJ
  rationale: κοινός here carries the sense of something held in common or applying
    generally. 'Common' is the most direct rendering, though the context implies a
    decree applying alike to all.
- source_word: τὸ πρόσταγμά
  chosen: decree
  alternatives:
  - command
  - edict
  - order
  lexicon: LSJ
  rationale: πρόσταγμα denotes an official command or edict. 'Decree' fits the courtly/legal
    setting better than the more generic 'command' or 'order'.
- source_word: ἡμῶν
  chosen: our
  alternatives:
  - of us
  lexicon: BDAG
  rationale: The possessive pronoun is retained straightforwardly. Although the exact
    referent of 'our' depends on the speakers in context, the Greek explicitly includes
    the first-person plural and should not be flattened away.
