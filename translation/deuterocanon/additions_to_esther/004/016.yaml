translation:
  text: And the king was troubled, and all his attendants were urging her on.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all his retinue were encouraging her.' The Greek παρακαλέω can denote
      urging, exhorting, or encouraging.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταράσσετο
  chosen: was troubled
  alternatives:
  - was disturbed
  - was agitated
  - was alarmed
  lexicon: BDAG
  rationale: Imperfect middle/passive of ταράσσω conveys an ongoing state of inner
    disturbance. 'Was troubled' is natural English and preserves the emotional unrest
    without overstating it as panic.
- source_word: θεραπεία
  chosen: attendants
  alternatives:
  - retinue
  - household servants
  - court
  lexicon: LSJ
  rationale: In this court setting, θεραπεία refers collectively to those in personal
    attendance on the king. 'Attendants' is clear modern English and fits the singular
    collective noun modified by πᾶσα.
- source_word: παρεκάλει
  chosen: were urging ... on
  alternatives:
  - were encouraging
  - were exhorting
  - were appealing to
  lexicon: BDAG
  rationale: The verb παρακαλέω can mean encourage, exhort, or urge. Here the object
    αὐτήν suggests direct encouragement toward action; 'were urging her on' captures
    the active supportive force in context.
- source_word: πᾶσα ἡ θεραπεία αὐτοῦ
  chosen: all his attendants
  alternatives:
  - his whole retinue
  - all his household attendants
  lexicon: LSJ
  rationale: The phrase is a collective expression meaning the entirety of the king's
    attending staff. 'All his attendants' is idiomatic and preserves the collective
    sense.
