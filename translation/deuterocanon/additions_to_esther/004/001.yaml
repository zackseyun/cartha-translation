theological_decisions:
- issue: Meaning of τῆς θεραπείας in Esther's change of clothing
  chosen_reading: Rendered as 'of her service' to describe the attire associated with
    her prayerful observance.
  alternative_readings:
  - of worship
  - of attendance
  - of ministry
  rationale: The term can cover service, attendance, or devotional practice. The immediate
    context is Esther ceasing prayer and changing garments, so a broad rendering avoids
    importing a more specific cultic meaning than the Greek requires.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
- issue: Meaning of τὴν δόξαν αὐτῆς
  chosen_reading: Rendered as 'her splendor' as a reference to regal adornment.
  alternative_readings:
  - her glory
  rationale: In context of changing clothes before approaching the king, the phrase
    most naturally points to visible royal magnificence. 'Glory' is possible but in
    English may sound more abstract or theological than the scene warrants.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    readable modern English, not archaic or academic.'
