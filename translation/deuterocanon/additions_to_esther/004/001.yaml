translation:
  text: And it happened on the third day, when she had stopped praying, that she took
    off the garments of her service and put on her splendor;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the garments of her worship/attendance.' The Greek θεραπεία can denote
      service, attendance, or devotional practice.
    reason: lexical_alternative
  - marker: b
    text: Or 'her glory.' Here the sense is likely her splendid royal attire or magnificence.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγενήθη
  chosen: it happened
  alternatives:
  - it came to pass
  - it occurred
  lexicon: BDAG
  rationale: Common narrative formula in Greek; 'it happened' preserves the idiomatic
    transition without archaic English.
- source_word: ἐν τῇ ἡμέρᾳ τῇ τρίτῃ
  chosen: on the third day
  alternatives:
  - in the third day
  lexicon: BDAG
  rationale: Standard temporal expression best rendered idiomatically in English as
    'on the third day.'
- source_word: ὡς ἐπαύσατο προσευχομένη
  chosen: when she had stopped praying
  alternatives:
  - after she ceased praying
  - when she finished praying
  lexicon: BDAG
  rationale: The construction marks the point at which Esther's prayer ended. 'Had
    stopped praying' is natural English and preserves the completed action prior to
    the following verbs.
- source_word: ἐξεδύσατο
  chosen: she took off
  alternatives:
  - she removed
  - she stripped off
  lexicon: BDAG
  rationale: Middle voice verb for removing clothing. 'Took off' is clear modern English
    without over-dramatizing the action.
- source_word: τὰ ἱμάτια
  chosen: the garments
  alternatives:
  - the clothes
  - the robes
  lexicon: BDAG
  rationale: '''Garments'' fits the elevated register of the scene better than ''clothes''
    while remaining readable.'
- source_word: τῆς θεραπείας
  chosen: of her service
  alternatives:
  - of attendance
  - of ministry
  - of worship
  lexicon: LSJ
  rationale: θεραπεία can denote service or attendance. In this context Esther is
    laying aside the attire associated with her penitential/prayerful observance,
    not necessarily formal liturgical 'worship.' 'Of her service' preserves the broad
    sense while avoiding over-interpretation.
- source_word: περιεβάλετο
  chosen: put on
  alternatives:
  - clothed herself with
  - wrapped herself in
  lexicon: BDAG
  rationale: Straightforward clothing verb; 'put on' is idiomatic and concise.
- source_word: τὴν δόξαν αὐτῆς
  chosen: her splendor
  alternatives:
  - her glory
  - her magnificence
  lexicon: BDAG
  rationale: δόξα here refers to splendid royal attire or outward magnificence rather
    than abstract glory. 'Splendor' communicates visible regal magnificence in context.
