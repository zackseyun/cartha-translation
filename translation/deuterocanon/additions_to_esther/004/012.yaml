translation:
  text: And lifting up the golden scepter, he placed it on her neck, and kissed her
    and said, “Speak to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'greeted her'; the Greek verb can denote greeting, but here the context
      favors a physical kiss.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρας
  chosen: lifting up
  alternatives:
  - raising
  - having lifted up
  lexicon: BDAG
  rationale: Aorist participle of αἴρω, here introducing the king’s action prior to
    the main verbs. 'Lifting up' is natural English and preserves the concrete gesture
    without overformalizing it.
- source_word: χρυσῆν ῥάβδον
  chosen: the golden scepter
  alternatives:
  - the golden staff
  - the golden rod
  lexicon: LSJ
  rationale: ῥάβδος can mean rod, staff, or scepter depending on context. In a royal
    court scene, 'scepter' best conveys the regal object and matches the narrative
    setting.
- source_word: ἐπέθηκεν
  chosen: he placed
  alternatives:
  - he laid
  - he set
  lexicon: BDAG
  rationale: τίθημι with ἐπί here describes placing the scepter upon her neck. 'Placed'
    is idiomatic and sufficiently literal.
- source_word: ἐπὶ τὸν τράχηλον αὐτῆς
  chosen: on her neck
  alternatives:
  - upon her neck
  lexicon: BDAG
  rationale: τράχηλος is 'neck.' The phrase is straightforward and should be rendered
    directly.
- source_word: ἠσπάσατο
  chosen: kissed
  alternatives:
  - greeted with a kiss
  - embraced
  lexicon: BDAG
  rationale: ἀσπάζομαι often means greet, but in this context the direct object and
    surrounding gestures indicate a physical kiss rather than a merely verbal greeting.
    'Kissed' best reflects the immediate action.
- source_word: Λάλησόν μοι
  chosen: Speak to me
  alternatives:
  - Talk to me
  - Speak with me
  lexicon: BDAG
  rationale: Imperative of λαλέω with μοι. 'Speak to me' is direct, natural, and preserves
    the king’s invitation without colloquial flattening.
