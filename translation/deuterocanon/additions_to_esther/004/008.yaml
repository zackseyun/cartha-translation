translation:
  text: And God changed the king’s spirit to gentleness, and in anguish he sprang
    up from his throne and took her into his arms until she recovered, and he comforted
    her with peaceful words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s disposition' or 'the king’s mind'; Greek 'spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'until she steadied herself.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with words of peace' or 'with reassuring words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετέβαλεν
  chosen: changed
  alternatives:
  - turned
  - altered
  lexicon: LSJ
  rationale: The verb indicates a change or transformation. 'Changed' is straightforward
    modern English and preserves the direct causation attributed to God.
- source_word: τὸ πνεῦμα τοῦ βασιλέως
  chosen: the king’s spirit
  alternatives:
  - the king’s disposition
  - the king’s mind
  lexicon: LSJ
  rationale: πνεῦμα here refers to the king’s inner disposition or temper. 'Spirit'
    keeps the source wording and preserves the theological texture of God affecting
    the ruler inwardly; the more interpretive alternatives were not necessary in the
    main text.
- source_word: εἰς πραΰτητα
  chosen: to gentleness
  alternatives:
  - to mildness
  - to meekness
  lexicon: LSJ
  rationale: πραΰτης denotes gentleness or mildness. 'Gentleness' is idiomatic and
    readable while conveying the king’s softened attitude.
- source_word: ἀγωνιάσας
  chosen: in anguish
  alternatives:
  - being distressed
  - in anxiety
  lexicon: LSJ
  rationale: The participle conveys intense distress or anxiety. Rendering it adverbially
    as 'in anguish' fits the flow of English and preserves the emotional force without
    overexpansion.
- source_word: ἀνεπήδησεν
  chosen: sprang up
  alternatives:
  - leaped up
  - jumped up
  lexicon: LSJ
  rationale: The verb suggests sudden movement upward. 'Sprang up' is vivid but not
    colloquial, fitting the narrative tone.
- source_word: ἀνέλαβεν αὐτὴν ἐπὶ τὰς ἀγκάλας αὐτοῦ
  chosen: took her into his arms
  alternatives:
  - lifted her onto his arms
  - received her in his embrace
  lexicon: LSJ
  rationale: The phrase describes physically taking Esther into his embrace. 'Took
    her into his arms' is natural English that preserves the concrete action.
- source_word: μέχρις οὗ κατέστη
  chosen: until she recovered
  alternatives:
  - until she steadied herself
  - until she was restored
  lexicon: LSJ
  rationale: The clause indicates a return to composure or stability after collapse/faintness.
    'Until she recovered' communicates the sense clearly in context.
- source_word: παρεκάλει
  chosen: comforted
  alternatives:
  - encouraged
  - consoled
  lexicon: LSJ
  rationale: The imperfect verb here carries the sense of speaking reassuringly. 'Comforted'
    fits the immediate context of Esther’s distress and the following phrase about
    peaceful words.
- source_word: λόγοις εἰρηνικοῖς
  chosen: with peaceful words
  alternatives:
  - with reassuring words
  - with words of peace
  lexicon: LSJ
  rationale: A fairly literal rendering is possible and readable. 'Peaceful words'
    preserves the lexical link to peace while still sounding natural enough in English.
