translation:
  text: And he said to him, “I saw you, lord, like an angel of God, and my heart was
    troubled with fear because of your glory.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I saw you as an angel of God.” The Greek ὡς can be rendered either “like”
      or “as,” but the sense is comparative rather than identifying.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶδόν
  chosen: I saw
  alternatives:
  - I have seen
  lexicon: BDAG
  rationale: Aorist indicative of ὁράω is best rendered as a simple past in this narrative
    setting.
- source_word: κύριε
  chosen: lord
  alternatives:
  - Lord
  - master
  lexicon: BDAG
  rationale: Although κύριος often defaults to 'Lord,' here it is direct address to
    a human royal figure in Esther's prayer narrative, so lowercase 'lord' better
    reflects the immediate referent without importing divine identification.
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: BDAG
  rationale: 'The comparison is simile rather than identity: the person is seen as
    resembling an angel of God, not being one.'
- source_word: ἄγγελον θεοῦ
  chosen: an angel of God
  alternatives:
  - the angel of God
  - a messenger of God
  lexicon: BDAG
  rationale: The anarthrous phrase is naturally indefinite here. 'Angel' is preferable
    to 'messenger' because the comparison evokes heavenly splendor and awe.
- source_word: ἐταράχθη
  chosen: was troubled
  alternatives:
  - was disturbed
  - was terrified
  lexicon: BDAG
  rationale: The passive aorist of ταράσσω denotes inward agitation. 'Was troubled'
    preserves the emotional disturbance while allowing the following phrase 'with
    fear' to specify the cause.
- source_word: ἡ καρδία μου
  chosen: my heart
  lexicon: BDAG
  rationale: Standard rendering preserving the Greek anthropological idiom for the
    inner self/emotions.
- source_word: ἀπὸ φόβου
  chosen: with fear
  alternatives:
  - from fear
  - because of fear
  lexicon: BDAG
  rationale: English idiom prefers 'with fear' after 'was troubled,' while still conveying
    fear as the source of the agitation.
- source_word: τῆς δόξης σου
  chosen: because of your glory
  alternatives:
  - at your glory
  - from your splendor
  lexicon: BDAG
  rationale: δόξα here refers to visible majesty or splendor. 'Glory' keeps the theological
    resonance, and 'because of' makes clear that this glory occasioned the fear.
