theological_decisions:
- issue: Rendering κύριε in direct address
  chosen_reading: lowercase 'lord' referring to a human ruler
  alternative_readings:
  - uppercase 'Lord'
  rationale: The immediate context in the Additions to Esther concerns Esther's fearful
    approach to the king. Rendering κύριε as lowercase avoids suggesting that the
    addressed figure is God while still preserving the honorific force of the Greek.
  doctrine_reference: 'DOCTRINE.md: κύριος default ''Lord'' unless context demands
    variance, which must be documented.'
