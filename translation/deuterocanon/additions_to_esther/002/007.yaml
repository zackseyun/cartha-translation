translation:
  text: so that those who were hostile before and are hostile now, after going down
    violently to Hades in a single day, may for all time afterward provide us with
    stable and undisturbed affairs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the underworld' for 'Hades.' The Greek names the realm
      of the dead, not specifically the place of final punishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυσμενεῖς
  chosen: hostile
  alternatives:
  - ill-disposed
  - enemies
  - malicious
  lexicon: LSJ
  rationale: The adjective denotes those bearing ill will. 'Hostile' is natural modern
    English and preserves the active adversarial sense without over-specifying formal
    enemy status.
- source_word: ἐν ἡμέρᾳ μιᾷ
  chosen: in a single day
  alternatives:
  - in one day
  - within one day
  lexicon: LSJ
  rationale: This idiom emphasizes the suddenness and concentration of the downfall.
    'In a single day' communicates that force clearly in idiomatic English.
- source_word: βιαίως
  chosen: violently
  alternatives:
  - by force
  - forcibly
  lexicon: LSJ
  rationale: The adverb marks a forceful, violent descent rather than a mere death.
    'Violently' best preserves the severity of the action.
- source_word: εἰς τὸν ἅδην κατελθόντες
  chosen: after going down ... to Hades
  alternatives:
  - after descending ... to the grave
  - after going down ... to the underworld
  lexicon: LSJ
  rationale: The Greek explicitly names Hades, the realm of the dead in Greek usage.
    Following source-language primacy, 'Hades' is retained rather than flattened to
    'grave,' while the participle is rendered temporally as 'after going down' for
    readable English.
- source_word: εἰς τὸν μετέπειτα χρόνον
  chosen: for all time afterward
  alternatives:
  - for the time thereafter
  - for the future time
  lexicon: LSJ
  rationale: The phrase points to the period following the enemies' destruction. 'For
    all time afterward' captures the durative sense in context, where the prayer seeks
    lasting security.
- source_word: εὐσταθῆ
  chosen: stable
  alternatives:
  - secure
  - well-ordered
  - firm
  lexicon: LSJ
  rationale: The adjective describes settled, secure conditions. 'Stable' pairs well
    with the following term and fits political/social affairs.
- source_word: ἀτάραχα
  chosen: undisturbed
  alternatives:
  - tranquil
  - untroubled
  - free from turmoil
  lexicon: LSJ
  rationale: The term conveys freedom from agitation or turmoil. 'Undisturbed' preserves
    that sense in a concise way and complements 'stable' without redundancy.
- source_word: παρέχωσιν ἡμῖν ... τὰ πράγματα
  chosen: provide us with ... affairs
  alternatives:
  - grant us ... circumstances
  - make conditions for us
  - cause our situation to be
  lexicon: LSJ
  rationale: τὰ πράγματα here refers broadly to the state of affairs or public conditions.
    'Provide us with stable and undisturbed affairs' stays close to the Greek structure
    while remaining intelligible.
- source_word: διὰ τέλους
  chosen: for all time
  alternatives:
  - to the end
  - continually
  - permanently
  lexicon: LSJ
  rationale: The phrase expresses enduring continuance. In this context of a royal
    wish for lasting peace, 'for all time' communicates the intended permanence more
    naturally than the more literal but potentially ambiguous 'to the end.'
