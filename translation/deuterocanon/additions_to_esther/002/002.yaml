translation:
  text: The matter was being hurried along even in Susa; but the king and Haman were
    reclining at table, while the city was in turmoil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were feasting' or 'were banqueting.' The Greek verb specifically evokes
      reclining on dining couches at a formal meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσπεύδετο
  chosen: was being hurried along
  alternatives:
  - was hastened
  - was pressed on
  - was being carried out quickly
  lexicon: LSJ
  rationale: Imperfect passive conveys an ongoing process being accelerated. 'Was
    being hurried along' preserves both the passive sense and the urgency without
    sounding wooden.
- source_word: τὸ πρᾶγμα
  chosen: the matter
  alternatives:
  - the business
  - the affair
  - the decree
  lexicon: LSJ
  rationale: A broad term meaning matter/affair/business. 'The matter' keeps the Greek's
    generality; 'decree' would over-specify what the noun itself does not explicitly
    state, even though the context concerns a royal edict.
- source_word: καὶ εἰς Σουσάν
  chosen: even in Susa
  alternatives:
  - also in Susa
  - into Susa
  lexicon: LSJ
  rationale: The phrase marks extension of the action to Susa as well. 'Even in Susa'
    captures the sense naturally in English; 'into Susa' would be too spatially literal
    here.
- source_word: ἐκωθωνίζοντο
  chosen: were reclining at table
  alternatives:
  - were feasting
  - were banqueting
  - were drinking
  lexicon: LSJ
  rationale: The verb refers to reclining on couches at a meal, a culturally specific
    banquet posture. 'Were reclining at table' preserves the image more precisely
    than the more interpretive 'were feasting,' while still being readable.
- source_word: ἐταράσσετο
  chosen: was in turmoil
  alternatives:
  - was disturbed
  - was thrown into confusion
  - was troubled
  lexicon: LSJ
  rationale: The imperfect indicates an ongoing state of agitation. 'Was in turmoil'
    communicates civic unrest idiomatically and fits the contrast with the king's
    calm banqueting posture.
- source_word: ἡ πόλις
  chosen: the city
  alternatives:
  - the town
  lexicon: LSJ
  rationale: Standard rendering of πόλις. In context it refers to Susa's urban population/civic
    body, but 'the city' is the most direct and sufficiently clear translation.
