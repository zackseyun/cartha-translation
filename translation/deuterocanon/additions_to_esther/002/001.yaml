translation:
  text: 'And this is the copy of the letter: Great King Artaxerxes writes these things
    to the rulers and local governors of the one hundred twenty-seven provinces from
    India to Ethiopia, who are subject to him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'regions' or 'lands' for 'provinces'; the Greek term is broader, but
      the context is imperial administration.
    reason: lexical_alternative
  - marker: b
    text: '''Writes these things'' could also be rendered ''writes as follows.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστολῆς
  chosen: letter
  alternatives:
  - written decree
  - epistle
  lexicon: LSJ
  rationale: ἐπιστολή commonly denotes a letter or written communication. 'Letter'
    is the most natural modern English equivalent here.
- source_word: ἀντίγραφον
  chosen: copy
  alternatives:
  - transcript
  - duplicate
  lexicon: LSJ
  rationale: ἀντίγραφον refers to a copy or duplicate of a document. 'Copy' is clear
    and idiomatic in English legal/administrative context.
- source_word: Βασιλεὺς μέγας
  chosen: Great King
  alternatives:
  - the great king
  - King, the Great
  lexicon: LSJ
  rationale: This is a royal title. 'Great King' preserves the titulary force and
    formal tone better than a looser paraphrase.
- source_word: Ἀρταξέρξης
  chosen: Artaxerxes
  lexicon: LSJ
  rationale: Standard English transliteration of the royal name.
- source_word: χωρῶν
  chosen: provinces
  alternatives:
  - regions
  - lands
  - districts
  lexicon: LSJ
  rationale: In this imperial administrative context, 'provinces' best conveys territorial
    divisions under royal rule, even though the Greek term can more broadly mean lands
    or regions.
- source_word: ἄρχουσι
  chosen: rulers
  alternatives:
  - officials
  - governors
  lexicon: LSJ
  rationale: ἄρχοντες are those exercising authority. 'Rulers' is broad enough to
    preserve the Greek without collapsing it into the more specific τοπάρχαις.
- source_word: τοπάρχαις
  chosen: local governors
  alternatives:
  - district rulers
  - toparchs
  lexicon: LSJ
  rationale: τοπάρχης denotes a ruler over a locality or district. 'Local governors'
    communicates the administrative sense in accessible English.
- source_word: ὑποτεταγμένοις
  chosen: who are subject to him
  alternatives:
  - subordinate
  - under authority
  lexicon: LSJ
  rationale: The participle indicates subordination to the king. Supplying 'to him'
    makes the relation explicit in natural English and fits the syntax of the address.
- source_word: τάδε γράφει
  chosen: writes these things
  alternatives:
  - writes as follows
  - sends this message
  lexicon: LSJ
  rationale: Literally 'writes these things.' This preserves the formal epistolary
    style while remaining readable.
