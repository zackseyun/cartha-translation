theological_decisions:
- issue: Violence language in a royal decree
  chosen_reading: Translate the exterminatory command directly without softening
  alternative_readings:
  - Use milder administrative language such as 'remove' or 'deal with'
  rationale: The Greek explicitly commands total destruction, including wives and
    children, and adds 'root and branch' plus 'without any pity or sparing.' The translation
    should preserve the moral severity of the text rather than euphemize it.
  doctrine_reference: Translation philosophy §§1, 6
