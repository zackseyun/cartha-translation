translation:
  text: a Jewish man living in Susa the city, a great man, serving in the court of
    the king;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the city of Susa.' The Greek explicitly says 'in Susa the city,'
      which may simply identify Susa as an urban center.
    reason: lexical_alternative
  - marker: b
    text: Or 'a prominent man.' The Greek 'great' likely refers to status or importance
      in the royal setting.
    reason: lexical_alternative
  - marker: c
    text: Or 'attending in the king’s court.' The participle can denote service or
      attendance at court.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The noun is grammatically masculine and here refers to a specific male
    individual, not humanity in general. 'Man' is therefore gender-accurate and fits
    the narrative introduction.
- source_word: Ἰουδαῖος
  chosen: Jewish
  alternatives:
  - Judean
  - a Jew
  lexicon: BDAG
  rationale: As an attributive descriptor with ἄνθρωπος, the sense is ethnic/religious
    identity. 'Jewish man' is natural English. 'Judean' is possible in some contexts,
    but here the broader ethnic sense is more likely than a narrowly geographic one.
- source_word: οἰκῶν
  chosen: living
  alternatives:
  - dwelling
  - residing
  lexicon: BDAG
  rationale: The participle denotes residence. 'Living' is idiomatic modern English
    while remaining close to the Greek.
- source_word: ἐν Σούσοις τῇ πόλει
  chosen: in Susa the city
  alternatives:
  - in the city of Susa
  - in Susa
  lexicon: BDAG
  rationale: The Greek explicitly includes both the place name and 'the city.' The
    rendering preserves that appositional fullness rather than reducing it to simply
    'in Susa.'
- source_word: μέγας
  chosen: great
  alternatives:
  - important
  - prominent
  lexicon: BDAG
  rationale: The adjective can denote status or prominence. 'Great' is the most direct
    equivalent and preserves the elevated tone; 'important' would interpret the nuance
    more narrowly.
- source_word: θεραπεύων
  chosen: serving
  alternatives:
  - attending
  - ministering
  lexicon: BDAG
  rationale: In court context the participle refers to rendering service or attendance.
    'Serving' is clear and broad enough without importing specifically religious overtones
    that 'ministering' might suggest.
- source_word: αὐλή
  chosen: court
  alternatives:
  - palace court
  - palace
  lexicon: BDAG
  rationale: The term denotes the royal court/courtyard sphere. 'Court' best captures
    the institutional setting; 'palace' would shift from personnel sphere to building.
- source_word: βασιλεύς
  chosen: king
  alternatives:
  - the monarch
  lexicon: BDAG
  rationale: Standard rendering for the title, with no special ambiguity here.
