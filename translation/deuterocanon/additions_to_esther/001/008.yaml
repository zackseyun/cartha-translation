reference: Additions to Esther 1:8
source:
  edition: lxx-swete-1909
  text: καὶ ἐταράχθη δίκαιον πᾶν ἔθνος, φοβούμενοι τὰ ἑαυτῶν κακά, καὶ ἡτοιμάσθησαν
    ἀπολέσθαι.
  language: Greek
  pages:
