translation:
  text: And every righteous nation was thrown into turmoil, fearing their own calamities,
    and they prepared to perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every just nation was troubled.' The Greek δίκαιον can be rendered 'righteous'
      or 'just,' and ἐταράχθη can be translated 'was troubled' or 'was disturbed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their own evils' or 'the disasters facing them.' The phrase τὰ ἑαυτῶν
      κακά refers to the harms or calamities they feared would come upon them.
    reason: lexical_alternative
  - marker: c
    text: Or 'they prepared to be destroyed.' The infinitive ἀπολέσθαι can emphasize
      either perishing or being destroyed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταράχθη
  chosen: was thrown into turmoil
  alternatives:
  - was troubled
  - was disturbed
  - was shaken
  lexicon: BDAG
  rationale: The passive of ταράσσω conveys being inwardly and outwardly disturbed.
    'Was thrown into turmoil' preserves the force of the passive and the collective
    agitation of the people more vividly than the flatter 'was troubled.'
- source_word: δίκαιον
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: BDAG
  rationale: δίκαιος language commonly carries moral overtones of righteousness, not
    merely legal justice. Here it characterizes the nation(s) as innocent/upright
    in contrast to impending evil, so 'righteous' best preserves that weight.
- source_word: πᾶν ἔθνος
  chosen: every ... nation
  alternatives:
  - every people
  - all the nations
  - every ethnic group
  lexicon: BDAG
  rationale: ἔθνος most basically means 'nation' or 'people.' The singular with πᾶν
    is naturally rendered 'every nation.' This keeps the wording close to the Greek
    without overinterpreting whether the reference is to each people individually
    or to the whole people collectively.
- source_word: φοβούμενοι
  chosen: fearing
  alternatives:
  - being afraid of
  - in fear of
  lexicon: BDAG
  rationale: The participle expresses the reason or attendant circumstance of their
    turmoil. 'Fearing' is concise and natural in English while preserving the participial
    connection.
- source_word: τὰ ἑαυτῶν κακά
  chosen: their own calamities
  alternatives:
  - their own evils
  - the disasters facing them
  - their own troubles
  lexicon: BDAG
  rationale: κακά can mean 'evils' broadly, but in this context of threatened destruction
    it points to harmful events or disasters befalling them. 'Calamities' communicates
    impending misfortune more clearly in idiomatic English.
- source_word: ἡτοιμάσθησαν
  chosen: they prepared
  alternatives:
  - they made ready
  - they were prepared
  lexicon: BDAG
  rationale: The aorist passive/middle-form here functions effectively as an intransitive
    'made themselves ready/prepared themselves.' 'They prepared' is concise and idiomatic.
- source_word: ἀπολέσθαι
  chosen: to perish
  alternatives:
  - to be destroyed
  - to die
  lexicon: BDAG
  rationale: ἀπόλλυμι in the middle infinitive can mean 'to perish' or 'to be destroyed.'
    'To perish' preserves the gravity while leaving open whether the emphasis is death
    or annihilating ruin.
