translation:
  text: And Mordecai remained in the court with Gabatha and Tharra, the two eunuchs
    of the king who were guarding the court,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was still' or 'remained quiet.' The Greek verb can denote quietness
      or stillness; 'kept quiet' is chosen because it fits the narrative setting of
      palace intrigue.
    reason: lexical_alternative
  - marker: b
    text: Or 'courtyard' or 'palace court.' The Greek word can refer to the enclosed
      court area of a royal residence.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡσύχασεν
  chosen: kept quiet
  alternatives:
  - was still
  - remained quiet
  - was at rest
  lexicon: BDAG
  rationale: The aorist of ἡσυχάζω commonly denotes being quiet or keeping still/silent.
    In this narrative setting, 'kept quiet' best preserves the verbal sense without
    overinterpreting it as mere physical rest. It also fits the ensuing court-intrigue
    context better than 'was at rest.'
- source_word: αὐλή
  chosen: court
  alternatives:
  - palace court
  - courtyard
  lexicon: LSJ
  rationale: αὐλή can mean courtyard or palace court. Because the verse concerns royal
    eunuchs and palace security, 'court' captures the royal setting while remaining
    concise. 'Courtyard' is possible but sounds more purely architectural than administrative/royal
    here.
- source_word: μετά
  chosen: with
  alternatives:
  - among
  lexicon: BDAG
  rationale: 'The preposition straightforwardly indicates association here: Mordecai
    was with Gabatha and Tharra.'
- source_word: εὐνούχων
  chosen: eunuchs
  alternatives:
  - court officials
  - chamberlains
  lexicon: BDAG
  rationale: The Greek explicitly says 'eunuchs.' Following original-language primacy,
    the translation keeps the concrete term rather than substituting a traditional
    but less precise court title.
- source_word: φυλασσόντων
  chosen: were guarding
  alternatives:
  - keeping watch over
  - watching
  lexicon: BDAG
  rationale: The participle denotes active guarding/keeping watch. 'Were guarding'
    gives a natural English rendering of the ongoing role of these eunuchs in relation
    to the court.
- source_word: Μαρδοχαῖος
  chosen: Mordecai
  lexicon: LSJ
  rationale: Standard English transliteration of the personal name.
- source_word: Γαβὰθα
  chosen: Gabatha
  alternatives:
  - Gabatha
  lexicon: LSJ
  rationale: A direct transliteration from the Greek form preserves the source witness.
- source_word: Θαῤῥὰ
  chosen: Tharra
  alternatives:
  - Tharrah
  lexicon: LSJ
  rationale: A direct transliteration from the Greek form preserves the source witness.
