translation:
  text: He was from the captivity that Nebuchadnezzar king of Babylon had carried
    away from Jerusalem with Jeconiah king of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the exiles' or 'from the exile.' The Greek literally says 'from
      the captivity.'
    reason: lexical_alternative
  - marker: b
    text: '''Judea'' reflects the Greek wording; the historical referent is the Judean
      royal line associated with Judah.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐκ τῆς αἰχμαλωσίας
  chosen: from the captivity
  alternatives:
  - among the exiles
  - from the exile
  lexicon: BDAG
  rationale: The phrase denotes origin from the deported community. 'From the captivity'
    stays close to the Greek and matches the singular abstract noun αἰχμαλωσία, while
    remaining understandable in English.
- source_word: ᾐχμαλώτευσεν
  chosen: had carried away
  alternatives:
  - took captive
  - deported
  lexicon: BDAG
  rationale: The verb refers to taking people into captivity. 'Had carried away' fits
    the relative clause naturally in English and conveys forced removal without overtechnical
    modern terminology.
- source_word: Ναβουχοδονόσορ
  chosen: Nebuchadnezzar
  alternatives:
  - Nabuchodonosor
  rationale: Standard English transliteration for the Babylonian king, preferred for
    readability over a more Greek-shaped form.
- source_word: μετὰ Ἰεχονίου
  chosen: with Jeconiah
  alternatives:
  - along with Jeconiah
  rationale: μετά with the genitive indicates accompaniment. 'With Jeconiah' is concise
    and accurate.
- source_word: τῆς Ἰουδαίας
  chosen: of Judea
  alternatives:
  - of Judah
  lexicon: BDAG
  rationale: The Greek adjective/noun here reflects the Greek geographical-political
    form Ἰουδαία. 'Judea' follows the Greek wording more directly than 'Judah,' though
    the historical referent is the Judean kingdom.
