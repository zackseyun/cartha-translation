translation:
  text: And the king wrote these words as a memorial, and Mordecai wrote concerning
    these words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a memorial' or 'for remembrance.' The Greek εἰς μνημόσυνον can emphasize
      either a commemorative memorial or a written record preserved for remembrance.
    reason: lexical_alternative
  - marker: b
    text: Or 'concerning these matters.' The Greek λόγοι can mean 'words' or, more
      broadly, 'matters/things' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - recorded
  - inscribed
  lexicon: BDAG
  rationale: The aorist of γράφω straightforwardly denotes writing/recording. 'Wrote'
    is the most direct and natural English equivalent and preserves the repeated verb
    in both clauses.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - these matters
  - these things
  - this account
  lexicon: BDAG
  rationale: λόγοι can mean 'words,' 'matters,' or 'accounts' depending on context.
    Here the phrase is repeated in both clauses and refers to the content just mentioned;
    'these words' keeps the lexical form visible without over-interpreting.
- source_word: εἰς μνημόσυνον
  chosen: as a memorial
  alternatives:
  - for a memorial
  - as a record
  - for remembrance
  lexicon: BDAG
  rationale: μνημόσυνον denotes something serving as remembrance or memorial. 'As
    a memorial' is idiomatic in English while preserving the commemorative/record-keeping
    sense. 'For remembrance' is possible but less natural here.
- source_word: Μαρδοχαῖος
  chosen: Mordecai
  rationale: Personal names are transliterated by project policy. 'Mordecai' is the
    standard English form of Μαρδοχαῖος.
- source_word: περὶ τῶν λόγων τούτων
  chosen: concerning these words
  alternatives:
  - about these matters
  - regarding these things
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'concerning/about.' Retaining 'these
    words' matches the repeated λόγοι phrase in the verse and avoids collapsing the
    wording into a looser paraphrase.
