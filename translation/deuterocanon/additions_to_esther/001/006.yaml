translation:
  text: And at their cry every nation was made ready for war, so as to fight against
    the nation of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''voice'' or ''sound'': the Greek can refer more broadly to the noise
      or outcry they made.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the righteous nation.' The Greek phrase may be taken either as a genitive
      expression ('nation of the righteous') or as a more compact descriptive idea.
    reason: alternative_reading
lexical_decisions:
- source_word: φωνῇ
  chosen: cry
  alternatives:
  - voice
  - sound
  - call
  lexicon: LSJ
  rationale: The dative with καί and αὐτῶν here denotes the sound/utterance issuing
    from them. In this martial context, 'cry' best conveys an inciting shout without
    over-specifying its content.
- source_word: ἡτοιμάσθη
  chosen: was made ready
  alternatives:
  - was prepared
  - was readied
  lexicon: LSJ
  rationale: Aorist passive indicates that the nation(s) came into a state of readiness
    through an external prompting. 'Was made ready' preserves the passive force more
    clearly than the simpler 'prepared itself.'
- source_word: πᾶν ἔθνος
  chosen: every nation
  alternatives:
  - all the nations
  - every people
  lexicon: LSJ
  rationale: The singular distributive construction is naturally rendered 'every nation.'
    'People' is possible, but 'nation' better matches ἔθνος here, especially with
    the later contrastive 'nation of the righteous.'
- source_word: εἰς πόλεμον
  chosen: for war
  alternatives:
  - for battle
  - for warfare
  lexicon: LSJ
  rationale: The preposition εἰς with πόλεμον expresses movement/preparation toward
    war. 'For war' is concise and idiomatic.
- source_word: ὥστε πολεμῆσαι
  chosen: so as to fight
  alternatives:
  - with the result that they fought
  - to wage war
  lexicon: LSJ
  rationale: ὥστε with the infinitive commonly expresses intended or natural result.
    'So as to fight' preserves that sense without forcing either strict purpose or
    completed-result nuance.
- source_word: δικαίων ἔθνος
  chosen: the nation of the righteous
  alternatives:
  - the righteous nation
  - the nation of righteous people
  lexicon: LSJ
  rationale: The anarthrous genitive δικαίων most naturally qualifies ἔθνος as a people
    characterized by righteous persons. 'The nation of the righteous' keeps the Greek
    order and leaves open whether this is a corporate designation or a descriptive
    phrase.
