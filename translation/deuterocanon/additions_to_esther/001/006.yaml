theological_decisions:
- issue: Identification of δικαίων ἔθνος
  chosen_reading: Render descriptively as 'the nation of the righteous' without specifying
    Israel/Jews in the main text.
  alternative_readings:
  - the righteous nation
  - the nation of the Jews
  rationale: The Greek text itself uses a descriptive phrase rather than an explicit
    ethnic name. To preserve the text's wording and theological tension, the translation
    does not import a more specific identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
