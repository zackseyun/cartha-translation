translation:
  text: And the king examined the two eunuchs, and after they confessed, they were
    led away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'questioned' for 'examined'; the Greek can denote formal inquiry.
    reason: lexical_alternative
  - marker: b
    text: Or 'court officials'; however, the Greek specifically says 'eunuchs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξήτασεν
  chosen: examined
  alternatives:
  - questioned
  - investigated
  - interrogated
  lexicon: LSJ
  rationale: The verb indicates inquiry or examination. 'Examined' preserves the king's
    active investigation without over-specifying a harsh judicial tone that 'interrogated'
    might imply.
- source_word: εὐνούχους
  chosen: eunuchs
  alternatives:
  - court officials
  - chamberlains
  lexicon: LSJ
  rationale: The Greek term literally denotes eunuchs. Although such figures often
    function as court officials, the source text uses the specific term, so the more
    literal rendering is preferred.
- source_word: ὁμολογήσαντες
  chosen: after they confessed
  alternatives:
  - having admitted it
  - after they acknowledged it
  lexicon: LSJ
  rationale: The participle conveys an admission or confession in response to examination.
    'After they confessed' gives clear English sequence and preserves the sense of
    acknowledgment of guilt.
- source_word: ἀπήχθησαν
  chosen: they were led away
  alternatives:
  - they were taken away
  - they were brought away
  lexicon: LSJ
  rationale: The passive verb indicates removal under authority. 'Led away' is natural
    English and suggests custodial action without adding details not present in the
    Greek.
