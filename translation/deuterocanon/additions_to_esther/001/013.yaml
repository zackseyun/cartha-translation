translation:
  text: He listened to their plans and investigated their intentions, and he learned
    that they were preparing to lay hands on King Artaxerxes. And he informed the
    king about them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to attack King Artaxerxes.' The Greek idiom literally says 'to lay hands
      on' him and can denote hostile action more specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκρόασεν
  chosen: listened to
  alternatives:
  - heard
  - gave ear to
  lexicon: BDAG
  rationale: The verb denotes attentive listening rather than mere auditory perception.
    'Listened to' captures the active, deliberate sense in natural English.
- source_word: λογισμοὺς
  chosen: plans
  alternatives:
  - thoughts
  - reasonings
  - schemes
  lexicon: BDAG
  rationale: In this court-intrigue context, the term refers not merely to internal
    thoughts but to deliberations with practical intent. 'Plans' fits the narrative
    sense better than the more abstract 'thoughts.'
- source_word: μερίμνας
  chosen: concerns
  alternatives:
  - cares
  - anxieties
  - worries
  lexicon: BDAG
  rationale: The noun can denote anxieties or cares. Here it likely refers to the
    matters occupying them in their plotting. 'Concerns' is broad enough to preserve
    the sense without overstating emotional distress.
- source_word: ἐξηραύνησεν
  chosen: investigated
  alternatives:
  - examined thoroughly
  - searched out
  lexicon: BDAG
  rationale: The compound verb conveys careful inquiry or searching out. 'Investigated'
    gives a clear modern equivalent appropriate to Mordecai's discovery process.
- source_word: ἑτοιμάζουσιν
  chosen: were preparing
  alternatives:
  - were getting ready
  - were making ready
  lexicon: BDAG
  rationale: The present tense in narrative context suggests ongoing preparation.
    'Were preparing' reflects that progressive sense in idiomatic English.
- source_word: τὰς χεῖρας ἐπιβαλεῖν
  chosen: to lay hands on
  alternatives:
  - to attack
  - to seize
  - to strike
  lexicon: BDAG
  rationale: This idiom literally means 'to put hands on' and can imply hostile action.
    'Lay hands on' preserves the idiomatic force while allowing the reader to sense
    the physical threat without over-specifying whether the intent was arrest or assassination.
- source_word: ὑπέδειξεν
  chosen: informed
  alternatives:
  - reported
  - pointed out
  - made known
  lexicon: BDAG
  rationale: The verb here indicates that Mordecai brought the matter to the king's
    attention. 'Informed' is concise and natural, without implying more than the Greek
    states.
