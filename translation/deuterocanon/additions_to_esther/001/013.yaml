  text: ἠκρόασεν τε αὐτῶν τοὺς λογισμοὺς καὶ τὰς μερίμνας αὐτῶν ἐξηραύνησεν, καὶ ἔμαθεν
    ὅτι ἑτοιμάζουσιν τὰς χεῖρας ἐπιβαλεῖν Ἀρταξέρξῃ τῷ βασιλεῖ. καὶ ὑπέδειξεν τῷ βασιλεῖ
