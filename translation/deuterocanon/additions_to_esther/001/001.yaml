translation:
  text: In the second year of the reign of Artaxerxes the great king, on the first
    day of Nisan, Mordecai son of Jair, son of Shimei, son of Kish, of the tribe of
    Benjamin, saw a dream,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''saw a dream''; English could also be rendered more idiomatically,
      ''had a dream.'''
    reason: lexical_alternative
  - marker: b
    text: The month name appears in Greek as Nisa; it is rendered here as Nisan, the
      standard English form of the Jewish month name.
    reason: cultural_note
lexical_decisions:
- source_word: Ἔτους δευτέρου βασιλεύοντος
  chosen: In the second year of the reign
  alternatives:
  - In the second year, while ... was reigning
  - In the second year of the kingship
  lexicon: LSJ
  rationale: The genitive absolute-like dating formula is most naturally rendered
    as a temporal clause in English. 'Of the reign' is idiomatic and preserves the
    regnal-year sense without over-literal awkwardness.
- source_word: Ἀρταξέρξου
  chosen: Artaxerxes
  rationale: Personal royal name is transliterated per project philosophy.
- source_word: τοῦ μεγάλου βασιλέως
  chosen: the great king
  alternatives:
  - the great King
  - the mighty king
  lexicon: LSJ
  rationale: A standard royal epithet in Persian context; lower-case 'king' fits English
    style here and preserves the descriptive title.
- source_word: τῇ μιᾷ τοῦ Νεισὰ
  chosen: on the first day of Nisan
  alternatives:
  - on the first of Nisan
  - on day one of Nisan
  lexicon: LSJ
  rationale: The Greek literally says 'on the one of Nisa'; in calendrical usage this
    means the first day of the month. 'Nisan' is the standard English transliteration
    of the month name.
- source_word: ἐνύπνιον εἶδεν
  chosen: saw a dream
  alternatives:
  - had a dream
  - saw a vision in a dream
  lexicon: LSJ
  rationale: This is the straightforward Greek expression 'saw a dream.' English 'had
    a dream' is idiomatic, but 'saw a dream' keeps closer contact with the source
    while remaining understandable.
- source_word: Μαρδοχαῖος ὁ τοῦ Ἰαείρου, τοῦ Σεμεείου τοῦ Κεισαίου
  chosen: Mordecai son of Jair, son of Shimei, son of Kish
  alternatives:
  - Mordecai the son of Jair, the son of Shimei, the son of Kish
  rationale: The repeated genitives indicate ancestry. Rendering each with 'son of'
    makes the genealogy explicit in natural English.
- source_word: ἐκ φυλῆς Βενιαμείν
  chosen: of the tribe of Benjamin
  alternatives:
  - from the tribe of Benjamin
  lexicon: LSJ
  rationale: Both 'of' and 'from' are possible; 'of the tribe' is a standard genealogical
    expression in English and fits the lineage notice.
