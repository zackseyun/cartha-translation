  rationale: The surrounding imagery (thunder, earthquake, upheaval) suggests a broad
    terrestrial disturbance rather than merely a local territory. The rendering preserves
    the dream's heightened scale without importing later apocalyptic theology.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
