translation:
  text: And behold, two great dragons came forward, both ready to fight; and a great
    sound came from them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'both ready to wrestle'; the Greek verb can specifically denote wrestling
      or close combat.
    reason: lexical_alternative
  - marker: b
    text: Or 'a great voice/cry came from them'; the Greek allows 'voice,' but 'sound'
      is chosen to avoid implying articulate speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained as 'behold' to preserve the vivid, visionary force of the particle
    in this dream-report context; 'look' would sound too colloquial.
- source_word: δράκοντες
  chosen: dragons
  alternatives:
  - serpents
  - monsters
  lexicon: LSJ
  rationale: The Greek term ordinarily denotes dragons/serpents in elevated or mythic
    imagery. 'Dragons' best preserves the apocalyptic-symbolic force of the vision
    without flattening it to a generic 'monsters.'
- source_word: μεγάλοι
  chosen: great
  alternatives:
  - large
  lexicon: BDAG
  rationale: '''Great'' can convey both size and portentous significance in visionary
    literature, whereas ''large'' is merely physical.'
- source_word: ἕτοιμοι
  chosen: ready
  alternatives:
  - prepared
  lexicon: BDAG
  rationale: '''Ready'' is natural modern English and adequately conveys a state of
    preparedness.'
- source_word: προῆλθον
  chosen: came forward
  alternatives:
  - advanced
  - went forth
  lexicon: BDAG
  rationale: '''Came forward'' captures movement into view or into confrontation in
    readable English; ''went forth'' is too archaic, and ''advanced'' may sound overly
    military.'
- source_word: ἀμφότεροι
  chosen: both
  alternatives:
  - the two of them
  lexicon: BDAG
  rationale: Simple and direct rendering of the dual-inclusive sense.
- source_word: παλαίειν
  chosen: to fight
  alternatives:
  - to wrestle
  - to struggle
  lexicon: LSJ
  rationale: Although the verb can specifically suggest wrestling, in this context
    of two dragons confronting one another, 'to fight' communicates the broader hostile
    clash more naturally in English. The more specific nuance is preserved in a footnote.
- source_word: φωνὴ μεγάλη
  chosen: a loud sound
  alternatives:
  - a great voice
  - a loud cry
  - a great roar
  lexicon: BDAG
  rationale: φωνή can mean voice, cry, or sound. Because the subject is two dragons
    and the Greek does not specify articulated speech, 'a loud sound' avoids over-interpretation
    while preserving the intensity marked by μεγάλη.
- source_word: αὐτῶν
  chosen: from them
  alternatives:
  - their
  - of them
  lexicon: BDAG
  rationale: With ἐγένετο plus φωνή, rendering the genitive as source ('from them')
    is the clearest idiomatic English expression.
