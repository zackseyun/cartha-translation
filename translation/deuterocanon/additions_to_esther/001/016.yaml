translation:
  text: And the king ordered Mordecai to serve in the court, and he gave him gifts
    on account of these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at court.' The Greek phrase literally says 'in the court,' referring
      to service within the royal court or palace precinct.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέταξεν
  chosen: ordered
  alternatives:
  - commanded
  - appointed
  lexicon: BDAG
  rationale: The verb denotes giving an authoritative directive. 'Ordered' is natural
    modern English and preserves royal authority without the stiffness of 'commanded.'
    'Appointed' would overread the infinitive construction as a formal office-bestowal
    rather than a command to perform service.
- source_word: θεραπεύειν
  chosen: to serve
  alternatives:
  - to attend
  - to minister
  lexicon: LSJ
  rationale: In court context, θεραπεύειν commonly refers to attendance or service.
    'To serve' best fits idiomatic English and the royal-court setting. 'To minister'
    sounds overly religious here, and 'to attend' is possible but narrower.
- source_word: ἐν τῇ αὐλῇ
  chosen: in the court
  alternatives:
  - in the palace court
  - at court
  lexicon: LSJ
  rationale: αὐλή can mean court/courtyard/palace precinct. In this narrative setting
    it refers to the royal court environment. 'In the court' preserves the locative
    sense of the Greek more directly than the idiomatic but slightly interpretive
    'at court.'
- source_word: δόματα
  chosen: gifts
  alternatives:
  - presents
  - rewards
  lexicon: LSJ
  rationale: δόματα denotes gifts or presents. 'Gifts' is the most straightforward
    rendering. 'Rewards' would make the king's motive more explicit than the noun
    itself requires.
- source_word: περὶ τούτων
  chosen: because of these things
  alternatives:
  - for this
  - concerning these matters
  - on account of this
  lexicon: BDAG
  rationale: The phrase indicates occasion or reason in context. 'Because of these
    things' keeps the plural demonstrative and reflects that the gifts were given
    on account of the preceding events. Singular renderings are smoother but less
    exact.
