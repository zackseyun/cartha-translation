translation:
  text: Light and the sun rose, and the lowly were exalted and devoured the glorious.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the humble' for 'the lowly.' The Greek can describe either humble disposition
      or low social status; the main text preserves the reversal of status.
    reason: lexical_alternative
  - marker: b
    text: Or 'the honored' or 'the noble' for 'the glorious.' The Greek refers to
      those possessing honor or renown.
    reason: lexical_alternative
lexical_decisions:
- source_word: φῶς
  chosen: Light
  alternatives:
  - A light
  - Daylight
  lexicon: LSJ
  rationale: Rendered as the bare noun 'Light' to match the Greek's asyndetic, image-like
    opening. 'Daylight' is possible in context, but the paired imagery with 'the sun
    rose' favors preserving the symbolic force rather than reducing it to a time-of-day
    expression.
- source_word: ὁ ἥλιος
  chosen: the sun
  lexicon: LSJ
  rationale: Straightforward lexical rendering of the nominative phrase.
- source_word: ἀνέτειλεν
  chosen: rose
  alternatives:
  - dawned
  - came up
  lexicon: LSJ
  rationale: The verb commonly describes the rising of the sun. 'Rose' is idiomatic
    and keeps the imagery concise.
- source_word: οἱ ταπεινοὶ
  chosen: the lowly
  alternatives:
  - the humble
  - the oppressed
  lexicon: LSJ
  rationale: ταπεινός can denote humble or lowly status. 'The lowly' best preserves
    the social reversal motif without over-specifying inward virtue ('humble') or
    external victimization ('oppressed').
- source_word: ὑψώθησαν
  chosen: were lifted up
  alternatives:
  - were exalted
  - were raised high
  lexicon: LSJ
  rationale: Passive verb of elevation. 'Were lifted up' is natural modern English
    and preserves the reversal imagery; 'were exalted' is possible but sounds more
    formal and can imply honor more narrowly.
- source_word: κατέφαγον
  chosen: devoured
  alternatives:
  - ate up
  - consumed
  lexicon: LSJ
  rationale: A strong verb meaning to eat down/up, here metaphorical in a triumph
    scene. 'Devoured' preserves the vividness better than the flatter 'consumed.'
- source_word: τοὺς ἐνδόξους
  chosen: the glorious
  alternatives:
  - the honored
  - the noble
  - the powerful
  lexicon: LSJ
  rationale: ἔνδοξος literally denotes those held in glory/honor. 'The glorious' stays
    closest to the Greek form and preserves the stark contrast with 'the lowly,' though
    'the honored' is a viable interpretive alternative.
