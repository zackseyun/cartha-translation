- issue: Whether the imagery should be flattened into a purely literal narrative statement
    or preserved as symbolic reversal language
  chosen_reading: 'Preserve the imagery directly: ''Light and the sun rose ... the
    lowly were lifted up and devoured the glorious.'''
  alternative_readings:
  - Interpret more dynamically as a statement of deliverance and victory
  rationale: The verse is highly compressed and image-driven. Optimal equivalence
    here favors retaining the symbolic and dramatic language rather than unpacking
    it into explanatory prose the Greek itself does not supply.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without paraphrase'
