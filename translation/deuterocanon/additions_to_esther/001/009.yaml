theological_decisions:
- issue: Nature of the imagery in the second clause
  chosen_reading: Retain the simile-like wording 'as it were' and do not collapse
    the image into a literal historical description.
  alternative_readings:
  - Translate more literally as 'as if from a little spring'
  - Smooth into a direct statement without the comparative marker
  rationale: The Greek includes ὡσανεί, signaling comparison or visionary approximation.
    Preserving this avoids overstating the literalness of the river image and keeps
    the text's symbolic tension intact.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
