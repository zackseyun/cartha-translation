translation:
  text: And they cried out to God, and from their cry there came, as it were, a great
    river from a little spring, abundant water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there arose, as if from a small spring, a great river, much water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβόησαν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: BDAG
  rationale: The verb βοάω commonly denotes a loud cry or urgent appeal. In context,
    directed πρὸς τὸν θεόν, 'cried out' best conveys fervent petition without implying
    mere noise.
- source_word: πρὸς τὸν θεόν
  chosen: to God
  alternatives:
  - toward God
  lexicon: BDAG
  rationale: With verbs of calling, πρός naturally marks the addressee. 'To God' is
    idiomatic English and preserves the prayerful direction of the appeal.
- source_word: βοῆς
  chosen: cry
  alternatives:
  - outcry
  - shout
  lexicon: BDAG
  rationale: Using 'cry' maintains lexical consistency with ἐβόησαν while fitting
    the genitive construction ἀπὸ δὲ τῆς βοῆς αὐτῶν, 'from their cry.'
- source_word: ἐγένετο
  chosen: there came
  alternatives:
  - there arose
  - it became
  lexicon: BDAG
  rationale: Here ἐγένετο introduces the emergence of something rather than transformation
    into something else. 'There came' is natural English and suits the image of a
    river issuing forth.
- source_word: ὡσανεὶ
  chosen: as it were
  alternatives:
  - as if
  - so to speak
  lexicon: LSJ
  rationale: ὡσανεί marks comparison or approximation. 'As it were' preserves the
    figurative, visionary quality of the image without overinterpreting it.
- source_word: μικρᾶς πηγῆς
  chosen: a little spring
  alternatives:
  - a small spring
  - a tiny fountain
  lexicon: LSJ
  rationale: πηγή is a spring or fountainhead. 'Spring' is the clearest modern choice,
    and 'little' reflects μικρᾶς straightforwardly.
- source_word: ποταμὸς μέγας
  chosen: a great river
  alternatives:
  - a mighty river
  - a large river
  lexicon: LSJ
  rationale: The phrase is simple and emphatic. 'Great river' preserves the scale
    contrast with 'little spring' and avoids adding interpretive force beyond the
    Greek.
- source_word: ὕδωρ πολύ
  chosen: abundant water
  alternatives:
  - much water
  - plentiful water
  lexicon: LSJ
  rationale: The appositional phrase underscores the river's fullness. 'Abundant water'
    is idiomatic and preserves the emphasis on copiousness better than the more wooden
    'much water.'
