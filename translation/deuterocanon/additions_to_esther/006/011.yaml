translation:
  text: In the fourth year of the reign of Ptolemy and Cleopatra, Dositheus, who said
    that he was a priest and a Levite, and Ptolemy his son, brought in the following
    letter of the Purim festival, which they said also existed and had been translated
    by Lysimachus son of Ptolemy, one of those in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''of the Phrouraia,'' the Greek designation used here for the Jewish
      festival of Purim.'
    reason: lexical_alternative
  - marker: b
    text: Or 'which they said was extant and had been translated by Lysimachus son
      of Ptolemy.' The Greek wording is terse and may emphasize the document's existence/availability
      rather than its authenticity.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔτους τετάρτου
  chosen: In the fourth year
  alternatives:
  - In year four
  - In the fourth year
  lexicon: LSJ
  rationale: A standard dating formula. 'In the fourth year' is idiomatic English
    while preserving the genitive absolute-like temporal construction.
- source_word: Βασιλεύοντος
  chosen: of the reign of
  alternatives:
  - while ... was reigning
  - when ... ruled
  lexicon: LSJ
  rationale: The participle functions in a dating formula with the genitive, indicating
    the time of rule. 'Of the reign of' gives natural English and keeps the formal
    chronological sense.
- source_word: Πτολεμαίου καὶ Κλεοπάτρας
  chosen: Ptolemy and Cleopatra
  lexicon: LSJ
  rationale: These are personal names and are transliterated per project philosophy.
- source_word: εἰσήνεγκεν
  chosen: brought in
  alternatives:
  - presented
  - submitted
  - brought
  lexicon: LSJ
  rationale: The verb literally means 'brought in' or 'introduced.' In this colophon-like
    context it refers to formally bringing a document. 'Brought in' stays close to
    the Greek without overinterpreting the administrative setting.
- source_word: ὃς ἔφη εἶναι
  chosen: who said that he was
  alternatives:
  - who claimed to be
  - who declared himself to be
  lexicon: LSJ
  rationale: ἔφη can mean 'said' or 'claimed.' Because the wording may simply report
    Dositheus's self-identification without necessarily casting doubt, 'said that
    he was' is the more neutral rendering.
- source_word: ἱερεὺς καὶ Λευείτης
  chosen: a priest and a Levite
  alternatives:
  - a priest, that is, a Levite
  lexicon: LSJ
  rationale: The Greek coordinates the two nouns with καί. Although historically the
    pairing may sound unusual, the translation should preserve the source wording
    rather than harmonize it.
- source_word: τὴν προκειμένην ἐπιστολήν
  chosen: the following letter
  alternatives:
  - the letter set forth here
  - the present letter
  lexicon: LSJ
  rationale: προκειμένην here points to the document being placed before the reader.
    'The following letter' is clear modern English and fits the documentary context.
- source_word: τῶν Φρουραίων
  chosen: of the Purim festival
  alternatives:
  - of the Phrouraia
  - of the Watchers/Guardians
  lexicon: LSJ
  rationale: The form Φρουραίων reflects the Greek designation for the Jewish feast
    Purim in Esther's Greek tradition. Rendering the referent rather than transliterating
    the Greek festival-name makes the line intelligible in English; the Greek form
    is preserved in a footnote as an alternative.
- source_word: ἣν ἔφασαν εἶναι
  chosen: which they said also existed
  alternatives:
  - which they said was authentic
  - which they said was extant
  lexicon: LSJ
  rationale: The infinitive εἶναι after ἔφασαν is terse. The sense is that this letter/document
    was said to exist or be available. 'Existed' preserves the minimal claim without
    importing 'authentic' into the text.
- source_word: καὶ ἑρμηνευκέναι
  chosen: and had been translated
  alternatives:
  - and had been interpreted
  - and had been rendered
  lexicon: LSJ
  rationale: In documentary contexts ἑρμηνεύω commonly means 'translate' or 'interpret.'
    Since a named individual is said to have done this to a letter, 'translated' is
    the most likely sense.
- source_word: Λυσίμαχον Πτολεμαίου
  chosen: Lysimachus son of Ptolemy
  alternatives:
  - Lysimachus, of Ptolemy
  lexicon: LSJ
  rationale: The genitive naturally indicates filiation here. 'Son of Ptolemy' is
    the clearest English expression.
- source_word: τῶν ἐν Ἰερουσαλήμ
  chosen: one of those in Jerusalem
  alternatives:
  - from Jerusalem
  - who was in Jerusalem
  lexicon: LSJ
  rationale: The plural article with prepositional phrase literally means 'of those
    in Jerusalem.' The singular English expression 'one of those in Jerusalem' best
    reflects the Greek construction while remaining readable.
