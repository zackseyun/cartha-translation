theological_decisions:
- issue: Neutral reporting versus skeptical nuance in ὃς ἔφη εἶναι
  chosen_reading: who said that he was
  alternative_readings:
  - who claimed to be
  rationale: This verse is a colophon-like historical note, not a theological assertion.
    The Greek verb can carry either neutral or mildly skeptical force. The main text
    keeps the more neutral wording to avoid importing suspicion not explicit in the
    source.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering τῶν Φρουραίων
  chosen_reading: of the Purim festival
  alternative_readings:
  - of the Phrouraia
  rationale: The Greek term is a Hellenized festival designation in the Esther tradition.
    Translating the referent aids comprehension while preserving the Greek form in
    a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §6
