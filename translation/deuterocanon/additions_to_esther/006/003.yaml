translation:
  text: The little spring that became a river was Esther, whom the king married and
    made queen; and there was light and sun and abundant water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek more formally: ''Esther is the river.'' The translation smooths the
      clause into English while preserving the identification.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ μικρὰ πηγή
  chosen: the little spring
  alternatives:
  - the small fountain
  - the little source
  lexicon: LSJ
  rationale: πηγή denotes a spring or fountain as a water source. 'Spring' is natural
    modern English and preserves the image of a small source that later grows.
- source_word: ἡ ἐγένετο ποταμός
  chosen: that became a river
  alternatives:
  - which became a river
  - that turned into a river
  lexicon: LSJ
  rationale: The relative clause identifies the spring by its transformation. 'Became
    a river' is straightforward and keeps the metaphor intact.
- source_word: φῶς
  chosen: light
  lexicon: LSJ
  rationale: The basic sense is 'light'; no contextual pressure warrants a figurative
    expansion.
- source_word: ἥλιος
  chosen: sun
  lexicon: LSJ
  rationale: Rendered literally as part of the dream-symbol imagery being interpreted.
- source_word: ὕδωρ πολύ
  chosen: abundant water
  alternatives:
  - much water
  - plentiful water
  lexicon: LSJ
  rationale: πολύ modifies ὕδωρ quantitatively. 'Abundant water' is idiomatic and
    preserves the sense of overflowing provision.
- source_word: Ἐσθήρ ἐστιν ὁ ποταμός
  chosen: was Esther
  alternatives:
  - Esther is the river
  lexicon: LSJ
  rationale: The Greek formally says 'Esther is the river,' but in English the appositional
    interpretation after the preceding clause is smoother as 'was Esther.' This preserves
    the identification while avoiding a jarring repetition.
- source_word: ἣν ἐγάμησεν ὁ βασιλεύς
  chosen: whom the king married
  alternatives:
  - whom the king took in marriage
  lexicon: LSJ
  rationale: ἐγαμέω here means to marry a woman. 'Whom the king married' is clear
    and direct.
- source_word: ἐποίησεν βασίλισσαν
  chosen: made queen
  alternatives:
  - made into queen
  - appointed queen
  lexicon: LSJ
  rationale: The verb plus predicate accusative indicates causing her to be queen.
    'Made queen' is concise and idiomatic.
