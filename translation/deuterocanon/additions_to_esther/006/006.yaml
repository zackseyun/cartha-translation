theological_decisions:
- issue: Interpretation of βοηθήσαντες πρὸς τὸν θεόν
  chosen_reading: The phrase refers to Israel appealing to God for help, not helping
    God.
  alternative_readings:
  - those who sought help from God
  - those who turned to God for help
  rationale: A hyper-literal rendering ('those who helped toward God') would misrepresent
    the sense in context and create theological confusion. The surrounding clauses
    about being saved and rescued indicate supplication to God followed by divine
    deliverance.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of repeated salvation/deliverance language
  chosen_reading: Different English verbs ('saved' / 'rescued') are used to reflect
    the Greek distinction between ἔσωσεν and ἐρρύσατο while preserving their semantic
    relationship.
  alternative_readings:
  - saved ... delivered
  - delivered ... rescued
  rationale: This avoids flattening the Greek into exact repetition in English while
    still showing the close thematic link of divine deliverance.
  doctrine_reference: Translation philosophy §5
