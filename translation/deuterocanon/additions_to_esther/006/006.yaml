translation:
  text: But my people—this is Israel—are those who cried out to God and were saved.
    And the Lord saved his people, and the Lord rescued us from all these evils, and
    God did the signs and the great wonders that have not happened among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those who sought help from God.' The Greek phrase is somewhat awkward,
      but the sense is that Israel appealed to God and was delivered by him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνος
  chosen: people
  alternatives:
  - nation
  lexicon: BDAG
  rationale: Although ἔθνος often means 'nation,' here τὸ ἔθνος τὸ ἐμόν refers to
    the speaker's own collective people, immediately identified as Israel. 'My people'
    is more natural English and fits the covenantal-national sense without implying
    a modern nation-state.
- source_word: οὗτός ἐστιν Ἰσραήλ
  chosen: this is Israel
  alternatives:
  - this means Israel
  - that is Israel
  lexicon: BDAG
  rationale: A straightforward identificational clause. 'This is Israel' preserves
    the emphatic identification of the speaker's people with Israel.
- source_word: οἱ βοηθήσαντες πρὸς τὸν θεόν
  chosen: those who cried out to God
  alternatives:
  - those who sought help from God
  - those who appealed to God
  - those who helped toward God
  lexicon: BDAG
  rationale: The participle βοηθήσαντες with πρὸς is awkward in literal English if
    rendered woodenly. In context, the sense is not that Israel helped God, but that
    they turned to him for help. 'Cried out to God' captures the appeal-for-deliverance
    sense in idiomatic English while remaining anchored to the context of rescue.
- source_word: σωθέντες
  chosen: were saved
  alternatives:
  - were delivered
  - were rescued
  lexicon: BDAG
  rationale: The passive of σῴζω naturally means 'were saved' or 'were delivered.'
    'Were saved' preserves the lexical connection with the following ἔσωσεν while
    remaining understandable in context.
- source_word: ἔσωσεν
  chosen: saved
  alternatives:
  - delivered
  - preserved
  lexicon: BDAG
  rationale: Kept as 'saved' for consistency with σωθέντες and because the context
    is divine deliverance of God's people.
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - freed
  lexicon: BDAG
  rationale: Using 'rescued' differentiates ἐρρύσατο from ἔσωσεν while preserving
    the overlap in meaning. The verb emphasizes deliverance out of danger.
- source_word: τῶν κακῶν τούτων
  chosen: all these evils
  alternatives:
  - all these troubles
  - all these calamities
  - all these harms
  lexicon: BDAG
  rationale: κακά can denote evils, troubles, or calamities. 'Evils' is retained because
    the phrase refers to the manifold harmful events threatening the Jews, and the
    wording preserves the source's breadth.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - portents
  lexicon: BDAG
  rationale: Standard rendering in biblical contexts; paired naturally with τέρατα.
- source_word: τέρατα τὰ μεγάλα
  chosen: the great wonders
  alternatives:
  - great marvels
  - great portents
  lexicon: BDAG
  rationale: τέρατα commonly denotes wonders/portents. 'Great wonders' is idiomatic
    and preserves the intensifying adjective μεγάλα.
- source_word: ἃ οὐ γέγονεν ἐν τοῖς ἔθνεσιν
  chosen: that have not happened among the nations
  alternatives:
  - which have not occurred among the nations
  - such as have not come to pass among the nations
  lexicon: BDAG
  rationale: The perfect γέγονεν is rendered with present relevance, 'have not happened.'
    'Among the nations' preserves ἐν τοῖς ἔθνεσιν and the contrast with Israel.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Greek deuterocanonical
    context the source text has κύριος, not the Hebrew divine name, so 'Lord' is preferred
    over 'the LORD'.
