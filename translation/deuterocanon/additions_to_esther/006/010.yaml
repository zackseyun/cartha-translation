id: ESG.6.10
reference: Additions to Esther 6:10
source:
  edition: lxx-swete-1909
  text: καὶ ἔσονται αὐτοῖς αἱ ἡμέραι αὗται ἐν μηνὶ Ἀδάρ, τῇ τεσσαρεσκαιδεκάτῃ καὶ
    τῇ πεντεκαιδεκάτῃ τοῦ αὐτοῦ μηνός, μετὰ συναγωγῆς καὶ χαρᾶς καὶ εὐφροσύνης ἐνώπιον
    τοῦ θεοῦ εἰς γενεὰς εἰς τὸν αἰῶνα ἐν τῷ λαῷ αὐτοῦ Ἰσραήλ.
  language: Greek
  pages:
