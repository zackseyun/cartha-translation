theological_decisions:
- issue: Whether to preserve the explicit reference to God in a festal context
  chosen_reading: before God
  alternative_readings:
  - in the presence of God
  rationale: The Greek explicitly includes θεοῦ, so the translation keeps the theological
    orientation of the observance rather than reducing it to a merely civic celebration.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering the durative phrase εἰς γενεὰς εἰς τὸν αἰῶνα
  chosen_reading: throughout the generations forever
  alternative_readings:
  - for generations forever
  rationale: The chosen wording preserves the text's strong sense of enduring observance
    without flattening either component of the Greek phrase.
  doctrine_reference: Translation philosophy §§1, 5, 6
