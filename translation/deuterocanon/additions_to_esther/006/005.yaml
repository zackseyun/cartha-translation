translation:
  text: but the nations had assembled to destroy the name of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had been gathered together.' The Greek participle is passive in form.
    reason: lexical_alternative
  - marker: b
    text: '''Destroy the name'' is a biblical idiom that can mean to erase a people''s
      memory or continued existence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: BDAG
  rationale: In the LXX/Esther context, ἔθνη denotes the non-Jewish peoples or nations.
    'Nations' is the most natural and least theologically loaded English rendering
    here; 'Gentiles' is possible but sounds more specifically Jewish/NT in English
    than the immediate context requires.
- source_word: ἐπισυναχθέντα
  chosen: had assembled
  alternatives:
  - had been gathered together
  - had been brought together
  lexicon: BDAG
  rationale: The participle is passive in form and denotes being gathered/assembled
    together. In idiomatic English, 'had assembled' communicates the collective action/result
    clearly without overloading the line. A more formal passive alternative is preserved
    here as an option.
- source_word: ἀπολέσαι
  chosen: to destroy
  alternatives:
  - to wipe out
  - to annihilate
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose: the nations were assembled ''to destroy.''
    ''Destroy'' is broad enough to preserve the Greek without importing a more interpretive
    level of violence than the text itself states, though stronger alternatives are
    contextually possible.'
- source_word: τὸ ὄνομα
  chosen: the name
  alternatives:
  - the memory
  - the renown
  lexicon: BDAG
  rationale: The Greek literally says 'the name.' In biblical idiom this can imply
    erasing memory or existence, but the literal rendering best preserves the source
    imagery while allowing readers to hear the idiom.
- source_word: Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: BDAG
  rationale: In Esther, Ἰουδαῖοι conventionally refers to the Jewish people. 'Jews'
    is the clearest standard English rendering here; 'Judeans' would foreground geographic/ethnic
    nuance that is less central in this narrative setting.
