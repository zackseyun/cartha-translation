theological_decisions:
- issue: Rendering of ἔθνεσιν in contrast with the people of God
  chosen_reading: all the nations
  alternative_readings:
  - all the Gentiles
  - all the peoples
  rationale: The phrase sets God's people over against the wider non-covenant world.
    'Nations' preserves the lexical sense and the theological contrast without over-specifying
    ethnicity in the main text. 'Gentiles' is a plausible contextual alternative and
    is preserved in a footnote.
