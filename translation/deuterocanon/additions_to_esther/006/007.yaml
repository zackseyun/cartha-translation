translation:
  text: For this reason he made two lots, one for the people of God and one for all
    the nations;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all the Gentiles.' The Greek word can denote the nations generally,
      especially in contrast to God's people.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: A natural causal-consequential connector in English that preserves the
    explanatory force of the Greek without sounding wooden.
- source_word: ἐποίησεν
  chosen: he made
  alternatives:
  - he cast
  - he prepared
  lexicon: BDAG
  rationale: The verb is simply 'made/did.' Although the object is 'lots,' the Greek
    does not use a specific verb for casting lots here, so 'made' best reflects the
    wording while remaining intelligible.
- source_word: κλήρους
  chosen: lots
  alternatives:
  - portions
  - allotments
  lexicon: BDAG
  rationale: κλῆρος here refers to lots used for determining outcome or allotment.
    'Lots' is the standard and clearest rendering in this context.
- source_word: δύο
  chosen: two
  lexicon: BDAG
  rationale: Straightforward numeral; retained explicitly because it structures the
    sentence's contrast.
- source_word: λαῷ τοῦ θεοῦ
  chosen: the people of God
  alternatives:
  - God's people
  lexicon: BDAG
  rationale: Both are possible; 'the people of God' more closely mirrors the Greek
    construction while remaining idiomatic.
- source_word: πᾶσι τοῖς ἔθνεσιν
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all the peoples
  lexicon: BDAG
  rationale: In LXX usage ἔθνη commonly means 'nations' or, in Jewish contrastive
    contexts, 'Gentiles.' Here 'all the nations' preserves the broader collective
    sense and avoids importing a narrower theological label unless context demands
    it.
