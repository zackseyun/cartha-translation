translation:
  text: But the two dragons are I and Haman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the two serpents are I and Haman.' Greek δράκοντες can denote dragons
      or serpents.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... δύο δράκοντες
  chosen: the two dragons
  alternatives:
  - the two serpents
  lexicon: LSJ
  rationale: δράκων in Greek commonly denotes a dragon or great serpent. 'Dragons'
    preserves the vivid imagery of Esther's dream and matches the plural noun directly;
    'serpents' is possible but less specific.
- source_word: ἐγώ εἰμι
  chosen: are I
  alternatives:
  - am I
  lexicon: BDAG
  rationale: The Greek has the emphatic pronoun with the copula, literally 'I am.'
    In English, because the predicate nominative subject 'the two dragons' precedes
    and includes two referents, 'are I and Haman' is the most natural way to preserve
    the identification.
- source_word: Ἁμάν
  chosen: Haman
  rationale: Proper name transliterated by standard English convention, following
    the project's policy to transliterate names.
- source_word: δέ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild transition. 'But' fits the explanatory turn here, where
    the speaker identifies the symbolic figures from the dream.
