theological_decisions:
- issue: Divine causation/origin expressed by παρά + genitive
  chosen_reading: These things have come from God
  alternative_readings:
  - These things happened by God
  - These things came to pass from God
  rationale: The Greek attributes the events to God as their source without specifying
    a detailed doctrine of causation beyond that. The chosen rendering preserves that
    attribution in idiomatic English without over-interpreting the mechanism.
  doctrine_reference: Preserve theological tension rather than resolve it.
