theological_decisions:
- issue: Rendering of ἐδικαίωσεν in a non-Pauline, corporate-deliverance context
  chosen_reading: vindicated
  alternative_readings:
  - justified
  - did justice to
  rationale: Although δικαιόω is often rendered 'justify,' here the sense is not primarily
    forensic imputation but God's public defense and restoration of his people, described
    as his inheritance. 'Vindicated' preserves that theological sense without importing
    later doctrinal categories too strongly.
