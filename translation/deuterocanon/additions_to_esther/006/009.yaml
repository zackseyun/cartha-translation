translation:
  text: And God remembered his people, and vindicated his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justified' or 'did justice to his inheritance.' The Greek verb can carry
      legal or vindicatory force; here it is rendered in the corporate sense of God's
      public defense of his people.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμνήσθη
  chosen: remembered
  alternatives:
  - called to mind
  - took notice of
  lexicon: BDAG
  rationale: From μιμνῄσκομαι in the passive/deponent form, commonly meaning 'remember'
    in biblical Greek, often with covenantal overtones of acting favorably toward
    someone. 'Remembered' preserves the biblical idiom without over-interpreting the
    action.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. No article-driven distinction needs to be
    marked in English here.
- source_word: τοῦ λαοῦ αὐτοῦ
  chosen: his people
  alternatives:
  - his nation
  lexicon: BDAG
  rationale: λαός in biblical usage regularly denotes a people, often God's covenant
    people. 'His people' is the most natural and theologically fitting English rendering
    here.
- source_word: ἐδικαίωσεν
  chosen: vindicated
  alternatives:
  - justified
  - declared righteous
  - did justice to
  lexicon: BDAG
  rationale: δικαιόω can mean 'justify' or 'vindicate' depending on context. Here
    the object is 'his inheritance,' referring corporately to God's people in a deliverance
    setting, so 'vindicated' better conveys public righting and defense than the more
    Pauline-sounding 'justified'.
- source_word: τὴν κληρονομίαν ἑαυτοῦ
  chosen: his inheritance
  alternatives:
  - his possession
  - his heritage
  lexicon: BDAG
  rationale: κληρονομία can denote inheritance, heritage, or possession. In scriptural
    idiom God's people can be called his inheritance. 'His inheritance' preserves
    the covenantal metaphor and stays close to the Greek.
