translation:
  text: And when the king awoke, they took the letter and gave it to him, and he read
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the writing' or 'the document' for the Greek γράμμα.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb can mean simply 'read' or, in some contexts, 'read aloud';
      the text itself does not specify aloudness here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε ἐξηγέρθη
  chosen: when the king awoke
  alternatives:
  - when the king was awakened
  - when the king arose
  lexicon: LSJ
  rationale: ἐξηγέρθη is the aorist passive of ἐξεγείρω, commonly used in an intransitive
    sense for waking or rising. In this immediate context, after a written statement
    has been placed under the king's pillow in the surrounding narrative, 'awoke'
    best fits the scene in natural English without over-interpreting the passive form.
- source_word: λαβόντες
  chosen: they took
  alternatives:
  - having taken
  - taking up
  lexicon: LSJ
  rationale: The participle is attendant to the main verb and is most naturally rendered
    with a finite English verb for readable narrative flow. 'They took' preserves
    the action sequence without woodenly reproducing the participial structure.
- source_word: τὸ γράμμα
  chosen: the letter
  alternatives:
  - the writing
  - the document
  lexicon: LSJ
  rationale: γράμμα here refers to the written statement or document submitted to
    the king. 'Letter' is the most idiomatic and sufficiently precise English rendering
    in this court setting.
- source_word: ἔδωκαν αὐτῷ
  chosen: gave it to him
  alternatives:
  - handed it to him
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist verb with explicit English
    object pronoun for clarity. 'Handed it to him' is possible, but 'gave it to him'
    stays closer to the Greek.
- source_word: ἀνέγνω
  chosen: he read it
  alternatives:
  - he read
  lexicon: LSJ
  rationale: The verb means 'read' or 'read aloud' depending on context. Since the
    object is implicit from the preceding clause, English naturally supplies 'it.'
    The text does not explicitly require 'aloud,' so the simpler 'read it' is preferred.
