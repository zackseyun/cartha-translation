translation:
  text: and on the altar they should offer burnt offerings every day, as they have
    the command to offer seventeen, and another ten talents yearly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text of this verse is difficult and appears textually compressed
      at several points, especially around the verb rendered 'offer' and the clause
      about 'ten talents yearly.' The translation follows the main sense of the extant
      Greek without claiming certainty on every detail.
    reason: textual_variant
lexical_decisions:
- source_word: θυσιαστήριον
  chosen: altar
  alternatives:
  - place of sacrifice
  lexicon: LSJ
  rationale: Standard cultic term for the sacrificial altar; 'altar' is the natural
    and sufficiently formal English equivalent.
- source_word: ὁλοκαυτώματα
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: LSJ
  rationale: Established and accurate rendering for sacrifices wholly consumed by
    fire. 'Whole burnt offerings' is more explicit but less idiomatic in modern English.
- source_word: καρποῦσθαι
  chosen: offer
  alternatives:
  - bring forth
  - produce
  - make fruitful
  lexicon: LSJ
  rationale: The transmitted verb is unusual in this context and the source is marked
    with major mismatch; in sacrificial context, the sense is best represented by
    'offer' rather than a wooden rendering like 'produce,' which would be misleading
    in English.
- source_word: καθʼ ἡμέραν
  chosen: every day
  alternatives:
  - daily
  lexicon: LSJ
  rationale: Both are possible; 'every day' preserves the distributive force clearly
    in readable modern English.
- source_word: ἐντολήν
  chosen: command
  alternatives:
  - instruction
  - ordinance
  lexicon: LSJ
  rationale: The word denotes an authoritative directive. 'Command' best reflects
    that force here.
- source_word: ἑπτὰ καὶ δέκα
  chosen: seventeen
  alternatives:
  - ten and seven
  lexicon: LSJ
  rationale: Idiomatic English number rendering.
- source_word: προσφέρειν
  chosen: present
  alternatives:
  - offer
  - bring
  lexicon: LSJ
  rationale: Used here for bringing sacrificial items or dues. Since 'offer' already
    renders the earlier sacrificial action, 'present' avoids awkward repetition while
    preserving the cultic-administrative sense.
- source_word: ἄλλα τάλαντα, δέκα κατʼ ἐνιαυτόν
  chosen: besides ten talents yearly
  alternatives:
  - and another ten talents each year
  - apart from ten talents annually
  lexicon: LSJ
  rationale: ἄλλα is taken adverbially/additively ('besides/in addition'), with τάλαντα
    as a monetary or weight measure. Because the Greek is somewhat compressed and
    the source flagged as mismatched, this rendering preserves the additive sense
    without over-specifying.
