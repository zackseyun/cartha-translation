translation:
  text: And for all who go up from Babylonia to build the city, there shall be freedom
    for them and for their children, and for all the priests who go up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'liberty'; in this royal-decree context the term may include legal privileges
      or exemption from certain obligations, though the Greek does not define the
      exact scope.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσβαίνουσιν
  chosen: go up
  alternatives:
  - come up
  - depart
  - advance
  lexicon: LSJ
  rationale: In this return-from-exile context, the verb naturally carries the conventional
    sense of ascending to Jerusalem. 'Go up' preserves the geographic and pilgrimage
    nuance better than a flatter 'go' or 'come'.
- source_word: ἀπὸ τῆς Βαβυλωνίας
  chosen: from Babylonia
  alternatives:
  - from Babylon
  lexicon: LSJ
  rationale: The Greek uses the regional form Βαβυλωνία rather than the city name
    alone. 'Babylonia' reflects the wording more precisely, though 'Babylon' would
    be idiomatic in English.
- source_word: κτίσαι τὴν πόλιν
  chosen: to build the city
  alternatives:
  - to rebuild the city
  - to found the city
  lexicon: LSJ
  rationale: κτίζω can mean found or build. In the restoration setting, English readers
    may infer rebuilding, but the Greek here simply says 'build the city,' so that
    more direct rendering is retained.
- source_word: ὑπάρχειν τὴν ἐλευθερίαν
  chosen: there shall be freedom
  alternatives:
  - liberty shall belong
  - they shall have exemption
  - there shall be liberty
  lexicon: LSJ
  rationale: The infinitive construction expresses the decree that freedom/liberty
    is to be granted. 'There shall be freedom' gives natural English while preserving
    the formal sense of an official grant.
- source_word: ἐλευθερίαν
  chosen: freedom
  alternatives:
  - liberty
  - exemption
  lexicon: LSJ
  rationale: The noun broadly denotes freedom or liberty. In this administrative context
    it may imply civic privilege or tax exemption, but the Greek itself does not specify
    the exact legal content, so the broader 'freedom' is preferred and the narrower
    possibility is preserved in a footnote.
- source_word: αὐτοῖς τε καὶ τοῖς τέκνοις αὐτῶν
  chosen: for them and for their children
  alternatives:
  - to them and to their descendants
  lexicon: LSJ
  rationale: τέκνα most directly means 'children.' 'Descendants' would broaden the
    scope beyond the immediate wording.
- source_word: πᾶσι τοῖς ἱερεῦσι τοῖς προσβαίνουσιν
  chosen: for all the priests who go up
  alternatives:
  - and all the priests who come up
  lexicon: LSJ
  rationale: The final phrase extends the grant specifically to the priests among
    those ascending. Repeating 'who go up' mirrors the Greek structure and keeps the
    connection with the earlier clause.
