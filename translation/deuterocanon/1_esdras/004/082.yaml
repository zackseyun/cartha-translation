theological_decisions:
- issue: Rendering of δέσποτα in divine address
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: The project default renders κύριος as 'Lord,' but this verse uses δέσποτα,
    a distinct title. Rendering it 'Master' preserves the lexical distinction and
    the stronger sense of ownership/absolute authority without importing the covenantal
    associations of κύριος.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord) and consistency/documented
    exception principle'
- issue: Sense of ὁμολογῶ in prayer
  chosen_reading: I give thanks
  alternative_readings:
  - I confess
  - I acknowledge
  rationale: In this doxological context, a literal 'I confess' would mislead modern
    readers toward admission of sin. 'I give thanks' reflects the worshipful acknowledgment
    intended by the Greek while remaining readable modern English.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; readable modern English'
