translation:
  text: Blessed are you, who have given me wisdom; and to you I give thanks, Master
    of the fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to you I acknowledge/confess.' The Greek verb can carry the sense of
      open acknowledgment or praise; here it is rendered 'I give thanks' because the
      context is a blessing addressed to God after receiving wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογητὸς
  chosen: Blessed
  alternatives:
  - Praised
  lexicon: BDAG
  rationale: Predicate adjective used in doxological address; 'Blessed' preserves
    the conventional blessing formula more closely than the more interpretive 'Praised.'
- source_word: εἶ
  chosen: are
  alternatives:
  - —
  lexicon: BDAG
  rationale: Explicit copula in direct address; retained in natural English as 'are.'
- source_word: ἔδωκάς
  chosen: have given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: 'Aorist in a present thanksgiving context can be rendered simply past,
    but English present perfect better conveys a completed act with present relevance:
    the wisdom now possessed.'
- source_word: μοι
  chosen: me
  lexicon: BDAG
  rationale: Straightforward dative indirect object.
- source_word: σοφίαν
  chosen: wisdom
  alternatives:
  - understanding
  lexicon: BDAG
  rationale: Standard rendering of σοφία; 'wisdom' fits both the immediate context
    and broader biblical diction.
- source_word: σοὶ ὁμολογῶ
  chosen: to you I give thanks
  alternatives:
  - to you I confess
  - to you I acknowledge
  - I praise you
  lexicon: BDAG
  rationale: ὁμολογέω can mean confess, acknowledge, or praise/thank in religious
    contexts. Here, in a prayer of blessing after receiving wisdom, 'I give thanks'
    best captures the devotional force in idiomatic English without flattening the
    direct objectless construction.
- source_word: δέσποτα
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: δέσποτα is more specific than κύριος and denotes absolute authority.
    'Master' is the most direct lexical equivalent; 'Lord' would blur the distinction
    from κύριος, and 'Sovereign' is possible but less literal.
- source_word: τῶν πατέρων
  chosen: of the fathers
  alternatives:
  - of our fathers
  - of the ancestors
  lexicon: BDAG
  rationale: The Greek lacks an explicit possessive pronoun, so 'of the fathers' is
    the most transparent rendering. 'Ancestors' is smoother but less formally tied
    to the source wording.
