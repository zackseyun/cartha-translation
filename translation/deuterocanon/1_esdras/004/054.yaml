translation:
  text: He also wrote concerning the provision and the priestly garment in which they
    minister there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek wording here is awkward: literally, ''the provision and the priestly
      robe, in which they minister in it.'' The pronoun likely refers to the robe,
      though the line may reflect a compressed or unstable textual form.'
    reason: textual_variant
lexical_decisions:
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - issued in writing
  - recorded
  lexicon: BDAG
  rationale: Aorist of γράφω straightforwardly denotes writing. In context it refers
    to what was set down by royal decree or authorization, but the verb itself is
    simply 'wrote.'
- source_word: χορηγίαν
  chosen: provision
  alternatives:
  - supply
  - allowance
  - support
  lexicon: LSJ
  rationale: χορηγία can denote supply or provision furnished for a purpose. 'Provision'
    is broad enough to cover material support for temple service without over-specifying
    a stipend or ration.
- source_word: ἱερατικὴν στολήν
  chosen: the priestly robe
  alternatives:
  - the priestly garment
  - the priestly vestment
  lexicon: LSJ
  rationale: στολή commonly denotes a robe or stately garment. Singular is retained
    because the Greek is singular; 'robe' is more natural modern English than 'vestment'
    while still fitting cultic context.
- source_word: ἐν τίνι
  chosen: in which
  alternatives:
  - with which
  - wherein
  lexicon: LSJ
  rationale: The phrase is somewhat awkward in Swete's text. A literal rendering 'in
    which' best preserves the Greek wording without forcing a reconstruction. It likely
    refers back to the priestly robe/garment as the attire in which service is performed.
- source_word: λατρεύουσιν
  chosen: they minister
  alternatives:
  - they serve
  - they perform worship
  lexicon: BDAG
  rationale: λατρεύω in temple context denotes cultic service or worshipful ministry.
    'Minister' captures formal priestly service better than the broader 'serve.'
- source_word: ἐν αὐτῇ
  chosen: in it
  alternatives:
  - therein
  - in her
  lexicon: LSJ
  rationale: The feminine pronoun most naturally refers to the feminine noun στολή.
    The resulting Greek expression is redundant or awkward, but the translation preserves
    that linkage rather than smoothing beyond the source.
