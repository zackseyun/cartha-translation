theological_decisions:
- issue: Reference of 'the house'
  chosen_reading: the house refers to the temple in Jerusalem
  alternative_readings:
  - the house as a more general royal or civic building
  rationale: Within Ezra/Esdras restoration context, 'the house' is standard shorthand
    for the temple. This is contextual rather than doctrinal, but it affects whether
    to translate literally or interpretively.
  doctrine_reference: Translation philosophy §1, §5
- issue: Literal versus interpretive rendering of οἶκος
  chosen_reading: retain 'the house' in the main text
  alternative_readings:
  - translate directly as 'the temple'
  rationale: Optimal equivalence favors preserving the biblical idiom where it remains
    intelligible in English. The temple reference is clear from context and can be
    noted in rationale rather than replacing the source image.
  doctrine_reference: Translation philosophy §1, §5
