translation:
  text: And he wrote that support should be given to the Levites until the day when
    the house would be completed and Jerusalem built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'provision,' 'allowance,' or 'supply' for the Levites.
    reason: lexical_alternative
  - marker: b
    text: '''The house'' refers to the temple.'
    reason: cross_reference
  - marker: c
    text: Or 'Jerusalem rebuilt.' The Greek says simply 'built,' though the context
      is restoration.
    reason: lexical_alternative
  - marker: d
    text: The Greek wording after 'until the day' is somewhat awkward in transmission,
      but the sense is that the support was to continue until the temple was completed
      and Jerusalem built.
    reason: textual_variant
lexical_decisions:
- source_word: ἔγραψεν
  chosen: he wrote that
  alternatives:
  - he issued a written order to
  - he wrote to
  lexicon: LSJ
  rationale: The aorist of γράφω here introduces the content of a royal written directive.
    'He wrote that' preserves the formal sense without over-specifying the recipient
    beyond what the Greek states.
- source_word: δοῦναι
  chosen: should be given
  alternatives:
  - to give
  - be provided
  lexicon: LSJ
  rationale: The infinitive depends on ἔγραψεν and expresses the ordered action. English
    idiom is best captured with a passive modal sense, 'should be given,' indicating
    commanded provision.
- source_word: τὴν χορηγίαν
  chosen: support
  alternatives:
  - provision
  - allowance
  - supply
  lexicon: LSJ
  rationale: χορηγία denotes provision or maintenance supplied at expense. 'Support'
    is broad enough for ongoing material provision and reads naturally in modern English.
- source_word: τοῖς Λευείταις
  chosen: to the Levites
  lexicon: LSJ
  rationale: Straightforward dative indirect object; transliteration of the group
    name is standard.
- source_word: ἕως τῆς ἡμέρας
  chosen: until the day
  alternatives:
  - up to the day when
  - until
  lexicon: LSJ
  rationale: A temporal expression introducing the endpoint of the provision. 'Until
    the day' preserves the Greek structure.
- source_word: ᾖ ἐπιτελεσθῇ
  chosen: would be completed
  alternatives:
  - should be finished
  - was completed
  lexicon: LSJ
  rationale: The transmitted text is syntactically awkward, but the sense is future
    completion of the temple. 'Would be completed' gives natural English while reflecting
    a prospective endpoint.
- source_word: ὁ οἶκος
  chosen: the house
  alternatives:
  - the temple
  lexicon: LSJ
  rationale: Literally 'the house'; in this context it refers to the temple. The main
    text keeps the source term, allowing readers to hear the biblical idiom.
- source_word: Ἰερουσαλὴμ οἰκοδομηθῆναι
  chosen: Jerusalem built
  alternatives:
  - Jerusalem rebuilt
  - Jerusalem be built
  lexicon: LSJ
  rationale: The infinitive means 'to be built.' Because the context is restoration,
    'rebuilt' is interpretively possible, but the Greek itself says simply 'built,'
    so that is retained in the main text.
