theological_decisions:
- issue: Social-status pairings are rhetorically leveled by the unnamed antecedent
    from context; the verse itself does not specify a theological mechanism beyond
    making minds alike.
  chosen_reading: Render the status contrasts plainly without importing explanatory
    theology.
  alternative_readings:
  - Interpret as 'puts them in the same state of mind' with stronger idiomatic smoothing
  rationale: The Greek lists paired opposites and says it makes their διάνοια one.
    A restrained rendering preserves the rhetoric and avoids adding interpretive explanation
    not present in the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
