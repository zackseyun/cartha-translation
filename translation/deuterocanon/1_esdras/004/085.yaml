translation:
  text: to go up and rebuild Jerusalem and the temple on which his name had been called;
    and they celebrated with music and joy for seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over which his name was invoked' or 'which was called by his name.'
      The Greek reflects a Semitic temple formula expressing God's claim upon and
      association with the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβῆναι
  chosen: to go up
  alternatives:
  - to ascend
  - to return
  lexicon: LSJ
  rationale: The infinitive literally means 'to go up/ascend.' In Jerusalem contexts
    this can imply return from exile, but the Greek itself says 'go up,' so that wording
    is preserved.
- source_word: οἰκοδομῆσαι
  chosen: rebuild
  alternatives:
  - build
  lexicon: LSJ
  rationale: Given Jerusalem and the temple are being restored after devastation,
    'rebuild' brings out the contextual force without departing from the verb's basic
    sense 'build.'
- source_word: ἱερὸν
  chosen: temple
  alternatives:
  - sanctuary
  - holy place
  lexicon: LSJ
  rationale: In this context the referent is the Jerusalem temple complex; 'temple'
    is the natural English equivalent.
- source_word: οὗ ὠνομάσθη τὸ ὄνομα αὐτοῦ ἐπ’ αὐτῷ
  chosen: on which his name had been called
  alternatives:
  - over which his name was invoked
  - which was called by his name
  lexicon: LSJ
  rationale: This reflects a Semitic-style expression for divine ownership/association.
    The more literal 'had been called on it' is awkward in English; 'on which his
    name had been called' preserves the idiom's shape while remaining readable.
- source_word: ἐκωθωνίζοντο
  chosen: they celebrated
  alternatives:
  - they reveled
  - they made merry
  - they held festal celebration
  lexicon: LSJ
  rationale: The verb is rare and denotes festive celebration. 'Celebrated' is clear
    modern English and fits the accompanying phrases 'with music and joy.'
- source_word: μουσικῶν
  chosen: with music
  alternatives:
  - with musicians
  - with musical performances
  lexicon: LSJ
  rationale: The genitive plural could point to musical accompaniment or musicians;
    'with music' conveys the sense idiomatically without over-specifying.
- source_word: χαρᾶς
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: LSJ
  rationale: A straightforward rendering matching common biblical usage.
- source_word: ἡμέρας ἑπτά
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: LSJ
  rationale: English idiom normally supplies 'for' with a duration phrase.
