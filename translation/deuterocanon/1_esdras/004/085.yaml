theological_decisions:
- issue: Temple formula about the divine name
  chosen_reading: on which his name had been called
  alternative_readings:
  - over which his name was invoked
  - which was called by his name
  rationale: The phrase is covenantal/temple language indicating that the temple belongs
    to and is identified with God. The translation preserves the biblical idiom without
    flattening it into a purely interpretive paraphrase.
