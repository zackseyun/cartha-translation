  text: ἀναβῆναι καὶ οἰκοδομῆσαι Ἰερουσαλὴμ καὶ τὸ ἱερὸν οὗ ὠνομάσθη τὸ ὄνομα αὐτοῦ
    ἐπ’ αὐτῷ· καὶ ἐκωθωνίζοντο μετὰ μουσικῶν καὶ χαρᾶς ἡμέρας ἑπτά.
