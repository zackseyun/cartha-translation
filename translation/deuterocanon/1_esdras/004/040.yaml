theological_decisions:
- issue: Referent of the feminine pronouns αὐτῆς / αὕτη
  chosen_reading: The feminine pronouns refer to 'truth' personified from the immediate
    context, so the verse is rendered with 'her' and 'hers.'
  alternative_readings:
  - A more abstract English rendering could avoid personification by repeating 'truth'
    instead of using pronouns.
  rationale: The Greek continues the personified praise of truth in the surrounding
    argument. Preserving the feminine pronouns keeps the literary effect visible rather
    than flattening it into abstraction.
  doctrine_reference: 'DOCTRINE.md: preserve the source text''s plain sense and theological
    tension; do not smooth away significant features without cause.'
