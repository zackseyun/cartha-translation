translation:
  text: And in her judgment there is nothing unjust. And hers is the strength and
    the kingdom and the authority and the majesty of all the ages. Blessed be the
    God of truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'forever and ever'; literally, 'of all the ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσις
  chosen: judgment
  alternatives:
  - justice
  - decision
  lexicon: LSJ
  rationale: In the phrase ἐν τῇ κρίσει αὐτῆς, the sense is her judging or judicial
    discernment. 'Judgment' preserves the forensic nuance better than the broader
    'justice' and is more natural here than 'decision'.
- source_word: ἄδικον
  chosen: unjust
  alternatives:
  - wrong
  - unrighteous
  lexicon: LSJ
  rationale: The adjective denotes what is not just or right. 'Unjust' fits the judicial
    context created by κρίσις and avoids importing the heavier theological freight
    of 'unrighteous'.
- source_word: ἰσχύς
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: LSJ
  rationale: '''Strength'' is a straightforward rendering that preserves the noun''s
    force. ''Might'' is possible but slightly more elevated; ''power'' would blur
    distinction from ἐξουσία in the same clause.'
- source_word: βασίλειον
  chosen: kingdom
  alternatives:
  - royal power
  - kingship
  - royal dominion
  lexicon: LSJ
  rationale: In this doxological list, βασίλειον refers to royal rule or realm. 'Kingdom'
    is the most idiomatic concise rendering, though the semantic range includes kingship/royal
    dominion.
- source_word: ἐξουσία
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: LSJ
  rationale: '''Authority'' best preserves the idea of rightful power or jurisdiction
    and keeps it distinct from ἰσχύς (''strength'').'
- source_word: μεγαλειότης
  chosen: majesty
  alternatives:
  - greatness
  - magnificence
  lexicon: LSJ
  rationale: In a praise formula, 'majesty' is the most natural English equivalent
    and conveys exalted greatness.
- source_word: τῶν πάντων αἰώνων
  chosen: of all the ages
  alternatives:
  - forever and ever
  - through all ages
  - of all eternity
  lexicon: LSJ
  rationale: The Greek is literally 'of all the ages.' This preserves the source wording
    more transparently than the idiomatic expansion 'forever and ever,' while still
    reading naturally enough in English.
- source_word: εὐλογητός
  chosen: Blessed be
  alternatives:
  - Blessed is
  - Praised be
  lexicon: LSJ
  rationale: As a doxological exclamation, 'Blessed be' is idiomatic English and reflects
    the optative-like force of praise better than the flatter 'Blessed is'.
- source_word: ὁ θεὸς τῆς ἀληθείας
  chosen: the God of truth
  alternatives:
  - the true God
  - the God of faithfulness
  lexicon: LSJ
  rationale: 'The genitive is best taken attributively or qualitatively: God characterized
    by truth. ''The true God'' would shift the syntax and emphasis; ''faithfulness''
    is possible contextually but less direct than ''truth''.'
