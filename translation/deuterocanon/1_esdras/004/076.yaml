id: 1ES.4.76
reference: 1 Esdras 4:76
source:
  edition: lxx-swete-1909
  text: ἔγραψεν δὲ καὶ τὴν χορηγίαν καὶ τὴν ἱερατικὴν στολὴν ἐν τίνι λατρεύσουσιν
    ἐν αὐτῇ.
