translation:
  text: He also wrote out the provision and the priestly robe—specifying in what they
    are to minister in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the supply/allowance and the priestly garment, indicating how they are
      to serve in it.' The Greek wording is compressed, especially in the phrase 'in
      what ... in it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  chosen: wrote out
  alternatives:
  - wrote
  - recorded
  - set down
  lexicon: LSJ
  rationale: Aorist of γράφω. 'Wrote out' reflects the sense of formally committing
    instructions to writing, fitting the administrative context.
- source_word: χορηγίαν
  chosen: provision
  alternatives:
  - supply
  - allowance
  - funding
  lexicon: LSJ
  rationale: χορηγία can denote supply or provision furnished for a purpose. 'Provision'
    is broad enough to cover material support for temple service without over-specifying
    money alone.
- source_word: ἱερατικὴν στολήν
  chosen: priestly robe
  alternatives:
  - priestly garment
  - priestly vestment
  lexicon: LSJ
  rationale: στολή commonly denotes a robe or stately garment. 'Priestly robe' is
    natural English and preserves the cultic sense; 'vestment' is possible but more
    ecclesiastical jargon.
- source_word: ἐν τίνι
  chosen: specifying in what
  alternatives:
  - for what
  - wherein
  - in which
  lexicon: LSJ
  rationale: The phrase is syntactically compressed and somewhat awkward in Greek.
    A literal 'in what' is retained in sense, but expanded slightly in English to
    make clear that the writing included specification of the sphere or manner of
    service.
- source_word: λατρεύσουσιν
  chosen: they are to minister
  alternatives:
  - they will serve
  - they will perform worship
  - they will officiate
  lexicon: LSJ
  rationale: λατρεύω in temple context refers to cultic service/worship. 'Minister'
    captures priestly service more idiomatically than the broader 'serve' while avoiding
    overly technical wording.
- source_word: ἐν αὐτῇ
  chosen: in it
  alternatives:
  - therein
  - with it
  - in her
  lexicon: LSJ
  rationale: The feminine pronoun most naturally refers back to στολή ('robe'), yielding
    'minister in it,' i.e., in that robe. Because the Greek could feel elliptical
    in English, the translation preserves the ambiguity minimally rather than forcing
    a more interpretive expansion.
