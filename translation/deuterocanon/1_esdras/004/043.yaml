theological_decisions:
- issue: Meaning of εὐχή in royal context
  chosen_reading: vow
  alternative_readings:
  - prayer
  rationale: The immediate verbal cognate ηὔξω strongly points to a vowed commitment
    rather than a petition. Rendering it 'prayer' would weaken the force of Zerubbabel's
    appeal to the king's prior obligation.
