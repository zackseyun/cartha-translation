translation:
  text: Then he said to the king, “Remember the vow that you vowed to rebuild Jerusalem
    on the day when you received your kingdom,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prayer that you prayed'; the Greek noun can mean 'prayer,' but here
      the cognate verb and context favor 'vow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μνήσθητι
  chosen: Remember
  alternatives:
  - Call to mind
  - Be mindful of
  lexicon: BDAG
  rationale: Aorist imperative of μιμνῄσκομαι functioning as a direct appeal to the
    king. 'Remember' is the most natural and sufficiently formal English imperative.
- source_word: εὐχήν
  chosen: vow
  alternatives:
  - prayer
  - pledge
  lexicon: BDAG
  rationale: In context ηὔξω ('you vowed') governs εὐχήν, indicating a vowed promise
    rather than a general prayer. 'Vow' best captures the reciprocal noun-verb pairing
    in Greek.
- source_word: ἣν ηὔξω
  chosen: that you vowed
  alternatives:
  - which you made as a vow
  - that you promised
  lexicon: BDAG
  rationale: The relative clause repeats the vow idea idiomatically in Greek. English
    can preserve the emphasis with 'that you vowed' without becoming awkward.
- source_word: οἰκοδομῆσαι
  chosen: to rebuild
  alternatives:
  - to build
  - to restore
  lexicon: BDAG
  rationale: Although the infinitive can mean 'to build,' Jerusalem had existed previously
    and the context is restoration after destruction, so 'to rebuild' better reflects
    the historical sense.
- source_word: τὴν Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: LSJ
  rationale: Standard transliteration of the place name, following project policy
    to transliterate names.
- source_word: ἐν τῇ ἡμέρᾳ ᾗ
  chosen: on the day when
  alternatives:
  - in the day when
  - when
  lexicon: BDAG
  rationale: This temporal expression is naturally rendered 'on the day when' in modern
    English while preserving the Greek's explicit temporal marker.
- source_word: τὸ βασίλειόν σου παρέλαβες
  chosen: you received your kingdom
  alternatives:
  - you took over your kingdom
  - you came into your kingship
  lexicon: BDAG
  rationale: παραλαμβάνω here refers to receiving royal rule. 'Received your kingdom'
    is clear, dignified, and close to the Greek wording.
