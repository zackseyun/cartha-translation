theological_decisions:
- issue: Scope of the building project
  chosen_reading: the city
  alternative_readings:
  - the temple/house of God (by harmonization with related restoration texts)
  rationale: The Greek text explicitly reads τὴν πόλιν, 'the city.' The translation
    preserves that wording rather than harmonizing to temple-building language found
    elsewhere in Ezra traditions. This follows original-language primacy and avoids
    importing a different restoration focus than this verse states.
