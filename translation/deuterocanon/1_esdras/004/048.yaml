translation:
  text: And he wrote letters to all the governors in Coele-Syria and Phoenicia and
    those in Lebanon, to bring cedar timber from Lebanon to Jerusalem, and so that
    they might build the city with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'district rulers' or 'local rulers' for 'governors' (Greek toparchs).
    reason: lexical_alternative
  - marker: b
    text: Coele-Syria is the historical regional name in the Greek text.
    reason: cultural_note
lexical_decisions:
- source_word: τοπάρχαις
  chosen: governors
  alternatives:
  - district rulers
  - local rulers
  - toparchs
  lexicon: LSJ
  rationale: The term denotes regional officials or rulers over districts. 'Governors'
    gives clear modern English without the opacity of the transliteration 'toparchs,'
    while still fitting the administrative context.
- source_word: ἐν κοίλῃ Συρίᾳ
  chosen: in Coele-Syria
  alternatives:
  - in Hollow Syria
  - in Syria
  lexicon: LSJ
  rationale: This is a proper regional designation, not a descriptive phrase to be
    freshly translated. 'Coele-Syria' preserves the historical place-name more accurately
    than flattening it to 'Syria.'
- source_word: Φοινίκῃ
  chosen: Phoenicia
  alternatives:
  - Phenicia
  lexicon: LSJ
  rationale: Standard English transliteration of the region name.
- source_word: τοῖς ἐν τῷ Λιβάνῳ
  chosen: those in Lebanon
  alternatives:
  - those on Lebanon
  - those in the Lebanon
  lexicon: LSJ
  rationale: The Greek leaves the referent somewhat general rather than repeating
    a formal title. 'Those in Lebanon' preserves that breadth and avoids over-specifying
    officials not explicitly named in this phrase.
- source_word: μεταφέρειν
  chosen: to bring
  alternatives:
  - to transport
  - to carry over
  lexicon: BDAG
  rationale: '''Bring'' is natural English for the infinitive of instruction in this
    context, while still conveying the movement of materials from one place to another.'
- source_word: ξύλα κέδρινα
  chosen: cedar timber
  alternatives:
  - cedar wood
  - cedar logs
  lexicon: LSJ
  rationale: The phrase refers to cedar wood as building material. 'Cedar timber'
    communicates construction-grade wood more idiomatically than the bare 'cedar wood.'
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: This conjunction introduces purpose. 'So that' is clear modern English
    and preserves the purposive force.
- source_word: οἰκοδομήσωσιν
  chosen: they might build
  alternatives:
  - they may build
  - they should build
  lexicon: BDAG
  rationale: The subjunctive after ὅπως is well represented by 'might build' in English,
    preserving the purpose nuance.
- source_word: μετʼ αὐτοῦ
  chosen: with him
  alternatives:
  - along with him
  - together with him
  lexicon: BDAG
  rationale: The phrase most naturally indicates cooperation with the king's project
    or person. 'With him' is the most direct rendering.
- source_word: τὴν πόλιν
  chosen: the city
  alternatives:
  - the town
  lexicon: BDAG
  rationale: Standard rendering of πόλις. In context it refers to Jerusalem as an
    urban center, and the Greek explicitly says 'the city,' not 'the temple' or 'the
    house'.
