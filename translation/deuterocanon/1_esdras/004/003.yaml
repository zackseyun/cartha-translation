translation:
  text: And they ate and drank, and when they were filled they departed. But Darius
    the king went into his bedchamber and slept, and then awoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having been satisfied' for 'when they were filled'; the Greek participle
      ἐμπλησθέντες can emphasize satiety after the meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφάγοσαν
  chosen: they ate
  alternatives:
  - they consumed
  lexicon: LSJ
  rationale: Aorist of ἐσθίω; the plain narrative sense is simple eating. 'They ate'
    is natural modern English and closely follows the Greek.
- source_word: ἐπίοσαν
  chosen: drank
  alternatives:
  - they drank
  lexicon: LSJ
  rationale: Aorist of πίνω. English can omit the repeated subject after 'they ate';
    'drank' preserves the coordinated action without unnecessary stiffness.
- source_word: ἐμπλησθέντες
  chosen: when they were filled
  alternatives:
  - having been satisfied
  - after they had eaten their fill
  lexicon: LSJ
  rationale: The participle denotes being filled/sated after eating and drinking.
    'When they were filled' keeps the imagery and sequence without over-paraphrasing;
    alternatives are possible but slightly more interpretive.
- source_word: ἀνέλυσαν
  chosen: they departed
  alternatives:
  - they withdrew
  - they dispersed
  - they went away
  lexicon: LSJ
  rationale: In this context the verb means to break up or depart after the meal.
    'Departed' is concise and idiomatic in narrative English.
- source_word: κοιτών
  chosen: bedchamber
  alternatives:
  - bedroom
  - sleeping room
  - chamber
  lexicon: LSJ
  rationale: The term refers to an inner sleeping room. 'Bedchamber' preserves the
    royal setting better than the more domestic 'bedroom' while remaining understandable.
- source_word: ἐκοιμήθη
  chosen: slept
  alternatives:
  - fell asleep
  - lay down to sleep
  lexicon: LSJ
  rationale: The aorist straightforwardly states that he slept. 'Slept' is the least
    interpretive rendering.
- source_word: ἔξυπνος ἐγένετο
  chosen: then awoke
  alternatives:
  - became awake
  - woke up
  lexicon: LSJ
  rationale: The idiom literally means 'became awake.' 'Then awoke' gives smooth English
    while preserving the narrative progression.
