theological_decisions:
- issue: Courtly honor language in συγγενής μου κληθήσῃ
  chosen_reading: Render literally as 'you shall be called my kinsman'
  alternative_readings:
  - you shall be called my relative
  - you shall be called my friend
  rationale: The verse concerns royal reward and status, not theology proper, but
    the social elevation is significant. 'Friend' would import a looser political
    title not stated by the Greek. 'Kinsman' best preserves the familial-honor idiom
    without overstating blood relation.
  doctrine_reference: Translation philosophy §1, §5
