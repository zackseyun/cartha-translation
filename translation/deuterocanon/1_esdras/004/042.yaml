translation:
  text: Then the king said to him, “Ask for whatever more you want beyond what has
    been written, and we will give it to you, since you have been found wiser; and
    you shall sit next to me, and you shall be called my kinsman.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whatever more you wish than what has been written.' The phrase likely
      refers to rewards already recorded or decreed in writing.
    reason: lexical_alternative
  - marker: b
    text: Or, 'you shall sit beside me.' The Greek expression denotes proximity and
      honor at court.
    reason: lexical_alternative
  - marker: c
    text: Or, 'you shall be called my relative.' The wording expresses royal favor
      and elevated status.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αἴτησαι
  chosen: Ask for
  alternatives:
  - Request
  - Ask
  lexicon: LSJ
  rationale: Aorist middle imperative of αἰτέω, functioning as a direct royal invitation
    or command. 'Ask for' fits idiomatic English with an object following.
- source_word: ὃ θέλεις πλείω τῶν γεγραμμένων
  chosen: whatever more you want beyond what has been written
  alternatives:
  - whatever more you wish than what has been written
  - anything further beyond what was written
  lexicon: LSJ
  rationale: ὃ θέλεις is an open relative clause ('whatever you want'). πλείω conveys
    'more/further,' and τῶν γεγραμμένων refers to what has already been put in writing,
    likely the previously promised rewards. 'Beyond what has been written' preserves
    the comparative force without overexplaining.
- source_word: δώσομέν σοι
  chosen: we will give it to you
  alternatives:
  - we will grant it to you
  - we shall give you
  lexicon: LSJ
  rationale: Future of δίδωμι. 'Give it to you' is straightforward and natural; 'grant'
    is possible but slightly more interpretive.
- source_word: ὃν τρόπον
  chosen: since
  alternatives:
  - because
  - inasmuch as
  - seeing that
  lexicon: LSJ
  rationale: Literally 'in the manner that,' but in this context it introduces the
    ground for the king's generosity. 'Since' gives the causal sense in clear English.
- source_word: εὑρέθης σοφώτερος
  chosen: you have been found wiser
  alternatives:
  - you were found wiser
  - you have proved wiser
  lexicon: LSJ
  rationale: Aorist passive of εὑρίσκω with comparative σοφώτερος. 'Have been found
    wiser' preserves the passive evaluation and comparative sense. The comparison
    is implicit from context, so English need not supply an explicit object.
- source_word: ἐχόμενός μου καθήσῃ
  chosen: you shall sit next to me
  alternatives:
  - you shall sit beside me
  - you shall sit holding to me
  lexicon: LSJ
  rationale: ἐχόμενος with genitive can mean 'next to' or 'near.' In a courtly seating
    context, 'sit next to me' is the natural idiomatic rendering and conveys honor
    without wooden literalism.
- source_word: συγγενής μου κληθήσῃ
  chosen: you shall be called my kinsman
  alternatives:
  - you shall be called my relative
  - you shall be called my kin
  lexicon: LSJ
  rationale: συγγενής denotes one of the same family or kin group. 'Kinsman' preserves
    the elevated courtly register and relational force better than the flatter 'relative.'
