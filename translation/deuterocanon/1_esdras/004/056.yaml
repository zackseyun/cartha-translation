translation:
  text: And to all who guarded the city, he wrote that allotments and wages should
    be given to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lots and pay.' The noun translated 'allotments' can more literally mean
      'lots' or an assigned 'share/portion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φρουροῦσι
  chosen: who guarded
  alternatives:
  - who were guarding
  - who kept watch over
  lexicon: LSJ
  rationale: The participle from φρουρέω denotes guarding or keeping watch. 'Who guarded'
    gives natural English while preserving the military/protective sense in context.
- source_word: πόλιν
  chosen: the city
  alternatives:
  - city
  lexicon: LSJ
  rationale: The article is present in Greek, so 'the city' is retained rather than
    an indefinite rendering.
- source_word: ἔγραψε
  chosen: he wrote that
  alternatives:
  - he wrote to give
  - he issued a written order to give
  lexicon: LSJ
  rationale: The aorist verb means 'wrote.' In this administrative context it introduces
    the content of a written order. 'He wrote that' preserves the verbal form without
    over-paraphrasing into 'decreed' or 'commanded.'
- source_word: δοῦναι
  chosen: should be given
  alternatives:
  - to give
  lexicon: LSJ
  rationale: The infinitive depends on ἔγραψε and expresses the content of the written
    instruction. Passive English ('should be given') is smoother and reflects the
    administrative sense that provision was to be made for them.
- source_word: κλήρους
  chosen: allotments
  alternatives:
  - lots
  - shares
  - portions
  lexicon: LSJ
  rationale: κλῆρος can mean 'lot' literally, but in distributive-administrative contexts
    it can denote an allotted share or portion. Because it is paired with ὀψώνια,
    a concrete provision term, 'allotments' best captures assigned portions without
    forcing a narrower interpretation.
- source_word: ὀψώνια
  chosen: wages
  alternatives:
  - pay
  - rations
  - provisions
  lexicon: BDAG
  rationale: ὀψώνια commonly refers to pay or wages, especially for soldiers or officials,
    though historically connected with rations. 'Wages' is the clearest modern equivalent;
    'pay' was considered but 'wages' better matches the noun's compensatory sense.
