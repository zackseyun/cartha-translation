translation:
  text: Then King Darius stood up and kissed him, and he wrote letters for him to
    all the stewards and local rulers and generals and satraps, that they should send
    him on his way, along with all those with him who were going up to rebuild Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'escort him' or 'provide for his journey'; the Greek verb can imply sending
      someone onward with support.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεφίλησεν
  chosen: kissed
  alternatives:
  - embraced
  - kissed warmly
  lexicon: LSJ
  rationale: The verb denotes kissing, often with warmth or affection. English 'kissed'
    is the plain, natural rendering; adding 'warmly' would over-interpret the degree
    of emotion.
- source_word: ἐπιστολάς
  chosen: letters
  alternatives:
  - documents
  - official letters
  lexicon: LSJ
  rationale: The term refers to written communications. In this royal-administrative
    context they are official, but 'letters' is sufficient and idiomatic without adding
    detail not explicit in the Greek.
- source_word: οἰκονόμους
  chosen: stewards
  alternatives:
  - administrators
  - officials
  lexicon: LSJ
  rationale: Literally 'household managers' or stewards; in an imperial context it
    can denote administrative officers. 'Stewards' preserves the lexical core while
    remaining understandable.
- source_word: τοπάρχας
  chosen: local rulers
  alternatives:
  - district governors
  - toparchs
  lexicon: LSJ
  rationale: The word denotes rulers over a locality or district. 'Local rulers' communicates
    the sense in clear English; 'toparchs' would be too transliterated for the main
    text.
- source_word: στρατηγοὺς
  chosen: generals
  alternatives:
  - commanders
  - military governors
  lexicon: LSJ
  rationale: The basic sense is military leaders. 'Generals' is the most direct and
    readable rendering here.
- source_word: σατράπας
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: LSJ
  rationale: This is a specific Persian administrative title. Retaining 'satraps'
    preserves historical specificity better than flattening it to 'governors'.
- source_word: προπέμψωσιν
  chosen: send him on his way
  alternatives:
  - escort him
  - provide for his journey
  lexicon: LSJ
  rationale: The verb can mean to send forward, often with assistance or escort. 'Send
    him on his way' captures the movement and implied support without narrowing the
    exact form of aid.
- source_word: ἀναβαίνοντας
  chosen: going up
  alternatives:
  - ascending
  - returning
  lexicon: LSJ
  rationale: The participle literally means 'going up.' In Jerusalem-travel contexts
    this is conventional pilgrimage/geographical language, so the literal expression
    is preserved.
- source_word: οἰκοδομῆσαι
  chosen: rebuild
  alternatives:
  - build
  lexicon: LSJ
  rationale: Given the context of Jerusalem's restoration, 'rebuild' brings out the
    implied restoration more clearly than the bare 'build'.
