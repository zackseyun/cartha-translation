translation:
  text: One wrote, “Wine is stronger.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Wine prevails.” The Greek verb can denote prevailing or being stronger/superior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ εἷς
  chosen: One
  alternatives:
  - The one
  - One of them
  lexicon: LSJ
  rationale: The phrase literally means 'the one,' but in this contest setting it
    idiomatically identifies one participant. 'One' is concise and natural in English
    while preserving the indefinite/distributive sense.
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - had written
  - inscribed
  lexicon: LSJ
  rationale: Aorist of γράφω, straightforwardly 'wrote.' English simple past fits
    the narrative sequence without adding aspect not explicit in the Greek.
- source_word: Ὑπερισχύει
  chosen: is stronger
  alternatives:
  - prevails
  - is strongest
  - has the upper hand
  lexicon: LSJ
  rationale: The verb means to be superior in strength or to prevail. In this immediate
    context of comparative claims ('what is strongest?'), 'is stronger' communicates
    the sense naturally in English. 'Prevails' is possible, but the comparative-strength
    framing is more transparent here.
- source_word: ὁ οἶνος
  chosen: Wine
  alternatives:
  - the wine
  lexicon: LSJ
  rationale: Although the Greek has the article, English idiom normally omits it in
    a generic statement. Capitalization follows quotation-initial position, not special
    emphasis.
