translation:
  text: and you vowed to rebuild the temple which the Judeans burned when Judea was
    laid waste by the Chaldeans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''which the Judeans burned.'' Some readers may expect ''which the
      Chaldeans/Babylonians burned'' from parallel historical traditions, but the
      present Greek text explicitly reads ''the Judeans.'''
    reason: alternative_reading
lexical_decisions:
- source_word: εὔξω
  chosen: you vowed
  alternatives:
  - you promised
  - you prayed
  - you made a vow
  lexicon: LSJ
  rationale: From εὔχομαι in the aorist/middle sense of making a vow or pledge. In
    this context, addressing the king's prior commitment, 'you vowed' best captures
    a solemn pledged intention more precisely than the broader 'promised' or the contextually
    weaker 'prayed'.
- source_word: οἰκοδομῆσαι
  chosen: to rebuild
  alternatives:
  - to build
  lexicon: LSJ
  rationale: Although the infinitive literally means 'to build,' the object is the
    temple that had been burned, so English idiom naturally and accurately expresses
    restoration as 'rebuild' without adding meaning beyond the context.
- source_word: ναὸν
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: LSJ
  rationale: ναός here refers to the temple structure in Jerusalem. 'Temple' is the
    standard clear rendering in this historical context.
- source_word: ἐνεπύρισαν
  chosen: burned
  alternatives:
  - set on fire
  - burned down
  lexicon: LSJ
  rationale: The verb denotes setting ablaze/burning. 'Burned' is concise and sufficient;
    'burned down' may overstate total destruction beyond the wording itself.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Judeans
  alternatives:
  - the Jews
  lexicon: LSJ
  rationale: In this exilic/post-exilic historical setting, Ἰουδαῖοι can denote the
    people of Judah/Judea as an ethnogeographic group. 'Judeans' preserves that nuance
    better than the more anachronistically broad 'Jews,' while remaining natural English.
- source_word: ἐρημώθη
  chosen: was laid waste
  alternatives:
  - was made desolate
  - was devastated
  lexicon: LSJ
  rationale: The passive verb conveys desolation/devastation. 'Was laid waste' is
    idiomatic, weighty, and close to the Greek sense.
- source_word: Χαλδαίων
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: LSJ
  rationale: The Greek specifically says 'Chaldeans.' Retaining the ethnic-historical
    term keeps the source wording visible; 'Babylonians' is interpretive and therefore
    left as an alternative.
