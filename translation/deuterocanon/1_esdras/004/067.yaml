theological_decisions:
- issue: Historical attribution in 'which the Judeans burned'
  chosen_reading: Retain the Greek wording as written, attributing the burning to
    'the Judeans.'
  alternative_readings:
  - Render interpretively as 'which was burned' or attribute the burning to the Chaldeans/Babylonians
    in light of parallel historical traditions
  rationale: The Zone 1 Greek explicitly has οἱ Ἰουδαῖοι as the subject of ἐνεπύρισαν.
    Even if this creates historical tension with more familiar accounts, the translation
    should not silently correct the source. The tension is preserved rather than resolved
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
