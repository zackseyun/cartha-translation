translation:
  text: and taking the crown from the king’s head and putting it on herself; and she
    struck the king with her left hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slapped the king with her left hand.' The Greek verb can denote a slap
      or a strike.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφαιροῦσαν
  chosen: taking
  alternatives:
  - removing
  - taking away
  lexicon: LSJ
  rationale: The participle describes the woman’s action in progress within the larger
    scene. 'Taking' is natural English and preserves the sense of removing something
    from another person. 'Removing' is possible but less idiomatic here.
- source_word: διάδημα
  chosen: crown
  alternatives:
  - diadem
  lexicon: LSJ
  rationale: '''Crown'' is the clearest modern English equivalent for the royal headpiece.
    ''Diadem'' is more formally precise but less accessible; the royal sense is fully
    preserved by ''crown''.'
- source_word: ἐπιτιθοῦσαν αὐτῇ
  chosen: putting it on herself
  alternatives:
  - placing it on herself
  - putting it on her
  lexicon: LSJ
  rationale: 'The reflexive sense is required by the dative pronoun αὐτῇ in context:
    she takes the crown from the king and places it on herself. ''Putting it on herself''
    makes that explicit in idiomatic English.'
- source_word: ἐράπιζεν
  chosen: struck
  alternatives:
  - slapped
  - smote
  lexicon: LSJ
  rationale: The verb commonly denotes striking, often a slap or blow with the hand.
    'Struck' preserves the action without over-specifying the exact manner. 'Slapped'
    is plausible and worth preserving in a footnote as a lexical alternative.
- source_word: τῇ ἀριστερᾷ
  chosen: with her left hand
  alternatives:
  - with the left hand
  - with her left
  lexicon: LSJ
  rationale: The feminine subject and instrumental dative make 'with her left hand'
    the most natural English rendering. Supplying 'hand' is idiomatic and clarifies
    the bodily instrument implied by the Greek.
