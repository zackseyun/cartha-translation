translation:
  text: Then the three young men, the bodyguards who were guarding the king’s person,
    said to one another,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the bodyguards, those guarding the body of the king.' Here 'the
      king’s person' reflects the courtly sense of guarding the king himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: LSJ
  rationale: Standard temporal/sequential connective introducing the next action in
    the narrative.
- source_word: οἱ τρεῖς νεανίσκοι
  chosen: the three young men
  alternatives:
  - the three youths
  - the three young attendants
  lexicon: LSJ
  rationale: νεανίσκοι denotes young men/youths. 'Young men' is natural modern English
    while preserving age-related sense.
- source_word: οἱ σωματοφύλακες
  chosen: the bodyguards
  alternatives:
  - the guards
  - the royal bodyguards
  lexicon: LSJ
  rationale: Compound literally meaning 'body-guards,' i.e., guards assigned to the
    king's person. 'Bodyguards' is the most direct and idiomatic rendering.
- source_word: οἱ φυλάσσοντες
  chosen: who were guarding
  alternatives:
  - who guarded
  - who were keeping watch over
  lexicon: LSJ
  rationale: Present participle describing their ongoing role/function. 'Who were
    guarding' preserves the durative sense in readable English.
- source_word: τὸ σῶμα τοῦ βασιλέως
  chosen: the king’s person
  alternatives:
  - the body of the king
  - the king's body
  lexicon: LSJ
  rationale: Although σῶμα literally means 'body,' in this courtly/security context
    with σωματοφύλακες it refers to the king's person rather than his physical body
    as an object. 'The king’s person' best conveys the idiom in English.
- source_word: εἶπαν ἕτερος πρὸς τὸν ἕτερον
  chosen: said to one another
  alternatives:
  - said each to the other
  - spoke to each other
  lexicon: LSJ
  rationale: Idiomatic reciprocal expression. 'Said to one another' is natural English
    and preserves the mutual exchange.
