translation:
  text: and with her there is no partiality or favoritism, but she does what is just
    rather than all that is unjust and wicked; and all approve of her works,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'there is no receiving of faces with her,' an idiom meaning
      'showing partiality.'
    reason: lexical_alternative
  - marker: b
    text: Or 'makes no distinctions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαμβάνειν πρόσωπα
  chosen: show partiality
  alternatives:
  - accept faces
  - be partial
  - show favoritism
  lexicon: LSJ
  rationale: The idiom literally means 'to receive faces' and denotes partiality or
    favoritism in judgment. English should render the idiom's sense rather than preserve
    an opaque literalism. Because the Greek has both this idiom and οὐδὲ διάφορα,
    'partiality' plus 'favoritism' preserves the paired emphasis.
- source_word: διάφορα
  chosen: favoritism
  alternatives:
  - distinctions
  - preferences
  - differences
  lexicon: LSJ
  rationale: In this context, after the idiom for partiality, the term points to making
    distinctions or preferential treatment. 'Favoritism' gives clear modern English
    and complements 'partiality' without sounding overly technical.
- source_word: τὰ δίκαια
  chosen: what is just
  alternatives:
  - the just things
  - what is right
  - righteous things
  lexicon: LSJ
  rationale: The neuter plural with ποιεῖ is naturally rendered idiomatically in English.
    'What is just' preserves the judicial-ethical sense in context, where truth is
    contrasted with injustice and wickedness.
- source_word: ἀπὸ πάντων τῶν ἀδίκων καὶ πονηρῶν
  chosen: apart from all that is unjust and wicked
  alternatives:
  - against all unjust and evil things
  - separate from all injustice and wickedness
  - away from all the unjust and wicked
  lexicon: LSJ
  rationale: The preposition ἀπό here marks separation or distance. The phrase contrasts
    truth's action with everything characterized by injustice and wickedness. 'Apart
    from all that is unjust and wicked' is idiomatic while preserving the separative
    force.
- source_word: εὐδοκοῦσι
  chosen: approve of
  alternatives:
  - take pleasure in
  - are pleased with
  - delight in
  lexicon: LSJ
  rationale: The verb can mean to be pleased with or approve. Since the object is
    'her works,' 'approve of' fits the moral-evaluative context and reads naturally.
- source_word: αὐτὴν / αὐτῆς
  chosen: her
  alternatives:
  - it
  lexicon: Greek grammar
  rationale: The antecedent in the surrounding context is ἀλήθεια ('truth'), a grammatically
    feminine noun. English can preserve the personification with 'her,' which suits
    the rhetorical style of the passage.
