  text: καὶ οὐκ ἔστιν παρʼ αὐτὴν λαμβάνειν πρόσωπα οὐδὲ διάφορα, ἀλλὰ τὰ δίκαια ποιεῖ
    ἀπὸ πάντων τῶν ἀδίκων καὶ πονηρῶν· καὶ πάντες εὐδοκοῦσι τοῖς ἔργοις αὐτῆς,
