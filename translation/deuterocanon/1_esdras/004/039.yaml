theological_decisions:
- issue: Personification of truth
  chosen_reading: Retain feminine personal reference ('her') for truth
  alternative_readings:
  - Use impersonal 'it' for smoother English
  rationale: The Greek personifies truth as feminine throughout the context. Preserving
    'her' maintains the literary and rhetorical force without importing additional
    doctrine.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English with source-language primacy.
