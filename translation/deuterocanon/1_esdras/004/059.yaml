translation:
  text: saying, “From you are victory and from you is wisdom, and yours is the glory,
    and I am your servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I am your household servant,” with the stronger sense “I am your slave”
      also possible for the Greek term.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρὰ σοῦ
  chosen: From you
  alternatives:
  - With you
  - By you
  lexicon: LSJ
  rationale: παρά with the genitive commonly denotes source or origin. In this doxological
    context, 'From you' best conveys that victory and wisdom come from the one addressed.
- source_word: νίκη
  chosen: victory
  alternatives:
  - triumph
  lexicon: LSJ
  rationale: The noun straightforwardly denotes victory. 'Victory' is the most natural
    and direct English equivalent here.
- source_word: σοφία
  chosen: wisdom
  alternatives:
  - skill
  - understanding
  lexicon: LSJ
  rationale: σοφία regularly means wisdom; no contextual pressure suggests narrowing
    it to technical skill.
- source_word: σὴ ἡ δόξα
  chosen: yours is the glory
  alternatives:
  - the glory is yours
  - your is the glory
  lexicon: LSJ
  rationale: The possessive adjective with the article and noun expresses possession
    emphatically. 'Yours is the glory' is idiomatic English and preserves the emphasis.
- source_word: οἰκέτης
  chosen: servant
  alternatives:
  - household servant
  - slave
  lexicon: LSJ
  rationale: οἰκέτης denotes a household servant/slave. Here the speaker's self-humbling
    relation is clear, but the bonded status is not the main focus; 'servant' fits
    the register while avoiding overstatement. The stronger alternative 'slave' remains
    possible lexically.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: LSJ
  rationale: The present participle introduces the quoted speech. 'Saying' preserves
    the Greek structure more closely than converting it into a finite verb.
