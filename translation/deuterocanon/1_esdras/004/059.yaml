theological_decisions:
- issue: Rendering of οἰκέτης in a posture of submission
  chosen_reading: servant
  alternative_readings:
  - slave
  - household servant
  rationale: Per project philosophy, terms for servitude should reflect bondedness
    where salient. Here the line is a courtly/doxological confession of allegiance,
    and English 'servant' best matches the tone without denying the stronger lexical
    range of οἰκέτης. The alternative is preserved in lexical documentation rather
    than forced into the main text.
