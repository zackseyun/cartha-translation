theological_decisions:
- issue: Reference of 'King of heaven'
  chosen_reading: A title for God, distinguished from the human king addressed in
    the verse.
  rationale: The text contrasts the earthly monarch ('lord king') with the one to
    whom the vow was made, 'the King of heaven.' The translation preserves both titles
    without collapsing them.
  doctrine_reference: 'DOCTRINE.md: translate titles; preserve theological tension
    rather than resolve it'
