translation:
  text: 'And now this is what I ask, lord king, and what I request from you, and this
    is the greatness that comes from you: therefore I beg that you fulfill the vow
    which I vowed to the King of heaven to accomplish by your mouth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to do from your mouth'—that is, to carry it out by your spoken
      decree or command.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀξιῶ
  chosen: I ask
  alternatives:
  - I claim
  - I request
  lexicon: LSJ
  rationale: In petitionary court language here, the verb expresses making a request
    rather than asserting a right. 'I ask' is natural English and fits the parallel
    with αἰτοῦμαί.
- source_word: κύριε βασιλεῦ
  chosen: lord king
  alternatives:
  - my lord the king
  - sir king
  lexicon: LSJ
  rationale: A vocative address of respect to the monarch. 'Lord king' stays close
    to the Greek without adding possessive wording not present in the text. Lowercase
    'lord' avoids confusion with the divine title, since the human king is addressed.
- source_word: αἰτοῦμαί
  chosen: I request
  alternatives:
  - I ask
  - I petition
  lexicon: LSJ
  rationale: Rendered distinctly from ἀξιῶ to preserve the rhetorical doubling of
    petition verbs. 'Request' is idiomatic and slightly more formal.
- source_word: μεγαλωσύνη
  chosen: the greatness
  alternatives:
  - the magnanimity
  - the generosity
  - the greatness of spirit
  lexicon: LSJ
  rationale: The noun can denote greatness or majesty, and in context refers to the
    king's noble favor. 'The greatness' is the most literal rendering; the sense of
    royal generosity is carried by the clause 'that comes from you.'
- source_word: ἡ παρὰ σοῦ
  chosen: that comes from you
  alternatives:
  - from you
  - on your part
  lexicon: LSJ
  rationale: This phrase qualifies μεγαλωσύνη as something proceeding from the king.
    Expanded slightly for clear English syntax while preserving source sense.
- source_word: δέομαι
  chosen: I beg
  alternatives:
  - I implore
  - I ask
  lexicon: LSJ
  rationale: This verb intensifies the petition. 'I beg' preserves the heightened
    supplicatory tone.
- source_word: ποιήσῃς τὴν εὐχήν
  chosen: you fulfill the vow
  alternatives:
  - you perform the vow
  - you grant the prayer
  lexicon: LSJ
  rationale: εὐχή can mean prayer or vow; with ἣν ηὔξω ('which I vowed') the sense
    is specifically a vow. 'Fulfill' is idiomatic for carrying out a vowed commitment.
- source_word: ἣν ηὔξω
  chosen: which I vowed
  alternatives:
  - which I promised
  - which I prayed
  lexicon: LSJ
  rationale: The cognate verb confirms that εὐχή here means a vowed promise rather
    than a general prayer.
- source_word: τῷ βασιλεῖ τοῦ οὐρανοῦ
  chosen: to the King of heaven
  alternatives:
  - to the heavenly King
  lexicon: LSJ
  rationale: A divine title referring to God. 'King of heaven' is a transparent, literal
    rendering and preserves the contrast with the earthly king being addressed.
- source_word: ποιῆσαι ἐκ στόματός σου
  chosen: to accomplish by your mouth
  alternatives:
  - to carry out by your command
  - to perform through your word
  lexicon: LSJ
  rationale: Literally 'to do from your mouth,' an idiom for action effected by the
    king's spoken decree. 'By your mouth' preserves the metaphor, though the sense
    is royal authorization by spoken command.
