translation:
  text: and that all the land they possess should be tax-free for them; and that the
    Chaldeans should leave the villages of the Jews that they hold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the territory they possess shall be exempt from tribute for them.'
    reason: lexical_alternative
  - marker: b
    text: '''Chaldeans'' is the Greek wording; some English readers may understand
      this more broadly as Babylonians.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χώραν
  chosen: land
  alternatives:
  - country
  - territory
  - region
  lexicon: LSJ
  rationale: A broad territorial term; 'land' fits the legal-administrative context
    without over-specifying a political unit.
- source_word: κρατήσουσιν
  chosen: occupy
  alternatives:
  - possess
  - hold
  - control
  lexicon: LSJ
  rationale: The future of κρατέω here refers to exercising possession/control over
    territory. 'Occupy' conveys actual holding of land in context.
- source_word: ἀφορολόγητον
  chosen: tax-free
  alternatives:
  - exempt from tribute
  - untaxed
  lexicon: LSJ
  rationale: The adjective denotes exemption from taxation or tribute. 'Tax-free'
    is concise, natural modern English and preserves the fiscal sense.
- source_word: ὑπάρχειν
  chosen: should belong to them
  alternatives:
  - should be for them
  - should remain theirs
  lexicon: LSJ
  rationale: In this infinitival construction after the decree formula, the sense
    is that the land is to stand as their possession/status. 'Should belong to them'
    expresses the legal force idiomatically.
- source_word: Χαλδαῖοι
  chosen: Chaldeans
  alternatives:
  - Babylonians
  lexicon: LSJ
  rationale: The Greek explicitly says 'Chaldeans.' Although 'Babylonians' may be
    historically explanatory, the translation should preserve the source ethnonym.
- source_word: ἀφίουσι
  chosen: should leave
  alternatives:
  - should release
  - should give up
  - should let go of
  lexicon: LSJ
  rationale: The verb ἀφίημι here means to relinquish possession. 'Should leave' is
    natural with 'villages' and communicates withdrawal from control.
- source_word: κώμας
  chosen: villages
  alternatives:
  - settlements
  - hamlets
  lexicon: LSJ
  rationale: κώμη normally denotes a village. 'Villages' is the standard and clearest
    rendering.
- source_word: διακρατοῦσιν
  chosen: hold
  alternatives:
  - occupy
  - control
  - possess
  lexicon: LSJ
  rationale: The compound verb intensifies the idea of retaining control. 'Hold' is
    concise and works well in English with villages.
