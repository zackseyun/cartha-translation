theological_decisions:
- issue: Legal-administrative force of the infinitive clauses in a royal decree context
  chosen_reading: Render with English 'should' clauses ('should belong,' 'should leave')
  alternative_readings:
  - 'more wooden infinitives: ''to be tax-free for them,'' ''to release'''
  rationale: The verse lists decree provisions. Using 'should' preserves the prescriptive
    force in readable modern English without paraphrasing beyond the Greek.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; readable modern English'
