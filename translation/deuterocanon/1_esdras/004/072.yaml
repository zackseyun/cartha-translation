id: 1ES.4.72
reference: 1 Esdras 4:72
source:
  edition: lxx-swete-1909
  text: καὶ πᾶσαν τὴν χώραν ἣν κρατήσουσιν ἀφορολόγητον αὐτοῖς ὑπάρχειν· καὶ ἵνα οἱ
    Χαλδαῖοι ἀφίουσι τὰς κώμας ἃς διακρατοῦσιν τῶν Ἰουδαίων·
  language: Greek
