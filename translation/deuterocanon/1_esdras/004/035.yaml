- issue: Rendering ἡ ἀλήθεια as an abstract claim without over-theologizing
  chosen_reading: truth
  alternative_readings:
  - the truth
  - truthfulness
  rationale: The verse personifies or extols truth in a wisdom-like rhetorical contest.
    Rendering it simply as 'truth' preserves the abstract and universal force without
    importing a narrower doctrinal or specifically christological sense not stated
    in the text.
