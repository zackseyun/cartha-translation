translation:
  text: Is not he who does these things great? And truth is great, and stronger than
    all things.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐχὶ
  chosen: Is not
  alternatives:
  - Isn't
  - Surely ... not
  lexicon: BDAG
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Is
    not' preserves the elevated but still readable force better than a contraction.
- source_word: μέγας
  chosen: great
  alternatives:
  - mighty
  - important
  lexicon: BDAG
  rationale: The adjective denotes greatness in status or significance. 'Great' is
    the most direct and idiomatic rendering here, and it also echoes the repeated
    theme of what is 'great' in the surrounding argument.
- source_word: ὃς
  chosen: the one who
  alternatives:
  - he who
  - who
  lexicon: BDAG
  rationale: The relative pronoun is substantival here. 'The one who' is clear modern
    English and avoids archaic 'he who' while preserving the singular personal reference.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - such things
  lexicon: BDAG
  rationale: Plural demonstrative; 'these things' reflects the Greek number and points
    back to the acts just described.
- source_word: ποιεῖ
  chosen: does
  alternatives:
  - makes
  - accomplishes
  lexicon: BDAG
  rationale: ποιέω is broad, and in this context 'does' is the most natural English
    verb for performing the referenced acts.
- source_word: ἡ ἀλήθεια
  chosen: truth
  alternatives:
  - the truth
  - truthfulness
  lexicon: BDAG
  rationale: Although the article is present in Greek, English idiom works better
    here with the abstract noun 'truth' rather than 'the truth.' 'Truthfulness' would
    shift the sense toward a personal quality rather than the broader abstract claim
    being made.
- source_word: μεγάλη
  chosen: great
  alternatives:
  - mighty
  - supreme
  lexicon: BDAG
  rationale: Maintains the lexical connection with μέγας earlier in the verse. 'Great'
    preserves the rhetorical parallelism.
- source_word: ἰσχυροτέρα
  chosen: stronger
  alternatives:
  - more powerful
  - mightier
  lexicon: BDAG
  rationale: Comparative adjective meaning stronger or more powerful. 'Stronger' is
    concise and preserves the comparative force.
- source_word: παρὰ πάντα
  chosen: than everything
  alternatives:
  - than all things
  - above everything
  lexicon: BDAG
  rationale: The phrase expresses comparison with the totality of things. 'Than everything'
    is natural modern English and keeps the universal scope. 'Above everything' could
    suggest rank rather than comparative strength.
