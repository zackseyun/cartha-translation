translation:
  text: But the king prevails over them and rules over them, and is master over them,
    and whatever he says to them, they obey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they listen to him' / 'they heed him.' The Greek verb is literally a
      hearing-word, but here it carries the sense of obedience to royal command.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ βασιλεὺς
  chosen: But the king
  alternatives:
  - And the king
  - Now the king
  lexicon: LSJ
  rationale: δέ is rendered with a mild adversative/continuative force as 'But' in
    the argumentative flow of the passage, and βασιλεύς is straightforwardly 'king'.
- source_word: ὑπερισχύει
  chosen: prevails over
  alternatives:
  - is stronger than
  - has the upper hand over
  lexicon: LSJ
  rationale: The verb denotes being stronger or prevailing. 'Prevails over' preserves
    the comparative force without sounding overly colloquial.
- source_word: κυριεύει αὐτῶν
  chosen: rules over them
  alternatives:
  - lords it over them
  - has dominion over them
  lexicon: LSJ
  rationale: κυριεύω carries the sense of exercising lordship or dominion. 'Rules
    over' is clear modern English and avoids the awkwardness of a too-literal idiom.
- source_word: δεσπόζει αὐτῶν
  chosen: is master over them
  alternatives:
  - has mastery over them
  - dominates them
  lexicon: LSJ
  rationale: δεσπόζω is stronger than κυριεύω and suggests mastership or absolute
    authority. 'Is master over them' preserves that nuance while remaining readable.
    The distinction from κυριεύει is intentionally maintained rather than flattened.
- source_word: πᾶν ὃ ἐὰν εἴπῃ αὐτοῖς
  chosen: whatever he says to them
  alternatives:
  - everything that he may say to them
  - whatever he tells them
  lexicon: LSJ
  rationale: 'The construction expresses indefiniteness: whatever he may say. ''Whatever
    he says to them'' is idiomatic English and adequately reflects the sense.'
- source_word: ἐνακούουσιν
  chosen: they obey
  alternatives:
  - they listen to
  - they heed
  lexicon: LSJ
  rationale: Though literally related to hearing/listening, in this context of royal
    command the sense is responsive obedience. 'They obey' best captures the force
    in English.
