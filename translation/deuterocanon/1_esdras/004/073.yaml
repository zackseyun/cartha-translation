  - 163
  validation: no_reference
translation:
  text: and for the building of the temple, that twenty talents be given each year
    until it is built;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the construction of the sanctuary.' The Greek uses ἱερόν, a standard
      term for the temple.
    reason: lexical_alternative
  - marker: b
    text: A talent was a large unit of weight, and in this context a monetary measure.
    reason: cultural_note
lexical_decisions:
- source_word: οἰκοδομή
  chosen: building
  alternatives:
  - construction
  lexicon: LSJ
  rationale: The phrase εἰς τὴν οἰκοδομὴν τοῦ ἱεροῦ denotes provision directed toward
    the temple's construction. 'Building' is natural English and preserves the noun's
    concrete sense without over-specifying process.
- source_word: ἱερόν
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: LSJ
  rationale: ἱερόν commonly refers to the temple precinct or temple as a sacred complex.
    In this rebuilding context, 'temple' is the clearest standard rendering.
- source_word: δοθῆναι
  chosen: be given
  alternatives:
  - be granted
  - be provided
  lexicon: LSJ
  rationale: The aorist passive infinitive after the implied decree language is well
    represented by 'be given.' It keeps the formal administrative sense of funds being
    allocated.
- source_word: κατ’ ἐνιαυτόν
  chosen: each year
  alternatives:
  - year by year
  - annually
  lexicon: LSJ
  rationale: The distributive phrase means on a yearly basis. 'Each year' is idiomatic
    modern English and preserves the recurring sense.
- source_word: τάλαντα εἴκοσι
  chosen: twenty talents
  alternatives:
  - twenty talent-weights
  lexicon: LSJ
  rationale: τάλαντα is a unit of weight and, by extension, monetary value. 'Talents'
    is the conventional and sufficiently transparent rendering in this fiscal context.
- source_word: μέχρι τοῦ οἰκοδομηθῆναι
  chosen: until it is built
  alternatives:
  - until it has been built
  - until the building is completed
  lexicon: LSJ
  rationale: The articular infinitive with μέχρι expresses duration up to completion.
    'Until it is built' is concise and naturally refers back to the temple.
