id: 1ES.4.73
reference: 1 Esdras 4:73
source:
  edition: lxx-swete-1909
  text: καὶ εἰς τὴν οἰκοδομὴν τοῦ ἱεροῦ δοθῆναι κατ’ ἐνιαυτὸν τάλαντα εἴκοσι μέχρι
    τοῦ οἰκοδομηθῆναι·
  language: Greek
  pages:
  - 146
  - 147
  - 153
  - 154
