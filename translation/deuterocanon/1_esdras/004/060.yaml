theological_decisions:
- issue: Rendering δέσποτα in address to God
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: To preserve the lexical distinction between δέσποτα and κύριος, the main
    text uses 'Master.' This avoids importing the default contested-term rendering
    for κύριος where that Greek term is absent.
  doctrine_reference: 'DOCTRINE.md: Translate titles; consistency of key terms, or
    documented exception.'
- issue: Gendered πατέρων
  chosen_reading: the fathers
  alternative_readings:
  - the ancestors
  rationale: The Greek is explicitly masculine plural and likely refers to the patriarchal
    forefathers. Per gender-accurate policy, the translation keeps 'fathers' rather
    than neutralizing to 'ancestors.'
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
