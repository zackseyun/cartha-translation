translation:
  text: Blessed are you, who have given me wisdom; and to you I give thanks, Master
    of the fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I acknowledge you' or 'I praise you'; the Greek verb can denote open
      acknowledgment or confession, and here likely carries a thanksgiving sense in
      prayer.
    reason: lexical_alternative
  - marker: b
    text: Or 'Sovereign of the fathers.' The Greek addresses God as δέσποτα, a term
      distinct from κύριος ('Lord').
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογητὸς
  chosen: Blessed
  alternatives:
  - Praised
  lexicon: BDAG
  rationale: Predicate adjective used in a doxological blessing. 'Blessed' preserves
    the conventional and semantically fitting sense for direct address to God better
    than the more interpretive 'Praised.'
- source_word: ὃς ἔδωκάς μοι σοφίαν
  chosen: who have given me wisdom
  alternatives:
  - because you have given me wisdom
  - who gave me wisdom
  lexicon: BDAG
  rationale: 'The relative clause directly qualifies the addressee: ''who have given
    me wisdom.'' Present perfect English best conveys the Greek aorist here in context
    of a present thanksgiving for a completed gift with ongoing relevance.'
- source_word: σοφίαν
  chosen: wisdom
  alternatives:
  - understanding
  lexicon: BDAG
  rationale: Standard rendering of σοφία; no contextual pressure suggests narrowing
    it to 'understanding.'
- source_word: ὁμολογῶ
  chosen: I give thanks
  alternatives:
  - I confess
  - I acknowledge
  - I praise
  lexicon: BDAG
  rationale: Although ὁμολογέω often means 'confess' or 'acknowledge,' in a prayer
    context with dative σοὶ it carries the sense of open acknowledgment/thanksgiving.
    'I give thanks' is the most natural English expression here without flattening
    the devotional force.
- source_word: δέσποτα
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: δέσποτα is more specific than κύριος and denotes authority/mastery. 'Master'
    preserves that lexical distinction. 'Sovereign' is possible but somewhat more
    interpretive; 'Lord' would blur the distinction from κύριος, which is not the
    word used here.
- source_word: τῶν πατέρων
  chosen: of the fathers
  alternatives:
  - of our fathers
  - of the ancestors
  lexicon: BDAG
  rationale: The Greek lacks 'our,' so it should not be supplied. 'Fathers' is retained
    as the source term; 'ancestors' is smoother but less formally transparent and
    would mute the gendered wording present in the Greek.
