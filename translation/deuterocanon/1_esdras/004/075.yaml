theological_decisions:
- issue: Nature of the granted ἐλευθερία
  chosen_reading: Render broadly as 'freedom' without specifying the exact legal privilege.
  alternative_readings:
  - Render as 'liberty'
  - Interpret more narrowly as 'tax exemption' or civic immunity
  rationale: The verse itself states that ἐλευθερία is granted but does not define
    its exact administrative scope. A broader rendering preserves the source's wording
    and avoids importing a more technical legal meaning not explicit in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
