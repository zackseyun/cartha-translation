  text: καὶ πᾶσιν τοῖς προσβαίνουσιν ἀπὸ τῆς Βαβυλωνίας κτίσαι τὴν πόλιν, ὑπάρχειν
    τὴν ἐλευθερίαν αὐτοῖς τε καὶ τοῖς τέκνοις αὐτῶν, καὶ πᾶσι τοῖς ἱερεῦσι τοῖς προσβαίνουσιν.
