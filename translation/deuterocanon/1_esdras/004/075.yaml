translation:
  text: And to all who go up from Babylonia to build the city, freedom is to belong
    to them and to their children, and to all the priests who go up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'liberty shall be theirs.' The Greek says literally that 'freedom' is
      to belong to them.
    reason: lexical_alternative
  - marker: b
    text: '''Babylonia'' translates the regional term in Greek; some English versions
      simplify it to ''Babylon.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσιν τοῖς προσβαίνουσιν
  chosen: to all who go up
  alternatives:
  - to all who come up
  - to all who proceed
  lexicon: LSJ
  rationale: πᾶσιν with the participle is distributive, 'to all those who...'. προσβαίνω
    in this return-from-exile context is idiomatically 'go up/come up,' reflecting
    ascent to Jerusalem. 'Go up' preserves the biblical-geographical idiom without
    overexplaining.
- source_word: ἀπὸ τῆς Βαβυλωνίας
  chosen: from Babylonia
  alternatives:
  - from Babylon
  lexicon: LSJ
  rationale: The Greek uses the regional form Βαβυλωνία rather than the city name
    Βαβυλών. 'Babylonia' is therefore the more precise rendering, though 'Babylon'
    would be more familiar.
- source_word: κτίσαι τὴν πόλιν
  chosen: to build the city
  alternatives:
  - to rebuild the city
  - to found the city
  lexicon: LSJ
  rationale: κτίζω can mean found, establish, or build. In this restoration context
    'rebuild' is interpretively plausible, but the Greek here simply says 'build';
    retaining that wording avoids importing more than the text states.
- source_word: ὑπάρχειν τὴν ἐλευθερίαν
  chosen: freedom is to belong
  alternatives:
  - they are to have freedom
  - liberty shall be theirs
  lexicon: LSJ
  rationale: 'The infinitive construction expresses the decree''s content: that freedom
    should belong to them. ''Freedom is to belong to them'' stays close to the Greek
    while remaining intelligible. ''Liberty'' is possible but slightly more formal/archaic.'
- source_word: ἐλευθερίαν
  chosen: freedom
  alternatives:
  - liberty
  - exemption
  lexicon: LSJ
  rationale: ἐλευθερία normally denotes freedom/liberty. In an imperial-decree context
    it may imply civic freedom or exemption from certain obligations, but 'freedom'
    is the broadest and least overdetermined rendering from the Greek alone.
- source_word: αὐτοῖς τε καὶ τοῖς τέκνοις αὐτῶν
  chosen: to them and to their children
  alternatives:
  - for them and their children
  lexicon: LSJ
  rationale: The dative phrase marks the beneficiaries of the granted freedom. 'Children'
    is the natural rendering of τέκνα here and avoids unnecessary specificity such
    as 'sons'.
- source_word: καὶ πᾶσι τοῖς ἱερεῦσι τοῖς προσβαίνουσιν
  chosen: and to all the priests who go up
  alternatives:
  - and to all the priests coming up
  lexicon: LSJ
  rationale: The final phrase extends the same grant to the priests among the returnees.
    Repeating 'who go up' preserves the participial structure and the pilgrimage/restoration
    idiom.
