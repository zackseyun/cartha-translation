translation:
  text: All the earth calls truth blessed, and heaven blesses her; and all works shake
    and tremble, and with her there is nothing unjust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has a masculine/neuter form ('with him/it') here after feminine references
      to 'truth'; the sense is most naturally still 'with truth,' and the English
      preserves the surrounding personification.
    reason: textual_variant
  - marker: b
    text: Or 'all created works' for 'all the works.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα ἡ γῆ
  chosen: All the earth
  alternatives:
  - The whole earth
  - All the land
  lexicon: LSJ
  rationale: γῆ can mean 'earth' or 'land.' In this wisdom-like, cosmic statement
    paired with 'heaven,' the universal sense 'earth' best fits the scope.
- source_word: τὴν ἀλήθειαν
  chosen: truth
  alternatives:
  - the truth
  - Truth
  lexicon: LSJ
  rationale: ἀλήθεια here is the abstract quality being praised in the surrounding
    argument. English omits the article naturally in this construction. Capitalization
    was avoided because the Greek does not require personified title-status, though
    the following feminine pronouns do personify truth rhetorically.
- source_word: καλεῖ
  chosen: calls upon
  alternatives:
  - calls
  - proclaims
  - invokes
  lexicon: LSJ
  rationale: καλέω can mean call, summon, name, or invoke. With accusative 'truth'
    and in a poetic context of honoring truth, 'calls upon' best captures an appeal
    or acknowledgment directed toward truth, stronger than mere naming.
- source_word: ὁ οὐρανὸς
  chosen: heaven
  alternatives:
  - the heaven
  - the sky
  lexicon: LSJ
  rationale: In biblical Greek, οὐρανός commonly denotes 'heaven' in elevated or cosmic
    discourse. 'Sky' would sound too merely physical here.
- source_word: αὐτὴν
  chosen: her
  alternatives:
  - it
  lexicon: LSJ
  rationale: The pronoun is grammatically feminine, agreeing with ἀλήθεια. Rendering
    it as 'her' preserves the text's rhetorical personification of truth; 'it' would
    flatten that feature.
- source_word: εὐλογεῖ
  chosen: blesses
  alternatives:
  - speaks well of
  - praises
  lexicon: LSJ
  rationale: εὐλογέω regularly means 'bless.' In this poetic context, 'blesses' is
    both natural and faithful, while retaining the elevated register.
- source_word: πάντα τὰ ἔργα
  chosen: all the works
  alternatives:
  - all works
  - all created things
  - all deeds
  lexicon: LSJ
  rationale: ἔργα literally means 'works.' Because the context is cosmic rather than
    moral action alone, 'all the works' likely refers broadly to all things that have
    been made or all created works. The more literal rendering is retained in the
    main text.
- source_word: σείεται καὶ τρέμει
  chosen: shake and tremble
  alternatives:
  - are shaken and tremble
  - quake and tremble
  lexicon: LSJ
  rationale: The paired verbs intensify the response before truth. Present tense English
    'shake and tremble' preserves the vividness. 'Quake' was possible but slightly
    more interpretive.
- source_word: μετʼ αὐτοῦ
  chosen: with her
  alternatives:
  - with it
  - in her presence
  lexicon: LSJ
  rationale: The transmitted text reads masculine/neuter αὐτοῦ after feminine references
    to truth. Given the immediate context, the sense is still 'with truth.' The English
    uses 'her' for coherence with the personification already established, while noting
    the Greek form in a footnote as a likely textual or grammatical irregularity.
- source_word: ἄδικον οὐθέν
  chosen: nothing unjust
  alternatives:
  - no injustice
  - nothing unrighteous
  - nothing wrong
  lexicon: LSJ
  rationale: The phrase is literally 'nothing unjust.' This preserves the adjectival
    force and avoids importing later doctrinal freight into 'righteousness' where
    the immediate contrast is moral wrongness or injustice.
