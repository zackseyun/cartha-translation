translation:
  text: And the truth remains and is strong forever, and lives and prevails forever
    and ever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀλήθεια
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: Rendered with the article to reflect ἡ ἀλήθεια, which personifies or
    highlights truth as the subject in this climactic statement.
- source_word: μένει
  chosen: remains
  alternatives:
  - abides
  - endures
  lexicon: BDAG
  rationale: '"Remains" is clear modern English and preserves the sense of continuing
    permanence without sounding archaic.'
- source_word: ἰσχύει
  chosen: is strong
  alternatives:
  - has strength
  - prevails
  lexicon: BDAG
  rationale: Kept distinct from κρατεῖ later in the verse. "Is strong" reflects inherent
    strength, avoiding flattening both verbs into the same English idea.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - unto eternity
  lexicon: BDAG
  rationale: Idiomatic rendering of the Greek temporal expression in English.
- source_word: ζῇ
  chosen: lives
  alternatives:
  - is alive
  lexicon: BDAG
  rationale: Preserves the vivid personification of truth as living.
- source_word: κρατεῖ
  chosen: prevails
  alternatives:
  - rules
  - is victorious
  - has power
  lexicon: BDAG
  rationale: Conveys active dominance or triumph in context, while remaining distinct
    from ἰσχύει.
- source_word: εἰς τὸν αἰῶνα τοῦ αἰῶνος
  chosen: forever and ever
  alternatives:
  - for the age of the age
  - unto the eternity of eternity
  lexicon: BDAG
  rationale: Standard idiomatic English for the intensified Greek expression, preserving
    the climactic force.
