id: 1ES.4.38
reference: 1 Esdras 4:38
source:
  edition: lxx-swete-1909
  text: καὶ ἡ ἀλήθεια μένει καὶ ἰσχύει εἰς τὸν αἰῶνα, καὶ ζῇ καὶ κρατεῖ εἰς τὸν αἰῶνα
    τοῦ αἰῶνος.
