  text: καὶ εἰς τὴν οἰκοδομὴν τοῦ ἱεροῦ δοθῆναι κατʼ ἐνιαυτὸν τάλαντα εἴκοσι μέχρι
    τοῦ οἰκοδομηθῆναι.
