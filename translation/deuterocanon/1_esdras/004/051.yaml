translation:
  text: and for the building of the temple, that twenty talents be given each year
    until it is built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the construction of the temple.'
    reason: lexical_alternative
  - marker: b
    text: A talent was a large ancient unit of weight, often used for precious metals
      and monetary assessment.
    reason: cultural_note
lexical_decisions:
- source_word: οἰκοδομήν
  chosen: building
  alternatives:
  - construction
  lexicon: LSJ
  rationale: The noun denotes the act or project of building. 'Building' is natural
    English here and can refer to the construction work itself, fitting the prepositional
    phrase 'for the building of the temple.'
- source_word: ἱεροῦ
  chosen: temple
  alternatives:
  - sanctuary
  - holy place
  lexicon: LSJ
  rationale: ἱερόν commonly refers to the temple complex or sacred precinct. In this
    restoration context, 'temple' is the clearest and most idiomatic rendering.
- source_word: δοθῆναι
  chosen: be given
  alternatives:
  - be granted
  - be paid
  lexicon: LSJ
  rationale: The aorist passive infinitive expresses that the funds are to be given.
    'Be given' preserves the straightforward administrative sense without over-specifying
    the mechanism.
- source_word: κατʼ ἐνιαυτόν
  chosen: each year
  alternatives:
  - year by year
  - annually
  lexicon: LSJ
  rationale: The phrase means on a yearly basis. 'Each year' is clear modern English
    and preserves the recurring sense.
- source_word: τάλαντα εἴκοσι
  chosen: twenty talents
  alternatives:
  - twenty talent-weights
  lexicon: LSJ
  rationale: τάλαντον is a large unit of weight and, by extension, money. 'Talents'
    is the standard English rendering and is sufficiently transparent in an ancient
    fiscal context.
- source_word: μέχρι τοῦ οἰκοδομηθῆναι
  chosen: until it is built
  alternatives:
  - until it has been built
  - until the building is completed
  lexicon: LSJ
  rationale: The construction with μέχρι τοῦ plus infinitive marks duration up to
    completion. The passive infinitive naturally refers back to the temple project;
    'until it is built' is concise and faithful.
