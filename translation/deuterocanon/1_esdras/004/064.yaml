id: 1ES.4.64
reference: 1 Esdras 4:64
source:
  edition: lxx-swete-1909
  text: Τότε ὁ βασιλεὺς εἶπεν αὐτῷ Αἴτησαι ὃ θέλεις πλείω τῶν γεγραμμένων, καὶ δώσομέν
    σοι, ὃν τρόπον εὑρέθης σοφώτερος· καὶ ἐχόμενός μου καθήσῃ, καὶ συγγενής μου κληθήσῃ.
