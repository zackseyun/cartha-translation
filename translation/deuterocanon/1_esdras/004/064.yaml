translation:
  text: Then the king said to him, “Ask for whatever you want beyond what has been
    written, and we will give it to you, since you have been found wiser; and you
    shall sit next to me, and you shall be called my kinsman.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “more than what has been written,” likely referring to what had already
      been recorded or promised.
    reason: lexical_alternative
  - marker: b
    text: Or “you shall sit beside me.” The Greek expression denotes nearness, likely
      in rank or honor at court.
    reason: lexical_alternative
  - marker: c
    text: Or “my relative” or “my kin.” The term can function as an honorific of close
      royal favor, not necessarily a statement of literal blood relation.
    reason: alternative_reading
lexical_decisions:
- source_word: Αἴτησαι
  chosen: Ask for
  alternatives:
  - Request
  - Ask
  lexicon: LSJ
  rationale: Aorist imperative of αἰτέω, inviting Zerubbabel to make a request. 'Ask
    for' is natural English with the implied object retained by the following relative
    clause.
- source_word: ὃ θέλεις
  chosen: whatever you want
  alternatives:
  - what you wish
  - whatever you desire
  lexicon: LSJ
  rationale: The relative pronoun with θέλω expresses open scope. 'Whatever you want'
    is idiomatic modern English and preserves the breadth of the offer.
- source_word: πλείω τῶν γεγραμμένων
  chosen: beyond what has been written
  alternatives:
  - more than what has been written
  - beyond the written terms
  lexicon: LSJ
  rationale: πλείω means 'more/further,' and τῶν γεγραμμένων refers to what had already
    been recorded or decreed. 'Beyond what has been written' preserves the comparative
    sense without over-specifying whether the writing is a decree, promise, or record.
- source_word: δώσομέν σοι
  chosen: we will give it to you
  alternatives:
  - we will grant it to you
  - we will give to you
  lexicon: LSJ
  rationale: Future of δίδωμι. English requires an object for smoothness; 'it' is
    supplied from the requested thing in context.
- source_word: ὃν τρόπον
  chosen: since
  alternatives:
  - because
  - inasmuch as
  - in the manner that
  lexicon: LSJ
  rationale: Here the phrase functions idiomatically to introduce the ground for the
    king's generosity, not a literal manner clause. 'Since' best captures the causal
    force in readable English.
- source_word: εὑρέθης σοφώτερος
  chosen: you have been found wiser
  alternatives:
  - you were found wiser
  - you have proved wiser
  lexicon: LSJ
  rationale: The passive of εὑρίσκω with comparative σοφώτερος indicates recognized
    superiority in wisdom. 'Have been found wiser' keeps the passive and the comparative.
- source_word: ἐχόμενός μου καθήσῃ
  chosen: you shall sit next to me
  alternatives:
  - you shall sit beside me
  - you shall sit holding to me
  lexicon: LSJ
  rationale: ἐχόμενος with the genitive can mean 'next to' or 'near.' In a courtly
    setting, the sense is proximity of rank or honor. 'Sit next to me' is clear and
    natural.
- source_word: συγγενής μου κληθήσῃ
  chosen: you shall be called my kinsman
  alternatives:
  - you shall be called my relative
  - you shall be called my kin
  lexicon: LSJ
  rationale: συγγενής denotes one of the same family or kin-group. 'Kinsman' preserves
    the formal, honorific nuance better than the flatter 'relative.'
