theological_decisions:
- issue: Royal honorific language in συγγενής μου
  chosen_reading: my kinsman
  alternative_readings:
  - my relative
  - my kin
  rationale: The verse concerns courtly elevation rather than a theological title.
    'Kinsman' preserves the familial metaphor and honorific force without implying
    literal biological relation more strongly than the Greek requires.
  doctrine_reference: Translation philosophy §6 (readable modern English, not flattening
    gravity)
