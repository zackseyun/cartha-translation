theological_decisions:
- issue: Generic-anthropological phrase with masculine wording
  chosen_reading: all the sons of men
  alternative_readings:
  - all human beings
  - all people
  rationale: The Greek phrase is explicitly masculine and representative. Per doctrine,
    gender-accurate rendering is preferred over flattening to a neutral expression,
    while the generic sense remains clear from context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of repeated ἄδικος language
  chosen_reading: unjust
  alternative_readings:
  - unrighteous
  rationale: The verse is a broad moral claim about persons and deeds lacking justice/truth.
    'Unjust' communicates this clearly in modern English and avoids importing narrower
    doctrinal associations.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
