translation:
  text: Wine is unjust, the king is unjust, women are unjust, and all the sons of
    men and all their works are unjust—all such things. And there is no truth in them,
    and in their injustice they will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all human beings'; Greek 'all the sons of men,' a masculine idiom for
      humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄδικος / ἄδικοι / ἄδικα
  chosen: unjust
  alternatives:
  - unrighteous
  - wicked
  - 'false'
  lexicon: BDAG
  rationale: The repeated predicate adjective drives the rhetoric of the verse. 'Unjust'
    preserves the core sense of lacking justice/right order without importing specifically
    Pauline overtones that 'unrighteous' may carry. It also works across persons and
    deeds in English.
- source_word: οἶνος
  chosen: wine
  lexicon: BDAG
  rationale: Straightforward lexical rendering.
- source_word: βασιλεύς
  chosen: the king
  alternatives:
  - a king
  lexicon: BDAG
  rationale: The article supports a definite rendering, and in context the statement
    is proverbial yet framed with definite subjects.
- source_word: γυναῖκες
  chosen: women
  alternatives:
  - wives
  lexicon: BDAG
  rationale: The ordinary plural 'women' best matches the Greek. 'Wives' is possible
    in some contexts but is not demanded here.
- source_word: πάντες οἱ υἱοὶ τῶν ἀνθρώπων
  chosen: all the sons of men
  alternatives:
  - all human beings
  - all the children of men
  lexicon: BDAG
  rationale: This preserves the masculine, idiomatic force of the Greek and follows
    the project's gender-accurate policy. The phrase is a Semitic-style expression
    for humanity, but the source wording is explicitly masculine.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: '''Works'' is the more direct equivalent and fits the sweeping statement
    about what humans do or produce.'
- source_word: πάντα τὰ τοιαῦτα
  chosen: all such things
  alternatives:
  - everything of this kind
  - all these things
  lexicon: BDAG
  rationale: This phrase sums up the preceding list. 'All such things' preserves the
    generalizing force without over-specifying the referent.
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - truthfulness
  lexicon: BDAG
  rationale: '''Truth'' is the natural rendering and suits the contrast with injustice.'
- source_word: ἀπολοῦνται
  chosen: they will perish
  alternatives:
  - they will be destroyed
  lexicon: BDAG
  rationale: Future middle/passive form of ἀπόλλυμι here is well represented by 'will
    perish.' It preserves the result without forcing a stronger external-agent nuance.
