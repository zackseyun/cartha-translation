  text: καὶ πᾶσιν τοῖς σατράπαις καὶ στρατηγοῖς καὶ τοπάρχαις τοῖς ὑπʼ αὐτὸν ἀπὸ τῆς
    Ἰνδικῆς μέχρι Αἰθιοπίας ἐν ταῖς ἑκατὸν εἴκοσι ἑπτὰ σατραπείαις.
