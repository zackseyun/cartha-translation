translation:
  text: and to all the satraps and generals and local rulers under him, from India
    to Ethiopia, throughout the one hundred twenty-seven satrapies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout the one hundred twenty-seven provinces.' The Greek uses the
      Persian administrative term 'satrapies,' matching the earlier 'satraps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σατράπαις
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: LSJ
  rationale: A Persian administrative title best preserved by transliteration in English;
    'provincial governors' explains but flattens the specific imperial office.
- source_word: στρατηγοῖς
  chosen: generals
  alternatives:
  - commanders
  - governors
  lexicon: LSJ
  rationale: The basic sense is military leaders; 'generals' is the most natural modern
    equivalent here and distinguishes them from the satraps and local rulers listed
    alongside.
- source_word: τοπάρχαις
  chosen: local rulers
  alternatives:
  - district rulers
  - toparchs
  lexicon: LSJ
  rationale: Refers to rulers over smaller regions or districts. 'Local rulers' is
    readable modern English while preserving the administrative distinction; 'toparchs'
    would be more formal but less accessible.
- source_word: τοῖς ὑπʼ αὐτὸν
  chosen: under him
  alternatives:
  - subject to him
  - under his authority
  lexicon: LSJ
  rationale: The phrase indicates subordination to the king. 'Under him' is concise
    and natural, and in this list context adequately conveys political subordination.
- source_word: ἀπὸ τῆς Ἰνδικῆς μέχρι Αἰθιοπίας
  chosen: from India to Ethiopia
  alternatives:
  - from India as far as Ethiopia
  lexicon: LSJ
  rationale: A standard geographic extent formula. 'From India to Ethiopia' is idiomatic
    English and preserves the breadth of the empire.
- source_word: ἐν ταῖς ἑκατὸν εἴκοσι ἑπτὰ σατραπείαις
  chosen: in the one hundred twenty-seven satrapies
  alternatives:
  - throughout the one hundred twenty-seven provinces
  lexicon: LSJ
  rationale: Since σατράπαις and σατραπείαις are cognate, rendering both with the
    Persian administrative term preserves the source's lexical linkage. 'Provinces'
    is possible, but 'satrapies' better reflects the specific imperial structure.
