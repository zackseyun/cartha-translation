translation:
  text: And when they rise from the wine, they do not remember what they did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'when they awake from the effects of wine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a general temporal clause. 'When' is natural English here;
    'whenever' is possible but less smooth without adding meaning.
- source_word: ἀπὸ τοῦ οἴνου
  chosen: from the wine
  alternatives:
  - from drinking wine
  - from drunkenness
  lexicon: BDAG
  rationale: A literal rendering is retained because the Greek explicitly says 'from
    the wine.' In context it refers to recovering after wine-induced stupor, but 'from
    the wine' preserves the source wording without over-paraphrasing to 'drunkenness.'
- source_word: ἐγερθῶσιν
  chosen: they rise
  alternatives:
  - they awake
  - they get up
  lexicon: BDAG
  rationale: The passive/subjunctive form here refers to arising or waking up after
    the effects of wine. 'Rise' keeps the wording concise and close to the Greek;
    'awake' is interpretive but plausible.
- source_word: οὐ μέμνηται
  chosen: they do not remember
  alternatives:
  - they remember nothing of
  - they are not mindful of
  lexicon: BDAG
  rationale: 'Although the form is singular in Swete''s text, the sense with the plural
    subject is distributive/collective. English idiom requires plural agreement: ''they
    do not remember.'''
- source_word: ἃ ἔπραξαν
  chosen: what they did
  alternatives:
  - the things they did
  - what they had done
  lexicon: BDAG
  rationale: This naturally renders the relative clause in idiomatic English. 'What
    they had done' is possible, but simple past is sufficient in English after the
    temporal clause.
