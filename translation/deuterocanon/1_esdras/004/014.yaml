translation:
  text: And he sent out and summoned all the nobles of Persia and Media, and the satraps
    and generals and local rulers and governors,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having sent out, he called'; the Greek participle may explicitly describe
      dispatching messengers before the summons was carried out.
    reason: lexical_alternative
  - marker: b
    text: '''Toparchs'' refers to rulers over local districts or regions.'
    reason: cultural_note
  - marker: c
    text: The final term can also be rendered 'chief officials' or, more literally
      in some contexts, 'consuls'; here it is rendered according to the Persian administrative
      setting rather than as a Roman title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαποστείλας
  chosen: he sent out
  alternatives:
  - having sent out
  - he dispatched messengers
  lexicon: LSJ
  rationale: Aorist participle of ἐξαποστέλλω, literally 'having sent out.' In English
    narrative, 'he sent out and summoned' preserves the sequence naturally without
    over-paraphrasing the implied dispatch of summons.
- source_word: ἐκάλεσεν
  chosen: summoned
  alternatives:
  - called
  - invited
  lexicon: LSJ
  rationale: '''Summoned'' better fits a royal context than the flatter ''called''
    and avoids the softer nuance of ''invited.'''
- source_word: μεγιστᾶνας
  chosen: nobles
  alternatives:
  - magnates
  - great men
  - princes
  lexicon: LSJ
  rationale: Refers to high-ranking grandees. 'Nobles' is clear modern English and
    suitably elevated; 'magnates' is less natural, and 'princes' would be too specific.
- source_word: Περσίδος
  chosen: Persia
  alternatives:
  - the Persian land
  lexicon: LSJ
  rationale: Standard geographical rendering of the genitive after 'of.'
- source_word: Μηδείας
  chosen: Media
  lexicon: LSJ
  rationale: Standard rendering of the region name.
- source_word: σατράπας
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: LSJ
  rationale: A specific Persian administrative title; transliterating preserves the
    historical setting better than flattening to a generic office.
- source_word: στρατηγοὺς
  chosen: generals
  alternatives:
  - commanders
  lexicon: LSJ
  rationale: In this administrative list, 'generals' is the most straightforward rendering
    for military leaders.
- source_word: τοπάρχας
  chosen: local rulers
  alternatives:
  - district rulers
  - toparchs
  lexicon: LSJ
  rationale: The term denotes rulers of a locality or district. 'Local rulers' communicates
    the sense in accessible English; 'toparchs' would be too opaque for the main text.
- source_word: ὑπάτους
  chosen: governors
  alternatives:
  - consuls
  - chief officials
  lexicon: LSJ
  rationale: Although ὕπατος can elsewhere mean 'consul' or 'highest official,' in
    this Persian court list 'governors' best conveys senior civil officials without
    importing a specifically Roman office.
