id: 1ES.4.84
reference: 1 Esdras 4:84
source:
  edition: lxx-swete-1909
  text: καὶ εὐλόγησαν τὸν θεὸν τῶν πατέρων αὐτῶν, ὅτι ἔδωκεν αὐτοῖς ἄνεσιν καὶ ἄφεσιν
  language: Greek
