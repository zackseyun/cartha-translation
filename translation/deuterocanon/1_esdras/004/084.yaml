theological_decisions:
- issue: Sense of ἄφεσιν in a non-cultic historical context
  chosen_reading: release
  alternative_readings:
  - freedom
  - remission
  - forgiveness
  rationale: Although ἄφεσις can mean forgiveness/remission, the immediate context
    is historical deliverance and easing, not explicit sin-remission theology. Rendering
    it as 'release' preserves the lexical meaning while avoiding doctrinal overreading.
