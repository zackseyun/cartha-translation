id: 1ES.4.61
reference: 1 Esdras 4:61
source:
  edition: lxx-swete-1909
  text: καὶ ἔλαβεν τὰς ἐπιστολὰς καὶ ἐξῆλθεν εἰς Βαβυλῶνα καὶ ἀπήγγειλεν τοῖς ἀδελφοῖς
    αὐτοῦ πᾶσιν.
