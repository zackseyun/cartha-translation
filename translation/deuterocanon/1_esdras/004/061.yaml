translation:
  text: And he took the letters and went out to Babylon, and reported it to all his
    brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reported' / 'announced to all his kinsmen'; the Greek literally says
      'to all his brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - received
  lexicon: BDAG
  rationale: Aorist of λαμβάνω; 'took' fits the narrative sequence naturally in English
    and reflects physical reception of the letters.
- source_word: τὰς ἐπιστολάς
  chosen: the letters
  alternatives:
  - the documents
  - the written orders
  lexicon: BDAG
  rationale: ἐπιστολή commonly means 'letter' or written communication. 'Letters'
    is the most direct and idiomatic rendering here.
- source_word: ἐξῆλθεν εἰς Βαβυλῶνα
  chosen: went out to Babylon
  alternatives:
  - departed for Babylon
  - went to Babylon
  lexicon: BDAG
  rationale: ἐξέρχομαι literally includes the sense of going out/departing. Retaining
    'went out' preserves the Greek movement nuance, while 'to Babylon' communicates
    destination clearly.
- source_word: ἀπήγγειλεν
  chosen: reported it
  alternatives:
  - announced
  - reported
  - told
  lexicon: BDAG
  rationale: ἀπαγγέλλω means to report or announce. Because the direct object is implicit
    in Greek, 'it' is supplied in English to make the sentence natural; the content
    reported is the matter conveyed by the letters.
- source_word: τοῖς ἀδελφοῖς αὐτοῦ πᾶσιν
  chosen: to all his brothers
  alternatives:
  - to all his brethren
  - to all his kinsmen
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and in this context most naturally
    refers to his fellow Jews/kinsmen. Per project philosophy, the masculine form
    is preserved as 'brothers' rather than neutralized. 'All' renders πᾶσιν explicitly.
