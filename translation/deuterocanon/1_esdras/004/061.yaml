theological_decisions:
- issue: Rendering of ἀδελφοῖς in a collective ethnic/community sense
  chosen_reading: brothers
  alternative_readings:
  - kinsmen
  - brothers and sisters
  rationale: The Greek uses the masculine plural ἀδελφοῖς. Following the project's
    gender-accurate policy, the translation preserves 'brothers' rather than adopting
    an inclusive expansion not stated in the text. In context it may denote fellow
    members of his people more broadly, but the main text keeps the source-facing
    term.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
