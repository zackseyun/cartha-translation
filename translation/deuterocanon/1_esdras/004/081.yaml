theological_decisions:
- issue: Referent of the second-person address
  chosen_reading: The verse is rendered as direct address without specifying the identity
    of 'you.'
  alternative_readings:
  - Address to God
  - Address to the king in the immediate narrative setting
  rationale: The Greek itself uses second-person pronouns without naming the referent
    in this clause. The translation preserves that direct address and does not import
    a more specific identification than the text states here.
  doctrine_reference: Preserve theological tension rather than resolve it.
