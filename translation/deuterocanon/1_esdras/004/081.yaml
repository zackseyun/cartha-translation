translation:
  text: From you are victory and wisdom, and yours is the glory, and I am your servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am your household servant.' The Greek οἰκέτης specifically denotes
      a household servant; 'servant' is used in the main text for natural English
      style.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρά σοῦ
  chosen: From you
  alternatives:
  - With you
  - By you
  lexicon: LSJ
  rationale: The repeated prepositional phrase with παρά + genitive denotes source
    or origin here. 'From you' best captures the sense that victory and wisdom come
    from the addressee.
- source_word: νίκη
  chosen: victory
  alternatives:
  - triumph
  lexicon: LSJ
  rationale: The noun straightforwardly denotes victory. 'Victory' is the most direct
    and natural English equivalent.
- source_word: ἡ σοφία
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering of σοφία; no contextual pressure suggests a narrower
    gloss such as 'skill' or 'prudence'.
- source_word: σὴ ἡ δόξα
  chosen: yours is the glory
  alternatives:
  - the glory is yours
  - yours is glory
  lexicon: LSJ
  rationale: The possessive adjective σή with the article and noun expresses possession
    emphatically. 'Yours is the glory' preserves the predicative force in idiomatic
    English.
- source_word: οἰκέτης
  chosen: servant
  alternatives:
  - household servant
  - slave
  lexicon: LSJ
  rationale: οἰκέτης refers specifically to a household servant. While it can imply
    servile status, the emphasis here is on belonging and service to the addressed
    king/God rather than on the bonded condition itself, so 'servant' fits better
    than 'slave.' The more specific 'household servant' is possible but too cumbersome
    for the line's elevated style.
