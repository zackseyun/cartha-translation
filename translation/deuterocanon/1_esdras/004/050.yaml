translation:
  text: and that all the land that they hold should be tax-free for them; and that
    the Chaldeans should leave the villages of the Jews that they occupy;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the territory that they possess should be exempt from tribute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χώραν
  chosen: land
  alternatives:
  - country
  - territory
  - region
  lexicon: LSJ
  rationale: χώρα commonly denotes land, territory, or region. 'Land' fits the administrative-property
    context and keeps the scope broad without over-specifying a political unit.
- source_word: κρατήσουσιν
  chosen: they hold
  alternatives:
  - they possess
  - they control
  - they occupy
  lexicon: LSJ
  rationale: κρατέω here refers to having possession or control of land. 'Hold' is
    concise and natural in English, preserving the sense of possession/control without
    implying unlawful seizure.
- source_word: ἀφορολόγητον
  chosen: tax-free
  alternatives:
  - exempt from tribute
  - untaxed
  - free from taxation
  lexicon: LSJ
  rationale: The adjective directly denotes exemption from taxation or tribute. 'Tax-free'
    is clear modern English and preserves the fiscal sense.
- source_word: ὑπάρχειν
  chosen: should be
  alternatives:
  - to be
  - to remain
  - to belong as
  lexicon: LSJ
  rationale: In the infinitival construction after the implied decree, ὑπάρχειν functions
    idiomatically as 'to be' or 'to exist as.' 'Should be' brings out the decretal
    force in smooth English.
- source_word: Χαλδαῖοι
  chosen: Chaldeans
  alternatives:
  - Babylonians
  lexicon: LSJ
  rationale: The Greek explicitly says Χαλδαῖοι. 'Chaldeans' is the direct rendering;
    'Babylonians' is interpretive and broader.
- source_word: ἀφίουσι
  chosen: should leave
  alternatives:
  - should let go of
  - should release
  - should abandon
  lexicon: LSJ
  rationale: ἀφίημι here means to leave or relinquish possession. 'Should leave' fits
    the context of vacating control over villages.
- source_word: κώμας
  chosen: villages
  alternatives:
  - settlements
  - hamlets
  lexicon: LSJ
  rationale: κώμη denotes a village or rural settlement. 'Villages' is the standard
    and most transparent rendering.
- source_word: διακρατοῦσιν
  chosen: they occupy
  alternatives:
  - they hold fast
  - they control
  - they possess
  lexicon: LSJ
  rationale: The compound verb intensifies the idea of holding or controlling. In
    context of villages belonging to Jews, 'occupy' best conveys continued possession
    by another group.
