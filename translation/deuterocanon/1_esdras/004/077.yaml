id: 1ES.4.77
reference: 1 Esdras 4:77
source:
  edition: lxx-swete-1909
  text: καὶ τοῖς Λευείταις ἔγραψεν δοῦναι τὴν χορηγίαν ἕως τῆς ἡμέρας ἧς ἐπιτελεσθῇ
    ὁ οἶκος καὶ Ἰερουσαλὴμ οἰκοδομηθῆναι.
