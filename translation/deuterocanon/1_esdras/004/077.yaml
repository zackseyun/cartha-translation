translation:
  text: And he wrote that support should be given to the Levites until the day when
    the house is completed and Jerusalem is built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple' for 'the house'; the Greek literally reads 'the house,'
      a common way of referring to the temple in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Jerusalem is rebuilt.' The context is restoration, though the Greek
      verb itself simply says 'be built.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  chosen: he wrote that
  alternatives:
  - he ordered in writing
  - he wrote
  lexicon: LSJ
  rationale: The verb denotes a written directive. 'He wrote that' preserves the formal
    sense while introducing the following infinitive clause naturally in English.
- source_word: δοῦναι
  chosen: should be given
  alternatives:
  - to give
  - be given
  lexicon: LSJ
  rationale: The aorist infinitive depends on ἔγραψεν and expresses the content of
    the written order. 'Should be given' conveys directive force in idiomatic English.
- source_word: τὴν χορηγίαν
  chosen: support
  alternatives:
  - provision
  - allowance
  - supply
  lexicon: LSJ
  rationale: χορηγία refers to provision or maintenance supplied for needs. 'Support'
    is broad enough to cover ongoing material provision without over-specifying the
    form.
- source_word: τοῖς Λευείταις
  chosen: to the Levites
  alternatives:
  - for the Levites
  lexicon: LSJ
  rationale: The dative marks the recipients of the provision. 'To the Levites' is
    the most direct rendering.
- source_word: ἕως τῆς ἡμέρας ἧς
  chosen: until the day when
  alternatives:
  - until the day on which
  - up to the day when
  lexicon: LSJ
  rationale: This phrase introduces the temporal limit of the support. 'Until the
    day when' is natural English and preserves the temporal structure.
- source_word: ἐπιτελεσθῇ
  chosen: is completed
  alternatives:
  - is finished
  - is brought to completion
  lexicon: LSJ
  rationale: The passive subjunctive indicates the completion of the temple project.
    'Is completed' is clear and suitably formal.
- source_word: ὁ οἶκος
  chosen: the house
  alternatives:
  - the temple
  lexicon: LSJ
  rationale: Literally the Greek says 'the house.' In this context it refers to the
    temple, but retaining 'house' preserves the source wording and its conventional
    temple sense.
- source_word: Ἰερουσαλὴμ οἰκοδομηθῆναι
  chosen: Jerusalem is built
  alternatives:
  - Jerusalem is rebuilt
  - Jerusalem be built
  lexicon: LSJ
  rationale: The infinitive οἰκοδομηθῆναι means 'to be built.' Because the context
    is restoration, 'rebuilt' is possible, but the Greek here does not explicitly
    add the prefix idea; 'is built' stays closer to the wording while still making
    sense in context.
