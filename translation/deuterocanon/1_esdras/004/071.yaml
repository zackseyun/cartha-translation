theological_decisions:
- issue: Administrative-liberty language in a royal decree
  chosen_reading: concerning their freedom
  alternative_readings:
  - for their exemption
  - regarding their liberty
  rationale: The verse concerns royal protection/exemption for returning Jews, not
    a theological statement about spiritual freedom. The rendering keeps the lexical
    sense of ἐλευθερία while avoiding over-interpretation of the exact legal privilege.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity where the source does not specify more precisely.'
