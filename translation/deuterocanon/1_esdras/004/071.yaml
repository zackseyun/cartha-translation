translation:
  text: And he wrote to all the Jews who were going up from the kingdom to Judea concerning
    their freedom, that no official, satrap, governor, or steward should come against
    their doors,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for their exemption' or 'regarding their liberty.' The Greek uses the
      ordinary word for 'freedom,' but in this administrative context it may refer
      to a legal privilege or immunity.
    reason: lexical_alternative
  - marker: b
    text: Literally 'should not come against their doors,' likely meaning that officials
      were not to intrude on them at their homes or press claims against them there.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  chosen: he wrote
  alternatives:
  - he issued in writing
  - he sent a written decree
  lexicon: LSJ
  rationale: The verb is the ordinary aorist of γράφω. 'He wrote' is the most direct
    rendering; the administrative force is supplied by context rather than built into
    the verb itself.
- source_word: τοῖς ἀναβαίνουσιν
  chosen: who were going up
  alternatives:
  - who were returning
  - who were ascending
  lexicon: LSJ
  rationale: ἀναβαίνω literally means 'go up.' In this restoration context it refers
    to the return journey to Judea, but the more literal 'going up' preserves the
    idiom and geographic/theological sense without over-paraphrasing.
- source_word: τῆς βασιλείας
  chosen: the kingdom
  alternatives:
  - the realm
  - the empire
  lexicon: LSJ
  rationale: βασιλεία here denotes the king's dominion or realm. 'Kingdom' is the
    straightforward equivalent, even though in context it refers broadly to the Persian
    imperial domain.
- source_word: ὑπὲρ τῆς ἐλευθερίας
  chosen: concerning their freedom
  alternatives:
  - for their freedom
  - regarding the exemption
  lexicon: LSJ
  rationale: ὑπέρ with the genitive can mean 'concerning' or 'for the sake of.' Here
    it introduces the subject matter of the royal writing. ἐλευθερία is literally
    'freedom/liberty'; in context it likely refers to granted civic exemption, but
    'freedom' keeps the lexical sense visible.
- source_word: πάντα δυνατὸν
  chosen: official
  alternatives:
  - every powerful man
  - every authority
  lexicon: LSJ
  rationale: The phrase is awkward in Greek but naturally denotes a person of power
    or authority. Rendering it woodenly as 'every powerful one' is unclear in English;
    'official' captures the administrative sense in the list that follows.
- source_word: σατράπην
  chosen: satrap
  alternatives:
  - provincial ruler
  lexicon: LSJ
  rationale: This is a Persian administrative title. 'Satrap' is the standard English
    transliteration and preserves the historical specificity better than a generic
    substitute.
- source_word: τοπάρχην
  chosen: governor
  alternatives:
  - district ruler
  - toparch
  lexicon: LSJ
  rationale: The term denotes a ruler of a district or locality. 'Governor' is clear
    modern English; 'toparch' would be more formal but less accessible.
- source_word: οἰκονόμον
  chosen: steward
  alternatives:
  - administrator
  - estate manager
  lexicon: LSJ
  rationale: οἰκονόμος is literally a household or estate manager. In this administrative
    list, 'steward' is concise and traditional while still intelligible.
- source_word: μὴ ἐπελεύσεσθαι ἐπὶ τὰς θύρας αὐτῶν
  chosen: should come against their doors
  alternatives:
  - should approach their houses
  - should come upon their doorways
  lexicon: LSJ
  rationale: The infinitive with μή gives the content of the order. ἐπέρχομαι with
    ἐπί can mean 'come against' or 'attack/visit upon.' θύραι are literally 'doors.'
    The phrase likely means officials were not to intrude upon or exact demands at
    their homes; 'come against their doors' preserves the vivid literal image while
    leaving the exact administrative nuance open.
