translation:
  text: And he took the letters and went out to Babylon, and reported it to all his
    brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reported to all his brothers' without an explicit object; the Greek
      leaves the content implied by the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - received
  lexicon: BDAG
  rationale: Aorist of λαμβάνω; 'took' is the plain narrative rendering and fits the
    sequence of actions without adding nuance not explicit in the Greek.
- source_word: τὰς ἐπιστολάς
  chosen: the letters
  alternatives:
  - the documents
  - the written messages
  lexicon: BDAG
  rationale: ἐπιστολή commonly means 'letter.' 'Letters' is the most direct and natural
    rendering in this context of official written communication.
- source_word: ἐξῆλθεν εἰς Βαβυλῶνα
  chosen: went out to Babylon
  alternatives:
  - departed for Babylon
  - went to Babylon
  lexicon: BDAG
  rationale: The Greek explicitly uses ἐξῆλθεν ('went out'). Retaining 'went out'
    preserves the verbal form, though in English it functions idiomatically with the
    destination phrase.
- source_word: ἀπήγγειλεν
  chosen: reported it
  alternatives:
  - announced
  - told
  - brought word
  lexicon: BDAG
  rationale: ἀπαγγέλλω means to report or announce. Because the verb here has no explicit
    direct object in Greek, 'reported it' supplies the implied content from the preceding
    action in idiomatic English.
- source_word: τοῖς ἀδελφοῖς αὐτοῦ πᾶσιν
  chosen: to all his brothers
  alternatives:
  - to all his brethren
  - to all his kinsmen
  lexicon: BDAG
  rationale: ἀδελφοί is literally 'brothers.' Per project philosophy, the gendered
    familial term is preserved unless context clearly demands a broader inclusive
    rendering. Here it most naturally refers to his fellow Judeans/kinsmen, but 'brothers'
    remains closest to the Greek.
