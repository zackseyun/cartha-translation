translation:
  text: And besides this, the king stared at her with his mouth open; and if she laughs
    at him, he laughs; but if she is offended with him, he flatters her so that she
    may be reconciled to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if she laughs with him, he laughs.' The Greek dative after 'laughs'
      can be understood in more than one way.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek image is vivid: literally, ''the king, gaping with his mouth,
      was looking at her.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς τούτοις
  chosen: besides this
  alternatives:
  - in addition to these things
  - moreover
  lexicon: LSJ
  rationale: Idiomatic connective adding another example to the argument. 'Besides
    this' is natural English while preserving the additive force.
- source_word: χάσκων τὸ στόμα
  chosen: stared at her with his mouth open
  alternatives:
  - gaped at her
  - looked at her open-mouthed
  lexicon: LSJ
  rationale: The participial phrase is vivid and somewhat colloquial, describing open-mouthed
    staring. 'Stared at her with his mouth open' preserves the image more transparently
    than the shorter but slightly less explicit 'gaped at her'.
- source_word: ἐθεώρει
  chosen: stared at
  alternatives:
  - looked at
  - watched
  lexicon: BDAG
  rationale: In context with χάσκων τὸ στόμα, the verb suggests more than neutral
    seeing; 'stared at' captures the sustained, captivated gaze.
- source_word: ἐὰν γελάσῃ αὐτῷ, γελᾷ
  chosen: if she laughs at him, he laughs
  alternatives:
  - if she smiles at him, he smiles
  - if she laughs with him, he laughs
  lexicon: BDAG
  rationale: The repeated γελάω normally means 'laugh.' The dative αὐτῷ could suggest
    'at/with him'; 'at him' is retained as the more literal rendering, though the
    sense may be favorable rather than mocking.
- source_word: πικρανθῇ ἐπʼ αὐτόν
  chosen: is offended with him
  alternatives:
  - is embittered against him
  - is angry with him
  - is displeased with him
  lexicon: BDAG
  rationale: πικραίνω in the passive can denote becoming bitter or offended. 'Is offended
    with him' fits the relational setting and explains why he then seeks to appease
    her.
- source_word: κολακεύει αὐτὴν
  chosen: he flatters her
  alternatives:
  - he fawns on her
  - he coaxes her
  lexicon: LSJ
  rationale: κολακεύω commonly means to flatter or fawn upon. 'Flatters her' is the
    clearest modern equivalent and preserves the imbalance of power in the scene.
- source_word: ὅπως διαλλαγῇ αὐτῷ
  chosen: so that she may be reconciled to him
  alternatives:
  - so that she may make up with him
  - so that she may be appeased toward him
  lexicon: BDAG
  rationale: διαλλάσσω/διαλλάσσομαι concerns restoration of relationship. 'Be reconciled
    to him' is faithful and readable, preserving the purposive force of ὅπως.
