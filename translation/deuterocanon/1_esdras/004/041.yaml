translation:
  text: And he stopped speaking; and then all the people cried out, and then they
    said, “Great is the truth, and it prevails.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Great is truth, and it is strongest / overcomes.” The Greek verb can
      mean “prevails,” “is strongest,” or “overcomes.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσιώπησεν
  chosen: stopped speaking
  alternatives:
  - fell silent
  - was silent
  lexicon: LSJ
  rationale: The verb means 'became silent' or 'kept silence.' Because it is followed
    by the complementary genitive infinitive τοῦ λαλεῖν ('from speaking/to speak'),
    'stopped speaking' expresses the sense naturally in English while preserving the
    action's completion.
- source_word: τοῦ λαλεῖν
  chosen: speaking
  alternatives:
  - to speak
  - from speaking
  lexicon: LSJ
  rationale: The articular infinitive after ἐσιώπησεν marks cessation of speech. English
    idiom prefers 'stopped speaking' rather than a more wooden 'was silent from speaking.'
- source_word: πᾶς ὁ λαός
  chosen: all the people
  alternatives:
  - the whole people
  - all the crowd
  lexicon: LSJ
  rationale: λαός here refers to the assembled populace. 'All the people' is the most
    natural and sufficiently formal rendering.
- source_word: ἐφώνησεν
  chosen: cried out
  alternatives:
  - shouted
  - raised their voice
  lexicon: LSJ
  rationale: Although singular in form, the subject is collective ('all the people').
    'Cried out' captures the public acclamation without over-specifying volume or
    tone.
- source_word: Μεγάλη
  chosen: Great is
  alternatives:
  - Great
  - Mighty is
  lexicon: LSJ
  rationale: Predicate adjective used in an exclamatory acclamation. 'Great is' preserves
    the elevated, proverbial style.
- source_word: ἡ ἀλήθεια
  chosen: the truth
  alternatives:
  - truth
  lexicon: LSJ
  rationale: With the article, the phrase points to truth as a recognized reality
    or principle. 'The truth' best reflects the Greek form and the rhetorical force
    of the saying.
- source_word: ὑπερισχύει
  chosen: it prevails
  alternatives:
  - it is strongest
  - it overcomes
  - it has the upper hand
  lexicon: LSJ
  rationale: The verb denotes being stronger than, prevailing, or proving superior.
    'It prevails' is concise, idiomatic, and preserves the climactic force of the
    acclamation.
