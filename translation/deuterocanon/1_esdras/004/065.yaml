translation:
  text: Then he said to the king, “Remember the vow that I made to rebuild Jerusalem
    on the day when you received your kingdom,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Remember the prayer that I prayed to rebuild Jerusalem …” The Greek
      uses εὐχή/ηὐξάμην, which can refer either to a vow or to prayer; here the context
      favors a vowed commitment.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μνήσθητι
  chosen: Remember
  alternatives:
  - Call to mind
  - Be mindful of
  lexicon: BDAG
  rationale: Aorist imperative of μιμνῄσκομαι/μιμνήσκομαι used as a direct appeal
    to the king. 'Remember' is the most natural and sufficiently formal English imperative.
- source_word: εὐχήν
  chosen: vow
  alternatives:
  - prayer
  - pledge
  lexicon: LSJ
  rationale: In this context εὐχή refers to a vowed commitment rather than a general
    prayer. The following infinitive clause ('to rebuild Jerusalem') specifies the
    content promised, so 'vow' best captures the sense.
- source_word: ηὐξάμην
  chosen: I made
  alternatives:
  - I vowed
  - I prayed
  lexicon: BDAG
  rationale: Although the verb can mean 'I prayed' or 'I vowed,' the object εὐχήν
    already carries the idea of a vow. Rendering the phrase as 'the vow that I made'
    gives idiomatic English while preserving the semantic force without awkward repetition
    ('the vow that I vowed').
- source_word: οἰκοδομῆσαι
  chosen: to rebuild
  alternatives:
  - to build
  lexicon: BDAG
  rationale: With Jerusalem as the object in restoration context, English idiom favors
    'rebuild.' While the verb itself is simply 'to build,' the narrative setting concerns
    restoration after destruction, so 'rebuild' communicates the intended sense more
    clearly.
- source_word: παρέλαβες
  chosen: you received
  alternatives:
  - you took
  - you came into possession of
  lexicon: BDAG
  rationale: The verb παραλαμβάνω here refers to receiving or assuming royal rule.
    'Received your kingdom' is natural English and avoids implying violent seizure.
- source_word: τὸ βασίλειόν σου
  chosen: your kingdom
  alternatives:
  - your kingship
  - your royal rule
  lexicon: LSJ
  rationale: βασίλειον can denote royal power or kingdom. In direct address to the
    king about accession, 'your kingdom' is the most straightforward rendering, though
    it includes the sense of royal rule.
