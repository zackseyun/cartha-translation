  text: τότε εἶπεν τῷ βασιλεῖ Μνήσθητι τὴν εὐχὴν ἣν ηὐξάμην οἰκοδομῆσαι τὴν Ἰερουσαλὴμ
    ἐν τῇ ἡμέρᾳ ᾗ τὸ βασίλειόν σου παρέλαβες,
