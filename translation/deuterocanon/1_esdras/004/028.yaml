translation:
  text: And now, do you not believe me? Is not the king great in his authority? Do
    not all the lands fear to touch him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not all the countries stand in fear of touching him?' The Greek χῶραι
      can mean 'lands,' 'countries,' or 'regions,' and εὐλαβοῦνται carries the sense
      of fearful caution or reverence.
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύετέ
  chosen: believe
  alternatives:
  - trust
  lexicon: BDAG
  rationale: The verb πιστεύω here takes the speaker as object ('believe me'), expressing
    acceptance of his claim rather than broader covenantal trust. 'Believe' is the
    most natural English equivalent in this rhetorical question.
- source_word: μέγας
  chosen: great
  alternatives:
  - mighty
  lexicon: LSJ
  rationale: μέγας commonly denotes greatness or prominence. In reference to the king's
    status and power, 'great' preserves the straightforward rhetorical force without
    overinterpreting.
- source_word: ἐξουσίᾳ
  chosen: authority
  alternatives:
  - power
  - right to rule
  lexicon: LSJ
  rationale: ἐξουσία can denote authority, power, or delegated right. 'Authority'
    best captures the king's ruling prerogative in this context, while remaining idiomatic
    in English.
- source_word: χῶραι
  chosen: lands
  alternatives:
  - countries
  - regions
  lexicon: LSJ
  rationale: χῶραι refers broadly to lands or territories. 'Lands' fits the generalized
    political-geographical sense and avoids sounding too modern or nation-state specific.
- source_word: εὐλαβοῦνται
  chosen: fear
  alternatives:
  - stand in awe
  - are cautious
  lexicon: LSJ
  rationale: The verb conveys reverent fear or wary caution. Given the immediate infinitive
    'to touch him,' the sense is practical fear of approaching the king; 'fear' is
    concise and strong.
- source_word: ἅψασθαι
  chosen: to touch
  alternatives:
  - to lay a hand on
  - to approach by touching
  lexicon: LSJ
  rationale: ἅπτομαι literally means 'touch' or 'take hold of.' The plain rendering
    'to touch' preserves the concrete image and the rhetorical point about the king's
    untouchable status.
