translation:
  text: O men, how are women not strong, since they act in this way?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'how can women not be strong, since they do such things?' The Greek
      rhetorical question can be represented more explicitly in English with 'can.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ ἄνδρες
  chosen: O men
  alternatives:
  - Men
  - Gentlemen
  lexicon: LSJ
  rationale: Vocative plural with an exclamatory/rhetorical force. 'O men' preserves
    the direct address and the masculine form, in keeping with gender-accurate translation.
- source_word: πῶς οὐκ
  chosen: how are ... not
  alternatives:
  - how can ... not be
  - why are ... not
  lexicon: LSJ
  rationale: In rhetorical questions πῶς can mean 'how?' in the sense of 'how can
    it be that...?'. Rendering it as 'how are ... not' keeps the Greek structure and
    rhetorical tone without over-paraphrasing.
- source_word: ἰσχυραὶ
  chosen: strong
  alternatives:
  - powerful
  - mighty
  lexicon: LSJ
  rationale: The adjective denotes strength or power. 'Strong' is the most natural
    and broad English equivalent here, fitting the argument about women's influence.
- source_word: αἱ γυναῖκες
  chosen: women
  alternatives:
  - wives
  lexicon: LSJ
  rationale: Although γυνή can mean either 'woman' or 'wife' depending on context,
    the plural here is generic in a broad argument about women as a class, so 'women'
    is preferable.
- source_word: ὅτι
  chosen: since
  alternatives:
  - because
  - that
  lexicon: LSJ
  rationale: Here ὅτι introduces the reason supporting the rhetorical question. 'Since'
    gives smooth English while preserving the causal sense.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: LSJ
  rationale: The adverb points back to the behavior just described. 'In this way'
    is clearer in modern English than the more wooden 'thus'.
- source_word: πράσσουσιν
  chosen: they act
  alternatives:
  - they do
  - they behave
  lexicon: LSJ
  rationale: πράσσω commonly means 'do' or 'act'. 'They act' is idiomatic and preserves
    the active behavioral emphasis.
