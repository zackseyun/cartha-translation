theological_decisions:
- issue: Rendering τοῦ θαυμαστοῦ attached to Bartacus
  chosen_reading: treated as a descriptive epithet ('the admirable Bartacus') rather
    than omitted or converted into a formal title
  alternative_readings:
  - '''Bartacus the famous'''
  - '''Bartacus the illustrious'''
  rationale: The Greek includes the adjective and it should not be dropped. Nothing
    in the verse requires reading it as an official title, so a descriptive epithet
    is preferable.
  doctrine_reference: Translation philosophy §1, §5
- issue: Narrative subject of ἐθεώρουν
  chosen_reading: left as 'They were watching' without specifying the subject
  alternative_readings:
  - '''The young men were watching'''
  - '''They saw'''
  rationale: The Greek verb is third person plural with no explicit subject in this
    clause. Supplying a more specific subject would import context into the verse
    rather than translate what is stated here.
  doctrine_reference: Translation philosophy §1, §3
