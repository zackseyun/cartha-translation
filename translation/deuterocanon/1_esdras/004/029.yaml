translation:
  text: They were watching him, and Apame, the daughter of the admirable Bartacus,
    the king’s concubine, sitting at the king’s right hand,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bartacus may also be rendered 'Bartakes' in English transliteration.
    reason: lexical_alternative
  - marker: b
    text: The epithet translated 'the admirable' could also be rendered 'the illustrious'
      or 'the famous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθεώρουν
  chosen: They were watching
  alternatives:
  - They were observing
  - They saw
  lexicon: LSJ
  rationale: Imperfect verb indicating ongoing or repeated viewing; 'were watching'
    preserves the progressive sense better than a simple past.
- source_word: Ἀπάμην
  chosen: Apame
  alternatives:
  - Apama
  rationale: Personal name is transliterated rather than translated. 'Apame' follows
    a straightforward Greek-to-English transliteration from the accusative form.
- source_word: θυγατέρα
  chosen: daughter
  lexicon: LSJ
  rationale: Standard kinship term; no contextual reason to vary.
- source_word: Βαρτάκου
  chosen: Bartacus
  alternatives:
  - Bartakes
  rationale: Proper name transliterated from the Greek genitive. Because this is a
    name with possible variant Anglicizations, the main text keeps a direct transliteration
    while preserving an alternative in a footnote.
- source_word: τοῦ θαυμαστοῦ
  chosen: the admirable
  alternatives:
  - the illustrious
  - the famous
  - the wondrous
  lexicon: LSJ
  rationale: θαυμαστός can denote someone remarkable or admired. 'Admirable' preserves
    the descriptive force without over-interpreting it as a formal title.
- source_word: παλλακήν
  chosen: concubine
  alternatives:
  - mistress
  lexicon: LSJ
  rationale: The term denotes a secondary wife/consort or concubine. 'Concubine' is
    the most direct and historically accurate rendering; 'mistress' would sound more
    modern and potentially misleading.
- source_word: καθημένην
  chosen: sitting
  alternatives:
  - seated
  lexicon: LSJ
  rationale: Present participle describing her posture/location. 'Sitting' is natural
    English and keeps the participial flow of the Greek.
- source_word: ἐν δεξιᾷ τοῦ βασιλέως
  chosen: at the king’s right hand
  alternatives:
  - on the king’s right side
  lexicon: LSJ
  rationale: Idiomatic expression for position at the right side. 'At the king’s right
    hand' is both natural and faithful to the Greek phrasing.
- source_word: βασιλέως
  chosen: king
  lexicon: LSJ
  rationale: Standard rendering of βασιλεύς in this narrative context.
