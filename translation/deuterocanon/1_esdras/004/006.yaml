translation:
  text: and to put on purple, and to drink from gold vessels, and to sleep on gold,
    and a chariot with gold bridles, and a turban of fine linen, and a necklace around
    the neck,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drink in golden cups' / 'drink from golden vessels'; the Greek expression
      specifies the use of gold objects for drinking but does not name the exact vessel
      type.
    reason: lexical_alternative
  - marker: b
    text: Literally 'sleep on gold'; this likely refers to a gold-decorated bed or
      couch, but the noun for bed/couch is not stated in the Greek.
    reason: lexical_alternative
  - marker: c
    text: The phrase rendered 'a chariot with gold bridles' may more broadly mean
      a chariot with golden harness or fittings.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορφύραν
  chosen: purple
  alternatives:
  - purple clothing
  - royal purple
  lexicon: LSJ
  rationale: The noun denotes purple cloth/dye and, by extension, purple attire associated
    with luxury and royalty. Since the infinitive περιβαλέσθαι already supplies the
    clothing sense ('to put on/wear'), the simple object 'purple' is sufficient and
    natural in English.
- source_word: περιβαλέσθαι
  chosen: to put on
  alternatives:
  - to wear
  - to clothe oneself with
  lexicon: LSJ
  rationale: The middle infinitive means to put on oneself, especially clothing. 'To
    put on' preserves the verbal force and fits the list structure better than the
    more static 'to wear'.
- source_word: ἐν χρυσώμασιν
  chosen: from gold vessels
  alternatives:
  - in gold cups
  - from golden vessels
  lexicon: LSJ
  rationale: The phrase refers to drinking with/from golden objects, likely cups or
    vessels. English idiom prefers 'drink from gold vessels' rather than the more
    literal but awkward 'drink in gold things.' 'Vessels' preserves the material and
    luxury without over-specifying the exact form.
- source_word: πίνειν
  chosen: to drink
  lexicon: LSJ
  rationale: Straightforward infinitive in a series of luxury actions.
- source_word: ἐπὶ χρυσῷ καθεύδειν
  chosen: to sleep on gold
  alternatives:
  - to sleep on a golden bed
  - to recline on gold
  lexicon: LSJ
  rationale: The Greek is compressed and likely means sleeping on a gold-adorned couch
    or bed. Because the object 'bed/couch' is not explicit in the source, 'to sleep
    on gold' keeps the wording close while preserving the extravagant image. A more
    explicit paraphrase would go beyond the text.
- source_word: ἅρμα χρυσοχάλινον
  chosen: a chariot with gold bridles
  alternatives:
  - a gold-bitted chariot
  - a chariot with golden trappings
  lexicon: LSJ
  rationale: The compound adjective suggests gold associated with the bridle/bit/harness.
    Since English lacks a natural equivalent adjective, 'a chariot with gold bridles'
    communicates the sense accessibly, though the exact harness component may be broader
    than bridles alone.
- source_word: κίδαριν βυσσίνην
  chosen: a turban of fine linen
  alternatives:
  - a linen headdress
  - a byssus turban
  lexicon: LSJ
  rationale: κίδαρις denotes a turban or headdress; βύσσινος refers to fine linen/byssus.
    'Turban of fine linen' is both intelligible and materially accurate.
- source_word: μανιάκην
  chosen: a necklace
  alternatives:
  - a collar
  - a torque
  lexicon: LSJ
  rationale: The term denotes a neck ornament, often a collar or necklace. 'Necklace'
    is the clearest modern English equivalent, while 'collar' could mislead modern
    readers.
- source_word: περὶ τὸν τράχηλον
  chosen: around the neck
  alternatives:
  - about the neck
  lexicon: LSJ
  rationale: Standard prepositional phrase specifying where the ornament is worn.
