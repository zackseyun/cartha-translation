translation:
  text: And then, after each had written his own statement, they sealed them and placed
    them under the pillow of Darius the king,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the headrest of Darius the king.' The Greek προσκεφάλαιον can
      denote a pillow or headrest.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  - thereupon
  lexicon: LSJ
  rationale: Temporal adverb marking the next step in the narrative; 'then' is natural
    modern English and preserves sequence.
- source_word: γράψαντες
  chosen: after ... had written
  alternatives:
  - having written
  - writing
  lexicon: LSJ
  rationale: Aorist participle best rendered with prior action relative to the main
    verbs; 'after each had written' gives clear English sequence.
- source_word: ἕκαστος
  chosen: each
  alternatives:
  - each one
  - every one
  lexicon: LSJ
  rationale: Distributive sense is straightforward; 'each' is concise and idiomatic.
- source_word: τὸν ἑαυτοῦ λόγον
  chosen: his own statement
  alternatives:
  - his own word
  - his own argument
  - his own speech
  lexicon: LSJ
  rationale: λόγος here refers to the written contention each participant submits
    in the contest context, not merely a single 'word.' 'Statement' preserves the
    written, propositional sense without overinterpreting as a full formal 'argument.'
- source_word: ἐσφραγίσαντο
  chosen: they sealed them
  alternatives:
  - they sealed
  - they affixed a seal to them
  lexicon: LSJ
  rationale: Middle form in context refers to sealing the written submissions. English
    requires the object to be explicit, so 'them' is supplied from context.
- source_word: ἔθηκαν
  chosen: placed
  alternatives:
  - put
  - set
  lexicon: LSJ
  rationale: Simple narrative verb; 'placed' is slightly more formal than 'put' and
    fits the court setting.
- source_word: ὑπὸ τὸ προσκεφάλαιον
  chosen: under the pillow
  alternatives:
  - under the headrest
  - under the cushion
  lexicon: LSJ
  rationale: προσκεφάλαιον commonly denotes something at or for the head, such as
    a pillow or headrest. 'Pillow' is the most natural English rendering, while a
    footnote preserves 'headrest' as a lexical alternative.
- source_word: Δαρείου τοῦ βασιλέως
  chosen: of Darius the king
  alternatives:
  - of King Darius
  lexicon: LSJ
  rationale: The genitive phrase depends on 'pillow'; retaining the Greek order keeps
    the formal narrative cadence while remaining clear in English.
