  text: καὶ ἔγραψεν πᾶσι τοῖς Ἰουδαίοις τοῖς ἀναβαίνουσιν ἀπὸ τῆς βασιλείας εἰς τὴν
    Ἰουδαίαν ὑπὲρ τῆς ἐλευθερίας, πάντα δυνατὸν καὶ σατράπην καὶ τοπάρχην καὶ οἰκονόμον
    μὴ ἐπελεύσεσθαι ἐπὶ τὰς θύρας αὐτῶν,
