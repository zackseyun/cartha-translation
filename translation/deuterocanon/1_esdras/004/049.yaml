translation:
  text: And he wrote to all the Jews who were going up from the kingdom to Judea concerning
    freedom, that no official or satrap or toparch or steward should come to their
    doors,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every authority' or 'every powerful man'; the Greek phrase πάντα δυνατὸν
      is difficult and may refer generally to anyone holding power.
    reason: lexical_alternative
  - marker: b
    text: '''Toparch'' refers to a local district ruler; alternatively, ''local governor.'''
    reason: cultural_note
  - marker: c
    text: The clause 'should not come against their doors' likely means they were
      not to intrude on them or press claims against them at their homes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  chosen: he wrote
  alternatives:
  - he issued in writing
  - he sent a written decree
  lexicon: LSJ
  rationale: The verb straightforwardly means 'wrote.' Although the context is royal
    administration and could imply an official decree, the Greek itself says simply
    that he wrote, so the translation stays close to the wording.
- source_word: τοῖς ἀναβαίνουσιν
  chosen: who were going up
  alternatives:
  - who were returning
  - who were ascending
  lexicon: LSJ
  rationale: ἀναβαίνω literally means 'go up.' In Judean return contexts it can idiomatically
    mean return from exile, but 'going up' preserves the source wording and the geographic/cultic
    nuance.
- source_word: ἀπὸ τῆς βασιλείας
  chosen: from the kingdom
  alternatives:
  - from the realm
  - from the empire
  lexicon: LSJ
  rationale: βασιλεία is literally 'kingdom' or 'realm.' 'Kingdom' is the most direct
    rendering; while the Persian dominion is in view, 'empire' would be more interpretive
    than the Greek requires.
- source_word: ὑπὲρ τῆς ἐλευθερίας
  chosen: concerning freedom
  alternatives:
  - for freedom
  - regarding their liberty
  lexicon: LSJ
  rationale: ὑπέρ here is best taken in the sense 'concerning/regarding' in connection
    with the contents of the writing, and ἐλευθερία means 'freedom' or 'liberty.'
    'Concerning freedom' preserves the administrative tone without over-specifying.
- source_word: πάντα δυνατὸν
  chosen: every official
  alternatives:
  - every authority
  - every powerful man
  lexicon: LSJ
  rationale: The phrase is textually and syntactically difficult in this witness.
    Taken literally it suggests 'every powerful one' or 'everyone in authority.' 'Every
    official' gives the likely administrative sense in context, while acknowledging
    some uncertainty.
- source_word: σατράπην
  chosen: satrap
  alternatives:
  - provincial governor
  lexicon: LSJ
  rationale: This is a Persian administrative title conventionally rendered 'satrap.'
    Because it is a specific office, transliteration is preferable to a flattening
    paraphrase.
- source_word: τοπάρχην
  chosen: toparch
  alternatives:
  - district ruler
  - local governor
  lexicon: LSJ
  rationale: A toparch is a ruler of a district or locality. Retaining 'toparch' preserves
    the technical administrative term; a more explanatory alternative is preserved
    in a footnote.
- source_word: οἰκονόμον
  chosen: steward
  alternatives:
  - administrator
  - estate manager
  lexicon: LSJ
  rationale: οἰκονόμος commonly means steward or manager. 'Steward' is concise and
    traditional without being misleading.
- source_word: μὴ ἐπελεύσεσθαι ἐπὶ τὰς θύρας αὐτῶν
  chosen: should not come against their doors
  alternatives:
  - should not approach their gates
  - should not come upon their houses
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic and likely means not to intrude upon,
    molest, or exact from them at their homes. 'Come against their doors' stays close
    to the Greek image while preserving the hostile nuance of ἐπέρχομαι with ἐπί.
