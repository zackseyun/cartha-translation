translation:
  text: And King Darius made a great banquet for all who were under him, and for all
    his household, and for all the nobles of Media and Persia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feast' for 'banquet.' The Greek term denotes a formal meal or entertainment.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοχή
  chosen: banquet
  alternatives:
  - feast
  - reception
  lexicon: LSJ
  rationale: δοχή denotes an entertainment or banquet. 'Banquet' fits the royal setting
    and avoids the slightly vague modern sense of 'reception' while remaining natural
    English.
- source_word: μεγάλην
  chosen: great
  alternatives:
  - large
  - grand
  lexicon: LSJ
  rationale: The adjective marks the scale or impressiveness of the event. 'Great'
    preserves the straightforward force of the Greek and reads idiomatically with
    'banquet.'
- source_word: τοῖς ὑπʼ αὐτόν
  chosen: who were under him
  alternatives:
  - his subjects
  - those under his authority
  lexicon: LSJ
  rationale: The phrase is literally 'those under him.' This preserves the hierarchical
    sense without over-specifying political status; 'subjects' could be too narrow,
    and 'under his authority' is slightly more interpretive.
- source_word: οἰκογενέσιν
  chosen: his household
  alternatives:
  - his family
  - those of his household
  lexicon: LSJ
  rationale: The term can refer to members of a household more broadly than immediate
    family. 'Household' best preserves that breadth in a court context.
- source_word: μεγιστᾶσιν
  chosen: the nobles
  alternatives:
  - the great men
  - the magnates
  - the officials
  lexicon: LSJ
  rationale: The word refers to leading men or high-ranking persons. 'Nobles' is concise,
    natural English for elite court figures, whereas 'officials' may understate status
    and 'great men' is awkwardly literal.
- source_word: Μηδείας καὶ τῆς Περσίδος
  chosen: Media and Persia
  alternatives:
  - the Medes and Persia
  - the Median and Persian realms
  lexicon: LSJ
  rationale: These are geographic-political designations in the genitive after 'nobles.'
    'Media and Persia' is the most direct and standard rendering.
