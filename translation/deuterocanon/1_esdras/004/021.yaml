translation:
  text: and they do not remember, when they are drinking, to show affection to friends
    and brothers, and before long they draw swords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be friendly with friends and brothers.' The Greek verb can denote
      affectionate or friendly behavior more broadly, not only a literal gesture.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μέμνηται
  chosen: they do not remember
  alternatives:
  - he does not remember
  - they are not mindful
  lexicon: LSJ
  rationale: The form is singular in Greek, but the surrounding context and the plural
    verbs that follow make an impersonal/generalizing sense likely in English. Rendering
    with plural 'they' gives natural English for a general statement about people
    under wine's influence without overstating a singular subject.
- source_word: ὅταν πίνωσιν
  chosen: when they are drinking
  alternatives:
  - when they drink
  - whenever they drink
  lexicon: LSJ
  rationale: ὅταν with the subjunctive conveys an indefinite or repeated circumstance.
    'When they are drinking' captures the ongoing scene and fits the immediate context
    of intoxication.
- source_word: φιλιάζειν
  chosen: to show affection
  alternatives:
  - to be friendly
  - to kiss affectionately
  - to love as friends
  lexicon: LSJ
  rationale: The verb denotes acting affectionately or as friends. 'Show affection'
    preserves the relational sense without narrowing it to literal kissing, which
    the context does not require.
- source_word: φίλοις καὶ ἀδελφοῖς
  chosen: to friends and brothers
  alternatives:
  - to friends and brothers/siblings
  - to companions and brothers
  lexicon: LSJ
  rationale: φίλοις is straightforwardly 'friends.' ἀδελφοῖς is rendered 'brothers'
    in keeping with the project's gender-accurate policy and the masculine Greek form;
    the phrase likely refers to close social and familial relations.
- source_word: μετʼ οὐ πολὺ
  chosen: before long
  alternatives:
  - soon after
  - not long afterward
  lexicon: LSJ
  rationale: This idiom indicates a short interval. 'Before long' is idiomatic modern
    English and preserves the temporal contrast.
- source_word: σπῶνται μαχαίρας
  chosen: they draw swords
  alternatives:
  - they unsheathe swords
  - they pull out swords
  lexicon: LSJ
  rationale: σπάω with μαχαίρας means to draw or pull out swords. 'Draw swords' is
    the standard concise English equivalent and suits the sudden shift from conviviality
    to violence.
