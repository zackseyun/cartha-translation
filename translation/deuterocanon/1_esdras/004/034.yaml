  chosen_reading: Retain the phenomenological description ('turns,' 'runs back') as
    observational language
  alternative_readings:
  - Recast into modern scientific idiom about apparent motion
  rationale: The Greek speaks in ordinary visual terms about the sun's daily course.
    The translation preserves the source's rhetoric without importing or correcting
    it according to later scientific categories.
