translation:
  text: to go up and rebuild Jerusalem and the temple on which his name was called;
    and they celebrated with music and joy for seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the temple that bears his name.'
    reason: lexical_alternative
  - marker: b
    text: The rare verb here can also be understood as 'they made festal celebration'
      or 'they rejoiced in celebration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβῆναι
  chosen: to go up
  alternatives:
  - to ascend
  - to return
  lexicon: LSJ
  rationale: The infinitive literally means 'to go up.' In biblical-geographical context
    it commonly refers to going up to Jerusalem. 'Go up' preserves the idiom without
    overinterpreting it as merely 'return.'
- source_word: οἰκοδομῆσαι
  chosen: rebuild
  alternatives:
  - build
  lexicon: LSJ
  rationale: Given Jerusalem and the temple are being restored after destruction,
    'rebuild' brings out the contextual force of the verb more clearly than the bare
    'build.'
- source_word: ἱερὸν
  chosen: temple
  alternatives:
  - sanctuary
  - holy place
  lexicon: LSJ
  rationale: ἱερόν in this context refers to the temple complex. 'Temple' is the natural
    English rendering and fits the restoration context.
- source_word: οὗ ὠνομάσθη τὸ ὄνομα αὐτοῦ ἐπʼ αὐτῷ
  chosen: on which his name had been called
  alternatives:
  - where his name was invoked
  - which bears his name
  - upon which his name was named
  lexicon: LSJ
  rationale: This clause reflects a Semitic naming formula meaning that God's name
    is associated with the temple. 'On which his name had been called' stays close
    to the Greek while remaining intelligible. A smoother alternative is preserved
    in a footnote.
- source_word: ἐκωθωνίζοντο
  chosen: they celebrated
  alternatives:
  - they made merry
  - they reveled
  - they held festal celebration
  lexicon: LSJ
  rationale: The verb is rare and denotes festive celebration. 'Celebrated' conveys
    the sense without importing excess informality or a negative nuance such as 'reveled.'
    Because the form is unusual, a lexical alternative is footnoted.
- source_word: μετὰ μουσικῶν
  chosen: with music
  alternatives:
  - with musicians
  - with musical instruments
  lexicon: LSJ
  rationale: The plural adjective/substantive can point to musical accompaniment broadly.
    'With music' is idiomatic English and avoids overprecision where the Greek may
    denote either musicians or instruments.
- source_word: χαρᾶς
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: LSJ
  rationale: A straightforward rendering that matches the celebratory context.
- source_word: ἡμέρας ἑπτά
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: LSJ
  rationale: English idiom prefers 'for seven days' to express duration.
