  text: καὶ ἐπὶ τὸ θυσιαστήριον ὁλοκαυτώματα καρποῦσθαι καθ’ ἡμέραν, καθὰ ἔχουσιν
    ἐντολήν, ἑπτὰ καὶ δέκα προσφέρειν, ἄλλα τάλαντα δέκα κατ’ ἐνιαυτόν·
