translation:
  text: and on the altar to offer burnt offerings daily, as they have been commanded,
    to present seventeen, and another ten talents yearly;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek verb rendered 'to offer' is unusual here and may more literally
      suggest 'to supply' or 'to furnish' the burnt offerings.
    reason: lexical_alternative
  - marker: b
    text: The object of 'seventeen' is not explicitly repeated in Greek; it likely
      refers to sacrificial items to be presented as part of the daily requirement.
    reason: alternative_reading
  - marker: c
    text: A 'talent' was a large unit of weight, often of precious metal; the text
      does not specify the metal here.
    reason: cultural_note
lexical_decisions:
- source_word: θυσιαστήριον
  chosen: altar
  alternatives:
  - sacrificial altar
  lexicon: LSJ
  rationale: The standard cultic term for the altar of sacrifice. 'Altar' is sufficient
    in English without over-specifying.
- source_word: ὁλοκαυτώματα
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: LSJ
  rationale: Established and accurate rendering for sacrificial offerings wholly consumed
    by fire. 'Whole burnt offerings' is possible but less natural in modern English.
- source_word: καρποῦσθαι
  chosen: to offer
  alternatives:
  - to furnish
  - to provide
  lexicon: LSJ
  rationale: The verb is unusual here and literally relates to producing or supplying
    fruit/produce, but in this sacrificial context it functions idiomatically for
    supplying or offering the required sacrifices. 'To offer' best captures the cultic
    sense in readable English.
- source_word: καθ’ ἡμέραν
  chosen: daily
  alternatives:
  - day by day
  - each day
  lexicon: LSJ
  rationale: A straightforward adverbial rendering preserving the regularity of the
    action.
- source_word: καθὰ ἔχουσιν ἐντολήν
  chosen: as they have been commanded
  alternatives:
  - according as they have commandment
  - as they have instruction
  lexicon: LSJ
  rationale: This expresses conformity to an existing command. The perfect-like English
    phrasing reflects the standing obligation without archaic diction.
- source_word: ἑπτὰ καὶ δέκα
  chosen: seventeen
  alternatives:
  - ten and seven
  lexicon: LSJ
  rationale: Idiomatic English number rendering. The Greek order is preserved in sense,
    not woodenly in form.
- source_word: προσφέρειν
  chosen: to present
  alternatives:
  - to offer
  - to bring forward
  lexicon: LSJ
  rationale: Used here alongside the earlier sacrificial verb; 'present' avoids awkward
    repetition while retaining the formal act of bringing offerings.
- source_word: ἄλλα τάλαντα δέκα
  chosen: another ten talents
  alternatives:
  - ten other talents
  - an additional ten talents
  lexicon: LSJ
  rationale: ἄλλα marks an additional item beyond the preceding requirement. 'Another
    ten talents' is natural and preserves the additive sense.
- source_word: κατ’ ἐνιαυτόν
  chosen: yearly
  alternatives:
  - each year
  - per year
  lexicon: LSJ
  rationale: Concise modern rendering of the annual schedule.
