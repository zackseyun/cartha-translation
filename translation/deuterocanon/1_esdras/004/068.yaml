translation:
  text: 'And now this is what I ask, O lord king, and what I request from you, and
    this is the greatness that comes from you: therefore I beg that you do the vow
    which I vowed to the King of heaven that it should be done by your mouth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fulfill the vow.' The Greek literally says 'do the vow,' an idiom for
      carrying out what was vowed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by your mouth'; that is, by your spoken command or authorization.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀξιῶ
  chosen: I ask
  alternatives:
  - I claim
  - I request
  - I demand
  lexicon: BDAG
  rationale: In petitionary court language here, the verb expresses making a request
    rather than asserting a right or demanding. 'I ask' is natural English and fits
    the deferential tone before the king.
- source_word: αἰτοῦμαί
  chosen: I request
  alternatives:
  - I ask
  - I petition
  lexicon: BDAG
  rationale: Kept distinct from ἀξιῶ to preserve the rhetorical doubling without sounding
    overly wooden. 'Request' conveys formal petition language.
- source_word: μεγαλωσύνη
  chosen: the greatness that comes from you
  alternatives:
  - your greatness
  - your magnanimity
  - the great favor from you
  lexicon: LSJ
  rationale: The phrase ἡ παρὰ σοῦ suggests something proceeding from the king rather
    than merely an abstract attribute. 'The greatness that comes from you' preserves
    the Greek structure while allowing the sense of royal generosity.
- source_word: δέομαι
  chosen: I beg
  alternatives:
  - I ask
  - I implore
  - I beseech
  lexicon: BDAG
  rationale: This verb intensifies the appeal beyond simple asking. 'I beg' is strong
    but still readable modern English.
- source_word: ποιήσῃς τὴν εὐχήν
  chosen: you do the vow
  alternatives:
  - you fulfill the vow
  - you grant the prayer
  - you carry out the vow
  lexicon: BDAG
  rationale: εὐχή can mean vow or prayer. Because it is followed by ἣν ηὐξάμην ('which
    I vowed'), the cognate construction strongly favors 'vow' rather than 'prayer.'
    'Do the vow' is slightly formal but reflects the Greek idiom; the smoother alternative
    'fulfill the vow' is preserved in view as a lexical alternative.
- source_word: ηὐξάμην
  chosen: I vowed
  alternatives:
  - I prayed
  - I made a vow
  lexicon: BDAG
  rationale: The cognate relation with εὐχή points to vow-language, not merely prayer.
    'I vowed' is concise and preserves that connection.
- source_word: τῷ βασιλεῖ τοῦ οὐρανοῦ
  chosen: the King of heaven
  alternatives:
  - the heavenly King
  lexicon: LSJ
  rationale: A straightforward title for God in this context. 'King of heaven' preserves
    the formal reverence and the source wording.
- source_word: ἐκ στόματός σου
  chosen: by your mouth
  alternatives:
  - from your mouth
  - by your word
  - at your command
  lexicon: LSJ
  rationale: Literally 'from/out of your mouth.' In context it refers to the king's
    spoken authorization. 'By your mouth' keeps the concrete imagery, though 'by your
    word' is a plausible interpretive alternative.
