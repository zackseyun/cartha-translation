theological_decisions:
- issue: Reference of 'the King of heaven'
  chosen_reading: A divine title referring to God
  rationale: In this Jewish court setting, 'the King of heaven' is a reverential designation
    for God, distinct from the earthly king being addressed.
- issue: Meaning of εὐχή / ηὐξάμην
  chosen_reading: vow-language rather than general prayer-language
  alternative_readings:
  - prayer-language
  rationale: 'The cognate pairing strongly supports a vowed commitment rather than
    a simple request in prayer. This affects the force of Zerubbabel''s appeal: he
    asks the king to enable fulfillment of a vow made to God.'
