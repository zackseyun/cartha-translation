id: 1ES.4.68
reference: 1 Esdras 4:68
source:
  edition: lxx-swete-1909
  text: καὶ νῦν τοῦτό ἐστιν ὅσα ἀξιῶ, κύριε βασιλεῦ, καὶ ὃ αἰτοῦμαί σε, καὶ αὕτη ἐστὶν
    ἡ μεγαλωσύνη ἡ παρὰ σοῦ· δέομαι οὖν ἵνα ποιήσῃς τὴν εὐχὴν ἣν ηὐξάμην τῷ βασιλεῖ
    τοῦ οὐρανοῦ ποιῆσαι ἐκ στόματός σου.
  language: Greek
