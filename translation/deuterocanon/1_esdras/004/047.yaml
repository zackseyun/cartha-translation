id: 1ES.4.47
reference: 1 Esdras 4:47
source:
  edition: lxx-swete-1909
  text: Τότε ἀναστὰς Δαρεῖος ὁ βασιλεὺς κατεφίλησεν αὐτόν, καὶ ἔγραψεν αὐτῷ τὰς ἐπιστολὰς
    πρὸς πάντας οἰκονόμους καὶ τοπάρχας καὶ στρατηγοὺς καὶ σατράπας, ἵνα προπέμψωσιν
    αὐτὸν καὶ τοὺς μετʼ αὐτοῦ πάντας ἀναβαίνοντας οἰκοδομῆσαι τὴν Ἰερουσαλήμ.
  language: Greek
