translation:
  text: Then King Darius stood up and kissed him, and wrote letters for him to all
    the treasurers and regional governors and generals and satraps, that they should
    escort him and all those with him who were going up to build Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'send him on his way with support'; the Greek verb can include the idea
      of providing assistance for a journey, not only personal escort.
    reason: lexical_alternative
  - marker: b
    text: Some translators render 'to rebuild Jerusalem' from the broader context,
      but the Greek verb here is simply 'to build.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: LSJ
  rationale: Standard temporal-sequential connective introducing the next action in
    the narrative.
- source_word: ἀναστὰς
  chosen: stood up
  alternatives:
  - rose
  - got up
  lexicon: LSJ
  rationale: Aorist participle of ἀνίστημι, here narrating Darius's physical rising
    before his response. 'Stood up' is natural modern English and preserves the concrete
    action.
- source_word: κατεφίλησεν
  chosen: kissed
  alternatives:
  - embraced with a kiss
  - kissed warmly
  lexicon: LSJ
  rationale: The compound verb can imply affectionate or emphatic kissing, but English
    'kissed' best preserves the act without over-interpreting the degree of emotion.
- source_word: ἔγραψεν ... τὰς ἐπιστολάς
  chosen: wrote letters
  alternatives:
  - wrote the letters
  - issued letters
  lexicon: LSJ
  rationale: The Greek has the article, but in English idiom 'wrote letters' communicates
    the sense naturally. 'Issued' is possible but less directly tied to the verb γράφω.
- source_word: αὐτῷ
  chosen: for him
  alternatives:
  - to him
  - on his behalf
  lexicon: LSJ
  rationale: In context Darius writes letters intended to benefit Zerubbabel and authorize
    his journey. 'For him' captures the dative of advantage more clearly than a simple
    indirect object.
- source_word: οἰκονόμους
  chosen: treasurers
  alternatives:
  - stewards
  - administrators
  lexicon: LSJ
  rationale: In this imperial-administrative list, οἰκονόμοι are officials managing
    resources or estates. 'Treasurers' fits the governmental context better than the
    more domestic-sounding 'stewards,' while remaining concise.
- source_word: τοπάρχας
  chosen: regional governors
  alternatives:
  - district rulers
  - toparchs
  lexicon: LSJ
  rationale: A toparch rules a local district or region. 'Regional governors' translates
    the title rather than transliterating it, in keeping with the project's preference
    to translate titles.
- source_word: στρατηγοὺς
  chosen: generals
  alternatives:
  - military commanders
  lexicon: LSJ
  rationale: The standard sense is military leaders. 'Generals' is the most straightforward
    English equivalent.
- source_word: σατράπας
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: LSJ
  rationale: This is a specific Persian administrative title widely recognized in
    English; transliteration preserves the historical office more precisely than flattening
    it into another generic term.
- source_word: ἵνα προπέμψωσιν
  chosen: that they should escort
  alternatives:
  - that they should send him on his way
  - that they should provide for his journey
  lexicon: LSJ
  rationale: προπέμπω commonly means to send forward with assistance or escort. 'Escort'
    captures the official support implied by the royal letters, though the broader
    sense of provisioning is possible.
- source_word: τοὺς μετʼ αὐτοῦ πάντας
  chosen: all those with him
  alternatives:
  - everyone with him
  - all his companions
  lexicon: LSJ
  rationale: This phrase includes the whole accompanying group. 'All those with him'
    is clear and close to the Greek structure.
- source_word: ἀναβαίνοντας
  chosen: who were going up
  alternatives:
  - going up
  - ascending
  lexicon: LSJ
  rationale: The participle reflects the conventional idiom of traveling up to Jerusalem.
    Rendering it as 'going up' preserves both the literal movement and the established
    biblical idiom.
- source_word: οἰκοδομῆσαι
  chosen: to build
  alternatives:
  - to rebuild
  lexicon: LSJ
  rationale: The infinitive means 'to build.' Although contextually Jerusalem is being
    restored, the Greek here does not explicitly add the prefix idea 'rebuild,' so
    the simpler rendering is preferred.
- source_word: τὴν Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: LSJ
  rationale: Proper name transliterated by standard English convention.
