theological_decisions:
- issue: Sense of ἄφεσιν in context
  chosen_reading: release
  alternative_readings:
  - forgiveness
  - remission
  rationale: Although ἄφεσις can mean forgiveness/remission in many biblical contexts,
    here it is coordinated with ἄνεσις ('relief'), favoring a socio-political or circumstantial
    sense of release. The translation avoids importing a specifically soteriological
    reading absent from the immediate wording.
