translation:
  text: And they said, “When the king rises, they will give him the document; and
    whoever the king and the three nobles of Persia judge that his word is wiser,
    to him the victory will be given, as it is written.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the letter” or “the document” for “the writing” (τὸ γράμμα).
    reason: lexical_alternative
  - marker: b
    text: Or “his speech is wiser” or “his case is wiser” for “his argument is wiser”
      (ὁ λόγος αὐτοῦ σοφώτερος).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγερθῇ
  chosen: rises
  alternatives:
  - gets up
  - awakens
  lexicon: BDAG
  rationale: Aorist passive subjunctive of ἐγείρω here refers to the king getting
    up/rising, likely from sleep or from his place. 'Rises' is natural English and
    preserves the formal sense without over-specifying.
- source_word: τὸ γράμμα
  chosen: the writing
  alternatives:
  - the letter
  - the document
  lexicon: BDAG
  rationale: γράμμα can mean a written document or letter. Here it refers to the written
    statements placed for royal review. 'The writing' stays close to the Greek and
    avoids implying a private epistle.
- source_word: κρίνῃ
  chosen: judge
  alternatives:
  - decide
  - determine
  lexicon: BDAG
  rationale: The verb denotes making a judgment or decision. 'Judge' preserves the
    evaluative force and fits the formal setting of adjudicating the contest.
- source_word: μεγιστᾶνες
  chosen: nobles
  alternatives:
  - magnates
  - great men
  - officials
  lexicon: LSJ
  rationale: The term refers to high-ranking Persian dignitaries. 'Nobles' is idiomatic
    modern English and conveys elite status better than the less familiar 'magnates.'
- source_word: ὁ λόγος αὐτοῦ σοφώτερος
  chosen: his argument is wiser
  alternatives:
  - his speech is wiser
  - his word is wiser
  - his case is wiser
  lexicon: BDAG
  rationale: λόγος in this contest context refers not merely to a single 'word' but
    to the participant's statement, reasoning, or argument. 'Argument' best captures
    the competitive rhetorical setting, while 'wiser' renders σοφώτερος straightforwardly.
- source_word: τὸ νῖκος
  chosen: the victory
  alternatives:
  - the prize
  - the win
  lexicon: LSJ
  rationale: νῖκος means victory or conquest. In context it is the awarded win in
    the wisdom contest. 'The victory' is both literal and clear.
- source_word: καθὼς γέγραπται
  chosen: as it is written
  alternatives:
  - as has been written
  lexicon: BDAG
  rationale: The perfect passive formula indicates what stands written in the document.
    'As it is written' is standard, accurate English.
