translation:
  text: And it makes all hearts rich, and it remembers neither king nor satrap; and
    it makes everything speak in terms of talents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it makes all speak about money' / 'it makes everyone talk in sums of
      money.' The Greek phrase uses 'talents' in the monetary sense, not in the modern
      sense of natural abilities.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάσας καρδίας
  chosen: every heart
  alternatives:
  - all hearts
  - everyone
  lexicon: LSJ
  rationale: A formally close rendering preserves the anthropological idiom of καρδία
    as the seat of desire and intention. 'Every heart' is more transparent to the
    Greek than flattening to 'everyone,' though the latter sense is implicit.
- source_word: ποιεῖ πλουσίας
  chosen: makes ... rich
  alternatives:
  - enriches
  - makes ... wealthy
  lexicon: LSJ
  rationale: ποιέω + adjective is naturally rendered 'make ... rich.' 'Enriches' is
    possible, but the more literal phrasing better preserves the repeated ποιεῖ structure
    in the verse.
- source_word: οὐ μέμνηται
  chosen: remembers neither
  alternatives:
  - takes no notice of
  - pays no regard to
  lexicon: LSJ
  rationale: The verb literally denotes remembering or keeping in mind. In context
    the sense approaches disregard, but 'remembers neither' keeps the Greek image
    and leaves the rhetorical force intact.
- source_word: βασιλέα οὐδὲ σατράπην
  chosen: king nor satrap
  alternatives:
  - king nor governor
  lexicon: LSJ
  rationale: σατράπης is specifically 'satrap,' a Persian provincial ruler. Translating
    it rather than generalizing to 'governor' preserves the historical coloring of
    the term.
- source_word: πάντα
  chosen: everyone
  alternatives:
  - all things
  - everything
  lexicon: LSJ
  rationale: Although πάντα is formally neuter plural, the following infinitive 'to
    speak' points to persons as the practical sense in this context. English idiom
    requires an animate subject, so 'everyone' best conveys the meaning.
- source_word: διὰ ταλάντων
  chosen: in terms of talents
  alternatives:
  - about talents
  - for money
  - by means of sums of money
  lexicon: LSJ
  rationale: τάλαντον can denote a weight and, by extension, a monetary amount. Here
    the phrase likely refers to money/sums of money rather than the later English
    sense 'abilities.' 'In terms of talents' stays close to the Greek while signaling
    monetary discourse.
- source_word: ποιεῖ λαλεῖν
  chosen: makes ... speak
  alternatives:
  - causes ... to talk
  - makes ... say
  lexicon: LSJ
  rationale: The causative construction is straightforward. 'Makes ... speak' preserves
    the repeated ποιεῖ and the rhetorical parallelism of the verse.
