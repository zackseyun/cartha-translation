theological_decisions:
- issue: Interpretation of the repeated subject in context
  chosen_reading: The implied subject is treated as the same feminine referent from
    the surrounding argument (wine), without naming it in the verse itself.
  alternative_readings:
  - Supplying 'wine' explicitly in English
  rationale: The Greek omits the subject here because it is carried over from the
    preceding context. English can preserve that omission by using 'it,' which avoids
    over-supplying while remaining intelligible.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without paraphrase beyond what it warrants.'
