translation:
  text: And to all who guarded the city, he wrote to give them allotments and wages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lots' or 'shares' for 'allotments' (κλήρους). The Greek may refer to
      portions assigned to them, possibly by lot.
    reason: lexical_alternative
  - marker: b
    text: Or 'pay' or 'rations' for 'wages' (ὀψώνια). The term can denote provisions
      or compensation for service.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρουροῦσι
  chosen: guarded
  alternatives:
  - were guarding
  - kept watch over
  lexicon: LSJ
  rationale: The participle from φρουρέω denotes guarding or keeping watch. 'Guarded'
    gives clear modern English and fits the civic-security context of the city watch.
- source_word: πόλιν
  chosen: city
  alternatives:
  - town
  lexicon: LSJ
  rationale: πόλις normally means 'city'; nothing in context suggests a weaker rendering.
- source_word: ἔγραψε
  chosen: he wrote that
  alternatives:
  - he wrote to order
  - he issued a written order to
  lexicon: LSJ
  rationale: The verb is simply 'wrote,' but in context it introduces the content
    of a royal written directive. 'He wrote that' preserves the form without overexpanding
    into paraphrase.
- source_word: δοῦναι
  chosen: should be given
  alternatives:
  - to give
  lexicon: LSJ
  rationale: 'The infinitive depends on ἔγραψε and expresses the content of the written
    instruction. English idiom is smoother with a passive finite clause: ''should
    be given.'''
- source_word: κλήρους
  chosen: allotments
  alternatives:
  - lots
  - shares
  - portions
  lexicon: LSJ
  rationale: κλῆρος can mean 'lot' in the sense of a portion assigned by lot, and
    by extension an allotted share. Here, paired with wages, it likely refers to assigned
    portions or grants rather than the physical act of casting lots. 'Allotments'
    preserves that sense without forcing a narrower interpretation.
- source_word: ὀψώνια
  chosen: wages
  alternatives:
  - pay
  - rations
  lexicon: LSJ
  rationale: ὀψώνια commonly denotes pay or provisions for service, especially military
    pay. Since the recipients are city guards, 'wages' is a natural and sufficiently
    broad rendering; 'rations' is possible but too narrow for the main text.
