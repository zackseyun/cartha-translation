translation:
  text: And he wrote letters to all the local rulers in Coele-Syria and Phoenicia
    and to those in Lebanon, to bring cedar timber from Lebanon to Jerusalem, so that
    they might build the city with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'district governors'; Greek 'toparchs,' rulers over local districts.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοπάρχαις
  chosen: local rulers
  alternatives:
  - district governors
  - toparchs
  lexicon: LSJ
  rationale: τοπάρχης denotes a ruler of a locality or district. 'Local rulers' communicates
    the administrative sense in clear modern English without the opacity of the transliteration
    'toparchs.'
- source_word: ἐν κοίλῃ Συρίᾳ
  chosen: in Coele-Syria
  alternatives:
  - in Hollow Syria
  - in Syria
  lexicon: LSJ
  rationale: This is a proper regional designation in Hellenistic usage, not merely
    a descriptive phrase. 'Coele-Syria' preserves the historical place-name more accurately
    than flattening it to 'Syria.'
- source_word: ἔγραψεν ἐπιστολάς
  chosen: he wrote letters
  alternatives:
  - he sent letters
  lexicon: LSJ
  rationale: The Greek explicitly says 'wrote letters.' Although the context implies
    dispatch, the verbal action is writing, so the translation stays close to the
    source.
- source_word: μεταφέρειν
  chosen: to bring
  alternatives:
  - to transport
  - to carry over
  lexicon: LSJ
  rationale: '''Bring'' is natural English for the infinitive of purpose here and
    fits the movement of timber from Lebanon to Jerusalem without sounding overly
    technical.'
- source_word: ξύλα κέδρινα
  chosen: cedar timber
  alternatives:
  - cedar wood
  - cedar logs
  lexicon: LSJ
  rationale: The phrase refers to cedar wood as building material. 'Cedar timber'
    best conveys construction-grade wood in idiomatic English.
- source_word: ὅπως οἰκοδομήσωσιν
  chosen: so that they might build
  alternatives:
  - in order that they might build
  - that they should build
  lexicon: LSJ
  rationale: ὅπως with the subjunctive expresses purpose. 'So that they might build'
    preserves that purposive nuance in readable English.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - along with him
  - for him
  lexicon: LSJ
  rationale: The preposition μετά with the genitive normally means accompaniment.
    'With him' is the straightforward rendering and avoids importing a benefactive
    sense not present in the Greek.
- source_word: τὴν πόλιν
  chosen: the city
  alternatives:
  - the town
  lexicon: LSJ
  rationale: πόλις here refers to Jerusalem as an urban center. 'The city' is the
    natural equivalent and matches the Greek article.
