theological_decisions:
- issue: Scope of the building project in 'the city'
  chosen_reading: the text says the city, not specifically the temple
  alternative_readings:
  - the temple
  rationale: Although cedar from Lebanon often evokes temple construction in biblical
    contexts, this verse explicitly ends with τὴν πόλιν ('the city'). The translation
    preserves the stated object and does not harmonize it to temple-building.
  doctrine_reference: Translation philosophy §1, §3
