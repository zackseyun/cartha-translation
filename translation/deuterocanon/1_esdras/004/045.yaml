theological_decisions:
- issue: Historical attribution that the Judeans burned the temple
  chosen_reading: Retained the Greek wording 'the Judeans burned' without harmonizing
    to the more familiar historical tradition that the Babylonians/Chaldeans burned
    the temple.
  alternative_readings:
  - which was burned by the Chaldeans
  - which the Babylonians burned
  rationale: The Zone 1 Greek text explicitly has οἱ Ἰουδαῖοι as subject of ἐνεπύρισαν.
    Because the source witness is to be translated as given, the draft preserves this
    difficult reading rather than correcting it from parallel traditions. The mismatch
    is notable and should be transparent to readers.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    source uncertainty honestly.
