translation:
  text: and you vowed to rebuild the temple which the Judeans burned when Judea was
    laid waste by the Chaldeans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''which the Judeans burned.'' This is a difficult reading and differs
      from the more familiar account in which the temple is burned by the Chaldeans/Babylonians.'
    reason: alternative_reading
lexical_decisions:
- source_word: εὔξω
  chosen: you vowed
  alternatives:
  - you promised
  - you prayed
  - you made a vow
  lexicon: LSJ
  rationale: From εὔχομαι, here best taken as making a vow/promise rather than prayer,
    since it governs an infinitive of action ('to rebuild') and refers to a pledged
    undertaking.
- source_word: οἰκοδομῆσαι
  chosen: to rebuild
  alternatives:
  - to build
  - to construct
  lexicon: LSJ
  rationale: Although the verb can mean simply 'to build,' in context of a previously
    destroyed temple, English 'rebuild' makes the implied restoration explicit without
    exceeding the sense.
- source_word: ναός
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: LSJ
  rationale: Standard rendering for the Jerusalem temple structure in this context;
    'sanctuary' is possible but less natural here.
- source_word: ἐνεπύρισαν
  chosen: burned
  alternatives:
  - set on fire
  - burned down
  lexicon: LSJ
  rationale: The verb denotes setting ablaze/burning. 'Burned' is concise and accurate;
    'burned down' would slightly over-specify the result.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Judeans
  alternatives:
  - the Jews
  lexicon: LSJ
  rationale: Ἰουδαῖοι in this historical-geographical setting can denote people of
    Judea. 'Judeans' preserves that ethnic-regional sense and avoids importing later,
    broader associations of 'Jews.'
- source_word: ἐρημώθη
  chosen: was laid waste
  alternatives:
  - was made desolate
  - was devastated
  lexicon: LSJ
  rationale: Passive aorist conveying devastation/desolation. 'Was laid waste' is
    idiomatic and preserves the gravity of the judgment-like ruin.
- source_word: Χαλδαίων
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: LSJ
  rationale: The Greek specifically says 'Chaldeans.' While historically overlapping
    with Babylonians, the more literal rendering should be retained in the main text.
