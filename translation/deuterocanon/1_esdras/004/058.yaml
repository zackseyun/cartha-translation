theological_decisions:
- issue: Rendering of devotional language directed toward God
  chosen_reading: he blessed the King of heaven
  alternative_readings:
  - he praised the King of heaven
  rationale: The Greek uses εὐλόγησεν, which in biblical diction often takes 'bless'
    even when God is the object. Retaining 'blessed' preserves scriptural idiom and
    theological texture, while 'praised' remains a viable interpretive alternative.
  doctrine_reference: 'Translation philosophy: preserve source meaning and theological
    tension without flattening biblical idiom.'
