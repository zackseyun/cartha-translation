translation:
  text: And when the young man went out, lifting up his face toward heaven, in the
    direction of Jerusalem, he blessed the King of heaven,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'facing Jerusalem.' The Greek expression indicates orientation toward
      Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: Or 'praised the King of heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε ἐξῆλθεν
  chosen: when ... went out
  alternatives:
  - when ... came out
  - after ... went out
  lexicon: LSJ
  rationale: A straightforward temporal clause with ἐξέρχομαι. 'Went out' is the most
    natural English equivalent here and preserves the narrative sequence.
- source_word: ὁ νεανίσκος
  chosen: the young man
  alternatives:
  - the youth
  - the young servant
  lexicon: LSJ
  rationale: νεανίσκος commonly denotes a young man or youth. 'Young man' is idiomatic
    modern English and avoids sounding either too juvenile ('youth') or too specific
    ('servant').
- source_word: ἄρας τὸ πρόσωπον
  chosen: lifting up his face
  alternatives:
  - raising his face
  - lifting up his countenance
  lexicon: LSJ
  rationale: The participial phrase is rendered fairly literally to preserve the physical
    gesture of prayer or praise. 'Face' is clearer and more natural than the archaic
    'countenance.'
- source_word: εἰς τὸν οὐρανόν
  chosen: toward heaven
  alternatives:
  - to heaven
  - toward the sky
  lexicon: LSJ
  rationale: In this devotional context οὐρανός refers to heaven rather than merely
    the sky. 'Toward heaven' fits the gesture of looking upward.
- source_word: ἐναντίον Ἰερουσαλήμ
  chosen: in the direction of Jerusalem
  alternatives:
  - before Jerusalem
  - toward Jerusalem
  - facing Jerusalem
  lexicon: LSJ
  rationale: ἐναντίον with a place here indicates orientation. 'In the direction of
    Jerusalem' makes the spatial sense explicit without overcommitting to a technical
    liturgical formula, though 'facing Jerusalem' is a plausible tighter alternative.
- source_word: εὐλόγησεν
  chosen: he blessed
  alternatives:
  - he praised
  - he spoke a blessing to
  lexicon: LSJ
  rationale: εὐλογέω can mean bless or praise depending on object and context. With
    God as object, 'blessed' preserves the biblical idiom while remaining understandable.
- source_word: τῷ βασιλεῖ τοῦ οὐρανοῦ
  chosen: the King of heaven
  alternatives:
  - the heavenly King
  - the king of heaven
  lexicon: LSJ
  rationale: A title for God. Capitalizing 'King' reflects titular usage in English.
    'Of heaven' closely follows the Greek genitive and preserves the reverential formula.
