translation:
  text: And when the young man went out, lifting up his face toward heaven opposite
    Jerusalem, he blessed the King of heaven, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅτε ἐξῆλθεν
  chosen: when ... went out
  alternatives:
  - when ... came out
  - after ... went out
  lexicon: LSJ
  rationale: A straightforward temporal clause with ἐξέρχομαι. 'Went out' preserves
    the motion from an interior setting without overinterpreting sequence.
- source_word: ὁ νεανίσκος
  chosen: the young man
  alternatives:
  - the youth
  - the young servant
  lexicon: LSJ
  rationale: νεανίσκος ordinarily denotes a young man or youth. 'Young man' is natural
    modern English and avoids implying servile status not present in the noun itself.
- source_word: ἄρας τὸ πρόσωπον
  chosen: lifting up his face
  alternatives:
  - raising his face
  - lifting up his countenance
  lexicon: LSJ
  rationale: The participle ἄρας with τὸ πρόσωπον is rendered idiomatically but still
    transparently. 'Lifting up his face' preserves the bodily gesture of prayer rather
    than flattening it to simply 'looked up.'
- source_word: εἰς τὸν οὐρανόν
  chosen: toward heaven
  alternatives:
  - to heaven
  - up to heaven
  lexicon: LSJ
  rationale: εἰς here marks direction. 'Toward heaven' reads naturally with the gesture
    and avoids awkwardness while preserving the directional sense.
- source_word: ἔναντιον Ἰερουσαλήμ
  chosen: facing Jerusalem
  alternatives:
  - before Jerusalem
  - toward Jerusalem
  - in the direction of Jerusalem
  lexicon: LSJ
  rationale: ἔναντιον with a place name indicates orientation. 'Facing Jerusalem'
    is concise and captures the physical posture in prayer.
- source_word: εὐλόγησεν
  chosen: he blessed
  alternatives:
  - he praised
  - he spoke a blessing to
  lexicon: LSJ
  rationale: The verb is the standard word for blessing. Since the object is God ('the
    King of heaven'), English 'blessed' is acceptable and preserves the biblical register;
    'praised' is possible but less exact.
- source_word: τῷ βασιλεῖ τοῦ οὐρανοῦ
  chosen: the King of heaven
  alternatives:
  - the heavenly King
  - the king of heaven
  lexicon: LSJ
  rationale: This title is best translated directly. Capitalizing 'King' reflects
    its titular use for God in context, while 'of heaven' preserves the genitive construction.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: LSJ
  rationale: The participle introduces the following speech. 'Saying' keeps the Greek
    flow and signals continuation into the next verse.
