id: 1ES.4.80
reference: 1 Esdras 4:80
source:
  edition: lxx-swete-1909
  text: Καὶ ὅτε ἐξῆλθεν ὁ νεανίσκος, ἄρας τὸ πρόσωπον εἰς τὸν οὐρανὸν ἔναντιον Ἰερουσαλὴμ
    εὐλόγησεν τῷ βασιλεῖ τοῦ οὐρανοῦ λέγων
