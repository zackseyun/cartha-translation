theological_decisions:
- issue: Potentially misogynistic-sounding causal phrase
  chosen_reading: because of women
  alternative_readings:
  - because of wives
  rationale: The Greek explicitly assigns causation with διά + accusative and uses
    γυναῖκες broadly. The translation should preserve the text's rhetoric without
    softening it into a less direct formulation. 'Women' is retained as the generic
    plural used by the source; 'wives' is preserved as a lexical alternative but is
    less likely in this context.
