translation:
  text: and all the vessels taken from Jerusalem are to be sent back there—those that
    Cyrus set apart when he vowed to destroy Babylon, and vowed to send there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vowed to destroy Babylon'; the Greek literally says 'to cut off Babylon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'prayed' instead of 'vowed.'
    reason: alternative_reading
  - marker: c
    text: Literally 'to send there'; 'back' is supplied in English from the context
      of returning items taken from Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκεύη
  chosen: vessels
  alternatives:
  - articles
  - utensils
  lexicon: LSJ
  rationale: In temple-context usage, σκεύη commonly refers to cultic vessels or temple
    articles. 'Vessels' is standard, clear English that preserves the likely sacred-object
    sense without over-specifying.
- source_word: τὰ λημφθέντα
  chosen: taken
  alternatives:
  - received
  - seized
  lexicon: LSJ
  rationale: The participle denotes items that had been taken from Jerusalem. 'Taken'
    is the most natural and contextually appropriate rendering here, fitting the known
    temple-plunder context.
- source_word: ἐξ Ἰερουσαλήμ
  chosen: from Jerusalem
  alternatives:
  - out of Jerusalem
  lexicon: LSJ
  rationale: A straightforward spatial source expression; 'from Jerusalem' is idiomatic
    and sufficiently formal.
- source_word: ἐκπέμψαι
  chosen: are to be sent back
  alternatives:
  - to send out
  - to dispatch
  lexicon: LSJ
  rationale: Although the infinitive literally means 'to send out,' the context is
    restoration of temple vessels to Jerusalem. 'Sent back' captures the directional
    force implied by the larger sentence while remaining faithful to the action.
- source_word: ἃ ἐχώρισεν
  chosen: those that ... set apart
  alternatives:
  - those that ... separated
  - those that ... designated
  lexicon: LSJ
  rationale: χωρίζω here likely means to separate off or designate for a purpose.
    'Set apart' fits both the administrative and potentially sacred nuance.
- source_word: ηὔξατο
  chosen: vowed
  alternatives:
  - prayed
  - made a vow
  lexicon: LSJ
  rationale: The verb can mean 'vowed' or 'prayed,' but with the following infinitives
    it most naturally denotes making a vow or solemn undertaking. 'Vowed' best preserves
    that force.
- source_word: ἐκκόψαι Βαβυλῶνα
  chosen: to cut off Babylon
  alternatives:
  - to cut down Babylon
  - to destroy Babylon
  lexicon: LSJ
  rationale: The literal sense is 'to cut off/down Babylon.' Because the Greek wording
    is somewhat unusual, the translation keeps the metaphorical verbal image rather
    than resolving it into a stronger interpretive gloss like 'destroy,' while still
    sounding intelligible in English.
- source_word: ἐξαποστεῖλαι ἐκεῖ
  chosen: to send there
  alternatives:
  - to send back there
  - to dispatch there
  lexicon: LSJ
  rationale: ἐξαποστέλλω intensifies the sending idea. 'To send there' is the closest
    concise rendering; in the main English line 'back' is supplied earlier for readability
    and contextual clarity.
