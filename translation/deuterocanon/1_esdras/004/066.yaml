theological_decisions:
- issue: Sense of ηὔξατο in Cyrus's action
  chosen_reading: vowed
  alternative_readings:
  - prayed
  rationale: The syntax with infinitives favors a vow/solemn resolve rather than a
    simple prayer. This is not a major doctrinal issue, but it affects how Cyrus's
    agency is portrayed, so the alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: How explicitly to render restoration implied by ἐκπέμψαι ... ἐκεῖ
  chosen_reading: sent back there
  alternative_readings:
  - sent there
  - dispatched there
  rationale: The context clearly concerns objects previously taken from Jerusalem,
    so English 'sent back' communicates the implied restoration. The more literal
    'sent there' is preserved in a footnote because the Greek itself does not include
    an explicit 'back.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
