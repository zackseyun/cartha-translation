translation:
  text: And they kept the Feast of Booths, as it is commanded in the law, and offered
    sacrifices day by day, as was fitting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the feast of Tabernacles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγάγοσαν
  chosen: they kept
  alternatives:
  - they held
  - they celebrated
  - they conducted
  lexicon: LSJ
  rationale: From ἄγω used idiomatically with a feast, meaning to celebrate or keep
    it. 'Kept' is natural English for observance of a festival and preserves the formal
    sense without awkwardness.
- source_word: τὴν τῆς σκηνοπηγίας ἑορτήν
  chosen: the feast of Booths
  alternatives:
  - the feast of Tabernacles
  - the festival of tents
  lexicon: LSJ
  rationale: σκηνοπηγία refers to the festival associated with booths/tabernacles.
    'Feast of Booths' is transparent modern English and preserves the concrete imagery
    better than the more traditional but less transparent 'Tabernacles.'
- source_word: ὡς ἐπιτέτακται
  chosen: as it is commanded
  alternatives:
  - as had been commanded
  - as prescribed
  lexicon: BDAG
  rationale: Perfect passive indicates what stands commanded. Present English 'is
    commanded' captures the abiding force of the legal prescription.
- source_word: ἐν τῷ νόμῳ
  chosen: in the law
  alternatives:
  - by the law
  - in the Law
  lexicon: BDAG
  rationale: The phrase locates the command within the legal corpus. Lowercase 'law'
    is used here because the Greek does not itself distinguish capitalization, and
    the phrase functions descriptively rather than as a fixed English title.
- source_word: θυσίας
  chosen: sacrifices
  alternatives:
  - offerings
  lexicon: BDAG
  rationale: θυσία is the standard term for sacrificial offerings. 'Sacrifices' is
    the most direct and contextually appropriate rendering.
- source_word: καθ’ ἡμέραν
  chosen: day by day
  alternatives:
  - daily
  - each day
  lexicon: BDAG
  rationale: The distributive phrase emphasizes repeated daily action. 'Day by day'
    preserves that iterative sense slightly better than the flatter adverb 'daily.'
- source_word: ὡς προσῆκον ἦν
  chosen: as was fitting
  alternatives:
  - as was proper
  - as was required
  - as was appropriate
  lexicon: LSJ
  rationale: The phrase denotes what was proper or suitable in the circumstances.
    'As was fitting' preserves the idiomatic force without over-specifying legal necessity;
    the immediate context already supplies command language with ἐπιτέτακται.
