translation:
  text: And they laid the foundation of the house of God on the new moon of the second
    month, in the second year after they had come into Judea and Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of God.' The Greek word here is the usual term for the sanctuary/temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθεμελίωσαν
  chosen: laid the foundation
  alternatives:
  - founded
  - established the foundation
  lexicon: LSJ
  rationale: The verb means to lay a foundation or found. In context with ναός, English
    idiom favors 'laid the foundation' rather than the less natural 'founded the temple.'
- source_word: τὸν ναὸν τοῦ θεοῦ
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: LSJ
  rationale: Although ναός commonly means 'temple,' the parallel Ezra tradition often
    speaks of the 'house of God,' and this English phrasing naturally fits a foundation-laying
    context. It preserves the cultic building sense without importing later ecclesiastical
    associations.
- source_word: τῇ νουμηνίᾳ
  chosen: on the new moon
  alternatives:
  - on the first day of the month
  - at the new moon festival
  lexicon: LSJ
  rationale: νουμηνία denotes the new moon/new-month observance. 'On the new moon'
    is a direct rendering that preserves the calendrical-religious sense. The MT parallel
    speaks of the first day of a month elsewhere, but this Greek verse specifically
    names the new moon.
- source_word: τοῦ δευτέρου μηνὸς
  chosen: of the second month
  alternatives:
  - in the second month
  lexicon: LSJ
  rationale: This phrase modifies the new moon date. 'Of the second month' keeps the
    Greek construction clear in English.
- source_word: τοῦ δευτέρου ἔτους
  chosen: in the second year
  alternatives:
  - of the second year
  lexicon: LSJ
  rationale: English idiom prefers 'in the second year' for dating formulas, while
    preserving the chronological marker.
- source_word: ἐν τῷ ἐλθεῖν
  chosen: after they had come
  alternatives:
  - when they came
  - upon their coming
  lexicon: LSJ
  rationale: The articular infinitive with ἐν can be rendered temporally. 'After they
    had come' best fits the sequence of events in context and reads naturally in English.
- source_word: εἰς τὴν Ἰουδαίαν καὶ Ἰερουσαλήμ
  chosen: into Judea and Jerusalem
  alternatives:
  - to Judea and Jerusalem
  lexicon: LSJ
  rationale: εἰς commonly means 'into' or 'to.' 'Into' slightly better reflects movement
    toward and arrival within the land and city, though 'to' would also be possible.
