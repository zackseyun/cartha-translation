theological_decisions:
- issue: Whether to render the priestly pair interpretively from the Greek or harmonize
    directly to the Hebrew traditional terms Urim and Thummim
  chosen_reading: Render the Greek terms in the main text as 'the Manifestation and
    the Truth' and preserve 'Urim and Thummim' in a footnote.
  alternative_readings:
  - the Urim and the Thummim
  - revelation and truth
  rationale: The project gives primacy to the Greek source for 1 Esdras, while the
    MT parallel is to be used as real input. Here the Greek does not transliterate
    the Hebrew terms but renders them semantically. To remain auditable and source-anchored,
    the main text reflects the Greek wording, while the traditional Hebrew identification
    is preserved in a footnote because it is contextually important and likely intended.
  doctrine_reference: Translation philosophy §§1, 3, 5; PHILOSOPHY.md on Swete LXX
    primacy for 1 Esdras with MT parallels consulted.
