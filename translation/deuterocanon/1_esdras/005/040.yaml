translation:
  text: And Nehemiah and Atharias told them not to partake of the holy things until
    a priest should arise clothed with the Urim and the Thummim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally, 'the Manifestation and the Truth' refers to the priestly
      objects known from the Hebrew parallel as the Urim and the Thummim.
    reason: alternative_reading
  - marker: b
    text: That is, they were not to eat from the sacred priestly provisions until
      a qualified priest could render a definitive decision.
    reason: cultural_note
lexical_decisions:
- source_word: εἶπεν αὐτοῖς
  chosen: told them
  alternatives:
  - said to them
  lexicon: BDAG
  rationale: English 'told them' conveys the directive force of the speech more naturally
    in context than the more wooden 'said to them,' while remaining close to the Greek.
- source_word: Ναιμίας
  chosen: Nehemiah
  alternatives:
  - Naimias
  rationale: Personal names are transliterated by standard English convention. 'Nehemiah'
    is the established English form corresponding to Greek Ναιμίας and aligns with
    the parallel Nehemiah context.
- source_word: Ἀθαρίας
  chosen: Atharias
  alternatives:
  - Attharias
  - Azariah
  rationale: The Greek form is transliterated directly as a personal name. 'Azariah'
    reflects a Semitic equivalent but would move away from the Greek witness, which
    is primary here.
- source_word: μὴ μετέχειν
  chosen: not to partake
  alternatives:
  - not to share in
  - not to have a portion in
  lexicon: BDAG
  rationale: μετέχω commonly means 'share in' or 'partake of.' In cultic context with
    sacred food or privileges, 'partake' is idiomatic and suitably formal.
- source_word: τῶν ἁγίων
  chosen: the holy things
  alternatives:
  - the sacred things
  - the consecrated things
  - the most holy things
  lexicon: BDAG
  rationale: The phrase is plural and likely refers to sacred priestly provisions
    or holy offerings rather than holiness abstractly. 'The holy things' preserves
    the cultic breadth without over-specifying beyond the Greek. The MT parallel in
    Neh 7:65 similarly concerns exclusion from priestly sacred food pending priestly
    decision.
- source_word: ἕως ἀναστῇ
  chosen: until ... should arise
  alternatives:
  - until ... arises
  - until ... stands up
  lexicon: BDAG
  rationale: ἀναστῇ is aorist subjunctive after ἕως. 'Should arise' gives natural
    English for a future-contingent event and preserves the formal tone of awaiting
    a future priestly resolution.
- source_word: ἱερεὺς
  chosen: a priest
  lexicon: BDAG
  rationale: Straightforward rendering of the singular noun in context.
- source_word: ἐνδεδυμένος
  chosen: clothed with
  alternatives:
  - wearing
  lexicon: BDAG
  rationale: The perfect/middle participial sense is well represented by 'clothed
    with,' which also preserves the elevated cultic register.
- source_word: τὴν δήλωσιν
  chosen: the Manifestation
  alternatives:
  - the revelation
  - the declaration
  - the Urim
  lexicon: LSJ
  rationale: δήλωσις literally denotes making clear, manifestation, or disclosure.
    In this priestly context it likely corresponds to the Urim element of the traditional
    pair Urim and Thummim. Because the Greek text itself uses an interpretive equivalent
    rather than a transliteration, the main text preserves that Greek sense as 'Manifestation,'
    while a footnote preserves the traditional identification.
- source_word: τὴν ἀλήθειαν
  chosen: the Truth
  alternatives:
  - truth
  - the Thummim
  - perfection
  lexicon: BDAG
  rationale: ἀλήθεια ordinarily means 'truth.' In this collocation with δήλωσις and
    in light of the Hebrew parallel, it likely represents the Thummim element. The
    main text follows the Greek wording with capitalization for the paired sacred
    objects, while a footnote preserves the traditional 'Thummim' identification.
