translation:
  text: the sons of Phassor, 1,247.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel at Nehemiah 7:37 instead reads 'the sons of Lod, Hadid,
      and Ono, 725.' 1 Esdras here reflects a different list position and content
      in the Greek tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: LSJ
  rationale: In this census/list context, υἱοὶ is the standard genealogical formula
    meaning the members of a family line or clan. 'The sons of' preserves the formal
    list style and matches the Greek wording more closely than the broader 'descendants
    of.'
- source_word: Φασσόρου
  chosen: Phassor
  alternatives:
  - Pashhur
  - Phassour
  lexicon: LSJ
  rationale: This is a proper name transliterated from the Greek form Φασσόρου. Because
    the project prioritizes the Greek source for 1 Esdras, the main text follows the
    Greek-form transliteration 'Phassor' rather than importing the MT-aligned Hebrew
    form 'Pashhur.' The genitive is represented idiomatically in English by 'of Phassor.'
- source_word: χίλιοι διακόσιοι τεσσεράκοντα ἑπτά
  chosen: 1,247
  alternatives:
  - one thousand two hundred forty-seven
  lexicon: LSJ
  rationale: The Greek cardinal sequence straightforwardly yields the total 1,247.
    Numerals are rendered in digits for readability in a census register. The MT parallel
    gives a different entry and number, but the Greek witness is the primary source
    and is translated as it stands.
