translation:
  text: 'The Levites: the sons of Jesueis, Koddelou, Bannou, and Soudiou, seventy-four.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several names in this verse differ from the better-known Ezra-Nehemiah parallels;
      this translation follows the Greek text of 1 Esdras rather than harmonizing
      them to the Hebrew tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ Λευεῖται
  chosen: The Levites
  alternatives:
  - And the Levites
  - The Levite clans
  lexicon: LSJ
  rationale: The phrase is a nominative list heading in a census context. 'The Levites'
    is the most natural English rendering for this catalog entry without adding conjunctions
    not present in the Greek.
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: LSJ
  rationale: In genealogical and census lists, υἱοὶ commonly marks lineage or clan
    membership. 'The sons of' preserves the formal list style and the source wording
    more closely than the broader 'descendants of.'
- source_word: Ἰησουείς
  chosen: Jesueis
  alternatives:
  - Jeshua
  - Jesuis
  lexicon: LSJ
  rationale: This is a proper name transliterated from the Greek form in 1 Esdras.
    Although the MT parallel elsewhere may suggest a different underlying name, the
    Greek witness is primary here, so the transliteration follows the extant Greek
    rather than harmonizing to a Hebrew parallel.
- source_word: Κοδδηλοῦ
  chosen: Koddelou
  alternatives:
  - Kodelou
  - Kadmiel
  lexicon: LSJ
  rationale: The Greek proper name is transliterated directly. A harmonization to
    the better-known Ezra/Nehemiah parallel name 'Kadmiel' is possible at the level
    of underlying tradition, but the translation should remain anchored to the Greek
    text rather than reconstructing a presumed Vorlage.
- source_word: Βάννου
  chosen: Bannou
  alternatives:
  - Bannu
  - Bani
  lexicon: LSJ
  rationale: The Greek genitive form is best represented by the transliteration 'Bannou'
    in this list. 'Bani' would reflect harmonization to Hebrew/parallel traditions
    rather than the immediate Greek form.
- source_word: Σουδίου
  chosen: Soudiou
  alternatives:
  - Sudiou
  - Hodaviah
  lexicon: LSJ
  rationale: The Greek proper name is unusual and may reflect textual development
    relative to Hebrew parallels, but the translation should preserve the Greek form.
    'Hodaviah' would be an interpretive retroversion, not a translation of the extant
    text.
- source_word: ἑβδομήκοντα τέσσαρες
  chosen: seventy-four
  alternatives:
  - seventy and four
  lexicon: LSJ
  rationale: This is the straightforward cardinal number. Modern English idiom favors
    'seventy-four' while remaining fully faithful to the Greek.
