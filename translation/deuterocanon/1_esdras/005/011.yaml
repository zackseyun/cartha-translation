translation:
  text: The sons of Phath-moab, of the sons of Jeshua and Joab, two thousand eight
    hundred and two.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Phthalemoab; the Hebrew-parallel tradition commonly has Pahath-moab.
    reason: alternative_reading
  - marker: b
    text: Greek reads 'Jeshua and Roboab'; the parallel list in Ezra/Nehemiah is commonly
      aligned with 'Jeshua and Joab.' Because 1 Esdras often reorders or reshapes
      its source material, the Greek form is significant even where the parallel tradition
      differs.
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: LSJ
  rationale: In this census-style list, υἱοὶ functions as a standard genealogical/clan
    designation. 'The sons of' preserves the formal structure of the Greek and matches
    the list genre better than the more interpretive 'descendants of.'
- source_word: Φθαλεμωάβ
  chosen: Phthalemoab
  alternatives:
  - Pahath-moab
  - Phathmoab
  lexicon: LSJ
  rationale: This is a proper name transliterated directly from the Greek witness,
    which is the primary source for 1 Esdras. Although the Hebrew parallel tradition
    is associated with Pahath-moab, the Greek form here should control the main text;
    the more familiar Hebrew-aligned form is preserved as an alternative in a footnote.
- source_word: εἰς
  chosen: among
  alternatives:
  - belonging to
  - with reference to
  lexicon: LSJ
  rationale: In this list formula, εἰς with the accusative appears to mark subgroup
    affiliation rather than motion. 'Among' gives clear English for the relationship
    between Phthalemoab and the following named lineages.
- source_word: τοὺς υἱοὺς Ἰησοῦ καὶ Ῥοβοάβ
  chosen: the sons of Jeshua and Joab
  alternatives:
  - the sons of Jesus and Roboab
  - the sons of Jeshua and Roboab
  lexicon: LSJ
  rationale: Ἰησοῦ in this postexilic genealogical context is best rendered 'Jeshua,'
    the conventional English form for the Hebrew name rather than the NT-associated
    'Jesus.' Ῥοβοάβ likely reflects the name known from the Ezra/Nehemiah parallel
    as Joab; because the verse's source validation is marked major_mismatch and the
    MT parallel differs substantially, the English adopts the likely intended name
    while preserving the Greek-form alternative in a footnote.
- source_word: δισχίλιοι ὀκτακόσιοι δύο
  chosen: two thousand eight hundred and two
  alternatives:
  - 2,802
  lexicon: LSJ
  rationale: This is the straightforward cardinal total. Spelling out the number fits
    the literary register of the translation.
