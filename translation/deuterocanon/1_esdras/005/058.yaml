theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek liturgical context
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  - the LORD
  rationale: The Greek source reads κύριος, and the project's contested-terms guidance
    sets the default as 'Lord.' Since this is a Greek deuterocanonical text rather
    than a direct Hebrew divine-name occurrence, 'the Lord' is the most source-anchored
    rendering.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Supplying an English verb in the clause 'ὅτι ἡ χρηστότης αὐτοῦ καὶ ἡ δόξα
    εἰς τοὺς αἰῶνας παντὶ Ἰσραήλ'
  chosen_reading: because his goodness and his glory are forever upon all Israel
  alternative_readings:
  - because his goodness and glory endure forever for all Israel
  rationale: The Greek is elliptical and liturgical. The chosen rendering keeps both
    nouns explicit and supplies only the minimal copula needed in English, avoiding
    over-interpretation while still producing readable modern English.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5, §6
