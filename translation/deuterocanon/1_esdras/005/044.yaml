translation:
  text: and to give to the holy treasury for the works one thousand minas of gold,
    and five thousand minas of silver, and one hundred priestly garments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple treasury.' The Greek phrase literally combines 'holy' and
      'treasury/storehouse.'
    reason: lexical_alternative
  - marker: b
    text: A mina was an ancient unit of weight and, by extension, value; the translation
      preserves the ancient term rather than converting it into a modern equivalent.
    reason: cultural_note
lexical_decisions:
- source_word: δοῦναι
  chosen: to give
  alternatives:
  - to contribute
  - to donate
  lexicon: LSJ
  rationale: The infinitive continues the sense of what the returnees did with their
    resources. 'To give' is the most direct rendering and avoids adding the more interpretive
    nuance of formal donation language.
- source_word: ἱερὸν γαζοφυλάκιον
  chosen: the holy treasury
  alternatives:
  - the temple treasury
  - the sacred treasury
  lexicon: LSJ
  rationale: γαζοφυλάκιον denotes a treasury or storehouse for valuables; ἱερόν marks
    it as belonging to the sanctuary. 'Holy treasury' preserves both elements without
    over-specifying beyond the Greek. 'Temple treasury' is possible, but 'holy' more
    closely reflects ἱερόν.
- source_word: τῶν ἔργων
  chosen: for the works
  alternatives:
  - for the work
  - for the construction works
  lexicon: LSJ
  rationale: 'The genitive most naturally indicates purpose or relation: the treasury
    was for the building works. The plural ''works'' follows the Greek form and leaves
    the scope broad, likely referring to restoration/construction activity.'
- source_word: χρυσίου μνᾶς χιλίας
  chosen: one thousand minas of gold
  alternatives:
  - a thousand minas of gold
  lexicon: LSJ
  rationale: μνᾶ is a weight and monetary unit. 'Minas' is retained rather than converted
    into a modern measure, preserving the ancient economic term transparently.
- source_word: ἀργυρίου μνᾶς πεντακισχιλίας
  chosen: five thousand minas of silver
  alternatives:
  - five thousand silver minas
  lexicon: LSJ
  rationale: The phrase parallels the gold contribution. Rendering with 'of silver'
    is idiomatic English while preserving the material and quantity.
- source_word: στολὰς ἱερατικὰς
  chosen: priestly garments
  alternatives:
  - priestly robes
  - priestly vestments
  lexicon: LSJ
  rationale: στολή can mean robe or garment; 'garments' is broad and accessible modern
    English, while ἱερατικά specifies their priestly use. 'Vestments' is accurate
    but more ecclesiastical in tone.
- source_word: ἑκατόν
  chosen: one hundred
  alternatives:
  - a hundred
  lexicon: LSJ
  rationale: A straightforward numerical rendering matching the formal inventory style
    of the verse.
