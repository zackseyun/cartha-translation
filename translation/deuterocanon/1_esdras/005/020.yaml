translation:
  text: the sons of Chadiasai and Ammidioi, four hundred twenty-two; the sons of Keiramas
    Kabbes, six hundred twenty-one;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has 'those from Keiramas Kabbes.' The rendering 'the sons of Keiramas
      and Kabbes' reflects the census style of the surrounding list and treats the
      names as a grouped family entry. The underlying Greek is somewhat awkward, and
      the Hebrew parallel at this point differs substantially.
    reason: alternative_reading
  - marker: b
    text: The Hebrew parallel in Ezra/Nehemiah does not closely match these names
      or numbers here; 1 Esdras appears to preserve a divergent or reordered list.
      The translation therefore follows the Greek as primary.
    reason: textual_variant
lexical_decisions:
- source_word: οἱ Χαδιάσαι
  chosen: the sons of Chadiasai
  alternatives:
  - those of Chadiasai
  - the Chadiasai
  rationale: The repeated article οἱ in this census context functions elliptically
    for a family/group listing. Given the parallel Ezra/Nehemiah-style genealogical
    lists and the MT sanity-check, supplying 'the sons of' best communicates the implied
    sense in natural English while remaining close to the Greek list format. The proper
    name is transliterated from the Greek witness.
- source_word: Ἀμμίδιοι
  chosen: and Ammidioi
  alternatives:
  - the Ammidioi
  - Ammidioi
  rationale: Proper name/group name transliterated directly from the Greek. The conjunction
    καί links this name with Χαδιάσαι as a combined entry in the list.
- source_word: τετρακόσιοι εἴκοσι δύο
  chosen: four hundred twenty-two
  alternatives:
  - four hundred and twenty-two
  lexicon: LSJ
  rationale: Straightforward cardinal number. Modern English style omits 'and' for
    readability.
- source_word: οἱ ἐκ Κειράμας Κάββης
  chosen: the sons of Keiramas and Kabbes
  alternatives:
  - those from Keiramas Kabbes
  - those of Keiramas Kabbes
  - the men from Keiramas and Kabbes
  lexicon: LSJ
  rationale: ἐκ can mean 'from/out of,' but in this list of returnees it likely marks
    origin or clan association. Because the whole section is a census of family groups,
    'the sons of' gives the idiomatic force in English. The Greek sequence is textually
    awkward, and the names are preserved by transliteration rather than harmonized
    to the MT, since the Greek is the primary witness.
- source_word: ἑξακόσιοι εἴκοσι εἷς
  chosen: six hundred twenty-one
  alternatives:
  - six hundred and twenty-one
  lexicon: LSJ
  rationale: Straightforward cardinal number rendered in contemporary English style.
