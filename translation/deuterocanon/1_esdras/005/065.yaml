translation:
  text: And coming to Zerubbabel and Jeshua and the heads of the fathers’ houses,
    they said to them, “We will build with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “We will join you in building.” The Greek verb means to build together
      with someone, not merely to offer general support.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  chosen: coming to
  alternatives:
  - approaching
  - having come near to
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, introducing the action prior to speaking.
    'Coming to' is natural English and preserves the movement toward the leaders without
    overformal wording.
- source_word: τῷ Ζοροβαβὲλ καὶ Ἰησοῦ
  chosen: to Zerubbabel and Jeshua
  alternatives:
  - to Zorobabel and Jesus
  lexicon: Lexham Analytical Lexicon / standard LXX name forms
  rationale: Personal names are transliterated rather than translated. 'Jeshua' is
    preferred here over 'Jesus' because the Old Testament/Second Temple setting and
    Hebrew parallel favor the conventional postexilic name form, avoiding misleading
    christological association.
- source_word: τοῖς ἡγουμένοις
  chosen: the heads
  alternatives:
  - the leaders
  - those leading
  lexicon: BDAG
  rationale: The participial substantive denotes those in leadership. 'Heads' fits
    the following genitive phrase and reflects the clan-household structure more concretely
    than the more generic 'leaders'.
- source_word: τῶν πατριῶν
  chosen: of the fathers’ houses
  alternatives:
  - of the ancestral families
  - of the clans
  lexicon: LSJ
  rationale: πατριά refers to a lineage group or paternal house. 'Fathers’ houses'
    preserves the familial-tribal idiom familiar in Ezra material; 'clans' is possible
    but less transparent to the source phrasing.
- source_word: Συνοικοδομήσομεν
  chosen: We will build together with you
  alternatives:
  - We will help you build
  - We will join you in building
  lexicon: LSJ
  rationale: Future of συνοικοδομέω, literally 'build together with.' The chosen rendering
    keeps the compound force of συν- while remaining idiomatic English. It avoids
    reducing the claim merely to assistance.
