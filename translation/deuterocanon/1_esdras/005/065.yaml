theological_decisions:
- issue: Rendering of Ἰησοῦ in a postexilic historical context
  chosen_reading: Jeshua
  alternative_readings:
  - Jesus
  rationale: Although the Greek form is identical to the later NT name, in this context
    it refers to the high priest Jeshua/Joshua of the restoration period. Transliteration
    as 'Jeshua' best reflects historical context and avoids importing unintended christological
    resonance.
  doctrine_reference: Translate titles; transliterate names.
