translation:
  text: And they recognized that those from the captivity were building the temple
    for the Lord God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the exiles' for 'those from the captivity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'building the temple to the Lord God of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέγνωσαν
  chosen: recognized
  alternatives:
  - came to know
  - learned
  - understood
  lexicon: BDAG
  rationale: The aorist of ἐπιγινώσκω here indicates coming to a clear realization
    or recognition. 'Recognized' is natural English and preserves the sense of perceiving
    the situation, without overstating it as deep understanding.
- source_word: οἱ ἐκ τῆς αἰχμαλωσίας
  chosen: those from the captivity
  alternatives:
  - the exiles
  - those from exile
  lexicon: LSJ
  rationale: Literally, 'those from the captivity.' This phrase identifies the returned
    deportees. 'Those from the captivity' stays close to the Greek while remaining
    readable; 'the exiles' is smoother but slightly less transparent to the source
    phrasing. The MT parallel is not directly aligned here, so the Greek governs.
- source_word: οἰκοδομοῦσιν
  chosen: were building
  alternatives:
  - are building
  - build
  lexicon: BDAG
  rationale: 'The present tense in indirect discourse reports ongoing action. English
    past progressive fits the narrative frame introduced by the aorist ''recognized'':
    they recognized that the returnees were in the process of building.'
- source_word: ναός
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός in this context refers to the temple structure dedicated to Israel's
    God. 'Temple' is the standard and clearest rendering in this rebuilding context.
- source_word: τῷ κυρίῳ θεῷ Ἰσραήλ
  chosen: for the Lord God of Israel
  alternatives:
  - to the Lord God of Israel
  lexicon: BDAG/LSJ
  rationale: The dative can be rendered either 'to' or 'for.' With a building verb
    in English, 'building the temple for the Lord God of Israel' is idiomatic and
    conveys dedication or purpose. 'Lord' follows the project's default rendering
    for κύριος.
