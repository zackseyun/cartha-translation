translation:
  text: the sons of Iaeir, the sons of Daisan, the sons of Noeba, the sons of Chaseba,
    the sons of Kazera, the sons of Ozeiou, the sons of Phinoe, the sons of Asara,
    the sons of Basthai, the sons of Assana, the sons of Manei, the sons of Napheisei,
    the sons of Akouph, the sons of Acheiba, the sons of Asour, the sons of Pharakem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew parallel in Nehemiah 7:46 lists different names at this point
      (''the Nethinim: the sons of Ziha, the sons of Hasupha, the sons of Tabbaoth'').
      1 Esdras here preserves a substantially different Greek list, so the translation
      follows the Greek source text rather than harmonizing to the Hebrew parallel.'
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: LSJ
  rationale: In this genealogical/list context, υἱοὶ is the standard formula introducing
    family or clan groups. 'The sons of' preserves the formal structure of the Greek
    and matches the list style better than the more interpretive 'descendants of.'
- source_word: Ἰαείρου
  chosen: Iaeir
  alternatives:
  - Jair
  - Jaeir
  lexicon: LSJ
  rationale: This is a proper name transliterated from the Greek form rather than
    normalized to the more familiar Hebrew/English 'Jair.' The project philosophy
    prefers transliterating names from the source text; the MT parallel for this verse
    is only approximate and does not control these names here.
- source_word: Δαισάν
  chosen: Daisan
  alternatives:
  - Daisan
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek. No compelling reason
    from the approximate MT parallel to regularize it further.
- source_word: Νοεβά
  chosen: Noeba
  alternatives:
  - Noeba
  - Noba
  lexicon: LSJ
  rationale: Proper name rendered by straightforward transliteration of the Greek
    spelling.
- source_word: Χασεβά
  chosen: Chaseba
  alternatives:
  - Haseba
  - Chaseva
  lexicon: LSJ
  rationale: Chi is represented as 'Ch' in standard transliteration practice for Greek
    names in this project. The rest of the form follows the Greek directly.
- source_word: Καζηρά
  chosen: Kazera
  alternatives:
  - Kazira
  - Gazera
  lexicon: LSJ
  rationale: Proper name transliterated conservatively from the Greek. Because these
    names are obscure and the Hebrew parallel is approximate and differently ordered,
    a source-near transliteration is preferable to conjectural harmonization.
- source_word: Ὀζείου
  chosen: Ozeiou
  alternatives:
  - Ozeiu
  - Ozeias
  lexicon: LSJ
  rationale: The genitive form is represented in English as a transliterated name
    rather than being normalized to a more familiar but less certain equivalent.
- source_word: Φινόε
  chosen: Phinoe
  alternatives:
  - Phine
  - Phinoe
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek; 'Ph' reflects phi in keeping
    with standard conventions.
- source_word: Ἀσαρά
  chosen: Asara
  alternatives:
  - Azara
  - Asarah
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek form.
- source_word: Βασθαί
  chosen: Basthai
  alternatives:
  - Basthae
  - Basthai
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek. The diphthong is represented
    with 'ai' to stay close to the source form.
- source_word: Ἀσσανά
  chosen: Assana
  alternatives:
  - Asana
  - Assanah
  lexicon: LSJ
  rationale: Proper name transliterated directly; doubled sigma is reflected as double
    s.
- source_word: Μανεί
  chosen: Manei
  alternatives:
  - Mani
  - Manei
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek ending without speculative
    normalization.
- source_word: Ναφεισεί
  chosen: Napheisei
  alternatives:
  - Naphisei
  - Naphesei
  lexicon: LSJ
  rationale: Proper name transliterated conservatively from the Greek sequence of
    vowels.
- source_word: Ἀκούφ
  chosen: Akouph
  alternatives:
  - Acuph
  - Akuph
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek. 'Akouph' preserves the Greek
    vowel sequence more transparently than a Hebraizing normalization.
- source_word: Ἀχειβά
  chosen: Acheiba
  alternatives:
  - Acheba
  - Akheiba
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek form.
- source_word: Ἀσούρ
  chosen: Asour
  alternatives:
  - Asur
  - Assur
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek rather than normalized to a
    potentially different traditional form.
- source_word: Φαρακέμ
  chosen: Pharakem
  alternatives:
  - Farakem
  - Pharachem
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek. 'Ph' preserves phi;
    'k' reflects kappa.
