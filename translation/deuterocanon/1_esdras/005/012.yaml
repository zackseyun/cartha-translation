lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  lexicon: LSJ
  rationale: In this census-style list, υἱοὶ introduces a family/clan descent formula.
    Adding the article in English makes the repeated list idiomatic while preserving
    the genealogical sense.
- source_word: Ἰωλάμου
  chosen: Iolamus
  alternatives:
  - Jolamus
  lexicon: LSJ
  rationale: This is a proper name transliterated directly from the Greek form. The
    initial iota is represented with I rather than J to stay close to the source-form
    transliteration.
- source_word: δύο
  chosen: two
  lexicon: LSJ
  rationale: Straightforward cardinal numeral.
- source_word: Ζατοῦ
  chosen: Zatou
  alternatives:
  - Zattu
  lexicon: LSJ
  rationale: The Greek witness is primary for 1 Esdras, so the name is transliterated
    from Greek as Ζατοῦ. The Hebrew/MT parallel supports that this corresponds to
    the family known as Zattu, which is preserved as an alternative in a footnote
    because English readers may recognize the MT-aligned form.
- source_word: ἐννακόσιοι ἑβδομήκοντα
  chosen: nine hundred seventy
  alternatives:
  - nine hundred and seventy
  lexicon: LSJ
  rationale: Rendered in contemporary English without 'and' for readability while
    preserving the exact number.
- source_word: Χορβέ
  chosen: Chorbe
  alternatives:
  - Hariph
  - Arah
  lexicon: LSJ
  rationale: The Greek text reads Χορβέ, so the main text follows the extant Greek
    witness. Because the source is flagged with major mismatch against the approximate
    MT parallel and this name does not align neatly with the nearby Hebrew list traditions,
    alternatives are preserved only in a footnote-level note of uncertainty rather
    than silently harmonizing to the MT.
- source_word: ἑπτακόσιοι πέντε
  chosen: seven hundred five
  alternatives:
  - seven hundred and five
  lexicon: LSJ
  rationale: Exact numeral rendered in plain modern English.
- source_word: Βανεί
  chosen: Banei
  alternatives:
  - Bani
  lexicon: LSJ
  rationale: The Greek form Βανεί is transliterated as Banei in the main text. The
    MT parallel has Bani, and because the parallel source is to be used as a real
    input, that more familiar Semitic form is preserved in a footnote rather than
    replacing the Greek-based rendering.
- source_word: ἑξακόσιοι τεσσεράκοντα ὀκτώ
  chosen: six hundred forty-eight
  alternatives:
  - six hundred and forty-eight
  lexicon: LSJ
  rationale: Exact numeral rendered in current English style.
