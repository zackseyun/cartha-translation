theological_decisions:
- issue: Rendering of ἱερόδουλοι in a temple personnel list
  chosen_reading: the temple slaves
  alternative_readings:
  - the temple servants
  - the sacred servants
  rationale: Although this verse is not doctrinally contested in the classic sense,
    the social status term matters. Following the project's guidance on δοῦλος-related
    bonded language, the rendering should not obscure servile status. Because ἱερόδουλοι
    are attached to sacred service, 'temple slaves' is the clearest balanced rendering.
  doctrine_reference: 'DOCTRINE.md: contested terms table on δοῦλος; Translation philosophy
    §1, §5'
- issue: Use of Greek list rather than MT parallel content
  chosen_reading: Translate the Greek census list as given
  alternative_readings:
  - Import the MT parallel about Levites and the sons of Jeshua and Kadmiel
  rationale: The MT parallel supplied is approximate and materially different from
    the Greek wording. Per project philosophy for 1 Esdras, the Greek remains primary,
    with the Hebrew used only as a sanity check rather than as replacement content.
  doctrine_reference: 'PHILOSOPHY.md: Deuterocanonical / Apocrypha; WLC MT parallels
    for 1 Esdras'
