translation:
  text: 'the sons of Tobeis, altogether one hundred thirty-nine. The temple slaves:
    the sons of Esau, the sons of Taseipha, the sons of Tabaoth, the sons of Keras,
    the sons of Soua, the sons of Phalaiou, the sons of Labana,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόδουλοι can also be rendered 'temple servants'; we use 'temple
      slaves' to preserve the bonded sense of the term.
    reason: lexical_alternative
  - marker: b
    text: The source text here is a list fragment ending with a comma; the next verse
      continues the roster of temple slaves.
    reason: cross_reference
  - marker: c
    text: The Hebrew parallel in Nehemiah 7:43 is not verbally parallel here; 1 Esdras
      presents a different section of the returnees list at this point.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the family of
  lexicon: LSJ
  rationale: In this census-style list, υἱοὶ functions as a standard genealogical/clan
    formula. 'The sons of' preserves the formal structure and matches the list format
    better than a more interpretive rendering.
- source_word: Τωβείς
  chosen: Tobeis
  alternatives:
  - Tobias
  - Tobies
  lexicon: LSJ
  rationale: This is a proper name and is therefore transliterated rather than translated.
    'Tobeis' stays close to the Greek form in Swete.
- source_word: πάντες
  chosen: altogether
  alternatives:
  - all
  - in all
  lexicon: LSJ
  rationale: '''Altogether'' idiomatically conveys the summative force in an English
    census list. ''In all'' would also work; ''altogether'' is slightly smoother here.'
- source_word: ἑκατὸν τριάκοντα ἐννέα
  chosen: one hundred thirty-nine
  alternatives:
  - a hundred and thirty-nine
  lexicon: LSJ
  rationale: Standard contemporary English number style, preserving the exact total.
- source_word: οἱ ἱερόδουλοι
  chosen: the temple slaves
  alternatives:
  - the temple servants
  - the sacred slaves
  lexicon: LSJ
  rationale: ἱερόδουλοι literally denotes persons attached in servile status to temple
    service. In keeping with the project's preference to render bonded terms plainly
    where salient, 'temple slaves' best preserves the social reality, while 'temple
    servants' would soften it.
- source_word: Ἠσαύ
  chosen: Esau
  alternatives:
  - Esav
  lexicon: LSJ
  rationale: Standard English transliteration of the proper name.
- source_word: Τασειφά
  chosen: Taseipha
  alternatives:
  - Tasepha
  - Tasephah
  lexicon: LSJ
  rationale: Transliteration kept close to the Greek spelling; the exact English form
    is uncertain because this is a rare proper name.
- source_word: Ταβαώθ
  chosen: Tabaoth
  alternatives:
  - Tabaoth
  - Tabaot
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek.
- source_word: Κηράς
  chosen: Keras
  alternatives:
  - Ceras
  - Keras
  lexicon: LSJ
  rationale: A direct transliteration from Greek kappa is preferred with 'K' for transparency
    to the source form.
- source_word: Σουά
  chosen: Soua
  alternatives:
  - Sua
  - Shua
  lexicon: LSJ
  rationale: The Greek spelling is represented directly as 'Soua.' 'Shua' would lean
    toward a Semitic reconstruction not explicit in the Greek witness.
- source_word: Φαλαίου
  chosen: Phalaiou
  alternatives:
  - Phalaiou
  - Phaleiou
  lexicon: LSJ
  rationale: The name is rare and uncertain; a close transliteration is the most auditable
    choice.
- source_word: Λαβανά
  chosen: Labana
  alternatives:
  - Labanah
  - Laban
  lexicon: LSJ
  rationale: The Greek form ends in -ά, so 'Labana' better reflects the source than
    collapsing it to the more familiar 'Laban'.
