theological_decisions:
- issue: Rendering of cultic location τὸ ἱερὸν τοῦ θεοῦ in an Ezra/temple-restoration
    context
  chosen_reading: the house of God
  alternative_readings:
  - the temple of God
  - the sanctuary of God
  rationale: The Greek term can denote the temple complex, but the broader restoration
    idiom in Ezra traditions often speaks of the 'house of God.' Using 'house' preserves
    intertextual resonance with the Semitic parallel tradition without forcing a narrower
    architectural sense.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - kinsmen
  - fellow Israelites
  rationale: Per doctrine, gender-accurate translation is preferred over flattening
    to a neutral collective. The text's masculine familial term is retained, while
    readers may infer the representative group sense from context.
  doctrine_reference: Translation philosophy §4
