translation:
  text: And in the second year, after they had come to the house of God in Jerusalem,
    in the second month, Zerubbabel son of Shealtiel and Jeshua son of Jozadak began,
    along with their brothers, the priests, the Levites, and all who had come from
    the captivity to Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of God' or 'the sanctuary of God.' The Greek term can refer
      to the sacred complex more broadly, but 'house of God' preserves the restoration-era
      idiom.
    reason: lexical_alternative
  - marker: b
    text: Or 'all who had returned from exile.' The Greek says more literally 'from
      the captivity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ δευτέρῳ ἔτει
  chosen: in the second year
  alternatives:
  - during the second year
  lexicon: BDAG
  rationale: A straightforward temporal dative; 'in the second year' is idiomatic
    and formally close.
- source_word: παραγενόμενοι
  chosen: after they had come
  alternatives:
  - having arrived
  - when they came
  lexicon: BDAG
  rationale: The participle marks prior action relative to ἤρξαντο. 'After they had
    come' makes the sequence explicit in natural English.
- source_word: τὸ ἱερὸν τοῦ θεοῦ
  chosen: the house of God
  alternatives:
  - the temple of God
  - the sanctuary of God
  lexicon: BDAG
  rationale: Although ἱερόν often means 'temple precincts,' in this restoration context
    and with the Semitic parallel of הֵיכַל/house-temple language in Ezra traditions,
    'house of God' preserves the broader cultic sense and matches common Ezra diction
    without over-specifying precincts.
- source_word: μηνὸς δευτέρου
  chosen: in the second month
  alternatives:
  - during the second month
  lexicon: BDAG
  rationale: Genitive of time; 'in the second month' is the natural English equivalent.
- source_word: ἤρξαντο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Simple narrative verb; 'began' is slightly more formal and suits the
    register.
- source_word: Ζοροβαβὲλ ὁ τοῦ Σαλαθιήλ
  chosen: Zerubbabel son of Shealtiel
  alternatives:
  - Zorobabel son of Salathiel
  lexicon: LSJ
  rationale: Standard English transliterations are preferred for well-known biblical
    names while preserving the patronymic sense with 'son of.'
- source_word: Ἰησοῦς ὁ τοῦ Ἰωσεδέκ
  chosen: Jeshua son of Jozadak
  alternatives:
  - Jesus son of Josedek
  - Joshua son of Jehozadak
  lexicon: LSJ
  rationale: In Ezra-context restoration narratives, the high priest is conventionally
    identified as Jeshua/Joshua son of Jozadak. 'Jeshua' best reflects the postexilic
    name form and avoids confusion with NT 'Jesus,' while remaining anchored to the
    Greek name form.
- source_word: οἱ ἀδελφοὶ αὐτῶν
  chosen: their brothers
  alternatives:
  - their kinsmen
  lexicon: BDAG
  rationale: ἀδελφοί is rendered gender-accurately as 'brothers' per project philosophy.
    The term may include a broader group, but the source uses the masculine familial
    term.
- source_word: οἱ ἱερεῖς οἱ Λευεῖται
  chosen: the priests, the Levites
  alternatives:
  - the priestly Levites
  lexicon: BDAG
  rationale: The Greek presents two coordinated groups, not a single compounded title.
    Rendering both separately preserves the syntax.
- source_word: πάντες οἱ παραγενόμενοι ἐκ τῆς αἰχμαλωσίας
  chosen: all who had come from the captivity
  alternatives:
  - all who had returned from exile
  - all who had come from the exile
  lexicon: BDAG
  rationale: αἰχμαλωσία is literally 'captivity.' 'Exile' is smoother English, but
    'captivity' preserves the concrete force of the Greek and the restoration setting.
    The perfective sense of the participle is reflected by 'had come.'
