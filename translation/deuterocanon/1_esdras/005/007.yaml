translation:
  text: Now these are the ones from Judea who came up from the captivity of the exile,
    whom Nebuchadnezzar king of Babylon had carried away to Babylon,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Ezra 2:1 reads 'the sons of the province' rather
      than 'the ones from Judea.' This draft follows the Greek text of 1 Esdras as
      the primary source.
    reason: alternative_reading
  - marker: b
    text: Or 'whom Nebuchadnezzar king of Babylon had deported to Babylon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσὶν δὲ οὗτοι
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: BDAG
  rationale: δὲ is lightly connective; 'Now' preserves the discourse transition in
    readable English without overstating contrast.
- source_word: οἱ ἐκ τῆς Ἰουδαίας
  chosen: the ones from Judea
  alternatives:
  - those from Judah
  - those from the province
  lexicon: BDAG
  rationale: The Greek explicitly names Ἰουδαία, best rendered 'Judea.' 'The ones
    from' is natural English for the substantival article-participle construction.
    The MT parallel has 'sons of the province,' but the Greek source text here is
    primary and differs.
- source_word: οἱ ἀναβάντες
  chosen: who came up
  alternatives:
  - who went up
  - who returned
  lexicon: BDAG
  rationale: ἀναβαίνω in return-to-land contexts is conventionally 'go up/came up.'
    Because the narration is retrospective and relative to the listed group, 'came
    up' reads naturally in English while preserving the ascent idiom.
- source_word: ἐκ τῆς αἰχμαλωσίας τῆς παροικίας
  chosen: from the captivity of the exile
  alternatives:
  - from the captivity of the deportation
  - from the captivity of the sojourning community
  lexicon: BDAG
  rationale: αἰχμαλωσία is 'captivity.' παροικία can denote sojourning/exile-dwelling;
    in this restoration context, 'exile' best captures the sense. The double genitive
    is preserved rather than flattened, since the Greek is somewhat formal and emphatic.
- source_word: οὓς μετῴκισεν
  chosen: whom ... had carried away
  alternatives:
  - whom ... had deported
  - whom ... had resettled
  lexicon: BDAG
  rationale: μετοικίζω can mean remove and resettle by deportation. 'Had carried away'
    is idiomatic biblical English and fits the following destination phrase 'to Babylon';
    'deported' is possible but slightly more technical.
- source_word: Ναβουχοδονοσὸρ
  chosen: Nebuchadnezzar
  alternatives:
  - Nabuchodonosor
  lexicon: LSJ
  rationale: Use the standard English transliteration of the Babylonian king's name
    rather than a more letter-for-letter Greek-form transliteration.
- source_word: βασιλεὺς Βαβυλῶνος
  chosen: king of Babylon
  alternatives:
  - the king of Babylon
  lexicon: BDAG
  rationale: Anarthrous in Greek but definite by sense; standard English expression
    is 'king of Babylon.'
- source_word: εἰς Βαβυλῶνα
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: BDAG
  rationale: Simple destination is intended; 'to Babylon' is the most natural rendering.
