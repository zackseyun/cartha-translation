translation:
  text: 'The number of those from the nation, and their leaders: the sons of Phoros,
    seventy-two thousand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Phoros.'' The parallel Hebrew-list tradition differs in both names
      and numbers at this point; the Greek text of 1 Esdras appears to preserve a
      divergent list form.'
    reason: alternative_reading
  - marker: b
    text: The Greek reads 'seventy-two thousand.' This unusually large figure differs
      sharply from the approximate MT parallel and may reflect a textual disturbance
      or a different list tradition.
    reason: textual_variant
lexical_decisions:
- source_word: ἀριθμὸς
  chosen: The number
  alternatives:
  - number
  - count
  - total
  lexicon: LSJ
  rationale: A straightforward census/list heading term. 'The number' preserves the
    formal sense and fits the list context.
- source_word: τῶν ἀπὸ τοῦ ἔθνους
  chosen: of those from the nation
  alternatives:
  - of those from the people
  - of those from the ethnic group
  lexicon: LSJ
  rationale: ἔθνος commonly means 'nation' or 'people.' Here it appears in a list-introduction
    formula. 'Those from the nation' stays close to the Greek while remaining intelligible.
    The phrase is somewhat awkward in English because the Greek itself is list-like
    and compressed.
- source_word: οἱ προηγούμενοι αὐτῶν
  chosen: their leaders
  alternatives:
  - those going before them
  - their chiefs
  - their leading men
  lexicon: LSJ
  rationale: The participle προηγούμενοι literally means 'those going before,' but
    in this administrative/genealogical context it denotes leaders or heads. 'Their
    leaders' gives the intended sense in natural English.
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: LSJ
  rationale: In genealogical and clan lists, 'sons of' is the standard formal rendering
    and may denote descendants or members of a family line. It is retained here for
    consistency with biblical list style.
- source_word: Φορὸς
  chosen: Phoros
  alternatives:
  - Pharez
  - Parosh
  lexicon: Greek proper name
  rationale: The Greek witness reads Φορὸς, which is best transliterated 'Phoros'
    from the primary source. The MT parallel points to a different name tradition
    (notably Arah in the cited parallel, while Ezra/Nehemiah list traditions elsewhere
    include Parosh), but the translation should remain anchored in the Greek text.
- source_word: ἑβδομήκοντα δύο χιλιάδες
  chosen: seventy-two thousand
  alternatives:
  - seventy-two thousand
  lexicon: LSJ
  rationale: This is the plain sense of the extant Greek text. Although the number
    is strikingly large for this context and diverges sharply from known parallel
    list traditions, the Greek source is the primary witness and should be translated
    as transmitted, with the discrepancy noted in a footnote.
