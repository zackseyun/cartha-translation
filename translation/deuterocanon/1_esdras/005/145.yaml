theological_decisions:
- issue: Rendering of familial language ἀδελφοί in a leadership/community context
  chosen_reading: brothers
  alternative_readings:
  - kinsmen
  - fellow Israelites
  rationale: The Greek explicitly uses the masculine familial term. Per doctrine,
    gender-accurate rendering is preferred unless context clearly demands a generic
    expansion. Here 'brothers' preserves the source wording and likely refers to male
    relatives/associates within priestly and family groupings.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Name form for Ἰησοῦς in postexilic context
  chosen_reading: Jeshua
  alternative_readings:
  - Joshua
  - Jesus
  rationale: Although the Greek spelling is identical to the NT name Jesus, the historical
    referent in this context is the high priest commonly known in English as Jeshua.
    This avoids anachronistic confusion while remaining faithful to the underlying
    name.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
