id: 1ES.5.145
reference: 1 Esdras 5:145
source:
  edition: lxx-swete-1909
  text: καὶ καταστὰς Ἰησοῦς ὁ τοῦ Ἰωσεδὲκ καὶ οἱ ἀδελφοὶ αὐτοῦ οἱ ἱερεῖς καὶ Ζοροβαβὲλ
    ὁ τοῦ Σαλαθιὴλ καὶ οἱ τούτου ἀδελφοὶ ἡτοίμασαν τὸ θυσιαστήριον τοῦ θεοῦ Ἰσραήλ,
  language: Greek
  pages: []
  confidence: high
translation:
  text: And Jeshua son of Josedec arose, with his brothers the priests, and Zerubbabel
    son of Salathiel, with his brothers, and they prepared the altar of the God of
    Israel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Σαλαθιήλ; the Hebrew-form name is often rendered 'Shealtiel.'
    reason: lexical_alternative
  - marker: b
    text: The name rendered 'Jeshua' is the same Greek form that can also be rendered
      'Joshua' or 'Jesus,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταστὰς
  chosen: arose
  alternatives:
  - stood up
  - having arisen
  - took his stand
  lexicon: LSJ
  rationale: Aorist participle of καθίστημι/καθίσταμαι in context introduces the leaders'
    decisive action. 'Arose' is idiomatic and concise in English, preserving the narrative
    movement without over-literal awkwardness.
- source_word: Ἰησοῦς
  chosen: Jeshua
  alternatives:
  - Joshua
  - Jesus
  lexicon: LSJ
  rationale: In this postexilic priestly context, the name corresponds to the Hebrew/Aramaic
    Jeshua rather than the later English form 'Jesus.' 'Joshua' is possible but 'Jeshua'
    better reflects the Second Temple-era name convention and distinguishes this figure
    from earlier Joshua son of Nun.
- source_word: ὁ τοῦ Ἰωσεδὲκ
  chosen: son of Josedec
  alternatives:
  - the son of Josedec
  - of Josedec
  lexicon: LSJ
  rationale: The Greek filial construction literally means 'the one of Josedec.' English
    normally expresses this as 'son of Josedec.'
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  chosen: his brothers
  alternatives:
  - his kinsmen
  - his brethren
  lexicon: LSJ
  rationale: ἀδελφοί is most naturally 'brothers.' In this context it may include
    fellow priestly relatives/associates, but the source uses the familial term, and
    the project's philosophy prefers gender-accurate rendering.
- source_word: οἱ ἱερεῖς
  chosen: the priests
  alternatives:
  - priests
  lexicon: LSJ
  rationale: Straightforward rendering of the appositional phrase identifying Jeshua's
    brothers.
- source_word: Ζοροβαβὲλ
  chosen: Zerubbabel
  alternatives:
  - Zorobabel
  lexicon: LSJ
  rationale: Standard English transliteration of the well-known postexilic leader's
    name.
- source_word: ὁ τοῦ Σαλαθιὴλ
  chosen: son of Salathiel
  alternatives:
  - the son of Salathiel
  - of Salathiel
  - son of Shealtiel
  lexicon: LSJ
  rationale: The Greek form is Σαλαθιήλ, best represented directly as 'Salathiel'
    from the Greek witness being translated. 'Shealtiel' reflects the Hebrew form
    and is a viable alternative, but the translation is anchored in the Greek text.
- source_word: ἡτοίμασαν
  chosen: prepared
  alternatives:
  - made ready
  - set up
  lexicon: LSJ
  rationale: The verb means 'prepared' or 'made ready.' 'Prepared' is the broadest
    and least interpretively loaded choice here; 'set up' would move closer to the
    likely practical action but goes beyond the lexical core.
- source_word: τὸ θυσιαστήριον
  chosen: the altar
  alternatives:
  - the sacrificial altar
  lexicon: LSJ
  rationale: Standard rendering for θυσιαστήριον. 'Sacrificial altar' is more explicit
    but unnecessary in context.
- source_word: τοῦ θεοῦ Ἰσραήλ
  chosen: of the God of Israel
  alternatives:
  - for the God of Israel
  lexicon: LSJ
  rationale: 'The genitive most naturally identifies possession/association: the altar
    belonging to or dedicated to the God of Israel. ''Of the God of Israel'' preserves
    the Greek structure cleanly.'
