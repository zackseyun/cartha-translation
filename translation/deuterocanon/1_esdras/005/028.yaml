translation:
  text: the gatekeepers, four hundred; the sons of Ishmael, sons of Lakubath, one
    thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text reads 'the sons of Ishmael, sons of Lakubath, one thousand.'
      The Hebrew parallel in Nehemiah 7 does not match this wording at this point,
      so the translation follows the Greek witness here rather than harmonizing to
      the Masoretic list.
    reason: textual_variant
  - marker: b
    text: Lakubath may reflect a name-form related to the better-known Akkub/Lakkub
      in parallel returnee lists.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ θυρωροί
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the porters
  lexicon: LSJ
  rationale: θυρωρός denotes one who keeps or guards a door or gate. In a temple/community
    census context, 'gatekeepers' is the clearest modern English rendering and fits
    the likely institutional role better than the more archaic 'porters' or the narrower
    'doorkeepers'.
- source_word: τετρακόσιοι
  chosen: four hundred
  lexicon: LSJ
  rationale: Straightforward cardinal numeral modifying the preceding group.
- source_word: οἱ Ἰσμαήλου
  chosen: the sons of Ishmael
  alternatives:
  - those of Ishmael
  lexicon: LSJ
  rationale: The Greek uses a genitival family designation, literally 'those of Ishmael.'
    In this census style, English commonly and clearly renders such patronymics as
    'the sons of Ishmael.' The proper name is transliterated rather than translated.
- source_word: υἱοὶ Λακουβάτου
  chosen: sons of Lakubath
  alternatives:
  - the sons of Lakub
  - sons of Akkub
  lexicon: LSJ
  rationale: υἱοί explicitly means 'sons.' The name in Swete's Greek is Λακουβάτου,
    best represented by transliteration as 'Lakubath.' Because the MT parallel for
    this verse points elsewhere and 1 Esdras often reorders or diverges from MT lists,
    the Greek name should control the main text. A more familiar form such as 'Akkub'
    may reflect harmonization to parallel lists rather than this witness.
- source_word: χίλιοι
  chosen: one thousand
  lexicon: LSJ
  rationale: Straightforward cardinal numeral attached to the immediately preceding
    family designation in the Greek text.
