translation:
  text: But the nations of the land, joining themselves to those in Judea and besieging
    them, hindered the building.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'joining themselves to' is difficult; the phrase may also suggest
      'pressing upon' or 'settling among' those in Judea. The sense in context is
      hostile involvement, clarified by 'besieging them.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says simply 'to build'; 'the house' is supplied from the surrounding
      temple-rebuilding context.
    reason: cross_reference
lexical_decisions:
- source_word: τὰ ... ἔθνη τῆς γῆς
  chosen: the nations of the land
  alternatives:
  - the peoples of the land
  - the Gentiles of the land
  lexicon: LSJ
  rationale: ἔθνη can mean nations/peoples/Gentiles. In this postexilic setting it
    refers to surrounding ethnic groups inhabiting the land. 'Nations of the land'
    preserves the plural ethnic-political sense without importing NT-style 'Gentiles'
    language.
- source_word: ἐπικοιμώμενα
  chosen: joining themselves to
  alternatives:
  - settling among
  - attaching themselves to
  - lying upon/pressing upon
  lexicon: LSJ
  rationale: The participle is unusual and contextually difficult. Given the following
    dative τοῖς ἐν τῇ Ἰουδαίᾳ and the MT parallel where local opponents approach and
    align themselves with the Judean situation, the sense is best taken as attaching
    oneself closely to or pressing in upon those in Judea. 'Joining themselves to'
    preserves the relational force while remaining intelligible. Because the context
    is hostile, the next participle clarifies that this was not friendly cooperation.
- source_word: τοῖς ἐν τῇ Ἰουδαίᾳ
  chosen: those in Judea
  alternatives:
  - the people in Judea
  - those who were in Judea
  lexicon: LSJ
  rationale: The phrase is substantival and broad. 'Those in Judea' is concise and
    faithful, avoiding over-specification while clearly referring to the Judean community.
- source_word: πολιορκοῦντες
  chosen: besieging them
  alternatives:
  - hemming them in
  - pressuring them
  - blockading them
  lexicon: LSJ
  rationale: πολιορκέω literally means to besiege. Even if used somewhat broadly for
    hostile pressure, 'besieging them' preserves the military metaphor and the severity
    of the opposition.
- source_word: εἶργον
  chosen: hindered
  alternatives:
  - prevented
  - kept back
  - obstructed
  lexicon: LSJ
  rationale: The imperfect conveys ongoing obstruction. 'Hindered' captures sustained
    interference without overstating total success; 'prevented' could imply complete
    stoppage more strongly than the Greek requires in isolation.
- source_word: τοῦ οἰκοδομεῖν
  chosen: the building of the house
  alternatives:
  - building
  - the work of building
  lexicon: LSJ
  rationale: The infinitive means 'to build,' but in context of Ezra/Esdras the object
    is the temple/house of God. The Greek here leaves the object implicit, but the
    broader context and Hebrew parallel justify making it explicit as 'the house'
    for clarity, echoing temple language without over-paraphrasing.
