translation:
  text: 'And they were not able to declare their families and lineage, whether they
    were from Israel: the sons of Asan son of the son of Baenan, the sons of Nekodan,
    six hundred fifty-two.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text names 'Asan ... Baenan' and 'Nekodan' here, while the approximate
      MT parallel in Nehemiah 7 lists different names at this point. Because 1 Esdras
      is translated from the Greek witness, the Greek names are retained in the main
      text.
    reason: alternative_reading
  - marker: b
    text: The phrase 'son of the son of Baenan' is awkward in English but reflects
      the Greek wording as transmitted; it may represent a compressed or irregular
      genealogical expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἠδύναντο
  chosen: were not able
  alternatives:
  - could not
  lexicon: BDAG
  rationale: A straightforward rendering of inability; 'were not able' preserves the
    verbal force without over-idiomatizing.
- source_word: ἀπαγγεῖλαι
  chosen: to declare
  alternatives:
  - to report
  - to state
  - to show
  lexicon: BDAG
  rationale: In this genealogical context the sense is to present or state one's ancestry.
    'Declare' fits the formal register of a census/genealogical list better than 'report'.
- source_word: τὰς πατριὰς
  chosen: their families
  alternatives:
  - their fathers' houses
  - their clans
  lexicon: LEH
  rationale: πατριά can denote a paternal family group or clan. 'Families' is readable
    modern English; 'fathers' houses' would be more literal but less natural here.
    The paired term γενεάς helps preserve the genealogical nuance.
- source_word: γενεάς
  chosen: lineage
  alternatives:
  - genealogies
  - descent
  - generations
  lexicon: BDAG
  rationale: Because πατριά already covers family grouping, 'lineage' differentiates
    γενεά in context as ancestral descent rather than simply 'generation'.
- source_word: ὡς ἐκ τοῦ Ἰσραὴλ εἰσίν
  chosen: whether they were from Israel
  alternatives:
  - that they were of Israel
  - that they belonged to Israel
  lexicon: BDAG
  rationale: The clause expresses inability to establish Israelite origin. 'Whether
    they were from Israel' communicates the evidential uncertainty implied by the
    larger sentence in natural English.
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - descendants of
  lexicon: LEH
  rationale: In list format, 'sons of' is the standard and transparent rendering,
    even when it can function more broadly for descendants.
- source_word: Ἀσὰν
  chosen: Asan
  alternatives:
  - Ason
  - Assan
  rationale: Personal names are transliterated from the Greek source. The MT parallel
    differs substantially in names, but the Greek remains primary for 1 Esdras.
- source_word: τοῦ υἱοῦ τοῦ Βαενάν
  chosen: son of the son of Baenan
  alternatives:
  - son of Benan
  - descended from Baenan
  lexicon: LEH
  rationale: The Greek text as given contains a doubled filial expression. Rather
    than smoothing it away, the translation preserves the wording transparently, since
    the source confidence is high and no integrity warning is present.
- source_word: Νεκωδάν
  chosen: Nekodan
  alternatives:
  - Necodan
  - Nekoda
  rationale: Transliterated directly from the Greek. The MT parallel has different
    names in this location, so the Greek form should stand in the main text.
- source_word: ἑξακόσιοι πεντήκοντα δύο
  chosen: six hundred fifty-two
  alternatives:
  - six hundred and fifty-two
  lexicon: LEH
  rationale: Modern English number style without 'and' improves readability while
    preserving the exact total.
