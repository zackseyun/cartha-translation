theological_decisions:
- issue: Scope of πᾶς Ἰσραήλ
  chosen_reading: 'Rendered as a covenant-community designation: ''all Israel'''
  alternative_readings:
  - every individual Israelite without exception
  rationale: The phrase conventionally names the restored people collectively. The
    verse lists groups settling in their respective places, so the expression is corporate
    rather than mathematically exhaustive.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
