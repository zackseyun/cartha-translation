translation:
  text: And the priests and the Levites and some of the people settled in Jerusalem
    and the surrounding region, and the temple singers and the gatekeepers, and all
    Israel in their villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those from the people.' The Greek phrase is literally 'those from his
      people,' likely distinguishing the non-priestly members of the community.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατῳκίσθησαν
  chosen: settled
  alternatives:
  - dwelt
  - were settled
  - took up residence
  lexicon: BDAG
  rationale: The aorist passive of κατοικίζω here denotes being established in residence.
    'Settled' is natural modern English and fits the resettlement context better than
    the more wooden 'were settled,' while still preserving the sense of taking up
    residence.
- source_word: οἱ ἱερεῖς
  chosen: the priests
  lexicon: BDAG
  rationale: Standard rendering of ἱερεῖς in cultic/Judean context.
- source_word: οἱ Λευεῖται
  chosen: the Levites
  lexicon: BDAG
  rationale: Conventional and precise rendering for the Levitical group.
- source_word: οἱ ἐκ τοῦ λαοῦ αὐτοῦ
  chosen: some of the people
  alternatives:
  - those from his people
  - those of the people
  - the rest of the people
  lexicon: BDAG
  rationale: Literally 'those from his people.' In context this distinguishes non-priestly,
    non-Levitical members of the community. 'Some of the people' communicates that
    subgroup idiomatically without overreading a technical category. The possessive
    αὐτοῦ is awkward in English and likely refers back to the people/community rather
    than an individual; it is not pressed in the translation.
- source_word: ἐν Ἰερουσαλὴμ καὶ τῇ χώρᾳ
  chosen: in Jerusalem and the surrounding region
  alternatives:
  - in Jerusalem and the country
  - in Jerusalem and the land
  - in Jerusalem and the district
  lexicon: BDAG
  rationale: χώρα can mean country, land, or region. Since Jerusalem is contrasted
    with its wider area, 'the surrounding region' best conveys the local geographic
    sense in readable English.
- source_word: οἵ τε ἱεροψάλται
  chosen: the temple singers
  alternatives:
  - the sacred singers
  - the singers
  lexicon: LSJ
  rationale: ἱεροψάλται is more specific than generic 'singers'; it denotes cultic/temple
    singers. 'Temple singers' makes that function explicit in contemporary English.
- source_word: οἱ θυρωροὶ
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the porters
  lexicon: BDAG
  rationale: In temple/community administrative context, 'gatekeepers' is the clearest
    and most established rendering.
- source_word: πᾶς Ἰσραήλ
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: BDAG
  rationale: Standard rendering. In this postexilic context it refers to the covenant
    people as a whole, not necessarily every individual without exception.
- source_word: ἐν ταῖς κώμαις αὐτῶν
  chosen: in their villages
  alternatives:
  - in their towns
  - in their settlements
  lexicon: BDAG
  rationale: κώμη commonly denotes a village or smaller settlement. 'Villages' preserves
    the likely scale better than 'towns.'
