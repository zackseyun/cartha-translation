translation:
  text: the sons of Akoud, the sons of Outa, the sons of Ketab, the sons of Akkaba,
    the sons of Sybaei, the sons of Anan, the sons of Koua, the sons of Keddour,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel at Nehemiah 7:45 has a different list of gatekeeper
      families (including Shallum, Ater, Talmon, Akkub, Hatita, and Shobai). 1 Esdras
      here preserves a divergent Greek list, so the translation follows the Greek
      rather than harmonizing to the Hebrew.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: LSJ
  rationale: In this genealogical/list context, υἱοὶ is the standard formula for a
    family or clan grouping. 'The sons of' preserves the repeated Greek structure
    more transparently than the more interpretive 'descendants of.'
- source_word: Ἀκούδ
  chosen: Akoud
  alternatives:
  - Akkoud
  - Accud
  lexicon: LSJ
  rationale: This is a proper name transliterated directly from the Greek witness.
    'Akoud' follows a straightforward transliteration of the Swete form without importing
    a more familiar Anglicized spelling from other traditions.
- source_word: Οὐτά
  chosen: Outa
  alternatives:
  - Uta
  lexicon: LSJ
  rationale: Proper name transliterated from Greek. 'Outa' preserves the initial omicron-upsilon
    sequence more transparently than collapsing it to 'Uta.'
- source_word: Κητάβ
  chosen: Ketab
  alternatives:
  - Ketav
  - Chetab
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek form as transmitted here. Because
    the MT parallel lists different gatekeeper names, the Greek name should be represented
    as-is rather than harmonized to the Hebrew parallel.
- source_word: Ἀκκαβά
  chosen: Akkaba
  alternatives:
  - Akkabah
  - Accaba
  lexicon: LSJ
  rationale: Proper name transliterated directly from Greek, preserving the doubled
    kappa sound.
- source_word: Συβαεί
  chosen: Sybaei
  alternatives:
  - Subai
  - Sybai
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek ending -εί. The form is kept
    close to the Greek witness rather than normalized to a Hebrew-parallel spelling.
- source_word: Ἀνάν
  chosen: Anan
  lexicon: LSJ
  rationale: Proper name transliterated directly and simply from the Greek.
- source_word: Κουά
  chosen: Koua
  alternatives:
  - Kua
  - Cua
  lexicon: LSJ
  rationale: Proper name transliterated from Greek; 'Koua' preserves the ου vowel
    sequence more explicitly.
- source_word: Κεδδούρ
  chosen: Keddour
  alternatives:
  - Kedour
  - Keddur
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek form, preserving the doubled
    delta and ου vowel sequence as represented in the source.
