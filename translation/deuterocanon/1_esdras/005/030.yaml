theological_decisions:
- issue: Relationship between the Greek list and the approximate MT parallel in Nehemiah
    7:45
  chosen_reading: Translate the Greek list of names as given, without harmonizing
    it to the Hebrew gatekeeper list.
  alternative_readings:
  - Conform some names to the MT parallel forms such as Akkub, Hatita, and Shobai
  rationale: The project philosophy gives primacy to the original-language source
    for this book, which here is the Greek text of 1 Esdras. The MT parallel is explicitly
    approximate and differs in names and structure, so it serves as a control but
    not as the base text for reconstruction.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
