theological_decisions:
- issue: Subject and agency in the final clause
  chosen_reading: The final passive clause refers to the temple builders being stopped
    from building for two years.
  alternative_readings:
  - The opponents caused the building itself to be suspended for two years.
  rationale: The Greek passive εἰρχθησαν naturally takes a personal subject ('they
    were restrained/stopped'), and the broader context concerns opponents obstructing
    the Judean rebuilding effort. This is a narrative-historical decision rather than
    a doctrinal one, but it materially affects the English rendering.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    significant ambiguities.
