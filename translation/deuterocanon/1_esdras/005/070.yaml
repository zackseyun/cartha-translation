translation:
  text: And by plots and by stirring up the crowds and by forming factions, they hindered
    the building from being completed all the time of the life of King Cyrus; and
    they were stopped from building for two years, until the reign of Darius.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'throughout the lifetime of King Cyrus.' The Greek phrase is literally
      'all the time of the life of King Cyrus.'
    reason: lexical_alternative
  - marker: b
    text: 'The final clause may also be understood more impersonally: ''the building
      was stopped for two years, until the reign of Darius.'''
    reason: alternative_reading
lexical_decisions:
- source_word: βουλάς
  chosen: plots
  alternatives:
  - plans
  - schemes
  - counsels
  lexicon: LSJ
  rationale: In this hostile context, the plural noun points to adversarial designs
    rather than neutral 'plans' or formal 'counsels.' 'Plots' best conveys obstructive
    intent in natural English.
- source_word: δημαγωγοῦντες
  chosen: stirring up the crowds
  alternatives:
  - agitating the people
  - influencing the populace
  - demagoguing
  lexicon: LSJ
  rationale: The participle denotes swaying or inciting the populace. 'Stirring up
    the crowds' is idiomatic modern English and preserves the negative public-agitation
    sense without using the opaque loanword 'demagoguing.'
- source_word: συστάσεις ποιούμενοι
  chosen: forming factions
  alternatives:
  - making combinations
  - causing disturbances
  - organizing opposition
  lexicon: LSJ
  rationale: The phrase suggests organized alignments or combinations against the
    work. 'Forming factions' captures the sense of coordinated opposition better than
    the more wooden 'making combinations.'
- source_word: ἀπεκώλυσαν
  chosen: they hindered
  alternatives:
  - they prevented
  - they obstructed
  lexicon: LSJ
  rationale: The verb indicates active obstruction. 'Hindered' fits well with the
    following infinitive construction 'from being completed' and avoids overstating
    the result as absolute prevention.
- source_word: τοῦ ἀποτελεσθῆναι
  chosen: from being completed
  alternatives:
  - from being finished
  - from being brought to completion
  lexicon: LSJ
  rationale: The aorist passive infinitive focuses on the building's completion. 'From
    being completed' is concise and preserves the passive/resultative sense.
- source_word: οἰκοδομήν
  chosen: the building
  alternatives:
  - the construction
  - the structure
  lexicon: LSJ
  rationale: The noun can denote the act or project of building. Here it refers to
    the temple-building project. 'The building' is natural and sufficiently broad,
    while the context already identifies it as the rebuilding effort.
- source_word: πάντα τὸν χρόνον τῆς ζωῆς τοῦ βασιλέως Κύρου
  chosen: all the time of the life of King Cyrus
  alternatives:
  - throughout the lifetime of King Cyrus
  - all the days of King Cyrus
  lexicon: LSJ
  rationale: This phrase is somewhat awkward in English if rendered too literally,
    but it clearly means the whole duration of Cyrus's life/reign as relevant to the
    narrative. The chosen wording stays close to the Greek while remaining readable.
- source_word: εἰρχθησαν τῆς οἰκοδομῆς
  chosen: they were stopped from building
  alternatives:
  - they were restrained from the building
  - they were hindered in the building
  lexicon: LSJ
  rationale: The passive indicates that the builders came under restraint with respect
    to the work. 'They were stopped from building' expresses the effect clearly in
    English.
- source_word: ἔτη δύο
  chosen: for two years
  alternatives:
  - two years
  lexicon: LSJ
  rationale: English idiom prefers 'for two years' with the passive verbal idea 'were
    stopped.'
- source_word: ἕως τῆς Δαρείου βασιλείας
  chosen: until the reign of Darius
  alternatives:
  - until the kingship of Darius
  - up to the reign of Darius
  lexicon: LSJ
  rationale: A straightforward temporal marker. 'Reign' is the natural English equivalent
    for βασιλεία in this context.
