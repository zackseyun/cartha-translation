translation:
  text: After these things, the heads of ancestral houses, according to their tribes,
    were chosen to go up, along with their wives and their sons and daughters, and
    their male servants and female servants, and their livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their servants ... and their maidservants.' The Greek terms can denote
      household slaves or servants; here 'male servants' and 'female servants' are
      used to reflect the paired masculine and feminine forms without overstating
      legal status from this verse alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: LSJ
  rationale: A straightforward temporal transition. 'After these things' preserves
    the plural demonstrative and the narrative linkage without sounding overly wooden.
- source_word: ἐξελέγησαν
  chosen: were chosen
  alternatives:
  - were selected
  - were appointed
  lexicon: LSJ
  rationale: The passive of ἐκλέγω naturally means 'were chosen/selected.' 'Were chosen'
    is the most direct and idiomatic rendering and avoids implying a formal office
    beyond the text.
- source_word: ἀναβῆναι
  chosen: to go up
  alternatives:
  - to ascend
  - to go up to Jerusalem
  lexicon: LSJ
  rationale: The infinitive literally means 'to go up/ascend.' 'To go up' preserves
    the conventional biblical idiom for traveling up to the land/city without importing
    'Jerusalem,' which is not stated in this verse.
- source_word: ἀρχηγοὶ οἴκου πατριῶν
  chosen: the heads of ancestral houses
  alternatives:
  - leaders of family houses
  - chiefs of fathers' houses
  - heads of paternal households
  lexicon: LSJ
  rationale: ἀρχηγοί denotes leaders/heads, and οἶκος πατριῶν refers to clan-based
    ancestral households. 'Heads of ancestral houses' is both readable and close to
    the social structure implied by the Greek.
- source_word: κατὰ φυλὰς αὐτῶν
  chosen: according to their tribes
  alternatives:
  - by their tribes
  - tribe by tribe
  lexicon: LSJ
  rationale: κατά with the accusative here marks distribution or classification. 'According
    to their tribes' preserves the organizational sense.
- source_word: αἱ γυναῖκες αὐτῶν
  chosen: their wives
  alternatives:
  - their women
  lexicon: LSJ
  rationale: In this household list, γυναῖκες most naturally means 'wives,' not women
    in general.
- source_word: οἱ υἱοὶ καὶ αἱ θυγατέρες
  chosen: their sons and daughters
  alternatives:
  - their children
  lexicon: LSJ
  rationale: The Greek specifies sons and daughters separately; the translation preserves
    that gender-specific wording rather than collapsing it into 'children.'
- source_word: οἱ παῖδες αὐτῶν
  chosen: their male servants
  alternatives:
  - their children
  - their servants
  - their boys
  lexicon: LSJ
  rationale: Because sons and daughters have already been listed, παῖδες here is best
    taken as household servants/slaves rather than children. Rendering it 'male servants'
    distinguishes it from the following feminine παιδίσκαι and preserves the household
    inventory structure.
- source_word: αἱ παιδίσκαι
  chosen: female servants
  alternatives:
  - maidservants
  - slave girls
  lexicon: LSJ
  rationale: The feminine counterpart to παῖδες in this context refers to female household
    servants/slaves. 'Female servants' is clear modern English and pairs naturally
    with 'male servants.'
- source_word: τὰ κτήνη αὐτῶν
  chosen: their livestock
  alternatives:
  - their cattle
  - their possessions
  lexicon: LSJ
  rationale: κτήνη commonly denotes domesticated animals/beasts of burden or livestock.
    'Livestock' best fits the migration list and avoids the narrower 'cattle' or the
    overly broad 'possessions.'
