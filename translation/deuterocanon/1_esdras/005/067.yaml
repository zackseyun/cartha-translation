translation:
  text: Then Zerubbabel and Jeshua and the heads of the fathers’ houses of Israel
    said to them, “It is not for you to build the house for the Lord our God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Ἰησοῦς here refers to the postexilic high priest usually called Jeshua;
      alternatively, 'Joshua.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple'; literally, 'the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - told them
  lexicon: BDAG
  rationale: Standard narrative speech formula; 'said to them' is the most direct
    and transparent rendering.
- source_word: Ζοροβαβὲλ
  chosen: Zerubbabel
  alternatives:
  - Zorobabel
  rationale: Standard English transliteration of the well-known postexilic leader's
    name; aligns with the Hebrew parallel tradition.
- source_word: Ἰησοῦς
  chosen: Jeshua
  alternatives:
  - Joshua
  - Jesus
  rationale: In this Ezra/1 Esdras context the referent is the high priest Jeshua
    of the postexilic period. Although the Greek form is Ἰησοῦς, the Hebrew/Aramaic
    parallel supports 'Jeshua' rather than the potentially misleading 'Jesus' or the
    less context-specific 'Joshua'.
- source_word: οἱ ἡγούμενοι
  chosen: the heads
  alternatives:
  - the leaders
  - those leading
  lexicon: BDAG
  rationale: The participial noun denotes those in leadership. 'Heads' fits the following
    genitive phrase and reflects the idiom of family/clan leadership in the parallel
    Hebrew context.
- source_word: τῶν πατριῶν
  chosen: of the fathers’ houses
  alternatives:
  - of the families
  - of the ancestral houses
  lexicon: LSJ
  rationale: This phrase refers to paternal households/clans. 'Fathers’ houses' preserves
    the social structure more precisely than the flatter 'families,' while remaining
    understandable in context.
- source_word: Οὐχ ὑμῖν
  chosen: It is not for you
  alternatives:
  - Not for you
  - You have no part
  lexicon: BDAG
  rationale: The Greek is elliptical. English requires a fuller idiom. 'It is not
    for you' preserves the exclusion without importing the fuller wording of Ezra
    4:3 ('you have nothing to do with us').
- source_word: τοῦ οἰκοδομῆσαι
  chosen: to build
  alternatives:
  - to rebuild
  - for building
  lexicon: BDAG
  rationale: The infinitive expresses the action denied to the addressees. 'To build'
    is the straightforward rendering; 'rebuild' is possible contextually but not explicit
    in this clause.
- source_word: τὸν οἶκον
  chosen: the house
  alternatives:
  - the temple
  lexicon: BDAG
  rationale: Literally 'the house.' In context it refers to the temple, but 'house'
    preserves the source wording and the biblical idiom 'house of the Lord.'
- source_word: Κυρίῳ θεῷ ἡμῶν
  chosen: for the Lord our God
  alternatives:
  - to the Lord our God
  - for our Lord God
  lexicon: BDAG
  rationale: With οἰκοδομέω and the dative, 'build ... for' is natural English. 'Lord'
    follows the project's default rendering for κύριος, and the phrase matches the
    covenantal sense also reflected in the Hebrew parallel.
