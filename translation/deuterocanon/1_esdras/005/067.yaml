theological_decisions:
- issue: Rendering of κύριος in a temple-building context with Hebrew parallel to
    YHWH
  chosen_reading: Lord
  alternative_readings:
  - LORD
  rationale: The Greek source text has Κυρίῳ, and project policy defaults κύριος to
    'Lord.' Because the MT parallel refers to YHWH, 'LORD' is a possible contextual
    alternative, but in deuterocanonical Greek translation we follow the Greek wording
    while noting the covenantal background in rationale rather than altering the main
    text.
