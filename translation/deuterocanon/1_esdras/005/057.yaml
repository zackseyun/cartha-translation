translation:
  text: And the priests stood arrayed with musicians and trumpets, and the Levites,
    the sons of Asaph, holding the cymbals, praising the Lord and blessing him according
    to David king of Israel;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with musical instruments and trumpets.' The Greek μουσικῶν can be understood
      more generally as musical accompaniment or instruments.
    reason: lexical_alternative
  - marker: b
    text: Or 'as prescribed by David king of Israel' or 'in the manner of David king
      of Israel.' The Greek leaves the exact force of conformity open.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔστησαν
  chosen: stood
  alternatives:
  - took their stand
  - were stationed
  lexicon: BDAG
  rationale: The aorist of ἵστημι here describes taking/holding a ceremonial position.
    'Stood' is concise and natural, while still preserving the formal scene.
- source_word: ἐστολισμένοι
  chosen: arrayed
  alternatives:
  - vested
  - adorned
  - robed
  lexicon: LSJ
  rationale: The participle indicates being dressed out for ceremonial service. 'Arrayed'
    captures formal adornment without over-specifying priestly vestments not explicit
    in the Greek.
- source_word: μετὰ μουσικῶν καὶ σαλπίγγων
  chosen: with musicians and trumpets
  alternatives:
  - with musical instruments and trumpets
  - with music and trumpets
  lexicon: LSJ
  rationale: μουσικῶν can denote musical performers or musical accompaniment. Given
    the parallel mention of cymbals and the ceremonial context, 'musicians' is a defensible,
    natural rendering of the Greek wording as transmitted in Swete, while preserving
    the distinction from the separate trumpets.
- source_word: Λευεῖται υἱοὶ Ἀσὰφ
  chosen: the Levites, the sons of Asaph
  alternatives:
  - the Levites, sons of Asaph
  - the Levitical sons of Asaph
  lexicon: LSJ
  rationale: This keeps both the tribal/cultic designation and the guild/family identification.
    The appositional comma reflects the Greek sequence clearly in English.
- source_word: ἔχοντες τὰ κύμβαλα
  chosen: had the cymbals
  alternatives:
  - holding the cymbals
  - with the cymbals
  lexicon: LSJ
  rationale: A straightforward rendering of the participle that reads idiomatically
    in English while preserving possession/use of the instruments.
- source_word: ὑμνοῦντες
  chosen: praising
  alternatives:
  - singing praise
  - hymning
  lexicon: BDAG
  rationale: The participle denotes offering praise in song. 'Praising' is idiomatic
    and accessible; 'hymning' would be overly wooden.
- source_word: τῷ κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows project default for κύριος. In this LXX cultic context it refers
    to Israel's God; 'the Lord' is the standard covenantal rendering.
- source_word: εὐλογοῦντες
  chosen: blessing him
  alternatives:
  - giving thanks to him
  - speaking blessing
  lexicon: BDAG
  rationale: The verb commonly means 'bless' or 'speak well of.' Because the object
    is implicit in Greek but clearly refers back to the Lord, 'him' is supplied for
    intelligibility in English.
- source_word: κατὰ Δαυεὶδ βασιλέα τοῦ Ἰσραήλ
  chosen: according to David king of Israel
  alternatives:
  - as prescribed by David king of Israel
  - in the manner of David king of Israel
  lexicon: LSJ
  rationale: κατά here signals conformity to Davidic pattern or ordinance. 'According
    to' preserves the ambiguity between precedent, prescription, and manner, without
    importing a stronger legal nuance than the Greek requires.
