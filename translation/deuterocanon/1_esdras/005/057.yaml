theological_decisions:
- issue: Rendering κύριος in a deuterocanonical LXX cultic context
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The project default renders κύριος as 'Lord.' In this sentence the article
    is present and the referent is Israel's God in temple worship, so 'the Lord' is
    appropriate and readable.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of κατὰ Δαυεὶδ βασιλέα τοῦ Ἰσραήλ
  chosen_reading: according to David king of Israel
  alternative_readings:
  - as prescribed by David king of Israel
  - in the manner of David king of Israel
  rationale: The phrase invokes Davidic precedent for liturgical praise. The translation
    preserves that appeal without resolving whether the emphasis is formal prescription
    or customary pattern.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
