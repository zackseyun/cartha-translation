translation:
  text: and from the tribe of Judah, who spoke wise words to Darius king of the Persians
    in the second year of his reign, in the month Nisan, the first month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the presence of Darius' or 'to Darius'; the Greek phrase ἐπὶ Δαρείου
      can be understood in slightly different but closely related ways in this court
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλῆς
  chosen: tribe
  alternatives:
  - clan
  lexicon: LSJ
  rationale: φυλή commonly denotes a tribal division or people-group. In this genealogical/ethnic
    context, 'tribe' is the most natural and standard rendering.
- source_word: Ἰούδα
  chosen: Judah
  alternatives:
  - Juda
  lexicon: LSJ
  rationale: As a personal/tribal name, it is transliterated by standard English convention
    as 'Judah'.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  - addressed
  lexicon: LSJ
  rationale: A straightforward past-tense rendering of λαλέω. 'Spoke' preserves the
    verbal action without overinterpreting the setting.
- source_word: ἐπὶ Δαρείου
  chosen: before Darius
  alternatives:
  - to Darius
  - in the presence of Darius
  - concerning Darius
  lexicon: LSJ
  rationale: With ἐπί plus genitive in this court setting, the sense is best taken
    as speaking in the presence of or before the king. 'Before Darius' is idiomatic
    and fits the narrative context.
- source_word: λόγους σοφούς
  chosen: wise words
  alternatives:
  - wise sayings
  - words of wisdom
  lexicon: LSJ
  rationale: The phrase is literal and clear in English. 'Wise words' preserves both
    the plural λόγους and the qualitative adjective σοφούς.
- source_word: δευτέρῳ ἔτει τῆς βασιλείας αὐτοῦ
  chosen: in the second year of his reign
  alternatives:
  - during the second year of his kingship
  lexicon: LSJ
  rationale: A standard temporal expression. 'Reign' is the natural English equivalent
    for βασιλεία in this context.
- source_word: μηνὶ Νισάν
  chosen: in the month Nisan
  alternatives:
  - in Nisan
  lexicon: LSJ
  rationale: The Greek explicitly includes 'month,' so the translation keeps it for
    transparency while remaining readable.
- source_word: τοῦ πρώτου μηνός
  chosen: the first month
  alternatives:
  - of the first month
  lexicon: LSJ
  rationale: This appositional phrase identifies Nisan as the first month. Rendering
    it as 'the first month' preserves the explanatory force.
