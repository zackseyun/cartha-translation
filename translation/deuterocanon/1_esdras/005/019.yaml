translation:
  text: those from Kartatheireios, twenty-five; those from Peiras and Berog, seven
    hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel tradition differs here, reading approximately 'the men
      of Netophah, fifty-six.' 1 Esdras appears to preserve a divergent Greek list
      form rather than this Hebrew wording.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ ἐκ
  chosen: those from
  alternatives:
  - the men from
  - the people from
  lexicon: LSJ
  rationale: The phrase is an elliptical list formula meaning the members originating
    from a place. 'Those from' is natural English and preserves the census/list style
    without adding 'men' where the Greek does not explicitly state it in this clause.
- source_word: Καρταθειαρειός
  chosen: Kartatheireios
  alternatives:
  - Cartatheireios
  - Karta-theiareios
  lexicon: LSJ
  rationale: This is a proper place name in a difficult Greek form. Following project
    policy, names are transliterated rather than translated. The source confidence
    is high, but validation notes a major mismatch with the MT parallel, so a conservative
    transliteration best preserves the Greek witness without forcing identification
    with the Hebrew Netophah.
- source_word: εἴκοσι πέντε
  chosen: twenty-five
  lexicon: LSJ
  rationale: Straightforward cardinal number.
- source_word: Πείρας
  chosen: Peiras
  alternatives:
  - Piras
  - Pera
  lexicon: LSJ
  rationale: Proper name/place name transliterated directly from the Greek. Because
    the verse is a list of returnees by locality, preserving the Greek form is preferable
    to speculative harmonization with Hebrew parallels.
- source_word: Βηρόγ
  chosen: Berog
  alternatives:
  - Berogg
  - Berogh
  lexicon: LSJ
  rationale: Proper name/place name transliterated from the Greek. The final gamma
    is represented with a simple 'g' in English transliteration.
- source_word: ἑπτακόσιοι
  chosen: seven hundred
  lexicon: LSJ
  rationale: Straightforward cardinal number.
