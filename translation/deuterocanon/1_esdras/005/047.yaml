translation:
  text: Then Jeshua son of Jozadak arose, along with his brothers the priests, and
    Zerubbabel son of Shealtiel and his brothers, and they prepared the altar of the
    God of Israel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Ἰησοῦς here refers to Jeshua, the postexilic high-priestly figure,
      not to Jesus of Nazareth. The Hebrew parallel tradition supports the form Jeshua/Joshua.
    reason: cross_reference
  - marker: b
    text: Or 'stood up' / 'having arisen.' The Greek participle marks the beginning
      of decisive action.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταστὰς
  chosen: arose
  alternatives:
  - stood up
  - having arisen
  - took his stand
  lexicon: LSJ
  rationale: Aorist participle of καθίστημι/related form used idiomatically for rising
    or taking action. 'Arose' is natural English and preserves the narrative sense
    of initiating action better than the more wooden 'having arisen.'
- source_word: Ἰησοῦς
  chosen: Jeshua
  alternatives:
  - Joshua
  - Jesus
  lexicon: LSJ
  rationale: In this postexilic priestly context, the name corresponds to Hebrew/Aramaic
    Jeshua (cf. Jozadak connection and Ezra-Nehemiah parallels), not the later English
    form 'Jesus.' 'Joshua' is possible but 'Jeshua' better reflects the Second Temple-era
    name form.
- source_word: ὁ τοῦ Ἰωσεδὲκ
  chosen: son of Jozadak
  alternatives:
  - the son of Josedek
  lexicon: LSJ
  rationale: The genitival patronymic is most naturally rendered 'son of.' 'Jozadak'
    follows standard English biblical transliteration aligned with the Hebrew parallel
    tradition.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: LSJ
  rationale: ἀδελφοί is literally 'brothers.' In this priestly/familial context there
    is no need to generalize to 'kinsmen.' This follows the project's gender-accurate
    policy.
- source_word: οἱ ἱερεῖς
  chosen: the priests
  lexicon: LSJ
  rationale: Straightforward cultic title; retained explicitly rather than absorbed
    into apposition so the structure of the Greek remains visible.
- source_word: Ζοροβαβὲλ
  chosen: Zerubbabel
  alternatives:
  - Zorobabel
  lexicon: LSJ
  rationale: Standard English transliteration of the postexilic governor's name.
- source_word: ὁ τοῦ Σαλαθιὴλ
  chosen: son of Shealtiel
  alternatives:
  - the son of Salathiel
  lexicon: LSJ
  rationale: Patronymic rendered idiomatically as 'son of'; 'Shealtiel' reflects the
    familiar Semitic name form and matches the Hebrew parallel tradition.
- source_word: ἡτοίμασαν
  chosen: prepared
  alternatives:
  - made ready
  - set up
  lexicon: LSJ
  rationale: The verb means 'prepare, make ready.' 'Prepared' is the most direct rendering.
    'Set up' would over-specify physical erection, which the Greek does not explicitly
    state here.
- source_word: τὸ θυσιαστήριον
  chosen: the altar
  alternatives:
  - the sacrificial altar
  lexicon: LSJ
  rationale: Standard rendering for θυσιαστήριον. 'Altar' is sufficient in context
    without adding 'sacrificial,' though that nuance is inherent.
- source_word: τοῦ θεοῦ Ἰσραήλ
  chosen: of the God of Israel
  alternatives:
  - for the God of Israel
  lexicon: LSJ
  rationale: 'The genitive is best taken as possession/association: the altar belonging
    to or dedicated to the God of Israel. ''Of the God of Israel'' is the most transparent
    rendering.'
