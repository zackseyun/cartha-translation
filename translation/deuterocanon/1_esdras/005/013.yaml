lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  lexicon: LSJ
  rationale: In this census-style list, υἱοὶ introduces a family/clan grouping descended
    from or identified with the named ancestor. 'The sons of' is a natural English
    rendering that preserves the genealogical/list formula.
- source_word: Βηβαί
  chosen: Bebai
  alternatives:
  - Bebaii
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek form Βηβαί according to standard
    English convention for biblical names.
- source_word: ἑξακόσιοι τριάκοντα τρεῖς
  chosen: six hundred thirty-three
  alternatives:
  - six hundred and thirty-three
  lexicon: LSJ
  rationale: Cardinal number rendered in clear modern English without archaic conjunctions,
    matching the project's readability standard.
- source_word: Ἀργαί
  chosen: Argai
  alternatives:
  - Arai
  - Azgad
  lexicon: LSJ
  rationale: The primary source text reads Ἀργαί, so the main translation follows
    the Greek witness directly. 'Arai' reflects a possible alternate Greek/English
    name tradition, while 'Azgad' reflects the approximate MT parallel in Ezra/Nehemiah-type
    lists; because 1 Esdras often reorders or reshapes its source material, the Greek
    remains primary here.
- source_word: χίλιοι τριακόσιοι εἴκοσι δύο
  chosen: one thousand three hundred twenty-two
  alternatives:
  - one thousand three hundred and twenty-two
  lexicon: LSJ
  rationale: Cardinal number rendered in contemporary English style. The number is
    taken directly from the Greek text, even though the MT parallel differs substantially.
