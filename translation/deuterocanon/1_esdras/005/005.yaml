translation:
  text: 'The priests, the sons of Phinehas, the sons of Aaron: Jeshua son of Jozadak
    son of Seraiah, and Joakim son of Zerubbabel son of Shealtiel, from the house
    of David, from the family line of Perez,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'sons of' can denote descendants in genealogical lists, not only immediate
      sons.
    reason: lexical_alternative
  - marker: b
    text: Greek Ἰησοῦς could be represented as 'Joshua' or, in other contexts, 'Jesus';
      here 'Jeshua' best matches the postexilic priestly figure intended.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἱερεῖς
  chosen: The priests
  alternatives:
  - the priestly men
  - the priesthood
  lexicon: BDAG
  rationale: Straightforward plural noun with article; rendered as a nominative heading
    introducing the named priestly figures.
- source_word: υἱοὶ Φινεὲς υἱοὶ Ἀαρών
  chosen: the sons of Phinehas, the sons of Aaron
  alternatives:
  - descendants of Phinehas, descendants of Aaron
  - sons of Phinees, sons of Aaron
  lexicon: BDAG
  rationale: υἱοί can mean literal sons or descendants. In genealogical context, 'sons
    of' preserves the source form while naturally conveying lineage. Standard English
    forms of the names are used by transliteration convention.
- source_word: Ἰησοῦς
  chosen: Jeshua
  alternatives:
  - Joshua
  - Jesus
  lexicon: BDAG
  rationale: In postexilic priestly/genealogical context, the conventional OT-era
    English transliteration 'Jeshua' best fits the referent and avoids misleading
    christological association that 'Jesus' would create in English.
- source_word: ὁ τοῦ Ἰωσεδὲκ τοῦ Σαραιοῦ
  chosen: son of Jozadak son of Seraiah
  alternatives:
  - the son of Josedek, of Saraias
  - descendant of Jozadak, descendant of Seraiah
  lexicon: BDAG
  rationale: The article-plus-genitive construction functions genealogically. English
    supplies 'son of' for clarity. Name forms are normalized to familiar English transliterations.
- source_word: Ἰωακεὶμ
  chosen: Joakim
  alternatives:
  - Jehoiakim
  - Joachim
  lexicon: BDAG
  rationale: The Greek form points to Joakim/Joachim rather than the fuller Hebrew
    royal form Jehoiakim. 'Joakim' stays close to the Greek while remaining readable.
- source_word: ὁ τοῦ Ζοροβαβὲλ τοῦ Σαλαθιὴλ
  chosen: son of Zerubbabel son of Shealtiel
  alternatives:
  - the son of Zorobabel, of Salathiel
  - descendant of Zerubbabel, descendant of Shealtiel
  lexicon: BDAG
  rationale: Again a genealogical genitive chain; 'son of' is the natural English
    completion. English name forms follow standard biblical transliteration.
- source_word: ἐκ τοῦ οἴκου τοῦ Δαυείδ
  chosen: from the house of David
  alternatives:
  - of the house of David
  - from David's house
  lexicon: BDAG
  rationale: οἶκος in genealogical-political contexts commonly means household/dynasty.
    'House of David' is the established and accurate dynastic expression.
- source_word: ἐκ τῆς γενεᾶς Φάρες
  chosen: from the family line of Perez
  alternatives:
  - from the generation of Phares
  - from the lineage of Perez
  lexicon: BDAG
  rationale: γενεά here denotes lineage/descent rather than a temporal generation.
    'Family line' communicates this clearly. 'Perez' is the standard English form
    of Φάρες/Phares.
