translation:
  text: And all the people sounded trumpets and shouted with a loud voice, praising
    the Lord because of the raising up of the house of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the rebuilding of the house of the Lord.' The Greek says
      'raising up,' which can refer more broadly to the temple's being erected or
      restored.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ λαός
  chosen: all the people
  alternatives:
  - the whole people
  - all the assembly
  lexicon: LSJ
  rationale: A collective expression referring to the gathered community. 'All the
    people' is natural English and preserves the totality conveyed by πᾶς with the
    singular collective λαός.
- source_word: ἐσάλπισαν
  chosen: sounded trumpets
  alternatives:
  - blew trumpets
  - trumpeted
  lexicon: LSJ
  rationale: The verb denotes sounding a trumpet. 'Sounded trumpets' stays close to
    the Greek while remaining idiomatic. The plural English object is supplied naturally
    from the verb's sense.
- source_word: ἐβόησαν φωνῇ μεγάλῃ
  chosen: shouted with a loud voice
  alternatives:
  - cried out loudly
  - raised a great shout
  lexicon: LSJ
  rationale: The phrase combines the verb 'cry/shout' with an instrumental/dative
    expression 'with a loud voice.' This rendering preserves both elements without
    over-paraphrasing.
- source_word: ὑμνοῦντες
  chosen: praising
  alternatives:
  - singing praise
  - hymning
  lexicon: LSJ
  rationale: The participle indicates praise directed to God, likely with musical
    or liturgical force. 'Praising' is clear modern English; 'singing praise' is possible
    but slightly more specific than the Greek requires in this context.
- source_word: τῷ κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord.' Here it refers to Israel's
    God in a cultic setting.
- source_word: ἐπὶ τῇ ἐγέρσει
  chosen: because of the raising up
  alternatives:
  - over the rebuilding
  - at the founding
  - because the ... had been raised up
  lexicon: LSJ
  rationale: ἐγέρσις literally denotes a raising up. In temple-building context it
    can imply erection or rebuilding. 'Because of the raising up' preserves the image
    and leaves room for either foundation-laying or rebuilding/erection, avoiding
    a narrower interpretation than the Greek alone demands.
- source_word: τοῦ οἴκου Κυρίου
  chosen: the house of the Lord
  alternatives:
  - the Lord's house
  - the temple of the Lord
  lexicon: LSJ
  rationale: A standard biblical expression for the temple. 'House of the Lord' preserves
    the source wording and its intertextual resonance better than the more interpretive
    'temple.'
