theological_decisions:
- issue: Rendering κύριος in a temple-context reference to Israel's God
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The Greek source reads κύριος, not the Hebrew divine name directly. Following
    project doctrine for Greek texts, 'the Lord' is preferred, while acknowledging
    that the underlying referent is the God of Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: Interpretation of ἐγέρσει with reference to the temple
  chosen_reading: raising up
  alternative_readings:
  - rebuilding
  - foundation
  - erection
  rationale: The Greek wording can cover the temple's being raised/erected and, in
    context, its rebuilding. The main text preserves the broader image rather than
    resolving the construction stage too narrowly. An alternative is preserved in
    a footnote for readers expecting 'rebuilding.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency/documented exception'
