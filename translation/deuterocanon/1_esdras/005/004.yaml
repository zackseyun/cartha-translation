translation:
  text: And these are the names of the men who were going up by their ancestral houses
    into the tribes, each to his own administrative division.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by their fathers' houses.' The Greek πατριαί refers to kinship groups
      traced through ancestral lineage.
    reason: lexical_alternative
  - marker: b
    text: The term rendered 'administrative division' translates the rare Greek word
      μεριδαρχίαν, which may denote a district, territorial allotment, or other formal
      division.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: LSJ
  rationale: Simple connective introducing the list; 'And' preserves the narrative
    linkage without adding emphasis.
- source_word: ταῦτα
  chosen: these
  alternatives:
  - the following
  lexicon: LSJ
  rationale: Demonstrative pointing forward to the names that follow; 'these' is the
    most direct rendering.
- source_word: τὰ ὀνόματα
  chosen: the names
  alternatives:
  - the name-list
  lexicon: LSJ
  rationale: Straightforward nominal phrase introducing a register of persons.
- source_word: τῶν ἀνδρῶν
  chosen: of the men
  alternatives:
  - of the males
  - of the people
  lexicon: LSJ
  rationale: ἀνδρῶν is specifically masculine and refers to male heads or representatives
    in a genealogical register; 'men' is gender-accurate and fits the source intent.
- source_word: τῶν ἀναβαινόντων
  chosen: who were going up
  alternatives:
  - who went up
  - who were ascending
  lexicon: LSJ
  rationale: Present participle in this return-from-exile context commonly denotes
    those making the journey upward to the land/Jerusalem. 'Were going up' preserves
    the participial sense while remaining natural English.
- source_word: κατὰ πατριὰς αὐτῶν
  chosen: by their ancestral houses
  alternatives:
  - according to their families
  - by their fathers' houses
  lexicon: LSJ
  rationale: πατριά denotes lineage group or clan traced through the fathers. 'Ancestral
    houses' preserves the kinship structure without overly archaic phrasing, though
    it overlaps conceptually with 'fathers' houses.'
- source_word: εἰς τὰς φυλὰς
  chosen: into the tribes
  alternatives:
  - to the tribes
  - among the tribes
  lexicon: LSJ
  rationale: εἰς naturally indicates movement toward incorporation within tribal groupings.
    'Into the tribes' keeps the directional force, though the exact administrative
    nuance is somewhat compressed in English.
- source_word: ἐπὶ τὴν μεριδαρχίαν αὐτῶν
  chosen: each to his own administrative division
  alternatives:
  - to their own district
  - to their own allotment-governorship
  - for their own territorial division
  lexicon: LSJ
  rationale: μεριδαρχία is an uncommon administrative term built on the idea of a
    division or allotted district under organized oversight. Because a literal rendering
    would be opaque, 'administrative division' best communicates the likely sense
    while signaling a formal territorial arrangement.
