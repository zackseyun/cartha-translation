theological_decisions:
- issue: Representative/generic masculine in τῶν υἱῶν Ἰσραήλ
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Following the project's gender-accurate policy, the familial masculine
    expression is preserved because it is the wording of the Greek source and carries
    covenantal identity language. A more idiomatic collective rendering is possible
    but would reduce lexical transparency.
