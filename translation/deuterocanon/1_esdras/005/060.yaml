translation:
  text: And from the priests, the Levites, and the heads of their ancestral houses
    came the elders who had seen the former house, and at the building of this one
    they cried out with a loud cry and great weeping,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with loud shouting and great weeping.' The Greek explicitly includes
      both an outcry and weeping; the wording may reflect a mixed public lament at
      seeing the new temple built in contrast to the former one.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'the former house' and 'this one,' preserving the temple
      idiom 'house' for the sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: προκαθημένων
  chosen: heads
  alternatives:
  - leaders
  - chief men
  - those set over
  lexicon: LSJ
  rationale: The participial noun denotes those placed in front or presiding. 'Heads'
    fits the following phrase 'of their ancestral houses' and matches the clan/family-structure
    context better than the more generic 'leaders'.
- source_word: κατὰ τὰς πατριὰς αὐτῶν
  chosen: of their ancestral houses
  alternatives:
  - according to their families
  - by their fathers' houses
  - by their clans
  lexicon: LSJ
  rationale: The phrase marks organization by paternal lineage groups. 'Ancestral
    houses' preserves the household-lineage sense without sounding overly archaic,
    and it naturally complements 'heads'.
- source_word: οἱ πρεσβύτεροι
  chosen: the elders
  alternatives:
  - the old men
  - the senior men
  lexicon: BDAG
  rationale: In this context the term likely refers to older men rather than an office
    alone, but 'elders' preserves both age and communal standing and is the most natural
    English rendering.
- source_word: ἑωρακότες
  chosen: who had seen
  alternatives:
  - having seen
  - who saw
  lexicon: BDAG
  rationale: The perfect participle points to prior experience with continuing relevance.
    'Who had seen' communicates that these elders were eyewitnesses of the earlier
    temple.
- source_word: τὸν πρὸ τοῦ οἶκον
  chosen: the former house
  alternatives:
  - the previous house
  - the house before this
  - the earlier temple
  lexicon: LSJ
  rationale: The phrase refers to the earlier temple building. 'Former house' keeps
    the temple idiom 'house' while making the temporal contrast clear.
- source_word: πρὸς τὴν τούτου οἰκοδομήν
  chosen: at the building of this one
  alternatives:
  - toward the building of this one
  - when this one was being built
  - at this one's construction
  lexicon: LSJ
  rationale: The Greek construction is somewhat compressed. In context it refers to
    their reaction in connection with the construction of the new temple. 'At the
    building of this one' is idiomatic and preserves the contrast with the former
    house.
- source_word: μετὰ κραυγῆς καὶ κλαυθμοῦ μεγάλου
  chosen: they cried out with a loud cry and great weeping
  alternatives:
  - with loud shouting and great weeping
  - with a loud outcry and much weeping
  lexicon: BDAG
  rationale: Both vocal outcry and weeping are explicit in the Greek and should both
    be retained. The verbal rendering makes the sentence read naturally in English
    while preserving the emotional intensity.
