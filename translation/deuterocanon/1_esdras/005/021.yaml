translation:
  text: those from Makalon, one hundred twenty-two; those from Betolio, fifty-two;
    Neipheis, one hundred fifty-six.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel at Nehemiah 7:25 reads, 'the sons of Ramah and Geba,
      six hundred twenty-one.' 1 Esdras here preserves a substantially different set
      of names and numbers.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ ἐκ
  chosen: those from
  alternatives:
  - the men from
  - the sons of
  lexicon: LSJ
  rationale: The Greek construction marks people identified by place of origin. 'Those
    from' is natural English and avoids importing 'sons of' from the Hebrew parallel,
    since the Greek witness is primary here.
- source_word: Μακαλών
  chosen: Makalon
  alternatives:
  - Macalon
  - Makalon
  lexicon: LSJ
  rationale: This is a proper name preserved by transliteration from the Greek form.
    The exact identification is uncertain, and the MT parallel points to a different
    place-name tradition, so a straightforward transliteration best preserves the
    source.
- source_word: Βετολιώ
  chosen: Betolio
  alternatives:
  - Betoliō
  - Betholio
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek. Because this list contains
    place-names with unstable transmission across witnesses, transliteration is preferable
    to speculative harmonization with Hebrew parallels.
- source_word: Νειφείς
  chosen: Neipheis
  alternatives:
  - Nepheis
  - Neiphis
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek nominative form. The
    name is not securely aligned with the MT parallel, so the Greek form is retained
    rather than normalized.
- source_word: ἑκατὸν εἴκοσι δύο
  chosen: one hundred twenty-two
  alternatives:
  - a hundred and twenty-two
  lexicon: LSJ
  rationale: Standard English rendering of the cardinal number, using modern readable
    style.
- source_word: πεντήκοντα δύο
  chosen: fifty-two
  alternatives:
  - two and fifty
  lexicon: LSJ
  rationale: Standard modern English rendering of the number.
- source_word: ἑκατὸν πεντήκοντα ἕξ
  chosen: one hundred fifty-six
  alternatives:
  - a hundred and fifty-six
  lexicon: LSJ
  rationale: Standard modern English rendering of the cardinal number.
