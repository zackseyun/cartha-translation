translation:
  text: 'And from the priests, those who claimed the priesthood, but were not found:
    the sons of Obbeia, the sons of Akbos, the sons of Iaddous, who had taken Augia
    as a wife from the daughters of Phaexeldai,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek is elliptical: ''were not found'' likely means their genealogical
      record or priestly registration was not found, as in the Ezra parallel.'
    reason: lexical_alternative
  - marker: b
    text: The proper names here differ from the approximate MT parallel; this translation
      follows the Greek text of 1 Esdras rather than harmonizing to Ezra/Nehemiah.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν ἱερέων
  chosen: from the priests
  alternatives:
  - among the priests
  lexicon: LSJ
  rationale: The phrase marks this group as belonging to the priestly class. 'From
    the priests' is a natural rendering of ἐκ with the genitive here.
- source_word: οἱ ἐμποιούμενοι ἱερωσύνης
  chosen: those who claimed the priesthood
  alternatives:
  - those who made a claim to the priesthood
  - those who presented themselves as priests
  lexicon: LSJ
  rationale: The participle ἐμποιούμενοι here conveys making or asserting a claim,
    not simply performing priestly service. In context, the issue is genealogical
    qualification, so 'claimed the priesthood' best captures the sense.
- source_word: οὐχ εὑρέθησαν
  chosen: were not found
  alternatives:
  - were not discovered
  - could not be found
  lexicon: LSJ
  rationale: 'A formal rendering preserves the likely elliptical sense from the Ezra
    parallel: their registration or lineage was not found. The passive ''were not
    found'' keeps close to the Greek while allowing the implied object to remain unstated.'
- source_word: υἱοὶ Ὀββειά
  chosen: the sons of Obbeia
  alternatives:
  - the descendants of Obbeia
  rationale: υἱοὶ in genealogical lists is conventionally rendered 'sons of,' which
    can include descendants. The transliteration follows the Greek form rather than
    harmonizing to the Hebrew parallel.
- source_word: υἱοὶ Ἀκβώς
  chosen: the sons of Akbos
  alternatives:
  - the descendants of Akbos
  rationale: As above, the genealogical formula is preserved. The name is transliterated
    from the Greek witness.
- source_word: υἱοὶ Ἰαδδοὺς
  chosen: the sons of Iaddous
  alternatives:
  - the descendants of Iaddous
  rationale: The Greek proper name is retained by transliteration. 'Sons of' preserves
    the list structure.
- source_word: τοῦ λαβόντος Αὐγίαν γυναῖκα
  chosen: who had taken Augia as a wife
  alternatives:
  - who had married Augia
  lexicon: LSJ
  rationale: The aorist participle with λαμβάνω plus γυναῖκα is an idiom for marrying.
    'Had taken ... as a wife' stays closer to the Greek while remaining understandable.
- source_word: τῶν θυγατέρων Φαηξελδαίου
  chosen: from the daughters of Phaexeldai
  alternatives:
  - from the daughters of Phaexeldaios
  - from among the daughters of Phaexeldai
  rationale: The phrase identifies Augia's family origin. The transliteration follows
    the Greek form in Swete; the exact underlying Semitic name is uncertain, so the
    Greek witness should govern.
