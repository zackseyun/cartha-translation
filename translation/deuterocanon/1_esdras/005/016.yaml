translation:
  text: the sons of Anneis, one hundred one; the sons of Arom, the sons of Bassai,
    three hundred twenty-three; the sons of Arseiphoureith,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek list of names here diverges from the approximate Hebrew parallel
      in Nehemiah 7:23, which reads 'the sons of Bezai.'
    reason: alternative_reading
  - marker: b
    text: The name 'Arseiphoureith' is uncertain in Greek; the approximate Hebrew
      parallel may point to 'Hariph.'
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  lexicon: LSJ
  rationale: In this census/list context, υἱοὶ introduces a family or clan descended
    from the named ancestor. 'The sons of' is the standard transparent rendering in
    English for such genealogical enumerations.
- source_word: Ἀννείς
  chosen: Anneis
  alternatives:
  - Annis
  rationale: This is a proper name and is therefore transliterated rather than translated,
    following project policy. The exact English form is somewhat uncertain because
    the Greek name does not align neatly with the MT parallel at this point; 'Anneis'
    stays close to the Greek spelling.
- source_word: ἑκατὸν εἷς
  chosen: one hundred one
  alternatives:
  - a hundred and one
  - one hundred and one
  lexicon: LSJ
  rationale: The Greek gives a straightforward cardinal number. 'One hundred one'
    is concise modern English; alternatives are stylistic rather than semantic.
- source_word: Ἀρόμ
  chosen: Arom
  alternatives:
  - Aram
  rationale: Proper name transliterated directly from the Greek. Because the verse
    is marked with a major mismatch against the MT parallel, the Greek form is retained
    rather than harmonized to a Hebrew name.
- source_word: Βασσαί
  chosen: Bassai
  alternatives:
  - Bessai
  - Bezai
  rationale: The Greek form Βασσαί is rendered by transliteration as 'Bassai.' The
    MT parallel has בֵצָי (Bezai/Bezai), which likely reflects the same or a related
    name, but the Greek remains the primary source. The Hebrew-aligned alternative
    is worth preserving in a footnote because of the source mismatch.
- source_word: τριακόσιοι εἴκοσι τρεῖς
  chosen: three hundred twenty-three
  alternatives:
  - three hundred and twenty-three
  lexicon: LSJ
  rationale: Straightforward numeral. Modern English style favors omission of 'and'
    in cardinal numbers.
- source_word: Ἀρσειφουρείθ
  chosen: Arseiphoureith
  alternatives:
  - Arseiphurith
  - Hariph
  rationale: The Greek proper name is difficult and likely reflects textual corruption
    or divergence from the Hebrew tradition. The main text keeps a close transliteration
    from the Greek witness, while the probable Hebrew-parallel name 'Hariph' is preserved
    as an alternative in a footnote due to the acknowledged source mismatch and uncertainty.
