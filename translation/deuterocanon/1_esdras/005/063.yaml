translation:
  text: And when the enemies of the tribe of Judah and Benjamin heard, they came to
    find out what the sound of the trumpets was,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'what the voice of the trumpets was.'
    reason: lexical_alternative
  - marker: b
    text: Greek has the singular 'tribe' with 'Judah and Benjamin'; English might
      also be rendered 'the tribes of Judah and Benjamin.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: when ... heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance for the main verb. 'When
    ... heard' is natural English and preserves the temporal force without wooden
    literalism.
- source_word: οἱ ἐχθροὶ
  chosen: the enemies
  alternatives:
  - their enemies
  - the hostile ones
  lexicon: BDAG
  rationale: The noun plainly denotes opponents. 'Their enemies' would make the referent
    explicit, but the Greek has the article plus noun without possessive; 'the enemies'
    keeps closer to the source.
- source_word: τῆς φυλῆς Ἰούδα καὶ Βενιαμεὶν
  chosen: of the tribe of Judah and Benjamin
  alternatives:
  - of the tribes of Judah and Benjamin
  - of the people of Judah and Benjamin
  lexicon: BDAG
  rationale: φυλή is singular in the Greek, followed by the paired tribal names. The
    most literal rendering is singular, though English might expect plural. I retained
    'tribe' to reflect the source form while allowing the coordinated names to stand.
    The MT parallel concerns Israel's worship response and does not directly control
    this wording, so the Greek governs.
- source_word: ἦλθοσαν
  chosen: they came
  alternatives:
  - they arrived
  - they went
  lexicon: BDAG
  rationale: Simple narrative motion verb. 'Came' fits the deictic movement in English
    narrative.
- source_word: ἐπιγνῶναι
  chosen: to find out
  alternatives:
  - to learn
  - to ascertain
  - to recognize
  lexicon: BDAG
  rationale: The infinitive here expresses purpose. In context, the enemies come in
    order to discover the cause/identity of the trumpet sound. 'To find out' is idiomatic
    and contextually precise.
- source_word: τίς ἡ φωνὴ τῶν σαλπίγγων
  chosen: what the sound of the trumpets was
  alternatives:
  - what the voice of the trumpets was
  - what the trumpet blast meant
  - what this sound of trumpets was
  lexicon: BDAG
  rationale: φωνή can mean 'sound' or 'voice'; with trumpets, 'sound' is the natural
    English equivalent. The interrogative τίς here is best rendered idiomatically
    as 'what ... was,' i.e., what this trumpet sound signified or consisted in. 'Trumpets'
    is preferred over 'horns' because σάλπιγξ in this context denotes ceremonial trumpets.
