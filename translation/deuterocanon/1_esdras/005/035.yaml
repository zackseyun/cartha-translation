theological_decisions:
- issue: Rendering socially dependent service terms in a census list
  chosen_reading: Use 'temple servants' and 'Solomon’s servants' in the main text
  alternative_readings:
  - temple slaves
  - Solomon’s slaves
  rationale: The verse is an administrative total, not a theological argument about
    bondage. Following the project's guidance on δοῦλος-like terms contextually, 'servants'
    best reflects the institutional class without importing more emphasis than this
    list itself carries. The stronger alternative is preserved in a footnote because
    the Greek terms can denote servile status.
