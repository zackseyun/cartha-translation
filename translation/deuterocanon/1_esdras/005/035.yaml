translation:
  text: 'All the temple servants and the sons of Solomon’s servants: three hundred
    seventy-two.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'temple slaves' and 'the sons of Solomon’s slaves'; the Greek terms denote
      dependent service and can carry servile force.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  chosen: All
  alternatives:
  - The whole number of
  - In all
  lexicon: LSJ
  rationale: The adjective functions summatively over the listed groups and is naturally
    rendered as a totalizing 'All' at the head of the sentence.
- source_word: ἱερόδουλοι
  chosen: temple servants
  alternatives:
  - temple slaves
  - sacred servants
  lexicon: LSJ
  rationale: The compound literally denotes those attached to temple service. 'Temple
    servants' is clear modern English and fits the census context. 'Temple slaves'
    is possible etymologically, but the bonded status is not foregrounded here as
    a theological point; the term functions as a recognized class of cultic personnel.
- source_word: υἱοὶ τῶν παίδων Σαλωμών
  chosen: the sons of Solomon’s servants
  alternatives:
  - the descendants of Solomon’s servants
  - the sons of Solomon’s slaves
  lexicon: LSJ
  rationale: υἱοί in genealogical lists often means descendants, but 'sons' preserves
    the formal structure while remaining idiomatic in this register. παῖδες can mean
    servants or slaves; in this administrative list 'servants' is the least overdetermined
    English choice, while preserving the social dependency implied by the Greek.
- source_word: τριακόσιοι ἑβδομήκοντα δύο
  chosen: three hundred seventy-two
  alternatives:
  - three hundred and seventy-two
  lexicon: LSJ
  rationale: Straightforward cardinal number. The modern style without 'and' suits
    readable contemporary English.
