theological_decisions:
- issue: Whether εὔξαντο should be rendered as a formal religious vow or a broader
    commitment
  chosen_reading: pledged
  alternative_readings:
  - vowed
  - promised
  rationale: The context is temple restoration and donation/commitment language. The
    Greek can suggest a vow, but the immediate infinitive construction points to undertaking
    the rebuilding. 'Pledged' preserves solemnity without importing a more technical
    cultic vow than the text requires.
