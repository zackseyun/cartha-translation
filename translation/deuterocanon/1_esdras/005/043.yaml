translation:
  text: And some of the heads of families, when they arrived at the temple of God
    in Jerusalem, pledged to raise up the house on its site, according to their ability,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “vowed to rebuild the house in its place.” The Greek verb can carry the
      sense of making a vow, and “house” here refers to the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡγουμένων
  chosen: heads
  alternatives:
  - leaders
  - chiefs
  lexicon: LSJ
  rationale: The participial noun refers to those in leading positions among the ancestral
    houses. 'Heads' fits the family/clan context better than the more generic 'leaders'
    and matches the following κατὰ τὰς πατριάς.
- source_word: πατριὰς
  chosen: families
  alternatives:
  - father-houses
  - clans
  - ancestral houses
  lexicon: LSJ
  rationale: The term denotes lineage-based family groups. 'Families' is readable
    modern English, while 'heads of families' naturally conveys the social structure.
    'Ancestral houses' is more literal but less idiomatic in the main text.
- source_word: παραγίνεσθαι
  chosen: arrived
  alternatives:
  - came
  - presented themselves
  lexicon: BDAG
  rationale: In context the verb marks their coming to Jerusalem's temple precincts.
    'Arrived' gives the sense clearly in natural English.
- source_word: ἱερὸν τοῦ θεοῦ
  chosen: the temple of God
  alternatives:
  - the sanctuary of God
  - the holy place of God
  lexicon: LSJ
  rationale: ἱερόν ordinarily denotes the temple complex. 'Temple of God' is the clearest
    and most standard rendering here.
- source_word: εὔξαντο
  chosen: pledged
  alternatives:
  - vowed
  - undertook
  - promised
  lexicon: LSJ
  rationale: The verb can mean 'vowed' or 'prayed/wished,' but with the infinitive
    ἐγεῖραι it most naturally expresses a commitment or undertaking. 'Pledged' communicates
    solemn resolve without overstating a formal cultic vow.
- source_word: ἐγεῖραι
  chosen: to raise up
  alternatives:
  - to rebuild
  - to erect
  lexicon: BDAG
  rationale: Literally 'to raise up.' Because the object is the temple/house on its
    former site, rebuilding is implied; however, 'raise up' preserves the Greek image
    while remaining intelligible.
- source_word: οἶκον
  chosen: the house
  alternatives:
  - the temple
  lexicon: LSJ
  rationale: In this context 'house' refers to God's house, i.e., the temple. Retaining
    'house' preserves the biblical idiom and links with temple theology, while the
    preceding 'temple of God' already clarifies the referent.
- source_word: ἐπὶ τοῦ τόπου αὐτοῦ
  chosen: on its site
  alternatives:
  - in its place
  - upon its former place
  lexicon: LSJ
  rationale: The phrase indicates restoration at the proper/original location. 'On
    its site' is concise and natural.
- source_word: κατὰ τὴν αὐτῶν δύναμιν
  chosen: according to their ability
  alternatives:
  - as they were able
  - according to their means
  lexicon: BDAG
  rationale: The phrase expresses proportion to available capacity/resources. 'According
    to their ability' preserves that sense and leaves open both financial means and
    practical capacity.
