translation:
  text: those from Netebas, fifty-five; those from Enatos, one hundred fifty-eight;
    those from Baitasmon Zamoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek names in this verse differ notably from the approximate Hebrew
      parallel in Nehemiah 7:25, which reads 'the sons of Gibeon/Gibbar, ninety-five'
      in the MT tradition. Because 1 Esdras here preserves a different list-form and
      names, the translation follows the Greek witness closely rather than harmonizing
      to the Hebrew.
    reason: textual_variant
  - marker: b
    text: The final place-name is textually difficult in Greek and may reflect a compound
      or corrupted toponym; the translation therefore preserves it by transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἐκ
  chosen: those from
  alternatives:
  - the men from
  - the sons of
  lexicon: LSJ
  rationale: In this census-style list, οἱ ἐκ identifies a group by place of origin.
    'Those from' is natural English and preserves the locative force without importing
    'sons of' from the approximate MT parallel, which differs here.
- source_word: Νετέβας
  chosen: Netebas
  alternatives:
  - Netebas/Netebas as uncertain proper name
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek witness. The place-name
    is not normalized to a Hebrew equivalent because the Greek is the primary source
    and the MT parallel is only approximate.
- source_word: πεντήκοντα πέντε
  chosen: fifty-five
  lexicon: LSJ
  rationale: Straightforward cardinal number.
- source_word: Ἐνάτου
  chosen: Enatos
  alternatives:
  - Enathu
  - Enatou
  lexicon: LSJ
  rationale: Transliterated as a place-name from the genitive form in Greek. 'Enatos'
    gives a readable nominative-style English form while remaining close to the source.
- source_word: ἑκατὸν πεντήκοντα ὀκτώ
  chosen: one hundred fifty-eight
  alternatives:
  - a hundred and fifty-eight
  lexicon: LSJ
  rationale: Straightforward cardinal number rendered in contemporary English style.
- source_word: Βαιτασμῶν Ζαμμώθ
  chosen: Baitasmon Zamoth
  alternatives:
  - Baitasmoth Zamoth
  - Beth-asmoth Zamoth
  lexicon: LSJ
  rationale: The Greek wording appears to preserve a difficult or compound place-name.
    Because the source validation flags a major mismatch and the MT parallel points
    elsewhere, the safest course is close transliteration rather than speculative
    normalization.
