translation:
  text: These were the ones who came up from Thermeleth and Thelersas, their leaders
    being Charaathalan and Allar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The place name Thelersas reflects the Greek witness. The Hebrew parallel
      in Ezra 2:52 lists different names in this position, showing that 1 Esdras here
      does not align closely with the Masoretic tradition.
    reason: alternative_reading
  - marker: b
    text: Or, more formally, 'These, having come up from Thermeleth and Thelersas;
      Charaathalan and Allar were leading them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  chosen: These were the ones
  alternatives:
  - These
  - These men
  lexicon: LSJ
  rationale: Demonstrative pronoun introducing a listed group. 'These were the ones'
    gives natural English while preserving the resumptive force at the head of the
    sentence.
- source_word: ἀναβάντες
  chosen: came up
  alternatives:
  - went up
  - having come up
  lexicon: LSJ
  rationale: Aorist participle of ἀναβαίνω, commonly used for ascent or return to
    the land/city. In this restoration-list context, 'came up' is idiomatic and reflects
    the conventional movement of returnees without over-literal participial awkwardness.
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - out of
  lexicon: LSJ
  rationale: Standard marker of origin or source; 'from' is the natural English equivalent
    here.
- source_word: Θερμέλεθ
  chosen: Thermeleth
  alternatives:
  - Thermeleth
  rationale: Proper place name transliterated directly from the Greek witness, since
    personal and place names are transliterated rather than translated.
- source_word: Θελερσάς
  chosen: Thelersas
  alternatives:
  - Thelersa
  - Telharsa
  rationale: Proper place name transliterated from the Greek. 'Thelersas' stays closest
    to the extant Greek form, while the Hebrew-parallel tradition suggests a related
    name behind it; that alternative is worth preserving in a footnote rather than
    replacing the Greek-based main text.
- source_word: ἡγούμενος
  chosen: leading
  alternatives:
  - their leader was
  - being leader
  - governing
  lexicon: LSJ
  rationale: 'Present participial form used predicatively with the following names.
    ''Leading'' yields smooth English with the names as the subject complement: ''with
    X and Y leading them.'''
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - their
  lexicon: LSJ
  rationale: Genitive pronoun dependent on ἡγούμενος. In idiomatic English, 'leading
    them' expresses the relation more naturally than a wooden 'their leader.'
- source_word: Χαρααθαλὰν
  chosen: Charaathalan
  alternatives:
  - Charaathalanos
  - Harathalan
  rationale: Proper name transliterated from the Greek text. The form is unusual and
    not normalized against the MT, because the Greek witness is primary for 1 Esdras.
- source_word: Ἀλλάρ
  chosen: Allar
  alternatives:
  - Aalar
  - Aler
  rationale: Proper name transliterated directly from the Greek witness.
