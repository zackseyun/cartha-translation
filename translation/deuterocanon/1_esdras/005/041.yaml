translation:
  text: 'All these were Israelites, from twelve years old and upward, apart from male
    and female servants: forty-two thousand three hundred sixty. Their male and female
    servants were seven thousand three hundred thirty-seven; and the singers and songstresses
    were two hundred forty-five.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'apart from male and female slaves.' The Greek terms can denote household
      servants in dependent status; the context here is a census total rather than
      a focus on legal condition.
    reason: lexical_alternative
  - marker: b
    text: Or 'male and female singers.' The Greek distinguishes ψάλται and ψαλτῳδοί
      rather than using a single undifferentiated term.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ πάντες
  chosen: All these
  alternatives:
  - And all these
  - Now all these
  lexicon: LSJ
  rationale: οἱ...πάντες refers back to the listed returnees as a total. 'All these'
    is natural English and preserves the summative force without overtranslating δέ.
- source_word: ἦσαν Ἰσραήλ
  chosen: were Israelites
  alternatives:
  - were Israel
  - belonged to Israel
  lexicon: LSJ
  rationale: Although the Greek literally reads 'were Israel,' in context it denotes
    ethnic/covenantal identity of the counted community. 'Were Israelites' conveys
    the sense idiomatically in English.
- source_word: ἀπὸ δωδεκαετοῦς
  chosen: from twelve years old and upward
  alternatives:
  - from twelve years old
  - aged twelve and above
  lexicon: LSJ
  rationale: The phrase marks the age threshold for the census. 'And upward' makes
    explicit the inclusive counting sense that is natural in English census language.
- source_word: χωρὶς παίδων καὶ παιδισκῶν
  chosen: apart from male and female servants
  alternatives:
  - excluding boys and girls
  - apart from servants and maidservants
  lexicon: LSJ
  rationale: Although παῖδες can mean 'children,' the immediate pairing with παιδίσκαι
    and the following separate total strongly indicates male and female household
    servants/slaves rather than sons and daughters. 'Male and female servants' is
    clear modern English while preserving the social distinction.
- source_word: μυριάδες τέσσαρες δισχίλιοι τριακόσιοι ἑξήκοντα
  chosen: forty-two thousand three hundred sixty
  alternatives:
  - 42,360
  lexicon: LSJ
  rationale: This is the straightforward numerical total in words.
- source_word: παῖδες τούτων καὶ παιδίσκαι
  chosen: Their male and female servants
  alternatives:
  - Their servants and maidservants
  - Their male servants and female servants
  lexicon: LSJ
  rationale: Again, in this census context παῖδες paired with παιδίσκαι refers most
    naturally to male and female servants attached to the households. 'Their' reflects
    τούτων.
- source_word: ἑπτακισχίλιοι τριακόσιοι τριάκοντα ἑπτά
  chosen: seven thousand three hundred thirty-seven
  alternatives:
  - 7,337
  lexicon: LSJ
  rationale: Straightforward number rendering.
- source_word: ψάλται καὶ ψαλτῳδοί
  chosen: the singers and songstresses
  alternatives:
  - male and female singers
  - singers and singing women
  lexicon: LSJ
  rationale: The Greek distinguishes two groups by gender or role. 'Singers and songstresses'
    preserves the distinction more closely than collapsing both into 'singers,' while
    remaining intelligible. A more generic alternative is preserved in a footnote
    because English usage may prefer it.
- source_word: διακόσιοι τεσσεράκοντα πέντε
  chosen: two hundred forty-five
  alternatives:
  - '245'
  lexicon: LSJ
  rationale: Straightforward number rendering.
