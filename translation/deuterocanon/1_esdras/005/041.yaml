theological_decisions:
- issue: Identity expression ἦσαν Ἰσραήλ
  chosen_reading: were Israelites
  alternative_readings:
  - were Israel
  rationale: This is not a theological crux so much as an idiomatic one, but the phrase
    bears covenantal identity. English normally expresses this as 'Israelites' rather
    than the more wooden 'were Israel.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering socially marked dependent-status terms παῖδες / παιδίσκαι
  chosen_reading: male and female servants
  alternative_readings:
  - male and female slaves
  - boys and girls
  rationale: The terms can overlap semantically with children or slaves/servants depending
    on context. Here the census-like listing and separate totals favor household dependents/servants.
    'Servants' is chosen because the verse is enumerative rather than emphasizing
    bonded status; 'slaves' remains a viable lexical alternative and is preserved
    in a footnote note.
  doctrine_reference: DOCTRINE.md contested terms table for δοῦλος by analogy; translation
    philosophy §1, §6
