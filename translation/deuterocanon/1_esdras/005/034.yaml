translation:
  text: the sons of Hagia, the sons of Phacareth-sabeie, the sons of Sarothei, the
    sons of Meisaias, the sons of Gas, the sons of Addous, the sons of Soubas, the
    sons of Apherra, the sons of Barotheis, the sons of Saphag, the sons of Allon;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Nehemiah 7:51 is much shorter here ('the sons of
      Uzza, the sons of Paseah, the sons of Besai'). 1 Esdras preserves an expanded
      Greek list, so the translation follows the Greek names rather than harmonizing
      to the Hebrew.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: LSJ
  rationale: In this genealogical list, υἱοὶ functions as a standard clan/list formula
    meaning members or descendants of a named family line. 'The sons of' preserves
    the repeated Greek structure and matches the register of census/genealogical material
    better than the more interpretive 'descendants of'.
- source_word: Ἁγιά
  chosen: Hagia
  alternatives:
  - Agia
  lexicon: LSJ
  rationale: This is a proper name transliterated from the Greek form. Personal names
    are transliterated rather than translated.
- source_word: Φακαρὲθ Σαβειή
  chosen: Phacareth-sabeie
  alternatives:
  - Phacareth Sabeie
  - Phakareth-sabeie
  lexicon: LSJ
  rationale: The Greek presents a compound or closely linked proper-name expression.
    A hyphen preserves that linkage in English while remaining transparent to the
    source form. Because this is a rare name with uncertain Semitic correspondence,
    a conservative transliteration is preferable.
- source_word: Σαρωθεί
  chosen: Sarothei
  alternatives:
  - Sarothi
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek ending without attempting
    harmonization to the approximate MT parallel, since 1 Esdras often expands or
    reshapes name lists.
- source_word: Μεισαίας
  chosen: Meisaias
  alternatives:
  - Misaias
  lexicon: LSJ
  rationale: Proper name transliterated conservatively from the Greek form.
- source_word: Γάς
  chosen: Gas
  alternatives:
  - Gaas
  - Gaz
  lexicon: LSJ
  rationale: The Greek form is brief and should be represented directly rather than
    normalized to another tradition without textual warrant.
- source_word: Ἀδδούς
  chosen: Addous
  alternatives:
  - Addus
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek nominative/plural-list form
    as represented in Swete.
- source_word: Σουβάς
  chosen: Soubas
  alternatives:
  - Subas
  lexicon: LSJ
  rationale: Proper name transliterated directly; 'ou' reflects the Greek ου.
- source_word: Ἀφερρά
  chosen: Apherra
  alternatives:
  - Aferra
  lexicon: LSJ
  rationale: Proper name transliterated conservatively from the Greek.
- source_word: Βαρωθείς
  chosen: Barotheis
  alternatives:
  - Barothes
  - Barotheis
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek form; the diphthong is preserved
    for auditability.
- source_word: Σαφάγ
  chosen: Saphag
  alternatives:
  - Safag
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek consonantal shape.
- source_word: Ἀλλών
  chosen: Allon
  alternatives:
  - Allōn
  lexicon: LSJ
  rationale: Proper name transliterated in a standard anglicized form. The approximate
    MT parallel includes בְּנֵי בֵסָי rather than this sequence of names, but the
    Greek remains primary and is followed here.
