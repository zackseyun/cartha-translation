translation:
  text: the sons of Adonikam, thirty-seven; the sons of Bosai, two thousand six hundred
    six; the sons of Adilion, four hundred fifty-four;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek reads 'thirty-seven' for Adonikam; the MT parallel in Ezra/Nehemiah
      tradition has 'six hundred sixty-six.'
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: LSJ
  rationale: In this census-style list, υἱοὶ is the standard genealogical/list formula
    meaning members or descendants of a family line. 'The sons of' preserves the formal
    structure of the Greek and matches the register of returnee lists better than
    the more interpretive 'descendants of'.
- source_word: Ἀδωνεικάμ
  chosen: Adonikam
  alternatives:
  - Adoneikam
  lexicon: LSJ
  rationale: Proper name transliterated rather than translated, following project
    policy. The spelling 'Adonikam' aligns naturally with the Semitic parallel אֲדֹנִיקָם
    and standard English convention.
- source_word: τριάκοντα ἑπτά
  chosen: thirty-seven
  alternatives:
  - '37'
  lexicon: LSJ
  rationale: Rendered as a spelled-out cardinal number in readable modern English
    while preserving the Greek value exactly. The low number differs sharply from
    the MT parallel's 666, but the Greek witness is primary here and should not be
    harmonized away.
- source_word: Βοσαί
  chosen: Bosai
  alternatives:
  - Bosae
  - Boshai
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek. Because the verse
    is marked major_mismatch and 1 Esdras often diverges from the MT parallels, the
    Greek form is retained rather than conformed to a Hebrew parallel.
- source_word: δισχίλιοι ἑξακόσιοι ἕξ
  chosen: two thousand six hundred six
  alternatives:
  - 2,606
  lexicon: LSJ
  rationale: Exact numerical rendering of the Greek census figure. Spelled out for
    consistency with the surrounding list style.
- source_word: Ἀδειλίου
  chosen: Adilion
  alternatives:
  - Adelius
  - Adeeliou
  lexicon: LSJ
  rationale: Genitive proper name rendered by transliteration as a family designation
    in the list formula. 'Adilion' reflects the Greek form most directly in English
    letters without importing a reconstructed Hebrew equivalent.
- source_word: τετρακόσιοι πεντήκοντα τέσσαρες
  chosen: four hundred fifty-four
  alternatives:
  - '454'
  - four hundred and fifty-four
  lexicon: LSJ
  rationale: Exact cardinal number from the Greek. 'Four hundred fifty-four' uses
    contemporary readable English without changing the sense.
