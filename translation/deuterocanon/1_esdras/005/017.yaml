translation:
  text: the sons of Baiterous, three thousand and five; the sons from Ragethlomon,
    one hundred twenty-three;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek names in this verse differ from the approximate Hebrew/MT parallel
      tradition, which at this point reflects 'the sons of Hashum, two hundred twenty-three.'
      The main text follows the Greek of 1 Esdras rather than harmonizing to the MT.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: LSJ
  rationale: In this census/list context, υἱοὶ is the standard genealogical/list formula
    meaning members of a family or clan. 'The sons of' preserves the formal structure
    of the Greek and matches list style better than the more interpretive 'descendants
    of.'
- source_word: Βαιτηρούς
  chosen: Baiterous
  alternatives:
  - Baitherous
  - Beterous
  rationale: This is a proper name/group name in transliteration. Per project philosophy,
    names are transliterated rather than translated. 'Baiterous' follows the Greek
    form as given in Swete closely.
- source_word: τρισχίλιοι πέντε
  chosen: three thousand and five
  alternatives:
  - 3,005
  - three thousand five
  lexicon: LSJ
  rationale: The Greek gives a cardinal number in list style. 'Three thousand and
    five' is a natural, transparent English rendering that preserves the formal count
    without converting to numerals.
- source_word: ἐκ
  chosen: from
  alternatives:
  - of
  - belonging to
  lexicon: LSJ
  rationale: The preposition ἐκ is explicitly present before the second name and is
    best represented. 'From' preserves the Greek wording, even though English census
    formulas often omit it.
- source_word: Ῥαγεθλωμῶν
  chosen: Ragethlomon
  alternatives:
  - Ragethlomon
  - Ragethlomon's clan
  rationale: Proper name transliterated directly from the Greek witness. Because the
    Greek form does not align neatly with the MT parallel name in this location, the
    translation stays anchored to the Greek rather than harmonizing to Hebrew.
- source_word: ἑκατὸν εἴκοσι τρεῖς
  chosen: one hundred twenty-three
  alternatives:
  - a hundred and twenty-three
  - '123'
  lexicon: LSJ
  rationale: Straightforward cardinal number. Spelled out for consistency with the
    surrounding list and to reflect the source wording.
