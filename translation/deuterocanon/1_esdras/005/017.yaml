- issue: Greek proper names diverge from the approximate MT parallel in this census
    list
  chosen_reading: Retain the Greek list names 'Baiterous' and 'Ragethlomon' in the
    main text
  alternative_readings:
  - Harmonize toward the MT parallel name Hashum for the second entry
  rationale: The project gives original-language primacy to the Zone 1 Greek witness
    for deuterocanonical 1 Esdras, while using the MT parallel as a sanity check only.
    Since the Greek names here do not match the approximate Hebrew parallel cleanly,
    harmonization would import wording not present in the source text.
