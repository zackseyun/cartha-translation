translation:
  text: For we alone will build for the Lord of Israel, in accordance with what Cyrus
    king of the Persians commanded us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'according to what Cyrus king of Persia commanded us.' The Greek reads
      'king of the Persians,' while English may also express the title with the land-name.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς
  chosen: we
  alternatives:
  - we ourselves
  lexicon: LSJ
  rationale: First-person plural pronoun; the explicit pronoun adds emphasis in Greek,
    which is carried mainly by the following μόνοι rather than by an intensified English
    pronoun.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: Connective giving the reason for the refusal in context; 'for' preserves
    the explanatory force without overinterpreting.
- source_word: μόνοι
  chosen: alone
  alternatives:
  - only
  - by ourselves
  lexicon: LSJ
  rationale: 'Adverbial force stressing exclusivity: they, and not the offerers, will
    do the building. ''Alone'' is concise and natural English.'
- source_word: οἰκοδομήσομεν
  chosen: will build
  alternatives:
  - will rebuild
  - will build up
  lexicon: LSJ
  rationale: Future of οἰκοδομέω. 'Build' is the plain sense. 'Rebuild' is contextually
    possible given the temple setting, but the Greek here does not explicitly add
    the restorative nuance, so the simpler rendering is preferred.
- source_word: τῷ κυρίῳ
  chosen: for the Lord
  alternatives:
  - to the Lord
  lexicon: LSJ
  rationale: Dative after οἰκοδομέω can be rendered 'for' in English in a temple-building
    context, expressing dedication rather than mere indirect object. 'Lord' follows
    the project's default for κύριος.
- source_word: τοῦ Ἰσραήλ
  chosen: of Israel
  alternatives:
  - Israel's
  lexicon: LSJ
  rationale: Genitive identifying the Lord specifically as the God/Lord of Israel.
    A literal 'of Israel' preserves the biblical title cleanly.
- source_word: ἀκολούθως
  chosen: in accordance with
  alternatives:
  - according to
  - following
  lexicon: LSJ
  rationale: Adverb meaning correspondingly or in accordance with. 'In accordance
    with' gives clear idiomatic English linked to the command that follows.
- source_word: οἷς προσέταξεν
  chosen: what ... commanded
  alternatives:
  - as ... commanded
  - the things that ... commanded
  lexicon: LSJ
  rationale: Relative construction referring to Cyrus's directive. 'What Cyrus ...
    commanded' is natural English and preserves the content-reference of the Greek.
- source_word: Κῦρος ὁ βασιλεὺς Περσῶν
  chosen: Cyrus king of the Persians
  alternatives:
  - Cyrus the king of Persia
  - Cyrus, king of the Persians
  lexicon: LSJ
  rationale: The Greek literally has 'Cyrus the king of Persians.' 'King of the Persians'
    is a straightforward rendering of the ethnicon plural and fits the Greek wording
    better than singular 'Persia,' though both are intelligible.
