theological_decisions:
- issue: Rendering κύριος in a deuterocanonical LXX temple-building context
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: The project default for κύριος is 'Lord.' Although the underlying Hebrew
    parallel may point to the divine name, the direct source here is Greek κύριος,
    and no special contextual pressure requires 'the LORD' in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Normalization of proper names where Greek forms appear corrupt or heavily
    Hellenized
  chosen_reading: Use standard transliterated forms supported by the parallel Semitic
    tradition for Kadmiel and Henadad, while leaving less certain names closer to
    the Greek
  alternative_readings:
  - Retain all names exactly as represented in Swete's Greek forms
  rationale: The task explicitly permits use of the MT parallel as actual translation
    input. For well-established correspondences, standard name forms improve intelligibility
    and likely recover the intended referent. Where the correspondence is less secure,
    the translation stays closer to the Greek to avoid over-reconstruction.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
