translation:
  text: And they appointed the Levites, from twenty years old and upward, over the
    works of the Lord. Then Jeshua stood with his sons and brothers, and Kadmiel his
    brother, and the sons of Jeshua son of Henadad, and the sons of Judah son of Eliadun,
    together with their sons and brothers—all the Levites, united as supervisors of
    the work, carrying on the works in the house of the Lord. And the builders built
    the temple of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads Damadiēl; the parallel Ezra tradition identifies this Levite
      as Kadmiel.
    reason: alternative_reading
  - marker: b
    text: Greek Hemadaboun likely reflects the name Henadad from the parallel Hebrew
      tradition.
    reason: alternative_reading
  - marker: c
    text: The phrase 'supervisors of the work' translates a rare Greek term meaning
      those directing or overseeing the labor.
    reason: lexical_alternative
  - marker: d
    text: Some English translations smooth 'works' to singular 'work' in this verse;
      the Greek uses the plural in both occurrences.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησαν
  chosen: they appointed
  alternatives:
  - they set
  - they stationed
  lexicon: LSJ
  rationale: In context with τοὺς Λευείτας ... ἐπὶ τῶν ἔργων, the verb denotes assigning
    persons to oversight/responsibility, not merely causing them to stand physically.
- source_word: ἀπὸ εἰκοσαετοῦς
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years of age
  - twenty years old
  lexicon: LSJ
  rationale: This phrase marks the minimum age for service. 'And upward' is supplied
    idiomatically in English to reflect the age-threshold sense, consistent with the
    construction and the parallel tradition.
- source_word: ἐπὶ τῶν ἔργων τοῦ κυρίου
  chosen: over the works of the Lord
  alternatives:
  - over the work of the Lord
  - for the works of the Lord
  lexicon: LSJ
  rationale: ἐπί with the genitive here indicates supervision or charge over the temple-related
    work. The plural ἔργων is retained as 'works,' though English could smooth to
    singular.
- source_word: ἔστη Ἰησοῦς
  chosen: Jeshua stood
  alternatives:
  - Jeshua took his stand
  - Jeshua arose
  lexicon: LSJ
  rationale: The singular verb introduces the named leaders who present themselves
    for the task. 'Stood' preserves the Greek while remaining natural enough in context.
- source_word: Δαμαδιὴλ
  chosen: Kadmiel
  alternatives:
  - Damadiel
  - Cadmiel
  lexicon: parallel Hebrew tradition / standard English biblical name convention
  rationale: The Greek form in Swete appears as Δαμαδιήλ, but the Ezra/Nehemiah parallel
    and established Semitic name behind the passage support identifying this person
    as Kadmiel. Because personal names are transliterated by standard conventions
    and the MT parallel is to be used as actual input, 'Kadmiel' best reflects the
    underlying name while avoiding a likely Greek orthographic distortion.
- source_word: Ἡμαδαβούν
  chosen: Henadad
  alternatives:
  - Hemadabun
  - Hodaviah
  lexicon: parallel Hebrew tradition / standard English biblical name convention
  rationale: This Greek form reflects the well-known name חֵנָדָד in the Ezra parallel.
    'Henadad' is the most defensible standard transliteration of the underlying Semitic
    name.
- source_word: Ἰούδα τοῦ Εἰλιαδοὺν
  chosen: Judah son of Eliadun
  alternatives:
  - Judah of Eliadun
  - Hodaviah son of Eliadun
  lexicon: LSJ
  rationale: τοῦ naturally marks filiation here, so 'son of' is preferable. The exact
    proper-name tradition is difficult, but the Greek witness supports 'Judah ...
    Eliadun' as translated rather than importing a fuller reconstruction into the
    main text.
- source_word: ὁμοθυμαδόν
  chosen: united
  alternatives:
  - with one accord
  - together
  lexicon: LSJ
  rationale: The adverb expresses shared purpose and coordinated action. 'United'
    captures the sense in readable modern English without archaic phrasing.
- source_word: ἐργοδιῶκται
  chosen: supervisors of the work
  alternatives:
  - overseers of the work
  - taskmasters
  - work directors
  lexicon: LSJ
  rationale: The rare compound denotes those directing or pressing on the work rather
    than manual laborers. 'Supervisors of the work' communicates oversight without
    the harsh connotations of 'taskmasters'.
- source_word: ποιοῦντες εἰς τὰ ἔργα
  chosen: carrying on the works
  alternatives:
  - working at the tasks
  - engaged in the work
  lexicon: LSJ
  rationale: The phrase is somewhat awkward in Greek; the sense is that they were
    actively engaged in advancing the temple work. 'Carrying on the works' preserves
    the plural and the active-progressive force.
- source_word: οἰκοδόμησαν οἱ οἰκοδόμοι
  chosen: the builders built
  alternatives:
  - the builders were building
  - the workmen built
  lexicon: LSJ
  rationale: The cognate verb and noun are retained for transparency and emphasis.
    English allows the repetition, and it mirrors the Greek's straightforward statement.
- source_word: ναὸν τοῦ κυρίου
  chosen: the temple of the Lord
  alternatives:
  - the sanctuary of the Lord
  - the house of the Lord
  lexicon: LSJ
  rationale: ναός specifically denotes the temple/sanctuary. Since the verse already
    uses οἶκος earlier, rendering ναός as 'temple' preserves the distinction.
