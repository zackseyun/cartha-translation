translation:
  text: the sons of Kalamokalos and Onous, seven hundred twenty-five; the sons of
    Jericho, two hundred forty-five;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel at Ezra/Nehemiah tradition differs notably here, reading
      approximately 'the men of Bethel and Ai, two hundred twenty-three.' 1 Esdras
      preserves a different set of names and totals in the Greek witness.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - descendants of
  - members of
  lexicon: LSJ
  rationale: In this census-style list, υἱοὶ is the standard genealogical/grouping
    formula. 'The sons of' preserves the formal structure of the Greek while naturally
    signaling a clan or family group, not necessarily only immediate male children.
- source_word: Καλαμωκάλου
  chosen: Kalamokalos
  alternatives:
  - Calamocalus
  - Kalamocalos
  lexicon: LSJ
  rationale: This is a proper name preserved by transliteration from the Greek witness.
    Because 1 Esdras often diverges from the MT parallel in names and groupings, the
    Greek form should be represented rather than harmonized to the Hebrew parallel.
- source_word: Ὠνούς
  chosen: Onous
  alternatives:
  - Ono
  - Onus
  lexicon: LSJ
  rationale: The Greek form appears as a proper name/place-associated group in coordination
    with Καλαμωκάλου. 'Onous' is a straightforward transliteration of the Greek. Although
    the MT parallel has different place names and numbers, the Greek remains primary
    here.
- source_word: ἑπτακόσιοι εἴκοσι πέντε
  chosen: seven hundred twenty-five
  alternatives:
  - seven hundred and twenty-five
  lexicon: LSJ
  rationale: This is the plain cardinal number in the Greek. The modern English style
    without 'and' fits the project's readable modern English aim.
- source_word: Ἰερήχου
  chosen: Jericho
  alternatives:
  - Jerecho
  lexicon: LSJ
  rationale: This is the familiar place-name form in English. Using 'Jericho' communicates
    the referent clearly while remaining faithful to the Greek proper name.
- source_word: διακόσιοι τεσσεράκοντα πέντε
  chosen: two hundred forty-five
  alternatives:
  - two hundred and forty-five
  lexicon: LSJ
  rationale: This is the straightforward cardinal number in the Greek, rendered in
    readable modern English.
