theological_decisions:
- issue: Relationship between the Greek witness and the approximate MT parallel in
    this census list
  chosen_reading: Translate the Greek names and numbers as given, without harmonizing
    to the MT's 'Bethel and Ai ... two hundred twenty-three.'
  alternative_readings:
  - Conform the verse toward the MT parallel's place names and total
  rationale: The project philosophy gives original-language primacy to the direct
    source witness for deuterocanonical books, here Swete's Greek text of 1 Esdras.
    The MT parallel is explicitly approximate and serves as a sanity check, not as
    the base text. Because this verse shows a major mismatch in names and numbers,
    harmonization would obscure the actual Greek reading.
