translation:
  text: the sons of Dedda, the sons of Bachous, the sons of Serar, the sons of Thomthei,
    the sons of Nasei, the sons of Hatepha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text here lists six family names—Dedda, Bachous, Serar, Thomthei,
      Nasei, and Hatepha—where the approximate Hebrew parallel lists three different
      names (Lebanah, Hagaba, and Akkub). Because 1 Esdras is translated from the
      Greek witness here, the Greek names are retained rather than harmonized to the
      Hebrew parallel.
    reason: alternative_reading
  - marker: b
    text: Several names in this verse are rare and may reflect textual instability
      or transliteration differences in the Greek tradition; the rendering follows
      the provided Greek text conservatively.
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  lexicon: LSJ
  rationale: In this census-style list, υἱοὶ introduces clan or family-group names
    rather than immediate biological sons only. 'The sons of' is the standard transparent
    English rendering for such genealogical enumeration and matches the repeated Greek
    structure.
- source_word: Δεδδά
  chosen: Dedda
  alternatives:
  - Lebbana / Lebanah (from the approximate MT parallel)
  rationale: This is a proper name transliterated directly from the Greek primary
    witness, as required by the translation philosophy. The MT parallel points to
    a different name, showing that 1 Esdras here diverges from the Hebrew parallel;
    the Greek remains primary.
- source_word: Βαχούς
  chosen: Bachous
  alternatives:
  - Hagaba (from the approximate MT parallel)
  rationale: Proper name transliterated from the Greek source. Although the MT parallel
    has a different corresponding name, the Greek witness for 1 Esdras is the translation
    anchor and should not be harmonized to the Hebrew.
- source_word: Σεράρ
  chosen: Serar
  alternatives:
  - Akkub (from the approximate MT parallel)
  rationale: Proper name transliterated from the Greek. The approximate MT parallel
    suggests a different underlying list member, but the Greek text presents Serar
    and should be represented as such.
- source_word: Θόμθει
  chosen: Thomthei
  rationale: Proper name transliterated conservatively from the Greek form. Because
    this is a rare name and the source confidence notes a minor mismatch, a close
    transliteration is preferable to speculative normalization.
- source_word: Νασεί
  chosen: Nasei
  rationale: Proper name transliterated directly from the Greek. No compelling basis
    in the provided sources warrants emendation.
- source_word: Ἁτεφά
  chosen: Hatepha
  alternatives:
  - Atipha
  rationale: Proper name transliterated from the Greek with rough breathing reflected
    by initial H. 'Atipha' is a possible smoother transliteration, but 'Hatepha' more
    transparently tracks the source form.
