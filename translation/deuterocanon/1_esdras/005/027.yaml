translation:
  text: the sons of the temple singers, the sons of Asaph, one hundred twenty-eight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacred singers.' The Greek term refers to singers attached to temple
      worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: LSJ
  rationale: A genealogical/list formula. 'The sons of' preserves the register of
    the census-style enumeration better than the more interpretive 'descendants of.'
- source_word: ἱεροψάλται
  chosen: temple singers
  alternatives:
  - sacred singers
  - singers for the temple
  lexicon: LSJ
  rationale: Compound of sacred/temple-related and singers. 'Temple singers' is clear
    modern English and fits the cultic context without awkwardness. The parallel Hebrew
    in this prompt does not align to this verse, so the Greek term remains primary.
- source_word: υἱοὶ Ἀσάφ
  chosen: the sons of Asaph
  alternatives:
  - the descendants of Asaph
  lexicon: LSJ
  rationale: Proper name is transliterated per project philosophy. Repetition of 'sons
    of' should be retained because the Greek repeats the formula and identifies this
    singer guild by ancestral line.
- source_word: ἑκατὸν εἴκοσι ὀκτώ
  chosen: one hundred twenty-eight
  alternatives:
  - a hundred and twenty-eight
  lexicon: LSJ
  rationale: Cardinal number rendered in standard modern English style.
