translation:
  text: camels four hundred thirty-five, and horses seven thousand thirty-six, mules
    two hundred forty-five, pack animals five thousand five hundred twenty-five.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ὑποζύγια is a broad term for load-bearing or burden-bearing animals;
      alternatively, 'beasts of burden.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel supplied here does not correspond to this verse's content;
      the Greek list is therefore the controlling source for translation.
    reason: textual_variant
lexical_decisions:
- source_word: κάμηλοι
  chosen: camels
  alternatives:
  - dromedaries
  lexicon: LSJ
  rationale: The standard meaning is 'camels.' Nothing in the context requires a narrower
    species distinction such as 'dromedaries.'
- source_word: ἵπποι
  chosen: horses
  lexicon: LSJ
  rationale: Straightforward livestock term; 'horses' is the natural and precise English
    equivalent.
- source_word: ἡμίονοι
  chosen: mules
  alternatives:
  - half-asses
  lexicon: LSJ
  rationale: The Greek term denotes mules. The literal etymological sense is not idiomatic
    in English, so 'mules' best matches normal usage.
- source_word: ὑποζύγια
  chosen: pack animals
  alternatives:
  - beasts of burden
  - draught animals
  lexicon: LSJ
  rationale: The term is broader than a single species and refers to animals under
    the yoke or used for carrying loads. 'Pack animals' is clear modern English and
    preserves the generic sense better than a species-specific rendering.
- source_word: τετρακόσιοι τριάκοντα πέντε
  chosen: four hundred thirty-five
  alternatives:
  - '435'
  rationale: Rendered as words in keeping with the list style of the verse.
- source_word: ἑπτακισχίλιοι τριάκοντα ἕξ
  chosen: seven thousand thirty-six
  alternatives:
  - 7,036
  rationale: The compounded numeral is translated directly and idiomatically into
    English.
- source_word: διακόσιοι τεσσεράκοντα πέντε
  chosen: two hundred forty-five
  alternatives:
  - '245'
  rationale: Direct rendering of the Greek numeral phrase.
- source_word: πεντακισχίλια πεντακόσια εἴκοσι πέντε
  chosen: five thousand five hundred twenty-five
  alternatives:
  - 5,525
  rationale: Direct rendering of the Greek numeral phrase.
