theological_decisions:
- issue: Use of the Greek witness with MT parallel
  chosen_reading: Translate the Greek text as primary while allowing the Ezra parallel
    to clarify the supply-list sense behind the difficult term χάρα.
  alternative_readings:
  - Render χάρα more literally but obscurely
  - Emend fully to the MT-like specific commodity 'oil'
  rationale: Project policy gives Greek primacy for 1 Esdras, but the Hebrew parallel
    may be used as a sanity check. Here the Greek form is awkward in context, and
    the parallel supports understanding the list as practical supplies. The main text
    therefore keeps a cautious, non-overprecise rendering ('provisions') rather than
    importing a specific item absent from the Greek wording.
  doctrine_reference: 'PHILOSOPHY.md: WLC MT parallels for 1 Esdras; Translation philosophy:
    original-language primacy over translation tradition'
