translation:
  text: And they gave silver to the stonecutters and carpenters, and drink and food
    and provisions to the Sidonians and Tyrians, so that they might bring cedar logs
    from Lebanon, transporting them by rafts to the harbor of Joppa, according to
    the written decree given to them by Cyrus king of the Persians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek word rendered 'provisions' is difficult here; the Hebrew parallel
      in Ezra 3:7 specifies 'oil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀργύριον
  chosen: silver
  alternatives:
  - money
  lexicon: LSJ
  rationale: The Greek literally says 'silver.' In payment contexts it can function
    metonymically as 'money,' but 'silver' preserves the source wording and remains
    natural in English.
- source_word: λατόμοις
  chosen: stonecutters
  alternatives:
  - quarrymen
  - masons
  lexicon: LSJ
  rationale: The term denotes workers who cut stone. 'Stonecutters' is clear and direct;
    'masons' could imply builders rather than quarry workers.
- source_word: τέκτοσι
  chosen: carpenters
  alternatives:
  - craftsmen
  - builders
  lexicon: LSJ
  rationale: In this temple-building context the word most naturally refers to woodworkers.
    'Carpenters' is more specific than 'craftsmen' and fits the paired labor categories.
- source_word: ποτὰ
  chosen: drink
  alternatives:
  - beverages
  lexicon: LSJ
  rationale: A straightforward rendering of potable supplies. Singular collective
    'drink' reads naturally in English alongside 'food.'
- source_word: βρωτὰ
  chosen: food
  alternatives:
  - provisions
  - edibles
  lexicon: LSJ
  rationale: The basic sense is things to eat. 'Food' is idiomatic and clear.
- source_word: χάρα
  chosen: provisions
  alternatives:
  - oil
  - gift
  - joy
  lexicon: LSJ
  rationale: The transmitted form is unusual in this context. Given the parallel in
    Ezra 3:7 and the supply-list setting, the sense is best taken as an item of provisions
    rather than an abstract noun like 'joy.' 'Provisions' preserves the general idea
    without overcommitting to a specific commodity not explicit in this Greek form.
- source_word: παράγειν
  chosen: bring
  alternatives:
  - convey
  - transport
  lexicon: LSJ
  rationale: The infinitive expresses causing the timber to come from Lebanon. 'Bring'
    is simple English and fits the purpose clause.
- source_word: ξύλα κέδρινα
  chosen: cedar logs
  alternatives:
  - cedar wood
  - cedar timber
  lexicon: LSJ
  rationale: The phrase refers to cedar timber cut for construction. 'Cedar logs'
    gives a concrete sense suitable to the subsequent transport by rafts.
- source_word: διαφέρειν σχεδίαις
  chosen: transporting them by rafts
  alternatives:
  - floating them on rafts
  - carrying them by rafts
  lexicon: LSJ
  rationale: The phrase describes the means of moving the timber by sea. 'Transporting
    them by rafts' is natural and captures both verb and instrument.
- source_word: Ἰόππης λιμένα
  chosen: the harbor of Joppa
  alternatives:
  - Joppa harbor
  - the port of Joppa
  lexicon: LSJ
  rationale: λιμήν is 'harbor/port.' 'The harbor of Joppa' is a smooth, accurate rendering.
- source_word: πρόσταγμα
  chosen: decree
  alternatives:
  - command
  - authorization
  lexicon: LSJ
  rationale: The word denotes an official order. 'Decree' fits the royal-administrative
    setting better than the more general 'command.'
- source_word: τὸ γραφὲν
  chosen: written
  alternatives:
  - recorded
  - set down in writing
  lexicon: LSJ
  rationale: The participle specifies that the decree was in written form. 'Written
    decree' is concise and faithful.
- source_word: Κύρου τοῦ Περσῶν βασιλέως
  chosen: Cyrus king of the Persians
  alternatives:
  - Cyrus the king of Persia
  - Cyrus, king of Persia
  lexicon: LSJ
  rationale: The genitive plural 'of the Persians' is preserved rather than flattened
    to the singular territorial expression, since that is what the Greek says.
