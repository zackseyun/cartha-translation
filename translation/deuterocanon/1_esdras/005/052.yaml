translation:
  text: And all who had vowed a vow to God began, from the new moon of the first month,
    to offer sacrifices to God, though the temple of God had not yet been built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and the temple of God was not yet built.' The English
      main text uses 'though' to bring out the likely concessive sense of the Greek
      coordination.
    reason: lexical_alternative
  - marker: b
    text: The parallel Hebrew text in Ezra differs here, speaking of the Feast of
      Booths and the prescribed daily burnt offerings. 1 Esdras preserves a distinct
      Greek wording, which is followed in the main text.
    reason: cross_reference
lexical_decisions:
- source_word: ὅσοι
  chosen: all who
  alternatives:
  - as many as
  - those who
  lexicon: LSJ
  rationale: The relative pronoun with indefinite force introduces a group broadly.
    'All who' is natural English and preserves the inclusive scope better than the
    more wooden 'as many as.'
- source_word: εὔξαντο εὐχήν
  chosen: had vowed a vow
  alternatives:
  - made a vow
  - prayed a prayer
  lexicon: LSJ
  rationale: The cognate verb-object construction denotes making a vow, not merely
    praying. 'Had vowed a vow' preserves the emphatic Hebrew-like idiom reflected
    in the Greek; 'made a vow' is possible but slightly flattens the form.
- source_word: τῷ θεῷ
  chosen: to God
  lexicon: LSJ
  rationale: Straightforward dative of reference/object with the vow and again with
    the sacrifices. No contextual reason to vary the gloss.
- source_word: ἀπὸ τῆς νουμηνίας
  chosen: from the new moon
  alternatives:
  - from the first day of the month
  - from the new-moon day
  lexicon: LSJ
  rationale: νουμηνία refers specifically to the new moon / new-moon festival marking
    the month's beginning. 'From the new moon' preserves the cultic-calendar sense
    better than the generic 'first day of the month.'
- source_word: τοῦ πρώτου μηνός
  chosen: of the first month
  lexicon: LSJ
  rationale: A direct genitival specification of the calendrical time. Retained formally
    because it is clear in English.
- source_word: ἤρξαντο προσφέρειν
  chosen: began ... to offer
  alternatives:
  - started offering
  - began offering up
  lexicon: LSJ
  rationale: The ingressive aorist plus infinitive marks the commencement of sacrificial
    activity. 'Began to offer' is idiomatic and sufficiently formal.
- source_word: θυσίας
  chosen: sacrifices
  alternatives:
  - offerings
  lexicon: LSJ
  rationale: θυσίαι are sacrificial offerings specifically. 'Sacrifices' is more precise
    than the broader 'offerings.'
- source_word: καὶ ὁ ναὸς τοῦ θεοῦ οὔπω ᾠκοδόμητο
  chosen: though the temple of God had not yet been built
  alternatives:
  - and the temple of God was not yet built
  - even though the temple of God had not yet been rebuilt
  lexicon: LSJ
  rationale: 'The clause is formally coordinated with καί, but in context it is concessive:
    sacrifices began despite the temple not yet being built. English ''though'' makes
    the relationship clear without adding content. ''Built'' is preferred over ''rebuilt''
    because the Greek simply says ''built,'' even if the historical context implies
    reconstruction.'
