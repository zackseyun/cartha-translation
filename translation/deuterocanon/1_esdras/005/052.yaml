theological_decisions:
- issue: Concessive force of the final clause introduced by καί
  chosen_reading: 'Render the clause concessively: ''though the temple of God had
    not yet been built.'''
  alternative_readings:
  - 'Render with simple coordination: ''and the temple of God was not yet built.'''
  rationale: 'The Greek uses καί, but the narrative logic highlights a tension: sacrificial
    worship resumes before temple construction. English concessive wording best communicates
    the sense while remaining faithful to the context.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Relation to the MT parallel in Ezra 3
  chosen_reading: Retain the Greek statement about vows and the not-yet-built temple
    as the main text.
  alternative_readings:
  - Conform more closely to the MT parallel about the Feast of Booths and daily burnt
    offerings.
  rationale: The project's deuterocanonical policy gives primacy to the Greek text
    of 1 Esdras while using the Hebrew parallel as a sanity check. Here the Greek
    wording differs materially from the approximate MT parallel, so the translation
    must follow the Greek rather than harmonize it to Ezra 3.
  doctrine_reference: PHILOSOPHY.md 'Deuterocanonical / Apocrypha' and 'Original-language
    primacy over translation tradition'
