translation:
  text: And Darius sent with them a thousand horsemen, until they had restored them
    to Jerusalem in peace and with music,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with musicians.” The Greek μουσικῶν can refer either to music generally
      or to musical performers.
    reason: lexical_alternative
lexical_decisions:
- source_word: συναπέστειλεν
  chosen: sent with
  alternatives:
  - sent along with
  - dispatched together with
  lexicon: LSJ
  rationale: The compound verb indicates sending companions along with the main party.
    'Sent with' is concise modern English and preserves the accompanying force without
    overformal wording.
- source_word: ἱππεῖς χιλίους
  chosen: a thousand horsemen
  alternatives:
  - one thousand cavalrymen
  - a thousand riders
  lexicon: LSJ
  rationale: ἱππεῖς refers to mounted troops rather than merely riders. 'Horsemen'
    is natural and sufficiently military in context.
- source_word: ἕως τοῦ ἀποκαταστῆσαι
  chosen: until they had restored
  alternatives:
  - until they had brought back
  - until they had reestablished
  - for the purpose of restoring
  lexicon: LSJ
  rationale: The construction can express goal or extent up to the completion of an
    action. In context, the horsemen accompany the group until the return is accomplished.
    'Restored' reflects ἀποκαθίστημι's sense of bringing back to a prior place or
    condition, here effectively returning them to Jerusalem.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - these men
  - the returnees
  lexicon: Greek grammar/context
  rationale: The pronoun's referent is the group being escorted. 'Them' is the direct
    and unobtrusive rendering.
- source_word: μετʼ εἰρήνης
  chosen: in peace
  alternatives:
  - safely
  - peacefully
  lexicon: LSJ
  rationale: The phrase can imply safe, unharmed arrival, but 'in peace' preserves
    the Greek idiom and its broader sense without flattening it to mere physical safety.
- source_word: μετὰ μουσικῶν
  chosen: with music
  alternatives:
  - with musicians
  - with musical celebration
  lexicon: LSJ
  rationale: μουσικῶν may denote musical elements or performers. The bare phrase 'with
    music' best matches the transmitted wording while remaining readable; the possibility
    of 'with musicians' is worth preserving in a footnote.
