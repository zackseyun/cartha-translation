translation:
  text: to offer burnt offerings on it, in accordance with what is prescribed in the
    book of Moses, the man of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Ezra 3:2 reads, 'as it is written in the law of Moses,
      the man of God.' 1 Esdras here uses 'the book of Moses' and 'what is prescribed,'
      expressing the same basic sense with different wording.
    reason: alternative_reading
lexical_decisions:
- source_word: προσενέγκαι
  chosen: to offer
  alternatives:
  - to bring
  - to present
  lexicon: BDAG
  rationale: In sacrificial context with ὁλοκαυτώματα, the infinitive naturally means
    offering sacrifices rather than merely bringing them. 'Offer' is idiomatic and
    precise in English.
- source_word: ἐπ’ αὐτοῦ
  chosen: on it
  alternatives:
  - upon it
  lexicon: BDAG
  rationale: Refers to the altar from the previous context. 'On it' is natural modern
    English and preserves the local sense of sacrifice being offered on the altar.
- source_word: ὁλοκαυτώματα
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: LEH
  rationale: Standard rendering for sacrificial offerings wholly consumed by fire.
    'Whole burnt offerings' is more explicit but less natural; the Hebrew parallel
    עֹלוֹת supports 'burnt offerings.'
- source_word: ἀκολούθως
  chosen: in accordance with
  alternatives:
  - according to
  - following
  lexicon: LSJ
  rationale: The adverb conveys conformity to a standard. 'In accordance with' reads
    smoothly in English while preserving the sense of regulated conformity.
- source_word: τοῖς ... διηγορευμένοις
  chosen: what is prescribed
  alternatives:
  - the things commanded
  - what has been directed
  - what is set forth
  lexicon: LSJ
  rationale: The participle denotes matters authoritatively specified or prescribed.
    'What is prescribed' fits the legal-sacrificial context and avoids over-wooden
    phrasing.
- source_word: ἐν τῇ Μωσέως βίβλῳ
  chosen: in the book of Moses
  alternatives:
  - in Moses' book
  - in the scroll of Moses
  lexicon: LEH
  rationale: βίβλος can mean book or scroll, but 'book of Moses' is the most idiomatic
    and recognizable English rendering. The Hebrew parallel has 'in the law of Moses';
    the Greek here specifically says 'book.'
- source_word: τοῦ ἀνθρώπου τοῦ θεοῦ
  chosen: the man of God
  alternatives:
  - God's man
  lexicon: LEH
  rationale: A standard biblical title for Moses. The rendering is formal enough to
    preserve the title's weight and matches the Hebrew parallel אִישׁ־הָאֱלֹהִים.
