theological_decisions:
- issue: Relation of Greek wording to the Hebrew parallel in Ezra 3:2
  chosen_reading: Retain the Greek expression 'book of Moses' while reflecting the
    same legal force as the Hebrew parallel.
  alternative_readings:
  - Translate toward the MT parallel as 'as it is written in the law of Moses, the
    man of God'
  rationale: The Greek source is primary for 1 Esdras, and it reads 'in the book of
    Moses ... [the things] prescribed,' not the exact MT wording 'as it is written
    in the law of Moses.' The translation therefore stays anchored in the Greek while
    allowing the Hebrew parallel to confirm the sacrificial-legal sense.
  doctrine_reference: 'PHILOSOPHY.md: Greek source primacy for deuterocanonical books;
    WLC parallel used as translation input but not to override the Greek'
