translation:
  text: And each returned to Jerusalem and the rest of Judea, each to his own city—the
    ones who had come with Zerubbabel and Jeshua, Nehemiah, Zareiah, Resaiah, Enenius,
    Mordecai, Beelsarus, Aspharasus, Boroelius, Roimus, and Baanah, their leaders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several names in this list differ in form from the approximate Hebrew parallel
      in Ezra/Nehemiah. The translation follows the Greek text of 1 Esdras rather
      than normalizing them to the Hebrew forms.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπέστρεψεν
  chosen: returned
  alternatives:
  - went back
  - turned back
  lexicon: LSJ
  rationale: The verb denotes returning to a prior place. 'Returned' is idiomatic
    in English and fits the resettlement context better than the more wooden 'turned
    back.'
- source_word: τὴν λοιπὴν Ἰουδαίαν
  chosen: the rest of Judea
  alternatives:
  - the remaining Judea
  - the rest of Judaea
  lexicon: LSJ
  rationale: λοιπή means 'remaining' or 'rest.' 'The rest of Judea' is natural English
    and preserves the contrast with Jerusalem. Spelling 'Judea' follows standard modern
    English convention.
- source_word: ἕκαστος εἰς τὴν ἰδίαν πόλιν
  chosen: each to his own city
  alternatives:
  - each to his own town
  - each to his own city
  lexicon: LSJ
  rationale: πόλις commonly means 'city,' though some settlements may have been towns.
    'City' keeps closer formal correspondence. The masculine singular 'his own' reflects
    the distributive singular ἕκαστος in line with the project's gender-accurate policy.
- source_word: οἱ ἐλθόντες
  chosen: the ones who had come
  alternatives:
  - those who came
  - those having come
  lexicon: LSJ
  rationale: The articular participle identifies the group being described. 'The ones
    who had come' makes the participial force clear in smooth English.
- source_word: μετὰ
  chosen: with
  alternatives:
  - along with
  lexicon: LSJ
  rationale: Simple accompaniment is intended in the list of return leaders.
- source_word: Ζοροβαβὲλ καὶ Ἰησοῦ
  chosen: Zerubbabel and Jeshua
  alternatives:
  - Zorobabel and Jesus
  - Zerubbabel and Joshua
  lexicon: LSJ
  rationale: These are standard English transliterations for the postexilic leaders
    in this context. 'Jeshua' avoids confusion with Jesus and matches the historical
    figure known from Ezra/Nehemiah.
- source_word: τῶν προηγουμένων αὐτῶν
  chosen: their leaders
  alternatives:
  - those leading them
  - their chiefs
  - their predecessors
  lexicon: LSJ
  rationale: προηγουμένων here most naturally means those going before them, i.e.,
    leaders. 'Predecessors' would misread the social function; 'leaders' is concise
    and contextually apt.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: LSJ
  rationale: Standard English transliteration of the place name.
- source_word: proper-name list
  chosen: Nehemiah, Zareiah, Resaiah, Enenius, Mordecai, Beelsarus, Aspharasus, Boroelius,
    Roimus, and Baanah
  alternatives:
  - forms aligned more closely to MT parallels in Ezra/Nehemiah
  rationale: The Greek of 1 Esdras preserves a distinct sequence and forms of names.
    Because the Greek is the primary source, the translation follows its transliterated
    names rather than normalizing them to the approximate MT parallel, while recognizing
    that some names correspond to better-known Hebrew forms.
