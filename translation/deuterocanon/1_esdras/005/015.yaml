translation:
  text: The sons of Azeir Ezekias, the sons of Keilan and Azetas, sixty-seven; the
    sons of Azaros, four hundred thirty-two.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek names in this verse differ notably from the approximate Masoretic
      parallel, which reads instead 'the sons of Adin, four hundred fifty-four' in
      the corresponding list location. Because 1 Esdras often reorders or reshapes
      these returnee lists, the Greek witness is followed here rather than harmonizing
      to the Hebrew parallel.
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the family of
  lexicon: LSJ
  rationale: In this census-style list, υἱοὶ functions as a genealogical/clan formula.
    'The sons of' preserves the formal structure of the Greek and matches the register
    of numbered returnee lists better than a more interpretive paraphrase.
- source_word: Ἀζὴρ Ἐζεκίου
  chosen: Azeir Ezekias
  alternatives:
  - Azir Ezekias
  - Azer Hezekiah
  rationale: These are proper names in transliterated Greek form. Following project
    policy, names are transliterated rather than translated. The exact underlying
    Semitic form is uncertain here, and the MT parallel does not directly support
    normalizing them to a different Hebrew name in the main text.
- source_word: Κειλὰν
  chosen: Keilan
  alternatives:
  - Keila
  - Keilan
  rationale: Proper name transliterated from the Greek. The accusative/formal ending
    does not require anglicizing to a more familiar Hebrew place or family name without
    stronger evidence.
- source_word: Ἀζητάς
  chosen: Azetas
  alternatives:
  - Azetas
  - Azeta
  rationale: Proper name transliterated directly from the Greek witness. Because the
    source validation flags a major mismatch with the MT parallel, the Greek form
    should be preserved rather than harmonized.
- source_word: ἐξήκοντα ἑπτά
  chosen: sixty-seven
  alternatives:
  - '67'
  lexicon: LSJ
  rationale: Cardinal number rendered in standard English words for readability while
    preserving the exact count.
- source_word: Ἀζάρου
  chosen: Azaros
  alternatives:
  - Azar
  - Azaru
  rationale: Genitive proper name rendered by a straightforward transliteration of
    the Greek form. Although the MT parallel in Ezra/Nehemiah traditions often has
    different names and numbers in nearby list material, the Greek remains primary
    for 1 Esdras.
- source_word: τετρακόσιοι τριάκοντα δύο
  chosen: four hundred thirty-two
  alternatives:
  - '432'
  lexicon: LSJ
  rationale: Cardinal number translated directly and idiomatically into English.
