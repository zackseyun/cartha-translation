translation:
  text: the sons of Solomon’s servants, the sons of Assapheioth, the sons of Phaerida,
    the sons of Jeelei, the sons of Lozon, the sons of Isdael, the sons of Saphuei,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek lists several family names here that differ markedly from the
      approximate MT parallel, which has a shorter list: ''the sons of Giddel, the
      sons of Gahar, the sons of Reaiah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  lexicon: LSJ
  rationale: Repeated genealogical formula. English includes the article at the start
    for naturalness in a list while preserving the formal register of descent language.
- source_word: παίδων Σαλωμών
  chosen: Solomon’s servants
  alternatives:
  - the servants of Solomon
  - Solomon’s slaves
  lexicon: LSJ
  rationale: The genitival phrase means 'servants/slaves of Solomon.' In this administrative-genealogical
    context, 'servants' is the most natural and traditional English rendering; the
    text identifies the class known elsewhere as the descendants of Solomon’s servants
    rather than making a theological point about bondage.
- source_word: Σαλωμών
  chosen: Solomon
  lexicon: LSJ
  rationale: Standard English transliteration of the royal name.
- source_word: Ἀσσαφειώθ
  chosen: Assapheioth
  alternatives:
  - Asapheioth
  - Assaphioth
  rationale: Proper name transliterated directly from the Greek witness. The exact
    English form is uncertain because this is a Greek rendering of a name not matching
    the MT parallel here; preserving the Greek-based form is the most transparent
    choice.
- source_word: Φαρειδά
  chosen: Phaerida
  alternatives:
  - Pharida
  - Pherida
  rationale: Proper name transliterated from Greek. 'Ph' preserves phi in standard
    transliteration; vowel sequence follows the Greek form rather than harmonizing
    to a Hebrew parallel.
- source_word: Ἰεηλεί
  chosen: Jeelei
  alternatives:
  - Ieelei
  - Jeelei
  rationale: Proper name transliterated from Greek. Initial iota is rendered with
    English J in line with common biblical-name conventions for readability.
- source_word: Λοζών
  chosen: Lozon
  alternatives:
  - Lozōn
  - Lozon
  rationale: Proper name transliterated straightforwardly from Greek.
- source_word: Ἰσδαήλ
  chosen: Isdael
  alternatives:
  - Isdaēl
  - Jisdael
  rationale: Proper name transliterated from Greek; retained as given rather than
    assimilated to a more familiar Hebrew-looking form.
- source_word: Σαφυεί
  chosen: Saphuei
  alternatives:
  - Saphyei
  - Saphuei
  rationale: Proper name transliterated from Greek. The form is uncommon, so a close
    transliteration best preserves auditability.
