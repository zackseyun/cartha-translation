theological_decisions:
- issue: Relationship between the Greek list and the MT parallel in Nehemiah 7:57
  chosen_reading: Translate the Greek list of names as it stands, while recognizing
    that the MT parallel preserves a shorter and substantially different set of names.
  alternative_readings:
  - 'Harmonize the names toward the MT parallel: Giddel, Gahar, Reaiah'
  rationale: The project’s deuterocanonical policy gives primacy to the Swete Greek
    for 1 Esdras, with the Hebrew parallel used as a sanity check rather than as a
    control text. Because the Greek here presents a fuller, different list, the translation
    should reflect the Greek witness and preserve the MT difference in a footnote
    rather than silently harmonizing.
  doctrine_reference: 'PHILOSOPHY.md: WLC MT parallels for 1 Esdras; Translation philosophy
    §1 original-language primacy over translation tradition'
