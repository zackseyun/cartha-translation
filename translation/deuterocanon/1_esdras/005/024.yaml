translation:
  text: 'The priests: the sons of Jeddus, the son of Jeshua, of the sons of Sanabeis,
    eight hundred seventy-two; the sons of Emerus, two hundred fifty-two.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has 'among the sons of Sanabeis.' The construction is unusual in this
      census list; it likely marks family affiliation rather than motion or purpose.
    reason: lexical_alternative
  - marker: b
    text: The Greek name 'Emerus' may correspond to the priestly family elsewhere
      known in Hebrew tradition as 'Emmer.' The main text follows the Greek witness
      directly.
    reason: alternative_reading
  - marker: c
    text: The MT parallel supplied for this location does not match this Greek line
      closely, reflecting the known reordering and recomposition in 1 Esdras. The
      translation therefore follows the Greek as primary.
    reason: textual_variant
lexical_decisions:
- source_word: οἱ ἱερεῖς
  chosen: The priests
  alternatives:
  - the priestly families
  - the priestly descendants
  lexicon: LSJ
  rationale: The article plus noun introduces a subgroup within the census list. 'The
    priests' is the most direct and natural rendering in English while preserving
    the list structure.
- source_word: οἱ υἱοὶ Ἰέδδου
  chosen: the sons of Jeddus
  alternatives:
  - the descendants of Jeddus
  lexicon: LSJ
  rationale: υἱοὶ in genealogical/census contexts commonly means descendants, but
    'sons of' preserves the formal list style and keeps the genealogical idiom visible.
- source_word: τοῦ υἱοῦ Ἰησοῦ
  chosen: the son of Jeshua
  alternatives:
  - son of Jesus
  lexicon: LSJ
  rationale: Ἰησοῦ here reflects the Hebrew name Joshua/Jeshua, not the later English
    form 'Jesus' in this postexilic genealogy. 'Jeshua' best matches the historical
    setting and common English convention for Ezra-Nehemiah contexts.
- source_word: εἰς τοὺς υἱοὺς Σαναβείς
  chosen: among the sons of Sanabeis
  alternatives:
  - belonging to the sons of Sanabeis
  - for the sons of Sanabeis
  lexicon: LSJ
  rationale: The preposition εἰς is awkward in this census formula and likely reflects
    list syntax rather than directional sense. 'Among' gives a restrained English
    rendering that signals affiliation within the priestly grouping without overinterpreting
    the construction.
- source_word: ὀκτακόσιοι ἑβδομήκοντα δύο
  chosen: eight hundred seventy-two
  alternatives:
  - '872'
  lexicon: LSJ
  rationale: Cardinal number rendered straightforwardly in readable modern English.
- source_word: υἱοὶ Ἐρμήρου
  chosen: the sons of Emerus
  alternatives:
  - the sons of Emmer
  - the descendants of Emerus
  lexicon: LSJ
  rationale: The Greek form Ἐρμήρου is transliterated directly from the Zone 1 Greek
    witness. Because the MT parallel for this verse is only approximate and does not
    align directly with these names, the Greek name should control the main text.
    A more Hebraized equivalent such as 'Emmer' is worth preserving only as an alternative.
- source_word: διακόσιοι πεντήκοντα δύο
  chosen: two hundred fifty-two
  alternatives:
  - '252'
  lexicon: LSJ
  rationale: Cardinal number rendered directly and idiomatically.
