translation:
  text: And after these, the regular offerings, and the sacrifices for Sabbaths and
    new moons and all the consecrated feasts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the continual offerings.' The Greek term behind 'regular' can denote
      offerings made continuously or on a fixed recurring basis.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in Ezra emphasizes the burnt offering 'day by day, according
      to the number required for each day.' First Esdras here presents a broader summary
      of the regular sacred calendar.
    reason: cross_reference
lexical_decisions:
- source_word: μετὰ ταῦτα
  chosen: after these
  alternatives:
  - after this
  - afterward
  lexicon: LSJ
  rationale: A straightforward temporal transition. The plural ταῦτα is best preserved
    as 'these,' referring back to the preceding acts already described.
- source_word: προσφορὰς
  chosen: offerings
  alternatives:
  - oblations
  - presentations
  lexicon: LSJ
  rationale: '''Offerings'' is the natural modern English equivalent and broad enough
    to cover cultic presentation without unnecessary archaism.'
- source_word: ἐνδελεχισμοῦ
  chosen: regular
  alternatives:
  - continual
  - daily
  - perpetual
  lexicon: LSJ
  rationale: The term denotes continuity or regular recurrence in sacrificial practice.
    'Regular' gives clear modern English while preserving the sense of prescribed
    ongoing offerings. 'Continual' is possible, but 'regular' better fits the likely
    cultic schedule in context and reads naturally with the MT parallel's day-by-day
    pattern.
- source_word: θυσίας
  chosen: sacrifices
  alternatives:
  - offerings
  lexicon: LSJ
  rationale: Here a more specific sacrificial term follows the broader προσφοραί,
    so rendering it as 'sacrifices' preserves the lexical distinction.
- source_word: σαββάτων
  chosen: Sabbaths
  alternatives:
  - the Sabbath days
  lexicon: LSJ
  rationale: The plural is retained, matching Greek usage for recurring Sabbath observances.
- source_word: νουμηνιῶν
  chosen: new moons
  alternatives:
  - new moon festivals
  lexicon: LSJ
  rationale: The term refers to the monthly new-moon observances. 'New moons' is the
    standard concise rendering; the festal sense is implicit in the cultic list.
- source_word: ἑορτῶν
  chosen: feasts
  alternatives:
  - festivals
  - appointed feasts
  lexicon: LSJ
  rationale: In a cultic calendar context, 'feasts' is idiomatic and concise. 'Festivals'
    is possible, but 'feasts' better matches traditional biblical calendrical language
    without becoming archaic.
- source_word: πασῶν ἡγιασμένων
  chosen: all the consecrated
  alternatives:
  - all the holy
  - all the sanctified
  lexicon: LSJ
  rationale: The participle marks these feasts as set apart. 'Consecrated' preserves
    that cultic nuance more precisely than the flatter 'holy.'
