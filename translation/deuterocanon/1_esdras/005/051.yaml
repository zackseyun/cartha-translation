theological_decisions:
- issue: Cultic calendar terminology in a deuterocanonical/LXX context with MT parallel
  chosen_reading: 'Rendered the sequence as a list of prescribed worship observances:
    ''the regular offerings, and the sacrifices for Sabbaths and new moons and all
    the consecrated feasts.'''
  alternative_readings:
  - '''continual offerings'' for προσφορὰς ἐνδελεχισμοῦ'
  - '''appointed feasts'' for ἑορτῶν ... ἡγιασμένων'
  rationale: The Greek text is somewhat compressed and differs from the approximate
    MT parallel, which emphasizes the day-by-day burnt offering during Booths. Because
    the Greek is the primary witness, the translation follows its broader cultic list
    while allowing the MT to inform the sense of recurring prescribed offerings. No
    doctrinally contested term from DOCTRINE.md governs this verse, so the main task
    is to preserve the liturgical sequence without overharmonizing to the Hebrew parallel.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; WLC MT parallels for 1 Esdras are secondary sanity checks, not controlling
    over the Greek.'
