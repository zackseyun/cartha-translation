translation:
  text: The house was completed by the twenty-third day of the month Adar, in the
    sixth year of King Darius.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'until the third and twentieth of the month Adar.'
    reason: lexical_alternative
  - marker: b
    text: That is, the temple; the Greek text reads simply 'the house.'
    reason: cross_reference
lexical_decisions:
- source_word: συνετελέσθη
  chosen: was completed
  alternatives:
  - was finished
  - was brought to completion
  lexicon: BDAG
  rationale: Aorist passive of συντελέω indicates the house reached completion. 'Was
    completed' is natural modern English and preserves the passive sense.
- source_word: ὁ οἶκος
  chosen: the house
  alternatives:
  - the temple
  - the house of God
  lexicon: BDAG
  rationale: The Greek text here simply says 'the house.' In this context it refers
    to the temple, but retaining 'house' preserves the source wording while remaining
    intelligible. The temple referent is clear from context and the broader narrative.
- source_word: ἕως τρίτης καὶ εἰκάδος
  chosen: by the twenty-third day
  alternatives:
  - until the twenty-third day
  - on the twenty-third day
  lexicon: LSJ
  rationale: The idiom literally means 'until the third and twentieth,' i.e., the
    twenty-third. 'By the twenty-third day' best captures ἕως with the sense that
    completion had been reached by that date.
- source_word: μηνὸς Ἀδὰρ
  chosen: of the month Adar
  alternatives:
  - of Adar
  lexicon: LSJ
  rationale: A straightforward genitival date formula. 'Adar' is transliterated as
    a proper month name.
- source_word: τοῦ ἕκτου ἔτους
  chosen: in the sixth year
  alternatives:
  - of the sixth year
  lexicon: BDAG
  rationale: This is standard regnal-year dating. 'In the sixth year' is idiomatic
    English.
- source_word: βασιλέως Δαρείου
  chosen: of King Darius
  alternatives:
  - of Darius the king
  lexicon: BDAG
  rationale: Genitive construction identifying the regnal year. 'King Darius' is clear,
    concise, and faithful.
