translation:
  text: because he had turned the counsel of the king of Assyria toward them, to strengthen
    their hands in the work of the Lord, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek and the Hebrew parallel both read 'king of Assyria,' though the broader
      Ezra context concerns the Persian ruler; the translation preserves the source
      wording rather than harmonizing it.
    reason: alternative_reading
lexical_decisions:
- source_word: μετέστρεψεν
  chosen: had turned
  alternatives:
  - turned
  - changed
  - redirected
  lexicon: BDAG
  rationale: The aorist verb denotes turning or changing. 'Had turned' fits the causal
    clause introduced by ὅτι and reads naturally in English while preserving the sense
    of divine reversal/redirecting.
- source_word: βουλήν
  chosen: counsel
  alternatives:
  - purpose
  - plan
  - mind
  lexicon: BDAG
  rationale: βουλή can mean counsel, purpose, or plan. 'Counsel' preserves the deliberative
    sense of the king's disposition while remaining close to the Greek. 'Plan' would
    also work, but 'counsel' better matches the formal tone.
- source_word: τοῦ βασιλέως Ἀσσυρίων
  chosen: of the king of Assyria
  alternatives:
  - of the Assyrian king
  lexicon: BDAG
  rationale: The Greek literally reads 'of the king of Assyrians/Assyria.' The MT
    parallel also has 'king of Assyria.' Although the historical referent in Ezra
    is the Persian ruler, the Greek witness here should be translated as it stands
    rather than harmonized away.
- source_word: ἐπʼ αὐτούς
  chosen: toward them
  alternatives:
  - upon them
  - in their favor
  lexicon: BDAG
  rationale: The preposition with accusative here indicates direction toward the people.
    Given the positive result clause, 'toward them' conveys favorable orientation
    without over-interpreting as 'in their favor' in the main text.
- source_word: κατισχῦσαι τὰς χεῖρας αὐτῶν
  chosen: to strengthen their hands
  alternatives:
  - to make their hands strong
  - to encourage them
  lexicon: BDAG
  rationale: This idiom is well supported by the Hebrew parallel לְחַזֵּק יְדֵיהֶם.
    'To strengthen their hands' preserves the biblical idiom and remains understandable
    in modern English.
- source_word: τὰ ἔργα Κυρίου θεοῦ Ἰσραήλ
  chosen: the work of the Lord, the God of Israel
  alternatives:
  - the works of the Lord God of Israel
  - the work of the house of God, the God of Israel
  lexicon: BDAG
  rationale: The Greek has singular 'the work' and names 'Lord, God of Israel.' The
    MT parallel specifies 'the work of the house of God.' Since the Greek is primary,
    the translation follows its wording. 'Lord' follows the project's default for
    κύριος.
