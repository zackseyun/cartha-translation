theological_decisions:
- issue: Rendering κύριος
  chosen_reading: Lord
  alternative_readings:
  - LORD
  rationale: The Greek source has Κυρίου, not the Hebrew divine name directly. Per
    doctrine, κύριος is rendered 'Lord.' The Hebrew parallel reflects the divine actor
    as YHWH, but the main text follows the Greek witness.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Historical title 'king of Assyria' versus harmonization to Persian king
  chosen_reading: retain 'king of Assyria' in the main text
  alternative_readings:
  - king of Persia
  - the king
  rationale: The Greek and MT parallel both preserve 'king of Assyria' as a conventional
    or inherited designation in this context. Translating it away would import harmonization
    not present in the source text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
    over translation tradition
