theological_decisions:
- issue: Whether to make the implicit Passover object explicit in English
  chosen_reading: 'Leave the object implicit: ''ate'''
  alternative_readings:
  - ate the Passover
  - partook of it
  rationale: The immediate context makes the meal clear, but this verse itself does
    not name the object. To avoid paraphrastic expansion beyond the Greek, the translation
    leaves it implicit.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants.'
- issue: How to render the covenantal separation language
  chosen_reading: '''had separated themselves from the abominations of the nations
    of the land'''
  alternative_readings:
  - '''had separated themselves from the uncleanness of the peoples of the land'''
  - '''had set themselves apart from the detestable practices of the peoples of the
    land'''
  rationale: The Greek emphasizes separation from defiling abominations associated
    with surrounding nations/peoples. The chosen rendering preserves the moral-cultic
    force without softening it into mere social distinction.
  doctrine_reference: 'Translation philosophy: Preserve theological weight without
    importing claims the text does not make.'
