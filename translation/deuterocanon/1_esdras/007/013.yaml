translation:
  text: And the sons of Israel from the captivity ate, all those who had separated
    themselves from the abominations of the nations of the land, seeking the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, they ate the Passover meal; the object is implicit in the Greek
      from the preceding context.
    reason: cross_reference
  - marker: b
    text: Or 'the peoples of the land.' The phrase refers to the surrounding inhabitants
      whose practices were regarded as defiling.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφάγοσαν
  chosen: ate
  alternatives:
  - ate it
  - partook
  lexicon: LSJ
  rationale: The verb simply means 'ate.' Although the object is implicit from the
    context (the Passover meal in the preceding verse), the Greek does not state the
    object here, so 'ate' preserves the wording without over-supplying.
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: A formally transparent rendering preserves the idiom and matches the
    Greek wording. 'Israelites' is possible, but 'sons of Israel' keeps the source
    texture and the genealogical/covenantal nuance.
- source_word: οἱ ἐκ τῆς αἰχμαλωσίας
  chosen: from the captivity
  alternatives:
  - who were from the exile
  - the returned exiles
  lexicon: LSJ
  rationale: The phrase identifies this group as those belonging to or coming from
    the captivity/exile. 'From the captivity' is close to the Greek and avoids importing
    'returned,' which is contextually true but not explicit in the phrase itself.
- source_word: χωρισθέντες
  chosen: had separated themselves
  alternatives:
  - were separated
  - set themselves apart
  lexicon: LSJ
  rationale: 'The passive participle in context is best rendered with middle/reflexive
    force in English: these people separated themselves from impurity. This also aligns
    with the covenantal sense of deliberate separation.'
- source_word: βδελυγμάτων
  chosen: abominations
  alternatives:
  - detestable practices
  - impurities
  lexicon: LSJ
  rationale: '''Abominations'' is the standard strong rendering for cultic/moral defilements
    and preserves the severity of the Greek term.'
- source_word: τῶν ἐθνῶν τῆς γῆς
  chosen: of the nations of the land
  alternatives:
  - of the peoples of the land
  - of the Gentiles of the land
  lexicon: LSJ
  rationale: The genitive phrase likely refers to the surrounding peoples inhabiting
    the land. 'Nations of the land' is literal and avoids over-interpreting ἐθνῶν
    as 'Gentiles' in a later technical sense.
- source_word: ζητοῦντες τὸν κύριον
  chosen: seeking the Lord
  alternatives:
  - to seek the Lord
  - while seeking the Lord
  lexicon: LSJ
  rationale: The participle expresses the religious orientation of those included
    in the meal. 'Seeking the Lord' is idiomatic and preserves the ongoing/devotional
    force. κύριον follows the project's default 'Lord'.
