translation:
  text: And the priests and the Levites stood arrayed by divisions for the works of
    the Lord God of Israel, in accordance with the book of Moses, and the gatekeepers
    at each gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to tribes.' The Greek reads literally 'by tribes,' likely
      referring to the ordered divisions of priestly and Levitical service.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel emphasizes strengthening their hands in the work of
      the house of God; the Greek here focuses on the priests' and Levites' ordered
      placement for the Lord God's works.
    reason: cross_reference
lexical_decisions:
- source_word: ἔστησαν
  chosen: stood
  alternatives:
  - took their stand
  - were stationed
  lexicon: LSJ
  rationale: Basic narrative verb meaning 'stood' or 'took their place.' 'Stood' is
    natural English and leaves room for the following description of ordered placement.
- source_word: ἐστολισμένοι
  chosen: arrayed
  alternatives:
  - clothed
  - adorned
  - vested
  lexicon: LSJ
  rationale: The participle indicates being equipped or dressed in proper order. 'Arrayed'
    conveys formal, ceremonial readiness without over-specifying priestly vestments
    not explicit in the Greek.
- source_word: κατὰ φυλάς
  chosen: by divisions
  alternatives:
  - according to tribes
  - by courses
  lexicon: LSJ
  rationale: Literally 'according to tribes,' but in this cultic-organizational context
    it refers to ordered groupings for service. 'By divisions' communicates structured
    assignment more clearly in English. 'According to tribes' is preserved as an alternative
    because the Greek term is φυλαί.
- source_word: ἐπὶ τῶν ἔργων
  chosen: for the works
  alternatives:
  - over the works
  - for the service
  - for the duties
  lexicon: LSJ
  rationale: ἐπί with the genitive here can indicate sphere or responsibility. 'For
    the works' stays close to the Greek while allowing the temple-service sense suggested
    by the Hebrew parallel's 'work of the house of God.'
- source_word: Κυρίου θεοῦ Ἰσραήλ
  chosen: the Lord God of Israel
  alternatives:
  - the Lord, the God of Israel
  lexicon: LSJ
  rationale: Standard rendering of the divine title sequence. 'Lord' follows project
    policy for κύριος.
- source_word: ἀκολούθως τῇ Μωσέως βίβλῳ
  chosen: in accordance with the book of Moses
  alternatives:
  - according to the book of Moses
  - following the book of Moses
  lexicon: LSJ
  rationale: This phrase signals conformity to Mosaic written instruction. 'In accordance
    with' is idiomatic and preserves the normative force.
- source_word: θυρωροί
  chosen: gatekeepers
  alternatives:
  - doorkeepers
  - porters
  lexicon: LSJ
  rationale: '''Gatekeepers'' is the clearest modern term for temple personnel stationed
    at entrances.'
- source_word: ἐφʼ ἑκάστου πυλῶνος
  chosen: at each gate
  alternatives:
  - at every gateway
  - at each gatehouse
  lexicon: LSJ
  rationale: Straightforward locative sense. 'Gate' is concise and fits temple context.
