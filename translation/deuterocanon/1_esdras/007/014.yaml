translation:
  text: And they kept the Feast of Unleavened Bread for seven days, rejoicing before
    the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''before the Lord''; the Hebrew parallel similarly frames the celebration
      as joyful before YHWH.'
    reason: cross_reference
lexical_decisions:
- source_word: ἤγαγον
  chosen: kept
  alternatives:
  - held
  - celebrated
  - conducted
  lexicon: LSJ
  rationale: Although literally from ἄγω ('lead, bring, celebrate'), in festival contexts
    the idiom means to keep or celebrate a feast. 'Kept' is concise, idiomatic English
    and aligns with the parallel Hebrew ויעשו ('they did/kept').
- source_word: ἑορτήν
  chosen: Feast
  alternatives:
  - festival
  - feast
  lexicon: LSJ
  rationale: Refers to a religious festival observance. Capitalized 'Feast' fits the
    specific named observance that follows.
- source_word: τῶν ἀζύμων
  chosen: of Unleavened Bread
  alternatives:
  - of the Unleavened
  - of Unleavened Loaves
  lexicon: LSJ
  rationale: Standard rendering for the Jewish festival name; the Hebrew parallel
    חַג־מַצּוֹת confirms the idiomatic title.
- source_word: ἑπτὰ ἡμέρας
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: LSJ
  rationale: English idiom naturally supplies 'for' with duration, without adding
    meaning beyond the Greek accusative of extent.
- source_word: εὐφραινόμενοι
  chosen: rejoicing
  alternatives:
  - celebrating joyfully
  - being glad
  lexicon: LSJ
  rationale: A participle expressing the manner accompanying the feast. 'Rejoicing'
    preserves the verbal force and matches the Hebrew בשמחה ('with joy') in sense.
- source_word: ἔναντι Κυρίου
  chosen: before the Lord
  alternatives:
  - in the presence of the Lord
  - before Yahweh
  lexicon: LSJ
  rationale: ἔναντι conveys presence before God. 'Lord' follows the project's default
    rendering for κύριος and matches LXX convention for the divine name.
