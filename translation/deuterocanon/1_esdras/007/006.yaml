translation:
  text: And the sons of Israel, and the priests, and the Levites, and the rest from
    the captivity who had returned, did accordingly to what is in the book of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'who had been brought back' from the captivity.
    reason: lexical_alternative
  - marker: b
    text: '''From the captivity'' means from the exile; compare the exile-restoration
      setting reflected in the Hebrew parallel.'
    reason: cross_reference
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: A formally close rendering preserves the stock biblical expression. Although
    'Israelites' is smoother modern English, 'sons of Israel' reflects the Greek wording
    and keeps continuity with the traditional ethnic-covenantal designation.
- source_word: οἱ λοιποί
  chosen: the rest
  alternatives:
  - the remainder
  - the others
  lexicon: LSJ
  rationale: '''The rest'' is the most natural concise rendering for the substantival
    adjective here, distinguishing this group from priests and Levites already named.'
- source_word: οἱ ἐκ τῆς αἰχμαλωσίας
  chosen: from the captivity
  alternatives:
  - from the exile
  - of the captivity
  lexicon: LSJ
  rationale: The Greek literally refers to those associated with the captivity/exile.
    'From the captivity' stays close to the wording, while the sense is effectively
    'from the exile.' The alternative is preserved because modern readers may find
    it clearer.
- source_word: οἱ προσενεχθέντες
  chosen: who had returned
  alternatives:
  - who had been brought back
  - who had been presented
  lexicon: LSJ
  rationale: The participle literally suggests being brought in/brought back. In this
    restoration context, and with the parallel exile language, 'who had returned'
    communicates the intended sense in idiomatic English without implying they returned
    entirely by their own initiative. 'Who had been brought back' is a viable more
    formal alternative.
- source_word: ἀκολούθως
  chosen: accordingly
  alternatives:
  - according to this
  - in accordance
  - following
  lexicon: LSJ
  rationale: The adverb indicates acting in conformity with a standard. 'Accordingly'
    is concise and natural in English while preserving the sense of conformity.
- source_word: τοῖς ἐν τῇ Μωσέως βίβλῳ
  chosen: to what is in the book of Moses
  alternatives:
  - according to the things in the book of Moses
  - to the prescriptions in the book of Moses
  lexicon: LSJ
  rationale: The phrase points to the written Mosaic instruction as the norm. 'To
    what is in the book of Moses' is readable modern English and sufficiently formal
    without over-specifying 'law' where the Greek here says 'book.'
