theological_decisions:
- issue: Identity and agency of the returned exiles in οἱ προσενεχθέντες
  chosen_reading: rendered as 'who had returned' in context of restoration from exile
  alternative_readings:
  - who had been brought back
  rationale: The participle can more literally suggest being brought in or brought
    back. Because the verse lists groups among the restored community and the exile
    context is explicit, the translation uses the idiomatic restoration sense 'who
    had returned,' while preserving the more literal passive nuance in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve significant
    lexical decisions and alternatives.'
