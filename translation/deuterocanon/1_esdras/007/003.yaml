theological_decisions:
- issue: Whether to make explicit that the 'holy works' are temple-construction activities
  chosen_reading: Keep the broader phrase 'the holy works' in the main text
  alternative_readings:
  - the temple works
  - the work on the house of God
  rationale: The Greek text says 'the holy works' without naming the temple directly
    in this verse. Although the broader context and MT parallel concern work on God's
    house, the translation should not narrow the phrase beyond the Greek wording.
    Context can supply the temple reference without importing it into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
