theological_decisions:
- issue: Rendering ἱεροῦ in relation to temple terminology
  chosen_reading: house of the Lord
  alternative_readings:
  - temple of the Lord
  - sanctuary of the Lord
  rationale: The Greek could be rendered 'temple,' but 'house of the Lord' preserves
    the biblical temple idiom and resonates with the broader Ezra/Esdras tradition.
    This is a lexical-theological choice about sacred-space terminology rather than
    a doctrinal dispute.
