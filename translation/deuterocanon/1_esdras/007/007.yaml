translation:
  text: And they offered for the dedication of the house of the Lord one hundred bulls,
    two hundred rams, and four hundred lambs,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of the Lord.' The Greek term can denote the sacred precinct
      or temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσήνεγκαν
  chosen: they offered
  alternatives:
  - they brought
  - they presented
  lexicon: BDAG
  rationale: In sacrificial/dedication context, 'offered' best conveys cultic presentation
    rather than mere physical bringing.
- source_word: ἐγκαινισμός
  chosen: dedication
  alternatives:
  - consecration
  - inauguration
  lexicon: LSJ
  rationale: The noun denotes a dedicatory occasion; 'dedication' is natural English
    and fits temple context without over-specifying ritual nuance.
- source_word: ἱεροῦ
  chosen: house
  alternatives:
  - temple
  - sanctuary
  lexicon: LSJ
  rationale: Although ἱερόν often means 'temple' or sacred precinct, the phrase 'the
    house of the Lord' aligns with the Semitic temple idiom and preserves continuity
    with biblical usage. The genitive τοῦ κυρίου clarifies whose house is meant.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Greek deuterocanonical
    context, 'the house of the Lord' is idiomatic and clear.
- source_word: ταύρους ἑκατόν
  chosen: one hundred bulls
  alternatives:
  - a hundred bulls
  lexicon: LSJ
  rationale: Straightforward sacrificial inventory; numeral retained explicitly.
- source_word: κριοὺς διακοσίους
  chosen: two hundred rams
  alternatives:
  - two hundred male sheep
  lexicon: LSJ
  rationale: '''Rams'' is the standard and precise rendering for κριοί in sacrificial
    lists.'
- source_word: ἄρνας τετρακοσίας
  chosen: four hundred lambs
  alternatives:
  - four hundred male lambs
  lexicon: LSJ
  rationale: ἄρνες are lambs/sheep in this offering list; 'lambs' is the most idiomatic
    English rendering here, even though the Greek term can imply males.
