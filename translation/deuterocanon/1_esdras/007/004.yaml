theological_decisions:
- issue: Relationship between divine causation and imperial authorization
  chosen_reading: The verse presents the completion as occurring both by the Lord's
    decree and with the approval of Persian rulers.
  alternative_readings:
  - The royal approval could be read as subordinate explanation of the divine decree
    alone.
  - The phrase 'king of the Persians' may be taken distributively over all three names
    rather than syntactically with Artaxerxes alone.
  rationale: 'The Greek coordinates the two prepositional phrases: διὰ προτάγματος
    ... καὶ μετὰ τῆς γνώμης .... The translation preserves this dual agency without
    collapsing one into the other. This also coheres with the broader biblical theme
    that God works through foreign rulers, while avoiding any stronger theological
    claim than the text itself makes.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
