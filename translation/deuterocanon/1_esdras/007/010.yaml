theological_decisions:
- issue: Corporate designation οἱ υἱοὶ Ἰσραήλ
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Following the project's gender-accurate principle, the masculine plural
    is preserved rather than neutralized. Here it functions as a traditional corporate
    designation rooted in Israel's ancestral identity, not merely a generic population
    label.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Cultic purification language
  chosen_reading: had purified themselves
  alternative_readings:
  - had cleansed themselves ceremonially
  - were purified
  rationale: The verse concerns ritual readiness for Passover, not moral purification
    in an abstract sense. The chosen wording preserves the cultic sense without adding
    explanatory material to the main text.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy over translation tradition
