translation:
  text: And the sons of Israel from the captivity kept the Passover on the fourteenth
    day of the first month, when the priests and the Levites had purified themselves
    together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from exile.' The Greek literally says 'from the captivity,' referring
      to those of Israel associated with the return from exile.
    reason: lexical_alternative
  - marker: b
    text: That is, the priests and Levites had undergone ritual purification in preparation
      for the Passover.
    reason: cultural_note
lexical_decisions:
- source_word: ἤγαγον
  chosen: kept
  alternatives:
  - brought
  - celebrated
  - observed
  lexicon: LSJ
  rationale: Although the verb literally means 'led/brought,' with τὸ πάσχα as object
    and in cultic context it idiomatically refers to keeping or celebrating the Passover.
    'Kept' preserves the biblical festival idiom in natural English without over-paraphrasing.
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: A formally transparent rendering of the stock phrase. 'The Israelites'
    is possible, but 'sons of Israel' better preserves the source expression and its
    corporate-ancestral force.
- source_word: τῶν ἐκ τῆς αἰχμαλωσίας
  chosen: from the captivity
  alternatives:
  - from exile
  - who had returned from captivity
  lexicon: LSJ
  rationale: The phrase identifies this group as those belonging to or coming from
    the captivity/exile. 'From the captivity' stays close to the Greek while remaining
    intelligible. 'Exile' is a viable smoother alternative, but the Greek noun is
    more literally 'captivity.'
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - Passover feast
  lexicon: LSJ
  rationale: Standard rendering of the festival name; no expansion is necessary in
    the main text.
- source_word: ἐν τῇ τεσσαρεσκαιδεκάτῃ τοῦ πρώτου μηνός
  chosen: on the fourteenth day of the first month
  alternatives:
  - in the fourteenth day of the first month
  lexicon: LSJ
  rationale: Idiomatic English date expression preserving the Greek temporal specification.
- source_word: ὅτε
  chosen: when
  alternatives:
  - after
  - since
  lexicon: LSJ
  rationale: The conjunction is temporal. 'When' best preserves the Greek relation
    without forcing a stronger causal nuance.
- source_word: ἡγνίσθησαν
  chosen: had purified themselves
  alternatives:
  - were purified
  - had been cleansed
  - sanctified themselves
  lexicon: LSJ
  rationale: The verb refers to ritual purification in preparation for worship. 'Had
    purified themselves' captures the completed preparatory action relative to the
    Passover observance.
- source_word: οἱ ἱερεῖς καὶ οἱ λευεῖται
  chosen: the priests and the Levites
  lexicon: LSJ
  rationale: Standard rendering of the two temple-service groups.
- source_word: ἅμα
  chosen: together
  alternatives:
  - all together
  - at the same time
  lexicon: LSJ
  rationale: The adverb indicates joint or simultaneous purification. 'Together' is
    concise and natural.
