theological_decisions:
- issue: Relation of the Greek wording to the MT parallel in Ezra 6:22
  chosen_reading: Retain the Greek's explicit mention of cooperation with the elders
    of the Jews and temple overseers, while allowing the MT parallel to confirm the
    temple-work context.
  alternative_readings:
  - Translate more freely from the MT parallel as strengthening their hands in the
    work of the house of God
  rationale: The project requires the Greek as primary for 1 Esdras, but the MT parallel
    is to be used as a real input. Here the Greek contains distinct wording not reducible
    to the MT phrasing, so the translation follows the Greek while recognizing that
    both witnesses concern support for temple work.
