translation:
  text: And they sacrificed the Passover for all the sons of the captivity, and for
    their brothers the priests, and for themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for all the exiles.' The Greek literally says 'for all the sons of the
      captivity,' a corporate expression for the returned exilic community.
    reason: lexical_alternative
  - marker: b
    text: '''The Passover'' here refers to the Passover sacrifice/observance; the
      Greek does not explicitly say ''lamb.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθυσαν
  chosen: sacrificed
  alternatives:
  - offered
  - kept
  lexicon: BDAG
  rationale: The verb θύω refers to slaughtering/offering a sacrifice. In Passover
    context, 'sacrificed' preserves the cultic action more precisely than the broader
    'kept' or 'offered.'
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the Passover lamb
  - Passover
  lexicon: BDAG
  rationale: πάσχα can denote the Passover observance or the Passover sacrifice. Because
    it is the direct object of 'sacrificed,' the sacrificial sense is active, but
    'the Passover' is idiomatic English and preserves the festival-sacrifice linkage
    without over-specifying 'lamb,' which the Greek does not state explicitly.
- source_word: πᾶσιν τοῖς υἱοῖς τῆς αἰχμαλωσίας
  chosen: for all the sons of the captivity
  alternatives:
  - for all the children of the captivity
  - for all the exiles
  - for all those of the captivity
  lexicon: BDAG
  rationale: A formally close rendering best reflects the Greek phrase and its likely
    technical/social sense for the returned exilic community. 'Sons of the captivity'
    preserves the source wording; 'exiles' is smoother but loses the familial/corporate
    idiom. Given the project's gender-accurate policy, 'sons' is retained rather than
    neutralized.
- source_word: ἀδελφοῖς
  chosen: brothers
  alternatives:
  - kinsmen
  - fellow Israelites
  lexicon: BDAG
  rationale: ἀδελφοί is literally 'brothers.' Here it refers specifically to fellow
    community members identified as priests. 'Brothers' preserves the familial covenantal
    tone of the Greek.
- source_word: ἱερεῦσιν
  chosen: the priests
  alternatives:
  - priests
  lexicon: BDAG
  rationale: 'The article in English helps clarify apposition: ''their brothers, the
    priests.'' This reflects the Greek construction without obscuring that the brothers
    in view are priests.'
- source_word: ἑαυτοῖς
  chosen: for themselves
  alternatives:
  - for their own part
  lexicon: BDAG
  rationale: Straightforward reflexive dative. 'For themselves' matches the sequence
    of beneficiaries in the verse.
