theological_decisions:
- issue: Gendered corporate language in τοῖς υἱοῖς and ἀδελφοῖς
  chosen_reading: Retain 'sons' and 'brothers' in the main text
  alternative_readings:
  - children
  - people
  - kinsmen
  rationale: The project prefers gender-accurate renderings over flattening masculine
    corporate terms into neutral English. In this post-exilic communal setting, the
    masculine forms likely function corporately, but the source wording is still best
    preserved in the main text.
