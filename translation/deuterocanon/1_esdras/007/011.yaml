theological_decisions:
- issue: Ritual purification language
  chosen_reading: had purified themselves
  alternative_readings:
  - were purified
  rationale: The verse concerns cultic readiness rather than inward moral renewal
    in abstraction. Rendering the verb reflexively preserves the likely sense of deliberate
    ritual preparation by the community and Levites.
