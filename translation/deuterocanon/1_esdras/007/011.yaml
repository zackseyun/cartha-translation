translation:
  text: and all the sons of the captivity, because they had purified themselves. For
    the Levites all together had purified themselves, all of them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'children of the exile' or more idiomatically, 'the exiles.'
    reason: lexical_alternative
  - marker: b
    text: The Greek text here is fragmentary in sense and appears to continue into
      the next clause; 'had purified themselves' may also be rendered 'were purified.'
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ τῆς αἰχμαλωσίας
  chosen: sons of the captivity
  alternatives:
  - children of the exile
  - exiles
  - returned exiles
  lexicon: LSJ
  rationale: A formally transparent rendering preserves the idiom and its communal
    identity marker. 'Exiles' is smoother English, but the Greek explicitly says 'sons
    of the captivity,' echoing post-exilic covenant-community language. Because the
    phrase is not merely demographic but traditional, the more literal rendering is
    retained.
- source_word: ἡγνίσθησαν
  chosen: had purified themselves
  alternatives:
  - were purified
  - had consecrated themselves
  - had cleansed themselves
  lexicon: LSJ
  rationale: The verb ἁγνίζω in this cultic context refers to ritual purification.
    The middle/passive form can be rendered either reflexively or passively; here
    'had purified themselves' best fits the repeated emphasis on preparation for worship
    and aligns with the likely Hebrew background of self-purification.
- source_word: λευεῖται
  chosen: Levites
  alternatives:
  - the Levites
  lexicon: LSJ
  rationale: Standard transliteration of the group name is appropriate. The article
    is naturally absorbed into English syntax.
- source_word: ἅμα πάντες
  chosen: all together
  alternatives:
  - together, all of them
  - all alike
  lexicon: LSJ
  rationale: The phrase intensifies the collective completeness of the Levites' purification.
    'All together' preserves both the sense of unity and totality without overloading
    the English line.
