translation:
  text: twelve goats for a sin offering for all Israel, according to the number of
    the twelve tribal leaders of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in sacrificial idiom, 'twelve male goats as a sin offering
      for all Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χιμάρους
  chosen: goats
  alternatives:
  - male goats
  - kids
  lexicon: LSJ
  rationale: χίμαρος denotes a he-goat or male goat. English 'goats' is natural and
    sufficiently clear in sacrificial context; 'male goats' is more explicit but heavier.
    The plural number is preserved.
- source_word: ὑπὲρ ἁμαρτίας
  chosen: for the sin
  alternatives:
  - as a sin offering for
  - for sin
  lexicon: LSJ
  rationale: The phrase literally means 'for sin' or 'concerning sin' and in sacrificial
    contexts functions idiomatically for a sin offering. To stay close to the Greek
    while remaining intelligible, 'for the sin' is used, with the sacrificial sense
    carried by context. 'As a sin offering' is a viable dynamic alternative.
- source_word: παντὸς τοῦ Ἰσραήλ
  chosen: of all Israel
  alternatives:
  - for all Israel
  lexicon: LSJ
  rationale: The genitive with the sacrificial phrase naturally yields 'of all Israel'
    or 'for all Israel.' 'Of all Israel' keeps the Greek structure more closely while
    still conveying representative scope.
- source_word: πρὸς ἀριθμόν
  chosen: according to the number of
  alternatives:
  - in number corresponding to
  - to match the number of
  lexicon: LSJ
  rationale: This phrase expresses correspondence in quantity. 'According to the number
    of' is a standard, transparent rendering.
- source_word: φυλάρχων
  chosen: tribal leaders
  alternatives:
  - heads of the tribes
  - tribe chiefs
  lexicon: LSJ
  rationale: φυλάρχης means leader or chief of a tribe. 'Tribal leaders' is readable
    modern English; 'heads of the tribes' is more literal but less idiomatic.
