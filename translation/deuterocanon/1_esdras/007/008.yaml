theological_decisions:
- issue: Whether to render the sacrificial idiom explicitly as 'sin offering'
  chosen_reading: Retain a relatively close rendering, 'for the sin,' allowing the
    sacrificial context to imply offering language.
  alternative_readings:
  - as a sin offering for all Israel
  - for sin on behalf of all Israel
  rationale: The Greek idiom can be translated more dynamically as 'sin offering,'
    but the source wording itself is brief and formulaic. Optimal equivalence here
    favors a close rendering while preserving the clearer sacrificial alternative
    in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve significant
    lexical decisions and alternatives.'
