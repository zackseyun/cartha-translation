translation:
  text: Then Sisinnes, governor of Coele-Syria and Phoenicia, and Sathrabuzanes and
    their associates, following what had been commanded by King Darius,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Coele-Syria, a formal regional name; not a descriptive phrase meaning
      simply 'hollow Syria.'
    reason: cultural_note
  - marker: b
    text: Or 'the associates.' The Greek συνέταιροι can mean associates, partners,
      or companions.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: LSJ
  rationale: Standard temporal transition introducing the next narrative action.
- source_word: Σισίννης
  chosen: Sisinnes
  alternatives:
  - Sisines
  rationale: Personal name is transliterated rather than translated, following project
    policy for names.
- source_word: ἔπαρχος
  chosen: governor
  alternatives:
  - prefect
  - provincial ruler
  lexicon: LSJ
  rationale: A civil administrative title; 'governor' is the clearest natural English
    equivalent without over-specifying Roman-era nuance.
- source_word: κοίλης Συρίας
  chosen: Coele-Syria
  alternatives:
  - Hollow Syria
  - the region of Coele Syria
  lexicon: LSJ
  rationale: This is a proper regional designation in Hellenistic usage, best preserved
    by transliteration of the established place-name rather than literalizing κοίλης.
- source_word: Φοινίκης
  chosen: Phoenicia
  rationale: Standard English form of the place-name.
- source_word: Σαθραβούζανης
  chosen: Sathrabuzanes
  alternatives:
  - Sathrabouzanes
  rationale: Proper name transliterated directly from the Greek form attested in the
    source.
- source_word: οἱ συνέταιροι
  chosen: their associates
  alternatives:
  - the associates
  - their companions
  - their colleagues
  lexicon: LSJ
  rationale: The Greek means partners/associates. 'Their associates' reads naturally
    in English and reflects that these men belong with the named officials. The possessive
    is slightly interpretive but fits the coordination in context.
- source_word: κατακολουθήσαντες
  chosen: following
  alternatives:
  - acting in accordance with
  - carrying out
  - obeying
  lexicon: LSJ
  rationale: The participle denotes following after or conforming to instructions.
    'Following' preserves the participial linkage and remains idiomatic.
- source_word: τοῖς ... προσταγεῖσιν
  chosen: what had been commanded
  alternatives:
  - the orders given
  - the things commanded
  lexicon: LSJ
  rationale: The dative participial construction refers to the king's commands. Rendering
    it as 'what had been commanded' is natural English while preserving the passive
    sense.
- source_word: τοῦ βασιλέως Δαρείου
  chosen: by King Darius
  alternatives:
  - of King Darius
  rationale: English idiom prefers 'commanded by King Darius' rather than a more wooden
    genitive rendering.
