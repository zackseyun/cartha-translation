translation:
  text: After him Nebuchadnezzar king of Babylon came up, and he bound him with bronze
    chains and carried him away to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went up.' The Greek verb can be rendered either way; 'came up' preserves
      the conventional directional idiom of a king advancing against a land.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετʼ αὐτὸν
  chosen: After him
  alternatives:
  - Afterward
  - After this
  lexicon: LSJ
  rationale: Temporal succession is the plain sense here, referring to the next ruler/action
    in sequence. 'After him' preserves the personal reference more directly than the
    more abstract 'afterward.'
- source_word: ἀνέβη
  chosen: came up
  alternatives:
  - went up
  - marched up
  lexicon: LSJ
  rationale: The verb literally means 'went/came up.' In military and royal movement
    contexts it can imply an advance or campaign, but 'came up' keeps the Greek image
    without over-specifying military nuance not explicit in the verse.
- source_word: Ναβουχοδονόσορ
  chosen: Nebuchadnezzar
  alternatives:
  - Nabouchodonosor
  rationale: Standard English transliteration of the well-known royal name is preferred
    for readability and consistency, even though the Greek form is closer to 'Nabouchodonosor.'
- source_word: βασιλεὺς Βαβυλῶνος
  chosen: king of Babylon
  alternatives:
  - the king of Babylon
  lexicon: LSJ
  rationale: Anarthrous Greek does not require the English article here. The title
    is straightforward and should be translated rather than paraphrased.
- source_word: ἔδησεν
  chosen: bound
  alternatives:
  - fettered
  - chained
  lexicon: LSJ
  rationale: '''Bound'' is the broad, natural English equivalent. The following phrase
    specifies the means (''with bronze chains''), so using ''chained'' in the verb
    would be somewhat redundant.'
- source_word: ἐν χαλκεῖς δεσμοῖς
  chosen: with bronze chains
  alternatives:
  - in bronze bonds
  - with bronze fetters
  lexicon: LSJ
  rationale: The phrase denotes metal restraints. 'Bronze chains' is idiomatic modern
    English and preserves the material detail. 'Bronze' is preferred over 'brass'
    as the more historically accurate default for χαλκεῖς.
- source_word: ἀπήγαγεν
  chosen: carried him away
  alternatives:
  - led him away
  - took him away
  lexicon: LSJ
  rationale: The verb indicates removal into captivity/exile. 'Carried him away' communicates
    forcible deportation more clearly than the weaker 'took him away,' while avoiding
    over-interpretation.
- source_word: εἰς Βαβυλῶνα
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: LSJ
  rationale: Simple destination is intended. 'To Babylon' is idiomatic and sufficient
    in English.
