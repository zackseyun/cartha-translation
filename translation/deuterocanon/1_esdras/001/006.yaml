theological_decisions:
- issue: Rendering of ἀδελφοῖς in a representative communal context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - kinsmen
  - fellow Israelites
  rationale: The project prefers gender-accurate renderings where the source is masculine
    with representative force. Here the referent is the covenant community, likely
    broader than male siblings alone, but the Greek wording is still best represented
    by 'brothers,' with inclusivity clarified in a footnote rather than neutralized
    in the main text.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Rendering of κύριος in a deuterocanonical LXX context
  chosen_reading: Lord
  alternative_readings:
  - LORD
  rationale: The source text is Greek and explicitly has κυρίου. Per project defaults,
    κύριος is rendered 'Lord.' We do not retrovert to 'LORD' unless the source text
    itself warrants that presentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
