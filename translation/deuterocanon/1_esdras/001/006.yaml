translation:
  text: In order, sacrifice the Passover, and prepare the sacrifices for your brothers,
    and keep the Passover according to the command of the Lord that was given to Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in proper order' or 'according to rank'; the phrase points to ordered
      arrangement, and the Hebrew parallel emphasizes divisions or groupings.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here refers to fellow members of the people, not necessarily
      only male siblings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τάξει
  chosen: In order
  alternatives:
  - in orderliness
  - according to rank
  - in proper order
  lexicon: LSJ
  rationale: The phrase is elliptical in Greek but naturally adverbial. 'In order'
    preserves the concise sense of acting in proper arrangement. The MT parallel speaks
    of standing in the holy place by divisions, which supports an ordered/arranged
    sense rather than mere sequence.
- source_word: θύσατε
  chosen: sacrifice
  alternatives:
  - offer
  - slaughter
  lexicon: BDAG
  rationale: θύω in sacrificial context means to offer by sacrifice/slaughter. 'Sacrifice'
    best fits the direct object 'the Passover' and preserves cultic force without
    over-specifying the mechanics.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the Passover lamb
  - Passover
  lexicon: BDAG
  rationale: The Greek can denote the Passover observance or the sacrificial victim.
    Because the verse later says 'keep the Passover,' the first occurrence likely
    refers concretely to the sacrificial act, but 'the Passover' is the most natural
    English rendering and leaves the cultic breadth intact.
- source_word: τὰς θυσίας
  chosen: the sacrifices
  alternatives:
  - the offerings
  lexicon: BDAG
  rationale: A straightforward rendering of the plural noun. 'Sacrifices' matches
    the cultic setting and keeps consistency with θύσατε.
- source_word: ἑτοιμάσατε
  chosen: prepare
  alternatives:
  - make ready
  - get ready
  lexicon: BDAG
  rationale: '''Prepare'' is idiomatic modern English and suits ritual preparation.'
- source_word: τοῖς ἀδελφοῖς ὑμῶν
  chosen: for your brothers
  alternatives:
  - for your brothers and sisters
  - for your kinsmen
  - for your fellow Israelites
  lexicon: BDAG
  rationale: Per project philosophy, masculine familial language is rendered gender-accurately
    rather than neutralized. In context it refers to fellow members of Israel; 'brothers'
    preserves the source wording, while the broader representative sense can be noted
    in a footnote.
- source_word: ποιήσατε τὸ πάσχα
  chosen: keep the Passover
  alternatives:
  - celebrate the Passover
  - perform the Passover
  - do the Passover
  lexicon: BDAG
  rationale: ποιέω with Passover is an idiom for observing/celebrating it. 'Keep the
    Passover' is natural English and preserves the formal observance sense better
    than the overly literal 'do'.
- source_word: κατὰ τὸ πρόσταγμα
  chosen: according to the command
  alternatives:
  - according to the ordinance
  - according to the instruction
  lexicon: LSJ
  rationale: πρόσταγμα denotes an authoritative command or order. 'Command' is the
    clearest modern equivalent.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the LORD
  lexicon: BDAG
  rationale: The Greek source reads κύριος. Following the project's contested-terms
    guidance, κύριος is rendered 'Lord.' Although the Hebrew parallel behind the broader
    context may involve the divine name, the immediate source here is Greek κύριος,
    not an explicit tetragrammaton form.
- source_word: τὸ δοθὲν τῷ Μωυσῇ
  chosen: that was given to Moses
  alternatives:
  - which was given through Moses
  - given to Moses
  lexicon: BDAG
  rationale: The participial phrase most directly modifies 'command.' 'Given to Moses'
    is formally accurate and clear.
