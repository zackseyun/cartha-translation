theological_decisions:
- issue: Relationship between 'their brothers' and 'sons of Aaron'
  chosen_reading: Render appositionally as 'the priests, their brothers, the sons
    of Aaron'
  alternative_readings:
  - Render more interpretively as 'their brothers, the priests who were sons of Aaron'
  rationale: The Greek places all three expressions in sequence without a relative
    clause. The chosen English preserves the appositional structure and leaves the
    kinship language intact, while still making clear that 'sons of Aaron' identifies
    the priests.
  doctrine_reference: Translation philosophy §§3-4, 6
