translation:
  text: After this they prepared for themselves and for the priests, their brothers,
    the sons of Aaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'for themselves and also for the priests, their brothers,
      the sons of Aaron.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel at 2 Chronicles 35:11 differs substantially here; 1
      Esdras preserves a Greek wording focused on preparing portions for themselves
      and for the priests.
    reason: cross_reference
lexical_decisions:
- source_word: μετὰ δὲ ταῦτα
  chosen: After this
  alternatives:
  - After these things
  - Then afterward
  lexicon: LSJ
  rationale: A standard temporal transition. 'After this' is natural modern English
    while remaining close to the Greek sequence marker.
- source_word: ἡτοίμασαν
  chosen: they prepared
  alternatives:
  - they made ready
  - they got ready
  lexicon: LSJ
  rationale: The verb means to prepare or make ready. 'Prepared' preserves the transitive
    sense and fits the sacrificial/meal context implied by the surrounding passage.
- source_word: ἑαυτοῖς
  chosen: for themselves
  alternatives:
  - for their own use
  lexicon: LSJ
  rationale: The reflexive dative is straightforwardly rendered 'for themselves.'
- source_word: τε καὶ
  chosen: and
  alternatives:
  - both ... and
  lexicon: LSJ
  rationale: 'The pair links two recipients: themselves and the priests. English idiom
    does not require an explicit ''both ... and'' here, though that sense is retained.'
- source_word: τοῖς ἱερεῦσιν
  chosen: for the priests
  alternatives:
  - for the priests also
  lexicon: LSJ
  rationale: Dative of advantage/recipient after 'prepared.' The article is naturally
    absorbed in English.
- source_word: ἀδελφοῖς αὐτῶν
  chosen: their brothers
  alternatives:
  - their brethren
  - their kinsmen
  lexicon: LSJ
  rationale: The Greek explicitly says 'brothers.' In context this refers to fellow
    Israelites/Levites in relation to the priests; per project philosophy, the masculine
    familial term is preserved rather than neutralized.
- source_word: υἱοῖς Ἀαρών
  chosen: the sons of Aaron
  alternatives:
  - Aaron's sons
  - descendants of Aaron
  lexicon: LSJ
  rationale: This appositional phrase identifies the priests. 'The sons of Aaron'
    is the most transparent and biblically conventional rendering; 'descendants' would
    be interpretive expansion.
