translation:
  text: And he got up onto his second chariot; and after being brought back to Jerusalem,
    he ended his life and was buried in his fathers' tomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'he died.' The Greek literally says 'he exchanged/ended
      his life,' an idiom for death.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in 2 Chronicles 35:24 reads 'the chariot of the second
      rank' and adds that all Judah and Jerusalem mourned for Josiah; 1 Esdras here
      is shorter and uses singular 'tomb.'
    reason: cross_reference
lexical_decisions:
- source_word: ἀνέβη
  chosen: got up onto
  alternatives:
  - went up onto
  - mounted
  lexicon: BDAG
  rationale: The verb commonly means 'went up' or 'ascended,' but with ἐπὶ τὸ ἅρμα
    the idiomatic sense is mounting or getting onto the chariot. 'Got up onto' preserves
    the physical movement in natural English.
- source_word: τὸ ἅρμα τὸ δεύτερον αὐτοῦ
  chosen: his second chariot
  alternatives:
  - his second carriage
  - the second chariot that was his
  lexicon: LSJ
  rationale: ἅρμα is 'chariot.' δεύτερον is best taken attributively, matching the
    MT parallel 'the second chariot' (i.e., a reserve/secondary royal vehicle), not
    'another chariot' in a vague sense.
- source_word: ἀποκατασταθεὶς εἰς Ἰερουσαλήμ
  chosen: after being brought back to Jerusalem
  alternatives:
  - after being restored to Jerusalem
  - when he had returned to Jerusalem
  lexicon: BDAG
  rationale: The participle suggests being restored/brought back rather than simply
    arriving. In context, with the MT parallel describing servants transporting Josiah
    from the battle scene, 'being brought back' best captures the passive sense and
    narrative situation.
- source_word: μετήλλαξεν τὸν βίον αὐτοῦ
  chosen: ended his life
  alternatives:
  - died
  - departed this life
  - changed his life
  lexicon: LSJ
  rationale: This is a Greek idiom for dying. 'Ended his life' reflects the literal
    components more than a simple 'died,' while still conveying the idiomatic meaning.
    'Changed his life' would be misleading in context.
- source_word: ἐτάφη
  chosen: was buried
  alternatives:
  - was entombed
  lexicon: BDAG
  rationale: Standard passive rendering of the burial verb.
- source_word: ἐν τῷ πατρικῷ τάφῳ
  chosen: in his fathers' tomb
  alternatives:
  - in the ancestral tomb
  - in his family tomb
  lexicon: LSJ
  rationale: πατρικός denotes what belongs to one's fathers/ancestors. The singular
    τάφος in Greek is naturally rendered as a collective family burial place; the
    MT parallel has plural 'tombs of his fathers,' but the Greek source text here
    is singular, so 'his fathers' tomb' preserves both the Greek form and ancestral
    sense.
