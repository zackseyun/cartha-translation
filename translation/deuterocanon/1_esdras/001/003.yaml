translation:
  text: And he said to the Levites, the holy servants of Israel, “Sanctify them for
    the Lord in the place of the holy ark of the Lord, in the house that Solomon son
    of David the king built.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek reads, 'Sanctify them for the Lord,' with an unclear referent
      for 'them.' The Hebrew parallel instead reads more clearly, 'Put the holy ark
      in the house that Solomon son of David, king of Israel, built.'
    reason: alternative_reading
lexical_decisions:
- source_word: Λευείταις
  chosen: Levites
  alternatives:
  - Leviites
  lexicon: LSJ
  rationale: Standard English transliteration for the tribal/priestly group; aligns
    with the Hebrew parallel ללוים.
- source_word: ἱεροδούλοις
  chosen: holy servants
  alternatives:
  - temple-servants
  - sacred servants
  - consecrated servants
  lexicon: LSJ
  rationale: The compound literally suggests those devoted in sacred service. Because
    the appositional phrase modifies the Levites and the Hebrew parallel has הקדשים
    ליהוה ('holy/consecrated to the LORD'), 'holy servants' best reflects the Greek
    while remaining intelligible. 'Temple-servants' is possible but too institutionally
    specific here.
- source_word: Ἰσραήλ
  chosen: Israel
  rationale: Standard proper-name transliteration.
- source_word: ἁγιάσατε
  chosen: Sanctify
  alternatives:
  - Consecrate
  - Make holy
  lexicon: LSJ
  rationale: Formal cultic verb; 'sanctify' preserves the ritual register. The object
    αὐτούς is difficult in context, but the Greek wording is retained rather than
    harmonized away.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - yourselves
  - it
  lexicon: Greek NT/LXX lexicon
  rationale: The transmitted Greek has the masculine plural pronoun. Although the
    Hebrew parallel points instead to placing the ark in the house, the primary source
    is the Greek, so the pronoun is translated as given. Because the referent is unclear,
    the ambiguity is preserved rather than resolved.
- source_word: τῷ κυρίῳ
  chosen: for the Lord
  alternatives:
  - to the Lord
  lexicon: LSJ
  rationale: With ἁγιάσατε, English idiom favors 'sanctify ... for the Lord,' expressing
    dedication. 'Lord' follows the project's default for κύριος.
- source_word: ἐν τῇ θέσει
  chosen: in the place
  alternatives:
  - at the place
  - in the location
  lexicon: LSJ
  rationale: θέσις here denotes place/location. 'In the place' is natural and sufficiently
    formal.
- source_word: τῆς ἁγίας κιβωτοῦ
  chosen: of the holy ark
  alternatives:
  - of the sacred ark
  lexicon: LSJ
  rationale: κιβωτός in this cultic context is 'ark'; 'holy' matches ἁγίας straightforwardly.
- source_word: οἴκῳ
  chosen: house
  alternatives:
  - temple
  lexicon: LSJ
  rationale: Literally 'house.' Since the referent is the temple, 'temple' would be
    interpretive; 'house' preserves the source wording while remaining clear in context.
- source_word: ᾧ ᾠκοδόμησεν Σαλωμὼν ὁ τοῦ Δαυεὶδ ὁ βασιλεύς
  chosen: that Solomon son of David the king built
  alternatives:
  - which King Solomon son of David built
  lexicon: LSJ
  rationale: This keeps the relative-clause structure and the filial designation explicit.
    'Son of David' is supported by the Hebrew parallel בן־דוד.
