theological_decisions:
- issue: Rendering κύριος in a deuterocanonical/LXX context with Hebrew parallel to
    YHWH
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: The Greek source text reads κύριος, and the project's default rendering
    for κύριος is 'Lord.' The Hebrew parallel reflects the divine name, but because
    this verse is translated from Greek, 'Lord' is retained in the main text rather
    than importing small-caps convention from the Hebrew.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Whether to harmonize the Greek to the Hebrew parallel's clearer sense about
    placing the ark in the temple
  chosen_reading: Retain the Greek's wording and ambiguity
  alternative_readings:
  - Put the holy ark in the house that Solomon son of David king of Israel built
  rationale: The MT parallel in 2 Chronicles 35:3 is clearer and differs notably from
    the Greek wording here. Per source-primacy and transparency principles, the translation
    remains anchored in the Greek while preserving the Hebrew-aligned alternative
    in a footnote.
  doctrine_reference: DOCTRINE.md translation philosophy 1 and 3
