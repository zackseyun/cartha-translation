translation:
  text: And the gatekeepers were at each gate; no one could leave his own appointed
    duty, for their brothers the Levites had prepared for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the Levites had prepared for themselves.' The context
      likely means they prepared what was needed on the gatekeepers' behalf, so that
      each could remain at his assigned service.
    reason: lexical_alternative
lexical_decisions:
- source_word: θυρωροὶ
  chosen: gatekeepers
  alternatives:
  - doorkeepers
  - porters
  lexicon: LSJ
  rationale: θυρωρός denotes one who keeps/watchs a door or gate. In temple context,
    'gatekeepers' is clearer and more natural than 'doorkeepers,' and better fits
    πυλώνων ('gates').
- source_word: ἐφʼ ἑκάστου πυλῶνος
  chosen: at each gate
  alternatives:
  - over each gate
  - at every gateway
  lexicon: LSJ
  rationale: The phrase locates the gatekeepers by station. 'At each gate' is idiomatic
    English and preserves the distributive sense of ἑκάστου.
- source_word: οὐκ ἔστιν παραβῆναι
  chosen: could not leave
  alternatives:
  - it was not possible to go aside
  - were not permitted to depart from
  lexicon: LSJ
  rationale: Literally 'it is not to step aside/transgress.' In context of assigned
    service, the sense is that they could not leave or abandon their post. 'Could
    not leave' communicates the practical force without over-literal awkwardness.
- source_word: ἕκαστον τὴν ἑαυτοῦ ἐφημερίαν
  chosen: his own appointed duty
  alternatives:
  - his own course
  - his own shift
  - his own service
  lexicon: LSJ
  rationale: ἐφημερία refers to a fixed term or course of service, especially priestly/Levitical
    duty. 'Appointed duty' preserves the official cultic sense better than the more
    colloquial 'shift,' while remaining readable.
- source_word: οἱ γὰρ ἀδελφοὶ αὐτῶν οἱ Λευεῖται
  chosen: for their brothers the Levites
  alternatives:
  - for their brothers, the Levites
  - for the Levites, their brothers
  lexicon: LSJ
  rationale: The appositional phrase identifies the brothers as Levites. The chosen
    wording is smooth English while preserving the familial/corporate relationship.
- source_word: ἡτοίμασαν ἑαυτοῖς
  chosen: had prepared for them
  alternatives:
  - had made ready for themselves
  - had prepared their portions for them
  lexicon: LSJ
  rationale: The reflexive ἑαυτοῖς is difficult in context. The broader sense, aided
    by the parallel service context and Hebrew parallel in the surrounding passage,
    is that the Levites made preparations so the gatekeepers could remain at their
    posts. English 'for them' expresses the contextual force more clearly than a wooden
    'for themselves.'
