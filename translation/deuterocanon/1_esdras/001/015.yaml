theological_decisions:
- issue: Reflexive pronoun in ἡτοίμασαν ἑαυτοῖς
  chosen_reading: understood contextually as the Levites preparing what was needed
    for the gatekeepers
  alternative_readings:
  - the Levites prepared for themselves
  rationale: 'A strictly reflexive rendering is possible, but in this service-setting
    it obscures the logic of the sentence: the gatekeepers did not leave their stations
    because the Levites handled the necessary preparation. The translation therefore
    follows the contextual sense while preserving the more literal alternative in
    a footnote.'
  doctrine_reference: Translation philosophy §§1, 5, 6; preserve source sense over
    inherited awkwardness, but document the exception.
