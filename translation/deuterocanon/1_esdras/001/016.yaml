translation:
  text: 'And the matters of the Lord’s sacrifice were completed on that day: the Passover
    was offered, and the sacrifices were brought up onto the altar of the Lord, according
    to the command of King Josias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the Passover was brought'; the Greek uses sacrificial
      language that can be rendered 'brought,' 'presented,' or 'offered.'
    reason: lexical_alternative
  - marker: b
    text: Josias is the Greek form of the name; in the Hebrew parallel he is called
      Josiah.
    reason: alternative_reading
lexical_decisions:
- source_word: συνετελέσθη
  chosen: were completed
  alternatives:
  - were finished
  - were accomplished
  lexicon: LSJ
  rationale: The passive aorist indicates completion of the sacrificial proceedings.
    'Were completed' preserves the formal sense without sounding overly wooden.
- source_word: τὰ τῆς θυσίας τοῦ κυρίου
  chosen: the matters of the Lord’s sacrifice
  alternatives:
  - the things pertaining to the Lord’s sacrifice
  - the sacrificial rites of the Lord
  lexicon: LSJ
  rationale: The Greek is somewhat idiomatic and broad, referring to the business/proceedings
    connected with the sacrifice. 'Matters' keeps the breadth better than narrowing
    to 'rites' alone. 'Lord' follows the default rendering of κύριος.
- source_word: ἀχθῆναι τὸ πάσχα
  chosen: the Passover was offered
  alternatives:
  - the Passover was brought
  - the Passover was presented
  lexicon: LSJ
  rationale: Although the verb literally means 'to be brought,' in sacrificial context
    and with πάσχα as the object, English idiom is better served by 'was offered.'
    This is also supported by the cultic context and the parallel mention of sacrifices
    being brought to the altar.
- source_word: προσαχθῆναι τὰς θυσίας
  chosen: the sacrifices were brought up
  alternatives:
  - the sacrifices were offered
  - the sacrifices were presented
  lexicon: LSJ
  rationale: προσάγω in sacrificial contexts can mean bring/present/offer. Here, because
    ἐπὶ τὸ ... θυσιαστήριον follows explicitly, 'were brought up onto' preserves the
    movement toward the altar more closely than simply 'were offered.'
- source_word: ἐπὶ τὸ τοῦ κυρίου θυσιαστήριον
  chosen: onto the altar of the Lord
  alternatives:
  - to the altar of the Lord
  - upon the Lord’s altar
  lexicon: LSJ
  rationale: The preposition ἐπί with accusative suggests motion toward/upon the altar.
    'Onto the altar of the Lord' reflects that directional sense naturally in English.
- source_word: κατὰ τὴν ἐπιταγὴν
  chosen: according to the command
  alternatives:
  - according to the ordinance
  - in accordance with the order
  lexicon: LSJ
  rationale: ἐπιταγή denotes an authoritative directive. 'Command' is the clearest
    modern English equivalent in this royal context.
- source_word: τοῦ βασιλέως Ἰωσείου
  chosen: of King Josias
  alternatives:
  - of King Josiah
  lexicon: LSJ
  rationale: The Greek form Ἰωσείου corresponds to the conventional Greek-derived
    English name 'Josias' in 1 Esdras. Since personal names are transliterated and
    this book is translated from Greek, 'Josias' best reflects the source form, while
    'Josiah' remains a recognizable alternative linked to the Hebrew parallel.
