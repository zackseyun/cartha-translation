theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek historical context
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The project default for κύριος is 'Lord.' Here it refers to Israel's
    God in a temple context, and 'Lord' preserves both the Greek wording and established
    covenantal sense without importing the Hebrew divine name directly into the main
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Cultic term ἀκαθαρσίαι
  chosen_reading: uncleannesses
  alternative_readings:
  - impurities
  - defilements
  rationale: The verse piles up cultic-moral language. 'Uncleannesses' preserves the
    ritual register and the connection with defilement of the sanctuary, even if slightly
    less idiomatic than 'impurities.'
