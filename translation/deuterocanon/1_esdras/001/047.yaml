translation:
  text: And the leaders of the people and of the priests also committed much impiety
    and lawlessness, beyond all the uncleannesses of all the nations, and they defiled
    the sanctuary of the Lord, which had been sanctified in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more than all the impurities of all the nations.' The Greek phrase expresses
      excess or surpassing, and ἀκαθαρσίαι can be rendered 'uncleannesses,' 'impurities,'
      or 'defilements.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple of the Lord.' Greek ἱερόν can refer to the sanctuary or the
      temple precincts more broadly.
    reason: lexical_alternative
  - marker: c
    text: The Greek says literally 'the sanctuary of the Lord, the one sanctified
      in Jerusalem.' The participle may describe the sanctuary as consecrated there.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἡγούμενοι
  chosen: the leaders
  alternatives:
  - those leading
  - the rulers
  lexicon: BDAG
  rationale: ἡγούμενοι can denote those who lead or rule. 'Leaders' is natural modern
    English and fits the civic-religious context without overstating formal office.
- source_word: τοῦ λαοῦ καὶ τῶν ἱερέων
  chosen: of the people and of the priests
  alternatives:
  - of the people and the priests
  - of the people, even of the priests
  lexicon: BDAG
  rationale: The genitives most naturally identify two groups associated with the
    leaders. The wording is kept close to the Greek structure to preserve the sense
    that both lay and priestly leadership are implicated.
- source_word: πολλὰ ἠσέβησαν
  chosen: committed many acts of impiety
  alternatives:
  - acted impiously in many ways
  - were very ungodly
  lexicon: BDAG
  rationale: The verb ἀσεβέω concerns impious or ungodly conduct. 'Committed many
    acts of impiety' preserves the concrete plural force of πολλά and the religious
    dimension of the offense.
- source_word: καὶ ἠνόμησαν
  chosen: and lawlessness
  alternatives:
  - and acted lawlessly
  - and committed lawless acts
  lexicon: BDAG
  rationale: ἀνομέω denotes acting contrary to law. Rendering it alongside ἠσέβησαν
    as 'impiety and lawlessness' preserves the paired moral-religious indictment in
    compact English.
- source_word: ὑπὲρ πάσας τὰς ἀκαθαρσίας πάντων τῶν ἐθνῶν
  chosen: beyond all the uncleannesses of all the nations
  alternatives:
  - more than all the impurities of all the nations
  - beyond every defilement of all the Gentiles
  lexicon: BDAG
  rationale: ὑπέρ here expresses excess or surpassing. ἀκαθαρσίαι are ritual/moral
    uncleannesses or impurities. 'Nations' is preferred over 'Gentiles' in this historical
    setting, and the plural 'uncleannesses' reflects the Greek.
- source_word: ἐμίαναν
  chosen: they defiled
  alternatives:
  - they polluted
  lexicon: BDAG
  rationale: μιαίνω commonly means to defile or pollute, especially in cultic contexts.
    'Defiled' is the clearest standard English equivalent here.
- source_word: τὸ ἱερὸν τοῦ κυρίου
  chosen: the sanctuary of the Lord
  alternatives:
  - the temple of the Lord
  - the holy place of the Lord
  lexicon: BDAG
  rationale: ἱερόν can mean temple complex or sanctuary. Given the cultic defilement
    context, 'sanctuary' best conveys sacred space without requiring the broader architectural
    sense of 'temple.' κύριος follows the project's default as 'Lord'.
- source_word: τὸ ἁγιαζόμενον
  chosen: the one sanctified
  alternatives:
  - which had been sanctified
  - that was being sanctified
  - the holy one
  lexicon: BDAG
  rationale: The present/passive participle literally means 'being sanctified' or
    'sanctified.' In context it characterizes the sanctuary as the place consecrated
    in Jerusalem. 'The one sanctified' stays close to the Greek while remaining intelligible.
- source_word: ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Standard locative rendering of the place name.
