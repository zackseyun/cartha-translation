translation:
  text: having stationed the priests in their divisions, arrayed in the temple of
    the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by courses' or 'in their appointed rotations'; the phrase refers to
      the priests' ordered service divisions.
    reason: lexical_alternative
  - marker: b
    text: Or 'wearing their vestments'; the Greek says they were 'adorned/arrayed,'
      likely referring to priestly attire.
    reason: lexical_alternative
  - marker: c
    text: Greek 'in the holy place/temple'; the Hebrew parallel has 'for the service
      of the house of the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: στήσας
  chosen: having stationed
  alternatives:
  - having set
  - having appointed
  - having established
  lexicon: LSJ
  rationale: Aorist participle of ἵστημι, here with an administrative sense of causing
    persons to stand in assigned places/roles. 'Having stationed' fits both the Greek
    and the Hebrew parallel ויעמד ('he caused to stand/appointed'), while preserving
    the participial linkage to the surrounding narrative.
- source_word: τοὺς ἱερεῖς
  chosen: the priests
  lexicon: LSJ
  rationale: Straightforward rendering of the accusative object; no contextual reason
    to vary from the standard gloss.
- source_word: κατʼ ἐφημερίας
  chosen: in their divisions
  alternatives:
  - by courses
  - according to their appointed orders
  - in their rotations
  lexicon: LSJ
  rationale: ἐφημερία can denote a fixed term of service or priestly course. The Hebrew
    parallel עַל־מִשְׁמְרוֹתָם points to service divisions/watch-posts. 'In their
    divisions' is clear modern English and preserves the institutional sense without
    archaic 'courses.'
- source_word: ἐστολισμένους
  chosen: clothed in splendor
  alternatives:
  - arrayed
  - wearing their vestments
  - adorned
  lexicon: LSJ
  rationale: Perfect/passive participle from στολίζω, indicating the priests were
    dressed in appropriate, dignified attire. The Greek adds this detail beyond the
    Hebrew parallel. 'Clothed in splendor' preserves the elevated tone and likely
    reference to priestly vesture without over-specifying 'vestments,' which is interpretive
    though plausible.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the house
  alternatives:
  - in the temple
  - in the sanctuary
  lexicon: LSJ
  rationale: Although ἱερόν often means 'temple' or sacred precinct, the Hebrew parallel
    has בֵּית יְהוָה ('house of YHWH'). Because the task requires using the parallel
    as actual input, 'house' better reflects the Semitic background while remaining
    natural in English. The sacred-building sense is still clear from the following
    genitive.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the LORD
  lexicon: LSJ
  rationale: κύριος is rendered 'Lord' per project defaults. The Hebrew parallel reflects
    the divine name, but in this Greek deuterocanonical context the source text reads
    κυρίου; 'Lord' follows the stated contested-terms policy for κύριος.
