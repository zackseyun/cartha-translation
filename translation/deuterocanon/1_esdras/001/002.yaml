theological_decisions:
- issue: Rendering of κύριος where the Hebrew parallel has YHWH
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The primary source is the Greek, which reads κυρίου. Project doctrine
    defaults κύριος to 'Lord,' while YHWH in Hebrew is normally 'the LORD.' Since
    this verse is translated from Greek with Hebrew used as a control, 'the Lord'
    best reflects source primacy while acknowledging the Hebrew background.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Contested terms table for κύριος and יְהוָה'
- issue: Whether to make priestly clothing explicit as 'vestments'
  chosen_reading: clothed in splendor
  alternative_readings:
  - wearing their vestments
  - arrayed
  rationale: The Greek indicates adorned or splendid clothing but does not explicitly
    name priestly garments. To avoid importing more specificity than the text states,
    the main text keeps the broader phrase, with a footnote preserving the likely
    lexical alternative.
  doctrine_reference: 'DOCTRINE.md: Never paraphrase beyond what the source text warrants;
    optimal equivalence'
