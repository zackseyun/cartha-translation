theological_decisions:
- issue: Narrative sense of ἀπεκατέστησεν with infinitive βασιλεύειν
  chosen_reading: The phrase means the king of Egypt deposed him, i.e., removed him
    from reigning in Jerusalem.
  alternative_readings:
  - The king of Egypt restored/appointed him to reign in Jerusalem.
  rationale: Although ἀποκαθίστημι can mean restore or appoint in some contexts, that
    sense conflicts with the immediate historical narrative in which the Egyptian
    king removes Jehoahaz after a three-month reign. The approximate MT parallel supplied
    is not directly aligned for this verse, but the broader Chronicles context supports
    the privative/depositional sense. The translation therefore reflects the contextual
    meaning while documenting the lexical alternative.
  doctrine_reference: 'Translation philosophy §§1, 5: original-language primacy with
    documented contextual variance.'
