translation:
  text: And he reigned over Israel and Jerusalem for three months; and the king of
    Egypt removed him from reigning in Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally has 'in Israel and Jerusalem.' English 'over Israel and
      Jerusalem' expresses the sense of royal rule more naturally.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'removed him from reigning' can elsewhere mean 'restore'
      or 'appoint,' but here the context indicates deposition by the king of Egypt.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐβασίλευσεν
  chosen: he reigned
  alternatives:
  - he became king
  - he ruled as king
  lexicon: BDAG
  rationale: The aorist verb denotes exercising kingship, not merely accession. 'He
    reigned' is the most natural and sufficiently formal English rendering.
- source_word: ἐν Ἰσραὴλ καὶ Ἰερουσαλήμ
  chosen: over Israel and Jerusalem
  alternatives:
  - in Israel and Jerusalem
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' with βασιλεύω English idiom normally uses
    'over' to express the realm ruled. 'Israel and Jerusalem' follows the Greek wording,
    even though the historical parallel might suggest Judah/Jerusalem; the Greek source
    governs the translation.
- source_word: μῆνας τρεῖς
  chosen: for three months
  alternatives:
  - three months
  lexicon: BDAG
  rationale: English requires the preposition for smooth idiomatic duration.
- source_word: ἀπεκατέστησεν
  chosen: removed him from reigning
  alternatives:
  - deposed him
  - caused him to cease reigning
  - restored him to reign
  lexicon: BDAG
  rationale: In this context the following infinitive βασιλεύειν and the narrative
    sense indicate that the Egyptian king caused his kingship to cease, not that he
    restored him. 'Deposed him' is concise, but 'removed him from reigning' stays
    closer to the Greek construction and avoids over-interpretation.
- source_word: βασιλεὺς Αἰγύπτου
  chosen: the king of Egypt
  alternatives:
  - Egypt's king
  lexicon: BDAG
  rationale: Standard transparent rendering of the title phrase.
- source_word: βασιλεύειν ἐν Ἰερουσαλήμ
  chosen: from reigning in Jerusalem
  alternatives:
  - from ruling in Jerusalem
  - to reign in Jerusalem
  lexicon: BDAG
  rationale: The infinitive depends on ἀπεκατέστησεν in a privative sense here. Rendering
    it with 'from reigning' makes the implied cessation explicit in English and fits
    the narrative context.
