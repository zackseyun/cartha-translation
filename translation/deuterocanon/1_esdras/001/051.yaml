theological_decisions:
- issue: Referent of the singular subject in 'he handed everything over'
  chosen_reading: Retain the singular 'he' without specifying the antecedent in the
    translation.
  alternative_readings:
  - Interpret the subject explicitly as 'the Lord' from the broader context
  - Interpret the subject as an implied royal or narrative agent
  rationale: The Greek has a singular verb without an explicit subject in this sentence.
    The immediate clause itself does not name the actor, so the translation preserves
    that textual feature rather than resolving it interpretively. The broader context
    may suggest the Lord as the ultimate agent, but the verse as given leaves the
    subject implicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
