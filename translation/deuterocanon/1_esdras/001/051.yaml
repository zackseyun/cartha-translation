translation:
  text: But he handed everything over into their hands. And after taking all the holy
    vessels of the Lord, the great and the small, and the treasuries of the Lord and
    the royal storehouses, they carried them away to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek leaves the subject of 'he handed everything over' implicit. In
      context, readers may understand this as referring ultimately to the Lord, but
      the verse itself does not state the subject explicitly.
    reason: alternative_reading
  - marker: b
    text: Or 'the royal treasuries.' The Greek term can denote storage places or repositories;
      'storehouses' is the more direct rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέδωκεν
  chosen: handed ... over
  alternatives:
  - delivered
  - gave over
  lexicon: BDAG
  rationale: The verb commonly means to hand over or deliver. 'Handed ... over' preserves
    the sense of surrendering control without sounding overly wooden.
- source_word: εἰς τὰς χεῖρας αὐτῶν
  chosen: into their hands
  alternatives:
  - to them
  - into their power
  lexicon: BDAG
  rationale: This idiom is kept fairly literally because it is natural in English
    and preserves the concrete sense of transfer into the captors' control.
- source_word: ἱερὰ σκεύη
  chosen: holy vessels
  alternatives:
  - sacred vessels
  - temple vessels
  lexicon: BDAG
  rationale: Refers to consecrated cultic objects. 'Holy vessels' preserves the religious
    register and direct connection to the Lord.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - belonging to the Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' The genitive is retained straightforwardly.
- source_word: τὰ μεγάλα καὶ τὰ μικρά
  chosen: the great and the small
  alternatives:
  - the large and the small
  - both great and small
  lexicon: BDAG
  rationale: A comprehensive pair indicating all sizes/categories. The chosen rendering
    is idiomatic and close to the Greek.
- source_word: κιβωτούς
  chosen: chests
  alternatives:
  - boxes
  - cases
  - coffers
  lexicon: LSJ
  rationale: The term here most naturally denotes containers or chests, not the ark
    of the covenant. 'Chests' is clear, dignified, and avoids misleading readers.
- source_word: βασιλικὰς ἀποθήκας
  chosen: the royal storehouses
  alternatives:
  - the royal treasuries
  - the king's storehouses
  lexicon: LSJ
  rationale: ἀποθήκη ordinarily denotes a storehouse or repository. 'Royal storehouses'
    is the most direct rendering, though the context of seized valuables allows 'treasuries'
    as a possible interpretive alternative.
- source_word: ἀναλαβόντες
  chosen: after taking
  alternatives:
  - having taken up
  - taking
  lexicon: BDAG
  rationale: The participle is antecedent to the main verb ἀπήνεγκαν. 'After taking'
    makes the sequence clear in natural English.
- source_word: ἀπήνεγκαν
  chosen: they carried them away
  alternatives:
  - they brought away
  - they took away
  lexicon: BDAG
  rationale: The compound verb conveys removal/transport away. 'Carried them away'
    fits the movement of temple objects into exile.
- source_word: εἰς Βαβυλῶνα
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: BDAG
  rationale: Standard destination phrase; 'to Babylon' is idiomatic English.
