translation:
  text: And the God of their fathers sent by his angel to visit their people and to
    call them back, because he had compassion on them and on his dwelling place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through his messenger'; Greek ἄγγελος can mean either 'angel' or 'messenger.'
    reason: lexical_alternative
  - marker: b
    text: 'The opening Greek wording is unusual: literally, ''the King of their fathers,
      the God of their fathers.'' The translation preserves both titles rather than
      silently smoothing the text.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Standard aorist of ἀποστέλλω; 'sent' is the natural English equivalent
    and preserves the straightforward narrative force.
- source_word: ὁ βασιλεὺς τῶν πατέρων αὐτῶν
  chosen: the King of their fathers
  alternatives:
  - the king of their fathers
  lexicon: LSJ
  rationale: The Greek text as transmitted reads βασιλεύς where the sense clearly
    points to God; retaining 'King' reflects the extant Greek while capitalizing it
    signals a divine title in apposition to 'the God of their fathers.' The phrase
    is unusual and may reflect textual disturbance, but it is still intelligible as
    a title for God.
- source_word: ὁ θεὸς τῶν πατέρων αὐτῶν
  chosen: the God of their fathers
  alternatives:
  - their ancestral God
  lexicon: LSJ
  rationale: This is a standard biblical expression. 'The God of their fathers' preserves
    the covenantal and ancestral resonance better than a more idiomatic paraphrase.
- source_word: ἐπισκέψασθαι
  chosen: to visit
  alternatives:
  - to look after
  - to care for
  lexicon: BDAG
  rationale: The infinitive can denote visiting with concern or intervention. 'To
    visit' keeps the biblical idiom while allowing the following clause to explain
    the gracious purpose.
- source_word: τὸν λαὸν αὐτῶν
  chosen: their people
  alternatives:
  - the people
  - his people
  lexicon: BDAG
  rationale: The Greek has 'their,' agreeing with the repeated 'their fathers.' Although
    English might expect 'his people' when referring to God, 'their people' best reflects
    the transmitted wording and still makes sense in context.
- source_word: διὰ τοῦ ἀγγέλου αὐτοῦ
  chosen: by his angel
  alternatives:
  - through his messenger
  - through his angel
  lexicon: BDAG
  rationale: ἄγγελος can mean either 'angel' or 'messenger.' In this scriptural context
    of divine sending, 'angel' is the more natural default, while the alternative
    is preserved in a footnote because the term can be broader.
- source_word: μετακαλέσαι αὐτούς
  chosen: to call them back
  alternatives:
  - to summon them
  - to call them
  lexicon: LSJ
  rationale: The compound verb suggests calling over or back. Given the restoration
    context and the MT parallel's theme of turning back to the LORD, 'to call them
    back' best captures the likely force without over-paraphrasing.
- source_word: καθὸ ἐφείδετο αὐτῶν
  chosen: because he had compassion on them
  alternatives:
  - because he spared them
  - since he pitied them
  lexicon: BDAG
  rationale: φείδομαι can mean spare or have pity/compassion. Here the causal clause
    explains God's gracious initiative toward the people and sanctuary, so 'had compassion
    on' communicates the motive clearly in modern English.
- source_word: τοῦ σκηνώματος αὐτοῦ
  chosen: his dwelling place
  alternatives:
  - his tabernacle
  - his sanctuary
  lexicon: LSJ
  rationale: σκῆνωμα literally denotes a dwelling or habitation. In temple context
    it refers to God's sacred dwelling; 'dwelling place' is transparent and avoids
    importing the more specific 'tabernacle' if the reference is to the temple as
    God's habitation.
