theological_decisions:
- issue: How to render the unusual double designation for God in the opening clause
  chosen_reading: Treat both 'the King of their fathers' and 'the God of their fathers'
    as appositional divine titles
  alternative_readings:
  - Emend in sense to 'the king and the God of their fathers'
  - Treat 'king' as a textual corruption and translate only 'the God of their fathers'
  rationale: The transmitted Greek contains both expressions in sequence. Rather than
    silently correcting the text, the draft preserves both as titles for God. This
    maintains transparency about the source while yielding coherent English.
  doctrine_reference: 'PHILOSOPHY.md: transparency and original-language primacy'
- issue: Whether ἄγγελος should be rendered 'angel' or 'messenger'
  chosen_reading: angel
  alternative_readings:
  - messenger
  rationale: The default sense in biblical Greek for divine agency is 'angel,' but
    because the word can also denote a human messenger, the alternative is preserved
    in a footnote rather than erased.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
