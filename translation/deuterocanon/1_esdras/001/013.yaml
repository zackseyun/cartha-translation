theological_decisions:
- issue: Rendering the kinship term ἀδελφοῖς in a priestly/tribal context
  chosen_reading: their brothers
  alternative_readings:
  - their fellow Israelites among the priests
  - their kinsmen
  rationale: The Greek explicitly uses the masculine kinship term 'brothers.' Per
    doctrine, gender-accurate rendering is preferred over neutralizing language. In
    this context it denotes covenantal/tribal kinship among male priestly personnel,
    so 'their brothers' is appropriate.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
