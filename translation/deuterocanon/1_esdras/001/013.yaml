translation:
  text: For the priests were offering up the fat until evening, and the Levites prepared
    for themselves and for the priests, their brothers, the sons of Aaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fat portions.' The Greek refers to the sacrificial fat offered on
      the altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέφερον
  chosen: were offering up
  alternatives:
  - offered
  - brought up
  lexicon: BDAG
  rationale: In sacrificial context, ἀναφέρω commonly means to offer up on the altar.
    The imperfect is represented with the progressive 'were offering up,' matching
    the ongoing action until evening.
- source_word: τὰ στέατα
  chosen: the fat
  alternatives:
  - the fat portions
  lexicon: LSJ
  rationale: στέαρ refers to fat, especially sacrificial fat. 'The fat' is concise
    and natural; 'fat portions' is possible but slightly more interpretive. The cultic
    sense is clear from context.
- source_word: ἕως ὀψίας
  chosen: until evening
  alternatives:
  - until late
  - until nightfall
  lexicon: LSJ
  rationale: The phrase denotes the time extending to evening. 'Until evening' is
    the most direct rendering and avoids adding nuance not explicit in the Greek.
- source_word: ἡτοίμασαν
  chosen: prepared
  alternatives:
  - made ready
  - prepared food
  lexicon: BDAG
  rationale: The verb means 'prepared' or 'made ready.' Because the object is implicit
    from the sacrificial-meal context, 'prepared' preserves the Greek's economy without
    over-specifying.
- source_word: ἑαυτοῖς
  chosen: for themselves
  alternatives:
  - for their own use
  lexicon: BDAG
  rationale: Straightforward reflexive dative. It indicates that the Levites prepared
    portions for themselves as well as for others.
- source_word: τοῖς ἱερεῦσιν ἀδελφοῖς αὐτῶν
  chosen: for the priests, their brothers
  alternatives:
  - for their brothers the priests
  - for the priests who were their brothers
  lexicon: BDAG
  rationale: The appositional relationship is best preserved by 'the priests, their
    brothers.' This keeps the familial/corporate language of the source rather than
    flattening it.
- source_word: υἱοῖς Ἀαρών
  chosen: the sons of Aaron
  alternatives:
  - Aaron's sons
  lexicon: BDAG
  rationale: This identifies the priests more specifically. 'The sons of Aaron' preserves
    the traditional priestly designation and mirrors the Greek structure.
