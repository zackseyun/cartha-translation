translation:
  text: And all the kings of Israel had not kept such a Passover as Josias kept, and
    the priests and the Levites and the Judeans and all Israel who were found dwelling
    in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Josias; the Hebrew parallel names the same king as Josiah.
    reason: cross_reference
  - marker: b
    text: Or 'had not celebrated such a Passover.' The Greek literally says 'had not
      led/brought a Passover such as...,' an idiom for observing it.
    reason: lexical_alternative
  - marker: c
    text: '''The Judeans'' may also be rendered ''the Jews''; here the term likely
      carries an ethnic-geographic sense tied to Judah/Judea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγον πάσχα
  chosen: had not kept such a Passover
  alternatives:
  - had not celebrated such a Passover
  - had not held such a Passover
  lexicon: BDAG
  rationale: Although ἄγω literally means 'lead/bring,' with πάσχα it idiomatically
    refers to observing or keeping the Passover. 'Kept' is natural English and aligns
    with the cultic sense without over-paraphrasing. The MT parallel speaks of doing
    the Passover, supporting an observance idiom rather than a literal 'brought.'
- source_word: τοιοῦτον οἷον
  chosen: such a ... as
  alternatives:
  - like this ... as
  - such as
  lexicon: LSJ
  rationale: 'This correlative construction emphasizes comparison: no kings had kept
    a Passover of this kind, namely the one Josias kept. ''Such a ... as'' preserves
    the comparative force in idiomatic English.'
- source_word: Ἰωσείας
  chosen: Josias
  alternatives:
  - Josiah
  rationale: Because the Greek source text has the Hellenized form Ἰωσείας in 1 Esdras,
    'Josias' reflects the direct Greek transliteration. The Hebrew parallel confirms
    the underlying figure is Josiah, but the project philosophy for names is to transliterate
    the source-form rather than harmonize automatically to the MT form.
- source_word: Ἰουδαῖοι
  chosen: the Judeans
  alternatives:
  - the Jews
  - the men of Judah
  lexicon: BDAG
  rationale: In this historical setting the term denotes the people of Judah/Judea
    rather than functioning primarily as a later religious label. 'Judeans' preserves
    the ethnic-geographic sense and avoids anachronistic overtones.
- source_word: πᾶς Ἰσραὴλ
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: LSJ
  rationale: This is the standard collective expression and should be preserved straightforwardly.
    It likely broadens the assembly beyond the Judeans already mentioned.
- source_word: οἱ εὑρεθέντες
  chosen: who were found
  alternatives:
  - who were present
  - who were discovered
  lexicon: BDAG
  rationale: The participle literally means 'those found.' In context it refers to
    those present/available in Jerusalem. 'Who were found' keeps the source wording
    while remaining intelligible.
- source_word: ἐν τῇ κατοικήσει αὐτῶν ἐν Ἰερουσαλήμ
  chosen: dwelling in Jerusalem
  alternatives:
  - in their dwelling in Jerusalem
  - in their settlement at Jerusalem
  - resident in Jerusalem
  lexicon: LSJ
  rationale: The phrase is somewhat awkward in Greek. A wooden rendering ('in their
    dwelling') is unclear in English. 'Dwelling in Jerusalem' captures the locative-residential
    sense concisely. The MT parallel is not verbally identical here, so the Greek
    governs, but the sense is still that these Israelites were present as residents
    or inhabitants in Jerusalem.
