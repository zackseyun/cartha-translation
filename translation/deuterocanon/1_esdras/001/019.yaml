theological_decisions:
- issue: Scope of 'all the kings of Israel'
  chosen_reading: Retain the broad historical claim as written, without narrowing
    it to only Judah's kings.
  alternative_readings:
  - all the kings over Israel/Judah
  - all the former kings
  rationale: The Greek explicitly says 'all the kings of Israel.' Since 1 Esdras often
    uses Israel-language broadly, the translation preserves that wording rather than
    harmonizing to a narrower historical formulation from Chronicles.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
