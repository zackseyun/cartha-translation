theological_decisions:
- issue: Rendering of κύριος in a deuterocanonical Greek context
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The Greek text has κυρίου, and project doctrine specifies 'Lord' as the
    default rendering. Although the Hebrew parallel tradition often reflects the divine
    name, this verse's primary witness is Greek and the standard covenantal rendering
    is maintained.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Nuance of οὐκ ἐνετράπη in relation to prophetic warning
  chosen_reading: he was not ashamed because of the words spoken by Jeremiah
  alternative_readings:
  - he did not humble himself before the words spoken by Jeremiah
  - he was not put to shame by the words spoken by Jeremiah
  rationale: The Greek wording emphasizes lack of shame/abashment, not explicitly
    humility. The MT parallel in 2 Chronicles 36:12 speaks differently, but the translation
    remains anchored in the Greek of 1 Esdras while allowing the Hebrew parallel to
    confirm the broader narrative setting.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
