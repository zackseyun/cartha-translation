translation:
  text: And he did what was evil before the Lord, and he was not ashamed at the words
    spoken by Jeremiah the prophet from the mouth of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he did not humble himself before the words spoken by Jeremiah the prophet
      from the mouth of the Lord.' The Hebrew parallel in 2 Chronicles 36:12 uses
      language of not humbling oneself, while 1 Esdras here speaks of not being ashamed
      or abashed.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐποίησεν τὸ πονηρόν
  chosen: did what was evil
  alternatives:
  - did evil
  - worked wickedness
  lexicon: LSJ
  rationale: The idiom literally means 'did the evil' and is a standard biblical way
    of describing morally evil conduct. 'Did what was evil' preserves the idiomatic
    force in natural English without over-paraphrasing.
- source_word: ἐνώπιον Κυρίου
  chosen: before the Lord
  alternatives:
  - in the sight of the Lord
  - in the Lord's presence
  lexicon: LSJ
  rationale: ἐνώπιον commonly means 'before' or 'in the sight of.' 'Before the Lord'
    is concise and preserves the covenantal/judicial sense. κύριος is rendered 'Lord'
    per doctrine.
- source_word: οὐκ ἐνετράπη
  chosen: he was not ashamed
  alternatives:
  - he was not put to shame
  - he did not feel shame
  - he was not abashed
  lexicon: LSJ
  rationale: The verb ἐντρέπω in the passive/middle can denote feeling shame or being
    abashed. In this context it describes the king's failure to respond with shame
    to prophetic warning. 'He was not ashamed' is the clearest modern rendering.
- source_word: ἀπό
  chosen: because of
  alternatives:
  - by
  - from
  - at
  lexicon: LSJ
  rationale: After ἐνετράπη, ἀπό can mark the occasion or cause of shame. 'Because
    of' best conveys that the spoken words should have moved him to shame. A more
    literal 'from' would be awkward in English.
- source_word: τῶν ῥηθέντων λόγων
  chosen: the words spoken
  alternatives:
  - the spoken words
  - the things that were said
  lexicon: LSJ
  rationale: The participle ῥηθέντων modifies λόγων. 'The words spoken' preserves
    both elements without stiffness.
- source_word: ὑπὸ Ἰερεμίου τοῦ προφήτου
  chosen: by Jeremiah the prophet
  alternatives:
  - by Jeremiah the prophetically inspired one
  lexicon: LSJ
  rationale: Straightforward agent phrase. 'Jeremiah' follows standard English transliteration;
    'the prophet' is retained as part of the Greek wording.
- source_word: ἐκ στόματος τοῦ κυρίου
  chosen: from the mouth of the Lord
  alternatives:
  - from the Lord's mouth
  - by the Lord's mouth
  lexicon: LSJ
  rationale: This is a standard biblical expression for direct divine utterance. Retaining
    'mouth' preserves the vivid prophetic formula and avoids flattening it to merely
    'from the Lord.'
