translation:
  text: And they burned the house of the Lord, and tore down the walls of Jerusalem,
    and burned its towers with fire,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set the house of the Lord on fire' and later 'set its towers on fire.'
      The Greek uses the same burning verb twice.
    reason: lexical_alternative
  - marker: b
    text: '''The house of the Lord'' refers to the temple in Jerusalem.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐνεπύρισαν
  chosen: burned
  alternatives:
  - set on fire
  - burned down
  lexicon: LSJ
  rationale: The verb means to burn or set ablaze. 'Burned' is clear modern English
    and fits both occurrences in the verse without over-specifying total destruction.
- source_word: τὸν οἶκον τοῦ κυρίου
  chosen: the house of the Lord
  alternatives:
  - the temple of the Lord
  - the house of the LORD
  lexicon: LSJ
  rationale: οἶκος literally means 'house.' In this context it refers to the temple,
    but 'house of the Lord' preserves the source wording while remaining idiomatic.
    'Lord' follows the project's default for κύριος.
- source_word: κατέλυσαν
  chosen: tore down
  alternatives:
  - destroyed
  - demolished
  - pulled down
  lexicon: LSJ
  rationale: The verb here conveys dismantling or bringing down structures. 'Tore
    down' is vivid, natural English and suits walls better than the broader 'destroyed.'
- source_word: τὰ τείχη Ἰερουσαλήμ
  chosen: the walls of Jerusalem
  alternatives:
  - Jerusalem's walls
  lexicon: LSJ
  rationale: A straightforward formal rendering of the phrase.
- source_word: τοὺς πύργους αὐτῆς
  chosen: its towers
  alternatives:
  - her towers
  - its fortifications
  lexicon: LSJ
  rationale: πύργοι are towers. The neuter English possessive 'its' is preferred for
    the city in modern English, though Greek uses a feminine pronoun for Jerusalem.
- source_word: ἐν πυρί
  chosen: with fire
  alternatives:
  - in fire
  lexicon: LSJ
  rationale: The phrase is an idiomatic intensifier accompanying the second burning
    verb. 'With fire' is standard English and preserves the instrumental sense.
