id: 1ES.1.23
reference: 1 Esdras 1:23
source:
  edition: lxx-swete-1909
  text: Καὶ μετὰ πᾶσαν τὴν πρᾶξιν ταύτην Ἰωσείου συνέβη Φαραὼ βασιλέα Αἰγύπτου ἐλθόντα
    πόλεμον ἐγείραι ἐν Χαρκαμυς ἐπὶ τοῦ Εὐφράτου· καὶ ἐξῆλθεν εἰς
  language: Greek
  pages:
  - 146
  - 147
  - 148
  - 149
  - 150
  - 151
  - 152
  confidence: high
  validation: minor_mismatch
translation:
  text: And after all this activity of Josias, it happened that Pharaoh king of Egypt
    came to stir up war at Carchemish on the Euphrates; and Josias went out against
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek source in Swete is truncated at the end of the verse ('and he
      went out to ...'). The rendering 'against him' reflects the immediate narrative
      context and the likely sense of the unfinished clause, but the surviving Zone
      1 wording is incomplete at this point.
    reason: textual_variant
  - marker: b
    text: Josias = the more familiar English 'Josiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ πᾶσαν τὴν πρᾶξιν ταύτην
  chosen: after all this action
  alternatives:
  - after all these things
  - after all this deed
  lexicon: LSJ
  rationale: πρᾶξις can denote deed, action, or undertaking. The singular with ταύτην
    points back to the preceding course of conduct rather than merely a list of events.
    'Action' preserves the Greek noun without overinterpreting.
- source_word: Ἰωσείου
  chosen: Josias
  alternatives:
  - Josiah
  rationale: In 1 Esdras, Greek proper names are normally transliterated from the
    Greek form. 'Josias' reflects the source-form Ἰωσείου more directly than harmonizing
    to the Hebrew/English conventional 'Josiah'.
- source_word: συνέβη
  chosen: it happened
  alternatives:
  - it came to pass
  - it occurred
  lexicon: LSJ
  rationale: '''It happened'' is a natural modern equivalent for the narrative formula,
    avoiding archaic diction while preserving the eventive force.'
- source_word: ἐλθόντα
  chosen: came
  alternatives:
  - having come
  lexicon: LSJ
  rationale: The participle is naturally absorbed into English narrative as a finite
    verb. 'Came' keeps the movement explicit without woodenly reproducing the participial
    structure.
- source_word: πόλεμον ἐγείραι
  chosen: to stir up war
  alternatives:
  - to wage war
  - to raise war
  lexicon: LSJ
  rationale: ἐγείρω with πόλεμος literally suggests raising or stirring up war. 'Stir
    up war' preserves that imagery better than the flatter 'wage war'.
- source_word: ἐν Χαρκαμυς
  chosen: at Carchemish
  alternatives:
  - in Carchemish
  rationale: For a battle location, English idiom prefers 'at Carchemish.' The Greek
    place-name Χαρκαμυς corresponds to Carchemish.
- source_word: ἐπὶ τοῦ Εὐφράτου
  chosen: on the Euphrates
  alternatives:
  - by the Euphrates
  - upon the Euphrates
  rationale: This is a standard geographical qualifier. 'On the Euphrates' is concise
    and idiomatic in English for a city situated by the river.
- source_word: καὶ ἐξῆλθεν εἰς
  chosen: and Josias went out against him
  alternatives:
  - and he went out
  - and Josias marched out
  lexicon: LSJ
  rationale: The Zone 1 text is truncated after εἰς, but the clause clearly begins
    Josias's response. Given the high-confidence source and the narrative context,
    'went out against him' is the minimal completion that makes sense of the unfinished
    phrase without adding unnecessary detail. The subject is supplied from context
    as Josias.
