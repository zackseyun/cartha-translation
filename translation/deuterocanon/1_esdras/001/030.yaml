theological_decisions:
- issue: Rendering the commemorative practice at the end of the verse without overstating
    legal or cultic force
  chosen_reading: this was ordained to be done forever
  alternative_readings:
  - this was decreed to be done continually
  - this was established as a perpetual custom
  rationale: The Greek indicates some formal establishment of ongoing lament, but
    does not specify by whom or in what legal form. The chosen wording preserves the
    solemnity without importing a stronger doctrinal or liturgical claim than the
    text states.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
