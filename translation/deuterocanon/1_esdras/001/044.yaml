translation:
  text: And he appointed Zedekiah king over Judea and Jerusalem; Zedekiah was twenty-one
    years old, and he reigned eleven years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Judea and Jerusalem.'' The Hebrew parallel tradition in this context
      commonly has ''Judah and Jerusalem.'' The main text follows the Greek source
      of 1 Esdras rather than harmonizing to the Hebrew parallel.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνέδειξεν
  chosen: appointed
  alternatives:
  - made
  - installed
  - set up
  lexicon: LSJ
  rationale: The verb can mean to appoint or raise up to office. In this royal context,
    'appointed' clearly conveys formal installation without sounding overly wooden.
- source_word: Σεδεκίαν
  chosen: Zedekiah
  rationale: Standard English transliteration of the royal name; personal names are
    transliterated rather than translated.
- source_word: βασιλέα
  chosen: king
  alternatives:
  - as king
  lexicon: LSJ
  rationale: Straightforward royal title; English idiom supplies 'king' naturally
    after 'appointed.'
- source_word: τῆς Ἰουδαίας καὶ Ἰερουσαλήμ
  chosen: over Judea and Jerusalem
  alternatives:
  - of Judea and Jerusalem
  - king of Judah and Jerusalem
  lexicon: LSJ
  rationale: The Greek names the realm as 'Judea and Jerusalem.' Because 1 Esdras
    is translated from Greek, the main text follows the Greek geographical form rather
    than harmonizing to the MT's 'Judah.' 'Over' makes the governance relation idiomatic
    in English.
- source_word: ὄντα ἐτῶν εἴκοσι ἑνός
  chosen: was twenty-one years old
  alternatives:
  - being twenty-one years old
  lexicon: LSJ
  rationale: Idiomatic English rendering of the age formula.
- source_word: βασιλεύει
  chosen: he reigned
  alternatives:
  - he ruled as king
  lexicon: LSJ
  rationale: Standard rendering for the verb of royal reign.
- source_word: ἔτη ἕνδεκα
  chosen: eleven years
  rationale: Direct rendering of the duration phrase.
