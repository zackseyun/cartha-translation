theological_decisions:
- issue: Whether to expand κύριος to 'the LORD' or 'the Lord his God' under influence
    from Hebrew parallel material
  chosen_reading: his Lord
  alternative_readings:
  - the LORD
  - the Lord his God
  rationale: The Greek of 1 Esdras is the primary source for this book, and it reads
    τοῦ κυρίου αὐτοῦ without θεός. The MT parallel supplied is only approximate and
    does not directly control this verse's wording. Therefore the translation keeps
    the Greek's more limited expression while still rendering κύριος as 'Lord' per
    doctrine.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    contested terms table for κύριος'
