theological_decisions:
- issue: Subject identification in a compressed historical notice
  chosen_reading: Render the Greek as referring to the Egyptian ruler's action against
    Jehoiakim and his circle, without expanding the subject in the main text.
  alternative_readings:
  - Supply 'the king of Egypt' explicitly from the broader context/MT parallel
  - Treat Jehoiakim himself as the one who bound the nobles
  rationale: The Greek clause as transmitted is compressed and, taken woodenly, could
    suggest Jehoiakim as subject; but the MT parallel and surrounding narrative indicate
    the Egyptian king is the acting figure. To avoid a misleading historical sense
    while staying anchored to the Greek wording, the English keeps the pronoun 'he'
    rather than inserting a full subject not present in this clause.
  doctrine_reference: Preserve source tension rather than over-resolve; use parallel
    source as translation input while keeping Greek primary.
