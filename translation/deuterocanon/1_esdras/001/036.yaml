translation:
  text: And he bound Jehoiakim’s nobles, and after seizing Zarius his brother, he
    brought him up from Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''And he bound Jehoiakim’s nobles''; the clause is compressed, and
      the broader context together with the Hebrew parallel indicates the acting subject
      is the king of Egypt, not Jehoiakim himself.'
    reason: alternative_reading
  - marker: b
    text: Some would render μεγιστᾶνας as 'great men' or 'magnates.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδησεν
  chosen: bound
  alternatives:
  - imprisoned
  - put in chains
  lexicon: LSJ
  rationale: δέω commonly means 'bind, tie, fetter.' 'Bound' preserves the concrete
    force without over-specifying the exact method of restraint.
- source_word: τοὺς μεγιστᾶνας
  chosen: nobles
  alternatives:
  - great men
  - magnates
  - officials
  lexicon: LSJ
  rationale: μεγιστάνες denotes leading men or grandees. 'Nobles' is concise, natural
    English for elite court figures, while 'great men' is too literal and awkward.
- source_word: Ζάριον
  chosen: Zarius
  alternatives:
  - Zarion
  rationale: This is a proper name transliterated from the Greek accusative form.
    'Zarius' is a standardized English transliteration that reads naturally while
    remaining close to the source form.
- source_word: συλλαβών
  chosen: after seizing
  alternatives:
  - having arrested
  - having captured
  lexicon: LSJ
  rationale: The participle indicates apprehending or taking into custody. 'After
    seizing' preserves the participial sequence and avoids importing a more formal
    legal nuance than the Greek requires.
- source_word: ἀνήγαγεν
  chosen: brought him up
  alternatives:
  - led him up
  - brought
  lexicon: LSJ
  rationale: ἀνάγω often means 'lead/br ing up.' Because the text specifies movement
    from Egypt, 'brought him up' preserves the directional nuance conventional in
    biblical geography.
- source_word: ἐξ Αἰγύπτου
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: LSJ
  rationale: The phrase marks origin. 'From Egypt' is idiomatic and sufficiently precise.
- source_word: Ἰωακεὶμ
  chosen: Jehoiakim
  alternatives:
  - Joakim
  - Ioakeim
  rationale: The Greek form corresponds to the well-known biblical name Jehoiakim.
    The MT parallel concerns the Egyptian king's action against the Judean ruler,
    so using the standard English biblical form best aligns the Greek name with the
    historical referent.
