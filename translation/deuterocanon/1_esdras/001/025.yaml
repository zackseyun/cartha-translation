translation:
  text: Was I not sent against you by the Lord God? For my war is on the Euphrates,
    and now the Lord is with me, and the Lord is with me, urging me on. Stand aside,
    and do not oppose the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the Euphrates' or 'by the Euphrates.' The Greek phrase marks the
      location of Neco's campaign; the Hebrew parallel names Carchemish on the Euphrates.
    reason: lexical_alternative
  - marker: b
    text: Or 'hastening me' or 'speeding me on.' The Greek participle indicates that
      the Lord is pressing the campaign forward.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχὶ
  chosen: Was ... not
  alternatives:
  - Did ... not
  lexicon: BDAG
  rationale: Rhetorical interrogative expecting a positive answer; English idiom is
    best conveyed with 'Was I not ... ?'.
- source_word: πρὸς σὲ
  chosen: against you
  alternatives:
  - to you
  - for you
  lexicon: BDAG
  rationale: 'Although πρός with accusative often means ''to/toward,'' in this military
    context and in light of the Hebrew parallel about going out to meet in battle,
    it carries adversative force: Neco says he was not sent on a mission against Josiah.'
- source_word: ἐξαπέσταλμαι
  chosen: was sent
  alternatives:
  - have been sent
  lexicon: BDAG
  rationale: Perfect/passive form, but idiomatic English in this direct speech is
    better with simple past/passive. The focus is divine commissioning, not the present-result
    nuance.
- source_word: ὑπὸ Κυρίου τοῦ θεοῦ
  chosen: by the Lord God
  alternatives:
  - by the Lord, God
  - by the Lord my God
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per project policy. The Greek text has 'the
    God,' not 'my God'; 'Lord God' is the most natural English equivalent.
- source_word: ἐπὶ γὰρ τοῦ Εὐφράτου
  chosen: on the Euphrates
  alternatives:
  - at the Euphrates
  - by the Euphrates
  lexicon: BDAG
  rationale: The phrase locates the theater of war. 'On the Euphrates' is a natural
    military-geographic rendering in English, though 'at/by the Euphrates' is also
    possible.
- source_word: ὁ πόλεμός μού ἐστιν
  chosen: my war is
  alternatives:
  - my battle is
  - I am at war
  lexicon: BDAG
  rationale: 'A fairly direct rendering preserves the possessive emphasis: the conflict
    concerns Neco''s campaign, not Josiah.'
- source_word: μετʼ ἐμοῦ
  chosen: with me
  alternatives:
  - on my side
  lexicon: BDAG
  rationale: Formal enough to preserve the repeated divine-support formula without
    overinterpreting it.
- source_word: ἐπισπεύδων
  chosen: urging me on
  alternatives:
  - hastening me
  - speeding me on
  - pressing me on
  lexicon: LSJ
  rationale: The participle conveys active acceleration or pressing forward. 'Urging
    me on' is readable modern English and fits the military context better than the
    more wooden 'hastening me.'
- source_word: ἀπόστηθι
  chosen: Stand aside
  alternatives:
  - Withdraw
  - Turn away
  - Keep away
  lexicon: BDAG
  rationale: Imperative calling Josiah to desist from interference. 'Stand aside'
    is idiomatic and fits the immediate warning.
- source_word: μὴ ἐναντίου τῷ κυρίῳ
  chosen: do not oppose the Lord
  alternatives:
  - do not set yourself against the Lord
  - do not be hostile to the Lord
  lexicon: LSJ
  rationale: The verb phrase carries adversative force. 'Oppose' is concise and clear,
    preserving the theological claim that resistance to Neco's campaign is resistance
    to the Lord.
