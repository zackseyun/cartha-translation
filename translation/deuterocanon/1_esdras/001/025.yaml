theological_decisions:
- issue: Reference of κύριος in Neco's speech
  chosen_reading: Render both occurrences as 'the Lord,' presenting Neco as claiming
    divine authorization without specifying covenantal identity beyond the Greek wording.
  alternative_readings:
  - Render more generically as 'a lord/god'
  - Interpret as merely Neco's own deity
  rationale: The Greek text explicitly says Κυρίου τοῦ θεοῦ / Κύριος, and the parallel
    biblical tradition portrays Neco claiming a message from Israel's God. The translation
    should preserve that claim without softening it or importing further theological
    resolution.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; preserve theological tension rather
    than resolve it'
