translation:
  text: These men killed their young men with the sword around the holy temple, and
    they showed no mercy to young man or virgin, old man or youth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'they did not spare young man or virgin, old man or younger
      one.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel supplied for this location is only approximate and reflects
      different wording; the Greek text here specifically describes killing around
      the temple.
    reason: cross_reference
lexical_decisions:
- source_word: οὗτοι
  chosen: These men
  alternatives:
  - These
  - They
  lexicon: LSJ
  rationale: The demonstrative points back to the invaders just mentioned. English
    can render simply 'these,' but 'These men' makes the referent clear without adding
    new content.
- source_word: ἀπέκτειναν
  chosen: killed
  alternatives:
  - slew
  - put to death
  lexicon: LSJ
  rationale: A straightforward past-tense rendering fits the narrative style. 'Slew'
    is too archaic for the project's style; 'put to death' is more formal than needed.
- source_word: τοὺς νεανίσκους αὐτῶν
  chosen: their young men
  alternatives:
  - their youths
  - their young men among them
  lexicon: LSJ
  rationale: νεανίσκος denotes a young man/youth. Because the following list distinguishes
    male youth from virgin, elder, and younger person, 'young men' preserves the masculine
    sense better than the more generic 'youths.' The possessive αὐτῶν is retained
    as 'their,' referring to the people under attack.
- source_word: ἐν ῥομφαίᾳ
  chosen: with the sword
  alternatives:
  - by the sword
  - with a sword
  lexicon: LSJ
  rationale: This is the standard idiomatic rendering for instrument of slaughter
    in biblical narrative. 'With the sword' is natural English and preserves the violent
    concreteness.
- source_word: περικύκλῳ
  chosen: all around
  alternatives:
  - round about
  - around
  lexicon: LSJ
  rationale: The adverb indicates surrounding area. 'All around' captures the distributive
    force more clearly in modern English than 'round about.'
- source_word: τοῦ ἁγίου ἱεροῦ
  chosen: the holy temple
  alternatives:
  - the holy sanctuary
  - the holy shrine
  lexicon: LSJ
  rationale: ἱερόν refers to the temple precinct/temple complex rather than the inner
    sanctuary specifically. 'Temple' is the clearest natural rendering; 'holy' translates
    ἁγίου directly.
- source_word: οὐκ ἐφείσαντο
  chosen: they showed no mercy to
  alternatives:
  - they did not spare
  - they had no pity on
  lexicon: LSJ
  rationale: The verb means 'spare' or 'refrain from harming,' but in this massacre
    context 'showed no mercy to' makes the sense explicit and idiomatic. The alternative
    'did not spare' remains viable.
- source_word: νεανίσκου
  chosen: young man
  alternatives:
  - youth
  lexicon: LSJ
  rationale: 'Singular after the negative is distributive: they spared neither one
    category nor another. ''Young man'' preserves the masculine singular.'
- source_word: παρθένου
  chosen: virgin
  alternatives:
  - maiden
  - young woman
  lexicon: LSJ
  rationale: παρθένος most directly means 'virgin' here. Although 'maiden' is possible,
    it is more archaic; 'young woman' loses the lexical specificity. The term is social/descriptive
    here, not a doctrinally loaded title.
- source_word: πρεσβύτου
  chosen: old man
  alternatives:
  - elder
  - aged man
  lexicon: LSJ
  rationale: In this list of age/sex categories, 'old man' is more likely than the
    office-like 'elder.'
- source_word: νεωτέρου
  chosen: youth
  alternatives:
  - younger person
  - younger one
  lexicon: LSJ
  rationale: The comparative/substantival form denotes a younger person. 'Youth' is
    concise and fits the list, though the Greek is somewhat broader than strictly
    male. The paired categories already include 'young man,' so this likely broadens
    the scope to the younger generation generally.
