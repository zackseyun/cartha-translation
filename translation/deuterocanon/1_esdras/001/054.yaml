translation:
  text: And they were servants to him and to his sons until the Persians came to reign,
    to fulfill the word of the Lord by the mouth of Jeremiah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παῖδες
  chosen: servants
  alternatives:
  - slaves
  - boys
  - children
  lexicon: LSJ
  rationale: In this context of subjugation under an imperial ruler, παῖδες refers
    to persons in service to the king rather than literal sons or young boys. 'Servants'
    is natural English and fits the political setting; 'slaves' is possible but would
    over-specify the social condition beyond what this verse itself states.
- source_word: μέχρι οὗ βασιλεῦσαι Πέρσας
  chosen: until the Persians came to reign
  alternatives:
  - until the Persians reigned
  - until the reign of the Persians
  lexicon: LSJ
  rationale: The infinitive βασιλεῦσαι after μέχρι οὗ is idiomatically rendered as
    the onset of Persian rule. 'Came to reign' makes the transition explicit in readable
    English while staying close to the Greek sense.
- source_word: εἰς ἀναπλήρωσιν
  chosen: to fulfill
  alternatives:
  - for the fulfillment of
  - unto the fulfillment of
  lexicon: LSJ
  rationale: 'The phrase expresses purpose/result: the historical event occurred so
    that the prophetic word would be fulfilled. ''To fulfill'' is concise and idiomatic.'
- source_word: τοῦ ῥήματος τοῦ κυρίου
  chosen: the word of the Lord
  alternatives:
  - the saying of the Lord
  - the matter of the Lord
  lexicon: LSJ
  rationale: ῥῆμα here denotes the prophetic utterance previously spoken by God. 'Word
    of the Lord' is the standard and accurate rendering, and κύριος follows the project's
    default as 'Lord'.
- source_word: ἐν στόματι Ἰερεμίου
  chosen: by the mouth of Jeremiah
  alternatives:
  - through Jeremiah
  - spoken by Jeremiah
  lexicon: LSJ
  rationale: The Greek is a literal prophetic formula. 'By the mouth of Jeremiah'
    preserves the biblical idiom and the mediated nature of the divine word, while
    remaining understandable in English.
