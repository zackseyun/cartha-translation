theological_decisions:
- issue: Referent of the singular verb 'he carried away' after a plural verb earlier
    in the verse
  chosen_reading: The subject is the Babylonian king acting after the unnamed plural
    agents completed the devastation.
  alternative_readings:
  - The singular may function generically for the invading force as a whole.
  rationale: The Greek shifts from plural to singular. The broader narrative and the
    MT parallel support taking the singular as the king of the Chaldeans/Babylonian
    ruler. This is a narrative, not doctrinal, decision, but it affects English clarity.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Whether τοὺς ἐπιλοίπους should be rendered with theologically loaded 'remnant'
  chosen_reading: the survivors
  alternative_readings:
  - the remnant
  rationale: Although 'remnant' is lexically possible, this context stresses those
    left alive after slaughter and destruction rather than a developed theological
    remnant motif. 'Survivors' preserves the historical sense without importing extra
    theological freight.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
