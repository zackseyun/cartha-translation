translation:
  text: And they brought all her splendor to ruin, and he carried the survivors away
    with the sword to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the remnant' for 'the survivors.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'with the sword' may also be understood in close connection with
      the preceding devastation, with the sense that the rest were driven away under
      violent conquest; compare the Hebrew parallel, which emphasizes killing by the
      sword.
    reason: alternative_reading
lexical_decisions:
- source_word: συνετέλεσαν
  chosen: they finished
  alternatives:
  - they completed
  - they brought to an end
  lexicon: LSJ
  rationale: The verb conveys bringing something to completion or consummation. In
    context it introduces the final stage of Jerusalem's devastation, so 'they finished'
    preserves the force without over-paraphrasing.
- source_word: πάντα τὰ ἔνδοξα αὐτῆς
  chosen: all her splendor
  alternatives:
  - all her glorious things
  - all her precious things
  lexicon: LSJ
  rationale: ἔνδοξα can denote glorious or splendid things. Given the feminine pronoun
    referring to the city/temple complex, 'all her splendor' captures the collective
    sense in readable English while preserving the loss of what made her glorious.
- source_word: ἀχρειῶσαι
  chosen: making ... worthless
  alternatives:
  - to ruin
  - to profane
  - to render useless
  lexicon: LSJ
  rationale: The infinitive from ἀχρειόω means to make useless or worthless. 'Making
    all her splendor worthless' reflects the Greek directly. 'Profane' would import
    cultic nuance not explicit in this verb, and 'ruin' is broader but less precise.
- source_word: τοὺς ἐπιλοίπους
  chosen: the survivors
  alternatives:
  - those left
  - the remnant
  lexicon: LSJ
  rationale: The phrase refers to those remaining after the destruction. 'The survivors'
    is idiomatic and contextually clear. 'Remnant' is possible but can carry theological
    overtones not demanded here.
- source_word: ἀπήγαγεν
  chosen: he carried ... away
  alternatives:
  - he led ... away
  - he deported
  lexicon: LSJ
  rationale: The singular verb naturally refers to the king of the Chaldeans/Babylonian
    ruler from the surrounding context. 'Carried away' is a standard and accurate
    rendering for forced removal into exile. 'Deported' is possible but somewhat more
    technical.
- source_word: μετὰ ῥομφαίας
  chosen: with the sword
  alternatives:
  - by the sword
  - under the sword
  lexicon: LSJ
  rationale: The phrase is somewhat compressed. In light of the MT parallel, which
    emphasizes slaughter by the sword, and the Greek syntax linking it with the carrying
    away of the remainder, 'with the sword' preserves the literal wording while allowing
    the sense of violent conquest to remain. Because the exact relation may be heard
    differently, an alternative is preserved in a footnote.
- source_word: εἰς Βαβυλῶνα
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: LSJ
  rationale: Standard directional rendering. 'To Babylon' is natural English and sufficient
    here.
