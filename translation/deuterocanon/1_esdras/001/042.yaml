translation:
  text: He reigned three months and ten days in Jerusalem, and he did what was evil
    before the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sight of the Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεύει
  chosen: He reigned
  alternatives:
  - He was king
  - He ruled as king
  lexicon: LSJ
  rationale: The verb denotes exercising kingship. English idiom favors 'reigned'
    for a monarch's term of rule.
- source_word: μῆνας τρεῖς καὶ ἡμέρας δέκα
  chosen: three months and ten days
  alternatives:
  - for three months and ten days
  lexicon: LSJ
  rationale: This is a straightforward duration expression. English can omit the explicit
    'for' after 'reigned' without loss of sense.
- source_word: ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  lexicon: LSJ
  rationale: Locative phrase indicating the seat of his reign.
- source_word: ἐποίησεν τὸ πονηρόν
  chosen: he did what was evil
  alternatives:
  - he did evil
  - he acted wickedly
  lexicon: LSJ
  rationale: The articular neuter singular with ποιέω is a common biblical idiom for
    moral evil. 'Did what was evil' preserves the idiomatic force and matches clear
    modern English.
- source_word: ἔναντι Κυρίου
  chosen: before the Lord
  alternatives:
  - in the sight of the Lord
  - in the presence of the Lord
  lexicon: LSJ
  rationale: This biblical expression marks divine evaluation. 'Before the Lord' is
    concise and natural, while preserving the covenantal title κύριος/Kyrios pattern
    reflected by Greek Κυρίου.
