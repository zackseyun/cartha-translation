theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek historical context
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The project's default rendering for κύριος is 'Lord.' Nothing in this
    verse requires deviation, and 'against the Lord' fits the covenantal/judicial
    context.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Anthropopathic language for God in ἐλύπησαν αὐτόν
  chosen_reading: grieved him
  alternative_readings:
  - provoked him
  - caused him sorrow
  rationale: The Greek explicitly attributes grief to God. The translation preserves
    this theological tension rather than softening it into a less personal reaction.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
