translation:
  text: And the things concerning him also have been recorded in former times, concerning
    those who sinned and acted wickedly against the Lord beyond every nation and kingdom,
    and grieved him greatly; and the words of the Lord rose up against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek text at ''and grieved him greatly'' is difficult: the transmitted
      word after ''grieved him'' is ἔστω, which is awkward in context. The translation
      takes it as conveying emphasis; alternatively, the line may preserve a minor
      textual disturbance.'
    reason: textual_variant
  - marker: b
    text: Or 'more than every nation and kingdom,' expressing that their sin surpassed
      that of all nations and kingdoms.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ κατʼ αὐτόν
  chosen: the things concerning him
  alternatives:
  - his acts
  - what concerned him
  - the matters about him
  lexicon: LSJ
  rationale: The phrase is broad and summary-like, referring to matters or deeds relating
    to the person in view. 'The things concerning him' preserves the generality of
    the Greek without over-specifying 'acts.'
- source_word: ἀναγέγραπται
  chosen: have been recorded
  alternatives:
  - have been written
  - are recorded
  lexicon: LSJ
  rationale: Perfect passive suggests a completed written record with continuing availability.
    'Have been recorded' is idiomatic and preserves the documentary sense.
- source_word: ἐν τοῖς ἔμπροσθεν χρόνοις
  chosen: in the earlier times
  alternatives:
  - in former times
  - in the records of earlier times
  lexicon: LSJ
  rationale: Literally 'in the former times.' Because the Greek does not explicitly
    say 'books' here, the translation keeps the temporal wording rather than importing
    'records,' though the context implies written history.
- source_word: περὶ τῶν ἡμαρτηκότων καὶ ἠσεβηκότων
  chosen: about those who sinned and acted wickedly
  alternatives:
  - concerning those who sinned and were ungodly
  - about the sinners and the impious
  lexicon: LSJ
  rationale: The paired perfect participles describe moral and religious offense.
    'Acted wickedly' renders ἠσεβηκότων in accessible English while preserving the
    distinction from ἡμαρτηκότων.
- source_word: εἰς τὸν κύριον
  chosen: against the Lord
  alternatives:
  - toward the Lord
  - with respect to the Lord
  lexicon: LSJ
  rationale: In this hostile moral context, εἰς is best represented idiomatically
    as 'against.' 'Lord' follows the project's default for κύριος.
- source_word: παρὰ ἅπαν ἔθνος καὶ βασιλείαν
  chosen: beyond every nation and kingdom
  alternatives:
  - more than every nation and kingdom
  - above every nation and kingdom
  lexicon: LSJ
  rationale: παρά with the accusative can express comparison or excess. Here it intensifies
    Judah's guilt as surpassing that of all nations and kingdoms. 'Beyond' preserves
    that comparative force without becoming too interpretive.
- source_word: ἐλύπησαν αὐτὸν
  chosen: grieved him
  alternatives:
  - caused him sorrow
  - provoked him to grief
  lexicon: LSJ
  rationale: λυπέω commonly means to cause grief or sorrow. 'Grieved him' is concise
    and natural.
- source_word: ἔστω
  chosen: greatly
  alternatives:
  - indeed
  - surely
  - — omitted as corrupt/uncertain
  lexicon: LSJ
  rationale: The transmitted ἔστω is difficult in context and may reflect a textual
    disturbance or adverbial intensifier in the line as preserved. Rendering it as
    'greatly' captures an intensifying effect without forcing a wooden translation.
    Because the form is textually awkward, this is documented with a footnote.
- source_word: οἱ λόγοι τοῦ κυρίου ἀνέστησαν ἐπʼ Ἰσραήλ
  chosen: the words of the Lord rose up against Israel
  alternatives:
  - the words of the Lord came upon Israel
  - the Lord's words stood against Israel
  lexicon: LSJ
  rationale: ἀνίστημι with ἐπί can convey rising up against. The phrase personifies
    the Lord's words as active in judgment. 'Rose up against' preserves the vividness
    and adversative sense.
