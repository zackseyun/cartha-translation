translation:
  text: And Iechonias and Samaias and Nathanael his brother, and Sabias and Ochielos
    and Joram, commanders of thousands, gave to the Levites for the Passover one thousand
    sheep and seven hundred calves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in 2 Chronicles 35:9 names different officials and gives
      different numbers (2,600 Passover animals and 300 cattle). Because 1 Esdras
      is translated here from its Greek text, the Greek names and numbers are retained
      in the main text.
    reason: textual_variant
lexical_decisions:
- source_word: χιλίαρχοι
  chosen: commanders of thousands
  alternatives:
  - captains of thousands
  - tribunes
  - military commanders
  lexicon: LSJ
  rationale: The compound literally denotes leaders over a thousand. In this narrative
    setting it functions as a title. 'Commanders of thousands' preserves the formal
    sense without importing specifically Roman connotations like 'tribunes.'
- source_word: εἰς πάσχα
  chosen: for the Passover
  alternatives:
  - for Passover
  - as Passover offerings
  lexicon: LSJ
  rationale: The phrase indicates purpose or designation for the festival sacrifice/meal.
    'For the Passover' is natural English and leaves the exact cultic nuance broad
    enough to fit the Greek.
- source_word: πρόβατα
  chosen: sheep
  alternatives:
  - small livestock
  - lambs and kids
  - flock animals
  lexicon: LSJ
  rationale: The Greek term broadly covers sheep/small flock animals. 'Sheep' is the
    most straightforward rendering, though the Passover context could imply animals
    suitable for Passover sacrifice more generally. The MT parallel has a different
    quantity and wording, but the Greek witness here specifically reads πρόβατα.
- source_word: μόσχους
  chosen: calves
  alternatives:
  - young bulls
  - cattle
  lexicon: LSJ
  rationale: μόσχος commonly denotes a calf or young bull. 'Calves' is the most direct
    and readable rendering; 'young bulls' is possible but more specific than the Greek
    requires.
- source_word: ὁ ἀδελφὸς
  chosen: his brother
  alternatives:
  - the brother
  - their brother
  lexicon: LSJ
  rationale: The article plus noun most naturally identifies Nathanael as the brother
    of the preceding named person in context. English idiom prefers 'his brother.'
    The exact antecedent is not fully explicit, but this is the least intrusive rendering.
- source_word: ἔδωκαν τοῖς Λευείταις
  chosen: gave to the Levites
  alternatives:
  - provided for the Levites
  - gave the Levites
  lexicon: LSJ
  rationale: A simple transfer verb with indirect object. 'Gave to the Levites' preserves
    the straightforward syntax and avoids overinterpreting the administrative nuance.
