translation:
  text: These things were given from the royal possessions, according to the promise,
    to the people and to the priests and Levites. And Helkias, Zechariah, and Esyelos,
    the overseers of the sanctuary, gave to the priests for the Passover two thousand
    six hundred sheep, and three hundred calves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in 2 Chronicles 35:8 has the corresponding names in
      Hebrew form, commonly rendered 'Hilkiah ... Jehiel.' The Greek text of 1 Esdras
      here reads Helkias ... Esyelos.
    reason: alternative_reading
  - marker: b
    text: The Hebrew parallel specifies 'sheep, lambs, and young goats' from the king's
      property; the Greek here uses the broader term 'sheep.'
    reason: lexical_alternative
  - marker: c
    text: Or 'as promised.' The Greek phrase literally reads 'according to the promise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  chosen: These things
  alternatives:
  - These
  - These offerings
  lexicon: LSJ
  rationale: A straightforward demonstrative referring back to the animals/resources
    just mentioned. 'These things' preserves the resumptive force without over-specifying
    beyond the Greek.
- source_word: ἐκ τῶν βασιλικῶν
  chosen: from the royal possessions
  alternatives:
  - from the king's property
  - from the royal stores
  lexicon: LSJ
  rationale: The phrase denotes what belongs to the crown/king. 'Royal possessions'
    is natural English and aligns with the MT parallel מֵרְכוּשׁ הַמֶּלֶךְ ('from
    the king's property').
- source_word: ἐδόθη
  chosen: were given
  alternatives:
  - was given
  lexicon: LSJ
  rationale: Impersonal/passive plural sense in context with ταῦτα as neuter plural
    subject, naturally rendered in English as 'were given.'
- source_word: κατʼ ἐπαγγελίαν
  chosen: according to the promise
  alternatives:
  - as promised
  - according to the pledge
  lexicon: LSJ
  rationale: The Greek literally means 'according to promise.' 'According to the promise'
    preserves the nominal form and leaves unspecified whose promise is in view. 'As
    promised' is possible but slightly more interpretive.
- source_word: τῷ λαῷ
  chosen: to the people
  alternatives:
  - for the people
  lexicon: LSJ
  rationale: Dative of recipient/beneficiary. 'To the people' matches the Greek directly
    and fits the distribution context.
- source_word: τοῖς ἱερεῦσιν καὶ Λευίταις
  chosen: to the priests and Levites
  alternatives:
  - for the priests and Levites
  lexicon: LSJ
  rationale: Standard rendering of the two temple-service groups; transliteration
    of 'Levites' is conventional and clear.
- source_word: οἱ ἐπιστάται τοῦ ἱεροῦ
  chosen: the overseers of the sanctuary
  alternatives:
  - the officials of the temple
  - the supervisors of the holy place
  lexicon: LSJ
  rationale: ἐπιστάται are those set over something, hence 'overseers.' τοῦ ἱεροῦ
    can mean temple/sanctuary; 'sanctuary' preserves the sacred nuance without implying
    the entire temple complex too strongly.
- source_word: εἰς πάσχα
  chosen: for the Passover
  alternatives:
  - for Passover
  lexicon: LSJ
  rationale: Idiomatic purpose phrase indicating the animals' use in the festival
    sacrifice/meal. 'The Passover' is the most natural English rendering.
- source_word: πρόβατα
  chosen: sheep
  alternatives:
  - small livestock
  - sheep and goats
  lexicon: LSJ
  rationale: The Greek says 'sheep' broadly. The MT parallel specifies sheep and young
    goats, but the Greek witness here uses the broader πρόβατα. The translation stays
    anchored to the Greek while recognizing the Hebrew parallel in rationale.
- source_word: δισχίλια ἐξακόσια
  chosen: two thousand six hundred
  lexicon: LSJ
  rationale: Direct rendering of the numeral.
- source_word: μόσχους
  chosen: calves
  alternatives:
  - young bulls
  - cattle
  lexicon: LSJ
  rationale: μόσχος denotes a calf/young bovine. 'Calves' is the most direct equivalent;
    'young bulls' would be too specific without contextual necessity.
- source_word: τριακοσίους
  chosen: three hundred
  lexicon: LSJ
  rationale: Direct rendering of the numeral.
- source_word: Χελκείας καὶ Ζαχαρίας καὶ Ἡσυηλος
  chosen: Helkias, Zechariah, and Esyelos
  alternatives:
  - Hilkiah, Zechariah, and Jehiel
  lexicon: LSJ
  rationale: Per project philosophy, personal names are transliterated from the Greek
    source text. The MT parallel supports related Hebrew forms (notably Hilkiah/Jehiel),
    but the main text should reflect the Greek names as transmitted in 1 Esdras.
