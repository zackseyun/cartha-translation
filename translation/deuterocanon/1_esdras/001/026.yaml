translation:
  text: And Josiah did not turn back to his chariot, but attempted to fight him, not
    paying attention to the words of Jeremiah the prophet from the mouth of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not withdraw to his chariot.' The Greek wording is compressed and
      may imply refusing to pull back into or toward his chariot.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἀπέστρεψεν ἑαυτὸν
  chosen: did not turn back
  alternatives:
  - did not withdraw
  - did not turn away
  lexicon: LSJ
  rationale: The reflexive construction with ἀποστρέφω naturally conveys turning oneself
    back or withdrawing. 'Did not turn back' is idiomatic English and fits the military
    context without overinterpreting motive.
- source_word: ἐπὶ τὸ ἅρμα αὐτοῦ
  chosen: to his chariot
  alternatives:
  - toward his chariot
  - back to his chariot
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek. In context it indicates retreating/repositioning
    to his chariot. 'To his chariot' keeps the wording close while remaining readable;
    the sense 'back to his chariot' is possible but slightly more interpretive.
- source_word: πολεμεῖν αὐτὸν ἐπεχείρει
  chosen: attempted to fight him
  alternatives:
  - tried to make war against him
  - undertook to fight him
  lexicon: LSJ
  rationale: ἐπιχειρέω plus infinitive commonly means to attempt or undertake. 'Attempted
    to fight him' is clear modern English and preserves the imperfective sense of
    ongoing effort without paraphrase.
- source_word: οὐ προσέχων
  chosen: not paying attention to
  alternatives:
  - not heeding
  - not listening to
  lexicon: LSJ
  rationale: προσέχω with dative can mean to pay attention to or heed. 'Not paying
    attention to' is accessible and accurately reflects the participle's force; 'not
    heeding' is a viable, slightly more interpretive alternative.
- source_word: ῥήμασιν
  chosen: the words
  alternatives:
  - the message
  - the sayings
  lexicon: LSJ
  rationale: ῥήματα are individual spoken words or utterances. 'Words' is the most
    direct rendering and avoids collapsing the expression into a summarized 'message'
    unless context requires it.
- source_word: Ἰερεμίου προφήτου
  chosen: of Jeremiah the prophet
  alternatives:
  - of the prophet Jeremiah
  lexicon: LSJ
  rationale: Either English order is acceptable. 'Jeremiah the prophet' follows the
    Greek sequence closely while remaining natural.
- source_word: ἐκ στόματος Κυρίου
  chosen: from the mouth of the Lord
  alternatives:
  - from the Lord's mouth
  - from the Lord
  lexicon: LSJ
  rationale: The idiom explicitly marks divine origin of the prophetic words. Retaining
    'mouth' preserves the source metaphor and theological force better than reducing
    it to simply 'from the Lord.'
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Following project doctrine for κύριος, the default rendering is 'Lord.'
    With the preposition and article in English idiom, 'the Lord' is the natural form.
