theological_decisions:
- issue: Prophetic authority in the phrase 'from the mouth of the Lord'
  chosen_reading: Retain the explicit idiom to show that Jeremiah's words are presented
    as divine speech.
  alternative_readings:
  - Simplify to 'from the Lord'
  rationale: The Greek explicitly grounds Jeremiah's speech in the Lord's own mouth,
    heightening prophetic authority. Preserving the idiom avoids muting that theological
    claim.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; contested term κύριος rendered ''Lord''.'
