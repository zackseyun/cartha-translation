translation:
  text: And Jehoiakim his son reigned in his place; for when he was appointed, he
    was eight years old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek reads 'he was eight years old' when he was appointed. Other biblical
      traditions differ on the king's identity or age at accession; this translation
      preserves the Greek wording of 1 Esdras.
    reason: textual_variant
lexical_decisions:
- source_word: ἐβασίλευσεν
  chosen: reigned
  alternatives:
  - became king
  - ruled as king
  lexicon: BDAG
  rationale: Aorist of βασιλεύω is most naturally rendered 'reigned' in historical
    narrative. 'Became king' would overfocus on accession rather than the statement
    of succession.
- source_word: ἀντ᾽ αὐτοῦ
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: BDAG
  rationale: The phrase marks succession to the throne. 'In his place' is idiomatic
    English and preserves the sense of replacement more clearly than the more wooden
    'instead of him.'
- source_word: Ἰωακεὶμ
  chosen: Jehoiakim
  alternatives:
  - Joakim
  lexicon: LSJ
  rationale: The Greek name corresponds to the familiar Hebrew-regnal form Jehoiakim.
    Since parallel Hebrew witnesses are to be used as translation input for proper
    names, the standard English biblical form is preferable.
- source_word: ὁ υἱὸς αὐτοῦ
  chosen: his son
  lexicon: BDAG
  rationale: Straightforward filial designation; no reason to expand or paraphrase.
- source_word: ἀνεδείχθη
  chosen: was appointed
  alternatives:
  - was proclaimed
  - was made king
  - was shown forth
  lexicon: BDAG
  rationale: The passive of ἀναδείκνυμι here refers to formal installation or designation
    to office. 'Was appointed' captures the passive and avoids importing extra wording
    not present in the Greek. 'Was made king' is possible but more interpretive.
- source_word: ἐτῶν ὀκτώ
  chosen: eight years old
  alternatives:
  - eight years of age
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering of the age formula.
