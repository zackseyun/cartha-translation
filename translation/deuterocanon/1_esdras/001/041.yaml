theological_decisions:
- issue: Historical age notice appears problematic in relation to the better-known
    parallel tradition about Jehoiakim/Jehoiachin and their ages at accession.
  chosen_reading: Retain the Greek text's plain statement 'he was eight years old'
    in the main text.
  alternative_readings:
  - Some parallel traditions give a different king or a different age at accession.
  rationale: The project translates 1 Esdras from the Greek as primary witness. Although
    the approximate MT parallel supplied here does not align directly with this verse
    and the historical detail is difficult, the source text itself is clear. Transparency
    requires preserving the Greek reading rather than harmonizing it to another tradition.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; preserve source uncertainty
    honestly'
