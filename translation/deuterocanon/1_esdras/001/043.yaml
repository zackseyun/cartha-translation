translation:
  text: And after a year, Nebuchadnezzar sent and brought him away to Babylon, together
    with the holy vessels of the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carried him off to Babylon.' The Greek verb can denote removal or deportation.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετ᾽ ἐνιαυτόν
  chosen: after a year
  alternatives:
  - a year later
  - after one year
  lexicon: LSJ
  rationale: The preposition μετά with the accusative ἐνιαυτόν is temporal, indicating
    the passage of a year. 'After a year' is the most natural modern English rendering
    while remaining close to the Greek.
- source_word: ἀποστείλας
  chosen: sent
  alternatives:
  - having sent
  - sent men and
  lexicon: BDAG
  rationale: The aorist participle literally means 'having sent,' but in English narrative
    it is idiomatic to coordinate it as 'sent and brought him away.' This preserves
    the sequence without awkwardness. The object of the sending is implicit in Greek
    and need not be supplied beyond what the English verb already suggests.
- source_word: μετήγαγεν
  chosen: brought him away
  alternatives:
  - carried him off
  - transferred him
  - led him away
  lexicon: LSJ
  rationale: The verb conveys removal/transport from one place to another. 'Brought
    him away' keeps the motion explicit and matches the personal object αὐτόν. 'Carried
    him off' is possible but slightly more interpretive in tone.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - Jehoiakim
  - the king
  lexicon: BDAG
  rationale: The pronoun refers back to the previously mentioned king in context.
    The Greek uses a pronoun, so 'him' is preferred in the main text; supplying the
    name would over-specify beyond this verse alone.
- source_word: ἅμα
  chosen: together with
  alternatives:
  - along with
  - at the same time as
  lexicon: LSJ
  rationale: ἅμα here introduces accompaniment. 'Together with' is a clear, natural
    equivalent that preserves the sense of simultaneous transfer.
- source_word: τοῖς ἱεροῖς σκεύεσιν
  chosen: the holy vessels
  alternatives:
  - the sacred vessels
  - the temple vessels
  lexicon: LSJ
  rationale: ἱερός means 'holy' or 'sacred,' and σκεύη are vessels/implements. 'Holy
    vessels' is transparent and sufficiently formal; 'temple vessels' is interpretive,
    though contextually true.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - belonging to the Lord
  lexicon: BDAG
  rationale: 'κύριος is rendered by the project''s default as ''Lord.'' The genitive
    is straightforwardly possessive: these vessels belong to the Lord.'
