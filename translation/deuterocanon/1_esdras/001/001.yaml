theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek text where the MT parallel has
    the divine name YHWH
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: The Greek source text reads κυρίῳ with a possessive ('his Lord'). Project
    doctrine sets κύριος to 'Lord' by default, while YHWH in Hebrew is 'the LORD.'
    Because this verse is translated from Greek as primary, 'Lord' is retained in
    the main text rather than importing 'the LORD' from the Hebrew parallel. The Hebrew
    parallel remains relevant for sense but does not override the Greek wording.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος and יְהוָה YHWH;
    Translation philosophy #1'
