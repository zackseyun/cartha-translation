translation:
  text: And Josiah kept the Passover in Jerusalem to the Lord his God, and they slaughtered
    the Passover on the fourteenth day of the first month,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''to his Lord''; the Hebrew parallel in 2 Chronicles 35:1 reads
      ''to/for the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἤγαγεν
  chosen: kept
  alternatives:
  - led
  - brought
  - celebrated
  - made
  lexicon: LSJ
  rationale: Although the verb is literally 'led/brought,' in this cultic context
    with πάσχα and supported by the Hebrew parallel ויעשׂ ('kept/made'), the idiomatic
    sense is that Josiah observed or kept the Passover. 'Kept' preserves the festival-observance
    sense in natural English without over-paraphrasing.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - Passover feast
  - Passover lamb
  lexicon: BDAG
  rationale: In the first occurrence the phrase refers to the festival observance
    as a whole, not specifically the sacrificial animal. 'The Passover' is the most
    direct and standard rendering.
- source_word: τῷ κυρίῳ αὐτοῦ
  chosen: to his Lord
  alternatives:
  - for the Lord
  - to the Lord
  - for his Lord
  lexicon: BDAG
  rationale: The Greek explicitly has the possessive αὐτοῦ, unlike the MT parallel's
    לַיהוה ('to/for the LORD'). Since the Greek is the primary source for 1 Esdras,
    the possessive should be represented. κύριος is rendered 'Lord' per project defaults.
    'To his Lord' is formally close and intelligible in context.
- source_word: ἔθυσαν
  chosen: slaughtered
  alternatives:
  - sacrificed
  - offered
  lexicon: LSJ
  rationale: The verb denotes sacrificial killing. 'Slaughtered' preserves the concrete
    action and aligns well with the Hebrew parallel וישחטו. 'Sacrificed' is possible,
    but the object here is the Passover victim, so the more specific action is preferable.
- source_word: τὸ πάσχα
  chosen: the Passover lamb
  alternatives:
  - the Passover
  - the Passover sacrifice
  lexicon: BDAG
  rationale: In the second occurrence, with ἔθυσαν, the reference narrows from the
    festival to the sacrificial victim. English benefits from making that implicit
    sense explicit as 'the Passover lamb' to avoid awkwardness ('slaughtered the Passover')
    while staying within the source's semantic range.
- source_word: τῇ τεσσαρεσκαιδεκάτῃ ἡμέρᾳ
  chosen: on the fourteenth day
  alternatives:
  - at the fourteenth day
  lexicon: LSJ
  rationale: Standard temporal dative rendered idiomatically in English as 'on the
    fourteenth day.'
- source_word: τοῦ μηνὸς τοῦ πρώτου
  chosen: of the first month
  alternatives:
  - of month one
  - of the month, the first
  lexicon: LSJ
  rationale: A straightforward genitival phrase indicating the calendrical month.
    'Of the first month' is natural and accurate.
