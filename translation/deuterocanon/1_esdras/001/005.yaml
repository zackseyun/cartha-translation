translation:
  text: according to the writing of David king of Israel, and according to the greatness
    of Solomon his son; and standing in the sanctuary according to your ancestral
    division, O Levites, before your brothers, the sons of Israel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the majesty/magnificence of Solomon his son.' The Greek
      term can denote grandeur or magnificence; here it likely refers to the authoritative
      scale or dignity of Solomon's arrangement.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'in the holy [place],' which may also be rendered 'in the
      holy place.'
    reason: lexical_alternative
  - marker: c
    text: The Greek phrase is compressed. The Hebrew parallel more fully reflects
      the sense 'by your fathers' houses, according to your divisions.'
    reason: alternative_reading
lexical_decisions:
- source_word: γραφήν
  chosen: writing
  alternatives:
  - scripture
  - record
  - written instruction
  lexicon: LSJ
  rationale: γραφὴ here refers to a written directive or prescription associated with
    David, not 'Scripture' in the later technical sense. 'Writing' preserves the concrete
    reference and aligns with the MT parallel בכתב.
- source_word: μεγαλειότητα
  chosen: greatness
  alternatives:
  - majesty
  - magnificence
  lexicon: LSJ
  rationale: The noun denotes grandeur or greatness. 'Greatness' is straightforward
    modern English and fits the likely sense of Solomon's authoritative arrangement;
    'majesty' could suggest royal splendor more than the content of his directive.
- source_word: στᾶντες
  chosen: standing
  alternatives:
  - take your stand
  - stand
  lexicon: LSJ
  rationale: The participle is retained as 'standing' to mirror the Greek construction
    and connect with the following locative phrase. It likely has an imperative-like
    force in context, but the participial form is preserved in translation.
- source_word: ἐν τῷ ἁγίῳ
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  - in the holy precinct
  lexicon: LSJ
  rationale: The phrase literally means 'in the holy [place].' 'Sanctuary' is idiomatic
    and clear in English, conveying sacred temple space without over-specifying the
    exact architectural zone.
- source_word: μεριδαρχίαν
  chosen: division of service
  alternatives:
  - division
  - course
  - apportioned order
  lexicon: LSJ
  rationale: This rare term is related to ordered divisions or allotments. Because
    the context is Levitical organization, 'division of service' makes explicit the
    functional sense while remaining close to the Greek. The MT parallel כְּמַחְלְקוֹתֵיכֶם
    supports the idea of divisions/courses.
- source_word: πατρικήν
  chosen: ancestral
  alternatives:
  - paternal
  - fatherly
  - of your fathers' house
  lexicon: LSJ
  rationale: The adjective points to family/ancestral lineage. 'Ancestral' communicates
    the clan-based ordering naturally in English. The MT parallel לבית־אבותיכם confirms
    the family-household background, though the Greek compresses the expression.
- source_word: τῶν ἔμπροσθεν τῶν ἀδελφῶν ὑμῶν
  chosen: before your brothers
  alternatives:
  - in front of your brothers
  - in the presence of your brothers
  lexicon: LSJ
  rationale: ἔμπροσθεν commonly means 'before' spatially or in the presence of. 'Before
    your brothers' is concise and preserves the relational setting of Levitical service
    in front of the Israelites.
- source_word: υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: LSJ
  rationale: The Greek explicitly says 'sons of Israel.' Following the project's gender-accurate
    policy, the familial expression is preserved rather than flattened to 'people
    of Israel,' though 'Israelites' is a viable idiomatic alternative.
