theological_decisions:
- issue: Gendered familial expression υἱῶν Ἰσραήλ
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The source uses a masculine familial phrase. Per doctrine, gender-accurate
    rendering is preferred unless context clearly demands a generic flattening. Here
    the covenantal-tribal expression is best preserved in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Use of MT parallel to clarify compressed Greek phrasing
  chosen_reading: according to your ancestral division of service
  alternative_readings:
  - according to your ancestral division
  - according to your fathers' houses in your divisions
  rationale: The Greek wording is somewhat compressed and differs from the fuller
    Hebrew parallel. The translation remains anchored in the Greek while allowing
    the MT to clarify that the division is lineage-based and organizational, not merely
    abstract partition.
  doctrine_reference: PHILOSOPHY.md; user task requirement on parallel_sources
