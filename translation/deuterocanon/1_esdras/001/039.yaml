translation:
  text: And Nebuchadnezzar took some of the holy vessels of the Lord and carried them
    away, and he deposited them in his temple in Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''from the holy vessels of the Lord.'' The Greek can be read more literally
      this way, but the phrase likely has a partitive sense: he took some of the vessels
      rather than every vessel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  chosen: some of
  alternatives:
  - from
  lexicon: LSJ
  rationale: With the genitive phrase 'τῶν ἱερῶν σκευῶν,' ἀπό marks taking from among
    the sacred vessels rather than necessarily the totality. 'Some of' makes the partitive
    force natural in English.
- source_word: ἱερῶν σκευῶν
  chosen: holy vessels
  alternatives:
  - sacred vessels
  - temple vessels
  lexicon: LSJ
  rationale: σκευῶν refers to implements/vessels, and ἱερῶν marks them as consecrated.
    'Holy vessels' is concise and preserves cultic force; 'sacred vessels' is possible
    but slightly less aligned with the common biblical register.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - belonging to the Lord
  lexicon: LSJ
  rationale: 'κύριος is rendered by the project''s default ''Lord.'' The genitive
    indicates possession: these vessels belong to the Lord.'
- source_word: λαβὼν
  chosen: took
  alternatives:
  - having taken
  lexicon: LSJ
  rationale: The participle is naturally represented by a finite verb in smooth English
    narrative. 'Took' preserves the action without over-literal participial awkwardness.
- source_word: ἀπενέγκας
  chosen: carried them away
  alternatives:
  - having carried them off
  - brought them away
  lexicon: LSJ
  rationale: The participle denotes removal/transport after taking. 'Carried them
    away' clearly expresses the sequence and the sense of seizure and relocation.
- source_word: ἀπηνείσατο
  chosen: deposited
  alternatives:
  - placed
  - brought in
  - set down
  lexicon: LSJ
  rationale: The verb here conveys putting the vessels into the temple for keeping.
    'Deposited' captures the formal placement of captured cult objects in a temple
    treasury better than the more generic 'placed.'
- source_word: ἐν τῷ ναῷ αὐτοῦ
  chosen: in his temple
  alternatives:
  - in his shrine
  - in his house
  lexicon: LSJ
  rationale: ναός here refers to Nebuchadnezzar's temple in Babylon, not the Jerusalem
    temple. 'Temple' is the clearest contextual rendering.
- source_word: ἐν Βαβυλῶνι
  chosen: in Babylon
  lexicon: LSJ
  rationale: Standard place-name rendering.
