translation:
  text: And Josiah gave to the people who were present thirty thousand lambs and young
    goats, and three thousand calves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to the people, those who were found'; the phrase likely means
      those present or assembled there.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel supplied in the source data does not match this Greek
      verse closely; the translation therefore follows the Greek text as primary.
    reason: textual_variant
lexical_decisions:
- source_word: ἐδωρήσατο
  chosen: gave
  alternatives:
  - presented
  - donated
  - granted as a gift
  lexicon: LSJ
  rationale: The middle of δωρέομαι conveys giving as a gift or donation. 'Gave' is
    clear modern English and fits the context of royal provision for Passover offerings
    without sounding overly formal.
- source_word: τῷ λαῷ
  chosen: to the people
  alternatives:
  - for the people
  lexicon: LSJ
  rationale: The dative naturally marks the recipients of Josiah's gift. 'To the people'
    preserves that sense straightforwardly.
- source_word: τοῖς εὑρεθέντι
  chosen: who were present
  alternatives:
  - who were found there
  - who were assembled
  - who were available
  lexicon: LSJ
  rationale: The participle literally means 'those having been found,' but in context
    it idiomatically refers to those present/available among the people at the feast.
    'Who were present' is idiomatic English while staying close to the Greek sense.
- source_word: ἀρνῶν
  chosen: lambs
  alternatives:
  - sheep
  lexicon: LSJ
  rationale: ἀρνός commonly denotes a lamb rather than sheep in general. Since the
    verse lists sacrificial animals in counted categories, the more specific 'lambs'
    is preferable.
- source_word: ἐρίφων
  chosen: young goats
  alternatives:
  - kids
  - goats
  lexicon: LSJ
  rationale: ἔριφος denotes a young goat. 'Young goats' is more transparent to modern
    readers than 'kids' and preserves the age distinction.
- source_word: τριακοντα χιλιάδας
  chosen: thirty thousand
  lexicon: LSJ
  rationale: Straight numerical rendering.
- source_word: μόσχους
  chosen: calves
  alternatives:
  - young bulls
  - cattle
  lexicon: LSJ
  rationale: μόσχος denotes a calf or young bovine. 'Calves' is the most direct equivalent;
    'young bulls' would over-specify sex, and 'cattle' is too broad.
- source_word: τρισχιλίους
  chosen: three thousand
  lexicon: LSJ
  rationale: Straight numerical rendering.
