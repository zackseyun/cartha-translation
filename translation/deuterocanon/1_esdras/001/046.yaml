theological_decisions:
- issue: Rendering κύριος in an oath formula and divine title
  chosen_reading: Lord
  alternative_readings:
  - LORD
  rationale: The project default for κύριος is 'Lord.' In this Greek deuterocanonical
    context, 'Lord' preserves the divine title without importing the Hebrew tetragrammaton
    form into the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to make the rebellion explicitly against Nebuchadnezzar in the main
    text
  chosen_reading: he broke his oath and rebelled
  alternative_readings:
  - he broke his oath to him and rebelled
  - he revolted against King Nebuchadnezzar
  rationale: The Greek leaves the object of ἀπέστη implicit. Because the prior phrase
    already names Nebuchadnezzar, the political referent is clear enough without adding
    an explicit object not stated in the Greek. This preserves the text's economy
    while remaining intelligible.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
