translation:
  text: And though he had sworn by the name of the Lord to King Nebuchadnezzar, he
    broke his oath and rebelled; and, stiffening his neck and his heart, he transgressed
    the laws of the Lord God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'having been sworn from/by King Nebuchadnezzar.' The
      Greek preposition is awkward in English here; the sense is that he had taken
      an oath of loyalty in relation to the king.
    reason: lexical_alternative
  - marker: b
    text: '''Rebelled'' likely refers to revolt against Nebuchadnezzar, though the
      Greek does not restate the object explicitly.'
    reason: alternative_reading
  - marker: c
    text: Or 'the statutes' or 'the ordinances' of the Lord God of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁρκισθεὶς
  chosen: had sworn
  alternatives:
  - having sworn
  - was put under oath
  lexicon: BDAG
  rationale: Aorist passive participle from ὀμνύω/ὁρκίζω-family in context functions
    as prior action relative to the main verbs. 'Had sworn' gives clear English sequence
    before 'broke his oath and rebelled.'
- source_word: ἀπὸ τοῦ βασιλέως Ναβουχοδονόσορ
  chosen: to King Nebuchadnezzar
  alternatives:
  - by King Nebuchadnezzar
  - under King Nebuchadnezzar
  lexicon: BDAG
  rationale: Although ἀπό can suggest source ('from/by'), the broader clause and the
    known historical setting indicate the oath was made in relation to the Babylonian
    king. English idiom prefers 'sworn to King Nebuchadnezzar' for the party to whom
    loyalty was pledged. This also aligns with the sense of the parallel in Chronicles
    without importing its wording.
- source_word: τῷ ὀνόματι τοῦ κυρίου
  chosen: by the name of the Lord
  alternatives:
  - in the name of the Lord
  lexicon: BDAG
  rationale: The dative phrase marks the solemn basis/invocation of the oath. 'By
    the name of the Lord' is the most natural oath formula in English and preserves
    the covenantal seriousness.
- source_word: ἐφιορκήσας
  chosen: broke his oath
  alternatives:
  - committed perjury
  - swore falsely
  lexicon: LSJ
  rationale: The verb denotes violating an oath already taken. 'Broke his oath' is
    clearer and more idiomatic than 'committed perjury,' while preserving the legal-moral
    force.
- source_word: ἀπέστη
  chosen: rebelled
  alternatives:
  - turned away
  - revolted
  - apostatized
  lexicon: BDAG
  rationale: In this royal-political context the sense is defection/revolt against
    overlordship, not primarily religious apostasy. 'Rebelled' best fits the immediate
    context.
- source_word: σκληρύνας
  chosen: stiffening
  alternatives:
  - hardening
  - making stubborn
  lexicon: BDAG
  rationale: The participle introduces the manner accompanying his rebellion. 'Stiffening'
    works well with 'neck' and can extend metaphorically to 'heart' in the same clause.
- source_word: τὸν τράχηλον
  chosen: his neck
  alternatives:
  - his stiff neck
  lexicon: LSJ
  rationale: The metaphor of obstinacy is standard. Keeping the noun literal preserves
    the biblical idiom; the participle already conveys the stiffening.
- source_word: τὴν καρδίαν αὐτοῦ
  chosen: his heart
  lexicon: BDAG
  rationale: Literal rendering preserves the anthropological and moral sense of inner
    disposition without overinterpretation.
- source_word: παρέβη
  chosen: transgressed
  alternatives:
  - violated
  - went beyond
  lexicon: BDAG
  rationale: '''Transgressed'' preserves the formal covenant-legal tone of the clause
    better than the flatter ''violated.'''
- source_word: τὰ νόμιμα
  chosen: the laws
  alternatives:
  - the statutes
  - the ordinances
  lexicon: LSJ
  rationale: νόμιμα refers to established legal requirements. 'Laws' is broad, clear
    modern English; 'statutes' is possible but slightly more technical and archaic
    in tone here.
- source_word: Κυρίου θεοῦ Ἰσραήλ
  chosen: the Lord God of Israel
  alternatives:
  - the Lord, the God of Israel
  lexicon: BDAG
  rationale: This compact rendering is standard English for the genitival title and
    preserves both divine title and covenant identity. 'Lord' follows the project's
    default for κύριος.
