theological_decisions:
- issue: Rendering Κυρίου
  chosen_reading: the Lord
  alternative_readings:
  - Yahweh
  - the LORD
  rationale: The source is Greek κύριος, and the project's default rendering is 'Lord.'
    Small caps 'LORD' are reserved for explicit Hebrew YHWH contexts; here the primary
    source is the LXX wording.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Geographical/political designation Ἰουδαίας
  chosen_reading: Judea
  alternative_readings:
  - Judah
  rationale: The Greek text reads Ἰουδαίας, which in Hellenistic usage commonly corresponds
    to 'Judea.' Since the translation is anchored in the Greek witness, this is preferred
    in the main text, while preserving 'Judah' as a footnoted alternative given the
    Hebrew parallel tradition behind the narrative.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
    over translation tradition
