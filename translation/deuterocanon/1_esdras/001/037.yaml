translation:
  text: Jehoiakim was twenty-five years old when he became king of Judea and Jerusalem,
    and he did what was evil before the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judah and Jerusalem.' The Greek text has 'Judea and Jerusalem,' while
      the Hebrew parallel tradition commonly speaks of 'Judah and Jerusalem.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐτῶν δὲ ἦν εἴκοσι πέντε
  chosen: was twenty-five years old
  alternatives:
  - was twenty-five years of age
  - was aged twenty-five years
  lexicon: LSJ
  rationale: This is the standard Greek age formula. 'Was twenty-five years old' is
    idiomatic modern English while remaining formally close.
- source_word: Ἰωακεὶμ
  chosen: Jehoiakim
  alternatives:
  - Joakim
  - Ioakeim
  rationale: Personal names are transliterated by standard English biblical convention.
    The MT parallel supports identifying the figure as Jehoiakim.
- source_word: ὅτε ἐβασίλευσεν
  chosen: when he became king
  alternatives:
  - when he reigned
  - when he began to reign
  lexicon: LSJ
  rationale: The aorist here naturally marks accession rather than the whole duration
    of reign. 'Became king' is clear modern English and matches the age-at-accession
    formula.
- source_word: τῆς Ἰουδαίας καὶ Ἰερουσαλήμ
  chosen: of Judea and Jerusalem
  alternatives:
  - over Judea and Jerusalem
  - of Judah and Jerusalem
  lexicon: LSJ
  rationale: The Greek names the realm as 'Judea and Jerusalem.' Because 1 Esdras
    is a Greek recomposition and the source text explicitly has Ἰουδαίας rather than
    a direct Hebrew equivalent here, 'Judea' best reflects the Greek. 'Of' is retained
    as a close rendering of the genitive with kingship language.
- source_word: ἐποίησεν τὸ πονηρὸν
  chosen: did what was evil
  alternatives:
  - did evil
  - did the evil thing
  lexicon: LSJ
  rationale: This is a common biblical idiom for moral wrongdoing. 'Did what was evil'
    preserves the idiomatic force in natural English.
- source_word: ἐνώπιον Κυρίου
  chosen: before the Lord
  alternatives:
  - in the sight of the Lord
  - before Yahweh
  lexicon: LSJ
  rationale: The phrase means 'before/in the sight of.' 'Before the Lord' is concise
    and natural. Per doctrine, κύριος is rendered 'Lord,' not 'Yahweh,' in line with
    LXX usage.
