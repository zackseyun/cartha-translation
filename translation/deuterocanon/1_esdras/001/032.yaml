translation:
  text: And those from the nation took Jechoniah son of Josiah and made him king in
    place of Josiah his father, when he was twenty-three years old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text reads 'Jechoniah'; the parallel account in 2 Chronicles 36:1
      names Jehoahaz.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναλαβόντες
  chosen: took
  alternatives:
  - took up
  - received
  - seized
  lexicon: LSJ
  rationale: The participle here introduces the people's action in elevating Jechoniah.
    'Took' is the most natural English in context ('took ... and made him king'),
    avoiding an overly wooden 'took up' while preserving the concrete action.
- source_word: οἱ ἐκ τοῦ ἔθνους
  chosen: those from the nation
  alternatives:
  - the people of the land
  - those of the nation
  - men of the nation
  lexicon: LSJ
  rationale: Formally the Greek reads 'those from the nation.' In this historical
    enthronement context it refers to the populace or national body. I retained a
    relatively close rendering rather than importing the more specific Hebrew-parallel
    idiom 'people of the land,' since the Greek is the primary source and does not
    use γῆ here.
- source_word: ἀνέδειξαν βασιλέα
  chosen: made him king
  alternatives:
  - appointed king
  - proclaimed king
  - installed as king
  lexicon: LSJ
  rationale: The verb denotes causing someone to appear or be appointed in office.
    'Made him king' is idiomatic, clear, and faithful to the enthronement sense without
    over-specifying ceremony.
- source_word: ἀντί
  chosen: in place of
  alternatives:
  - instead of
  - as successor to
  lexicon: BDAG
  rationale: The preposition marks replacement/succession. 'In place of' is straightforward
    and preserves the substitutional sense.
- source_word: ὄντα ἐτῶν εἴκοσι τριῶν
  chosen: when he was twenty-three years old
  alternatives:
  - being twenty-three years old
  - at the age of twenty-three
  lexicon: LSJ
  rationale: This age formula is naturally rendered in English with a finite clause.
    'When he was twenty-three years old' is readable modern English while preserving
    the temporal/descriptive force.
- source_word: Ἰεχονίαν
  chosen: Jechoniah
  alternatives:
  - Jehoahaz
  - Joahaz
  lexicon: LSJ
  rationale: The Greek text explicitly reads Jechoniah. Although the parallel historical
    tradition in 2 Chronicles 36:1 refers to Jehoahaz, the translation must follow
    the extant Greek witness and preserve the alternative identification in a footnote.
