translation:
  text: And the temple singers, the sons of Asaph, were at their stations according
    to what had been appointed by David, and Asaph and Zechariah and Eddinous, who
    were from the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who were appointed by the king.' The Greek phrase 'who were from the
      king' is compressed and may indicate royal appointment or royal affiliation.
    reason: alternative_reading
  - marker: b
    text: The wording here differs from the approximate Hebrew parallel in 2 Chronicles,
      which in this section focuses on distributing the burnt offering. 1 Esdras preserves
      an expanded notice about the singers and named officials.
    reason: cross_reference
lexical_decisions:
- source_word: ἱεροψάλται
  chosen: temple singers
  alternatives:
  - sacred singers
  - liturgical singers
  lexicon: LSJ
  rationale: Compound of ἱερός and ψάλτης; denotes singers connected with temple worship.
    'Temple singers' is natural modern English and preserves the cultic setting better
    than the less idiomatic 'sacred singers'.
- source_word: υἱοὶ Ἀσάφ
  chosen: the sons of Asaph
  alternatives:
  - Asaph's sons
  lexicon: LSJ
  rationale: A standard genealogical/organizational expression. Retained formally
    because it identifies the recognized Levitical singing guild.
- source_word: ἐπὶ τῆς τάξεως αὐτῶν
  chosen: at their stations
  alternatives:
  - in their order
  - at their appointed order
  - in their divisions
  lexicon: LSJ
  rationale: τάξις here refers to ordered placement or assigned role in worship service.
    'At their stations' communicates functional placement in context more clearly
    than the more abstract 'in their order'.
- source_word: κατὰ τὰ ὑπὸ Δαυεὶδ τεταγμένα
  chosen: according to what had been appointed by David
  alternatives:
  - according to the things ordained by David
  - according to David's arrangement
  lexicon: LSJ
  rationale: τεταγμένα indicates things arranged/appointed/ordered. The passive participle
    is best represented by 'had been appointed,' preserving that David is the source
    of the arrangement.
- source_word: οἱ παρὰ τοῦ βασιλέως
  chosen: who were from the king
  alternatives:
  - who were appointed by the king
  - who were at the king's side
  - from the king's service
  lexicon: LSJ
  rationale: παρά with the genitive can mean 'from' or 'on the part of.' The phrase
    is terse and somewhat elliptical in Greek. A more interpretive rendering like
    'appointed by the king' is possible, but 'from the king' stays closer to the wording
    while signaling the relation without over-resolving it.
- source_word: Ἐδδεινοὺς
  chosen: Eddinous
  alternatives:
  - Eddinus
  - Iddinus
  rationale: Proper name transliterated from the Greek form as transmitted in Swete.
    Since the exact English conventional form is unstable, a close transliteration
    is preferable.
