reference: 1 Esdras 1:24
source:
  edition: lxx-swete-1909
  text: ἀπάντησιν αὐτῷ Ἰωσείας. καὶ διεπέμψατο βασιλεὺς Αἰγύπτου πρὸς αὐτὸν λέγων
    Τί ἐμοὶ καὶ σοὶ ἐστίν, βασιλεῦ τῆς Ἰουδαίας;
  language: Greek
  pages:
