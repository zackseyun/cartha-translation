  validation: minor_mismatch
translation:
  text: Josiah met him. And the king of Egypt sent word to him, saying, “What is there
    between me and you, O king of Judea?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “What have I to do with you?”
    reason: lexical_alternative
  - marker: b
    text: 'Greek: “king of Judea”; the historical parallel in Chronicles would correspond
      to “king of Judah.”'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπάντησιν
  chosen: met
  alternatives:
  - went to meet
  - encountered
  lexicon: LSJ
  rationale: The noun means 'meeting' or 'encounter.' In this compressed clause with
    Ἰωσείας, idiomatic English requires a verbal rendering. 'Met' preserves the sense
    without over-expanding the terse Greek.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: The dative pronoun refers to the Egyptian king in context. English idiom
    with 'met' takes a direct object, so 'him' is the most natural equivalent while
    preserving the referent.
- source_word: διεπέμψατο
  chosen: sent word
  alternatives:
  - sent messengers
  - sent a message
  lexicon: LSJ
  rationale: The verb denotes sending through/by messengers. Because the object 'messengers'
    is not explicit in the Greek here, 'sent word' captures the communicative action
    naturally without adding unnecessary detail.
- source_word: Τί ἐμοὶ καὶ σοὶ ἐστίν
  chosen: What is there between me and you
  alternatives:
  - What have I to do with you
  - What is it to me and to you
  lexicon: LSJ
  rationale: This is a Semitic-style idiom expressing disengagement or challenge.
    The chosen rendering stays close to the Greek wording while remaining understandable
    in modern English. A more idiomatic alternative is preserved in a footnote.
- source_word: βασιλεῦ τῆς Ἰουδαίας
  chosen: king of Judea
  alternatives:
  - king of Judah
  lexicon: LSJ
  rationale: The Greek uses Ἰουδαία, the land designation underlying 'Judea.' Since
    the source text here is Greek and not the Hebrew parallel, 'Judea' is the most
    direct rendering, while 'Judah' is preserved as an alternative because of the
    underlying historical referent.
