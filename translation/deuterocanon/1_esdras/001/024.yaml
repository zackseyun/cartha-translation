theological_decisions:
- issue: Rendering the challenge formula Τί ἐμοὶ καὶ σοὶ ἐστίν
  chosen_reading: What is there between me and you
  alternative_readings:
  - What have I to do with you
  rationale: The phrase is idiomatic and can sound either formal or confrontational.
    The chosen wording preserves the source structure and leaves the degree of hostility
    somewhat open, rather than resolving it into a stronger English idiom.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
- issue: Geographical/political title Ἰουδαίας
  chosen_reading: Judea
  alternative_readings:
  - Judah
  rationale: Although the Hebrew parallel would point to 'Judah,' the Greek witness
    before us reads the Hellenized territorial form. Translating it as 'Judea' respects
    original-language primacy while preserving 'Judah' as a footnoted alternative
    for readers aware of the parallel history.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy over translation tradition
