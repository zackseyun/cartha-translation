translation:
  text: And the king of Egypt made Joakim his brother king over Judea and Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The name appears here in Greek as 'Joakim'; the Hebrew parallel tradition
      commonly identifies him as Jehoiakim.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέδειξεν
  chosen: made
  alternatives:
  - appointed
  - set up
  - installed
  lexicon: LSJ
  rationale: In this context of royal action, the verb denotes causing someone to
    assume office. 'Made ... king' is idiomatic English and preserves the causative
    force without sounding overly technical. 'Appointed' is possible, but the Greek
    construction with repeated βασιλέα naturally yields 'made ... king.'
- source_word: ὁ βασιλεὺς Αἰγύπτου
  chosen: the king of Egypt
  alternatives:
  - Egypt's king
  lexicon: LSJ
  rationale: A straightforward genitival title. The fuller phrase is clearer and more
    natural in modern English narrative style.
- source_word: Ἰωακεὶμ
  chosen: Joakim
  alternatives:
  - Jehoiakim
  - Ioakeim
  lexicon: LSJ
  rationale: The project philosophy prefers transliterating personal names from the
    source text. Since 1 Esdras is translated from Greek, 'Joakim' reflects the Greek
    form more directly than harmonizing to the MT/English traditional 'Jehoiakim.'
    The Hebrew parallel helps identify the figure but does not override the Greek
    form.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  chosen: his brother
  alternatives:
  - the brother of him
  lexicon: LSJ
  rationale: Standard rendering of the kinship term with possessive pronoun. No reason
    to flatten or paraphrase.
- source_word: βασιλέα
  chosen: king
  alternatives:
  - ruler
  lexicon: LSJ
  rationale: The noun explicitly denotes kingship. 'Ruler' would weaken the formal
    office named in the Greek.
- source_word: τῆς Ἰουδαίας καὶ Ἰερουσαλήμ
  chosen: over Judea and Jerusalem
  alternatives:
  - of Judea and Jerusalem
  - king of Judea and Jerusalem
  lexicon: LSJ
  rationale: The Greek places 'king' before the territorial genitives. In English,
    'king over Judea and Jerusalem' makes the sense explicit and avoids awkward repetition
    after 'made ... king.' 'Of Judea and Jerusalem' is also possible, but 'over' better
    conveys the installed rule implied by the appointment.
