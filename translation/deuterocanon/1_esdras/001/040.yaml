translation:
  text: Now the recorded accounts concerning him, and his uncleanness and impiety,
    are written in the book of the chronicles of the kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the things reported about him.' The Greek participle can denote matters
      recounted or put on record.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱστορηθέντα
  chosen: recorded accounts
  alternatives:
  - things related
  - things narrated
  - things recorded
  lexicon: LSJ
  rationale: The participle refers to matters that have been recounted or put on record.
    'Recorded accounts' preserves both the documentary sense and the plural force
    implied by τὰ ... ἱστορηθέντα better than a bare 'history.'
- source_word: ἀκαθαρσίας
  chosen: uncleanness
  alternatives:
  - impurity
  - defilement
  lexicon: LSJ
  rationale: The noun denotes impurity/uncleanness. 'Uncleanness' keeps the moral-religious
    force without over-specifying ritual impurity alone. It also preserves the sharpness
    of the Greek in a judgment context.
- source_word: δυσσεβείας
  chosen: impiety
  alternatives:
  - ungodliness
  - wickedness
  lexicon: LSJ
  rationale: The term specifically points to irreverence or lack of piety toward God.
    'Impiety' is more precise than the broader 'wickedness' and pairs well with 'uncleanness'
    as a moral-religious indictment.
- source_word: ἀναγέγραπται
  chosen: are written
  alternatives:
  - have been written
  - stand written
  - are recorded
  lexicon: LSJ
  rationale: The perfect/passive sense indicates that these matters have been inscribed
    and remain on record. 'Are written' is idiomatic English and preserves the enduring
    documentary sense.
- source_word: βίβλῳ τῶν χρόνων τῶν βασιλέων
  chosen: the book of the chronicles of the kings
  alternatives:
  - the book of the times of the kings
  - the chronicle book of the kings
  lexicon: LSJ
  rationale: This is a standard archival formula. 'Chronicles' is the natural English
    equivalent for χρόνων in this documentary context, and the MT parallel supports
    a royal annals sense.
