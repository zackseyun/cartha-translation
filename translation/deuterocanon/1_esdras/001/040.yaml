theological_decisions:
- issue: Moral-religious characterization of the king in ἀκαθαρσίας καὶ δυσσεβείας
  chosen_reading: Render both terms distinctly as 'uncleanness and impiety'
  alternative_readings:
  - impurity and ungodliness
  - defilement and wickedness
  rationale: The Greek uses two separate condemnatory nouns, and the translation preserves
    that double indictment rather than collapsing them into a single generalized moral
    judgment. No doctrinally contested term from DOCTRINE.md is involved, but preserving
    the text's evaluative force is important.
  doctrine_reference: Translation philosophy §§1, 5
