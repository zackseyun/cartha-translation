translation:
  text: But he arrayed himself for war against him in the plain of Megiddo, and the
    commanders came down against King Josiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in 2 Chronicles 35:22 reads 'he disguised himself to
      fight against him' rather than the Greek's 'he arrayed himself for war against
      him.'
    reason: alternative_reading
lexical_decisions:
- source_word: συνεστήσατο πρὸς αὐτὸν πόλεμον
  chosen: arrayed himself for war against him
  alternatives:
  - engaged him in battle
  - made war against him
  - set battle in order against him
  lexicon: LSJ
  rationale: The middle form with πόλεμον conveys taking action to set oneself in
    battle against someone. The MT parallel has הִתְחַפֵּשׂ ('disguised himself')
    plus 'to fight against him,' but the Greek source text is primary and reads as
    military preparation/engagement rather than disguise. 'Arrayed himself for war'
    preserves the reflexive/middle nuance and martial sense without overparaphrase.
- source_word: ἐν τῷ πεδίῳ Μετααδδούς
  chosen: in the plain of Megiddo
  alternatives:
  - on the plain of Megiddo
  - in the valley of Megiddo
  lexicon: LSJ
  rationale: πεδίον is 'plain' or open field. The Greek proper name Μετααδδούς reflects
    the place known from the Hebrew parallel as Megiddo; the MT helps confirm the
    standard English form of the toponym. 'Plain' is closer to the Greek than 'valley.'
- source_word: κατέβησαν
  chosen: came down against
  alternatives:
  - went down to
  - came down to
  lexicon: BDAG
  rationale: The verb literally means 'went/came down.' With πρὸς and a hostile military
    context, 'came down against' makes the adversative movement explicit in natural
    English while retaining the directional sense.
- source_word: οἱ ἄρχοντες
  chosen: the commanders
  alternatives:
  - the rulers
  - the leaders
  - the officers
  lexicon: LSJ
  rationale: ἄρχοντες can mean rulers or leaders broadly, but in this battle setting
    'commanders' best fits the likely military sense and avoids implying civil governance
    alone.
- source_word: πρὸς βασιλέα Ἰωσίαν
  chosen: against King Josiah
  alternatives:
  - to King Josiah
  - toward King Josiah
  lexicon: BDAG
  rationale: πρός with accusative can be directional, but in this immediate war context
    it is naturally adversative. 'Against King Josiah' communicates the sense clearly
    in English.
