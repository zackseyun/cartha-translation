theological_decisions:
- issue: Relation of the Greek wording to the MT parallel in 2 Chronicles 35:10
  chosen_reading: Retain the Greek scene of priests and Levites standing in order
    with the unleavened bread, while allowing the MT parallel to inform the Passover
    context.
  alternative_readings:
  - Conform the verse more closely to the MT's notice about Levite leaders contributing
    animals for the Passover
  rationale: The project's policy gives primacy to the Greek for 1 Esdras, while using
    the Hebrew parallel as a sanity check. The Greek here differs substantially from
    the approximate MT parallel, so the translation follows the Greek rather than
    harmonizing to Chronicles.
  doctrine_reference: 'PHILOSOPHY.md: Deuterocanonical / Apocrypha; WLC MT parallels
    for 1 Esdras'
- issue: How explicitly to render patriarchal household language
  chosen_reading: Keep 'of the fathers' in the main text.
  alternative_readings:
  - of the ancestral houses
  - of their fathers' houses
  rationale: The source uses masculine ancestral terminology. Per doctrine, gender-accurate
    rendering is preferred over flattening to a neutral abstraction, though an explanatory
    alternative is worth preserving in a footnote.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
