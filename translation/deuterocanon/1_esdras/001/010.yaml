translation:
  text: And when these things had taken place, the priests and the Levites stood in
    proper order, holding the unleavened bread, according to the tribes and according
    to the family divisions of the fathers, before the people, to offer to the Lord
    according to what is written in the book of Moses; and so they did in the morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the ancestral-house divisions' or 'according to their fathers'
      houses.'
    reason: lexical_alternative
  - marker: b
    text: The Greek here differs notably from the approximate Hebrew parallel in 2
      Chronicles 35:10, which speaks of Levite leaders providing Passover animals;
      this translation follows the Greek text of 1 Esdras.
    reason: textual_variant
lexical_decisions:
- source_word: εὐπρεπῶς
  chosen: in proper order
  alternatives:
  - gracefully
  - becomingly
  - properly
  lexicon: LSJ
  rationale: The adverb conveys fitting, orderly, decorous arrangement in a cultic
    setting. 'In proper order' communicates both decorum and organized positioning
    better than the more aesthetic 'gracefully'.
- source_word: ἔστησαν
  chosen: stood
  alternatives:
  - took their stand
  - were stationed
  lexicon: LSJ
  rationale: A straightforward rendering preserves the physical and ceremonial sense.
    The context already implies formal positioning, so 'stood' is sufficient in idiomatic
    English.
- source_word: τὰ ἄζυμα
  chosen: the unleavened bread
  alternatives:
  - the unleavened loaves
  - the unleavened things
  lexicon: LSJ
  rationale: The phrase most naturally refers to unleavened bread used in Passover
    observance. The MT parallel concerns Passover arrangements, which supports making
    the implied object explicit in English.
- source_word: φυλάς
  chosen: tribes
  alternatives:
  - tribal groups
  lexicon: LSJ
  rationale: Standard rendering for Israel's tribal divisions; this preserves the
    covenantal-social structure assumed by the text.
- source_word: μεριδαρχίας
  chosen: family divisions
  alternatives:
  - divisions
  - sections
  - courses
  lexicon: LSJ
  rationale: The term denotes subdivisions or apportioned groupings. 'Family divisions'
    fits the following genitive 'of the fathers' and communicates clan-based organization
    more clearly than the less transparent 'courses'.
- source_word: τῶν πατέρων
  chosen: of the fathers
  alternatives:
  - of the ancestral houses
  - of the fathers' houses
  lexicon: LSJ
  rationale: A formally close rendering preserves the patriarchal household language
    of the source. The phrase likely refers to ancestral/father-house groupings, but
    the Greek wording itself is concise.
- source_word: προσενεγκεῖν
  chosen: to offer
  alternatives:
  - to present
  - to bring near as an offering
  lexicon: LSJ
  rationale: In sacrificial/cultic context, 'to offer' is the most natural English
    equivalent and matches the action directed 'to the Lord'.
- source_word: τῷ κυρίῳ
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: LSJ
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this deuterocanonical Greek
    context it refers to Israel's God, but the source text reads κύριος, not the tetragrammaton.
- source_word: κατὰ τὰ γεγραμμένα ἐν βιβλίῳ Μωυσῆ
  chosen: according to what is written in the book of Moses
  alternatives:
  - as written in the book of Moses
  - according to the things written in Moses' book
  lexicon: LSJ
  rationale: This preserves the appeal to written Mosaic authority in clear modern
    English.
- source_word: τὸ πρωϊνόν
  chosen: in the morning
  alternatives:
  - that morning
  - the morning offering
  lexicon: LSJ
  rationale: The phrase is terse and somewhat awkward in Greek. 'In the morning' preserves
    the temporal sense without over-interpreting it as a technical reference to the
    morning offering, which the text does not explicitly state.
