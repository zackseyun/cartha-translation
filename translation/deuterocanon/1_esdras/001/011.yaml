translation:
  text: And they roasted the Passover with fire, as was proper, and they boiled the
    sacrifices in the bronze pots and kettles with a pleasing aroma, and brought them
    to all the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'to all those from the people,' possibly meaning
      the non-priestly people as distinct from the priests and Levites.
    reason: lexical_alternative
  - marker: b
    text: '''With a pleasing aroma'' renders a phrase that literally refers to fragrance
      or sweet smell; in sacrificial context it may evoke the aroma of an offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤπτησαν
  chosen: roasted
  alternatives:
  - cooked
  - broiled
  lexicon: LSJ
  rationale: The verb refers specifically to roasting over fire, matching the Passover
    preparation and reinforced by ἐν πυρί ('with fire'). 'Roasted' is more precise
    than the generic 'cooked'.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the passover lamb
  - the Passover sacrifice
  lexicon: LSJ
  rationale: The phrase can denote the Passover victim or meal. 'The Passover' preserves
    the Greek wording while allowing the sacrificial/meal sense to remain implicit
    in context.
- source_word: ἐν πυρί
  chosen: with fire
  alternatives:
  - in fire
  - over fire
  lexicon: LSJ
  rationale: This expresses the means of preparation. 'With fire' is idiomatic and
    keeps the formal link to the Greek.
- source_word: ὡς καθήκει
  chosen: as was proper
  alternatives:
  - as was fitting
  - as was required
  lexicon: LSJ
  rationale: The expression indicates what is appropriate or prescribed. 'As was proper'
    preserves the normative sense without over-specifying whether the norm is legal,
    customary, or ritual.
- source_word: τὰς θυσίας
  chosen: the sacrifices
  alternatives:
  - the offerings
  - the sacrificial portions
  lexicon: LSJ
  rationale: A broad sacrificial term is best kept broad in English. 'Sacrifices'
    is the most direct rendering.
- source_word: ἥψησαν
  chosen: boiled
  alternatives:
  - cooked
  - seethed
  lexicon: LSJ
  rationale: The verb commonly refers to boiling or cooking in liquid. Because vessels
    are named immediately after, 'boiled' is the most natural and specific choice.
- source_word: ἐν τοῖς χαλκίοις καὶ λέβησιν
  chosen: in the bronze pots and kettles
  alternatives:
  - in the bronze vessels and cauldrons
  - in the copper pots and pans
  lexicon: LSJ
  rationale: χαλκίοις likely refers to bronze/copper cooking vessels, and λέβησιν
    to kettles/cauldrons. 'Bronze pots and kettles' is clear modern English while
    preserving the distinction between the two vessel terms.
- source_word: μετʼ εὐωδίας
  chosen: with a pleasing aroma
  alternatives:
  - fragrantly
  - with sweet savor
  - carefully
  lexicon: LSJ
  rationale: The phrase literally denotes fragrance or sweet smell. In sacrificial
    context it can evoke the pleasing aroma of offerings. This rendering preserves
    that sensory-sacrificial nuance. Some interpreters take the phrase adverbially
    in a looser sense, but the lexical core is aromatic.
- source_word: ἀπήνεγκαν
  chosen: brought
  alternatives:
  - carried
  - distributed
  lexicon: LSJ
  rationale: The verb means to carry or bring away/to. Given the following indirect
    object, the sense is that the prepared portions were brought out to the people.
    'Brought' is natural English; distribution is implied by context.
- source_word: πᾶσι τοῖς ἐκ τοῦ λαοῦ
  chosen: to all the people
  alternatives:
  - to all those from the people
  - to all of the lay people
  - to everyone among the people
  lexicon: LSJ
  rationale: Literally, 'to all those from the people.' The phrase distinguishes the
    recipients from the officiants. 'To all the people' is idiomatic, though the sense
    may specifically be the non-priestly populace.
