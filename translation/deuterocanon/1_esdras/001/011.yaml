theological_decisions:
- issue: Ritual nuance of Passover preparation
  chosen_reading: 'Different cooking verbs are preserved distinctly: the Passover
    was ''roasted,'' while other sacrifices were ''boiled.'''
  alternative_readings:
  - Render both verbs generically as 'cooked'
  rationale: The Greek uses two different verbs and likely reflects distinct ritual
    preparations. Preserving the distinction respects the source and avoids flattening
    cultic detail.
  doctrine_reference: Translation philosophy §1, §5
- issue: Scope of 'the people'
  chosen_reading: Render πᾶσι τοῖς ἐκ τοῦ λαοῦ as 'all the people' in the main text.
  alternative_readings:
  - '''all the lay people'''
  - '''everyone among the people'''
  rationale: The Greek may imply the common people as distinct from priests and Levites,
    but 'all the people' is the clearest main-text rendering. The more specific social
    distinction is preserved in a footnote.
  doctrine_reference: Translation philosophy §6
