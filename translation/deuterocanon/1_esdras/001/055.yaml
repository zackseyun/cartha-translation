translation:
  text: until the land had enjoyed its Sabbaths; all the time of its desolation it
    kept Sabbath, to complete seventy years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'until the land was pleased with its Sabbaths.' The
      Greek personifies the land; 'had enjoyed its Sabbaths' expresses the sense in
      natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἕως τοῦ εὐδοκῆσαι
  chosen: until ... had enjoyed
  alternatives:
  - until ... was pleased
  - until ... took delight
  lexicon: LSJ
  rationale: The articular infinitive with ἕως marks duration up to a goal. εὐδοκέω
    literally involves being pleased or taking delight, but with γῆν as subject and
    τὰ σάββατα αὐτῆς as object-complement, idiomatic English is better served by 'had
    enjoyed,' which captures the land's receiving its missed sabbath-rests without
    awkward personification.
- source_word: τὴν γῆν
  chosen: the land
  alternatives:
  - the earth
  - the ground
  lexicon: LSJ
  rationale: In this exile context, γῆ refers to the land of Judah rather than the
    whole earth. 'The land' also aligns with the sabbatical-land theology echoed from
    Chronicles/Leviticus.
- source_word: τὰ σάββατα αὐτῆς
  chosen: its Sabbaths
  alternatives:
  - its sabbath rests
  - its sabbatical rests
  lexicon: LSJ
  rationale: A formally close rendering preserves the plural noun and the intertextual
    link to sabbatical observance. 'Its Sabbaths' is concise and natural enough in
    English, while the following clause clarifies the sense.
- source_word: πάντα τὸν χρόνον τῆς ἐρημώσεως αὐτῆς
  chosen: all the time of its desolation
  alternatives:
  - throughout the whole time of its desolation
  - for the entire time of its devastation
  lexicon: LSJ
  rationale: This phrase denotes the full duration of the land's ruined state. 'Desolation'
    fits the exile context and preserves the solemn register.
- source_word: σαββατιεῖ
  chosen: it kept Sabbath
  alternatives:
  - it rested
  - it observed Sabbath
  lexicon: LSJ
  rationale: The verb is cognate with Sabbath and specifically evokes sabbath-rest,
    not generic rest. 'It kept Sabbath' preserves that lexical connection more clearly
    than simply 'it rested,' while still reading naturally enough with the personified
    subject 'land.'
- source_word: εἰς συμπλήρωσιν
  chosen: to complete
  alternatives:
  - for the completion of
  - until the fulfillment of
  lexicon: LSJ
  rationale: 'The preposition and noun express purpose/result: the desolation-sabbath
    continued so that the seventy years would be brought to completion. ''To complete''
    is concise and clear.'
- source_word: ἐτῶν ἑβδομήκοντα
  chosen: seventy years
  lexicon: LSJ
  rationale: Straightforward numeral phrase; retained literally because of its theological
    and historical significance in exile traditions.
