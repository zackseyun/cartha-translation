theological_decisions:
- issue: Sabbath language applied to the land during exile
  chosen_reading: Retain explicit Sabbath terminology ('its Sabbaths,' 'it kept Sabbath')
    rather than flattening to generic rest.
  alternative_readings:
  - its sabbath rests ... it rested
  - its weeks of rest ... it lay fallow
  rationale: The Greek deliberately repeats Sabbath-root language, echoing the theology
    that the land receives missed sabbatical rest during desolation. Preserving the
    repetition keeps the intertextual and theological force visible.
