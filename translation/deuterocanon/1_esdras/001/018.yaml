translation:
  text: And no Passover like this had been held in Israel since the days of Samuel
    the prophet.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤχθη
  chosen: had been held
  alternatives:
  - was brought
  - was conducted
  - was celebrated
  lexicon: LSJ
  rationale: The passive of ἄγω here is idiomatic for carrying out or holding a festival
    observance. 'Had been held' gives natural English while preserving the passive/resultative
    sense better than the overly literal 'was brought.' 'Celebrated' is possible,
    but 'held' stays closer to the Greek wording.
- source_word: τὸ πάσχα
  chosen: Passover
  alternatives:
  - the Passover feast
  lexicon: LSJ
  rationale: Standard rendering for πάσχα in this cultic context. The article is naturally
    absorbed in English.
- source_word: τοιοῦτο
  chosen: like this
  alternatives:
  - such as this
  - such a one
  lexicon: LSJ
  rationale: τοιοῦτο modifies the Passover comparatively; 'like this' is idiomatic
    modern English and conveys the sense of an unparalleled observance.
- source_word: ἐν τῷ Ἰσραήλ
  chosen: in Israel
  alternatives:
  - among Israel
  - in the midst of Israel
  lexicon: LSJ
  rationale: The phrase marks the sphere/community within which no comparable Passover
    had occurred. 'In Israel' is the most natural concise rendering.
- source_word: ἀπὸ τῶν χρόνων
  chosen: since the days of
  alternatives:
  - from the times of
  - since the time of
  lexicon: LSJ
  rationale: Although literally 'from the times of,' the idiomatic English equivalent
    in historical narration is 'since the days of.' This also aligns with the temporal
    force of ἀπό.
- source_word: Σαμουὴλ τοῦ προφήτου
  chosen: Samuel the prophet
  alternatives:
  - Samuel the seer
  lexicon: LSJ
  rationale: The Greek explicitly reads 'Samuel the prophet.' The MT parallel in Chronicles
    names Samuel in the corresponding tradition of comparison, and the Greek should
    be followed directly here.
