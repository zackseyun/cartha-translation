translation:
  text: And the sons of Israel who were found at that time kept the Passover and the
    feast of unleavened bread for seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Greek reads more literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'were found'; that is, those present there at that time.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγοσαν
  chosen: kept
  alternatives:
  - observed
  - celebrated
  - held
  lexicon: LSJ
  rationale: Although the verb is literally 'brought/led,' in sacrificial and festival
    contexts it can function idiomatically for carrying out or observing a feast.
    The direct objects are 'the Passover' and 'the feast of unleavened bread,' so
    idiomatic English requires 'kept' or 'observed' rather than a wooden 'brought.'
    'Kept' is concise and natural for festival observance.
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: LSJ
  rationale: The Greek is explicitly 'sons of Israel.' In keeping with the project's
    gender-accurate philosophy, the familial expression is preserved rather than flattened
    to 'Israelites,' though that remains a viable idiomatic alternative.
- source_word: οἱ εὑρεθέντες
  chosen: who were found there
  alternatives:
  - who were present
  - who were found
  lexicon: LSJ
  rationale: The participle means 'having been found.' In context it refers to those
    present/available at the time. 'Who were found there' preserves the verbal form
    while making the implied locative sense clear in English.
- source_word: ἐν τῷ καιρῷ τούτῳ
  chosen: at that time
  alternatives:
  - in that season
  - on that occasion
  lexicon: LSJ
  rationale: καιρός here denotes the relevant time or occasion. 'At that time' is
    the most straightforward rendering in context.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - Passover
  lexicon: LSJ
  rationale: Standard rendering for the Jewish festival; the article is naturally
    retained in English.
- source_word: τὴν ἑορτὴν τῶν ἀζύμων
  chosen: the feast of unleavened bread
  alternatives:
  - the Festival of Unleavened Bread
  - the feast of the unleavened bread
  lexicon: LSJ
  rationale: This is the established and accurate rendering of the festival name.
    Lowercase style is acceptable in running translation, while preserving the lexical
    sense.
- source_word: ἡμέρας ἑπτά
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: LSJ
  rationale: An accusative of duration; 'for seven days' makes the temporal force
    explicit in idiomatic English.
