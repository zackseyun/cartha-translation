theological_decisions:
- issue: Referent of ἀγγέλοις in a judgment context
  chosen_reading: human messengers sent by God
  alternative_readings:
  - heavenly angels
  rationale: The immediate parallel with 'his prophets' strongly favors human emissaries
    rather than celestial beings. This avoids importing angelology where the context
    is prophetic rejection.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether to harmonize the Greek plural 'kings of the Chaldeans' to the MT-like
    singular Nebuchadnezzar
  chosen_reading: retain the Greek plural in the main text
  alternative_readings:
  - the king of the Chaldeans
  - Nebuchadnezzar king of Babylon
  rationale: The project prioritizes the Greek as the primary source for 1 Esdras.
    The Hebrew parallel is used as a control, but not to overwrite the extant Greek
    wording. The divergence is significant enough to preserve in a footnote.
  doctrine_reference: Translation philosophy §1; PHILOSOPHY.md on 1 Esdras Greek primacy
    with MT parallels as cross-reference
