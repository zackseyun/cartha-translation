translation:
  text: But they mocked his messengers, and whenever the Lord spoke, they were making
    sport of his prophets, until, in his anger against his nation because of their
    ungodly deeds, he commanded the kings of the Chaldeans to come up against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his angels'; here the context more likely means God's human messengers,
      especially in parallel with 'his prophets.'
    reason: lexical_alternative
  - marker: b
    text: The Greek reads 'the kings of the Chaldeans' (plural). The Hebrew parallel
      in 2 Chronicles 36 emphasizes the king of Babylon/Nebuchadnezzar. The main text
      follows the Greek witness of 1 Esdras.
    reason: textual_variant
lexical_decisions:
- source_word: ἐμυκτήρισαν
  chosen: mocked
  alternatives:
  - sneered at
  - treated with contempt
  - derided
  lexicon: LSJ
  rationale: The verb conveys scornful derision. 'Mocked' is natural modern English
    and fits the parallel clause about ridiculing the prophets.
- source_word: ἐν τοῖς ἀγγέλοις αὐτοῦ
  chosen: his messengers
  alternatives:
  - his angels
  - his envoys
  lexicon: BDAG/LSJ
  rationale: In this historical-prophetic context, ἄγγελοι most naturally means human
    messengers sent by God, not heavenly angels. This also aligns with the following
    reference to 'his prophets.' Because 'angels' is a possible lexical alternative,
    it is preserved in a footnote.
- source_word: ᾗ ἡμέρᾳ ἐλάλησεν Κύριος
  chosen: on the day the Lord spoke
  alternatives:
  - when the Lord spoke
  - whenever the Lord spoke
  lexicon: LSJ
  rationale: A relatively formal rendering preserves the temporal expression of the
    Greek. The phrase is somewhat awkward in English but reflects the source's wording
    without over-paraphrase.
- source_word: ἐκπαίζοντες
  chosen: making sport of
  alternatives:
  - mocking
  - ridiculing
  - scoffing at
  lexicon: LSJ
  rationale: The participle intensifies the idea of derision. 'Making sport of' preserves
    the sense of treating the prophets as an object of amusement, while avoiding unnecessary
    repetition of 'mocked' in the same sentence.
- source_word: θυμῶντα αὐτὸν
  chosen: in his anger
  alternatives:
  - as he became angry
  - with him enraged
  lexicon: LSJ
  rationale: This smooths the participial construction into idiomatic English while
    retaining the causal force leading into the divine command.
- source_word: τῷ ἔθνει αὐτοῦ
  chosen: his nation
  alternatives:
  - his people
  lexicon: LSJ
  rationale: ἔθνος here refers to the covenant nation of Judah/Israel. 'Nation' is
    the more direct lexical equivalent, though 'people' would also fit contextually.
- source_word: δυσσεβήματα
  chosen: ungodly deeds
  alternatives:
  - impieties
  - wicked acts
  - acts of irreverence
  lexicon: LSJ
  rationale: The noun denotes impious or irreverent acts against God. 'Ungodly deeds'
    is readable modern English and preserves the religious dimension better than the
    broader 'wicked acts.'
- source_word: προστάξαι ἀναβιβάσαι
  chosen: he commanded ... to come up
  alternatives:
  - he ordered ... to bring up
  - he gave orders to send up
  lexicon: LSJ
  rationale: The construction expresses a command resulting in military advance. 'Come
    up against' is standard English for an invading force and reflects ἀναβιβάσαι
    in context.
- source_word: τοὺς βασιλεῖς τῶν Χαλδαίων
  chosen: the kings of the Chaldeans
  alternatives:
  - the Chaldean kings
  - the king of the Chaldeans
  lexicon: LSJ
  rationale: The Greek witness is plural, so the translation keeps 'kings' rather
    than harmonizing to the singular found in the Hebrew parallel tradition. Because
    this may reflect a textual or compositional divergence from the MT parallel, it
    is noted in a footnote.
