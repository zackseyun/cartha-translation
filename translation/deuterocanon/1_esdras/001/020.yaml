translation:
  text: In the eighteenth year of Iosias's reign, this Passover was held.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''this Passover was led/conducted''; the wording means that the
      Passover observance was carried out at that time.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in 2 Chronicles 35 describes Israel keeping the Passover
      at that time; the Greek here is a compressed summary of that observance.
    reason: cross_reference
lexical_decisions:
- source_word: ὀκτωκαιδεκάτῳ ἔτει
  chosen: in the eighteenth year
  alternatives:
  - in year eighteen
  - in the eighteenth year
  lexicon: LSJ
  rationale: Dative of time gives the temporal setting; standard English idiom is
    'in the eighteenth year.'
- source_word: βασιλεύοντος Ἰωσείου
  chosen: of Iosias's reign
  alternatives:
  - while Iosias was reigning
  - when Iosias reigned
  lexicon: LSJ
  rationale: The genitive absolute literally means 'while Iosias was reigning.' English
    compresses this naturally to 'of Iosias's reign' without loss of sense. The Greek
    name Ἰωσείου is transliterated as Iosias rather than harmonized to the Hebrew-form
    Josiah, following the project's preference to transliterate names from the source
    witness while the MT parallel confirms the identity.
- source_word: ἤχθη
  chosen: was held
  alternatives:
  - was brought
  - was conducted
  - was celebrated
  lexicon: LSJ
  rationale: Although the verb is literally 'was led/brought,' in context with πάσχα
    it denotes the carrying out or observance of the festival. 'Was held' preserves
    the eventive sense with natural English. 'Was celebrated' is possible but slightly
    more interpretive and festive than the Greek requires.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the pascha
  lexicon: LSJ
  rationale: Standard rendering for the Jewish feast; the MT parallel הַפֶּסַח supports
    'Passover.'
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this very
  - the present
  lexicon: LSJ
  rationale: The demonstrative points to the specific Passover just described in context;
    'this' is the plain equivalent and keeps the discourse linkage visible.
