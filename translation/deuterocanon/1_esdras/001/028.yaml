translation:
  text: And the king said to his servants, “Take me away from the battle, for I am
    very weak.” And immediately his servants took him away from the battle line,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “attendants.” Greek παῖδες can mean “servants,” “attendants,” or “young
      men”; the Hebrew parallel reads “his servants.”
    reason: lexical_alternative
lexical_decisions:
- source_word: παῖς / παισίν / παῖδες
  chosen: servants
  alternatives:
  - attendants
  - young men
  - boys
  lexicon: LSJ
  rationale: In this royal military context, παῖδες refers to the king’s personal
    attendants or retainers rather than children. The MT parallel has עֲבָדָיו ('his
    servants'), which supports rendering the term as 'servants' rather than the more
    literal but misleading 'boys.'
- source_word: Ἀποστήσατέ με
  chosen: Take me away
  alternatives:
  - Remove me
  - Withdraw me
  lexicon: LSJ
  rationale: The imperative asks that he be moved away from the fighting. 'Take me
    away' is natural English and matches the sense of physical removal from danger;
    the MT parallel הַעֲבִירוּנִי similarly supports a causative sense of moving him
    away.
- source_word: ἀπὸ τῆς μάχης
  chosen: from the battle
  alternatives:
  - out of the fighting
  - from the combat
  lexicon: LSJ
  rationale: μάχη is the battle/fight itself. 'From the battle' is straightforward
    and preserves the king’s request to be removed from active combat.
- source_word: ἠσθένησα
  chosen: I am very weak
  alternatives:
  - I have become very weak
  - I am badly wounded
  lexicon: LSJ
  rationale: The verb means 'to be weak/sickly' and need not specify a wound in itself.
    The MT parallel הָחֳלֵיתִי מְאֹד also points to severe weakness or illness. English
    present 'I am very weak' best conveys the immediate condition prompting removal.
- source_word: λίαν
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: LSJ
  rationale: λίαν intensifies the statement. 'Very' is idiomatic modern English without
    overstating the force.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: LSJ
  rationale: Marks prompt action by the attendants. 'Immediately' is clear modern
    English.
- source_word: παράταξις
  chosen: battle line
  alternatives:
  - battle array
  - formation
  - line of battle
  lexicon: LSJ
  rationale: παράταξις denotes the arranged battle formation or line. 'Battle line'
    is concise, military, and more precise than repeating simply 'battle.'
