theological_decisions:
- issue: Rendering distinct service verbs for God and Israel
  chosen_reading: 'Different English verbs: ''serve'' for λατρεύετε and ''minister
    to'' for θεραπεύετε'
  alternative_readings:
  - Use 'serve' for both verbs
  rationale: The Greek uses two different verbs, one directed to God and one to Israel.
    Preserving the distinction avoids flattening the text and reflects the priestly-theological
    contrast between worshipful service to God and practical ministry toward the covenant
    people.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Use of MT parallel to clarify organizational terms
  chosen_reading: Translate φυλαί contextually as 'divisions' rather than the default
    'tribes'
  alternative_readings:
  - Translate formally as 'tribes'
  rationale: The Greek of 1 Esdras often reflects or reshapes the Hebrew parallel.
    Here the MT's 'according to your fathers' houses, by your divisions' clarifies
    that the organizational reference is liturgical/administrative rather than ethnic.
    This is a contextual, not doctrinal, decision but materially affects interpretation.
  doctrine_reference: PHILOSOPHY.md section on WLC MT parallels for 1 Esdras
