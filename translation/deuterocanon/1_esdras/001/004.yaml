translation:
  text: You will not need to carry it on your shoulders. Now serve the Lord your God,
    and minister to his people Israel, and prepare yourselves according to your fathers'
    houses and your tribes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''tribes.'' The Hebrew parallel in 2 Chronicles 35:4 has ''divisions,''
      which likely explains the sense here.'
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'it' refers to the ark, understood from the surrounding context
      rather than repeated in this verse.
    reason: cross_reference
lexical_decisions:
- source_word: Οὐκ ἔσται ὑμῖν
  chosen: You will not need to
  alternatives:
  - It will not be for you to
  - You shall not
  lexicon: BDAG
  rationale: The future of εἰμί with dative can be rendered woodenly as 'it will not
    be for you,' but in context it expresses lack of obligation/necessity. 'You will
    not need to' gives clear English while preserving the force of the instruction.
- source_word: ἆραι
  chosen: carry
  alternatives:
  - lift
  - bear
  lexicon: BDAG
  rationale: Aorist infinitive of αἴρω here refers to physically bearing the ark/object.
    'Carry' is the most natural English in this cultic context.
- source_word: ἐπʼ ὤμων
  chosen: on your shoulders
  alternatives:
  - upon your shoulders
  lexicon: BDAG
  rationale: A straightforward bodily expression; 'on your shoulders' is idiomatic
    modern English and preserves the concrete image.
- source_word: αὐτήν
  chosen: it
  alternatives:
  - her
  lexicon: BDAG
  rationale: The pronoun is feminine in Greek, likely referring to the ark understood
    from context, but English uses neuter for such an object. Because the referent
    is implicit rather than repeated in this verse, 'it' is the natural rendering.
- source_word: λατρεύετε
  chosen: serve
  alternatives:
  - worship
  - perform sacred service for
  lexicon: BDAG
  rationale: λατρεύω often denotes cultic service to God. 'Serve' preserves both worshipful
    and priestly dimensions without over-specifying one aspect.
- source_word: κυρίῳ θεῷ ὑμῶν
  chosen: the Lord your God
  alternatives:
  - your Lord God
  lexicon: BDAG
  rationale: This is the standard covenantal expression. Per doctrine, κύριος is rendered
    'Lord.'
- source_word: θεραπεύετε
  chosen: minister to
  alternatives:
  - serve
  - attend to
  lexicon: BDAG
  rationale: θεραπεύω can mean serve/attend, and here distinguishes service directed
    toward the people from λατρεύετε directed toward God. 'Minister to' preserves
    that distinction in readable English.
- source_word: τὸ ἔθνος αὐτοῦ Ἰσραήλ
  chosen: his people Israel
  alternatives:
  - his nation Israel
  - the nation of Israel
  lexicon: BDAG
  rationale: Although ἔθνος often means 'nation,' in this covenantal setting 'people
    Israel' is more natural and better reflects the relational sense. The possessive
    αὐτοῦ is retained as 'his.'
- source_word: ἑτοιμάσατε
  chosen: prepare yourselves
  alternatives:
  - make ready
  - prepare
  lexicon: BDAG
  rationale: The Greek imperative is absolute here, but the Hebrew parallel points
    toward arranging/establishing themselves for service. 'Prepare yourselves' makes
    the implied reflexive sense explicit in English.
- source_word: κατὰ τὰς πατριὰς
  chosen: by your fathers' houses
  alternatives:
  - according to your ancestral houses
  - by your family groups
  lexicon: BDAG
  rationale: πατριά denotes clan/father-house grouping. The MT parallel לְבֵית־אֲבוֹתֵיכֶם
    supports the more specific 'fathers' houses' rather than a generic 'families.'
- source_word: καὶ τὰς φυλὰς ὑμῶν
  chosen: and your divisions
  alternatives:
  - and your tribes
  lexicon: BDAG
  rationale: φυλή commonly means 'tribe,' but the MT parallel כְּמַחְלְקוֹתֵיכֶם points
    to service divisions/courses in this context. Since the task requires using the
    parallel source as actual input, 'divisions' better reflects the underlying organizational
    sense here.
