theological_decisions:
- issue: Nature of the accusation against the city and the Jews
  chosen_reading: Political rebellion and hostile activity
  alternative_readings:
  - Religious apostasy
  rationale: Both ἀποστάτις and ἀποστᾶται can in some contexts suggest apostasy, but
    in this Persian administrative letter the charges concern sedition against imperial
    authority. The translation therefore uses 'rebellious' and 'rebels' rather than
    religiously loaded terms.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
