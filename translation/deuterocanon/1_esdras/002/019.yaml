translation:
  text: And you will find in the records what has been written about these things,
    and you will know that that city was rebellious, troubling kings and cities, and
    that the Jews in it were rebels and had organized sieges in it from of old; for
    this reason this city was laid waste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sieges' for 'blockades'; the Greek term can denote siege activity more
      broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπομνηματισμοῖς
  chosen: records
  alternatives:
  - memoranda
  - archives
  - commentaries
  lexicon: LSJ
  rationale: In this administrative context, the term refers to official written records
    or memoranda consulted by the king. 'Records' is clear modern English and fits
    the archival setting better than the more literal but less natural 'memoranda.'
- source_word: γεγραμμένα
  chosen: what has been written
  alternatives:
  - the things written
  - the written record
  lexicon: LSJ
  rationale: The perfect participle points to material already committed to writing.
    'What has been written' preserves that sense in readable English.
- source_word: ἀποστάτις
  chosen: rebellious
  alternatives:
  - apostate
  - rebel
  lexicon: LSJ
  rationale: Here the predicate describes political revolt by the city, not religious
    apostasy. 'Rebellious' captures the adjectival force naturally in English.
- source_word: ὀχλοῦσα
  chosen: troubling
  alternatives:
  - disturbing
  - harassing
  - causing unrest for
  lexicon: LSJ
  rationale: The participle conveys causing disturbance or trouble. 'Troubling' is
    concise and preserves the ongoing disruptive sense.
- source_word: ἀποστᾶται
  chosen: rebels
  alternatives:
  - revolutionaries
  - insurgents
  - apostates
  lexicon: LSJ
  rationale: As with ἀποστάτις, the context is political disloyalty. 'Rebels' is the
    most direct and idiomatic rendering.
- source_word: πολιορκίας
  chosen: blockades
  alternatives:
  - sieges
  - acts of siege
  lexicon: LSJ
  rationale: The noun can denote siege activity. Because the phrase says they had
    'established' them in the city, 'blockades' better fits the idea of organized
    hostile measures than the more static English 'sieges,' though the latter remains
    a viable alternative.
- source_word: συνεσταμένοι
  chosen: had established
  alternatives:
  - had organized
  - had set up
  - were engaged in
  lexicon: LSJ
  rationale: The participle suggests something set in place or organized. 'Had established'
    fits the perfective sense and works with 'blockades.'
- source_word: ἔτι ἐξ αἰῶνος
  chosen: from of old
  alternatives:
  - since ancient times
  - long ago
  lexicon: LSJ
  rationale: The phrase points to longstanding precedent. 'From of old' preserves
    the elevated tone without becoming archaic beyond comprehension.
- source_word: ἠρημώθη
  chosen: was laid waste
  alternatives:
  - was made desolate
  - was devastated
  lexicon: LSJ
  rationale: The passive indicates the city's desolation as a result. 'Was laid waste'
    is idiomatic and weighty, matching the formal accusation.
