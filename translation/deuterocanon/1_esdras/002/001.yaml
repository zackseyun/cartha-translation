translation:
  text: In the first year of Cyrus king of Persia, for the fulfillment of the word
    of the Lord by the mouth of Jeremiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the Hebrew parallel more explicitly, 'for the fulfillment
      of the word of the LORD from the mouth of Jeremiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: Βασιλεύοντος
  chosen: In the ... year ... king
  alternatives:
  - While Cyrus ... was reigning
  - During the reign of Cyrus
  lexicon: LSJ
  rationale: The Greek uses a genitive absolute ('while Cyrus was reigning'), but
    with ἔτους πρώτου it idiomatically marks time. The MT parallel likewise has 'in
    the first year of Cyrus king of Persia.' English is clearer with the temporal
    rendering 'In the first year of Cyrus king of Persia.'
- source_word: Κύρου Περσῶν
  chosen: Cyrus king of Persia
  alternatives:
  - Cyrus of the Persians
  lexicon: LSJ
  rationale: The Greek literally has 'Cyrus of the Persians,' but the Hebrew parallel
    confirms the royal title construction 'Cyrus king of Persia.' This is standard,
    natural English and preserves the referent accurately.
- source_word: ἔτους πρώτου
  chosen: the first year
  alternatives:
  - year one
  - the first regnal year
  lexicon: LSJ
  rationale: A straightforward temporal phrase. 'The first year' is idiomatic and
    matches the Hebrew parallel without over-specifying 'regnal' in the main text.
- source_word: εἰς συντέλειαν
  chosen: to bring to completion
  alternatives:
  - for the fulfillment of
  - to complete
  lexicon: LSJ
  rationale: 'The phrase expresses purpose/result: the word is being brought to its
    completion or fulfillment. ''To bring to completion'' preserves the verbal force
    and avoids sounding overly abstract.'
- source_word: ῥήματος Κυρίου
  chosen: the word of the Lord
  alternatives:
  - the Lord's word
  lexicon: LSJ
  rationale: Standard biblical phrasing. κύριος is rendered 'Lord' per doctrine; because
    the Greek source has Κυρίου rather than the Hebrew divine name directly, 'the
    Lord' is appropriate in the main text.
- source_word: ἐν στόματι Ἰερεμίου
  chosen: by the mouth of Jeremiah
  alternatives:
  - through Jeremiah
  - spoken by Jeremiah
  lexicon: LSJ
  rationale: The Greek and Hebrew both use the concrete idiom 'in/by the mouth of.'
    Retaining 'by the mouth of Jeremiah' preserves the prophetic formula and its embodied
    imagery, while remaining understandable in English.
