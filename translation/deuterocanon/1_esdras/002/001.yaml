- issue: Rendering of Κυρίου in a verse with an MT parallel containing YHWH
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The primary source for 1 Esdras is the Greek, which reads Κυρίου. Per
    doctrine, κύριος defaults to 'Lord.' Because the Hebrew parallel has the divine
    name YHWH, 'the LORD' is a meaningful alternative, but the main text follows the
    Greek source while preserving the alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
