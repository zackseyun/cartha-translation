translation:
  text: 'Thus says Cyrus king of the Persians: The Lord of Israel, the Most High Lord,
    has appointed me king of the world,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Ezra 1:2 reads, 'the LORD, the God of heaven,' rather
      than 'the Lord of Israel, the Most High Lord.' 1 Esdras here reflects the Greek
      form of the proclamation.
    reason: alternative_reading
lexical_decisions:
- source_word: Τάδε λέγει
  chosen: Thus says
  alternatives:
  - These things says
  - This is what ... says
  lexicon: LSJ
  rationale: Standard formulaic introductory speech marker; 'Thus says' is idiomatic
    modern English that preserves the formal proclamation tone.
- source_word: ὁ βασιλεὺς Περσῶν Κῦρος
  chosen: Cyrus king of the Persians
  alternatives:
  - Cyrus, the king of Persia
  - King Cyrus of the Persians
  lexicon: LSJ
  rationale: Keeps the Greek appositional order fairly closely while remaining natural
    in English. 'Persians' follows the plural ethnicon in the Greek rather than the
    MT parallel's singular 'Persia'.
- source_word: Ἐμὲ ἀνέδειξεν
  chosen: has appointed me
  alternatives:
  - has made me
  - has raised me up as
  - has shown me to be
  lexicon: LSJ
  rationale: ἀναδείκνυμι here denotes installation or designation to office. 'Has
    appointed me' best captures royal investiture language in clear English.
- source_word: βασιλέα
  chosen: king
  alternatives:
  - as king
  - to be king
  lexicon: LSJ
  rationale: Predicate accusative after ἀνέδειξεν; English supplies the sense naturally
    in 'appointed me king.'
- source_word: τῆς οἰκουμένης
  chosen: of the world
  alternatives:
  - over the inhabited world
  - of the whole inhabited earth
  lexicon: LSJ
  rationale: οἰκουμένη can mean the inhabited world or imperial world. 'Of the world'
    is the most natural concise rendering, while preserving the expansive universal
    claim of the Greek. The MT parallel has 'all the kingdoms of the earth,' which
    confirms the broad scope though not the exact wording.
- source_word: ὁ κύριος τοῦ Ἰσραήλ
  chosen: The Lord of Israel
  alternatives:
  - the Lord, the God of Israel
  - the Lord belonging to Israel
  lexicon: LSJ
  rationale: κύριος is rendered 'Lord' per doctrine. The Greek explicitly reads 'the
    Lord of Israel'; although the Hebrew parallel has 'YHWH, the God of heaven,' the
    translation must remain anchored in the Greek witness.
- source_word: Κύριος ὁ ὕψιστος
  chosen: the Most High Lord
  alternatives:
  - the Lord Most High
  - Lord Most High
  lexicon: LSJ
  rationale: The phrase is appositional to the previous divine title. 'The Most High
    Lord' preserves both κύριος and ὕψιστος without collapsing them. English capitalization
    reflects divine title usage.
