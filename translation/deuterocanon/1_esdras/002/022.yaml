translation:
  text: I read the letter that you sent to me. Therefore I gave orders to investigate,
    and it was found that that city has from ancient times set itself in opposition
    to kings,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'has opposed kings.' The Greek participle can be rendered more compactly,
      but the main text preserves the sense of taking a hostile stand against royal
      authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνέγνων
  chosen: I read
  alternatives:
  - I have read
  - I examined
  lexicon: LSJ
  rationale: Aorist first-person singular of ἀναγιγνώσκω. In epistolary/report style,
    simple past 'I read' is the most natural English rendering. 'Have read' is possible
    but less necessary in this narrative reply context.
- source_word: ἐπιστολήν
  chosen: letter
  alternatives:
  - document
  - written message
  lexicon: LSJ
  rationale: Standard sense is 'letter'; no need for a more formal term.
- source_word: πέμψατε
  chosen: you sent
  alternatives:
  - you dispatched
  lexicon: LSJ
  rationale: Common verb for sending; 'sent' is idiomatic and sufficient.
- source_word: ἐπέταξα
  chosen: I gave orders
  alternatives:
  - I commanded
  - I ordered
  lexicon: LSJ
  rationale: The verb denotes issuing an order. 'I gave orders' preserves the royal-administrative
    tone while reading naturally in English.
- source_word: ἐπισκέψασθαι
  chosen: to investigate
  alternatives:
  - to examine
  - to inspect
  - to look into
  lexicon: LSJ
  rationale: In this administrative context the infinitive means to conduct an inquiry.
    'Investigate' best captures official examination.
- source_word: εὑρέθη
  chosen: it was found
  alternatives:
  - it was discovered
  lexicon: LSJ
  rationale: Impersonal/passive report formula; 'it was found' matches the bureaucratic
    style.
- source_word: ἐξ αἰῶνος
  chosen: from ancient times
  alternatives:
  - from of old
  - from eternity
  - for a long time
  lexicon: LSJ
  rationale: Here the phrase refers to longstanding historical precedent, not metaphysical
    eternity. 'From ancient times' communicates that clearly in modern English.
- source_word: ἀντιπαρατάσσουσα
  chosen: has set itself in opposition
  alternatives:
  - has opposed
  - has arrayed itself against
  - has rebelled against
  lexicon: LSJ
  rationale: The participle literally conveys taking a stand against or arraying oneself
    in opposition. 'Has set itself in opposition' preserves the reflexive, adversarial
    nuance without overstating it as open rebellion.
- source_word: βασιλεῦσιν
  chosen: kings
  alternatives:
  - the kings
  - royal authorities
  lexicon: LSJ
  rationale: Dative plural with generic/historical force. 'Kings' is the direct and
    natural rendering.
