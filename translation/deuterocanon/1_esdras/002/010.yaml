translation:
  text: Then Cyrus king of the Persians brought them out and handed them over to Mithridates,
    his treasurer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the temple vessels mentioned in the preceding verse.
    reason: cross_reference
  - marker: b
    text: Or 'his keeper of the treasury.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξήνεγκεν
  chosen: brought ... out
  alternatives:
  - took out
  - brought forth
  lexicon: BDAG
  rationale: The verb means to bring or carry out. 'Brought ... out' is natural English
    and matches the movement of temple vessels from storage into official transfer.
    It also aligns with the MT parallel הוֹצִיא ('brought out').
- source_word: Κῦρος ὁ βασιλεὺς Περσῶν
  chosen: Cyrus king of the Persians
  alternatives:
  - Cyrus the king of Persia
  - King Cyrus of Persia
  lexicon: LSJ
  rationale: This closely follows the Greek word order and plural ethnic Περσῶν. 'King
    of the Persians' is a transparent rendering of the Greek, though idiomatic English
    might also say 'king of Persia.'
- source_word: παρέδωκεν
  chosen: handed ... over
  alternatives:
  - delivered
  - gave
  lexicon: BDAG
  rationale: The verb conveys formal transfer into another's charge. 'Handed ... over'
    preserves that official sense better than the flatter 'gave.'
- source_word: Μιθριδάτῃ
  chosen: Mithridates
  alternatives:
  - Mithradates
  lexicon: LSJ
  rationale: A standard English transliteration of the Greek proper name. Personal
    names are transliterated rather than translated.
- source_word: τῷ ἑαυτοῦ γαζοφύλακι
  chosen: his treasurer
  alternatives:
  - his keeper of the treasury
  - his treasury officer
  lexicon: BDAG
  rationale: γαζοφύλαξ denotes a treasury official or keeper of the treasury. 'Treasurer'
    is concise, idiomatic, and preserves the administrative role. ἑαυτοῦ marks the
    official as belonging to Cyrus's own administration, captured by 'his.'
- source_word: αὐτά
  chosen: them
  alternatives:
  - these things
  - the vessels
  lexicon: BDAG
  rationale: The pronoun refers back to the temple vessels from the previous verse.
    'Them' is sufficient in English because the antecedent is clear from context;
    supplying 'the vessels' would be interpretive expansion beyond the Greek wording
    of this verse alone.
