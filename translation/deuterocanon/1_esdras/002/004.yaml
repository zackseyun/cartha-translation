translation:
  text: and he has appointed me to build a house for him in Jerusalem, which is in
    Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'has commanded me' or 'has charged me.' The Greek verb can denote making
      known or commissioning; the Hebrew parallel more explicitly supports the sense
      of divine authorization.
    reason: lexical_alternative
  - marker: b
    text: Or, 'a temple for him.' The Greek literally says 'a house for him,' a common
      biblical way of referring to the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσήμανέν
  chosen: has appointed
  alternatives:
  - has signaled
  - has indicated
  - has charged
  - has commanded
  lexicon: LSJ
  rationale: The verb σημαίνω can mean to indicate, make known, or appoint/charge
    depending on context. Here, with the infinitive οἰκοδομῆσαι and in parallel with
    the Hebrew sense of commissioning the return and rebuilding, 'has appointed' best
    captures a royal-divine commissioning without overstating it as a direct imperative.
- source_word: οἰκοδομῆσαι
  chosen: to build
  alternatives:
  - to rebuild
  - to construct
  lexicon: LSJ
  rationale: The infinitive straightforwardly means 'to build.' Although the broader
    context is restoration, the Greek here does not explicitly add a prefix meaning
    'rebuild,' so 'to build' stays closest to the wording.
- source_word: αὐτῷ
  chosen: for him
  alternatives:
  - to him
  lexicon: LSJ
  rationale: 'The dative with οἶκον naturally expresses benefit or dedication: the
    house is built for God. ''For him'' is idiomatic English and preserves the sense
    of dedication.'
- source_word: οἶκον
  chosen: a house
  alternatives:
  - house
  - temple
  lexicon: LSJ
  rationale: The Greek says 'house' without the explicit word 'temple.' Because the
    referent is clearly the sanctuary, 'temple' is a possible interpretive gloss,
    but 'a house' preserves the source wording and its biblical-theological resonance.
    The temple sense can be inferred from context.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: τῇ ἐν τῇ Ἰουδαίᾳ
  chosen: which is in Judea
  alternatives:
  - that is in Judea
  - in Judea
  lexicon: LSJ
  rationale: The article plus prepositional phrase functions appositionally to identify
    Jerusalem's location. 'Which is in Judea' preserves the explanatory force present
    in the Greek.
