theological_decisions:
- issue: Whether to render οἶκον as 'house' or the more explicit 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The Greek text uses οἶκον ('house'), and the project's philosophy prefers
    preserving source wording unless context plainly demands an interpretive gloss.
    Since the sanctuary reference is obvious from context and the MT parallel also
    uses 'house of YHWH,' 'house' is retained in the main text.
  doctrine_reference: Translation philosophy §§1, 5
- issue: How strongly to render ἐσήμανέν in a divine-commission context
  chosen_reading: has appointed me
  alternative_readings:
  - has commanded me
  - has charged me
  rationale: The Greek verb does not require the stronger sense 'commanded,' though
    the Hebrew parallel implies divine authorization for the rebuilding. 'Has appointed
    me' preserves the commissioning idea without importing a stronger claim than the
    Greek wording itself makes.
  doctrine_reference: Translation philosophy §1
