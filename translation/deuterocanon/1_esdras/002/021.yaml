translation:
  text: 'Then the king wrote back to Rathymus, the recorder of what was reported,
    and to Beeltethmus, and to Samellius the scribe, and to the rest of their associates
    who lived in Samaria and Syria and Phoenicia, as follows:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text names the recipients as living in Samaria and Syria and Phoenicia;
      the parallel Aramaic tradition in Ezra differs in names and wording. This translation
      follows the Greek witness of 1 Esdras while using the parallel as a control.
    reason: textual_variant
  - marker: b
    text: Or 'the chancellor' for 'the recorder of what was reported'; the Greek expression
      is administrative and somewhat idiomatic.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντέγραψεν
  chosen: wrote back
  alternatives:
  - replied in writing
  - wrote in answer
  lexicon: BDAG
  rationale: The compound verb indicates a written response or counter-letter. 'Wrote
    back' is natural modern English and preserves the epistolary sense better than
    the overly literal 'wrote against' or the stiffer 'replied in writing'.
- source_word: Ῥαθύμῳ
  chosen: Rathymus
  alternatives:
  - Rehum
  rationale: As a personal name in the Greek witness, it is transliterated rather
    than harmonized to the MT parallel's Aramaic/Hebrew form. The MT parallel helps
    identify the correspondence but does not override the Greek form in 1 Esdras.
- source_word: τῷ γράφοντι τὰ προσπίπτοντα
  chosen: the recorder of what was reported
  alternatives:
  - the chancellor
  - the writer of the accusations
  - the one writing the matters brought before him
  lexicon: BDAG
  rationale: γράφοντι is straightforwardly 'writing' or 'recording.' τὰ προσπίπτοντα
    literally refers to matters that 'fall before' someone, idiomatically matters
    presented or reported. 'Recorder of what was reported' captures the administrative
    function without importing the more interpretive title 'chancellor.'
- source_word: Βεελτέθμῳ
  chosen: Beeltethmus
  alternatives:
  - Shimshai (from MT parallel)
  rationale: The Greek proper name is transliterated as given. Although the MT parallel
    has a different corresponding official, the translation remains anchored in the
    Greek text of 1 Esdras.
- source_word: Σαμελλίῳ γραμματεῖ
  chosen: Samellius the scribe
  alternatives:
  - Samellius the secretary
  lexicon: BDAG
  rationale: γραμματεύς in an administrative context can mean scribe or secretary.
    'Scribe' is the more direct and traditional rendering, while still intelligible
    in modern English.
- source_word: τοῖς λοιποῖς τοῖς συντασσομένοις
  chosen: the rest of their associates
  alternatives:
  - the rest who were in council with them
  - the remaining officials
  - the rest who were appointed with them
  lexicon: BDAG
  rationale: The participle suggests those arranged together with or associated with
    the named officials, likely fellow administrators or collaborators. 'Associates'
    is broad enough to preserve the Greek without over-specifying rank.
- source_word: οἰκοῦσιν
  chosen: who lived
  alternatives:
  - dwelling
  - residing
  lexicon: BDAG
  rationale: A simple past-tense relative clause reads naturally in English and matches
    the descriptive force of the participle.
- source_word: ἐν Σαμαρείᾳ καὶ Συρίᾳ καὶ Φοινίκῃ
  chosen: in Samaria and Syria and Phoenicia
  alternatives:
  - in Samaria, Syria, and Phoenicia
  rationale: The place names are transliterated in standard English forms. The Greek
    includes all three regions explicitly, and the translation preserves that list
    without harmonizing to the shorter MT parallel.
- source_word: τὰ ὑπογεγραμμένα
  chosen: as follows
  alternatives:
  - the things written below
  - what is written hereunder
  lexicon: BDAG
  rationale: This is a standard epistolary formula introducing the contents of the
    letter. 'As follows' is idiomatic modern English and accurately conveys the function.
