translation:
  text: Therefore, if this city is rebuilt and the walls are completed, they will
    certainly not endure to pay tribute, but will even oppose kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they will certainly not continue to pay tribute.' The Greek phrase
      literally says they 'will certainly not endure to pay,' which may emphasize
      refusal to remain under imperial tribute rather than mere inability.
    reason: lexical_alternative
  - marker: b
    text: The Greek source for this verse is the primary witness. Its wording here
      does not closely match the supplied MT-parallel material, so the translation
      follows the Greek directly while reflecting the broader restoration context
      signaled by the parallel tradition.
    reason: textual_variant
lexical_decisions:
- source_word: ἐὰν οὖν
  chosen: Therefore, if
  alternatives:
  - Now if
  - So if
  lexicon: LSJ
  rationale: οὖν marks inference from the preceding accusation; 'Therefore, if' preserves
    the argumentative flow better than a bare conditional.
- source_word: ἡ πόλις αὕτη
  chosen: this city
  alternatives:
  - that city
  lexicon: LSJ
  rationale: The demonstrative is proximal in Greek; 'this city' is the natural English
    equivalent in the letter's deictic perspective.
- source_word: οἰκοδομηθῇ
  chosen: is rebuilt
  alternatives:
  - is built
  - should be built
  lexicon: LSJ
  rationale: The aorist passive subjunctive in the conditional clause is well represented
    by 'is rebuilt.' 'Rebuilt' fits the historical context of Jerusalem's restoration
    rather than first construction.
- source_word: τὰ τείχη συντελεσθῇ
  chosen: the walls are completed
  alternatives:
  - the walls are finished
  - the walls are fully built
  lexicon: LSJ
  rationale: 'συντελέω here conveys bringing to completion. Although the singular
    verb with neuter plural subject is stylistically irregular, the sense is straightforward:
    completion of the city walls.'
- source_word: φορολογίαν
  chosen: tribute
  alternatives:
  - tax
  - taxation
  lexicon: LSJ
  rationale: φορολογία denotes tribute/tax obligation to an imperial ruler. 'Tribute'
    best fits the political setting and avoids sounding like ordinary local taxation.
- source_word: οὐ μὴ ὑπομείνωσιν δοῦναι
  chosen: they will certainly not endure to pay
  alternatives:
  - they will certainly not continue to pay
  - they will by no means submit to pay
  lexicon: LSJ
  rationale: οὐ μὴ with subjunctive is emphatic negation. ὑπομένω literally means
    'endure, remain under'; in this fiscal-political context it conveys continuing
    under the burden of payment. 'Certainly not endure to pay' keeps some of the Greek
    force while remaining intelligible.
- source_word: ἀλλὰ καὶ
  chosen: but will even
  alternatives:
  - but also will
  - indeed they will also
  lexicon: LSJ
  rationale: The phrase heightens the accusation beyond tax refusal; 'will even' captures
    the escalatory force idiomatically.
- source_word: βασιλεῦσιν ἀντιστήσονται
  chosen: oppose kings
  alternatives:
  - resist kings
  - stand against kings
  lexicon: LSJ
  rationale: ἀνθίστημι means to set oneself against or resist. 'Oppose kings' is clear
    modern English and preserves the political charge of rebellion against imperial
    authority.
