theological_decisions:
- issue: Divine agency in Cyrus's decree
  chosen_reading: the text states that the Lord actively stirred Cyrus's spirit
  alternative_readings:
  - the Lord permitted Cyrus to act
  - Cyrus was merely politically motivated
  rationale: Both the Greek and the Hebrew parallel present the decree as prompted
    by Israel's God. The translation preserves this direct divine agency without softening
    it into mere permission or reducing it to political expediency.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
