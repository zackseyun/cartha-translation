translation:
  text: the Lord stirred up the spirit of Cyrus king of the Persians, and he made
    a proclamation throughout all his kingdom, and also in writing, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''king of the Persians''; the Hebrew parallel in Ezra 1:1 has ''king
      of Persia.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἤγειρεν
  chosen: stirred up
  alternatives:
  - raised up
  - awakened
  lexicon: BDAG
  rationale: The verb ἐγείρω here takes 'the spirit' as its object and parallels the
    Hebrew פקד/awakening motif in the Cyrus decree context. 'Stirred up' is idiomatic
    English for inward divine prompting and matches the sense better than the more
    wooden 'raised up' or the potentially misleading 'awakened'.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Following the project's default for κύριος, this is rendered 'the Lord.'
    In this narrative context it refers to Israel's God, aligning with the MT parallel's
    יהוה, but the Greek text itself reads Κύριος, not the tetragrammaton.
- source_word: τὸ πνεῦμα
  chosen: the spirit
  alternatives:
  - his spirit
  - mind
  lexicon: BDAG
  rationale: The Greek has the article with 'spirit' and no explicit possessive pronoun.
    English naturally understands this as Cyrus's inner disposition from context.
    'The spirit' preserves the Greek form while still conveying his inward impulse;
    'mind' would flatten the anthropological nuance.
- source_word: Κύρου
  chosen: Cyrus
  rationale: Standard transliteration of the royal name from Greek, confirmed by the
    Hebrew parallel כורש.
- source_word: βασιλέως Περσῶν
  chosen: king of the Persians
  alternatives:
  - king of Persia
  lexicon: BDAG
  rationale: The Greek is explicitly plural, 'of the Persians,' so this is retained
    rather than harmonizing to the Hebrew parallel's singular 'king of Persia.' This
    preserves the wording of the primary Greek witness.
- source_word: ἐκήρυξεν
  chosen: made a proclamation
  alternatives:
  - proclaimed
  - issued a proclamation
  lexicon: BDAG
  rationale: The verb denotes public heralding. 'Made a proclamation' is natural English
    and prepares for the following specification that it was both oral/public and
    written.
- source_word: ὅλῃ τῇ βασιλείᾳ αὐτοῦ
  chosen: throughout all his kingdom
  alternatives:
  - in all his kingdom
  - to his whole kingdom
  lexicon: BDAG
  rationale: 'The dative with ὅλῃ is best expressed distributively here: the proclamation
    went throughout the extent of his realm. This is smoother than a strictly literal
    dative rendering.'
- source_word: ἅμα
  chosen: also
  alternatives:
  - at the same time
  - together
  lexicon: BDAG
  rationale: In context ἅμα links the oral proclamation with the written form. 'Also'
    communicates the additive force in idiomatic English; 'at the same time' is possible
    but unnecessarily clunky here.
- source_word: διὰ γραπτῶν
  chosen: in writing
  alternatives:
  - by written document
  - through letters
  lexicon: BDAG
  rationale: The phrase indicates written transmission. 'In writing' is concise and
    idiomatic, while preserving the contrast with the public proclamation. 'Through
    letters' would over-specify the medium.
- source_word: λέγων
  chosen: saying,
  alternatives:
  - 'as follows:'
  lexicon: BDAG
  rationale: The participle introduces the content of the decree. 'Saying' is the
    standard transparent rendering and keeps the syntax open into the next verse.
