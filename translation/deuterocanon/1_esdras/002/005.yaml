theological_decisions:
- issue: Rendering κύριος in a deuterocanonical/LXX context
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: Per doctrine, κύριος defaults to 'Lord.' 'LORD' is reserved for explicit
    representation of YHWH in Hebrew contexts; here the Greek source text is primary
    and uses κύριος. 'Master' is not suitable in this divine-reference context.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to harmonize the final clause to the MT/Ezra parallel ('the God who
    is in Jerusalem')
  chosen_reading: Retain the Greek wording 'he is the Lord who has dwelt in Jerusalem'
  alternative_readings:
  - he is the God who is in Jerusalem
  - he is God, who is in Jerusalem
  rationale: The task requires Greek primacy while using the Hebrew parallel as a
    translation input. The MT parallel for this verse differs substantially, but the
    Greek of 1 Esdras here contains an explicit clause about the Lord dwelling in
    Jerusalem. To preserve source transparency, the translation follows the Greek
    rather than harmonizing to Ezra 1:3/1:4 style wording.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
    over translation tradition/source harmonization
