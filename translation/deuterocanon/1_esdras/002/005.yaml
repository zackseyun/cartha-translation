translation:
  text: Therefore, if any of you is from his people, may his Lord be with him, and
    let them go up to Jerusalem in Judea and build the house of the Lord of Israel—he
    is the Lord who has dwelt in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek shifts from singular ('if any of you ... may his Lord be with
      him') to plural ('let them build'). The translation preserves this number shift
      rather than smoothing it out.
    reason: textual_variant
  - marker: b
    text: The Hebrew parallel in Ezra differs notably at this point, speaking instead
      of support with silver, gold, goods, and animals, along with a freewill offering
      for the house of God in Jerusalem. 1 Esdras here follows a different Greek form
      of the tradition.
    reason: alternative_reading
  - marker: c
    text: Or, 'who made his dwelling in Jerusalem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ τις ἐστὶν οὖν ὑμῶν
  chosen: Therefore, if any of you is
  alternatives:
  - Now if any of you is
  - If then any among you is
  lexicon: LSJ
  rationale: οὖν is carried with 'Therefore' to preserve the inferential transition,
    while εἴ τις ἐστὶν ὑμῶν is rendered idiomatically in natural English.
- source_word: ἐκ τοῦ ἔθνους αὐτοῦ
  chosen: from his people
  alternatives:
  - from his nation
  - of his people
  lexicon: LSJ
  rationale: ἔθνος can mean nation or people-group. In this return-from-exile context,
    'people' is more natural and aligns with the referent being the God of Israel's
    people rather than a modern political nation-state.
- source_word: ἔστω ὁ κύριος αὐτοῦ μετʼ αὐτοῦ
  chosen: may his Lord be with him
  alternatives:
  - let his Lord be with him
  - may the Lord his God be with him
  lexicon: LSJ
  rationale: κύριος is rendered 'Lord' per project default. The Greek reads αὐτοῦ,
    not 'his God'; adding 'God' would import wording from other forms of the tradition.
    'May ... be' captures the permissive/jussive force of ἔστω.
- source_word: ἀναβὰς εἰς τὴν Ἰερουσαλὴμ τὴν ἐν τῇ Ἰουδαίᾳ
  chosen: go up to Jerusalem in Judea
  alternatives:
  - having gone up to Jerusalem in Judea
  - go up to Jerusalem, which is in Judea
  lexicon: LSJ
  rationale: ἀναβαίνω is conventionally 'go up' for pilgrimage/ascent to Jerusalem.
    The participle is smoothed into an English coordinated jussive sense with the
    following imperative for readability while preserving the movement.
- source_word: οἰκοδομείτωσαν
  chosen: let them ... build
  alternatives:
  - let him ... build
  - let them build
  lexicon: LSJ
  rationale: The transmitted Greek has a plural imperative after singular forms, creating
    a number shift. The English preserves this by rendering the verb as plural ('let
    them build') rather than silently regularizing to singular.
- source_word: τὸν οἶκον τοῦ κυρίου τοῦ Ἰσραήλ
  chosen: the house of the Lord of Israel
  alternatives:
  - the house of the Lord, the God of Israel
  - the house of the Lord for Israel
  lexicon: LSJ
  rationale: The Greek as given lacks θεός ('God') and reads literally 'the house
    of the Lord of Israel.' This slightly unusual phrasing is retained rather than
    harmonized to the MT parallel or more familiar Ezra wording.
- source_word: οὗτος ὁ κύριος ὁ κατασκηνώσας ἐν Ἰερουσαλήμ
  chosen: he is the Lord who has dwelt in Jerusalem
  alternatives:
  - he is the Lord who made his dwelling in Jerusalem
  - this is the Lord, the one who dwelt in Jerusalem
  lexicon: LSJ
  rationale: κατασκηνόω conveys dwelling/tabernacling. 'Has dwelt' gives a natural
    English perfect sense for the articular participle while preserving the statement's
    identification of the Lord with Jerusalem.
