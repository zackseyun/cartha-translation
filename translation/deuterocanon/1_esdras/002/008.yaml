translation:
  text: And those around them helped in every way, with silver and gold, with horses,
    with livestock, and with very many freewill offerings, from all whose mind had
    been stirred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel (Ezra 1:6) reads more like 'goods/property' rather than
      'horses.' 1 Esdras here follows its Greek wording.
    reason: alternative_reading
  - marker: b
    text: Greek 'prayers' may reflect a textual or interpretive divergence from the
      Hebrew parallel, which has 'choice gifts' or 'precious things.'
    reason: textual_variant
  - marker: c
    text: Or 'whose spirit had been stirred,' reflecting the Hebrew parallel's idiom
      more closely; Greek literally says 'whose mind had been stirred.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ περικύκλῳ αὐτῶν
  chosen: those around them
  alternatives:
  - all those around them
  - their neighbors
  lexicon: LSJ
  rationale: The Greek phrase denotes the surrounding people. 'Those around them'
    is a natural rendering anchored in the Greek; 'their neighbors' would be smoother
    and aligns with the Hebrew parallel's sense, but is slightly more interpretive
    than the Greek wording itself.
- source_word: ἐβοήθησαν
  chosen: helped
  alternatives:
  - assisted
  - supported
  lexicon: BDAG
  rationale: '''Helped'' is the plain sense and fits the dative/instrumental phrases
    that follow. It also matches the Hebrew parallel idea of strengthening/supporting
    them without over-specifying the manner.'
- source_word: ἐν πᾶσιν
  chosen: in every way
  alternatives:
  - in all things
  - with everything
  lexicon: LSJ
  rationale: This idiomatically conveys comprehensive assistance. 'In all things'
    is more formal but less natural in English.
- source_word: ἐν ἀργυρίῳ καὶ χρυσίῳ
  chosen: with silver and gold
  alternatives:
  - in silver and gold
  lexicon: LSJ
  rationale: 'The instrumental sense is clear in context: they helped by means of
    silver and gold.'
- source_word: ἵπποις
  chosen: horses
  alternatives:
  - steeds
  lexicon: LSJ
  rationale: The Greek explicitly says 'horses.' The Hebrew parallel has a broader
    term for goods/property rather than horses, but the Greek is the primary witness
    and should be followed here.
- source_word: κτήνεσιν
  chosen: livestock
  alternatives:
  - cattle
  - beasts
  lexicon: LSJ
  rationale: A broad term for domesticated animals/property animals. 'Livestock' is
    modern and suitably broad; 'cattle' would be too narrow.
- source_word: εὐχαῖς
  chosen: prayers
  alternatives:
  - vows
  - blessings
  - good wishes
  lexicon: LSJ
  rationale: In this context the Greek likely reflects support offered not only materially
    but also verbally/devotionally. The Hebrew parallel has 'choice gifts/delicacies,'
    so this is a notable divergence. Because the Greek source text plainly reads εὐχαῖς,
    'prayers' is retained in the main text, with alternatives preserved in a footnote.
- source_word: ὡς πλείσταις
  chosen: very many
  alternatives:
  - as many as possible
  - most abundant
  lexicon: LSJ
  rationale: This intensifies the quantity of εὐχαῖς. 'Very many' is concise and natural.
- source_word: πολλῶν ὧν ὁ νοῦς ἠγέρθη
  chosen: from many whose mind had been stirred
  alternatives:
  - from many whose spirit had been stirred
  - from all who were so moved
  lexicon: LSJ
  rationale: The clause identifies the many contributors as those inwardly moved.
    'Mind' reflects νοῦς directly; 'spirit' would align more closely with the Hebrew
    parallel's idiom but would move away from the Greek wording. 'Had been stirred'
    captures the passive sense of ἠγέρθη.
