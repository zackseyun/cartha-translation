translation:
  text: Now therefore we make known to you, lord king, that if this city is built
    and its walls are raised up, there will no longer be for you passage into Coele-Syria
    and Phoenicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'access' or 'way through' into Coele-Syria and Phoenicia.' The Greek
      says literally 'there will no longer be for you an exodos into Coele-Syria and
      Phoenicia,' expressing loss of passage or imperial reach.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποδεικνύομέν
  chosen: we make known
  alternatives:
  - we point out
  - we inform
  lexicon: BDAG
  rationale: The verb here introduces a formal report to the king. 'We make known'
    fits the administrative tone and aligns well with the Aramaic parallel יְדִיעַ
    לֶהֱוֵא ('let it be known'), while avoiding the slightly more physical nuance
    of 'point out'.
- source_word: κύριε βασιλεῦ
  chosen: lord king
  alternatives:
  - my lord the king
  - sir king
  lexicon: LSJ
  rationale: The Greek vocative is literally 'lord king.' Retaining both elements
    preserves the courtly address. 'My lord the king' would be idiomatic English but
    adds 'my,' which is not explicit in the Greek.
- source_word: οἰκοδομηθῇ
  chosen: is built
  alternatives:
  - is rebuilt
  - is being built
  lexicon: BDAG
  rationale: The passive subjunctive simply states the condition of the city being
    built. 'Rebuilt' is contextually plausible from the broader narrative and MT parallel,
    but the Greek here does not explicitly mark repetition, so 'built' is preferred.
- source_word: τὰ ταύτης τείχη
  chosen: its walls
  alternatives:
  - the walls of it
  - her walls
  lexicon: BDAG
  rationale: A natural English rendering of the possessive phrase. 'Its walls' preserves
    the reference to the city's fortifications without archaic phrasing.
- source_word: ἀνασταθῇ
  chosen: are raised up
  alternatives:
  - are rebuilt
  - are set up
  lexicon: BDAG
  rationale: The verb literally means 'are raised up' or 'are set up.' Because it
    refers to walls, 'are raised up' preserves the construction imagery without overinterpreting.
    'Rebuilt' is possible but less directly tied to the Greek wording.
- source_word: ἔξοδός
  chosen: passage
  alternatives:
  - way out
  - access
  - exit
  lexicon: LSJ
  rationale: In context the warning concerns the king's ability to move into or control
    the western satrapies. 'Passage' best captures practical access or route, whereas
    'exit' sounds too literal and awkward in English. The MT parallel suggests loss
    of imperial reach rather than merely a physical doorway.
- source_word: κοίλην Συρίαν
  chosen: Coele-Syria
  alternatives:
  - Hollow Syria
  lexicon: LSJ
  rationale: This is a standard geographical name in Hellenistic usage. Transliteration
    is preferable to a literal rendering because it functions as a proper regional
    designation.
- source_word: Φοινίκην
  chosen: Phoenicia
  lexicon: LSJ
  rationale: Standard English form of the regional name.
