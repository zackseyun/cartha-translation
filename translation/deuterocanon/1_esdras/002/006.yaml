translation:
  text: Therefore, as many as live in the various places, let the men in his place
    help him with gold and silver, with gifts, with horses and livestock, along with
    the other things added as vowed offerings for the temple of the Lord in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''with horses and livestock.'' The Hebrew parallel in Ezra 1:4/1:6
      differs, reading terms for goods/property and cattle rather than ''horses.''
      The main text follows the Greek witness of 1 Esdras.'
    reason: alternative_reading
  - marker: b
    text: Or 'for the temple of the Lord.' Greek ἱερόν can mean 'temple' or 'sanctuary';
      'house of the Lord' reflects the Jerusalem-temple sense and aligns with the
      Hebrew parallel's wording.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι οὖν
  chosen: Therefore, as many as
  alternatives:
  - So whoever
  - Therefore all who
  lexicon: LSJ
  rationale: ὅσοι introduces an indefinite relative group ('as many as / whoever'),
    while οὖν gives inferential continuity ('therefore/so'). 'Therefore, as many as'
    preserves both elements without over-smoothing.
- source_word: κατὰ τοὺς τόπους οἰκοῦσιν
  chosen: live in the various places
  alternatives:
  - dwell in the places
  - reside wherever they live
  lexicon: LSJ
  rationale: The phrase is distributive, referring to people living throughout different
    localities. 'Various places' captures the plural distributive sense more naturally
    than a wooden 'the places'.
- source_word: βοηθείτωσαν αὐτῷ
  chosen: let ... help him
  alternatives:
  - let ... assist him
  - let ... support him
  lexicon: BDAG
  rationale: βοηθέω means to help or come to aid. 'Help' is the most direct and natural
    rendering. The singular αὐτῷ is retained as 'him,' referring back to the individual
    returning/upgoing from the prior context.
- source_word: οἱ ἐν τῷ τόπῳ αὐτοῦ
  chosen: the men in his place
  alternatives:
  - those in his place
  - the people in his locality
  lexicon: LSJ
  rationale: The Greek article with the prepositional phrase identifies the local
    residents of that person's place. Because the underlying parallel in Ezra 1:4
    has 'אַנְשֵׁי מְקֹמוֹ' ('the men of his place'), 'the men in his place' best reflects
    the Semitic background while remaining intelligible English.
- source_word: ἐν χρυσίῳ καὶ ἐν ἀργυρίῳ
  chosen: with gold and with silver
  alternatives:
  - in gold and silver
  - by means of gold and silver
  lexicon: LSJ
  rationale: The repeated ἐν marks means/instrument. 'With gold and with silver' is
    idiomatic and preserves the coordinate structure.
- source_word: ἐν δόσεσιν
  chosen: with gifts
  alternatives:
  - with donations
  - with offerings
  lexicon: LSJ
  rationale: δόσεις denotes things given, gifts or donations. 'Gifts' is broad enough
    to include material contributions without implying a specifically cultic offering
    distinct from the later vowed additions.
- source_word: μεθʼ ἵππων καὶ κτηνῶν
  chosen: with horses and livestock
  alternatives:
  - with horses and cattle
  - with beasts and animals
  lexicon: LSJ
  rationale: κτῆνος refers to domesticated animals/livestock. 'Livestock' is the clearest
    modern equivalent. 'Horses' is retained literally from the Greek, even though
    the Hebrew parallel in Ezra 1:6 has 'goods/cattle' rather than horses; the translation
    remains anchored in the Greek witness.
- source_word: σὺν τοῖς ἄλλοις
  chosen: along with the other things
  alternatives:
  - together with the rest
  - besides the other things
  lexicon: LSJ
  rationale: σύν here adds accompanying items beyond those already listed. 'Along
    with the other things' is natural and sufficiently explicit.
- source_word: τοῖς κατʼ εὐχὰς προστεθειμένοις
  chosen: added as vowed offerings
  alternatives:
  - freely added by vow
  - contributed in fulfillment of vows
  lexicon: LSJ
  rationale: κατʼ εὐχάς relates to vows/vowed gifts, and προστεθειμένοις indicates
    things additionally contributed. 'Added as vowed offerings' preserves both the
    supplementary and votive senses in concise English.
- source_word: εἰς τὸ ἱερὸν τοῦ κυρίου
  chosen: for the house of the Lord
  alternatives:
  - for the temple of the Lord
  - for the sanctuary of the Lord
  lexicon: LSJ
  rationale: Although ἱερόν often means 'temple/sanctuary,' the Hebrew parallel has
    'the house of the LORD,' and in this restoration context 'house of the Lord' is
    a familiar and accurate rendering for the Jerusalem temple. κύριος follows the
    project's default 'Lord'.
- source_word: τὸ ἐν Ἱερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - which is in Jerusalem
  lexicon: LSJ
  rationale: The attributive phrase identifies the location of the house/temple. In
    English, simple postpositive 'in Jerusalem' is sufficient and readable.
