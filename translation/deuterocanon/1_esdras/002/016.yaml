translation:
  text: 'To King Artaxerxes our lord: your servants, Rathymus the recorder, and Samellius
    the scribe, and the rest of their council, and those in Coele-Syria and Phoenicia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Rathymus and Samellius correspond approximately to the MT parallel's
      Rehum and Shimshai.
    reason: alternative_reading
  - marker: b
    text: The Greek title rendered 'the recorder' is idiomatic and somewhat uncertain;
      more literally, it is 'the one over the matters brought forward.'
    reason: lexical_alternative
  - marker: c
    text: Coele-Syria is the historical regional name in the Greek text.
    reason: cultural_note
lexical_decisions:
- source_word: Βασιλεῖ Ἀρταξέρξῃ
  chosen: To King Artaxerxes
  alternatives:
  - To Artaxerxes the king
  lexicon: LSJ
  rationale: The dative opening functions as epistolary address. English idiom prefers
    'To King Artaxerxes' at the head of a letter, though 'To Artaxerxes the king'
    is also possible.
- source_word: κυρίῳ
  chosen: our lord
  alternatives:
  - the lord
  - my lord
  lexicon: LSJ
  rationale: With the royal addressee, κύριος is a court title meaning 'lord.' The
    possessive is not explicit here, but the following 'your servants' and the Semitic
    epistolary background support the deferential address 'our lord' as the natural
    sense in context.
- source_word: οἱ παῖδές σου
  chosen: your servants
  alternatives:
  - your slaves
  - your boys/children
  lexicon: BDAG
  rationale: Although παῖς can mean child or servant, in royal correspondence it denotes
    subordinates in service. 'Servants' fits the courtly register better than 'slaves'
    here, since bonded status is not the point but official subordination.
- source_word: Ῥάθυμος
  chosen: Rathymus
  alternatives:
  - Rehum
  rationale: The Greek witness is primary for 1 Esdras, so the name is transliterated
    from the Greek form. The MT parallel has Rehum, which is worth preserving as an
    alternative in a footnote rather than replacing the Greek form in the main text.
- source_word: ὁ τὰ προσπίπτοντα
  chosen: the recorder
  alternatives:
  - the one over petitions
  - the chancellor
  - the one in charge of affairs
  lexicon: LSJ
  rationale: The phrase is idiomatic and difficult literally ('the one over the things
    that fall before [someone]'). In administrative context it likely refers to an
    official handling matters brought before the king. 'Recorder' is concise and plausible,
    while more literal renderings are awkward in English.
- source_word: Σαμέλλιος
  chosen: Samellius
  alternatives:
  - Shimshai
  rationale: As with Rathymus, the Greek form is retained in the main text because
    the Greek is the translation base. The MT parallel's Shimshai is preserved as
    an alternative.
- source_word: ὁ γραμματεὺς
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: BDAG
  rationale: γραμματεύς in administrative setting can mean secretary, but 'scribe'
    preserves the lexical link and remains clear in English.
- source_word: οἱ ἐπίλοιποι τῆς βουλῆς αὐτῶν
  chosen: the rest of their council
  alternatives:
  - the remaining members of their council
  - the rest of their advisers
  lexicon: LSJ
  rationale: βουλή here denotes a deliberative body or council. 'The rest of their
    council' is natural English and preserves the collective sense.
- source_word: οἱ ἐν κοίλῃ Συρίᾳ καὶ Φοινίκῃ
  chosen: those in Coele-Syria and Phoenicia
  alternatives:
  - those in Hollow Syria and Phoenicia
  - those in Syria and Phoenicia
  lexicon: LSJ
  rationale: κοίλη Συρία is a recognized geographical name conventionally rendered
    'Coele-Syria.' Retaining the historical place-name is more accurate than flattening
    it to 'Syria.'
