translation:
  text: 'Now in the time of Artaxerxes king of the Persians, Belemus and Mithradates
    and Tabelius and Rathymus and Beeltethmus and Samellius the scribe, and the rest
    who were associated with them, living in Samaria and the other places, wrote the
    following letter against the inhabitants of Judea and Jerusalem:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the letter written below' or 'the subjoined letter.'
    reason: lexical_alternative
  - marker: b
    text: The Greek wording around 'wrote ... against the inhabitants of Judea and
      Jerusalem' is somewhat compressed; the translation brings out the apparent sense
      of a written accusation or complaint.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐν δὲ τοῖς ἐπʼ Ἀρταξέρξου ... χρόνοις
  chosen: Now in the time of Artaxerxes ...
  alternatives:
  - And in the days of Artaxerxes ...
  - In the reign of Artaxerxes ...
  lexicon: LSJ
  rationale: χρόνοις is literally 'times'; 'in the time of' is natural English and
    preserves the temporal setting without over-specifying 'reign,' though that is
    implied by 'king of the Persians.' δέ is lightly represented by 'Now' to mark
    narrative transition.
- source_word: τοῦ Περσῶν βασιλέως
  chosen: king of the Persians
  alternatives:
  - the Persian king
  lexicon: LSJ
  rationale: The genitive plural Περσῶν is best kept explicitly as 'of the Persians,'
    matching the Greek construction and preserving the ethnic-political designation.
- source_word: κατέγραψεν
  chosen: wrote
  alternatives:
  - filed a written accusation
  - recorded in writing
  - submitted a written complaint
  lexicon: LSJ
  rationale: The verb can mean to write down or register in writing. Because the object
    later is 'the following letter,' 'wrote' is the clearest idiomatic rendering.
    The adversarial force is already conveyed by 'against.'
- source_word: αὐτῶν κατὰ τῶν κατοικούντων ἐν τῇ Ἰουδαίᾳ καὶ Ἱερουσαλήμ
  chosen: against the inhabitants of Judea and Jerusalem
  alternatives:
  - an accusation against those dwelling in Judea and Jerusalem
  - concerning them, against the residents of Judea and Jerusalem
  lexicon: LSJ
  rationale: κατά with genitive here signals hostility/accusation. The pronoun αὐτῶν
    is textually and syntactically awkward in English if rendered woodenly; the sense
    is that the letter was directed against the Judean/Jerusalem inhabitants. This
    is clarified idiomatically without adding content beyond the Greek context.
- source_word: Βήλεμος καὶ Μιθραδάτης καὶ Ταβέλλιος καὶ Ῥάθυμος καὶ Βεέλτεθμος καὶ
    Σαμέλλιος
  chosen: Belemus and Mithradates and Tabelius and Rathymus and Beeltethmus and Samellius
  lexicon: LSJ
  rationale: Personal names are transliterated rather than translated, per project
    philosophy. Spellings follow straightforward Anglicized transliteration from the
    Greek forms in Swete.
- source_word: ὁ γραμματεύς
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: LSJ
  rationale: γραμματεύς commonly denotes a scribe or official secretary. 'The scribe'
    is more literal and sufficiently clear in context.
- source_word: οἱ λοιποὶ οἱ τούτοις συντασσόμενοι
  chosen: the rest who were associated with them
  alternatives:
  - the others aligned with them
  - the rest joined with them
  lexicon: LSJ
  rationale: συντασσόμενοι suggests being arranged with, allied with, or associated
    with. 'Associated with them' is natural English that preserves the collective
    alignment without implying military organization.
- source_word: οἰκοῦντες δὲ ἐν Σαμαρείᾳ καὶ τοῖς ἄλλοις τόποις
  chosen: living in Samaria and the other places
  alternatives:
  - dwelling in Samaria and the other regions
  - residing in Samaria and elsewhere
  lexicon: LSJ
  rationale: οἰκοῦντες is straightforwardly 'living/dwelling.' τοῖς ἄλλοις τόποις
    is literally 'the other places'; this is retained rather than generalized too
    far.
- source_word: τὴν ὑπογεγραμμένην ἐπιστολήν
  chosen: the following letter
  alternatives:
  - the letter written below
  - the subjoined letter
  lexicon: LSJ
  rationale: ὑπογεγραμμένην literally means 'written below' or 'subjoined.' In running
    English, 'the following letter' communicates the discourse function clearly.
