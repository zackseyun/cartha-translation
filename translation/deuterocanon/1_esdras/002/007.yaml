translation:
  text: Then the heads of the ancestral houses of the tribes of Judah and Benjamin,
    and the priests and the Levites, and everyone whose spirit the Lord had stirred
    up, arose to go up to build the house of the Lord that is in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Ezra 1:5 reads 'everyone whose spirit God had stirred
      up.' 1 Esdras here reads 'the Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: καταστήσαντες / ויקומו
  chosen: arose
  alternatives:
  - stood up
  - set themselves
  - were appointed
  lexicon: LSJ / HALOT
  rationale: The Greek form as transmitted is awkward in context, while the MT parallel
    clearly has 'arose/stood up.' Given the parallel and the following infinitives
    of motion and purpose, 'arose' best captures the sense without overtranslating.
    'Were appointed' would fit a different sense of καθίστημι and is not supported
    by the Hebrew parallel.
- source_word: οἱ ἀρχίφυλοι τῶν πατριῶν / ראשי האבות
  chosen: the heads of the ancestral houses
  alternatives:
  - the chiefs of the fathers' houses
  - the family heads
  - the heads of the clans
  lexicon: LSJ / HALOT
  rationale: This phrase denotes leading men of extended family units. 'Ancestral
    houses' preserves the kinship structure better than the more opaque 'fathers'
    houses,' while remaining fairly formal.
- source_word: τῆς Ἰούδα καὶ Βενιαμεὶν φυλῆς
  chosen: of Judah and Benjamin
  alternatives:
  - of the tribe of Judah and Benjamin
  - of the tribes of Judah and Benjamin
  lexicon: LSJ
  rationale: The Greek wording is somewhat compressed, but the sense matches the MT
    parallel referring to Judah and Benjamin. English can omit repeating 'tribe(s)'
    without loss.
- source_word: ἤγειρεν ... τὸ πνεῦμα / העיר ... את־רוחו
  chosen: had stirred up ... spirit
  alternatives:
  - had awakened ... spirit
  - had roused ... spirit
  lexicon: LSJ / HALOT
  rationale: This is a standard biblical idiom for divine prompting. 'Stirred up'
    is natural English and preserves the metaphor of inward activation.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Follows the project's default rendering for κύριος. Here the Greek source
    has Κύριος, and the parallel Hebrew has 'God' in this clause, but because the
    primary witness is Greek, 'the Lord' is retained.
- source_word: ἀναβῆναι
  chosen: to go up
  alternatives:
  - to ascend
  - to come up
  lexicon: LSJ
  rationale: '''Go up'' preserves the conventional biblical idiom for travel to Jerusalem
    while remaining idiomatic in modern English.'
- source_word: οἰκοδομῆσαι οἶκον
  chosen: to build the house
  alternatives:
  - to rebuild the house
  - to build a house
  lexicon: LSJ
  rationale: The Greek lacks an explicit 're-' prefix, so 'build' is preferred. 'The
    house' reflects the definite sacred referent, i.e., the temple.
- source_word: τῷ κυρίῳ τὸν ἐν Ἱερουσαλήμ
  chosen: of the Lord that is in Jerusalem
  alternatives:
  - for the Lord in Jerusalem
  - for the Lord, the one in Jerusalem
  lexicon: LSJ
  rationale: This construes the phrase as identifying the temple as belonging to the
    Lord and located in Jerusalem. It is the most straightforward rendering of the
    Greek sequence in context.
