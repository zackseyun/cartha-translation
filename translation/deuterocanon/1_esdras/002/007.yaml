theological_decisions:
- issue: Divine designation in this clause differs between Greek primary witness and
    MT parallel
  chosen_reading: the Lord had stirred up
  alternative_readings:
  - God had stirred up
  rationale: The primary source for 1 Esdras is the Greek, which reads Κύριος. The
    MT parallel in Ezra 1:5 has 'God.' Because the project prioritizes the Greek for
    deuterocanonical books while using the Hebrew parallel as a control, the main
    text follows 'the Lord,' and the Hebrew-based alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    contested term κύριος → Lord'
