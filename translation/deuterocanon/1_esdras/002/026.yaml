translation:
  text: They began to hinder those who were building, and the building of the temple
    in Jerusalem was stopped until the second year of the reign of Darius, king of
    the Persians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ceased' or 'lay idle'; the Greek verb indicates that the temple-building
      work came to a halt.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο
  chosen: They began
  alternatives:
  - They started
  - They proceeded
  lexicon: BDAG
  rationale: Aorist middle of ἄρχω with infinitive κωλύειν marks the inception of
    an action. 'They began' is the most natural and sufficiently formal English rendering.
- source_word: κωλύειν
  chosen: to hinder
  alternatives:
  - to prevent
  - to obstruct
  - to stop
  lexicon: BDAG
  rationale: The infinitive denotes active interference with the builders. 'Hinder'
    preserves the sense of opposition without overstating it as total prevention at
    this point; the next clause states the resulting stoppage explicitly.
- source_word: τοὺς οἰκοδομοῦντας
  chosen: those who were building
  alternatives:
  - the builders
  - those building
  lexicon: BDAG
  rationale: The present participle highlights the people engaged in the work. 'Those
    who were building' keeps the verbal force better than the more nominal 'the builders,'
    though either is possible.
- source_word: ἤργει
  chosen: was stopped
  alternatives:
  - ceased
  - was delayed
  - was hindered
  lexicon: BDAG
  rationale: From ἀργέω/ἄργω in context, the sense is that the work came to a halt
    or remained inactive. 'Was stopped' communicates the practical result clearly
    in modern English. 'Ceased' is possible but slightly less idiomatic here.
- source_word: ἡ οἰκοδομὴ
  chosen: the building
  alternatives:
  - the construction
  - the work of building
  lexicon: BDAG
  rationale: The noun refers to the building activity/project rather than merely the
    finished structure. 'The building' is concise and natural, and the following genitive
    clarifies that it is the temple project.
- source_word: τοῦ ἱεροῦ
  chosen: of the temple
  alternatives:
  - of the sanctuary
  - of the holy place
  lexicon: BDAG
  rationale: ἱερόν ordinarily denotes the temple precinct/temple complex. In this
    restoration context, 'temple' is the clearest English equivalent.
- source_word: τοῦ ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - that was in Jerusalem
  lexicon: BDAG
  rationale: The article-participle-like construction simply locates the temple. English
    naturally renders this as 'in Jerusalem' without loss of meaning.
- source_word: μέχρι τοῦ δευτέρου ἔτους
  chosen: until the second year
  alternatives:
  - up to the second year
  lexicon: BDAG
  rationale: μέχρι with the genitive marks the terminus of the stoppage. 'Until the
    second year' is the standard and clear rendering.
- source_word: τῆς βασιλείας Δαρείου
  chosen: of the reign of Darius
  alternatives:
  - of Darius's reign
  - of the kingdom of Darius
  lexicon: BDAG
  rationale: βασιλεία here refers to royal rule/reign, not the geographic kingdom.
    'Of the reign of Darius' is precise.
- source_word: τοῦ Περσῶν βασιλέως
  chosen: king of the Persians
  alternatives:
  - the Persian king
  lexicon: BDAG
  rationale: The genitive Περσῶν with βασιλέως is most directly 'king of the Persians.'
    This preserves the Greek phrasing while remaining idiomatic English.
