translation:
  text: and its people were carrying out rebellions and wars within it, and strong
    and harsh kings were in Jerusalem, ruling and exacting tribute from Coele-Syria
    and Phoenicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Ezra 4:20 describes Jerusalem as a rebellious city
      that harmed kings and provinces, with revolt occurring in it from ancient days.
      1 Esdras here expands the description with 'rebellions and wars' and with tribute
      from Coele-Syria and Phoenicia.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποστάσεις
  chosen: rebellions
  alternatives:
  - revolts
  - seditions
  lexicon: LSJ
  rationale: The noun denotes acts of revolt or insurrection. 'Rebellions' fits the
    political context and aligns with the MT parallel's description of the city as
    rebellious, while preserving the plural in Greek.
- source_word: πολέμους
  chosen: wars
  alternatives:
  - warfare
  - battles
  lexicon: LSJ
  rationale: A straightforward rendering of the plural accusative. 'Wars' best preserves
    the Greek wording without narrowing to individual battles.
- source_word: συντελοῦντες
  chosen: carrying out
  alternatives:
  - bringing about
  - committing
  - accomplishing
  lexicon: LSJ
  rationale: The participle here describes active involvement in producing or perpetrating
    the rebellions and wars. 'Carrying out' is natural English and keeps the sense
    of deliberate action.
- source_word: ἰσχυροὶ καὶ σκληροὶ
  chosen: strong and harsh
  alternatives:
  - mighty and severe
  - powerful and hard
  lexicon: LSJ
  rationale: The paired adjectives characterize the kings as both powerful and severe.
    'Strong and harsh' is readable modern English and preserves both elements distinctly.
- source_word: κυριεύοντες
  chosen: ruling
  alternatives:
  - dominating
  - exercising lordship
  lexicon: LSJ
  rationale: The participle indicates exercising dominion. 'Ruling' is idiomatic and
    sufficient in this political context.
- source_word: φορολογοῦντες
  chosen: exacting tribute from
  alternatives:
  - taxing
  - levying tribute on
  lexicon: LSJ
  rationale: The verb refers to imposing tribute or taxation. 'Exacting tribute from'
    better reflects imperial exaction than the more neutral 'taxing.'
- source_word: κοίλην Συρίαν
  chosen: Coele-Syria
  alternatives:
  - Hollow Syria
  lexicon: LSJ
  rationale: This is a standard geographical proper name in Hellenistic usage; transliteration
    is preferable to a literal rendering.
- source_word: Φοινίκην
  chosen: Phoenicia
  lexicon: LSJ
  rationale: Standard English transliteration of the region name.
- source_word: ἐν αὐτῇ
  chosen: within it
  alternatives:
  - in it
  - there
  lexicon: LSJ
  rationale: Refers back to Jerusalem/city. 'Within it' makes the internal setting
    of the disturbances explicit and reads naturally.
