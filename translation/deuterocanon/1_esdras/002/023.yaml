theological_decisions:
- issue: Relation of the Greek expansion to the MT parallel in Ezra 4:20
  chosen_reading: Retain the fuller Greek wording about rebellions, wars, and tribute
    from Coele-Syria and Phoenicia in the main text.
  alternative_readings:
  - 'A tighter rendering aligned more closely to the MT parallel: the city was rebellious
    and harmful to kings and provinces, and revolt was made within it from ancient
    days.'
  rationale: For 1 Esdras, the Greek is the primary source text, while the MT parallel
    serves as a control. The Greek here expands and reshapes the parallel, so the
    translation follows the Greek directly while recognizing the MT background in
    the rationale.
