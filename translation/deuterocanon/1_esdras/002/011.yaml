translation:
  text: And through him they were handed over to Sanamassar, governor of Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sanamassar is the Greek form of the official named Sheshbazzar in the Hebrew
      parallel (Ezra 1:8).
    reason: alternative_reading
  - marker: b
    text: Or 'by his hand,' emphasizing agency in the transfer.
    reason: lexical_alternative
  - marker: c
    text: Greek 'Judea'; the Hebrew parallel has 'Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ δὲ τούτου
  chosen: through him
  alternatives:
  - by his hand
  - through this one
  lexicon: LSJ
  rationale: The Greek phrase literally means 'through this one/him.' In context,
    with the MT parallel עַל־יַד ('by the hand of'), it indicates agency or instrumentality.
    'Through him' is natural English and preserves the mediating sense without over-specifying.
- source_word: παρεδόθησαν
  chosen: were handed over
  alternatives:
  - were delivered
  - were given over
  lexicon: BDAG
  rationale: The passive of παραδίδωμι commonly means 'hand over, deliver.' Here it
    refers to the transfer of temple vessels/custody from the previous verse context.
    'Were handed over' is idiomatic and preserves the passive transfer sense.
- source_word: Σαναμασσάρῳ
  chosen: Sanamassar
  alternatives:
  - Sheshbazzar
  rationale: The Greek source text reads the name Σαναμασσάρῳ, which is best represented
    by transliteration from the Greek in the main text. Because the MT parallel has
    שֵׁשְׁבַּצַּר (Sheshbazzar), that Hebrew-form equivalent is worth preserving in
    a footnote rather than replacing the Greek witness.
- source_word: προστάτῃ
  chosen: governor
  alternatives:
  - leader
  - protector
  - chief
  lexicon: LSJ
  rationale: προστάτης can denote one who stands before, a leader or official patron/protector.
    In this administrative context, and supported by the MT parallel הַנָּשִׂיא ('the
    prince/leader'), 'governor' best communicates an official provincial role in clear
    modern English.
- source_word: τῆς Ἰουδαίας
  chosen: of Judea
  alternatives:
  - of Judah
  lexicon: LSJ
  rationale: Ἰουδαία in Greek commonly denotes the region 'Judea,' while the Hebrew
    parallel לִיהוּדָה reflects 'Judah.' Since the primary source is Greek, 'Judea'
    is preferred, with 'Judah' as a plausible alternative nuance.
