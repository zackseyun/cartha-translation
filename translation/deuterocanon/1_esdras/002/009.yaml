translation:
  text: And King Cyrus brought out the holy vessels of the Lord, which Nebuchadnezzar
    had carried away from Jerusalem and deposited in the house of his god.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''in his idol shrine'' or ''in his idol-house''; the Hebrew parallel
      reads ''in the house of his god.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξήνεγκεν
  chosen: brought out
  alternatives:
  - brought forth
  - took out
  lexicon: BDAG
  rationale: The verb denotes causing something to be brought out from storage or
    custody. 'Brought out' is natural modern English and fits the narrative context
    of Cyrus producing the temple items.
- source_word: τὰ ἅγια σκεύη
  chosen: the holy vessels
  alternatives:
  - the sacred vessels
  - the holy articles
  lexicon: BDAG
  rationale: σκεύη commonly refers to vessels or implements; with ἅγια it marks cultic
    sanctity. 'Holy vessels' preserves the sacred status and matches temple context
    without over-specifying their exact form.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - belonging to the Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this temple
    context the genitive indicates these vessels belong to Israel's God.
- source_word: μετήγαγεν
  chosen: had carried away
  alternatives:
  - had removed
  - had taken away
  - had transported
  lexicon: BDAG
  rationale: The compound verb conveys transfer from one place to another, here in
    the context of conquest. 'Had carried away' captures the forced relocation from
    Jerusalem and aligns with the parallel Hebrew הוציא in context.
- source_word: ἀπηρείσατο
  chosen: deposited
  alternatives:
  - placed
  - set
  - stored
  lexicon: LSJ
  rationale: The verb here describes putting the vessels into a cultic location. 'Deposited'
    conveys formal placement of captured sacred objects in another sanctuary, fitting
    both the Greek and the MT parallel's 'put them'.
- source_word: ἐν τῷ εἰδώλιῳ αὐτοῦ
  chosen: in the house of his god
  alternatives:
  - in his idol temple
  - in his shrine
  - in his idol-house
  lexicon: LSJ
  rationale: 'Although εἰδώλιον can denote an idol or idol-shrine, the Hebrew parallel
    has ''in the house of his god.'' Rendering the phrase as ''in the house of his
    god'' best reflects the likely sense in context: the vessels were placed in the
    sanctuary of Nebuchadnezzar''s deity. The more literal ''idol'' nuance is preserved
    in a footnote because the Greek wording is sharper than the Hebrew.'
