theological_decisions:
- issue: Rendering of κύριος in a deuterocanonical temple-context verse
  chosen_reading: Lord
  alternative_readings:
  - LORD
  rationale: The project's default for κύριος is 'Lord.' Although the Hebrew parallel
    refers to the house of YHWH, the Greek text before us reads κυρίου, and 'Lord'
    preserves the standard covenantal title without importing small-caps convention
    into a Greek-source translation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: How to render εἰδώλιον/its dative phrase in relation to the MT parallel
  chosen_reading: the house of his god
  alternative_readings:
  - his idol shrine
  - his idol-house
  rationale: The Greek term can carry an 'idol' nuance, but the immediate narrative
    function matches the Hebrew parallel's statement that Nebuchadnezzar put the vessels
    in the house of his god. To maintain readability and align with the parallel source
    while staying anchored in the Greek, the main text uses 'house of his god' and
    preserves the sharper Greek nuance in a footnote.
