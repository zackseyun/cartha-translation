translation:
  text: and it was brought up by Sheshbazzar together with those from the captivity,
    from Babylon to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''by Samanassar.'' The name is rendered ''Sheshbazzar'' here in
      light of the Hebrew parallel and the corresponding Ezra context identifying
      the same official.'
    reason: alternative_reading
  - marker: b
    text: The implied subject is singular ('it was brought up'), likely referring
      to a temple vessel or item from the preceding context; the Greek does not repeat
      the noun here.
    reason: cross_reference
lexical_decisions:
- source_word: ἀνηνέχθη
  chosen: was brought up
  alternatives:
  - was carried up
  - was taken up
  - was brought
  lexicon: BDAG
  rationale: Aorist passive of ἀναφέρω. In this return-from-exile context, 'brought
    up' preserves both the passive sense and the conventional biblical idiom of going
    'up' to Jerusalem. The MT parallel concerns temple vessels, which supports an
    impersonal singular subject ('it') rather than a person.
- source_word: ὑπὸ Σαμανασσάρου
  chosen: by Sheshbazzar
  alternatives:
  - by Samanassar
  lexicon: Lexham Analytical Lexicon of the Septuagint
  rationale: The Greek form Σαμανασσάρος reflects the figure known from the Ezra parallel
    as Sheshbazzar. Since the Hebrew parallel is supplied as an actual input and helps
    identify proper names, the standard English biblical transliteration 'Sheshbazzar'
    best serves readers while remaining anchored to the same referent.
- source_word: ἅμα τοῖς ἐκ τῆς αἰχμαλωσίας
  chosen: together with those from the captivity
  alternatives:
  - along with the exiles
  - with those of the captivity
  lexicon: BDAG
  rationale: ἅμα with the dative means 'together with.' αἰχμαλωσία denotes captivity/exile.
    'Those from the captivity' is slightly more formal and stays close to the Greek,
    while still readable.
- source_word: ἐκ Βαβυλῶνος
  chosen: from Babylon
  lexicon: BDAG
  rationale: Straightforward source location; matches both Greek and the MT parallel's
    setting.
- source_word: εἰς Ἱερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: Standard directional rendering. Combined with ἀνηνέχθη, the English naturally
    reads 'brought up ... to Jerusalem.'
