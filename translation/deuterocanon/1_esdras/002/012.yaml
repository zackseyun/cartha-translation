translation:
  text: 'And this was their number: a thousand gold libation bowls, a thousand silver
    libation bowls, twenty-nine silver censers, thirty gold bowls, two hundred and
    ten silver bowls, and a thousand other vessels.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text's numeral notation for the silver bowls is difficult in Swete's
      diplomatic presentation; the translation follows it as two hundred and ten,
      though the transmitted form is not perfectly clear.
    reason: textual_variant
  - marker: b
    text: The Hebrew parallel in Ezra 1:9 lists different items and numbers at this
      point; 1 Esdras appears to preserve a reordered or expanded Greek inventory
      rather than a word-for-word equivalent of the Hebrew.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ τούτων ἀριθμὸς ἦν
  chosen: And this was their number
  alternatives:
  - And the number of these was
  - Now their number was
  lexicon: LSJ
  rationale: A natural English rendering of the introductory counting formula. 'This
    was their number' preserves the sense without awkwardness.
- source_word: σπονδεῖα
  chosen: libation bowls
  alternatives:
  - bowls for drink offerings
  - vessels for libations
  lexicon: LSJ
  rationale: The noun is connected with σπονδή, a libation/drink offering. 'Libation
    bowls' keeps the cultic function visible and is more specific than simply 'bowls'.
- source_word: χρυσᾶ
  chosen: gold
  alternatives:
  - golden
  lexicon: LSJ
  rationale: Predicate/adjectival material term is rendered idiomatically in English
    as 'gold' before the noun.
- source_word: ἀργυρᾶ
  chosen: silver
  alternatives:
  - silvered
  - of silver
  lexicon: LSJ
  rationale: Standard material adjective; 'silver' is the clearest idiomatic rendering.
- source_word: θυίσκαι ἀργυραῖ
  chosen: silver censers
  alternatives:
  - silver incense pans
  - silver firepans
  lexicon: LSJ
  rationale: θυίσκη denotes an implement associated with burning incense or sacrificial
    use. 'Censers' best captures the likely temple vessel in readable English.
- source_word: φιάλαι
  chosen: bowls
  alternatives:
  - basins
  - phials
  lexicon: LSJ
  rationale: φιάλη is a broad shallow bowl used in ritual contexts. 'Bowls' is accessible
    modern English; 'phials' is archaic and overly tradition-bound here.
- source_word: τριάκοντα
  chosen: thirty
  lexicon: LSJ
  rationale: Straightforward numeral.
- source_word: ἀργυραῖ ,βυʹ δέκα
  chosen: two hundred and ten silver bowls
  alternatives:
  - silver bowls, two hundred and twelve
  - silver bowls, two hundred and ten
  lexicon: LSJ
  rationale: The Greek numeral notation in Swete is awkwardly transmitted here. The
    reading is best taken as 210, with δέκα appositional to the numeral notation as
    represented in the diplomatic text. Because the source presentation is not perfectly
    transparent, the numerical uncertainty is preserved in a footnote.
- source_word: ἄλλα σκεύη
  chosen: other vessels
  alternatives:
  - other utensils
  - other articles
  lexicon: LSJ
  rationale: σκεύη in a temple-inventory context refers broadly to vessels/implements.
    'Vessels' fits the cultic inventory register.
