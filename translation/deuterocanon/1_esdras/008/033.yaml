translation:
  text: 'From the sons of Lam: Esias son of Gotholias, and with him seventy men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The approximate MT parallel at Ezra 8:3 reads differently in names and number,
      with 'from the sons of Shecaniah, son of Jahaziel ... three hundred males.'
      Because 1 Esdras is translated here from the Greek witness, the main text follows
      the Greek names and the number seventy.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  chosen: From the sons of
  alternatives:
  - Of the sons of
  - From among the sons of
  lexicon: LSJ
  rationale: The phrase introduces a clan/family grouping in a list. 'From the sons
    of' is a natural English rendering that preserves the source structure without
    over-paraphrasing.
- source_word: Λάμ
  chosen: Lam
  alternatives:
  - Lām
  lexicon: LSJ
  rationale: This is a proper name and is therefore transliterated rather than translated,
    following project policy. The Greek form differs from the approximate MT parallel,
    so the translation stays anchored to the Greek witness.
- source_word: Ἐσίας
  chosen: Esias
  alternatives:
  - Esias
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek. No attempt is made
    to harmonize to the MT parallel's different name sequence, since the Greek is
    the primary source for 1 Esdras.
- source_word: Γοθολίου
  chosen: Gotholias
  alternatives:
  - Gotholiu
  - Gedolias
  lexicon: LSJ
  rationale: Rendered as the personal name 'Gotholias' in a genitive relationship,
    understood in English as filiation ('son of Gotholias'). This makes explicit the
    relationship commonly implied in such list formulas and yields readable English.
    A more literal retention of the bare genitive would be awkward.
- source_word: καὶ μετʼ αὐτοῦ
  chosen: and with him
  alternatives:
  - and accompanying him
  - and with him there were
  lexicon: LSJ
  rationale: A straightforward rendering of accompaniment in a census/list context.
- source_word: ἄνδρες ἑβδομήκοντα
  chosen: seventy men
  alternatives:
  - seventy males
  - seventy persons
  lexicon: LSJ
  rationale: ἄνδρες normally means 'men' here, not a gender-neutral 'persons.' This
    also contrasts with the MT parallel's explicit 'males'; the Greek itself supports
    'men' as the natural rendering.
