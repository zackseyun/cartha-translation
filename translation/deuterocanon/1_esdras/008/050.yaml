theological_decisions:
- issue: Greek-Hebrew divergence in the main verb
  chosen_reading: Render εὐξάμην contextually as 'I proclaimed' rather than 'I prayed'
  alternative_readings:
  - I prayed there with fasting
  - I vowed there a fast
  rationale: The Greek primary witness appears semantically awkward if rendered literally,
    while the MT parallel supplies a coherent fasting formula ('I proclaimed a fast').
    Because the project requires the parallel source to be used as actual translation
    input and the verse is flagged 'major_mismatch,' the main text adopts the contextual
    sense that best explains the scene, while preserving the more literal Greek alternative
    in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Divine title
  chosen_reading: our Lord
  alternative_readings:
  - our God
  rationale: The Greek source reads κυρίου ἡμῶν, while the MT parallel has אֱלֹהֵינוּ
    ('our God'). Since the Greek is the primary source for 1 Esdras, 'our Lord' remains
    in the text, with the Hebrew-parallel difference noted.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord'
