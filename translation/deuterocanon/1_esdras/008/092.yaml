translation:
  text: Rise up and carry it through, for the matter is yours, and we are with you;
    be strong and act.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek phrase 'to act strongly' is terse and may also be understood as
      'be strong' or, in light of the Hebrew parallel (Ezra 10:4), 'be strong and
      do it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  chosen: Rise up
  alternatives:
  - Stand up
  - Get up
  lexicon: LSJ
  rationale: Aorist participle of ἀνίστημι used imperativally in exhortation. 'Rise
    up' preserves the vivid call to action better than the flatter 'get up.'
- source_word: ἐπίτελει
  chosen: carry it through
  alternatives:
  - complete it
  - bring it to completion
  lexicon: LSJ
  rationale: Imperative of ἐπιτελέω, meaning to complete or bring to fulfillment.
    'Carry it through' gives natural modern English while retaining the sense of decisive
    completion.
- source_word: πρὸς σὲ γὰρ τὸ πρᾶγμα
  chosen: for the matter is yours
  alternatives:
  - for the matter concerns you
  - for the business belongs to you
  lexicon: LSJ
  rationale: Literally 'for the matter is toward you,' an idiom indicating responsibility
    or concern. 'The matter is yours' best captures assigned responsibility in concise
    English.
- source_word: ἡμεῖς μετὰ σοῦ
  chosen: we are with you
  alternatives:
  - we are alongside you
  lexicon: LSJ
  rationale: Straightforward expression of solidarity; no need to over-interpret.
- source_word: ἰσχὺν ποιεῖν
  chosen: to act strongly
  alternatives:
  - to be strong
  - to act with strength
  - to strengthen you
  lexicon: LSJ
  rationale: The phrase is somewhat compressed and awkward in Greek. It most naturally
    conveys acting with strength/supporting vigorous action. 'To act strongly' preserves
    the verbal force without importing an explicit object not present in the Greek.
    The Hebrew parallel in Ezra 10:4 supports an exhortation to strength ('be strong
    and do it'), which informs but does not override the Greek wording.
