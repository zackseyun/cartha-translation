translation:
  text: And when these things had been completed, the leaders came to me, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τούτων τελεσθέντων
  chosen: when these things had been completed
  alternatives:
  - after these things were finished
  - when these things were accomplished
  lexicon: BDAG
  rationale: Genitive absolute marking prior completed action. 'Completed' gives clear
    modern English while preserving the sense of τελέω as bringing something to completion.
- source_word: προσηλθόσαν μοι
  chosen: came to me
  alternatives:
  - approached me
  - drew near to me
  lexicon: BDAG
  rationale: The verb προσέρχομαι commonly means to come or approach. 'Came to me'
    is natural English and adequately reflects the dative μοι.
- source_word: οἱ ἡγούμενοι
  chosen: the leaders
  alternatives:
  - the rulers
  - the chief men
  - those in authority
  lexicon: BDAG
  rationale: ἡγούμενοι here denotes persons in leading authority. 'Leaders' is the
    clearest modern rendering without overstating a formal office. The MT parallel
    for this verse is only approximate and does not supply this phrase, so the Greek
    governs.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  - speaking
  lexicon: BDAG
  rationale: Present participle introducing direct discourse in the next verse. 'Saying'
    preserves the participial linkage and prepares for the continuation.
