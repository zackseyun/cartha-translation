translation:
  text: And he handed over to them, after weighing it out, six hundred fifty talents
    of silver, and silver vessels worth a hundred talents, and a hundred talents of
    gold, and twenty golden bowls, and ten bronze vessels of fine gleaming bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text here differs notably from the Hebrew parallel in Ezra 8:27,
      which lists two vessels of fine bronze and gives a value for the gold bowls.
      Because 1 Esdras is translated from the Greek witness here, the main text follows
      the Greek inventory.
    reason: textual_variant
  - marker: b
    text: Or possibly 'twenty gold objects' for 'twenty golden bowls'; the Greek term
      is rare, but the Hebrew parallel supports understanding it as a kind of bowl
      or basin.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέδωκεν
  chosen: handed over
  alternatives:
  - delivered
  - entrusted
  lexicon: BDAG
  rationale: A straightforward transfer verb in context of assigning temple valuables
    to the priests; 'handed over' is natural modern English without losing the formal
    sense.
- source_word: στήσας
  chosen: after weighing it out
  alternatives:
  - having weighed
  - having set/counting out
  lexicon: LSJ
  rationale: In this inventory context, the participle most plausibly refers to measuring/weighing
    out the valuables before transfer. This also aligns with the Ezra parallel's emphasis
    on weighing sacred vessels.
- source_word: τάλαντα ἀργυρίου ἑξακόσια πεντήκοντα
  chosen: six hundred fifty talents of silver
  alternatives:
  - 650 silver talents
  lexicon: LSJ
  rationale: Retains the ancient unit 'talents' rather than converting it, preserving
    the source's formal inventory style.
- source_word: σκεύη ἀργυρᾶ
  chosen: silver vessels
  alternatives:
  - articles of silver
  - silver utensils
  lexicon: LSJ
  rationale: σκεύη is a broad term for vessels/articles; 'vessels' fits temple inventory
    language best.
- source_word: χρυσίου ταλάντων ἑκατόν
  chosen: a hundred talents of gold
  alternatives:
  - one hundred gold talents
  lexicon: LSJ
  rationale: Direct rendering preserving the measured-inventory structure of the Greek.
- source_word: χρυσώματα
  chosen: golden bowls
  alternatives:
  - gold objects
  - gold vessels
  - gold cups
  lexicon: LSJ
  rationale: The noun is rare and somewhat uncertain, but the MT parallel has כפרי
    זהב ('gold bowls/basins'), which supports a more specific vessel term rather than
    a generic 'gold objects.' 'Bowls' best fits the cultic inventory context while
    remaining cautious.
- source_word: χαλκᾶ ... ἀπὸ χαλκοῦ χρηστοῦ στίλβοντα
  chosen: bronze vessels of fine gleaming bronze
  alternatives:
  - articles of polished bronze
  - vessels of good shining bronze
  lexicon: LSJ
  rationale: The Greek is somewhat repetitive, emphasizing both material and quality.
    'Fine gleaming bronze' preserves the descriptive force without awkward literalism.
    The MT parallel's 'good' bronze supports this qualitative rendering.
- source_word: δέκα
  chosen: ten
  lexicon: LSJ
  rationale: Direct numerical rendering.
