theological_decisions:
- issue: Nature of the threatened wrath
  chosen_reading: The verse refers to divine wrath potentially falling on the king's
    kingdom and sons if God's law is not carried out.
  alternative_readings:
  - A more general misfortune or political danger rather than explicitly divine wrath
  rationale: Because the text explicitly says 'according to the law of God' and then
    warns against 'wrath' upon the king's kingdom and sons, the most natural reading
    is divine wrath. The translation does not expand beyond the text into a fuller
    doctrine of judgment.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Relation of the action to God Most High
  chosen_reading: The prescribed acts are to be carried out for God Most High.
  alternative_readings:
  - The acts are to be done to God Most High
  rationale: English idiom prefers 'for' in this administrative-sacral context, while
    still preserving that the action is directed toward God's service. This avoids
    awkwardness without changing the sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence.'
