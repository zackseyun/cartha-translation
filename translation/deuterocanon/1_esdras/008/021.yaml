translation:
  text: Let it be done exactly according to the law of God for God Most High, so that
    wrath may not come upon the kingdom of the king and his sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let it be carried out according to the law of God for the Most High
      God.' The Greek imperative can emphasize full execution or completion.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in Ezra 7:23 differs substantially at this point and
      emphasizes supplying specified amounts for temple service; 1 Esdras here preserves
      a shorter Greek formulation. The translation follows the Greek as the primary
      witness.
    reason: textual_variant
lexical_decisions:
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in keeping with
  - by
  lexicon: BDAG
  rationale: Standard sense marking conformity or standard. 'According to' preserves
    the formal relation to 'the law of God' without overinterpreting.
- source_word: νόμον
  chosen: law
  alternatives:
  - instruction
  lexicon: BDAG
  rationale: νόμος here refers to the binding divine legal standard, not merely general
    teaching. 'Law' best matches the administrative and cultic context.
- source_word: ἐπιτελεσθήτω
  chosen: let it be done exactly
  alternatives:
  - let it be carried out
  - let it be completed
  lexicon: BDAG
  rationale: The passive imperative calls for execution/fulfillment of what has been
    prescribed. 'Done exactly' reflects the sense of carrying out requirements in
    full, fitting the royal decree context and supported by the MT parallel's emphasis
    on specified provision.
- source_word: τῷ θεῷ τῷ ὑψίστῳ
  chosen: for God Most High
  alternatives:
  - to God Most High
  - for the Most High God
  lexicon: BDAG
  rationale: 'The dative can be rendered naturally in English as beneficiary/reference:
    the action is to be performed for the service of God. ''God Most High'' is a direct
    title rendering; word order is smoothed for English readability.'
- source_word: ἕνεκα τοῦ μὴ γενέσθαι
  chosen: so that ... may not come
  alternatives:
  - lest there be
  - because there should not be
  lexicon: BDAG
  rationale: This construction expresses purpose aimed at preventing an outcome. 'So
    that ... may not come' communicates the preventative force in idiomatic English.
- source_word: ὀργὴν
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: BDAG
  rationale: In context this is divine displeasure/judgment threatened against the
    royal house. 'Wrath' preserves the gravity better than the flatter 'anger.'
- source_word: βασιλείαν
  chosen: kingdom
  alternatives:
  - realm
  - royal dominion
  lexicon: BDAG
  rationale: The term denotes the king's realm or kingdom. 'Kingdom' is the most straightforward
    and traditional equivalent.
- source_word: τῶν υἱῶν
  chosen: his sons
  alternatives:
  - the king's sons
  - his descendants
  lexicon: BDAG
  rationale: The Greek specifically says 'sons,' and the doctrine prefers gender-accurate
    rendering where the source is masculine and specific. 'His sons' is concise and
    faithful.
