translation:
  text: and with them, seventy men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text reads 'seventy men.' The approximate MT parallel in Ezra
      8:12 instead reads 'one hundred and ten males,' reflecting a divergence between
      1 Esdras and the Hebrew parallel.
    reason: textual_variant
lexical_decisions:
- source_word: μετʼ αὐτῶν
  chosen: with them
  alternatives:
  - along with them
  lexicon: LSJ
  rationale: The preposition μετά with the genitive indicates accompaniment. 'With
    them' is the most natural modern English rendering and preserves the simple coordinative
    force of the Greek.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  - adult men
  lexicon: LSJ
  rationale: ἀνήρ/ἄνδρες normally denotes males/men rather than people in general.
    In line with the project's gender-accurate policy, 'men' is preferred over a gender-neutral
    term such as 'persons.'
- source_word: ἑβδομήκοντα
  chosen: seventy
  lexicon: LSJ
  rationale: Straightforward cardinal number. The Greek witness clearly reads 'seventy,'
    even though the MT parallel at Ezra 8:12 has 'one hundred and ten males.' Because
    the Greek is the primary source for 1 Esdras, the translation follows 'seventy'
    while documenting the parallel difference in a footnote.
