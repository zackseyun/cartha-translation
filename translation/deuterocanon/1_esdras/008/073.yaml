translation:
  text: From the times of our fathers, we have been in great sin until this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'of our ancestors.' The Greek reads 'of our fathers,' preserving the
      masculine ancestral idiom.
    reason: lexical_alternative
  - marker: b
    text: Or, 'we are in great sin.' The Greek present tense can be rendered more
      literally this way, but the English perfect better conveys the continuing state
      from past time until now.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  chosen: From
  alternatives:
  - Since
  lexicon: BDAG
  rationale: The preposition with the genitive marks a starting point in time. 'From'
    is the most direct rendering and preserves the temporal sense without over-interpreting
    duration.
- source_word: τῶν χρόνων
  chosen: the times
  alternatives:
  - the days
  - the years
  lexicon: BDAG
  rationale: χρόνοι denotes periods or times. 'The times' is a natural English equivalent
    and avoids narrowing the expression to literal calendar years.
- source_word: τῶν πατέρων ἡμῶν
  chosen: of our fathers
  alternatives:
  - of our ancestors
  lexicon: BDAG
  rationale: The Greek is explicitly masculine/plural and idiomatically refers to
    forefathers/ancestors. Per project philosophy, the main text keeps the gendered
    form 'fathers' rather than neutralizing it.
- source_word: ἐσμεν
  chosen: we have been
  alternatives:
  - we are
  lexicon: BDAG
  rationale: Although formally present ('we are'), in this temporal construction with
    ἀπὸ ... ἕως the sense is continuative from past to present. English idiom is better
    served by 'we have been,' which preserves the ongoing state.
- source_word: ἐν μεγάλῃ ἁμαρτίᾳ
  chosen: in great sin
  alternatives:
  - in great guilt
  - in a great sin
  lexicon: BDAG
  rationale: The phrase denotes a condition of serious sinfulness/guilt. 'In great
    sin' stays close to the Greek wording and avoids importing a more juridical nuance
    unless context requires it.
- source_word: ἕως τῆς ἡμέρας ταύτης
  chosen: until this day
  alternatives:
  - to this day
  - until the present day
  lexicon: BDAG
  rationale: A standard temporal expression marking continuation up to the speaker's
    present. 'Until this day' is clear, idiomatic, and close to the Greek.
