theological_decisions:
- issue: Gendered ancestral language
  chosen_reading: of our fathers
  alternative_readings:
  - of our ancestors
  rationale: The source text uses the masculine term πατέρων. In keeping with the
    project's gender-accurate policy, the translation preserves 'fathers' in the main
    text rather than replacing it with a gender-neutral collective.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: State of sin versus guilt
  chosen_reading: we have been in great sin
  alternative_readings:
  - we have been in great guilt
  rationale: ἁμαρτία ordinarily means 'sin.' While the phrase can imply culpability,
    the text does not require a shift to the more interpretive 'guilt.' The chosen
    rendering preserves the moral-religious category stated in the Greek.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 1
