translation:
  text: a man of understanding, from the sons of Mooli, son of Levi, son of Israel—Asebebias,
    and his sons and brothers, ten;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel has 'Mahli' rather than 'Mooli.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew parallel gives the name as 'Sherebiah.' The Greek here reads
      Asebebias.
    reason: alternative_reading
  - marker: c
    text: The Hebrew parallel reads 'eighteen' rather than 'ten.'
    reason: textual_variant
lexical_decisions:
- source_word: ἄνδρα
  chosen: a man
  alternatives:
  - a person
  - one
  lexicon: BDAG
  rationale: The Greek is explicitly masculine singular accusative and refers to a
    specific male individual, not a generic person. This also aligns with the MT parallel
    אִישׁ.
- source_word: ἐπιστήμονα
  chosen: of understanding
  alternatives:
  - skillful
  - knowledgeable
  - expert
  lexicon: LSJ
  rationale: The adjective denotes one who is knowledgeable or skilled. 'Of understanding'
    preserves the idiomatic sense and matches the Semitic parallel שֶׂכֶל ('understanding,
    insight') better than the more technical 'expert.'
- source_word: τῶν υἱῶν Μοολὶ
  chosen: from the sons of Mooli
  alternatives:
  - from the descendants of Mooli
  - of the sons of Mahli
  lexicon: LSJ
  rationale: A formal genealogical expression is best preserved with 'sons of.' The
    Greek name Μοολί appears to reflect the MT parallel מַחְלִי (Mahli); because the
    Greek is the primary source, the main text transliterates the Greek form 'Mooli,'
    while preserving the Hebrew-aligned form in a footnote.
- source_word: τοῦ Λευὶ
  chosen: son of Levi
  alternatives:
  - of Levi
  lexicon: LSJ
  rationale: In English genealogy, repeating 'son of' clarifies the chain of descent.
    The Greek genitive sequence supports this, and the MT parallel likewise has בֶּן־לֵוִי.
- source_word: τοῦ Ἰσραήλ
  chosen: son of Israel
  alternatives:
  - of Israel
  lexicon: LSJ
  rationale: As with 'son of Levi,' this makes the genealogical sequence explicit
    and readable in English while remaining faithful to the genitive chain.
- source_word: Ἀσεβηβίαν
  chosen: Asebebias
  alternatives:
  - Sherebiah
  - Asebibias
  lexicon: LSJ
  rationale: The Greek proper name is transliterated directly in keeping with the
    project's policy to transliterate names from the primary source. The MT parallel
    points to Sherebiah, which is preserved in a footnote because the source validation
    flags a major mismatch and the Hebrew likely preserves the more familiar Semitic
    form.
- source_word: τοὺς υἱοὺς καὶ τοὺς ἀδελφούς
  chosen: his sons and brothers
  alternatives:
  - the sons and the brothers with him
  - his children and brothers
  lexicon: BDAG
  rationale: Given the appositional structure after the personal name, the most natural
    English construal is that these belong to Asebebias. 'Sons' is retained rather
    than 'children' because the Greek is specifically masculine and genealogical.
- source_word: δέκα
  chosen: ten
  alternatives:
  - eighteen
  lexicon: LSJ
  rationale: The Greek witness in Swete reads 'ten.' However, the MT parallel reads
    'eighteen' (שְׁמֹנָה עָשָׂר). Because the Greek is the primary source, 'ten' remains
    in the main text, with the Hebrew-aligned alternative preserved in a footnote
    due to the major mismatch flag.
