lexical_decisions:
- source_word: ὑπό
  chosen: from
  alternatives:
  - by
  - under
  lexicon: BDAG
  rationale: With the genitive, ὑπό commonly marks agency ('by'), but in this fragmentary
    context English 'from' is the most natural way to render the source/agency relation
    in a standalone phrase. It also avoids overcommitting where the verse as transmitted
    here is only a clause fragment.
- source_word: τοῦ κυρίου
  chosen: our Lord
  alternatives:
  - the Lord
  - our master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' The possessive
    ἡμῶν is retained as 'our.' 'Master' is possible lexically but is not the default
    here and would sound less fitting in this likely prayer/confessional context.
- source_word: ἡμῶν
  chosen: our
  lexicon: BDAG
  rationale: Straightforward first person plural possessive; retained explicitly in
    English.
