translation:
  text: From the sons of Pahath-moab, Eliaonias son of Zareou, and with him two hundred
    men;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek reads 'Eliaonias son of Zareou'; the Hebrew parallel in Ezra 8:4
      has 'Elihoenai son of Zerahiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τῶν Μααθμωάβ
  chosen: From the sons of Pahath-moab
  alternatives:
  - From the Maathmoab
  - From the descendants of Pahath-moab
  lexicon: LSJ
  rationale: The Greek form Μααθμωάβ reflects the family/clan name corresponding to
    the MT parallel בְּנֵי פַחַת מוֹאָב. Because the Hebrew parallel helps identify
    this as the known Ezra clan name rather than a place or opaque proper noun, 'sons
    of Pahath-moab' best represents the referent in natural English while staying
    close to the source.
- source_word: Ἐλιαλωνίας
  chosen: Eliaonias
  alternatives:
  - Eli(a)lonias
  - Elihoenai
  lexicon: LSJ
  rationale: The Greek personal name should normally be transliterated from the primary
    Greek witness. The MT parallel has אֶלְיְהוֹעֵינַי (Elihoenai/Elyhoenai), which
    likely stands behind the Greek form, but the translation should remain anchored
    in the Greek text, so the main text keeps the Greek-based transliteration 'Eliaonias'
    while the Hebrew-aligned form is preserved as an alternative.
- source_word: Ζαραιου
  chosen: Zareou
  alternatives:
  - Zaraïou
  - Zerahiah
  lexicon: LSJ
  rationale: As with the preceding name, the Greek witness is primary, so a Greek-based
    transliteration is used. The MT parallel identifies the underlying Hebrew name
    as זְרַחְיָה ('Zerahiah'), which is worth preserving as an alternative but not
    replacing the Greek form in the main text.
- source_word: καὶ μετʼ αὐτοῦ
  chosen: and with him
  alternatives:
  - and accompanying him
  - together with him
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase that preserves
    the list structure of the verse.
- source_word: ἄνδρες διακόσιοι
  chosen: two hundred men
  alternatives:
  - two hundred males
  lexicon: BDAG
  rationale: ἄνδρες ordinarily means 'men' here. Although the MT parallel has הַזְּכָרִים
    ('the males'), the Greek witness uses ἄνδρες, so 'men' is the best direct rendering.
    This also fits the census/list context naturally.
