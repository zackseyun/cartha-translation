translation:
  text: And these are the leaders according to their fathers’ houses and their divisions,
    who went up with me from Babylon in the reign of Artaxerxes the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the chiefs' or 'the leaders' according to their fathers’ houses.' The
      Greek προηγούμενοι can suggest those at the head, and the Hebrew parallel supports
      a sense of clan heads.
    reason: lexical_alternative
  - marker: b
    text: The Greek reads 'their divisions,' while the Hebrew parallel has a genealogical
      expression ('their enrollment by genealogy' / 'their lineage'). The translation
      follows the Greek as the primary witness for 1 Esdras.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτοι
  chosen: these are
  alternatives:
  - these
  - these were
  lexicon: LSJ
  rationale: Introduces the list or identification that follows. English supplies
    'are' naturally in a verbless Greek clause.
- source_word: οἱ προηγούμενοι
  chosen: the leading men
  alternatives:
  - those who went before
  - the chiefs
  - the leaders
  lexicon: LSJ
  rationale: In this context, with the MT parallel רָאשֵׁי אֲבֹתֵיהֶם ('heads of their
    fathers' houses'), the phrase denotes persons of prominence or headship, not merely
    those temporally preceding. 'Leading men' captures status without over-specifying
    an office.
- source_word: κατὰ τὰς πατριὰς αὐτῶν
  chosen: according to their fathers’ houses
  alternatives:
  - by their ancestral houses
  - according to their families
  lexicon: LSJ
  rationale: πατριά refers to clan/family lineage grouping. The MT parallel supports
    the technical genealogical sense of 'fathers' houses,' which is more precise than
    the broader 'families.'
- source_word: καὶ τὰς μεριδαρχίας
  chosen: and their divisions
  alternatives:
  - and their groups
  - and their administrative divisions
  - and their genealogical enrollments
  lexicon: LSJ
  rationale: The Greek term points to subdivisions or ordered groupings. The MT parallel
    has וְהִתְיַחְשָׂם ('their genealogy/enrollment'), but the Greek witness is primary
    here and appears to express organized divisions. 'Divisions' preserves the Greek
    sense while remaining readable.
- source_word: οἱ ἀναβάντες
  chosen: who went up
  alternatives:
  - those who came up
  - those who ascended
  lexicon: LSJ
  rationale: Standard biblical idiom for travel from Babylon to Jerusalem. 'Went up'
    preserves the conventional and geographical/theological nuance.
- source_word: μετʼ ἐμοῦ
  chosen: with me
  lexicon: LSJ
  rationale: Straightforward accompaniment phrase.
- source_word: ἐκ Βαβυλῶνος
  chosen: from Babylon
  lexicon: LSJ
  rationale: Direct geographical source.
- source_word: ἐν τῇ βασιλείᾳ Ἀρταξέρξου τοῦ βασιλέως
  chosen: in the reign of Artaxerxes the king
  alternatives:
  - during the kingship of Artaxerxes the king
  - in the kingdom of Artaxerxes the king
  lexicon: LSJ
  rationale: βασιλεία can mean kingdom or reign; with a temporal marker and the MT
    parallel בְּמַלְכוּת, 'in the reign of' is the most natural English rendering.
