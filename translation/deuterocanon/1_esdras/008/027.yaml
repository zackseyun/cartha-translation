translation:
  text: And I took courage according to the help of the Lord my God, and I gathered
    from Israel men to go up with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Ezra 7:28 reads 'heads' or 'leaders' rather than
      'men.' 1 Esdras here follows the Greek wording.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθαρσὴς ἐγενόμην
  chosen: I took courage
  alternatives:
  - I became bold
  - I was encouraged
  - I grew strong
  lexicon: LSJ
  rationale: The phrase denotes becoming confident or emboldened. 'I took courage'
    is idiomatic modern English that preserves the sense of inward strengthening without
    overstating it. The MT parallel has הִתְחַזַּקְתִּי ('I strengthened myself /
    I grew strong'), which supports a courage-strength nuance.
- source_word: κατὰ τὴν ἀντίλημψιν
  chosen: according to the help
  alternatives:
  - through the support
  - by the aid
  - because of the hand
  lexicon: LSJ
  rationale: ἀντίλημψις commonly carries the sense of help, support, or assistance.
    'According to the help' is somewhat formal but reflects the Greek preposition
    κατὰ and keeps the wording anchored to the source. The Hebrew parallel uses כְּיַד
    ... עָלַי ('according to the hand of ... upon me'), but the Greek has interpreted
    that idiom as divine support/help rather than retaining 'hand' literally.
- source_word: Κυρίου θεοῦ μου
  chosen: the Lord my God
  alternatives:
  - the LORD my God
  lexicon: LSJ
  rationale: κύριος is rendered by the project's default 'Lord.' Although the Hebrew
    parallel has the divine name, the primary source here is Greek Κυρίου, and 'the
    Lord my God' matches both the Greek and the project's contested-terms guidance.
- source_word: συνήγαγον
  chosen: I gathered
  alternatives:
  - I assembled
  - I collected
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist verb meaning to gather together.
    'Gathered' is natural and sufficiently formal.
- source_word: ἐκ τοῦ Ἰσραὴλ
  chosen: from Israel
  alternatives:
  - out of Israel
  - from among Israel
  lexicon: LSJ
  rationale: The phrase indicates the source group from which the men were gathered.
    'From Israel' is concise and natural; context makes clear this means from among
    the people of Israel.
- source_word: ἄνδρας
  chosen: men
  alternatives:
  - leaders
  - men of standing
  lexicon: LSJ
  rationale: The Greek explicitly says 'men.' The MT parallel has רָאשִׁים ('heads/chiefs/leaders'),
    but the Greek witness, which is primary for 1 Esdras, reads ἄνδρας. Following
    the project's gender-accurate policy, 'men' is retained rather than neutralizing
    or importing 'leaders' from the Hebrew.
- source_word: ὥστε συναναβῆναί μοι
  chosen: to go up with me
  alternatives:
  - so that they might go up with me
  - to come up with me
  lexicon: LSJ
  rationale: The infinitive construction expresses purpose or result. 'To go up with
    me' is smooth English and preserves the travel idiom of ascent to Jerusalem. 'Come
    up' is possible, but 'go up' better reflects the narrator's perspective in context.
