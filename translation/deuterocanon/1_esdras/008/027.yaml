theological_decisions:
- issue: Greek wording versus MT parallel on the identity/status of those gathered
  chosen_reading: men
  alternative_readings:
  - leaders
  - chief men
  rationale: The primary source for 1 Esdras is the Greek, which reads ἄνδρας ('men').
    The MT parallel in Ezra 7:28 reads רָאשִׁים ('heads/chiefs'), which may reflect
    a different Vorlage or a Greek simplification. To avoid importing the Hebrew wording
    into the Greek text, the main translation follows 'men,' while preserving the
    MT-aligned alternative in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Gender-accurate over gender-neutral.'
