theological_decisions:
- issue: Rendering υἱῶν Ἰσραήλ in a list of returnees
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  rationale: The phrase is not a doctrinal crux, but the project's gender-accurate
    policy favors retaining the masculine familial expression where it reflects the
    source wording. Because the phrase functions corporately, 'Israelites' is a viable
    smoother alternative, but the main text keeps the Greek's form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering ἱερόδουλοι
  chosen_reading: temple servants
  alternative_readings:
  - temple slaves
  rationale: The project prefers exposing bonded-status language where salient. Here,
    however, the term names a recognized temple-service class in a personnel list,
    and 'temple servants' best communicates the institutional role without over-specifying
    legal status. The alternative is preserved in a footnote for auditability.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1; Contested terms table
    on δοῦλος
