translation:
  text: And some of the sons of Israel, and of the priests, Levites, temple singers,
    gatekeepers, and temple servants, went up to Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some of the Israelites.' The Greek more literally says 'some of the
      sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'temple slaves.' The Greek term can carry the sense of persons bound
      to sacred service.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνανέβησαν
  chosen: went up
  alternatives:
  - came up
  - went up together
  - ascended
  lexicon: LSJ
  rationale: The compound verb literally includes the sense of going up together.
    In biblical travel idiom, 'went up' is the natural English equivalent for travel
    to Jerusalem. The prefixed συν- may suggest accompanying movement, but English
    can leave that implicit here without loss of sense.
- source_word: ἐκ τῶν υἱῶν Ἰσραήλ
  chosen: some of the sons of Israel
  alternatives:
  - from the sons of Israel
  - of the Israelites
  - some of the Israelites
  lexicon: LSJ
  rationale: The Greek construction with ἐκ after the verb indicates members drawn
    from these groups. 'Some of the sons of Israel' stays close to the Greek and preserves
    the representative list structure. 'Israelites' is possible, but the source wording
    is more literally filial.
- source_word: ἱερέων
  chosen: priests
  lexicon: LSJ
  rationale: Standard rendering for the priestly class.
- source_word: Λευειτῶν
  chosen: Levites
  lexicon: LSJ
  rationale: Standard transliterated rendering for the Levitical group.
- source_word: ἱεροψαλτῶν
  chosen: temple singers
  alternatives:
  - singers
  - sacred singers
  lexicon: LSJ
  rationale: The compound denotes singers connected with sacred service. 'Temple singers'
    makes the cultic setting explicit in clear modern English.
- source_word: θυρωρῶν
  chosen: gatekeepers
  alternatives:
  - doorkeepers
  - porters
  lexicon: LSJ
  rationale: '''Gatekeepers'' is the clearest contemporary rendering for those guarding
    or attending the temple gates.'
- source_word: ἱεροδούλων
  chosen: temple servants
  alternatives:
  - temple slaves
  - sacred servants
  lexicon: LSJ
  rationale: The term refers to persons attached to temple service. Although the second
    element can suggest servile status, in this list of official temple personnel
    'temple servants' is the most natural and least misleading English equivalent.
    The stronger alternative is preserved in a footnote because the bonded nuance
    may be present.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: LSJ
  rationale: Standard destination phrase; 'to Jerusalem' is idiomatic English.
