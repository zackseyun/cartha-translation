translation:
  text: And after setting out from the place Thera on the twelfth day of the first
    month, they came to Jerusalem by the mighty hand of our Lord that was upon us;
    and he rescued us from every enemy encountered on the way, and we came to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek names the departure point as 'Thera'; the Hebrew parallel in Ezra
      8:31 reads 'the river Ahava.' Because 1 Esdras is translated from the Greek
      here, 'Thera' is kept in the main text.
    reason: alternative_reading
  - marker: b
    text: The Greek phrase literally reads something like 'from the approach/entrance
      from every enemy,' which is difficult in context. The Hebrew parallel has 'from
      the hand of the enemy and ambush on the way,' which supports the sense 'from
      every enemy encountered on the way.'
    reason: textual_variant
  - marker: c
    text: Some Greek wording here appears irregular, including a shift from 'us' to
      'they came.' The translation smooths this to 'we came' to match the surrounding
      first-person narrative and the Hebrew parallel.
    reason: textual_variant
lexical_decisions:
- source_word: ἀναζεύξαντες
  chosen: after setting out
  alternatives:
  - after breaking camp
  - after departing
  lexicon: LSJ
  rationale: The participle denotes striking camp / setting out on a journey. 'After
    setting out' is natural modern English and preserves the temporal force without
    over-paraphrase.
- source_word: τοῦ τόπου Θερὰ
  chosen: the place Thera
  alternatives:
  - the place of Thera
  - Thera
  lexicon: LSJ
  rationale: The Greek names the departure point as 'the place Thera.' Because the
    MT parallel has 'the river Ahava,' there is source-level tension. The Greek remains
    primary for 1 Esdras, so the proper name is retained as transliterated from the
    Greek, with the Hebrew parallel preserved in a footnote.
- source_word: τῇ δωδεκάτῃ τοῦ πρώτου μηνὸς
  chosen: on the twelfth day of the first month
  alternatives:
  - on the twelfth of the first month
  lexicon: LSJ
  rationale: A straightforward calendrical expression; expanded slightly for clear
    English.
- source_word: κατὰ τὴν κραταιὰν χεῖρα τοῦ κυρίου ἡμῶν τὴν ἐφʼ ἡμῖν
  chosen: by the mighty hand of our Lord that was upon us
  alternatives:
  - according to the mighty hand of our Lord upon us
  - through the strong hand of our Lord upon us
  lexicon: LSJ
  rationale: The idiom parallels biblical language of divine power and favor. 'By
    the mighty hand' communicates agency well in English. κύριος is rendered 'Lord'
    per doctrine.
- source_word: ἐρύσατο
  chosen: he rescued us
  alternatives:
  - he delivered us
  - he saved us
  lexicon: LSJ
  rationale: The verb means to rescue/deliver from danger. 'Rescued' is vivid and
    accessible without importing broader soteriological overtones.
- source_word: ἀπὸ τῆς εἰσόδου
  chosen: encountered on the way
  alternatives:
  - from the approach
  - from the entrance
  lexicon: LSJ
  rationale: The transmitted Greek phrase is awkward in context. Read with the MT
    parallel ('enemy and ambush on the way'), it likely refers to hostile encounter
    during the journey rather than a literal 'entrance.' To avoid a wooden but misleading
    rendering, the translation expresses the contextual sense while documenting the
    alternative in a footnote.
- source_word: ἀπὸ παντὸς ἐχθροῦ
  chosen: from every enemy
  alternatives:
  - from all enemies
  lexicon: LSJ
  rationale: παντός with singular ἐχθροῦ has distributive force; 'every enemy' preserves
    that nuance.
- source_word: καὶ ἤλθον εἰς Ἰερουσαλήμ
  chosen: and we came to Jerusalem
  alternatives:
  - and they came to Jerusalem
  lexicon: LSJ
  rationale: The Greek text as given shifts from first person plural earlier ('us')
    to third person plural here ('they came'), likely due to textual or compositional
    irregularity. Because the surrounding clause is first person and the MT parallel
    is first person, 'we came' best preserves discourse coherence; the variation is
    noted as a textual issue.
