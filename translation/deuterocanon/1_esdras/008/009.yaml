translation:
  text: King Artaxerxes to Ezra the priest and reader of the law of the Lord, greetings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek reads 'reader of the law of the Lord'; the Hebrew parallel in
      Ezra 7:12 has 'scribe of the law of the God of heaven.'
    reason: alternative_reading
lexical_decisions:
- source_word: Βασιλεὺς
  chosen: King
  alternatives:
  - The king
  lexicon: LSJ
  rationale: 'Anarthrous title used in epistolary heading style; English naturally
    renders it as the royal title before the name: ''King Artaxerxes.'''
- source_word: Ἀρταξέρξης
  chosen: Artaxerxes
  rationale: Standard English transliteration of the Persian royal name; names are
    transliterated rather than translated.
- source_word: Ἔσρᾳ
  chosen: Ezra
  alternatives:
  - Esdras
  rationale: The Greek form corresponds to the well-known personal name Ezra. Since
    personal names are transliterated by standard conventions, 'Ezra' is preferred
    over the book-title form 'Esdras.'
- source_word: τῷ ἱερεῖ
  chosen: the priest
  alternatives:
  - priest
  lexicon: LSJ
  rationale: The dative with article identifies Ezra by office in the address line.
    'The priest' preserves the appositional title.
- source_word: ἀναγνώστῃ
  chosen: reader
  alternatives:
  - scribe
  - one who reads aloud
  lexicon: LSJ
  rationale: The noun most directly means 'reader' or 'reciter.' Although the MT parallel
    in Ezra 7 uses 'scribe,' the Greek witness here explicitly has ἀναγνώστῃ, so the
    translation should reflect the Greek rather than harmonize to the Hebrew parallel.
- source_word: τοῦ νόμου
  chosen: of the law
  alternatives:
  - of the Law
  lexicon: LSJ
  rationale: A straightforward genitive dependent on 'reader.' Lowercase 'law' is
    used because the phrase functions descriptively here, though it refers to the
    divine law.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Following project policy, κύριος is rendered 'Lord.' The article is supplied
    in English for natural syntax in the genitival phrase 'the law of the Lord.'
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - hail
  lexicon: LSJ
  rationale: Standard epistolary infinitive meaning 'greetings' in letter openings.
    This is idiomatic English and preserves the function of the Greek salutation.
