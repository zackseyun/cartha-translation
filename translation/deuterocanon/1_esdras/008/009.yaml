theological_decisions:
- issue: Greek ἀναγνώστῃ versus MT-parallel 'scribe' in the corresponding Ezra tradition
  chosen_reading: reader
  alternative_readings:
  - scribe
  rationale: The primary source for 1 Esdras is the Greek, and this verse explicitly
    calls Ezra 'reader of the law of the Lord.' The Hebrew parallel is useful as a
    control, but not sufficient to override the Greek wording. The alternative is
    preserved in a footnote because readers familiar with Ezra 7:12 may expect 'scribe.'
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; WLC MT parallels for 1 Esdras are secondary sanity checks, not controlling
    over the Greek.'
