translation:
  text: And you, Ezra, according to the wisdom of God, appoint judges and magistrates,
    so that they may judge throughout all Syria and Phoenicia all those who know the
    law of your God; and you shall teach those who do not know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text reads 'Syria and Phoenicia,' reflecting 1 Esdras' Greek geographical
      framing; the Hebrew parallel in Ezra uses different provincial wording.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνάδειξον
  chosen: appoint
  alternatives:
  - set up
  - designate
  lexicon: BDAG
  rationale: Imperative calling for Ezra to install officials. 'Appoint' is natural
    modern English and preserves the formal act of selection better than the more
    wooden 'set up'.
- source_word: κριτὰς
  chosen: judges
  alternatives:
  - rulers
  lexicon: BDAG
  rationale: The legal context with δικάζωσιν favors the judicial sense. 'Judges'
    is the most direct rendering.
- source_word: δικαστάς
  chosen: magistrates
  alternatives:
  - justices
  - officials
  lexicon: BDAG
  rationale: Distinguished from κριτάς, this likely refers to subordinate judicial
    officers or court officials. 'Magistrates' preserves the legal-administrative
    nuance without collapsing the pair into a single English term.
- source_word: ὅπως δικάζωσιν
  chosen: so that they may judge
  alternatives:
  - that they may administer justice
  - so that they may decide cases
  lexicon: BDAG
  rationale: This expresses purpose. 'Judge' keeps the lexical link with κριταί and
    avoids over-interpreting the scope as broader administrative justice.
- source_word: ἐν ὅλῃ Συρίᾳ καὶ Φοινίκῃ
  chosen: throughout all Syria and Phoenicia
  alternatives:
  - in all Syria and Phoenicia
  lexicon: LSJ
  rationale: The Greek names the territorial scope used in 1 Esdras' Greek setting,
    which differs from the MT parallel's provincial wording. 'Throughout all' conveys
    jurisdictional breadth.
- source_word: πάντας τοὺς ἐπισταμένους
  chosen: all those who know
  alternatives:
  - all who are acquainted with
  - all those who understand
  lexicon: BDAG
  rationale: ἐπίσταμαι here denotes having knowledge or competence. 'Know' is simple
    and sufficient in context.
- source_word: τὸν νόμον τοῦ θεοῦ σου
  chosen: the law of your God
  alternatives:
  - your God's law
  lexicon: BDAG
  rationale: A straightforward genitival construction. The fuller phrasing sounds
    slightly more formal and suits the decree style.
- source_word: τοὺς μὴ ἐπισταμένους
  chosen: those who do not know it
  alternatives:
  - those who do not understand it
  - the uninstructed
  lexicon: BDAG
  rationale: The object 'the law' is implied from the previous clause and is naturally
    supplied in English as 'it.' This preserves the contrast with those who know the
    law.
- source_word: διδάξεις
  chosen: you shall teach
  alternatives:
  - you must teach
  - you are to instruct
  lexicon: BDAG
  rationale: Future indicative in decree style functions as an instruction. 'You shall
    teach' preserves the formal tone and directive force.
