translation:
  text: And I told them to go to Laddaeus, the leader at the place of the treasury,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek names only Laddaeus here, whereas the Hebrew parallel in Ezra
      8:16 lists several men sent for. 1 Esdras appears to compress or reshape the
      parallel account at this point.
    reason: alternative_reading
  - marker: b
    text: Or 'the leader at the treasury place' or 'the one in charge of the treasury
      chamber.' The Greek wording is compact and allows slightly different construals
      of the final phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπα
  chosen: I told
  alternatives:
  - I said
  - I instructed
  lexicon: BDAG
  rationale: The aorist of λέγω here governs an infinitive of command (ἐλθεῖν), so
    idiomatic English is better served by 'I told' rather than the more wooden 'I
    said.'
- source_word: ἐλθεῖν πρὸς
  chosen: to go to
  alternatives:
  - to come to
  - to approach
  lexicon: BDAG
  rationale: Although ἔρχομαι often literally means 'come,' with πρὸς and from the
    narrator's perspective in reported instruction, English normally uses 'go to'
    for the addressees' movement toward another person.
- source_word: Λαδδαῖον
  chosen: Laddaeus
  alternatives:
  - Laddaeus
  - Laddaios
  lexicon: LSJ
  rationale: This is a personal name and should be transliterated rather than translated.
    'Laddaeus' gives a standard Anglicized transliteration from the Greek accusative
    form.
- source_word: τὸν ἡγούμενον
  chosen: the leader
  alternatives:
  - the governor
  - the one in charge
  - the chief
  lexicon: BDAG
  rationale: ἡγούμενος broadly denotes one who leads or is in charge. 'Leader' is
    the most neutral rendering here and avoids overstating a formal governmental office
    such as 'governor.'
- source_word: τὸν ἐν τῷ τόπῳ
  chosen: in the place
  alternatives:
  - who was in the place
  - at the place
  - in that place
  lexicon: BDAG
  rationale: The Greek phrase modifies the leader's location or sphere. 'In the place'
    stays close to the wording while remaining intelligible. Because the source text
    is somewhat compressed, a fuller paraphrase is avoided.
- source_word: γαζοφυλακίου
  chosen: of the treasury
  alternatives:
  - of the storehouse
  - of the treasury chamber
  - of the treasure-house
  lexicon: BDAG
  rationale: γαζοφυλάκιον denotes a treasury or treasury chamber. 'Treasury' is concise
    and natural in English, while preserving the institutional sense.
