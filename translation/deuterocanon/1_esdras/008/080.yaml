translation:
  text: saying that the land into which you are entering to inherit is a land defiled
    by the defilement of the foreigners of the land, and they have filled it with
    their uncleanness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the Hebrew-parallel idiom, 'the peoples of the land.' The
      Greek more specifically says 'the foreigners of the land.'
    reason: alternative_reading
  - marker: b
    text: '''Uncleanness'' can carry both ritual and moral force here; the wording
      does not require choosing only one sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ γῆ
  chosen: the land
  alternatives:
  - the earth
  lexicon: LSJ
  rationale: In this conquest/inheritance context, γῆ refers to the specific territory
    Israel is entering, not the world in general.
- source_word: εἰς ἣν εἰσέρχεσθε
  chosen: into which you are entering
  alternatives:
  - which you are entering
  - into which you are going
  lexicon: BDAG
  rationale: Retains the directional force of εἰς and the present tense sense of the
    Greek, matching the imminent-entry context.
- source_word: κληρονομῆσαι
  chosen: to inherit
  alternatives:
  - to take possession of
  - to receive as an inheritance
  lexicon: BDAG
  rationale: κληρονομέω carries inheritance language that is theologically and covenantally
    important; 'take possession' would weaken that nuance.
- source_word: μεμολυσμένη
  chosen: defiled
  alternatives:
  - polluted
  - contaminated
  lexicon: LSJ
  rationale: A strong moral-ritual term is needed here. 'Defiled' best preserves the
    cultic and ethical force of the perfect participle.
- source_word: μολυσμῷ
  chosen: by the defilement
  alternatives:
  - by pollution
  - with defilement
  lexicon: LSJ
  rationale: The dative is rendered instrumentally/causally. Repeating the cognate
    noun preserves the emphatic wording of the Greek.
- source_word: τῶν ἀλλογενῶν τῆς γῆς
  chosen: of the foreigners of the land
  alternatives:
  - of the peoples of the land
  - of the alien peoples of the land
  lexicon: LSJ
  rationale: ἀλλογενής denotes those of another stock/people. 'Foreigners' is clear
    modern English and preserves the outsider sense. 'Peoples of the land' is possible
    from the Hebrew parallel tradition, but the Greek here more specifically marks
    them as foreign.
- source_word: τῆς ἀκαθαρσίας αὐτῶν
  chosen: with their uncleanness
  alternatives:
  - with their impurity
  - with their unclean practices
  lexicon: BDAG
  rationale: ἀκαθαρσία can denote impurity/uncleanness in moral and ritual senses.
    'Uncleanness' keeps the biblical register and allows both dimensions to remain.
- source_word: ἐνέπλησαν αὐτήν
  chosen: they have filled it
  alternatives:
  - they filled it
  - they have made it full
  lexicon: BDAG
  rationale: The verb means 'fill.' The perfect-like English 'have filled' fits the
    resulting state emphasized in context.
