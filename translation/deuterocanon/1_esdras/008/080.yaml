theological_decisions:
- issue: Whether to foreground ritual impurity alone or preserve both ritual and moral
    defilement language
  chosen_reading: Preserved broad defilement/uncleanness language without narrowing
    it to either ceremonial impurity or merely moral corruption.
  alternative_readings:
  - a land polluted by the pollution of the nations
  - a land made unclean by the impurity of the peoples of the land
  rationale: The Greek uses μολυσμός and ἀκαθαρσία, terms that can carry both cultic
    and ethical force. The translation keeps that tension rather than resolving it
    reductively.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
- issue: How to render ἀλλογενῶν in relation to the Hebrew-parallel idiom
  chosen_reading: foreigners of the land
  alternative_readings:
  - peoples of the land
  - alien peoples of the land
  rationale: The Greek source is primary for 1 Esdras, and ἀλλογενῶν explicitly marks
    otherness/foreignness. The Hebrew parallel tradition often uses 'peoples of the
    land,' which is worth preserving as an alternative but should not override the
    Greek wording.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1
