translation:
  text: And it is also declared to you that no tax or other levy is to be imposed
    on any of the priests, Levites, temple singers, gatekeepers, temple servants,
    or workers of this temple, and that no one is to have authority to impose it on
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'other burden' or 'other imposition.' The Greek term can denote an additional
      imposed obligation; the fiscal context favors 'levy.'
    reason: lexical_alternative
  - marker: b
    text: '''Workers of this temple'' renders a term for those occupied with the temple''s
      affairs or business; ''officials'' is also possible but may sound too narrow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγεται
  chosen: it is also declared
  alternatives:
  - it is said
  - it is commanded
  - it is made known
  lexicon: BDAG
  rationale: Passive of λέγω here functions in an official-administrative sense within
    a royal decree context. 'Declared' fits the formal notice better than the weaker
    'said.'
- source_word: πᾶσι τοῖς ἱερεῦσιν
  chosen: any of the priests
  alternatives:
  - all the priests
  - every priest
  lexicon: BDAG
  rationale: With the following negative provision, English idiom is clearer with
    'any of the priests' rather than a wooden 'all the priests,' while preserving
    the comprehensive scope.
- source_word: Λευείταις
  chosen: Levites
  alternatives:
  - Leuites
  lexicon: BDAG
  rationale: Standard English transliteration for the temple tribe/class.
- source_word: ἱεροψάλταις
  chosen: temple singers
  alternatives:
  - sacred singers
  - singers
  lexicon: LSJ
  rationale: The compound explicitly marks cultic/temple function; 'temple singers'
    is clear modern English and preserves the sacred setting.
- source_word: θυρωροῖς
  chosen: gatekeepers
  alternatives:
  - doorkeepers
  - porters
  lexicon: LSJ
  rationale: '''Gatekeepers'' is the natural rendering for temple personnel guarding
    entrances; ''porters'' is archaic and potentially misleading.'
- source_word: ἱεροδούλοις
  chosen: temple servants
  alternatives:
  - sacred slaves
  - temple slaves
  lexicon: LSJ
  rationale: Although the second element can suggest bonded service, in this temple-personnel
    list 'temple servants' is the most natural and least over-specified English rendering.
    The bonded nuance is not clearly foregrounded here, unlike some δοῦλος contexts.
- source_word: πραγματικοῖς τοῦ ἱεροῦ
  chosen: workers of this temple
  alternatives:
  - officials of this temple
  - functionaries of this temple
  - those engaged in the business of this temple
  lexicon: LSJ
  rationale: πραγματικός can denote one occupied with affairs/business. In this administrative
    list, 'workers' captures those engaged in temple business without implying a narrower
    bureaucratic office than the Greek requires.
- source_word: μηδεμία φορολογία
  chosen: no tax
  alternatives:
  - no tribute
  - no taxation
  lexicon: LSJ
  rationale: φορολογία is a tax/tribute obligation. 'No tax' is concise and idiomatic
    in English.
- source_word: μηδὲ ἄλλη ἐπιβουλή
  chosen: or other levy
  alternatives:
  - or other burden
  - or other imposition
  - or other harassment
  lexicon: LSJ
  rationale: The phrase follows φορολογία in a fiscal-administrative prohibition.
    Although ἐπιβουλή can elsewhere mean plot or hostile design, here the context
    favors an additional imposed burden; 'other levy' best matches the decree's legal-economic
    sense.
- source_word: γίγνηται
  chosen: is to be imposed
  alternatives:
  - should arise
  - should occur
  - be made
  lexicon: BDAG
  rationale: In context the concern is not abstract occurrence but the imposition
    of burdens on temple personnel. This rendering makes explicit the administrative
    force already implied by the surrounding terms.
- source_word: μηδένα ἔχειν ἐξουσίαν ἐπιβαλεῖν τούτοις
  chosen: no one is to have authority to impose it on them
  alternatives:
  - no one has authority to lay this on them
  - let no one have power to impose these things on them
  lexicon: BDAG
  rationale: ἐξουσίαν ἐπιβαλεῖν expresses legal authority to impose a burden. 'Impose
    it on them' links naturally back to the prohibited tax/levy.
