theological_decisions:
- issue: Corporate guilt across generations
  chosen_reading: Retain 'our sins and the sins of our fathers' as a straightforward
    statement of communal and ancestral culpability.
  alternative_readings:
  - Soften to 'our sins and those before us' to avoid generational culpability language
  rationale: The Greek explicitly names both the present community and 'our fathers'
    as causes of the judgment. The translation should preserve this theological logic
    of covenantal solidarity rather than dilute it.
  doctrine_reference: Preserve theological tension rather than resolve it.
