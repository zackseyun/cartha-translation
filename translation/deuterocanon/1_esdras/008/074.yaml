translation:
  text: And because of our sins and the sins of our fathers, we were handed over,
    together with our brothers, our kings, and our priests, to the kings of the earth,
    to the sword and captivity and plundering with shame, to this present day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the kings of the land.' The Greek γῆ can mean 'earth' or 'land';
      here 'earth' is retained as the broader idiom for foreign earthly rulers.
    reason: lexical_alternative
  - marker: b
    text: Or 'spoil' or 'plunder' for 'plundering.' The Greek term denotes being given
      over to pillage.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὰς ἁμαρτίας ἡμῶν καὶ τῶν πατέρων ἡμῶν
  chosen: because of our sins and the sins of our fathers
  alternatives:
  - for our sins and the sins of our fathers
  - on account of our sins and our fathers' sins
  lexicon: BDAG
  rationale: διά with the accusative here expresses cause. 'Because of' is natural
    modern English and preserves the causal force without sounding wooden.
- source_word: παρεδόθημεν
  chosen: we were handed over
  alternatives:
  - we were delivered over
  - we were given over
  lexicon: BDAG
  rationale: The passive of παραδίδωμι often carries the sense of being handed over
    into another's power. 'Handed over' is idiomatic and preserves the judicial/covenantal
    weight better than the softer 'given over.'
- source_word: σὺν τοῖς ἀδελφοῖς ἡμῶν
  chosen: together with our brothers
  alternatives:
  - with our brothers
  - together with our kindred
  lexicon: BDAG
  rationale: ἀδελφοί is literally 'brothers.' In this national lament context it may
    represent fellow Israelites more broadly, but the project's gender-accurate policy
    favors retaining 'brothers' unless context requires otherwise.
- source_word: σὺν τοῖς βασιλεῦσιν ἡμῶν καὶ σὺν τοῖς ἱερεῦσιν ἡμῶν
  chosen: our kings, and our priests
  alternatives:
  - together with our kings and our priests
  lexicon: BDAG
  rationale: After the first explicit 'together with,' English can coordinate the
    remaining groups smoothly without repeating the phrase each time, while preserving
    the sense that all were included in the judgment.
- source_word: τοῖς βασιλεῦσιν τῆς γῆς
  chosen: to the kings of the earth
  alternatives:
  - to the kings of the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' Here the plural 'kings' and the exile
    context favor the broader idiom 'kings of the earth,' meaning earthly foreign
    rulers. This also matches common biblical diction.
- source_word: εἰς ῥομφαίαν
  chosen: to the sword
  alternatives:
  - to slaughter by the sword
  - to a sword
  lexicon: BDAG
  rationale: ῥομφαία literally denotes a sword, and in judgment formulas 'to the sword'
    is the established idiom for death by warfare or execution.
- source_word: αἰχμαλωσίαν
  chosen: captivity
  alternatives:
  - exile
  - captivity as prisoners
  lexicon: BDAG
  rationale: The term denotes being taken captive. 'Captivity' is concise and fits
    the triadic judgment formula alongside sword and plundering.
- source_word: προνομὴν
  chosen: plundering
  alternatives:
  - spoil
  - plunder
  lexicon: LSJ
  rationale: The noun refers to being given over to pillage/spoil. 'Plundering' communicates
    the event/result in clear modern English. 'Spoil' is possible but less transparent
    to modern readers.
- source_word: μετὰ αἰσχύνης
  chosen: with shame
  alternatives:
  - with disgrace
  - in shame
  lexicon: BDAG
  rationale: αἰσχύνη denotes shame/disgrace. 'With shame' is direct and preserves
    the moral-social humiliation attached to the people's condition.
- source_word: μέχρι τῆς σήμερον ἡμέρας
  chosen: to this present day
  alternatives:
  - until this day
  - to this day
  lexicon: BDAG
  rationale: This idiom marks the continuing state from past judgment into the speaker's
    present. 'To this present day' is slightly fuller and natural in English.
