translation:
  text: Were you not angry with us, to destroy us, leaving no root or seed or name
    of ours?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'until no remnant, offspring, or name of ours was
      left.' The Greek reads literally 'root and seed and name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχὶ
  chosen: Were ... not
  alternatives:
  - Did ... not
  - Surely ... not
  lexicon: LSJ
  rationale: Renders the interrogative particle introducing a rhetorical question
    expecting affirmation. English inversion preserves the force naturally.
- source_word: ὠργίσθης
  chosen: were ... angry
  alternatives:
  - became angry
  - were enraged
  - were wrathful
  lexicon: BDAG
  rationale: Aorist passive/deponent of ὀργίζω here expresses divine anger. 'Were
    angry' is idiomatic modern English and preserves the emotional-judicial sense
    without over-intensifying.
- source_word: ἡμῖν
  chosen: with us
  alternatives:
  - at us
  - against us
  lexicon: LSJ
  rationale: With verbs of anger, the dative is naturally rendered 'with us' in English.
    'Against us' is possible, but 'with us' better matches common English after 'angry'
    while retaining the relational sense.
- source_word: ἀπολέσαι
  chosen: to destroy us
  alternatives:
  - to wipe us out
  - to bring us to ruin
  lexicon: BDAG
  rationale: Infinitive of purpose/result after the anger expression. 'Destroy' is
    the most direct equivalent and fits the covenant-judgment context without colloquial
    coloring.
- source_word: ἕως τοῦ μὴ καταλιπεῖν
  chosen: until no ... was left
  alternatives:
  - so as not to leave
  - until there was not left
  lexicon: BDAG
  rationale: 'This construction expresses the endpoint of destruction: the point at
    which nothing remains. The English recasts the infinitival phrase into natural
    idiom while preserving the totalizing sense.'
- source_word: ῥίζαν
  chosen: root
  alternatives:
  - remnant root
  - stock
  lexicon: LSJ
  rationale: '''Root'' is the plain lexical sense and works metaphorically for surviving
    lineage or continuance. It also resonates with biblical remnant language without
    adding words absent from the Greek.'
- source_word: σπέρμα
  chosen: seed
  alternatives:
  - offspring
  - descendants
  lexicon: BDAG
  rationale: The literal 'seed' is retained because it is transparent in English and
    preserves the lineage nuance. 'Offspring' would be interpretive; the paired imagery
    with 'root' favors the more formal rendering.
- source_word: ὄνομα
  chosen: name
  alternatives:
  - renown
  - memory
  lexicon: BDAG
  rationale: '''Name'' is the direct rendering and in context conveys continued identity/existence.
    More interpretive options like ''memory'' narrow the semantic range too much.'
- source_word: ἡμῶν
  chosen: of ours
  alternatives:
  - our
  - belonging to us
  lexicon: LSJ
  rationale: Placed after the triad, the genitive modifies all three nouns. 'Of ours'
    preserves the distributive sense over 'root,' 'seed,' and 'name' in natural English.
