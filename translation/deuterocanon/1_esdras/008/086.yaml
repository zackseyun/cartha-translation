theological_decisions:
- issue: Extent of the destruction language in a penitential prayer
  chosen_reading: The verse is rendered as a rhetorical question about God being angry
    to the point that no surviving lineage or identity remained.
  alternative_readings:
  - 'A more dynamic rendering could make the implied remnant theology explicit: ''until
    no remnant, offspring, or name remained.'''
  rationale: The Greek itself uses the concrete triad 'root and seed and name' rather
    than an abstract term for remnant. The translation preserves that imagery and
    lets the theological implication of total covenant judgment emerge from the wording
    rather than importing interpretive terminology from parallel traditions.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
