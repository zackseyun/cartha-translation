lexical_decisions:
- source_word: ἐκ τῶν ἱερέων
  chosen: from the priests
  alternatives:
  - among the priests
  lexicon: BDAG
  rationale: A straightforward prepositional phrase. 'From the priests' preserves
    the Greek ἐκ and fits the implied sense of searching within a group.
- source_word: ἐκ τῶν Λευειτῶν
  chosen: from the Levites
  alternatives:
  - among the Levites
  lexicon: BDAG
  rationale: Kept parallel with the preceding phrase for clarity and formal balance.
    'Levites' is the standard transliteration for the temple tribe/class.
- source_word: οὐχ εὗρον
  chosen: I found no one
  alternatives:
  - I did not find
  - they found none
  lexicon: BDAG
  rationale: The Greek verb is first person singular, so the subject should be 'I,'
    not an impersonal or plural rendering. Adding 'no one' makes explicit the implied
    object in idiomatic English.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Simple locative adverb best rendered 'there.' It likely refers to the
    place where the returnees had assembled.
