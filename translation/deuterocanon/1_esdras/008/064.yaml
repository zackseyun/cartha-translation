theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek context
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: Project doctrine sets κύριος to 'Lord' by default, while reserving 'the
    LORD' for explicit Hebrew YHWH renderings. Since the primary source here is Greek
    1 Esdras, 'the Lord' is retained.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Sense of ἐδόξασαν with non-divine objects
  chosen_reading: they honored the nation and the sanctuary
  alternative_readings:
  - they glorified the nation and the sanctuary
  rationale: To avoid importing worship language where the text speaks of public esteem
    or favorable treatment, the verb is rendered in a way that preserves dignity without
    theological overstatement.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
