translation:
  text: And they delivered the king’s decrees to the royal stewards and to the governors
    of Syria and Phoenicia, and they honored the nation and the sanctuary of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they glorified the nation and the sanctuary of the Lord.' The Greek
      verb can also be rendered more literally as 'glorified,' but here likely refers
      to honoring or showing distinction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέδωκαν
  chosen: delivered
  alternatives:
  - gave over
  - handed over
  - presented
  lexicon: BDAG
  rationale: In context the verb refers to transmitting official documents to authorities.
    'Delivered' is natural modern English and preserves the formal administrative
    sense better than the more generic 'gave'.
- source_word: τὰ προστάγματα
  chosen: the decrees
  alternatives:
  - the commands
  - the ordinances
  - the edicts
  lexicon: LSJ
  rationale: The noun denotes official orders or directives. Because these are specifically
    the king's written/official instructions, 'decrees' best captures the governmental
    force without over-specifying a legal genre.
- source_word: τοῖς βασιλικοῖς οἰκονόμοις
  chosen: to the royal stewards
  alternatives:
  - to the king's treasurers
  - to the royal administrators
  - to the royal household managers
  lexicon: LSJ
  rationale: οἰκονόμος is literally a household manager or steward. In an imperial
    setting it can extend to administrative officials. 'Royal stewards' keeps the
    lexical core while fitting the court context; 'treasurers' would be too narrow.
- source_word: τοῖς ἐπάρχοις
  chosen: to the governors
  alternatives:
  - to the prefects
  - to the provincial rulers
  lexicon: LSJ
  rationale: ἐπάρχος commonly denotes a governor or provincial official. 'Governors'
    is the clearest accessible English equivalent.
- source_word: ἐδόξασαν
  chosen: they honored
  alternatives:
  - they glorified
  - they magnified
  lexicon: BDAG
  rationale: δοξάζω can mean 'glorify,' but here the object is 'the nation and the
    sanctuary,' not God directly. 'Honored' better fits the sense of showing public
    esteem or conferring distinction in this administrative context.
- source_word: τὸ ἔθνος
  chosen: the nation
  alternatives:
  - the people
  - the ethnic people
  lexicon: BDAG
  rationale: ἔθνος here refers to the Jewish people as a corporate national entity.
    'Nation' preserves that collective-political sense better than the more generic
    'people'.
- source_word: τὸ ἱερὸν
  chosen: the sanctuary
  alternatives:
  - the temple
  - the holy place
  lexicon: BDAG
  rationale: ἱερόν can denote the temple complex or sacred precinct. 'Sanctuary' preserves
    the sacred reference without forcing the broader architectural sense of 'temple';
    it also pairs well with 'nation' as a second honored entity.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the LORD
  lexicon: BDAG
  rationale: Following project doctrine, κύριος is rendered 'Lord.' Although the Hebrew
    parallel tradition often points to the divine name, this verse's primary witness
    is Greek and uses κύριος.
