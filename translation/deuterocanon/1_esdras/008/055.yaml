translation:
  text: And I set apart twelve men from the leaders of the priests, and Eserebias
    and Asoamias,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Eserebias likely corresponds to the Hebrew name Sherebiah in the parallel
      text.
    reason: alternative_reading
  - marker: b
    text: Asoamias likely corresponds to the Hebrew name Hashabiah in the parallel
      text.
    reason: alternative_reading
  - marker: c
