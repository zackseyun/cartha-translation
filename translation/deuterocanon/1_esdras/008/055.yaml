lexical_decisions:
- source_word: ἐχώρισα
  chosen: I set apart
  alternatives:
  - I separated
  - I selected
  lexicon: BDAG
  rationale: The verb means to separate or appoint out from a group. 'Set apart' preserves
    both the physical/separative sense and the formal appointing nuance in context.
- source_word: φυλάρχων
  chosen: leaders
  alternatives:
  - heads of families
  - tribal chiefs
  - chiefs
  lexicon: LSJ
  rationale: Literally 'tribe/clan leaders' or 'chiefs.' In this context with τῶν
    ἱερέων, it refers to leading men among the priestly group. 'Leaders' is clear
    modern English without overcommitting to a specific social structure.
- source_word: τῶν ἱερέων
  chosen: of the priests
  alternatives:
  - among the priests
  - from the priests
  lexicon: BDAG
  rationale: 'The genitive most naturally qualifies the preceding leaders: these are
    leaders belonging to the priests. ''Of the priests'' keeps the Greek structure
    and avoids adding interpretive specificity.'
- source_word: ἄνδρας δέκα δύο
  chosen: twelve men
  alternatives:
  - twelve men of them
  - twelve persons
  lexicon: BDAG
  rationale: ἄνδρας is specifically male, and the context concerns priestly representatives.
    'Twelve men' is gender-accurate and straightforward.
- source_word: Ἐσερεβίαν
  chosen: Eserebias
  alternatives:
  - Sherebiah
  rationale: Personal names are transliterated from the Greek source as the primary
    witness for 1 Esdras. The Hebrew parallel supports identification with Sherebiah,
    but the translation should remain anchored in the Greek form.
- source_word: Ἀσοαμίαν
  chosen: Asoamias
  alternatives:
  - Hashabiah
  rationale: As with Eserebias, the Greek source is primary, so the name is transliterated
    from Greek. The MT parallel suggests the corresponding Hebrew name Hashabiah,
    which is worth preserving in a footnote.
