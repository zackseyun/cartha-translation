theological_decisions:
- issue: Rendering κύριος
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: Per doctrine, κύριος is normally rendered 'Lord.' Here it refers to Israel's
    God in a Septuagintal setting, and 'Lord' preserves that usage without importing
    the Hebrew divine name into the English main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Interpretation of the divine title phrase Κυρίου τοῦ Ἰσραήλ
  chosen_reading: the Lord, the God of Israel
  alternative_readings:
  - the Lord of Israel
  rationale: The Greek wording is somewhat compressed, but the Hebrew parallel and
    common biblical title favor the fuller sense 'the God of Israel.' This is not
    a doctrinal expansion but an attempt to render the intended referent clearly in
    English.
  doctrine_reference: 'Translation philosophy: original-language primacy with use
    of parallel source as actual input'
