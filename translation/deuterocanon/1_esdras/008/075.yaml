theological_decisions:
- issue: Rendering the duplicated divine title κυρίου Κυρίου
  chosen_reading: the Lord, the Lord
  alternative_readings:
  - the Lord God
  rationale: The Greek source explicitly repeats κύριος. To preserve source transparency
    and avoid importing a smoother traditional rendering, the repetition is retained
    in English. This also respects the project's default rendering of κύριος as 'Lord.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation
    philosophy #1 and #5'
- issue: Metaphorical force of ῥίζαν καὶ ὄνομα
  chosen_reading: a root and a name
  alternative_readings:
  - a remnant and a name
  - survivors and standing
  rationale: The phrase carries covenantal-survival imagery. The main text preserves
    the metaphor rather than resolving it into interpretation; explanatory alternatives
    are suitable for a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 and #3'
