translation:
  text: In this matter let there be for us an oath to the Lord, to send away all our
    wives from among the foreigners, together with their children, as it has been
    decided by you, and by all who obey the law of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''as it has been decided by you, and those who will obey the law
      of the Lord.'' The clause is syntactically compressed in the Greek witness;
      the translation makes the implied sense explicit.'
    reason: textual_variant
  - marker: b
    text: Or 'to put away' or 'to cast out' for 'to send away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: In this matter
  alternatives:
  - In this
  - In this regard
  lexicon: LSJ
  rationale: Idiomatic introductory phrase marking the specific issue under discussion,
    better rendered in English as 'In this matter' than the overly bare 'In this.'
- source_word: γενέσθω ἡμῖν
  chosen: let there be for us
  alternatives:
  - let us make
  - let there be among us
  lexicon: LSJ
  rationale: The Greek uses γίνομαι with dative rather than a direct verb 'make';
    'let there be for us' preserves the form while remaining natural English.
- source_word: ὁρκωμοσία
  chosen: an oath
  alternatives:
  - a sworn agreement
  - an oath-taking
  lexicon: LSJ
  rationale: The noun denotes a sworn commitment. 'An oath' is the clearest concise
    rendering in context.
- source_word: πρὸς τὸν κύριον
  chosen: to the Lord
  alternatives:
  - before the Lord
  - toward the Lord
  lexicon: LSJ
  rationale: In oath context, πρὸς with the accusative can indicate relation/direction
    toward the one invoked. 'To the Lord' is straightforward and idiomatic; 'before
    the Lord' is possible but less directly tied to the preposition here.
- source_word: ἐκβαλεῖν
  chosen: to send away
  alternatives:
  - to cast out
  - to drive out
  - to put away
  lexicon: LSJ
  rationale: The infinitive expresses the content of the oath. 'Send away' preserves
    the force without sounding excessively violent; 'put away' is possible but less
    explicit for modern readers.
- source_word: πάσας τὰς γυναῖκας ἡμῶν
  chosen: all our wives
  alternatives:
  - all our women
  lexicon: LSJ
  rationale: Given the marital context of foreign marriages, γυναῖκες here means 'wives,'
    not merely 'women.'
- source_word: τὰς ἐκ τῶν ἀλλογενῶν
  chosen: from among the foreigners
  alternatives:
  - who are foreigners
  - of foreign peoples
  - from foreign nations
  lexicon: LSJ
  rationale: ἀλλογενής denotes one of another race/people. The phrase modifies the
    wives as being from foreign peoples. 'From among the foreigners' stays close to
    the Greek construction while remaining readable.
- source_word: σὺν τοῖς τέκνοις αὐτῶν
  chosen: together with their children
  alternatives:
  - with their children
  lexicon: LSJ
  rationale: σύν explicitly includes accompaniment; 'together with' slightly foregrounds
    that inclusion.
- source_word: ὡς ἐκρίθη σοι
  chosen: as it has been decided by you
  alternatives:
  - as you have judged
  - as was determined for you
  lexicon: LSJ
  rationale: The passive ἐκρίθη with dative σοι is somewhat awkward in English. In
    context it refers to Ezra's judgment/decision. 'As it has been decided by you'
    preserves the judicial sense without overinterpreting.
- source_word: καὶ ὅσοι πειθαρχήσουσιν
  chosen: and by all who will obey
  alternatives:
  - and as many as will obey
  - and those who will submit
  lexicon: LSJ
  rationale: The transmitted Greek is compressed after καί. The sense is that the
    decision aligns with those who obey the law. To produce coherent English from
    the Greek as given, 'and by all who will obey' supplies the implied parallel with
    the preceding phrase.
- source_word: τοῦ νόμου τοῦ κυρίου
  chosen: the law of the Lord
  alternatives:
  - the Lord's law
  lexicon: LSJ
  rationale: Standard and transparent rendering of the genitive construction; aligns
    with the project's default for κύριος as 'Lord'.
