theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek context
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this context it
    refers to Israel's God in covenantal/legal setting, so 'Lord' best preserves that
    register.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Ethnic descriptor ἀλλογενῶν
  chosen_reading: foreigners
  alternative_readings:
  - Gentiles
  - foreign women/of foreign peoples
  rationale: The term marks foreign ethnic origin rather than making a later Jew/Gentile
    theological distinction. 'Foreigners' is the least anachronistic and most transparent
    choice.
