translation:
  text: From the sons of Phoros, Tarosotomos; from the sons of Ietamar, Gamelos; from
    the sons of David,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek names here differ notably from the approximate MT parallel in
      Ezra 8:2, which reads: ''from the sons of Phinehas, Gershom; from the sons of
      Ithamar, Daniel; from the sons of David, Hattush.'' Because 1 Esdras is translated
      from the Greek witness, the main text preserves the Greek forms rather than
      harmonizing them to the Hebrew parallel.'
    reason: alternative_reading
  - marker: b
    text: The phrase 'from the sons of David,' is left open-ended because the Greek
      list continues in the following verse.
    reason: cross_reference
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  chosen: from the sons of
  alternatives:
  - of the sons of
  - from among the sons of
  lexicon: LSJ
  rationale: A standard genealogical/list formula. 'From the sons of' preserves the
    repeated Greek structure and signals selection from a family line without over-paraphrasing.
- source_word: Φορός
  chosen: Phoros
  alternatives:
  - Parosh
  lexicon: LSJ
  rationale: The Greek witness is primary for 1 Esdras, so the personal/family name
    is transliterated from Greek as 'Phoros.' The MT parallel points to Parosh, but
    the project philosophy prioritizes the Greek source while allowing the Hebrew
    parallel to inform recognition of the name.
- source_word: Ταροσότομος
  chosen: Tarosotomos
  alternatives:
  - a Greek corruption of a Hebrew name
  - Hattush (via MT parallel, not adopted in main text)
  lexicon: LSJ
  rationale: This proper name in the Greek appears divergent from the MT parallel
    tradition. Because the Zone 1 Greek is the anchor and confidence is high, the
    draft preserves the Greek form by transliteration rather than silently harmonizing
    to the Hebrew.
- source_word: Ἰεταμάρου
  chosen: Ietamar
  alternatives:
  - Ithamar
  lexicon: LSJ
  rationale: The Greek form reflects the well-known priestly name Ithamar. 'Ietamar'
    is a close transliteration of the Greek spelling; 'Ithamar' is a recognizable
    anglicized equivalent, but the draft stays closer to the source form here.
- source_word: Γάμηλος
  chosen: Gamelos
  alternatives:
  - Daniel (via MT parallel, not adopted in main text)
  lexicon: LSJ
  rationale: The Greek proper name differs from the MT parallel, which has Daniel.
    Since 1 Esdras is translated from Greek, the main text preserves the Greek name
    rather than conforming it to Ezra's Hebrew parallel.
- source_word: τῶν υἱῶν Δαυείδ
  chosen: from the sons of David,
  alternatives:
  - of the sons of David,
  lexicon: LSJ
  rationale: Although the extant Greek segment lacks an explicit repeated ἐκ immediately
    before this phrase, English idiom and the list pattern favor supplying 'from'
    for clarity and consistency. The trailing comma is retained because the verse
    is syntactically incomplete and continues into the next verse.
