translation:
  text: For Apsaras had great learning, so as to omit nothing from the law of the
    Lord and the commandments, teaching all Israel the statutes and the judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Apsaras.'' The Hebrew parallel context corresponds to Ezra, but
      the primary Greek witness here preserves the name in this form.'
    reason: alternative_reading
  - marker: b
    text: 'The Greek wording is compressed at the end; literally it runs along the
      lines of ''to leave out nothing from the law of the Lord and from the commandments,
      all Israel, statutes and judgments.'' The translation makes explicit the likely
      sense: that he instructed all Israel in these legal matters.'
    reason: textual_variant
lexical_decisions:
- source_word: Ἀψάρας
  chosen: Apsaras
  alternatives:
  - Ezra
  rationale: The Greek witness reads the personal name Ἀψάρας, a transliterated form
    distinct from the MT parallel's Ezra context. Following the stated philosophy,
    personal names are transliterated from the primary Greek source rather than harmonized
    to the Hebrew parallel.
- source_word: πολλὴν ἐπιστήμην περιεῖχεν
  chosen: had great learning
  alternatives:
  - possessed much knowledge
  - had extensive understanding
  lexicon: LSJ
  rationale: ἐπιστήμη denotes knowledge, understanding, or learning. The idiom περιέχειν
    with it conveys possessing or being endowed with such knowledge. 'Had great learning'
    is natural English while preserving the sense of substantial learned competence.
- source_word: εἰς τὸ μηδὲν παραλείπειν
  chosen: so as to leave out nothing
  alternatives:
  - so as to omit nothing
  - with the result that he neglected nothing
  lexicon: LSJ
  rationale: The construction expresses purpose or result. παραλείπειν means to leave
    out, omit, or neglect. 'Leave out nothing' keeps the comprehensive force and fits
    the following genitives.
- source_word: τῶν ἐκ τοῦ νόμου Κυρίου
  chosen: from the law of the Lord
  alternatives:
  - of the things from the law of the Lord
  - from the Lord's law
  lexicon: LSJ
  rationale: The phrase refers to matters deriving from the Lord's law. 'From the
    law of the Lord' is a clear, fairly formal rendering that preserves κύριος as
    'Lord' per doctrine.
- source_word: καὶ ἐκ τῶν ἐντολῶν
  chosen: and from the commandments
  alternatives:
  - and from the commands
  lexicon: LSJ
  rationale: ἐντολαί are commandments or commands. 'Commandments' better matches biblical
    legal diction alongside 'law,' 'statutes,' and 'judgments.'
- source_word: πάντα τὸν Ἰσραήλ
  chosen: all Israel
  alternatives:
  - the whole of Israel
  - all the Israelites
  lexicon: LSJ
  rationale: The accusative likely functions as the object of an implied or compressed
    teaching sense carried into the final apposition. 'All Israel' is the standard
    and natural rendering.
- source_word: δικαιώματα καὶ κρίματα
  chosen: the statutes and the judgments
  alternatives:
  - statutes and ordinances
  - righteous requirements and judgments
  - statutes and rules
  lexicon: LSJ
  rationale: These are standard legal terms in biblical Greek. 'Statutes and judgments'
    preserves the formal legal register and echoes traditional scriptural usage without
    excessive archaism.
