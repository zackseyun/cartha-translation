theological_decisions:
- issue: Compressed Greek syntax at the end of the verse
  chosen_reading: The final legal terms are understood as what Apsaras taught all
    Israel.
  alternative_readings:
  - The verse may be read more woodenly as 'to omit nothing ... for all Israel, statutes
    and judgments' without supplying 'teaching' explicitly.
  rationale: The Greek as transmitted is syntactically compressed and somewhat awkward,
    especially given the source-validation note of major mismatch and the MT parallel's
    divergence. To produce coherent English anchored in the Greek, the final accusative
    phrase is taken as the content communicated to Israel. This does not import new
    theology; it makes explicit the legal-instruction sense already implied by the
    context and vocabulary.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    uncertainty honestly'
