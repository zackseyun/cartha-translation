theological_decisions:
- issue: Rendering the divine address Κύριε
  chosen_reading: Lord
  alternative_readings:
  - O Lord
  rationale: The verse is a direct prayer to God. Following the project's contested-terms
    guidance, κύριος is rendered 'Lord.' No stronger covenantal marker such as 'the
    LORD' is present in the Greek vocative here.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Degree of literalness in κατὰ πρόσωπόν σου
  chosen_reading: before your face
  alternative_readings:
  - before you
  - in your presence
  rationale: The expression is semitic in flavor and theologically significant as
    a confession made directly in God's presence. The more literal rendering preserves
    that relational immediacy without becoming unintelligible.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening weight'
