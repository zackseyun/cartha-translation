translation:
  text: Lord, I am ashamed and humiliated before your face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before you' / 'in your presence.' The Greek reads literally 'before
      your face,' preserving a concrete Semitic-style expression for standing directly
      before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - O Lord
  lexicon: BDAG
  rationale: Vocative of κύριος. The default doctrinal rendering is 'Lord.' English
    can omit the vocative particle without loss; 'Lord' preserves direct address and
    gravity.
- source_word: ᾔσχυμμαι
  chosen: I am ashamed
  alternatives:
  - I am put to shame
  - I feel shame
  lexicon: LSJ
  rationale: Perfect/passive-form verb expressing a present state resulting from shame.
    'I am ashamed' is natural modern English and preserves the speaker's present condition.
- source_word: ἐντέτραμμαι
  chosen: humiliated
  alternatives:
  - disgraced
  - confounded
  - abashed
  lexicon: LSJ
  rationale: From ἐντρέπω in the perfect middle/passive, conveying being turned to
    shame or disgrace. Paired with ᾔσχυμμαι, it intensifies the confession. 'Humiliated'
    preserves the force without archaic diction; 'disgraced' is possible but slightly
    more external/public than the immediate prayer context requires.
- source_word: κατὰ πρόσωπόν σου
  chosen: before your face
  alternatives:
  - before you
  - in your presence
  lexicon: LSJ
  rationale: Literally 'according to/before your face.' The phrase denotes direct
    presence before God. 'Before your face' keeps the concrete imagery of the Greek
    and its Semitic background better than the smoother 'before you.'
