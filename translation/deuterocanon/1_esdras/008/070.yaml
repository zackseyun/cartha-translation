translation:
  text: And rising from the fasting, with his garments and the holy robe torn, he
    bent his knees and stretched out his hands to the Lord, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has a plural form, literally 'they were saying' or 'I was saying'
      depending on textual explanation; the context strongly points to Ezra introducing
      his prayer, so the English smooths this as 'saying.'
    reason: textual_variant
  - marker: b
    text: Or 'the sacred garment.' The Greek does not explicitly say 'priestly robe,'
      though the context may suggest official sacred attire.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεγερθείς
  chosen: rising
  alternatives:
  - having arisen
  - being roused
  lexicon: BDAG
  rationale: Aorist participle from ἐξεγείρω here introduces Ezra's movement from
    fasting to prayer. 'Rising' is natural English and preserves the participial sequence
    without overtranslating.
- source_word: ἐκ τῆς νηστείας
  chosen: from the fast
  alternatives:
  - from fasting
  - out of the fast
  lexicon: BDAG
  rationale: The phrase most naturally marks transition from the period/state of fasting.
    'From the fast' is concise and idiomatic while keeping the nominal force of νηστεία.
- source_word: διερρηγμένα ἔχων
  chosen: with ... torn
  alternatives:
  - having ... torn
  - wearing ... torn
  lexicon: BDAG
  rationale: Periphrastic expression describing Ezra's condition. 'With ... torn'
    reads smoothly in English and preserves the stative/resultative sense of the perfect
    participle.
- source_word: τὰ ἱμάτια
  chosen: garments
  alternatives:
  - clothes
  - robes
  lexicon: BDAG
  rationale: ἱμάτια is a general term for clothing/outer garments. 'Garments' fits
    the solemn register better than 'clothes' and avoids confusion with the distinct
    following term for sacred attire.
- source_word: τὴν ἱερὰν ἐσθῆτα
  chosen: the holy robe
  alternatives:
  - the sacred garment
  - the priestly robe
  lexicon: BDAG
  rationale: ἱερά means sacred/holy, and ἐσθής is a garment or robe. 'Holy robe' preserves
    the explicit sacred quality. 'Priestly robe' would be interpretive beyond the
    wording, though the context suggests official sacred dress.
- source_word: κάμψας τὰ γόνατα
  chosen: he bent his knees
  alternatives:
  - kneeling
  - having bent his knees
  lexicon: BDAG
  rationale: This is a conventional gesture of prayer. 'He bent his knees' stays close
    to the Greek while remaining readable; 'kneeling' is possible but less formally
    transparent.
- source_word: ἐκτείνας τὰς χεῖρας
  chosen: stretched out his hands
  alternatives:
  - spread out his hands
  - extended his hands
  lexicon: BDAG
  rationale: A standard prayer posture. 'Stretched out his hands' is idiomatic and
    vivid.
- source_word: πρὸς τὸν κύριον
  chosen: to the Lord
  alternatives:
  - toward the Lord
  lexicon: BDAG
  rationale: Following project default, κύριος is rendered 'Lord.' With verbs of prayer
    and gesture, English idiom prefers 'to the Lord.'
- source_word: ἔλεγον
  chosen: saying
  alternatives:
  - I was saying
  - he said
  lexicon: BDAG
  rationale: Although the form is plural in Swete's text, the context and parallel
    prayer scene indicate introduction to the ensuing speech by Ezra. Rendering as
    'saying' avoids forcing an awkward number issue into English while honestly preserving
    the speech-introduction function; the anomaly is noted in a footnote as a textual
    issue.
