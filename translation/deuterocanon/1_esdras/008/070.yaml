theological_decisions:
- issue: Rendering κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project default for κύριος is 'Lord.' In this prayer context it functions
    as the reverential divine title, not merely a social superior.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to specify the sacred garment as priestly
  chosen_reading: the holy robe
  alternative_readings:
  - the priestly robe
  - the sacred garment
  rationale: The Greek explicitly marks the garment as sacred but does not itself
    specify 'priestly.' The translation preserves the text's wording without importing
    a stronger institutional claim.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
