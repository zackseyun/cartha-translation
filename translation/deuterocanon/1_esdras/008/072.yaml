translation:
  text: For our sins have multiplied beyond our heads, and our ignorances have risen
    up to heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our errors,' 'our unwitting sins,' or 'our acts of ignorance.' The Greek
      distinguishes this term from 'sins' in the previous clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁμαρτίαι
  chosen: sins
  alternatives:
  - offenses
  - transgressions
  lexicon: BDAG
  rationale: The standard sense is moral failings or sins. 'Sins' is the most direct
    and natural English equivalent here.
- source_word: ἐπλεόνασαν
  chosen: have multiplied
  alternatives:
  - have increased
  - have become many
  lexicon: BDAG
  rationale: The verb conveys increase in quantity. 'Have multiplied' preserves the
    vivid image and fits the metaphor of sins piling up beyond the head.
- source_word: ὑπὲρ τὰς κεφαλὰς ἡμῶν
  chosen: beyond our heads
  alternatives:
  - above our heads
  - over our heads
  lexicon: BDAG
  rationale: This is an idiomatic image of overwhelming guilt. 'Beyond our heads'
    stays close to the Greek while remaining intelligible in English. 'Over our heads'
    is possible but can sound more colloquial and less concrete.
- source_word: ἄγνοιαι
  chosen: ignorances
  alternatives:
  - acts of ignorance
  - unwitting sins
  - errors
  lexicon: BDAG
  rationale: The noun denotes ignorance or wrongdoing done in ignorance. 'Ignorances'
    is somewhat unusual in English, but it preserves the lexical distinction from
    'sins' in the Greek rather than collapsing both into the same term. Because the
    plural can sound awkward, alternatives are noted.
- source_word: ὑπερήνεγκαν
  chosen: have risen up
  alternatives:
  - have reached
  - have mounted up
  - have gone up
  lexicon: LSJ
  rationale: In context the verb expresses upward extension to heaven. 'Have risen
    up' preserves the vertical imagery and avoids flattening the metaphor into the
    more ordinary 'have reached.'
- source_word: ἕως τοῦ οὐρανοῦ
  chosen: to heaven
  alternatives:
  - unto heaven
  - to the sky
  lexicon: BDAG
  rationale: '''Heaven'' is the natural biblical rendering and matches the moral-theological
    register of the verse better than ''sky''.'
