theological_decisions:
- issue: Whether to collapse ἁμαρτίαι and ἄγνοιαι into a single English category of
    wrongdoing
  chosen_reading: 'Maintain a distinction: ''sins'' and ''ignorances.'''
  alternative_readings:
  - Render both broadly as 'sins' or 'guilt'
  rationale: The Greek uses two different terms, likely for rhetorical intensification
    and possibly to distinguish deliberate sins from offenses arising from ignorance.
    Preserving the distinction best fits the source-text transparency goal, even if
    the second term is less idiomatic in English.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 5
