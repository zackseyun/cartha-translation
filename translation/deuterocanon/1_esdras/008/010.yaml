theological_decisions:
- issue: Use of the MT parallel despite major mismatch
  chosen_reading: Translate the extant Greek royal decree as the main text, while
    allowing the MT parallel to confirm that this verse belongs to a context of Ezra's
    mission rather than importing the MT wording.
  alternative_readings:
  - Replace the Greek with the MT-parallel sense about Ezra setting his heart to study
    the law
  rationale: The project instructions require original-language primacy for the Zone
    1 witness. Here the Greek plainly contains a royal authorization formula, while
    the supplied MT parallel reflects a different verse/context. Because the mismatch
    is major, the translation must stay anchored in the Greek and note uncertainty
    rather than harmonize to the Hebrew.
  doctrine_reference: Translation philosophy §1; PHILOSOPHY.md on Swete LXX primacy
    for 1 Esdras with MT used as cross-reference
