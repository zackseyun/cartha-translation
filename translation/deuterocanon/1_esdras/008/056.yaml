translation:
  text: And with them, from their brothers, ten men. And I weighed out to them the
    silver and the gold and the holy vessels of the house of our Lord, which the king
    and his counselors and the nobles and all Israel had given as a gift.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''I set/placed before them''; the Hebrew parallel reads ''I weighed
      out to them,'' which fits the context of silver, gold, and vessels being entrusted.'
    reason: textual_variant
  - marker: b
    text: Or 'ten of their brothers.' The Greek literally says 'from their brothers,
      ten men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετʼ αὐτῶν ... ἄνδρας δέκα
  chosen: And with them, from their brothers, ten men
  alternatives:
  - And with them ten men from their brothers
  - And with them, ten of their brothers
  lexicon: LSJ
  rationale: The Greek is somewhat abrupt and appositional. I preserved the sequence
    and explicit ἄνδρας ('men') rather than smoothing too far. 'From their brothers'
    reflects ἐκ τῶν ἀδελφῶν αὐτῶν; in this context it likely means fellow Levites/kinsmen,
    but the literal wording is retained.
- source_word: ἔστησα αὐτοῖς
  chosen: I weighed out to them
  alternatives:
  - I assigned to them
  - I set before them
  lexicon: LSJ
  rationale: The MT parallel has ואשקלה על־ידם ('I weighed out into their hand'),
    indicating a weighing/entrusting of valuables. Although the Greek form as transmitted
    reads ἔστησα, the context of silver, gold, and vessels strongly supports the sense
    of formally weighing out or entrusting. This is a source-level tension, so the
    main text follows the combined Greek-context-plus-MT-parallel sense rather than
    a wooden 'I set'.
- source_word: τὸ ἀργύριον καὶ τὸ χρυσίον
  chosen: the silver and the gold
  alternatives:
  - the money and the gold
  lexicon: LSJ
  rationale: Standard material terms; 'silver' and 'gold' are more precise than 'money'
    here because weighed precious metals are in view.
- source_word: τὰ ἱερὰ σκεύη
  chosen: the holy vessels
  alternatives:
  - the sacred vessels
  - the consecrated articles
  lexicon: LSJ
  rationale: σκευή/σκεῦος here refers to temple implements. 'Holy vessels' is concise,
    natural, and preserves cultic force.
- source_word: τοῦ οἴκου τοῦ κυρίου ἡμῶν
  chosen: of the house of our Lord
  alternatives:
  - of the house of the Lord our God
  - of our Lord's house
  lexicon: LSJ
  rationale: The Greek explicitly has 'our Lord,' not 'our God.' Per doctrine, κύριος
    is rendered 'Lord.' 'House' is retained as standard temple language.
- source_word: οὕτως ἐδωρήσατο
  chosen: had given as a gift
  alternatives:
  - presented
  - donated
  - bestowed
  lexicon: LSJ
  rationale: 'The verb denotes giving as a gift. English pluperfect ''had given''
    fits the narrative sense: these are the items now being weighed out because they
    were previously donated.'
- source_word: οἱ σύμβουλοι ... οἱ μεγιστᾶνες
  chosen: his counselors and the nobles
  alternatives:
  - his advisers and the magnates
  - his counselors and the great men
  lexicon: LSJ
  rationale: σύμβουλοι are royal advisers/counselors; μεγιστᾶνες are high-ranking
    nobles or grandees. 'Nobles' is readable modern English without losing status.
