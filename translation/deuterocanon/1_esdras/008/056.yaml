theological_decisions:
- issue: Rendering κύριος in a temple-context phrase
  chosen_reading: our Lord
  alternative_readings:
  - the LORD
  - our Master
  rationale: The source text reads κυρίου ἡμῶν. Per doctrine, κύριος defaults to 'Lord.'
    Because this is a Greek deuterocanonical text rather than direct Hebrew YHWH in
    this verse, 'our Lord' is preferred over 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Handling the Greek-MT mismatch around ἔστησα / 'I weighed out'
  chosen_reading: I weighed out to them
  alternative_readings:
  - I set before them
  - I assigned to them
  rationale: The verse is flagged major_mismatch, and the MT parallel clearly preserves
    the weighing action. Since the Greek context also lists weighed valuables, the
    translation adopts the likely intended sense while documenting the lexical tension
    and preserving the more literal alternative in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: use parallel MT for 1 Esdras as actual translation
    input while keeping Greek primary'
