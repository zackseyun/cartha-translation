translation:
  text: Stay awake and guard them until you hand them over to the chiefs of the priests
    and the Levites and to the heads of the fathers’ houses of Israel in Jerusalem,
    in the chambers of the house of our Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Keep watch and guard them.' The opening pair of verbs emphasizes vigilant
      custody.
    reason: lexical_alternative
  - marker: b
    text: '''Chambers'' refers to rooms in the temple complex; the Hebrew parallel
      has ''rooms/chambers'' (lishkoth).'
    reason: cross_reference
lexical_decisions:
- source_word: ἀγρυπνεῖτε
  chosen: Stay awake
  alternatives:
  - Keep watch
  - Be vigilant
  lexicon: BDAG
  rationale: The verb means to be sleepless/watchful. 'Stay awake' preserves the concrete
    force, while also fitting the paired command with φυλάσσετε. The MT parallel שקדו
    supports an alert, watchful sense.
- source_word: φυλάσσετε
  chosen: guard
  alternatives:
  - keep
  - watch over
  lexicon: BDAG
  rationale: In context of entrusted temple valuables, the sense is protective custody
    rather than mere observance. 'Guard' brings out the practical duty. The Hebrew
    parallel ושמרו likewise supports guarding/keeping.
- source_word: ἕως τοῦ παραδοῦναι
  chosen: until you hand ... over
  alternatives:
  - until you deliver
  - until you give over
  lexicon: BDAG
  rationale: The construction marks the endpoint of their watchfulness. 'Hand over'
    is idiomatic modern English and fits the transfer of custody.
- source_word: αὐτά
  chosen: them
  alternatives:
  - these things
  - the items
  lexicon: BDAG
  rationale: The pronoun refers to the previously listed sacred valuables. 'Them'
    is natural English; the object is clear from context without adding explanatory
    wording into the main text.
- source_word: φυλάρχοις
  chosen: chiefs
  alternatives:
  - leaders
  - tribal chiefs
  - officers
  lexicon: LSJ
  rationale: The Greek term denotes leaders/chiefs. Since the phrase is immediately
    qualified by 'of the priests and the Levites,' 'chiefs' is concise and avoids
    over-specifying a tribal sense that may mislead here.
- source_word: ἡγουμένοις
  chosen: heads
  alternatives:
  - leaders
  - chief men
  lexicon: BDAG
  rationale: Used with τῶν πατριῶν, it refers to those leading ancestral houses. 'Heads'
    matches the social-kinship structure and aligns with the Hebrew parallel שרי האבות.
- source_word: πατριῶν
  chosen: fathers’ houses
  alternatives:
  - ancestral houses
  - family houses
  lexicon: LSJ
  rationale: This is a technical kinship term for paternal households/clans. 'Fathers’
    houses' preserves the source structure more transparently than a flattened 'families.'
- source_word: παστοφορίοις
  chosen: chambers
  alternatives:
  - storerooms
  - side rooms
  - treasuries
  lexicon: LSJ
  rationale: The term refers to rooms/chambers associated with the temple complex.
    The MT parallel הלשכות strongly supports 'chambers' or 'rooms.' 'Chambers' is
    broad enough to fit the Greek while remaining close to the Hebrew parallel.
- source_word: τοῦ οἴκου τοῦ κυρίου ἡμῶν
  chosen: the house of our Lord
  alternatives:
  - the house of the Lord our God
  - the temple of our Lord
  lexicon: BDAG
  rationale: The Greek explicitly reads 'of our Lord' rather than 'of the Lord' alone.
    'House' preserves the temple idiom. 'Temple' was possible dynamically, but 'house'
    better reflects the source wording.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' This also matches the reverential
    temple context.
