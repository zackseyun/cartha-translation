theological_decisions:
- issue: Temple terminology in τοῦ οἴκου τοῦ κυρίου ἡμῶν
  chosen_reading: the house of our Lord
  alternative_readings:
  - the temple of our Lord
  - the house of the Lord our God
  rationale: The Greek source is primary and reads 'our Lord.' The MT parallel has
    'house of YHWH,' which confirms temple reference but does not override the Greek
    wording in 1 Esdras. The translation preserves the Greek's explicit possessive
    and title while keeping the temple idiom.
  doctrine_reference: 'Translation philosophy: original-language primacy; contested
    terms table for κύριος → Lord'
- issue: Kinship structure in τῶν πατριῶν
  chosen_reading: fathers’ houses
  alternative_readings:
  - families
  - ancestral houses
  rationale: This is not merely generic 'families' but a formal ancestral-household
    structure. The more literal rendering preserves the social organization reflected
    in both Greek and Hebrew parallel without importing extra interpretation.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception'
