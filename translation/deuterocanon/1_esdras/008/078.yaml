translation:
  text: but he has shown us favor before the kings of Persia, to give us sustenance
    and to glorify our sanctuary and to raise up desolate Zion, to give us a stronghold
    in Judea and Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'firm footing' or 'security' in Judea and Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν ἡμᾶς ἐν χάριτι ἐνώπιον
  chosen: has shown us favor before
  alternatives:
  - has made us objects of favor before
  - has dealt graciously with us before
  lexicon: BDAG
  rationale: The idiom ἐποίησεν ... ἐν χάριτι conveys causing someone to be in favor/grace
    before another. 'Has shown us favor before' is idiomatic English while preserving
    the relational sense of receiving grace in the sight of the Persian kings.
- source_word: τῶν βασιλέων Περσῶν
  chosen: the kings of Persia
  alternatives:
  - the Persian kings
  lexicon: BDAG
  rationale: A straightforward genitival construction. 'Kings of Persia' keeps the
    Greek order and echoes the historical setting.
- source_word: δοῦναι ἡμῖν τροφήν
  chosen: to give us sustenance
  alternatives:
  - to give us food
  - to provide for us
  lexicon: BDAG
  rationale: τροφή can mean food or nourishment/provision. 'Sustenance' preserves
    the concrete sense while fitting the broader idea of royal support better than
    the narrower 'food.'
- source_word: δοξάσαι τὸ ἱερὸν ἡμῶν
  chosen: to glorify our sanctuary
  alternatives:
  - to honor our temple
  - to adorn our holy place
  lexicon: BDAG
  rationale: ἱερόν refers to the sanctuary/temple precinct, and δοξάζω here carries
    the sense of honoring or bringing splendor to it. 'Glorify our sanctuary' stays
    close to the Greek while remaining intelligible.
- source_word: ἐγεῖραι τὴν ἔρημον Σειών
  chosen: to raise up desolate Zion
  alternatives:
  - to rebuild deserted Zion
  - to restore ruined Zion
  lexicon: BDAG
  rationale: ἐγείρω can mean raise up or restore; ἔρημος means desolate, deserted.
    'Raise up desolate Zion' preserves the metaphorical force and avoids over-specifying
    physical rebuilding, though restoration is clearly implied.
- source_word: στερέωμα
  chosen: a stronghold
  alternatives:
  - firm footing
  - security
  - stability
  lexicon: LSJ
  rationale: στερέωμα can denote firmness, support, or something made firm. In this
    restoration context, 'a stronghold' captures the concrete-political sense of secure
    establishment in Judea and Jerusalem, while 'firm footing' is possible but less
    natural here.
- source_word: ἐν τῇ Ἰουδαίᾳ καὶ Ἰερουσαλήμ
  chosen: in Judea and Jerusalem
  alternatives:
  - in Judah and Jerusalem
  lexicon: BDAG
  rationale: Given the Persian-period setting and the Greek form Ἰουδαία, 'Judea'
    is the more natural geographical rendering in English, while preserving Jerusalem
    unchanged.
