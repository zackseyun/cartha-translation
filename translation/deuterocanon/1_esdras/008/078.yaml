theological_decisions:
- issue: Rendering of Σειών
  chosen_reading: Zion
  alternative_readings:
  - Sion
  rationale: Standard English biblical usage is 'Zion.' This is a transliterated place-name
    rather than a theological reinterpretation.
  doctrine_reference: Translate titles; transliterate names.
- issue: Nuance of στερέωμα in a restoration prayer
  chosen_reading: a stronghold
  alternative_readings:
  - security
  - firm footing
  rationale: The verse speaks of divine favor resulting in concrete restoration under
    Persian rule. 'Stronghold' best preserves the sense of secure establishment without
    flattening the imagery into an abstract noun. Because the term is somewhat flexible,
    alternatives are preserved in a footnote.
  doctrine_reference: Consistency of key terms, or documented exception.
