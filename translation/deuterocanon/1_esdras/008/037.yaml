translation:
  text: 'From the sons of Baer: Zechariah son of Bemaiah, and with him twenty-eight
    men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek names in this verse differ notably from the approximate Hebrew
      parallel (Ezra 8:9), which reads 'from the sons of Joab, Obadiah son of Jehiel,
      and with him two hundred and eighteen males.' Because 1 Esdras is translated
      here from the Greek witness, the Greek names and number are followed in the
      main text.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τῶν Βαήρ
  chosen: From the sons of Baer
  alternatives:
  - From Baer
  - Of the family of Baer
  lexicon: LSJ
  rationale: The Greek phrase literally reads 'from the Baer,' and in this list context
    it functions as a family/clan designation. The MT parallel has a different name
    and wording, but the Greek is the primary source for 1 Esdras, so the family sense
    is retained in English by supplying 'sons of' for clarity.
- source_word: Ζαχαρίαι
  chosen: Zechariah
  alternatives:
  - Zacharias
  lexicon: LSJ
  rationale: Standard English transliteration of the Greek form of the personal name;
    'Zechariah' best matches familiar OT name conventions.
- source_word: Βημαί
  chosen: son of Bemaiah
  alternatives:
  - Bemai
  - of Bema
  lexicon: LSJ
  rationale: The bare Greek proper name likely represents a patronymic element in
    this genealogical list. Because the MT parallel uses an explicit 'son of' construction
    and the list style regularly identifies individuals by father, 'son of Bemaiah'
    makes the relationship clear while preserving the Greek name in transliterated
    form. The ending is adapted to standard English biblical-name style.
- source_word: καὶ μετʼ αὐτοῦ
  chosen: and with him
  alternatives:
  - and accompanying him
  - together with him
  lexicon: LSJ
  rationale: A straightforward rendering of the accompaniment phrase in a census/list
    context.
- source_word: ἄνδρες εἴκοσι ὀκτώ
  chosen: twenty-eight men
  alternatives:
  - twenty-eight males
  lexicon: LSJ
  rationale: ἄνδρες in this enrollment context refers to adult male persons. 'Men'
    is natural, accurate English and aligns with the Greek's masculine specificity.
