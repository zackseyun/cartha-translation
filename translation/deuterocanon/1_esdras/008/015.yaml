translation:
  text: so as to offer sacrifices on the altar of their Lord, the one in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel reads 'the house of their God that is in Jerusalem'
      in the surrounding context and supports the referent as Israel's God; the Greek
      here specifically says 'the altar of their Lord, the one in Jerusalem.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  chosen: so as to
  alternatives:
  - so that
  - with the result that
  lexicon: BDAG
  rationale: Introduces purpose/result. In this administrative context, 'so as to'
    captures intended purpose without overstating consequence.
- source_word: προσενεγκεῖν
  chosen: to bring
  alternatives:
  - to offer
  - to present
  lexicon: BDAG
  rationale: The infinitive refers to cultic presentation of sacrifices. 'Bring' is
    slightly more literal here, while the sacrificial object makes the cultic sense
    clear in English.
- source_word: θυσίας
  chosen: sacrifices
  alternatives:
  - offerings
  lexicon: BDAG
  rationale: Standard cultic term for sacrificial offerings. 'Sacrifices' is the clearest
    and most direct rendering in altar context.
- source_word: ἐπὶ τὸ θυσιαστήριον
  chosen: upon the altar
  alternatives:
  - on the altar
  - at the altar
  lexicon: BDAG
  rationale: ἐπί with the accusative here naturally indicates movement toward/onto
    the altar in sacrificial action. 'Upon the altar' preserves the formal cultic
    sense.
- source_word: τοῦ κυρίου αὐτῶν
  chosen: of their Lord
  alternatives:
  - of their master
  - of the Lord their God
  lexicon: BDAG
  rationale: κύριος defaults to 'Lord' per doctrine. The Greek text here has 'their
    Lord' without an explicit θεός; although the MT parallel has 'their God,' the
    translation remains anchored to the Greek while allowing the Semitic parallel
    to confirm the possessive sense.
- source_word: τὸ ἐν Ἰερουσαλήμ
  chosen: the one in Jerusalem
  alternatives:
  - which is in Jerusalem
  - that is in Jerusalem
  lexicon: BDAG
  rationale: The article with prepositional phrase specifies which altar is meant.
    'The one in Jerusalem' is natural modern English and preserves the restrictive
    force.
