translation:
  text: And after these things, in the reign of Artaxerxes king of the Persians, Ezra
    son of Azariah, son of Zechariah, son of Chelkiah, son of Shallum, came up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''king of the Persians''; the Hebrew parallel in Ezra 7:1 reads
      ''king of Persia.'' The main text follows the Greek source of 1 Esdras.'
    reason: alternative_reading
  - marker: b
    text: Greek 'Chelkiah' corresponds to the name more commonly rendered 'Hilkiah'
      in the Hebrew parallel.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταγενέστερος τούτων ἐστίν
  chosen: after these things
  alternatives:
  - later than these things
  - subsequent to these things
  lexicon: LSJ
  rationale: The Greek phrase is somewhat compressed and idiomatic. In context it
    introduces a chronological transition, and the MT parallel וְאַחַר הַדְּבָרִים
    הָאֵלֶּה supports the natural rendering 'after these things' rather than a more
    wooden 'later than these is he/it.' This preserves the narrative function in readable
    English while remaining anchored in the Greek and Semitic parallel.
- source_word: βασιλεύοντος Ἀρταξέρξου
  chosen: in the reign of Artaxerxes
  alternatives:
  - while Artaxerxes was reigning
  - when Artaxerxes reigned
  lexicon: LSJ
  rationale: The genitive absolute marks the time setting. 'In the reign of' is idiomatic
    English for this construction and aligns with the MT parallel בְּמַלְכוּת אַרְתַּחְשַׁסְתְּא.
- source_word: τοῦ βασιλέως Περσῶν
  chosen: king of the Persians
  alternatives:
  - king of Persia
  lexicon: LSJ
  rationale: The Greek is explicitly plural, 'of the Persians,' whereas the MT parallel
    has the singular 'king of Persia.' Because the Greek is the primary source for
    1 Esdras, the translation preserves the Greek wording rather than harmonizing
    to the MT.
- source_word: προσέβη
  chosen: came up
  alternatives:
  - went up
  - ascended
  lexicon: LSJ
  rationale: In Ezra-related narrative, this verb commonly denotes travel up to Jerusalem.
    'Came up' is a natural English rendering that preserves the directional nuance
    without overformalizing. 'Went up' is also possible, but 'came up' fits the narrative
    presentation from the writer's perspective.
- source_word: Ἔσρας
  chosen: Ezra
  rationale: Standard English transliteration of the personal name.
- source_word: Ἀζαραίου
  chosen: Azariah
  alternatives:
  - Azaraias
  rationale: The Greek form corresponds to the Hebrew parallel עֲזַרְיָה. Using the
    familiar Semitic-form English name 'Azariah' reflects the parallel source and
    standard biblical name convention.
- source_word: Ζεχρίου
  chosen: Zechariah
  alternatives:
  - Zecharias
  rationale: The Greek form reflects the well-known biblical name; 'Zechariah' is
    the standard English transliteration.
- source_word: Χελκείου
  chosen: Chelkiah
  alternatives:
  - Hilkiah
  rationale: The Greek witness reads a form naturally transliterated 'Chelkiah.' The
    MT parallel has Hilkiah. Because the Greek is primary, the main text follows the
    Greek-form transliteration, while the more familiar Hebrew-form equivalent is
    worth preserving as an alternative.
- source_word: Σαλήμου
  chosen: Shallum
  alternatives:
  - Salem
  - Salum
  rationale: The Greek form likely reflects the same name as Hebrew שַׁלּוּם in the
    parallel genealogical tradition. 'Shallum' best represents the underlying biblical
    name in English, using the parallel source as a control on proper-name identification.
