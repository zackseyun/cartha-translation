translation:
  text: And the priests and the Levites who had received the silver and the gold and
    the vessels brought them into the temple of the Lord in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel reads, 'to bring [them] to Jerusalem, to the house of
      our God.' The Greek of 1 Esdras instead reads, 'brought [them] ... into the
      temple of the Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: παραλαβόντες
  chosen: who had received
  alternatives:
  - having received
  - who received
  - who had taken charge of
  lexicon: BDAG
  rationale: The aorist participle describes the priests and Levites as those who
    first received the entrusted items and then brought them. 'Who had received' makes
    the sequence clear in natural English. The MT parallel וְקִבְּלוּ likewise supports
    'received' rather than a stronger 'took.'
- source_word: οἱ ἱερεῖς καὶ οἱ Λευεῖται
  chosen: the priests and the Levites
  alternatives:
  - the priests and Levites
  lexicon: BDAG
  rationale: A straightforward rendering of the coordinated groups. Keeping both articles
    in English preserves the sense of two recognized classes of temple personnel.
- source_word: τὸ ἀργύριον καὶ τὸ χρυσίον
  chosen: the silver and the gold
  alternatives:
  - the silver and gold
  - the money and the gold
  lexicon: BDAG
  rationale: The Greek names the metals directly, and the MT parallel הַכֶּסֶף וְהַזָּהָב
    confirms this. 'Money' would over-interpret the form of the valuables.
- source_word: τὰ σκεύη
  chosen: the vessels
  alternatives:
  - the utensils
  - the articles
  - the implements
  lexicon: BDAG
  rationale: In temple context, 'vessels' is the standard and suitably broad term
    for sacred objects or containers. It preserves cultic specificity better than
    the more generic 'articles.'
- source_word: ἤνεγκαν
  chosen: brought
  alternatives:
  - carried
  - carried in
  lexicon: BDAG
  rationale: A natural rendering of the aorist verb of transport. 'Brought' fits the
    movement toward Jerusalem and the sanctuary without over-specifying manner.
- source_word: εἰς τὸ ἱερὸν τοῦ κυρίου
  chosen: into the temple of the Lord
  alternatives:
  - to the sanctuary of the Lord
  - into the holy place of the Lord
  lexicon: BDAG
  rationale: ἱερόν ordinarily denotes the temple precinct or temple as a sacred complex.
    'Temple' is the clearest modern equivalent. The Greek says 'of the Lord,' while
    the MT parallel has 'the house of our God'; because the Greek is the primary witness
    for 1 Esdras, the main text follows the Greek wording.
- source_word: ἐν Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - in Jerusalem
  lexicon: BDAG
  rationale: Although the Greek text places ἐν Ἰερουσαλήμ before ἤνεγκαν, the MT parallel
    explicitly has 'to bring to Jerusalem,' and the sense in context is destination
    rather than static location. Rendering it as 'to Jerusalem' best accounts for
    the combined evidence while remaining faithful to the Greek line of movement.
