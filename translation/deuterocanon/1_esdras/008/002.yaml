translation:
  text: son of Saddoulouk, son of Acheitob, son of Amartheios, son of Ozeias, son
    of Bokka, son of Abeisai, son of Phinees, son of Eleazar, son of Aaron the first
    priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek text here gives a fuller genealogy than the brief Hebrew parallel,
      which reads: ''son of Shallum, son of Zadok, son of Ahitub.'''
    reason: alternative_reading
  - marker: b
    text: 'Several names here reflect Greek forms of more familiar Hebrew names: Acheitob
      = Ahitub, Ozeias = Uzzi, Bokka = Bukki, Abeisai = Abishua, Phinees = Phinehas.'
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'the first high priest,' though the Greek word is simply 'priest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ
  chosen: son of
  alternatives:
  - of
  lexicon: LSJ
  rationale: In this genealogical chain, repeated genitives function elliptically
    for descent. The MT parallel explicitly has בֶּן־ ('son of') in the corresponding
    genealogy, so rendering each genitive as 'son of' makes the relationship clear
    in natural English while remaining anchored in the Greek construction.
- source_word: Σαδδουλούκου
  chosen: Saddoulouk
  alternatives:
  - Saddoukos
  - Shallum
  lexicon: LSJ
  rationale: Personal names are transliterated rather than translated. The Greek form
    differs from the MT parallel name Shallum; because the Greek is the primary source
    for 1 Esdras, the main text follows the Greek transliteration, while the Hebrew-parallel
    form is preserved in a footnote.
- source_word: Ἀχειτὼβ
  chosen: Acheitob
  alternatives:
  - Achitob
  - Ahitub
  lexicon: LSJ
  rationale: Transliterated directly from the Greek form, with the more familiar Hebrew/English
    form 'Ahitub' preserved as an alternative in a footnote due to the MT parallel.
- source_word: Ἀμαρθείου
  chosen: Amartheios
  alternatives:
  - Amariah
  lexicon: LSJ
  rationale: The Greek witness includes this additional ancestor not present in the
    brief MT parallel cited here. The translation preserves the Greek name by transliteration
    rather than harmonizing to the Hebrew tradition.
- source_word: Ὀζείου
  chosen: Ozeias
  alternatives:
  - Uzzi
  lexicon: LSJ
  rationale: Transliterated from the Greek form. 'Uzzi' reflects the Hebrew-related
    equivalent, but the Greek form is retained in the main text because Swete LXX
    is the base text.
- source_word: Βοκκὰ
  chosen: Bokka
  alternatives:
  - Bukki
  lexicon: LSJ
  rationale: Transliterated from Greek; the Hebrew-related form 'Bukki' is a recognizable
    equivalent but not adopted in the main text.
- source_word: Ἀβεισαὶ
  chosen: Abeisai
  alternatives:
  - Abishua
  lexicon: LSJ
  rationale: Transliterated from the Greek form. The Hebrew-related equivalent 'Abishua'
    is preserved as an alternative only.
- source_word: Φεινεὲς
  chosen: Phinees
  alternatives:
  - Phinehas
  lexicon: LSJ
  rationale: The Greek form is transliterated consistently. 'Phinehas' is the conventional
    English form from Hebrew and is worth preserving as an alternative in a footnote.
- source_word: Ἐλεαζὰρ
  chosen: Eleazar
  lexicon: LSJ
  rationale: This Greek form corresponds closely to the familiar English transliteration
    'Eleazar,' so the standard English form is used.
- source_word: Ἀαρὼν
  chosen: Aaron
  lexicon: LSJ
  rationale: Standard English transliteration of the Greek form of the well-known
    personal name.
- source_word: τοῦ πρώτου ἱερέως
  chosen: the first priest
  alternatives:
  - the chief priest
  - the first high priest
  lexicon: LSJ
  rationale: πρῶτος means 'first,' and ἱερεύς means 'priest.' The phrase most naturally
    identifies Aaron as the first priest in the genealogical line. 'High priest' would
    import ἀρχιερεύς, which is not the wording here, though that sense may be implied
    historically.
