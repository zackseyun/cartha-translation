theological_decisions:
- issue: Whether to harmonize the genealogy to the shorter MT parallel (Shallum, Zadok,
    Ahitub) or preserve the fuller Greek sequence
  chosen_reading: Preserve the fuller Greek genealogy in the main text
  alternative_readings:
  - A harmonized rendering closer to the MT parallel
  rationale: The project's source policy gives primacy to the Greek text for 1 Esdras,
    while the MT parallel serves as a sanity check. Since the Greek here clearly presents
    a longer ancestral chain, the translation should not collapse it into the Hebrew
    parallel. The MT-related forms are preserved in footnotes where useful.
  doctrine_reference: 'PHILOSOPHY.md: WLC MT parallels for 1 Esdras; Translation philosophy
    #1 original-language primacy over translation tradition'
- issue: Whether to render ἱερεύς as 'priest' or 'high priest' in the phrase about
    Aaron
  chosen_reading: priest
  alternative_readings:
  - high priest
  rationale: The Greek says ἱερεύς, not ἀρχιερεύς. Although Aaron is traditionally
    understood as the first high priest, the translation preserves the lexical wording
    and avoids importing a title not present in the text.
  doctrine_reference: 'Translation philosophy #1 original-language primacy over translation
    tradition'
