translation:
  text: And as soon as I heard these things, I tore my garments and the holy robe,
    and I pulled out hair from my head and beard, and I sat down stunned and deeply
    grieved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacred garment'; possibly an official priestly robe, though the
      Greek does not state this explicitly.
    reason: lexical_alternative
  - marker: b
    text: Or 'astonished' or 'dismayed' for 'stunned.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅμα τῷ ἀκοῦσαί με
  chosen: as soon as I heard
  alternatives:
  - when I heard
  - upon hearing
  lexicon: LSJ
  rationale: The construction expresses immediate temporal sequence. 'As soon as I
    heard' captures the prompt reaction more naturally in modern English than the
    more literal 'upon hearing,' while preserving the sense of immediacy.
- source_word: ἔρρηξα
  chosen: I tore
  alternatives:
  - I rent
  lexicon: LSJ
  rationale: The verb denotes tearing garments in grief. 'I tore' is clear modern
    English; 'rent' is traditional but archaic.
- source_word: τὰ ἱμάτια
  chosen: my garments
  alternatives:
  - my clothes
  - my outer garments
  lexicon: LSJ
  rationale: Although the possessive is implicit rather than explicit, English idiom
    naturally supplies it here. 'Garments' preserves the formal register and mourning
    context better than 'clothes.'
- source_word: τὴν ἱερὰν ἐσθῆτα
  chosen: the holy robe
  alternatives:
  - the sacred garment
  - the priestly robe
  lexicon: LSJ
  rationale: ἱεράν marks the garment as sacred/holy. 'Holy robe' is concise and transparent.
    'Priestly robe' would interpret more specifically than the Greek states, though
    the context may suggest an official sacred garment.
- source_word: κατέτειλον
  chosen: I pulled out
  alternatives:
  - I plucked out
  - I tore out
  lexicon: LSJ
  rationale: In context with hair, the verb indicates forcibly removing hair as a
    sign of distress. 'Pulled out' is idiomatic and vivid without overstating beyond
    the Greek.
- source_word: τοῦ τριχώματος τῆς κεφαλῆς καὶ τοῦ πώγωνος
  chosen: hair from my head and beard
  alternatives:
  - the hair of my head and of my beard
  - hair from my scalp and beard
  lexicon: LSJ
  rationale: This phrase specifies the hair removed. 'Hair from my head and beard'
    is natural English and preserves both body parts. The possessives are implicit
    and supplied for idiomatic clarity.
- source_word: σύννους
  chosen: stunned
  alternatives:
  - astonished
  - dismayed
  - bewildered
  lexicon: LSJ
  rationale: The adjective conveys being struck senseless or appalled in thought.
    'Stunned' communicates the emotional and mental shock succinctly. 'Astonished'
    can sound too neutral or positive in modern English.
- source_word: περίλυπος
  chosen: deeply grieved
  alternatives:
  - very sorrowful
  - distressed
  lexicon: LSJ
  rationale: The term denotes intense sorrow. 'Deeply grieved' preserves the gravity
    and reads naturally in contemporary English.
