translation:
  text: 'From the sons of Zathoes: Eiechonias son of Jethel, and with him two hundred
    men; from the sons of Adin: Obeth son of Jonathan, and with him two hundred fifty
    men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek family name is transliterated as Zathoes from the primary 1 Esdras
      witness; the approximate MT parallel has a different name form.
    reason: alternative_reading
  - marker: b
    text: The personal name rendered Obeth reflects an uncertain Greek form (Οὐβὴν);
      a more literal transliteration such as Uben/Oben is also possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  chosen: From the sons of
  alternatives:
  - Of the sons of
  - From among the sons of
  lexicon: LSJ
  rationale: The phrase introduces members drawn from a family group or clan. 'From
    the sons of' preserves the repetitive list structure and the genealogical sense
    better than a looser paraphrase.
- source_word: Ζαθόης
  chosen: Zathoes
  alternatives:
  - Zathoi
  - Zattu (via MT parallel)
  rationale: The Greek form is primary for 1 Esdras, so the name is transliterated
    from the Greek witness rather than normalized to the approximate MT parallel.
    The MT helps confirm this is a family-name entry, but not enough to override the
    Greek form in the main text.
- source_word: Εἰεχονίας
  chosen: Eiechonias
  alternatives:
  - Jechonias
  - Iechonias
  rationale: Personal names are transliterated by standard conventions from the Greek
    source. 'Eiechonias' stays close to the transmitted Greek spelling in Swete; more
    familiar Anglicizations are possible but would move away from the source form.
- source_word: Ἰεθήλου
  chosen: son of Jethel
  alternatives:
  - of Jethel
  - Jethēlos/Jethel
  rationale: In this list, the second proper name functions patronymically. Supplying
    'son of' makes the relationship clear in English and matches the list style, even
    though the Greek simply places the names in apposition/genitival relation.
- source_word: μετʼ αὐτοῦ
  chosen: with him
  alternatives:
  - accompanying him
  - and with him
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the census/list formula. In
    English the conjunction is retained at the clause level for readability.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  lexicon: LSJ
  rationale: The Greek specifically says 'men,' not a generic 'persons.' This also
    aligns with the representative census style of the passage. The MT parallel for
    the broader context likewise counts males.
- source_word: διακόσιοι
  chosen: two hundred
  lexicon: LSJ
  rationale: Direct cardinal-number rendering.
- source_word: Ἀδείν
  chosen: Adin
  alternatives:
  - Aden
  rationale: Standard transliteration of the Greek family name.
- source_word: Οὐβὴν
  chosen: Obeth
  alternatives:
  - Uben
  - Oben
  rationale: The Greek form is somewhat unusual, and transliteration into English
    is not fully fixed. 'Obeth' reflects the likely intended consonantal shape behind
    the Greek tradition while remaining anchored to the Greek witness. Because the
    form is uncertain, an alternative is preserved in a footnote.
- source_word: Ἰωνάθου
  chosen: son of Jonathan
  alternatives:
  - of Jonathan
  rationale: As with the prior name pair, English benefits from making the patronymic
    relation explicit.
- source_word: διακόσιοι πεντήκοντα
  chosen: two hundred fifty
  alternatives:
  - two hundred and fifty
  lexicon: LSJ
  rationale: Direct rendering of the numeral phrase in readable modern English.
