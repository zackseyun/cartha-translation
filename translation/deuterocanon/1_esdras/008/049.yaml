translation:
  text: 'And from the temple servants whom David and the leaders had assigned to the
    service of the Levites: temple servants, two hundred twenty; all of them were
    listed by name.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Nethinim,' a Hebrew-derived technical term for temple servants. The
      Greek has 'temple servants' (ἱερόδουλοι), while the Hebrew parallel uses נְתִינִים.
    reason: lexical_alternative
  - marker: b
    text: Or 'all of them were recorded by name.' The closing phrase refers to formal
      registration or listing by name.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱεροδούλων
  chosen: temple servants
  alternatives:
  - sacred servants
  - temple slaves
  - Nethinim
  lexicon: LSJ
  rationale: The Greek literally denotes persons attached to sacred/temple service.
    'Temple servants' is clear modern English and matches the function indicated by
    the Hebrew parallel נְתִינִים without importing the transliterated technical term
    into the main text. 'Temple slaves' is possible etymologically, but the bonded
    status is not the focus here; the cultic role is.
- source_word: ἔδωκεν
  chosen: had assigned
  alternatives:
  - gave
  - appointed
  lexicon: BDAG
  rationale: Although the verb is literally 'gave,' in context with persons given
    for cultic labor and confirmed by the Hebrew parallel 'David ... gave ... for
    the service of the Levites,' English 'had assigned' best conveys the administrative
    sense.
- source_word: οἱ ἡγούμενοι
  chosen: the leaders
  alternatives:
  - the rulers
  - the chiefs
  lexicon: LSJ
  rationale: The term refers to leading officials alongside David. 'Leaders' is natural
    English and broad enough to fit the governing figures reflected by the Hebrew
    parallel הַשָּׂרִים ('the officials/princes').
- source_word: εἰς τὴν ἐργασίαν τῶν Λευειτῶν
  chosen: to the service of the Levites
  alternatives:
  - for the work of the Levites
  - for the labor of the Levites
  lexicon: LSJ
  rationale: ἐργασία can mean work or service. In this temple-administrative context,
    'service' reads more naturally while preserving the idea that these persons were
    assigned to assist the Levites.
- source_word: διακόσιοι εἴκοσι
  chosen: two hundred twenty
  alternatives:
  - two hundred and twenty
  lexicon: LSJ
  rationale: Straightforward numeral rendering in contemporary English style.
- source_word: πάντων ἐσημάνθη ὀνοματογραφία
  chosen: all of them were designated by name
  alternatives:
  - all of them were recorded by name
  - the registration of all was made by name
  lexicon: LSJ
  rationale: The phrase indicates formal naming/registration. The Hebrew parallel
    'all of them were specified by names' supports an administrative sense. 'Designated
    by name' preserves the formal nuance without becoming wooden.
