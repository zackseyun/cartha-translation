translation:
  text: so that they may inspect Judea and Jerusalem, according to the law of the
    Lord that is in your hand,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they may oversee' or 'they may inquire into'; the Greek verb can denote
      official inspection, visitation, or review.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in your hand' is supported by the Hebrew parallel in Ezra 7
      and likely means 'entrusted to you' or 'in your possession.'
    reason: cross_reference
lexical_decisions:
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: LSJ
  rationale: Introduces purpose. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: ἐπισκέψωνται
  chosen: they may inspect
  alternatives:
  - they may oversee
  - they may visit
  - they may inquire into
  lexicon: LSJ
  rationale: The middle subjunctive here carries the sense of examining or looking
    into official conditions. In this royal-letter context, 'inspect' best captures
    an authorized review of affairs rather than a mere social 'visit.'
- source_word: κατὰ τὴν Ἰουδαίαν καὶ κατὰ Ἰερουσαλήμ
  chosen: Judea and Jerusalem
  alternatives:
  - throughout Judea and Jerusalem
  - concerning Judea and Jerusalem
  - in Judea and Jerusalem
  lexicon: LSJ
  rationale: The repeated κατά with accusative can indicate relation or sphere. Given
    the administrative setting and the following standard, the phrase is rendered
    compactly as the area under inspection. 'Judea and Jerusalem' is idiomatic while
    still reflecting both objects.
- source_word: ἀκολούθως
  chosen: according to
  alternatives:
  - in accordance with
  - following
  lexicon: LSJ
  rationale: Adverb meaning 'accordingly' or 'in conformity with.' 'According to'
    fits smooth English before the relative clause and preserves the normative sense.
- source_word: ᾧ ἔχει νόμῳ Κυρίου
  chosen: the law of the Lord that is in your hand
  alternatives:
  - the Lord's law which you possess
  - the law of the Lord entrusted to you
  lexicon: LSJ
  rationale: The Greek is somewhat compressed, but the sense is that the standard
    for inspection is the Lord's law possessed by Ezra. The MT parallel in Ezra 7
    supports the idiom 'in your hand,' which is retained because it is both source-grounded
    and meaningful in English as a metaphor for entrusted authority or possession.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Follows project default for κύριος/Kyrios as 'Lord.' Here it refers to
    Israel's God in a Jewish scriptural context.
