translation:
  text: 'Of the sons of Pharez: Zechariah, and with him, according to the record,
    one hundred fifty men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew parallel: ''Parosh'' rather than ''Pharez.'' The main text follows
      the Greek witness of 1 Esdras.'
    reason: alternative_reading
  - marker: b
    text: Or 'by written record' / 'from the register'; the phrase refers to genealogical
      enrollment.
    reason: lexical_alternative
lexical_decisions:
- source_word: Φαρές
  chosen: Pharez
  alternatives:
  - Phares
  - Parosh
  lexicon: LSJ
  rationale: The Greek proper name is transliterated directly as 'Pharez' from Φαρές.
    The MT parallel has פַרְעֹשׁ ('Parosh'), showing that 1 Esdras here reflects a
    divergent Greek form from the Hebrew parallel. Because the project prioritizes
    the Greek for 1 Esdras and translates names by transliteration, the main text
    follows the Greek form while preserving the Hebrew-aligned alternative in a footnote.
- source_word: Ζαχαρίας
  chosen: Zechariah
  alternatives:
  - Zacharias
  lexicon: LSJ
  rationale: Standard English transliteration of the Greek personal name, also confirmed
    by the Hebrew parallel זְכַרְיָה.
- source_word: μετʼ αὐτοῦ
  chosen: with him
  alternatives:
  - and with him
  lexicon: LSJ
  rationale: Natural rendering of the prepositional phrase indicating accompaniment.
    The conjunction is retained at clause level in the English sentence.
- source_word: ἀπὸ γραφῆς
  chosen: according to the genealogy
  alternatives:
  - by written record
  - from the register
  - as recorded
  lexicon: LSJ
  rationale: Literally 'from writing/record.' The MT parallel uses הִתְיַחֵשׂ, indicating
    enrollment by genealogy. In this census context, 'according to the genealogy'
    best captures the sense of a registered genealogical list rather than generic
    writing.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  lexicon: LSJ
  rationale: The Greek explicitly uses the masculine term for adult males, and the
    MT parallel likewise specifies לִזְכָרִים ('males'). Per the project's gender-accurate
    policy, 'men' is retained rather than neutralized.
- source_word: ἑκατὸν πεντήκοντα
  chosen: one hundred fifty
  alternatives:
  - a hundred and fifty
  lexicon: LSJ
  rationale: Straightforward cardinal number rendered in clear modern English.
