lexical_decisions:
- source_word: τοῖς υἱοῖς ὑμῶν
  chosen: to your sons
  alternatives:
  - for your sons
  - to your children
  lexicon: LSJ
  rationale: The dative phrase most naturally renders as 'to/for your sons.' 'Sons'
    is retained rather than gender-neutral 'children' because υἱοῖς is specifically
    masculine/plural and no contextual signal in this fragment warrants broadening
    it.
- source_word: ἕως αἰῶνος
  chosen: forever
  alternatives:
  - for ever
  - unto the age
  - perpetually
  lexicon: LSJ
  rationale: This idiom commonly expresses enduring duration. 'Forever' gives clear
    modern English while preserving the sense of permanence. 'Unto the age' would
    be overly wooden here.
