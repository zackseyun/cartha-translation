translation:
  text: having commanded them to speak with Lodaios and his brothers and the treasurers
    in that place, to send us those who would serve as priests in the house of our
    Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Lodaios; the Hebrew parallel in Ezra 8:17 has Iddo.
    reason: alternative_reading
  - marker: b
    text: Greek 'our Lord'; the Hebrew parallel reads 'our God.'
    reason: alternative_reading
  - marker: c
    text: Greek 'to send us'; the Hebrew parallel has 'to bring to us.'
    reason: alternative_reading
  - marker: d
    text: Greek specifies 'those who would serve as priests'; the Hebrew parallel
      more broadly reads 'ministers' or 'servants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντειλάμενος
  chosen: I commanded
  alternatives:
  - having commanded
  - I gave orders
  lexicon: LSJ
  rationale: Although formally a participle ('having commanded'), in context it continues
    Ezra's first-person narrative and is best rendered as a finite verb in natural
    English. 'Commanded' preserves the directive force more strongly than the softer
    'told'.
- source_word: διαλεχθῆναι
  chosen: to speak with
  alternatives:
  - to confer with
  - to address
  lexicon: LSJ
  rationale: The verb denotes speaking or conversing. 'Speak with' is clear modern
    English and fits the indirect-object construction with Lodaios and the others.
- source_word: Λοδαίῳ
  chosen: Lodaios
  alternatives:
  - Iddo
  lexicon: LSJ
  rationale: Following the Greek primary witness, the personal name is transliterated
    rather than harmonized to the MT parallel's Iddo. Because the Hebrew parallel
    likely underlies the scene, the alternative is preserved in a footnote.
- source_word: τοῖς ἀδελφοῖς αὐτοῦ
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: LSJ
  rationale: The ordinary sense of ἀδελφοί is 'brothers.' Per translation philosophy,
    the gendered term is retained unless context clearly requires a broader inclusive
    sense.
- source_word: γαζοφύλαξιν
  chosen: the treasurers
  alternatives:
  - the treasury keepers
  - the custodians of the treasury
  lexicon: LSJ
  rationale: The compound denotes those responsible for the treasury. 'Treasurers'
    is concise and idiomatic, while still reflecting the administrative role.
- source_word: ἀποστεῖλαι ἡμῖν
  chosen: to send us
  alternatives:
  - to bring us
  lexicon: LSJ
  rationale: The Greek verb is 'send,' and this should control the translation even
    though the Hebrew parallel has 'bring to us.' The difference is minor in sense
    but worth noting as source divergence.
- source_word: τοὺς ἱερατεύσαντας
  chosen: those who would serve as priests
  alternatives:
  - the ones ministering as priests
  - those exercising priestly service
  lexicon: LSJ
  rationale: The participle comes from ἱερατεύω, 'to serve as priest.' 'Those who
    would serve as priests' expresses the requested function in natural English without
    reducing it to the broader 'servants' found in the MT parallel.
- source_word: ἐν τῷ οἴκῳ τοῦ κυρίου ἡμῶν
  chosen: in the house of our Lord
  alternatives:
  - in the house of our God
  - in our Lord's house
  lexicon: LSJ
  rationale: The Greek reads κυρίου ἡμῶν, 'our Lord,' and should be translated as
    such rather than harmonized to the MT parallel's 'our God.' 'House' is the standard
    rendering for temple language in this context.
