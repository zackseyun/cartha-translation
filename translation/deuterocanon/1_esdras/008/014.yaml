theological_decisions:
- issue: Relation of the Greek wording to the MT parallel in Ezra 7:16
  chosen_reading: Translate the Greek phrase 'by the nation ... of their Lord in Jerusalem'
    as it stands, while noting the MT parallel differs substantially.
  alternative_readings:
  - 'Harmonize toward the MT: ''silver and gold that the king and his counselors have
    freely offered to the God of Israel, whose dwelling is in Jerusalem'''
  rationale: The project requires original-language primacy for the chosen witness.
    Since 1 Esdras is translated from the Greek and this verse is marked with major
    mismatch against the MT parallel, the English should reflect the Greek wording
    rather than silently harmonize to Ezra.
  doctrine_reference: Translation philosophy §1; PHILOSOPHY.md on 1 Esdras Greek primacy
    with MT as sanity check
