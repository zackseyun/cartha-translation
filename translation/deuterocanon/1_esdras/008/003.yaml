theological_decisions:
- issue: Relation of Ezra's qualification to the law of Moses
  chosen_reading: '''being a skillful scribe in the law of Moses'''
  alternative_readings:
  - '''a scribe well instructed in the law of Moses'''
  - '''an expert scribe of the law of Moses'''
  rationale: The Greek links Ezra's identity as γραμματεύς with εὐφυής and the sphere
    ἐν τῷ ... νόμῳ. The chosen rendering preserves both his role and competence without
    overstating formal training beyond the text.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering the divine source of the law
  chosen_reading: '''that had been given by the God of Israel'''
  alternative_readings:
  - '''which the God of Israel had delivered'''
  rationale: 'This keeps the passive participial force and the theological claim explicit:
    the Mosaic law derives from Israel''s God. No further doctrinal inference is added.'
  doctrine_reference: Translation philosophy §§1, 3
