translation:
  text: And I said to them, “You also are holy to the Lord, and the vessels are holy,
    and the silver and the gold are a freewill offering to the Lord, the God of our
    fathers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally from the Greek, “a vow offering” or “an offering.” The
      Hebrew parallel has “a freewill offering.”
    reason: lexical_alternative
  - marker: b
    text: The Greek text here reads approximately “to the Lord, Lord of our fathers,”
      while the Hebrew parallel has “to the Lord, the God of your fathers.” The main
      text reflects the Greek pronoun perspective with the fuller covenantal sense
      supported by the Hebrew parallel.
    reason: textual_variant
lexical_decisions:
- source_word: ἅγιοί
  chosen: holy
  alternatives:
  - consecrated
  - set apart
  lexicon: BDAG
  rationale: The adjective denotes sacred status or consecration. 'Holy' preserves
    the direct cultic/theological force and matches the repeated predicate in the
    verse; 'consecrated' or 'set apart' are interpretive expansions.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - for the Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default 'Lord.' The dative with ἅγιοί
    ἐστε naturally expresses relation or dedication; 'to the Lord' preserves the Greek
    wording and aligns with the Hebrew לַיהוָה.
- source_word: σκεύη
  chosen: vessels
  alternatives:
  - utensils
  - articles
  lexicon: BDAG
  rationale: In temple context, σκεύη refers to cultic implements. 'Vessels' is a
    standard and sufficiently clear English rendering that preserves the sacred-inventory
    sense better than the broader 'articles.'
- source_word: ἀργύριον
  chosen: silver
  alternatives:
  - money
  - silver bullion
  lexicon: BDAG
  rationale: The immediate pairing with 'gold' and the temple-donation context favor
    the material 'silver' rather than the more generalized 'money.'
- source_word: χρυσίον
  chosen: gold
  alternatives:
  - gold bullion
  lexicon: BDAG
  rationale: The straightforward material sense fits the inventory/donation context.
- source_word: εὐχή
  chosen: freewill offering
  alternatives:
  - vow offering
  - offering
  - dedicated gift
  lexicon: BDAG
  rationale: The Greek εὐχή often means 'vow,' but the Hebrew parallel has נְדָבָה,
    'freewill offering.' Since the task requires using the parallel source as actual
    input and the Greek here likely reflects offering language in context, 'freewill
    offering' best captures the intended sense without flattening the cultic nuance.
    The narrower alternative 'vow offering' is preserved in a footnote because the
    Greek alone could suggest it.
- source_word: κυρίῳ τῶν πατέρων ἡμῶν
  chosen: the Lord, the God of our fathers
  alternatives:
  - the Lord of our fathers
  lexicon: BDAG
  rationale: Swete's Greek reads 'Lord of our fathers,' but the Hebrew parallel reads
    'the Lord, the God of your fathers.' Because the note flags a major mismatch and
    instructs use of the MT parallel as actual input, the fuller covenantal expression
    'the God of our fathers' is adopted as the most coherent sense in English. 'Our'
    is retained from the Greek rather than 'your' from the Hebrew, since the Greek
    remains primary.
