translation:
  text: 'From the sons of Adoniakim, the last ones, and these are their names: Eliphala
    son of Geuel, and Shemaiah,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the last ones.'' The phrase may mean the final subgroup or later
      descendants within the family line; the wording is kept close to the source
      because the exact nuance is uncertain.'
    reason: lexical_alternative
  - marker: b
    text: The parallel MT witness for the corresponding Ezra list differs at this
      point, naming a different family and number. Because 1 Esdras often reorders
      or reshapes its Hebrew parallels, the Greek text is followed here as the primary
      source.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  chosen: From the sons of
  alternatives:
  - Of the sons of
  - From among the sons of
  lexicon: LSJ
  rationale: The preposition ἐκ naturally indicates source or membership from a group.
    'From the sons of' is idiomatic in English for this list formula and preserves
    the genealogical/listing sense.
- source_word: Ἀδωνιακαὶμ
  chosen: Adoniakim
  alternatives:
  - Adoniakim/Adonikam
  lexicon: LSJ
  rationale: This is a proper name and is therefore transliterated rather than translated,
    following project policy. The Greek form here supports 'Adoniakim'; the MT parallel
    for this specific verse points elsewhere in Ezra, so the Greek witness remains
    primary.
- source_word: οἱ ἔσχατοι
  chosen: the last ones
  alternatives:
  - the latest
  - the final ones
  - the descendants at the end
  lexicon: LSJ
  rationale: ἔσχατοι literally means 'last' or 'final.' In this genealogical/list
    context it likely distinguishes a final subgroup or later members. 'The last ones'
    preserves the Greek wording without over-interpreting the exact nuance.
- source_word: καὶ ταῦτα τὰ ὀνόματα αὐτῶν
  chosen: and these are their names
  alternatives:
  - and these were their names
  - and these their names
  lexicon: LSJ
  rationale: This is a standard list-introduction formula. Supplying 'are' makes natural
    English while staying close to the Greek nominal construction.
- source_word: Ἐλειφάλα
  chosen: Eliphala
  alternatives:
  - Eleiphala
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek form. Standardized
    to a readable English transliteration while remaining close to the source spelling.
- source_word: τοῦ Γεουὴλ
  chosen: son of Geuel
  alternatives:
  - of Geuel
  lexicon: LSJ
  rationale: The genitive with a personal name in these genealogical lists commonly
    expresses filiation. Rendering it as 'son of Geuel' makes the relationship explicit
    in idiomatic English.
- source_word: Σαμαίας
  chosen: Shemaiah
  alternatives:
  - Samaias
  - Samaias
  lexicon: LSJ
  rationale: The Greek name corresponds to the familiar Semitic name Shemaiah. Using
    the conventional English transliteration aids readability and likely reflects
    the underlying name more clearly than a strict letter-by-letter Greek transliteration.
