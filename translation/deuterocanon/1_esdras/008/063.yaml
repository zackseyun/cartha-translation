translation:
  text: 'And those who had come from the captivity offered sacrifices to the God of
    Israel: ninety-six rams, seventy-six lambs, and twelve male goats for a peace
    offering; all of them as a sacrifice to the Lord.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for well-being,' 'for salvation,' or 'for deliverance.' The Greek says
      literally 'for salvation/deliverance,' but here it appears in a sacrificial
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ παραγενόμενοι ἐκ τῆς αἰχμαλωσίας
  chosen: those who had come from the captivity
  alternatives:
  - those who had arrived from the exile
  - those who had come from captivity
  lexicon: BDAG
  rationale: παραγενόμενοι denotes those who have arrived or come, and αἰχμαλωσία
    refers to captivity/exile. 'Captivity' stays close to the Greek while remaining
    natural English; 'exile' is possible but the Greek term more literally emphasizes
    captivity.
- source_word: προσήνεγκαν θυσίας
  chosen: offered sacrifices
  alternatives:
  - brought sacrifices
  - presented sacrifices
  lexicon: BDAG
  rationale: The verb προσφέρω in sacrificial contexts is idiomatically 'offer,' and
    the plural θυσίας is best rendered straightforwardly as 'sacrifices.'
- source_word: τῷ θεῷ τοῦ Ἰσραήλ
  chosen: to the God of Israel
  lexicon: BDAG
  rationale: A direct, standard rendering of the dative phrase naming the recipient
    of the sacrifices.
- source_word: Κυρίῳ / τῷ κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per project doctrine. Here the first occurrence
    appositionally identifies the God of Israel, and the final occurrence repeats
    the recipient. English uses 'the Lord' naturally in the closing phrase.
- source_word: ἐνενήκοντα ἕξ
  chosen: ninety-six
  lexicon: LSJ
  rationale: Cardinal number rendered directly.
- source_word: ἄρνας
  chosen: rams
  alternatives:
  - lambs
  lexicon: LSJ
  rationale: ἄρσην/ἀρήν forms can denote lambs/sheep, but in sacrificial inventory
    contexts ἄρνας commonly refers to male sheep, hence 'rams.' The following τράγους
    already specifies male goats, so preserving the male distinction here is appropriate.
- source_word: ἑβδομήκοντα ἕξ
  chosen: seventy-six
  lexicon: LSJ
  rationale: Cardinal number rendered directly.
- source_word: τράγους
  chosen: male goats
  alternatives:
  - goats
  - he-goats
  lexicon: LSJ
  rationale: τράγος specifically denotes a male goat. 'Male goats' is clear modern
    English; 'he-goats' is more traditional but less natural.
- source_word: ὑπὲρ σωτηρίου
  chosen: for a peace offering
  alternatives:
  - for well-being
  - for salvation
  - for deliverance
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic in sacrificial context. Although σωτήριον
    can denote salvation/deliverance, in cultic usage it corresponds to an offering
    connected with well-being or peace. 'Peace offering' best communicates the sacrificial
    sense in accessible English, while a lexical alternative is preserved in a footnote
    because the Greek term is not the standard Hebrew-derived technical term itself.
- source_word: ἅπαντα θυσίαν
  chosen: all of them as a sacrifice
  alternatives:
  - all as a sacrifice
  - the whole as a sacrifice
  lexicon: BDAG
  rationale: ἅπαντα sums up the listed animals collectively. Rendering with 'all of
    them' makes the collective sense explicit in English.
