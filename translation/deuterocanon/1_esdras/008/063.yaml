theological_decisions:
- issue: Rendering the cultic phrase ὑπὲρ σωτηρίου
  chosen_reading: for a peace offering
  alternative_readings:
  - for well-being
  - for salvation
  - for deliverance
  rationale: Because the verse lists sacrificial animals and concludes with 'all of
    them as a sacrifice to the Lord,' the phrase is best taken in a sacrificial/cultic
    sense rather than as an abstract statement about salvation. 'Peace offering' communicates
    the offering category most naturally to English readers, while preserving the
    more literal semantic range in a footnote.
  doctrine_reference: Translation philosophy §§1, 6
