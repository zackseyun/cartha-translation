translation:
  text: For I was ashamed to ask for horsemen and foot soldiers as an escort for safety
    against those hostile to us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cavalry and infantry as an escort.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνετράπην
  chosen: I was ashamed
  alternatives:
  - I felt shame
  - I was embarrassed
  lexicon: BDAG
  rationale: The passive/aorist form conveys a sense of shame or embarrassment. 'I
    was ashamed' is the most natural English rendering and fits the context of reluctance
    to request military protection.
- source_word: αἰτῆσαι
  chosen: to ask for
  alternatives:
  - to request
  lexicon: BDAG
  rationale: The infinitive denotes making a request. 'Ask for' is idiomatic and clear
    in modern English.
- source_word: ἵππεις
  chosen: horsemen
  alternatives:
  - cavalry
  - mounted troops
  lexicon: LSJ
  rationale: Literally 'horsemen.' While 'cavalry' is possible, 'horsemen' stays closer
    to the Greek while remaining readable.
- source_word: πεζοὺς
  chosen: foot soldiers
  alternatives:
  - infantry
  - men on foot
  lexicon: LSJ
  rationale: πεζοί are troops on foot. 'Foot soldiers' is accessible modern English
    and preserves the military contrast with horsemen.
- source_word: προπομπὴν
  chosen: as an escort
  alternatives:
  - for an escort
  - as a convoy
  lexicon: LSJ
  rationale: The noun refers to an accompanying escort sent ahead or along with travelers.
    'As an escort' captures function naturally in English.
- source_word: ἕνεκεν ἀσφαλείας
  chosen: for safety
  alternatives:
  - for security
  - for protection
  lexicon: BDAG
  rationale: 'The phrase expresses purpose: obtaining an escort for safe passage.
    ''For safety'' is concise and faithful.'
- source_word: τῆς πρὸς τοὺς ἐναντίους ἡμῖν
  chosen: against those hostile to us
  alternatives:
  - because of our enemies
  - against our adversaries
  lexicon: LSJ
  rationale: The construction points to danger posed by opponents. 'Those hostile
    to us' reflects the adjectival force of ἐναντίους without overstating a formal
    military category. The MT parallel in Ezra 8:22 differs substantially at this
    point, so the Greek wording governs the rendering.
