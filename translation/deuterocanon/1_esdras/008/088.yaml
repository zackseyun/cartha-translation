theological_decisions:
- issue: How to render ἀνομίαι in a penitential confession
  chosen_reading: lawless deeds
  alternative_readings:
  - iniquities
  - lawlessness
  rationale: The verse is a confession of covenant violation. 'Lawless deeds' preserves
    the connection to transgressing God's commands while remaining accessible modern
    English. It avoids importing a narrower technical doctrine while keeping the moral-legal
    weight.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; consistency of key terms,
    or documented exception'
- issue: Whether to smooth the final clause toward the MT parallel's stronger idea
    of total destruction
  chosen_reading: retain the Greek's direct confession of inability to stand before
    God
  alternative_readings:
  - expand toward the Hebrew parallel's sense of divine wrath leading to annihilation
  rationale: The Zone 1 primary witness is Greek, and this verse in 1 Esdras differs
    notably from the approximate MT parallel. The translation therefore stays anchored
    in the Greek wording while allowing the Hebrew parallel to confirm the penitential
    context rather than control the sentence.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy for deuterocanonical
    books; use MT parallels as cross-reference input without displacing the Greek'
