theological_decisions:
- issue: Whether to render κουφίσας as explicit forgiveness
  chosen_reading: 'Retain the burden-relief metaphor: ''who have lightened our sins'''
  alternative_readings:
  - who have forgiven our sins
  - who have lifted away our sins
  rationale: The Greek emphasizes easing or lightening rather than using the normal
    verb for forgiving. Rendering it as 'forgiven' would smooth the metaphor and overstate
    lexical specificity. The confession still implies divine mercy without requiring
    a technical doctrine of forgiveness in the wording itself.
  doctrine_reference: Translation philosophy 1, 3, 6
- issue: Whether to interpret ῥίζαν idiomatically as 'remnant' in the main text
  chosen_reading: Keep 'a root' in the main text
  alternative_readings:
  - a remnant
  - a surviving root
  rationale: The metaphor likely points to a surviving seed or remnant, but the Greek
    image is clear and should be preserved. The alternative can be noted in a footnote
    for readers who might miss the metaphorical force.
  doctrine_reference: Translation philosophy 1, 5
