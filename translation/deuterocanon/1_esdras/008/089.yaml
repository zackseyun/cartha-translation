theological_decisions:
- issue: Sense of ἀνθωμολογεῖτο in a penitential setting
  chosen_reading: confessional language ('making confession')
  alternative_readings:
  - thanksgiving/praise language ('giving thanks')
  rationale: Although the verb can in some contexts denote praise or thanksgiving,
    the surrounding actions of prayer, tears, prostration, and the close thematic
    alignment with Ezra's penitential prayer favor confession of sin here.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Rendering of νεανίαι
  chosen_reading: '''young men'''
  alternative_readings:
  - '''youths'''
  - '''young people'''
  rationale: The source is grammatically masculine and contextually lists demographic
    groups separately. Per the gender-accurate policy, the masculine reference should
    not be neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Temple terminology for ἱερόν
  chosen_reading: '''temple'''
  alternative_readings:
  - '''sanctuary'''
  rationale: The Greek term ordinarily denotes the temple precinct/complex. 'Temple'
    is broad enough to preserve that sense without implying only the inner sanctuary.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
