theological_decisions:
- issue: Relation of Greek wording to MT parallel in Ezra 7:11
  chosen_reading: Retain the Greek-specific title 'reader of the law of the Lord'
    in the main text rather than harmonizing to the MT's 'scribe.'
  alternative_readings:
  - scribe of the law of the God of heaven
  - scribe of the law of the Lord
  rationale: The project gives original-language primacy to the direct source witness
    for deuterocanonical books. Since 1 Esdras is translated from the Greek, the Greek
    title should stand, while the MT-aligned alternative is preserved in a footnote
    because the source validation flags a major mismatch and the Hebrew parallel is
    relevant as a control.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
