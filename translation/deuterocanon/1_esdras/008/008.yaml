translation:
  text: 'A copy of the document presented by King Artaxerxes to Ezra the priest and
    reader of the law of the Lord is set out below:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek reads 'reader of the law of the Lord.' The Hebrew parallel in
      Ezra 7:11 has 'scribe' rather than 'reader.'
    reason: alternative_reading
  - marker: b
    text: The Greek wording of this heading is somewhat awkward; the sense is that
      a copy of Artaxerxes' document to Ezra is reproduced below.
    reason: textual_variant
lexical_decisions:
- source_word: Προσπεσόντος
  chosen: presented
  alternatives:
  - given
  - delivered
  - submitted
  lexicon: LSJ
  rationale: The transmitted Greek is difficult and likely reflects documentary heading
    style rather than a finite narrative clause. In context with ἀντίγραφον and τὸ
    ὑποκείμενον, the sense is that a royal document has been placed before or issued
    to Ezra. 'Presented' captures the formal documentary setting without overcommitting
    to a more specific verb not secure from this wording alone.
- source_word: παρὰ Ἀρταξέρξου βασιλέως
  chosen: by King Artaxerxes
  alternatives:
  - from King Artaxerxes
  lexicon: LSJ
  rationale: παρά with genitive commonly marks source, 'from/by.' Because the phrase
    modifies a written copy of a royal document, 'by King Artaxerxes' reads naturally
    in English while preserving royal authorship/source.
- source_word: πρὸς Ἔσραν
  chosen: to Ezra
  alternatives:
  - for Ezra
  lexicon: LSJ
  rationale: 'πρός here is best taken directionally in documentary context: the document
    is addressed to Ezra.'
- source_word: τὸν ἱερέα
  chosen: the priest
  lexicon: LSJ
  rationale: Straightforward title for Ezra; retained formally.
- source_word: ἀναγνώστην τοῦ νόμου Κυρίου
  chosen: reader of the law of the Lord
  alternatives:
  - scribe of the law of the Lord
  - expert in the law of the Lord
  lexicon: LSJ
  rationale: ἀναγνώστης is literally 'reader/reciter.' Although the MT parallel in
    Ezra 7:11 has 'scribe,' the Greek witness here should control. 'Reader' preserves
    the Greek wording while remaining intelligible.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Follows project default for κύριος as 'Lord.' Here it refers to Israel's
    God in a scriptural title phrase.
- source_word: ἀντίγραφον
  chosen: copy
  alternatives:
  - transcript
  lexicon: LSJ
  rationale: Standard documentary term; 'copy' is clear modern English.
- source_word: τὸ ὑποκείμενον
  chosen: is set out below
  alternatives:
  - follows
  - lies below
  lexicon: LSJ
  rationale: Literally 'the thing lying below/underneath.' In a heading introducing
    a document, idiomatic English is 'is set out below' or 'follows.' This is a justified
    dynamic adjustment for readability.
