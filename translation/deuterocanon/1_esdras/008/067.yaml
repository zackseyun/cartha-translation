translation:
  text: They took some of their daughters as wives for themselves and for their sons,
    and the holy seed was mixed with the foreign nations of the land; and the leaders
    and the nobles shared in this lawlessness from the beginning of the matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy offspring' or 'the holy line.' The Greek literally says 'the
      holy seed,' a covenantal metaphor for the people set apart to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'participated in this transgression.' The Greek says 'shared in this
      lawlessness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῴκισαν
  chosen: took ... as wives
  alternatives:
  - married
  - cohabited with
  lexicon: LSJ
  rationale: The verb literally relates to living together or marrying. In this context
    of intermarriage, 'took ... as wives' makes the marital sense explicit and fits
    the object 'some of their daughters.'
- source_word: τινας τῶν θυγατέρων αὐτῶν
  chosen: some of their daughters
  alternatives:
  - certain of their daughters
  lexicon: LSJ
  rationale: A straightforward partitive expression; 'some of their daughters' is
    natural modern English and preserves the limited scope.
- source_word: καὶ αὐτοὶ καὶ οἱ υἱοὶ αὐτῶν
  chosen: for themselves and for their sons
  alternatives:
  - both they and their sons
  - they themselves and their sons
  lexicon: LSJ
  rationale: 'The Greek coordinates the men and their sons as participants in the
    marriages. English idiom is clearer by making the marital relation explicit: they
    took wives for themselves and for their sons.'
- source_word: ἐπεμίγη
  chosen: was mixed
  alternatives:
  - mingled itself
  - became intermixed
  lexicon: LSJ
  rationale: Passive 'was mixed' preserves the metaphor without overinterpreting it.
    The context is intermarriage, but the text itself uses the language of mixture.
- source_word: τὸ σπέρμα τὸ ἅγιον
  chosen: the holy seed
  alternatives:
  - the holy offspring
  - the holy line
  lexicon: LSJ
  rationale: This phrase is traditional and closely reflects the Greek. 'Seed' preserves
    the metaphor and its covenantal/ethnic force better than the more interpretive
    'line' or 'offspring.'
- source_word: εἰς τὰ ἀλλογενῆ ἔθνη τῆς γῆς
  chosen: with the foreign nations of the land
  alternatives:
  - among the foreign peoples of the land
  - into the alien nations of the land
  lexicon: LSJ
  rationale: Although εἰς is literally 'into,' English with 'mixed' normally takes
    'with.' ἀλλογενής emphasizes foreign origin; 'foreign nations of the land' preserves
    both otherness and the local setting.
- source_word: μετεῖχον
  chosen: shared in
  alternatives:
  - participated in
  - had a part in
  lexicon: LSJ
  rationale: The verb denotes participation. 'Shared in' is concise and idiomatic.
- source_word: οἱ προηγούμενοι καὶ οἱ μεγιστᾶνες
  chosen: the leaders and the nobles
  alternatives:
  - the rulers and the great men
  - the chief men and the nobles
  lexicon: LSJ
  rationale: The pair refers to socially prominent authorities. 'Leaders and the nobles'
    is readable modern English and preserves the distinction between office and status.
- source_word: τῆς ἀνομίας ταύτης
  chosen: this lawlessness
  alternatives:
  - this transgression
  - this iniquity
  lexicon: LSJ
  rationale: ἀνομία is literally lawlessness; here it denotes serious covenant violation.
    'Lawlessness' preserves the lexical force without softening it to a generic 'wrongdoing.'
- source_word: ἀπὸ τῆς ἀρχῆς τοῦ πράγματος
  chosen: from the beginning of the matter
  alternatives:
  - from the outset of this affair
  - from the beginning of this business
  lexicon: LSJ
  rationale: A fairly literal rendering that remains understandable. 'Matter' is broad
    enough to cover the situation or affair under discussion.
