theological_decisions:
- issue: Meaning of 'the holy seed' in an intermarriage context
  chosen_reading: Retain the covenantal phrase 'the holy seed' without expanding it
    into a doctrinal explanation.
  alternative_readings:
  - the holy line
  - the holy offspring
  rationale: The Greek presents the community in covenantal terms and uses metaphorical
    language. Expanding it to explain ethnicity, genealogy, or sacramental holiness
    would import interpretation beyond the text. Retaining the phrase preserves the
    theological tension and the rhetoric of the source.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Moral characterization of the offense
  chosen_reading: Render ἀνομία as 'lawlessness.'
  alternative_readings:
  - transgression
  - iniquity
  rationale: The text itself morally condemns the action. 'Lawlessness' keeps the
    explicit legal-covenantal force rather than reducing it to a vague moral failure.
  doctrine_reference: Translation philosophy §§1, 5
