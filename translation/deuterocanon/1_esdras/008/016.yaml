translation:
  text: And whatever you and your brothers wish to do with the silver and the gold,
    carry it out according to the will of your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Ezra 7:18 is more specific, speaking of what seems
      good to do with the remaining silver and gold. 1 Esdras here gives a broader
      Greek wording.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα ὅσα ἂν βούλῃ
  chosen: whatever ... wish
  alternatives:
  - all that ... may wish
  - whatever ... may desire
  lexicon: BDAG
  rationale: 'The idiom πάντα ὅσα with ἄν and the subjunctive expresses an open-ended
    relative clause: ''whatever'' or ''all that ... may.'' ''Wish'' is natural modern
    English and preserves volitional force without sounding overly strong.'
- source_word: μετὰ τῶν ἀδελφῶν σου
  chosen: you and your brothers
  alternatives:
  - with your brothers
  lexicon: BDAG
  rationale: 'A strictly literal rendering is ''with your brothers,'' but in English
    the implied subject is clearer if made explicit: the addressee acts together with
    his brothers/kinsmen. ''Brothers'' is retained per gender-accurate policy and
    because the Greek is masculine plural.'
- source_word: ποιῆσαι
  chosen: to do
  alternatives:
  - to make
  - to carry out
  lexicon: BDAG
  rationale: ποιέω is broad and here governs the open-ended action contemplated for
    the money. 'To do' best preserves the generality of the Greek; the main verb ἐπιτέλει
    then carries the sense of execution.
- source_word: χρυσίῳ καὶ ἀργυρίῳ
  chosen: with the silver and the gold
  alternatives:
  - with silver and gold
  - concerning the silver and the gold
  lexicon: BDAG
  rationale: 'The dative pair is most naturally instrumental or associative here:
    what they wish to do ''with'' these funds. The article is represented for specificity,
    since the context concerns designated temple funds.'
- source_word: ἐπιτέλει
  chosen: carry it out
  alternatives:
  - perform it
  - complete it
  - do it
  lexicon: BDAG
  rationale: ἐπιτελέω conveys bringing something to execution or completion. 'Carry
    it out' is idiomatic and preserves the sense of authorized implementation.
- source_word: κατὰ τὸ θέλημα τοῦ θεοῦ σου
  chosen: according to the will of your God
  alternatives:
  - in accordance with the will of your God
  lexicon: BDAG
  rationale: This phrase sets the governing norm for the use of the funds. 'According
    to the will of your God' is clear, direct, and formally close to the Greek.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - kinsmen
  - fellow Jews
  lexicon: BDAG
  rationale: Although the term can be broader than biological siblings, 'brothers'
    is the default and best preserves the source wording. Broader interpretive expansions
    are possible but not required by the verse itself.
