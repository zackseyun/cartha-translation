theological_decisions:
- issue: Relation of this Greek wording to the MT parallel, which in Ezra 7:18 speaks
    more specifically of doing what seems good with the remaining silver and gold,
    while the Greek wording is somewhat freer.
  chosen_reading: Translate the Greek directly as a broad authorization to do whatever
    Ezra and his brothers wish with the silver and gold, qualified by God's will.
  alternative_readings:
  - 'Harmonize more tightly to the MT parallel: ''whatever seems good to you and your
    brothers to do with the rest of the silver and gold'''
  rationale: The project's source policy gives primacy to the Greek for 1 Esdras while
    using the MT as a control. The Greek here lacks explicit wording such as 'the
    rest' and uses a broad relative clause; the translation therefore follows the
    Greek while recognizing the Semitic parallel as contextual support rather than
    a wording override.
  doctrine_reference: 'PHILOSOPHY.md: WLC MT parallels for 1 Esdras; Translation philosophy
    #1'
