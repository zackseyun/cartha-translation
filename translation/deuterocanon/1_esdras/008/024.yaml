translation:
  text: And all who transgress both the law of your God and the king’s law shall be
    diligently punished, whether by death or by punishment, by a fine of silver or
    by confiscation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek source here differs materially from the supplied MT parallel,
      which corresponds to a different context; this translation therefore follows
      the Greek as the primary witness.
    reason: textual_variant
  - marker: b
    text: Or 'strictly punished'; the adverb may emphasize diligent enforcement rather
      than mere careful procedure.
    reason: lexical_alternative
  - marker: c
    text: Or 'banishment' for 'confiscation'; the Greek term can denote removal, but
      in this legal list it is best understood as seizure of property.
    reason: alternative_reading
lexical_decisions:
- source_word: παραβαίνωσι
  chosen: transgress
  alternatives:
  - violate
  - break
  lexicon: BDAG
  rationale: The verb denotes going beyond or violating a law. 'Transgress' preserves
    the legal-register force better than the flatter 'break' and fits the formal judicial
    context.
- source_word: νόμον
  chosen: law
  alternatives:
  - instruction
  lexicon: BDAG
  rationale: In this administrative-legal setting, νόμος refers to binding law rather
    than general instruction.
- source_word: τοῦ βασιλικοῦ
  chosen: the king’s law
  alternatives:
  - the royal law
  - what belongs to the king
  lexicon: LSJ
  rationale: The adjective is substantival/elliptical in context and parallels 'the
    law of your God.' Rendering it 'the king’s law' makes the ellipsis clear in natural
    English while preserving the legal parallelism.
- source_word: ἐπιμελῶς
  chosen: carefully
  alternatives:
  - diligently
  - strictly
  lexicon: LSJ
  rationale: The adverb modifies the execution of punishment. 'Carefully' reflects
    deliberate, attentive enforcement; 'strictly' is possible but slightly over-interprets
    the manner.
- source_word: κολασθήσονται
  chosen: shall be ... punished
  alternatives:
  - shall be chastised
  - shall be penalized
  lexicon: BDAG
  rationale: A future passive of judicial punishment. 'Punished' is the clearest modern
    legal equivalent.
- source_word: θανάτῳ
  chosen: death
  alternatives:
  - capital punishment
  lexicon: BDAG
  rationale: The dative here marks the means or form of punishment. 'Death' is concise
    and idiomatic in a penalty list.
- source_word: τιμωρίᾳ
  chosen: penalty
  alternatives:
  - corporal punishment
  - punishment
  - torture
  lexicon: LSJ
  rationale: The noun can denote punishment broadly. Because the list already includes
    death, fine, and confiscation, a broader 'penalty' best preserves the Greek without
    forcing a narrower category not explicit in the text.
- source_word: ἀργυρίῳ ζημίᾳ
  chosen: by a fine of silver
  alternatives:
  - by a monetary fine
  - by financial penalty
  lexicon: LSJ
  rationale: The phrase denotes pecuniary loss, literally involving silver/money.
    'A fine of silver' keeps the concrete monetary sense while remaining readable.
- source_word: ἀπαγωγῇ
  chosen: confiscation
  alternatives:
  - banishment
  - removal of property
  lexicon: LSJ
  rationale: In this legal context and in light of the Ezra parallel's list of sanctions,
    the sense is best taken as seizure/removal of goods rather than physical deportation.
    'Confiscation' communicates that judicially imposed loss.
