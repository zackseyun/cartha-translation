theological_decisions:
- issue: Relation of divine law and royal law
  chosen_reading: both the law of your God and the king’s law
  alternative_readings:
  - the law of your God or the king’s law
  rationale: The Greek has καὶ ... καὶ, naturally read as 'both ... and,' presenting
    dual legal accountability rather than an either/or option. This also suits the
    judicial tone of the sentence.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #1, #5'
- issue: Use of MT parallel in a verse marked major_mismatch
  chosen_reading: Translate from the Greek as primary, while allowing the Semitic
    parallel to inform legal terminology only indirectly
  alternative_readings:
  - Conform the verse to the Ezra MT parallel wording
  rationale: The supplied MT parallel does not correspond directly to this verse's
    content, so the Greek must govern. The mismatch is material and should be acknowledged
    rather than harmonized away.
  doctrine_reference: PHILOSOPHY.md 'Original-language primacy' and task requirement
    on source uncertainty
