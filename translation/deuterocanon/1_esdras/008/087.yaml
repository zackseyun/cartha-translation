translation:
  text: Lord of Israel, you are true; for we have been left as a root to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, with the Hebrew parallel in Ezra 9:13, 'a remnant' or 'an escaped remnant.'
      The Greek here uses the image 'a root.'
    reason: alternative_reading
lexical_decisions:
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Direct vocative of κύριος used as a divine title. Per doctrine, κύριος
    defaults to 'Lord.'
- source_word: τοῦ Ἰσραήλ
  chosen: of Israel
  rationale: Genitive identifying the God addressed as Israel's Lord; straightforward
    title construction.
- source_word: ἀληθινὸς
  chosen: 'true'
  alternatives:
  - righteous
  - faithful
  - genuine
  lexicon: BDAG
  rationale: The adjective most naturally means 'true' or 'genuine.' In this prayer
    context it affirms God's truthfulness/rightness without over-interpreting toward
    a narrower theological term like 'righteous.'
- source_word: κατελείφθημεν
  chosen: we have been left
  alternatives:
  - we were left
  - we have been preserved
  lexicon: BDAG
  rationale: 'Aorist/passive of καταλείπω, ''leave behind, leave remaining.'' English
    perfect fits the present-result sense in context: the people remain because God
    has not utterly destroyed them.'
- source_word: ῥίζα
  chosen: a root
  alternatives:
  - a remnant
  - root-stock
  - seed
  lexicon: LSJ
  rationale: The Greek explicitly says 'root.' Although the MT parallel in Ezra 9:13
    speaks of 'a remnant/escape,' the primary Greek witness uses the metaphor of surviving
    root-stock. The translation preserves the Greek image rather than harmonizing
    to the Hebrew parallel.
- source_word: ἐν τῇ σήμερον
  chosen: to this day
  alternatives:
  - at the present time
  - today
  lexicon: LSJ
  rationale: Idiomatic temporal expression meaning 'up to the present day/time.' 'To
    this day' is natural English and preserves the force.
