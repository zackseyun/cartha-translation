theological_decisions:
- issue: Relation of the Greek wording to the MT parallel in Ezra 9:13
  chosen_reading: Preserve the Greek metaphor 'a root' in the main text
  alternative_readings:
  - '''a remnant'' based on the Hebrew parallel'
  - '''an escaped remnant'' by harmonization to Ezra 9:13'
  rationale: Project policy gives original-language primacy to the Zone 1 witness
    for deuterocanonical books, while using the MT parallel as a real input and sanity
    check. Here the Greek of 1 Esdras appears to recast the Hebrew idea of surviving
    remnant with the image of a remaining root. The main text therefore follows the
    Greek, while the Hebrew-parallel sense is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
