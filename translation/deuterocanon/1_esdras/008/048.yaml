translation:
  text: from the sons of Hanunai and their sons, twenty men;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Greek reads 'from the sons of Hanunai and their sons, twenty
      men.' The approximate Hebrew parallel at Neh 8:19 [MT/Ezra-Nehemiah numbering
      differs by tradition] instead names Hashabiah and Jeshaiah from the sons of
      Merari, with their brothers and sons, twenty.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ ἐκ τῶν υἱῶν Χανουναίου
  chosen: from the sons of Hanunai
  alternatives:
  - of the sons of Hanunai
  - those from the sons of Hanunai
  lexicon: LSJ
  rationale: οἱ ἐκ with a genitive phrase identifies members drawn from a family group.
    'From the sons of Hanunai' is concise English and preserves the genealogical sense.
    The proper name is transliterated rather than translated, following project policy
    for names.
- source_word: οἱ υἱοὶ αὐτῶν
  chosen: their sons
  alternatives:
  - his sons
  - and the sons of them
  lexicon: LSJ
  rationale: The Greek form αὐτῶν is plural, so 'their sons' is the most direct rendering
    of the extant Greek. This differs from the approximate MT parallel, which names
    individuals and then says 'his brothers and their sons'; because the Greek is
    the primary witness here and the verse is flagged as a major mismatch, the translation
    follows the Greek wording rather than harmonizing to the Hebrew parallel.
- source_word: εἴκοσι ἄνδρες
  chosen: twenty men
  alternatives:
  - twenty males
  - twenty persons
  lexicon: LSJ
  rationale: ἄνδρες normally means 'men' in a male-specific counting context. This
    is gender-accurate and fits a census-like list of returnees or attendants.
