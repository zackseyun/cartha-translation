theological_decisions:
- issue: Implicit subject of παρέβησαν
  chosen_reading: They have transgressed
  alternative_readings:
  - we have transgressed
  - they transgressed
  rationale: The Greek verb is third person plural, so the confession is framed about
    the people rather than first-person singular or plural. In context Ezra identifies
    with the community, but the grammar here points to 'they.'
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import claims the text does not make.
- issue: Rendering of ἐν χειρὶ as a biblical mediation formula
  chosen_reading: by the hand of your servants the prophets
  alternative_readings:
  - through your servants the prophets
  rationale: The idiom is transparent enough in English and preserves the scriptural
    register. A smoother alternative is possible, but the more literal form better
    reflects the source without obscuring meaning.
  doctrine_reference: Optimal equivalence with original-language primacy.
