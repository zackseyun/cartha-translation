translation:
  text: Likewise, up to one hundred cors of wheat and one hundred measures of wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A cor was a large dry measure, and a bath was a liquid measure. The Greek
      uses ancient units rather than generic 'measures.'
    reason: cultural_note
  - marker: b
    text: 'The parallel in Ezra 7:22 supports understanding these as standard administrative
      quantity limits: up to one hundred cors of wheat and one hundred baths of wine.'
    reason: cross_reference
lexical_decisions:
- source_word: ὁμοίως
  chosen: Likewise
  alternatives:
  - Similarly
  - Also
  lexicon: LSJ
  rationale: Introduces an additional item in the royal authorization list; 'Likewise'
    preserves the additive force in concise modern English.
- source_word: ἕως
  chosen: up to
  alternatives:
  - until
  - as much as
  lexicon: LSJ
  rationale: In this administrative quota context, ἕως marks a limit or maximum amount
    rather than a temporal endpoint. 'Up to' best conveys an authorized ceiling.
- source_word: πυροῦ
  chosen: wheat
  alternatives:
  - grain
  lexicon: LSJ
  rationale: πυρός specifically denotes wheat, not grain in general, so the more precise
    agricultural term is preferred.
- source_word: κόρων ἑκατόν
  chosen: one hundred cors
  alternatives:
  - a hundred cors
  - one hundred measures
  lexicon: LSJ
  rationale: κόρος is a specific dry measure. Retaining 'cors' transliterates the
    ancient unit rather than flattening it into an unspecified 'measures.' The numeral
    is rendered straightforwardly.
- source_word: οἴνου
  chosen: wine
  lexicon: LSJ
  rationale: Standard rendering of οἶνος; no contextual reason to vary.
- source_word: μετρητῶν ἑκατόν
  chosen: one hundred baths
  alternatives:
  - a hundred baths
  - one hundred measures
  lexicon: LSJ
  rationale: μετρητής is a liquid measure. In light of the Semitic parallel in Ezra
    7:22, which uses the bath as the corresponding unit, 'baths' gives readers the
    likely ancient measure behind the Greek without obscuring that a specific quantity
    is intended.
