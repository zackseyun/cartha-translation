theological_decisions:
- issue: Rendering τοῦ ἱεροῦ τοῦ θεοῦ σου in light of the MT parallel's בית אלהך
  chosen_reading: for the house of your God
  alternative_readings:
  - for the temple of your God
  - for the sanctuary of your God
  rationale: The Greek primary witness uses ἱερόν, but the parallel Semitic witness
    points to 'house of your God.' Because the task requires using the parallel as
    actual translation input while keeping the Greek primary, 'house of your God'
    best captures the institutional-temple sense in a way that is faithful to both
    witnesses. This is not a doctrinally loaded choice, but it is a significant source-alignment
    decision.
  doctrine_reference: Original-language primacy over translation tradition; use parallel
    sources as translation input while keeping Greek primary.
