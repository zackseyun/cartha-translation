translation:
  text: And when the third day came there, the silver and the gold were weighed out
    and handed over in the house of the Lord to Marmothi son of Ourias the priest,
    and with him was Eleazar son of Phinehas; and with them were Josabees son of Jesous
    and Moeth son of Sabannus, the Levites, by number and by weight, all of it; and
    the whole weight was recorded at that very time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek names here differ from the MT-parallel tradition, which has forms
      such as Meremoth son of Uriah, Eleazar son of Phinehas, and Levites corresponding
      to Jonathan son of Jeshua and Noadiah son of Binnui. The main text follows the
      Greek witness of 1 Esdras.
    reason: alternative_reading
lexical_decisions:
- source_word: γενομένης ... ἡμέρας τρίτης
  chosen: when the third day came
  alternatives:
  - on the third day
  - after three days
  lexicon: LSJ
  rationale: The genitive absolute marks temporal circumstance. 'When the third day
    came' preserves the narrative flow of the Greek while remaining natural English.
    The MT parallel supports a simple three-day notice, though the Greek is more explicit
    about the third day arriving there.
- source_word: αὐτόθι
  chosen: there
  alternatives:
  - in that place
  - thereupon
  lexicon: LSJ
  rationale: The adverb indicates location, matching the MT parallel's שָׁם ('there').
    'There' is the most direct and natural rendering.
- source_word: σταθὲν
  chosen: were weighed out
  alternatives:
  - having been weighed
  - were weighed
  lexicon: LSJ
  rationale: From στηθίζω/ἵστημι-related weighing usage in context; the passive participle
    refers to the silver and gold being weighed before transfer. 'Were weighed out'
    captures both the weighing and the administrative handover context.
- source_word: παρεδόθη
  chosen: handed over
  alternatives:
  - delivered
  - entrusted
  lexicon: LSJ
  rationale: The verb indicates formal transfer into priestly custody. 'Handed over'
    is clear modern English and fits the temple-accounting setting.
- source_word: ἐν τῷ οἴκῳ Κυρίου
  chosen: in the house of the Lord
  alternatives:
  - in the Lord's house
  - in the temple of the Lord
  lexicon: LSJ
  rationale: A standard temple expression. 'House of the Lord' preserves the biblical
    idiom and aligns with the project's default rendering of κύριος as 'Lord'.
- source_word: Μαρμωθὶ Οὐρείᾳ ἱερεῖ
  chosen: to Marmothi son of Ourias the priest
  alternatives:
  - to Marmothi, priest of Ourias
  - to Meremoth son of Uriah the priest
  lexicon: LSJ
  rationale: The Greek names are transliterated from the source witness per project
    policy. The dative sequence is most naturally understood as the recipient Marmothi,
    identified by patronymic and office. The Hebrew parallel elsewhere suggests Meremoth
    son of Uriah, but the main text remains anchored to the Greek form.
- source_word: μετʼ αὐτοῦ Ἐλεαζὰρ ὁ τοῦ Φεινεές
  chosen: with him was Eleazar son of Phinehas
  alternatives:
  - and with him Eleazar, of Phinehas
  - and Eleazar son of Phinehas was with him
  lexicon: LSJ
  rationale: The article-plus-genitive construction identifies lineage. 'Son of' makes
    the relationship explicit in idiomatic English.
- source_word: ἦσαν μετʼ αὐτῶν ... οἱ Λευεῖται
  chosen: with them were ... the Levites
  alternatives:
  - the Levites were with them
  - and accompanying them were the Levites
  lexicon: LSJ
  rationale: This keeps the Greek emphasis on the accompanying Levites who serve as
    witnesses/officials in the transaction.
- source_word: πρὸς ἀριθμὸν καὶ ὁλκὴν πάντα
  chosen: by number and by weight, all of it
  alternatives:
  - according to number and weight, everything
  - with full counting and weighing
  lexicon: LSJ
  rationale: The phrase describes careful accounting. 'By number and by weight, all
    of it' preserves the administrative precision of the Greek.
- source_word: ἐγράφη πᾶσα ἡ ὁλκὴ αὐτῇ τῇ ὥρᾳ
  chosen: the whole weight was recorded at that very time
  alternatives:
  - all the weight was written down at that hour
  - the entire weighing was recorded immediately
  lexicon: LSJ
  rationale: ἐγράφη indicates written record, and αὐτῇ τῇ ὥρᾳ stresses immediacy.
    'At that very time' communicates the prompt documentation.
