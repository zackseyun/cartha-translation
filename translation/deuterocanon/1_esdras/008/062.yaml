theological_decisions:
- issue: Rendering κύριος in temple formula
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The phrase ἐν τῷ οἴκῳ Κυρίου is a standard sacred designation. Per doctrine,
    κύριος defaults to 'Lord'; there is no contextual reason here to depart from that
    rendering.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Treatment of proper names where Greek differs from MT-aligned forms
  chosen_reading: Transliterate the Greek forms in the main text
  alternative_readings:
  - Normalize to MT-style forms such as Meremoth son of Uriah, Jonathan son of Jeshua,
    and Noadiah son of Binnui
  rationale: Project policy gives original-language primacy and directs that personal
    names be transliterated. Because 1 Esdras is translated from the Greek witness,
    the main text keeps Marmothi, Ourias, Josabees, Jesous, Moeth, and Sabannus, while
    preserving more familiar MT-aligned equivalents in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy;
    Translate titles, transliterate names'
