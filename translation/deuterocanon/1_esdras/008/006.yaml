translation:
  text: In the seventh year of the reign of Artaxerxes, in the fifth month—they arrived
    at Jerusalem; for they had set out from Babylon on the new moon of the first month,
    and they came to Jerusalem according to the prosperity of the journey given to
    them by the Lord upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text here contains a difficult clause, 'this year was the second
      for the king,' which does not fit the context and is absent from the Hebrew
      parallel (Ezra 7:6–9). It is likely a textual corruption or displacement, so
      it is not represented in the main translation.
    reason: textual_variant
  - marker: b
    text: 'The Hebrew parallel focuses on Ezra in the singular: ''This Ezra went up
      from Babylon ... and the king granted him all his request, according to the
      hand of the LORD his God upon him'' (Ezra 7:6). The Greek of 1 Esdras here shifts
      to plural forms (''they arrived,'' ''given to them'').'
    reason: alternative_reading
  - marker: c
    text: Literally, 'upon him.' The sense is likely that the Lord's favor or hand
      was upon Ezra, as made explicit in the Hebrew parallel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτους ἑβδόμου βασιλεύοντος Ἀρταξέρξου
  chosen: In the seventh year of the reign of Artaxerxes
  alternatives:
  - In the seventh year, when Artaxerxes was reigning
  - In the seventh year of King Artaxerxes
  lexicon: LSJ
  rationale: The genitive absolute-like temporal construction is best rendered as
    a time marker. 'Of the reign of Artaxerxes' is natural English and preserves the
    royal regnal dating.
- source_word: ἐν τῷ πέμπτῳ μηνί
  chosen: in the fifth month
  alternatives:
  - during the fifth month
  lexicon: LSJ
  rationale: Straightforward temporal phrase; 'in the fifth month' is the most direct
    rendering.
- source_word: ἐξελθόντος ... ἐκ Βαβυλῶνος
  chosen: having set out from Babylon
  alternatives:
  - after departing from Babylon
  - when he/they went out from Babylon
  lexicon: LSJ
  rationale: The participle marks prior action relative to arrival. Because the surrounding
    Greek shifts awkwardly and the MT parallel concerns Ezra's ascent from Babylon,
    'having set out' preserves sequence without overcommitting to singular or plural
    agency in the main clause.
- source_word: τῇ νουμηνίᾳ τοῦ πρώτου μηνός
  chosen: on the new moon of the first month
  alternatives:
  - on the first day of the first month
  lexicon: LSJ
  rationale: νουμηνία is specifically 'new moon' or the festival/day of the new moon,
    not merely an ordinal calendar day. The Hebrew parallel in Ezra 7:9 uses 'on the
    first of the first month'; in practice this corresponds to the new moon, but the
    Greek wording should be preserved.
- source_word: παρεγένοντο εἰς Ἰερουσαλήμ
  chosen: they arrived at Jerusalem
  alternatives:
  - they came to Jerusalem
  - he arrived at Jerusalem
  lexicon: LSJ
  rationale: The Greek verb is plural in Swete's text, so the main text reflects that.
    'Arrived at' captures successful completion of the journey. Because the MT parallel
    has singular reference to Ezra, the singular is preserved in a footnote rather
    than adopted into the main text.
- source_word: κατὰ τὴν δοθεῖσαν αὐτοῖς εὐοδίαν
  chosen: according to the prosperous journey given to them
  alternatives:
  - according to the good success granted them
  - with the favorable journey given to them
  lexicon: LSJ
  rationale: εὐοδία denotes a good/prosperous journey or success in travel. 'Prosperous
    journey' preserves the travel sense better than the more abstract 'success.'
- source_word: παρὰ τοῦ κυρίου
  chosen: by the Lord
  alternatives:
  - from the Lord
  lexicon: LSJ
  rationale: παρά with genitive here marks source. 'By the Lord' is idiomatic with
    'given'; 'Lord' follows the project's default for κύριος.
- source_word: ἐπʼ αὐτῷ
  chosen: upon him
  alternatives:
  - resting on him
  - with him
  - upon them
  lexicon: LSJ
  rationale: The phrase is difficult in this context, but literally means 'upon him.'
    In light of the MT parallel ('the hand of the LORD his God was upon him'), this
    likely abbreviates divine favor resting on Ezra. The main text keeps the literal
    phrase while a footnote explains the likely sense.
- source_word: οὗτος ἐνιαυτὸς ὁ δεύτερος βασιλεῖ
  chosen: omitted from main text as textually/syntactically corrupt
  alternatives:
  - this was the second year of the king
  - this year was the second for the king
  lexicon: LSJ
  rationale: As transmitted in Swete, this clause is syntactically and historically
    problematic in context and conflicts with the regnal dating already given. Given
    the verse's major mismatch status and the strong MT parallel lacking this clause,
    it is better treated as a textual problem and preserved in a footnote rather than
    forced into the main translation.
