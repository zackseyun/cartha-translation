theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Follows the project's default rendering for κύριος. In this Jewish scriptural
    context it denotes Israel's God rather than a merely human superior.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Cultic nuance of δῶρα and ηὔξαμην
  chosen_reading: gifts ... have vowed
  alternative_readings:
  - offerings ... have promised
  rationale: The verse concerns material dedicated to God for Jerusalem. The chosen
    wording preserves the religious force without over-specifying sacrificial procedure
    not explicit in the Greek.
