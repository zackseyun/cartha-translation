translation:
  text: 'From the sons of Banai: Outu son of Istakalkou, and with him seventy men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The approximate Hebrew parallel (Ezra 8:13) differs substantially here,
      reading a different family line and names, and giving sixty males rather than
      seventy men. The Greek text of 1 Esdras is followed in the main translation.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν Βαναὶ
  chosen: From the sons of Banai
  alternatives:
  - From the descendants of Banai
  - Of the family of Banai
  lexicon: LSJ
  rationale: ἐκ with the genitive marks source/group membership. υἱῶν is literally
    'sons,' but in genealogical/list contexts can denote descendants or members of
    a family line. 'Sons of Banai' keeps the formal structure of the Greek while remaining
    natural in English.
- source_word: Οὐτοῦ
  chosen: Outu
  alternatives:
  - Uthou
  - Outou
  lexicon: LSJ
  rationale: This is a proper name transliterated directly from the Greek witness.
    Because the Greek is the primary source and the MT parallel points to a substantially
    different name sequence, the Greek form is preserved rather than harmonized to
    the Hebrew parallel.
- source_word: Ἰστακάλκου
  chosen: son of Istakalkou
  alternatives:
  - Istakalkou
  - of Istakalkou
  lexicon: LSJ
  rationale: The Greek presents two adjacent proper names without an explicit relational
    noun. In this kind of roster, the second name commonly functions patronymically/appositionally.
    Rendering 'son of Istakalkou' makes the relationship intelligible in English while
    reflecting the likely list structure. Because the source lacks an explicit υἱός
    here, this is an interpretive but restrained expansion.
- source_word: μετʼ αὐτοῦ
  chosen: and with him
  alternatives:
  - with him
  - accompanied by him
  lexicon: LSJ
  rationale: A standard accompaniment phrase in these returnee lists. 'And with him'
    preserves the connective καί and the simple force of μετά.
- source_word: ἄνδρες ἑβδομήκοντα
  chosen: seventy men
  alternatives:
  - seventy males
  - seventy adult men
  lexicon: LSJ
  rationale: ἄνδρες denotes men/males, not a gender-neutral group. In a census/list
    context, 'men' is the most direct and natural rendering, consistent with the project's
    gender-accurate policy.
