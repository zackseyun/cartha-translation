translation:
  text: 'From the sons of Joab: Abadias son of Iezelus, and with him two hundred twelve
    men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Ezra 8:12 reads differently here, naming a descendant
      of Elam and numbering seventy males. Because 1 Esdras is translated from the
      Greek witness, this draft follows the Greek text rather than harmonizing to
      the Hebrew parallel.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν Ἰωάβ
  chosen: From the sons of Joab
  alternatives:
  - From the descendants of Joab
  - Of the family of Joab
  lexicon: LSJ
  rationale: υἱῶν is literally 'sons,' but in genealogical/list contexts it can denote
    descendants or members of a family line. 'Sons of Joab' preserves the formal wording
    and the list style of the Greek.
- source_word: Ἀβαδίας
  chosen: Abadias
  alternatives:
  - Obadiah
  lexicon: LSJ
  rationale: Personal names are transliterated rather than translated per project
    philosophy. The Greek form points to 'Abadias'; 'Obadiah' reflects the Hebrew
    equivalent but is not the direct Greek form here.
- source_word: Ἰεζήλου
  chosen: Iezelus
  alternatives:
  - Jezelus
  - Jeziel
  lexicon: LSJ
  rationale: The genitive proper name is rendered by transliteration from the Greek
    witness. Because 1 Esdras often diverges from the MT parallel and the Greek is
    primary here, the Greek-form name is retained rather than harmonizing to a Hebrew
    parallel.
- source_word: καὶ μετʼ αὐτοῦ
  chosen: and with him
  alternatives:
  - and accompanying him
  - and along with him
  lexicon: LSJ
  rationale: A straightforward rendering of the prepositional phrase in a census/list
    context.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  lexicon: LSJ
  rationale: ἄνδρες ordinarily means 'men' rather than the more biological 'males.'
    This also aligns with the Greek wording of the list. The MT parallel uses הַזְּכָרִים
    ('the males') elsewhere, but the Greek source for this verse has ἄνδρες.
- source_word: διακόσιοι δέκα δύο
  chosen: two hundred twelve
  alternatives:
  - two hundred and twelve
  lexicon: LSJ
  rationale: This is the plain numerical value of the Greek. Modern English style
    omits 'and' in cardinal numbers.
