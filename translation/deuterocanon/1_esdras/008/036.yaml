translation:
  text: 'From the sons of Bani: Salimoth son of Josaphias, and with him one hundred
    sixty men;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew parallel at Ezra 8:8 differs substantially here, naming a different
      family line, leader, and number. Because 1 Esdras is translated from the Greek
      witness, the main text follows the Greek: ''Bani ... Salimoth son of Josaphias
      ... one hundred sixty men.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν Βανίας
  chosen: From the sons of Bani
  alternatives:
  - From the descendants of Bani
  - Of the sons of Bani
  lexicon: LSJ
  rationale: υἱῶν literally means 'sons,' but in genealogical/list contexts can denote
    descendants or members of a family line. 'Sons of Bani' preserves the formal genealogical
    idiom while remaining natural in English. Βανίας is transliterated as the proper
    name Bani.
- source_word: Σαλειμὼθ
  chosen: Salimoth
  alternatives:
  - Sallimoth
  - Saleimoth
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek form in Swete. Since
    the Greek is the primary witness for 1 Esdras, the translation follows its name
    form rather than conforming to the approximate MT parallel.
- source_word: Ἰωσαφίου
  chosen: son of Josaphias
  alternatives:
  - Josaphiou
  - of Josaphias
  lexicon: LSJ
  rationale: The genitive proper name is most naturally expressed in English genealogy
    as 'son of Josaphias.' This makes the implied filial relationship explicit and
    matches list style in the surrounding passage.
- source_word: καὶ μετʼ αὐτοῦ
  chosen: and with him
  alternatives:
  - and accompanying him
  - and with him there were
  lexicon: LSJ
  rationale: A straightforward rendering of the prepositional phrase. The Greek list
    style is elliptical, so 'and with him' preserves the concise register without
    overfilling the syntax.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  - adult men
  lexicon: LSJ
  rationale: ἄνδρες refers specifically to males/men, not people in general. In a
    census or returnee list, 'men' is the natural and gender-accurate rendering.
- source_word: ἑκατὸν ἑξήκοντα
  chosen: one hundred sixty
  alternatives:
  - a hundred and sixty
  lexicon: LSJ
  rationale: This is the plain cardinal number. 'One hundred sixty' is clear modern
    English and fits the project's readability goals.
