translation:
  text: And now do not give your daughters in marriage to their sons,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'do not join your daughters to their sons in marriage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  chosen: And now
  alternatives:
  - So now
  - Now therefore
  lexicon: LSJ
  rationale: A natural connective-plus-temporal transition. 'And now' preserves the
    Greek sequence without over-interpreting the discourse force as strongly inferential
    ('therefore').
- source_word: τὰς θυγατέρας ὑμῶν
  chosen: your daughters
  alternatives:
  - the daughters of you
  lexicon: LSJ
  rationale: Straightforward possessive phrase. Kept gender-accurate and familial,
    matching the Greek directly.
- source_word: μὴ συνοικίσητε
  chosen: do not give in marriage
  alternatives:
  - do not marry off
  - do not join in marriage
  - do not let dwell together
  lexicon: LSJ
  rationale: The verb συνοικίζω can denote causing to live together as husband and
    wife, hence arranging or giving in marriage. In this context with daughters and
    sons, 'give ... in marriage' is idiomatic English and reflects the parental/communal
    perspective better than the less precise 'join in marriage.'
- source_word: τοῖς υἱοῖς αὐτῶν
  chosen: to their sons
  alternatives:
  - with their sons
  lexicon: LSJ
  rationale: The dative after συνοικίζω is well represented by English 'to' in the
    idiom 'give in marriage to.' 'Their' refers to the surrounding foreign peoples
    in context.
