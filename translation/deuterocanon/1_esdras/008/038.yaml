translation:
  text: 'the sons of Astad: Joanes son of Akatan, and with him one hundred ten men;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel at Ezra 8:10 differs notably here, reading a different
      family/name sequence and giving the number as one hundred sixty males. Because
      1 Esdras is translated from the Greek witness, the Greek names and total are
      retained in the main text.
    reason: textual_variant
  - marker: b
    text: Or possibly, 'Joanes Akatan'; the Greek can be read as two adjacent names
      without an explicit 'son of,' though the genealogical-list context favors the
      patronymic sense.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  chosen: the sons of
  alternatives:
  - sons of
  - from the sons of
  lexicon: LSJ
  rationale: The Greek phrase begins a list entry identifying a family/clan grouping.
    English list style is best served by 'the sons of,' though the idiom can also
    mean 'from the sons of.' The article is supplied naturally in English.
- source_word: Ἀστάδ
  chosen: Astad
  alternatives:
  - Astath
  - Asad
  rationale: This is a proper name transliterated directly from the Greek witness,
    which is primary for 1 Esdras. The MT parallel points to a different name tradition,
    but the Greek form should govern the main text.
- source_word: Ἰωάνης
  chosen: Joanes
  alternatives:
  - Joannes
  - Johanan
  rationale: Personal names are transliterated from the Greek in this corpus. Although
    the Semitic parallel may reflect a different underlying name, the Greek text here
    reads Ἰωάνης, best represented as 'Joanes' in straightforward transliteration.
- source_word: Ἀκατάν
  chosen: Akatan
  alternatives:
  - Akatan
  - Hakkatan
  - the younger
  lexicon: LSJ
  rationale: The form is treated as a proper name/appositional patronymic in the Greek
    list. Because the Greek lacks an explicit 'son of' but the sequence of names in
    such genealogical notices commonly implies filiation, English supplies 'son of'
    for clarity. An alternative is to leave it as a second name in apposition, but
    the patronymic sense is more likely in context.
- source_word: μετʼ αὐτοῦ
  chosen: and with him
  alternatives:
  - with him
  - and with them
  lexicon: LSJ
  rationale: The singular pronoun αὐτοῦ naturally refers to the named leader just
    given. 'And with him' preserves the list structure and the singular reference.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  lexicon: LSJ
  rationale: ἄνδρες ordinarily means 'men' rather than the more biological 'males.'
    The MT parallel uses הַזְּכָרִים ('the males'), but the Greek witness is primary
    and specifically uses the common term for men.
- source_word: ἑκατὸν δέκα
  chosen: one hundred ten
  alternatives:
  - a hundred and ten
  - one hundred and ten
  lexicon: LSJ
  rationale: This is the straightforward cardinal number in the Greek. The more compact
    modern English form fits the project's readability aims.
