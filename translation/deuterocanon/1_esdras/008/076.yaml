theological_decisions:
- issue: Rendering the δουλεία / δουλεύειν word group
  chosen_reading: slavery / enslaved
  alternative_readings:
  - servitude / serving
  - bondage / in bondage
  rationale: Following the doctrine's guidance on δοῦλος-family terms, the bonded
    nature is foregrounded here. The verse speaks of the people's subjection under
    foreign rule, so 'slavery' and 'enslaved' better preserve the severity than softer
    English alternatives.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος *doulos*; Translation
    philosophy §1'
- issue: Whether to interpret οἶκος τοῦ κυρίου as 'temple' in the main text
  chosen_reading: house of our Lord
  alternative_readings:
  - temple of our Lord
  rationale: Although the referent is the temple, the Greek wording is literally 'house.'
    Optimal equivalence here favors retaining the source image in the main text rather
    than importing the interpretive gloss 'temple.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5'
