translation:
  text: and to reveal a lamp for us in the house of our Lord, to give us food in the
    time of our slavery; and while we were enslaved, we were not forsaken
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to reveal a light for us'; the Greek literally says 'to uncover a lamp/light
      for us,' an image of renewed light in the Lord's house.
    reason: lexical_alternative
  - marker: b
    text: '''House of our Lord'' refers to the temple.'
    reason: cultural_note
  - marker: c
    text: Or 'in the time of our servitude' / 'while we were serving.' The Greek uses
      the δουλεία word group in both clauses.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνακαλύψαι
  chosen: to uncover
  alternatives:
  - to reveal
  - to remove the covering from
  - to restore
  lexicon: LSJ
  rationale: The verb literally means to uncover or unveil. In this context it governs
    φωστῆρα and likely reflects the image of bringing light into visibility or restoring
    it. 'Uncover' preserves the concrete metaphor better than the more interpretive
    'restore' or the smoother 'reveal'.
- source_word: φωστῆρα
  chosen: a lamp
  alternatives:
  - light
  - luminary
  lexicon: LSJ
  rationale: The noun can denote a light-bearing object or luminary. In the temple/house
    context, 'lamp' gives a natural English rendering for a concrete source of light
    while preserving the metaphor of renewed hope and worship. 'Light' is possible
    but less concrete; 'luminary' is too elevated for the register.
- source_word: οἶκος
  chosen: house
  alternatives:
  - temple
  lexicon: LSJ
  rationale: The Greek says 'house of our Lord.' In biblical usage this can refer
    to the temple, but 'house' is the direct lexical equivalent and preserves the
    source wording while allowing readers to recognize the temple reference from context.
- source_word: τροφὴν
  chosen: food
  alternatives:
  - nourishment
  - sustenance
  - provision
  lexicon: LSJ
  rationale: The noun denotes nourishment or food. 'Food' is the most straightforward
    rendering; 'sustenance' is possible but more abstract. The phrase likely speaks
    of provision during subjection, and 'food' keeps the concrete sense.
- source_word: δουλείας
  chosen: slavery
  alternatives:
  - servitude
  - bondage
  lexicon: LSJ
  rationale: Given the project's doctrine on δοῦλος-family terms, 'slavery' best preserves
    the bonded condition signaled by the word family. 'Servitude' and 'bondage' are
    possible, but 'slavery' is clearer and more concrete.
- source_word: ἐν τῷ δουλεύειν ἡμᾶς
  chosen: while we were enslaved
  alternatives:
  - while we were serving
  - in our slavery
  lexicon: LSJ
  rationale: The articular infinitive expresses the circumstance 'while we were serving/enslaved.'
    Because the surrounding clause already uses δουλεία language, 'while we were enslaved'
    keeps the lexical connection and the condition of subjection explicit.
- source_word: ἐγκατελείφθημεν
  chosen: we were not forsaken
  alternatives:
  - we were not abandoned
  - we were not left behind
  lexicon: LSJ
  rationale: The verb means to forsake or abandon. 'Forsaken' fits biblical register
    without becoming archaic in this context and preserves the covenantal resonance
    of divine non-abandonment.
