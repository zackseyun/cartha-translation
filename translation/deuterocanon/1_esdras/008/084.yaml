translation:
  text: And everything that happens to us comes because of our evil deeds and our
    great sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that befalls us happens on account of our evil deeds and our great
      sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ συμβαίνοντα πάντα
  chosen: everything that happens
  alternatives:
  - all that befalls
  - all the things occurring
  lexicon: LSJ
  rationale: The participial phrase from συμβαίνω denotes events that happen or befall.
    'Everything that happens' is natural modern English and preserves the comprehensive
    force of πάντα without sounding archaic.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - upon us
  - for us
  lexicon: BDAG
  rationale: The dative marks those affected by the events. In idiomatic English with
    'happens,' 'to us' best conveys the sense; 'upon us' is possible but more formal.
- source_word: γίνεται
  chosen: comes
  alternatives:
  - happens
  - comes about
  - takes place
  lexicon: BDAG
  rationale: 'Here γίνεται links the resulting state to its cause: what happens to
    the people ''comes'' because of their sins. Using ''comes'' avoids an awkward
    repetition of ''happens'' immediately after συμβαίνοντα while still reflecting
    the verb''s broad sense.'
- source_word: διὰ
  chosen: because of
  alternatives:
  - through
  - on account of
  lexicon: BDAG
  rationale: With the accusative, διά expresses cause. 'Because of' is the clearest
    contemporary rendering.
- source_word: τὰ ἔργα ἡμῶν τὰ πονηρά
  chosen: our evil deeds
  alternatives:
  - our wicked works
  - our evil actions
  lexicon: BDAG
  rationale: ἔργα are deeds/works, and πονηρά adds moral evil. 'Evil deeds' is concise,
    clear, and preserves the ethical force without unnecessary archaism.
- source_word: τὰς μεγάλας ἁμαρτίας
  chosen: our great sins
  alternatives:
  - our many sins
  - our grievous sins
  lexicon: BDAG
  rationale: μεγάλας is literally 'great,' emphasizing seriousness or magnitude. 'Great
    sins' keeps the formal sense better than interpretive 'many sins'; 'grievous sins'
    is possible but more stylized.
