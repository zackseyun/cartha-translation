translation:
  text: And I, King Artaxerxes, have given orders to the treasurers of Syria and Phoenicia,
    that whatever Ezra the priest and reader of the law of God Most High may send
    for, they are to give him carefully, up to one hundred talents of silver,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may request.' The Greek verb literally means 'may send,' but in this
      supply context it likely refers to sending a requisition or request.
    reason: lexical_alternative
  - marker: b
    text: Greek 'reader of the law.' In parallel Ezra traditions he is often described
      as a scribe; this Greek witness explicitly uses 'reader.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσέταξα
  chosen: have given orders
  alternatives:
  - commanded
  - ordered
  lexicon: BDAG
  rationale: Aorist of προστάσσω denotes issuing an authoritative directive. 'Have
    given orders' is natural modern English while preserving royal authority.
- source_word: γαζοφύλαξι
  chosen: treasurers
  alternatives:
  - keepers of the treasury
  - treasury officials
  lexicon: LSJ
  rationale: The term refers to officials responsible for treasury funds. 'Treasurers'
    is concise and idiomatic.
- source_word: ἐπιμελῶς
  chosen: carefully
  alternatives:
  - diligently
  - exactly
  - promptly
  lexicon: LSJ
  rationale: The adverb conveys careful, attentive execution. 'Carefully' preserves
    the sense without over-specifying speed; it modifies the giving as conscientious
    compliance.
- source_word: ἀποστείλῃ
  chosen: may send for
  alternatives:
  - may send
  - may request
  lexicon: BDAG
  rationale: In context of supplying resources, the verb likely means 'send [word]
    for' or 'request by dispatch.' 'May send for' captures the implied requisition
    better than a bare 'send.'
- source_word: ἀναγνώστης
  chosen: reader
  alternatives:
  - scribe
  - public reader
  lexicon: LSJ
  rationale: The Greek literally means 'reader.' Although Ezra functions as a scribe
    in parallel traditions, this Greek text explicitly calls him 'reader of the law,'
    so the translation should preserve that wording.
- source_word: τοῦ νόμου τοῦ θεοῦ τοῦ ὑψίστου
  chosen: of the law of God Most High
  alternatives:
  - of the law of the Most High God
  lexicon: LSJ
  rationale: Both English orders are possible. 'God Most High' follows the Greek sequence
    more closely while remaining readable.
- source_word: ἕως ἀργυρίου τάλαντων ἑκατόν
  chosen: up to one hundred talents of silver
  alternatives:
  - as much as one hundred talents of silver
  lexicon: LSJ
  rationale: ἕως marks the upper limit of the authorized amount. 'Up to' expresses
    the cap clearly in modern English.
- source_word: ἰδοὺ
  chosen: omitted in English
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: As a discourse particle, ἰδού is often not represented directly in contemporary
    English when it would sound stilted. Its emphatic force is sufficiently carried
    by the royal self-identification.
