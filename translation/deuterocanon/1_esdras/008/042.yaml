translation:
  text: And after gathering them to the river called the River, we camped there for
    three days, and I examined them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'to the river called the River.' The wording likely preserves
      a place-name designation rather than a generic description.
    reason: lexical_alternative
  - marker: b
    text: The Greek text shifts from 'we camped' to 'I inspected them.' Some translations
      smooth this to a consistent person, but the source text distinguishes the group's
      action from Ezra's personal review.
    reason: alternative_reading
lexical_decisions:
- source_word: συναγαγών
  chosen: after gathering
  alternatives:
  - having gathered
  - when I gathered
  lexicon: LSJ
  rationale: Aorist participle of συνάγω, naturally rendered as a prior action leading
    into the main verbs. 'After gathering' gives clear English sequence without over-paraphrasing.
- source_word: ἐπὶ τὸν λεγόμενον Ποταμόν
  chosen: to the river called the River
  alternatives:
  - to the so-called River
  - to the place called the River
  - to the river named Potamos
  lexicon: LSJ
  rationale: λεγόμενον means 'called/named.' Ποταμός is literally 'River' and appears
    here as a place designation. Retaining 'the river called the River' preserves
    the Greek wording and the likely toponymic force better than smoothing it away.
- source_word: παρενεβάλομεν
  chosen: we camped
  alternatives:
  - we encamped
  - we made camp
  lexicon: LSJ
  rationale: The verb means to encamp. 'We camped' is idiomatic modern English; 'encamped'
    is possible but slightly more archaic.
- source_word: αὐτόθι
  chosen: there
  alternatives:
  - in that place
  - on the spot
  lexicon: LSJ
  rationale: Simple adverb of place; 'there' is the most natural equivalent.
- source_word: ἡμέρας τρεῖς
  chosen: for three days
  alternatives:
  - three days
  lexicon: LSJ
  rationale: Accusative of duration; 'for three days' makes the temporal force explicit
    in English.
- source_word: κατέμαθον αὐτούς
  chosen: I inspected them
  alternatives:
  - I examined them
  - I took note of them
  - I reviewed them
  lexicon: LSJ
  rationale: The transmitted Greek has first-person plural earlier ('we camped') but
    here a first-person singular form, matching Ezra's personal action in the parallel
    context. In context the sense is not merely 'I learned them' but that he looked
    them over / took stock of them. 'Inspected' captures the contextual force of reviewing
    the assembled group.
