translation:
  text: I sent for Eleazar, Iduel, Maasman, Enaathan, Shemaiah, Jorib, Nathan, Ennathan,
    Zechariah, and Mesholabon, the leaders and men of understanding,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several personal names in this verse are preserved in Greek forms that are
      difficult to align exactly with the Hebrew parallel in Ezra; English transliterations
      therefore follow the Greek witness here rather than attempting a full harmonization.
    reason: textual_variant
lexical_decisions:
- source_word: ἀπέστειλα
  chosen: I sent for
  alternatives:
  - I sent
  - I dispatched
  lexicon: BDAG
  rationale: The verb means 'I sent,' but with πρὸς plus personal names in this context
    it idiomatically conveys sending to summon or call persons. 'I sent for' is natural
    English and fits the narrative sense better than the bare 'I sent.'
- source_word: πρὸς
  chosen: for
  alternatives:
  - to
  - to summon
  lexicon: BDAG
  rationale: Literally 'to/toward,' but after ἀπέστειλα and before a list of persons
    it indicates the direction of the sending. In English, 'sent for' best captures
    the action of dispatching messengers to these named men.
- source_word: Ἐλεάζαρον καὶ Ἰδούηλον καὶ Μαασμὰν καὶ Ἐναατὰν καὶ Σαμαίαν καὶ Ἰώριβον,
    Ναθάν, Ἐννατάν, Ζαχαρίαν καὶ Μεσολαβών
  chosen: Eleazar, Iduel, Maasman, Enaathan, Shemaiah, Jorib, Nathan, Ennathan, Zechariah,
    and Mesholabon
  alternatives:
  - Eleazar, Idouel, Maasma, Enaatan, Samaias, Iorib, Nathan, Ennatan, Zachariah,
    and Mesolabōn
  lexicon: LSJ
  rationale: Personal names are transliterated rather than translated, per project
    philosophy. Forms are normalized into readable English transliterations while
    remaining anchored to the Greek spellings in Swete. Some names are textually and
    transliterationally uncertain because 1 Esdras preserves Greek forms that do not
    map neatly onto the MT parallel.
- source_word: τοὺς ἡγουμένους
  chosen: the leaders
  alternatives:
  - the leading men
  - the rulers
  lexicon: BDAG
  rationale: The participle denotes those who lead or hold prominence. 'The leaders'
    is concise, natural English and fits the social role indicated here.
- source_word: ἐπιστήμονας
  chosen: men of understanding
  alternatives:
  - experts
  - men of insight
  - learned men
  lexicon: LSJ
  rationale: The adjective/substantive denotes knowledgeable or skilled persons. 'Men
    of understanding' preserves the personal and qualitative sense without sounding
    overly technical. Because the Greek is grammatically masculine and refers to specific
    named males, a masculine rendering is appropriate under the project's gender-accuracy
    principle.
