theological_decisions:
- issue: Relation to the Hebrew parallel in Ezra 9:12, which includes giving daughters
    and seeking peace/prosperity
  chosen_reading: Translate the extant Greek directly while allowing the Hebrew parallel
    to clarify the idiom behind 'seek peace with them.'
  alternative_readings:
  - 'Expand the English to match the fuller Hebrew parallel: ''do not seek their peace
    or prosperity'''
  - Render only the Greek surface form without any Semitic clarification
  rationale: The project prioritizes the Greek for 1 Esdras, but the supplied MT parallel
    is to be used as real input. Here the Greek wording is somewhat compressed, and
    the Hebrew parallel supports understanding the prohibition as avoiding favorable
    alliance/welfare-seeking with the surrounding peoples. The main text remains anchored
    in the Greek, while a footnote preserves the fuller alternative nuance.
