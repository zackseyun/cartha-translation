translation:
  text: and do not take their daughters for your sons, and do not seek peace with
    them for all time, so that, having become strong, you may eat the good things
    of the land and inherit it
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more fully in light of the Hebrew parallel, 'do not seek their peace
      or prosperity forever.'
    reason: alternative_reading
lexical_decisions:
- source_word: λάβητε
  chosen: take
  alternatives:
  - marry
  - take in marriage
  lexicon: BDAG
  rationale: The verb literally means 'take.' In this marriage context, English 'take'
    preserves the source wording while naturally implying taking in marriage when
    paired with 'their daughters for your sons.' 'Marry' would be more explicit but
    slightly more interpretive.
- source_word: ζητήσετε
  chosen: seek
  alternatives:
  - pursue
  - strive for
  lexicon: BDAG
  rationale: A straightforward rendering of the future verb. 'Seek' keeps the prohibition
    broad and close to the Greek.
- source_word: εἰρηνεῦσαι τὰ πρὸς αὐτούς
  chosen: peace with them
  alternatives:
  - to be at peace with them
  - their welfare
  - their peace and prosperity
  lexicon: BDAG
  rationale: The idiom is compressed in Greek. The likely sense, especially in light
    of the Ezra parallel, is not to pursue peaceful relations or welfare with these
    peoples. 'Peace with them' is concise and faithful; a footnote preserves the fuller
    alternative nuance of 'welfare/prosperity.'
- source_word: τὸν ἅπαντα χρόνον
  chosen: for all time
  alternatives:
  - forever
  - all your days
  - at any time
  lexicon: BDAG
  rationale: Literally 'the whole time.' 'For all time' reflects the comprehensive
    force without sounding overly idiomatic. The phrase functions as a strong enduring
    prohibition rather than a metaphysical statement about eternity.
- source_word: ἵνα ἰσχύσαντες
  chosen: having become strong
  alternatives:
  - being strengthened
  - growing strong
  lexicon: BDAG
  rationale: The aorist participle from ἰσχύω denotes becoming strong or prevailing.
    'Having become strong' preserves the participial sequence leading into the purpose/result
    clause.
- source_word: φάγητε τὰ ἀγαθὰ τῆς γῆς
  chosen: you may eat the good things of the land
  alternatives:
  - enjoy the good of the land
  - eat the produce of the land
  lexicon: BDAG
  rationale: A fairly literal rendering that still reads naturally. 'Good things'
    preserves the broad sense of ἀγαθά, which can include produce and prosperity.
- source_word: κατακληρονομήσητε
  chosen: inherit it
  alternatives:
  - leave it as an inheritance
  - possess it as an inheritance
  lexicon: BDAG
  rationale: The compound verb carries inheritance language. Because the direct object
    is implicit from 'the land,' English naturally supplies 'it.' This keeps the covenantal
    inheritance nuance without overexpanding.
