theological_decisions:
- issue: Nature of the impurity language
  chosen_reading: Retain 'uncleannesses' as cultic-moral impurity language without
    softening to merely social separation.
  alternative_readings:
  - impurities
  - abominations
  rationale: The verse participates in post-exilic holiness language. 'Uncleannesses'
    preserves the ritual-moral register of ἀκαθαρσία without importing a stronger
    term like 'abominations' unless the source explicitly uses it here. The MT parallel
    in Ezra 9:1 includes broader language, but the Greek witness here should govern
    the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
