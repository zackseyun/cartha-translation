translation:
  text: The rulers and the priests and the Levites have not separated themselves from
    the foreign nations of the land, with their uncleannesses—from the Canaanites
    and Hittites and Perizzites and Jebusites and Moabites and Egyptians and Edomites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have not kept themselves separate from the foreign peoples of the land
      in their impurities.' The Greek wording is compressed; the Hebrew parallel in
      Ezra 9:1 supports the sense of failure to separate from the peoples and their
      defiling practices.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ ἐχώρισαν
  chosen: have not separated themselves
  alternatives:
  - did not separate
  - have not kept themselves separate
  lexicon: BDAG
  rationale: The aorist states a completed failure to separate; English present perfect
    fits the report-like context. The middle/reflexive sense is brought out with 'themselves.'
- source_word: οἱ ἄρχοντες
  chosen: the rulers
  alternatives:
  - the leaders
  - the officials
  lexicon: BDAG
  rationale: ἄρχοντες denotes those in authority. 'Rulers' is broad and natural, and
    it preserves the formal public role better than the more generic 'leaders.'
- source_word: οἱ ἱερεῖς
  chosen: the priests
  alternatives:
  - the priestly men
  lexicon: BDAG
  rationale: Standard rendering for ἱερεῖς.
- source_word: οἱ Λευεῖται
  chosen: the Levites
  lexicon: BDAG
  rationale: Standard transliterated rendering for the tribal/cultic group.
- source_word: ἀλλογενῆ ἔθνη
  chosen: the foreign nations
  alternatives:
  - the peoples of another race
  - the foreign peoples
  - the nations of another stock
  lexicon: BDAG
  rationale: The phrase denotes non-Israelite peoples. 'Foreign nations' is idiomatic
    and preserves the ethnic-national distinction without overreading the term in
    racialized modern categories.
- source_word: τῆς γῆς
  chosen: of the land
  alternatives:
  - of the earth
  - in the land
  lexicon: BDAG
  rationale: In this context γῆ refers to the local land/territory, not the whole
    earth. 'Of the land' also echoes biblical covenant-land diction.
- source_word: ἀκαθαρσίας αὐτῶν
  chosen: with their uncleannesses
  alternatives:
  - from their uncleanness
  - according to their impurities
  - with their impurities
  lexicon: BDAG
  rationale: The Greek as transmitted is compressed and somewhat awkward. 'With their
    uncleannesses' reflects the dative-like associative force implied in context and
    preserves the plural nuance of ἀκαθαρσίαι as manifold defilements/practices. The
    Hebrew parallel in Ezra 9:1 supports the sense of separation not occurring in
    relation to the abominations/impurities of the peoples.
- source_word: Χαναναίων ... Ἰδουμαίων
  chosen: from the Canaanites and Hittites and Perizzites and Jebusites and Moabites
    and Egyptians and Edomites
  alternatives:
  - namely, the Canaanites ...
  - that is, the Canaanites ...
  lexicon: BDAG
  rationale: These genitives specify the foreign nations in view. 'Edomites' reflects
    Ἰδουμαῖοι, the Greek form corresponding to Edom/Idumea. The preposition 'from'
    is supplied in English to make the list govern naturally after 'separated themselves,'
    though the Greek list is appositional.
