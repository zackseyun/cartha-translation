translation:
  text: 'From the sons of Sophotius: Zaraias son of Michael, and with him seventy
    men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek names here differ from the approximate Hebrew parallel in Ezra
      8:6, which reads 'from the sons of Adin, Ebed son of Jonathan, and with him
      fifty males.' Because 1 Esdras is translated from the Greek witness, the main
      text follows the Greek names and number.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  chosen: From the sons of
  alternatives:
  - Of the sons of
  - From among the sons of
  lexicon: LSJ
  rationale: ἐκ with the genitive marks selection from a group. In this list context,
    'From the sons of' is natural English and preserves the genealogical/listing formula.
- source_word: Σοφοτίου
  chosen: Sophotius
  alternatives:
  - Sofotius
  - Sopotius
  rationale: Proper name transliterated directly from the Greek, following project
    policy to transliterate personal names rather than translate them. The Greek form
    differs from the approximate MT parallel, so the Greek witness governs.
- source_word: Ζαραίας
  chosen: Zaraias
  alternatives:
  - Zarias
  - Zerahias
  rationale: Proper name transliterated from the Greek nominative form. 'Zaraias'
    closely reflects the source spelling without importing a harmonization from the
    Hebrew parallel.
- source_word: Μειχαήλου
  chosen: son of Michael
  alternatives:
  - Michael
  - of Michael
  rationale: The bare genitive in this genealogical list is most naturally understood
    filially in English. Supplying 'son of' makes the relationship explicit and matches
    the list style, rather than leaving an awkward appositional genitive.
- source_word: μετʼ αὐτοῦ
  chosen: and with him
  alternatives:
  - with him
  - together with him
  lexicon: BDAG
  rationale: Standard accompaniment phrase in census-style lists. 'And with him' fits
    the syntax of the entry and links the named leader to the following number.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  lexicon: BDAG
  rationale: ἄνδρες ordinarily means adult males/men. Given the list context and the
    explicit counting of male returnees in the Hebrew parallel tradition, 'men' is
    the most natural and gender-accurate rendering.
- source_word: ἑβδομήκοντα
  chosen: seventy
  lexicon: LSJ
  rationale: Straightforward cardinal numeral.
