translation:
  text: And those from the captivity did all these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the returned exiles did all this.' The Greek literally says 'those
      from the captivity,' referring to the post-exilic community.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν
  chosen: did
  alternatives:
  - made
  - carried out
  lexicon: BDAG
  rationale: ποιέω here functions idiomatically with κατὰ πάντα ταῦτα to mean performing
    or carrying out the actions just described, not manufacturing something. 'Did'
    is the most natural modern English equivalent.
- source_word: κατὰ πάντα ταῦτα
  chosen: all these things
  alternatives:
  - according to all these things
  - in accordance with all this
  lexicon: LSJ
  rationale: The phrase means acting in conformity with the matters just recounted.
    In English, 'did all these things' captures both the totality (πάντα) and the
    backward reference (ταῦτα) without awkward literalism.
- source_word: οἱ ἐκ τῆς αἰχμαλωσίας
  chosen: those from the captivity
  alternatives:
  - the returned exiles
  - those of the exile
  - those from exile
  lexicon: LSJ
  rationale: Formally, the Greek says 'those from the captivity/exile.' Although the
    broader context refers to the returned community, 'those from the captivity' stays
    closer to the Greek wording while remaining intelligible. The MT parallel concerns
    the same post-exilic group and supports understanding this as the returned exiles,
    but the Greek expression itself is retained in translation.
