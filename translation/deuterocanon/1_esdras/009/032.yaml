translation:
  text: 'And from the sons of Annan: Eliodas, Asaiah, Melchiah, Sabbaias, and Simon
    Chosamaus.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some names in this list have Hebrew-parallel equivalents in Ezra/Nehemiah
      traditions (for example, Annan/Hanan; Sabbaias/Shabbethai). The main text follows
      the Greek form of 1 Esdras, with Hebrew parallels used only as a check.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - also
  - then
  lexicon: LSJ
  rationale: Standard connective introducing the next item in a list; simple 'And'
    preserves the enumerative flow.
- source_word: ἐκ τῶν υἱῶν
  chosen: from the sons of
  alternatives:
  - of the sons of
  - among the sons of
  lexicon: LSJ
  rationale: In this genealogical/list context, ἐκ marks membership within a family
    group. 'From the sons of' is idiomatic English that preserves the source structure.
- source_word: Ἀννὰν
  chosen: Annan
  alternatives:
  - Hanan
  lexicon: LSJ
  rationale: This is a personal name transliterated directly from the Greek witness,
    which is the primary source for 1 Esdras. The MT parallel tradition often has
    Hanan/Hanan-like forms, but the Greek form should govern the main text.
- source_word: Ἐλιωδὰς
  chosen: Eliodas
  alternatives:
  - Eliodas
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek. 'Eliodas' reflects the visible
    Greek vowels straightforwardly.
- source_word: Ἀσαίας
  chosen: Asaiah
  alternatives:
  - Asaias
  lexicon: LSJ
  rationale: For this name, an English form closer to familiar biblical transliteration
    is preferable while still representing the Greek accurately. The ending -ίας commonly
    corresponds to English -iah in Semitic names.
- source_word: Μελχείας
  chosen: Melchiah
  alternatives:
  - Melcheias
  - Malchijah
  lexicon: LSJ
  rationale: The Greek points to a Semitic name commonly rendered in English with
    -iah. 'Melchiah' balances fidelity to the Greek form with readable standard name
    transliteration. 'Malchijah' would lean more heavily on the Hebrew parallel than
    the Greek source warrants.
- source_word: Σαββαίας
  chosen: Sabbaias
  alternatives:
  - Sabaias
  - Shabbethai
  lexicon: LSJ
  rationale: The Greek form is best preserved by transliteration here. A Hebrew-aligned
    equivalent such as 'Shabbethai' is possible in the broader Ezra tradition, but
    this verse should remain anchored to the Greek witness.
- source_word: Σίμων
  chosen: Simon
  alternatives:
  - Symeon
  lexicon: LSJ
  rationale: Standard English transliteration of the Greek proper name.
- source_word: Χοσάμαος
  chosen: Chosamaus
  alternatives:
  - Hosamaus
  - Chosamais
  lexicon: LSJ
  rationale: This is a difficult proper name with limited external control in English
    tradition. A close transliteration from the Greek is the most transparent choice.
