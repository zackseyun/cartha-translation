translation:
  text: And a proclamation was made throughout all Judea and Jerusalem to all those
    from the captivity, that they should assemble in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'to all the exiles' or 'to all the returned exiles.'
      The Greek reads literally 'to all those from the captivity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο κήρυγμα
  chosen: a proclamation was made
  alternatives:
  - a heralding took place
  - a decree went out
  - a proclamation went out
  lexicon: LSJ
  rationale: The idiom literally is 'a proclamation came to be.' In natural English,
    'a proclamation was made' preserves the passive/public sense without awkwardness.
    'Decree' would overstate the formality of κήρυγμα, which is more the public announcement
    itself.
- source_word: ἐν ὅλῃ τῇ Ἰουδαίᾳ καὶ Ἰερουσαλήμ
  chosen: throughout all Judea and Jerusalem
  alternatives:
  - in all Judea and Jerusalem
  - through all Judea and Jerusalem
  lexicon: LSJ
  rationale: ἐν with the whole-region expression indicates the sphere in which the
    proclamation circulated. 'Throughout' conveys dissemination across the territory
    and city more idiomatically than a bare 'in.'
- source_word: πᾶσι τοῖς ἐκ τῆς αἰχμαλωσίας
  chosen: to all those from the captivity
  alternatives:
  - to all the returned exiles
  - to all those of the exile
  - to all the exiles
  lexicon: LSJ
  rationale: The Greek literally identifies the audience as those 'from the captivity/exile.'
    'Those from the captivity' stays close to the wording while remaining intelligible.
    'Returned exiles' is interpretive, though context supports it; the more literal
    phrase better preserves the source expression. The MT parallel supports the exilic-return
    context, but the Greek wording remains primary.
- source_word: συναχθῆναι
  chosen: that they should assemble
  alternatives:
  - to be gathered
  - to gather together
  - that they should be assembled
  lexicon: LSJ
  rationale: The aorist passive infinitive after κήρυγμα expresses the content/purpose
    of the proclamation. 'That they should assemble' gives clear English sense and
    reflects the summons without forcing an overly literal passive.
- source_word: εἰς Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - to Jerusalem
  - at Jerusalem
  lexicon: LSJ
  rationale: 'Although εἰς is literally ''into/to,'' with συναχθῆναι in English the
    natural result is destination as place of assembly: ''assemble in Jerusalem.''
    ''To Jerusalem'' is possible, but ''assemble in'' reads more idiomatically while
    preserving the sense.'
