theological_decisions:
- issue: Whether to render the relationship term as explicit marriage ('wives') or
    preserve the Greek's broader cohabitation language
  chosen_reading: Preserve the Greek wording with 'lived with foreign women' in the
    main text
  alternative_readings:
  - had married foreign women
  - had taken foreign wives
  rationale: The Greek primary witness uses συνῴκησαν γυναῖξιν ἀλλογενέσιν, which
    is more literally 'lived with foreign women.' The Hebrew parallel reflects marriage
    more explicitly, but because 1 Esdras is translated from the Greek witness here,
    the main text follows the Greek while allowing the marital nuance to remain implicit.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence'
