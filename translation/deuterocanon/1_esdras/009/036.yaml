translation:
  text: All these had lived with foreign women, and they sent them away with their
    children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly from the Hebrew parallel, 'had married foreign women'
      or 'had taken foreign wives.'
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες οὗτοι
  chosen: All these
  alternatives:
  - All of these
  - All these men
  lexicon: LSJ
  rationale: A straightforward rendering of the demonstrative phrase. 'Men' is not
    explicit in the Greek here, so it is not added in the main text.
- source_word: συνῴκησαν
  chosen: had lived with
  alternatives:
  - had dwelt with
  - had married
  - had cohabited with
  lexicon: LSJ
  rationale: The verb literally denotes living together/cohabiting. In this context
    of foreign wives, the sense overlaps with marriage, but 'had lived with' stays
    closer to the Greek while still reading naturally. The MT parallel supports the
    marital context ('had taken foreign women'), but the Greek wording is retained
    as primary.
- source_word: γυναῖξιν ἀλλογενέσιν
  chosen: foreign women
  alternatives:
  - women of another people
  - foreign wives
  lexicon: LSJ
  rationale: ἀλλογενής means belonging to another race/people, hence 'foreign.' 'Women'
    is the direct lexical equivalent of γυναῖξιν; although the context implies wives,
    the Greek does not explicitly say 'wives' in this clause.
- source_word: ἀπέλυσαν
  chosen: sent away
  alternatives:
  - dismissed
  - put away
  - released
  lexicon: LSJ
  rationale: The verb commonly means release or dismiss. In this context of separating
    from foreign women, 'sent away' is idiomatic and clear without importing later
    technical divorce language more strongly than the text itself does.
- source_word: αὐτὰς
  chosen: them
  alternatives:
  - those women
  - their wives
  lexicon: LSJ
  rationale: The pronoun refers back to the foreign women. 'Them' is the natural English
    equivalent; 'their wives' would make explicit what is only contextually implied.
- source_word: σὺν τέκνοις
  chosen: with their children
  alternatives:
  - with children
  - along with the children
  lexicon: LSJ
  rationale: τέκνα means children. The possessive 'their' is supplied in English because
    the children are understood to belong to the women/these unions in context, and
    the MT parallel also mentions sons/children.
