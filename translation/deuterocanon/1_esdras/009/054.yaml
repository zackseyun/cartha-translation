translation:
  text: And they all went away to eat and drink and rejoice, and to send portions
    to those who had nothing, and to rejoice greatly;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to those who had no portions prepared'; the Hebrew parallel explicitly
      speaks of sending portions (food shares) to those lacking them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾤχοντο
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: LSJ
  rationale: The imperfect/middle form from οἴχομαι commonly means 'go away' or 'depart.'
    'Went away' preserves the sense of dispersing from the assembly to carry out the
    celebration.
- source_word: φαγεῖν καὶ πιεῖν
  chosen: to eat and drink
  alternatives:
  - for eating and drinking
  lexicon: LSJ
  rationale: Straightforward infinitival pair indicating the purpose/content of their
    departure; the idiomatic English pairing is retained.
- source_word: εὐφραίνεσθαι
  chosen: to rejoice
  alternatives:
  - to celebrate
  - to be glad
  lexicon: LSJ
  rationale: The verb denotes gladness or festal rejoicing. 'Rejoice' preserves the
    emotional and celebratory force without over-paraphrasing.
- source_word: δοῦναι ἀποστολὰς
  chosen: to send portions
  alternatives:
  - to give gifts
  - to send shares
  lexicon: LSJ
  rationale: In context, with the Hebrew parallel וּלְשַׁלַּח מָנוֹת, this refers
    to sending food portions to others as part of the feast. 'Send portions' best
    reflects both Greek and Hebrew witnesses.
- source_word: τοῖς μὴ ἔχουσιν
  chosen: to those who had nothing
  alternatives:
  - to those who did not have
  - to those who had none
  lexicon: LSJ
  rationale: Literally 'to those not having.' The Greek leaves the object implicit;
    the Hebrew parallel suggests those lacking provisions for the feast. 'Had nothing'
    is natural English and fits the festive-sharing context.
- source_word: εὐφρανθῆναι μεγάλως
  chosen: to rejoice greatly
  alternatives:
  - to celebrate greatly
  - to be very glad
  lexicon: LSJ
  rationale: The aorist passive infinitive with μεγάλως intensifies the joy. Rendering
    it distinctly from the earlier εὐφραίνεσθαι preserves the Greek's rhetorical fullness
    while remaining readable.
