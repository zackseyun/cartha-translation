translation:
  text: And he told Ezra the priest and reader to bring the law of Moses that had
    been given by the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reader' may be understood more specifically as 'public reader'; some
      might also render it 'scribe,' but the Greek term here more directly denotes
      one who reads aloud.
    reason: lexical_alternative
  - marker: b
    text: Or 'that had been handed down by the God of Israel.' The Greek participle
      can emphasize transmission as well as giving.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: told
  alternatives:
  - said
  - commanded
  lexicon: BDAG
  rationale: The verb is the common 'said,' but with the infinitive κομίσαι introducing
    requested action, English 'told ... to bring' conveys the sense naturally without
    overstating it as a formal command.
- source_word: Ἔσρᾳ
  chosen: Ezra
  rationale: Standard transliteration of the personal name, following the project's
    policy to transliterate names rather than translate them.
- source_word: τῷ ἱερεῖ
  chosen: the priest
  alternatives:
  - priest
  lexicon: BDAG
  rationale: 'The article is retained in English because it identifies Ezra by office:
    ''Ezra the priest.'''
- source_word: ἀναγνώστῃ
  chosen: reader
  alternatives:
  - scribe
  - public reader
  lexicon: BDAG
  rationale: The Greek noun literally denotes a reader/reciter. Although the MT parallel
    emphasizes Ezra as priest bringing the law before the assembly, this Greek text
    explicitly adds his role as reader, so 'reader' should be preserved rather than
    harmonized to 'scribe'.
- source_word: κομίσαι
  chosen: to bring
  alternatives:
  - to carry
  - to produce
  lexicon: BDAG
  rationale: In context the infinitive refers to bringing forth the law before the
    people. 'Bring' is the most natural and sufficiently formal rendering.
- source_word: τὸν νόμον Μωυσέως
  chosen: the law of Moses
  alternatives:
  - the law from Moses
  - the Mosaic law
  lexicon: BDAG
  rationale: This is the standard and transparent rendering of the genitive construction,
    matching both Greek sense and the Hebrew parallel's התורה.
- source_word: τὸν παραδοθέντα
  chosen: that had been given
  alternatives:
  - that had been handed down
  - that had been delivered
  lexicon: BDAG
  rationale: The participle from παραδίδωμι can mean 'handed over/handed down/delivered.'
    In this context of divine transmission of the law, 'given' is idiomatic and clear,
    while still reflecting the law as something transmitted from God. 'Handed down'
    is possible but sounds more tradition-focused than the immediate context requires.
- source_word: ὑπὸ τοῦ θεοῦ Ἰσραήλ
  chosen: by the God of Israel
  alternatives:
  - from the God of Israel
  lexicon: BDAG
  rationale: ὑπό with the passive participle marks agency, so 'by the God of Israel'
    is the most direct rendering.
