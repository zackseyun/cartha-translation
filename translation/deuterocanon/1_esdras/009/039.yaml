theological_decisions:
- issue: Relation of the law to Moses and to God
  chosen_reading: the law of Moses that had been given by the God of Israel
  alternative_readings:
  - the law of Moses handed down by the God of Israel
  - the law given through Moses by the God of Israel
  rationale: 'The Greek explicitly names both Moses and God: Moses in relation to
    the law, and God as the agent of its transmission. The translation preserves both
    without adding ''through Moses,'' which is interpretively plausible but not stated
    in the Greek wording here.'
