translation:
  text: 'From the gatekeepers: Shallumus and Tobanes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''From the gatekeepers: Shallumus and Tobanes.'' The parallel Hebrew
      tradition for this section is not closely aligned at this point and does not
      preserve these names in the same form.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ
  chosen: From
  alternatives:
  - Among
  - Of
  lexicon: LSJ
  rationale: 'In this list context, ἐκ marks the subgroup from which the named men
    come: ''from'' or ''out of.'' ''From'' is the most natural English introduction
    to a roster category.'
- source_word: τῶν θυρωρῶν
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the porters
  lexicon: LSJ
  rationale: θυρωρός denotes one who keeps a door or gate. In temple/community roster
    contexts, 'gatekeepers' is clearer and more idiomatic in modern English than 'porters,'
    while preserving the official function.
- source_word: Σάλλουμος
  chosen: Shallumus
  alternatives:
  - Salloumos
  - Shallum
  rationale: This is a personal name transliterated from the Greek form. 'Shallumus'
    preserves the Greek ending while using a standard English transliteration style.
    The Hebrew parallel may suggest a related Semitic form, but the Greek witness
    is primary here.
- source_word: καὶ
  chosen: and
  lexicon: LSJ
  rationale: Simple connective joining the two names.
- source_word: Τοβάνης
  chosen: Tobanes
  alternatives:
  - Tobanis
  - Tobiah
  rationale: The Greek form is best represented by direct transliteration as 'Tobanes.'
    A more familiar Hebrew-like name such as 'Tobiah' would import a harmonization
    not warranted by the Greek text alone.
