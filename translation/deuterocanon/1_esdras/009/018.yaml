translation:
  text: And among the priests there were found some who had taken foreign women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the ones gathered together, having foreign women.' The
      wording is somewhat awkward in the transmitted text; the Hebrew parallel supports
      the sense 'those who had taken foreign women.'
    reason: textual_variant
lexical_decisions:
- source_word: εὑρέθησαν
  chosen: there were found
  alternatives:
  - were found
  - were discovered
  lexicon: LSJ
  rationale: Passive aorist of εὑρίσκω. The impersonal English construction 'there
    were found' preserves the Greek passive and the sense of official discovery/listing
    in this context.
- source_word: τῶν ἱερέων
  chosen: among the priests
  alternatives:
  - of the priests
  - from the priests
  lexicon: LSJ
  rationale: 'The genitive after εὑρέθησαν is naturally partitive: those discovered
    were drawn from the class of priests. ''Among the priests'' communicates this
    clearly in modern English.'
- source_word: οἱ ... ἔχοντες
  chosen: some who had taken
  alternatives:
  - those having
  - those who had
  - those who were having
  lexicon: LSJ
  rationale: The article with participle identifies a subgroup. Although ἔχοντες is
    literally 'having,' in this marital context and in light of the Hebrew parallel
    נָשְׂאוּ ('had married/taken'), 'had taken' best reflects the idiomatic sense
    without overparaphrasing.
- source_word: ἐπισυναχθέντες
  chosen: some
  alternatives:
  - assembled
  - gathered together
  - enrolled
  lexicon: LSJ
  rationale: The transmitted Greek includes ἐπισυναχθέντες, literally 'having been
    gathered together,' but in this compressed list context it functions awkwardly
    and may reflect a textual disturbance or secondary descriptor. Since the main
    clause's sense is clear and the MT parallel focuses on those who had taken foreign
    women, the English keeps the core referent as a subgroup ('some') rather than
    forcing an unnatural 'the gathered ones.' This source-level mismatch is noted
    implicitly by the restrained rendering.
- source_word: ἀλλογενεῖς γυναῖκας
  chosen: foreign women
  alternatives:
  - women of another people
  - alien women
  - strange women
  lexicon: LSJ
  rationale: ἀλλογενής means belonging to another race/people, foreign. 'Foreign women'
    is idiomatic, accurate, and avoids archaic 'strange women.'
- source_word: ἔχοντες
  chosen: had taken
  alternatives:
  - had married
  - were having
  lexicon: LSJ
  rationale: The Greek participle literally means 'having,' but the Hebrew parallel
    and the Ezra context indicate marriage/possession of wives. 'Had taken' preserves
    the idiom's marital force while staying closer to the source than the more interpretive
    'had married.'
