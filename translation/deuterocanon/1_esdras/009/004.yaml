translation:
  text: And whoever does not appear within two or three days, according to the judgment
    of the elders who preside, their livestock will be devoted, and he himself will
    be excluded from the assembly of the captivity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'their property will be forfeited.' The Greek says
      'will be devoted,' which may carry confiscatory force in this legal setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the community of the exiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαντήσωσιν
  chosen: appear
  alternatives:
  - meet
  - present themselves
  - respond
  lexicon: BDAG
  rationale: In this summons context, the sense is coming in answer to a call, not
    merely 'meeting' someone. 'Appear' gives clear legal/assembly force in modern
    English and fits the time limit.
- source_word: ἐν δυσὶν ἢ τρισὶν ἡμέραις
  chosen: within two or three days
  alternatives:
  - in two or three days
  lexicon: BDAG
  rationale: The phrase marks the allowed time window for compliance. 'Within' makes
    the deadline sense explicit in idiomatic English without adding content beyond
    the context.
- source_word: κατὰ τὸ κρῖμα
  chosen: according to the judgment
  alternatives:
  - according to the decision
  - according to the ruling
  lexicon: BDAG
  rationale: κρῖμα here denotes an authoritative judicial decision. 'Judgment' preserves
    the formal, legal tone.
- source_word: τῶν προκαθημένων πρεσβυτέρων
  chosen: of the elders who preside
  alternatives:
  - of the presiding elders
  - of the leading elders
  lexicon: BDAG
  rationale: The participial idea in προκαθημένων is leadership/presiding status.
    'The elders who preside' is transparent and preserves the syntax and authority
    structure.
- source_word: ἀνιερωθήσονται
  chosen: will be devoted
  alternatives:
  - will be consecrated
  - will be forfeited
  - will be dedicated
  lexicon: LSJ
  rationale: The verb literally carries the sense of being devoted/dedicated, likely
    with confiscatory force in this legal setting. 'Devoted' keeps the formal lexical
    link, while the footnote preserves the more interpretive 'forfeited' sense.
- source_word: τὰ κτήνη αὐτῶν
  chosen: their livestock
  alternatives:
  - their property
  - their possessions
  - their cattle
  lexicon: BDAG
  rationale: κτήνη commonly denotes livestock/beasts, though in some contexts it can
    shade toward property. The Greek wording most naturally points to animals/livestock;
    this is retained, with the broader legal implication noted by context.
- source_word: ἀλλοτριωθήσεται
  chosen: will be excluded
  alternatives:
  - will be alienated
  - will be separated
  - will be made a stranger
  lexicon: BDAG
  rationale: In relation to a community body, the passive indicates being cut off
    from membership. 'Excluded' communicates the social-legal result clearly in modern
    English.
- source_word: ἀπὸ τοῦ πλήθους τῆς αἰχμαλωσίας
  chosen: from the assembly of the captivity
  alternatives:
  - from the multitude of the exiles
  - from the community of the returned exiles
  lexicon: BDAG
  rationale: πλῆθος is literally 'multitude/assembly,' and αἰχμαλωσία refers to the
    exile/captivity community. 'Assembly of the captivity' stays close to the Greek
    while remaining intelligible; a more idiomatic alternative is preserved in a footnote.
