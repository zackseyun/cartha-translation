theological_decisions:
- issue: Nature of the penalty on noncompliant persons and goods
  chosen_reading: 'A legal-religious sanction is expressed: the person''s livestock
    are ''devoted'' and the person is excluded from the exile community.'
  alternative_readings:
  - The property is simply forfeited/confiscated, with no cultic nuance.
  - The sanction may reflect the Hebrew parallel's broader idea of total property
    forfeiture rather than livestock specifically.
  rationale: The Greek uses ἀνιερωθήσονται, which naturally suggests dedication/devotion,
    but in this judicial context the practical effect is punitive confiscation. The
    translation preserves the Greek's wording in the main text and notes the more
    interpretive legal sense in a footnote. The parallel in Ezra 10:8 supports a sanction
    of forfeiture and exclusion, but the Greek remains primary.
  doctrine_reference: Translation philosophy §§1, 3, 5
