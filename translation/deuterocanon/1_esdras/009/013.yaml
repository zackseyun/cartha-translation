theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek context
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The project default renders κύριος as 'Lord.' Nothing in this verse requires
    deviation, and 'Lord' fits the reverential reference to Israel's God.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Intensity of ὀργή for divine displeasure
  chosen_reading: anger
  alternative_readings:
  - wrath
  rationale: The verse speaks of divine judgment over the community's wrongdoing.
    'Wrath' is possible, but 'anger' better matches the project's readable modern
    English aim while preserving the theological seriousness.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
