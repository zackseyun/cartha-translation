translation:
  text: the elders and the judges of each place, until the anger of the Lord over
    this matter is turned away from us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wrath of the Lord concerning this matter.'
    reason: lexical_alternative
  - marker: b
    text: The Greek here is a sentence fragment dependent on the preceding verse;
      the translation supplies smooth English by carrying forward the implied action.
    reason: cultural_note
lexical_decisions:
- source_word: ἑκάστου τόπου
  chosen: of each place
  alternatives:
  - from each place
  - of every locality
  - of each town
  lexicon: LSJ
  rationale: Genitive phrase modifying both 'elders' and 'judges.' 'Of each place'
    preserves the distributive sense without over-specifying whether the locale is
    a town, district, or settlement.
- source_word: πρεσβυτέρους
  chosen: elders
  alternatives:
  - older men
  - leaders
  lexicon: LSJ
  rationale: In this administrative/judicial context the term refers to recognized
    local senior authorities, not merely men advanced in age. 'Elders' is the standard
    and sufficiently transparent rendering.
- source_word: κριτάς
  chosen: judges
  alternatives:
  - magistrates
  - officials
  lexicon: LSJ
  rationale: The legal setting favors 'judges.' 'Magistrates' is possible but slightly
    more interpretive and less direct.
- source_word: ἕως τοῦ λῦσαι
  chosen: until ... is turned away
  alternatives:
  - until ... is loosed
  - until ... is removed
  - until ... is resolved
  lexicon: LSJ
  rationale: The infinitive construction expresses purpose or endpoint. With 'anger'
    as object, idiomatic English prefers 'turned away' or 'removed' rather than the
    more literal 'loosed.' 'Turned away' preserves the sense of wrath being averted.
- source_word: ὀργὴν Κυρίου
  chosen: the anger of the Lord
  alternatives:
  - the wrath of the Lord
  - the Lord's anger
  lexicon: LSJ
  rationale: ὀργή can be rendered 'anger' or 'wrath.' 'Anger' is more readable modern
    English while still conveying divine displeasure. 'Lord' follows the project's
    default for κύριος.
- source_word: ἀφʼ ἡμῶν
  chosen: from us
  alternatives:
  - away from us
  lexicon: LSJ
  rationale: The preposition marks separation from the community. In English this
    is naturally expressed with 'from us,' with 'away' implied by the verb phrase
    'turned away.'
- source_word: τοῦ πράγματος τούτου
  chosen: concerning this matter
  alternatives:
  - for this matter
  - because of this affair
  - over this matter
  lexicon: LSJ
  rationale: The genitive is somewhat compressed in Greek. In context it indicates
    the cause or occasion of the Lord's anger, namely the issue under discussion.
    'Concerning this matter' is clear and idiomatic without over-interpreting.
