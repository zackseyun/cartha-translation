translation:
  text: 'And from the sons of Baanei: Jeremias, Momdios, Maeros, Jouna, Mamdai, and
    Pedias, and Anos, Carabasion, and Enaseibos, and Mamntanaimos, Eliaseis, Bannous,
    Edialeis, Someis, Selemias, Nathanias; and from the sons of Exora: Seseis, Ezreil,
    Azaelos, Samatos, Zambrei, Phosepos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several names in this verse are preserved as close transliterations of the
      Greek text rather than being harmonized to more familiar Hebrew forms from the
      parallel tradition, because the Greek of 1 Esdras is the primary source for
      this translation.
    reason: lexical_alternative
  - marker: b
    text: The MT parallel for this section (Ezra 10 context) is approximate and does
      not preserve this same full sequence of names in the same form; therefore the
      Greek list governs the translation here.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ ἐκ τῶν υἱῶν
  chosen: And from the sons of
  alternatives:
  - And among the sons of
  - And of the descendants of
  lexicon: LSJ
  rationale: The phrase introduces a subgroup within the larger list. 'From the sons
    of' is a natural formal rendering that preserves the genealogical/list structure
    of the Greek.
- source_word: Βαανεί
  chosen: Baanei
  alternatives:
  - Baani
  - Bani
  lexicon: LSJ
  rationale: This is a proper name transliterated directly from the Greek witness,
    in keeping with the project's policy to transliterate names. The MT parallel may
    point toward a related Hebrew form such as Bani, but the Greek source remains
    primary here.
- source_word: Ἰερεμίας
  chosen: Jeremias
  alternatives:
  - Jeremiah
  lexicon: LSJ
  rationale: A direct transliteration from the Greek form is preferred in this name-list
    context for consistency with the source witness and surrounding Greek-form names.
- source_word: Μομδείοσ
  chosen: Momdios
  alternatives:
  - Momdeios
  lexicon: LSJ
  rationale: The name is textually awkward in transliteration because of the Greek
    spelling, but 'Momdios' gives a readable English form while staying close to the
    source consonants.
- source_word: Μάηρος
  chosen: Maeros
  alternatives:
  - Maeiros
  - Mayeros
  lexicon: LSJ
  rationale: Transliterated straightforwardly from the Greek proper name; no strong
    basis exists for normalizing to a more familiar English biblical name.
- source_word: Ἰουνά
  chosen: Jouna
  alternatives:
  - Iouna
  - Juna
  lexicon: LSJ
  rationale: The initial iota is represented with 'J' in this transliteration style
    for readability in English biblical names, while preserving the Greek form.
- source_word: Μαμδαὶ
  chosen: Mamdai
  alternatives:
  - Mamdaii
  lexicon: LSJ
  rationale: Simple transliteration of the Greek proper name.
- source_word: Πεδίας
  chosen: Pedias
  alternatives:
  - Pedaiah
  lexicon: LSJ
  rationale: The Greek form likely reflects a Hebrew name known elsewhere as Pedaiah,
    but because this verse is a list of names in Greek, the direct transliteration
    'Pedias' best preserves source transparency.
- source_word: Ἄνως
  chosen: Anos
  alternatives:
  - Anōs
  lexicon: LSJ
  rationale: Direct transliteration of the Greek proper name.
- source_word: Καραβασιὼν
  chosen: Carabasion
  alternatives:
  - Karabasion
  lexicon: LSJ
  rationale: Transliterated from the Greek. 'C' is used rather than 'K' to maintain
    a conventional English biblical transliteration style.
- source_word: Ἐνάσειβος
  chosen: Enaseibos
  alternatives:
  - Enasebos
  - Enaseibus
  lexicon: LSJ
  rationale: The Greek form is preserved as closely as possible; the name is obscure
    and should not be harmonized without textual warrant.
- source_word: Μαμντάναιμος
  chosen: Mamntanaimos
  alternatives:
  - Mamtanaimos
  - Mamdanaiμος
  lexicon: LSJ
  rationale: This is a difficult proper name in the Greek witness. The chosen form
    is a close transliteration that preserves the unusual shape of the source rather
    than smoothing it.
- source_word: Ἐλιασείς
  chosen: Eliaseis
  alternatives:
  - Eliaseis
  - Eliasis
  lexicon: LSJ
  rationale: Direct transliteration from the Greek form.
- source_word: Βαννοῦς
  chosen: Bannous
  alternatives:
  - Bannus
  lexicon: LSJ
  rationale: The doubled nu and Greek ending are reflected in a readable English transliteration.
- source_word: Ἐδιαλείς
  chosen: Edialeis
  alternatives:
  - Edialees
  - Edialis
  lexicon: LSJ
  rationale: Direct transliteration from the Greek proper name.
- source_word: Σομείς
  chosen: Someis
  alternatives:
  - Someis
  - Somis
  lexicon: LSJ
  rationale: Direct transliteration from the Greek form.
- source_word: Σελεμίας
  chosen: Selemias
  alternatives:
  - Shelemiah
  - Selemiah
  lexicon: LSJ
  rationale: Although the Hebrew parallel tradition may suggest Shelemiah, the Greek
    source is primary, so the Greek-form transliteration is retained.
- source_word: Ναθανίας
  chosen: Nathanias
  alternatives:
  - Nethaniah
  - Nathaniah
  lexicon: LSJ
  rationale: The Greek form is transliterated directly rather than harmonized to a
    Hebrew/English conventional form.
- source_word: Ἐξορά
  chosen: Exora
  alternatives:
  - Exōra
  - Ezora
  lexicon: LSJ
  rationale: Proper name transliterated directly from the Greek witness.
- source_word: Σεσεῖς
  chosen: Seseis
  alternatives:
  - Seseis
  - Sesis
  lexicon: LSJ
  rationale: Direct transliteration from the Greek proper name.
- source_word: Ἐζρείλ
  chosen: Ezreil
  alternatives:
  - Ezriel
  - Ezreel
  lexicon: LSJ
  rationale: The Greek spelling is best represented by 'Ezreil'; this avoids over-harmonizing
    to more familiar Hebrew forms while remaining readable.
- source_word: Ἀζάηλος
  chosen: Azaelos
  alternatives:
  - Azael
  - Azahēlos
  lexicon: LSJ
  rationale: Direct transliteration from the Greek form.
- source_word: Σάματος
  chosen: Samatos
  alternatives:
  - Samathos
  lexicon: LSJ
  rationale: Direct transliteration from the Greek proper name.
- source_word: Ζαμβρεί
  chosen: Zambrei
  alternatives:
  - Zambri
  - Zimri
  lexicon: LSJ
  rationale: The Greek form is preserved rather than normalized to the more familiar
    Hebrew name Zimri.
- source_word: Φόσηπος
  chosen: Phosepos
  alternatives:
  - Posepos
  - Joseph
  lexicon: LSJ
  rationale: The Greek witness here does not support replacing the name with the familiar
    'Joseph' in the main text. A close transliteration preserves the source form honestly.
