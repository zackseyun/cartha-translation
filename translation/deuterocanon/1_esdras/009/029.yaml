translation:
  text: 'And from the sons of Bebai: Joannes and Ananias and Zabdos and Emathis.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some names may correspond to different Hebrew forms in the approximate MT
      parallel, but 1 Esdras is translated here from the Greek witness, which preserves
      the names as Joannes, Ananias, Zabdos, and Emathis.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ ἐκ τῶν υἱῶν Βηβαί
  chosen: And from the sons of Bebai
  alternatives:
  - And from the descendants of Bebai
  - And from the family of Bebai
  lexicon: LSJ
  rationale: ἐκ marks membership from a larger listed group, and υἱῶν in genealogical/list
    contexts commonly means 'sons' or more broadly descendants. Because this verse
    is a roster of named men under a family head, 'sons of Bebai' preserves the formal
    structure of the Greek while remaining natural English.
- source_word: Ἰωάννης
  chosen: Joannes
  alternatives:
  - Johanan
  - John
  lexicon: LSJ
  rationale: Personal names are transliterated rather than translated per project
    philosophy. The Greek form Ἰωάννης is represented directly as 'Joannes.' The Hebrew
    parallel tradition elsewhere supports a related Semitic name, but the Greek witness
    is primary here.
- source_word: Ἁνανίας
  chosen: Ananias
  alternatives:
  - Hananiah
  lexicon: LSJ
  rationale: The Greek proper name is transliterated in standard English form as 'Ananias.'
    'Hananiah' would reflect the Hebrew form more directly, but the translation is
    anchored in the Greek text of 1 Esdras.
- source_word: Ζάβδος
  chosen: Zabdos
  alternatives:
  - Zabdus
  - Zabbai
  lexicon: LSJ
  rationale: The attested Greek name Ζάβδος is best carried over by transliteration
    as 'Zabdos.' A Hebrew-aligned equivalent such as 'Zabbai' is not adopted in the
    main text because the Greek form before us is distinct and primary for this book.
- source_word: Ἐμαθίς
  chosen: Emathis
  alternatives:
  - Amathis
  - Emmathis
  lexicon: LSJ
  rationale: This is a proper name preserved in Greek form; 'Emathis' is a straightforward
    transliteration from Swete's text. Because the name is uncommon and the Greek
    witness is clear, a conservative transliteration is preferable.
