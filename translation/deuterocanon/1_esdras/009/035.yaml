translation:
  text: 'From the sons of Ooma: Zeitias, Zabadias, Edos, Ouel, and Banaias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek lists these names individually; the approximate MT parallel (Ezra
      10) concludes this section with a summary statement instead of preserving the
      same list here.
    reason: cross_reference
  - marker: b
    text: The Greek text is a list of personal names. 'The sons of Ooma' makes explicit
      the family-group sense implied by the construction 'from the [house/clan] of
      Ooma.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐκ
  chosen: From
  alternatives:
  - Of
  - Among
  lexicon: LSJ
  rationale: Introduces the subgroup within the larger list. 'From' is the most natural
    English rendering in this genealogical/list context.
- source_word: τῶν Ὀομά
  chosen: the sons of Ooma
  alternatives:
  - Ooma
  - the family of Ooma
  - from Ooma
  lexicon: LSJ
  rationale: The Greek has the article with a proper name after ἐκ, functioning elliptically
    in this list style to mean members/sons of the named house or clan. The MT parallel
    in Ezra 10 ends with a summary rather than preserving these names, so the Greek
    list governs. 'The sons of Ooma' makes the implied familial grouping explicit
    for readable English.
- source_word: Ζειτιάς
  chosen: Zeitias
  alternatives:
  - Zetias
  - Zethias
  rationale: Proper name transliterated directly from the Greek form. 'Zeitias' preserves
    the diphthongal spelling represented in Swete's text.
- source_word: Ζαβαδαίας
  chosen: Zabadias
  alternatives:
  - Zabadaias
  - Zebadiah
  rationale: Proper name transliterated from Greek rather than normalized to the more
    familiar Hebrew/English form. This follows the project's principle to translate
    from the Greek witness directly while allowing standard transliteration conventions.
- source_word: Ἠδός
  chosen: Edos
  alternatives:
  - Ēdos
  - Idos
  rationale: Proper name transliterated from the Greek form. 'Edos' gives a readable
    English form without overcomplicating diacritics.
- source_word: Οὐὴλ
  chosen: Ouel
  alternatives:
  - Uel
  - Ouēl
  rationale: Proper name transliterated conservatively from Greek. 'Ouel' best reflects
    the initial Οὐ- sequence in standard English transliteration.
- source_word: Βαναίας
  chosen: Banaias
  alternatives:
  - Banaias
  - Benaiah
  rationale: Proper name transliterated from the Greek form rather than assimilated
    to the Hebrew name 'Benaiah.' This keeps the translation anchored to the extant
    Greek text.
