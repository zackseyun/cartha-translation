translation:
  text: 'And from the sons of Emer: Ananias, Zabdaios, Manes, Thamaios, Jereel, and
    Azarias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew parallel traditions often preserve some of these names in more familiar
      Hebrew forms, such as Immer for Emer and Azariah for Azarias.
    reason: cross_reference
  - marker: b
    text: Some names in this verse are difficult to align exactly with the Hebrew
      parallel because 1 Esdras sometimes reshapes or reorders its source lists.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  chosen: from the sons of
  alternatives:
  - among the sons of
  - of the sons of
  lexicon: LSJ
  rationale: In this list context, ἐκ marks membership within a family group. 'From
    the sons of' is a natural English rendering that preserves the genealogical/list
    formula without over-paraphrasing.
- source_word: Ἐμὴρ
  chosen: Emer
  alternatives:
  - Emmer
  - Immer
  lexicon: LSJ
  rationale: This is a proper name transliterated from the Greek form Ἐμήρ. 'Emer'
    follows the Greek directly. 'Immer' reflects the Hebrew/MT parallel more closely,
    but the project prioritizes the Greek for 1 Esdras while allowing the Hebrew parallel
    to inform recognition of the name.
- source_word: Ἀνανίας
  chosen: Ananias
  alternatives:
  - Hananiah
  lexicon: LSJ
  rationale: Standard transliteration of the Greek proper name. 'Hananiah' would align
    more closely with a Hebrew equivalent, but the Greek witness is primary here.
- source_word: Ζαβδαῖος
  chosen: Zabdaios
  alternatives:
  - Zabdias
  - Zabdai
  lexicon: LSJ
  rationale: The Greek form is transliterated rather than normalized to a Hebrew reconstruction.
    'Zabdaios' preserves the source-form audibly and visually.
- source_word: Μάνης
  chosen: Manes
  alternatives:
  - Mane
  - Maaseiah
  lexicon: LSJ
  rationale: The Greek name is rendered by straightforward transliteration. A Hebrew-aligned
    identification such as 'Maaseiah' would go beyond what this Greek form alone warrants.
- source_word: Θαμαῖος
  chosen: Thamaios
  alternatives:
  - Thamais
  - Tamai
  lexicon: LSJ
  rationale: Proper name transliterated directly from Greek. This keeps the translation
    auditable to the source text.
- source_word: Ἰερεὴλ
  chosen: Jerel
  alternatives:
  - Jereel
  - Jezreel
  lexicon: LSJ
  rationale: The Greek form Ἰερεὴλ is somewhat awkward to represent in English. 'Jerel'
    is a close transliteration. 'Jereel' is also possible; 'Jezreel' would be interpretive
    and insufficiently anchored to the present spelling.
- source_word: Ἀζαρίας
  chosen: Azarias
  alternatives:
  - Azariah
  lexicon: LSJ
  rationale: Standard transliteration of the Greek form. 'Azariah' would reflect the
    Hebrew equivalent, but the Greek source is primary.
