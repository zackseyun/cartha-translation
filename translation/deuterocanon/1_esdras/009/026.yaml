translation:
  text: 'From Israel, from the sons of Phoros: Jerma and Jezias and Melcheias and
    Mielos and Eleazar and Asebeias and Bannaias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several names in this verse likely correspond to Hebrew name-forms known
      from the parallel list in Ezra 10, such as Parosh for Phoros and Benaiah for
      Bannaias. Because 1 Esdras is translated here from its Greek text, the Greek
      name-forms are retained in the main text.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τοῦ Ἰσραήλ
  chosen: From Israel
  alternatives:
  - Of Israel
  - Among Israel
  lexicon: LSJ
  rationale: The repeated ἐκ marks extraction from a larger group. 'From Israel' is
    natural English and preserves the list-like formula introducing those named.
- source_word: ἐκ τῶν υἱῶν Φορός
  chosen: from the sons of Phoros
  alternatives:
  - from the descendants of Phoros
  - from the family of Phoros
  lexicon: LSJ
  rationale: υἱῶν literally means 'sons,' but in genealogical lists can denote descendants
    or a family line. Here 'sons of Phoros' keeps the formal list structure of the
    Greek while remaining understandable. The proper name is transliterated from the
    Greek witness as required.
- source_word: Φορός
  chosen: Phoros
  alternatives:
  - Parosh
  rationale: The primary source is Greek, which has Φορός. The MT parallel points
    to the Hebrew family name Parosh, but for 1 Esdras we transliterate the Greek
    form in the main text and preserve the Hebrew-aligned equivalent as an alternative
    only if needed.
- source_word: Ἰερμὰ
  chosen: Jerma
  alternatives:
  - Jermas
  - Ramiah
  rationale: This is a personal name transliterated from the Greek form. The MT parallel
    in Ezra 10 has a different corresponding name-form in the related list, but the
    Greek witness governs the main text here.
- source_word: Ἰεζείας
  chosen: Jezias
  alternatives:
  - Jeziah
  - Iezias
  rationale: Personal name transliterated directly from the Greek. 'Jezias' gives
    a standard English transliteration without over-Latinizing.
- source_word: Μελχείας
  chosen: Melcheias
  alternatives:
  - Melchiah
  - Melchias
  rationale: Personal name transliterated from the Greek form. The ending -eias reflects
    the Greek more closely than a normalized Hebrew-style form.
- source_word: Μίηλος
  chosen: Mielos
  alternatives:
  - Mielus
  - Milo
  rationale: The Greek proper name is best represented by straightforward transliteration.
    Because the name is uncommon and the Greek witness is our anchor, a conservative
    transliteration is preferable.
- source_word: Ἐλεάζαρος
  chosen: Eleazar
  alternatives:
  - Eleazaros
  rationale: This name has a well-established English form, 'Eleazar,' which accurately
    reflects the Greek/Hebrew tradition and reads naturally in English.
- source_word: Ἀσεβείας
  chosen: Asebeias
  alternatives:
  - Asebias
  - Hasabiah
  rationale: The Greek form is transliterated directly. The Hebrew parallel tradition
    may point toward a different underlying Semitic name, but the Greek text does
    not warrant replacing it in the main text.
- source_word: Βανναίας
  chosen: Bannaias
  alternatives:
  - Benaiah
  - Banaias
  rationale: The Greek form is rendered by direct transliteration. 'Benaiah' would
    align more closely with a Hebrew equivalent, but the Greek witness supports retaining
    'Bannaias' in this book's list.
