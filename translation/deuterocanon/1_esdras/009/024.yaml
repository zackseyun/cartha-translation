lexical_decisions:
- source_word: ἐκ τῶν
  chosen: From the
  alternatives:
  - Among the
  - Of the
  lexicon: LSJ
  rationale: The phrase introduces a subgroup within the larger list. 'From the' is
    natural English for listing members drawn from a class.
- source_word: ἱεροψαλτῶν
  chosen: temple singers
  alternatives:
  - sacred singers
  - singers of the sanctuary
  lexicon: LSJ
  rationale: The compound combines the idea of sacred/temple service with singing.
    'Temple singers' is clear modern English and preserves the cultic setting better
    than the vaguer 'singers.'
- source_word: Ἐλιάσεβος
  chosen: Eliasib
  alternatives:
  - Eliashib
  rationale: Personal names are transliterated. The Greek form Ἐλιάσεβος naturally
    yields 'Eliasib,' while the Hebrew parallel supports identification with the name
    commonly rendered 'Eliashib.' The main text stays anchored to the Greek form,
    with the Hebrew-aligned form worth preserving as an alternative.
- source_word: Βάκχουρος
  chosen: Bacchurus
  alternatives:
  - Bakkouros
  - Bakchouros
  rationale: This is a proper name preserved by transliteration from the Greek. 'Bacchurus'
    gives a readable standard-English form without attempting speculative normalization
    to a Hebrew equivalent not present in the Greek text.
