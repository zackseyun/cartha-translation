translation:
  text: And Mattathias, Sammou, Ananias, Azarias, Ourias, Ezekias, and Baalsamos stood
    at his right hand,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek names here differ from the approximate Hebrew parallel in Nehemiah
      8:4, where the list of men at Ezra's right hand is not identical. Because 1
      Esdras is translated from the Greek witness, the Greek name forms are retained.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔστησεν
  chosen: stood
  alternatives:
  - caused to stand
  - stationed
  lexicon: LSJ
  rationale: Although the form is formally transitive ('he set/caused to stand'),
    the following list of names and the positional phrase 'at his right hand' favor
    an idiomatic rendering in English that these men 'stood' there. This also aligns
    with the scene in the Hebrew parallel where persons take their places around Ezra.
- source_word: αὐτῷ
  chosen: his
  alternatives:
  - to him
  - for him
  lexicon: LSJ
  rationale: 'The dative pronoun with a verb of standing/placing in this context is
    best expressed possessively in English: they stood at ''his'' right hand, i.e.,
    at Ezra''s right side.'
- source_word: ἐκ δεξιῶν
  chosen: at his right hand
  alternatives:
  - on the right
  - at the right side
  lexicon: LSJ
  rationale: This is a standard positional expression. 'At his right hand' is natural
    English and preserves the concrete spatial sense.
- source_word: Ματταθίας, Σαμμοῦ, Ἀνανίας, Ἀζαρίας, Οὐρείας, Ἐζεκίας, Βαάλσαμος
  chosen: Mattathias, Sammou, Ananias, Azarias, Ourias, Ezekias, and Baalsamos
  alternatives:
  - Mattithiah/Maaseiah-type alignments from the Hebrew parallel
  rationale: Per project philosophy, personal names are transliterated from the Greek
    source text of 1 Esdras rather than normalized to the MT parallel in Nehemiah
    8:4. The Hebrew parallel helps confirm the scene but does not override the Greek
    forms here.
