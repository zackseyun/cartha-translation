translation:
  text: 'And from the sons of Zamoth: Eliadas, Eleiasimus, Othonias, Jarimoth, Sabados,
    and Zeralias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several names in this verse may reflect Greek forms that differ from the
      Hebrew parallel tradition; this translation follows the Greek text of 1 Esdras
      rather than harmonizing the list to Ezra/Nehemiah.
    reason: alternative_reading
  - marker: b
    text: Because the source transcription is flagged with a minor mismatch, some
      proper-name spellings remain slightly uncertain; the rendering here is a conservative
      transliteration of the Greek witness provided.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  chosen: from the sons of
  alternatives:
  - of the sons of
  - among the sons of
  lexicon: LSJ
  rationale: In this list of offenders/families, ἐκ marks membership drawn from a
    family group. 'From the sons of' is the most natural English list formula while
    staying close to the Greek.
- source_word: Ζαμόθ
  chosen: Zamoth
  alternatives:
  - Zamothi
  - Zamothes
  lexicon: LSJ
  rationale: This is a proper name transliterated directly from the Greek form. Standard
    transliteration is preferred over attempting to harmonize to a Hebrew parallel,
    since the Greek is the primary source and 1 Esdras often differs in names.
- source_word: Ἐλιάδας
  chosen: Eliadas
  alternatives:
  - Eliadus
  - Eliadah
  lexicon: LSJ
  rationale: Proper name transliterated from the Greek nominative form. The Greek
    list preserves Hellenized name endings, and the translation keeps them rather
    than reconstructing a Hebrew equivalent.
- source_word: Ἐλειάσειμος
  chosen: Eleiasimus
  alternatives:
  - Eleasimus
  - Eliaseimus
  lexicon: LSJ
  rationale: The name is uncommon and the source confidence is marked unspecified
    with minor mismatch validation, so a conservative transliteration from the visible
    Greek letters is best. 'Eleiasimus' reflects the sequence Ἐλειάσειμος without
    over-normalizing.
- source_word: Ὀθονίας
  chosen: Othonias
  alternatives:
  - Othoniah
  - Othnias
  lexicon: LSJ
  rationale: Proper name rendered by straightforward transliteration from Greek. Retaining
    the Greek-form ending suits the translation policy for names.
- source_word: Ἰαριμώθ
  chosen: Jarimoth
  alternatives:
  - Iarimoth
  - Jarimoth
  lexicon: LSJ
  rationale: Initial iota in biblical names is commonly represented with English J
    in established transliteration conventions for readability. 'Jarimoth' preserves
    the Greek form while remaining accessible.
- source_word: Σάβαδος
  chosen: Sabados
  alternatives:
  - Sabadus
  - Zabad
  lexicon: LSJ
  rationale: The Greek form is transliterated as given. Although a Hebrew parallel
    might suggest a related name such as Zabad, the Greek witness governs here, so
    the Greek consonant and ending are preserved.
- source_word: Ζεραλίας
  chosen: Zeralias
  alternatives:
  - Zeralias
  - Azariah
  lexicon: LSJ
  rationale: The Greek proper name is transliterated directly. A Hebrew-aligned equivalent
    could differ, but because 1 Esdras frequently reshapes names, the translation
    should not silently harmonize away the Greek reading.
