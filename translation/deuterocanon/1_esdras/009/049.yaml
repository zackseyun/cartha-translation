translation:
  text: 'And Attarates said to Ezra the chief priest and reader, and to the Levites
    who were teaching the multitude, to all of them:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Attarates likely corresponds to the figure named in the Hebrew parallel
      as 'Nehemiah, the Tirshatha' (that is, the governor).
    reason: alternative_reading
  - marker: b
    text: Greek 'reader'; the Hebrew parallel has 'the priest, the scribe,' so the
      traditions differ slightly in Ezra's designation here.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ εἶπεν
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: BDAG
  rationale: Standard narrative conjunction plus verb of speaking; 'And' preserves
    the Greek flow without over-interpreting sequence.
- source_word: Ἀτταρατὴ
  chosen: Attarates
  alternatives:
  - Attharates
  - the Tirshatha / governor
  lexicon: LSJ
  rationale: The Greek text gives a transliterated proper name/title form. Following
    the philosophy to transliterate names, the main text keeps 'Attarates.' The MT
    parallel identifies this figure as Nehemiah, 'the Tirshatha' (governor), so that
    alternative identification is preserved in a footnote rather than imported into
    the main text.
- source_word: Ἔσρᾳ
  chosen: Ezra
  lexicon: LSJ
  rationale: Standard transliteration of the proper name.
- source_word: τῷ ἀρχιερεῖ
  chosen: the chief priest
  alternatives:
  - the high priest
  lexicon: LSJ
  rationale: ἀρχιερεύς commonly means 'high priest'; however, 'chief priest' is a
    transparent rendering of the compound and avoids implying later institutional
    nuances. The MT parallel has simply 'the priest,' but the Greek witness is primary
    here.
- source_word: καὶ ἀναγνώστῃ
  chosen: and reader
  alternatives:
  - and scribe
  - and public reader
  lexicon: LSJ
  rationale: ἀναγνώστης is literally 'reader,' likely reflecting Ezra's role in reading
    the law aloud. Although the MT parallel has 'the scribe,' the Greek wording should
    be represented directly; 'reader' best matches the extant Greek.
- source_word: τοῖς Λευείταις
  chosen: to the Levites
  lexicon: LSJ
  rationale: Straightforward rendering of the group designation.
- source_word: τοῖς διδάσκουσι
  chosen: who were teaching
  alternatives:
  - who taught
  - who were instructing
  lexicon: LSJ
  rationale: Present participle with descriptive force; 'who were teaching' conveys
    ongoing activity in context.
- source_word: τὸ πλῆθος
  chosen: the multitude
  alternatives:
  - the crowd
  - the people
  lexicon: LSJ
  rationale: πλῆθος denotes a large assembled group. 'Multitude' preserves the sense
    of a gathered mass; the MT parallel's 'the people' supports the referent but the
    Greek nuance is slightly broader.
- source_word: ἐπὶ πάντας
  chosen: to all of them
  alternatives:
  - before all
  - to everyone
  - over all
  lexicon: LSJ
  rationale: The phrase is awkward in isolation, but in light of the MT parallel לְכָל־הָעָם
    ('to all the people') it most naturally introduces the audience of the speech.
    'To all of them' preserves the sense without over-specifying beyond the Greek-plus-parallel
    evidence.
