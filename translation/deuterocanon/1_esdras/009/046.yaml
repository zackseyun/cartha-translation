translation:
  text: And when the law was opened, they all stood upright; and Azarias blessed the
    Most High God, the Lord of hosts, the Almighty,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Azarias; the Hebrew parallel has Azariah.
    reason: alternative_reading
  - marker: b
    text: Or 'when the law was unrolled/opened.' The Greek verb literally means 'to
      loose,' but in this context refers to opening the law for public reading.
    reason: lexical_alternative
  - marker: c
    text: '''Hosts'' translates Greek sabaōth, a traditional divine title sometimes
      left untranslated as ''Sabaoth.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ λῦσαι
  chosen: when ... was opened
  alternatives:
  - when ... was loosed
  - when ... was unrolled
  - when ... was read
  lexicon: BDAG
  rationale: The infinitive construction marks a temporal clause, 'when.' Although
    λύω commonly means 'loose/release,' with a scroll or book context it can denote
    opening/unrolling. The MT parallel speaks of instruction in the Torah while the
    people remained standing, supporting the sense of opening the book/law rather
    than abolishing or dissolving the law.
- source_word: τὸν νόμον
  chosen: the law
  alternatives:
  - the Law
  - the book of the law
  lexicon: BDAG
  rationale: νόμος here refers to the Torah/instruction being publicly presented.
    'The law' is a natural English rendering and keeps close to the Greek; capitalization
    is not required by the source, and 'book of the law' would add wording not present
    in this clause.
- source_word: πάντες ὀρθοὶ ἔστησαν
  chosen: they all stood upright
  alternatives:
  - they all stood
  - they all stood straight
  lexicon: BDAG
  rationale: ὀρθοί adds the nuance of erect/upright posture, not merely standing.
    The MT parallel likewise has the people standing in place, so 'stood upright'
    preserves the physical reverence implied.
- source_word: εὐλόγησεν
  chosen: blessed
  alternatives:
  - praised
  - spoke a blessing to
  lexicon: BDAG
  rationale: The verb can mean bless or praise depending on object and context. Since
    the object is God, English idiom allows 'blessed' in the sense of uttering blessing/praise
    toward God, preserving the Greek wording more closely than 'praised.'
- source_word: Ἀζαρίας
  chosen: Azarias
  alternatives:
  - Azariah
  lexicon: LSJ
  rationale: Because the Greek text is primary for 1 Esdras, the standard transliteration
    of the Greek form Ἀζαρίας is preferred in the main text. The Hebrew-parallel form
    'Azariah' is worth preserving as an alternative in a footnote.
- source_word: τῷ ὑψίστῳ θεῷ
  chosen: the Most High God
  alternatives:
  - God Most High
  - the highest God
  lexicon: BDAG
  rationale: This is a common biblical title. 'The Most High God' is idiomatic modern
    English and preserves the titular force of ὕψιστος.
- source_word: σαβαὼθ
  chosen: hosts
  alternatives:
  - Sabaoth
  lexicon: LSJ
  rationale: Following project philosophy to translate titles rather than transliterate
    them, σαβαώθ is rendered 'hosts.' The transliteration 'Sabaoth' is preserved as
    an alternative because it has historical liturgical familiarity.
- source_word: Παντοκράτορι
  chosen: the Almighty
  alternatives:
  - the All-ruler
  - the Omnipotent
  lexicon: BDAG
  rationale: παντοκράτωρ is conventionally and accurately rendered 'the Almighty'
    in biblical English. This preserves the divine title in accessible modern language.
