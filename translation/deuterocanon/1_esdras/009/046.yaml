theological_decisions:
- issue: Rendering the divine title sequence τῷ ὑψίστῳ θεῷ σαβαὼθ Παντοκράτορι
  chosen_reading: the Most High God, the Lord of hosts, the Almighty
  alternative_readings:
  - the Most High God of hosts, the Almighty
  - the Most High God Sabaoth Almighty
  rationale: The Greek piles up divine titles. In keeping with the doctrine to translate
    titles, σαβαώθ is rendered semantically as 'hosts.' Because κύριος is not explicitly
    present in the Greek, English 'Lord of hosts' is still the most idiomatic way
    to express the title behind σαβαώθ in biblical usage; this is preferable to leaving
    'hosts' unattached or transliterating 'Sabaoth.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    term σαβαώθ handled by semantic title rendering consistent with biblical usage.'
