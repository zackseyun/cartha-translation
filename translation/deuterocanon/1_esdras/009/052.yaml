  rationale: Per doctrine, κύριος defaults to 'Lord.' Nothing in context suggests
    'Master' is preferable.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to harmonize the final clause to the MT parallel's sense ('the joy
    of the LORD is your strength')
  chosen_reading: 'Translate the Greek clause as written: ''the Lord will glorify
    you'''
  alternative_readings:
  - A harmonized rendering reflecting the MT/Nehemiah parallel, e.g. 'the joy of the
    Lord is your strength'
