translation:
  text: For the day is holy to the Lord, and do not be grieved; for the Lord will
    glorify you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Nehemiah 8:10 differs here, reading approximately,
      'for the joy of the LORD is your strength.' 1 Esdras' Greek instead says, 'for
      the Lord will glorify you.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἁγία
  chosen: holy
  alternatives:
  - sacred
  lexicon: BDAG
  rationale: The adjective denotes consecration/set-apartness. 'Holy' is the standard
    biblical rendering and matches the Hebrew parallel קָדֹשׁ.
- source_word: ἡ ἡμέρα
  chosen: the day
  lexicon: BDAG
  rationale: Straightforward nominal phrase. The article is naturally represented
    in English as 'the day.'
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - for the Lord
  - belonging to the Lord
  lexicon: BDAG
  rationale: The dative with ἁγία can indicate relation or dedication. 'To the Lord'
    preserves the Greek form while conveying consecration. The Hebrew parallel lacks
    an explicit divine name here, but the Greek includes it and should be translated.
- source_word: μὴ λυπεῖσθε
  chosen: do not be grieved
  alternatives:
  - do not sorrow
  - do not be sad
  lexicon: BDAG
  rationale: λυπέω in the middle/passive commonly means to experience grief or distress.
    'Do not be grieved' preserves the emotional weight better than the lighter 'do
    not be sad.' The Hebrew parallel וְאַל־תֵּעָצֵבוּ similarly points to grief/distress.
- source_word: δοξάσει
  chosen: will glorify
  alternatives:
  - will honor
  - will give glory to
  lexicon: BDAG
  rationale: The Greek verb is explicitly from the glory/honor semantic field. Although
    the MT parallel in Neh 8:10 is commonly rendered with 'strength' from a different
    Hebrew Vorlage/tradition, the extant Greek of 1 Esdras reads δοξάσει and should
    be translated accordingly rather than harmonized away.
- source_word: ὑμᾶς
  chosen: you
  alternatives:
  - you all
  lexicon: BDAG
  rationale: Second person plural object. Standard English 'you' is acceptable; plurality
    is clear from context though not marked in the main text.
