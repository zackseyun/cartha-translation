translation:
  text: Then Ezra rose up from the court of the temple and went into the chamber of
    Jona son of Naseib,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the chamber of Jona son of Naseib.'' The Hebrew parallel in Ezra
      10:6 points to ''Johanan son of Eliashib,'' which is followed here for the proper
      names.'
    reason: alternative_reading
  - marker: b
    text: The Greek source for this verse shows a minor mismatch in the proper names;
      the action and setting are otherwise clear.
    reason: textual_variant
lexical_decisions:
- source_word: ἀναστὰς
  chosen: rose up
  alternatives:
  - arose
  - got up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι introducing the next action. 'Rose up'
    preserves the narrative sequence with slightly formal dignity appropriate to the
    setting.
- source_word: αὐλῆς
  chosen: court
  alternatives:
  - courtyard
  lexicon: LSJ
  rationale: αὐλή commonly denotes a court or courtyard. 'Court' is concise and idiomatic
    in temple context.
- source_word: τοῦ ἱεροῦ
  chosen: of the temple
  alternatives:
  - of the sanctuary
  - of the sacred precinct
  lexicon: LSJ
  rationale: ἱερόν refers to the temple complex rather than the inner shrine specifically.
    'Temple' is the clearest natural rendering in English.
- source_word: ἐπορεύθη
  chosen: went
  alternatives:
  - proceeded
  - traveled
  lexicon: BDAG
  rationale: Standard narrative movement verb. 'Went' is sufficiently direct and avoids
    overtranslating.
- source_word: παστοφόριον
  chosen: chamber
  alternatives:
  - room
  - cell
  - storeroom
  lexicon: LSJ
  rationale: The term denotes a chamber or room in a temple/building complex. 'Chamber'
    fits the architectural and somewhat formal setting better than 'room.'
- source_word: Ἰωνᾶ τοῦ Νασείβου
  chosen: Johanan son of Eliashib
  alternatives:
  - Jona son of Naseibou
  - Joanan son of Naseib
  lexicon: LSJ
  rationale: The Greek proper names as transmitted in Swete appear to reflect a form
    divergent from the Hebrew parallel in Ezra 10:6, where the corresponding figure
    is Johanan son of Eliashib. Because the prompt directs use of the MT parallel
    as actual translation input for proper names and phrasing, the Hebrew-aligned
    form is adopted in the main text for intelligibility and likely historical identification,
    while the Greek-form names are preserved in a footnote due to source-level mismatch.
