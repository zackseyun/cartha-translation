translation:
  text: Jonathan son of Azael and Hezekiah son of Thocanus accepted this, and Mosollamus
    and Levi and Sabbataeus joined in deciding with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek names here differ from the approximate Hebrew parallel in Ezra
      10; compare forms such as Meshullam for Mosollamus and Shabbethai for Sabbataeus.
    reason: alternative_reading
  - marker: b
    text: The verb rendered 'joined in deciding with them' is rare and may also mean
      that these men acted as assessors or gave supporting judgment with them.
    reason: lexical_alternative
  - marker: c
    text: The Greek text of 1 Esdras here does not closely match the wording of the
      Masoretic parallel, so the names and phrasing should be read as anchored primarily
      in the Greek witness.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπεδέξαντο
  chosen: accepted this
  alternatives:
  - undertook this
  - approved this
  - received this
  lexicon: LSJ
  rationale: The middle of ἐπιδέχομαι here most naturally means taking upon oneself
    or accepting a proposal/arrangement. In this administrative context, 'accepted
    this' is clear modern English and fits κατὰ ταῦτα ('in accordance with these things').
- source_word: κατὰ ταῦτα
  chosen: this
  alternatives:
  - accordingly
  - in accordance with these things
  - on these terms
  lexicon: LSJ
  rationale: The phrase indicates conformity to the preceding arrangement. English
    idiom is smoother with 'accepted this,' while the sense of accordance is absorbed
    into the verb phrase. This is a mild dynamic adjustment within optimal equivalence.
- source_word: συνεβράβευσαν αὐτοῖς
  chosen: joined in deciding with them
  alternatives:
  - acted as assessors with them
  - gave judgment with them
  - supported them in the decision
  lexicon: LSJ
  rationale: The rare verb suggests acting together in an adjudicative or arbitrating
    role. Because the context is communal/legal resolution, 'joined in deciding with
    them' communicates the judicial-assisting sense without overclaiming a technical
    office.
- source_word: Ἰωνάθας Ἀζαήλου
  chosen: Jonathan son of Azael
  alternatives:
  - Jonathan of Azael
  rationale: Greek patronymic-style genitive is best rendered in English as 'son of'
    for clarity.
- source_word: Ἐξειας Θοκάνου
  chosen: Hezekiah son of Thocanus
  alternatives:
  - Ezeias son of Thocanus
  - Hezekiah of Thocanus
  rationale: Ἐξειας corresponds to the familiar Semitic name Hezekiah more naturally
    than a strict letter-for-letter transliteration. The father's name is retained
    as Thocanus by transliteration because no secure standard English equivalent is
    established from the Greek alone.
- source_word: Μοσόλλαμος
  chosen: Mosollamus
  alternatives:
  - Meshullam
  rationale: The Greek witness is primary for 1 Esdras, so the name is transliterated
    from Greek. The Hebrew-parallel form Meshullam is worth preserving as an alternative
    in a footnote, not replacing the Greek-based form in the main text.
- source_word: Λευεὶς
  chosen: Levi
  alternatives:
  - Levites
  rationale: The form here is singular and appears as a personal name in the list,
    not the tribal designation 'Levites'.
- source_word: Σαββαταῖος
  chosen: Sabbataeus
  alternatives:
  - Shabbethai
  rationale: As with other names in 1 Esdras, the Greek form is transliterated in
    the main text, while the Hebrew-parallel equivalent may be noted separately.
