translation:
  text: And all the assembly cried out, “Amen, amen,” and lifting up their hands,
    they fell to the ground and worshiped God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐφώνησεν
  chosen: cried out
  alternatives:
  - called out
  - said aloud
  - answered
  lexicon: BDAG
  rationale: The verb denotes vocal utterance with force. In context, the whole crowd
    responds audibly and emphatically with 'Amen, amen,' so 'cried out' best captures
    the public, collective acclamation without overstating it as a shout.
- source_word: πᾶν τὸ πλῆθος
  chosen: all the assembly
  alternatives:
  - all the multitude
  - the whole crowd
  lexicon: BDAG
  rationale: πλῆθος often means a multitude or crowd, but in this liturgical setting
    'assembly' better reflects the gathered people in worship while preserving the
    collective sense of πᾶν.
- source_word: Ἀμήν, ἀμήν
  chosen: Amen, amen
  alternatives:
  - Truly, truly
  lexicon: BDAG
  rationale: As a congregational response, the transliterated liturgical form 'Amen'
    is standard and preserves the worship setting. 'Truly, truly' would misread the
    function here as an assertion rather than a response.
- source_word: ἄραντες ἄνω τὰς χεῖρας
  chosen: lifting up their hands
  alternatives:
  - raising their hands upward
  - having lifted their hands on high
  lexicon: BDAG
  rationale: The participial phrase describes a worship gesture preceding prostration.
    'Lifting up their hands' is natural English and preserves both the physical action
    and the upward direction signaled by ἄνω.
- source_word: προσπεσόντες ἐπὶ τὴν γῆν
  chosen: they fell to the ground
  alternatives:
  - falling upon the ground
  - prostrating themselves on the ground
  lexicon: BDAG
  rationale: The phrase indicates bodily falling down in reverence. 'They fell to
    the ground' is idiomatic and clear; the worship sense is then completed by the
    following verb 'worshiped.'
- source_word: προσεκύνησαν
  chosen: worshiped
  alternatives:
  - bowed down
  - did obeisance
  lexicon: BDAG
  rationale: In this explicit God-directed context (τῷ θεῷ), 'worshiped' best conveys
    the religious act rather than merely the physical posture. 'Bowed down' would
    undertranslate the theological force.
- source_word: τῷ θεῷ
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: English normally omits the article before 'God' in direct reference to
    Israel's God. The dative marks the object of worship, not a need for a more formal
    phrasing.
