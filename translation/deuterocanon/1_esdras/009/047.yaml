  - did obeisance to God
  rationale: The verse contains both the physical act of falling to the ground and
    the religious act of προσκυνέω. Rendering the latter as 'worshiped' preserves
    the theological force of devotion to God without collapsing it into mere posture.
  doctrine_reference: 'DOCTRINE.md: Preserve theological weight of source terms; readable
    modern English.'
