translation:
  text: And those from the tribe of Judah and Benjamin were gathered in Jerusalem
    within three days; it was the ninth month, on the twentieth day of the month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has the singular 'tribe' with 'Judah and Benjamin'; the sense is the
      people belonging to Judah and Benjamin. The Hebrew parallel in Ezra 10:9 reads
      'all the men of Judah and Benjamin gathered themselves to Jerusalem within three
      days.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐπισυνήχθησαν
  chosen: were gathered
  alternatives:
  - assembled
  - were assembled
  lexicon: BDAG
  rationale: Passive form indicates that the people came together/were convened. 'Were
    gathered' preserves the passive sense without over-specifying agency.
- source_word: οἱ ἐκ τῆς φυλῆς Ἰούδα καὶ Βενιαμεὶν
  chosen: those from the tribe of Judah and Benjamin
  alternatives:
  - those of the tribe of Judah and Benjamin
  - the men of Judah and Benjamin
  lexicon: LSJ
  rationale: The Greek literally says 'those from the tribe of Judah and Benjamin.'
    Although two tribal names are coordinated, the singular φυλῆς is retained in Swete's
    text; the English keeps the source's wording naturally without forcing an interpretive
    correction. 'Those' is preferable to 'men' because the Greek expression is not
    explicitly gendered here.
- source_word: ἐν τρισὶν ἡμέραις
  chosen: within three days
  alternatives:
  - in three days
  - after three days
  lexicon: BDAG
  rationale: In this gathering context, the phrase most naturally means the assembly
    occurred inside a three-day period rather than exactly on the third day. 'Within
    three days' communicates the deadline sense clearly.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - in Jerusalem
  - at Jerusalem
  lexicon: BDAG
  rationale: εἰς normally marks movement toward a place. Since the verb is one of
    gathering, English idiom allows 'gathered to Jerusalem,' preserving the directional
    force better than simply 'in Jerusalem.'
- source_word: οὗτος ὁ μὴν ἔνατος
  chosen: it was the ninth month
  alternatives:
  - this was the ninth month
  - that was the ninth month
  lexicon: LSJ
  rationale: The clause identifies the time of the event. 'It was the ninth month'
    is idiomatic English and preserves the temporal notice.
- source_word: τῇ εἰκάδι τοῦ μηνός
  chosen: on the twentieth day of the month
  alternatives:
  - on the twentieth of the month
  lexicon: LSJ
  rationale: εἰκάς denotes the twentieth day of a month. The fuller rendering is clear
    for modern readers.
