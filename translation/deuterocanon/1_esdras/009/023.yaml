translation:
  text: 'And from the Levites: Jozabad, Seneis, Konos (that is, Kalitais), and Pathaios,
    and Judas and Jonas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that is, Kalitais' for the phrase 'who is Kalitais'; the Greek likely
      identifies Konos by an alternate name.
    reason: alternative_reading
  - marker: b
    text: Some names may correspond to Hebrew forms known from the parallel tradition,
      such as 'Jonah' for 'Jonas' or a Semitic equivalent behind 'Pathaios,' but the
      main text follows the Greek witness of 1 Esdras.
    reason: lexical_alternative
  - marker: c
    text: The source transcription is marked with minor mismatch, so the exact spelling
      of some rare names may be slightly uncertain.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν Λευειτῶν
  chosen: from the Levites
  alternatives:
  - of the Levites
  - among the Levites
  lexicon: LSJ
  rationale: The phrase introduces a subgroup within the larger list. 'From the Levites'
    is natural English and preserves the partitive force of ἐκ.
- source_word: Ἰωζάβαδος
  chosen: Jozabad
  alternatives:
  - Josabad
  rationale: Personal name transliterated from the Greek form, following the project's
    policy to transliterate names rather than translate them.
- source_word: Σενεεὶς
  chosen: Seneis
  alternatives:
  - Seneeis
  rationale: The Greek proper name is best represented by a straightforward transliteration.
    The exact English form is somewhat uncertain because this is a rare name and the
    source transcription has minor-mismatch status.
- source_word: Κῶνος
  chosen: Konos
  alternatives:
  - Conos
  - Konon
  rationale: Transliterated directly from the Greek nominative form. 'Konos' keeps
    the Greek kappa sound without importing later Latinizing conventions.
- source_word: οὗτος Καλιταίς
  chosen: who is Kalitais
  alternatives:
  - this is Kalitais
  - that is, Kalitais
  - he, Kalitais
  lexicon: LSJ
  rationale: οὗτος here functions appositionally to identify an alternate or clarifying
    name for the preceding person. 'Who is Kalitais' is idiomatic English that preserves
    the identifying force without overexplaining.
- source_word: Παθαῖος
  chosen: Pathaios
  alternatives:
  - Pathaeus
  - Pethahiah
  rationale: The Greek name is transliterated directly. The Hebrew parallel may suggest
    a related Semitic name, but the Greek witness is primary here, so the main text
    follows the Greek form.
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  rationale: As a personal name in Greek, Ἰούδας is regularly rendered 'Judas.' 'Judah'
    would suggest the tribal/geographical form rather than the Greek personal-name
    form present here.
- source_word: Ἰωνάς
  chosen: Jonas
  alternatives:
  - Jonah
  rationale: The Greek form Ἰωνάς is naturally transliterated 'Jonas.' 'Jonah' reflects
    the Hebrew form and is worth preserving as an alternative, but the Greek source
    is primary.
