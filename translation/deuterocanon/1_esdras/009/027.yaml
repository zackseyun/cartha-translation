translation:
  text: 'From the sons of Elah: Mattan and Zechariah, Jezrikilus and Joabdius and
    Jeremoth and Aedeias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several names in this verse are preserved as close transliterations of the
      Greek because 1 Esdras often differs from the Hebrew parallel in spelling and
      order; more familiar Hebrew-based forms are possible for some names.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  chosen: From the sons of
  alternatives:
  - Of the sons of
  - Among the sons of
  lexicon: LSJ
  rationale: The phrase introduces a subgroup within a larger list. 'From the sons
    of' is a natural English rendering that preserves the Greek preposition ἐκ and
    the genealogical/list structure.
- source_word: Ἠλά
  chosen: Elah
  alternatives:
  - Ela
  lexicon: LSJ
  rationale: This is a personal name transliterated from the Greek form. 'Elah' aligns
    well with standard English representation of the underlying Semitic name.
- source_word: Ματαν
  chosen: Mattan
  alternatives:
  - Matan
  lexicon: LSJ
  rationale: Proper name transliterated directly from Greek. The doubled consonant
    in English helps reflect the common Semitic name pattern without over-anglicizing.
- source_word: Ζαχαρίας
  chosen: Zechariah
  alternatives:
  - Zacharias
  lexicon: LSJ
  rationale: Standard English transliteration for the biblical name; more familiar
    and consistent with OT name conventions than 'Zacharias,' while still accurately
    reflecting the Greek form.
- source_word: Ἰεζρίκιλος
  chosen: Jezrikilus
  alternatives:
  - Jezricilus
  - Iezrikilos
  lexicon: LSJ
  rationale: The name is rare and textually awkward in English. A close transliteration
    preserves auditability and avoids importing a speculative harmonization to a Hebrew
    parallel name.
- source_word: Ὠαβδίος
  chosen: Joabdius
  alternatives:
  - Oabdius
  - Obadiah
  lexicon: LSJ
  rationale: The Greek form appears to represent a name related to Obadiah/Abdi-type
    forms, but the source text should control. 'Joabdius' reflects the transmitted
    Greek more closely than harmonizing to the Hebrew tradition.
- source_word: Ἱερεμὼθ
  chosen: Jeremoth
  alternatives:
  - Jeremoths
  - Jerimoth
  lexicon: LSJ
  rationale: A straightforward transliteration of the Greek proper name. 'Jeremoth'
    preserves the form seen in many English representations of similar names.
- source_word: Ἀηδείας
  chosen: Aedeias
  alternatives:
  - Aeideias
  - Adaias
  lexicon: LSJ
  rationale: The Greek name is best represented by close transliteration. Although
    a Hebrew parallel might suggest a more familiar equivalent, the Greek witness
    is primary and the exact correspondence is uncertain.
