translation:
  text: 'And from the sons of Asom: Maltannaios, Mattathias, Sabannaious, Eleiphalat,
    Manasseh, and Shimei.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Asom.'' The Hebrew parallel likely corresponds to ''Hashum.'''
    reason: alternative_reading
  - marker: b
    text: Several names in this list reflect Greek forms that do not align exactly
      with the Hebrew parallel tradition; the main text follows the Greek witness
      of 1 Esdras.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ ἐκ τῶν υἱῶν
  chosen: And from the sons of
  alternatives:
  - And among the sons of
  - And of the sons of
  lexicon: LSJ
  rationale: The phrase introduces another family grouping within a list. 'From the
    sons of' is a natural, fairly formal rendering of ἐκ τῶν υἱῶν in this genealogical/list
    context.
- source_word: Ἀσόμ
  chosen: Asom
  alternatives:
  - Hashum
  - Asom
  lexicon: LSJ
  rationale: The Greek witness reads Ἀσόμ, so the main text transliterates the Greek
    form as required by source primacy and the policy to transliterate names. The
    MT parallel likely corresponds to Hashum, but the Greek form should control the
    main rendering here.
- source_word: Μαλτανναῖος
  chosen: Maltannaios
  alternatives:
  - Maltanneus
  - Mattaniah
  lexicon: LSJ
  rationale: This is a proper name preserved in Greek form. I transliterate rather
    than harmonize to the Hebrew parallel, since the Greek is the primary source for
    1 Esdras.
- source_word: Ματταθίας
  chosen: Mattathias
  alternatives:
  - Matthathias
  lexicon: LSJ
  rationale: Standard English transliteration of the Greek proper name.
- source_word: Σαβανναιούς
  chosen: Sabannaious
  alternatives:
  - Sabannaeus
  - Zabad
  lexicon: LSJ
  rationale: The Greek form is somewhat unusual relative to the Hebrew parallel tradition;
    I preserve the Greek name by transliteration in the main text rather than assimilating
    it to a likely MT equivalent.
- source_word: Ἐλειφαλὰτ
  chosen: Eleiphalat
  alternatives:
  - Eliphalat
  - Eliphelet
  lexicon: LSJ
  rationale: Transliteration of the Greek proper name. 'Eliphelet' would reflect a
    Hebrew-aligned normalization, but the Greek form remains primary.
- source_word: Μανασση
  chosen: Manasseh
  alternatives:
  - Manasses
  lexicon: LSJ
  rationale: This name has a well-established English biblical form, and 'Manasseh'
    is a standard transliteration that remains close to the Greek while readable in
    English.
- source_word: Σεμεεί
  chosen: Shimei
  alternatives:
  - Semeei
  lexicon: LSJ
  rationale: Although the Greek form could be transliterated more mechanically as
    'Semeei,' the Hebrew parallel strongly supports the familiar name 'Shimei.' Because
    the parallel source is to be used as actual translation input, this is a justified
    normalization for readability and identification.
