translation:
  text: And Ezra rose and said to them, “You have acted lawlessly and have married
    foreign women, adding sin to Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “have married foreign women” or “have taken foreign women as wives.”
      The Greek verb literally means “have lived with,” but in this context it refers
      to unlawful unions with women from other peoples.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  chosen: rose
  alternatives:
  - stood up
  - got up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι introducing Ezra's speech. 'Rose' is concise,
    natural English and preserves the narrative movement without overtranslating.
- source_word: ἠνομήσατε
  chosen: have acted lawlessly
  alternatives:
  - have sinned
  - have transgressed
  - have broken the law
  lexicon: BDAG
  rationale: From ἀνομέω, denoting acting contrary to law. 'Have acted lawlessly'
    preserves the law-oriented force better than the more generic 'have sinned.' The
    perfect-like English fits the completed action with present relevance in the rebuke.
- source_word: συνῳκίσατε
  chosen: have lived with
  alternatives:
  - have married
  - have dwelt with
  - have taken as wives
  lexicon: BDAG
  rationale: The verb literally means 'to live together with' or 'cohabit with.' In
    this context, with γυναιξὶν ἀλλογενέσιν and the Ezra parallel in view, it refers
    to entering marital unions with foreign women. 'Have lived with' stays close to
    the Greek wording while allowing the marital sense to be inferred from context;
    'have married' is possible but slightly more interpretive than the Greek form
    itself.
- source_word: γυναιξὶν ἀλλογενέσιν
  chosen: foreign women
  alternatives:
  - women of another people
  - alien women
  - women of foreign descent
  lexicon: BDAG
  rationale: ἀλλογενής means belonging to another people/foreign. 'Foreign women'
    is idiomatic and matches the social-ethnic force of the phrase without archaic
    wording.
- source_word: προσθεῖναι
  chosen: adding
  alternatives:
  - to add
  - thereby adding
  - increasing
  lexicon: BDAG
  rationale: The infinitive expresses result or effect of the preceding actions. 'Adding'
    gives smooth English while preserving the sense that their conduct increases Israel's
    guilt.
- source_word: ἁμαρτίαν
  chosen: sin
  alternatives:
  - guilt
  - offense
  lexicon: BDAG
  rationale: Standard rendering of ἁμαρτία. 'Sin' is the clearest and most direct
    equivalent here.
- source_word: τῷ Ἰσραήλ
  chosen: to Israel
  alternatives:
  - upon Israel
  - for Israel
  lexicon: BDAG
  rationale: The dative after προσθεῖναι can be rendered naturally as 'to Israel,'
    conveying that the nation's sin is being increased. This also aligns with the
    corporate dimension of the rebuke.
