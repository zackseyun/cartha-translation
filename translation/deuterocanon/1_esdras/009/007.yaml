theological_decisions:
- issue: Whether to make the marital sense explicit in συνῳκίσατε
  chosen_reading: Rendered as 'have lived with' rather than 'have married,' while
    allowing the marital sense to remain clear from context and the Hebrew parallel.
  alternative_readings:
  - have married foreign women
  - have taken foreign women as wives
  rationale: The Greek verb itself emphasizes living together/cohabitation, though
    the broader Ezra tradition concerns intermarriage. Optimal equivalence favors
    retaining the Greek's wording while not obscuring the underlying issue.
  doctrine_reference: Translation philosophy §1, §5
- issue: Corporate force of Ezra's accusation against Israel
  chosen_reading: Rendered 'adding sin to Israel' to preserve the text's statement
    that the people's action increases Israel's collective guilt.
  alternative_readings:
  - bringing guilt upon Israel
  - increasing Israel's sin
  rationale: The verse speaks corporately rather than merely of private wrongdoing.
    The translation preserves that theological-social dimension without expanding
    beyond the Greek.
  doctrine_reference: Translation philosophy §1, §6
