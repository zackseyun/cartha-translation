translation:
  text: And the Levites kept instructing all the people, saying, “This day is holy;
    do not grieve.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “do not be sorrowful” or “do not mourn.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ Λευεῖται
  chosen: the Levites
  alternatives:
  - the Levitical men
  lexicon: LSJ
  rationale: Standard transliteration of the ethnic/cultic group name; 'Levites' is
    the natural English equivalent and matches biblical usage.
- source_word: ἐκέλευον
  chosen: kept instructing
  alternatives:
  - were commanding
  - ordered
  - urged
  lexicon: BDAG
  rationale: The imperfect suggests ongoing or repeated action. While the verb can
    mean 'command' or 'order,' in this context of public exhortation to calm the people,
    'kept instructing' conveys repeated direction without overstating harshness.
- source_word: τῷ δήμῳ πάντα
  chosen: all the people
  alternatives:
  - the whole crowd
  - the populace in every part
  lexicon: LSJ
  rationale: δήμῳ means 'people' or 'assembly/populace.' The accompanying πάντα is
    best taken adverbially/distributively with the sense of comprehensiveness, yielding
    'all the people' in idiomatic English.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - as they said
  - declaring
  lexicon: BDAG
  rationale: A straightforward participial connector introducing the quoted speech.
- source_word: Ἡ ἡμέρα αὕτη ἁγία
  chosen: This day is holy
  alternatives:
  - This day is sacred
  - Today is holy
  lexicon: BDAG
  rationale: ἁγία is well rendered 'holy.' 'This day' preserves the demonstrative
    force of αὕτη more closely than simply 'today,' while remaining natural English.
- source_word: μὴ λυπεῖσθε
  chosen: do not grieve
  alternatives:
  - do not be sorrowful
  - do not be distressed
  - do not mourn
  lexicon: BDAG
  rationale: λυπέω in the middle/passive here denotes being grieved or sorrowful.
    'Do not grieve' is concise and natural. The MT parallel in Neh 8 emphasizes rejoicing
    after understanding, which supports an emotional sense rather than mere inconvenience
    or distress.
