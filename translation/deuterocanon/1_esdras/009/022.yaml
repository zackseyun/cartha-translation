translation:
  text: 'And from the sons of Phaisour: Elionais, Asseias, Ismaēlos, Nathanaēlos,
    Okaēlēdos, and Salthas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Phaisour; the approximate Hebrew parallel corresponds to Pashhur.
    reason: alternative_reading
  - marker: b
    text: The name Okaēlēdos reflects the Greek witness here; the approximate Hebrew
      parallel tradition may point to a different underlying name, sometimes aligned
      with Jozabad.
    reason: textual_variant
  - marker: c
    text: Several names in this verse appear in Greek forms that do not exactly match
      the approximate Hebrew parallel; the translation keeps the Greek forms because
      1 Esdras is translated here from the Septuagint witness.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  chosen: from the sons of
  alternatives:
  - among the sons of
  - of the sons of
  lexicon: LSJ
  rationale: In this list formula, ἐκ marks selection out of a family group. 'From
    the sons of' preserves the genealogical/list structure of the Greek and matches
    the surrounding context of named offenders from particular houses.
- source_word: Φαισούρ
  chosen: Phaisour
  alternatives:
  - Pashhur
  - Phesur
  lexicon: LSJ
  rationale: Personal names are transliterated from the Greek source as required by
    project philosophy. The MT parallel points to Pashhur, but because 1 Esdras is
    translated from Greek, the main text keeps the Greek-form name, with the Hebrew-aligned
    form suitable for a footnote if needed.
- source_word: Ἐλιωναίς
  chosen: Elionais
  alternatives:
  - Elionas
  - Eliōnais
  lexicon: LSJ
  rationale: Transliterated directly from the Greek proper name. The ending is preserved
    in a readable English form without attempting to harmonize to a Hebrew equivalent
    not explicit in the Greek.
- source_word: Ἀσσείας
  chosen: Asseias
  alternatives:
  - Aseias
  - Assaias
  lexicon: LSJ
  rationale: Direct transliteration of the Greek name. 'Asseias' reflects the doubled
    sigma and common English handling of Greek proper names.
- source_word: Ἰσμαήλος
  chosen: Ismaēlos
  alternatives:
  - Ishmael
  - Ismael
  lexicon: LSJ
  rationale: The Greek form is a transliterated proper name cognate with Hebrew Ishmael.
    Because the project prioritizes the Greek source for 1 Esdras and transliterates
    names, the Greek-form name is retained rather than normalized to the more familiar
    Hebrew/English 'Ishmael'.
- source_word: Ναθανάηλος
  chosen: Nathanaēlos
  alternatives:
  - Nathanael
  - Nethanel
  lexicon: LSJ
  rationale: Transliterated from the Greek form. Although the Hebrew parallel tradition
    may suggest Nethanel, the Greek witness here supports a form closer to Nathanaēlos.
- source_word: Ὠκαιληδός
  chosen: Okaēlēdos
  alternatives:
  - Ocailēdos
  - Jozabad
  lexicon: LSJ
  rationale: This is a difficult proper name in Greek transmission. The main text
    preserves a straightforward transliteration of Swete's Greek rather than importing
    a harmonized Hebrew equivalent from the approximate MT parallel. Because the Semitic
    parallel may point to a different underlying name, that alternative is preserved
    in a footnote.
- source_word: Σάλθας
  chosen: Salthas
  alternatives:
  - Salthas
  - Shallum
  lexicon: LSJ
  rationale: Transliterated from the Greek proper name. A Hebrew-aligned equivalent
    such as Shallum is possible in the broader parallel tradition, but the Greek form
    is retained in the main text.
