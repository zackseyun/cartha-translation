translation:
  text: This day is holy to the Lord, and all were weeping when they heard the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Nehemiah 8 includes 'our Lord' and continues with
      an exhortation to eat, drink, share portions, and not grieve; 1 Esdras here
      preserves a shorter Greek wording.
    reason: cross_reference
lexical_decisions:
- source_word: Ἡ ἡμέρα αὕτη
  chosen: This day
  alternatives:
  - This day here
  - This is the day
  lexicon: LSJ
  rationale: A straightforward demonstrative phrase. 'This day' is natural English
    and preserves the deictic force without unnecessary expansion.
- source_word: ἁγία
  chosen: holy
  alternatives:
  - sacred
  - set apart
  lexicon: LSJ
  rationale: '''Holy'' is the standard rendering and best preserves the religious
    force of the Greek in a covenantal setting. ''Sacred'' is possible but slightly
    flatter theologically.'
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - for the Lord
  lexicon: LSJ
  rationale: κύριος is rendered 'Lord' per project doctrine. The dative can be expressed
    as 'to' or 'for'; 'to the Lord' stays close to the Greek while still reading naturally.
    The MT parallel has 'to our Lord,' but the Greek source text lacks 'our,' so it
    is not imported into the main text.
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  - all the people
  lexicon: LSJ
  rationale: The Greek says simply 'all.' 'Everyone' is possible, but 'all' better
    preserves the concise collective sense. 'All the people' would add a noun not
    explicit in the Greek.
- source_word: ἔκλαιον
  chosen: were weeping
  alternatives:
  - wept
  - began to weep
  lexicon: LSJ
  rationale: The imperfect verb suggests ongoing action, so 'were weeping' better
    reflects the aspect than the simple past 'wept'.
- source_word: ἐν τῷ ἀκοῦσαι
  chosen: when they heard
  alternatives:
  - upon hearing
  - as they heard
  - at hearing
  lexicon: LSJ
  rationale: The articular infinitive with ἐν can be rendered temporally. 'When they
    heard' is idiomatic English and captures the temporal sense clearly.
- source_word: τὸν νόμον
  chosen: the law
  alternatives:
  - the Law
  - the instruction
  lexicon: LSJ
  rationale: νόμος here refers to the Torah/law being read publicly. 'The law' is
    the most direct rendering from the Greek. Capitalized 'Law' is possible as an
    interpretive signal, but the lowercase form avoids over-formatting while preserving
    meaning. 'Instruction' would lean toward the Hebrew torah nuance, but the Greek
    witness remains primary.
