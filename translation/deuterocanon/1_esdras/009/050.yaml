theological_decisions:
- issue: Whether to import details from the MT parallel not present in the Greek,
    especially 'our Lord' and the surrounding exhortation not to grieve
  chosen_reading: 'Retain only the Greek wording: ''This day is holy to the Lord,
    and all were weeping when they heard the law.'''
  alternative_readings:
  - Expand toward the MT parallel with 'our Lord' or the following exhortation about
    rejoicing
  rationale: The task requires the Greek as primary source while using the Hebrew
    parallel as a real input. The MT confirms the setting and sense, but 1 Esdras
    here is shorter and differently framed. Therefore the translation stays anchored
    to the extant Greek and does not harmonize it to Nehemiah 8:10.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition/source tradition
