translation:
  text: And lodging there, he tasted no bread and drank no water, mourning over the
    great lawless deeds of the multitude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'camping there' or 'spending the night there.' The Greek participle denotes
      staying overnight in that place.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in Ezra 10 describes the specific offense as taking
      foreign wives; the Greek here summarizes it more generally as 'lawless deeds.'
    reason: alternative_reading
lexical_decisions:
- source_word: αὐλισθεὶς
  chosen: lodging
  alternatives:
  - camping
  - spending the night
  - encamping
  lexicon: LSJ
  rationale: The participle from αὐλίζομαι denotes staying or passing the night in
    a place. 'Lodging' is natural modern English and preserves the temporary-stay
    sense without over-specifying a campsite.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - food
  lexicon: LSJ
  rationale: The Greek literally says 'bread.' Although it can stand metonymically
    for food, the paired fasting formula with water favors retaining the concrete
    term in English.
- source_word: οὐκ ἐγεύσατο
  chosen: tasted no
  alternatives:
  - ate no
  - did not partake of
  lexicon: BDAG
  rationale: γεύομαι literally means 'taste.' In fasting contexts it can imply eating,
    but 'tasted no bread' closely reflects the idiom and remains understandable in
    English.
- source_word: ὕδωρ ἔπιεν
  chosen: drank no water
  alternatives:
  - did not drink water
  lexicon: LSJ
  rationale: A straightforward rendering of the fasting expression; paired with 'tasted
    no bread' it communicates total abstinence.
- source_word: πενθῶν
  chosen: mourning
  alternatives:
  - grieving
  - lamenting
  lexicon: BDAG
  rationale: πενθέω commonly denotes mourning or deep grief. 'Mourning' best conveys
    the solemn, penitential tone of Ezra's response.
- source_word: ἀνομιῶν
  chosen: lawless deeds
  alternatives:
  - iniquities
  - lawlessnesses
  - transgressions
  lexicon: BDAG
  rationale: ἀνομία is more than generic wrongdoing; it denotes violation of law or
    covenantal order. 'Lawless deeds' preserves that force in accessible English.
    The MT parallel speaks of foreign wives and children, but the Greek here summarizes
    the offense more generally, so the translation follows the Greek wording.
- source_word: τοῦ πλήθους
  chosen: the multitude
  alternatives:
  - the people
  - the assembly
  - the crowd
  lexicon: LSJ
  rationale: πλῆθος refers to the mass of people. 'The multitude' is a close formal
    equivalent and fits the collective sense of the offending community.
- source_word: τῶν μεγάλων
  chosen: great
  alternatives:
  - grave
  - serious
  lexicon: LSJ
  rationale: The adjective literally means 'great.' In context it intensifies the
    seriousness of the offenses; retaining 'great' keeps the source texture while
    remaining idiomatic.
