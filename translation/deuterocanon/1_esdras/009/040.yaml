theological_decisions:
- issue: Rendering the gendered audience description
  chosen_reading: from man to woman
  alternative_readings:
  - from men to women
  - both men and women
  rationale: The Greek uses a gendered distributive expression. Per project policy,
    the translation preserves the source's gendered wording rather than neutralizing
    it, while still communicating inclusivity of the gathered people.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Greek-LXX wording versus MT parallel on the composition of the audience
  chosen_reading: and all the priests
  alternative_readings:
  - and those who understood
  - and all who could understand
  rationale: The primary witness for 1 Esdras is the Greek, which here reads 'all
    the priests.' The Hebrew parallel in Nehemiah 8 differs materially. Because the
    project prioritizes the original-language source for the book being translated,
    the main text follows the Greek and preserves the Hebrew-aligned alternative in
    a footnote.
