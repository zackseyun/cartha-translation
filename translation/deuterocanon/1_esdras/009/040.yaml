translation:
  text: And Ezra the chief priest brought the law before all the multitude, from man
    to woman, and all the priests, to hear the law, on the new moon of the seventh
    month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Nehemiah 8:2–3 differs here, describing the audience
      as men, women, and those able to understand, rather than 'all the priests.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκόμισεν
  chosen: brought
  alternatives:
  - carried
  - presented
  lexicon: LSJ
  rationale: The verb commonly means to bring or carry. In this public-reading context,
    'brought' is natural English and stays close to the Greek without overinterpreting
    the action as ceremonial 'presented.'
- source_word: ὁ ἀρχιερεύς
  chosen: the chief priest
  alternatives:
  - the high priest
  lexicon: LSJ
  rationale: The Greek title is literally 'chief priest.' Although 'high priest' is
    a familiar rendering, 'chief priest' more directly reflects the wording here and
    avoids importing later institutional assumptions beyond the text.
- source_word: τὸν νόμον
  chosen: the law
  alternatives:
  - the book of the law
  - the instruction
  lexicon: LSJ
  rationale: νόμος here refers to the Torah/law being publicly read. 'The law' is
    the most direct rendering of the Greek. The MT parallel mentions 'the book of
    the law,' but the Greek text itself has simply 'the law,' so the translation remains
    anchored to the primary witness.
- source_word: παντὶ τῷ πλήθει
  chosen: all the multitude
  alternatives:
  - all the assembly
  - all the crowd
  - all the people
  lexicon: LSJ
  rationale: πλῆθος denotes a large gathered body. 'Multitude' preserves the sense
    of a gathered mass and matches the public setting. 'Assembly' is possible but
    slightly more interpretive.
- source_word: ἀπὸ ἀνθρώπου ἕως γυναικός
  chosen: from man to woman
  alternatives:
  - from men to women
  - from male to female
  lexicon: LSJ
  rationale: The singular distributive construction is best represented by 'from man
    to woman.' This preserves the Greek's gendered phrasing in line with the project's
    gender-accurate policy, rather than flattening it to a generic expression.
- source_word: πᾶσιν τοῖς ἱερεῦσιν
  chosen: and all the priests
  alternatives:
  - and all the elders
  - and all who understood
  lexicon: LSJ
  rationale: Swete's Greek reads 'all the priests.' The MT parallel differs ('the
    men and the women and those who understand'). Since the Greek is the primary source
    for 1 Esdras, the main text follows 'priests.' The divergence is significant enough
    to preserve in a footnote.
- source_word: ἀκοῦσαι τὸν νόμον
  chosen: to hear the law
  alternatives:
  - to listen to the law
  - to hear the reading of the law
  lexicon: LSJ
  rationale: 'The infinitive expresses purpose: Ezra brought the law so that they
    might hear it. ''To hear the law'' is concise and faithful; adding ''reading''
    would be interpretive though contextually likely.'
- source_word: νουμηνίᾳ
  chosen: on the new moon
  alternatives:
  - on the first day of the month
  - at the new moon festival
  lexicon: LSJ
  rationale: The noun denotes the new moon/new-moon day. 'On the new moon' is a direct
    rendering. The MT parallel specifies the day more idiomatically, but the Greek
    wording is retained.
- source_word: τοῦ ἑβδόμου μηνός
  chosen: of the seventh month
  alternatives:
  - in the seventh month
  lexicon: LSJ
  rationale: 'This genitival phrase naturally completes ''new moon'': ''the new moon
    of the seventh month.'' This is both literal and clear in English.'
