theological_decisions:
- issue: Whether to capitalize 'law' as a title for the Mosaic Torah
  chosen_reading: law
  alternative_readings:
  - Law
  rationale: The context clearly concerns the sacred law read publicly, but the Greek
    simply has τὸν νόμον. Lowercase preserves lexical transparency and avoids adding
    a formal title not explicit in the wording, while still allowing readers to understand
    the referent from context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gendered audience reference
  chosen_reading: the men and the women
  alternative_readings:
  - men and women
  rationale: The Greek explicitly names both groups. Retaining both with articles
    reflects the source's gender-accurate wording rather than neutralizing the expression
    into an undifferentiated crowd.
  doctrine_reference: Translation philosophy §4
