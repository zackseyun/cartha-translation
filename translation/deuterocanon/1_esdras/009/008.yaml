theological_decisions:
- issue: Sense of ὁμολογίαν in a penitential setting
  chosen_reading: confession
  alternative_readings:
  - acknowledgment
  rationale: The immediate context in 1 Esdras/Ezra concerns admission of covenant
    unfaithfulness regarding foreign marriages. Rendering ὁμολογία as 'confession'
    preserves the penitential thrust while still allowing the paired phrase 'confession
    and glory' to function as a call to honor God by truthful admission.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 4
- issue: Rendering of πατέρων
  chosen_reading: fathers
  alternative_readings:
  - ancestors
  rationale: The source is explicitly masculine and part of a fixed biblical formula.
    Per the project's gender-accurate policy, the masculine form is retained rather
    than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
