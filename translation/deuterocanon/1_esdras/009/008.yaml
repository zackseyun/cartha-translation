translation:
  text: And now give confession and glory to the Lord God of our fathers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acknowledgment.' The Greek ὁμολογία can denote confession or acknowledgment;
      here 'confession' is preferred because the surrounding context is penitential.
    reason: lexical_alternative
  - marker: b
    text: The Greek source for this verse is shorter than the fuller Hebrew parallel
      in Ezra; this translation follows the Greek wording while using the Hebrew as
      a contextual check.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ νῦν
  chosen: And now
  alternatives:
  - So now
  - Now then
  lexicon: LSJ
  rationale: A straightforward connective plus temporal adverb. 'And now' preserves
    the discourse flow from the preceding rebuke/exhortation without over-interpreting
    the transition.
- source_word: δότε
  chosen: give
  alternatives:
  - render
  - offer
  lexicon: LSJ
  rationale: Imperative plural of δίδωμι. 'Give' is the most direct equivalent and
    works idiomatically with the paired objects 'confession and glory.'
- source_word: ὁμολογίαν
  chosen: confession
  alternatives:
  - acknowledgment
  - praise
  lexicon: LSJ
  rationale: The noun can denote confession or acknowledgment. In this penitential
    context, and in light of the Ezra parallel where confession of sin is in view,
    'confession' best preserves the moral-religious force. 'Acknowledgment' is possible
    but weaker; 'praise' would blur the repentance context.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  lexicon: LSJ
  rationale: The phrase 'give ... glory' is a recognizable biblical idiom. 'Honor'
    is possible, but 'glory' better preserves the covenantal and liturgical register
    of the Greek.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - to the master
  lexicon: LSJ
  rationale: Per project doctrine, κύριος defaults to 'Lord.' In this Jewish scriptural
    setting it refers to Israel's God, not a human master.
- source_word: θεῷ τῶν πατέρων ἡμῶν
  chosen: God of our fathers
  alternatives:
  - God of our ancestors
  lexicon: LSJ
  rationale: This is a standard covenantal formula. 'Fathers' is retained as gender-accurate
    and tradition-conscious, matching the source wording and preserving the biblical
    idiom; 'ancestors' is smoother but less exact.
