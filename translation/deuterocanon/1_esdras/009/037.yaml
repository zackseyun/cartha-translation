theological_decisions:
- issue: Relation of the Greek wording to the approximate MT parallel in Nehemiah
    8:1
  chosen_reading: Translate the Greek sequence as given, including the reference to
    the new moon of the seventh month, while allowing the Hebrew parallel to confirm
    the broader setting of Israelites gathered in their inhabited places.
  alternative_readings:
  - Conform the verse more closely to the MT parallel about the people assembling
    as one man before the Water Gate
  rationale: The project prioritizes the Greek of 1 Esdras as the source text for
    this book. The MT parallel is explicitly approximate and should inform but not
    override the Greek wording. Therefore the translation preserves the Greek residence/new-moon
    language rather than harmonizing to Nehemiah.
  doctrine_reference: 'PHILOSOPHY.md: WLC MT parallels for 1 Esdras; Translation philosophy
    #1'
