translation:
  text: And the priests and the Levites and those from Israel lived in Jerusalem and
    in the country at the new moon of the seventh month, and the sons of Israel were
    in their settlements.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'dwelt.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'on the new moon of the seventh month'; the Hebrew parallel
      in Nehemiah differs substantially at this point, so the wording here follows
      1 Esdras as preserved in Greek.
    reason: alternative_reading
lexical_decisions:
- source_word: κατῴκησαν
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: BDAG
  rationale: The aorist of κατοικέω denotes residing or dwelling in a place. 'Lived'
    is natural modern English while preserving the basic sense of residence.
- source_word: οἱ ἐκ τοῦ Ἰσραήλ
  chosen: those from Israel
  alternatives:
  - those of Israel
  - those from among Israel
  - the Israelites
  lexicon: BDAG
  rationale: The phrase is distinct from the later 'sons of Israel' and likely refers
    broadly to lay Israelites in contrast to priests and Levites. 'Those from Israel'
    preserves the Greek structure and distinction without overinterpreting.
- source_word: ἐν Ἰερουσαλήμ καὶ ἐν τῇ χώρᾳ
  chosen: in Jerusalem and in the country
  alternatives:
  - in Jerusalem and in the land
  - in Jerusalem and in the surrounding region
  lexicon: BDAG
  rationale: χώρα can mean country, land, or region. Here it contrasts Jerusalem with
    the non-urban territory, so 'the country' communicates the sense clearly in English.
- source_word: τῇ νουμηνίᾳ τοῦ ἑβδόμου μηνός
  chosen: On the new moon of the seventh month
  alternatives:
  - at the new moon of the seventh month
  - when the seventh month began
  lexicon: LSJ
  rationale: νουμηνία refers to the new moon/new-moon day, often marking the first
    day of the month. The Greek text explicitly mentions the new moon rather than
    merely 'the seventh month,' so the translation retains that specificity.
- source_word: οἱ υἱοὶ Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: BDAG
  rationale: Per gender-accurate policy, the literal familial expression is retained
    where it functions as the covenant people designation. 'Sons of Israel' also preserves
    the distinction from the earlier phrase 'those from Israel.'
- source_word: κατοικίαις
  chosen: settlements
  alternatives:
  - dwellings
  - homes
  - villages
  lexicon: LSJ
  rationale: κατοικία denotes a place of habitation. 'Settlements' fits the collective,
    geographic sense better than the more domestic 'homes' and avoids narrowing to
    individual houses.
