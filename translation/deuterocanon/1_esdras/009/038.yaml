translation:
  text: And all the multitude gathered together with one accord in the open square
    of the eastern gate of the temple,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the broad place by the eastern gate of the temple.' The Greek phrase
      ἐπὶ τὸ εὐρύχωρον can be rendered more literally as 'into the broad/open place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθη
  chosen: gathered together
  alternatives:
  - was assembled
  - came together
  lexicon: BDAG
  rationale: Aorist passive of συνάγω here describes the crowd's assembling. 'Gathered
    together' is natural English and preserves the collective sense without overformal
    stiffness.
- source_word: πᾶν τὸ πλῆθος
  chosen: all the multitude
  alternatives:
  - the whole multitude
  - all the assembly
  - all the crowd
  lexicon: BDAG
  rationale: πλῆθος denotes a large gathered body. 'Multitude' preserves the scale
    and public character better than the more institutional 'assembly.' 'All the multitude'
    reflects πᾶν plus the singular collective noun.
- source_word: ὁμοθυμαδόν
  chosen: with one accord
  alternatives:
  - together
  - unanimously
  - with one purpose
  lexicon: BDAG
  rationale: The adverb conveys united action or shared purpose, not mere physical
    proximity. 'With one accord' is a clear established English rendering that preserves
    this nuance.
- source_word: ἐπὶ τὸ εὐρύχωρον
  chosen: in the open square
  alternatives:
  - into the broad place
  - in the spacious area
  - in the wide court
  lexicon: LSJ
  rationale: The phrase refers to a broad open area rather than simply abstract spaciousness.
    'Open square' communicates a public open space idiomatically in English while
    remaining close to the Greek sense.
- source_word: τοῦ πρὸς ἀνατολὰς
  chosen: of the east
  alternatives:
  - toward the east
  - on the eastern side
  lexicon: LSJ
  rationale: The Greek literally means 'toward the east.' In English, 'of the east
    gate' is the most natural attributive expression and preserves the directional
    identification.
- source_word: ἱεροῦ πυλῶνος
  chosen: gate of the temple
  alternatives:
  - temple gate
  - sacred gate
  lexicon: LSJ
  rationale: ἱεροῦ identifies the sacred precinct/temple, and πυλών is a gate or gateway.
    'Gate of the temple' is slightly fuller than 'temple gate' and avoids ambiguity
    about whether the adjective modifies the square or the gate.
