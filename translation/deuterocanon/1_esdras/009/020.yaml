translation:
  text: and they pledged themselves to send away their wives, and for atonement, rams
    for their ignorance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they laid hands to send away their wives'—an idiom
      meaning they undertook or bound themselves to do so.
    reason: lexical_alternative
  - marker: b
    text: '''For their ignorance'' may also mean ''for their error'' or ''for their
      unintentional sin'' in this sacrificial context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέβαλον τὰς χεῖρας
  chosen: they pledged themselves
  alternatives:
  - they laid hands on
  - they undertook
  - they bound themselves
  lexicon: LSJ
  rationale: Literally 'they laid the hands,' but in this idiom the sense is not physical
    seizure; it denotes taking action or binding oneself to a course. Given the following
    infinitive ἐκβαλεῖν, the phrase is best rendered as a commitment/undertaking rather
    than a wooden bodily image.
- source_word: ἐκβαλεῖν
  chosen: to send away
  alternatives:
  - to cast out
  - to dismiss
  - to put away
  lexicon: BDAG
  rationale: The verb can mean 'cast out,' but in the marital context reflected also
    by the Hebrew parallel about foreign wives, 'send away' communicates divorce/separation
    without overdramatizing the action.
- source_word: τὰς γυναῖκας αὐτῶν
  chosen: their wives
  alternatives:
  - their women
  lexicon: BDAG
  rationale: In this context γυναῖκες refers to spouses, not women generally. The
    MT parallel concerning foreign wives confirms the marital sense.
- source_word: εἰς ἐξιλασμόν
  chosen: for atonement
  alternatives:
  - as an atonement
  - for expiation
  lexicon: LEH
  rationale: ἐξιλασμός denotes expiation/atonement. 'For atonement' is clear modern
    English and preserves the sacrificial purpose without importing later technical
    jargon.
- source_word: κριούς
  chosen: rams
  alternatives:
  - male sheep
  lexicon: LSJ
  rationale: The sacrificial animal is specifically a ram, and the plural should be
    retained.
- source_word: ὑπὲρ τῆς ἀγνοίας αὐτῶν
  chosen: for their ignorance
  alternatives:
  - for their error
  - for their unintentional sin
  lexicon: BDAG
  rationale: ἀγνοία is literally 'ignorance,' but in sacrificial contexts it can imply
    sin committed in ignorance. The more literal 'ignorance' is retained in the main
    text, with the cultic nuance preserved in the rationale rather than expanded beyond
    the Greek wording.
