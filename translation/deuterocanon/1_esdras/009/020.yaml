theological_decisions:
- issue: Cultic force of ἀγνοία in sacrificial context
  chosen_reading: ignorance with sacrificial nuance left implicit
  alternative_readings:
  - unintentional sin
  - error
  rationale: The phrase likely refers to guilt arising from wrongdoing done in ignorance,
    but the Greek itself uses ἀγνοία. To preserve transparency and avoid over-interpretation,
    the main text keeps 'ignorance' while recognizing the cultic background in the
    decision record.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Idiomatic force of ἐπέβαλον τὰς χεῖρας
  chosen_reading: commitment/pledge rather than literal hand-laying
  alternative_readings:
  - laid hands on
  - took action to
  rationale: A literal rendering would be obscure or misleading in English, suggesting
    physical contact with the wives. The context and idiom favor an undertaking or
    pledge to carry out the dismissal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
