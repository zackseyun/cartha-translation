theological_decisions:
- issue: Relation of the Greek wording to the MT parallel in Ezra 10, which emphasizes
    foreign wives/women
  chosen_reading: Translate the Greek's broader command to separate from 'the nations
    of the land' and 'the foreigners' rather than narrowing the verse to women.
  alternative_readings:
  - and separate yourselves from the peoples of the land and from the foreign women
  rationale: The project prioritizes the Greek of 1 Esdras as the primary witness
    for this deuterocanonical book, while using the MT parallel as a real input and
    sanity check. Here the Greek text does not specify women, even though the Hebrew
    parallel context concerns foreign wives. To avoid importing detail not present
    in the Greek, the main text preserves the broader wording, while a footnote records
    the narrower MT-parallel sense.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition; PHILOSOPHY.md on 1 Esdras using Swete LXX with WLC MT parallels as
    cross-reference.
