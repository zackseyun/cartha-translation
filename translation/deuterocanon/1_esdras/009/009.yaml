translation:
  text: and do his will, and separate yourselves from the nations of the land and
    from the foreigners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Ezra 10 is more specific about foreign women/wives;
      1 Esdras here uses the broader wording 'the foreigners.'
    reason: alternative_reading
lexical_decisions:
- source_word: ποιήσατε
  chosen: do
  alternatives:
  - carry out
  - perform
  lexicon: BDAG
  rationale: Aorist imperative of ποιέω; 'do' is the most natural modern English imperative
    with 'his will' and preserves the direct force of the command without sounding
    wooden.
- source_word: τὸ θέλημα αὐτοῦ
  chosen: his will
  alternatives:
  - what he wills
  - his desire
  lexicon: BDAG
  rationale: Standard rendering for θέλημα in contexts of obedience to God. 'His will'
    is idiomatic and theologically transparent.
- source_word: χωρίσθητε
  chosen: separate yourselves
  alternatives:
  - be separated
  - withdraw
  lexicon: BDAG
  rationale: Imperative calling for deliberate dissociation. Middle/passive form in
    context is best represented in English as a reflexive command, matching the exhortational
    force.
- source_word: ἀπὸ τῶν ἐθνῶν
  chosen: from the nations
  alternatives:
  - from the Gentiles
  - from the peoples
  lexicon: BDAG
  rationale: ἔθνη can mean 'nations,' 'Gentiles,' or 'peoples.' In this Ezra/Esdras
    context it refers to surrounding non-Israelite groups in the land. 'Nations' is
    the broad, source-near rendering; 'Gentiles' would import later Jewish/Christian
    idiom.
- source_word: τῆς γῆς
  chosen: of the land
  alternatives:
  - of the earth
  - of the country
  lexicon: BDAG
  rationale: In this historical setting γῆ refers to the local land/territory, not
    the whole earth. 'Of the land' matches biblical idiom and the likely sense.
- source_word: ἀλλογενῶν
  chosen: foreigners
  alternatives:
  - those of another race
  - foreign women
  lexicon: LSJ
  rationale: The Greek term denotes those of another stock or foreign origin. Because
    the Greek here is masculine/mixed plural and broader than 'women,' the main text
    keeps the generic 'foreigners.' The MT parallel in Ezra 10 focuses specifically
    on foreign women, but the Greek wording here is wider and should govern the translation.
