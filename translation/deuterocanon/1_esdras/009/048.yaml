translation:
  text: Jeshua and Anniuth and Sherebiah, Jadinus, Jarsubus, Abteus, Autaias, Maiannas
    and Kelitas, Azariah, Katezabdus, Annas, Phalias—the Levites—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several names in this verse are textually uncertain in the Greek witness,
      and some may correspond to the Levite list in Nehemiah 8:7 (for example, Shabbethai,
      Hodiah, Maaseiah, and others). The main text preserves a mostly Greek-based
      form unless the Hebrew parallel is especially strong.
    reason: textual_variant
lexical_decisions:
- source_word: Ἰησοῦς
  chosen: Jeshua
  alternatives:
  - Jesus
  - Joshua
  lexicon: Greek proper-name tradition / MT parallel
  rationale: Although the Greek form is Ἰησοῦς, in this Ezra-Nehemiah context the
    MT parallel points to יֵשׁוּעַ, so 'Jeshua' best preserves the historical personal
    name rather than the later English NT form 'Jesus' or the broader equivalent 'Joshua'.
- source_word: οἱ Λευεῖται
  chosen: the Levites
  alternatives:
  - these were the Levites
  - the Levitical men
  lexicon: LSJ
  rationale: The phrase identifies the preceding list as Levites. The article is retained,
    and 'Levites' is the natural English rendering for Λευεῖται.
- source_word: Ἀννιοὺθ
  chosen: Anniuth
  alternatives:
  - Aniuth
  - Annioth
  lexicon: Greek proper-name tradition
  rationale: This is a transliteration of a proper name from the Greek witness. Because
    the source confidence is uncertain and the verse is a name list, a conservative
    transliteration is preferable.
- source_word: Σαραβίας
  chosen: Sherebiah
  alternatives:
  - Sarabias
  - Sarabiah
  lexicon: Greek proper-name tradition / MT parallel
  rationale: The Greek name corresponds to the known Ezra-Nehemiah Levite שֵׁרֵבְיָה
    in the Hebrew parallel context, so 'Sherebiah' gives the likely Semitic form rather
    than a bare Greek transliteration.
- source_word: Ἰάδεινος
  chosen: Jadinus
  alternatives:
  - Jadinus
  - Jaazin
  lexicon: Greek proper-name tradition
  rationale: The exact Hebrew equivalent is not certain from the Greek alone, so a
    close transliteration from the Greek is retained.
- source_word: Ἰαρσούβοος
  chosen: Jarsubus
  alternatives:
  - Jarsuboos
  - Hashabiah
  lexicon: Greek proper-name tradition / MT parallel
  rationale: The Greek form is difficult and the source is marked major_mismatch.
    A conservative transliteration is used in the main text rather than a more speculative
    harmonization to the MT list.
- source_word: Ἀβταῖος
  chosen: Abteus
  alternatives:
  - Abtaios
  - Shabbethai
  lexicon: Greek proper-name tradition / MT parallel
  rationale: The Greek likely reflects the Levite known as Shabbethai in Neh 8:7,
    but the form here is sufficiently divergent that the main text keeps a Greek-based
    transliteration, with the Hebrew-aligned possibility preserved as an alternative.
- source_word: Αὐταίας
  chosen: Autaiahs
  alternatives:
  - Autaias
  - Hodiah
  lexicon: Greek proper-name tradition / MT parallel
  rationale: The name is uncertain in this witness. A near-transliteration is preferred
    over a conjectural identification with a Hebrew parallel name.
- source_word: Μαιάννας
  chosen: Maiannas
  alternatives:
  - Maiannas
  - Maaseiah
  lexicon: Greek proper-name tradition / MT parallel
  rationale: Because 1 Esdras often reshapes names and the source note flags mismatch,
    the Greek form is represented directly in English.
- source_word: Καλείτας
  chosen: Kelitas
  alternatives:
  - Kalitas
  - Kelita
  lexicon: Greek proper-name tradition / MT parallel
  rationale: This likely corresponds to the Hebrew Kelita/Qelita known from Ezra-Nehemiah.
    'Kelitas' preserves the Greek ending while remaining recognizable.
- source_word: Ἀζαρίας
  chosen: Azariah
  alternatives:
  - Azarias
  lexicon: Greek proper-name tradition / MT parallel
  rationale: This is a standard equivalence for the Greek form of the Hebrew name
    Azariah.
- source_word: Κατέθζαβδος
  chosen: Jozabad
  alternatives:
  - Kathethzabdos
  - Josabad
  lexicon: Greek proper-name tradition / MT parallel
  rationale: The transmitted Greek form appears corrupt or heavily transformed, but
    in this list the corresponding Hebrew parallel strongly suggests Jozabad. Because
    the Greek is awkward and the Hebrew parallel is specifically relevant for 1 Esdras,
    the normalized Semitic form is adopted.
- source_word: Ἄννας
  chosen: Hanan
  alternatives:
  - Annas
  - Hananias
  lexicon: Greek proper-name tradition / MT parallel
  rationale: In the Nehemiah 8:7 parallel the likely corresponding name is Hanan.
    Using 'Hanan' avoids confusion with the later NT name 'Annas' and reflects the
    Semitic setting.
- source_word: Φαλίας
  chosen: Pelaiah
  alternatives:
  - Phalias
  - Pelaias
  lexicon: Greek proper-name tradition / MT parallel
  rationale: The MT parallel supports identification with Pelaiah, a Levite in Neh
    8:7, so the Hebrew-form English name is preferable.
