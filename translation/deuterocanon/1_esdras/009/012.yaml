- issue: Moral characterization of the offense
  chosen_reading: we have sinned greatly in these matters
  alternative_readings:
  - we have done much wrong in this
  rationale: The Greek uses the ordinary verb for sin, and the context is covenantal
    violation through foreign marriages. The translation preserves the text's moral-religious
    judgment without softening it into merely procedural wrongdoing.
