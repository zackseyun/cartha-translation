translation:
  text: 'And from the left: Phaladaios, Meisael, Melcheias, Lothasoubos, Nabareias,
    Zechariah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the left side.' The Greek phrase marks position within the assembly
      or group.
    reason: lexical_alternative
  - marker: b
    text: Several names here reflect the Greek form of 1 Esdras and may correspond
      to more familiar Hebrew forms in the approximate MT parallel, but the Greek
      witness is followed in the main text.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξ εὐωνύμων
  chosen: from the left
  alternatives:
  - on the left side
  - from the left hand side
  lexicon: LSJ
  rationale: The phrase literally denotes the left side. In this list context, it
    most naturally marks position within an arranged group. 'From the left' is concise
    and preserves the spatial sense without overexplaining.
- source_word: Φαλαδαῖος
  chosen: Phaladaios
  alternatives:
  - Phaladas
  - Faladias
  rationale: This is a proper name transliterated directly from the Greek form. Personal
    names are transliterated rather than translated.
- source_word: Μεισαήλ
  chosen: Meisael
  alternatives:
  - Mishael
  rationale: The Greek form is transliterated straightforwardly as Meisael. 'Mishael'
    would align more closely with a Hebrew form, but the project's source-text primacy
    favors reflecting the Greek witness in 1 Esdras while preserving the more familiar
    form as an alternative.
- source_word: Μελχείας
  chosen: Melcheias
  alternatives:
  - Melchias
  - Malchijah
  rationale: The Greek proper name is represented by a standard transliteration. A
    Hebrew-aligned form such as 'Malchijah' is possible via the parallel tradition,
    but the Greek remains primary.
- source_word: Λωθάσουβος
  chosen: Lothasoubos
  alternatives:
  - Lothasubus
  - Hashabiah
  rationale: The Greek name is difficult and reflects the 1 Esdras form. Because the
    MT parallel is only approximate and this verse is a list of names, the translation
    keeps the Greek transliteration rather than harmonizing to a Hebrew equivalent.
- source_word: Ναβαρείας
  chosen: Nabareias
  alternatives:
  - Nabarias
  - Azariah
  rationale: The Greek proper name is transliterated as given. A Hebrew-parallel identification
    with another familiar name is possible in broader context, but not certain enough
    to replace the Greek form in the main text.
- source_word: Ζαχαρίας
  chosen: Zechariah
  alternatives:
  - Zacharias
  rationale: This common biblical name is rendered in its standard English OT form,
    which is a conventional transliteration of the Greek/Hebrew name and more readable
    than 'Zacharias' in this context.
