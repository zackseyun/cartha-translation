translation:
  text: Go your way, then, eat rich foods and send portions to those who have nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'eat fat things.' The phrase refers to rich or choice
      foods for celebration.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in Nehemiah 8:10 reads more specifically, 'send portions
      to anyone for whom nothing is prepared.'
    reason: alternative_reading
lexical_decisions:
- source_word: βαδίσαντες
  chosen: Go your way
  alternatives:
  - go
  - depart
  - be on your way
  lexicon: LSJ
  rationale: The participle literally means 'having gone' or 'going,' but in this
    exhortational context it functions idiomatically as an imperative of departure/action.
    'Go your way' preserves the movement sense while sounding natural in English.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: LSJ
  rationale: Marks inference or continuation from the preceding exhortation. 'Then'
    is a natural connective in modern English and avoids over-formality.
- source_word: φάγετε
  chosen: eat
  alternatives:
  - eat up
  - partake
  lexicon: LSJ
  rationale: Straightforward imperative plural; no need for expansion beyond the source
    wording.
- source_word: λιπάσματα
  chosen: rich foods
  alternatives:
  - fat things
  - choice foods
  - delicacies
  lexicon: LSJ
  rationale: The noun denotes rich or fatty foods. 'Rich foods' communicates the sense
    clearly in modern English without the potentially misleadingly literal 'fat things.'
    The MT parallel מַשְׁמַנִּים supports the idea of rich/fat foods.
- source_word: ἀποστείλατε
  chosen: send
  alternatives:
  - dispatch
  - send out
  lexicon: LSJ
  rationale: Simple imperative; 'send' is the plain and sufficient rendering.
- source_word: ἀποστολάς
  chosen: portions
  alternatives:
  - gifts
  - servings
  - shares
  lexicon: LSJ
  rationale: In context this refers to portions sent to others, especially food portions
    for celebration. The MT parallel מָנוֹת strongly supports 'portions' rather than
    a more generic 'gifts.'
- source_word: τοῖς μὴ ἔχουσιν
  chosen: to those who have nothing
  alternatives:
  - to those who do not have
  - to those who have none
  - to those who have nothing prepared
  lexicon: LSJ
  rationale: The Greek literally says 'to those not having.' The MT parallel has 'to
    one for whom nothing is prepared,' which likely underlies the sense. Since the
    Greek witness is primary and is more concise, 'those who have nothing' best reflects
    the extant Greek while still conveying practical need.
