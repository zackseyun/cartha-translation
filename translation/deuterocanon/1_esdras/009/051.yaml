theological_decisions:
- issue: Use of the MT parallel to clarify the social sense of the Greek exhortation
  chosen_reading: The command concerns sharing celebratory food portions with needy
    people.
  alternative_readings:
  - The command could be read more minimally as sending unspecified items to those
    lacking something.
  rationale: The Greek alone says 'send portions to those not having,' while the Hebrew
    parallel clarifies the festive context and supports understanding the portions
    as food portions for those in need. This is not a major doctrinal crux, but it
    is a significant interpretive decision affecting translation clarity.
