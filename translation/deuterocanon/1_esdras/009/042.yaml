translation:
  text: And Ezra the priest and reader of the law stood on the wooden platform that
    had been constructed;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew parallel in Nehemiah 8:4 reads 'Ezra the scribe' and says the
      wooden structure was made 'for the matter' or 'for the occasion.' The Greek
      of 1 Esdras instead reads 'the priest and reader of the law' and simply says
      it had been constructed.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔστη
  chosen: stood
  alternatives:
  - took his stand
  - was standing
  lexicon: BDAG
  rationale: A straightforward narrative aorist of ἵστημι. 'Stood' is natural English
    and matches both the Greek and the MT parallel ויעמד.
- source_word: Ἔσρας
  chosen: Ezra
  rationale: Standard English transliteration of the personal name.
- source_word: ὁ ἱερεύς
  chosen: the priest
  lexicon: BDAG
  rationale: The Greek explicitly identifies Ezra as priest; this should be retained
    rather than harmonized away to the MT's 'scribe' alone.
- source_word: ἀναγνώστης τοῦ νόμου
  chosen: reader of the law
  alternatives:
  - scribe of the law
  - one who read the law
  lexicon: BDAG
  rationale: ἀναγνώστης is literally 'reader' or 'public reader.' Although the MT
    parallel has הַסֹּפֵר ('the scribe'), the Greek witness is primary here and specifically
    depicts Ezra in the act/role of reading the law. 'Reader of the law' preserves
    the Greek sense without importing the Hebrew wording into the main text.
- source_word: ἐπὶ τοῦ ξυλίνου βήματος
  chosen: on the wooden platform
  alternatives:
  - upon the wooden dais
  - on the wooden stand
  lexicon: BDAG
  rationale: βῆμα can denote a raised step, platform, or dais. Given the public-reading
    context and the MT parallel מגדל־עץ ('wooden tower/platform'), 'wooden platform'
    is clear modern English and fits both witnesses.
- source_word: τοῦ κατασκευασθέντος
  chosen: that had been constructed
  alternatives:
  - that had been made
  - prepared
  lexicon: BDAG
  rationale: The participle indicates prior preparation/construction. 'Constructed'
    fits the physical platform and reflects the completed action.
