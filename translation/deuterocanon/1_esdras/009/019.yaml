translation:
  text: 'From the sons of Jeshua son of Jozadak and his brothers: Maelas, Eleazar,
    Joribus, and Joadanus.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text here gives the names Maelas, Joribus, and Joadanus. In the
      approximate Hebrew parallel at Ezra 10:18, 20–21, the corresponding names differ,
      reflecting the freer relationship between 1 Esdras and the MT in these lists.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  chosen: From the sons of
  alternatives:
  - Among the sons of
  - Of the sons of
  lexicon: LSJ
  rationale: The phrase introduces a subgroup within a larger list. 'From the sons
    of' preserves the Greek preposition ἐκ and fits the list format better than a
    looser 'among.'
- source_word: Ἰησοῦ
  chosen: Jeshua
  alternatives:
  - Jesus
  - Joshua
  lexicon: LSJ
  rationale: In this Ezra/Esdras context, Ἰησοῦ regularly represents the postexilic
    priestly name Jeshua, corresponding to Hebrew/Aramaic ישוע, not the NT name-form
    'Jesus.' 'Joshua' is possible as an Anglicized equivalent but is less precise
    for this Second Temple figure.
- source_word: τοῦ Ἰωσεδὲκ
  chosen: son of Jozadak
  alternatives:
  - of Josedec
  - of Jehozadak
  lexicon: LSJ
  rationale: The genitive with the personal name identifies Jeshua by patronymic.
    'Jozadak' is a standard English transliteration aligned with the Hebrew parallel
    tradition; 'Josedec' is closer to the Greek form but less familiar in English
    Bible usage.
- source_word: τῶν ἀδελφῶν αὐτοῦ
  chosen: and his brothers
  alternatives:
  - and his brethren
  - and their brothers
  lexicon: LSJ
  rationale: The singular αὐτοῦ most naturally refers back to Jeshua, so 'his brothers'
    is the straightforward rendering. 'Brothers' follows the project's gender-accurate
    policy and suits the male priestly list.
- source_word: Μαεήλας
  chosen: Maelas
  alternatives:
  - Maelias
  - Maeelas
  lexicon: LSJ
  rationale: This is a transliteration of the Greek proper name as transmitted in
    Swete. Because the verse is a name list and the source validation flags a major
    mismatch with the MT parallel, the Greek form should be preserved rather than
    harmonized to a Hebrew name not present in the Greek text.
- source_word: Ἐλεάζαρος
  chosen: Eleazar
  alternatives:
  - Eleazaros
  lexicon: LSJ
  rationale: Standard English transliteration of the well-known biblical name.
- source_word: Ἰώριβος
  chosen: Joribus
  alternatives:
  - Joribos
  - Jarib
  lexicon: LSJ
  rationale: The Greek witness reads Ἰώριβος, so the main text preserves that form
    as 'Joribus.' The Hebrew parallel in Ezra 10 has Jarib in the corresponding list,
    but because 1 Esdras often reshapes names and order, harmonization should be avoided
    in the main text.
- source_word: Ἰωάδανος
  chosen: Joadanus
  alternatives:
  - Joadanos
  - Judah
  - Joadanus
  lexicon: LSJ
  rationale: The Greek proper name is rendered by direct transliteration. The MT parallel
    likely points to a different underlying name in Ezra 10, but the Greek form should
    stand in the translation, with the parallel noted in a footnote rather than imported
    into the text.
