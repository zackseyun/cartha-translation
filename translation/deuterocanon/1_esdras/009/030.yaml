translation:
  text: 'And from the sons of Mani: Olamus, Mamuchus, Jedaeus, Jasubus, and Asael
    and Jeremoth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Mani; the Hebrew parallel list in Ezra is commonly aligned with Bani.
    reason: alternative_reading
  - marker: b
    text: Several names here likely correspond to Hebrew forms known from the parallel
      list, but this translation follows the Greek forms of 1 Esdras as the primary
      source.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - Also
  lexicon: LSJ
  rationale: Standard connective introducing another group in the list; 'And' preserves
    the additive sequence of names.
- source_word: ἐκ τῶν υἱῶν
  chosen: from the sons of
  alternatives:
  - of the sons of
  - among the sons of
  lexicon: LSJ
  rationale: The phrase marks membership within a family/clan list. 'From the sons
    of' is idiomatic English that still reflects the Greek construction.
- source_word: Μανί
  chosen: Mani
  alternatives:
  - Bani
  - Maani
  rationale: Swete's Greek reads Μανί, so the main text follows the Greek witness
    and transliterates the proper name directly. The MT parallel in Ezra 10 likely
    corresponds to Bani, but the Greek source is primary for 1 Esdras; the Hebrew-aligned
    alternative is worth preserving in a footnote.
- source_word: Ὤλαμος
  chosen: Olamus
  alternatives:
  - Olamos
  rationale: Proper name transliterated from the Greek form rather than harmonized
    to a Hebrew equivalent not explicit in the source.
- source_word: Μάμουχος
  chosen: Mamuchus
  alternatives:
  - Mamouchos
  - Malluch
  rationale: Proper name transliterated from the Greek. 'Malluch' reflects likely
    Hebrew alignment, but the Greek form should govern the main text.
- source_word: Ἰεδαῖος
  chosen: Jedaeus
  alternatives:
  - Jedeus
  - Adaiah
  rationale: Transliteration of the Greek proper name. A Hebrew-parallel alignment
    such as 'Adaiah' is possible in the Ezra list tradition, but not explicit in this
    Greek wording.
- source_word: Ἰάσουβος
  chosen: Jasubus
  alternatives:
  - Jasoubus
  - Jashub
  rationale: Proper name rendered by transliteration from Greek. A shorter Hebraized
    form is possible by comparison with MT, but the Greek text supports this fuller
    form.
- source_word: Ἀσάηλος
  chosen: Asael
  alternatives:
  - Asaelos
  - Azael
  rationale: Standard transliteration of the Greek name into readable English form,
    dropping the Greek nominative ending.
- source_word: Ἰερεμώθ
  chosen: Jeremoth
  alternatives:
  - Jeremoth
  rationale: Direct transliteration of the Greek proper name.
