theological_decisions:
- issue: Rendering of masculine administrative language
  chosen_reading: men who were heads of their fathers’ houses
  alternative_readings:
  - leaders of their families
  - family heads
  rationale: The Greek uses explicitly masculine ἄνδρας and paternal kinship language.
    Per doctrine, the translation preserves the gendered wording rather than neutralizing
    it, since the verse concerns named male household representatives in a legal-genealogical
    process.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Calendar term νουμηνία
  chosen_reading: on the first day of the tenth month
  alternative_readings:
  - on the new moon of the tenth month
  rationale: The Greek term denotes the new-month day; in English biblical narrative,
    'first day of the month' is usually clearer than 'new moon' when no cultic emphasis
    is foregrounded. The more literal calendrical expression is preserved in a footnote
    for auditability.
  doctrine_reference: DOCTRINE.md §6 Readable modern English, not archaic or academic
