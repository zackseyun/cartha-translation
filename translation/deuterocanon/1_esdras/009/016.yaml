translation:
  text: And Ezra the priest selected for himself men, heads of their fathers’ houses,
    all of them designated by name, and they convened on the first day of the tenth
    month to examine the matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'on the new moon of the tenth month,' that is, on the first day
      of the month.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπελέξατο
  chosen: selected for himself
  alternatives:
  - chose
  - appointed
  lexicon: BDAG
  rationale: Middle voice suggests Ezra personally made the selection or had the men
    selected for his purpose; 'selected for himself' preserves that nuance better
    than a flat 'chose,' while remaining natural English.
- source_word: ἄνδρας ἡγουμένους
  chosen: men who were heads
  alternatives:
  - leading men
  - men, leaders
  lexicon: BDAG
  rationale: ἄνδρας is explicitly masculine and should be preserved as 'men' per gender-accurate
    policy. ἡγουμένους here denotes those in leadership over family groups; 'heads'
    fits the administrative/genealogical context better than the more generic 'leaders'.
- source_word: τῶν πατριῶν αὐτῶν
  chosen: of their fathers’ houses
  alternatives:
  - of their ancestral families
  - of their clans
  lexicon: LSJ
  rationale: πατριά in this context refers to paternal family divisions or households.
    'Fathers’ houses' preserves the kinship structure more transparently than the
    smoother but less specific 'clans.'
- source_word: πάντας κατ’ ὄνομα
  chosen: all of them designated by name
  alternatives:
  - all by name
  - each one by name
  lexicon: BDAG
  rationale: The phrase indicates explicit naming/registration of the selected men.
    'Designated by name' captures the formal administrative sense better than the
    bare idiom 'by name.'
- source_word: συνεκλείσθησαν
  chosen: they convened
  alternatives:
  - they assembled
  - they were shut in together
  - they met
  lexicon: LSJ
  rationale: The verb literally can suggest being enclosed or gathered together, but
    in this procedural context the sense is that they came together for deliberation.
    'Convened' conveys a formal meeting without importing an implausibly literal image
    of confinement.
- source_word: τῇ νουμηνίᾳ
  chosen: on the first day
  alternatives:
  - at the new moon
  - on the new moon day
  lexicon: LSJ
  rationale: νουμηνία is the new moon/new-month day. Since the following phrase already
    specifies 'of the tenth month,' 'on the first day' communicates the calendrical
    force in idiomatic English while preserving the temporal reference. The more literal
    'new moon' is preserved in a footnote.
- source_word: ἐτάσαι
  chosen: to examine
  alternatives:
  - to investigate
  - to inquire into
  lexicon: BDAG
  rationale: 'The infinitive expresses the purpose of the meeting: formal review of
    the case. ''Examine'' is concise and suitably judicial/administrative.'
- source_word: τὸ πρᾶγμα
  chosen: the matter
  alternatives:
  - the case
  - the affair
  lexicon: BDAG
  rationale: A broad term for the issue under investigation. 'The matter' is natural
    and leaves the object appropriately general, matching the Greek.
