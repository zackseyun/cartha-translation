translation:
  text: Men, are not women strong? Great is the earth, and high is the heaven, and
    swift in its course is the sun, because it turns in the circuit of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for it revolves in the circle of heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες
  chosen: Men
  alternatives:
  - Gentlemen
  - Men!
  lexicon: LSJ
  rationale: Vocative plural address to the audience. 'Men' preserves the direct masculine
    address and rhetorical force better than a more idiomatic but less literal 'Gentlemen.'
- source_word: οὐκ ἰσχυραὶ αἱ γυναῖκες
  chosen: are not women strong?
  alternatives:
  - are not the women strong?
  - are not women powerful?
  lexicon: LSJ
  rationale: The clause is best taken as a rhetorical question in context, despite
    lacking an explicit question mark in ancient Greek punctuation. ἰσχυραί denotes
    strength/power; 'strong' is the more basic and natural rendering here. The article
    with γυναῖκες is rendered generically in English as 'women' rather than 'the women.'
- source_word: μεγάλη ἡ γῆ
  chosen: Great is the earth
  alternatives:
  - The earth is great
  lexicon: LSJ
  rationale: Predicate-first order is retained for rhetorical elevation and parallelism
    with the following clauses.
- source_word: ὑψηλὸς ὁ οὐρανός
  chosen: high is the heaven
  alternatives:
  - the heaven is high
  - high is the sky
  lexicon: LSJ
  rationale: οὐρανός can mean 'sky' or 'heaven.' In this elevated cosmological sequence,
    'heaven' better matches the register and the following phrase 'circuit of heaven.'
    The predicate-first order is preserved.
- source_word: ταχὺς τῷ δρόμῳ ὁ ἥλιος
  chosen: swift in its course is the sun
  alternatives:
  - the sun is swift in its course
  - swift in the race is the sun
  lexicon: LSJ
  rationale: δρόμος here refers to course/run rather than a literal race. 'Swift in
    its course' conveys the idiom naturally while preserving the image of motion.
    Predicate-first order is again retained.
- source_word: ὅτι στρέφεται
  chosen: because it turns
  alternatives:
  - for it turns
  - because it revolves
  lexicon: LSJ
  rationale: ὅτι gives the reason for the sun's swiftness. 'Because' makes the causal
    relation explicit. στρέφεται is rendered 'turns' as the simpler, more direct equivalent;
    'revolves' is possible but slightly more interpretive.
- source_word: ἐν τῷ κύκλῳ τοῦ οὐρανοῦ
  chosen: in the circuit of heaven
  alternatives:
  - in the circle of heaven
  - in the vault of heaven
  lexicon: LSJ
  rationale: κύκλος denotes a circle or circuit. 'Circuit' fits the astronomical sense
    of the sun's path without over-specifying ancient cosmology. 'Heaven' is kept
    consistent with οὐρανός earlier in the verse.
