translation:
  text: O men, how are women not strong, since they do such things?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'how can women not be strong, since they act this way?' The Greek rhetorical
      question can be expressed with slightly different English idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ ἄνδρες
  chosen: O men
  alternatives:
  - Men
  - Gentlemen
  lexicon: LSJ
  rationale: Vocative plural with direct address. 'O men' preserves the rhetorical
    exclamation and the gender-specific address better than a flatter 'Men.'
- source_word: πῶς οὐκ
  chosen: how are ... not
  alternatives:
  - how can ... not be
  - why are ... not
  lexicon: LSJ
  rationale: The phrase introduces a rhetorical question expressing astonishment.
    'How are women not strong' keeps the interrogative force and the negation without
    over-interpreting as impossibility.
- source_word: ἰσχυραὶ
  chosen: strong
  alternatives:
  - powerful
  - mighty
  lexicon: LSJ
  rationale: '''Strong'' is the most direct and natural rendering here. ''Powerful''
    is possible, but ''strong'' better matches the comparative argument in the surrounding
    context about relative strength.'
- source_word: αἱ γυναῖκες
  chosen: women
  alternatives:
  - wives
  lexicon: LSJ
  rationale: Although γυνή can mean 'wife' in some contexts, the plural here is generic
    and refers broadly to women, not specifically married women.
- source_word: ὅτι
  chosen: since
  alternatives:
  - because
  - that
  lexicon: LSJ
  rationale: Here ὅτι introduces the reason supporting the rhetorical claim. 'Since'
    reads smoothly in English while preserving causal force.
- source_word: οὕτως πράσσουσιν
  chosen: they do such things
  alternatives:
  - they act this way
  - they accomplish these things
  lexicon: LSJ
  rationale: πράσσω here refers to what women are shown to do in the argument. 'They
    do such things' preserves the broad verbal sense and points back to the preceding
    examples without narrowing the meaning.
