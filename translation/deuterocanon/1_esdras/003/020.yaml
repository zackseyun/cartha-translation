id: 1ES.3.20
reference: 1 Esdras 3:20
source:
  edition: lxx-swete-1909
  text: καὶ πάσας καρδίας ποιεῖ πλουσίας, καὶ οὐ μέμνηται βασιλέα οὐδὲ σατράπην· καὶ
    πάντα διὰ ταλάντων ποιεῖ λαλεῖν.
