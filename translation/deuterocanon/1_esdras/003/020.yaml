translation:
  text: and it makes every heart rich, and it remembers neither king nor satrap; and
    it makes everything speak in terms of talents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'it makes everyone talk about money.' The Greek says
      literally 'it makes all/everything speak through talents,' with 'talents' referring
      to monetary units.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάσας καρδίας
  chosen: every heart
  alternatives:
  - all hearts
  lexicon: LSJ
  rationale: The distributive singular in English preserves the Greek sense naturally
    while keeping the anthropological metaphor of καρδία as the inner person rather
    than reducing it to emotion alone.
- source_word: ποιεῖ πλουσίας
  chosen: makes ... rich
  alternatives:
  - enriches
  - makes prosperous
  lexicon: LSJ
  rationale: A fairly literal rendering fits the simple Greek construction. 'Rich'
    preserves the economic imagery that suits the surrounding reference to money.
- source_word: οὐ μέμνηται
  chosen: remembers neither
  alternatives:
  - takes no thought of
  - pays no regard to
  lexicon: LSJ
  rationale: The verb literally means 'remembers' or 'has in mind.' In context it
    conveys disregard, but 'remembers neither' keeps closer to the Greek while remaining
    intelligible.
- source_word: βασιλέα οὐδὲ σατράπην
  chosen: king nor satrap
  alternatives:
  - king nor governor
  lexicon: LSJ
  rationale: σατράπης is specifically 'satrap,' a Persian administrative title. Translating
    rather than generalizing preserves the historical color of the term.
- source_word: πάντα
  chosen: everyone
  alternatives:
  - all things
  - everything
  lexicon: LSJ
  rationale: 'Although πάντα is formally neuter plural, the following infinitive ''to
    speak'' points to persons as the practical sense: money causes all people to speak
    in a certain way. English ''everyone'' best captures the idiom.'
- source_word: διὰ ταλάντων
  chosen: in terms of talents
  alternatives:
  - about talents
  - for money
  - by means of sums of money
  lexicon: LSJ
  rationale: τάλαντον is literally a 'talent,' a unit of weight and money. Because
    the verse is speaking about the power of wine or wealth to affect speech, the
    phrase likely means speaking with reference to money. 'In terms of talents' preserves
    the literal term while conveying the monetary frame.
- source_word: λαλεῖν
  chosen: speak
  alternatives:
  - talk
  - utter
  lexicon: LSJ
  rationale: A straightforward rendering is sufficient; no special nuance requires
    expansion.
