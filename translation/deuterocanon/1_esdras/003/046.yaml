id: 1ES.3.46
reference: 1 Esdras 3:46
source:
  edition: lxx-swete-1909
  text: καὶ λαμβάνει ἄνθρωπος τὴν ῥομφαίαν αὐτοῦ καὶ ἐκπορεύεται ἐξοδεύειν καὶ λῃστεύειν
    καὶ κλέπτειν, καὶ εἰς τὴν θάλασσαν πλεῖν καὶ ποταμούς,
  language: Greek
