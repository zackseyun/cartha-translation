translation:
  text: And a man takes his sword and goes out to campaign and to plunder and to steal,
    and to sail on the sea and rivers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to march out,' 'to make an expedition,' or more broadly 'to wage war'
      for the Greek ἐξοδεύειν.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαμβάνει
  chosen: takes
  alternatives:
  - receives
  - grasps
  lexicon: LSJ
  rationale: 'The common narrative sense is straightforward possession/action: ''takes.''
    ''Grasps'' is too vivid, and ''receives'' does not fit the context.'
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: LSJ
  rationale: The Greek is singular and masculine. Per gender-accurate philosophy,
    'a man' preserves the representative masculine form used in this rhetorical context.
- source_word: ῥομφαίαν
  chosen: sword
  alternatives:
  - large sword
  - blade
  lexicon: LSJ
  rationale: ῥομφαία can denote a large sword or saber, but in idiomatic English 'sword'
    is the clearest natural rendering here without over-specifying weapon type.
- source_word: ἐκπορεύεται
  chosen: goes out
  alternatives:
  - sets out
  - goes forth
  lexicon: LSJ
  rationale: The verb literally means to go out/forth. 'Goes out' preserves the concrete
    movement and works well with the following infinitives.
- source_word: ἐξοδεύειν
  chosen: to go on campaigns
  alternatives:
  - to march out
  - to make an expedition
  - to wage war
  lexicon: LSJ
  rationale: The infinitive likely carries the sense of going on an expedition or
    campaign. 'To wage war' is possible but stronger than the wording itself; 'to
    go on campaigns' preserves the movement/expedition nuance.
- source_word: λῃστεύειν
  chosen: to plunder
  alternatives:
  - to rob
  - to raid
  lexicon: LSJ
  rationale: The verb denotes acting as a robber/bandit. In this military-travel sequence,
    'to plunder' fits the context of violent seizure better than the more general
    'to rob.'
- source_word: κλέπτειν
  chosen: to steal
  alternatives:
  - to pilfer
  - to take secretly
  lexicon: LSJ
  rationale: This is the standard sense of the verb and contrasts naturally with λῃστεύειν.
- source_word: εἰς τὴν θάλασσαν πλεῖν
  chosen: to sail on the sea
  alternatives:
  - to sail into the sea
  - to go to sea
  lexicon: LSJ
  rationale: Although εἰς can be literally 'into,' idiomatic English with πλεῖν is
    'to sail on the sea' or 'go to sea.' The chosen rendering is clear and close to
    the Greek.
- source_word: ποταμούς
  chosen: rivers
  alternatives:
  - the rivers
  - riverways
  lexicon: LSJ
  rationale: Simple plural object coordinated with 'sea'; English omits the article
    naturally.
