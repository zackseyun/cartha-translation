id: 1ES.3.42
reference: 1 Esdras 3:42
source:
  edition: lxx-swete-1909
  text: καὶ ταῦτα πάντα ἀφέντες εἰς αὐτὴν κέχηναν, καὶ χάσκοντες τὸ στόμα θεωροῦσιν
    αὐτήν, καὶ πάντες αὐτὴν αἱρετίζουσιν μᾶλλον ἢ τὸ χρυσίον καὶ τὸ ἀργύριον καὶ πᾶν
    πρᾶγμα ὡραῖον.
