translation:
  text: And leaving all these things behind, they gape at her; with mouths hanging
    open they stare at her, and all choose her rather than gold and silver and every
    beautiful thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all prefer her to gold and silver and every beautiful thing.' The Greek
      verb can carry the sense of choosing with implied preference in this comparative
      construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφέντες
  chosen: leaving ... behind
  alternatives:
  - having left
  - forsaking
  lexicon: BDAG
  rationale: Aorist participle of ἀφίημι here means to leave aside or abandon. 'Leaving
    ... behind' conveys the sense idiomatically in English while preserving the participial
    force tied to the following actions.
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all this
  - all these
  lexicon: BDAG
  rationale: The neuter plural naturally refers back to the previously mentioned valuables
    or concerns. 'All these things' is the most transparent rendering.
- source_word: εἰς αὐτὴν κέχηναν
  chosen: they gape at her
  alternatives:
  - they stand agape toward her
  - they are open-mouthed toward her
  lexicon: LSJ
  rationale: κέχηναν (from χασκάνω/χαίνω family) denotes gaping or standing open-mouthed.
    With εἰς αὐτήν, the sense is directed toward the woman. 'They gape at her' is
    concise and natural.
- source_word: χάσκοντες τὸ στόμα
  chosen: with mouths hanging open
  alternatives:
  - gaping with the mouth
  - their mouths agape
  lexicon: LSJ
  rationale: This participial phrase intensifies the previous verb with vivid bodily
    imagery. 'With mouths hanging open' preserves the image in readable modern English
    without flattening the repetition.
- source_word: θεωροῦσιν
  chosen: they stare at her
  alternatives:
  - they look at her
  - they behold her
  lexicon: BDAG
  rationale: θεωρέω can mean observe, look at, behold. In this context of captivated
    fixation, 'stare at her' best matches the force.
- source_word: αἱρετίζουσιν
  chosen: choose
  alternatives:
  - prefer
  - select
  lexicon: LSJ
  rationale: The verb here conveys choosing or preferring. Because μᾶλλον ἢ already
    supplies the comparative idea ('rather than'), 'choose' avoids redundancy while
    preserving the syntax.
- source_word: μᾶλλον ἢ
  chosen: rather than
  alternatives:
  - more than
  - instead of
  lexicon: BDAG
  rationale: Standard comparative construction; 'rather than' is the clearest English
    equivalent in this context of preference.
- source_word: πᾶν πρᾶγμα ὡραῖον
  chosen: every beautiful thing
  alternatives:
  - every fair thing
  - everything lovely
  - every splendid possession
  lexicon: BDAG
  rationale: πρᾶγμα is broad ('thing, matter, possession'), and ὡραῖον means beautiful/fine.
    'Every beautiful thing' keeps the breadth of the Greek and matches the list of
    desirable objects.
