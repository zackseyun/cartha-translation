translation:
  text: O men, do not men prevail, since they rule over the earth and the sea and
    everything in them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'do not men prevail, ruling over the earth and the sea
      and all things in them?' The Greek uses a rhetorical question expecting the
      answer yes.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ ἄνδρες
  chosen: O men
  alternatives:
  - Men
  - Gentlemen
  lexicon: LSJ
  rationale: Vocative plural with direct address. 'O men' preserves the rhetorical
    force and masculine form of ἄνδρες in keeping with the project's gender-accurate
    policy.
- source_word: οὐχ ὑπερισχύουσιν
  chosen: do not ... prevail
  alternatives:
  - are not stronger
  - do not overpower
  lexicon: LSJ
  rationale: 'The interrogative οὐχ expects an affirmative answer in context: ''do
    they not prevail?'' English can preserve this with ''do not ... prevail'' in rhetorical-question
    form. ''Prevail'' fits ὑπερισχύω well without over-specifying physical force.'
- source_word: οἱ ἄνθρωποι
  chosen: men
  alternatives:
  - human beings
  - people
  lexicon: LSJ
  rationale: Here ἄνθρωποι refers to humanity in general, but within a rhetorical
    contrast framed by Ὦ ἄνδρες. 'Men' preserves the source's masculine/generic diction
    and the compact style of the argument; 'people' would be smoother but less textually
    transparent.
- source_word: κατακρατοῦντες
  chosen: since they rule over
  alternatives:
  - holding sway over
  - mastering
  - controlling
  lexicon: LSJ
  rationale: The participle explains the basis for the claim that men prevail. 'Rule
    over' communicates exercised dominion over earth and sea in natural English; 'control'
    is possible but can sound mechanistic.
- source_word: τὴν γῆν καὶ τὴν θάλασσαν
  chosen: the earth and the sea
  alternatives:
  - the land and the sea
  lexicon: LSJ
  rationale: γῆ can mean 'earth' or 'land.' In this broad merism paired with sea,
    'earth' better conveys the world-domain under discussion.
- source_word: πάντα τὰ ἐν αὐτοῖς
  chosen: everything in them
  alternatives:
  - all that is in them
  - everything that is in them
  lexicon: LSJ
  rationale: The phrase refers comprehensively to all things contained in earth and
    sea. 'Everything in them' is concise and natural while preserving the totalizing
    sense of πάντα.
