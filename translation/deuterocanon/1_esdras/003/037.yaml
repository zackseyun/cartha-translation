id: 1ES.3.37
reference: 1 Esdras 3:37
source:
  edition: lxx-swete-1909
  text: Ἄνδρες, οὐ μέγας ὁ βασιλεύς, καὶ πολλοὶ οἱ ἄνθρωποι, καὶ ὁ οἶνος ἰσχύει; τίς
    οὖν ὁ δεσπόζων αὐτῶν, ἢ τίς ὁ κυριεύων; οὐχ αἱ γυναῖκες;
  language: Greek
