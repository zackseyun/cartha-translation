theological_decisions:
- issue: Gendered language in the rhetorical contrast
  chosen_reading: Retain 'men' and 'women' rather than neutralizing to 'people' and
    'women.'
  alternative_readings:
  - Retain 'people' for ἄνθρωποι while keeping 'women' for γυναῖκες
  rationale: The verse's argument explicitly contrasts male and female categories
    in a rhetorical contest about power. Neutralizing ἄνθρωποι to 'people' would blur
    that contrast and weaken the logic of the speech. This follows the project's gender-accurate
    principle.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering the paired participles δεσπόζων / κυριεύων
  chosen_reading: Differentiate them as 'rules over' and 'masters.'
  alternative_readings:
  - Translate both as 'rules'
  - Translate as 'lord over' and 'rule over'
  rationale: The Greek uses two near-synonymous participles for rhetorical emphasis.
    Differentiating them slightly in English preserves the parallelism without forcing
    a doctrinal distinction between the terms.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
