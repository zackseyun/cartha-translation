translation:
  text: and to all the satraps and generals and governors under him, from India to
    Ethiopia, in the one hundred twenty-seven satrapies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout the one hundred twenty-seven provinces.' The Greek uses a
      Persian administrative term, rendered here consistently as 'satrapies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σατράπαις
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: LSJ
  rationale: A Persian administrative title; transliteration preserves the specific
    imperial office better than a generic term.
- source_word: στρατηγοῖς
  chosen: generals
  alternatives:
  - commanders
  - governors
  lexicon: LSJ
  rationale: The term commonly denotes military leaders; 'generals' is the most natural
    modern equivalent here.
- source_word: τοπάρχαις
  chosen: governors
  alternatives:
  - district rulers
  - toparchs
  lexicon: LSJ
  rationale: Refers to rulers of local districts. 'Governors' communicates the administrative
    role in readable English; 'toparchs' would be overly opaque.
- source_word: τοῖς ὑπʼ αὐτὸν
  chosen: under him
  alternatives:
  - subject to him
  - under his authority
  lexicon: LSJ
  rationale: The phrase indicates subordination to the king's rule. 'Under him' is
    concise and faithful.
- source_word: ἀπὸ τῆς Ἰνδικῆς μέχρι Αἰθιοπίας
  chosen: from India to Ethiopia
  alternatives:
  - from India as far as Ethiopia
  lexicon: LSJ
  rationale: A standard geographical range formula. 'From India to Ethiopia' is idiomatic
    English and preserves the extent of the empire.
- source_word: ἐν ταῖς ἑκατὸν εἴκοσι ἑπτὰ σατραπείαις
  chosen: in the one hundred twenty-seven satrapies
  alternatives:
  - throughout the one hundred twenty-seven provinces
  lexicon: LSJ
  rationale: σατραπεία is the jurisdiction of a satrap. 'Satrapies' keeps the Persian
    administrative coloring and matches 'satraps' earlier in the verse.
