translation:
  text: And then the king and the nobles looked at one another, and he began to speak
    about the truth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μεγιστᾶνες
  chosen: nobles
  alternatives:
  - great men
  - magnates
  - princes
  lexicon: LSJ
  rationale: The term denotes high-ranking court officials or grandees. 'Nobles' is
    natural modern English and fits the royal-court setting better than the less idiomatic
    'magnates' or the potentially too specific 'princes'.
- source_word: ἔβλεπον εἰς τὸν ἕτερον
  chosen: looked at one another
  alternatives:
  - looked to each other
  - looked at the other
  lexicon: LSJ
  rationale: Although literally 'were looking to the other,' the plural subject with
    reciprocal sense is best rendered idiomatically as 'looked at one another.' This
    captures the exchanged glances implied by the Greek.
- source_word: ἤρξατο λαλεῖν
  chosen: began to speak
  alternatives:
  - began speaking
  - started to speak
  lexicon: BDAG
  rationale: A standard ingressive construction. 'Began to speak' preserves the narrative
    onset clearly and naturally.
- source_word: ἀλήθεια
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: The article is present in Greek (τῆς ἀληθείας), and in this context it
    points to the subject under discussion in the contest, so 'the truth' is preferable
    to the more abstract bare noun 'truth'.
