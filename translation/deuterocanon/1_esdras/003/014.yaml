translation:
  text: And he sent and summoned all the nobles of Persia and Media, and the satraps
    and generals and local rulers and governors,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'having sent out, he called.' The Greek participle likely
      implies that he sent out messengers or orders before the summons.
    reason: lexical_alternative
  - marker: b
    text: The sequence of official titles reflects Persian imperial administration;
      some terms can be rendered more literally as 'toparchs' and 'chief officials.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐξαποστείλας
  chosen: he sent
  alternatives:
  - having sent out
  - sending out
  lexicon: LSJ
  rationale: Aorist participle of ἐξαποστέλλω, here functioning adverbially before
    the main verb ἐκάλεσεν. In context it likely means sending out messengers or orders
    before summoning the officials. English 'he sent and summoned' preserves the sequence
    naturally without over-specifying the object.
- source_word: ἐκάλεσεν
  chosen: summoned
  alternatives:
  - called
  - invited
  lexicon: LSJ
  rationale: '''Summoned'' better fits a royal command to officials than the more
    neutral ''called'' or the too-weak ''invited''.'
- source_word: μεγιστᾶνας
  chosen: nobles
  alternatives:
  - magnates
  - great men
  - highest officials
  lexicon: LSJ
  rationale: Refers to leading men of the realm. 'Nobles' is idiomatic modern English
    and preserves the sense of elite rank without the awkwardness of 'magnates'.
- source_word: Περσίδος
  chosen: Persia
  alternatives:
  - the Persian land
  lexicon: LSJ
  rationale: Standard geographical rendering.
- source_word: Μηδείας
  chosen: Media
  lexicon: LSJ
  rationale: Standard rendering of the region name.
- source_word: σατράπας
  chosen: satraps
  alternatives:
  - provincial governors
  lexicon: LSJ
  rationale: This is a specific Persian administrative title, so a transliterated
    historical term is preferable to a flattened paraphrase.
- source_word: στρατηγοὺς
  chosen: generals
  alternatives:
  - commanders
  - military governors
  lexicon: LSJ
  rationale: The term commonly denotes military leaders. 'Generals' is the clearest
    concise rendering here.
- source_word: τοπάρχας
  chosen: local rulers
  alternatives:
  - district rulers
  - toparchs
  lexicon: LSJ
  rationale: A toparch rules a local district. 'Local rulers' communicates the function
    in readable English better than the less familiar transliteration 'toparchs'.
- source_word: ὑπάτους
  chosen: governors
  alternatives:
  - consuls
  - chief officials
  lexicon: LSJ
  rationale: Although ὕπατος can in some contexts mean 'consul' or 'supreme,' in this
    list of imperial officials 'governors' best conveys a high civil office without
    importing specifically Roman institutions too strongly into a Persian setting.
