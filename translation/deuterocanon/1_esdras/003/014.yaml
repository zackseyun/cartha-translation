  text: καὶ ἐξαποστείλας ἐκάλεσεν πάντας τοὺς μεγιστᾶνας τῆς Περσίδος καὶ τῆς Μηδείας
    καὶ σατράπας καὶ στρατηγοὺς καὶ τοπάρχας καὶ ὑπάτους,
