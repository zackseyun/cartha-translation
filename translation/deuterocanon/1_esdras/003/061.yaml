  validation: no_reference
translation:
  text: Wine is unjust, the king is unjust, women are unjust, all the sons of men
    are unjust, and all their works are unjust—all such things. And there is no truth
    in them, and in their injustice they will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all these things' / 'everything of this sort' for 'all such things.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the sons of men' is a literal rendering of a Greek idiom for
      humankind.
    reason: cultural_note
lexical_decisions:
- source_word: ἄδικος / ἄδικοι / ἄδικα
  chosen: unjust
  alternatives:
  - unrighteous
  - wicked
  lexicon: BDAG
  rationale: The repeated adjective governs persons and works throughout the verse.
    'Unjust' preserves the lexical link to ἀδικία later in the verse and avoids importing
    a more overtly moralized sense like 'wicked' where the text emphasizes lack of
    rightness/justice.
- source_word: οἶνος
  chosen: wine
  lexicon: BDAG
  rationale: Straightforward lexical rendering for the beverage personified in the
    argument.
- source_word: βασιλεύς
  chosen: the king
  alternatives:
  - a king
  lexicon: BDAG
  rationale: The article is present, and in context the saying speaks generically
    through a definite singular representative figure; 'the king' best matches the
    Greek form.
- source_word: γυναῖκες
  chosen: women
  alternatives:
  - wives
  lexicon: BDAG
  rationale: The plural noun lacks contextual markers limiting it to married women,
    so the broader 'women' is preferred.
- source_word: υἱοὶ τῶν ἀνθρώπων
  chosen: the sons of men
  alternatives:
  - human beings
  - the children of men
  lexicon: BDAG
  rationale: This preserves the gendered and idiomatic force of the Greek expression
    in line with the project's gender-accurate policy. 'Human beings' would flatten
    the source imagery; 'children of men' is possible but less direct.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: '''Works'' is a natural and sufficiently broad rendering here, covering
    what people do or produce.'
- source_word: τὰ τοιαῦτα
  chosen: all such things
  alternatives:
  - all these things
  - everything of this sort
  lexicon: BDAG
  rationale: The phrase sums up the preceding items. 'All such things' reflects the
    qualitative force of τοιαῦτα better than a purely deictic 'these things.'
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - truthfulness
  lexicon: BDAG
  rationale: A direct rendering that fits the contrast with injustice and falsehood
    in the argument.
- source_word: ἀδικίᾳ
  chosen: injustice
  alternatives:
  - unrighteousness
  - wrongdoing
  lexicon: BDAG
  rationale: Using 'injustice' maintains the wordplay and conceptual continuity with
    ἄδικος earlier in the verse.
- source_word: ἀπολοῦνται
  chosen: they will perish
  alternatives:
  - they will be destroyed
  lexicon: BDAG
  rationale: Future middle/passive form naturally yields 'they will perish.' This
    keeps the statement concise and does not over-specify an external agent.
