id: 1ES.3.61
reference: 1 Esdras 3:61
source:
  edition: lxx-swete-1909
  text: ἄδικος ὁ οἶνος, ἄδικος ὁ βασιλεύς, ἄδικοι αἱ γυναῖκες, ἄδικοι πάντες οἱ υἱοὶ
    τῶν ἀνθρώπων καὶ ἄδικα πάντα τὰ ἔργα αὐτῶν, πάντα τὰ τοιαῦτα· καὶ οὐκ ἔστιν ἐν
    αὐτοῖς ἀλήθεια, καὶ ἐν τῇ ἀδικίᾳ αὐτῶν ἀπολοῦνται.
  language: Greek
