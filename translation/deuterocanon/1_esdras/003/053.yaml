translation:
  text: and she would take the crown from the king’s head and put it on herself, and
    she would strike the king with her left hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the diadem' instead of 'the crown.'
    reason: lexical_alternative
  - marker: b
    text: The Greek verb can specifically suggest a slap or blow with the hand; 'would
      strike' is chosen as the broader English rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφαιροῦσαν
  chosen: would take ... from
  alternatives:
  - taking ... from
  - remove ... from
  lexicon: LSJ
  rationale: The participle describes repeated or characteristic action in the larger
    depiction of what a woman does with the king; 'would take ... from' captures the
    imperfective/descriptive force more naturally in English than a bare participle.
- source_word: τὸ διάδημα
  chosen: the crown
  alternatives:
  - the diadem
  - the royal headband
  lexicon: LSJ
  rationale: διάδημα denotes the royal crown/diadem. 'Crown' is the clearest modern
    English equivalent; 'diadem' is more formal but less accessible.
- source_word: ἐπιτιθοῦσαν αὐτῇ
  chosen: put it on herself
  alternatives:
  - place it on her
  - put it on her own head
  lexicon: LSJ
  rationale: The dative pronoun αὐτῇ refers to the woman herself. English idiom prefers
    'put it on herself.' 'On her own head' is interpretive but likely implied; the
    simpler reflexive wording stays closer to the Greek.
- source_word: ἐράπιζεν
  chosen: would strike
  alternatives:
  - slap
  - smite
  - beat
  lexicon: LSJ
  rationale: ῥαπίζω commonly refers to striking with the hand, often a slap. 'Would
    strike' preserves the action without over-specifying the exact manner; 'slap'
    is possible but slightly narrower and more colloquial.
- source_word: τῇ ἀριστερᾷ
  chosen: with her left hand
  alternatives:
  - with the left hand
  - with her left
  lexicon: LSJ
  rationale: The feminine dative likely implies the hand/instrument and in context
    refers to the woman's left hand. Supplying 'hand' makes the English natural and
    reflects the instrumental sense.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - both ... and
  - while also
  lexicon: LSJ
  rationale: The repeated καὶ coordinates the sequence straightforwardly. Simple 'and'
    best reflects the Greek flow.
