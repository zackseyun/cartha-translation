id: 1ES.3.53
reference: 1 Esdras 3:53
source:
  edition: lxx-swete-1909
  text: καὶ ἀφαιροῦσαν τὸ διάδημα ἀπὸ τῆς κεφαλῆς τοῦ βασιλέως καὶ ἐπιτιθοῦσαν αὐτῇ·
    καὶ ἐράπιζεν τὸν βασιλέα τῇ ἀριστερᾷ.
  language: Greek
