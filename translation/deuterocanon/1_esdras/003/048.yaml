translation:
  text: And a man loves his own wife more than his father and mother.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πλεῖον
  chosen: more
  alternatives:
  - to a greater degree
  - more greatly
  lexicon: LSJ
  rationale: Comparative adverb/adjective indicating greater degree. In idiomatic
    English with ἀγαπᾷ, 'loves ... more than' is the most natural equivalent.
- source_word: ἀγαπᾷ
  chosen: loves
  alternatives:
  - has love for
  - cherishes
  lexicon: BDAG
  rationale: Standard rendering of ἀγαπάω. 'Loves' preserves the straightforward lexical
    sense without paraphrase.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The singular generic noun can denote a human being generally, but the
    surrounding rhetoric in this passage speaks in gendered terms about a man and
    his wife. Per the project's gender-accurate policy, 'a man' best matches the source's
    intent here.
- source_word: τὴν ἰδίαν γυναῖκα
  chosen: his own wife
  alternatives:
  - his wife
  - his own woman
  lexicon: BDAG
  rationale: γυνή here clearly means 'wife' in contrast with father and mother, and
    ἰδίαν adds the possessive/emphatic nuance 'his own.' Retaining 'own' preserves
    the Greek emphasis.
- source_word: μᾶλλον ἢ
  chosen: more than
  alternatives:
  - rather than
  lexicon: BDAG
  rationale: This comparative construction marks degree, not exclusive preference.
    'More than' is the clearest English equivalent.
- source_word: τὸν πατέρα καὶ τὴν μητέρα
  chosen: his father and mother
  alternatives:
  - father and mother
  - his parents
  lexicon: BDAG
  rationale: The Greek has the singular nouns 'the father and the mother.' English
    idiom naturally supplies 'his' from the context. 'Parents' would be smoother but
    less formally aligned to the explicit pair in Greek.
