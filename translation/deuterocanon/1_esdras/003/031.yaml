id: 1ES.3.31
reference: 1 Esdras 3:31
source:
  edition: lxx-swete-1909
  text: εἶπε πατάξαι, τύπτουσιν· εἶπεν ἐρημῶσαι, ἐρημοῦσιν· εἶπεν οἰκοδομῆσαι, οἰκοδομοῦσιν·
