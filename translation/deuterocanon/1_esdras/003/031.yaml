theological_decisions:
- issue: Degree of royal authority implied by repeated εἶπε + infinitive
  chosen_reading: Render literally as 'he said ... and they ...' rather than heightening
    to 'he commanded ... and they obeyed.'
  alternative_readings:
  - he commanded ... and they do it
  - at his word they strike/lay waste/build
  rationale: The verse emphasizes the efficacy of the speaker's word through repetition.
    A more explicit authority gloss is interpretively valid but goes beyond the wording.
    The literal rendering preserves the rhetorical force without importing additional
    nuance.
  doctrine_reference: Translation philosophy §1, §6
