translation:
  text: He said to strike, and they strike; he said to lay waste, and they lay waste;
    he said to build, and they build.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἶπε
  chosen: he said
  alternatives:
  - he spoke
  - he commanded
  lexicon: LSJ
  rationale: Aorist of λέγω, introducing each royal directive. 'He said' is the plain
    sense and preserves the repetitive, paratactic style; the imperative force is
    carried by the following infinitives and responses rather than by expanding to
    'he commanded' in every clause.
- source_word: πατάξαι
  chosen: to strike
  alternatives:
  - to smite
  - to attack
  lexicon: LSJ
  rationale: Aorist infinitive after εἶπε expressing the commanded action. 'Strike'
    is clear modern English and broad enough to cover violent action without over-specifying
    the target.
- source_word: τύπτουσιν
  chosen: they strike
  alternatives:
  - they beat
  - they smite
  lexicon: LSJ
  rationale: Present verb matching the commanded action in vivid, immediate sequence.
    'They strike' keeps the lexical parallel with πατάξαι and preserves the terse
    rhythm.
- source_word: ἐρημῶσαι
  chosen: to lay waste
  alternatives:
  - to devastate
  - to make desolate
  lexicon: LSJ
  rationale: The verb denotes making something desolate or ruined. 'Lay waste' is
    idiomatic, forceful, and fits the military-political context better than the more
    abstract 'make desolate'.
- source_word: ἐρημοῦσιν
  chosen: they lay waste
  alternatives:
  - they devastate
  - they make desolate
  lexicon: LSJ
  rationale: Present verb corresponding to ἐρημῶσαι. Repeating 'lay waste' preserves
    the rhetorical pattern of command followed by execution.
- source_word: οἰκοδομῆσαι
  chosen: to build
  alternatives:
  - to rebuild
  - to construct
  lexicon: LSJ
  rationale: The basic sense is 'to build.' Although context could imply rebuilding
    after destruction, the Greek here does not explicitly mark the prefixal nuance
    in English, so 'build' is the more restrained rendering.
- source_word: οἰκοδομοῦσιν
  chosen: they build
  alternatives:
  - they rebuild
  - they construct
  lexicon: LSJ
  rationale: Present verb corresponding to οἰκοδομῆσαι. 'They build' keeps the concise
    cadence and mirrors the source structure.
