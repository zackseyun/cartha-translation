translation:
  text: And when the king awoke, they took the letter and gave it to him, and he read
    it.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξηγέρθη
  chosen: awoke
  alternatives:
  - was awakened
  - rose up
  lexicon: LSJ
  rationale: Aorist passive of ἐξεγείρω here functions intransitively of waking from
    sleep. 'Awoke' is natural modern English and fits the narrative context better
    than the more wooden 'was awakened' or the broader 'rose up'.
- source_word: λαβόντες
  chosen: they took
  alternatives:
  - having taken
  - receiving
  lexicon: LSJ
  rationale: The participle is best rendered with a finite verb in English for smooth
    narrative flow under optimal equivalence. 'They took' preserves the action without
    awkwardness.
- source_word: τὸ γράμμα
  chosen: the letter
  alternatives:
  - the document
  - the writing
  lexicon: LSJ
  rationale: γράμμα in this context refers to the written statement just produced
    and handed to the king. 'Letter' is the most idiomatic and specific rendering
    in English narrative.
- source_word: ἔδωκαν αὐτῷ
  chosen: gave it to him
  alternatives:
  - handed it to him
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist verb and indirect object. 'Gave
    it to him' is clear and faithful; 'handed it to him' is possible but slightly
    more interpretive.
- source_word: ἀνέγνω
  chosen: he read it
  alternatives:
  - he read
  lexicon: LSJ
  rationale: Although the Greek verb can stand without an explicit object because
    it is implied from context, English reads more naturally with 'it' supplied, referring
    back to the letter.
