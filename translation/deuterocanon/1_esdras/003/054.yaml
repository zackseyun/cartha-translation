  text: καὶ πρὸς τούτοις ὁ βασιλεὺς χάσκων τὸ στόμα ἐθεώρει αὐτήν· καὶ ἐὰν γελάσῃ
    αὐτῷ, γελᾷ· ἐὰν δὲ πικρανθῇ ἐπʼ αὐτόν, κολακεύει αὐτὴν ὅπως διαλλαγῇ αὐτῷ.
