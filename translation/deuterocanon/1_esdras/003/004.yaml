translation:
  text: Then the three young men, the bodyguards who were guarding the king’s person,
    said to one another,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the bodyguards, those guarding the body of the king.' The phrase
      means they were guarding the king’s person.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: LSJ
  rationale: Standard temporal/sequential connective; 'Then' is natural modern English
    and preserves the narrative progression.
- source_word: οἱ τρεῖς νεανίσκοι
  chosen: the three young men
  alternatives:
  - the three youths
  - the three young attendants
  lexicon: LSJ
  rationale: νεανίσκοι denotes young men/youths. 'Young men' is clear modern English;
    'youths' is possible but slightly less natural here.
- source_word: οἱ σωματοφύλακες
  chosen: the bodyguards
  alternatives:
  - the guardsmen
  - the royal guards
  lexicon: LSJ
  rationale: Compound literally meaning 'body-guards'; 'bodyguards' best captures
    the specific role in idiomatic English.
- source_word: οἱ φυλάσσοντες
  chosen: who were guarding
  alternatives:
  - who guarded
  - keeping watch over
  lexicon: LSJ
  rationale: Present participle with descriptive force; 'who were guarding' reflects
    the ongoing duty of these men.
- source_word: τὸ σῶμα τοῦ βασιλέως
  chosen: the king’s person
  alternatives:
  - the body of the king
  - the king himself
  lexicon: LSJ
  rationale: Although σῶμα literally means 'body,' in this courtly/security context
    the phrase refers to guarding the king's person rather than his physical body
    as an object. 'The king’s person' conveys the idiom naturally while staying close
    to the Greek sense.
- source_word: εἶπαν ἕτερος πρὸς τὸν ἕτερον
  chosen: said to one another
  alternatives:
  - said each to the other
  - spoke to each other
  lexicon: LSJ
  rationale: Idiomatic reciprocal expression. 'Said to one another' is the most natural
    English rendering and preserves the mutual exchange.
