id: 1ES.3.43
reference: 1 Esdras 3:43
source:
  edition: lxx-swete-1909
  text: ἄνθρωπος τὸν ἑαυτοῦ πατέρα ἐγκαταλείπει ὃς ἐξέθρεψεν αὐτὸν καὶ τὴν ἰδίαν χώραν,
    καὶ πρὸς τὴν ἰδίαν γυναῖκα κολλᾶται,
  language: Greek
