translation:
  text: A man leaves his own father, who raised him, and his own country, and clings
    to his own wife,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abandons' or 'forsakes' for 'leaves'; the Greek verb can carry a stronger
      sense, but here it likely describes departing from father and country in order
      to attach himself to his wife.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  chosen: A man
  alternatives:
  - A person
  - A human being
  lexicon: BDAG
  rationale: The singular ἄνθρωπος here introduces a representative generic male in
    a proverb-like statement about marriage. Per doctrine, gender-accurate rendering
    is preferred over flattening to a neutral term when the source uses masculine
    form with representative force.
- source_word: τὸν ἑαυτοῦ πατέρα
  chosen: his own father
  alternatives:
  - his father
  lexicon: BDAG
  rationale: ἑαυτοῦ adds reflexive/emphatic possession. 'His own father' preserves
    the emphasis better than the simpler 'his father.'
- source_word: ἐγκαταλείπει
  chosen: leaves
  alternatives:
  - abandons
  - forsakes
  lexicon: BDAG
  rationale: The verb can be stronger ('abandon, forsake'), but in this familial-marital
    context 'leaves' best fits idiomatic English without overstating moral blame.
    Stronger alternatives are possible but would sound harsher than the immediate
    context requires.
- source_word: ὃς ἐξέθρεψεν αὐτόν
  chosen: who raised him
  alternatives:
  - who nourished him
  - who brought him up
  lexicon: BDAG
  rationale: ἐκτρέφω here refers to rearing or bringing up a child. 'Raised him' is
    natural modern English and captures the parental sense.
- source_word: τὴν ἰδίαν χώραν
  chosen: his own country
  alternatives:
  - his own land
  - his homeland
  lexicon: BDAG
  rationale: χώρα commonly denotes land, region, or country. 'Country' communicates
    departure from one's native place clearly in contemporary English; 'homeland'
    is possible but slightly more interpretive.
- source_word: πρὸς τὴν ἰδίαν γυναῖκα
  chosen: to his own wife
  alternatives:
  - to his own woman
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife'; in this marital-clinging context 'wife'
    is clearly intended.
- source_word: κολλᾶται
  chosen: clings
  alternatives:
  - joins himself
  - is joined
  - holds fast
  lexicon: BDAG
  rationale: The verb conveys close attachment. 'Clings' is both faithful and idiomatic,
    and it preserves the strong relational bond implied by the Greek.
