translation:
  text: and they do not remember to show affection to friends and brothers when they
    are drinking, and before long they draw swords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he does not remember'; the Greek verb is singular,
      but the clause functions generically in context and is rendered with English
      'they.'
    reason: lexical_alternative
  - marker: b
    text: The verb translated 'show affection' can also be understood more concretely
      as 'be affectionate toward' or, less likely here, 'kiss.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μέμνηται
  chosen: they do not remember
  alternatives:
  - he does not remember
  - they do not keep in mind
  lexicon: LSJ
  rationale: The form is singular in Greek, but the surrounding context and English
    idiom favor a generic plural rendering to match the plural participle πίνωσιν
    and the implied class of drinkers. 'Remember' preserves the basic sense without
    overinterpreting.
- source_word: ὅταν πίνωσιν
  chosen: when they are drinking
  alternatives:
  - when they drink
  - whenever they drink
  lexicon: LSJ
  rationale: ὅταν with the subjunctive gives a general temporal sense. 'When they
    are drinking' captures the ongoing situation of intoxication in natural English.
- source_word: φιλάζειν
  chosen: to show affection
  alternatives:
  - to love
  - to be friendly to
  - to kiss
  lexicon: LSJ
  rationale: The verb denotes acting affectionately toward someone. 'Show affection'
    preserves the relational sense without narrowing it to a literal kiss, which the
    context of social bonds and subsequent violence does not require.
- source_word: φίλοις καὶ ἀδελφοῖς
  chosen: friends and brothers
  alternatives:
  - friends and kindred
  - friends and brothers/siblings
  lexicon: LSJ
  rationale: The Greek is explicitly masculine/plural and likely refers to male companions
    and kin in context. 'Brothers' is gender-accurate and follows project policy;
    'friends' and 'brothers' also preserves the rhetorical pairing.
- source_word: μετʼ οὐ πολὺ
  chosen: before long
  alternatives:
  - not long after
  - soon after
  lexicon: LSJ
  rationale: This idiom means after a short time. 'Before long' is concise, idiomatic
    English.
- source_word: σπῶνται μαχαίρας
  chosen: they draw swords
  alternatives:
  - they pull out swords
  - they unsheathe swords
  lexicon: LSJ
  rationale: The phrase refers to drawing weapons. 'Draw swords' is the standard natural
    English equivalent and preserves the sudden turn to violence.
