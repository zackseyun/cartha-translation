translation:
  text: It makes the mind of the king and of the orphan one, and that of the slave
    and that of the free, and that of the poor and that of the rich;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave' (Greek οἰκέτης), though the contrast with 'the
      free' makes bonded status the more likely sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιεῖ
  chosen: makes
  alternatives:
  - renders
  - causes to be
  lexicon: LSJ
  rationale: A straightforward present-tense verb of causing or making. 'Makes' preserves
    the active force and simple style of the Greek.
- source_word: διάνοιαν
  chosen: mind
  alternatives:
  - understanding
  - thought
  - way of thinking
  lexicon: LSJ
  rationale: '''Mind'' best fits the singular object modified by μίαν and keeps the
    sense of inner thinking or disposition without overinterpreting.'
- source_word: μίαν
  chosen: one
  alternatives:
  - the same
  - single
  lexicon: LSJ
  rationale: The adjective stresses that differing persons are reduced to one and
    the same mental state. 'One' is concise and closely follows the Greek; the leveling
    effect is clear in context.
- source_word: βασιλέως
  chosen: king
  alternatives:
  - ruler
  lexicon: LSJ
  rationale: The ordinary sense is 'king'; no contextual reason exists to generalize
    to 'ruler'.
- source_word: ὀρφανοῦ
  chosen: orphan
  alternatives:
  - fatherless
  lexicon: LSJ
  rationale: '''Orphan'' is natural modern English and accurately conveys the vulnerable
    social status intended by the contrast with ''king''.'
- source_word: οἰκέτου
  chosen: slave
  alternatives:
  - servant
  - household slave
  lexicon: LSJ
  rationale: Although οἰκέτης can denote a household servant/slave, the social-status
    contrast with ἐλευθέρου favors 'slave' here. This aligns with the project's guidance
    to use 'slave' where bonded status is salient.
- source_word: ἐλευθέρου
  chosen: free
  alternatives:
  - freeman
  - free person
  lexicon: LSJ
  rationale: The adjective contrasts social condition with slavery. 'Free' is idiomatic
    in English when paired with 'slave'.
- source_word: πένητος
  chosen: poor
  alternatives:
  - needy
  lexicon: LSJ
  rationale: A standard socioeconomic term; 'poor' preserves the broad class contrast
    with 'rich'.
- source_word: πλουσίου
  chosen: rich
  alternatives:
  - wealthy
  lexicon: LSJ
  rationale: '''Rich'' is the direct and idiomatic counterpart to ''poor''.'
