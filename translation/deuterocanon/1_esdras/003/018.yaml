theological_decisions:
- issue: Rendering of οἰκέτου in a social-status contrast
  chosen_reading: slave
  alternative_readings:
  - servant
  - household servant
  rationale: This verse contrasts bonded and free status explicitly (οἰκέτου ... ἐλευθέρου).
    Because the loss of freedom is central to the contrast, 'slave' better preserves
    the source meaning than the softer 'servant.'
