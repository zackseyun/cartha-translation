  - 157
  validation: no_reference
translation:
  text: But they stand guard around him, and each one cannot go away and do his work,
    nor do they disobey him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τηροῦσιν
  chosen: stand guard
  alternatives:
  - keep watch
  - guard
  - attend
  lexicon: LSJ
  rationale: In context with κύκλῳ περὶ αὐτόν, the verb conveys keeping watch or guarding
    around the king, not merely 'keep' in an abstract sense. 'Stand guard' gives the
    military/courtly sense in natural English.
- source_word: κύκλῳ περὶ αὐτόν
  chosen: around him
  alternatives:
  - round about him
  - in a circle around him
  lexicon: LSJ
  rationale: The phrase emphasizes surrounding attendance. 'Around him' is concise
    modern English and preserves the spatial sense without awkward redundancy.
- source_word: οὐ δύνανται
  chosen: cannot
  alternatives:
  - are not able to
  - are unable to
  lexicon: BDAG
  rationale: Simple inability is in view. 'Cannot' is the most natural modern equivalent.
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - every one
  lexicon: BDAG
  rationale: 'The distributive force is explicit: the attendants individually cannot
    leave. ''Each one'' preserves that force clearly.'
- source_word: ἀπελθεῖν
  chosen: go away
  alternatives:
  - depart
  - leave
  lexicon: BDAG
  rationale: The infinitive denotes departing from the king's presence. 'Go away'
    is idiomatic and clear; 'leave' would also work, but 'go away' pairs smoothly
    with the following infinitive.
- source_word: ποιεῖν τὰ ἔργα αὐτοῦ
  chosen: do his work
  alternatives:
  - do his tasks
  - carry out his business
  lexicon: BDAG
  rationale: The phrase means to attend to one's own duties or business. 'Do his work'
    is straightforward and preserves the singular distributive sense with ἕκαστος.
- source_word: παρακούουσιν
  chosen: disobey
  alternatives:
  - refuse to listen to
  - disregard
  lexicon: BDAG
  rationale: The verb here means to disobey or fail to heed. Since the object is the
    king, 'disobey' best captures the authority relationship.
