id: 1ES.3.34
reference: 1 Esdras 3:34
source:
  edition: lxx-swete-1909
  text: αὐτοὶ δὲ τηροῦσιν κύκλῳ περὶ αὐτόν, καὶ οὐ δύνανται ἕκαστος ἀπελθεῖν καὶ ποιεῖν
    τὰ ἔργα αὐτοῦ, οὐδὲ παρακούουσιν αὐτοῦ.
  language: Greek
  pages:
  - 146
