  - 157
  validation: no_reference
translation:
  text: And now you do not believe me. Is not the king great in his authority? Do
    not all the lands fear to touch him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'Do not all the lands fear to lay a hand on him?'
      The Greek literally says 'to touch him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύετέ
  chosen: believe
  alternatives:
  - trust
  lexicon: BDAG
  rationale: The verb means 'believe' or 'trust.' In this argumentative context ('you
    do not believe me'), 'believe' is the most natural English rendering and preserves
    the direct claim that the hearers are unconvinced by the speaker's assertion.
- source_word: μέγας
  chosen: great
  alternatives:
  - mighty
  lexicon: LSJ
  rationale: μέγας commonly means 'great' in size, status, or power. Here it describes
    the king's prominence and power; 'great' is idiomatic and keeps the rhetorical
    force without overinterpreting.
- source_word: ἐξουσίᾳ
  chosen: authority
  alternatives:
  - power
  - rule
  lexicon: LSJ
  rationale: ἐξουσία denotes authority, right, or power to act. 'Authority' best captures
    the king's recognized ruling power in this rhetorical question, while 'power'
    remains a viable alternative.
- source_word: χῶραι
  chosen: lands
  alternatives:
  - countries
  - regions
  lexicon: LSJ
  rationale: χῶραι refers broadly to lands or territories. 'Lands' preserves the broad
    geopolitical sense without implying modern nation-states, which 'countries' might
    suggest.
- source_word: εὐλαβοῦνται
  chosen: fear
  alternatives:
  - stand in awe
  - are wary
  lexicon: LSJ
  rationale: The verb can convey reverent fear, caution, or dread. In context, where
    the result is reluctance 'to touch him,' 'fear' best expresses the king's intimidating
    power. 'Stand in awe' would underplay the practical danger implied.
- source_word: ἅψασθαι
  chosen: to touch
  alternatives:
  - to lay a hand on
  - to approach
  lexicon: LSJ
  rationale: ἅπτομαι commonly means 'touch' or 'take hold of.' 'To touch' is the direct
    lexical sense. 'Lay a hand on' is interpretive but captures the likely force of
    not daring to make contact with the king; the more literal wording is retained
    in the main text.
