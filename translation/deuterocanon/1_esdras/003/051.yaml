id: 1ES.3.51
reference: 1 Esdras 3:51
source:
  edition: lxx-swete-1909
  text: καὶ νῦν οὐ πιστεύετέ μοι· οὐχὶ μέγας ὁ βασιλεὺς τῇ ἐξουσίᾳ αὐτοῦ; οὐχὶ πᾶσαι
    αἱ χῶραι εὐλαβοῦνται ἅψασθαι αὐτοῦ;
  language: Greek
  pages:
  - 146
  - 147
  - 150
  - 151
  - 152
