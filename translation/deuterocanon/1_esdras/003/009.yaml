translation:
  text: And they said, “When the king rises, they will give him the writing; and the
    one whom the king and the three nobles of Persia judge to be the one whose word
    is wiser, to him the victory will be given, as it is written.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the letter” or “the document” for “the writing.”
    reason: lexical_alternative
  - marker: b
    text: Or “whose statement/word is wiser.” The Greek says literally, “that his
      λόγος is wiser.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγερθῇ
  chosen: rises
  alternatives:
  - gets up
  - awakens
  lexicon: BDAG
  rationale: Aorist passive subjunctive of ἐγείρω here refers to the king getting
    up/arising, likely from sleep or from his couch. 'Rises' is natural English and
    preserves the formal sense without over-specifying.
- source_word: τὸ γράμμα
  chosen: the writing
  alternatives:
  - the letter
  - the document
  lexicon: BDAG
  rationale: γράμμα can mean a written document or letter. Here it refers to the written
    statement each has prepared. 'The writing' stays close to the Greek and avoids
    implying private correspondence.
- source_word: κρίνῃ
  chosen: judge
  alternatives:
  - decide
  - determine
  lexicon: BDAG
  rationale: The verb denotes making an evaluative decision. 'Judge' preserves the
    formal adjudicative nuance appropriate to the contest setting.
- source_word: μεγιστᾶνες
  chosen: nobles
  alternatives:
  - magnates
  - great men
  - officials
  lexicon: LSJ
  rationale: The term refers to high-ranking Persian grandees. 'Nobles' is idiomatic
    modern English and conveys elite status better than the less familiar 'magnates.'
- source_word: Περσίδος
  chosen: of Persia
  alternatives:
  - of the Persians
  lexicon: LSJ
  rationale: The genitive denotes the Persian realm. 'Of Persia' is the most natural
    English rendering in this courtly context.
- source_word: ὁ λόγος αὐτοῦ σοφώτερος
  chosen: to have the wiser argument
  alternatives:
  - that his word is wiser
  - that his statement is wiser
  lexicon: BDAG
  rationale: λόγος here refers to the contestant's written thesis or line of reasoning,
    not merely a single 'word.' 'The wiser argument' communicates the comparative
    evaluative sense in context.
- source_word: τὸ νῖκος
  chosen: the victory
  alternatives:
  - the prize
  - the win
  lexicon: LSJ
  rationale: νῖκος means victory. In this contest context it can imply the winning
    outcome or prize, but 'the victory' best reflects the Greek term itself.
- source_word: καθὼς γέγραπται
  chosen: as it is written
  alternatives:
  - as has been written
  - as was written down
  lexicon: BDAG
  rationale: The perfect passive formula points to what was set down in writing. 'As
    it is written' is concise and faithful, even outside explicitly scriptural citation
    contexts.
