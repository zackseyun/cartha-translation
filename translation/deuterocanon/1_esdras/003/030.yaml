  validation: no_reference
translation:
  text: And he alone, if he says to kill, they kill; if he says to release, they release.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if he says to let go, they let go.' The Greek verb can denote release,
      letting go, or pardon depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  chosen: he alone
  alternatives:
  - he himself
  - he
  lexicon: LSJ
  rationale: The pronoun is emphatic in context; rendering it as 'he alone' brings
    out the exclusivity implied by the Greek emphasis better than a bare 'he.'
- source_word: εἰ μόνος ἐστίν
  chosen: is alone
  alternatives:
  - is by himself
  - is the only one
  lexicon: LSJ
  rationale: 'The phrase literally expresses being alone/sole. In English the sense
    is carried idiomatically by attaching the emphasis to the subject: ''he alone.'''
- source_word: ἐὰν εἴπῃ
  chosen: if he says
  alternatives:
  - whenever he says
  - if he should say
  lexicon: BDAG
  rationale: The construction gives a general conditional sense. 'If he says' is natural
    modern English and preserves the contingent force without overcomplicating the
    line.
- source_word: ἀποκτεῖναι
  chosen: to kill
  alternatives:
  - to put to death
  - to slay
  lexicon: BDAG
  rationale: The infinitive denotes the commanded action. 'To kill' is the most direct
    and accessible rendering; 'put to death' would be more interpretive and judicial
    than the Greek requires here.
- source_word: ἀποκτέννουσιν
  chosen: they kill
  alternatives:
  - they put to death
  - they slay
  lexicon: BDAG
  rationale: A straightforward present-tense rendering matches the Greek and keeps
    the terse, absolute style of the verse.
- source_word: ἀφεῖναι
  chosen: to release
  alternatives:
  - to let go
  - to spare
  - to pardon
  lexicon: BDAG
  rationale: The verb can mean release or let go. In this royal-command context, 'release'
    best fits the sense of setting someone free or remitting action, without narrowing
    it specifically to legal pardon.
- source_word: ἀφίουσιν
  chosen: they release
  alternatives:
  - they let go
  - they pardon
  - they spare
  lexicon: BDAG
  rationale: This keeps the same English gloss as the infinitive for consistency and
    reflects compliance with the command in simple, direct language.
