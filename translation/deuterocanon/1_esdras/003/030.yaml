id: 1ES.3.30
reference: 1 Esdras 3:30
source:
  edition: lxx-swete-1909
  text: καὶ αὐτὸς εἰ μόνος ἐστίν, ἐὰν εἴπῃ ἀποκτεῖναι, ἀποκτέννουσιν· εἴπεν ἀφεῖναι,
    ἀφίουσιν·
  language: Greek
  pages:
