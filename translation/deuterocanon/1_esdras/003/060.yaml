theological_decisions:
- issue: Personification of truth
  chosen_reading: Retain personified feminine reference to truth ('her')
  alternative_readings:
  - Use impersonal 'it' for abstract truth
  rationale: The verse treats truth as an exalted, almost personal reality receiving
    cosmic acknowledgment. Preserving the personification reflects the Greek discourse
    better than flattening it into an abstract impersonal noun.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Pronoun mismatch in final clause
  chosen_reading: Translate the final pronoun according to the sense as referring
    to personified truth
  alternative_readings:
  - Render woodenly as 'with him/it there is nothing unjust'
  - Emend mentally to match the feminine antecedent without note
  rationale: The Greek text as given reads μετʼ αὐτοῦ, which does not neatly match
    the feminine ἀλήθεια/αὐτήν earlier in the verse. Because the sense of the passage
    still points to truth, the main text follows the sense while a footnote preserves
    the grammatical irregularity transparently.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
