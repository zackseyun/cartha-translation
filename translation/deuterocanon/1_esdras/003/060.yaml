translation:
  text: All the earth calls upon truth, and heaven blesses her; and all the works
    shake and tremble, and with her there is nothing unjust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''calls truth'' or ''calls upon truth''; the verb may be understood
      as acclaiming or invoking personified Truth.'
    reason: lexical_alternative
  - marker: b
    text: The Greek text reads 'with him/it' in the final clause (μετʼ αὐτοῦ), though
      the earlier references to Truth are feminine; the translation follows the sense
      of the personification.
    reason: textual_variant
lexical_decisions:
- source_word: πᾶσα ἡ γῆ
  chosen: All the earth
  alternatives:
  - The whole earth
  - All the land
  lexicon: LSJ
  rationale: γῆ can mean 'earth' or 'land.' In this universalizing context, paired
    with 'heaven,' 'earth' best preserves the cosmic scope.
- source_word: τὴν ἀλήθειαν
  chosen: truth
  alternatives:
  - the truth
  - truthfulness
  lexicon: LSJ
  rationale: ἀλήθεια here is personified throughout the surrounding argument. 'Truth'
    preserves both the abstract quality and the personified force without over-specifying.
- source_word: καλεῖ
  chosen: calls upon
  alternatives:
  - calls
  - proclaims
  - invokes
  lexicon: LSJ
  rationale: The direct object construction allows 'calls' literally, but in English
    'calls upon truth' better conveys an appeal or acclamation directed toward personified
    truth.
- source_word: ὁ οὐρανὸς
  chosen: heaven
  alternatives:
  - the heaven
  - the sky
  lexicon: LSJ
  rationale: In biblical-style English, singular 'heaven' naturally corresponds to
    Greek ὁ οὐρανός and fits the elevated register better than 'sky.'
- source_word: αὐτὴν
  chosen: her
  alternatives:
  - it
  lexicon: LSJ
  rationale: The pronoun refers to personified ἀλήθεια. English 'her' preserves the
    literary personification more clearly than impersonal 'it.'
- source_word: εὐλογεῖ
  chosen: blesses
  alternatives:
  - speaks well of
  - praises
  lexicon: LSJ
  rationale: '''Blesses'' is the standard biblical rendering and suits the elevated,
    cosmic praise context.'
- source_word: πάντα τὰ ἔργα
  chosen: all the works
  alternatives:
  - all works
  - all created things
  - all deeds
  lexicon: LSJ
  rationale: ἔργα literally means 'works.' In this context it likely refers broadly
    to all that has been made or done; 'all the works' stays close to the Greek while
    remaining intelligible.
- source_word: σείεται καὶ τρέμει
  chosen: shake and tremble
  alternatives:
  - are shaken and tremble
  - quiver and tremble
  lexicon: LSJ
  rationale: The paired verbs intensify the reaction before truth. Present-tense 'shake
    and tremble' preserves the vividness and parallelism.
- source_word: μετʼ αὐτοῦ
  chosen: with her
  alternatives:
  - with it
  - in her presence
  lexicon: LSJ
  rationale: Although the transmitted text has masculine/neuter αὐτοῦ, the sense points
    back to personified truth. Rendering 'with her' gives coherent English sense while
    reflecting the personification; the pronoun irregularity is preserved in a footnote
    as a textual/grammatical note.
- source_word: ἄδικον οὐδέν
  chosen: nothing unjust
  alternatives:
  - no unrighteous thing
  - nothing wrong
  lexicon: LSJ
  rationale: ἄδικον denotes what is unjust or unrighteous. 'Nothing unjust' is concise,
    natural, and close to the Greek.
