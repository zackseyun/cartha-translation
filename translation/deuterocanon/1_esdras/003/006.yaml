translation:
  text: and to put on purple, and to drink from gold vessels, and to sleep on gold,
    and to have a chariot with gold bridles, and a turban of fine linen, and a neck-chain
    around the neck,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drink in gold cups' / 'from golden vessels'; the Greek expression specifies
      drinking by means of gold items without naming the exact vessel type.
    reason: lexical_alternative
  - marker: b
    text: Literally 'sleep on gold,' likely referring to a gold-adorned bed or couch;
      the Greek itself is compressed.
    reason: lexical_alternative
  - marker: c
    text: Or 'a gold-bridled chariot'; the adjective may describe the chariot by its
      golden bridle or harness.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορφύραν
  chosen: purple
  alternatives:
  - purple garments
  - royal purple
  lexicon: LSJ
  rationale: πορφύρα denotes purple cloth/dye and, by extension, purple clothing associated
    with luxury and status. The bare noun is kept concise as 'purple' after the infinitive
    'to put on,' which naturally implies clothing.
- source_word: περιβαλέσθαι
  chosen: to put on
  alternatives:
  - to clothe oneself with
  - to wear
  lexicon: LSJ
  rationale: The middle infinitive means to put on clothing or wrap oneself in. 'To
    put on' is idiomatic and preserves the verbal force without overformal stiffness.
- source_word: ἐν χρυσώμασιν
  chosen: from gold vessels
  alternatives:
  - in gold cups
  - from golden vessels
  lexicon: LSJ
  rationale: The phrase refers to drinking by means of golden items, likely cups or
    vessels. English idiom prefers 'drink from' rather than 'drink in.' 'Gold vessels'
    preserves the material and avoids over-specifying cup shape not explicit in the
    Greek.
- source_word: πίνειν
  chosen: to drink
  lexicon: LSJ
  rationale: Straightforward infinitive; retained formally in the list of luxuries.
- source_word: ἐπὶ χρυσῷ καθεύδειν
  chosen: to sleep on gold
  alternatives:
  - to sleep on a golden bed
  - to recline on gold
  lexicon: LSJ
  rationale: The Greek is compressed and likely means sleeping on a gold-adorned couch
    or bed. 'To sleep on gold' preserves the literal expression and the hyperbolic
    luxury without adding furniture not stated in the text.
- source_word: ἅρμα χρυσοχάλινον
  chosen: a chariot with gold bridles
  alternatives:
  - a gold-bridled chariot
  - a chariot with golden harness
  lexicon: LSJ
  rationale: The compound adjective suggests gold associated with the bridle/harness.
    'A chariot with gold bridles' makes the sense clear in natural English while preserving
    the image.
- source_word: κίδαριν βυσσίνην
  chosen: a turban of fine linen
  alternatives:
  - a linen turban
  - a headdress of fine linen
  lexicon: LSJ
  rationale: κίδαρις is a turban or headdress; βύσσινος denotes fine linen/byssus.
    'Turban of fine linen' is both accurate and readable.
- source_word: μανιάκην
  chosen: a neck-chain
  alternatives:
  - a necklace
  - a collar
  lexicon: LSJ
  rationale: μανιάκης denotes an ornament worn around the neck, often a collar or
    chain. 'Neck-chain' preserves the ornamental sense without sounding too modern
    or too rigidly technical.
- source_word: περὶ τὸν τράχηλον
  chosen: around the neck
  alternatives:
  - about the neck
  lexicon: LSJ
  rationale: Simple prepositional phrase specifying where the ornament is worn; rendered
    idiomatically.
