id: 1ES.3.16
reference: 1 Esdras 3:16
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν Καλέσατε τοὺς νεανίσκους, καὶ αὐτοὶ δηλώσουσιν τοὺς λόγους αὐτῶν·
    καὶ ἐκλήθησαν, καὶ εἰσήλθοσαν.
  language: Greek
