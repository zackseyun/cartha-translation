  - 157
  validation: no_reference
translation:
  text: But the king prevails over them and rules over them, and is master over them,
    and whatever he says to them, they will obey.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ δὲ βασιλεὺς
  chosen: But the king
  alternatives:
  - And the king
  - Now the king
  lexicon: LSJ
  rationale: δέ marks contrast with the preceding claims in the argument; 'But the
    king' preserves that adversative force naturally in English.
- source_word: ὑπερισχύει
  chosen: prevails over
  alternatives:
  - is stronger than
  - has the upper hand over
  lexicon: LSJ
  rationale: The verb denotes surpassing in strength or prevailing. 'Prevails over'
    keeps the comparative force without over-paraphrasing.
- source_word: κυριεύει αὐτῶν
  chosen: rules over them
  alternatives:
  - lords it over them
  - has dominion over them
  lexicon: LSJ
  rationale: κυριεύω here expresses exercising lordship or rule. 'Rules over them'
    is clear modern English and avoids the awkwardness of repeating 'lord' language
    immediately before δεσπόζει.
- source_word: δεσπόζει αὐτῶν
  chosen: he is master over them
  alternatives:
  - he dominates them
  - he is lord over them
  lexicon: LSJ
  rationale: δεσπόζω is stronger than simple rule and carries the sense of mastery
    or absolute authority. 'He is master over them' preserves the distinction from
    κυριεύει while remaining readable.
- source_word: πᾶν ὃ ἐὰν εἴπῃ αὐτοῖς
  chosen: whatever he says to them
  alternatives:
  - everything that he may say to them
  - whatever he tells them
  lexicon: LSJ
  rationale: 'The construction expresses indefiniteness: anything whatsoever he says.
    ''Whatever he says to them'' is idiomatic and sufficiently close.'
- source_word: ἐνακούσουσιν
  chosen: they will obey
  alternatives:
  - they will listen to
  - they will heed
  lexicon: LSJ
  rationale: The verb can mean listen to or comply with. In this context of royal
    authority, obedience is the intended sense, so 'they will obey' best conveys the
    force.
