id: 1ES.3.26
reference: 1 Esdras 3:26
source:
  edition: lxx-swete-1909
  text: ὁ δὲ βασιλεὺς ὑπερισχύει καὶ κυριεύει αὐτῶν, καὶ δεσπόζει αὐτῶν, καὶ πᾶν ὃ
    ἐὰν εἴπῃ αὐτοῖς ἐνακούσουσιν.
  language: Greek
  pages:
  - 146
  - 147
