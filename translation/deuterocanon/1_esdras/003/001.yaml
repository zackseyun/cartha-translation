translation:
  text: And King Dareios made a great banquet for all who were under him, and for
    all his household, and for all the nobles of Media and Persia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feast.' The Greek term denotes a formal entertainment meal or banquet.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'all those under him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δοχήν
  chosen: banquet
  alternatives:
  - feast
  - reception
  lexicon: LSJ
  rationale: δοχή commonly denotes an entertainment meal or banquet. 'Banquet' best
    conveys a formal royal feast in natural English; 'reception' is possible but too
    modern and less meal-specific, while 'feast' is also viable but slightly broader.
- source_word: τοῖς ὑπʼ αὐτόν
  chosen: who were under him
  alternatives:
  - his subjects
  - those under his authority
  lexicon: LSJ
  rationale: The phrase is literally 'those under him.' This preserves the hierarchical
    sense without over-specifying political status. 'His subjects' is interpretive
    and may narrow the reference more than the Greek requires.
- source_word: οἰκογενέσιν
  chosen: household
  alternatives:
  - family
  - household members
  lexicon: LSJ
  rationale: The term refers to those of one's house or household. 'Household' is
    concise and can include family and retainers, fitting a royal context better than
    the narrower 'family'.
- source_word: μεγιστᾶσιν
  chosen: nobles
  alternatives:
  - magnates
  - great men
  - officials
  lexicon: LSJ
  rationale: μεγιστᾶνες/μεγιστᾶσιν refers to leading men or grandees. 'Nobles' is
    idiomatic and suitably elevated; 'magnates' is less natural, and 'officials' may
    understate rank.
- source_word: Μηδείας καὶ τῆς Περσίδος
  chosen: Media and Persia
  alternatives:
  - the Medes and Persians
  lexicon: LSJ
  rationale: The Greek names the regions, not the peoples. 'Media and Persia' follows
    the source more closely than the ethnographic 'the Medes and Persians'.
- source_word: βασιλεὺς Δαρεῖος
  chosen: King Dareios
  alternatives:
  - King Darius
  lexicon: LSJ
  rationale: Per project philosophy, personal names are transliterated rather than
    normalized to traditional English forms. 'Dareios' reflects the Greek form Δαρεῖος
    more transparently than 'Darius'.
