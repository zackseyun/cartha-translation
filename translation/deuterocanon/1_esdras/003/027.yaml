id: 1ES.3.27
reference: 1 Esdras 3:27
source:
  edition: lxx-swete-1909
  text: ἐὰν εἴπῃ αὐτοῖς ποιῆσαι πόλεμον ἕτερος πρὸς τὸν ἕτερον, ποιοῦσιν· ἐὰν δὲ ἐξαποστείλῃ
    αὐτοὺς πρὸς τοὺς πολεμίους, βαδίζουσιν καὶ κατεργάζονται τὰ ὄρη καὶ τὰ τείχη καὶ
    τοὺς πύργους.
