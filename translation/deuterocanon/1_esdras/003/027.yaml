translation:
  text: If she tells them to make war, one against another, they do it; but if she
    sends them out against the enemies, they go and tear down the mountains and the
    walls and the towers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'destroy' or 'overthrow' for 'tear down' (Greek κατεργάζονται); the verb
      here denotes forceful action against terrain and fortifications.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν εἴπῃ
  chosen: If she tells
  alternatives:
  - If she says
  - If she commands
  lexicon: LSJ
  rationale: The subjunctive conditional introduces a general scenario. 'Tells' is
    natural English and fits the woman's directive speech in context without overstating
    εἴπῃ as a formal command.
- source_word: ποιῆσαι πόλεμον
  chosen: to make war
  alternatives:
  - to wage war
  - to fight a war
  lexicon: LSJ
  rationale: A fairly literal rendering that preserves the idiom's force. 'Make war'
    is slightly more formal but still readable and closely reflects the Greek expression.
- source_word: ἕτερος πρὸς τὸν ἕτερον
  chosen: one against another
  alternatives:
  - each against the other
  - one against the other
  lexicon: LSJ
  rationale: This preserves the reciprocal sense and the rhetorical cadence of the
    Greek.
- source_word: ποιοῦσιν
  chosen: they do it
  alternatives:
  - they do so
  - they carry it out
  lexicon: LSJ
  rationale: The verb is broad and resumptive here, referring back to the woman's
    instruction. 'They do it' is direct and idiomatic.
- source_word: ἐξαποστείλῃ
  chosen: sends them out
  alternatives:
  - sends them
  - dispatches them
  lexicon: LSJ
  rationale: The compound verb suggests sending forth. 'Sends them out' captures that
    nuance without becoming stiff.
- source_word: πρὸς τοὺς πολεμίους
  chosen: against the enemies
  alternatives:
  - to the enemies
  - to face the enemies
  lexicon: LSJ
  rationale: In military context, English idiom prefers 'against the enemies.' A more
    literal 'to the enemies' would sound unnatural and understate the hostile sense.
- source_word: βαδίζουσιν
  chosen: they go
  alternatives:
  - they march
  - they proceed
  lexicon: LSJ
  rationale: The verb means to go or walk. 'They go' is broad enough to fit the context;
    'march' would add military color not explicit in the verb itself.
- source_word: κατεργάζονται
  chosen: tear down
  alternatives:
  - overthrow
  - destroy
  - subdue
  lexicon: LSJ
  rationale: In context with mountains, walls, and towers, the verb conveys forceful
    destructive action. 'Tear down' communicates the concrete military devastation
    more clearly than the overly broad 'work upon' or the less vivid 'destroy'.
- source_word: τὰ ὄρη
  chosen: the mountains
  alternatives:
  - the hills
  - the strongholds
  lexicon: LSJ
  rationale: The plain lexical sense is 'mountains.' Although some interpreters may
    hear a military sense in context, the Greek word itself is not 'strongholds,'
    so the literal term is retained.
- source_word: τὰ τείχη
  chosen: the walls
  alternatives:
  - the city walls
  - the ramparts
  lexicon: LSJ
  rationale: τείχη commonly refers to defensive walls. 'The walls' is sufficient and
    keeps the sequence concise.
- source_word: τοὺς πύργους
  chosen: the towers
  alternatives:
  - the fortresses
  - the turrets
  lexicon: LSJ
  rationale: The ordinary sense is 'towers,' especially defensive towers in siege
    context.
