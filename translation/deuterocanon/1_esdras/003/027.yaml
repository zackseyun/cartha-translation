theological_decisions:
- issue: Referent of the feminine subject in this verse
  chosen_reading: Use 'she' throughout, referring to the woman described in the surrounding
    argument about the power of women.
  alternative_readings:
  - Repeat 'the woman' instead of pronouns
  rationale: The Greek verbs are third-person singular without an explicit repeated
    subject in this verse, but the immediate context supplies the woman as referent.
    Using 'she' preserves cohesion and avoids unnecessary repetition while keeping
    the argument clear.
  doctrine_reference: Preserve the source text's plain sense without importing claims
    beyond context.
