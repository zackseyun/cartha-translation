translation:
  text: And he will be seated second to Darius because of his wisdom, and he will
    be called a kinsman of Darius.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will sit second to Darius.' The Greek verb can denote being seated
      or installed in a position of rank.
    reason: lexical_alternative
  - marker: b
    text: '''Kinsman'' may denote an actual relative or an honorific court status
      implying close royal favor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεύτερος
  chosen: second
  alternatives:
  - next
  - in second place
  lexicon: LSJ
  rationale: The adjective denotes rank/order. In this court setting it most naturally
    indicates second place in status relative to Darius.
- source_word: καθιεῖται
  chosen: will be seated
  alternatives:
  - will sit
  - will be appointed
  - will be established
  lexicon: LSJ
  rationale: Future passive/middle sense from καθίζω/καθίημι in context suggests being
    given a seat or position. 'Will be seated' preserves the concrete courtly image
    while implying appointment to rank.
- source_word: διὰ τὴν σοφίαν αὐτοῦ
  chosen: because of his wisdom
  alternatives:
  - on account of his wisdom
  - for his wisdom
  lexicon: LSJ
  rationale: διά with the accusative here expresses reason or cause. 'Because of his
    wisdom' is clear modern English and preserves the causal force.
- source_word: συγγενής
  chosen: kinsman
  alternatives:
  - relative
  - kinsman/close associate
  lexicon: LSJ
  rationale: The word ordinarily means one of the same family or kin. In a royal court
    it may carry honorary overtones, but 'kinsman' best preserves the familial language
    of the Greek without overinterpreting it as merely political favor.
- source_word: κληθήσεται
  chosen: will be called
  alternatives:
  - will be named
  - will be proclaimed
  lexicon: LSJ
  rationale: Standard future passive of καλέω. 'Will be called' is the most direct
    and idiomatic rendering.
