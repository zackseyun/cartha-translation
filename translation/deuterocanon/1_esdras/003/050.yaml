theological_decisions:
- issue: Potentially pejorative generalization in γυναῖκες
  chosen_reading: women
  alternative_readings:
  - wives
  rationale: The Greek plural γυναῖκες is lexically ambiguous between 'women' and
    'wives.' The immediate wording does not itself restrict the reference to spouses,
    so the broader 'women' is retained in the main text. This preserves the source's
    rhetoric without softening or narrowing it beyond the Greek.
