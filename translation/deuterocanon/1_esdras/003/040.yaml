- issue: Gender reference of οἱ ἄνθρωποι in contrast with τῶν γυναικῶν
  chosen_reading: men
  alternative_readings:
  - people
  - human beings
  rationale: Because the verse explicitly contrasts οἱ ἄνθρωποι with women, the masculine
    relational sense is foregrounded. Per the project's gender-accurate philosophy,
    'men' better matches the source intent than a generic inclusive term.
