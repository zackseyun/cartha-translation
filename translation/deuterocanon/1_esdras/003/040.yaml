id: 1ES.3.40
reference: 1 Esdras 3:40
source:
  edition: lxx-swete-1909
  text: καὶ αὗται ποιοῦσιν τὰς στολὰς τῶν ἀνθρώπων, καὶ αὗται ποιοῦσιν δόξαν τοῖς
    ἀνθρώποις, καὶ οὐ δύνανται οἱ ἄνθρωποι εἶναι χωρὶς τῶν γυναικῶν.
