translation:
  text: And they ate and drank, and when they were filled, they departed. But Darius
    the king went into his bedchamber and slept, and then awoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having had their fill.' The Greek participle ἐμπλησθέντες refers concretely
      to being full after eating and drinking.
    reason: lexical_alternative
  - marker: b
    text: Or 'withdrew.' The verb ἀνέλυσαν here likely means the company broke up
      and went away after the meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφάγοσαν
  chosen: they ate
  alternatives:
  - they feasted
  lexicon: LSJ
  rationale: Aorist of ἐσθίω, straightforward narrative action. 'They ate' is the
    plain sense and avoids adding celebratory nuance not explicit in the verb itself.
- source_word: ἐπίοσαν
  chosen: drank
  alternatives:
  - were drinking
  lexicon: LSJ
  rationale: Aorist of πίνω paired with 'ate' in simple sequence. English simple past
    best matches the narrative progression.
- source_word: ἐμπλησθέντες
  chosen: when they were filled
  alternatives:
  - having had their fill
  - being satisfied
  lexicon: LSJ
  rationale: The participle indicates being full/sated after eating and drinking.
    'When they were filled' preserves the image and temporal force without over-paraphrase.
    'Satisfied' is possible but less concrete.
- source_word: ἀνέλυσαν
  chosen: they departed
  alternatives:
  - they withdrew
  - they dispersed
  lexicon: LSJ
  rationale: In this context the verb means to break up or depart after a meal/gathering.
    'Departed' is idiomatic and fits the scene better than the more wooden 'loosed'
    or the more interpretive 'dispersed'.
- source_word: κοιτῶνα
  chosen: bedchamber
  alternatives:
  - bedroom
  - sleeping room
  lexicon: LSJ
  rationale: The term denotes a sleeping chamber. 'Bedchamber' preserves the royal/narrative
    register better than the more modern but flatter 'bedroom'.
- source_word: ἐκοιμήθη
  chosen: slept
  alternatives:
  - fell asleep
  - lay down to sleep
  lexicon: LSJ
  rationale: The aorist middle/passive of κοιμάω here simply means 'slept' or 'fell
    asleep.' 'Slept' is concise and natural in sequence with entering the chamber.
- source_word: ἔξυπνος ἐγένετο
  chosen: then awoke
  alternatives:
  - became awake
  - woke up
  lexicon: LSJ
  rationale: Literally 'became awake.' 'Then awoke' gives smooth English while preserving
    the sequential sense of the Greek.
- source_word: ὁ δὲ Δαρεῖος ὁ βασιλεύς
  chosen: But Darius the king
  alternatives:
  - And Darius the king
  - Now Darius the king
  lexicon: LSJ
  rationale: δέ marks a mild transition/contrast from the group to Darius individually.
    'But' captures that shift more clearly than 'and,' without overstating contrast.
