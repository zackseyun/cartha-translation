translation:
  text: And when they rise from the wine, they do not remember what they did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'when they rise from the wine.' The phrase refers to getting
      up after being under wine's effects, not necessarily a formal statement about
      sobriety.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a general temporal clause. 'When' is natural English here;
    'whenever' is possible but less smooth without changing the sense.
- source_word: ἀπὸ τοῦ οἴνου
  chosen: from the wine
  alternatives:
  - from wine
  - from drunkenness
  lexicon: BDAG
  rationale: The phrase is literally 'from the wine.' In context it refers to rising
    after being under the effects of wine. The English text keeps the concrete image
    with 'from the wine' rather than interpreting more freely as 'from drunkenness.'
- source_word: ἐγερθῶσιν
  chosen: they rise
  alternatives:
  - they get up
  - they awaken
  - they sober up
  lexicon: BDAG
  rationale: Aorist subjunctive of ἐγείρω in this context means to rise or get up.
    'They rise' preserves the verbal link to the Greek while remaining readable. 'They
    sober up' over-interprets the image.
- source_word: οὐ μέμνηται
  chosen: they do not remember
  alternatives:
  - they are not mindful of
  - they do not recall
  lexicon: BDAG
  rationale: 'Although the form is singular in Swete''s text, the sense with the plural
    subject is collective and is best rendered idiomatically in English as plural:
    ''they do not remember.'' This avoids awkward literalism while preserving the
    meaning.'
- source_word: ἃ ἔπραξαν
  chosen: what they did
  alternatives:
  - the things they did
  - what they have done
  lexicon: BDAG
  rationale: A straightforward rendering of the relative clause. 'What they did' is
    concise, natural, and faithful to the aorist sense in context.
