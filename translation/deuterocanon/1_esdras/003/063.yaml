  validation: no_reference
translation:
  text: and with her there is no partiality or distinction, but she does what is righteous
    rather than all that is unjust and evil; and all approve of her works,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to receive faces,' an idiom meaning to show favoritism or partiality.
    reason: lexical_alternative
  - marker: b
    text: Or 'separate from all the unjust and evil.' The Greek phrase may be understood
      as separation from unjust and evil things, or more personally from unjust and
      evil people.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρʼ αὐτῇ
  chosen: with her
  alternatives:
  - in her presence
  - before her
  lexicon: LSJ
  rationale: The phrase denotes what obtains in relation to Wisdom personified as
    a woman in the surrounding context. 'With her' is idiomatic and preserves the
    relational sense without over-specifying spatial nuance.
- source_word: λαμβάνειν πρόσωπα
  chosen: partiality
  alternatives:
  - to show favoritism
  - to receive persons
  lexicon: LSJ
  rationale: This idiom literally means 'to receive faces/persons' and refers to showing
    favoritism. 'Partiality' is concise, natural English and preserves the ethical
    sense.
- source_word: διαφορά
  chosen: distinction
  alternatives:
  - difference
  - discrimination
  lexicon: LSJ
  rationale: In this context it parallels the denial of partiality and indicates making
    distinctions between persons. 'Distinction' fits the moral-judicial context better
    than the broader 'difference' and avoids the modern overtones of 'discrimination'.
- source_word: τὰ δίκαια
  chosen: what is righteous
  alternatives:
  - just things
  - what is right
  lexicon: LSJ
  rationale: The neuter plural article plus adjective refers to righteous/just deeds
    or actions. 'What is righteous' preserves the moral quality and reads smoothly
    in English.
- source_word: ποιεῖ
  chosen: does
  alternatives:
  - works
  - practices
  lexicon: LSJ
  rationale: A straightforward rendering of the common verb. 'Does' is the most natural
    English with the object 'what is righteous.'
- source_word: ἀπὸ πάντων τῶν ἀδίκων καὶ πονηρῶν
  chosen: apart from all that is unjust and evil
  alternatives:
  - away from all unjust and evil things
  - separate from all the unrighteous and wicked
  lexicon: LSJ
  rationale: The preposition ἀπό marks separation. Because the Greek adjectives are
    articular plurals and the immediate contrast is with righteous action, rendering
    them as impersonal moral categories ('all that is unjust and evil') best fits
    the clause without forcing a personal referent.
- source_word: εὐδοκοῦσι
  chosen: approve of
  alternatives:
  - take pleasure in
  - are pleased with
  lexicon: LSJ
  rationale: The verb can mean to be pleased with or approve. 'Approve of' fits the
    evaluative context of Wisdom's works being commended by all.
- source_word: τοῖς ἔργοις αὐτῆς
  chosen: her works
  alternatives:
  - her deeds
  - what she does
  lexicon: LSJ
  rationale: ἔργα commonly means works or deeds. 'Her works' keeps the formal link
    with the Greek while remaining clear.
