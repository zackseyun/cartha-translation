id: 1ES.3.63
reference: 1 Esdras 3:63
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἔστιν παρʼ αὐτῇ λαμβάνειν πρόσωπα οὐδὲ διαφορά, ἀλλὰ τὰ δίκαια ποιεῖ
    ἀπὸ πάντων τῶν ἀδίκων καὶ πονηρῶν· καὶ πάντες εὐδοκοῦσι τοῖς ἔργοις αὐτῆς,
  language: Greek
