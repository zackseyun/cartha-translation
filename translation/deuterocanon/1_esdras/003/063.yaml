theological_decisions:
- issue: Personification of the subject as feminine
  chosen_reading: Retain feminine pronouns ('her') for the antecedent carried over
    from the context, reflecting personified Wisdom/Truth.
  alternative_readings:
  - Repeat the noun explicitly as 'truth' or 'wisdom' instead of using pronouns
  - Use impersonal renderings such as 'it'
  rationale: The Greek uses feminine forms, and the surrounding passage personifies
    the subject. Retaining 'her' preserves the literary and theological texture rather
    than flattening the personification.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English'
