id: 1ES.3.45
reference: 1 Esdras 3:45
source:
  edition: lxx-swete-1909
  text: καὶ ἐντεῦθεν δεῖ ὑμᾶς γνῶναι ὅτι αἱ γυναῖκες κυριεύουσιν ὑμῶν· οὐχὶ πονεῖτε
    καὶ μοχθεῖτε, καὶ πάντα ταῖς γυναιξὶν δίδοτε καὶ φέρετε;
