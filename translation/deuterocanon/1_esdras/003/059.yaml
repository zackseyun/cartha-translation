theological_decisions:
- issue: Referent of 'the one who does these things'
  chosen_reading: Kept generic rather than specifying God in the main text
  alternative_readings:
  - Implicitly God
  - A generalized agent who performs the acts just mentioned
  rationale: The Greek does not explicitly name God in this clause. Although the broader
    context may imply divine action, the translation preserves the text's wording
    and leaves the referent implicit.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
