translation:
  text: Is not the one who does these things great? And truth is great, and stronger
    than everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he who does these things.' The Greek leaves the referent implicit; the
      broader context may suggest God, but the clause itself does not name him.
    reason: alternative_reading
  - marker: b
    text: Or 'stronger than all things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχὶ
  chosen: Is not
  alternatives:
  - Isn't
  - Surely ... not?
  lexicon: BDAG
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Is
    not' preserves the elevated rhetorical force without becoming colloquial.
- source_word: μέγας
  chosen: great
  alternatives:
  - mighty
  - important
  lexicon: BDAG
  rationale: The adjective denotes greatness in status or significance. 'Great' is
    the most direct and idiomatic rendering here and matches the repeated evaluative
    language of the surrounding contest speech.
- source_word: ὃς
  chosen: the one who
  alternatives:
  - he who
  - who
  lexicon: BDAG
  rationale: The relative pronoun functions substantivally. 'The one who' is readable
    modern English and avoids archaic 'he who' while preserving the singular personal
    reference.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - such things
  lexicon: BDAG
  rationale: Plural demonstrative referring back to the acts just described. 'These
    things' keeps the explicit plural reference.
- source_word: ποιεῖ
  chosen: does
  alternatives:
  - makes
  - accomplishes
  lexicon: BDAG
  rationale: A broad verb of doing or making. In this context 'does' is the most natural
    English equivalent for performing the previously mentioned acts.
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - the truth
  - faithfulness
  lexicon: BDAG
  rationale: In this wisdom-like declaration, ἀλήθεια denotes truth/reality rather
    than personal fidelity. Anarthrous in Greek, but English idiom does not require
    the article here.
- source_word: ἰσχυροτέρα
  chosen: stronger
  alternatives:
  - more powerful
  - mightier
  lexicon: BDAG
  rationale: Comparative adjective expressing superior strength. 'Stronger' is concise
    and preserves the comparative force.
- source_word: παρὰ πάντα
  chosen: than everything
  alternatives:
  - than all things
  - above everything
  lexicon: BDAG
  rationale: The phrase marks comparison with all things collectively. 'Than everything'
    is natural modern English and keeps the universal scope.
