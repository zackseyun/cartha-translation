id: 1ES.3.59
reference: 1 Esdras 3:59
source:
  edition: lxx-swete-1909
  text: οὐχὶ μέγας ὃς ταῦτα ποιεῖ; καὶ ἡ ἀλήθεια μεγάλη καὶ ἰσχυροτέρα παρὰ πάντα.
  language: Greek
