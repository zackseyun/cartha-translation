translation:
  text: He said, ‘Cut it down,’ and they cut it down; he said, ‘Plant it,’ and they
    plant it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek leaves the object unstated in both clauses; English supplies 'it'
      from context to make the commands natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he commanded
  - he spoke
  lexicon: LSJ
  rationale: Aorist of λέγω, introducing each royal directive. 'He said' is the plain
    sense and keeps the terse, repetitive style of the Greek without over-interpreting
    it as a formal command.
- source_word: ἐκκόψαι
  chosen: Cut it down
  alternatives:
  - cut down
  - uproot
  - fell
  lexicon: LSJ
  rationale: Aorist infinitive of ἐκκόπτω used after εἶπεν to express the content
    of the order. 'Cut it down' best captures the force of removing or felling what
    is in view, likely trees or planted growth, while remaining idiomatic in English.
- source_word: ἐκκόπτουσιν
  chosen: they cut it down
  alternatives:
  - they cut down
  - they fell it
  lexicon: LSJ
  rationale: Present plural verb expressing the subjects' compliance with the command.
    English supplies the object pronoun 'it' for naturalness because the Greek leaves
    the object implicit from context.
- source_word: φυτεῦσαι
  chosen: Plant it
  alternatives:
  - to plant
  - set it out
  lexicon: LSJ
  rationale: Aorist infinitive of φυτεύω, parallel to ἐκκόψαι. 'Plant it' preserves
    the concise imperative-like force of the infinitive after εἶπεν.
- source_word: φυτεύουσιν
  chosen: they plant it
  alternatives:
  - they plant
  - they set it out
  lexicon: LSJ
  rationale: Present plural verb parallel to ἐκκόπτουσιν, showing immediate obedience.
    'They plant it' keeps the repeated structure and supplies the implied object for
    readable English.
