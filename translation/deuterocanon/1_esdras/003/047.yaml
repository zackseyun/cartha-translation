  text: καὶ τὸν λέοντα θεωρεῖ, καὶ ἐν σκότει βαδίζει· καὶ ὅταν κλέψῃ καὶ ἁρπάσῃ καὶ
    κλωποδυτήσῃ, τῇ ἐρωμένῃ ἀποφέρει.
