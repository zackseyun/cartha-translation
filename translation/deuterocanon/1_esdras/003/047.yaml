translation:
  text: and he watches for the lion, and walks in darkness; and whenever he steals
    and snatches and breaks in, he brings it to his beloved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'looks at the lion.' The Greek verb can denote attentive looking or observing;
      the context favors a more purposeful sense.
    reason: lexical_alternative
  - marker: b
    text: The final verb for theft (κλωποδυτήσῃ) refers specifically to stealing by
      stealth, especially by housebreaking; hence 'breaks in.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his lover' or 'the woman he loves.' The Greek τῇ ἐρωμένῃ denotes a beloved
      woman in a romantic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρεῖ
  chosen: watches for
  alternatives:
  - looks at
  - observes
  - beholds
  lexicon: LSJ
  rationale: The verb can mean to look at or observe attentively. In this context
    of furtive, risky behavior, 'watches for' conveys alert, intent observation better
    than the flatter 'looks at' or the archaic 'beholds.'
- source_word: λέοντα
  chosen: the lion
  alternatives:
  - a lion
  lexicon: LSJ
  rationale: The Greek has the article. English can use either definite or indefinite
    here, but 'the lion' preserves the markedness of the Greek and the vividness of
    the image.
- source_word: ἐν σκότει βαδίζει
  chosen: walks in darkness
  alternatives:
  - goes in the dark
  - walks in the dark
  lexicon: LSJ
  rationale: A fairly direct rendering preserves the Greek imagery. 'Darkness' is
    slightly more literal and weightier than 'the dark,' while still natural in English.
- source_word: κλέψῃ
  chosen: steals
  alternatives:
  - commits theft
  - takes secretly
  lexicon: LSJ
  rationale: Simple present English in the subordinate clause best matches the aorist
    subjunctive in a general temporal construction ('whenever he steals').
- source_word: ἁρπάσῃ
  chosen: snatches
  alternatives:
  - seizes
  - plunders
  - robs
  lexicon: LSJ
  rationale: The verb denotes seizing or carrying off by force. 'Snatches' keeps the
    quick, violent nuance without over-specifying a larger-scale act like 'plunders.'
- source_word: κλωποδυτήσῃ
  chosen: breaks in
  alternatives:
  - burgles
  - commits burglary
  - steals by housebreaking
  lexicon: LSJ
  rationale: The rare verb refers to theft by stealth, especially housebreaking. 'Breaks
    in' is idiomatic modern English and preserves the criminal nuance accessibly.
- source_word: τῇ ἐρωμένῃ
  chosen: his beloved
  alternatives:
  - the woman he loves
  - his lover
  lexicon: LSJ
  rationale: The dative with ἀποφέρει indicates the recipient. ἐρωμένη denotes a beloved
    woman or lover. 'His beloved' is natural, dignified, and avoids importing a more
    explicitly sexual nuance than the context requires, while still indicating romantic
    attachment.
- source_word: ἀποφέρει
  chosen: he brings it to
  alternatives:
  - he carries off to
  - he brings back to
  lexicon: LSJ
  rationale: The verb means to carry or bring away/to someone. Since the preceding
    verbs imply stolen goods, 'he brings it to' communicates the transfer to the beloved
    without overcomplicating the English.
