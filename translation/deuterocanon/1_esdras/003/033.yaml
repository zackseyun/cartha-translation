  text: καὶ πᾶς ὁ λαὸς αὐτοῦ καὶ αἱ δυνάμεις αὐτοῦ ἐνακούουσιν. πρὸς δὲ τούτοις αὐτὸς
    ἀνάκειται, ἐσθίει καὶ πίνει καὶ καθεύδει·
