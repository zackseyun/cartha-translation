translation:
  text: But if they gather gold and silver and every beautiful thing, and then see
    one woman beautiful in appearance and beauty,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek literally repeats the description: ''beautiful in appearance and
      beauty,'' an emphatic way of stressing physical attractiveness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ
  chosen: But if
  alternatives:
  - and if
  - now if
  lexicon: LSJ
  rationale: Introduces a conditional contrast with what precedes; 'But if' preserves
    both the conditional force and the adversative δέ in natural English.
- source_word: συναγάγωσιν
  chosen: they gather
  alternatives:
  - they collect
  - they bring together
  lexicon: LSJ
  rationale: The verb means to gather or collect together. 'Gather' is straightforward
    and keeps the concrete sense without overinterpreting the action as commercial
    acquisition.
- source_word: χρυσίον καὶ ἀργύριον
  chosen: gold and silver
  lexicon: LSJ
  rationale: Standard material terms; no reason to depart from the ordinary rendering.
- source_word: πᾶν πρᾶγμα ὡραῖον
  chosen: every beautiful thing
  alternatives:
  - every fine thing
  - every splendid possession
  lexicon: LSJ
  rationale: πρᾶγμα is broad ('thing, matter, object'), and ὡραῖον here describes
    attractiveness or excellence. 'Every beautiful thing' preserves the breadth of
    the phrase and its emphasis on desirable valuables.
- source_word: ἴδωσιν
  chosen: see
  alternatives:
  - catch sight of
  - look upon
  lexicon: LSJ
  rationale: Simple aorist subjunctive after ἐὰν; 'see' is the most natural and least
    interpretive English equivalent.
- source_word: γυναῖκα μίαν
  chosen: one woman
  alternatives:
  - a single woman
  - a woman
  lexicon: LSJ
  rationale: μίαν is explicit and should be represented. 'One woman' preserves the
    Greek emphasis on a particular woman in contrast to amassed treasures.
- source_word: καλήν
  chosen: beautiful
  alternatives:
  - fair
  - attractive
  lexicon: LSJ
  rationale: καλήν in this context refers to physical attractiveness. 'Beautiful'
    is idiomatic modern English and matches the rhetorical comparison.
- source_word: τῷ εἴδει καὶ τῷ κάλλει
  chosen: in appearance and beauty
  alternatives:
  - in form and beauty
  - in looks and beauty
  lexicon: LSJ
  rationale: The paired dative phrases intensify physical attractiveness. 'Appearance
    and beauty' preserves the twofold expression without collapsing it into a single
    adjective.
