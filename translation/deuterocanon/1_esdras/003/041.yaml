  text: ἐὰν δὲ συναγάγωσιν χρυσίον καὶ ἀργύριον καὶ πᾶν πρᾶγμα ὡραῖον, καὶ ἴδωσιν
    γυναῖκα μίαν καλὴν τῷ εἴδει καὶ τῷ κάλλει,
