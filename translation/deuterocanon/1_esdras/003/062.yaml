translation:
  text: And truth remains and is strong forever, and lives and prevails forever and
    ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abides' for 'remains.'
    reason: lexical_alternative
  - marker: b
    text: The final phrase is literally 'to the age of the age,' an intensified expression
      meaning 'forever and ever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - the truth
  - truthfulness
  lexicon: BDAG
  rationale: The noun is articular in English by sense but anarthrous in Greek here;
    'truth' best preserves the personified/abstract quality in this praise statement
    without over-specifying.
- source_word: μένει
  chosen: remains
  alternatives:
  - abides
  - endures
  lexicon: BDAG
  rationale: '''Remains'' is clear modern English and captures continued existence
    or persistence. ''Abides'' is more traditional but less natural for the target
    style.'
- source_word: ἰσχύει
  chosen: is strong
  alternatives:
  - has strength
  - prevails
  lexicon: BDAG
  rationale: Because κρατεῖ appears later and more naturally bears the sense 'prevails,'
    rendering ἰσχύει as 'is strong' preserves the distinction between the two verbs.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - unto eternity
  lexicon: BDAG
  rationale: Idiomatic English for the Greek temporal expression. A more literal 'for
    the age' would be obscure here.
- source_word: ζῇ
  chosen: lives
  alternatives:
  - is alive
  - has life
  lexicon: BDAG
  rationale: The verb continues the personification of truth; 'lives' is the most
    direct and vivid rendering.
- source_word: κρατεῖ
  chosen: prevails
  alternatives:
  - is mighty
  - rules
  - has power
  lexicon: BDAG
  rationale: In context of truth's enduring power, 'prevails' conveys effective dominance
    or victory better than a static gloss like 'is mighty.' It also avoids collapsing
    into the earlier ἰσχύει.
- source_word: εἰς τὸν αἰῶνα τοῦ αἰῶνος
  chosen: forever and ever
  alternatives:
  - for the age of the age
  - unto the eternity of eternity
  lexicon: BDAG
  rationale: This intensified idiom is best rendered by the established but still
    natural English 'forever and ever,' which communicates the superlative duration.
