theological_decisions:
- issue: Personification of truth
  chosen_reading: Retain personified predicates ('remains,' 'is strong,' 'lives,'
    'prevails') without converting the line into a mere abstract statement.
  alternative_readings:
  - Render more abstractly, e.g., 'truth endures and is powerful'
  rationale: The Greek stacks finite verbs on ἡ ἀλήθεια in a rhetorical, almost hymnic
    way. Preserving the personification reflects the source text's force without importing
    additional theology.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not paraphrase.
