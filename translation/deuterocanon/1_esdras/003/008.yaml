translation:
  text: And then, after each had written his own statement, they sealed them and placed
    them under the pillow of Darius the king,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the headrest of Darius the king.' The Greek προσκεφάλαιον can
      denote a pillow or headrest.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  - afterward
  lexicon: LSJ
  rationale: Temporal adverb marking the next step in the narrative; 'then' is the
    most natural concise English equivalent.
- source_word: γράψαντες
  chosen: after ... had written
  alternatives:
  - having written
  - when ... wrote
  lexicon: LSJ
  rationale: Aorist participle preceding the main verbs; rendered with English temporal
    force to show prior action relative to 'sealed' and 'placed.'
- source_word: ἕκαστος
  chosen: each
  alternatives:
  - each one
  - every one
  lexicon: LSJ
  rationale: Distributive sense is straightforward; 'each' is idiomatic and preserves
    the individual action.
- source_word: τὸν ἑαυτοῦ λόγον
  chosen: his own statement
  alternatives:
  - his own word
  - his own argument
  - his own account
  lexicon: LSJ
  rationale: λόγος here refers to the written proposition or claim each contestant
    composed. 'Statement' fits the immediate contest setting better than the overly
    literal 'word' and is less interpretive than 'argument.'
- source_word: ἐσφραγίσαντο
  chosen: they sealed them
  alternatives:
  - they sealed
  - they affixed a seal
  lexicon: LSJ
  rationale: Middle form in context refers to sealing the written submissions. English
    supplies 'them' for clarity because the object is implicit from the participial
    clause.
- source_word: ἔθηκαν
  chosen: placed
  alternatives:
  - put
  - set
  lexicon: LSJ
  rationale: Simple narrative verb; 'placed' is slightly more formal and suits the
    court setting.
- source_word: ὑπὸ τὸ προσκεφάλαιον
  chosen: under the pillow
  alternatives:
  - under the headrest
  - beneath the cushion
  lexicon: LSJ
  rationale: προσκεφάλαιον commonly denotes a pillow or headrest. 'Pillow' is the
    clearest modern English rendering, while 'headrest' remains a viable alternative.
- source_word: Δαρείου τοῦ βασιλέως
  chosen: of Darius the king
  alternatives:
  - of King Darius
  lexicon: LSJ
  rationale: Genitive construction after 'under the pillow' is naturally rendered
    either way in English. 'Of Darius the king' stays closer to Greek order while
    remaining readable.
