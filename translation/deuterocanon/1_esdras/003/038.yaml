translation:
  text: Women gave birth to the king and to all the people who rule over the sea and
    the land;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αἱ γυναῖκες
  chosen: Women
  alternatives:
  - The women
  - wives
  lexicon: LSJ
  rationale: γυναῖκες is the plural of γυνή and here refers generically to women as
    the sex in contrast to kings and peoples. The anaphoric article is naturally generic
    in English, so 'Women' is preferred over the more specific 'the women.' 'Wives'
    is not supported by the context.
- source_word: ἐγέννησαν
  chosen: gave birth to
  alternatives:
  - bore
  - brought forth
  lexicon: LSJ
  rationale: γεννάω with women as subject specifically denotes bearing/giving birth.
    'Gave birth to' is clear modern English; 'bore' is more formal/literary but less
    natural for the target style.
- source_word: τὸν βασιλέα
  chosen: the king
  alternatives:
  - a king
  lexicon: LSJ
  rationale: 'The article supports a definite/generic singular: ''the king.'' In context
    the point is that even the king comes from women, so the singular representative
    form should be preserved.'
- source_word: πάντα τὸν λαόν
  chosen: all the people
  alternatives:
  - the whole people
  - all the populace
  lexicon: LSJ
  rationale: The phrase is collective and comprehensive. 'All the people' is idiomatic
    and preserves the totalizing force of πάντα with the collective noun λαός.
- source_word: ὃς κυριεύει
  chosen: who rule over
  alternatives:
  - who has dominion over
  - who governs
  lexicon: LSJ
  rationale: Although the relative pronoun is singular in form agreeing with the collective
    λαός, the sense in English is distributive/collective, so a plural verb ('rule')
    is more natural. κυριεύω conveys exercising dominion or rule; 'rule over' is the
    most straightforward rendering.
- source_word: τῆς θαλάσσης καὶ τῆς γῆς
  chosen: sea and land
  alternatives:
  - the sea and the land
  - the sea and the earth
  lexicon: LSJ
  rationale: The pair denotes the whole inhabited realm in broad terms. 'Sea and land'
    is concise and idiomatic in English. 'Earth' is possible for γῆ, but here 'land'
    better matches the sea/land contrast.
