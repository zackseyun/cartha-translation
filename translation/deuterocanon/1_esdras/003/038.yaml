theological_decisions:
- issue: Collective singular syntax in ὃς κυριεύει with πάντα τὸν λαόν
  chosen_reading: Render the collective sense in natural English as 'all the people
    who rule over sea and land.'
  alternative_readings:
  - all the people who rules over sea and land
  - all the people that has dominion over the sea and the land
  rationale: 'This is a grammatical/interpretive decision rather than a doctrinal
    one: Greek can use a singular relative with a collective noun, but English normally
    shifts to plural agreement for natural style. The verse''s argument is rhetorical,
    stressing that even rulers and peoples originate from women.'
  doctrine_reference: DOCTRINE.md § Translation philosophy 6
