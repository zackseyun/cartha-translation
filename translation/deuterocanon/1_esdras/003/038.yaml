id: 1ES.3.38
reference: 1 Esdras 3:38
source:
  edition: lxx-swete-1909
  text: αἱ γυναῖκες ἐγέννησαν τὸν βασιλέα καὶ πάντα τὸν λαὸν ὃς κυριεύει τῆς θαλάσσης
    καὶ τῆς γῆς·
  language: Greek
