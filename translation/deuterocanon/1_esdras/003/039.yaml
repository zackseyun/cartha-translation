theological_decisions:
- issue: Referent and rhetorical force of the feminine demonstrative αὗται
  chosen_reading: Explicitly identify the subject as women in the English text.
  alternative_readings:
  - Leave the pronoun implicit as 'these' or 'they'
  rationale: The verse is part of a speech exalting the power and priority of women.
    Making the feminine referent explicit preserves the argument's logic and avoids
    ambiguity in English.
