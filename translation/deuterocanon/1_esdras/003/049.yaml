id: 1ES.3.49
reference: 1 Esdras 3:49
source:
  edition: lxx-swete-1909
  text: καὶ πολλοὶ ἀπενοήθησαν ταῖς ἰδίαις διανοίαις διὰ τὰς γυναῖκας, καὶ δοῦλοι
    ἐγένοντο διʼ αὐτάς·
