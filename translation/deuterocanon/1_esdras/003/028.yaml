  - 157
  validation: no_reference
translation:
  text: They kill and are killed, and they do not disobey the king’s word; and if
    they win, they bring everything to the king, even whatever they plunder, and all
    the rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'if they are victorious.'
    reason: lexical_alternative
  - marker: b
    text: The Greek literally says 'the king’s word,' an idiom meaning his command
      or order.
    reason: lexical_alternative
lexical_decisions:
- source_word: φονεύουσιν
  chosen: they kill
  alternatives:
  - they murder
  - they slay
  lexicon: BDAG
  rationale: A straightforward active rendering fits the military context. 'Murder'
    is too legally/morally specific here, while 'slay' is more elevated than the project's
    modern-English target.
- source_word: φονεύονται
  chosen: are killed
  alternatives:
  - are slain
  - kill one another
  lexicon: BDAG
  rationale: The passive balances the preceding active and reflects the Greek form.
    'Kill one another' would overinterpret reciprocity not explicit in the wording.
- source_word: λόγον
  chosen: word
  alternatives:
  - command
  - order
  lexicon: BDAG
  rationale: Although the sense is effectively the king's command, 'word' preserves
    the Greek more closely and remains idiomatic in English in this construction.
- source_word: οὐ παραβαίνουσιν
  chosen: do not disobey
  alternatives:
  - do not transgress
  - do not violate
  - do not go against
  lexicon: BDAG
  rationale: This verb means to go beyond or violate. 'Do not disobey' gives the natural
    sense in context of royal orders without sounding wooden.
- source_word: νικήσωσιν
  chosen: they win
  alternatives:
  - they are victorious
  - they conquer
  lexicon: BDAG
  rationale: The verb denotes victory. 'Win' is concise and natural; 'are victorious'
    is slightly more formal, and 'conquer' may suggest a broader subjugation than
    the immediate battle context requires.
- source_word: κομίζουσιν
  chosen: they bring
  alternatives:
  - they carry back
  - they deliver
  lexicon: BDAG
  rationale: In context the sense is bringing the spoils back to the king. 'Bring'
    is clear and sufficiently broad; 'carry back' is possible but more specific than
    necessary.
- source_word: προνομεύσωσιν
  chosen: they plunder
  alternatives:
  - they take spoil
  - they seize as booty
  lexicon: LSJ
  rationale: The verb refers to taking spoil in war. 'Plunder' is the most natural
    modern equivalent and matches the military setting.
- source_word: τὰ ἄλλα πάντα
  chosen: all the rest
  alternatives:
  - everything else
  - all other things
  lexicon: BDAG
  rationale: This phrase sums up additional goods beyond the immediately named spoil.
    'All the rest' is idiomatic and preserves the comprehensive force.
