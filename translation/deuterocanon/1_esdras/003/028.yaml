id: 1ES.3.28
reference: 1 Esdras 3:28
source:
  edition: lxx-swete-1909
  text: φονεύουσιν καὶ φονεύονται, καὶ τὸν λόγον τοῦ βασιλέως οὐ παραβαίνουσιν· ἐὰν
    δὲ νικήσωσιν, τῷ βασιλεῖ κομίζουσιν πάντα, καὶ ἐὰν προνομεύσωσιν, καὶ τὰ ἄλλα
    πάντα.
  language: Greek
