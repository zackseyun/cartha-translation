id: 1ES.3.52
reference: 1 Esdras 3:52
source:
  edition: lxx-swete-1909
  text: ἐθεώρουν αὐτὸν καὶ Ἀπάμην τὴν θυγατέρα Βαρτάκου τοῦ θαυμαστοῦ τὴν παλλακὴν
    τοῦ βασιλέως καθημένην ἐν δεξιᾷ τοῦ βασιλέως,
  language: Greek
