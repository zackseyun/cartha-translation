translation:
  text: I saw him, and Apame, the daughter of the admirable Bartacus, the king’s concubine,
    sitting at the king’s right hand,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Apama.' The Greek name Ἀπάμην can be transliterated in more than one
      standard English form.
    reason: lexical_alternative
  - marker: b
    text: The epithet for Bartacus literally means 'admirable,' 'remarkable,' or 'renowned.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθεώρουν
  chosen: I saw
  alternatives:
  - they were looking at
  - I was watching
  - I observed
  lexicon: LSJ
  rationale: The form is imperfect, literally 'I was watching/beholding,' but in English
    narrative this is naturally rendered as a simple past. The first-person singular
    sense fits the surrounding speech context better than an impersonal plural.
- source_word: Ἀπάμην
  chosen: Apame
  alternatives:
  - Apama
  lexicon: LSJ
  rationale: A standard transliteration of the Greek proper name is preferred. 'Apama'
    is also possible in English, but 'Apame' more directly reflects the Greek accusative
    form here.
- source_word: θυγατέρα
  chosen: daughter
  lexicon: LSJ
  rationale: Straightforward kinship term; no reason to soften or paraphrase.
- source_word: Βαρτάκου
  chosen: Bartacus
  alternatives:
  - Bartakos
  lexicon: LSJ
  rationale: The proper name is transliterated rather than translated, following project
    policy for personal names.
- source_word: τοῦ θαυμαστοῦ
  chosen: the admirable
  alternatives:
  - the illustrious
  - the renowned
  - the wonderful
  lexicon: LSJ
  rationale: θαυμαστός denotes one who is remarkable or admired. 'Admirable' preserves
    the descriptive force without over-interpreting it as a formal title. Because
    the phrase modifies Bartacus, it is kept as an epithet rather than omitted.
- source_word: παλλακὴν
  chosen: concubine
  alternatives:
  - mistress
  lexicon: LSJ
  rationale: The term specifically denotes a concubine rather than a generic lover
    or attendant. 'Concubine' is the most accurate and established English equivalent.
- source_word: καθημένην
  chosen: sitting
  alternatives:
  - seated
  lexicon: LSJ
  rationale: A participial form describing Apame's posture and position. 'Sitting'
    is direct and natural in English.
- source_word: ἐν δεξιᾷ τοῦ βασιλέως
  chosen: at the king’s right hand
  alternatives:
  - on the right of the king
  - at the right side of the king
  lexicon: LSJ
  rationale: This is the idiomatic English rendering of the Greek phrase and preserves
    the sense of privileged position.
