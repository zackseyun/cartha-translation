theological_decisions:
- issue: Personification of truth via feminine pronoun
  chosen_reading: Retain feminine personification with 'her judgment'
  alternative_readings:
  - use impersonal 'its judgment'
  rationale: The immediate Greek uses feminine forms for the antecedent, and the surrounding
    passage personifies truth. Preserving 'her' keeps the literary-theological force
    without adding doctrine.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 3, 5
- issue: Rendering αἰώνων in the doxology
  chosen_reading: Translate literally as 'of all the ages'
  alternative_readings:
  - '''forever and ever'''
  - '''for all eternity'''
  rationale: The phrase is doxological but not a fixed contested doctrinal formula
    here. A more literal rendering preserves the Greek expression and avoids smoothing
    into traditional church English beyond what the text warrants.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
