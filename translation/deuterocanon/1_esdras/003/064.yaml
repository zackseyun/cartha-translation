translation:
  text: and in her judgment there is nothing unjust. And this is the strength and
    the kingdom and the authority and the majesty of all the ages. Blessed is the
    God of truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in its judgment,' if the personification of 'truth' is not carried into
      English.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'of all the ages'; more idiomatically, 'forever and ever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσις
  chosen: judgment
  alternatives:
  - justice
  - decision
  lexicon: BDAG
  rationale: κρίσις here refers to the exercise or standard of judging attributed
    to truth; 'judgment' preserves the juridical sense without overinterpreting it
    as an abstract system of 'justice'.
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  lexicon: BDAG
  rationale: The antecedent is ἀλήθεια ('truth'), a grammatically feminine noun in
    Greek. Rendering with 'her' preserves the personified feminine reference present
    in the immediate context better than the impersonal 'its'.
- source_word: ἄδικον
  chosen: unjust
  alternatives:
  - wrong
  - unrighteous
  lexicon: BDAG
  rationale: ἄδικον denotes what is unjust or wrongful. 'Unjust' best matches the
    forensic setting created by κρίσις.
- source_word: ἰσχύς
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: BDAG
  rationale: ἰσχύς commonly denotes strength or might. 'Strength' is straightforward
    modern English and pairs well with the following royal terms.
- source_word: βασίλειον
  chosen: kingdom
  alternatives:
  - royal power
  - kingship
  - sovereignty
  lexicon: LSJ
  rationale: In this doxological sequence, βασίλειον is best taken as royal dominion
    or kingdom. 'Kingdom' is the most natural concise rendering, though the nuance
    of kingship/royal rule is close.
- source_word: ἐξουσία
  chosen: authority
  alternatives:
  - power
  - right to rule
  lexicon: BDAG
  rationale: ἐξουσία emphasizes delegated or rightful authority rather than mere raw
    power; 'authority' preserves that distinction.
- source_word: μεγαλειότης
  chosen: majesty
  alternatives:
  - greatness
  - magnificence
  lexicon: BDAG
  rationale: The term denotes grandeur or majesty, especially in exalted or doxological
    language. 'Majesty' fits the elevated register.
- source_word: τῶν πάντων αἰώνων
  chosen: of all the ages
  alternatives:
  - forever and ever
  - through all ages
  - of all eternity
  lexicon: BDAG
  rationale: The Greek is literally 'of all the ages.' This preserves the source wording
    more transparently than the idiomatic 'forever and ever,' while still being intelligible
    in English.
- source_word: εὐλογητός
  chosen: Blessed is
  alternatives:
  - Praised be
  - Blessed be
  lexicon: BDAG
  rationale: As a doxological predicate, εὐλογητός is naturally rendered 'Blessed
    is.' This keeps the blessing formula close to the Greek.
- source_word: ὁ θεὸς τῆς ἀληθείας
  chosen: the God of truth
  alternatives:
  - the true God
  - the God of faithfulness
  lexicon: BDAG
  rationale: 'The genitive is best retained: God is characterized as belonging to
    or defined by truth. ''The true God'' would shift the syntax and meaning.'
