id: 1ES.3.64
reference: 1 Esdras 3:64
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἔστιν ἐν τῇ κρίσει αὐτῆς οὐθὲν ἄδικον. καὶ αὕτη ἡ ἰσχὺς καὶ τὸ βασίλειον
    καὶ ἡ ἐξουσία καὶ ἡ μεγαλειότης τῶν πάντων αἰώνων· εὐλογητὸς ὁ θεὸς τῆς ἀληθείας.
  language: Greek
