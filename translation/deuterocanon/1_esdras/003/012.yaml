translation:
  text: The third wrote, “Women are stronger, but truth conquers above all things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Women prevail, but truth conquers everything.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τρίτος
  chosen: The third
  alternatives:
  - The third one
  - The third man
  lexicon: LSJ
  rationale: Article plus ordinal functions substantivally, referring to the third
    participant in the contest. 'The third' is concise and natural in English.
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - said in writing
  - composed
  lexicon: LSJ
  rationale: Aorist of γράφω straightforwardly means 'wrote.' The context is each
    bodyguard writing his statement.
- source_word: Ὑπερισχύουσιν
  chosen: are stronger
  alternatives:
  - prevail
  - are most powerful
  - have superior strength
  lexicon: LSJ
  rationale: The verb means to be stronger than, prevail over, or have superior force.
    Because the next clause uses νικᾷ ('is victorious/conquers'), rendering this first
    verb as 'are stronger' preserves the distinction between the two Greek verbs while
    remaining idiomatic.
- source_word: αἱ γυναῖκες
  chosen: Women
  alternatives:
  - wives
  - the women
  lexicon: LSJ
  rationale: γυναῖκες can mean 'women' or 'wives' depending on context. Here the claim
    is broad and proverbial, not limited to married women, so 'Women' best fits.
- source_word: ὑπὲρ δὲ πάντα
  chosen: but above all things
  alternatives:
  - but over everything
  - but beyond all
  - and above everything
  lexicon: LSJ
  rationale: 'The phrase marks a climactic contrast: despite the strength of women,
    truth surpasses everything. ''Above all things'' captures the superlative force
    naturally.'
- source_word: νικᾷ
  chosen: is victorious
  alternatives:
  - conquers
  - wins
  - prevails
  lexicon: LSJ
  rationale: νικάω means to conquer, overcome, or be victorious. 'Is victorious' reads
    smoothly with abstract subject 'truth' and preserves the triumphal sense without
    collapsing it into the previous verb.
- source_word: ἡ ἀλήθεια
  chosen: truth
  alternatives:
  - the truth
  - reality
  lexicon: LSJ
  rationale: With the article, the noun is definite in Greek, but English often omits
    the article with abstract nouns. 'Truth' is the most natural rendering and preserves
    the aphoristic force.
