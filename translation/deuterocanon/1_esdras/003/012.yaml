    the abstract noun idiomatically as 'truth'
  chosen_reading: truth
  alternative_readings:
  - the truth
  rationale: The verse presents a proverbial maxim rather than identifying a specific
    proposition. English idiom favors the abstract noun without the article here,
    while still preserving the concept's universality and supremacy.
