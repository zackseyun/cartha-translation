translation:
  text: Then Zerubbabel son of Salathiel and Jeshua son of Josedek stood up and began
    to build the house of the Lord in Jerusalem, with the prophets of the Lord with
    them, helping them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'arose.' The Greek participle can mark taking action as well as the physical
      act of standing.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jeshua' is Ἰησοῦς, the same form often rendered 'Jesus' in Greek
      contexts; here it refers to the postexilic high priest, not Jesus of Nazareth.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew parallel context names Haggai and Zechariah among the prophets
      supporting the rebuilding, though this Greek verse refers to them simply as
      'the prophets of the Lord.'
    reason: cross_reference
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: LSJ
  rationale: Standard narrative connective marking sequence from the previous verse.
- source_word: στάς
  chosen: stood up
  alternatives:
  - arose
  - having stood
  lexicon: LSJ
  rationale: Aorist participle of ἵστημι used idiomatically for taking action or rising
    to act. 'Stood up' preserves the concrete image and the narrative force better
    than a flattened 'began.'
- source_word: Ζοροβαβὲλ ὁ τοῦ Σαλαθιὴλ
  chosen: Zerubbabel son of Salathiel
  alternatives:
  - Zorobabel son of Salathiel
  lexicon: LSJ
  rationale: Personal names are transliterated by standard English biblical convention.
    'Zerubbabel' is the familiar English form for Ζοροβαβέλ, while 'Salathiel' follows
    the Greek form present here rather than harmonizing to the Hebrew 'Shealtiel.'
- source_word: Ἰησοῦς ὁ τοῦ Ἰωσεδὲκ
  chosen: Jeshua son of Josedek
  alternatives:
  - Jesus son of Josedek
  - Joshua son of Jozadak
  lexicon: LSJ
  rationale: In this postexilic context, Ἰησοῦς refers to the high priest known in
    Hebrew/Aramaic tradition as Jeshua, not to Jesus of Nazareth. 'Jeshua' avoids
    confusion for modern readers while remaining faithful to the historical figure.
    'Josedek' reflects the Greek form rather than importing the MT spelling 'Jozadak.'
- source_word: ἤρξαντο οἰκοδομεῖν
  chosen: began to build
  alternatives:
  - started building
  - set about building
  lexicon: LSJ
  rationale: A straightforward rendering of the inceptive verb plus infinitive. 'Began
    to build' preserves the formal structure and narrative progression.
- source_word: τὸν οἶκον τοῦ κυρίου
  chosen: the house of the Lord
  alternatives:
  - the Lord's house
  - the temple of the Lord
  lexicon: LSJ
  rationale: '''House of the Lord'' closely reflects the source and preserves the
    temple idiom without prematurely substituting the interpretive shorthand ''temple.''
    κύριος is rendered ''Lord'' per doctrine.'
- source_word: τὸν ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - that was in Jerusalem
  - which is in Jerusalem
  lexicon: LSJ
  rationale: The attributive phrase identifies the location of the house. In English,
    simple postposition is natural and sufficient.
- source_word: συνόντων
  chosen: with ... with them
  alternatives:
  - while ... were with them
  - as ... accompanied them
  lexicon: LSJ
  rationale: Genitive absolute from σύνειμι, indicating attendant circumstance. Rendering
    it with 'with them' keeps the sense of presence/support in readable English.
- source_word: τῶν προφητῶν τοῦ κυρίου
  chosen: the prophets of the Lord
  alternatives:
  - the Lord's prophets
  - the prophets
  lexicon: LSJ
  rationale: The genitive is retained explicitly. The MT parallel names Haggai and
    Zechariah in the surrounding context, but this verse's Greek wording is general,
    so the translation should remain general.
- source_word: βοηθούντων αὐτοῖς
  chosen: helping them
  alternatives:
  - assisting them
  - supporting them
  lexicon: LSJ
  rationale: Present participle expressing ongoing aid. 'Helping them' is clear, natural,
    and adequately captures the practical and encouraging support implied.
