theological_decisions:
- issue: Rendering κύριος in a temple-context deuterocanonical verse
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The Greek source reads κυρίου, and project doctrine specifies 'Lord'
    as the default rendering for κύριος. There is no need here to signal the Hebrew
    divine name explicitly in the main text, especially since the Greek witness is
    primary for 1 Esdras.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Use of Greek primary witness with MT parallel
  chosen_reading: Kept the Greek's general phrase 'the prophets of the Lord' rather
    than importing the MT parallel's explicit names into the verse text
  alternative_readings:
  - Expanding the verse to name Haggai and Zechariah from the parallel Hebrew tradition
  rationale: The task requires the MT parallel to be used as actual translation input,
    but the Greek remains primary. The MT confirms the prophetic-support setting and
    helps guard interpretation, yet it does not justify adding names absent from this
    Greek verse.
  doctrine_reference: 'PHILOSOPHY.md: Greek source for deuterocanonical books; WLC
    MT parallels used as cross-reference input'
