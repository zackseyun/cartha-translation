translation:
  text: And the holy vessels of the house of the Lord, both the gold and the silver
    ones, which Nebuchadnezzar carried out from the house in Jerusalem and took to
    Babylon, are to be restored to the house in Jerusalem where they were placed,
    so that they may be set there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacred vessels.' The Greek phrase refers to temple items dedicated for
      holy use.
    reason: lexical_alternative
  - marker: b
    text: Greek 'house of the Lord,' that is, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὰ σκεύη
  chosen: holy vessels
  alternatives:
  - sacred vessels
  - holy articles
  lexicon: LSJ
  rationale: σκεύη commonly means vessels/implements/articles; with ἱερὰ it refers
    to cultic items dedicated to temple use. 'Holy vessels' is clear and suitably
    formal without over-specifying their exact form.
- source_word: οἴκου Κυρίου
  chosen: house of the Lord
  alternatives:
  - temple of the Lord
  - house of the LORD
  lexicon: LSJ
  rationale: οἶκος literally means 'house.' In this context it denotes the temple,
    but 'house of the Lord' preserves the source wording and the cultic resonance.
    'Lord' follows the project's default for κύριος.
- source_word: τά τε χρυσᾶ καὶ ἀργυρᾶ
  chosen: both the gold and the silver ones
  alternatives:
  - both the gold and silver vessels
  - the gold and silver items
  lexicon: LSJ
  rationale: The adjectives are substantivized and refer back to σκεύη. Adding 'ones'
    in English preserves the anaphoric force without unnecessarily repeating 'vessels,'
    though that sense remains implicit from context.
- source_word: ἐξήνεγκεν
  chosen: carried out
  alternatives:
  - brought out
  - removed
  lexicon: LSJ
  rationale: The verb emphasizes taking the vessels out from the temple. 'Carried
    out' is natural English and preserves the directional force of ἐκ.
- source_word: ἀπήνεγκεν εἰς Βαβυλῶνα
  chosen: took to Babylon
  alternatives:
  - carried to Babylon
  - brought to Babylon
  lexicon: LSJ
  rationale: '''Took to Babylon'' is idiomatic and reflects the completed transfer
    from Jerusalem to Babylon. ''Brought'' would sound perspective-dependent in English.'
- source_word: ἀποκατασταθῆναι
  chosen: are to be restored
  alternatives:
  - to be returned
  - to be reinstated
  lexicon: LSJ
  rationale: The infinitive expresses the decree's purpose/result. 'Restored' captures
    the sense of returning something to its proper place and function, stronger than
    a bare 'returned.'
- source_word: οὗ ἦν κείμενα
  chosen: where they had been placed
  alternatives:
  - where they were lying
  - where they had lain
  lexicon: LSJ
  rationale: κείμενα literally means 'lying/placed.' In context of temple vessels,
    idiomatic English prefers 'placed,' indicating their proper location in the temple.
- source_word: ὅπως τεθῇ ἐκεῖ
  chosen: so that they may be set there
  alternatives:
  - and let them be placed there
  - so that it may be put there
  lexicon: LSJ
  rationale: The clause expresses intended placement in the temple. Although τεθῇ
    is singular in form, the sense in context is collective with the vessels; rendering
    it plurally in English avoids awkwardness and reflects the referent.
- source_word: Ναβουχοδονοσόρ
  chosen: Nebuchadnezzar
  alternatives:
  - Nabuchodonosor
  lexicon: LSJ
  rationale: Standard English transliteration uses 'Nebuchadnezzar.' This follows
    the parallel Hebrew tradition and common biblical naming conventions while remaining
    faithful to the referent.
