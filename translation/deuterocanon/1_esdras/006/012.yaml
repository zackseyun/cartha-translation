theological_decisions:
- issue: Rendering παῖδες in relation to God
  chosen_reading: servants
  alternative_readings:
  - children
  rationale: The Greek term is semantically broad, but in this legal-administrative
    exchange the speakers are identifying themselves as those in God's service while
    defending their rebuilding work. Rendering it as 'children' would shift the emphasis
    toward filial status rather than commissioned service.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; consistency of key terms,
    or documented exception'
- issue: Rendering κύριος for God
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's default rendering for κύριος is 'Lord.' Nothing in the
    verse requires deviation, and 'Lord' preserves both Jewish scriptural usage and
    theological gravity.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord)'
