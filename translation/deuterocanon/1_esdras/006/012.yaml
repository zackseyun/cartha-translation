translation:
  text: But they answered us, saying, “We are servants of the Lord, who created heaven
    and earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “children of the Lord who created heaven and earth.” The Greek word can
      mean either “children” or “servants”; here the context favors service rather
      than filial status.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for giving a response; 'answered' is the most
    direct and natural English equivalent.
- source_word: ἡμῖν
  chosen: us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: The dative is naturally carried in English as the indirect object 'us';
    'answered us' is idiomatic and preserves the addressee.
- source_word: Ἐσμὲν
  chosen: we are
  lexicon: BDAG
  rationale: Simple present of 'to be'; no reason to expand or paraphrase.
- source_word: παῖδες
  chosen: servants
  alternatives:
  - children
  - slaves
  lexicon: BDAG
  rationale: Although παῖδες can mean 'children' or 'servants,' in this self-identification
    before officials the sense is one of belonging and service to God, not biological
    sonship. 'Servants' best fits the context and avoids overstating the bonded nuance
    of 'slaves' where it is not foregrounded.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this Jewish
    scriptural context it denotes God as sovereign.
- source_word: τοῦ κτίσαντος
  chosen: who created
  alternatives:
  - the one who created
  - who made
  lexicon: BDAG
  rationale: The participle identifies the Lord by his creative act. 'Who created'
    is clear, natural, and preserves the relative force in English.
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν
  chosen: heaven and earth
  alternatives:
  - the heaven and the earth
  - the sky and the land
  lexicon: BDAG
  rationale: This is the standard biblical merism for the whole created order. 'Heaven
    and earth' preserves the scriptural resonance better than more colloquial alternatives.
