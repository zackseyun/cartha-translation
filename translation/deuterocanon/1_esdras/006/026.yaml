theological_decisions:
- issue: Rendering of κύριος in the phrase παῖδα Κυρίου
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project default renders κύριος as 'Lord.' In this Jewish-scriptural
    context it carries reverential weight and should not be flattened to 'master.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering of παῖς for Zerubbabel
  chosen_reading: servant
  alternative_readings:
  - child
  rationale: The phrase is honorific and covenantal rather than biological. 'Servant
    of the Lord' preserves biblical idiom without importing messianic claims beyond
    the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
