translation:
  text: He also ordered Sisinnes, governor of Syria and Phoenicia, and Sathrabuzanes
    and their associates and the appointed governors in Syria and Phoenicia, to keep
    away from the place, but to leave Zerubbabel, the servant of the Lord and governor
    of Judea, and the elders of the Jews alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'allow Zerubbabel, the servant of the Lord, governor of Judea, and the
      elders of the Jews to proceed.' The Greek literally says 'leave' or 'permit,'
      in a context of official noninterference.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσετάξεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders
  lexicon: LSJ
  rationale: Aorist of προστάσσω denotes issuing an authoritative directive. 'Ordered'
    is clear modern English and preserves the force without sounding overly stiff.
- source_word: ἐπιμεληθῆναι
  chosen: ordered
  alternatives:
  - gave instructions concerning
  - charged
  lexicon: LSJ
  rationale: In the construction προσετάξεν ... ἐπιμεληθῆναι, the infinitive expresses
    the content of the order. Rather than woodenly reproducing both verbs, English
    idiom is best served by folding the sense into 'ordered ... to,' while preserving
    the directive force.
- source_word: ἐπάρχῳ
  chosen: governor
  alternatives:
  - satrap
  - prefect
  lexicon: LSJ
  rationale: The term denotes a provincial ruler/administrator. 'Governor' is the
    most natural and broadly intelligible equivalent in this context.
- source_word: συνεταίροις
  chosen: associates
  alternatives:
  - colleagues
  - companions
  - fellow officials
  lexicon: LSJ
  rationale: Here the word refers to administrative associates rather than intimate
    companions. 'Associates' fits the official setting and remains readable.
- source_word: ἀποτεταγμένοις ... ἡγεμόσιν
  chosen: the appointed governors
  alternatives:
  - the designated leaders
  - the officials assigned
  lexicon: LSJ
  rationale: The participle ἀποτεταγμένοις conveys being assigned/appointed, and ἡγεμόσιν
    refers to rulers or governors. The combined rendering preserves both elements
    in natural English.
- source_word: ἀπέχεσθαι τοῦ τόπου
  chosen: to keep away from the place
  alternatives:
  - to stay away from the place
  - to refrain from interfering with the place
  lexicon: LSJ
  rationale: Literally 'to keep away from the place.' In context the sense is noninterference
    with the temple site. 'Keep away from the place' preserves the spatial wording
    while implying official noninterference.
- source_word: ἐᾶσαι
  chosen: to leave ... alone
  alternatives:
  - to permit
  - to allow
  lexicon: LSJ
  rationale: The infinitive means to allow/let be. Because the preceding clause concerns
    officials keeping away, 'leave ... alone' captures the practical sense of noninterference
    more idiomatically.
- source_word: παῖδα Κυρίου
  chosen: the servant of the Lord
  alternatives:
  - the child of the Lord
  - the boy of the Lord
  lexicon: LSJ
  rationale: Although παῖς can mean child or servant, in a royal-administrative and
    honorific biblical context 'servant' is the established and contextually appropriate
    sense. κύριος is rendered 'Lord' per doctrine.
- source_word: ὕπαρχον
  chosen: governor
  alternatives:
  - ruler
  - administrator
  lexicon: LSJ
  rationale: The term denotes one in authority over a region. 'Governor' matches the
    administrative context and aligns with ἐπάρχῳ without forcing an artificial distinction
    in English.
- source_word: πρεσβυτέρους
  chosen: elders
  alternatives:
  - older men
  - leaders
  lexicon: LSJ
  rationale: In Jewish communal context, 'elders' is the standard rendering and likely
    denotes recognized leaders rather than merely aged men.
