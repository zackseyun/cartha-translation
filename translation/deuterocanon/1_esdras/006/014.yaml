translation:
  text: And because our fathers, by provoking him, sinned against the Lord of Israel,
    the heavenly One, he gave them into the hands of Nebuchadnezzar king of Babylon,
    king of the Chaldeans;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the God of heaven.' The Greek reads 'the heavenly One,' while related
      Ezra tradition often uses the fuller title 'God of heaven.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπεὶ
  chosen: because
  alternatives:
  - since
  - when
  lexicon: BDAG
  rationale: Introduces the causal ground for the exile in this sentence. 'Because'
    best captures the explanatory force in natural English.
- source_word: οἱ πατέρες ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: BDAG
  rationale: A conventional and accurate rendering of the familial-historical expression.
    'Ancestors' is possible, but 'fathers' preserves the source wording and the communal
    memory register.
- source_word: παραπικράναντες
  chosen: by provoking him
  alternatives:
  - having embittered him
  - having provoked him to anger
  lexicon: BDAG
  rationale: The participle conveys provoking or embittering God through rebellion.
    'By provoking him' is idiomatic and preserves the causal-participial sense without
    overexpanding. The object 'him' is implicit from the context of sinning against
    the Lord.
- source_word: ἥμαρτον
  chosen: sinned
  alternatives:
  - committed sin
  - went wrong
  lexicon: BDAG
  rationale: Standard rendering of the verb for sin; concise and theologically appropriate.
- source_word: εἰς τὸν κύριον τοῦ Ἰσραὴλ
  chosen: against the Lord of Israel
  alternatives:
  - against the Lord, the God of Israel
  - toward the Lord of Israel
  lexicon: BDAG
  rationale: With ἁμαρτάνω, the preposition here is best represented idiomatically
    in English as 'against.' The Greek text reads 'Lord of Israel'; this is retained
    rather than importing 'God' from parallel traditions.
- source_word: τὸν οὐράνιον
  chosen: the heavenly One
  alternatives:
  - the heavenly one
  - the one in heaven
  - the God of heaven
  lexicon: BDAG
  rationale: The adjective functions substantivally and appositionally to 'the Lord
    of Israel.' 'The heavenly One' preserves the Greek wording without importing the
    fuller title 'God of heaven,' which is not what Swete's Greek reads here, though
    the Semitic parallel supports a heavenly/divine designation.
- source_word: παρέδωκεν
  chosen: he gave
  alternatives:
  - he handed over
  - he delivered
  lexicon: BDAG
  rationale: In exile/judgment contexts the verb often means handing over to an enemy.
    'He gave' is slightly more formal and matches the simple verbal force here; the
    hostile sense is clarified by 'into the hands of.'
- source_word: εἰς χεῖρας
  chosen: into the hands of
  alternatives:
  - over to
  - into the power of
  lexicon: BDAG
  rationale: This is a standard idiom for being delivered into another's power. The
    literal expression is retained because it is clear in English and preserves biblical
    texture.
- source_word: Ναβουχοδονοσὸρ
  chosen: Nebuchadnezzar
  alternatives:
  - Nabuchodonosor
  lexicon: LSJ
  rationale: Standard English transliteration aligned with the well-known Babylonian
    king, even though the Greek form is closer to 'Nabuchodonosor.' This follows the
    project's principle to transliterate names by standard conventions.
- source_word: βασιλέως Βαβυλῶνος, βασιλέως τῶν Χαλδαίων
  chosen: king of Babylon, king of the Chaldeans
  alternatives:
  - the king of Babylon, the king of the Chaldeans
  lexicon: BDAG
  rationale: Both royal titles are retained because the Greek repeats them for emphasis/apposition.
    Omitting one would flatten the source.
