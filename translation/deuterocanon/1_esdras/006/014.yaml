theological_decisions:
- issue: Divine title τὸν οὐράνιον in apposition to 'the Lord of Israel'
  chosen_reading: the heavenly One
  alternative_readings:
  - the God of heaven
  - the one in heaven
  rationale: The Greek source text has the adjectival substantive 'the heavenly [one],'
    not the fuller phrase 'God of heaven.' Because the project prioritizes the Greek
    witness for 1 Esdras while using the Semitic parallel as a control, the main text
    preserves the Greek form. A footnote records the more expansive alternative familiar
    from related Ezra tradition.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering κύριος
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The doctrine table specifies 'Lord' as the default rendering for κύριος.
    There is no compelling contextual reason here to vary from that default.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
