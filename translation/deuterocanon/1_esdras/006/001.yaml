theological_decisions:
- issue: Rendering κύριος in a Jewish-scriptural context
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The Greek source reads Κυρίου, and project doctrine specifies 'Lord'
    as the default for κύριος. Small caps 'LORD' are reserved for Hebrew YHWH in Hebrew-source
    contexts; here the primary source is Greek.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: How to render the prophetic relation expressed by ἐπὶ/עַל
  chosen_reading: prophesied to the Jews ... over them
  alternative_readings:
  - prophesied against the Jews
  - prophesied concerning the Jews
  rationale: The verse uses ἐπί twice, and the MT parallel uses עַל twice. In context
    the prophets are commissioned toward the Judean community, not denouncing them
    as enemies. The first instance is rendered dynamically as audience-directed ('to
    the Jews'); the second is kept more formally as 'over them' to preserve the source's
    closing emphasis and avoid collapsing both phrases into identical English.
