translation:
  text: Now in the second year of the reign of Darius, Haggai and Zechariah son of
    Iddo, the prophets, prophesied to the Jews who were in Judea and Jerusalem, in
    the name of the Lord, the God of Israel, over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judah and Jerusalem,' following the Hebrew parallel more closely; the
      Greek reads 'Judea and Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: The closing phrase 'over them' could also be understood as 'concerning them'
      or, less likely in context, simply 'to them.' The Greek and Hebrew both preserve
      this somewhat compressed wording.
    reason: alternative_reading
  - marker: c
    text: The Greek text has a duplicated article before 'prophets' ('the the prophets'),
      likely a scribal or transmission irregularity; the translation gives the intended
      sense.
    reason: textual_variant
lexical_decisions:
- source_word: Ἐν δὲ τῷ δευτέρῳ ἔτει
  chosen: Now in the second year
  alternatives:
  - And in the second year
  - In the second year
  lexicon: LSJ
  rationale: δέ is lightly connective; 'Now' preserves narrative progression without
    overtranslating. The temporal dative phrase is rendered straightforwardly.
- source_word: τῆς Δαρείου βασιλείας
  chosen: of the reign of Darius
  alternatives:
  - of Darius's reign
  - of King Darius
  lexicon: LSJ
  rationale: βασιλεία here denotes kingship/reign rather than the abstract 'kingdom.'
    The genitive construction is most naturally rendered 'of the reign of Darius.'
- source_word: ἐπροφήτευσεν
  chosen: prophesied
  alternatives:
  - spoke as prophets
  - uttered prophecy
  lexicon: BDAG
  rationale: The aorist verb is the standard term for prophetic activity. English
    'prophesied' is both accurate and natural.
- source_word: Ἀγγαῖος καὶ Ζαχαρίας ὁ τοῦ Ἐδδεὶν
  chosen: Haggai and Zechariah son of Iddo
  alternatives:
  - Haggai and Zechariah the son of Iddin/Iddo
  - Haggai and Zechariah, son of Iddo
  lexicon: LSJ
  rationale: The Greek reflects the Semitic patronymic also seen in the MT parallel
    (בַר־עִדּוֹא). Standard English biblical name form is 'Iddo.' The singular patronymic
    most naturally modifies Zechariah, not both prophets.
- source_word: οἱ οἱ προφῆται
  chosen: the prophets
  alternatives:
  - the prophet(s)
  lexicon: LSJ
  rationale: 'Despite the duplicated article in Swete''s text, the sense is plainly
    appositional/plural: Haggai and Zechariah are identified as ''the prophets.''
    The duplication is best treated as a textual irregularity, not represented in
    translation.'
- source_word: ἐπὶ τοὺς Ἰουδαίους
  chosen: to the Jews
  alternatives:
  - against the Jews
  - over the Jews
  - concerning the Jews
  lexicon: BDAG
  rationale: With verbs of speaking/prophesying, ἐπί can mark direction toward an
    audience or object. The MT parallel עַל־יְהוּדָיֵא likewise supports prophetic
    address directed to them, not hostility against them.
- source_word: τοὺς ἐν τῇ Ἰουδαίᾳ καὶ Ἰερουσαλήμ
  chosen: who were in Judea and Jerusalem
  alternatives:
  - who were in Judah and Jerusalem
  - in Judea and in Jerusalem
  lexicon: LSJ
  rationale: Ἰουδαία in Greek commonly corresponds to the region 'Judea'; the parallel
    Hebrew has 'in Judah and in Jerusalem.' Given the Greek source's regional form,
    'Judea' is preferred while preserving the place pairing.
- source_word: ἐπὶ τῷ ὀνόματι Κυρίου θεοῦ Ἰσραήλ
  chosen: in the name of the Lord, the God of Israel
  alternatives:
  - by the name of the Lord God of Israel
  - under the name of the Lord, God of Israel
  lexicon: BDAG
  rationale: This phrase signals prophetic authorization. 'In the name of' is idiomatic
    English and matches the Semitic parallel בְּשֻׁם. κύριος is rendered 'Lord' per
    project doctrine.
- source_word: ἐπ’ αὐτούς
  chosen: over them
  alternatives:
  - upon them
  - concerning them
  - to them
  lexicon: BDAG
  rationale: The final phrase is somewhat awkward in Greek but corresponds closely
    to the MT parallel עֲלֵיהוֹן ('over/concerning them'). 'Over them' preserves the
    source wording and leaves the sense of prophetic commission/jurisdiction intact
    without overinterpretation.
