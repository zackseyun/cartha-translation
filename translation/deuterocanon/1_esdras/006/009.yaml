translation:
  text: with costly hewn stones, with timber laid in the buildings, and those works
    being done with diligence, and the work prospering in their hands, being completed
    with all glory and care.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with haste' for 'with diligence'; the Greek phrase ἐπὶ σπουδῆς can emphasize
      urgency as well as earnest care.
    reason: lexical_alternative
  - marker: b
    text: '''Glory'' here likely carries the sense of splendor or magnificence in
      the workmanship, not only honor in an abstract sense.'
    reason: cultural_note
lexical_decisions:
- source_word: λίθων ξυστῶν πολυτελῶν
  chosen: costly hewn stones
  alternatives:
  - expensive polished stones
  - precious dressed stones
  lexicon: LSJ
  rationale: λίθοι are stones; ξυστῶν here describes worked/dressed stone rather than
    raw fieldstone; πολυτελῶν adds the sense of costly or luxurious quality. 'Hewn
    stones' is natural English for worked building stone and stays close to the construction
    context.
- source_word: ξύλων τιθεμένων ἐν τοῖς οἴκοις
  chosen: timber laid in the buildings
  alternatives:
  - wood being set in the houses
  - beams placed in the structures
  lexicon: LSJ
  rationale: ξύλων is best rendered 'timber/wood'; τιθεμένων is a participle meaning
    being placed or laid; οἴκοις in this construction refers to the building structures/rooms
    rather than domestic houses specifically. 'Timber laid in the buildings' preserves
    the construction imagery.
- source_word: τὰ ἔργα ἐκεῖνα ἐπὶ σπουδῆς γινόμενα
  chosen: those works being done with diligence
  alternatives:
  - those works being done with haste
  - those works being carried out earnestly
  lexicon: BDAG/LSJ
  rationale: σπουδή can denote eagerness, diligence, earnestness, and in some contexts
    haste. In a royal building report, 'with diligence' best captures careful energetic
    execution without implying recklessness.
- source_word: εὐοδούμενον τὸ ἔργον ἐν ταῖς χερσὶν αὐτῶν
  chosen: the work prospering in their hands
  alternatives:
  - the work succeeding in their hands
  - the work advancing under their hands
  lexicon: LSJ
  rationale: εὐοδόω means to prosper or succeed. The idiom 'in their hands' is retained
    because it is transparent in English and reflects the source's agency idiom.
- source_word: ἐν πάσῃ δόξῃ καὶ ἐπιμελείᾳ συντελούμενα
  chosen: being completed with all glory and care
  alternatives:
  - being finished with every splendor and diligence
  - being brought to completion with full honor and carefulness
  lexicon: LSJ
  rationale: συντελούμενα means being completed or brought to completion. δόξα in
    this architectural context can suggest splendor/glory; ἐπιμέλεια is care, attention,
    diligence. 'With all glory and care' preserves the elevated tone while remaining
    readable.
