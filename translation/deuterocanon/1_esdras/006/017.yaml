theological_decisions:
- issue: Rendering of temple terminology distinction between οἶκος (Jerusalem sanctuary)
    and ναός (Babylonian temple)
  chosen_reading: Translate οἶκος as 'house' for Jerusalem and ναός as 'temple' for
    Babylon
  alternative_readings:
  - Translate both as 'temple' for smoother English
  rationale: The Greek uses different nouns in this verse. Preserving the distinction
    increases transparency to the source and avoids flattening the wording, even though
    both refer to cultic buildings in context.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 5
- issue: Proper name Σαβανασσάρῳ
  chosen_reading: Use 'Sanabassar' in the main text, with 'Sheshbazzar' preserved
    in a footnote
  alternative_readings:
  - Sheshbazzar in the main text
  rationale: The project prioritizes the Greek witness for 1 Esdras and transliterates
    names rather than harmonizing them to MT-based forms. Because readers may identify
    the figure with the better-known Sheshbazzar of Ezra, the alternative is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md § Translation philosophy 2, 3
