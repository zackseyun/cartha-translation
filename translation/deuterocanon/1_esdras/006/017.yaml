translation:
  text: And the holy vessels, the gold and the silver ones, which Nebuchadnezzar had
    carried out from the house in Jerusalem and deposited in his own temple—Cyrus
    the king again brought them out from the temple in Babylon, and they were handed
    over to Zerubbabel and to Sanabassar the governor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Σαβανασσάρ; likely corresponding to the name often rendered 'Sheshbazzar'
      in Ezra.
    reason: alternative_reading
lexical_decisions:
- source_word: ἱερὰ σκεύη
  chosen: holy vessels
  alternatives:
  - sacred vessels
  - temple vessels
  lexicon: LSJ
  rationale: ἱερά marks the items as consecrated/sacred, and σκεύη are vessels/articles.
    'Holy vessels' is concise and preserves cultic force without over-specifying their
    exact form.
- source_word: τὰ χρυσᾶ καὶ τὰ ἀργυρᾶ
  chosen: the gold and the silver ones
  alternatives:
  - the gold and silver vessels
  - the golden and silver vessels
  lexicon: LSJ
  rationale: The adjectives are substantivized and refer back to σκεύη. English requires
    some smoothing; 'the gold and the silver ones' preserves the Greek emphasis on
    the two classes, though the main sentence still makes clear they are vessels.
- source_word: ἐξήνεγκεν
  chosen: had carried out / brought out
  alternatives:
  - took out
  - removed
  lexicon: LSJ
  rationale: The verb means 'bring/carry out.' For Nebuchadnezzar the pluperfect sense
    is natural in English narrative ('had carried out'); for Cyrus later in the verse,
    simple past 'brought out' fits the sequence.
- source_word: οἴκου τοῦ ἐν Ἰερουσαλήμ
  chosen: the house in Jerusalem
  alternatives:
  - the temple in Jerusalem
  - the house that was in Jerusalem
  lexicon: LSJ
  rationale: οἶκος literally means 'house,' and in this context refers to the temple.
    Because ναός appears later for the pagan temple, rendering οἶκος as 'house' preserves
    the lexical distinction while still being intelligible.
- source_word: ἀπηρείσατο
  chosen: deposited
  alternatives:
  - set down
  - placed
  - stored
  lexicon: LSJ
  rationale: The sense is that Nebuchadnezzar placed the vessels in his own temple.
    'Deposited' conveys deliberate placement in a treasury/temple setting better than
    the more generic 'placed.'
- source_word: ἐν τῷ αὐτοῦ ναῷ
  chosen: in his own temple
  alternatives:
  - in his temple
  - in his shrine
  lexicon: LSJ
  rationale: ναός here refers to the temple of Nebuchadnezzar's god(s), not the Jerusalem
    house. 'His own temple' makes the possessive contrast explicit.
- source_word: πάλιν
  chosen: again
  alternatives:
  - in turn
  - back
  lexicon: LSJ
  rationale: 'πάλιν marks reversal/restoration: Cyrus brought them out again, undoing
    their earlier removal. ''Again'' is the most direct rendering.'
- source_word: τοῦ ναοῦ τοῦ ἐν Βαβυλωνίᾳ
  chosen: the temple in Babylon
  alternatives:
  - the shrine in Babylonia
  - the temple that was in Babylon
  lexicon: LSJ
  rationale: ναός is naturally 'temple.' Βαβυλωνία can denote Babylonia, but in this
    narrative setting 'Babylon' is the more idiomatic English location.
- source_word: παρεδόθη
  chosen: they were handed over
  alternatives:
  - they were delivered
  - they were entrusted
  lexicon: LSJ
  rationale: The passive indicates formal transfer of custody. 'Handed over' is clear
    modern English and preserves the administrative sense.
- source_word: Ζοροβαβὲλ
  chosen: Zerubbabel
  alternatives:
  - Zorobabel
  lexicon: transliteration
  rationale: Standard English transliteration aligned with the better-known biblical
    form and supported by the Semitic parallel tradition.
- source_word: Σαβανασσάρῳ
  chosen: Sanabassar
  alternatives:
  - Sheshbazzar
  - Sabanassar
  lexicon: transliteration
  rationale: The Greek form in 1 Esdras is Σαβανασσάρ. Since personal names are transliterated,
    the main text follows the Greek witness as primary. The Hebrew/Aramaic parallel
    tradition supports preserving 'Sheshbazzar' as an alternative in a footnote.
- source_word: τῷ ἐπάρχῳ
  chosen: the governor
  alternatives:
  - the prefect
  - the provincial governor
  lexicon: LSJ
  rationale: ἔπαρχος denotes a governor/official administrator. 'Governor' is the
    clearest natural equivalent in English.
