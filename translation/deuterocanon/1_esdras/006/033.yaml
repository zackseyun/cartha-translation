translation:
  text: I, King Darius, have decreed that this be done carefully according to these
    instructions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'according to these things.' The phrase refers to the
      preceding provisions of Darius's decree.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ
  chosen: I
  lexicon: LSJ
  rationale: Explicit first-person pronoun retained for the emphatic royal self-reference
    in the decree formula.
- source_word: βασιλεὺς Δαρεῖος
  chosen: King Darius
  alternatives:
  - Darius the king
  lexicon: LSJ
  rationale: Both word order options are natural in English; 'King Darius' is concise
    and preserves the royal title attached to the personal name.
- source_word: δεδογμάτικα
  chosen: have decreed
  alternatives:
  - have issued a decree
  - have ordained
  lexicon: LSJ
  rationale: Perfect form conveys a formal royal decision now in force. 'Have decreed'
    is idiomatic, suitably official, and closely matches the administrative sense.
- source_word: ἐπιμελῶς
  chosen: carefully
  alternatives:
  - diligently
  - with care
  lexicon: LSJ
  rationale: Adverb stresses careful execution of the order. 'Carefully' is clear
    modern English; 'diligently' was possible but slightly more interpretive toward
    zeal rather than precision.
- source_word: κατὰ ταῦτα
  chosen: according to these instructions
  alternatives:
  - according to these things
  - in accordance with this
  lexicon: LSJ
  rationale: Literally 'according to these things,' but in decree context it points
    back to the preceding directives. 'According to these instructions' makes the
    referent clear in natural English without over-paraphrasing.
- source_word: γίνεσθαι
  chosen: be done
  alternatives:
  - take place
  - come to pass
  lexicon: LSJ
  rationale: Passive-like infinitive in context refers to carrying out the commanded
    actions. 'Be done' is the most direct administrative English equivalent.
