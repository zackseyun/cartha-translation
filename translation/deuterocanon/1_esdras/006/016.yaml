theological_decisions:
- issue: Referent of 'this house'
  chosen_reading: the phrase is left as 'this house' rather than expanded to 'this
    temple' in the main text
  alternative_readings:
  - this temple
  rationale: The Greek uses οἶκος, and the broader Ezra/Esdras context makes the temple
    referent clear. Retaining 'house' preserves the source's cultic idiom while remaining
    understandable.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Force of the royal writing
  chosen_reading: render ἔγραψεν with the simple verb 'wrote' rather than the interpretive
    'issued a decree'
  alternative_readings:
  - issued a decree
  rationale: The verse describes a royal written authorization, but the source text
    itself says 'wrote.' The translation avoids importing a stronger administrative
    term than the Greek explicitly states.
  doctrine_reference: Translation philosophy §1
