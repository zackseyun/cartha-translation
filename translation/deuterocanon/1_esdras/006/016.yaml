translation:
  text: Now in the first year of Cyrus reigning over the land of Babylonia, King Cyrus
    wrote that this house should be built,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'King Cyrus issued a decree that this house be built.' The Greek literally
      says 'wrote ... to build this house,' which in context refers to a royal written
      order.
    reason: lexical_alternative
  - marker: b
    text: '''This house'' refers to the temple in Jerusalem.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐν δὲ τῷ πρώτῳ ἔτει
  chosen: Now in the first year
  alternatives:
  - And in the first year
  - In the first year
  lexicon: LSJ
  rationale: ἐν with the dative marks time ('in'), while δέ is lightly connective.
    'Now' preserves the discourse transition without overstating contrast.
- source_word: βασιλεύοντος Κύρου
  chosen: of Cyrus reigning
  alternatives:
  - of Cyrus's reign
  - when Cyrus reigned
  lexicon: LSJ
  rationale: The genitive absolute is rendered with an English participial construction
    to preserve the temporal setting and the verbal force of βασιλεύοντος.
- source_word: χώρας Βαβυλωνίας
  chosen: over the land of Babylonia
  alternatives:
  - over Babylon
  - over the country of Babylonia
  - in the land of Babylonia
  lexicon: LSJ
  rationale: χώρα denotes land/country/territory rather than the city itself. 'Babylonia'
    better reflects the territorial sense than 'Babylon.' 'Over' fits the reigning
    context in English.
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - issued a decree
  - wrote an order
  lexicon: LSJ
  rationale: The Greek verb is simply 'wrote.' Although the sense is royal authorization,
    the text does not explicitly use a noun for decree here, so the more direct rendering
    is preferred.
- source_word: βασιλεὺς Κῦρος
  chosen: King Cyrus
  alternatives:
  - Cyrus the king
  lexicon: LSJ
  rationale: Standard English title-name order is natural and preserves the royal
    designation.
- source_word: οἰκοδομῆσαι
  chosen: that this house should be built
  alternatives:
  - to build this house
  - for this house to be built
  lexicon: LSJ
  rationale: After ἔγραψεν in this administrative context, the infinitive expresses
    the content of what was written/ordered. English idiom is clearer with a content
    clause, while retaining the passive-result sense appropriate to an official directive.
- source_word: τὸν οἶκον τοῦτον
  chosen: this house
  alternatives:
  - this temple
  - the house
  lexicon: LSJ
  rationale: οἶκος literally means 'house.' In this context it refers to the temple,
    but 'house' preserves the source wording and biblical idiom without importing
    an explanatory gloss into the main text.
