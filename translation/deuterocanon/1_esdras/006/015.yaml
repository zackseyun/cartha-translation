translation:
  text: They also tore down the house and burned it, and they took the people captive
    to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the house of God, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶκον
  chosen: the house
  alternatives:
  - the temple
  - the building
  lexicon: BDAG
  rationale: Literally 'house.' In this historical context it refers to the temple,
    but 'house' preserves the Greek wording and echoes biblical usage for the house
    of God without over-paraphrasing.
- source_word: καθελόντες
  chosen: tore down
  alternatives:
  - pulled down
  - demolished
  lexicon: BDAG
  rationale: The participle denotes taking down or demolishing. 'Tore down' is natural
    modern English and preserves the destructive force.
- source_word: ἐνεπύρισαν
  chosen: burned
  alternatives:
  - set on fire
  - burned down
  lexicon: BDAG
  rationale: The verb means to burn or set ablaze. 'Burned' is concise and sufficient
    in context; the prior clause already indicates destruction.
- source_word: λαὸν
  chosen: the people
  alternatives:
  - the populace
  - the nation
  lexicon: BDAG
  rationale: A collective reference to the people of Judah/Jerusalem. 'The people'
    is the most direct and idiomatic rendering.
- source_word: ᾐχμαλώτευσαν
  chosen: they took captive
  alternatives:
  - they led away captive
  - they exiled
  lexicon: BDAG
  rationale: The verb means to take as captives. 'They took captive' is straightforward;
    'exiled' would shift the image from capture to resettlement.
- source_word: εἰς Βαβυλῶνα
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: BDAG
  rationale: Standard directional rendering. 'To Babylon' is idiomatic English and
    fits the deportation context.
