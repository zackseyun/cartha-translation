translation:
  text: so that libations may be offered to God Most High for the king and his sons,
    and that they may pray for their welfare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drink offerings' for 'libations.'
    reason: lexical_alternative
  - marker: b
    text: The Greek literally says 'and that they may pray concerning them/for them';
      'for their welfare' makes explicit the likely sense in context, referring to
      the king and his sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: LSJ
  rationale: Introduces purpose; 'so that' is natural modern English while preserving
    the purposive force.
- source_word: προσφέρωνται
  chosen: may be offered
  alternatives:
  - may present
  - may bring
  lexicon: LSJ
  rationale: Passive/subjunctive sense fits the clause governed by ὅπως. 'Offered'
    is idiomatic for sacrificial context and matches cultic usage better than the
    more generic 'brought'.
- source_word: σπονδαὶ
  chosen: libations
  alternatives:
  - drink offerings
  lexicon: LSJ
  rationale: The Greek specifically denotes drink offerings/libations. 'Libations'
    is slightly more formal but precise; 'drink offerings' is a valid alternative
    preserved as a lexical alternative.
- source_word: τῷ θεῷ τῷ ὑψίστῳ
  chosen: to God Most High
  alternatives:
  - to the Most High God
  - to God, the Most High
  lexicon: LSJ
  rationale: This preserves both θεῷ and the epithet ὑψίστῳ. 'God Most High' is concise
    and natural in English, while retaining the title's theological weight.
- source_word: ὑπὲρ τοῦ βασιλέως καὶ τῶν παίδων
  chosen: for the king and his sons
  alternatives:
  - on behalf of the king and his children
  lexicon: LSJ
  rationale: ὑπέρ here expresses benefit/intercession. παῖδες can mean children or
    sons; in royal context 'sons' is the more likely and more specific rendering,
    matching dynastic language.
- source_word: προσεύχωνται
  chosen: they may pray
  alternatives:
  - they may offer prayers
  lexicon: LSJ
  rationale: Straightforward rendering of the subjunctive coordinated with the prior
    purpose clause.
- source_word: περὶ τῆς αὐτῶν
  chosen: for their welfare
  alternatives:
  - concerning them
  - for them
  - for their life
  lexicon: LSJ
  rationale: The Greek phrase is elliptical, with αὐτῶν referring back to the king
    and his sons. In this context of court-sponsored temple offerings and prayers,
    the sense is prayer for their well-being/prosperity. 'For their welfare' makes
    the implied object explicit in idiomatic English without overparaphrasing. The
    broader context and the Semitic parallel tradition support a benefactive sense
    rather than a merely referential 'concerning them'.
