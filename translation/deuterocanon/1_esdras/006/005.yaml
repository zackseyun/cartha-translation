translation:
  text: And the elders of the Jews found favor from the Lord, having been appointed
    over the captivity for oversight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having been appointed over the exiles.' The Greek phrase is compressed
      and may describe the elders as taking up oversight in relation to the returned
      community.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔσχον χάριν
  chosen: found favor
  alternatives:
  - had favor
  - received favor
  - obtained grace
  lexicon: BDAG
  rationale: The idiom ἔχειν χάριν commonly means to find or receive favor. 'Found
    favor' is natural English and preserves the sense of divine approval rather than
    abstract 'grace' in this narrative context.
- source_word: ἐπισκοπῆς
  chosen: to oversee
  alternatives:
  - for oversight
  - for visitation
  - for supervision
  lexicon: LSJ
  rationale: The noun ἐπισκοπή can denote oversight, visitation, or office of supervision.
    In this construction with γενόμενοι ἐπὶ, the sense is that they came into a role
    of oversight regarding the captivity/exiles. 'To oversee' gives readable English
    while preserving the administrative nuance.
- source_word: γενόμενοι ἐπὶ τὴν αἰχμαλωσίαν
  chosen: having come to oversee the captivity
  alternatives:
  - having been appointed over the exiles
  - having come over the captivity
  - having become responsible for the exiles
  lexicon: LSJ
  rationale: γενόμενοι with ἐπὶ + accusative can indicate entering into a role or
    position over something. αἰχμαλωσία literally means captivity/exile. Because the
    Greek wording is somewhat compressed and the MT parallel does not directly match
    this clause, the translation keeps the literal 'captivity' while expressing the
    likely functional sense of supervision.
- source_word: παρὰ τοῦ κυρίου
  chosen: from the Lord
  alternatives:
  - by the Lord
  - at the Lord's hand
  lexicon: BDAG
  rationale: παρά with genitive here marks source. 'From the Lord' is the most straightforward
    rendering and preserves the theological claim that this favor originates with
    the Lord.
- source_word: οἱ πρεσβύτεροι τῶν Ἰουδαίων
  chosen: the elders of the Jews
  alternatives:
  - the Jewish elders
  - the elders of Judah
  lexicon: BDAG
  rationale: Ἰουδαῖοι in this period usually refers to Jews/Judeans. Since the phrase
    is ethnoreligious rather than strictly territorial here, 'the elders of the Jews'
    is preferred. 'Jewish elders' is possible but slightly less transparent to the
    Greek structure.
