theological_decisions:
- issue: Rendering κύριος
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: DOCTRINE.md gives 'Lord' as the default rendering for κύριος. Although
    the MT parallel uses a divine title for the God of Israel, the Greek source text
    here reads κύριος, so 'Lord' is retained.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Interpreting αἰχμαλωσία
  chosen_reading: captivity
  alternative_readings:
  - exiles
  - exile
  rationale: The Greek noun literally denotes captivity/exile. Because the clause
    is syntactically difficult and the Hebrew parallel does not directly correspond,
    the main text keeps 'captivity' to stay close to the Greek, while the lexical
    note records the possible sense 'exiles.'
  doctrine_reference: 'Translation philosophy: preserve source ambiguity rather than
    over-resolve'
