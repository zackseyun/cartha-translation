translation:
  text: Likewise also wheat and salt and wine and oil continually year by year, as
    the priests in Jerusalem may direct, are to be used up day by day without dispute,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without fail' / 'without question.' The Greek adverb can emphasize either
      the absence of objection or the certainty of compliance.
    reason: lexical_alternative
lexical_decisions:
- source_word: πυρὸν
  chosen: wheat
  alternatives:
  - grain
  lexicon: LSJ
  rationale: The accusative singular of πυρός commonly denotes wheat specifically,
    not grain in general. 'Wheat' preserves the concrete sense of the provision list.
- source_word: ἅλα
  chosen: salt
  lexicon: LSJ
  rationale: Straightforward cultic supply item; no contextual reason to vary the
    standard gloss.
- source_word: οἶνον
  chosen: wine
  lexicon: LSJ
  rationale: Standard rendering for the sacrificial provision list.
- source_word: ἔλαιον
  chosen: oil
  alternatives:
  - olive oil
  lexicon: LSJ
  rationale: In this context the referent is olive oil, but 'oil' is the natural English
    equivalent and sufficiently clear in a biblical sacrificial list.
- source_word: ἐνδελεχῶς
  chosen: continually
  alternatives:
  - regularly
  - without interruption
  lexicon: LSJ
  rationale: The adverb conveys ongoing regular provision. 'Continually' fits the
    administrative tone and pairs well with the following temporal phrase.
- source_word: κατʼ ἐνιαυτόν
  chosen: year by year
  alternatives:
  - annually
  - each year
  lexicon: LSJ
  rationale: Literally 'according to year'; 'year by year' preserves the distributive
    sense better than the more compressed 'annually'.
- source_word: ὑπαγορεύσωσιν
  chosen: may direct
  alternatives:
  - may prescribe
  - may specify
  lexicon: LSJ
  rationale: The verb here refers to giving instructions or specifying what is needed.
    'May direct' is idiomatic and keeps the priests as the ones determining the required
    amounts.
- source_word: ἀναλίσκεσθαι
  chosen: are to be used up
  alternatives:
  - are to be consumed
  - are to be spent
  lexicon: LSJ
  rationale: In context of sacrificial supplies, the sense is consumption/use in worship.
    'Used up' avoids implying only eating while still reflecting actual expenditure
    of supplies.
- source_word: καθʼ ἡμέραν
  chosen: day by day
  alternatives:
  - daily
  lexicon: LSJ
  rationale: The distributive phrase is slightly more explicit than 'daily' and matches
    the recurring-supply sense.
- source_word: ἀναμφισβητήτως
  chosen: without dispute
  alternatives:
  - without fail
  - without question
  lexicon: LSJ
  rationale: The adverb literally carries the sense of being undisputed or unquestioned.
    In this royal-administrative context it likely means the supplies are to be provided
    without objection or contest; 'without dispute' preserves that force most transparently.
