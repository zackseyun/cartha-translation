theological_decisions:
- issue: Cultic terminology in a Persian royal decree concerning the temple
  chosen_reading: offer sacrifices with continual fire
  alternative_readings:
  - sacrifice by perpetual fire
  rationale: The verse concerns temple worship and construction funding. The rendering
    preserves sacrificial language without importing later theological categories.
    'Continual fire' reflects the cultic setting while staying close to the Greek.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Administrative sense of 'house of Cyrus'
  chosen_reading: from the house of Cyrus the king
  alternative_readings:
  - from the treasury of Cyrus the king
  rationale: The text likely refers to royal funds, but the Greek wording is literally
    'house.' To avoid over-resolving the administrative nuance, the main text keeps
    the literal expression and preserves the treasury sense in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
