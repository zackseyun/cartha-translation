translation:
  text: Let them offer sacrifices with continual fire, whereof the height is sixty
    cubits and the width sixty cubits, with three courses of polished stone and one
    course of new local timber; and let the expense be given from the house of Cyrus
    the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by perpetual fire.' The Greek phrase may be understood instrumentally,
      but here it is taken to describe the continual sacrificial fire.
    reason: lexical_alternative
  - marker: b
    text: '''House of Cyrus'' likely refers to the royal treasury or court resources.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θύουσιν
  chosen: Let them offer sacrifices
  alternatives:
  - they offer sacrifices
  - let them sacrifice
  lexicon: LSJ
  rationale: The verb θύω commonly means to offer sacrifice. Given the decree-like
    context and the surrounding infinitival/jussive sequence, English 'Let them offer
    sacrifices' best captures the prescriptive force rather than a simple indicative.
- source_word: διὰ πυρὸς ἐνδελεχοῦς
  chosen: with continual fire
  alternatives:
  - by perpetual fire
  - with unceasing fire
  lexicon: LSJ
  rationale: ἐνδελεχής conveys continuity or constancy. The phrase likely describes
    ongoing sacrificial fire rather than a means in a narrow instrumental sense. 'With
    continual fire' is idiomatic and preserves the cultic sense.
- source_word: οὓ
  chosen: whose
  alternatives:
  - which
  - whereof
  lexicon: LSJ
  rationale: The relative pronoun introduces the specifications of the structure.
    'Whose' naturally links the dimensions to the building just mentioned or implied
    in context.
- source_word: τὸ ὕψος ... πλάτος
  chosen: height ... width
  alternatives:
  - height ... breadth
  lexicon: LSJ
  rationale: These are straightforward dimensional terms. 'Width' is more natural
    modern English than 'breadth' while remaining accurate.
- source_word: δόμων λιθίνων ξυστῶν τριῶν
  chosen: three courses of polished stone
  alternatives:
  - three layers of hewn stone
  - three rows of dressed stone
  lexicon: LSJ
  rationale: δόμος here refers to a building course/layer, and ξυστός denotes smoothed
    or dressed stone. 'Courses' is a natural architectural term in English.
- source_word: δόμου ξυλίνου ἐγχωρίου καινοῦ ἑνός
  chosen: one course of new local timber
  alternatives:
  - one layer of new native wood
  - one course of fresh local wood
  lexicon: LSJ
  rationale: ἐγχώριος means local/native. Retaining 'timber' fits the construction
    context better than generic 'wood.' 'New' is kept explicitly from καινοῦ.
- source_word: τὸ δαπάνημα
  chosen: the expense
  alternatives:
  - the cost
  - the expenditure
  lexicon: LSJ
  rationale: δαπάνημα refers to the expense/cost involved. 'Expense' is concise and
    natural in a royal-decree context.
- source_word: δοθῆναι
  chosen: let ... be given
  alternatives:
  - to be given
  - be paid
  lexicon: LSJ
  rationale: The infinitive functions imperativally within the decree. English 'let
    ... be given' reflects that force more clearly than a bare infinitive.
- source_word: ἐκ τοῦ οἴκου Κύρου τοῦ βασιλέως
  chosen: from the house of Cyrus the king
  alternatives:
  - from the treasury of Cyrus the king
  - from the palace of King Cyrus
  lexicon: LSJ
  rationale: οἶκος literally means house. In administrative context it may imply royal
    house/treasury, but the Greek says 'house'; this is preserved in the main text,
    with the fiscal nuance left implicit.
