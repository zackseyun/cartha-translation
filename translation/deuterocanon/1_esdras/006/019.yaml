theological_decisions:
- issue: Rendering Κυρίου in a temple-context phrase
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The Greek source reads Κυρίου, and the project's default for κύριος is
    'Lord.' Although the underlying Hebrew parallel would point to the divine name
    in related Ezra material, this verse is translated from the Greek witness, so
    'the Lord' is retained.
