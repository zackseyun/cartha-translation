translation:
  text: Then Sanabassar came and laid the foundations of the house of the Lord in
    Jerusalem, and from that time until now it has been under construction and has
    not reached completion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sanabassar is commonly identified with Sheshbazzar in the Ezra tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: Σαναβάσσαρος
  chosen: Sanabassar
  alternatives:
  - Sheshbazzar
  lexicon: LSJ
  rationale: Personal names are transliterated rather than translated. The Greek form
    here is Σαναβάσσαρος, so the main text follows the Greek witness directly as 'Sanabassar.'
    The Hebrew/Aramaic parallel tradition behind Ezra is commonly represented in English
    as 'Sheshbazzar,' which is preserved as an alternative because the figures are
    generally identified.
- source_word: παραγενόμενος
  chosen: came
  alternatives:
  - arrived
  - appeared
  lexicon: BDAG
  rationale: The participle marks Sanabassar's arrival prior to the main action. 'Came'
    is natural modern English and adequately conveys the movement without overtranslating.
- source_word: εἰσεβάλλετο
  chosen: laid
  alternatives:
  - set
  - put in
  - cast in
  lexicon: LSJ
  rationale: With τοὺς θεμελίους ('the foundations'), the idiomatic sense is that
    he laid or set the foundations. A more literal 'cast in' would sound unnatural
    in English and obscure the building context.
- source_word: τοὺς θεμελίους
  chosen: the foundations
  alternatives:
  - foundation stones
  lexicon: LSJ
  rationale: Standard architectural term. 'The foundations' is clear and sufficiently
    formal; 'foundation stones' is possible but more specific than the Greek requires.
- source_word: τοῦ οἴκου Κυρίου
  chosen: of the house of the Lord
  alternatives:
  - of the Lord's house
  - of the temple of the Lord
  lexicon: LSJ
  rationale: '''House of the Lord'' preserves the biblical idiom and reflects the
    Greek closely. ''Temple'' is interpretively accurate in context but less transparent
    to the source wording.'
- source_word: τοῦ ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - that is in Jerusalem
  lexicon: LSJ
  rationale: The article-participle construction identifies the location of the house.
    In English, simple apposition 'in Jerusalem' communicates this naturally.
- source_word: ἀπ᾽ ἐκείνου μέχρι τοῦ νῦν
  chosen: from that time until now
  alternatives:
  - from then until the present
  lexicon: BDAG
  rationale: This temporal phrase is straightforward. 'From that time until now' is
    idiomatic and preserves the continuity emphasized by the Greek.
- source_word: οἰκοδομουμένου
  chosen: it has been under construction
  alternatives:
  - it is being built
  - it has been being built
  lexicon: BDAG
  rationale: The participial form indicates an ongoing building process up to the
    present reference point. 'It has been under construction' expresses the durative
    sense in natural English better than a wooden present passive.
- source_word: οὐκ ἔλαβεν συντέλειαν
  chosen: has not reached completion
  alternatives:
  - has not been completed
  - did not receive completion
  - has not come to an end
  lexicon: BDAG
  rationale: Literally, it 'did not receive completion.' In English, 'has not reached
    completion' preserves the result-oriented sense while remaining readable. 'Has
    not been completed' is also possible, but the chosen wording better reflects the
    Greek verbal idea.
