translation:
  text: Then we questioned these elders, saying, ‘Who commanded you to build this
    house and—’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text of this verse, as preserved in Swete, ends abruptly with
      'and,' indicating that the sentence continues in the next verse. The English
      keeps that unfinished form rather than smoothing it out.
    reason: textual_variant
  - marker: b
    text: '''This house'' refers to the temple in Jerusalem.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐπυνθανόμεθα
  chosen: we questioned
  alternatives:
  - we inquired of
  - we asked
  lexicon: LSJ
  rationale: The imperfect/middle form conveys an act of asking for information. 'Questioned'
    fits the official investigative setting better than the softer 'asked,' while
    remaining natural English.
- source_word: τῶν πρεσβυτέρων τούτων
  chosen: these elders
  alternatives:
  - these older men
  - these leaders
  lexicon: LSJ
  rationale: πρεσβύτεροι here refers to recognized community elders/leaders, not merely
    men advanced in age. 'Elders' preserves the social-political role.
- source_word: Τίνος ὑμῖν προστάξαντος
  chosen: Who gave you the order
  alternatives:
  - By whose command
  - Who commanded you
  lexicon: LSJ
  rationale: The genitive absolute asks for the authority behind the action. 'Who
    gave you the order' is idiomatic modern English and preserves the sense of delegated
    authorization.
- source_word: οἰκοδομεῖτε
  chosen: to build
  alternatives:
  - you are building
  - to rebuild
  lexicon: LSJ
  rationale: In English indirect-question style after 'gave you the order,' the infinitival
    'to build' is smoother than retaining a finite verb. 'Rebuild' is possible contextually,
    but the Greek here simply says 'build,' so the more direct rendering is preferred.
- source_word: τὸν οἶκον τοῦτον
  chosen: this house
  alternatives:
  - this temple
  - this building
  lexicon: LSJ
  rationale: οἶκος literally means 'house.' In this context it refers to the temple,
    but 'house' preserves the source wording and biblical idiom without over-specifying
    beyond the Greek.
