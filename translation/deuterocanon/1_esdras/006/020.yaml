theological_decisions:
- issue: Rendering of κύριος within the court formula τοῦ κυρίου βασιλέως
  chosen_reading: my lord the king
  alternative_readings:
  - the lord king
  rationale: Although κύριος is normally rendered 'Lord' per doctrine, here it is
    part of a secular royal honorific, not a divine title. Lowercase 'lord' within
    the phrase best reflects the source sense and avoids false theological overtones.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; translate according
    to context while preserving meaning'
