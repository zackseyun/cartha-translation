translation:
  text: 'Now then, let it be determined, O king: let a search be made in the royal
    archives of my lord the king there in Babylon,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let it be decided, O king; let an examination be made in the royal record
      offices of the lord king in Babylon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  chosen: Now then
  alternatives:
  - Therefore now
  - So now
  lexicon: LSJ
  rationale: The pair marks a transition and inference. 'Now then' preserves both
    the temporal and logical force in natural English.
- source_word: κρίνεται
  chosen: let it be determined
  alternatives:
  - let judgment be made
  - let it be decided
  lexicon: LSJ
  rationale: The passive/impersonal form here introduces an official decision or adjudication.
    'Let it be determined' fits the administrative context better than the more judicial-sounding
    'judgment be made.'
- source_word: βασιλεῦ
  chosen: O king
  alternatives:
  - king
  lexicon: LSJ
  rationale: The vocative is direct address. 'O king' preserves the formal petitionary
    tone.
- source_word: ἐπισκεπτήτω
  chosen: let a search be made
  alternatives:
  - let him inspect
  - let inquiry be made
  - let it be examined
  lexicon: LSJ
  rationale: In context the verb calls for official examination of records. Because
    the object is archives, 'let a search be made' expresses the practical sense more
    clearly than a literal 'inspect.'
- source_word: βασιλικοῖς βιβλιοφυλακίοις
  chosen: the royal archives
  alternatives:
  - the royal libraries
  - the king's record offices
  - the royal repositories of books
  lexicon: LSJ
  rationale: Literally the term refers to places where books/documents are kept. In
    this Persian administrative setting, 'archives' best conveys the function without
    anachronistically suggesting a literary library.
- source_word: τοῦ κυρίου βασιλέως
  chosen: of my lord the king
  alternatives:
  - of the lord king
  - of the sovereign king
  lexicon: LSJ
  rationale: The Greek phrase is a courtly honorific. In this petition context, English
    idiom is best served by 'my lord the king,' which reflects deferential address
    rather than introducing a theological title.
- source_word: τοῖς ἐν Βαβυλῶνι
  chosen: there in Babylon
  alternatives:
  - which are in Babylon
  - in Babylon
  lexicon: LSJ
  rationale: This locative phrase specifies the location of the archives. 'There in
    Babylon' keeps the deictic force and reads naturally in English.
