translation:
  text: 'Then King Darius ordered a search to be made in the archives kept in Babylon,
    and in Ecbatana, the fortress in the land of Media, a scroll was found in which
    these things had been recorded:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the citadel' for 'the fortress' (Greek τῇ βάρει), referring to the fortified
      administrative center at Ecbatana.
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'a place was found in which these things had been recorded,'
      introducing the contents of the memorandum in the next verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέταξεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders
  lexicon: BDAG
  rationale: Aorist of προστάσσω denotes issuing an authoritative directive. 'Ordered'
    is natural modern English and preserves royal authority without sounding archaic.
- source_word: ἐπισκέψασθαι
  chosen: a search to be made
  alternatives:
  - to inspect
  - to examine
  - to search
  lexicon: BDAG
  rationale: The middle infinitive here functions idiomatically with προσέταξεν to
    express ordering an investigation/search. 'A search to be made' captures the infinitival
    construction smoothly in English while preserving the sense of official examination.
- source_word: βιβλιοφυλακίοις
  chosen: archives
  alternatives:
  - libraries
  - record offices
  - treasuries of books
  lexicon: LSJ
  rationale: The context is a royal records search, not a general library. 'Archives'
    best conveys a repository of official documents.
- source_word: τοῖς κειμένοις
  chosen: deposited
  alternatives:
  - laid up
  - stored
  - kept
  lexicon: BDAG
  rationale: κειμένοις modifies the archives/books as being placed or stored there.
    'Deposited' fits an archival context and avoids awkward literalism.
- source_word: ἐν Βαβυλῶνι
  chosen: in Babylon
  lexicon: BDAG
  rationale: Straightforward locative reference to Babylon, the initial place where
    the search was ordered.
- source_word: Ἐκβατάνοις
  chosen: Ecbatana
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: τῇ βάρει
  chosen: the fortress
  alternatives:
  - the citadel
  - the palace
  lexicon: LSJ
  rationale: The Greek reflects a term for a fortified administrative center/acropolis.
    'Fortress' is a clear, accessible rendering; 'citadel' is possible but slightly
    less common. The Semitic parallel tradition in Ezra supports an administrative
    stronghold setting.
- source_word: ἐν Μηδείᾳ χώρᾳ
  chosen: in the land of Media
  alternatives:
  - in the province of Media
  - in Media
  lexicon: BDAG
  rationale: χώρα can mean land/region/country. 'Land of Media' is idiomatic and preserves
    the geographic sense without over-specifying an administrative term.
- source_word: τόπος
  chosen: a place
  alternatives:
  - a location
  - a document-place
  lexicon: BDAG
  rationale: The Greek says literally 'a place was found,' likely meaning a location
    or repository within the archive where the memorandum was located. Retaining 'a
    place' stays close to the text, even if slightly unusual in English.
- source_word: ὑπομνημάτιστο
  chosen: had been recorded
  alternatives:
  - was entered in a memorandum
  - was registered
  - was written as a record
  lexicon: LSJ
  rationale: The form indicates that the following contents stood as an official memorandum/record.
    'Had been recorded' gives clear English while preserving the documentary sense.
- source_word: τάδε
  chosen: these things
  alternatives:
  - the following
  - this
  lexicon: BDAG
  rationale: τάδε introduces the contents of the discovered record. English often
    uses 'the following,' but 'these things' more directly reflects the Greek while
    remaining understandable.
