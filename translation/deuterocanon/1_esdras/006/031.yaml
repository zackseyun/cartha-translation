theological_decisions:
- issue: Nature of the execution term κρεμασθῆναι in an Achaemenid legal context
  chosen_reading: he shall be hanged
  alternative_readings:
  - he shall be impaled
  - he shall be suspended on it
  rationale: The Greek verb itself most straightforwardly denotes hanging/suspension,
    but the broader Persian-period punishment formula may imply impalement or public
    suspension on a timber. To avoid over-interpreting the historical method of execution,
    the main text keeps the direct lexical sense and preserves the more specific alternative
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
