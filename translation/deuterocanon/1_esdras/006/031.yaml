translation:
  text: And issue an order that if anyone transgresses any part of what has been written
    and nullifies it, a beam shall be taken from his own property and he shall be
    hanged on it, and his possessions shall become royal property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he shall be impaled on it' or 'suspended on it.' The Greek says 'hanged,'
      but the ancient punishment described may have involved impalement or public
      suspension on a wooden beam.
    reason: lexical_alternative
lexical_decisions:
- source_word: προστάξαι
  chosen: issue an order
  alternatives:
  - command
  - decree
  lexicon: LSJ
  rationale: The infinitive continues the administrative/jussive sequence and refers
    to an official royal directive. 'Issue an order' is natural modern English while
    preserving the formal governmental sense.
- source_word: παραβῶσίν
  chosen: transgresses
  alternatives:
  - violates
  - oversteps
  lexicon: LSJ
  rationale: The verb denotes violating or going beyond what is prescribed. 'Transgresses'
    preserves the legal force better than a weaker 'disobeys,' though 'violates' is
    also possible.
- source_word: τι τῶν γεγραμμένων
  chosen: any part of what has been written
  alternatives:
  - anything written here
  - any of the written provisions
  lexicon: LSJ
  rationale: τι with the genitive plural naturally means 'anything/any part of the
    things written.' The rendering makes explicit that the reference is to the written
    decree without over-specifying beyond the Greek.
- source_word: ἀκυρώσωσιν
  chosen: sets it aside
  alternatives:
  - nullifies it
  - invalidates it
  lexicon: LSJ
  rationale: The verb means to make invalid or void. 'Sets it aside' is idiomatic
    and readable, while still conveying cancellation of the decree's force. The stronger
    legal alternatives are preserved as options.
- source_word: λημφθῆναι ξύλον
  chosen: a beam shall be taken
  alternatives:
  - wood shall be taken
  - a timber shall be taken
  lexicon: LSJ
  rationale: ξύλον can mean wood, timber, tree, or wooden beam. In this punitive building-context,
    and in light of the likely parallel in Ezra 6:11, 'beam' best fits the sense of
    a timber removed from the offender's property/house.
- source_word: ἐκ τῶν ἰδίων αὐτοῦ
  chosen: from his own house
  alternatives:
  - from his own property
  - from what is his own
  lexicon: LSJ
  rationale: Literally the phrase is broader ('from his own things/property'), but
    the punishment formula likely envisions a timber taken from the offender's own
    house, as in the Hebrew-Aramaic parallel tradition. Using the parallel source
    as a control supports this more specific rendering.
- source_word: κρεμασθῆναι
  chosen: he shall be hanged
  alternatives:
  - he shall be impaled
  - he shall be suspended
  lexicon: LSJ
  rationale: The verb means to hang or suspend. Because ancient Near Eastern execution
    language can overlap with impalement/exposure, 'hanged' is retained in the main
    text as the most direct rendering, with the alternative preserved in a footnote.
- source_word: τὰ ὑπάρχοντα αὐτοῦ
  chosen: his possessions
  alternatives:
  - his property
  - his goods
  lexicon: LSJ
  rationale: The phrase refers to what belongs to him materially. 'Possessions' is
    clear modern English and broad enough to include all assets.
- source_word: βασιλικά
  chosen: royal property
  alternatives:
  - forfeit to the crown
  - belonging to the king
  lexicon: LSJ
  rationale: The adjective means belonging to the king/royal domain. 'Royal property'
    preserves the formal legal result of confiscation.
