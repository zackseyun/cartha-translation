theological_decisions:
- issue: Rendering κύριος in two different referents within one verse
  chosen_reading: '''Lord'' for God and ''lord'' for the king, with capitalization
    distinguishing the divine title from the royal honorific'
  alternative_readings:
  - '''Lord'' for both occurrences'
  - '''Master'' for the king'
  rationale: The verse uses κύριος both for Israel's God and as a court title for
    the Persian king. English capitalization can preserve the distinction without
    changing the lexical base. This follows the doctrine's default rendering of κύριος
    as 'Lord' while respecting context.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
