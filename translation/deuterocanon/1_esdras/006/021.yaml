translation:
  text: And if it is found that the building of the house of the Lord in Jerusalem
    was done with the approval of Cyrus the king, and if it seems good to our lord
    the king, let him send us word about these matters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the building of the Lord in Jerusalem'; the sense in context
      is 'the building of the house/temple of the Lord in Jerusalem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν εὑρίσκηται
  chosen: if it is found
  alternatives:
  - if it is discovered
  - if it is determined
  lexicon: BDAG
  rationale: A straightforward conditional passive. 'Is found' preserves the formal
    sense of an official discovery in records or inquiry, fitting the administrative
    context.
- source_word: μετὰ τῆς γνώμης
  chosen: with the approval of
  alternatives:
  - according to the decision of
  - with the consent of
  - by the intention of
  lexicon: LSJ
  rationale: γνώμη can mean opinion, judgment, resolve, or authorization. In this
    royal-administrative setting, 'with the approval of' best conveys that the construction
    had Cyrus's sanctioned authorization, not merely his private opinion.
- source_word: γενομένην
  chosen: was done
  alternatives:
  - was made
  - was carried out
  - came to be
  lexicon: BDAG
  rationale: The participle modifies the building and indicates that the construction
    took place. 'Was done' is idiomatic English and keeps the focus on the completed
    act of building.
- source_word: τὴν οἰκοδομὴν
  chosen: the building
  alternatives:
  - the construction
  - the rebuilding
  lexicon: LSJ
  rationale: The noun denotes the act or project of building. 'The building' is broad
    enough to cover the construction project without importing 'rebuilding,' which
    the Greek here does not explicitly state.
- source_word: τοῦ κυρίου τοῦ ἐν Ἰερουσαλήμ
  chosen: the house of the Lord in Jerusalem
  alternatives:
  - the Lord's house in Jerusalem
  - the temple of the Lord in Jerusalem
  lexicon: LSJ
  rationale: Although the Greek text as given reads 'of the Lord, the one in Jerusalem,'
    the sense in context is the sanctuary/house belonging to the Lord in Jerusalem.
    English requires supplying 'house' for clarity from the broader temple-building
    context. 'Temple' is possible, but 'house of the Lord' stays closer to biblical
    idiom.
- source_word: κρίνηται
  chosen: it seems good
  alternatives:
  - it is judged fitting
  - it is decided
  lexicon: BDAG
  rationale: In epistolary and royal style, this verb can express what is judged proper
    or pleasing. 'It seems good' is natural English for a deferential petition to
    the king.
- source_word: τῷ κυρίῳ βασιλεῖ ἡμῶν
  chosen: to our lord the king
  alternatives:
  - to our sovereign king
  - to our master the king
  lexicon: LSJ
  rationale: κύριος is used here as an honorific for the Persian king, not as the
    divine title. 'Our lord the king' preserves the courtly register and distinguishes
    it from the following divine use of 'Lord' by capitalization in the earlier phrase.
- source_word: προσφωνησάτω ἡμῖν
  chosen: let him send us word
  alternatives:
  - let him inform us
  - let him address us
  - let him send us a reply
  lexicon: LSJ
  rationale: The verb literally involves speaking to or addressing, but in this administrative
    correspondence context it means to communicate back officially. 'Send us word'
    is idiomatic while preserving the sense of a reply.
- source_word: περὶ τούτων
  chosen: about these matters
  alternatives:
  - concerning these things
  - about this
  lexicon: BDAG
  rationale: The plural refers to the issues under inquiry. 'These matters' fits formal
    English correspondence better than the more wooden 'these things.'
