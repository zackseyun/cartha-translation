translation:
  text: Therefore may the Lord, whose name has been invoked there, destroy every king
    and nation that stretches out its hand to hinder or to harm that house of the
    Lord there in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whose name is called there.' The Greek can be rendered more literally
      this way; 'has been invoked there' brings out the cultic sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ ταῦτα
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: LSJ
  rationale: Introduces the decree's consequence or imprecation. 'Therefore' is concise
    and natural in English while preserving the inferential force.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: With the article, the phrase refers to Israel's God. Per doctrine, κύριος
    is rendered 'Lord.'
- source_word: οὗ τὸ ὄνομα αὐτοῦ ἐπικέκληται ἐκεῖ
  chosen: whose name has been invoked there
  alternatives:
  - whose name is called there
  - who has caused his name to be called there
  lexicon: LSJ
  rationale: The perfect/passive sense of ἐπικέκληται indicates that God's name has
    been called upon or associated with that place. 'Has been invoked there' communicates
    the cultic sense clearly in modern English without over-paraphrasing. It also
    fits the temple context better than the more wooden 'is called there.'
- source_word: ἀφανίσαι
  chosen: destroy
  alternatives:
  - wipe out
  - bring to ruin
  lexicon: LSJ
  rationale: The infinitive functions as a wish or decree after the introductory formula.
    'Destroy' is strong, direct, and fits the judgment context.
- source_word: πάντα βασιλέα καὶ ἔθνος
  chosen: every king and nation
  alternatives:
  - any king or nation
  - every ruler and people
  lexicon: LSJ
  rationale: A straightforward rendering of the distributive sense. 'Nation' preserves
    ἔθνος without importing ethnic nuance beyond the Greek.
- source_word: ὃς ἐκτενεῖ χεῖρα αὐτοῦ
  chosen: that stretches out his hand
  alternatives:
  - that puts forth his hand
  - that raises his hand
  lexicon: LSJ
  rationale: This is an idiom for taking action against something. 'Stretches out
    his hand' preserves the biblical idiom in readable English. The singular pronoun
    follows the singular relative construction in Greek.
- source_word: κωλῦσαι
  chosen: to hinder
  alternatives:
  - to prevent
  - to stop
  lexicon: LSJ
  rationale: '''Hinder'' fits the legal-administrative context of obstructing temple
    work and pairs well with the following stronger verb.'
- source_word: κακοποιῆσαι
  chosen: to harm
  alternatives:
  - to do evil to
  - to damage
  lexicon: LSJ
  rationale: The verb is broader than physical damage alone. 'To harm' captures hostile
    action against the temple without narrowing the sense.
- source_word: τὸν οἶκον Κυρίου ἐκεῖνον τὸν ἐν Ἰερουσαλήμ
  chosen: that house of the Lord there in Jerusalem
  alternatives:
  - that house, the Lord's house in Jerusalem
  - that temple of the Lord in Jerusalem
  lexicon: LSJ
  rationale: Retains the demonstrative emphasis of ἐκεῖνον and the locative ἐν Ἰερουσαλήμ.
    'House of the Lord' preserves the temple idiom better than simply 'temple,' though
    'temple' is conceptually implied.
