theological_decisions:
- issue: Rendering the temple formula about God's name
  chosen_reading: whose name has been invoked there
  alternative_readings:
  - whose name is called there
  - who has caused his name to dwell there
  rationale: The Greek wording speaks of God's name being called/invoked there, echoing
    temple theology without requiring a fuller Hebrew-style paraphrase such as 'caused
    his name to dwell.' The chosen rendering preserves the theological association
    of God's name with the Jerusalem temple while staying close to the Greek witness.
  doctrine_reference: DOCTRINE.md §§1, 3, 5
- issue: Force of the infinitive ἀφανίσαι in the decree
  chosen_reading: may the Lord ... destroy
  alternative_readings:
  - the Lord will destroy
  - to destroy
  rationale: In context this functions as an imprecatory or jussive wish within a
    royal decree. English 'may the Lord ... destroy' best conveys the force naturally.
    A bare infinitive would be awkward, and a future indicative would overstate the
    grammar.
  doctrine_reference: DOCTRINE.md §1
