translation:
  text: By whose authorization are you building this house and completing this roof
    and all the rest? And who are the builders carrying out these things?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'At whose command are you building this house...?' The Greek participle
      can emphasize an order or directive behind the work.
    reason: lexical_alternative
  - marker: b
    text: '''House'' here refers to the temple; the translation keeps the ordinary
      Greek term rather than substituting the interpretive gloss ''temple.'''
    reason: cultural_note
lexical_decisions:
- source_word: Τίνος
  chosen: By whose
  alternatives:
  - Whose
  - At whose command
  lexicon: LSJ
  rationale: The genitive interrogative with the participle συντάξαντος asks for the
    person behind the authorization. 'By whose' brings out the agency more clearly
    in English than a bare 'whose.'
- source_word: συντάξαντος
  chosen: authorization
  alternatives:
  - command
  - order
  - decree
  - having appointed
  lexicon: LSJ
  rationale: The aorist participle from συντάσσω here refers to giving instructions
    or issuing an order. Rendering the clause idiomatically as 'By whose authorization'
    captures the sense of official sanction in this administrative inquiry.
- source_word: οἰκοδομεῖτε
  chosen: are you building
  alternatives:
  - do you build
  - are you rebuilding
  lexicon: LSJ
  rationale: Present tense is best represented as progressive in this inspection context.
    'Building' is the plain sense; 'rebuilding' would import a nuance not explicit
    in the Greek, though context implies restoration.
- source_word: οἶκον
  chosen: house
  alternatives:
  - temple
  lexicon: LSJ
  rationale: The Greek says 'house.' In context this is the temple, but the text itself
    uses the ordinary term, so 'house' preserves the source wording without losing
    the referent.
- source_word: στέγην
  chosen: roof
  alternatives:
  - covering
  lexicon: LSJ
  rationale: The noun denotes the roof or covering of a building. 'Roof' is the most
    natural and specific English equivalent here.
- source_word: τἄλλα πάντα
  chosen: all the rest
  alternatives:
  - all other things
  - everything else
  lexicon: LSJ
  rationale: This compact phrase refers to the remaining parts or works associated
    with the project. 'All the rest' is natural English and keeps the broad scope.
- source_word: ἐπιτελεῖτε
  chosen: completing
  alternatives:
  - finishing
  - carrying through
  - accomplishing
  lexicon: LSJ
  rationale: The verb suggests bringing work to completion. 'Completing' fits the
    building context and pairs well with the preceding construction language.
- source_word: οἰκοδόμοι
  chosen: builders
  alternatives:
  - workmen
  - masons
  lexicon: LSJ
  rationale: A general term for those engaged in construction. 'Builders' is broad
    enough to match the Greek without over-specifying a trade.
- source_word: τελοῦντες
  chosen: carrying out
  alternatives:
  - doing
  - completing
  - performing
  lexicon: LSJ
  rationale: The participle denotes those executing the work. 'Carrying out' conveys
    active implementation and avoids awkward repetition with 'completing' used earlier.
