theological_decisions:
- issue: Rendering κύριος in a sacrificial/Judean temple context
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: The Greek source reads κυρίῳ. Per doctrine defaults, κύριος is rendered
    'Lord.' Since this is deuterocanonical Greek rather than direct Hebrew here, 'the
    LORD' is possible by association with Israel's God but not required by the immediate
    Greek wording.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord'
- issue: Gender rendering of ἀνθρώποις
  chosen_reading: these men
  alternative_readings:
  - these people
  rationale: The source is grammatically masculine plural and likely refers to specific
    male officials or temple personnel in context. Per project philosophy, gender-accurate
    rendering is preferred over flattening to a neutral collective.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
