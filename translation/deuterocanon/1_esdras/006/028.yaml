translation:
  text: and from the tribute of Coele-Syria and Phoenicia, support is to be given
    carefully to these men for sacrifice to the Lord—to Zerubbabel the governor—for
    bulls and rams and lambs,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an allowance is to be given' or 'provision is to be made.' The Greek
      σύνταξιν δίδοσθαι refers to an official allotment or support from provincial
      revenues.
    reason: lexical_alternative
  - marker: b
    text: '''Coele-Syria'' is the conventional Greek provincial name for the region;
      literally, the term means ''Hollow Syria.'''
    reason: cultural_note
  - marker: c
    text: The syntax around 'to Zerubbabel the governor' is compressed in Greek and
      may indicate either the recipient/administrator of the support or an appositional
      identification within the decree.
    reason: alternative_reading
lexical_decisions:
- source_word: φορολογίας
  chosen: tribute
  alternatives:
  - taxation
  - revenue
  lexicon: LSJ
  rationale: The phrase ἀπὸ τῆς φορολογίας denotes funds drawn from provincial tax
    income. 'Tribute' fits an imperial-provincial setting and reads naturally in English,
    while preserving the sense of official revenue.
- source_word: κοίλης Συρίας
  chosen: Coele-Syria
  alternatives:
  - Hollow Syria
  lexicon: LSJ
  rationale: This is a fixed geographical name in Hellenistic usage, not a descriptive
    phrase to be translated literally. Standard transliteration best preserves the
    referent.
- source_word: ἐπιμελῶς
  chosen: carefully
  alternatives:
  - diligently
  - with care
  lexicon: LSJ
  rationale: The adverb emphasizes conscientious administration of the provision.
    'Carefully' is clear modern English and preserves the force without sounding overly
    formal.
- source_word: σύνταξιν δίδοσθαι
  chosen: support is to be given
  alternatives:
  - an allowance is to be given
  - provision is to be made
  lexicon: LSJ
  rationale: σύνταξις here refers to an allotment or provision, and δίδοσθαι gives
    the passive infinitival sense under the decree context. 'Support is to be given'
    captures the official financial provision without over-specifying the form.
- source_word: τούτοις τοῖς ἀνθρώποις
  chosen: these men
  alternatives:
  - these people
  lexicon: LSJ
  rationale: The Greek is masculine plural and refers to the Judean temple personnel/leadership
    in context. Per project philosophy, gender-accurate language is preferred where
    the source is masculine.
- source_word: εἰς θυσίαν τῷ κυρίῳ
  chosen: for sacrifice to the Lord
  alternatives:
  - for an offering to the Lord
  - for sacrifice for the Lord
  lexicon: LSJ
  rationale: 'εἰς with θυσίαν expresses purpose: the funds are for sacrificial use.
    κύριος is rendered ''Lord'' per doctrine defaults.'
- source_word: Ζοροβάβελ ἐπάρχῳ
  chosen: to Zerubbabel the governor
  alternatives:
  - for Zerubbabel the governor
  - Zerubbabel, governor
  lexicon: LSJ
  rationale: The dative/appositional construction identifies Zerubbabel as the governing
    official associated with the administration of these provisions. 'To Zerubbabel
    the governor' preserves the dative relation most straightforwardly, though the
    syntax is somewhat compressed.
- source_word: ταύρους καὶ κριοὺς καὶ ἄρνας
  chosen: bulls and rams and lambs
  alternatives:
  - young bulls and rams and sheep
  lexicon: LSJ
  rationale: These are sacrificial animals listed individually. 'Lambs' is preferable
    for ἄρνας in sacrificial context, and the repeated 'and' preserves the enumerative
    style of the Greek.
