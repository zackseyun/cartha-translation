translation:
  text: In the first year of the reign of Cyrus, King Cyrus gave orders that the house
    of the Lord in Jerusalem should be built, where they offer continual sacrifices
    by fire,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'where they sacrifice with continual fire.' The Greek phrase is compact
      and may describe the place as one of ongoing fire-offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτους πρώτου βασιλεύοντος Κύρου
  chosen: In the first year of the reign of Cyrus
  alternatives:
  - In the first year, when Cyrus was reigning
  - In the first year of Cyrus's reign
  lexicon: LSJ
  rationale: The genitive absolute-like dating formula is rendered idiomatically in
    English as a regnal-year notice. 'Of the reign of Cyrus' preserves the temporal
    force without awkwardness.
- source_word: βασιλεὺς Κῦρος
  chosen: King Cyrus
  alternatives:
  - Cyrus the king
  lexicon: LSJ
  rationale: Standard English title-name order is clearer and natural, while preserving
    the royal title explicitly present in the Greek.
- source_word: προσέταξεν
  chosen: gave orders
  alternatives:
  - commanded
  - decreed
  lexicon: LSJ
  rationale: The verb denotes issuing an authoritative command. 'Gave orders' is natural
    modern English and fits the administrative context; 'decreed' would over-specify
    a formal edict not explicit in the verb alone.
- source_word: τὸν οἶκον τοῦ κυρίου
  chosen: the house of the Lord
  alternatives:
  - the temple of the Lord
  - the house of the LORD
  lexicon: LSJ
  rationale: οἶκος literally means 'house'; in this context it refers to the temple.
    'House of the Lord' preserves the source wording while remaining intelligible.
    'Lord' follows the project's default for κύριος.
- source_word: τὸν ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - that is in Jerusalem
  lexicon: LSJ
  rationale: The article-participle phrase simply locates the house. English does
    not need to reproduce the full attributive structure.
- source_word: οἰκοδομῆσαι
  chosen: should be built
  alternatives:
  - to be built
  - to build
  lexicon: LSJ
  rationale: After προσέταξεν, the infinitive expresses the content of the order.
    Passive English best captures that the house is the object to be constructed.
- source_word: ὅπου
  chosen: where
  alternatives:
  - the place where
  lexicon: LSJ
  rationale: A straightforward locative relative is sufficient and keeps the sentence
    flowing.
- source_word: ἐπιθύουσιν
  chosen: they offer sacrifices
  alternatives:
  - they sacrifice
  - they make offerings
  lexicon: LSJ
  rationale: The compound verb refers to sacrificial offering. 'Offer sacrifices'
    makes the cultic sense explicit in natural English.
- source_word: διὰ πυρὸς
  chosen: by fire
  alternatives:
  - with fire
  - as burnt offerings
  lexicon: LSJ
  rationale: Literally 'through/by means of fire.' 'By fire' preserves the image and
    sacrificial mechanism without importing a more specific category than the Greek
    states.
- source_word: ἐνδελεχοῦς
  chosen: continual
  alternatives:
  - regular
  - perpetual
  lexicon: LSJ
  rationale: The adjective conveys continuity or regular constancy. 'Continual' fits
    sacrificial language well and echoes the ongoing nature of the offerings.
