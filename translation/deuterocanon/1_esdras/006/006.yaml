translation:
  text: and they were not hindered from building until word about them should be sent
    to Darius and a reply should be returned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and an answer should be given.' The Greek verb can denote being addressed
      or receiving an official response; the context favors an administrative reply
      after the report to Darius.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐκωλύθησαν
  chosen: they were not hindered
  alternatives:
  - they were not prevented
  - they were not stopped
  lexicon: BDAG
  rationale: The passive of κωλύω denotes being restrained or prevented. 'Were not
    hindered' is natural English and preserves the passive sense without overstating
    the action.
- source_word: τῆς οἰκοδομῆς
  chosen: from building
  alternatives:
  - from the building work
  - from construction
  lexicon: BDAG
  rationale: The genitive after κωλύω expresses what they were not prevented from
    doing. Rendering verbally as 'from building' is smoother in English while preserving
    the sense of ongoing construction.
- source_word: μέχρις οὗ
  chosen: until
  alternatives:
  - up to the time when
  lexicon: BDAG
  rationale: Standard temporal conjunction; 'until' is the clearest idiomatic equivalent.
- source_word: ὑποσημανθῆναι
  chosen: word ... should be sent
  alternatives:
  - a report should be submitted
  - notice should be given
  lexicon: LSJ
  rationale: The verb means to indicate, report, or communicate officially. In this
    administrative context, 'word ... should be sent' is readable and fits the following
    reference to Darius. 'Report' is possible, but 'word' avoids sounding overly technical
    while still conveying official communication.
- source_word: Δαρείῳ
  chosen: to Darius
  lexicon: BDAG
  rationale: Proper name transliterated by standard convention.
- source_word: περὶ αὐτῶν
  chosen: about them
  alternatives:
  - concerning them
  lexicon: BDAG
  rationale: A straightforward prepositional phrase referring to the builders/situation
    under discussion. 'About them' is idiomatic modern English.
- source_word: προσφωνηθῆναι
  chosen: a reply should be returned
  alternatives:
  - an answer should be given
  - a response should be made
  lexicon: LSJ
  rationale: The passive infinitive here follows the reporting action and in context
    refers to an official answer being issued back. 'A reply should be returned' captures
    the administrative exchange implied by the sequence. Because the verb can more
    literally mean 'be addressed/spoken to,' the more literal alternative is preserved
    in a footnote.
