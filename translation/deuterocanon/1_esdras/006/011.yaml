translation:
  text: So we questioned them in order to make it known to you and to write to you
    the names of the men who were leading them, and we asked them for the list of
    names of those who were at their head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the men who were leading them'; the Greek participle translated 'who
      were speaking as leaders' is somewhat difficult and may emphasize either leadership
      or those giving the formal account.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the list of names of those who were at their head' refers to
      an official register of the leaders overseeing the work.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπερωτήσαμεν
  chosen: we questioned
  alternatives:
  - we asked
  - we inquired of
  lexicon: BDAG
  rationale: The verb denotes asking or questioning. 'Questioned' preserves the formal
    investigative sense in this official report better than the flatter 'asked.'
- source_word: ἕνεκεν τοῦ γνωρίσαι σοι
  chosen: in order to make it known to you
  alternatives:
  - for the purpose of informing you
  - so that we might let you know
  lexicon: BDAG
  rationale: This infinitival construction expresses purpose. The chosen rendering
    is clear modern English while staying close to the Greek syntax.
- source_word: γράψαι σοι
  chosen: to write to you
  alternatives:
  - to record for you
  - to write you
  lexicon: BDAG
  rationale: A straightforward epistolary infinitive; 'write to you' is the most natural
    modern equivalent.
- source_word: τοὺς ἀνθρώπους
  chosen: the names of the men
  alternatives:
  - the men
  - the persons
  lexicon: BDAG
  rationale: Although ἀνθρώπους can mean people/humans broadly, here it refers to
    identifiable male officials in a Persian-period administrative context. Because
    the following phrase concerns writing their names, the English brings that object
    forward as 'the names of the men' to reflect the reporting function.
- source_word: τοὺς ἀφηγουμένους
  chosen: who were speaking as leaders
  alternatives:
  - who were leading
  - who were giving the account
  - who were in charge
  lexicon: LSJ
  rationale: The participle is difficult and can suggest either leading/guiding or
    setting forth an account. In context, the officials are identifying the responsible
    leaders of the work. The chosen rendering preserves both the verbal/reporting
    nuance and the leadership nuance without overcommitting to one.
- source_word: ὀνοματογραφίαν
  chosen: the list of names
  alternatives:
  - the written register of names
  - the name record
  lexicon: LSJ
  rationale: This rare term refers to a written naming or register. 'List of names'
    is idiomatic and captures the administrative sense.
- source_word: τῶν προκαθηγουμένων
  chosen: those who were at their head
  alternatives:
  - their leaders
  - those presiding over them
  lexicon: LSJ
  rationale: The participle denotes those set over others or leading them. 'Those
    who were at their head' preserves the relational image and avoids flattening the
    phrase too quickly.
