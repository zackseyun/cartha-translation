translation:
  text: 'A copy of the letter that Sisinnes, the governor of Syria and Phoenicia,
    and Sathrabuzanes, and their associates, the rulers in Syria and Phoenicia, wrote
    and sent to King Darius: Greetings.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text has a slight grammatical shift from singular ('was writing')
      to plural ('they sent'). The translation renders the clause smoothly in English
      as a collective action by the named officials.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀντίγραφον
  chosen: A copy
  alternatives:
  - Copy
  - Transcript
  lexicon: LSJ
  rationale: Ἀντίγραφον denotes a copy or transcript of a document. 'A copy' is natural
    modern English and fits the documentary context.
- source_word: ἐπιστολῆς
  chosen: of the letter
  alternatives:
  - of a letter
  - of the document
  lexicon: LSJ
  rationale: 'ἐπιστολή is the standard term for a letter. The genitive depends on
    Ἀντίγραφον: ''a copy of the letter.'''
- source_word: ἧς ἔγραφεν ... καὶ ἀπέστειλαν
  chosen: that ... wrote and sent
  alternatives:
  - which ... had written and sent
  - that ... were writing and sent
  lexicon: LSJ
  rationale: 'The relative clause introduces the contents/formula of the correspondence.
    Although the Greek shifts from singular ἔγραφεν to plural ἀπέστειλαν, the sense
    is collective: the named officials authored and dispatched the letter. English
    smooths this to a coordinated plural action for readability while preserving the
    documentary sense.'
- source_word: Σισίννης
  chosen: Sisinnes
  alternatives:
  - Sisines
  lexicon: LSJ
  rationale: Personal names are transliterated by standard convention. 'Sisinnes'
    reflects the Greek form directly.
- source_word: ὁ ἔπαρχος
  chosen: the governor
  alternatives:
  - the prefect
  - the provincial governor
  lexicon: LSJ
  rationale: ἔπαρχος denotes a governing official over a region. 'Governor' is the
    clearest accessible equivalent in this administrative context.
- source_word: Συρίας καὶ Φοινίκης
  chosen: of Syria and Phoenicia
  alternatives:
  - over Syria and Phoenicia
  lexicon: LSJ
  rationale: The genitives specify the jurisdiction of the governor and the location
    of the associated rulers. 'Of Syria and Phoenicia' is concise and idiomatic.
- source_word: Σαθραβουζάνης
  chosen: Sathrabuzanes
  alternatives:
  - Sathrabouzanes
  lexicon: LSJ
  rationale: The proper name is transliterated directly from the Greek. English spelling
    is kept close to the source form.
- source_word: οἱ συνέταιροι
  chosen: their associates
  alternatives:
  - their companions
  - their colleagues
  - their partners
  lexicon: LSJ
  rationale: συνέταιροι can mean associates or companions. In an official letter context,
    'associates' best conveys administrative colleagues rather than personal friends.
- source_word: ἡγεμόνες
  chosen: the rulers
  alternatives:
  - the governors
  - the leaders
  lexicon: LSJ
  rationale: ἡγεμόνες is a broad term for leaders or governors. Since ἔπαρχος has
    already been rendered 'governor,' 'rulers' avoids awkward repetition while preserving
    official authority.
- source_word: Βασιλεῖ Δαρείῳ
  chosen: to King Darius
  alternatives:
  - King Darius
  - for King Darius
  lexicon: LSJ
  rationale: The dative marks the recipient/addressee of the letter. 'To King Darius'
    makes the epistolary direction explicit in English.
- source_word: χαίρειν
  chosen: Greetings
  alternatives:
  - greetings to you
  - rejoice
  lexicon: LSJ
  rationale: χαίρειν is the standard epistolary salutation, conventionally rendered
    'Greetings.' This preserves the letter formula without over-literalizing it.
