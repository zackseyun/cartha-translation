translation:
  text: 'Let everything be known to our lord the king: when we came into the land
    of Judea and Jerusalem, the city, we found the elders of the Jewish exiles in
    Jerusalem, the city, building a great new house for the Lord,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the elders of the Jews of the captivity.' The Greek
      wording is compressed; the sense is the leadership of the Jewish exile/returnee
      community.
    reason: lexical_alternative
  - marker: b
    text: '''House for the Lord'' refers to the temple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα γνωστὰ ἔστω
  chosen: Let everything be known
  alternatives:
  - May all things be known
  - Be it known in every respect
  lexicon: LSJ
  rationale: The phrase is an epistolary/report formula. 'Let everything be known'
    preserves the imperative force of ἔστω with natural English while keeping the
    breadth of πάντα.
- source_word: τῷ κυρίῳ ἡμῶν τῷ βασιλεῖ
  chosen: to our lord the king
  alternatives:
  - to our master the king
  - to our sovereign lord the king
  lexicon: LSJ
  rationale: κύριος here is a courtly title for the Persian king, not a divine title.
    'Lord' follows the project's default for κύριος and fits the deferential register;
    'our lord the king' preserves both nouns.
- source_word: παραγενόμενοι
  chosen: when we came
  alternatives:
  - having arrived
  - when we arrived
  lexicon: LSJ
  rationale: The participle is temporal in context, introducing the circumstances
    of the report. 'When we came' is idiomatic and sufficiently close to the Greek.
- source_word: χώραν τῆς Ἰουδαίας
  chosen: the land of Judea
  alternatives:
  - the province of Judea
  - the country of Judea
  lexicon: LSJ
  rationale: χώρα can mean land, region, or territory. 'Land of Judea' is broad and
    avoids over-specifying an administrative nuance not explicit in the Greek.
- source_word: Ἰερουσαλὴμ τὴν πόλιν
  chosen: Jerusalem, the city
  alternatives:
  - the city of Jerusalem
  lexicon: LSJ
  rationale: The appositional wording is somewhat repetitive in Greek and is retained
    in a lightly smoothed form to reflect the source's emphasis.
- source_word: κατελάβομεν
  chosen: we found
  alternatives:
  - we came upon
  - we encountered
  lexicon: LSJ
  rationale: In this context the verb means 'found/encountered' rather than 'seized.'
    The object is the elders engaged in building, so 'we found' best fits the sense.
- source_word: τῆς αἰχμαλωσίας
  chosen: of the Jewish exiles
  alternatives:
  - of the captivity
  - of the deportation
  lexicon: LSJ
  rationale: Literally 'of the captivity,' but in English this naturally denotes the
    people in exile. 'Jewish exiles' makes explicit the genitival relation with the
    following 'elders of the Jews' and communicates the historical sense clearly.
- source_word: τοὺς πρεσβυτέρους τῶν Ἰουδαίων
  chosen: the elders of the Jewish exiles
  alternatives:
  - the elders of the Jews of the exile
  - the Jewish elders of the captivity
  lexicon: LSJ
  rationale: The Greek sequence is compressed and slightly awkward. Taken together
    with τῆς αἰχμαλωσίας, it refers to the leadership of the returned/exilic Jewish
    community. This rendering communicates that sense in readable English while staying
    anchored to the wording.
- source_word: οἰκοδομοῦντας οἶκον
  chosen: building ... house
  alternatives:
  - rebuilding ... temple
  - building ... temple
  lexicon: LSJ
  rationale: οἶκος literally means 'house.' Because the dative τῷ κυρίῳ marks it as
    God's house, 'house for the Lord' preserves the temple reference without importing
    'temple' where the Greek says 'house.'
- source_word: τῷ κυρίῳ
  chosen: for the Lord
  alternatives:
  - to the Lord
  lexicon: LSJ
  rationale: Here κύριος refers to Israel's God. Per doctrine, it is rendered 'Lord.'
    'For the Lord' fits the construction with οἶκον in English.
- source_word: μέγαν καινόν
  chosen: a great new
  alternatives:
  - a large new
  - a magnificent new
  lexicon: LSJ
  rationale: Both adjectives modify οἶκον. 'Great new house' preserves both descriptors
    straightforwardly; 'magnificent' would over-interpret μέγαν.
