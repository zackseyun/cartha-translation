theological_decisions:
- issue: Rendering κύριος in one verse for both the Persian king and Israel's God
  chosen_reading: Use 'lord' for the kingly title in lowercase within the phrase 'our
    lord the king,' and 'Lord' for God in 'house for the Lord.'
  alternative_readings:
  - Use 'master' for the king and 'Lord' for God
  rationale: The Greek uses the same lexical item in two referents. English capitalization
    and context distinguish them without changing the underlying term. This preserves
    lexical transparency while avoiding confusion.
  doctrine_reference: 'DOCTRINE.md: κύριος default English ''Lord''; translate titles,
    preserve meaning'
