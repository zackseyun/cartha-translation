translation:
  text: For she knows all things and understands, and she will guide me prudently
    in my actions, and will guard me by her glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in her glory' or 'through her glory.' The Greek phrase can express location
      or means.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδε
  chosen: knows
  alternatives:
  - has known
  - understands
  lexicon: BDAG
  rationale: Common verb for knowing; paired with συνίει, so rendering it as 'knows'
    preserves the distinction between knowledge and understanding.
- source_word: ἐκείνη
  chosen: she
  alternatives:
  - that one
  - this one
  lexicon: LSJ
  rationale: Refers back to Wisdom personified in the feminine; 'she' is natural English
    and preserves the personification.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: LSJ
  rationale: Accusative plural used comprehensively; 'all things' keeps the formal
    breadth of the Greek.
- source_word: συνίει
  chosen: understands
  alternatives:
  - comprehends
  - has insight into
  lexicon: BDAG
  rationale: Chosen to complement οἶδε without collapsing the two verbs into a single
    English idea.
- source_word: ὁδηγήσει
  chosen: will guide
  alternatives:
  - will lead
  - will direct
  lexicon: BDAG
  rationale: Future verb of leading on a way; 'guide' fits the wisdom context and
    the following ethical sphere.
- source_word: ἐν ταῖς πράξεσί μου
  chosen: in my actions
  alternatives:
  - in my deeds
  - in my undertakings
  lexicon: LSJ
  rationale: πρᾶξις here refers to practical acts or conduct; 'actions' is clear modern
    English without losing moral force.
- source_word: σωφρόνως
  chosen: prudently
  alternatives:
  - with sound judgment
  - wisely
  - temperately
  lexicon: BDAG
  rationale: Adverb from the σωφρον- word group, conveying sound-minded, restrained,
    sensible conduct. 'Prudently' best captures practical wisdom in action.
- source_word: φυλάξει
  chosen: will guard
  alternatives:
  - will keep
  - will preserve
  lexicon: BDAG
  rationale: The verb denotes protective keeping; 'guard' makes the protective sense
    explicit.
- source_word: ἐν τῇ δόξῃ αὐτῆς
  chosen: by her glory
  alternatives:
  - in her glory
  - through her glory
  lexicon: BDAG
  rationale: The preposition ἐν can be rendered instrumentally or locatively here.
    'By her glory' best fits the sense that Wisdom's own glorious power is the means
    of protection, while preserving a footnoted alternative.
