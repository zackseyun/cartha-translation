theological_decisions:
- issue: Sense of ἐν τῇ δόξῃ αὐτῆς
  chosen_reading: 'instrumental: ''by her glory'''
  alternative_readings:
  - 'locative: ''in her glory'''
  - 'means nuance: ''through her glory'''
  rationale: The phrase is somewhat ambiguous. In context, Solomon asks for Wisdom's
    active help in governing and being protected; an instrumental sense naturally
    follows 'will guard me.' The alternative locative sense is preserved in a footnote
    rather than being erased.
  doctrine_reference: Preserve theological tension rather than resolve it.
