translation:
  text: You chose me beforehand as king of your people and as judge of your sons and
    daughters;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appointed me' or 'selected me in advance'; the Greek verb includes the
      idea of prior choice.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύ
  chosen: You
  alternatives:
  - you
  lexicon: LSJ
  rationale: Explicit pronoun retained for emphasis at the head of the clause, addressing
    God directly.
- source_word: προείλω
  chosen: chose me beforehand
  alternatives:
  - appointed me
  - selected me in advance
  lexicon: LSJ
  rationale: The compound verb carries the sense of choosing beforehand or in advance.
    'Chose me beforehand' preserves both the personal selection and the προ- prefix
    better than the more institutional 'appointed,' while remaining natural English.
- source_word: βασιλέα
  chosen: king
  alternatives:
  - ruler
  lexicon: LSJ
  rationale: Standard rendering for βασιλεύς; 'king' is the direct and contextually
    appropriate political title.
- source_word: λαοῦ σου
  chosen: of your people
  alternatives:
  - over your people
  lexicon: LSJ
  rationale: The genitive is rendered straightforwardly as 'of your people.' English
    readers will still understand the royal relationship without adding a preposition
    not present in the Greek.
- source_word: δικαστήν
  chosen: judge
  alternatives:
  - ruler
  - one who administers justice
  lexicon: LSJ
  rationale: δικαστής denotes a judge or one who renders legal decisions. 'Judge'
    preserves the judicial nuance better than the broader 'ruler.'
- source_word: υἱῶν σου καὶ θυγατέρων
  chosen: of your sons and daughters
  alternatives:
  - of your children
  lexicon: LSJ
  rationale: The Greek explicitly names both sons and daughters. In keeping with the
    project's gender-accurate policy, the paired terms are preserved rather than collapsed
    into the generic 'children.'
