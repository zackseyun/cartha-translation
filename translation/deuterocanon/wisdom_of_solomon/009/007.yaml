theological_decisions:
- issue: Nature of Solomon's royal selection
  chosen_reading: You chose me beforehand
  alternative_readings:
  - You appointed me
  - You selected me
  rationale: The verse speaks of divine prior choice without requiring a stronger
    doctrinal claim about predestination beyond the immediate context. The wording
    preserves the temporal force of the Greek prefix while avoiding over-theologizing.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Gendered filial language
  chosen_reading: your sons and daughters
  alternative_readings:
