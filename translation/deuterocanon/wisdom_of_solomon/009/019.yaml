theological_decisions:
- issue: Scope of salvation language in σῴζω
  chosen_reading: were saved
  alternative_readings:
  - were delivered
  - were preserved
  rationale: The verse is a concise summary statement about those pleasing to God
    in prior history being rescued through wisdom. Rendering σῴζω as 'saved' keeps
    the theological breadth of the Greek while not forcing a specifically later doctrinal
    sense; alternatives are preserved because the context can also emphasize historical
    deliverance.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather
    than resolve it
