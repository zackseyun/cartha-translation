translation:
  text: and by wisdom they were saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were delivered' or 'were preserved.' The Greek verb can denote rescue,
      preservation, or salvation depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφίᾳ
  chosen: wisdom
  alternatives:
  - understanding
  lexicon: LSJ
  rationale: The dative noun σοφίᾳ is best rendered 'wisdom,' the standard sense in
    Hellenistic Jewish usage and the controlling theme of the book. 'Understanding'
    is possible in some contexts but is too narrow here.
- source_word: ἐσώθησαν
  chosen: were saved
  alternatives:
  - were delivered
  - were preserved
  lexicon: LSJ
  rationale: The aorist passive of σῴζω commonly means 'were saved' or 'were delivered.'
    'Were saved' preserves the broad sense of rescue/preservation without narrowing
    it to only physical deliverance; in this context summarizing God's acts in history,
    'saved' is natural and sufficiently open.
