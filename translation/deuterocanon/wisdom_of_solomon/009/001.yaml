translation:
  text: God of the fathers and Lord of your mercy, who made all things by your word,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''by means of your command.'' Greek: ''by your word.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: θεὲ
  chosen: God
  alternatives:
  - O God
  lexicon: LSJ
  rationale: Vocative singular addressing God directly. English can omit the interjectional
    'O' while preserving direct address in elevated but readable style.
- source_word: πατέρων
  chosen: of the fathers
  alternatives:
  - of our fathers
  - of the ancestors
  lexicon: LSJ
  rationale: The Greek has a bare genitive plural 'of fathers' without an explicit
    possessive. 'Of the fathers' preserves the traditional covenantal/ancestral sense
    more closely than the more interpretive 'our fathers' or the more generic 'ancestors'.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Direct vocative title. Per doctrine, κύριος defaults to 'Lord.' 'Master'
    is possible lexically but is less fitting in this prayer address to God.
- source_word: τοῦ ἐλέους σου
  chosen: of mercy
  alternatives:
  - of your mercy
  - merciful Lord
  lexicon: LSJ
  rationale: The phrase literally includes 'your' (sou). In English, 'Lord of mercy'
    is idiomatic and preserves the genitival construction without awkwardness. 'Of
    your mercy' is more literal but sounds unnatural here; 'merciful Lord' changes
    the syntax and nuance.
- source_word: ὁ ποιήσας
  chosen: who made
  alternatives:
  - the one who made
  - who created
  lexicon: LSJ
  rationale: Aorist participle identifying God by his creative act. 'Who made' is
    natural and sufficiently formal; 'created' is possible but 'made' matches the
    broad scope of ποιέω and the cadence of the line.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  - the whole universe
  lexicon: LSJ
  rationale: Standard rendering for the comprehensive phrase. 'All things' preserves
    the elevated register and breadth without interpretive expansion.
- source_word: ἐν λόγῳ σου
  chosen: by your word
  alternatives:
  - through your word
  - by means of your word
  lexicon: LSJ
  rationale: The preposition ἐν with instrumental sense is well represented by 'by'
    here. 'Word' is retained rather than paraphrased as 'command' to preserve the
    lexical and theological resonance of λόγος while remaining faithful to the Greek.
