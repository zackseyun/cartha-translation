theological_decisions:
- issue: Rendering λόγῳ in a creation context
  chosen_reading: word
  alternative_readings:
  - command
  rationale: The verse speaks of God making all things 'ἐν λόγῳ σου.' Rendering λόγος
    as 'word' preserves the text's diction and possible intertextual resonance without
    forcing a later doctrinal reading. 'Command' is a legitimate contextual gloss
    but narrows the expression beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
