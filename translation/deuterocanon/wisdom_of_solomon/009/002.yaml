translation:
  text: and by your wisdom you formed man to rule over the creatures made by you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' or 'a human being'; Greek 'man' in the singular, likely representing
      humanity in creation language.
    reason: lexical_alternative
  - marker: b
    text: Or 'to have dominion over,' echoing the creation mandate language of Genesis.
    reason: alternative_reading
lexical_decisions:
- source_word: σοφίᾳ
  chosen: wisdom
  alternatives:
  - skill
  - understanding
  lexicon: BDAG
  rationale: 'The dative with σου indicates the means or instrument: God creates ''by
    your wisdom.'' ''Wisdom'' preserves the theological and literary weight of Wisdom''s
    personified role in this book better than flatter options like ''skill'' or ''understanding.'''
- source_word: κατεσκεύασας
  chosen: you made
  alternatives:
  - you fashioned
  - you constructed
  lexicon: BDAG
  rationale: The verb can mean make, prepare, or fashion. 'You made' is natural modern
    English and fits the creation context without sounding mechanical. 'Fashioned'
    is possible, but the broader context already supplies the elevated tone.
- source_word: ἄνθρωπον
  chosen: man
  alternatives:
  - humankind
  - human being
  lexicon: BDAG
  rationale: The singular noun here echoes creation language about humanity as a representative
    figure. Per the project's gender-accurate policy, 'man' is retained where the
    Greek singular carries representative force. 'Humankind' would shift the singular
    form to a collective abstraction.
- source_word: ἵνα δεσπόζῃ
  chosen: to rule over
  alternatives:
  - to have dominion over
  - to be master of
  lexicon: BDAG
  rationale: 'The ἵνα clause expresses purpose: man was made ''to rule over'' creation.
    ''Have dominion over'' is a strong alternative with Genesis resonance, but ''rule
    over'' is clearer in contemporary English while preserving the governing sense
    of δεσπόζῃ.'
- source_word: τῶν ... κτισμάτων
  chosen: the creatures
  alternatives:
  - the created things
  - the works of creation
  lexicon: BDAG
  rationale: κτίσματα refers to created beings/things. In this context, 'creatures'
    reads naturally and suits the dominion theme. 'Created things' is more literal
    but less idiomatic.
- source_word: ὑπὸ σοῦ γενομένων
  chosen: that came into being through you
  alternatives:
  - made by you
  - that were brought into being by you
  lexicon: BDAG
  rationale: The participial phrase modifies κτισμάτων and emphasizes divine origination.
    Although ὑπό commonly marks agency as 'by,' 'came into being through you' preserves
    the verbal nuance of γίνομαι rather than collapsing it into a second generic 'made.'
    It also avoids awkward repetition after 'you made man.'
