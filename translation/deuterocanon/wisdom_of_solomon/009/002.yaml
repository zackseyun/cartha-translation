theological_decisions:
- issue: Representative sense of ἄνθρωπον in creation language
  chosen_reading: man
  alternative_readings:
  - humankind
  - human being
  rationale: The verse alludes to humanity's creation and vocation in singular representative
    terms. Following the project's gender-accurate policy, the singular masculine
    is preserved rather than neutralized into a collective, while the sense remains
    representative of humanity.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Strength of δεσπόζῃ in relation to creation mandate
  chosen_reading: to rule over
  alternative_readings:
  - to have dominion over
  - to be master of
  rationale: The verb conveys authority over creation. 'To rule over' preserves that
    authority without importing extra theological freight beyond the text. 'Have dominion
    over' is a viable, more traditional alternative and is preserved in a footnote
    because of the Genesis-creation resonance.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 6
