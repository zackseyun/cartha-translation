theological_decisions:
- issue: Rendering of servile-status language in a prayer of humility
  chosen_reading: Use 'slave' / 'female slave' rather than softer traditional terms
  alternative_readings:
  - servant / maidservant
  - bondservant / maidservant
  rationale: The verse emphasizes the speaker's lowly status before God. Following
    the project's doctrine on δοῦλος, the main text preserves the bonded and socially
    subordinate force rather than muting it through traditional ecclesiastical wording.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy points 1 and 5'
- issue: Gendered self-reference of ἄνθρωπος
  chosen_reading: Render as 'man'
  alternative_readings:
  - human being
  - person
  rationale: The speaker is a male individual speaking of himself, so gender-accurate
    translation favors 'man' rather than a neutral abstraction.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy point 4'
