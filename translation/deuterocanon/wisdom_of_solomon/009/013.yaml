translation:
  text: For what man can know the counsel of God? Or who can discern what the Lord
    wills?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For what human being can know the purpose of God? Or who can think through
      what the Lord desires?'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς γὰρ ἄνθρωπος
  chosen: For what man
  alternatives:
  - For who among men
  - For what human being
  - For what person
  lexicon: LSJ
  rationale: ἄνθρωπος is singular and generic. Per project philosophy, a gender-accurate
    rendering is preferred where the source uses masculine/generic human language.
    'What man' preserves the rhetorical force and singular form better than a plural
    or fully neutral paraphrase.
- source_word: γνώσεται
  chosen: can know
  alternatives:
  - will know
  - comes to know
  lexicon: LSJ
  rationale: Future middle here functions in a rhetorical question about human capacity.
    'Can know' brings out the implied ability/inability in idiomatic English without
    losing the future-oriented sense of the Greek.
- source_word: βουλήν
  chosen: the counsel
  alternatives:
  - the plan
  - the purpose
  - the intention
  lexicon: LSJ
  rationale: βουλή commonly denotes counsel, purpose, or plan. 'Counsel' preserves
    the deliberative nuance and traditional theological weight of divine intention
    better than the flatter 'plan,' while remaining natural English.
- source_word: θεοῦ
  chosen: of God
  lexicon: LSJ
  rationale: 'Straightforward genitive: the counsel belongs to God.'
- source_word: ἐνθυμηθήσεται
  chosen: can discern
  alternatives:
  - will consider
  - will reflect on
  - will conceive
  - will think through
  lexicon: LSJ
  rationale: The verb can mean to ponder or consider inwardly. In this parallel rhetorical
    question, 'discern' communicates the sense of successfully grasping or figuring
    out what the Lord wants, which fits the context better than a mere mental act
    like 'think about.'
- source_word: τί θέλει
  chosen: what ... wills
  alternatives:
  - what ... wants
  - what ... desires
  lexicon: LSJ
  rationale: θέλει denotes will/wish/desire. 'Wills' best matches the elevated register
    of the verse and the theological sense of divine volition; 'wants' is too colloquial.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the master
  lexicon: LSJ
  rationale: Per doctrine, κύριος is rendered 'Lord' by default. In this deuterocanonical
    wisdom context, 'the Lord' is the natural title for God.
