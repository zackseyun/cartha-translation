  - purpose ... desires
  rationale: The verse emphasizes the limits of human access to God's deliberation
    and will. The chosen wording preserves that theological gravity without over-systematizing
    the concepts.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
