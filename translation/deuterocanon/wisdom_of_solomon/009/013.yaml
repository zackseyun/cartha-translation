  - person
  rationale: The Greek uses singular generic ἄνθρωπος. Following the project's gender-accurate
    policy, 'man' is retained in the main text rather than neutralizing the form.
    The generic sense remains clear from context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Divine intentionality language for βουλή / θέλει
  chosen_reading: counsel ... wills
