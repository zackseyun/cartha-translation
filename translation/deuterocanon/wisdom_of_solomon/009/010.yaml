theological_decisions:
- issue: Personification of Wisdom as a feminine figure sent from God's heavenly throne
  chosen_reading: Retain feminine pronouns ('her,' 'she') for Wisdom
  alternative_readings:
  - Use 'it' for abstract wisdom
  - Repeat 'Wisdom' instead of pronouns
  rationale: The Greek clearly treats Wisdom as a feminine personified figure (αὐτήν,
    συνπαροῦσά). Retaining feminine pronouns preserves the literary-theological portrayal
    without importing later doctrinal identifications not stated in the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition'
