translation:
  text: Send her out from the holy heavens, and send her from the throne of your glory,
    so that, being present with me, she may labor with me, and I may know what is
    pleasing to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from your glorious throne.' The Greek literally reads 'from the throne
      of your glory.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she may toil with me.' The Greek presents Wisdom as a personified feminine
      figure who shares in the speaker's work.
    reason: lexical_alternative
  - marker: c
    text: Or 'what is pleasing to you' / 'what is acceptable in your sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαπόστειλον
  chosen: Send ... out
  alternatives:
  - Send forth
  - Dispatch
  lexicon: LSJ
  rationale: The compound verb adds a sense of sending forth/out from a place. 'Send
    ... out' preserves the directional force without sounding archaic.
- source_word: ἐξ ἁγίων οὐρανῶν
  chosen: from the holy heavens
  alternatives:
  - from holy heavens
  - out of the holy heavens
  lexicon: LSJ
  rationale: The plural οὐρανῶν is retained as 'heavens' rather than flattened to
    singular 'heaven.' The article is naturally represented in English as 'the holy
    heavens.'
- source_word: ἀπὸ θρόνου δόξης σου
  chosen: from the throne of your glory
  alternatives:
  - from your glorious throne
  - from your throne of glory
  lexicon: LSJ
  rationale: A more formal rendering preserves the genitival structure and the elevated
    style of the prayer. 'Your glorious throne' is possible but slightly more interpretive.
- source_word: πέμψον
  chosen: send
  alternatives:
  - dispatch
  lexicon: LSJ
  rationale: Simple 'send' matches the basic force of the verb and works well in parallel
    with ἐξαπόστειλον.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: LSJ
  rationale: '''So that'' clearly marks purpose in readable modern English.'
- source_word: συνπαροῦσά
  chosen: being present with me
  alternatives:
  - being with me
  - accompanying me
  lexicon: LSJ
  rationale: The participle conveys presence together with the speaker. 'Being present
    with me' preserves that nuance without overinterpreting it as active guidance.
- source_word: κοπιάσῃ
  chosen: she may labor with me
  alternatives:
  - she may toil with me
  - she may work with me
  lexicon: LSJ
  rationale: The verb commonly denotes labor/toil. Because the subject is Wisdom personified,
    'labor with me' preserves the striking συνεργic imagery better than the flatter
    'work with me.' The accompanying 'with me' is supplied in English from the συν-
    nuance of the participle and the sense of shared action in context.
- source_word: γνῶ
  chosen: I may know
  alternatives:
  - I may learn
  - I may come to know
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist subjunctive after ἵνα.
- source_word: τί εὐάρεστόν ἐστιν παρὰ σοί
  chosen: what is pleasing before you
  alternatives:
  - what is pleasing to you
  - what is acceptable in your sight
  lexicon: LSJ
  rationale: '''Pleasing before you'' stays close to παρὰ σοί while remaining intelligible.
    ''Pleasing to you'' is smoother but slightly reduces the relational/spatial idiom.'
