theological_decisions:
- issue: Rendering παῖδες in relation to God
  chosen_reading: children
  alternative_readings:
  - servants
  rationale: Although παῖδες can denote servants, the immediate context of Solomon's
    prayer emphasizes filial relation to God rather than household service. 'Children'
    better preserves that theological nuance without importing later doctrinal categories.
