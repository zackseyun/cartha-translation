translation:
  text: Give me the wisdom that sits beside your throne, and do not reject me from
    among your children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wisdom that is seated beside your throne.' The Greek has 'your thrones'
      in the plural.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not reject me from among your servants,' since the Greek word can
      mean either 'children' or 'servants' depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: δός
  chosen: Give
  alternatives:
  - grant
  lexicon: LSJ
  rationale: A direct imperative from δίδωμι. 'Give' is the plain and natural English
    equivalent; 'grant' is possible but slightly more elevated than necessary.
- source_word: πάρεδρον
  chosen: that sits beside
  alternatives:
  - enthroned beside
  - attendant at
  lexicon: LSJ
  rationale: πάρεδρος denotes one seated beside another, often as an associate or
    attendant. Rendering it verbally as 'that sits beside' preserves the throne imagery
    and reads naturally in English. 'Attendant' weakens the spatial image; 'enthroned
    beside' is interpretive.
- source_word: σοφίαν
  chosen: wisdom
  lexicon: LSJ
  rationale: The direct object is personified Wisdom, a major theme in Wisdom of Solomon.
    Lowercase 'wisdom' keeps the lexical sense while the surrounding phrasing preserves
    the personification.
- source_word: τῶν σῶν θρόνων
  chosen: your thrones
  alternatives:
  - your throne
  lexicon: LSJ
  rationale: The Greek is plural, and the translation should preserve that form rather
    than normalize it to the singular. The plural may reflect royal majesty or heavenly
    court imagery; the English keeps the source wording without overexplaining it.
- source_word: ἀποδοκιμάσῃς
  chosen: reject
  alternatives:
  - disqualify
  - cast off
  lexicon: LSJ
  rationale: The verb means to reject after testing or evaluation. 'Reject' is the
    clearest idiomatic choice here. 'Disqualify' is too technical; 'cast off' is more
    emotive than the Greek requires.
- source_word: ἐκ παίδων σου
  chosen: from among your children
  alternatives:
  - from your children
  - from among your servants
  lexicon: LSJ
  rationale: παῖδες can mean children or servants depending on context. Here, in a
    prayer to God and in parallel with filial language in the surrounding context,
    'children' best fits. 'From among' brings out ἐκ naturally in English.
