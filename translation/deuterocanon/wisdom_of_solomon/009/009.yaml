translation:
  text: And with you is wisdom, who knows your works, and was present when you made
    the world, and understands what is pleasing in your eyes and what is right according
    to your commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cosmos.' The Greek κόσμος can emphasize the ordered world.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ σοῦ
  chosen: with you
  alternatives:
  - beside you
  - in your presence
  lexicon: LSJ
  rationale: The phrase denotes close association or accompaniment. 'With you' is
    the most natural English rendering and preserves the relational sense without
    overinterpreting spatial nuance.
- source_word: ἡ σοφία
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering for σοφία. The article marks the personified figure
    already prominent in Wisdom; English can preserve this simply as 'wisdom' while
    the following relative clauses maintain the personified portrayal.
- source_word: ἡ εἰδυῖα
  chosen: who knows
  alternatives:
  - knowing
  - who has known
  lexicon: LSJ
  rationale: The feminine participle agrees with σοφία and functions attributively.
    'Who knows' gives clear English relative-clause style and preserves the present/resultative
    sense of knowledge.
- source_word: τὰ ἔργα σου
  chosen: your works
  alternatives:
  - what you have done
  - your deeds
  lexicon: LSJ
  rationale: A straightforward formal rendering. 'Works' preserves the broad scope
    of divine acts rather than narrowing to moral 'deeds' alone.
- source_word: παροῦσα
  chosen: was present
  alternatives:
  - being present
  - stood by
  lexicon: LSJ
  rationale: The participle indicates presence alongside God at creation. 'Was present'
    is idiomatic and avoids adding stronger imagery such as 'stood by' not explicit
    in the Greek.
- source_word: ὅτε ἐποίεις τὸν κόσμον
  chosen: when you made the world
  alternatives:
  - when you were making the world
  - when you created the universe
  lexicon: LSJ
  rationale: κόσμος here refers to the ordered world/cosmos. 'World' is accessible
    modern English and fits optimal equivalence; 'made' reflects ἐποίεις without importing
    a technical creation formula absent from the verb itself.
- source_word: ἐπισταμένη
  chosen: who understands
  alternatives:
  - knowing
  - being skilled in
  - being acquainted with
  lexicon: LSJ
  rationale: The participle conveys informed understanding or competence. Since εἰδυῖα
    already rendered 'knows,' 'understands' avoids awkward repetition while preserving
    the semantic overlap and the sense of discerning insight.
- source_word: τί ἀρεστὸν ἐν ὀφθαλμοῖς σου
  chosen: what is pleasing in your eyes
  alternatives:
  - what is acceptable before you
  - what pleases you
  lexicon: LSJ
  rationale: This keeps the Hebrew-like idiom 'in your eyes,' which is intelligible
    in English and preserves the evaluative perspective of God rather than flattening
    it to merely 'what pleases you.'
- source_word: τί εὐθὲς ἐν ἐντολαῖς σου
  chosen: what is right according to your commandments
  alternatives:
  - what is straight in your commandments
  - what is upright in your commands
  lexicon: LSJ
  rationale: εὐθές literally suggests straightness/uprightness, but in ethical context
    'right' is the clearest idiomatic English. ἐν ἐντολαῖς σου is rendered 'according
    to your commandments' to express the normative sphere or standard indicated by
    ἐν.
