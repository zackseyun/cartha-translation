theological_decisions:
- issue: Personification of wisdom
  chosen_reading: Retain personal relative clauses ('who knows,' 'was present,' 'who
    understands') while keeping the noun 'wisdom' untranslated as an abstract-personified
    figure.
  alternative_readings:
  - Depersonalize as 'wisdom that knows... being present...'
  - Capitalize as 'Wisdom' to signal personification more strongly
  rationale: The Greek clearly personifies σοφία through feminine participles, but
    the text does not require capitalization in English, which could suggest a later
    doctrinal identification beyond the verse itself. Relative clauses preserve the
    personal portrayal without overreading.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering κόσμον
  chosen_reading: world
  alternative_readings:
  - cosmos
  - universe
  rationale: The verse speaks of God's ordered creation. 'World' is natural English
    and sufficiently broad; 'cosmos' is more technical and less readable, while 'universe'
    may sound more modern-scientific than the Greek requires.
  doctrine_reference: Readable modern English, not archaic or academic.
