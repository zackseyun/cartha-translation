translation:
  text: You said to build a temple on your holy mountain, and an altar in the city
    of your dwelling, a copy of the holy tabernacle that you prepared from the beginning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''tabernacle'': the Greek word can mean ''tent'' or, in biblical usage,
      the sacred tabernacle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπας
  chosen: You said
  alternatives:
  - You commanded
  - You spoke
  lexicon: LSJ
  rationale: Aorist of λέγω. 'You said' is the plain sense and keeps the prayer's
    direct address. 'Commanded' is possible by implication in context, but the verb
    itself is not explicitly an imperative verb.
- source_word: οἰκοδομῆσαι
  chosen: to build
  alternatives:
  - to construct
  lexicon: LSJ
  rationale: Infinitive of purpose/complement after εἶπας. 'Build' is natural modern
    English and fits both temple and altar language.
- source_word: ναὸν
  chosen: a temple
  alternatives:
  - a sanctuary
  - the temple
  lexicon: LSJ
  rationale: ναός denotes the temple/shrine. The anarthrous Greek does not require
    'the temple'; 'a temple' works idiomatically in English while still referring
    to the Jerusalem temple in context.
- source_word: ἐν ὄρει ἁγίῳ σου
  chosen: on your holy mountain
  alternatives:
  - in your holy mountain
  - upon your holy hill
  lexicon: LSJ
  rationale: With ἐν plus a location that in English is naturally rendered 'on' for
    a mountain. 'Mountain' is preferred over 'hill' because ὄρος normally denotes
    mountain and preserves the elevated sacred locale.
- source_word: πόλει κατασκηνώσεώς σου
  chosen: the city of your dwelling
  alternatives:
  - the city of your tabernacling
  - the city where you dwell
  lexicon: LSJ
  rationale: κατασκήνωσις is related to dwelling/encamping/tabernacling. 'Dwelling'
    is the clearest modern English while preserving the idea of God's settled presence
    in the city.
- source_word: θυσιαστήριον
  chosen: an altar
  lexicon: LSJ
  rationale: Standard rendering for sacrificial altar; straightforward cultic term.
- source_word: μίμημα
  chosen: an imitation
  alternatives:
  - a copy
  - a likeness
  - a representation
  lexicon: LSJ
  rationale: μίμημα denotes something made in imitation of a model. 'Imitation' best
    preserves the dependence of the earthly sanctuary on a prior pattern without over-specifying
    Platonic or Hebrews-like terminology.
- source_word: σκηνῆς ἁγίας
  chosen: the holy tent
  alternatives:
  - the holy tabernacle
  - the sacred tent
  lexicon: LSJ
  rationale: σκηνή can be rendered 'tent' or 'tabernacle.' 'Holy tent' is more accessible
    modern English; the tabernacle association remains clear from context. 'Tabernacle'
    is preserved as an alternative because of biblical tradition.
- source_word: ἣν προητοίμασας
  chosen: that you prepared
  alternatives:
  - that you made ready beforehand
  - which you prepared beforehand
  lexicon: LSJ
  rationale: The verb includes the notion of prior preparation. English can express
    this either explicitly or contextually; 'prepared' is smooth, and the temporal
    force is reinforced by the following phrase 'from the beginning.'
- source_word: ἀπʼ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from of old
  - from the first
  lexicon: LSJ
  rationale: Standard idiomatic rendering. It preserves the temporal depth of God's
    prior preparation without forcing a philosophical nuance.
