theological_decisions:
- issue: Relationship between the earthly sanctuary and its heavenly/divine pattern
    in μίμημα σκηνῆς ἁγίας
  chosen_reading: an imitation of the holy tent
  alternative_readings:
  - a copy of the holy tabernacle
  - a representation of the holy tent
  rationale: The Greek states that the altar/temple arrangement corresponds to a pre-prepared
    holy σκηνή. 'Imitation' preserves the text's claim of patterned correspondence
    without importing a more developed doctrinal framework than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
