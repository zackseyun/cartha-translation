translation:
  text: and govern the world in holiness and righteousness, and render judgment with
    uprightness of soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'judge judgment,' a Greek idiom meaning to render judgment or
      decide rightly.
    reason: lexical_alternative
lexical_decisions:
- source_word: διέπῃ
  chosen: govern
  alternatives:
  - guide
  - steer
  - administer
  lexicon: LSJ
  rationale: The verb can mean to guide or steer, and by extension to govern or administer.
    In this royal-prayer context, with κόσμον as the object, 'govern' best conveys
    exercised rule without becoming overly paraphrastic.
- source_word: κόσμον
  chosen: the world
  alternatives:
  - the universe
  - the order of things
  lexicon: LSJ
  rationale: κόσμος can denote the world or ordered universe. In context of Solomon's
    requested royal task, 'the world' is idiomatic English and preserves the broad
    scope of rule intended by the Greek.
- source_word: ἐν ὁσιότητι
  chosen: in holiness
  alternatives:
  - with holiness
  - in piety
  lexicon: LSJ
  rationale: ὁσιότης denotes holiness or piety, especially reverent moral integrity.
    'In holiness' keeps the prepositional structure and preserves the religious-ethical
    dimension.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness' unless context
    strongly demands 'justice.' Here the term stands alongside holiness as a quality
    of rule, so 'righteousness' fits the moral character emphasis; 'justice' is preserved
    as an alternative.
- source_word: ἐν εὐθύτητι ψυχῆς
  chosen: with uprightness of soul
  alternatives:
  - in uprightness of heart
  - with integrity of soul
  lexicon: LSJ
  rationale: εὐθύτης is uprightness or straightness; ψυχή here refers to the inner
    self. 'Uprightness of soul' is a close rendering of the Greek phrase. 'Heart'
    would be more idiomatic in English but is less literal than the source.
- source_word: κρίσιν κρίνῃ
  chosen: judge
  alternatives:
  - render judgment
  - judge cases
  lexicon: LSJ
  rationale: The cognate construction intensifies the act of judging. English does
    not naturally preserve the repetition, so 'judge' is used in the main text for
    readability, while the judicial force is carried by context.
