theological_decisions:
- issue: Anthropological distinction between ψυχή and νοῦς in parallel with body imagery
  chosen_reading: Render ψυχή as 'soul' and νοῦς as 'mind,' preserving the text's
    layered distinction between bodily existence and inner faculties.
  alternative_readings:
  - Render ψυχή as 'life' or 'self' and νοῦς as 'understanding'
  rationale: The verse poetically distinguishes the body's burden on the inner person
    and rational faculty. Using 'soul' and 'mind' keeps the conceptual tension visible
    rather than collapsing both into a single English term.
