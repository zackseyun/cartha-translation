translation:
  text: For a perishable body weighs down the soul, and the earthly tent burdens a
    mind full of cares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this body made of earth burdens the mind that is full of thoughts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φθαρτὸν
  chosen: perishable
  alternatives:
  - corruptible
  - mortal
  lexicon: LSJ/BDAG
  rationale: The adjective denotes susceptibility to decay or corruption. 'Perishable'
    is natural modern English and preserves the idea of frailty without narrowing
    it merely to mortality.
- source_word: σῶμα
  chosen: body
  lexicon: LSJ/BDAG
  rationale: Standard rendering for the physical body; no contextual reason to vary.
- source_word: βαρύνει
  chosen: weighs down
  alternatives:
  - burdens
  - makes heavy
  lexicon: LSJ/BDAG
  rationale: The verb conveys making heavy or oppressive. 'Weighs down' idiomatically
    captures the metaphor while preserving the bodily-to-psychic pressure of the Greek.
- source_word: ψυχήν
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: LSJ/BDAG
  rationale: In this wisdom context the contrast is between bodily frailty and the
    inner rational/spiritual life. 'Soul' best preserves that anthropological contrast,
    though 'self' or 'life' are possible in other contexts.
- source_word: βρίθει
  chosen: burdens
  alternatives:
  - presses down
  - is heavy upon
  - loads
  lexicon: LSJ
  rationale: The verb suggests being heavy or pressing with weight. 'Burdens' gives
    clear English parallelism with the first clause without flattening the image.
- source_word: γεῶδες
  chosen: earthly
  alternatives:
  - made of earth
  - earthbound
  - clay-like
  lexicon: LSJ
  rationale: The adjective means 'earthly' or 'made of earth.' 'Earthly' is concise
    and preserves the contrast between what is from the earth and the higher operations
    of the mind.
- source_word: σκῆνος
  chosen: tent
  alternatives:
  - tabernacle
  - dwelling
  - body
  lexicon: LSJ
  rationale: Literally 'tent' or 'temporary dwelling.' Rendering it as 'tent' preserves
    the metaphor of the body as a temporary earthly habitation; 'tabernacle' would
    sound archaic and over-ecclesial here.
- source_word: νοῦν
  chosen: mind
  alternatives:
  - understanding
  - reason
  lexicon: LSJ/BDAG
  rationale: The term refers to the intellect or rational faculty. 'Mind' is the most
    natural equivalent in modern English.
- source_word: πολυφρόντιδα
  chosen: full of cares
  alternatives:
  - full of thoughts
  - much-caring
  - anxious
  lexicon: LSJ
  rationale: The adjective denotes being occupied with many concerns or thoughts.
    'Full of cares' preserves the sense of mental preoccupation without importing
    a specifically clinical sense like 'anxious.'
