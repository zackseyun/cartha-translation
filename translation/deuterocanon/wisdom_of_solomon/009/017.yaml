translation:
  text: And who has known your counsel, unless you have given wisdom and sent your
    holy Spirit from on high?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your Holy Spirit." The Greek reads literally "your holy spirit," and
      English capitalization reflects interpretation rather than a difference in the
      source wording.
    reason: alternative_reading
lexical_decisions:
- source_word: βουλήν
  chosen: counsel
  alternatives:
  - plan
  - purpose
  - will
  lexicon: LSJ
  rationale: βουλή commonly denotes counsel, purpose, or plan. 'Counsel' preserves
    the sense of God's deliberative purpose without over-specifying either decree
    ('plan') or desire ('will').
- source_word: ἔγνω
  chosen: has known
  alternatives:
  - knew
  - has understood
  lexicon: LSJ
  rationale: Aorist in a rhetorical question can be rendered idiomatically in English
    as present perfect, highlighting the enduring fact that no one comes to know God's
    counsel apart from his gift.
- source_word: σοφίαν
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering; in Wisdom literature this carries both intellectual
    and moral-theological weight and should remain the established term 'wisdom'.
- source_word: τὸ ἅγιόν σου πνεῦμα
  chosen: your holy Spirit
  alternatives:
  - your Holy Spirit
  - your holy breath
  lexicon: LSJ
  rationale: The phrase is literally 'your holy spirit.' Because πνεῦμα can mean spirit
    or breath, 'spirit' is the natural choice here in this wisdom-theological context.
    Lowercase 'holy Spirit' avoids importing later dogmatic capitalization into a
    deuterocanonical text while still preserving the phrase's sacred force; the capitalized
    alternative is worth preserving in a footnote because readers may understand it
    personally/theologically.
- source_word: ἀπὸ ὑψίστων
  chosen: from on high
  alternatives:
  - from the heights
  - from the highest places
  lexicon: LSJ
  rationale: The plural adjective used substantivally refers to the heavenly heights.
    'From on high' is idiomatic modern English that preserves the elevated, heavenly
    source without awkward literalism.
