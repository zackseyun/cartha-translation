  rationale: The Greek phrase itself does not require English capitalization, and
    the translation philosophy forbids importing doctrinal claims beyond the text.
    The wording preserves the sacred referent while leaving the theological depth
    intact; the capitalized alternative is preserved in a footnote for readers who
    construe the phrase more specifically.
  doctrine_reference: Preserve theological tension rather than resolve it.
