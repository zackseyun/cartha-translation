theological_decisions:
- issue: Anthropological distinction between ψυχή and πνεῦμα
  chosen_reading: Render both distinctly as 'soul' and 'spirit'
  alternative_readings:
  - Render both more generically as aspects of 'life' or 'breath'
  rationale: The Greek uses two different terms in deliberate parallel. Preserving
    'soul' and 'spirit' maintains the text's rhetorical and anthropological distinction
    without forcing a later systematic theology onto the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
