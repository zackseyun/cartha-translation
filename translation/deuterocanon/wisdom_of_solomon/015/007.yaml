id: WIS.15.7
reference: Wisdom of Solomon 15:7
source:
  edition: lxx-swete-1909
  text: Καὶ γὰρ κεραμεὺς ἁπαλὴν γῆν θλίβων ἐπίμοχθον πλάσσει πρὸς ὑπηρεσίαν ἡμῶν ἕκαστον·
    ἀλλʼ ἐκ τοῦ αὐτοῦ πηλοῦ ἀνεπλάσατο τὰ τε τῶν καθαρῶν ἔργων δοῦλα σκεύη τὰ τε ἐναντία,
    πάνθʼ ὁμοίως· τούτων δὲ ἑτέρου τίς ἑκάστου ἐστὶν ἡ χρῆσις, κριτὴς ὁ πηλουργός.
  language: Greek
  pages:
  - 649
  confidence: high
  validation: no_reference
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: For a potter, kneading soft earth with toil, molds each vessel for our service;
    yet from the same clay he formed both the vessels for clean uses and those for
    the contrary, all alike. But which is the use of each of them, the potter is the
    judge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'the vessels for clean uses.' The Greek literally says
      'the vessels enslaved to clean works/uses,' using δοῦλα metaphorically of assigned
      function.
    reason: lexical_alternative
lexical_decisions:
- source_word: κεραμεύς
  chosen: potter
  alternatives:
  - ceramist
  lexicon: LSJ
  rationale: Standard term for one who works clay; 'potter' is the natural and precise
    English equivalent.
- source_word: ἁπαλήν γῆν
  chosen: soft earth
  alternatives:
  - soft clay
  - tender earth
  lexicon: LSJ
  rationale: Literally 'soft earth.' Although the context is pottery and 'clay' is
    possible, preserving 'earth' here reflects the wording before πηλός ('clay') appears
    later in the verse.
- source_word: θλίβων
  chosen: laboring over
  alternatives:
  - pressing
  - kneading
  - working
  lexicon: LSJ
  rationale: The participle literally suggests pressing or compressing the material.
    'Laboring over' captures the strenuous shaping activity in idiomatic English without
    over-specifying the exact hand motion.
- source_word: ἐπίμοχθον
  chosen: laboring
  alternatives:
  - with toil
  - painstakingly
  - wearily
  lexicon: LSJ
  rationale: Conveys toil and effort. Rendered adverbially with the participle/verb
    complex to produce natural English while preserving the sense of strenuous work.
- source_word: πλάσσει
  chosen: molds
  alternatives:
  - forms
  - shapes
  lexicon: LSJ
  rationale: A standard verb for shaping or forming. 'Molds' fits pottery imagery
    especially well.
- source_word: πρὸς ὑπηρεσίαν ἡμῶν
  chosen: for our service
  alternatives:
  - for our use
  - for our needs
  lexicon: LSJ
  rationale: The phrase indicates practical human use or service. 'For our service'
    preserves the service-oriented nuance while remaining readable.
- source_word: ἕκαστον
  chosen: each vessel
  alternatives:
  - each one
  - each item
  lexicon: LSJ
  rationale: The object is implicit from the pottery context; 'vessel' makes the English
    explicit and clear.
- source_word: πηλοῦ
  chosen: clay
  alternatives:
  - mud
  lexicon: LSJ
  rationale: Standard pottery term; 'clay' is the appropriate material in context.
- source_word: ἀνεπλάσατο
  chosen: he formed
  alternatives:
  - he fashioned
  - he molded
  lexicon: LSJ
  rationale: Refers to shaping from the same material. 'He formed' avoids repetition
    with earlier 'molds' while preserving the semantic field.
- source_word: τὰ τῶν καθαρῶν ἔργων δοῦλα σκεύη
  chosen: the vessels that are slaves to clean uses
  alternatives:
  - the vessels for clean uses
  - the vessels devoted to pure functions
  - the vessels serving clean purposes
  lexicon: LSJ
  rationale: δοῦλα literally means 'slaves' and should not be flattened without note.
    Here it is metaphorical of vessels assigned to a function. 'Clean uses' reflects
    καθαρῶν ἔργων in context of purity/clean use rather than moral abstraction.
- source_word: τὰ ἐναντία
  chosen: those for the opposite
  alternatives:
  - those for contrary uses
  - those for unclean uses
  lexicon: LSJ
  rationale: The Greek says 'the opposite [things/uses]' rather than explicitly 'unclean.'
    'For the opposite' preserves the contrast without importing more than the text
    states.
- source_word: πάνθʼ ὁμοίως
  chosen: all alike
  alternatives:
  - all in the same way
  - equally
  lexicon: LSJ
  rationale: Concise rendering of the summary phrase emphasizing sameness of manufacture.
- source_word: χρῆσις
  chosen: use
  alternatives:
  - function
  - purpose
  lexicon: LSJ
  rationale: The term denotes practical use or function; 'use' is the most direct
    rendering.
- source_word: κριτής
  chosen: is judged by
  alternatives:
  - the judge is
  - the arbiter is
  lexicon: LSJ
  rationale: 'The clause is compressed: literally ''the potter [is] judge.'' Rendering
    it verbally in English clarifies that the potter determines the use of each vessel.'
- source_word: πηλουργός
  chosen: the potter
  alternatives:
  - the clay-worker
  lexicon: LSJ
  rationale: Though distinct from κεραμεύς, both refer to the artisan working clay.
    'Potter' is idiomatic; 'clay-worker' would sound awkward in English. The shift
    is noted but not forced into unnatural diction.
