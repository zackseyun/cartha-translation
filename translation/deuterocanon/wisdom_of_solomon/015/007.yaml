theological_decisions:
- issue: Rendering δοῦλα in a metaphorical context
  chosen_reading: retained 'slaves' metaphorically in 'vessels that are slaves to
    clean uses'
  alternative_readings:
  - vessels for clean uses
  - vessels devoted to clean uses
  rationale: Per doctrine, δοῦλος/δοῦλα should not be automatically softened where
    bonded assignment is salient. Here the term is metaphorical, describing vessels
    assigned to a use. The main text preserves the metaphor, though a smoother alternative
    is worth noting.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1, §5'
