theological_decisions:
- issue: Interpretive force of the artisan's pride in idol-making
  chosen_reading: 'The verse is rendered to emphasize ironic condemnation: the craftsman
    ignores his mortality and boasts in producing fraudulent objects.'
  alternative_readings:
  - A more neutral reading could stress only technical imitation rather than moral
    falseness.
  rationale: The immediate context in Wisdom 15 critiques idol manufacture. Rendering
    κίβδηλα as 'counterfeit things' and δόξαν ἡγεῖται as 'considers it a glory' preserves
    the author's moral irony without adding doctrinal claims beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
