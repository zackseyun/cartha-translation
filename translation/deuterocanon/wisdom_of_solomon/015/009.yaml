translation:
  text: Yet his concern is not that he is about to grow weary, nor that his life is
    short; rather, he competes with goldsmiths and silversmiths, imitates bronze-workers,
    and considers it a glory that he molds counterfeit things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rivals' goldsmiths and silversmiths.
    reason: lexical_alternative
  - marker: b
    text: '''Counterfeit things'' may also be rendered ''false things'' or ''base
      imitations.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: φροντίς
  chosen: concern
  alternatives:
  - care
  - anxiety
  - preoccupation
  lexicon: BDAG
  rationale: '''Concern'' fits the sense of what occupies his mind without overstating
    emotional distress. The clause contrasts what does not concern him with what he
    prides himself in doing.'
- source_word: μέλλει κάμνειν
  chosen: is about to grow weary
  alternatives:
  - is going to tire out
  - is destined to fail
  - is about to become exhausted
  lexicon: LSJ
  rationale: κάμνειν commonly means 'to be weary, tire,' and with μέλλει expresses
    impending weariness. This suits the context of a mortal craftsman unconcerned
    with his own frailty.
- source_word: βραχυτελῆ βίον
  chosen: life is short
  alternatives:
  - brief span of life
  - short-lived existence
  lexicon: LSJ
  rationale: The compound adjective denotes something ending quickly or of short duration.
    'Life is short' is idiomatic English and preserves the point about mortality.
- source_word: ἀντερείδεται
  chosen: competes with
  alternatives:
  - rivals
  - sets himself against
  - emulates competitively
  lexicon: LSJ
  rationale: In context the verb conveys striving in rivalry with skilled artisans.
    'Competes with' is clear modern English and matches the boastful comparison implied.
- source_word: χρυσουργοῖς
  chosen: goldsmiths
  alternatives:
  - workers in gold
  lexicon: LSJ
  rationale: Standard occupational rendering.
- source_word: ἀργυροχόοις
  chosen: silversmiths
  alternatives:
  - workers in silver
  lexicon: LSJ
  rationale: Standard occupational rendering parallel to 'goldsmiths.'
- source_word: χαλκοπλάστας
  chosen: bronze-workers
  alternatives:
  - coppersmiths
  - workers in bronze
  - metalworkers
  lexicon: LSJ
  rationale: The term refers specifically to those who fashion bronze/copper objects.
    'Bronze-workers' is a natural rendering in this list of artisans.
- source_word: μιμεῖται
  chosen: imitates
  alternatives:
  - copies
  - emulates
  lexicon: BDAG
  rationale: The verb straightforwardly means 'imitates'; here it underscores derivative
    craftsmanship.
- source_word: δόξαν ἡγεῖται
  chosen: considers it a glory
  alternatives:
  - thinks it an honor
  - regards it as a boast
  lexicon: BDAG
  rationale: The phrase expresses evaluative pride. 'Glory' preserves the elevated,
    ironic tone of the Greek.
- source_word: κίβδηλα
  chosen: counterfeit things
  alternatives:
  - deceitful things
  - base imitations
  - false things
  lexicon: LSJ
  rationale: κίβδηλος often denotes counterfeit or adulterated items, especially in
    material contexts. Since the verse concerns idol-making and sham artistry, 'counterfeit
    things' captures both falseness and manufactured imitation.
- source_word: πλάσσει
  chosen: molds
  alternatives:
  - fashions
  - forms
  lexicon: BDAG
  rationale: Given the artisan context, 'molds' vividly fits shaping metal images,
    while still broad enough for crafted objects.
