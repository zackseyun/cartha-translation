theological_decisions:
- issue: Apparent tension between 'if we sin' and 'we will not sin'
  chosen_reading: Preserve both clauses as stated without harmonizing them.
  alternative_readings:
  - Render the second clause as 'let us not sin' or 'we should not sin' to reduce
    tension
  - Interpret the first clause concessively and the second as moral resolve
  rationale: 'The Greek presents a real rhetorical/theological tension: belonging
    to God even if sin occurs, yet also a confident assertion or resolve not to sin
    because of that belonging. Per project philosophy, the translation should preserve
    this tension rather than resolve it interpretively.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
