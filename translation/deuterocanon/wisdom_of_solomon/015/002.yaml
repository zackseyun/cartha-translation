  text: καὶ γὰρ ἐὰν ἁμάρτωμεν, σοὶ ἐσμεν, εἰδότες σου τὸ κράτος· οὐχ ἁμαρτησόμεθα,
    εἰδότες ὅτι σοὶ λελογίσμεθα.
  language: Greek
  pages:
