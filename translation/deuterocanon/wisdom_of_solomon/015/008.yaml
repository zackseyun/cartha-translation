translation:
  text: And with wicked toil he molds a futile god from the same clay—he who a little
    before had come from the earth, and after a short time goes back to the earth
    from which he was taken, when the debt of his soul is demanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when the debt of his life is demanded.' Greek ψυχή can mean 'soul'
      or 'life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κακόμοχθος
  chosen: with wicked toil
  alternatives:
  - toiling in evil
  - miserably laboring
  - with painful labor
  lexicon: LSJ
  rationale: The adjective combines the ideas of hardship/toil and badness. In context
    it characterizes the idol-maker's labor as morally corrupt, not merely strenuous.
    Rendering it adverbially with the verb gives natural English while preserving
    both toil and evil.
- source_word: θεὸν μάταιον
  chosen: a futile god
  alternatives:
  - a vain god
  - an empty god
  - a worthless god
  lexicon: LSJ
  rationale: μάταιος denotes emptiness, futility, vanity. 'Futile' preserves the irony
    that the crafted deity is empty and ineffective, while staying close to the Greek.
- source_word: πλάσσει
  chosen: molds
  alternatives:
  - forms
  - fashions
  lexicon: LSJ
  rationale: The verb evokes shaping clay, so 'molds' fits the immediate imagery of
    pottery better than the more generic 'forms'.
- source_word: ἐκ τοῦ αὐτοῦ πηλοῦ
  chosen: from the same clay
  alternatives:
  - out of the same clay
  lexicon: LSJ
  rationale: This highlights the irony that the idol and ordinary pottery come from
    identical material. 'Same' is explicit in αὐτοῦ here.
- source_word: ὃς
  chosen: he who
  alternatives:
  - the one who
  - who
  lexicon: Greek grammar
  rationale: The relative pronoun refers back to the craftsman, not the idol. 'He
    who' makes the antecedent clear in English.
- source_word: πρὸ μικροῦ
  chosen: a little before
  alternatives:
  - recently
  - not long ago
  lexicon: LSJ
  rationale: The phrase marks the maker's recent origin from earth. 'A little before'
    is slightly formal but transparent and close to the Greek sense.
- source_word: ἐκ γῆς γενηθεὶς
  chosen: had come from the earth
  alternatives:
  - having been made from earth
  - having been born from the earth
  lexicon: LSJ
  rationale: γενηθεὶς can be rendered broadly as 'having come into being.' 'Had come
    from the earth' avoids overcommitting to 'born' while preserving the human creatureliness
    emphasized by the context.
- source_word: μετʼ ὀλίγον πορεύεται
  chosen: after a short time goes back
  alternatives:
  - soon departs
  - after a little while goes
  lexicon: LSJ
  rationale: In context the movement is a return to the earth from which he was taken,
    so 'goes back' makes the implied destination explicit from the following clause
    and reads naturally.
- source_word: ἐξ ἧς ἐλήμφθη
  chosen: to the earth from which he was taken
  alternatives:
  - from which he was taken
  lexicon: LSJ
  rationale: The Greek literally says 'from which he was taken,' referring to γῆ.
    English benefits from restating 'the earth' to avoid ambiguity and to echo creation
    language.
- source_word: τὸ τῆς ψυχῆς ἀπαιτηθεὶς χρέος
  chosen: when the debt of his soul is demanded
  alternatives:
  - when the debt of his life is required
  - having had the debt of his soul exacted
  - when his life is called in
  lexicon: LSJ
  rationale: χρέος is 'debt' or 'what is owed'; ἀπαιτέω is to demand back or exact.
    ψυχή here can mean soul or life. 'Debt of his soul' preserves the metaphor and
    the anthropological wording of the Greek without flattening it to mere idiom.
