theological_decisions:
- issue: ψυχή in a mortality context
  chosen_reading: soul
  alternative_readings:
  - life
  rationale: The Greek uses ψυχή, which can denote either 'soul' or 'life.' Because
    the author contrasts human frailty and divine pretension, retaining 'soul' preserves
    the text's anthropological and moral weight. The alternative 'life' is viable
    and is preserved in a footnote.
