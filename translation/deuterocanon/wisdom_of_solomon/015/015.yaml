translation:
  text: For they even considered all the idols of the nations to be gods—things that
    have neither the use of eyes for seeing, nor noses for drawing in air, nor ears
    to hear, nor fingers on their hands for feeling, and their feet are useless for
    walking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breathing air'; the Greek literally speaks of noses 'for drawing in
      air.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλογίσαντο
  chosen: considered
  alternatives:
  - reckoned
  - thought
  - deemed
  lexicon: LSJ
  rationale: The verb denotes regarding or counting something as such. 'Considered'
    is natural modern English and preserves the cognitive evaluative sense without
    overstating formal declaration.
- source_word: εἴδωλα
  chosen: idols
  alternatives:
  - images
  - carved images
  lexicon: LSJ
  rationale: In this polemical context the referent is cult images treated as false
    gods. 'Idols' best captures both the physical object and the religious critique.
- source_word: ἐθνῶν
  chosen: of the nations
  alternatives:
  - of the Gentiles
  - of the peoples
  lexicon: LSJ
  rationale: '''Nations'' is the most straightforward rendering in this Jewish wisdom
    context. ''Gentiles'' would import later NT idiom more strongly than the Greek
    requires.'
- source_word: θεούς
  chosen: gods
  alternatives:
  - divine beings
  lexicon: LSJ
  rationale: The text states that the idols were regarded as gods. The simple plural
    'gods' is direct and idiomatic.
- source_word: ὀμμάτων χρῆσις εἰς ὅρασιν
  chosen: the use of eyes for seeing
  alternatives:
  - eyesight
  - the function of eyes for sight
  lexicon: LSJ
  rationale: The Greek is somewhat concrete and analytical, speaking of the use/function
    of eyes with respect to seeing. This rendering preserves that structure while
    remaining readable.
- source_word: συνολκὴν ἀέρος
  chosen: drawing in air
  alternatives:
  - breathing air
  - inhaling air
  lexicon: LSJ
  rationale: The phrase literally refers to drawing air together/in. 'Drawing in air'
    reflects the image closely and avoids over-paraphrasing, while clearly implying
    breathing.
- source_word: δάκτυλοι χειρῶν εἰς ψηλάφησιν
  chosen: fingers on their hands for feeling
  alternatives:
  - fingers of hands for touch
  - fingers for grasping
  lexicon: LSJ
  rationale: ψηλάφησις refers to touching/feeling by touch. 'Feeling' is the most
    natural English equivalent here. 'On their hands' makes the genitive relation
    idiomatic.
- source_word: ἀργοὶ πρὸς ἐπίβασιν
  chosen: useless for walking
  alternatives:
  - inactive for stepping
  - idle for movement
  - unable to walk
  lexicon: LSJ
  rationale: ἀργοί conveys inactivity or uselessness, and ἐπίβασις here concerns stepping
    or locomotion. 'Useless for walking' communicates the functional critique clearly
    in modern English.
