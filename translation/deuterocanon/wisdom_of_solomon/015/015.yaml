theological_decisions:
- issue: Rendering the anti-idol polemic without softening its force
  chosen_reading: The verse is translated as a direct denunciation of idols as lifeless
    objects wrongly regarded as gods.
  alternative_readings:
  - A more literal but stiffer rendering preserving each body-part phrase with minimal
    smoothing
  rationale: The source text mocks idols by listing absent sensory and locomotive
    capacities. The translation keeps that polemical contrast explicit without adding
    theological commentary beyond the Greek.
