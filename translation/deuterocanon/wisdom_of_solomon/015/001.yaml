theological_decisions:
- issue: Divine governance and mercy in the participial clause
  chosen_reading: God is described as presently governing all things with mercy.
  alternative_readings:
  - God orders all things mercifully
  - God administers all things in mercy
  rationale: The present participle διοικῶν functions predicatively with the string
    of divine attributes. Rendering it as 'governing all things with mercy' preserves
    both God's sovereign rule and the merciful manner of that rule without importing
    a stronger doctrinal system than the text states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
