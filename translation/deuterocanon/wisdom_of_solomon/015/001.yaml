id: WIS.15.1
reference: Wisdom of Solomon 15:1
source:
  edition: lxx-swete-1909
  text: Σὺ δὲ ὁ θεὸς ἡμῶν χρηστὸς καὶ ἀληθής, μακρόθυμος καὶ ἐλέει διοικῶν τὰ πάντα.
  language: Greek
  pages:
  - 648
  confidence: high
  validation: no_reference
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
