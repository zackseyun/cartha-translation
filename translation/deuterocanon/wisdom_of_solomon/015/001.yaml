translation:
  text: But you, our God, are kind and true, patient, and governing all things with
    mercy.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χρηστός
  chosen: kind
  alternatives:
  - good
  - benevolent
  - gracious
  lexicon: BDAG
  rationale: χρηστός commonly conveys kindness, goodness, or benevolence. 'Kind' is
    concise, natural English and fits the paired divine attributes here without sounding
    overly abstract.
- source_word: ἀληθής
  chosen: 'true'
  alternatives:
  - truthful
  - faithful
  - real
  lexicon: BDAG
  rationale: ἀληθής here describes God's character as true or genuine. 'True' preserves
    the broad sense and pairs well with 'kind'; 'truthful' is possible but narrower.
- source_word: μακρόθυμος
  chosen: patient
  alternatives:
  - long-suffering
  - forbearing
  lexicon: BDAG
  rationale: The term denotes slowness to anger and endurance. 'Patient' gives readable
    modern English; 'long-suffering' is more formal but less natural.
- source_word: ἐλέει
  chosen: with mercy
  alternatives:
  - mercifully
  - in mercy
  lexicon: BDAG
  rationale: The dative expresses manner or means with διοικῶν. 'With mercy' preserves
    the noun ἔλεος rather than converting it fully into an adverb, while remaining
    idiomatic.
- source_word: διοικῶν
  chosen: governing
  alternatives:
  - ordering
  - administering
  - directing
  lexicon: BDAG
  rationale: διοικέω can mean manage, administer, or govern. In reference to God and
    'all things,' 'governing' best captures providential rule without over-paraphrase.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  - the whole universe
  lexicon: BDAG
  rationale: The phrase is comprehensive. 'All things' is slightly more formal than
    'everything' and preserves the breadth of the Greek.
- source_word: Σὺ δὲ
  chosen: But you
  alternatives:
  - Yet you
  - You, however
  lexicon: BDAG
  rationale: The contrastive δέ is significant in context. 'But you' preserves the
    direct address and contrast simply and clearly.
