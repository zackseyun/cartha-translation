translation:
  text: His heart is ashes, and his hope is more worthless than earth, and his life
    more dishonored than clay,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soil' for 'earth'; the Greek comparison emphasizes extreme worthlessness.
    reason: lexical_alternative
  - marker: b
    text: Or 'more contemptible than clay'; the Greek term can stress lack of honor
      or esteem.
    reason: lexical_alternative
lexical_decisions:
- source_word: σποδός
  chosen: ashes
  alternatives:
  - ash
  - dust
  lexicon: LSJ
  rationale: Predicate nominative used metaphorically of the idolater's inner condition.
    English plural 'ashes' is the most natural idiom for something reduced to worthlessness
    and lifelessness.
- source_word: καρδία
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: LSJ
  rationale: Retains the common biblical anthropological term rather than interpreting
    it more narrowly. The verse speaks of the person's inner core, and 'heart' preserves
    that.
- source_word: γῆς
  chosen: earth
  alternatives:
  - soil
  - ground
  lexicon: LSJ
  rationale: 'The genitive after the comparative expresses the standard of comparison:
    his hope is ''more worthless than earth.'' ''Earth'' keeps the broad material
    sense and echoes the low-value imagery alongside clay.'
- source_word: εὐτελεστέρα
  chosen: more worthless
  alternatives:
  - cheaper
  - more paltry
  - more trivial
  lexicon: LSJ
  rationale: Conveys comparative lowness of value, not merely low monetary cost. 'More
    worthless' best fits the moral-poetic denunciation in context.
- source_word: ἐλπίς
  chosen: hope
  alternatives:
  - expectation
  lexicon: LSJ
  rationale: Standard rendering that fits both the abstract noun and the theological-poetic
    force of misplaced reliance.
- source_word: πηλοῦ
  chosen: clay
  alternatives:
  - mud
  lexicon: LSJ
  rationale: The immediate context concerns fashioned idols and materiality; 'clay'
    is more precise and dignified than 'mud' while preserving the earthy contrast.
- source_word: ἀτιμότερος
  chosen: more dishonored
  alternatives:
  - more contemptible
  - more worthless
  - more shameful
  lexicon: LSJ
  rationale: The adjective centers on lack of honor or esteem. 'More dishonored' preserves
    the honor-shame nuance better than flattening it into mere utility or value.
- source_word: βίος
  chosen: life
  alternatives:
  - way of life
  - livelihood
  lexicon: LSJ
  rationale: In this triad (heart, hope, life), 'life' is the most coherent rendering.
    'Way of life' is possible, but the verse appears to summarize the person's whole
    existence.
