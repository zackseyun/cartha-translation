theological_decisions:
- issue: Metaphorical force of the three predicates describing the idolater
  chosen_reading: Render the clauses as direct metaphors of worthlessness and dishonor
    without softening them into similes or psychological paraphrase.
  alternative_readings:
  - His heart is like ashes...
  - His mind is dust...
  rationale: The Greek uses straightforward nominal predicates. Preserving the stark
    metaphors matches the rhetoric of Wisdom's anti-idolatry polemic and avoids importing
    explanatory interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
