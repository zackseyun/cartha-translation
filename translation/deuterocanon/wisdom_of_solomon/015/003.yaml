theological_decisions:
- issue: Sense of δικαιοσύνη in a wisdom-theological context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Although δικαιοσύνη can mean 'justice,' the verse links knowing God with
    a state or quality of rightness before and with him, then parallels it with immortality.
    'Righteousness' better preserves that theological dimension while remaining consistent
    with project defaults.
