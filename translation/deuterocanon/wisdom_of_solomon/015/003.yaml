id: WIS.15.3
reference: Wisdom of Solomon 15:3
source:
  edition: lxx-swete-1909
  text: τὸ γὰρ ἐπίστασθαί σε ὁλόκληρος δικαιοσύνη, καὶ εἰδέναι σου τὸ κράτος ῥίζα
    ἀθανασίας.
  language: Greek
  pages:
  - 648
  confidence: high
  validation: no_reference
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: For to know you is complete righteousness, and to know your power is the root
    of immortality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''justice'': ''For to know you is complete justice.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίστασθαί
  chosen: to know
  alternatives:
  - to understand
  - to be acquainted with
  lexicon: BDAG
  rationale: The infinitive denotes knowing in the sense of recognition or understanding.
    In parallel with εἰδέναι, a simple 'to know' best preserves the compact style
    without over-interpreting a distinction between the two verbs.
- source_word: ὁλόκληρος
  chosen: complete
  alternatives:
  - whole
  - entire
  - perfect
  lexicon: LSJ
  rationale: Used predicatively with δικαιοσύνη, it describes righteousness as whole
    or entire. 'Complete' is natural modern English and preserves the sense of fullness
    better than the more wooden 'whole righteousness.'
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness' unless context
    strongly favors 'justice.' Here the phrase concerns right relation to God through
    knowing him, so 'righteousness' better fits than the more social-legal 'justice.'
- source_word: εἰδέναι
  chosen: to know
  alternatives:
  - to perceive
  - to recognize
  lexicon: BDAG
  rationale: As with ἐπίστασθαί, the basic sense is cognitive recognition. Rendering
    both verbs as 'to know' keeps the parallelism clear in English.
- source_word: κράτος
  chosen: power
  alternatives:
  - might
  - strength
  - dominion
  lexicon: BDAG
  rationale: The noun can denote strength or manifested might. 'Power' is the broadest
    and most idiomatic choice here, expressing God's effective might without implying
    political rule as 'dominion' might.
- source_word: ῥίζα
  chosen: root
  alternatives:
  - source
  - foundation
  lexicon: LSJ
  rationale: The metaphor is explicit in Greek. 'Root' should be retained rather than
    flattened to 'source,' since the image is intelligible in English and preserves
    the text's poetic force.
- source_word: ἀθανασίας
  chosen: immortality
  alternatives:
  - deathlessness
  lexicon: BDAG
  rationale: The standard rendering 'immortality' is clear and idiomatic, matching
    the theological-philosophical register of Wisdom.
