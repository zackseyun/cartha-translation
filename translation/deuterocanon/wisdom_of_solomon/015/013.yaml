theological_decisions:
- issue: Moral knowledge and culpability of the idol-maker
  chosen_reading: The verse states that the craftsman knowingly sins in manufacturing
    both ordinary fragile vessels and carved images.
  alternative_readings:
  - The comparative phrase could be taken more loosely as 'he knows, more than anyone,
    that he sins' without emphasizing moral self-awareness as strongly.
  rationale: The syntax most naturally presents conscious awareness of wrongdoing,
    which fits the surrounding anti-idolatry argument. The translation preserves that
    force without adding doctrinal commentary beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition.'
