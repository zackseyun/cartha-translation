  text: οὐδʼ ὅσον ἐπιποθῆσαι ὡς ἐν ζῴων ὄψει καλὰ τυγχάνει, ἐκπέφευγεν δὲ καὶ τὸν
    τοῦ θεοῦ ἔπαινον καὶ τὴν εὐλογίαν αὐτοῦ.
  language: Greek
  pages:
