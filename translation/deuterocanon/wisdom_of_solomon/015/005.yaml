translation:
  text: The sight of them comes to fools as a reproach, and they long for the form
    of a lifeless image.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the appearance of them becomes a disgrace to fools, and [one] desires
      the appearance of a dead, breathless image.' The Greek syntax of the second
      clause is compressed and can be rendered more literally, though less clearly
      in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄψις
  chosen: sight
  alternatives:
  - appearance
  - look
  lexicon: LSJ
  rationale: ὄψις can denote sight, appearance, or outward look. 'The sight of them'
    best fits the clause ὧν ὄψις ... ἔρχεται and preserves the idea that merely seeing
    these idols affects the foolish.
- source_word: ἄφροσιν
  chosen: fools
  alternatives:
  - the senseless
  - foolish people
  lexicon: LSJ
  rationale: ἄφρων denotes one lacking sense or wisdom. 'Fools' is concise, idiomatic,
    and matches Wisdom's moral contrast between wisdom and folly.
- source_word: εἰς ὄνειδος
  chosen: as a reproach
  alternatives:
  - for disgrace
  - to shame
  lexicon: LSJ
  rationale: The phrase indicates result or characterization. 'As a reproach' preserves
    the noun force of ὄνειδος and the idiom of ἔρχεται with εἰς.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - becomes
  - results
  lexicon: LSJ
  rationale: 'A straightforward rendering keeps the Greek verbal image intact: the
    sight ''comes'' to fools as reproach.'
- source_word: ποθεῖ
  chosen: they long for
  alternatives:
  - it longs for
  - desires
  lexicon: LSJ
  rationale: 'Although the singular verb could be taken with ὄψις (''the sight ...
    longs for''), the sense is better carried in English by making the implied foolish
    viewers the subject: they desire what they see. This avoids awkwardness while
    preserving the verse''s meaning.'
- source_word: νεκρᾶς εἰκόνος
  chosen: a lifeless image
  alternatives:
  - a dead image
  - an image of the dead
  lexicon: LSJ
  rationale: νεκρός literally means dead, but with ἄπνουν and in the context of idols
    it describes an inanimate object. 'Lifeless image' communicates the polemical
    force clearly in modern English.
- source_word: εἶδος
  chosen: form
  alternatives:
  - shape
  - appearance
  lexicon: LSJ
  rationale: εἶδος refers to visible form or appearance. 'Form' is natural here and
    avoids redundancy with the earlier ὄψις.
- source_word: ἄπνουν
  chosen: lifeless
  alternatives:
  - breathless
  - without breath
  lexicon: LSJ
  rationale: ἄπνους literally means without breath. In English, 'lifeless' conveys
    the intended contrast between a crafted idol and a living being, while remaining
    faithful to the sense.
