theological_decisions:
- issue: Idol polemic expressed through syntax of desire
  chosen_reading: The second clause is rendered with an implied plural subject ('they
    long for') referring to the foolish, rather than attributing desire to 'the sight.'
  alternative_readings:
  - '''its appearance longs for the form of a breathless dead image'' (more literal
    but awkward and obscure)'
  rationale: The Greek shifts awkwardly if read woodenly. The broader context condemns
    idolaters' attraction to images, so making the foolish the understood subject
    in English preserves the sense without over-paraphrasing.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
