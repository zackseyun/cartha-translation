theological_decisions:
- issue: Meaning of 'borrowed the spirit' in relation to human life
  chosen_reading: The line means the idol-maker himself possesses life/spirit only
    as something received temporarily, highlighting creatureliness over against the
    false god he forms.
  alternative_readings:
  - '''borrowed breath'' emphasizing mortality more physically'
  rationale: The immediate argument mocks idols by stressing that their maker is merely
    human and dependent for life. Rendering πνεῦμα as 'spirit' in the main text preserves
    the broader anthropological sense, while the rationale acknowledges the possible
    nuance of breath/life-breath.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
