translation:
  text: For a man made them, and one who had borrowed the spirit formed them; for
    no man has the strength to fashion a god like himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breath'; Greek 'the spirit' can also denote life-breath here, stressing
      that the maker's life is only on loan.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - human
  - person
  - humankind
  lexicon: LSJ
  rationale: Used twice in the verse with singular force, contrasting a human maker
    with a supposed god. 'Man' preserves the gender-accurate singular sense and the
    rhetorical irony that a mere human manufactures deity-images.
- source_word: ἐποίησεν
  chosen: made
  alternatives:
  - did
  - manufactured
  lexicon: LSJ
  rationale: A broad verb here referring to producing idols. 'Made' is natural English
    and fits the first clause without over-specifying the process.
- source_word: τὸ πνεῦμα
  chosen: the spirit
  alternatives:
  - breath
  - life-breath
  lexicon: LSJ
  rationale: In context this refers to the animating principle a human possesses only
    by derivation, not inherently. 'Spirit' best matches the Greek while preserving
    the theological contrast between borrowed life and fabricated idols.
- source_word: δεδανεισμένος
  chosen: had borrowed
  alternatives:
  - having borrowed
  - on loan
  lexicon: LSJ
  rationale: The participle emphasizes that the human artisan's life/spirit is not
    self-originating but received temporarily. 'Had borrowed' communicates prior reception
    in idiomatic English.
- source_word: ἔπλασεν
  chosen: formed
  alternatives:
  - fashioned
  - molded
  lexicon: LSJ
  rationale: Chosen to vary appropriately from ἐποίησεν while preserving the shaping
    sense of πλάσσω, especially suitable for crafted images.
- source_word: ὅμοιον
  chosen: like himself
  alternatives:
  - similar to himself
  - in his own likeness
  lexicon: LSJ
  rationale: The phrase αὐτῷ ὅμοιον modifies θεόν and underscores the absurdity that
    a human makes a god in human likeness. 'Like himself' is concise and clear.
- source_word: ἰσχύει
  chosen: has the strength
  alternatives:
  - is able
  - has power
  lexicon: LSJ
  rationale: The verb conveys capability or power. 'Has the strength' preserves the
    forceful nuance and the irony that human capacity is insufficient for truly making
    a god.
- source_word: πλάσαι
  chosen: to fashion
  alternatives:
  - to form
  - to mold
  lexicon: LSJ
  rationale: Infinitive of πλάσσω in a craft context. 'Fashion' is idiomatic and keeps
    the artisan imagery.
- source_word: θεόν
  chosen: a god
  alternatives:
  - God
  - deity
  lexicon: LSJ
  rationale: Anarthrous singular in an idol polemic context refers to a supposed deity,
    not the true God. Lowercase 'god' is required by context.
