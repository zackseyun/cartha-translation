theological_decisions:
- issue: Supplying the implicit object for the three participles
  chosen_reading: Render the participles with the implied object 'them,' referring
    to the idols discussed in context.
  alternative_readings:
  - 'Leave the object unstated in English: ''those who do, those who desire, and those
    who worship'''
  - 'Render οἱ δρῶντες more abstractly: ''those who practice them/these things'''
  rationale: The Greek omits the direct object because it is recoverable from the
    surrounding context about idols and idol-images. English requires a clearer object
    for readability. Supplying 'them' preserves the referent without adding new theology.
    For δρῶντες specifically, the contextual sense is the makers of idols rather than
    generic evildoers.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense while using readable modern English.'
