translation:
  text: Lovers of evil are worthy of such hopes, both those who make them and those
    who desire them and those who worship them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worthy of hopes like these.' The phrase points back to the kind of expectations
      attached to idols in the surrounding context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'those doing [them],' but in context this refers to those who
      make or fashion the idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: κακῶν
  chosen: of evil
  alternatives:
  - of evils
  - of bad things
  lexicon: LSJ
  rationale: Genitive plural of κακόν used with ἐρασταί; in English, 'lovers of evil'
    is more idiomatic and captures the moral sense better than the more literal 'lovers
    of evils.'
- source_word: ἐρασταὶ
  chosen: Lovers
  alternatives:
  - devotees
  - those who love
  lexicon: LSJ
  rationale: The noun denotes those characterized by love or desire for something.
    'Lovers' preserves the compact force of the Greek and fits the moral indictment.
- source_word: ἄξιοί
  chosen: are worthy
  alternatives:
  - deserve
  - are fit for
  lexicon: LSJ
  rationale: Predicate adjective expressing deservingness. 'Are worthy' stays close
    to the Greek while remaining natural English.
- source_word: τοιούτων ἐλπίδων
  chosen: of such hopes
  alternatives:
  - of such expectations
  - of hopes like these
  lexicon: LSJ
  rationale: The phrase points back to the shameful objects and outcomes associated
    with idols in context. 'Such hopes' is a straightforward rendering that preserves
    the backward-pointing demonstrative force.
- source_word: οἱ δρῶντες
  chosen: those who make them
  alternatives:
  - those who do them
  - those who practice them
  lexicon: LSJ
  rationale: Although δρῶ can broadly mean 'do' or 'act,' in this immediate context
    of handmade idols the sense is those who produce or fashion such things. 'Make
    them' brings out the implied object from context without over-paraphrasing.
- source_word: οἱ ποθοῦντες
  chosen: those who desire them
  alternatives:
  - those who long for them
  - those who crave them
  lexicon: LSJ
  rationale: ποθέω conveys strong desire or longing. 'Desire them' is clear, dignified,
    and sufficiently strong.
- source_word: οἱ σεβόμενοι
  chosen: those who worship them
  alternatives:
  - those who revere them
  - those who venerate them
  lexicon: LSJ
  rationale: In religious context σέβομαι means reverence or worship. Because the
    objects are idols, 'worship them' best communicates the cultic sense.
