theological_decisions:
- issue: Rendering σεβάσματα in an anti-idolatry context
  chosen_reading: objects he worships
  alternative_readings:
  - idols
  - revered things
  rationale: The verse mocks idol manufacture and contrasts the living maker with
    lifeless worship-objects. 'Objects he worships' preserves the lexical sense of
    revered/worshiped things while keeping the anti-idolatry force clear. 'Idols'
    is contextually valid but slightly more interpretive than the noun itself.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English.'
