translation:
  text: Yet being mortal, he makes a dead thing with lawless hands; for he is better
    than the objects he worships, since he himself once lived, but those never did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than his idols' for 'than the objects he worships.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θνητὸς
  chosen: mortal
  alternatives:
  - subject to death
  - dying
  lexicon: LSJ
  rationale: θνητός denotes one liable to death. 'Mortal' is concise, natural English
    and preserves the contrast with the lifeless idol.
- source_word: νεκρὸν
  chosen: a dead thing
  alternatives:
  - a corpse
  - something dead
  lexicon: LSJ
  rationale: The adjective is used substantivally for what is dead. 'A dead thing'
    fits the polemic against idols better than 'corpse,' which would sound overly
    literal and misleading in context.
- source_word: ἐργάζεται
  chosen: makes
  alternatives:
  - works
  - produces
  - fashions
  lexicon: LSJ
  rationale: In context of idol manufacture, the verb means to make or produce. 'Makes'
    is straightforward modern English.
- source_word: χερσὶν ἀνόμοις
  chosen: with lawless hands
  alternatives:
  - with unlawful hands
  - with wicked hands
  lexicon: LSJ
  rationale: The phrase is instrumental. ἀνόμοις can mean lawless or wicked; 'lawless'
    preserves the lexical link to being outside divine law while remaining idiomatic.
- source_word: κρείττων
  chosen: better
  alternatives:
  - superior
  - stronger
  lexicon: LSJ
  rationale: The comparative states the maker's superiority over the idol. 'Better'
    is simple and sufficiently broad for the comparison.
- source_word: τῶν σεβασμάτων αὐτοῦ
  chosen: than the objects he worships
  alternatives:
  - than his revered things
  - than his idols
  lexicon: LSJ
  rationale: σεβάσματα are objects of reverence or worship. 'Objects he worships'
    makes the sense explicit without importing a more interpretive term than the Greek
    itself requires; in context these are idols.
- source_word: ἔζησεν
  chosen: once lived
  alternatives:
  - lived
  - was alive
  lexicon: LSJ
  rationale: The aorist marks the fact that he had life, in contrast to the idols
    that never had it. 'Once lived' sharpens the contrast in natural English.
- source_word: οὐδέποτε
  chosen: never did
  alternatives:
  - never lived
  - at no time
  lexicon: LSJ
  rationale: The adverb negates any past possession of life by the idols. 'Never did'
    avoids repetition while clearly referring back to living.
