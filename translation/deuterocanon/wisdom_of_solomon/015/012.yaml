id: WIS.15.12
reference: Wisdom of Solomon 15:12
source:
  edition: lxx-swete-1909
  text: ἀλλʼ ἐλογίσατο παίγνιον εἶναι τὴν ζωὴν ἡμῶν καὶ τὸν βίον πανηγυρισμὸν ἐπικερδῆ,
    δεῖν γὰρ φησιν ὅθεν δὴ κἂν ἐκ κακοῦ πορίζειν.
  language: Greek
  pages:
  - 649
  confidence: high
  validation: no_reference
