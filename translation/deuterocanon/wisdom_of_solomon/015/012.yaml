translation:
  text: But he considered our life to be a game, and our way of life a profitable
    festival; for, he says, one must get resources from wherever one can, even from
    evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our life a plaything ... and our livelihood a gainful celebration.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one must profit from wherever possible, even by wrongdoing.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλογίσατο
  chosen: considered
  alternatives:
  - thought
  - reckoned
  - regarded
  lexicon: BDAG
  rationale: Aorist middle of λογίζομαι here expresses evaluative judgment. 'Considered'
    is natural English and preserves the sense of deliberate estimation.
- source_word: παίγνιον
  chosen: a game
  alternatives:
  - a plaything
  - a joke
  - sport
  lexicon: LSJ
  rationale: The noun denotes something playful or for amusement. 'A game' best fits
    the moral critique in context without overcommitting to 'joke,' which can sound
    too colloquial, or 'plaything,' which shifts the object nuance.
- source_word: ζωὴν
  chosen: life
  alternatives:
  - living
  lexicon: BDAG
  rationale: Standard rendering; paired with βίον, it helps preserve the rhetorical
    distinction between life in general and manner/course of life.
- source_word: βίον
  chosen: way of life
  alternatives:
  - life
  - livelihood
  - course of life
  lexicon: BDAG
  rationale: Because ζωή already appears, rendering βίος simply as 'life' would flatten
    the Greek variation. 'Way of life' preserves a distinction and suits the ethical-economic
    context.
- source_word: πανηγυρισμὸν
  chosen: festival
  alternatives:
  - celebration
  - holiday gathering
  - merrymaking
  lexicon: LSJ
  rationale: The word denotes festal celebration or public festival. 'Festival' is
    concise and keeps the image of life as a festive occasion rather than merely generic
    enjoyment.
- source_word: ἐπικερδῆ
  chosen: profitable
  alternatives:
  - gainful
  - for profit
  - advantageous
  lexicon: LSJ
  rationale: 'This adjective modifies πανηγυρισμόν and adds the mercenary note: a
    festival pursued for gain. ''Profitable'' is clear modern English and preserves
    the economic edge.'
- source_word: δεῖν
  chosen: one must
  alternatives:
  - it is necessary
  - it is fitting
  lexicon: BDAG
  rationale: Impersonal necessity is best rendered idiomatically as 'one must' in
    the reported speech.
- source_word: ὅθεν δὴ κἂν
  chosen: from wherever one can
  alternatives:
  - from whatever source indeed even if
  - from wherever at all
  lexicon: LSJ
  rationale: The phrase is idiomatic and somewhat emphatic, expressing indifference
    to source. 'From wherever one can' captures the breadth and pragmatic force in
    readable English.
- source_word: ἐκ κακοῦ
  chosen: from evil
  alternatives:
  - from wrongdoing
  - from bad means
  - out of evil
  lexicon: BDAG
  rationale: The phrase likely means deriving gain from morally evil means, not merely
    from misfortune. 'From evil' is compact and preserves the moral category; the
    more explicit 'from wrongdoing' is preserved as an alternative sense.
- source_word: πορίζειν
  chosen: get resources
  alternatives:
  - procure
  - acquire
  - gain
  lexicon: BDAG
  rationale: The verb means to provide or procure, often with material connotations.
    'Get resources' makes the acquisitive sense explicit in contemporary English without
    sounding overly technical.
