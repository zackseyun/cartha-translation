theological_decisions:
- issue: Moral force of ἐκ κακοῦ
  chosen_reading: The speaker endorses obtaining gain by evil means.
  alternative_readings:
  - The phrase could be taken more weakly as 'even from misfortune' or 'even from
    bad circumstances.'
  rationale: In context the verse condemns a corrupt outlook tied to profit and idolatrous
    moral blindness. Rendering the phrase morally ('from evil') best fits the argument,
    while preserving the weaker circumstantial possibility as an alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity where genuine.
