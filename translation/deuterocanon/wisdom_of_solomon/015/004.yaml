translation:
  text: For neither did the evil-crafted invention of men lead us astray, nor the
    fruitless labor of a shadow-painter—an image stained with varied colors;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deceive us' for 'lead us astray.' The Greek verb can express either
      deception or causing someone to wander from the right path.
    reason: lexical_alternative
  - marker: b
    text: '''Shadow-painter'' refers to an artist working in outline or shading; the
      phrase criticizes the maker of painted idol-images.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐπλάνησεν
  chosen: lead us astray
  alternatives:
  - deceive us
  - mislead us
  lexicon: BDAG
  rationale: The verb conveys causing someone to wander or be misled. 'Lead us astray'
    preserves the metaphor of wandering better than the flatter 'deceive,' while remaining
    natural English.
- source_word: κακότεχνος ἐπίνοια
  chosen: evil-crafted invention
  alternatives:
  - wicked contrivance
  - malicious device
  - evil design
  lexicon: LSJ
  rationale: The compound adjective suggests something artfully but badly/wickedly
    made; with ἐπίνοια it denotes a contrived scheme or invention. 'Evil-crafted invention'
    keeps both the artisanal nuance and the moral judgment, fitting the surrounding
    critique of idol-making.
- source_word: σκιαγράφων
  chosen: shadow-painter
  alternatives:
  - painter of shadows
  - sketcher
  lexicon: LSJ
  rationale: The participial/genitival form refers to one who paints in outline or
    shading. 'Shadow-painter' is slightly unusual but transparent and preserves the
    concrete artistic reference better than the generic 'artist' or 'sketcher.'
- source_word: πόνος ἄκαρπος
  chosen: fruitless labor
  alternatives:
  - unproductive toil
  - barren effort
  lexicon: BDAG
  rationale: The phrase emphasizes effort that yields no true benefit. 'Fruitless
    labor' is idiomatic and preserves the evaluative force.
- source_word: εἶδος
  chosen: image
  alternatives:
  - form
  - figure
  - appearance
  lexicon: LSJ
  rationale: In context of manufactured idols, 'image' best captures a visible crafted
    representation, more specific than the abstract 'form' or 'appearance.'
- source_word: σπιλωθὲν
  chosen: stained
  alternatives:
  - besmeared
  - defiled
  - spotted
  lexicon: LSJ
  rationale: The participle literally suggests being marked or stained. Here it describes
    the object as covered with pigments; 'stained' preserves the visual sense and
    may also subtly retain the negative connotation.
- source_word: χρώμασιν διηλλαγμένοις
  chosen: with varied colors
  alternatives:
  - with different colors
  - with contrasting pigments
  - with many-colored paints
  lexicon: LSJ
  rationale: The phrase denotes colors that differ from one another. 'Varied colors'
    is concise, natural, and faithful to the plural adjectival nuance.
