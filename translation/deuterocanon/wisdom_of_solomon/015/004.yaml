theological_decisions:
- issue: Rendering the verse's polemic against idolatrous artistry without softening
    its moral force
  chosen_reading: The verse is translated to emphasize that human artistic contrivance
    and painted images did not mislead the faithful speaker.
  alternative_readings:
  - A more neutral rendering could stress mere aesthetic production rather than morally
    corrupt invention.
  rationale: The Greek explicitly combines moral censure (κακότεχνος) with artistic
    language, so the translation preserves both the condemnation of idolatry and the
    concrete reference to crafted images.
  doctrine_reference: Translation philosophy §§1, 5
