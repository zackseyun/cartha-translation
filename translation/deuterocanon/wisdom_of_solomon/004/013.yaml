lexical_decisions:
- source_word: τελειωθεὶς
  chosen: having been perfected
  alternatives:
  - having reached perfection
  - having been made complete
  - having come to maturity
  lexicon: BDAG
  rationale: Aorist passive participle of τελειόω. In this context it refers to being
    brought to completion or full moral/spiritual maturity, not sinless perfection
    in an abstract doctrinal sense. 'Having been perfected' preserves the passive
    form and the completion nuance better than the more interpretive 'having come
    to maturity.'
- source_word: ἐν ὀλίγῳ
  chosen: in a short time
  alternatives:
  - in a little while
  - in a few years
  - in little
  lexicon: LSJ
  rationale: The phrase is idiomatic for a brief span rather than a small quantity
    in the abstract. 'In a short time' is natural English and fits the contrast with
    'long years.'
- source_word: ἐπλήρωσεν
  chosen: fulfilled
  alternatives:
  - completed
  - filled up
  - brought to fullness
  lexicon: BDAG
  rationale: From πληρόω. Here the sense is that a brief life nevertheless brought
    to completion what would normally belong to a long lifespan. 'Fulfilled' keeps
    the completion sense without sounding overly wooden.
- source_word: χρόνους μακρούς
  chosen: long years
  alternatives:
  - many years
  - a long time
  - long ages
  lexicon: LSJ
  rationale: Although χρόνος is 'time,' in this context with μακρούς it refers to
    an extended lifespan. 'Long years' makes the implied lifespan explicit and reads
    idiomatically in English while preserving the contrast with 'a short time.'
