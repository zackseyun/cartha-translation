id: WIS.4.21
reference: Wisdom of Solomon 4:21
source:
  edition: lxx-swete-1909
  text: Τότε στήσεται ἐν παρρησίᾳ πολλῇ ὁ δίκαιος κατὰ πρόσωπον τῶν θλιψάντων αὐτὸν
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: Then the righteous man will stand with great boldness before those who afflicted
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'before those who afflicted him.' The Greek literally says 'before
      the face of those who afflicted him,' preserving the sense of direct confrontation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: LSJ
  rationale: Temporal adverb marking sequence from the preceding judgment scene; 'Then'
    is natural and sufficiently formal.
- source_word: στήσεται
  chosen: will stand
  alternatives:
  - will be made to stand
  - will take his stand
  lexicon: LSJ
  rationale: 'Future middle of ἵστημι here is intransitive and idiomatic: the righteous
    person stands forth or takes his stand. ''Will stand'' is clear modern English
    without overinterpreting the middle nuance.'
- source_word: ἐν παρρησίᾳ πολλῇ
  chosen: with great boldness
  alternatives:
  - in great confidence
  - with great frankness
  lexicon: LSJ
  rationale: παρρησία can denote boldness, confidence, or outspokenness. In this judicial-vindication
    context, 'with great boldness' best captures fearless public confidence. 'In great
    confidence' is possible but less idiomatic in English.
- source_word: ὁ δίκαιος
  chosen: the righteous man
  alternatives:
  - the righteous one
  - the just man
  lexicon: LSJ
  rationale: The singular substantive adjective refers to the exemplary righteous
    person developed in the surrounding context. Per gender-accurate policy, 'man'
    preserves the masculine singular while still functioning representatively. 'Righteous
    one' is possible but less natural here.
- source_word: κατὰ πρόσωπον
  chosen: before the face of
  alternatives:
  - before
  - in the presence of
  - against the face of
  lexicon: LSJ
  rationale: Literally 'according to/before the face of.' The phrase denotes direct
    presence or confrontation. 'Before the face of' preserves the vividness of the
    Greek while remaining understandable; a smoother alternative would be simply 'before.'
- source_word: τῶν θλιψάντων αὐτὸν
  chosen: those who afflicted him
  alternatives:
  - those who oppressed him
  - those who troubled him
  lexicon: LSJ
  rationale: The aorist participle of θλίβω denotes causing distress, oppression,
    or affliction. 'Afflicted' is broad enough to cover hostile mistreatment in context
    without narrowing to economic or political oppression alone.
