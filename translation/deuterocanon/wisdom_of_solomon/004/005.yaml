translation:
  text: Unfinished branches will be broken off, and their fruit is useless, unripe
    for eating and fit for nothing;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'immature branches' for 'unfinished branches'; the Greek adjective can
      denote what has not reached completion.
    reason: lexical_alternative
  - marker: b
    text: Or 'premature for eating' instead of 'unripe for eating.' In this context
      of fruit, 'unripe' best fits the image.
    reason: lexical_alternative
lexical_decisions:
- source_word: περικλασθήσονται
  chosen: will be broken off
  alternatives:
  - will be snapped off
  - will be broken around
  lexicon: LSJ
  rationale: Future passive conveys a coming result. 'Broken off' is idiomatic English
    and fits the image of branches being severed; it preserves the passive force without
    over-literal awkwardness.
- source_word: κλῶνες
  chosen: branches
  alternatives:
  - boughs
  - shoots
  lexicon: LSJ
  rationale: Standard botanical sense. 'Branches' is clear modern English and suits
    the metaphor.
- source_word: ἀτέλεστοι
  chosen: unfinished
  alternatives:
  - incomplete
  - immature
  - unperfected
  lexicon: LSJ
  rationale: The adjective denotes not brought to completion. 'Unfinished' preserves
    the idea of lack of completion more directly than 'immature,' though the context
    also implies underdevelopment.
- source_word: καρπός
  chosen: fruit
  alternatives:
  - produce
  - crop
  lexicon: LSJ
  rationale: Literal agricultural image should be retained; 'fruit' is the natural
    rendering.
- source_word: ἄχρηστος
  chosen: useless
  alternatives:
  - worthless
  - unserviceable
  lexicon: LSJ
  rationale: Conveys lack of use or value. 'Useless' is straightforward and readable.
- source_word: ἄωρος
  chosen: unripe
  alternatives:
  - premature
  - untimely
  lexicon: LSJ
  rationale: In context of fruit and eating, 'unripe' best captures the agricultural
    sense. 'Premature' is possible but less natural in English here.
- source_word: εἰς βρῶσιν
  chosen: for eating
  alternatives:
  - for food
  - to be eaten
  lexicon: LSJ
  rationale: Expresses suitability for consumption. 'For eating' is concise and natural
    with 'unripe.'
- source_word: ἐπιτήδειος
  chosen: fit
  alternatives:
  - suitable
  - useful
  lexicon: LSJ
  rationale: The phrase εἰς οὐδὲν ἐπιτήδειος means suitable for nothing. 'Fit for
    nothing' is an idiomatic English equivalent that preserves the force of the Greek.
