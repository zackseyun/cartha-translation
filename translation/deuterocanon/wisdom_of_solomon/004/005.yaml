theological_decisions:
- issue: Metaphorical force of the agricultural imagery in context
  chosen_reading: Retain the literal image of branches and fruit without making the
    implied moral referent explicit in the translation.
  alternative_readings:
  - Interpretively expand to 'their offspring/progeny will fail'
  rationale: The surrounding context applies the image to the offspring of the ungodly,
    but this verse itself states the metaphor in agricultural terms. Optimal equivalence
    preserves the image and lets the context supply the interpretation rather than
    importing it into the line.
  doctrine_reference: Translation philosophy §§1, 3, 6
