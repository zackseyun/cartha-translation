translation:
  text: For the bewitchment of wickedness darkens what is good, and the wandering
    of desire corrupts an innocent mind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'envy of wickedness' or 'the evil eye of wickedness'; the Greek βασκανία
      can denote malign envy or harmful influence.
    reason: lexical_alternative
  - marker: b
    text: Or 'what is beautiful' or 'noble things'; the Greek τὰ καλά can include
      both moral and aesthetic goodness.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασκανία
  chosen: bewitchment
  alternatives:
  - envy
  - evil eye
  - fascination
  lexicon: LSJ
  rationale: The noun can denote malign influence associated with envy or the evil
    eye. In this context it personifies the deceptive, corrupting power of wickedness.
    'Bewitchment' preserves that sense of harmful moral spell or fascination better
    than the flatter 'envy,' while remaining intelligible in English.
- source_word: φαυλότητος
  chosen: wickedness
  alternatives:
  - baseness
  - depravity
  - worthlessness
  lexicon: LSJ
  rationale: 'The genitive qualifies βασκανία: the malign influence belonging to moral
    badness. ''Wickedness'' communicates ethical corruption more naturally than ''baseness''
    in modern English.'
- source_word: ἀμαυροῖ
  chosen: darkens
  alternatives:
  - dims
  - obscures
  - tarnishes
  lexicon: LSJ
  rationale: The verb literally conveys dimming or obscuring. 'Darkens' fits the moral
    and perceptual imagery of the verse and reads naturally with 'what is good.'
- source_word: τὰ καλά
  chosen: what is good
  alternatives:
  - good things
  - what is beautiful
  - noble things
  lexicon: LSJ
  rationale: καλά can carry both moral and aesthetic force. Here the contrast with
    wickedness and the corruption of the mind favors a broad moral rendering. 'What
    is good' preserves the ethical sense without excluding attractiveness or nobility.
- source_word: ῥεμβασμός
  chosen: wandering
  alternatives:
  - roving
  - distraction
  - restlessness
  lexicon: LSJ
  rationale: The noun suggests aimless wandering or mental distraction. 'Wandering'
    keeps the metaphor vivid and pairs well with desire as an unstable force.
- source_word: ἐπιθυμίας
  chosen: desire
  alternatives:
  - lust
  - craving
  lexicon: LSJ
  rationale: The term can be neutral or negative depending on context. Here it is
    clearly harmful, but 'desire' is broad enough to reflect the Greek while the surrounding
    context supplies the negative sense; 'lust' would narrow it too much to sexual
    desire.
- source_word: μεταλλεύει
  chosen: corrupts
  alternatives:
  - changes
  - undermines
  - perverts
  lexicon: LSJ
  rationale: The verb here conveys alteration for the worse, not mere change. 'Corrupts'
    captures the moral damage done to the mind.
- source_word: νοῦν
  chosen: mind
  alternatives:
  - understanding
  - reason
  lexicon: LSJ
  rationale: νοῦς refers to the faculty of understanding or moral perception. 'Mind'
    is the most natural broad equivalent in English.
- source_word: ἄκακον
  chosen: innocent
  alternatives:
  - guileless
  - harmless
  - unsuspecting
  lexicon: LSJ
  rationale: The adjective denotes freedom from malice or deceit. 'Innocent' is clear
    and idiomatic, and it fits the warning that desire can corrupt a morally unspoiled
    mind.
