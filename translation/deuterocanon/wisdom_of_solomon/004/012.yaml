theological_decisions:
- issue: Moral-aesthetic force of τὰ καλά
  chosen_reading: Rendered broadly as 'what is good' rather than specifically 'beautiful
    things.'
  alternative_readings:
  - what is beautiful
  - good things
  - noble things
  rationale: The verse concerns moral corruption and the darkening of perception.
    A broad ethical rendering best preserves the text's warning without excluding
    the aesthetic nuance present in καλός.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of βασκανία
  chosen_reading: Rendered as 'bewitchment' to preserve the sense of malign moral
    influence.
  alternative_readings:
  - envy
  - evil eye
  rationale: The context is not merely emotional envy but a corrupting influence that
    distorts moral perception. 'Bewitchment' better preserves the figurative and personified
    force of the Greek while remaining readable.
  doctrine_reference: Translation philosophy §1, §6
