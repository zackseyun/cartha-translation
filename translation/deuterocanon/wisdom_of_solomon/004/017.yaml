theological_decisions:
- issue: Scope of τελευτή in relation to the righteous person's death
  chosen_reading: Rendered as 'the end' rather than narrowing to 'death.'
  alternative_readings:
  - the death
  - the outcome
  rationale: The immediate context includes the death of the righteous, but the verse
    contrasts what observers see with what they fail to understand about God's purpose.
    'The end' preserves both the visible death and the broader divinely intended outcome.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of ἠσφαλίσατο αὐτὸν
  chosen_reading: Rendered as 'he made him secure.'
  alternative_readings:
  - he kept him safe
  - he protected him
  rationale: The text does not specify the exact mode of divine security. A broader
    rendering preserves the theological tension between apparent death and true security
    in God without over-interpreting it as mere physical protection.
  doctrine_reference: Translation philosophy §3
