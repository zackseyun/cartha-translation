translation:
  text: For they will see the end of the wise man, and will not understand what the
    Lord planned concerning him, or for what purpose he made him secure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the death of the wise man.' The Greek τελευτή can mean 'end' or 'death';
      'end' is retained in the main text to preserve the broader sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to what end the Lord kept him safe' / 'protected him.' The Greek leaves
      the nature of this security implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄψονται
  chosen: they will see
  alternatives:
  - they shall see
  - they will look upon
  lexicon: BDAG
  rationale: Future middle of ὁράω; straightforward future perception. 'Will see'
    is natural modern English and preserves the directness of the Greek.
- source_word: τελευτὴν
  chosen: the end
  alternatives:
  - the death
  - the outcome
  lexicon: BDAG
  rationale: τελευτή can denote end or death. Here the context concerns the righteous
    person's apparent death, but 'end' better preserves the Greek's broader sense
    and allows the irony of the wider outcome to remain in view.
- source_word: σοφοῦ
  chosen: the wise man
  alternatives:
  - the wise one
  - the wise person
  lexicon: BDAG
  rationale: The Greek is masculine singular. Per gender-accurate philosophy, 'wise
    man' best matches the form and likely representative sense, while remaining idiomatic.
- source_word: οὐ νοήσουσιν
  chosen: will not understand
  alternatives:
  - will not perceive
  - will not comprehend
  lexicon: BDAG
  rationale: νοέω here indicates failure to grasp the meaning of what they see. 'Understand'
    is clear and natural.
- source_word: ἐβουλεύσατο
  chosen: planned
  alternatives:
  - purposed
  - resolved
  - counseled
  lexicon: BDAG
  rationale: The middle of βουλεύω here refers to the Lord's intention or design regarding
    the righteous person. 'Planned' communicates deliberate purpose without archaic
    tone.
- source_word: περὶ αὐτοῦ
  chosen: concerning him
  alternatives:
  - about him
  - for him
  lexicon: BDAG
  rationale: περί with genitive commonly means 'concerning/about.' 'Concerning him'
    fits the formal register of the sentence and preserves the relation of divine
    purpose to the person.
- source_word: εἰς τί
  chosen: for what purpose
  alternatives:
  - why
  - to what end
  lexicon: BDAG
  rationale: The phrase asks toward what end or purpose the Lord acted. 'For what
    purpose' makes the teleological force explicit in contemporary English.
- source_word: ἠσφαλίσατο
  chosen: he made him secure
  alternatives:
  - he kept him safe
  - he established him securely
  - he protected him
  lexicon: BDAG
  rationale: From ἀσφαλίζω, the sense is to make secure or safe. 'Made him secure'
    preserves the causative nuance and leaves open whether the security is physical,
    moral, or eschatological, which suits the context.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' With the article
    in Greek and in this deuterocanonical context, 'the Lord' is the most natural
    English rendering.
