translation:
  text: They will see and will despise, but the Lord will laugh at them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will treat as nothing' for 'will despise' (ἐξουδενήσουσιν).
    reason: lexical_alternative
  - marker: b
    text: Or 'the Lord will mock them' / 'will laugh at them'; the Greek verb carries
      a derisive sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄψονται
  chosen: They will see
  alternatives:
  - They will look
  - They will behold
  lexicon: LSJ
  rationale: Future middle of ὁράω. A straightforward future 'will see' best preserves
    the simple verbal sense without adding interpretive nuance.
- source_word: ἐξουδενήσουσιν
  chosen: will despise
  alternatives:
  - will treat as nothing
  - will disdain
  lexicon: LSJ
  rationale: From ἐξουδενέω, 'to set at naught, despise.' In context it describes
    the wicked's contemptuous reaction. 'Will despise' is idiomatic and concise; 'treat
    as nothing' is more literal but less natural in English.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the master
  lexicon: LSJ
  rationale: κύριος is rendered by the project's default as 'Lord.' In Wisdom literature
    this refers to God, and 'the Lord' preserves both the theological weight and the
    Greek wording.
- source_word: ἐκγελάσεται
  chosen: will laugh them to scorn
  alternatives:
  - will mock them
  - will laugh at them
  lexicon: LSJ
  rationale: Future middle of ἐκγελάω, stronger than simple 'laugh' and carrying derisive
    force. 'Laugh them to scorn' captures the contemptuous judicial reversal more
    fully than the flatter 'laugh at them.'
