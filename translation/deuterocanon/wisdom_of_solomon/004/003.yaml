theological_decisions:
- issue: Moral-religious characterization of ἀσεβῶν
  chosen_reading: ungodly
  alternative_readings:
  - wicked
  - impious
  rationale: The verse contrasts apparent fertility with lack of enduring value in
    the line of those opposed to God. 'Ungodly' best preserves the Godward dimension
    of the term without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §6
- issue: Retention of the severe term νόθων in metaphor
  chosen_reading: bastard shoots
  alternative_readings:
  - illegitimate shoots
  - spurious grafts
  rationale: The source text uses a socially and morally charged adjective within
    a plant metaphor. The translation preserves the severity rather than softening
    it, while keeping it clearly metaphorical by pairing it with 'shoots.'
  doctrine_reference: Translation philosophy §1, §6
