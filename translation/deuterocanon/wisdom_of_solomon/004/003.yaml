translation:
  text: But the numerous offspring of the ungodly will be of no use, and from illegitimate
    shoots they will not put down a root into the depths, nor establish a firm foundation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'illegitimate offshoots' or 'spurious grafts.' The Greek uses a harsh
      term within a horticultural metaphor.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'will not give a root into depth'; that is, they will not put
      down deep roots.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολύγονον ... πλῆθος
  chosen: the many offspring
  alternatives:
  - the numerous multitude of children
  - the prolific brood
  lexicon: LSJ
  rationale: πολύγονον modifies πλῆθος with the sense of being prolific or having
    many offspring. Rendering the phrase as 'the many offspring' captures the collective
    idea in natural English without over-literal awkwardness.
- source_word: ἀσεβῶν
  chosen: of the ungodly
  alternatives:
  - of the wicked
  - of the impious
  lexicon: LSJ
  rationale: ἀσεβής denotes irreverence or impiety toward God; 'ungodly' preserves
    that religious-moral dimension better than the broader 'wicked.'
- source_word: οὐ χρησιμεύσει
  chosen: will be of no use
  alternatives:
  - will not profit
  - will be useless
  lexicon: LSJ
  rationale: The verb means to be useful or serviceable. 'Will be of no use' is idiomatic
    modern English and preserves the future sense.
- source_word: ἐκ νόθων μοσχευμάτων
  chosen: from bastard shoots
  alternatives:
  - from illegitimate offshoots
  - from spurious grafts
  lexicon: LSJ
  rationale: νόθος can mean illegitimate or bastard; μοσχεύματα are shoots, slips,
    or grafted growths in a horticultural metaphor. 'Bastard shoots' preserves both
    the sharp evaluative force of νόθος and the plant imagery. Because 'bastard' may
    sound harsh in English, the metaphorical sense is retained rather than softened,
    since the Greek itself is severe.
- source_word: οὐ δώσει ῥίζαν εἰς βάθος
  chosen: they will not give a root into depth
  alternatives:
  - they will not strike root deeply
  - they will not put down a deep root
  lexicon: LSJ
  rationale: The Greek is literally 'will not give a root into depth.' For readability,
    a more idiomatic English rendering might be possible, but this draft keeps close
    to the image while remaining intelligible. The plural subject refers back to the
    metaphorical shoots.
- source_word: οὐδὲ ἀσφαλῆ βάσιν ἐδράσει
  chosen: nor will they set a firm foundation
  alternatives:
  - nor establish a secure base
  - nor be firmly grounded
  lexicon: LSJ
  rationale: ἀσφαλής means secure or firm; βάσις is base/foundation; ἐδράζω means
    establish or set firmly. 'Set a firm foundation' gives clear English while preserving
    the metaphor of stability.
