theological_decisions:
- issue: Sense of divine ἐπισκοπή
  chosen_reading: beneficent divine visitation/care
  alternative_readings:
  - divine oversight
  - visitation that could include judgment
  rationale: The immediate parallelism with 'grace and mercy' strongly favors a positive
    sense here. The translation keeps 'visitation' to preserve lexical transparency,
    while the rationale notes that the context points to gracious intervention rather
    than judgment.
