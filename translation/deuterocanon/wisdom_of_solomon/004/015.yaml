translation:
  text: For grace and mercy are upon his chosen ones, and visitation upon his holy
    ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'oversight' or 'watchful care'; the Greek term can denote divine visitation
      or inspection. Here the context suggests gracious care.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: χάρις commonly denotes grace or favor. 'Grace' preserves the theological
    weight and pairs naturally with ἔλεος in this wisdom context.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - compassion
  lexicon: BDAG
  rationale: ἔλεος is regularly rendered 'mercy'; this is the most direct and idiomatic
    equivalent in a divine-beneficence context.
- source_word: ἐκλεκτοῖς
  chosen: chosen ones
  alternatives:
  - elect ones
  - chosen
  lexicon: BDAG
  rationale: The adjective means 'chosen' or 'elect.' 'Chosen ones' is clear modern
    English and avoids importing later technical theological freight while preserving
    the sense.
- source_word: ἐπισκοπή
  chosen: visitation
  alternatives:
  - oversight
  - care
  - watchful care
  - visitation for judgment
  lexicon: BDAG
  rationale: ἐπισκοπή can denote visitation, oversight, or divine intervention. Here,
    in parallel with 'grace and mercy,' the sense is God's attentive intervention/care
    rather than punitive inspection. 'Visitation' preserves the lexical breadth and
    biblical resonance without over-specifying.
- source_word: ὁσίοις
  chosen: holy ones
  alternatives:
  - saints
  - faithful ones
  - devout ones
  lexicon: BDAG
  rationale: ὅσιος/ὅσιοι refers to those who are holy, devout, or faithful. 'Holy
    ones' is a transparent rendering that stays close to the Greek and avoids the
    later ecclesiastical overtones of 'saints.'
- source_word: ἐν
  chosen: upon
  alternatives:
  - among
  - in the case of
  - with
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' in this construction with abstract nouns
    and persons it can be rendered idiomatically as 'upon' to express that grace,
    mercy, and visitation rest on or are directed toward these people. This reads
    naturally in English while preserving the relational sense.
