theological_decisions:
- issue: Implied subject of ἔσπευσεν
  chosen_reading: 'God/the Lord is the implied subject: ''he hastened him out of the
    midst of wickedness.'''
  alternative_readings:
  - An impersonal rendering such as 'therefore there was haste to remove him from
    the midst of wickedness'
  rationale: The immediately preceding clause names the Lord, and the broader context
    explains the righteous person's early removal as divine action. Making the subject
    explicit in English clarifies what is implicit in Greek without importing a new
    theological claim.
  doctrine_reference: 'Translation philosophy: preserve source meaning in readable
    modern English; do not paraphrase beyond the text.'
