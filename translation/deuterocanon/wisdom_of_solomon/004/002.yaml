translation:
  text: When she is present, they imitate her, and they long for her when she has
    gone; and through the age she marches in triumph, wearing a victor’s wreath, having
    won the contest of the undefiled prizes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forever.' The Greek phrase literally says 'in the age' and can denote
      enduring or perpetual renown.
    reason: lexical_alternative
lexical_decisions:
- source_word: παροῦσάν
  chosen: when she is present
  alternatives:
  - while present
  - being present
  lexicon: LSJ
  rationale: The participle of πάρειμι denotes presence. Rendering it temporally with
    'when she is present' gives natural English while preserving the contrast with
    ἀπελθοῦσαν.
- source_word: μιμοῦνται
  chosen: they imitate
  alternatives:
  - they emulate
  - they follow the example of
  lexicon: LSJ
  rationale: The verb means to imitate or emulate. 'Imitate' is the most direct and
    transparent rendering.
- source_word: ποθοῦσιν
  chosen: they long for
  alternatives:
  - they desire
  - they yearn for
  lexicon: LSJ
  rationale: '''Long for'' captures the strong affective sense of desire without sounding
    overly romantic or archaic.'
- source_word: ἀπελθοῦσαν
  chosen: when she has gone
  alternatives:
  - after she departs
  - when absent
  lexicon: LSJ
  rationale: The aorist participle marks her departure as a completed event. 'When
    she has gone' preserves the temporal contrast with her presence.
- source_word: ἐν τῷ αἰῶνι
  chosen: through the age
  alternatives:
  - forever
  - in eternity
  - in the world-age
  lexicon: LSJ
  rationale: αἰών can denote an age or enduring span. 'Through the age' preserves
    the Greek image of enduring renown without over-specifying metaphysical eternity.
    Because the phrase is somewhat idiomatic, a more interpretive alternative is preserved
    in a footnote.
- source_word: στεφανηφοροῦσα
  chosen: wearing a victor’s wreath
  alternatives:
  - crowned
  - bearing a crown
  - wearing a crown
  lexicon: LSJ
  rationale: The verb literally refers to bearing or wearing a wreath/crown, especially
    a victor's garland. 'Victor’s wreath' keeps the athletic imagery that is developed
    by ἄθλων and ἀγῶνα.
- source_word: πομπεύει
  chosen: she marches in triumph
  alternatives:
  - she is led in procession
  - she parades
  - she makes a triumphal procession
  lexicon: LSJ
  rationale: The verb can denote leading or taking part in a public procession, often
    triumphal. 'Marches in triumph' is idiomatic English and fits the personified
    virtue imagery.
- source_word: ἀμιάντων
  chosen: the undefiled
  alternatives:
  - the unstained
  - the pure
  lexicon: LSJ
  rationale: The adjective means undefiled or unstained. 'Undefiled' preserves the
    moral purity nuance in this wisdom context.
- source_word: ἄθλων
  chosen: prizes
  alternatives:
  - rewards
  - contest-prizes
  lexicon: LSJ
  rationale: ἆθλον denotes a prize won in contest. 'Prizes' keeps the athletic metaphor
    and distinguishes it from the contest itself.
- source_word: ἀγῶνα
  chosen: the contest
  alternatives:
  - the struggle
  - the race
  lexicon: LSJ
  rationale: ἀγών is a contest or struggle, often athletic. 'Contest' best matches
    the surrounding victor/prize imagery without narrowing it to a footrace.
- source_word: νικήσασα
  chosen: having won
  alternatives:
  - having conquered
  - having been victorious in
  lexicon: LSJ
  rationale: The aorist participle indicates completed victory prior to the triumphal
    procession. 'Having won' is concise and fits the athletic metaphor.
