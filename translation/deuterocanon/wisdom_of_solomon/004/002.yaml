theological_decisions:
- issue: Referent of the feminine pronouns
  chosen_reading: The feminine pronouns refer to virtue personified from the immediate
    context.
  alternative_readings:
  - A more generalized feminine abstraction such as excellence or noble character
  rationale: The verse continues the personification from the surrounding context.
    English retains 'she/her' to preserve the literary personification rather than
    flattening it into an abstract noun.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
- issue: Force of ἐν τῷ αἰῶνι
  chosen_reading: An enduring, age-spanning triumph rather than a narrowly technical
    statement about metaphysical eternity.
  alternative_readings:
  - forever
  - in eternity
  rationale: The phrase likely emphasizes lasting honor and public vindication. The
    main text keeps the more literal 'through the age,' while a footnote preserves
    the smoother alternative 'forever.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve theological tension
    rather than resolve it
