translation:
  text: He was taken away, lest evil alter his understanding or deceit deceive his
    soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He was snatched away,' preserving the more abrupt force of the Greek
      verb.
    reason: lexical_alternative
  - marker: b
    text: '''Soul'' could also be rendered ''self'' or ''life,'' but the Greek term
      carries the sense of the inner person.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡρπάγη
  chosen: was taken away
  alternatives:
  - was snatched away
  - was seized
  lexicon: LSJ
  rationale: Aorist passive of ἁρπάζω. 'Was taken away' preserves the passive and
    the sense of sudden removal without overemphasizing violence; 'snatched away'
    is possible but sounds more colloquial and forceful than the context requires.
- source_word: μή
  chosen: lest
  alternatives:
  - so that not
  - that not
  lexicon: BDAG
  rationale: Introduces a clause of prevention/purpose after the passive verb; 'lest'
    is concise and accurately conveys the warning/preventive sense.
- source_word: κακία
  chosen: evil
  alternatives:
  - wickedness
  - malice
  lexicon: BDAG
  rationale: In this wisdom context the term broadly denotes moral corruption rather
    than specifically personal malice. 'Evil' is the clearest general rendering.
- source_word: ἀλλάξῃ
  chosen: change
  alternatives:
  - alter
  - pervert
  lexicon: BDAG
  rationale: The verb means to change or alter. 'Change' is the most direct rendering;
    'pervert' would import an interpretive intensification not explicit in the verb
    itself.
- source_word: σύνεσιν
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: BDAG
  rationale: σύνεσις refers to comprehension or sound understanding. 'Understanding'
    is natural English and broad enough to include moral discernment in context.
- source_word: δόλος
  chosen: deceit
  alternatives:
  - guile
  - treachery
  lexicon: BDAG
  rationale: The noun denotes deception or craftiness. 'Deceit' is modern and clear;
    'guile' is accurate but more archaic.
- source_word: ἀπατήσῃ
  chosen: mislead
  alternatives:
  - deceive
  - lead astray
  lexicon: BDAG
  rationale: The verb means to deceive. 'Mislead' fits well with 'deceit' and avoids
    awkward repetition while preserving the sense.
- source_word: ψυχὴν
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: BDAG
  rationale: In Wisdom literature ψυχή often carries the sense of the inner self/person.
    'Soul' best preserves the anthropological weight of the Greek here, while 'self'
    would flatten it.
