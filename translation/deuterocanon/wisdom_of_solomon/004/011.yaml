theological_decisions:
- issue: Anthropological force of ψυχή
  chosen_reading: soul
  alternative_readings:
  - self
  - life
  rationale: The verse contrasts moral corruption of understanding with deception
    of the person's inner life. Rendering ψυχή as 'soul' preserves that theological
    and anthropological depth without forcing a later technical doctrine into the
    text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nuance of divine/passive removal in ἡρπάγη
  chosen_reading: He was taken away
  alternative_readings:
  - He was snatched away
  rationale: The passive leaves the agent unstated. 'Was taken away' preserves that
    ambiguity and avoids specifying divine agency more explicitly than the Greek does,
    while still fitting the context of providential removal in the surrounding passage.
  doctrine_reference: Translation philosophy §3
