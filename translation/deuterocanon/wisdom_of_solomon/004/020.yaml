theological_decisions:
- issue: Relationship between 'sins' and 'lawless deeds' in the verse
  chosen_reading: Retain both terms distinctly as 'sins' and 'lawless deeds' rather
    than collapsing them into one English term.
  alternative_readings:
  - Render both simply as 'sins'
  - Render δεύτερον term as 'iniquities'
  rationale: 'The Greek uses two related but distinct moral terms, ἁμαρτήματα and
    ἀνομήματα. Preserving both reflects the rhetorical intensification: inward reckoning
    over sins, then objective conviction by lawless deeds.'
