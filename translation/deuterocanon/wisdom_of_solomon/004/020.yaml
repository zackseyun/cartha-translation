translation:
  text: They will come in cowardice, reasoning over their sins, and their lawless
    deeds will convict them to their face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fearful' or 'as cowards' for 'in cowardice.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from opposite them'; the sense is that their own lawless deeds
      confront and convict them openly, face-to-face.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεύσονται
  chosen: They will come
  alternatives:
  - They will arrive
  - They will go
  lexicon: LSJ
  rationale: Future middle of ἔρχομαι; the basic motion verb is best kept simple.
    In context it introduces their appearance for judgment or exposure, so 'come'
    is more natural than 'go'.
- source_word: ἐν συλλογισμῷ
  chosen: reasoning over
  alternatives:
  - with reasoning about
  - in calculation of
  - in anxious reflection on
  lexicon: LSJ
  rationale: συλλογισμός can denote reasoning, calculation, or inward deliberation.
    Here it describes the mental process accompanying their coming, likely troubled
    self-reckoning about sins. 'Reasoning over' preserves the cognitive sense without
    over-paraphrasing into 'remorse'.
- source_word: ἁμαρτημάτων
  chosen: sins
  alternatives:
  - sinful acts
  - offenses
  lexicon: LSJ
  rationale: Standard rendering for ἁμάρτημα. 'Sins' is direct and idiomatic.
- source_word: δειλοί
  chosen: in cowardice
  alternatives:
  - cowardly
  - fearful
  - as cowards
  lexicon: LSJ
  rationale: δειλός denotes cowardly, timid, fearful. Because it stands adverbially/predicatively
    with ἐλεύσονται, 'in cowardice' captures their manner of coming in readable English.
    The sense is not mere emotion alone but shamefaced fear.
- source_word: ἐλέγξει
  chosen: will convict
  alternatives:
  - will expose
  - will reprove
  - will refute
  lexicon: LSJ
  rationale: ἐλέγχω can mean expose, convict, or refute. In this judicial-moral context,
    where their own deeds stand against them, 'will convict' best conveys decisive
    exposure of guilt.
- source_word: ἐξ ἐναντίας
  chosen: to their face
  alternatives:
  - from the opposite side
  - openly against them
  - in opposition
  lexicon: LSJ
  rationale: The idiom conveys confrontation from directly opposite, hence openly
    or face-to-face. 'To their face' is idiomatic English that preserves the adversative
    force and vividness.
- source_word: τὰ ἀνομήματα
  chosen: lawless deeds
  alternatives:
  - transgressions
  - lawless acts
  - iniquities
  lexicon: LSJ
  rationale: ἀνόμημα emphasizes violation of law/order. 'Lawless deeds' preserves
    the lexical link to lawlessness more clearly than the broader 'sins' or the more
    traditional but less transparent 'iniquities'.
