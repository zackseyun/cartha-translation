theological_decisions:
- issue: Referent of the feminine pronoun αὐτῆς in 'ἐν μνήμῃ αὐτῆς' and subsequent
    'she is known'
  chosen_reading: The pronoun refers to 'virtue' rather than 'childlessness.'
  alternative_readings:
  - The pronoun refers to 'childlessness' personified or to the childless woman implicitly
    described.
  rationale: The nearest and most coherent antecedent is ἀρετή, and the logic of the
    verse is that virtuous childlessness is preferable because virtue has enduring
    remembrance and recognition before God and humans. Making 'virtue' the referent
    avoids attributing immortality to childlessness as such.
  doctrine_reference: Preserve theological tension rather than resolve it; choose
    the reading best supported by the source while preserving alternatives in a footnote.
- issue: Rendering ἀνθρώποις
  chosen_reading: '''men'' in the main text as a representative/generic term'
  alternative_readings:
  - people
  - human beings
  rationale: The Greek is generic for humans. In keeping with gender-accurate-over-gender-neutral
    policy, a representative rendering may be used where the source has generic force,
    while an inclusive alternative is worth preserving in a footnote for clarity to
    modern readers.
  doctrine_reference: Gender-accurate over gender-neutral.
