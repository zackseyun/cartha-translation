translation:
  text: Better is childlessness with virtue, for immortality is in her memory, because
    she is known both by God and by men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'for immortality is in her memory'—that is, in the
      memory of virtue. Some take the feminine pronoun to refer instead to childlessness
      or to the childless woman.
    reason: alternative_reading
  - marker: b
    text: Greek 'by men'; here the term means human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρείσσων
  chosen: Better is
  alternatives:
  - Superior is
  - More excellent is
  lexicon: LSJ
  rationale: Comparative adjective used predicatively to evaluate one state over another.
    'Better is' is idiomatic English and preserves the proverbial force.
- source_word: ἀτεκνία
  chosen: childlessness
  alternatives:
  - barrenness
  - being without children
  lexicon: LSJ
  rationale: The noun denotes the state of having no children. 'Childlessness' is
    broader and less biologically narrow than 'barrenness,' fitting the wisdom-style
    comparison without over-specifying female infertility.
- source_word: μετὰ ἀρετῆς
  chosen: with virtue
  alternatives:
  - with excellence
  - with moral excellence
  lexicon: LSJ
  rationale: ἀρετή in Wisdom commonly carries moral excellence/virtue. 'With virtue'
    is concise, natural, and preserves the ethical emphasis.
- source_word: ἀθανασία
  chosen: immortality
  alternatives:
  - deathlessness
  lexicon: LSJ
  rationale: Standard rendering for the noun; it is a key Wisdom term and should be
    kept consistent.
- source_word: ἐν μνήμῃ αὐτῆς
  chosen: in the memory of her
  alternatives:
  - in her remembrance
  - in her memory
  lexicon: LSJ
  rationale: The Greek literally says 'in the memory of her.' The feminine pronoun
    most naturally refers back to ἀρετή rather than ἀτεκνία, since virtue is what
    is remembered and honored. The slightly formal phrasing preserves the feminine
    reference explicitly.
- source_word: γινώσκεται
  chosen: is known
  alternatives:
  - is recognized
  - is acknowledged
  lexicon: LSJ
  rationale: Passive present indicating recognized/known status. 'Is known' is the
    most direct rendering and works well with both divine and human spheres.
- source_word: παρὰ θεῷ ... καὶ παρὰ ἀνθρώποις
  chosen: both by God and by men
  alternatives:
  - both before God and before men
  - both with God and with people
  lexicon: LSJ
  rationale: παρά with the dative here conveys standing in relation to or in the estimation
    of. 'By God and by men' is concise and idiomatic, while preserving the twofold
    witness. 'Men' matches the Greek ἀνθρώποις in a traditional representative sense
    here; however, the phrase is generic for humanity, not male-only.
