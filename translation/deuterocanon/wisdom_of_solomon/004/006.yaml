theological_decisions:
- issue: Moral force of the euphemistic phrase ἀνόμων ὕπνων
  chosen_reading: lawless unions
  alternative_readings:
  - unlawful beds
  - wicked intercourse
  rationale: The verse condemns illicit sexual relations without requiring a cruder
    or more interpretive English phrase. 'Lawless unions' preserves the moral judgment
    and the euphemistic register of the Greek.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
- issue: Referent of αὐτῶν in ἐν ἐξετασμῷ αὐτῶν
  chosen_reading: the children are examined
  alternative_readings:
  - their parents are examined
  - they are exposed under scrutiny in a general sense
  rationale: The immediate subject is 'children,' and the sense is that the character/status
    of such children exposes the parents' wrongdoing. Because the pronoun could be
    taken differently in English, the alternative is preserved in a footnote rather
    than silently excluded.
  doctrine_reference: Preserve theological tension rather than resolve it.
