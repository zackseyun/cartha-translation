translation:
  text: For children born from lawless unions are witnesses of their parents’ wickedness
    when they are examined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from lawless beds,' a Greek euphemism for illicit sexual unions.
    reason: lexical_alternative
  - marker: b
    text: Or 'are witnesses against their parents of wickedness.'
    reason: alternative_reading
  - marker: c
    text: The phrase 'when they are examined' may also be understood more generally
      as 'under scrutiny,' and some may take the pronoun to refer to the parents rather
      than the children.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνόμων
  chosen: lawless
  alternatives:
  - unlawful
  - wicked
  lexicon: BDAG
  rationale: The adjective denotes what is contrary to law or moral order. 'Lawless'
    preserves the direct force of ἄνομος better than the more general 'wicked.'
- source_word: ὕπνων
  chosen: unions
  alternatives:
  - beds
  - sleepings
  - marriage-beds
  lexicon: LSJ
  rationale: Literally 'beds/sleepings,' a euphemism for sexual relations or the marriage
    bed. 'Unions' communicates the idiomatic sense in natural English without over-literal
    awkwardness; the more literal alternative is preserved in a footnote.
- source_word: τέκνα γεννώμενα
  chosen: children born
  alternatives:
  - offspring being born
  - children begotten
  lexicon: BDAG
  rationale: This participial phrase naturally refers to offspring brought forth from
    such unions. 'Children born' is clear modern English and keeps the passive/resultative
    sense.
- source_word: μάρτυρές εἰσιν
  chosen: are witnesses
  alternatives:
  - testify
  - serve as evidence
  lexicon: BDAG
  rationale: The predicate noun construction is straightforward. 'Are witnesses' preserves
    the forensic tone that fits the following phrase about examination.
- source_word: πονηρίας
  chosen: wickedness
  alternatives:
  - evil
  - depravity
  lexicon: BDAG
  rationale: The genitive names the moral quality to which the children bear witness.
    'Wickedness' is weighty but still readable.
- source_word: κατὰ γονέων
  chosen: of their parents’
  alternatives:
  - against their parents
  - concerning their parents
  lexicon: BDAG
  rationale: κατά with the genitive here carries an adversative/forensic sense, effectively
    indicating testimony directed against the parents. In idiomatic English, 'of their
    parents’ wickedness' conveys that the evidence implicates the parents; the more
    explicit 'against their parents' is preserved in a footnote.
- source_word: ἐν ἐξετασμῷ αὐτῶν
  chosen: when they are examined
  alternatives:
  - at their examination
  - in the scrutiny of them
  - when their parents are examined
  lexicon: LSJ
  rationale: 'ἐξετασμός denotes examination, scrutiny, or judicial investigation.
    The pronoun αὐτῶν is somewhat ambiguous, but the nearest and most natural referent
    is the children: their examination reveals the parents'' wickedness. This keeps
    the syntax coherent while acknowledging the alternative in a footnote.'
