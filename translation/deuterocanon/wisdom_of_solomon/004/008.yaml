theological_decisions:
- issue: Nature of the saying about honorable old age
  chosen_reading: The verse states that the honor of old age does not consist in mere
    longevity or chronological count.
  rationale: The Greek is sapiential and ethical, not doctrinally technical. The translation
    preserves the tension that old age can be honorable while denying that many years
    alone establish that honor.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
