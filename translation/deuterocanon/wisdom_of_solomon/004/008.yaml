translation:
  text: For old age is honorable not because it is long-lived, nor is it measured
    by the number of years;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γῆρας
  chosen: old age
  alternatives:
  - advanced age
  - elderliness
  lexicon: LSJ
  rationale: γῆρας denotes old age or advanced age itself, not merely an old person.
    'Old age' is the most natural English equivalent and fits the verse's contrast
    between honorable age and mere length of years.
- source_word: τίμιον
  chosen: honorable
  alternatives:
  - precious
  - esteemed
  - valuable
  lexicon: LSJ
  rationale: τίμιος can mean precious or honored/esteemed. In this ethical context,
    describing the status of old age, 'honorable' best conveys social-moral worth
    rather than material preciousness.
- source_word: οὐ τὸ πολύχρονον
  chosen: not because it is long-lived
  alternatives:
  - not the long duration
  - not what is of many years
  - not longevity itself
  lexicon: LSJ
  rationale: The phrase literally contrasts honorable old age with that which is πολυχρόνιον/πολύχρονον,
    having much time or many years. Rendering it as 'not because it is long-lived'
    makes the predicate relation clear in idiomatic English while preserving the sense
    that mere longevity is not the criterion.
- source_word: οὐδὲ
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: LSJ
  rationale: οὐδὲ links the second negated clause closely to the first. 'Nor' is concise
    and natural in English.
- source_word: ἀριθμῷ ἐτῶν
  chosen: by the number of years
  alternatives:
  - in the count of years
  - by years counted
  lexicon: LSJ
  rationale: 'The dative ἀριθμῷ is instrumental or reference-based: the standard of
    measurement is the number/count of years. ''By the number of years'' is clear
    and faithful.'
- source_word: μεμέτρηται
  chosen: is measured
  alternatives:
  - has been measured
  - is reckoned
  - is defined
  lexicon: LSJ
  rationale: The perfect passive indicates a settled valuation or measurement. English
    present passive 'is measured' communicates the gnomic force naturally without
    overemphasizing aspect.
