theological_decisions:
- issue: Whether ἐν ἀναπαύσει should be rendered with an explicitly afterlife-specific
    term
  chosen_reading: at rest
  alternative_readings:
  - in peace
  - in repose
  rationale: The Greek states a condition of rest without explicitly defining its
    metaphysical mechanics. 'At rest' preserves the theological comfort of the text
    without importing a more developed doctrine than the wording itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
