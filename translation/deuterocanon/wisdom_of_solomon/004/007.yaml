translation:
  text: But the righteous man, if he dies early, will be at rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'if he comes to die'; the Greek idiom likely means 'if
      he dies early' or 'if he dies before his time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιος
  chosen: the righteous man
  alternatives:
  - the righteous
  - the just man
  lexicon: BDAG
  rationale: Used substantivally for a singular person characterized by righteousness.
    'Righteous man' preserves the masculine singular form and the representative human
    sense better than an abstract 'the righteous' in this context.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - even if
  lexicon: BDAG
  rationale: Introduces a conditional clause. English 'if' is sufficient, though the
    sense in context approaches concessive 'even if'; that nuance is carried by the
    whole clause rather than forced into this one word.
- source_word: φθάσῃ
  chosen: dies early
  alternatives:
  - comes before
  - reaches
  - is overtaken
  lexicon: BDAG
  rationale: With the complementary infinitive τελευτῆσαι, the idiom conveys meeting
    death before the expected time, i.e., dying early or prematurely. A literal 'comes
    to die' would be less natural and would underrepresent the idiomatic force.
- source_word: τελευτῆσαι
  chosen: dies
  alternatives:
  - to die
  - to come to his end
  lexicon: BDAG
  rationale: Infinitive of ending life; rendered together with φθάσῃ as the idiomatic
    phrase 'dies early.'
- source_word: ἐν ἀναπαύσει
  chosen: at rest
  alternatives:
  - in rest
  - in repose
  lexicon: BDAG
  rationale: Natural English rendering of the prepositional phrase indicating a state
    of rest or repose. 'At rest' is idiomatic and preserves the verse's calm, eschatological
    tone without over-specifying.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - shall be
  lexicon: BDAG
  rationale: Simple future of being; rendered in contemporary English as 'will be'
    rather than archaic 'shall be.'
