theological_decisions:
- issue: Interpretive force of the proverb-like parallelism
  chosen_reading: 'The verse redefines true old age ethically: wisdom and a blameless
    life, not mere years, constitute genuine venerability.'
  alternative_readings:
  - The verse simply compares gray hair with wisdom and old age with blameless living
    without strongly redefining either.
  rationale: The equative structure ('gray hair is understanding... an unblemished
    life is the age of old age') points beyond physical aging to moral-spiritual maturity.
    The translation preserves that tension without paraphrasing it into an explanatory
    sentence.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Gender rendering of ἀνθρώποις
  chosen_reading: Rendered 'for men' in the main text.
  alternative_readings:
  - for people
  - for human beings
  rationale: The source uses the masculine/generic form. Per project policy, gender-accurate
    rendering is preferred where the source form is masculine with representative
    force; inclusive alternatives remain possible but are not adopted in the main
    text here.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
