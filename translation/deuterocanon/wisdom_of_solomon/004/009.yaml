translation:
  text: For gray hair is understanding for men, and an unblemished life is the age
    of old age.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for people' / 'for human beings.' Greek ἀνθρώποις is grammatically masculine
      but can function generically.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολιὰ
  chosen: gray hair
  alternatives:
  - gray-headedness
  - hoary hair
  - old age
  lexicon: LSJ
  rationale: The noun literally denotes gray/white hair, a conventional sign of old
    age. Rendering it concretely as 'gray hair' preserves the metaphor rather than
    flattening it to 'old age.'
- source_word: φρόνησις
  chosen: understanding
  alternatives:
  - prudence
  - wisdom
  - good sense
  lexicon: LSJ
  rationale: The term denotes practical intelligence or sound understanding. 'Understanding'
    is natural English and fits the verse's claim that true venerability is moral-intellectual
    rather than merely chronological.
- source_word: ἀνθρώποις
  chosen: for men
  alternatives:
  - for people
  - among men
  - for human beings
  lexicon: LSJ
  rationale: 'The dative is best taken as reference: ''for men/in human estimation.''
    Following the project''s gender-accurate policy, ''men'' preserves the masculine/generic
    form; broader English alternatives are possible but less source-near.'
- source_word: ἡλικία
  chosen: the age
  alternatives:
  - maturity
  - stature
  - full age
  lexicon: LSJ
  rationale: 'Here it refers to age or mature standing, not physical stature. ''The
    age'' keeps the predicative structure of the Greek: an unblemished life is what
    counts as true old age.'
- source_word: γήρως
  chosen: of old age
  alternatives:
  - of eld
  - of advanced age
  lexicon: LSJ
  rationale: A straightforward genitive specifying the kind of age in view. 'Of old
    age' is idiomatic enough while staying close to the Greek.
- source_word: βίος ἀκηλίδωτος
  chosen: an unblemished life
  alternatives:
  - a spotless life
  - a life without stain
  - an undefiled life
  lexicon: LSJ
  rationale: βίος is 'life' in the sense of manner of living, and ἀκηλίδωτος means
    unstained or spotless. 'Unblemished' preserves the moral purity imagery without
    sounding archaic.
