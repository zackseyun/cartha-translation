translation:
  text: And after this they will become a dishonored corpse and a reproach among the
    dead forever. For he will dash them down headlong and speechless, and shake them
    from their foundations; they will be laid waste to the uttermost, and they will
    be in pain, and their memory will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a dishonored fallen body'; the Greek πτῶμα can denote a fallen body/corpse,
      emphasizing the shame of their end.
    reason: lexical_alternative
  - marker: b
    text: The subject of 'he will dash' and 'shake' is implicit in Greek; in context
      it refers to God’s judgment, though the verse does not repeat the divine name.
    reason: alternative_reading
lexical_decisions:
- source_word: πτῶμα
  chosen: corpse
  alternatives:
  - fall
  - fallen body
  - carcass
  lexicon: LSJ
  rationale: In this judgment context, πτῶμα refers not merely to a fall but to a
    fallen body/corpse. 'Corpse' best conveys the concrete, shameful result in idiomatic
    English.
- source_word: ἄτιμον
  chosen: dishonored
  alternatives:
  - without honor
  - disgraced
  - ignoble
  lexicon: LSJ
  rationale: ἄτιμος denotes lack of honor or disgrace. 'Dishonored' preserves the
    shame dimension while reading naturally with 'corpse.'
- source_word: ὕβριν
  chosen: a reproach
  alternatives:
  - insult
  - outrage
  - mockery
  lexicon: LSJ
  rationale: Here the noun describes the contemptible status into which they fall.
    'A reproach' fits the public-shame sense better than the more active 'outrage.'
- source_word: ἐν νεκροῖς
  chosen: among the dead
  alternatives:
  - with the dead
  - in the dead
  lexicon: LSJ
  rationale: The preposition ἐν with plural persons is naturally rendered 'among.'
    This expresses their place among the dead as one of lasting disgrace.
- source_word: διʼ αἰῶνος
  chosen: forever
  alternatives:
  - for an age
  - for all time
  lexicon: LSJ
  rationale: In this context of enduring judgment and obliterated memory, 'forever'
    best communicates the force of the idiom in clear English.
- source_word: ῥήξει
  chosen: will dash ... down
  alternatives:
  - will break
  - will shatter
  - will strike down
  lexicon: LSJ
  rationale: ῥήγνυμι can mean break or dash violently. With πρηνεῖς following, the
    image is of being hurled down headlong, so 'dash down' captures the force.
- source_word: ἀφώνους
  chosen: speechless
  alternatives:
  - voiceless
  - mute
  lexicon: LSJ
  rationale: ἀφώνους may mean unable to speak or silenced. 'Speechless' works idiomatically
    and can include the sense of being struck mute by judgment.
- source_word: πρηνεῖς
  chosen: headlong
  alternatives:
  - face downward
  - prone
  lexicon: LSJ
  rationale: The adverbial force here describes the manner of their fall. 'Headlong'
    is vivid and natural in English, preserving the violent downward motion.
- source_word: σαλεύσει
  chosen: shake
  alternatives:
  - uproot
  - cause to totter
  - disturb
  lexicon: LSJ
  rationale: The verb denotes violent shaking or destabilizing. Because ἐκ θεμελίων
    follows, 'shake them from their foundations' preserves both the metaphor and the
    sequence.
- source_word: ἐκ θεμελίων
  chosen: from their foundations
  alternatives:
  - out of their foundations
  - from the foundations
  lexicon: LSJ
  rationale: This phrase intensifies total destabilization. 'From their foundations'
    is the most natural English equivalent.
- source_word: ἕως ἐσχάτου
  chosen: to the uttermost
  alternatives:
  - completely
  - to the end
  - utterly
  lexicon: LSJ
  rationale: The phrase marks extremity or totality. 'To the uttermost' preserves
    the elevated tone and comprehensive force.
- source_word: χερσωθήσονται
  chosen: will be laid waste
  alternatives:
  - will become desolate
  - will be made barren
  lexicon: LSJ
  rationale: The verb conveys devastation/desolation. 'Laid waste' is idiomatic and
    suitably forceful in a judgment oracle.
- source_word: ἐν ὀδύνῃ
  chosen: in pain
  alternatives:
  - in anguish
  - in torment
  lexicon: LSJ
  rationale: ὀδύνη denotes pain or anguish. 'In pain' is broad enough to preserve
    the term without over-specifying psychological torment.
- source_word: ἡ μνήμη αὐτῶν ἀπολεῖται
  chosen: their memory will perish
  alternatives:
  - the memory of them will be destroyed
  - their remembrance will vanish
  lexicon: LSJ
  rationale: This clause states the erasure of remembrance. 'Their memory will perish'
    is concise and faithful to the Greek wording and tone.
