theological_decisions:
- issue: Implicit subject of the judgment verbs
  chosen_reading: Rendered as 'he will' without specifying the referent by name
  alternative_readings:
  - God will explicitly dash them down
  - an impersonal passive-like sense of judgment will overtake them
  rationale: The Greek has an implicit masculine singular subject in ῥήξει and σαλεύσει.
    In context the agent is God, but the text does not name him in this clause. Using
    'he will' preserves the source's syntax and avoids importing an explicit divine
    title not present in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
