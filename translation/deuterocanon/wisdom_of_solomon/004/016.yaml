theological_decisions:
- issue: How to render καμών in context
  chosen_reading: though dead
  alternative_readings:
  - having died
  - after dying
  rationale: The broader context (Wisdom 4) concerns the righteous person who dies
    early yet is at rest. Rendering the participle as 'though dead' makes the concessive
    contrast explicit in idiomatic English without changing the underlying sense.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
- issue: Whether τελεσθεῖσα should be rendered with perfection language
  chosen_reading: brought to completion
  alternative_readings:
  - made perfect
  rationale: '''Made perfect'' is a traditional possibility, but in contemporary English
    it can suggest moral flawlessness more strongly than the Greek necessarily requires
    here. ''Brought to completion'' preserves the teleological sense and fits the
    context of a life completed in fewer years.'
  doctrine_reference: Original-language primacy over translation tradition; readable
    modern English, not archaic or academic.
