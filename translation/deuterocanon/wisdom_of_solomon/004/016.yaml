translation:
  text: But the righteous one, though dead, will condemn the living ungodly; and youth
    brought to completion quickly will condemn the many-year old age of the unrighteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'having died will condemn' or 'after dying will condemn.' The Greek
      participle can be rendered more literally, but the main text expresses the sense
      in natural English.
    reason: lexical_alternative
  - marker: b
    text: Or, 'youth made perfect quickly.' The Greek can be rendered with 'made perfect,'
      but the main text uses 'brought to completion' to preserve the idea without
      overloading the phrase in modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακρινεῖ
  chosen: will condemn
  alternatives:
  - will judge against
  - will pass sentence on
  lexicon: BDAG
  rationale: The future of κατακρίνω carries the sense of condemning or pronouncing
    judgment against. 'Will condemn' is the most direct and natural English rendering
    here.
- source_word: δίκαιος
  chosen: the righteous one
  alternatives:
  - the righteous man
  - the just one
  lexicon: BDAG
  rationale: The singular adjective is substantival. 'The righteous one' preserves
    the singular and avoids over-specifying gender while still reflecting the Greek's
    personal reference.
- source_word: καμών
  chosen: though dead
  alternatives:
  - having died
  - after dying
  lexicon: BDAG
  rationale: From κάμνω in this context it idiomatically refers to one who has died
    or passed away, matching the immediate context of the righteous person's early
    death in the surrounding passage. 'Though dead' brings out the concessive force
    naturally in English.
- source_word: τοὺς ζῶντας ἀσεβεῖς
  chosen: the living ungodly
  alternatives:
  - the ungodly who are alive
  - the living wicked
  lexicon: BDAG
  rationale: The phrase identifies ungodly people who remain alive in contrast to
    the righteous one who has died. 'Ungodly' fits ἀσεβεῖς well in Wisdom literature.
- source_word: νεότης
  chosen: youth
  alternatives:
  - youthfulness
  - young age
  lexicon: LSJ
  rationale: νεότης denotes youth or young age. 'Youth' is concise and idiomatic.
- source_word: τελεσθεῖσα
  chosen: brought to completion
  alternatives:
  - made perfect
  - fulfilled
  - brought to maturity
  lexicon: BDAG
  rationale: The participle from τελέω/τελειόω language here refers to reaching completion.
    'Brought to completion' preserves the completion motif without importing later
    doctrinal language; 'made perfect' is possible but more interpretively loaded
    in English.
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - swiftly
  - soon
  lexicon: BDAG
  rationale: A straightforward adverb indicating rapidity; 'quickly' is clear modern
    English.
- source_word: πολυετές
  chosen: many-year old
  alternatives:
  - long-lived
  - of many years
  - aged
  lexicon: LSJ
  rationale: The adjective literally denotes being of many years. Because it modifies
    γῆρας, a more literal rendering helps preserve the contrast between brief youth
    and extended old age.
- source_word: γῆρας
  chosen: old age
  alternatives:
  - agedness
  - elderliness
  lexicon: LSJ
  rationale: γῆρας means old age. This is the natural English equivalent.
- source_word: ἀδίκου
  chosen: of the unrighteous
  alternatives:
  - of the unjust
  - of the wicked
  lexicon: BDAG
  rationale: The genitive qualifies the old age as belonging to an unrighteous person.
    'Unrighteous' keeps lexical continuity with δίκαιος earlier in the verse.
