theological_decisions:
- issue: Nature of μετετέθη in relation to death or divine translation
  chosen_reading: Rendered as 'he was taken away' without specifying whether this
    means death alone or extraordinary translation.
  alternative_readings:
  - he was removed
  - he was translated
  rationale: The Greek verb can denote transfer/removal and, in biblical usage, may
    evoke divine taking (as with Enoch). The immediate context in Wisdom 4 speaks
    of the righteous person being removed from corrupt surroundings, so the English
    should preserve that theological tension rather than resolve it into either ordinary
    death or miraculous translation.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
