id: WIS.8.18
reference: Wisdom of Solomon 8:18
source:
  edition: lxx-swete-1909
  text: καὶ ἐν φιλίᾳ αὐτῆς τέρψις ἀγαθή, καὶ ἐν πόνοις χειρῶν αὐτῆς πλοῦτος ἀνεκλιπής,
    καὶ ἐν συγγυμνασίᾳ ὁμιλίας αὐτῆς φρόνησις, καὶ εὔκλεια ἐν κοινωνίᾳ λόγων αὐτῆς,
    περιῆλθον ζητῶν ὅπως λάβω αὐτὴν εἰς ἐμαυτόν.
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: And in her friendship there is good delight, and in the labors of her hands,
    unfailing wealth, and in close companionship with her, prudence, and honor in
    sharing her words. I went about seeking how I might take her to myself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in training together with her conversation/association, prudence.' The
      Greek compresses ideas of shared discipline and close association in a way that
      is difficult to mirror neatly in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'good repute' instead of 'honor' for the Greek term denoting favorable
      public esteem.
    reason: lexical_alternative
  - marker: c
    text: '''Take her to myself'' may also be rendered ''acquire her for myself'';
      the wording preserves the personal appropriation of personified Wisdom without
      making the image explicitly marital.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλίᾳ
  chosen: friendship
  alternatives:
  - love
  - affection
  - companionship
  lexicon: LSJ
  rationale: The dative phrase ἐν φιλίᾳ αὐτῆς denotes relationship with Wisdom. 'Friendship'
    best preserves the relational sense without romanticizing it; 'love' would be
    broader and less specific.
- source_word: τέρψις ἀγαθή
  chosen: good delight
  alternatives:
  - pleasant enjoyment
  - noble pleasure
  lexicon: LSJ
  rationale: τέρψις denotes delight or enjoyment; ἀγαθή qualifies it as good. 'Good
    delight' keeps the moral valuation explicit rather than smoothing it into merely
    pleasant experience.
- source_word: πόνοις χειρῶν αὐτῆς
  chosen: the labors of her hands
  alternatives:
  - the works of her hands
  - her handiwork
  lexicon: LSJ
  rationale: πόνοι can mean labors/toils, and χειρῶν αὐτῆς is a concrete genitive.
    The phrase is somewhat metaphorical for Wisdom's productive activity; 'labors
    of her hands' preserves the vivid imagery.
- source_word: πλοῦτος ἀνεκλιπής
  chosen: unfailing wealth
  alternatives:
  - inexhaustible riches
  - wealth that does not fail
  lexicon: LSJ
  rationale: ἀνεκλιπής means not failing, unceasing, inexhaustible. 'Unfailing wealth'
    is concise and natural while preserving the permanence implied.
- source_word: συγγυμνασίᾳ
  chosen: close companionship
  alternatives:
  - shared exercise
  - intimate association
  - living together in discipline
  lexicon: LSJ
  rationale: The term literally suggests training together or close association through
    shared practice. In context with ὁμιλίας αὐτῆς it points to sustained association
    with Wisdom. 'Close companionship' communicates the relational-practical sense
    in readable English, while avoiding an overly literal but opaque 'training together.'
- source_word: ὁμιλίας
  chosen: with her
  alternatives:
  - conversation with her
  - association with her
  lexicon: LSJ
  rationale: In the phrase ἐν συγγυμνασίᾳ ὁμιλίας αὐτῆς, ὁμιλία can mean association
    or conversation. Because English becomes awkward if both nouns are rendered woodenly,
    the sense is distributed across 'close companionship with her,' which captures
    the combined idea of intimate association.
- source_word: φρόνησις
  chosen: prudence
  alternatives:
  - understanding
  - practical wisdom
  lexicon: LSJ
  rationale: φρόνησις is practical wisdom or prudence. Since Wisdom is already personified
    in the passage, 'prudence' avoids redundancy while preserving the ethical-intellectual
    nuance.
- source_word: εὔκλεια
  chosen: honor
  alternatives:
  - good repute
  - renown
  - glory
  lexicon: LSJ
  rationale: εὔκλεια denotes good reputation or honor. 'Honor' is concise and fits
    the list of benefits associated with Wisdom.
- source_word: κοινωνίᾳ λόγων αὐτῆς
  chosen: in sharing her words
  alternatives:
  - in fellowship in her words
  - in converse with her sayings
  - in communion with her speech
  lexicon: LSJ
  rationale: κοινωνία conveys sharing/participation, and λόγων can mean words, speech,
    or teachings. 'Sharing her words' preserves both participation and the verbal
    content in accessible English.
- source_word: περιῆλθον ζητῶν
  chosen: I went about seeking
  alternatives:
  - I went around seeking
  - I searched everywhere
  lexicon: LSJ
  rationale: The aorist of περιέρχομαι with a participle conveys active movement in
    search. 'I went about seeking' is idiomatic and preserves the sense of deliberate
    pursuit.
- source_word: ὅπως λάβω αὐτὴν εἰς ἐμαυτόν
  chosen: how I might take her to myself
  alternatives:
  - how I might acquire her for myself
  - how I might receive her into myself
  lexicon: LSJ
  rationale: λάβω is 'take/receive,' and εἰς ἐμαυτόν indicates appropriation to oneself.
    'Take her to myself' preserves the personal, possessive nuance without over-interpreting
    it as marriage or internalization alone.
