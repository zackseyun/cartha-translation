translation:
  text: And through her I will have immortality, and I will leave behind an everlasting
    remembrance for those after me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by her' or 'with her'; the pronoun refers to Wisdom personified as feminine.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'immortality' may be read as personal deathlessness or, in connection
      with the next clause, as enduring legacy; the Greek leaves the relationship
      open.
    reason: alternative_reading
lexical_decisions:
- source_word: ἕξω
  chosen: I will have
  alternatives:
  - I will obtain
  - I will possess
  lexicon: BDAG
  rationale: Future of ἔχω, expressing possession or attainment. 'I will have' is
    the most direct and natural English rendering here; 'obtain' is possible contextually
    but adds a nuance of acquisition not explicit in the verb itself.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective rather than a strong adversative.
    'And' fits the flow of the speaker's expected benefits from wisdom better than
    the more contrastive 'but'.
- source_word: αὐτὴν
  chosen: through her
  alternatives:
  - by her
  - with her
  lexicon: BDAG
  rationale: 'The accusative feminine pronoun refers back to Wisdom personified. In
    idiomatic English, the sense is instrumental/associative: immortality comes by
    means of or through wisdom. ''Through her'' preserves both the feminine personification
    and the mediating sense.'
- source_word: ἀθανασίαν
  chosen: immortality
  alternatives:
  - deathlessness
  lexicon: BDAG
  rationale: Standard rendering for ἀθανασία. 'Deathlessness' is more literal etymologically
    but less idiomatic in English.
- source_word: μνήμην αἰώνιον
  chosen: an everlasting remembrance
  alternatives:
  - eternal memory
  - an enduring memorial
  lexicon: BDAG
  rationale: The phrase denotes lasting remembrance or memorial reputation. 'Everlasting
    remembrance' is natural English and preserves the durative force of αἰώνιον without
    sounding overly wooden.
- source_word: τοῖς μετʼ ἐμὲ
  chosen: for those after me
  alternatives:
  - among those after me
  - to those who come after me
  - for posterity
  lexicon: BDAG
  rationale: The phrase refers to later generations. 'For those after me' stays close
    to the Greek while remaining readable. 'For posterity' is concise but less transparent
    to the underlying wording.
- source_word: ἀπολείψω
  chosen: I will leave behind
  alternatives:
  - I will leave
  - I will bequeath
  lexicon: BDAG
  rationale: Future of ἀπολείπω, here meaning to leave behind for subsequent people.
    'Leave behind' captures the forward-looking sense toward later generations more
    clearly than the simpler 'leave'.
