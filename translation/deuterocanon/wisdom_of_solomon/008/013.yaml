theological_decisions:
- issue: Sense of 'immortality' in relation to personified Wisdom
  chosen_reading: Retain the text's claim that through Wisdom the speaker will have
    'immortality' without narrowing it to either literal endless life or merely lasting
    fame.
  alternative_readings:
  - literal personal immortality
  - figurative immortality through enduring reputation
  rationale: 'The verse presents two parallel benefits from Wisdom: immortality and
    everlasting remembrance. The text itself does not force the translator to collapse
    the first into the second or to overdefine its metaphysical scope. Preserving
    ''immortality'' keeps the theological tension intact.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
