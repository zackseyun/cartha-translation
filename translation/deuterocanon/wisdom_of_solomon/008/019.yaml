theological_decisions:
- issue: Anthropological wording in ψυχῆς ἔλαχον ἀγαθῆς
  chosen_reading: retain 'soul' language in the main text
  alternative_readings:
  - '''I had a good disposition'''
  - '''I received a noble life/self'''
  rationale: The verse touches on the speaker's constitution in a way that later readers
    may connect to body-soul anthropology. The Greek explicitly uses ψυχή, so the
    translation preserves 'soul' rather than resolving it into a less theologically
    loaded paraphrase.
