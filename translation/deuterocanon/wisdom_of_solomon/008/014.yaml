reference: Wisdom of Solomon 8:14
source:
  edition: lxx-swete-1909
  text: διοικήσω λαούς, καὶ ἔθνη ὑποταγήσεταί μοι·
  language: Greek
  pages:
  - 635
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: I will govern peoples, and nations will be subject to me;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διοικήσω
  chosen: I will govern
  alternatives:
  - I will administer
  - I will rule
  lexicon: LSJ
  rationale: Future active of διοικέω, denoting managing or governing. 'Govern' fits
    political leadership over peoples without overstating with a harsher 'rule' or
    narrowing to bureaucratic 'administer'.
- source_word: λαούς
  chosen: peoples
  alternatives:
  - people
  - nations
  lexicon: LSJ
  rationale: Plural of λαός. 'Peoples' preserves the plural collective sense better
    than singular 'people.' 'Nations' is possible, but ἔθνη appears in the next clause
    and is better reserved there to preserve lexical distinction.
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: LSJ
  rationale: Plural of ἔθνος. In this political context, 'nations' is the most natural
    rendering. 'Gentiles' would import an ethnic-religious contrast not present here.
- source_word: ὑποταγήσεταί
  chosen: will be subject
  alternatives:
  - will submit
  - will be subjected
  lexicon: LSJ
  rationale: Future passive/middle of ὑποτάσσω. 'Will be subject' conveys subordination
    without implying forced coercion as strongly as 'will be subjected,' and is slightly
    more formal and stable than 'will submit.'
- source_word: μοι
  chosen: to me
  alternatives:
  - under me
  lexicon: LSJ
  rationale: Dative pronoun indicating relation of subjection. 'To me' is the most
    direct and idiomatic English equivalent.
