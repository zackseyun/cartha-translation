id: WIS.8.4
reference: Wisdom of Solomon 8:4
source:
  edition: lxx-swete-1909
  text: μύστις γάρ ἐστιν τῆς τοῦ θεοῦ ἐπιστήμης, καὶ αἱρέτις τῶν ἔργων αὐτοῦ.
  language: Greek
  pages:
  - 634
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: For she is an initiate in the knowledge of God, and a chooser of his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'an approver of his works.' The Greek phrase is unusual and may emphasize
      Wisdom's discerning approval of what God does.
    reason: lexical_alternative
lexical_decisions:
- source_word: μύστις
  chosen: an initiate
  alternatives:
  - one initiated
  - a mystic
  lexicon: LSJ
  rationale: The noun denotes one initiated into mysteries or secret knowledge. 'Initiate'
    preserves the cultic/philosophical sense without importing later mystical connotations
    too strongly. 'Mystic' is possible etymologically but is misleading in modern
    English.
- source_word: ἐπιστήμης
  chosen: knowledge
  alternatives:
  - understanding
  - science
  lexicon: LSJ
  rationale: The word commonly means knowledge or understanding. 'Knowledge' is the
    most natural and direct rendering here in the genitive phrase 'of the knowledge
    of God.'
- source_word: αἱρέτις
  chosen: a chooser
  alternatives:
  - an elect one
  - one who chooses
  - a partisan
  lexicon: LSJ
  rationale: The feminine noun is rare and derives from choosing or taking for oneself.
    In context, with 'of his works,' it most naturally means one who chooses or approves
    God's works. 'Chooser' is slightly unusual in English but stays close to the Greek
    without overinterpreting.
- source_word: ἔργων
  chosen: works
  alternatives:
  - deeds
  - acts
  lexicon: LSJ
  rationale: '''Works'' is the standard and sufficiently broad rendering, fitting
    both divine acts and operations.'
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: The conjunction gives the reason for the preceding statement, and 'For'
    preserves that explanatory connection.
