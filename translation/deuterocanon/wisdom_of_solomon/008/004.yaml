theological_decisions:
- issue: How to render μύστις in a wisdom text with philosophical-religious overtones
  chosen_reading: an initiate
  alternative_readings:
  - a mystic
  - one initiated into God's knowledge
  rationale: The verse presents Wisdom as having privileged access to divine knowledge.
    'Initiate' preserves the sense of admitted participation in hidden knowledge while
    avoiding the anachronistic and potentially misleading modern religious associations
    of 'mystic.'
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
- issue: How to render αἱρέτις τῶν ἔργων αὐτοῦ
  chosen_reading: a chooser of his works
  alternative_readings:
  - an approver of his works
  - one who selects his works
  rationale: The Greek is somewhat compressed and unusual. A more idiomatic English
    paraphrase like 'an approver of his works' may capture the sense, but the main
    text keeps closer to the lexical shape of the Greek. The alternative is preserved
    in a footnote because the phrase may imply approval or deliberate selection rather
    than mere choosing.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity
    rather than over-resolve'
