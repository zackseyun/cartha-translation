theological_decisions:
- issue: Nature of the relation between immortality and wisdom in ἐν συγγενείᾳ σοφίας
  chosen_reading: there is immortality in kinship with wisdom
  alternative_readings:
  - immortality comes through kinship with wisdom
  - there is immortality in union with wisdom
  rationale: The Greek states an existential claim with ἐν plus a relational noun,
    not an explicit causal formula. The chosen rendering preserves the text's theological
    linkage between wisdom and immortality without overstating mechanism or metaphysics.
  doctrine_reference: Preserve theological tension rather than resolve it.
