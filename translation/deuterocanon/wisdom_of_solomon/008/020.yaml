theological_decisions:
- issue: Possible implication of pre-existence or transmigration in 'I came into an
    undefiled body'
  chosen_reading: Translate the clause straightforwardly without resolving the broader
    anthropological question.
  alternative_readings:
  - A pre-existent soul entering a body
  - A rhetorical description of being born with a pure constitution
  rationale: The Greek states that the speaker, being good, 'came into an undefiled
    body.' The verse has been read in discussions of pre-existence, but the translation
    should not force that interpretation beyond the wording. A plain rendering preserves
    the text's tension and lets readers assess the larger context.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
