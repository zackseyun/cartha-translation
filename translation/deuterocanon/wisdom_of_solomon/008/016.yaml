translation:
  text: When I go into my house, I will find rest beside her; for her company has
    no bitterness, nor does living with her bring pain, but gladness and joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will rest with her.' The Greek verb suggests repose in close association
      with Wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθὼν
  chosen: When I go into
  alternatives:
  - having entered
  - after entering
  lexicon: LSJ
  rationale: Aorist participle introducing the circumstance of the main verb. 'When
    I go into' gives natural English while preserving the temporal sense without over-formal
    stiffness.
- source_word: προσαναπαύσομαι
  chosen: I will find rest beside her
  alternatives:
  - I will rest with her
  - I will take my ease with her
  lexicon: LSJ
  rationale: The future middle conveys repose in association with Wisdom. 'Find rest
    beside her' captures both the sense of resting and the prefixed nuance of resting
    in her presence/with her, while remaining idiomatic.
- source_word: συναναστροφή
  chosen: company
  alternatives:
  - association
  - companionship
  - intercourse
  lexicon: LSJ
  rationale: The noun denotes social interaction or companionship. 'Company' is clear
    modern English and fits the contrast with bitterness.
- source_word: πικρίαν
  chosen: bitterness
  alternatives:
  - harshness
  - resentment
  lexicon: LSJ
  rationale: The term naturally denotes bitterness or unpleasantness. 'Bitterness'
    preserves the metaphorical and emotional force.
- source_word: συμβίωσις
  chosen: living with her
  alternatives:
  - life with her
  - cohabitation
  lexicon: LSJ
  rationale: The word refers to shared life or living together. 'Living with her'
    is idiomatic and avoids the overly technical or potentially misleading 'cohabitation'.
- source_word: ὀδύνην
  chosen: pain
  alternatives:
  - distress
  - grief
  lexicon: LSJ
  rationale: A broad term for pain or anguish. 'Pain' best matches the concise contrast
    in the Greek.
- source_word: εὐφροσύνην
  chosen: gladness
  alternatives:
  - cheerfulness
  - delight
  lexicon: LSJ
  rationale: The term denotes merriment or gladness. 'Gladness' pairs well with 'joy'
    and preserves the twofold expression rather than collapsing them.
- source_word: χαράν
  chosen: joy
  alternatives:
  - rejoicing
  lexicon: LSJ
  rationale: Standard rendering for χαρά; retained distinctly alongside εὐφροσύνην
    to preserve the rhetorical fullness of the Greek.
