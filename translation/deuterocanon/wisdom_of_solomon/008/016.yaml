theological_decisions:
- issue: Personification of wisdom as feminine
  chosen_reading: Retain feminine references ('her')
  alternative_readings:
  - render more abstractly as 'it' or 'wisdom' repeatedly
  rationale: The Greek consistently personifies wisdom with feminine forms (αὐτῇ,
    αὐτῆς). Preserving 'her' reflects the source text's literary and theological presentation
    without flattening it into abstraction.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English anchored in source text.'
