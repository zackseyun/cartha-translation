theological_decisions:
- issue: Scope of wisdom's activity in τὰ πάντα ἐργαζομένης
  chosen_reading: Render broadly as 'which works all things' without narrowing to
    creation alone.
  alternative_readings:
  - which accomplishes all things
  - which produces all things
  rationale: The text attributes sweeping efficacy to wisdom, but the participle itself
    does not require a specific metaphysical claim such as ex nihilo creation. The
    translation preserves the theological weight while avoiding importing a more precise
    doctrine than the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
