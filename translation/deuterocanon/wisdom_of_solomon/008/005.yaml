reference: Wisdom of Solomon 8:5
source:
  edition: lxx-swete-1909
  text: εἰ δὲ πλοῦτός ἐστιν ἐπιθυμητὸν κτῆμα ἐν βίῳ, τί σοφίας πλουσιώτερον τῆς τὰ
    πάντα ἐργαζομένης;
  language: Greek
  pages:
