    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: Her nobility is glorified by living together with God, and the Master of all
    loved her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Her noble character is honored by companionship with God.' The Greek
      συμβίωσις can denote shared life, companionship, or living together.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐγένειαν
  chosen: nobility
  alternatives:
  - good birth
  - noble character
  - high lineage
  lexicon: LSJ
  rationale: The accusative noun denotes nobility or excellence. In context, the verse
    speaks of Wisdom's worth or distinction rather than literal aristocratic birth,
    so 'nobility' best preserves both dignity and breadth.
- source_word: δοξάζει
  chosen: is glorified
  alternatives:
  - glorifies
  - honors
  - makes glorious
  lexicon: LSJ
  rationale: 'With εὐγένειαν as the object and συμβίωσις as the subject, the sense
    is that cohabitation/companionship with God brings glory to Wisdom''s nobility.
    English passive wording communicates the result naturally: her nobility ''is glorified.'''
- source_word: συμβίωσις
  chosen: living together
  alternatives:
  - companionship
  - cohabitation
  - shared life
  lexicon: LSJ
  rationale: The noun literally refers to living together or sharing life. 'Living
    together with God' keeps the concrete force of the Greek while remaining intelligible;
    'companionship' is possible but less vivid.
- source_word: θεοῦ
  chosen: God
  lexicon: LSJ
  rationale: 'Straightforward genitive after συμβίωσις: Wisdom''s living together
    with God.'
- source_word: ἔχουσα
  chosen: by living together with God
  alternatives:
  - having
  - possessing
  lexicon: LSJ
  rationale: The participle modifies the subject implied by συμβίωσις and is folded
    into idiomatic English expression. A more wooden 'having cohabitation with God'
    would be awkward; the chosen rendering preserves the participial sense within
    natural English.
- source_word: ὁ πάντων δεσπότης
  chosen: the Master of all
  alternatives:
  - the Lord of all
  - the Sovereign of all
  lexicon: LSJ
  rationale: δεσπότης means master or sovereign. Because κύριος is not the word used
    here, 'Master' better preserves the lexical distinction. 'Of all' reflects πάντων
    comprehensively.
- source_word: ἠγάπησεν
  chosen: loved
  alternatives:
  - has loved
  - came to love
  lexicon: LSJ
  rationale: Simple aorist, best rendered as past narrative 'loved.'
- source_word: αὐτήν
  chosen: her
  alternatives:
  - it
  lexicon: LSJ
  rationale: Wisdom is personified as feminine throughout the context, so 'her' preserves
    the literary and grammatical personification.
