id: WIS.8.3
reference: Wisdom of Solomon 8:3
source:
  edition: lxx-swete-1909
  text: εὐγένειαν δοξάζει συμβίωσις θεοῦ ἔχουσα, καὶ ὁ πάντων δεσπότης ἠγάπησεν αὐτήν·
  language: Greek
  pages:
  - 634
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
