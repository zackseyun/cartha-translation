theological_decisions:
- issue: Personification of Wisdom
  chosen_reading: Retain feminine personal language for Wisdom ('her').
  alternative_readings:
  - Use impersonal 'it' to treat Wisdom as an abstract quality
  rationale: The Greek uses feminine forms and presents Wisdom as a personified female
    figure. Preserving 'her' maintains the literary theology of the passage without
    forcing later doctrinal identifications.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
- issue: Rendering δεσπότης
  chosen_reading: Translate as 'Master' rather than 'Lord.'
  alternative_readings:
  - Lord
  - Sovereign
  rationale: The source uses δεσπότης, not κύριος. Translating it distinctly preserves
    lexical transparency and avoids collapsing two different divine titles into one
    English term.
  doctrine_reference: Consistency of key terms, or documented exception.
