id: WIS.8.6
reference: Wisdom of Solomon 8:6
source:
  edition: lxx-swete-1909
  text: εἰ δὲ φρόνησις ἐργάζεται, τίς αὐτῆς τῶν ὄντων μᾶλλόν ἐστιν τεχνῖτις;
  language: Greek
  pages:
  - 634
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: And if understanding is productive, who among existing things is more a craftswoman
    than she?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prudence is at work' or 'prudence produces.' The Greek verb can emphasize
      active effectiveness or productive labor.
    reason: lexical_alternative
  - marker: b
    text: Literally 'who of the things that are is more a craftswoman than she?'
    reason: lexical_alternative
lexical_decisions:
- source_word: φρόνησις
  chosen: understanding
  alternatives:
  - prudence
  - practical wisdom
  - discernment
  lexicon: LSJ
  rationale: φρόνησις in Wisdom literature often denotes practical intelligence or
    sound understanding rather than abstract wisdom itself. 'Understanding' is clear
    modern English and avoids collapsing it into 'wisdom,' which is a distinct concept
    in the surrounding context.
- source_word: ἐργάζεται
  chosen: is productive
  alternatives:
  - works
  - produces
  - accomplishes
  - is at work
  lexicon: LSJ
  rationale: The middle/passive form here conveys active efficacy or productive operation.
    'Is productive' captures the sense that understanding brings about results, fitting
    the rhetorical question that follows about craftsmanship.
- source_word: τῶν ὄντων
  chosen: among existing things
  alternatives:
  - of the things that are
  - among all that exists
  - of beings
  lexicon: LSJ
  rationale: The phrase literally refers to 'the things that are.' 'Among existing
    things' preserves the ontological breadth without sounding overly philosophical
    in English.
- source_word: μᾶλλόν
  chosen: more
  alternatives:
  - rather
  - to a greater degree
  lexicon: LSJ
  rationale: In the comparative rhetorical question, μᾶλλον naturally yields 'more'
    in English.
- source_word: τεχνῖτις
  chosen: craftswoman
  alternatives:
  - artisan
  - craftsman
  - maker
  - worker
  lexicon: LSJ
  rationale: τεχνῖτις is a feminine noun for a skilled artisan. Because the referent
    αὐτῆς/she is feminine, 'craftswoman' preserves both the skilled-artisan sense
    and the grammatical gender of the personified figure. 'Artisan' is possible but
    loses the marked feminine correspondence in the Greek.
