theological_decisions:
- issue: Gendered personification of φρόνησις
  chosen_reading: Retain feminine personification with 'she' and a feminine occupational
    term.
  alternative_readings:
  - Use gender-neutral 'it' for understanding
  - Use a gender-neutral occupational term such as 'artisan'
  rationale: The Greek explicitly personifies the noun with αὐτῆς and the feminine
    noun τεχνῖτις. Following the project's gender-accurate principle, the translation
    preserves the feminine personification rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relation of φρόνησις to σοφία in context
  chosen_reading: Translate φρόνησις distinctly as 'understanding' rather than 'wisdom.'
  alternative_readings:
  - wisdom
  - prudence
  rationale: The verse is within a praise of Wisdom, but the Greek term here is not
    σοφία. Rendering it distinctly preserves lexical differentiation and avoids importing
    a theological identification beyond the wording of the verse itself.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
