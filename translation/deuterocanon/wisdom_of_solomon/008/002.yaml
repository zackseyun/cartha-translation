translation:
  text: I loved her and sought her out from my youth, and I sought to take her as
    my bride, and I became a lover of her beauty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I sought to take her as a bride for myself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταύτην
  chosen: her
  alternatives:
  - this one
  lexicon: LSJ
  rationale: Refers back to Wisdom personified as a woman in the immediate context.
    English 'her' is natural and preserves the feminine personification better than
    the more wooden 'this one'.
- source_word: ἐφίλησα
  chosen: loved
  alternatives:
  - cherished
  - kissed
  lexicon: LSJ
  rationale: In context the verb expresses affectionate attachment to personified
    Wisdom, not a literal kiss. 'Loved' is the clearest idiomatic rendering.
- source_word: ἐξεζήτησα
  chosen: sought ... out
  alternatives:
  - searched for
  - earnestly sought
  lexicon: LSJ
  rationale: The compound verb intensifies the idea of seeking. 'Sought out' preserves
    that force without sounding overly stiff.
- source_word: ἐκ νεότητός μου
  chosen: from my youth
  alternatives:
  - since my youth
  - from my young age
  lexicon: LSJ
  rationale: A standard temporal expression meaning from the time of youth onward.
    'From my youth' is concise and natural.
- source_word: ἐζήτησα
  chosen: I sought
  alternatives:
  - I desired
  - I tried
  lexicon: LSJ
  rationale: Keeps the repeated seeking language visible in English, matching the
    Greek repetition.
- source_word: νύμφην
  chosen: my bride
  alternatives:
  - a bride
  - as a bride
  lexicon: LSJ
  rationale: The noun means 'bride' or 'young wife.' Because the infinitive ἀγαγέσθαι
    ἐμαυτῷ implies taking in marriage for oneself, 'my bride' communicates the marital
    intent naturally in English.
- source_word: ἀγαγέσθαι ἐμαυτῷ
  chosen: to take ... for myself
  alternatives:
  - to marry
  - to bring home for myself
  lexicon: LSJ
  rationale: Literally 'to lead/take for myself,' an idiom for taking a wife. 'To
    take her as my bride for myself' preserves the marital idiom and the reflexive
    element without paraphrasing too far.
- source_word: ἐραστὴς
  chosen: a lover
  alternatives:
  - an admirer
  - one devoted
  lexicon: LSJ
  rationale: The noun carries the sense of a lover or ardent admirer. 'Lover' best
    preserves the strong affective and nuptial imagery of the verse.
- source_word: τοῦ κάλλους αὐτῆς
  chosen: of her beauty
  alternatives:
  - of her loveliness
  - of her excellence
  lexicon: LSJ
  rationale: κάλλος ordinarily denotes beauty. Since the verse uses bridal and eroticized
    personification, 'beauty' is the most direct and contextually fitting rendering.
