theological_decisions:
- issue: Whether the shared-life language should be rendered as explicit marriage
  chosen_reading: to take her to live with me
  alternative_readings:
  - to marry her
  - to take her as a wife
  rationale: The broader context personifies Wisdom in marital imagery, but this verse's
    Greek says literally to bring/take her 'for living together' and does not explicitly
    use the normal marriage terms. The translation preserves the relational imagery
    without importing a stronger claim than the wording itself makes.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the text says without importing doctrinal or interpretive
    claims.'
