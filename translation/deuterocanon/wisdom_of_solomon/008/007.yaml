translation:
  text: And if anyone loves righteousness, her labors are virtues; for she teaches
    self-control and prudence, righteousness and courage—things more useful than these,
    for human beings, there are none in life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.' The Greek word can denote both moral righteousness and justice.
    reason: lexical_alternative
  - marker: b
    text: Greek 'her labors ... she teaches,' preserving the feminine personification
      of righteousness in this verse.
    reason: cultural_note
lexical_decisions:
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: The project default for δικαιοσύνη is 'righteousness,' with 'justice'
    as an alternative preserved where relevant. In Wisdom literature the term can
    carry ethical uprightness broadly; 'righteousness' best preserves that moral sense
    here while avoiding narrowing it to social justice alone.
- source_word: ἀγαπᾷ
  chosen: loves
  alternatives:
  - values
  - desires
  lexicon: LSJ
  rationale: A straightforward rendering of the verb for love/esteem. 'Loves' preserves
    the personal and moral force of the Greek without weakening it to mere preference.
- source_word: οἱ πόνοι ταύτης
  chosen: her labors
  alternatives:
  - the fruits of her labors
  - her toils
  - her works
  lexicon: LSJ
  rationale: πόνoι literally denotes labors/toils. Because δικαιοσύνη is grammatically
    feminine and the following verbs continue the personification, 'her labors' preserves
    the feminine personification in context. 'Fruits of her labors' is interpretive
    and adds a result nuance not explicit in the Greek.
- source_word: ἀρεταί
  chosen: virtues
  alternatives:
  - excellences
  lexicon: LSJ
  rationale: In Hellenistic ethical context ἀρεταί naturally refers to virtues/excellences.
    'Virtues' is the clearest idiomatic English equivalent here, especially since
    the verse immediately lists cardinal virtues.
- source_word: σωφροσύνην
  chosen: self-control
  alternatives:
  - temperance
  - moderation
  lexicon: LSJ
  rationale: The term denotes soundness of mind expressed in restraint. 'Self-control'
    is modern and accessible; 'temperance' is traditional but narrower and more archaic.
- source_word: φρόνησιν
  chosen: prudence
  alternatives:
  - practical wisdom
  - good sense
  lexicon: LSJ
  rationale: φρόνησις is practical wisdom or prudence. 'Prudence' fits the virtue-list
    style and pairs well with the other ethical terms.
- source_word: ἀνδρείαν
  chosen: courage
  alternatives:
  - fortitude
  - manliness
  lexicon: LSJ
  rationale: The virtue named is courage/fortitude. 'Courage' communicates the sense
    clearly in modern English without importing the gendered overtones that 'manliness'
    can carry in English, even though the Greek term is historically linked to manly
    valor.
- source_word: χρησιμώτερον
  chosen: more useful
  alternatives:
  - more beneficial
  - more advantageous
  lexicon: LSJ
  rationale: The comparative adjective means more useful/beneficial. 'More useful'
    is direct and natural in the concluding maxim.
- source_word: ἐν βίῳ
  chosen: in life
  alternatives:
  - for life
  - in human life
  lexicon: LSJ
  rationale: A concise rendering of the sphere of usefulness. 'In life' preserves
    the Greek prepositional phrase without overexpansion.
- source_word: ἀνθρώποις
  chosen: for human beings
  alternatives:
  - for people
  - for men
  lexicon: LSJ
  rationale: The dative marks those for whom these virtues are useful. 'Human beings'
    accurately reflects the generic sense of ἀνθρώποις and avoids the potentially
    misleading male-specific reading of 'men.'
