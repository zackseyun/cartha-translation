theological_decisions:
- issue: Personification of righteousness/wisdom in the feminine
  chosen_reading: Retain feminine reference with 'her' in 'her labors' and 'she teaches'
  alternative_readings:
  - Use impersonal 'its labors' and 'it teaches'
  rationale: The Greek uses feminine forms tied to δικαιοσύνη and continues the personified
    presentation common in Wisdom literature. Preserving the feminine pronouns reflects
    the source text's literary-theological texture without making a doctrinal claim
    beyond the personification itself.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Per the contested-terms guidance, the default rendering is 'righteousness,'
    while 'justice' remains a viable alternative. Here the broader ethical sense and
    the list of virtues favor 'righteousness' in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
