translation:
  text: When I am silent, they will wait for me, and when I speak, they will pay attention;
    and if I go on speaking at length, they will lay a hand on their mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The gesture 'lay a hand on their mouth' signifies silent restraint or respectful
      awe in the speaker's presence.
    reason: cultural_note
lexical_decisions:
- source_word: σιγῶντά
  chosen: when I am silent
  alternatives:
  - while I am silent
  - being silent
  lexicon: LSJ
  rationale: Present participle of σιγάω used adverbially with με; rendered temporally
    in natural English as 'when I am silent' rather than the more wooden 'being silent.'
- source_word: περιμενοῦσιν
  chosen: they will wait for me
  alternatives:
  - they will await me
  - they will expect me
  lexicon: LSJ
  rationale: The verb means to wait for or await. 'Wait for me' is idiomatic and fits
    the context of respectful expectation.
- source_word: φθεγγομένῳ
  chosen: when I speak
  alternatives:
  - when I utter speech
  - as I speak
  lexicon: LSJ
  rationale: Dative participle from φθέγγομαι, to utter a sound or speak. In context
    it parallels λαλοῦντος and is best rendered simply as 'when I speak' rather than
    with an overly marked English verb.
- source_word: προσέξουσιν
  chosen: they will pay attention
  alternatives:
  - they will attend
  - they will give heed
  - they will listen closely
  lexicon: LSJ
  rationale: προσέχω here conveys attentive listening. 'Pay attention' is clear modern
    English and preserves the sense of heedful attention.
- source_word: λαλοῦντος ἐπὶ πλεῖον
  chosen: if I go on speaking at length
  alternatives:
  - when I speak further
  - while I speak more
  - if I speak at greater length
  lexicon: LSJ
  rationale: The genitive absolute with ἐπὶ πλεῖον indicates speaking further or at
    greater length. 'Go on speaking at length' captures both continuation and extension
    in idiomatic English.
- source_word: χεῖρα ἐπιθήσουσιν ἐπὶ στόμα αὐτῶν
  chosen: they will lay a hand on their mouth
  alternatives:
  - they will put their hand over their mouth
  - they will place a hand upon their mouth
  lexicon: LSJ
  rationale: A conventional gesture of silence, restraint, or awed respect. Singular
    χεῖρα is naturally rendered 'a hand' in English. 'On their mouth' stays close
    to the Greek while remaining readable.
