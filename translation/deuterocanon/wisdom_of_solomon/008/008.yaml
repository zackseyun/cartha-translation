theological_decisions:
- issue: Personification of Wisdom
  chosen_reading: Retain feminine personal reference ('she') for Wisdom.
  alternative_readings:
  - Repeat 'Wisdom' instead of a pronoun
  - Use 'it' as an abstract noun
  rationale: The immediate context personifies Wisdom as an active female figure.
    Preserving 'she' reflects the Greek literary presentation without making claims
    beyond the text about ontology or later doctrinal identifications.
  doctrine_reference: Translation philosophy §1, §6
- issue: Strength of εἰκάζειν
  chosen_reading: Render as 'can infer the things to come' rather than a stronger
    prophetic term.
  alternative_readings:
  - can foresee the future
  - can predict what is to come
  rationale: The Greek suggests inference or discerning by signs rather than the stronger
    direct foreknowledge expressed later by προγινώσκει. This preserves the text's
    internal verbal distinction.
  doctrine_reference: Translation philosophy §1, §5
