id: WIS.8.21
reference: Wisdom of Solomon 8:21
source:
  edition: lxx-swete-1909
  text: γνοὺς δὲ ὅτι οὐκ ἄλλως ἔσομαι ἐγκρατὴς ἐὰν μὴ ὁ θεὸς δῷ, καὶ τοῦτο δὲ ἦν φρονήσεως
    τὸ εἰδέναι τίνος ἡ χάρις, ἐνέτυχον τῷ κυρίῳ καὶ ἐδεήθην αὐτοῦ, καὶ εἶπον ἐξ ὅλης
    τῆς καρδίας μου IX
  language: Greek
