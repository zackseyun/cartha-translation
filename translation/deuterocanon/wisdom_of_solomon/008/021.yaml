theological_decisions:
- issue: Whether χάρις should be rendered 'grace' or more concretely as 'gift' in
    this wisdom context
  chosen_reading: gift
  alternative_readings:
  - grace
  - favor
  rationale: In context the speaker recognizes that self-control is not self-generated
    but given by God. Rendering χάρις as 'gift' communicates the concrete bestowed
    benefit without importing later technical theological connotations of 'grace,'
    while still preserving divine generosity as the source.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not academic jargon.'
- issue: Rendering κύριος in a deuterocanonical prayer context
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's default rendering for κύριος is 'Lord.' Nothing in the
    immediate context requires deviation.
  doctrine_reference: 'DOCTRINE.md contested terms table: κύριος → Lord.'
