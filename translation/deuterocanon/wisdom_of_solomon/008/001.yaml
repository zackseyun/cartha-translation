theological_decisions:
- issue: Personification of Wisdom
  chosen_reading: Retain feminine personal language ('she') for Wisdom.
  alternative_readings:
  - Repeat 'Wisdom' instead of 'she' to avoid over-personalization
  rationale: The Greek context personifies Wisdom as a feminine subject acting across
    creation. Preserving 'she' reflects the source text's literary-theological presentation
    without making claims beyond the text about hypostasis or later doctrinal identification.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
