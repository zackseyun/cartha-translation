id: WIS.8.1
reference: Wisdom of Solomon 8:1
source:
  edition: lxx-swete-1909
  text: διατείνει δὲ ἀπὸ πέρατος εἰς πέρας εὐρώστως, καὶ διοικεῖ τὰ πάντα χρηστῶς.
  language: Greek
  pages:
