  text: φοβηθήσονταί με ἀκούσαντες τύραννοι φρικτοί, ἐν πλήθει φανούμαι ἀγαθὸς καὶ
    ἐν πολέμῳ ἀνδρεῖος.
  language: Greek
  pages:
