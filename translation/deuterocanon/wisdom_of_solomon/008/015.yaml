translation:
  text: Fearsome tyrants will fear me when they hear; among the multitude I will appear
    good, and in war courageous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fearsome tyrants.' The Greek adjective may describe the tyrants themselves
      as dreadful, not merely that they will become frightened.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will be seen as noble/beneficent among the multitude.' The Greek ἀγαθός
      can suggest practical goodness in public leadership, not only moral goodness
      in the abstract.
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβηθήσονταί
  chosen: will fear
  alternatives:
  - will be afraid of
  - will stand in fear of
  lexicon: BDAG
  rationale: Future passive/deponent of φοβέω here naturally conveys that the tyrants
    will come to fear the speaker. 'Will fear' is concise and preserves the direct
    force better than a more paraphrastic option.
- source_word: ἀκούσαντες
  chosen: when they hear
  alternatives:
  - having heard
  - on hearing
  lexicon: BDAG
  rationale: Aorist participle functioning temporally. 'When they hear' gives natural
    English while preserving the temporal sense tied to the tyrants' fearing.
- source_word: τύραννοι
  chosen: tyrants
  alternatives:
  - rulers
  - despots
  lexicon: LSJ
  rationale: τύραννοι specifically denotes autocratic rulers, often with a negative
    coloring. 'Tyrants' preserves that force better than the more neutral 'rulers.'
- source_word: φρικτοί
  chosen: terrible
  alternatives:
  - dread
  - fearsome
  - terrifying
  lexicon: LSJ
  rationale: The adjective marks these tyrants as dreadful or awe-inspiring. 'Terrible
    tyrants' is idiomatic English and preserves the ominous characterization without
    overexpansion.
- source_word: ἐν πλήθει
  chosen: among the multitude
  alternatives:
  - in the assembly
  - before the crowd
  - in a multitude
  lexicon: LSJ
  rationale: The phrase likely refers to the speaker's public appearance in the presence
    of many people. 'Among the multitude' keeps the broad collective sense of πλήθος
    without narrowing it to a formal assembly.
- source_word: φανούμαι
  chosen: I will appear
  alternatives:
  - I will be seen as
  - I will show myself
  lexicon: BDAG
  rationale: Future middle/passive of φαίνω here is best rendered as appearance or
    manifestation. 'I will appear' is straightforward and leaves open whether the
    emphasis is on perception or presentation.
- source_word: ἀγαθὸς
  chosen: good
  alternatives:
  - noble
  - kind
  - beneficent
  lexicon: BDAG
  rationale: ἀγαθός can carry moral and practical goodness. In this royal/public context
    it may imply beneficence, but 'good' preserves the broader semantic range without
    over-specifying.
- source_word: ἐν πολέμῳ
  chosen: in war
  alternatives:
  - in battle
  - during war
  lexicon: LSJ
  rationale: The phrase is straightforward. 'In war' is slightly broader than 'in
    battle' and matches the Greek noun's scope.
- source_word: ἀνδρεῖος
  chosen: courageous
  alternatives:
  - brave
  - valiant
  - manly
  lexicon: BDAG
  rationale: The adjective denotes bravery or valor. 'Courageous' communicates the
    sense in modern English without importing the gendered overtones that 'manly'
    can carry in contemporary usage, while still reflecting the virtue term.
