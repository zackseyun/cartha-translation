translation:
  text: I will be found keen in judgment, and in the sight of rulers I will be admired.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sharp in judgment.' The Greek adjective can be rendered more literally
      as 'sharp' or 'acute.'
    reason: lexical_alternative
  - marker: b
    text: Or 'before rulers' or 'in the presence of rulers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀξεῖς
  chosen: keen
  alternatives:
  - sharp
  - acute
  - quick
  lexicon: LSJ
  rationale: The adjective literally means 'sharp' or 'keen.' In this context of judicial
    discernment, 'keen' conveys intellectual sharpness in natural modern English without
    sounding overly literal or awkward.
- source_word: εὑρεθήσομαι
  chosen: I will be found
  alternatives:
  - I will prove to be
  - I will be discovered as
  lexicon: BDAG
  rationale: The future passive of εὑρίσκω commonly means 'be found' in the sense
    of being shown or recognized to be something. Retaining 'be found' preserves the
    Greek idiom and leaves the agent implicit.
- source_word: ἐν κρίσει
  chosen: in judgment
  alternatives:
  - in court
  - in legal judgment
  - in decision-making
  lexicon: LSJ
  rationale: κρίσις can denote judgment, legal process, or decision. 'In judgment'
    is broad enough to preserve the judicial/deliberative sense without over-specifying
    a courtroom setting.
- source_word: ἐν ὄψει
  chosen: in the sight of
  alternatives:
  - before
  - in the presence of
  lexicon: LSJ
  rationale: The phrase literally refers to sight or view. 'In the sight of' is a
    clear English equivalent that preserves the visual/public nuance.
- source_word: δυναστῶν
  chosen: rulers
  alternatives:
  - powerful men
  - princes
  - authorities
  lexicon: LSJ
  rationale: δυνάστης refers to one who holds power. 'Rulers' is idiomatic, accessible,
    and fits the public-political setting better than the more archaic 'princes' or
    the more generic 'powerful men.'
- source_word: θαυμασθήσομαι
  chosen: I will be admired
  alternatives:
  - I will be marveled at
  - I will be wondered at
  - I will be held in admiration
  lexicon: BDAG
  rationale: The future passive indicates becoming an object of wonder or admiration.
    'I will be admired' communicates the result in natural English while preserving
    the positive evaluative force.
