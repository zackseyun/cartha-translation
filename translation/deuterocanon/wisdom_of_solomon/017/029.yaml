id: WIS.17.29
reference: Wisdom of Solomon 17:29
source:
  edition: lxx-swete-1909
  text: ἀχαρίστου γὰρ ἐλπὶς ὡς χειμέριος πάχνη τακήσεται, καὶ ῥυήσεται ὡς ὕδωρ ἄχρηστον.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: For the hope of the ungrateful will melt like wintry frost, and will run off
    like useless water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the thankless.' The Greek adjective emphasizes lack of gratitude.
    reason: lexical_alternative
  - marker: b
    text: The image may suggest water that runs away and proves of no use because
      it does not remain.
    reason: cultural_note
lexical_decisions:
- source_word: ἀχαρίστου
  chosen: of the ungrateful
  alternatives:
  - of the thankless
  - of the unthankful
  lexicon: BDAG
  rationale: The genitive singular adjective denotes a person characterized by lack
    of gratitude. 'Ungrateful' is clear modern English and preserves the moral sense
    better than the slightly archaic 'unthankful.'
- source_word: ἐλπίς
  chosen: hope
  alternatives:
  - expectation
  lexicon: BDAG
  rationale: The standard sense here is 'hope.' 'Expectation' is possible but weaker
    and less idiomatic in this moral-poetic context.
- source_word: χειμέριος πάχνη
  chosen: wintry frost
  alternatives:
  - winter frost
  - hoarfrost of winter
  lexicon: LSJ
  rationale: The phrase evokes frost belonging to winter. 'Wintry frost' is natural
    English and preserves the image without over-literal stiffness.
- source_word: τακήσεται
  chosen: will melt
  alternatives:
  - will dissolve
  - will thaw away
  lexicon: BDAG
  rationale: The future passive/middle of τήκω conveys melting or dissolving. 'Will
    melt' is the most direct and vivid equivalent for the frost image.
- source_word: ῥυήσεται
  chosen: will run off
  alternatives:
  - will flow away
  - will stream away
  lexicon: LSJ
  rationale: The verb conveys flowing or running away. 'Run off' fits the simile of
    water disappearing and sounds natural in English.
- source_word: ὕδωρ ἄχρηστον
  chosen: useless water
  alternatives:
  - worthless water
  - water of no use
  lexicon: BDAG
  rationale: ἄχρηστος means useless or unserviceable. 'Useless water' keeps the terse
    moral-poetic force, though the exact nuance may suggest water that does not remain
    available for use.
