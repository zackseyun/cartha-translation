translation:
  text: And the tricks of magical art were laid low, and the boast of wisdom was disgracefully
    exposed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mockeries/deceptions of magical craft lay prostrate.' The Greek ἐμπαίγματα
      can suggest deceptive displays or mockeries, and κατέκειτο can be rendered more
      literally as 'lay low' or 'lay prostrate.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the humiliating refutation of the boast in understanding.' The Greek
      ἔλεγχος is a noun ('refutation,' 'exposure'), and φρόνησις may also be translated
      'understanding' or 'prudence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαγικῆς
  chosen: magical
  alternatives:
  - magic
  - sorcerous
  lexicon: LSJ
  rationale: Adjectival genitive modifying τέχνης; 'magical' keeps the connection
    to practiced magic without over-specifying as 'sorcery.'
- source_word: ἐμπαίγματα
  chosen: tricks
  alternatives:
  - mockeries
  - deceptions
  - illusory performances
  lexicon: LSJ
  rationale: In context of failed occult practice, the sense is not merely 'mockeries'
    but deceptive displays or tricks. 'Tricks' is idiomatic and fits the exposure
    of fraudulent magical practice.
- source_word: κατέκειτο
  chosen: were laid low
  alternatives:
  - lay prostrate
  - were overthrown
  - collapsed
  lexicon: LSJ
  rationale: Imperfect/passive-like sense from κατάκειμαι conveys being laid low or
    rendered helpless. 'Were laid low' preserves the image of defeat without awkward
    literalism.
- source_word: τέχνης
  chosen: art
  alternatives:
  - craft
  - practice
  lexicon: LSJ
  rationale: Refers to a practiced skill or craft. 'Art' in 'magical art' is natural
    English and preserves the notion of a cultivated technique.
- source_word: φρονήσει
  chosen: wisdom
  alternatives:
  - understanding
  - intelligence
  - prudence
  lexicon: LSJ
  rationale: Although φρόνησις can mean prudence or understanding, here it is the
    claimed intellectual superiority of the magicians. 'Wisdom' best matches the boastful
    claim in context.
- source_word: ἀλαζονίας
  chosen: boast
  alternatives:
  - arrogance
  - pretension
  - bragging
  lexicon: LSJ
  rationale: The noun denotes pretension or boastful arrogance. 'Boast' works well
    with the following genitive phrase in English and keeps the public, self-assertive
    sense.
- source_word: ἔλεγχος
  chosen: was exposed
  alternatives:
  - refutation
  - proof
  - conviction
  lexicon: LSJ
  rationale: The noun means exposure, refutation, or proof against. Rendering the
    clause verbally as 'was exposed' gives clear English while preserving the sense
    that their pretension was shown false.
- source_word: ἐφύβριστος
  chosen: disgracefully
  alternatives:
  - with insult
  - shamefully
  - in a humiliating way
  lexicon: LSJ
  rationale: The adjective carries the sense of being treated with outrage, insult,
    or humiliation. Adverbial English ('disgracefully exposed') captures the humiliating
    character of the exposure in idiomatic form.
