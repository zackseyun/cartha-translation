theological_decisions:
- issue: Nature of the condemnation of Egyptian occult practice
  chosen_reading: The verse depicts magical practice as fraudulent and humiliated,
    without importing later demonological categories.
  alternative_readings:
  - The verse could be rendered more strongly as a denunciation of sorcery as such.
  rationale: The Greek focuses on the collapse and exposure of magical pretension.
    The translation preserves that judgment without adding theological claims not
    explicit in the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the text says without importing extra doctrinal claims.'
