theological_decisions:
- issue: Sense of εὐλάβεια in a negative context
  chosen_reading: fearfulness
  alternative_readings:
  - reverence
  - caution
  - timidity
  rationale: The immediate context concerns fear, disturbances, and inner sickness.
    Rendering εὐλάβεια as 'reverence' would import a positive religious sense that
    clashes with καταγέλαστον ('ridiculous, laughable'). The phrase is intentionally
    ironic and condemnatory, so a negative rendering is required.
  doctrine_reference: Translation philosophy §§1, 3, 6
