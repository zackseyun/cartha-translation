theological_decisions:
- issue: Devotional force of the verse's morning practice
  chosen_reading: The verse is rendered as a general obligation to thank God before
    sunrise and to petition him at daybreak.
  alternative_readings:
  - The verse could be read more narrowly as describing what was learned from the
    plague narrative rather than a timeless devotional norm.
  rationale: The Greek states what 'must' be done in a generalized way, but the translation
    avoids turning that into an explicit universal command beyond the text. It preserves
    the devotional practice without importing a formal doctrine of required prayer
    hours.
  doctrine_reference: Translation philosophy §§1, 3, 6
