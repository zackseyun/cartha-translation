translation:
  text: or a harsh crash of rocks being hurled down, or the unseen rush of leaping
    animals, or the voice of the roaring of most savage beasts, or an echo thrown
    back from the hollow of the mountains, paralyzed them with fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'falling rocks.' The Greek participle can be understood more passively,
      though the wording also allows the stronger sense 'being hurled down.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the unseen running/course of leaping animals.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'an echo thrown back from the hollow of the mountains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κτύπος
  chosen: crash
  alternatives:
  - sound
  - noise
  - din
  lexicon: LSJ
  rationale: The term denotes a striking sound or crash. In context of falling rocks,
    'crash' best conveys the sudden violent noise in natural English.
- source_word: ἀπηνὴς
  chosen: harsh
  alternatives:
  - fierce
  - cruel
  - rough
  lexicon: LSJ
  rationale: Used adjectivally of the sound, it describes its severe, brutal quality.
    'Harsh' fits an auditory context better than 'cruel' or 'fierce'.
- source_word: καταρριπτομένων πετρῶν
  chosen: rocks being hurled down
  alternatives:
  - stones being cast down
  - falling rocks
  lexicon: LSJ
  rationale: The participle suggests forceful downward motion, not merely passive
    falling. 'Rocks being hurled down' preserves that violence while remaining idiomatic.
- source_word: σκιρτώντων ζῴων δρόμος ἀθεώρητος
  chosen: the unseen rush of leaping animals
  alternatives:
  - the unseen running of skipping animals
  - the invisible course of bounding creatures
  lexicon: LSJ
  rationale: δρόμος is literally 'running' or 'course,' but here refers to the movement/noise
    of animals. 'Rush' captures the sudden movement naturally. ἀθεώρητος means not
    seen, hence 'unseen.' σκιρτώντων suggests springing or leaping motion.
- source_word: ὠρυομένων
  chosen: the roaring
  alternatives:
  - the howling
  - the bellowing
  lexicon: LSJ
  rationale: The verb commonly denotes loud animal cries. 'Roaring' best suits wild
    beasts in this context.
- source_word: ἀπηνεστάτων θηρίων
  chosen: most savage beasts
  alternatives:
  - most fierce wild animals
  - very cruel beasts
  lexicon: LSJ
  rationale: Superlative of a term for harshness/savagery. 'Most savage beasts' is
    vivid and natural, preserving the superlative force.
- source_word: ἀντανακλωμένη
  chosen: thrown back
  alternatives:
  - reflected
  - echoed back
  lexicon: LSJ
  rationale: The participle describes sound rebounding. 'Thrown back' keeps the concrete
    imagery and works well with 'echo'.
- source_word: ἐκ κοιλότητος ὀρέων
  chosen: from the hollow of the mountains
  alternatives:
  - from a mountain hollow
  - from the caverns of the mountains
  lexicon: LSJ
  rationale: κοιλότης is hollowness or cavity. 'The hollow of the mountains' preserves
    the singular abstract noun while sounding natural in English.
- source_word: παρέλυεν αὐτοὺς ἐκφοβοῦντα
  chosen: paralyzed them with fear
  alternatives:
  - was paralyzing them while terrifying them
  - disabled them by frightening them
  lexicon: LSJ
  rationale: παρέλυεν conveys disabling or paralyzing. The participle ἐκφοβοῦντα expresses
    the manner/cause, namely intense fright. 'Paralyzed them with fear' gives the
    sense clearly in idiomatic English.
