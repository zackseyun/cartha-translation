theological_decisions:
- issue: Whether to render ψυχαὶ literally or as a more idiomatic collective such
    as 'people' or 'persons'
  chosen_reading: souls
  alternative_readings:
  - persons
  - people
  rationale: The Greek text explicitly says 'souls,' and the translation philosophy
    favors preserving significant lexical and theological texture where readable modern
    English allows it. Here 'souls' is natural enough and retains the moral-spiritual
    emphasis of the passage.
