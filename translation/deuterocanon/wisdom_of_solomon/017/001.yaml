translation:
  text: For your judgments are great and hard to describe; therefore undisciplined
    souls went astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'indescribable,' 'hard to explain,' or 'beyond recounting' for 'hard
      to describe.'
    reason: lexical_alternative
  - marker: b
    text: Or 'untaught' or 'uninstructed' for 'undisciplined.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'souls'; alternatively, 'persons' if rendered more idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μεγάλαι
  chosen: great
  alternatives:
  - mighty
  - weighty
  lexicon: LSJ
  rationale: Predicate adjective describing the magnitude of God's judgments. 'Great'
    is the most natural and sufficiently broad English equivalent.
- source_word: κρίσεις
  chosen: judgments
  alternatives:
  - judicial acts
  - decisions
  lexicon: LSJ
  rationale: In biblical Greek this commonly refers to acts or expressions of judgment.
    'Judgments' preserves the theological and judicial sense without over-specifying.
- source_word: δυσδιήγητοι
  chosen: hard to describe
  alternatives:
  - indescribable
  - hard to explain
  - beyond recounting
  lexicon: LSJ
  rationale: The compound suggests difficulty in narrating or explaining fully. 'Hard
    to describe' preserves the sense of being difficult to set forth, without implying
    absolute ineffability as strongly as 'indescribable' might.
- source_word: ἀπαίδευτοι
  chosen: undisciplined
  alternatives:
  - untrained
  - untaught
  - uninstructed
  lexicon: LSJ
  rationale: The term denotes lack of formation, instruction, or discipline. 'Undisciplined'
    fits the moral-intellectual context of Wisdom better than merely 'untaught,' which
    could sound purely informational.
- source_word: ψυχαὶ
  chosen: souls
  alternatives:
  - persons
  - lives
  lexicon: LSJ
  rationale: The Greek explicitly uses 'souls.' Retaining 'souls' preserves the text's
    anthropological wording and gravity better than flattening it to 'persons'.
- source_word: ἐπλανήθησαν
  chosen: went astray
  alternatives:
  - were led astray
  - wandered
  - were deceived
  lexicon: LSJ
  rationale: The passive can denote being caused to wander or simply ending up in
    error. 'Went astray' is idiomatic English that preserves the result without overcommitting
    to an external agent in this clause.
- source_word: διὰ τοῦτο
  chosen: therefore
  alternatives:
  - for this reason
  - because of this
  lexicon: LSJ
  rationale: Marks inference from the preceding statement. 'Therefore' is concise
    and natural in English.
