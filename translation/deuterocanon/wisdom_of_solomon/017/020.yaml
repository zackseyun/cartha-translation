theological_decisions:
- issue: Scope of κόσμος in the plague-darkness contrast
  chosen_reading: Rendered as 'the whole world' to express the rest of creation outside
    the afflicted region, without making a cosmological claim beyond the narrative
    contrast.
  alternative_readings:
  - the whole universe
  - all creation
  rationale: The verse contrasts universal light and normal activity with the darkness
    imposed on the wicked. 'World' preserves the literary contrast without overstating
    the term.
