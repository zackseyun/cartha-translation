translation:
  text: For fear is nothing but the betrayal of the helps that come from reason.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the betrayal of the aids derived from reasoning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φόβος
  chosen: fear
  alternatives:
  - dread
  - terror
  lexicon: LSJ
  rationale: The basic sense is the emotional state of fear. 'Fear' is broad and natural
    English; 'terror' would over-intensify the statement beyond the Greek.
- source_word: οὐθὲν ... εἰ μὴ
  chosen: nothing but
  alternatives:
  - nothing except
  - only
  lexicon: LSJ
  rationale: 'This idiom defines fear by exclusion: it is ''nothing but'' or ''nothing
    except'' betrayal. ''Nothing but'' is idiomatic and preserves the explanatory
    force.'
- source_word: προδοσία
  chosen: betrayal
  alternatives:
  - treachery
  - surrender
  - giving up
  lexicon: LSJ
  rationale: The noun denotes betrayal or treacherous abandonment. 'Betrayal' best
    captures the metaphor that fear turns against one's own inner resources. 'Treachery'
    is possible but sounds more moralized and archaic in English.
- source_word: βοηθημάτων
  chosen: helps
  alternatives:
  - supports
  - aids
  - means of help
  lexicon: LSJ
  rationale: The plural refers to resources or aids available for assistance. 'Helps'
    is concise and preserves the plural concrete sense; 'supports' is smoother but
    slightly more interpretive.
- source_word: τῶν ἀπὸ λογισμοῦ
  chosen: that come from reason
  alternatives:
  - derived from reasoning
  - from rational thought
  - from calculation
  lexicon: LSJ
  rationale: 'λόγισμος here refers to reasoning, rational reflection, or considered
    thought. The phrase modifies βοηθημάτων: the helps are those arising from reason.
    ''That come from reason'' is readable modern English while keeping the causal/source
    nuance of ἀπό.'
