theological_decisions:
- issue: Whether to smooth the paradox of an 'unseen appearance' into a more interpretive
    phrase
  chosen_reading: Retain the paradox in the main text as 'that unseen appearance'
  alternative_readings:
  - that invisible apparition
  - that sight which could not be seen
  rationale: The verse emphasizes psychological terror and distorted perception. Preserving
    the paradox reflects the Greek wording and avoids importing a more resolved explanation
    than the text itself gives.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: How to render αὐτομάτη in a supernatural context
  chosen_reading: self-kindled
  alternative_readings:
  - spontaneous
  - kindled of itself
  rationale: The context is eerie and extraordinary. 'Self-kindled' communicates both
    the literal sense and the uncanny force without paraphrasing beyond the Greek.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
