translation:
  text: Only a self-kindled fire, full of fear, appeared to them; and, being terrified
    by that unseen appearance, they considered the things they saw to be worse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spontaneous fire' or 'a fire kindled of itself.'
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'that unseen appearance,' a deliberately paradoxical expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεφαίνετο
  chosen: appeared
  alternatives:
  - was visible
  - showed itself
  - shone forth
  lexicon: LSJ
  rationale: Imperfect middle/passive conveys something becoming visible or appearing.
    'Appeared' is natural English and fits the ominous manifestation described.
- source_word: μόνον
  chosen: only
  alternatives:
  - alone
  - merely
  lexicon: LSJ
  rationale: 'Placed for emphasis: what appeared to them was nothing but this fire.
    ''Only'' preserves the restrictive force cleanly.'
- source_word: αὐτομάτη πυρά
  chosen: a self-kindled fire
  alternatives:
  - a spontaneous fire
  - a fire kindled of itself
  lexicon: LSJ
  rationale: αὐτομάτη means occurring of itself, spontaneous, self-acting. 'Self-kindled
    fire' preserves the uncanny sense better than the flatter 'spontaneous fire.'
- source_word: φόβου πλήρης
  chosen: full of fear
  alternatives:
  - full of terror
  - fearsome
  lexicon: LSJ
  rationale: The Greek literally says 'full of fear.' This may mean producing fear
    or characterized by fearfulness. Retaining the more literal wording preserves
    the text's psychological atmosphere without over-interpreting.
- source_word: ἐκδειματούμενοι
  chosen: being terrified
  alternatives:
  - being frightened out of their senses
  - being greatly alarmed
  lexicon: LSJ
  rationale: The participle denotes intense fright. 'Being terrified' is idiomatic,
    strong, and proportionate to the context.
- source_word: τῆς μὴ θεωρουμένης ἐκείνης ὄψεως
  chosen: by that unseen appearance
  alternatives:
  - by that apparition not being seen
  - by that invisible sight
  - by that unseen spectacle
  lexicon: LSJ
  rationale: 'The phrase is paradoxical: an ''appearance/sight'' that was not actually
    seen. ''Unseen appearance'' preserves the tension and strangeness of the Greek
    better than smoothing it away.'
- source_word: ἡγοῦντο
  chosen: they considered
  alternatives:
  - they thought
  - they regarded
  lexicon: LSJ
  rationale: A cognitive verb of reckoning or judging. 'Considered' is slightly more
    formal and suits the comparative judgment that follows.
- source_word: χείρω τὰ βλεπόμενα
  chosen: the things they saw to be worse
  alternatives:
  - what they saw as worse
  - the visible things worse
  lexicon: LSJ
  rationale: χείρω is comparative ('worse'), and τὰ βλεπόμενα means 'the things being
    seen' or 'what was visible.' The chosen rendering keeps both the comparative force
    and the contrast with the unseen appearance.
