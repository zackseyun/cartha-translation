translation:
  text: For what was not destroyed by fire simply melted when warmed by a brief ray
    of the sun,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'consumed' instead of 'destroyed'; the Greek can denote perishing under
      the action of fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: φθειρόμενον
  chosen: destroyed
  alternatives:
  - corrupted
  - consumed
  - ruined
  lexicon: LSJ
  rationale: In this physical context with fire, the participle refers to material
    perishing rather than moral corruption. 'Destroyed' is natural modern English
    and broad enough to cover the effect intended.
- source_word: ἁπλῶς
  chosen: simply
  alternatives:
  - altogether
  - plainly
  - directly
  lexicon: LSJ
  rationale: Here ἁπλῶς modifies the manner or straightforwardness of destruction
    by fire. 'Simply' captures the sense that fire alone did not directly destroy
    it.
- source_word: βραχείας
  chosen: brief
  alternatives:
  - small
  - slight
  - short-lived
  lexicon: LSJ
  rationale: With ἀκτῖνος ἡλίου, the adjective points to the slightness or short duration
    of the sun's ray. 'Brief' idiomatically conveys the minimal exposure in English.
- source_word: ἀκτῖνος ἡλίου
  chosen: ray of the sun
  alternatives:
  - sunbeam
  - beam of the sun
  lexicon: LSJ
  rationale: A literal rendering preserves the imagery while remaining readable. 'Ray
    of the sun' stays close to the Greek genitive construction.
- source_word: θερμαινόμενον
  chosen: warmed
  alternatives:
  - heated
  lexicon: LSJ
  rationale: The participle denotes being made warm by the sun's ray. 'Warmed' fits
    the contrast with fire and the surprising result that follows.
- source_word: ἐτήκετο
  chosen: melted
  alternatives:
  - was dissolved
  - was liquefied
  lexicon: LSJ
  rationale: 'The imperfect middle/passive here describes the ongoing result: it was
    melting. ''Melted'' is the clearest idiomatic English for the physical phenomenon
    in context.'
- source_word: τὸ ... μὴ φθειρόμενον
  chosen: what was not ... destroyed
  alternatives:
  - that which was not ... destroyed
  - what was not ... consumed
  lexicon: LSJ
  rationale: The neuter articular participle is best rendered idiomatically as 'what
    was not destroyed,' preserving the general reference without forcing an English
    noun.
