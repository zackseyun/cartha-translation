translation:
  text: Some were driven by terrifying apparitions, and others were paralyzed by the
    betrayal of their soul; for sudden and unexpected fear came upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'phantoms' or 'visions.' The Greek refers to frightening appearances,
      likely spectral or illusory.
    reason: lexical_alternative
  - marker: b
    text: Literally 'were paralyzed by the betrayal of the soul.' The phrase may mean
      an inward collapse in which their own inner self seemed to turn against them.
    reason: alternative_reading
lexical_decisions:
- source_word: τέρασιν
  chosen: monstrous
  alternatives:
  - portentous
  - terrifying
  - prodigious
  lexicon: LSJ
  rationale: From τέρας, literally 'monster' or 'portent.' In this context modifying
    φαντασμάτων, it describes the frightening, uncanny character of the apparitions
    rather than miraculous 'wonders.' 'Monstrous' preserves the vividness without
    implying divine signs.
- source_word: ἠλαύνοντο
  chosen: were driven
  alternatives:
  - were pursued
  - were harried
  - were chased
  lexicon: LSJ
  rationale: Passive/imperfect sense of being driven or hounded fits the image of
    people being forced along by fearsome visions. 'Were driven' is natural English
    and keeps the external pressure implied by the verb.
- source_word: φαντασμάτων
  chosen: apparitions
  alternatives:
  - phantoms
  - visions
  - ghostly appearances
  lexicon: LSJ
  rationale: The term denotes appearances or spectral manifestations. 'Apparitions'
    best conveys frightening, possibly unreal appearances without overcommitting to
    literal ghosts.
- source_word: παρελύοντο
  chosen: were paralyzed
  alternatives:
  - were undone
  - were weakened
  - were disabled
  lexicon: LSJ
  rationale: The verb means to loosen, disable, or paralyze. In context of inner collapse
    under fear, 'were paralyzed' captures both psychological and bodily incapacitation.
- source_word: προδοσίᾳ
  chosen: the betrayal
  alternatives:
  - treachery
  - sense of betrayal
  - abandonment
  lexicon: LSJ
  rationale: Literally 'betrayal' or 'treachery.' Here it is linked with τῆς ψυχῆς,
    yielding the difficult phrase 'betrayal of the soul.' This likely refers to the
    soul's own surrendering or betraying them from within under terror. Keeping 'betrayal'
    preserves the striking metaphor rather than flattening it to mere fear.
- source_word: τῆς ψυχῆς
  chosen: of their soul
  alternatives:
  - of the soul
  - of their inner self
  - of their life
  lexicon: LSJ
  rationale: ψυχή can mean soul, life, or inner self. Here the genitive with προδοσίᾳ
    points to inward collapse. 'Of their soul' keeps the anthropological language
    of the Greek, while 'their' is supplied from context for idiomatic English.
- source_word: αἰφνίδιος ... καὶ ἀπροσδόκητος φόβος
  chosen: sudden and unexpected fear
  alternatives:
  - fear, sudden and unforeseen
  - an abrupt and unlooked-for fear
  lexicon: LSJ
  rationale: The paired adjectives intensify the onset of fear. 'Sudden and unexpected
    fear' is straightforward modern English and preserves the double emphasis.
- source_word: ἐπῆλθεν
  chosen: came upon
  alternatives:
  - fell upon
  - overtook
  lexicon: LSJ
  rationale: A common idiom for something coming upon persons. 'Came upon' is clear
    and suitably formal.
