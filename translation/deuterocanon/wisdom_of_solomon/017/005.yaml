theological_decisions:
- issue: Poetic description of cosmic darkness in the plague context
  chosen_reading: Retain the verse's hyperbolic-cosmic imagery without reducing it
    to a mere weather description.
  alternative_readings:
  - Interpret as ordinary darkness where even firelight was ineffective
  - Interpret as primarily psychological terror rather than physical darkness
  rationale: The Greek presents both fire and starlight as unable to illuminate the
    night. The translation preserves this as the text's own portrayal of extraordinary
    darkness, without importing a more specific doctrinal explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
