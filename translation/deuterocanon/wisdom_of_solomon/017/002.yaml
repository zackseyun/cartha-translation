theological_decisions:
- issue: Rendering of προνοία in a Wisdom context
  chosen_reading: providence
  alternative_readings:
  - forethought
  rationale: In Wisdom of Solomon, πρόνοια commonly carries a theological sense of
    God's ordering care. 'Providence' preserves that conceptual weight better than
    the more generic 'forethought.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Gendered substantive ἄνομοι
  chosen_reading: lawless men
  alternative_readings:
  - the lawless
  rationale: The Greek is grammatically masculine plural used substantivally. Following
    the project's gender-accurate policy, the rendering keeps the masculine form rather
    than neutralizing it without note.
  doctrine_reference: Translation philosophy §4
