translation:
  text: For when lawless men supposed that they were oppressing a holy nation, they
    lay imprisoned by darkness and bound fast by a long night, shut in under their
    roofs, fugitives from eternal providence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lawless' for 'lawless men.' The Greek adjective is masculine plural
      used substantivally.
    reason: lexical_alternative
  - marker: b
    text: Or 'prisoners of darkness and fettered by a long night.'
    reason: lexical_alternative
  - marker: c
    text: '''Providence'' translates Greek πρόνοια, here likely referring to God''s
      enduring ordering care rather than mere foresight.'
    reason: cultural_note
lexical_decisions:
- source_word: ὑπειληφότες
  chosen: supposed
  alternatives:
  - assumed
  - imagined
  - thought
  lexicon: LSJ
  rationale: The participle indicates a mistaken or presumptive mental judgment. 'Supposed'
    preserves that sense of assumption without overinterpreting it as mere fantasy.
- source_word: καταδυναστεύειν
  chosen: oppressing
  alternatives:
  - dominating
  - tyrannizing over
  - exercising power over
  lexicon: LSJ
  rationale: The verb conveys harsh domination or abuse of power. 'Oppressing' captures
    the moral force and fits the Exodus-plague context better than the flatter 'dominating'.
- source_word: ἔθνος ἅγιον
  chosen: a holy nation
  alternatives:
  - a holy people
  lexicon: LSJ
  rationale: This phrase strongly echoes biblical covenant language. 'Holy nation'
    is the more literal rendering of ἔθνος and preserves the scriptural resonance.
- source_word: ἄνομοι
  chosen: lawless men
  alternatives:
  - the lawless
  - wicked men
  lexicon: LSJ
  rationale: The adjective functions substantivally. 'Lawless men' preserves both
    the moral characterization and the masculine grammatical form without implying
    only legal transgression in a narrow sense.
- source_word: δέσμιοι σκότους
  chosen: imprisoned by darkness
  alternatives:
  - prisoners of darkness
  - bound by darkness
  lexicon: LSJ
  rationale: δέσμιοι denotes captives or prisoners. Rendering it verbally as 'imprisoned
    by darkness' reads naturally in English while preserving the image of darkness
    as the imprisoning force.
- source_word: μακρᾶς πεδῆται νυκτός
  chosen: bound fast by a long night
  alternatives:
  - fettered by a long night
  - shackled by the long night
  lexicon: LSJ
  rationale: πεδῆται evokes fetters or bonds. 'Bound fast' is idiomatic modern English
    that retains the restraint imagery without sounding overly archaic.
- source_word: κατακλεισθέντες ὀρόφοις
  chosen: shut in under their roofs
  alternatives:
  - shut up in their houses
  - confined beneath their roofs
  lexicon: LSJ
  rationale: ὀρόφοις literally refers to roofs or covered spaces. 'Under their roofs'
    keeps the concrete image from the Greek rather than generalizing to 'houses,'
    while still making sense in English.
- source_word: φυγάδες
  chosen: fugitives
  alternatives:
  - runaways
  - exiles
  lexicon: LSJ
  rationale: 'The word denotes those in flight. ''Fugitives'' preserves the irony:
    though physically enclosed, they are portrayed as trying to flee from the divine
    order.'
- source_word: τῆς αἰωνίου προνοίας
  chosen: from eternal providence
  alternatives:
  - from everlasting providence
  - from the eternal forethought
  lexicon: LSJ
  rationale: πρόνοια here refers to divine providential governance, not merely human
    foresight. 'Eternal providence' is concise, natural, and theologically appropriate
    in Wisdom's idiom.
- source_word: ἔκειντο
  chosen: they lay
  alternatives:
  - they were lying
  - they remained
  lexicon: LSJ
  rationale: The imperfect/middle sense is stative. 'They lay' gives the scene vividly
    and naturally in English.
