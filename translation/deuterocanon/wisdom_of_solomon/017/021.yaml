theological_decisions:
- issue: Nature of the 'future darkness'
  chosen_reading: The verse alludes to a coming judgment symbolized by the present
    darkness, without specifying a developed doctrine beyond the text.
  alternative_readings:
  - A purely psychological darkness of fear
  - An eschatological or postmortem punitive darkness
  rationale: The phrase 'an image of the darkness that was about to receive them'
    suggests the present plague foreshadows a greater judgment. The translation preserves
    that typological force without over-defining whether the author means historical,
    eschatological, or postmortem punishment.
  doctrine_reference: Preserve theological tension rather than resolve it.
