translation:
  text: But upon those alone heavy night was laid, an image of the darkness that was
    about to receive them; yet they were heavier to themselves than darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were more burdensome to themselves than the darkness.' The Greek
      keeps the same 'heavy' imagery in both clauses.
    reason: lexical_alternative
  - marker: b
    text: The 'darkness that was about to receive them' likely points beyond the immediate
      plague to a greater judgment, though the text does not define it more precisely.
    reason: alternative_reading
lexical_decisions:
- source_word: μόνοις δὲ ἐκείνοις
  chosen: upon those alone
  alternatives:
  - for those alone
  - on those alone
  lexicon: LSJ
  rationale: 'μόνοις with ἐκείνοις emphasizes exclusivity: the plague-like condition
    applies only to that group. ''Upon those alone'' fits the following passive-like
    verb and preserves the sense of something imposed on them.'
- source_word: ἐπέτατο
  chosen: was laid
  alternatives:
  - was spread over
  - was imposed
  - was stretched over
  lexicon: LSJ
  rationale: The verb conveys something extended or imposed over them. 'Was laid'
    is idiomatic in English for darkness/night descending, while preserving the passive
    sense without over-paraphrasing.
- source_word: βαρεῖα νύξ
  chosen: heavy night
  alternatives:
  - oppressive night
  - grievous night
  lexicon: LSJ
  rationale: βαρεῖα is literally 'heavy' and here metaphorically conveys oppressive
    weight. Retaining 'heavy' preserves the image and allows the later comparative
    βαρύτεροι to echo it.
- source_word: εἰκὼν
  chosen: an image
  alternatives:
  - a likeness
  - a representation
  lexicon: LSJ
  rationale: εἰκών is straightforwardly 'image' or 'likeness.' 'Image' is concise
    and preserves the figurative relation between the present night and the future
    darkness.
- source_word: τοῦ μέλλοντος αὐτοὺς διαδέχεσθαι σκότους
  chosen: of the darkness that was about to receive them
  alternatives:
  - of the darkness that was about to succeed them
  - of the darkness that was about to take them in
  lexicon: LSJ
  rationale: μέλλοντος marks imminence ('about to'). διαδέχεσθαι can mean receive
    in succession or take over. Here the future eschatological darkness is pictured
    as receiving them after the present plague; 'receive them' is natural English
    and preserves the ominous transition.
- source_word: ἑαυτοῖς δὲ ἦσαν βαρύτεροι σκότους
  chosen: yet they were heavier to themselves than darkness
  alternatives:
  - but to themselves they were more burdensome than darkness
  - they were to themselves worse than darkness
  lexicon: LSJ
  rationale: The comparative βαρύτεροι deliberately echoes βαρεῖα. The dative ἑαυτοῖς
    is best kept as 'to themselves,' expressing that their own inner terror or guilt
    was more oppressive to them than the external darkness. 'Heavier' preserves the
    lexical link, though the idiom is slightly stark.
