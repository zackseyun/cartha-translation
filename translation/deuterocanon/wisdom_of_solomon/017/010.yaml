translation:
  text: They were being destroyed, trembling, and refusing even to look at the air
    from which there was nowhere to flee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they were perishing in terror.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διώλλυντο
  chosen: were being destroyed
  alternatives:
  - were perishing
  - were being ruined
  lexicon: LSJ
  rationale: Imperfect middle/passive conveys an ongoing state of perishing or being
    undone. 'Were being destroyed' preserves the force and gravity better than the
    softer 'were perishing,' while leaving the agent implicit as in the Greek.
- source_word: ἔντρομοι
  chosen: trembling
  alternatives:
  - terrified
  - in terror
  lexicon: LSJ
  rationale: The adjective denotes being trembling or terrified. 'Trembling' keeps
    the vivid bodily image and works naturally in English with the participial flow
    of the sentence.
- source_word: μηδαμόθεν
  chosen: from which there was nowhere to flee
  alternatives:
  - from nowhere
  - from no side
  lexicon: LSJ
  rationale: With φευκτόν, the sense is that the air offered no avenue of escape from
    any direction. English requires some expansion to make the idiom intelligible;
    this preserves the idea that escape was impossible.
- source_word: φευκτόν
  chosen: to flee
  alternatives:
  - escapable
  - to be escaped
  lexicon: LSJ
  rationale: The verbal adjective means 'to be fled/escaped.' In idiomatic English,
    rendering the phrase with an infinitive ('to flee') communicates the practical
    sense of inescapability.
- source_word: ἀέρα
  chosen: the air
  alternatives:
  - the atmosphere
  - the breeze
  lexicon: LSJ
  rationale: 'The ordinary sense here is ''air.'' ''Atmosphere'' is too technical
    and ''breeze'' too specific. The phrase is intentionally striking: even the surrounding
    air became unbearable to behold.'
- source_word: προσιδεῖν
  chosen: to look at
  alternatives:
  - to behold
  - to face
  lexicon: LSJ
  rationale: The verb means to look toward or behold. 'Look at' is plain modern English;
    'face' would be more interpretive.
- source_word: ἀρνούμενοι
  chosen: refusing even
  alternatives:
  - denying
  - shrinking from
  lexicon: LSJ
  rationale: 'The participle indicates refusal. Adding ''even'' reflects the extremity
    implied by the construction: they would not so much as look at the air.'
