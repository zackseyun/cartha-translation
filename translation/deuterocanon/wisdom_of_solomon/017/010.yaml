theological_decisions:
- issue: Nature of the destruction described
  chosen_reading: Experiential and ongoing destruction under divine judgment, without
    specifying a direct agent in the English text.
  alternative_readings:
  - Simple psychological collapse
  - Explicit divine destruction
  rationale: The Greek passive/middle leaves the agent unstated in this clause. Given
    the broader context of judgment, divine agency is implicit, but the verse itself
    does not name the agent. The translation preserves that tension rather than making
    the statement more explicit than the source.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
