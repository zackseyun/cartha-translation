theological_decisions:
- issue: Representative force of ἄνθρωπον
  chosen_reading: man
  alternative_readings:
  - humanity
  - a person
  rationale: The singular noun has generic force, but the project's policy prefers
    gender-accurate rendering where the source uses masculine representative language.
    'Man' preserves the wording while remaining intelligible in context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering πιστεύοντας with personal-reliance nuance
  chosen_reading: those who trust in you
  alternative_readings:
  - those who believe you
  - those who have faith in you
  rationale: Although πίστις defaults to 'faith' in contested-term policy, this verse
    uses the verb πιστεύω with dative pronoun, where 'trust in you' better expresses
    the relational dependence implied by the context of divine preservation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5; Contested terms table
    for πίστις
