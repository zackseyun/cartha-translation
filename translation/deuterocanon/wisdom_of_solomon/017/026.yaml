id: WIS.17.26
reference: Wisdom of Solomon 17:26
source:
  edition: lxx-swete-1909
  text: ἵνα μάθωσιν οἱ υἱοί σου, οὓς ἠγάπησας, Κύριε, ὅτι οὐχ αἱ γενέσεις τῶν καρπῶν
    τρέφουσιν ἄνθρωπον, ἀλλὰ τὸ ῥῆμά σου τοὺς σοὶ πιστεύοντας διατηρεῖ.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: so that your children, whom you loved, might learn, O Lord, that it is not
    the produce of crops that nourishes man, but your word preserves those who trust
    in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the yield of fruits' or 'the products of crops'; the Greek phrase refers
      to agricultural produce rather than literal 'generations.'
    reason: lexical_alternative
  - marker: b
    text: '''Man'' here has representative force, referring to human beings generally.'
    reason: lexical_alternative
  - marker: c
    text: Or 'those who believe you' or 'those who have faith in you.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα μάθωσιν
  chosen: so that ... might learn
  alternatives:
  - that ... may learn
  - in order that ... might know
  lexicon: LSJ
  rationale: ἵνα with subjunctive expresses purpose. 'Might learn' preserves the purposive
    nuance in natural English.
- source_word: οἱ υἱοί σου
  chosen: your sons
  alternatives:
  - your children
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural 'sons.' Per gender-accurate
    policy, the masculine form is retained rather than neutralized to 'children.'
- source_word: οὓς ἠγάπησας
  chosen: whom you loved
  alternatives:
  - whom you have loved
  - whom you cherished
  lexicon: LSJ
  rationale: Aorist ἠγάπησας is most straightforwardly rendered as simple past. 'Loved'
    also preserves the lexical connection to ἀγάπη-family language.
- source_word: Κύριε
  chosen: O Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Vocative address is explicit; 'O Lord' naturally marks direct address
    in elevated but readable English. This also follows the default rendering of κύριος
    as 'Lord.'
- source_word: οὐχ αἱ γενέσεις τῶν καρπῶν
  chosen: it is not the produce of crops
  alternatives:
  - it is not the generations of fruits
  - it is not the products of fruits
  - it is not the yield of produce
  lexicon: LSJ
  rationale: γενέσεις here refers to products/growths/yields rather than 'generations'
    in a genealogical sense. καρπῶν in this context points to agricultural produce.
    'Produce of crops' communicates the agricultural sense clearly without wooden
    literalism.
- source_word: τρέφουσιν ἄνθρωπον
  chosen: nourishes man
  alternatives:
  - feeds a man
  - sustains humanity
  lexicon: LSJ
  rationale: τρέφω means nourish/feed. Singular ἄνθρωπον is retained as 'man' under
    the project's gender-accurate policy, with representative force for humanity.
- source_word: ἀλλὰ τὸ ῥῆμά σου
  chosen: but your word
  alternatives:
  - but your utterance
  - but your decree
  lexicon: LSJ
  rationale: ῥῆμα commonly denotes spoken word/utterance. 'Word' is the most natural
    and theologically resonant rendering here, especially in the allusive context
    of divine sustenance.
- source_word: τοὺς σοὶ πιστεύοντας
  chosen: those who trust in you
  alternatives:
  - those who believe you
  - those who have faith in you
  lexicon: LSJ
  rationale: πιστεύω with dative σοὶ can mean trust/believe in relation to a person.
    'Trust in you' best captures personal reliance in idiomatic English.
- source_word: διατηρεῖ
  chosen: preserves
  alternatives:
  - keeps alive
  - maintains
  - sustains
  lexicon: LSJ
  rationale: διατηρέω means preserve/keep safe/maintain. 'Preserves' fits the contrast
    with ordinary food and highlights divine sustaining power.
