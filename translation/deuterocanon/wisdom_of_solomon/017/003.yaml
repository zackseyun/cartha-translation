translation:
  text: For while they thought to remain hidden in their secret sins, they were scattered
    under the dark veil of forgetfulness, terribly aghast and shaken by apparitions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'phantoms' or 'specters' for 'apparitions.' The Greek term can denote
      an image-like or ghostly appearance.
    reason: lexical_alternative
lexical_decisions:
- source_word: λανθάνειν
  chosen: to remain hidden
  alternatives:
  - to escape notice
  - to be concealed
  lexicon: LSJ
  rationale: 'The infinitive with νομίζοντες expresses what they supposed about themselves:
    that they were unnoticed/hidden. ''Remain hidden'' reads naturally in English
    while preserving the sense of concealment.'
- source_word: κρυφαίοις ἁμαρτήμασιν
  chosen: their secret sins
  alternatives:
  - hidden sins
  - secret offenses
  lexicon: LSJ
  rationale: κρυφαίοις means hidden or secret; ἁμαρτήμασιν is 'sins' or 'sinful acts.'
    'Secret sins' is concise and preserves the moral force better than the weaker
    'offenses.'
- source_word: ἀφεγγεῖ
  chosen: dark
  alternatives:
  - lightless
  - without brightness
  - gloomy
  lexicon: LSJ
  rationale: The adjective denotes absence of light. 'Dark' is idiomatic in English
    and fits the metaphorical setting; 'lightless' is more literal but less natural.
- source_word: λήθης
  chosen: forgetfulness
  alternatives:
  - oblivion
  - forgetting
  lexicon: LSJ
  rationale: λήθη can mean forgetfulness or oblivion. 'Forgetfulness' keeps the genitive
    relation with παρακαλύμματι clear and avoids importing a more metaphysical nuance
    than the text requires.
- source_word: παρακαλύμματι
  chosen: veil
  alternatives:
  - covering
  - cloak
  lexicon: LSJ
  rationale: The word denotes a covering or veil. 'Veil' preserves the imagery of
    being covered over, while 'cloak' could suggest an article of clothing rather
    than a figurative covering.
- source_word: ἐσκορπίσθησαν
  chosen: they were scattered
  alternatives:
  - they were dispersed
  - they were thrown into confusion
  lexicon: LSJ
  rationale: The passive of σκορπίζω normally means to scatter or disperse. In context
    it likely includes psychological disarray, but 'were scattered' keeps the core
    image and lets the following participles express the terror.
- source_word: θαμβούμενοι δεινῶς
  chosen: terribly aghast
  alternatives:
  - greatly astonished
  - severely terrified
  - utterly stunned
  lexicon: LSJ
  rationale: θαμβέω can denote being astounded or aghast; with δεινῶς the intensity
    is strong and fear-laden in context. 'Terribly aghast' captures both shock and
    dread.
- source_word: ἰνδάλμασιν
  chosen: apparitions
  alternatives:
  - phantoms
  - images
  - specters
  lexicon: LSJ
  rationale: ἴνδαλμα can mean image, phantom, or apparition. In this context of fearful
    disturbances, 'apparitions' best conveys frightening visionary forms without over-specifying
    ontology.
- source_word: ἐκταρασσόμενοι
  chosen: shaken
  alternatives:
  - thrown into turmoil
  - disturbed
  - terrified
  lexicon: LSJ
  rationale: The participle indicates being deeply disturbed or agitated. 'Shaken'
    is concise and idiomatic; the stronger emotional coloring is already supplied
    by the surrounding language.
