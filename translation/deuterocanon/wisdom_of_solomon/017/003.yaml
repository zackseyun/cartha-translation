theological_decisions:
- issue: Nature of the fearful phenomena in ἰνδάλμασιν
  chosen_reading: Render as 'apparitions' to preserve ambiguity between subjective
    visions and objective phantasmal appearances.
  alternative_readings:
  - phantoms
  - images
  - specters
  rationale: The verse depicts divine judgment through terror, but the Greek does
    not require a precise metaphysical claim about what these forms were. The translation
    preserves the text's ambiguity rather than resolving it.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it.
