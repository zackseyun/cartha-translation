translation:
  text: For if someone was a farmer, or a shepherd, or a worker at toils in the wilderness,
    once seized, he remained under the inescapable necessity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'once overtaken, he remained in unavoidable compulsion.' The Greek participle
      and noun can be rendered with either the imagery of being seized or of being
      overtaken by necessity.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ τε γὰρ
  chosen: For if
  alternatives:
  - For indeed if
  - And if
  lexicon: LSJ
  rationale: Introduces an explanatory conditional. 'For if' preserves the connective
    and conditional force in natural English.
- source_word: γεωργὸς
  chosen: farmer
  alternatives:
  - tiller of the soil
  - husbandman
  lexicon: LSJ
  rationale: '''Farmer'' is the clear modern equivalent for an agricultural laborer.'
- source_word: ποιμὴν
  chosen: shepherd
  alternatives:
  - herdsman
  lexicon: LSJ
  rationale: The standard gloss is 'shepherd'; it fits the pastoral setting and is
    more precise than 'herdsman' here.
- source_word: τῶν κατʼ ἐρημίαν ἐργάτης μόχθων
  chosen: a worker at toils in the wilderness
  alternatives:
  - a laborer in desert tasks
  - one who works at labors in lonely places
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic and literally denotes a worker of labors
    in the wilderness/desolate places. 'Worker at toils in the wilderness' preserves
    both the labor-intensive sense of μόχθων and the locative force of κατʼ ἐρημίαν
    without over-specifying the occupation.
- source_word: προλημφθεὶς
  chosen: once seized
  alternatives:
  - being overtaken
  - being caught beforehand
  lexicon: LSJ
  rationale: In context of sudden terror overtaking people, 'once seized' conveys
    the aorist passive participle as being suddenly taken hold of by the condition
    described.
- source_word: τὴν δυσάλυκτον ... ἀνάγκην
  chosen: the inescapable necessity
  alternatives:
  - the unavoidable compulsion
  - the inextricable constraint
  lexicon: LSJ
  rationale: δυσάλυκτος means hard to escape or unavoidable; ἀνάγκη is necessity/compulsion.
    'Inescapable necessity' is concise and preserves the oppressive force of the phrase.
- source_word: ἔμενεν
  chosen: he remained under
  alternatives:
  - he stayed in
  - he continued in
  lexicon: LSJ
  rationale: The imperfect indicates continued state. 'Remained under' makes explicit
    in English the sense of abiding under the compulsion.
