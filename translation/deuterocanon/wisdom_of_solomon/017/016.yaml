translation:
  text: Then, whoever it might have been there, when he fell down, was kept under
    guard, shut up in that prison without iron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the prison without iron'—an image of confinement without physical
      chains or bars.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶθʼ οὕτως
  chosen: Then
  alternatives:
  - And then
  - thereupon
  - so then
  lexicon: LSJ
  rationale: Marks narrative progression. A simple temporal-transition word in English
    best fits the flow without overloading the connective force.
- source_word: ὃς δὴ ποτʼ οὖν ἦν ἐκεῖ
  chosen: whoever it might have been there
  alternatives:
  - whoever was there
  - whatever person was there
  - whoever at all was there
  lexicon: LSJ
  rationale: 'The cluster δὴ ποτʼ οὖν intensifies indefiniteness: the point is not
    identity but that any person there, whoever he was, suffered the same fate. ''Whoever
    it might have been there'' preserves that rhetorical indefiniteness.'
- source_word: καταπίπτων
  chosen: when he fell down
  alternatives:
  - falling down
  - having fallen
  - collapsed
  lexicon: LSJ
  rationale: The participle is contemporaneous/circumstantial. 'When he fell down'
    gives natural English while preserving the concrete image of collapse rather than
    interpreting it more loosely as 'collapsed'.
- source_word: ἐφρουρεῖτο
  chosen: was kept under guard
  alternatives:
  - was guarded
  - was watched
  - was held in custody
  lexicon: LSJ
  rationale: The verb conveys being guarded or kept under watch. 'Was kept under guard'
    preserves the passive and the custodial nuance.
- source_word: εἰς τὴν ἀσίδηρον εἱρκτήν
  chosen: in that prison without iron
  alternatives:
  - into the ironless prison
  - in the prison without bars of iron
  - in the prison lacking iron
  lexicon: LSJ
  rationale: ἀσίδηρον literally means 'without iron.' In context the phrase describes
    confinement not by literal iron chains or bars but by darkness/fear. 'Prison without
    iron' keeps the striking metaphor close to the Greek while remaining readable.
- source_word: κατακλεισθείς
  chosen: shut up
  alternatives:
  - locked up
  - confined
  - shut in
  lexicon: LSJ
  rationale: The participle intensifies the imprisonment image. 'Shut up' is concise,
    idiomatic, and close to the Greek sense of being enclosed.
