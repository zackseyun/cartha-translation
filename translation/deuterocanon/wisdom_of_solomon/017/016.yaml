theological_decisions:
- issue: Gender of the indefinite subject
  chosen_reading: he
  alternative_readings:
  - they
  - the person
  rationale: The Greek uses a grammatically masculine singular indefinite expression.
    Per doctrine, gender-accurate rendering is preferred over flattening to a plural
    or neutral paraphrase. Here 'he' reflects the source's singular masculine form
    without making a broader doctrinal claim about gender.
