theological_decisions:
- issue: Historical-theological irony in Egypt's reversal toward Israel
  chosen_reading: Render the contrast plainly without importing Exodus details beyond
    the Greek text.
  alternative_readings:
  - Expand the line to make explicit that Egypt first begged Israel to depart after
    the plagues and then pursued them at the sea.
  rationale: The verse itself encodes the irony through ἱκετεύοντες ... ἐξέβαλον and
    ὡς φυγάδας ἐδίωκον. The translation preserves that reversal while avoiding explanatory
    additions not stated in the verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
