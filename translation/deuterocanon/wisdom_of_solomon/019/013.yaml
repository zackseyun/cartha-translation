translation:
  text: And punishments came upon the sinners, not without the evidence of the things
    that had happened in the violence of the thunderbolts; for they justly suffered
    for their own wicked deeds, for they practiced an even harsher hatred of strangers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not without proofs from the events, in the force of the thunderbolts.'
      The Greek syntax is compressed, and the phrase may be taken slightly differently
      while keeping the same overall sense.
    reason: lexical_alternative
  - marker: b
    text: '''Hatred of strangers'' may also be rendered ''inhospitality,'' but the
      Greek term can imply active hostility toward foreigners or guests, not merely
      failure to welcome them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τιμωρίαι
  chosen: punishments
  alternatives:
  - vengeances
  - penalties
  lexicon: LSJ
  rationale: The noun denotes punitive acts or penalties inflicted in response to
    wrongdoing. 'Punishments' is clear modern English and fits the context of divine
    retribution without overpersonalizing it as 'vengeances'.
- source_word: ἁμαρτωλοῖς
  chosen: the sinners
  alternatives:
  - the sinful
  - wrongdoers
  lexicon: LSJ
  rationale: A substantival adjective referring to those characterized by sin. 'The
    sinners' is the most direct rendering and preserves the moral category in the
    Greek.
- source_word: οὐκ ἄνευ τῶν γεγονότων τεκμηρίων
  chosen: not without the evidence of what had happened
  alternatives:
  - not without proofs from the events
  - not without evidence from what had occurred
  lexicon: LSJ
  rationale: τεκμήρια are evidences or proofs; γεγονότων points to prior events. The
    phrase means the punishments were accompanied by evidentiary signs from preceding
    occurrences. The chosen rendering is idiomatic while retaining the forensic sense.
- source_word: τῇ βίᾳ τῶν κεραυνῶν
  chosen: in the violence of the thunderbolts
  alternatives:
  - by the force of the thunderbolts
  - through the violence of the lightning bolts
  lexicon: LSJ
  rationale: βία denotes force or violence; κεραυνοί are thunderbolts/lightning bolts.
    'In the violence of the thunderbolts' closely follows the dative construction
    and preserves the vivid destructive imagery.
- source_word: δικαίως
  chosen: justly
  alternatives:
  - rightly
  - deservedly
  lexicon: LSJ
  rationale: The adverb marks the moral propriety of the suffering. 'Justly' best
    conveys the judicial and ethical force.
- source_word: ἔπασχον
  chosen: they suffered
  alternatives:
  - they were afflicted
  - they endured
  lexicon: LSJ
  rationale: A common verb for undergoing suffering. 'They suffered' is straightforward
    and natural in context.
- source_word: ταῖς ἰδίαις αὐτῶν πονηρίαις
  chosen: for their own wicked acts
  alternatives:
  - because of their own evils
  - for their own wickednesses
  lexicon: LSJ
  rationale: πονῃρίαι can denote acts or manifestations of wickedness, not merely
    an abstract quality. 'Wicked acts' makes the plural concrete in English while
    preserving the causal sense.
- source_word: χαλεπωτέραν
  chosen: more grievous
  alternatives:
  - harsher
  - more severe
  lexicon: LSJ
  rationale: Comparative of χαλεπός, expressing something more harsh or severe. 'More
    grievous' fits the elevated tone and moral seriousness of the passage.
- source_word: μισοξενίαν
  chosen: hatred of strangers
  alternatives:
  - inhospitality
  - hatred of foreigners
  lexicon: LSJ
  rationale: The term is stronger than mere failure of hospitality; it denotes hostility
    toward guests/strangers. 'Hatred of strangers' preserves that severity better
    than the softer 'inhospitality'.
- source_word: ἐπετήδευσαν
  chosen: they practiced
  alternatives:
  - they pursued
  - they cultivated
  lexicon: LSJ
  rationale: The verb can mean to pursue as a practice or make a habit of. 'They practiced'
    communicates sustained conduct rather than a single act.
