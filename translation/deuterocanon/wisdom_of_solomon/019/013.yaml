theological_decisions:
- issue: Moral characterization of μισοξενία
  chosen_reading: Rendered as 'hatred of strangers' rather than the milder 'inhospitality.'
  alternative_readings:
  - inhospitality
  - hostility to guests
  rationale: The immediate context emphasizes the justice of severe punishments, and
    the comparative χαλεπωτέραν suggests an aggravated vice. A stronger rendering
    better reflects the Greek moral charge without adding doctrine.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Causal force of ταῖς ἰδίαις αὐτῶν πονηρίαις
  chosen_reading: Expressed as 'for their own wicked acts.'
  alternative_readings:
  - by their own wickednesses
  - because of their own evils
  rationale: This preserves the idea that their suffering was deserved on account
    of their own deeds, matching the judicial tone of δικαίως ἔπασχον.
  doctrine_reference: Translation philosophy §§1, 5
