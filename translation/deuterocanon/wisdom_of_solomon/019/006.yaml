theological_decisions:
- issue: Sense of ἄνωθεν in the description of creation's renewal
  chosen_reading: 'Rendered as ''from above'' in the main text: ''was formed anew
    from above.'''
  alternative_readings:
  - from the beginning
  - afresh
  rationale: The verse depicts creation being reordered under divine command for the
    protection of God's people. 'From above' fits that theological frame and preserves
    the possible vertical/divine nuance of ἄνωθεν. Because the adverb can also mean
    'from the beginning,' the alternative is preserved in a footnote rather than excluded.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (preserve theological
    tension rather than resolve it)
