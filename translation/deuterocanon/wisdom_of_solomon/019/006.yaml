translation:
  text: For the whole creation, in its own nature, was formed anew from the beginning,
    serving your commands, so that your children might be kept unharmed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was refashioned anew from the beginning.' The Greek ἄνωθεν can mean
      'from above' or 'from the beginning,' and διετυποῦτο can suggest being reshaped
      or refashioned.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅλη
  chosen: the whole
  alternatives:
  - all
  lexicon: LSJ
  rationale: With ἡ κτίσις as a singular collective, 'the whole creation' is more
    natural English than 'all creation' while preserving the comprehensive scope.
- source_word: κτίσις
  chosen: creation
  alternatives:
  - created order
  - creature
  lexicon: LSJ
  rationale: Here the term refers to the created order as a whole, not an individual
    creature. 'Creation' best fits the cosmic scope of the verse.
- source_word: ἐν ἰδίῳ γένει
  chosen: in its own kind
  alternatives:
  - in its own nature
  - within its own class
  lexicon: LSJ
  rationale: γένει here denotes kind or class. 'In its own kind' preserves the categorical
    sense and echoes creation-language without overinterpreting philosophically as
    'nature'.
- source_word: πάλιν ἄνωθεν
  chosen: anew from above
  alternatives:
  - again from the beginning
  - afresh from above
  lexicon: LSJ
  rationale: πάλιν indicates renewed action, and ἄνωθεν can mean 'from above' or 'from
    the beginning.' In this context of cosmic re-ordering under divine direction,
    'anew from above' preserves both the sense of renewal and the likely implication
    of divine origin. The alternative is worth preserving in a footnote because ἄνωθεν
    is semantically flexible.
- source_word: διετυποῦτο
  chosen: was formed
  alternatives:
  - was refashioned
  - was reconfigured
  lexicon: LSJ
  rationale: The imperfect passive suggests an ongoing process of being shaped or
    patterned. 'Was formed' is readable and faithful; 'refashioned' is possible, but
    the adverbial phrase already conveys renewal.
- source_word: ὑπηρετοῦσα
  chosen: serving
  alternatives:
  - ministering to
  - being subject to
  lexicon: LSJ
  rationale: The participle describes creation acting in service to divine directives.
    'Serving' is direct and idiomatic without importing liturgical overtones.
- source_word: ταῖς ἰδίαις ἐπιταγαῖς
  chosen: your own commands
  alternatives:
  - its appointed commands
  - your decrees
  - your directives
  lexicon: LSJ
  rationale: 'In context the possessive most naturally addresses God: creation serves
    ''your'' commands. ἐπιταγαί are authoritative orders; ''commands'' is clear and
    sufficiently strong. The repeated ἰδίαις is represented by ''own''.'
- source_word: οἱ σοὶ παῖδες
  chosen: your children
  alternatives:
  - your sons
  - your servants
  lexicon: LSJ
  rationale: παῖδες can mean children or sons/servants depending on context. Here
    it refers to God's people under his care; 'children' best conveys filial relationship
    without unnecessarily narrowing by gender.
- source_word: φυλαχθῶσιν ἀβλαβεῖς
  chosen: might be kept unharmed
  alternatives:
  - might be preserved safe
  - might be guarded uninjured
  lexicon: LSJ
  rationale: 'The passive subjunctive with ἵνα expresses purpose: that they be preserved
    from harm. ''Kept unharmed'' is concise and natural while retaining the protective
    sense.'
