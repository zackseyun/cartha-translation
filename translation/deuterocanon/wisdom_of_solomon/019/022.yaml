theological_decisions:
- issue: κύριε address
  chosen_reading: Lord
  alternative_readings:
  - O Lord
  rationale: κύριε is a direct address to God. Per doctrine, κύριος defaults to 'Lord.'
    The vocative particle 'O' is not required by the Greek and is omitted for readable
    modern English while retaining reverence.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord; Translation philosophy
    §6'
- issue: Implicit object with παριστάμενος
  chosen_reading: standing by them
  alternative_readings:
  - standing by
  - being present
  rationale: The participle lacks an explicit object, but the context clearly refers
    to God's presence on behalf of 'your people.' Supplying 'them' in English makes
    the sense clear without adding a new theological claim.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
