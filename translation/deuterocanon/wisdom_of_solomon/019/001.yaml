theological_decisions:
- issue: Referent of the subject implied in προῄδει
  chosen_reading: Rendered as 'he knew beforehand,' leaving the antecedent implicit
    but most naturally referring to God from the surrounding context.
  alternative_readings:
  - Rendered explicitly as 'God knew beforehand'
  rationale: The Greek does not state the subject explicitly in this clause. English
    requires a subject, so 'he' preserves the textual economy and avoids adding a
    noun not present in the verse, while still allowing the contextual referent to
    be understood.
  doctrine_reference: Preserve theological tension rather than resolve it.
