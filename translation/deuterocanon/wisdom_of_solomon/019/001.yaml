translation:
  text: But for the ungodly, merciless wrath came upon them to the very end; for he
    knew beforehand both them and what was going to happen,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the impious' for 'the ungodly.'
    reason: lexical_alternative
  - marker: b
    text: The subject of 'knew beforehand' is implicit in Greek; context most naturally
      points to God.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσεβέσιν
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: BDAG
  rationale: ἀσεβής denotes those characterized by irreverence or impiety toward God.
    'Ungodly' is idiomatic, preserves the religious-moral force, and fits Wisdom's
    contrastive style better than the more generic 'wicked'.
- source_word: μέχρι τέλους
  chosen: to the very end
  alternatives:
  - until the end
  - completely
  lexicon: LSJ
  rationale: The phrase is temporal and emphatic. 'To the very end' preserves both
    the temporal sense and the rhetorical force better than a flatter 'until the end.'
- source_word: ἀνελεήμων
  chosen: merciless
  alternatives:
  - without mercy
  - unpitiful
  lexicon: LSJ
  rationale: The adjective directly negates mercy. 'Merciless' is concise, natural
    English and retains the severity of the Greek.
- source_word: θυμός
  chosen: wrath
  alternatives:
  - anger
  - fury
  lexicon: BDAG
  rationale: In this judgment context, θυμός carries intense punitive anger. 'Wrath'
    better conveys judicial severity than 'anger,' without over-intensifying to 'fury.'
- source_word: ἐπέστη
  chosen: came upon them
  alternatives:
  - stood over them
  - fell upon them
  lexicon: LSJ
  rationale: From ἐφίστημι, the verb can mean 'come upon' or 'be upon.' In context
    of wrath overtaking the ungodly, 'came upon them' is the most natural English
    expression and makes explicit the dative referent.
- source_word: προῄδει
  chosen: knew beforehand
  alternatives:
  - foreknew
  - knew in advance
  lexicon: BDAG
  rationale: The verb means prior knowledge. 'Knew beforehand' is transparent and
    avoids importing later theological freight that 'foreknew' can carry in English.
- source_word: τὰ μέλλοντα
  chosen: what was going to happen
  alternatives:
  - the things to come
  - the coming events
  lexicon: LSJ
  rationale: The participial substantive refers to future events. 'What was going
    to happen' is clear modern English while preserving the future-oriented sense.
