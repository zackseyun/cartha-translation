translation:
  text: And they also were struck with blindness, like those at the doors of the righteous
    man, when, wrapped in deep darkness, each one kept seeking the way through his
    own door.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The allusion is to Genesis 19:11, where the men at Lot’s door were struck
      with blindness and wearied themselves trying to find the entrance.
    reason: cross_reference
  - marker: b
    text: Greek literally has wording about 'his own doors' and 'the way through';
      the source text here is somewhat awkward, so the translation renders the probable
      sense of repeated groping for an entrance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήγησαν
  chosen: were struck
  alternatives:
  - were afflicted
  - were smitten
  lexicon: LSJ
  rationale: Passive of πλήσσω conveys being hit/struck with a plague-like affliction.
    'Were struck' preserves the force without archaic tone.
- source_word: ἀορασίᾳ
  chosen: with blindness
  alternatives:
  - with inability to see
  - with unseen-ness
  lexicon: LSJ
  rationale: The noun denotes loss of sight or inability to see. 'Blindness' is the
    natural English equivalent and fits the allusion to the Sodom narrative.
- source_word: ὥσπερ ἐκεῖνοι
  chosen: like those
  alternatives:
  - just as those men
  - as those
  lexicon: LSJ
  rationale: The comparison is to the men in the earlier scriptural episode; 'those'
    keeps the reference concise while allowing the footnote/cross-reference to identify
    it.
- source_word: ἐπὶ ταῖς τοῦ δικαίου θύραις
  chosen: at the doors of the righteous man
  alternatives:
  - upon the doors of the righteous one
  - at the righteous man's doorway
  lexicon: LSJ
  rationale: The phrase points to the house entrance of the 'righteous man,' i.e.,
    Lot in the allusion. Singular 'righteous man' reflects τοῦ δικαίου.
- source_word: ἀχανεῖ ... σκότει
  chosen: deep darkness
  alternatives:
  - vast darkness
  - gaping darkness
  - thick darkness
  lexicon: LSJ
  rationale: ἀχανής suggests vast, yawning, or oppressive extent. 'Deep darkness'
    is idiomatic English that conveys intensity without awkwardness.
- source_word: περιβληθέντες
  chosen: wrapped in
  alternatives:
  - enveloped in
  - surrounded by
  - clothed with
  lexicon: LSJ
  rationale: The participle literally means 'having been thrown around/clothed with.'
    'Wrapped in' communicates being enveloped by darkness in readable English.
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each man
  - every one
  lexicon: LSJ
  rationale: 'Individuating force is important: each person separately groped for
    entry. ''Each one'' is natural and preserves the distributive sense.'
- source_word: τῶν αὐτοῦ θυρῶν
  chosen: through his own doors
  alternatives:
  - for the entrance of his own door
  - at his own doorway
  lexicon: LSJ
  rationale: The Greek is somewhat awkward in this witness, but the sense is that
    each sought access by way of his own doorway/door-opening. 'Through his own doors'
    stays close to the plural θύραι while remaining intelligible. Source-level mismatch
    warning suggests some textual roughness, so a slightly conservative rendering
    is appropriate.
- source_word: τὴν δίοδον ἐξῄει
  chosen: kept seeking the way through
  alternatives:
  - was trying to find the passage
  - went out by the way
  - sought the entrance
  lexicon: LSJ
  rationale: δίοδος is a way through, passage, or entrance. With the imperfect ἐξῄει
    in this context and the allusion to Gen 19:11, the sense is iterative attempted
    movement/search rather than successful exit. 'Kept seeking the way through' best
    captures the likely meaning of repeated groping for an entrance/way.
