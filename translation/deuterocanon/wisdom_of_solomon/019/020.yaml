theological_decisions:
- issue: Personified description of elemental behavior in a miracle context
  chosen_reading: Retain the literal-personified wording ('water forgot') rather than
    flattening it into explanatory prose.
  alternative_readings:
  - water lost its power to quench
  - water no longer quenched
  rationale: The verse poetically describes creation's altered behavior under divine
    action. Preserving the personification maintains the literary and theological
    force without adding interpretation beyond the text.
