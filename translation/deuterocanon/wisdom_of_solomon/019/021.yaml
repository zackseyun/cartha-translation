theological_decisions:
- issue: Rendering the miraculous food imagery without importing later doctrinal interpretation
  chosen_reading: ambrosial food
  alternative_readings:
  - heavenly food
  - immortal food
  rationale: The verse poetically describes the manna-like provision. 'Ambrosial'
    preserves the Hellenistic literary coloring of the Greek and does not force a
    narrower doctrinal gloss beyond the text.
  doctrine_reference: Translation philosophy §§1, 6
- issue: How explicitly to state that the creatures were within the flames
  chosen_reading: that walked among them
  alternative_readings:
  - walking within them
  - moving about in the midst of them
  rationale: The participle likely refers to the creatures moving amid the flames.
    This keeps the miracle vivid without over-expanding the syntax.
  doctrine_reference: Translation philosophy §§1, 6
