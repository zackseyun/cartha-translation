theological_decisions:
- issue: Narrative subject and implied referents
  chosen_reading: 'The verse refers to the Egyptians: after reversing their earlier
    release of Israel and urgently sending them away, they then pursued them after
    changing their minds.'
  alternative_readings:
  - The phrase could be rendered more woodenly without making the implied object explicit,
    leaving the referents to context.
  rationale: The Greek pronouns and participles are context-dependent. Making the
    action intelligible in English requires preserving the Egyptians as subject and
    Israel as object, but without adding details beyond the immediate narrative logic.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without paraphrase.'
