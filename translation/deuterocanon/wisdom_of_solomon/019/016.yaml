translation:
  text: But those who had welcomed with festivities people who had already shared
    in the same rights as they did later afflicted them with terrible sufferings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''those who had already shared in the same just things'' or ''the
      same provisions''; the phrase likely refers to having been granted the same
      standing or benefits.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek text here reads a word usually meaning ''meals'' or ''banquets''
      (''at banquets/with meals''), but the sentence is difficult; the translation
      gives the probable sense in context: they later mistreated them.'
    reason: textual_variant
lexical_decisions:
- source_word: μετὰ ἑορτασμάτων
  chosen: with festivities
  alternatives:
  - with celebrations
  - with feasts
  lexicon: LSJ
  rationale: The phrase denotes a festive, celebratory reception. 'With festivities'
    preserves the plural sense and public celebratory tone without over-specifying
    banquet meals.
- source_word: εἰσδεξάμενοι
  chosen: had welcomed
  alternatives:
  - had received
  - had admitted
  lexicon: LSJ
  rationale: The participle describes receiving others hospitably. 'Welcomed' best
    captures the positive, hospitable force in context.
- source_word: τοὺς ἤδη τῶν αὐτῶν μετεσχηκότας
  chosen: people who had already shared in the same rights as they did
  alternatives:
  - those who had already partaken of the same things
  - those who had already shared the same provisions
  - those who had already shared in what was theirs
  lexicon: LSJ
  rationale: μετέχω means 'share in, partake of.' In this context, recalling the Egyptians'
    earlier reception of Israel and subsequent oppression, the phrase points beyond
    mere food to participation in the same civic or social standing. 'The same rights
    as they did' makes the implied social-ethical force explicit while remaining anchored
    in the Greek.
- source_word: δικαίων
  chosen: rights
  alternatives:
  - just things
  - lawful things
  - what was due
  lexicon: LSJ
  rationale: Although literally from δίκαιος ('just, right'), here the genitive plural
    substantivally modifies what the welcomed people had shared in. 'Rights' fits
    the contextual sense of just entitlements or equitable standing better than the
    wooden 'just things.'
- source_word: δείπνοις
  chosen: later
  alternatives:
  - at banquets
  - with meals
  - at table
  lexicon: LSJ
  rationale: The transmitted text reads δείπνοις, which normally means 'meals/banquets,'
    but the syntax is difficult and the verse is marked with source-level mismatch.
    The broader context strongly contrasts festive welcome with subsequent mistreatment.
    Rendering the sense as 'later' captures the temporal contrast implied by the sentence.
    The more literal meal-related alternative is preserved in a footnote because the
    Greek form itself points that direction.
- source_word: ἐκάκωσαν
  chosen: afflicted
  alternatives:
  - mistreated
  - harmed
  - oppressed
  lexicon: LSJ
  rationale: The verb means to do evil to, injure, or mistreat. 'Afflicted' fits the
    following dative and preserves the gravity of the action.
- source_word: πόνοις
  chosen: with terrible sufferings
  alternatives:
  - with pains
  - with hardships
  - with toils
  lexicon: LSJ
  rationale: πόνος can denote pain, hardship, or suffering. 'Terrible sufferings'
    brings out the severity in context, though 'terrible' is interpretive; it reflects
    the oppressive treatment described in the surrounding narrative.
