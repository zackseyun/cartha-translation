theological_decisions:
- issue: Interpretation of τοὺς ἤδη τῶν αὐτῶν μετεσχηκότας δικαίων
  chosen_reading: socially and ethically shared status/rights, not merely shared food
  alternative_readings:
  - shared the same provisions
  - shared the same just things
  rationale: The context contrasts initial hospitable reception with later oppression
    of the Israelites in Egypt. Rendering the phrase in terms of 'rights' best reflects
    the moral indictment embedded in the verse rather than reducing it to table fellowship
    alone.
  doctrine_reference: Translation philosophy §1, §5
- issue: Handling the difficult reading δείπνοις in a verse flagged major_mismatch
  chosen_reading: translate the apparent sense of subsequent mistreatment in the main
    text and preserve the meal-related literal alternative in a footnote
  alternative_readings:
  - at banquets
  - with meals
  - at table
  rationale: The Greek form as transmitted is awkward in context. Because the source
    note flags a mismatch, the translation should be honest about uncertainty. The
    main text gives the likely sense; the footnote preserves the more literal lexical
    possibility for auditability.
  doctrine_reference: PHILOSOPHY.md transparency section; Translation philosophy optimal
    equivalence
