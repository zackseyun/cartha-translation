translation:
  text: For they grazed like horses, and skipped about like lambs, praising you, Lord,
    who delivered them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were fed' / 'were pastured like horses'; the Greek verb evokes animals
      feeding at pasture.
    reason: lexical_alternative
  - marker: b
    text: Or 'leaped' like lambs.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεμήθησαν
  chosen: grazed
  alternatives:
  - were pastured
  - fed
  lexicon: LSJ
  rationale: From νέμομαι/νεμώ in the passive-middle sense of feeding or grazing.
    In the wilderness-miracle context the image is of animals at pasture, so 'grazed'
    preserves the concrete metaphor better than the more abstract 'were fed.'
- source_word: διεσκίρτησαν
  chosen: skipped about
  alternatives:
  - leaped
  - frolicked
  lexicon: LSJ
  rationale: The verb denotes lively springing or skipping. 'Skipped about' conveys
    repeated exuberant movement and fits the simile with lambs without becoming overly
    colloquial.
- source_word: ἀμνοί
  chosen: lambs
  alternatives:
  - young sheep
  lexicon: LSJ
  rationale: Standard meaning is 'lambs.' The image emphasizes youthful, joyful movement.
- source_word: αἰνοῦντές
  chosen: praising
  alternatives:
  - extolling
  - singing praise to
  lexicon: LSJ
  rationale: Present participle expressing attendant action. 'Praising' is the most
    natural and direct English equivalent.
- source_word: Κύριε
  chosen: Lord
  lexicon: LSJ
  rationale: Vocative of κύριος. Per doctrine, the default rendering is 'Lord.'
- source_word: ῥυόμενον
  chosen: who delivered
  alternatives:
  - who rescued
  - the one delivering
  lexicon: LSJ
  rationale: The participle refers to God's saving action toward Israel. 'Who delivered'
    gives idiomatic English while preserving the sense of rescue.
