translation:
  text: For those did not welcome strangers when they were present and in need, but
    these enslaved foreign benefactors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'those unknown to them.' The sense in context is 'strangers'
      or 'people they did not know.'
    reason: lexical_alternative
  - marker: b
    text: Or 'did not receive those who were present.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'enslaved foreign benefactors' or 'made foreign benefactors into
      slaves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ μὲν ... οὗτοι δὲ
  chosen: those ... but these
  alternatives:
  - the former ... but the latter
  - on the one hand ... but on the other
  lexicon: LSJ
  rationale: Preserves the contrast between two groups under comparison without overformal
    English. 'Those ... but these' is concise and natural.
- source_word: τοὺς ἀγνοοῦντας
  chosen: strangers
  alternatives:
  - those unknown to them
  - the unacquainted
  - those they did not know
  lexicon: LSJ
  rationale: Literally the participle means 'those being unknown,' but in context
    of hospitality and ξένους later in the verse, it refers to people unknown to them,
    i.e., strangers. This best conveys the social sense in idiomatic English.
- source_word: οὐκ ἐδέχοντο
  chosen: did not welcome
  alternatives:
  - did not receive
  - did not accept
  lexicon: LSJ
  rationale: '''Receive'' is formally possible, but in a hospitality context ''welcome''
    better expresses the refusal of hospitality implied by the verb.'
- source_word: παρόντας
  chosen: when they were present and in need
  alternatives:
  - though present
  - when they were present
  lexicon: LSJ
  rationale: The participle means 'being present.' In context it points to people
    who had come among them and stood before them seeking reception. 'And in need'
    is an interpretive nuance tied to the hospitality setting, making explicit what
    is strongly implied by the context.
- source_word: εὐεργέτας
  chosen: benefactors
  alternatives:
  - doers of good
  - those who had helped them
  lexicon: LSJ
  rationale: The noun denotes people who have done good or rendered benefit. 'Benefactors'
    is compact and preserves the moral irony of enslaving those who had helped them.
- source_word: ξένους
  chosen: foreign
  alternatives:
  - strange
  - strangers
  - alien
  lexicon: LSJ
  rationale: Here ξένους modifies εὐεργέτας and marks them as outsiders/foreigners.
    Rendering it adjectivally as 'foreign benefactors' keeps the syntax clear in English.
- source_word: ἐδουλοῦντο
  chosen: enslaved
  alternatives:
  - made slaves of
  - treated as slaves
  - held in bondage
  lexicon: LSJ
  rationale: From δουλόω, this denotes reducing someone to slavery. In line with project
    guidance on doulos-family terms, 'enslaved' makes the bonded nature explicit and
    avoids the softer 'servitude' language.
