theological_decisions:
- issue: Historical referent of the contrasted groups
  chosen_reading: Leave the groups implicit in the main text rather than naming Egyptians
    and Sodomites.
  alternative_readings:
  - Interpret the first group as the Sodomites and the second as the Egyptians
  rationale: The Greek verse itself uses only contrasting pronouns ('those ... these').
    The broader context may identify the groups, but importing those labels into the
    verse would go beyond the wording of the source text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
