translation:
  text: The cloud that overshadowed the camp was seen, and from the water that had
    stood before them dry land emerged; from the Red Sea came an unhindered road,
    and from the violent surge a grassy plain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Reed Sea.' The Greek text here reads 'Red Sea,' which is therefore
      retained in the main text.
    reason: alternative_reading
lexical_decisions:
- source_word: σκιάζουσα
  chosen: overshadowed
  alternatives:
  - shaded
  - covered with shadow
  lexicon: LSJ
  rationale: The participle denotes casting shade over or covering with shadow. 'Overshadowed'
    preserves the vivid imagery and the protective nuance of the cloud without over-paraphrasing.
- source_word: παρεμβολήν
  chosen: camp
  alternatives:
  - encampment
  lexicon: LSJ
  rationale: In Exodus-context narrative, the term refers to Israel's camp. 'Camp'
    is natural modern English while remaining faithful to the military/encampment
    sense.
- source_word: προϋφεστῶτος ὕδατος
  chosen: the water that had stood before them
  alternatives:
  - the water that had been standing there
  - the previously standing water
  lexicon: LSJ
  rationale: The perfect participial expression indicates water already present and
    standing in place. The rendering avoids awkward literalism while preserving temporal
    priority and physical stasis.
- source_word: ξηρᾶς ἀνάδυσις γῆς
  chosen: dry land emerged
  alternatives:
  - an emergence of dry ground
  - dry ground rose up
  lexicon: LSJ
  rationale: The phrase describes the appearance/emergence of dry land from beneath
    the waters. 'Dry land emerged' is idiomatic and closely tracks the Greek image.
- source_word: ἐθεωρήθη
  chosen: was seen
  alternatives:
  - appeared
  - was beheld
  lexicon: LSJ
  rationale: The passive verb straightforwardly means 'was seen' or 'was observed.'
    'Was seen' keeps the observational tone of the Greek and avoids adding interpretive
    force.
- source_word: ἐρυθρᾶς θαλάσσης
  chosen: the Red Sea
  alternatives:
  - the Reed Sea
  lexicon: LSJ
  rationale: In this Greek text the expression is the conventional proper name for
    the sea of the exodus tradition. 'Red Sea' is the direct rendering of the Greek
    and the established referent in this context; 'Reed Sea' is preserved as an alternative
    note because of broader Hebrew-background discussion, but the Zone 1 Greek witness
    here supports 'Red Sea'.
- source_word: ὁδὸς ἀνεμπόδιστος
  chosen: an unhindered road
  alternatives:
  - an unobstructed way
  - a road without hindrance
  lexicon: LSJ
  rationale: The phrase emphasizes a passable route free from obstruction. 'Unhindered
    road' is concise and preserves the concrete image of a roadway through the sea.
- source_word: χλοηφόρον πεδίον
  chosen: a grassy plain
  alternatives:
  - a green field
  - a grass-bearing plain
  lexicon: LSJ
  rationale: The compound adjective means bearing green herbage/grass. 'Grassy plain'
    is natural English and retains the surprising fertility image.
- source_word: κλύδωνος βιαίου
  chosen: the violent surge
  alternatives:
  - the violent wave
  - the raging swell
  lexicon: LSJ
  rationale: The genitive phrase refers to a forceful, turbulent swell of water. 'Violent
    surge' captures both motion and intensity without sounding overly technical.
