translation:
  text: 'For they still remembered the things in their time as foreigners: how, instead
    of the breeding of animals, the land brought forth gnats, and instead of creatures
    of the water, the river spewed out a multitude of frogs.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sojourning' or 'their residence as aliens.' The Greek term refers
      to living in a place as foreigners.
    reason: lexical_alternative
  - marker: b
    text: The exact insect denoted by the Greek may be understood more broadly than
      'gnats'; 'mosquitoes' or similar small biting insects are sometimes suggested.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμέμνηντο
  chosen: they still remembered
  alternatives:
  - they kept in mind
  - they recalled
  lexicon: LSJ
  rationale: Imperfect/middle sense conveys continued recollection; 'still remembered'
    captures ἔτι and the ongoing force naturally in English.
- source_word: παροικίᾳ
  chosen: their time as foreigners
  alternatives:
  - their sojourning
  - their residence as aliens
  - their stay in a foreign land
  lexicon: LSJ
  rationale: παροικία denotes dwelling as a stranger/foreigner. 'Time as foreigners'
    is idiomatic modern English and preserves the social sense better than the more
    archaic 'sojourning.'
- source_word: γενέσεως ζῴων
  chosen: the breeding of animals
  alternatives:
  - the production of living creatures
  - the generation of animals
  - the birth of animals
  lexicon: LSJ
  rationale: γενέσεως here refers to normal animal reproduction or production from
    the earth, contrasted with the plague of gnats. 'Breeding of animals' communicates
    ordinary animal generation without sounding overly technical.
- source_word: ἐξήγαγεν
  chosen: brought forth
  alternatives:
  - produced
  - brought out
  lexicon: LSJ
  rationale: Used of the land producing something. 'Brought forth' is a natural English
    equivalent that preserves the vividness of emergence from the earth.
- source_word: σκνῖπα
  chosen: gnats
  alternatives:
  - gnat
  - mosquitoes
  - sandflies
  lexicon: LSJ
  rationale: The plural collective sense fits the plague context. 'Gnats' is the standard
    and most recognizable rendering, though the exact insect identification is not
    fully certain.
- source_word: ἐνύδρων
  chosen: creatures of the water
  alternatives:
  - water creatures
  - aquatic animals
  lexicon: LSJ
  rationale: The adjective/substantive refers to things living in water. 'Creatures
    of the water' is clear and slightly more literary, fitting the context.
- source_word: ἐξηρεύξατο
  chosen: spewed out
  alternatives:
  - poured forth
  - belched out
  - gushed out
  lexicon: LSJ
  rationale: The verb is forceful, suggesting an expulsion rather than a neutral emergence.
    'Spewed out' preserves the vivid, almost violent imagery.
- source_word: πλῆθος βατράχων
  chosen: a multitude of frogs
  alternatives:
  - a swarm of frogs
  - many frogs
  lexicon: LSJ
  rationale: πλῆθος emphasizes large number. 'A multitude of frogs' is faithful and
    suitably elevated without being archaic.
