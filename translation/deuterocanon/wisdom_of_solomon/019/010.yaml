theological_decisions:
- issue: Interpretation of παροικία in recalling the Egyptian plagues
  chosen_reading: Rendered as 'their time as foreigners,' referring to Israel's period
    of alien residence in Egypt.
  alternative_readings:
  - their sojourning
  - their exile
  rationale: The context is retrospective on the plagues in Egypt. 'Exile' would overstate
    the term; 'time as foreigners' preserves the historical-social condition without
    importing later exile theology.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; readable modern English'
- issue: Force of the plague imagery in ἐξηρεύξατο
  chosen_reading: Used vivid wording 'spewed out' for the river's production of frogs.
  alternative_readings:
  - poured forth
  - brought forth
  rationale: The Greek verb is stronger than a neutral 'produced.' Preserving the
    force respects the text's rhetoric without adding doctrinal interpretation.
  doctrine_reference: 'DOCTRINE.md: Preserve source meaning; readable modern English'
