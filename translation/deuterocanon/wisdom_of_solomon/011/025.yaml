theological_decisions:
- issue: Whether τὸ μὴ κληθέν should be made explicit as creation ex nihilo ('called
    into being') in the main text
  chosen_reading: Retain the more literal 'what had not been called' in the main text
  alternative_readings:
  - what had not been called into being
  - what you had not summoned into existence
  rationale: The context concerns God's sustaining and creative will, so an existential
    nuance is plausible. However, the Greek text itself says only 'called,' and the
    translation philosophy forbids importing doctrinally loaded wording beyond what
    the source warrants. The stronger interpretive expansion is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological
    tension rather than resolve it'
