translation:
  text: For how could anything have remained, if you had not willed it? Or how could
    what had not been called by you have been preserved?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'what had not been called into being by you.' The Greek
      says simply 'called,' but in context it may refer to God's creative summons.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  chosen: how could
  alternatives:
  - how
  - in what way could
  lexicon: LSJ
  rationale: Introduces a rhetorical question expressing impossibility apart from
    God's will; 'how could' captures both the interrogative and the implied impossibility
    in idiomatic English.
- source_word: ἔμεινεν
  chosen: have remained
  alternatives:
  - remain
  - continue to exist
  - endure
  lexicon: LSJ
  rationale: Aorist of μένω here refers to continued existence or persistence. 'Have
    remained' fits the English perfect in a rhetorical question about whether anything
    could continue in being.
- source_word: ἄν τι
  chosen: anything
  alternatives:
  - any thing at all
  - something
  lexicon: LSJ
  rationale: Indefinite expression with ἄν in this rhetorical construction is best
    rendered broadly as 'anything,' emphasizing total dependence of all things on
    God.
- source_word: ἠθέλησας
  chosen: had not willed
  alternatives:
  - had not wanted
  - had not desired
  - had not chosen
  lexicon: LSJ
  rationale: θέλω can mean wish, will, or desire. In this theological context of divine
    sustaining intention, 'willed' best conveys purposeful volition without over-paraphrasing.
- source_word: τὸ μὴ κληθέν
  chosen: what had not been called
  alternatives:
  - what had not been summoned
  - what had not been named
  - that which had not been called into being
  lexicon: LSJ
  rationale: κληθέν literally means 'called.' The phrase likely evokes God's effective
    calling/bringing into existence, but the Greek does not explicitly add 'into being,'
    so the main text keeps 'called' and leaves the fuller interpretive nuance implicit.
- source_word: ὑπὸ σοῦ
  chosen: by you
  alternatives:
  - by you yourself
  lexicon: LSJ
  rationale: Straightforward agency phrase; 'by you' preserves the direct attribution
    to God.
- source_word: διετηρήθη
  chosen: have been preserved
  alternatives:
  - be preserved
  - be kept alive
  - be maintained
  lexicon: LSJ
  rationale: The verb denotes being kept safe or maintained in existence. 'Have been
    preserved' matches the rhetorical perfect sense in English and pairs well with
    'have remained' in the first clause.
