theological_decisions:
- issue: Referent of αὐτούς in relation to the judging group and the benefited group
  chosen_reading: αὐτούς refers to the Israelites, whom the Egyptians heard were being
    benefited through the Egyptians' own punishments.
  alternative_readings:
  - αὐτούς refers more generally to 'them,' leaving the contrast implicit.
  rationale: The immediate context in Wisdom 11 contrasts Egyptians under plague with
    Israelites receiving provision. Making the pronoun's contrast explicit in English
    helps readers follow the sense without paraphrasing beyond the Greek irony.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence with documented rationale.
- issue: Force of τοῦ κυρίου
  chosen_reading: they recognized the Lord
  alternative_readings:
  - they took notice of the Lord
  - they acknowledged the Lord's presence or action
  rationale: The Greek object is concise and somewhat open-ended; the sense is not
    necessarily full covenant faith but recognition of the Lord's reality and action.
    'Recognized the Lord' preserves that without overstating conversion.
  doctrine_reference: 'κύριος default rendering: Lord'
