translation:
  text: For when they heard that those very people were being benefited through their
    own punishments, they recognized the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they became aware of the Lord.' The Greek may denote perception or recognition
      rather than full confession of faith.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε γὰρ
  chosen: For when
  alternatives:
  - For
  - When
  lexicon: LSJ
  rationale: Retains the explanatory force of γάρ while preserving the temporal clause
    introduced by ὅτε.
- source_word: ἤκουσαν
  chosen: they heard
  alternatives:
  - they learned
  - they were told
  lexicon: LSJ
  rationale: The basic sense is auditory reception of report; 'heard' is the most
    direct and natural rendering in context.
- source_word: διὰ τῶν ἰδίων κολάσεων
  chosen: through their own punishments
  alternatives:
  - by means of their own torments
  - through the punishments that were theirs
  lexicon: LSJ
  rationale: διά with the genitive expresses means or instrument. κολάσεων denotes
    punishments/chastisements; 'punishments' is clear modern English and fits the
    plague-judgment context. ἰδίων is rendered 'their own' to preserve the contrastive
    irony.
- source_word: εὐεργετουμένους
  chosen: were being benefited
  alternatives:
  - were being treated kindly
  - were receiving good
  lexicon: LSJ
  rationale: The participle is passive and denotes receiving benefaction. 'Were being
    benefited' preserves both the passive form and the irony that the Israelites were
    helped precisely through the Egyptians' punishments.
- source_word: αὐτούς
  chosen: those very people
  alternatives:
  - them
  - those people
  lexicon: LSJ
  rationale: The pronoun refers to the other group previously in view; 'those very
    people' makes the contrast explicit in idiomatic English without adding new content.
- source_word: ᾔσθοντο
  chosen: they recognized
  alternatives:
  - they perceived
  - they became aware of
  lexicon: LSJ
  rationale: The verb can mean perceive or come to understand. In this context of
    theological realization under judgment, 'recognized' captures dawning acknowledgment
    better than a merely sensory 'perceived'.
- source_word: τοῦ κυρίου
  chosen: the Lord
  alternatives:
  - the master
  lexicon: LSJ
  rationale: Following project doctrine for κύριος, 'the Lord' is the default rendering.
    Here it denotes God as the one whose action they came to acknowledge.
