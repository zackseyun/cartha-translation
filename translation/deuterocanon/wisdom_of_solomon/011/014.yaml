translation:
  text: For they rejected with mockery the one who had long ago been cast out at his
    exposure; but at the end of those events they marveled, having thirsted unlike
    the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the child once exposed and cast out—an allusion to Moses.
    reason: cross_reference
  - marker: b
    text: Or "at the end of the outcomes"; the Greek may refer to the final result
      of the events that had unfolded.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἐκθέσει
  chosen: at his exposure
  alternatives:
  - when he was exposed
  - when he was cast out
  - at his abandonment
  lexicon: LSJ
  rationale: ἔκθεσις commonly refers to exposure of an infant, i.e., being set out
    and abandoned. In context this points to Moses as the child once exposed. 'At
    his exposure' preserves the concrete historical allusion without over-paraphrasing.
- source_word: ῥιφέντα
  chosen: been cast out
  alternatives:
  - been thrown away
  - been cast aside
  lexicon: BDAG
  rationale: The participle from ῥίπτω conveys being thrown/cast. 'Cast out' fits
    the abandonment context and reads naturally in English.
- source_word: ἀπεῖπον
  chosen: they rejected
  alternatives:
  - they disowned
  - they renounced
  - they refused
  lexicon: LSJ
  rationale: The verb here conveys repudiation or rejection. 'Rejected' best matches
    the Egyptians' earlier dismissal of the exposed child.
- source_word: χλευάζοντες
  chosen: with mockery
  alternatives:
  - mocking
  - scoffing
  lexicon: BDAG
  rationale: The participle indicates the manner of their rejection. Rendering adverbially
    as 'with mockery' keeps the relation clear in English.
- source_word: ἐπὶ τέλει
  chosen: at the end
  alternatives:
  - in the end
  - at the outcome
  lexicon: LSJ
  rationale: This phrase marks the concluding stage of the events under review. 'At
    the end' is straightforward and sufficiently formal.
- source_word: τῶν ἐκβάσεων
  chosen: of those events
  alternatives:
  - of the outcomes
  - of their goings out
  - of the developments
  lexicon: LSJ
  rationale: ἐκβάσεις can mean outcomes, issues, or courses of events. Here it likely
    refers to the unfolding plagues/exodus-related developments. 'Those events' is
    slightly dynamic but avoids awkwardness while preserving the narrative sense.
- source_word: ἐθαύμασαν
  chosen: they marveled
  alternatives:
  - they were astonished
  - they wondered
  lexicon: BDAG
  rationale: A simple rendering of the aorist verb of amazement.
- source_word: οὐχ ὅμοια δικαίοις
  chosen: in a way unlike the righteous
  alternatives:
  - not like the righteous
  - differently from the righteous
  lexicon: LSJ
  rationale: The phrase explicitly contrasts the Egyptians' thirst with that of the
    righteous Israelites in the preceding context. This rendering preserves the comparison.
- source_word: διψήσαντες
  chosen: having thirsted
  alternatives:
  - after they had become thirsty
  - when they thirsted
  lexicon: BDAG
  rationale: The participle is causal/circumstantial. 'Having thirsted' keeps the
    Greek structure visible while remaining intelligible.
