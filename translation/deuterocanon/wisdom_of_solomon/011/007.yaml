lexical_decisions:
- source_word: εἰς
  chosen: as
  alternatives:
  - for
  - unto
  - into
  lexicon: LSJ
  rationale: Here εἰς introduces purpose/result in a verbless fragment dependent on
    the surrounding sentence. 'As' fits idiomatic English in context while preserving
    the sense of function.
- source_word: ἔλεγχον
  chosen: a rebuke
  alternatives:
  - reproof
  - exposure
  - conviction
  lexicon: LSJ
  rationale: ἔλεγχος can denote refutation, exposure, or reproof. In this context
    of divine action exposing and condemning Egypt's prior act, 'rebuke' is concise
    and natural, while still carrying moral censure.
- source_word: νηπιοκτόνου
  chosen: that killed infants
  alternatives:
  - infant-killing
  - child-murdering
  - baby-killing
  lexicon: LSJ
  rationale: 'The adjective literally means ''infant-killing.'' Because it modifies
    διατάγματος, English reads more naturally by expanding it into a relative clause:
    ''the decree that killed infants.'' ''Infants'' preserves the lexical force of
    νήπιος better than the broader ''children.'''
- source_word: διατάγματος
  chosen: the decree
  alternatives:
  - ordinance
  - edict
  - command
  lexicon: LSJ
  rationale: διατάγματος refers to an official order or decree. 'Decree' is clear
    modern English and suits the likely allusion to Pharaoh's order.
