theological_decisions:
- issue: Whether to make God the explicit giver of the water
  chosen_reading: Retain the passive 'was given to them' without supplying 'by you'
    in the main text.
  alternative_readings:
  - and you gave them water
  - and water came to them
  rationale: The Greek uses a passive verb, and although the context clearly attributes
    the provision to God, the translation should preserve the source wording's restraint
    rather than make the agency explicit in the clause itself.
  doctrine_reference: Translation philosophy §1, §3
- issue: How strongly to render the metaphor in ἄκος δίψης
  chosen_reading: Use 'a remedy for thirst' rather than flattening to simple 'drink'
    or 'relief.'
  alternative_readings:
  - relief from thirst
  - a cure for thirst
  rationale: The verse poetically describes the water as a healing remedy. Preserving
    that metaphor reflects the literary and theological portrayal of divine provision
    as restorative, not merely utilitarian.
  doctrine_reference: Translation philosophy §6
