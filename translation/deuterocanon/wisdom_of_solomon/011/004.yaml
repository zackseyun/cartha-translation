translation:
  text: They were thirsty and called on you, and water was given to them from a sheer
    rock, and a remedy for thirst from hard stone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They thirsted and called upon you.'
    reason: lexical_alternative
  - marker: b
    text: The Greek literally says 'a remedy for thirst,' portraying the water as
      healing relief.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίψησαν
  chosen: They were thirsty
  alternatives:
  - They thirsted
  lexicon: BDAG
  rationale: Aorist of διψάω can be rendered more formally as 'they thirsted,' but
    idiomatic modern English prefers 'they were thirsty' while preserving the state
    of need described.
- source_word: ἐπεκαλέσαντό σε
  chosen: called on you
  alternatives:
  - called upon you
  - invoked you
  - appealed to you
  lexicon: BDAG
  rationale: The middle of ἐπικαλέω here denotes appeal to God in need. 'Called on
    you' is natural modern English and preserves the prayerful sense without sounding
    archaic.
- source_word: ἐδόθη αὐτοῖς
  chosen: was given to them
  alternatives:
  - there was given to them
  - they were given
  lexicon: BDAG
  rationale: The passive leaves the giver implicit, though context implies divine
    agency. 'Was given to them' preserves the passive form and avoids over-specifying
    the subject.
- source_word: ἐκ πέτρας ἀκροτόμου
  chosen: from a sheer rock
  alternatives:
  - from a steep rock
  - from a jagged rock
  - from a rock cut sheer
  lexicon: LSJ
  rationale: ἀκρότομος literally suggests sharply cut or precipitous. 'Sheer rock'
    is concise, natural English that conveys the improbability of water coming from
    such a source.
- source_word: ὕδωρ
  chosen: water
  lexicon: BDAG
  rationale: Straightforward lexical equivalent.
- source_word: ἄκος δίψης
  chosen: a remedy for thirst
  alternatives:
  - a cure for thirst
  - relief from thirst
  - healing of thirst
  lexicon: LSJ
  rationale: ἄκος means remedy or cure. 'Remedy for thirst' preserves the medicinal
    metaphor without overstating it. 'Relief' is possible but weaker than the noun's
    curative force.
- source_word: ἐκ λίθου σκληροῦ
  chosen: from hard stone
  alternatives:
  - from solid stone
  - from a hard stone
  lexicon: LSJ
  rationale: σκληρός means hard. The anarthrous phrase is well represented by 'from
    hard stone,' which keeps the parallelism with the previous clause and the emphasis
    on the unlikely source.
