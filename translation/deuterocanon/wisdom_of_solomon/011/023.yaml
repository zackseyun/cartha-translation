translation:
  text: But you have mercy on all, because you are able to do all things, and you
    overlook the sins of men for repentance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'people' or 'human beings'; Greek 'men' here is generic for humanity.
    reason: lexical_alternative
  - marker: b
    text: '''Overlook'' here means to pass over for the time being in mercy, with
      a view to repentance, not to ignore sin as unimportant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεεῖς
  chosen: have mercy on
  alternatives:
  - show mercy to
  - pity
  lexicon: BDAG
  rationale: The verb denotes merciful compassion expressed toward others. 'Have mercy
    on' is idiomatic modern English and preserves the theological weight better than
    the weaker 'pity.'
- source_word: πάντας
  chosen: all
  alternatives:
  - everyone
  - all people
  lexicon: BDAG
  rationale: The accusative plural is unrestricted here and refers broadly to all
    persons in context. 'All' is the most direct rendering and keeps the universal
    scope concise.
- source_word: πάντα δύνασαι
  chosen: you are able to do all things
  alternatives:
  - you can do all things
  - you have power over all things
  lexicon: BDAG
  rationale: The phrase states comprehensive ability/power. 'You are able to do all
    things' is slightly more formal than 'you can do all things' and fits the elevated
    style of the passage without becoming archaic.
- source_word: παρορᾷς
  chosen: you overlook
  alternatives:
  - you pass over
  - you disregard
  - you look past
  lexicon: BDAG
  rationale: In this context the verb conveys forbearance toward sins rather than
    ignorance of them. 'Overlook' communicates deliberate non-immediate judgment in
    service of repentance. 'Disregard' could imply moral indifference, which the context
    does not support.
- source_word: ἁμαρτήματα
  chosen: sins
  alternatives:
  - transgressions
  - offenses
  lexicon: BDAG
  rationale: A standard rendering that is clear and theologically appropriate. 'Transgressions'
    is possible but less natural here.
- source_word: ἀνθρώπων
  chosen: men
  alternatives:
  - people
  - human beings
  - humankind
  lexicon: BDAG
  rationale: The noun is generic for human beings, but per project guidance gender-accurate
    forms may be retained where representative force is intended. 'Men' preserves
    the traditional anthropological sense and matches the source's generic masculine
    usage; inclusivity concerns are better handled by note if needed.
- source_word: εἰς μετάνοιαν
  chosen: so that they may repent
  alternatives:
  - for repentance
  - unto repentance
  - leading to repentance
  lexicon: BDAG
  rationale: 'The prepositional phrase expresses purpose or result. Rendering it verbally
    in English makes the sense clear and natural: God''s overlooking of sins is aimed
    at human repentance.'
