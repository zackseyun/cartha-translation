theological_decisions:
- issue: Meaning of divine forbearance in παρορᾷς ἁμαρτήματα
  chosen_reading: God temporarily overlooks human sins in mercy to allow opportunity
    for repentance, not because he is unaware of or approves of sin.
  alternative_readings:
  - God ignores sins
  - God forgives sins outright in this clause
  rationale: The immediate context links the action to εἰς μετάνοιαν, indicating merciful
    restraint oriented toward repentance. 'Overlook' is therefore retained, but understood
    as forbearance rather than indifference or full absolution.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Rendering of ἀνθρώπων
  chosen_reading: men
  alternative_readings:
  - people
  - human beings
  - humankind
  rationale: The Greek is a generic term for humans. In line with the project's gender-accurate-over-gender-neutral
    policy, the representative masculine may be preserved in the main text where it
    reflects the source form and intent.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
