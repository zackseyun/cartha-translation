translation:
  text: For it is always in your power to show great strength, and who will withstand
    the might of your arm?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it is always at your disposal to exercise great power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγάλως
  chosen: great
  alternatives:
  - greatly
  - mightily
  lexicon: LSJ
  rationale: The adverb intensifies ἰσχύειν. Rendering the phrase as 'show great strength'
    communicates the force naturally in English while preserving the idea of exceptional
    power.
- source_word: ἰσχύειν
  chosen: show strength
  alternatives:
  - be strong
  - have power
  - prevail
  lexicon: LSJ
  rationale: The infinitive denotes exercising strength or having power. In English,
    'it is present to you to show great strength' best fits the idiom with πάρεστιν
    and keeps the focus on God's active power.
- source_word: πάρεστίν σοι
  chosen: it is always present to you
  alternatives:
  - it is at your disposal always
  - you always have the power
  - it is always possible for you
  lexicon: LSJ
  rationale: The expression conveys ready availability rather than mere abstract possibility.
    'It is always present to you' stays close to the Greek while remaining intelligible.
- source_word: κράτει
  chosen: the might
  alternatives:
  - the power
  - the strength
  - the force
  lexicon: LSJ
  rationale: κράτος emphasizes manifested might or dominion-strength. 'Might' is concise
    and suitably elevated without becoming archaic.
- source_word: βραχίονός σου
  chosen: of your arm
  alternatives:
  - of your mighty arm
  lexicon: LSJ
  rationale: The 'arm' is a standard biblical image for effective power. The adjective
    'mighty' is unnecessary because κράτει already carries the sense of strength.
- source_word: τίς ἀντιστήσεται
  chosen: who will withstand
  alternatives:
  - who will resist
  - who will stand against
  lexicon: LSJ
  rationale: 'Future middle here is rhetorical: no one can successfully oppose God.
    ''Withstand'' captures effective resistance better than the more general ''resist''.'
