  chosen_reading: Retain the unusual imagery ('being winnowed,' 'sparks flashing from
    their eyes') rather than smoothing into a paraphrase.
  alternative_readings:
  - Interpret more dynamically as 'clouds of foul smoke swirling'
  rationale: The verse is poetic and vivid; optimal equivalence here favors preserving
    the strangeness of the Greek while remaining readable. No doctrinal issue is at
    stake, but the translation philosophy prioritizes source-text imagery over inherited
    smoothing.
