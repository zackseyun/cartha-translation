translation:
  text: For your almighty hand, which created the world out of formless matter, was
    not powerless to send upon them a multitude of bears or fierce lions,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from unformed matter.' The Greek phrase reflects a Hellenistic cosmological
      expression and should not be pressed here to settle later doctrinal debates
      about the mode of creation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠπόρει
  chosen: was not unable
  alternatives:
  - did not lack the power
  - was not at a loss
  - was not powerless
  lexicon: LSJ
  rationale: The verb ἀπορέω can mean to be at a loss, be in difficulty, or lack means/resources.
    With οὐ and in this context of divine power, the sense is that God's hand was
    fully able. 'Was not unable' preserves the Greek's litotes more closely than a
    smoother paraphrase like 'could easily.'
- source_word: παντοδύναμός
  chosen: almighty
  alternatives:
  - all-powerful
  - omnipotent
  lexicon: LSJ
  rationale: '''Almighty'' is the most natural English equivalent for παντοδύναμος
    and carries the theological force of unrestricted power without sounding overly
    technical.'
- source_word: χείρ
  chosen: hand
  alternatives:
  - power
  lexicon: LSJ
  rationale: The Greek uses 'hand' metaphorically for divine agency/power. Retaining
    'hand' preserves the image while remaining clear in English.
- source_word: κτίσασα
  chosen: which created
  alternatives:
  - having created
  - that formed
  lexicon: LSJ
  rationale: The participle modifies 'hand' and grounds the argument in God's creative
    power. 'Which created' reads naturally in English while preserving the attributive
    force.
- source_word: κόσμον
  chosen: the world
  alternatives:
  - the universe
  - the ordered world
  lexicon: LSJ
  rationale: κόσμος here refers to the created world/order. 'The world' is idiomatic
    and sufficient; 'universe' may over-specify beyond the verse's immediate rhetoric.
- source_word: ἐξ ἀμόρφου ὕλης
  chosen: out of formless matter
  alternatives:
  - from unformed matter
  - out of shapeless material
  lexicon: LSJ
  rationale: This phrase is philosophically charged in Hellenistic Jewish discourse.
    'Formless matter' is a clear, fairly literal rendering that preserves the conceptual
    background without paraphrase.
- source_word: ἐπιπέμψαι
  chosen: to send upon them
  alternatives:
  - to send against them
  - to unleash on them
  lexicon: LSJ
  rationale: The compound verb suggests sending upon or against. 'Send upon them'
    stays close to the Greek and fits the judgment context.
- source_word: πλῆθος
  chosen: a multitude of
  alternatives:
  - many
  - a swarm of
  lexicon: LSJ
  rationale: '''A multitude of'' preserves the noun''s quantitative emphasis more
    fully than the simpler ''many.'''
- source_word: θρασεῖς
  chosen: fierce
  alternatives:
  - bold
  - savage
  lexicon: LSJ
  rationale: Though θρασύς can mean bold or audacious, in the context of predatory
    animals sent in judgment, 'fierce' best conveys the threatening sense in natural
    English.
