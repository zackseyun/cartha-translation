theological_decisions:
- issue: Rendering the litotic statement about divine ability
  chosen_reading: For your almighty hand ... was not unable to send upon them ...
  alternative_readings:
  - For your almighty hand ... did not lack the power to send upon them ...
  - For your almighty hand ... could have sent upon them ...
  rationale: The verse argues from God's creative omnipotence to his capacity to judge
    by other means. Preserving the litotes avoids overstating beyond the Greek while
    still making the theological point of divine omnipotence clear.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening source texture.'
- issue: Rendering ἐξ ἀμόρφου ὕλης
  chosen_reading: out of formless matter
  alternative_readings:
  - from unformed matter
  rationale: The phrase reflects the text's Hellenistic-Jewish cosmological idiom.
    The translation preserves the wording without importing a full doctrinal claim
    about creation ex nihilo, which this verse does not explicitly state.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    never import doctrinal claims the text does not make.'
