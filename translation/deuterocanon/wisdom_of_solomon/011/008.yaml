translation:
  text: You gave them abundant water unexpectedly, showing through their thirst at
    that time how you punished their adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beyond hope' / 'when they had no expectation of it' for 'unexpectedly'
      (ἀνελπίστως).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκας
  chosen: You gave
  alternatives:
  - You provided
  - You granted
  lexicon: LSJ
  rationale: Aorist active of δίδωμι; simple past 'gave' is the most direct and natural
    rendering in context.
- source_word: δαψιλὲς
  chosen: abundant
  alternatives:
  - plentiful
  - copious
  - bountiful
  lexicon: LSJ
  rationale: The adjective conveys lavish quantity. 'Abundant' is clear modern English
    and preserves the sense of plentiful supply without sounding overly formal.
- source_word: ὕδωρ
  chosen: water
  lexicon: LSJ
  rationale: Literal object; no reason to expand beyond the plain sense.
- source_word: ἀνελπίστως
  chosen: unexpectedly
  alternatives:
  - beyond hope
  - when they had not expected it
  - contrary to expectation
  lexicon: LSJ
  rationale: The adverb indicates something occurring contrary to expectation or hope.
    'Unexpectedly' captures the sense idiomatically in English; the stronger nuance
    'beyond hope' is possible but less natural in the sentence.
- source_word: δείξας
  chosen: showing
  alternatives:
  - demonstrating
  - making known
  lexicon: LSJ
  rationale: Aorist participle explaining the manner or accompanying circumstance
    of the gift. 'Showing' preserves the straightforward evidential force.
- source_word: διὰ τοῦ τότε δίψους
  chosen: through their thirst at that time
  alternatives:
  - by means of the thirst they then had
  - through that former thirst
  lexicon: LSJ
  rationale: The phrase points back to the Israelites' earlier thirst as the means
    by which God displayed a contrast. 'At that time' keeps τότε explicit without
    overinterpreting the temporal reference.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  lexicon: LSJ
  rationale: 'Introduces the content of what was shown: the manner in which God punished
    the enemies.'
- source_word: τοὺς ὑπεναντίους
  chosen: their adversaries
  alternatives:
  - their enemies
  - the opposing ones
  lexicon: LSJ
  rationale: The term denotes those set in opposition. 'Adversaries' is slightly more
    formal and fits the elevated style of Wisdom while remaining readable. 'Their'
    is supplied from context, referring to the people just mentioned.
- source_word: ἐκόλασας
  chosen: you punished
  alternatives:
  - you chastised
  - you afflicted
  lexicon: LSJ
  rationale: κολάζω here refers to punitive action against the opponents. 'Punished'
    is the clearest and least euphemistic rendering.
