theological_decisions:
- issue: Referent of the contrast between 'them' and 'their adversaries'
  chosen_reading: '''Them'' refers to God''s people, and ''their adversaries'' refers
    to the Egyptians/opponents whom God punished.'
  alternative_readings:
  - More generic contrast between the righteous and their opponents
  rationale: The immediate context in Wisdom 11 contrasts God's provision for Israel
    with punishment on their enemies. The English keeps the pronouns while making
    the adversarial relation explicit.
