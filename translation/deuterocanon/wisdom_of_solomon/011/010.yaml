theological_decisions:
- issue: Differentiated divine treatment of two groups
  chosen_reading: The verse contrasts God's fatherly corrective testing of 'these'
    with his kingly judicial examination and condemnation of 'those.'
  alternative_readings:
  - Both clauses could be flattened into general 'testing,' minimizing the distinction
    between paternal discipline and punitive judgment.
  rationale: The Greek uses distinct imagery and verbs in each clause, and the translation
    preserves that theological tension rather than harmonizing them. This fits the
    book's contrast between Israel's discipline and Egypt's punishment.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it.
