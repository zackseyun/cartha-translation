translation:
  text: For these you tested by admonishing them as a father, but those you examined
    by condemning them as a stern king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'warning them as a father' for 'admonishing them as a father.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as a harsh king' for 'as a stern king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτους μὲν ... ἐκείνους δὲ
  chosen: these ... those
  alternatives:
  - the one group ... the other group
  lexicon: LSJ
  rationale: Preserves the explicit contrast between Israel and the Egyptians in concise
    English without over-specifying beyond the Greek demonstratives.
- source_word: ὡς πατὴρ
  chosen: as a father
  alternatives:
  - like a father
  lexicon: LSJ
  rationale: Retains the simile and paternal imagery directly. 'As a father' is natural
    and close to the Greek.
- source_word: νουθετῶν
  chosen: admonishing
  alternatives:
  - instructing
  - warning
  - disciplining
  lexicon: LSJ
  rationale: The participle conveys corrective instruction or warning rather than
    mere teaching. 'Admonishing' best preserves the moral-corrective sense without
    overstating punitive discipline.
- source_word: ἐδοκίμασας
  chosen: you tested
  alternatives:
  - you proved
  - you tried
  lexicon: LSJ
  rationale: Conveys examination of character or quality. 'Tested' is idiomatic and
    fits the wilderness-testing context.
- source_word: ἀπότομος
  chosen: stern
  alternatives:
  - harsh
  - severe
  - relentless
  lexicon: LSJ
  rationale: The adjective denotes severity or uncompromising sharpness. 'Stern' preserves
    royal severity in readable modern English without sounding excessively colloquial.
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - ruler
  lexicon: LSJ
  rationale: The basic and contextually appropriate sense is 'king'; there is no reason
    to generalize it.
- source_word: καταδικάζων
  chosen: condemning
  alternatives:
  - passing sentence on
  - judging against
  lexicon: LSJ
  rationale: The participle indicates adverse judicial judgment. 'Condemning' captures
    the forensic and punitive force succinctly.
- source_word: ἐξήτασας
  chosen: you examined
  alternatives:
  - you investigated
  - you scrutinized
  - you tested
  lexicon: LSJ
  rationale: Keeps a distinction from ἐδοκίμασας in the first clause. The verb suggests
    close inquiry or scrutiny; 'examined' is clear and preserves the parallelism.
