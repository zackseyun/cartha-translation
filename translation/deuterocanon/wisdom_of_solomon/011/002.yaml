- issue: Exodus-wilderness imagery
  chosen_reading: Retain concrete travel language without importing additional theological
    interpretation.
  alternative_readings:
  - Render more interpretively as 'they camped in the desert wilderness'
  rationale: The verse alludes to Israel's wilderness journey, but the Greek itself
    is descriptive rather than overtly theological. The translation preserves the
    historical imagery without adding interpretive freight.
