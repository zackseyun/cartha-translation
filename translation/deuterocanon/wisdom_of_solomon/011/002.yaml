translation:
  text: They traveled through an uninhabited wilderness, and in trackless places they
    pitched tents;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διώδευσαν
  chosen: They traveled through
  alternatives:
  - They passed through
  - They journeyed through
  lexicon: LSJ
  rationale: The compound verb conveys movement through a region rather than merely
    arriving at it. 'Traveled through' is natural modern English and preserves the
    sense of passing across the wilderness.
- source_word: ἔρημον
  chosen: wilderness
  alternatives:
  - desert
  - waste
  lexicon: LSJ
  rationale: ἔρημος can denote desert or wilderness. 'Wilderness' fits the Exodus
    setting well and avoids over-specifying a sandy desert landscape where the Greek
    more broadly indicates a desolate region.
- source_word: ἀοίκητον
  chosen: uninhabited
  alternatives:
  - unsettled
  - without inhabitants
  lexicon: LSJ
  rationale: The adjective straightforwardly means not inhabited. 'Uninhabited' is
    concise and idiomatic in English.
- source_word: ἀβάτοις
  chosen: trackless places
  alternatives:
  - pathless places
  - inaccessible places
  - untrodden places
  lexicon: LSJ
  rationale: The term can mean inaccessible or not to be trodden. In this travel context,
    'trackless places' best captures terrain without roads or beaten paths, matching
    the wilderness journey imagery.
- source_word: ἔπηξαν
  chosen: they pitched
  alternatives:
  - they set up
  - they fixed
  lexicon: LSJ
  rationale: With σκηνάς as object, the idiomatic sense is setting up tents. 'Pitched'
    is the standard natural English collocation.
- source_word: σκηνάς
  chosen: tents
  alternatives:
  - tabernacles
  - encampments
  lexicon: LSJ
  rationale: The plural noun here refers to portable dwellings used in travel. 'Tents'
    is the plain and contextually appropriate rendering; 'tabernacles' would sound
    archaic and misleading here.
