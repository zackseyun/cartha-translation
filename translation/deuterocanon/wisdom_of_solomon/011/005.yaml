theological_decisions:
- issue: Instrumental reversal motif in divine action
  chosen_reading: The verse is rendered to emphasize that the same means served both
    judgment on enemies and benefit for God's people.
  alternative_readings:
  - A looser rendering could generalize the contrast without preserving the repeated
    instrumental phrasing.
  rationale: The Greek repetition διʼ ὧν ... διὰ τούτων is central to the theology
    of reversal in this section. Preserving it reflects the text's literary and theological
    force without adding doctrinal interpretation beyond the verse.
