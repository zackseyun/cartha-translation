translation:
  text: For by the very things through which their enemies were punished, they themselves,
    when in need, were benefited.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when they were at a loss' or 'in distress.' The Greek participle can
      suggest perplexity, helplessness, or need.
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ ὧν ... διὰ τούτων
  chosen: by the very things through which ... by these same things
  alternatives:
  - through which ... through these things
  - by what means ... by these means
  lexicon: LSJ
  rationale: 'The repeated prepositional phrasing highlights ironic reversal and instrumentality:
    the same means that punished the enemies became the means of benefit for God''s
    people. ''The very things'' brings out the emphatic correspondence without over-paraphrasing.'
- source_word: ἐκολάσθησαν
  chosen: were punished
  alternatives:
  - were chastised
  - were penalized
  lexicon: BDAG
  rationale: The verb denotes punitive treatment. 'Were punished' is the clearest
    modern English rendering and fits the context of divine retribution on enemies.
- source_word: οἱ ἐχθροὶ αὐτῶν
  chosen: their enemies
  alternatives:
  - the enemies of them
  lexicon: BDAG
  rationale: Straightforward possessive rendering in natural English.
- source_word: αὐτοὶ
  chosen: they themselves
  alternatives:
  - they
  - they in turn
  lexicon: BDAG
  rationale: The pronoun is emphatic, contrasting God's people with their enemies.
    'They themselves' preserves that emphasis.
- source_word: ἀποροῦντες
  chosen: when in need
  alternatives:
  - being at a loss
  - in perplexity
  - in want
  lexicon: LSJ
  rationale: The participle can denote being at a loss, in difficulty, or in want.
    In this context of material provision through the same element that punished the
    Egyptians, 'when in need' best captures the situational sense without narrowing
    it to mere mental perplexity.
- source_word: εὐεργετήθησαν
  chosen: were benefited
  alternatives:
  - were treated kindly
  - received a benefit
  - were helped
  lexicon: BDAG
  rationale: The passive indicates receiving benefaction. 'Were benefited' preserves
    the formal contrast with 'were punished' and keeps the focus on the result rather
    than specifying the agent beyond the context.
