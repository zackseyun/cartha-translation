translation:
  text: But you spare all things, because they are yours, O Master who loves life.
    For your imperishable spirit is in all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lover of souls.' The Greek φιλόψυχε can be understood more narrowly
      in relation to living beings or souls, but here it is rendered broadly because
      the context speaks of God's care for all creation.
    reason: lexical_alternative
lexical_decisions:
- source_word: φείδῃ
  chosen: you spare
  alternatives:
  - you have mercy on
  - you refrain from destroying
  lexicon: BDAG
  rationale: The verb means to spare or refrain from harming. 'You spare' is concise
    and preserves the direct sense in context, where God's restraint toward creation
    is in view.
- source_word: πάντων
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: LSJ
  rationale: The genitive plural with φείδῃ naturally refers to the totality of created
    things. 'All things' is slightly more formal and fits the cosmic scope of the
    verse.
- source_word: σά ἐστιν
  chosen: they are yours
  alternatives:
  - it is yours
  - all belongs to you
  lexicon: LSJ
  rationale: Although the Greek is compact, the sense is possessive and refers back
    to the plural 'all things.' 'They are yours' makes the English agreement explicit
    and natural.
- source_word: Δέσποτα
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: Δέσποτα denotes an owner or absolute master. 'Master' best preserves
    the lexical force here; 'Lord' would blur the distinction from κύριος, and 'Sovereign'
    is interpretive.
- source_word: φιλόψυχε
  chosen: who loves life
  alternatives:
  - lover of souls
  - life-loving one
  lexicon: LSJ
  rationale: The compound literally conveys loving life/soul. In this context of God's
    care for all creation, 'who loves life' communicates the broad creational sense
    more clearly than 'lover of souls,' which could narrow the reference to human
    souls.
- source_word: ἄφθαρτόν
  chosen: imperishable
  alternatives:
  - incorruptible
  - undying
  lexicon: BDAG
  rationale: '''Imperishable'' is standard, clear modern English for what is not subject
    to decay or corruption, and fits the theological register of the verse.'
- source_word: πνεῦμά
  chosen: spirit
  alternatives:
  - breath
  lexicon: BDAG
  rationale: In this context, πνεῦμα refers to God's animating presence rather than
    mere breath. 'Spirit' best preserves the theological and literary force.
- source_word: ἐν πᾶσιν
  chosen: in all things
  alternatives:
  - in everything
  - in all
  lexicon: LSJ
  rationale: The phrase matches the broad scope of the verse and echoes the earlier
    πάντων. 'In all things' preserves the universal creational reference.
