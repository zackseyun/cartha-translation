theological_decisions:
- issue: Rendering of φιλόψυχε in relation to divine regard for creation
  chosen_reading: who loves life
  alternative_readings:
  - lover of souls
  rationale: The immediate context is God's sparing of all created things because
    they belong to him, followed by the statement that his imperishable spirit is
    in all things. This favors a broad creational sense rather than a narrower anthropological
    one.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
- issue: Rendering of Δέσποτα
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: The project default for κύριος is 'Lord,' but this verse uses Δέσποτα,
    a distinct title. Translating it as 'Master' preserves lexical transparency and
    avoids collapsing distinct Greek titles into one English term.
  doctrine_reference: Translate titles; transliterate names
