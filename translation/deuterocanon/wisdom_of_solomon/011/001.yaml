theological_decisions:
- issue: Implied subject of the verb
  chosen_reading: Rendered simply as 'He prospered,' leaving the antecedent to context
    rather than supplying 'God' in the text.
  alternative_readings:
  - God prospered
  - The Lord prospered
  rationale: Greek commonly leaves the subject implicit when context supplies it.
    Capitalized 'He' reflects the contextual divine subject while avoiding insertion
    of a noun absent from the source text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text states without importing more explicit
    doctrinal wording.'
- issue: Identity of the prophet
  chosen_reading: Kept generic as 'a holy prophet' in the main text.
  alternative_readings:
  - Moses
  - his holy prophet
  rationale: Although the narrative context points to Moses, the Greek wording does
    not name him. The translation preserves the text's own level of specificity.
  doctrine_reference: 'Translation philosophy: never paraphrase beyond what the source
    text warrants.'
