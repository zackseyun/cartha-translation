lexical_decisions:
- source_word: Εὐόδωσεν
  chosen: prospered
  alternatives:
  - made successful
  - guided successfully
  lexicon: LSJ
  rationale: The verb εὐοδόω commonly means to cause to prosper or grant success.
    'Prospered' preserves the causative sense and keeps God as the implied subject
    from the surrounding context, without over-expanding to 'guided' unless context
    demands travel imagery.
- source_word: τὰ ἔργα
  chosen: their works
  alternatives:
  - their deeds
  - their undertakings
  lexicon: LSJ
  rationale: ἔργα is broad and can mean works, deeds, or undertakings. 'Works' is
    the most direct rendering and fits the summary style of the verse, while allowing
    the reference to Israel's actions/journey under divine aid.
- source_word: ἐν χειρὶ
  chosen: by the hand of
  alternatives:
  - through
  - under the guidance of
  lexicon: LSJ
  rationale: The idiom ἐν χειρὶ literally means 'in/by the hand of' and often denotes
    agency or instrumentality. 'By the hand of' preserves the biblical idiom and the
    mediated agency of the prophet.
- source_word: προφήτου ἁγίου
  chosen: a holy prophet
  alternatives:
  - his holy prophet
  - a sacred prophet
  lexicon: LSJ
  rationale: The Greek lacks the article, so 'a holy prophet' is formally closest.
    In context the referent is likely Moses, but the text itself does not specify
    the name here, so the translation should not import it into the main text.
