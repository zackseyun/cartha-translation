translation:
  text: For the whole world before you is like a speck on the scales, and like a drop
    of morning dew that falls upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the turn of the balance' or 'like a tiny weight on the scales';
      the Greek image emphasizes extreme slightness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥοπὴ
  chosen: a speck
  alternatives:
  - the turn of the scale
  - a small weight
  - a grain
  lexicon: LSJ
  rationale: In the phrase ὡς ῥοπὴ ἐκ πλαστίγγων, the image is of something extremely
    slight in a balance. 'Speck' communicates the tiny, negligible quantity in natural
    English better than a more wooden 'turn of the scale,' while preserving the comparison's
    force.
- source_word: πλαστίγγων
  chosen: the scales
  alternatives:
  - balance pans
  - a balance
  lexicon: LSJ
  rationale: The plural refers to the pans or apparatus of a balance. 'The scales'
    is idiomatic English and preserves the weighing imagery.
- source_word: ὅλος ὁ κόσμος
  chosen: the whole world
  alternatives:
  - all the world
  - the entire universe
  lexicon: LSJ
  rationale: κόσμος here denotes the ordered world as a totality. 'The whole world'
    is the most natural rendering and adequately conveys the comprehensive scope without
    over-specifying 'universe.'
- source_word: ἐναντίον σου
  chosen: before you
  alternatives:
  - in your sight
  - in comparison with you
  lexicon: LSJ
  rationale: The phrase literally means 'before you' or 'in your presence.' 'Before
    you' keeps the relational and comparative sense, allowing the similes to express
    insignificance relative to God.
- source_word: ῥανὶς
  chosen: a drop
  alternatives:
  - a dew-drop
  - a tiny drop
  lexicon: LSJ
  rationale: The noun means a drop. Because δρόσου already supplies 'dew,' the concise
    'a drop' avoids redundancy while preserving the image.
- source_word: δρόσου ὄρθρινὴ
  chosen: of morning dew
  alternatives:
  - of early dew
  - of dawn dew
  lexicon: LSJ
  rationale: ὄρθρινὴ qualifies the dew as belonging to early morning. 'Morning dew'
    is clear, idiomatic, and faithful to the temporal nuance.
- source_word: κατελθοῦσα ἐπὶ γῆν
  chosen: that falls upon the earth
  alternatives:
  - having come down upon the earth
  - descending on the ground
  lexicon: LSJ
  rationale: The participle literally means 'having come down.' In English, dew naturally
    'falls' or 'comes down.' 'That falls upon the earth' preserves the imagery in
    readable modern English.
