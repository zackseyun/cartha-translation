theological_decisions:
- issue: Whether πνεῦμα should be rendered as 'spirit' or as a more physical 'breath/wind'
    in this verse
  chosen_reading: Rendered both occurrences as 'breath' in the main text
  alternative_readings:
  - spirit
  - wind
  rationale: The immediate imagery includes falling, pursuit, and especially being
    'winnowed,' which favors a force like breath/wind. Rendering as 'Spirit' would
    suggest a more explicitly personal pneumatological reference than the Greek requires
    here. Using 'breath' also preserves literary resonance with divine power without
    over-theologizing the term.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
- issue: Whether δίκη should be rendered as 'justice' or 'punishment'
  chosen_reading: justice
  alternative_readings:
  - punishment
  - judgment
  rationale: The text personifies δίκη as an active pursuer. 'Justice' better preserves
    that personified moral order, while 'punishment' narrows the sense to the penalty
    itself. The context certainly includes punitive force, so alternatives are preserved
    in a footnote.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve significant lexical/theological
    decisions.'
