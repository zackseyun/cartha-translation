theological_decisions:
- issue: Measure-for-measure divine justice
  chosen_reading: The verse states that punishment comes by means of the same kinds
    of things through which sin was committed.
  alternative_readings:
  - A more general statement that sinners are punished in connection with their sins,
    without stressing exact correspondence
  rationale: The repeated διά construction (διʼ ὧν ... διὰ τούτων) strongly signals
    a reciprocal or fitting correspondence between sin and punishment. The translation
    preserves that theological logic without expanding beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
