translation:
  text: so that they might know that by the very things through which a person sins,
    by these he is punished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through the very things by which someone sins, through these things
      he is punished.' The Greek repeats the same preposition to stress the correspondence
      between sin and punishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause's purposive force.
- source_word: γνῶσιν
  chosen: they might know
  alternatives:
  - they may know
  - they would know
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα; 'might know' conveys intended result without
    overstating certainty.
- source_word: διʼ ὧν
  chosen: by the very things through which
  alternatives:
  - through which
  - by what things
  lexicon: BDAG
  rationale: The preposition διά with the relative pronoun is instrumental/mediating.
    Adding 'the very things' brings out the emphatic correspondence between means
    of sin and means of punishment expressed by the repeated διά...τούτων structure.
- source_word: τις
  chosen: a person
  alternatives:
  - someone
  - anyone
  - one
  lexicon: BDAG
  rationale: Indefinite singular referring generically to a human subject. 'A person'
    is clear modern English and avoids an awkward bare 'one' while preserving the
    generic sense.
- source_word: ἁμαρτάνει
  chosen: sins
  alternatives:
  - does wrong
  - commits sin
  lexicon: BDAG
  rationale: The verb directly denotes sinning/missing the mark. 'Sins' preserves
    the moral-theological force better than the flatter 'does wrong.'
- source_word: διὰ τούτων
  chosen: by these
  alternatives:
  - through these things
  - by them
  lexicon: BDAG
  rationale: Keeps the concise instrumental repetition of the Greek and highlights
    the measure-for-measure logic. 'By these' reads naturally when paired with the
    earlier fuller phrase.
- source_word: κολάζεται
  chosen: he is punished
  alternatives:
  - is tormented
  - is chastised
  - is disciplined
  lexicon: BDAG
  rationale: In this context the verb denotes punitive suffering/judgment rather than
    corrective discipline alone. 'Is punished' best fits the Wisdom context of retributive
    justice.
