theological_decisions:
- issue: Nature of the suffering expressed by ἐτρύχοντο
  chosen_reading: general affliction/distress rather than a narrower 'torment'
  alternative_readings:
  - were tormented
  - were distressed
  rationale: The verse states that both groups suffered similarly; the Greek verb
    can suggest being worn down or distressed. A broader rendering avoids importing
    a more specific theological picture of punitive torment than the text itself requires.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
