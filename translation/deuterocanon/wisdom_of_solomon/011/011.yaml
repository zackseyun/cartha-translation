translation:
  text: And both those absent and those present were afflicted alike;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were distressed' or 'were tormented'; the Greek verb conveys being worn
      down or afflicted.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόντες
  chosen: those absent
  alternatives:
  - those away
  - those not present
  lexicon: LSJ
  rationale: The participle from ἄπειμι denotes being away or absent. 'Those absent'
    is concise and preserves the contrast with παρόντες.
- source_word: παρόντες
  chosen: those present
  alternatives:
  - those at hand
  - those there
  lexicon: LSJ
  rationale: The participle from πάρειμι means being present. 'Those present' keeps
    the formal antithesis with ἀπόντες.
- source_word: ὁμοίως
  chosen: alike
  alternatives:
  - equally
  - in the same way
  lexicon: LSJ
  rationale: ὁμοίως marks equal manner or degree. 'Alike' is idiomatic and compact
    in English while preserving the sense of equal experience.
- source_word: ἐτρύχοντο
  chosen: were afflicted
  alternatives:
  - were distressed
  - were tormented
  - were worn down
  lexicon: LSJ
  rationale: The imperfect middle/passive of τρύχω here conveys ongoing suffering
    or being worn/distressed. 'Were afflicted' fits the context of divine plagues/judgment
    without over-specifying physical torture, while preserving the durative force
    with 'were'.
