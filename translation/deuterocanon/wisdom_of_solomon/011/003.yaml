translation:
  text: They stood against enemies and defended against foes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'withstood enemies and repelled foes.' The Greek uses two near-synonymous
      pairs for hostile opponents and defensive resistance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντέστησαν
  chosen: stood against
  alternatives:
  - withstood
  - resisted
  - opposed
  lexicon: BDAG
  rationale: Aorist of ἀνθίστημι, meaning to set oneself against or resist. 'Stood
    against' preserves the concrete adversarial sense without overinterpreting the
    manner of conflict.
- source_word: πολεμίοις
  chosen: enemies
  alternatives:
  - adversaries
  - those at war with them
  lexicon: LSJ
  rationale: Dative plural of πολέμιος, commonly 'enemy' in a hostile or military
    sense. 'Enemies' is the most natural modern English rendering.
- source_word: ἠμύναντο
  chosen: defended themselves from
  alternatives:
  - warded off
  - repelled
  - fought off
  lexicon: LSJ
  rationale: Middle aorist of ἀμύνω can mean defend oneself, ward off, or repel. The
    middle voice supports a reflexive nuance, so 'defended themselves from' best reflects
    the form and avoids overstating offensive action.
- source_word: ἐχθρούς
  chosen: foes
  alternatives:
  - enemies
  lexicon: BDAG
  rationale: ἐχθρός also means 'enemy.' Rendering it as 'foes' preserves the parallelism
    with πολεμίοις while avoiding awkward repetition of the same English word twice
    in a very short clause.
