theological_decisions:
- issue: Nature of Israel's suffering versus the ungodly's suffering
  chosen_reading: Rendered παιδευόμενοι as corrective 'being disciplined' and contrasted
    it with the ungodly 'being judged in wrath' and 'tormented.'
  alternative_readings:
  - Rendered more neutrally as 'being instructed' or more punitively as 'being chastened'
  rationale: The verse itself contrasts merciful treatment of the righteous with wrathful
    judgment of the ungodly. 'Disciplined' preserves the theological distinction without
    denying that the testing involved suffering.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
