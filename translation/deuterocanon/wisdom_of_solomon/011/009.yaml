translation:
  text: For when they were tested, though being disciplined with mercy, they learned
    how the ungodly were tormented while being judged in wrath;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were tried'; the Greek can denote testing or proving. It does not primarily
      mean enticement to sin in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'being instructed' or 'being chastened' for 'being disciplined'; the
      Greek term can include education, training, and corrective discipline.
    reason: lexical_alternative
  - marker: c
    text: Or 'the wicked' for 'the ungodly'; the Greek especially highlights impiety
      toward God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειράσθησαν
  chosen: were tested
  alternatives:
  - were tried
  - were tempted
  lexicon: BDAG
  rationale: πειράζω here refers to undergoing a proving or testing experience, not
    primarily enticement to sin. 'Were tested' is natural English and fits the contrast
    with the punishment of the ungodly.
- source_word: καίπερ
  chosen: though
  alternatives:
  - although
  - even though
  lexicon: LSJ
  rationale: Marks concession. 'Though' keeps the sentence compact while preserving
    the concessive force.
- source_word: ἐν ἐλέει
  chosen: with mercy
  alternatives:
  - in mercy
  - mercifully
  lexicon: BDAG
  rationale: The dative phrase expresses the manner or sphere of the discipline. 'With
    mercy' is idiomatic in English and preserves the substantive force of ἔλεος.
- source_word: παιδευόμενοι
  chosen: being disciplined
  alternatives:
  - being instructed
  - being chastened
  lexicon: BDAG
  rationale: παιδεύω can mean educate, train, or discipline. In this context of divine
    corrective treatment contrasted with punitive wrath, 'being disciplined' best
    captures corrective rather than merely pedagogical force.
- source_word: ἔγνωσαν
  chosen: they learned
  alternatives:
  - they came to know
  - they understood
  lexicon: BDAG
  rationale: Aorist of γινώσκω here indicates coming to know by experience. 'They
    learned' communicates experiential realization clearly.
- source_word: ἐν ὀργῇ
  chosen: in wrath
  alternatives:
  - with wrath
  - under wrath
  lexicon: BDAG
  rationale: Retains the compact prepositional phrase and the theological weight of
    ὀργή as divine wrath.
- source_word: κρινόμενοι
  chosen: being judged
  alternatives:
  - under judgment
  - being condemned
  lexicon: BDAG
  rationale: κρίνω here denotes undergoing judgment. 'Being judged' is the most direct
    rendering and avoids importing the stronger finality of 'condemned' beyond the
    text.
- source_word: ἀσεβεῖς
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: BDAG
  rationale: ἀσεβής emphasizes irreverence and impiety toward God. 'The ungodly' preserves
    that religious-moral dimension better than the broader 'wicked'.
- source_word: ἐβασανίζοντο
  chosen: were tormented
  alternatives:
  - were tortured
  - were afflicted
  lexicon: BDAG
  rationale: βασανίζω can denote severe torment or torture. 'Were tormented' conveys
    intense suffering without over-specifying the mode.
