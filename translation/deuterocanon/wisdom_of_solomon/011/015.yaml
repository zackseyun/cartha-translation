theological_decisions:
- issue: Moral-religious force of ἀδικία in a wisdom context
  chosen_reading: their unrighteousness
  alternative_readings:
  - their injustice
  - their wrongdoing
  rationale: The verse links corrupt reasoning to idolatrous worship and divine judgment.
    'Unrighteousness' best preserves the theological-moral register rather than narrowing
    the term to social injustice alone.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη/related moral terminology should preserve
    theological weight where context warrants'
- issue: Rendering repeated ἄλογος language
  chosen_reading: irrational ... irrational
  alternative_readings:
  - mindless ... brute
  - unreasoning ... unreasoning
  rationale: 'The Greek intentionally repeats the same root to create irony: those
    led astray into worshiping irrational creatures are punished by irrational animals.
    Preserving that repetition is important to the verse''s rhetoric.'
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
