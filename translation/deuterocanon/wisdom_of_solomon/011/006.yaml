translation:
  text: Instead of the spring of an ever-flowing river, they were troubled by muddy
    blood,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in place of a spring of an ever-flowing river.' The Greek genitive construction
      can be rendered more literally, but 'an ever-flowing river’s spring' is smoother
      in English.
    reason: lexical_alternative
  - marker: b
    text: '''Muddy blood'' renders a Greek expression that combines blood with the
      idea of muddiness or mire, emphasizing foul, polluted water rather than blood
      in an abstract sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντί
  chosen: Instead of
  alternatives:
  - in place of
  - for
  lexicon: LSJ
  rationale: Marks substitution or exchange; here it introduces what they had in place
    of the expected water source.
- source_word: πηγῆς
  chosen: spring
  alternatives:
  - fountain
  - source
  lexicon: LSJ
  rationale: Refers to a spring or fountainhead. 'Spring' is natural modern English
    and fits the genitive construction with river.
- source_word: ἀενάου
  chosen: ever-flowing
  alternatives:
  - perpetual
  - unceasing
  lexicon: LSJ
  rationale: Describes something continually flowing. 'Ever-flowing' preserves the
    vividness without sounding archaic.
- source_word: ποταμοῦ
  chosen: river
  alternatives:
  - stream
  lexicon: LSJ
  rationale: Standard sense is 'river'; paired with πηγῆς it yields 'river’s spring'
    or 'spring of a river.'
- source_word: αἵματι
  chosen: blood
  lexicon: LSJ
  rationale: Instrumental/dative element describing the substance involved in the
    disturbance; the plague allusion favors the concrete 'blood.'
- source_word: λυθώδει
  chosen: muddy
  alternatives:
  - mud-like
  - filthy
  - miry
  lexicon: LSJ
  rationale: The adjective conveys muddiness or mire-like foulness. 'Muddy' is concise
    and readable, while preserving the image of polluted liquid rather than pure blood
    alone.
- source_word: ταραχθέντες
  chosen: they were troubled
  alternatives:
  - they were thrown into confusion
  - they were disturbed
  lexicon: LSJ
  rationale: A passive participle meaning disturbed or agitated. 'They were troubled'
    works idiomatically in English and can describe both the physical and experiential
    disruption caused by the plague.
