theological_decisions:
- issue: Allusion to the Egyptian plague narrative and whether to make the object
    explicit beyond the Greek wording
  chosen_reading: 'Keep the wording compressed and allusive: ''they were troubled
    by muddy blood'' without adding ''water'' or ''Nile.'''
  alternative_readings:
  - they were troubled with water turned to muddy blood
  - they were troubled by the river turned to muddy blood
  rationale: The Greek is elliptical and poetic, assuming the Exodus background. Expanding
    the object would clarify but would also import words not present in this clause.
    The translation preserves the allusion without over-paraphrasing.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
