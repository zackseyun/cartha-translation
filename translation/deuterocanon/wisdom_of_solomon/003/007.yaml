translation:
  text: and at the time of their visitation they will shine forth, and they will run
    about like sparks through stubble;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the time when they are visited'—that is, when God intervenes to inspect,
      judge, or vindicate.
    reason: lexical_alternative
  - marker: b
    text: Or 'like sparks through dry straw' or 'through reeds'; the Greek image is
      of fire racing rapidly through combustible growth.
    reason: lexical_alternative
lexical_decisions:
- source_word: καιρῷ
  chosen: time
  alternatives:
  - season
  - appointed time
  lexicon: LSJ
  rationale: καιρός commonly denotes a fitting or appointed time. 'Time' is natural
    English here and leaves the phrase open-ended while still conveying a decisive
    moment.
- source_word: ἐπισκοπῆς
  chosen: visitation
  alternatives:
  - oversight
  - inspection
  - visitation for judgment
  lexicon: LSJ
  rationale: ἐπισκοπή can denote visitation or inspection, often with the sense of
    divine intervention. 'Visitation' preserves the theological breadth of the Greek
    without over-specifying either mercy or judgment in the main text.
- source_word: ἀναλάμψουσιν
  chosen: will shine forth
  alternatives:
  - will flash out
  - will gleam
  lexicon: LSJ
  rationale: The verb conveys bright shining or flashing up. 'Will shine forth' is
    idiomatic and preserves the vivid emergence implied by ἀνά-.
- source_word: σπινθῆρες
  chosen: sparks
  alternatives:
  - firebrands
  - embers
  lexicon: LSJ
  rationale: The basic image is small fiery sparks. 'Sparks' is the clearest modern
    equivalent.
- source_word: καλάμῃ
  chosen: stubble
  alternatives:
  - reeds
  - dry straw
  lexicon: LSJ
  rationale: Although κάλαμος often means reed, in this simile the singular καλάμη
    refers to stalks/stubble or dry straw-like growth through which sparks race. 'Stubble'
    best fits the combustible imagery and standard Hellenistic usage in this context.
- source_word: διαδραμοῦνται
  chosen: will run about
  alternatives:
  - will dart through
  - will race about
  lexicon: LSJ
  rationale: The verb suggests swift movement through or across an area. 'Will run
    about' stays close to the form while remaining readable; the following phrase
    supplies the image of movement through stubble.
