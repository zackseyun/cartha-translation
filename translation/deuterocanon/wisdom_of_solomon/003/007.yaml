theological_decisions:
- issue: Meaning of 'the time of their visitation'
  chosen_reading: A time of divine intervention concerning the righteous, left broad
    in the main text
  alternative_readings:
  - the time when God visits to vindicate them
  - the time of judgment/inspection
  rationale: The immediate context concerns the vindication of the righteous after
    apparent suffering. ἐπισκοπή can include judicial inspection, but the verse itself
    does not force a narrower gloss than divine visitation. Preserving 'visitation'
    keeps the theological tension rather than resolving it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
