theological_decisions:
- issue: Whether to make explicit that the clause reports human perception rather
    than objective reality
  chosen_reading: was thought to be ruin
  alternative_readings:
  - was ruin
  - seemed a disaster
  rationale: The wider sentence in context contrasts what fools considered with the
    true state of the righteous. Although this half-verse lacks an explicit verb of
    seeming, English benefits from carrying forward the implied perspective to avoid
    falsely stating the perception as fact. This preserves the theological contrast
    already established in the passage.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
