translation:
  text: and their departure from us was thought to be ruin, but they are in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their departure from us seemed a disaster.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'in peace,' a phrase that can suggest not only absence of conflict
      but also rest and well-being.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορεία
  chosen: departure
  alternatives:
  - journey
  - going
  - passing away
  lexicon: LSJ
  rationale: In this context, referring to the righteous who have died, πορεία denotes
    their going away from the living. 'Departure' is natural English and preserves
    the metaphor of going without over-paraphrasing to 'death,' which the Greek does
    not state in this clause.
- source_word: ἀφʼ ἡμῶν
  chosen: from us
  alternatives:
  - away from us
  - in our view
  lexicon: LSJ
  rationale: 'The phrase is spatially relational: their departure is from the perspective
    of those left behind. ''From us'' keeps the Greek wording. The broader context
    already supplies the human viewpoint, so ''in our view'' would interpret rather
    than translate.'
- source_word: σύντριμμα
  chosen: ruin
  alternatives:
  - destruction
  - crushing
  - shattering
  lexicon: LSJ
  rationale: σύντριμμα can denote crushing or ruin. Here it describes how their departure
    was regarded by observers. 'Ruin' fits idiomatic English after 'was thought to
    be' and conveys perceived calamity without implying annihilation.
- source_word: οἱ δὲ
  chosen: but they
  alternatives:
  - yet they
  - however they
  lexicon: LSJ
  rationale: The contrastive δέ marks a sharp reversal between human perception and
    reality. 'But they' is concise and preserves the contrast.
- source_word: ἐν εἰρήνῃ
  chosen: in peace
  alternatives:
  - at peace
  - in well-being
  lexicon: LSJ
  rationale: The prepositional phrase is best kept fairly literal. 'In peace' preserves
    the Greek expression and its theological breadth, including rest, wholeness, and
    security. 'At peace' is possible but slightly more interpretive and idiomatic.
