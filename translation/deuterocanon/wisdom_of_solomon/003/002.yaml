- issue: Metaphorical expression for death in ἔξοδος
  chosen_reading: their departure
  alternative_readings:
  - their death
  - their end
  rationale: The verse contrasts human misperception with the true state of the righteous
    in the surrounding context. Preserving 'departure' keeps the text's metaphorical
    nuance and avoids flattening it into a bare statement of death.
