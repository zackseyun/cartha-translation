translation:
  text: In the eyes of fools they seemed to have died, and their departure was regarded
    as calamity,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was considered a disaster' for 'was regarded as calamity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδοξαν
  chosen: they seemed
  alternatives:
  - they appeared
  - they were thought
  lexicon: BDAG
  rationale: Aorist of δοκέω here conveys appearance or seeming from an observer's
    perspective, not an objective statement. 'They seemed' is concise and preserves
    the contrast with the following divine perspective in context.
- source_word: ἐν ὀφθαλμοῖς ἀφρόνων
  chosen: in the eyes of fools
  alternatives:
  - to fools
  - in the sight of the foolish
  lexicon: BDAG
  rationale: The idiom ἐν ὀφθαλμοῖς is naturally rendered 'in the eyes of.' ἄφρων
    denotes the foolish or senseless; 'fools' is direct, readable, and preserves the
    moral-spiritual force.
- source_word: τεθνάναι
  chosen: to have died
  alternatives:
  - dead
  - to die
  lexicon: BDAG
  rationale: Perfect infinitive of θνῄσκω indicates the state resulting from death.
    English idiom after 'seemed' is best expressed as 'to have died.'
- source_word: ἐλογίσθη
  chosen: was regarded
  alternatives:
  - was considered
  - was reckoned
  lexicon: BDAG
  rationale: λογίζομαι here denotes evaluation or judgment by observers. 'Was regarded'
    fits the passive sense and reads naturally in English.
- source_word: ἡ ἔξοδος αὐτῶν
  chosen: their departure
  alternatives:
  - their death
  - their going out
  - their end
  lexicon: BDAG
  rationale: ἔξοδος literally means 'departure' or 'exit.' Rendering it as 'departure'
    preserves the metaphorical and potentially softened expression for death without
    over-interpreting it as simply 'death.'
- source_word: κακοῦ
  chosen: calamity
  alternatives:
  - disaster
  - affliction
  - evil
  lexicon: BDAG
  rationale: Though the supplied Zone 1 text as quoted ends after αὐτῶν with a comma,
    the standard continuation of the clause in this verse is κακοῦ. The sense is that
    their departure was judged to be something disastrous. 'Calamity' captures the
    evaluative force without importing moral evil.
