translation:
  text: And the eunuch who has not worked lawlessness with his hand, nor conceived
    evil things against the Lord, will be given the chosen grace of faith and a more
    delightful inheritance in the temple of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a choice gift of faith,' 'the chosen grace of faithfulness,' or 'the
      choicest grace of trust.' The Greek phrase is compact and allows more than one
      nuance for both 'grace' and 'faith.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a more pleasing portion' or 'a more desirable lot' in the temple of
      the Lord.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐνοῦχος
  chosen: eunuch
  alternatives:
  - castrated man
  lexicon: LSJ
  rationale: The Greek specifically denotes a eunuch, not merely an unmarried or childless
    man. Retaining the concrete term preserves the social and theological force of
    the verse in context.
- source_word: ὁ μὴ ἐργασάμενος
  chosen: who has not worked
  alternatives:
  - who has not done
  - who has not committed
  lexicon: BDAG
  rationale: ἐργάζομαι literally means 'work/do.' 'Has not worked' keeps the verbal
    imagery and pairs naturally with 'with his hand,' while still communicating moral
    action.
- source_word: ἐν χειρὶ
  chosen: with his hand
  alternatives:
  - by hand
  - with his hands
  lexicon: LSJ
  rationale: The singular is present in Greek. The phrase is idiomatic for action
    performed personally; preserving 'hand' keeps the concrete bodily expression.
- source_word: ἀνόμημα
  chosen: lawlessness
  alternatives:
  - crime
  - wicked deed
  - iniquity
  lexicon: LSJ
  rationale: The noun denotes a lawless or unlawful act. 'Lawlessness' preserves the
    moral-legal sense without over-specifying a particular offense.
- source_word: μηδὲ ἐνθυμηθεὶς
  chosen: nor conceived
  alternatives:
  - nor thought
  - nor devised
  lexicon: BDAG
  rationale: The participle refers to inward consideration or devising. 'Conceived'
    captures internal formation of evil thoughts and fits the contrast with outward
    action.
- source_word: κατὰ τοῦ κυρίου πονηρά
  chosen: evil things against the Lord
  alternatives:
  - wicked things against the Lord
  - evil against the Lord
  lexicon: LSJ
  rationale: The phrase indicates hostile evil directed against the Lord. 'Evil things
    against the Lord' is natural English and preserves the object of opposition.
- source_word: δοθήσεται
  chosen: will be given
  alternatives:
  - shall be given
  lexicon: BDAG
  rationale: Simple future passive. 'Will be given' is clear modern English.
- source_word: τῆς πίστεως χάρις ἐκλεκτὴ
  chosen: the chosen grace of faith
  alternatives:
  - a choice gift of faith
  - the elect grace of faith
  - the choicest grace of faithfulness
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per project doctrine. χάρις can mean grace/gift/favor;
    here 'grace' preserves theological resonance. ἐκλεκτή means chosen/choice. The
    genitive relation is somewhat compressed in Greek, so this rendering stays close
    without over-interpreting.
- source_word: κλῆρος
  chosen: inheritance
  alternatives:
  - portion
  - lot
  lexicon: BDAG
  rationale: κλῆρος can mean lot or allotted share. In this reward context, 'inheritance'
    communicates an allotted blessed portion in idiomatic English.
- source_word: ἐν ναῷ Κυρίου
  chosen: in the temple of the Lord
  alternatives:
  - in the sanctuary of the Lord
  lexicon: LSJ
  rationale: ναός refers to the temple/shrine. 'Temple of the Lord' is the most direct
    and recognizable rendering.
- source_word: θυμηρέστερος
  chosen: more delightful
  alternatives:
  - more pleasing
  - more desirable
  - more lovely
  lexicon: LSJ
  rationale: The comparative adjective conveys greater pleasantness or desirability.
    'More delightful' best fits an inheritance/portion and preserves the comparative
    force.
