theological_decisions:
- issue: Rendering φρόνησις in relation to Wisdom terminology
  chosen_reading: understanding
  alternative_readings:
  - prudence
  - wisdom
  rationale: The verse uses φρόνησις rather than σοφία. To avoid collapsing distinct
    Greek terms into the same English word, 'understanding' was chosen while preserving
    the practical-intellectual sense of the noun.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
- issue: Metaphorical structure of fruit/root imagery
  chosen_reading: Preserve both metaphors explicitly
  alternative_readings:
  - Interpretive renderings such as 'the results... are lasting'
  rationale: The Greek presents a balanced proverbial statement with agricultural
    imagery in both halves. Preserving 'fruit' and 'root' maintains the literary texture
    and avoids paraphrase beyond the source text.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
