id: WIS.3.15
reference: Wisdom of Solomon 3:15
source:
  edition: lxx-swete-1909
  text: ἀγαθῶν γὰρ πόνων ὁ καρπὸς εὐκλεής, καὶ ἀδιάπτωτος ἡ ῥίζα τῆς φρονήσεως.
  language: Greek
  pages:
  - 625
  confidence: high
  validation: no_reference
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: For the fruit of good labors is renowned, and the root of understanding does
    not fail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the root of prudence is unfailing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαθῶν
  chosen: good
  alternatives:
  - noble
  - beneficial
  lexicon: LSJ
  rationale: The adjective modifies πόνων and broadly denotes moral or positive quality.
    'Good' is the most natural and sufficiently broad English equivalent here.
- source_word: πόνων
  chosen: labors
  alternatives:
  - toils
  - efforts
  lexicon: LSJ
  rationale: πόνος can denote toil, labor, or painful effort. 'Labors' preserves the
    sense of strenuous work without overemphasizing suffering, fitting the proverbial
    tone.
- source_word: καρπός
  chosen: fruit
  alternatives:
  - result
  - yield
  lexicon: LSJ
  rationale: '''Fruit'' keeps the metaphor explicit, which is reinforced by the parallel
    image of ''root'' in the second clause.'
- source_word: εὐκλεής
  chosen: renowned
  alternatives:
  - glorious
  - of good repute
  - honorable
  lexicon: LSJ
  rationale: The term conveys good repute or honorable renown. 'Renowned' communicates
    public honor in clear modern English without sounding archaic.
- source_word: ἀδιάπτωτος
  chosen: does not fail
  alternatives:
  - unfailing
  - unfaltering
  - imperishable
  lexicon: LSJ
  rationale: The adjective literally conveys not falling away or not failing. Rendering
    it verbally in English produces a smoother clause while preserving the sense of
    enduring stability.
- source_word: ῥίζα
  chosen: root
  lexicon: LSJ
  rationale: The agricultural metaphor should be retained, especially because it pairs
    naturally with 'fruit' in the first clause.
- source_word: φρονήσεως
  chosen: understanding
  alternatives:
  - prudence
  - wisdom
  - good sense
  lexicon: LSJ
  rationale: φρόνησις often denotes practical wisdom or understanding. 'Understanding'
    is accessible and broad, while 'prudence' may sound narrower and more technical.
    'Wisdom' was avoided to preserve distinction from the book title and from σοφία.
