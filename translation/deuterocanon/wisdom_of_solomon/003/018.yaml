reference: Wisdom of Solomon 3:18
source:
  edition: lxx-swete-1909
  text: ἐάν τε ὀξέως τελευτήσωσιν, οὐκ ἔχουσιν ἐλπίδα οὐδὲ ἐν ἡμέρᾳ διαγνώσεως παραμύθιον·
  language: Greek
  pages:
  - 626
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
