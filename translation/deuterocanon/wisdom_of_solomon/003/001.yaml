translation:
  text: But the souls of the righteous are in the hand of God, and no torment will
    ever touch them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no affliction will ever touch them.' The Greek βάσανος can denote severe
      suffering or torment.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δικαίων
  chosen: of the righteous
  alternatives:
  - of righteous people
  - of the just
  lexicon: LSJ
  rationale: Genitive plural of δίκαιος used substantivally. 'The righteous' is concise,
    natural English and preserves the moral/theological category without over-paraphrasing.
- source_word: ψυχαὶ
  chosen: souls
  alternatives:
  - lives
  - persons
  lexicon: LSJ
  rationale: ψυχή can mean 'soul,' 'life,' or 'person,' but here the contrast with
    bodily death in the surrounding context favors 'souls' as the most transparent
    rendering of the Greek and theologically significant in Wisdom 3.
- source_word: ἐν χειρὶ θεοῦ
  chosen: in the hand of God
  alternatives:
  - in God's hand
  - under God's care
  lexicon: LSJ
  rationale: A common biblical idiom for protection, possession, or power. The more
    formal 'in the hand of God' preserves the imagery; dynamic implications such as
    protection are left for readers to infer from the idiom and context.
- source_word: οὐ μὴ ἅψηται
  chosen: will ever touch
  alternatives:
  - shall certainly not touch
  - will by no means touch
  lexicon: LSJ
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Will ever
    touch' communicates both futurity and strong denial in readable modern English
    without sounding archaic.
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - of them
  lexicon: LSJ
  rationale: 'Though formally genitive after ἅπτομαι, idiomatic English requires an
    object pronoun: ''touch them.'' This preserves sense rather than reproducing Greek
    case structure woodenly.'
- source_word: βάσανος
  chosen: torment
  alternatives:
  - affliction
  - pain
  - testing
  lexicon: LSJ
  rationale: βάσανος can denote torture, torment, or severe suffering. In this context
    of the righteous after death and apparent suffering, 'torment' best captures the
    intensity and fits the verse's contrastive reassurance. 'Testing' is too weak
    here.
