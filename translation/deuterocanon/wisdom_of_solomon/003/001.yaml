theological_decisions:
- issue: Meaning of ψυχαί in relation to postmortem existence
  chosen_reading: Retain 'souls' in the main text
  alternative_readings:
  - lives
  - persons
  rationale: The verse speaks of the righteous in a way that continues beyond visible
    death in the immediate context. Rendering ψυχαί as 'souls' preserves the text's
    anthropological and eschatological force without importing a more detailed doctrine
    than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition only where the source warrants.
- issue: Force of the idiom ἐν χειρὶ θεοῦ
  chosen_reading: Translate the idiom literally as 'in the hand of God'
  alternative_readings:
  - under God's protection
  - in God's care
  rationale: The literal idiom is intelligible in English and preserves the biblical
    metaphor of divine protection and possession. A more interpretive rendering would
    narrow the image's range.
  doctrine_reference: Optimal equivalence; do not paraphrase beyond what the source
    warrants.
