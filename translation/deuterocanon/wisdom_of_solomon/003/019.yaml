theological_decisions:
- issue: Whether γενεᾶς ἀδίκου should be rendered in a more biological sense ('offspring/seed
    of the unrighteous') or as a collective moral category ('unrighteous generation').
  chosen_reading: an unrighteous generation
  alternative_readings:
  - the offspring of the unrighteous
  - a wicked lineage
  rationale: The Greek permits a lineage-oriented sense, but the wording as transmitted
    is concise and collective. 'An unrighteous generation' preserves the moral characterization
    without importing a stronger hereditary doctrine than the text itself states.
    The alternative is worth preserving because the surrounding context in Wisdom
    3 discusses descendants and childlessness.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
