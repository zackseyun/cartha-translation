translation:
  text: For the ends of an unrighteous generation are grievous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the offspring of the unrighteous' or 'a wicked lineage.' The Greek
      γενεᾶς can denote a generation, family line, or offspring-group.
    reason: alternative_reading
lexical_decisions:
- source_word: γενεᾶς
  chosen: generation
  alternatives:
  - offspring
  - lineage
  - race
  lexicon: LSJ
  rationale: γενεά commonly denotes a generation or family line. Here, with ἀδίκου
    in the singular genitive, it refers collectively to an unrighteous stock or generation.
    'Generation' is the most natural English rendering and preserves the collective
    sense without over-specifying biological descent.
- source_word: ἀδίκου
  chosen: unrighteous
  alternatives:
  - wicked
  - unjust
  lexicon: LSJ
  rationale: ἀδίκου can mean unjust or unrighteous. 'Unrighteous' best preserves the
    moral-religious force of the adjective in Wisdom literature, whereas 'wicked'
    is somewhat stronger and 'unjust' can sound narrowly forensic.
- source_word: χαλεπὰ
  chosen: grievous
  alternatives:
  - harsh
  - painful
  - dreadful
  - hard
  lexicon: LSJ
  rationale: χαλεπός carries the sense of hard, painful, grievous, or severe. 'Grievous'
    fits the solemn tone and describes the severe character of the outcome without
    adding imagery not present in the Greek.
- source_word: τὰ τέλη
  chosen: the ends
  alternatives:
  - the outcomes
  - the final things
  - the end
  lexicon: LSJ
  rationale: The plural τέλη is best kept as 'ends' to reflect the Greek number and
    its sense of final outcomes or destinies. A more idiomatic singular 'the end'
    would smooth the text but lose the plural nuance.
