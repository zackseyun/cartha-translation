translation:
  text: And after being disciplined a little, they will receive great good, because
    God tested them and found them worthy of himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a little while, after being disciplined' or 'though disciplined
      only a little.' The Greek ὀλίγα can suggest either limited extent or limited
      duration.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will be greatly benefited.' The Greek literally speaks of receiving
      great benefit.
    reason: lexical_alternative
  - marker: c
    text: Or 'found them worthy for himself.' The phrase emphasizes that they were
      found fit in relation to God himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀλίγα
  chosen: a little
  alternatives:
  - for a little while
  - in small measure
  lexicon: LSJ
  rationale: Adverbial/neuter plural used idiomatically with the participle to express
    limited extent or duration of suffering/discipline. 'A little' is concise and
    natural in English while preserving the contrast with 'great' in the next clause.
- source_word: παιδευθέντες
  chosen: after being disciplined
  alternatives:
  - after being instructed
  - after being chastened
  - though they were punished
  lexicon: BDAG
  rationale: The aorist passive participle of παιδεύω can denote education, training,
    or corrective discipline. In this context of righteous suffering followed by vindication,
    'disciplined' preserves both corrective and formative nuance better than the narrower
    'punished' or the too-academic 'instructed'.
- source_word: μεγάλα
  chosen: great good
  alternatives:
  - great things
  - great benefits
  lexicon: LSJ
  rationale: As a neuter plural object with εὐεργετηθήσονται, the sense is that they
    will receive great benefits. 'Great good' is idiomatic, compact, and keeps the
    moral-positive force without over-specifying material reward.
- source_word: εὐεργετηθήσονται
  chosen: they will receive great good
  alternatives:
  - they will be greatly benefited
  - they will be treated beneficently
  lexicon: LSJ
  rationale: Future passive of εὐεργετέω, 'to do good to, benefit.' English passive
    'will be benefited' is possible but stiff; recasting as 'will receive great good'
    preserves the passive sense of bestowed benefit in more readable English.
- source_word: ἐπείρασεν
  chosen: tested
  alternatives:
  - tried
  - proved
  lexicon: BDAG
  rationale: πειράζω here refers to proving character, not enticing to evil. 'Tested'
    is the clearest modern English equivalent and avoids misleading associations of
    'tempted'.
- source_word: ἀξίους
  chosen: worthy
  alternatives:
  - fit
  - deserving
  lexicon: BDAG
  rationale: ἄξιος denotes worthiness or fitness. 'Worthy' is the standard rendering
    and fits the evaluative result of divine testing.
- source_word: ἑαυτοῦ
  chosen: of himself
  alternatives:
  - for himself
  - as belonging to himself
  lexicon: BDAG
  rationale: 'The reflexive genitive after ἀξίους can be rendered literally as ''worthy
    of himself.'' This preserves the Greek''s God-centered orientation: they are found
    fit in relation to God, not merely morally worthy in the abstract. ''For himself''
    is possible but more interpretive.'
