theological_decisions:
- issue: Meaning of divine testing in relation to suffering
  chosen_reading: God tested them
  alternative_readings:
  - God tried them
  - God proved them
  rationale: The verse presents suffering as a divine test that reveals worthiness,
    not as divine enticement to evil. 'Tested' preserves the theological tension of
    God permitting/proving through affliction without importing a fuller doctrine
    of punishment or sanctification than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
