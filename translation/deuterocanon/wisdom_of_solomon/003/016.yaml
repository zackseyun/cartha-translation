translation:
  text: But the children of adulterers will be imperfect, and the offspring of an
    unlawful union will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unfinished,' 'unfulfilled,' or 'without full development' for 'incomplete.'
      The Greek term can suggest lack of completion rather than specifying the exact
      form that deficiency takes.
    reason: lexical_alternative
  - marker: b
    text: Literally 'seed of an unlawful bed.' 'Bed' is a Greek idiom for sexual union
      or marriage bed.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: BDAG
  rationale: Standard plural for descendants/children; 'children' is natural English
    and preserves the familial sense without narrowing to males.
- source_word: μοιχῶν
  chosen: adulterers
  alternatives:
  - those who commit adultery
  - the adulterous
  lexicon: BDAG
  rationale: The genitive plural denotes people characterized by adultery. 'Adulterers'
    is concise and direct, matching the moral category in the Greek.
- source_word: ἀτέλεστα
  chosen: incomplete
  alternatives:
  - unfinished
  - unfulfilled
  - without full development
  lexicon: LSJ
  rationale: The adjective conveys lack of completion or full development. 'Incomplete'
    preserves the formal sense without overinterpreting whether the deficiency is
    physical, social, or existential.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - shall be
  lexicon: BDAG
  rationale: Simple future of 'to be'; 'will be' is standard modern English.
- source_word: ἐκ
  chosen: of
  alternatives:
  - from
  - out of
  lexicon: BDAG
  rationale: In the phrase 'offspring of an unlawful bed,' English idiom prefers 'of'
    while still reflecting origin/source.
- source_word: παρανόμου
  chosen: unlawful
  alternatives:
  - lawless
  - illicit
  - forbidden
  lexicon: BDAG
  rationale: The term means contrary to law. 'Unlawful' best preserves the legal-moral
    force in a context about illicit sexual union.
- source_word: κοίτης
  chosen: bed
  alternatives:
  - marriage bed
  - sexual union
  lexicon: BDAG
  rationale: Literally 'bed,' commonly a metonym for sexual union. Retaining 'bed'
    preserves the imagery of the Greek while remaining intelligible in English.
- source_word: σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: BDAG
  rationale: Although literally 'seed,' here it refers to progeny. 'Offspring' communicates
    the sense clearly in modern English without losing the collective nuance.
- source_word: ἀφανισθήσεται
  chosen: will vanish
  alternatives:
  - will perish
  - will be destroyed
  - will disappear
  lexicon: BDAG
  rationale: The future passive conveys being made to disappear or perish. 'Will vanish'
    is a natural rendering that preserves the image of disappearance; 'will be destroyed'
    would be somewhat heavier than the Greek requires.
