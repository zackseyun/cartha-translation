translation:
  text: For even if they are punished in the sight of men, their hope is full of immortality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if they are disciplined' or 'if they are chastised.' The Greek can denote
      punitive or corrective suffering; here the phrase 'in the sight of men' highlights
      human appearance over ultimate reality.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ὄψει ἀνθρώπων
  chosen: in the sight of men
  alternatives:
  - in the eyes of men
  - before men
  - in human view
  lexicon: LSJ
  rationale: ὄψις with ἐν conveys what appears from a human vantage point. 'In the
    sight of men' preserves the external, observational perspective and keeps the
    contrast with the deeper reality of the righteous person's hope.
- source_word: ἐὰν κολασθῶσιν
  chosen: if they are punished
  alternatives:
  - if they are disciplined
  - if they are chastised
  lexicon: BDAG
  rationale: κολάζω can denote punishment or corrective chastisement. In this context,
    where the righteous appear to suffer or die under human judgment, 'punished' best
    matches the apparent human assessment without over-specifying whether the suffering
    is retributive or corrective.
- source_word: ἡ ἐλπὶς αὐτῶν
  chosen: their hope
  alternatives:
  - the hope of them
  lexicon: BDAG
  rationale: A straightforward possessive rendering in natural English. The phrase
    refers to the enduring expectation belonging to the righteous.
- source_word: ἀθανασίας
  chosen: of immortality
  alternatives:
  - of imperishability
  - for immortality
  lexicon: LSJ
  rationale: 'The genitive is best taken as content or quality: their hope is characterized
    by or filled with immortality. ''Immortality'' is the standard and clearest rendering
    for ἀθανασία in Wisdom.'
- source_word: πλήρης
  chosen: is full of
  alternatives:
  - is filled with
  - is complete in
  lexicon: BDAG
  rationale: Although the copula is implied, πλήρης predicates fullness. 'Is full
    of' is idiomatic English and preserves the sense that their hope is replete with
    immortality, not merely directed toward it.
