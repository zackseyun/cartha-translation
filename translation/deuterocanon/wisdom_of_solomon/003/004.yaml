theological_decisions:
- issue: Force of the suffering language for the righteous
  chosen_reading: Rendered κολασθῶσιν as 'are punished' while allowing the verse's
    contrast to show that this is the appearance from a human perspective, not necessarily
    a divine verdict of guilt.
  alternative_readings:
  - are disciplined
  - are chastised
  rationale: The verse explicitly frames the suffering 'in the sight of men,' so the
    translation should preserve the tension between outward appearance and true destiny.
    Using 'punished' keeps the stronger lexical force while the surrounding phrase
    prevents importing a doctrinal claim that the righteous are actually condemned
    by God.
  doctrine_reference: Preserve theological tension rather than resolve it.
