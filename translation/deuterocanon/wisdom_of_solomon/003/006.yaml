theological_decisions:
- issue: Cultic rendering of ὁλοκάρπωμα θυσίας
  chosen_reading: whole burnt offering of sacrifice
  alternative_readings:
  - burnt offering
  - whole offering
  rationale: The verse uses sacrificial imagery to describe God's favorable reception
    of the righteous after testing. The translation preserves the cultic specificity
    without flattening it into a generic metaphor. 'Whole burnt offering' best reflects
    the idea of an offering wholly consumed, while retaining readability.
  doctrine_reference: Translation philosophy §§1, 5, 6
