translation:
  text: Like gold in a furnace he tested them, and like a whole burnt offering of
    sacrifice he accepted them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a crucible'; the Greek term refers to a vessel or place used for
      refining metal.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a burnt offering'; the Greek more specifically suggests an offering
      wholly consumed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: Like
  alternatives:
  - As
  lexicon: LSJ
  rationale: Introduces comparison in both clauses. 'Like' is idiomatic modern English
    and preserves the simile clearly.
- source_word: χρυσὸν
  chosen: gold
  lexicon: LSJ
  rationale: Straightforward object of comparison; the image is precious metal refined
    by testing.
- source_word: ἐν χωνευτηρίῳ
  chosen: in a furnace
  alternatives:
  - in a crucible
  - in a smelting pot
  lexicon: LSJ
  rationale: χωνευτήριον denotes a vessel or place for melting/refining metal. 'Furnace'
    communicates the refining image naturally in English, while 'crucible' is a viable
    but slightly more technical alternative.
- source_word: ἐδοκίμασεν
  chosen: he tested
  alternatives:
  - he proved
  - he tried
  lexicon: BDAG
  rationale: δοκιμάζω here carries the sense of testing to prove genuineness, fitting
    the refining-gold metaphor. 'Tested' is clear and preserves the evaluative nuance
    without overinterpreting as purification alone.
- source_word: αὐτούς
  chosen: them
  rationale: Direct object referring back to the righteous/souls in the context; simple
    pronoun retained.
- source_word: ὁλοκάρπωμα
  chosen: whole burnt offering
  alternatives:
  - burnt offering
  - whole offering
  lexicon: LSJ
  rationale: ὁλοκάρπωμα refers to an offering wholly consumed, equivalent to a whole
    burnt offering. 'Whole burnt offering' preserves the sacrificial specificity better
    than the shorter 'burnt offering' alone.
- source_word: θυσίας
  chosen: of sacrifice
  alternatives:
  - sacrificial
  - as a sacrifice
  lexicon: LSJ
  rationale: The genitive qualifies ὁλοκάρπωμα. 'Of sacrifice' is somewhat literal
    but keeps the Greek structure visible; it signals sacrificial category rather
    than adding interpretation.
- source_word: προσεδέξατο
  chosen: he accepted
  alternatives:
  - he received favorably
  - he welcomed
  lexicon: BDAG
  rationale: The verb conveys favorable reception. In sacrificial context, 'accepted'
    is the most natural English equivalent and preserves the cultic resonance.
