translation:
  text: Those who have trusted in him will understand truth, and the faithful in love
    will remain with him, because grace and mercy are for his chosen ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will wait for him' for 'will remain with him'; the Greek verb can denote
      continuing with someone or waiting expectantly for someone.
    reason: lexical_alternative
  - marker: b
    text: Or 'for his elect.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πεποιθότες
  chosen: those who have trusted
  alternatives:
  - those who trust
  - those who have confidence
  lexicon: BDAG
  rationale: Perfect participle of πείθω/πέποιθα conveys a settled state resulting
    from prior trust or confidence. 'Have trusted' preserves the completed-yet-enduring
    force better than a simple present, while remaining natural English.
- source_word: ἐπʼ αὐτῷ
  chosen: in him
  alternatives:
  - on him
  - upon him
  lexicon: BDAG
  rationale: With verbs of trust/confidence, English idiom normally uses 'in him.'
    This is a natural equivalent of the Greek prepositional phrase without loss of
    meaning.
- source_word: συνήσουσιν
  chosen: will understand
  alternatives:
  - will comprehend
  - will gain insight into
  lexicon: BDAG
  rationale: Future of συνίημι means to understand or comprehend. 'Will understand'
    is the clearest and most direct rendering.
- source_word: ἀλήθειαν
  chosen: truth
  alternatives:
  - the truth
  - what is true
  lexicon: BDAG
  rationale: Anarthrous ἀλήθειαν is well rendered simply as 'truth.' Adding 'the'
    would over-specify beyond the Greek.
- source_word: οἱ πιστοὶ
  chosen: the faithful
  alternatives:
  - those who are faithful
  - the loyal
  lexicon: BDAG
  rationale: πιστοί here most naturally denotes faithful persons rather than merely
    believers. 'The faithful' is concise and preserves the adjectival substantive
    force.
- source_word: ἐν ἀγάπῃ
  chosen: in love
  alternatives:
  - in loving devotion
  - in charity
  lexicon: BDAG
  rationale: Following the project's default for ἀγάπη, 'love' is preferred. The phrase
    is somewhat compact in Greek; 'in love' preserves the wording without over-interpreting
    whether the love is God's love, their love, or the sphere of covenantal love.
- source_word: προσμενοῦσιν αὐτῷ
  chosen: will remain with him
  alternatives:
  - will wait for him
  - will continue with him
  - will abide with him
  lexicon: BDAG
  rationale: προσμένω can mean remain, continue, persist, or wait upon depending on
    context. Here, in parallel with the destiny of the righteous and followed by the
    reason clause about grace and mercy, 'will remain with him' best conveys enduring
    communion rather than mere waiting.
- source_word: χάρις καὶ ἔλεος
  chosen: grace and mercy
  alternatives:
  - favor and mercy
  - gracious favor and mercy
  lexicon: BDAG
  rationale: Both terms are theologically weighty and common. 'Grace and mercy' is
    the most transparent and established rendering without becoming archaic.
- source_word: τοῖς ἐκλεκτοῖς αὐτοῦ
  chosen: for his chosen ones
  alternatives:
  - for his elect
  - for those chosen by him
  lexicon: BDAG
  rationale: '''Chosen ones'' communicates ἐκλεκτοῖς clearly in modern English and
    avoids importing later doctrinal freight that ''elect'' may carry, while still
    preserving the idea of divine choosing.'
