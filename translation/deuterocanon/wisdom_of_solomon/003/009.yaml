theological_decisions:
- issue: Sense of πιστοὶ in relation to trust/faithfulness
  chosen_reading: the faithful
  alternative_readings:
  - those who believe
  rationale: In this wisdom context, the term likely emphasizes steadfast fidelity
    of the righteous rather than a narrowly confessional category of 'believers.'
    This also preserves the parallelism with 'those who have trusted in him.'
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it; πίστις-family default ''faith'' with alternatives documented where contested'
- issue: Sense of προσμενοῦσιν αὐτῷ
  chosen_reading: will remain with him
  alternative_readings:
  - will wait for him
  - will attend upon him
  rationale: The immediate context concerns the final state of the righteous with
    God. Rendering the verb as enduring presence with him best fits that theological
    context while remaining lexically defensible.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source meaning without
    paraphrase'
- issue: Rendering of ἐκλεκτοῖς
  chosen_reading: chosen ones
  alternative_readings:
  - elect
  rationale: The Greek plainly denotes those chosen by God. 'Chosen ones' is more
    accessible modern English and avoids importing later systematic-theological associations
    not explicit in the verse.
  doctrine_reference: 'DOCTRINE.md: readable modern English, not archaic or academic'
