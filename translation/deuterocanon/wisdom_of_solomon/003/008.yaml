translation:
  text: They will judge nations and rule over peoples, and the Lord will reign over
    them forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will have power over peoples' for 'will rule over peoples'; the Greek
      verb can denote exercising power or prevailing.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the ages' instead of 'forever'; the Greek literally speaks of enduring
      through the ages.
    reason: lexical_alternative
  - marker: c
    text: The pronoun 'them' may refer to the righteous in context, though some may
      take it more broadly as the nations and peoples just mentioned.
    reason: alternative_reading
lexical_decisions:
- source_word: κρινοῦσιν
  chosen: will judge
  alternatives:
  - will govern
  - will rule
  lexicon: BDAG
  rationale: The future of κρίνω most naturally means 'judge' here. In wisdom/apocalyptic
    contexts it can include governing authority, but 'judge' preserves the judicial
    sense of the Greek while allowing the broader connotation to be inferred from
    context.
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: BDAG
  rationale: ἔθνη commonly means 'nations.' 'Gentiles' would import a Jew/Gentile
    contrast not explicit here, and 'peoples' would blur the distinction from the
    following λαῶν.
- source_word: κρατήσουσι
  chosen: will rule over
  alternatives:
  - will prevail over
  - will have power over
  lexicon: BDAG
  rationale: κρατέω can mean to be strong, prevail, or exercise power. With the genitive
    λαῶν, the sense of exercising dominion fits best in parallel with 'judge nations,'
    so 'will rule over' communicates the authority implied by the verb.
- source_word: λαῶν
  chosen: peoples
  alternatives:
  - nations
  - populations
  lexicon: BDAG
  rationale: Rendered 'peoples' to preserve the lexical distinction from ἔθνη ('nations')
    in the same clause and to keep the parallelism visible in English.
- source_word: βασιλεύσει
  chosen: will reign
  alternatives:
  - will be king
  - will rule as king
  lexicon: BDAG
  rationale: The future of βασιλεύω is straightforwardly 'will reign.' This is idiomatic
    modern English and preserves the royal sense without unnecessary expansion.
- source_word: αὐτῶν
  chosen: over them
  alternatives:
  - over these
  - among them
  - for them
  lexicon: BDAG
  rationale: The genitive pronoun after βασιλεύω is most naturally rendered as the
    object of reign, 'over them.' This yields the sense that the Lord reigns over
    the righteous just mentioned, though a broader reference to the judged peoples
    is grammatically discussable.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord.' The article is expressed
    in English because the Greek has Κύριος as a title in a definite sense here.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: The idiom denotes enduring perpetuity. 'Forever' is the clearest natural
    English rendering under optimal equivalence; the more literal 'for the ages' is
    less idiomatic and can be preserved as an alternative nuance if needed.
