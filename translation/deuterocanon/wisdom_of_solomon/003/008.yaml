theological_decisions:
- issue: Referent of αὐτῶν in 'the Lord will reign over them'
  chosen_reading: The pronoun refers most naturally to the righteous described in
    the immediate context, so the clause is rendered 'the Lord will reign over them
    forever.'
  alternative_readings:
  - The pronoun could be heard more broadly as referring to the nations/peoples just
    mentioned in the same verse.
  rationale: The immediate literary context in Wisdom 3 concerns the righteous, and
    the verse describes their participation in judgment and rule before affirming
    the Lord's everlasting kingship over them. The English keeps the pronoun explicit
    without over-resolving beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
