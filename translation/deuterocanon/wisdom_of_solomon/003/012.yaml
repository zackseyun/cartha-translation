theological_decisions:
- issue: Referent and force of the family-judgment language
  chosen_reading: The verse is rendered as a direct denunciation of the wicked person's
    household and descendants, without softening the severe moral judgment.
  alternative_readings:
  - A less direct rendering that treats the language as more generalized misfortune
    rather than moral condemnation
  rationale: The Greek uses blunt predicate adjectives ('foolish,' 'evil,' 'accursed')
    and gives no textual basis for mitigation. The translation preserves the severity
    of the source rather than resolving its ethical tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
