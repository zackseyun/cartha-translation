translation:
  text: Their women are foolish, and their children are evil; their offspring is accursed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their wives are foolish.' The Greek γυναῖκες can mean either 'women'
      or 'wives' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'their lineage is accursed' or 'their generation is accursed.' The Greek
      γένεσις can refer to offspring, descent, or line.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυναῖκες
  chosen: women
  alternatives:
  - wives
  lexicon: LSJ
  rationale: γυνή can mean either 'woman' or 'wife.' In this context, with αὐτῶν and
    in a household/family triad alongside children and offspring, either is possible.
    'Women' is chosen as the more formally transparent rendering of the Greek plural,
    while preserving 'wives' as a plausible alternative.
- source_word: ἄφρονες
  chosen: foolish
  alternatives:
  - senseless
  - without understanding
  lexicon: LSJ
  rationale: ἄφρων denotes lack of sense or understanding. 'Foolish' is idiomatic,
    concise, and preserves the moral-intellectual force without sounding overly technical.
- source_word: πονηρά
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: LSJ
  rationale: πονηρός regularly carries moral negativity, not mere poor quality. 'Evil'
    best preserves the ethical force in this judgment context.
- source_word: τέκνα
  chosen: children
  alternatives:
  - offspring
  lexicon: LSJ
  rationale: τέκνα naturally means 'children.' Since γένεσις later covers the broader
    idea of lineage/offspring, 'children' here helps maintain distinction between
    the two clauses.
- source_word: ἐπικατάρατος
  chosen: accursed
  alternatives:
  - under a curse
  - cursed
  lexicon: LSJ
  rationale: The adjective intensifies the idea of being under a curse. 'Accursed'
    preserves the solemn, judicial tone better than the flatter 'cursed,' while remaining
    understandable in modern English.
- source_word: γένεσις
  chosen: offspring
  alternatives:
  - lineage
  - generation
  - stock
  lexicon: LSJ
  rationale: γένεσις here refers to what is begotten or the resulting line/descent.
    'Offspring' fits the immediate family context and avoids the ambiguity of 'generation'
    in modern English.
