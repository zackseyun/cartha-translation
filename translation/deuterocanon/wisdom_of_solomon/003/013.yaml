theological_decisions:
- issue: Meaning of 'visitation of souls'
  chosen_reading: A future divine visitation/reckoning concerning human souls, left
    somewhat open between vindication and judgment.
  alternative_readings:
  - the day of judgment
  - the time when God visits souls with favor
  rationale: The immediate context in Wisdom 3 concerns the destiny and vindication
    of the righteous after death. The Greek phrase itself does not force a single
    narrower interpretation, so the translation preserves the theological tension
    rather than resolving it.
