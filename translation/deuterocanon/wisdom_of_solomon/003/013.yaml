translation:
  text: For blessed is the undefiled barren woman, who has not known a bed in transgression;
    she will have fruit at the visitation of souls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the marriage bed in transgression' or more explicitly 'sexual intercourse
      in transgression.' The Greek uses 'bed' as a euphemism for sexual union.
    reason: lexical_alternative
  - marker: b
    text: '''At the visitation of souls'' may refer to God''s future visitation or
      reckoning of human souls—thus, by implication, a time of judgment or vindication.'
    reason: alternative_reading
lexical_decisions:
- source_word: μακαρία
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: '''Blessed'' preserves the elevated evaluative sense common in biblical
    diction better than the flatter ''happy'' or merely circumstantial ''fortunate.'''
- source_word: στεῖρα
  chosen: barren woman
  alternatives:
  - barren
  - childless woman
  lexicon: LSJ
  rationale: The adjective refers to a woman unable to bear children; 'barren woman'
    makes the referent explicit in natural English while staying close to the Greek.
- source_word: ἀμίαντος
  chosen: undefiled
  alternatives:
  - unstained
  - pure
  lexicon: BDAG
  rationale: The term denotes freedom from defilement. 'Undefiled' preserves the moral-ritual
    nuance better than the more generalized 'pure.'
- source_word: ἔγνω
  chosen: has not known
  alternatives:
  - has not had
  - has not experienced
  lexicon: BDAG
  rationale: The verb 'know' is a conventional biblical euphemism for sexual relations;
    retaining it keeps the source texture and avoids over-paraphrase.
- source_word: κοίτην
  chosen: a bed
  alternatives:
  - the marriage bed
  - sexual intercourse
  lexicon: LSJ
  rationale: Literally 'bed,' here a metonym for sexual union. 'A bed' keeps the metaphor
    from the Greek; the sexual sense is clarified by the surrounding phrase.
- source_word: ἐν παραπτώματι
  chosen: in transgression
  alternatives:
  - in trespass
  - sinfully
  lexicon: BDAG
  rationale: The phrase qualifies the sexual union as wrongful. 'In transgression'
    is close to the Greek and preserves the moral category without narrowing the offense
    more than the text does.
- source_word: ἕξει καρπὸν
  chosen: she will have fruit
  alternatives:
  - she will bear fruit
  - she will receive fruit
  lexicon: BDAG
  rationale: The Greek says literally 'will have fruit.' Retaining 'have fruit' preserves
    the deliberate irony/reversal for a barren woman while allowing the metaphor to
    stand.
- source_word: ἐν ἐπισκοπῇ
  chosen: at the visitation
  alternatives:
  - at the time of visitation
  - in the judgment
  - at the inspection
  lexicon: BDAG
  rationale: The noun can denote visitation, often in the sense of divine intervention
    or review. 'At the visitation' keeps the ambiguity between gracious divine regard
    and judicial reckoning.
- source_word: ψυχῶν
  chosen: of souls
  alternatives:
  - of lives
  - of persons
  lexicon: BDAG
  rationale: '''Souls'' is the most direct rendering and fits the book''s anthropological
    and eschatological register. Alternatives flatten the text''s spiritual emphasis.'
