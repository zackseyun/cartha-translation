theological_decisions:
- issue: Moral valuation of the wicked despite longevity
  chosen_reading: The verse states that even a long life does not secure worth or
    honor for the ungodly in context.
  alternative_readings:
  - A merely social observation about reputation in old age
  rationale: Within Wisdom 3, the surrounding context contrasts the fate of the righteous
    and ungodly. The translation preserves the evaluative force of the Greek without
    adding interpretive language such as 'before God' that is not explicit in this
    verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
