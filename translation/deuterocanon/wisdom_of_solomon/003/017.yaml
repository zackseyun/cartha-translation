  text: ἐὰν τε γὰρ μακρόβιοι γένωνται, εἰς οὐθὲν λογισθήσονται, καὶ ἄτιμον ἐπʼ ἐσχάτων
    τὸ γῆρας αὐτῶν.
  language: Greek
