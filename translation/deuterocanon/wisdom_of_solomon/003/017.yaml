translation:
  text: For even if they become long-lived, they will be counted as nothing, and in
    the end their old age will be without honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will be reckoned as of no account.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at the last' for 'in the end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν τε γὰρ
  chosen: For even if
  alternatives:
  - For if indeed
  - Even if, for
  lexicon: BDAG
  rationale: Captures the conditional force of ἐὰν with the connective/emphatic particles
    τε γὰρ in natural English, preserving the verse's concessive sense within the
    argument.
- source_word: μακρόβιοι
  chosen: long-lived
  alternatives:
  - of long life
  - long-lived people
  lexicon: LSJ
  rationale: The adjective denotes having a long life or longevity. 'Long-lived' is
    concise, idiomatic, and preserves the focus on extended lifespan rather than prosperity
    in general.
- source_word: γένωνται
  chosen: they become
  alternatives:
  - they are
  - they come to be
  lexicon: BDAG
  rationale: Aorist subjunctive of γίνομαι in a conditional clause is well represented
    by 'become,' expressing the possibility of attaining long life.
- source_word: εἰς οὐθὲν
  chosen: as nothing
  alternatives:
  - for nothing
  - as worthless
  - as of no account
  lexicon: LSJ
  rationale: The phrase indicates being reckoned as nothing or of no value. 'As nothing'
    stays close to the Greek while remaining clear in English.
- source_word: λογισθήσονται
  chosen: will be counted
  alternatives:
  - will be reckoned
  - will be regarded
  lexicon: BDAG
  rationale: The future passive of λογίζομαι here conveys evaluation or reckoning.
    'Will be counted' is natural and preserves the passive sense.
- source_word: ἄτιμον
  chosen: without honor
  alternatives:
  - dishonored
  - ignoble
  - held in no honor
  lexicon: LSJ
  rationale: ἄτιμος means dishonored or without honor. Predicative 'will be without
    honor' fits the clause smoothly and preserves the shame/honor dimension.
- source_word: ἐπʼ ἐσχάτων
  chosen: in the end
  alternatives:
  - at the last
  - in their latter days
  lexicon: LSJ
  rationale: The phrase points to the final stage or outcome. 'In the end' communicates
    both temporal and evaluative culmination in readable modern English.
- source_word: τὸ γῆρας αὐτῶν
  chosen: their old age
  alternatives:
  - their old age itself
  - their aged years
  lexicon: BDAG
  rationale: γῆρας denotes old age. 'Their old age' is the straightforward rendering
    and keeps the subject of the final clause explicit.
