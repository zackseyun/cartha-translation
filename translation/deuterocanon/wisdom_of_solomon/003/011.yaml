theological_decisions:
- issue: Shift from singular subject ('the one who despises') to plural possessives
    ('their hope... their labors... their works')
  chosen_reading: Represent the singular generically in English and retain the plural
    consequences with singular 'the one' plus plural 'their.'
  alternative_readings:
  - 'Use masculine singular throughout: ''he... his hope... his labors... his works'''
  - 'Pluralize the whole sentence: ''those who despise...'''
  rationale: The Greek itself moves from a singular participial subject to plural
    possessives, likely treating the singular as representative of a class. Using
    singular 'the one' with singular 'their' preserves both the source structure and
    natural modern English, in line with gender-accurate rather than artificially
    gender-neutral practice.
  doctrine_reference: DOCTRINE.md §§1, 4, 6
