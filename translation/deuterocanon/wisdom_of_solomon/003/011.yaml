translation:
  text: For miserable is the one who despises wisdom and instruction; their hope is
    empty, their labors are foolish, and their works are useless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'discipline' for 'instruction'; the Greek παιδεία can include both education
      and corrective training.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφίαν
  chosen: wisdom
  alternatives:
  - skill
  - understanding
  lexicon: LSJ
  rationale: Standard sense in Wisdom literature; here it denotes true wisdom as a
    moral and intellectual good, not mere technical skill.
- source_word: παιδείαν
  chosen: instruction
  alternatives:
  - discipline
  - training
  lexicon: LSJ
  rationale: The term can include both education and corrective discipline. 'Instruction'
    fits the paired idea with 'wisdom' in readable English without narrowing it only
    to punishment; the disciplinary nuance remains implicit.
- source_word: ὁ ἐξουδενῶν
  chosen: the one who despises
  alternatives:
  - he who scorns
  - the one who treats as nothing
  lexicon: LSJ
  rationale: The participle denotes active contempt or treating something as of no
    account. 'Despises' is natural English and preserves the force of rejection.
- source_word: ταλαίπωρος
  chosen: miserable
  alternatives:
  - wretched
  - pitiful
  lexicon: LSJ
  rationale: The adjective expresses a pitiable, miserable condition. 'Miserable'
    is idiomatic in the predicate position and avoids overly archaic tone.
- source_word: κενὴ ἡ ἐλπὶς αὐτῶν
  chosen: their hope is empty
  alternatives:
  - their hope is vain
  - their hope is futile
  lexicon: LSJ
  rationale: Although the Greek shifts from singular to plural, the clause clearly
    broadens to the class of such people. 'Empty' renders κενή plainly and accessibly;
    'vain' is possible but more traditional than necessary.
- source_word: οἱ κόποι ἀνόητοι
  chosen: their labors are foolish
  alternatives:
  - their toils are senseless
  - their efforts are without understanding
  lexicon: LSJ
  rationale: κόποι refers to hard work or toil; ἀνόητοι means lacking understanding,
    hence foolish. 'Labors are foolish' preserves the concise judgment of the Greek.
- source_word: ἄχρηστα τὰ ἔργα αὐτῶν
  chosen: their works are useless
  alternatives:
  - their deeds are unprofitable
  - their works are worthless
  lexicon: LSJ
  rationale: ἄχρηστα means useless or of no benefit. 'Works' keeps the lexical link
    to ἔργα and suits the evaluative context.
