translation:
  text: But the ungodly will have punishment according to what they reasoned, having
    neglected the righteous man and having departed from the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to what they thought' or 'for what they plotted.' The Greek
      emphasizes that their punishment corresponds to their own reasoning and designs.
    reason: lexical_alternative
  - marker: b
    text: Or 'the righteous one.' The singular likely points to the representative
      righteous person in the book's argument.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσεβεῖς
  chosen: the ungodly
  alternatives:
  - the wicked
  - the impious
  lexicon: LSJ
  rationale: ἀσεβής denotes irreverence or impiety toward God; 'ungodly' preserves
    both moral and religious force in readable English.
- source_word: καθʼ ἃ ἐλογίσαντο
  chosen: in keeping with what they reasoned
  alternatives:
  - according to what they thought
  - for the things they plotted
  lexicon: LSJ
  rationale: The phrase links their coming punishment to their own prior reasoning
    or calculation. 'Reasoned' keeps the cognitive sense of λογίζομαι without over-specifying
    malicious plotting, though hostile intent is present in context.
- source_word: ἕξουσιν ἐπιτιμίαν
  chosen: will have punishment
  alternatives:
  - will receive punishment
  - will have reproach
  - will have penalty
  lexicon: LSJ
  rationale: ἐπιτιμία can denote penalty or punishment. 'Will have punishment' is
    close to the Greek future of ἔχω while remaining natural English.
- source_word: τοῦ δικαίου
  chosen: the righteous man
  alternatives:
  - the righteous one
  - the just man
  lexicon: LSJ
  rationale: In Wisdom 2–5, ὁ δίκαιος functions as a representative singular figure
    opposed by the ungodly. 'The righteous man' preserves the masculine singular form
    and the literary continuity with the preceding argument.
- source_word: ἀμελήσαντες
  chosen: having neglected
  alternatives:
  - having disregarded
  - having cared nothing for
  lexicon: LSJ
  rationale: ἀμελέω means to be unconcerned about, neglect, or disregard. 'Having
    neglected' is concise and fits the participial structure.
- source_word: τοῦ κυρίου ἀποστάντες
  chosen: having departed from the Lord
  alternatives:
  - having turned away from the Lord
  - having apostatized from the Lord
  lexicon: LSJ
  rationale: ἀφίστημι/ἀποστάντες here conveys withdrawal or turning away. 'Departed
    from the Lord' is faithful and readable; 'apostatized' is more technical than
    the context requires.
