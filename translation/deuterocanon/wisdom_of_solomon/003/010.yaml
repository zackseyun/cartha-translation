reference: Wisdom of Solomon 3:10
source:
  edition: lxx-swete-1909
  text: οἱ δὲ ἀσεβεῖς καθʼ ἃ ἐλογίσαντο ἕξουσιν ἐπιτιμίαν, οἱ ἀμελήσαντες τοῦ δικαίου
    καὶ τοῦ κυρίου ἀποστάντες.
  language: Greek
