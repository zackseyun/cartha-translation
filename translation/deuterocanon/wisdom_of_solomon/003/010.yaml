theological_decisions:
- issue: Referent of τοῦ δικαίου
  chosen_reading: the phrase refers to 'the righteous man' as the representative righteous
    figure in the immediate literary context
  alternative_readings:
  - the righteous in a collective sense
  - justice/righteousness as an abstract principle
  rationale: The singular article and the flow from Wisdom 2's persecution of 'the
    righteous' favor a singular personal referent. The translation preserves this
    without importing a narrower christological identification than the text itself
    states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Gender-accurate over gender-neutral.'
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's default rendering for κύριος is 'Lord.' In this Jewish-Greek
    wisdom context it denotes God, and 'Lord' preserves that theological weight and
    consistency.
  doctrine_reference: 'DOCTRINE.md contested terms table: κύριος → Lord'
