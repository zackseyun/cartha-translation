theological_decisions:
- issue: Generic singular reference in ἀσεβοῦς and αὐτοῦ
  chosen_reading: Render with singular masculine-generic language ('the ungodly ...
    his words ... his lawless deeds').
  alternative_readings:
  - 'Render generically as plural: ''the ungodly ... their words ... their lawless
    deeds'''
  - Render inclusively as singular 'the ungodly person ... their words'
  rationale: The Greek uses singular forms generically. Per project philosophy, gender-accurate
    rendering is preferred over flattening the source into a plural. The masculine
    pronoun in English reflects the source's generic singular usage, not an exclusion
    of women.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
