translation:
  text: For an inquiry will be made into the schemes of the ungodly, and a report
    of his words will come to the Lord for the exposing of his lawless deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plans,' 'counsels,' or 'deliberations' for 'schemes.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'hearing'; the sense is that what he says comes before the Lord
      as a report.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the reproof' or 'for the conviction' of his lawless deeds.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαβουλίοις
  chosen: schemes
  alternatives:
  - plans
  - counsels
  - deliberations
  lexicon: LSJ
  rationale: The noun denotes deliberations or plans; in context of an ungodly person,
    'schemes' captures the morally charged sense without over-paraphrasing.
- source_word: ἀσεβοῦς
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: LSJ
  rationale: The singular genitive is generic, referring to an impious person. 'The
    ungodly' is natural English and preserves the religious-moral dimension better
    than the broader 'wicked'.
- source_word: ἐξέτασις
  chosen: an inquiry
  alternatives:
  - examination
  - investigation
  lexicon: LSJ
  rationale: The term indicates scrutiny or examination. 'Inquiry' is concise and
    idiomatic in English while preserving the judicial sense.
- source_word: λόγων
  chosen: words
  alternatives:
  - sayings
  - statements
  lexicon: LSJ
  rationale: A straightforward rendering that keeps the broad semantic range and matches
    the parallel concern with speech in the context.
- source_word: ἀκοὴ
  chosen: a report
  alternatives:
  - hearing
  - the sound
  - news
  lexicon: LSJ
  rationale: Literally 'hearing,' but here it refers to what is heard reaching the
    Lord. 'A report' best conveys the sense of words being brought to divine notice.
- source_word: Κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Following project guidance, κύριος is translated 'Lord.' The article
    is retained in English because πρὸς Κύριον here functions naturally as 'to the
    Lord'.
- source_word: ἔλεγχον
  chosen: the exposing
  alternatives:
  - reproof
  - conviction
  - proof
  lexicon: LSJ
  rationale: The noun can denote refutation, exposure, or reproof. In this context
    the words reaching the Lord serve to bring the man's sins to light; 'the exposing'
    preserves that evidentiary sense better than the more interpretive 'conviction'.
- source_word: ἀνομημάτων
  chosen: lawless deeds
  alternatives:
  - transgressions
  - lawless acts
  - iniquities
  lexicon: LSJ
  rationale: The term denotes acts contrary to law. 'Lawless deeds' is transparent
    and preserves the concrete plural sense.
