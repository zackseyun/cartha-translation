theological_decisions:
- issue: Sense of ψυχή in the final clause
  chosen_reading: '''soul'' in the main text'
  alternative_readings:
  - life
  - person
  rationale: The verse belongs to sapiential moral exhortation, and the warning about
    speech culminates in damage extending beyond mere social harm. Rendering ψυχή
    as 'soul' preserves the text's anthropological and moral depth without denying
    that 'life/person' is lexically possible.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    contextual variance for key terms.
