translation:
  text: Therefore guard yourselves against useless grumbling, and keep your tongue
    from slander; for no secret utterance goes out empty, and a lying mouth destroys
    a soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no secret saying goes forth in vain.' The Greek expression literally
      says it 'does not go empty,' emphasizing that hidden speech still has effect
      and consequence.
    reason: lexical_alternative
  - marker: b
    text: Or 'destroys life' or 'destroys a person.' The Greek word can mean 'soul,'
      'life,' or 'person.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλάξασθε
  chosen: guard yourselves against
  alternatives:
  - beware of
  - keep yourselves from
  lexicon: LSJ
  rationale: Aorist middle imperative calling for active self-protection. 'Guard yourselves
    against' preserves both the imperative force and the reflexive nuance better than
    a bare 'beware.'
- source_word: τοίνυν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: LSJ
  rationale: Marks an inferential transition from the preceding argument. 'Therefore'
    best conveys the logical connection in natural English.
- source_word: γογγυσμὸν ἀνωφελῆ
  chosen: useless grumbling
  alternatives:
  - profitless murmuring
  - unprofitable complaint
  lexicon: LSJ
  rationale: γογγυσμός denotes muttering or grumbling; ἀνωφελής means unprofitable/useless.
    'Useless grumbling' is idiomatic modern English while retaining the moral critique.
- source_word: ἀπὸ καταλαλιᾶς φείσασθε γλώσσης
  chosen: keep your tongue from slander
  alternatives:
  - spare your tongue from slander
  - refrain from slanderous speech
  lexicon: LSJ
  rationale: The idiom combines φείδομαι ('spare, refrain') with γλῶσσα and καταλαλιά
    ('slander, backbiting'). 'Keep your tongue from slander' preserves the body-part
    imagery and reads naturally.
- source_word: φθέγμα λαθραῖον
  chosen: secret utterance
  alternatives:
  - stealthy speech
  - hidden word
  - secret saying
  lexicon: LSJ
  rationale: φθέγμα is an utterance or sound; λαθραῖον means secret/hidden. 'Secret
    utterance' is concise and preserves the clandestine sense relevant to whispered
    speech.
- source_word: κενὸν οὐ πορεύεται
  chosen: goes out empty
  alternatives:
  - passes by in vain
  - goes forth to no effect
  lexicon: LSJ
  rationale: Literally 'does not go empty.' The sense is that such speech does not
    fail to have effect or consequence. 'Goes out empty' keeps the metaphor close
    to the Greek while remaining intelligible.
- source_word: στόμα ... καταψευδόμενον
  chosen: a lying mouth
  alternatives:
  - a mouth that lies
  - a falsely speaking mouth
  lexicon: LSJ
  rationale: The participle denotes speaking falsehood or lying. 'A lying mouth' is
    compact and preserves the proverbial style.
- source_word: ἀναιρεῖ ψυχήν
  chosen: destroys a soul
  alternatives:
  - kills a soul
  - takes away life
  lexicon: LSJ
  rationale: ἀναιρέω can mean kill, do away with, destroy. Given Wisdom's moral context
    and ψυχή's broad sense, 'destroys a soul' preserves the gravity without over-specifying
    physical death alone.
- source_word: ψυχήν
  chosen: a soul
  alternatives:
  - life
  - a person
  lexicon: LSJ
  rationale: ψυχή can mean soul, life, or person. Here the wisdom context warns of
    deep moral-spiritual ruin from falsehood; 'soul' best preserves that weight, while
    alternatives remain possible.
