translation:
  text: For a holy spirit of discipline will flee deceit, and it will rise up away
    from senseless thoughts, and it will be exposed when unrighteousness comes upon
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Holy Spirit of discipline.' The Greek says 'holy spirit of discipline'
      without the article, so the phrase may be read qualitatively rather than as
      a fixed proper title.
    reason: alternative_reading
  - marker: b
    text: Or 'will be reproved' or 'will be convicted' for 'will be exposed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'when injustice comes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅγιον ... πνεῦμα
  chosen: a holy spirit
  alternatives:
  - the Holy Spirit
  - a holy Spirit
  lexicon: LSJ
  rationale: The phrase lacks the article and in Wisdom context most naturally denotes
    God's holy, instructive spirit rather than a fully titular New Testament-style
    proper name. Lowercase 'spirit' preserves the Greek's qualitative sense while
    avoiding over-specification.
- source_word: παιδείας
  chosen: of discipline
  alternatives:
  - of instruction
  - of training
  - that instructs
  lexicon: LSJ
  rationale: παιδεία commonly includes training, correction, and moral formation.
    'Discipline' best preserves the formative and corrective force in concise English,
    though 'instruction' is a viable softer alternative.
- source_word: φεύξεται
  chosen: will flee
  alternatives:
  - will avoid
  - will depart from
  lexicon: LSJ
  rationale: Future middle of φεύγω is straightforwardly 'will flee'; this keeps the
    vivid personal action of withdrawal from deceit.
- source_word: δόλον
  chosen: deceit
  alternatives:
  - guile
  - fraud
  - treachery
  lexicon: LSJ
  rationale: '''Deceit'' is clear modern English and broad enough for δόλος here;
    ''guile'' is accurate but more archaic.'
- source_word: ἀπαναστήσεται
  chosen: will rise up away from
  alternatives:
  - will withdraw from
  - will depart from
  - will stand away from
  lexicon: LSJ
  rationale: The compound verb literally suggests rising up or departing away. 'Will
    rise up away from' preserves the imagery and the force of separation better than
    a flattened 'withdraw'.
- source_word: λογισμῶν ἀσυνέτων
  chosen: senseless thoughts
  alternatives:
  - foolish reasonings
  - unintelligent plans
  - thoughts of the senseless
  lexicon: LSJ
  rationale: λογισμοί can mean thoughts, reasonings, or calculations; ἀσυνέτων means
    lacking understanding. 'Senseless thoughts' is readable and captures the moral-intellectual
    deficiency without sounding overly technical.
- source_word: ἐλεγχθήσεται
  chosen: will be exposed
  alternatives:
  - will be reproved
  - will be convicted
  - will be put to shame
  lexicon: LSJ
  rationale: ἐλέγχω can mean expose, convict, or reprove. In this context of evil's
    arrival revealing incompatibility with the holy spirit, 'will be exposed' best
    conveys manifestation under scrutiny.
- source_word: ἐπελθούσης ἀδικίας
  chosen: when unrighteousness comes upon it
  alternatives:
  - at the coming of unrighteousness
  - when injustice comes
  - when wickedness approaches
  lexicon: LSJ
  rationale: The genitive absolute marks attendant circumstance. ἀδικία can be 'unrighteousness'
    or 'injustice'; 'unrighteousness' better fits the moral-spiritual context. 'Comes
    upon it' renders the participle's movement toward/against the implied referent.
