theological_decisions:
- issue: Whether ἅγιον ... πνεῦμα should be rendered as the proper name 'the Holy
    Spirit'
  chosen_reading: a holy spirit of discipline
  alternative_readings:
  - the Holy Spirit of discipline
  - a holy Spirit of discipline
  rationale: The anarthrous Greek and Wisdom's pre-Christian sapiential context do
    not require a fixed proper-name rendering. The translation preserves the text's
    theological weight without importing later doctrinal precision beyond what the
    verse itself states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
- issue: Rendering ἀδικία as 'unrighteousness' or 'injustice'
  chosen_reading: unrighteousness
  alternative_readings:
  - injustice
  rationale: Both are lexically possible. The immediate context concerns moral impurity
    and the incompatibility of deceitful thinking with God's holy spirit, so 'unrighteousness'
    better preserves the broader ethical-religious sense.
  doctrine_reference: DOCTRINE.md contested terms notes on δικαιοσύνη/justice-righteousness
    distinction by analogy; consistency of key terms or documented exception.
