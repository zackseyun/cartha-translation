translation:
  text: For crooked thoughts separate from God, and when his power is tested, it exposes
    fools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'perverse reasonings separate from God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when the power is put to the test, it convicts the foolish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκολιοὶ
  chosen: crooked
  alternatives:
  - perverse
  - twisted
  lexicon: LSJ
  rationale: The adjective denotes moral crookedness or distortion rather than mere
    intellectual error. 'Crooked' is vivid, readable English and preserves the ethical
    sense.
- source_word: λογισμοὶ
  chosen: thoughts
  alternatives:
  - reasonings
  - plans
  lexicon: LSJ
  rationale: The term can refer to thoughts, calculations, or reasonings. Here it
    describes inward moral-intellectual activity; 'thoughts' is natural English while
    still broad enough to include reasoning.
- source_word: χωρίζουσιν ἀπὸ θεοῦ
  chosen: separate from God
  alternatives:
  - alienate from God
  - divide from God
  lexicon: LSJ
  rationale: The verb means to separate or divide. 'Separate from God' is the most
    direct rendering and avoids importing a more developed theological concept than
    the Greek itself states.
- source_word: δοκιμαζομένη
  chosen: when ... is tested
  alternatives:
  - being tested
  - put to the test
  - proved
  lexicon: LSJ
  rationale: The participle is passive/middle in form and modifies ἡ δύναμις. Rendering
    it temporally as 'when ... is tested' gives clear English and preserves the sense
    of power under testing or challenge.
- source_word: ἡ δύναμις
  chosen: his power
  alternatives:
  - the power
  - God's power
  lexicon: LSJ
  rationale: Although the Greek has 'the power,' the immediate prior mention of God
    makes the referent clear. 'His power' makes the English coherent without changing
    the sense. The power in view is God's, not an abstract force.
- source_word: ἐλέγχει
  chosen: exposes
  alternatives:
  - convicts
  - rebukes
  - proves wrong
  lexicon: LSJ
  rationale: The verb can mean expose, convict, or reprove. 'Exposes' fits the context
    of divine power revealing the true character of the foolish, while avoiding over-narrow
    legal connotations.
- source_word: τοὺς ἄφρονας
  chosen: the foolish
  alternatives:
  - fools
  - the senseless
  lexicon: LSJ
  rationale: The term denotes those lacking sense or wisdom. 'The foolish' matches
    Wisdom literature style and avoids sounding merely insulting.
