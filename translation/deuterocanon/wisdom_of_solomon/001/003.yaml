theological_decisions:
- issue: Referent of ἡ δύναμις
  chosen_reading: God's power is intended, rendered as 'his power.'
  alternative_readings:
  - an impersonal 'the power'
  rationale: The phrase follows immediately after 'from God,' so the most natural
    reading is that the power belongs to God. Making the pronoun explicit in English
    clarifies the syntax without adding a new theological claim.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
- issue: Force of ἐλέγχει in relation to divine testing
  chosen_reading: Divine power, when tested, exposes the foolish.
  alternative_readings:
  - Divine power convicts the foolish
  - Divine power rebukes the foolish
  rationale: The context emphasizes the manifestation of folly before God rather than
    a formal judicial verdict. 'Exposes' preserves that theological tension without
    over-specifying the mode of judgment.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
