lexical_decisions:
- source_word: ἀσεβεῖς
  chosen: the ungodly
  alternatives:
  - the wicked
  - the impious
  lexicon: LSJ
  rationale: ἀσεβεῖς denotes those who are irreverent or ungodly. 'The ungodly' preserves
    the religious-moral force better than the more general 'the wicked.'
- source_word: ταῖς χερσὶ καὶ τοῖς λόγοις
  chosen: with their hands and with their words
  alternatives:
  - by their deeds and by their words
  - with hands and words
  lexicon: LSJ
  rationale: The Greek is concrete and pairs physical action with speech. Retaining
    'hands' and 'words' preserves the imagery and the rhetorical balance of the source.
- source_word: προσεκαλέσαντο αὐτόν
  chosen: called for him
  alternatives:
  - summoned him
  - invited him
  - called him to themselves
  lexicon: LSJ
  rationale: The middle voice suggests calling someone to oneself or invoking association.
    'Called for him' keeps the sense of actively seeking or inviting him without over-specifying
    the nuance.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - death
  lexicon: LSJ
  rationale: The pronoun refers back to Death from the preceding context (1:12–15),
    but the Greek here uses the pronoun. The main text preserves the pronoun for textual
    fidelity; the antecedent can be clarified in a footnote.
- source_word: φίλον ἡγησάμενοι αὐτόν
  chosen: considering him a friend
  alternatives:
  - thinking him their friend
  - regarding him as a companion
  lexicon: LSJ
  rationale: ἡγέομαι with a predicate accusative means 'consider/regard as.' 'Friend'
    is the straightforward sense of φίλος here and preserves the shocking personification
    of Death as an ally.
- source_word: ἐτάκησαν
  chosen: they wasted away
  alternatives:
  - they melted away
  - they pined away
  lexicon: LSJ
  rationale: The verb literally evokes melting or wasting. 'Wasted away' is idiomatic
    modern English that preserves the image of self-destruction without sounding unnatural.
- source_word: συνθήκην ἔθεντο πρὸς αὐτόν
  chosen: they made a covenant with him
  alternatives:
  - they made a pact with him
  - they entered into an agreement with him
  lexicon: LSJ
  rationale: συνθήκη commonly means compact, agreement, or covenant. 'Covenant' preserves
    the solemnity and theological resonance of a binding alliance, fitting Wisdom's
    moral rhetoric; 'pact' is possible but slightly narrower and less elevated.
- source_word: ἄξιοί εἰσιν
  chosen: they are worthy
  alternatives:
  - they deserve
  - they are fit
  lexicon: LSJ
  rationale: ἄξιος denotes worthiness or deservingness. 'They are worthy' stays close
    to the Greek while allowing the irony of their self-incurred destiny to stand.
- source_word: τῆς ἐκείνου μερίδος εἶναι
  chosen: to belong to his portion
  alternatives:
  - to be of his lot
  - to share his portion
  - to belong to his share
  lexicon: LSJ
  rationale: μερίς/μερίδος can denote portion, share, or lot. 'Belong to his portion'
    preserves the genitival relation and the idea of being assigned to Death's domain,
    while remaining readable.
