translation:
  text: But the ungodly, with their hands and their words, called for him; considering
    him a friend, they wasted away, and they made a covenant with him, because they
    are worthy to belong to his portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, 'him' refers to Death, personified from the preceding context.
    reason: cross_reference
  - marker: b
    text: Or 'they made a pact with him.'
    reason: lexical_alternative
  - marker: c
