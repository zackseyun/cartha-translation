theological_decisions:
- issue: Referent of the pronoun αὐτόν throughout the verse
  chosen_reading: The pronoun refers to Death from the immediate preceding context,
    but the main text retains 'him' rather than substituting 'death.'
  alternative_readings:
  - explicitly rendering the antecedent as 'death' for clarity
  rationale: The literary context personifies Death in the preceding verses, and this
    verse continues that personification. Retaining the pronoun respects the Greek
    wording while allowing the context to supply the antecedent; a footnote preserves
    the explicit identification for readers.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering συνθήκη with covenantal language
  chosen_reading: they made a covenant with him
  alternative_readings:
  - they made a pact with him
  - they made an agreement with him
  rationale: Although the verse is not about a divine covenant, the Greek uses solemn
    alliance language. 'Covenant' best preserves the gravity and irony of the ungodly
    aligning themselves with Death.
  doctrine_reference: Consistency of key terms, or documented exception.
