translation:
  text: Therefore no one who speaks unrighteous things will escape notice, nor will
    justice, when it convicts, pass him by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no one who utters unjust things will go unnoticed.'
    reason: lexical_alternative
  - marker: b
    text: '''Justice'' may also be understood as personified judgment: ''nor will
      judgment, as it convicts, pass him by.'''
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: LSJ
  rationale: Standard inferential connective linking this verse to the preceding claim
    about the Spirit filling the world; 'Therefore' is concise and natural in English.
- source_word: φθεγγόμενος
  chosen: who speaks
  alternatives:
  - uttering
  - voicing
  lexicon: LSJ
  rationale: Present middle participle describing the person by the act of speaking.
    'Who speaks' gives clear idiomatic English without over-specifying manner.
- source_word: ἄδικα
  chosen: unrighteous things
  alternatives:
  - unjust things
  - wrongly
  - wicked things
  lexicon: LSJ
  rationale: Neuter plural adverbial/accusative sense tied to speech content. 'Unrighteous
    things' preserves the dik- moral field and avoids reducing it merely to legal
    injustice, though 'unjust things' is possible.
- source_word: οὐδεὶς μὴ λάθῃ
  chosen: no one ... will escape notice
  alternatives:
  - no one will go unnoticed
  - no one will escape
  lexicon: LSJ
  rationale: λανθάνω here means to escape notice or remain hidden. The double negative
    with subjunctive is emphatic future denial. 'Will escape notice' captures the
    sense better than a bare 'escape'.
- source_word: οὐδὲ μὴ παροδεύσῃ
  chosen: nor will ... pass him by
  alternatives:
  - nor will ... overlook him
  - nor will ... pass over him
  lexicon: LSJ
  rationale: παροδεύω literally means to go past. In context it conveys not overlooking
    or bypassing the guilty person. 'Pass him by' keeps the metaphor while remaining
    natural.
- source_word: ἐλέγχουσα
  chosen: when it convicts
  alternatives:
  - while exposing
  - when it reproves
  - as it brings to light
  lexicon: LSJ
  rationale: Participle modifying δίκη. ἐλέγχω can mean expose, convict, or reprove.
    In judicial context with δίκη, 'convicts' best fits the forensic force.
- source_word: ἡ δίκη
  chosen: justice
  alternatives:
  - judgment
  - punishment
  - vengeance
  lexicon: LSJ
  rationale: δίκη can denote justice, legal process, penalty, or personified Justice.
    Here with the article and participle it is effectively personified. 'Justice'
    preserves both the abstract and personified sense better than 'punishment,' which
    would narrow the meaning.
