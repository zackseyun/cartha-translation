theological_decisions:
- issue: Rendering the moral-judicial term ἄδικα / δίκη in a way that preserves the
    verse's ethical and forensic force
  chosen_reading: Use 'unrighteous things' and 'justice' in the main text
  alternative_readings:
  - '''unjust things'' and ''judgment'''
  - '''wrongly'' and ''punishment'''
  rationale: The verse warns that morally crooked speech cannot evade divine moral
    order. 'Unrighteous things' keeps the ethical dimension, while 'justice' for δίκη
    preserves the personified judicial force without importing a narrower doctrine
    of retribution. This aligns with the project's preference to preserve theological
    tension rather than flatten terms into only legal or only moral categories.
  doctrine_reference: DOCTRINE.md §§ Translation philosophy 3, 5; Contested terms
    table on δικαιοσύνη as a related dik- family term
