translation:
  text: For righteousness is immortal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice is immortal.' The Greek δικαιοσύνη can denote both righteousness
      and justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: The noun can denote both moral righteousness and justice. Per project
    doctrine, the default rendering is 'righteousness,' with 'justice' preserved as
    an alternative where relevant. In Wisdom's context, the term carries ethical and
    theological weight rather than merely juridical procedure, so 'righteousness'
    best preserves the broader sense.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: This conjunction gives the reason or grounding for the preceding statement,
    and 'for' is the most natural concise English equivalent in elevated prose.
- source_word: ἀθάνατος
  chosen: immortal
  alternatives:
  - deathless
  lexicon: BDAG
  rationale: The adjective means not subject to death. 'Immortal' is standard, clear
    modern English and fits the aphoristic style of the verse.
- source_word: ἐστιν
  chosen: is
  lexicon: BDAG
  rationale: Simple copula; no expansion is warranted beyond the Greek.
