translation:
  text: Love righteousness, you who judge the earth; think about the Lord with goodness,
    and seek him with singleness of heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Love justice.' The Greek δικαιοσύνη can denote both righteousness and
      justice; because the verse addresses those who judge the earth, 'justice' is
      a plausible contextual rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'you rulers of the earth.' Literally, 'you who judge the earth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with sincerity of heart.' The Greek expression suggests an undivided,
      straightforward heart.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπήσατε
  chosen: Love
  alternatives:
  - Love dearly
  - Cherish
  lexicon: LSJ
  rationale: Aorist imperative of ἀγαπάω; 'Love' is the direct and natural imperative,
    preserving the moral force without overexpansion.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: The project's default for δικαιοσύνη is 'righteousness,' with 'justice'
    preserved as an alternative. In Wisdom literature the term can carry both ethical
    uprightness and justice; 'righteousness' keeps the broader moral-religious sense
    while remaining idiomatic here.
- source_word: οἱ κρίνοντες τὴν γῆν
  chosen: you who judge the earth
  alternatives:
  - you rulers of the earth
  - you who govern the land
  lexicon: LSJ
  rationale: Literally 'those judging the earth/land.' The participial phrase likely
    addresses rulers or magistrates, but the Greek says 'judge,' so the translation
    preserves that wording rather than interpreting more specifically as 'rulers.'
    'Earth' is retained as the broader sense of γῆ.
- source_word: φρονήσατε
  chosen: think about
  alternatives:
  - think
  - set your mind on
  - have understanding concerning
  lexicon: LSJ
  rationale: Imperative of φρονέω. 'Think about' communicates reflective disposition
    toward the Lord without sounding overly technical. 'Set your mind on' is possible
    but slightly more interpretive.
- source_word: περὶ τοῦ κυρίου
  chosen: about the Lord
  alternatives:
  - concerning the Lord
  lexicon: LSJ
  rationale: περί with genitive here is naturally rendered 'about' or 'concerning.'
    κύριος follows the doctrinal default 'Lord.'
- source_word: ἐν ἀγαθότητι
  chosen: with goodness
  alternatives:
  - in goodness
  - with sincerity
  - with uprightness
  lexicon: LSJ
  rationale: ἀγαθότης denotes goodness or uprightness of disposition. 'With goodness'
    is concise and readable, expressing the manner in which one is to think about
    the Lord.
- source_word: ἐν ἁπλότητι καρδίας
  chosen: with singleness of heart
  alternatives:
  - with sincerity of heart
  - with simplicity of heart
  lexicon: LSJ
  rationale: ἁπλότης can mean simplicity, sincerity, or singleness. 'Singleness of
    heart' preserves the metaphor and conveys undivided sincerity better than the
    potentially misleading modern English 'simplicity.'
- source_word: ζητήσατε αὐτόν
  chosen: seek him
  alternatives:
  - look for him
  lexicon: LSJ
  rationale: Aorist imperative of ζητέω. 'Seek him' is the standard and fitting rendering
    in biblical style, preserving both earnestness and theological resonance.
