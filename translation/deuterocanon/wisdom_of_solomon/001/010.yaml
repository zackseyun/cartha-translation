theological_decisions:
- issue: Interpretation of ζηλώσεως in relation to divine perception
  chosen_reading: Rendered as 'jealousy' to preserve the metaphor of God's jealous
    scrutiny rather than softening it to 'zeal.'
  alternative_readings:
  - '''zeal'''
  - '''jealous watchfulness'''
  rationale: In context the verse speaks of God's exhaustive awareness of speech,
    especially hidden complaint. 'Jealousy' best reflects the Greek noun while allowing
    readers to sense covenantal, morally charged vigilance rather than mere enthusiasm.
    Because English 'jealousy' can sound negative, the lexical rationale documents
    that the sense here is protective and searching, not sinful envy.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
