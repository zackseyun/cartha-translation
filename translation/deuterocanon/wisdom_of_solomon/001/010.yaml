translation:
  text: for the ear of jealousy hears all things, and the sound of murmurings is not
    hidden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ear of zeal hears everything.' The Greek ζηλώσεως can denote zeal
      as well as jealousy; the main text preserves the sharper image of jealous scrutiny.
    reason: lexical_alternative
  - marker: b
    text: Or 'the whisper of grumblings' or 'the report of complaints.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖς
  chosen: ear
  alternatives:
  - hearing
  - the ear
  lexicon: LSJ
  rationale: A literal rendering preserves the personified image of divine hearing
    in the verse. English can omit the article naturally while retaining the metaphor.
- source_word: ζηλώσεως
  chosen: of jealousy
  alternatives:
  - of zeal
  - of jealous watchfulness
  lexicon: LSJ
  rationale: The genitive most naturally qualifies 'ear' as an ear characterized by
    jealous scrutiny. 'Jealousy' keeps the sharp force of the Greek better than the
    softer 'zeal,' though the sense is not petty envy but vigilant intolerance of
    wrongdoing.
- source_word: ἀκροᾶται
  chosen: hears
  alternatives:
  - listens to
  - gives ear to
  lexicon: LSJ
  rationale: The verb denotes hearing/listening. 'Hears' is concise and idiomatic
    in English, while still conveying comprehensive perception in context.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: LSJ
  rationale: '''All things'' stays closer to the Greek and suits the elevated style
    of Wisdom literature.'
- source_word: θροῦς
  chosen: the sound
  alternatives:
  - the report
  - the whisper
  - the noise
  lexicon: LSJ
  rationale: The noun refers to a sound or noise. 'The sound' fits the immediate auditory
    imagery and pairs well with 'murmurings.'
- source_word: γογγυσμῶν
  chosen: murmurings
  alternatives:
  - grumblings
  - complaints
  - whispered complaints
  lexicon: LSJ
  rationale: The term commonly denotes muttering or grumbling. 'Murmurings' preserves
    both the sound-based imagery and the moral nuance of covert complaint.
- source_word: οὐκ ἀποκρύπτεται
  chosen: is not hidden
  alternatives:
  - is not concealed
  - does not escape notice
  lexicon: LSJ
  rationale: A passive rendering closely matches the Greek and maintains the verse's
    emphasis that even quiet complaints cannot be concealed.
