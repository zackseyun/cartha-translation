theological_decisions:
- issue: Meaning of σωτήριοι in a creation context
  chosen_reading: life-promoting or health-giving rather than explicitly salvific
  alternative_readings:
  - saving
  - bringing deliverance
  rationale: The immediate context contrasts God's creative intent with destruction
    and death. Rendering the adjective as 'health-giving' preserves the creational,
    anti-destructive emphasis without importing a more developed doctrine of salvation
    not explicit in the verse.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
- issue: Rendering ᾅδου as Hades
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - death
  - Sheol
  rationale: The Greek text explicitly uses ᾅδης. Translating it as 'Hades' preserves
    the source-language concept and avoids collapsing it into a narrower or more interpretive
    term such as 'grave' or 'death.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
