theological_decisions:
- issue: Whether to render the warning in a more literal but awkward form ('be zealous
    for death') or as an idiomatic warning about self-destructive pursuit
  chosen_reading: Do not court death
  alternative_readings:
  - Do not desire death
  - Do not be zealous for death
  rationale: The Greek verb ζηλόω can denote zealous desire, but in this admonitory
    context an idiomatic English expression better conveys the moral force without
    paraphrasing beyond the text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
- issue: How to express the reflexive force of the middle verb ἐπισπᾶσθε
  chosen_reading: draw destruction upon yourselves
  alternative_readings:
  - bring destruction on yourselves
  - attract destruction
  rationale: The middle voice indicates that the subjects are implicated in bringing
    ruin onto themselves. The chosen rendering preserves that self-involving force
    clearly.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve significant lexical decisions.'
