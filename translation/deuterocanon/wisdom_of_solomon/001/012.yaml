translation:
  text: Do not court death by the error of your life, nor draw destruction upon yourselves
    by the works of your hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not desire death by the error of your life.' The Greek verb can more
      literally mean 'be zealous for' or 'desire.'
    reason: lexical_alternative
  - marker: b
    text: '''By the works of your hands'' may refer broadly to one''s deeds; the concrete
      wording may also echo the language used for things humans make.'
    reason: cultural_note
lexical_decisions:
- source_word: ζηλοῦτε
  chosen: court
  alternatives:
  - desire
  - seek eagerly
  - be zealous for
  lexicon: LSJ
  rationale: In this context with θάνατον as object, the verb warns against pursuing
    or inviting death. 'Court' captures active attraction toward something harmful
    more idiomatically than the overly literal 'be zealous for' and more pointedly
    than simple 'desire'.
- source_word: θάνατον
  chosen: death
  lexicon: LSJ
  rationale: Straightforward rendering of the object being wrongly pursued.
- source_word: ἐν πλάνῃ
  chosen: by the error
  alternatives:
  - in the wandering
  - through delusion
  - by deception
  lexicon: LSJ
  rationale: 'πλάνη denotes error, wandering, or delusion. ''By the error'' fits the
    instrumental sense in context: death is courted through a mistaken way of life.'
- source_word: ζωῆς ὑμῶν
  chosen: of your life
  alternatives:
  - of your lives
  - in your way of life
  lexicon: LSJ
  rationale: 'The genitive is naturally linked with πλάνῃ: ''the error of your life.''
    Singular ''life'' works idiomatically in English for collective address, though
    the sense is corporate/second person plural.'
- source_word: ἐπισπᾶσθε
  chosen: draw ... upon yourselves
  alternatives:
  - drag to yourselves
  - bring on yourselves
  - attract
  lexicon: LSJ
  rationale: The middle voice suggests bringing something onto oneself. 'Draw destruction
    upon yourselves' preserves that reflexive force in natural English.
- source_word: ὄλεθρον
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: LSJ
  rationale: ὄλεθρος here denotes ruinous destruction. 'Destruction' is clear and
    weighty without importing later technical theological nuance.
- source_word: ἔργοις χειρῶν ὑμῶν
  chosen: by the works of your hands
  alternatives:
  - by your deeds
  - through what your hands do
  lexicon: LSJ
  rationale: This phrase is concrete and morally charged; retaining 'works of your
    hands' preserves the idiom and possible resonance with human actions, including
    crafted deeds or idols, without over-specifying.
