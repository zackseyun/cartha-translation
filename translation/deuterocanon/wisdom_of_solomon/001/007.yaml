translation:
  text: For the Spirit of the Lord has filled the inhabited world, and that which
    holds all things together has knowledge of every utterance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what contains all things' or 'the one who holds all things together.'
      The Greek expression is a neuter participle and can emphasize either containing,
      sustaining, or holding together all things.
    reason: lexical_alternative
  - marker: b
    text: Literally 'has knowledge of voice.' The sense is that God's all-pervading
      Spirit is aware of every utterance.
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  - breath
  lexicon: BDAG
  rationale: In Wisdom literature this refers to God's active, pervasive presence
    rather than merely an impersonal breath. Capitalized 'Spirit' best conveys the
    likely referent in English while preserving the Greek's theological weight.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LEH
  rationale: κύριος is rendered by the project's default as 'Lord.' With the article
    implied in English genitive construction, 'the Lord' is the most natural rendering.
- source_word: πεπλήρωκεν
  chosen: has filled
  alternatives:
  - fills
  - has permeated
  lexicon: BDAG
  rationale: 'Perfect tense indicates a completed action with present result: the
    Lord''s Spirit has filled and thus now pervades the world.'
- source_word: οἰκουμένην
  chosen: the inhabited world
  alternatives:
  - the world
  - the whole world
  lexicon: LEH
  rationale: οἰκουμένη commonly denotes the inhabited earth/world. 'Inhabited world'
    preserves the lexical sense more closely than the flatter 'world.'
- source_word: τὸ συνέχον
  chosen: that which holds all things together
  alternatives:
  - the one who holds all things together
  - what contains all things
  - what sustains all things
  lexicon: BDAG
  rationale: The neuter substantival participle is best rendered as an impersonal
    or abstract expression. συνέχω can mean hold together, contain, or constrain;
    here in cosmological context 'holds all things together' best fits the sense of
    universal cohesion.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: A standard comprehensive expression; 'all things' preserves the elevated
    and cosmic scope of the Greek.
- source_word: γνῶσιν ἔχει
  chosen: has knowledge
  alternatives:
  - knows
  - possesses knowledge
  lexicon: BDAG
  rationale: The idiom is literally 'has knowledge.' Retaining 'has knowledge' keeps
    the formal structure while remaining natural English.
- source_word: φωνῆς
  chosen: of every voice
  alternatives:
  - of speech
  - of every sound
  - of what is said
  lexicon: BDAG
  rationale: φωνή can denote voice, sound, or utterance. In context of divine awareness
    of human speech and hidden words, 'every voice' preserves both literalness and
    breadth. 'Every' is supplied idiomatically in English to express the generic singular
    after a universal statement.
