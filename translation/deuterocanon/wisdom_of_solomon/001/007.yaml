theological_decisions:
- issue: Whether πνεῦμα Κυρίου should be rendered impersonally ('spirit of the Lord')
    or personally/theologically ('Spirit of the Lord')
  chosen_reading: Spirit of the Lord
  alternative_readings:
  - spirit of the Lord
  rationale: The verse speaks of God's pervasive presence filling the inhabited world
    and knowing every voice; this favors a theologically weighty rendering. Capitalization
    in English signals likely divine referent without overdefining later doctrinal
    categories.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English'
- issue: Whether τὸ συνέχον τὰ πάντα refers personally to the Spirit or more abstractly
    to the all-containing principle/power
  chosen_reading: that which holds all things together
  alternative_readings:
  - the one who holds all things together
  - what contains all things
  rationale: The Greek uses a neuter substantival participle, which is better preserved
    by an impersonal English expression. This avoids importing a more explicit personal
    identification than the text itself states, while still allowing the phrase to
    refer back conceptually to the divine Spirit.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
