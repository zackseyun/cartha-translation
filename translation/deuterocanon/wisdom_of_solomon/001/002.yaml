translation:
  text: because he is found by those who do not test him, and he reveals himself to
    those who do not distrust him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not put him to the test.' The Greek verb can also carry the sense
      'tempt' in some contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not disbelieve him' or 'do not lack faith in him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρίσκεται
  chosen: is found
  alternatives:
  - is discovered
  - is encountered
  lexicon: BDAG
  rationale: Passive/middle form best rendered straightforwardly as 'is found,' preserving
    the sense that God becomes accessible or discoverable to the qualifying persons
    without over-interpreting the mechanism.
- source_word: τοῖς μὴ πειράζουσιν
  chosen: by those who do not test
  alternatives:
  - by those who do not tempt
  - by those who do not put to the test
  - by those who do not try
  lexicon: BDAG
  rationale: πειράζω can mean test, try, or tempt depending on context. Here the object
    is God, and the surrounding context concerns sincere seeking rather than skeptical
    provocation. 'Do not test' preserves the verbal force without importing the stronger
    moral nuance of 'tempt.'
- source_word: αὐτόν
  chosen: him
  alternatives:
  - —
  rationale: The pronoun refers back to God in the immediate context. English requires
    the personal pronoun for clarity.
- source_word: ἐμφανίζεται
  chosen: reveals himself
  alternatives:
  - appears
  - makes himself known
  - becomes manifest
  lexicon: BDAG
  rationale: The verb carries the sense of becoming manifest or making oneself known.
    'Reveals himself' is idiomatic modern English and preserves the personal, relational
    force better than the more abstract 'becomes manifest.'
- source_word: τοῖς μὴ ἀπιστοῦσιν
  chosen: to those who do not distrust
  alternatives:
  - to those who do not disbelieve
  - to those who do not lack faith
  - to those who are not faithless toward
  lexicon: BDAG
  rationale: ἀπιστέω can mean disbelieve or be unfaithful/untrusting. In this wisdom
    context, 'do not distrust' best matches the relational sense toward God and pairs
    well with the prior clause about not testing him.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - in him
  rationale: 'The dative after ἀπιστοῦσιν is naturally rendered with an English object
    construction here: ''distrust him.'' ''In him'' would be possible but less idiomatic
    with ''distrust.'''
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: This clause grounds the preceding exhortation in v. 1. 'Because' communicates
    the causal connection clearly in modern English; 'for' would be more formal but
    less natural.
