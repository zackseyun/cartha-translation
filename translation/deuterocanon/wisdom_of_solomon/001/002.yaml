theological_decisions:
- issue: Relational versus epistemic nuance in ἀπιστοῦσιν αὐτῷ
  chosen_reading: do not distrust him
  alternative_readings:
  - do not disbelieve him
  - do not lack faith in him
  rationale: The verse describes the disposition with which one approaches God. Rendering
    the term relationally as 'distrust' preserves the moral-spiritual posture in view
    without narrowing it to mere intellectual disbelief. This also maintains the theological
    tension between trust and unbelief without over-systematizing it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; πίστις default and related faith-language should not be flattened.'
