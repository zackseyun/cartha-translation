theological_decisions:
- issue: Anthropological contrast between soul and body
  chosen_reading: Retain both 'soul' and 'body' as distinct terms without importing
    a full dualistic anthropology.
  alternative_readings:
  - Render ψυχή more broadly as 'person' or 'inner self'
  rationale: The Greek explicitly contrasts ψυχή and σώμα. The translation preserves
    that literary and moral contrast while avoiding doctrinal overstatement about
    body-soul metaphysics beyond what the verse says.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Force of κατάχρεῳ ἁμαρτίας
  chosen_reading: Render as 'enslaved to sin' to express subjection to sin's power.
  alternative_readings:
  - '''subject to sin'''
  - '''liable to sin'''
  - '''indebted to sin'''
  rationale: The phrase is morally strong and describes more than incidental wrongdoing.
    'Enslaved to sin' communicates domination in accessible English, while the more
    literal alternatives are preserved as lexical possibilities.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; original-language primacy
    over translation tradition.'
