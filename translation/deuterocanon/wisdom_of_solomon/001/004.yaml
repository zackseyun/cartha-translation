translation:
  text: For wisdom will not enter a deceitful soul, nor dwell in a body enslaved to
    sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crafty,' 'wicked,' or more literally 'skilled in evil' soul.
    reason: lexical_alternative
  - marker: b
    text: Or 'subject to sin,' 'liable to sin,' or 'indebted to sin.' The Greek describes
      a body under sin's claim or control.
    reason: lexical_alternative
lexical_decisions:
- source_word: κακότεχνον
  chosen: deceitful
  alternatives:
  - crafty
  - wicked
  - skilled in evil
  lexicon: LSJ
  rationale: The adjective literally suggests bad craft or evil contrivance. In context
    with 'soul,' it describes a morally corrupted, scheming inner life rather than
    mere incompetence. 'Deceitful' captures the sense of inward crookedness in readable
    English; 'crafty' is possible but can sound too clever rather than morally perverse,
    and 'wicked' is broader but less tied to the term's nuance of contrivance.
- source_word: ψυχὴν
  chosen: soul
  alternatives:
  - life
  - inner self
  lexicon: LSJ
  rationale: In Wisdom literature ψυχή often denotes the person's inner life or self.
    'Soul' preserves the anthropological and moral weight of the Greek better than
    the flatter 'life' or more interpretive 'inner self'.
- source_word: εἰσελεύσεται
  chosen: will enter
  alternatives:
  - will come into
  lexicon: LSJ
  rationale: A straightforward future middle meaning 'will enter.' 'Will enter' is
    idiomatic and keeps the spatial metaphor of wisdom's access to the person.
- source_word: σοφία
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering in Wisdom literature; no contextual reason to vary.
- source_word: κατοικήσει
  chosen: dwell
  alternatives:
  - live
  - make its home
  lexicon: LSJ
  rationale: The verb denotes settled residence. 'Dwell' preserves the elevated tone
    and the contrast with merely entering; wisdom does not take up abiding residence
    in such a person.
- source_word: σώματι
  chosen: body
  lexicon: LSJ
  rationale: Direct and natural rendering. The verse contrasts soul and body, so retaining
    'body' is important.
- source_word: κατάχρεῳ
  chosen: enslaved to
  alternatives:
  - liable to
  - subject to
  - indebted to
  - given over to
  lexicon: LSJ
  rationale: The adjective can denote being under obligation, burden, or subjection.
    In the phrase with ἁμαρτίας, the sense is not merely that the body is associated
    with sin but that it is under sin's dominating claim. 'Enslaved to' brings out
    that controlling relation in clear English, though more literal options are possible.
- source_word: ἁμαρτίας
  chosen: sin
  alternatives:
  - sinfulness
  lexicon: LSJ
  rationale: The genitive is best rendered simply as 'sin.' 'Sinfulness' would over-abstract
    the phrase.
