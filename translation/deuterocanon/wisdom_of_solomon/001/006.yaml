translation:
  text: For wisdom is a spirit that loves humanity, and it will not acquit a blasphemer
    because of his lips; for God is witness of his inner motives, and a true observer
    of his heart and a hearer of his tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'his kidneys,' an idiom for the hidden inner self or motives.
    reason: lexical_alternative
  - marker: b
    text: Or 'will not hold guiltless a blasphemer for what comes from his lips.'
      The Greek phrase after 'blasphemer' is compressed and may be taken with causal
      force.
    reason: alternative_reading
lexical_decisions:
- source_word: φιλάνθρωπον
  chosen: that loves humanity
  alternatives:
  - humane
  - friendly to man
  - loving mankind
  lexicon: LSJ
  rationale: The adjective denotes benevolence toward human beings. 'That loves humanity'
    preserves the active force and avoids archaic or male-exclusive phrasing such
    as 'loving mankind.'
- source_word: πνεῦμα
  chosen: a spirit
  alternatives:
  - spirit
  - Spirit
  lexicon: LSJ
  rationale: Here πνεῦμα is anarthrous and predicative/appositional with σοφία. Lowercase
    'a spirit' best reflects the Greek without importing a developed hypostatic reading
    as 'the Spirit.'
- source_word: σοφία
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering; personified in context but still translated as 'wisdom'
    rather than paraphrased.
- source_word: οὐκ ἀθῳώσει
  chosen: will not acquit
  alternatives:
  - will not hold guiltless
  - will not declare innocent
  lexicon: LSJ
  rationale: The verb means to deem innocent or leave unpunished. 'Will not acquit'
    is concise, judicial, and fits the forensic tone of the verse.
- source_word: βλάσφημον
  chosen: a blasphemer
  alternatives:
  - the blasphemous person
  - one who speaks profanely
  lexicon: LSJ
  rationale: The noun/adjectival substantive refers to one who speaks irreverently
    against God. 'Blasphemer' preserves the religious and moral weight.
- source_word: ἀπὸ χειλέων αὐτοῦ
  chosen: because of his lips
  alternatives:
  - on account of his lips
  - for what comes from his lips
  - from his lips
  lexicon: LSJ
  rationale: 'The phrase is somewhat compressed. ''Because of his lips'' captures
    causal force in context: the blasphemer is not acquitted on account of what his
    lips utter.'
- source_word: νεφρῶν
  chosen: inner motives
  alternatives:
  - kidneys
  - inmost parts
  - reins
  lexicon: LSJ
  rationale: Literally 'kidneys,' a Hebrew-Greek anthropological idiom for the inward
    self, especially hidden thoughts or motives. 'Inner motives' communicates the
    sense in natural English while avoiding opaque literalism.
- source_word: μάρτυς
  chosen: witness
  lexicon: LSJ
  rationale: Judicial term; 'witness' fits the forensic sequence of the verse.
- source_word: ἐπίσκοπος ἀληθής
  chosen: a true observer
  alternatives:
  - a true overseer
  - a faithful watcher
  - an accurate inspector
  lexicon: LSJ
  rationale: ἐπίσκοπος here carries the sense of one who watches over or examines.
    'Observer' fits the context of divine scrutiny better than the ecclesiastically
    loaded 'bishop' or the more administrative 'overseer.' ἀληθής qualifies the reliability
    of that scrutiny.
- source_word: καρδίας
  chosen: heart
  lexicon: LSJ
  rationale: Standard biblical anthropological term for the inner person, will, and
    thought center.
- source_word: ἀκουστής
  chosen: a hearer
  alternatives:
  - one who hears
  - listener
  lexicon: LSJ
  rationale: Retains the parallelism with 'witness' and 'observer' while preserving
    the concrete image of God hearing speech.
- source_word: γλώσσης
  chosen: tongue
  alternatives:
  - speech
  lexicon: LSJ
  rationale: Literal 'tongue' is idiomatic enough in English and preserves the bodily
    imagery paired with 'lips.'
