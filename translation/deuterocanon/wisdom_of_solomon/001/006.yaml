theological_decisions:
- issue: Whether πνεῦμα σοφία should be rendered in a way that identifies wisdom directly
    with the Holy Spirit
  chosen_reading: Rendered as 'wisdom is a spirit that loves humanity' without capitalizing
    'Spirit.'
  alternative_readings:
  - wisdom is the Holy Spirit
  - wisdom is a loving spirit
  rationale: The Greek presents wisdom as characterized by spirit and personified,
    but the verse itself does not require explicit identification with the Holy Spirit.
    Lowercase preserves theological tension and avoids importing later doctrinal precision
    not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: How to render the anthropological idiom τῶν νεφρῶν αὐτοῦ
  chosen_reading: Rendered idiomatically as 'his inner motives.'
  alternative_readings:
  - his kidneys
  - his inmost parts
  rationale: The text teaches God's knowledge of the hidden inner self. A literal
    rendering would be obscure to modern readers and could distract from the theological
    point of divine omniscience and judgment.
  doctrine_reference: Readable modern English, not archaic or academic.
