theological_decisions:
- issue: Whether to render ἐποίησεν as 'make' or 'create' in a statement about God's
    relation to death
  chosen_reading: did not make death
  alternative_readings:
  - did not create death
  rationale: The verse denies that death originates from God's making. 'Make' stays
    closer to the Greek verb ποιέω and avoids over-specifying a doctrine of creation
    while still clearly conveying the theological claim.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
