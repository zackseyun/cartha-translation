translation:
  text: For God did not make death, nor does he delight in the destruction of the
    living;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did not create death.' The Greek verb can be rendered either way; 'make'
      was chosen as the more direct equivalent here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the ground or explanation for the preceding statement. 'For'
    fits natural English while preserving the causal/explanatory force.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward rendering of the subject with the article functioning
    normally in Greek.
- source_word: θάνατον
  chosen: death
  lexicon: BDAG
  rationale: Direct object of ἐποίησεν; the abstract noun is best kept as 'death'
    rather than expanded interpretively.
- source_word: οὐκ ἐποίησεν
  chosen: did not make
  alternatives:
  - did not create
  lexicon: BDAG
  rationale: ποιέω commonly means 'make' or 'do.' 'Did not make' is slightly more
    formally aligned to the Greek and avoids importing cosmological nuance beyond
    the text, though 'create' is a plausible contextual alternative.
- source_word: οὐδὲ
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: BDAG
  rationale: Links the second negated clause smoothly in elevated but still readable
    English.
- source_word: τέρπεται
  chosen: does he delight
  alternatives:
  - does he take pleasure
  - is he pleased
  lexicon: BDAG
  rationale: The verb conveys enjoyment or pleasure. 'Delight' preserves the affective
    force and suits the moral/theological contrast of the verse.
- source_word: ἐπʼ ἀπωλείᾳ
  chosen: in the destruction
  alternatives:
  - at the ruin
  - in the perishing
  lexicon: BDAG
  rationale: ἀπώλεια here denotes ruin or destruction. With τέρπεται ἐπί, 'delight
    in' is idiomatic English. 'Destruction' best captures the resultative sense without
    narrowing it.
- source_word: ζώντων
  chosen: of the living
  alternatives:
  - of living beings
  - of those who live
  lexicon: BDAG
  rationale: The present participle used substantivally refers to living persons/beings.
    'The living' is concise, natural, and preserves the generic scope.
