translation:
  text: They no longer keep either lives or marriages pure; instead, one kills another
    by treachery, or by adultery causes grief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one destroys another by ambush'—the Greek suggests covert attack or
      lying in wait.
    reason: lexical_alternative
  - marker: b
    text: Or 'by corrupting marriage he causes pain'—the Greek verb can denote corrupting
      or violating marital fidelity.
    reason: lexical_alternative
lexical_decisions:
- source_word: βίους
  chosen: lives
  alternatives:
  - ways of life
  - households
  lexicon: LSJ
  rationale: βίος can mean life, manner of life, or livelihood. In this vice-list
    context paired with marriages and modified by καθαρούς, 'lives' best captures
    moral and social life kept pure, without over-specifying 'ways of life.'
- source_word: γάμους
  chosen: marriages
  alternatives:
  - marriage beds
  - weddings
  lexicon: LSJ
  rationale: γάμος can denote marriage, wedding, or marriage bed. Here the plural
    with φυλάσσουσιν and καθαρούς points to preserving marital unions in purity; 'marriages'
    is the clearest idiomatic rendering.
- source_word: καθαρούς
  chosen: pure
  alternatives:
  - clean
  - undefiled
  lexicon: LSJ
  rationale: The adjective denotes purity or cleanness. 'Pure' fits both βίους and
    γάμους in English and preserves the moral sense without archaic coloring.
- source_word: φυλάσσουσιν
  chosen: keep
  alternatives:
  - guard
  - preserve
  - observe
  lexicon: LSJ
  rationale: The verb means to guard or keep. 'Keep' is natural English with 'pure'
    and retains the sense of maintaining moral integrity.
- source_word: λοχῶν
  chosen: by treachery
  alternatives:
  - by ambush
  - by plotting
  lexicon: LSJ
  rationale: λοχάω/λόχος language can denote lying in wait or ambush. Because the
    object is interpersonal murder in a generalized vice description rather than battlefield
    action, 'by treachery' communicates murderous deceit more idiomatically, while
    preserving the sense of covert attack.
- source_word: ἀναιρεῖ
  chosen: kills
  alternatives:
  - does away with
  - murders
  - destroys
  lexicon: LSJ
  rationale: The verb commonly means kill or do away with. 'Kills' is direct and avoids
    importing a legal nuance beyond the text.
- source_word: νοθεύων
  chosen: by adultery
  alternatives:
  - by corrupting the marriage bed
  - by debauchery
  - by being unfaithful
  lexicon: LSJ
  rationale: νοθεύω can mean adulterate/corrupt and in sexual contexts to violate
    marriage. Given the immediate mention of marriages, the sense is marital unfaithfulness;
    'by adultery' makes the implied sexual corruption explicit in clear English.
- source_word: ὀδυνᾷ
  chosen: causes grief
  alternatives:
  - torments
  - causes pain
  - distresses
  lexicon: LSJ
  rationale: The verb means to cause pain or distress. 'Causes grief' fits the relational
    harm of adultery and reads naturally in English.
