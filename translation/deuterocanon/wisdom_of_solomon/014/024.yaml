theological_decisions:
- issue: Scope of moral purity in βίους ... γάμους καθαρούς
  chosen_reading: The verse condemns failure to preserve both personal/social life
    and marital unions in purity.
  alternative_readings:
  - The verse refers more narrowly to pure livelihoods and lawful marriages.
  - The verse refers to keeping lives and wedding rites ritually clean.
  rationale: The context is a catalog of moral disorder flowing from idolatry, so
    an ethical reading is primary. The translation avoids ritualizing the language
    or narrowing βίους to economics.
