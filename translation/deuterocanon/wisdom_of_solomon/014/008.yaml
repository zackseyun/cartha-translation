theological_decisions:
- issue: Whether to make the idol-reference explicit in the main text
  chosen_reading: Keep the broader expression 'what is made by hands' rather than
    inserting 'idol'
  alternative_readings:
  - Translate explicitly as 'the idol made by hands'
  rationale: The context is clearly about idols, but the Greek uses the broader adjective
    χειρόποιητον. Retaining the literal expression preserves the text's rhetoric and
    allows the condemnation to fall on the manufactured object precisely as a human-made
    thing.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
- issue: Whether to render θεὸς as 'god' or 'a god'
  chosen_reading: Use 'god' without the article
  alternative_readings:
  - a god
  rationale: The Greek lacks the article, but in this polemical context the point
    is that a corruptible object received the divine designation. English 'called
    god' best preserves that force without over-specifying the nuance.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; optimal equivalence.'
