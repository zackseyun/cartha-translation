translation:
  text: But the thing made by hands is accursed, both it and the one who made it,
    because the one made it, but the perishable thing was called god.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'the idol made by hands.' The Greek expression
      is literally 'what is made by hands.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was called a god.'
    reason: alternative_reading
lexical_decisions:
- source_word: χειρόποιητον
  chosen: what is made by hands
  alternatives:
  - the handmade thing
  - the thing made with hands
  - the idol made by hands
  lexicon: LSJ
  rationale: The adjective literally means 'made by hands' or 'handmade.' Rendering
    it as 'what is made by hands' preserves the formal sense and leaves the referent
    broad, while the context clearly points to an idol without importing that noun
    into the Greek where it is not explicit.
- source_word: ἐπικατάρατον
  chosen: accursed
  alternatives:
  - under a curse
  - cursed
  lexicon: LSJ
  rationale: The term denotes being subject to a curse. 'Accursed' is concise and
    weighty, fitting the judicial-religious force of the Greek.
- source_word: ὁ ποιήσας
  chosen: the one who made it
  alternatives:
  - its maker
  - the man who made it
  lexicon: LSJ
  rationale: This participial phrase is rendered personally and clearly. 'Its maker'
    is possible, but 'the one who made it' mirrors the Greek structure and avoids
    adding gender not explicit in the participle itself.
- source_word: ἠργάζετο
  chosen: was at work on it
  alternatives:
  - worked on it
  - made it
  - labored on it
  lexicon: LSJ
  rationale: The verb emphasizes the act of working or crafting. 'Was at work on it'
    preserves the processive nuance better than the simpler 'made it,' which would
    collapse it into the previous participle.
- source_word: φθαρτὸν
  chosen: the perishable thing
  alternatives:
  - the corruptible thing
  - what is perishable
  - the decaying thing
  lexicon: LSJ
  rationale: The adjective contrasts the object's mortal, destructible nature with
    the divine title wrongly assigned to it. 'Perishable thing' is natural English
    and preserves the contrast.
- source_word: θεὸς ὠνομάσθη
  chosen: was called god
  alternatives:
  - was named god
  - was called a god
  lexicon: LSJ
  rationale: 'The anarthrous predicate after the passive verb is well rendered ''was
    called god.'' This keeps the polemical force: a perishable object received the
    designation proper to deity. ''A god'' is possible in English, but the Greek stresses
    the scandal of calling such a thing ''god'' rather than classifying it among many
    gods.'
