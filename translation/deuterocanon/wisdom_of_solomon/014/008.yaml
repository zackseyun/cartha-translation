  text: τὸ χειρόποιητον δέ, ἐπικατάρατον αὐτὸ καὶ ὁ ποιήσας αὐτό, ὅτι ὁ μὲν ἠργάζετο,
    τὸ δὲ φθαρτὸν θεὸς ὠνομάσθη.
  language: Greek
