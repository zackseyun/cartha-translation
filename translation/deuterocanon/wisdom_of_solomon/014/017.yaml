theological_decisions:
- issue: Whether τιμᾶν should be rendered with explicitly cultic language
  chosen_reading: honor
  alternative_readings:
  - worship
  - revere
  rationale: The immediate context concerns the origin of image-making in relation
    to rulers. While the broader passage critiques idolatry, this clause itself speaks
    first of political/social honor that develops into cultic misuse. 'Honor' preserves
    that progression without importing stronger cultic language too early.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the text itself states.'
