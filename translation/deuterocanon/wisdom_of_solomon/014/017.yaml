id: WIS.14.17
reference: Wisdom of Solomon 14:17
source:
  edition: lxx-swete-1909
  text: οὓς ἐν ὄψει μὴ δυνάμενοι τιμᾶν ἄνθρωποι διὰ τὸ μακρὰν οἰκεῖν, τὴν πόρρωθεν
    ὄψιν ἀνατυπωσάμενοι, ἐμφανῆ εἰκόνα τοῦ τιμωμένου βασιλέως ἐποίησαν, ἵνα τὸν ἀπόντα
    ὡς παρόντα κολακεύωσιν διὰ τῆς σπουδῆς.
  language: Greek
  pages:
  - 647
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: Since men were not able to honor them in person because they lived far away,
    they reproduced the distant appearance and made a visible image of the honored
    king, so that by their zeal they might flatter the absent one as though present.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the appearance from afar' for 'the distant appearance.'
    reason: lexical_alternative
  - marker: b
    text: Or 'might court the favor of the absent one as if present.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὓς
  chosen: them
  alternatives:
  - whom
  lexicon: LSJ
  rationale: The relative pronoun refers back to rulers/kings in the preceding context.
    English idiom after 'honor' prefers 'them' rather than 'whom' here.
- source_word: ἐν ὄψει
  chosen: in person
  alternatives:
  - by sight
  - before their eyes
  - face to face
  lexicon: LSJ
  rationale: The phrase literally involves sight/presence. In this context it contrasts
    with distance and absence, so 'in person' best conveys the sense in natural English.
- source_word: τιμᾶν
  chosen: honor
  alternatives:
  - revere
  - pay honor to
  lexicon: LSJ
  rationale: A broad term for showing honor; 'honor' preserves the social-political
    sense without overstating cultic worship at this point in the sentence.
- source_word: διὰ τὸ μακρὰν οἰκεῖν
  chosen: because they lived far away
  alternatives:
  - because they dwelt at a distance
  - because they resided far off
  lexicon: LSJ
  rationale: The infinitive phrase gives the reason for inability to honor in person.
    'Lived far away' is clear modern English and preserves the spatial sense.
- source_word: τὴν πόρρωθεν ὄψιν
  chosen: the distant appearance
  alternatives:
  - the far-off likeness
  - the appearance from afar
  lexicon: LSJ
  rationale: ὄψις can mean appearance or sight; with πόρρωθεν it refers to how the
    ruler looked from afar, likely from report or memory. 'Distant appearance' keeps
    the visual nuance.
- source_word: ἀνατυπωσάμενοι
  chosen: reproduced
  alternatives:
  - copied
  - modeled
  - made a representation of
  lexicon: LSJ
  rationale: The participle denotes making an impression or representation after a
    pattern. 'Reproduced' fits the image-making context without becoming too technical.
- source_word: ἐμφανῆ εἰκόνα
  chosen: a visible image
  alternatives:
  - a clear image
  - an evident likeness
  lexicon: LSJ
  rationale: The adjective stresses that the image was plainly perceptible/present
    before viewers. 'Visible image' preserves the contrast with the absent king.
- source_word: τοῦ τιμωμένου βασιλέως
  chosen: of the honored king
  alternatives:
  - of the king who was being honored
  - of the revered king
  lexicon: LSJ
  rationale: 'The participle is best taken as passive or middle in sense: the king
    as the object of honor. ''Honored king'' is concise and natural.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: LSJ
  rationale: Standard purpose clause; 'so that' is natural and sufficiently formal.
- source_word: τὸν ἀπόντα ὡς παρόντα
  chosen: the absent one as though present
  alternatives:
  - the one absent as present
  - the absent king as if present
  lexicon: LSJ
  rationale: This sharp antithesis is central to the verse's logic. 'As though present'
    preserves the comparative force of ὡς.
- source_word: κολακεύωσιν
  chosen: might flatter
  alternatives:
  - might court favor with
  - might fawn upon
  lexicon: LSJ
  rationale: The verb carries the sense of flattering or currying favor, not merely
    honoring. 'Flatter' preserves the author's critical tone toward the practice.
- source_word: διὰ τῆς σπουδῆς
  chosen: by their zeal
  alternatives:
  - through their diligence
  - by their eagerness
  lexicon: LSJ
  rationale: σπουδή can denote earnestness, zeal, or diligence. Here it describes
    the energetic effort put into image-making to please the absent ruler; 'by their
    zeal' captures both effort and motive.
