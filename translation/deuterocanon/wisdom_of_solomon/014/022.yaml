id: WIS.14.22
reference: Wisdom of Solomon 14:22
source:
  edition: lxx-swete-1909
  text: Εἶτʼ οὐκ ἤρκεσεν τὸ πλανᾶσθαι περὶ τὴν τοῦ θεοῦ γνῶσιν, ἀλλὰ καὶ μεγάλῳ ζῶντες
    ἀγνοίας πολέμῳ τὰ τοσαῦτα κακὰ εἰρήνην προσαγορεύουσιν.
  language: Greek
  pages:
  - 647
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
