theological_decisions:
- issue: Whether to make the moral force of πλανᾶσθαι explicitly passive ('be led
    astray') or more neutral ('go astray')
  chosen_reading: to go astray
  alternative_readings:
  - to be led astray
  - to err
  rationale: The middle/passive infinitive can be rendered in several ways, but the
    verse's emphasis is on the fact of deviation in relation to God's knowledge, not
    on assigning agency for the deception. 'Go astray' preserves the theological critique
    without importing a stronger claim about external causation than the verse itself
    states.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Whether εἰρήνην should be expanded interpretively to 'peace and security'
    or similar
  chosen_reading: peace
  alternative_readings:
  - security
  - order
  rationale: The source text says only 'peace.' Retaining the simple term preserves
    the irony and avoids importing broader political or theological concepts not explicit
    in the Greek.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
