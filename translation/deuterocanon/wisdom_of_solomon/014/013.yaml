theological_decisions:
- issue: Implied subject left unstated in Greek
  chosen_reading: Use the pronoun 'it' without specifying 'idols' or 'idolatry' in
    the main text.
  alternative_readings:
  - For idols were not from the beginning, nor will they be forever.
  - For idolatry was not from the beginning, nor will it be forever.
  rationale: The Greek clause has no explicit subject, relying on the previous verse/context.
    Supplying a noun in the main text would over-specify what the Greek leaves implicit.
    The pronoun preserves the discourse linkage while remaining faithful to the source's
    ellipsis.
  doctrine_reference: 'Translation philosophy: preserve what the source text says
    without importing more specificity than warranted.'
