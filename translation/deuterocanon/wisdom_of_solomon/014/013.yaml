translation:
  text: For it was not from the beginning, nor will it be forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek leaves the subject implicit from the context; it may refer to
      idols or to idolatry.
    reason: alternative_reading
lexical_decisions:
- source_word: οὔτε γὰρ
  chosen: For ... not ... nor
  alternatives:
  - For neither ... nor
  - Indeed, neither ... nor
  lexicon: BDAG
  rationale: γάρ gives explanatory force, so 'For' is retained. The correlative negatives
    are represented idiomatically in English as 'not ... nor' rather than a wooden
    double 'neither' construction.
- source_word: ἦν
  chosen: it was
  alternatives:
  - it existed
  - there was
  lexicon: BDAG
  rationale: The implied subject is the idol/idolatry just mentioned in context. 'It
    was' is concise and natural; 'existed' is possible but slightly more abstract
    than the Greek here requires.
- source_word: ἀπ' ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from the start
  - at the beginning
  lexicon: BDAG
  rationale: This phrase commonly denotes origin from the beginning. 'From the beginning'
    is the most transparent and idiomatic rendering.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - into eternity
  - for ever
  lexicon: BDAG
  rationale: In this context the phrase contrasts temporal origin and enduring future
    existence. 'Forever' communicates the idiomatic sense in readable modern English
    better than the more wooden 'for the age.'
- source_word: ἔσται
  chosen: will it be
  alternatives:
  - will it exist
  - shall it be
  lexicon: BDAG
  rationale: Future of εἰμί is best rendered simply. 'Will it be' preserves the verbal
    parallel with 'it was'; 'will it exist' is acceptable but less elegant.
