theological_decisions:
- issue: Sense of δίκη in a wisdom-context statement about divine retribution
  chosen_reading: Rendered as 'justice due to those who sin' rather than simply 'punishment'
  alternative_readings:
  - punishment of sinners
  - penalty for sinners
  rationale: The verse contrasts the impotence of invoked objects in oaths with the
    effective moral order by which wrongdoing is answered. 'Justice due to those who
    sin' preserves both the judicial and retributive dimensions without importing
    a narrower doctrinal claim.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
