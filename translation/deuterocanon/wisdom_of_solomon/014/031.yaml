  text: οὐ γὰρ ἡ τῶν ὀμνυμένων δύναμις, ἀλλ' ἡ τῶν ἁμαρτανόντων δίκη ἐπεξέρχεται ἀεὶ
    τὴν τῶν ἀδίκων παράβασιν. XV
  language: Greek
