translation:
  text: For it is not the power of the things by which they swear, but the punishment
    of those who sin, that always pursues the transgression of the unrighteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the power of oaths' or 'the power of what they swear by.' The Greek
      expression is compressed and may refer either to the oath itself or to the entities
      invoked in swearing.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the punishment of sinners always pursues the transgression of the unrighteous.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ γὰρ
  chosen: For it is not
  alternatives:
  - For not
  - Because it is not
  lexicon: BDAG
  rationale: Introduces an explanatory ground for the preceding argument. 'For it
    is not' gives natural English while preserving the causal-explanatory force.
- source_word: ἡ τῶν ὀμνυμένων δύναμις
  chosen: the power of the things by which they swear
  alternatives:
  - the power of the oaths
  - the power of what is sworn by
  - the force of the sworn objects
  lexicon: LSJ
  rationale: The participle ὀμνυμένων is genitive plural middle/passive, literally
    'of those being sworn [by].' In context of false oaths connected with idolatry,
    the sense is not the efficacy of oaths themselves but the supposed power of the
    entities invoked in swearing. This rendering keeps the Greek construction visible
    without over-paraphrasing.
- source_word: ἀλλ᾽ ἡ τῶν ἁμαρτανόντων δίκη
  chosen: but the justice due to those who sin
  alternatives:
  - but the punishment of sinners
  - but the penalty of those who sin
  - but the justice against those who sin
  lexicon: BDAG
  rationale: δίκη can denote justice, penalty, or punishment. Here it is the retributive
    justice that falls on sinners. 'Justice due to those who sin' preserves the judicial
    sense without collapsing too quickly into a purely punitive gloss, though punishment
    is implied.
- source_word: ἐπεξέρχεται
  chosen: pursues
  alternatives:
  - comes upon
  - goes after
  - overtakes
  lexicon: LSJ
  rationale: The verb conveys going after or pursuing. 'Pursues' preserves the active,
    retributive image better than the flatter 'comes upon.'
- source_word: ἀεὶ
  chosen: always
  alternatives:
  - continually
  - ever
  lexicon: BDAG
  rationale: Straightforward adverb; 'always' is idiomatic and clear.
- source_word: τὴν τῶν ἀδίκων παράβασιν
  chosen: the transgression of the unrighteous
  alternatives:
  - the lawbreaking of the unjust
  - the offense of the wicked
  lexicon: BDAG
  rationale: παράβασις is 'transgression, violation'; ἀδίκων is 'unrighteous/unjust.'
    'The transgression of the unrighteous' is formally close and preserves the moral-judicial
    register.
