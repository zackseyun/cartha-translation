translation:
  text: forgetfulness of favors, defilement of souls, perversion of birth, disorder
    in marriages, adultery and debauchery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forgetfulness of grace.' The Greek χάρις can mean favor, grace, or gratitude
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'change/exchange of birth/generation'; the phrase likely refers
      to a corruption or inversion of the natural/procreative order.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτος
  chosen: of favor
  alternatives:
  - of grace
  - of gratitude
  lexicon: LSJ
  rationale: χάρις has a broad semantic range including favor, grace, and gratitude.
    In this vice-list context, 'forgetfulness of favor' best captures the loss of
    beneficence/thankfulness without importing later theological freight often attached
    to 'grace.'
- source_word: ἀμνησία
  chosen: forgetfulness
  alternatives:
  - oblivion
  - ingratitude
  lexicon: LSJ
  rationale: The noun denotes forgetfulness or failure to remember. 'Forgetfulness'
    is the most direct rendering; the sense may imply ingratitude, but that is an
    interpretive extension better left implicit.
- source_word: ψυχῶν
  chosen: of souls
  alternatives:
  - of lives
  - of persons
  lexicon: LSJ
  rationale: ψυχή can mean soul, life, or self. Here 'defilement of souls' preserves
    the moral-spiritual force of the phrase in Wisdom's ethical register better than
    the flatter 'persons' or 'lives.'
- source_word: μιασμός
  chosen: defilement
  alternatives:
  - pollution
  - staining
  lexicon: LSJ
  rationale: μιασμός commonly denotes ritual or moral pollution. 'Defilement' communicates
    both moral and cultic overtones in readable English.
- source_word: γενέσεως
  chosen: of birth
  alternatives:
  - of generation
  - of nature
  - of lineage
  lexicon: LSJ
  rationale: γένεσις can denote birth, origin, or generation. In this list of social
    and sexual disorders, 'birth' is the most natural concise rendering, though the
    phrase is somewhat compressed in Greek.
- source_word: ἐναλλαγή
  chosen: perversion
  alternatives:
  - exchange
  - alteration
  - confusion
  lexicon: LSJ
  rationale: Literally the word can mean change or interchange. In context, paired
    with γενέσεως and followed by marital and sexual disorder, it points to a corrupt
    alteration of natural/procreative order; 'perversion' conveys that contextual
    force better than the more neutral 'change.'
- source_word: γάμων
  chosen: in marriages
  alternatives:
  - of marriages
  - in wedding unions
  lexicon: LSJ
  rationale: The genitive plural refers to marriages or marriage-bonds. Rendering
    with 'in marriages' makes the English list idiomatic while preserving the social
    institution in view.
- source_word: ἀταξία
  chosen: disorder
  alternatives:
  - lawlessness
  - confusion
  - licentiousness
  lexicon: LSJ
  rationale: ἀταξία denotes disorder or lack of proper order. 'Disorder' fits the
    vice-list and pairs naturally with marriages without over-specifying the exact
    misconduct.
- source_word: μοιχεία
  chosen: adultery
  alternatives:
  - marital unfaithfulness
  lexicon: LSJ
  rationale: Standard and precise rendering for sexual violation of marriage.
- source_word: ἀσέλγεια
  chosen: debauchery
  alternatives:
  - sensuality
  - licentiousness
  - lewdness
  lexicon: LSJ
  rationale: ἀσέλγεια denotes shameless, unrestrained sensual conduct. 'Debauchery'
    is strong, readable modern English and preserves the vice's excessiveness.
