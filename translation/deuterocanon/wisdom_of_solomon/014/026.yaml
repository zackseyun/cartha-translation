theological_decisions:
- issue: Whether χάριτος ἀμνησία should be rendered with explicitly theological 'grace'
  chosen_reading: forgetfulness of favor
  alternative_readings:
  - forgetfulness of grace
  rationale: The context is a catalog of social and moral evils resulting from idolatry,
    not a doctrinal discussion of divine saving grace. 'Favor' preserves the lexical
    sense without importing later theological associations, while the alternative
    remains viable at a lexical level.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
- issue: Whether ψυχῶν should be rendered more anthropologically flat as 'persons/lives'
  chosen_reading: defilement of souls
  alternative_readings:
  - defilement of persons
  - defilement of lives
  rationale: Wisdom literature often speaks in moral-spiritual categories. 'Souls'
    preserves that register and the gravity of inner corruption without forcing a
    later systematic anthropology.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
