translation:
  text: For through human vanity it entered into the world, and because of this their
    end was devised to be brief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The implied subject of 'it entered' is not stated in Greek; from the surrounding
      context it refers to the rise of idols or idolatry.
    reason: alternative_reading
  - marker: b
    text: Or 'through human vainglory.' The Greek term denotes empty self-glory or
      vanity.
    reason: lexical_alternative
  - marker: c
    text: The passive 'was devised' does not explicitly name who devised their brief
      end.
    reason: alternative_reading
lexical_decisions:
- source_word: κενοδοξίᾳ
  chosen: by human vanity
  alternatives:
  - through human vainglory
  - because of human empty glory
  - through human pride
  lexicon: LSJ
  rationale: 'The dative is best taken instrumentally/causally here: the thing in
    view entered the world by means of or because of human κενοδοξία. ''Vanity'' preserves
    the sense of empty self-glory more directly than the broader ''pride,'' while
    remaining readable modern English.'
- source_word: ἀνθρώπων
  chosen: human
  alternatives:
  - of men
  - of people
  lexicon: LSJ
  rationale: 'The genitive qualifies κενοδοξίᾳ: this is vanity belonging to humans.
    ''Human'' avoids archaic-sounding ''of men'' while preserving the generic sense
    without over-specifying gender.'
- source_word: εἰσῆλθεν
  chosen: it entered
  alternatives:
  - he entered
  - came in
  lexicon: LSJ
  rationale: The verb is singular and has an implied subject from context, referring
    back to the idol/image tradition discussed in the surrounding passage. English
    requires an explicit pronoun; 'it' is the most natural and contextually appropriate
    choice.
- source_word: κόσμον
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: LSJ
  rationale: κόσμος here refers to the human world/order into which idolatry came.
    'The world' is the standard and sufficiently clear rendering.
- source_word: διὰ τοῦτο
  chosen: because of this
  alternatives:
  - for this reason
  - therefore
  lexicon: LSJ
  rationale: The phrase gives the consequence flowing from idolatry's entrance. 'Because
    of this' keeps the causal connection explicit and natural.
- source_word: σύντομον
  chosen: to be brief
  alternatives:
  - short
  - swift
  lexicon: LSJ
  rationale: With τέλος, σύντομον denotes brevity/shortness of duration. Rendering
    it predicatively in English ('to be brief') fits the passive verb 'was devised'
    and avoids awkwardness.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - its
  lexicon: LSJ
  rationale: The plural pronoun most naturally refers to the idols/images just discussed
    in context, hence 'their end.' A singular 'its' would flatten the contextual plurality.
- source_word: τέλος
  chosen: end
  alternatives:
  - outcome
  - termination
  - doom
  lexicon: LSJ
  rationale: '''End'' preserves the lexical breadth of τέλος and fits the context
    of the destined disappearance of idols. ''Doom'' would over-interpret; ''outcome''
    is too weak.'
- source_word: ἐπενόηθη
  chosen: was devised
  alternatives:
  - was planned
  - was contrived
  - was determined
  lexicon: LSJ
  rationale: The passive indicates that a brief end was conceived or planned for them.
    'Was devised' preserves the deliberative nuance without importing a specific named
    agent into the text.
