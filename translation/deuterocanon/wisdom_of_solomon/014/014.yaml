theological_decisions:
- issue: Implied subject of εἰσῆλθεν
  chosen_reading: The subject is the idol/image phenomenon described in the immediate
    context, rendered as 'it.'
  alternative_readings:
  - A more explicit rendering such as 'idolatry entered'
  - A plural rendering tied to 'images/idols'
  rationale: The Greek leaves the subject implicit, relying on context. English requires
    a supplied subject. Using 'it' is minimally interpretive and keeps the translation
    anchored to the Greek while allowing the surrounding context to identify the referent.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Agent behind ἐπενόηθη
  chosen_reading: 'An unspecified passive: ''their end was devised.'''
  alternative_readings:
  - A divine passive implying God devised their end
  - An impersonal passive meaning 'their end was destined/appointed'
  rationale: The text does not explicitly name the agent. Supplying 'God' in the main
    text would import a theological claim beyond the wording. The passive is therefore
    preserved in English.
  doctrine_reference: Never import doctrinal claims the text does not make.
