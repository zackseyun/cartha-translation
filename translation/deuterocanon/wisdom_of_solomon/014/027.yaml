theological_decisions:
- issue: How to render the triad ἀρχὴ κακοῦ καὶ αἰτία καὶ πέρας
  chosen_reading: the beginning and cause and end of every evil
  alternative_readings:
  - the origin, cause, and culmination of every evil
  - the beginning, source, and outcome of all evil
  rationale: The Greek is rhetorically compressed and emphatic. The chosen rendering
    stays close to the form of the Greek while remaining readable, and it preserves
    the author's sweeping theological indictment of idolatry without softening it
    into paraphrase.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Implication of ἀνωνύμων ('nameless') in relation to idols
  chosen_reading: nameless idols
  alternative_readings:
  - idols without a name
  rationale: The text itself does not explicitly explain whether 'nameless' means
    lacking true divinity, lacking stable identity, or being unworthy of naming. The
    translation preserves that theological tension rather than resolving it interpretively.
  doctrine_reference: Translation philosophy §3
