translation:
  text: For the worship of nameless idols is the beginning and cause and end of every
    evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'idols without a name.' The Greek adjective can stress that these idols
      lack a true or worthy name.
    reason: lexical_alternative
  - marker: b
    text: The sequence 'beginning and cause and end' may also be understood as 'origin,
      cause, and culmination.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θρησκεία
  chosen: worship
  alternatives:
  - religion
  - cultic devotion
  lexicon: BDAG
  rationale: In this context the term refers to the practice or observance directed
    toward idols, not religion in a broad abstract sense. 'Worship' is natural modern
    English and fits the polemical context.
- source_word: ἀνωνύμων
  chosen: nameless
  alternatives:
  - without a name
  - anonymous
  lexicon: LSJ
  rationale: The adjective literally means 'without name' or 'unnamed.' 'Nameless'
    is concise and preserves the rhetorical force that these idols lack true identity
    or worthy designation.
- source_word: εἰδώλων
  chosen: idols
  alternatives:
  - images
  - phantoms
  lexicon: LSJ
  rationale: In Wisdom this word commonly denotes false gods represented by images.
    'Idols' best captures the religious and polemical sense in English.
- source_word: παντὸς ... κακοῦ
  chosen: every evil
  alternatives:
  - all evil
  - every wicked thing
  lexicon: LSJ
  rationale: The genitive phrase is comprehensive. 'Every evil' is idiomatic and preserves
    the sweeping claim without overexpansion.
- source_word: ἀρχὴ
  chosen: beginning
  alternatives:
  - origin
  - first principle
  lexicon: LSJ
  rationale: 'The verse presents a triad: beginning, cause, and end. ''Beginning''
    preserves the rhetorical structure more directly than the more interpretive ''origin.'''
- source_word: αἰτία
  chosen: cause
  alternatives:
  - source
  - responsibility
  lexicon: LSJ
  rationale: The noun denotes causation here. 'Cause' keeps the compact triadic style
    and avoids importing moral nuance beyond the text.
- source_word: πέρας
  chosen: end
  alternatives:
  - goal
  - outcome
  - consummation
  lexicon: LSJ
  rationale: The term can mean end, limit, or goal. In this denunciation, 'end' best
    preserves the stark sequence 'beginning and cause and end,' allowing readers to
    hear both termination and culmination.
