theological_decisions:
- issue: Force of ἐπισκοπή in a judgment context
  chosen_reading: judgment will also come upon the idols of the nations
  alternative_readings:
  - there will also be visitation upon the idols of the nations
  rationale: The noun can be rendered more literally as 'visitation,' but in this
    context the visitation is clearly punitive, since the idols have become abomination,
    stumbling block, and snare. The main text uses 'judgment' for clarity, while preserving
    the more formal alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering ἀνθρώπων
  chosen_reading: men
  alternative_readings:
  - people
  - humankind
  rationale: The Greek is a generic plural for human beings. Per the project's gender-accurate
    policy, 'men' may be used where representative humanity is intended. Because modern
    readers may hear this narrowly, an inclusive alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §4
