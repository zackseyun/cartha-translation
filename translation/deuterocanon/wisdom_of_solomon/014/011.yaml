translation:
  text: Therefore there will also be a visitation upon the idols of the nations, because
    among God’s creatures they became an abomination, and a stumbling block to the
    souls of men, and a snare to the feet of fools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “there will also be visitation upon the idols of the
      nations.”
    reason: lexical_alternative
  - marker: b
    text: “Men” here means human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: LSJ
  rationale: Standard inferential phrase linking this verse to the preceding argument;
    'Therefore' is concise and natural in English.
- source_word: ἐν εἰδώλοις ἐθνῶν
  chosen: upon the idols of the nations
  alternatives:
  - against the idols of the nations
  - with respect to the idols of the nations
  lexicon: LSJ
  rationale: With ἐπισκοπὴ ἔσται, the phrase indicates the objects that will be visited
    in judgment. 'Of the nations' preserves the genitive ἐθνῶν without overinterpreting
    as specifically 'Gentiles' in this deuterocanonical wisdom context.
- source_word: ἐπισκοπὴ ἔσται
  chosen: judgment will also come
  alternatives:
  - there will be visitation
  - there will be punishment
  - inspection will occur
  lexicon: LSJ
  rationale: ἐπισκοπή can mean visitation, often in the sense of divine inspection
    leading to judgment. 'Judgment will also come' brings out the punitive force in
    context while remaining idiomatic. 'Also' reflects καί.
- source_word: ἐν κτίσματι θεοῦ
  chosen: in God’s creation
  alternatives:
  - among God’s creatures
  - within the creation of God
  lexicon: LSJ
  rationale: κτίσμα can denote a created thing or creation. Here the sense is that
    idols, within the sphere of what God created, came to function perversely. 'In
    God’s creation' is broad and natural, avoiding the narrower 'among creatures'
    while preserving the preposition ἐν.
- source_word: εἰς βδέλυγμα ἐγενήθησαν
  chosen: they became an abomination
  alternatives:
  - they came to be an abomination
  - they became detestable
  lexicon: LSJ
  rationale: βδέλυγμα is a strong term for something detestable or abominable, often
    with religious overtones. 'Abomination' preserves that weight.
- source_word: σκάνδαλα
  chosen: a stumbling block
  alternatives:
  - stumbling blocks
  - an offense
  - a cause of falling
  lexicon: LSJ
  rationale: Although plural in Greek, English idiom often uses the singular collectively
    after a series of predicate complements. 'Stumbling block' preserves the metaphor
    of causing downfall.
- source_word: ψυχαῖς ἀνθρώπων
  chosen: to the souls of men
  alternatives:
  - to human souls
  - to the lives of people
  lexicon: LSJ
  rationale: ψυχαῖς is retained as 'souls' to preserve the moral-spiritual dimension
    of the warning. ἀνθρώπων is rendered 'men' in line with the project's gender-accurate
    policy where the term denotes humankind in a representative sense; the phrase
    is traditional and concise here.
- source_word: παγίδα ποσὶν ἀφρόνων
  chosen: a snare for the feet of fools
  alternatives:
  - a trap for the feet of the senseless
  - a snare to foolish feet
  lexicon: LSJ
  rationale: παγίς is literally a snare or trap. Retaining 'feet' preserves the concrete
    metaphor of moral entrapment. ἄφρων is best rendered 'fool' in wisdom literature
    because it carries ethical as well as intellectual deficiency.
