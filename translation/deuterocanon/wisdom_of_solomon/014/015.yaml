id: WIS.14.15
reference: Wisdom of Solomon 14:15
source:
  edition: lxx-swete-1909
  text: ἀώρῳ γὰρ πένθει τρυχόμενος πατήρ τοῦ ταχέως ἀφαιρεθέντος τέκνου εἰκόνα ποιήσας
    τὸν τότε νεκρὸν ἄνθρωπον νῦν ὡς θεὸν ἐτίμησεν, καὶ παρέδωκεν τοῖς ὑποχειρίοις
    μυστήρια καὶ τελετάς·
  language: Greek
  pages:
  - 647
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: For a father, worn down by untimely grief for the child quickly taken away,
    made an image of the one then dead, and now honored him as a god, and handed down
    mysteries and rites to those under his authority;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'suddenly taken away' or 'snatched away' for 'quickly taken away.' The
      Greek emphasizes the child's removal before the expected time.
    reason: lexical_alternative
  - marker: b
    text: '''Mysteries and rites'' refers to secret or initiatory religious observances
      associated with cult practice.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀώρῳ
  chosen: untimely
  alternatives:
  - premature
  - before its time
  lexicon: LSJ
  rationale: The adjective describes something occurring before the proper time. In
    context with πένθει it qualifies the grief as caused by a death that came too
    soon; 'untimely' is concise and idiomatic.
- source_word: πένθει
  chosen: grief
  alternatives:
  - mourning
  - sorrow
  lexicon: LSJ
  rationale: The noun denotes mourning or grief. 'Grief' fits the father's inward
    suffering in context, while the participle τρυχόμενος supplies the sense of being
    worn down.
- source_word: τρυχόμενος
  chosen: worn down
  alternatives:
  - consumed
  - tormented
  - wasted away
  lexicon: LSJ
  rationale: The participle conveys being worn out or consumed by distress. 'Worn
    down' preserves the metaphor without overstating physical torment.
- source_word: τοῦ ταχέως ἀφαιρεθέντος τέκνου
  chosen: for the child quickly taken away
  alternatives:
  - for the child suddenly taken away
  - for the child snatched away
  lexicon: LSJ
  rationale: ἀφαιρεθέντος literally means 'taken away' or 'removed.' In a death context
    it implies loss by death without adding imagery not explicit in the Greek. τέκνου
    is best rendered 'child' rather than 'son,' since the Greek is not sex-specific.
- source_word: εἰκόνα
  chosen: an image
  alternatives:
  - a likeness
  - an idol
  lexicon: LSJ
  rationale: The basic sense is 'image' or 'likeness.' Although the broader context
    critiques idolatry, the verse itself states the making of an image; 'idol' would
    import the evaluative conclusion too early.
- source_word: τὸν τότε νεκρὸν ἄνθρωπον
  chosen: the man then dead
  alternatives:
  - the man who was then dead
  - the dead man of that time
  lexicon: LSJ
  rationale: 'The phrase contrasts τότε and νῦν: the one who was then a dead human
    is now treated as divine. ''The man then dead'' keeps that rhetorical contrast
    compactly.'
- source_word: νῦν ὡς θεὸν ἐτίμησεν
  chosen: now honored him as a god
  alternatives:
  - now revered him as a god
  - now honored him like a god
  lexicon: LSJ
  rationale: ὡς θεόν indicates treatment in the capacity/status of a god. 'As a god'
    is the most direct rendering. Lowercase 'god' reflects the referent as a false
    deity within the argument.
- source_word: παρέδωκεν
  chosen: handed down
  alternatives:
  - delivered
  - passed on
  - instituted
  lexicon: LSJ
  rationale: The verb means to hand over or transmit. Here it refers to transmitting
    cultic practices to dependents; 'handed down' captures both transfer and tradition.
- source_word: τοῖς ὑποχειρίοις
  chosen: to those under his authority
  alternatives:
  - to his subjects
  - to his subordinates
  - to those under him
  lexicon: LSJ
  rationale: The term denotes persons under another's hand or control. 'Those under
    his authority' is clear modern English and broad enough for household or political
    dependents.
- source_word: μυστήρια
  chosen: mysteries
  alternatives:
  - secret rites
  - mystic observances
  lexicon: LSJ
  rationale: The Greek term refers to secret or initiatory religious observances.
    'Mysteries' preserves the cultic term and its historical resonance.
- source_word: τελετάς
  chosen: rites
  alternatives:
  - ceremonies
  - initiations
  lexicon: LSJ
  rationale: The noun denotes religious rites or ceremonies, often in cultic settings.
    'Rites' pairs naturally with 'mysteries' and keeps the ritual sense concise.
