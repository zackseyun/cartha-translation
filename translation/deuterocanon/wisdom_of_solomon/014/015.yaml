theological_decisions:
- issue: Rendering of θεός in a polemical idolatry context
  chosen_reading: a god
  alternative_readings:
  - godlike
  - as divine
  rationale: The verse describes a deceased human being receiving divine honor in
    the development of idolatry. Lowercase 'a god' preserves the claim of deification
    without implying true deity.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s claim without importing doctrinal endorsement.'
