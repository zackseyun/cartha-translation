- issue: Rendering of τὸ ἀκοινώνητον ὄνομα in an anti-idolatry context
  chosen_reading: the incommunicable name
  alternative_readings:
  - the unshared name
  - the name not to be shared
  rationale: The phrase likely refers to the divine name or divine honor as uniquely
    God's and therefore improperly transferred to idols. The chosen rendering preserves
    that theological exclusivity without expanding the text into a doctrinal paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
