translation:
  text: And this became an ambush against life, because men, enslaved by calamity
    or by tyranny, bestowed the incommunicable name on stones and wood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the unshared name'—that is, the divine name or honor that should not
      be attributed to idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνεδρον
  chosen: ambush
  alternatives:
  - snare
  - trap
  lexicon: LSJ
  rationale: The noun commonly denotes an ambush or lying-in-wait. 'Ambush' preserves
    the vivid metaphor of something turning treacherously against human life, while
    'snare' or 'trap' are possible but slightly less direct.
- source_word: τῷ βίῳ
  chosen: against life
  alternatives:
  - for life
  - for human life
  - for living
  lexicon: LSJ
  rationale: With εἰς plus ἔνεδρον, the sense is that this practice became a threat
    directed toward life. 'Against life' captures the hostile force of the phrase
    better than a more neutral 'for life.'
- source_word: συμφορᾷ
  chosen: calamity
  alternatives:
  - misfortune
  - disaster
  lexicon: LSJ
  rationale: The term refers to adverse circumstance or disaster. 'Calamity' fits
    the elevated register of Wisdom and pairs well with 'tyranny' as a cause of human
    distortion.
- source_word: τυραννίδι
  chosen: tyranny
  alternatives:
  - despotism
  - oppression
  lexicon: LSJ
  rationale: The Greek denotes tyrannical rule or domination. 'Tyranny' is the most
    direct and idiomatic rendering.
- source_word: δουλεύσαντες
  chosen: enslaved
  alternatives:
  - serving
  - subjected
  - in bondage
  lexicon: BDAG
  rationale: The participle from δουλεύω conveys being under bondage or servitude.
    In this context the bonded force is salient, so 'enslaved' better reflects the
    coercive sense than the weaker 'serving.'
- source_word: τὸ ἀκοινώνητον ὄνομα
  chosen: the incommunicable name
  alternatives:
  - the unshared name
  - the name not to be shared
  - the incomparable name
  lexicon: LSJ
  rationale: ἀκοινώνητος literally means not shared, having no fellowship in common.
    Here it refers to the divine name as not to be shared with idols. 'Incommunicable
    name' is concise and theologically weighty, though somewhat formal; alternatives
    are possible but less precise.
- source_word: λίθοις καὶ ξύλοις
  chosen: on stones and wood
  alternatives:
  - to stone and wood
  - upon stones and wooden images
  lexicon: LSJ
  rationale: The dative after περιέθεσαν suggests placing or conferring onto these
    materials. 'Stones and wood' preserves the concrete anti-idolatry contrast without
    over-specifying images not explicit in the Greek.
- source_word: περιέθεσαν
  chosen: bestowed
  alternatives:
  - assigned
  - placed around
  - conferred
  lexicon: LSJ
  rationale: In context the verb means to put upon or confer. 'Bestowed' idiomatically
    expresses the act of attributing the divine name to idols.
