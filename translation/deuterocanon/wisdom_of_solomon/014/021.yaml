id: WIS.14.21
reference: Wisdom of Solomon 14:21
source:
  edition: lxx-swete-1909
  text: καὶ τοῦτο ἐγένετο τῷ βίῳ εἰς ἔνεδρον, ὅτι συμφορᾷ ἢ τυραννίδι δουλεύσαντες
    ἄνθρωποι τὸ ἀκοινώνητον ὄνομα λίθοις καὶ ξύλοις περιέθεσαν.
  language: Greek
  pages:
