translation:
  text: For blessed is the wood through which righteousness comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice comes.' Greek δικαιοσύνη can denote righteousness or justice;
      the main text follows the project's default rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλόγηται
  chosen: is blessed
  alternatives:
  - has been blessed
  - is praised
  lexicon: BDAG
  rationale: 'Perfect passive indicative of εὐλογέω. In English, a stative present
    best conveys the resulting state: the wood stands as blessed. ''Is praised'' is
    possible in some contexts but here the passive sense of being blessed/favored
    fits the contrast in the surrounding argument about the use of wood.'
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retained as 'for' to preserve the explanatory connection with the preceding
    statement.
- source_word: ξύλον
  chosen: wood
  alternatives:
  - tree
  - timber
  lexicon: BDAG
  rationale: ξύλον can mean 'wood,' 'tree,' or an object made of wood. Here the context
    contrasts cursed idol-material with blessed wood used as an instrument of deliverance/righteousness.
    'Wood' preserves the material term without over-specifying 'tree.'
- source_word: δι' οὗ
  chosen: through which
  alternatives:
  - by which
  - through whom
  lexicon: BDAG
  rationale: The relative pronoun refers back to the neuter ξύλον, so 'through which'
    is the natural English rendering. 'By which' is possible but 'through' better
    reflects instrumental mediation.
- source_word: γίνεται
  chosen: comes
  alternatives:
  - comes about
  - happens
  - is brought about
  lexicon: BDAG
  rationale: γίνομαι here denotes coming into being or occurring. 'Comes' gives readable
    modern English in the idiom 'through which righteousness comes,' while still preserving
    the sense that righteousness is effected or realized through this means.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project default, δικαιοσύνη is rendered 'righteousness,' with 'justice'
    preserved as an alternative where relevant. In this Wisdom context, the term can
    carry moral rightness and just order; 'righteousness' best preserves the broader
    theological-moral sense without narrowing it to social or judicial justice alone.
