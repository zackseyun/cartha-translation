translation:
  text: 'and everything is mixed together: blood and murder, theft and deceit, corruption,
    faithlessness, turmoil, perjury, and confusion about what is good,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bloodshed and murder'; the Greek has literally 'blood and murder.'
    reason: lexical_alternative
  - marker: b
    text: The phrase translated 'confusion over what is good' is difficult; it could
      also mean 'disturbance of good things' or 'uproar over blessings.'
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all of it
  lexicon: LSJ
  rationale: Neuter plural used comprehensively; 'everything' gives natural English
    while preserving the totalizing scope of the accusation.
- source_word: ἐπιμὶξ ἔχει
  chosen: is mixed together
  alternatives:
  - is in confusion
  - is all mixed up
  - contains a mixture
  lexicon: LSJ
  rationale: The idiom conveys a state of intermixture or indiscriminate blending.
    'Is mixed together' preserves the image and fits the ensuing vice list better
    than a more interpretive 'is in confusion.'
- source_word: αἷμα
  chosen: blood
  alternatives:
  - bloodshed
  lexicon: LSJ
  rationale: The noun is literally 'blood.' In this vice list it likely implies bloodshed,
    but retaining 'blood' stays closer to the Greek while allowing the collocation
    with 'murder' to intensify the sense.
- source_word: φόνος
  chosen: murder
  alternatives:
  - slaughter
  - killing
  lexicon: LSJ
  rationale: In a vice list, 'murder' best captures unlawful killing and is the standard
    moral sense in English.
- source_word: κλοπή
  chosen: theft
  alternatives:
  - stealing
  - robbery
  lexicon: LSJ
  rationale: Abstract noun in a list of vices; 'theft' matches the nominal style of
    the Greek.
- source_word: δόλος
  chosen: deceit
  alternatives:
  - treachery
  - guile
  lexicon: LSJ
  rationale: '''Deceit'' is clear modern English and broad enough for the Greek term''s
    sense of craftiness or fraud.'
- source_word: φθορά
  chosen: corruption
  alternatives:
  - ruin
  - destruction
  - depravity
  lexicon: LSJ
  rationale: The term can denote decay or moral ruin. In this ethical catalog, 'corruption'
    best preserves both moral and social deterioration without over-specifying.
- source_word: ἀπιστία
  chosen: faithlessness
  alternatives:
  - unfaithfulness
  - disloyalty
  - unbelief
  lexicon: LSJ
  rationale: Here the context is social and moral breakdown, not specifically lack
    of religious belief. 'Faithlessness' captures unreliability and breach of trust.
- source_word: τάραχος
  chosen: turmoil
  alternatives:
  - disorder
  - confusion
  - uproar
  lexicon: LSJ
  rationale: The word denotes disturbance or agitation. 'Turmoil' is readable and
    suits the cascading social chaos of the verse.
- source_word: ἐπιορκία
  chosen: perjury
  alternatives:
  - false swearing
  - oath-breaking
  lexicon: LSJ
  rationale: The term specifically concerns violation of sworn truth; 'perjury' is
    concise and precise in English.
- source_word: θόρυβος ἀγαθῶν
  chosen: confusion over what is good
  alternatives:
  - uproar over blessings
  - disturbance of good things
  - disorder concerning benefits
  lexicon: LSJ
  rationale: The phrase is difficult. Given the vice-list context, it likely refers
    to the disruption or overturning of moral goods rather than mere noisy abundance.
    'Confusion over what is good' brings out ethical disorientation in idiomatic English
    while staying anchored to ἀγαθῶν as 'good things/goods.'
