translation:
  text: For it was desire for profit that devised that one, and skillful wisdom constructed
    it;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'desire for gain devised it.' The Greek demonstrative likely refers back
      to the ship in the previous verse, and πορισμῶν can be rendered 'for gain' or
      'for profit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκείνο
  chosen: that one
  alternatives:
  - that
  - it
  lexicon: LSJ
  rationale: Neuter demonstrative referring back to the ship just mentioned in the
    prior verse. 'That one' preserves the demonstrative force without over-specifying
    beyond the immediate context.
- source_word: ὄρεξις
  chosen: desire
  alternatives:
  - appetite
  - longing
  - eagerness
  lexicon: LSJ
  rationale: The noun denotes desire or craving. 'Desire' is broad enough for the
    context and avoids the overly bodily sense of 'appetite'.
- source_word: πορισμῶν
  chosen: for profit
  alternatives:
  - for gain
  - for acquisition
  - of resources
  lexicon: LSJ
  rationale: The genitive from πορισμός commonly refers to means of gain or profit.
    In context of shipbuilding and commerce, 'for profit' best captures the economic
    motive.
- source_word: ἐπενόησεν
  chosen: devised
  alternatives:
  - contrived
  - invented
  - planned
  lexicon: LSJ
  rationale: The verb conveys conceiving or devising in the mind. 'Devised' fits the
    sense of originating the idea.
- source_word: τεχνῖτις
  chosen: skillful
  alternatives:
  - craftsmanly
  - artisanal
  - technical
  lexicon: LSJ
  rationale: Used adjectivally with σοφία, it denotes craftsmanship or technical skill.
    'Skillful' gives natural English while preserving the craft-oriented nuance.
- source_word: σοφία
  chosen: wisdom
  alternatives:
  - skill
  - cleverness
  lexicon: LSJ
  rationale: Although in this collocation it overlaps with practical skill, 'wisdom'
    preserves the lexical identity of σοφία and the broader thematic resonance in
    Wisdom of Solomon.
- source_word: κατεσκεύασεν
  chosen: constructed
  alternatives:
  - built
  - made
  - fashioned
  lexicon: LSJ
  rationale: The verb means to prepare, construct, or build. 'Constructed' pairs well
    with the prior mental action 'devised' and reflects the move from conception to
    fabrication.
