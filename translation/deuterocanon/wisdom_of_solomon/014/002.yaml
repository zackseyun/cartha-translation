reference: Wisdom of Solomon 14:2
source:
  edition: lxx-swete-1909
  text: ἐκείνο μὲν γὰρ ὄρεξις πορισμῶν ἐπενόησεν, τεχνῖτις δὲ σοφία κατεσκεύασεν·
  language: Greek
  pages:
  - 646
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
