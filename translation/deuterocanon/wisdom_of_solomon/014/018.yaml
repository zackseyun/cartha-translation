    Wisdom 19:22.
translation:
  text: And the ambition of the craftsman urged on even those who were ignorant toward
    an intensification of worship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the increase of religion' or 'for the heightening of religious observance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίτασιν
  chosen: intensification
  alternatives:
  - increase
  - heightening
  lexicon: LSJ
  rationale: The noun denotes a strengthening or intensifying. 'Intensification' preserves
    the causal sense that the artisan's ambition drove religion to a stronger or more
    elaborate expression.
- source_word: θρησκείας
  chosen: worship
  alternatives:
  - religion
  - religious observance
  lexicon: LSJ
  rationale: θρησκεία can mean religion or cultic observance. In this idolatry context,
    'worship' best captures the practical devotional activity being intensified, while
    remaining readable in English.
- source_word: ἀγνοοῦντας
  chosen: those who were ignorant
  alternatives:
  - the ignorant
  - those who did not know
  lexicon: LSJ
  rationale: The participle refers to people lacking understanding or knowledge. 'Those
    who were ignorant' keeps the personal reference and the imperfective sense without
    overinterpreting what they did not know.
- source_word: τεχνίτου
  chosen: craftsman
  alternatives:
  - artisan
  - workman
  lexicon: LSJ
  rationale: The term refers to the maker of the image. 'Craftsman' is natural modern
    English and preserves the skilled-manual sense.
- source_word: προετρέψατο
  chosen: urged on
  alternatives:
  - incited
  - prompted
  - encouraged
  lexicon: LSJ
  rationale: The middle verb here conveys causing or urging forward. 'Urged on' fits
    the syntax with the object 'those who were ignorant' and avoids overstating the
    force as violent incitement.
- source_word: φιλοτιμία
  chosen: ambition
  alternatives:
  - zeal for honor
  - love of distinction
  - vanity
  lexicon: LSJ
  rationale: φιλοτιμία is literally love of honor and often means ambition. Here it
    describes the artisan's drive for recognition, which led to expanded idol worship.
    'Ambition' is concise and contextually apt.
