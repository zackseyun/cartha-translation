theological_decisions:
- issue: Rendering of μυστήρια in a pagan cultic context
  chosen_reading: mysteries
  alternative_readings:
  - secret rites
  - mystic rites
  rationale: The term is not uniquely positive or Christian; here it refers to hidden
    pagan religious observances. Retaining 'mysteries' preserves the historical-religious
    category while the adjective 'secret' clarifies the sense for modern readers.
  doctrine_reference: Translation philosophy §1, §6
- issue: Moral force of τεκνοφόνους
  chosen_reading: child-killing rites
  alternative_readings:
  - child-murdering rites
  - rites involving the murder of children
  rationale: The Greek strongly condemns the practice, but the translation should
    not expand beyond the source. 'Child-killing' preserves the severity while staying
    close to the lexical content.
  doctrine_reference: Translation philosophy §1, §6
