translation:
  text: For they were conducting either child-killing rites, or secret mysteries,
    or frenzied revelries of strange ordinances,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'child-murdering rites.' The Greek compound is strongly condemnatory.
    reason: lexical_alternative
  - marker: b
    text: Or 'secret rites' for 'secret mysteries.' The Greek uses the technical term
      for mystery-cult observances.
    reason: lexical_alternative
  - marker: c
    text: Or 'frenzied revelries of bizarre customs.' The phrase compresses the idea
      of riotous celebrations shaped by abnormal or perverse practices.
    reason: lexical_alternative
lexical_decisions:
- source_word: τεκνοφόνους
  chosen: child-killing
  alternatives:
  - child-murdering
  - murder of children
  - infanticidal
  lexicon: LSJ
  rationale: Compound adjective from τέκνον and φόνος, describing rites involving
    the killing of children. 'Child-killing' is direct and readable, preserving the
    horror without importing a more technical term.
- source_word: τελετὰς
  chosen: rites
  alternatives:
  - ceremonies
  - initiations
  - rituals
  lexicon: LSJ
  rationale: In religious context τελετή commonly denotes ritual observances or initiatory
    rites. 'Rites' best fits the cultic setting and pairs naturally with τεκνοφόνους.
- source_word: κρύφια
  chosen: secret
  alternatives:
  - hidden
  - concealed
  lexicon: LSJ
  rationale: The adjective denotes what is hidden or secret. 'Secret' is idiomatic
    with 'mysteries' in English and reflects the clandestine sense.
- source_word: μυστήρια
  chosen: mysteries
  alternatives:
  - secret rites
  - mystic rites
  lexicon: LSJ
  rationale: The term refers to mystery-cult observances. 'Mysteries' preserves the
    religious-technical flavor and avoids overexplaining in the main text.
- source_word: ἐμμανεῖς
  chosen: frenzied
  alternatives:
  - mad
  - raving
  - possessed
  lexicon: LSJ
  rationale: The adjective conveys being in a state of mania or frenzy. 'Frenzied'
    communicates the ecstatic, uncontrolled character without overstating demonic
    possession.
- source_word: ἐξάλλων
  chosen: strange
  alternatives:
  - outlandish
  - wild
  - alien
  lexicon: LSJ
  rationale: The word suggests abnormality or deviation from what is proper. 'Strange'
    is natural English and leaves the moral judgment to the context.
- source_word: θεσμῶν
  chosen: customs
  alternatives:
  - ordinances
  - institutions
  - usages
  lexicon: LSJ
  rationale: Here the sense is established practices or norms associated with the
    revelries. 'Customs' is more idiomatic than 'ordinances' in this cultic-social
    context.
- source_word: κώμους
  chosen: revelries
  alternatives:
  - carousals
  - festive processions
  - orgiastic celebrations
  lexicon: LSJ
  rationale: κῶμος denotes riotous festivity, often with drunken or immoral overtones.
    'Revelries' captures the excess without adding details not explicit in the word.
- source_word: ἄγοντες
  chosen: were conducting
  alternatives:
  - were holding
  - were carrying on
  - celebrating
  lexicon: LSJ
  rationale: The participle governs the listed activities and indicates active performance.
    'Were conducting' fits the ongoing descriptive context and works smoothly in English.
