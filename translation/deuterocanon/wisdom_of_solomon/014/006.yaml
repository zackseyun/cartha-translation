theological_decisions:
- issue: Referent of 'the hope of the world'
  chosen_reading: A personified reference to Noah/the preserved human remnant through
    whom humanity continues
  alternative_readings:
  - A more abstract reference to hope itself surviving the flood
  rationale: 'The feminine participle καταφυγοῦσα agrees with ἐλπίς, but the phrase
    functions concretely in context: the surviving remnant borne through the flood
    becomes the world''s hope. The translation keeps the personified wording rather
    than resolving it into a paraphrase.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of αἰών distinct from κόσμος
  chosen_reading: Translate τῷ αἰῶνι temporally as 'to the age to come' rather than
    repeating 'world'
  alternative_readings:
  - for the world
  - for posterity
  rationale: The verse uses both κόσμος and αἰών; rendering both as 'world' would
    obscure the distinction. A temporal rendering better reflects the Greek contrast
    and the idea of humanity's continuation into future time.
  doctrine_reference: Original-language primacy over translation tradition; consistency
    of key terms, or documented exception.
