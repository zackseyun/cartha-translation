translation:
  text: For when the proud giants were perishing in the beginning, the hope of the
    world, taking refuge on a raft, left to the age a seed of generation, steered
    by your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a vessel' or 'on a small craft.' The Greek says 'raft,' a rhetorically
      marked term rather than the usual word for a ship or ark.
    reason: lexical_alternative
  - marker: b
    text: Or 'for posterity' or 'for the age.' The Greek distinguishes 'world' (κόσμος)
      earlier in the verse from 'age' (αἰών) here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχῆς
  chosen: at the beginning
  alternatives:
  - from the beginning
  - in the beginning
  lexicon: LSJ
  rationale: Genitive with γάρ here is temporal in sense, referring to the early primeval
    time of judgment rather than a metaphysical 'beginning.' 'At the beginning' is
    natural English and preserves the temporal force.
- source_word: ἀπολλυμένων
  chosen: were being destroyed
  alternatives:
  - were perishing
  - were being wiped out
  lexicon: BDAG
  rationale: Present middle/passive participle conveys ongoing destruction. 'Were
    being destroyed' best fits the flood-judgment context and keeps the passive sense
    without overinterpreting agency.
- source_word: ὑπερηφάνων
  chosen: proud
  alternatives:
  - arrogant
  - haughty
  lexicon: LSJ
  rationale: The adjective denotes arrogance or overbearing pride. 'Proud' is concise
    and idiomatic, while still carrying the moral sense in context.
- source_word: γιγάντων
  chosen: giants
  alternatives:
  - Titans
  lexicon: LSJ
  rationale: The standard sense in Hellenistic Jewish usage evokes the primeval giants
    of Genesis tradition. 'Giants' is the most transparent rendering; 'Titans' would
    import Greek mythic associations too strongly.
- source_word: ἡ ἐλπὶς τοῦ κόσμου
  chosen: the hope of the world
  alternatives:
  - the world's hope
  lexicon: BDAG
  rationale: A personified expression referring to Noah and/or the remnant preserved
    through him as the world's surviving hope. The more literal phrasing preserves
    the elevated style.
- source_word: ἐπὶ σχεδίας
  chosen: on a raft
  alternatives:
  - on a vessel
  - on a small craft
  lexicon: LSJ
  rationale: σχεδία commonly denotes a raft or simple floating structure. Although
    the referent is Noah's ark, the Greek word itself is not the usual term for a
    ship; 'raft' preserves the lexical choice and the author's rhetorical style.
- source_word: καταφυγοῦσα
  chosen: taking refuge
  alternatives:
  - having fled for refuge
  - escaping
  lexicon: BDAG
  rationale: The participle emphasizes seeking safety rather than mere movement. 'Taking
    refuge' captures both the motion and the protective nuance.
- source_word: ἀπέλιπεν
  chosen: left
  alternatives:
  - left behind
  - preserved
  lexicon: BDAG
  rationale: The verb straightforwardly means 'left' or 'left behind.' 'Preserved'
    would be interpretive; 'left' keeps the text's direct wording.
- source_word: τῷ αἰῶνι
  chosen: to the age to come
  alternatives:
  - for the world
  - for the age
  - for posterity
  lexicon: LSJ
  rationale: Here αἰών is best taken as the continuing age or future human era, not
    merely 'world' (already expressed by κόσμος). 'To the age to come' preserves the
    temporal-forward sense and avoids flattening the distinction between κόσμος and
    αἰών.
- source_word: σπέρμα γενέσεως
  chosen: a seed of a new generation
  alternatives:
  - seed of offspring
  - seed of birth
  - offspring for a new beginning
  lexicon: LSJ
  rationale: σπέρμα is literally 'seed,' and γενέσεως denotes generation/origin. The
    phrase points to the preserved source of renewed humanity after the flood. 'A
    seed of a new generation' makes the sense clear in English while retaining the
    seed metaphor.
- source_word: τῇ σῇ κυβερνηθείσῃ χειρί
  chosen: steered by your hand
  alternatives:
  - guided by your hand
  - governed by your hand
  lexicon: LSJ
  rationale: The aorist passive participle from κυβερνάω has nautical overtones ('steer,
    pilot'), fitting the flood setting and the mention of the raft. 'Steered by your
    hand' preserves both the maritime imagery and divine agency.
