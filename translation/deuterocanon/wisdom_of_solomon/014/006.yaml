id: WIS.14.6
reference: Wisdom of Solomon 14:6
source:
  edition: lxx-swete-1909
  text: καὶ ἀρχῆς γὰρ ἀπολλυμένων ὑπερηφάνων γιγάντων, ἡ ἐλπὶς τοῦ κόσμου ἐπὶ σχεδίας
    καταφυγοῦσα ἀπέλιπεν τῷ αἰῶνι σπέρμα γενέσεως, τῇ σῇ κυβερνηθείσῃ χειρί.
  language: Greek
  pages:
