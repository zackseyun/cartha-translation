id: WIS.14.3
reference: Wisdom of Solomon 14:3
source:
  edition: lxx-swete-1909
  text: ἡ δέ σή, πάτερ, διακυβερνᾷ πρόνοια, ὅτι ἔδωκας καὶ ἐν θαλάσσῃ ὁδὸν καὶ ἐν
    κύμασι τρίβον ἀσφαλῆ,
  language: Greek
  pages:
  - 646
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
