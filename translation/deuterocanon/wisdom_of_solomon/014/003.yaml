translation:
  text: But your providence, Father, steers it, because you gave a way even in the
    sea, and a safe path in the waves,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'governs' or 'pilots'; the Greek verb has a nautical sense, fitting the
      ship imagery in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακυβερνᾷ
  chosen: steers
  alternatives:
  - governs
  - pilots
  - guides
  lexicon: LSJ
  rationale: The verb is nautical in imagery ('to steer/pilot a ship'). In context,
    the previous verse concerns a vessel, so 'steers' preserves the concrete maritime
    metaphor better than the more abstract 'governs'.
- source_word: πρόνοια
  chosen: providence
  alternatives:
  - forethought
  - care
  - provision
  lexicon: LSJ
  rationale: In Wisdom literature this term carries both foresight and active divine
    care. 'Providence' best captures the theological sense in idiomatic English without
    flattening it to mere planning.
- source_word: πάτερ
  chosen: Father
  alternatives:
  - O Father
  lexicon: LSJ
  rationale: The vocative directly addresses God. 'Father' preserves the personal
    address; adding 'O' would be possible but is not required by the Greek and would
    sound more archaic.
- source_word: ἔδωκας
  chosen: you gave
  alternatives:
  - you provided
  - you made
  lexicon: LSJ
  rationale: The aorist verb is straightforwardly 'gave.' Although English might smooth
    to 'provided,' 'gave' stays closer to the source while still reading naturally.
- source_word: ὁδὸν
  chosen: a way
  alternatives:
  - a road
  - a path
  lexicon: LSJ
  rationale: In the sea, 'way' is the most natural English equivalent and echoes biblical
    imagery of God making a way through waters.
- source_word: τρίβον
  chosen: path
  alternatives:
  - track
  - roadway
  - way
  lexicon: LSJ
  rationale: Using 'path' distinguishes τρίβον from the earlier ὁδόν while preserving
    the parallelism. 'Track' is possible but less natural here.
- source_word: ἀσφαλῆ
  chosen: safe
  alternatives:
  - secure
  - firm
  lexicon: LSJ
  rationale: The adjective describes the path as secure from danger. 'Safe' is the
    clearest modern English rendering in this context.
- source_word: ἐν θαλάσσῃ
  chosen: in the sea
  alternatives:
  - through the sea
  - on the sea
  lexicon: LSJ
  rationale: The preposition is literally 'in.' English could idiomatically say 'through
    the sea,' but 'in the sea' preserves the striking formulation of the Greek.
- source_word: ἐν κύμασι
  chosen: in the waves
  alternatives:
  - through the waves
  - amid the waves
  lexicon: LSJ
  rationale: Again the Greek uses 'in'; retaining it preserves the poetic parallel
    with 'in the sea' while remaining intelligible.
