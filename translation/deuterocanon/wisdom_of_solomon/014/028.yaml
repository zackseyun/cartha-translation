id: WIS.14.28
reference: Wisdom of Solomon 14:28
source:
  edition: lxx-swete-1909
  text: ἢ γὰρ εὐφραινόμενοι μεμήνασιν, ἢ προφητεύουσιν ψευδῆ, ἢ ζῶσιν ἀδίκως, ἢ ἐπιορκοῦσιν
    ταχέως·
  language: Greek
  pages:
  - 648
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: For either, while reveling, they go mad; or they prophesy lies; or they live
    unjustly; or they quickly swear false oaths;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'making merry, they are driven mad.' The Greek participle plus perfect
      verb can be rendered with slightly different aspect in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'they readily perjure themselves.' The Greek ἐπιορκοῦσιν refers to swearing
      falsely or committing perjury.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐφραινόμενοι
  chosen: while celebrating
  alternatives:
  - rejoicing
  - making merry
  lexicon: LSJ
  rationale: The participle denotes being in a state of festivity or merriment. 'While
    celebrating' captures the temporal force and the likely cultic/feasting context
    without sounding archaic.
- source_word: μεμήνασιν
  chosen: they go mad
  alternatives:
  - they are insane
  - they rave
  lexicon: LSJ
  rationale: From μαίνομαι, indicating madness or frenzied behavior. 'They go mad'
    is vivid, idiomatic English and preserves the force of the perfect as a present-result
    state in context.
- source_word: προφητεύουσιν ψευδῆ
  chosen: they prophesy lies
  alternatives:
  - they utter false prophecies
  - they prophesy falsely
  lexicon: LSJ
  rationale: The verb-object construction is best preserved directly. 'Prophesy lies'
    keeps the sharpness of the Greek and avoids softening the accusation into a mere
    adverbial qualifier.
- source_word: ζῶσιν ἀδίκως
  chosen: they live unjustly
  alternatives:
  - they live unrighteously
  - they live wickedly
  lexicon: LSJ
  rationale: ἀδίκως can denote unjustly or unrighteously. 'Unjustly' fits Wisdom's
    ethical register and avoids importing later doctrinal overtones not explicit here.
- source_word: ἐπιορκοῦσιν
  chosen: they swear false oaths
  alternatives:
  - they commit perjury
  - they break oaths
  lexicon: LSJ
  rationale: The verb refers to swearing falsely or perjuring oneself. 'Swear false
    oaths' is more transparent to modern readers than 'commit perjury' and preserves
    the oath-language explicit in the Greek.
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - readily
  - without hesitation
  lexicon: LSJ
  rationale: The adverb modifies their false swearing as something done promptly or
    readily. 'Quickly' is the most direct rendering, though the sense includes rash
    readiness.
