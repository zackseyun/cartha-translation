  text: δεικνὺς ὅτι δύνασαι ἐκ παντὸς σώζειν, ἵνα κἂν ἄνευ τέχνης τις ἐπιβῇ.
  language: Greek
  pages:
  - 646
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
