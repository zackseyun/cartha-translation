translation:
  text: showing that you are able to save from every peril, so that even someone without
    skill may embark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from everything.' The Greek is broader than the immediate nautical setting;
      'from every danger' brings out the contextual sense of peril at sea.
    reason: lexical_alternative
  - marker: b
    text: Or 'without seamanship' or 'without technical skill.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεικνὺς
  chosen: showing
  alternatives:
  - making known
  - demonstrating
  lexicon: LSJ
  rationale: Present participle continuing the thought from the prior verse; 'showing'
    is natural English and preserves the evidential force without overformal stiffness.
- source_word: δύνασαι
  chosen: you are able
  alternatives:
  - you can
  - you have power
  lexicon: LSJ
  rationale: Directly expresses capability addressed to God. 'You are able' preserves
    the solemn tone better than the more colloquial 'you can.'
- source_word: ἐκ παντὸς
  chosen: from every danger
  alternatives:
  - out of everything
  - from every circumstance
  lexicon: LSJ
  rationale: Literally 'from everything,' but in context of sea travel and divine
    rescue the phrase idiomatically means rescue from any peril. 'Danger' makes the
    sense explicit without excessive paraphrase.
- source_word: σώζειν
  chosen: to save
  alternatives:
  - to rescue
  - to deliver
  lexicon: LSJ
  rationale: '''Save'' is the core sense and preserves theological resonance, while
    still fitting the immediate context of physical deliverance.'
- source_word: ἵνα κἂν
  chosen: so that even
  alternatives:
  - so that although even
  - with the result that even
  lexicon: LSJ
  rationale: Captures purpose/result with the concessive-intensifying force of κἂν
    in smooth English.
- source_word: ἄνευ τέχνης
  chosen: without skill
  alternatives:
  - without art
  - without seamanship
  - without technical knowledge
  lexicon: LSJ
  rationale: τέχνη here refers to practical craft or seamanship. 'Without skill' is
    concise and readable; a more specific 'without seamanship' is possible but slightly
    more interpretive than the Greek requires.
- source_word: τις
  chosen: someone
  alternatives:
  - anyone
  - a person
  lexicon: LSJ
  rationale: Indefinite singular; 'someone' reads naturally in English and preserves
    the generic force.
- source_word: ἐπιβῇ
  chosen: may embark
  alternatives:
  - may board
  - may go aboard
  lexicon: LSJ
  rationale: In the nautical context, the verb means to go on board a vessel. 'Embark'
    is idiomatic and suitably elevated.
