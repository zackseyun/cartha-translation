theological_decisions:
- issue: Scope of divine saving power in ἐκ παντὸς σώζειν
  chosen_reading: Rendered as general rescue 'from every danger' while retaining 'save'
    for theological resonance.
  alternative_readings:
  - save out of everything
  - rescue from every peril
  rationale: The verse speaks of God's power in the concrete context of seafaring,
    yet the wording is broad. The translation keeps both the immediate maritime sense
    and the wider theological claim without overstating either.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence'
