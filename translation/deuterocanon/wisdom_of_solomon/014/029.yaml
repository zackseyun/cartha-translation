translation:
  text: For because they trusted in lifeless idols, after swearing wickedly they do
    not expect to be harmed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vain idols' or 'worthless idols.' The Greek adjective stresses the idols'
      emptiness or unreality.
    reason: lexical_alternative
  - marker: b
    text: Or 'they do not expect to be wronged' or 'they do not expect punishment.'
      The Greek can refer generally to suffering harm; in context it likely implies
      no feared retribution for wicked oath-taking.
    reason: alternative_reading
lexical_decisions:
- source_word: αἴγνιοι
  chosen: lifeless
  alternatives:
  - vain
  - empty
  - worthless
  lexicon: LSJ
  rationale: The adjective modifies idols and conveys their insubstantial or unreal
    character. 'Lifeless' makes explicit in natural English that these idols have
    no real power or life, fitting the argument of the context better than the less
    concrete 'vain' or 'empty'.
- source_word: πεποιθότες
  chosen: they trusted
  alternatives:
  - having put confidence
  - relying
  lexicon: BDAG
  rationale: Perfect participle expressing settled reliance. 'They trusted' is idiomatic
    and preserves the sense of ongoing confidence.
- source_word: εἰδώλοις
  chosen: idols
  alternatives:
  - images
  lexicon: BDAG
  rationale: In Wisdom this term clearly refers to cultic images treated as gods.
    'Idols' best captures the religious polemic.
- source_word: κακῶς
  chosen: wicked
  alternatives:
  - falsely
  - evilly
  lexicon: LSJ
  rationale: The adverb qualifies their oath-taking morally. 'Wicked' preserves the
    ethical force; 'falsely' is possible in context but is narrower than the Greek
    wording.
- source_word: ὀμόσαντες
  chosen: when they swore ... oaths
  alternatives:
  - having sworn
  - after swearing
  lexicon: BDAG
  rationale: The participle is rendered temporally in smooth English. Adding 'oaths'
    makes explicit the object inherent in the verb 'swear' and clarifies the action
    without overtranslating.
- source_word: ἀδικηθῆναι
  chosen: to be harmed
  alternatives:
  - to be wronged
  - to suffer punishment
  - to be injured
  lexicon: BDAG
  rationale: The passive infinitive after προσδέχονται refers to suffering adverse
    consequences. 'To be harmed' is broad and natural, covering both being wronged
    and being punished by offended divine powers; in context the point is that they
    expect no retribution from powerless idols.
- source_word: οὐ προσδέχονται
  chosen: they do not expect
  alternatives:
  - they do not await
  - they do not anticipate
  lexicon: BDAG
  rationale: This verb expresses expectation. 'They do not expect' is the clearest
    modern English rendering.
