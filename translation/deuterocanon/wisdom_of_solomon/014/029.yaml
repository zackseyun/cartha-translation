theological_decisions:
- issue: Interpretation of the consequence clause
  chosen_reading: The verse means that because they trust in powerless idols, they
    expect no harm or punishment even after swearing wickedly.
  alternative_readings:
  - They do not expect to be wronged by the idols themselves.
  - They do not expect punishment for perjury because the idols are lifeless.
  rationale: The Greek infinitive ἀδικηθῆναι is somewhat broad, but within the anti-idolatry
    argument the sense is that idolaters feel secure in false or evil oath-taking
    because the idols they invoke have no real power to judge. The English 'to be
    harmed' preserves that breadth without importing a narrower doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
