translation:
  text: For the ungodly man and his ungodliness are equally hateful to God;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the impious man and his impiety are alike hated by God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἴσῳ
  chosen: equally
  alternatives:
  - alike
  - to the same degree
  lexicon: LSJ
  rationale: The idiom ἐν ἴσῳ means 'on equal terms' or 'equally.' 'Equally' is concise
    and natural in English while preserving the comparative force.
- source_word: μισητά
  chosen: hateful
  alternatives:
  - hated
  - detestable
  lexicon: LSJ
  rationale: As a predicate adjective with θεῷ, the sense is that both are objects
    of divine hatred. 'Hateful to God' preserves the adjectival force better than
    the more verbal 'hated by God,' while remaining idiomatic.
- source_word: θεῷ
  chosen: to God
  alternatives:
  - before God
  - in God's sight
  lexicon: LSJ
  rationale: The dative here is best rendered with English 'to' after 'hateful,' yielding
    a straightforward and natural construction.
- source_word: ὁ ἀσεβῶν
  chosen: the ungodly man
  alternatives:
  - the impious man
  - the one who acts ungodly
  - the ungodly person
  lexicon: LSJ
  rationale: The articular participle denotes the person characterized by ungodliness.
    'Ungodly man' is compact and reflects the masculine singular form; 'person' would
    be more gender-neutral than the source warrants under the project's gender-accuracy
    principle.
- source_word: ἀσέβεια
  chosen: ungodliness
  alternatives:
  - impiety
  - godlessness
  lexicon: LSJ
  rationale: '''Ungodliness'' closely matches the cognate relation with ἀσεβῶν and
    is accessible modern English. ''Impiety'' is accurate but less natural for the
    target audience.'
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - that person's
  lexicon: LSJ
  rationale: The pronoun refers back to the masculine singular subject implied by
    ὁ ἀσεβῶν. 'His' preserves the grammatical linkage cleanly.
