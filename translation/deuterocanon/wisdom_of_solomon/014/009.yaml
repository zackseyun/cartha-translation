theological_decisions:
- issue: Divine hatred directed toward both sinner and sin
  chosen_reading: The verse states that both the ungodly person and his ungodliness
    are equally hateful to God.
  alternative_readings:
  - The verse emphasizes only moral equivalence without implying personal divine hatred
    in a broader theological sense.
  rationale: The Greek explicitly places both ὁ ἀσεβῶν and ἡ ἀσέβεια αὐτοῦ under the
    predicate μισητά θεῷ. The translation should not soften this to hatred of sin
    alone, nor should it expand the statement beyond the verse into a systematic doctrine.
  doctrine_reference: Preserve theological tension rather than resolve it.
