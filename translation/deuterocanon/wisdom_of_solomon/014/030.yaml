theological_decisions:
- issue: Referent of 'both' and the force of 'τὰ δίκαια'
  chosen_reading: '''both'' refers to the two sins named in the verse''s latter half,
    and ''justice'' denotes the just consequences that pursue the offenders.'
  alternative_readings:
  - '''both'' refers to both classes of idolaters mentioned in the preceding context'
  - '''the just things'' could be rendered more explicitly as ''just punishment'''
  rationale: 'The immediate syntax points to a summary of two offenses: false thinking
    about God through idolatry and unjust oath-taking. Rendering τὰ δίκαια as ''justice''
    preserves the broader moral-judicial sense without narrowing it prematurely to
    punishment alone, though punitive consequence is clearly implied.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
