translation:
  text: But justice will pursue them both, because they thought wrongly about God
    by giving heed to idols, and they swore unjustly in deceit, despising holiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the demands of justice' or 'just punishment will pursue them both.'
    reason: lexical_alternative
  - marker: b
    text: That is, they formed a false view of God by attaching themselves to idols.
    reason: lexical_alternative
  - marker: c
    text: Or 'despising piety' or 'showing contempt for what is holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμφότερα
  chosen: both
  alternatives:
  - both things
  - both parties
  lexicon: LSJ
  rationale: Neuter plural/adverbial sense referring back to the two offenses just
    mentioned in context; 'both' is concise and natural in English while preserving
    the dual reference.
- source_word: μετελεύσεται
  chosen: will pursue
  alternatives:
  - will overtake
  - will visit
  - will prosecute
  lexicon: LSJ
  rationale: The verb conveys following after with punitive force. 'Will pursue' preserves
    the image of retributive justice actively coming after them without overinterpreting
    the exact mode of punishment.
- source_word: τὰ δίκαια
  chosen: justice
  alternatives:
  - what is just
  - just punishment
  - the demands of justice
  lexicon: LSJ
  rationale: The neuter plural with article can denote the just consequences or claims
    of justice. 'Justice' in English captures the collective sense idiomatically;
    'just punishment' is possible but slightly more interpretive.
- source_word: κακῶς ἐφρόνησαν περὶ θεοῦ
  chosen: they thought wrongly about God
  alternatives:
  - they held evil thoughts about God
  - they reasoned badly concerning God
  lexicon: LSJ
  rationale: This phrase concerns erroneous judgment or conception regarding God,
    not merely immoral feeling. 'Thought wrongly about God' is clear, accurate, and
    avoids archaic phrasing.
- source_word: προσχόντες εἰδώλοις
  chosen: by giving heed to idols
  alternatives:
  - by devoting themselves to idols
  - by attaching themselves to idols
  - by paying attention to idols
  lexicon: LSJ
  rationale: 'The participle explains how they thought wrongly about God: they turned
    their attention/adherence toward idols. ''Giving heed to idols'' preserves the
    participial nuance and avoids importing stronger cultic language than the Greek
    explicitly states, though idolatrous devotion is implied.'
- source_word: ἀδίκως ὤμοσαν
  chosen: they swore unjustly
  alternatives:
  - they swore falsely
  - they took wicked oaths
  lexicon: LSJ
  rationale: ἀδίκως means unjustly/wrongfully. 'Falsely' is related but narrower;
    the Greek emphasizes moral wrongness in oath-taking, not only factual falsity.
- source_word: ἐν δόλῳ
  chosen: in deceit
  alternatives:
  - deceitfully
  - with treachery
  - by fraud
  lexicon: LSJ
  rationale: The prepositional phrase modifies their swearing and indicates the sphere
    or manner of deceit. 'In deceit' is slightly formal but transparent and close
    to the Greek structure.
- source_word: καταφρονήσαντες ὁσιότητος
  chosen: despising holiness
  alternatives:
  - despising piety
  - showing contempt for what is holy
  - disregarding sanctity
  lexicon: LSJ
  rationale: ὁσιότης denotes holiness/piety in the sense of reverence for what is
    sacred. 'Holiness' is the most accessible and weighty English term here; 'piety'
    is possible but can sound narrower or more subjective.
