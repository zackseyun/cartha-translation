translation:
  text: Then, as time passed, that ungodly custom grew strong and was kept as a law,
    and by the commands of tyrants the carved images were worshiped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in time' or 'over time.' The Greek expression marks gradual development.
    reason: lexical_alternative
  - marker: b
    text: Or 'the graven images.' The Greek literally refers to carved objects or
      images.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα
  chosen: Then
  alternatives:
  - Afterward
  - Next
  lexicon: LSJ
  rationale: Marks sequential development from the preceding argument; 'Then' is natural
    and sufficiently connective in English.
- source_word: ἐν χρόνῳ
  chosen: as time passed
  alternatives:
  - in time
  - over time
  lexicon: LSJ
  rationale: Idiomatic temporal expression. 'As time passed' conveys development over
    a span rather than a mere point in time.
- source_word: κρατυνθὲν
  chosen: grew strong
  alternatives:
  - was strengthened
  - became established
  lexicon: LSJ
  rationale: Aorist passive participle from κρατύνω, indicating that the custom became
    strong/firm over time. 'Grew strong' preserves the developmental sense in readable
    English.
- source_word: τὸ ἀσεβὲς ἔθος
  chosen: that ungodly custom
  alternatives:
  - the impious custom
  - that irreligious practice
  lexicon: LSJ
  rationale: ἀσεβής carries the sense of impious or ungodly; ἔθος is custom or practice.
    'Ungodly custom' is clear modern English and retains the moral-religious judgment
    of the Greek. 'That' helps tie it to the practice described in context.
- source_word: ὡς νόμος ἐφυλάχθη
  chosen: was kept as a law
  alternatives:
  - was observed as law
  - was maintained as a law
  lexicon: LSJ
  rationale: φυλάσσω here means keep/observe, and ὡς νόμος indicates treatment as
    if it had legal force. 'Was kept as a law' is concise and close to the Greek.
- source_word: τυράννων ἐπιταγαῖς
  chosen: by the commands of tyrants
  alternatives:
  - by tyrants' decrees
  - at the orders of rulers
  lexicon: LSJ
  rationale: ἐπιταγαί are commands or orders; τυράννων is best rendered 'tyrants'
    rather than softened to 'rulers,' since the Greek is morally charged.
- source_word: ἐθρησκεύετο
  chosen: were worshiped
  alternatives:
  - received religious veneration
  - were reverenced
  lexicon: LSJ
  rationale: The verb denotes religious observance or worship. In this idolatry context,
    'were worshiped' is the most direct and natural rendering.
- source_word: τὰ γλυπτά
  chosen: the carved images
  alternatives:
  - the graven images
  - the carved things
  - the idols
  lexicon: LSJ
  rationale: Literally 'carved things/images.' 'Carved images' preserves the material
    sense without archaic phrasing. 'Graven images' is traditional but dated; 'idols'
    is interpretive and less formally tied to the carving language.
