theological_decisions:
- issue: Whether to render τυράννων neutrally as 'rulers' or morally as 'tyrants'
  chosen_reading: tyrants
  alternative_readings:
  - rulers
  rationale: The Greek term τύραννος is not a neutral title here; the context critiques
    coercive political power in the spread of idolatry. Retaining 'tyrants' preserves
    the text's evaluative force without adding doctrine.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not flattening theological weight.'
- issue: Whether τὰ γλυπτά should be translated more interpretively as 'idols'
  chosen_reading: the carved images
  alternative_readings:
  - the idols
  - the graven images
  rationale: The immediate Greek emphasizes the manufactured, carved nature of the
    objects. 'Carved images' preserves that lexical detail while still making clear
    they are objects of worship. The idolatrous sense is supplied by the verb 'were
    worshiped.'
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception; readable modern English.'
