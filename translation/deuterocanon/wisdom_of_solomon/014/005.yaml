  text: θέλεις δὲ μὴ ἀργὰ εἶναι τὰ τῆς σοφίας σου ἔργα· διὰ τοῦτο καὶ ἐλαχίστῳ ξύλῳ
    πιστεύουσιν ἄνθρωποι ψυχάς, καὶ διελθόντες κλύδωνα σχεδίᾳ διεσώθησαν.
  language: Greek
  pages:
