theological_decisions:
- issue: Reference of 'your wisdom' and the theological force of divine providence
    in maritime safety
  chosen_reading: The verse addresses God directly and attributes effective action
    to God's wisdom without over-specifying a hypostatic doctrine of Wisdom.
  alternative_readings:
  - '''wisdom'' as a more fully personified agent'
  - '''wisdom'' as simply God''s wise ordering'
  rationale: The Greek plainly addresses God in the second person and speaks of 'the
    works of your wisdom.' The translation preserves this theological language while
    not forcing a stronger metaphysical claim than the verse itself states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
