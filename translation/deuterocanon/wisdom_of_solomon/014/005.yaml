translation:
  text: But you intend that the works of your wisdom should not be idle; therefore
    even with the smallest piece of wood men entrust their lives, and passing through
    the waves on a raft, they were brought safely through.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their souls.' Here the sense is likely 'their lives' in the context
      of risking oneself at sea.
    reason: lexical_alternative
  - marker: b
    text: Or 'a very small piece of wood.' The phrase highlights the frailty of the
      vessel in contrast to the preserving work of divine wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλεις
  chosen: you intend
  alternatives:
  - you will
  - you desire
  - you wish
  lexicon: BDAG
  rationale: θέλω here expresses divine will/purpose rather than mere future action.
    'You intend' captures purposeful volition in natural English.
- source_word: μὴ ἀργὰ εἶναι
  chosen: should not be idle
  alternatives:
  - should not be inactive
  - should not be ineffective
  - not be in vain
  lexicon: LSJ
  rationale: ἀργός commonly means idle, inactive, or unproductive. 'Idle' preserves
    the image of works not lying inactive, while allowing the implied sense of effectiveness.
- source_word: τὰ τῆς σοφίας σου ἔργα
  chosen: the works of your wisdom
  alternatives:
  - the deeds of your wisdom
  - what your wisdom has done
  lexicon: LSJ
  rationale: A relatively formal rendering preserves the genitival relation and the
    personified/theological force of divine wisdom in context.
- source_word: διὰ τοῦτο
  chosen: therefore
  alternatives:
  - for this reason
  - because of this
  lexicon: BDAG
  rationale: Standard inferential connector; 'therefore' fits the elevated style and
    links divine purpose to the example that follows.
- source_word: ἐλαχίστῳ ξύλῳ
  chosen: the smallest piece of wood
  alternatives:
  - a very small piece of wood
  - the smallest wood
  - a tiny piece of timber
  lexicon: LSJ
  rationale: ξύλον here refers concretely to wood used for a vessel/raft. 'Piece of
    wood' communicates the humble material; 'smallest' reflects the superlative force
    of ἐλαχίστῳ.
- source_word: πιστεύουσιν
  chosen: entrust
  alternatives:
  - trust
  - commit
  lexicon: BDAG
  rationale: With ψυχάς as object, the sense is not merely believing but committing
    one's life to something. 'Entrust' best fits the construction.
- source_word: ψυχάς
  chosen: their lives
  alternatives:
  - their souls
  - their lives/souls
  lexicon: BDAG
  rationale: In this seafaring context ψυχή refers to life itself, the life one risks
    at sea. 'Lives' is clearer and contextually stronger than 'souls,' which could
    misdirect readers toward a narrower immaterial sense.
- source_word: κλύδωνα
  chosen: the surge
  alternatives:
  - the wave
  - the billow
  - the rough sea
  lexicon: LSJ
  rationale: κλύδων denotes a swelling wave or surge of the sea. 'The surge' is vivid
    and concise, preserving the maritime imagery.
- source_word: σχεδίᾳ
  chosen: on a raft
  alternatives:
  - by a raft
  - on a small craft
  lexicon: LSJ
  rationale: σχεδία is specifically a raft or makeshift floating platform. 'On a raft'
    is the most direct rendering.
- source_word: διεσώθησαν
  chosen: they were brought safely through
  alternatives:
  - they were saved
  - they came safely through
  - they were preserved
  lexicon: BDAG
  rationale: The compound verb emphasizes safe passage through danger. 'Were brought
    safely through' preserves both the passive form and the context of crossing water.
