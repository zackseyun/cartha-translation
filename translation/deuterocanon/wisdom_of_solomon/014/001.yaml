id: WIS.14.1
reference: Wisdom of Solomon 14:1
source:
  edition: lxx-swete-1909
  text: Ἰλοῦν τις πάλιν στελλόμενος καὶ ἄγρια μέλλων διοδεύειν κύματα τοῦ φέροντος
    αὐτὸν πλοίου σαθρότερον ξύλον ἐπιβᾶται.
  language: Greek
  pages:
  - 646
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: Again, someone preparing to sail and about to pass through wild waves boards
    more fragile wood than the ship that carries him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a more rotten piece of wood than the ship that carries him.' The Greek
      comparative can suggest physical unsoundness or decay as well as general fragility.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰλοῦν
  chosen: preparing to sail
  alternatives:
  - sailing
  - setting out by sea
  lexicon: LSJ
  rationale: The participle introduces the action of embarking on a sea journey. Given
    the surrounding nautical context (waves, ship, boards), an idiomatic rendering
    that makes the maritime sense explicit is preferable.
- source_word: τις
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: LSJ
  rationale: Indefinite singular referring to a representative human subject. 'A man'
    preserves the masculine singular form in line with the project's gender-accurate
    policy, while functioning generically.
- source_word: πάλιν
  chosen: Again
  alternatives:
  - once more
  - further
  lexicon: LSJ
  rationale: This adverb marks a renewed illustrative example in the argument. 'Again'
    is concise and natural in English.
- source_word: στελλόμενος
  chosen: preparing
  alternatives:
  - setting out
  - making ready
  lexicon: LSJ
  rationale: In context of travel by sea, the middle participle conveys making oneself
    ready or setting out. Combined with the preceding nautical participle, 'preparing
    to sail' captures the force smoothly.
- source_word: ἄγρια
  chosen: wild
  alternatives:
  - rough
  - fierce
  lexicon: LSJ
  rationale: Describes the threatening character of the waves. 'Wild' is vivid, accessible,
    and faithful to the image.
- source_word: διοδεύειν
  chosen: to pass through
  alternatives:
  - to traverse
  - to go through
  lexicon: LSJ
  rationale: The infinitive denotes crossing through the waves rather than merely
    approaching them.
- source_word: κύματα
  chosen: waves
  alternatives:
  - billows
  - seas
  lexicon: LSJ
  rationale: Standard and direct rendering of the nautical image.
- source_word: τοῦ φέροντος αὐτὸν πλοίου
  chosen: the ship that carries him
  alternatives:
  - the vessel carrying him
  - the boat that bears him
  lexicon: LSJ
  rationale: The genitive construction identifies the ship as the means of transport.
    'Carries him' is natural modern English.
- source_word: σαθρότερον
  chosen: more fragile
  alternatives:
  - more rotten
  - weaker
  - more perishable
  lexicon: LSJ
  rationale: Comparative of a term meaning unsound, brittle, or decayed. 'More fragile'
    preserves the comparative contrast without overcommitting to literal rot, which
    may be too narrow in context.
- source_word: ξύλον
  chosen: piece of wood
  alternatives:
  - wood
  - timber
  lexicon: LSJ
  rationale: The contrast is between the ship and the wooden object onto which the
    traveler steps. 'Piece of wood' makes the irony clearer in English than the bare
    'wood.'
- source_word: ἐπιβᾶται
  chosen: boards
  alternatives:
  - steps onto
  - goes aboard
  lexicon: LSJ
  rationale: A nautical/travel verb for stepping onto or embarking upon something.
    'Boards' is concise and idiomatic.
