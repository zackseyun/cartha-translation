theological_decisions:
- issue: Representative masculine subject
  chosen_reading: a man
  alternative_readings:
  - someone
  - a person
  rationale: The Greek uses an indefinite masculine singular to present a representative
    case. Per doctrine, gender-accurate rendering is preferred where it matches the
    source's intent.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Force of the comparison in σαθρότερον ξύλον
  chosen_reading: a more fragile piece of wood than the ship that carries him
  alternative_readings:
  - a more rotten piece of wood than the ship carrying him
  rationale: The verse's argument highlights the irony and vulnerability of trusting
    crafted objects. 'More fragile' preserves the comparative force while remaining
    readable and not overstating physical decay beyond what the context requires.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy; §6 Readable modern
    English
