theological_decisions:
- issue: Interpretive framing of the artisan's action in an anti-idolatry context
  chosen_reading: Render the statement descriptively as artistic enhancement done
    to please a ruler, without importing explicit moral language into the verse itself.
  alternative_readings:
  - Translate ἐξεβιάσατο more interpretively as 'distorted' to foreground critique
  rationale: The broader context critiques idolatry, but this verse itself describes
    the process by which an image was beautified for political flattery. The translation
    preserves the narrative-theological tension without adding condemnation not stated
    in the line.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
