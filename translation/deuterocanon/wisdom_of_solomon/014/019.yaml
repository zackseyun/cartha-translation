  edition: lxx-swete-1909
  text: ὁ μὲν γὰρ τάχα κρατοῦντι βουλόμενος ἀρέσαι ἐξεβιάσατο τῇ τέχνῃ τὴν ὁμοιότητα
    ἐπὶ τὸ κάλλιον·
  language: Greek
