translation:
  text: For the beginning of sexual immorality is the devising of idols, and the invention
    of them is the corruption of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the source of sexual immorality is the conception of idols.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the invention of them is life's ruin' or 'the destruction of life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀρχὴ
  chosen: the beginning
  alternatives:
  - the source
  - the origin
  lexicon: LSJ
  rationale: Ἀρχή commonly denotes beginning, first cause, or origin. 'Beginning'
    preserves the concise predicate structure and can carry causal force in context
    without over-interpreting as strictly metaphysical 'source'.
- source_word: πορνείας
  chosen: sexual immorality
  alternatives:
  - fornication
  - prostitution
  lexicon: LSJ
  rationale: πορνεία can denote prostitution or illicit sexual conduct broadly. In
    Wisdom's polemical context it may also resonate metaphorically with unfaithfulness
    tied to idolatry, but the immediate lexical sense is best rendered broadly as
    'sexual immorality' in readable modern English.
- source_word: ἐπίνοια
  chosen: the devising
  alternatives:
  - the conception
  - the thought
  - the contrivance
  lexicon: LSJ
  rationale: ἐπίνοια refers to a thought-out plan, device, or conception. 'Devising'
    captures intentional human invention and fits the parallel with εὕρεσις.
- source_word: εἰδώλων
  chosen: of idols
  alternatives:
  - of images
  lexicon: LSJ
  rationale: εἴδωλον in Jewish-Greek usage strongly denotes idol rather than a neutral
    image. 'Idols' preserves the anti-idolatry force of the passage.
- source_word: εὕρεσις
  chosen: the invention
  alternatives:
  - the discovery
  - the making
  lexicon: LSJ
  rationale: Although εὕρεσις can mean 'discovery,' in this parallelism with ἐπίνοια
    and in relation to idols it points to human finding-out or inventing. 'Invention'
    best conveys the crafted, human-origin sense.
- source_word: αὐτῶν
  chosen: of them
  alternatives:
  - their
  lexicon: LSJ
  rationale: The pronoun refers back to idols. 'Of them' keeps the Greek genitival
    relation with 'invention' transparent in English.
- source_word: φθορὰ
  chosen: the corruption
  alternatives:
  - the ruin
  - the destruction
  - the decay
  lexicon: LSJ
  rationale: φθορά can denote corruption, decay, or destruction. 'Corruption' preserves
    both moral and existential overtones and matches Wisdom's style without narrowing
    to physical destruction alone.
- source_word: ζωῆς
  chosen: of life
  alternatives:
  - to life
  - for life
  lexicon: LSJ
  rationale: The genitive is most naturally rendered 'of life.' This keeps the terse
    aphoristic form and allows the phrase to signify life's ruin/corruption broadly.
