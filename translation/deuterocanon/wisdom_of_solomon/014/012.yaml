theological_decisions:
- issue: Whether πορνεία should be rendered literally as sexual immorality or interpreted
    metaphorically as idolatry/spiritual unfaithfulness
  chosen_reading: Rendered literally as 'sexual immorality' while allowing the surrounding
    anti-idolatry context to supply any metaphorical resonance.
  alternative_readings:
  - idolatry
  - unfaithfulness
  rationale: The verse explicitly distinguishes πορνεία from the devising of idols
    by making the latter the beginning of the former. Collapsing πορνεία into 'idolatry'
    would blur the author's causal statement. A literal rendering best preserves the
    text's logic.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Whether φθορὰ ζωῆς should be made more interpretive ('destruction of human
    life') or kept compact
  chosen_reading: Kept as 'the corruption of life.'
  alternative_readings:
  - the destruction of life
  - life's ruin
  rationale: The Greek is compact and weighty. 'Corruption of life' preserves the
    breadth of the phrase, which may include moral degradation and destructive consequences,
    without importing a narrower explanatory gloss.
  doctrine_reference: Translation philosophy §§1, 6
