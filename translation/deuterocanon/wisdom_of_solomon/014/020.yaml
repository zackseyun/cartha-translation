theological_decisions:
- issue: Nature of the condemned act in σέβασμα
  chosen_reading: The text describes a formerly honored human being coming to be treated
    as an object of worship.
  alternative_readings:
  - The term could be rendered more sharply as 'idol.'
  - The term could be rendered more concretely as 'sacred image.'
  rationale: The verse critiques the transition from honoring a human to venerating
    him religiously through an image. 'Object of worship' preserves the theological
    point without importing a narrower term not demanded by the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
