translation:
  text: For the thing done, together with the one who did it, will be punished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what was done, together with the one who did it, will be punished.'
      In context, the phrase refers to the manufactured idol and its maker.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πραχθέν
  chosen: the thing made
  alternatives:
  - what was done
  - the thing produced
  - the thing fashioned
  lexicon: BDAG
  rationale: The articular aorist passive participle from πράσσω can mean 'what has
    been done' broadly, but in this context about idols and idol-making, the passive
    sense points to the manufactured object. 'The thing made' preserves the object/result
    nuance without over-specifying 'idol,' which the Greek does not state explicitly
    in this clause.
- source_word: σὺν
  chosen: together with
  alternatives:
  - with
  lexicon: BDAG
  rationale: The preposition marks association between the made object and its maker
    in the coming punishment. 'Together with' makes the joint liability explicit in
    natural English.
- source_word: τῷ δράσαντι
  chosen: the one who made it
  alternatives:
  - the one who did it
  - the doer
  - the maker
  lexicon: BDAG
  rationale: δράω often means 'do' or 'accomplish,' but here the paired contrast with
    τὸ πραχθέν and the surrounding context of crafted idols favors a maker/producer
    sense. 'The one who made it' clarifies the relation to the object while remaining
    faithful to the Greek.
- source_word: κολασθήσεται
  chosen: will be punished
  alternatives:
  - will be chastised
  - will be penalized
  lexicon: BDAG
  rationale: Future passive of κολάζω denotes punitive judgment. 'Will be punished'
    is the clearest modern English rendering and fits the verse's moral warning.
- source_word: καὶ γάρ
  chosen: For
  alternatives:
  - For indeed
  - And indeed
  - For also
  lexicon: BDAG
  rationale: The combination gives explanatory force linking this verse to the prior
    statement. 'For' captures the causal/explanatory sense in idiomatic English without
    unnecessary heaviness.
