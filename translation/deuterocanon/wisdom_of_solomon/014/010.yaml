theological_decisions:
- issue: Whether to make the manufactured object explicit as an idol in the main text
  chosen_reading: Keep the wording general as 'the thing made' rather than 'the idol.'
  alternative_readings:
  - the idol
  - what was done
  rationale: The immediate context concerns idols, so readers will understand the
    reference, but the clause itself uses broader terms rather than the explicit noun
    for idol. Retaining the broader wording avoids importing a noun not present in
    the Greek while still allowing the context to supply the referent.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
