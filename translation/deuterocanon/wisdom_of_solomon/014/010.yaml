id: WIS.14.10
reference: Wisdom of Solomon 14:10
source:
  edition: lxx-swete-1909
  text: καὶ γὰρ τὸ πραχθὲν σὺν τῷ δράσαντι κολασθήσεται.
  language: Greek
  pages:
