theological_decisions:
- issue: Rendering μονογενές in a wisdom description
  chosen_reading: unique
  alternative_readings:
  - only-begotten
  - one of a kind
  rationale: The term here modifies πνεῦμα within personified wisdom, not a filial
    relationship. Following original-language primacy, the main text uses the non-filial
    sense 'unique.' Because 'only-begotten' carries strong theological associations
    from other passages, it is preserved as an alternative in a footnote rather than
    imported into the main text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
