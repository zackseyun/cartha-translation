id: WIS.7.22
reference: Wisdom of Solomon 7:22
source:
  edition: lxx-swete-1909
  text: ἡ γὰρ πάντων τεχνῖτις ἐδίδαξέν με σοφία. Ἔστιν γὰρ ἐν αὐτῇ πνεῦμα νοερόν,
    ἅγιον, μονογενές, πολυμερές, λεπτόν, εὐκίνητον, τρανόν, ἀμόλυντον, σαφές, ἀπήμαντον,
    φιλάγαθον, ὀξύ, ἀκώλυτον, εὐεργετικόν,
  language: Greek
  pages:
  - 633
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: For wisdom, the craftswoman of all things, taught me. For in her is a spirit
    that is intelligent, holy, unique, manifold, subtle, agile, clear, undefiled,
    distinct, unharmed, loving the good, keen, unhindered, beneficent,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'only-begotten' / 'one of a kind' for 'unique' (μονογενές). Here the
      context favors the sense 'unique' rather than a filial meaning.
    reason: lexical_alternative
  - marker: b
    text: '''Unharmed'' may also be rendered ''harmless''; the Greek can denote either
      being untouched by harm or not causing harm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τεχνῖτις
  chosen: craftswoman
  alternatives:
  - artisan
  - maker
  - designer
  - craftsman
  lexicon: LSJ
  rationale: The feminine noun denotes one skilled in craft or art. Because σοφία
    is grammatically feminine and personified here, 'craftswoman' preserves both the
    skilled-maker sense and the feminine personification better than the more generic
    'artisan' or gender-flattened options.
- source_word: ἐδίδαξέν
  chosen: taught
  alternatives:
  - instructed
  lexicon: LSJ
  rationale: A straightforward past-tense rendering that fits the direct object με
    and keeps the clause simple and natural.
- source_word: πνεῦμα
  chosen: spirit
  alternatives:
  - breath
  - wind
  lexicon: LSJ
  rationale: In this wisdom context the term refers to an inner animating/intellectual
    reality within wisdom, not literal breath or wind.
- source_word: νοερόν
  chosen: intelligent
  alternatives:
  - rational
  - understanding
  - perceptive
  lexicon: LSJ
  rationale: The adjective points to the capacity of mind or understanding. 'Intelligent'
    is clear modern English and avoids overly philosophical jargon while preserving
    the sense.
- source_word: μονογενές
  chosen: unique
  alternatives:
  - only-begotten
  - only
  - one of a kind
  lexicon: LSJ
  rationale: Outside explicitly filial contexts, μονογενής commonly means 'one of
    a kind' or 'unique.' Since this verse is not making a christological claim, 'unique'
    best reflects the plain sense. A traditional alternative is preserved in a footnote
    because of theological resonance elsewhere.
- source_word: πολυμερές
  chosen: manifold
  alternatives:
  - many-sided
  - multiform
  - diverse
  lexicon: LSJ
  rationale: The term conveys having many parts or aspects. 'Manifold' is concise
    and suitably elevated without being obscure in context.
- source_word: λεπτόν
  chosen: subtle
  alternatives:
  - fine
  - delicate
  - refined
  lexicon: LSJ
  rationale: The adjective suggests fineness and penetrative subtlety rather than
    fragility. 'Subtle' captures that conceptual nuance in this list of qualities.
- source_word: εὐκίνητον
  chosen: agile
  alternatives:
  - mobile
  - quick-moving
  lexicon: LSJ
  rationale: The word denotes ease of movement. 'Agile' is idiomatic and fits the
    personified description.
- source_word: τρανόν
  chosen: clear
  alternatives:
  - plain
  - evident
  - distinct
  lexicon: LSJ
  rationale: The adjective conveys clarity or plainness. 'Clear' is the most natural
    English fit here.
- source_word: ἀμόλυντον
  chosen: undefiled
  alternatives:
  - unstained
  - pure
  lexicon: LSJ
  rationale: The term emphasizes freedom from contamination. 'Undefiled' preserves
    the moral and cultic overtones better than the broader 'pure.'
- source_word: σαφές
  chosen: distinct
  alternatives:
  - clear
  - manifest
  lexicon: LSJ
  rationale: Because τρανόν already carries the sense 'clear,' rendering σαφές as
    'distinct' preserves the semantic overlap without collapsing the two adjectives
    into identical English.
- source_word: ἀπήμαντον
  chosen: unharmed
  alternatives:
  - harmless
  - uninjured
  - innocuous
  lexicon: LSJ
  rationale: The adjective can mean free from harm or not causing harm. In this chain
    of qualities, 'unharmed' keeps the passive nuance 'untouched by injury/corruption,'
    though the active sense 'harmless' remains possible and is worth noting.
- source_word: φιλάγαθον
  chosen: loving the good
  alternatives:
  - benevolent
  - lover of goodness
  lexicon: LSJ
  rationale: The compound literally expresses affection for what is good. 'Loving
    the good' is transparent and preserves the moral orientation.
- source_word: ὀξύ
  chosen: keen
  alternatives:
  - sharp
  - penetrating
  lexicon: LSJ
  rationale: The term suggests sharpness or acuity. 'Keen' works well for an immaterial
    quality in English.
- source_word: ἀκώλυτον
  chosen: unhindered
  alternatives:
  - unimpeded
  - irresistible
  lexicon: LSJ
  rationale: The basic sense is not being prevented or obstructed. 'Unhindered' is
    direct and avoids overstating the term as 'irresistible.'
- source_word: εὐεργετικόν
  chosen: beneficent
  alternatives:
  - doing good
  - kindly
  - beneficial
  lexicon: LSJ
  rationale: The adjective denotes actively doing good. 'Beneficent' is concise and
    preserves the active moral sense.
