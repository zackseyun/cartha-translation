theological_decisions:
- issue: Personification of wisdom as feminine
  chosen_reading: Retained feminine pronouns ('she,' 'her')
  alternative_readings:
  - Repeated 'wisdom' without pronouns
  - Neuter paraphrase such as 'it'
  rationale: The Greek refers back to wisdom with feminine grammatical agreement,
    and the surrounding passage personifies wisdom. Retaining 'she' preserves the
    literary and theological portrayal without importing claims beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserving source meaning
    and readability
- issue: Metaphysical relation of wisdom to God in imagery of derivation
  chosen_reading: Rendered imagery straightforwardly as 'a breath of the power of
    God' and 'a pure emanation of the glory of the Almighty'
  alternative_readings:
  - More interpretive paraphrases that weaken derivation imagery
  - More technical philosophical wording
  rationale: The verse uses strong derivative imagery but does not require importing
    later doctrinal formulations. The translation preserves the tension and force
    of the Greek without over-systematizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve theological tension
    rather than resolve it
