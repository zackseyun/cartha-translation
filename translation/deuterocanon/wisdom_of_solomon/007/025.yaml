translation:
  text: For she is a breath of the power of God, and a pure emanation of the glory
    of the Almighty; therefore nothing defiled enters into her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vapor' for 'breath' (ἀτμίς). The Greek image can suggest exhalation
      or vapor rising from a source.
    reason: lexical_alternative
  - marker: b
    text: Or 'a clear/unalloyed emanation' for 'a pure emanation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀτμὶς
  chosen: breath
  alternatives:
  - vapor
  - exhalation
  lexicon: LSJ
  rationale: The noun denotes a breath, vapor, or exhalation. 'Breath' preserves the
    metaphor's immediacy and avoids sounding merely physical or meteorological, while
    still conveying derivation from God's power.
- source_word: δυνάμεως
  chosen: power
  alternatives:
  - might
  lexicon: LSJ
  rationale: '''Power'' is the most natural rendering here and fits the genitive construction
    with ἀτμίς. ''Might'' is possible but less idiomatic in modern English.'
- source_word: ἀπόρροια
  chosen: emanation
  alternatives:
  - effluence
  - outflow
  lexicon: LSJ
  rationale: The term suggests something flowing out from a source. 'Emanation' best
    preserves the philosophical and theological weight of derived radiance without
    over-paraphrasing.
- source_word: εἰλικρινής
  chosen: pure
  alternatives:
  - clear
  - unalloyed
  - sincere
  lexicon: LSJ
  rationale: In this context the adjective qualifies the emanation as unmixed and
    undefiled. 'Pure' is clear, idiomatic, and prepares for the following statement
    that nothing defiled enters into her.
- source_word: παντοκράτορος
  chosen: the Almighty
  alternatives:
  - the All-ruler
  - the Omnipotent
  lexicon: LSJ
  rationale: The established and accurate rendering in this titular context is 'the
    Almighty.' It communicates divine sovereignty in readable English.
- source_word: μεμιαμμένον
  chosen: defiled
  alternatives:
  - stained
  - polluted
  - unclean
  lexicon: LSJ
  rationale: The perfect participle conveys a state of contamination. 'Defiled' best
    captures moral and cultic impurity without narrowing the sense.
- source_word: παρεμπίπτει
  chosen: enters into
  alternatives:
  - falls into
  - comes into
  lexicon: LSJ
  rationale: Although literally 'falls in beside/into,' the idiomatic sense here is
    that nothing contaminated gains access to wisdom. 'Enters into' communicates that
    clearly in English.
