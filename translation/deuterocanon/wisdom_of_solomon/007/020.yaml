theological_decisions:
- issue: Ambiguity of πνευμάτων βίας
  chosen_reading: the forces of spirits
  alternative_readings:
  - violent winds
  - the violence of spirits
  - the power of winds
  rationale: The phrase is not a major doctrinal crux but is lexically ambiguous because
    πνεῦμα can denote either 'spirit' or 'wind.' The main text keeps the more literal
    'spirits' while preserving the natural-phenomena alternative in a footnote, since
    the surrounding verse lists branches of knowledge about the created order.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
