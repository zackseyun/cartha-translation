id: WIS.7.20
reference: Wisdom of Solomon 7:20
source:
  edition: lxx-swete-1909
  text: φύσεις ζῴων καὶ θυμοὺς θηρίων, πνευμάτων βίας καὶ διαλογισμοὺς ἀνθρώπων, διαφορὰς
    φυτῶν καὶ δυνάμεις ῥιζῶν.
  language: Greek
  pages:
  - 633
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: the natures of animals and the tempers of wild beasts, the forces of spirits
    and the reasonings of men, the varieties of plants and the powers of roots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the forces of winds' or 'violent winds'; Greek πνευμάτων can mean 'spirits'
      or 'winds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φύσεις
  chosen: natures
  alternatives:
  - kinds
  - characteristics
  lexicon: LSJ
  rationale: φύσις here refers to the natural constitution or inherent properties
    of living creatures. 'Natures' best preserves the philosophical/scientific sense
    in this catalog of knowledge.
- source_word: ζῴων
  chosen: animals
  alternatives:
  - living creatures
  lexicon: LSJ
  rationale: A broad term for living creatures; 'animals' is natural modern English
    and fits the paired reference to beasts.
- source_word: θυμούς
  chosen: tempers
  alternatives:
  - passions
  - dispositions
  lexicon: LSJ
  rationale: θυμός can denote spiritedness, passion, or temperament. 'Tempers' captures
    characteristic disposition in context, parallel to knowledge of animal natures.
- source_word: θηρίων
  chosen: wild beasts
  alternatives:
  - beasts
  lexicon: LSJ
  rationale: θηρίον commonly denotes a wild animal or beast. 'Wild beasts' preserves
    the stronger sense and distinguishes it from the broader ζῷα.
- source_word: πνευμάτων βίας
  chosen: the forces of spirits
  alternatives:
  - violent winds
  - the violence of spirits
  - the power of winds
  lexicon: LSJ
  rationale: The genitive phrase is compressed and somewhat ambiguous. πνεῦμα can
    mean spirit or wind, and βία can denote force or violence. Given the surrounding
    list of natural and human phenomena, 'the forces of spirits' preserves the literal
    wording while allowing the broader ancient sense of unseen powers. The alternative
    'winds' is worth preserving in a footnote because of the natural-science context.
- source_word: διαλογισμούς
  chosen: reasonings
  alternatives:
  - thoughts
  - arguments
  lexicon: LSJ
  rationale: διαλογισμός refers to thought-processes, reflections, or reasonings.
    'Reasonings' fits the wisdom-context emphasis on understanding mental operations.
- source_word: ἀνθρώπων
  chosen: men
  alternatives:
  - human beings
  - people
  lexicon: LSJ
  rationale: The Greek is the generic plural for humans. Per project philosophy, a
    gender-accurate rendering may retain 'men' where representative humanity is intended;
    here it also balances the elevated style of the catalog.
- source_word: διαφοράς
  chosen: varieties
  alternatives:
  - differences
  - distinctions
  lexicon: LSJ
  rationale: The term denotes distinctions or differences. 'Varieties' reads more
    idiomatically in English with φυτῶν while preserving the sense of classification.
- source_word: φυτῶν
  chosen: plants
  alternatives:
  - growing things
  lexicon: LSJ
  rationale: φυτόν denotes a plant or growing thing. 'Plants' is the clearest modern
    equivalent in this natural-knowledge list.
- source_word: δυνάμεις
  chosen: powers
  alternatives:
  - properties
  - effects
  - strengths
  lexicon: LSJ
  rationale: δύναμις can mean power, capacity, or efficacy. In relation to roots,
    'powers' preserves the ancient sense that roots possess operative properties,
    likely medicinal or natural.
- source_word: ῥιζῶν
  chosen: roots
  lexicon: LSJ
  rationale: A straightforward rendering; in context likely referring to roots as
    sources of natural or medicinal properties.
