theological_decisions:
- issue: Anthropological emphasis of the verse
  chosen_reading: The verse is rendered to stress the speaker's full solidarity with
    ordinary human birth and weakness, without importing later doctrinal claims.
  alternative_readings:
  - A more elevated or royalizing rendering that softens the common-human emphasis
  rationale: The Greek repeatedly emphasizes commonality (κοινόν, ὁμοιοπαθῆ, ὁμοίαν
    πᾶσιν). The translation preserves that rhetorical force rather than smoothing
    it into generic birth language.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological
    tension rather than resolve it'
