theological_decisions:
- issue: Sense of φροντίσιν in relation to infancy
  chosen_reading: with cares
  alternative_readings:
  - with anxious cares
  - with attentions
  rationale: The verse emphasizes the speaker's ordinary human infancy. Rendering
    the phrase as 'with cares' preserves the concise Greek and leaves open whether
