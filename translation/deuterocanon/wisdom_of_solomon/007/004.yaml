lexical_decisions:
- source_word: ἐν σπαργάνοις
  chosen: in swaddling cloths
  alternatives:
  - in swaddling clothes
  - wrapped in swaddling cloths
  lexicon: LSJ
  rationale: σπάργανα refers to the bands or cloths used to wrap an infant. 'Swaddling
    cloths' is clear modern English and preserves the concrete image.
- source_word: ἀνετράφην
  chosen: I was brought up
  alternatives:
  - I was reared
  - I was raised
  lexicon: BDAG/LSJ
  rationale: The passive aorist indicates being nourished or reared in infancy. 'Brought
    up' is natural English and fits the context of early human development.
- source_word: φροντίσιν
  chosen: cares
  alternatives:
  - anxieties
  - attentions
  - caregiving
  lexicon: LSJ
  rationale: φροντίς can denote care, concern, or anxious attention. In this infancy
    context it most naturally refers to the cares and attentions given by caregivers,
    while still allowing the broader sense of human dependence.
