reference: Wisdom of Solomon 7:21
source:
  edition: lxx-swete-1909
  text: ὅσα τέ ἐστιν κρυπτὰ καὶ ἐμφανῆ ἔγνων·
  language: Greek
  pages:
  - 633
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
