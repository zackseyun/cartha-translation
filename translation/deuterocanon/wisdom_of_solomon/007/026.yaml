translation:
  text: For she is a radiance of eternal light, and a spotless mirror of the working
    of God, and an image of his goodness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a reflection of everlasting light.' The Greek term can denote either
      radiance shining out from a source or reflected brightness; 'radiance' was chosen
      because it better fits the verse's sequence of light, mirror, and image.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαύγασμα
  chosen: radiance
  alternatives:
  - reflection
  - effulgence
  - outshining
  lexicon: LSJ/BDAG
  rationale: The noun denotes a shining forth or radiance. 'Radiance' is clear modern
    English and preserves the imagery of emitted light better than the more ambiguous
    'reflection.'
- source_word: φωτὸς ἀϊδίου
  chosen: everlasting light
  alternatives:
  - eternal light
  - ageless light
  lexicon: LSJ
  rationale: ἀΐδιος means everlasting or eternal. 'Everlasting light' is natural English
    and preserves the elevated tone without sounding overly technical.
- source_word: ἔσοπτρον
  chosen: mirror
  alternatives:
  - looking-glass
  lexicon: LSJ
  rationale: The term refers to a mirror. 'Mirror' is the standard modern equivalent.
- source_word: ἀκηλίδωτον
  chosen: spotless
  alternatives:
  - unstained
  - without blemish
  lexicon: LSJ
  rationale: The adjective means unstained or undefiled. 'Spotless' is concise, idiomatic,
    and fits the mirror imagery well.
- source_word: τῆς τοῦ θεοῦ ἐνεργείας
  chosen: of the working of God
  alternatives:
  - of God's activity
  - of the energy of God
  - of God's operation
  lexicon: LSJ
  rationale: ἐνέργεια here denotes active working or operative power. 'Working of
    God' preserves the sense without importing later technical theological connotations
    attached to 'energy.'
- source_word: εἰκών
  chosen: image
  alternatives:
  - likeness
  - representation
  lexicon: LSJ/BDAG
  rationale: '''Image'' is the most direct and theologically resonant rendering, matching
    the Greek closely.'
- source_word: ἀγαθότητος
  chosen: goodness
  alternatives:
  - benevolence
  - kindness
  lexicon: LSJ
  rationale: The noun denotes goodness or beneficence. 'Goodness' is broad enough
    to preserve the text's theological scope.
