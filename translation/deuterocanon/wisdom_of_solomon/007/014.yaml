translation:
  text: For it is an unfailing treasure for men; those who have made use of it obtained
    friendship with God, having been commended through the gifts that come from instruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for people' / 'for humanity'; Greek 'for men' uses a generic human reference.
    reason: lexical_alternative
  - marker: b
    text: Or 'obtained favor with God.' The Greek more literally speaks of 'friendship
      with God.'
    reason: alternative_reading
  - marker: c
    text: '''Instruction'' may also be rendered ''discipline'' or ''training''; the
      Greek παιδεία includes formative teaching and correction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεκλιπὴς
  chosen: unfailing
  alternatives:
  - never-failing
  - inexhaustible
  - undiminishing
  lexicon: LSJ
  rationale: The adjective denotes something that does not fail or run out. 'Unfailing'
    is natural English and preserves the sense of enduring reliability without overinterpreting
    it as strictly quantitative ('inexhaustible').
- source_word: θησαυρός
  chosen: treasure
  alternatives:
  - store
  - treasury
  lexicon: LSJ
  rationale: The singular metaphor is straightforward. 'Treasure' best fits idiomatic
    English and preserves the image of wisdom as a valuable possession.
- source_word: ἀνθρώποις
  chosen: for men
  alternatives:
  - for people
  - for humanity
  lexicon: LSJ
  rationale: The dative is generic for human beings. Per project policy, a gender-accurate
    rendering may preserve 'men' where the Greek uses the masculine form representatively.
    Here 'for men' is concise and traditional in register, while still generic in
    sense.
- source_word: χρησάμενοι
  chosen: have made use of
  alternatives:
  - used
  - availed themselves of
  lexicon: LSJ
  rationale: The participle from χράομαι means to use or make use of. 'Have made use
    of' preserves the active appropriation implied by the middle voice better than
    the flatter 'used.'
- source_word: πρὸς θεὸν
  chosen: with God
  alternatives:
  - toward God
  - before God
  lexicon: LSJ
  rationale: With φιλίαν, the phrase expresses relation directed toward God. In idiomatic
    English, 'friendship with God' best conveys the relational sense, whereas 'toward
    God' sounds awkward with 'friendship.'
- source_word: ἐστείλαντο
  chosen: gained
  alternatives:
  - obtained
  - procured
  - won
  lexicon: LSJ
  rationale: In this context the verb conveys acquiring or securing friendship with
    God. 'Gained' is clear modern English and avoids the overly commercial nuance
    of 'procured.'
- source_word: φιλίαν
  chosen: friendship
  alternatives:
  - favor
  - affection
  lexicon: LSJ
  rationale: The noun denotes friendship or friendly relation. 'Friendship' preserves
    the strong relational image and should not be weakened to mere 'favor.'
- source_word: διὰ τὰς ἐκ παιδείας δωρεὰς
  chosen: through the gifts that come from instruction
  alternatives:
  - through the gifts from discipline
  - because of the gifts derived from training
  lexicon: LSJ
  rationale: παιδεία in Wisdom often carries the sense of instruction/discipline that
    forms virtue. 'Instruction' is more accessible in English here, while the fuller
    phrase preserves that the gifts arise from such formative teaching.
- source_word: συσταθέντες
  chosen: having been commended
  alternatives:
  - having been approved
  - having been brought into favor
  - having been established
  lexicon: LSJ
  rationale: 'The participle can mean being recommended, commended, or accredited.
    In context, it explains how those using wisdom came into friendship with God:
    they were shown approved through wisdom''s gifts. ''Having been commended'' best
    fits the relational outcome.'
