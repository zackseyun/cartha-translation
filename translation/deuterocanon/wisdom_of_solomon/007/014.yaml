theological_decisions:
- issue: Relational force of φιλίαν πρὸς θεόν
  chosen_reading: friendship with God
  alternative_readings:
  - favor with God
  - affection toward God
  rationale: The text speaks of a real relational bond resulting from wisdom's use,
    not merely divine approval in the abstract. 'Friendship with God' preserves the
    theological weight without importing later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
- issue: Representative sense of ἀνθρώποις
  chosen_reading: for men
  alternative_readings:
  - for people
  - for humanity
  rationale: The Greek is grammatically masculine but generic. Following the project's
    gender-accurate policy, 'men' may be retained where representative force is intended.
    The generic sense can be clarified in a footnote for modern readers.
  doctrine_reference: Gender-accurate over gender-neutral.
