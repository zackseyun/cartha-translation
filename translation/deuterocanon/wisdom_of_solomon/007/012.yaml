theological_decisions:
- issue: Personification of wisdom and the generative metaphor in γένεσις
  chosen_reading: Retain feminine personification ('she') and render γένεσις concretely
    as 'mother.'
  alternative_readings:
  - '''I did not know that she is the origin of these things'''
  - '''I did not know that she is the source of them'''
  rationale: The Greek explicitly personifies wisdom and uses a term of generation/origin.
    Because English can naturally sustain the personification, 'mother' preserves
    the literary force better than a flattened abstraction. The alternative is preserved
    in a footnote because 'origin/source' is also lexically defensible and may be
    preferred by some readers.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
