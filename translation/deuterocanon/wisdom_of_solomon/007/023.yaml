theological_decisions:
- issue: Whether παντοδύναμον should be rendered with the traditional theological
    term 'almighty'
  chosen_reading: all-powerful
  alternative_readings:
  - almighty
  - omnipotent
  rationale: The verse is a descriptive list of wisdom's qualities. 'All-powerful'
    communicates the lexical sense directly in modern English without importing later
    creedal associations that may exceed the immediate context.
  doctrine_reference: 'DOCTRINE.md: Readable modern English, not archaic or academic;
    preserve source sense over translation tradition.'
- issue: How to construe διὰ πάντων χωροῦν πνευμάτων νοερῶν καθαρῶν λεπτοτάτων
  chosen_reading: '''passing through all intelligent, pure, most subtle spirits'''
  alternative_readings:
  - '''pervading all intelligent, pure, most subtle spirits'''
  - '''passing through all spirits that are intelligent, pure, and most subtle'''
  rationale: The Greek most naturally links the participle with πνευμάτων and presents
    wisdom as moving through all such spirits. The translation keeps that syntax visible
    while remaining readable.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence.'
