theological_decisions:
- issue: Referent of αὐτοῦ
  chosen_reading: his = God
  rationale: In context the verse speaks of human beings, speech, and wisdom as dependent
    on God. Rendering the pronoun simply as 'his' preserves the text while understanding
    the referent as God from context rather than inserting 'God' into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
