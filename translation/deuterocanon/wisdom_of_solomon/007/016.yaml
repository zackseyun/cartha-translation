translation:
  text: For in his hand are both we and our words, and all prudence and knowledge
    of crafts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all prudence' for 'all understanding'; the Greek φρόνησις can denote
      practical wisdom or prudent understanding.
    reason: lexical_alternative
  - marker: b
    text: Or 'knowledge of skills,' 'knowledge of arts,' or 'knowledge of trades';
      the Greek refers to knowledge connected with skilled work or craftsmanship.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ... χειρὶ αὐτοῦ
  chosen: in his hand
  alternatives:
  - under his control
  - in his power
  lexicon: LSJ
  rationale: A literal rendering preserves the biblical idiom of power, possession,
    and governance without over-interpreting it. In English, 'in his hand' remains
    intelligible and retains the theological force of dependence on God.
- source_word: ἡμεῖς
  chosen: we
  alternatives:
  - we ourselves
  lexicon: BDAG
  rationale: The pronoun is explicit and contrasts with 'our words'; simple 'we' preserves
    the structure without adding emphasis beyond the Greek.
- source_word: οἱ λόγοι ἡμῶν
  chosen: our words
  alternatives:
  - our speech
  - our sayings
  lexicon: BDAG
  rationale: λόγοι here most naturally refers to spoken expression or discourse. 'Our
    words' is direct and broad enough to include speech generally, matching the parallel
    with human persons and capacities.
- source_word: πᾶσά τε φρόνησις
  chosen: all understanding
  alternatives:
  - all prudence
  - all insight
  - all practical wisdom
  lexicon: LSJ
  rationale: φρόνησις often denotes understanding, prudence, or practical wisdom.
    'Understanding' is clear modern English and fits the list of human intellectual
    capacities without sounding overly technical.
- source_word: ἐργατειῶν
  chosen: of crafts
  alternatives:
  - of works
  - of skills
  - of arts
  - of trades
  lexicon: LSJ
  rationale: The noun refers to practical activities, crafts, or skilled work. 'Crafts'
    best captures the concrete, skill-based sense in accessible English and pairs
    naturally with 'knowledge.'
- source_word: ἐπιστήμη
  chosen: knowledge
  alternatives:
  - expertise
  - understanding
  - science
  lexicon: BDAG
  rationale: ἐπιστήμη denotes knowledge, especially structured or skilled knowledge.
    'Knowledge' is the most natural general rendering here; 'expertise' is possible
    but slightly too interpretive.
