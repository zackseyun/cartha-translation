translation:
  text: But there is one entrance into life for all, and an equal departure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the same entrance into life for all, and the same exit.' The Greek pairs
      'entrance' and 'departure/exit' as a balanced metaphor for human beginning and
      end.
    reason: lexical_alternative
lexical_decisions:
- source_word: μία
  chosen: one
  alternatives:
  - the same
  - single
  lexicon: LSJ
  rationale: μία emphasizes singularity/unity. 'One' preserves the concise assertion
    that the entrance is common to all.
- source_word: πάντων
  chosen: for all
  alternatives:
  - of all
  - common to all
  lexicon: LSJ
  rationale: The genitive with μία ... εἴσοδος is idiomatically rendered to show universality.
    'For all' is natural English and preserves the sense that all humans share the
    same entrance.
- source_word: εἴσοδος
  chosen: entrance
  alternatives:
  - entry
  - coming in
  lexicon: LSJ
  rationale: εἴσοδος literally means 'entrance' or 'entry.' 'Entrance' fits the birth-life
    contrast with ἔξοδος and reads naturally in English.
- source_word: εἰς τὸν βίον
  chosen: into life
  alternatives:
  - into the world
  - into this life
  lexicon: LSJ
  rationale: βίος is 'life' in the sense of earthly life or manner of living. 'Into
    life' stays close to the Greek; 'into the world' is interpretive and not explicit.
- source_word: ἔξοδός
  chosen: departure
  alternatives:
  - exit
  - way out
  - death
  lexicon: LSJ
  rationale: ἔξοδος is the counterpart to εἴσοδος, literally 'exit/departure.' 'Departure'
    preserves the metaphor and allows the reader to infer death without overtranslating.
- source_word: ἴση
  chosen: equal
  alternatives:
  - the same
  - alike
  lexicon: LSJ
  rationale: ἴση describes the departure as equal/common. 'Equal' is the most direct
    rendering and preserves the balanced parallelism of the Greek sentence.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: LSJ
  rationale: 'δὲ marks a mild contrast with the preceding royal self-description.
    ''But'' brings out the rhetorical turn: despite royal status, the speaker shares
    the same human beginning and end as everyone else.'
