theological_decisions:
- issue: Whether to make the implied reference to birth and death explicit
  chosen_reading: Retain the metaphorical wording 'entrance into life' and 'departure'
    in the main text
  alternative_readings:
  - There is one birth for all, and one equal death
  - All have the same entrance into life and the same exit
  rationale: The Greek uses paired metaphors (εἴσοδος / ἔξοδος) rather than the more
    explicit terms for birth and death. Preserving the metaphor respects the source
    text's style and its emphasis on common human mortality without importing stronger
    interpretive wording than the verse itself states.
  doctrine_reference: Translation philosophy §§1, 3, 6
