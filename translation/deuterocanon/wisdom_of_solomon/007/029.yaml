theological_decisions:
- issue: Sense of προτέρα in relation to light
  chosen_reading: temporal priority ('earlier')
  alternative_readings:
  - comparative superiority ('better' or 'greater')
  rationale: 'The verse has already expressed superiority with εὐπρεπεστέρα and ὑπέρ.
    Rendering προτέρα temporally preserves the poetic progression: wisdom surpasses
    sun and stars and, when compared with light itself, is found prior to it. This
    also coheres with Wisdom''s broader portrayal as preceding creation without importing
    more than the text states.'
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
