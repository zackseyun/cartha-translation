translation:
  text: For she is more beautiful than the sun, and above every arrangement of the
    stars. Compared with the light, she is found to be superior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Compared with light, she is found to be superior.' The Greek προτέρα
      can denote either temporal priority ('earlier') or comparative precedence.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐπρεπεστέρα
  chosen: more beautiful
  alternatives:
  - more splendid
  - more fair
  - more comely
  lexicon: LSJ
  rationale: The comparative adjective denotes superior beauty, grace, or seemliness.
    'More beautiful' is clear modern English and fits the poetic comparison better
    than the more formal 'more splendid' or archaic 'more comely'.
- source_word: ὑπὲρ
  chosen: above
  alternatives:
  - beyond
  - more than
  lexicon: BDAG
  rationale: Here ὑπέρ marks superiority in comparison. 'Above' preserves the comparative
    force in a concise, poetic way.
- source_word: θέσιν
  chosen: arrangement
  alternatives:
  - position
  - order
  - station
  lexicon: LSJ
  rationale: θέσις can mean placement or arrangement. In the phrase 'every arrangement
    of the stars,' the sense is the ordered placement or configuration of the stars
    rather than a single star's position. 'Arrangement' best captures the collective
    cosmic ordering in context.
- source_word: φωτί
  chosen: the light
  alternatives:
  - light
  lexicon: LSJ
  rationale: The dative with συγκρινομένη indicates the standard of comparison. The
    article is not explicit in Greek, but English idiom benefits from 'the light,'
    likely referring to daylight or visible light in general as the next comparison
    after sun and stars.
- source_word: συγκρινομένη
  chosen: compared with
  alternatives:
  - being compared with
  - in comparison with
  lexicon: BDAG
  rationale: A participial form expressing the act of comparison. 'Compared with'
    is natural English and preserves the passive/comparative sense without overloading
    the line.
- source_word: προτέρα
  chosen: earlier
  alternatives:
  - prior
  - superior
  - before
  lexicon: LSJ
  rationale: 'πρότερος can denote temporal priority or rank. In this context, after
    comparison with light, the likely sense is temporal precedence: wisdom is found
    to exist before light. ''Earlier'' preserves that sense while remaining readable.
    ''Superior'' would duplicate the prior comparative idea and weaken the likely
    allusion to wisdom''s preexistence.'
