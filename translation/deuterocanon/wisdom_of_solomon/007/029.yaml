  edition: lxx-swete-1909
  text: ἔστιν γὰρ αὕτη εὐπρεπεστέρα ἡλίου, καὶ ὑπὲρ πᾶσαν ἄστρων θέσιν. φωτὶ συγκρινομένη
    εὑρίσκεται προτέρα·
  language: Greek
