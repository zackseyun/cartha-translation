id: WIS.7.27
reference: Wisdom of Solomon 7:27
source:
  edition: lxx-swete-1909
  text: μία δὲ οὖσα πάντα δύναται, καὶ μένουσα ἐν αὐτῇ τὰ πάντα καινίζει, καὶ κατὰ
    γενεὰς εἰς ψυχὰς ὁσίας μεταβαίνουσα φίλους θεοῦ καὶ προφήτας κατασκευάζει·
  language: Greek
  pages:
  - 633
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: Though she is one, she can do all things, and while remaining in herself she
    renews all things; and passing into holy souls from generation to generation,
    she makes them friends of God and prophets;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'makes all things new.' The Greek verb can denote renewing or making
      new.
    reason: lexical_alternative
  - marker: b
    text: Or 'entering holy souls.' The participle describes Wisdom's movement into
      successive holy souls across generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: μία
  chosen: one
  alternatives:
  - alone
  - single
  lexicon: LSJ
  rationale: Rendered 'one' to preserve the concise predicate about Wisdom's unity/singleness.
    'Alone' would add an exclusivity nuance not explicit here.
- source_word: πάντα δύναται
  chosen: can do all things
  alternatives:
  - is able to do everything
  - has power over all things
  lexicon: LSJ
  rationale: The phrase expresses comprehensive ability. 'Can do all things' is direct
    and idiomatic, preserving the breadth of πάντα.
- source_word: μένουσα ἐν αὐτῇ
  chosen: remaining in herself
  alternatives:
  - abiding in herself
  - staying in herself
  lexicon: LSJ
  rationale: 'Takes αὐτῇ reflexively in context of personified Wisdom: though active
    everywhere, she remains unchanged in herself. ''Remaining'' is clear modern English
    and preserves the participial force.'
- source_word: τὰ πάντα καινίζει
  chosen: she renews all things
  alternatives:
  - makes all things new
  - renews everything
  lexicon: LSJ
  rationale: καινίζει denotes making new/renewing. 'Renews all things' is natural
    and avoids importing later theological resonance from the fixed phrase 'makes
    all things new,' though that remains a viable lexical alternative.
- source_word: κατὰ γενεὰς
  chosen: from generation to generation
  alternatives:
  - through the generations
  - in every generation
  lexicon: LSJ
  rationale: This idiom conveys repeated action across successive generations. 'From
    generation to generation' is the most idiomatic equivalent.
- source_word: εἰς ψυχὰς ὁσίας μεταβαίνουσα
  chosen: passing into holy souls
  alternatives:
  - entering holy souls
  - moving into holy souls
  lexicon: LSJ
  rationale: μεταβαίνουσα suggests movement/transition into. 'Passing into' preserves
    the dynamic sense without over-specifying mechanism. ψυχαί is rendered 'souls'
    rather than 'persons' to match the Greek term and the text's anthropological register.
- source_word: φίλους θεοῦ
  chosen: friends of God
  alternatives:
  - God's friends
  lexicon: LSJ
  rationale: A straightforward genitival rendering that preserves the relational emphasis
    and echoes the Greek word order closely enough for English.
- source_word: προφήτας
  chosen: prophets
  lexicon: LSJ
  rationale: Standard rendering of the term; no contextual reason to vary.
- source_word: κατασκευάζει
  chosen: prepares
  alternatives:
  - forms
  - produces
  - makes ready
  lexicon: LSJ
  rationale: The verb can mean prepare, equip, or construct. 'Prepares' best fits
    the sense that Wisdom fashions people into God's friends and prophets without
    sounding mechanical.
