theological_decisions:
- issue: Personified feminine subject throughout the verse
  chosen_reading: Use feminine pronouns for Wisdom ('she')
  alternative_readings:
  - Repeat 'Wisdom' instead of pronouns
  - Use impersonal rendering
  rationale: The Greek grammar clearly personifies Wisdom as feminine singular. Preserving
    'she' maintains the literary and theological texture of the passage without implying
    a separate deity beyond what the text itself states.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy.'
- issue: Meaning of 'holy souls'
  chosen_reading: Retain 'holy souls' in the main text
  alternative_readings:
  - holy persons
  - holy people
  rationale: Although 'souls' can sound narrower in modern English, ψυχὰς is explicit
    in the Greek and contributes to the text's anthropological and sapiential register.
    A more flattened 'persons' would lose that texture.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not paraphrase
    beyond the source text.'
