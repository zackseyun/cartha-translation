translation:
  text: Nor did I compare to her any precious stone, because all gold in her sight
    is a little sand, and silver will be regarded as clay before her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a priceless stone.' The Greek expression denotes a stone of inestimable
      value.
    reason: lexical_alternative
  - marker: b
    text: Literally 'little sand'; the sense is that gold is of negligible worth compared
      with wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ ὡμοίωσα
  chosen: Nor did I compare
  alternatives:
  - Nor did I liken
  - Nor did I equate
  lexicon: LSJ
  rationale: ὁμοιόω here means to make like or compare. 'Compare' is natural English
    and fits the dative αὐτῇ ('to her') without sounding overly wooden.
- source_word: αὐτῇ
  chosen: to her
  alternatives:
  - with her
  lexicon: Greek grammar
  rationale: The dative after ὡμοίωσα is well represented by 'to her' in English idiom
    ('compare to her'), preserving the personified reference to wisdom from the context.
- source_word: λίθον ἀτίμητον
  chosen: any precious stone
  alternatives:
  - a priceless stone
  - an unvalued stone
  lexicon: LSJ
  rationale: In context ἀτίμητος means beyond price or of inestimable value, not 'worthless.'
    'Precious stone' communicates the sense idiomatically in English without overtranslating
    to 'priceless,' which can sound interpretive.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: Greek grammar
  rationale: Introduces the reason wisdom surpasses jewels; 'because' is clear modern
    English.
- source_word: ὁ πᾶς χρυσός
  chosen: all gold
  alternatives:
  - the whole of gold
  - every gold treasure
  lexicon: LSJ
  rationale: 'The phrase is collective and idiomatic: ''all gold'' best captures the
    totalizing comparison.'
- source_word: ἐν ὄψει αὐτῆς
  chosen: in her sight
  alternatives:
  - before her eyes
  - in comparison with her
  lexicon: LSJ
  rationale: Literally 'in her sight/presence.' 'In her sight' preserves the imagery
    and avoids collapsing it too quickly into abstract comparison.
- source_word: ψάμμος ὀλίγη
  chosen: a little sand
  alternatives:
  - a small amount of sand
  - mere sand
  lexicon: LSJ
  rationale: The Greek is literally 'little sand.' This likely conveys insignificance
    rather than quantity alone, but the literal image is worth preserving in the main
    text.
- source_word: λογισθήσεται
  chosen: will be regarded as
  alternatives:
  - will be counted as
  - will be reckoned as
  lexicon: LSJ
  rationale: Future passive of λογίζομαι. 'Will be regarded as' is readable modern
    English and preserves the evaluative sense.
- source_word: πηλός
  chosen: clay
  alternatives:
  - mud
  lexicon: LSJ
  rationale: '''Clay'' better fits the contrast with silver in a value comparison
    and is the standard sense here.'
- source_word: ἄργυρος
  chosen: silver
  lexicon: LSJ
  rationale: Straightforward lexical equivalent.
- source_word: ἐναντίον αὐτῆς
  chosen: before her
  alternatives:
  - in comparison with her
  - in her presence
  lexicon: LSJ
  rationale: Retains the personified and spatially framed comparison. 'Before her'
    is concise and faithful.
