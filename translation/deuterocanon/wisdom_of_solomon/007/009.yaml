  text: οὐδὲ ὡμοίωσα αὐτῇ λίθον ἀτίμητον, ὅτι ὁ πᾶς χρυσὸς ἐν ὄψει αὐτῆς ψάμμος ὀλίγη,
    καὶ ὡς πηλὸς λογισθήσεται ἄργυρος ἐναντίον αὐτῆς·
  language: Greek
