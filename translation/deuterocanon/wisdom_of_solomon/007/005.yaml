translation:
  text: For no king had a different beginning of birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For no king had a different origin of existence.' The Greek γενέσεως
      may be understood more broadly as 'origin' or 'generation,' not only physical
      birth.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  chosen: 'no'
  alternatives:
  - not one
  - none
  lexicon: BDAG
  rationale: 'Used with γάρ and the genitive plural βασιλέων to state a universal
    negation: no one among kings.'
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: Retained as 'for' to preserve the explanatory connection to the surrounding
    argument about common human origins.
- source_word: βασιλέων
  chosen: king
  alternatives:
  - rulers
  lexicon: LSJ
  rationale: The genitive plural means 'of kings'; in idiomatic English after οὐδείς
    this becomes 'no king.' 'King' preserves the specific royal reference better than
    the broader 'rulers.'
- source_word: ἑτέραν
  chosen: different
  alternatives:
  - another
  - distinct
  lexicon: LSJ
  rationale: ἕτερος often marks difference in kind or identity. 'Different' best conveys
    the claim that royal birth does not begin from some other source than that of
    ordinary humans.
- source_word: ἔσχεν
  chosen: had
  alternatives:
  - possessed
  - received
  lexicon: BDAG
  rationale: Simple past 'had' is the most natural rendering of ἔχω here in an idiom
    describing one's origin.
- source_word: γενέσεως
  chosen: birth
  alternatives:
  - origin
  - generation
  lexicon: LSJ
  rationale: γενέσεως can mean origin or birth. In this context, where the author
    stresses the common manner of entering life, 'birth' is the clearest English choice,
    while the broader nuance of 'origin' is preserved by the phrase 'beginning of
    birth.'
- source_word: ἀρχήν
  chosen: beginning
  alternatives:
  - origin
  - first principle
  lexicon: BDAG
  rationale: ἀρχή denotes a beginning or starting point. 'Beginning' keeps the wording
    close to the Greek and fits the author's point that even kings share the same
    starting point in birth.
