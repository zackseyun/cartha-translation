theological_decisions:
- issue: Anthropological equality of kings and common people
  chosen_reading: The verse is rendered to emphasize that kings do not have a different
    starting point in birth from other humans.
  alternative_readings:
  - For no king had a different origin.
  - For no king had another beginning of existence.
  rationale: The immediate context argues for the common human condition of Solomon
    and all others, including royalty. The translation preserves that leveling claim
    without expanding it into a broader doctrinal statement beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
