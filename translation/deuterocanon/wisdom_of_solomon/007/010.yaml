theological_decisions:
- issue: Personification of wisdom as feminine
  chosen_reading: Retain feminine pronouns ('her') for wisdom
  alternative_readings:
  - Use 'it' to avoid personification
  rationale: The Greek repeatedly uses feminine forms for wisdom in a strongly personified
    literary context. Retaining 'her' preserves the source text's imagery and theological-poetic
    force without importing claims beyond the text.
