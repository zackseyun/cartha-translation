translation:
  text: I loved her more than health and beauty, and I chose to have her instead of
    light, because the radiance that comes from her never sleeps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the brightness from her is sleepless.' The Greek describes wisdom's
      emanating light as unceasing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ
  chosen: more than
  alternatives:
  - above
  - beyond
  lexicon: BDAG
  rationale: With a comparative sense here, ὑπέρ expresses preference or valuation
    over something else. 'More than' is idiomatic English and preserves the comparison.
- source_word: ὑγίειαν
  chosen: health
  alternatives:
  - soundness
  - well-being
  lexicon: LSJ
  rationale: The noun denotes bodily health or sound condition. 'Health' is the most
    natural and direct rendering in this context.
- source_word: εὐμορφίαν
  chosen: beauty
  alternatives:
  - good looks
  - comeliness
  - fairness
  lexicon: LSJ
  rationale: The term refers to physical attractiveness or fine form. 'Beauty' is
    concise, natural, and suitably elevated for the poetic context.
- source_word: ἠγάπησα
  chosen: I loved
  alternatives:
  - I came to love
  - I cherished
  lexicon: BDAG
  rationale: Aorist of ἀγαπάω, straightforwardly rendered 'I loved.' This preserves
    the personal valuation of wisdom without overinterpreting the nuance.
- source_word: αὐτήν
  chosen: her
  alternatives:
  - it
  lexicon: Greek grammar
  rationale: Wisdom is grammatically feminine in Greek and personified throughout
    the context. 'Her' preserves the literary personification better than 'it'.
- source_word: προειλόμην
  chosen: I chose
  alternatives:
  - I preferred
  - I selected beforehand
  lexicon: LSJ
  rationale: The middle verb conveys deliberate preference or choice. 'I chose' is
    clear English; the comparative force is already carried by 'instead of light.'
- source_word: ἀντὶ φωτὸς ἔχειν
  chosen: to have her instead of light
  alternatives:
  - to possess her rather than light
  - to hold her in place of light
  lexicon: LSJ
  rationale: The infinitive ἔχειν with ἀντί expresses choosing possession of wisdom
    in place of light. 'To have her instead of light' is natural and close to the
    Greek structure.
- source_word: ἀκοίμητον
  chosen: never sleeps
  alternatives:
  - is sleepless
  - does not go out
  lexicon: LSJ
  rationale: Literally 'sleepless' or 'unfailing.' Applied to φέγγος, it metaphorically
    describes a radiance that does not cease. 'Never sleeps' preserves the vivid metaphor
    rather than flattening it to an abstract adjective.
- source_word: τὸ ἐκ ταύτης φέγγος
  chosen: the radiance that comes from her
  alternatives:
  - the brightness from her
  - the light that proceeds from her
  lexicon: LSJ
  rationale: φέγγος denotes light, brightness, or radiance. Because 'light' already
    appears earlier in the verse, 'radiance' avoids awkward repetition while preserving
    the image. 'That comes from her' renders ἐκ ταύτης naturally.
