id: WIS.7.10
reference: Wisdom of Solomon 7:10
source:
  edition: lxx-swete-1909
  text: ὑπὲρ ὑγίειαν καὶ εὐμορφίαν ἠγάπησα αὐτήν, καὶ προειλόμην αὐτὴν ἀντὶ φωτὸς
    ἔχειν, ὅτι ἀκοίμητον τὸ ἐκ ταύτης φέγγος.
  language: Greek
  pages:
