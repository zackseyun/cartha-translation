theological_decisions:
- issue: Whether πνεῦμα σοφίας should be rendered as an impersonal disposition or
    with spiritual/theological force
  chosen_reading: a spirit of wisdom
  alternative_readings:
  - the spirit of wisdom
  - wisdom's spirit
  - a disposition of wisdom
  rationale: The Greek phrase naturally allows spiritual force, but the absence of
    the article cautions against making it an explicit title. Rendering it 'a spirit
    of wisdom' preserves the text's theological openness without flattening it into
    mere psychology or over-specifying it as the Holy Spirit.
  doctrine_reference: Preserve theological tension rather than resolve it.
