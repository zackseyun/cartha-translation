theological_decisions:
- issue: Referent and scope of τῶν δεδομένων
  chosen_reading: an open reference to the things God has given, likely including
    wisdom and its subject matter, without narrowing it in translation
  alternative_readings:
  - the gifts given
  - the teachings handed down
  rationale: The Greek does not specify the object more narrowly. The translation
    avoids importing a doctrinally specific referent and preserves the text's breadth.
  doctrine_reference: Translation philosophy 1, 3, and 5
- issue: Force of διορθωτής in relation to God and the wise
  chosen_reading: God is presented as the one who corrects or sets the wise right
  alternative_readings:
  - God directs the wise
  - God disciplines the wise
  rationale: 'διορθωτής carries a ''setting straight/correcting'' sense. ''Sets the
    wise right'' preserves theological tension: even the wise remain dependent on
    God for right direction, without overstating punitive discipline.'
  doctrine_reference: Translation philosophy 1 and 3
