  edition: lxx-swete-1909
  text: Εἰμὶ μὲν κἀγὼ θνητὸς ἴσος ἅπασιν, καὶ γηγενοῦς ἀπόγονος πρωτοπλάστου· καὶ
    ἐν κοιλίᾳ μητρὸς ἐγλύφην σάρξ
  language: Greek
