translation:
  text: For I also am a mortal man, equal to all, and a descendant of the earth-born
    first-formed man; and in my mother’s womb I was molded into flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''The first-formed man'' alludes to Adam.'
    reason: cross_reference
  - marker: b
    text: Or 'I was formed as flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θνητός
  chosen: mortal
  alternatives:
  - subject to death
  - mortal man
  lexicon: LSJ
  rationale: The adjective denotes mortality or being liable to death. 'Mortal' is
    concise and natural English, preserving the emphasis on shared human frailty.
- source_word: ἴσος ἅπασιν
  chosen: equal to all
  alternatives:
  - like all
  - on equal terms with everyone
  lexicon: LSJ
  rationale: This phrase stresses common human status rather than merely similarity.
    'Equal to all' preserves the comparative force of ἴσος with the dative/plural
    sense.
- source_word: γηγενοῦς
  chosen: earth-born
  alternatives:
  - born of the earth
  - earthly
  lexicon: LSJ
  rationale: The compound literally means 'earth-born.' Retaining this vivid expression
    preserves the allusion to humanity's origin from the ground.
- source_word: ἀπόγονος
  chosen: descendant
  alternatives:
  - offspring
  - issue
  lexicon: LSJ
  rationale: The noun indicates one born from an ancestor. 'Descendant' is idiomatic
    and fits the genealogical sense in relation to the first-formed man.
- source_word: πρωτοπλάστου
  chosen: first-formed man
  alternatives:
  - first-formed one
  - first-created man
  - Adam
  lexicon: LSJ
  rationale: The term means 'first-formed' and alludes to Adam without naming him
    explicitly. 'First-formed man' preserves the lexical content and the anthropological
    reference without importing the proper name into the main text.
- source_word: ἐγλύφην
  chosen: I was molded
  alternatives:
  - I was formed
  - I was carved/shaped
  lexicon: LSJ
  rationale: The verb can denote engraving or carving, but in this prenatal context
    it refers to being shaped or formed. 'I was molded' captures the passive formation
    imagery while sounding natural in English.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - body
  lexicon: LSJ
  rationale: Here the term is literal, not metaphorical. Per project guidance, σάρξ
    should be rendered 'flesh' in literal contexts.
