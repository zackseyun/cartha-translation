id: WIS.7.8
reference: Wisdom of Solomon 7:8
source:
  edition: lxx-swete-1909
  text: προέκρινα αὐτὴν σκήπτρων καὶ θρόνων, καὶ πλοῦτον οὐδὲν ἡγησάμην ἐν συγκρίσει
    αὐτῆς·
  language: Greek
  pages:
  - 632
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: I preferred her to scepters and thrones, and I considered wealth as nothing
    in comparison with her;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προέκρινα
  chosen: I preferred
  alternatives:
  - I chose before
  - I esteemed above
  - I valued more than
  lexicon: BDAG
  rationale: The verb indicates giving preference to one thing over others. 'I preferred'
    is natural English and preserves the comparative force without over-paraphrasing.
- source_word: αὐτὴν
  chosen: her
  alternatives:
  - it
  lexicon: BDAG
  rationale: The pronoun refers back to wisdom, personified as feminine in the surrounding
    context. 'Her' preserves the literary personification present in the Greek.
- source_word: σκήπτρων
  chosen: scepters
  alternatives:
  - royal staffs
  lexicon: LSJ
  rationale: The plural noun literally denotes scepters, a symbol of royal authority.
    Retaining 'scepters' preserves the concrete image rather than flattening it to
    abstract 'power.'
- source_word: θρόνων
  chosen: thrones
  alternatives:
  - seats of rule
  - kingdoms
  lexicon: LSJ
  rationale: The word literally means thrones and functions here as a metonym for
    sovereign rule. 'Thrones' keeps the imagery parallel to 'scepters.'
- source_word: πλοῦτον
  chosen: wealth
  alternatives:
  - riches
  - abundance
  lexicon: BDAG
  rationale: The noun denotes material wealth or riches. 'Wealth' is clear modern
    English and fits the contrast with royal insignia.
- source_word: οὐδὲν ἡγησάμην
  chosen: I considered as nothing
  alternatives:
  - I counted as nothing
  - I regarded as nothing
  lexicon: BDAG
  rationale: The idiom expresses evaluative judgment. 'I considered as nothing' communicates
    that wealth was judged to have no value by comparison.
- source_word: ἐν συγκρίσει αὐτῆς
  chosen: in comparison with her
  alternatives:
  - beside her
  - compared with her
  lexicon: LSJ
  rationale: The phrase marks the standard of comparison. 'In comparison with her'
    is straightforward and preserves the explicit comparative construction.
