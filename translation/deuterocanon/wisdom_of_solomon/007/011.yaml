theological_decisions:
- issue: Referent of the feminine pronoun αὐτῆς
  chosen_reading: The pronoun refers to personified Wisdom from the immediate context.
  alternative_readings:
  - A more generic feminine antecedent is theoretically possible but contextually
    unlikely.
  rationale: Wisdom of Solomon 7 personifies wisdom as a feminine figure. Preserving
    'her' maintains the literary-theological personification without overexplaining
    it in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
