id: WIS.7.11
reference: Wisdom of Solomon 7:11
source:
  edition: lxx-swete-1909
  text: ἦλθεν δέ μοι τὰ ἀγαθὰ ὁμοῦ πάντα μετ’ αὐτῆς, καὶ ἀναρίθμητος πλοῦτος ἐν ταῖς
    χερσὶν αὐτῆς·
  language: Greek
  pages:
  - 632
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: But all good things came to me together with her, and in her hands was wealth
    beyond counting;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, with Wisdom, personified as a woman in the surrounding context.
    reason: cross_reference
  - marker: b
    text: Or 'countless wealth' or 'immeasurable riches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - came in
  - arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι, here used idiomatically of good things coming to the
    speaker. Simple 'came' is natural and sufficiently formal.
- source_word: τὰ ἀγαθὰ
  chosen: good things
  alternatives:
  - benefits
  - goods
  - blessings
  lexicon: BDAG
  rationale: The neuter plural broadly denotes good things or benefits. 'Good things'
    preserves the breadth without narrowing to material goods alone.
- source_word: ὁμοῦ πάντα
  chosen: all ... together
  alternatives:
  - all at once
  - all together
  lexicon: LSJ
  rationale: The combination emphasizes totality and simultaneity. Rendering it as
    'all good things ... together' preserves both ideas in idiomatic English.
- source_word: μετ’ αὐτῆς
  chosen: together with her
  alternatives:
  - with her
  - along with her
  lexicon: BDAG
  rationale: The feminine pronoun refers back to wisdom in the context. 'Together
    with her' keeps the close association explicit.
- source_word: ἀναρίθμητος πλοῦτος
  chosen: wealth beyond counting
  alternatives:
  - countless wealth
  - immeasurable riches
  lexicon: LSJ
  rationale: ἀναρίθμητος means uncountable or beyond numbering; πλοῦτος is wealth/riches.
    'Wealth beyond counting' is vivid, natural English and preserves the hyperbolic
    force.
- source_word: ἐν ταῖς χερσὶν αὐτῆς
  chosen: in her hands was
  alternatives:
  - was in her hands
  - at her hands was
  lexicon: BDAG
  rationale: The phrase is spatially literal but idiomatically conveys possession
    or what wisdom brings. 'In her hands was' stays close to the Greek while remaining
    readable.
