translation:
  text: And I learned without deceit, and I share without envy; I do not hide her
    wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without begrudging'; the Greek adverb means sharing without envy or
      stinginess.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδόλως
  chosen: without deceit
  alternatives:
  - sincerely
  - guilelessly
  - without fraud
  lexicon: LSJ
  rationale: The adverb denotes absence of deceit or guile. 'Without deceit' preserves
    the moral nuance more transparently than the smoother 'sincerely.'
- source_word: ἔμαθον
  chosen: I learned
  alternatives:
  - I came to know
  - I was taught
  lexicon: LSJ
  rationale: Aorist of μανθάνω, straightforwardly 'learned.' This keeps the first-person
    autobiographical force and avoids over-interpretation.
- source_word: ἀφθόνως
  chosen: without envy
  alternatives:
  - generously
  - without begrudging
  - freely
  lexicon: LSJ
  rationale: The adverb literally conveys absence of envy or grudging. In context
    of imparting wisdom, it means giving freely without begrudging others. 'Without
    envy' stays closest to the Greek while remaining intelligible.
- source_word: μεταδίδωμι
  chosen: I share
  alternatives:
  - I impart
  - I give a share
  - I pass on
  lexicon: LSJ
  rationale: The verb means to share or impart. 'I share' is natural modern English
    and fits the object, wisdom's riches, without becoming overly technical.
- source_word: πλοῦτον
  chosen: wealth
  alternatives:
  - riches
  - abundance
  - treasure
  lexicon: LSJ
  rationale: The noun means wealth or riches. 'Wealth' works well with the singular
    and the metaphorical sense of wisdom's abundance.
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  lexicon: LSJ
  rationale: The pronoun refers to wisdom, grammatically feminine in Greek and personified
    throughout the context. 'Her' preserves the personification better than the impersonal
    'its.'
- source_word: ἀποκρύπτομαι
  chosen: I do not hide
  alternatives:
  - I do not conceal
  - I do not keep secret
  lexicon: LSJ
  rationale: The middle/passive form here functions with active sense, 'hide/conceal.'
    'I do not hide' is concise and idiomatic.
