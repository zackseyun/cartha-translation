theological_decisions:
- issue: Whether to capitalize 'wisdom' as a personified figure
  chosen_reading: wisdom
  alternative_readings:
  - Wisdom
  rationale: The immediate literary context personifies σοφία, but the Greek text
    here does not itself mark capitalization, and English capitalization would make
    an interpretive decision more explicit than the source does. Lowercase preserves
    the theological-literary tension while still allowing the personified sense to
    be heard in context.
  doctrine_reference: Preserve theological tension rather than resolve it.
