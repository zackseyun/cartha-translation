reference: Wisdom of Solomon 7:30
source:
  edition: lxx-swete-1909
  text: τοῦτο μὲν γὰρ διαδέχεται νύξ, σοφίας δὲ οὐκ ἀντισχύει κακία. VIII
  language: Greek
