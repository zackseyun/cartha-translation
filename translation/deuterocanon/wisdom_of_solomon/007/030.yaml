theological_decisions:
- issue: Implicit referent of τοῦτο
  chosen_reading: Keep the demonstrative implicit as 'this' rather than making it
    explicit as 'light.'
  alternative_readings:
  - For light is succeeded by night, but evil does not prevail against wisdom.
  rationale: The Greek text itself uses a demonstrative, not the noun 'light.' Since
    the antecedent is clear enough from the preceding context, preserving the implicit
    reference better reflects the source while remaining readable.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of ἀντισχύει with κακία and σοφίας
  chosen_reading: Render as 'evil does not prevail against wisdom.'
  alternative_readings:
  - evil cannot withstand wisdom
  - wickedness has no power against wisdom
  rationale: The clause expresses wisdom's invincibility over against evil. 'Does
    not prevail against' preserves the contest imagery without importing extra doctrinal
    content.
  doctrine_reference: Translation philosophy §6
