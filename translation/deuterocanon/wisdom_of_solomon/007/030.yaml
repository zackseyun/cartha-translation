translation:
  text: For night succeeds this, but evil does not prevail against wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For light is followed by night'; the Greek says 'this,' referring back
      to the previous verse's mention of light.
    reason: lexical_alternative
  - marker: b
    text: Or 'evil cannot withstand wisdom.'
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτο
  chosen: this
  alternatives:
  - light
  - it
  lexicon: LSJ
  rationale: Neuter demonstrative referring back to the immediately preceding subject,
    most naturally rendered simply as 'this.' Because the prior verse speaks of light,
    some English translations make the referent explicit as 'light,' but the Greek
    here leaves it implicit.
- source_word: διαδέχεται
  chosen: succeeds
  alternatives:
  - follows
  - comes after
  - takes the place of
  lexicon: LSJ
  rationale: The verb conveys coming after in sequence or succeeding. 'Succeeds' preserves
    the compact formal sense and fits the contrast with night following the prior
    referent.
- source_word: νύξ
  chosen: night
  lexicon: LSJ
  rationale: Straightforward lexical sense; in context it contrasts with the prior
    mention of light.
- source_word: σοφίας
  chosen: wisdom
  lexicon: LSJ
  rationale: Genitive after ἀντισχύει, indicating the one against whom resistance
    or prevailing would be attempted. 'Wisdom' is the established and contextually
    correct rendering in this chapter.
- source_word: οὐκ ἀντισχύει
  chosen: does not prevail against
  alternatives:
  - cannot withstand
  - does not overpower
  - has no strength against
  lexicon: LSJ
  rationale: The compound verb denotes being strong against, resisting successfully,
    or prevailing over. 'Does not prevail against' captures both the adversative force
    and the outcome without over-paraphrasing.
- source_word: κακία
  chosen: evil
  alternatives:
  - wickedness
  - malice
  - vice
  lexicon: LSJ
  rationale: κακία can denote moral badness broadly, including wickedness or malice.
    In this wisdom context, 'evil' is the broadest and most natural English equivalent,
    preserving the moral contrast with wisdom.
