theological_decisions:
- issue: Anthropological emphasis on common human generation
  chosen_reading: The verse is rendered to stress ordinary human gestation and conception
    without importing later biological precision.
  alternative_readings:
  - A more literal rendering emphasizing coagulation in blood
  - A more explicit rendering naming sexual intercourse directly
  rationale: The context in Wisdom 7 underscores Solomon's full humanity and ordinary
    birth. The translation preserves that point while keeping the source's restrained
    diction and not forcing either ancient embryology or modern terminology into the
    text.
