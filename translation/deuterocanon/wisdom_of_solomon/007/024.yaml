reference: Wisdom of Solomon 7:24
source:
  edition: lxx-swete-1909
  text: πάσης γὰρ κινήσεως κινητικώτερον σοφία, διήκει δὲ καὶ χωρεῖ διὰ πάντων διὰ
    τὴν καθαρότητα.
  language: Greek
