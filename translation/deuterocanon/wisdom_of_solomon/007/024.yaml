translation:
  text: For wisdom is more mobile than any movement, and because of her purity she
    passes through and penetrates all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more active than all motion.' The Greek comparative emphasizes wisdom's
      surpassing capacity for movement.
    reason: lexical_alternative
  - marker: b
    text: The Greek uses feminine grammar for 'wisdom'; 'her purity' reflects that
      personification.
    reason: cultural_note
lexical_decisions:
- source_word: πάσης ... κινήσεως
  chosen: every movement
  alternatives:
  - all motion
  - every motion
  lexicon: LSJ
  rationale: κίνησις commonly denotes movement or motion. 'Every movement' preserves
    the comparative construction with πάσης while sounding natural in English.
- source_word: κινητικώτερον
  chosen: more mobile
  alternatives:
  - more active
  - more moving
  - more agile
  lexicon: LSJ
  rationale: The comparative adjective built from the movement root emphasizes capacity
    for movement. 'More mobile' best captures the idea that wisdom is more capable
    of moving than anything else in motion, without overinterpreting as moral or mental
    activity.
- source_word: σοφία
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering; in Wisdom literature this term is both personified
    and conceptually central. Lowercase 'wisdom' preserves the Greek while allowing
    the feminine pronouns in context.
- source_word: διήκει
  chosen: passes through
  alternatives:
  - reaches through
  - extends through
  - penetrates
  lexicon: LSJ
  rationale: The verb conveys going through or extending through. 'Passes through'
    is idiomatic and pairs well with the following verb without collapsing the two
    into one idea.
- source_word: χωρεῖ
  chosen: permeates
  alternatives:
  - goes through
  - passes through
  - makes its way through
  lexicon: LSJ
  rationale: Since διήκει already covers 'passes through,' a distinct English rendering
    helps preserve the two-verb structure. 'Permeates' captures the sense of spreading
    through all things because of wisdom's purity.
- source_word: διὰ πάντων
  chosen: all things
  alternatives:
  - everything
  - through all
  lexicon: LSJ
  rationale: The phrase is comprehensive and neuter/plural in sense. 'All things'
    preserves the breadth and slightly elevated tone of the Greek.
- source_word: διὰ τὴν καθαρότητα
  chosen: because of her purity
  alternatives:
  - on account of purity
  - because of its purity
  lexicon: LSJ
  rationale: διά with the accusative gives causal force. 'Because of her purity' reflects
    the personified feminine subject σοφία and keeps the causal connection explicit.
