theological_decisions:
- issue: Personification of wisdom
  chosen_reading: Retain feminine personal reference ('her purity') while not capitalizing
    'wisdom' as a distinct divine hypostasis.
  alternative_readings:
  - Use impersonal 'its purity'
  - Capitalize 'Wisdom' to stress personification
  rationale: The Greek noun σοφία is feminine and the surrounding context personifies
    wisdom, so feminine reference is appropriate. However, the verse itself does not
    require capitalization or a stronger ontological claim about Wisdom beyond literary
    personification.
  doctrine_reference: Preserve theological tension rather than resolve it.
