theological_decisions:
- issue: Personification of the created element in relation to God's providence
  chosen_reading: Retain the personified wording ('forgot even its own power') rather
    than flattening to an impersonal paraphrase.
  alternative_readings:
  - lost its natural force
  - set aside its normal effect
  rationale: The Greek explicitly personifies the subject by saying it 'forgot' its
    own power. Preserving this imagery reflects Wisdom's theological portrayal of
    creation as responsive to God's purposes for the righteous.
