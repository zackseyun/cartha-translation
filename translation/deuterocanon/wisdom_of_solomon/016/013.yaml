theological_decisions:
- issue: Rendering of ᾅδου
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - the underworld
  rationale: The Greek explicitly names ᾅδης, the realm of the dead. Rendering it
    as "Hades" preserves the source term and avoids importing a narrower or different
    concept. "The grave" is interpretive and less precise; "underworld" is possible
    but less tied to the Greek lexical form.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
- issue: Force of ἀνάγεις in relation to death
  chosen_reading: bring up again
  alternative_readings:
  - raise up
  rationale: The verse states God's power to bring down to Hades and to bring up.
    "Raise up" could suggest a more technical resurrection claim than the Greek verb
    alone requires here. The chosen rendering preserves the theological tension without
    narrowing the sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
