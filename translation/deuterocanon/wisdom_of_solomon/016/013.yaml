translation:
  text: For you have authority over life and death, and you bring down to the gates
    of Hades and bring up again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the gates of the grave" or "the gates of the underworld." The Greek
      reads "Hades," the realm of the dead.
    reason: lexical_alternative
  - marker: b
    text: Or "lead up" or "raise up." The Greek simply says "bring up," balancing
      "bring down" in the previous clause.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - dominion
  lexicon: BDAG
  rationale: '"Authority" best captures the right or sovereign control implied by
    ἐξουσία, not merely raw ability. In context the speaker attributes to God sovereign
    rule over life and death.'
- source_word: ζωῆς καὶ θανάτου
  chosen: life and death
  lexicon: BDAG
  rationale: A straightforward genitival pair governed by ἐξουσίαν ἔχεις. No expansion
    is warranted beyond the plain contrast.
- source_word: κατάγεις
  chosen: bring down
  alternatives:
  - lead down
  - take down
  lexicon: BDAG
  rationale: The verb literally denotes causing to go down. "Bring down" is natural
    English and preserves the vertical imagery tied to Hades.
- source_word: πύλας ᾅδου
  chosen: the gates of Hades
  alternatives:
  - the gates of the grave
  - the gates of the underworld
  lexicon: BDAG
  rationale: ᾅδης in Greek Jewish literature refers to the realm of the dead. "Hades"
    preserves the specific term more accurately than flattening it to "grave," while
    "gates" reflects the concrete metaphor in the Greek.
- source_word: ἀνάγεις
  chosen: bring up again
  alternatives:
  - lead up
  - raise up
  lexicon: BDAG
  rationale: The verb is the counterpart to κατάγεις and indicates upward movement
    from the realm of the dead. "Bring up again" preserves the antithesis and implies
    return without over-specifying resurrection terminology.
