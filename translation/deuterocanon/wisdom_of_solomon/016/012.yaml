theological_decisions:
- issue: Nature of the contrast between human remedies and divine action
  chosen_reading: The verse contrasts ordinary medicinal means with the Lord's effective
    word, without denying that medicine can exist or be useful in other contexts.
  alternative_readings:
  - A stronger anti-medicine reading in which all human remedies are rejected
  rationale: The Greek says that neither herb nor poultice healed them in this case,
    but the Lord's word did. The translation preserves the immediate contrast without
    expanding it into a general theological condemnation of medicine.
  doctrine_reference: Preserve theological tension rather than resolve it.
