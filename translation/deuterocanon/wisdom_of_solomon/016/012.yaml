translation:
  text: For neither herb nor poultice healed them, but your word, O Lord, which heals
    all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plant' for 'herb.' The Greek term can refer more broadly to vegetation,
      but here likely means a medicinal herb.
    reason: lexical_alternative
  - marker: b
    text: Or 'ointment' for 'poultice.' The Greek refers to a medicinal application
      used for healing.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βοτάνη
  chosen: herb
  alternatives:
  - plant
  - vegetation
  - medicine
  lexicon: LSJ
  rationale: In this healing context, the term refers to a medicinal plant or herb
    rather than vegetation in general. 'Herb' is concise, natural English and preserves
    the contrast with the Lord's word over against ordinary remedies.
- source_word: μάλαγμα
  chosen: poultice
  alternatives:
  - ointment
  - soothing application
  - plaster
  lexicon: LSJ
  rationale: The noun denotes a softening or medicinal application placed on the body.
    'Poultice' best captures a physical remedial treatment without overgeneralizing
    to any medicine.
- source_word: ἐθεράπευσεν
  chosen: healed
  alternatives:
  - cured
  - treated
  lexicon: BDAG
  rationale: The verb here denotes actual restoration, not merely attendance or treatment.
    'Healed' fits the contrast with divine healing and is idiomatic in English.
- source_word: λόγος
  chosen: word
  alternatives:
  - command
  - utterance
  lexicon: BDAG
  rationale: In this context the term points to the Lord's effective spoken or expressed
    will. 'Word' preserves the theological resonance and the likely allusion to God's
    powerful utterance without importing later technical theology.
- source_word: ἰώμενος
  chosen: which heals
  alternatives:
  - healing
  - that cures
  lexicon: BDAG
  rationale: The present participle describes the Lord's word as characteristically
    or effectively healing. Rendering it as a relative clause gives natural English
    while preserving the ongoing descriptive force.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: BDAG
  rationale: The neuter plural is broad and comprehensive. 'All things' preserves
    the elevated register and universal scope better than the more colloquial 'everything'.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the project's default rendering for κύριος and fits direct
    address in prayer-like speech.
