theological_decisions:
- issue: Referent contrast between 'those men' and 'these others'
  chosen_reading: The first group is the Egyptians afflicted by sent creatures; the
    second group is God's people who briefly lacked food and received extraordinary
    provision.
  alternative_readings:
  - A more generic contrast between the wicked and the righteous without naming historical
    groups
  rationale: The immediate context in Wisdom 16 contrasts Egyptian punishment with
    Israel's provision. The translation preserves the pronominal contrast while making
    it intelligible in English.
