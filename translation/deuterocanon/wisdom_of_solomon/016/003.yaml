translation:
  text: so that those men, though desiring food, might, because of the appearance
    of the creatures that had been sent, turn away even from their necessary appetite,
    while these others, after becoming needy for a short time, might also partake
    of a strange taste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sight of the things sent against them'; the Greek refers to the
      plague-creatures God sent, and the wording emphasizes their visible appearance
      as the cause of revulsion.
    reason: lexical_alternative
  - marker: b
    text: '''A strange taste'' refers to food of an unfamiliar kind, likely anticipating
      the extraordinary character of the provision given to Israel.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐπιθυμοῦντες
  chosen: desiring
  alternatives:
  - craving
  - longing for
  lexicon: BDAG
  rationale: The participle denotes strong desire, but 'desiring' keeps the sense
    without over-intensifying beyond the context.
- source_word: τροφήν
  chosen: food
  alternatives:
  - nourishment
  lexicon: BDAG
  rationale: Plain, natural English for edible sustenance; 'nourishment' is possible
    but less idiomatic here.
- source_word: δειχθεῖσαν
  chosen: appearance
  alternatives:
  - sight
  - what was shown
  lexicon: BDAG
  rationale: In context the point is that the visible presentation of the sent creatures
    caused revulsion. 'Appearance' captures the visual force in idiomatic English.
- source_word: τῶν ἐπαπεσταλμένων
  chosen: the creatures that had been sent
  alternatives:
  - the things sent against them
  - the animals sent
  lexicon: BDAG
  rationale: The participle refers back to the plague-creatures sent upon the Egyptians.
    'Creatures' makes the referent explicit in English without adding a specific species
    not named in this verse.
- source_word: ἀναγκαίαν ὄρεξιν
  chosen: necessary appetite
  alternatives:
  - natural appetite
  - necessary desire
  lexicon: BDAG
  rationale: The phrase emphasizes even the appetite compelled by necessity. 'Necessary
    appetite' preserves that force more closely than the smoother 'natural appetite'.
- source_word: ἀποστρέφωνται
  chosen: might turn away
  alternatives:
  - might recoil
  - might be repelled
  lexicon: BDAG
  rationale: The middle/passive sense here is that they turned away from food in revulsion.
    'Turn away' is broad and faithful; the revulsive nuance is supplied by context.
- source_word: ἐπʼ ὀλίγον
  chosen: for a short time
  alternatives:
  - briefly
  - for a little while
  lexicon: BDAG
  rationale: Temporal limitation is important to the contrast with the Egyptians;
    this rendering is clear and natural.
- source_word: ἐνδεεῖς γενόμενοι
  chosen: after becoming needy
  alternatives:
  - after being in want
  - after suffering lack
  lexicon: BDAG
  rationale: The phrase indicates temporary deprivation among the righteous. 'Becoming
    needy' preserves the state of lack without specifying starvation.
- source_word: ξένης ... γεύσεως
  chosen: a strange taste
  alternatives:
  - an unusual taste
  - a foreign taste
  lexicon: BDAG
  rationale: The manna is portrayed as food of an unfamiliar kind. 'Strange taste'
    preserves the contrastive novelty; 'foreign' would sound misleadingly ethnic in
    English.
- source_word: μετάσχωσι
  chosen: might partake
  alternatives:
  - might share in
  - might have a share of
  lexicon: BDAG
  rationale: A standard rendering for participation in food or experience; suitably
    elevated without being archaic.
