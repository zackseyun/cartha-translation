translation:
  text: For creation, serving you its maker, intensifies itself for the punishment
    of the unrighteous, and relaxes for the benefit of those who have put their trust
    in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''intensifies for punishment ... and is released for beneficence.''
      The Greek uses contrasting physical imagery: creation is ''stretched'' toward
      punishment and ''loosened'' toward doing good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κτίσις
  chosen: creation
  alternatives:
  - the created order
  - nature
  lexicon: LSJ
  rationale: '''Creation'' best captures the whole created order as an active instrument
    under God, without reducing it merely to impersonal ''nature.'''
- source_word: τῷ ποιήσαντι
  chosen: its maker
  alternatives:
  - the one who made it
  - its creator
  lexicon: LSJ
  rationale: 'The dative with σοι is appositional/explanatory: ''you, the one who
    made it.'' ''Its maker'' is concise and natural in English while preserving the
    relation between creation and God.'
- source_word: ὑπηρετοῦσα
  chosen: serving
  alternatives:
  - ministering
  - acting in service
  lexicon: LSJ
  rationale: The participle presents creation as carrying out God's purposes. 'Serving'
    is clear modern English and avoids overly ecclesiastical 'ministering.'
- source_word: ἐπιτείνει
  chosen: strains itself
  alternatives:
  - intensifies
  - stretches itself
  - exerts itself
  lexicon: LSJ
  rationale: The verb conveys being stretched or intensified toward an end. 'Strains
    itself' preserves the vivid image of creation being pressed into punitive force
    more effectively than the flatter 'intensifies.'
- source_word: εἰς κόλασιν
  chosen: to punish
  alternatives:
  - for punishment
  - for chastisement
  lexicon: LSJ
  rationale: An infinitival rendering is smoother in English after 'strains itself.'
    'Punish' communicates the judicial sense of κόλασις here; 'chastisement' could
    sound overly corrective rather than penal.
- source_word: κατὰ τῶν ἀδίκων
  chosen: the unrighteous
  alternatives:
  - the unjust
  - the wicked
  lexicon: LSJ
  rationale: '''Unrighteous'' aligns with the moral-judicial force of ἄδικος and maintains
    consistency with key biblical terminology, while ''wicked'' would be somewhat
    freer.'
- source_word: ἀνίεται
  chosen: relaxes into
  alternatives:
  - is released into
  - turns to
  - lets up for
  lexicon: LSJ
  rationale: The contrast with ἐπιτείνει suggests release or slackening. 'Relaxes
    into' preserves the imagery of creation easing from punitive tension into beneficent
    action.
- source_word: εἰς εὐεργεσίαν
  chosen: beneficence
  alternatives:
  - kindness
  - well-doing
  - benefit
  lexicon: LSJ
  rationale: The noun denotes doing good or beneficent action. 'Beneficence' preserves
    the elevated register and active sense better than the more generic 'kindness.'
- source_word: ὑπὲρ τῶν εἰς σὲ πεποιθότων
  chosen: on behalf of those who have put their trust in you
  alternatives:
  - for those who trust in you
  - for those who have confidence in you
  lexicon: LSJ
  rationale: The perfect participle πεποιθότων suggests a settled state of trust.
    'Have put their trust in you' reflects that completed-and-enduring nuance more
    fully than a simple present 'trust.'
