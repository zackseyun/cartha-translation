theological_decisions:
- issue: Agency of creation under God
  chosen_reading: Creation is rendered as an instrument serving God in both judgment
    and beneficence.
  alternative_readings:
  - Creation/nature acts autonomously as an impersonal force.
  rationale: The participle ὑπηρετοῦσα and the dative phrase σοι τῷ ποιήσαντι present
    creation as subordinate to and serving God, not as an independent cosmic power.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve the text''s
    theological tension without importing claims.'
