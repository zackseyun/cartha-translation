theological_decisions:
- issue: Rendering σωτηρίας in a context of physical deliverance with theological
    overtones
  chosen_reading: of salvation
  alternative_readings:
  - of deliverance
  - of rescue
  rationale: The Wisdom context reflects the wilderness episode where the visible
    sign mediated God's saving action. 'Salvation' retains both immediate rescue and
    broader theological resonance without importing later doctrinal specifics.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, readable modern English'
- issue: How to render σύμβολον in relation to the bronze-serpent typology
  chosen_reading: a sign of salvation
  alternative_readings:
  - a symbol of salvation
  - a token of deliverance
  rationale: The term points to an object functioning representationally. 'Sign' best
    preserves the object's indicative function and avoids overly abstract 'symbol'
    while not flattening it to a mere physical token.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition;
    preserve theological tension rather than resolve it'
