translation:
  text: But for a short time they were troubled as a warning, having a sign of salvation,
    as a reminder of the commandment of your law;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a symbol of salvation' or 'a token of deliverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς νουθεσίαν
  chosen: as a warning
  alternatives:
  - for admonition
  - for instruction
  lexicon: BDAG
  rationale: νουθεσία denotes admonition or warning intended to correct behavior.
    'As a warning' fits the idiom with εἰς and reads naturally in English while preserving
    the corrective sense.
- source_word: πρὸς ὀλίγον
  chosen: for a short time
  alternatives:
  - briefly
  - for a little while
  lexicon: LSJ
  rationale: The phrase indicates limited duration. 'For a short time' preserves the
    temporal force more explicitly than the adverb 'briefly'.
- source_word: ἐταράχθησαν
  chosen: they were troubled
  alternatives:
  - they were disturbed
  - they were shaken
  lexicon: BDAG
  rationale: The passive of ταράσσω commonly means to be troubled or disturbed. 'Troubled'
    is idiomatic and suitably broad for the affliction described.
- source_word: σύμβολον
  chosen: a sign
  alternatives:
  - a token
  - a symbol
  lexicon: LSJ
  rationale: σύμβολον can mean token, sign, or symbol. In this context of the bronze-serpent
    episode, 'sign' communicates a visible object pointing beyond itself to divine
    rescue, while remaining accessible English.
- source_word: σωτηρίας
  chosen: of salvation
  alternatives:
  - of deliverance
  - of rescue
  lexicon: BDAG
  rationale: σωτηρία here refers to being saved from deadly judgment. 'Salvation'
    preserves the theological weight of the Greek, though 'deliverance' is contextually
    possible.
- source_word: εἰς ἀνάμνησιν
  chosen: for a reminder
  alternatives:
  - for remembrance
  - as a memorial
  lexicon: BDAG
  rationale: 'The phrase expresses purpose/result: the sign served to bring something
    to mind. ''For a reminder'' is natural English and keeps the memorial sense.'
- source_word: ἐντολῆς νόμου σου
  chosen: the commandment of your law
  alternatives:
  - your law's commandment
  - the command of your law
  lexicon: LSJ
  rationale: The genitive construction is somewhat compact. 'The commandment of your
    law' preserves both singular ἐντολή and νόμος without overinterpreting whether
    a specific command or the law's command as such is in view.
