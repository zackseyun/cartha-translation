theological_decisions:
- issue: Retributive correspondence in divine judgment
  chosen_reading: The punishment is rendered as fittingly corresponding to the means
    ('by similar things') without expanding the principle beyond the verse.
  alternative_readings:
  - The phrase could be paraphrased more interpretively as 'by the very things they
    sinned with' from the broader context.
  rationale: The Greek here states likeness/correspondence, not the fuller explanatory
    maxim found elsewhere in the passage. The translation preserves the theological
    idea of proportionate judgment without importing wording not present in this verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
