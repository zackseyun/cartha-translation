translation:
  text: Therefore they were justly punished by similar things, and were tormented
    by a multitude of creeping creatures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by like things' or 'through similar things'; the Greek emphasizes that
      the punishment corresponded to the offense.
    reason: lexical_alternative
  - marker: b
    text: The Greek term can refer broadly to crawling or creeping animals; 'creeping
      creatures' preserves that breadth.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: LSJ
  rationale: Introduces an inferential conclusion from the preceding context. 'Therefore'
    is concise and natural in English while preserving the causal-logical force.
- source_word: διʼ ὁμοίων
  chosen: by similar things
  alternatives:
  - through like things
  - by the same kinds of things
  lexicon: LSJ
  rationale: The phrase indicates correspondence between offense and punishment. 'By
    similar things' preserves the comparative idea without over-specifying the referent.
- source_word: ἐκολάσθησαν
  chosen: were punished
  alternatives:
  - were chastised
  - were disciplined
  lexicon: LSJ
  rationale: The verb denotes punitive treatment. 'Were punished' best fits the judicial
    sense in context; 'chastised' could sound milder or pedagogical.
- source_word: ἀξίως
  chosen: justly
  alternatives:
  - deservedly
  - worthily
  lexicon: LSJ
  rationale: In context the adverb marks fitting or deserved punishment. 'Justly'
    communicates moral appropriateness in idiomatic English.
- source_word: πλήθους
  chosen: a multitude of
  alternatives:
  - many
  - a swarm of
  lexicon: LSJ
  rationale: The genitive expresses abundance. 'A multitude of' preserves the quantitative
    emphasis more closely than the flatter 'many.'
- source_word: κνωδάλων
  chosen: creeping creatures
  alternatives:
  - vermin
  - reptiles
  - creatures
  lexicon: LSJ
  rationale: The term refers broadly to crawling/creeping animals or pests. 'Creeping
    creatures' keeps the imagery broad and avoids narrowing the reference to reptiles
    alone; 'vermin' is interpretive and more pejorative than the Greek requires.
- source_word: ἐβασανίσθησαν
  chosen: were tormented
  alternatives:
  - were afflicted
  - were tortured
  lexicon: LSJ
  rationale: The verb conveys severe distress or torment. 'Were tormented' preserves
    the intensity without the potentially over-literal forensic sense of 'tortured.'
