translation:
  text: But the teeth of venomous serpents did not overcome your sons, for your mercy
    came to their aid and healed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your children.' The Greek says 'sons,' which is retained here for gender-accurate
      translation.
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱούς
  chosen: sons
  alternatives:
  - children
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural, 'sons.' In context it refers
    to God's people/Israelites. Per doctrine, gender-accurate rendering is preferred
    over neutralizing to 'children.'
- source_word: ἰοβόλων
  chosen: venomous
  alternatives:
  - poison-shooting
  - poisonous
  lexicon: LSJ
  rationale: The compound denotes casting or sending poison/venom. 'Venomous' is idiomatic
    modern English and fits the sense without awkward literalism.
- source_word: δρακόντων
  chosen: serpents
  alternatives:
  - dragons
  - snakes
  lexicon: LSJ
  rationale: In this context of biting and poisonous creatures in the wilderness,
    'serpents' best conveys the referent. 'Dragons' would mislead modern readers;
    'snakes' is possible but 'serpents' preserves the elevated register and biblical
    resonance.
- source_word: ἐνίκησαν
  chosen: did not overcome
  alternatives:
  - did not conquer
  - did not prevail against
  lexicon: LSJ
  rationale: The verb means to conquer or prevail. 'Did not overcome' is natural English
    and preserves the sense that the bites were not ultimately victorious over them.
- source_word: ἀντιπαρῆλθεν
  chosen: came to their aid
  alternatives:
  - came alongside
  - intervened
  - passed by against
  lexicon: LSJ
  rationale: The compound verb is unusual and contextually means that God's mercy
    came in response/over against the danger. 'Came to their aid' captures the rescuing
    force in clear English better than a wooden rendering.
- source_word: ἰάσατο
  chosen: healed
  alternatives:
  - cured
  - restored
  lexicon: LSJ
  rationale: Standard healing verb. 'Healed' is the most direct and natural rendering
    in this context.
