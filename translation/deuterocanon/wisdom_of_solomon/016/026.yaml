theological_decisions:
- issue: Possible allusion to Deuteronomy 8:3 about life being sustained by God's
    word rather than bread
  chosen_reading: Retain the allusive wording 'your word preserves' without importing
    fuller quotation language such as 'man shall not live by bread alone.'
  alternative_readings:
  - Expand the line to make the Deuteronomic echo explicit
  rationale: The Greek of Wisdom states its own formulation. The translation preserves
    the likely scriptural resonance while not harmonizing the verse to a fuller biblical
    quotation absent from the source text.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering generic ἄνθρωπον
  chosen_reading: man
  alternative_readings:
  - humanity
  - a person
  - human beings
  rationale: The singular generic is preserved in line with the project's gender-accurate
    policy. This keeps the representative force of the Greek rather than flattening
    it into a plural abstraction.
  doctrine_reference: Translation philosophy §4
