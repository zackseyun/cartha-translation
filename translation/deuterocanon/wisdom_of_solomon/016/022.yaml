theological_decisions:
- issue: Purpose clause and referent of knowledge
  chosen_reading: The clause expresses the purpose/result that 'they' would recognize
    God's paradoxical judgment in Egypt.
  alternative_readings:
  - The subject of 'they might know' could be read more generally as people observing
    the event rather than specifically the enemies.
  rationale: The plural verb lacks an explicit subject, but in context the verse explains
    the sign-value of the miracle within the plague narrative. The translation keeps
    the Greek ambiguity by using 'they' without specifying beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
