translation:
  text: But snow and ice endured fire and did not melt, so that they might know that
    fire, blazing in the hail and flashing in the rainstorms, was destroying the fruits
    of the enemies;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the enemies' crops' or 'the produce of the enemies.' The Greek literally
      says 'the fruits of the enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χιὼν
  chosen: snow
  alternatives:
  - hail
  lexicon: LSJ
  rationale: The ordinary sense is 'snow.' Since χαλάζῃ ('hail') appears later in
    the verse, rendering χιὼν as 'snow' preserves the distinction in the Greek.
- source_word: κρύσταλλος
  chosen: ice
  alternatives:
  - frost
  - crystal
  lexicon: LSJ
  rationale: In this weather context paired with snow and contrasted with melting,
    'ice' best conveys the sense. 'Crystal' would be too literal and misleading in
    English here.
- source_word: ὑπέμεινε
  chosen: endured
  alternatives:
  - withstood
  - remained under
  lexicon: LSJ
  rationale: The verb conveys remaining firm under pressure. 'Endured' fits the paradox
    of snow and ice remaining intact in fire.
- source_word: ἐτήκετο
  chosen: did not melt
  alternatives:
  - was not dissolved
  - did not liquefy
  lexicon: LSJ
  rationale: Given the subjects 'snow and ice,' 'melt' is the natural English equivalent.
- source_word: ἵνα γνῶσιν
  chosen: so that they might know
  alternatives:
  - in order that they might know
  - so that they would know
  lexicon: LSJ
  rationale: This preserves the purposive force of ἵνα with aorist subjunctive while
    remaining readable.
- source_word: κατέφθειρε
  chosen: was destroying
  alternatives:
  - destroyed
  - was consuming
  - was ruining
  lexicon: LSJ
  rationale: The imperfect suggests ongoing action in the plague setting; 'was destroying'
    reflects that aspect better than a simple past.
- source_word: φλεγόμενον
  chosen: blazing
  alternatives:
  - burning
  - aflame
  lexicon: LSJ
  rationale: A participial modifier of πῦρ, 'blazing' is vivid and idiomatic without
    overtranslation.
- source_word: ἐν τῇ χαλάζῃ
  chosen: in the hail
  alternatives:
  - amid the hail
  - with the hail
  lexicon: LSJ
  rationale: The preposition ἐν is straightforwardly rendered 'in' here, describing
    the fire's presence within the hailstorm.
- source_word: ἐν τοῖς ὑετοῖς
  chosen: in the rains
  alternatives:
  - in the showers
  - in the downpours
  lexicon: LSJ
  rationale: ὑετός denotes rain/rainfall. The plural article and noun are naturally
    rendered 'the rains' in English.
- source_word: διαστράπτον
  chosen: flashing
  alternatives:
  - gleaming
  - lightning forth
  lexicon: LSJ
  rationale: The participle describes the fire's lightning-like flashing within the
    rains; 'flashing' is concise and natural.
- source_word: τοὺς τῶν ἐχθρῶν καρπούς
  chosen: the fruits of the enemies
  alternatives:
  - the enemies' crops
  - the produce of the enemies
  lexicon: LSJ
  rationale: '''Fruits'' is formally close to καρπούς and can include agricultural
    produce generally. ''Crops'' is possible, but ''fruits'' better preserves the
    lexical form while remaining understandable in context.'
