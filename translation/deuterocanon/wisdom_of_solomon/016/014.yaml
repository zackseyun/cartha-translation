translation:
  text: But a man kills by his own wickedness, and when a spirit has gone out, he
    does not bring it back, nor does he release a soul that has been taken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the breath has gone out, he does not bring it back, nor does he
      release a life that has been taken away.' The Greek uses πνεῦμα and ψυχή, which
      can overlap with 'breath/spirit' and 'life/soul' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a human being
  - a person
  lexicon: LSJ
  rationale: The singular generic ἄνθρωπος contrasts human limitation with God's power
    in the surrounding context. Per gender-accurate policy, 'a man' preserves the
    representative singular without flattening it to an abstract plural.
- source_word: ἀποκτέννει
  chosen: kills
  alternatives:
  - puts to death
  - destroys
  lexicon: BDAG
  rationale: The verb straightforwardly denotes killing. 'Kills' is the most natural
    modern English equivalent and fits the contrast with inability to restore life.
- source_word: τῇ κακίᾳ αὐτοῦ
  chosen: by his own wickedness
  alternatives:
  - by his evil
  - through his malice
  lexicon: BDAG
  rationale: κακία can denote wickedness, evil, or malice. 'Wickedness' best captures
    moral evil in a general sense here, and 'his own' makes explicit the possessive
    force of αὐτοῦ.
- source_word: ἐξελθὸν ... πνεῦμα
  chosen: when a spirit has gone out
  alternatives:
  - when the breath has gone out
  - after the spirit departs
  lexicon: BDAG
  rationale: πνεῦμα can mean spirit, breath, or wind. In this death context it refers
    to the life-spirit/breath departing. 'Spirit' is retained in the main text because
    it preserves the Greek term's anthropological breadth; the 'breath' alternative
    is worth preserving in a footnote.
- source_word: οὐκ ἀναστρέφει
  chosen: he does not bring it back
  alternatives:
  - he does not turn it back
  - he does not restore it
  lexicon: LSJ
  rationale: Given the object implied from πνεῦμα, the sense is returning what has
    departed. 'Bring it back' is idiomatic English that preserves the concrete image.
- source_word: οὐδὲ ἀναλύει
  chosen: nor does he release
  alternatives:
  - nor does he loose
  - nor does he set free
  lexicon: LSJ
  rationale: ἀναλύω here carries the sense of loosening or releasing, not merely departing.
    'Release' fits the object 'a soul that has been taken' and preserves the image
    of freeing from death's grasp.
- source_word: ψυχὴν παραλημφθεῖσαν
  chosen: a soul that has been taken
  alternatives:
  - a life that has been taken away
  - a soul that has been seized
  lexicon: BDAG
  rationale: ψυχή can mean soul or life; παραλημφθεῖσαν indicates having been taken/received
    away. 'A soul that has been taken' keeps the anthropological term visible while
    allowing the context of death to govern the sense.
