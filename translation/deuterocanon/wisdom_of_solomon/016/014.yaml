theological_decisions:
- issue: Anthropological terms πνεῦμα and ψυχή in a death context
  chosen_reading: Render πνεῦμα as 'spirit' and ψυχή as 'soul' in the main text
  alternative_readings:
  - Render πνεῦμα as 'breath' and ψυχή as 'life'
  rationale: The verse contrasts human ability to kill with inability to reverse death.
    The Greek uses two distinct anthropological terms; preserving both in English
    maintains the text's conceptual texture rather than collapsing them into one term.
    Because English readers may hear stronger metaphysical distinctions than the Greek
    necessarily requires, the more concrete alternatives are preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
