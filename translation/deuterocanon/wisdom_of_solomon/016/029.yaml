translation:
  text: For the hope of the ungrateful will melt like wintry frost, and will run off
    like useless water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the thankless.' The Greek ἀχάριστου can be rendered either way; 'ungrateful'
      was chosen for clearer ethical force in modern English.
    reason: lexical_alternative
  - marker: b
    text: More literally, 'like winter frost.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will flow away like water of no use.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀχάριστου
  chosen: of the ungrateful
  alternatives:
  - of the thankless
  - of the unthankful
  lexicon: LSJ
  rationale: The genitive singular adjective functions substantivally. 'Ungrateful'
    is clear modern English and preserves the moral sense of one lacking thankfulness;
    'thankless' is possible but can sound more idiomatic than ethical in English.
- source_word: ἐλπὶς
  chosen: hope
  alternatives:
  - expectation
  lexicon: LSJ
  rationale: The standard sense 'hope' fits both the lexical range and the wisdom-context
    contrast between false confidence and its collapse.
- source_word: χειμέριος
  chosen: wintry
  alternatives:
  - of winter
  - winter
  lexicon: LSJ
  rationale: Used adjectivally with πάχνη. 'Wintry frost' is natural English and preserves
    the seasonal image without awkwardness.
- source_word: πάχνη
  chosen: frost
  alternatives:
  - hoarfrost
  lexicon: LSJ
  rationale: The word denotes frost/hoarfrost. 'Frost' is chosen for readability;
    'hoarfrost' is more specific but less accessible. The simile's force is the ease
    of melting, which 'frost' communicates well.
- source_word: τακήσεται
  chosen: will melt
  alternatives:
  - will be melted away
  - will dissolve
  lexicon: LSJ
  rationale: Future passive/middle of τήκω in context conveys melting away. 'Will
    melt' is idiomatic and sufficiently precise.
- source_word: ῥυήσεται
  chosen: will run off
  alternatives:
  - will flow away
  - will stream away
  lexicon: LSJ
  rationale: The future form conveys flowing away. 'Run off' fits the image of water
    quickly disappearing and pairs well with the previous simile.
- source_word: ὕδωρ ἄχρηστον
  chosen: useless water
  alternatives:
  - worthless water
  - water of no use
  lexicon: LSJ
  rationale: ἄχρηστον means useless/unserviceable. The phrase likely describes water
    that does not remain for beneficial use but drains away. 'Useless water' is a
    close, transparent rendering.
