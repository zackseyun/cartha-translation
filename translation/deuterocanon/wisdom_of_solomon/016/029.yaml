theological_decisions:
- issue: Moral characterization of ἀχάριστου
  chosen_reading: the ungrateful
  alternative_readings:
  - the thankless
  - the unthankful
  rationale: The verse condemns a moral-spiritual posture rather than merely describing
    a social slight. 'Ungrateful' best preserves that ethical force without importing
    additional doctrinal claims.
