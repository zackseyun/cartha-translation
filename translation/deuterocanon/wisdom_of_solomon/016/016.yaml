translation:
  text: For because they refused to know you, the ungodly were scourged by the strength
    of your arm, pursued by strange rains and hail and relentless storms, and consumed
    by fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unusual rains'; the Greek literally speaks of 'strange/foreign rains,'
      emphasizing extraordinary weather sent in judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'inescapable storms' for 'relentless storms'; the adjective suggests
      something that cannot be turned aside or refused.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρνούμενοι
  chosen: they refused
  alternatives:
  - denying
  - rejecting
  lexicon: BDAG
  rationale: The participle of ἀρνέομαι here governs the infinitive εἰδέναι and expresses
    willful refusal rather than mere verbal denial. 'Refused' captures the active
    resistance implied in context.
- source_word: εἰδέναι
  chosen: to know
  alternatives:
  - to acknowledge
  lexicon: BDAG
  rationale: The infinitive means 'to know'; in context it includes recognition of
    God, but 'to know' preserves the direct lexical sense without over-interpreting.
- source_word: ἀσεβεῖς
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: BDAG
  rationale: '''Ungodly'' best reflects impiety toward God, which is central in this
    verse. ''Wicked'' is broader and less specifically theological.'
- source_word: ἐν ἰσχύι βραχίονός σου
  chosen: by the strength of your arm
  alternatives:
  - with the might of your arm
  - by your mighty arm
  lexicon: LEH
  rationale: The phrase is instrumental and echoes biblical imagery of divine power.
    'By the strength of your arm' preserves both nouns rather than compressing them
    too much.
- source_word: ἐμαστιγώθησαν
  chosen: were scourged
  alternatives:
  - were flogged
  - were punished
  lexicon: BDAG
  rationale: The passive of μαστιγόω literally denotes whipping/scourging, but in
    divine-judgment context it can extend metaphorically to severe affliction. 'Were
    scourged' preserves the vivid punitive force.
- source_word: ξένοις ὑετοῖς
  chosen: strange rains
  alternatives:
  - foreign rains
  - unusual rains
  lexicon: LEH
  rationale: ξένοις here means alien or extraordinary. 'Strange rains' is idiomatic
    English and preserves the sense of unnatural, extraordinary weather sent in judgment.
- source_word: χαλάζαις
  chosen: hail
  alternatives:
  - hailstorms
  lexicon: LEH
  rationale: The dative plural is naturally rendered by the mass noun 'hail' in English.
- source_word: ὄμβροις
  chosen: storms
  alternatives:
  - downpours
  - rainstorms
  lexicon: LEH
  rationale: While ὄμβρος can denote heavy rain or downpour, 'storms' works well in
    coordination with rains and hail and fits the persecuting imagery of διωκόμενοι.
- source_word: ἀπαραιτήτοις
  chosen: relentless
  alternatives:
  - inescapable
  - unavoidable
  - unappeasable
  lexicon: LEH
  rationale: The adjective conveys something that cannot be turned aside or refused.
    'Relentless' communicates the unstoppable force of the judgment in natural English.
- source_word: διωκόμενοι
  chosen: pursued
  alternatives:
  - driven
  - hounded
  lexicon: BDAG
  rationale: The participle literally means 'being pursued.' This preserves the image
    of the weather judgments chasing them down.
- source_word: πυρὶ καταναλισκόμενοι
  chosen: consumed by fire
  alternatives:
  - devoured by fire
  - burned up by fire
  lexicon: BDAG
  rationale: The phrase denotes destruction by fire. 'Consumed by fire' is both literal
    and elevated without becoming archaic.
