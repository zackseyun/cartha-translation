theological_decisions:
- issue: Nature of 'knowing' God in εἰδέναι
  chosen_reading: Retained 'to know you' without expanding to 'acknowledge' or 'recognize
    you as God' in the main text.
  alternative_readings:
  - to acknowledge you
  - to recognize you
  rationale: The verse condemns impious refusal of God, but the Greek says 'to know
    you.' Preserving the simpler wording avoids importing a fuller theological paraphrase
    while allowing readers to infer covenantal recognition from context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Metaphorical force of scourging language
  chosen_reading: Rendered ἐμαστιγώθησαν as 'were scourged' even though the punishment
    is executed through weather and fire.
  alternative_readings:
  - were punished
  - were afflicted
  rationale: The text intentionally uses vivid punitive imagery. A softer rendering
    would flatten the severity of divine judgment.
  doctrine_reference: Translation philosophy §1, §6
