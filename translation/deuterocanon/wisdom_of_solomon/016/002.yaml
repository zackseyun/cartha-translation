theological_decisions:
- issue: Divine action contrasted with punishment on others
  chosen_reading: 'The verse is rendered to emphasize contrast: instead of the punishment
    just mentioned, God did good to his own people by providing food.'
  alternative_readings:
  - The phrase could be taken more loosely as 'in response to that punishment' rather
    than strict substitution.
  rationale: The immediate syntax with ἀνθʼ ἧς most naturally marks contrast/substitution.
    This preserves the theological contrast in the passage without overstating it
    beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it
