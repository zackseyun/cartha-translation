translation:
  text: 'Instead of this punishment, you benefited your people: to satisfy a strange
    craving of appetite, you prepared quail as food for them;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In place of that punishment, you did good to your people.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for a strange craving of appetite, a taste'; the Greek is compressed
      and emphasizes an unusual desire for food.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθʼ ἧς κολάσεως
  chosen: Instead of this punishment
  alternatives:
  - In place of this punishment
  - Rather than this punishment
  lexicon: LSJ
  rationale: The phrase contrasts what happened to God's people with the punishment
    inflicted on others in the surrounding context. ἀντί with the genitive expresses
    substitution or contrast, and κολάσεως is naturally 'punishment' rather than a
    softer term.
- source_word: εὐεργετήσας
  chosen: you benefited
  alternatives:
  - you did good to
  - you treated kindly
  - you blessed
  lexicon: LSJ
  rationale: The participle denotes doing good or conferring benefit. 'Benefited'
    preserves the concrete sense without importing covenantal or liturgical overtones
    that 'blessed' might add.
- source_word: τὸν λαόν σου
  chosen: your people
  alternatives:
  - your people-group
  lexicon: LSJ
  rationale: Standard rendering of λαός in biblical context; it naturally refers to
    God's covenant people here.
- source_word: εἰς ἐπιθυμίαν ὀρέξεως
  chosen: to satisfy a ... craving of appetite
  alternatives:
  - for the desire of appetite
  - for an appetite's craving
  - for craving in their appetite
  lexicon: LSJ
  rationale: 'The expression is somewhat pleonastic and emphatic, combining desire/craving
    terms. Rendering it as ''craving of appetite'' preserves the intensification better
    than flattening to simply ''desire.'' The infinitive-like force of εἰς is represented
    idiomatically as purpose: ''to satisfy.'''
- source_word: ξένην
  chosen: strange
  alternatives:
  - foreign
  - unusual
  lexicon: LSJ
  rationale: ξένην modifies the craving or desired taste as something out of the ordinary.
    'Strange' fits the context of an unusual food-desire better than the more literal
    but less idiomatic 'foreign.'
- source_word: γεῦσιν
  chosen: taste
  alternatives:
  - flavor
  - a tasting
  lexicon: LSJ
  rationale: Although the transmitted text is compressed, γεῦσιν points to taste or
    experience of flavor. In English, the sense is best carried by linking the unusual
    craving to a desired 'taste.'
- source_word: τροφὴν ἡτοίμασας
  chosen: you prepared ... as food
  alternatives:
  - you made ready ... for food
  - you prepared food
  lexicon: LSJ
  rationale: ἡτοίμασας is straightforwardly 'you prepared,' and τροφή is 'food.' Splitting
    the phrase around the object in English yields a natural sentence while preserving
    the source meaning.
- source_word: ὀρτυγομήτραν
  chosen: quail
  alternatives:
  - a quail-bird
  - quail meat
  lexicon: LSJ
  rationale: The compound term denotes quail. English normally uses the collective
    singular or mass sense 'quail' for the food provided in the wilderness tradition.
