theological_decisions:
- issue: Nature of τῶν λογίων σου
  chosen_reading: your sayings
  alternative_readings:
  - your oracles
  - your words
  rationale: The phrase refers to God's utterances in the wilderness-judgment context.
    'Your sayings' preserves divine speech while avoiding a technical term that may
    over-specify prophetic-oracular form.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
- issue: Sense of ἀπερίσπαστοι γένωνται τῆς σῆς εὐεργεσίας
  chosen_reading: they might not become cut off from your beneficence
  alternative_readings:
  - they might not be distracted from your kindness
  - they might not be separated from your beneficence
  rationale: The clause warns against a state in which deep forgetfulness results
    in loss of connection to God's beneficent help. The chosen rendering foregrounds
    that consequence. Because the adjective's nuance is somewhat debated, alternatives
    are preserved in a footnote rather than silently excluded.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
