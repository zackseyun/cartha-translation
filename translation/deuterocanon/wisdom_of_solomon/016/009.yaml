translation:
  text: For those whom the bites of locusts and flies killed, no remedy was found
    for their life, because they were worthy to be punished by such things;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no remedy was found for their soul.' Here 'life' is preferred because
      the context is bodily death from the creatures' bites.
    reason: lexical_alternative
  - marker: b
    text: Or 'by such creatures'; the Greek says more broadly 'by such things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δήγματα
  chosen: bites
  alternatives:
  - stings
  lexicon: LSJ
  rationale: δήγματα denotes bites or stings inflicted by creatures. 'Bites' fits
    the paired insects here in straightforward modern English without over-specifying
    a mechanism.
- source_word: ἀκρίδων
  chosen: locusts
  alternatives:
  - grasshoppers
  lexicon: LSJ
  rationale: ἀκρίς commonly means locust. In plague context 'locusts' is the more
    natural and biblically recognizable rendering.
- source_word: μυιῶν
  chosen: flies
  lexicon: LSJ
  rationale: The ordinary sense is 'flies'; no reason to narrow further.
- source_word: ἀπέκτεινεν
  chosen: killed
  alternatives:
  - destroyed
  - put to death
  lexicon: LSJ
  rationale: The verb directly expresses causing death. 'Killed' is the clearest idiomatic
    English equivalent.
- source_word: οὐχ εὑρέθη ἴαμα
  chosen: no healing was found
  alternatives:
  - no remedy was found
  - no cure was found
  lexicon: LSJ
  rationale: ἴαμα is healing/remedy. 'No healing was found' preserves the passive
    construction and keeps the medical sense, while remaining readable.
- source_word: τῇ ψυχῇ αὐτῶν
  chosen: for their life
  alternatives:
  - for their soul
  - for them
  lexicon: LSJ
  rationale: In this context ψυχή refers to life rather than the immaterial soul,
    since the issue is death from bites. 'For their life' preserves the singular collective
    sense without importing later soul-body dualism.
- source_word: ἄξιοι ἦσαν
  chosen: they were worthy
  alternatives:
  - they deserved
  lexicon: LSJ
  rationale: The phrase states fittingness/desert. 'They were worthy' stays closer
    to the Greek wording, though in context it conveys deserved punishment.
- source_word: ὑπὸ τοιούτων
  chosen: by such things
  alternatives:
  - by such creatures
  - by such means
  lexicon: LSJ
  rationale: The Greek is intentionally broad. 'By such things' preserves that breadth
    and echoes the instrumental force without over-interpreting the referent.
- source_word: κολασθῆναι
  chosen: to be punished
  alternatives:
  - to be chastised
  - to be tormented
  lexicon: LSJ
  rationale: κολάζω here denotes punitive judgment. 'To be punished' is the most direct
    and natural rendering.
