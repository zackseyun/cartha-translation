theological_decisions:
- issue: Meaning of ψυχή in a death-and-healing context
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The verse concerns physical death from insect bites and the absence of
    a remedy. Rendering ψυχή as 'life' best matches the immediate context and avoids
    suggesting a statement about the soul's metaphysical condition.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Moral force of ἄξιοι ἦσαν ... κολασθῆναι
  chosen_reading: because they were worthy to be punished by such things
  alternative_readings:
  - because they deserved to be punished by such creatures
  rationale: The text explicitly frames the plague as deserved punishment. The translation
    preserves that judicial-theological claim without expanding it beyond the verse.
  doctrine_reference: Original-language primacy over translation tradition.
