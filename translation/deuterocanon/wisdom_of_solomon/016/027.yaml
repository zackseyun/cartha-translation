translation:
  text: For what was not destroyed by fire simply melted when warmed by a brief ray
    of the sun,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by a slight ray of the sun.' The Greek adjective can emphasize smallness
      or slightness rather than duration alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ... μὴ φθειρόμενον
  chosen: what was not destroyed
  alternatives:
  - the thing not being destroyed
  - what was not corrupted
  lexicon: BDAG
  rationale: The articular participle functions substantivally, referring back to
    the miraculous food in context. φθείρω here is best rendered 'destroy' rather
    than 'corrupt,' since the contrast is with physical effects of fire and melting.
- source_word: ὑπὸ πυρὸς
  chosen: by fire
  alternatives:
  - under fire
  - from fire
  lexicon: BDAG
  rationale: ὑπό with the genitive marks agency/instrument here; 'by fire' is the
    most natural English rendering in this physical context.
- source_word: ἁπλῶς
  chosen: simply
  alternatives:
  - plainly
  - just
  lexicon: LSJ
  rationale: 'ἁπλῶς here intensifies the contrast: despite not being destroyed by
    fire, it nevertheless melted merely from slight solar warmth. ''Simply'' preserves
    that rhetorical force without sounding colloquial.'
- source_word: ὑπὸ βραχείας ἀκτῖνος ἡλίου
  chosen: by a brief ray of the sun
  alternatives:
  - by a slight ray of the sun
  - by a small beam of the sun
  lexicon: LSJ
  rationale: βραχείας conveys smallness/shortness/slightness. In context the sense
    is a slight or brief exposure to sunlight. 'Brief ray of the sun' keeps the imagery
    and the contrast with fire.
- source_word: θερμαινόμενον
  chosen: when warmed
  alternatives:
  - being heated
  - when heated
  lexicon: BDAG
  rationale: A participial construction best rendered temporally in English. 'Warmed'
    fits the modest degree implied by βραχείας better than the stronger 'heated.'
- source_word: ἐτήκετο
  chosen: melted
  alternatives:
  - was melting
  - dissolved
  lexicon: BDAG
  rationale: τήκω in the middle/passive here denotes melting. The imperfect can be
    rendered with simple past in English for readability, while still conveying the
    event described.
