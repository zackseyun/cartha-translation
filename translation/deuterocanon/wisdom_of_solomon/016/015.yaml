translation:
  text: But it is impossible to escape your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to flee from your hand.' The Greek keeps the concrete image of God's
      hand as a figure for his power and reach.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὴν ... σὴν χεῖρα
  chosen: your hand
  alternatives:
  - your power
  - your grasp
  lexicon: LSJ
  rationale: χείρ literally means 'hand.' In biblical Greek it often carries the extended
    sense of power or control, but the concrete image is important and natural in
    English here. 'Your hand' preserves both the literal wording and the idiomatic
    sense of inescapable divine power.
- source_word: φυγεῖν
  chosen: to escape
  alternatives:
  - to flee
  - to run away from
  lexicon: LSJ
  rationale: φυγεῖν can mean 'to flee,' but with an object in this construction the
    sense is effectively 'to escape from.' 'Escape' is the most idiomatic English
    rendering and best fits the statement about the impossibility of evading God's
    hand.
- source_word: ἀδύνατόν ἐστιν
  chosen: it is impossible
  alternatives:
  - it is not possible
  - it cannot be done
  lexicon: LSJ
  rationale: The impersonal expression is straightforwardly rendered 'it is impossible.'
    This is both accurate and clear modern English.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: LSJ
  rationale: δέ here marks contrast with the preceding thought. 'But' best signals
    the adversative force in context.
