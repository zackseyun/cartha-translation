theological_decisions:
- issue: Moral force of ἄδικον modifying γῆς γέννημα
  chosen_reading: the produce is described as 'unrighteous' because it belongs to
    or serves the unjust, not because vegetation is morally agentive
  alternative_readings:
  - '''wicked crop'' as a more idiomatic but interpretive rendering'
  - '''unjust offspring of the earth'' as a more literal rendering'
  rationale: The Greek directly attributes ἄδικον to γέννημα. In English, a fully
    literal rendering can sound as though the produce itself is morally culpable.
    'Unrighteous produce of the earth' preserves the source wording while allowing
    the wisdom-context association with judgment on the ungodly.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
