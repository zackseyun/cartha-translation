translation:
  text: But at times, even in the midst of water, fire burns more fiercely than its
    own power, so that it may destroy the unrighteous produce of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'beyond the power of fire'—that is, fire acts beyond its normal strength
      even while surrounded by water.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the unrighteous produce/offspring of the earth.' The phrase
      likely refers to the earth's yield as connected with the unrighteous.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποτὲ δὲ
  chosen: But at times
  alternatives:
  - and at one time
  - sometimes
  lexicon: LSJ
  rationale: Marks a contrastive development in the sequence of examples while conveying
    the adverbial sense of occasional occurrence.
- source_word: μεταξὺ ὕδατος
  chosen: in the midst of water
  alternatives:
  - among water
  - amid water
  lexicon: LSJ
  rationale: Retains the vivid paradox of fire operating within water; 'in the midst
    of' is natural English and preserves the locative force.
- source_word: ὑπὲρ τὴν πυρὸς δύναμιν
  chosen: more fiercely than its own power
  alternatives:
  - beyond the power of fire
  - beyond fire's normal strength
  lexicon: LSJ
  rationale: ὑπέρ with the accusative expresses excess or surpassing. The phrase indicates
    fire acting beyond its ordinary capacity. 'More fiercely than its own power' keeps
    the comparative force while reading idiomatically in English.
- source_word: φλέγει
  chosen: fire burns
  alternatives:
  - it burns
  - it blazes
  lexicon: LSJ
  rationale: The verb means 'burns/blazes.' Supplying 'fire' in English clarifies
    the implied subject from context without changing the sense.
- source_word: ἵνα
  chosen: so that it may
  alternatives:
  - in order that it might
  - to
  lexicon: LSJ
  rationale: Preserves the clause of purpose/result in readable modern English.
- source_word: ἄδικον
  chosen: unrighteous
  alternatives:
  - unjust
  - wicked
  lexicon: LSJ
  rationale: ἄδικος can mean unjust or unrighteous. 'Unrighteous' better preserves
    the moral-religious dimension in this wisdom context.
- source_word: γῆς γέννημα
  chosen: produce of the earth
  alternatives:
  - offspring of the earth
  - earth's produce
  - what the earth brings forth
  lexicon: LSJ
  rationale: γέννημα denotes that which is produced or brought forth. In context of
    destructive judgment on crops/earthly yield, 'produce of the earth' is the clearest
    idiomatic rendering.
- source_word: διαφθείρῃ
  chosen: destroy
  alternatives:
  - ruin
  - corrupt
  - consume
  lexicon: LSJ
  rationale: The verb here denotes causing ruin or destruction. 'Destroy' fits the
    judgment context and the likely reference to the devastation of produce.
