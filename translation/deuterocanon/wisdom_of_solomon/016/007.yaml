theological_decisions:
- issue: Causal contrast between the visible sign and God
  chosen_reading: The visible object was not itself the means of salvation; God was.
  alternative_readings:
  - The object functioned instrumentally as a means through which God saved
  rationale: The Greek explicitly contrasts οὐ διὰ τὸ θεωρούμενον ... ἀλλὰ διὰ σέ.
    The translation preserves that the sign was not the ultimate saving cause, while
    not denying the broader narrative role of the sign.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve
    it
- issue: Scope of πάντων in the divine title
  chosen_reading: the Savior of all
  alternative_readings:
  - the Savior of everyone
  - the Savior of all things
  rationale: The Greek leaves the scope broad. 'Of all' preserves the comprehensive
    claim without importing a more specific doctrinal conclusion about universal salvation
    or restricting it to humanity alone.
  doctrine_reference: DOCTRINE.md § Original-language primacy over translation tradition
