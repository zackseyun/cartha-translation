translation:
  text: For the one who turned back was saved not by what was being looked at, but
    by you, the Savior of all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the one who turned around' or 'the one who returned.' The Greek participle
      emphasizes the act of turning toward the appointed sign.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'not through the thing being looked at, but through you.' The
      verse stresses that the visible object itself did not save; God did.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιστραφεὶς
  chosen: the one who turned back
  alternatives:
  - the one who turned
  - the one who turned around
  - the one who returned
  lexicon: BDAG
  rationale: Aorist passive participle of ἐπιστρέφω, here functioning substantivally.
    In context it refers to the person who turned toward the appointed sign. 'Turned
    back' preserves the directional sense without overinterpreting it as full 'repentance'
    or merely physical 'looked.'
- source_word: θεωρούμενον
  chosen: what was being looked at
  alternatives:
  - the thing seen
  - what was visible
  - the object beheld
  lexicon: BDAG
  rationale: Present passive participle of θεωρέω used substantivally. The point is
    that the visible object itself was not the saving cause. 'What was being looked
    at' makes the passive force clear and preserves the contrast with God as the true
    agent.
- source_word: ἐσώζετο
  chosen: was saved
  alternatives:
  - was being saved
  - was delivered
  lexicon: BDAG
  rationale: Imperfect passive of σῴζω. 'Was saved' is idiomatic in English and fits
    the gnomic explanatory force here; 'delivered' is possible, but 'saved' better
    matches the theological contrast with God as σωτήρ.
- source_word: σωτῆρα
  chosen: Savior
  alternatives:
  - deliverer
  - rescuer
  lexicon: BDAG
  rationale: The title names God as the true source of salvation. 'Savior' is the
    most direct and theologically weighty equivalent in English; 'deliverer' would
    be possible but weaker in this context.
- source_word: πάντων
  chosen: of all
  alternatives:
  - of everyone
  - of all things
  lexicon: BDAG
  rationale: Genitive plural with broad scope. In context it most naturally means
    'of all' in a comprehensive sense, without narrowing the referent beyond what
    the Greek states.
