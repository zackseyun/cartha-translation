translation:
  text: For it was necessary that unavoidable want should come upon those who tyrannized,
    but to these only that it should be shown how their enemies were being tormented.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inescapable deprivation' for 'unavoidable want.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the tyrants' instead of 'those who tyrannized'; the Greek uses a form
      with verbal force, highlighting their oppressive action.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδει
  chosen: it was necessary
  alternatives:
  - it had to be
  - it was fitting
  lexicon: LSJ
  rationale: Impersonal ἔδει expresses necessity or what had to happen. 'It was necessary'
    preserves the force without overinterpreting as moral fitness alone.
- source_word: ἀπαραίτητον
  chosen: unavoidable
  alternatives:
  - inescapable
  - inevitable
  - irremediable
  lexicon: LSJ
  rationale: The adjective modifies ἔνδειαν and conveys something that cannot be averted
    or refused. 'Unavoidable' is natural English and keeps the sense of inescapability.
- source_word: ἔνδειαν
  chosen: want
  alternatives:
  - need
  - lack
  - privation
  lexicon: LSJ
  rationale: In context of the plague of creatures and contrasting judgments, the
    term denotes deprivation or lack, especially of necessities. 'Want' is concise
    and idiomatic, though older in tone; it best captures severe lack without narrowing
    too quickly to 'hunger'.
- source_word: ἐπελθεῖν
  chosen: should come upon
  alternatives:
  - to come upon
  - to overtake
  - to fall upon
  lexicon: LSJ
  rationale: The infinitive with ἔδει expresses what was to happen. 'Should come upon'
    fits the English syntax after 'it was necessary' and preserves the sense of an
    affliction overtaking them.
- source_word: τυραννοῦσιν
  chosen: those who tyrannized
  alternatives:
  - the tyrants
  - those acting as tyrants
  - the oppressors
  lexicon: LSJ
  rationale: The participial/dative form identifies the Egyptians as exercising tyrannical
    oppression. 'Those who tyrannized' preserves the verbal force better than the
    static noun 'tyrants'.
- source_word: τούτοις δὲ μόνον
  chosen: but to these only
  alternatives:
  - but for these alone
  - but to these merely
  lexicon: LSJ
  rationale: The contrast is between the oppressors and God's people. 'To these only'
    keeps the dative construction and the restrictive μόνον.
- source_word: δειχθῆναι
  chosen: that it should be shown
  alternatives:
  - to be shown
  - that they should see
  lexicon: LSJ
  rationale: 'Passive infinitive: the point is not merely that they saw, but that
    a demonstration was made to them. ''That it should be shown'' preserves the passive
    and the didactic nuance.'
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  - that
  lexicon: LSJ
  rationale: 'Introduces the content of what was shown: the manner or fact of the
    enemies'' suffering. ''How'' is the most direct rendering.'
- source_word: ἐβασανίζοντο
  chosen: were being tormented
  alternatives:
  - were being afflicted
  - were being tortured
  - were in agony
  lexicon: LSJ
  rationale: βασανίζω can denote severe torment or painful affliction. 'Were being
    tormented' preserves the intensity without implying a narrower modern image of
    judicial torture.
