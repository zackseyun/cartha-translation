theological_decisions:
- issue: Contrast in divine judgment between oppressors and Israel
  chosen_reading: The verse states that severe deprivation necessarily came upon the
    tyrannizing enemies, whereas God's people were only shown the punishment of their
    enemies.
  alternative_readings:
  - The second clause could be taken more dynamically as 'these only had to see how
    their enemies were punished.'
  rationale: 'The Greek contrast τούτοις δὲ μόνον with passive δειχθῆναι emphasizes
    differential treatment: one group suffers the judgment directly; the other receives
    a demonstration of it. The translation preserves that asymmetry without expanding
    into doctrinal commentary.'
  doctrine_reference: Preserve theological tension rather than resolve it
