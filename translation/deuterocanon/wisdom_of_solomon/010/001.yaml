id: WIS.10.1
reference: Wisdom of Solomon 10:1
source:
  edition: lxx-swete-1909
  text: Αὕτη πρωτόπλαστον πατέρα κόσμου μόνον κτισθέντα διεφύλαξεν, καὶ ἐξείλατο αὐτὸν
    ἐκ παραπτώματος ἰδίου,
  language: Greek
  pages:
  - 637
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: She guarded the first-formed father of the world, when he alone had been created,
    and she delivered him from his own transgression,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the first human, Adam.
    reason: cross_reference
  - marker: b
    text: Or 'from his own trespass'; alternatively, 'from his own fall,' though 'fall'
      is more interpretive than the Greek wording itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὕτη
  chosen: She
  alternatives:
  - This one
  - Wisdom
  lexicon: LSJ
  rationale: The feminine demonstrative refers back to personified Wisdom from the
    preceding context/chapter division. English 'She' preserves the anaphoric and
    personified force without redundantly repeating 'Wisdom' in the verse itself.
- source_word: πρωτόπλαστον
  chosen: first-formed
  alternatives:
  - first-created
  - formed first
  lexicon: LSJ
  rationale: A compound meaning 'first-formed' or 'first-molded,' traditionally used
    of Adam. 'First-formed' preserves the imagery of formation and the lexical compactness
    better than the more interpretive 'first-created'.
- source_word: πατέρα κόσμου
  chosen: father of the world
  alternatives:
  - ancestor of the world
  - father of humanity
  lexicon: LSJ
  rationale: A fairly literal rendering of the genitive phrase. It refers to Adam
    as progenitor of the human world/order. 'Father of the world' keeps the elevated
    diction of the Greek; more interpretive expansions are possible but go beyond
    the wording.
- source_word: μόνον
  chosen: alone
  alternatives:
  - only
  - by himself
  lexicon: LSJ
  rationale: Placed with the participial phrase, it indicates Adam's solitary state
    at creation. 'Alone' reads naturally in English and captures the sense better
    than the bare adverb 'only'.
- source_word: κτισθέντα
  chosen: had been created
  alternatives:
  - having been created
  - was created
  lexicon: LSJ
  rationale: 'The aorist passive participle is rendered with an English pluperfect-like
    participial sense to fit the temporal flow: Wisdom guarded him in the state of
    being the one who alone had been created.'
- source_word: διεφύλαξεν
  chosen: guarded
  alternatives:
  - preserved
  - kept safe
  lexicon: LSJ
  rationale: The verb conveys careful preservation/protection. 'Guarded' is concise
    and personal, fitting the personified action of Wisdom.
- source_word: ἐξείλατο
  chosen: delivered
  alternatives:
  - rescued
  - drew out
  lexicon: LSJ
  rationale: The middle verb commonly means to deliver or rescue. 'Delivered' preserves
    the elevated register and avoids over-specifying the manner.
- source_word: παραπτώματος
  chosen: transgression
  alternatives:
  - trespass
  - fall
  - offense
  lexicon: LSJ
  rationale: The noun denotes a false step or transgression. 'Transgression' is clear,
    morally weighty, and less interpretively loaded here than 'fall,' which could
    import later doctrinal shorthand.
- source_word: ἰδίου
  chosen: his own
  alternatives:
  - personal
  - of his own
  lexicon: LSJ
  rationale: The adjective emphasizes that the transgression belonged to him himself.
    'His own' is the most natural English equivalent.
