theological_decisions:
- issue: Identification of the 'first-formed father of the world'
  chosen_reading: Adam is in view, but the main text leaves the identification implicit
    as in the Greek.
  alternative_readings:
  - Explicitly naming Adam in the translation
  rationale: The Greek describes Adam without naming him. Keeping the description
    preserves the literary style and avoids adding a proper name not present in the
    source, while the referent remains clear from the wording and context.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source warrants.'
- issue: Rendering of παραπτώματος
  chosen_reading: transgression
  alternative_readings:
  - fall
  rationale: Although the verse alludes to Adam's sin, 'fall' would import a later
    theological label not explicitly used by the Greek noun. 'Transgression' preserves
    the moral sense without over-resolving doctrinal associations.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
