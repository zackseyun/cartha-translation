theological_decisions:
- issue: Personification of σοφία
  chosen_reading: Rendered as 'wisdom' without capitalization in the main text
  alternative_readings:
  - Rendered as 'Wisdom' to emphasize personification
  rationale: The verse clearly presents wisdom as an acting agent, consistent with
    the book's personification. English capitalization, however, can over-specify
    interpretation. Lowercase keeps the lexical meaning while allowing the literary
    personification to remain evident from the syntax.
