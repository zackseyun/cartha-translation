translation:
  text: For wisdom opened the mouths of the mute, and made the tongues of infants
    speak clearly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mouths of the deaf,' since the Greek word can refer to those unable
      to hear or unable to speak; here 'mute' fits the speech context best.
    reason: lexical_alternative
  - marker: b
    text: Or 'made the tongues of infants articulate' / 'distinct.' The Greek describes
      speech made clear.
    reason: lexical_alternative
  - marker: c
    text: The subject 'wisdom' is personified throughout this section; some translations
      capitalize it as 'Wisdom.'
    reason: alternative_reading
lexical_decisions:
- source_word: σοφία
  chosen: wisdom
  alternatives:
  - Wisdom
  lexicon: LSJ
  rationale: The noun can be rendered either as the abstract 'wisdom' or personified
    'Wisdom.' In this context the book frequently personifies wisdom, but the Greek
    lacks an article-based capitalization signal in English. Lowercase preserves the
    lexical sense while still allowing readers to hear the personification from context.
- source_word: ἤνοιξεν
  chosen: opened
  alternatives:
  - opened up
  lexicon: LSJ
  rationale: A straightforward past-tense rendering of ἀνοίγω. 'Opened' preserves
    the concrete metaphor of enabling speech.
- source_word: στόμα κωφῶν
  chosen: the mouths of the mute
  alternatives:
  - the mouths of the deaf
  - a mute mouth
  lexicon: LSJ
  rationale: Although κωφός can denote 'deaf' or 'dumb/mute,' the immediate context
    is speech ('mouths' and then 'tongues'), so 'mute' best fits the sense of inability
    to speak rather than inability to hear.
- source_word: γλώσσας
  chosen: the tongues
  alternatives:
  - the languages
  - the speech
  lexicon: LSJ
  rationale: Here γλῶσσα refers literally to tongues as organs of speech, in parallel
    with 'mouths.' 'Tongues' preserves the bodily imagery.
- source_word: νηπίων
  chosen: of infants
  alternatives:
  - of little children
  - of babes
  lexicon: LSJ
  rationale: νήπιος commonly means infant or very young child, often with the nuance
    of one not yet speaking fully. 'Infants' best matches the image of wisdom enabling
    the speechless or inarticulate to speak.
- source_word: ἔθηκεν τρανάς
  chosen: made ... speak clearly
  alternatives:
  - made ... distinct
  - made ... eloquent
  - made ... plain
  lexicon: LSJ
  rationale: τρανός means clear, distinct, plain, or articulate. Because English does
    not naturally say 'made tongues clear' in this context, 'made the tongues of infants
    speak clearly' expresses the predicate idiomatically while preserving the sense
    of articulate speech.
