translation:
  text: For by passing wisdom by, they were harmed not only by not knowing what is
    good, but they also left behind for life a memorial of their folly, so that in
    the things in which they went astray they might not even be able to escape notice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the world of human life'; the Greek βίος may refer broadly to life
      among the living, not only to an individual's life.
    reason: lexical_alternative
lexical_decisions:
- source_word: παροδεύσαντες
  chosen: by passing ... by
  alternatives:
  - having passed by
  - having neglected
  - having disregarded
  lexicon: BDAG
  rationale: The participle literally suggests going past or passing by. In context
    it conveys neglect or disregard of wisdom. 'Passing wisdom by' preserves the metaphor
    while remaining intelligible in English.
- source_word: ἐβλάβησαν
  chosen: they were harmed
  alternatives:
  - they were injured
  - they suffered loss
  lexicon: BDAG
  rationale: The passive indicates damage or harm coming upon them. 'Were harmed'
    is natural English and broad enough to include moral and practical ruin.
- source_word: τοῦ μὴ γνῶναι τὰ καλά
  chosen: by not knowing what is good
  alternatives:
  - through not knowing the good things
  - in not knowing what is noble
  lexicon: BDAG
  rationale: The genitive articular infinitive expresses the content or respect in
    which they were harmed. τὰ καλά can mean good, noble, or right things. 'What is
    good' is the clearest broad rendering here.
- source_word: τῆς ἀφροσύνης
  chosen: their folly
  alternatives:
  - foolishness
  - senselessness
  lexicon: BDAG
  rationale: ἀφροσύνη denotes lack of sense or folly. 'Their folly' fits the moral
    tone and links the memorial specifically to their own conduct.
- source_word: ἀπέλιπον
  chosen: they left behind
  alternatives:
  - they left
  - they bequeathed
  lexicon: BDAG
  rationale: The verb means to leave behind. This wording preserves the sense that
    their actions produced an enduring reminder.
- source_word: τῷ βίῳ
  chosen: for life
  alternatives:
  - to life
  - for the world
  - for human life
  lexicon: BDAG
  rationale: βίος can mean life in the sense of human life or the world of living
    people. 'For life' is somewhat literal and conveys that the memorial remains within
    human existence; the broader sense is preserved in a footnote.
- source_word: μνημόσυνον
  chosen: a memorial
  alternatives:
  - a reminder
  - a remembrance
  lexicon: BDAG
  rationale: The noun denotes something that serves as a remembrance. 'Memorial' best
    captures an enduring public reminder.
- source_word: ἔσφαλησαν
  chosen: they went astray
  alternatives:
  - they erred
  - they stumbled
  - they failed
  lexicon: BDAG
  rationale: The verb here refers to error or going wrong. 'Went astray' reflects
    moral deviation rather than mere mistake.
- source_word: μηδὲ λαθεῖν δυνηθῶσιν
  chosen: they might not even be able to escape notice
  alternatives:
  - they might not even be able to remain hidden
  - they might not even be able to go unnoticed
  lexicon: BDAG
  rationale: λανθάνω in this construction means to escape notice or remain hidden.
    The clause states that their errors became so memorialized that they could not
    go unnoticed in the very matters where they failed.
