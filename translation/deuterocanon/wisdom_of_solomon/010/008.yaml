reference: Wisdom of Solomon 10:8
source:
  edition: lxx-swete-1909
  text: σοφίαν γὰρ παροδεύσαντες οὐ μόνον ἐβλάβησαν τοῦ μὴ γνῶναι τὰ καλά, ἀλλὰ καὶ
    τῆς ἀφροσύνης ἀπέλιπον τῷ βίῳ μνημόσυνον, ἵνα ἐν οἷς ἔσφαλησαν μηδὲ λαθεῖν δυνηθῶσιν.
  language: Greek
  pages:
