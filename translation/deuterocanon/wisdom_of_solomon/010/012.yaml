theological_decisions:
- issue: Referent of the feminine subject throughout the verse
  chosen_reading: Render the subject as 'She,' referring to personified Wisdom from
    the surrounding context.
  alternative_readings:
  - Repeat 'Wisdom' explicitly in English
  rationale: The Greek verbs have an implied feminine subject carried over from the
    context. Using 'She' preserves the literary personification without over-specifying
    beyond the Greek of this verse itself.
  doctrine_reference: Preserve source-text literary features; do not import more than
    the text states.
- issue: Force of ἐβράβευσεν in relation to ἀγῶνα ἰσχυρόν
  chosen_reading: Wisdom 'awarded him a hard struggle' rather than simply 'gave him
    victory.'
  alternative_readings:
  - '''gave him the prize in a hard contest'''
  - '''granted him victory in a mighty struggle'''
  rationale: The Greek wording emphasizes the contest/prize imagery and the pedagogical
    purpose clause that follows. Rendering it as straightforward victory would resolve
    the metaphor too quickly and obscure the text's claim that the struggle itself
    served to teach him.
  doctrine_reference: Preserve theological tension rather than resolve it.
