translation:
  text: She protected him from enemies, and from those lying in ambush she kept him
    safe; and she awarded him a hard struggle, so that he might know that godliness
    is stronger than everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mighty contest' or 'the prize in a hard struggle.' The Greek uses
      contest-and-prize imagery in saying Wisdom ἐβράβευσεν αὐτῷ.
    reason: lexical_alternative
  - marker: b
    text: Or 'piety.' The Greek εὐσέβεια denotes reverent devotion to God expressed
      in life.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεφύλαξεν
  chosen: protected
  alternatives:
  - guarded
  - preserved
  lexicon: LSJ
  rationale: The verb conveys guarding or preserving from danger. 'Protected' is natural
    modern English and fits the following ἀπό phrase well.
- source_word: ἐχθρῶν
  chosen: enemies
  alternatives:
  - foes
  lexicon: LSJ
  rationale: Standard rendering for hostile persons; no reason to prefer a more literary
    alternative.
- source_word: ἐνεδρευόντων
  chosen: those lying in ambush
  alternatives:
  - ambushers
  - those plotting against him
  lexicon: LSJ
  rationale: The participle denotes people setting an ambush. The fuller phrase preserves
    the concrete imagery better than the compressed 'ambushers.'
- source_word: ἠσφαλίσατο
  chosen: kept him safe
  alternatives:
  - secured him
  - made him safe
  lexicon: LSJ
  rationale: The middle verb here expresses making secure/safe. 'Kept him safe' is
    idiomatic and matches the protective sequence of the verse.
- source_word: ἀγῶνα ἰσχυρὸν
  chosen: a hard struggle
  alternatives:
  - a mighty contest
  - a severe conflict
  - a strong contest
  lexicon: LSJ
  rationale: ἀγών can mean contest, struggle, or conflict; ἰσχυρός intensifies it.
    'Hard struggle' communicates the difficulty without sounding overly athletic or
    archaic, while still allowing the metaphorical breadth of the Greek.
- source_word: ἐβράβευσεν αὐτῷ
  chosen: awarded him
  alternatives:
  - gave him the prize for
  - granted to him
  lexicon: LSJ
  rationale: The verb is related to acting as umpire or awarding a prize. In context
    Wisdom is not merely causing a struggle but assigning/granting it as part of testing
    and vindication. 'Awarded him' preserves the prize/contest nuance better than
    a flat 'gave him.'
- source_word: ἵνα γνῷ
  chosen: so that he might know
  alternatives:
  - that he might learn
  - in order that he might know
  lexicon: LSJ
  rationale: This straightforward purpose clause is best rendered with natural English
    while preserving the intended result.
- source_word: παντὸς δυνατωτέρα
  chosen: stronger than everything
  alternatives:
  - more powerful than all things
  - stronger than anything
  lexicon: LSJ
  rationale: The comparative with genitive expresses superiority over everything.
    'Stronger than everything' is direct and readable.
- source_word: εὐσέβεια
  chosen: godliness
  alternatives:
  - piety
  - reverence
  lexicon: LSJ
  rationale: In Wisdom literature εὐσέβεια denotes reverent devotion expressed in
    right relation to God. 'Godliness' is more accessible than 'piety' while retaining
    theological weight; 'reverence' is too narrow for the ethical-religious breadth.
