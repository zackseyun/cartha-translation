translation:
  text: Because of him, when the earth was being flooded, wisdom again saved it, steering
    the righteous man by means of a cheap piece of wood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through a humble/insignificant piece of wood.' The phrase refers to
      the ark and emphasizes the lowly material means by which wisdom preserved the
      righteous man.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι' ὃν
  chosen: Because of him
  alternatives:
  - through whom
  - on account of whom
  lexicon: LSJ
  rationale: The preposition with the relative pronoun points back to the wicked man
    of the previous verse as the cause of the flood judgment. 'Because of him' expresses
    causal force clearly in English.
- source_word: κατακλυζομένην
  chosen: was being flooded
  alternatives:
  - was being deluged
  - was being overwhelmed by the flood
  lexicon: LSJ
  rationale: The participle denotes the earth undergoing inundation. 'Was being flooded'
    is natural modern English and preserves the ongoing/passive sense.
- source_word: γῆν
  chosen: the earth
  alternatives:
  - the land
  - the world
  lexicon: LSJ
  rationale: In the flood context, γῆ can mean land/earth; 'the earth' best matches
    the broad scope of the judgment in this allusion.
- source_word: πάλιν
  chosen: again
  alternatives:
  - in turn
  - anew
  lexicon: LSJ
  rationale: πάλιν marks a renewed act of preservation after prior destruction or
    threat. 'Again' is the most direct equivalent.
- source_word: διέσωσεν
  chosen: saved it
  alternatives:
  - preserved it safely
  - brought it through safely
  lexicon: LSJ
  rationale: The compound verb emphasizes bringing safely through danger. 'Saved it'
    is concise and idiomatic, with the object referring to the earth/world in the
    sense of preserving life through the flood.
- source_word: σοφία
  chosen: wisdom
  lexicon: LSJ
  rationale: In Wisdom of Solomon, σοφία is personified and active. Lowercase 'wisdom'
    preserves the Greek term without over-interpreting it as a proper name.
- source_word: δι' εὐτελοῦς ξύλου
  chosen: by means of a cheap piece of wood
  alternatives:
  - through a humble piece of wood
  - by means of a slight piece of wood
  - through an insignificant piece of wood
  lexicon: LSJ
  rationale: ξύλον here refers to the ark materially as wood, and εὐτελής stresses
    low worth, smallness, or humble insignificance. 'Cheap piece of wood' is vivid
    and close to the Greek's depreciative force, though not meant to deny the ark's
    practical value.
- source_word: τὸν δίκαιον
  chosen: the righteous man
  alternatives:
  - the just man
  - the righteous one
  lexicon: LSJ
  rationale: This refers to Noah. 'The righteous man' is clear, natural, and preserves
    the masculine singular reference.
- source_word: κυβερνήσασα
  chosen: steering
  alternatives:
  - guiding
  - piloting
  - directing
  lexicon: LSJ
  rationale: The participle is nautical, literally governing or piloting a vessel.
    'Steering' preserves the maritime imagery appropriate to the ark narrative.
