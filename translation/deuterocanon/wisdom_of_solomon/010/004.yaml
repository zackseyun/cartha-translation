theological_decisions:
- issue: Personification of wisdom
  chosen_reading: wisdom is rendered as an active personified agent without capitalization
  alternative_readings:
  - Wisdom as a quasi-proper title
  rationale: The Greek presents σοφία as acting personally throughout the chapter.
    Lowercase retains the literary-theological personification while avoiding importing
    a stronger hypostatic claim than the verse itself states.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referent of 'him' and 'the righteous man'
  chosen_reading: '''him'' refers to the unrighteous man in the previous verse; ''the
    righteous man'' refers to Noah'
  rationale: The verse contrasts the wicked cause of the flood with wisdom's preservation
    of Noah. This is an interpretive identification required for coherent English
    but follows the immediate literary context rather than adding doctrine.
