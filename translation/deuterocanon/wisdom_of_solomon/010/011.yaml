theological_decisions:
- issue: Implicit subject of the verbs παρέστη and ἐπλούτισεν
  chosen_reading: Rendered as 'she' referring to Wisdom from the surrounding context.
  alternative_readings:
  - Left implicit as in Greek
  rationale: Although the Greek clause does not repeat the subject, the broader context
    of Wisdom 10 consistently personifies Wisdom as the acting female subject. English
    requires an explicit subject for clarity, and 'she' best reflects the discourse
    flow without adding new theology.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English'
