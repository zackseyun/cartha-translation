translation:
  text: When others overpowered him in greed, she stood by him and made him rich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When those acting in greed prevailed against him.' The Greek participle
      can be rendered more formally as 'prevailed against.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πλεονεξίᾳ
  chosen: in greed
  alternatives:
  - through greed
  - in covetousness
  - amid greed
  lexicon: BDAG
  rationale: πλεονεξία commonly denotes greed or covetousness. The preposition ἐν
    here is taken instrumentally or circumstantially with the participle phrase, describing
    the sphere or manner in which the opponents acted. 'In greed' is concise and preserves
    the moral coloring without overinterpreting.
- source_word: κατισχυόντων
  chosen: overpowered
  alternatives:
  - prevailed against
  - were stronger than
  - oppressed
  lexicon: BDAG
  rationale: The participle from κατισχύω conveys prevailing over or overpowering.
    'Overpowered' gives a natural English rendering that reflects hostile dominance
    more clearly than the more wooden 'prevailed against.'
- source_word: αὐτὸν
  chosen: him
  rationale: The masculine singular pronoun refers to the male figure in context (Jacob
    in the surrounding narrative). Gender-accurate rendering is appropriate.
- source_word: παρέστη
  chosen: stood by him
  alternatives:
  - came to his aid
  - was present with him
  - stood beside him
  lexicon: BDAG
  rationale: παρίστημι in this context means to stand by, be present to help, or come
    to one's aid. 'Stood by him' preserves the imagery while naturally implying support.
- source_word: ἐπλούτισεν
  chosen: made him rich
  alternatives:
  - enriched him
  - prospered him
  lexicon: BDAG
  rationale: The verb means to make rich or enrich. 'Made him rich' is slightly more
    transparent to modern readers than 'enriched him' while preserving the concrete
    sense of bestowed prosperity.
