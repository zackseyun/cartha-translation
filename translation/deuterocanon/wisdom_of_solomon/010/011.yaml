reference: Wisdom of Solomon 10:11
source:
  edition: lxx-swete-1909
  text: ἐν πλεονεξίᾳ κατισχυόντων αὐτὸν παρέστη, καὶ ἐπλούτισεν αὐτόν·
  language: Greek
  pages:
