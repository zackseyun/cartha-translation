translation:
  text: He brought them across the Red Sea, and led them through abundant water;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through much water.' The Greek phrase is literally 'through abundant/much
      water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διεβίβασεν
  chosen: brought ... across
  alternatives:
  - conveyed across
  - carried across
  - transported across
  lexicon: LSJ
  rationale: The verb denotes causing someone to cross over or conveying across. 'Brought
    ... across' is natural English and preserves the causative sense without sounding
    overly technical.
- source_word: θάλασσαν ἐρυθράν
  chosen: the Red Sea
  alternatives:
  - the red sea
  lexicon: LSJ
  rationale: This is the conventional geographic designation for the body of water
    in the exodus tradition. Capitalization reflects its use as a proper name in English.
- source_word: διήγαγεν
  chosen: led ... through
  alternatives:
  - brought ... through
  - conducted ... through
  lexicon: LSJ
  rationale: The verb means to lead or bring through. 'Led ... through' fits the exodus
    imagery well and distinguishes it from the previous crossing verb while preserving
    the sense of guided passage.
- source_word: διʼ ὕδατος πολλοῦ
  chosen: through abundant water
  alternatives:
  - through much water
  - through great water
  - through many waters
  lexicon: LSJ
  rationale: The singular ὕδατος with πολλοῦ is literally 'much water.' 'Abundant
    water' is idiomatic modern English that preserves the sense of a large mass of
    water without forcing a plural not present in the Greek.
