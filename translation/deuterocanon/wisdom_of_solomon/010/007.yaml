id: WIS.10.7
reference: Wisdom of Solomon 10:7
source:
  edition: lxx-swete-1909
  text: ἧς ἔτι μαρτύριον τῆς πονηρίας καπνιζομένη καθέστηκε χέρσος, καὶ ἀτελέστιοι
    ὥρας καρποφοροῦντα φυτά, ἀπιστούσης ψυχῆς μνημεῖον ἑστηκυῖα στήλη ἁλός.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: whose wickedness still has as its witness a smoking wasteland, plants bearing
    fruit that never ripens, and a pillar of salt standing as a memorial of an unbelieving
    soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'pillar of salt' alludes to Lot's wife in Genesis 19:26, though this
      verse does not name her explicitly.
    reason: cross_reference
  - marker: b
    text: Or 'a memorial of a faithless soul.' The Greek ἀπιστούσης can denote unbelief
      or faithlessness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἧς
  chosen: whose
  alternatives:
  - of which
  - for which
  lexicon: LSJ
  rationale: Genitive feminine relative pronoun referring back to the land/city under
    discussion; 'whose' gives natural English while preserving the genitival link
    to the following witnesses.
- source_word: μαρτύριον
  chosen: witness
  alternatives:
  - testimony
  - evidence
  lexicon: LSJ
  rationale: The noun denotes something that bears witness or serves as evidence.
    'Witness' keeps the personified force of the Greek and fits the singular predicate
    with the following coordinated items.
- source_word: τῆς πονηρίας
  chosen: wickedness
  alternatives:
  - evil
  - depravity
  lexicon: LSJ
  rationale: πονῃρία here refers to moral evil rather than mere misfortune. 'Wickedness'
    captures the ethical sense and suits the judgment context.
- source_word: καπνιζομένη
  chosen: smoking
  alternatives:
  - still smoking
  - smoldering
  lexicon: LSJ
  rationale: Present participle describing the wasteland as emitting smoke. 'Smoking'
    is concise and vivid; the adverb ἔτι already supplies the sense 'still.'
- source_word: καθέστηκε
  chosen: has
  alternatives:
  - stands
  - remains
  lexicon: LSJ
  rationale: 'Perfect form of καθίστημι/καθίσταμαι functioning statively: the land
    ''has/stands as'' a witness. In English, ''has as its witness'' best carries the
    construction with μαρτύριον.'
- source_word: χέρσος
  chosen: wasteland
  alternatives:
  - desert land
  - barren land
  lexicon: LSJ
  rationale: Denotes land left barren or untilled. 'Wasteland' is idiomatic and conveys
    devastation rather than a natural desert.
- source_word: ἀτελέστιοι
  chosen: never ripens
  alternatives:
  - imperfect
  - unfinished
  - unripe
  lexicon: LSJ
  rationale: The adjective means not brought to completion. Applied to fruit, the
    sense is fruit that does not come to full maturity; rendering verbally in English
    communicates the idea clearly.
- source_word: ὥρας
  chosen: in season
  alternatives:
  - at the proper time
  - when ripe
  lexicon: LSJ
  rationale: Genitive of time/quality with καρποφοροῦντα φυτά. 'In season' expresses
    the expected time of ripening and keeps the agricultural image natural in English.
- source_word: καρποφοροῦντα φυτά
  chosen: plants bearing fruit
  alternatives:
  - fruit-bearing plants
  - plants producing fruit
  lexicon: LSJ
  rationale: The participle-noun combination is straightforward; 'plants bearing fruit'
    preserves the order and image while reading smoothly.
- source_word: ἀπιστούσης ψυχῆς
  chosen: of an unbelieving soul
  alternatives:
  - of a faithless soul
  - of a disbelieving person
  lexicon: LSJ
  rationale: The genitive depends on μνημεῖον. ἀπιστέω language here points to refusal
    to believe/trust; 'unbelieving soul' is formally close and preserves the singular
    personification, likely alluding to Lot's wife without naming her.
- source_word: μνημεῖον
  chosen: memorial
  alternatives:
  - monument
  - reminder
  lexicon: LSJ
  rationale: Although often 'tomb' in other contexts, here it denotes a memorializing
    object. 'Memorial' fits the appositional relation to the pillar of salt.
- source_word: ἑστηκυῖα στήλη ἁλός
  chosen: a pillar of salt standing
  alternatives:
  - a standing pillar of salt
  - a salt pillar standing
  lexicon: LSJ
  rationale: Perfect participle ἑστηκυῖα emphasizes the enduring state of the pillar.
    The English keeps both the image and the stative force.
