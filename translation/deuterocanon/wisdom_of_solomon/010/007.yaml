  chosen_reading: Translate descriptively without naming the figure, preserving the
    allusion to Lot's wife.
  alternative_readings:
  - Explicitly identify the figure as Lot's wife in the main text
  rationale: The Greek text itself does not name Lot's wife, though the allusion is
    clear from Genesis tradition. To avoid importing more than the source states,
    the translation keeps the descriptive wording and leaves the identification implicit.
  doctrine_reference: Original-language primacy over translation tradition; Never
    import doctrinal claims the text does not make.
