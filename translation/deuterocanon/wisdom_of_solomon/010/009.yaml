theological_decisions:
- issue: Personification of wisdom
  chosen_reading: Retain feminine personal reference ('her') while translating σοφία
    as 'wisdom' rather than as a proper name.
  alternative_readings:
  - Capitalize as 'Wisdom' to emphasize personification
  - Use impersonal 'it' to treat σοφία as an abstract noun
  rationale: The Greek presents wisdom as personified and active. Using 'her' preserves
    that literary-theological feature, while lowercase 'wisdom' avoids overstating
    the personification into a fixed proper name where the text itself does not explicitly
    do so.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
