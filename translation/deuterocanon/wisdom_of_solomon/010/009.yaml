translation:
  text: But wisdom rescued those who served her from hardships.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delivered them from toils,' 'from troubles,' or 'from pains.' The Greek
      term can cover labor, suffering, or distress more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφία
  chosen: wisdom
  alternatives:
  - Wisdom
  lexicon: BDAG
  rationale: Rendered as the common noun 'wisdom.' Although personified in context
    and referred to with αὐτήν ('her'), the verse does not require capitalization
    in English; the personification is preserved by the pronoun 'her.'
- source_word: θεραπεύσαντας
  chosen: served
  alternatives:
  - attended
  - honored
  - ministered to
  lexicon: BDAG
  rationale: The participle from θεραπεύω can denote service, attendance, or devoted
    care. In this context of personified wisdom, 'served' best captures loyal devotion
    without sounding overly literal or archaic.
- source_word: αὐτὴν
  chosen: her
  alternatives:
  - it
  lexicon: BDAG
  rationale: The feminine pronoun reflects the grammatical and literary personification
    of wisdom in Greek. 'Her' preserves that personification naturally in English.
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: Standard rendering indicating deliverance away from a condition or source.
    'From' is idiomatic and sufficiently precise here.
- source_word: πόνων
  chosen: hardships
  alternatives:
  - toils
  - troubles
  - pains
  - labors
  lexicon: BDAG
  rationale: πόνος can denote toil, pain, or distress. 'Hardships' best fits the broad
    sense of afflictive troubles from which wisdom delivers, without narrowing the
    term merely to physical pain or labor.
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: BDAG
  rationale: The verb conveys deliverance from danger or distress. 'Rescued' is vivid,
    natural English and avoids importing stronger soteriological overtones than the
    immediate context requires.
