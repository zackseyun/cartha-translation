reference: Wisdom of Solomon 10:9
source:
  edition: lxx-swete-1909
  text: σοφία δὲ τοὺς θεραπεύσαντας αὐτὴν ἐκ πόνων ἐρρύσατο.
  language: Greek
  pages:
