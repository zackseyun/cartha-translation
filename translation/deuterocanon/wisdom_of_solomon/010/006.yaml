translation:
  text: She rescued a righteous man when the ungodly were perishing, as he fled the
    fire descending on the Five Cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the confederation of five cities associated with Sodom; the verse
      alludes to Lot's escape.
    reason: cross_reference
  - marker: b
    text: Or "the descending fire"; the Greek describes fire coming down on the Five
      Cities without explicitly stating "from heaven."
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη
  chosen: She
  alternatives:
  - This wisdom
  - Wisdom
  lexicon: LSJ
  rationale: The feminine demonstrative refers back to personified Wisdom in the immediate
    context. Rendering it as "She" preserves the personification already established
    without redundantly repeating "Wisdom" in every verse.
- source_word: δίκαιον
  chosen: a righteous man
  alternatives:
  - the righteous man
  - a just man
  lexicon: LSJ
  rationale: The accusative singular denotes the person rescued, traditionally Lot.
    "Righteous man" best reflects the moral sense of δίκαιος in context. The anarthrous
    form supports an indefinite rendering in English.
- source_word: ἐξαπολλυμένων
  chosen: were perishing
  alternatives:
  - were being destroyed
  - were being wiped out
  lexicon: LSJ
  rationale: The present middle/passive participle conveys the ongoing destruction
    of the ungodly. "Were perishing" preserves the processive sense and avoids over-specifying
    agency beyond the clause's wording.
- source_word: ἀσεβῶν
  chosen: the ungodly
  alternatives:
  - the wicked
  - the impious
  lexicon: LSJ
  rationale: ἀσεβής emphasizes irreverence and godlessness. "Ungodly" is a natural
    English equivalent that preserves the religious-moral force better than the broader
    "wicked."
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: LSJ
  rationale: The verb denotes deliverance from danger. "Rescued" is clear modern English
    and fits the concrete narrative setting.
- source_word: φυγόντα
  chosen: as he fled
  alternatives:
  - fleeing
  - having fled
  lexicon: LSJ
  rationale: The aorist participle describes the righteous man's flight in connection
    with the rescue. "As he fled" gives smooth English while keeping the participial
    relation.
- source_word: πῦρ καταβάσιον
  chosen: the fire descending
  alternatives:
  - the descending fire
  - the fire sent down
  - the fire from heaven
  lexicon: LSJ
  rationale: καταβάσιος means "going down, descending." The phrase describes fire
    coming down upon the cities. "Descending" stays close to the Greek; "from heaven"
    is interpretive and not explicit in this wording.
- source_word: Πενταπόλεως
  chosen: the Five Cities
  alternatives:
  - Pentapolis
  - the five-city region
  lexicon: LSJ
  rationale: The genitive refers to the Pentapolis, the confederation of five cities
    associated with Sodom. Translating the sense as "the Five Cities" is more transparent
    for modern readers than the less familiar transliteration "Pentapolis."
