theological_decisions:
- issue: Referent of the feminine subject αὕτη
  chosen_reading: The subject is personified Wisdom continuing from the prior context.
  alternative_readings:
  - This one
  rationale: The discourse in Wisdom 10 repeatedly attributes saving acts to personified
    Wisdom. Rendering αὕτη as "She" preserves that literary-theological personification
    without importing later doctrinal claims.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English'
- issue: Identification of the righteous man and the Five Cities
  chosen_reading: The verse alludes to Lot fleeing the destruction of Sodom and its
    associated cities, but the main text leaves the allusion implicit.
  alternative_readings:
  - Explicitly naming Lot and Sodom in the translation
  rationale: The Greek itself does not name Lot here, only "a righteous man" and "the
    Five Cities." Keeping the allusion implicit avoids importing details not stated
    in the verse while remaining faithful to the narrative reference.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
