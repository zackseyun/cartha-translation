id: WIS.10.13
reference: Wisdom of Solomon 10:13
source:
  edition: lxx-swete-1909
  text: αὕτη πραθέντα δίκαιον οὐκ ἐγκατέλιπεν, ἀλλὰ ἐξ ἁμαρτίας ἐρρύσατο αὐτόν·
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: She did not abandon the righteous man when he was sold, but rescued him from
    sin;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The righteous man here is most likely Joseph, who was sold into Egypt (Gen
      37:28).
    reason: cross_reference
  - marker: b
    text: Or "delivered him out of sin." The phrase may refer specifically to Wisdom
      keeping Joseph from falling into sin, rather than only from the consequences
      of sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη
  chosen: She
  alternatives:
  - This one
  - Wisdom
  lexicon: LSJ
  rationale: The feminine demonstrative refers back to personified Wisdom in the context.
    Rendering it as "She" preserves the Greek anaphora and the personification without
    redundantly repeating "Wisdom" in the verse.
- source_word: πραθέντα
  chosen: when he was sold
  alternatives:
  - having been sold
  - sold
  lexicon: BDAG
  rationale: Aorist passive participle of πιπράσκω. "When he was sold" gives natural
    English while preserving the passive sense and temporal relation, fitting the
    Joseph narrative allusion.
- source_word: δίκαιον
  chosen: the righteous man
  alternatives:
  - the righteous one
  - a righteous man
  lexicon: BDAG
  rationale: As anarthrous adjective used substantivally in the accusative, it refers
    to the specific righteous figure in context (Joseph). "The righteous man" is idiomatic
    and keeps the masculine singular force.
- source_word: οὐκ ἐγκατέλιπεν
  chosen: did not abandon
  alternatives:
  - did not forsake
  - did not leave behind
  lexicon: BDAG
  rationale: ἐγκαταλείπω commonly means to abandon or forsake. "Abandon" is clear
    modern English and preserves the strength of the verb.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Simple adversative contrast is sufficient here.
- source_word: ἐξ ἁμαρτίας
  chosen: from sin
  alternatives:
  - out of sin
  - from wrongdoing
  lexicon: BDAG
  rationale: The preposition ἐξ marks deliverance out of a sphere or danger. "Sin"
    is the most direct rendering of ἁμαρτία. In context this likely refers to preservation
    from sinful entanglement rather than merely from punishment, so the straightforward
    theological term should be retained.
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: BDAG
  rationale: ῥύομαι means to rescue or deliver from danger. "Rescued" is vivid, natural
    English and avoids importing later soteriological overtones that "saved" might
    suggest here.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to the righteous man/Joseph.
