theological_decisions:
- issue: Identification of the righteous man
  chosen_reading: The verse refers to Joseph, though the translation leaves the name
    implicit as in Greek.
  alternative_readings:
  - A generic righteous person
  rationale: The surrounding context in Wisdom 10 recounts exemplars from Israel's
    history, and being sold strongly points to Joseph. The English keeps the Greek's
    implicit reference rather than inserting the name.
- issue: Meaning of deliverance from sin
  chosen_reading: Wisdom preserved Joseph from participating in sin.
  alternative_readings:
  - Wisdom rescued him from the consequences of others' sin
  - Wisdom rescued him from calamity associated with sin
  rationale: The phrase ἐξ ἁμαρτίας most naturally denotes deliverance from sin itself.
    In the Joseph context this fits preservation from sexual sin and moral compromise.
    The translation retains the ambiguity of the Greek by not over-specifying the
    exact sin.
  doctrine_reference: Preserve theological tension rather than resolve it.
