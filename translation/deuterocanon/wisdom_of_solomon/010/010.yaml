translation:
  text: She guided the righteous man, a fugitive from his brother’s anger, in straight
    paths; she showed him the kingdom of God, and gave him knowledge of holy things;
    she prospered him in his labors, and multiplied the fruit of his toil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'knowledge of holy ones.' The Greek phrase can refer either to sacred
      things or to holy persons/beings.
    reason: alternative_reading
  - marker: b
    text: Literally 'multiplied his toils/pains'; here likely meaning the yield or
      gains associated with his labor, since the context describes Wisdom’s beneficence.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη
  chosen: She
  alternatives:
  - This one
  - Wisdom
  lexicon: LSJ
  rationale: The feminine demonstrative refers back to personified Wisdom in the immediate
    context. English 'She' preserves the anaphoric and personified force without awkward
    repetition.
- source_word: φυγάδα ὀργῆς ἀδελφοῦ
  chosen: a fugitive from his brother’s anger
  alternatives:
  - fleeing from his brother’s wrath
  - an exile because of his brother’s anger
  lexicon: LSJ
  rationale: φυγάς/φυγάδα denotes one in flight or exile; with the genitive phrase
    it indicates the cause/source of flight. 'Brother’s anger' is more natural modern
    English than 'wrath' here while retaining the sense.
- source_word: δίκαιον
  chosen: the righteous man
  alternatives:
  - the righteous one
  - a righteous man
  lexicon: LSJ
  rationale: The adjective is substantival and masculine singular. 'The righteous
    man' fits the likely reference to Jacob and follows the gender-accurate policy;
    'man' is retained rather than neutralized.
- source_word: ὡδήγησεν ἐν τρίβοις εὐθείαις
  chosen: guided ... in straight paths
  alternatives:
  - led ... on straight paths
  - conducted ... in upright ways
  lexicon: LSJ
  rationale: ὁδηγέω means guide/lead; τρίβοις εὐθείαις is literally 'straight paths/ways.'
    'Guided ... in straight paths' preserves the metaphor and echoes biblical path-language.
- source_word: βασιλείαν θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God’s kingdom
  - royal rule of God
  lexicon: LSJ
  rationale: This is the straightforward lexical sense. 'Kingdom of God' is the established
    and accurate rendering, and here need not be paraphrased into an abstract expression.
- source_word: γνῶσιν ἁγίων
  chosen: knowledge of holy things
  alternatives:
  - knowledge of holy ones
  - knowledge of sacred things
  lexicon: LSJ
  rationale: ἅγιος in the neuter plural can mean holy things; the form here is ambiguous
    in isolation, but in this context the likely sense is sacred realities shown by
    Wisdom. 'Holy things' avoids over-specifying angelic or saintly referents while
    preserving the ambiguity better than 'holy ones.'
- source_word: εὐπόρησεν αὐτὸν ἐν μόχθοις
  chosen: she prospered him in his labors
  alternatives:
  - made him successful in his toils
  - gave him abundance in his hardships
  lexicon: LSJ
  rationale: εὐπορέω can mean to make prosperous or provide abundance/success; with
    ἐν μόχθοις it refers to success amid labor. 'Prospered him in his labors' is idiomatic
    and keeps the causal relation.
- source_word: ἐπλήθυνεν τοὺς πόνους αὐτοῦ
  chosen: multiplied the fruit of his toil
  alternatives:
  - increased his labors
  - multiplied his gains from toil
  lexicon: LSJ
  rationale: Taken woodenly, the Greek says 'multiplied his pains/toils,' but in context
    Wisdom is benefiting the righteous man, not increasing his suffering. πόνοι can
    denote the results or earnings of labor as well as the labor itself; rendering
    it as 'the fruit of his toil' best fits the positive context and avoids contradiction
    with the preceding clause.
