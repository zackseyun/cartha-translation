theological_decisions:
- issue: Referent of personified feminine subject
  chosen_reading: The subject is personified Wisdom, rendered with feminine pronoun
    'She.'
  alternative_readings:
  - Repeat 'Wisdom' explicitly in English
  rationale: The Greek demonstrative points back to Wisdom in the surrounding context.
    Retaining the feminine pronoun preserves the literary personification without
    adding a noun absent from this verse.
  doctrine_reference: 'DOCTRINE.md: Preserve source meaning and readable modern English'
- issue: Sense of γνῶσιν ἁγίων
  chosen_reading: '''knowledge of holy things'''
  alternative_readings:
  - knowledge of holy ones
  rationale: The phrase can be construed more than one way, but the immediate sequence
    of divine revelation and blessing favors sacred realities rather than persons.
    The alternative is preserved in a footnote because the Greek permits it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Sense of τοὺς πόνους αὐτοῦ in a positive context
  chosen_reading: '''the fruit of his toil'''
  alternative_readings:
  - his labors
  - his pains
  rationale: Although the more literal wording could suggest increased hardship, the
    verse's flow is uniformly beneficent. Rendering the term as the productive outcome
    of labor best reflects the contextual sense without paraphrasing beyond attested
    lexical range.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    consistency with context'
