id: WIS.10.10
reference: Wisdom of Solomon 10:10
source:
  edition: lxx-swete-1909
  text: αὕτη φυγάδα ὀργῆς ἀδελφοῦ δίκαιον ὡδήγησεν ἐν τρίβοις εὐθείαις· ἔδειξεν αὐτῷ
    βασιλείαν θεοῦ, καὶ ἔδωκεν αὐτῷ γνῶσιν ἁγίων· εὐπόρησεν αὐτὸν ἐν μόχθοις, καὶ
    ἐπλήθυνεν τοὺς πόνους αὐτοῦ.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
