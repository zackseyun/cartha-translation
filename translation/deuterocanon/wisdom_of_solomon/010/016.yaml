reference: Wisdom of Solomon 10:16
source:
  edition: lxx-swete-1909
  text: εἰσῆλθεν εἰς ψυχὴν θεράποντος Κυρίου, καὶ ἀντέστη βασιλεῦσι φοβεροῖς ἐν τέρασι
    καὶ σημείοις.
  language: Greek
