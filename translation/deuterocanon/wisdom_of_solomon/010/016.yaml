theological_decisions:
- issue: Gender of the subject implied from context
  chosen_reading: Use 'She' for the implied subject, referring to Wisdom.
  alternative_readings:
  - Repeat 'Wisdom' explicitly in English
  - Use 'it'
  rationale: The Greek verb has no explicit subject in this verse, but the context
    throughout the chapter is personified Wisdom, grammatically and conceptually feminine.
    Using 'She' preserves the literary continuity and personification without adding
    a noun absent from the Greek.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English'
- issue: Identity of the 'servant of the Lord'
  chosen_reading: Leave the phrase untranslated as a common noun rather than naming
    Moses.
  alternative_readings:
  - Moses
  rationale: The broader context points to Moses, but the Greek text here says 'servant
    of the Lord.' Naming Moses in the main text would import an identification from
    context rather than translate the wording actually present.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
