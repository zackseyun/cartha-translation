translation:
  text: She entered into the soul of a servant of the Lord, and with wonders and signs
    she stood against fearsome kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'servant of the Lord' is understood from the context to be Moses.
    reason: cross_reference
  - marker: b
    text: Or 'by wonders and signs.' The Greek phrase can express means or accompanying
      circumstance.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went into
  - came into
  lexicon: LSJ
  rationale: Aorist of εἰσέρχομαι, straightforwardly denoting entry. 'Entered' is
    natural English and preserves the concrete metaphor of Wisdom entering a person.
- source_word: ψυχὴν
  chosen: soul
  alternatives:
  - life
  - inner being
  - mind
  lexicon: LSJ
  rationale: ψυχή can denote life or inner self; here, with εἰς and in a wisdom-indwelling
    context, 'soul' best preserves the anthropological and theological force without
    flattening it to mere psychology.
- source_word: θεράποντος
  chosen: servant
  alternatives:
  - attendant
  - minister
  lexicon: LSJ
  rationale: θεράπων denotes a personal attendant or servant, often with dignity.
    'Servant' fits the reverential context better than 'attendant' and avoids overreading
    official status. The likely referent is Moses, but the text itself uses the common
    noun, so the translation keeps it generic.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: κύριος is rendered by the project's default as 'Lord.' With θεράποντος
    it is idiomatic in English to say 'a servant of the Lord.'
- source_word: ἀντέστη
  chosen: stood against
  alternatives:
  - opposed
  - withstood
  lexicon: LSJ
  rationale: ἀνθίστημι means to set oneself against or resist. 'Stood against' preserves
    the vividness of the Greek while remaining readable.
- source_word: βασιλεῦσι
  chosen: kings
  alternatives:
  - rulers
  lexicon: LSJ
  rationale: The dative plural clearly refers to kings; 'rulers' would be broader
    than the source warrants.
- source_word: φοβεροῖς
  chosen: fearsome
  alternatives:
  - terrible
  - dreaded
  - fearful
  lexicon: LSJ
  rationale: φοβερός can mean causing fear. 'Fearsome' communicates that these kings
    inspire dread, whereas 'fearful' in modern English could suggest they themselves
    are afraid.
- source_word: ἐν τέρασι καὶ σημείοις
  chosen: with wonders and signs
  alternatives:
  - by wonders and signs
  - in wonders and signs
  - with portents and signs
  lexicon: LSJ
  rationale: The preposition ἐν here is instrumental or associative. 'With wonders
    and signs' is idiomatic and preserves the paired miracle language familiar from
    biblical usage. 'Portents' is possible for τέρατα, but 'wonders' is more accessible
    and still weighty.
