theological_decisions:
- issue: Scope of the dominion language in relation to Adam
  chosen_reading: Render the clause broadly as a grant of strength 'to master all
    things' without specifying creation or creatures in the main text.
  alternative_readings:
  - to rule over all things
  - to master everything
  rationale: The Greek itself is broad and does not explicitly supply 'creation' or
    'living creatures.' A broad rendering preserves the likely echo of humanity's
    dominion while avoiding importing wording not present in the verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
