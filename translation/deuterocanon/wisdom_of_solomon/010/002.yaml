translation:
  text: and gave him strength to master all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to rule over all things.' The Greek verb can denote exercising power
      or dominion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκέν
  chosen: gave
  alternatives:
  - granted
  - bestowed
  lexicon: BDAG
  rationale: A straightforward past-tense rendering of δίδωμι. 'Gave' is the most
    natural English equivalent and fits the concise narrative style.
- source_word: τε
  chosen: and
  alternatives:
  - also
  - then
  lexicon: LSJ
  rationale: The enclitic τε links this clause to the preceding one. 'And' best preserves
    the connective force in readable English without overtranslating.
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: Dative singular pronoun referring to the righteous man in context (Adam).
    'Him' is the direct and contextually clear rendering.
- source_word: ἰσχὺν
  chosen: strength
  alternatives:
  - power
  - might
  lexicon: BDAG
  rationale: ἰσχύς denotes strength or might. 'Strength' is idiomatic with the following
    infinitive ('to master') and avoids sounding overly abstract.
- source_word: κρατῆσαι
  chosen: to master
  alternatives:
  - to rule over
  - to prevail over
  - to gain control of
  lexicon: LSJ
  rationale: The aorist infinitive of κρατέω here expresses gaining or exercising
    dominion. 'To master' captures effective control in concise English and fits the
    allusion to humanity's dominion.
- source_word: ἁπάντων
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: BDAG
  rationale: The genitive plural of ἅπας is comprehensive. 'All things' preserves
    the breadth of the expression and suits the elevated style of Wisdom.
