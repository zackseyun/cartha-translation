translation:
  text: She rescued a holy people and a blameless offspring from a nation of oppressors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from an afflicting nation' or 'from a nation that oppressed them.' The
      Greek participle θλιβόντων can be understood adjectivally rather than as the
      substantive 'oppressors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὔτη
  chosen: She
  alternatives:
  - This one
  - Wisdom
  lexicon: LSJ
  rationale: The feminine demonstrative refers back to personified Wisdom in the surrounding
    context. English 'She' preserves the anaphoric force and the feminine personification
    more naturally than 'this one,' while avoiding over-specifying with the noun 'Wisdom'
    where the Greek uses a pronoun.
- source_word: λαὸν
  chosen: people
  alternatives:
  - nation
  - folk
  lexicon: LSJ
  rationale: '''People'' is the most natural collective rendering here and fits the
    likely reference to Israel as a covenant people. ''Nation'' is possible but is
    better reserved in this verse for ἔθνος, preserving lexical distinction.'
- source_word: ὅσιον
  chosen: holy
  alternatives:
  - godly
  - devout
  - faithful
  lexicon: LSJ
  rationale: ὅσιος can denote pious/devout or holy in relation to God. 'Holy' best
    fits the covenantal characterization of the rescued people and reads naturally
    with 'people.'
- source_word: σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: LSJ
  rationale: '''Offspring'' preserves the collective-singular sense without sounding
    overly literal like ''seed.'' ''Descendants'' is possible, but ''offspring'' better
    reflects the singular noun used collectively.'
- source_word: ἄμεμπτον
  chosen: blameless
  alternatives:
  - faultless
  - without reproach
  lexicon: LSJ
  rationale: '''Blameless'' is a standard and clear rendering for moral irreproach.
    It pairs well with ''offspring'' and preserves the ethical nuance.'
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: LSJ
  rationale: The verb denotes deliverance from danger or oppression. 'Rescued' is
    vivid, idiomatic modern English and avoids importing broader soteriological overtones
    that 'saved' might carry.
- source_word: ἐξ
  chosen: from
  alternatives:
  - out of
  lexicon: LSJ
  rationale: Simple separation/source sense; 'from' is idiomatic and sufficient.
- source_word: ἔθνους
  chosen: nation
  alternatives:
  - people
  - Gentile nation
  lexicon: LSJ
  rationale: '''Nation'' is the most straightforward rendering and preserves distinction
    from λαός. ''Gentile nation'' would over-interpret the term in context.'
- source_word: θλιβόντων
  chosen: of oppressors
  alternatives:
  - that afflicted them
  - that was oppressing them
  - of those who afflicted them
  lexicon: LSJ
  rationale: The participle means pressing, afflicting, or oppressing. Rendering it
    substantivally as 'oppressors' gives clear English and captures the hostile force
    of the genitive phrase. This is slightly interpretive, but it best conveys the
    sense of an afflicting nation, likely Egypt in context.
