theological_decisions:
- issue: Referent of the feminine pronoun αὔτη
  chosen_reading: The pronoun refers to personified Wisdom, rendered as 'She.'
  alternative_readings:
  - The pronoun could be expanded as 'Wisdom' for clarity
  - The pronoun could be rendered more woodenly as 'this one'
  rationale: The surrounding passage repeatedly personifies Wisdom as an acting female
    subject. Preserving 'She' maintains the literary-theological personification without
    collapsing it into an abstract noun in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Moral/covenantal description of Israel in ὅσιον ... ἄμεμπτον
  chosen_reading: The descriptors are rendered straightforwardly as 'holy' and 'blameless'
    without softening or expanding them.
  alternative_readings:
  - '''godly'' and ''faultless'''
  - '''devout'' and ''without reproach'''
  rationale: The verse attributes covenantal and ethical qualities to the rescued
    people/offspring in the rhetoric of Wisdom's saving work. The translation preserves
    that theological weight without importing later doctrinal categories.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
