theological_decisions:
- issue: Referent of 'the righteous' and 'the ungodly' in context
  chosen_reading: Render generically as 'the righteous' and 'the ungodly' rather than
    specifying Israelites and Egyptians in the main text.
  alternative_readings:
  - the righteous Israelites ... the ungodly Egyptians
  rationale: The immediate literary context points to Israel's deliverance and the
    spoiling of Egypt, but the Greek text itself uses moral-religious categories rather
    than ethnic identifiers. The translation preserves the source wording and lets
    the context supply the historical referents.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Nuance of divine action in 'your defending hand'
  chosen_reading: Retain the metaphor of God's 'hand' while expressing ὑπέρμαχος as
    defensive/championing action.
  alternative_readings:
  - your mighty hand
  - your protective power
  - your hand that fought for them
  rationale: The text attributes victory and praise to God's active intervention.
    Preserving 'hand' keeps the biblical metaphor, while 'defending' communicates
    that this power acts on behalf of the righteous. This avoids flattening the image
    into a generic abstraction like 'power.'
  doctrine_reference: Translation philosophy §§1, 6
