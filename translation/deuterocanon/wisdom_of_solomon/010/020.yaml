translation:
  text: Therefore the righteous plundered the ungodly, and they sang praise to your
    holy name, O Lord; and with one accord they praised your defending hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despoiled' or 'took spoil from.' The Greek verb refers to taking plunder
      from defeated enemies.
    reason: lexical_alternative
  - marker: b
    text: Literally 'your hand that fights on behalf of [your people]' or 'your championing
      hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: LSJ
  rationale: A straightforward inferential connector linking this verse to the preceding
    deliverance. 'Therefore' is concise and natural in English.
- source_word: δίκαιοι
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: LSJ
  rationale: Substantival plural adjective referring to those characterized by righteousness.
    'The righteous' is idiomatic and preserves the moral-theological sense better
    than 'the just' in modern English.
- source_word: ἐσκύλευσαν
  chosen: plundered
  alternatives:
  - despoiled
  - stripped spoils from
  lexicon: LSJ
  rationale: The verb commonly denotes taking spoil from defeated enemies. 'Plundered'
    is clear modern English and preserves the concrete victory imagery.
- source_word: ἀσεβεῖς
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: LSJ
  rationale: The term emphasizes irreverence toward God, not merely general moral
    evil. 'Ungodly' best preserves that religious dimension.
- source_word: ὕμνησαν
  chosen: sang praise
  alternatives:
  - hymned
  - praised
  lexicon: LSJ
  rationale: The verb can specifically denote singing a hymn or song of praise. 'Sang
    praise' preserves the musical nuance better than the flatter 'praised'.
- source_word: Κύριε
  chosen: O Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Vocative address to God. Following doctrine, κύριος is rendered 'Lord.'
    The interjected 'O' naturally marks direct address in elevated but still readable
    English.
- source_word: τὸ ὄνομα τὸ ἅγιόν σου
  chosen: your holy name
  alternatives:
  - your sacred name
  lexicon: LSJ
  rationale: A standard biblical expression for God's revealed identity and reputation.
    'Holy name' is the most transparent and conventional rendering.
- source_word: τήν τε ὑπέρμαχόν σου χεῖρα
  chosen: your defending hand
  alternatives:
  - your championing hand
  - your hand that fights for us
  - your protective hand
  lexicon: LSJ
  rationale: ὑπέρμαχος carries the sense of fighting on behalf of, defending, or championing.
    With 'hand' as a metaphor for divine power, 'defending hand' preserves both the
    protective and martial nuance without overexpansion.
- source_word: ᾔνεσαν
  chosen: praised
  alternatives:
  - extolled
  lexicon: LSJ
  rationale: A standard verb for praise. Since ὕμνησαν already carries the more specific
    singing nuance, varying this as 'praised' reflects the Greek distinction.
- source_word: ὁμοθυμαδόν
  chosen: with one accord
  alternatives:
  - together
  - unanimously
  lexicon: LSJ
  rationale: The adverb denotes united purpose or shared impulse, not mere simultaneity.
    'With one accord' is a well-established and accurate English equivalent.
