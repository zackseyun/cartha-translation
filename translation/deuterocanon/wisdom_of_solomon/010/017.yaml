theological_decisions:
- issue: Identity of the implied subject throughout the verse
  chosen_reading: The subject is left as 'He' in English, following the Greek verbal
    sequence and immediate literary context in which Wisdom is personified as the
    acting agent.
  alternative_readings:
  - Explicitly supplying 'Wisdom' as the subject in English
  rationale: The Greek verse itself does not repeat Σοφία here, but the surrounding
    context makes Wisdom the antecedent. Retaining 'He' mirrors the Greek style and
    preserves the personified presentation without over-explaining in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Possible allusion to the exodus pillar traditions
  chosen_reading: The imagery is translated directly without importing explanatory
    expansion into the main text.
  alternative_readings:
  - Expanding to 'pillar of cloud by day and pillar of fire by night'
  rationale: The verse clearly echoes exodus imagery, but the Greek wording here is
    not identical to the fuller traditional formula. The translation should preserve
    the allusive force without adding words absent from the text.
  doctrine_reference: Never paraphrase beyond what the source text warrants.
