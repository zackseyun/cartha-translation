translation:
  text: He gave the holy ones the reward of their labors, guided them on a marvelous
    way, and became for them a shelter by day and a flame of stars by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The imagery recalls God's guidance and protection in the exodus, especially
      the cloud by day and fire by night; the Greek here states this allusively rather
      than with the full traditional formula.
    reason: cross_reference
  - marker: b
    text: Or 'the godly' for 'the holy ones.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'a flame of stars' is literal; it may also be understood as 'a
      starry flame.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέδωκεν
  chosen: gave
  alternatives:
  - rendered
  - repaid
  - paid back
  lexicon: BDAG
  rationale: The verb means to give back, render, or repay. In context with μισθὸν
    κόπων, the sense is that Wisdom granted what was due for their toil. 'Gave' is
    natural English and preserves the positive bestowal without over-specifying punitive
    or commercial repayment.
- source_word: ὁσίοις
  chosen: the holy ones
  alternatives:
  - the godly
  - the faithful
  - the pious
  lexicon: BDAG
  rationale: ὅσιος denotes those devoted to God, pious or holy. 'The holy ones' keeps
    the adjectival force and echoes biblical diction without importing later technical
    categories. 'Godly' is possible but slightly more interpretive.
- source_word: μισθὸν
  chosen: reward
  alternatives:
  - wages
  - recompense
  lexicon: BDAG
  rationale: μισθός can mean wages or reward. Here 'reward' fits the elevated style
    and avoids a narrowly economic sense, while still conveying compensation for labor.
- source_word: κόπων
  chosen: their labors
  alternatives:
  - their toils
  - their work
  lexicon: BDAG
  rationale: κόπος often carries the sense of laborious effort or toil. 'Labors' preserves
    both effort and dignity; 'toils' is slightly harsher, while 'work' is too flat.
- source_word: ὡδήγησεν
  chosen: guided
  alternatives:
  - led
  lexicon: BDAG
  rationale: The verb means to guide or lead on a way. 'Guided' fits the following
    ἐν ὁδῷ and highlights directed care rather than mere movement.
- source_word: ἐν ὁδῷ θαυμαστῇ
  chosen: on a marvelous way
  alternatives:
  - in a wondrous path
  - along a marvelous road
  lexicon: BDAG
  rationale: The phrase is literally 'in/on a marvelous way.' 'Marvelous way' is idiomatic
    enough in English and preserves the wonder-laden quality, likely alluding to the
    extraordinary route of deliverance.
- source_word: ἐγένετο αὐτοῖς εἰς σκέπην ἡμέρας
  chosen: became for them a shelter by day
  alternatives:
  - was for them a covering by day
  - became their shade by day
  lexicon: BDAG
  rationale: σκέπη denotes covering, shelter, or protection. 'Shelter' communicates
    protective refuge clearly. The genitive ἡμέρας is temporal, hence 'by day.'
- source_word: εἰς φλόγα ἄστρων τὴν νύκτα
  chosen: a flame of stars by night
  alternatives:
  - a starry flame by night
  - a flame among the stars by night
  lexicon: LSJ
  rationale: The Greek is somewhat compressed. φλόξ is flame, and ἄστρων is 'of stars.'
    The phrase likely evokes the fiery nighttime guidance corresponding to the wilderness
    tradition. 'A flame of stars' stays close to the Greek imagery without collapsing
    it into a paraphrase.
