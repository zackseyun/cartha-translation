translation:
  text: But an unrighteous man, having departed from her, perished in his brother-murdering
    rage.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having turned away from her.' The 'her' refers to personified Wisdom
      in the context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in his brother-killing passions/angers.' The verse likely alludes
      to Cain, though he is not named here.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποστὰς
  chosen: having departed
  alternatives:
  - having turned away
  - after departing
  - having apostatized
  lexicon: BDAG
  rationale: Aorist participle of ἀφίστημι/ἀπόστημι here marks separation from Wisdom
    ('her'). 'Having departed' is clear and sufficiently formal. 'Apostatized' is
    too theologically loaded for this context, though the idea of turning away is
    present.
- source_word: ἀπ' αὐτῆς
  chosen: from her
  alternatives:
  - away from her
  lexicon: BDAG
  rationale: The feminine pronoun refers back to personified Wisdom in the surrounding
    context. 'From her' preserves the personification without overexplaining in the
    main text.
- source_word: ἄδικος
  chosen: an unrighteous man
  alternatives:
  - an unjust man
  - a wicked man
  - an unrighteous one
  lexicon: BDAG
  rationale: ἄδικος denotes one characterized by injustice/unrighteousness. 'Unrighteous
    man' preserves the moral-religious force and matches the masculine singular form.
    'Wicked' is broader and less precise.
- source_word: ἐν ὀργῇ αὐτοῦ
  chosen: in his ... rage
  alternatives:
  - in his anger
  - by his anger
  lexicon: BDAG
  rationale: ὀργή is anger/wrath; 'rage' fits the violent context of fratricide. The
    preposition ἐν is rendered idiomatically with the phrase rather than woodenly.
- source_word: ἀδελφοκτόνοις
  chosen: brother-murdering
  alternatives:
  - fratricidal
  - brother-killing
  lexicon: LSJ
  rationale: The adjective literally means 'brother-killing.' 'Brother-murdering'
    is vivid, transparent, and accessible; 'fratricidal' is accurate but less readable
    for modern readers.
- source_word: θυμοῖς
  chosen: rage
  alternatives:
  - passions
  - furies
  - outbursts of anger
  lexicon: BDAG
  rationale: θυμός can denote passion, wrath, or angry impulse. In combination with
    ἀδελφοκτόνοις and the likely allusion to Cain, the sense is violent fury. English
    singular 'rage' communicates the collective/intensive sense naturally, though
    the Greek is plural.
- source_word: συναπώλετο
  chosen: perished
  alternatives:
  - was destroyed
  - destroyed himself utterly
  - came to ruin
  lexicon: BDAG
  rationale: The compound verb intensifies destruction/ruin. 'Perished' is concise
    and idiomatic; the prefix's force is sufficiently conveyed by the context of total
    ruin. 'Destroyed himself utterly' overstates reflexivity not explicit in the form.
