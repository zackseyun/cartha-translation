theological_decisions:
- issue: Identification of the unrighteous man
  chosen_reading: Translate generically as 'an unrighteous man' while allowing the
    contextual allusion to Cain to remain implicit.
  alternative_readings:
  - '''Cain'' supplied in the main text'
  - '''the unrighteous man'' as a specific known figure'
  rationale: The Greek does not name Cain in this verse, though the context strongly
    points to him as the brother-killer who departed from Wisdom. To avoid importing
    more than the text states, the translation keeps the noun generic and lets the
    allusion stand.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve what the source text states.'
- issue: Rendering the personification of Wisdom
  chosen_reading: Retain feminine reference with 'her.'
  alternative_readings:
  - replace with 'wisdom' explicitly
  - neutralize the pronoun
  rationale: The immediate Greek uses a feminine pronoun referring to personified
    Wisdom. Preserving 'her' maintains the literary-theological personification present
    in the source.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source meaning and literary form where possible.'
