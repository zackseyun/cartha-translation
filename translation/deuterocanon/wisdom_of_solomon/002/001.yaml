theological_decisions:
- issue: Rendering ἀνθρώπου in a generic singular construction
  chosen_reading: a man’s life
  alternative_readings:
  - human life
  - a person's life
  rationale: The Greek is grammatically masculine singular with generic force. Per
    doctrine, gender-accurate rendering is preferred where it matches source intent.
    The phrase is not making a male-only claim but using representative singular 'man.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering ᾅδης
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The Greek names Hades explicitly. Translating it as 'Hades' preserves
    the conceptual world of the source text and avoids importing a narrower or different
    theological concept.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
