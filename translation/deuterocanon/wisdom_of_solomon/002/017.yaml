translation:
  text: Let us see whether his words are true, and let us test what will happen at
    his end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what his outcome will be.' The Greek phrase can refer to the result
      or end that comes to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδωμεν
  chosen: Let us see
  alternatives:
  - Let us observe
  - Let us find out
  lexicon: LSJ
  rationale: A first-person plural hortatory subjunctive from ὁράω. 'Let us see' is
    natural English and preserves the deliberative challenge of the speakers.
- source_word: οἱ λόγοι αὐτοῦ
  chosen: his words
  alternatives:
  - what he says
  - his statements
  lexicon: LSJ
  rationale: λόγοι can mean words, sayings, or claims. 'His words' stays close to
    the Greek while still allowing the implied sense of his claims.
- source_word: ἀληθεῖς
  chosen: 'true'
  alternatives:
  - truthful
  - valid
  lexicon: LSJ
  rationale: The adjective straightforwardly means 'true.' 'Truthful' would shift
    focus toward the speaker's character rather than the truth of the content.
- source_word: πειράσωμεν
  chosen: let us test
  alternatives:
  - let us try
  - let us put to the test
  lexicon: LSJ
  rationale: The verb means to test or try. 'Let us test' is concise and preserves
    the hostile experimental sense in context.
- source_word: τὰ ἐν ἐκβάσει αὐτοῦ
  chosen: what will happen at his end
  alternatives:
  - the things in his outcome
  - what comes in his end
  - what his end will be
  lexicon: LSJ
  rationale: ἐκβάσις can denote outcome, end, or result. The phrase is somewhat idiomatic;
    'what will happen at his end' brings out the sense of testing the final outcome
    of the righteous man's claims without over-literal awkwardness.
