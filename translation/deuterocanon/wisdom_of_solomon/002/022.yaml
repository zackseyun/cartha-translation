theological_decisions:
- issue: Referent of 'his' in 'his mysteries'
  chosen_reading: '''his'' refers to God'
  alternative_readings:
  - '''his'' left formally ambiguous in English'
  rationale: The immediate context in Wisdom 2 concerns the ungodly failing to grasp
    God's purposes and the destiny of the righteous. Retaining 'his' follows the Greek
    wording while understanding the referent as God.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Sense of ψυχῶν in context
  chosen_reading: '''souls'' rather than ''lives'' or ''persons'''
  alternative_readings:
  - lives
  - persons
  rationale: The surrounding context emphasizes the destiny and vindication of the
    righteous beyond present appearances. 'Souls' preserves that theological resonance
    without adding doctrinal claims beyond the text.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
