translation:
  text: And they did not know his mysteries, nor did they hope for the reward of holiness,
    nor did they judge blameless souls worthy of honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secret things' for 'mysteries.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the reward of piety' for 'the reward of holiness.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'nor did they judge honor of blameless souls'; the English expands
      the compressed Greek sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνωσαν
  chosen: did not know
  alternatives:
  - did not understand
  - failed to recognize
  lexicon: BDAG
  rationale: Aorist of γινώσκω here denotes lack of knowledge/understanding. 'Did
    not know' is the most direct and natural rendering in context.
- source_word: μυστήρια
  chosen: mysteries
  alternatives:
  - secret things
  - hidden purposes
  lexicon: BDAG
  rationale: μυστήρια refers to hidden or secret realities. 'Mysteries' preserves
    the lexical link and theological weight without over-interpreting the content.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - of God
  - his own
  lexicon: BDAG
  rationale: The pronoun is singular masculine/neuter genitive and in context refers
    back to God. The Greek uses the pronoun rather than repeating the noun, so 'his'
    is retained.
- source_word: μισθὸν
  chosen: reward
  alternatives:
  - wages
  - recompense
  lexicon: BDAG
  rationale: μισθός commonly means reward or wages. In this moral-religious context,
    'reward' is idiomatic and avoids the overly commercial sense of 'wages'.
- source_word: ἤλπισαν
  chosen: did they hope for
  alternatives:
  - did they expect
  - did they set their hope on
  lexicon: BDAG
  rationale: ἐλπίζω denotes hoping or expecting. 'Hope for' best matches normal English
    and the future-oriented sense.
- source_word: ὁσιότητος
  chosen: holiness
  alternatives:
  - piety
  - godliness
  lexicon: LSJ
  rationale: ὁσιότης denotes holiness or piety, especially devout uprightness. 'Holiness'
    best fits the elevated register and keeps the moral-religious force broad rather
    than narrowing it to outward piety.
- source_word: ἔκριναν
  chosen: did they judge
  alternatives:
  - did they consider
  - did they reckon
  lexicon: BDAG
  rationale: κρίνω here carries the sense of making an evaluative judgment. 'Judge'
    preserves the verbal force and parallelism with the preceding clauses.
- source_word: γέρας
  chosen: worthy of honor
  alternatives:
  - honor
  - prize
  - privilege
  lexicon: LSJ
  rationale: γέρας denotes a mark of honor, prize, or privilege. Because the Greek
    construction is compressed ('judge [there to be] honor for blameless souls'),
    English requires expansion. 'Judge blameless souls worthy of honor' conveys the
    sense clearly while preserving the evaluative idea.
- source_word: ψυχῶν
  chosen: souls
  alternatives:
  - lives
  - persons
  lexicon: BDAG
  rationale: ψυχή can mean soul, life, or self. Here, in Wisdom's eschatological-moral
    context, 'souls' best preserves the anthropological and afterlife resonance of
    the passage.
- source_word: ἀμώμων
  chosen: blameless
  alternatives:
  - spotless
  - without fault
  lexicon: BDAG
  rationale: ἀμώμος means blameless or without blemish. 'Blameless' is the most natural
    moral descriptor in English for persons.
