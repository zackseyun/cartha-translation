translation:
  text: He became a reproof to our thoughts; even being seen is burdensome to us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has become a rebuke to our inner reasonings.' The Greek ἔλεγχος can
      carry the sense of exposing fault, and ἐννοίαι can mean inward thoughts or reasonings.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and even being seen is burdensome to us,' meaning that even
      the sight of him is hard for them to bear.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: became
  alternatives:
  - has become
  - came to be
  lexicon: BDAG
  rationale: 'Aorist middle of γίνομαι here marks resultant state from prior action:
    ''he became'' or ''has become.'' ''Became'' preserves the simple narrative force
    without importing English perfect aspect.'
- source_word: εἰς ἔλεγχον
  chosen: a reproof
  alternatives:
  - a rebuke
  - an exposure
  - a condemnation
  lexicon: BDAG
  rationale: ἔλεγχος can denote reproof or exposure by bringing fault to light. 'Reproof'
    best fits the moral context and keeps the personal force of the accusation without
    overstating judicial condemnation.
- source_word: ἐννοιῶν
  chosen: thoughts
  alternatives:
  - intentions
  - schemes
  - inner reasonings
  lexicon: LSJ
  rationale: ἐννοίαι refers to thoughts, notions, or inward reasonings. 'Thoughts'
    is the most natural modern English and leaves room for the morally charged sense
    supplied by context.
- source_word: βαρύς
  chosen: burdensome
  alternatives:
  - heavy
  - grievous
  - hard to bear
  lexicon: BDAG
  rationale: 'Predicative βαρύς here is metaphorical: his very presence weighs on
    them. ''Burdensome'' communicates the figurative sense more idiomatically than
    the literal ''heavy.'''
- source_word: βλεπόμενος
  chosen: being seen
  alternatives:
  - being looked at
  - his appearance
  - the sight of him
  lexicon: BDAG
  rationale: The passive participle literally means 'being seen.' In context it refers
    to the mere sight/presence of the righteous man. 'Being seen' stays close to the
    Greek while remaining intelligible in English.
