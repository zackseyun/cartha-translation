theological_decisions:
- issue: Sense of τῶν ὄντων ἀγαθῶν
  chosen_reading: the good things that exist
  alternative_readings:
  - the present good things
  - the good things at hand
  rationale: The phrase can be understood ontologically ('existing good things') or
    more contextually as the goods presently available in this life. The chosen rendering
    stays closest to the Greek while allowing readers to hear the contextual implication
    from the surrounding speech.
  doctrine_reference: Translation philosophy §1, §5
- issue: Nuance of τῇ κτίσει
  chosen_reading: creation
  alternative_readings:
  - the created world
  rationale: The verse speaks broadly of using what has been created rather than a
    single creature or merely material resources. 'Creation' preserves that breadth
    and avoids narrowing the scope.
  doctrine_reference: Translation philosophy §1, §6
