translation:
  text: For if the righteous man is God's son, God will help him and rescue him from
    the hand of those who oppose him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the righteous one is a son of God' or 'the righteous one is the Son
      of God.' The Greek phrase can be rendered in more than one way; the main text
      avoids importing a later christological title while preserving the filial claim.
    reason: alternative_reading
lexical_decisions:
- source_word: δίκαιος
  chosen: the righteous man
  alternatives:
  - the righteous one
  - the just man
  lexicon: LSJ
  rationale: With the article, the adjective functions substantivally. 'The righteous
    man' preserves the masculine singular form and the representative individual in
    context, in line with the project's gender-accurate policy. 'Righteous' better
    matches the moral/religious sense than 'just' here.
- source_word: υἱὸς θεοῦ
  chosen: God's son
  alternatives:
  - son of God
  - a son of God
  lexicon: LSJ
  rationale: The anarthrous predicate construction after ἐστιν can be rendered naturally
    in English as 'God's son.' This keeps the filial claim without importing later
    christological capitalization. 'Son of God' is possible, but 'God's son' is slightly
    more idiomatic here while preserving the same sense.
- source_word: ἀντιλήμψεται
  chosen: he will help him
  alternatives:
  - he will take hold of him
  - he will support him
  - he will come to his aid
  lexicon: BDAG
  rationale: The verb conveys taking hold in support, hence helping or coming to aid.
    'He will help him' is concise, natural English and fits the parallel with 'rescue
    him.' A more literal 'take hold of him' would be obscure in English.
- source_word: ῥύσεται
  chosen: rescue him
  alternatives:
  - deliver him
  - save him
  lexicon: BDAG
  rationale: The verb denotes deliverance from danger. 'Rescue' is vivid, contemporary,
    and avoids importing broader theological overtones that 'save' may carry in English.
- source_word: ἐκ χειρὸς
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the hand of
  lexicon: LSJ
  rationale: This is a standard idiom for power or control. 'From the hand of' preserves
    the biblical idiom clearly enough in English, with the hostile agents specified
    in the following participle.
- source_word: ἀνθεστηκότων
  chosen: those who oppose him
  alternatives:
  - his adversaries
  - those who stand against him
  - those who resist him
  lexicon: LSJ
  rationale: The perfect participle of ἀνθίστημι denotes people set against him. 'Those
    who oppose him' is clear and faithful, preserving the active hostility without
    over-specifying legal or military nuance.
