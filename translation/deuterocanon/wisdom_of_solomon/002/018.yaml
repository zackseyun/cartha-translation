theological_decisions:
- issue: Whether to capitalize 'Son' or render the phrase in a way that implies a
    christological title
  chosen_reading: Rendered as 'God's son' without capitalization
  alternative_readings:
  - Son of God
  rationale: In context, the speakers are making a claim about the righteous man;
    while the verse is later read christologically, the Greek itself here does not
    require titular capitalization. The translation preserves the wording without
    importing later doctrinal interpretation.
