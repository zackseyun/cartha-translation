translation:
  text: Let us condemn him to a shameful death, for there will be an examination of
    him according to his words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there will be care for him,' 'there will be vindication for him,' or
      'his words will be tested by what happens to him.' The Greek 'visitation' can
      refer broadly to divine attention or intervention.
    reason: lexical_alternative
lexical_decisions:
- source_word: θανάτῳ
  chosen: to a ... death
  alternatives:
  - with ... death
  - by ... death
  lexicon: LSJ
  rationale: Dative used with καταδικάζω can be rendered as the penalty to which he
    is condemned; English idiom favors 'condemn him to ... death.'
- source_word: ἀσχήμονι
  chosen: shameful
  alternatives:
  - disgraceful
  - ignominious
  - unseemly
  lexicon: LSJ
  rationale: The adjective denotes what is dishonorable or indecent. 'Shameful' is
    clear modern English and preserves the social dishonor emphasized in the Greek.
- source_word: καταδικάσωμεν
  chosen: Let us condemn
  alternatives:
  - let us sentence
  - let us condemn judicially
  lexicon: LSJ
  rationale: First person plural hortatory subjunctive; 'Let us condemn' preserves
    both the deliberative force and the judicial sense.
- source_word: ἐπισκοπή
  chosen: visitation
  alternatives:
  - oversight
  - inspection
  - care
  - punishment
  - vindication
  lexicon: LSJ
  rationale: The noun can denote an act of looking into, visitation, or intervention.
    Here the speakers allude to the righteous man's claim that God will attend to
    him; 'visitation' preserves the ambiguity of divine intervention without over-resolving
    it into either rescue or punishment.
- source_word: ἐκ λόγων αὐτοῦ
  chosen: according to his words
  alternatives:
  - from his words
  - on the basis of his words
  lexicon: LSJ
  rationale: The phrase indicates that what happens will be in line with, or on the
    basis of, what he has said. 'According to his words' is idiomatic and keeps the
    causal link.
