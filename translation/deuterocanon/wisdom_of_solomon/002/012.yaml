translation:
  text: But let us lie in wait for the righteous man, because he is troublesome to
    us and opposes our deeds, and reproaches us for sins against the law, and charges
    us with sins against our upbringing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the righteous one.' The Greek singular can denote a representative righteous
      person.
    reason: lexical_alternative
  - marker: b
    text: Or 'charges us with offenses against our upbringing/discipline.' The Greek
      παιδεία can mean training, upbringing, or discipline.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεδρεύσωμεν
  chosen: let us lie in wait
  alternatives:
  - let us ambush
  - let us set a trap for
  lexicon: LSJ
  rationale: The hortatory subjunctive calls for a first-person plural exhortation.
    'Lie in wait' preserves the plotting sense without over-specifying the method
    of attack; 'ambush' is possible but slightly more concrete than the broader Greek
    idiom.
- source_word: τὸν δίκαιον
  chosen: the righteous man
  alternatives:
  - the righteous one
  - the just man
  lexicon: LSJ
  rationale: The articular singular refers to a representative righteous person. 'Righteous
    man' is natural English and preserves the masculine singular of the Greek, in
    keeping with the project's gender-accurate policy. 'Righteous one' is possible
    but less idiomatic here.
- source_word: δύσχρηστος
  chosen: troublesome
  alternatives:
  - inconvenient
  - useless
  - hard to deal with
  lexicon: LSJ
  rationale: In context the sense is not 'useless' but 'difficult/irksome to deal
    with.' 'Troublesome' captures the moral irritation the wicked feel toward the
    righteous.
- source_word: ἐναντιοῦται
  chosen: opposes
  alternatives:
  - sets himself against
  - is hostile to
  lexicon: LSJ
  rationale: '''Opposes'' is concise and fits the direct conflict described. It preserves
    the active resistance implied by the middle/passive form in context.'
- source_word: τοῖς ἔργοις ἡμῶν
  chosen: our deeds
  alternatives:
  - our works
  - what we do
  lexicon: LSJ
  rationale: '''Deeds'' is readable modern English and retains the moral coloring
    of ἔργα in this accusatory context better than the more neutral ''what we do.'''
- source_word: ὀνειδίζει
  chosen: reproaches
  alternatives:
  - rebukes
  - taunts
  - casts in our teeth
  lexicon: LSJ
  rationale: '''Reproaches'' best reflects verbal censure without importing the sharper
    mockery of ''taunts.'''
- source_word: ἁμαρτήματα νόμου
  chosen: sins against the law
  alternatives:
  - transgressions of the law
  - sins of the law
  lexicon: LSJ
  rationale: 'The genitive is best taken as objective or relational: sins committed
    against the law. ''Transgressions of the law'' is also strong, but ''sins against
    the law'' is slightly more accessible while preserving the legal-moral force.'
- source_word: ἐπιφημίζει
  chosen: charges us with
  alternatives:
  - accuses us of
  - publishes against us
  - brings against us
  lexicon: LSJ
  rationale: The verb here carries the sense of making an accusation or imputation.
    'Charges us with' fits the forensic tone and avoids overcommitting to a public-proclamation
    nuance.
- source_word: ἁμαρτήματα παιδείας ἡμῶν
  chosen: sins against our training
  alternatives:
  - offenses against our upbringing
  - failings of our discipline
  - sins of our instruction
  lexicon: LSJ
  rationale: παιδεία can mean upbringing, training, or discipline. In this context
    the wicked resent being accused not only of legal violations but also of betraying
    the moral formation they received. 'Training' is concise and understandable, though
    the phrase remains somewhat compressed in Greek as well.
