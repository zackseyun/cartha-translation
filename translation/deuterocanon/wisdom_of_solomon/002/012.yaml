theological_decisions:
- issue: Rendering the representative singular τὸν δίκαιον
  chosen_reading: the righteous man
  alternative_readings:
  - the righteous one
  rationale: The verse speaks of a paradigmatic righteous person opposed by the wicked.
    Retaining the masculine singular reflects the Greek form and the project's gender-accurate
    policy, while not excluding broader representative force.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Interpreting παιδεία in a moral rather than merely educational sense
  chosen_reading: our training
  alternative_readings:
  - our upbringing
  - our discipline
  - our instruction
  rationale: The context is ethical accusation. 'Training' preserves the formative
    sense of παιδεία without narrowing it to formal schooling. The phrase likely refers
    to the standards inculcated in them, which they are accused of violating.
