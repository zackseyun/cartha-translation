translation:
  text: Let us crown ourselves with rosebuds before they wither.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let us wreath ourselves with rose blossoms before they fade.' The Greek
      combines 'roses' with a term for buds or flower-cups, yielding the sense of
      fresh rosebuds/blossoms.
    reason: lexical_alternative
lexical_decisions:
- source_word: στεψώμεθα
  chosen: Let us crown ourselves
  alternatives:
  - Let us wreath ourselves
  - Let us garland ourselves
  lexicon: LSJ
  rationale: Aorist subjunctive in hortatory sense, from στεφόω/στέφω family, expressing
    self-adornment with a crown or wreath. 'Crown ourselves' is natural English and
    preserves the imagery of festive self-decoration better than a flatter 'adorn
    ourselves.'
- source_word: ῥόδων
  chosen: with rosebuds
  alternatives:
  - with roses
  - of roses
  lexicon: LSJ
  rationale: Genitive plural of ῥόδον, 'rose.' Because it is paired with κάλυξιν,
    the phrase refers not to full flowers generally but specifically to rose buds/blossoms.
    Rendering the phrase together as 'with rosebuds' communicates the intended image
    idiomatically.
- source_word: κάλυξιν
  chosen: rosebuds
  alternatives:
  - buds
  - calyxes
  - blossoms
  lexicon: LSJ
  rationale: κάλυξ can denote bud, husk, or calyx. In collocation with ῥόδων it most
    naturally means the buds of roses. 'Calyxes' would be overly technical; 'blossoms'
    is possible but less precise than 'buds,' especially given the following 'before
    they wither.'
- source_word: πρὶν ἢ
  chosen: before
  alternatives:
  - before ever
  - ere
  lexicon: LSJ
  rationale: Standard temporal conjunction introducing the event to be anticipated.
    'Before' is the clear modern equivalent.
- source_word: μαρανθῆναι
  chosen: they wither
  alternatives:
  - they fade
  - they shrivel
  lexicon: LSJ
  rationale: Aorist passive infinitive of μαραίνω, 'to wither/fade.' 'Wither' preserves
    the vegetal imagery more concretely than 'fade,' which can sound merely visual.
