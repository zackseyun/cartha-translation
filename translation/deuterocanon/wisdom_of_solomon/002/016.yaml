theological_decisions:
- issue: Meaning of πατέρα θεόν with ἀλαζονεύεται
  chosen_reading: the wicked accuse the righteous man of boasting that God is his
    father
  alternative_readings:
  - he boasts of God as Father
  - he boasts that he has God for father
  rationale: The phrase is not a doctrinal assertion by the narrator but part of the
    wicked's complaint about the righteous man. The translation makes explicit the
    relational claim without importing later christological specificity.
  doctrine_reference: Preserve theological tension rather than resolve it.
