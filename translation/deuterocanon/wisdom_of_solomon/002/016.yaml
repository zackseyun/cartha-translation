translation:
  text: We were regarded by him as counterfeit, and he keeps away from our ways as
    from uncleannesses; he pronounces the end of the righteous blessed, and boasts
    that God is his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''spurious,'' ''false,'' or ''base'': the Greek says he regarded them
      as not genuine.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the final state' or 'the outcome of the righteous.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'boasts [of] father God'; that is, he claims God as his father.
    reason: lexical_alternative
lexical_decisions:
- source_word: κίβδηλον
  chosen: counterfeit
  alternatives:
  - base
  - 'false'
  - spurious
  lexicon: LSJ
  rationale: The adjective/noun denotes something not genuine, often counterfeit or
    base metal. In context it describes how the wicked think the righteous man treats
    them—as morally false or impure. 'Counterfeit' preserves the metaphor of falseness
    more vividly than the flatter 'false'.
- source_word: ἐλογίσθημεν
  chosen: were regarded
  alternatives:
  - were considered
  - were reckoned
  lexicon: LSJ
  rationale: Passive of λογίζομαι here conveys being counted or considered in someone's
    judgment. 'Were regarded' is idiomatic modern English and preserves the evaluative
    sense.
- source_word: ἀπέχεται
  chosen: keeps away
  alternatives:
  - holds aloof
  - stays away
  - abstains
  lexicon: LSJ
  rationale: The verb means to be away from or keep oneself from. Because it governs
    'our ways,' 'keeps away from' best captures deliberate separation without sounding
    archaic.
- source_word: ὁδῶν
  chosen: ways
  alternatives:
  - paths
  - conduct
  lexicon: LSJ
  rationale: '''Ways'' preserves the common biblical metaphor for manner of life while
    remaining natural English.'
- source_word: ἀκαθαρσιῶν
  chosen: uncleannesses
  alternatives:
  - impurities
  - unclean things
  lexicon: LSJ
  rationale: Plural noun stressing things considered defiling. 'Uncleannesses' is
    slightly marked in English but preserves both the plural and the purity-language
    register of the Greek better than the more abstract 'impurities'.
- source_word: μακαρίζει
  chosen: pronounces ... blessed
  alternatives:
  - calls ... blessed
  - declares happy
  lexicon: LSJ
  rationale: The verb means to deem or call blessed. 'Pronounces ... blessed' keeps
    the formal evaluative force and avoids reducing μακάριος to mere subjective happiness.
- source_word: ἔσχατα
  chosen: the end
  alternatives:
  - the final state
  - the last things
  - the outcome
  lexicon: LSJ
  rationale: The plural can denote final things or end-state. In this context of contrasting
    destinies, 'the end' is concise and idiomatic, while still allowing the sense
    of final outcome.
- source_word: δικαίων
  chosen: the righteous
  alternatives:
  - the just
  - righteous people
  lexicon: LSJ
  rationale: Standard rendering that preserves the moral-religious category without
    unnecessary expansion.
- source_word: ἀλαζονεύεται
  chosen: boasts
  alternatives:
  - claims proudly
  - vaunts himself
  lexicon: LSJ
  rationale: The verb carries the sense of arrogant boasting. 'Boasts' is clear modern
    English and preserves the negative tone.
- source_word: πατέρα θεόν
  chosen: that God is his father
  alternatives:
  - of God as father
  - that he has God as father
  lexicon: LSJ
  rationale: The accusative phrase after ἀλαζονεύεται is compressed Greek. The sense
    is that he boasts concerning God as father, i.e., claims God as his father. 'That
    God is his father' is the most natural English unpacking.
