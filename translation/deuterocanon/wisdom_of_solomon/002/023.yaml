theological_decisions:
- issue: Anthropological scope of τὸν ἄνθρωπον
  chosen_reading: Representative singular 'man' referring to humanity
  alternative_readings:
  - humankind
  - the human being
  rationale: The verse speaks in a generalized anthropological claim, likely echoing
    creation theology. 'Man' preserves the singular representative force and aligns
    with the project's gender-accurate policy.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms אָדָם
    analogously 'man / humankind (context)'.
- issue: Meaning of ἀφθαρσία in this context
  chosen_reading: incorruptibility
  alternative_readings:
  - immortality
  - imperishability
  rationale: The term includes freedom from decay and death; 'incorruptibility' preserves
    the broader semantic range and avoids importing a narrower philosophical account
    of the soul's immortality.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6.
- issue: Sense of τῆς ἰδίας ἰδιότητος
  chosen_reading: his own nature
  alternative_readings:
  - his own likeness
  - his own distinctiveness
  - his own being
  rationale: The phrase is unusual and can be rendered several ways. 'His own nature'
    best communicates that the image borne by man corresponds to something proper
    to God, while remaining readable modern English. Alternatives are preserved in
    a footnote because the phrase is lexically difficult.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6.
