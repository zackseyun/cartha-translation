translation:
  text: For God created man for incorruptibility, and made him an image of his own
    nature.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for immortality' or 'for imperishability.' The Greek term includes the
      sense of not being subject to decay or death.
    reason: lexical_alternative
  - marker: b
    text: Or 'an image of his own distinctiveness' or 'an image of his own being.'
      The Greek phrase is unusual and admits more than one close rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκτισε
  chosen: created
  alternatives:
  - formed
  - made
  lexicon: BDAG
  rationale: κτίζω in this context denotes bringing into being; 'created' is the most
    natural and theologically transparent English rendering.
- source_word: τὸν ἄνθρωπον
  chosen: man
  alternatives:
  - humankind
  - the human being
  lexicon: BDAG
  rationale: The singular with article refers representatively to humanity in Adamic
    terms. Per doctrine, gender-accurate rendering is preferred where the source uses
    masculine representative language; 'man' preserves that force better than a flattened
    plural or abstract collective.
- source_word: ἐπʼ ἀφθαρσίᾳ
  chosen: for incorruptibility
  alternatives:
  - for immortality
  - for imperishability
  lexicon: BDAG
  rationale: ἀφθαρσία denotes a state not subject to decay or corruption. 'Incorruptibility'
    stays close to the Greek and preserves the conceptual link to deathlessness without
    overnarrowing it to mere endless existence. 'Immortality' is possible but slightly
    more interpretive.
- source_word: εἰκόνα
  chosen: an image
  alternatives:
  - the image
  - a likeness
  lexicon: BDAG
  rationale: The anarthrous accusative is well rendered with an indefinite sense in
    English here. 'Image' preserves the Genesis resonance more directly than 'likeness.'
- source_word: τῆς ἰδίας ἰδιότητος
  chosen: of his own nature
  alternatives:
  - of his own distinctiveness
  - of his own being
  - of his own likeness
  lexicon: LSJ
  rationale: ἰδιότης can denote one's own particular nature or distinctive property.
    'Of his own nature' is idiomatic English and best conveys that humanity reflects
    something proper to God himself. 'Distinctiveness' is too abstract; 'likeness'
    would blur the distinction from εἰκών.
- source_word: ἐποίησεν αὐτόν
  chosen: made him
  alternatives:
  - fashioned him
  lexicon: BDAG
  rationale: ποιέω here is straightforwardly 'made.' Keeping 'made him' avoids unnecessary
    stylistic inflation and preserves the parallelism with the prior clause.
