translation:
  text: Let us oppress the righteous poor man; let us not spare the widow, nor show
    regard for the gray hairs of an old man advanced in years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the just poor man.' Greek πένητα δίκαιον may be rendered with both adjectives
      closely linked to the same individual.
    reason: lexical_alternative
  - marker: b
    text: Literally 'nor should we show regard for the gray hairs of an old man of
      many years.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταδυναστεύσωμεν
  chosen: let us oppress
  alternatives:
  - let us exploit
  - let us tyrannize over
  lexicon: BDAG
  rationale: The verb denotes exercising power harshly or oppressively over someone.
    'Oppress' is natural English and preserves the coercive force without over-paraphrase.
- source_word: πένητα
  chosen: poor man
  alternatives:
  - needy man
  - destitute man
  lexicon: LSJ
  rationale: πένης refers to a poor or needy person. Because the Greek is masculine
    singular and paired with δίκαιον, 'poor man' best reflects the grammar and the
    individualized target of abuse.
- source_word: δίκαιον
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: LSJ
  rationale: δίκαιος commonly means 'righteous' or 'just.' Here 'righteous' preserves
    the moral contrast developed in Wisdom 2 more clearly than the somewhat more civic-sounding
    'just.'
- source_word: μὴ φεισώμεθα
  chosen: let us not spare
  alternatives:
  - let us show no pity to
  - let us not refrain from harming
  lexicon: BDAG
  rationale: The idiom with φείδομαι means to spare or refrain from harming. 'Let
    us not spare' is concise and close to the Greek.
- source_word: χήρας
  chosen: the widow
  alternatives:
  - a widow
  lexicon: LSJ
  rationale: Although anarthrous in Greek, English idiom often uses the generic singular
    with the article for a representative vulnerable class. 'The widow' fits the proverbial,
    class-based force of the line.
- source_word: μηδὲ ... ἐντραπῶμεν
  chosen: nor show regard for
  alternatives:
  - nor feel shame before
  - nor respect
  - nor defer to
  lexicon: BDAG
  rationale: ἐντρέπομαι can mean feel shame, respect, or show deference depending
    on context. Here the object is the old man's gray hairs, so the sense is not inward
    embarrassment but outward regard or deference.
- source_word: πρεσβύτου
  chosen: an old man
  alternatives:
  - an elder
  - an aged man
  lexicon: LSJ
  rationale: In this context the term refers to age rather than office. 'Old man'
    is the clearest natural rendering.
- source_word: πολιάς
  chosen: the gray hairs
  alternatives:
  - gray head
  - white hairs
  lexicon: LSJ
  rationale: The noun refers to gray hair as a mark of age. Rendering it explicitly
    preserves the concrete image in the Greek.
- source_word: πολυχρονίους
  chosen: advanced in years
  alternatives:
  - of many years
  - long-lived
  lexicon: LSJ
  rationale: This adjective intensifies the old age already mentioned. 'Advanced in
    years' is idiomatic English that preserves the emphasis without awkward repetition.
