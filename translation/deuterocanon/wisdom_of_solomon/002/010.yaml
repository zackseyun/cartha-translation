theological_decisions:
- issue: Rendering δίκαιον in Wisdom's contrast between the wicked and their victim
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: The verse participates in Wisdom 2's broader portrayal of hostility toward
    the morally upright person. 'Righteous' better preserves that ethical-religious
    contrast in English, while 'just' remains a viable lexical alternative.
