theological_decisions:
- issue: Identity of διάβολος
  chosen_reading: a personal evil figure, rendered 'the devil'
  alternative_readings:
  - a generic slanderer/accuser
  rationale: The verse presents death's entrance into the world as resulting from
    the envy of διάβολος. In Wisdom's literary and theological context, this is best
    read as the devil rather than an ordinary human slanderer. Rendering it generically
    would undertranslate the established Jewish-Greek usage here.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without importing beyond the text'
- issue: Sense of πειράζουσιν αὐτόν
  chosen_reading: those aligned with the devil experience death
  alternative_readings:
  - they test him
  - they tempt him, with αὐτόν taken as death personified
  rationale: The Greek verb commonly means test/tempt, but with death as object the
    idiom points to coming under death's reality rather than actively tempting a personified
    death. The chosen rendering communicates the clause's likely sense in clear English
    while noting the more literal alternative in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity
    in footnotes where needed'
