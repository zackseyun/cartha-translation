translation:
  text: But through the devil’s envy death entered into the world, and those who belong
    to his portion experience it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'those who are of his portion test it/him.' The Greek
      idiom is difficult; the sense is likely that those aligned with the devil come
      under death's power.
    reason: lexical_alternative
lexical_decisions:
- source_word: φθόνῳ
  chosen: through ... envy
  alternatives:
  - because of ... envy
  - by ... envy
  lexicon: BDAG
  rationale: The dative is instrumental/causal here. 'Through ... envy' preserves
    the means/cause relation in natural English without overinterpreting.
- source_word: διαβόλου
  chosen: the devil’s
  alternatives:
  - the slanderer’s
  - the accuser’s
  lexicon: BDAG
  rationale: In this Jewish-Greek wisdom context, διάβολος functions as the personal
    evil figure traditionally rendered 'the devil,' not merely a generic 'slanderer.'
    This best matches the verse's theological force in context.
- source_word: θάνατος
  chosen: death
  lexicon: BDAG
  rationale: Straightforward lexical rendering; no contextual reason to narrow or
    expand beyond 'death.'
- source_word: εἰσῆλθεν εἰς τὸν κόσμον
  chosen: entered into the world
  alternatives:
  - came into the world
  - entered the world
  lexicon: BDAG
  rationale: A fairly formal rendering that preserves the motion imagery of εἰσέρχομαι
    with acceptable English style.
- source_word: πειράζουσιν
  chosen: experience
  alternatives:
  - test
  - try
  - tempt
  lexicon: BDAG
  rationale: Here the direct object is αὐτόν, referring back to death. English 'tempt
    death' or 'test death' is unnatural and misleading. In context the sense is that
    those aligned with the devil come under death's power or taste it; 'experience
    it' conveys the idiomatic force without paraphrasing beyond the clause's evident
    meaning.
- source_word: αὐτὸν
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: The pronoun most naturally refers to θάνατος ('death'), which is masculine
    in Greek but in English is ordinarily referred to as 'it' unless personified.
    No strong personification is required here.
- source_word: οἱ τῆς ἐκείνου μερίδος ὄντες
  chosen: those who belong to his portion
  alternatives:
  - those who are of his party
  - those who belong to his side
  - those who are his lot
  lexicon: BDAG
  rationale: μερίς denotes share, portion, or assigned part. The phrase identifies
    people as belonging to the devil's side or allotment. 'Belong to his portion'
    stays close to the Greek while remaining intelligible; alternatives are preserved
    because the idiom is not transparent in English.
