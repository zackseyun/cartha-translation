theological_decisions:
- issue: Whether to make the moral sense of βίος and τρίβοι explicit in the main text
  chosen_reading: Retain the concrete terms 'life' and 'paths' without interpretive
    expansion.
  alternative_readings:
  - for his way of life is unlike that of others, and his ways are different
  rationale: The verse criticizes the righteous man's distinctive conduct, but the
    Greek expresses this through ordinary terms and metaphor. Preserving that imagery
    avoids over-interpreting while still communicating the sense.
