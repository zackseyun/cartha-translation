translation:
  text: for his life is unlike that of others, and his ways are different.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for his way of life is unlike that of others, and his ways are different.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνόμοιος
  chosen: unlike
  alternatives:
  - different from
  - dissimilar to
  lexicon: LSJ
  rationale: The adjective means 'unlike, dissimilar.' 'Unlike' is concise and natural
    in English while preserving the comparative force with τοῖς ἄλλοις.
- source_word: βίος
  chosen: life
  alternatives:
  - way of life
  - mode of life
  lexicon: LSJ
  rationale: βίος can denote life in the sense of manner of living or course of life.
    'Life' is the most direct rendering here; the following clause about his paths
    clarifies that conduct is in view.
- source_word: ἐξηλλαγμέναι
  chosen: are changed
  alternatives:
  - have been altered
  - are different
  lexicon: LSJ
  rationale: 'The perfect passive participle of ἐξαλλάσσω conveys a state resulting
    from change: ''changed/altered.'' ''Are changed'' preserves the verbal idea more
    transparently than the flatter ''are different.'''
- source_word: τρίβοι
  chosen: paths
  alternatives:
  - ways
  - tracks
  lexicon: LSJ
  rationale: τρίβοι literally refers to paths or beaten tracks and metaphorically
    to one's ways of conduct. 'Paths' keeps the metaphor vivid and pairs well with
    the preceding reference to life.
