theological_decisions:
- issue: Moral causation of blindness
  chosen_reading: their own wickedness blinded them
  alternative_readings:
  - wickedness blinded them
  - their malice blinded them
  rationale: The Greek explicitly attributes their delusion to their own moral corruption.
    The translation preserves this theological-moral claim without expanding it into
    a doctrine of divine hardening or external deception, neither of which is stated
    here.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
