theological_decisions:
- issue: Sense of ἀγερωχίας in a hedonistic speech
  chosen_reading: our revelry
  alternative_readings:
  - our pride
  - our arrogance
  - our boastfulness
  rationale: The immediate literary context in Wisdom 2 is the speech of the ungodly
    urging enjoyment of pleasures before death. Rendering the term as 'revelry' best
    fits that flow, while the more negative moral nuance remains implicit in the broader
    speech. The alternatives are preserved because the Greek term can elsewhere carry
    the sense of arrogance or haughtiness.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    significant ambiguity in documentation'
