theological_decisions:
- issue: Anthropological claim of the wicked about human origin and destiny
  chosen_reading: Render the statement straightforwardly as the speakers' nihilistic
    assertion without softening or endorsing it.
  alternative_readings:
  - Interpret αὐτοσχεδίως more weakly as 'spontaneously' without the sense of chance
  - Render λόγος as 'word' to keep a more literal but less contextual sense
  rationale: The verse reports the worldview of the ungodly in Wisdom 2, not the book's
    own doctrine. The translation should preserve the force of their denial of purposeful
    creation and afterlife while not importing later theological categories.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
