translation:
  text: because we came into being by mere chance, and after this we will be as though
    we had not existed; because the breath in our nostrils is smoke, and reason is
    a spark in the beating of our heart,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spontaneously' or 'randomly' for 'by mere chance.'
    reason: lexical_alternative
  - marker: b
    text: Or 'word' for 'reason'; the Greek term can mean speech, word, or rational
      thought depending on context.
    reason: lexical_alternative
  - marker: c
    text: Literally 'in the movement of our heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοσχεδίως
  chosen: by mere chance
  alternatives:
  - spontaneously
  - randomly
  - accidentally
  lexicon: LSJ
  rationale: The adverb conveys something happening of itself, offhand, or by chance.
    In this context of the ungodly denying purposeful origin, 'by mere chance' best
    captures the nihilistic claim without sounding overly colloquial.
- source_word: ἐγενήθημεν
  chosen: we came into being
  alternatives:
  - we were born
  - we were made
  lexicon: BDAG
  rationale: Aorist passive/middle of γίνομαι here speaks broadly of coming into existence,
    not specifically physical birth alone. 'Came into being' preserves that wider
    ontological sense.
- source_word: μετὰ τοῦτο ἐσόμεθα ὡς οὐχ ὑπάρξαντες
  chosen: after this we will be as though we had not existed
  alternatives:
  - afterward we shall be as if we had never been
  - after this we will be like those who do not exist
  lexicon: BDAG
  rationale: The phrase expresses postmortem nonexistence from the speakers' perspective.
    'As though we had not existed' is idiomatic English and preserves the comparative
    force of ὡς with the participle.
- source_word: καπνὸς
  chosen: smoke
  alternatives:
  - vapor
  lexicon: LSJ
  rationale: The noun ordinarily means 'smoke.' While 'vapor' could stress transience,
    'smoke' is the plain lexical sense and fits the imagery of something insubstantial
    and vanishing.
- source_word: πνοὴ
  chosen: the breath
  alternatives:
  - breathing
  - breath of life
  lexicon: BDAG
  rationale: πνοή denotes breath or breathing. 'The breath' is the most natural rendering
    here and keeps the image concrete.
- source_word: ἐν ῥισὶν ἡμῶν
  chosen: in our nostrils
  alternatives:
  - in our noses
  lexicon: LSJ
  rationale: ῥίς means nose/nostril. English idiom prefers 'nostrils' in elevated
    or literary contexts, especially with breath imagery.
- source_word: λόγος
  chosen: reason
  alternatives:
  - word
  - speech
  - thought
  lexicon: BDAG
  rationale: Although λόγος often means 'word' or 'speech,' here the surrounding anthropology
    and parallel with heart-motion favor the inner rational principle or thought-process.
    'Reason' best fits the argument about human life being momentary and material.
- source_word: σπινθὴρ
  chosen: a spark
  alternatives:
  - spark of fire
  lexicon: LSJ
  rationale: The noun straightforwardly denotes a spark. No expansion is needed in
    English.
- source_word: ἐν κινήσει καρδίας ἡμῶν
  chosen: in the beating of our heart
  alternatives:
  - in the movement of our heart
  - in our heart's motion
  lexicon: LSJ
  rationale: κίνησις is 'movement' or 'motion.' In context, with breath and bodily
    life, rendering it as 'beating' makes the physiological image intelligible in
    modern English while remaining faithful to the underlying sense of motion.
