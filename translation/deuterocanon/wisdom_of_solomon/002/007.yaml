translation:
  text: Let us fill ourselves with costly wine and perfumes, and let no flower of
    spring pass us by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ointments' or 'fragrant oils' for 'perfumes' (μύρων). The Greek term
      refers broadly to scented oils or unguents used for luxury.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴνου
  chosen: wine
  alternatives:
  - the wine
  lexicon: LSJ
  rationale: Genitive with πλησθῶμεν expresses what they propose to be filled with;
    simple 'wine' is natural English and preserves the indulgent sense.
- source_word: πολυτελοῦς
  chosen: costly
  alternatives:
  - expensive
  - luxurious
  - precious
  lexicon: LSJ
  rationale: The adjective denotes high cost/value. 'Costly' is concise, idiomatic,
    and fits the hedonistic tone better than the more modern-sounding 'expensive.'
- source_word: μύρων
  chosen: perfumes
  alternatives:
  - ointments
  - fragrant oils
  lexicon: LSJ
  rationale: μύρον can denote perfumed oil/ointment. 'Perfumes' communicates luxury
    and sensual indulgence clearly in modern English, while 'ointments' would sound
    medicinal in this context.
- source_word: πλησθῶμεν
  chosen: let us fill ourselves with
  alternatives:
  - let us be filled with
  - let us have our fill of
  lexicon: LSJ
  rationale: First person plural hortatory subjunctive. 'Let us fill ourselves with'
    preserves both the exhortational force and the reflexive sense of self-indulgence.
- source_word: μὴ παροδευσάτω ἡμᾶς
  chosen: let no ... pass us by
  alternatives:
  - let not ... escape us
  - let not ... go past us
  lexicon: LSJ
  rationale: The aorist imperative with μή expresses prohibition. 'Pass us by' is
    idiomatic and captures the sense that they do not want to miss any pleasure.
- source_word: ἄνθος ἔαρος
  chosen: flower of spring
  alternatives:
  - spring flower
  - blossom of spring
  lexicon: LSJ
  rationale: A literal rendering preserves the poetic imagery. 'Flower of spring'
    sounds slightly elevated, matching Wisdom's style, while remaining clear.
