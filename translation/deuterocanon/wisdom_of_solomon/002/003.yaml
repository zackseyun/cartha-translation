theological_decisions:
- issue: Anthropological sense of πνεῦμα in a skeptical speech about death
  chosen_reading: the spirit
  alternative_readings:
  - the breath
  - the life-breath
  rationale: The verse contrasts body and πνεῦμα and describes postmortem dissolution.
    Rendering πνεῦμα as 'spirit' preserves the body/spirit pairing present in the
    Greek while not forcing a later doctrinal claim about an immortal soul; the following
    simile ('like thin air') signals the speaker's view that it dissipates.
  doctrine_reference: Preserve theological tension rather than resolve it.
