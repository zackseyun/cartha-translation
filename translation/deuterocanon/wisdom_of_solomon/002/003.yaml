translation:
  text: when it is extinguished, the body will turn to ashes, and the spirit will
    be dispersed like thin air.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breath' or 'the life-breath' for 'the spirit.' The Greek πνεῦμα
      can carry both senses here.
    reason: lexical_alternative
  - marker: b
    text: Literally 'like loose/light air'; the phrase conveys something insubstantial
      and quickly dispersed.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ σβεσθέντος
  chosen: when it is extinguished
  alternatives:
  - when this has gone out
  - after it is quenched
  lexicon: LSJ
  rationale: Genitive absolute from σβέννυμι, referring back to the life-breath/fire
    imagery in the preceding context. 'When it is extinguished' preserves the metaphor
    without over-specifying the antecedent in this verse alone.
- source_word: τέφρα ἀποβήσεται
  chosen: will turn to ashes
  alternatives:
  - will become ash
  - will end up as ashes
  lexicon: LSJ
  rationale: ἀποβαίνω here means to turn out/become; with τέφρα the idiomatic sense
    is transformation into ashes. 'Turn to ashes' is natural English and closely reflects
    the Greek.
- source_word: τὸ σῶμα
  chosen: the body
  alternatives:
  - our body
  - the corpse
  lexicon: LSJ
  rationale: The Greek has the singular with article. 'The body' is the direct and
    sufficiently general rendering; 'our body' imports the broader context, and 'corpse'
    is too interpretive.
- source_word: τὸ πνεῦμα
  chosen: the spirit
  alternatives:
  - the breath
  - the life-breath
  lexicon: LSJ
  rationale: πνεῦμα can denote spirit, breath, or wind. In this anthropological context
    paired with body and followed by an air simile, 'spirit' best preserves the text's
    existential claim while allowing the breath/life-force nuance to remain audible.
- source_word: διαχυθήσεται
  chosen: will be dispersed
  alternatives:
  - will be poured out
  - will be scattered
  lexicon: LSJ
  rationale: Future passive of διαχέω. 'Dispersed' fits the image of something diffusing
    into the air better than the more literal but less idiomatic 'poured out.'
- source_word: ὡς χαῦνος ἀήρ
  chosen: like thin air
  alternatives:
  - like insubstantial air
  - like light air
  lexicon: LSJ
  rationale: χαῦνος conveys looseness, lightness, emptiness, or insubstantiality.
    'Like thin air' is a concise English equivalent that captures the idea of something
    diffuse and unsubstantial, not merely atmospheric air in general.
