translation:
  text: He claims to have knowledge of God, and calls himself a child of the Lord;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a son of the Lord'; the Greek παῖς can also mean 'servant' in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγγέλλεται
  chosen: claims
  alternatives:
  - professes
  - promises
  - declares
  lexicon: BDAG
  rationale: In context the verb describes what the wicked say about the righteous
    man's self-presentation. 'Claims' captures an asserted profession without implying
    that the claim is true or false. 'Promises' is a common sense of the verb elsewhere
    but does not fit this object clause well here.
- source_word: γνῶσιν ἔχειν θεοῦ
  chosen: to have knowledge of God
  alternatives:
  - to know God
  - to possess knowledge of God
  lexicon: BDAG
  rationale: The Greek is literally 'to have knowledge of God.' This is slightly more
    formal than simply 'to know God' and preserves the noun γνῶσις, while remaining
    natural English.
- source_word: θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: Anarthrous genitive after γνῶσιν ἔχειν is best rendered simply 'of God.'
    No article-based distinction needs to be imported into English.
- source_word: παῖδα
  chosen: child
  alternatives:
  - son
  - servant
  lexicon: BDAG
  rationale: παῖς can mean 'child,' 'son,' or 'servant' depending on context. Here,
    with ἑαυτὸν ὀνομάζει and Κυρίου, the familial sense is most natural in Wisdom's
    rhetoric about the righteous person's relation to God. 'Child' preserves the lexical
    breadth without over-specifying male sonship.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  - the Lord God
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' The article is
    represented naturally in English as 'the Lord.' This also distinguishes the title
    from the preceding θεοῦ while preserving the Greek wording.
- source_word: ἑαυτὸν ὀνομάζει
  chosen: calls himself
  alternatives:
  - names himself
  - calls himself by the name
  lexicon: BDAG
  rationale: This is the most idiomatic English rendering of the reflexive construction
    and preserves the force of self-designation.
