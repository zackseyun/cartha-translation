theological_decisions:
- issue: Rendering παῖδα Κυρίου in a context that can evoke filial or servant language
  chosen_reading: a child of the Lord
  alternative_readings:
  - a son of the Lord
  - a servant of the Lord
  rationale: The immediate context emphasizes claimed special relationship to God
    rather than service status. 'Child' preserves the filial idea without importing
    a male-specific nuance not explicit in English, while still reflecting the singular
    παῖς. Because παῖς is semantically broad, alternatives are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Consistency
    of key terms, or documented exception'
- issue: Rendering κύριος
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: This follows the project's default rendering for κύριος. The English
    article reflects the Greek genitive Κυρίου in this construction and reads naturally.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — κύριος → Lord'
