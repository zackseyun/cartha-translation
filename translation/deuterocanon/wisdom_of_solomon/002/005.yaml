theological_decisions:
- issue: Whether τελευτή should be rendered explicitly as 'death' or more broadly
    as 'end'
  chosen_reading: end
  alternative_readings:
  - death
  rationale: The Greek term can denote death, but the verse's rhetoric emphasizes
    finality and irreversibility rather than naming death with maximal explicitness.
    'End' preserves that breadth while the context still clearly refers to mortality.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Whether the final clause should imply impossibility of return from death
    in a doctrinally sharpened way
  chosen_reading: no one returns
  alternative_readings:
  - no one turns back
  rationale: The Greek states the claim starkly without further doctrinal elaboration.
    'No one returns' is natural English and preserves the speaker's assertion without
    importing later theological categories.
  doctrine_reference: Translation philosophy §3, §6
