translation:
  text: For our life is the passing of a shadow, and there is no turning back from
    our end, because it has been sealed, and no one turns back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no return from our death.' The Greek uses terms that can be
      rendered more explicitly in relation to death, but the main text keeps the broader
      wording 'end.'
    reason: lexical_alternative
  - marker: b
    text: Or 'no one turns back.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκιᾶς
  chosen: shadow
  alternatives:
  - shade
  lexicon: LSJ
  rationale: The genitive with πάροδος forms the image 'the passing of a shadow.'
    'Shadow' is the natural English equivalent and preserves the metaphor of transience.
- source_word: πάροδος
  chosen: the passing
  alternatives:
  - a passing
  - passage
  - transit
  lexicon: LSJ
  rationale: πάροδος denotes a passing by or transit. 'The passing' gives idiomatic
    English while keeping the metaphorical force that life is fleeting like a shadow's
    movement.
- source_word: βίος
  chosen: life
  alternatives:
  - way of life
  - livelihood
  lexicon: LSJ
  rationale: In context βίος refers to human life/existence, not livelihood. 'Life'
    is the plain and contextually appropriate rendering.
- source_word: ἀναποδισμός
  chosen: turning back
  alternatives:
  - return
  - reversal
  - retracing
  lexicon: LSJ
  rationale: This rare noun conveys the idea of going back or reversal. 'Turning back'
    best fits the clause 'there is no turning back from our end' and avoids overinterpreting
    it as resurrection language in itself.
- source_word: τελευτή
  chosen: end
  alternatives:
  - death
  - completion
  lexicon: LSJ
  rationale: τελευτή can mean end or death. Here 'our end' preserves the broader sense
    while still naturally implying death in context; it also matches the following
    statement about irreversibility.
- source_word: κατεσφραγίσθη
  chosen: has been sealed
  alternatives:
  - was sealed
  - has been fixed
  lexicon: LSJ
  rationale: The passive of σφραγίζω literally means 'to seal.' 'Has been sealed'
    preserves the completed, fixed character of the condition without adding explanatory
    theology.
- source_word: ἀναστρέφει
  chosen: returns
  alternatives:
  - turns back
  - comes back
  lexicon: LSJ
  rationale: In this context the verb expresses coming back/returning. 'Returns' is
    concise and idiomatic after the statement that the end is sealed.
