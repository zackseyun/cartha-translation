theological_decisions:
- issue: Moral characterization of the righteous man's response under persecution
  chosen_reading: 'Render ἐπιείκεια and ἀνεξικακία as distinct virtues: ''gentleness''
    and ''forbearance.'''
  alternative_readings:
  - '''meekness'' and ''patience'''
  - '''clemency'' and ''longsuffering'''
  rationale: The verse presents the wicked as proposing to expose two related but
    distinct qualities in the righteous man. Keeping separate English terms preserves
    the rhetorical parallelism and avoids flattening the ethical texture.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
