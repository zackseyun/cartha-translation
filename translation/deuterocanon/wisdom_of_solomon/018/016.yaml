translation:
  text: bearing your sharp sword—your unfeigned command—and standing, he filled all
    things with death; and while he touched heaven, he had stepped upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sincere decree' or 'your uncompromising order' for 'your unfeigned
      command.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek portrays the agent in cosmic terms: touching heaven while standing
      on earth, emphasizing the all-encompassing reach of the judgment.'
    reason: cultural_note
lexical_decisions:
- source_word: ξίφος ὀξὺ
  chosen: your sharp sword
  alternatives:
  - a sharp sword
  lexicon: LSJ
  rationale: ξύφος/ξίφος denotes a sword; ὀξύ qualifies it as sharp. The possessive
    force is carried by the following σου with ἐπιταγήν, but in English the whole
    image is best rendered as the divine warrior bearing God's sharp sword, preserving
    the vivid martial metaphor without over-paraphrase.
- source_word: ἀνυπόκριτον
  chosen: unfeigned
  alternatives:
  - sincere
  - unhypocritical
  - without pretense
  lexicon: LSJ
  rationale: ἀνυπόκριτος means genuine, without hypocrisy or pretense. 'Unfeigned'
    preserves the elevated tone and the sense that the command is utterly genuine
    and uncompromising.
- source_word: ἐπιταγήν
  chosen: command
  alternatives:
  - decree
  - order
  lexicon: LSJ
  rationale: ἐπιταγή is an authoritative command or order. 'Command' is clear modern
    English and fits the immediate context of divine judgment.
- source_word: φέρων
  chosen: bearing
  alternatives:
  - carrying
  lexicon: LSJ
  rationale: The participle is contemporaneous with the action and is naturally rendered
    'bearing,' which suits the solemn style.
- source_word: στὰς
  chosen: standing
  alternatives:
  - having stood
  - taking his stand
  lexicon: LSJ
  rationale: Aorist participle of ἵστημι. 'Standing' gives idiomatic English while
    retaining the image of the figure halting in place before judgment falls.
- source_word: ἐπλήρωσεν τὰ πάντα θανάτου
  chosen: he filled all things with death
  alternatives:
  - he filled everything with death
  - he filled the universe with death
  lexicon: LSJ
  rationale: The phrase is stark and comprehensive. τὰ πάντα is broad; 'all things'
    preserves the totalizing scope without specifying more than the Greek does.
- source_word: οὐρανοῦ μὲν ἥπτετο
  chosen: while he touched heaven
  alternatives:
  - he reached to heaven
  - he laid hold of heaven
  lexicon: LSJ
  rationale: ἅπτομαι means touch or take hold of. 'Touched heaven' preserves the cosmic
    imagery with minimal interpretive expansion.
- source_word: βέβηκει δʼ ἐπὶ γῆς
  chosen: he had stepped upon the earth
  alternatives:
  - he stood upon the earth
  - he strode upon the earth
  lexicon: LSJ
  rationale: βέβηκε/βέβηκει from βαίνω conveys having stepped or set foot. 'Had stepped
    upon the earth' preserves the perfect-like sense of established footing and the
    heaven-earth span of the figure.
