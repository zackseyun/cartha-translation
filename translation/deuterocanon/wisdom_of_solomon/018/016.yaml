theological_decisions:
- issue: Personification of the divine agent in the plague narrative
  chosen_reading: The verse depicts God's destructive word/command as a warrior-like
    agent bearing out divine judgment, without specifying a separate ontological being
    beyond the text.
  alternative_readings:
  - an angelic destroyer
  - a personified divine Word
  rationale: The immediate context personifies the divine command in martial imagery.
    The translation preserves the personification and cosmic scope without importing
    later doctrinal identifications not explicit in the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
