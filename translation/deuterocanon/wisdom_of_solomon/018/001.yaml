theological_decisions:
- issue: Referent of the implied subject in the participial and finite verbs after
    the semicolon
  chosen_reading: The Egyptians/hearers are the ones hearing the Israelites' voice
    without seeing their form, and then counting them blessed.
  alternative_readings:
  - The holy ones are the ones hearing another group's voice
  - The syntax is compressed and may summarize mutual perception
  rationale: The broader context contrasts God's treatment of the Egyptians and his
    people during the plague of darkness. The sequence most naturally describes the
    oppressors perceiving Israel indirectly and acknowledging their blessed state.
