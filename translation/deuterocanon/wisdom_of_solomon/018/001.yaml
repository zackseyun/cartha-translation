translation:
  text: But for your holy ones there was very great light; hearing their voice but
    not seeing their form, since they indeed had not suffered the same things, they
    counted them blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'saints' for 'holy ones.'
    reason: lexical_alternative
  - marker: b
    text: The Greek verb ἐπεπώθεισαν is difficult in context. Literally it often means
      'had longed for,' but here it is taken in context to mean they had undergone
      or suffered the same things, which explains why they then counted them blessed.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῖς ... ὁσίοις σου
  chosen: for your holy ones
  alternatives:
  - for your saints
  - for your faithful ones
  lexicon: LSJ
  rationale: ὅσιος denotes those who are devout/holy in relation to God. 'Holy ones'
    preserves the covenantal-religious sense without importing later ecclesiastical
    overtones that 'saints' may carry.
- source_word: μέγιστον ... φῶς
  chosen: very great light
  alternatives:
  - greatest light
  - a most great light
  lexicon: LSJ
  rationale: μέγιστον is the superlative of μέγας. In idiomatic English, 'very great
    light' communicates the force naturally while remaining close to the Greek.
- source_word: φωνὴν
  chosen: voice
  alternatives:
  - sound
  lexicon: LSJ
  rationale: φωνή can mean sound or voice; here 'their voice' fits the personal reference
    and the contrast with unseen μορφή.
- source_word: μορφὴν
  chosen: form
  alternatives:
  - appearance
  - shape
  lexicon: LSJ
  rationale: μορφή refers to visible form/appearance. 'Form' keeps the contrast with
    hearing but not seeing and avoids over-specifying physical features.
- source_word: ἐπεπώθεισαν
  chosen: had suffered the same things
  alternatives:
  - had experienced the same things
  - had longed for them
  lexicon: LSJ
  rationale: Although ποθέω commonly means 'long for,' in this context the clause
    points to the Egyptians' recognition that the Israelites had undergone the plagues'
    effects or related hardships and were now to be congratulated. The contextual
    sense reflected in many interpreters is experiential rather than desiderative;
    'had suffered the same things' best fits the logic leading to 'they counted them
    blessed.'
- source_word: ἐμακάριζον
  chosen: they counted them blessed
  alternatives:
  - they called them blessed
  - they congratulated them
  lexicon: LSJ
  rationale: μακαρίζω means to call or count blessed. 'Counted them blessed' is natural
    English and preserves the evaluative sense.
