theological_decisions:
- issue: Whether to preserve the stark dual outcome as parallel divine action
  chosen_reading: 'The verse is rendered as a paired expectation: salvation for the
    righteous and destruction for their enemies.'
  alternative_readings:
  - deliverance for the righteous and ruin for enemies
  rationale: The Greek sets up an explicit contrast with μὲν...δὲ. The translation
    preserves this theological tension of simultaneous deliverance and judgment without
    softening either side.
