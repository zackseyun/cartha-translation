translation:
  text: So your people expected both the salvation of the righteous and the destruction
    of their enemies;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'awaited' or 'welcomed'; the Greek verb can denote eager expectation
      or receptive waiting.
    reason: lexical_alternative
  - marker: b
    text: Or 'deliverance of the righteous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεδέχθη
  chosen: expected
  alternatives:
  - awaited
  - welcomed
  - received
  lexicon: LSJ
  rationale: The verb προσδέχομαι commonly means to await or expect. In this context,
    with the people anticipating the night of deliverance and judgment, 'expected'
    best captures forward-looking anticipation in natural English.
- source_word: λαοῦ σου
  chosen: your people
  alternatives:
  - your nation
  lexicon: LSJ
  rationale: λαός regularly means 'people' in a covenantal or collective sense. 'Your
    people' preserves the direct address to God and the biblical resonance.
- source_word: σωτηρία
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: LSJ
  rationale: σωτηρία can mean rescue or deliverance, but 'salvation' preserves the
    weightier theological register while still fitting the immediate context of historical
    rescue.
- source_word: δικαίων
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: LSJ
  rationale: δικαίων is a genitive plural meaning 'of the righteous/just.' 'The righteous'
    is concise, idiomatic, and preserves the moral-theological category.
- source_word: ἐχθρῶν
  chosen: their enemies
  alternatives:
  - the enemies
  - of enemies
  lexicon: LSJ
  rationale: The Greek literally has 'of enemies,' contrasted with 'of the righteous.'
    English reads more clearly with the implied relational sense made explicit as
    'their enemies,' referring to the enemies of God's people.
- source_word: ἀπωλία
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  - loss
  lexicon: LSJ
  rationale: ἀπωλία denotes destruction or ruin. 'Destruction' best matches the judgment
    context and provides a clear antithesis to 'salvation'.
