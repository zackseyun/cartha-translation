theological_decisions:
- issue: Identity of the subjects described in the Passover setting
  chosen_reading: The verse refers to the faithful Israelites/Jews acting in secret
    and binding themselves to shared solidarity under God's law.
  alternative_readings:
  - A more generalized description of 'the righteous' without specific historical
    reference
  rationale: The immediate context in Wisdom 18 concerns the Exodus and Passover night.
    The translation keeps the historical-covenantal setting implicit in the wording
    without adding explanatory material not present in the Greek.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Rendering of τοὺς ἁγίους
  chosen_reading: the holy ones
  alternative_readings:
  - the saints
  rationale: Using 'the saints' could suggest later Christian technical usage. 'The
    holy ones' preserves the source sense without importing later doctrinal associations.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
