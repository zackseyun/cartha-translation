translation:
  text: For the holy children of good men were secretly offering sacrifices, and in
    harmony they agreed on the divine law, that the holy ones would share alike in
    the same good things and dangers, while their fathers were already singing beforehand
    praises.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in secret.' The Greek κρυφῇ emphasizes that the sacrificial action was
      carried out covertly.
    reason: lexical_alternative
  - marker: b
    text: Or 'the law of divinity.' The phrase is unusual; 'the divine law' is chosen
      as the clearest English rendering of τὸν τῆς θειότητος νόμον.
    reason: lexical_alternative
  - marker: c
    text: Or 'the saints.' The Greek τοὺς ἁγίους more literally means 'the holy ones.'
    reason: alternative_reading
lexical_decisions:
- source_word: κρυφῇ
  chosen: secretly
  alternatives:
  - in secret
  - privately
  lexicon: LSJ
  rationale: 'The dative adverbial form indicates manner: the action was done covertly.
    ''Secretly'' is natural modern English and preserves the clandestine setting.'
- source_word: ἐθυσίαζον
  chosen: were ... offering sacrifices
  alternatives:
  - were sacrificing
  - offered sacrifice
  lexicon: LSJ
  rationale: The imperfect suggests ongoing or repeated action. 'Offering sacrifices'
    makes the cultic sense explicit in English better than the bare 'sacrificing.'
- source_word: ὅσιοι
  chosen: holy
  alternatives:
  - pious
  - devout
  lexicon: LSJ
  rationale: The term denotes those marked by reverence and covenantal fidelity. 'Holy'
    fits the immediate parallel with τοὺς ἁγίους later in the verse and preserves
    the sacral tone.
- source_word: παῖδες ἀγαθῶν
  chosen: children of good men
  alternatives:
  - children of the good
  - noble children
  - good children's sons
  lexicon: LSJ
  rationale: παῖδες means 'children' or 'sons'; ἀγαθῶν here most naturally refers
    to their worthy forefathers/parents. 'Children of good men' is idiomatic and keeps
    the masculine/genealogical nuance without over-specifying age.
- source_word: τὸν τῆς θειότητος νόμον
  chosen: the divine law
  alternatives:
  - the law of divinity
  - the law belonging to Godhead
  - the law of godliness
  lexicon: LSJ
  rationale: The phrase is unusual. θειότης denotes divinity/divine nature; in context
    it refers to the law grounded in relation to God, not an abstract philosophical
    'divinity' in English. 'The divine law' is the clearest optimal-equivalence rendering.
- source_word: ἐν ὁμονοίᾳ
  chosen: in unity
  alternatives:
  - in one accord
  - with one mind
  - in harmony
  lexicon: LSJ
  rationale: The phrase emphasizes communal unanimity. 'In unity' is concise and natural,
    while preserving the corporate dimension.
- source_word: διέθεντο
  chosen: they established
  alternatives:
  - they agreed upon
  - they ordained
  - they arranged
  lexicon: LSJ
  rationale: The middle voice here conveys setting in order or making a mutual arrangement.
    'Established' captures the solemn, covenant-like force better than the weaker
    'agreed upon.'
- source_word: μεταλήμψεσθαι
  chosen: would share
  alternatives:
  - would partake of
  - would receive a share in
  lexicon: LSJ
  rationale: 'The infinitive expresses the content of what they established: common
    participation. ''Would share'' is idiomatic and preserves the reciprocal communal
    sense.'
- source_word: τῶν αὐτῶν ὁμοίως καὶ ἀγαθῶν καὶ κινδύνων
  chosen: alike in the same good things and dangers
  alternatives:
  - equally in the same blessings and perils
  - in equal measure in the same benefits and risks
  lexicon: LSJ
  rationale: The phrase stresses equal participation in both favorable and perilous
    circumstances. 'Good things and dangers' stays close to the Greek; 'blessings'
    would be interpretive.
- source_word: τοὺς ἁγίους
  chosen: the holy ones
  alternatives:
  - the saints
  - the consecrated ones
  lexicon: LSJ
  rationale: In this deuterocanonical context, 'saints' could import later ecclesial
    associations. 'The holy ones' is transparent and closely reflects the Greek.
- source_word: πατέρων
  chosen: their fathers
  alternatives:
  - the fathers
  - their ancestors
  lexicon: LSJ
  rationale: The genitive absolute-like construction points to the forefathers of
    the present group. 'Their fathers' makes the relational sense explicit in English.
- source_word: προαναμελπόντων αἴνους
  chosen: were already singing beforehand hymns of praise
  alternatives:
  - were already chanting praises in advance
  - were already singing praises beforehand
  lexicon: LSJ
  rationale: προαναμελπόντων combines the idea of singing and doing so beforehand.
    αἴνους are praises/hymns of praise. The chosen rendering preserves both the musical
    and anticipatory force, though somewhat expanded for clarity.
