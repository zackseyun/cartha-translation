theological_decisions:
- issue: Whether λόγος should be rendered in a way that foregrounds later christological
    interpretation
  chosen_reading: word
  alternative_readings:
  - Word
  rationale: The Greek plainly says λόγος, and the immediate context personifies God's
    effective command in judgment. Capitalizing 'Word' could suggest a later, more
    explicit christological identification not demanded by this verse itself. To preserve
    theological tension without importing doctrine, the main text uses lowercase while
    noting the interpretive possibility in a footnote.
  doctrine_reference: Translation philosophy §§1, 3
- issue: How to render the martial/judgment imagery without softening it
  chosen_reading: as a relentless warrior
  alternative_readings:
  - as a stern warrior
  - as a merciless warrior
  rationale: The verse depicts divine judgment in forceful military imagery. The translation
    preserves that severity rather than softening it, while avoiding an overinterpretive
    term like 'merciless' that goes beyond the lexical data.
  doctrine_reference: Translation philosophy §§1, 6
