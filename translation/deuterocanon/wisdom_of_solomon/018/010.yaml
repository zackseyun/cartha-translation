theological_decisions:
- issue: Whether to specify 'firstborn sons' from the broader context rather than
    the verse's own wording παίδων
  chosen_reading: children
  alternative_readings:
  - firstborn children
  - firstborn sons
  rationale: The context in Wisdom 18 concerns the death of the firstborn in Egypt,
    but this verse itself says 'children.' Following the project's source-primacy
    principle, the translation keeps the broader lexical value and does not import
    a narrower doctrinal or narrative specification into the main text.
  doctrine_reference: Translation philosophy §1, §5
