translation:
  text: But the discordant cry of enemies echoed back, and the pitiful sound of children
    being mourned was carried abroad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the piteous cries of children being mourned spread abroad.' The Greek
      phrase οἰκτρὰ διεφέρετο θρηνουμένων παίδων can be rendered with slightly different
      English structuring while preserving the same sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντήχει
  chosen: echoed back
  alternatives:
  - rang out
  - resounded
  - echoed
  lexicon: LSJ
  rationale: The verb conveys a responsive or reverberating sound rather than merely
    a simple cry occurring. 'Echoed back' preserves the auditory vividness of the
    Greek and fits the scene of cries sounding through the land.
- source_word: ἀσύμφωνος
  chosen: discordant
  alternatives:
  - confused
  - inharmonious
  - out of tune
  lexicon: LSJ
  rationale: The adjective literally denotes lack of harmony or agreement. 'Discordant'
    captures both the acoustic sense and the emotional dissonance of the enemies'
    cry without over-paraphrasing.
- source_word: ἐχθρῶν
  chosen: of enemies
  alternatives:
  - of the enemies
  - from enemies
  lexicon: LSJ
  rationale: The genitive most naturally identifies whose cry it was. The anarthrous
    English 'of enemies' is acceptable, but the sense is the hostile Egyptians in
    context; 'of enemies' stays close to the Greek wording.
- source_word: βοή
  chosen: cry
  alternatives:
  - shout
  - outcry
  - clamor
  lexicon: LSJ
  rationale: '''Cry'' best fits the lament context and avoids implying a war shout.
    The surrounding mourning language favors a distressed vocal outburst.'
- source_word: οἰκτρά
  chosen: pitiful sound
  alternatives:
  - piteous things
  - pitiful cries
  - mournful sound
  lexicon: LSJ
  rationale: The adjective is neuter plural used adverbially/substantivally with the
    following clause of transmission. Rendering it as 'pitiful sound' gives idiomatic
    English while preserving the pathos of what was heard.
- source_word: διεφέρετο
  chosen: was carried abroad
  alternatives:
  - spread abroad
  - was borne through
  - was reported
  lexicon: LSJ
  rationale: The imperfect/passive sense suggests something being borne or spread
    from place to place. 'Was carried abroad' preserves the passive movement of the
    sound through the community.
- source_word: θρηνουμένων
  chosen: being mourned
  alternatives:
  - lamented
  - bewailed
  - mourning
  lexicon: LSJ
  rationale: 'The participle is passive in sense with παίδων: the children are the
    ones lamented. ''Being mourned'' makes that relation explicit in English and avoids
    implying that the children themselves were doing the mourning.'
- source_word: παίδων
  chosen: children
  alternatives:
  - sons
  - boys
  - little ones
  lexicon: LSJ
  rationale: While the immediate context concerns firstborn sons, the Greek here uses
    the broader term 'children.' The translation should not narrow the wording beyond
    the source text.
