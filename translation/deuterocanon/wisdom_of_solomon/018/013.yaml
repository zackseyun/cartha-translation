theological_decisions:
- issue: Corporate sonship language for Israel
  chosen_reading: this people is God's son
  alternative_readings:
  - this people is a son of God
  - the people are God's children
  rationale: The Greek uses singular υἱόν with singular λαόν, presenting Israel corporately
    as God's son. The translation preserves that covenantal corporate-son language
    rather than pluralizing to 'children,' which would soften the specific biblical
    motif.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
