translation:
  text: For while they still disbelieved everything because of their sorceries, at
    the destruction of the firstborn they acknowledged that this people is God's son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'magic arts.' The Greek term refers here to occult practices associated
      with Egypt.
    reason: lexical_alternative
  - marker: b
    text: That is, Israel is acknowledged corporately as God's son; the phrase is
      not an individual title here.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπιστοῦντες
  chosen: disbelieved
  alternatives:
  - were unbelieving
  - refused to believe
  - doubted
  lexicon: BDAG
  rationale: The participle denotes not merely uncertainty but refusal to accept what
    had been shown through the plagues. 'Disbelieved' preserves the active sense without
    overparaphrasing.
- source_word: φαρμακείας
  chosen: sorceries
  alternatives:
  - magic arts
  - spells
  lexicon: LSJ
  rationale: In this context of Egyptian magical practices, 'sorceries' best captures
    the sense of occult arts rather than medicinal use. It also fits the polemical
    contrast with God's power.
- source_word: ὀλέθρῳ
  chosen: destruction
  alternatives:
  - ruin
  - slaughter
  - death-blow
  lexicon: LSJ
  rationale: 'The dative with ἐπὶ τῷ marks the occasion or basis: ''at the destruction
    of the firstborn.'' ''Destruction'' is broad enough to cover the catastrophic
    killing without adding imagery not explicit in the noun itself.'
- source_word: πρωτοτόκων
  chosen: the firstborn
  alternatives:
  - their firstborn
  lexicon: BDAG
  rationale: The Greek has the article but no possessive pronoun. English naturally
    reads this as the Egyptian firstborn in context, but the more literal 'the firstborn'
    preserves the wording while remaining clear.
- source_word: ὡμολόγησαν
  chosen: acknowledged
  alternatives:
  - confessed
  - admitted
  - declared
  lexicon: BDAG
  rationale: The verb here indicates open admission compelled by events. 'Acknowledged'
    fits the narrative context better than the more overtly confessional 'confessed'
    while retaining the sense of public recognition.
- source_word: θεοῦ υἱὸν
  chosen: God's son
  alternatives:
  - a son of God
  - son of God
  lexicon: BDAG
  rationale: The anarthrous construction in predicate position with λαόν expresses
    what they recognized Israel to be. 'God's son' is idiomatic English and reflects
    the covenantal filial status of the people as a whole, not an individual messianic
    title.
- source_word: λαὸν
  chosen: this people
  alternatives:
  - the people
  - a people
  lexicon: BDAG
  rationale: Because λαὸν is the subject complement of εἶναι and refers to Israel
    in contrast with Egypt, 'this people' makes the referent explicit in English without
    changing the sense. It also reflects the demonstrative force implied by the narrative
    setting, though not lexically present.
