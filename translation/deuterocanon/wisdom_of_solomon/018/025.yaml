theological_decisions:
- issue: Identity of ὀλοθρεύων
  chosen_reading: the destroyer
  alternative_readings:
  - the destroying angel
  rationale: The context evokes the agent of plague/judgment, but the Greek itself
    uses only a substantival participle. The main text therefore stays with the less
    interpretive 'the destroyer,' while preserving the more specific traditional understanding
    as an alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of ταῦτα
  chosen_reading: these things
  alternative_readings:
  - the priestly vestments and memorial tokens mentioned in the previous verse
  - the events/signs just described
  rationale: The demonstrative's referent is contextually supplied from the preceding
    description, but the Greek does not restate it. The translation preserves the
    ambiguity rather than selecting one explanatory referent in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
