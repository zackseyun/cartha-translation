theological_decisions:
- issue: Referent of the implied subject ('he')
  chosen_reading: Retain the pronoun 'he' without supplying the name in the verse
    itself.
  alternative_readings:
  - Supply 'Aaron' for clarity
  rationale: The Greek leaves the subject implicit, recoverable from the immediate
    context. Keeping 'he' respects the source text and avoids importing an explanatory
    gloss into the main line.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; do not paraphrase beyond the source text.'
- issue: Nature of ὀργή
  chosen_reading: Render as 'wrath' with the implication of divine judgment.
  alternative_readings:
  - anger
  rationale: In the narrative context the wrath is God's punitive outbreak, not merely
    human emotion. 'Wrath' preserves the theological weight without adding explicit
    words not present in the Greek.
  doctrine_reference: 'Translation philosophy: preserve theological weight in readable
    modern English.'
