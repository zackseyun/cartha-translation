translation:
  text: For when heaps of dead had already fallen one upon another, he stood in the
    midst and checked the wrath, and cut off the way to the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standing between them, he restrained the wrath and severed the path
      toward the living.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σωρηδόν
  chosen: in heaps
  alternatives:
  - heap upon heap
  - in a pile
  lexicon: LSJ
  rationale: Adverb meaning 'in heaps' or 'in piles.' In English it is best carried
    idiomatically with the following participle phrase rather than as a standalone
    adverb.
- source_word: πεπτωκότων
  chosen: had already fallen
  alternatives:
  - had collapsed
  - lay fallen
  lexicon: LSJ
  rationale: Perfect participle of πίπτω, indicating a completed state resulting from
    falling. 'Had already fallen' preserves both the prior action and resulting condition.
- source_word: ἐπʼ ἀλλήλων
  chosen: one upon another
  alternatives:
  - on top of one another
  - upon each other
  lexicon: LSJ
  rationale: Expresses bodies piled over each other. 'One upon another' is natural
    and retains the vivid physical image.
- source_word: μεταξὺ στὰς
  chosen: he stood in the midst
  alternatives:
  - standing between them
  - he took his stand between
  lexicon: LSJ
  rationale: The participle with μεταξὺ conveys taking a position between two groups,
    here the dead and the living. 'He stood in the midst' is concise while preserving
    the mediating posture.
- source_word: ἀνέκοψεν
  chosen: checked
  alternatives:
  - restrained
  - held back
  - stopped
  lexicon: LSJ
  rationale: The verb means to stop or hold back. 'Checked' fits the context of halting
    divine wrath without over-paraphrasing.
- source_word: τὴν ὀργήν
  chosen: the wrath
  alternatives:
  - the anger
  lexicon: LSJ
  rationale: ὀργή in this context refers to divine wrath/judgment rather than ordinary
    irritation. 'Wrath' preserves the gravity of the scene.
- source_word: διέσχισεν
  chosen: cut off
  alternatives:
  - cleft
  - severed
  - split
  lexicon: LSJ
  rationale: Literally 'split through' or 'cleave apart.' In context it describes
    interrupting the plague's advance. 'Cut off' communicates the effect in clear
    modern English.
- source_word: τὴν πρὸς τοὺς ζῶντας ὁδόν
  chosen: the way to the living
  alternatives:
  - the path toward the living
  - the route to those still alive
  lexicon: LSJ
  rationale: A vivid metaphor for the plague/wrath's course toward those still alive.
    'The way to the living' preserves the metaphor and the contrast with the dead.
