translation:
  text: For those men were worthy to be deprived of light and imprisoned in darkness,
    they who had kept your sons shut in, through whom the imperishable light of the
    law was about to be given to the age.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the world' or 'for all time.' The Greek says 'to the age' (singular),
      which may carry either cosmic or temporal force.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄξιοι
  chosen: deserved
  alternatives:
  - were worthy
  - were fit
  lexicon: LSJ
  rationale: In context of divine judgment, ἄξιοι μὲν γὰρ ἐκεῖνοι introduces moral
    desert rather than mere suitability. 'Deserved' is idiomatic and preserves the
    judicial force.
- source_word: στερηθῆναι φωτός
  chosen: to be deprived of light
  alternatives:
  - to lack light
  - to be bereft of light
  lexicon: LSJ
  rationale: στερέω in the passive commonly means to be deprived of something. This
    keeps the punitive nuance and echoes the plague-of-darkness context.
- source_word: φυλακισθῆναι σκότει
  chosen: imprisoned in darkness
  alternatives:
  - confined in darkness
  - kept under guard in darkness
  lexicon: LSJ
  rationale: The passive infinitive from φυλακίζω carries carceral force. 'Imprisoned
    in darkness' preserves both the literal image and the retributive reversal.
- source_word: οἱ κατακλείστους φυλάξαντες
  chosen: they who had kept ... shut in
  alternatives:
  - those who had guarded ... in confinement
  - those who had held ... locked up
  lexicon: LSJ
  rationale: The phrase describes the Egyptians' confinement of Israel. κατακλείστους
    conveys being shut up or enclosed; paired with φυλάξαντες, 'kept ... shut in'
    is natural English that retains the imprisoning sense without overloading the
    line.
- source_word: τοὺς υἱούς σου
  chosen: your sons
  alternatives:
  - your children
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural 'sons.' Per project philosophy,
    gender-accurate rendering is preferred unless context clearly demands neutralization.
    Here it refers to Israel as God's sons/people and should remain 'sons.'
- source_word: διʼ ὧν
  chosen: through whom
  alternatives:
  - by whom
  - through which
  lexicon: LSJ
  rationale: 'The antecedent is personal (''your sons''), so ''through whom'' is the
    most direct rendering. It expresses instrumentality: through Israel the law''s
    light would be given.'
- source_word: ἤμελλεν ... δίδοσθαι
  chosen: was about to be given
  alternatives:
  - was destined to be given
  - was to be given
  lexicon: LSJ
  rationale: μέλλω with infinitive often indicates what is impending or destined.
    'Was about to be given' preserves futurity from the narrative standpoint without
    overstating immediacy.
- source_word: τὸ ἄφθαρτον νόμου φῶς
  chosen: the imperishable light of the law
  alternatives:
  - the incorruptible light of the law
  - the undying light of the law
  lexicon: LSJ
  rationale: The genitive νόμου most naturally modifies φῶς ('light of the law').
    ἄφθαρτον is rendered 'imperishable' to preserve the contrast with transient darkness
    and to avoid moralizing it as 'pure' or 'uncorrupted' without warrant.
- source_word: τῷ αἰῶνι
  chosen: to the age
  alternatives:
  - to the world
  - for all time
  - to the ages
  lexicon: LSJ
  rationale: The dative singular αἰών can denote the world-age or enduring time. 'To
    the age' is somewhat formal but preserves the singular and avoids prematurely
    resolving whether the emphasis is temporal ('for all time') or cosmic ('to the
    world').
