theological_decisions:
- issue: Reference of 'your sons' and the instrumentality of giving the law's light
  chosen_reading: '''Your sons'' refers to Israel, through whom God would give the
    law''s imperishable light.'
  alternative_readings:
  - '''Through whom'' could be taken more loosely as ''through which events'' rather
    than directly through Israel.'
  rationale: The nearest grammatical antecedent of διʼ ὧν is τοὺς υἱούς σου, and the
    verse contrasts Egypt's oppression of Israel with Israel's role in mediating divine
    revelation. The translation keeps the personal antecedent explicit.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve
    it
- issue: Rendering αἰών
  chosen_reading: Rendered 'the age' in the main text, preserving the Greek's singular
    breadth.
  alternative_readings:
  - the world
  - for all time
  rationale: The term can carry temporal or world-order nuance. Rather than flattening
    it to one interpretive option, the main text stays close to the Greek and a footnote
    preserves the smoother alternatives.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve
    it
