translation:
  text: because those who had previously been attacked by them gave thanks that they
    were not being harmed, and they asked favor for the difference between them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek text here is syntactically difficult in this witness, especially
      in the phrase involving ''not harming.'' The translation reflects the most likely
      sense in context: former hostility has given way to gratitude and a plea for
      pardon.'
    reason: textual_variant
  - marker: b
    text: Or 'they asked favor concerning their estrangement/conflict.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ οὐ βλάπτοντιν
  chosen: they were not being harmed
  alternatives:
  - those who were not harming
  - they did not harm
  lexicon: LSJ
  rationale: The transmitted form is textually awkward in this override text, but
    βλάπτω normally means 'to harm' or 'injure.' In context the sense contrasts prior
    hostility with present gratitude, so a passive-like sense ('were not being harmed')
    best fits the clause as a whole and the broader narrative.
- source_word: προπολεμημένοι
  chosen: had been attacked before
  alternatives:
  - had previously been at war with
  - had been previously opposed
  lexicon: LSJ
  rationale: From προπολεμέω/προπολεμημένος, indicating prior hostile action or warfare.
    'Had been attacked before' gives clear English while preserving the temporal prefix
    προ- and the conflict sense.
- source_word: εὐχαριστοῦσιν
  chosen: they gave thanks
  alternatives:
  - they were thankful
  - they expressed gratitude
  lexicon: LSJ
  rationale: A straightforward rendering of the verb of thanksgiving; 'gave thanks'
    is idiomatic and preserves the verbal force.
- source_word: τὸ διενεχθῆναι
  chosen: their hostility
  alternatives:
  - their difference
  - their estrangement
  - their conflict
  lexicon: LSJ
  rationale: The infinitival expression from διαφέρω/διενεχθῆναι points to being at
    variance or in conflict. Rendering it as the abstract noun 'their hostility' fits
    the idiom with χάριν ἐδέοντο ('begged pardon/asked favor concerning ...') and
    communicates relational enmity rather than mere disagreement.
- source_word: χάριν ἐδέοντο
  chosen: they begged pardon
  alternatives:
  - they asked favor
  - they entreated for grace
  - they asked forgiveness
  lexicon: LSJ
  rationale: The phrase literally involves asking for favor/grace. In this context,
    where the request concerns prior hostility, 'begged pardon' captures the interpersonal
    sense without over-specifying formal forgiveness language.
