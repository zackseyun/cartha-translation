theological_decisions:
- issue: Purpose of the ominous dreams
  chosen_reading: The dreams are presented as a merciful forewarning, so that the
    sufferers would not die ignorant of the reason for their affliction.
  alternative_readings:
  - 'The clause could be read more loosely as result rather than purpose: the dreams
    had the effect that they did not perish ignorant.'
  rationale: 'The ἵνα clause most naturally expresses purpose in Koine/LXX usage.
    This preserves the text''s theological tension: the affliction is severe, yet
    the warning prevents total ignorance about its cause.'
