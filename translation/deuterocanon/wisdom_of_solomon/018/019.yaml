translation:
  text: For the dreams that troubled them foretold this, so that they might not perish
    without knowing why they were suffering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gave advance warning of this.' The Greek verb can carry the sense of
      signaling something beforehand as a warning.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'because of what they suffer badly,' that is, 'why they were
      suffering badly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ γὰρ ὄνειροι
  chosen: For the dreams
  alternatives:
  - For dreams
  - For the dream-visions
  lexicon: LSJ
  rationale: ὄνειροι is the straightforward plural 'dreams.' The article is naturally
    represented in English by 'the' in this context, referring to the dreams just
    mentioned or implied in the narrative.
- source_word: θορυβήσαντες
  chosen: that troubled
  alternatives:
  - having disturbed
  - having alarmed
  - having thrown into confusion
  lexicon: LSJ
  rationale: The participle conveys causing agitation or disturbance. 'That troubled'
    is idiomatic modern English and preserves the emotional force without over-literal
    awkwardness.
- source_word: αὐτοὺς
  chosen: them
  rationale: Direct object of the participle, referring to those afflicted in the
    context.
- source_word: τοῦτο προεμήνυσαν
  chosen: foretold this
  alternatives:
  - gave advance warning of this
  - signaled this beforehand
  lexicon: LSJ
  rationale: προμηνύω means to indicate beforehand, foretell, or warn in advance.
    'Foretold this' is concise and fits the ominous context.
- source_word: ἵνα μὴ
  chosen: so that they might not
  alternatives:
  - in order that they would not
  - lest they
  lexicon: Greek grammar
  rationale: This introduces purpose or intended result. 'So that they might not'
    preserves the telic nuance in readable English.
- source_word: ἀγνοοῦντες
  chosen: without knowing
  alternatives:
  - being ignorant
  - remaining unaware
  lexicon: LSJ
  rationale: 'Although formally a participle, in English the sense is best conveyed
    adverbially: they would not perish in a state of ignorance. ''Without knowing''
    is natural and accurate.'
- source_word: διʼ ὃ
  chosen: why
  alternatives:
  - for what reason
  - because of which thing
  lexicon: Greek grammar
  rationale: Literally 'because of which,' referring to the cause of their suffering.
    'Why' is the most natural English equivalent here.
- source_word: κακῶς πάσχουσιν
  chosen: they were suffering badly
  alternatives:
  - they were suffering evil things
  - they were afflicted
  - they were suffering
  lexicon: LSJ
  rationale: πάσχω with κακῶς means to suffer badly or be afflicted. 'They were suffering
    badly' keeps the adverbial force of κακῶς more explicitly than simply 'were afflicted.'
- source_word: ἀπόλωνται
  chosen: they might not perish
  alternatives:
  - they might not be destroyed
  lexicon: LSJ
  rationale: ἀπόλλυμι in the middle/subjunctive here denotes perishing or being destroyed.
    'Perish' fits both the gravity and the literary register of Wisdom.
