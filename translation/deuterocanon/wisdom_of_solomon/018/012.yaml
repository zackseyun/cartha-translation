translation:
  text: And all together, under one sentence of death, they had countless dead; for
    the living were not even sufficient to bury them, since in a single moment their
    most honored offspring was destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their firstborn'; the context alludes to the plague on Egypt's firstborn,
      though the Greek here says more literally 'their most honored offspring/line.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁμοθυμαδόν
  chosen: all together
  alternatives:
  - with one accord
  - unanimously
  lexicon: LSJ
  rationale: Conveys collective simultaneity and shared condition in natural English
    without implying deliberative agreement.
- source_word: ἐν ἑνὶ ὀνόματι θανάτου
  chosen: under one sentence of death
  alternatives:
  - by one name of death
  - under a single designation of death
  lexicon: LSJ
  rationale: The idiom literally involves 'one name' of death, but in context it points
    to a single death-decree or common death-sentence affecting all. 'Sentence of
    death' captures the juridical/calamitous force more clearly in English while remaining
    anchored to the Greek.
- source_word: νεκροὺς εἶχον ἀναριθμήτους
  chosen: they had countless dead
  alternatives:
  - they had innumerable corpses
  - they had dead beyond counting
  lexicon: LSJ
  rationale: Keeps the possessive construction and the sense of overwhelming mortality.
    'Countless dead' is idiomatic and grave without sounding clinical.
- source_word: οὐδὲ γὰρ πρὸς τὸ θάψαι
  chosen: for ... were not even sufficient to bury them
  alternatives:
  - for ... were not enough for the burying
  - for ... could not even manage to bury
  lexicon: LSJ
  rationale: Expresses incapacity for burial in readable English while preserving
    the infinitival purpose/result sense.
- source_word: οἱ ζῶντες
  chosen: the living
  alternatives:
  - those still alive
  - the survivors
  lexicon: LSJ
  rationale: A direct and natural rendering of the substantive participle; 'survivors'
    is interpretive, while 'the living' preserves the contrast with the dead.
- source_word: πρὸς μίαν ῥοπὴν
  chosen: in a single moment
  alternatives:
  - at one stroke
  - in one instant
  lexicon: LSJ
  rationale: The phrase denotes extreme suddenness. 'In a single moment' is clear
    modern English; 'at one stroke' is possible but slightly more idiomatic than the
    Greek requires.
- source_word: ἡ ἐντιμοτέρα γένεσις αὐτῶν
  chosen: their most honored offspring
  alternatives:
  - their nobler generation
  - their most esteemed progeny
  - their firstborn
  lexicon: LSJ
  rationale: γένεσις here refers to line/issue/offspring rather than abstract 'birth.'
    In the Exodus-plague context, the reference is to the especially valued children
    struck down. 'Firstborn' is contextually tempting, but the Greek does not explicitly
    say πρωτότοκος, so 'most honored offspring' preserves the wording more faithfully
    while allowing the allusion.
- source_word: διεφθάρη
  chosen: was destroyed
  alternatives:
  - was ruined
  - perished
  lexicon: LSJ
  rationale: Captures the catastrophic loss in passive form. 'Perished' is possible,
    but 'was destroyed' better reflects the force of διαφθείρω in this judgment context.
