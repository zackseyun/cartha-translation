theological_decisions:
- issue: Whether to make the Exodus allusion explicit as 'firstborn'
  chosen_reading: their most honored offspring
  alternative_readings:
  - their firstborn
  rationale: The broader context is the death of Egypt's firstborn, but this verse
    uses ἡ ἐντιμοτέρα γένεσις rather than an explicit term for firstborn. To avoid
    importing a doctrinally or narratively true detail not stated in this clause,
    the main text keeps the Greek's more descriptive wording, while a footnote preserves
    the contextual alternative.
  doctrine_reference: Translation philosophy §§1, 3, 5
