translation:
  text: When they had resolved to kill the infants of the holy ones, and one child
    had been exposed and rescued, you took away their multitude of children as a rebuke
    and destroyed them all together in mighty water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'one child' likely alludes to Moses, who was exposed and then preserved
      alive (Exod 2:3–10).
    reason: cross_reference
  - marker: b
    text: Or 'in violent water' or 'in overwhelming water.' The Greek says literally
      'in mighty water,' referring to the sea as the instrument of destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλευσαμένους
  chosen: had resolved
  alternatives:
  - had planned
  - had decided
  - having taken counsel
  lexicon: LSJ
  rationale: The participle conveys deliberate counsel or resolve. 'Had resolved'
    captures intentionality in natural English without over-literal awkwardness.
- source_word: τὰ τῶν ὁσίων ... νήπια
  chosen: the infants of the holy ones
  alternatives:
  - the holy ones' infants
  - the children of the saints
  - the infants of the faithful
  lexicon: LSJ
  rationale: ὅσιοι here refers to God's holy people rather than morally abstract 'pious
    ones.' 'Holy ones' stays close to the Greek and avoids importing later technical
    ecclesial meaning into 'saints.' νήπια are very young children, so 'infants' is
    preferred.
- source_word: ἑνὸς ... τέκνου
  chosen: one child
  alternatives:
  - one infant
  - one son
  lexicon: LSJ
  rationale: τέκνον is a broad term for child, and the Greek does not specify sex.
    'Child' preserves that breadth while fitting the allusion to the exposed and saved
    Israelite child.
- source_word: ἐκτεθέντος
  chosen: had been exposed
  alternatives:
  - had been set out
  - had been abandoned
  lexicon: LSJ
  rationale: The verb refers to exposing a child, especially by setting it out. 'Exposed'
    is the most precise and culturally recognizable rendering in this context.
- source_word: σωθέντος
  chosen: rescued
  alternatives:
  - saved
  - preserved
  lexicon: LSJ
  rationale: '''Rescued'' fits the narrative context of deliverance from danger and
    avoids overly theological coloring that ''saved'' might suggest here.'
- source_word: εἰς ἔλεγχον
  chosen: as a rebuke
  alternatives:
  - for reproof
  - for conviction
  - as an exposure of their guilt
  lexicon: LSJ
  rationale: The phrase indicates punitive exposure or reproof. 'As a rebuke' is concise
    and idiomatic while preserving the moral-judicial force.
- source_word: ἀφεῖλον
  chosen: you took away
  alternatives:
  - you removed
  - you cut off
  lexicon: LSJ
  rationale: The aorist verb denotes removal or taking away. 'You took away' is direct
    and suits the context of the death of Egypt's children.
- source_word: πλῆθος τέκνων
  chosen: their multitude of children
  alternatives:
  - their many children
  - their whole host of children
  lexicon: LSJ
  rationale: πλῆθος emphasizes large number. 'Multitude of children' preserves the
    rhetorical contrast with 'one child' in the previous clause.
- source_word: ὁμοθυμαδόν
  chosen: all together
  alternatives:
  - with one accord
  - at once
  - in one body
  lexicon: LSJ
  rationale: Here the adverb stresses collective, simultaneous destruction. 'All together'
    is clear modern English.
- source_word: ἐν ὕδατι σφοδρῷ
  chosen: in mighty water
  alternatives:
  - in violent water
  - in overwhelming water
  - in raging water
  lexicon: LSJ
  rationale: The singular 'water' is retained to reflect the Greek collective singular.
    σφοδρός conveys force or violence; 'mighty' is vivid and readable, though the
    phrase refers to the overwhelming sea.
