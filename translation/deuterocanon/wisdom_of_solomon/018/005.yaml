theological_decisions:
- issue: Referent of 'one child had been exposed and rescued'
  chosen_reading: An allusion to the exposed and rescued child Moses, contrasted with
    Egypt's many children.
  alternative_readings:
  - A generic reference to an Israelite child preserved by God
  rationale: The wording strongly evokes the Moses narrative in Exodus, and the verse's
    logic contrasts Egypt's attempt against Israelite infants with God's judgment
    on Egypt's children. The translation keeps the wording general enough to reflect
    the Greek while recognizing the likely allusion.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering of ὅσιοι
  chosen_reading: '''holy ones'' rather than ''saints'''
  alternative_readings:
  - saints
  - faithful
  rationale: The Greek denotes God's holy people. 'Holy ones' is closer to the source
    and avoids later doctrinal associations that 'saints' may carry in English.
  doctrine_reference: Original-language primacy over translation tradition.
