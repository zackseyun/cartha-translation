translation:
  text: For as you punished the adversaries, by this you glorified us, having called
    us to yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having summoned us' or 'having invited us.' The Greek participle προκαλεσάμενος
      can carry the sense of calling or summoning, possibly with the nuance 'to oneself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτιμώρησας
  chosen: you punished
  alternatives:
  - you took vengeance on
  - you exacted justice from
  lexicon: BDAG
  rationale: The verb τιμωρέω commonly denotes punishing or avenging. 'Punished' is
    clear modern English and fits the direct object τοὺς ὑπεναντίους without over-specifying
    motive.
- source_word: τοὺς ὑπεναντίους
  chosen: the adversaries
  alternatives:
  - the opponents
  - the enemies
  lexicon: LSJ
  rationale: ὑπεναντίος means opposed or hostile. 'Adversaries' preserves the sense
    of hostile opposition while remaining slightly broader than military 'enemies.'
- source_word: τούτῳ
  chosen: by this
  alternatives:
  - thereby
  - in this
  lexicon: BDAG
  rationale: The dative demonstrative points back to the same act just mentioned;
    'by this' preserves the instrumental sense more explicitly than the adverbial
    'thereby.'
- source_word: προκαλεσάμενος
  chosen: having called us to yourself
  alternatives:
  - having summoned us
  - having invited us
  - having called us forth
  lexicon: LSJ
  rationale: The middle participle of προκαλέω can mean to call to oneself, summon,
    or invite. In context of God distinguishing and honoring his people, 'having called
    us to yourself' best captures the relational force of the middle voice without
    becoming paraphrastic.
- source_word: ἐδόξασας
  chosen: you glorified us
  alternatives:
  - you honored us
  - you gave us glory
  lexicon: BDAG
  rationale: δοξάζω means to glorify or honor. 'Glorified' preserves the theological
    weight and the contrast with the punishment of the adversaries.
