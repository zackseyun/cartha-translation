theological_decisions:
- issue: Sense of divine action toward Israel in contrast to Egypt
  chosen_reading: The verse states that the same divine act that punished the opponents
    also glorified God's people by calling them to himself.
  alternative_readings:
  - The participle may be taken more weakly as 'having summoned us' without explicit
    relational nuance.
  rationale: The Greek juxtaposes judgment on opponents with honor bestowed on 'us.'
    Rendering προκαλεσάμενος with a reflexive nuance ('to yourself') reflects the
    middle form and highlights the covenantal distinction without importing claims
    beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English with theological weight.'
