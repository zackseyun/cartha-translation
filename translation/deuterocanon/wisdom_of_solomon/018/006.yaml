translation:
  text: That night was made known beforehand to our fathers, so that, knowing with
    certainty the oaths in which they had trusted, they might be encouraged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was foreknown by our fathers.' The Greek verb can be rendered more literally
      this way, but in context it likely means that the night was disclosed to them
      beforehand.
    reason: lexical_alternative
  - marker: b
    text: Or 'our ancestors.' The Greek literally says 'our fathers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they might be encouraged' / 'they might be of good cheer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκείνη ἡ νύξ
  chosen: That night
  alternatives:
  - that very night
  - the night in question
  lexicon: LSJ
  rationale: A straightforward demonstrative phrase. 'That night' is natural English
    and preserves the deictic force without overemphasis.
- source_word: προεγνώσθη
  chosen: was made known beforehand
  alternatives:
  - was foreknown
  - was known beforehand
  lexicon: LSJ
  rationale: Although the verb can suggest foreknowledge, in context the night is
    something disclosed in advance to the ancestors, not merely cognitively 'foreknown'
    in an abstract sense. The passive 'was made known beforehand' best fits the salvation-historical
    context.
- source_word: πατράσιν ἡμῶν
  chosen: to our fathers
  alternatives:
  - to our ancestors
  lexicon: LSJ
  rationale: The Greek is explicitly masculine/plural and refers to the forefathers
    of Israel. Per gender-accurate policy, 'fathers' is retained rather than neutralizing
    to 'ancestors,' though the latter is a possible sense.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: LSJ
  rationale: Standard purpose clause; 'so that' is idiomatic modern English while
    preserving the purposive force.
- source_word: ἀσφαλῶς εἰδότες
  chosen: knowing with certainty
  alternatives:
  - knowing securely
  - being fully assured of
  lexicon: LSJ
  rationale: The adverb ἀσφαλῶς conveys certainty/assurance. 'Knowing with certainty'
    preserves both the cognitive and confident dimensions.
- source_word: οἷς ἐπίστευσαν ὅρκοις
  chosen: the oaths in which they had trusted
  alternatives:
  - the oaths they had believed
  - the sworn promises they had trusted
  lexicon: LSJ
  rationale: The dative ὅρκοις with ἐπίστευσαν indicates trust placed in the oaths.
    'Oaths' is the direct lexical equivalent; 'sworn promises' is interpretive and
    therefore left as an alternative.
- source_word: ἐπευθυμήσωσιν
  chosen: they might take courage
  alternatives:
  - they might be encouraged
  - they might be of good cheer
  - they might rejoice eagerly
  lexicon: LSJ
  rationale: The verb denotes being encouraged or taking heart. 'Take courage' captures
    the volitional strengthening implied by the context of promised deliverance better
    than the flatter 'be encouraged.'
