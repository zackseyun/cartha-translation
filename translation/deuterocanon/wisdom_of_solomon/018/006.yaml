theological_decisions:
- issue: Referent of the 'oaths'
  chosen_reading: The phrase refers to the sworn divine promises given to Israel's
    forefathers.
  alternative_readings:
  - A more general reference to promises associated with the Passover deliverance
  rationale: The immediate context concerns God's prior revelation of the deliverance
    night and Israel's confidence in his pledged word. Rendering ὅρκοις simply as
    'oaths' preserves the text's wording without over-specifying beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
