theological_decisions:
- issue: Exodus allusion in the pillar and sun imagery
  chosen_reading: Retain the concrete imagery of the pillar and sun rather than flattening
    into abstract 'light' language.
  alternative_readings:
  - Render more dynamically as 'you gave them light to guide them'
  rationale: The verse intentionally evokes God's wilderness guidance. Preserving
    'pillar' and 'sun' keeps the intertextual and theological texture visible.
  doctrine_reference: Translation philosophy §§1, 6
- issue: ξενιτεία as exile/sojourn
  chosen_reading: Translate with 'exile' while preserving its positive modifier.
  alternative_readings:
  - sojourn
  - life in a foreign land
  rationale: The term can denote residence abroad more broadly, but in Israel's salvation-history
    context 'exile' communicates displacement more clearly. The positive modifier
    prevents an overly negative reading.
  doctrine_reference: Translation philosophy §§1, 5
