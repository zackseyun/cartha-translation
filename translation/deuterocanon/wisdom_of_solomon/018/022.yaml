theological_decisions:
- issue: Referent of 'the punisher' and the implied object of 'reminding'
  chosen_reading: Render the agent of judgment as 'the punisher' and make the implied
    object explicit as 'him,' without specifying God or an angel in the main text.
  alternative_readings:
  - the one who was punishing
  - the destroying angel
  - God as the one inflicting punishment
  rationale: The Greek uses a substantival participle without naming the referent.
    The context suggests the plague/judging force under divine commission, but the
    verse itself does not explicitly identify the agent. The translation preserves
    that restraint while remaining readable.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of λόγῳ
  chosen_reading: Translate as 'by a word' rather than 'by reason' or a more expansive
    paraphrase.
  alternative_readings:
  - by speech
  - by intercession
  - by reason
  rationale: The immediate contrast is between bodily strength, weapons, and spoken
    appeal grounded in covenant remembrance. 'By a word' keeps the text's compactness
    and avoids importing a fuller interpretive paraphrase.
  doctrine_reference: Original-language primacy over translation tradition; do not
    paraphrase beyond the source.
