translation:
  text: He overcame the multitude not by strength of body, nor by the force of weapons,
    but by a word he subdued the punisher, reminding him of the oaths of the fathers
    and the covenants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who was punishing.' The Greek does not explicitly identify whether
      this refers to God, an angelic destroyer, or the personified force of judgment.
    reason: alternative_reading
  - marker: b
    text: Or 'the sworn promises to the fathers.' The phrase recalls God's covenantal
      oaths to the patriarchs.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνίκησεν
  chosen: overcame
  alternatives:
  - conquered
  - prevailed over
  lexicon: LSJ
  rationale: Aorist of νικάω denotes victory or prevailing. 'Overcame' is natural
    English and fits the context of stopping the plague without implying military
    slaughter.
- source_word: τὸν ὄχλον
  chosen: the multitude
  alternatives:
  - the crowd
  - the throng
  lexicon: LSJ
  rationale: ὄχλος commonly means crowd or multitude. Here it refers to the mass outbreak/host
    pressing in contextually; 'multitude' preserves the broad collective sense and
    the article.
- source_word: οὐκ ἰσχύι τοῦ σώματος
  chosen: not by strength of body
  alternatives:
  - not by bodily strength
  - not by physical strength
  lexicon: LSJ
  rationale: The dative expresses means. A fairly literal rendering preserves the
    contrast with weapons and with the spoken word.
- source_word: οὐχ ὅπλων ἐνεργείᾳ
  chosen: nor by the force of weapons
  alternatives:
  - nor by the working of weapons
  - nor by the power of weapons
  lexicon: LSJ
  rationale: ἐνέργεια here denotes operative power/effectiveness. 'Force of weapons'
    gives idiomatic English while retaining the instrumental contrast.
- source_word: ἀλλὰ λόγῳ
  chosen: but by a word
  alternatives:
  - but by word
  - but by speech
  lexicon: LSJ
  rationale: λόγος can mean word, speech, or reason. In this narrative setting Aaron
    halts judgment through spoken intercession; 'by a word' preserves the concise
    instrumental contrast.
- source_word: τὸν κολάζοντα
  chosen: the punisher
  alternatives:
  - the one who was punishing
  - the chastiser
  lexicon: LSJ
  rationale: Present participle of κολάζω, substantivized. It refers to the agent
    inflicting punishment, likely personified divine judgment or the destroying force.
    'The punisher' is concise and preserves the participial force.
- source_word: ὑπέταξεν
  chosen: he subdued
  alternatives:
  - he subjected
  - he brought under control
  lexicon: LSJ
  rationale: ὑποτάσσω means to subject or bring into submission. 'Subdued' fits the
    image of restraining the plague/judgment without suggesting absolute domination
    over God.
- source_word: ὅρκους πατέρων
  chosen: the oaths to the fathers
  alternatives:
  - the oaths of the fathers
  - the sworn promises to the fathers
  lexicon: LSJ
  rationale: The phrase most naturally points to oaths made with reference to the
    patriarchal fathers, not oaths uttered by them. 'To the fathers' best captures
    the covenantal direction.
- source_word: καὶ διαθήκας
  chosen: and the covenants
  alternatives:
  - and the covenant agreements
  - and the testamentary arrangements
  lexicon: LSJ
  rationale: διαθήκη in biblical Greek commonly denotes covenant. Plural is retained
    as in the Greek, likely referring to covenantal commitments across the patriarchal
    line.
- source_word: ὑπομνήσας
  chosen: reminding him
  alternatives:
  - calling to mind
  - bringing to remembrance
  lexicon: LSJ
  rationale: 'Aorist participle expressing means or attendant circumstance: Aaron
    subdued the punisher by invoking God''s covenant commitments. ''Reminding him''
    makes the implied object explicit in idiomatic English.'
