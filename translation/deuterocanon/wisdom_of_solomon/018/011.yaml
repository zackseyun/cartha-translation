translation:
  text: And slave and master alike were punished with the same judgment, and the commoner
    suffered the same things as the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an equal penalty'; Greek δίκη can denote punishment, penalty, or justice
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοία
  chosen: the same
  alternatives:
  - similar
  - equal
  lexicon: LSJ
  rationale: In context with τὰ αὐτά and the comparison of social ranks, the sense
    is not merely resemblance but sameness/equivalence of judgment and suffering.
- source_word: δίκη
  chosen: punishment
  alternatives:
  - justice
  - penalty
  - sentence
  lexicon: LSJ
  rationale: Here δίκη refers to the penal outcome inflicted in the plague/judgment
    context, not abstract justice. 'Punishment' communicates the concrete result.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  lexicon: BDAG
  rationale: Following project guidance, 'slave' is preferred where bonded status
    is salient. The verse explicitly contrasts δοῦλος with δεσπότῃ, making the status
    distinction central.
- source_word: δεσπότῃ
  chosen: master
  alternatives:
  - lord
  - owner
  lexicon: LSJ
  rationale: In contrast with δοῦλος, 'master' is the most natural English social
    counterpart. 'Lord' would sound overly theological here; 'owner' is narrower than
    the relational contrast in the verse.
- source_word: κολασθείς
  chosen: came on
  alternatives:
  - having been punished
  - being chastised
  lexicon: LSJ
  rationale: The participle modifies the social pair within an elliptical clause.
    Rendering the whole phrase as 'the same punishment came on slave and master alike'
    produces clear English while preserving the passive penal sense.
- source_word: δημότης
  chosen: commoner
  alternatives:
  - citizen
  - man of the people
  - private person
  lexicon: LSJ
  rationale: The contrast is with βασιλεῖ, so the point is ordinary social status
    over against royal rank. 'Commoner' best captures that contrast in idiomatic English.
- source_word: βασιλεῖ
  chosen: king
  alternatives:
  - ruler
  lexicon: LSJ
  rationale: The ordinary and specific sense is 'king,' and the social leveling in
    the verse is sharpened by retaining the royal title.
- source_word: τὰ αὐτὰ πάσχων
  chosen: suffered the same things
  alternatives:
  - undergoing the same things
  - suffered the same fate
  lexicon: LSJ
  rationale: A fairly direct rendering preserves the repeated emphasis on identical
    experience across status divisions. 'Fate' would be interpretive beyond the Greek
    wording.
