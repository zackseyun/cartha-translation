theological_decisions:
- issue: Symbolic description of the high priest's vestments
  chosen_reading: The verse is rendered to preserve the text's claim that cosmic and
    ancestral glory were represented on the high priestly garments, without expanding
    the symbolism beyond what the Greek states.
  alternative_readings:
  - Interpret the imagery more explicitly as referring to the high priest's breastpiece
    and turban from Exodus 28
  - Render 'κόσμος' as 'universe' to heighten cosmological symbolism
  rationale: The Greek itself presents symbolic associations but does not spell out
    the Pentateuchal background in this verse. The translation keeps the imagery intact
    and lets readers infer the allusion from the wording.
