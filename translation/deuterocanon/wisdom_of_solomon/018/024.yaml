translation:
  text: For on the full-length robe was the whole world, and the glory of the fathers
    was on the engraving of the four-rowed stones, and your majesty was on the diadem
    upon his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'robe reaching to the feet.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the engraving of the four-rowed stonework' likely alludes to
      the high priest's breastpiece with its stones arranged in four rows; the Greek
      expression is compact and somewhat difficult.
    reason: cultural_note
lexical_decisions:
- source_word: ποδήρους ἐνδύματος
  chosen: full-length robe
  alternatives:
  - robe reaching to the feet
  - long garment
  lexicon: LSJ
  rationale: ποδήρης denotes a garment extending to the feet; 'full-length robe' is
    natural modern English while preserving the formal image of the high priestly
    vestment.
- source_word: ὅλος ὁ κόσμος
  chosen: the whole world
  alternatives:
  - the entire world
  - all creation
  lexicon: LSJ
  rationale: κόσμος here refers to the world/cosmic order symbolically represented
    on the priestly garment. 'The whole world' preserves the broad cosmic sense without
    over-interpreting it as 'creation'.
- source_word: πατέρων δόξα
  chosen: the glory of the fathers
  alternatives:
  - the splendor of the fathers
  - the honor of the patriarchs
  lexicon: LSJ
  rationale: δόξα can mean glory, splendor, or honor. 'Glory' best preserves the elevated
    register and leaves open whether the reference is to ancestral dignity or memorial
    representation. 'Patriarchs' would be interpretive beyond the Greek.
- source_word: ἐπὶ τετραστίχου λίθου γλυφῆς
  chosen: on the engraving of the four-rowed stonework
  alternatives:
  - on the engraving of the four-row stone
  - on the carved setting of four rows of stones
  lexicon: LSJ
  rationale: The phrase is compressed and refers to the engraved arrangement of the
    breastpiece stones in four rows. 'Four-rowed stonework' communicates the structure
    without forcing a singular/plural distinction more sharply than the Greek does.
- source_word: μεγαλοσύνη σου
  chosen: your majesty
  alternatives:
  - your greatness
  - your magnificence
  lexicon: LSJ
  rationale: μεγαλοσύνη denotes greatness or majesty. Because the address is to God
    and the context is cultic-symbolic, 'your majesty' best conveys divine grandeur
    in idiomatic English.
- source_word: διάδημα
  chosen: diadem
  alternatives:
  - crown
  - headband
  lexicon: LSJ
  rationale: διάδημα is specifically a diadem or royal band. 'Diadem' preserves the
    distinctive term and its elevated connotations better than the more generic 'crown'.
