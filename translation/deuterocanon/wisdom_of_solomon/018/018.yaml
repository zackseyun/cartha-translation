theological_decisions:
- issue: Narrative aspect of the dying victim's disclosure
  chosen_reading: Render the imperfect ἔθνησκεν as ongoing ('was dying') rather than
    completed ('died').
  alternative_readings:
  - he died
  rationale: 'This preserves the scene''s immediacy: the half-dead victim is still
    in the process of dying while disclosing the cause. It is a grammatical rather
    than doctrinal decision, but it affects how the plague narrative is understood.'
