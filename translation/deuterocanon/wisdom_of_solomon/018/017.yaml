translation:
  text: Then at once terrifying dream-visions troubled them, and unexpected fears
    came upon them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'apparitions of dreams' or 'phantoms from dreams.' The Greek φαντασίαι
      can denote appearances or apparitional images; 'dream-visions' is chosen to
      preserve the dream context without implying more than the text states.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: LSJ
  rationale: Temporal adverb marking sequence in the narrative; 'Then' is natural
    and sufficiently direct.
- source_word: παραχρῆμα
  chosen: at once
  alternatives:
  - immediately
  - instantly
  lexicon: LSJ
  rationale: Conveys the sudden, immediate onset of the events. 'At once' fits readable
    modern English while preserving urgency.
- source_word: φαντασίαι
  chosen: visions
  alternatives:
  - apparitions
  - phantoms
  - appearances
  lexicon: LSJ
  rationale: The noun can denote appearances or apparitional impressions. In the phrase
    with 'of dreams,' 'visions' best captures disturbing dream-images without overcommitting
    to literal ghosts.
- source_word: ὀνείρων
  chosen: dream-
  alternatives:
  - of dreams
  - dreams
  lexicon: LSJ
  rationale: Used attributively with φαντασίαι. Rendering the phrase as 'dream-visions'
    is concise English that preserves the genitival relationship.
- source_word: δεινῶς
  chosen: terrifying
  alternatives:
  - severely
  - dreadfully
  - violently
  lexicon: LSJ
  rationale: The adverb intensifies the troubling effect in a context of fear and
    judgment. 'Terrifying' brings out the experiential force in idiomatic English.
- source_word: ἐτάραξαν
  chosen: troubled
  alternatives:
  - disturbed
  - terrified
  - threw into turmoil
  lexicon: LSJ
  rationale: The verb means to disturb or agitate. 'Troubled' preserves the core sense
    without overstating beyond what the Greek explicitly says.
- source_word: αὐτούς
  chosen: them
  lexicon: LSJ
  rationale: Straightforward object pronoun referring to the Egyptians in context.
- source_word: φόβοι
  chosen: fears
  alternatives:
  - terrors
  - frights
  lexicon: LSJ
  rationale: Plural abstract noun. 'Fears' is the most direct rendering; the surrounding
    modifiers already convey intensity.
- source_word: ἐπέστησαν
  chosen: came upon
  alternatives:
  - stood over
  - befell
  - assailed
  lexicon: LSJ
  rationale: In context the verb indicates sudden onset or arrival. 'Came upon' is
    idiomatic and preserves the sense of fears overtaking them.
- source_word: ἀδόκητοι
  chosen: unexpected
  alternatives:
  - unforeseen
  - unlooked-for
  - sudden
  lexicon: LSJ
  rationale: Emphasizes that these fears arrived contrary to expectation. 'Unexpected'
    is clear modern English and semantically precise.
