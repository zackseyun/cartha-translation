theological_decisions:
- issue: How explicitly to render the principle that lesser persons receive leniency
    while rulers face stricter judgment
  chosen_reading: Retain the judicial-mercy contrast without expanding it into a doctrinal
    paraphrase about divine favoritism or condemnation.
  alternative_readings:
  - For the lowly may be forgiven out of mercy, but the powerful will be severely
    judged.
  - For the least deserves mercy, but the mighty will be mightily tested.
  rationale: 'The Greek states a contrast in treatment based on status and accountability,
    but it does not spell out a full doctrine beyond that. The translation preserves
    the tension: mercy toward the least, searching judgment for the powerful.'
  doctrine_reference: Preserve theological tension rather than resolve it.
