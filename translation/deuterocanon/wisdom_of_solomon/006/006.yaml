translation:
  text: For the least is pardonable in mercy, but the mighty will be examined mightily.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forgivable' for 'pardonable.' The Greek adjective suggests being excused
      or treated with forbearance.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek uses a wordplay: ''the mighty will be examined mightily.'' Alternatives
      such as ''strictly'' or ''severely'' bring out the sense but lose the rhetorical
      echo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάχιστος
  chosen: the least
  alternatives:
  - the smallest
  - the lowliest
  - the one of least account
  lexicon: LSJ
  rationale: The superlative adjective is used substantivally with the article, referring
    to the person of lowest status or least power. 'The least' is concise and preserves
    the contrast with 'the mighty' later in the verse.
- source_word: συγγνωστός
  chosen: pardonable
  alternatives:
  - forgivable
  - worthy of indulgence
  - to be excused
  lexicon: LSJ
  rationale: The adjective denotes one who is treated with forbearance or excused.
    'Pardonable' fits the judicial tone of the context and pairs naturally with the
    following genitive 'of mercy.'
- source_word: ἐλέους
  chosen: in mercy
  alternatives:
  - through mercy
  - by reason of mercy
  - with mercy
  lexicon: LSJ
  rationale: 'The genitive is somewhat compressed. ''In mercy'' preserves the brevity
    and leaves the exact nuance broad: the least person is treated leniently in a
    merciful way. A more explicit expansion would risk over-interpreting the construction.'
- source_word: δυνατοὶ
  chosen: the mighty
  alternatives:
  - the powerful
  - the strong
  lexicon: LSJ
  rationale: In this context of rulers and judgment, the adjective refers to those
    possessing power or authority. 'The mighty' is idiomatic, elevated, and keeps
    the rhetorical contrast with 'the least.'
- source_word: δυνατῶς
  chosen: mightily
  alternatives:
  - strictly
  - powerfully
  - severely
  lexicon: LSJ
  rationale: 'The adverb is cognate with δυνατοί and creates a deliberate wordplay:
    the powerful will be dealt with powerfully. ''Mightily'' preserves that rhetorical
    echo better than interpretive options like ''strictly'' or ''severely,'' though
    those capture part of the sense.'
- source_word: ἐτασθήσονται
  chosen: will be examined
  alternatives:
  - will be scrutinized
  - will be investigated
  - will be tested
  lexicon: LSJ
  rationale: The future passive indicates searching examination or scrutiny. 'Will
    be examined' is clear modern English and preserves the judicial evaluative sense
    without over-specifying the outcome.
