theological_decisions:
- issue: Role of earthly rulers under divine sovereignty
  chosen_reading: The verse presents rulers as subordinate functionaries serving under
    God's kingdom.
  alternative_readings:
  - The phrase could be generalized to all who exercise authority under God.
  rationale: The immediate context addresses kings and judges; ὑπηρέται ... τῆς αὐτοῦ
    βασιλείας frames their authority as derivative from God. The translation preserves
    this without importing a fuller doctrine of church or state.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
