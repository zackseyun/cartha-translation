translation:
  text: because, though you were ministers of his kingdom, you did not judge rightly,
    nor keep the law, nor walk according to the counsel of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' or 'officials' of his kingdom.' The Greek ὑπηρέται denotes
      subordinates serving under a higher authority; here it likely refers to rulers
      as functionaries under God's rule.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not judge justly.'
    reason: lexical_alternative
  - marker: c
    text: Or 'according to God's purpose' or 'in line with the will of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπηρέται
  chosen: ministers
  alternatives:
  - servants
  - officials
  - subordinates
  lexicon: BDAG
  rationale: ὑπηρέτης commonly denotes an underling, attendant, or functionary serving
    under higher authority. In this royal/governing context, 'ministers' best conveys
    officials serving under God's kingship without implying household servitude alone.
    'Servants' is possible but less specific to public office; 'officials' is plausible
    but loses the service nuance.
- source_word: βασιλείας
  chosen: kingdom
  alternatives:
  - kingship
  - reign
  lexicon: BDAG
  rationale: βασιλεία can denote realm, reign, or royal rule. 'Kingdom' is the most
    natural English rendering here and preserves both the sphere and authority of
    God's rule. 'Reign' would stress rule more abstractly, but the context addresses
    rulers as those serving within God's royal order.
- source_word: ἐκρίνατε ὀρθῶς
  chosen: did not judge rightly
  alternatives:
  - did not judge justly
  - did not judge correctly
  lexicon: BDAG
  rationale: κρίνω with ὀρθῶς refers to rendering judgment properly/uprightly. 'Judge
    rightly' preserves the adverbial force and avoids over-specifying legal equity
    as 'justly,' though that is a close alternative.
- source_word: ἐφυλάξατε νόμον
  chosen: keep the law
  alternatives:
  - observe the law
  - guard the law
  lexicon: BDAG
  rationale: φυλάσσω can mean keep, observe, or guard. With νόμος, 'keep the law'
    is idiomatic English and preserves covenantal-ethical force. The anarthrous νόμον
    is rendered generically as 'the law' in English because the phrase functions as
    a recognizable moral-legal standard rather than an indefinite 'a law.'
- source_word: κατὰ τὴν βουλὴν τοῦ θεοῦ
  chosen: according to the counsel of God
  alternatives:
  - according to God's purpose
  - in line with the will of God
  lexicon: BDAG
  rationale: βουλή can mean counsel, purpose, or plan. 'Counsel' preserves the deliberative
    sense of divine intention without flattening it into mere desire. 'Will' is possible
    but less precise to βουλή than to θέλημα.
- source_word: ἐπορεύθητε
  chosen: walk
  alternatives:
  - live
  - go
  lexicon: BDAG
  rationale: πορεύομαι literally means go/travel, but in ethical contexts 'walk' is
    a well-established English equivalent for conduct. Here it preserves the moral
    metaphor and matches the phrase 'walk according to.'
