translation:
  text: But what wisdom is and how it came to be, I will declare, and I will not hide
    mysteries from you; rather, from the beginning of its origin I will trace it out,
    and I will set the knowledge of it in the open, and I will by no means pass by
    the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will search it out from the beginning of its coming to be.' The Greek
      phrase is compact and can be rendered more explicitly with 'coming to be' for
      γενέσεως.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will certainly not pass over the truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί δέ ἐστιν σοφία
  chosen: what wisdom is
  alternatives:
  - what wisdom means
  - what wisdom is like
  lexicon: LSJ
  rationale: A direct interrogative clause is best preserved. σοφία is rendered consistently
    as 'wisdom.'
- source_word: πῶς ἐγένετο
  chosen: how it came to be
  alternatives:
  - how it arose
  - how it was generated
  - how it came into existence
  lexicon: LSJ
  rationale: ἐγένετο from γίνομαι can denote coming into being or arising. 'Came to
    be' is idiomatic English that preserves the sense without overcommitting to a
    technical metaphysical nuance.
- source_word: ἀπαγγελῶ
  chosen: I will declare
  alternatives:
  - I will report
  - I will tell
  lexicon: LSJ
  rationale: The verb carries the sense of announcing or reporting. 'Declare' fits
    the elevated register of the passage while remaining clear.
- source_word: οὐκ ἀποκρύψω ὑμῖν μυστήρια
  chosen: I will not hide mysteries from you
  alternatives:
  - I will not conceal secrets from you
  - I will not keep mysteries from you
  lexicon: LSJ
  rationale: μυστήρια is rendered 'mysteries' to preserve the Greek term's weight
    and avoid flattening it to merely private information. ἀποκρύψω naturally means
    'hide' or 'conceal.'
- source_word: ἀλλὰ ἀπ' ἀρχῆς γενέσεως
  chosen: rather, from the beginning of its origin
  alternatives:
  - but from the beginning of its coming to be
  - but from its origin from the beginning
  lexicon: LSJ
  rationale: The phrase is somewhat dense. γενέσεως here refers to origin/beginning
    of coming-to-be. 'From the beginning of its origin' preserves the emphatic backward
    tracing without paraphrasing away the noun.
- source_word: ἐξιχνιάσω
  chosen: I will trace it out
  alternatives:
  - I will investigate it thoroughly
  - I will search it out
  lexicon: LSJ
  rationale: The verb suggests tracking something out carefully, as by investigation.
    'Trace it out' is vivid and suitably literal in context.
- source_word: θήσω εἰς τὸ ἐμφανὲς
  chosen: I will set ... in the open
  alternatives:
  - I will bring ... to light
  - I will make ... plain
  lexicon: LSJ
  rationale: Literally placing something into what is manifest/public. 'Set in the
    open' preserves the concrete force while remaining natural English.
- source_word: τὴν γνῶσιν αὐτῆς
  chosen: the knowledge of it
  alternatives:
  - knowledge about it
  - understanding of it
  lexicon: LSJ
  rationale: γνῶσις is straightforwardly 'knowledge.' 'Of it' keeps the pronoun tied
    to wisdom without overinterpreting.
- source_word: οὐ μὴ παροδεύσω τὴν ἀλήθειαν
  chosen: I will by no means pass by the truth
  alternatives:
  - I will certainly not pass over the truth
  - I will not disregard the truth
  lexicon: LSJ
  rationale: οὐ μή intensifies the negation. παροδεύω literally suggests passing by
    or overlooking. 'Pass by the truth' preserves the metaphor and the emphatic denial.
