theological_decisions:
- issue: Potential metaphysical implication of wisdom's origin in πῶς ἐγένετο / γενέσεως
  chosen_reading: Render with origin language ('how it came to be,' 'from the beginning
    of its origin') without importing a doctrinal claim about created vs. eternal
    wisdom.
  alternative_readings:
  - how it was created
  - how it arose
  rationale: The verse promises an account of wisdom's origin, but this line alone
    should not be made to settle later theological debates about personified Wisdom.
    The translation preserves the Greek wording and its tension without doctrinal
    expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
