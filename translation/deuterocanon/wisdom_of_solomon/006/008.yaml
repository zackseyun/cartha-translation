translation:
  text: But for the mighty, a severe inquiry is coming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a severe investigation' or 'a searching examination is impending.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κραταιοῖς
  chosen: the mighty
  alternatives:
  - the powerful
  - the strong
  lexicon: LSJ
  rationale: κραταιός denotes strength or power; in this context of rulers under scrutiny,
    'the mighty' captures social-political power more naturally than merely physical
    strength.
- source_word: ἰσχυρὰ
  chosen: stern
  alternatives:
  - strong
  - severe
  - mighty
  lexicon: LSJ
  rationale: As an attributive/adverbial modifier of the coming ἔραυνα, the sense
    is not physical strength but intensity or severity. 'Stern' gives readable modern
    English while preserving the force of the warning.
- source_word: ἐφίσταται
  chosen: is coming
  alternatives:
  - stands over
  - is impending
  - comes upon
  lexicon: LSJ
  rationale: ἐφίσταται can mean 'comes upon,' 'approaches,' or 'is imminent/present.'
    Here it expresses impending arrival of scrutiny. 'Is coming' is idiomatic and
    preserves the future-oriented warning without over-paraphrase.
- source_word: ἔραυνα
  chosen: inquiry
  alternatives:
  - investigation
  - examination
  - search
  lexicon: LSJ
  rationale: ἔραυνα refers to searching examination or investigation. 'Inquiry' fits
    the judicial/governing context and reads naturally in English; 'investigation'
    is possible but slightly more bureaucratic in tone.
