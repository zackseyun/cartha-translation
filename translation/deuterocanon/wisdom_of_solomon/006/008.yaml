theological_decisions:
- issue: Nature of the judgment language
  chosen_reading: The verse warns that those who are powerful will face especially
    severe scrutiny.
  alternative_readings:
  - The verse could be rendered more abstractly as a 'searching examination' without
    explicit judicial nuance.
  rationale: The immediate context concerns rulers and divine assessment. Rendering
    ἔραυνα as 'inquiry' preserves the evaluative/judicial force without importing
    later doctrinal categories beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
