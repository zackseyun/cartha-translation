translation:
  text: For the Master of all will not show partiality, nor will he be overawed by
    greatness; for he himself made both small and great, and he cares for all alike.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'will not show a face,' an idiom meaning to show partiality
      or favoritism.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Sovereign of all.' The Greek title here is despotes, not kyrios.
    reason: lexical_alternative
  - marker: c
    text: Or 'he provides for all equally' / 'he exercises providence over all alike.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποστελεῖται πρόσωπον
  chosen: will not show partiality
  alternatives:
  - will not defer to a face
  - will not show favoritism
  - will not respect persons
  lexicon: LSJ
  rationale: The idiom with πρόσωπον conveys partiality or favoritism rather than
    a literal 'draw back the face.' 'Show partiality' is clear modern English and
    preserves the judicial-ethical sense.
- source_word: ὁ πάντων δεσπότης
  chosen: the Master of all
  alternatives:
  - the Lord of all
  - the Sovereign of all
  lexicon: LSJ
  rationale: δεσπότης denotes one with absolute authority or ownership. 'Master' preserves
    that force better than 'Lord' here, especially since κύριος is the project's default
    for kyrios, which is not the word used in this verse.
- source_word: ἐντραπήσεται μέγεθος
  chosen: will be overawed by greatness
  alternatives:
  - will be ashamed before greatness
  - will defer to greatness
  - will be intimidated by greatness
  lexicon: LSJ
  rationale: In context the sense is not shame in a moral sense but being swayed or
    cowed by status or magnitude. 'Overawed by greatness' captures the idea that rank
    or size does not influence God's judgment.
- source_word: μικρὸν καὶ μέγαν
  chosen: both small and great
  alternatives:
  - the small and the great
  - little and great
  lexicon: LSJ
  rationale: This pair refers to persons of low and high status. 'Both small and great'
    is idiomatic and preserves the merism.
- source_word: ὁμοίως τε προνοεῖ περὶ πάντων
  chosen: he cares for all alike
  alternatives:
  - he provides for all equally
  - he has concern for all equally
  - he exercises providence over all alike
  lexicon: LSJ
  rationale: προνοέω can mean to care for, provide for, or exercise forethought concerning.
    In this context of God's impartial governance, 'he cares for all alike' is natural
    English and retains the equal concern expressed by ὁμοίως and περὶ πάντων.
