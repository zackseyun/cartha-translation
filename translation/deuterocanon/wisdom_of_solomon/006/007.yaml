theological_decisions:
- issue: Rendering δεσπότης distinctly from κύριος
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: To preserve lexical distinction and the stronger sense of absolute authority
    in δεσπότης, 'Master' is preferred here. This avoids flattening different Greek
    titles into the same English term.
  doctrine_reference: 'DOCTRINE.md: Translate titles; consistency of key terms, or
    documented exception.'
- issue: Divine impartiality language
  chosen_reading: will not show partiality
  alternative_readings:
  - will not respect persons
  - will not show favoritism
  rationale: The verse teaches God's impartiality toward social rank without importing
    later doctrinal formulations. The chosen wording is transparent and idiomatic
    while staying close to the Greek idiom.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological
    tension rather than resolve it.'
