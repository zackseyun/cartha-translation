theological_decisions:
- issue: Semantic range of παιδεύω in wisdom context
  chosen_reading: instruction/education is foregrounded in the main text
  alternative_readings:
  - discipline
  - training
  rationale: The verse invites desire for the speaker's words and promises the result
    of παιδεία. Because the immediate context is reception of wisdom's teaching, 'you
    will be instructed' best fits the flow. The broader formative sense is preserved
    in lexical documentation rather than expanded in the main text.
  doctrine_reference: Translation philosophy §1, §5
