translation:
  text: Therefore desire my words; long for them, and you will be instructed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'yearn for them' for the second imperative; the Greek uses a stronger
      verb than the first command.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will be taught' or 'you will be disciplined'; the Greek verb can
      include both instruction and formative discipline.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμήσατε
  chosen: desire
  alternatives:
  - set your desire on
  - yearn for
  - covet
  lexicon: BDAG
  rationale: Aorist imperative of ἐπιθυμέω. In this positive exhortational context,
    'desire' is natural modern English and avoids the negative connotation 'covet'
    often carries.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument. 'Therefore' best preserves
    the logical force in readable English.
- source_word: λόγων
  chosen: words
  alternatives:
  - sayings
  - teachings
  lexicon: BDAG
  rationale: λόγος here refers to the speaker's utterances/instruction. 'Words' is
    the most direct rendering; 'teachings' would interpret more than the Greek requires.
- source_word: ποθήσατε
  chosen: long for
  alternatives:
  - yearn for
  - crave
  lexicon: BDAG
  rationale: Aorist imperative of ποθέω, stronger and more affective than the preceding
    ἐπιθυμήσατε. 'Long for' preserves the intensified emotional sense without sounding
    excessive.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  - so that
  lexicon: BDAG
  rationale: The conjunction straightforwardly links the second imperative with the
    result clause. English can retain 'and' while allowing the future verb to carry
    the consequential sense.
- source_word: παιδευθήσεσθε
  chosen: you will be instructed
  alternatives:
  - you will be taught
  - you will be disciplined
  - you will receive training
  lexicon: BDAG
  rationale: Future passive of παιδεύω. In Wisdom literature this can include both
    instruction and discipline/formation. 'You will be instructed' fits the immediate
    context of wisdom teaching while preserving the passive sense.
