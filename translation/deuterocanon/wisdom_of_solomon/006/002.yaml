translation:
  text: Listen, you who rule over multitudes and boast over crowds of nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Give ear, you who hold power over a multitude and exult because of throngs
      of nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνωτίσασθε
  chosen: Listen
  alternatives:
  - Give ear
  - Hear
  lexicon: LSJ
  rationale: Aorist middle imperative from ἐνωτίζομαι, an idiom meaning to give ear
    or listen attentively. 'Listen' is clear modern English while preserving the force
    of an imperative summons.
- source_word: οἱ κρατοῦντες
  chosen: you who rule
  alternatives:
  - you who hold power over
  - you who dominate
  lexicon: LSJ
  rationale: κρατέω can mean be strong, prevail, or rule/have power over. In context
    addressing rulers, 'you who rule' best captures political authority without over-translating
    to oppression.
- source_word: πλήθους
  chosen: multitudes
  alternatives:
  - a multitude
  - the masses
  - many people
  lexicon: LSJ
  rationale: πλῆθος denotes a large number or multitude. The singular in Greek can
    function collectively; 'multitudes' reads naturally in English with the participle
    and keeps the sense of large populations under rule.
- source_word: γεγαυρωμένοι
  chosen: boast
  alternatives:
  - exult proudly
  - are arrogant
  - take pride
  lexicon: LSJ
  rationale: Perfect participle of γαυρόω, conveying being proud, haughty, or exultant.
    'Boast' fits the construction with ἐπί and keeps the rebuking tone directed at
    rulers who glory in their subjects.
- source_word: ἐπὶ ὄχλοις ἐθνῶν
  chosen: over crowds of nations
  alternatives:
  - because of throngs of nations
  - in the crowds of nations
  - over masses of peoples
  lexicon: LSJ
  rationale: ὄχλοις means crowds/throngs; ἐθνῶν here is best taken as a genitive specifying
    the peoples/nations comprising those crowds. With γεγαυρωμένοι, ἐπί can mark the
    basis or object of boasting; 'over crowds of nations' communicates rulers vaunting
    themselves because of the many nations under them.
