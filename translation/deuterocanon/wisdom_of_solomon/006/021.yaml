translation:
  text: Therefore, if you delight in thrones and scepters, O rulers of peoples, honor
    wisdom, so that you may reign forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tyrants of peoples.' The Greek term can denote rulers generally, but
      in some contexts it carries a more negative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥδεσθε
  chosen: you delight
  alternatives:
  - you take pleasure
  - you enjoy
  lexicon: LSJ
  rationale: The verb denotes taking pleasure in or delighting in something. 'Delight'
    preserves the elevated tone and the positive attraction implied, fitting the address
    to rulers.
- source_word: θρόνοις
  chosen: thrones
  alternatives:
  - seats of rule
  lexicon: LSJ
  rationale: A straightforward literal rendering; the political image is central and
    should be preserved.
- source_word: σκήπτροις
  chosen: scepters
  alternatives:
  - royal staffs
  lexicon: LSJ
  rationale: The term refers to the emblem of royal authority. 'Scepters' is the standard
    English equivalent and pairs naturally with 'thrones'.
- source_word: τύραννοι λαῶν
  chosen: rulers of peoples
  alternatives:
  - tyrants of peoples
  - sovereigns of nations
  lexicon: LSJ
  rationale: Although τύραννοι can mean 'tyrants,' in Hellenistic usage it can also
    denote rulers or monarchs without necessarily carrying the later strongly pejorative
    English sense. Because the context is an exhortation to those in authority rather
    than a denunciation of oppression, 'rulers' best conveys the likely sense while
    avoiding importing a judgment the verse does not explicitly make. 'Peoples' reflects
    the plural λαῶν more literally than 'nations,' though either is possible.
- source_word: τιμήσατε
  chosen: honor
  alternatives:
  - value
  - esteem
  lexicon: LSJ
  rationale: The imperative calls for giving due honor or esteem. 'Honor' preserves
    both the imperative force and the elevated register.
- source_word: σοφίαν
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering; in Wisdom of Solomon this term carries both practical
    and personified resonance, and the simple gloss preserves that breadth.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for all time
  lexicon: LSJ
  rationale: The idiom expresses enduring duration. 'Forever' is idiomatic modern
    English and suits the hortatory conclusion.
- source_word: βασιλεύσητε
  chosen: you may reign
  alternatives:
  - you may rule as kings
  - you may be kings
  lexicon: LSJ
  rationale: The verb specifically denotes reigning or exercising kingly rule. 'Reign'
    keeps the royal nuance already evoked by thrones and scepters.
