theological_decisions:
- issue: Force of τύραννοι in address to political leaders
  chosen_reading: Rendered neutrally as 'rulers of peoples' rather than pejoratively
    as 'tyrants of peoples.'
  alternative_readings:
  - tyrants of peoples
  - sovereigns of nations
  rationale: The Greek term can bear a neutral sense of ruler in some contexts, especially
    in Hellenistic Greek, and the immediate context is exhortative rather than condemnatory.
    Using 'tyrants' in modern English would likely overdetermine the moral evaluation
    and import a sharper condemnation than the verse itself states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
