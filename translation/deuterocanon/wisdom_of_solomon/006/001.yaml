translation:
  text: Therefore listen, O kings, and understand; learn, O judges of the ends of
    the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear' instead of 'listen.' The Greek imperative can be rendered either
      way; 'listen' was chosen to emphasize attentive heed.
    reason: lexical_alternative
  - marker: b
    text: '''Judges of the ends of the earth'' is an idiomatic way of addressing those
      who exercise judgment across the far reaches of the world, stressing the universal
      scope of the warning.'
    reason: cultural_note
lexical_decisions:
- source_word: Ἀκούσατε
  chosen: listen
  alternatives:
  - hear
  lexicon: BDAG
  rationale: Imperative plural from ἀκούω. 'Listen' better conveys the call for attentive
    heed in English than the more neutral 'hear,' while remaining close to the Greek
    imperative force.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inferential transition from the preceding argument. 'Therefore'
    preserves the logical connection more explicitly than 'then' or 'so'.
- source_word: βασιλεῖς
  chosen: kings
  alternatives:
  - rulers
  lexicon: BDAG
  rationale: The noun specifically denotes kings, not rulers in general. The direct
    address is retained formally.
- source_word: σύνετε
  chosen: understand
  alternatives:
  - perceive
  - be wise
  lexicon: BDAG
  rationale: Imperative plural from συνίημι. 'Understand' is the most straightforward
    English equivalent and fits the paired exhortation with 'learn.' 'Be wise' would
    be more interpretive.
- source_word: μάθετε
  chosen: learn
  alternatives:
  - take instruction
  lexicon: BDAG
  rationale: Imperative plural from μανθάνω. 'Learn' is the plain lexical sense. 'Take
    instruction' is possible contextually but expands beyond the Greek.
- source_word: δικασταί
  chosen: judges
  alternatives:
  - magistrates
  - rulers
  lexicon: BDAG
  rationale: The term denotes those who judge. 'Judges' is the most direct and transparent
    rendering; broader political terms would weaken the judicial nuance.
- source_word: περάτων γῆς
  chosen: of the ends of the earth
  alternatives:
  - of the farthest parts of the earth
  - throughout the earth
  lexicon: BDAG
  rationale: A genitival phrase meaning the extremities or far reaches of the earth.
    'Of the ends of the earth' preserves the idiomatic biblical expression and the
    universal scope of the address.
