theological_decisions:
- issue: Gendered personification of Wisdom and generic masculine reference
  chosen_reading: Retain feminine reference for Wisdom ('her') and generic masculine
    singular for the seeker ('he,' 'his').
  alternative_readings:
  - Retain 'her' for Wisdom but use singular 'they/their' for the seeker
  - Repeat 'the one... that person's gates' to avoid gendered pronouns
  rationale: The Greek clearly personifies Wisdom as feminine and uses masculine grammatical
    forms for the generic seeker. Per doctrine, gender-accurate rendering is preferred
    over flattening the source's personification or grammatical shape.
