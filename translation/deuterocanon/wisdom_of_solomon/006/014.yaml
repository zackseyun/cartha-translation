translation:
  text: Whoever rises early for her will not grow weary, for he will find her sitting
    beside his gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Whoever seeks her early.' The Greek verb more literally refers to rising
      early, and by extension to eager early seeking.
    reason: lexical_alternative
  - marker: b
    text: The image is of personified Wisdom already present and waiting at the seeker's
      entrance.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ ὀρθρίσας
  chosen: Whoever rises early
  alternatives:
  - He who rises early
  - Whoever seeks early
  lexicon: LSJ
  rationale: The aorist participle from ὀρθρίζω denotes rising early or being early
    about something. 'Whoever rises early' preserves the proverbial, general force
    without sounding archaic. 'Seeks early' is interpretive and less directly tied
    to the verb's basic sense.
- source_word: ἐπ' αὐτὴν
  chosen: for her
  alternatives:
  - for it
  - toward her
  - for wisdom
  lexicon: LSJ
  rationale: The preposition with the accusative here expresses direction or aim toward
    personified Wisdom. 'For her' is idiomatic in English and preserves the feminine
    personification already established in context.
- source_word: οὐ κοπιάσει
  chosen: will not grow weary
  alternatives:
  - will not labor
  - will not be wearied
  - will not toil
  lexicon: LSJ
  rationale: κοπιάω can mean labor or become weary from effort. In this context the
    point is that the search will not prove exhausting or frustrating, so 'will not
    grow weary' communicates the result naturally.
- source_word: πάρεδρον
  chosen: sitting beside
  alternatives:
  - beside
  - as an attendant beside
  - seated near
  lexicon: LSJ
  rationale: πάρεδρος means sitting beside, being in attendance, or being at one's
    side. Because εὑρήσει needs a concrete complement in English, 'sitting beside'
    makes the image explicit while preserving the personified scene.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: LSJ
  rationale: γάρ gives the reason the seeker will not grow weary. 'For' preserves
    the explanatory connection in a concise literary register.
- source_word: τῶν πυλῶν αὐτοῦ
  chosen: his gates
  alternatives:
  - his doorways
  - his doors
  - the gates of his house
  lexicon: LSJ
  rationale: πύλη normally means gate rather than an interior door. The plural likely
    reflects the entrance area of a house or estate in elevated style. 'His gates'
    keeps the vivid image and avoids over-specifying 'house,' which is not in the
    Greek.
