theological_decisions:
- issue: Nature of the threatened action
  chosen_reading: The verse speaks of divine judgment suddenly and dreadfully overtaking
    powerful rulers.
  alternative_readings:
  - The verse could be read more generally as a principle that harsh judgment occurs
    for the great.
  rationale: The immediate context addresses rulers directly, so the second person
    'you' and the statement about 'those in high places' are best taken as a warning
    of divine visitation on governing authorities.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
