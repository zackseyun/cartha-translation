translation:
  text: He will come upon you terribly and swiftly, because severe judgment comes
    upon those in high places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fearfully and quickly he will confront you, because abrupt judgment
      comes for the exalted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φρικτῶς
  chosen: terribly
  alternatives:
  - fearfully
  - dreadfully
  - in a terrifying way
  lexicon: LSJ
  rationale: Adverb from φρικτός conveys something causing dread or terror. 'Terribly'
    preserves the force in natural English without becoming overly paraphrastic.
- source_word: ταχέως
  chosen: swiftly
  alternatives:
  - quickly
  - speedily
  lexicon: LSJ
  rationale: The adverb marks rapidity of divine intervention. 'Swiftly' fits the
    solemn tone better than the more colloquial 'quickly.'
- source_word: ἐπιστήσεται
  chosen: will come upon
  alternatives:
  - will stand over
  - will confront
  - will attack
  lexicon: LSJ
  rationale: Future middle of ἐφίστημι can mean to come upon, approach, or stand over.
    In context of judgment threatening rulers, 'will come upon' best captures impending
    visitation without over-specifying hostility.
- source_word: κρίσις
  chosen: judgment
  alternatives:
  - justice
  - sentence
  - decision
  lexicon: LSJ
  rationale: In this context the noun refers to judicial action against rulers, not
    abstract justice. 'Judgment' is the most direct and idiomatic rendering.
- source_word: ἀπότομος
  chosen: severe
  alternatives:
  - sudden
  - sharp
  - harsh
  - abrupt
  lexicon: LSJ
  rationale: The adjective can denote something abrupt, sharp, or severe. Since ταχέως
    already expresses speed, rendering ἀπότομος as 'severe' avoids redundancy and
    highlights the harshness of the judgment.
- source_word: ἐν τοῖς ὑπερέχουσιν
  chosen: upon those in high places
  alternatives:
  - among the exalted
  - for those in authority
  - against rulers
  - among those who excel
  lexicon: LSJ
  rationale: The participial phrase refers to those who are elevated in rank or status.
    'Those in high places' communicates social-political superiority clearly while
    preserving the imagery of elevation.
- source_word: γίνεται
  chosen: comes upon
  alternatives:
  - happens
  - is made
  - takes place
  lexicon: LSJ
  rationale: With κρίσις and the preceding threat, the verb is rendered dynamically
    to express that judgment befalls the exalted. This keeps the English coherent
    and reflects the eventive sense in context.
