translation:
  text: She hastens to make herself known to those who desire her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'She comes before those who desire to be known beforehand.'
      The Greek is compressed; the main text renders the likely sense that Wisdom
      takes the initiative toward those who long for her.
    reason: lexical_alternative
lexical_decisions:
- source_word: φθάνει
  chosen: hastens
  alternatives:
  - comes before
  - anticipates
  - reaches first
  lexicon: LSJ
  rationale: The verb can mean to come before or anticipate someone, but in this context
    with the infinitive of being known it conveys Wisdom's eager initiative toward
    seekers. 'Hastens' preserves that proactive sense in natural English without over-literal
    awkwardness.
- source_word: τοὺς ἐπιθυμοῦντας
  chosen: those who desire
  alternatives:
  - those who long for
  - those who seek eagerly
  lexicon: BDAG
  rationale: The participle from ἐπιθυμέω denotes strong desire or longing. 'Those
    who desire' is direct and readable; the object 'her' is supplied from the immediate
    context, where Wisdom is the subject throughout the surrounding verses.
- source_word: προγνωσθῆναι
  chosen: to make herself known
  alternatives:
  - to be known beforehand
  - to be recognized in advance
  lexicon: LSJ
  rationale: Although formally passive ('to be known beforehand'), an overly literal
    rendering is obscure in English here. In context the sense is that Wisdom takes
    the initiative to be recognized by those who desire her. 'To make herself known'
    expresses the idiomatic force while preserving the idea of prior initiative.
