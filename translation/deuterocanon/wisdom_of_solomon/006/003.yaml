translation:
  text: For authority was given to you by the Lord, and sovereignty by the Most High,
    who will examine your works and investigate your plans;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the Lord ... from the Most High'; the Greek preposition marks source,
      and English may express it either way.
    reason: lexical_alternative
  - marker: b
    text: '''Plans'' can also be rendered ''counsels'' or ''intentions,'' emphasizing
      the rulers'' inner deliberations as well as their outward acts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κράτησις
  chosen: authority
  alternatives:
  - power
  - rule
  - dominion
  lexicon: LSJ
  rationale: In this context addressed to rulers, κράτησις denotes the holding or
    exercise of governing power. 'Authority' fits the political sense and reads naturally
    in English without overstating physical force.
- source_word: δυναστεία
  chosen: sovereignty
  alternatives:
  - dominion
  - lordship
  - dynasty
  - rule
  lexicon: LSJ
  rationale: The term refers to ruling power or dominion, not a hereditary line here.
    'Sovereignty' pairs well with κράτησις while distinguishing the second term from
    the first.
- source_word: παρὰ τοῦ κυρίου
  chosen: by the Lord
  alternatives:
  - from the Lord
  lexicon: BDAG
  rationale: παρά with the genitive marks source. English 'by the Lord' is idiomatic
    after 'was given' and preserves divine source. κύριος follows the project's default
    rendering 'Lord'.
- source_word: παρὰ Ὑψίστου
  chosen: by the Most High
  alternatives:
  - from the Most High
  lexicon: LSJ
  rationale: As with the previous phrase, παρά marks source. 'Most High' is the standard
    rendering of Ὕψιστος as a divine title and preserves the elevated register.
- source_word: ἐξετάσει
  chosen: will examine
  alternatives:
  - will scrutinize
  - will inquire into
  - will test
  lexicon: BDAG
  rationale: The future verb conveys careful examination. 'Will examine' is clear,
    formal enough for judgment language, and pairs well with the following stronger
    investigative verb.
- source_word: διεραυνήσει
  chosen: investigate
  alternatives:
  - search out
  - probe
  - scrutinize thoroughly
  lexicon: LSJ
  rationale: The compound verb intensifies the idea of searching thoroughly. 'Investigate'
    communicates deliberate probing of inner counsel and complements 'examine' without
    redundancy.
- source_word: βουλάς
  chosen: plans
  alternatives:
  - counsels
  - intentions
  - deliberations
  lexicon: BDAG
  rationale: βουλαί here are the rulers' counsels or intentions. 'Plans' is accessible
    modern English and captures purposeful deliberation; the more formal 'counsels'
    is possible but less natural for contemporary readers.
