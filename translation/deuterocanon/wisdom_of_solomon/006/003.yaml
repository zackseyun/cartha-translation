theological_decisions:
- issue: Divine titles κύριος and Ὕψιστος in parallel
  chosen_reading: Render as 'the Lord' and 'the Most High'
  alternative_readings:
  - the LORD and the Most High
  - the Master and the Most High
  rationale: The verse attributes political authority to Israel's God using two titles
    in parallel. Following project defaults, κύριος is rendered 'Lord'; Ὕψιστος is
    translated as the divine title 'Most High.' This preserves the theological claim
    that earthly rulers derive power from God and are accountable to him.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; translate titles'
