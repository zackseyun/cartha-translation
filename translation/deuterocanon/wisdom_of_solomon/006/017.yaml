translation:
  text: For the truest beginning of her is the desire for instruction,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the surest beginning of her is a longing for discipline/instruction.'
      The Greek παιδεία can include instruction, training, or discipline.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχὴ
  chosen: beginning
  alternatives:
  - first step
  - origin
  lexicon: BDAG
  rationale: ἀρχή commonly denotes beginning, first point, or origin. In this aphoristic
    context, 'beginning' best preserves the metaphor of the initial stage in attaining
    wisdom.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanatory ground for the preceding statement. 'For'
    is the most natural concise English connective here.
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - it
  - wisdom's
  lexicon: BDAG
  rationale: The pronoun refers back to Wisdom, grammatically feminine in Greek and
    personified as female in this context. 'Her' preserves the personification better
    than the impersonal 'it.'
- source_word: ἡ ἀληθεστάτη
  chosen: the truest
  alternatives:
  - the surest
  - the most genuine
  - the very true
  lexicon: BDAG
  rationale: 'As a superlative of ἀληθής, the phrase intensifies the claim: this is
    the most real or genuine beginning. ''The truest'' preserves the superlative force
    and the qualitative nuance.'
- source_word: παιδείας
  chosen: instruction
  alternatives:
  - discipline
  - education
  - training
  lexicon: BDAG
  rationale: παιδεία can mean education, training, or discipline. Here, in wisdom
    literature, 'instruction' is idiomatic and broad enough to include formative training
    without sounding overly institutional.
- source_word: ἐπιθυμία
  chosen: desire
  alternatives:
  - longing
  - eagerness
  lexicon: BDAG
  rationale: ἐπιθυμία denotes desire or longing. 'Desire' is the most direct rendering
    and avoids overinterpreting the emotional intensity.
