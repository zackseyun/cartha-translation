theological_decisions:
- issue: Personification of σοφία
  chosen_reading: Render σοφία with feminine personal reference ('her') and capitalize
    'Wisdom' in English.
  alternative_readings:
  - Use lowercase 'wisdom' while still using feminine pronouns
  - Depersonalize as an abstract quality without feminine reference
  rationale: The Greek explicitly uses feminine grammatical forms and the surrounding
    context treats wisdom as a personified female figure. Preserving that literary-theological
    presentation is more faithful than flattening the verse into abstraction.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
