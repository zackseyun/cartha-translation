translation:
  text: Wisdom is radiant and unfading, and is readily seen by those who love her;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'easily perceived' or 'readily beheld.' The Greek verb can carry both
      visual and perceptive force.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λαμπρὰ
  chosen: radiant
  alternatives:
  - bright
  - splendid
  - glorious
  lexicon: LSJ
  rationale: Conveys visible brilliance in natural English without over-intensifying
    into overtly theological language. It fits the personified portrayal of wisdom
    and pairs well with the following adjective.
- source_word: ἀμάραντός
  chosen: unfading
  alternatives:
  - unwithering
  - imperishable
  - ever-blooming
  lexicon: LSJ
  rationale: The adjective literally evokes not withering or losing bloom. 'Unfading'
    is idiomatic English and preserves the image of enduring freshness better than
    the more abstract 'imperishable'.
- source_word: σοφία
  chosen: Wisdom
  alternatives:
  - wisdom
  lexicon: LSJ
  rationale: Capitalized because in this context σοφία is personified as a feminine
    figure throughout the passage, not merely an abstract quality. The capitalization
    helps English readers track the literary personification without changing the
    meaning.
- source_word: εὐχερῶς
  chosen: readily
  alternatives:
  - easily
  - without difficulty
  - readily accessible
  lexicon: LSJ
  rationale: Expresses ease or readiness in a concise way. 'Readily' sounds natural
    with 'is seen' and avoids the slightly flat tone of 'easily'.
- source_word: θεωρεῖται
  chosen: is readily seen
  alternatives:
  - is perceived
  - is beheld
  - is contemplated
  lexicon: LSJ
  rationale: The verb can denote seeing, beholding, or perceiving. Here the immediate
    sense is that Wisdom is not hidden from her lovers. 'Seen' keeps the visual imagery
    established by 'radiant,' while remaining broad enough to include recognition.
- source_word: ὑπὸ τῶν ἀγαπώντων αὐτήν
  chosen: by those who love her
  alternatives:
  - by the ones loving her
  - by those who cherish her
  lexicon: LSJ
  rationale: A straightforward rendering of the present participial phrase. 'Love'
    preserves the lexical connection with ἀγαπάω and keeps the personified feminine
    object explicit with 'her'.
