translation:
  text: and incorruptibility causes one to be near God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'immortality causes one to be near God.' The Greek ἀφθαρσία can denote
      imperishability or freedom from corruption; here 'incorruptibility' preserves
      the broader sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφθαρσία
  chosen: incorruptibility
  alternatives:
  - immortality
  - imperishability
  lexicon: LSJ/BDAG
  rationale: The noun denotes the state of being not subject to decay or corruption.
    'Incorruptibility' best preserves the moral-philosophical and ontological nuance
    in Wisdom's argument, while 'immortality' is possible but narrower and more interpretive.
- source_word: ἐγγὺς
  chosen: near
  alternatives:
  - close to
  lexicon: LSJ
  rationale: The adverb/adjectival expression with εἶναι naturally means 'to be near.'
    'Near' is concise and preserves the relational sense without overinterpreting
    it as mystical union.
- source_word: εἶναι
  chosen: to be
  lexicon: LSJ
  rationale: 'Infinitive complement after ποιεῖ: the phrase literally means ''makes
    [one] to be near God.'' English smooths this as ''causes one to be near God.'''
- source_word: ποιεῖ
  chosen: causes one to be
  alternatives:
  - makes one
  - brings one
  lexicon: LSJ
  rationale: ποιέω here is causative. Because the Greek leaves the object implicit
    from context, English requires a supplied generic object; 'causes one to be' is
    natural and minimally interpretive.
- source_word: θεοῦ
  chosen: God
  lexicon: LSJ
  rationale: Genitive after ἐγγύς expresses nearness to God. English idiom requires
    the preposition 'to' rather than a bare genitive.
