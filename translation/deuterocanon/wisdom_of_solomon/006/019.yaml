theological_decisions:
- issue: Implicit subject/object in the clause
  chosen_reading: 'Supply a generic human object: ''causes one to be near God'''
  alternative_readings:
  - '''brings near to God'''
  - '''makes [wisdom] near to God'''
  rationale: The Greek clause lacks an explicit object, but the surrounding context
    speaks of the seeker/possessor of wisdom and the chain leading toward kingship.
    Supplying a generic human object is necessary in English and best fits the argument.
    Reading wisdom itself as the thing made near to God is less likely in context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering ἀφθαρσία
  chosen_reading: incorruptibility
  alternative_readings:
  - immortality
  - imperishability
  rationale: The verse links ethical steadfastness and relation to God. 'Incorruptibility'
    preserves both moral and existential dimensions without collapsing the term into
    mere endless life.
  doctrine_reference: Translation philosophy §1, §6
