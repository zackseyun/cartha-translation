theological_decisions:
- issue: Meaning of βασιλεία in this wisdom-context aphorism
  chosen_reading: kingship
  alternative_readings:
  - kingdom
  - royal rule
  rationale: The verse concludes a chain of reasoning about honoring wisdom and attaining
    rule. Rendering βασιλεία as 'kingship' fits the immediate context of attaining
    royal status or reign, rather than entry into a geographic kingdom. This is a
    contextual lexical decision, not a doctrinally contested christological term.
