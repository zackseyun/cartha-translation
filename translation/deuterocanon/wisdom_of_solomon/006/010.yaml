theological_decisions:
- issue: Sense of the holiness wordplay (ὁσίως / τὰ ὅσια / ὁσιωθήσονται)
  chosen_reading: 'Retain explicit holiness language throughout: ''kept holy things
    in holiness ... will be made holy.'''
  alternative_readings:
  - '''have piously observed sacred things ... will be sanctified'''
  rationale: The Greek is rhetorically dense with cognate terms. Preserving the repetition
    is important for auditability and for the verse's moral-theological logic, even
    if the English is slightly less idiomatic.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Meaning of ἀπολογία
  chosen_reading: forensic 'defense'
  alternative_readings:
  - '''justification'''
  - '''answer'''
  rationale: The term can mean a reasoned answer or legal defense. In context, 'defense'
    best preserves the possibility of vindication before judgment without importing
    later doctrinal categories of justification.
  doctrine_reference: Translation philosophy §§1, 3
