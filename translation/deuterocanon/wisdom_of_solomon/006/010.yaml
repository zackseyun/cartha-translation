translation:
  text: For those who have kept holy things holily will be made holy, and those who
    have been taught them will find a defense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have piously observed sacred things ... will be sanctified.' The Greek
      uses a deliberate cluster of cognate holiness terms.
    reason: lexical_alternative
  - marker: b
    text: Or 'will find an answer' or 'will find justification.' The Greek term can
      denote a defense given in response to examination or accusation.
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλάξαντες
  chosen: have kept
  alternatives:
  - have guarded
  - have observed
  lexicon: BDAG
  rationale: The participle denotes careful keeping/observing. 'Have kept' is natural
    English and preserves the moral-observational sense without over-specifying physical
    guarding.
- source_word: ὁσίως
  chosen: in holiness
  alternatives:
  - piously
  - holily
  lexicon: LSJ
  rationale: The adverb is cognate with ὅσια/ὁσιωθήσονται and the verse uses deliberate
    wordplay. 'In holiness' preserves the lexical linkage better than the more idiomatic
    but less transparent 'piously'.
- source_word: τὰ ὅσια
  chosen: holy things
  alternatives:
  - sacred things
  - holy duties
  lexicon: LSJ
  rationale: The neuter plural likely refers broadly to sacred matters or holy ordinances.
    'Holy things' is the most direct rendering and keeps the repetition with the cognate
    terms visible.
- source_word: ὁσιωθήσονται
  chosen: will be made holy
  alternatives:
  - will be sanctified
  - will be shown holy
  lexicon: LSJ
  rationale: The future passive naturally yields 'will be made holy.' This preserves
    the cognate wordplay with ὁσίως and τὰ ὅσια. 'Sanctified' is possible but introduces
    more ecclesiastical diction than needed.
- source_word: διδαχθέντες
  chosen: have been taught
  alternatives:
  - having been instructed
  - having learned
  lexicon: BDAG
  rationale: The passive participle indicates receiving instruction. 'Have been taught'
    is clear, modern, and faithful to the passive form.
- source_word: αὐτά
  chosen: them
  alternatives:
  - these things
  - those things
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to the holy things/sacred matters
    just mentioned. 'Them' is concise and idiomatic.
- source_word: εὑρήσουσιν ἀπολογίαν
  chosen: will find a defense
  alternatives:
  - will find justification
  - will find an answer
  lexicon: BDAG
  rationale: ἀπολογία commonly denotes a defense or answer in response to accusation
    or scrutiny. 'Will find a defense' preserves that forensic nuance without overstating
    acquittal. 'Justification' would import stronger theological freight not demanded
    by the text.
