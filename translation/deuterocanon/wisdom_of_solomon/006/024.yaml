translation:
  text: A multitude of the wise is the salvation of the world, and a prudent king
    is the stability of a people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance' or 'preservation' for 'salvation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the stability of the people.' The Greek δήμου can mean 'people,' 'populace,'
      or 'citizen body.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλῆθος
  chosen: a multitude
  alternatives:
  - a great number
  - abundance
  lexicon: LSJ
  rationale: πλῆθος commonly denotes a multitude or large number. 'A multitude' preserves
    the nominal force and the aphoristic style better than a more interpretive paraphrase.
- source_word: σοφῶν
  chosen: of the wise
  alternatives:
  - of wise people
  - of sages
  lexicon: LSJ
  rationale: The genitive plural refers to wise persons generally. 'Of the wise' is
    concise and preserves the elevated proverbial tone; 'wise people' is possible
    but less literary.
- source_word: σωτηρία
  chosen: salvation
  alternatives:
  - deliverance
  - preservation
  lexicon: LSJ
  rationale: σωτηρία can mean salvation, deliverance, or preservation. Here the sense
    is broad public welfare or saving benefit. 'Salvation' keeps the weight of the
    Greek while remaining natural in English; the more secular nuance is preserved
    by context rather than flattening the term.
- source_word: κόσμου
  chosen: of the world
  alternatives:
  - for the world
  - of the human world
  lexicon: LSJ
  rationale: κόσμος here most naturally means the world in a broad human/cosmic sense.
    The genitive is rendered straightforwardly as 'of the world' rather than recast.
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - ruler
  lexicon: LSJ
  rationale: The term specifically denotes a king, not merely a generic ruler, so
    the more precise political title is retained.
- source_word: φρόνιμος
  chosen: prudent
  alternatives:
  - wise
  - sensible
  - discerning
  lexicon: LSJ
  rationale: φρόνιμος emphasizes practical wisdom, sound judgment, and prudence. 'Prudent'
    distinguishes it from σοφός in the first clause and preserves the nuance of practical
    statecraft.
- source_word: εὐσταθία
  chosen: stability
  alternatives:
  - steadfastness
  - security
  - firmness
  lexicon: LSJ
  rationale: εὐσταθία denotes steadiness or stability. In political context, 'stability'
    best conveys civic firmness under good rule.
- source_word: δήμου
  chosen: of a people
  alternatives:
  - of the people
  - of a nation
  - of the populace
  lexicon: LSJ
  rationale: δῆμος can mean people, populace, or citizen body. 'Of a people' fits
    the gnomic, generalizing style better than the more specific 'of the people,'
    which could sound overly definite in English.
