theological_decisions:
- issue: Scope of σωτηρία in wisdom-political context
  chosen_reading: Rendered as 'salvation' rather than reducing it to merely civic
    welfare.
  alternative_readings:
  - deliverance
  - preservation
  - welfare
  rationale: The verse is proverbial and political, but σωτηρία still carries the
    stronger sense of saving benefit. Using 'salvation' preserves the lexical weight
    of the Greek while the surrounding nouns ('world,' 'people') guide readers toward
    a communal, this-worldly application.
