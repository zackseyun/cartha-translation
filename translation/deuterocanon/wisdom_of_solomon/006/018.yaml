theological_decisions:
- issue: Personification of Wisdom in the pronoun αὐτῆς
  chosen_reading: Render the pronoun as 'her,' referring to personified Wisdom.
  alternative_readings:
  - Render more abstractly as 'its,' referring to instruction or wisdom as an impersonal
    concept.
  rationale: The immediate and broader context personifies Wisdom as feminine, and
    the Greek feminine pronoun supports preserving that literary-theological feature
    in English.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering ἀφθαρσία
  chosen_reading: Translate as 'incorruptibility' in the main text.
  alternative_readings:
  - immortality
  - imperishability
  rationale: The term can overlap conceptually with immortality, but the Greek wording
    itself emphasizes freedom from corruption/decay. Preserving that wording avoids
    importing a narrower doctrinal conclusion than the text states.
  doctrine_reference: Translation philosophy §1, §3
