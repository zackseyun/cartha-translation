translation:
  text: and concern for instruction is love, and love is the keeping of her laws,
    and attention to her laws is the assurance of incorruptibility,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'discipline' or 'training' for 'instruction' (παιδεία), emphasizing formative
      moral education.
    reason: lexical_alternative
  - marker: b
    text: Or 'immortality' for 'incorruptibility' (ἀφθαρσία). The Greek more literally
      speaks of freedom from corruption or decay.
    reason: lexical_alternative
lexical_decisions:
- source_word: φροντίς
  chosen: concern
  alternatives:
  - care
  - thought
  - earnest concern
  lexicon: LSJ
  rationale: φροντίς denotes care, thought, or concern. 'Concern' preserves the abstract
    noun and fits the chain of definitions in the verse without sounding overly psychological.
- source_word: παιδείας
  chosen: instruction
  alternatives:
  - discipline
  - education
  - training
  lexicon: LSJ
  rationale: In Wisdom literature παιδεία often carries the sense of formative instruction/discipline.
    'Instruction' is chosen here as the most readable and broad term, while still
    allowing the moral-formative sense. The following pronoun αὐτῆς indicates personified
    Wisdom, so this is instruction associated with her.
- source_word: ἀγάπη
  chosen: love
  lexicon: BDAG
  rationale: Per doctrine, ἀγάπη defaults to 'love.' The verse intentionally repeats
    the noun, and the English preserves that repetition.
- source_word: τήρησις
  chosen: keeping
  alternatives:
  - observance
  - guarding
  lexicon: LSJ
  rationale: τήρησις refers to keeping or observance. 'Keeping' is more natural in
    modern English and retains the active sense of obeying/maintaining laws.
- source_word: νόμων
  chosen: laws
  alternatives:
  - commands
  - statutes
  lexicon: LSJ
  rationale: νόμος in the plural here is best rendered 'laws.' 'Commands' would be
    possible, but 'laws' matches the Greek more directly and suits the wisdom tradition's
    legal-ethical register.
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  lexicon: LSJ
  rationale: The pronoun refers back to personified Wisdom in the surrounding context.
    'Her' preserves the feminine personification present in the Greek rather than
    flattening it to an impersonal 'its.'
- source_word: προσοχή
  chosen: attention
  alternatives:
  - heed
  - devotion
  - careful attention
  lexicon: LSJ
  rationale: προσοχή denotes attention or heedfulness. 'Attention' is concise and
    readable, and it parallels the abstract-noun style of the verse.
- source_word: βεβαίωσις
  chosen: assurance
  alternatives:
  - confirmation
  - establishment
  - guarantee
  lexicon: LSJ
  rationale: βεβαίωσις can mean confirmation or making firm. 'Assurance' communicates
    the result of something made secure, fitting the progression toward ἀφθαρσία.
    'Guarantee' would overstate the term.
- source_word: ἀφθαρσίας
  chosen: incorruptibility
  alternatives:
  - immortality
  - imperishability
  lexicon: LSJ
  rationale: ἀφθαρσία literally denotes incorruptibility or imperishability. 'Incorruptibility'
    is chosen because it is the most direct rendering and preserves the conceptual
    link to Wisdom's philosophical vocabulary; 'immortality' is a contextual interpretation
    better left as an alternative.
