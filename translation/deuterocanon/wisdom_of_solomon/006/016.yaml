theological_decisions:
- issue: Personification of wisdom as an active female figure
  chosen_reading: Retain feminine personal language throughout ('she ... her')
  alternative_readings:
  - Render more abstractly as 'wisdom ... it'
  rationale: The Greek consistently personifies wisdom with feminine grammatical forms
    and vivid personal action. Preserving 'she' and 'her' reflects the source text's
    literary-theological presentation rather than flattening it into abstraction.
  doctrine_reference: Translation philosophy §§1, 3, 6
