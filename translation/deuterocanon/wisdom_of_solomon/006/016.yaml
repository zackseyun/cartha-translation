translation:
  text: For she goes about seeking those worthy of her, and graciously appears to
    them on the paths, and meets them in every thought.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in every plan' or 'in every intention.' The Greek can refer either to
      thought in general or to a formed purpose.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς ἀξίους αὐτῆς
  chosen: those worthy of her
  alternatives:
  - those deserving of her
  - those fit for her
  lexicon: LSJ
  rationale: ἄξιος commonly means worthy, deserving, or fit. 'Worthy of her' preserves
    the relational genitive and the evaluative sense without overinterpreting merit.
- source_word: περιέρχεται ζητοῦσα
  chosen: goes about seeking
  alternatives:
  - goes around looking for
  - searches out
  lexicon: LSJ
  rationale: The participle ζητοῦσα modifies the finite verb and conveys active, ongoing
    pursuit. 'Goes about seeking' preserves both motion and intentional search.
- source_word: ἐν ταῖς τρίβοις
  chosen: on the paths
  alternatives:
  - in the paths
  - along the roads
  lexicon: LSJ
  rationale: τρίβος denotes a path, track, or road. 'On the paths' is idiomatic in
    English and keeps the concrete imagery rather than abstracting it.
- source_word: φαντάζεται αὐτοῖς εὐμενῶς
  chosen: graciously appears to them
  alternatives:
  - shows herself favorably to them
  - appears kindly to them
  lexicon: LSJ
  rationale: φαντάζομαι here has the sense of becoming visible or appearing; εὐμενῶς
    adds the nuance of favor or graciousness. 'Graciously appears' is natural English
    and preserves the benevolent initiative of Wisdom.
- source_word: ἐν πάσῃ ἐπινοίᾳ
  chosen: in every thought
  alternatives:
  - in every plan
  - in every intention
  - in every design
  lexicon: LSJ
  rationale: ἐπίνοια can mean thought, notion, plan, or intention. In this context
    of Wisdom's readiness to meet seekers, 'every thought' best captures the breadth
    of inward reflection without narrowing it to strategic planning.
- source_word: ὑπαντᾷ αὐτοῖς
  chosen: meets them
  alternatives:
  - comes to meet them
  - encounters them
  lexicon: LSJ
  rationale: ὑπαντάω means to meet or go to meet. 'Meets them' is concise and preserves
    Wisdom's initiative.
