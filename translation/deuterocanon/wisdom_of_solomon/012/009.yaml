theological_decisions:
- issue: Implicit subject and addressee in a participial clause describing divine
    restraint
  chosen_reading: Addressed to God as 'you were unable,' making explicit that divine
    patience was not due to lack of power
  alternative_readings:
  - More literally, 'not being unable' without supplying 'because'
  rationale: The surrounding context addresses God directly and contrasts his power
    with his measured judgment. Making the causal implication explicit in English
    clarifies the theology of patient judgment without adding content foreign to the
    Greek.
