translation:
  text: not because you were unable, in battle, to give the ungodly into subjection,
    or to wipe them out at once by savage beasts or by a sharp word;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in one stroke.' The Greek idiom ὑφʼ ἓν emphasizes destroying them all
      in a single action.
    reason: lexical_alternative
  - marker: b
    text: Or 'by a cutting word' or 'by a severe command.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἀδυνατῶν
  chosen: not because you were unable
  alternatives:
  - not being powerless
  - not lacking power
  lexicon: LSJ
  rationale: The participial phrase explains that God's gradual judgment was not due
    to inability. English idiom requires making the causal force explicit from context,
    hence 'not because you were unable' rather than a wooden participial rendering.
- source_word: ἐν παρατάξει
  chosen: in battle
  alternatives:
  - in array
  - in battle line
  - in pitched battle
  lexicon: LSJ
  rationale: παράταξις commonly refers to battle formation or engagement. 'In battle'
    is clear modern English and preserves the military sense without archaic phrasing.
- source_word: ἀσεβεῖς
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: LSJ
  rationale: In Wisdom, ἀσεβής often carries the sense of irreverence toward God,
    not merely general moral evil. 'Ungodly' preserves that theological dimension
    better than the broader 'wicked'.
- source_word: ὑποχειρίους δοῦναι
  chosen: to give ... into subjection
  alternatives:
  - to hand over as captives
  - to make subject
  - to deliver into your power
  lexicon: LSJ
  rationale: ὑποχείριος means under one's hand/power, hence subdued or subject. 'Give
    into subjection' keeps the verbal imagery of δοῦναι while expressing the result
    of domination.
- source_word: θηρίοις δεινοῖς
  chosen: by savage beasts
  alternatives:
  - by terrible beasts
  - by fierce animals
  lexicon: LSJ
  rationale: θηρία are wild beasts; δεινοῖς intensifies their fearsome character.
    'Savage beasts' is vivid and natural English.
- source_word: λόγῳ ἀποτόμῳ
  chosen: by a sharp word
  alternatives:
  - by a cutting word
  - by a severe command
  - by an abrupt word
  lexicon: LSJ
  rationale: ἀπότομος can mean sharp, severe, or cutting. In context of divine power
    destroying instantly, 'sharp word' preserves the metaphor and allows readers to
    hear the force of a decisive utterance.
- source_word: ὑφʼ ἓν
  chosen: at once
  alternatives:
  - in one stroke
  - all at once
  - in a single moment
  lexicon: LSJ
  rationale: The idiom conveys doing something in one go or at one time. 'At once'
    is concise and idiomatic.
- source_word: ἐκτρῖψαι
  chosen: to wipe them out
  alternatives:
  - to destroy
  - to exterminate
  - to blot out
  lexicon: LSJ
  rationale: The verb conveys rubbing out or utterly destroying. 'Wipe them out' is
    strong but still readable modern English, matching the totalizing force of the
    Greek.
