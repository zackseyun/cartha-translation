translation:
  text: so that the land most precious of all in your sight might receive a worthy
    colony of God's children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a worthy settlement' for 'a worthy colony.' The Greek ἀποικία can denote
      a colony or settled population.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the land most precious of all before you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: LSJ
  rationale: Introduces purpose/result; 'so that' is natural modern English and preserves
    the clause's telic force.
- source_word: ἀξίαν
  chosen: worthy
  alternatives:
  - fit
  - deserving
  - worthy of it
  lexicon: LSJ
  rationale: Predicate-like modifier of ἀποικίαν; 'worthy' best captures moral/qualitative
    suitability without overexpansion.
- source_word: ἀποικίαν
  chosen: colony
  alternatives:
  - settlement
  - inhabitation
  lexicon: LSJ
  rationale: The noun denotes a colony or settled population. 'Colony' preserves the
    concrete sense of a people planted in a land better than the more generic 'settlement.'
- source_word: δέξηται
  chosen: might receive
  alternatives:
  - may receive
  - might welcome
  lexicon: LSJ
  rationale: Aorist middle subjunctive after ἵνα. 'Might receive' conveys purpose
    with idiomatic English; 'welcome' would add warmth not explicit in the verb.
- source_word: θεοῦ παίδων
  chosen: God's children
  alternatives:
  - children of God
  - sons of God
  lexicon: LSJ
  rationale: παίδων is the plural of παῖς, which can mean children/sons/servants depending
    on context. Here familial sense fits the people settled in the land. 'God's children'
    is natural English; 'sons of God' would over-specify male gender not required
    by παῖς in this context.
- source_word: ἡ ... γῆ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: LSJ
  rationale: In context this refers to the specific land prepared for God's people,
    not the earth generally.
- source_word: ἡ παρὰ σοὶ πασῶν τιμιωτάτη
  chosen: most precious of all in your sight
  alternatives:
  - most honored of all before you
  - most valued of all by you
  lexicon: LSJ
  rationale: παρὰ σοὶ expresses evaluation from God's perspective ('with/before you'),
    and the superlative τιμιωτάτη means 'most precious/most honored.' 'In your sight'
    idiomatically conveys divine valuation.
