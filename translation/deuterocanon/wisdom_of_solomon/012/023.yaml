theological_decisions:
- issue: Nature of divine retribution expressed by διὰ τῶν ἰδίων βδελυγμάτων
  chosen_reading: God punished them by means corresponding to their own abominable
    practices or objects.
  alternative_readings:
  - God punished them because of their abominations
  - God punished them through the creatures or idols associated with their abominations
  rationale: The Greek most naturally expresses instrumentality ('through/by means
    of') rather than mere cause. This fits the immediate Wisdom context of fitting
    or mirrored judgment without importing a more specific mechanism than the verse
    itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
