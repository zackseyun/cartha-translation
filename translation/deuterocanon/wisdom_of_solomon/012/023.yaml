translation:
  text: Therefore you also tormented, through their own abominations, those unrighteous
    men who had lived in the folly of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by means of their own detestable practices.' The Greek can refer broadly
      to abominable things, including idolatrous acts or objects.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - For this reason
  - Hence
  - Therefore also
  lexicon: LSJ
  rationale: Inferential conjunction drawing a conclusion from the preceding argument;
    'Therefore' is natural modern English and preserves the logical connection.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - and
  lexicon: LSJ
  rationale: Adds emphasis to the divine action in continuity with what precedes;
    rendered 'also' rather than a simple 'and' to reflect the adverbial force here.
- source_word: τοὺς ... ἀδίκους
  chosen: those unjust men
  alternatives:
  - the unrighteous
  - those wicked ones
  - the unjust
  lexicon: LSJ
  rationale: ἀδίκους denotes people characterized by injustice or unrighteousness.
    'Unjust' is a direct and readable rendering. 'Men' is supplied because the Greek
    article with adjective functions substantivally for persons; this keeps the personal
    reference explicit without over-paraphrasing.
- source_word: ἐν ἀφροσύνῃ ζωῆς
  chosen: in the folly of life
  alternatives:
  - in life's folly
  - in foolishness of life
  - in a foolish way of life
  lexicon: LSJ
  rationale: ἀφροσύνη is 'folly' or 'senselessness.' The genitive ζωῆς is best taken
    as qualifying the sphere or character of their living. 'The folly of life' preserves
    the compact Greek expression while remaining intelligible.
- source_word: βιώσαντας
  chosen: who had lived
  alternatives:
  - having lived
  - who spent their lives
  - who conducted their lives
  lexicon: LSJ
  rationale: Aorist participle of βιόω, referring to the manner in which they lived.
    'Who had lived' fits idiomatic English in relation to the main verb and preserves
    the participial sense.
- source_word: διὰ τῶν ἰδίων ... βδελυγμάτων
  chosen: through their own abominations
  alternatives:
  - by means of their own detestable practices
  - through the very things they abhorred
  - through their own loathsome acts
  lexicon: LSJ
  rationale: διά with the genitive indicates means or instrumentality. βδελύγματα
    refers to abominable or detestable things, likely their idolatrous practices or
    objects. 'Through their own abominations' is concise and preserves the rhetorical
    irony that the means of punishment corresponded to their sins.
- source_word: ἐβασάνισας
  chosen: you tormented
  alternatives:
  - you afflicted
  - you punished
  - you tested
  lexicon: LSJ
  rationale: βασανίζω can mean torment, torture, or severe affliction. In this judgment
    context, 'tormented' best conveys the intensity without softening it to mere discipline.
