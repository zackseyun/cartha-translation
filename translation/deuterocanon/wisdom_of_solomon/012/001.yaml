translation:
  text: For your imperishable Spirit is in all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your spirit is in all'; the Greek ἐν πᾶσιν can be rendered more tersely,
      but 'in all things' makes the likely neuter plural sense explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφθαρτόν
  chosen: imperishable
  alternatives:
  - incorruptible
  - undying
  lexicon: BDAG
  rationale: The adjective denotes what is not subject to decay or corruption. 'Imperishable'
    is clear modern English and preserves the ontological sense better than the more
    archaic 'incorruptible.'
- source_word: πνεῦμά
  chosen: Spirit
  alternatives:
  - spirit
  - breath
  lexicon: BDAG
  rationale: In this context, modified by 'your' and describing God's presence in
    all things, the referent is best rendered 'Spirit' with capitalization to mark
    divine reference in English. 'Breath' is lexically possible in some contexts but
    does not fit the theological sense here.
- source_word: ἐν πᾶσιν
  chosen: in all things
  alternatives:
  - in all
  - among all things
  - in everyone
  lexicon: BDAG
  rationale: The neuter plural sense is best captured by 'all things,' indicating
    universal scope across creation rather than only persons. 'In everyone' would
    narrow the reference beyond what the Greek states.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: The conjunction gives the reason for the preceding statement, so 'For'
    preserves the connective force naturally in English.
