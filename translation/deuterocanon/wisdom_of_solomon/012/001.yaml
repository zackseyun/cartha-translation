theological_decisions:
- issue: Reference and capitalization of πνεῦμά σου
  chosen_reading: your Spirit
  alternative_readings:
  - your spirit
  rationale: The verse speaks of God's life-giving, sustaining presence in all things.
    Capitalizing 'Spirit' reflects a divine referent without importing later doctrinal
    precision beyond the text. The alternative lower-case reading is possible as a
    more abstract description of God's animating spirit, but the possessive and context
    favor a personal divine reference in English.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English
