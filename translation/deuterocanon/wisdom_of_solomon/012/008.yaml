translation:
  text: But even these, since they were human beings, you spared, and you sent hornets
    ahead as forerunners of your army, so that they might destroy them little by little;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as men' / 'inasmuch as they were human.' The Greek highlights that they
      were mortal human beings, which is given as the reason for God's restraint.
    reason: lexical_alternative
  - marker: b
    text: '''Hornets'' echoes the biblical motif of God sending stinging insects ahead
      of Israel against hostile peoples; compare Exod 23:28; Deut 7:20; Josh 24:12.'
    reason: cross_reference
  - marker: c
    text: Or 'of your camp.' The Greek στρατόπεδον can denote a camp or an army/host;
      the military image is retained either way.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ τούτων
  chosen: But even these
  alternatives:
  - But also these
  - Yet even these
  lexicon: LSJ
  rationale: Retains the adversative/additive force of ἀλλὰ καί and the demonstrative
    reference to the peoples under discussion in the surrounding context.
- source_word: ὡς ἀνθρώπων
  chosen: since they were human beings
  alternatives:
  - as men
  - inasmuch as they were human
  lexicon: LSJ
  rationale: ὡς here gives the ground or consideration under which God acted; ἀνθρώπων
    highlights their status as human beings. 'Human beings' is gender-accurate and
    natural in English.
- source_word: ἐφείσω
  chosen: you spared
  alternatives:
  - you had pity on
  - you refrained from destroying
  lexicon: LSJ
  rationale: The verb means to spare or refrain from harming. 'You spared' is concise
    and fits the context of delayed judgment.
- source_word: ἀπέστειλάς τε
  chosen: and you sent
  alternatives:
  - and you dispatched
  lexicon: LSJ
  rationale: Straightforward past-tense rendering of the aorist with τε linking the
    clause to the previous statement.
- source_word: προδρόμους
  chosen: as forerunners
  alternatives:
  - as advance agents
  - ahead
  lexicon: LSJ
  rationale: The noun denotes those going before in advance. 'Forerunners' preserves
    the metaphor of something sent ahead before the main force.
- source_word: τοῦ στρατοπέδου σου
  chosen: of your army
  alternatives:
  - of your camp
  - of your host
  lexicon: LSJ
  rationale: στρατόπεδον can mean camp or army/host. In this context of divine punitive
    action, 'army' communicates the military image more clearly in English than the
    more literal but potentially misleading 'camp.'
- source_word: σφῆκας
  chosen: hornets
  alternatives:
  - wasps
  lexicon: LSJ
  rationale: The standard rendering is 'hornets.' This also resonates with the biblical
    motif of hornets sent ahead against enemies.
- source_word: ἵνα αὐτοὺς κατὰ βραχὺ ἐξολεθρεύσωσιν
  chosen: so that they might destroy them little by little
  alternatives:
  - so that they might exterminate them gradually
  - in order that they might wipe them out bit by bit
  lexicon: LSJ
  rationale: ἵνα with subjunctive expresses purpose; κατὰ βραχύ means gradually/little
    by little; ἐξολεθρεύω is strong ('destroy utterly'), but in idiomatic English
    'destroy them little by little' preserves both the severity and the gradual process.
