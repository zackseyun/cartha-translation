theological_decisions:
- issue: Reason given for divine sparing
  chosen_reading: The text grounds God's restraint in their being human beings.
  alternative_readings:
  - The phrase could be taken more loosely as 'treating them as men' rather than explicitly
    causal.
  rationale: Rendering ὡς ἀνθρώπων as 'since they were human beings' preserves the
    theological emphasis on divine mercy toward mortals without importing a broader
    doctrine beyond the clause itself.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
- issue: Military metaphor for divine action
  chosen_reading: '''your army'' is retained as metaphorical language for God''s punitive
    agency.'
  alternative_readings:
  - '''your camp'''
  rationale: The verse depicts hornets as sent ahead of God's στρατόπεδον. Translating
    the military image directly preserves the text's rhetoric without over-allegorizing
    it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
