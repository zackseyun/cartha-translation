theological_decisions:
- issue: Gendered filial language for Israel
  chosen_reading: your sons
  alternative_readings:
  - your children
  rationale: The Greek says υἱούς, not a gender-neutral term. Per doctrine, gender-accurate
    rendering is preferred unless context clearly demands neutralization. The covenantal
    sonship motif is also theologically significant here.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering covenant terminology distinctly
  chosen_reading: oaths and covenants
  alternative_readings:
  - promises and covenants
  - sworn agreements
  rationale: The verse stacks multiple covenantal terms to stress God's pledged relationship
    with the patriarchs. Preserving both terms avoids flattening the theological weight
    of divine commitment.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
