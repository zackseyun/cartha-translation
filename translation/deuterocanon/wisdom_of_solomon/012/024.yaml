theological_decisions:
- issue: Moral evaluation of idolatry in the verse
  chosen_reading: Retain the text's negative assessment with 'error,' 'dishonored,'
    and 'deceived' rather than softening to neutral language.
  alternative_readings:
  - Use less evaluative terms such as 'mistake' or 'lowly animals'
  rationale: The Greek explicitly presents idolatry as wandering, dishonorable valuation,
    and deception. The translation should preserve that theological critique without
    embellishment.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological
    tension rather than resolve it.'
