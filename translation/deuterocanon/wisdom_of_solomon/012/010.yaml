theological_decisions:
- issue: Whether the verse should be rendered in a way that implies absolute metaphysical
    inability to repent
  chosen_reading: The translation preserves the text's strong statement about entrenched
    evil and an unchanging mindset without adding philosophical claims beyond the
    verse.
  alternative_readings:
  - A more deterministic rendering such as 'their nature was evil from birth'
  - A softer rendering such as 'they were inclined to evil'
  rationale: The Greek states that their origin was evil, their wickedness was innate,
    and their reasoning would never change. The translation keeps this severity but
    avoids importing later doctrinal categories about inherited guilt or metaphysical
    necessity that the verse itself does not explicitly define.
  doctrine_reference: Preserve theological tension rather than resolve it.
