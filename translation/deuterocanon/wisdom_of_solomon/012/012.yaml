theological_decisions:
- issue: Divine accountability language in rhetorical questions
  chosen_reading: The verse is rendered as a series of rhetorical questions asserting
    that no one can successfully challenge God's judicial acts.
  alternative_readings:
  - A softer reading emphasizing only practical inability rather than moral/judicial
    unanswerability
  rationale: The repeated τίς-questions, legal vocabulary, and direct address to God
    frame the statement as a strong assertion of God's unassailable justice. The translation
    preserves that force without adding philosophical claims beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
- issue: Rendering masculine ἀνθρώπων
  chosen_reading: men
  alternative_readings:
  - people
  - humankind
  rationale: The Greek is grammatically masculine plural and refers here to wrongdoers
    in a judicial setting, not humanity in the abstract. Per doctrine, gender-accurate
    rendering is preferred over flattening to gender-neutral language.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
