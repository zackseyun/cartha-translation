translation:
  text: For who will say, “What have you done?” Or who will oppose your judgment?
    And who will bring a charge against you concerning nations that you destroyed?
    Or who will come before you as an avenger against unrighteous men?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who will come forward to oppose you as an avenger against unjust people?”
      The Greek expression behind “come before you” is difficult and may carry a more
      explicitly adversarial or legal sense.
    reason: lexical_alternative
  - marker: b
    text: Literally, “concerning nations having perished, which you made/did.” In
      context, the sense is that these are nations God brought to ruin, so the translation
      renders the implied force rather than the bare verb “made.”
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς γὰρ ἐρεῖ
  chosen: For who will say
  alternatives:
  - For who can say
  - Who indeed will say
  lexicon: BDAG
  rationale: Retains the rhetorical question and γάρ as explanatory/grounding ('for').
    Future 'will say' fits the Greek future and the argumentative flow.
- source_word: Τί ἐποίησας
  chosen: What have you done
  alternatives:
  - What did you do
  - Why have you done this
  lexicon: BDAG
  rationale: A direct challenge formula. English present perfect best captures the
    force of the aorist in an accusatory question without adding content such as 'why'
    not present in the Greek.
- source_word: ἀντιστήσεται
  chosen: will oppose
  alternatives:
  - will resist
  - will stand against
  lexicon: BDAG
  rationale: Conveys active resistance to God's judicial decision in clear modern
    English. 'Stand against' is more literal but less natural here.
- source_word: τῷ κρίματί σου
  chosen: your judgment
  alternatives:
  - your sentence
  - your decree
  lexicon: BDAG
  rationale: κρίμα here refers to judicial judgment or verdict. 'Judgment' is the
    broadest and most natural rendering in context.
- source_word: ἐγκαλέσει σοι
  chosen: will bring a charge against you
  alternatives:
  - will accuse you
  - will indict you
  lexicon: BDAG
  rationale: Legal language is prominent in the verse. 'Bring a charge against' preserves
    the forensic sense more explicitly than the simpler 'accuse.'
- source_word: κατὰ ἐθνῶν ἀπολωλότων
  chosen: concerning nations that you destroyed
  alternatives:
  - for destroyed nations
  - against you on account of nations that have perished
  - concerning ruined nations
  lexicon: BDAG
  rationale: The phrase is syntactically compressed. This rendering makes explicit
    that the complaint would concern the nations God caused to perish, matching the
    following relative clause. It avoids implying the nations merely perished on their
    own.
- source_word: ἃ σὺ ἐποίησας
  chosen: that you destroyed
  alternatives:
  - which you made
  - which you dealt with
  - which you brought to ruin
  lexicon: BDAG
  rationale: Although ἐποίησας often means 'made' or 'did,' in this context with ἀπολωλότων
    it idiomatically refers to what God did to those nations, namely their destruction.
    Rendering it woodenly as 'made' would be misleading in English.
- source_word: εἰς κατάστασίν σοι ἐλεύσεται
  chosen: will come before you
  alternatives:
  - will appear against you
  - will come to contend with you
  lexicon: LSJ
  rationale: The expression is difficult, but the sense is of appearing or stepping
    forward in opposition/legal standing. 'Before you' captures the courtroom-like
    setting without over-specifying a rare phrase.
- source_word: ἔκδικος
  chosen: as an avenger
  alternatives:
  - as one who exacts justice
  - as a vindicator
  lexicon: BDAG
  rationale: ἔκδικος denotes one who carries out justice or vengeance. 'Avenger' preserves
    the personal and judicial force, fitting the rhetorical challenge.
- source_word: κατὰ ἀδίκων ἀνθρώπων
  chosen: against unrighteous men
  alternatives:
  - against unjust people
  - against wicked men
  lexicon: BDAG
  rationale: ἀδίκων carries the sense of unjust/unrighteous. 'Unrighteous men' preserves
    the moral-judicial tone and follows the project's gender-accurate policy for masculine
    ἀνθρώπων here, while still functioning generically if context warrants.
