theological_decisions:
- issue: Rendering πιστεύσωσιν ἐπὶ σέ
  chosen_reading: they may put faith in you
  alternative_readings:
  - they may trust in you
  - they may believe in you
  rationale: The project default for πίστις/πιστεύω language is 'faith' in the main
    text unless context strongly requires otherwise. Here the phrase denotes reliance
    directed toward God; 'put faith in you' preserves that theological register while
    an alternative is worth preserving in a footnote for readability.
