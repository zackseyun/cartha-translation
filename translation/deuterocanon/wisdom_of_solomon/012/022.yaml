theological_decisions:
- issue: Relation between God's discipline of 'us' and punishment of 'our enemies'
  chosen_reading: The verse contrasts God's corrective discipline of his people with
    his severe scourging of their enemies.
  alternative_readings:
  - The scourging could be taken as directed toward 'us' in countless measures rather
    than toward the enemies.
  rationale: The Greek syntax most naturally reads ἡμᾶς as the object of παιδεύων
    and τοὺς ἐχθροὺς ἡμῶν as the object of μαστιγοῖς. This preserves the rhetorical
    contrast already developed in the surrounding context between measured discipline
    and harsher judgment.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Force of μεριμνῶμεν with 'your goodness'
  chosen_reading: The clause expresses thoughtful consideration of God's goodness
    in the act of judging.
  alternative_readings:
  - The clause could emphasize concern for or attentiveness to God's goodness.
  rationale: 'Because English ''be anxious about your goodness'' would mislead, the
    rendering chooses a contextually appropriate sense while preserving the ethical-theological
    point: divine goodness should shape human judgment.'
  doctrine_reference: Readable modern English, not archaic or academic.
