theological_decisions:
- issue: Whether to preserve the cultic nuance of μύστας θιάσου or flatten it into
    a generic social gathering
  chosen_reading: among the initiates of their revel band
  alternative_readings:
  - among the initiates of the cultic company
  - from the midst of the initiates of the thiasos
  rationale: The verse condemns ritualized abominations, not merely private violence.
    Retaining initiation and cultic-group language preserves the religious dimension
    of the accusation without resorting to opaque transliteration in the main text.
  doctrine_reference: Translation philosophy §§1, 6
- issue: How literally to render the cannibalistic phrase σπλαγχνοφάγων ἀνθρώπινων
    σαρκῶν
  chosen_reading: a feast of human flesh and blood
  alternative_readings:
  - a meal of human entrails and blood
  - a banquet of human flesh and blood
  rationale: The Greek is graphic. The main text keeps the horror explicit while using
    idiomatic English. A more anatomically literal rendering ('entrails') is possible
    but may over-specify the English in a way that sounds awkward; the lexical alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 6
