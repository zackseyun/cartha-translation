theological_decisions:
- issue: Referent of ψυχῶν ἀβοηθήτων
  chosen_reading: helpless lives
  alternative_readings:
  - helpless souls
  - helpless persons
  rationale: The context is the condemnation of child sacrifice and violent killing.
    Rendering ψυχῶν as 'lives' avoids importing later soul/body dualism and keeps
    the focus on vulnerable victims.
