translation:
  text: and you intended to destroy, by the hands of our fathers, even parents who
    killed helpless lives,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'parents, murderers of helpless souls/persons.' The Greek ψυχῶν can be
      rendered 'souls' or 'persons,' but here likely refers concretely to the lives
      of vulnerable victims.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐθέντας
  chosen: who killed
  alternatives:
  - murderers of
  - perpetrators against
  - masters of
  lexicon: LSJ
  rationale: In this context αὐθέντας modifies γονεῖς and refers to parents guilty
    of bloodshed. The sense 'murderers/perpetrators of killing' fits the immediate
    object ψυχῶν ἀβοηθήτων better than later meanings like 'masters' or 'authors'.
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - begetters
  - fathers and mothers
  lexicon: LSJ
  rationale: γονεῖς is the ordinary inclusive term for parents, not specifically fathers.
    'Parents' is natural modern English and preserves the familial force.
- source_word: ψυχῶν
  chosen: lives
  alternatives:
  - souls
  - persons
  lexicon: LSJ
  rationale: Here ψυχή refers to living beings whose lives were taken, not to an abstract
    immaterial soul. 'Lives' communicates the concrete sense in idiomatic English.
- source_word: ἀβοηθήτων
  chosen: helpless
  alternatives:
  - undefended
  - without aid
  lexicon: LSJ
  rationale: The adjective denotes those lacking help or defenders. 'Helpless' is
    concise and natural, preserving the moral pathos of the victims.
- source_word: ἐβουλήθης
  chosen: you intended
  alternatives:
  - you willed
  - you resolved
  - you decided
  lexicon: LSJ
  rationale: The verb expresses deliberate purpose. 'You intended' captures divine
    resolve without sounding overly stiff.
- source_word: ἀπολέσαι
  chosen: to destroy
  alternatives:
  - to wipe out
  - to kill
  lexicon: LSJ
  rationale: ἀπόλλυμι here denotes bringing these people to ruin/death. 'Destroy'
    preserves the breadth of the verb and matches the judicial context.
- source_word: διὰ χειρῶν πατέρων ἡμῶν
  chosen: by the hands of our fathers
  alternatives:
  - through our fathers
  - by means of our ancestors
  lexicon: LSJ
  rationale: The phrase is instrumental. 'By the hands of our fathers' preserves the
    vivid idiom and the historical reference to Israel's ancestors as agents of judgment.
