theological_decisions:
- issue: Force of θεοῦ in ἀξίαν θεοῦ κρίσιν
  chosen_reading: 'qualitative genitive: ''a judgment worthy of God'''
  alternative_readings:
  - 'possessive: ''God''s worthy judgment'''
  - 'source: ''a judgment from God'''
  rationale: The phrase can be compressed in Greek, but with ἀξίαν directly modifying
    κρίσιν and θεοῦ following, the most transparent English is that the judgment is
    fitting to God's character. This preserves the rhetorical contrast between lighter
    corrective chastisements and the full divine judgment.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than flatten it.
