theological_decisions:
- issue: Generic masculine expressions
  chosen_reading: Retain 'the righteous man' and 'your sons' in the main text
  alternative_readings:
  - the righteous person
  - your children
  rationale: The Greek uses masculine forms with representative force. Following the
    project's gender-accurate policy, the translation preserves the source's grammatical
    and rhetorical shape rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of μετάνοια in relation to divine action
  chosen_reading: Render as 'you grant repentance for sins'
  alternative_readings:
  - you give an opportunity to repent for sins
  - you permit repentance after sins
  rationale: The text emphasizes God's gracious provision of repentance. 'Grant repentance'
    preserves that initiative while avoiding stronger theological claims not explicit
    in the verse.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
