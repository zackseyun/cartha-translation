translation:
  text: But by such deeds you taught your people that the righteous must be humane,
    and you made your children full of good hope, because you grant repentance for
    sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the righteous one must be kind to people.'
    reason: lexical_alternative
  - marker: b
    text: '''Your sons'' may be understood representatively as God''s children or
      people, but the Greek specifically says ''sons.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τῶν τοιούτων ἔργων
  chosen: by such deeds
  alternatives:
  - through such works
  - by these kinds of acts
  lexicon: LSJ
  rationale: διά with the genitive is instrumental here, and ἔργων refers to God's
    actions just described. 'Deeds' is natural modern English and preserves the concrete
    sense better than the more potentially theological 'works'.
- source_word: δεῖ
  chosen: must
  alternatives:
  - ought to
  - it is necessary
  lexicon: BDAG
  rationale: The verb expresses necessity. 'Must' best conveys the moral necessity
    in concise English.
- source_word: τὸν δίκαιον
  chosen: the righteous man
  alternatives:
  - the righteous one
  - the just man
  lexicon: BDAG
  rationale: The Greek singular masculine is generic/representative. Per doctrine,
    gender-accurate rendering is preferred where it matches the source's intent. 'Righteous
    man' is idiomatic and preserves the representative singular.
- source_word: φιλάνθρωπον
  chosen: humane
  alternatives:
  - kind to people
  - loving toward humanity
  - merciful
  lexicon: LSJ
  rationale: φιλάνθρωπος denotes benevolence or kindness toward human beings. 'Humane'
    is concise, natural, and captures the ethical quality without overinterpreting
    it as specifically 'merciful'.
- source_word: εὐέλπιδας
  chosen: full of good hope
  alternatives:
  - hopeful
  - of good hope
  lexicon: LSJ
  rationale: The adjective means having good hope or being hopeful. 'Full of good
    hope' preserves the intensified positive nuance and echoes the Greek form more
    closely than the flatter 'hopeful'.
- source_word: τοὺς υἱούς σου
  chosen: your sons
  alternatives:
  - your children
  lexicon: BDAG
  rationale: The Greek explicitly says 'sons.' Per doctrine, gender-accurate rendering
    is preferred over neutralizing language unless context requires otherwise. Here
    the filial covenantal relationship is retained without neutralization.
- source_word: διδοῖς ἐπὶ ἁμαρτήμασιν μετάνοιαν
  chosen: you grant repentance for sins
  alternatives:
  - you give repentance concerning sins
  - you allow repentance after sins
  lexicon: BDAG
  rationale: The phrase means that God gives or grants the opportunity/possibility
    of repentance in relation to sins. 'Grant repentance for sins' is idiomatic English
    and preserves divine initiative without importing later doctrinal formulations.
