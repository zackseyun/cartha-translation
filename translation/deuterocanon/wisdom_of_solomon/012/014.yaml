theological_decisions:
- issue: Force of the confrontation idiom toward God
  chosen_reading: The verse states that no earthly ruler can confront God over his
    acts of punishment.
  alternative_readings:
  - No ruler can call God to account
  - No ruler can oppose God's judgment
  rationale: The idiom ἀντοφθαλμῆσαι σοι suggests direct confrontation or facing someone
    eye-to-eye. The translation preserves that imagery without over-interpreting it
    into a full forensic formula, though accountability/opposition is the implied
    sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
