translation:
  text: Neither king nor tyrant will be able to look you in the face concerning those
    whom you punished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stand before you' or 'meet your gaze'; the Greek verb is a vivid expression
      for confronting someone directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε
  chosen: Neither
  alternatives:
  - and not
  - nor
  lexicon: LSJ
  rationale: Introduces the first member of a correlative negation, naturally rendered
    'Neither' in English with the following ἢ functioning as 'nor'/'or'.
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - ruler
  lexicon: LSJ
  rationale: The ordinary political title is best rendered 'king' rather than generalized
    'ruler'.
- source_word: τύραννος
  chosen: tyrant
  alternatives:
  - despot
  - absolute ruler
  lexicon: LSJ
  rationale: In this context the term denotes a powerful autocratic ruler; 'tyrant'
    preserves the force and conventional distinction from βασιλεύς.
- source_word: ἀντοφθαλμῆσαι
  chosen: look you in the face
  alternatives:
  - stand before you
  - meet your gaze
  - look you in the eye
  lexicon: LSJ
  rationale: The rare verb literally evokes facing eye-to-eye. 'Look you in the face'
    preserves the vivid idiom and the sense of being unable to confront God directly.
- source_word: δυνήσεταί
  chosen: will be able
  alternatives:
  - can
  - will have power
  lexicon: LSJ
  rationale: Future middle of δύναμαι is straightforwardly rendered as future ability.
- source_word: σοι
  chosen: you
  alternatives:
  - before you
  lexicon: LSJ
  rationale: Dative after ἀντοφθαλμῆσαι marks the one confronted; English idiom requires
    direct object phrasing in 'look you in the face.'
- source_word: περὶ ὧν
  chosen: concerning those whom
  alternatives:
  - about the things which
  - for those whom
  - with regard to those whom
  lexicon: LSJ
  rationale: Although literally 'concerning which things,' the context points to the
    punished parties rather than abstract matters. Rendering with personal reference
    gives natural English while staying anchored to the Greek construction.
- source_word: ἐκόλασας
  chosen: you punished
  alternatives:
  - you chastised
  - you disciplined
  lexicon: LSJ
  rationale: κολάζω here refers to punitive judgment, not merely corrective discipline;
    'punished' best fits the context of divine retribution.
