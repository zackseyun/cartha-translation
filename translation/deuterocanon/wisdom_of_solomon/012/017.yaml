theological_decisions:
- issue: Referent and force of the clause about unbelief and divine power
  chosen_reading: The verse states that God demonstrates strength precisely when his
    full power is doubted.
  alternative_readings:
  - God shows strength when he himself is distrusted with respect to perfect power
  - God proves strength against those who do not believe in the perfection of his
    power
  rationale: The Greek participle ἀπιστούμενος is somewhat compressed, but the sense
    in context is that doubt about God's complete power occasions a display of strength.
    The translation preserves that tension without over-specifying the opponents.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
