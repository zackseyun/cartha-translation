translation:
  text: For you show your strength when the perfection of your power is disbelieved,
    and among those who know it you rebuke boldness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when you are disbelieved concerning the perfection of your power.'
      The Greek is compressed and may focus either on disbelief directed toward God
      or on doubt about the fullness of his power.
    reason: alternative_reading
  - marker: b
    text: '''Boldness'' here carries a negative sense such as ''audacity'' or ''insolence.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰσχὺν
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: LSJ
  rationale: ἰσχύς denotes strength or might. 'Strength' fits natural English here
    while preserving the distinction from the later δύναμις in the same verse.
- source_word: ἐνδείκνυσαι
  chosen: you show
  alternatives:
  - you display
  - you demonstrate
  lexicon: LSJ
  rationale: The verb means to show or demonstrate. 'You show' is concise and idiomatic,
    with the demonstrative force still clear in context.
- source_word: ἀπιστούμενος
  chosen: when your perfect power is disbelieved
  alternatives:
  - when you are disbelieved concerning perfect power
  - when your power's perfection is not believed
  lexicon: LSJ
  rationale: The participle is passive/middle in sense, 'being disbelieved' or 'not
    being trusted,' and is linked with ἐπὶ δυνάμεως τελειότητι. Rendering the phrase
    as 'when your perfect power is disbelieved' communicates that God's full power
    is doubted.
- source_word: ἐπὶ δυνάμεως τελειότητι
  chosen: your perfect power
  alternatives:
  - the perfection of power
  - power in its fullness
  - complete power
  lexicon: LSJ
  rationale: The phrase literally points to 'perfection/fullness of power.' 'Perfect
    power' is compact, readable, and preserves the idea of power in its completeness.
- source_word: ἐν τοῖς εἰδόσι
  chosen: among those who know it
  alternatives:
  - among those who know
  - in those who know
  lexicon: LSJ
  rationale: 'The dative plural with ἐν is best taken as a sphere/group: among those
    who know. Supplying ''it'' clarifies that the object known is God''s power, implicit
    from context.'
- source_word: τὸ θράσος
  chosen: boldness
  alternatives:
  - insolence
  - audacity
  - presumption
  lexicon: LSJ
  rationale: θράσος can be positive 'boldness' or negative 'audacity/insolence'; here
    the context is rebuke, so a negative nuance is intended. 'Boldness' keeps closer
    lexical form, while the verb 'expose' signals the negative sense.
- source_word: ἐξελέγχεις
  chosen: you expose
  alternatives:
  - you convict
  - you reprove
  - you refute
  lexicon: LSJ
  rationale: The verb means to expose, convict, or reprove. 'Expose' works well with
    θράσος, conveying that God brings arrogant presumption to light.
