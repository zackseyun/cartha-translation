translation:
  text: But you, ruling over strength, judge with gentleness, and with great forbearance
    you govern us; for the power to act is present to you whenever you will.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with clemency' for 'with gentleness'; the Greek ἐπιείκεια can denote
      lenience or mild fairness as well as gentleness.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for the being able is present to you whenever you will'—that
      is, the capacity to act is always at your disposal.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσπόζων
  chosen: ruling over
  alternatives:
  - being master of
  - having dominion over
  lexicon: LSJ
  rationale: The participle conveys exercising lordship or mastery. 'Ruling over'
    is natural English and preserves the active sense without importing the harsher
    connotations 'master' can carry in English.
- source_word: ἰσχύος
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: LSJ
  rationale: The genitive depends on δεσπόζων and denotes the sphere or object of
    dominion. 'Strength' keeps the lexical distinction from the later τὸ δύνασθαι,
    avoiding flattening both terms into 'power' in the same verse.
- source_word: ἐν ἐπιεικείᾳ
  chosen: with gentleness
  alternatives:
  - with clemency
  - with fairness
  - in mildness
  lexicon: LSJ
  rationale: ἐπιείκεια denotes lenience, clemency, or gentle fairness. 'With gentleness'
    is readable modern English and fits the contrast between divine strength and restrained
    judgment.
- source_word: κρίνεις
  chosen: judge
  alternatives:
  - rule
  - pass judgment
  lexicon: LSJ
  rationale: The verb is the ordinary term for judging. 'Judge' preserves the judicial
    nuance in context.
- source_word: μετὰ πολλῆς φειδοῦς
  chosen: with great forbearance
  alternatives:
  - with much sparing
  - with great restraint
  - with much mercy
  lexicon: LSJ
  rationale: φειδώ is sparingness or restraint. 'Forbearance' captures restrained
    treatment toward others in idiomatic English better than the wooden 'sparing,'
    while avoiding overtranslation to 'mercy'.
- source_word: διοικεῖς
  chosen: govern
  alternatives:
  - administer
  - direct
  - manage
  lexicon: LSJ
  rationale: The verb refers to ordering or administering affairs. 'Govern' suits
    divine providential rule in elevated but accessible English.
- source_word: ἡμᾶς
  chosen: us
  alternatives:
  - all of us
  lexicon: LSJ
  rationale: The direct object is explicit and should be retained. 'Us' preserves
    the first-person inclusion of the speaker and community.
- source_word: πάρεστιν γάρ σοι
  chosen: for ... is present to you
  alternatives:
  - for ... belongs to you
  - for ... is at your disposal
  lexicon: LSJ
  rationale: The idiom indicates ready availability. Rendering the clause as 'is present
    to you' stays close to the Greek while remaining intelligible; the fuller English
    sentence clarifies that the capacity is always available to God.
- source_word: ὅταν θέλῃς
  chosen: whenever you will
  alternatives:
  - whenever you wish
  - when you choose
  lexicon: LSJ
  rationale: The phrase expresses contingency on divine volition. 'Whenever you will'
    is slightly more formal but concise and preserves the emphasis on God's will.
- source_word: τὸ δύνασθαι
  chosen: the power to act
  alternatives:
  - ability
  - power
  - capacity
  lexicon: LSJ
  rationale: The articular infinitive means 'to be able' or 'ability.' Because English
    needs a concrete expression here, 'the power to act' makes the sense clear and
    avoids an awkward bare infinitive while preserving the idea of effective capability.
