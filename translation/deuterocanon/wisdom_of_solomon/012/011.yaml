theological_decisions:
- issue: Whether to make explicit that the 'seed' refers to the Canaanite peoples
    mentioned in context
  chosen_reading: Retain the metaphor 'seed' without adding an interpretive identifier
    in the main text.
  alternative_readings:
  - For they were an accursed offspring from the beginning
  rationale: The immediate context identifies the referent, but this verse itself
    uses the metaphorical noun σπέρμα. To avoid importing more specificity than the
    verse states, the main text preserves the metaphor while allowing a more interpretive
    alternative in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source warrants.'
