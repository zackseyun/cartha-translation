translation:
  text: For it was a seed accursed from the beginning, and because of the things in
    which they sinned, you did not, out of fear of anyone, grant them pardon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''offspring'' or ''race'': the Greek says ''seed,'' used figuratively
      for a line or people.'
    reason: lexical_alternative
  - marker: b
    text: The clause may also be rendered, 'nor, out of deference to anyone, did you
      grant them immunity for the things in which they sinned.'
    reason: alternative_reading
lexical_decisions:
- source_word: σπέρμα
  chosen: seed
  alternatives:
  - offspring
  - race
  - stock
  lexicon: LSJ
  rationale: σπέρμα can denote literal seed or figuratively offspring/stock. Here
    it characterizes the people group under judgment. 'Seed' preserves the metaphor
    and the compact force of the Greek, while allowing readers to infer lineage.
- source_word: κατηραμένον
  chosen: accursed
  alternatives:
  - cursed
  lexicon: LSJ
  rationale: The participle denotes being under a curse. 'Accursed' carries the adjectival
    force and solemn tone slightly better than plain 'cursed' in this context.
- source_word: ἀπʼ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from the outset
  lexicon: LSJ
  rationale: A straightforward temporal phrase. 'From the beginning' is the most natural
    and transparent rendering.
- source_word: εὐλαβούμενος
  chosen: out of fear
  alternatives:
  - showing reverence
  - being cautious
  - having regard
  lexicon: LSJ
  rationale: The participle can express caution, reverent fear, or deference. In context
    with τινα ('anyone'), the sense is that God was not deterred by fear or deference
    toward any person from judging them. Rendering the clause adverbially as 'out
    of fear of anyone' communicates the idiom in natural English.
- source_word: ἄδειαν
  chosen: pardon
  alternatives:
  - license
  - immunity
  - reprieve
  lexicon: LSJ
  rationale: ἄδεια literally suggests freedom/permission or immunity. In judicial
    context here, it refers to letting guilt go unpunished. 'Pardon' best captures
    the sense of granting exemption from deserved penalty.
- source_word: ἐδίδους
  chosen: you did not grant
  alternatives:
  - you were giving
  - you gave
  lexicon: LSJ
  rationale: 'The imperfect describes God''s ongoing or characteristic refusal in
    the past narrative. English idiom prefers simple past with auxiliary: ''you did
    not grant.'''
- source_word: ἐφʼ οἷς ἥμαρταν
  chosen: because of the things in which they sinned
  alternatives:
  - for the sins they committed
  - with respect to the things they sinned in
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic. It points to the matters in which they
    sinned as the basis on which pardon was not granted. The chosen rendering stays
    close to the Greek while remaining readable.
