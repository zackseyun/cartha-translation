theological_decisions:
- issue: Referent of the participle μισήσας
  chosen_reading: 'The participle is taken as referring to God in the surrounding
    sentence, so the verse is rendered causally: ''because they practiced ... things
    you hated.'''
  alternative_readings:
  - 'Taking the participle with the object group more woodenly: ''having hated those
    who practiced...'''
  - Leaving the participle less explicitly connected in English
  rationale: 'The Greek participle by itself is ambiguous in isolation, but in context
    the verse explains why God drove out the former inhabitants: because of their
    abhorrent practices, which he hated. The English makes that relation explicit
    for clarity while staying anchored to the Greek syntax.'
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
