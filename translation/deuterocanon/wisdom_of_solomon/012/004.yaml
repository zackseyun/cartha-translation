lexical_decisions:
- source_word: μισήσας
  chosen: things you hated
  alternatives:
  - having hated
  - because you hated
  - hating
  lexicon: LSJ
  rationale: Aorist participle of μισέω, likely referring back to God from the prior
    context. In English, making the participial relation explicit as 'things you hated'
    yields a natural sentence connection while preserving the causal force in context.
- source_word: ἐπὶ τῷ
  chosen: because
  alternatives:
  - for
  - on account of
  - in that
  lexicon: LSJ
  rationale: The construction with infinitive/practical verbal idea here expresses
    basis or cause. 'Because' best captures the causal sense in idiomatic English.
- source_word: ἔχθιστα
  chosen: the most hateful
  alternatives:
  - most detestable
  - most loathsome
  - utterly hateful
  lexicon: LSJ
  rationale: Superlative adverb/adjectival force from ἐχθρός conveys extreme abhorrence.
    'The most hateful' stays close to the Greek while remaining readable.
- source_word: πράσσειν
  chosen: practiced
  alternatives:
  - did
  - performed
  - carried out
  lexicon: LSJ
  rationale: πράσσω often denotes doing or practicing. 'Practiced' fits repeated cultic/magical
    acts better than a bare 'did.'
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  - acts
  lexicon: LSJ
  rationale: '''Works'' is a straightforward rendering and pairs naturally with the
    following genitive, though ''deeds'' was possible. It preserves the concrete moral
    weight of the Greek.'
- source_word: φαρμακειῶν
  chosen: sorceries
  alternatives:
  - magic arts
  - witchcrafts
  - poisonings
  lexicon: LSJ
  rationale: φαρμακεία can involve potions, poisoning, or magical practice; in this
    religious-condemnation context, 'sorceries' best captures the intended occult
    sense without over-specifying technique.
- source_word: τελετὰς
  chosen: rites
  alternatives:
  - ceremonies
  - initiations
  - mysteries
  lexicon: LSJ
  rationale: τελετή can denote religious rites, often initiatory or cultic. 'Rites'
    is broad enough to preserve the cultic sense without importing a specific mystery-religion
    framework.
- source_word: ἀνοσίους
  chosen: unholy
  alternatives:
  - profane
  - impious
  - godless
  lexicon: LSJ
  rationale: ἀνόσιος denotes what is contrary to holiness or piety. 'Unholy' is direct,
    accessible, and fits the ritual context.
