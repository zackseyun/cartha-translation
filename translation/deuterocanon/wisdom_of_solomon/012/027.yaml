theological_decisions:
- issue: Identification of the object recognized in the clause ἰδόντες ... θεὸν ἐπέγνωσαν
    ἀληθῆ
  chosen_reading: They recognized as the true God the one whom they had formerly refused
    to know.
  alternative_readings:
  - They came to know truly the God whom they had formerly denied knowing.
  rationale: The Greek places ἀληθῆ after θεόν and can be construed either adverbially
    ('truly') or adjectivally ('true'). In context contrasting false gods with the
    real deity, the adjectival sense is stronger and preserves the anti-idolatry polemic
    without adding doctrinal content beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternative in footnote.
