translation:
  text: For in the very things by which they themselves suffered and were indignant—those
    things they thought were gods—by these, while being punished, they saw and recognized
    as the true God the one whom they had formerly refused to know. Therefore also
    the final end of condemnation came upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they came to know truly the God whom they had formerly denied knowing.'
      The Greek can construe ἀληθῆ adverbially ('truly') rather than adjectivally
      ('true').
    reason: alternative_reading
lexical_decisions:
- source_word: ἐφʼ οἷς
  chosen: in the very things by which
  alternatives:
  - because of which
  - over which
  - in those things in which
  lexicon: LSJ
  rationale: The preposition ἐπί with the relative pronoun here introduces the sphere/instrument
    of suffering; 'in the very things by which' preserves the rhetorical linkage to
    the same objects/instruments later resumed by ἐπὶ τούτοις and ἐν αὐτοῖς.
- source_word: πάσχοντες
  chosen: suffered
  alternatives:
  - undergoing
  - experiencing affliction
  lexicon: LSJ
  rationale: A straightforward rendering that fits the context of divine judgments
    without over-specifying the kind of suffering.
- source_word: ἠγανάκτουν
  chosen: were indignant
  alternatives:
  - were vexed
  - were resentful
  - were angry
  lexicon: LSJ
  rationale: The verb conveys strong irritation or resentment. 'Were indignant' preserves
    the moral-emotional force without sounding colloquial.
- source_word: ἐδόκουν θεούς
  chosen: they thought were gods
  alternatives:
  - they considered gods
  - they supposed to be gods
  lexicon: LSJ
  rationale: This captures δοκέω as subjective estimation and keeps the irony of idolatrous
    misjudgment.
- source_word: ἐν αὐτοῖς κολαζόμενοι
  chosen: by these, while being punished
  alternatives:
  - being punished in them
  - being chastised by them
  lexicon: LSJ
  rationale: The phrase likely refers to punishment by means of the very things/idols
    associated with their error. 'By these' makes the instrumental sense clear in
    English while retaining the participial flow.
- source_word: ἰδόντες
  chosen: they saw
  alternatives:
  - having seen
  - when they saw
  lexicon: LSJ
  rationale: Rendered as a finite verb in sequence for readable English while preserving
    the causal/experiential progression.
- source_word: ὧν πάλαι ἠρνοῦντο εἰδέναι θεὸν
  chosen: the one whom they had formerly refused to know
  alternatives:
  - God, whom they had long denied knowing
  - the God they had previously disowned knowledge of
  lexicon: LSJ
  rationale: This compresses the Greek idiom into natural English while preserving
    both temporal force (πάλαι, 'formerly/long ago') and volitional refusal (ἠρνοῦντο).
- source_word: ἐπέγνωσαν ἀληθῆ
  chosen: recognized as the true God
  alternatives:
  - came to know truly as God
  - fully recognized as true God
  lexicon: LSJ
  rationale: ἐπιγινώσκω suggests recognition or full acknowledgment. Because ἀληθῆ
    modifies θεόν in sense, English idiom is best expressed as 'recognized as the
    true God.'
- source_word: τὸ τέρμα τῆς καταδίκης
  chosen: the final end of condemnation
  alternatives:
  - the ultimate outcome of condemnation
  - the full measure of sentence
  - the end-point of judgment
  lexicon: LSJ
  rationale: τέρμα is 'end, limit, outcome.' καταδίκη is condemnation/sentence. 'Final
    end of condemnation' preserves the climactic force, though somewhat formal, and
    avoids narrowing the phrase to merely legal sentencing or merely punishment.
- source_word: ἐπʼ αὐτοὺς ἐπῆλθεν
  chosen: came upon them
  alternatives:
  - overtook them
  - fell upon them
  lexicon: LSJ
  rationale: A standard idiomatic rendering for judgment arriving upon a people.
