translation:
  text: For there is no god besides you who cares for all, so that you should show
    that you did not judge unjustly;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who cares for all.' The Greek relative construction can be rendered
      more directly in English.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'that you did not judge unjustly'; alternatively, 'that you judged
      justly.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὔτε γὰρ
  chosen: For ... no
  alternatives:
  - For neither
  - For indeed no
  lexicon: LSJ
  rationale: γάρ gives explanatory force, best carried by 'For.' The οὔτε here functions
    idiomatically with the negated existential statement, yielding a natural English
    'there is no' rather than a wooden 'neither is there.'
- source_word: θεός
  chosen: god
  alternatives:
  - God
  lexicon: LSJ
  rationale: 'The anarthrous singular after πλὴν σοῦ is qualitative/exclusive: ''no
    god besides you.'' Lowercase ''god'' is appropriate in English within the exclusion
    formula, while ''you'' clearly refers to the true God.'
- source_word: πλὴν σοῦ
  chosen: besides you
  alternatives:
  - except you
  - apart from you
  lexicon: LSJ
  rationale: πλήν with the genitive marks exception. 'Besides you' is idiomatic and
    preserves the exclusivity claim.
- source_word: ᾧ μέλει περὶ πάντων
  chosen: whose care is for all
  alternatives:
  - who cares for all
  - to whom all things matter
  - who is concerned about all
  lexicon: LSJ
  rationale: μέλει can be rendered personally ('cares for'), but the relative construction
    ᾧ plus impersonal μέλει is slightly more formal. 'Whose care is for all' preserves
    the relative linkage and the universal scope πάντων without over-paraphrasing.
- source_word: πάντων
  chosen: all
  alternatives:
  - all things
  - everyone
  lexicon: LSJ
  rationale: The genitive plural can be neuter or masculine in sense. In context of
    God's universal providential concern, 'all' best preserves the breadth without
    forcing either 'all things' or 'everyone' alone.
- source_word: ἵνα δείξῃς
  chosen: so that you should show
  alternatives:
  - so that you may show
  - to show
  lexicon: LSJ
  rationale: ἵνα with subjunctive expresses purpose/result nuance. 'So that you should
    show' keeps the connection to the preceding clause and reflects the rhetorical
    force without flattening it to a bare infinitive.
- source_word: οὐκ ἀδίκως
  chosen: did not judge unjustly
  alternatives:
  - did not judge wrongly
  - judged justly
  lexicon: LSJ
  rationale: The Greek is a negated adverbial expression. Rendering it directly as
    'did not judge unjustly' preserves the form and avoids importing the stronger
    positive formulation 'judged justly,' though that is the implied sense.
- source_word: ἔκρινας
  chosen: judge
  alternatives:
  - condemn
  - pass sentence
  lexicon: LSJ
  rationale: κρίνω here refers broadly to God's judicial decision. 'Judge' is the
    most transparent and least interpretively loaded choice.
