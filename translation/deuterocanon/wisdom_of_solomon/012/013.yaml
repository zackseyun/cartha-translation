theological_decisions:
- issue: Whether to capitalize θεός in the exclusion formula
  chosen_reading: no god besides you
  alternative_readings:
  - no God besides you
  rationale: The clause asserts exclusive deity. English lowercase 'god' in this construction
    better reflects the category being denied to all others, while the second-person
    reference identifies Israel's God as the sole true deity.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
- issue: Whether to convert the negated phrase οὐκ ἀδίκως into a positive theological
    assertion
  chosen_reading: you did not judge unjustly
  alternative_readings:
  - you judged justly
  rationale: The source states the point as a negated accusation rather than a direct
    positive predicate. Preserving that tension keeps closer to the Greek and avoids
    smoothing the rhetoric.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
