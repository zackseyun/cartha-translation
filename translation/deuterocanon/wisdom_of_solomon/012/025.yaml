theological_decisions:
- issue: Whether the comparison 'as to senseless children' should be rendered as literal
    identity or as manner of treatment
  chosen_reading: The verse describes God as treating them like senseless children,
    not asserting they were literally children.
  alternative_readings:
  - as senseless children
  - like senseless children
  rationale: The simile/comparative force of ὡς is best preserved without over-literalizing.
    This maintains the rhetorical rebuke while avoiding a misleading ontological statement.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Whether κρίσις should be rendered more specifically as 'punishment'
  chosen_reading: judgment
  alternative_readings:
  - punishment
  - sentence
  rationale: The text itself uses judicial language rather than a narrower term for
    penalty. 'Judgment' preserves theological breadth and avoids importing a more
    specific claim than the Greek warrants.
  doctrine_reference: Translation philosophy §1, §5
