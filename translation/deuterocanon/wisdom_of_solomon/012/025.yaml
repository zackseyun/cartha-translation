translation:
  text: Therefore, as to senseless children, you sent judgment for mockery;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like senseless children, you sent the judgment for mockery / in derision.'
      The Greek allows slightly different ways of expressing the comparison and purpose.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: LSJ
  rationale: Standard inferential conjunction linking this verse to the preceding
    argument; 'Therefore' is concise and natural in English.
- source_word: ὡς
  chosen: as to
  alternatives:
  - as
  - like
  lexicon: LSJ
  rationale: Here ὡς introduces the manner or category in which God treated them.
    'As to' brings out the sense of treating them in the capacity of, or as if they
    were, senseless children. A simpler 'as' is possible, but 'as to' avoids implying
    literal identity.
- source_word: παισὶν
  chosen: children
  alternatives:
  - boys
  - little ones
  - servants
  lexicon: LSJ
  rationale: Dative plural of παῖς. In this context the comparison is to immature
    children, not specifically male children or servants. 'Children' best fits the
    moral-intellectual contrast.
- source_word: ἀλογίστοις
  chosen: senseless
  alternatives:
  - irrational
  - thoughtless
  - without understanding
  lexicon: LSJ
  rationale: The adjective denotes lack of reason or understanding. 'Senseless' is
    readable modern English and preserves the evaluative force without sounding overly
    technical like 'irrational'.
- source_word: τὴν κρίσιν
  chosen: judgment
  alternatives:
  - sentence
  - punishment
  - decision
  lexicon: LSJ
  rationale: κρίσις here refers to judicial action sent by God. 'Judgment' preserves
    both legal and punitive resonance and fits biblical style.
- source_word: εἰς ἐμπαιγμόν
  chosen: as a mockery
  alternatives:
  - for mockery
  - in derision
  - for ridicule
  lexicon: LSJ
  rationale: The phrase indicates the judgment functioned in a derisive or mocking
    way. 'As a mockery' reads naturally in English while preserving the force of ἐμπαιγμός.
    Because the Greek preposition is flexible, 'for mockery' is possible and worth
    preserving as an alternative nuance.
- source_word: ἔπεμψας
  chosen: you sent
  alternatives:
  - you dispatched
  - you inflicted
  lexicon: LSJ
  rationale: Aorist of πέμπω, literally 'send.' The main text keeps the concrete verbal
    image rather than interpreting it more dynamically as 'inflicted.'
