translation:
  text: For your strength is the beginning of righteousness, and your mastery over
    all makes you spare all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the source of righteousness.' The Greek ἀρχή can mean 'beginning,' 'source,'
      or 'first principle.'
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness.' The Greek δικαιοσύνη can carry both senses.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰσχύς
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: LSJ
  rationale: The noun denotes force or capability. 'Strength' is natural English and
    preserves the causal logic of the verse without overstating it as abstract 'power.'
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Although the term can mean 'justice,' the project's default for δικαιοσύνη
    is 'righteousness,' with awareness that the semantic field overlaps. Here the
    statement concerns God's morally right character and action; 'righteousness' fits
    while preserving consistency.
- source_word: ἀρχή
  chosen: beginning
  alternatives:
  - source
  - principle
  lexicon: LSJ
  rationale: The word can denote beginning, first principle, or ruling power. In this
    clause it expresses that God's strength is the originating basis of righteousness.
    'Beginning' is the most direct rendering, though 'source' is a viable interpretive
    alternative.
- source_word: δεσπόζειν
  chosen: your mastery over all
  alternatives:
  - to rule all
  - to be Lord over all
  - to dominate all
  lexicon: LSJ
  rationale: The infinitive means to be master or have dominion. Rendering it as 'your
    mastery over all' fits the articular infinitive construction and avoids the harsher
    English connotations of 'dominate' while preserving real sovereignty.
- source_word: φείδεσθαι
  chosen: spare
  alternatives:
  - show mercy to
  - refrain from harming
  lexicon: LSJ
  rationale: The verb means to spare or refrain from destroying. 'Spare' is concise
    and matches the context of divine restraint toward all.
- source_word: ποιεῖ
  chosen: makes you spare all
  alternatives:
  - causes you to spare all
  - leads you to spare all
  lexicon: LSJ
  rationale: 'The verb marks result: God''s dominion over all leads to universal forbearance.
    ''Makes you spare all'' is slightly more literal while remaining idiomatic.'
- source_word: πάντων ... πάντων
  chosen: over all ... all
  alternatives:
  - over everyone ... everyone
  - over all things ... all things
  lexicon: LSJ
  rationale: The repeated genitive and accusative forms create a deliberate rhetorical
    parallel. 'All' preserves the breadth and repetition without prematurely narrowing
    the referent to persons or things alone.
