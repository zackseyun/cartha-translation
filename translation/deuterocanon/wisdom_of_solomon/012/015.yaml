theological_decisions:
- issue: Relation of divine power and justice
  chosen_reading: The verse states that condemning the innocent is contrary to God's
    power/character, not that power is arbitrary.
  alternative_readings:
  - '''foreign to your power'' as merely ''beneath your dignity'''
  - '''power'' as ''authority/right'' rather than might'
  rationale: The Greek links God's righteousness, righteous governance, and refusal
    to condemn the undeserving. The translation preserves this theological logic without
    importing later doctrinal formulations.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
