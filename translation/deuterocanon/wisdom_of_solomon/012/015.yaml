translation:
  text: But being righteous, you govern all things righteously, considering it foreign
    to your power to condemn one who does not deserve to be punished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one who is not liable to punishment.' The Greek literally says 'the
      one not owing to be punished.'
    reason: lexical_alternative
  - marker: b
    text: Or 'alien to your power' or 'inconsistent with your power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: LSJ
  rationale: Predicative of God’s character. 'Righteous' preserves the moral quality
    and matches the cognate adverb δικαίως in the same clause; 'just' is possible
    but would flatten the deliberate repetition.
- source_word: δικαίως
  chosen: righteously
  alternatives:
  - justly
  lexicon: LSJ
  rationale: Chosen to preserve the wordplay/cognate link with δίκαιος ('being righteous
    ... righteously'). 'Justly' is idiomatic but weakens the rhetorical parallel.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  - the whole universe
  lexicon: LSJ
  rationale: A broad comprehensive expression. 'All things' is suitably formal and
    preserves the scope without over-interpreting cosmologically.
- source_word: διέπεις
  chosen: govern
  alternatives:
  - direct
  - administer
  - rule
  lexicon: LSJ
  rationale: Conveys orderly oversight and administration. 'Rule' is possible, but
    'govern' better reflects wise, just management in context.
- source_word: αὐτὸν τὸν μὴ ὀφείλοντα κολασθῆναι
  chosen: one who does not deserve to be punished
  alternatives:
  - the very one not owing to be punished
  - the one who is not liable to punishment
  lexicon: LSJ
  rationale: ὀφείλω with infinitive here expresses obligation/liability. The idiomatic
    English sense is that such a person does not deserve or is not liable to punishment.
    'Deserve to be punished' is clearer modern English while remaining faithful.
- source_word: καταδικάσαι
  chosen: to condemn
  alternatives:
  - to sentence
  - to pronounce guilty
  lexicon: LSJ
  rationale: The verb denotes judicial condemnation. 'Condemn' preserves the legal-moral
    force and fits the surrounding justice language.
- source_word: ἀλλότριον
  chosen: foreign
  alternatives:
  - alien
  - inconsistent with
  - unworthy of
  lexicon: LSJ
  rationale: Literally 'belonging to another/foreign.' In context it means something
    not proper to or not characteristic of God's power. 'Foreign to your power' preserves
    the metaphor while remaining intelligible.
- source_word: ἡγούμενος
  chosen: considering
  alternatives:
  - deeming
  - regarding
  lexicon: LSJ
  rationale: A participle of mental judgment. 'Considering' is natural English and
    accurately conveys evaluative thought.
- source_word: τῆς σῆς δυνάμεως
  chosen: your power
  alternatives:
  - your might
  - your authority
  lexicon: LSJ
  rationale: δύναμις here refers to divine power/might. 'Power' is the broadest and
    most natural rendering; 'authority' would narrow the sense too much.
