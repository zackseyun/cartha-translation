theological_decisions:
- issue: Sense of ἡ φροντὶς αὐτῶν
  chosen_reading: their care is with the Most High
  alternative_readings:
  - the Most High cares for them
  - their welfare is with the Most High
  rationale: The Greek noun φροντίς is semantically broad, and the clause can be heard
    either as their well-being being in God's keeping or as God's care for them. The
    main text preserves the source's terseness and ambiguity rather than resolving
    it into an explicit doctrinal statement.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Rendering of ἐν Κυρίῳ
  chosen_reading: with the Lord
  alternative_readings:
  - in the Lord
  rationale: A strictly formal 'in the Lord' is possible, but in English this can
    sound more mystical than the context requires. 'With the Lord' better communicates
    that the righteous person's reward is held in the Lord's presence/keeping, while
    remaining faithful to the clause's sense.
  doctrine_reference: 'DOCTRINE.md §Contested terms: κύριος → Lord'
