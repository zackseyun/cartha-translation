translation:
  text: But the righteous live forever, and their reward is with the Lord, and their
    care is with the Most High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Lord.' The Greek preposition can be rendered more literally this
      way.
    reason: lexical_alternative
  - marker: b
    text: Or 'their welfare is with the Most High' or 'the Most High cares for them.'
      The Greek phrase is compact and allows more than one closely related sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιοι
  chosen: the righteous
  alternatives:
  - the just
  - righteous ones
  lexicon: BDAG
  rationale: Substantival adjective referring to those characterized by righteousness.
    'The righteous' is idiomatic modern English and preserves the moral/theological
    sense better than the somewhat archaic 'the just'.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: BDAG
  rationale: The phrase denotes enduring, unending duration here. 'Forever' is natural
    English and adequately reflects the idiom without overly literal awkwardness.
- source_word: ζῶσιν
  chosen: live
  alternatives:
  - are alive
  lexicon: BDAG
  rationale: Present tense verb stating the continuing life of the righteous. 'Live'
    is the direct and natural rendering.
- source_word: ἐν Κυρίῳ
  chosen: with the Lord
  alternatives:
  - in the Lord
  - by the Lord
  lexicon: BDAG
  rationale: Although ἐν commonly means 'in,' in this clause with 'their reward' the
    sense is best expressed in English as location/source in the Lord's keeping or
    presence. 'With the Lord' reads naturally and matches the parallel παρὰ Ὑψίστῳ
    in the next clause. 'Lord' follows the project's default for κύριος.
- source_word: ὁ μισθὸς αὐτῶν
  chosen: their reward
  alternatives:
  - their wages
  - their recompense
  lexicon: BDAG
  rationale: μισθός can mean wages or reward; in this wisdom context it refers to
    the recompense granted to the righteous, so 'reward' best fits both sense and
    register.
- source_word: ἡ φροντὶς αὐτῶν
  chosen: their care
  alternatives:
  - their concern
  - their providential care
  - their welfare
  lexicon: LSJ
  rationale: φροντίς can denote care, concern, or thought. In context, parallel to
    'their reward is with the Lord,' it most likely means the Most High's care for
    them or their well-being in his regard. 'Their care' preserves the Greek's compactness
    and ambiguity better than an interpretively expanded phrase.
- source_word: παρὰ Ὑψίστῳ
  chosen: with the Most High
  alternatives:
  - before the Most High
  - in the presence of the Most High
  lexicon: BDAG
  rationale: παρά with dative can indicate proximity or presence. 'With the Most High'
    is concise, natural, and preserves the parallel structure with the preceding clause.
