theological_decisions:
- issue: Force of μετανοοῦντες in the speech of the wicked
  chosen_reading: repenting
  alternative_readings:
  - regretting
  - feeling remorse
  rationale: The participle carries moral reversal language, but the context is eschatological
    recognition rather than a developed doctrine of salvific repentance. 'Repenting'
    best reflects the Greek while leaving the theological outcome unstated, preserving
    the text's tension.
