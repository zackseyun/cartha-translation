translation:
  text: 'They will say among themselves, repenting, and will groan because of anguish
    of spirit: “This is the one whom we once held in derision.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “whom we once made a laughingstock” / “whom we once held for mockery.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐροῦσιν
  chosen: They will say
  alternatives:
  - they shall say
  - they will speak
  lexicon: BDAG
  rationale: Future active of λέγω; straightforward future speech introduction. 'Will
    say' is natural modern English and preserves the future sense.
- source_word: ἐν ἑαυτοῖς
  chosen: among themselves
  alternatives:
  - within themselves
  - to themselves
  lexicon: BDAG
  rationale: The phrase can indicate inward reflection or speech within a group. Here,
    because the following clause is direct speech by the wicked collectively, 'among
    themselves' best captures the communal setting without excluding inward remorse.
- source_word: μετανοοῦντες
  chosen: repenting
  alternatives:
  - changing their minds
  - feeling remorse
  lexicon: BDAG
  rationale: Present participle describing their state as they speak. 'Repenting'
    preserves the moral-religious force better than the weaker 'regretting,' while
    not overexpanding the term.
- source_word: διὰ στενοχωρίαν πνεύματος
  chosen: because of anguish of spirit
  alternatives:
  - through distress of spirit
  - because of narrowness of spirit
  - because of inner anguish
  lexicon: BDAG
  rationale: στενοχωρία denotes distress, affliction, or anguish; πνεύματος here is
    best taken as an inner/spiritual genitive. 'Anguish of spirit' is idiomatic and
    preserves the metaphorical force without flattening it to mere emotion.
- source_word: στενάξονται
  chosen: will groan
  alternatives:
  - will sigh
  - will lament
  lexicon: BDAG
  rationale: Future middle of στενάζω, expressing audible distress. 'Groan' better
    conveys intensity than 'sigh' and is less interpretive than 'lament.'
- source_word: Οὗτος
  chosen: This is the one
  alternatives:
  - This was the one
  - This man was the one
  lexicon: BDAG
  rationale: Demonstrative introducing the object of their former scorn. English idiom
    prefers 'This is the one' before the relative clause, even though the following
    imperfect situates their prior attitude in the past.
- source_word: ἦν ὃν ἔσχομέν ποτε
  chosen: whom we once held
  alternatives:
  - whom we once had
  - who was the one we once considered
  lexicon: BDAG
  rationale: ἔχω with εἰς plus an accusative can mean 'regard/hold as.' 'Held' in
    English captures their evaluative stance better than the overly literal 'had.'
    The imperfect ἦν is absorbed idiomatically into the English construction.
- source_word: εἰς γέλωτα
  chosen: in derision
  alternatives:
  - for laughter
  - as a laughingstock
  - for mockery
  lexicon: BDAG
  rationale: The phrase means as an object of ridicule. 'In derision' is concise and
    dignified; 'as a laughingstock' is also possible but slightly more expansive.
    The chosen rendering preserves the contemptuous sense without colloquialism.
