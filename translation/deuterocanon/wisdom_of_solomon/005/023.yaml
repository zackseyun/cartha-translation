theological_decisions:
- issue: Whether πνεῦμα should be rendered impersonally ('wind') or as a more personified/judgment-agent
    term ('spirit')
  chosen_reading: spirit
  alternative_readings:
  - wind
  - blast
  rationale: The clause structure presents πνεῦμα δυνάμεως as the subject that 'will
    stand against them,' which favors a more agentive rendering than an impersonal
    meteorological term. The next clause then introduces the explicit simile 'like
    a whirlwind,' allowing both personified and storm imagery to remain distinct.
