translation:
  text: A spirit of power will stand against them, and like a whirlwind it will winnow
    them away;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wind of power' or 'a mighty blast will stand against them.' The Greek
      πνεῦμα can mean 'spirit,' 'wind,' or 'breath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιστήσεται
  chosen: will stand against
  alternatives:
  - will oppose
  - will resist
  lexicon: BDAG
  rationale: Future middle of ἀνθίστημι conveys active opposition or resistance. 'Stand
    against' preserves the concrete force of the verb while remaining natural English.
- source_word: πνεῦμα
  chosen: spirit
  alternatives:
  - wind
  - breath
  lexicon: BDAG
  rationale: Although πνεῦμα can mean 'wind' or 'breath,' here it is qualified by
    δυνάμεως and then acts personally as the subject of ἀντιστήσεται. 'Spirit' best
    preserves the likely personified force in context, while the following simile
    'like a whirlwind' separately supplies the storm imagery.
- source_word: δυνάμεως
  chosen: of power
  alternatives:
  - of might
  - of strength
  lexicon: BDAG
  rationale: The genitive qualifies πνεῦμα. 'Of power' is a straightforward rendering
    that preserves the abstract force without overinterpreting whether the emphasis
    is military might or inherent strength.
- source_word: λαῖλαψ
  chosen: whirlwind
  alternatives:
  - storm-wind
  - tempest
  lexicon: LSJ
  rationale: λαῖλαψ denotes a violent windstorm or whirlwind. 'Whirlwind' is vivid,
    idiomatic, and fits the destructive imagery of divine judgment in the surrounding
    context.
- source_word: ἐκλικμήσει
  chosen: will winnow them away
  alternatives:
  - will scatter them
  - will sweep them away
  lexicon: LSJ
  rationale: The verb carries the sense of winnowing or driving off chaff. 'Winnow
    them away' preserves the agricultural metaphor and the image of forceful dispersal
    better than the more generic 'scatter' or 'sweep away'.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Direct object referring back to the wicked opponents in context; simple
    pronoun is sufficient and accurate.
