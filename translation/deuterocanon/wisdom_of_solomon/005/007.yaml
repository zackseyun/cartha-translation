theological_decisions:
- issue: Meaning of 'the way of the Lord'
  chosen_reading: A moral-spiritual way of life aligned with the Lord, contrasted
    with wicked and destructive paths
  alternative_readings:
  - A more literal route or course appointed by the Lord
  rationale: The verse's parallelism contrasts figurative 'lawless paths' and 'trackless
    deserts' with 'the way of the Lord,' favoring a moral metaphor rather than merely
    physical travel. The translation preserves the idiom without over-explaining it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; translate titles'
