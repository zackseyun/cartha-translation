translation:
  text: He will sharpen severe wrath into a sword, and the world will join battle
    with him against the senseless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the senseless' or 'against the fools.' The Greek term refers
      to those who are irrational or morally deranged in their opposition to God,
      not necessarily to mental illness in a clinical sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀξυνεῖ
  chosen: will sharpen
  alternatives:
  - will whet
  - will make sharp
  lexicon: LSJ
  rationale: Future active of ὀξύνω, literally 'to sharpen' or 'whet.' 'Will sharpen'
    is clear modern English and preserves the weapon imagery.
- source_word: ἀπότομον
  chosen: fierce
  alternatives:
  - sharp
  - severe
  - relentless
  lexicon: LSJ
  rationale: Although literally related to abruptness/sharpness, here it modifies
    ὀργή in a martial image. 'Fierce' conveys violent intensity in idiomatic English
    better than the more wooden 'sharp wrath.'
- source_word: ὀργὴν
  chosen: wrath
  alternatives:
  - anger
  lexicon: LSJ
  rationale: '''Wrath'' better matches the elevated, judicial tone of the passage
    than the more ordinary ''anger.'''
- source_word: εἰς ῥομφαίαν
  chosen: into a sword
  alternatives:
  - for a sword
  - as a sword
  lexicon: LSJ
  rationale: 'The preposition εἰς can express result here: wrath is metaphorically
    sharpened into a sword. ''Into a sword'' preserves the vivid transformation imagery.'
- source_word: συνεκπολεμήσει
  chosen: will join battle with him
  alternatives:
  - will fight alongside him
  - will wage war together with him
  lexicon: LSJ
  rationale: The compound verb indicates joining in warfare together with someone.
    'Will join battle with him' is natural English while retaining the collaborative
    military sense.
- source_word: ὁ κόσμος
  chosen: the world
  alternatives:
  - the universe
  - the created order
  lexicon: LSJ
  rationale: κόσμος here likely denotes the ordered world/creation as participating
    in God's judgment. 'The world' is the most direct and readable rendering, while
    the broader cosmic sense is preserved by context.
- source_word: ἐπὶ τοὺς παράφρονας
  chosen: against the madmen
  alternatives:
  - against the senseless
  - against the deranged
  - against the fools
  lexicon: LSJ
  rationale: παράφρων denotes being out of one's mind, irrational, or morally senseless.
    In Wisdom 5 the referent is the ungodly who proved spiritually irrational. 'Madmen'
    preserves the forceful polemical edge better than the flatter 'fools,' though
    it should be heard morally rather than as a clinical term.
