theological_decisions:
- issue: Referent of αὐτῷ ('with him')
  chosen_reading: The world joins battle with God, implied from the surrounding context
    of divine judgment.
  alternative_readings:
  - The world joins battle with the righteous one indirectly through God's cause
  rationale: The immediate context depicts creation as weaponized in God's judgment.
    Although αὐτῷ is not explicitly named in this verse, the most coherent antecedent
    in context is God. The English keeps the pronoun rather than inserting 'God' so
    as not to over-specify beyond the Greek while still reflecting the contextual
    sense in this note.
  doctrine_reference: Preserve theological tension rather than resolve it.
