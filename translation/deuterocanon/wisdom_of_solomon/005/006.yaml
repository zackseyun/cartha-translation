translation:
  text: So then we went astray from the way of truth, and the light of righteousness
    did not shine on us, and the sun did not rise for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the light of justice.' Greek δικαιοσύνη can carry both moral and judicial
      overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα
  chosen: So then
  alternatives:
  - Therefore
  - Then
  lexicon: LSJ
  rationale: Marks an inferential or consequential conclusion in the wicked's retrospective
    speech. 'So then' preserves the reflective force without sounding overly formal.
- source_word: ἐπλανήθημεν
  chosen: we went astray
  alternatives:
  - we were led astray
  - we wandered
  lexicon: LSJ
  rationale: Aorist passive of πλανάω can be rendered intransitively in English here.
    'Went astray' fits the moral-path imagery with ὁδός and avoids implying an external
    deceiver not stated in the verse.
- source_word: ἀπὸ ὁδοῦ ἀληθείας
  chosen: from the way of truth
  alternatives:
  - from truth's way
  - from the path of truth
  lexicon: LSJ
  rationale: Retains the concrete road/path metaphor and the genitive relation. 'Way
    of truth' is idiomatic and close to the Greek.
- source_word: τὸ τῆς δικαιοσύνης φῶς
  chosen: the light of righteousness
  alternatives:
  - the light of justice
  lexicon: LSJ
  rationale: δικαιοσύνη defaults to 'righteousness' per doctrine, with 'justice' preserved
    as an alternative. The genitival phrase is kept straightforwardly.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Follows the project's default rendering for δικαιοσύνη. In Wisdom literature
    the moral sense is prominent, though 'justice' remains a viable nuance.
- source_word: οὐκ ἔλαμψεν ἡμῖν
  chosen: did not shine on us
  alternatives:
  - did not shine for us
  - did not dawn on us
  lexicon: LSJ
  rationale: ἡμῖν with verbs of shining can indicate advantage or relation. 'Shine
    on us' is natural English and preserves the image; 'for us' is possible but less
    idiomatic here.
- source_word: ὁ ἥλιος
  chosen: the sun
  lexicon: LSJ
  rationale: Plain lexical rendering; no contextual reason to paraphrase.
- source_word: οὐκ ἀνέτειλεν ἡμῖν
  chosen: did not rise for us
  alternatives:
  - did not dawn for us
  - did not rise on us
  lexicon: LSJ
  rationale: ἀνατέλλω with ἡμῖν naturally conveys the sun's rising in relation to
    the speakers. 'Rise for us' preserves the dative and the metaphorical deprivation
    of illumination or blessing.
