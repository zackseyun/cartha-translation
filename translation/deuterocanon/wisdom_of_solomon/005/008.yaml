translation:
  text: What did arrogance profit us? And what did wealth joined with boasting gain
    us?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wealth with pretension' or 'wealth accompanied by arrogance.' The Greek
      phrase μετὰ ἀλαζονίας can be rendered in several closely related ways.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί ὠφέλησεν
  chosen: What did ... profit
  alternatives:
  - How did ... benefit
  - What good did ... do
  lexicon: BDAG
  rationale: The aorist of ὠφελέω asks what advantage was obtained. 'Profit' preserves
    the rhetorical force and concise idiom of the Greek better than a flatter 'benefit.'
- source_word: ἡ ὑπερηφανία
  chosen: arrogance
  alternatives:
  - pride
  - haughtiness
  lexicon: LSJ
  rationale: ὑπερηφανία denotes overbearing pride or arrogance. 'Arrogance' captures
    the negative moral sense more clearly than the broader English 'pride.'
- source_word: πλοῦτος
  chosen: wealth
  alternatives:
  - riches
  - richness
  lexicon: LSJ
  rationale: The noun refers to material riches. 'Wealth' is natural modern English
    and fits the reflective tone of the verse.
- source_word: μετὰ ἀλαζονίας
  chosen: joined with boasting
  alternatives:
  - with arrogance
  - with pretension
  - accompanied by bragging
  lexicon: LSJ
  rationale: ἀλαζονία is boastfulness or pretension. Rendering the phrase as 'joined
    with boasting' reflects the close association indicated by μετά while keeping
    the expression idiomatic in English.
- source_word: συμβέβληται ἡμῖν
  chosen: gain us
  alternatives:
  - benefit us
  - contribute to us
  - avail us
  lexicon: LSJ
  rationale: The perfect form of συμβάλλω here carries the sense of turning out to
    one's advantage or contributing benefit. 'Gain us' gives a natural English equivalent
    that parallels 'profit us' in the first clause without sounding archaic.
