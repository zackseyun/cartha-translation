theological_decisions:
- issue: Rendering of ὁ δίκαιος as singular masculine
  chosen_reading: the righteous man
  alternative_readings:
  - the righteous one
  rationale: The Greek is singular and masculine. Following the project's gender-accurate
    policy, the translation preserves that form rather than neutralizing it. The phrase
    is representative but still grammatically singular.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nuance of παρρησία in a vindication/judgment scene
  chosen_reading: with great boldness
  alternative_readings:
  - with great confidence
  rationale: The verse depicts the righteous person publicly vindicated before former
    persecutors. 'Boldness' preserves the confrontational openness of παρρησία better
    than the more inward-sounding 'confidence.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
