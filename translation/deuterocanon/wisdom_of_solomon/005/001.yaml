translation:
  text: Then the righteous man will stand with great boldness before the face of those
    who afflicted him and those who disregarded his labors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with great confidence.' The Greek παρρησία can denote both boldness
      and confident openness.
    reason: lexical_alternative
  - marker: b
    text: Literally 'before the face of,' a Hebrew-like expression for standing directly
      in someone's presence.
    reason: lexical_alternative
  - marker: c
    text: Or 'his toils' or 'his sufferings.' The Greek can refer to labor, hardship,
      or pain.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: LSJ
  rationale: Temporal adverb marking the ensuing scene; 'Then' is natural and sufficiently
    formal.
- source_word: στήσεται
  chosen: will stand
  alternatives:
  - will be made to stand
  - will take his stand
  lexicon: LSJ
  rationale: Future middle of ἵστημι here conveys the righteous person's arising/standing
    in vindicated presence. 'Will stand' is idiomatic and preserves the image without
    overinterpreting.
- source_word: ἐν παρρησίᾳ πολλῇ
  chosen: with great boldness
  alternatives:
  - with great confidence
  - in great boldness
  lexicon: LSJ
  rationale: παρρησία denotes frankness, boldness, confidence in open speech or bearing.
    'With great boldness' fits the vindication context and reads naturally in English.
- source_word: ὁ δίκαιος
  chosen: the righteous man
  alternatives:
  - the righteous one
  - the just man
  lexicon: LSJ
  rationale: Singular masculine substantive adjective. Per gender-accurate philosophy,
    'man' preserves the masculine singular form better than a neutral plural; 'righteous
    man' is also more idiomatic than 'righteous one' here.
- source_word: κατὰ πρόσωπον
  chosen: before the face of
  alternatives:
  - before
  - in the presence of
  - against the face of
  lexicon: LSJ
  rationale: Literally 'according to/before the face of.' The phrase conveys direct
    confrontation in someone's presence. 'Before the face of' preserves the vividness
    of the Greek while remaining understandable.
- source_word: τῶν θλιψάντων αὐτὸν
  chosen: those who afflicted him
  alternatives:
  - those who oppressed him
  - those who troubled him
  lexicon: LSJ
  rationale: Aorist participle from θλίβω, commonly 'press, afflict, oppress.' 'Afflicted'
    captures the suffering imposed without narrowing it to political oppression.
- source_word: τῶν ἀθετούντων
  chosen: those who disregarded
  alternatives:
  - those who rejected
  - those who nullified
  - those who despised
  lexicon: LSJ
  rationale: ἀθετέω can mean reject, set aside, invalidate. Here the object is 'his
    labors,' so 'disregarded' best conveys treating them as of no account.
- source_word: τοὺς πόνους αὐτοῦ
  chosen: his labors
  alternatives:
  - his toils
  - his sufferings
  - his pains
  lexicon: LSJ
  rationale: πόνος can denote toil, labor, trouble, pain. In this context of the wicked
    dismissing the righteous person's disciplined life and hardships, 'labors' best
    balances exertion and cost without reducing it merely to physical pain.
