theological_decisions:
- issue: Supplying the implicit referent of the participle and genitive phrase from
    context
  chosen_reading: 'Explicitly render the object and possessive as referring to the
    righteous man: ''see him'' and ''his salvation.'''
  alternative_readings:
  - When they see, they will be shaken... at the unexpectedness of salvation
  - When they see the righteous, they will be shaken... at the unexpectedness of deliverance
  rationale: The Greek leaves the object and possessive implicit because they are
    recoverable from the preceding verse. English can preserve the ellipsis, but doing
    so sounds abrupt and obscures the sense. Supplying the referent is an optimal-equivalence
    choice, not a doctrinal expansion.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
