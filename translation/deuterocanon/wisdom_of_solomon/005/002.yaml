translation:
  text: When they see him, they will be shaken with dreadful fear, and they will be
    astonished at the unexpectedness of his salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'seeing, they will be shaken with dreadful fear, and they
      will be astonished at the unexpected thing of salvation.' The pronouns 'him'
      and 'his' are supplied from the context of the righteous man in the previous
      verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: When they see him
  alternatives:
  - Seeing
  - After seeing
  lexicon: LSJ
  rationale: Aorist participle from ὁράω used temporally here; English idiom is best
    conveyed with a temporal clause. The object 'him' is not explicit in this verse
    but is supplied from the immediate context (the righteous man in v. 1), which
    English requires for natural sense.
- source_word: ταραχθήσονται
  chosen: they will be shaken
  alternatives:
  - they will be troubled
  - they will be disturbed
  lexicon: LSJ
  rationale: Future passive of ταράσσω. 'Shaken' preserves the force of inward upheaval
    more vividly than the flatter 'troubled,' while remaining natural English.
- source_word: φόβῳ δεινῷ
  chosen: with dreadful fear
  alternatives:
  - by terrible fear
  - with terrible fear
  lexicon: LSJ
  rationale: Instrumental/dative phrase expressing the manner or cause of their disturbance.
    'Dreadful fear' keeps the emphatic weight of δεινός without sounding archaic.
- source_word: ἐκστήσονται
  chosen: they will be astonished
  alternatives:
  - they will be beside themselves
  - they will be amazed
  lexicon: LSJ
  rationale: Future middle of ἐξίστημι. In context it denotes overwhelming astonishment
    rather than literal displacement of mind. 'Astonished' is clear modern English;
    'beside themselves' is possible but more idiomatic and potentially overstated.
- source_word: ἐπὶ τῷ παραδόξῳ
  chosen: at the unexpectedness
  alternatives:
  - at the astonishing nature
  - at the strangeness
  - at the marvel
  lexicon: LSJ
  rationale: 'The articular adjective παράδοξος functions substantivally: ''the unexpected/astonishing
    thing.'' ''Unexpectedness'' captures the sense that the salvation was beyond what
    they anticipated, fitting the context of the wicked being shocked by the righteous
    one''s vindication.'
- source_word: τῆς σωτηρίας
  chosen: of his salvation
  alternatives:
  - of his deliverance
  - of salvation
  lexicon: LSJ
  rationale: σωτηρία can mean salvation or deliverance. 'Salvation' fits Wisdom's
    theological register. The possessive 'his' is supplied from context because the
    salvation belongs to the righteous figure being seen; English benefits from making
    that relation explicit.
