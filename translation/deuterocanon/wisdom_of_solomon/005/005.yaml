translation:
  text: How was he counted among the sons of God, and his lot is among the holy ones?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the children of God.' The Greek reads 'sons of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his portion is among the holy ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  chosen: How
  alternatives:
  - Why
  lexicon: LSJ
  rationale: Introduces the astonished question of the wicked in context; 'How' best
    captures their amazement at the reversal rather than asking for a moral reason.
- source_word: κατελογίσθη
  chosen: was counted
  alternatives:
  - was reckoned
  - was accounted
  lexicon: LSJ
  rationale: Passive of καταλογίζομαι/καταλογίζω here conveys being numbered or regarded
    as belonging to a group. 'Was counted' is clear modern English and preserves the
    passive sense.
- source_word: ἐν υἱοῖς θεοῦ
  chosen: among the sons of God
  alternatives:
  - among God's sons
  - among the children of God
  lexicon: LSJ
  rationale: 'The preposition ἐν with the dative here is membership/association: ''among.''
    ''Sons of God'' preserves the masculine plural of the Greek per gender-accurate
    policy and reflects the elevated status language of the text more precisely than
    the more interpretive ''children of God''.'
- source_word: ἅγιοις
  chosen: the holy ones
  alternatives:
  - the saints
  - the holy
  lexicon: LSJ
  rationale: ἅγιοι can denote holy persons. 'The holy ones' is transparent and accessible,
    avoiding later ecclesiastical overtones that 'saints' may import, while still
    preserving the sacred register.
- source_word: κλῆρος
  chosen: lot
  alternatives:
  - portion
  - inheritance
  - share
  lexicon: LSJ
  rationale: κλῆρος literally denotes a lot and by extension an allotted portion.
    'Lot' preserves the metaphor and the sense of assigned place or share among the
    righteous.
- source_word: αὐτοῦ ἐστιν
  chosen: his lot is
  alternatives:
  - his portion is
  - he has his share
  lexicon: LSJ
  rationale: This keeps the verbless-like Greek structure natural in English while
    preserving the emphasis on his assigned standing among the holy ones.
