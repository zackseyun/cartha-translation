translation:
  text: 'or like an arrow shot at a target: the air, once cut through, immediately
    closed up on itself, so that its path could not be known.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its passage' or 'its course' for 'its path.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βέλους
  chosen: arrow
  alternatives:
  - dart
  - missile
  lexicon: LSJ
  rationale: βέλος commonly denotes a projectile, especially an arrow. 'Arrow' is
    the most natural and specific English equivalent in this simile.
- source_word: βληθέντος
  chosen: shot
  alternatives:
  - cast
  - thrown
  - launched
  lexicon: LSJ
  rationale: From βάλλω, here used of an arrow sent toward a target. 'Shot' is idiomatic
    English for an arrow and fits the image better than the more general 'thrown'
    or 'cast'.
- source_word: σκοπόν
  chosen: target
  alternatives:
  - mark
  - goal
  lexicon: LSJ
  rationale: σκοπός here is the object aimed at in archery imagery. 'Target' best
    conveys the concrete sense in modern English; 'mark' is possible but less current.
- source_word: τμηθεὶς
  chosen: cut through
  alternatives:
  - split
  - divided
  lexicon: LSJ
  rationale: The participle describes the air being parted by the arrow's passage.
    'Cut through' preserves the vivid physical image without sounding overly technical.
- source_word: ἀὴρ
  chosen: air
  alternatives:
  - sky
  - atmosphere
  lexicon: LSJ
  rationale: The immediate medium through which the arrow passes is meant, so 'air'
    is the straightforward rendering.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: LSJ
  rationale: εὐθέως marks the instant restoration of the air after the arrow passes.
    'Immediately' is clear modern English.
- source_word: εἰς ἑαυτὸν ἀνελύθη
  chosen: closed up on itself
  alternatives:
  - returned to itself
  - came back together
  lexicon: LSJ
  rationale: Literally the air 'was loosed/dissolved back into itself.' In context
    the sense is that the parted air recombined. 'Closed up on itself' communicates
    the image naturally in English while staying anchored to the Greek.
- source_word: ὡς ἀγνοῆσαι
  chosen: so that ... could not be known
  alternatives:
  - so that one could not discern
  - with the result that it was impossible to know
  lexicon: LSJ
  rationale: The infinitive with ὡς expresses result. The idiomatic English clause
    'so that its path could not be known' conveys the consequence of the air's closing.
- source_word: δίοδον
  chosen: path
  alternatives:
  - passage
  - course
  - way through
  lexicon: LSJ
  rationale: δίοδος is the way or passage through which something moves. 'Path' is
    concise and natural here, while still matching the arrow's track through the air.
