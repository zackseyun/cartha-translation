translation:
  text: He will take holiness as an unconquerable shield,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'piety' or 'godliness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λήμψεται
  chosen: will take
  alternatives:
  - will receive
  - will take up
  lexicon: BDAG
  rationale: Future middle of λαμβάνω. In this martial context, 'will take' fits the
    image of arming oneself; 'will take up' is possible but slightly more interpretive,
    while 'will receive' is less natural with a weapon image.
- source_word: ἀσπίδα
  chosen: shield
  alternatives:
  - buckler
  lexicon: LSJ
  rationale: Standard term for a shield. 'Buckler' is too archaic for the project's
    readability goals.
- source_word: ἀκαταμάχητον
  chosen: unconquerable
  alternatives:
  - invincible
  - irresistible
  lexicon: LSJ
  rationale: The adjective denotes something that cannot be fought down or overcome.
    'Unconquerable' preserves the combat metaphor and stays close to the Greek. 'Invincible'
    is possible, but 'unconquerable' more directly reflects the passive sense.
- source_word: ὁσιότητα
  chosen: holiness
  alternatives:
  - piety
  - godliness
  lexicon: LSJ
  rationale: ὁσιότης denotes holiness/piety in relation to what is devout and right
    before God. 'Holiness' best fits the elevated personified-virtue context here
    and works naturally with the armor metaphor. 'Piety' is possible but narrower
    and can sound merely devotional.
