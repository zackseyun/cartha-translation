theological_decisions:
- issue: Whether ὁσιότητα should be rendered as a moral quality ('holiness') or a
    more cultic/devotional term ('piety').
  chosen_reading: holiness
  alternative_readings:
  - piety
  - godliness
  rationale: The verse personifies virtues as divine armor. 'Holiness' preserves the
    broader theological and moral force without reducing the term to external religiosity.
    This does not import later doctrinal categories; it reflects the Greek virtue
    term in context.
  doctrine_reference: Translation philosophy §§1, 5, 6
