translation:
  text: And hailstones full of furious force will be hurled from a sling; and the
    water of the sea will rage against them, and rivers will suddenly overwhelm them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full of stone-hurling wrath' or 'full of wrath that casts stones.' The
      Greek compresses the image in the unusual expression πετροβόλου θυμοῦ.
    reason: lexical_alternative
  - marker: b
    text: 'The adverb may also be understood as ''abruptly'' or ''violently'': ''rivers
      will overwhelm them abruptly/violently.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πετροβόλου
  chosen: stony
  alternatives:
  - stone-casting
  - stone-hurling
  - like stones
  lexicon: LSJ
  rationale: The adjective is built on the idea of throwing stones and modifies θυμοῦ.
    In context with hailstones being hurled, it conveys wrath expressed in stone-like/projectile
    force. 'Stony' is concise English that preserves the imagery without over-paraphrasing.
- source_word: θυμοῦ
  chosen: wrath
  alternatives:
  - rage
  - fury
  - anger
  lexicon: LSJ
  rationale: θυμός here denotes violent anger in a judgment context. 'Wrath' best
    matches the elevated tone and destructive force of the verse.
- source_word: πλήρεις
  chosen: full of
  alternatives:
  - filled with
  lexicon: LSJ
  rationale: A straightforward rendering preserving the predicative force with χάλαζαι
    as the subject.
- source_word: ῥιφήσονται
  chosen: will be hurled
  alternatives:
  - will be thrown
  - will be cast
  lexicon: LSJ
  rationale: Future passive fits the hailstones as projectiles of divine judgment.
    'Will be hurled' is vivid and natural in English.
- source_word: χάλαζαι
  chosen: hailstones
  alternatives:
  - hail
  lexicon: LSJ
  rationale: The plural noun refers to individual destructive hailstones; 'hailstones'
    makes the image concrete.
- source_word: ἀγανακτήσει
  chosen: will rage
  alternatives:
  - will be indignant
  - will be angered
  - will surge in anger
  lexicon: LSJ
  rationale: Though often used of indignation, here the subject is ὕδωρ θαλάσσης,
    so an English verb that can apply to waters while retaining anger imagery is preferable.
    'Will rage' preserves the personification and natural force.
- source_word: ὕδωρ θαλάσσης
  chosen: the water of the sea
  alternatives:
  - sea water
  - the sea's water
  lexicon: LSJ
  rationale: A fairly literal rendering that preserves the genitival construction
    and the poetic style.
- source_word: συγκλύσουσιν
  chosen: will overwhelm
  alternatives:
  - will flood over
  - will inundate
  - will wash away
  lexicon: LSJ
  rationale: The verb denotes swamping or deluging. 'Will overwhelm' captures both
    physical inundation and judgment force.
- source_word: ἀποτόμως
  chosen: suddenly
  alternatives:
  - abruptly
  - violently
  - swiftly
  lexicon: LSJ
  rationale: The adverb can suggest abruptness or severity. With rivers as subject,
    'suddenly' best conveys the sudden onset of destructive flooding in idiomatic
    English while preserving the force of the Greek.
