translation:
  text: For the hope of the ungodly is like down carried by the wind, and like thin
    frost driven away by a storm, and like smoke dispersed by the wind, and passes
    by like the remembrance of a one-day guest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the memory of a traveler who stayed only one day.' The Greek καταλύτου
      refers to someone lodging temporarily, and μνεία can mean 'memory' or 'mention.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπὶς
  chosen: hope
  alternatives:
  - expectation
  lexicon: LSJ
  rationale: The noun denotes hope or expectation. 'Hope' is the most natural English
    equivalent and fits the moral contrast in context.
- source_word: ἀσεβοῦς
  chosen: of the ungodly
  alternatives:
  - of the wicked
  - of the impious
  lexicon: LSJ
  rationale: ἀσεβής commonly denotes one who is ungodly or impious. 'Ungodly' preserves
    the Godward moral sense better than the broader 'wicked.'
- source_word: χνοῦς
  chosen: down
  alternatives:
  - chaff
  - fluff
  - dust
  lexicon: LSJ
  rationale: The word refers to light fluff/down, not the usual term for chaff. 'Down'
    best preserves the image of something weightless and easily blown away.
- source_word: φερόμενος
  chosen: carried
  alternatives:
  - borne
  - driven
  lexicon: LSJ
  rationale: A participle of motion/passive transport; 'carried' is idiomatic and
    suits the image of down moved by wind.
- source_word: πάχνη
  chosen: thin frost
  alternatives:
  - hoarfrost
  - frost
  lexicon: LSJ
  rationale: πάχνη denotes frost/hoarfrost. 'Thin frost' reflects both the noun and
    the following adjective λεπτὴ, preserving the fragility of the image in readable
    English.
- source_word: λαίλαπος
  chosen: storm
  alternatives:
  - tempest
  - whirlwind
  lexicon: LSJ
  rationale: The term denotes a violent storm or squall. 'Storm' is clear modern English;
    'tempest' is more literary but less natural.
- source_word: διωχθεῖσα
  chosen: driven away
  alternatives:
  - chased away
  - pursued away
  lexicon: LSJ
  rationale: The passive participle here conveys being driven off by force. 'Driven
    away' is the most idiomatic rendering in this weather image.
- source_word: καπνὸς
  chosen: smoke
  lexicon: LSJ
  rationale: Straightforward lexical equivalent.
- source_word: διεχύθη
  chosen: dispersed
  alternatives:
  - scattered
  - poured out
  lexicon: LSJ
  rationale: In context of smoke under wind, the sense is dispersal/scattering rather
    than literal pouring out. 'Dispersed' best matches the image.
- source_word: μνεία
  chosen: remembrance
  alternatives:
  - memory
  - mention
  lexicon: LSJ
  rationale: The noun can mean remembrance or mention. Here the comparison is to something
    fleetingly remembered, so 'remembrance' fits better than 'mention.'
- source_word: καταλύτου
  chosen: guest
  alternatives:
  - lodger
  - traveler
  - sojourner
  lexicon: LSJ
  rationale: The noun denotes one staying at an inn or lodging place. 'Guest' is concise
    and natural, though the sense of temporary lodging is important.
- source_word: μονοημέρου
  chosen: one-day
  alternatives:
  - for a single day
  - brief
  lexicon: LSJ
  rationale: Literally 'lasting one day.' Retaining 'one-day' preserves the vivid
    brevity of the Greek image.
- source_word: παρῴδευσεν
  chosen: passes by
  alternatives:
  - went by
  - passed away
  lexicon: LSJ
  rationale: The verb means to go past or pass by. Present tense in English makes
    the simile vivid and aligns with the surrounding comparisons, though the Greek
    form is aorist.
