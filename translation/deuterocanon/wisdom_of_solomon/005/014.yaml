  chosen_reading: ungodly
  alternative_readings:
  - wicked
  - impious
  rationale: The verse emphasizes the fate of those opposed to God, not merely general
    moral evil. 'Ungodly' preserves that theological orientation without importing
    extra doctrinal content.
