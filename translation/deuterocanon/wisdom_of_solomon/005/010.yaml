translation:
  text: like a ship passing through surging water, after it has gone by no trace can
    be found, nor the track of its keel in the waves;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wave-tossed water.' The Greek emphasizes water stirred into waves.
    reason: lexical_alternative
  - marker: b
    text: The Greek term rendered 'keel' is a nautical word; some looser renderings
      take the sense more generally as the ship's course or path.
    reason: lexical_alternative
lexical_decisions:
- source_word: ναῦς
  chosen: ship
  alternatives:
  - boat
  - vessel
  lexicon: LSJ
  rationale: A general term for a seagoing vessel; 'ship' is the most natural modern
    equivalent and fits the simile's scale better than 'boat'.
- source_word: διερχομένη
  chosen: passing through
  alternatives:
  - going through
  - crossing
  lexicon: LSJ
  rationale: The participle depicts movement through a medium. 'Passing through' is
    idiomatic and preserves the image of transient motion.
- source_word: κυμαινόμενον ὕδωρ
  chosen: surging water
  alternatives:
  - wave-tossed water
  - agitated water
  - moving water
  lexicon: LSJ
  rationale: The participle from κυμαίνω conveys water in motion with waves. 'Surging
    water' is concise, natural English that preserves the sense of disturbed, wave-filled
    water.
- source_word: ἧς διαβάσης
  chosen: after it has gone by
  alternatives:
  - when it has passed
  - after it passes
  lexicon: LSJ
  rationale: The genitive absolute marks completed action relative to the main clause.
    'After it has gone by' clearly conveys the temporal sense in smooth English.
- source_word: ἴχνος
  chosen: trace
  alternatives:
  - track
  - footprint
  - mark
  lexicon: LSJ
  rationale: The point is that no visible evidence remains. 'Trace' is broad and idiomatic
    here, while 'footprint' would be too literal.
- source_word: ἀτραπός
  chosen: track
  alternatives:
  - path
  - trail
  lexicon: LSJ
  rationale: Used metaphorically for a path or course. 'Track' works well with nautical
    imagery and pairs naturally with 'keel.'
- source_word: τρόπιος αὐτῆς
  chosen: its keel
  alternatives:
  - its prow
  - its course
  lexicon: LSJ
  rationale: In nautical context τρόπις denotes the keel of a ship. The genitive/related
    form here points to the ship's keel, not merely its route. This yields the vivid
    image that even the keel's track vanishes in the waves.
- source_word: ἐν κύμασιν
  chosen: in the waves
  alternatives:
  - among the waves
  - on the waves
  lexicon: LSJ
  rationale: The prepositional phrase locates the vanished track within the wave-filled
    sea. 'In the waves' is the most straightforward rendering.
