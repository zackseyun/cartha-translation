translation:
  text: and as a proverb of reproach among fools. We considered his life madness,
    and his end dishonorable;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a byword of reproach.' The Greek παραβολή can denote a proverb-like
      saying or public byword, not only a 'parable' in the narrower sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'his death dishonorable.' The Greek 'his end' can refer specifically
      to the manner of his death.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραβολήν
  chosen: proverb
  alternatives:
  - byword
  - parable
  lexicon: LSJ
  rationale: In this context εἰς παραβολὴν ὀνειδισμοῦ denotes becoming a saying or
    object lesson of scorn. 'Proverb' preserves the idiomatic sense of a public saying
    better than the more opaque 'parable,' while 'byword' is possible but slightly
    less natural in modern English.
- source_word: ὀνειδισμοῦ
  chosen: of reproach
  alternatives:
  - of scorn
  - of insult
  lexicon: LSJ
  rationale: 'The genitive qualifies παραβολήν: a saying characterized by reproach
    or disgrace. ''Reproach'' keeps the moral-shame dimension and matches biblical
    register without becoming archaic.'
- source_word: οἱ ἄφρονες
  chosen: among fools
  alternatives:
  - the foolish
  - fools
  lexicon: LSJ
  rationale: The phrase is somewhat appositional in Greek after the previous clause.
    Rendering it as 'among fools' makes good English sense and captures that the speakers
    are the foolish ones uttering the reproach.
- source_word: ἐλογισάμεθα
  chosen: we considered
  alternatives:
  - we thought
  - we reckoned
  lexicon: LSJ
  rationale: The verb conveys deliberate estimation or judgment. 'We considered' reflects
    that evaluative sense more clearly than the looser 'we thought.'
- source_word: βίον
  chosen: life
  alternatives:
  - way of life
  - course of life
  lexicon: LSJ
  rationale: Here βίος refers to the person's lived life or manner of living. 'Life'
    is the most natural concise rendering in context.
- source_word: μανίαν
  chosen: madness
  alternatives:
  - insanity
  - folly
  lexicon: LSJ
  rationale: The term denotes frenzy or madness. 'Madness' is strong, idiomatic, and
    preserves the contemptuous judgment of the speakers.
- source_word: τελευτήν
  chosen: end
  alternatives:
  - death
  - passing
  lexicon: LSJ
  rationale: The noun can mean end or death. 'End' preserves the broader Greek wording
    while still naturally implying the manner of his death in context.
- source_word: ἄτιμον
  chosen: dishonorable
  alternatives:
  - without honor
  - shameful
  - ignoble
  lexicon: LSJ
  rationale: The adjective means lacking honor or held in dishonor. 'Dishonorable'
    communicates the evaluative force in clear modern English.
