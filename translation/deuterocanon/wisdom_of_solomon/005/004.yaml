theological_decisions:
- issue: Speaker perspective in this confession section
  chosen_reading: The verse is rendered as the words of the ungodly/foolish reflecting
    on their former judgment of the righteous man.
  alternative_readings:
  - A more detached narrator statement about fools
  rationale: The first-person plural verbs and the wider context in Wisdom 5 indicate
    a retrospective confession by the wicked. The translation therefore keeps 'we
    considered' and construes οἱ ἄφρονες as identifying the speakers rather than shifting
    to a neutral narrator voice.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
