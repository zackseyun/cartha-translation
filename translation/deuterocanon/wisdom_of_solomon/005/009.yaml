translation:
  text: All those things passed away like a shadow, and like a report running past;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a report rushing by.' The Greek ἀγγελία can mean 'message,' 'report,'
      or 'announcement,' and παρατρέχουσα emphasizes swift passing.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρῆλθεν
  chosen: passed by
  alternatives:
  - passed away
  - went by
  lexicon: BDAG
  rationale: Aorist of παρέρχομαι, expressing transience and disappearance. 'Passed
    by' preserves the imagery of something moving beyond reach without adding interpretive
    weight.
- source_word: ἐκεῖνα πάντα
  chosen: all those things
  alternatives:
  - all these things
  - those things all together
  lexicon: LSJ
  rationale: ἐκεῖνα points back to previously mentioned worldly goods or boasts as
    somewhat distanced from the speakers; 'all those things' captures both the demonstrative
    force and the totalizing πάντα.
- source_word: ὡς σκιὰ
  chosen: like a shadow
  alternatives:
  - as a shadow
  lexicon: LSJ
  rationale: A straightforward simile for insubstantiality and brevity. 'Like a shadow'
    is idiomatic modern English and preserves the metaphor.
- source_word: ἀγγελία
  chosen: message
  alternatives:
  - report
  - announcement
  - tidings
  lexicon: LSJ
  rationale: ἀγγελία can denote a message or report. 'Message' is the broadest accessible
    rendering and fits the image of something swiftly conveyed and gone.
- source_word: παρατρέχουσα
  chosen: running past
  alternatives:
  - rushing by
  - speeding past
  lexicon: LSJ
  rationale: Present participle of παρατρέχω, literally 'running past.' Retaining
    the verbal image keeps the vividness of the Greek. 'Running past' is slightly
    more formal than 'speeding by' and stays closer to the source.
