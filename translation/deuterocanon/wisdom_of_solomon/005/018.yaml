translation:
  text: He will put on righteousness as a breastplate, and will wear impartial judgment
    as a helmet;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice as a breastplate.' Greek δικαιοσύνη can mean both 'righteousness'
      and 'justice.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'judgment without hypocrisy,' that is, judgment that is genuine
      and impartial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδύσεται
  chosen: will put on
  alternatives:
  - will clothe himself with
  - will wear
  lexicon: BDAG
  rationale: Future middle of ἐνδύω in armor imagery; 'will put on' is natural modern
    English and preserves the deliberate act of donning armor.
- source_word: θώρακα
  chosen: breastplate
  alternatives:
  - corslet
  - coat of mail
  lexicon: LSJ
  rationale: Standard term for body armor covering the chest; 'breastplate' is the
    clear and conventional English equivalent in biblical martial imagery.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: The genitive modifies θώρακα in a metaphorical armor image. Per project
    defaults, δικαιοσύνη is rendered 'righteousness,' while 'justice' remains a viable
    alternative. Here 'righteousness' fits the moral quality portrayed as protective
    armor.
- source_word: περιθήσεται
  chosen: will place
  alternatives:
  - will put on
  - will set around himself
  lexicon: LSJ
  rationale: Future middle of περιτίθημι, literally 'put around/on.' Because the object
    is a helmet, 'will place' keeps the distinct verb while remaining idiomatic in
    English.
- source_word: κόρυθα
  chosen: helmet
  lexicon: LSJ
  rationale: κόρυς/κόρυθα is standard military headgear; 'helmet' is the direct and
    natural rendering.
- source_word: κρίσιν
  chosen: judgment
  alternatives:
  - justice
  - judicial decision
  lexicon: BDAG
  rationale: In this context of divine warfare, κρίσις denotes the exercise of judgment.
    'Judgment' preserves the forensic and active sense better than the broader 'justice'.
- source_word: ἀνυπόκριτον
  chosen: sincere
  alternatives:
  - unfeigned
  - without hypocrisy
  - genuine
  lexicon: BDAG
  rationale: The adjective means 'without hypocrisy' or 'genuine.' 'Sincere' is concise,
    readable modern English that conveys authenticity without archaic phrasing.
