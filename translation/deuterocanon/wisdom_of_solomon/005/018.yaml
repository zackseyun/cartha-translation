  rationale: The project's default for δικαιοσύνη is 'righteousness,' with 'justice'
    preserved where relevant. In this verse the armor metaphor emphasizes God's morally
    right character in action; 'righteousness' best preserves that theological resonance
    while avoiding over-narrowing to social justice alone.
