translation:
  text: So also we, once we were born, came to an end; and we had no sign of virtue
    to show, but were consumed in our wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'passed away' or 'vanished' for 'came to an end.' The Greek verb can
      express disappearance or cessation.
    reason: lexical_alternative
  - marker: b
    text: Or 'excellence' for 'virtue.' The Greek term can denote moral excellence
      more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ ἡμεῖς
  chosen: So also we
  alternatives:
  - Thus we also
  - In the same way, we too
  lexicon: LSJ
  rationale: Marks the comparison with the preceding images of transience; 'So also
    we' is natural English while preserving the inferential/comparative force.
- source_word: γενηθέντες
  chosen: once we were born
  alternatives:
  - having come into being
  - after being born
  lexicon: LSJ
  rationale: Aorist passive participle of γίνομαι here refers to coming into existence/birth.
    'Once we were born' fits the temporal sense in idiomatic English and keeps the
    mortality theme.
- source_word: ἐξελίπομεν
  chosen: came to an end
  alternatives:
  - passed away
  - failed
  - vanished
  lexicon: LSJ
  rationale: From ἐκλείπω, conveying cessation/disappearance. 'Came to an end' preserves
    the idea of quickly ceasing to exist or fading out without over-paraphrasing.
- source_word: ἀρετῆς
  chosen: virtue
  alternatives:
  - excellence
  - goodness
  lexicon: LSJ
  rationale: In Wisdom literature ἀρετή commonly denotes moral excellence. 'Virtue'
    is concise and preserves the ethical sense better than the broader 'excellence'
    here.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - mark
  - evidence
  - token
  lexicon: LSJ
  rationale: The phrase means they had nothing demonstrable as evidence of virtue.
    'Sign' is the most direct rendering, with the explanatory infinitive carrying
    the evidential nuance.
- source_word: οὐδὲν ἔσχομεν δεῖξαι
  chosen: we had no sign of virtue to show
  alternatives:
  - we had nothing to show as a sign of virtue
  - we had no evidence of virtue to display
  lexicon: LSJ
  rationale: This keeps the Greek structure fairly closely while producing readable
    English. The infinitive δεῖξαι is preserved by 'to show.'
- source_word: κακίᾳ
  chosen: wickedness
  alternatives:
  - evil
  - malice
  - badness
  lexicon: LSJ
  rationale: κακία here denotes moral corruption rather than mere misfortune. 'Wickedness'
    best conveys the ethical weight in context.
- source_word: κατεδαπανήθημεν
  chosen: were consumed
  alternatives:
  - were spent up
  - were wasted away
  - were used up
  lexicon: LSJ
  rationale: The verb conveys being used up or exhausted. 'Were consumed' captures
    both the passive force and the image of life squandered in evil.
