theological_decisions:
- issue: Moral term ἀρετή in Wisdom literature
  chosen_reading: virtue
  alternative_readings:
  - excellence
  - goodness
  rationale: The context is the self-condemnation of the ungodly, contrasting their
    life with moral worth they failed to display. 'Virtue' preserves the ethical and
    sapiential register without importing later technical theology.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
