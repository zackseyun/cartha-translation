reference: Wisdom of Solomon 13:6
source:
  edition: lxx-swete-1909
  text: ἀλλʼ ὅμως ἐπὶ τούτοις ἐστὶν μέμψις ὀλίγη, καὶ γὰρ αὐτοὶ τάχα πλανῶνται θεὸν
    ζητοῦντες καὶ θέλοντες εὑρεῖν·
  language: Greek
  pages:
  - 644
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
