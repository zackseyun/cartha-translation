theological_decisions:
- issue: Whether θεόν should be rendered indefinitely ('a god') or definitely ('God')
  chosen_reading: God
  alternative_readings:
  - a god
  rationale: In Wisdom 13 the author critiques people who infer divinity from creation
    yet fail to recognize the true Creator. The singular θεόν here is best understood
    as the true God whom they are attempting, however mistakenly, to seek. Rendering
    'God' preserves that theological frame.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than flatten context.'
