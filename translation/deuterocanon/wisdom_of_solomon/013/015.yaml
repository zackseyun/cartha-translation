theological_decisions:
- issue: Pronouning the idol as neuter or personal
  chosen_reading: neuter 'it' throughout
  alternative_readings:
  - personal 'him'
  rationale: Although Greek can use grammatical forms that do not map neatly onto
    English gender, the context is a manufactured image. Using 'it' preserves the
    author's critique of idolatry and avoids granting the artifact personal status
    not required by the text.
