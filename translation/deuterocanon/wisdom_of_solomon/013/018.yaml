  text: περὶ δὲ ζωῆς τὸ νεκρὸν ἀξιοῖ, περὶ δὲ ἐπικουρίας τὸν ἀπειρότατον ἱκετεύει,
    περὶ δὲ ὁδοιπορίας τὸ μηδὲ βάσει χρῆσθαι δυνάμενον,
  language: Greek
  pages:
