translation:
  text: But for life he asks a dead thing; for help he implores the one most incapable;
    and for a journey, the one unable even to use its foot,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one unable even to make use of its base/pedestal.' The Greek βάσις
      can suggest either foot/step or base, and the line mocks the idol's inability
      to move itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζωῆς
  chosen: life
  alternatives:
  - living
  - preservation of life
  lexicon: LSJ
  rationale: 'περὶ + genitive here expresses the matter about which the request is
    made: ''concerning life'' or ''for life.'' ''Life'' is the most direct and natural
    rendering.'
- source_word: τὸ νεκρόν
  chosen: the dead thing
  alternatives:
  - the dead one
  - what is dead
  - a corpse
  lexicon: LSJ
  rationale: The neuter singular points to an inanimate idol rather than a person.
    'The dead thing' preserves the polemical force against lifeless images better
    than 'the dead one,' which could sound personal.
- source_word: ἀξιοῖ
  chosen: considers ... worthy
  alternatives:
  - deems worthy
  - asks from
  - expects from
  lexicon: LSJ
  rationale: The verb commonly means 'to think worthy' or 'to deem fit.' In context
    it conveys treating the idol as worthy to grant life. 'Considers ... worthy' keeps
    the evaluative sense without over-paraphrasing.
- source_word: ἐπικουρίας
  chosen: help
  alternatives:
  - assistance
  - aid
  - support
  lexicon: LSJ
  rationale: A straightforward rendering that fits the parallel petitions in the verse.
    'Help' is idiomatic modern English and broad enough for the context.
- source_word: τὸν ἀπειρότατον
  chosen: the one most inexperienced
  alternatives:
  - the most ignorant one
  - the utterly unskilled one
  - the one without experience
  lexicon: LSJ
  rationale: ἀπειρότατος is the superlative of 'without experience' or 'unacquainted
    with.' The idol is mocked as utterly incapable. 'Most inexperienced' preserves
    the superlative force, though the referent is still the idol.
- source_word: ἱκετεύει
  chosen: begs
  alternatives:
  - implores
  - supplicates
  - entreats
  lexicon: LSJ
  rationale: The verb denotes earnest supplication. 'Begs' is vivid, natural English
    and matches the satirical tone.
- source_word: ὁδοιπορίας
  chosen: a journey
  alternatives:
  - travel
  - a trip
  lexicon: LSJ
  rationale: The noun refers to traveling or a journey. 'A journey' fits the elevated
    but readable style of the verse.
- source_word: τὸ μηδὲ βάσει χρῆσθαι δυνάμενον
  chosen: the one unable even to use its foot
  alternatives:
  - the one unable even to walk
  - the one unable even to make use of a step
  - the one unable even to stand on its base
  lexicon: LSJ
  rationale: βάσις can denote a step/footing and, for an image, also a base or pedestal.
    Given the satire of an idol that cannot move itself, 'use its foot' captures the
    mobility contrast in idiomatic English while preserving the concrete imagery.
    The ambiguity with 'base' is worth preserving in a footnote.
