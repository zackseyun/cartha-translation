theological_decisions:
- issue: Referent of the neuter and masculine expressions for the idol
  chosen_reading: Render the idol as an impersonal object ('the dead thing') but retain
    personal language where the Greek shifts to masculine forms ('the one most inexperienced').
  alternative_readings:
  - Render all references uniformly as 'it'
  - Render all references uniformly as 'the idol'
  rationale: The Greek itself varies expression for rhetorical effect, mocking the
    crafted image as both object and supposed petitioner-hearer. Preserving some of
    that variation reflects the source text's satire without importing theology beyond
    the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
