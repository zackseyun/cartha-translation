translation:
  text: For all people are by nature foolish, in whom there was ignorance of God;
    and from the good things that are seen they were not able to know the One who
    is, nor by paying attention to his works did they recognize the craftsman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all people' or 'all human beings'; Greek 'all men' uses a generic masculine
      for humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'the One who exists' or 'him who is.' The Greek can function as a divine
      title.
    reason: alternative_reading
  - marker: c
    text: Or 'the artisan' or 'the maker.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μάταιοι
  chosen: futile
  alternatives:
  - vain
  - empty
  - worthless
  lexicon: LSJ
  rationale: μάταιος denotes emptiness, vanity, or futility. 'Futile' best conveys
    the moral-intellectual emptiness in context without implying absolute worthlessness
    of persons.
- source_word: πάντες ἄνθρωποι
  chosen: all men
  alternatives:
  - all people
  - all human beings
  lexicon: LSJ
  rationale: The Greek is grammatically masculine plural with generic force. Per gender-accurate
    philosophy, 'men' preserves the source form and representative sense; the meaning
    is humanity generally, not males only.
- source_word: φύσει
  chosen: by nature
  alternatives:
  - naturally
  - by their nature
  lexicon: LSJ
  rationale: The dative adverbially indicates manner or condition. 'By nature' preserves
    the compact Greek phrasing and the claim that this futility characterizes them
    in their natural state.
- source_word: θεοῦ ἀγνωσία
  chosen: ignorance of God
  alternatives:
  - lack of knowledge of God
  - unknowing of God
  lexicon: LSJ
  rationale: The phrase straightforwardly denotes ignorance regarding God. 'Ignorance
    of God' is idiomatic and preserves the genitive relation without overinterpreting
    as culpable rebellion beyond the text.
- source_word: ἐκ τῶν ὁρωμένων ἀγαθῶν
  chosen: from the good things that are seen
  alternatives:
  - from the visible good things
  - from the good things they could see
  lexicon: LSJ
  rationale: ὁρωμένων means 'seen/visible'; ἀγαθῶν here refers to the good things
    in the created order. This rendering stays close to the Greek while remaining
    readable.
- source_word: οὐκ ἴσχυσαν εἰδέναι
  chosen: were not able to know
  alternatives:
  - did not have the power to know
  - failed to know
  lexicon: LSJ
  rationale: ἰσχύω with infinitive expresses ability. 'Were not able to know' preserves
    that nuance better than the flatter 'failed to know'.
- source_word: τὸν ὄντα
  chosen: the One who is
  alternatives:
  - the existing One
  - him who is
  - the One who exists
  lexicon: LSJ
  rationale: The articular participle of εἰμί can function as a divine designation.
    'The One who is' preserves the elevated, possibly theological resonance without
    forcing a more interpretive paraphrase.
- source_word: τοῖς ἔργοις προσχόντες
  chosen: by paying attention to his works
  alternatives:
  - giving heed to the works
  - attending to the works
  lexicon: LSJ
  rationale: προσέχω here means to attend to or give heed. The participial phrase
    is rendered instrumentally in smooth English while retaining the sense of careful
    observation.
- source_word: ἐπέγνωσαν
  chosen: did they recognize
  alternatives:
  - did they come to know
  - did they fully know
  lexicon: LSJ
  rationale: ἐπιγινώσκω can imply recognition or fuller knowledge. In this context
    of inference from creation, 'recognize' fits the idea of perceiving the maker
    from his works.
- source_word: τὸν τεχνίτην
  chosen: the craftsman
  alternatives:
  - the artisan
  - the maker
  - the designer
  lexicon: LSJ
  rationale: τεχνίτης is literally a craftsman or artisan. 'Craftsman' preserves the
    metaphor of skilled workmanship in creation better than the more generic 'maker'.
