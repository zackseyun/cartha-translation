theological_decisions:
- issue: Rendering of τὸν ὄντα as a divine designation
  chosen_reading: the One who is
  alternative_readings:
  - the One who exists
  - him who is
  rationale: The phrase likely functions as a reverent designation for God and may
    echo broader biblical language about God's being. The chosen rendering preserves
    that theological weight while remaining a direct translation of the Greek participle.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Generic masculine ἄνθρωποι
  chosen_reading: all men
  alternative_readings:
  - all people
  - all human beings
  rationale: The source uses a masculine plural noun generically. Following the project's
    gender-accurate policy, the rendering keeps the source's form while understanding
    the reference as universal humanity.
  doctrine_reference: Gender-accurate over gender-neutral.
