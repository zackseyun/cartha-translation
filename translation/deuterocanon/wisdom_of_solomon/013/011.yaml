id: WIS.13.11
reference: Wisdom of Solomon 13:11
source:
  edition: lxx-swete-1909
  text: εἰ δὲ καί τις ὑλοτόμος τέκτων εὐκίνητον φυτὸν ἐκπρίσας περιέξυσεν εὐμαθῶς
    πάντα τὸν φλοιὸν αὐτοῦ, καὶ τεχνησάμενος εὐπρεπῶς κατεσκεύασεν χρήσιμον σκεῦος
    εἰς ὑπηρεσίαν ζωῆς,
  language: Greek
  pages:
  - 645
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: Or if some woodcutter, a carpenter, has sawed down a manageable tree and skillfully
    stripped off all its bark, and with proper craftsmanship made a useful vessel
    for the service of life,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'easy to work' for 'manageable tree'; the Greek adjective can suggest
      wood that is readily handled or workable.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the needs of life' / 'for everyday use' for 'for the service of
      life.' The Greek expression refers to ordinary practical use in human life.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑλοτόμος
  chosen: woodcutter
  alternatives:
  - woodcutter of timber
  - lumberman
  lexicon: LSJ
  rationale: The compound denotes one who cuts wood/timber. 'Woodcutter' is clear
    modern English and fits the context of felling a tree.
- source_word: τέκτων
  chosen: carpenter
  alternatives:
  - craftsman
  - artisan
  lexicon: LSJ
  rationale: The word can denote a builder/craftsman broadly, but in this immediate
    context of working wood after felling a tree, 'carpenter' best captures the specific
    trade.
- source_word: εὐκίνητον
  chosen: manageable
  alternatives:
  - easy to work
  - easily moved
  - pliant
  lexicon: LSJ
  rationale: In context modifying φυτὸν, the sense is of wood/tree material that is
    workable or easy to handle. 'Manageable' preserves the practical nuance without
    over-specifying.
- source_word: φυτὸν
  chosen: tree
  alternatives:
  - plant
  - wood growth
  lexicon: LSJ
  rationale: Although literally 'plant/growth,' the context of a woodcutter sawing
    it down and stripping bark makes 'tree' the natural English equivalent.
- source_word: ἐκπρίσας
  chosen: has sawed down
  alternatives:
  - having cut out
  - having sawn off
  lexicon: LSJ
  rationale: The participle derives from sawing/cutting with a saw. 'Sawed down' fits
    the object 'tree' and the sequence of woodworking actions.
- source_word: περιέξυσεν
  chosen: stripped off
  alternatives:
  - scraped away
  - smoothed off
  lexicon: LSJ
  rationale: The verb means to scrape around/off. Because the object is bark, 'stripped
    off' communicates the result naturally in English, while 'skillfully' preserves
    the manner adverb.
- source_word: εὐμαθῶς
  chosen: skillfully
  alternatives:
  - expertly
  - with practiced ease
  lexicon: LSJ
  rationale: Though the adverb can suggest ease from experience or readiness in learning,
    in this craft context it points to practiced skill; 'skillfully' is idiomatic.
- source_word: φλοιός
  chosen: bark
  alternatives:
  - outer rind
  - peel
  lexicon: LSJ
  rationale: For a tree, 'bark' is the precise and natural English term.
- source_word: τεχνησάμενος
  chosen: with proper craftsmanship
  alternatives:
  - having worked it skillfully
  - having fashioned it artfully
  lexicon: LSJ
  rationale: The participle emphasizes the exercise of craft/technical skill. Rendering
    it adverbially avoids awkward repetition while preserving the artisanal nuance.
- source_word: εὐπρεπῶς
  chosen: proper
  alternatives:
  - beautifully
  - fittingly
  - handsomely
  lexicon: LSJ
  rationale: The adverb can mean becomingly or properly. Since the object is an ordinary
    useful vessel, 'proper craftsmanship' better fits the practical context than an
    overly aesthetic gloss.
- source_word: κατεσκεύασεν
  chosen: made
  alternatives:
  - constructed
  - prepared
  - fashioned
  lexicon: LSJ
  rationale: The verb denotes making/preparing. 'Made' is simple and natural; the
    surrounding phrasing already conveys craftsmanship.
- source_word: χρήσιμον σκεῦος
  chosen: a useful vessel
  alternatives:
  - a useful utensil
  - an implement fit for use
  lexicon: LSJ
  rationale: The phrase refers to a practical object produced from the wood. 'Vessel'
    is broad enough to preserve the Greek without narrowing the item too much.
- source_word: εἰς ὑπηρεσίαν ζωῆς
  chosen: for the service of life
  alternatives:
  - for life's use
  - for the needs of life
  - for everyday use
  lexicon: LSJ
  rationale: The phrase points to ordinary human use in sustaining life. 'For the
    service of life' stays close to the Greek while remaining intelligible; alternatives
    are possible but more interpretive.
