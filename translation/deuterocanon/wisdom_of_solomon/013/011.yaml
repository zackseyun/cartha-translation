- issue: Depiction of ordinary human craftsmanship as contrastive setup for later
    idol-making argument
  chosen_reading: Retain the practical, non-polemical description in this verse without
    importing the later critique into the wording.
  alternative_readings:
  - Translate more negatively to foreshadow idolatry
  rationale: This verse itself describes normal woodworking and household utility.
    The theological force emerges in the surrounding context, so the translation should
    not preload condemnation here.
  doctrine_reference: 'Translation philosophy: preserve what the text says without
    importing doctrinal claims it does not make.'
