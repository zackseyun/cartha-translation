theological_decisions:
- issue: Idol polemic in ἀψύχῳ and τὸ ἀσθενές
  chosen_reading: Render both expressions in a way that emphasizes the idol's lack
    of life and power without adding interpretive nouns like 'idol' into the main
    text.
  alternative_readings:
  - the lifeless idol
  - the powerless thing
  rationale: The Greek itself uses descriptive neuter expressions rather than repeating
    an explicit noun. Preserving that rhetoric keeps the author's scorn while remaining
    anchored to the wording.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Plural γάμων
  chosen_reading: marriages
  alternative_readings:
  - marriage
  - marital matters
  rationale: The Greek plural is retained in the main text for transparency. Although
    English often prefers singular 'marriage,' the plural may reflect repeated or
    general marital concerns, and the translation should not prematurely smooth it
    away.
  doctrine_reference: Translation philosophy §§1, 5
