id: WIS.13.17
reference: Wisdom of Solomon 13:17
source:
  edition: lxx-swete-1909
  text: περὶ δὲ κτημάτων καὶ γάμων αὐτοῦ καὶ τέκνων προσευχόμενος οὐκ αἰσχύνεται τῷ
    ἀψύχῳ προσλαλῶν· καὶ περὶ μὲν ὑγείας τὸ ἀσθενὲς ἐπικαλεῖται,
  language: Greek
  pages:
  - 645
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: But concerning his possessions and his marriage and children, while praying
    he is not ashamed to address the lifeless thing; and concerning health, he calls
    on what is weak,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'marital matters.' The Greek has the plural 'marriages.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the lifeless thing'; the author avoids naming the idol directly
      and instead describes it as without life.
    reason: lexical_alternative
  - marker: c
    text: Or 'the weak thing' / 'what is feeble.' The phrase refers contemptuously
      to the powerless idol.
    reason: lexical_alternative
lexical_decisions:
- source_word: κτημάτων
  chosen: possessions
  alternatives:
  - property
  - goods
  lexicon: LSJ
  rationale: κτημάτων refers broadly to owned property or possessions. 'Possessions'
    is natural modern English and preserves the material scope without narrowing to
    land alone.
- source_word: γάμων
  chosen: marriages
  alternatives:
  - marriage affairs
  - wedding matters
  lexicon: LSJ
  rationale: The plural γάμων is retained with 'marriages' rather than flattened to
    singular, reflecting the Greek form and likely the sphere of marital/family concerns
    rather than a single wedding event.
- source_word: τέκνων
  chosen: children
  alternatives:
  - offspring
  lexicon: LSJ
  rationale: τέκνων straightforwardly denotes children/offspring. 'Children' is the
    most readable and direct rendering.
- source_word: προσευχόμενος
  chosen: while praying
  alternatives:
  - praying
  lexicon: LSJ
  rationale: The participle is rendered adverbially to connect the act of prayer with
    the following shame-less address to the idol.
- source_word: οὐκ αἰσχύνεται
  chosen: he is not ashamed
  alternatives:
  - he feels no shame
  - he is unembarrassed
  lexicon: LSJ
  rationale: A close rendering that preserves the moral tone of shamelessness in appealing
    to an idol.
- source_word: τῷ ἀψύχῳ
  chosen: the lifeless thing
  alternatives:
  - the inanimate thing
  - the soulless thing
  - the lifeless one
  lexicon: LSJ
  rationale: ἀψύχῳ means without life/breath. 'The lifeless thing' communicates the
    polemical force against idols in clear English. 'Soulless' could mislead in English
    toward moral rather than ontological meaning.
- source_word: προσλαλῶν
  chosen: to address
  alternatives:
  - speaking to
  - appealing to
  lexicon: LSJ
  rationale: The verb denotes speaking to someone/something. 'Address' fits the prayer
    context and avoids overstating with 'appeal' since the prayer idea is already
    present.
- source_word: ὑγείας
  chosen: health
  alternatives:
  - well-being
  lexicon: LSJ
  rationale: ὑγείας naturally means health; the context contrasts desired healing
    with the weakness of the idol.
- source_word: τὸ ἀσθενές
  chosen: what is weak
  alternatives:
  - the weak thing
  - what is feeble
  lexicon: LSJ
  rationale: The neuter substantive points to the idol as powerless/feeble. 'What
    is weak' preserves the abstract, contemptuous characterization without forcing
    an English noun.
- source_word: ἐπικαλεῖται
  chosen: he calls on
  alternatives:
  - he invokes
  - he appeals to
  lexicon: LSJ
  rationale: A standard rendering in prayer/invocation contexts. 'Calls on' is idiomatic
    and accessible.
