theological_decisions:
- issue: Gendered anthropomorphic reference in εἰκόνι ἀνθρώπου
  chosen_reading: the image of a man
  alternative_readings:
  - a human image
  - the image of a person
  rationale: The Greek ἀνθρώπου is grammatically masculine singular and here refers
    to an idol in human male form or at least in the form designated by the masculine
    term. Per doctrine, gender-accurate rendering is preferred over neutralization
    unless context clearly demands generic humanity.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Retention of the verse's ironic rhetoric about craftsmanship in leisure
  chosen_reading: with the diligence of his idleness, and with the skill of his leisure
  alternative_readings:
  - with painstaking care in his spare time
  - with careful skill at ease
  rationale: The verse mocks idol-making by juxtaposing careful workmanship with idleness/leisure.
    Preserving that tension is preferable to smoothing it into a merely neutral description.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
