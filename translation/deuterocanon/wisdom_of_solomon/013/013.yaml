translation:
  text: But the refuse from these, useful for nothing, a crooked piece of wood and
    full of knots—taking it, he carved it with the diligence of his idleness, and
    with the skill of his leisure he shaped it, and made it like the image of a man,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'discarded piece,' 'waste,' or 'offcut' for 'refuse.' The Greek denotes
      something thrown away as worthless.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'with the diligence of his idleness, and with the skill of his
      leisure'—an ironic description of careful effort spent on making an idol.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπόβλημα
  chosen: refuse
  alternatives:
  - discarded piece
  - waste
  - offcut
  lexicon: LSJ
  rationale: The noun denotes something thrown away or rejected. 'Refuse' best captures
    the sense of a worthless leftover from the wood already mentioned, without over-specifying
    the exact kind of scrap.
- source_word: εἰς οὐδὲν εὔχρηστον
  chosen: useful for nothing
  alternatives:
  - fit for no use
  - good for nothing
  lexicon: LSJ
  rationale: This phrase emphasizes total uselessness. 'Useful for nothing' is idiomatic
    modern English and preserves the force of the Greek.
- source_word: ξύλον σκολιόν
  chosen: a crooked piece of wood
  alternatives:
  - crooked wood
  - twisted wood
  lexicon: LSJ
  rationale: ξύλον here is concrete material, not 'tree.' Adding 'piece of' clarifies
    that this is a scrap of wood in context.
- source_word: ὅζοις συμπεφυκός
  chosen: full of knots
  alternatives:
  - grown together with branches
  - covered with knurls
  - with knots grown into it
  lexicon: LSJ
  rationale: The phrase describes wood with branch-knots or protrusions. 'Full of
    knots' is natural English and conveys the defectiveness of the material.
- source_word: λαβών
  chosen: taking it
  alternatives:
  - having taken it
  lexicon: LSJ
  rationale: Aorist participle introducing the artisan's action. 'Taking it' keeps
    the sequence clear in English.
- source_word: ἐγλύψεν
  chosen: he carved
  alternatives:
  - he engraved
  - he whittled
  lexicon: LSJ
  rationale: The verb refers to carving or cutting into material. 'Carved' fits woodcraft
    and the idol-making context.
- source_word: ἐν ἐπιμελείᾳ ἀργίας αὐτοῦ
  chosen: with the diligence of his idleness
  alternatives:
  - with painstaking care in his idle time
  - with careful attention born of idleness
  lexicon: LSJ
  rationale: 'The Greek is rhetorically pointed: he applies careful effort to a product
    of leisure/idleness. Preserving the paradox with ''diligence of his idleness''
    keeps the satirical tone of the verse.'
- source_word: ἐμπειρίᾳ ἀνέσεως
  chosen: with the skill of his leisure
  alternatives:
  - with experience gained in spare time
  - with practiced ease
  lexicon: LSJ
  rationale: ἀνέσεως here suggests ease, relaxation, or leisure rather than hardship.
    'Skill of his leisure' preserves the ironic pairing with the previous phrase and
    avoids flattening the rhetoric.
- source_word: ἐτύπωσεν
  chosen: he shaped
  alternatives:
  - he formed
  - he fashioned
  lexicon: LSJ
  rationale: The verb means to form or impress a shape. 'Shaped' is straightforward
    and fits the sequence of carving and fashioning.
- source_word: ἀπεικάσεν
  chosen: made it like
  alternatives:
  - likened it to
  - made it resemble
  lexicon: LSJ
  rationale: The verb expresses making one thing correspond in likeness to another.
    'Made it like' is concise and natural before the following dative phrase.
- source_word: εἰκόνι ἀνθρώπου
  chosen: the image of a man
  alternatives:
  - a human image
  - the likeness of a man
  lexicon: LSJ
  rationale: The Greek is singular and masculine. In keeping with the project's gender-accurate
    policy, 'man' is retained rather than generalized to 'humanity' or neutralized
    to 'person.'
