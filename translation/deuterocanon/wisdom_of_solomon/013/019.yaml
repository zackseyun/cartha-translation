theological_decisions:
- issue: Referent of the neuter singular description for the object of prayer
  chosen_reading: The phrase refers to the idol as an inert object from which the
    worshiper seeks practical success.
  alternative_readings:
  - A more generalized reference to an inactive deity-image without emphasizing physical
    inertness
  rationale: The immediate context throughout Wisdom 13 critiques idol manufacture
    and worship. The neuter superlative and the irony of asking it for help strongly
    point to the crafted image itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
