translation:
  text: But concerning provision and work and success of his hands, he asks strength
    from that thing most inactive with his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the most lifeless thing' or 'what is utterly inert.' The Greek superlative
      stresses the idol's complete inability to act.
    reason: lexical_alternative
  - marker: b
    text: Literally 'success of hands,' meaning success in what one does or makes.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορισμοῦ
  chosen: provision
  alternatives:
  - gain
  - acquisition
  - livelihood
  lexicon: LSJ
  rationale: The noun denotes procuring resources or means of support. 'Provision'
    fits the triad with work and success without narrowing it only to profit.
- source_word: ἐργασίας
  chosen: work
  alternatives:
  - labor
  - business
  lexicon: LSJ
  rationale: A broad term for labor or activity; 'work' is the most natural modern
    equivalent here.
- source_word: χειρῶν ἐπιτυχίας
  chosen: success of hands
  alternatives:
  - success in handiwork
  - prosperity of his hands
  lexicon: LSJ
  rationale: Literally 'success of hands.' The phrase refers to successful outcome
    in what one's hands do. A relatively literal rendering preserves the irony of
    asking an idol for practical success.
- source_word: τὸ ἀδρανέστατον
  chosen: that thing most inactive
  alternatives:
  - the most lifeless thing
  - the most helpless thing
  - what is utterly inert
  lexicon: LSJ
  rationale: Superlative of a term meaning inactive, idle, powerless. The neuter singular
    points to the idol as an object. 'Most inactive' keeps the concrete irony without
    overinterpreting as 'lifeless,' though that sense is nearby.
- source_word: ταῖς χερσὶν
  chosen: with his hands
  alternatives:
  - with the hands
  - by his hands
  lexicon: LSJ
  rationale: The dative phrase likely refers to the worshiper's own hands in the act
    of petitioning or handling the idol. English idiom prefers 'with his hands' here.
- source_word: εὐδράνειαν
  chosen: vigor
  alternatives:
  - good activity
  - skillfulness
  - effective action
  lexicon: LSJ
  rationale: A rare noun built on the idea of active effectiveness, contrasted sharply
    with ἀδρανέστατον. 'Vigor' captures the request for effective power or energetic
    capability while preserving the wordplay with inactivity.
- source_word: αἰτεῖται
  chosen: he asks
  alternatives:
  - he requests
  - he seeks
  lexicon: LSJ
  rationale: Straightforward middle/passive form in sense 'asks for' or 'requests.'
    'He asks' is simple and direct.
