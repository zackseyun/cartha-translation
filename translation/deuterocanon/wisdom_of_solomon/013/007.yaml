id: WIS.13.7
reference: Wisdom of Solomon 13:7
source:
  edition: lxx-swete-1909
  text: ἐν γὰρ τοῖς ἔργοις αὐτοῦ ἀναστρεφόμενοι διεραυνῶσιν, καὶ πείθονται τῇ ὄψει
    ὅτι καλὰ τὰ βλεπόμενα.
  language: Greek
  pages:
  - 644
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: For while moving among his works, they examine them closely, and they are
    persuaded by the sight, because the things seen are beautiful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the visible things are good.' The Greek καλὰ can mean either 'beautiful'
      or 'good'; here 'beautiful' was chosen because the verse emphasizes persuasion
      through sight.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστρεφόμενοι
  chosen: while moving among
  alternatives:
  - while living among
  - while being occupied with
  - while turning about among
  lexicon: BDAG
  rationale: The participle literally conveys conducting oneself or moving about.
    In this context with ἐν τοῖς ἔργοις αὐτοῦ, it describes engagement with God's
    works in the created order. 'While moving among' preserves the spatial and experiential
    sense better than the more abstract 'while considering'.
- source_word: διεραυνῶσιν
  chosen: examine them closely
  alternatives:
  - search out
  - investigate thoroughly
  - scrutinize
  lexicon: LSJ
  rationale: The verb intensifies ἐραυνάω and indicates careful investigation. 'Examine
    them closely' is natural English and keeps the sense of deliberate scrutiny.
- source_word: πείθονται
  chosen: they are persuaded
  alternatives:
  - they are convinced
  - they believe
  lexicon: BDAG
  rationale: The passive/middle sense here is that the observers are won over by the
    visual evidence. 'They are persuaded' preserves the causal force of the following
    dative τῇ ὄψει.
- source_word: τῇ ὄψει
  chosen: by what they see
  alternatives:
  - by the sight
  - by appearance
  - by the visible appearance
  lexicon: BDAG
  rationale: Literally 'by the sight/appearance.' 'By what they see' renders the dative
    instrumentally in idiomatic English while matching the experiential emphasis of
    the verse.
- source_word: καλά
  chosen: beautiful
  alternatives:
  - good
  - fine
  - attractive
  lexicon: LSJ
  rationale: 'Although καλός can mean ''good'' broadly, in a verse focused on visual
    persuasion and visible things, the aesthetic nuance is foregrounded. ''Beautiful''
    best fits the logic: they are drawn in by the beauty of creation.'
- source_word: τὰ βλεπόμενα
  chosen: the things being seen
  alternatives:
  - the visible things
  - what is seen
  lexicon: BDAG
  rationale: The participle refers to visible created realities. 'The things being
    seen' stays close to the Greek while remaining understandable; it also preserves
    the contrast between observation and inference in the surrounding context.
