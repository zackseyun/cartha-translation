reference: Wisdom of Solomon 13:9
source:
  edition: lxx-swete-1909
  text: εἰ γὰρ τοσοῦτον ἴσχυσαν εἰδέναι ἵνα δύνωνται στοχάσασθαι τὸν αἰῶνα, τὸν τούτων
    δεσπότην πῶς τάχιον οὐχ εὗρον;
  language: Greek
  pages:
  - 644
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
