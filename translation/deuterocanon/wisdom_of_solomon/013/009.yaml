theological_decisions:
- issue: Referent of τὸν αἰῶνα
  chosen_reading: Rendered as 'the age' in the main text, with a footnote preserving
    'the world'/'the universe' as contextual alternatives.
  alternative_readings:
  - the world
  - the universe
  rationale: The Greek wording is somewhat compressed and can point either to the
    age/world-order they were able to infer from created things or to the cosmos more
    broadly. The main text stays close to the Greek form, while the footnote preserves
    the broader cosmological sense many readers may infer.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Rendering of δεσπότην
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: The verse speaks of the creator's authority over created realities. 'Master'
    preserves the lexical distinction of δεσπότης without importing the covenantal/title
    associations of κύριος.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
