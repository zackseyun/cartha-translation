theological_decisions:
- issue: Rendering δεσπότης in relation to God
  chosen_reading: Master
  alternative_readings:
  - Lord
  - sovereign
  rationale: The verse contrasts created beauties with the one who rules over them.
    Using 'Master' preserves the distinct lexical force of δεσπότης rather than flattening
    it into the more common divine title 'Lord.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve lexical distinctions
    where context warrants.'
- issue: Force of the argument against idolatry
  chosen_reading: The text states that people mistook beautiful created things for
    gods and should infer the superiority of their creator.
  alternative_readings:
  - The clause could be expanded to imply explicit worship practices
  rationale: The Greek explicitly describes supposition or assumption, not the full
    range of cultic behavior. The translation avoids importing stronger doctrinal
    claims than the text states.
  doctrine_reference: 'DOCTRINE.md: Never import doctrinal claims the text does not
    make.'
