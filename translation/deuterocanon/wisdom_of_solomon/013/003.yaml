id: WIS.13.3
reference: Wisdom of Solomon 13:3
source:
  edition: lxx-swete-1909
  text: ὧν εἰ μὲν τῇ καλλονῇ τερπόμενοι θεοὺς ὑπελάμβανον, γνωτώσαν πόσῳ τούτων ὁ
    δεσπότης ἐστὶ βελτίων· ὁ γὰρ τοῦ κάλλους γενεσιούργης ἔκτισεν αὐτά.
  language: Greek
  pages:
  - 644
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Translation-ready override derived
    from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond
    Wisdom 19:22.
translation:
  text: If, then, delighting in their beauty, they supposed them to be gods, let them
    know how much better than these is their Master; for the maker of beauty created
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let them recognize how much superior to these is their Lord.' The Greek
      has 'Master' (δεσπότης), which stresses authority over created things.
    reason: lexical_alternative
lexical_decisions:
- source_word: καλλονῇ
  chosen: beauty
  alternatives:
  - splendor
  - fairness
  lexicon: LSJ
  rationale: καλλονή denotes beauty or attractiveness. 'Beauty' is the most natural
    English rendering here and matches the argument from visible attractiveness to
    mistaken worship.
- source_word: τερπόμενοι
  chosen: delighting
  alternatives:
  - taking pleasure
  - being charmed
  lexicon: LSJ
  rationale: The participle conveys pleasurable enjoyment or delight. 'Delighting'
    preserves the ongoing experiential sense without over-paraphrase.
- source_word: θεοὺς ὑπελάμβανον
  chosen: they supposed them to be gods
  alternatives:
  - they considered them gods
  - they assumed they were gods
  lexicon: LSJ
  rationale: ὑπολαμβάνω here means to suppose or assume. 'Supposed them to be gods'
    keeps the indirect, mistaken judgment rather than implying formal worship language
    not explicit in this clause.
- source_word: γνωτώσαν
  chosen: let them know
  alternatives:
  - let them recognize
  - they should know
  lexicon: LSJ
  rationale: The imperative calls for coming to knowledge or recognition. 'Let them
    know' is concise and idiomatic.
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  - owner
  - sovereign
  lexicon: LSJ
  rationale: Although κύριος defaults to 'Lord' in doctrine, this verse uses δεσπότης,
    which emphasizes authority/mastery. 'Master' best preserves the lexical distinction
    from κύριος and fits the contrast with created things.
- source_word: βελτίων
  chosen: better
  alternatives:
  - superior
  - greater
  lexicon: LSJ
  rationale: The comparative is straightforward. 'Better' is simple, readable English
    and preserves the evaluative comparison.
- source_word: γενεσιούργης
  chosen: creator
  alternatives:
  - maker
  - author
  lexicon: LSJ
  rationale: This rare noun refers to one who brings into being or produces. 'Creator'
    best fits the theological and cosmological context.
- source_word: τοῦ κάλλους
  chosen: of beauty
  alternatives:
  - of what is beautiful
  - of splendor
  lexicon: LSJ
  rationale: The genitive most naturally means 'of beauty.' Rendering it this way
    preserves the wordplay with καλλονῇ earlier in the verse.
- source_word: ἔκτισεν
  chosen: created
  alternatives:
  - made
  - formed
  lexicon: LSJ
  rationale: κτίζω commonly means create. 'Created' preserves the strong creator-creature
    distinction central to the verse's argument.
- source_word: αὐτά
  chosen: them
  alternatives:
  - these things
  lexicon: LSJ
  rationale: The pronoun refers back to the beautiful created realities under discussion.
    'Them' is idiomatic and sufficiently clear in context.
