translation:
  text: But after using up the scraps from his work in preparing food, he was filled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'castoff pieces,' 'offcuts,' or 'waste from his work.' The Greek refers
      to what is thrown off from the artisan's labor.
    reason: lexical_alternative
  - marker: b
    text: '''He was filled'' likely means he satisfied his hunger after using the
      leftover wood to prepare his meal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποβλήματα
  chosen: scraps
  alternatives:
  - castoffs
  - waste pieces
  - offcuts
  - refuse
  lexicon: LSJ
  rationale: The noun denotes things thrown off or discarded. In the woodworking/idol-making
    context, 'scraps' naturally conveys leftover pieces from the craftsman's labor
    without overstating them as worthless garbage.
- source_word: ἐργασίας
  chosen: work
  alternatives:
  - labor
  - craft
  - workmanship
  lexicon: LSJ
  rationale: A broad term for work or labor. 'Work' fits the immediate sense of the
    artisan's activity and keeps the line readable; the context already implies craftsmanship.
- source_word: εἰς ἑτοιμασίαν τροφῆς
  chosen: to prepare food
  alternatives:
  - for the preparation of food
  - for making a meal
  lexicon: LSJ
  rationale: The prepositional phrase expresses purpose. 'To prepare food' is a natural
    English rendering that preserves the sense without unnecessary stiffness.
- source_word: ἀναλώσας
  chosen: using up
  alternatives:
  - consuming
  - spending
  - exhausting
  lexicon: LSJ
  rationale: The participle indicates expending the leftover material. 'Using up'
    fits the practical sense of burning or otherwise consuming scraps for meal preparation
    and reads idiomatically in English.
- source_word: ἐνεπλήσθη
  chosen: he was filled
  alternatives:
  - he was satisfied
  - he had his fill
  lexicon: LSJ
  rationale: The passive verb literally means 'was filled.' In context it refers to
    being fed/satisfied after preparing food. Retaining 'filled' preserves the literal
    image while remaining understandable.
- source_word: τὰ δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: LSJ
  rationale: The particle δέ marks transition/contrast with the previous description.
    'But' captures the contrastive movement in the argument better than a simple 'and'.
