translation:
  text: Yet again, not even they are excusable;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not even they are forgivable' or 'not even they deserve pardon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: Yet again
  alternatives:
  - again
  - but again
  - furthermore
  lexicon: LSJ
  rationale: Adverb marking a renewed or additional assertion in the argument. 'Yet
    again' preserves the resumptive force and mild adversative nuance created in context
    by δʼ.
- source_word: δʼ
  chosen: Yet
  alternatives:
  - but
  - and
  lexicon: LSJ
  rationale: Postpositive conjunction with lightly adversative or continuative force.
    In English it is absorbed into 'Yet again' rather than rendered separately.
- source_word: οὐδʼ
  chosen: not even
  alternatives:
  - nor
  - not
  lexicon: LSJ
  rationale: 'Intensifies the negation: ''not even they.'' Rendering it explicitly
    preserves the emphasis of the Greek.'
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - these themselves
  - they themselves
  lexicon: LSJ
  rationale: Intensive pronoun referring back to the people under discussion. English
    does not require 'themselves' here, since 'not even they' already carries the
    emphasis naturally.
- source_word: συγγνωστοί
  chosen: excusable
  alternatives:
  - forgivable
  - to be pardoned
  - deserving of indulgence
  lexicon: LSJ
  rationale: The adjective denotes being entitled to pardon or excuse. 'Excusable'
    fits the immediate argumentative context about culpability better than 'forgivable,'
    which can sound more relational or post-offense than evaluative of blame.
