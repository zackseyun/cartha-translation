theological_decisions:
- issue: Degree of culpability expressed by συγγνωστοί
  chosen_reading: The verse states that those described are not excusable.
  alternative_readings:
  - The verse could be rendered 'not pardonable' or 'not forgivable'.
  rationale: The context in Wisdom 13 concerns human responsibility in failing to
    recognize God from creation. 'Excusable' preserves that moral-accountability emphasis
    without importing later doctrinal categories of forgiveness.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
