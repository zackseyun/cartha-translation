theological_decisions:
- issue: Natural revelation language
  chosen_reading: their Maker is seen by analogy
  alternative_readings:
  - their Creator is perceived proportionately
  - the creator of them is contemplated from them
  rationale: The verse teaches that the creator can be inferred from creation without
    specifying a full doctrine of saving knowledge. The rendering preserves that epistemic
    claim without overstating it. 'Maker' is chosen for readability, while 'by analogy'
    retains the philosophical nuance of ἀναλόγως.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
