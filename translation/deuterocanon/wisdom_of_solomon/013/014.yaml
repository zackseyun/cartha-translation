translation:
  text: or he made it like some lowly animal, smearing it with red ocher and with
    dye, reddening its surface, and smearing over every blemish on it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some common animal' or 'some cheap animal'; the Greek emphasizes the
      base or low-status character of the creature the idol is made to resemble.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek names coloring materials: ''red ocher'' (μίλτος) and φῦκος, a
      reddish dye or cosmetic pigment.'
    reason: cultural_note
lexical_decisions:
- source_word: ζώῳ τινὶ εὐτελεῖ
  chosen: some lowly animal
  alternatives:
  - some cheap animal
  - some worthless animal
  - some common animal
  lexicon: LSJ
  rationale: ζῷον is 'animal/living creature'; εὐτελής conveys low status, cheapness,
    or commonness. 'Lowly animal' preserves the contemptuous tone in context without
    overcommitting to 'worthless,' which can imply moral judgment rather than humble
    or base quality.
- source_word: ὡμοίωσεν
  chosen: made it like
  alternatives:
  - likened it to
  - fashioned it in the likeness of
  lexicon: LSJ
  rationale: The verb means to make like or liken. 'Made it like' is natural English
    and fits the artisan context of shaping an idol to resemble an animal.
- source_word: καταχρίσας
  chosen: smearing
  alternatives:
  - coating
  - anointing
  - plastering
  lexicon: LSJ
  rationale: The participle denotes applying a substance over a surface. 'Smearing'
    best matches the physical act of covering the idol with pigment and later covering
    blemishes, while avoiding the religious connotations of 'anointing' in English.
- source_word: μίλτῳ
  chosen: red ocher
  alternatives:
  - red earth
  - red lead
  - vermilion
  lexicon: LSJ
  rationale: μίλτος refers to red ocher/red earth used as pigment. 'Red ocher' is
    the most straightforward modern equivalent and suits the artisan setting.
- source_word: φύκει
  chosen: dye
  alternatives:
  - seaweed dye
  - rouge
  - paint
  lexicon: LSJ
  rationale: φῦκος can denote a red cosmetic or dye, historically associated with
    seaweed-derived coloring. 'Dye' is broad enough for modern readers while preserving
    the coloring sense; 'paint' would flatten the specific pigment/cosmetic nuance.
- source_word: ἐρυθῆνας χρῶαν αὐτοῦ
  chosen: reddening its surface
  alternatives:
  - making its complexion red
  - coloring its skin red
  - reddening its appearance
  lexicon: LSJ
  rationale: χρώς/χρόα can mean skin, surface, or complexion. For an idol image, 'surface'
    is the most fitting non-anthropomorphic rendering, while 'reddening' reflects
    the participial action implied by the phrase.
- source_word: πᾶσαν κηλῖδα τὴν ἐν αὐτῷ
  chosen: every blemish in it
  alternatives:
  - every stain on it
  - every spot in it
  - every defect in it
  lexicon: LSJ
  rationale: κηλίς denotes spot, stain, or blemish. In the context of finishing an
    idol, 'blemish' best captures an imperfection being concealed rather than merely
    dirt or discoloration.
