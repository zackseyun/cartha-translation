  text: εἰ δὲ δυνάμει καὶ ἐνεργείᾳ ἐκπλαγέντες, νοησάτωσαν ἀπʼ αὐτῶν πόσῳ ὁ κατασκευάσας
    αὐτὰ δυνατώτερός ἐστιν·
  language: Greek
