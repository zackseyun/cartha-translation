translation:
  text: But if they were astonished by their power and activity, let them understand
    from them how much more powerful is the one who made them;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their power and working.' The Greek pairs δύναμις with ἐνέργεια to describe
      the impressive force and active functioning of the created things.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνάμει
  chosen: power
  alternatives:
  - might
  - strength
  lexicon: BDAG
  rationale: The dative pairs with ἐνεργείᾳ to describe the impressive capacity of
    the created things. 'Power' is the most natural modern English equivalent and
    preserves the contrast with the maker being 'more powerful.'
- source_word: ἐνεργείᾳ
  chosen: operation
  alternatives:
  - working
  - activity
  - effectiveness
  lexicon: BDAG
  rationale: The noun denotes active working or operative effect. 'Operation' keeps
    the sense of active functioning in parallel with 'power' without overinterpreting
    the philosophical nuance.
- source_word: ἐκπλαγέντες
  chosen: were astonished
  alternatives:
  - were struck with amazement
  - were overwhelmed
  lexicon: BDAG
  rationale: The participle conveys being strongly impressed or amazed. 'Were astonished'
    is idiomatic and preserves the emotional force without exaggeration.
- source_word: νοησάτωσαν
  chosen: let them understand
  alternatives:
  - let them perceive
  - let them consider
  lexicon: BDAG
  rationale: The imperative calls for rational inference. 'Understand' captures the
    intellectual recognition urged by the author.
- source_word: ἀπʼ αὐτῶν
  chosen: from them
  alternatives:
  - from these things
  - from them as evidence
  lexicon: BDAG
  rationale: The phrase indicates inference drawn from the created things just mentioned.
    'From them' is concise and faithful; the antecedent is clear from context.
- source_word: πόσῳ
  chosen: how much more
  alternatives:
  - by how much
  - how greatly
  lexicon: BDAG
  rationale: 'In this comparative construction, the sense is inferential and intensifying:
    the maker exceeds the creatures. ''How much more'' is idiomatic English for the
    comparison.'
- source_word: ὁ κατασκευάσας
  chosen: the one who made
  alternatives:
  - the maker who fashioned
  - the one who constructed
  lexicon: BDAG
  rationale: The participle refers to the creator of the heavenly bodies or natural
    forces in view. 'The one who made' is readable modern English and avoids an overly
    mechanical 'constructed' while preserving agency.
- source_word: δυνατώτερός
  chosen: more powerful
  alternatives:
  - mightier
  - stronger
  lexicon: BDAG
  rationale: The comparative directly answers the prior mention of created 'power.'
    'More powerful' preserves the lexical connection and the argument from effect
    to cause.
