theological_decisions:
- issue: Referent and rhetorical force of εἰκὼν in anti-idolatry context
  chosen_reading: Rendered as 'image' rather than 'idol' in the main text
  alternative_readings:
  - idol
  rationale: 'The context clearly concerns an idol, but the Greek term itself is εἰκών,
    ''image.'' Using ''image'' preserves the author''s irony: the object must be propped
    up because it cannot help itself. ''Idol'' remains a viable contextual alternative
    but is not required by the lexical form.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
