translation:
  text: So then, lest it fall, he made provision for it, knowing that it is unable
    to help itself; for it is an image and has need of help.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'idol' for 'image'; the Greek word is literally 'image' or 'likeness,'
      though the context is a crafted object of worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα μὲν οὖν μὴ καταπέσῃ
  chosen: So then, to keep it from falling
  alternatives:
  - therefore, lest it fall
  - so that it might not fall down
  lexicon: LSJ
  rationale: ἵνα with μή and the aorist subjunctive expresses purpose/prevention.
    καταπέσῃ is literally 'fall down'; 'to keep it from falling' is natural English
    while preserving the preventative sense.
- source_word: προενόησεν
  chosen: he made provision for it
  alternatives:
  - he took thought for it
  - he provided beforehand for it
  lexicon: LSJ
  rationale: The verb conveys forethought or taking measures in advance. In context
    of securing an idol so it does not topple, 'made provision for it' captures practical
    preventative action better than a merely mental sense.
- source_word: αὐτοῦ
  chosen: for it
  alternatives:
  - for him
  - concerning it
  lexicon: Greek grammar
  rationale: The pronoun refers back to the manufactured idol/image, grammatically
    masculine but semantically inanimate in English; 'it' is the natural referent.
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - since he knew
  - because he knew
  lexicon: LSJ
  rationale: The participle gives attendant rationale. 'Knowing' preserves the participial
    linkage without over-interpreting the syntax.
- source_word: ἀδυνατεῖ ἑαυτῷ βοηθῆσαι
  chosen: it is unable to help itself
  alternatives:
  - it cannot help itself
  - it is powerless to come to its own aid
  lexicon: LSJ
  rationale: ἀδυνατέω denotes inability or powerlessness; βοηθέω means help/come to
    aid. 'Unable to help itself' is concise and faithful.
- source_word: εἰκὼν
  chosen: image
  alternatives:
  - idol
  - likeness
  lexicon: LSJ
  rationale: εἰκών is broadly 'image' or 'likeness.' Since the verse is mocking a
    crafted cult object, 'image' preserves the lexical sense without importing a stronger
    interpretive label than the Greek itself uses here.
- source_word: χρείαν ἔχει βοηθείας
  chosen: has need of help
  alternatives:
  - needs help
  - has need of assistance
  lexicon: LSJ
  rationale: The idiom literally means 'has need of help/assistance.' 'Has need of
    help' keeps the slightly formal, ironic tone of the Greek while remaining readable.
