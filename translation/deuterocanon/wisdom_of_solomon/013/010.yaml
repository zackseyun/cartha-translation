translation:
  text: But miserable are they, and their hopes are among the dead, who called gods
    the works of human hands—gold and silver, the product of skill, and images of
    animals, or a useless stone, the work of an ancient hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'their hopes are in dead things' or 'their hopes are with the dead.'
      The Greek phrase is terse and may intentionally evoke both lifeless idols and
      death-associated futility.
    reason: alternative_reading
  - marker: b
    text: The phrase 'the work of an ancient hand' may mean a stone idol fashioned
      long ago, emphasizing both its age and its merely human origin.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταλαιπώροι
  chosen: miserable
  alternatives:
  - wretched
  - pitiful
  lexicon: LSJ
  rationale: Conveys a state of misery or wretchedness without sounding archaic. 'Wretched'
    is possible, but 'miserable' is more natural modern English while preserving the
    denunciatory force.
- source_word: ἐν νεκροῖς αἱ ἐλπίδες αὐτῶν
  chosen: their hopes are among the dead
  alternatives:
  - their hopes are in dead things
  - their hopes are with the dead
  lexicon: LSJ
  rationale: 'A relatively formal rendering preserves the striking imagery and ambiguity:
    their hopes are bound up with lifeless/dead realities. ''Among the dead'' reflects
    the plural νεκροῖς straightforwardly and avoids over-interpreting whether persons
    or dead idols are primarily in view.'
- source_word: οἵτινες ἐκάλεσαν θεοὺς
  chosen: who called gods
  alternatives:
  - who named as gods
  - who regarded as gods
  lexicon: LSJ
  rationale: Keeps the direct verbal force of ἐκάλεσαν with θεούς. English idiom requires
    supplying the object after 'called,' completed by the following accusative phrases.
- source_word: ἔργα χειρῶν ἀνθρώπων
  chosen: the works of human hands
  alternatives:
  - works of men's hands
  - things made by human hands
  lexicon: LSJ
  rationale: This preserves the biblical idiom of handmade idols while using gender-accurate
    'human.' The plural 'hands' is retained as in the Greek.
- source_word: τέχνης ἐμμελέτημα
  chosen: the product of skill
  alternatives:
  - a studied work of art
  - an elaborate work of craftsmanship
  - a crafted product of art
  lexicon: LSJ
  rationale: The phrase denotes something carefully wrought by art/skill. 'The product
    of skill' is concise, natural, and avoids over-aestheticizing the phrase while
    preserving human craftsmanship as the point.
- source_word: ἀπεικάσματα ζώων
  chosen: images of animals
  alternatives:
  - likenesses of living creatures
  - representations of animals
  lexicon: LSJ
  rationale: ἀπεικάσματα are representations or images; ζώων here naturally refers
    to animals/living creatures in idol form. 'Images of animals' is clear and idiomatic.
- source_word: λίθον ἄχρηστον
  chosen: a useless stone
  alternatives:
  - an unserviceable stone
  - a worthless stone
  lexicon: LSJ
  rationale: ἄχρηστος means useless or of no use. 'Useless stone' preserves the polemical
    force against idols better than the more economic-sounding 'worthless.'
- source_word: χειρὸς ἔργον ἀρχαίας
  chosen: the work of an ancient hand
  alternatives:
  - the work of an old hand
  - the work of a hand from long ago
  lexicon: LSJ
  rationale: The genitive phrase most naturally describes the stone idol as something
    fashioned by a hand of old/ancient times. 'Ancient hand' keeps the compactness
    and rhetorical flavor of the Greek better than a paraphrase.
