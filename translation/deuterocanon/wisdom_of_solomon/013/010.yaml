theological_decisions:
- issue: Nature of the phrase 'their hopes are among the dead'
  chosen_reading: Retain the metaphor broadly, without specifying whether 'the dead'
    refers primarily to lifeless idols or to the realm of the dead.
  alternative_readings:
  - their hopes are in dead things
  - their hopes are with dead people/the dead
  rationale: The Greek permits a deliberately sharp image of hope invested in what
    is dead. The translation preserves that theological critique of idolatry without
    narrowing the referent beyond the text.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
- issue: Gender in 'works of human hands'
  chosen_reading: Use 'human hands' rather than 'men's hands.'
  alternative_readings:
  - men's hands
  rationale: ἀνθρώπων is generic for human beings here, not specifically male persons.
    This follows the project's gender-accurate principle while preserving the anti-idolatry
    idiom.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
