reference: Wisdom of Solomon 13:10
source:
  edition: lxx-swete-1909
  text: Ταλαιπώροι δέ καὶ ἐν νεκροῖς αἱ ἐλπίδες αὐτῶν, οἵτινες ἐκάλεσαν θεοὺς ἔργα
