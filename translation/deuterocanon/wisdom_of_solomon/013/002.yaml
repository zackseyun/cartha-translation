theological_decisions:
- issue: Whether πνεῦμα should be rendered 'wind' or 'spirit'
  chosen_reading: wind
  alternative_readings:
  - spirit
  - breath
  rationale: The verse catalogs created natural forces and heavenly bodies that idolaters
    mistook for deities. Rendering πνεῦμα as 'spirit' would risk suggesting a personal
    spiritual being rather than an element of nature. 'Wind' best preserves the anti-idolatry
    argument of the passage without importing later theological associations.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source text''s plain sense.'
- issue: How to render πρυτάνεις κόσμου in relation to θεούς
  chosen_reading: to be gods ruling the world
  alternative_readings:
  - to be the world's governors as gods
  - to be gods, rulers of the cosmos
  rationale: The phrase functions appositionally/descriptively of the supposed gods.
    This rendering preserves both the claim of divinity and their perceived cosmic
    governance, without overstating metaphysical precision.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English.'
