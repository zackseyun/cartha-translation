id: LJE.1.33
reference: Letter of Jeremiah 1:33
source:
  edition: lxx-swete-1909
  text: οὔτε ἐὰν κακόν τι πάθωσιν ὑπό τινος οὔτε ἐὰν ἀγαθόν, δυνήσονται ἀνταποδοῦναι·
    οὔτε καταστῆσαι βασιλέα δύνανται οὔτε ἀφελέσθαι.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: Whether they suffer some harm from anyone or receive some good, they will
    not be able to repay it; they cannot set up a king or remove one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they cannot repay'—the Greek verb can refer to giving back in return
      for either harm or good.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'set up a king or remove [him].'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε ἐὰν ... οὔτε ἐὰν
  chosen: Whether ... or
  alternatives:
  - Neither if ... nor if
  - whether ... whether
  lexicon: LSJ
  rationale: The paired construction introduces two alternative conditions. In English,
    'Whether ... or' is the most natural way to preserve the sense without awkward
    literalism.
- source_word: κακόν τι
  chosen: some harm
  alternatives:
  - something bad
  - some evil
  lexicon: LSJ
  rationale: κακόν here refers to adverse treatment or injury, not moral evil in the
    abstract. 'Some harm' fits the context of idols being unable to respond to what
    happens to them.
- source_word: πάθωσιν
  chosen: they suffer
  alternatives:
  - they experience
  - they undergo
  lexicon: LSJ
  rationale: πάσχω commonly means to suffer or experience. 'Suffer' preserves the
    passive sense of undergoing harm.
- source_word: ὑπό τινος
  chosen: from anyone
  alternatives:
  - by someone
  - from someone
  lexicon: LSJ
  rationale: The phrase marks an unspecified agent. 'From anyone' is idiomatic in
    English and fits both clauses' generality.
- source_word: ἀγαθόν
  chosen: some good
  alternatives:
  - something good
  - a benefit
  lexicon: LSJ
  rationale: ἀγαθόν is the counterpart to κακόν τι. 'Some good' keeps the parallelism
    and avoids over-specifying the kind of benefit.
- source_word: δυνήσονται ἀνταποδοῦναι
  chosen: they will not be able to repay it
  alternatives:
  - they cannot repay
  - they will not be able to return it
  - they cannot requite
  lexicon: LSJ
  rationale: ἀνταποδοῦναι means to give back in return, whether for good or ill. 'Repay
    it' captures the reciprocal sense and works for both harm and good in context.
- source_word: καταστῆσαι βασιλέα
  chosen: set up a king
  alternatives:
  - appoint a king
  - establish a king
  lexicon: LSJ
  rationale: καθίστημι in this infinitive can mean appoint or install. 'Set up a king'
    is clear, natural, and preserves the political sense of establishing royal rule.
- source_word: ἀφελέσθαι
  chosen: remove one
  alternatives:
  - take one away
  - depose one
  lexicon: LSJ
  rationale: The verb means to take away or remove. With βασιλέα understood from the
    previous clause, 'remove one' is concise and idiomatic; 'depose' would be slightly
    more interpretive.
