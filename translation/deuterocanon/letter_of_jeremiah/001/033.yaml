theological_decisions:
- issue: Scope of the idols' impotence
  chosen_reading: The verse states that idols cannot respond either to harm or to
    benefit done to them, and cannot install or remove kings.
  alternative_readings:
  - The repayment language could be narrowed to recompense for evil only
  - The political clause could be rendered more formally as 'appoint a king or take
    him away'
  rationale: The Greek presents a broad polemic against idols' inability to act in
    reciprocal or political spheres. The translation preserves that breadth without
    importing additional theological claims.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
