translation:
  text: In the same way, their wooden gods overlaid with gold and silver are made
    like a scarecrow in a garden, on which every bird sits, and also like a dead body
    thrown out in the dark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a post/watch-figure in a garden.' The Greek term is rare, and the image
      is of an object set up in a garden on which birds freely perch.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν αὐτὸν τρόπον
  chosen: In the same way
  alternatives:
  - Likewise
  - In the same manner
  lexicon: LSJ
  rationale: Idiomatic introductory phrase marking comparison; 'In the same way' is
    natural modern English and preserves the comparative force.
- source_word: βάμψῳ
  chosen: a scarecrow
  alternatives:
  - a post
  - a garden watchman figure
  lexicon: LSJ
  rationale: In context 'the one in a garden, on which every bird sits' refers to
    a bird-scaring figure or post set up in a garden. 'Scarecrow' best conveys the
    image for modern readers, though the Greek term is unusual and may denote a garden
    post/figure more literally.
- source_word: ἐν κήπῳ
  chosen: in a garden
  alternatives:
  - in an orchard
  lexicon: LSJ
  rationale: κήπος commonly means 'garden'; no contextual need to narrow to orchard.
- source_word: ἐφ’ ἧς πᾶν τὸ ὄρνεον ἐπικάθηται
  chosen: on which every bird sits
  alternatives:
  - upon which every bird perches
  lexicon: LSJ
  rationale: Straightforward relative clause; 'sits' is simple and natural, while
    still reflecting the image of birds perching on an inert object.
- source_word: τῷ νεκρῷ ἐρριμμένῳ ἐν σκότει
  chosen: a dead body thrown out in the dark
  alternatives:
  - a corpse cast into darkness
  - the dead one lying discarded in darkness
  lexicon: LSJ
  rationale: νεκρός here is best rendered concretely as 'dead body/corpse.' ἐρριμμένῳ
    conveys being thrown or cast aside. 'In the dark' preserves ἐν σκότει without
    overinterpreting it as metaphysical darkness.
- source_word: ἀφωμοίωνται
  chosen: are made like
  alternatives:
  - have been likened to
  - resemble
  lexicon: LSJ
  rationale: The verb expresses comparison or assimilation. 'Are made like' keeps
    the passive/comparative sense and fits the sentence structure.
- source_word: οἱ θεοὶ αὐτῶν ξύλινοι καὶ περίχρυσοι καὶ περιάργυροι
  chosen: their wooden gods overlaid with gold and silver
  alternatives:
  - their gods of wood, covered with gold and silver
  - their wooden gods plated with gold and silver
  lexicon: LSJ
  rationale: ξύλινοι identifies the idols as wooden in substance; περίχρυσοι and περιάργυροι
    indicate gold and silver covering/overlay. 'Overlaid with gold and silver' is
    clear and idiomatic.
