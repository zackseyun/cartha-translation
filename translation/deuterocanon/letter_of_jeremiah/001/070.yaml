  text: τὸν αὐτὸν τρόπον καὶ τῇ ἐν κήπῳ βάμψῳ, ἐφ’ ἧς πᾶν τὸ ὄρνεον ἐπικάθηται, ὡσαύτως
    δὲ καὶ τῷ νεκρῷ ἐρριμμένῳ ἐν σκότει ἀφωμοίωνται οἱ θεοὶ αὐτῶν ξύλινοι καὶ περίχρυσοι
