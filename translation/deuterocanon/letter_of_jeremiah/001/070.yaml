theological_decisions:
- issue: Nature of the comparison in an anti-idolatry context
  chosen_reading: 'The verse compares idols to lifeless, useless objects: a garden
    scarecrow/post and a discarded corpse.'
  alternative_readings:
  - The garden image could be rendered more literally as a garden post or watch-figure
    rather than 'scarecrow'.
  rationale: The theology of the verse is polemical against idols as powerless and
    inert. The translation preserves that force without adding interpretive expansion
    beyond the imagery present in the Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
