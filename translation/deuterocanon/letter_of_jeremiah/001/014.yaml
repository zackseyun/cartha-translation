theological_decisions:
- issue: Number shift between singular idol description and plural conclusion
  chosen_reading: Retain singular in the first clause ('he holds... he cannot rescue
    himself') and plural in the conclusion ('they are not gods... do not fear them').
  alternative_readings:
  - Smooth to plural throughout to match the conclusion
  rationale: 'The Greek text itself shifts from a representative singular idol to
    the plural class of idols. Preserving the shift reflects the source and the rhetoric:
    one idol is described as an example, then the conclusion applies to all such images.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source meaning without unnecessary smoothing.'
