id: LJE.1.14
reference: Letter of Jeremiah 1:14
source:
  edition: lxx-swete-1909
  text: ἔχει δὲ ἐγχειρίδιον δεξιᾷ καὶ πέλεκυν, ἑαυτὸν δὲ ἐκ πολέμου καὶ λῃστῶν οὐκ
    ἐξελεῖται. ὅθεν γνῶριμοί εἰσιν οὐκ ὄντες θεοί· μὴ οὖν φοβηθῆτε αὐτούς.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: In his right hand he holds a dagger and an axe, but he cannot rescue himself
    from war and robbers. Therefore it is evident that they are not gods; so do not
    fear them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'short sword' for 'dagger.' The Greek ἐγχειρίδιον denotes a hand-weapon.
    reason: lexical_alternative
  - marker: b
    text: Or 'bandits' for 'robbers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγχειρίδιον
  chosen: dagger
  alternatives:
  - short sword
  - knife
  lexicon: LSJ
  rationale: The term denotes a hand-weapon, typically a dagger or short sword. 'Dagger'
    is the most natural modern English equivalent and fits the paired image with 'axe.'
- source_word: δεξιᾷ
  chosen: in his right hand
  alternatives:
  - with his right hand
  - at the right hand
  lexicon: LSJ
  rationale: The dative here is instrumental/locative in sense with ἔχει; English
    idiom is best expressed as 'in his right hand.'
- source_word: πέλεκυν
  chosen: axe
  alternatives:
  - hatchet
  lexicon: LSJ
  rationale: The ordinary sense is 'axe.' 'Hatchet' is possible but narrower and less
    certain.
- source_word: ἐξελεῖται
  chosen: rescue himself
  alternatives:
  - deliver himself
  - save himself
  lexicon: LSJ
  rationale: The middle voice with ἑαυτόν indicates self-deliverance. 'Rescue' is
    clear modern English and suits the danger context of war and robbers.
- source_word: λῃστῶν
  chosen: robbers
  alternatives:
  - bandits
  lexicon: LSJ
  rationale: The word can mean robbers or bandits. 'Robbers' is the broader, more
    standard rendering; 'bandits' remains a viable nuance because the context is violent
    threat.
- source_word: ὅθεν
  chosen: therefore
  alternatives:
  - from this
  - for which reason
  - hence
  lexicon: LSJ
  rationale: The conjunction draws an inference from the idol's inability to protect
    itself. 'Therefore' communicates the logical conclusion clearly.
- source_word: γνῶριμοί εἰσιν
  chosen: it is evident
  alternatives:
  - they are known
  - they are plainly recognized
  lexicon: LSJ
  rationale: Although literally 'they are known/recognizable,' the idiomatic force
    here is that their non-divinity is obvious. 'It is evident' captures the sense
    in natural English without over-paraphrasing.
- source_word: οὐκ ὄντες θεοί
  chosen: they are not gods
  alternatives:
  - not being gods
  lexicon: LSJ
  rationale: The participial construction states their lack of true divinity. Finite
    English 'they are not gods' is the clearest idiomatic rendering.
- source_word: μὴ οὖν φοβηθῆτε αὐτούς
  chosen: so do not fear them
  alternatives:
  - therefore do not be afraid of them
  lexicon: LSJ
  rationale: The prohibition follows the inference. 'So do not fear them' is concise,
    natural, and preserves the exhortational force.
