translation:
  text: The wooden things and the gold-covered and silver-covered things are like
    stones from the mountain, and those who serve them will be put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who worship them.' The Greek verb can denote service or cultic
      worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς ἀπὸ τοῦ ὄρους λίθοις
  chosen: stones from the mountain
  alternatives:
  - mountain stones
  - stones quarried from the mountain
  lexicon: LSJ
  rationale: The phrase is dative plural after ὡμοιωμένοι and expresses the objects
    to which the idols are likened. 'Stones from the mountain' is natural English
    and preserves the image of common, inert rock.
- source_word: ὡμοιωμένοι εἰσὶν
  chosen: are like
  alternatives:
  - have been made like
  - are comparable to
  lexicon: LSJ
  rationale: 'Although formally a perfect passive participle with εἰμί, idiomatic
    English here is a stative comparison: ''are like.'' This preserves the sense without
    awkward literalism.'
- source_word: τὰ ξύλινα
  chosen: the wooden things
  alternatives:
  - the wooden idols
  - the wooden images
  lexicon: LSJ
  rationale: The adjective used substantivally means 'wooden things.' Because 'idols'
    is implied by context but not explicit in this clause, the main text keeps the
    more literal wording and lets the broader passage supply the referent.
- source_word: τὰ περίχρυσα
  chosen: the gold-covered things
  alternatives:
  - the gilded things
  - the gold-plated things
  lexicon: LSJ
  rationale: περίχρυσος denotes something overlaid or covered with gold. 'Gold-covered'
    is clear modern English and avoids sounding overly technical.
- source_word: τὰ περιάργυρα
  chosen: the silver-covered things
  alternatives:
  - the silver-plated things
  - the silver-covered idols
  lexicon: LSJ
  rationale: Parallel to περίχρυσα, this denotes objects overlaid with silver. 'Silver-covered'
    preserves the parallelism and material imagery.
- source_word: οἱ δὲ θεραπεύοντες αὐτά
  chosen: those who serve them
  alternatives:
  - those who worship them
  - those who attend them
  lexicon: LSJ
  rationale: θεραπεύω can mean serve, attend, or in religious contexts worship. 'Serve'
    keeps the lexical breadth and fits idol-service language, while avoiding importing
    a narrower interpretive gloss where the Greek itself can encompass cultic service.
- source_word: κατασχυνθήσονται
  chosen: will be put to shame
  alternatives:
  - will be ashamed
  - will be disgraced
  lexicon: LSJ
  rationale: The future passive naturally yields 'will be put to shame,' preserving
    both the passive form and the prophetic/judicial force better than the simpler
    intransitive 'will be ashamed.'
