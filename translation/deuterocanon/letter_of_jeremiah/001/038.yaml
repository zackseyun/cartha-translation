theological_decisions:
- issue: Rendering of θεραπεύοντες in an idolatry context
  chosen_reading: those who serve them
  alternative_readings:
  - those who worship them
  rationale: The context is clearly cultic, so 'worship' is a viable interpretive
    rendering. However, 'serve' better preserves the Greek term's range and the biblical
    idiom of serving idols, while still conveying religious devotion.
  doctrine_reference: Translation philosophy §1, §5
