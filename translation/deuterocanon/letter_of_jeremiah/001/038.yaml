  text: τοῖς ἀπὸ τοῦ ὄρους λίθοις ὡμοιωμένοι εἰσὶν τὰ ξύλινα καὶ τὰ περίχρυσα καὶ
    τὰ περιάργυρα, οἱ δὲ θεραπεύοντες αὐτὰ κατασχυνθήσονται.
