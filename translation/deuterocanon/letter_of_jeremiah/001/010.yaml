translation:
  text: They even give some of these things to the prostitutes on the roof. And they
    adorn them with clothing like human beings—silver gods and gold gods and wooden
    ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from them'; the pronoun likely refers to items associated
      with the idols in the surrounding context.
    reason: lexical_alternative
  - marker: b
    text: Some interpreters understand 'the prostitutes on the roof' as cult-associated
      prostitutes, but the Greek does not explicitly say 'temple prostitutes.'
    reason: alternative_reading
lexical_decisions:
- source_word: δώσουσιν
  chosen: they give
  alternatives:
  - they will give
  - they hand over
  lexicon: LSJ
  rationale: Future form of δίδωμι. In this context English present is acceptable
    for vivid description, but to stay close to the Greek sense of ongoing customary
    action, 'give' is used in straightforward narrative style.
- source_word: ἀπʼ αὐτῶν
  chosen: some of these things
  alternatives:
  - from them
  - from these offerings
  - from their possessions
  lexicon: LSJ
  rationale: The pronoun most naturally refers back to the ornaments or offerings
    associated with the idols in the surrounding context. A bare 'from them' would
    be unclear in English, so the object is made explicit without over-specifying
    beyond context.
- source_word: ταῖς ἐπὶ τοῦ στέγους πόρναις
  chosen: the prostitutes on the roof
  alternatives:
  - the prostitutes on the housetop
  - the temple prostitutes on the roof
  lexicon: LSJ
  rationale: πόρναι means 'prostitutes.' The phrase ἐπὶ τοῦ στέγους is rendered literally
    as 'on the roof.' 'Temple prostitutes' would import a cultic specification not
    stated explicitly in the Greek.
- source_word: κοσμοῦσί
  chosen: they adorn
  alternatives:
  - they decorate
  - they dress up
  lexicon: LSJ
  rationale: κοσμέω here refers to ornamenting or arranging with adornment. 'Adorn'
    preserves the formal tone and fits the context of clothing idols.
- source_word: ὡς ἀνθρώπους
  chosen: like human beings
  alternatives:
  - like men
  - as people
  lexicon: LSJ
  rationale: ἀνθρώπους is generic for humans, not specifically males. 'Human beings'
    is gender-accurate and natural English.
- source_word: τοῖς ἐνδύμασιν
  chosen: with clothing
  alternatives:
  - with garments
  - with clothes
  lexicon: LSJ
  rationale: Instrumental dative indicating the means of adornment. 'Clothing' is
    clear modern English and suitably neutral.
- source_word: θεοὺς ἀργυροῦς καὶ θεοὺς χρυσοῦς καὶ ξυλίνους
  chosen: silver gods and gold gods and wooden ones
  alternatives:
  - gods of silver and gods of gold and of wood
  - silver and gold and wooden gods
  lexicon: LSJ
  rationale: The Greek repeats θεούς with the first two adjectives but leaves it implied
    with ξυλίνους. The translation preserves the repetitive, slightly mocking catalog
    style while keeping readable English. 'Wooden ones' reflects the ellipsis without
    awkward over-repetition.
