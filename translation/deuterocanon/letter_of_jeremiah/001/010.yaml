theological_decisions:
- issue: Whether πόρναι should be rendered with a cultic nuance
  chosen_reading: prostitutes
  alternative_readings:
  - cult prostitutes
  - temple prostitutes
  rationale: The Greek text says πόρναι and locates them on the roof, but does not
    explicitly identify them as cult personnel. To avoid importing a stronger religious
    claim than the text states, the main text uses 'prostitutes' only.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never import doctrinal claims the text does not make.'
