id: LJE.1.10
reference: Letter of Jeremiah 1:10
source:
  edition: lxx-swete-1909
  text: δώσουσιν δὲ ἀπʼ αὐτῶν καὶ ταῖς ἐπὶ τοῦ στέγους πόρναις. κοσμοῦσί τε αὐτοὺς
    ὡς ἀνθρώπους τοῖς ἐνδύμασιν, θεοὺς ἀργυροῦς καὶ θεοὺς χρυσοῦς καὶ ξυλίνους.
  language: Greek
