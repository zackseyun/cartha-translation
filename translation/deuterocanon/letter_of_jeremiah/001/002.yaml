  confidence: high
  validation: agree
translation:
  text: So when you enter Babylon, you will be there for many years, for a long time,
    until seven generations; but after this I will bring you out from there in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for seven generations.' The Greek phrase literally reads 'until seven
      generations,' which may denote the span of exile in a rounded or stylized way.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθόντες
  chosen: when you enter
  alternatives:
  - having entered
  - after you enter
  lexicon: BDAG
  rationale: Aorist participle with future main verb can be rendered temporally in
    natural English. 'When you enter' preserves the forward-looking sense better than
    the more wooden 'having entered.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks inference/continuation from the previous statement. 'So' is readable
    modern English and preserves the connective force without sounding overly formal.
- source_word: εἰς Βαβυλῶνα
  chosen: Babylon
  alternatives:
  - into Babylon
  lexicon: BDAG
  rationale: With 'enter,' English idiom normally omits 'into.' The place name is
    transliterated as a proper name.
- source_word: ἔσεσθε ἐκεῖ
  chosen: you will be there
  alternatives:
  - you will be there in that place
  lexicon: BDAG
  rationale: Straightforward future of being with adverb of place; concise English
    best reflects the Greek.
- source_word: ἔτη πλείω
  chosen: for many years
  alternatives:
  - many years
  - more years
  lexicon: BDAG
  rationale: πλείω can mean 'many/more' depending on context. Here the sense is an
    extended duration, not a comparison explicitly stated in the verse, so 'many years'
    is the clearest idiomatic rendering.
- source_word: καὶ χρόνον μακρόν
  chosen: for a long time
  alternatives:
  - and a long time
  - and for a long period
  lexicon: BDAG
  rationale: The phrase intensifies the duration already expressed. Rendering with
    a second temporal phrase preserves the rhetorical emphasis rather than collapsing
    it into a single expression.
- source_word: ἕως γενεῶν ἑπτά
  chosen: until seven generations
  alternatives:
  - for seven generations
  - until the seventh generation
  lexicon: BDAG
  rationale: ἕως naturally means 'until.' The plural γενεῶν with numeral is best represented
    as 'seven generations,' preserving the Greek wording without forcing an interpretive
    singular 'the seventh generation.'
- source_word: μετὰ τοῦτο δὲ
  chosen: but after this
  alternatives:
  - and after this
  - then after that
  lexicon: BDAG
  rationale: δὲ marks a mild contrast/transition. 'But after this' preserves the turn
    from exile to restoration.
- source_word: ἐξάξω
  chosen: I will bring you out
  alternatives:
  - I will lead you out
  - I will take you out
  lexicon: BDAG
  rationale: The verb means to lead or bring out. 'Bring you out' is natural English
    and retains the exodus-like movement from one place to another.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - out of there
  - from that place
  lexicon: BDAG
  rationale: Simple adverb of separation; 'from there' is idiomatic and sufficient.
- source_word: μετʼ εἰρήνης
  chosen: in peace
  alternatives:
  - with peace
  - peacefully
  lexicon: BDAG
  rationale: The prepositional phrase is best rendered idiomatically as 'in peace,'
    preserving the state or manner of the return without overinterpreting it.
