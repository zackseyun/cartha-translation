theological_decisions:
- issue: Whether the final promise should be rendered with strong restoration language
    beyond the Greek wording
  chosen_reading: I will bring you out from there in peace
  alternative_readings:
  - I will rescue you from there in peace
  - I will lead you back from there in peace
  rationale: The Greek ἐξάξω states removal from Babylon but does not explicitly include
    'back' or a stronger salvific term like 'rescue.' The translation preserves the
    promise without importing additional theological nuance not stated in the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
