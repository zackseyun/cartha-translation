id: LJE.1.2
reference: Letter of Jeremiah 1:2
source:
  edition: lxx-swete-1909
  text: εἰσελθόντες οὖν εἰς Βαβυλῶνα ἔσεσθε ἐκεῖ ἔτη πλείω καὶ χρόνον μακρὸν ἕως γενεῶν
    ἑπτά· μετὰ τοῦτο δὲ ἐξάξω ὑμᾶς ἐκεῖθεν μετʼ εἰρήνης.
  language: Greek
  pages:
