translation:
  text: But they will certainly not withstand kings or enemies.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Βασιλεῖ
  chosen: a king
  alternatives:
  - the king
  - a ruler
  lexicon: LSJ
  rationale: Dative singular of βασιλεύς after ἀνθίστημι/ἀντιστῆναι commonly marks
    the party opposed. Anarthrous in Greek, so English indefinite 'a king' best preserves
    the generic sense in this denunciation of idols' helplessness.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: LSJ
  rationale: Marks mild contrast with the surrounding claims about idols' incapacity.
    'But' communicates the adversative force naturally in English.
- source_word: καὶ πολεμίοις
  chosen: or enemies
  alternatives:
  - and enemies
  - or hostile foes
  lexicon: LSJ
  rationale: With repeated datives after the negative future, the phrase lists additional
    opponents before whom the idols cannot stand. English idiom is smoother with 'or
    enemies' in a distributive sense ('a king or enemies'), though the Greek conjunction
    is καί. This avoids implying they could resist one but not the other only jointly.
- source_word: οὐ μὴ
  chosen: will certainly not
  alternatives:
  - will by no means
  - will never
  lexicon: BDAG
  rationale: οὐ μή is an emphatic negation. 'Will certainly not' preserves the force
    in clear modern English without sounding archaic.
- source_word: ἀντιστῶσιν
  chosen: withstand
  alternatives:
  - resist
  - stand against
  lexicon: BDAG
  rationale: From ἀνθίστημι, here meaning to oppose or stand against. 'Withstand'
    is concise and idiomatic with personal objects in English, fitting the context
    of military/political inability.
