theological_decisions:
- issue: Referent of αὐτά / αὐτῶν
  chosen_reading: the pronouns refer to the idols/images described in the surrounding
    context
  alternative_readings:
  - a more generic 'them' without explicit identification in the main text
  rationale: The Greek leaves the antecedent pronominal, and English can preserve
    that with 'them.' Context in the Letter of Jeremiah makes clear that the objects
    are idols, so the translation keeps the pronoun in the text while documenting
    the referent here rather than importing 'idols' directly into the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
