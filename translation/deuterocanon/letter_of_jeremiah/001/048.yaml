id: LJE.1.48
reference: Letter of Jeremiah 1:48
source:
  edition: lxx-swete-1909
  text: ὅταν γὰρ ἐπέλθῃ ἐπʼ αὐτὰ πόλεμος καὶ κακά, βουλεύονται πρὸς ἑαυτοὺς οἱ ἱερεῖς
    ποῦ συγκαρυβῶσι μετʼ αὐτῶν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: For when war and disasters come upon them, the priests consult among themselves
    where they may hide themselves with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the idols or images mentioned throughout the surrounding passage.
    reason: cross_reference
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a general future contingency. 'When' is natural English and
    fits the repeated-scenario sense without overcomplicating the line.
- source_word: ἐπέλθῃ
  chosen: come upon
  alternatives:
  - come
  - fall upon
  lexicon: BDAG
  rationale: The compound verb with ἐπί conveys arrival against/upon the idols. 'Come
    upon' preserves the directional force better than a bare 'come'.
- source_word: πόλεμος
  chosen: war
  alternatives:
  - battle
  lexicon: BDAG
  rationale: Standard rendering; the broader calamity context favors 'war' over the
    more localized 'battle'.
- source_word: κακά
  chosen: disasters
  alternatives:
  - evils
  - calamities
  - troubles
  lexicon: BDAG
  rationale: In context this refers to harmful events that accompany invasion or crisis,
    not moral evil. 'Disasters' is clear modern English and preserves the concrete
    sense.
- source_word: βουλεύονται
  chosen: consult among themselves
  alternatives:
  - take counsel among themselves
  - deliberate
  lexicon: BDAG
  rationale: The middle voice and following πρὸς ἑαυτούς indicate internal consultation.
    'Consult among themselves' is idiomatic and sufficiently formal.
- source_word: πρὸς ἑαυτούς
  chosen: among themselves
  alternatives:
  - with one another
  - to themselves
  lexicon: BDAG
  rationale: Here the phrase marks mutual discussion rather than private inward thought.
    'Among themselves' best captures the collective priestly deliberation.
- source_word: ποῦ
  chosen: where
  alternatives:
  - in what place
  lexicon: BDAG
  rationale: Simple interrogative of place introducing the content of their consultation.
- source_word: συγκαρυβῶσι
  chosen: hide themselves with them
  alternatives:
  - conceal themselves with them
  - take cover with them
  lexicon: LSJ
  rationale: The rare verb denotes hiding/concealing; the σύν prefix supports the
    idea of hiding together with the idols. 'Hide themselves with them' preserves
    both the reflexive and associative force.
- source_word: μετʼ αὐτῶν
  chosen: with them
  alternatives:
  - along with them
  lexicon: BDAG
  rationale: Refers back to the idols/images. The irony is that the priests seek to
    hide together with the gods they serve; this should remain explicit.
