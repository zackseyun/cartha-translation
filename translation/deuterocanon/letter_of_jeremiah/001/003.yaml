id: LJE.1.3
reference: Letter of Jeremiah 1:3
source:
  edition: lxx-swete-1909
  text: νυνὶ δὲ ὄψεσθε ἐν Βαβυλῶνι θεοὺς ἀργυροῦς καὶ χρυσοῦς καὶ ξυλίνους ἐπʼ ὤμων
    αἰρομένους, δεικνύντας φόβον τοῖς ἔθνεσιν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: But now in Babylon you will see gods of silver and gold and wood, being carried
    on shoulders, causing fear among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'causing fear to the nations' / 'inspiring fear among the nations.' The
      Greek literally says 'showing fear to the nations,' which may describe either
      the display itself or its effect on observers.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  chosen: But now
  alternatives:
  - Now
  - And now
  lexicon: LSJ
  rationale: Marks a transition and present/future immediacy; 'But now' preserves
    the adversative δέ and the temporal νυνί.
- source_word: ὄψεσθε
  chosen: you will see
  alternatives:
  - you shall see
  - you are about to see
  lexicon: LSJ
  rationale: Future middle of ὁράω; straightforward predictive sense fits the warning
    context.
- source_word: ἐν Βαβυλῶνι
  chosen: in Babylon
  alternatives:
  - at Babylon
  lexicon: LSJ
  rationale: Locative sense is plain and idiomatic in English.
- source_word: θεοὺς
  chosen: gods
  alternatives:
  - idols
  lexicon: LSJ
  rationale: The Greek says 'gods,' reflecting how the objects are regarded by the
    nations; 'idols' would import the polemical conclusion rather than translate the
    noun directly.
- source_word: ἀργυροῦς καὶ χρυσοῦς καὶ ξυλίνους
  chosen: of silver and gold and wood
  alternatives:
  - silver and gold and wooden
  - made of silver and gold and wood
  lexicon: LSJ
  rationale: These adjectives describe material composition. 'Of silver and gold and
    wood' is natural English and keeps the triad explicit.
- source_word: ἐπʼ ὤμων αἰρομένους
  chosen: being carried on shoulders
  alternatives:
  - borne on shoulders
  - lifted on shoulders
  lexicon: LSJ
  rationale: Passive/middle participial idea of being borne by others; plural 'shoulders'
    is idiomatic and preserves the image of transport.
- source_word: δεικνύντας φόβον
  chosen: showing fear
  alternatives:
  - displaying terror
  - causing fear
  - inspiring fear
  lexicon: LSJ
  rationale: Literally 'showing fear.' The phrase is somewhat compressed in Greek;
    the main text keeps the formal sense, while an alternative that captures the likely
    effect is preserved in a footnote.
- source_word: τοῖς ἔθνεσιν
  chosen: to the nations
  alternatives:
  - to the Gentiles
  - among the nations
  lexicon: LSJ
  rationale: Dative plural of ἔθνη is best rendered 'the nations' in this deuterocanonical/Jewish
    context; 'Gentiles' is possible but less natural here.
