theological_decisions:
- issue: Whether θεοὺς should be rendered as 'gods' or interpretively as 'idols'
  chosen_reading: gods
  alternative_readings:
  - idols
  rationale: The source text uses θεοὺς, and the verse's irony is stronger if the
    translation preserves the claim being critiqued rather than replacing it with
    the translator's evaluation.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
- issue: How to represent δεικνύντας φόβον
  chosen_reading: showing fear
  alternative_readings:
  - causing fear
  - inspiring fear
  rationale: The Greek expression is literally 'showing fear,' but in context it may
    denote the impression these carried cult-images make on the nations. To preserve
    theological and semantic tension, the more literal rendering is kept in the main
    text and the contextual alternative is footnoted.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
