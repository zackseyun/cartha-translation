theological_decisions:
- issue: Meaning of πνεῦμα in a potentially theologically loaded term
  chosen_reading: wind
  alternative_readings:
  - spirit
  - breath
  rationale: Although πνεῦμα can mean 'spirit,' the verse lists observable natural
    phenomena to show their evident activity, contrasting them with idols. The collocation
    with πνεῖ ('blows') and the phrase 'in every land' strongly favors the meteorological
    sense 'wind.' This preserves the text's argument without importing pneumatological
    overtones.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
