  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: Therefore you will know that they are not gods; therefore do not fear them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''they are not gods''; the pronouns refer to the idol-images under
      discussion, and by extension to the supposed gods they represent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - from which
  - wherefore
  - thus
  lexicon: LSJ
  rationale: Introduces an inference from the preceding exposure of idols' impotence.
    'Therefore' gives clear modern English while preserving the logical connection.
- source_word: γινώσεσθε
  chosen: you will know
  alternatives:
  - you shall know
  - you will recognize
  lexicon: BDAG
  rationale: Future middle indicative of γινώσκω. 'You will know' is the most natural
    and direct rendering in context, expressing the result the audience should reach.
- source_word: θεοί
  chosen: gods
  alternatives:
  - divine beings
  - deities
  lexicon: LSJ
  rationale: The plural refers to the supposed pagan gods represented by idols. 'Gods'
    is the plain, idiomatic English equivalent and preserves the polemical force.
- source_word: μὴ οὖν φοβεῖσθε
  chosen: so do not fear
  alternatives:
  - therefore do not fear
  - do not be afraid of
  lexicon: BDAG
  rationale: The prohibition follows logically from the previous clause. 'So do not
    fear' keeps οὖν's inferential force in readable English.
- source_word: αὐτά
  chosen: them
  alternatives:
  - those things
  - those idols
  lexicon: BDAG
  rationale: Although neuter in Greek, it refers to idol-images treated as objects
    of fear. English idiom prefers 'them' here; 'those things' would sound stilted,
    while 'those idols' would add a noun not explicit in the Greek.
