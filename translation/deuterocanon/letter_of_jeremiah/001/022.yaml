id: LJE.1.22
reference: Letter of Jeremiah 1:22
source:
  edition: lxx-swete-1909
  text: ὅθεν γινώσεσθε ὅτι οὐκ εἰσὶν θεοί· μὴ οὖν φοβεῖσθε αὐτά.
  language: Greek
  pages:
  - 402
