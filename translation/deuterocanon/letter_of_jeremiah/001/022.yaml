theological_decisions:
- issue: Reference of 'they'/'them' in the denial of deity and command not to fear
  chosen_reading: The pronouns refer to the idol-images as supposed gods, denied true
    divinity.
  alternative_readings:
  - The pronouns refer more broadly to the pagan gods represented by the images.
  rationale: The immediate context throughout the Letter of Jeremiah attacks manufactured
    cult-images and denies that they are genuine gods. The English keeps the pronouns
    without over-specifying beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
