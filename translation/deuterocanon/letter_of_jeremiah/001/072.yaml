id: LJE.1.72
reference: Letter of Jeremiah 1:72
source:
  edition: lxx-swete-1909
  text: κρείσσον οὖν ἄνθρωπος δίκαιος οὐκ ἔχων εἴδωλα· ἔσται γὰρ μακρὰν ἀπὸ ὀνειδισμοῦ.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: So a righteous man who has no idols is better, for he will be far from reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a righteous person.' The Greek has the masculine singular 'man,' used
      here in a representative sense.
    reason: lexical_alternative
  - marker: b
    text: '''Reproach'' may also be rendered ''disgrace'' or ''shame.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: κρείσσον
  chosen: better
  alternatives:
  - superior
  - more excellent
  lexicon: LSJ
  rationale: Comparative adjective used predicatively; 'better' is the most natural
    modern English rendering and preserves the evaluative comparison without sounding
    inflated.
- source_word: οὖν
  chosen: so
  alternatives:
  - therefore
  - then
  lexicon: LSJ
  rationale: Marks an inference from the preceding argument. 'So' gives readable modern
    English while retaining the logical conclusion.
- source_word: ἄνθρωπος δίκαιος
  chosen: a righteous man
  alternatives:
  - a just man
  - a righteous person
  lexicon: LSJ
  rationale: The Greek is singular masculine. Per doctrine, gender-accurate rendering
    is preferred where the source is masculine with representative force. 'Righteous'
    fits δίκαιος well in biblical style better than 'just' here.
- source_word: οὐκ ἔχων εἴδωλα
  chosen: who has no idols
  alternatives:
  - not having idols
  - without idols
  lexicon: LSJ
  rationale: The participial phrase modifies 'man.' 'Who has no idols' is idiomatic
    English and clearly expresses possession/association denied by the Greek.
- source_word: ἔσται
  chosen: he will be
  alternatives:
  - he shall be
  lexicon: LSJ
  rationale: Future of εἰμί. 'Will be' is standard modern English; 'shall' would sound
    archaic.
- source_word: μακρὰν ἀπὸ ὀνειδισμοῦ
  chosen: far from reproach
  alternatives:
  - far from disgrace
  - far from insult
  - far from shame
  lexicon: LSJ
  rationale: ὀνειδισμός can denote reproach, disgrace, or insult. In this context
    of moral contrast with idolatry, 'reproach' best captures public shame/disgrace
    without over-specifying verbal abuse.
