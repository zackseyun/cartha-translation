id: LJE.1.67
reference: Letter of Jeremiah 1:67
source:
  edition: lxx-swete-1909
  text: τὰ θηρία ἐστὶν κρείττω αὐτῶν, ἃ δύνανται ἐκφυγόντα εἰς σκέπην αὐτὰ ὠφελῆσαι.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: Wild animals are better than they are, because they can escape into shelter
    and help themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beasts are superior to them, because they can flee to shelter and benefit
      themselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ θηρία
  chosen: Wild animals
  alternatives:
  - beasts
  - animals
  lexicon: LSJ
  rationale: θηρία commonly denotes wild animals or beasts. 'Wild animals' is clear
    modern English and preserves the contrast with idols.
- source_word: κρείττω
  chosen: are better than
  alternatives:
  - are stronger than
  - are superior to
  lexicon: LSJ
  rationale: The comparative indicates superiority. In context the point is practical
    superiority, not moral excellence; 'are better than' is natural and sufficiently
    broad.
- source_word: αὐτῶν
  chosen: they are
  alternatives:
  - them
  lexicon: Greek grammar
  rationale: The pronoun refers back to the idols described in the surrounding context.
    English idiom after 'better than' prefers an explicit clause, 'than they are,'
    to avoid ambiguity.
- source_word: ἃ δύνανται
  chosen: because they can
  alternatives:
  - which are able to
  - for they can
  lexicon: LSJ
  rationale: This relative clause gives the reason for the comparison. 'Because they
    can' brings out the explanatory force in idiomatic English.
- source_word: ἐκφυγόντα
  chosen: escape
  alternatives:
  - having escaped
  - flee away
  lexicon: LSJ
  rationale: From ἐκφεύγω, 'to escape.' Although the participial form is compressed
    in the transmitted Greek, the sense is that the animals are able to get away.
    Smooth English is preferable here.
- source_word: εἰς σκέπην
  chosen: into shelter
  alternatives:
  - to shelter
  - under cover
  lexicon: LSJ
  rationale: σκέπη denotes covering or shelter. 'Into shelter' preserves the motion
    implied by εἰς.
- source_word: αὐτὰ ὠφελῆσαι
  chosen: help themselves
  alternatives:
  - benefit themselves
  - save themselves
  lexicon: LSJ
  rationale: 'The reflexive sense fits the context: unlike idols, animals can act
    for their own preservation. ''Help themselves'' is idiomatic and captures practical
    self-preservation.'
