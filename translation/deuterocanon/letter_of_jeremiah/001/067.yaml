theological_decisions:
- issue: Referent of αὐτῶν in comparison
  chosen_reading: The comparison is with the idols discussed in context, rendered
    as 'they are' rather than a bare 'them.'
  alternative_readings:
  - A more literal but less clear 'better than them'
  rationale: The verse continues the satire of idols. Clarifying the pronoun in English
    preserves the intended referent without adding new content.
