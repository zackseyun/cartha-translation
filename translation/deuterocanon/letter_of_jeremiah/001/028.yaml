id: LJE.1.28
reference: Letter of Jeremiah 1:28
source:
  edition: lxx-swete-1909
  text: τῶν θυσιῶν αὐτῶν ἀποκαθημένη καὶ λεχὼς ἅπτονται. γνόντες οὖν ἀπὸ τούτων ὅτι
    οὐκ εἰσὶν θεοί, μὴ φοβηθῆτε αὐτούς.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: They touch their sacrifices while sitting apart and lying with women. Therefore,
    knowing from these things that they are not gods, do not fear them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'while women in seclusion and women in bed touch their sacrifices.'
      The Greek is compressed and may refer more explicitly to ritual impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκαθημένη
  chosen: sitting apart
  alternatives:
  - sitting down
  - sitting apart because of ritual impurity
  - being secluded
  lexicon: LSJ
  rationale: The participle likely refers to women in a state of ritual separation,
    especially in context with sexual activity and impurity. 'Sitting apart' preserves
    the literal image while allowing the impurity implication to remain visible without
    over-paraphrase.
- source_word: λεχὼς
  chosen: lying with women
  alternatives:
  - women in childbed
  - women lying down
  - women in bed
  lexicon: LSJ
  rationale: In this context, paired with ἅπτονται and following ἀποκαθημένη, the
    sense is women in a condition of impurity, likely those lying with men or in bed.
    Rendering as 'lying with women' captures the probable referent in intelligible
    English while avoiding an overly technical gloss.
- source_word: ἅπτονται
  chosen: touch
  alternatives:
  - handle
  - take hold of
  lexicon: BDAG
  rationale: The verb commonly means 'touch' or 'take hold of.' 'Touch' is the most
    straightforward rendering here and fits the polemical point that the idols are
    defiled by contact.
- source_word: γνόντες
  chosen: knowing
  alternatives:
  - understanding
  - recognizing
  lexicon: BDAG
  rationale: The participle introduces the inference the audience should draw from
    the preceding evidence. 'Knowing' is direct and natural.
- source_word: θεοί
  chosen: gods
  alternatives:
  - divine beings
  - deities
  lexicon: BDAG
  rationale: '''Gods'' is the plain sense and best matches the anti-idolatry argument.'
- source_word: μὴ φοβηθῆτε
  chosen: do not fear
  alternatives:
  - do not be afraid of
  - do not revere
  lexicon: BDAG
  rationale: The imperative concerns fear toward idols. 'Do not fear' is concise and
    preserves the force of the command.
