theological_decisions:
- issue: Impurity language around women and idol defilement
  chosen_reading: The verse refers to idols being touched by women in states viewed
    as ritually impure, supporting the argument that they are not true gods.
  alternative_readings:
  - The verse may more generally describe women sitting and lying around the shrines
    without a specific ritual-impurity nuance.
  rationale: The unusual pairing of ἀποκαθημένη and λεχὼς strongly suggests conditions
    of separation/bed-related impurity in the ancient context. The translation keeps
    this visible but does not over-specify beyond what the Greek warrants.
  doctrine_reference: Preserve theological tension rather than resolve it.
