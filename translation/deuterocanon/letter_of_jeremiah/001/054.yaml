theological_decisions:
- issue: Elliptical comparison at the start of the verse
  chosen_reading: 'Retain the simile with minimal smoothing: ''For just as a crow
    is between heaven and earth, so also ...'''
  alternative_readings:
  - Treat the opening as a fragment and omit the comparative force
  - Expand interpretively to explain the point of the crow image
  rationale: The Greek as transmitted is abrupt, but the comparison should be preserved
    rather than paraphrastically explained. This keeps the rhetoric of mockery against
    idols without importing an interpretation not explicit in the wording.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Whether to render οἰκίαν θεῶν as 'house' or 'temple'
  chosen_reading: Use 'house of ... gods' in the main text
  alternative_readings:
  - temple of ... gods
  rationale: The text says 'house,' and the anti-idol polemic does not require the
    more interpretive 'temple.' A footnote preserves the natural contextual alternative.
  doctrine_reference: Translation philosophy §§1, 5, 6
