id: LJE.1.54
reference: Letter of Jeremiah 1:54
source:
  edition: lxx-swete-1909
  text: ὥσπερ γὰρ κορώνη ἀνὰ μέσον τοῦ οὐρανοῦ καὶ τῆς γῆς. καὶ γὰρ ὅταν ἐμπέσῃ εἰς
    οἰκίαν θεῶν ξύλινων ἢ περιχρύσων ἢ περιηργύρων πῦρ, οἱ μὲν ἱερεῖς αὐτῶν φεύξονται
    καὶ διασωθήσονται, αὐτοὶ δὲ ὥσπερ δοκοὶ μέσοι κατακαυθήσονται.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: For just as a crow is between heaven and earth, so also when fire falls into
    a house of wooden or gold-covered or silver-covered gods, their priests will flee
    and be saved, but they themselves will be burned up like beams in the middle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a temple of wooden or gold-covered or silver-covered gods.'
    reason: lexical_alternative
  - marker: b
    text: The opening comparison is terse in Greek; the sense is that the idols are
      as helpless as an exposed crow when disaster comes.
    reason: cultural_note
lexical_decisions:
- source_word: ὥσπερ
  chosen: just as ... so also
  alternatives:
  - like
  - as
  lexicon: LSJ
  rationale: Introduces a comparison; because the Greek sentence is elliptical, English
    supplies a balanced comparative structure to make the analogy readable without
    adding new content.
- source_word: κορώνη
  chosen: crow
  alternatives:
  - crow
  - crow-like bird
  lexicon: LSJ
  rationale: The ordinary sense is 'crow'; this keeps the concrete image. No need
    to generalize to 'bird,' since the Greek is specific.
- source_word: ἀνὰ μέσον τοῦ οὐρανοῦ καὶ τῆς γῆς
  chosen: between heaven and earth
  alternatives:
  - in the midst of heaven and earth
  - midway between the sky and the earth
  lexicon: LSJ
  rationale: Idiomatic English for the spatial expression while preserving the image.
- source_word: ἐμπέσῃ
  chosen: falls into
  alternatives:
  - falls upon
  - breaks out in
  lexicon: LSJ
  rationale: The verb means 'fall into/upon.' With πῦρ as subject, 'fire falls into'
    is literal though somewhat unusual; it preserves the sudden-incursion sense better
    than the interpretive 'breaks out.'
- source_word: οἰκίαν θεῶν
  chosen: a house of ... gods
  alternatives:
  - the house of ... gods
  - a temple of ... gods
  lexicon: LSJ
  rationale: οἰκία is literally 'house.' In context it refers to an idol shrine/temple,
    but 'house' stays closer to the Greek while remaining intelligible.
- source_word: ξύλινων
  chosen: wooden
  alternatives:
  - made of wood
  lexicon: LSJ
  rationale: Straightforward adjectival rendering.
- source_word: περιχρύσων
  chosen: gold-covered
  alternatives:
  - overlaid with gold
  - gilded
  lexicon: LSJ
  rationale: The compound indicates being covered around with gold. 'Gold-covered'
    is clear modern English and avoids overly technical phrasing.
- source_word: περιηργύρων
  chosen: silver-covered
  alternatives:
  - overlaid with silver
  - silver-plated
  lexicon: LSJ
  rationale: Parallel to περιχρύσων; 'silver-covered' preserves the form and sense.
- source_word: φεύξονται καὶ διασωθήσονται
  chosen: will flee and be saved
  alternatives:
  - will escape and be safe
  - will flee and escape
  lexicon: LSJ
  rationale: 'Keeps both verbs distinct: first the act of fleeing, then the result
    of being preserved.'
- source_word: δοκοὶ μέσοι
  chosen: central beams
  alternatives:
  - middle beams
  - main beams
  lexicon: LSJ
  rationale: δοκοί are beams; μέσοι likely means those in the middle/interior of the
    structure. 'Central beams' is natural English and preserves the architectural
    comparison.
- source_word: κατακαυθήσονται
  chosen: will be burned up
  alternatives:
  - will be completely burned
  - will be consumed by fire
  lexicon: LSJ
  rationale: The compound intensifies the burning; 'burned up' captures the sense
    of complete consumption.
