theological_decisions:
- issue: Whether to render θεοί as 'gods' or 'idols' in an anti-idolatry polemic
  chosen_reading: gods
  alternative_readings:
  - idols
  rationale: 'The Greek explicitly says ''gods'' and uses the term rhetorically to
    deny their legitimacy. Rendering it as ''gods'' preserves the irony and argumentative
    structure: how can they be called gods, when they are merely material objects
    receiving ritual attention?'
  doctrine_reference: Translation philosophy §1, §5
- issue: How explicit to make the cultic action of παρατιθέασιν
  chosen_reading: set out offerings for
  alternative_readings:
  - set before
  - present to
  rationale: The bare verb 'set before' is formally possible, but English readers
    may miss the ritual sense. Adding 'offerings' reflects the likely cultic object
    implied by the context while staying close to the source action.
  doctrine_reference: Translation philosophy §6
