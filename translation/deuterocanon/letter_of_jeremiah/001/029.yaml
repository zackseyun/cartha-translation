  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: For how could they be called gods, since women set out offerings for silver
    and gold and wooden gods?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'From where could they be called gods?'
    reason: lexical_alternative
  - marker: b
    text: The Greek verb can also be rendered 'set before' or 'present to.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πόθεν
  chosen: how
  alternatives:
  - from where
  - whence
  lexicon: LSJ
  rationale: 'In the idiom Πόθεν ... κληθείησαν, the sense is rhetorical impossibility
    or basis: ''how could they be called...?'' This is more natural in modern English
    than the overly literal ''from where.'''
- source_word: κληθείησαν
  chosen: could they be called
  alternatives:
  - might they be called
  - should they be called
  lexicon: LSJ
  rationale: Aorist passive optative of καλέω in a rhetorical question conveys potentiality/impossibility.
    'Could they be called' captures the force well in English.
- source_word: θεοί
  chosen: gods
  alternatives:
  - divine beings
  lexicon: LSJ
  rationale: The context is polemic against idols, so the ordinary term 'gods' is
    the clearest and most direct rendering.
- source_word: ὅτι
  chosen: since
  alternatives:
  - because
  - for
  lexicon: LSJ
  rationale: Introduces the reason supporting the rhetorical question. 'Since' reads
    smoothly while preserving causal force.
- source_word: γυναῖκες
  chosen: women
  lexicon: LSJ
  rationale: Straightforward lexical rendering. The text specifically mentions women,
    so gender-specific language should be preserved.
- source_word: παρατιθέασιν
  chosen: set out offerings for
  alternatives:
  - present to
  - place before
  - serve
  lexicon: LSJ
  rationale: The verb can mean 'set before' or 'present.' In this cultic context,
    the sense is that women place offerings before/for the idols. 'Set out offerings
    for' makes the implied ritual action explicit enough for English without over-paraphrasing.
- source_word: θεοῖς ἀργυροῖς καὶ χρυσοῖς καὶ ξυλίνοις
  chosen: silver and gold and wooden gods
  alternatives:
  - gods of silver and gold and wood
  - silver, gold, and wooden idols
  lexicon: LSJ
  rationale: The Greek keeps calling them 'gods' ironically/polemically while qualifying
    their material composition. Retaining 'gods' preserves the rhetoric better than
    replacing it with 'idols,' though 'idols' is contextually implied.
