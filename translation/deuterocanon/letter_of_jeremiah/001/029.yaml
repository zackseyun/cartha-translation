id: LJE.1.29
reference: Letter of Jeremiah 1:29
source:
  edition: lxx-swete-1909
  text: Πόθεν γὰρ κληθείησαν θεοί; ὅτι γυναῖκες παρατιθέασιν θεοῖς ἀργυροῖς καὶ χρυσοῖς
    καὶ ξυλίνοις.
  language: Greek
