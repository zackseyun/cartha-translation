theological_decisions:
- issue: Referent of θεοί in an anti-idolatry polemic
  chosen_reading: Render θεοί as 'gods' while making clear by context that these are
    false gods/idols.
  alternative_readings:
  - Render as 'divine beings'
  - Render as 'idols' directly
  rationale: The Greek says 'they are not gods,' preserving the polemical claim in
    the text itself. Translating θεοί as 'gods' keeps the lexical form while the surrounding
    context denies their divinity.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s own theological tension without paraphrastic expansion.'
