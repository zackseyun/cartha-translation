id: LJE.1.49
reference: Letter of Jeremiah 1:49
source:
  edition: lxx-swete-1909
  text: πῶς οὖν οὐκ ἔστιν αἰσθέσθαι ὅτι οὐκ εἰσὶν θεοί, οἳ οὔτε σώζουσιν ἑαυτοὺς ἐκ
    πολέμου οὔτε ἐκ κακῶν;
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: How then can one fail to perceive that they are not gods, since they neither
    save themselves from war nor from calamities?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'How then is it not possible to perceive that they are
      not gods...?' The Greek uses a rhetorical negation to stress how obvious the
      conclusion is.
    reason: lexical_alternative
  - marker: b
    text: '''Calamities'' translates Greek κακῶν here in the sense of harmful events
      or disasters; alternatively, ''evils'' or ''troubles.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς οὖν
  chosen: How then
  alternatives:
  - How, then
  - How therefore
  lexicon: LSJ
  rationale: Introduces an emphatic rhetorical question drawing an inference from
    the preceding argument. 'How then' is natural English and preserves the inferential
    force of οὖν.
- source_word: οὐκ ἔστιν αἰσθέσθαι
  chosen: can one fail to perceive
  alternatives:
  - is it not possible to perceive
  - is one not able to perceive
  - can one not perceive
  lexicon: LSJ
  rationale: The infinitive αἰσθέσθαι means 'to perceive, notice, become aware.' In
    this rhetorical construction, English idiom is best captured by 'can one fail
    to perceive,' which conveys that the answer is obvious without woodenly reproducing
    the negation.
- source_word: ὅτι οὐκ εἰσὶν θεοί
  chosen: that they are not gods
  alternatives:
  - that they are no gods
  lexicon: LSJ
  rationale: Directly states the conclusion about idols. 'Not gods' is straightforward
    and avoids archaic phrasing.
- source_word: οἳ
  chosen: since they
  alternatives:
  - who
  - for they
  lexicon: LSJ
  rationale: The relative pronoun introduces the explanatory clause giving the reason
    they are not gods. 'Since they' makes the causal force clear in idiomatic English.
- source_word: οὔτε σώζουσιν ἑαυτοὺς
  chosen: they neither save themselves
  alternatives:
  - they do not rescue themselves
  - they neither preserve themselves
  lexicon: LSJ
  rationale: σώζω commonly means 'save' or 'rescue.' 'Save themselves' is concise
    and preserves the irony that supposed gods cannot even deliver themselves.
- source_word: ἐκ πολέμου
  chosen: from war
  alternatives:
  - out of war
  - from battle
  lexicon: LSJ
  rationale: πόλεμος is broadly 'war.' 'From war' is the most direct rendering here.
- source_word: οὔτε ἐκ κακῶν
  chosen: nor from calamities
  alternatives:
  - nor from evils
  - nor from troubles
  - nor from misfortunes
  lexicon: LSJ
  rationale: κακά can mean 'evils' or, in context, harmful circumstances/disasters.
    Because the verse speaks of inability to escape external harms, 'calamities' best
    conveys the concrete sense in readable English without importing moral evil.
