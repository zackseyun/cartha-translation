  confidence: high
  validation: agree
translation:
  text: Without feet they are carried on shoulders, showing their own disgrace to
    men; and even those who serve them are put to shame,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before men' for 'to men'; the Greek dative τοῖς ἀνθρώποις can be taken
      as the audience before whom the idols' disgrace is displayed.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who worship them'; the Greek θεραπεύοντες can denote religious
      service as well as ordinary attendance.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄνευ ποδῶν
  chosen: Without feet
  alternatives:
  - Having no feet
  - Footless
  lexicon: LSJ
  rationale: A direct rendering preserves the concrete absurdity of the idols' condition.
    'Without feet' is idiomatic and close to the Greek.
- source_word: ἐπʼ ὤμοις φέρονται
  chosen: they are carried on shoulders
  alternatives:
  - they are borne on shoulders
  - they are carried upon shoulders
  lexicon: LSJ
  rationale: The passive sense of φέρονται is retained. 'On shoulders' reflects the
    plural ὤμοις and the image of people physically transporting the idols.
- source_word: ἐνδεικνύμενοι
  chosen: showing
  alternatives:
  - displaying
  - making evident
  lexicon: LSJ
  rationale: The participle describes the result of being carried in this helpless
    state. 'Showing' is natural English while preserving the demonstrative force.
- source_word: τὴν ἑαυτῶν ἀτιμίαν
  chosen: their own disgrace
  alternatives:
  - their own dishonor
  - their own shame
  lexicon: LSJ
  rationale: ἀτιμία denotes dishonor or ignominy. 'Disgrace' fits the polemical context
    against idols and communicates public humiliation.
- source_word: τοῖς ἀνθρώποις
  chosen: to men
  alternatives:
  - to people
  - before men
  lexicon: LSJ
  rationale: The dative can be understood as those to whom the disgrace is shown.
    'To men' keeps the gender-accurate form aligned with the Greek and the project's
    stated philosophy; 'before men' is possible but less direct.
- source_word: αἰσχύνονται
  chosen: are put to shame
  alternatives:
  - are ashamed
  - feel shame
  lexicon: LSJ
  rationale: The middle/passive form can mean 'are ashamed,' but in context the sense
    of being shamed by the idols' impotence is strong. 'Are put to shame' brings out
    the public disgrace motif already present in ἀτιμία.
- source_word: οἱ θεραπεύοντες αὐτά
  chosen: those who serve them
  alternatives:
  - those who worship them
  - their attendants
  lexicon: LSJ
  rationale: θεραπεύω can mean serve, attend, or in religious contexts worship. 'Serve'
    is broad enough to include cultic service without over-specifying, and it matches
    the concrete image of idol attendants.
