id: LJE.1.25
reference: Letter of Jeremiah 1:25
source:
  edition: lxx-swete-1909
  text: ἄνευ ποδῶν ἐπʼ ὤμοις φέρονται ἐνδεικνύμενοι τὴν ἑαυτῶν ἀτιμίαν τοῖς ἀνθρώποις,
    αἰσχύνονται τε καὶ οἱ θεραπεύοντες αὐτά,
  language: Greek
