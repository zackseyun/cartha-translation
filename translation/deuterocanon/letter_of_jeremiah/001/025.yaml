theological_decisions:
- issue: Cultic force of θεραπεύοντες in an anti-idolatry context
  chosen_reading: those who serve them
  alternative_readings:
  - those who worship them
  rationale: The verse mocks idol caretakers and devotees together. Rendering θεραπεύοντες
    as 'serve' preserves both the literal service of carrying/maintaining idols and
    the religious devotion implied, without importing a narrower liturgical term where
    the Greek itself remains broader.
  doctrine_reference: Translation philosophy §1, §5
