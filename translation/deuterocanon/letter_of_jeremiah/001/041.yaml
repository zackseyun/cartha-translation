theological_decisions:
- issue: Referent and rhetorical force in the idol polemic
  chosen_reading: The verse continues the argument that idols are powerless and senseless;
    the emphatic pronoun refers to the idols themselves.
  alternative_readings:
  - The pronoun could be taken less emphatically as simply 'they' without stressing
    self-inability.
  - The participle νοήσαντες could be read more woodenly as 'having understood' rather
    than concessively.
  rationale: The immediate context is a sustained denunciation of idols as unable
    to act. Rendering αὐτοὶ emphatically and νοήσαντες concessively best preserves
    the rhetorical thrust without adding doctrine beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence'
