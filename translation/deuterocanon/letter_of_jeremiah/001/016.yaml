theological_decisions:
- issue: Referent of 'their gods'
  chosen_reading: Retain 'their gods' as the text's polemical designation for idol
    images.
  alternative_readings:
  - their idols
  rationale: Although the context clearly mocks idols as powerless objects, the Greek
    explicitly says 'gods.' Keeping 'gods' preserves the rhetoric of the source rather
    than resolving it interpretively in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source text''s plain sense without importing interpretation.'
