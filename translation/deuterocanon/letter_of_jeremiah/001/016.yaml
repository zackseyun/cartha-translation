id: LJE.1.16
reference: Letter of Jeremiah 1:16
source:
  edition: lxx-swete-1909
  text: τοιοῦτοι ὑπάρχουσιν οἱ θεοὶ αὐτῶν, καθιδρυμένων αὐτῶν ἐν τοῖς οἴκοις. οἱ ὀφθαλμοὶ
    αὐτῶν πλήρεις εἰσὶν κονιορτοῦ ἀπὸ τῶν ποδῶν τῶν εἰσπορευομένων.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: Such are their gods, set up in houses. Their eyes are full of dust from the
    feet of those who enter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their idols.' The Greek text says 'their gods,' preserving the polemical
      way the author refers to the images worshiped by the nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιοῦτοι
  chosen: Such
  alternatives:
  - like this
  - of this sort
  lexicon: LSJ
  rationale: A concise demonstrative adjective introducing a summary judgment; 'Such'
    preserves the rhetorical force and natural English style.
- source_word: ὑπάρχουσιν
  chosen: are
  alternatives:
  - exist
  - are found to be
  lexicon: BDAG
  rationale: Here the verb functions copulatively in a descriptive statement. 'Are'
    is the most natural English equivalent in context.
- source_word: οἱ θεοὶ αὐτῶν
  chosen: their gods
  alternatives:
  - the gods of them
  lexicon: LSJ
  rationale: Straightforward possessive construction; 'their gods' is idiomatic and
    preserves the polemical reference to idols worshiped by the nations.
- source_word: καθιδρυμένων
  chosen: have been set up
  alternatives:
  - have been established
  - have been installed
  - have been enthroned
  lexicon: LSJ
  rationale: The participle denotes being placed or installed in position. 'Set up'
    fits the context of idol images placed in houses and avoids overreading royal
    or cultic enthronement language.
- source_word: ἐν τοῖς οἴκοις
  chosen: in houses
  alternatives:
  - in the houses
  - in temples
  lexicon: LSJ
  rationale: The Greek says 'in the houses.' Since the article may be generic, English
    omits it naturally. 'Temples' would import a more specific cultic setting than
    the text states.
- source_word: ὀφθαλμοὶ
  chosen: eyes
  lexicon: LSJ
  rationale: Literal body-part language is central to the satire of lifeless idols.
- source_word: πλήρεις εἰσὶν κονιορτοῦ
  chosen: are full of dust
  alternatives:
  - are filled with dust
  lexicon: LSJ
  rationale: A literal rendering preserves the image of neglect and impotence. 'Dust'
    is the plain sense of κονιορτός.
- source_word: ἀπὸ τῶν ποδῶν
  chosen: from the feet
  alternatives:
  - because of the feet
  lexicon: LSJ
  rationale: 'ἀπό marks source here: the dust comes from the feet of those entering.'
- source_word: τῶν εἰσπορευομένων
  chosen: those who enter
  alternatives:
  - those going in
  - those coming in
  lexicon: BDAG
  rationale: A substantival present participle. 'Those who enter' is clear, natural,
    and preserves the ongoing/general sense.
