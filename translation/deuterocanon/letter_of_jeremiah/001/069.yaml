id: LJE.1.69
reference: Letter of Jeremiah 1:69
source:
  edition: lxx-swete-1909
  text: Ὥσπερ γὰρ ἐν σικυηράτῳ προβάσκάινόν οὐδὲν φυλάσσον, οὕτως οἱ θεοὶ αὐτῶν εἰσὶν
    ξύλινοι καὶ περίχρυσοι καὶ περιάργυροι.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: For just as in a cucumber patch there is nothing guarding it, so their gods
    are wooden and overlaid with gold and silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek phrase rendered 'there is nothing guarding it' is textually and
      lexically difficult; the sense is that the cucumber patch is left unprotected
      or unwatched.
    reason: textual_variant
lexical_decisions:
- source_word: σικυηράτῳ
  chosen: cucumber patch
  alternatives:
  - melon patch
  - gourd patch
  lexicon: LSJ
  rationale: The noun denotes a place planted with cucumbers or gourds. 'Cucumber
    patch' is the most natural and specific English rendering, while preserving the
    agricultural image familiar from Greek usage and LXX parallels.
- source_word: προβάσκάινόν
  chosen: there is nothing guarding it
  alternatives:
  - with no watchman over it
  - guarding nothing
  lexicon: LSJ
  rationale: The transmitted form is difficult, but in context it conveys lack of
    protection or watchfulness. The phrase is rendered idiomatically as 'there is
    nothing guarding it' to reflect the sense of an unprotected field without overcommitting
    to a more specific reconstruction not explicit in the source witness.
- source_word: φυλάσσον
  chosen: guarding
  alternatives:
  - watching
  - keeping watch over
  lexicon: BDAG
  rationale: φυλάσσω commonly means to guard or keep watch. 'Guarding' fits the agricultural
    comparison and pairs naturally with the preceding negative sense.
- source_word: θεοὶ
  chosen: gods
  alternatives:
  - idols
  lexicon: BDAG
  rationale: The Greek says 'gods,' reflecting the polemical claim about what 'their
    gods' are. 'Idols' would interpret rather than translate the lexical form.
- source_word: ξύλινοι
  chosen: wooden
  alternatives:
  - made of wood
  - wooden things
  lexicon: LSJ
  rationale: A straightforward adjectival rendering preserves the material description
    and the mocking tone of the verse.
- source_word: περίχρυσοι
  chosen: overlaid with gold
  alternatives:
  - gold-covered
  - gilded
  lexicon: LSJ
  rationale: The compound indicates being covered around with gold rather than being
    solid gold. 'Overlaid with gold' is precise and clear in modern English.
- source_word: περιάργυροι
  chosen: overlaid with silver
  alternatives:
  - silver-covered
  - silver-plated
  lexicon: LSJ
  rationale: As with περίχρυσοι, the sense is covered with silver. 'Overlaid with
    silver' keeps the parallel structure and material emphasis.
