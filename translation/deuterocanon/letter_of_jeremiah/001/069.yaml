theological_decisions:
- issue: Whether to translate θεοὶ as 'gods' or interpretively as 'idols' in this
    anti-idolatry context
  chosen_reading: gods
  alternative_readings:
  - idols
  rationale: The text itself uses the term 'gods' as part of its polemic, then immediately
    defines their material nature. Retaining 'gods' preserves the rhetoric of the
    source without importing an interpretive substitute.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
