id: LJE.1.5
reference: Letter of Jeremiah 1:5
source:
  edition: lxx-swete-1909
  text: ἰδόντας ὄχλον ἔμπροσθεν καὶ ὄπισθεν αὐτῶν προσκυνοῦντας αὐτά· εἴπατε δὲ τῇ
    διανοίᾳ Σοὶ δεῖ προσκυνεῖν, Δέσποτα.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: When you see a crowd in front of them and behind them bowing down to them,
    say in your mind, ‘It is you whom one must worship, Master.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiping them' for 'bowing down to them'; the Greek verb προσκυνέω
      can denote both the bodily act of prostration and the religious act of worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντας
  chosen: When you see
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: Although formally an accusative participle ('seeing'), in context it
    functions adverbially with an implied second-person addressee carried by the following
    imperative εἴπατε. Rendering it as 'When you see' produces clear English while
    preserving the temporal force.
- source_word: ὄχλον
  chosen: a crowd
  alternatives:
  - a multitude
  - a throng
  lexicon: BDAG
  rationale: ὄχλος commonly denotes a crowd or multitude. 'Crowd' is the most natural
    modern English equivalent here.
- source_word: ἔμπροσθεν καὶ ὄπισθεν αὐτῶν
  chosen: in front of them and behind them
  alternatives:
  - before them and behind them
  lexicon: BDAG
  rationale: This preserves the spatial picture of people surrounding the idols on
    both sides. 'In front of ... and behind ...' is idiomatic and concrete.
- source_word: προσκυνοῦντας αὐτά
  chosen: bowing down to them
  alternatives:
  - worshiping them
  - prostrating themselves before them
  lexicon: BDAG
  rationale: προσκυνέω can mean 'worship' or the bodily act 'bow down/prostrate oneself.'
    Because the same root appears again in the direct speech ('must worship'), varying
    the English here avoids awkward repetition while preserving the physical action
    that signals worship.
- source_word: εἴπατε δὲ τῇ διανοίᾳ
  chosen: say in your mind
  alternatives:
  - say in your understanding
  - say inwardly
  - say in your heart
  lexicon: BDAG
  rationale: τῇ διανοίᾳ refers to the faculty of thought or inner understanding. 'Say
    in your mind' communicates the inward, unspoken response without importing the
    more Hebraic 'heart,' which the Greek does not use.
- source_word: Σοί
  chosen: It is you whom
  alternatives:
  - To you
  - You
  lexicon: BDAG
  rationale: 'The dative pronoun is fronted for emphasis. English expresses this emphasis
    naturally with a cleft-like construction: ''It is you whom...'''
- source_word: δεῖ
  chosen: one must
  alternatives:
  - it is necessary to
  - it is fitting to
  - we must
  lexicon: BDAG
  rationale: δεῖ expresses necessity. 'One must' preserves the general obligation
    without specifying a subject not present in the Greek.
- source_word: προσκυνεῖν
  chosen: worship
  alternatives:
  - bow down to
  - pay homage to
  lexicon: BDAG
  rationale: In the direct address to God, the broader religious sense is primary,
    so 'worship' is preferable to the more merely physical 'bow down.'
- source_word: Δέσποτα
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: The Greek is Δέσποτα, not κύριε. 'Master' is the most direct lexical
    equivalent and preserves the distinction from κύριος/Lord. 'Sovereign' is possible
    but more interpretive.
