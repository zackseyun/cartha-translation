theological_decisions:
- issue: Rendering of divine address Δέσποτα
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: The verse contrasts false worship of idols with the worship due to God.
    Because the Greek uses Δέσποτα rather than κύριος, the translation preserves that
    lexical distinction with 'Master' rather than normalizing to 'Lord.' This avoids
    importing a title not used in the source while retaining reverent address.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    contested terms table notes κύριος as ''Lord,'' but this verse uses Δέσποτα, so
    that default does not apply.'
