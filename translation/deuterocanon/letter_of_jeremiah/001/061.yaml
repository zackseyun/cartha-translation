theological_decisions:
- issue: Rendering of τὸ ταχθέν in relation to divine sovereignty
  chosen_reading: what was appointed
  alternative_readings:
  - what was ordered
  - what was assigned
  rationale: The phrase refers to the task fixed for the clouds by God. 'Appointed'
    preserves divine ordering while avoiding a more loaded deterministic nuance than
    the immediate context requires.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
