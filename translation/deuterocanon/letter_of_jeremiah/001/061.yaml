id: LJE.1.61
reference: Letter of Jeremiah 1:61
source:
  edition: lxx-swete-1909
  text: ἐὰν δὲ νεφέλαις ὅταν ἐπιταγῇ ὑπὸ τοῦ θεοῦ ἐπιπορεύεσθαι ἐφʼ ὅλην τὴν οἰκουμένην,
    συντελοῦσι τὸ ταχθέν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: But when the clouds are commanded by God to move over the whole inhabited
    world, they accomplish what was appointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they carry out what was ordered.' The Greek τὸ ταχθέν can emphasize
      what has been ordered or appointed for them.
    reason: lexical_alternative
lexical_decisions:
- source_word: νεφέλαις
  chosen: the clouds
  alternatives:
  - clouds
  lexicon: LSJ
  rationale: Dative plural of νεφέλη, functioning with ἐὰν δὲ and ὅταν in a conditional-temporal
    construction. English requires an explicit subject; 'the clouds' is natural and
    definite in context, referring to the created elements under God's command.
- source_word: ἐπιταγῇ
  chosen: are commanded
  alternatives:
  - is commanded
  - receives an order
  lexicon: BDAG
  rationale: 'Aorist passive subjunctive of ἐπιτάσσω. Because the understood subject
    is plural (''clouds''), English idiom supplies a plural passive: ''are commanded.''
    This preserves divine agency without over-paraphrase.'
- source_word: ὑπὸ τοῦ θεοῦ
  chosen: by God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: ὑπό with genitive marks personal agency in a passive construction. 'By
    God' is the most direct rendering.
- source_word: ἐπιπορεύεσθαι
  chosen: to move
  alternatives:
  - to go forth
  - to travel
  - to proceed
  lexicon: LSJ
  rationale: Infinitive of ἐπιπορεύομαι, here describing the clouds' movement across
    the world. 'Move' is readable modern English and fits meteorological motion better
    than the stiffer 'go forth'.
- source_word: ἐφʼ ὅλην τὴν οἰκουμένην
  chosen: over the whole inhabited world
  alternatives:
  - throughout the whole world
  - over all the earth
  lexicon: BDAG
  rationale: οἰκουμένη commonly denotes the inhabited world/world as inhabited. 'Over
    the whole inhabited world' preserves the scope and avoids flattening to merely
    'earth' while remaining understandable.
- source_word: συντελοῦσι
  chosen: they accomplish
  alternatives:
  - they carry out
  - they complete
  lexicon: BDAG
  rationale: Present active indicative of συντελέω. In context it means fulfilling
    or carrying out what has been ordered. 'Accomplish' preserves the sense of effective
    completion.
- source_word: τὸ ταχθέν
  chosen: what was appointed
  alternatives:
  - what was ordered
  - what was assigned
  - the thing appointed
  lexicon: BDAG
  rationale: Articular aorist passive participle of τάσσω, 'that which has been appointed/ordered.'
    'What was appointed' is concise and preserves the passive sense of divine ordination
    without overstating theological determinism.
