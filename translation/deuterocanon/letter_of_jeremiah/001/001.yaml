theological_decisions:
- issue: Retention of the cognate expression ἁμαρτίας ... ἡμαρτήκατε
  chosen_reading: Keep the repetition as 'sins, which you sinned' rather than smoothing
    it away.
  alternative_readings:
  - '''sins that you committed'''
  - '''the sins you committed'''
  rationale: The source text emphasizes culpability through repetition. Optimal equivalence
    allows mild smoothing, but here preserving the repetition better reflects the
    Greek's rhetorical force without becoming unintelligible.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering ἐναντίον τοῦ θεοῦ
  chosen_reading: Translate as 'against God.'
  alternative_readings:
  - '''before God'''
  - '''in God''s sight'''
  rationale: The context is moral offense leading to judgment and exile. 'Against
    God' preserves the relational and theological gravity of sin as rebellion, not
    merely action in God's presence.
  doctrine_reference: Translation philosophy §§1, 6
