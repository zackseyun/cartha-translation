  text: Διὰ τὰς ἁμαρτίας ὑμῶν ἃς ἡμαρτήκατε ἐναντίον τοῦ θεοῦ ἀχθήσεσθε εἰς Βαβυλῶνα
    αἰχμάλωτοι ὑπὸ Ναβουχοδονοσὸρ βασιλέως τῶν Βαβυλωνίων.
  language: Greek
