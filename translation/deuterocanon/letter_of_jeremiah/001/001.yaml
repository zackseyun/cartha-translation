translation:
  text: Because of your sins, which you sinned against God, you will be carried away
    to Babylon as captives by Nebuchadnezzar king of the Babylonians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the sins that you committed against God.'' The Greek more literally
      repeats the idea: ''sins which you sinned.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ
  chosen: Because of
  alternatives:
  - For
  - On account of
  lexicon: BDAG
  rationale: With the accusative τὰς ἁμαρτίας, διά expresses cause or reason. 'Because
    of' is clear modern English and preserves the causal force.
- source_word: τὰς ἁμαρτίας
  chosen: sins
  alternatives:
  - transgressions
  lexicon: BDAG
  rationale: ἁμαρτία is the standard term for 'sin.' 'Transgressions' is possible
    but narrower and less direct here.
- source_word: ἃς ἡμαρτήκατε
  chosen: which you sinned
  alternatives:
  - which you committed
  - that you have sinned
  lexicon: BDAG
  rationale: The Greek uses a cognate construction ('sins which you sinned'), which
    is somewhat redundant in English. Retaining 'which you sinned' preserves the emphatic
    verbal repetition better than smoothing to 'committed,' while remaining intelligible.
- source_word: ἐναντίον τοῦ θεοῦ
  chosen: against God
  alternatives:
  - before God
  - in the presence of God
  lexicon: BDAG
  rationale: In this moral context ἐναντίον conveys opposition directed toward God,
    not merely location before him. 'Against God' best captures the ethical force.
- source_word: ἀχθήσεσθε
  chosen: you will be carried away
  alternatives:
  - you will be led away
  - you will be taken away
  lexicon: BDAG
  rationale: Future passive of ἄγω in an exile context naturally means being taken
    off into deportation. 'Carried away' idiomatically fits forced removal into captivity.
- source_word: εἰς Βαβυλῶνα
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: BDAG
  rationale: The preposition εἰς marks destination. 'To Babylon' is the most natural
    English rendering here.
- source_word: αἰχμάλωτοι
  chosen: as captives
  alternatives:
  - captive
  - in captivity
  - as prisoners of war
  lexicon: LSJ
  rationale: The adjective describes the state in which they are taken. 'As captives'
    reads naturally with the passive verb and preserves the exile/captivity sense.
- source_word: ὑπὸ Ναβουχοδονοσὸρ
  chosen: by Nebuchadnezzar
  alternatives:
  - under Nebuchadnezzar
  lexicon: BDAG
  rationale: ὑπό with the passive marks agency. The standard English transliteration
    of the royal name is 'Nebuchadnezzar.'
- source_word: βασιλέως τῶν Βαβυλωνίων
  chosen: king of the Babylonians
  alternatives:
  - the Babylonian king
  - king of Babylon
  lexicon: BDAG
  rationale: The Greek explicitly says 'king of the Babylonians,' not 'king of Babylon.'
    The more literal ethnic expression is preserved.
