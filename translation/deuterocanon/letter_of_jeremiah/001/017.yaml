theological_decisions:
- issue: Referent of 'their houses' in an anti-idolatry context
  chosen_reading: Rendered literally as 'their houses' rather than interpretively
    as 'their temples.'
  alternative_readings:
  - their temples
  - their shrines
  rationale: The verse mocks the priests for heavily securing the idol-houses. A literal
    rendering preserves the Greek wording and the rhetorical effect without importing
    a more specialized cultic term into the main text.
  doctrine_reference: Translation philosophy §1, §5
