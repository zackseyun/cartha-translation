id: LJE.1.17
reference: Letter of Jeremiah 1:17
source:
  edition: lxx-swete-1909
  text: καὶ ὥσπερ τινὶ ἠδικηκότι βασιλέα περιτετράχηλαι εἰσὶν αἱ αὐλαί, ὡς ἐπὶ θάνατον
    ἀπηγμένῳ, τοὺς οἴκους αὐτῶν ὀχυροῦσιν οἱ ἱερεῖς θυρώμασιν τε καὶ κλείθροις καὶ
    μοχλοῖς, ὅπως ὑπὸ τῶν λῃστῶν μὴ συληθῶσι.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: And just as the courts are secured around one who has wronged a king, as one
    being led away to death, so the priests fortify their houses with doors and locks
    and bars, so that they may not be plundered by robbers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the courtyards are enclosed around one who has offended the king.' The
      opening comparison is syntactically difficult, but the sense is that heavy security
      surrounds a condemned offender.
    reason: lexical_alternative
  - marker: b
    text: '''Their houses'' refers to the houses or temple-buildings of the idols,
      guarded by the priests.'
    reason: cultural_note
lexical_decisions:
- source_word: περιτετράχηλαι εἰσὶν αἱ αὐλαί
  chosen: the courts are secured around
  alternatives:
  - the courtyards are fenced around
  - the precincts are enclosed around
  lexicon: LSJ
  rationale: The phrase is difficult and somewhat idiomatic in context. αὐλαί commonly
    means courts/courtyards, and the perfect passive form conveys being enclosed or
    secured around someone. 'Courts are secured around' preserves the image without
    overcommitting to a more specific architectural term not demanded by the Greek.
- source_word: τινὶ ἠδικηκότι βασιλέα
  chosen: one who has wronged a king
  alternatives:
  - someone who has offended the king
  - one guilty against a king
  lexicon: BDAG
  rationale: ἠδικηκότι from ἀδικέω denotes doing wrong or injuring. 'Wronged a king'
    is a natural English rendering that keeps the juridical sense.
- source_word: ὡς ἐπὶ θάνατον ἀπηγμένῳ
  chosen: as one being led away to death
  alternatives:
  - as one brought to execution
  - as one led off for death
  lexicon: LSJ
  rationale: ἀπάγω here suggests being led away under guard. 'Being led away to death'
    preserves the process and gravity without adding the more interpretive 'execution'
    to the main text.
- source_word: ὀχυροῦσιν
  chosen: fortify
  alternatives:
  - secure
  - make strong
  lexicon: LSJ
  rationale: The verb means to strengthen or fortify. 'Fortify' fits the satire of
    priests treating idol-houses like vulnerable strongholds.
- source_word: τοὺς οἴκους αὐτῶν
  chosen: their houses
  alternatives:
  - their temples
  - their shrines
  lexicon: LSJ
  rationale: Although the referent is the dwellings/temple-houses of the idols, οἶκοι
    is literally 'houses.' Retaining 'houses' stays close to the Greek while allowing
    the context to signal cultic buildings.
- source_word: θυρώμασιν τε καὶ κλείθροις καὶ μοχλοῖς
  chosen: with doors and locks and bars
  alternatives:
  - with gateways and bolts and bars
  - with doorways and locks and bolts
  lexicon: LSJ
  rationale: The three terms denote physical security features. 'Doors and locks and
    bars' is clear modern English and preserves the cumulative force.
- source_word: συληθῶσι
  chosen: be plundered
  alternatives:
  - be robbed
  - be despoiled
  lexicon: BDAG
  rationale: συλάω often means strip, plunder, or despoil. 'Be plundered' best matches
    the context of robbers looting temple property.
- source_word: λῃστῶν
  chosen: robbers
  alternatives:
  - bandits
  - thieves
  lexicon: BDAG
  rationale: λῃσταί are robbers or bandits, often violent. 'Robbers' is the most straightforward
    fit in this sentence.
