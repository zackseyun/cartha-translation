translation:
  text: They are indeed like a beam from a house, but they say that their hearts are
    licked clean away; while the creeping things from the ground devour them and their
    clothing, they do not perceive it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their insides are licked away.' The Greek says 'their hearts,' preserving
      the mock-anthropomorphic image.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκός
  chosen: beam
  alternatives:
  - log
  - timber
  lexicon: LSJ
  rationale: ὥσπερ δοκὸς τῶν ἐκ τῆς οἰκίας compares the idols to a structural piece
    of wood from a house. 'Beam' best conveys a worked wooden support rather than
    a mere stick or generic log.
- source_word: καρδίας
  chosen: hearts
  alternatives:
  - inner parts
  - minds
  lexicon: LSJ
  rationale: Although καρδία can denote the inner self, here it likely refers concretely
    to the interior/core of the wooden idols being eaten away. 'Hearts' preserves
    the Greek image and lets the irony stand.
- source_word: ἐκλείχεσθαι
  chosen: are licked clean away
  alternatives:
  - are licked away
  - are gnawed away
  lexicon: LSJ
  rationale: The verb is built on λείχω, 'to lick,' and the middle/passive infinitive
    after φασίν reports what people say about the idols' interiors. 'Licked clean
    away' preserves the vividness of the Greek and suggests gradual consumption.
- source_word: ἑρπετῶν
  chosen: creeping things
  alternatives:
  - reptiles
  - creatures that crawl
  lexicon: LSJ
  rationale: ἑρπετά broadly denotes crawling creatures, not only reptiles in the modern
    taxonomic sense. 'Creeping things' is biblically natural and semantically broad.
- source_word: κατεσθιόντων
  chosen: devour
  alternatives:
  - eat up
  - consume
  lexicon: LSJ
  rationale: The participle expresses active consumption by vermin/crawling creatures.
    'Devour' is vivid without overtranslating.
- source_word: ἱματισμόν
  chosen: clothing
  alternatives:
  - garments
  - raiment
  lexicon: LSJ
  rationale: Readable modern English is preferred. 'Clothing' accurately renders the
    term for what covers the idols.
- source_word: οὐκ αἰσθάνονται
  chosen: they do not perceive it
  alternatives:
  - they are not aware
  - they do not notice
  lexicon: LSJ
  rationale: The point is the idols' lack of sensation or awareness. 'Perceive' keeps
    the sensory nuance and fits the polemical context.
