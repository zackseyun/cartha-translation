theological_decisions:
- issue: Referent of the final verb and pronouns
  chosen_reading: 'The idols themselves are the subject throughout: crawling things
    consume them and their clothing, and the idols do not perceive it.'
  alternative_readings:
  - The worshipers are implied in part of the sentence, especially in 'they say'.
  rationale: The immediate context is a sustained critique of idols as senseless objects.
    Although φασίν introduces what people say about them, the nearest grammatical
    referents of αὐτούς, αὐτῶν, and οὐκ αἰσθάνονται are the idols.
- issue: How literally to render the image of the idols' 'hearts' being consumed
  chosen_reading: Retain the anthropomorphic term 'hearts' in the main text.
  alternative_readings:
  - Render interpretively as 'insides' or 'interiors'.
  rationale: The verse mocks idols by using body language for wooden objects. Preserving
    'hearts' keeps the rhetorical force and avoids flattening the imagery.
  doctrine_reference: Translation philosophy §§1, 3, 6
