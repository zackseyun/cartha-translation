id: LJE.1.19
reference: Letter of Jeremiah 1:19
source:
  edition: lxx-swete-1909
  text: ἔστιν μὲν ὥσπερ δοκὸς τῶν ἐκ τῆς οἰκίας, τὰς δὲ καρδίας αὐτῶν φασὶν ἐκλείχεσθαι·
    τῶν ἀπὸ τῆς γῆς ἑρπετῶν κατεσθιόντων αὐτοὺς τε καὶ τὸν ἱματισμὸν αὐτῶν οὐκ αἰσθάνονται.
