theological_decisions:
- issue: Referent of the implied subject in δύνανται ἰδεῖν
  chosen_reading: the idols cannot see the lamps lit before them
  alternative_readings:
  - the worshipers cannot see any benefit from them
  rationale: The immediate context throughout the Letter of Jeremiah mocks idols as
    senseless objects. The nearest and most coherent referent is the idols, who are
    given lamps yet cannot see them. This is not a major textual uncertainty but an
    interpretive choice required by English style.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context sufficiently resolves the referent toward the idols.
