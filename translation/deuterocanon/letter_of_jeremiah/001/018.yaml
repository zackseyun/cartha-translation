id: LJE.1.18
reference: Letter of Jeremiah 1:18
source:
  edition: lxx-swete-1909
  text: λύχνους καίουσιν καὶ πλείους ἢ ἑαυτοῖς, ὧν οὐδένα δύνανται ἰδεῖν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: They light lamps for them, more than for themselves, though they cannot see
    a single one of them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λύχνους
  chosen: lamps
  alternatives:
  - lights
  lexicon: LSJ
  rationale: λύχνος ordinarily denotes a lamp, especially an oil lamp, not light in
    the abstract. 'Lamps' keeps the concrete image of cultic illumination before idols.
- source_word: καίουσιν
  chosen: they light
  alternatives:
  - they burn
  - they kindle
  lexicon: LSJ
  rationale: The verb means to burn or kindle. In English, with 'lamps' as object,
    'they light' is the most natural and accurate rendering.
- source_word: πλείους ἢ ἑαυτοῖς
  chosen: more than for themselves
  alternatives:
  - more than themselves
  - more lamps than they have for themselves
  lexicon: LSJ
  rationale: The comparative phrase contrasts the number or provision of lamps given
    to the idols with those used by the worshipers themselves. 'More than for themselves'
    preserves the comparison without over-specifying beyond the Greek.
- source_word: ὧν
  chosen: of them
  alternatives:
  - which
  - of which
  lexicon: LSJ
  rationale: The relative pronoun refers back to the lamps. Rendering it as 'of them'
    in the final clause makes the English idiomatic while preserving the antecedent.
- source_word: οὐδένα
  chosen: a single one
  alternatives:
  - none
  - not one
  lexicon: LSJ
  rationale: The accusative singular with δύνανται ἰδεῖν emphasizes total inability
    to perceive even one lamp. 'A single one' brings out that force clearly.
- source_word: δύνανται ἰδεῖν
  chosen: they cannot see
  alternatives:
  - they are unable to see
  - they cannot perceive
  lexicon: LSJ
  rationale: This straightforward expression states the idols' incapacity for sight.
    'See' is the plainest and most direct equivalent in context.
