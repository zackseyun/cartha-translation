translation:
  text: They are bought at every price, but there is no breath in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no spirit in them.' Greek πνεῦμα can mean 'breath,' 'spirit,'
      or 'wind'; here the sense is that the idols are lifeless.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ πάσης τιμῆς
  chosen: at every price
  alternatives:
  - for every price
  - with all kinds of payment
  - at great cost
  lexicon: LSJ
  rationale: The phrase literally involves 'from/out of every price/value,' idiomatically
    expressing purchase by payment of whatever price is required. 'At every price'
    is concise modern English that preserves the sense of costly commercial acquisition
    without overinterpreting the exact amount.
- source_word: ἠγορασμένα
  chosen: are bought
  alternatives:
  - have been bought
  - are purchased
  lexicon: BDAG
  rationale: Perfect/passive participle of ἀγοράζω, describing idols as acquired commodities.
    'Are bought' keeps the passive commercial sense and reads naturally in English.
    The perfect nuance is not heavily marked in this context, so a simple present
    passive is acceptable in optimal equivalence.
- source_word: πνεῦμα
  chosen: breath
  alternatives:
  - spirit
  - wind
  lexicon: BDAG
  rationale: In this anti-idol context, the point is that the objects lack animating
    life. 'Breath' best conveys absence of life-force in an image, whereas 'spirit'
    could suggest a more metaphysical claim than the immediate context requires. The
    alternative remains viable and is preserved in a footnote.
- source_word: ἐν οἷς
  chosen: in them
  alternatives:
  - within which
  - in which
  lexicon: BDAG
  rationale: Refers back to the purchased idol-objects. 'In them' is idiomatic English
    and preserves the locative sense without stiffness.
