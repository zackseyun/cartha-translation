id: LJE.1.24
reference: Letter of Jeremiah 1:24
source:
  edition: lxx-swete-1909
  text: ἐκ πάσης τιμῆς ἠγορασμένα ἐστίν, ἐν οἷς οὐκ ἔστιν πνεῦμα.
  language: Greek
