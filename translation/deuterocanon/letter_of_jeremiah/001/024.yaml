theological_decisions:
- issue: Nature of πνεῦμα in an idol-polemic context
  chosen_reading: breath
  alternative_readings:
  - spirit
  rationale: The verse argues that idols, though costly, are lifeless. Rendering πνεῦμα
    as 'breath' preserves the concrete biblical association between breath and life,
    and avoids importing a stronger ontological statement about 'spirit' than the
    line itself requires. The alternative is preserved in a footnote because πνεῦμα
    can legitimately bear that sense.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
