id: LJE.1.30
reference: Letter of Jeremiah 1:30
source:
  edition: lxx-swete-1909
  text: καὶ ἐν τοῖς οἴκοις αὐτῶν οἱ ἱερεῖς διφρεύουσιν, ἔχοντες τοὺς χιτῶνας διερρωγότας
    καὶ τὰς κεφαλὰς καὶ τοὺς πώγωνας ἐξυρημένους, ὧν αἱ κεφαλαὶ ἀκάλυπτοί εἰσιν,
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: And in their houses the priests sit in state, having their tunics torn, and
    their heads and beards shaved, with their heads uncovered,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sit on seats'; the Greek verb can denote sitting on a ceremonial seat.
      A literal sense related to chariot-seating is less likely in this indoor context.
    reason: lexical_alternative
lexical_decisions:
- source_word: διφρεύουσιν
  chosen: sit in state
  alternatives:
  - sit
  - sit on seats
  - ride in chariots
  lexicon: LSJ
  rationale: From διφρεύω, literally connected with a seat/chariot-seat. In this context
    inside houses, a sense like 'sit on seats' or 'sit in state' fits better than
    literal chariot-riding. 'Sit in state' preserves the image of ceremonious seated
    posture without over-literal awkwardness.
- source_word: χιτῶνας
  chosen: tunics
  alternatives:
  - garments
  - robes
  lexicon: LSJ
  rationale: χιτών commonly denotes the basic inner garment or tunic. 'Tunics' is
    more precise than the broader 'garments' and avoids implying a formal outer robe.
- source_word: διερρωγότας
  chosen: torn
  alternatives:
  - rent
  - ripped
  lexicon: LSJ
  rationale: Perfect participle of διαρρήγνυμι, indicating garments that have been
    torn. 'Torn' is clear modern English; 'rent' is accurate but archaic.
- source_word: ἐξυρημένους
  chosen: shaved
  alternatives:
  - shorn
  - closely shaven
  lexicon: LSJ
  rationale: The participle indicates removal of hair by shaving. 'Shaved' is the
    most natural modern rendering for both heads and beards.
- source_word: ἀκάλυπτοί
  chosen: uncovered
  alternatives:
  - bare
  - unveiled
  lexicon: LSJ
  rationale: The adjective means not covered. 'Uncovered' is the most direct rendering
    here, referring to the priests' heads.
- source_word: οἴκοις
  chosen: houses
  alternatives:
  - temples
  - shrines
  lexicon: LSJ
  rationale: The Greek plainly says 'houses.' In context these are the dwellings/temple-houses
    of the idols, but the source word should be preserved rather than interpreted
    more narrowly.
