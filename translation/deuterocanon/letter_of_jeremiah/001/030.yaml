theological_decisions:
- issue: Cultic description of pagan priests' mourning or ritual posture
  chosen_reading: Render the verse descriptively without importing interpretive labels
    such as 'mourning rites' or 'ecstatic ritual.'
  alternative_readings:
  - Interpret the torn garments and shaved heads as explicit mourning practices
  - Interpret διφρεύουσιν as enthroned ceremonial sitting
  rationale: The verse catalogs visible practices of idol priests. The translation
    should preserve the concrete details and not force a fuller ritual explanation
    than the Greek itself states, though the seated posture is conveyed idiomatically.
