theological_decisions:
- issue: Reference of αὐτούς in the final clause
  chosen_reading: them = the idols falsely regarded as gods
  rationale: The immediate antecedent is the objects under discussion throughout the
    passage. The translation preserves the text's anti-idolatry argument without adding
