id: LJE.1.8
reference: Letter of Jeremiah 1:8
source:
  edition: lxx-swete-1909
  text: καὶ ὥσπερ παρθένῳ φιλοκόσμῳ λαμβάνοντες χρυσίον κατασκευάζουσιν στεφάνους
    ἐπὶ τὰς κεφαλὰς τῶν θεῶν αὐτῶν·
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: major_mismatch
translation:
  text: And, as for a woman who loves adornment, taking gold they make crowns for
    the heads of their gods;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'a virgin' or 'a maiden'; the comparison is to a female figure fond
      of ornamentation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ
  chosen: as for / as
  alternatives:
  - just as
  - like
  lexicon: LSJ
  rationale: Introduces a comparison. In this sentence it sets up the simile with
    a woman fond of adornment; 'as for' in English helps the syntax flow, though the
    core sense is comparative ('as/just as').
- source_word: παρθένῳ
  chosen: a woman
  alternatives:
  - a virgin
  - a maiden
  lexicon: LSJ
  rationale: Literally 'virgin/maiden,' but in this context the point is not sexual
    status but a female figure associated with ornamentation. 'Woman' avoids importing
    an unnecessary emphasis while preserving the referent of the comparison. The more
    literal alternatives are preserved in a footnote.
- source_word: φιλοκόσμῳ
  chosen: who loves adornment
  alternatives:
  - fond of ornament
  - loving finery
  lexicon: LSJ
  rationale: Compound adjective indicating delight in adornment/ornament. 'Who loves
    adornment' is natural modern English and keeps the lexical idea of affection for
    decoration.
- source_word: λαμβάνοντες
  chosen: taking
  alternatives:
  - taking up
  - receiving
  lexicon: LSJ
  rationale: Straightforward participle; 'taking' best matches the Greek and fits
    the sequence of action.
- source_word: χρυσίον
  chosen: gold
  alternatives:
  - gold objects
  - gold ornament
  lexicon: LSJ
  rationale: The noun denotes gold; no need to specify a more concrete object beyond
    the text.
- source_word: κατασκευάζουσιν
  chosen: they make
  alternatives:
  - they fashion
  - they prepare
  lexicon: LSJ
  rationale: The verb can mean prepare/fashion/construct. Here the object is crowns,
    so 'make' is clear and idiomatic, with 'fashion' as a viable stylistic alternative.
- source_word: στεφάνους
  chosen: crowns
  alternatives:
  - wreaths
  - garlands
  lexicon: LSJ
  rationale: The term can denote wreaths or crowns. Given the use on the heads of
    idols and the likely metallic material, 'crowns' is the best fit in English.
- source_word: ἐπὶ τὰς κεφαλάς
  chosen: for the heads
  alternatives:
  - upon the heads
  - on the heads
  lexicon: LSJ
  rationale: The preposition with accusative here expresses placement/destination.
    'For the heads' works naturally with 'make crowns,' while still reflecting intended
    placement.
- source_word: τῶν θεῶν αὐτῶν
  chosen: of their gods
  alternatives:
  - for their gods
  lexicon: LSJ
  rationale: Genitive construction most directly yields 'of their gods.' In context
    these are idol-images, but the Greek says 'their gods,' and the translation should
    not pre-interpret beyond that.
