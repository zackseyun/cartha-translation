theological_decisions:
- issue: Whether to render θεῶν as 'gods' or interpretively as 'idols'
  chosen_reading: their gods
  alternative_readings:
  - their idols
  rationale: The polemical context concerns idols, but the Greek wording here is simply
    'their gods.' To avoid importing interpretation into the main text, the translation
    preserves the source wording.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition; §3, preserve tension rather than resolve it.
