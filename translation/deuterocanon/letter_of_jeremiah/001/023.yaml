theological_decisions:
- issue: Referent and force of the final clause about awareness during manufacture
  chosen_reading: The clause is rendered to emphasize the idols' total lack of perception
    even in the process of their own casting.
  alternative_readings:
  - The subject could be taken more loosely as the images not sensing anything while
    being smelted/cast.
  - 'The final pronoun may be left implicit in English: ''nor, when they were cast,
    were they aware.'''
  rationale: The verse is part of an anti-idolatry argument stressing that idols are
    inert objects. The translation preserves that polemical force without expanding
    it into a broader doctrinal statement.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
