id: LJE.1.23
reference: Letter of Jeremiah 1:23
source:
  edition: lxx-swete-1909
  text: Τὸ γὰρ χρυσίον ὃ περιτίθενται εἰς κάλλος, ἐὰν μή τις ἐκμάξῃ τὸν ἰόν, οὐ μὴ
    στίλψωσιν· οὐδὲ γὰρ ὅτε ἐχωνεύοντο ᾐσθάνοντο.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: For the gold with which they are adorned for beauty—unless someone wipes off
    the tarnish—it will certainly not shine; for not even when they were being cast
    did they perceive it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tarnish' or 'corrosion' for 'rust' (Greek ἰόν).
    reason: lexical_alternative
  - marker: b
    text: Or 'nor, when they were being cast, were they aware,' making the idols themselves
      the explicit subject throughout.
    reason: alternative_reading
lexical_decisions:
- source_word: περιτίθενται
  chosen: are adorned
  alternatives:
  - put on
  - are decked out
  - are clothed
  lexicon: LSJ
  rationale: Middle/passive form in context refers to the idols being furnished with
    gold ornamentation. 'Are adorned' captures the resulting decorative state more
    naturally than the more literal 'put around themselves,' which would misleadingly
    suggest self-action.
- source_word: εἰς κάλλος
  chosen: for beauty
  alternatives:
  - for adornment
  - for splendor
  - as an ornament
  lexicon: LSJ
  rationale: The phrase expresses purpose/result of the gold decoration. 'For beauty'
    is straightforward modern English and preserves the aesthetic emphasis of κάλλος.
- source_word: ἐκμάξῃ
  chosen: wipes off
  alternatives:
  - cleans away
  - wipes away
  - polishes off
  lexicon: LSJ
  rationale: The verb denotes wiping or cleaning off. 'Wipes off' keeps the concrete
    image without overinterpreting it as specialized polishing.
- source_word: ἰόν
  chosen: rust
  alternatives:
  - corrosion
  - verdigris
  - tarnish
  lexicon: LSJ
  rationale: ἰός can denote rust/corrosion, including the tarnish or oxidation that
    forms on metal. Since the object is gold ornament on idols, 'rust' is idiomatic
    and communicates visible metal decay in plain English, though 'tarnish/corrosion'
    is also possible.
- source_word: οὐ μὴ στίλψωσιν
  chosen: it will certainly not shine
  alternatives:
  - they will certainly not gleam
  - it will by no means glitter
  lexicon: LSJ
  rationale: The emphatic negation οὐ μή calls for strong English ('certainly not').
    The plural verb likely agrees with the adorned idols, but English more naturally
    focuses on the gold's appearance in this clause; 'it' refers to the gold ornamentation
    just mentioned. This avoids awkwardness while preserving the sense.
- source_word: ἐχωνεύοντο
  chosen: were being cast
  alternatives:
  - were being smelted
  - were being molded
  lexicon: LSJ
  rationale: The verb refers to metalworking by melting/casting. In context of idol
    manufacture, 'were being cast' best fits the production of metal images.
- source_word: ᾐσθάνοντο
  chosen: did they perceive it
  alternatives:
  - were they aware
  - did they feel
  - did they notice
  lexicon: LSJ
  rationale: 'The verb means perceive/be aware. The point is the idols'' lifelessness:
    even during manufacture they had no awareness. ''Did they perceive it'' preserves
    that irony without adding interpretive detail.'
