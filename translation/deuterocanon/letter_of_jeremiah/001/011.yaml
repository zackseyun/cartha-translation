id: LJE.1.11
reference: Letter of Jeremiah 1:11
source:
  edition: lxx-swete-1909
  text: οὗτοι δὲ οὐ διασώζονται ἀπὸ ἰοῦ καὶ βρωμάτων, περιβεβλημένων αὐτῶν ἱματισμὸν
    πορφυροῦν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: But these are not preserved from rust and moths, though they are clothed in
    purple garments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from corrosion and things that consume them.' The Greek βρωμάτων is
      broader than 'moths,' but 'moths' best fits the mention of clothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  chosen: these
  alternatives:
  - these things
  - these idols
  lexicon: LSJ
  rationale: Demonstrative pronoun referring back to the idols under discussion. 'These'
    is sufficient in English without adding an interpretive noun.
- source_word: οὐ διασώζονται
  chosen: are not preserved
  alternatives:
  - are not saved
  - do not survive
  - are not protected
  lexicon: LSJ
  rationale: The passive conveys inability to be kept safe or intact. 'Are not preserved'
    fits the context of physical decay better than the more theological-sounding 'saved'.
- source_word: ἀπὸ ἰοῦ
  chosen: from rust
  alternatives:
  - from corrosion
  - from poison
  lexicon: LSJ
  rationale: In this context of idols decaying, ἰός most naturally refers to rust/corrosion
    rather than poison. The paired image with βρωμάτων supports material deterioration.
- source_word: βρωμάτων
  chosen: moths
  alternatives:
  - things that eat
  - vermin
  - worms
  lexicon: LSJ
  rationale: Literally 'eaters' or 'things that consume,' but in context of garments
    and decay, 'moths' is the most natural English rendering. It also coheres with
    the following mention of purple clothing.
- source_word: περιβεβλημένων αὐτῶν
  chosen: though they are clothed
  alternatives:
  - while they are clothed
  - with them being clothed
  lexicon: LSJ
  rationale: 'Genitive absolute expressing concession or attendant circumstance. ''Though
    they are clothed'' brings out the irony: despite rich clothing, they still decay.'
- source_word: ἱματισμὸν πορφυροῦν
  chosen: in purple garments
  alternatives:
  - with a purple robe
  - with purple clothing
  lexicon: LSJ
  rationale: ἱματισμός denotes clothing/garment, and πορφυροῦν indicates purple-dyed
    apparel associated with splendor. Plural 'garments' is idiomatic English for the
    collective sense.
