theological_decisions:
- issue: Nature of διασώζονται in an anti-idolatry context
  chosen_reading: physical preservation from decay
  alternative_readings:
  - deliverance in a broader sense
  rationale: The immediate context concerns the impotence of idols and their susceptibility
    to material corruption. The wording should emphasize physical inability to resist
    decay, not spiritual salvation.
