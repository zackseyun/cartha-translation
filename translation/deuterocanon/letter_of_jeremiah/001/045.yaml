theological_decisions:
- issue: Nature of the statement about idols
  chosen_reading: The verse emphasizes that idols are entirely products of human artisans
    and have no independent power or identity beyond human design.
  alternative_readings:
  - A more wooden rendering could stress only their origin, not their incapacity.
  rationale: The paired clauses move from human manufacture to total dependence on
    artisan intention. The translation preserves the anti-idolatry polemic without
    adding theological claims beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
