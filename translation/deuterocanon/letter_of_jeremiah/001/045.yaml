id: LJE.1.45
reference: Letter of Jeremiah 1:45
source:
  edition: lxx-swete-1909
  text: Ὑπὸ τεκτόνων καὶ χρυσοχόων κατεσκευασμένα εἰσίν· οὐθὲν ἄλλο μὴ γένηται ἢ βούλονται
    οἱ τεχνῖται αὐτὰ γενέσθαι.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: They are made by carpenters and goldsmiths; they can become nothing other
    than what the craftsmen want them to become.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὑπὸ
  chosen: by
  alternatives:
  - from
  lexicon: BDAG
  rationale: Marks agency with the genitives τεκτόνων and χρυσοχόων; 'by' is the natural
    English rendering.
- source_word: τεκτόνων
  chosen: carpenters
  alternatives:
  - craftsmen
  - builders
  lexicon: BDAG
  rationale: Refers specifically to woodworkers/builders. 'Carpenters' preserves the
    concrete artisan sense in context of idol manufacture.
- source_word: χρυσοχόων
  chosen: goldsmiths
  alternatives:
  - metalworkers
  - gold-workers
  lexicon: BDAG
  rationale: Specifies workers in gold; 'goldsmiths' is the standard and precise English
    equivalent.
- source_word: κατεσκευασμένα
  chosen: are made
  alternatives:
  - are manufactured
  - have been fashioned
  lexicon: BDAG
  rationale: Perfect/passive participial idea describing idols as humanly fabricated.
    'Are made' is clear modern English and keeps the passive sense without overloading
    the sentence.
- source_word: οὐθὲν ἄλλο
  chosen: nothing other than
  alternatives:
  - nothing else
  - no other thing
  lexicon: BDAG
  rationale: Expresses exclusion emphatically; 'nothing other than' fits the following
    infinitive construction well in English.
- source_word: μὴ γένηται
  chosen: can become
  alternatives:
  - may become
  - comes to be
  lexicon: BDAG
  rationale: 'The clause states incapacity/limitation in context: the idols cannot
    become anything beyond what their makers intend. ''Can become'' communicates that
    force naturally.'
- source_word: βούλονται
  chosen: want
  alternatives:
  - wish
  - intend
  lexicon: BDAG
  rationale: Denotes volition of the craftsmen. 'Want' is idiomatic and direct; 'intend'
    is possible but slightly narrower.
- source_word: οἱ τεχνῖται
  chosen: the craftsmen
  alternatives:
  - the artisans
  - the workmen
  lexicon: BDAG
  rationale: A general term for skilled makers. 'Craftsmen' matches the artisan context
    and reads naturally alongside the more specific 'carpenters and goldsmiths'.
- source_word: αὐτὰ γενέσθαι
  chosen: them to become
  alternatives:
  - them to be
  - them to come to be
  lexicon: BDAG
  rationale: Completes the volitional construction with βούλονται. 'Them to become'
    preserves the Greek verbal repetition with γένηται/gενέσθαι and the sense of resulting
    form or state.
