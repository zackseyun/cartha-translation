translation:
  text: They will never show mercy to a widow, nor do good to an orphan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will certainly not pity a widow.' The Greek uses an emphatic negation
      (οὐ μή).
    reason: lexical_alternative
  - marker: b
    text: Or 'nor benefit the fatherless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χήραν
  chosen: a widow
  alternatives:
  - the widow
  - widows
  lexicon: LSJ
  rationale: χήραν is the accusative singular of χήρα, referring to a widow. English
    idiom in a generic negative statement naturally uses the singular with the article
    omitted or indefinite article supplied; 'a widow' preserves the representative
    singular sense.
- source_word: οὐ μὴ ἐλεήσωσιν
  chosen: will never show mercy
  alternatives:
  - will certainly not pity
  - will by no means have mercy on
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. ἐλεέω means
    to show mercy, pity, or compassion. 'Will never show mercy' captures both the
    force of the emphatic negation and the ethical/religious nuance of mercy better
    than a flatter 'will not pity.'
- source_word: οὔτε
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: LSJ
  rationale: οὔτε coordinates the second negative clause with the first. 'Nor' is
    the most natural English connector after an initial negative statement.
- source_word: ὀρφανῷ
  chosen: an orphan
  alternatives:
  - the orphan
  - the fatherless
  lexicon: LSJ
  rationale: ὀρφανός denotes an orphan or fatherless child. 'Orphan' is clear modern
    English and avoids archaic diction; the singular is representative, matching the
    Greek dative singular.
- source_word: εὖ ποιήσουσιν
  chosen: do good to
  alternatives:
  - benefit
  - treat well
  lexicon: BDAG
  rationale: εὖ ποιέω means to do good, act kindly, or benefit someone. 'Do good to'
    is a transparent rendering that preserves the verbal structure and moral sense
    without over-idiomatizing.
