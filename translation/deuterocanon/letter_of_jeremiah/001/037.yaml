theological_decisions:
- issue: Rendering the social-ethics pair χήρα / ὀρφανός
  chosen_reading: widow / orphan
  alternative_readings:
  - widow / fatherless
  rationale: The verse condemns idols by noting their inability to care for the paradigmatic
    vulnerable persons of biblical ethics. 'Orphan' is preferred as readable modern
    English while preserving the same social-theological category.
