id: LJE.1.21
reference: Letter of Jeremiah 1:21
source:
  edition: lxx-swete-1909
  text: ἐπὶ τὸ σῶμα αὐτῶν καὶ ἐπὶ τὴν κεφαλὴν ἐφίπτανται νυκτερίδες, χελιδόνες καὶ
    τὰ ὄρνεα, ὡσαύτως δὲ καὶ οἱ αἴλουροι.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: Upon their bodies and upon their heads bats, swallows, and the birds alight,
    and likewise also the cats.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'light upon' or 'fly upon' for 'alight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ
  chosen: upon
  alternatives:
  - 'on'
  lexicon: LSJ
  rationale: Repeated with body and head; 'upon' preserves the slightly elevated,
    spatial sense of the Greek while remaining natural in English.
- source_word: σῶμα
  chosen: bodies
  alternatives:
  - body
  lexicon: LSJ
  rationale: Plural is required by αὐτῶν and the broader context about idols; 'bodies'
    fits the physical image of creatures landing on the idols.
- source_word: κεφαλή
  chosen: heads
  alternatives:
  - head
  lexicon: LSJ
  rationale: Plural in sense with αὐτῶν; straightforward anatomical reference to the
    idols' heads.
- source_word: ἐφίπτανται
  chosen: alight
  alternatives:
  - settle
  - fly upon
  - light upon
  lexicon: LSJ
  rationale: The verb denotes flying onto or settling upon. 'Alight' captures the
    avian motion and resulting contact better than the flatter 'settle.'
- source_word: νυκτερίδες
  chosen: bats
  lexicon: LSJ
  rationale: Standard meaning; literal fauna in the mockery of powerless idols.
- source_word: χελιδόνες
  chosen: swallows
  lexicon: LSJ
  rationale: Standard meaning for the bird species; no reason to generalize.
- source_word: τὰ ὄρνεα
  chosen: the birds
  alternatives:
  - birds
  lexicon: LSJ
  rationale: The article is retained in English for a slightly more formal, collective
    sense matching the Greek list.
- source_word: ὡσαύτως δὲ καὶ
  chosen: and likewise also
  alternatives:
  - likewise
  - and likewise
  lexicon: LSJ
  rationale: This reproduces the emphatic additive force of the phrase, though still
    readable in English.
- source_word: οἱ αἴλουροι
  chosen: the cats
  alternatives:
  - cats
  lexicon: LSJ
  rationale: αἴλουρος ordinarily means 'cat.' Retaining the article mirrors the Greek
    and keeps the final item parallel with 'the birds.'
