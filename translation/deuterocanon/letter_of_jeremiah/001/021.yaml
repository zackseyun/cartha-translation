theological_decisions:
- issue: Nature of the verse's polemic against idols
  chosen_reading: Translate the animal imagery literally as a demonstration of the
    idols' helplessness.
  rationale: The verse is not making a symbolic theological claim beyond the plain
    mockery that animals freely land on the idols. A literal rendering preserves the
    argument without embellishment.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
