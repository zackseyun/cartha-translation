id: LJE.1.51
reference: Letter of Jeremiah 1:51
source:
  edition: lxx-swete-1909
  text: Τίνι οὖν γνωστὸν ἐστὶν ὅτι οὐκ εἰσὶν θεοί;
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: To whom, then, is it known that they are not gods?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'Who then knows that they are no gods?'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίνι
  chosen: To whom
  alternatives:
  - By whom
  - To anyone
  lexicon: LSJ
  rationale: Dative interrogative pronoun best rendered literally as 'to whom' in
    this impersonal construction. 'By whom' is possible in English, but 'to whom is
    it known' more closely reflects the Greek syntax.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: LSJ
  rationale: Marks inference or continuation. 'Then' preserves the connective force
    without overstating logical consequence.
- source_word: γνωστὸν ἐστὶν
  chosen: is it known
  alternatives:
  - is it evident
  - is it recognized
  lexicon: LSJ
  rationale: Impersonal expression meaning 'it is known/knowable.' 'Is it known' is
    the most direct and natural rendering here.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: LSJ
  rationale: Introduces the content clause of what is known.
- source_word: οὐκ εἰσὶν
  chosen: they are not
  alternatives:
  - they are no
  - they do not exist as
  lexicon: LSJ
  rationale: Straightforward negated copula. 'They are not' avoids importing the stronger
    idiom 'are no gods' unless supplied by context.
- source_word: θεοί
  chosen: gods
  alternatives:
  - divine beings
  lexicon: LSJ
  rationale: Plural of θεός. In context of idol polemic, 'gods' is the natural and
    transparent rendering.
