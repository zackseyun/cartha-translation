theological_decisions:
- issue: Idol-polemic phrasing
  chosen_reading: they are not gods
  alternative_readings:
  - they are no gods
  rationale: The Greek says literally 'they are not gods.' English 'they are no gods'
    is idiomatic and slightly stronger, but the more literal wording better preserves
    the source form while still conveying the polemic against idols.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
