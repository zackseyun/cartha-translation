translation:
  text: For they can neither curse kings nor bless them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''they will certainly not curse kings, nor bless [them],'' with
      emphatic negation; the sense in context is that they are unable to do either.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὔτε γὰρ
  chosen: For ... neither
  alternatives:
  - For not even
  - Indeed, neither
  lexicon: LSJ
  rationale: γάρ gives explanatory force linking this statement to the surrounding
    argument; οὔτε introduces the first member of a neither/nor construction. English
    idiom is best represented by beginning with 'For' and completing the pair with
    'neither ... nor'.
- source_word: βασιλεῦσιν
  chosen: kings
  alternatives:
  - to kings
  lexicon: LSJ
  rationale: Dative plural of βασιλεύς. With the verbs 'curse' and 'bless,' English
    idiom normally takes a direct object ('curse kings,' 'bless them') rather than
    preserving a wooden dative form.
- source_word: οὐ μὴ καταράσωνται
  chosen: can ... curse
  alternatives:
  - will certainly not curse
  - may by no means curse
  lexicon: LSJ
  rationale: The emphatic negation οὐ μή with the aorist subjunctive expresses strong
    impossibility/denial. In this context, describing the impotence of idols, English
    'can ... not' or 'cannot' communicates inability more naturally than a strictly
    future-like rendering.
- source_word: οὔτε μὴ εὐλογήσωσι
  chosen: nor bless them
  alternatives:
  - nor can they bless
  - nor will they bless
  lexicon: LSJ
  rationale: Parallel to the previous clause. The omitted object in the second member
    is naturally supplied from 'kings.' 'Bless them' makes the English complete while
    preserving the Greek sense.
