id: LJE.1.65
reference: Letter of Jeremiah 1:65
source:
  edition: lxx-swete-1909
  text: Οὔτε γὰρ βασιλεῦσιν οὐ μὴ καταράσωνται οὔτε μὴ εὐλογήσωσι.
  language: Greek
