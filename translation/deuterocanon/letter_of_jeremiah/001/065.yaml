theological_decisions:
- issue: Force of emphatic negation in a polemic against idols
  chosen_reading: Render the clause as inability ('can neither ... nor ...')
  alternative_readings:
  - Render as simple future denial ('will neither ... nor ...')
  rationale: In context the verse argues that idols are powerless. Although οὐ μή
    can be rendered as emphatic future denial, English 'can neither curse kings nor
    bless them' better conveys the theological point of incapacity without adding
    content beyond the Greek.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
