id: LJE.1.32
reference: Letter of Jeremiah 1:32
source:
  edition: lxx-swete-1909
  text: ἀπὸ τοῦ ἱματισμοῦ αὐτῶν ἀφελόμενοι οἱ ἱερεῖς ἐνδύουσιν τὰς γυναῖκας αὐτῶν
    καὶ τὰ παιδία.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: After taking garments from them, the priests clothe their wives and children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, from the idols; the pronoun refers back to the images described
      in the surrounding context.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - off of
  - away from
  lexicon: BDAG
  rationale: Marks separation/source with τοῦ ἱματισμοῦ αὐτῶν; simple 'from' is natural
    English and preserves the sense of removal.
- source_word: τοῦ ἱματισμοῦ
  chosen: garments
  alternatives:
  - clothing
  - robe
  - apparel
  lexicon: BDAG
  rationale: ἱματισμός denotes clothing or garments collectively. The singular with
    article functions as a collective here; 'garments' communicates the sense better
    in English than the more abstract 'clothing' in this concrete act of stripping
    items for reuse.
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - the idols
  - those idols
  lexicon: BDAG
  rationale: The pronoun refers back to the idols described in the surrounding context.
    'Them' keeps the Greek pronoun without over-specifying in the verse itself.
- source_word: ἀφελόμενοι
  chosen: after taking
  alternatives:
  - having taken away
  - removing
  lexicon: BDAG
  rationale: Aorist middle participle of ἀφαιρέω, indicating prior action relative
    to the main verb. 'After taking' captures the participial sequence smoothly in
    English.
- source_word: οἱ ἱερεῖς
  chosen: the priests
  alternatives:
  - their priests
  lexicon: BDAG
  rationale: The Greek has the article with ἱερεῖς and no possessive. 'The priests'
    is the most direct rendering; the context already identifies them as priests serving
    the idols.
- source_word: ἐνδύουσιν
  chosen: clothe
  alternatives:
  - dress
  - put clothing on
  lexicon: BDAG
  rationale: ἐνδύω here means to put clothes on someone. 'Clothe' is concise and preserves
    the direct object structure.
- source_word: τὰς γυναῖκας αὐτῶν
  chosen: their own wives
  alternatives:
  - their wives
  - the women belonging to them
  lexicon: BDAG
  rationale: The pronoun naturally refers to the priests. Adding 'own' clarifies the
    reflexive sense in idiomatic English without changing meaning.
- source_word: τὰ παιδία
  chosen: children
  alternatives:
  - little children
  - sons and daughters
  lexicon: BDAG
  rationale: παιδία can denote children generally. 'Children' is the most natural
    and sufficiently broad rendering.
