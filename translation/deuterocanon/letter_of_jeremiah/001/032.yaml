theological_decisions:
- issue: Referent of the pronoun αὐτῶν in 'from them'
  chosen_reading: The pronoun refers to the idols' garments, i.e., the priests strip
    clothing from the idols and use it for their families.
  alternative_readings:
  - The pronoun could be left more explicitly as 'from the idols' in translation for
    clarity.
  rationale: The immediate and broader context of the Letter of Jeremiah repeatedly
    mocks idols being adorned and handled by priests. The Greek itself uses only the
    pronoun, so the main text preserves that with 'them' while allowing context to
    supply the referent.
  doctrine_reference: Preserve source-text wording unless clarity requires expansion;
    original-language primacy over translation tradition.
