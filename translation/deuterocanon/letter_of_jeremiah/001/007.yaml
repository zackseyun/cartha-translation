theological_decisions:
- issue: Nature of the predicate ψευδῆ applied to idols
  chosen_reading: they are false
  alternative_readings:
  - they are lies
  - they are fraudulent things
  rationale: The text denounces idols as unreal/false objects rather than merely deceptive
    speakers. 'They are false' preserves the polemical force without adding metaphysical
    precision the Greek does not explicitly spell out.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
