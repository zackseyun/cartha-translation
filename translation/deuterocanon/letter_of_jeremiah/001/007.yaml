id: LJE.1.7
reference: Letter of Jeremiah 1:7
source:
  edition: lxx-swete-1909
  text: Γλῶσσα γὰρ αὐτῶν ἐστιν κατεξυσμένη ὑπὸ τέκτονος, αὐτά τε περίχρυσα καὶ περιάργυρα,
    ψευδῆ δʼ ἐστίν καὶ οὐ δύνανται λαλεῖν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: For their tongue has been scraped smooth by a craftsman, and though they are
    overlaid with gold and silver, they are false and cannot speak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has been carved/polished by a craftsman.' The Greek verb emphasizes
      the artisan's scraping or smoothing work on the idol.
    reason: lexical_alternative
  - marker: b
    text: Or 'they are lies.' The Greek ψευδῆ can characterize the idols as false
      things or as embodiments of falsehood.
    reason: alternative_reading
lexical_decisions:
- source_word: Γλῶσσα
  chosen: tongue
  alternatives:
  - language
  - mouth
  lexicon: LSJ
  rationale: Primary sense is the physical 'tongue'; in context of idols being unable
    to speak, the bodily image is foregrounded rather than 'language' as an abstract
    capacity.
- source_word: κατεξυσμένη
  chosen: has been scraped smooth
  alternatives:
  - has been carved
  - has been polished
  - has been scraped
  lexicon: LSJ
  rationale: The perfect participle from καταξέω/related form suggests scraping or
    smoothing by workmanship. 'Scraped smooth' preserves the concrete artisan process
    better than the broader 'carved' while still reading naturally in English.
- source_word: ὑπὸ τέκτονος
  chosen: by a craftsman
  alternatives:
  - by a carpenter
  - by an artisan
  lexicon: LSJ
  rationale: τέκτων can denote a worker in wood or construction more broadly. Since
    the verse concerns manufactured idols and not specifically carpentry alone, 'craftsman'
    best captures the generic artisan sense.
- source_word: περίχρυσα
  chosen: overlaid with gold
  alternatives:
  - gilded
  - covered with gold
  lexicon: LSJ
  rationale: The adjective indicates being covered around with gold. 'Overlaid with
    gold' is slightly more formal than 'gilded' and matches the material description
    of idol fabrication.
- source_word: περιάργυρα
  chosen: overlaid with silver
  alternatives:
  - silver-plated
  - covered with silver
  lexicon: LSJ
  rationale: Parallel to περίχρυσα; 'overlaid with silver' preserves the symmetry
    and material emphasis.
- source_word: ψευδῆ
  chosen: 'false'
  alternatives:
  - deceitful
  - a lie
  - frauds
  lexicon: LSJ
  rationale: The neuter plural predicate describes the idols as falsehoods or false
    things. 'False' is concise and preserves the ontological critique without overinterpreting
    as active deception.
- source_word: οὐ δύνανται λαλεῖν
  chosen: cannot speak
  alternatives:
  - are not able to talk
  - cannot utter speech
  lexicon: LSJ
  rationale: A straightforward rendering of inability plus infinitive; 'speak' is
    idiomatic and fits the polemic against lifeless idols.
