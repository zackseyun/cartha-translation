id: LJE.1.6
reference: Letter of Jeremiah 1:6
source:
  edition: lxx-swete-1909
  text: ὁ γὰρ ἄγγελός μου μεθʼ ὑμῶν ἐστίν, αὐτὸς τε ἐκζητῶν τὰς ψυχὰς ὑμῶν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: For my angel is with you, and he himself is seeking your souls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your souls.' The Greek ψυχαί can mean 'souls,' 'lives,' or 'persons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελός
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: The Greek term can mean either a human messenger or a heavenly angel.
    In this context, with divine first-person speech ('my angel is with you') and
    protective oversight, 'angel' best preserves the likely supernatural sense without
    overinterpreting further.
- source_word: μεθʼ ὑμῶν
  chosen: with you
  alternatives:
  - among you
  lexicon: BDAG
  rationale: The preposition μετά with the genitive normally means 'with.' 'With you'
    is the most direct and natural rendering here.
- source_word: ἐκζητῶν
  chosen: is seeking
  alternatives:
  - is watching over
  - is caring for
  - is looking after
  lexicon: BDAG
  rationale: The participle literally denotes seeking out or searching for. Because
    the object is 'your lives/souls,' the sense is protective concern rather than
    mere searching, but the translation keeps the verbal idea 'seeking' rather than
    paraphrasing it away.
- source_word: τὰς ψυχὰς ὑμῶν
  chosen: your lives
  alternatives:
  - your souls
  - you
  lexicon: BDAG
  rationale: ψυχή can mean soul, life, self, or person. In this context of divine
    protection and care, 'your lives' communicates concrete preservation and concern
    for their persons better than the more dualistic-sounding 'your souls.' The alternative
    is preserved in a footnote because 'souls' is also lexically possible and traditional.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - himself
  lexicon: BDAG
  rationale: The pronoun is emphatic. 'He himself' preserves the emphasis that the
    angel personally undertakes this action.
