theological_decisions:
- issue: Sense of ψυχή in a protective context
  chosen_reading: your lives
  alternative_readings:
  - your souls
  rationale: The verse speaks of God's angel being with the exiles and actively concerned
    for them. Rendering ψυχαί as 'lives' better fits embodied preservation and avoids
    importing later soul/body dualism. Because 'souls' remains a legitimate lexical
    option, it is preserved in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
