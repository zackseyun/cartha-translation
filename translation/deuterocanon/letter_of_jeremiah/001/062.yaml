id: LJE.1.62
reference: Letter of Jeremiah 1:62
source:
  edition: lxx-swete-1909
  text: τό τε πῦρ ἐξαποσταλὲν ἄνωθεν ἐξαναλῶσαι ὄρη καὶ δρυμούς ποιεῖ τὸ συνταχθέν·
    ταῦτα δὲ οὔτε ταῖς ἰδέαις οὔτε ταῖς δυνάμεσιν αὐτῶν ἀφωμοιωμένα ἐστίν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: And the fire sent from above, to consume mountains and forests, does what
    it was appointed to do; but these are not comparable to it either in appearance
    or in power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does what was commanded/ordered.' The Greek expression can denote what
      has been arranged, appointed, or commanded.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'are not made like it' or 'are not likened to it' in either appearance
      or power.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῦρ
  chosen: fire
  lexicon: LSJ
  rationale: Straightforward literal sense; the verse contrasts natural destructive
    power with powerless idols.
- source_word: ἐξαποσταλὲν ἄνωθεν
  chosen: sent from above
  alternatives:
  - sent out from above
  - dispatched from above
  lexicon: LSJ
  rationale: The participle with ἄνωθεν naturally conveys something sent forth from
    above/heaven. 'Sent from above' is idiomatic and preserves the implied divine
    source without over-specifying 'heaven' where the Greek does not.
- source_word: ἐξαναλῶσαι
  chosen: to consume
  alternatives:
  - to destroy utterly
  - to burn up
  lexicon: LSJ
  rationale: The infinitive expresses the purpose/result of the fire. 'Consume' fits
    fire idiomatically and retains the sense of complete destruction.
- source_word: ὄρη καὶ δρυμούς
  chosen: mountains and forests
  alternatives:
  - mountains and woods
  - hills and forests
  lexicon: LSJ
  rationale: ὄρη is best rendered 'mountains'; δρυμοί refers to wooded tracts/forests.
    This keeps the imagery vivid and natural in English.
- source_word: ποιεῖ τὸ συνταχθέν
  chosen: does what it was appointed to do
  alternatives:
  - accomplishes what was commanded
  - does what was ordered
  lexicon: LSJ
  rationale: The neuter participle τὸ συνταχθέν denotes that which has been arranged/appointed/commanded.
    In context of fire acting under divine ordering, 'appointed' is broad and natural,
    avoiding an overly bureaucratic 'commanded' while preserving purposeful agency.
- source_word: ταῦτα
  chosen: these
  alternatives:
  - these idols
  - these things
  lexicon: LSJ
  rationale: The pronoun refers back to the idols under discussion in the broader
    context. The main text keeps the Greek's terseness with 'these' rather than adding
    'idols' not explicitly present in this clause.
- source_word: οὔτε ταῖς ἰδέαις
  chosen: either in appearance
  alternatives:
  - in form
  - in looks
  lexicon: LSJ
  rationale: ἰδέα here refers to visible form/appearance. 'Appearance' is clear modern
    English and suits the polemical comparison.
- source_word: οὔτε ταῖς δυνάμεσιν
  chosen: or in power
  alternatives:
  - or in might
  - or in capabilities
  lexicon: LSJ
  rationale: δύναμις here denotes power or effective force. 'Power' is the most natural
    and direct rendering.
- source_word: ἀφωμοιωμένα
  chosen: comparable
  alternatives:
  - made like
  - similar
  - likened
  lexicon: LSJ
  rationale: The perfect/passive idea is that the idols are not assimilated to or
    on a level with such fire. 'Comparable' communicates the sense idiomatically in
    English in this evaluative context.
