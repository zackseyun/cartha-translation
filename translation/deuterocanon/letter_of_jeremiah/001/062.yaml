theological_decisions:
- issue: Implied source of the fire 'from above'
  chosen_reading: Retain 'from above' without explicitly adding 'from heaven' or 'from
    God'.
  alternative_readings:
  - from heaven
  - from God
  rationale: The Greek ἄνωθεν implies an origin above, likely divine/heavenly in context,
    but the text does not explicitly name heaven or God in this clause. The translation
    preserves the implication without importing a stronger doctrinal specification
    than the wording warrants.
  doctrine_reference: Translation philosophy §1, §3
