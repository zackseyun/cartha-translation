theological_decisions:
- issue: Rendering the denial of divinity for idols
  chosen_reading: they are to be regarded neither as gods nor called gods
  alternative_readings:
  - they should neither be considered gods nor be named gods
  rationale: The verse denies both actual status and proper designation as gods. The
    translation preserves the double negation and the polemical force against idolatry
    without adding metaphysical explanation beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
