id: LJE.1.63
reference: Letter of Jeremiah 1:63
source:
  edition: lxx-swete-1909
  text: ὅθεν οὔτε νομιεῖσθαι οὔτε κλητέον ὑπάρχειν αὐτοὺς θεούς, οὐ δυνατῶν ὄντων
    αὐτῶν οὔτε κρίσιν κρῖναι οὔτε εὖ ποιεῖν ἀνθρώποις.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: Therefore they are to be regarded neither as gods nor called gods, since they
    are unable either to judge a case or to do good to people.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - for which reason
  - hence
  lexicon: LSJ
  rationale: Inferential conjunction drawing a conclusion from the preceding argument;
    'Therefore' is natural modern English and preserves the logical force.
- source_word: νομιεῖσθαι
  chosen: to be regarded
  alternatives:
  - to be considered
  - to be thought
  lexicon: LSJ
  rationale: The verb here concerns being held or recognized as something by convention
    or judgment. 'To be regarded' captures evaluative recognition without sounding
    overly technical.
- source_word: κλητέον ὑπάρχειν
  chosen: called
  alternatives:
  - said to be
  - designated as
  lexicon: LSJ
  rationale: The construction expresses what ought to be called or named. In English,
    'nor called gods' conveys the force idiomatically without overloading the line
    with a wooden infinitival structure.
- source_word: θεούς
  chosen: gods
  alternatives:
  - deities
  lexicon: LSJ
  rationale: Plain reference to supposed pagan gods/idols; 'gods' is the direct and
    natural rendering.
- source_word: οὐ δυνατῶν ὄντων αὐτῶν
  chosen: since they are unable
  alternatives:
  - because they are not able
  - being unable
  lexicon: LSJ
  rationale: Genitive absolute giving the reason for the conclusion. 'Since they are
    unable' reads smoothly while preserving causal force.
- source_word: κρίσιν κρῖναι
  chosen: to judge a case
  alternatives:
  - to render judgment
  - to decide a judgment
  lexicon: LSJ
  rationale: The cognate phrase emphasizes exercising judicial decision. 'Judge a
    case' is clear modern English and avoids awkward literalism while retaining the
    legal sense.
- source_word: εὖ ποιεῖν
  chosen: to do good
  alternatives:
  - to benefit
  - to do what is good
  lexicon: LSJ
  rationale: Common idiom for benefiting or doing good. 'To do good' preserves the
    lexical form and remains idiomatic.
- source_word: ἀνθρώποις
  chosen: to people
  alternatives:
  - to men
  - to human beings
  lexicon: LSJ
  rationale: Dative plural referring to humans generally. Following the project's
    gender-accurate policy, 'people' best reflects generic reference in natural English.
