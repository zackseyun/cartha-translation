theological_decisions:
- issue: Idol described with human judicial imagery
  chosen_reading: 'Retain the comparison straightforwardly: the idol holds a scepter
    like a human judge, yet cannot punish an offender.'
  alternative_readings:
  - Interpret κριτὴς χώρας more loosely as 'ruler of a province'
  rationale: The verse mocks idols by contrasting symbols of authority with actual
    impotence. A more interpretive rendering such as 'ruler' would soften the legal
    imagery present in κριτής.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
