id: LJE.1.13
reference: Letter of Jeremiah 1:13
source:
  edition: lxx-swete-1909
  text: καὶ σκήπτρον ἔχει ὡς ἄνθρωπος κριτὴς χώρας, ὃς τὸν εἰς αὐτὸν ἁμαρτάνοντα οὐκ
    ἀνελεῖ.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: And he holds a scepter like a man, a judge of a land, who will not destroy
    the one who sins against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a judge of a country/region.' The Greek χώρας can denote land, country,
      or region.
    reason: lexical_alternative
  - marker: b
    text: Or 'will not kill' or 'will not remove.' The Greek verb can carry a range
      from killing to doing away with; here it underscores the idol's inability to
      punish.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκήπτρον
  chosen: scepter
  alternatives:
  - staff
  - royal staff
  lexicon: LSJ
  rationale: The noun denotes a staff associated with rule or authority. 'Scepter'
    best preserves the regal/judicial symbolism in natural English.
- source_word: κριτὴς
  chosen: judge
  alternatives:
  - ruler
  - magistrate
  lexicon: LSJ
  rationale: The comparison is to a human official exercising authority. 'Judge' is
    the most direct rendering of κριτής and fits the legal nuance of the clause.
- source_word: χώρας
  chosen: of a land
  alternatives:
  - of a country
  - of a region
  - of the land
  lexicon: LSJ
  rationale: χώρα can mean land, country, or region. Because the anarthrous Greek
    is indefinite and comparative, 'of a land' preserves the sense without over-specifying
    a political unit.
- source_word: ἀνελεῖ
  chosen: will not destroy
  alternatives:
  - will not kill
  - will not do away with
  - will not remove
  lexicon: LSJ
  rationale: From ἀναιρέω, the verb can mean kill or remove. In this polemical context
    about idols' impotence, 'will not destroy' communicates inability to execute judgment
    without narrowing the sense only to literal killing.
- source_word: τὸν εἰς αὐτὸν ἁμαρτάνοντα
  chosen: the one who sins against him
  alternatives:
  - the one sinning against him
  - the one who offends him
  lexicon: LSJ
  rationale: The participial phrase is naturally rendered as a substantive in English.
    'Sins against him' keeps the moral/religious force of ἁμαρτάνω and the directional
    phrase εἰς αὐτόν.
- source_word: ὡς ἄνθρωπος
  chosen: like a man
  alternatives:
  - like a human being
  - as a man
  lexicon: LSJ
  rationale: The comparison stresses merely human appearance or posture. 'Like a man'
    is concise and reflects the Greek closely.
