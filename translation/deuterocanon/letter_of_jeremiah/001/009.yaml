id: LJE.1.9
reference: Letter of Jeremiah 1:9
source:
  edition: lxx-swete-1909
  text: ἔστι δὲ καὶ ὅτε ὑφαιρούμενοι οἱ ἱερεῖς ἀπὸ τῶν θεῶν αὐτῶν χρυσὸν καὶ ἀργύριον
    εἰς ἑαυτοὺς καταναλοῦσιν,
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: And there are times when the priests, taking gold and silver from their gods,
    spend it on themselves,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secretly taking away' or 'stealing' gold and silver from their gods.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστι δὲ καὶ ὅτε
  chosen: And there are times when
  alternatives:
  - But there are also times when
  - And sometimes
  lexicon: LSJ
  rationale: The idiom introduces a recurring circumstance rather than a single event.
    'And there are times when' preserves the durative/general sense while reading
    naturally in English.
- source_word: ὑφαιρούμενοι
  chosen: taking
  alternatives:
  - stealing
  - secretly taking away
  - embezzling
  lexicon: LSJ
  rationale: The participle implies taking away, often covertly, but the immediate
    context already exposes priestly misuse. 'Taking' keeps the wording anchored to
    the Greek without over-specifying criminal nuance; the stronger sense is implicit
    in context.
- source_word: οἱ ἱερεῖς
  chosen: the priests
  alternatives:
  - priests
  lexicon: LSJ
  rationale: Straightforward rendering of the subject with the article preserved in
    natural English form.
- source_word: ἀπὸ τῶν θεῶν αὐτῶν
  chosen: from their gods
  alternatives:
  - from their own gods
  - away from their gods
  lexicon: LSJ
  rationale: The phrase indicates the source from which the valuables are removed.
    'Their gods' preserves the irony that the priests plunder the very idols they
    serve.
- source_word: χρυσὸν καὶ ἀργύριον
  chosen: gold and silver
  alternatives:
  - gold and silver objects
  - gold and silver ornaments
  lexicon: LSJ
  rationale: The Greek names the precious materials directly without specifying form;
    the simple material terms should be retained.
- source_word: εἰς ἑαυτοὺς
  chosen: on themselves
  alternatives:
  - for themselves
  - for their own use
  lexicon: LSJ
  rationale: In combination with καταναλοῦσιν, the phrase conveys self-directed consumption/use.
    'Spend it on themselves' makes the selfish direction explicit in idiomatic English.
- source_word: καταναλοῦσιν
  chosen: spend it
  alternatives:
  - use it up
  - consume it
  lexicon: LSJ
  rationale: The verb means to consume or spend. Because the objects are gold and
    silver, 'spend it' best fits the economic sense in context and yields clear English.
