theological_decisions:
- issue: Portrayal of priestly misconduct toward idols
  chosen_reading: The verse is rendered to show that the priests remove valuables
    from the idols and use them for themselves, without softening the satire.
  alternative_readings:
  - A more explicit 'steal' could be used for ὑφαιρούμενοι.
  rationale: The text's theological force lies in exposing the impotence of idols
    and the corruption of their priests. The translation preserves that force while
    avoiding interpretive overreach beyond the lexical range of the participle.
  doctrine_reference: Translation philosophy §§1, 3, 6
