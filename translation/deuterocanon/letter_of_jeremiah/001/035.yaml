id: LJE.1.35
reference: Letter of Jeremiah 1:35
source:
  edition: lxx-swete-1909
  text: ἐκ θανάτου ἄνθρωπον οὐ μὴ ῥύσωνται, οὔτε ἥττονα ἀπὸ ἰσχυροῦ μὴ ἐξέλωνται·
  language: Greek
