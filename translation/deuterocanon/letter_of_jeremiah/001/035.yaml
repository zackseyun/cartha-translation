translation:
  text: They will certainly not rescue a man from death, nor will they deliver the
    weaker from the strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor will they rescue the weaker from the powerful.' The Greek uses a
      comparative adjective ('the weaker') set against 'the strong.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ θανάτου
  chosen: from death
  alternatives:
  - out of death
  - from dying
  lexicon: BDAG
  rationale: The preposition ἐκ with θανάτου naturally expresses deliverance out of
    the sphere or threat of death. 'From death' is idiomatic and preserves the sense
    without overinterpreting whether death is imminent danger or actual death.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: BDAG
  rationale: The singular ἄνθρωπον here is generic but grammatically masculine. Per
    the project's gender-accurate policy, 'a man' best matches the source form and
    the rhetoric of the passage, which speaks in representative singular terms.
- source_word: οὐ μὴ ῥύσωνται
  chosen: they will certainly not rescue
  alternatives:
  - they will by no means save
  - they will surely not deliver
  lexicon: BDAG
  rationale: οὐ μή with the future gives strong negation. 'Will certainly not' captures
    that emphasis in natural English. ῥύομαι commonly means 'rescue' or 'deliver';
    'rescue' fits the immediate context of inability to save from danger.
- source_word: ἥττονα
  chosen: the weaker
  alternatives:
  - the inferior
  - the less powerful
  - the weaker man
  lexicon: LSJ
  rationale: ἥττων denotes one who is weaker or inferior in strength/status. In contrast
    with ἰσχυροῦ ('the strong'), 'the weaker' is the clearest and most idiomatic rendering.
- source_word: ἀπὸ ἰσχυροῦ
  chosen: from the strong
  alternatives:
  - from a strong man
  - from the powerful
  lexicon: BDAG
  rationale: The phrase marks the oppressor or stronger party from whom deliverance
    would be needed. 'From the strong' preserves the concise antithesis with 'the
    weaker.'
- source_word: μὴ ἐξέλωνται
  chosen: nor will they deliver
  alternatives:
  - nor will they snatch away
  - nor will they take out
  lexicon: LSJ
  rationale: ἐξαιρέω in middle voice can mean to remove or deliver from danger. In
    this parallel clause, 'deliver' communicates the intended rescue sense more clearly
    than a more literal but less natural 'take out.'
