theological_decisions:
- issue: Nature of the idols' incapacity
  chosen_reading: The verse is rendered as a statement of practical and judicial impotence,
    not as a broader metaphysical claim beyond the text.
  alternative_readings:
  - 'A more literal but less clear rendering: ''They will certainly not distinguish
    judgment of themselves, nor certainly rescue injustice.'''
  rationale: The Greek is compressed and somewhat awkward, but the context throughout
    the Letter of Jeremiah emphasizes that idols cannot act, judge, or save. The translation
    clarifies this impotence without adding doctrinal claims not present in the verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
