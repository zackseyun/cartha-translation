id: LJE.1.53
reference: Letter of Jeremiah 1:53
source:
  edition: lxx-swete-1909
  text: κρίσίν τε οὐ μὴ διακρίνωσιν ἑαυτῶν, οὐδὲ μὴ ῥύσωνται ἀδίκημα, ἀδύνατοι ὄντες·
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: They cannot judge their own case, nor can they rescue one who is wronged,
    because they are powerless;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They cannot decide judgment for themselves, nor can they deliver from
      injustice.' The Greek is compact, and ἀδίκημα may be understood either as 'injustice/wrongdoing'
      or, by sense in context, the case or person affected by injustice.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσίν
  chosen: case
  alternatives:
  - judgment
  - justice
  - legal case
  lexicon: BDAG
  rationale: κρίσις can denote judgment or a legal case/dispute. In this context with
    διακρίνωσιν ἑαυτῶν, the sense is that the idols cannot decide or adjudicate matters
    concerning themselves; 'case' gives clear modern English while preserving juridical
    force.
- source_word: διακρίνωσιν
  chosen: judge
  alternatives:
  - decide
  - distinguish
  - adjudicate
  lexicon: BDAG
  rationale: With κρίσιν, the verb carries the sense of deciding or adjudicating a
    matter. 'Judge' is concise and natural in English, and fits the legal nuance of
    the phrase.
- source_word: ἑαυτῶν
  chosen: their own
  alternatives:
  - for themselves
  - of themselves
  lexicon: BDAG
  rationale: The reflexive pronoun indicates that the matter pertains to the idols
    themselves. 'Their own' idiomatically conveys this in English.
- source_word: ῥύσωνται
  chosen: rescue
  alternatives:
  - deliver
  - save
  lexicon: BDAG
  rationale: ῥύομαι commonly means rescue or deliver from danger or oppression. 'Rescue'
    is accessible modern English and avoids importing soteriological overtones not
    required by the context.
- source_word: ἀδίκημα
  chosen: one who is wronged
  alternatives:
  - wrongdoing
  - injustice
  - an injured party
  lexicon: BDAG
  rationale: 'Although ἀδίκημα often denotes a wrong or injustice, in this context
    after ῥύσωνται the sense is best taken concretely: they cannot rescue in a case
    of injustice, that is, the wronged party. Rendering it as ''one who is wronged''
    makes the clause intelligible in English while preserving the injustice context.'
- source_word: ἀδύνατοι ὄντες
  chosen: because they are powerless
  alternatives:
  - being powerless
  - since they are weak
  - being unable
  lexicon: BDAG
  rationale: The participial phrase gives the reason for the preceding inability.
    'Because they are powerless' expresses the causal force naturally in English and
    matches the polemical emphasis on the idols' incapacity.
