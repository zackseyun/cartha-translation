translation:
  text: Everything that happens to them is false; how then should one suppose or call
    them gods?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'how then should one think or call them gods, that they exist?' The
      Greek explicitly includes a verb of existence at the end.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα τὰ γενόμενα αὐτοῖς
  chosen: Everything that happens to them
  alternatives:
  - All the things done for them
  - Everything done to them
  - All that comes about for them
  lexicon: BDAG
  rationale: The phrase is broad and idiomatic. γενόμενα can mean 'things that happen/come
    to be,' and with αὐτοῖς here it refers to what occurs in relation to the idols.
    'Everything that happens to them' is natural English and preserves the comprehensive
    force of πάντα without over-specifying agency.
- source_word: ψευδῆ
  chosen: 'false'
  alternatives:
  - a lie
  - lies
  - deceptive
  lexicon: BDAG
  rationale: The predicate adjective is plural and characterizes the preceding 'things'
    as false or deceptive. 'False' is concise and fits the neuter plural subject better
    than the more interpretive 'deceptive.'
- source_word: πῶς οὖν
  chosen: how then
  alternatives:
  - how therefore
  - how, then
  lexicon: BDAG
  rationale: This preserves the inferential force from the previous clause in straightforward
    modern English.
- source_word: νομιστέον
  chosen: should one suppose
  alternatives:
  - must one think
  - is it to be considered
  - should it be regarded
  lexicon: LSJ
  rationale: The verbal adjective conveys what ought to be thought or considered.
    'Should one suppose' captures the impersonal deliberative sense in readable English.
- source_word: κλητέον
  chosen: or call
  alternatives:
  - or name
  - or designate
  lexicon: LSJ
  rationale: κλητέον parallels νομιστέον and concerns what they should be called.
    'Call' is the most natural English equivalent.
- source_word: ὡς θεοὺς
  chosen: them gods
  alternatives:
  - them as gods
  - them divine beings
  lexicon: BDAG
  rationale: θεούς plainly means 'gods.' The construction with κλητέον/νομιστέον is
    represented idiomatically in English as 'suppose or call them gods.'
- source_word: αὐτοὺς ὑπάρχειν
  chosen: as though they existed
  alternatives:
  - that they exist
  - them to be real
  - them to have actual being
  lexicon: BDAG
  rationale: 'ὑπάρχειν here expresses actual existence or reality. Because English
    already has ''them'' as the object of ''suppose or call,'' rendering this final
    infinitive as ''as though they existed'' preserves the sense without awkward repetition.
    It also reflects the rhetorical force: they are not truly gods with real being.'
