theological_decisions:
- issue: Nature of the rhetorical denial regarding idols
  chosen_reading: The verse denies that idols possess real divine existence, expressed
    with 'as though they existed.'
  alternative_readings:
  - The phrase could be rendered more flatly as 'that they are gods' without making
    the existential nuance explicit.
  rationale: The Greek includes αὐτοὺς ὑπάρχειν after 'suppose or call them gods,'
    which adds a nuance of actual existence/being. The translation preserves that
    nuance without importing a broader metaphysical argument beyond the verse's anti-idolatry
    polemic.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
