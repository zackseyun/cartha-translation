id: LJE.1.44
reference: Letter of Jeremiah 1:44
source:
  edition: lxx-swete-1909
  text: πάντα τὰ γενόμενα αὐτοῖς ἐστὶν ψευδῆ· πῶς οὖν νοµιστέον ἢ κλητέον ὡς θεοὺς
    αὐτοὺς ὑπάρχειν;
  language: Greek
