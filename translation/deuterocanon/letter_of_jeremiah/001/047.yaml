  - 407
  confidence: high
  validation: agree
translation:
  text: How then can the things prepared by them endure? For they have left behind
    lies and disgrace for those who come after.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the things made by them.' The Greek participle can denote things constructed
      or fashioned by human makers.
    reason: lexical_alternative
  - marker: b
    text: Or 'How then will the things made by them last?' The Greek wording is rhetorical
      and questions the lasting power of these man-made objects.
    reason: alternative_reading
lexical_decisions:
- source_word: πῶς
  chosen: How
  alternatives:
  - How?
  - In what way
  lexicon: BDAG
  rationale: Introduces a rhetorical question about possibility or manner; 'How' is
    the most natural English equivalent.
- source_word: τε δὴ
  chosen: then
  alternatives:
  - indeed then
  - therefore
  - so then
  lexicon: BDAG
  rationale: The particles add inferential and emphatic force. 'Then' captures the
    flow without overloading the English with awkward particle-by-particle rendering.
- source_word: μέλλει
  chosen: can ... endure
  alternatives:
  - is about to
  - is destined to
  - is going to
  lexicon: BDAG
  rationale: 'With the rhetorical question and the context of idol impotence, a wooden
    future-like rendering (''is about to'') is unnatural in English. The sense is
    prospective viability: how could such things continue or stand? ''Can ... endure''
    expresses that force idiomatically.'
- source_word: τὰ ὑπʼ αὐτῶν κατασκευασθέντα
  chosen: the things prepared by them
  alternatives:
  - the things made by them
  - what they have constructed
  - the things fashioned by them
  lexicon: BDAG
  rationale: The participle denotes things made or constructed by human makers, referring
    to idols. 'Prepared by them' stays close to the Greek while remaining readable;
    alternatives are possible, especially 'made by them'.
- source_word: κατέλιπον
  chosen: they have left behind
  alternatives:
  - they left
  - they bequeathed
  - they abandoned
  lexicon: BDAG
  rationale: The verb here points to what the makers have handed on to later generations.
    'Left behind' preserves that legacy sense better than 'abandoned'.
- source_word: ψεύδη
  chosen: lies
  alternatives:
  - falsehoods
  - deceptions
  lexicon: BDAG
  rationale: Plural 'lies' is direct and natural, fitting the polemic against idols
    as fraudulent objects.
- source_word: ὄνειδος
  chosen: disgrace
  alternatives:
  - reproach
  - shame
  - dishonor
  lexicon: BDAG
  rationale: The noun denotes public shame or reproach. 'Disgrace' communicates both
    the dishonor and the enduring stigma.
- source_word: τοῖς ἐπιγινομένοις
  chosen: for those who come after
  alternatives:
  - for later generations
  - for those who follow
  - for posterity
  lexicon: BDAG
  rationale: The participle refers to subsequent people or generations. 'Those who
    come after' is clear, natural, and preserves the forward-looking sense.
