id: LJE.1.47
reference: Letter of Jeremiah 1:47
source:
  edition: lxx-swete-1909
  text: πῶς τε δὴ μέλλει τὰ ὑπʼ αὐτῶν κατασκευασθέντα; κατέλιπον γὰρ ψεύδη καὶ ὄνειδος
    τοῖς ἐπιγινομένοις.
  language: Greek
  pages:
