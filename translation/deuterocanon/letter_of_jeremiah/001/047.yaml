theological_decisions:
- issue: Referent of the human-made objects
  chosen_reading: The phrase refers to idols or cult objects made by human hands.
  alternative_readings:
  - A broader reference to anything constructed by idolaters
  rationale: The immediate context throughout the Letter of Jeremiah is a sustained
    denunciation of idols. The translation keeps the wording general ('the things
    prepared by them') rather than inserting 'idols' into the main text, but the rationale
    recognizes the contextual referent.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import
    claims beyond the text.'
