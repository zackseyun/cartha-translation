  confidence: high
  validation: minor_mismatch
translation:
  text: Therefore be on your guard, lest you too, having become like the foreigners,
    become like them, and fear seize you because of them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be assimilated to the foreigners ... be assimilated.' The Greek repeats
      the same verb twice for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλαβήθητε
  chosen: be on your guard
  alternatives:
  - beware
  - be reverent
  - be cautious
  lexicon: LSJ
  rationale: Aorist passive imperative used in a warning context. In English, 'be
    on your guard' captures the urgent caution better than the more archaic 'beware'
    while avoiding the misleadingly devotional sense 'be reverent'.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: LSJ
  rationale: Marks inference from the preceding warning; 'therefore' preserves the
    logical connection clearly.
- source_word: μὴ καὶ ὑμεῖς
  chosen: lest you too
  alternatives:
  - so that you also may not
  - that you yourselves not also
  lexicon: LSJ
  rationale: Idiomatic English rendering of the negative purpose/warning construction,
    preserving the inclusion of the audience ('you too').
- source_word: ἀφομοιωθέντες ... ἀφομοιωθῆτε
  chosen: having become like ... become like
  alternatives:
  - having been assimilated to ... be assimilated
  - having been conformed to ... be conformed
  lexicon: LSJ
  rationale: The Greek repeats the same verb in participial and finite forms for emphasis.
    'Become like' is natural English and preserves the rhetorical repetition without
    sounding overly technical. 'Assimilated' is possible but too sociological for
    this context.
- source_word: τοῖς ἀλλοφύλοις
  chosen: the foreigners
  alternatives:
  - the nations
  - the Gentiles
  - those of another people
  lexicon: LSJ
  rationale: ἀλλόφυλος literally denotes those of another tribe/people. 'Foreigners'
    is the most straightforward and accessible rendering here. 'Gentiles' would import
    later Jewish/Christian technical associations not required by the text.
- source_word: φόβος ὑμᾶς λάβῃ
  chosen: fear seize you
  alternatives:
  - fear take hold of you
  - you be overcome by fear
  lexicon: LSJ
  rationale: A vivid idiom in Greek; 'fear seize you' preserves the force and personification
    of φόβος as something that overtakes the hearers.
- source_word: ἐπʼ αὐτοῖς
  chosen: because of them
  alternatives:
  - at them
  - over them
  - on account of them
  lexicon: LSJ
  rationale: 'In context the sense is causal: fear comes upon the hearers in relation
    to the foreigners/idolaters. ''Because of them'' is the clearest idiomatic English
    rendering.'
