theological_decisions:
- issue: Referent and force of the repeated ἀφομοιόω warning
  chosen_reading: A warning against becoming like the foreign peoples in their idolatrous
    behavior
  alternative_readings:
  - A broader warning against social assimilation in general
  rationale: The immediate context concerns fear before idols and imitation of surrounding
    nations. The translation keeps the wording broad enough to reflect the Greek while
    the rationale notes the likely contextual focus on idolatrous conformity rather
    than ethnicity as such.
