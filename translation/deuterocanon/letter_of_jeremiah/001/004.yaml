id: LJE.1.4
reference: Letter of Jeremiah 1:4
source:
  edition: lxx-swete-1909
  text: εὐλαβήθητε οὖν μὴ καὶ ὑμεῖς ἀφομοιωθέντες τοῖς ἀλλοφύλοις ἀφομοιωθῆτε, καὶ
    φόβος ὑμᾶς λάβῃ ἐπʼ αὐτοῖς,
  language: Greek
  pages:
