id: LJE.1.58
reference: Letter of Jeremiah 1:58
source:
  edition: lxx-swete-1909
  text: ὥστε κρεῖσσον εἶναι βασιλέα ἐπιδεικνύμενον τὴν ἑαυτοῦ ἀνδρείαν ἢ σκεῖος ἐν
    οἰκίᾳ χρήσιμον, ἐφʼ ᾧ χρήσεται ὁ κεκτημένος, ἢ οἱ ψευδεῖς θεοί· ἢ καὶ θύρα ἐν
    οἰκίᾳ διασώζουσα τὰ ἐν αὐτῇ ὄντα ἢ οἱ ψευδεῖς θεοί· καὶ ξύλινος στύλος ἐν βασιλείοις
    ἢ οἱ ψευδεῖς θεοί.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: So a king who displays his own courage is better than the false gods, or a
    useful vessel in a house, which its owner will use, or a door in a house that
    keeps safe the things in it, or the false gods, and a wooden pillar in palaces
    is better than the false gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek repeats 'than the false gods' after each comparison for emphasis;
      the translation preserves that repetition as much as possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: So
  alternatives:
  - therefore
  - thus
  lexicon: BDAG
  rationale: Introduces the concluding inference from the preceding argument. 'So'
    gives a natural English conclusion marker without sounding overly formal.
- source_word: κρεῖσσον
  chosen: better
  alternatives:
  - superior
  lexicon: BDAG
  rationale: Comparative adjective meaning 'better/superior.' 'Better' is idiomatic
    and preserves the repeated comparison with the idols.
- source_word: βασιλέα
  chosen: a king
  alternatives:
  - the king
  lexicon: BDAG
  rationale: Anarthrous accusative in a comparative construction; the sense is generic
    rather than a specific king.
- source_word: ἐπιδεικνύμενον τὴν ἑαυτοῦ ἀνδρείαν
  chosen: who displays his own courage
  alternatives:
  - showing his own valor
  - demonstrating his own bravery
  lexicon: BDAG
  rationale: The participle modifies 'king.' ἀνδρεία denotes courage/valor/bravery.
    'Displays his own courage' is clear modern English and preserves the reflexive
    emphasis of ἑαυτοῦ.
- source_word: σκεῖος
  chosen: vessel
  alternatives:
  - container
  - implement
  - utensil
  lexicon: BDAG
  rationale: A broad term for an object or vessel. 'Vessel' keeps the generality and
    fits the household comparison.
- source_word: χρήσιμον
  chosen: useful
  alternatives:
  - serviceable
  lexicon: BDAG
  rationale: Straightforward adjective describing practical utility, central to the
    contrast with useless idols.
- source_word: ἐφʼ ᾧ χρήσεται ὁ κεκτημένος
  chosen: which its owner will use
  alternatives:
  - which the one possessing it will use
  - which its possessor will make use of
  lexicon: BDAG
  rationale: The relative phrase explains the vessel's practical value. 'Owner' is
    a natural rendering of ὁ κεκτημένος in context.
- source_word: οἱ ψευδεῖς θεοί
  chosen: the false gods
  alternatives:
  - the lying gods
  - the deceitful gods
  lexicon: BDAG
  rationale: ψευδεῖς here characterizes the idols as false, not true deities. 'False
    gods' is the clearest idiomatic English equivalent.
- source_word: θύρα
  chosen: a door
  alternatives:
  - gate
  lexicon: BDAG
  rationale: In a house context, 'door' is the natural rendering.
- source_word: διασώζουσα τὰ ἐν αὐτῇ ὄντα
  chosen: that keeps safe the things in it
  alternatives:
  - preserving what is in it
  - protecting the contents within
  lexicon: BDAG
  rationale: The participle describes the door's protective function. 'Keeps safe'
    is accessible and preserves the sense of protection/preservation.
- source_word: ξύλινος στύλος
  chosen: a wooden pillar
  alternatives:
  - a wooden post
  - a timber column
  lexicon: BDAG
  rationale: A literal architectural object contrasted with idols. 'Wooden pillar'
    is clear and suitably formal.
- source_word: ἐν βασιλείοις
  chosen: in palaces
  alternatives:
  - in royal houses
  lexicon: BDAG
  rationale: Plural noun referring to royal buildings; 'palaces' is the most natural
    English equivalent.
