theological_decisions:
- issue: Rhetorical comparison structure in a verse with repeated ἢ οἱ ψευδεῖς θεοί
  chosen_reading: Preserve the repeated comparisons explicitly rather than smoothing
    them into a single summary statement.
  alternative_readings:
  - Condense the verse to 'better than the false gods are a king... a useful vessel...
    a door... and a wooden pillar'
  rationale: The Greek repeats the contrast for rhetorical force. Although the syntax
    is somewhat loose in English, retaining the repeated comparisons better reflects
    the source's polemical cadence and avoids over-smoothing.
  doctrine_reference: Translation philosophy §§1, 5, 6
