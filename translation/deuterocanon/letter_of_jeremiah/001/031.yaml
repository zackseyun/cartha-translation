  rationale: Although the referents are idols, the Greek explicitly says 'their gods.'
    Retaining 'gods' preserves the polemical force of the source text rather than
    interpreting it in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source wording unless context demands otherwise.'
