id: LJE.1.31
reference: Letter of Jeremiah 1:31
source:
  edition: lxx-swete-1909
  text: ὠρύονται δὲ βοῶντες ἐναντίον τῶν θεῶν αὐτῶν ὥσπερ τινὲς ἐν περιδείπνῳ νεκροῦ.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: But they howl, crying out before their gods, like some at a funeral meal for
    the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at a meal for the dead' or 'at a funerary banquet.' The Greek refers
      to a mourning or funerary meal connected with a deceased person.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠρύονται
  chosen: they howl
  alternatives:
  - they roar
  - they wail
  - they cry out
  lexicon: LSJ
  rationale: The verb denotes loud, animal-like or lament-like crying. 'Howl' best
    preserves the vivid, derisive force in context without overformal wording.
- source_word: βοῶντες
  chosen: shouting
  alternatives:
  - crying out
  - calling aloud
  lexicon: LSJ
  rationale: A participle of loud vocalization. 'Shouting' fits natural English alongside
    'they howl' and preserves the sense of noisy outcry.
- source_word: ἐναντίον
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: LSJ
  rationale: 'Here the spatial sense is primary: they are making this noise in front
    of their idols/gods.'
- source_word: θεῶν
  chosen: gods
  alternatives:
  - idols
  lexicon: LSJ
  rationale: The Greek says 'gods,' reflecting the polemical description of idols
    as the supposed gods of the nations. 'Gods' preserves the wording of the source;
    the broader context makes clear these are idols.
- source_word: ὥσπερ
  chosen: like
  alternatives:
  - just as
  - as
  lexicon: LSJ
  rationale: Simple comparison marker; 'like' is the most natural modern equivalent.
- source_word: τινὲς
  chosen: some
  alternatives:
  - certain people
  lexicon: LSJ
  rationale: Indefinite plural. 'Some' is concise and idiomatic.
- source_word: ἐν περιδείπνῳ νεκροῦ
  chosen: at a funeral meal for the dead
  alternatives:
  - at a meal for the dead
  - at a funerary banquet
  - at a wake meal
  lexicon: LSJ
  rationale: The phrase refers to a meal associated with mourning or rites for a deceased
    person. 'Funeral meal for the dead' communicates the cultural setting clearly
    in modern English while staying close to the Greek.
