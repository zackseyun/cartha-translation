id: LJE.1.52
reference: Letter of Jeremiah 1:52
source:
  edition: lxx-swete-1909
  text: βασιλέα γὰρ χώρας οὐ μὴ ἀναστήσωσιν, οὔτε ὑετὸν ἀνθρώποις οὐ μὴ δῶσιν,
  language: Greek
