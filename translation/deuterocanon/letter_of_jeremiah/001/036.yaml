id: LJE.1.36
reference: Letter of Jeremiah 1:36
source:
  edition: lxx-swete-1909
  text: ἄνθρωπον τυφλὸν εἰς ὅρασιν οὐ μὴ περιστήσωσιν, ἐν ἀνάγκῃ ἄνθρωπον ὄντα οὐ
    μὴ ἐξέλωνται.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: They certainly cannot set a blind man upright for seeing, nor can they rescue
    a man when he is in distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cannot at all cause a blind man to see.' The Greek phrase is compact
      and may be understood more broadly than the more literal 'set a blind man upright
      for seeing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The Greek uses the singular accusative ἄνθρωπον twice. In this context
    it refers to an individual human being in representative fashion. Per project
    philosophy, a gender-accurate rendering is preferred where the source uses masculine
    human reference; 'a man' preserves that form better than the more neutral 'a person'.
- source_word: τυφλὸν
  chosen: blind
  alternatives:
  - sightless
  lexicon: BDAG
  rationale: Plain adjectival sense describing physical blindness; 'blind' is the
    natural modern English equivalent.
- source_word: εἰς ὅρασιν
  chosen: for seeing
  alternatives:
  - to sight
  - for vision
  - to see
  lexicon: BDAG
  rationale: Literally 'into/for seeing, vision.' The phrase expresses the purpose
    or result the idols cannot bring about for the blind man. 'For seeing' keeps the
    Greek's compactness and avoids overinterpreting as miraculous healing language
    not explicitly stated.
- source_word: οὐ μὴ
  chosen: certainly cannot
  alternatives:
  - will by no means
  - cannot at all
  lexicon: BDAG
  rationale: The emphatic negation οὐ μή strongly denies possibility. In English,
    'certainly cannot' conveys the force idiomatically without sounding archaic.
- source_word: περιστήσωσιν
  chosen: set ... upright
  alternatives:
  - set around
  - restore
  - cause to stand
  lexicon: LSJ
  rationale: From περιστήνω/παρίστημι-related usage, here likely meaning to set or
    place someone in a condition. Given the object 'a blind man' and the following
    purpose phrase, 'set ... upright' best reflects the physical-help context without
    importing a stronger healing sense than the Greek requires.
- source_word: ἐν ἀνάγκῃ
  chosen: when he is in distress
  alternatives:
  - in need
  - in trouble
  - under compulsion
  lexicon: BDAG
  rationale: ἀνάγκη here denotes a state of hardship or pressing trouble. 'In distress'
    fits the context of inability to help or rescue.
- source_word: ὄντα
  chosen: when he is
  alternatives:
  - being
  - who is
  lexicon: BDAG
  rationale: 'The participle modifies ἄνθρωπον and is naturally rendered in English
    as a temporal/state clause: ''when he is in distress.'''
- source_word: ἐξέλωνται
  chosen: rescue
  alternatives:
  - deliver
  - take out
  lexicon: BDAG
  rationale: The middle form from ἐξαιρέω commonly means to deliver or rescue from
    danger. 'Rescue' is clear modern English and suits the distress context.
