theological_decisions:
- issue: Anthropological gender in generic singular ἄνθρωπον
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The verse uses masculine singular human reference generically. Following
    the project's gender-accurate policy, the translation preserves the source's form
    rather than neutralizing it, while the sense remains representative rather than
    exclusively male.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Strength of the idols' inability
  chosen_reading: certainly cannot
  alternative_readings:
  - will by no means be able to
  rationale: The verse is part of a polemic against idols and uses emphatic negation.
    The rendering preserves the force of total inability without archaic English.
  doctrine_reference: DOCTRINE.md § Translation philosophy 6
