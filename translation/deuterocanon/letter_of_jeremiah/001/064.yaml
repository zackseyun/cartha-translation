id: LJE.1.64
reference: Letter of Jeremiah 1:64
source:
  edition: lxx-swete-1909
  text: γνόντες οὖν ὅτι οὐκ εἰσὶν θεοί, μὴ φοβῆσθε αὐτούς.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: Therefore, knowing that they are not gods, do not fear them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they are no gods.' The Greek literally says 'they are not gods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνόντες
  chosen: knowing
  alternatives:
  - having known
  - when you know
  - recognizing
  lexicon: BDAG
  rationale: Aorist participle of γινώσκω, here functioning circumstantially/causally.
    'Knowing' gives natural English while preserving the sense that the command rests
    on recognized reality.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding argument. 'Therefore' best preserves
    the logical force in clear modern English.
- source_word: οὐκ εἰσὶν θεοί
  chosen: they are not gods
  alternatives:
  - they are not divine beings
  - they are no gods
  lexicon: BDAG
  rationale: Straightforward negated predicate. 'Gods' matches θεοί directly and fits
    the polemic against idols without adding interpretive nuance.
- source_word: μὴ φοβῆσθε
  chosen: do not fear
  alternatives:
  - do not be afraid of
  - do not dread
  lexicon: BDAG
  rationale: Present/middle-passive imperative in prohibitive use. 'Do not fear' is
    concise, idiomatic, and preserves the direct object construction with αὐτούς.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - those things
  - those idols
  lexicon: BDAG
  rationale: The pronoun refers to the idols just discussed. 'Them' preserves the
    Greek wording without importing an explanatory noun into the main text.
