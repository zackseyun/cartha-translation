theological_decisions:
- issue: Rendering θεοί in an anti-idolatry context
  chosen_reading: gods
  alternative_readings:
  - divine beings
  - no gods
  rationale: The text denies true deity to the idols. 'Gods' keeps the direct lexical
    correspondence and the rhetorical force of the polemic, while avoiding the more
    interpretive English idiom 'no gods' in the main text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
