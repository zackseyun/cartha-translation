id: LJE.1.50
reference: Letter of Jeremiah 1:50
source:
  edition: lxx-swete-1909
  text: ὑπάρχοντα γὰρ ξύλινα καὶ περίχρυσα καὶ περιάργυρα γνωσθήσεται μετὰ ταῦτα ὅτι
    ἐστὶν ψευδῆ· τοῖς ἔθνεσι πᾶσι τοῖς τε βασιλεῦσι φανερὸν ἔσται ὅτι οὐκ εἰσὶ θεοὶ
    ἀλλὰ ἔργα χειρῶν ἀνθρώπων, καὶ οὐθὲν θεοῦ ἔργον ἐν αὐτοῖς ἐστίν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: For since they are wooden and overlaid with gold and silver, afterward it
    will be known that they are false; to all the nations and to the kings it will
    be evident that they are not gods but works of human hands, and there is no work
    of God in them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπάρχοντα
  chosen: they are
  alternatives:
  - being
  - existing as
  lexicon: BDAG
  rationale: Used with the predicate adjectives/material descriptors to state their
    actual nature. English 'they are' gives a natural rendering in context without
    over-translating the participial form.
- source_word: ξύλινα
  chosen: wooden
  alternatives:
  - made of wood
  - wood
  lexicon: LSJ
  rationale: Directly denotes material composition. 'Wooden' is concise and idiomatic
    in English.
- source_word: περίχρυσα
  chosen: overlaid with gold
  alternatives:
  - gilded
  - gold-covered
  lexicon: LSJ
  rationale: The prefix suggests being covered around/over with gold rather than being
    solid gold. 'Overlaid with gold' preserves that nuance better than the simpler
    'gilded'.
- source_word: περιάργυρα
  chosen: overlaid with silver
  alternatives:
  - silver-plated
  - silver-covered
  lexicon: LSJ
  rationale: Parallel to περίχρυσα; 'overlaid with silver' keeps the formal symmetry
    and the sense of external covering.
- source_word: γνωσθήσεται
  chosen: it will afterward be known
  alternatives:
  - it will be recognized later
  - it will become known afterward
  lexicon: BDAG
  rationale: Future passive indicates a later public recognition. Rendering with impersonal
    'it will ... be known' fits the Greek construction and prepares for the following
    public exposure.
- source_word: μετὰ ταῦτα
  chosen: afterward
  alternatives:
  - after these things
  - later
  lexicon: BDAG
  rationale: Temporal adverbial sense is clear here. 'Afterward' is natural English
    and preserves the future exposure motif.
- source_word: ψευδῆ
  chosen: 'false'
  alternatives:
  - lies
  - frauds
  - deceptive things
  lexicon: BDAG
  rationale: Predicate adjective describing the idols as false/deceptive, not genuine
    deities. 'False' is broad enough to preserve both ontological and deceptive force.
- source_word: τοῖς ἔθνεσι πᾶσι τοῖς τε βασιλεῦσι
  chosen: to all the nations and to the kings
  alternatives:
  - among all the nations and kings
  - to every nation and to the kings
  lexicon: BDAG
  rationale: The dative with φανερὸν ἔσται is naturally rendered as the parties to
    whom the matter becomes evident. The τε links kings with the nations; explicit
    repetition of 'to' keeps the structure clear in English.
- source_word: φανερὸν ἔσται
  chosen: it will be evident
  alternatives:
  - it will be manifest
  - it will be plain
  lexicon: BDAG
  rationale: Expresses public obviousness. 'Evident' is readable modern English without
    losing force.
- source_word: θεοὶ
  chosen: gods
  alternatives:
  - divine beings
  lexicon: BDAG
  rationale: Straightforward plural of θεός. In this anti-idol polemic, 'gods' is
    the natural English equivalent.
- source_word: ἔργα χειρῶν ἀνθρώπων
  chosen: works of human hands
  alternatives:
  - works of men's hands
  - things made by human hands
  - handiwork of humans
  lexicon: BDAG
  rationale: Keeps the biblical idiom of human manufacture while using gender-accurate
    'human' per project philosophy.
- source_word: οὐθὲν θεοῦ ἔργον
  chosen: no work of God
  alternatives:
  - nothing wrought by God
  - no divine work
  lexicon: BDAG
  rationale: The phrase contrasts human manufacture with anything produced by God.
    'No work of God' is direct and preserves the genitive relation.
- source_word: ἐν αὐτοῖς ἐστίν
  chosen: is in them
  alternatives:
  - exists in them
  - is found in them
  lexicon: BDAG
  rationale: 'Simple existential statement. ''In them'' preserves the Greek preposition
    and leaves the exact nuance broad: neither divine agency nor divine workmanship
    inheres in the idols.'
