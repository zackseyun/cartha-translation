theological_decisions:
- issue: Nature of ψευδῆ in idol polemic
  chosen_reading: Rendered as 'false' to describe the idols as fraudulent/non-genuine
    objects of worship rather than as merely 'lies' in the abstract.
  alternative_readings:
  - lies
  - deceptive things
  rationale: The context emphasizes that these objects are materially crafted and
    not true gods. 'False' preserves the theological contrast without forcing a more
    metaphorical noun sense.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
- issue: Gender in ἔργα χειρῶν ἀνθρώπων
  chosen_reading: Rendered 'works of human hands' rather than 'men's hands.'
  alternative_readings:
  - works of men's hands
  rationale: ἀνθρώπων is inclusive for human beings, not specifically males. This
    follows the project's gender-accurate principle while preserving the anti-idol
    formula.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral.
