theological_decisions:
- issue: Agency and purpose of the heavenly bodies
  chosen_reading: The verse presents the sun, moon, and stars as created entities
    carrying out assigned functions and obeying implicitly divine ordering.
  alternative_readings:
  - 'A more impersonal reading: they simply function regularly in nature'
  rationale: The passive participle 'sent out' and adjective 'obedient' together suggest
    more than mere natural regularity; they imply responsiveness to an ordering authority.
    The translation preserves that implication without explicitly adding 'God' where
    the verse does not name him.
  doctrine_reference: Preserve theological tension rather than resolve it
