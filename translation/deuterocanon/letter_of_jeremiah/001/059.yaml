id: LJE.1.59
reference: Letter of Jeremiah 1:59
source:
  edition: lxx-swete-1909
  text: ἥλιος μὲν γὰρ καὶ σελήνη καὶ ἄστρα ὄντα λαμπρὰ καὶ ἀποστελλόμενα ἐπὶ χρείας
    εὐήκοά εἰσιν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: For the sun and the moon and the stars, being bright and sent out for service,
    are obedient.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for service' or 'for necessary uses'; the Greek phrase can denote usefulness
      in meeting needs or fulfilling appointed functions.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥλιος
  chosen: sun
  lexicon: LSJ
  rationale: Standard rendering for the celestial body; no contextual reason to vary.
- source_word: σελήνη
  chosen: moon
  lexicon: LSJ
  rationale: Standard rendering for the celestial body; paired with sun and stars
    in a conventional triad.
- source_word: ἄστρα
  chosen: stars
  lexicon: LSJ
  rationale: Plural celestial bodies; straightforward lexical equivalent.
- source_word: ὄντα λαμπρά
  chosen: being bright
  alternatives:
  - being radiant
  - shining
  lexicon: LSJ
  rationale: The participle plus adjective describes their luminous state. 'Being
    bright' preserves the predicative force without over-stylizing.
- source_word: ἀποστελλόμενα
  chosen: sent out
  alternatives:
  - sent
  - dispatched
  lexicon: LSJ
  rationale: Passive participle from ἀποστέλλω. 'Sent out' preserves the verbal imagery
    of being commissioned for a function.
- source_word: ἐπὶ χρείας
  chosen: for needs
  alternatives:
  - for service
  - for necessary uses
  - for their appointed purposes
  lexicon: LSJ
  rationale: χρεία denotes need, use, or service. 'For needs' stays close to the Greek
    while allowing the sense that these heavenly bodies serve useful purposes in creation.
- source_word: εὐήκοά
  chosen: obedient
  alternatives:
  - compliant
  - ready to obey
  lexicon: LSJ
  rationale: The adjective means obedient or attentive to command. In context it contrasts
    created heavenly bodies, which obey, with idols, which cannot act.
