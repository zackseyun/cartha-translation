theological_decisions:
- issue: Rhetorical force of the impersonal verbal adjectives νομιστέον and κλητέον
  chosen_reading: Render as a rhetorical question about whether these idols ought
    to be regarded or called gods
  alternative_readings:
  - How then must one suppose or call them gods?
  - How then are they to be considered or named gods?
  rationale: The verse concludes an anti-idol argument by challenging the legitimacy
    of the title 'gods.' The translation preserves the rhetorical and evaluative force
    without importing a stronger metaphysical claim than the Greek states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
