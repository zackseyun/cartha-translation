id: LJE.1.39
reference: Letter of Jeremiah 1:39
source:
  edition: lxx-swete-1909
  text: πῶς οὖν νομιστέον ἢ κλητέον αὐτοὺς ὑπάρχειν θεούς;
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: How then should they be regarded or called gods?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'How then must they be considered or called gods?'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  chosen: How
  alternatives:
  - in what way
  - how then
  lexicon: BDAG
  rationale: Introduces a rhetorical question about the propriety of the designation;
    simple 'How' is natural English and preserves the force.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding argument against idols; 'then' fits
    the rhetorical flow in English.
- source_word: νομιστέον
  chosen: should they be regarded
  alternatives:
  - must they be considered
  - is one to think them
  lexicon: LSJ
  rationale: The verbal adjective conveys what ought to be thought or considered about
    them. 'Should they be regarded' captures the impersonal/deontic sense in idiomatic
    English.
- source_word: ἢ
  chosen: or
  lexicon: BDAG
  rationale: Simple disjunction linking two near-synonymous evaluative verbs.
- source_word: κλητέον
  chosen: called
  alternatives:
  - named
  - designated
  lexicon: LSJ
  rationale: The verbal adjective means what ought to be called or named. 'Called'
    is the most direct and natural rendering.
- source_word: αὐτούς
  chosen: they
  alternatives:
  - them
  lexicon: BDAG
  rationale: Object in Greek becomes subject of the passive-like English construction
    'should they be regarded or called'; this preserves sense while producing natural
    English.
- source_word: ὑπάρχειν
  chosen: be
  alternatives:
  - exist as
  - be in fact
  lexicon: BDAG
  rationale: With θεούς after νομιστέον/κλητέον, the infinitive functions as the complement
    of what they are supposed to be considered/called. English can omit the heavier
    'exist as' and simply say 'be' without loss.
- source_word: θεούς
  chosen: gods
  alternatives:
  - divine beings
  lexicon: BDAG
  rationale: In context of idol polemic, the straightforward plural 'gods' is required
    and preserves the contrast with the claim made for idols.
