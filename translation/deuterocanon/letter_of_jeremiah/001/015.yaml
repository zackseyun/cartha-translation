translation:
  text: For just as a vessel of a man, once broken, becomes useless,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a human vessel' or 'a vessel belonging to a person.' The Greek genitive
      ἀνθρώπου is somewhat compressed; the main text preserves the most straightforward
      sense without over-interpreting.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥσπερ
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: LSJ
  rationale: Introduces a comparison; 'just as' gives clear comparative force in natural
    English.
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: LSJ
  rationale: Retains the explanatory connective at the start of the clause.
- source_word: σκεῦος
  chosen: vessel
  alternatives:
  - container
  - implement
  - article
  lexicon: LSJ
  rationale: '''Vessel'' is the most natural broad rendering for an object made for
    use; it preserves the image without over-specifying pottery.'
- source_word: ἀνθρώπου
  chosen: of a man
  alternatives:
  - human
  - belonging to a person
  - made by a man
  lexicon: LSJ
  rationale: The genitive most naturally qualifies the vessel as a human person's
    vessel rather than a sacred object. 'Of a man' keeps the Greek's gender-accurate
    singular wording and avoids importing a more interpretive sense such as 'man-made.'
- source_word: συντριβὲν
  chosen: once broken
  alternatives:
  - having been shattered
  - when broken
  - broken
  lexicon: LSJ
  rationale: Aorist passive participial sense is well conveyed by 'once broken,' expressing
    completed damage prior to the resulting state.
- source_word: ἄχρειον
  chosen: useless
  alternatives:
  - unserviceable
  - good for nothing
  - of no use
  lexicon: LSJ
  rationale: Conveys loss of practical value in clear modern English.
- source_word: γίνεται
  chosen: becomes
  alternatives:
  - comes to be
  - is
  lexicon: LSJ
  rationale: Expresses the resulting change of state after being broken.
