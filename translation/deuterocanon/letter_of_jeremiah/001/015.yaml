id: LJE.1.15
reference: Letter of Jeremiah 1:15
source:
  edition: lxx-swete-1909
  text: Ὥσπερ γὰρ σκεῦος ἀνθρώπου συντριβὲν ἄχρειον γίνεται,
  language: Greek
