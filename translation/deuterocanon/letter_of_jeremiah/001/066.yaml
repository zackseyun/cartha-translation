id: LJE.1.66
reference: Letter of Jeremiah 1:66
source:
  edition: lxx-swete-1909
  text: σημεῖά τε ἐν ἔθνεσιν ἐν οὐρανῷ οὐ μὴ δείξωσιν, οὐδὲ ὡς ὁ ἥλιος λάμψουσιν,
    οὐδὲ φωτιοῦσιν ὡς σελήνη.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: They will certainly not show signs among the nations in heaven, nor will they
    shine like the sun, nor give light like the moon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sky.' The Greek οὐρανός can refer either to heaven or to the
      sky; the context is celestial phenomena.
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖά
  chosen: signs
  alternatives:
  - portents
  - omens
  lexicon: LSJ
  rationale: σημεῖον commonly denotes a sign or portent. 'Signs' is the broadest and
    most natural English rendering here, fitting celestial phenomena without over-specifying
    ominous meaning.
- source_word: ἐν ἔθνεσιν
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: LSJ
  rationale: ἔθνη in LXX usage commonly means nations/peoples. 'Among the nations'
    is idiomatic and avoids importing later NT-specific 'Gentiles' language.
- source_word: ἐν οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the sky
  lexicon: LSJ
  rationale: οὐρανός can mean heaven or sky. Because the phrase concerns celestial
    signs and luminaries, either is possible; 'in heaven' preserves the Greek wording
    and biblical register while remaining understandable.
- source_word: οὐ μὴ δείξωσιν
  chosen: will certainly not show
  alternatives:
  - will by no means display
  - will never show
  lexicon: LSJ
  rationale: οὐ μή with the subjunctive is an emphatic negation. 'Will certainly not
    show' captures the force in clear modern English without sounding wooden.
- source_word: λάμψουσιν
  chosen: shine
  alternatives:
  - beam
  - gleam
  lexicon: LSJ
  rationale: The verb straightforwardly refers to shining. 'Shine' is the standard
    and most natural rendering in comparison with the sun.
- source_word: φωτιοῦσιν
  chosen: give light
  alternatives:
  - illumine
  - light up
  lexicon: LSJ
  rationale: The verb means to provide light or illumination. 'Give light' is idiomatic,
    readable, and preserves the distinction from the previous verb 'shine'.
- source_word: σελήνη
  chosen: moon
  lexicon: LSJ
  rationale: Standard rendering for the celestial body in this comparison.
