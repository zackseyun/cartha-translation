theological_decisions:
- issue: Referent of the plural verbs and implied subject
  chosen_reading: The verse continues the polemic against idols, stating that they
    cannot perform heavenly signs or shine like celestial bodies.
  alternative_readings:
  - A more generalized statement about false gods without explicit 'idols' supplied
    in the verse itself
  rationale: The Greek has only plural verbs here, with the subject carried over from
    context. English requires an explicit subject, so 'They' is supplied minimally
    from the immediate discourse without expanding the claim beyond the context.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import claims beyond the text.
