theological_decisions:
- issue: Referent of the plural pronouns
  chosen_reading: The pronouns refer to the idols, whose faces are being wiped by
    others.
  alternative_readings:
  - The wording could be taken more woodenly as if the idols themselves 'wipe' their
    faces, but the context of idol satire implies attendants perform the action.
  rationale: The broader passage mocks idols as helpless objects requiring human care.
    Rendering the verb in natural English with implied attendants preserves the satire
    without creating the false impression that the idols act independently.
  doctrine_reference: Translation philosophy §1, §6
