id: LJE.1.12
reference: Letter of Jeremiah 1:12
source:
  edition: lxx-swete-1909
  text: ἐκμάσσονται τὸ πρόσωπον αὐτῶν διὰ τὸν ἐκ τῆς οἰκίας κονιορτόν, ὃς ἐστιν πλείω
    ἐπʼ αὐτοῖς.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: They wipe off their faces because of the dust from the house, which is thick
    upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'which is more upon them'—that is, dust lying in greater
      quantity on them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκμάσσονται
  chosen: they wipe off
  alternatives:
  - they wipe clean
  - they wipe away
  lexicon: LSJ
  rationale: 'Middle/passive form from ἐκμάσσω, here best rendered as an active-reflexive
    sense in English: the idols'' attendants wipe the idols'' faces clean. ''Wipe
    off'' is natural English and preserves the concrete action without overinterpreting.'
- source_word: τὸ πρόσωπον αὐτῶν
  chosen: their faces
  alternatives:
  - their face
  - their countenance
  lexicon: LSJ
  rationale: Plural pronoun with singular collective noun in Greek can be rendered
    idiomatically in English as 'their faces,' referring to the faces of the idols.
    This avoids awkward singular English while preserving the sense.
- source_word: διὰ τὸν ... κονιορτόν
  chosen: because of the dust
  alternatives:
  - on account of the dust
  - because of the dirt
  lexicon: LSJ
  rationale: διὰ with the accusative gives causal force here. κονιορτός is specifically
    dust rather than generic dirt, fitting the image of neglected idols in a dusty
    temple-house.
- source_word: ἐκ τῆς οἰκίας
  chosen: from the house
  alternatives:
  - from the temple
  - from the shrine
  lexicon: LSJ
  rationale: The Greek says 'house.' In context it refers to the building where the
    idols stand, but 'house' keeps closer to the source while remaining understandable.
    More specific cultic terms like 'temple' would add interpretation not explicit
    in the wording.
- source_word: ὃς ἐστιν πλείω ἐπʼ αὐτοῖς
  chosen: which is thick upon them
  alternatives:
  - which is more upon them
  - which lies heavily on them
  - which is abundant on them
  lexicon: LSJ
  rationale: πλείω literally means 'more/greater,' but in this context it describes
    the dust as being in excessive quantity on the idols. 'Thick upon them' conveys
    the idiomatic sense in readable English without flattening the image.
