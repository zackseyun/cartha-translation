theological_decisions:
- issue: Whether οἰκία should be rendered interpretively as 'temple' or 'shrine' in
    the context of idols
  chosen_reading: house
  alternative_readings:
  - shrine
  - temple
  rationale: The Greek word is the common οἰκία, not a more specific cultic term.
    Since the verse itself does not explicitly mark the building as a temple, the
    translation preserves the ordinary lexical sense and lets the surrounding context
    supply that these are cult images.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
