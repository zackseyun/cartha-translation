translation:
  text: their faces blackened by the smoke from the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the shrine' or 'from the temple'; Greek 'from the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεμελανωμένον
  chosen: blackened
  alternatives:
  - darkened
  - blackened over
  - made black
  lexicon: LSJ
  rationale: Perfect/passive participial form from μελανόω, indicating a resulting
    state of having been made black. 'Blackened' is natural English and preserves
    the concrete visual effect better than the more general 'darkened'.
- source_word: τὸ πρόσωπον αὐτῶν
  chosen: their faces
  alternatives:
  - their face
  - their appearance
  lexicon: LSJ
  rationale: Although πρόσωπον is singular in form here, English idiom with a plural
    possessor normally uses 'faces.' This preserves the distributive sense without
    awkwardness.
- source_word: ἀπὸ τοῦ καπνοῦ
  chosen: by the smoke
  alternatives:
  - from the smoke
  - because of the smoke
  lexicon: LSJ
  rationale: ἀπό marks source/cause. In English, 'blackened by the smoke' expresses
    the causal/instrumental sense smoothly while remaining close to the Greek.
- source_word: τοῦ ἐκ τῆς οἰκίας
  chosen: from the house
  alternatives:
  - out of the house
  - from the temple/shrine
  lexicon: LSJ
  rationale: ἐκ τῆς οἰκίας specifies the smoke's origin. 'House' is the plain sense
    of οἰκία and should be retained unless context requires a more interpretive term.
    In this idol-context it may refer to the shrine/temple building, but 'house' keeps
    the wording transparent to the source.
