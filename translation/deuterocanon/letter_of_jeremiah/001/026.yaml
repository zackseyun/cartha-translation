id: LJE.1.26
reference: Letter of Jeremiah 1:26
source:
  edition: lxx-swete-1909
  text: διὰ τό, μή ποτε ἐπὶ τὴν γῆν πέσῃ, δι' αὐτῶν ἀνίστασθαι· μήτε ἐὰν τις αὐτὸ
    ὀρθὸν στήσῃ, δι' ἑαυτοῦ κινηθήσεται, μήτε ἐὰν κλιθῇ, οὐ μὴ ὀρθωθῇ, ἀλλ' ὥσπερ
    νεκροῖς τὰ δῶρα αὐτοῖς παρατίθεται.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: Therefore, if one of them falls to the ground, they cannot raise themselves
    up; and if someone sets it upright, it will not move by itself; and if it is tilted,
    it will certainly not be made straight. Rather, gifts are set before them as before
    the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'lest it fall to the ground, to rise through themselves';
      the sense is that if an idol falls, it cannot get itself up.
    reason: lexical_alternative
  - marker: b
    text: '''Gifts'' may also be rendered ''offerings'' in this cultic context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τό
  chosen: Therefore
  alternatives:
  - for this reason
  - because of this
  lexicon: LSJ
  rationale: Introduces an inference from the preceding description. 'Therefore' gives
    clear English logical flow without over-literal awkwardness.
- source_word: μή ποτε ἐπὶ τὴν γῆν πέσῃ
  chosen: if one falls to the ground
  alternatives:
  - lest it fall to the ground
  - if it should fall to the ground
  lexicon: LSJ
  rationale: The Greek construction is compressed and awkward in context; the sense
    is that when one of these idols falls, it cannot recover itself. Rendering with
    conditional 'if one falls' best fits the following infinitive clause about being
    raised.
- source_word: δι' αὐτῶν ἀνίστασθαι
  chosen: they cannot raise themselves up
  alternatives:
  - to be raised by them
  - to rise by themselves
  lexicon: LSJ
  rationale: 'The phrase literally involves rising ''through themselves/by themselves.''
    In context of helpless idols, the reflexive sense is primary: they cannot get
    themselves up.'
- source_word: μήτε ἐὰν τις αὐτὸ ὀρθὸν στήσῃ
  chosen: and if someone sets it upright
  alternatives:
  - nor if anyone stands it upright
  - even if someone places it erect
  lexicon: LSJ
  rationale: Refers to an external person positioning the idol upright. 'Sets it upright'
    is natural modern English and preserves the physical image.
- source_word: δι' ἑαυτοῦ κινηθήσεται
  chosen: it will not move by itself
  alternatives:
  - it will not stir of itself
  - it cannot move on its own
  lexicon: LSJ
  rationale: The future middle/passive here expresses inability for self-motion. 'By
    itself' is the clearest idiomatic equivalent.
- source_word: μήτε ἐὰν κλιθῇ, οὐ μὴ ὀρθωθῇ
  chosen: and if it is tilted, it will certainly not be made straight
  alternatives:
  - and if it leans, it will surely not be straightened
  - and if it falls askew, it will not be set upright
  lexicon: LSJ
  rationale: κλιθῇ suggests being inclined or tilted; οὐ μὴ with subjunctive strongly
    denies the possibility. 'Certainly not' captures the emphatic negation.
- source_word: ἀλλ' ὥσπερ νεκροῖς
  chosen: Rather, ... as before the dead
  alternatives:
  - but as to dead men
  - but just as for corpses
  lexicon: LSJ
  rationale: The comparison is to the treatment of dead persons. 'As before the dead'
    preserves the simile while sounding natural with the following verb.
- source_word: τὰ δῶρα αὐτοῖς παρατίθεται
  chosen: gifts are set before them
  alternatives:
  - offerings are placed before them
  - presents are laid out for them
  lexicon: LSJ
  rationale: δῶρα can mean gifts or offerings; in idol-cult context either works,
    but 'gifts' keeps the broader term while still fitting ritual presentation. 'Set
    before them' reflects παρατίθεται well.
