theological_decisions:
- issue: Referent and number of pronouns for the idols
  chosen_reading: Use singular in the conditional clauses ('one... it') and plural
    in the concluding comparison ('them')
  alternative_readings:
  - 'Use plural throughout: ''if they fall... if someone sets them upright...'''
  - Use singular throughout for a representative idol
  rationale: The Greek shifts awkwardly between forms in a generalized description
    of idols. English is clearest when treating the first clauses as a representative
    instance of an idol and the last clause as the class of idols collectively.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve source sense without paraphrase.'
