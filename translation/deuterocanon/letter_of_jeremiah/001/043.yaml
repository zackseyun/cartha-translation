theological_decisions:
- issue: Referent of 'one of them' and feminine pronouns
  chosen_reading: The verse speaks of female idol figures personified as women.
  alternative_readings:
  - The verse could be read more abstractly as women associated with idol shrines
    rather than the idol figures themselves.
  rationale: The immediate context in the Letter of Jeremiah mocks idols by describing
    them as if they were women competing for sexual attention. The feminine forms
    and mention of the cord fit the personified idol-statue imagery.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity where present.
