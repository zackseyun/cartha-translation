id: LJE.1.43
reference: Letter of Jeremiah 1:43
source:
  edition: lxx-swete-1909
  text: ὅταν δέ τις αὐτῶν ἐφελκυσθεῖσα ὑπό τινος τῶν παραπορευομένων κοιμηθῇ, τὴν
    πλησίον ὀνειδίζει, ὅτι οὐκ ἠξίωται ὥσπερ καὶ αὐτὴ οὔτε τὸ σχοινίον αὐτῆς διεράγη.
  language: Greek
  pages:
  - 402
