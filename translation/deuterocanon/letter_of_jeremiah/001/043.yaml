  - 407
  confidence: high
  validation: agree
translation:
  text: But whenever one of them is dragged away by one of the passersby and lies
    with him, she reproaches the one next to her because she was not considered worthy
    as she was, and her cord was not broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is drawn away' or 'is enticed away'; the Greek can denote being led
      off, though the context favors a more physical sense.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'lies with him' renders a Greek euphemism for sexual relations.
    reason: cultural_note
  - marker: c
    text: The 'cord' likely refers to a fastening attached to the idol image; the
      satire imagines the figures as women competing for sexual attention.
    reason: cultural_note
lexical_decisions:
- source_word: ἐφελκυσθεῖσα
  chosen: is dragged away
  alternatives:
  - is drawn away
  - is enticed away
  - is pulled away
  lexicon: LSJ
  rationale: The passive participle from ἐφέλκω suggests being drawn or pulled along
    by another. In this satirical context about idol images treated like prostitutes,
    'dragged away' preserves the coercive, physical sense better than the softer 'enticed
    away'.
- source_word: ὑπό τινος τῶν παραπορευομένων
  chosen: by one of the passersby
  alternatives:
  - by someone among those passing by
  - by one of those going past
  lexicon: LSJ
  rationale: παραπορευομένων refers to people passing along the way. 'Passersby' is
    natural modern English and preserves the indefinite social setting.
- source_word: κοιμηθῇ
  chosen: lies with him
  alternatives:
  - sleeps with him
  - has intercourse
  lexicon: BDAG
  rationale: κοιμάομαι can function euphemistically for sexual relations. 'Lies with
    him' is idiomatic, clear, and suitably restrained for biblical style.
- source_word: τὴν πλησίον
  chosen: the one next to her
  alternatives:
  - her neighbor
  - the nearby one
  lexicon: LSJ
  rationale: The phrase refers to the adjacent female idol/statue in the scene. 'The
    one next to her' is clearer in English than 'her neighbor,' which could sound
    interpersonal rather than spatial.
- source_word: ὀνειδίζει
  chosen: reproaches
  alternatives:
  - taunts
  - insults
  - rebukes
  lexicon: BDAG
  rationale: ὀνειδίζω denotes reproaching or insulting. 'Reproaches' fits the mocking
    comparison between adjacent idols without becoming overly colloquial.
- source_word: οὐκ ἠξίωται
  chosen: was not considered worthy
  alternatives:
  - was not deemed worthy
  - was not counted worthy
  lexicon: BDAG
  rationale: The perfect/passive sense indicates not being judged worthy of the same
    treatment. 'Considered worthy' is clear modern English and preserves the evaluative
    nuance.
- source_word: ὥσπερ καὶ αὐτή
  chosen: as she was
  alternatives:
  - just as she also was
  - like her
  lexicon: LSJ
  rationale: This comparison points to the neighboring figure that did receive such
    attention. 'As she was' keeps the comparison concise and natural.
- source_word: τὸ σχοινίον αὐτῆς διεράγη
  chosen: her cord was not broken
  alternatives:
  - her rope was not snapped
  - her band was not torn apart
  lexicon: LSJ
  rationale: σχοινίον is a cord or rope; διεράγη means was torn/broken apart. The
    line likely refers to the cord attached to the idol in this grotesque parody.
    'Cord was not broken' is the most straightforward rendering and leaves the image
    intact.
