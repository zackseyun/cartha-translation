theological_decisions:
- issue: Rendering θεοί in an anti-idolatry polemic
  chosen_reading: gods
  alternative_readings:
  - idols
  - so-called gods
  rationale: The Greek explicitly says θεοί, but the context is mocking the claim
    that these objects are divine. Rendering 'gods' preserves the wording and rhetorical
    force without importing interpretation into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
