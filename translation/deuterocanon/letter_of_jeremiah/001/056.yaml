id: LJE.1.56
reference: Letter of Jeremiah 1:56
source:
  edition: lxx-swete-1909
  text: πῶς οὖν ἐκδεκτέον ἢ νομιστέον ὅτι εἰσὶν θεοί; Οὔτε ἀπὸ κλεπτῶν οὔτε ἀπὸ ληστῶν
    οὐ μὴ διασώσωνται, θεοὶ ξύλινοι καὶ περιάργυροι καὶ περίχρυσοι·
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: How then can it be accepted or supposed that they are gods? Wooden gods overlaid
    with silver and overlaid with gold will certainly not save themselves from thieves
    or robbers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'How then is it to be accepted or considered that they are gods?' The
      Greek uses two verbal adjectives to press the rhetorical question.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'wooden gods, silver-covered and gold-covered,' preserving
      the irony that these supposed gods are merely crafted objects.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς οὖν
  chosen: How then
  alternatives:
  - How, therefore
  - How then indeed
  lexicon: LSJ
  rationale: Introduces an inferential rhetorical question. 'How then' is natural
    modern English and preserves the argumentative force of οὖν.
- source_word: ἐκδεκτέον
  chosen: can it be accepted
  alternatives:
  - is it to be expected
  - is it to be admitted
  lexicon: LSJ
  rationale: The verbal adjective conveys what is to be accepted/admitted. 'Can it
    be accepted' fits the rhetorical challenge and reads clearly in English.
- source_word: νομιστέον
  chosen: or supposed
  alternatives:
  - or considered
  - or thought
  lexicon: LSJ
  rationale: Pairs with ἐκδεκτέον to express human judgment about the idols. 'Supposed'
    preserves the sense of regarding or deeming them to be gods without sounding overly
    technical.
- source_word: ὅτι εἰσὶν θεοί
  chosen: that they are gods
  alternatives:
  - that they are divine
  - that they are gods indeed
  lexicon: LSJ
  rationale: A straightforward predicate clause. Lowercase 'gods' reflects the polemical
    context of false deities.
- source_word: Οὔτε ἀπὸ κλεπτῶν οὔτε ἀπὸ ληστῶν
  chosen: from thieves or robbers
  alternatives:
  - from thieves nor from bandits
  - from burglars or brigands
  lexicon: LSJ
  rationale: The repeated οὔτε...οὔτε is naturally compressed in English. κλέπται
    and λῃσταί are near but not identical terms; 'thieves or robbers' preserves the
    distinction without awkwardness.
- source_word: οὐ μὴ διασώσωνται
  chosen: will certainly not save themselves
  alternatives:
  - will by no means escape
  - will certainly not be rescued
  lexicon: LSJ
  rationale: 'οὐ μὴ with the aorist subjunctive is emphatically negative. The middle/passive
    form in context points to their inability to preserve themselves. ''Will certainly
    not save themselves'' brings out the satire: supposed gods cannot even protect
    themselves.'
- source_word: θεοὶ ξύλινοι
  chosen: Wooden gods
  alternatives:
  - gods of wood
  - wooden idols
  lexicon: LSJ
  rationale: ξύλινοι is adjectival, 'wooden.' Retaining 'gods' reflects the Greek
    wording while the context makes clear the irony.
- source_word: περιάργυροι καὶ περίχρυσοι
  chosen: overlaid with silver and overlaid with gold
  alternatives:
  - silver-plated and gold-plated
  - covered with silver and gold
  lexicon: LSJ
  rationale: The compounds indicate being covered around with silver and gold. 'Overlaid
    with' is idiomatic and preserves the crafted, superficial nature of the idols.
