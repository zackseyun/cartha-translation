id: LJE.1.27
reference: Letter of Jeremiah 1:27
source:
  edition: lxx-swete-1909
  text: τὰς δὲ θυσίας αὐτῶν ἀποδιδόμενοι οἱ ἱερεῖς αὐτῶν καταχρῶνται· ὡσαύτως δὲ καὶ
    αἱ γυναῖκες ἀπ' αὐτῶν ταριχεύουσαι οὔτε πτωχῷ οὔτε ἀδυνάτῳ μὴ μεταδῶσιν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: And their priests, taking back their sacrifices, make use of them; likewise
    their women, preserving some from them, give none to the poor or the weak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'receiving back their sacrifices.' The Greek participle can denote reclaiming
      or receiving the offerings for their own use.
    reason: lexical_alternative
  - marker: b
    text: The verb translated 'preserving' likely refers to preserving food by salting
      or curing.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποδιδόμενοι
  chosen: taking back
  alternatives:
  - receiving back
  - recovering
  lexicon: LSJ
  rationale: The middle/passive participial form with θυσίας suggests the priests
    are reclaiming or receiving back the sacrifices offered to the idols. 'Taking
    back' communicates that the offerings are diverted for priestly use rather than
    remaining truly dedicated.
- source_word: καταχρῶνται
  chosen: make use of
  alternatives:
  - use up
  - misuse
  - consume
  lexicon: LSJ
  rationale: The verb can mean to use or make full use of, sometimes with a negative
    nuance. Here it refers to the priests appropriating the sacrifices for themselves.
    'Make use of' stays close to the Greek while allowing the context to supply the
    criticism.
- source_word: ταριχεύουσαι
  chosen: preserving
  alternatives:
  - salting
  - pickling
  - curing
  lexicon: LSJ
  rationale: The participle refers to preserving food, likely by salting. 'Preserving'
    is natural modern English and broad enough to cover the ancient practice without
    over-specifying the exact method in the main text.
- source_word: μεταδῶσιν
  chosen: give
  alternatives:
  - share
  - impart
  lexicon: BDAG
  rationale: The sense is to give a share to someone from what one has. 'Give' is
    concise and idiomatic in English, while the context already implies sharing from
    the preserved sacrificial food.
- source_word: πτωχῷ
  chosen: the poor
  alternatives:
  - a poor person
  lexicon: BDAG
  rationale: The singular dative has representative force. 'The poor' is idiomatic
    English for this class reference.
- source_word: ἀδυνάτῳ
  chosen: the weak
  alternatives:
  - the helpless
  - the needy
  - the powerless
  lexicon: BDAG
  rationale: The term denotes one lacking strength or ability. 'The weak' preserves
    the broad sense and pairs naturally with 'the poor'.
