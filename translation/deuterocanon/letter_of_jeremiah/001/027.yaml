theological_decisions:
- issue: Moral force of priestly and female appropriation of offerings
  chosen_reading: Render the actions descriptively without adding explicit condemnation
    beyond what the context implies.
  alternative_readings:
  - Translate καταχρῶνται as 'misuse' to make the condemnation explicit
  rationale: The verse itself criticizes idolatry by describing exploitative behavior.
    A more loaded rendering like 'misuse' is possible, but the Greek wording can be
    represented more transparently by descriptive language, letting the broader argument
    carry the polemic.
  doctrine_reference: Translation philosophy §§1, 3, 6
