id: LJE.1.71
reference: Letter of Jeremiah 1:71
source:
  edition: lxx-swete-1909
  text: ἀπό τε τῆς πορφύρας καὶ τῆς μαρμάρου τῆς ἐπ’ αὐτοὺς σηπομένης γνωσθήσεται
    ὅτι οὐκ εἰσὶν θεοί· αὐτά τε ἐξ ὑστέρου βρωθήσονται, καὶ ἔσται ὄνειδος ἐν τῇ χώρᾳ.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: From the purple and the marble rotting upon them it will be known that they
    are not gods; and in the end they themselves will be eaten, and they will become
    a disgrace in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'afterward they themselves will be consumed/devoured.' The Greek literally
      says 'will be eaten,' which may refer to physical consumption by decay or creatures.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορφύρας
  chosen: purple
  alternatives:
  - purple cloth
  - purple dye
  lexicon: LSJ
  rationale: πορφύρα commonly denotes purple fabric or purple adornment. Here, with
    marble placed upon the idols, the sense is their costly purple covering/adornment.
    'Purple' keeps the concise Greek expression while allowing the material sense
    to be inferred from context.
- source_word: μαρμάρου
  chosen: marble
  alternatives:
  - polished stone
  - marble veneer
  lexicon: LSJ
  rationale: μάρμαρον ordinarily means marble or shining stone. 'Marble' is the most
    direct rendering and fits the description of decorative materials placed on idols.
- source_word: τῆς ἐπ’ αὐτοὺς σηπομένης
  chosen: rotting upon them
  alternatives:
  - decaying on them
  - corrupting upon them
  lexicon: LSJ
  rationale: σηπομένης conveys decay or rotting. The participle modifies the purple
    and marble as materials deteriorating while lying on the idols. 'Rotting upon
    them' is vivid and natural English, preserving the polemical force.
- source_word: γνωσθήσεται
  chosen: it will be known
  alternatives:
  - it will become evident
  - it will be recognized
  lexicon: LSJ
  rationale: Future passive of γινώσκω here expresses public recognition or evident
    proof. 'It will be known' is straightforward and sufficiently formal.
- source_word: θεοί
  chosen: gods
  alternatives:
  - divine beings
  lexicon: LSJ
  rationale: The verse denies the idols' divinity. 'Gods' is the plain lexical equivalent
    and matches the anti-idolatry context.
- source_word: ἐξ ὑστέρου
  chosen: in the end
  alternatives:
  - afterward
  - later
  lexicon: LSJ
  rationale: The phrase indicates what happens subsequently or eventually. 'In the
    end' captures the temporal force and reads naturally in English.
- source_word: βρωθήσονται
  chosen: will be eaten
  alternatives:
  - will be consumed
  - will be devoured
  lexicon: LSJ
  rationale: The verb literally means to be eaten. In context it likely refers to
    being gnawed or consumed by creatures or decay. 'Will be eaten' preserves the
    concrete imagery without over-interpreting the agent.
- source_word: ὄνειδος
  chosen: a disgrace
  alternatives:
  - a reproach
  - an object of shame
  lexicon: LSJ
  rationale: ὄνειδος denotes reproach or disgrace. 'A disgrace' is idiomatic and preserves
    the public shame implied.
- source_word: ἐν τῇ χώρᾳ
  chosen: in the land
  alternatives:
  - in the country
  - in the region
  lexicon: LSJ
  rationale: χώρα can mean land, country, or region. 'In the land' is broad and biblically
    natural, fitting the setting without narrowing the reference.
