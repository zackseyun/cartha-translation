theological_decisions:
- issue: Referent of the decaying materials and final disgrace
  chosen_reading: The verse mocks idols by pointing to the decay of their costly adornments
    and the idols' eventual consumption and shame.
  alternative_readings:
  - The materials themselves, rather than the idols, are the primary subject of the
    final clauses.
  rationale: The plural αὐτά and the broader context of the Letter of Jeremiah consistently
    target the idols themselves as powerless objects. The translation therefore keeps
    the idols as the main referent while allowing the preceding materials to function
    as evidence of their falsity.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than flatten it.
