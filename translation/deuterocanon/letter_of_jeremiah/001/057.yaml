translation:
  text: From them the strong will strip away the gold and the silver, and they will
    go off with the clothing that is wrapped around them; yet they certainly will
    not help themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the powerful' for 'the strong.'
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is emphatically negative in Greek: ''they certainly will
      not help themselves.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἰσχύοντες
  chosen: the strong
  alternatives:
  - the powerful
  - those who are strong
  lexicon: LSJ
  rationale: The participle refers to people with strength or power who plunder the
    idols. 'The strong' is concise and natural, while preserving the substantive force
    of the Greek.
- source_word: περιελοῦνται
  chosen: will strip away
  alternatives:
  - will take off
  - will remove
  lexicon: LSJ
  rationale: The verb conveys removing something from around or off an object. 'Strip
    away' fits the context of looting ornaments from idols and is more vivid than
    the flatter 'remove.'
- source_word: τὸ χρυσίον καὶ τὸ ἀργύριον
  chosen: the gold and the silver
  alternatives:
  - their gold and silver
  lexicon: LSJ
  rationale: The Greek has the articles with both metals and does not explicitly add
    a possessive. English can preserve the direct objects plainly without over-specifying.
- source_word: τὸν ἱματισμὸν τὸν περικείμενον αὐτοῖς
  chosen: the clothing that is wrapped around them
  alternatives:
  - the garment placed on them
  - the clothing put on them
  lexicon: LSJ
  rationale: ἱματισμός denotes clothing or apparel, and περικείμενον indicates something
    lying around or wrapped around them. Because the referent is idols, 'wrapped around
    them' preserves the physical image better than a more idiomatic but less transparent
    rendering.
- source_word: ἀπελεύσονται ἔχοντες
  chosen: they will go off with
  alternatives:
  - they will depart carrying
  - they will leave having
  lexicon: LSJ
  rationale: The participle ἔχοντες is attendant to the main verb and indicates that
    the looters depart in possession of the stolen items. 'Go off with' captures the
    sense in idiomatic modern English without paraphrasing beyond the Greek.
- source_word: οὔτε ἑαυτοῖς οὐ μὴ βοηθήσωσιν
  chosen: yet they certainly will not help themselves
  alternatives:
  - nor will they by no means help themselves
  - and they cannot help themselves
  lexicon: LSJ
  rationale: 'The construction is emphatically negative. ''Certainly will not help
    themselves'' reflects the force of οὐ μὴ with future sense in readable English.
    ''Yet'' brings out the adversative sense in context: despite their adornment,
    the idols are helpless.'
