theological_decisions:
- issue: Referent of the final clause
  chosen_reading: The clause refers to the idols' inability to help themselves.
  alternative_readings:
  - The clause could be taken more loosely as a general statement about their helplessness.
  rationale: In context throughout the Letter of Jeremiah, the repeated polemic is
    that idols cannot save or act. The reflexive ἑαυτοῖς naturally yields 'themselves,'
    underscoring their impotence rather than making a broader theological claim.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
