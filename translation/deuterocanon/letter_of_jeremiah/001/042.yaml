id: LJE.1.42
reference: Letter of Jeremiah 1:42
source:
  edition: lxx-swete-1909
  text: αἱ δὲ γυναῖκες περιθέμεναι σχοινία ἐν ταῖς ὁδοῖς ἐγκάθηνται, θυμιῶσα τὰ πίτυρα.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: minor_mismatch
translation:
  text: And the women, with cords wrapped around themselves, sit in the streets, burning
    bran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having put ropes around themselves.' The Greek specifies cords/ropes
      placed around the women but does not explain their symbolic significance here.
    reason: lexical_alternative
  - marker: b
    text: That is, bran used as a smoking or incense-like offering; the Greek does
      not use the normal word for incense here.
    reason: cultural_note
lexical_decisions:
- source_word: περιθέμεναι
  chosen: with cords wrapped around themselves
  alternatives:
  - having put cords around themselves
  - wearing cords
  lexicon: LSJ
  rationale: The participle from περιτίθημι indicates placing something around oneself.
    'Wrapped around themselves' is natural English while preserving the reflexive
    sense better than the vaguer 'wearing.'
- source_word: σχοινία
  chosen: cords
  alternatives:
  - ropes
  - strings
  lexicon: LSJ
  rationale: σχοινία denotes cords/ropes. 'Cords' fits the likely ritual or symbolic
    binding without overstating size as 'ropes' might.
- source_word: ἐν ταῖς ὁδοῖς
  chosen: in the streets
  alternatives:
  - on the roads
  - in the ways
  lexicon: LSJ
  rationale: In this urban/public setting, ὁδοί is best rendered 'streets' rather
    than the more literal but less idiomatic 'roads' or 'ways.'
- source_word: ἐγκάθηνται
  chosen: sit
  alternatives:
  - sit down
  - remain seated
  lexicon: LSJ
  rationale: The verb means to sit or sit down. Simple present 'sit' matches the descriptive
    flow of the verse.
- source_word: θυμιῶσα
  chosen: burning
  alternatives:
  - offering incense with
  - fumigating with
  lexicon: LSJ
  rationale: The participle is from θυμιάω, to burn incense or make smoke offerings.
    Because the direct object here is πίτυρα ('bran'), 'burning' communicates the
    act clearly without implying standard incense material.
- source_word: τὰ πίτυρα
  chosen: bran
  alternatives:
  - chaff
  - coarse meal
  lexicon: LSJ
  rationale: πίτυρα commonly means bran. 'Bran' is the most direct lexical equivalent;
    'chaff' would suggest a different agricultural byproduct.
