theological_decisions:
- issue: Description of the women's action and ritual posture
  chosen_reading: The verse is rendered as a straightforward description of women
    sitting publicly with cords around themselves while burning bran.
  alternative_readings:
  - The cords may imply a specific fertility or cultic rite not explicit in the Greek.
  rationale: The Greek describes the visible actions but does not explain their symbolic
    meaning in this verse. To avoid importing a more specific cultic interpretation
    than the text states, the translation stays descriptive.
  doctrine_reference: Preserve theological tension rather than resolve it.
