theological_decisions:
- issue: Relation of χριστοῦ κυρίου
  chosen_reading: the Lord's Messiah
  alternative_readings:
  - Messiah Lord
  - the anointed of the Lord
  rationale: The compressed genitive sequence is somewhat ambiguous in English representation.
    The chosen rendering preserves both titles and their relational sense without
    implying that 'Messiah' has become a mere proper name.
  doctrine_reference: 'DOCTRINE.md contested terms: Χριστός → Messiah; κύριος → Lord'
- issue: Sense of πνεύματος
  chosen_reading: spirit
  alternative_readings:
  - Spirit
  rationale: The text does not clearly require a reference to the Holy Spirit. To
    avoid importing a stronger doctrinal claim than the Greek demands, the main text
    keeps the more textually cautious lower-case reading, with the alternative noted.
