  from: in wisdom of spirit and righteousness and strength;
  to: in the wisdom of the spirit and of righteousness and of strength;
  rationale: In English, 'wisdom of spirit' sounds like a dispositional trait (akin
    to 'team spirit') rather than a reference to the πνεῦμα (whether the human spirit
    or God's Spirit). Adding the definite article and repeating 'of' clarifies that
    'spirit,' 'righteousness,' and 'strength' are parallel genitives dependent on
    'wisdom' (σοφίᾳ).
