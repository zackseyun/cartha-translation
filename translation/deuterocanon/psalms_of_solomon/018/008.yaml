id: PSS.18.8
reference: Psalms of Solomon 18:8
source:
  edition: lxx-swete-1909
  text: ὑπὸ ῥάβδον παιδείας χριστοῦ κυρίου, ἐν φόβῳ θεοῦ αὐτοῦ, ἐν σοφίᾳ πνεύματος
    καὶ δικαιοσύνης καὶ ἰσχύος·
  language: Greek
  pages:
  - 810
  validation: swete_direct
translation:
  text: under the rod of discipline of the Lord's Messiah, in the fear of his God,
    in wisdom of spirit and righteousness and strength;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the Messiah Lord' or 'the anointed of the Lord'; the Greek
      genitives are tightly packed.
    reason: alternative_reading
  - marker: b
    text: Or 'wisdom of the Spirit.'
    reason: lexical_alternative
  - marker: c
    text: '''Righteousness'' could also be rendered ''justice'' here.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in wisdom of spirit and righteousness and strength;'.
    reason: previous_rendering
lexical_decisions:
- source_word: ῥάβδον
  chosen: rod
  alternatives:
  - scepter
  - staff
  lexicon: LSJ
  rationale: ῥάβδος can denote a rod, staff, or scepter. With παιδείας ('discipline'),
    'rod' best preserves the disciplinary sense without importing regal emphasis as
    strongly as 'scepter'.
- source_word: παιδείας
  chosen: discipline
  alternatives:
  - instruction
  - training
  - correction
  lexicon: BDAG
  rationale: παιδεία includes training and corrective discipline. Here, joined to
    'rod,' the corrective sense is foregrounded, so 'discipline' is the most natural
    fit.
- source_word: χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  - anointed
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is rendered 'Messiah' where it functions
    as a title. This preserves the Jewish-messianic force of the phrase.
- source_word: κυρίου
  chosen: Lord's
  alternatives:
  - Lord
  - of the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' by default. In this genitival construction,
    'the Lord's Messiah' gives clear English while preserving the relation between
    κύριος and χριστός.
- source_word: φόβῳ
  chosen: fear
  alternatives:
  - reverence
  - awe
  lexicon: BDAG
  rationale: φόβος often carries reverential force in Godward contexts, but 'fear'
    best preserves the source wording and biblical weight; the reverential nuance
    is carried by context.
- source_word: θεοῦ αὐτοῦ
  chosen: his God
  alternatives:
  - God
  - the God belonging to him
  lexicon: BDAG
  rationale: The possessive αὐτοῦ is explicit and should be preserved. 'His God' reflects
    the Greek directly and maintains the relational wording of the text.
- source_word: σοφίᾳ
  chosen: wisdom
  alternatives:
  - understanding
  - skill
  lexicon: BDAG
  rationale: σοφία is regularly 'wisdom.' No contextual pressure here justifies a
    narrower gloss.
- source_word: πνεύματος
  chosen: spirit
  alternatives:
  - Spirit
  lexicon: BDAG
  rationale: Because πνεύματος lacks the article and appears in a list of qualities,
    the lower-case 'spirit' is the more restrained rendering in the main text, while
    the possible reference to God's Spirit is preserved in a footnote.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project doctrine, δικαιοσύνη defaults to 'righteousness.' 'Justice'
    remains possible, but this context reads more like a cluster of virtues than a
    judicial setting.
- source_word: ἰσχύος
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: BDAG
  rationale: ἰσχύς denotes strength or might. 'Strength' is the most natural and least
    overstated choice in this virtue list.
