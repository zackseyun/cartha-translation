id: PSS.18.2
reference: Psalms of Solomon 18:2
source:
  edition: lxx-swete-1909
  text: ἡ χρηστότης σου ἐπὶ δόματος πλουσίου ἐπὶ Ἰσραήλ· οἱ ὀφθαλμοί σου ἐπιβλέποντες
    ἐπʼ αὐτά, καὶ οὐχ ὑστερήσει ἐξ αὐτῶν,
  language: Greek
  pages:
  - 809
  - 810
  validation: swete_direct
translation:
  text: Your kindness is upon Israel like a rich roof-covering; your eyes look upon
    them, and none of them will be lacking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “like an abundant shelter over Israel.” The Greek image in “rich roof-covering”
      is somewhat compressed and poetic.
    reason: lexical_alternative
  - marker: b
    text: Or “there will be no lack among them.”
    reason: alternative_reading
lexical_decisions:
- source_word: χρηστότης
  chosen: kindness
  alternatives:
  - goodness
  - benevolence
  lexicon: BDAG
  rationale: χρηστότης commonly denotes kindness or benevolence in action. “Kindness”
    is natural English and preserves the personal, beneficent sense better than the
    broader “goodness.”
- source_word: δόματος πλουσίου
  chosen: a rich roof-covering
  alternatives:
  - a rich house
  - an abundant shelter
  - a wealthy rooftop
  lexicon: LSJ
  rationale: δόμα often refers to a house-top or roof rather than the whole house.
    In this simile, the image is protective covering or shelter spread over Israel.
    “Rich roof-covering” keeps the concrete metaphor while making the sense intelligible
    in English.
- source_word: ἐπὶ Ἰσραήλ
  chosen: upon Israel
  alternatives:
  - over Israel
  - on Israel
  lexicon: BDAG
  rationale: ἐπί with the accusative here naturally conveys motion or extension over/upon.
    “Upon Israel” preserves the elevated poetic register and fits the sheltering image.
- source_word: ἐπιβλέποντες
  chosen: look upon
  alternatives:
  - watch over
  - behold
  lexicon: BDAG
  rationale: The participle expresses attentive looking. “Look upon” preserves the
    visual language, while “watch over” would import a more interpretive protective
    nuance already suggested elsewhere in the verse.
- source_word: οὐχ ὑστερήσει ἐξ αὐτῶν
  chosen: none of them will be lacking
  alternatives:
  - he will not fail any of them
  - not one of them will be deprived
  - none of them will fall short
  lexicon: BDAG
  rationale: ὑστερέω can mean to lack or be deprived. Given the plural referent αὐτῶν,
    the sense is that under God's care none among Israel will be in want. This English
    expresses the result clearly without over-paraphrasing.
