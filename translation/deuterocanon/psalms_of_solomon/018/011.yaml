id: PSS.18.11
reference: Psalms of Solomon 18:11
source:
  edition: lxx-swete-1909
  text: μέγας ἡμῶν ὁ θεὸς καὶ ἔνδοξος, ἐν ὑψίστοις κατοικῶν·
  language: Greek
  pages:
  - 810
  validation: swete_direct
translation:
  text: Great and glorious is our God, dwelling in the heights;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "dwelling in the highest places" or "dwelling in the highest heavens."
    reason: lexical_alternative
lexical_decisions:
- source_word: μέγας
  chosen: great
  alternatives:
  - mighty
  lexicon: BDAG
  rationale: '"Great" preserves the basic adjectival sense and fits the verse''s doxological
    praise without importing the stronger force of "mighty," which would lean more
    toward power than stature or majesty.'
- source_word: ἔνδοξος
  chosen: glorious
  alternatives:
  - honored
  - full of glory
  lexicon: BDAG
  rationale: '"Glorious" is the most natural English equivalent in a praise context
    and keeps the connection to divine glory clear and direct.'
- source_word: ἐν ὑψίστοις
  chosen: in the heights
  alternatives:
  - in the highest places
  - in the highest heavens
  lexicon: BDAG
  rationale: The phrase is literally "in the highest places/things." "In the heights"
    gives idiomatic English while preserving the elevated spatial imagery without
    specifying "heavens" beyond what the Greek explicitly states.
- source_word: κατοικῶν
  chosen: dwelling
  alternatives:
  - inhabiting
  - residing
  lexicon: BDAG
  rationale: The present participle describes God's ongoing habitation. "Dwelling"
    is natural, reverent, and close to the Greek form.
