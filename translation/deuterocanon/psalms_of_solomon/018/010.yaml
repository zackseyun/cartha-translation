theological_decisions:
- issue: How to render φόβος θεοῦ
  chosen_reading: Retained as "fear of God" in the main text
  alternative_readings:
  - reverence for God
  rationale: The expression is a weighty biblical idiom that includes reverence, obedience, and awe. Keeping "fear of God" preserves that fuller theological register rather than resolving it into a thinner paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
