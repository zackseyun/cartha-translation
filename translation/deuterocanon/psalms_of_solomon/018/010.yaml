  from: A good generation lives in the fear of God in days of mercy.
  to: A good generation in the fear of God in days of mercy. Interlude.
  rationale: 'Adjudicator-modified: The Greek text is indeed a verbless nominal phrase (γενεὰ ἀγαθὴ ἐν φόβῳ θεοῦ ἐν ἡμέραις ἐλέους). Supplying a verb like ''lives'' flattens the poetic, exclamatory force of the line into a prosaic declarative sentence. English poetry can easily accommodate verbless lines, which better reflects the author''s concise, elevated style. The proposed rewrite is modified only to restore the translation of ''διάψαλμα'' (Interlude) which was inadvertently dropped from the reviewer''s suggestion.'
