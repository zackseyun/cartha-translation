id: PSS.18.12
reference: Psalms of Solomon 18:12
source:
  edition: lxx-swete-1909
  text: ὁ διατάξας ἐν πορείᾳ φωστῆρας εἰς καιροὺς ὡρῶν ἀφʼ ἡμερῶν εἰς ἡμέρας, καὶ
    οὐ παρέβησαν ἀπὸ ὁδοῦ ἧς ἐνετείλατο αὐτοῖς.
  language: Greek
  pages:
  - 810
  validation: swete_direct
translation:
  text: the one who appointed the luminaries in their course for the appointed times
    of the hours, from day to day; and they did not depart from the path he commanded
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in procession” for “in their course.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “for appointed times of hours”; the phrase likely refers to fixed
      temporal order.
    reason: lexical_alternative
lexical_decisions:
- source_word: διατάξας
  chosen: appointed
  alternatives:
  - arranged
  - ordered
  lexicon: BDAG
  rationale: The participle describes purposeful ordering or assigning. “Appointed”
    preserves both the sense of arrangement and delegated placement in context.
- source_word: φωστῆρας
  chosen: the luminaries
  alternatives:
  - lights
  - heavenly lights
  lexicon: LSJ
  rationale: “Luminaries” best fits celestial bodies in a formal poetic context and
    avoids the flatter English “lights.”
- source_word: ἐν πορείᾳ
  chosen: in their course
  alternatives:
  - in procession
  - in their movement
  - in orbit
  lexicon: LSJ
  rationale: The phrase points to ordered movement. “In their course” is natural English
    and preserves the idea of a fixed celestial track without importing modern scientific
    terminology.
- source_word: καιροὺς ὡρῶν
  chosen: the appointed times of the hours
  alternatives:
  - the seasons of the hours
  - the set times of the watches
  lexicon: LSJ
  rationale: καιρός often carries the sense of an appointed or fitting time. Retaining
    “hours” reflects ὡρῶν more transparently, even though the phrase is somewhat formal
    in English.
- source_word: ἀφʼ ἡμερῶν εἰς ἡμέρας
  chosen: from day to day
  alternatives:
  - from days to days
  - day after day
  lexicon: LSJ
  rationale: This idiom expresses ongoing regularity. “From day to day” keeps the
    repetition while reading naturally in English.
- source_word: παρέβησαν
  chosen: did not depart
  alternatives:
  - did not transgress
  - did not go beyond
  - did not deviate
  lexicon: BDAG
  rationale: In context of celestial bodies and a path, spatial deviation is more
    immediate than moral transgression, so “did not depart” best fits.
- source_word: ὁδοῦ
  chosen: the path
  alternatives:
  - the way
  - the course
  lexicon: BDAG
  rationale: “Path” fits the imagery of prescribed movement and pairs well with the
    preceding celestial-course language.
- source_word: ἐνετείλατο
  chosen: he commanded
  alternatives:
  - he appointed
  - he ordered
  lexicon: BDAG
  rationale: The verb denotes direct command. “Commanded” preserves the authority
    of the speaker over the heavenly bodies.
