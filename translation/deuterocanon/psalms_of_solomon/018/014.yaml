id: PSS.18.14
reference: Psalms of Solomon 18:14
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἐπλανήθησαν ἀφʼ ἧς ἡμέρας ἔκτισεν αὐτούς. ἀπὸ γενεῶν ἀρχαίων οὐκ ἀπέστησαν ὁδῶν αὐτῶν, εἰ μὴ ὁ θεὸς ἐνετείλατο αὐτοῖς ἐν ἐπιταγῇ δούλων αὐτοῦ.
  language: Greek
  pages:
  - 810
  validation: swete_direct
translation:
  text: And they have not gone astray from the day he created them. From ancient generations they have not departed from their ways, unless God commanded them by the command of his slaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have not wandered.'
    reason: lexical_alternative
  - marker: b
    text: '''Their ways'' may mean their appointed courses or patterns.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''through his servants.'' Greek: ''slaves.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'by an ordinance through his slaves'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπλανήθησαν
  chosen: have not gone astray
  alternatives:
  - have not wandered
  - were not led astray
  lexicon: BDAG
  rationale: The passive/deponent form from πλανάω here conveys deviation from a right course. 'Gone astray' is idiomatic and preserves moral-religious force without overinterpreting agency.
- source_word: ἔκτισεν
  chosen: created
  alternatives:
  - formed
  - founded
  lexicon: BDAG
  rationale: κτίζω normally means 'create.' 'Created' is the plainest rendering and fits the statement about God's ordering of created beings.
- source_word: γενεῶν ἀρχαίων
  chosen: from ancient generations
  alternatives:
  - from generations of old
  - since ancient generations
  lexicon: BDAG
  rationale: The phrase marks long duration from antiquity. 'From ancient generations' keeps the temporal sense closely tied to the Greek.
- source_word: ἀπέστησαν
  chosen: have not departed
  alternatives:
  - have not turned away
  - have not withdrawn
  lexicon: BDAG
  rationale: ἀφίστημι here denotes departure from an established course. 'Departed' preserves the formal parallel with 'their ways.'
- source_word: ὁδῶν αὐτῶν
  chosen: their ways
  alternatives:
  - their paths
  - their courses
  lexicon: BDAG
  rationale: ὁδός can be literal or metaphorical; here it refers to appointed courses or patterns. 'Ways' is natural English and preserves the broader semantic range.
- source_word: ἐνετείλατο
  chosen: commanded
  alternatives:
  - gave orders to
  - instructed
  lexicon: BDAG
  rationale: The verb denotes authoritative command. 'Commanded' is the most direct equivalent.
- source_word: ἐν ἐπιταγῇ
  chosen: by an ordinance
  alternatives:
  - with a command
  - under an order
  lexicon: BDAG
  rationale: The phrase likely expresses the manner or instrument of the command. 'By an ordinance' preserves the formal, authoritative nuance of ἐπιταγή.
- source_word: δούλων
  chosen: slaves
  alternatives:
  - servants
  lexicon: BDAG
  rationale: DOCTRINE.md requires 'slave' where the bonded nature is salient. Here the phrase emphasizes God's authority mediated through those fully under him, so 'slaves' better preserves that force than the softer 'servants'.
