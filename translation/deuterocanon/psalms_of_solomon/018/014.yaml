theological_decisions:
- issue: Referent of 'they' in the verse
  chosen_reading: Render generically as 'they' without specifying the referent in English.
  alternative_readings:
  - heavenly bodies or elements of creation
  - created beings more generally
  rationale: The Greek leaves the antecedent implicit from the surrounding context. Supplying a specific referent in translation would overresolve what this verse itself does not explicitly name.
  doctrine_reference: Preserve theological tension rather than resolve it.
