  tier: 3
  from: by an ordinance through his slaves
  to: by the command of his slaves
  rationale: 'Adjudicator-modified: The reviewer correctly identifies that `ἐν ἐπιταγῇ δούλων αὐτοῦ` is a direct genitive phrase meaning ''by the command of his slaves,'' and that ''ordinance through'' obscures this. However, the proposed rewrite ''at the order of his slaves'' creates an awkward English phrasing (''unless God commanded them at the order of his slaves'') that could be misread as God taking orders from his slaves. Modifying to ''by the command of his slaves'' preserves the subjective genitive and the instrumental force of `ἐν'
