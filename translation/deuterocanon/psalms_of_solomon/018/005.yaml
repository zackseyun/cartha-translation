id: PSS.18.5
reference: Psalms of Solomon 18:5
source:
  edition: lxx-swete-1909
  text: ἀποστρέψαι ψυχὴν εὔκοον ἀπὸ ἀμαθίας ἐν ἀγνοίᾳ.
  language: Greek
  pages:
  - 810
  validation: swete_direct
translation:
  text: to turn a teachable soul away from foolishness in ignorance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “an obedient soul” or “a soul ready to listen.”
    reason: lexical_alternative
  - marker: b
    text: The Greek distinguishes ἀμαθία and ἀγνοία; the line combines the ideas of
      foolishness and ignorance rather than merely repeating the same word.
    reason: lexical_alternative
  - marker: c
    text: Or 'receptive'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀποστρέψαι
  chosen: to turn away
  alternatives:
  - to turn back
  - to avert
  lexicon: LSJ
  rationale: The aorist infinitive naturally carries the sense of turning something
    away from a source or path. “Turn away” is idiomatic and preserves the directional
    force of ἀπό.
- source_word: ψυχὴν
  chosen: soul
  alternatives:
  - life
  - inner self
  lexicon: LSJ
  rationale: In this moral and religious context, “soul” best preserves the anthropological
    weight of ψυχή without flattening it to mere emotion or personality.
- source_word: εὔκοον
  chosen: receptive
  alternatives:
  - obedient
  - compliant
  - ready to listen
  lexicon: LSJ
  rationale: The adjective literally suggests one who hears readily and so is teachable
    or compliant. “Receptive” captures that openness without over-specifying formal
    obedience.
- source_word: ἀμαθίας
  chosen: foolishness
  alternatives:
  - ignorance
  - lack of sense
  lexicon: LSJ
  rationale: Because the verse also includes ἀγνοίᾳ, rendering ἀμαθία again as “ignorance”
    would blur the distinction. “Foolishness” preserves the moral-intellectual deficiency
    implied by the term while leaving ἀγνοίᾳ to express ignorance more directly.
- source_word: ἐν ἀγνοίᾳ
  chosen: done in ignorance
  alternatives:
  - in ignorance
  - through ignorance
  lexicon: LSJ
  rationale: This phrase is best taken adverbially, explaining the manner or condition
    of the foolishness. Expanding slightly to “done in ignorance” makes the relation
    clear in natural English.
