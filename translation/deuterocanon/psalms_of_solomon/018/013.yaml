id: PSS.18.13
reference: Psalms of Solomon 18:13
source:
  edition: lxx-swete-1909
  text: ἐν φόβῳ θεοῦ ἡ ὁδὸς αὐτῶν καθʼ ἑκάστην ἡμέραν, ἀφʼ ἧς ἡμέρας ἔκτισεν αὐτοὺς
    ὁ θεὸς καὶ ἕως αἰῶνος.
  language: Greek
  pages:
  - 810
  validation: swete_direct
translation:
  text: Their way is in the fear of God every day, from the day God created them and
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their path' or 'Their conduct' for 'Their way.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in reverence for God' for 'in the fear of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν φόβῳ θεοῦ
  chosen: in the fear of God
  alternatives:
  - in reverence for God
  - with fear of God
  lexicon: BDAG
  rationale: The phrase is a standard expression for reverent, God-directed piety.
    'Fear of God' preserves the source wording and theological weight better than
    a fully interpretive rendering like 'reverence for God,' while remaining natural
    in English.
- source_word: ὁδὸς
  chosen: way
  alternatives:
  - path
  - conduct
  lexicon: BDAG
  rationale: '''Way'' preserves the metaphor of one''s course of life and is idiomatic
    English. ''Conduct'' is interpretive; ''path'' is possible but less natural here.'
- source_word: καθʼ ἑκάστην ἡμέραν
  chosen: every day
  alternatives:
  - each day
  - day by day
  lexicon: BDAG
  rationale: '''Every day'' is the most natural modern English equivalent and accurately
    conveys habitual continuity.'
- source_word: ἀφʼ ἧς ἡμέρας
  chosen: from the day
  alternatives:
  - since the day
  - from the time when
  lexicon: BDAG
  rationale: The expression marks the starting point of this God-fearing way of life.
    'From the day' is direct and fits the following verb naturally in English.
- source_word: ἔκτισεν
  chosen: created
  alternatives:
  - formed
  - made
  lexicon: BDAG
  rationale: The verb κτίζω normally means 'create.' 'Created' preserves the theological
    force of God as creator better than the more generic 'made'.
- source_word: ἕως αἰῶνος
  chosen: forever
  alternatives:
  - for ever
  - unto the age
  - for eternity
  lexicon: BDAG
  rationale: The phrase expresses enduring continuance. 'Forever' gives clear modern
    English while preserving the sense of unending duration.
