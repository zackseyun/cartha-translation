id: PSS.18.1
reference: Psalms of Solomon 18:1
source:
  edition: lxx-swete-1909
  text: Κύριε, τὸ ἔλεός σου ἐπὶ τὰ ἔργα τῶν χειρῶν σου εἰς τὸν αἰῶνα·
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: Lord, your mercy is upon the works of your hands forever;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your mercy rests upon the works of your hands forever.'
    reason: lexical_alternative
  - marker: b
    text: '''The works of your hands'' may also be rendered ''your handiwork.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - O Lord
  - Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines, with 'Lord' as
    the default rendering. The vocative force is clear from the address, but English
    can convey this without adding 'O.'
- source_word: ἔλεός
  chosen: mercy
  alternatives:
  - steadfast mercy
  - kindness
  - compassion
  lexicon: BDAG
  rationale: ἔλεος commonly denotes mercy or compassionate kindness. 'Mercy' is concise,
    natural English, and fits both divine attribute and action here.
- source_word: ἐπὶ
  chosen: is upon
  alternatives:
  - rests upon
  - is over
  - toward
  lexicon: BDAG
  rationale: With the sense here, ἐπὶ conveys mercy extending over or resting upon
    the objects named. 'Is upon' preserves the spatial metaphor with readable English.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the deeds
  - the creations
  lexicon: BDAG
  rationale: ἔργα is most basically 'works.' Because the following phrase 'of your
    hands' already suggests created things, 'works' preserves the Greek wording without
    over-interpreting.
- source_word: τῶν χειρῶν σου
  chosen: of your hands
  alternatives:
  - that your hands made
  - of your handiwork
  lexicon: BDAG
  rationale: The genitive phrase is a standard anthropomorphic expression for what
    God has made. 'Of your hands' is transparent and preserves the imagery better
    than the more idiomatic 'handiwork'.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - unto the age
  lexicon: BDAG
  rationale: The phrase denotes enduring duration. 'Forever' is the most natural modern
    English equivalent and fits the project's readability aims.
