theological_decisions:
- issue: Whether to make the line explicitly creational by rendering ἔργα τῶν χειρῶν
    σου as 'creations' or 'handiwork.'
  chosen_reading: Retain the more literal 'the works of your hands.'
  alternative_readings:
  - your handiwork
  - the things your hands made
  rationale: The Greek itself does not force an interpretive expansion beyond 'works.'
    Retaining the concrete expression preserves the text's imagery and avoids importing
    a smoother but more interpretive English phrase.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English with original-language primacy.
