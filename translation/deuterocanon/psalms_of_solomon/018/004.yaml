id: PSS.18.4
reference: Psalms of Solomon 18:4
source:
  edition: lxx-swete-1909
  text: καὶ ἀγάπη σου ἐπὶ σπέρμα Ἀβραάμ, υἱοὺς Ἰσραήλ. ἡ παιδία σου ἐφʼ ἡμᾶς ὡς υἱὸν πρωτότοκον μονογενῆ,
  language: Greek
  pages:
  - 810
  validation: swete_direct
translation:
  text: And your love is upon the offspring of Abraham, the sons of Israel. Your discipline is upon us as upon a firstborn, an only son,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγάπη σου
  chosen: your love
  alternatives:
  - your affection
  lexicon: LSJ
  entry: null
  rationale: The project’s contested-terms table defaults ἀγάπη to ‘love.’ That rendering is also the most natural here and preserves the covenantal warmth of the line without weakening it to mere affection.
- source_word: σπέρμα Ἀβραάμ
  chosen: the offspring of Abraham
  alternatives:
  - the seed of Abraham
  - the descendants of Abraham
  lexicon: LSJ
  entry: null
  rationale: σπέρμα is singular but collective. ‘Offspring’ preserves that collective sense in natural English better than the more wooden ‘seed,’ while still keeping the Abrahamic covenantal reference clear.
- source_word: υἱοὺς Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: LSJ
  entry: null
  rationale: The Greek is explicitly ‘sons,’ and keeping that wording preserves the lexical connection with the singular ‘son’ imagery later in the verse. ‘Children of Israel’ and ‘Israelites’ are possible, but they soften that echo.
- source_word: ἡ παιδία σου
  chosen: your discipline
  alternatives:
  - your instruction
  - your training
  lexicon: LSJ
  entry: null
  rationale: In context the noun denotes corrective formation or instruction rather than mere punishment. ‘Discipline’ best fits the following purpose clause in verse 5 and preserves the formative as well as corrective force. The transmitted spelling παιδία is understood here in that sense.
- source_word: ἐφʼ ἡμᾶς
  chosen: is upon us
  alternatives:
  - rests upon us
  - is over us
  lexicon: LSJ
  entry: null
  rationale: The repeated ἐπί-language in this stanza is best preserved rather than paraphrased away. ‘Is upon us’ keeps the psalmic parallelism with the preceding clauses.
- source_word: ὡς υἱὸν πρωτότοκον μονογενῆ
  chosen: as upon a firstborn, an only son
  alternatives:
  - as upon an only firstborn son
  - as upon a firstborn only son
  lexicon: LSJ
  entry: null
  rationale: The Greek piles up both πρωτότοκον and μονογενῆ. Rendering them appositionally as ‘a firstborn, an only son’ preserves both ideas without collapsing either one. This keeps the covenantal firstborn imagery and the sense of singular preciousness together.
