id: PSS.18.7
reference: Psalms of Solomon 18:7
source:
  edition: lxx-swete-1909
  text: μακάριοι οἱ γενόμενοι ἐν ἡμέραις ἐκείναις, ἰδεῖν τὰ ἀγαθὰ Κυρίου, ἃ ποιήσει
    γενεᾷ τῇ ἐρχομένῃ
  language: Greek
  pages:
  - 810
  validation: swete_direct
translation:
  text: Blessed are those born in those days, to see the good things of the Lord that
    he will do for the generation to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who come to be in those days,' that is, 'those living' or 'those
      born' then.
    reason: lexical_alternative
  - marker: b
    text: Or 'the blessings of the Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Retains the elevated covenantal and beatitude-like sense better than
    the flatter English 'happy' or 'fortunate'.
- source_word: οἱ γενόμενοι
  chosen: those born
  alternatives:
  - those who come to be
  - those living
  lexicon: BDAG
  rationale: The participle of γίνομαι here naturally refers to people who come into
    existence in those days. 'Those born' is the clearest idiomatic English rendering,
    while preserving the sense of emergence into life.
- source_word: ἐν ἡμέραις ἐκείναις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: A standard temporal expression best rendered with familiar biblical English
    without becoming archaic.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to behold
  - seeing
  lexicon: BDAG
  rationale: The infinitive is kept transparently as 'to see,' expressing the blessed
    outcome awaiting those born in those days.
- source_word: τὰ ἀγαθὰ
  chosen: the good things
  alternatives:
  - the blessings
  - the good
  lexicon: BDAG
  rationale: This preserves the broadness of the Greek, which does not specify only
    spiritual blessings. 'Blessings' is interpretive and narrower.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - the Lord's
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. In context the genitive
    is best expressed as 'of the Lord' tied to 'good things.'
- source_word: ἃ ποιήσει
  chosen: that he will do
  alternatives:
  - which he will make
  - which he will bring about
  lexicon: BDAG
  rationale: A direct and natural rendering of the relative clause that preserves
    divine agency without over-interpreting the manner of action.
- source_word: γενεᾷ τῇ ἐρχομένῃ
  chosen: the generation to come
  alternatives:
  - the coming generation
  - the generation that is coming
  lexicon: BDAG
  rationale: Idiomatic English that preserves the future-oriented sense of the participial
    phrase.
