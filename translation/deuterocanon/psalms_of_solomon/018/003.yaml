id: PSS.18.3
reference: Psalms of Solomon 18:3
source:
  edition: lxx-swete-1909
  text: τὰ ὦτά σου ἐπακούει εἰς δέησιν πτωχοῦ ἐν ἐλπίδι· τὰ κρίματά σου ἐπὶ πᾶσαν
    τὴν γῆν μετὰ ἐλέους,
  language: Greek
  pages:
  - 810
  validation: swete_direct
translation:
  text: Your ears heed the plea of the poor in hope; your judgments are over all the
    earth with mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the prayer” or “the supplication” of a poor man.
    reason: lexical_alternative
  - marker: b
    text: Or “a poor person”; the Greek is masculine singular.
    reason: lexical_alternative
  - marker: c
    text: Or “upon all the earth.”
    reason: lexical_alternative
  - marker: d
    text: Or 'Your ears heed'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπακούει
  chosen: heed
  alternatives:
  - hear
  - listen to
  lexicon: BDAG
  rationale: The verb carries the sense of responsive hearing, not mere auditory reception.
    “Heed” preserves that active sense in clear English.
- source_word: δέησιν
  chosen: plea
  alternatives:
  - prayer
  - supplication
  lexicon: BDAG
  rationale: The noun denotes an urgent request. “Plea” keeps the emotional force
    without becoming overly formal.
- source_word: πτωχοῦ
  chosen: a poor man
  alternatives:
  - a poor person
  - the poor
  lexicon: BDAG
  rationale: The Greek is masculine singular. Following the project’s gender-accurate
    policy, the main text preserves the singular masculine form rather than flattening
    it into an abstract collective.
- source_word: ἐν ἐλπίδι
  chosen: in hope
  alternatives:
  - with hope
  - hopefully
  lexicon: BDAG
  rationale: A close rendering best preserves the compact Greek expression and its
    tone of trusting expectation.
- source_word: κρίματά
  chosen: judgments
  alternatives:
  - decrees
  - judicial acts
  lexicon: BDAG
  rationale: “Judgments” is the most direct and natural rendering for κρίματα here,
    expressing God’s acts of rule and evaluation.
- source_word: ἐπὶ πᾶσαν τὴν γῆν
  chosen: over all the earth
  alternatives:
  - upon all the earth
  - throughout all the earth
  lexicon: BDAG
  rationale: “Over all the earth” communicates scope and rule naturally in English
    while remaining close to the Greek.
- source_word: μετὰ ἐλέους
  chosen: with mercy
  alternatives:
  - mercifully
  - with compassion
  lexicon: BDAG
  rationale: The phrase modifies the character of the judgments. “With mercy” preserves
    both the noun and the theological tension of judgment joined with mercy.
