  from: Your ears heed
  to: Your ears listen to
  rationale: In English, 'heed' is a volitional act performed by a person, making
    'ears heed' an awkward mixed metaphor. The Greek verb ἐπακούω (to hear, listen
    to, answer) paired with τὰ ὦτά σου (your ears) is naturally rendered 'Your ears
    listen to' or 'Your ears hear'.
