theological_decisions:
- issue: The Greek leaves the object of καθαρίσαι unstated.
  chosen_reading: 'Supply “us” in English: “May the God of Israel purify us …”'
  alternative_readings:
  - May the God of Israel purify [Israel] ...
  - May the God of Israel purify ...
  rationale: English normally requires an expressed object here, while the surrounding
    lines speak corporately of “us” and Israel. Supplying “us” makes the line readable
    without substantially over-interpreting the corporate referent.
  doctrine_reference: Readable modern English, not archaic or academic; original-language
    primacy with honest documentation of supplied sense.
- issue: How to represent the infinitive καθαρίσαι in context.
  chosen_reading: 'Render with prayer-like force: “May the God of Israel purify ...”'
  alternative_readings:
  - to purify
  - that the God of Israel might purify
  rationale: Although the form in Swete is infinitival, the surrounding poetry uses
    infinitives in a volitional or purposive sequence. English is clearer if the implied
    petitionary force is made explicit.
  doctrine_reference: Optimal equivalence; preserve sense without woodenly reproducing
    grammar where English would become unclear.
