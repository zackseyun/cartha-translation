id: PSS.18.9
reference: Psalms of Solomon 18:9
source:
  edition: lxx-swete-1909
  text: κατευθῦναι ἄνδρας ἐν ἔργοις δικαιοσύνης φόβῳ θεοῦ, καταστῆσαι πάντας αὐτοὺς
    ἐνώπιον Κυρίου.
  language: Greek
  pages:
  - 810
  validation: swete_direct
translation:
  text: to guide men in works of righteousness in the fear of God, to set them all
    before the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in righteous deeds.”
    reason: lexical_alternative
  - marker: b
    text: Or “in works of justice.”
    reason: lexical_alternative
  - marker: c
    text: Or “in the presence of the Lord.”
    reason: lexical_alternative
lexical_decisions:
- source_word: κατευθῦναι
  chosen: to guide
  alternatives:
  - to direct
  - to make straight
  lexicon: LSJ
  rationale: The infinitive calls for purposeful moral direction. “Guide” is natural
    modern English and preserves the sense of directing people into a right course
    of action.
- source_word: ἄνδρας
  chosen: men
  alternatives:
  - people
  - menfolk
  lexicon: LSJ
  rationale: The Greek is grammatically masculine plural and does not explicitly use
    a generic term for humanity. Per project philosophy, the gendered form is retained
    unless context clearly requires a neutral rendering.
- source_word: ἐν ἔργοις δικαιοσύνης
  chosen: in works of righteousness
  alternatives:
  - in righteous deeds
  - in works of justice
  lexicon: LSJ
  rationale: This keeps the concrete noun “works” and the project’s default rendering
    of δικαιοσύνη as “righteousness.” “Righteous deeds” is smoother but less formally
    transparent.
- source_word: φόβῳ θεοῦ
  chosen: in the fear of God
  alternatives:
  - with the fear of God
  - by fear of God
  lexicon: LSJ
  rationale: The dative is well represented as a sphere or manner. “In the fear of
    God” preserves the biblical idiom without flattening it to mere emotion.
- source_word: καταστῆσαι
  chosen: to set
  alternatives:
  - to establish
  - to appoint
  - to make stand
  lexicon: LSJ
  rationale: The infinitive parallels the previous infinitive and expresses placing
    or establishing persons in relation to the Lord. “Set” is concise and preserves
    the broad semantic range without over-interpreting institutional appointment.
- source_word: ἐνώπιον Κυρίου
  chosen: before the Lord
  alternatives:
  - in the presence of the Lord
  lexicon: LSJ
  rationale: This is the standard transparent rendering of the phrase, and “Lord”
    follows the project’s default for κύριος.
