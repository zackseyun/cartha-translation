id: PSS.1.5
reference: Psalms of Solomon 1:5
source:
  edition: lxx-swete-1909
  text: ὑψώθησαν ἕως τῶν ἄστρων, εἶπαν Οὐ μὴ πέσωσιν.
  language: Greek
  pages:
  - 788
  validation: swete_direct
translation:
  text: They were exalted to the stars; they said, they said they would certainly not fall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'up to the stars.' The Greek phrase expresses extreme height in hyperbolic imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'We shall never fall.' The Greek uses a strong negation to express emphatic confidence.
    reason: lexical_alternative
  - marker: c
    text: Or '“We will certainly not fall.”'.
    reason: previous_rendering
  - marker: d
    text: Or 'were lifted up as high as the stars'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὑψώθησαν
  chosen: were lifted up
  alternatives:
  - were exalted
  - rose high
  lexicon: BDAG
  rationale: Aorist passive of ὑψόω. 'Were lifted up' preserves the passive form and the sense of elevation without over-interpreting whether the exaltation is self-achieved or bestowed. 'Exalted' is possible, but here the spatial comparison that follows ('to the stars') favors concrete-height imagery.
- source_word: ἕως τῶν ἄστρων
  chosen: as high as the stars
  alternatives:
  - to the stars
  - up to the stars
  lexicon: LSJ
  rationale: ἕως with the genitive marks extent. In idiomatic English, 'as high as the stars' communicates the upward reach naturally while retaining the hyperbolic imagery. 'To the stars' is also possible and is preserved as an alternative nuance.
- source_word: εἶπαν
  chosen: they said
  alternatives:
  - they declared
  lexicon: BDAG
  rationale: Simple narrative speech verb; 'said' is the most direct and least interpretively loaded rendering.
- source_word: Οὐ μὴ πέσωσιν
  chosen: We will certainly not fall
  alternatives:
  - We shall never fall
  - May we never fall
  lexicon: BDAG
  rationale: οὐ μή expresses strong negation; with the first-person plural sense implied by the direct speech, the force is emphatic confidence. 'Will certainly not fall' preserves the emphatic denial in contemporary English. 'We shall never fall' is a strong alternative but slightly more traditional in register.
