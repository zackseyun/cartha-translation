  from: a deafening cry of war was before me
  to: Suddenly, a cry of war was heard before me; he will hear me, because I am filled with righteousness.
  rationale: 'Adjudicator-modified: The reviewer is entirely correct. The source text provided contains a severe OCR error (''κωφωθὴ'' instead of Swete''s ''ἠκούσθη''). The current translation attempts to make sense of the corrupted Greek by rendering it as ''deafening'' (from κωφόω) and supplying a copula. Restoring the actual Greek text (''ἠκούσθη'', aorist passive of ἀκούω) yields ''was heard''. I am modifying the suggestion only to provide the complete verse text.'
