id: PSS.1.2
reference: Psalms of Solomon 1:2
source:
  edition: lxx-swete-1909
  text: ἐξάπινα, κωφωθὴ κραυγὴ πολέμου ἐνώπιόν μου· ἐπακούσεταί μου, ὅτι ἐπλήσθην δικαιοσύνης.
  language: Greek
  pages:
  - 788
  validation: swete_direct
translation:
  text: Suddenly, Suddenly, a cry of war was heard before me; he will hear me, because I am filled with righteousness.; he will hear me, because I am filled with righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'battle cry' for 'cry of war.'
    reason: lexical_alternative
  - marker: b
    text: '''Righteousness'' could also be rendered ''justice.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'a deafening cry of war was before me'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐξάπινα
  chosen: Suddenly
  alternatives:
  - all of a sudden
  - abruptly
  lexicon: LSJ
  rationale: Adverb marking abrupt onset; 'Suddenly' is natural modern English and preserves the force.
- source_word: κωφωθὴ
  chosen: deafening
  alternatives:
  - muffled
  - stunned
  - dull-sounding
  lexicon: LSJ
  rationale: From κωφόω/κωφός, literally involving deafness; in context modifying 'cry' it most plausibly means a cry so intense as to deafen, not merely mute. 'Deafening' best captures the idiomatic effect in English.
- source_word: κραυγὴ πολέμου
  chosen: cry of war
  alternatives:
  - war-cry
  - battle cry
  lexicon: LSJ
  rationale: A literal rendering preserves the genitive relation and avoids over-idiomatizing. 'War-cry' is possible, but 'cry of war' better reflects the source structure while remaining understandable.
- source_word: ἐνώπιόν μου
  chosen: before me
  alternatives:
  - in my presence
  - before my face
  lexicon: LSJ
  rationale: Standard spatial/personal expression; 'before me' is concise and idiomatic.
- source_word: ἐπακούσεταί μου
  chosen: he will hear me
  alternatives:
  - he will listen to me
  - he will answer me
  lexicon: LSJ
  rationale: The verb can imply hearing favorably, but the object alone does not require 'answer.' The subject is implicit and naturally understood as God from context; English retains the pronoun without over-interpreting beyond 'hear.'
- source_word: ἐπλήσθην
  chosen: I am filled
  alternatives:
  - I was filled
  - I have been filled
  lexicon: LSJ
  rationale: The aorist can be rendered idiomatically in English with a present-result sense in this poetic context. 'I am filled' fits the causal clause and reads naturally.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Per doctrinal default, δικαιοσύνη is rendered 'righteousness' in the main text, with 'justice' preserved as an alternative where relevant. Here the moral/religious sense is primary, though 'justice' remains possible.
