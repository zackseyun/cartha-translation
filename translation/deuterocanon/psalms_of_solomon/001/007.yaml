id: PSS.1.7
reference: Psalms of Solomon 1:7
source:
  edition: lxx-swete-1909
  text: αἱ ἁμαρτίαι αὐτῶν ἐν ἀποκρύφοις, καὶ ἐγὼ οὐκ ᾔδειν.
  language: Greek
  pages:
  - 788
  validation: swete_direct
translation:
  text: Their sins were in secret places, and I did not know.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their sins were in hidden things' or 'Their sins were done in secret.'
      The Greek phrase is terse and could be taken more generally than 'secret places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱ ἁμαρτίαι
  chosen: sins
  alternatives:
  - sinful acts
  - offenses
  lexicon: LSJ
  rationale: The plural noun straightforwardly denotes concrete sins or acts of wrongdoing.
    'Sins' is the most direct and natural English equivalent.
- source_word: αὐτῶν
  chosen: their
  lexicon: LSJ
  rationale: Standard genitive/possessive pronoun referring to the people under discussion;
    'their' preserves the plain referent without interpretive expansion.
- source_word: ἐν ἀποκρύφοις
  chosen: in secret places
  alternatives:
  - in secret
  - in hidden things
  - in concealed places
  lexicon: LSJ
  rationale: The phrase uses the plural of ἀπόκρυφος substantivally/elliptically.
    Rendering it as 'in secret places' preserves the plural form and the sense of
    hiddenness better than the more flattened adverbial 'in secret.'
- source_word: καὶ ἐγώ
  chosen: and I
  alternatives:
  - but I
  lexicon: LSJ
  rationale: καί normally means 'and.' Although English might prefer 'but I' to heighten
    contrast, the Greek conjunction does not require that stronger adversative force
    here.
- source_word: οὐκ ᾔδειν
  chosen: did not know
  alternatives:
  - was not aware
  - did not recognize
  lexicon: LSJ
  rationale: Imperfect of οἶδα expresses lack of knowledge/awareness. 'Did not know'
    is the clearest idiomatic English rendering and preserves the speaker's claimed
    ignorance.
