theological_decisions:
- issue: Nature of the hiddenness in ἐν ἀποκρύφοις
  chosen_reading: The text states that their sins were concealed/secret, without specifying
    whether hidden from God, from the speaker, or generally done covertly.
  alternative_readings:
  - Their sins were committed secretly
  - Their sins were hidden from sight
  - Their sins were in hidden matters
  rationale: The Greek phrase is terse and somewhat elliptical. The immediate following
    clause 'and I did not know' supports keeping the wording open rather than resolving
    the hiddenness into a more specific theological claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
