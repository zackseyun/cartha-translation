id: PSS.1.6
reference: Psalms of Solomon 1:6
source:
  edition: lxx-swete-1909
  text: καὶ ἐξύβρισαν ἐν τοῖς ἀγαθοῖς αὐτῶν, καὶ οὐκ ἤνεγκαν.
  language: Greek
  pages:
  - 788
  validation: swete_direct
translation:
  text: and they acted arrogantly amid their good things, and they did not endure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their prosperity' or 'with their goods' for 'amid their good things.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they did not bear it' / 'they did not hold out.' The Greek leaves the
      object unstated.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξύβρισαν
  chosen: acted arrogantly
  alternatives:
  - were insolent
  - behaved outrageously
  - committed hubris
  lexicon: LSJ
  rationale: The verb from ὑβρίζω denotes insolent, overbearing, or outrageous behavior.
    'Acted arrogantly' communicates the moral force in clear modern English without
    sounding overly technical.
- source_word: ἐν τοῖς ἀγαθοῖς αὐτῶν
  chosen: amid their good things
  alternatives:
  - in their prosperity
  - with their goods
  - among their blessings
  lexicon: LSJ
  rationale: ἀγαθά in the plural can refer to goods, advantages, or blessings. The
    phrase likely describes the sphere or circumstance of their well-being/prosperity.
    'Amid their good things' stays close to the Greek while remaining intelligible;
    'prosperity' is possible but slightly more interpretive.
- source_word: οὐκ ἤνεγκαν
  chosen: they did not endure
  alternatives:
  - they did not bear it
  - they did not hold out
  - they could not endure
  lexicon: LSJ
  rationale: From φέρω, the aorist here idiomatically can mean 'bear' or 'endure.'
    With no explicit object stated, an intransitive-like English rendering best preserves
    the terseness of the Greek. 'Could not endure' adds inability not explicit in
    the text.
