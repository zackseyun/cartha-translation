id: PSS.1.8
reference: Psalms of Solomon 1:8
source:
  edition: lxx-swete-1909
  text: αἱ ἀνομίαι αὐτῶν ὑπὲρ τὰ πρὸ αὐτῶν ἔθνη, ἐβεβήλωσαν τὰ ἅγια Κυρίου ἐν βεβηλώσει.
  language: Greek
  pages:
  - 788
  validation: swete_direct
translation:
  text: Their lawless deeds surpassed those of the nations before them; they profaned the sanctuary of the Lord with profanation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary of the Lord' / 'the holy places of the Lord'; Greek 'the holy things of the Lord' is plural and can refer broadly to what is sacred.
    reason: lexical_alternative
  - marker: b
    text: Or 'they defiled the holy things of the Lord with defilement'.
    reason: previous_rendering
lexical_decisions:
- source_word: αἱ ἀνομίαι
  chosen: lawless deeds
  alternatives:
  - lawlessnesses
  - iniquities
  - transgressions
  lexicon: LSJ
  rationale: Plural abstract/concrete expression best rendered idiomatically as 'lawless deeds' to preserve both the sense of violation of law and the plural acts implied by the Greek.
- source_word: αὐτῶν
  chosen: their
  rationale: Straightforward possessive pronoun referring to the offending group in context.
- source_word: ὑπὲρ
  chosen: surpassed
  alternatives:
  - were beyond
  - were greater than
  - exceeded
  lexicon: LSJ
  rationale: In comparison with the accusative phrase 'τὰ πρὸ αὐτῶν ἔθνη,' ὑπέρ expresses excess/comparison. Rendering the clause verbally as 'surpassed' gives natural English while retaining the comparative force.
- source_word: τὰ πρὸ αὐτῶν ἔθνη
  chosen: the nations before them
  alternatives:
  - the nations prior to them
  - the former nations
  - the nations who came before them
  lexicon: LSJ
  rationale: πρὸ with pronoun indicates those earlier in time. 'The nations before them' is concise and preserves the temporal comparison.
- source_word: ἐβεβήλωσαν
  chosen: they defiled
  alternatives:
  - they profaned
  - they desecrated
  lexicon: LSJ
  rationale: The verb means to treat as common/profane. 'Defiled' is accessible modern English and fits the parallel noun phrase 'with defilement'; 'profaned' is possible but slightly less natural here.
- source_word: τὰ ἅγια Κυρίου
  chosen: the holy things of the Lord
  alternatives:
  - the sanctuary of the Lord
  - the holy places of the Lord
  - the Lord's holy things
  lexicon: LSJ
  rationale: The neuter plural τὰ ἅγια can denote holy things or sacred precincts. Without narrower contextual markers in this verse alone, 'the holy things of the Lord' preserves the plural and avoids over-specifying to 'sanctuary'.
- source_word: ἐν βεβηλώσει
  chosen: with defilement
  alternatives:
  - by profanation
  - in profanation
  lexicon: LSJ
  rationale: The prepositional phrase intensifies/manner-specifies the verb with a cognate noun. 'With defilement' keeps the cognate emphasis in readable English.
