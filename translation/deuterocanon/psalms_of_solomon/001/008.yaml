theological_decisions:
- issue: Whether τὰ ἅγια Κυρίου should be rendered specifically as 'sanctuary' or more broadly as 'holy things of the Lord'
  chosen_reading: the holy things of the Lord
  alternative_readings:
  - the sanctuary of the Lord
  - the holy places of the Lord
  rationale: The Greek neuter plural is broader than a singular 'sanctuary' and may include sacred objects or precincts. To avoid importing a narrower cultic claim than the wording itself requires, the broader rendering is retained, with alternatives noted.
