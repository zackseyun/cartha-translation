theological_decisions:
- issue: Scope of γῆ in the first colon versus second colon
  chosen_reading: First colon rendered 'land,' second colon 'earth' to preserve the
    poetic escalation and avoid flattening both uses into identical English.
  alternative_readings:
  - Render both as 'earth' for strict lexical consistency
  - Render both as 'land' for local-territorial scope
  rationale: The same Greek noun appears twice, but Hebrew/Greek poetic style often
    uses repetition with contextual nuance. The first phrase naturally suits dissemination
    throughout a territory, while the second idiom is a fixed expression for extreme
    extent. Using distinct English equivalents best communicates the parallelism without
    overstating precision.
