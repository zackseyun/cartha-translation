id: PSS.1.4
reference: Psalms of Solomon 1:4
source:
  edition: lxx-swete-1909
  text: ὁ πλοῦτος αὐτῶν διεδόθη εἰς πᾶσαν τὴν γῆν, καὶ ἡ δόξα αὐτῶν ἕως ἐσχάτου τῆς
    γῆς.
  language: Greek
  pages:
  - 788
  validation: swete_direct
translation:
  text: Their wealth was spread throughout all the land, and their glory reached to
    the end of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their wealth was spread throughout all the earth.' The Greek γῆ can
      mean either 'land' or 'earth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their renown' for 'their glory.' Greek δόξα can refer to honor or reputation
      as well as splendor.
    reason: lexical_alternative
  - marker: c
    text: Or 'and their glory reached to the end of the earth.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ πλοῦτος
  chosen: wealth
  alternatives:
  - riches
  lexicon: LSJ
  rationale: πλοῦτος commonly denotes wealth or riches. 'Wealth' is natural modern
    English and fits a collective singular subject.
- source_word: αὐτῶν
  chosen: their
  lexicon: LSJ
  rationale: Straightforward possessive pronoun referring to the people under discussion.
- source_word: διεδόθη
  chosen: was spread
  alternatives:
  - was distributed
  - was dispersed
  lexicon: LSJ
  rationale: The passive of διαδίδωμι here conveys something being spread abroad or
    distributed widely. 'Was spread' best fits the following phrase 'throughout all
    the land' and avoids an overly commercial sense.
- source_word: εἰς πᾶσαν τὴν γῆν
  chosen: throughout all the land
  alternatives:
  - into all the land
  - throughout the whole earth
  lexicon: LSJ
  rationale: γῆ can mean land or earth. In this poetic parallelism, the second colon
    explicitly says 'to the end of the earth,' so rendering the first as 'land' preserves
    a probable intensification from regional extent to universal renown.
- source_word: ἡ δόξα
  chosen: glory
  alternatives:
  - splendor
  - renown
  lexicon: LSJ
  rationale: δόξα can denote glory, splendor, or reputation. 'Glory' preserves the
    elevated register and leaves open both honor and visible magnificence.
- source_word: ἕως ἐσχάτου τῆς γῆς
  chosen: to the end of the earth
  alternatives:
  - to earth's farthest end
  - to the farthest reaches of the earth
  lexicon: LSJ
  rationale: A conventional expression for the furthest extent of the world. 'To the
    end of the earth' is clear, idiomatic, and appropriately formal.
