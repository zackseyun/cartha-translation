id: PSS.1.3
reference: Psalms of Solomon 1:3
source:
  edition: lxx-swete-1909
  text: ἐλογισάμην ἐν καρδίᾳ μου ὅτι ἐπλήσθην δικαιοσύνης, ἐν τῷ εὐθηνῆσαί με καὶ
    πολλὴν γενέσθαι ἐν τέκνοις.
  language: Greek
  pages:
  - 788
  validation: swete_direct
translation:
  text: I thought in my heart that I had been filled with righteousness, when I prospered
    and became abundant in children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.' The Greek word can mean either, but here it most likely refers
      to perceived righteousness.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and to become much in children,' that is, 'to have many children'
      or 'to increase in offspring.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλογισάμην
  chosen: I thought
  alternatives:
  - I considered
  - I reasoned
  lexicon: LSJ
  rationale: Aorist middle of λογίζομαι here introduces inward reflection. 'I thought'
    is natural English and preserves the first-person internal reckoning without overformalizing.
- source_word: ἐν καρδίᾳ μου
  chosen: in my heart
  alternatives:
  - within myself
  lexicon: LSJ
  rationale: A standard idiom for inward thought or self-reflection. 'In my heart'
    preserves the biblical anthropological sense rather than reducing it to mere cognition.
- source_word: ἐπλήσθην
  chosen: I had been filled
  alternatives:
  - I was filled
  - I was full
  lexicon: LSJ
  rationale: Passive sense of being filled. English pluperfect fits the ὅτι-clause
    as the content of prior reflection and reads smoothly with the following temporal
    phrase.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Per doctrine, δικαιοσύνη defaults to 'righteousness.' In this self-assessment
    context, 'righteousness' better captures perceived moral standing, while 'justice'
    is preserved as an alternative.
- source_word: ἐν τῷ εὐθηνῆσαί με
  chosen: when I prospered
  alternatives:
  - in my prospering
  - when I flourished
  lexicon: LSJ
  rationale: The articular infinitive with ἐν has temporal force here. εὐθηνέω denotes
    thriving or prospering; 'when I prospered' conveys the situational timing clearly
    in idiomatic English.
- source_word: πολλὴν γενέσθαι
  chosen: became abundant
  alternatives:
  - became great
  - increased greatly
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek; πολλήν expresses greatness/abundance.
    'Became abundant' keeps the notion of increase without adding an explicit noun
    not present in the text.
- source_word: ἐν τέκνοις
  chosen: in children
  alternatives:
  - through children
  - in offspring
  lexicon: LSJ
  rationale: τέκνα denotes children/offspring. 'In children' is a fairly literal rendering
    of the sphere/respect construction, and in context means abundance consisting
    in many children.
