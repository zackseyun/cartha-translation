theological_decisions:
- issue: Rendering δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The speaker claims fullness of moral rightness in connection with prosperity;
    'righteousness' best reflects that self-evaluation and follows the project's default
    for δικαιοσύνη. 'Justice' is possible but less natural in this context.
  doctrine_reference: 'DOCTRINE.md contested terms: δικαιοσύνη → righteousness'
