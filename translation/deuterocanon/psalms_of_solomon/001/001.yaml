id: PSS.1.1
reference: Psalms of Solomon 1:1
source:
  edition: lxx-swete-1909
  text: ἘΒΟΗΣΑ πρὸς Κύριον ἐν τῷ θλίβεσθαί με εἰς τέλος, πρὸς τὸν θεὸν ἐν τῷ ἐπιδέσθαι ἁμαρτωλοῦς.
  language: Greek
  pages:
  - 788
  validation: swete_direct
translation:
  text: I cried out to the Lord I cried out to the Lord when I was afflicted to the end, to God when sinners attacked. to the end, to God when sinners attacked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'when I was afflicted completely/continually'; the phrase 'to the end' translates Greek εἰς τέλος quite literally and may function idiomatically as an intensifier.
    reason: lexical_alternative
  - marker: b
    text: The Greek expression behind 'when sinners attacked' is difficult. The verb may carry a different nuance such as 'came upon' or another hostile action; the translation reflects the probable sense in this lament context.
    reason: alternative_reading
  - marker: c
    text: Or 'in my being afflicted'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἘΒΟΗΣΑ
  chosen: I cried out
  alternatives:
  - I called out
  - I shouted
  lexicon: LSJ
  rationale: Aorist first-person singular of βοάω, expressing an urgent cry to God. 'Cried out' preserves both the verbal force and the prayerful context better than the flatter 'called out'.
- source_word: πρὸς Κύριον
  chosen: to the Lord
  alternatives:
  - unto the Lord
  lexicon: LSJ
  rationale: πρός with accusative marks direction toward the one addressed. κύριος is rendered by the project's default 'Lord'.
- source_word: ἐν τῷ θλίβεσθαί με
  chosen: in my being afflicted
  alternatives:
  - when I was afflicted
  - in my distress
  lexicon: LSJ
  rationale: 'The articular infinitive with ἐν is temporal/circumstantial: ''in/when I was being afflicted.'' The passive nuance of θλίβεσθαι is retained with ''being afflicted'' rather than collapsing it into the abstract noun ''distress''.'
- source_word: εἰς τέλος
  chosen: to the end
  alternatives:
  - utterly
  - continually
  - completely
  lexicon: LSJ
  rationale: Literally 'to the end.' In context it likely intensifies the extremity or duration of the affliction. The more literal rendering preserves the phrase's force without over-interpreting whether the sense is temporal, intensive, or idiomatic.
- source_word: πρὸς τὸν θεὸν
  chosen: to God
  alternatives:
  - unto God
  lexicon: LSJ
  rationale: Parallel to 'to the Lord,' indicating the addressee of the cry. The repetition is preserved in English.
- source_word: ἐν τῷ ἐπιδέσθαι
  chosen: when ... attacked
  alternatives:
  - when ... came upon
  - when ... looked upon
  - when ... bound
  lexicon: LSJ
  rationale: The infinitive ἐπιδέσθαι in this context is difficult and may reflect hostile action directed by sinners against the speaker. 'Attacked' gives a defensible contextual sense from the immediate lament setting, while acknowledging lexical difficulty in a footnote.
- source_word: ἁμαρτωλοῦς
  chosen: sinners
  alternatives:
  - sinful men
  - the wicked
  lexicon: LSJ
  rationale: The term denotes sinful persons. 'Sinners' is the most direct rendering; English does not require an explicit article here.
