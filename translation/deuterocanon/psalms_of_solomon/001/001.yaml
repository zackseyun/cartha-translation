- issue: Rendering κύριος in a prayer context
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: This follows the project's default for κύριος and fits address to Israel's God without importing a more servile nuance.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord'
- issue: Whether to smooth the double divine address ('to the Lord ... to God')
  chosen_reading: Retain both titles in parallel
  alternative_readings:
  - Combine into a single address
  rationale: The Greek deliberately repeats the address with parallel prepositional phrases. Keeping both preserves the poetic structure and intensification of the prayer.
