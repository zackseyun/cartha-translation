  to: For the destruction of the sinner is dreadful, and not one of all these things will touch the righteous.
  rationale: 'Adjudicator-modified: The reviewer is correct that the current translation omits ''πάντων'' (all). The Greek ''οὐδὲν ἐκ πάντων τούτων'' literally means ''nothing out of all these things''. Modifying the text to include ''all'' restores the author''s totalizing emphasis regarding the safety of the righteous from the preceding list of calamities. I am providing the full sentence for the rewrite.'
