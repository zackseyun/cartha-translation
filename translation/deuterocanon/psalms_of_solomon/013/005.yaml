id: PSS.13.5
reference: Psalms of Solomon 13:5
source:
  edition: lxx-swete-1909
  text: ὅτι δεινὴ ἡ καταστροφὴ τοῦ ἁμαρτωλοῦ, καὶ οὐχ ἅψεται δικαίου οὐδὲν ἐκ πάντων τούτων.
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: For the destruction of the sinner is dreadful, and For the destruction of the sinner is dreadful, and not one of all these things will touch the righteous. will touch the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'none of these things'.
    reason: previous_rendering
lexical_decisions:
- source_word: δεινή
  chosen: dreadful
  alternatives:
  - terrible
  - fearful
  - severe
  lexicon: LSJ
  rationale: Conveys the grave, alarming force of the adjective in natural modern English without sounding archaic. It modifies the sinner's destruction, stressing its awful character rather than merely its size.
- source_word: καταστροφή
  chosen: destruction
  alternatives:
  - overthrow
  - ruin
  - collapse
  lexicon: LSJ
  rationale: '"Destruction" is the clearest broad rendering here, expressing devastating judgment or ruin without narrowing the sense to military overthrow alone.'
- source_word: ἁμαρτωλοῦ
  chosen: the sinner
  alternatives:
  - the sinful man
  - the wicked person
  lexicon: LSJ
  rationale: A straightforward rendering of the substantival singular. "The sinner" is idiomatic and preserves the moral force of the Greek.
- source_word: ἅψεται
  chosen: will touch
  alternatives:
  - will come upon
  - will affect
  - will cling to
  lexicon: LSJ
  rationale: The verb commonly means "touch" or "take hold of." Here "will touch" preserves the concrete imagery while naturally expressing that such calamities do not come upon the righteous.
- source_word: δικαίου
  chosen: the righteous
  alternatives:
  - the righteous man
  - a righteous person
  - the just
  lexicon: LSJ
  rationale: The anarthrous/genitive singular after the verb is best represented idiomatically in English as a representative singular/class term. "The righteous" is natural and preserves the moral category without unnecessarily specifying gender.
- source_word: οὐδὲν ἐκ πάντων τούτων
  chosen: none of these things
  alternatives:
  - nothing from all these things
  - none at all of all these things
  lexicon: LSJ
  rationale: 'This compresses the Greek into clear English while retaining the totalizing force: not one of the previously mentioned calamities reaches the righteous.'
