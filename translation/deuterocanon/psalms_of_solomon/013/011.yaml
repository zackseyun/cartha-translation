theological_decisions:
- issue: Whether to soften 'fear' language into 'revere' for readability
  chosen_reading: those who fear him
  alternative_readings:
  - those who revere him
  rationale: The Greek preserves the traditional biblical concept of fearing God,
    which includes reverence but is not exhausted by it. Keeping 'fear' preserves
    that theological tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
