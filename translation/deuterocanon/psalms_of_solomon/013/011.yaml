id: PSS.13.11
reference: Psalms of Solomon 13:11
source:
  edition: lxx-swete-1909
  text: ἐπὶ δὲ τοὺς ὁσίους τὸ ἔλεος Κυρίου, καὶ ἐπὶ τοὺς φοβουμένους τὸ ἔλεος αὐτοῦ.
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: But on the pious is the mercy of the Lord, and on those who fear him is his mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'devout ones' or 'saints.'
    reason: lexical_alternative
  - marker: b
    text: '''Fear him'' can also be expressed as ''revere him,'' but the Greek keeps the stronger biblical language of fearing God.'
    reason: lexical_alternative
  - marker: c
    text: Or 'holy ones'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὁσίους
  chosen: holy ones
  alternatives:
  - saints
  - devout ones
  - faithful ones
  lexicon: LSJ
  rationale: ὅσιος denotes those marked by piety or holiness. 'Holy ones' preserves the moral-religious sense without importing later ecclesiastical overtones that 'saints' may carry.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: LSJ
  rationale: '''Mercy'' is the most direct and natural rendering here, fitting both occurrences and preserving the covenantal tone without overexpanding the phrase.'
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: This follows the project's default rendering of κύριος as 'Lord.' The article is natural in English here because the phrase identifies the Lord's mercy as a known divine attribute.
- source_word: φοβουμένους
  chosen: those who fear him
  alternatives:
  - those who revere him
  - those who are afraid of him
  lexicon: LSJ
  rationale: The participle denotes reverent fear toward God. 'Fear him' keeps the biblical idiom and theological weight better than the softer 'revere him,' while avoiding the misleadingly emotional sense of mere fright.
