id: PSS.13.10
reference: Psalms of Solomon 13:10
source:
  edition: lxx-swete-1909
  text: ἁμαρτωλοὶ δὲ ἀρθήσονται εἰς ἀπώλειαν, καὶ οὐχ εὑρεθήσεται μνημόσυνον αὐτῶν
    ἔτι.
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: But sinners will be swept away to destruction, and no remembrance of them
    will be found any longer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will be taken away” / “will be removed.”
    reason: lexical_alternative
  - marker: b
    text: Or “no memorial of them will be found anymore.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁμαρτωλοὶ
  chosen: sinners
  alternatives:
  - the wicked
  lexicon: BDAG
  rationale: The noun directly denotes those characterized by sin. “Sinners” is the
    plain lexical sense and avoids importing a more interpretive moral category than
    the Greek itself states.
- source_word: ἀρθήσονται
  chosen: will be swept away
  alternatives:
  - will be taken away
  - will be removed
  lexicon: BDAG
  rationale: From αἴρω in the future passive. In this judgment context, “swept away”
    conveys both removal and ruin more naturally in English than the more mechanical
    “taken away,” while remaining anchored to the verb’s core sense of being carried
    off or removed.
- source_word: εἰς ἀπώλειαν
  chosen: to destruction
  alternatives:
  - into destruction
  - to ruin
  - to perdition
  lexicon: BDAG
  rationale: ἀπώλεια here denotes destruction or ruin. “To destruction” is natural
    English after the passive verb and preserves the severity without using the more
    doctrinally loaded “perdition.”
- source_word: μνημόσυνον
  chosen: remembrance
  alternatives:
  - memorial
  - memory
  lexicon: BDAG
  rationale: The term refers to what preserves someone in memory. “Remembrance” fits
    the poetic register and works well with the passive expression “will be found.”
- source_word: ἔτι
  chosen: any longer
  alternatives:
  - still
  - any more
  lexicon: BDAG
  rationale: In this negated future clause, “any longer” clearly conveys cessation
    from that point onward in idiomatic English.
