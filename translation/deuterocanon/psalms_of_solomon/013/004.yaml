id: PSS.13.4
reference: Psalms of Solomon 13:4
source:
  edition: lxx-swete-1909
  text: ἐταράχθη ὁ ἀσεβὴς διὰ παραπτώματα αὐτοῦ, μὴ ὅτε συμπαραληφθῇ μετὰ τῶν ἁμαρτωλῶν.
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: The ungodly was troubled because of his transgressions, lest he be taken away
    with sinners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''not when he is taken away with sinners.'' The Greek clause μὴ ὅτε
      συμπαραληφθῇ is syntactically difficult; the main text takes it in a preventive
      sense: ''lest he be taken away.'''
    reason: alternative_reading
  - marker: b
    text: '''Taken away'' could also be rendered ''swept away'' or ''taken along together,''
      highlighting shared judgment with sinners.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταράχθη
  chosen: was troubled
  alternatives:
  - was shaken
  - was disturbed
  lexicon: BDAG
  rationale: The passive of ταράσσω can denote inward disturbance or alarm. 'Was troubled'
    preserves that sense in natural English without over-specifying whether the disturbance
    is emotional, circumstantial, or judicial.
- source_word: ὁ ἀσεβής
  chosen: the ungodly
  alternatives:
  - the wicked
  - the impious
  lexicon: BDAG
  rationale: ἀσεβής emphasizes irreverence and godlessness, not merely general moral
    badness. 'Ungodly' best preserves that religious-ethical sense, while 'wicked'
    is broader and less specific.
- source_word: διὰ παραπτώματα αὐτοῦ
  chosen: because of his transgressions
  alternatives:
  - because of his offenses
  - on account of his trespasses
  lexicon: BDAG
  rationale: διά with the accusative here is causal, so 'because of' is the clearest
    rendering. παραπτώματα denotes concrete moral lapses or violations; 'transgressions'
    fits the gravity and biblical register well.
- source_word: μὴ ὅτε συμπαραληφθῇ
  chosen: lest he be taken away
  alternatives:
  - that he might not be taken away
  - not when he is taken away
  - lest he be swept away
  lexicon: BDAG
  rationale: 'The clause is syntactically compressed and somewhat awkward in Greek.
    Rendering μὴ with a preventive sense (''lest'') gives the most coherent connection
    in context: the ungodly is troubled because judgment may overtake him. συμπαραληφθῇ
    is kept with the sense of being taken along together with others in judgment.'
- source_word: μετὰ τῶν ἁμαρτωλῶν
  chosen: with sinners
  alternatives:
  - together with sinners
  - along with sinful people
  lexicon: BDAG
  rationale: The phrase marks association in shared judgment. 'With sinners' is concise
    and natural; the idea of togetherness is already carried by the verb συμπαραληφθῇ.
