  from: Wicked beasts
  to: Savage beasts rushed at them; with their teeth they tore at their flesh, and
    with their molars they crushed their bones; and from all these things the Lord
    rescued us.
  rationale: 'Adjudicator-modified: The reviewer is correct that ''wicked'' inappropriately
    assigns moral culpability to animals. The Greek πονηρά (reflecting the Hebrew
    idiom חַיָּה רָעָה) when applied to animals means dangerous, harmful, or vicious
    (BDAG 2). ''Savage beasts'' captures this physical ferocity perfectly in modern
    English without the moral baggage of ''wicked'' or the slightly archaic ring of
    ''evil beasts.'''
