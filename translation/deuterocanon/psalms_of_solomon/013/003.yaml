theological_decisions:
- issue: Referent shift between 'them/their' and 'us'
  chosen_reading: 'The verse is translated as written, preserving the movement from
    third person description to first person confession: ''the Lord rescued us.'''
  alternative_readings:
  - Harmonize the pronouns to 'them' for smoother English
  rationale: The Greek text ends with ἡμᾶς ('us'), and the translation should preserve
    this rhetorical shift rather than smooth it away without textual warrant.
  doctrine_reference: Preserve theological tension rather than resolve it.
