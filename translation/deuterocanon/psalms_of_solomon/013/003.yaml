id: PSS.13.3
reference: Psalms of Solomon 13:3
source:
  edition: lxx-swete-1909
  text: θηρία ἐπέδραμοσαν αὐτοῖς πονηρά· ἐν τοῖς ὀδοῦσιν αὐτῶν ἔτιλλον σάρκας αὐτῶν,
    καὶ ἐν ταῖς μυλαῖς ἔθλων ὀστᾶ αὐτῶν· καὶ ἐκ τούτων ἁπάντων ἐρρύσατο ἡμᾶς Κύριος.
  language: Greek
  pages:
  - 802
  validation: swete_direct
translation:
  text: Savage beasts rushed at them; with their teeth they tore their flesh, and
    with their molars they crushed their bones; and from all these things the Lord
    rescued us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek shifts from 'them/their' in the attack imagery to 'us' in the final
      clause; the translation preserves that shift.
    reason: alternative_reading
  - marker: b
    text: Or 'Wicked beasts'.
    reason: previous_rendering
lexical_decisions:
- source_word: θηρία
  chosen: beasts
  alternatives:
  - wild animals
  - brutes
  lexicon: LSJ
  rationale: The term refers literally to savage animals. “Beasts” preserves the vivid
    and hostile imagery better than the more neutral “animals.”
- source_word: ἐπέδραμοσαν
  chosen: rushed at
  alternatives:
  - attacked
  - ran upon
  lexicon: LSJ
  rationale: The verb conveys sudden violent onset. “Rushed at” keeps both motion
    and aggression without overinterpreting the manner.
- source_word: πονηρά
  chosen: wicked
  alternatives:
  - evil
  - malicious
  lexicon: LSJ
  rationale: “Wicked” preserves the moral coloring of πονηρά while fitting natural
    English with the metaphorical force of hostile beasts.
- source_word: ἔτιλλον
  chosen: tore at
  alternatives:
  - plucked
  - mangled
  lexicon: LSJ
  rationale: The verb can mean pluck or tear out. In context of teeth and flesh, “tore
    at” is the most idiomatic and vivid English rendering.
- source_word: σάρκας
  chosen: flesh
  alternatives:
  - bodies
  - meat
  lexicon: LSJ
  rationale: This is a literal bodily reference, so “flesh” is the most direct and
    contextually appropriate rendering.
- source_word: μυλαῖς
  chosen: molars
  alternatives:
  - jaw-teeth
  - grinding teeth
  lexicon: LSJ
  rationale: The word denotes grinding teeth. “Molars” gives a precise and vivid English
    equivalent, matching the bodily violence of the line.
- source_word: ἔθλων
  chosen: crushed
  alternatives:
  - ground
  - broke
  lexicon: LSJ
  rationale: In context with bones and molars, the sense is violent grinding or crushing.
    “Crushed” is clear, forceful, and natural in English.
- source_word: ὀστᾶ
  chosen: bones
  alternatives:
  - bone
  lexicon: LSJ
  rationale: Straightforward plural bodily reference; “bones” is the natural literal
    rendering.
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: LSJ
  rationale: The verb means to deliver or rescue from danger. “Rescued” fits the immediate
    physical peril described in the verse.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered “Lord.” The title is conventional
    and appropriate here for God’s saving action.
