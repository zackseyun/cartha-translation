id: PSS.13.9
reference: Psalms of Solomon 13:9
source:
  edition: lxx-swete-1909
  text: ὅτι φείσεται Κύριος τῶν ὁσίων αὐτοῦ, καὶ τὰ παραπτώματα αὐτῶν ἐξαλείψει ἐν
    παιδείᾳ. ἡ γὰρ ζωὴ τῶν δικαίων εἰς τὸν αἰῶνα·
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: For the Lord will spare his holy ones, and he will wipe away their trespasses
    by discipline; for the life of the righteous is forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'godly ones' or 'faithful ones.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will blot out their trespasses through discipline' or 'with chastening.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φείσεται
  chosen: will spare
  alternatives:
  - will have mercy on
  - will refrain from punishing
  lexicon: BDAG
  rationale: The verb commonly carries the sense of sparing or refraining from full
    judgment. 'Will spare' preserves the concrete force better than the more generalized
    'will have mercy,' especially alongside the following clause about disciplined
    correction rather than destruction.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - the Lord
  lexicon: BDAG
  rationale: This follows the project's default rendering for κύριος as a divine title.
    The anarthrous Greek still naturally functions as a title in English.
- source_word: ὁσίων
  chosen: holy ones
  alternatives:
  - godly ones
  - faithful ones
  - saints
  lexicon: BDAG
  rationale: '''Holy ones'' keeps the lexical connection to holiness and covenant
    devotion without importing later ecclesiastical overtones that ''saints'' may
    carry. ''Godly ones'' is plausible but slightly more interpretive.'
- source_word: παραπτώματα
  chosen: trespasses
  alternatives:
  - transgressions
  - sins
  lexicon: BDAG
  rationale: '''Trespasses'' preserves the sense of moral offenses or lapses while
    remaining readable. ''Transgressions'' is slightly heavier and ''sins'' is broader
    and less specific.'
- source_word: ἐξαλείψει
  chosen: will wipe away
  alternatives:
  - will blot out
  - will erase
  lexicon: BDAG
  rationale: The verb evokes removal or obliteration of offenses. 'Will wipe away'
    is natural modern English and preserves the image without sounding overly technical.
- source_word: ἐν παιδείᾳ
  chosen: by discipline
  alternatives:
  - through discipline
  - by correction
  - with chastening
  lexicon: BDAG
  rationale: The phrase indicates the means or context in which the trespasses are
    removed. 'By discipline' best captures corrective training rather than mere punishment,
    fitting the verse's contrast between mercy and moral correction.
- source_word: δικαίων
  chosen: the righteous
  alternatives:
  - the just
  lexicon: BDAG
  rationale: This aligns with the project's default handling of δικ- language outside
    specifically Pauline righteousness/justice tensions. 'The righteous' is the most
    transparent and idiomatic choice here.
- source_word: εἰς τὸν αἰῶνα
  chosen: is forever
  alternatives:
  - is for ever
  - is unto the age
  - is eternal
  lexicon: BDAG
  rationale: In this context the phrase expresses enduring, unending life. 'Is forever'
    is clear modern English and avoids either archaism or over-specification.
