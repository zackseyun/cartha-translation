id: PSS.13.8
reference: Psalms of Solomon 13:8
source:
  edition: lxx-swete-1909
  text: ὅτι νουθετήσει δίκαιον ὡς υἱὸν ἀγαπήσεως, καὶ ἡ παιδεία αὐτοῦ ὡς πρωτοτόκου.
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: For he will correct the righteous like a beloved son, and his discipline is
    like that of a firstborn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “For he will admonish the righteous like a son of love.”
    reason: lexical_alternative
  - marker: b
    text: Or “his instruction/training is like that of a firstborn.”
    reason: lexical_alternative
lexical_decisions:
- source_word: νουθετήσει
  chosen: will correct
  alternatives:
  - will admonish
  - will instruct
  - will warn
  lexicon: BDAG
  rationale: The future verb carries the sense of giving corrective instruction or
    admonition. “Will correct” fits the disciplinary context created by παιδεία while
    remaining natural English.
- source_word: δίκαιον
  chosen: the righteous
  alternatives:
  - a righteous man
  - the just
  lexicon: BDAG
  rationale: The singular adjective is used substantivally. “The righteous” preserves
    the representative singular without importing unnecessary gender marking.
- source_word: υἱὸν ἀγαπήσεως
  chosen: a beloved son
  alternatives:
  - a son of love
  - a dearly loved son
  lexicon: BDAG
  rationale: The genitive is most naturally taken as a qualitative expression. “Beloved
    son” communicates the sense clearly in modern English while staying close to the
    Greek image.
- source_word: παιδεία
  chosen: discipline
  alternatives:
  - instruction
  - training
  - chastening
  lexicon: BDAG
  rationale: In this context of paternal correction, παιδεία points to formative discipline
    rather than mere teaching. “Discipline” best matches both the semantic range and
    the parallel with νουθετήσει.
- source_word: πρωτοτόκου
  chosen: firstborn
  alternatives:
  - firstborn son
  lexicon: BDAG
  rationale: The Greek adjective used substantivally evokes the privileged status
    of a firstborn. “Firstborn” keeps the phrasing concise while preserving the image.
