id: PSS.13.7
reference: Psalms of Solomon 13:7
source:
  edition: lxx-swete-1909
  text: ἐν περιστολῇ παιδεύεται δίκαιος, ἵνα μὴ ἐπιχαρῇ ὁ ἁμαρτωλὸς τῷ δικαίῳ.
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: A righteous man is disciplined in secret, so that the sinner may not gloat over the righteous man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “rejoice over” or “exult over.”
    reason: lexical_alternative
  - marker: b
    text: Or “The righteous man is disciplined under restraint.”
    reason: lexical_alternative
  - marker: c
    text: Or 'with restraint'.
    reason: previous_rendering
lexical_decisions:
- source_word: περιστολή
  chosen: with restraint
  alternatives:
  - with curbing
  - with moderation
  - under restraint
  lexicon: LSJ
  rationale: The noun denotes restriction or curtailment. In this construction with ἐν, it functions adverbially, describing the manner of the discipline as measured or restrained rather than uncontrolled.
- source_word: παιδεύεται
  chosen: is disciplined
  alternatives:
  - is instructed
  - is corrected
  - is chastened
  lexicon: BDAG
  rationale: The verb can include training or instruction, but in this context of preventing the sinner’s triumph it most naturally refers to corrective discipline rather than general education.
- source_word: δίκαιος
  chosen: a righteous man
  alternatives:
  - the righteous man
  - the righteous one
  lexicon: BDAG
  rationale: The singular functions generically. 'A righteous man' communicates representative force in natural English while preserving the masculine singular form of the Greek.
- source_word: ἐπιχαρῇ
  chosen: may gloat over
  alternatives:
  - may rejoice over
  - may exult over
  lexicon: LSJ
  rationale: The compound verb here carries the sense of rejoicing at another’s circumstance. 'Gloat over' captures the hostile nuance better than the flatter 'rejoice over.'
- source_word: ἁμαρτωλός
  chosen: the sinner
  alternatives:
  - a sinner
  - the sinful man
  lexicon: BDAG
  rationale: 'With the article, the term is best rendered as a representative type: ''the sinner.'' This preserves the moral contrast with ''a righteous man'' in proverbial style.'
