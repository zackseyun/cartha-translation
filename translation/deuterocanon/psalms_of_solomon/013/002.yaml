theological_decisions:
- issue: Relation of the genitive in 'θανάτου ἁμαρτωλῶν'
  chosen_reading: the death of sinners
  alternative_readings:
  - death for sinners
  - death brought by sinners
  rationale: The phrase is syntactically compact and genuinely somewhat ambiguous.
    The main text keeps the closest transparent reading rather than resolving the
    genitive beyond what the Greek warrants.
  doctrine_reference: Preserve theological tension rather than resolve it.
