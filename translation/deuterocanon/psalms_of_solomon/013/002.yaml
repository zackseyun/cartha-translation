id: PSS.13.2
reference: Psalms of Solomon 13:2
source:
  edition: lxx-swete-1909
  text: ὁ βραχίων Κυρίου ἔσωσεν ἡμᾶς ἀπὸ ῥομφαίας διαπορευομένης, ἀπὸ λιμοῦ καὶ θανάτου
    ἁμαρτωλῶν.
  language: Greek
  pages:
  - 802
  validation: swete_direct
translation:
  text: The arm of the Lord saved us from the sword sweeping through, from famine
    and the death of sinners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sword passing through.'
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'death for sinners' or 'death brought by sinners.'
    reason: alternative_reading
lexical_decisions:
- source_word: βραχίων
  chosen: arm
  alternatives:
  - strength
  - power
  lexicon: LSJ
  rationale: Kept the bodily metaphor 'arm' rather than abstracting to 'strength'
    or 'power,' since the Greek uses a concrete image for the Lord's saving might
    and the phrase is natural in English biblical style.
- source_word: Κυρίου
  chosen: Lord
  alternatives:
  - the LORD
  - Master
  lexicon: LSJ
  rationale: Follows the project's default rendering for κύριος as a divine title.
    'Lord' fits the Greek wording here without importing the Hebrew divine-name convention
    into the English line.
- source_word: ἔσωσεν
  chosen: saved
  alternatives:
  - delivered
  - rescued
  lexicon: LSJ
  rationale: Saved is the most direct rendering of the aorist verb and preserves the
    religious weight of divine deliverance without sounding archaic.
- source_word: ῥομφαίας
  chosen: the sword
  alternatives:
  - a sword
  - blade
  lexicon: LSJ
  rationale: Rendered with the definite phrase in English because the following participle
    specifies the threat as a known sweeping sword-judgment, and 'sword' is the standard
    equivalent for ῥομφαία.
- source_word: διαπορευομένης
  chosen: sweeping through
  alternatives:
  - passing through
  - going through
  lexicon: LSJ
  rationale: This participle describes movement through an area. 'Sweeping through'
    conveys both the motion and the destructive force more idiomatically than the
    flatter 'passing through.'
- source_word: λιμοῦ
  chosen: famine
  alternatives:
  - hunger
  lexicon: LSJ
  rationale: In a disaster list paired with sword and death, 'famine' better matches
    the scale of communal calamity than the more individual 'hunger.'
- source_word: θανάτου
  chosen: death
  alternatives:
  - destruction
  lexicon: LSJ
  rationale: The noun is straightforwardly 'death'; broadening it to 'destruction'
    would weaken the lexical precision of the Greek.
- source_word: ἁμαρτωλῶν
  chosen: of sinners
  alternatives:
  - for sinners
  - brought by sinners
  lexicon: LSJ
  rationale: The bare genitive is best preserved transparently as 'of sinners' in
    the main text. More interpretive expansions are possible, but the Greek itself
    does not explicitly mark the relation.
