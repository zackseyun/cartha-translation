theological_decisions:
- issue: Nature of the righteous person's suffering
  chosen_reading: The verse contrasts corrective discipline of the righteous with
    the destructive judgment of the sinner.
  alternative_readings:
  - The phrase could be left more opaque as 'the discipline of the righteous in ignorance.'
  rationale: The immediate context (vv. 7-9) explains the righteous person's experience
    as measured, filial correction rather than punitive ruin. The translation therefore
    keeps the contrast clear without importing extra doctrine beyond the verse and
    its nearby lines.
  doctrine_reference: Preserve theological tension rather than resolve it.
