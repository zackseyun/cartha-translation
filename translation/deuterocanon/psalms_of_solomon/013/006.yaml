  rationale: 'The phrase ἐν ἀγνοίᾳ reflects the Hebrew concept of unwitting sin (שְׁגָגָה, cf. Lev 4:2). ''For what is done in ignorance'' is unnecessarily wordy; ''for sins of ignorance'' (or ''for unwitting sins'') is more concise, flows better in English, and captures the established biblical idiom. | Adjudicator: The reviewer is correct that in Hellenistic Jewish literature (including the LXX and Hebrews 9:7), ἄγνοια frequently carries the specific technical meaning of ''a sin committed in ignorance'' or ''unwitt'
