id: PSS.13.6
reference: Psalms of Solomon 13:6
source:
  edition: lxx-swete-1909
  text: ὅτι οὐχ ὁμοία ἡ παιδεία τῶν δικαίων ἐν ἀγνοίᾳ, καὶ ἡ καταστροφὴ τοῦ ἁμαρτωλοῦ·
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: For the discipline of the righteous for what is done in ignorance is not like
    the destruction of the sinner;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'the discipline of the righteous in ignorance.'
    reason: lexical_alternative
  - marker: b
    text: A textual variant reads 'of sinners' instead of 'of the righteous.'
    reason: textual_variant
lexical_decisions:
- source_word: οὐχ ὁμοία
  chosen: is not like
  alternatives:
  - is not the same as
  - is not alike
  lexicon: LSJ
  rationale: The predicate states a contrast in kind between two outcomes. 'Is not
    like' is natural English and preserves the comparative force without sounding
    stiff.
- source_word: παιδεία
  chosen: discipline
  alternatives:
  - correction
  - chastening
  - training
  lexicon: LSJ
  rationale: In this context the word refers to corrective dealing with the righteous,
    not mere education. 'Discipline' best fits the following contrast with the sinner's
    destruction and remains readable modern English.
- source_word: τῶν δικαίων
  chosen: of the righteous
  alternatives:
  - of righteous people
  - of the just
  lexicon: LSJ
  rationale: The genitive is straightforward. 'The righteous' is idiomatic English
    for the class of people in view and matches nearby usage in the passage.
- source_word: ἐν ἀγνοίᾳ
  chosen: for what is done in ignorance
  alternatives:
  - in ignorance
  - for sins done unwittingly
  - through ignorance
  lexicon: LSJ
  rationale: A very literal 'in ignorance' is possible, but in English it is unclear
    what exactly is in ignorance. Given the disciplinary context, the phrase most
    naturally refers to wrongdoing committed unwittingly, so this rendering makes
    explicit what the Greek implies without overexpanding the sense.
- source_word: καταστροφή
  chosen: destruction
  alternatives:
  - ruin
  - overthrow
  lexicon: LSJ
  rationale: The noun denotes catastrophic ruin or destruction. 'Destruction' is the
    clearest and strongest natural equivalent in this contrast.
- source_word: τοῦ ἁμαρτωλοῦ
  chosen: of the sinner
  alternatives:
  - of the wicked person
  - of the sinful man
  lexicon: LSJ
  rationale: The substantival singular is well represented by 'the sinner,' preserving
    both the representative force and the moral category.
