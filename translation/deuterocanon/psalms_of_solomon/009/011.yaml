id: PSS.9.11
reference: Psalms of Solomon 9:11
source:
  edition: lxx-swete-1909
  text: τίνι χρηστεύσῃ, ὁ θεός, εἰ μὴ τοῖς ἐπικαλουμένοις τὸν κύριον;
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: To whom will God be kind, if not to those who call on the Lord?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "show kindness" / "deal kindly."
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνι
  chosen: to whom
  alternatives:
  - for whom
  lexicon: LSJ
  rationale: The dative interrogative introduces a rhetorical question about the recipient
    of God's kindness; 'to whom' is the most natural English equivalent.
- source_word: χρηστεύσῃ
  chosen: will be kind
  alternatives:
  - will show kindness
  - will deal kindly
  - will show favor
  lexicon: LSJ
  rationale: The verb expresses benevolent or kind action. 'Will be kind' is clear
    modern English and preserves the rhetorical force without overinterpreting the
    nuance as covenantal 'favor.'
- source_word: ἐπικαλουμένοις
  chosen: those who call on
  alternatives:
  - those who call upon
  - those who invoke
  lexicon: BDAG
  rationale: The participle denotes people appealing to or invoking the Lord. 'Call
    on' is idiomatic, readable, and preserves the devotional sense.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project policy, κύριος is rendered 'Lord.' Here it functions as the
    object of invocation in a religious context.
