  rationale: The verb `χρηστεύσῃ` is the second-person singular future indicative
    of the deponent verb `χρηστεύομαι`. Furthermore, `ὁ θεός` with the nominative
    article is the standard Hellenistic Greek vocative ('O God'), matching the direct
    second-person address to God found throughout this psalm (e.g., vv. 6, 8, 15,
