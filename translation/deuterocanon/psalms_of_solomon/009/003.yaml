id: PSS.9.3
reference: Psalms of Solomon 9:3
source:
  edition: lxx-swete-1909
  text: ἵνα δικαιωθῇς, ὁ θεός, ἐν τῇ δικαιοσύνῃ σου ἐν ταῖς ἀνομίαις ἡμῶν·
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: so that you may be vindicated, O God, in your righteousness with respect to
    our lawless deeds;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that you may be justified, O God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in your justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: ἵνα introduces purpose or result. 'So that' preserves that forward-looking
    force in natural English without flattening it into a bare conjunction.
- source_word: δικαιωθῇς
  chosen: may be vindicated
  alternatives:
  - may be justified
  - may be shown to be righteous
  - may be proved right
  lexicon: BDAG
  rationale: With God as the subject, the passive does not suggest that God becomes
    righteous, but that he is shown or acknowledged to be righteous. 'Vindicated'
    communicates that sense most clearly in English, while a footnote preserves the
    more formal 'justified' alternative.
- source_word: ὁ θεός
  chosen: O God
  alternatives:
  - God
  lexicon: BDAG
  rationale: Though the form is nominative, in direct address it functions vocatively.
    'O God' best reflects the prayerful address and the solemn tone of the line.
- source_word: ἐν τῇ δικαιοσύνῃ σου
  chosen: in your righteousness
  alternatives:
  - by your righteousness
  - in your justice
  lexicon: BDAG
  rationale: The project default for δικαιοσύνη is 'righteousness.' Here the phrase
    expresses the sphere or basis in which God is vindicated. 'In your righteousness'
    stays close to the Greek while remaining intelligible.
- source_word: ἐν ταῖς ἀνομίαις ἡμῶν
  chosen: with respect to our lawless deeds
  alternatives:
  - in our lawless deeds
  - amid our lawless deeds
  - because of our lawless deeds
  - with respect to our sins
  lexicon: BDAG
  rationale: ἀνομία is stronger than a generic word for sin and points to lawlessness
    or rebellion. The second ἐν is difficult if rendered woodenly; 'with respect to'
    brings out the relational sense without overcommitting to a stricter causal paraphrase
    like 'because of.'
