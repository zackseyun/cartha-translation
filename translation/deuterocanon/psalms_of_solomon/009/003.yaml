  from: so that you may be vindicated, O God, in your righteousness with respect to
    our lawless deeds;
  to: So that you may be vindicated, O God, in your righteousness concerning our lawless
    deeds;
  rationale: The phrase 'with respect to' is overly bureaucratic and prosaic for a
    psalm. 'Concerning' accurately captures the Greek preposition 'ἐν' (used here
    to denote sphere or reference, 'in connection with') while maintaining a more
    elevated, psalmic register. Additionally, capitalizing 'So' accommodates the full
    stop at the end of the preceding verse in the English draft.
