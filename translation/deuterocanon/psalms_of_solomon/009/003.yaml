theological_decisions:
- issue: How to render δικαιωθῇς when the one addressed is God
  chosen_reading: Rendered as 'may be vindicated' in the main text.
  alternative_readings:
  - may be justified
  - may be shown to be righteous
  rationale: The line affirms God's rightness in relation to Israel's wrongdoing.
    'Vindicated' communicates that the verse is not implying a change in God, but
    his righteousness being demonstrated or acknowledged.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Whether δικαιοσύνη should be rendered 'righteousness' or 'justice'
  chosen_reading: Rendered as 'righteousness' in the main text, with 'justice' preserved
    as an alternative.
  alternative_readings:
  - justice
  rationale: The project's default rendering for δικαιοσύνη is 'righteousness.' In
    this verse 'justice' is also possible, especially in a judicial context, so it
    is preserved in a footnote rather than erased.
  doctrine_reference: 'DOCTRINE.md contested terms table: δικαιοσύνη → righteousness
    / justice'
