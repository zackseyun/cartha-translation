id: PSS.9.12
reference: Psalms of Solomon 9:12
source:
  edition: lxx-swete-1909
  text: καθαρίσει ἐν ἁμαρτίαις ψυχὴν ἐν ἐξομολογήσει, ἐν ἐξαγορίαις.
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: He will cleanse a soul from sins by confession, by open acknowledgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “He will cleanse a soul from sins”; Greek more literally, “a soul in
      sins.”
    reason: lexical_alternative
  - marker: b
    text: “Open acknowledgment” may also be rendered “full confession” or “declarations.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καθαρίσει
  chosen: will cleanse
  alternatives:
  - will purify
  - will make clean
  lexicon: BDAG
  rationale: καθαρίζω denotes cleansing or purification. “Will cleanse” preserves
    the future force and the moral-purificatory sense without becoming overly ritualistic.
- source_word: ἐν ἁμαρτίαις
  chosen: in sins
  alternatives:
  - from sins
  - amid sins
  lexicon: BDAG
  rationale: The Greek uses ἐν, not ἀπό. The phrase is best left transparent in the
    main text and understood as describing the soul’s condition rather than replaced
    with a smoother but less literal separative expression.
- source_word: ψυχὴν
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: BDAG
  rationale: ψυχή can mean soul, life, or self. In this penitential and religious
    context, “soul” best preserves the moral and spiritual weight of the line.
- source_word: ἐν ἐξομολογήσει
  chosen: by confession
  alternatives:
  - with confession
  - by acknowledgment
  lexicon: LSJ
  rationale: Although ἐξομολόγησις can sometimes refer to praise or thanksgiving,
    the immediate sins-context makes “confession” the most natural sense here.
- source_word: ἐν ἐξαγορίαις
  chosen: by open acknowledgment
  alternatives:
  - by declarations
  - by full confession
  - by detailed acknowledgment
  lexicon: LSJ
  rationale: This rare term is paired with confession and likely intensifies the idea
    of openly stating or fully acknowledging sin. “Open acknowledgment” is natural
    English and keeps the nuance distinct from the first noun without drifting into
    paraphrase.
