theological_decisions:
- issue: Means of cleansing in relation to sin
  chosen_reading: The verse presents cleansing as occurring in connection with confession
    and open acknowledgment of sin.
  alternative_readings:
  - The line could be read more dynamically as cleansing a soul from sins through
    confession.
  - The paired nouns could be overread sacramentally, but the text itself states confession
    and acknowledgment without specifying a ritual system.
  rationale: The Greek links cleansing with confessed sin but does not itself define
    a later doctrinal mechanism. The translation preserves the penitential logic without
    importing sacramental precision.
- issue: Sense of ψυχή
  chosen_reading: Rendered as “soul” in the main text.
  alternative_readings:
  - life
  - self
  rationale: Because the verse concerns moral impurity and cleansing before God, “soul”
    better preserves the spiritual register than the broader alternatives.
