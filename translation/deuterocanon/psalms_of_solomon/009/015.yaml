id: PSS.9.15
reference: Psalms of Solomon 9:15
source:
  edition: lxx-swete-1909
  text: δικαίους εὐλογήσεις, καὶ οὐκ εὐθύνεις περὶ ὧν ἥμαρτοσαν, καὶ ἡ χρηστότης σου περὶ ἁμαρτάνοντας ἐν μεταμελείᾳ.
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: You will bless the righteous, and you do not call them to account for the things in which they sinned; and your goodness is toward those who sin, in repentance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with repentance'; the phrase may also carry the sense of remorse or regret.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will not call them to account'.
    reason: previous_rendering
  - marker: c
    text: Or 'for the things they sinned in; and your goodness is toward those who sin in repentance.'.
    reason: previous_rendering
lexical_decisions:
- source_word: δικαίους
  chosen: the righteous
  alternatives:
  - the just
  - righteous people
  lexicon: BDAG
  rationale: The adjective is substantival here, referring to people characterized by righteousness. 'The righteous' is the most natural and established English equivalent without flattening the moral force.
- source_word: εὐλογήσεις
  chosen: you will bless
  alternatives:
  - you bless
  lexicon: BDAG
  rationale: The future form is straightforward and should be preserved. 'Bless' fits the covenantal-religious context better than weaker alternatives such as 'favor'.
- source_word: οὐκ εὐθύνεις
  chosen: you will not call them to account
  alternatives:
  - you will not charge them
  - you will not hold them accountable
  - you will not exact punishment
  lexicon: BDAG
  rationale: In this context the verb carries the sense of calling someone to answer for wrongdoing rather than literally 'straightening.' 'Call them to account' preserves the judicial nuance while remaining readable modern English.
- source_word: περὶ ὧν ἥμαρτοσαν
  chosen: for the things they sinned in
  alternatives:
  - for what they sinned
  - concerning the sins they committed
  lexicon: BDAG
  rationale: The phrase specifies the matters in which they sinned. This rendering stays close to the Greek structure while sounding idiomatic enough in English.
- source_word: χρηστότης
  chosen: goodness
  alternatives:
  - kindness
  - benevolence
  lexicon: BDAG
  rationale: Both 'goodness' and 'kindness' are possible. 'Goodness' was chosen because it matches the broad moral generosity of the noun while still allowing the following phrase 'toward those who sin' to carry relational force.
- source_word: ἁμαρτάνοντας
  chosen: those who sin
  alternatives:
  - sinners
  - those who are sinning
  lexicon: BDAG
  rationale: The participle is best represented verbally here. 'Those who sin' avoids turning the phrase into a static label and works well with the modifying phrase that follows.
- source_word: ἐν μεταμελείᾳ
  chosen: in repentance
  alternatives:
  - with repentance
  - in remorse
  - with regret
  lexicon: BDAG
  rationale: The noun denotes regret leading to repentance or change of mind. 'In repentance' is concise and fitting in context, though the term can shade toward remorse; that nuance is preserved in a footnote.
