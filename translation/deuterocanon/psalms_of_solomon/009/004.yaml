id: PSS.9.4
reference: Psalms of Solomon 9:4
source:
  edition: lxx-swete-1909
  text: ὅτι σὺ κριτὴς δίκαιος ἐπὶ πάντας τοὺς λαοὺς τῆς γῆς.
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: For you are a righteous judge over all the peoples of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the nations of the earth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the ground or reason for the surrounding statement. “For”
    fits natural English while preserving the causal force.
- source_word: κριτὴς
  chosen: judge
  alternatives:
  - arbiter
  lexicon: BDAG
  rationale: The noun plainly denotes one who judges. “Judge” is the direct and natural
    rendering.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: Both “righteous” and “just” are possible. “Righteous” preserves the moral
    and theological weight of the Greek in a context describing God's character.
- source_word: ἐπὶ
  chosen: over
  alternatives:
  - upon
  - against
  lexicon: BDAG
  rationale: With a governing noun here, the sense is authority or jurisdiction. “Over”
    expresses that clearly in English.
- source_word: πάντας τοὺς λαοὺς
  chosen: all the peoples
  alternatives:
  - all the nations
  - all the peoples
  lexicon: BDAG
  rationale: λαοί is plural and broader than a single ethnic ‘people.’ “Peoples” preserves
    the plurality of human groups better than the more political “nations,” though
    that remains a valid contextual alternative.
- source_word: τῆς γῆς
  chosen: of the earth
  alternatives:
  - of the land
  lexicon: BDAG
  rationale: In this universal statement about all peoples, “earth” is more likely
    than a localized “land.” It best matches the scope of the verse.
