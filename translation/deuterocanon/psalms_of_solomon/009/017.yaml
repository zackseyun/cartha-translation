id: PSS.9.17
reference: Psalms of Solomon 9:17
source:
  edition: lxx-swete-1909
  text: ὅτι σὺ ἡρέτισω τὸ σπέρμα Ἀβραὰμ παρὰ πάντα τὰ ἔθνη,
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: For you chose the offspring of Abraham above all the nations,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the seed of Abraham' or 'the descendants of Abraham.'
    reason: lexical_alternative
  - marker: b
    text: Or 'beyond all the nations' or 'more than all the nations.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἡρέτισω
  chosen: chose
  alternatives:
  - selected
  - preferred
  lexicon: LSJ
  rationale: The verb conveys choosing or selecting. 'Chose' is the clearest natural
    English rendering and preserves the direct sense without adding interpretive nuance.
- source_word: σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: LSJ
  rationale: '''Offspring'' communicates the collective sense naturally in modern
    English. ''Seed'' is more literal but less idiomatic here; ''descendants'' is
    possible, but ''offspring'' better preserves the singular collective force of
    the Greek.'
- source_word: παρὰ
  chosen: above
  alternatives:
  - beyond
  - more than
  - from among
  lexicon: LSJ
  rationale: With the accusative and a comparative sense, the phrase indicates preference
    or elevation over others. 'Above all the nations' preserves that comparative force
    most transparently.
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - gentiles
  - peoples
  lexicon: LSJ
  rationale: '''Nations'' is the standard and least interpretively loaded rendering
    in this context. ''Gentiles'' would import a more specifically Jewish/Christian
    contrast than the Greek itself requires here.'
