theological_decisions:
- issue: Election language regarding Abraham's line and the nations
  chosen_reading: Render the statement straightforwardly as God's choosing of Abraham's
    offspring over the nations.
  alternative_readings:
  - God set Abraham's offspring apart from among all the nations
  - God preferred Abraham's offspring beyond all other peoples
  rationale: The verse plainly expresses divine choice and covenantal preference.
    The translation preserves that theological force without softening it into mere
    distinction or expanding it into later doctrinal categories.
