id: PSS.9.5
reference: Psalms of Solomon 9:5
source:
  edition: lxx-swete-1909
  text: οὐ γὰρ κρυβήσεται ἀπὸ τῆς γνώσεώς σου πᾶς ποιῶν ἄδικα,
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: For no one who does wrong will be hidden from your knowledge,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For everyone who does unjust things will not be hidden from your knowledge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρυβήσεται
  chosen: will be hidden
  alternatives:
  - will escape notice
  - will be concealed
  lexicon: BDAG
  rationale: The future passive naturally yields 'will be hidden.' This preserves
    the image of concealment before God rather than paraphrasing too far into mere
    unnoticedness.
- source_word: γνώσεώς
  chosen: knowledge
  alternatives:
  - awareness
  - notice
  lexicon: BDAG
  rationale: '''Knowledge'' is the plain sense of γνῶσις and fits the genitive construction
    ''from your knowledge.'' ''Notice'' is possible in idiomatic English but is slightly
    more interpretive.'
- source_word: πᾶς ποιῶν ἄδικα
  chosen: no one who does wrong
  alternatives:
  - everyone who does unjust things
  - everyone acting unjustly
  lexicon: BDAG
  rationale: The Greek literally speaks of 'everyone doing unjust things,' but in
    natural English the negated sense is best carried as 'no one who does wrong.'
    This preserves the universal force while reading idiomatically.
- source_word: ἄδικα
  chosen: wrong
  alternatives:
  - unjust things
  - wickedly
  lexicon: BDAG
  rationale: '''Wrong'' is concise, natural, and faithful to the broad moral sense
    of ἄδικα here. ''Unjust things'' is more formal but less idiomatic in English.'
