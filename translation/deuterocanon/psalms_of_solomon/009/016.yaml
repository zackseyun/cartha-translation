id: PSS.9.16
reference: Psalms of Solomon 9:16
source:
  edition: lxx-swete-1909
  text: καὶ νῦν σύ ὁ θεός, καὶ ἡμεῖς λαὸς σοῦ ὃν ἠγάπησας· ἴδε καὶ οἰκτείρησον, ὁ
    θεὸς Ἰσραήλ, ὅτι σοί ἐσμεν· καὶ μὴ ἀποστῇς ἔλεός σου ἀφʼ ἡμῶν, ἵνα μὴ ἐπιθῶνται
    ἡμῖν.
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: And now you are God, and we are your people whom you loved. Look and have
    compassion, O God of Israel, because we are yours; and do not withdraw your mercy
    from us, lest they attack us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have pity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not let your mercy depart from us.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lest they come against us' or 'set upon us.' The Greek does not identify
      the subject.
    reason: alternative_reading
lexical_decisions:
- source_word: οἰκτείρησον
  chosen: have compassion
  alternatives:
  - have pity
  - show mercy
  lexicon: BDAG
  rationale: The verb calls for an appeal to tender pity or compassion. 'Have compassion'
    is natural modern English and fits the prayerful tone without sounding archaic.
- source_word: ἔλεός
  chosen: mercy
  alternatives:
  - steadfast love
  - compassion
  lexicon: BDAG
  rationale: ἔλεος regularly denotes mercy or compassionate favor. 'Mercy' is the
    most direct and consistent rendering here.
- source_word: ἀποστῇς
  chosen: withdraw
  alternatives:
  - turn away
  - remove
  lexicon: BDAG
  rationale: In context the request is that God not cause his mercy to depart from
    the people. 'Withdraw' expresses that sense clearly in idiomatic English.
- source_word: ἐπιθῶνται
  chosen: attack
  alternatives:
  - come against
  - set upon
  lexicon: BDAG
  rationale: The verb here conveys hostile action by unspecified opponents. 'Attack'
    is concise, clear, and fits the implied threat.
- source_word: ἠγάπησας
  chosen: loved
  alternatives:
  - have loved
  lexicon: BDAG
  rationale: The aorist points straightforwardly to God's prior love for his people.
    'Loved' preserves that verbal form without adding aspect not explicit in the Greek.
- source_word: σοί ἐσμεν
  chosen: we are yours
  alternatives:
  - we belong to you
  lexicon: BDAG
  rationale: The dative with εἰμί expresses belonging. 'We are yours' is faithful,
    simple, and suitably covenantal in tone.
