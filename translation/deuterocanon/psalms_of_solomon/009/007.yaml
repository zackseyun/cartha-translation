theological_decisions:
- issue: Human moral agency is strongly emphasized in this verse.
  chosen_reading: Rendered ἐκλογῇ καὶ ἐξουσίᾳ as 'choice and power' to preserve the text’s claim that human deeds lie within the soul’s capacity for moral action.
  alternative_readings:
  - choice and authority
  - decision and control
  rationale: The verse itself foregrounds human responsibility for both righteousness and injustice. The translation preserves that tension without softening it into mere permission or abstract freedom.
