id: PSS.9.7
reference: Psalms of Solomon 9:7
source:
  edition: lxx-swete-1909
  text: τὰ ἔργα ἡμῶν ἐν ἐκλογῇ καὶ ἐξουσίᾳ τῆς ψυχῆς ἡμῶν, τοῦ ποιῆσαι δικαιοσύνην, καὶ ἀδικίαν ἔργοις χειρῶν ἡμῶν·
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: Our deeds are within our soul’s choice and power, to do righteousness and unrighteousness by the works of our hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'authority' instead of 'power.'
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' instead of 'righteousness.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'by the works of our hands.'
    reason: lexical_alternative
  - marker: d
    text: Or 'and also injustice'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔργα
  chosen: deeds
  alternatives:
  - works
  - actions
  lexicon: BDAG
  rationale: Chosen as a natural English term for morally significant acts, while still preserving the concrete sense of actions done.
- source_word: ἐκλογῇ
  chosen: choice
  alternatives:
  - selection
  - decision
  lexicon: LSJ
  rationale: In this context the word points to human choosing or moral decision, not theological 'election.' 'Choice' is the clearest idiomatic rendering.
- source_word: ἐξουσίᾳ
  chosen: power
  alternatives:
  - authority
  - control
  lexicon: BDAG
  rationale: The line concerns human moral agency. 'Power' communicates actual capacity to act; 'authority' was possible but sounds more institutional in English. The nuance of authority/control is preserved in the decision note.
- source_word: ψυχῆς
  chosen: soul
  alternatives:
  - self
  - life
  lexicon: BDAG
  rationale: The Greek explicitly uses 'soul,' and the context is inner moral agency. 'Self' would be smoother but less transparent to the source wording.
- source_word: τοῦ ποιῆσαι
  chosen: to do
  alternatives:
  - for doing
  - so as to do
  lexicon: BDAG
  rationale: Rendered straightforwardly with an infinitive in English. This preserves the clause’s function without over-specifying whether the nuance is purpose or capacity.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: This follows the project’s default rendering for δικαιοσύνη. 'Justice' is a viable alternative, but here the broader moral sense fits well.
- source_word: ἀδικίαν
  chosen: injustice
  alternatives:
  - wrongdoing
  - wickedness
  - unrighteousness
  lexicon: BDAG
  rationale: Chosen to mirror δικαιοσύνη / ἀδικία as a moral contrast. 'Unrighteousness' is more formally parallel but less natural here; 'injustice' remains clear and weighty.
- source_word: ἔργοις χειρῶν ἡμῶν
  chosen: by the works of our hands
  alternatives:
  - through what our hands do
  - in the work of our hands
  lexicon: LSJ
  rationale: This preserves the concrete, bodily expression of human action. The phrase is slightly literal, but it reflects the Greek image well and remains understandable.
