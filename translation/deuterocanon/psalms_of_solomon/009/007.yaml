  from: and also injustice
  to: and unrighteousness
  rationale: 'The Greek pairs δικαιοσύνην and ἀδικίαν. The draft correctly translates ἀδικίαν as ''unrighteousness'' in 9:9 to contrast with ''righteousness.'' Translating it as ''injustice'' here breaks the author''s lexical consistency and introduces modern social connotations. Additionally, ''also'' is an unnecessary addition for καὶ. | Adjudicator: The Greek pairs `δικαιοσύνην` (righteousness) and `ἀδικίαν` (unrighteousness). Translating `ἀδικίαν` as ''injustice'' in this context introduces modern social connotations that distract from the covenan'
