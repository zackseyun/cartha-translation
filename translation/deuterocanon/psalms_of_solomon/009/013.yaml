  from: For shame is ours, and it is on our faces, because of all these things.
  to: For shame is upon us and upon our faces concerning all things.
  rationale: 'The Greek uses a single subject (αἰσχύνη) with two parallel datives (ἡμῖν καὶ τοῖς προσώποις ἡμῶν). The draft splits this into two clauses, breaking the poetic parallelism. Rendering both datives with ''upon'' preserves the single clause and the Hebraic idiom. Additionally, ''concerning all things'' is a more accurate rendering of περὶ ἁπάντων than ''because of all these things,'' which adds an unwarranted demonstrative. | Adjudicator: The reviewer correctly identifies that the Greek text contains a single subject (αἰσχύνη) governing two parallel datives (ἡμῖν καὶ τοῖς προσώποις ἡμῶν). The current rendering unnecessarily splits this'
