id: PSS.9.13
reference: Psalms of Solomon 9:13
source:
  edition: lxx-swete-1909
  text: ὅτι αἰσχύνη ἡμῖν καὶ τοῖς προσώποις ἡμῶν περὶ ἁπάντων
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: For shame is upon us and upon our faces concerning all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, "to our faces." The Greek expression is kept idiomatically in English as "on our faces."
    reason: lexical_alternative
  - marker: b
    text: Or 'For shame is ours, and it is on our faces, because of all these things.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅτι
  chosen: for
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: Here it introduces the ground or explanation for the surrounding statement, so "for" gives a natural English connective while preserving the explanatory force.
- source_word: αἰσχύνη
  chosen: shame
  alternatives:
  - disgrace
  lexicon: BDAG
  rationale: '"Shame" is the most direct rendering and preserves the moral-honor sense without intensifying beyond the Greek.'
- source_word: ἡμῖν
  chosen: is ours
  alternatives:
  - belongs to us
  - is for us
  lexicon: BDAG
  rationale: 'The dative is rendered idiomatically in English as possession: "is ours." This communicates the sense clearly without wooden phrasing.'
- source_word: τοῖς προσώποις ἡμῶν
  chosen: on our faces
  alternatives:
  - to our faces
  - before our faces
  lexicon: BDAG
  rationale: A very literal rendering would be awkward in English. "On our faces" communicates visible public shame and preserves the concrete imagery of πρόσωπα.
- source_word: περὶ ἁπάντων
  chosen: because of all these things
  alternatives:
  - concerning all things
  - for everything
  lexicon: BDAG
  rationale: In context this phrase most naturally expresses the cause or occasion of shame rather than mere topic, so "because of all these things" is the clearest English rendering.
