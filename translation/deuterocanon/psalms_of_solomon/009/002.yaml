id: PSS.9.2
reference: Psalms of Solomon 9:2
source:
  edition: lxx-swete-1909
  text: ἀπερρίφησαν ἀπὸ κληρονομίας ἧς ἔδωκεν αὐτοῖς Κύριος· ἐν παντὶ ἔθνει ἡ διασπορὰ
    τοῦ Ἰσραὴλ κατὰ τὸ ῥῆμα τοῦ θεοῦ.
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: They were cast out from the inheritance that the Lord gave them; the dispersion
    of Israel is among every nation, according to the word of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Israel is scattered among every nation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπερρίφησαν
  chosen: were cast out
  alternatives:
  - were rejected
  - were cast away
  lexicon: BDAG
  rationale: The passive verb conveys forcible removal rather than a merely emotional
    rejection. 'Were cast out' fits the exile context and preserves the severity of
    the action.
- source_word: κληρονομίας
  chosen: inheritance
  alternatives:
  - heritage
  - possession
  lexicon: BDAG
  rationale: '''Inheritance'' is the standard biblical sense for a divinely given
    allotment, especially land or covenantal possession, and best matches the theological
    weight of the phrase.'
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is normally rendered 'Lord.' Here it refers
    to Israel's God in a covenantal setting.
- source_word: διασπορὰ
  chosen: dispersion
  alternatives:
  - scattering
  - exile
  lexicon: BDAG
  rationale: The Greek uses the noun, not a verbal clause. 'Dispersion' preserves
    that nominal form and its established sense of Israel scattered among the nations.
- source_word: ῥῆμα
  chosen: word
  alternatives:
  - decree
  - utterance
  lexicon: BDAG
  rationale: '''Word'' is the most direct rendering and leaves open whether the emphasis
    is on divine speech, pronouncement, or decree. ''Decree'' would interpret more
    narrowly than the Greek requires.'
