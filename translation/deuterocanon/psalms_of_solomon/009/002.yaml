theological_decisions:
- issue: Whether to make the second clause more idiomatic by turning the noun διασπορά
    into a verbal idea ('Israel is scattered')
  chosen_reading: 'Retained the nominal expression: ''the dispersion of Israel is
    among every nation'''
  alternative_readings:
  - Israel is scattered among every nation
  rationale: The Greek clause is nominal, and preserving that form keeps the verse
    closer to the source while remaining readable in English. This also avoids overstating
    interpretive smoothing.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
