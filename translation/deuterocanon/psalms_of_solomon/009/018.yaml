theological_decisions:
- issue: Whether to unpack the covenantal meaning of God placing his name on the people
  chosen_reading: Kept the literal wording “set your name upon us” in the main text
  alternative_readings:
  - marked us as yours
  - called us by your name
  rationale: The phrase likely carries covenantal or ownership overtones, but the Greek itself states the image literally. To preserve theological tension and avoid importing interpretation into the main text, the translation retains the source expression.
  doctrine_reference: Preserve theological tension rather than resolve it.
