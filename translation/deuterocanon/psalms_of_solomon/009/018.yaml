  from: and you will never cease.
  to: and you will never remove it.
  rationale: 'The verb καταπαύω is used here transitively (''to put an end to,'' ''cause to cease''), taking the preceding ''your name'' (τὸ ὄνομά σου) as its implied object. Translating it intransitively as ''you will never cease'' creates an awkward English phrasing that implies God will never stop existing or acting in a generic sense. Supplying the implied object (''it'') restores the author''s meaning: God has placed his name on his people and will never cause it to cease (i.e., remove it). | Adjudicator: The current rendering ''you will never cease'' treats καταπαύω as intransitive, which in English awkwardly implies that God Himself might cease to exist or act. In Greek, καταπαύω is frequently transiti'
