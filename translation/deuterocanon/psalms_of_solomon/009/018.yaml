id: PSS.9.18
reference: Psalms of Solomon 9:18
source:
  edition: lxx-swete-1909
  text: καὶ ἔθου τὸ ὄνομά σου ἐφʼ ἡμᾶς, Κύριε· καὶ οὐ καταπαύσεις τὸν αἰῶνα.
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: And you set your name upon us, O Lord; and you will never remove it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “placed your name on us.”
    reason: lexical_alternative
  - marker: b
    text: Or “you will not cease forever.”
    reason: lexical_alternative
  - marker: c
    text: The phrase “set your name upon us” likely signals covenantal belonging or identification, but the translation keeps the literal wording of the Greek.
    reason: cultural_note
  - marker: d
    text: Or 'and you will never cease.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔθου
  chosen: set
  alternatives:
  - placed
  - laid
  lexicon: LSJ
  rationale: Aorist of τίθημι. “Set” is natural modern English and preserves the concrete act of placing God's name on his people without over-paraphrasing.
- source_word: τὸ ὄνομά σου
  chosen: your name
  lexicon: LSJ
  rationale: Rendered literally. In biblical usage “name” can carry covenantal ownership or identification, but the verse itself states only that God's name is placed upon the people, so the translation preserves that wording rather than unpacking it in the main text.
- source_word: ἐφʼ ἡμᾶς
  chosen: upon us
  alternatives:
  - on us
  - over us
  lexicon: LSJ
  rationale: “Upon us” best preserves the elevated, covenantal tone of the prepositional phrase while remaining clear in English.
- source_word: Κύριε
  chosen: O Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: κύριος is rendered by the project's default “Lord.” The vocative force is naturally conveyed in English by “O Lord.”
- source_word: οὐ καταπαύσεις
  chosen: you will never cease
  alternatives:
  - you will not cease
  - you will not come to an end
  lexicon: LSJ
  rationale: Future of καταπαύω with οὐ and reinforced by τὸν αἰῶνα. “You will never cease” gives the plain sense in idiomatic English without supplying an unstated object.
- source_word: τὸν αἰῶνα
  chosen: never
  alternatives:
  - forever
  - for the age
  lexicon: LSJ
  rationale: Here αἰών functions adverbially with the negated future verb. Rendering it as “never” communicates the idiomatic force cleanly in English, while “forever” remains a viable more formally literal alternative.
