id: PSS.9.14
reference: Psalms of Solomon 9:14
source:
  edition: lxx-swete-1909
  text: καὶ τίνι ἀφήσει ἁμαρτίας, εἰ μὴ τοῖς ἡμαρτηκόσι;
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: And to whom will he forgive sins, if not to those who have sinned?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀφήσει
  chosen: will he forgive
  alternatives:
  - will he remit
  - will he pardon
  lexicon: BDAG
  rationale: Future active of ἀφίημι in a sins-context regularly means 'forgive.'
    'Forgive' is the clearest modern English equivalent and preserves the personal,
    relational sense better than 'remit.'
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - sinful acts
  - offenses
  lexicon: BDAG
  rationale: The plural noun directly denotes sins. The simple rendering 'sins' is
    both transparent and idiomatic.
- source_word: τοῖς ἡμαρτηκόσι
  chosen: to those who have sinned
  alternatives:
  - to the sinners
  - to those having sinned
  lexicon: BDAG
  rationale: The perfect active participle highlights persons characterized as having
    sinned. 'Those who have sinned' preserves the verbal force better than the more
    label-like 'sinners.'
- source_word: τίνι
  chosen: to whom
  alternatives:
  - whom
  lexicon: BDAG
  rationale: The dative is naturally represented in English as 'to whom' after 'forgive,'
    preserving the Greek construction.
