theological_decisions:
- issue: Scope of divine forgiveness
  chosen_reading: A rhetorical question asserting that forgiveness is for actual sinners.
  alternative_readings:
  - 'A narrower sense: forgiveness is specifically directed to those already conscious
    of sin.'
  rationale: The verse is framed as a rhetorical question and should not be softened.
    It states the obvious logic of forgiveness without importing a fuller doctrinal
    system beyond the line itself.
