id: PSS.9.1
reference: Psalms of Solomon 9:1
source:
  edition: lxx-swete-1909
  text: Ἐν τῷ ἀπαχθῆναι Ἰσραὴλ ἐν ἀποικεσίᾳ εἰς γῆν ἀλλοτρίαν, ἐν τῷ ἀποστῆναι αὐτοὺς
    ἀπὸ Κυρίου τοῦ λυτρωσαμένου αὐτούς,
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: When Israel was carried away in exile to a foreign land, when they turned
    away from the Lord who had redeemed them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fell away from' or 'apostatized from' the Lord.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαχθῆναι
  chosen: was carried away
  alternatives:
  - was led away
  - was taken away
  lexicon: BDAG
  rationale: The passive infinitive denotes forcible removal rather than voluntary
    travel. 'Was carried away' is natural English and preserves the sense of deportation.
- source_word: ἀποικεσίᾳ
  chosen: in exile
  alternatives:
  - in deportation
  - in captivity
  lexicon: LSJ
  rationale: In this context the term refers to Israel's condition of displacement
    in a foreign land. 'Exile' is the clearest modern rendering and matches the historical-theological
    setting.
- source_word: γῆν ἀλλοτρίαν
  chosen: a foreign land
  alternatives:
  - another land
  - an alien land
  lexicon: LSJ
  rationale: The phrase emphasizes land belonging to others, that is, land not Israel's
    own. 'A foreign land' expresses this idiomatically without losing force.
- source_word: ἀποστῆναι
  chosen: turned away
  alternatives:
  - departed
  - fell away
  - apostatized
  lexicon: BDAG
  rationale: The verb can denote departure or defection. 'Turned away' preserves the
    relational and covenantal sense in accessible English without overloading the
    line with technical wording.
- source_word: Κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the project's default rendering for κύριος and fits the
    covenantal sense here.
- source_word: τοῦ λυτρωσαμένου
  chosen: who had redeemed
  alternatives:
  - who delivered
  - who ransomed
  lexicon: BDAG
  rationale: The participle points to the Lord as the one who acted as Israel's redeemer.
    'Redeemed' preserves both the covenantal and salvific resonance better than the
    flatter 'delivered'.
