  source_review: state/reviews/gemini/phase10_greek_apocrypha/deuterocanon/psalms_of_solomon/009/009.job-73192.json
  category: awkward_english
  tier: 1
  from: is himself responsible for his soul in destruction
  to: is himself responsible for his soul's destruction
  rationale: The literal rendering 'responsible for his soul in destruction' is awkward
    in English and obscures the causal relationship. The Greek 'αἴτιος τῆς ψυχῆς ἐν
    ἀπωλείᾳ' (likely reflecting a Hebrew idiom of being liable for one's own life,
    e.g., מתחייב בנפשו) is better rendered 'responsible for his soul's destruction'
    to clearly convey the author's meaning that the wrongdoer brings about his own
    ruin.
