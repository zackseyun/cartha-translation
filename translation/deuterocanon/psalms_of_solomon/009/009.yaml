id: PSS.9.9
reference: Psalms of Solomon 9:9
source:
  edition: lxx-swete-1909
  text: ὁ ποιῶν δικαιοσύνην θησαυρίζει ζωὴν αὐτῷ παρὰ Κυρίῳ, καὶ ὁ ποιῶν ἀδικίαν αὐτὸς
    αἴτιος τῆς ψυχῆς ἐν ἀπωλείᾳ.
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: The one who does righteousness stores up life for himself with the Lord, but
    the one who does unrighteousness is himself responsible for his soul in destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “does justice.”
    reason: lexical_alternative
  - marker: b
    text: Or “stores up life for himself before the Lord” or “from the Lord.”
    reason: lexical_alternative
  - marker: c
    text: “Soul” may also be understood as “life” or “self.”
    reason: lexical_alternative
  - marker: d
    text: Or “is guilty for his soul unto destruction” or “is responsible for himself
      in ruin.”
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ποιῶν
  chosen: the one who does
  alternatives:
  - whoever does
  - the one practicing
  lexicon: BDAG
  rationale: A substantival participle is best carried by a generic personal expression
    in English. 'Does' preserves the verbal force without over-interpreting aspect
    as habitual 'practicing.'
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: DOCTRINE.md gives 'righteousness' as the default rendering for δικαιοσύνη.
    In this wisdom-style moral contrast, 'righteousness' fits the personal ethical
    sense better than 'justice,' though the latter remains a viable nuance.
- source_word: θησαυρίζει
  chosen: stores up
  alternatives:
  - treasures up
  - lays up
  lexicon: BDAG
  rationale: The verb carries the imagery of storing treasure. 'Stores up' is natural
    modern English and preserves the metaphor without archaic tone.
- source_word: ζωὴν
  chosen: life
  alternatives:
  - a life
  lexicon: BDAG
  rationale: The anarthrous noun is naturally rendered simply as 'life' here, expressing
    what is gained or secured before God.
- source_word: αὐτῷ
  chosen: for himself
  alternatives:
  - for him
  - for oneself
  lexicon: BDAG
  rationale: The dative is reflexive in sense in this construction, contrasting the
    moral agent with the consequences of his own action.
- source_word: παρὰ Κυρίῳ
  chosen: with the Lord
  alternatives:
  - before the Lord
  - from the Lord
  lexicon: BDAG
  rationale: παρά with the dative can denote proximity or standing in relation to
    someone. 'With the Lord' best fits the idea of life being laid up in God's presence;
    'from the Lord' is possible but less direct here.
- source_word: ἀδικίαν
  chosen: unrighteousness
  alternatives:
  - injustice
  - wrongdoing
  lexicon: BDAG
  rationale: To preserve the tight contrast with δικαιοσύνη, 'unrighteousness' is
    preferable to the more general 'wrongdoing' or the more social 'injustice.'
- source_word: αἴτιος
  chosen: responsible
  alternatives:
  - guilty
  - the cause
  lexicon: BDAG
  rationale: The adjective denotes being answerable or culpable. 'Responsible' communicates
    this clearly in modern English without flattening it to merely emotional guilt.
- source_word: τῆς ψυχῆς
  chosen: his soul
  alternatives:
  - his life
  - himself
  lexicon: BDAG
  rationale: ψυχή can mean soul, life, or self. Here the moral and eschatological
    tone favors 'soul,' while acknowledging a broader sense of one's life/self.
- source_word: ἐν ἀπωλείᾳ
  chosen: in destruction
  alternatives:
  - for destruction
  - in ruin
  - unto destruction
  lexicon: BDAG
  rationale: The phrase is concise and somewhat stark in Greek. 'In destruction' preserves
    that compactness and leaves the exact force of ἐν intentionally broad rather than
    over-specifying result or location.
