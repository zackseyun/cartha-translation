theological_decisions:
- issue: Moral consequence and agency in the second clause
  chosen_reading: The text states that the wrongdoer is personally responsible for
    his own soul in relation to destruction.
  alternative_readings:
  - the wrongdoer is guilty of destroying his own life
  - the wrongdoer is responsible for himself unto ruin
  rationale: The Greek is terse and slightly idiomatic. The chosen rendering preserves
    personal culpability without making the mechanism of destruction more explicit
    than the text does.
- issue: Sense of ψυχή
  chosen_reading: Rendered as 'soul' in the main text.
  alternative_readings:
  - life
  - self
  rationale: Given the religious and moral context, 'soul' best preserves the weight
    of the warning. A footnote records the viable broader senses.
revisions:
