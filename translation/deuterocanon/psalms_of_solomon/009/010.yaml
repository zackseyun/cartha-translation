  from: are righteous
  to: are in righteousness
  rationale: 'The author builds a deliberate lexical chain using the noun δικαιοσύνη across verses 7, 8, 9, and 10. Translating the prepositional phrase ἐν δικαιοσύνῃ as the adjective ''are righteous'' breaks this chain. Restoring ''are in righteousness'' preserves the author''s thematic repetition. | Adjudicator: The Greek text uses the prepositional phrase ἐν δικαιοσύνῃ (in righteousness), not the adjective δίκαια (righteous). Preserving the noun maintains the lexical connection to the plural ''righteous deeds'
