id: PSS.9.10
reference: Psalms of Solomon 9:10
source:
  edition: lxx-swete-1909
  text: τὰ γὰρ κρίματα Κυρίου ἐν δικαιοσύνῃ κατʼ ἄνδρα καὶ οἶκον.
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: For the judgments of the Lord are in righteousness toward each man and household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek literally, “according to man and house,” likely with a distributive sense: applied to each individual and household.'
    reason: lexical_alternative
  - marker: b
    text: “Righteous” could also be rendered “just” here, since the phrase concerns the Lord’s judgments.
    reason: lexical_alternative
  - marker: c
    text: Or 'are righteous'.
    reason: previous_rendering
lexical_decisions:
- source_word: κρίματα
  chosen: judgments
  alternatives:
  - decrees
  - sentences
  lexicon: LSJ
  rationale: κρίματα refers to judicial decisions or acts of judgment. “Judgments” preserves the legal and moral force without narrowing the sense to mere verbal decrees.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - the LORD
  - Master
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is normally rendered “Lord.” Nothing in this verse requires a deviation.
- source_word: ἐν δικαιοσύνῃ
  chosen: are righteous
  alternatives:
  - in righteousness
  - justly
  lexicon: LSJ
  rationale: The phrase expresses the righteous character or manner of the Lord’s judgments. Rendering the noun phrase as “are righteous” keeps the sense in natural English while staying close to the Greek.
- source_word: κατʼ ἄνδρα
  chosen: toward each man
  alternatives:
  - according to each man
  - for each person
  lexicon: LSJ
  rationale: κατά with the accusative here is best taken distributively, applying the Lord’s judgments to individuals one by one. “Each man” preserves the masculine singular form while conveying the distributive sense.
- source_word: οἶκον
  chosen: household
  alternatives:
  - house
  - family
  lexicon: LSJ
  rationale: Although literally “house,” οἶκος commonly refers to a household or family unit. “Household” better communicates the social scope in idiomatic English.
