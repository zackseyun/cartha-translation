id: PSS.9.8
reference: Psalms of Solomon 9:8
source:
  edition: lxx-swete-1909
  text: καὶ ἐν τῇ δικαιοσύνῃ σου ἐπεσκέπτῃ υἱοὺς ἀνθρώπων·
  language: Greek
  pages:
