  validation: swete_direct
translation:
  text: and in your righteousness you examine the sons of men;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human beings' / 'the children of men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and in your righteousness you watch over the sons of men;'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπεσκέπτῃ
  chosen: watch over
  alternatives:
  - visit
  - look upon
  - care for
  lexicon: BDAG
  rationale: The verb can mean to visit, inspect, or care for. In this context of divine righteous regard toward humanity, 'watch over' best conveys ongoing attentive care without sounding archaic like 'visit' or too weak like 'look upon'.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness' unless context strongly favors 'justice.' Here the phrase describes God's character or mode of action, and 'righteousness' fits naturally while preserving the theological nuance.
- source_word: υἱοὺς ἀνθρώπων
  chosen: the sons of men
  alternatives:
  - human beings
  - the children of men
  - the sons of humans
  lexicon: BDAG
  rationale: This is a conventional Semitic-style expression carried into Greek. Following the project's gender-accurate policy, the masculine image is preserved rather than neutralized, since it functions as a stock expression for humanity.
