theological_decisions:
- issue: Gendered ανθρωπος expression
  chosen_reading: Preserve the idiom as 'the sons of men' in the main text.
  alternative_readings:
  - human beings
  - the children of men
  rationale: The source uses a traditional masculine representative expression. The
    translation preserves that form in keeping with the stated philosophy, while a
    footnote can signal the broader human reference.
  doctrine_reference: Gender-accurate over gender-neutral
