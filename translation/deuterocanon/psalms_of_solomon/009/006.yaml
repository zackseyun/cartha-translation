theological_decisions:
- issue: Generic ἄνθρωπος rendering
  chosen_reading: a man
  alternative_readings:
  - a person
  - anyone
  rationale: The Greek uses masculine singular ἄνθρωπος with representative force.
    Following the stated doctrine, the draft keeps the gendered form rather than neutralizing
    it, while understanding the referent generically.
  doctrine_reference: Gender-accurate over gender-neutral
