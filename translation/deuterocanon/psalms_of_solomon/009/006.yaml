id: PSS.9.6
reference: Psalms of Solomon 9:6
source:
  edition: lxx-swete-1909
  text: καὶ αἱ δικαιοσύναι τῶν ὁσίων σου ἐνώπιόν σου, Κύριε· καὶ ποῦ κρυβήσεται ἄνθρωπος ἀπὸ τῆς γνώσεώς σου, ὁ θεός;
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: And And the righteous deeds of your pious ones are before you, O Lord; and where will a man hide himself from your knowledge, O God? of your And the righteousnesses of your pious ones are before you, O Lord; and where will a man hide himself from your knowledge, O God? are before you, O Lord; and where will a man hide himself from your knowledge, O God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'righteous deeds' for 'righteousnesses.'
    reason: lexical_alternative
  - marker: b
    text: '''Holy ones'' could also be rendered ''saints'' or ''faithful ones.'''
    reason: lexical_alternative
  - marker: c
    text: '''A man'' is generic here, meaning a human being generally.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the righteousnesses'.
    reason: previous_rendering
  - marker: e
    text: Or 'holy ones'.
    reason: previous_rendering
lexical_decisions:
- source_word: δικαιοσύναι
  chosen: righteousnesses
  alternatives:
  - righteous deeds
  - acts of righteousness
  - justice
  lexicon: BDAG
  rationale: The plural is explicit in the Greek and is best preserved rather than flattened to a singular abstract noun. 'Righteousnesses' is slightly unusual in English but transparently reflects the plural idea; 'righteous deeds' is possible, but the noun itself should remain visible in this draft.
- source_word: ὁσίων
  chosen: holy ones
  alternatives:
  - saints
  - faithful ones
  - devout ones
  lexicon: BDAG
  rationale: '''Holy ones'' closely matches the Greek without importing later ecclesiastical overtones that ''saints'' may carry. ''Devout ones'' is possible, but ὅσιος language here is more naturally rendered with holiness/covenant piety retained.'
- source_word: ἐνώπιόν
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: BDAG
  rationale: '''Before'' is the natural idiomatic rendering and preserves the sense of being openly present in God''s sight.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the project's default rendering for κύριος as a divine title.
- source_word: ποῦ
  chosen: where
  alternatives:
  - how
  - in what place
  lexicon: BDAG
  rationale: 'The interrogative is spatial: the question is where a human could hide, not merely whether he could.'
- source_word: κρυβήσεται
  chosen: hide himself
  alternatives:
  - be hidden
  - conceal himself
  lexicon: BDAG
  rationale: The future middle naturally carries the sense of a person hiding himself. This keeps the reflexive force clear in English.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: BDAG
  rationale: Per the project's gender-accurate policy, the grammatically masculine singular is retained here as generic 'man.' The sense is representative humanity, not exclusively male persons.
- source_word: γνώσεώς
  chosen: knowledge
  alternatives:
  - awareness
  - understanding
  lexicon: BDAG
  rationale: '''Knowledge'' is the most direct rendering and fits the context of God''s all-seeing awareness.'
