theological_decisions:
- issue: Sense of divine discipline in relation to the righteous
  chosen_reading: The line means that God straightens the ways of the righteous and
    does not distort those ways even in the process of discipline.
  alternative_readings:
  - He will not cause the righteous themselves to go astray through discipline.
  - He will not act unjustly when disciplining.
  rationale: The path metaphor established by ὁδοὺς and ὤρθωσε favors taking the implicit
    object of διαστρέψει as the 'ways' just mentioned. This preserves the verse's
    internal imagery and avoids importing a more abstract doctrinal claim than the
    Greek requires.
