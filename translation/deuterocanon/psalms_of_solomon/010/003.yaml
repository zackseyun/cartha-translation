id: PSS.10.3
reference: Psalms of Solomon 10:3
source:
  edition: lxx-swete-1909
  text: ὤρθωσε γὰρ ὁδοὺς δικαίων, καὶ οὐ διαστρέψει ἐν παιδείᾳ.
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: For he has made straight the ways of the righteous, and he will not pervert
    them in discipline.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'paths' instead of 'ways.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will not distort them by discipline' or 'in correction.'
    reason: lexical_alternative
  - marker: c
    text: Or 'twist them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὤρθωσε
  chosen: has made straight
  alternatives:
  - has straightened
  - has set upright
  - has directed aright
  lexicon: LSJ
  rationale: The verb conveys making something straight or setting it right. 'Has
    made straight' preserves the concrete path imagery with natural English and fits
    the perfective sense of the Greek.
- source_word: ὁδοὺς
  chosen: ways
  alternatives:
  - paths
  - roads
  lexicon: LSJ
  rationale: '''Ways'' is the most natural biblical English for moral conduct while
    still retaining the metaphor of a path. ''Paths'' was possible, but ''ways'' better
    matches idiomatic ethical usage.'
- source_word: δικαίων
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: LSJ
  rationale: The genitive plural refers to righteous people. 'The righteous' is concise,
    idiomatic, and preserves the substantival force without awkwardness.
- source_word: διαστρέψει
  chosen: will not twist them
  alternatives:
  - will not distort them
  - will not turn them aside
  - will not pervert them
  lexicon: LSJ
  rationale: The verb means to twist, distort, or turn aside. 'Will not twist them'
    keeps the imagery parallel to 'made straight' and preserves the contrast within
    the verse.
- source_word: ἐν παιδείᾳ
  chosen: in discipline
  alternatives:
  - by discipline
  - in correction
  - in chastening
  lexicon: LSJ
  rationale: παιδεία can denote discipline, correction, or training. 'In discipline'
    keeps the preposition explicit and preserves the sense that even within corrective
    training God does not bend the righteous path crookedly.
