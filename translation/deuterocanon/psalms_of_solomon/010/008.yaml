id: PSS.10.8
reference: Psalms of Solomon 10:8
source:
  edition: lxx-swete-1909
  text: ὅτι χρηστὸς καὶ ἐλεήμων ὁ θεὸς εἰς τὸν αἰῶνα, καὶ συναγωγαὶ Ἰσραὴλ δοξάσουσιν
    τὸ ὄνομα Κυρίου.
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: For God is kind and merciful forever, and the assemblies of Israel will glorify
    the name of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'congregations' for 'assemblies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'good' for 'kind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the ground or explanation for the surrounding statement; 'For'
    fits natural English discourse while preserving the causal force.
- source_word: χρηστός
  chosen: kind
  alternatives:
  - good
  - gracious
  lexicon: BDAG
  rationale: The term can mean 'good' or 'kind.' Here, alongside 'merciful,' 'kind'
    preserves the benevolent character sense without flattening it into the broader
    and more generic 'good.'
- source_word: ἐλεήμων
  chosen: merciful
  alternatives:
  - compassionate
  lexicon: BDAG
  rationale: '''Merciful'' is the most direct and established rendering for divine
    clemency and pairs naturally with ''kind''.'
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - unto eternity
  lexicon: BDAG
  rationale: This is a standard idiomatic expression for enduring duration. 'Forever'
    gives clear modern English while preserving the sense.
- source_word: συναγωγαὶ
  chosen: assemblies
  alternatives:
  - congregations
  - gatherings
  lexicon: BDAG
  rationale: The plural refers to gathered communities of Israel. 'Assemblies' is
    transparent and avoids importing later institutional associations too strongly.
- source_word: δοξάσουσιν
  chosen: will glorify
  alternatives:
  - will honor
  - will give glory to
  lexicon: BDAG
  rationale: '''Will glorify'' preserves the future tense and the strong doxological
    sense of the verb.'
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Following the project's default for κύριος, the title is translated as
    'Lord.' The article is natural in English in the phrase 'the name of the Lord.'
