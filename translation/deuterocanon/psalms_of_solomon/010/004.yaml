id: PSS.10.4
reference: Psalms of Solomon 10:4
source:
  edition: lxx-swete-1909
  text: καὶ τὸ ἔλεος Κυρίου ἐπὶ τοὺς ἀγαπῶντας αὐτὸν ἐν ἀληθείᾳ, καὶ μνήσεται Κύριος
    τῶν δούλων αὐτοῦ ἐν ἐλέει·
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: And the mercy of the Lord is upon those who love him in truth, and the Lord
    will remember his servants with mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "faithfully" or "with sincerity" for "in truth."
    reason: lexical_alternative
  - marker: b
    text: Or "slaves" for "servants."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: BDAG
  rationale: '"Mercy" is the most natural and consistent rendering here, preserving
    both covenantal kindness and compassionate action without over-specifying the
    nuance.'
- source_word: Κυρίου / Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: The project default for κύριος is "Lord." In this Jewish liturgical context
    it appropriately renders the divine title without importing a different nuance.
- source_word: ἐπὶ
  chosen: is upon
  alternatives:
  - rests on
  - is for
  lexicon: BDAG
  rationale: With ἔλεος and a personal object, "is upon" preserves the Greek image
    of mercy resting on people while remaining readable English.
- source_word: ἀγαπῶντας
  chosen: those who love
  alternatives:
  - those loving
  lexicon: BDAG
  rationale: The participle is rendered idiomatically as a substantive phrase in English
    while preserving the ongoing relational sense.
- source_word: ἐν ἀληθείᾳ
  chosen: in truth
  alternatives:
  - truly
  - faithfully
  - with sincerity
  lexicon: BDAG
  rationale: '"In truth" closely reflects the Greek form and preserves a morally and
    covenantally weighty sense broader than mere sincerity.'
- source_word: μνήσεται
  chosen: will remember
  alternatives:
  - will be mindful of
  lexicon: BDAG
  rationale: The future verb points to the Lord's active, favorable remembrance; "will
    remember" is the clearest direct rendering.
- source_word: δούλων
  chosen: servants
  alternatives:
  - slaves
  lexicon: BDAG
  rationale: Although δοῦλος can mean "slave," the bonded-status nuance is not especially
    foregrounded here; "servants" better fits this prayerful context while remaining
    faithful.
- source_word: ἐν ἐλέει
  chosen: with mercy
  alternatives:
  - mercifully
  - in mercy
  lexicon: BDAG
  rationale: '"With mercy" reads naturally in English and preserves the instrumental
    or attendant sense of the Greek phrase.'
