  chosen_reading: servants
  alternative_readings:
  - slaves
  rationale: The verse emphasizes the Lord's merciful remembrance more than the servants'
    bonded status, so "servants" best balances accuracy and readability while documenting
    the stronger alternative.
  doctrine_reference: 'DOCTRINE.md: δοῦλος = servant / slave (context-dependent)'
- issue: Rendering κύριος
  chosen_reading: Lord
