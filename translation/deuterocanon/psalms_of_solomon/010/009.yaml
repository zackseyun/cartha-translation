id: PSS.10.9
reference: Psalms of Solomon 10:9
source:
  edition: lxx-swete-1909
  text: τοῦ κυρίου ἡ σωτηρία ἐπὶ οἶκον Ἰσραὴλ εἰς σωφροσύνην αἰώνιον.
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: The Lord’s salvation is upon the house of Israel for everlasting gladness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The Lord’s salvation be upon the house of Israel,' taking the verbless clause with an implied blessing-like force.
    reason: alternative_reading
  - marker: b
    text: Or 'prudence,' 'sound-mindedness,' or 'sobriety' for 'self-control.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for everlasting self-control.'.
    reason: previous_rendering
lexical_decisions:
- source_word: τοῦ κυρίου
  chosen: The Lord’s
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: 'The genitive is most naturally possessive here: ''the Lord’s salvation.'' This is smoother than the more wooden ''the salvation of the Lord'' while preserving the same sense. It also follows the project’s default rendering of κύριος as ''Lord.'''
- source_word: ἡ σωτηρία
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: σωτηρία can denote rescue or deliverance, but 'salvation' preserves the broader religious weight of the term and fits the psalmic, doxological context.
- source_word: ἐπὶ οἶκον Ἰσραήλ
  chosen: is upon the house of Israel
  alternatives:
  - be upon the house of Israel
  - rests upon the house of Israel
  lexicon: BDAG
  rationale: The clause is verbless, so English requires a supplied verb. 'Is upon' stays close to the Greek construction and matches similar blessing-style language in the surrounding context. 'House of Israel' is retained rather than reduced to simply 'Israel' because the Greek explicitly includes οἶκον.
- source_word: εἰς
  chosen: for
  alternatives:
  - unto
  - resulting in
  lexicon: BDAG
  rationale: Here εἰς likely marks goal or result. 'For' gives natural English without over-defining whether the nuance is purpose or result.
- source_word: σωφροσύνην
  chosen: self-control
  alternatives:
  - prudence
  - sound-mindedness
  - sobriety
  lexicon: LSJ
  rationale: Elsewhere in this corpus σωφροσύνη commonly denotes moral self-mastery. 'Self-control' is the clearest modern English equivalent. Although 'prudence' is possible, it leans more intellectual than the broader ethical force of the Greek.
- source_word: αἰώνιον
  chosen: everlasting
  alternatives:
  - eternal
  lexicon: BDAG
  rationale: '''Everlasting'' preserves the enduring-force adjective in idiomatic English and pairs naturally with the abstract noun that follows.'
