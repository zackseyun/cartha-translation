theological_decisions:
- issue: Whether to render the paired predicates in a more interpretive way ('just and faithful') or preserve their distinct moral-sacral force.
  chosen_reading: righteous and holy
  alternative_readings:
  - just and holy
  - righteous and faithful
  rationale: The Greek presents two distinct qualities of the Lord. “Righteous and holy” preserves both the judicial-moral and sacral dimensions without interpretive flattening.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
