id: PSS.10.6
reference: Psalms of Solomon 10:6
source:
  edition: lxx-swete-1909
  text: δίκαιος καὶ ὅσιος Κύριος ἡμῶν κρίμασιν αὐτοῦ εἰς τὸν αἰῶνα, καὶ Ἰσραὴλ αἰνέσει τῷ ὀνόματι Κυρίου ἐν εὐφροσύνῃ.
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: Righteous and holy is our Lord in his judgments forever, and Israel will praise the name of the Lord with gladness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Our Lord is righteous and holy'.
    reason: previous_rendering
lexical_decisions:
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: The adjective denotes moral rightness here as a predicate of the Lord. “Righteous” best preserves the theological and moral sense without reducing it merely to judicial fairness.
- source_word: ὅσιος
  chosen: holy
  alternatives:
  - devout
  - faithful
  lexicon: BDAG
  rationale: In predication of God, “holy” is the most natural English rendering and best matches the sacred character implied by the Greek.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered “Lord.” Here it functions as a divine title for God rather than a mere honorific.
- source_word: κρίμασιν
  chosen: judgments
  alternatives:
  - judicial decisions
  - acts of judgment
  lexicon: BDAG
  rationale: The dative plural refers to the Lord’s judgments or judicial acts. “Judgments” is concise, natural, and preserves the formal texture of the line.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for eternity
  lexicon: BDAG
  rationale: This idiom commonly conveys enduring perpetuity. “Forever” gives clear modern English while preserving the temporal force.
- source_word: αἰνέσει
  chosen: will praise
  alternatives:
  - shall praise
  - will give praise to
  lexicon: BDAG
  rationale: Future sense suits the clause well. “Will praise” is idiomatic and captures the verbal force cleanly in English.
- source_word: τῷ ὀνόματι Κυρίου
  chosen: the name of the Lord
  alternatives:
  - the Lord’s name
  lexicon: BDAG
  rationale: The phrase is kept relatively literal because “name” carries reverential and covenantal weight beyond mere label.
- source_word: ἐν εὐφροσύνῃ
  chosen: with gladness
  alternatives:
  - in joy
  - with rejoicing
  lexicon: BDAG
  rationale: The phrase marks the manner of Israel’s praise. “With gladness” is readable and preserves the warm celebratory tone.
