lexical_decisions:
- source_word: ὅσιοι
  chosen: the holy ones
  alternatives:
  - the faithful
  - the devout
  lexicon: LSJ
  rationale: The term denotes those marked by piety or covenant loyalty. 'The holy ones' preserves the adjective's sacred force, while 'the faithful' is a plausible but slightly more interpretive alternative.
- source_word: ἐξομολογήσονται
  chosen: will give thanks
  alternatives:
  - will praise
  - will confess
  lexicon: LSJ
  rationale: In Septuagintal religious usage this verb commonly carries the sense of public thanksgiving or praise, not merely confession of sin. 'Will give thanks' best fits the worship setting of the assembly.
- source_word: ἐκκλησίᾳ λαοῦ
  chosen: the assembly of the people
  alternatives:
  - the congregation of the people
  - the people's assembly
  lexicon: LSJ
  rationale: This phrase refers to a gathered community. 'Assembly' is natural modern English and keeps the corporate, public setting clear.
- source_word: πτωχοὺς
  chosen: the poor
  alternatives:
  - the needy
  lexicon: LSJ
  rationale: '''The poor'' is the most direct rendering and preserves the social and material sense of the Greek without softening it.'
- source_word: ἐλεήσει
  chosen: will have mercy on
  alternatives:
  - will show compassion to
  - will pity
  lexicon: LSJ
  rationale: This verb regularly conveys merciful action. 'Will have mercy on' is idiomatic and retains the theological weight of divine compassion.
- source_word: ἐν εὐφροσύνῃ Ἰσραήλ
  chosen: amid Israel’s rejoicing
  alternatives:
  - in the gladness of Israel
  - with Israel's joy
  lexicon: LSJ
  rationale: The phrase most naturally locates God's merciful action within a scene of communal joy. 'Amid Israel’s rejoicing' is readable English that preserves that setting.
