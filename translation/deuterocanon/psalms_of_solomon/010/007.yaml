  text: καὶ ὅσιοι ἐξομολογήσονται ἐν ἐκκλησίᾳ λαοῦ, καὶ πτωχοὺς ἐλεήσει ὁ θεὸς ἐν εὐφροσύνῃ Ἰσραήλ.
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: And the pious will give thanks in the assembly of the people, and God will have mercy on the poor And the pious ones will give thanks in the assembly of the people, and God will have mercy on the poor in the gladness of Israel..
  philosophy: optimal-equivalence
  footnotes:
