id: PSS.10.1
reference: Psalms of Solomon 10:1
source:
  edition: lxx-swete-1909
  text: Μακάριος ἀνὴρ οὗ ὁ κύριος ἐμνήσθη ἐν ἐλεγμῷ, καὶ ἐκυκλώθη ἀπὸ ὁδοῦ πονηρᾶς
    ἐν μάστιγι, καθαρισθῆναι ἀπὸ ἁμαρτίας, τοῦ μὴ πληθῦναι.
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: Blessed is the man whom the Lord remembered with rebuke, and who was hemmed
    in from an evil way by a scourge, to be cleansed from sin, so that it might not
    multiply.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with reproof' for 'with rebuke.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'was encircled'; the sense is that he was constrained or fenced
      off from an evil way.
    reason: lexical_alternative
  - marker: c
    text: The final clause may also be understood as 'so as not to increase [sin]'
      or 'so that he might not multiply it.'
    reason: alternative_reading
lexical_decisions:
- source_word: Μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: LSJ
  rationale: Retains the weight of beatitude language rather than reducing it to emotional
    happiness.
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - person
  lexicon: LSJ
  rationale: The Greek is grammatically masculine singular; per project philosophy,
    a gender-accurate rendering is preferred unless context clearly demands a neutral
    term.
- source_word: ἐμνήσθη
  chosen: remembered
  alternatives:
  - took notice of
  - was mindful of
  lexicon: LSJ
  rationale: The verb is literally 'remembered' and should be preserved; in context
    it conveys the Lord's attentive action toward the man in discipline.
- source_word: ἐν ἐλεγμῷ
  chosen: with rebuke
  alternatives:
  - in rebuke
  - with reproof
  - by correction
  lexicon: LSJ
  rationale: '''With rebuke'' is clear modern English and preserves the disciplinary
    sense without over-expanding it.'
- source_word: ἐκυκλώθη
  chosen: was hemmed in
  alternatives:
  - was surrounded
  - was enclosed
  - was restrained
  lexicon: LSJ
  rationale: A more literal 'was surrounded' is awkward here. 'Was hemmed in' preserves
    the image of being constrained or fenced off from a bad path.
- source_word: ὁδοῦ πονηρᾶς
  chosen: an evil way
  alternatives:
  - a wicked path
  - an evil path
  lexicon: LSJ
  rationale: A natural rendering that preserves the metaphor of moral conduct as a
    way/path.
- source_word: ἐν μάστιγι
  chosen: by a scourge
  alternatives:
  - by a whip
  - by flogging
  - by chastisement
  lexicon: LSJ
  rationale: Keeps the concrete disciplinary image. 'Scourge' is weightier and more
    literary than 'whip' without becoming obscure.
- source_word: καθαρισθῆναι
  chosen: to be cleansed
  alternatives:
  - to be purified
  lexicon: LSJ
  rationale: Preserves the passive infinitive and the moral-cleansing sense in accessible
    English.
- source_word: ἁμαρτίας
  chosen: sin
  alternatives:
  - sins
  lexicon: LSJ
  rationale: The singular works well as a collective moral category in English and
    fits the following clause about increase/multiplication.
- source_word: τοῦ μὴ πληθῦναι
  chosen: so that it might not multiply
  alternatives:
  - so as not to increase
  - so that he might not multiply it
  lexicon: LSJ
  rationale: The infinitive clause is compressed and somewhat ambiguous. This rendering
    most naturally takes 'sin' as the implied referent and expresses the likely purpose
    of the preceding discipline.
