id: PSS.10.5
reference: Psalms of Solomon 10:5
source:
  edition: lxx-swete-1909
  text: ἡ γὰρ μαρτυρία ἐν νόμῳ διαθήκης αἰωνίου, ἡ μαρτυρία Κυρίου ἐπὶ ὁδοὺς ἀνθρώπων ἐν ἐπισκοπῇ·
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: For the testimony is in the law of the everlasting covenant; the Lord's testimony is upon the ways of men in visitation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "For the testimony in the law of the everlasting covenant is the Lord's testimony concerning people's ways when he visits.".
    reason: previous_rendering
lexical_decisions:
- source_word: μαρτυρία
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  entry: null
  rationale: The noun can mean either 'testimony' or 'witness.' 'Testimony' best fits this covenantal and legal setting, especially alongside 'law' and 'covenant,' while preserving the solemn declarative force of the Greek.
- source_word: ἐν νόμῳ διαθήκης αἰωνίου
  chosen: in the law of the everlasting covenant
  alternatives:
  - in the law of the eternal covenant
  - in the covenant law forever
  lexicon: BDAG
  entry: null
  rationale: The phrase is kept relatively close to the Greek structure. 'Everlasting covenant' is natural biblical English for διαθήκης αἰωνίου, and 'in the law' preserves the locative sense of ἐν without over-paraphrasing.
- source_word: Κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  entry: null
  rationale: Per project doctrine, κύριος is rendered 'Lord.' Here it functions as a divine title in a covenantal context.
- source_word: ἐπὶ ὁδοὺς ἀνθρώπων
  chosen: concerning people's ways
  alternatives:
  - over the ways of people
  - upon human ways
  lexicon: BDAG
  entry: null
  rationale: With μαρτυρία, ἐπί can be rendered more idiomatically as 'concerning' rather than a wooden 'upon.' 'People's ways' conveys the generic human sense of ἀνθρώπων in natural English without implying males only.
- source_word: ἐν ἐπισκοπῇ
  chosen: when he visits
  alternatives:
  - in visitation
  - under inspection
  - in oversight
  lexicon: BDAG
  entry: null
  rationale: ἐπισκοπή can denote visitation, inspection, or oversight. In this context of the Lord's searching witness over human conduct, 'when he visits' brings out the idiomatic sense of divine visitation in readable modern English while staying close to the source.
- source_word: '[implied copula]'
  chosen: is
  alternatives:
  - there is
  lexicon: N/A
  entry: null
  rationale: The Greek clause is verbless. Supplying 'is' is the lightest English completion and preserves the appositional force of the repeated 'testimony.'
