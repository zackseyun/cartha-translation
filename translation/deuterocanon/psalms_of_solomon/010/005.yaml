  from: For the testimony in the law of the everlasting covenant is the Lord's testimony concerning people's ways when he visits.
  to: For the testimony is in the law of the everlasting covenant; the Lord's testimony is upon the ways of men in visitation.
  rationale: The draft collapses a clear poetic bicolon into a single prose sentence by making the first half the subject and the second half the predicate. The repetition of 'ἡ μαρτυρία' (the testimony) and the comma in the Greek text signal two parallel verbless clauses. Furthermore, translating the noun 'ἐπισκοπῇ' as a verbal clause ('when he visits') loses the formal theological weight of 'visitation' (ἐπισκοπή), a standard LXX term for divine inspection or judgment.
