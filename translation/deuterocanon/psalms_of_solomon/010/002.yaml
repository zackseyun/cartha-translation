id: PSS.10.2
reference: Psalms of Solomon 10:2
source:
  edition: lxx-swete-1909
  text: ὁ ἑτοιμάζων νῶτον εἰς μάστιγας, καὶ καθαρισθήσεται· χρηστὸς γὰρ ὁ κύριος τοῖς ὑπομένουσιν παιδείαν.
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: The one who prepares his back for scourges will be cleansed, for the Lord is good to those who endure discipline.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be purified.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for scourges.'
    reason: lexical_alternative
  - marker: c
    text: Or 'correction' or 'chastening.'
    reason: lexical_alternative
  - marker: d
    text: Or 'for whips'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ ἑτοιμάζων
  chosen: The one who prepares
  alternatives:
  - he who prepares
  - the one preparing
  - whoever readies
  lexicon: BDAG
  rationale: The articular present participle functions generically, referring to a person characterized by readiness to receive correction. 'The one who prepares' preserves that force in natural English.
- source_word: νῶτον
  chosen: his back
  alternatives:
  - back
  lexicon: LSJ
  rationale: The noun denotes the back. English idiom normally supplies the possessive with a generic personal subject, and the masculine possessive reflects the source's grammatical gender-accuracy policy.
- source_word: εἰς μάστιγας
  chosen: for whips
  alternatives:
  - for scourges
  - for flogging
  lexicon: LSJ
  rationale: The phrase expresses readiness to receive blows of chastisement. 'Whips' is vivid and direct without importing a more specific punishment than the Greek requires.
- source_word: καθαρισθήσεται
  chosen: will be cleansed
  alternatives:
  - will be purified
  - will be made clean
  lexicon: BDAG
  rationale: The future passive indicates resulting cleansing. 'Cleansed' keeps the moral and corrective sense broad, whereas 'purified' is possible but slightly more elevated and interpretive.
- source_word: χρηστὸς
  chosen: good
  alternatives:
  - kind
  - gracious
  lexicon: BDAG
  rationale: The adjective can mean kind or good. 'Good' is the more idiomatic predicate here and fits the wisdom-style statement about the Lord's character.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord' as the default.
- source_word: τοῖς ὑπομένουσιν
  chosen: to those who endure
  alternatives:
  - to those who persevere
  - to those who remain under
  lexicon: BDAG
  rationale: The participle conveys steadfast endurance under hardship or correction. 'Endure' is the clearest natural equivalent in this context.
- source_word: παιδείαν
  chosen: discipline
  alternatives:
  - correction
  - instruction
  - chastening
  lexicon: BDAG
  rationale: In context the term refers to corrective training rather than mere education. 'Discipline' best matches the sense while remaining readable modern English.
