theological_decisions:
- issue: Meaning of cleansing after accepted chastisement
  chosen_reading: The verse speaks of moral or corrective cleansing resulting from willingly accepted discipline.
  alternative_readings:
  - The verse could be read more narrowly as ritual purification imagery.
  - The verse could be read more broadly as vindication through suffering.
  rationale: καθαρισθήσεται naturally suggests cleansing, and the parallel with enduring παιδεία points to correction that produces moral purification. The translation keeps the image broad enough not to force a specifically ritual or forensic reading.
