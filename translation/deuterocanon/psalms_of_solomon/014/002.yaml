id: PSS.14.2
reference: Psalms of Solomon 14:2
source:
  edition: lxx-swete-1909
  text: ὅσιοι Κυρίου ζήσονται ἐν αὐτῷ εἰς τὸν αἰῶνα· ὁ παράδεισος τοῦ κυρίου, τὰ ξύλα τῆς ζωῆς ὅσιοι αὐτοῦ.
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: The holy ones of the Lord The faithful ones of the Lord will live by it forever; the paradise of the Lord—the trees of life—are his faithful ones. forever; the paradise of the Lord—the trees of life—are his holy ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'saints' or 'devout ones' for 'holy ones.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'the trees of life' is plural.
    reason: lexical_alternative
  - marker: c
    text: Or 'will live in him'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅσιοι
  chosen: holy ones
  alternatives:
  - saints
  - faithful ones
  - devout ones
  lexicon: LSJ
  rationale: ὅσιος denotes those marked by piety or holiness. 'Holy ones' preserves the covenantal-religious sense without importing later ecclesiastical overtones that 'saints' can carry.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - the lord
  - the Master
  lexicon: LSJ
  rationale: This follows the project's default rendering of κύριος as 'Lord' and fits both clauses in this verse.
- source_word: ζήσονται
  chosen: will live
  alternatives:
  - will be alive
  - will have life
  lexicon: LSJ
  rationale: A straightforward future of ζάω; 'will live' is both natural and sufficiently formal.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - with him
  - by him
  lexicon: LSJ
  rationale: The most natural antecedent is the Lord, and ἐν is best preserved as 'in,' expressing life found in union with him rather than merely proximity.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for eternity
  lexicon: LSJ
  rationale: In idiomatic English this phrase is best rendered 'forever'; 'for the age' would be too wooden here.
- source_word: παράδεισος
  chosen: paradise
  alternatives:
  - garden
  lexicon: LSJ
  rationale: '''Paradise'' preserves the elevated, eschatological resonance of the Greek better than the more ordinary ''garden.'''
- source_word: τὰ ξύλα τῆς ζωῆς
  chosen: the trees of life
  alternatives:
  - the wood of life
  - the tree of life
  lexicon: LSJ
  rationale: The plural τὰ ξύλα is best represented as 'the trees.' Although English readers may expect the singular from Genesis imagery, the Greek here is plainly plural.
- source_word: ὅσιοι αὐτοῦ
  chosen: his holy ones
  alternatives:
  - his saints
  - his faithful ones
  lexicon: LSJ
  rationale: 'The repeated phrase forms the predicate of the verbless second clause. Repeating ''holy ones'' preserves the metaphor: the Lord''s paradise, the trees of life, are identified with his holy ones.'
