theological_decisions:
- issue: Metaphorical force of the second clause
  chosen_reading: 'The second clause is rendered as a verbless identification: ''the paradise of the Lord—the trees of life—are his holy ones.'''
  alternative_readings:
  - The paradise of the Lord belongs to his holy ones
  - The holy ones are in the paradise of the Lord, the trees of life
  rationale: The Greek presents three nominative expressions in apposition without an explicit verb. Rendering it as an identificational clause best preserves the poetic metaphor rather than resolving it into possession or location.
  doctrine_reference: Preserve theological tension rather than resolve it.
