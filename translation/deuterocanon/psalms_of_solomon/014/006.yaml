id: PSS.14.6
reference: Psalms of Solomon 14:6
source:
  edition: lxx-swete-1909
  text: διὰ τοῦτο ἡ κληρονομία αὐτῶν ᾅδης καὶ σκότος καὶ ἀπώλεια, καὶ οὐχ εὑρεθήσονται ἐν ἡμέρᾳ ἐλέους δικαίων. οἱ δὲ ὅσιοι Κυρίου κληρονομήσουσιν ζωὴν ἐν εὐφροσύνῃ.
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: Therefore Hades and darkness and destruction are their inheritance, and they will not be found in the day of mercy for the righteous. But Therefore Hades and darkness and destruction are their inheritance, and they will not be found in the day of mercy for the righteous. But the faithful ones of the Lord will inherit life in gladness. of the Lord will inherit life in gladness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the day of the righteous ones’ mercy.' The Greek construction can be read more than one way.
    reason: alternative_reading
  - marker: b
    text: '''Hades'' refers to the realm of the dead; it is not necessarily identical to the later, fuller sense often conveyed by ''hell.'''
    reason: cultural_note
  - marker: c
    text: Or, 'the godly ones of the Lord.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the holy ones'.
    reason: previous_rendering
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: BDAG
  rationale: Marks an inferential/resultative conclusion from the preceding context. 'Therefore' is concise and natural in English while preserving the logical force.
- source_word: κληρονομία
  chosen: inheritance
  alternatives:
  - portion
  - heritage
  lexicon: BDAG
  rationale: The noun carries inheritance/heritage language; 'inheritance' preserves the covenantal and eschatological weight better than the flatter 'portion'.
- source_word: ᾅδης
  chosen: Hades
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: BDAG
  rationale: A transliterated rendering avoids importing the fuller later English associations of 'hell' and stays close to the Greek term's reference to the underworld/realm of the dead.
- source_word: σκότος
  chosen: darkness
  alternatives:
  - gloom
  lexicon: BDAG
  rationale: '''Darkness'' is the plain lexical sense and works well in the triad with ''Hades'' and ''destruction''.'
- source_word: ἀπώλεια
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: BDAG
  rationale: '''Destruction'' is the most direct and readable modern equivalent. ''Perdition'' is more traditional but too ecclesiastical here.'
- source_word: οὐχ εὑρεθήσονται
  chosen: they will not be found
  alternatives:
  - they will not be discovered
  - they will not appear
  lexicon: BDAG
  rationale: A future passive is present in Greek. 'Will not be found' preserves the form and the judicial/exclusion nuance better than a more interpretive rendering.
- source_word: ἐν ἡμέρᾳ ἐλέους δικαίων
  chosen: in the day of mercy for the righteous
  alternatives:
  - on the day of mercy of the righteous
  - in the day of the righteous ones' mercy
  lexicon: BDAG
  rationale: 'The genitive δικαίων is somewhat ambiguous. Rendering it as ''for the righteous'' best fits the sense: a day when mercy is shown toward the righteous, in contrast to the fate of the wicked.'
- source_word: ὅσιοι
  chosen: the holy ones
  alternatives:
  - the godly
  - the devout
  - the faithful
  lexicon: BDAG
  rationale: Ὅσιοι denotes those marked by piety/devotion. 'The holy ones' preserves the set-apart/religious character without over-paraphrasing, though 'godly' is a viable alternative.
- source_word: Κυρίου
  chosen: of the Lord
  alternatives:
  - belonging to the Lord
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord.' The genitive is kept straightforwardly.
- source_word: κληρονομήσουσιν ζωὴν
  chosen: will inherit life
  alternatives:
  - will receive life as an inheritance
  - will possess life
  lexicon: BDAG
  rationale: Retains the inheritance motif established earlier in the verse and makes the contrast with the wicked's inheritance explicit.
- source_word: ἐν εὐφροσύνῃ
  chosen: in gladness
  alternatives:
  - with joy
  - in rejoicing
  lexicon: BDAG
  rationale: '''In gladness'' is a natural rendering of the prepositional phrase and preserves the elevated but readable tone of the line.'
