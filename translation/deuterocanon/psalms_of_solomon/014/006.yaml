theological_decisions:
- issue: Meaning of ᾅδης
  chosen_reading: Rendered as 'Hades' rather than 'hell.'
  alternative_readings:
  - hell
  - the grave
  - the realm of the dead
  rationale: The Greek term does not require the fuller later doctrinal content English readers often attach to 'hell.' 'Hades' preserves lexical precision and avoids importing concepts the text does not explicitly state.
- issue: Force of δικαίων in ἐν ἡμέρᾳ ἐλέους δικαίων
  chosen_reading: Translated 'in the day of mercy for the righteous.'
  alternative_readings:
  - in the day of the righteous ones' mercy
  - in the day of merciful judgment involving the righteous
  rationale: The immediate contrast is between the condemned and the Lord's holy ones who inherit life. Interpreting the genitive as beneficiaries of mercy best suits that contrast and yields the clearest English without overstating certainty.
  doctrine_reference: Preserve theological tension rather than resolve it
