id: PSS.14.3
reference: Psalms of Solomon 14:3
source:
  edition: lxx-swete-1909
  text: ἡ φυτεία αὐτῶν ἐρριζωμένη εἰς τὸν αἰῶνα· οὐκ ἐκλήξουσιν πάσας τὰς ἡμέρας τοῦ οὐρανοῦ, ὅτι ἡ μερὶς καὶ κληρονομία τοῦ θεοῦ ἐστιν Ἰσραήλ.
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: Their planting is rooted forever; Their planting is rooted forever; they will not come to an end all the days of heaven, because Israel is the portion and inheritance of God. all the days of heaven, because Israel is the portion and inheritance of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they will not be cut off” / “they will not come to an end.” The verb is rare, and the sense is enduring stability.
    reason: lexical_alternative
  - marker: b
    text: “All the days of heaven” is a literal expression for the full duration of the present heavenly order.
    reason: cultural_note
  - marker: c
    text: Or “Israel is God's portion and inheritance.”
    reason: alternative_reading
  - marker: d
    text: Or 'they will not fail'.
    reason: previous_rendering
lexical_decisions:
- source_word: φυτεία
  chosen: planting
  alternatives:
  - plantation
  - plant
  - that which is planted
  lexicon: LSJ
  rationale: The noun denotes what has been planted or a planting. “Planting” preserves the agricultural metaphor without over-specifying whether the referent is the people themselves or their settled estate.
- source_word: ἐρριζωμένη
  chosen: rooted
  alternatives:
  - firmly rooted
  - established
  lexicon: LSJ
  rationale: The perfect passive participle emphasizes a settled, enduring state. “Rooted” keeps the botanical image created by φυτεία and matches the permanence implied by the perfect.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for ever
  lexicon: LSJ
  rationale: In context this idiom expresses enduring permanence rather than a narrowly technical ‘age.’ “Forever” is natural modern English and preserves the force.
- source_word: ἐκλήξουσιν
  chosen: fail
  alternatives:
  - be cut off
  - come to an end
  - cease
  lexicon: LSJ
  rationale: The future verb here conveys not collapsing or coming to ruin. “Fail” is concise, idiomatic, and fits the context of enduring stability. Because the form is uncommon and can be taken in related senses, alternatives are noted.
- source_word: πάσας τὰς ἡμέρας τοῦ οὐρανοῦ
  chosen: all the days of heaven
  alternatives:
  - all the days under heaven
  - all heaven's days
  lexicon: LSJ
  rationale: The phrase is rendered closely to preserve the elevated idiom. “Days of heaven” likely means the full span of the present order; translating more interpretively as “under heaven” would smooth the image too quickly.
- source_word: μερὶς
  chosen: portion
  alternatives:
  - share
  - allotted part
  lexicon: LSJ
  rationale: “Portion” is a standard rendering for covenantal/allotment language and pairs well with κληρονομία.
- source_word: κληρονομία
  chosen: inheritance
  alternatives:
  - heritage
  - possession
  lexicon: LSJ
  rationale: “Inheritance” preserves the covenantal and possessive nuance of the term and matches common biblical usage.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - belonging to God
  lexicon: LSJ
  rationale: The genitive is best left straightforwardly possessive here. “Of God” is clear and sufficiently direct.
