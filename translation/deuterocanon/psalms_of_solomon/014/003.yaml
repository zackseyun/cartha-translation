  from: they will not fail
  to: Their planting is rooted forever; they will not come to an end all the days of heaven, because Israel is the portion and inheritance of God.
  rationale: 'Adjudicator-modified: The reviewer is correct that ''fail'' is archaic in the sense of ''cease to exist'' and misleading in modern English. The Greek verb ἐκλήγω (future ἐκλήξουσιν) means ''to cease'' or ''leave off.'' Translating it as ''come to an end'' accurately conveys the enduring nature of the ''planting'' without the modern connotations of failure or dereliction. I have provided the full verse text for the rewrite.'
