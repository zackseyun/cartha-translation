theological_decisions:
- issue: Corporate covenantal identity of Israel as God's allotted possession
  chosen_reading: Israel is the portion and inheritance of God
  alternative_readings:
  - Israel is God's portion and inheritance
  rationale: The Greek predicate construction supports either English order. The chosen wording stays close to the source while preserving the covenantal claim without expanding it doctrinally.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
