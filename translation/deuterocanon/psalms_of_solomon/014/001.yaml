id: PSS.14.1
reference: Psalms of Solomon 14:1
source:
  edition: lxx-swete-1909
  text: Πιστὸς Κύριος τοῖς ἀγαπῶσιν αὐτὸν ἐν ἀληθείᾳ, τοῖς ὑπομένουσιν παιδείαν αὐτοῦ,
    τοῖς πορευομένοις ἐν δικαιοσύνῃ προσταγμάτων αὐτοῦ, ἐν νόμῳ ᾧ ἐνετείλατο ἡμῖν
    εἰς ζωὴν ἡμῶν.
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: The Lord is faithful to those who love him in truth, to those who endure his
    discipline, to those who walk in the righteousness of his commandments, in the
    law that he commanded us for our life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instruction' for 'discipline.' The Greek παιδεία can include training,
      correction, and teaching.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πιστὸς
  chosen: faithful
  alternatives:
  - trustworthy
  - steadfast
  lexicon: BDAG
  rationale: Predicative use with Κύριος is best rendered as an attribute of the Lord’s
    reliability and constancy toward his people; 'faithful' is the most natural and
    theologically weighty English choice.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is normally rendered 'Lord.' Here it functions
    as the divine title in a Jewish-Greek devotional context.
- source_word: ἀγαπῶσιν
  chosen: love
  alternatives:
  - have love for
  lexicon: BDAG
  rationale: The verbal form straightforwardly denotes love; 'love' preserves both
    lexical simplicity and covenantal weight.
- source_word: ἐν ἀληθείᾳ
  chosen: in truth
  alternatives:
  - truly
  - with sincerity
  lexicon: BDAG
  rationale: The prepositional phrase is retained more formally as 'in truth' to preserve
    the Greek expression and its moral-religious nuance, rather than collapsing it
    into an adverb alone.
- source_word: ὑπομένουσιν
  chosen: endure
  alternatives:
  - persevere under
  - remain steadfast under
  lexicon: BDAG
  rationale: The verb conveys steadfast persistence under difficulty; 'endure' is
    concise and idiomatic in English.
- source_word: παιδείαν
  chosen: discipline
  alternatives:
  - instruction
  - training
  - correction
  lexicon: BDAG
  rationale: In this context of covenantal obedience and moral formation, 'discipline'
    best captures corrective training from God without reducing the sense to mere
    teaching.
- source_word: πορευομένοις
  chosen: walk
  alternatives:
  - live
  - go about
  lexicon: BDAG
  rationale: '''Walk'' preserves the biblical metaphor of conduct and remains natural
    in English when followed by a moral sphere.'
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrinal defaults, δικαιοσύνη is rendered 'righteousness' unless
    context strongly demands 'justice.' Here the focus is upright conduct according
    to God's commands.
- source_word: προσταγμάτων
  chosen: commandments
  alternatives:
  - commands
  - ordinances
  lexicon: BDAG
  rationale: '''Commandments'' fits the elevated devotional register and matches the
    genitive relation to ''righteousness'' more naturally than the shorter ''commands.'''
- source_word: νόμῳ
  chosen: law
  alternatives:
  - instruction
  lexicon: BDAG
  rationale: '''Law'' is the standard and most transparent rendering here, especially
    alongside divine command language.'
- source_word: εἰς ζωὴν ἡμῶν
  chosen: for our life
  alternatives:
  - for our lives
  - for life
  lexicon: BDAG
  rationale: The singular ζωή is preserved with the collective sense 'for our life,'
    expressing the law’s life-giving purpose for the community.
