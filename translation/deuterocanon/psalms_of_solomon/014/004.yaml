id: PSS.14.4
reference: Psalms of Solomon 14:4
source:
  edition: lxx-swete-1909
  text: καὶ οὐχ οὕτως οἱ ἁμαρτωλοὶ καὶ παράνομοι, οἱ ἠγάπησαν ἡμέραν ἐν μετοχῇ ἁμαρτίας αὐτῶν· ἐν μικρότητι σαπρίας ἡ ἐπιθυμία αὐτῶν,
  language: Greek
  pages:
  - 803
  validation: swete_direct
translation:
  text: But not so the sinners and the lawless, who loved a day of sharing in their sin; their desire lay in petty corruption,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ οὐχ οὕτως
  chosen: But not so
  alternatives:
  - And not so
  - Not in this way
  lexicon: LSJ
  rationale: The phrase marks a sharp contrast with the blessed permanence of the Lord’s holy ones in the preceding verses. 'But not so' is concise, natural English and preserves the psalmic contrast without overexpanding the Greek.
- source_word: οἱ ἁμαρτωλοὶ καὶ παράνομοι
  chosen: the sinners and the lawless
  alternatives:
  - the wicked and the lawless
  - sinners and transgressors
  lexicon: BDAG
  rationale: Both terms should be preserved rather than collapsed into one English label. 'Sinners' renders ἁμαρτωλοί plainly, and 'the lawless' keeps the legal-moral force of παράνομοι.
- source_word: οἱ ἠγάπησαν ἡμέραν
  chosen: who loved a day
  alternatives:
  - who loved the day
  - who delighted in a day
  lexicon: LSJ
  rationale: The Greek is compressed and somewhat unusual, but it directly says they 'loved a day.' Keeping 'a day' preserves the singular, likely pointing to the brief, passing span they prized, rather than smoothing it into a more generalized 'time.'
- source_word: ἐν μετοχῇ ἁμαρτίας αὐτῶν
  chosen: of sharing in their sin
  alternatives:
  - in participation in their sin
  - in fellowship with their sin
  lexicon: BDAG
  rationale: μετοχή denotes participation or sharing. 'Sharing in their sin' is more natural than the more wooden 'participation,' while remaining close to the Greek sense.
- source_word: ἐν μικρότητι σαπρίας
  chosen: in petty corruption
  alternatives:
  - in the smallness of corruption
  - in paltry decay
  - in meanness of rottenness
  lexicon: LSJ
  rationale: This is a vivid and difficult phrase. μικρότης conveys smallness or pettiness, and σαπρία carries the sense of decay or corruption. 'Petty corruption' preserves the moral-poetic force in readable English without flattening the phrase into a broad paraphrase.
- source_word: ἡ ἐπιθυμία αὐτῶν
  chosen: their desire lay
  alternatives:
  - their desire was
  - their craving lay
  lexicon: BDAG
  rationale: ἐπιθυμία is broadly 'desire' here, not necessarily sexual lust. Rendering the clause as 'their desire lay in...' gives idiomatic English while still reflecting the Greek structure with ἐν.
