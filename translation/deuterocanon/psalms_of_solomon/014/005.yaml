theological_decisions:
- issue: Scope of divine foreknowledge in the final clause
  chosen_reading: The verse states that God knows even the inner realities of the heart before they come to be.
  alternative_readings:
  - God knows the heart's hidden things before they are expressed in action
  - God knows the inner counsels of the heart before they arise
  rationale: The Greek phrasing naturally presents comprehensive divine knowledge without specifying a later doctrinal system. The translation preserves that breadth rather than resolving it into a narrower claim about only actions or only thoughts.
