id: PSS.14.5
reference: Psalms of Solomon 14:5
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἐμνήσθησαν τοῦ θεοῦ, ὅτι ὁδοὶ ἀνθρώπων γνωσταὶ ἐνώπιον αὐτοῦ διὰ παντός, καὶ ταμεῖα καρδίας ἐπίσταται πρὸ τοῦ γενέσθαι.
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: And they did not remember God, that the ways of men are known before him continually, and he knows the secrets of the heart before they come to be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inner rooms of the heart'; more interpretively, 'the secrets of the heart.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''before they happen'' or ''before they arise.'' The Greek is broad: ''before they come to be.'''
    reason: alternative_reading
  - marker: c
    text: Or 'the hidden chambers of the heart before they come to be'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐμνήσθησαν
  chosen: did not remember
  alternatives:
  - did not call to mind
  - did not keep in mind
  lexicon: BDAG
  rationale: The aorist middle/passive here conveys failure to remember or keep God in mind. 'Did not remember' is plain, natural English and preserves the moral force without paraphrase.
- source_word: ὁδοὶ
  chosen: ways
  alternatives:
  - paths
  - conduct
  lexicon: BDAG
  rationale: '''Ways'' preserves the idiomatic moral sense common in biblical diction while still allowing literal resonance. ''Conduct'' is interpretive; ''paths'' is more concrete than the context requires.'
- source_word: γνωσταὶ
  chosen: are known
  alternatives:
  - are manifest
  - are evident
  lexicon: BDAG
  rationale: 'The predicate adjective is best rendered with a stative passive sense: human ways stand known before God. ''Are known'' is the most transparent equivalent.'
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his sight
  - before his face
  lexicon: BDAG
  rationale: '''Before him'' is concise and idiomatic, preserving the relational and judicial sense of being in God''s presence.'
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - always
  - at all times
  lexicon: BDAG
  rationale: The phrase emphasizes ongoing constancy. 'Continually' captures that force slightly better than the flatter 'always' in this sentence.
- source_word: ταμεῖα καρδίας
  chosen: the hidden chambers of the heart
  alternatives:
  - the inner rooms of the heart
  - the secrets of the heart
  lexicon: BDAG
  rationale: ταμεῖα literally refers to inner rooms or store-chambers. A more concrete rendering preserves the metaphor better than the abstract 'secrets,' while 'hidden chambers' remains readable.
- source_word: ἐπίσταται
  chosen: he knows
  alternatives:
  - he understands
  - he is acquainted with
  lexicon: BDAG
  rationale: The verb denotes knowing well or understanding. 'He knows' is the cleanest English equivalent and fits the parallel with God's exhaustive knowledge.
- source_word: πρὸ τοῦ γενέσθαι
  chosen: before they come to be
  alternatives:
  - before they happen
  - before they arise
  lexicon: BDAG
  rationale: The infinitive is somewhat open-ended, referring to things coming into being. 'Before they come to be' keeps the wording broad and close to the Greek, without narrowing it only to events.
