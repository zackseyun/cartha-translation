  rationale: 'Adjudicator-modified: The reviewer is correct that the Greek uses the interrogative pronoun τίς (''who'') with the copula ἐστιν (''is''), literally asking ''who is the hope of the poor and needy?'' The current rendering (''what hope do [they] have'') unnecessarily alters the syntax and obscures the direct identification of the Lord as the personified hope of the marginalized. I am providing the full verse text to ensure a clean replacement.'
