id: PSS.5.13
reference: Psalms of Solomon 5:13
source:
  edition: lxx-swete-1909
  text: τοὺς βασιλεῖς καὶ ἄρχοντας καὶ λαοὺς σὺ τρέφεις, ὁ θεός, καὶ πτωχοῦ καὶ πένητος ἡ ἐλπὶς τίς ἐστιν εἰ μὴ σύ, Κύριε;
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: You feed kings and rulers and peoples, O God; and You sustain kings and rulers and peoples, O God; and who is the hope of the poor and needy, if not you, Lord?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'who is the hope of the poor and needy, if not you, Lord?'
    reason: lexical_alternative
  - marker: b
    text: Or 'You sustain'.
    reason: previous_rendering
  - marker: c
    text: Or 'what hope do the poor and needy have, if not you, Lord?'.
    reason: previous_rendering
lexical_decisions:
- source_word: τρέφεις
  chosen: sustain
  alternatives:
  - nourish
  - feed
  - provide for
  lexicon: LSJ
  rationale: The verb literally relates to feeding or nourishing, but with kings, rulers, and peoples as its objects, 'sustain' best captures broad ongoing provision in natural English without narrowing the sense to physical feeding alone.
- source_word: ἄρχοντας
  chosen: rulers
  alternatives:
  - princes
  - leaders
  lexicon: LSJ
  rationale: '''Rulers'' is the clearest modern rendering for governing authorities and pairs naturally with ''kings'' without importing a more specific hereditary nuance such as ''princes''.'
- source_word: λαοὺς
  chosen: peoples
  alternatives:
  - nations
  - peoples
  lexicon: LSJ
  rationale: The plural points to groups of people broadly rather than merely one populace. 'Peoples' preserves that plurality better than 'nations' here, which could imply political entities more strongly than the Greek requires.
- source_word: πτωχοῦ
  chosen: poor
  alternatives:
  - destitute
  lexicon: LSJ
  rationale: '''Poor'' is the standard, transparent rendering and works naturally in the paired expression with πένητος.'
- source_word: πένητος
  chosen: needy
  alternatives:
  - poor
  - impoverished
  lexicon: LSJ
  rationale: Using 'needy' differentiates πένητος from πτωχοῦ while preserving the overlap in meaning; the pair communicates comprehensive social vulnerability.
- source_word: ἡ ἐλπὶς
  chosen: hope
  alternatives:
  - expectation
  - grounds for hope
  lexicon: LSJ
  rationale: The noun is best kept as 'hope.' Rather than turning it into 'helper' or another interpretive gloss, the translation preserves the psalm's theological claim that the Lord himself is the poor person's hope.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord.' As a direct address to God, this preserves both reverence and consistency with the translation's treatment of the term.
