theological_decisions:
- issue: Direct-object structure of divine provision
  chosen_reading: God is said to sustain not only the lowly but also kings, rulers, and peoples.
  alternative_readings:
  - God physically feeds kings, rulers, and peoples
  rationale: The verse emphasizes God's universal providence across social ranks. 'Sustain' preserves that theological breadth better than a narrower English verb such as 'feed.'
- issue: Force of the final question
  chosen_reading: The line asks what hope the poor and needy have apart from the Lord.
  alternative_readings:
  - The line asks who the hope of the poor and needy is, if not the Lord
  rationale: Greek permits a more literal 'who/what is the hope...?' but English idiom favors 'what hope do they have...?' while preserving the claim that all hope rests in the Lord alone.
