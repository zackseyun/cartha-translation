id: PSS.5.16
reference: Psalms of Solomon 5:16
source:
  edition: lxx-swete-1909
  text: τὸ δὲ δόμα σου πολὺ μετὰ χρηστότητος καὶ πλούσιον, καὶ οὐκ ἔστιν ἡ ἐλπὶς ἐπὶ
    σέ, οὐ φείσεται ἐν δόματι·
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: But your gift is abundant with kindness and rich, and whoever hopes in you
    will not be sparing in giving.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no one whose hope is in you who will be sparing in giving.'
      The Greek is compressed and somewhat elliptical.
    reason: lexical_alternative
lexical_decisions:
- source_word: δόμα
  chosen: gift
  alternatives:
  - giving
  - present
  lexicon: LSJ
  rationale: δόμα denotes a gift or what is given. 'Gift' fits the contrast with human
    sparing generosity in the previous verse and keeps the concrete sense.
- source_word: πολύ
  chosen: abundant
  alternatives:
  - great
  - much
  lexicon: LSJ
  rationale: The adjective stresses largeness or abundance. 'Abundant' fits the generosity
    context better than the flatter 'great' or overly literal 'much.'
- source_word: μετὰ χρηστότητος
  chosen: with kindness
  alternatives:
  - with goodness
  - with generosity
  lexicon: LSJ
  rationale: χρηστότης here describes the gracious quality attending God's gift. 'With
    kindness' is natural English and preserves the benevolent sense.
- source_word: πλούσιον
  chosen: rich
  alternatives:
  - plentiful
  - bountiful
  lexicon: LSJ
  rationale: The Greek literally says 'rich.' Retaining 'rich' keeps the compact poetic
    force, while in context it conveys bounty rather than material wealth alone.
- source_word: ἡ ἐλπὶς ἐπὶ σέ
  chosen: whoever hopes in you
  alternatives:
  - the one whose hope is in you
  - hope in you
  lexicon: LSJ
  rationale: The Greek is elliptical, using 'hope' where English normally supplies
    the person who hopes. 'Whoever hopes in you' makes the sense clear without straying
    far from the source.
- source_word: οὐ φείσεται
  chosen: will not be sparing
  alternatives:
  - will not hold back
  - will not be stingy
  lexicon: LSJ
  rationale: φείδομαι means to spare or hold back. 'Will not be sparing' preserves
    the verbal link with the previous verse's contrast about human limited giving.
- source_word: ἐν δόματι
  chosen: in giving
  alternatives:
  - with a gift
  - in gift-giving
  lexicon: LSJ
  rationale: The prepositional phrase is awkward if rendered woodenly. 'In giving'
    captures the sense of the sphere or act of gift-bestowal in idiomatic English.
