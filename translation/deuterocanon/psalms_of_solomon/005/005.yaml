  from: can receive anything
  to: will take
  rationale: 'The author uses the exact same verb (λήψεται, future indicative) in 5:4 (''take plunder'') and 5:5 to build an a fortiori argument: just as one cannot take from a mighty man by force, no one will take from God''s creation unless He gives it. Translating 5:5 as ''can receive'' breaks this lexical and rhetorical link, and unnecessarily changes the future indicative to a modal. | Adjudicator: The reviewer correctly identifies the rhetorical and lexical link between the preceding line (taking plunder from a mighty man) and this line (taking from God''s creation). Both use the future indicati'
