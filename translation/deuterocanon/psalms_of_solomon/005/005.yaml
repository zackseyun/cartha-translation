id: PSS.5.5
reference: Psalms of Solomon 5:5
source:
  edition: lxx-swete-1909
  text: καὶ τίς λήψεται ἀπὸ πάντων ὧν ἐποίησας, ἐὰν μὴ σὺ δῷς;
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: And who can receive anything from all that you have made, unless you give
    it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take' instead of 'receive' for λήψεται; the context favors receiving
      as granted gift rather than seizing.
    reason: lexical_alternative
lexical_decisions:
- source_word: λήψεται
  chosen: can receive
  alternatives:
  - will receive
  - take
  lexicon: LSJ
  rationale: 'Though formally future middle (''will receive''), in this rhetorical
    question the sense is effectively modal: no one is able to receive anything unless
    God grants it. ''Receive'' fits the gift-context better than the more physical
    ''take''.'
- source_word: ἀπὸ πάντων ὧν ἐποίησας
  chosen: from all that you have made
  alternatives:
  - from all the things you made
  - from everything you created
  lexicon: LSJ
  rationale: This phrase is rendered comprehensively to reflect the totality in πάντων
    while keeping the clause natural in English. 'Made' stays close to ἐποίησας.
- source_word: δῷς
  chosen: give it
  alternatives:
  - grant
  - bestow
  lexicon: LSJ
  rationale: The verb plainly denotes God's act of giving. 'Give it' makes explicit
    in English the implied object required by idiom, without adding new content.
