id: PSS.5.17
reference: Psalms of Solomon 5:17
source:
  edition: lxx-swete-1909
  text: ἐπὶ πᾶσαν τὴν γῆν τὸ ἔλεός σου, Κύριε, ἐν χρηστότητι.
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: Your mercy is over all the earth, Lord, in kindness.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔλεός
  chosen: mercy
  alternatives:
  - steadfast love
  - compassion
  lexicon: BDAG
  rationale: ἔλεος most directly denotes mercy or compassionate mercy. 'Mercy' preserves
    the noun's weight without importing covenantal nuances more explicit in other
    terms such as ḥesed.
- source_word: ἐπὶ πᾶσαν τὴν γῆν
  chosen: over all the earth
  alternatives:
  - upon all the earth
  - throughout all the earth
  lexicon: BDAG
  rationale: With ἐπί and the accusative, the phrase naturally conveys extension over
    the whole earth. 'Over all the earth' is idiomatic English and preserves the broad
    scope.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - O Lord
  lexicon: BDAG
  rationale: DOCTRINE.md gives 'Lord' as the default rendering for κύριος. The vocative
    force is preserved by direct address without requiring the added interjection
    'O'.
- source_word: χρηστότητι
  chosen: kindness
  alternatives:
  - goodness
  - benevolence
  lexicon: BDAG
  rationale: χρηστότης denotes kindness or goodness. 'Kindness' best matches the relational
    tone here and keeps the closing phrase concise and natural.
- source_word: '[implied copula]'
  chosen: is
  alternatives:
  - extends
  - rests
  lexicon: Greek grammar
  rationale: The Greek clause is verbless, so English requires an implied copula.
    'Is' supplies the minimum needed sense without over-interpreting the relationship.
