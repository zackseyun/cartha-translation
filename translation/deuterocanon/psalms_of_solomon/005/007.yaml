id: PSS.5.7
reference: Psalms of Solomon 5:7
source:
  edition: lxx-swete-1909
  text: ἐν τῷ θλίβεσθαι ἡμᾶς ἐπικαλεσόμεθα εἰς βοήθειαν, καὶ σὺ οὐκ ἀποστρέψῃ τὴν
    δέησιν ἡμῶν, ὅτι σὺ ὁ θεὸς ἡμῶν εἶ.
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: When we are afflicted, we will call for help, and you will not turn away our
    plea, for you are our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In our affliction, we will call upon you for help.'
    reason: lexical_alternative
  - marker: b
    text: '''Our plea'' could also be rendered ''our supplication'' or ''our petition.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ θλίβεσθαι ἡμᾶς
  chosen: When we are afflicted
  alternatives:
  - In our affliction
  - When we are oppressed
  - While we are in distress
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is temporal, best rendered naturally
    in English as 'when.' θλίβεσθαι conveys being afflicted or experiencing distress;
    'afflicted' preserves the weight without over-specifying persecution.
- source_word: ἐπικαλεσόμεθα
  chosen: we will call
  alternatives:
  - we will call upon
  - we will invoke
  lexicon: BDAG
  rationale: The future middle here expresses direct appeal to God. 'Call' is natural
    English; the following phrase 'for help' supplies the sense of invocation without
    awkwardness.
- source_word: εἰς βοήθειαν
  chosen: for help
  alternatives:
  - for assistance
  - for aid
  lexicon: BDAG
  rationale: This phrase expresses purpose or result of the calling. 'For help' is
    idiomatic, concise, and preserves the prayer context.
- source_word: οὐκ ἀποστρέψῃ
  chosen: you will not turn away
  alternatives:
  - you will not reject
  - you will not turn aside from
  lexicon: BDAG
  rationale: The verb literally means 'turn away.' Retaining that imagery keeps the
    relational tone of prayer while remaining readable.
- source_word: τὴν δέησιν ἡμῶν
  chosen: our plea
  alternatives:
  - our supplication
  - our petition
  - our prayer
  lexicon: BDAG
  rationale: δέησις is a specific urgent request rather than prayer in general. 'Plea'
    captures the earnestness more clearly for modern readers than 'supplication'.
- source_word: ὅτι σὺ ὁ θεὸς ἡμῶν εἶ
  chosen: for you are our God
  alternatives:
  - because you are our God
  lexicon: BDAG
  rationale: ὅτι gives the ground for confidence in prayer. 'For' fits the elevated
    but readable style of the verse and preserves the causal connection.
