id: PSS.5.12
reference: Psalms of Solomon 5:12
source:
  edition: lxx-swete-1909
  text: καὶ ἐὰν πεινάσωσιν, πρὸς σὲ ἀροῦσιν πρόσωπον αὐτῶν.
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: And if they are hungry, they will lift up their faces to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'lift up their face to you,' a Greek expression for turning to God
      in appeal or dependence.
    reason: cultural_note
lexical_decisions:
- source_word: πεινάσωσιν
  chosen: are hungry
  alternatives:
  - hunger
  - be starving
  lexicon: LSJ
  rationale: 'The aorist subjunctive with ἐὰν gives a general future condition: ''if
    they are hungry.'' ''Are hungry'' is natural English and preserves the condition
    without overstating intensity.'
- source_word: ἀροῦσιν
  chosen: will lift up
  alternatives:
  - will raise
  - will turn
  lexicon: LSJ
  rationale: Future of αἴρω, literally 'lift/raise.' 'Will lift up' preserves the
    concrete verbal image, which fits the prayer/supplication idiom better than the
    more interpretive 'turn.'
- source_word: πρόσωπον αὐτῶν
  chosen: their faces
  alternatives:
  - their face
  - their countenance
  lexicon: LSJ
  rationale: Greek has singular πρόσωπον with a plural possessor, but idiomatic English
    normally uses the plural 'their faces.' This keeps the sense clear while respecting
    the underlying expression.
- source_word: πρὸς σέ
  chosen: to you
  alternatives:
  - toward you
  - before you
  lexicon: LSJ
  rationale: '''To you'' is the most natural English complement with ''lift up their
    faces,'' while still reflecting directional πρὸς.'
