id: PSS.5.2
reference: Psalms of Solomon 5:2
source:
  edition: lxx-swete-1909
  text: ὅτι ἐχρηστὸς καὶ ἐλεήμων ἡ καταφυγὴ τοῦ πτωχοῦ·
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: For the refuge of the poor is kind and merciful.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐχρηστὸς
  chosen: kind
  alternatives:
  - good
  - gracious
  - benevolent
  lexicon: BDAG
  rationale: χρηστός here describes the character of the subject in a relational,
    beneficent sense. “Kind” is natural English and preserves the moral warmth better
    than the broader “good.”
- source_word: ἐλεήμων
  chosen: merciful
  alternatives:
  - compassionate
  - full of mercy
  lexicon: BDAG
  rationale: “Merciful” is the most direct and standard rendering for ἐλεήμων, preserving
    both the lexical sense and the theological weight of showing mercy to the needy.
- source_word: καταφυγὴ
  chosen: refuge
  alternatives:
  - shelter
  - protector
  lexicon: LSJ
  rationale: The noun denotes a place or means of refuge. “Refuge” keeps the metaphor
    intact and is more transparent to the Greek than the more interpretive “protector.”
- source_word: τοῦ πτωχοῦ
  chosen: of the poor
  alternatives:
  - of the needy
  - of the afflicted
  lexicon: BDAG
  rationale: πτωχός commonly denotes the poor or destitute. “Of the poor” is the most
    straightforward rendering and fits the psalmic register well.
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context ὅτι introduces the ground or explanation for the preceding
    statement. “For” preserves that explanatory force in concise literary English.
