id: PSS.5.21
reference: Psalms of Solomon 5:21
source:
  edition: lxx-swete-1909
  text: ηὐφράνθησαν οἱ φοβούμενοι Κύριον ἐν ἀγαθοῖς, καὶ ἡ χρηστότης σου ἐπʼ Ἰσραὴλ τῇ βασιλείᾳ σου.
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: Those who fear the Lord rejoiced in good things, and your goodness is upon Israel in your kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were made glad in blessings.'
    reason: lexical_alternative
  - marker: b
    text: '''Israel, your kingdom'' may identify Israel as the people or realm belonging to God; alternatively, the phrase may be understood as ''for Israel, your kingdom.'''
    reason: alternative_reading
  - marker: c
    text: Or 'upon Israel, your kingdom'.
    reason: previous_rendering
lexical_decisions:
- source_word: ηὐφράνθησαν
  chosen: rejoiced
  alternatives:
  - were gladdened
  - were made glad
  lexicon: LSJ
  rationale: The aorist passive denotes being gladdened, but idiomatic English expresses the result well with 'rejoiced' while preserving the positive, celebratory sense.
- source_word: οἱ φοβούμενοι
  chosen: those who fear
  alternatives:
  - those fearing
  - the ones who fear
  lexicon: LSJ
  rationale: The substantival participle refers to a class of people characterized by reverence toward God; 'those who fear' is natural and transparent.
- source_word: Κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: This follows the project's default rendering for κύριος as a divine title.
- source_word: ἐν ἀγαθοῖς
  chosen: in good things
  alternatives:
  - with good things
  - amid blessings
  lexicon: LSJ
  rationale: The phrase is broad and concrete rather than explicitly theological; 'in good things' preserves the Greek wording without over-interpreting it as 'blessings,' though that is a plausible sense.
- source_word: χρηστότης
  chosen: goodness
  alternatives:
  - kindness
  - benevolence
  lexicon: LSJ
  rationale: '''Goodness'' best matches the broad moral-beneficent sense here and keeps the statement suitably elevated without narrowing it to mere friendliness.'
- source_word: ἐπʼ Ἰσραήλ
  chosen: upon Israel
  alternatives:
  - over Israel
  - for Israel
  lexicon: LSJ
  rationale: ἐπί with the accusative commonly conveys motion or extension onto/upon; here 'upon Israel' naturally expresses divine favor resting on Israel.
- source_word: τῇ βασιλείᾳ σου
  chosen: your kingdom
  alternatives:
  - your reign
  - the kingdom that is yours
  lexicon: LSJ
  rationale: The phrase is rendered appositionally with 'Israel,' yielding 'Israel, your kingdom.' This preserves the likely identification of Israel as the realm belonging to God without adding explanatory wording to the main text.
