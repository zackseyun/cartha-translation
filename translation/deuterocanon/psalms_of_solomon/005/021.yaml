  from: upon Israel, your kingdom
  to: upon Israel in your kingdom
  rationale: The draft treats 'your kingdom' as in apposition to 'Israel'. However, 'Israel' is accusative (the object of the preposition ἐπί), while τῇ βασιλείᾳ σου is dative. The cases do not agree, making apposition grammatically impossible. The dative here indicates sphere or location (likely reflecting a Hebrew בְּ), meaning 'in your kingdom.'
