id: PSS.5.14
reference: Psalms of Solomon 5:14
source:
  edition: lxx-swete-1909
  text: καὶ σὺ ἐπακούσῃ, ὅτι τίς χρηστὸς καὶ ἐπιεικὴς ἀλλʼ ἢ σύ, εὐφρᾶναι ψυχὴν ταπεινὸν
    ἐν τῷ ἀνοῖξαι χεῖρά σου ἐν ἐλέει.
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: And you will hear, for who is kind and gentle but you, to gladden the soul
    of the humble when you open your hand in mercy?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will hear favorably' or 'you will answer'; the verb can imply responsive
      hearing, especially in prayer.
    reason: lexical_alternative
  - marker: b
    text: '''Open your hand'' is an idiom for generous giving or provision.'
    reason: cultural_note
  - marker: c
    text: Or 'making glad a humble soul'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπακούσῃ
  chosen: you will hear
  alternatives:
  - you will listen
  - you will answer
  - you will hear favorably
  lexicon: LSJ
  rationale: ἐπακούω commonly carries the sense of hearing attentively or favorably.
    'You will hear' keeps the wording natural in English while still allowing the
    implied sense of responsive hearing in prayer.
- source_word: χρηστός
  chosen: kind
  alternatives:
  - good
  - benevolent
  lexicon: LSJ
  rationale: '''Kind'' best captures the personal, beneficent quality in this praise
    context without sounding overly abstract.'
- source_word: ἐπιεικής
  chosen: gentle
  alternatives:
  - forbearing
  - gracious
  - lenient
  lexicon: LSJ
  rationale: '''Gentle'' pairs naturally with ''kind'' and reflects restrained, compassionate
    mildness.'
- source_word: εὐφρᾶναι
  chosen: making glad
  alternatives:
  - to gladden
  - to cheer
  - to bring joy to
  lexicon: LSJ
  rationale: The infinitive expresses the result or characteristic action attributed
    to God. 'Making glad' preserves that sense in readable English.
- source_word: ψυχὴν
  chosen: soul
  alternatives:
  - life
  - inner being
  lexicon: LSJ
  rationale: '''Soul'' fits the devotional and poetic register here better than flatter
    alternatives such as ''life'' or ''self.'''
- source_word: ταπεινὸν
  chosen: humble
  alternatives:
  - lowly
  - afflicted
  lexicon: LSJ
  rationale: '''Humble'' best conveys lowliness before God in this context. ''Afflicted''
    is possible by implication, but the Greek more directly points to lowliness/humility.'
- source_word: ἐν τῷ ἀνοῖξαι χεῖρά σου
  chosen: when you open your hand
  alternatives:
  - by opening your hand
  lexicon: LSJ
  rationale: This preserves the vivid Hebrew-like idiom of generous provision while
    remaining idiomatic English.
- source_word: ἐν ἐλέει
  chosen: in mercy
  alternatives:
  - mercifully
  - with mercy
  lexicon: LSJ
  rationale: '''In mercy'' stays close to the prepositional phrasing of the Greek
    and matches the elevated poetic tone.'
