id: PSS.5.1
reference: Psalms of Solomon 5:1
source:
  edition: lxx-swete-1909
  text: Κύριε ὁ θεός, αἰνέσω τῷ ὀνόματί σου ἐν ἀγαλλιάσει, ἐν μέσῳ ἐπισταμένων τὰ
    κρίματά σου τὰ δίκαια.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: O Lord God, I will praise your name with exultation, in the midst of those
    who know your righteous judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among those who understand your just judgments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος used as a divine address; 'Lord' follows the project's
    default rendering and fits prayer language naturally in English.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: 'Appositional divine title following the vocative address; rendered straightforwardly
    as ''God'' in direct address: ''O Lord God.'''
- source_word: αἰνέσω
  chosen: I will praise
  alternatives:
  - I shall praise
  lexicon: BDAG
  rationale: Future verb expressing the speaker's resolve or declaration; 'I will
    praise' is natural modern English and preserves the forward-looking force.
- source_word: τῷ ὀνόματί σου
  chosen: your name
  lexicon: BDAG
  rationale: Standard biblical idiom for God's revealed person and reputation; a literal
    rendering is clear and appropriate.
- source_word: ἐν ἀγαλλιάσει
  chosen: with exultation
  alternatives:
  - with rejoicing
  - in exultation
  lexicon: BDAG
  rationale: The phrase expresses joyful, celebratory manner. 'With exultation' preserves
    the elevated tone without becoming archaic.
- source_word: ἐν μέσῳ
  chosen: in the midst of
  alternatives:
  - among
  lexicon: BDAG
  rationale: A fairly literal rendering that preserves the communal setting of the
    praise.
- source_word: ἐπισταμένων
  chosen: those who know
  alternatives:
  - those who understand
  - those acquainted with
  lexicon: BDAG
  rationale: Best taken as the genitive plural participle of ἐπίσταμαι, 'to know,
    understand, be acquainted with.' 'Those who know' is concise and natural.
- source_word: τὰ κρίματά σου
  chosen: your judgments
  alternatives:
  - your decrees
  - your judgments of justice
  lexicon: BDAG
  rationale: κρίματα here most naturally refers to God's judicial decisions or acts
    of judgment. 'Judgments' preserves the semantic range and biblical register.
- source_word: τὰ δίκαια
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: Adjectival modifier of κρίματα. 'Righteous' better preserves the moral-theological
    nuance than the somewhat narrower 'just,' though both are possible.
