id: PSS.5.3
reference: Psalms of Solomon 5:3
source:
  edition: lxx-swete-1909
  text: ἐὰν δὲ κεκραγέναι με πρὸς σὲ μὴ παρασιωπήσῃς ἀπʼ ἐμοῦ.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: But if I cry out to you, do not be silent to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “if I have cried out to you, do not pass over me in
      silence.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: BDAG
  rationale: Keeps the conditional force of ἐὰν and the mildly adversative/connective
    force of δέ. “But if” reads naturally in English and preserves the turn in the
    prayer.
- source_word: κεκραγέναι
  chosen: I cry out
  alternatives:
  - I have cried out
  - I should cry out
  lexicon: BDAG
  rationale: Although κεκραγέναι is formally a perfect infinitive of κράζω, in this
    compressed prayer context it functions with με as an accusative subject in a conditional
    appeal. English normally requires a finite verb here. “I cry out” best captures
    the sense without importing an awkwardly completed aspect that English would overemphasize.
- source_word: με
  chosen: I
  alternatives:
  - me
  lexicon: BDAG
  rationale: With the infinitival construction, με serves as the subject of the infinitive
    in Greek; idiomatic English therefore renders it as the finite subject “I.”
- source_word: πρὸς σέ
  chosen: to you
  alternatives:
  - toward you
  lexicon: BDAG
  rationale: In a prayer context, πρὸς with a personal object is most naturally rendered
    “to you.”
- source_word: μὴ παρασιωπήσῃς
  chosen: do not be silent
  alternatives:
  - do not ignore
  - do not pass over in silence
  lexicon: BDAG
  rationale: The verb literally carries the idea of keeping silent or passing something
    over in silence. “Do not be silent” preserves the prayerful, relational tone and
    stays closer to the Greek than the more interpretive “do not ignore.”
- source_word: ἀπʼ ἐμοῦ
  chosen: toward me
  alternatives:
  - from me
  - about me
  lexicon: BDAG
  rationale: A hyper-literal “from me” is awkward in English here. In context the
    phrase expresses the direction of God's silence with reference to the speaker,
    so “toward me” communicates the sense clearly while remaining close to the source.
