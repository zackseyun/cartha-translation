id: PSS.5.9
reference: Psalms of Solomon 5:9
source:
  edition: lxx-swete-1909
  text: καὶ ἐὰν μὴ ἐπιστρέψῃς ἡμᾶς, οὐκ ἀφεξόμεθα, ἀλλʼ ἐπὶ σὲ ἥξομεν
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: And if you do not restore us, we will not keep away, but we will come to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'restore us' or 'turn us back.'
    reason: lexical_alternative
  - marker: b
    text: Or 'we will not refrain' or 'we will not keep away.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And if you do not bring us back, we will not stay away; rather, we will come to you.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐὰν μὴ
  chosen: if ... not
  alternatives:
  - unless
  lexicon: BDAG
  rationale: The conditional particle with negation is best represented as a straightforward condition, preserving the verse's direct appeal without overcompressing it into 'unless.'
- source_word: ἐπιστρέψῃς
  chosen: bring ... back
  alternatives:
  - turn back
  - restore
  - convert
  lexicon: BDAG
  rationale: The verb ἐπιστρέφω commonly means to turn back or return. With ἡμᾶς as object and God as subject, 'bring us back' preserves the directional force more transparently than the more interpretive 'restore' or the more theologically loaded 'convert.'
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Direct object of ἐπιστρέψῃς; no contextual reason to expand beyond the plain first-person plural.
- source_word: οὐκ ἀφεξόμεθα
  chosen: we will not stay away
  alternatives:
  - we will not refrain
  - we will not hold back
  - we will not keep away
  lexicon: LSJ
  rationale: The future middle conveys not withdrawing or keeping one's distance. 'Stay away' is natural modern English and fits the following contrast with 'we will come to you.'
- source_word: ἀλλʼ
  chosen: rather
  alternatives:
  - but
  lexicon: BDAG
  rationale: The adversative marks a deliberate contrast. 'Rather' makes the rhetorical turn slightly clearer in English while remaining faithful to the Greek.
- source_word: ἐπὶ σὲ ἥξομεν
  chosen: we will come to you
  alternatives:
  - we will go to you
  - we will approach you
  lexicon: BDAG
  rationale: ἥκω here expresses arrival or coming. 'Come to you' is idiomatic and preserves the personal, relational force of the appeal.
