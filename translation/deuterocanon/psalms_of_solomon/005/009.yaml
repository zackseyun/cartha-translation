theological_decisions:
- issue: Whether ἐπιστρέψῃς should be rendered with explicitly conversion-oriented language
  chosen_reading: bring us back
  alternative_readings:
  - restore us
  - turn us back
  - convert us
  rationale: The verse addresses God in petition, but the Greek itself does not require an explicitly doctrinal notion of conversion. 'Bring us back' preserves the return motif without importing more theological specificity than the wording warrants.
  doctrine_reference: Preserve theological tension rather than resolve it.
