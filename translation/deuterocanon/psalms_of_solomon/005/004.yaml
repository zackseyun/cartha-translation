  from: For he will not take plunder from a mighty man.
  to: For no one will take plunder from a mighty man.
  rationale: The third-person singular verb `λήψεται` lacks an explicit subject and functions here as an indefinite ('one' / 'no one'), setting up a proverbial analogy for the next verse (you cannot take from God by force; you only receive what He gives). Translating it as 'he' creates a confusing dangling pronoun in English, as there is no logical masculine singular antecedent in the preceding verses.
