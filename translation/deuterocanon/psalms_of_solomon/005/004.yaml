id: PSS.5.4
reference: Psalms of Solomon 5:4
source:
  edition: lxx-swete-1909
  text: οὐ γὰρ λήψεται σκῦλα παρὰ ἀνδρὸς δυνατοῦ·
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: For no one will take plunder from a mighty man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoils' instead of 'plunder.'
    reason: lexical_alternative
  - marker: b
    text: Or 'For he will not take plunder from a mighty man.'.
    reason: previous_rendering
lexical_decisions:
- source_word: λήψεται
  chosen: will take
  alternatives:
  - will receive
  - will seize
  lexicon: BDAG
  rationale: Future form of λαμβάνω; in this context of acquiring spoil, 'will take' is the most natural and direct English rendering.
- source_word: σκῦλα
  chosen: plunder
  alternatives:
  - spoils
  - booty
  lexicon: BDAG
  rationale: The noun refers to goods taken as spoil. 'Plunder' is clear modern English and avoids the archaic feel of 'booty'; 'spoils' remains a viable alternative.
- source_word: παρὰ
  chosen: from
  alternatives:
  - from the hand of
  - from beside
  lexicon: BDAG
  rationale: With the genitive here, παρά marks source or origin; simple 'from' best matches the sense without overtranslating.
- source_word: ἀνδρὸς δυνατοῦ
  chosen: a mighty man
  alternatives:
  - a strong man
  - a powerful man
  lexicon: BDAG
  rationale: ἀνήρ is specifically 'man,' and δυνατός denotes strength or power. 'Mighty man' preserves both the masculine singular and the sense of strength in concise English.
