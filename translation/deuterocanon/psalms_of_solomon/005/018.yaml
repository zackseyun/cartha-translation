theological_decisions:
- issue: Force of αὐταρκίας in relation to God
  chosen_reading: The phrase refers to God granting enough in due measure.
  alternative_readings:
  - The phrase emphasizes inward contentment
  - The phrase more literally suggests self-sufficiency
  rationale: Because God is the acting subject, an English rendering that sounds like
    human independence would mislead. 'Measured sufficiency' preserves the idea of
    adequacy while keeping divine provision central.
