id: PSS.5.18
reference: Psalms of Solomon 5:18
source:
  edition: lxx-swete-1909
  text: μακάριος οὗ μνημονεύει ὁ θεὸς ἐν συμμετρίᾳ αὐταρκίας·
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: Blessed is the one whom God remembers with measured sufficiency.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed is he of whom God is mindful in due measure of contentment.'
    reason: lexical_alternative
  - marker: b
    text: αὐταρκία can also mean 'contentment' or, more literally, 'self-sufficiency.'
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: LSJ
  rationale: μακάριος is the standard beatitude term. 'Blessed' preserves the psalmic
    and theological register better than the flatter 'happy' or 'fortunate.'
- source_word: οὗ
  chosen: the one whom
  alternatives:
  - he whom
  - the one of whom
  lexicon: Greek grammar
  rationale: The genitive relative pronoun is governed by μνημονεύει ('remember, be
    mindful of'). 'The one whom' gives natural English while preserving the personal
    reference.
- source_word: μνημονεύει
  chosen: remembers
  alternatives:
  - is mindful of
  - keeps in mind
  lexicon: LSJ
  rationale: μνημονεύω commonly takes the sense 'remember' or 'be mindful of.' 'Remembers'
    is concise and natural, while still allowing the covenantal nuance of caring remembrance.
- source_word: ἐν συμμετρίᾳ
  chosen: with measured
  alternatives:
  - in due measure
  - with moderation
  - proportionately
  lexicon: LSJ
  rationale: συμμετρία denotes proportion, due measure, or moderation. 'With measured'
    conveys that God's provision is fitting rather than excessive, and reads more
    naturally in English when paired with 'sufficiency.'
- source_word: αὐταρκίας
  chosen: sufficiency
  alternatives:
  - contentment
  - self-sufficiency
  - having enough
  lexicon: LSJ
  rationale: αὐτάρκεια can denote self-sufficiency, adequacy, or contentment. In this
    context of divine remembrance and provision, 'sufficiency' best captures the sense
    of having enough from God without suggesting independent autonomy.
