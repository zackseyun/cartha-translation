theological_decisions:
- issue: Whether the saying should be made more interpretive by rendering surplus
    as greed or covetousness
  chosen_reading: 'Retain the broader statement about excess: "If a man has an excess,
    he sins."'
  alternative_readings:
  - If a man has too much, he sins.
  - If a man abounds excessively, he sins.
  rationale: The Greek text itself states excess and sin without explicitly naming
    greed as an inner motive. The translation preserves that moral tension rather
    than narrowing it.
  doctrine_reference: Preserve theological tension rather than resolve it.
