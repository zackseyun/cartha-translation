id: PSS.5.19
reference: Psalms of Solomon 5:19
source:
  edition: lxx-swete-1909
  text: ἐὰν ὑπερπλεονάσῃ ὁ ἄνθρωπος, ἐξαμαρτάνει·
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: If a man has an abundance, he sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "If a man has too much, he sins."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  chosen: If
  alternatives:
  - whenever
  - if ever
  lexicon: BDAG
  rationale: Introduces a conditional clause. "If" is the most natural English equivalent
    here without adding iterative nuance not required by the text.
- source_word: ὑπερπλεονάσῃ
  chosen: has an excess
  alternatives:
  - abounds excessively
  - has too much
  - overflows
  lexicon: LSJ
  rationale: The verb conveys exceeding due measure or having more than enough. "Has
    an excess" preserves the idea of surplus without paraphrasing into a more interpretive
    moral category such as greed.
- source_word: ὁ ἄνθρωπος
  chosen: a man
  alternatives:
  - the man
  - a person
  - man
  lexicon: BDAG
  rationale: Although the Greek has the article, in a conditional maxim English commonly
    uses an indefinite singular. "A man" preserves the masculine generic force of
    ἄνθρωπος in keeping with the project's gender-accurate policy.
- source_word: ἐξαμαρτάνει
  chosen: sins
  alternatives:
  - commits sin
  - goes wrong
  - misses the mark
  lexicon: BDAG
  rationale: The verb intensifies ἁμαρτάνω but in context the plain moral sense is
    best conveyed by "sins." More wooden renderings add awkwardness without improving
    transparency.
