  text: τὰ πετεινὰ καὶ τοὺς ἰχθύας σὺ τρέφεις, ἐν τῷ διδόναι σὲ ὑετὸν ἐρήμοις εἰς
    ἀνατολὴν χλόης, ἑτοιμάσαι χορτάσματα ἐν ἐρήμῳ παντὶ ζῶντι·
