translation:
  text: 'submit_verse_draft({"english_text":"You feed the birds and the fish by giving
    rain to the wastelands for the sprouting of grass, preparing food in the wilderness
    for every living thing.","translation_philosophy":"optimal-equivalence","lexical_decisions":[{"source_word":"πετεινὰ","chosen":"birds","alternatives":["flying
    creatures","birds of the air"],"lexicon":"LSJ","entry":null,"rationale":"The noun
    refers broadly to birds. ''Birds'' is the natural English equivalent here and
    keeps the line concise without adding imagery not present in the Greek."},{"source_word":"τρέφεις","chosen":"feed","alternatives":["nourish","sustain"],"lexicon":"BDAG","entry":null,"rationale":"τρέφω
    denotes providing nourishment. ''Feed'' is the most direct rendering and fits
    the concrete providential imagery of the verse."},{"source_word":"ἐν τῷ διδόναι
    σὲ","chosen":"by giving","alternatives":["when you give"],"lexicon":"BDAG","entry":null,"rationale":"The
    articular infinitive can be rendered temporally or instrumentally. Here the sense
    is best taken as means: God feeds creatures by giving rain, so ''by giving'' expresses
    the connection most clearly in English."},{"source_word":"ἐρήμοις / ἐν ἐρήμῳ","chosen":"the
    wastelands / the wilderness","alternatives":["desert places","desolate places"],"lexicon":"LSJ","entry":null,"rationale":"The
    Greek points to barren or desert regions. ''Wastelands'' and ''wilderness'' preserve
    that imagery while sounding natural in modern English."},{"source_word":"εἰς ἀνατολὴν
    χλόης","chosen":"for the sprouting of grass","alternatives":["for the growth of
    grass","for the rising of grass"],"lexicon":"LSJ","entry":null,"rationale":"ἀνατολή
    literally means ''rising,'' but with χλόη the sense is vegetation springing up.
    ''Sprouting of grass'' conveys the image clearly without wooden phrasing."},{"source_word":"χορτάσματα","chosen":"food","alternatives":["fodder","pasture
    plants"],"lexicon":"LSJ","entry":null,"rationale":"The noun refers to what serves
    as fodder or nourishment. ''Food'' broadens slightly for natural English because
    the verse speaks of provision for every living thing, not livestock alone."},{"source_word":"παντὶ
    ζῶντι","chosen":"every living thing","alternatives":["every living creature","all
    that lives"],"lexicon":"BDAG","entry":null,"rationale":"The phrase is comprehensive
    and refers to living creatures generally. ''Every living thing'' is clear, faithful,
    and fits the verse''s scope of divine care."}],"footnotes":[{"marker":"a","text":"Or
    ''when you give rain to the wastelands''; the Greek construction may be taken
    temporally rather than instrumentally.","reason":"lexical_alternative"},{"marker":"b","text":"Greek
    literally says ''for the rising of grass''; the sense is grass springing up.","reason":"lexical_alternative"}]})'
