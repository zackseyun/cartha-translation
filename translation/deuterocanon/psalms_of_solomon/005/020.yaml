theological_decisions:
- issue: Rendering δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: DOCTRINE.md gives 'righteousness' as the default, with 'justice' preserved
    where context warrants. In this wisdom-like statement about modest provision and
    divine blessing, the moral-religious sense is primary rather than judicial or
    social equity alone.
