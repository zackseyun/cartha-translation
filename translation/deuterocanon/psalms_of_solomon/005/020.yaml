id: PSS.5.20
reference: Psalms of Solomon 5:20
source:
  edition: lxx-swete-1909
  text: ἱκανὸν τὸ μέτριον ἐν δικαιοσύνῃ, καὶ ἐν τούτῳ ἡ εὐλογία Κυρίου, εἰς πλησμονὴν
    ἐν δικαιοσύνῃ.
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: Enough is a modest portion with righteousness, and in this is the Lord’s blessing—abundance
    in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Enough is moderation with righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness' in both occurrences of the Greek term.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱκανὸν
  chosen: Enough
  alternatives:
  - Sufficient
  - Adequate
  lexicon: BDAG
  rationale: Used predicatively at the head of the clause to express sufficiency.
    'Enough' is natural English and preserves the proverb-like force better than the
    more clinical 'adequate'.
- source_word: τὸ μέτριον
  chosen: a modest portion
  alternatives:
  - the moderate thing
  - moderation
  - what is moderate
  lexicon: LSJ
  rationale: The neuter substantive points to what is measured or moderate. 'A modest
    portion' captures the concrete sense in context of material sufficiency without
    over-abstracting to 'moderation' alone.
- source_word: ἐν δικαιοσύνῃ
  chosen: with righteousness
  alternatives:
  - in righteousness
  - with justice
  lexicon: BDAG
  rationale: Here the phrase qualifies the modest portion as possessed or enjoyed
    in a righteous manner. 'With righteousness' reads more idiomatically in English,
    while preserving the key term δικαιοσύνη. 'Justice' is possible lexically, but
    'righteousness' fits the moral-religious sense best in this wisdom-style line.
- source_word: εὐλογία
  chosen: blessing
  alternatives:
  - favor
  - benediction
  lexicon: BDAG
  rationale: Standard rendering that preserves the covenantal-religious sense of divine
    beneficence.
- source_word: Κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: DOCTRINE.md specifies κύριος as 'Lord.' The possessive form is smoother
    in English while remaining fully transparent to the genitive construction.
- source_word: εἰς πλησμονὴν
  chosen: abundance
  alternatives:
  - for fullness
  - unto plenty
  lexicon: LSJ
  rationale: The phrase expresses resultant fullness or plenty. 'Abundance' is concise,
    idiomatic, and preserves the sense of plentiful increase.
- source_word: ἐν δικαιοσύνῃ
  chosen: in righteousness
  alternatives:
  - with righteousness
  - in justice
  lexicon: BDAG
  rationale: In the final phrase, retaining 'in righteousness' better conveys the
    sphere or manner of that abundance. Repeating the key term also preserves the
    Greek emphasis.
