id: PSS.5.22
reference: Psalms of Solomon 5:22
source:
  edition: lxx-swete-1909
  text: εὐλογημένη ἡ δόξα Κυρίου, ὅτι αὐτὸς βασιλεὺς ἡμῶν.
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: Blessed be the glory of the Lord, for he himself is our king.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογημένη
  chosen: Blessed be
  alternatives:
  - Blessed
  - Praised be
  lexicon: BDAG
  rationale: The adjective functions in a doxological blessing formula with an implied
    copula; 'Blessed be' gives natural English while preserving the benedictory force
    better than a flat adjectival 'Blessed.'
- source_word: δόξα
  chosen: glory
  alternatives:
  - majesty
  - honor
  lexicon: BDAG
  rationale: '''Glory'' is the most direct and theologically established rendering,
    fitting both divine splendor and praise language here.'
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: The source is Greek κύριος, and the project's default rendering is 'Lord.'
    Small caps 'LORD' are reserved for the Hebrew divine name.
- source_word: ὅτι
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: '''For'' preserves the explanatory force in smoother English doxological
    style, while still conveying the causal sense.'
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - he alone
  lexicon: BDAG
  rationale: The pronoun is intensive, so 'he himself' preserves the emphasis without
    adding exclusivity beyond the Greek.
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - ruler
  lexicon: BDAG
  rationale: '''King'' is the plain and primary sense, matching the royal confession
    of the clause.'
