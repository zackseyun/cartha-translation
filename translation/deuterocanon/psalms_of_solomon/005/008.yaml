id: PSS.5.8
reference: Psalms of Solomon 5:8
source:
  edition: lxx-swete-1909
  text: μὴ βαρύνῃς τὴν χεῖρά σου ἐφʼ ἡμᾶς, ἵνα μὴ διʼ ἀνάγκην ἁμάρτωμεν.
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: Do not make your hand heavy upon us, lest we sin under compulsion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not burden your hand upon us, lest we sin by necessity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βαρύνῃς
  chosen: lay ... heavily
  alternatives:
  - weigh down
  - burden
  - press heavily
  lexicon: BDAG
  rationale: The verb literally conveys making something heavy. In English, 'lay your
    hand heavily upon us' preserves the idiom's force and reads naturally, expressing
    oppressive pressure without over-paraphrasing.
- source_word: χεῖρά
  chosen: hand
  alternatives:
  - power
  - stroke
  lexicon: BDAG
  rationale: The Greek uses 'hand' concretely, and in biblical usage it commonly signifies
    exerted power or affliction. Retaining 'hand' preserves the source image while
    remaining clear in English.
- source_word: ἐφʼ ἡμᾶς
  chosen: upon us
  alternatives:
  - against us
  - on us
  lexicon: BDAG
  rationale: '''Upon us'' fits the physical metaphor of the hand resting heavily and
    avoids prematurely narrowing the sense to hostility alone.'
- source_word: ἵνα μὴ
  chosen: so that ... not
  alternatives:
  - lest
  - in order that ... not
  lexicon: BDAG
  rationale: This clause expresses intended result or purpose. 'So that we may not'
    is natural modern English and preserves the dependence on the preceding plea.
- source_word: διʼ ἀνάγκην
  chosen: under compulsion
  alternatives:
  - by necessity
  - out of necessity
  - under pressure
  lexicon: BDAG
  rationale: The phrase denotes constraint or necessity. 'Under compulsion' best captures
    the idea that severe pressure might drive the speakers into sin, while remaining
    readable and close to the Greek sense.
- source_word: ἁμάρτωμεν
  chosen: we may not sin
  alternatives:
  - we should not sin
  - we might not sin
  lexicon: BDAG
  rationale: The aorist subjunctive after ἵνα μὴ is well represented by 'we may not
    sin' in English, preserving both the verbal idea and the clause's dependency.
