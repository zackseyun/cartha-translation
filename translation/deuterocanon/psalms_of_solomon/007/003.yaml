id: PSS.7.3
reference: Psalms of Solomon 7:3
source:
  edition: lxx-swete-1909
  text: σὺ ἐν θελήματί σου παιδεύσον ἡμᾶς, καὶ μὴ δῷς ἔθνεσιν.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: Discipline us yourself according to your will, and do not give us over to the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chasten us' or 'train us.' The Greek verb includes both correction and formative instruction.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'do not give to the nations,' with 'us' implied by context.
    reason: lexical_alternative
  - marker: c
    text: Or 'You, according to your will, discipline us'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐν θελήματί σου
  chosen: according to your will
  alternatives:
  - in your will
  - by your will
  lexicon: BDAG
  rationale: The prepositional phrase expresses accordance with God's will more naturally in English than a strictly literal 'in your will,' while preserving the source sense.
- source_word: παιδεύσον
  chosen: discipline
  alternatives:
  - chasten
  - train
  - instruct
  lexicon: BDAG
  rationale: παιδεύω can include correction, training, and chastening. 'Discipline' best preserves both corrective and formative force in readable modern English.
- source_word: δῷς
  chosen: give us over
  alternatives:
  - give
  - hand over
  - deliver
  lexicon: BDAG
  rationale: Although the verb is simply 'give,' English idiom in this context calls for 'give over' to express being surrendered into another's power. The object 'us' is implied from context and required in English.
- source_word: ἔθνεσιν
  chosen: the nations
  alternatives:
  - Gentiles
  - the heathen
  lexicon: BDAG
  rationale: In this Jewish prayer context, ἔθνη refers to foreign nations. 'The nations' is more transparent and less interpretively narrowed than 'Gentiles,' while avoiding archaic 'heathen'.
