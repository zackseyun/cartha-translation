  from: You, according to your will, discipline us
  to: Discipline us yourself according to your will
  rationale: The Greek `παιδεύσον` is an aorist imperative, but the English phrasing 'You... discipline us' reads naturally as a present indicative statement. Translating the emphatic `σὺ` as 'yourself' clarifies the imperative force while preserving the contrast (God's discipline vs. being handed over to the nations).
