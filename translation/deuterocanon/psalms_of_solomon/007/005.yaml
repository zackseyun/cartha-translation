id: PSS.7.5
reference: Psalms of Solomon 7:5
source:
  edition: lxx-swete-1909
  text: ἐν τῷ κατασκηνοῦν τὸ ὄνομά σου ἐν μέσῳ ἡμῶν ἐλεηθησόμεθα,
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: When your name dwells in our midst, we will be shown mercy,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'When your name tabernacles among us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ κατασκηνοῦν
  chosen: When ... dwells
  alternatives:
  - in the dwelling of
  - when ... tabernacles
  - as ... dwells
  lexicon: BDAG
  rationale: Taken as an articular infinitive with ἐν expressing time, a common Greek
    construction meaning 'when' or 'as.' 'Dwells' gives clear modern English while
    preserving the imagery of divine presence.
- source_word: κατασκηνοῦν
  chosen: dwells
  alternatives:
  - tabernacles
  - takes up residence
  lexicon: BDAG
  rationale: The verb carries the sense of dwelling or pitching a tent. 'Dwells' is
    the best optimal-equivalence choice in the main text; 'tabernacles' is more formally
    vivid but less natural in contemporary English.
- source_word: τὸ ὄνομά σου
  chosen: your name
  alternatives:
  - you
  - your presence
  lexicon: BDAG
  rationale: Retained literally as 'your name,' since in biblical usage it can denote
    God's manifested presence or reputation. Rendering it more interpretively as 'your
    presence' would over-resolve the metaphor.
- source_word: ἐν μέσῳ ἡμῶν
  chosen: in our midst
  alternatives:
  - among us
  - in the midst of us
  lexicon: BDAG
  rationale: '''In our midst'' is a natural English equivalent that preserves the
    solemn, communal sense of divine nearness.'
- source_word: ἐλεηθησόμεθα
  chosen: we will be shown mercy
  alternatives:
  - we will receive mercy
  - we will be pitied
  lexicon: BDAG
  rationale: The future passive is preserved explicitly with 'be shown mercy.' This
    is both accurate and idiomatic, and avoids the weaker emotional coloring of 'pitied.'
