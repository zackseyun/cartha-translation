id: PSS.7.4
reference: Psalms of Solomon 7:4
source:
  edition: lxx-swete-1909
  text: ἐὰν γὰρ ἀποστείλῃς θάνατον, σὺ ἐντελῇ αὐτῷ περὶ ἡμῶν· ὅτι σὺ ἐλεήμων, καὶ
    οὐκ ὀργισθήσῃ τοῦ συντελέσαι ἡμᾶς.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: For if you send death, you will command him concerning us; for you are merciful,
    and you will not be angry enough to bring us to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will not be angry to destroy us utterly.'
    reason: lexical_alternative
  - marker: b
    text: The Greek personifies death with the masculine pronoun 'him.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀποστείλῃς
  chosen: send
  alternatives:
  - dispatch
  lexicon: BDAG
  rationale: The verb plainly means 'send' here. 'Dispatch' is possible in English
    but sounds more idiomatic than the Greek requires.
- source_word: θάνατον
  chosen: death
  lexicon: BDAG
  rationale: Kept as 'death' rather than an abstract paraphrase. The following masculine
    pronoun personifies death, which the English preserves with 'him'.
- source_word: ἐντελῇ
  chosen: will command
  alternatives:
  - will give orders
  - will instruct
  lexicon: BDAG
  rationale: This future verb conveys giving a charge or command. 'Will command' is
    concise and preserves the authority implied in the Greek.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - it
  lexicon: BDAG
  rationale: The Greek uses a masculine pronoun referring back to 'death,' treating
    death in personal terms. Preserving 'him' keeps that personification visible.
- source_word: περὶ ἡμῶν
  chosen: concerning us
  alternatives:
  - about us
  - with regard to us
  lexicon: BDAG
  rationale: A fairly literal rendering that preserves the sense that God gives death
    instructions regarding the psalmist's people.
- source_word: ἐλεήμων
  chosen: merciful
  alternatives:
  - compassionate
  lexicon: BDAG
  rationale: '''Merciful'' is the most direct and biblically natural equivalent, fitting
    both the immediate context and broader theological diction.'
- source_word: ὀργισθήσῃ
  chosen: will not be angry enough
  alternatives:
  - will not become angry
  - will not be wrathful
  lexicon: BDAG
  rationale: The clause leads into an infinitive expressing destructive outcome. 'Will
    not be angry enough' makes explicit in natural English that God's anger will not
    proceed to total destruction.
- source_word: τοῦ συντελέσαι ἡμᾶς
  chosen: to bring us to an end
  alternatives:
  - to destroy us utterly
  - to consume us completely
  lexicon: BDAG
  rationale: συντελέω here carries the sense of finishing off or bringing to complete
    end. 'Bring us to an end' is clear modern English and avoids overstatement beyond
    the Greek, while still conveying totality.
