  from: death, you will command him concerning us; for you are merciful, and you will
    not be angry enough to
  to: pestilence, you will command it concerning us; for you are merciful, and you
    will not be angry so as to
  rationale: In LXX Greek, θάνατος frequently translates the Hebrew דֶּבֶר (pestilence).
    This verse is a direct allusion to 2 Samuel 24:13-15, where David chooses pestilence
    over falling into the hands of enemies (cf. PsSol 7:3 'do not give us over to
    the nations'), because God is merciful. Translating as generic 'death' obscures
    this specific covenantal judgment and the Davidic allusion. Additionally, 'angry
    enough to' is a colloquial paraphrase for the genitive articular infinitive of
    result (τοῦ συντελέσαι); 'so as to' maintains the proper register. The pronoun
    αὐτῷ is simply grammatical agreement with the masculine θάνατος, so 'it' is appropriate
    for pestilence.
