theological_decisions:
- issue: Reference of the object in 'you will not cast off'
  chosen_reading: Rendered as 'them,' referring back to 'the people of Israel.'
  alternative_readings:
  - Rendered as 'us,' taking the prayer's speakers as the implied object
  rationale: The nearest explicit object is 'the people of Israel,' so 'them' best reflects the Greek syntax. The following shift to 'we' is then preserved as the speaker's self-inclusion within Israel.
- issue: Supplying the implied verb in the final clause
  chosen_reading: 'Rendered the final clause as a present-state confession: ''we are under your yoke ... and under the whip of your discipline.'''
  alternative_readings:
  - A verbless exclamation left more literally abrupt
  - A future sense carried through from the previous verbs
  rationale: Greek omits the verb, but English normally requires one. The clause reads naturally as a present acknowledgment of ongoing subjection to God's rule and discipline, rather than a future prediction.
