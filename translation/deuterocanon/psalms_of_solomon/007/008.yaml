id: PSS.7.8
reference: Psalms of Solomon 7:8
source:
  edition: lxx-swete-1909
  text: ὅτι σὺ οἰκτειρήσεις τὸ γένος Ἰσραὴλ εἰς τὸν αἰῶνα καὶ οὐκ ἀπώσεις καὶ ἡμεῖς ὑπὸ ζυγόν σου τὸν αἰῶνα, καὶ μάστιγα παιδίας σου.
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: For you will have compassion on the people of Israel forever, and you will not cast them off; and we will be under your yoke forever, and under the whip of your discipline.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offspring of Israel' or 'family of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will not reject them.'
    reason: lexical_alternative
  - marker: c
    text: '''Discipline'' may also be understood as ''instruction'' or ''training.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'and we are under your yoke forever'.
    reason: previous_rendering
lexical_decisions:
- source_word: οἰκτειρήσεις
  chosen: will have compassion
  alternatives:
  - will pity
  - will show mercy
  lexicon: BDAG
  rationale: The future verb expresses divine compassion in a solemn prayer context. 'Have compassion' is clear modern English and preserves the affective force without sounding archaic like 'pity'.
- source_word: γένος
  chosen: people
  alternatives:
  - race
  - offspring
  - family
  - stock
  lexicon: BDAG
  rationale: 'Here the sense is collective and national: Israel as a covenant people. ''People'' communicates that naturally in English without the misleading modern connotations of ''race''.'
- source_word: ἀπώσεις
  chosen: cast them off
  alternatives:
  - reject
  - drive away
  lexicon: BDAG
  rationale: The verb conveys forceful rejection or pushing away. 'Cast them off' preserves that force and fits the covenantal tone better than the flatter 'reject'.
- source_word: ζυγόν
  chosen: yoke
  alternatives:
  - burden
  lexicon: BDAG
  rationale: '''Yoke'' is the literal image and is still understandable in English. It also preserves the metaphor of submission to divine rule, which would be weakened by ''burden''.'
- source_word: μάστιγα
  chosen: whip
  alternatives:
  - scourge
  - lash
  - rod
  lexicon: BDAG
  rationale: The word denotes a striking instrument or scourge. 'Whip' is vivid and natural English; 'scourge' is more traditional but less accessible. 'Rod' is possible, but less direct for μάστιξ itself.
- source_word: παιδίας
  chosen: discipline
  alternatives:
  - instruction
  - training
  - chastening
  lexicon: BDAG
  rationale: παιδεία can include both instruction and corrective training. In combination with 'whip,' the corrective side is foregrounded, so 'discipline' best preserves the sense without overstating it as punitive alone.
