id: PSS.7.1
reference: Psalms of Solomon 7:1
source:
  edition: lxx-swete-1909
  text: Μὴ ἀποσκηνώσῃς ἀφʼ ἡμῶν, ὁ θεός, ἵνα μὴ ἐπιθῶνται ἡμῖν οἱ μισοῦντα ἡμᾶς δωρεάν.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: Do not remove your dwelling from us, O God, lest those who hate us without cause attack us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “lest those who hate us attack us for nothing”; the adverb “without cause” could be heard with the attack rather than with the hatred.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb rendered “depart” is more literally related to moving one’s tent or encampment away, a vivid image of withdrawn presence.
    reason: cultural_note
  - marker: c
    text: Or 'Do not depart from us'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀποσκηνώσῃς
  chosen: depart
  alternatives:
  - move away
  - withdraw
  - break camp from
  lexicon: LSJ
  rationale: The verb is literally related to removing a tent or encamping away, but in this prayer context the idiomatic sense is God's withdrawing from his people. “Depart” is clear modern English and preserves the relational force without over-literal awkwardness.
- source_word: ἀφʼ ἡμῶν
  chosen: from us
  alternatives:
  - away from us
  lexicon: BDAG
  rationale: The prepositional phrase marks separation from the community, so “from us” is the most direct rendering.
- source_word: ἵνα μὴ
  chosen: lest
  alternatives:
  - so that not
  - that not
  lexicon: BDAG
  rationale: Here the conjunction introduces a negative feared result. “Lest” is concise and natural in English prayer style.
- source_word: ἐπιθῶνται ἡμῖν
  chosen: attack us
  alternatives:
  - set upon us
  - lay hands on us
  lexicon: LSJ
  rationale: The verb can mean to set upon or attack. “Attack us” gives the hostile sense plainly in modern English.
- source_word: οἱ μισοῦντα ἡμᾶς
  chosen: those who hate us
  alternatives:
  - our haters
  - the ones hating us
  lexicon: BDAG
  rationale: This substantival participial expression is best rendered with a relative clause in English for clarity and naturalness.
- source_word: δωρεάν
  chosen: without cause
  alternatives:
  - for nothing
  - gratuitously
  lexicon: BDAG
  rationale: In this context the adverb most naturally expresses baseless hostility. “Without cause” is idiomatic and preserves the moral claim that their hatred is unjustified.
