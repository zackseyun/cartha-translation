id: PSS.7.2
reference: Psalms of Solomon 7:2
source:
  edition: lxx-swete-1909
  text: ὅτι ἀπώσω αὐτούς, ὁ θεός, μὴ πατήσαι ὁ ποὺς αὐτῶν κληρονομίαν ἁγιάσματός σου.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: For drive them back, O God, lest their feet trample the inheritance of your
    sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek verb form here is unusual in Swete and could be taken as 'for
      you will drive them back, O God'; the prayer context favors the imperative-like
      sense in the main text.
    reason: alternative_reading
  - marker: b
    text: Or possibly, 'your holy inheritance,' if the final phrase is taken more
      attributively than as 'the inheritance of your sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπώσω
  chosen: drive ... back
  alternatives:
  - cast away
  - repel
  - reject
  lexicon: BDAG / LSJ
  rationale: Although the Swete form is unusual and could be taken as a future-form
    spelling, the immediate context is a sequence of petitions to God, so a volitive
    sense is best reflected in English. In this context of hostile nations threatening
    desecration, 'drive ... back' captures active repulsion more clearly than the
    more relational 'reject'.
- source_word: πατήσαι
  chosen: trample
  alternatives:
  - tread on
  - step on
  lexicon: BDAG / LSJ
  rationale: The verb conveys more than incidental stepping; in context it suggests
    hostile violation or desecration. 'Trample' preserves that force.
- source_word: ὁ ποὺς αὐτῶν
  chosen: their feet
  alternatives:
  - their foot
  lexicon: BDAG / LSJ
  rationale: The Greek uses singular 'foot' collectively, but idiomatic English normally
    uses the plural here. The sense is preserved without artificial stiffness.
- source_word: κληρονομίαν
  chosen: inheritance
  alternatives:
  - possession
  - heritage
  lexicon: BDAG / LSJ
  rationale: '''Inheritance'' retains covenantal and sacred overtones better than
    the flatter ''possession,'' especially in relation to what belongs to God.'
- source_word: ἁγιάσματός
  chosen: sanctuary
  alternatives:
  - holy place
  - holy thing
  lexicon: BDAG / LSJ
  rationale: In this context of threatened profanation, the word is best taken in
    a cultic sense. 'Sanctuary' communicates sacred space more naturally than the
    broader 'holy thing.'
