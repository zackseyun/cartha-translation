theological_decisions:
- issue: Divine protection phrasing
  chosen_reading: because you are our defender
  alternative_readings:
  - for you are our protector
  - because you are the one who defends us
  rationale: The Greek predicates a title-like noun of God rather than using a verbal
    clause. Rendering it as 'our defender' preserves both the compactness and the
    confessional force of the line.
