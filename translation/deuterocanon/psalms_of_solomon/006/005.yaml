id: PSS.6.5
reference: Psalms of Solomon 6:5
source:
  edition: lxx-swete-1909
  text: ἡ ψυχὴ αὐτοῦ ἐν διαβάσει ποταμῶν καὶ σάλῳ θαλασσῶν οὐ πτοηθήσεται.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: His soul will not be terrified at the crossing of rivers and the tossing of
    seas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His life' or 'His very self' for 'His soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the surge of seas' for 'the tossing of seas.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will not be afraid'.
    reason: previous_rendering
lexical_decisions:
- source_word: ψυχή
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: BDAG
  rationale: ψυχή commonly denotes the inner life or self. 'Soul' preserves the text's
    elevated register and personal depth better than the flatter 'life' or 'self'
    in this poetic context.
- source_word: διάβασις
  chosen: crossing
  alternatives:
  - passage
  - ford
  lexicon: LSJ
  rationale: The noun denotes a crossing or passage. 'Crossing' is the clearest natural
    English choice here and fits the imagery of dangerous transit through rivers.
- source_word: σάλος
  chosen: tossing
  alternatives:
  - surge
  - swell
  - tumult
  lexicon: LSJ
  rationale: The word conveys agitation or heaving motion. 'Tossing' communicates
    the unsettled motion of the seas in clear modern English without becoming overly
    technical.
- source_word: πτοηθήσεται
  chosen: will not be afraid
  alternatives:
  - will not be terrified
  - will not be alarmed
  lexicon: LSJ
  rationale: The future passive expresses being frightened or thrown into fear. 'Will
    not be afraid' is idiomatic and readable, while still preserving the sense of
    fearless steadiness.
