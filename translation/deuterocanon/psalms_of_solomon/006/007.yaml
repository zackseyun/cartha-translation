theological_decisions:
- issue: Rendering the idiom τοῦ προσώπου Κυρίου
  chosen_reading: before the Lord
  alternative_readings:
  - the face of the Lord
  - the presence of the Lord
  rationale: This is primarily an idiomatic rather than doctrinal issue. The main text uses natural English while preserving the covenantal reverence of κύριος as 'Lord'; the more literal idiom is retained in a footnote for transparency.
  doctrine_reference: κύριος *Kyrios* → Lord
