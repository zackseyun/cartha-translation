id: PSS.6.7
reference: Psalms of Solomon 6:7
source:
  edition: lxx-swete-1909
  text: ἐν εὐφρίᾳ καρδίας αὐτοῦ ἐξύμνησεν τῷ ὀνόματι τοῦ θεοῦ, καὶ ἐδεήθη τοῦ προσώπου Κυρίου περὶ παντὸς τοῦ οἴκου αὐτοῦ.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: With gladness in his heart he sang praise to the name of God, and he entreated the face of the Lord for all his household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the face of the Lord'; that is, his presence.
    reason: lexical_alternative
  - marker: b
    text: Or 'he pleaded before the Lord'.
    reason: previous_rendering
lexical_decisions:
- source_word: εὐφρίᾳ
  chosen: gladness
  alternatives:
  - joy
  - merriment
  - rejoicing
  lexicon: BDAG
  rationale: The noun denotes joy or delight. 'Gladness' preserves the elevated but still natural tone and fits the genitive construction with 'heart' without sounding overly emotional or colloquial.
- source_word: καρδίας
  chosen: heart
  alternatives:
  - inner self
  - mind
  lexicon: BDAG
  rationale: The standard anthropological sense is intended here. 'Heart' preserves the biblical idiom and keeps the emotional-volitional center explicit.
- source_word: ἐξύμνησεν
  chosen: sang praise
  alternatives:
  - praised
  - hymned
  - extolled
  lexicon: BDAG
  rationale: The verb is stronger and more specific than simple 'praised,' carrying the sense of hymn-like praise. 'Sang praise' preserves that heightened sense in clear English.
- source_word: τῷ ὀνόματι τοῦ θεοῦ
  chosen: to the name of God
  alternatives:
  - God's name
  - to God
  lexicon: BDAG
  rationale: The Greek explicitly refers to the divine 'name,' not merely to God in general. Keeping 'name' preserves the biblical idiom of reverent invocation and honor.
- source_word: ἐδεήθη
  chosen: pleaded
  alternatives:
  - implored
  - beseeched
  - prayed
  lexicon: BDAG
  rationale: The verb conveys earnest petition rather than generic prayer. 'Pleaded' communicates urgency and dependence in idiomatic modern English.
- source_word: τοῦ προσώπου Κυρίου
  chosen: before the Lord
  alternatives:
  - the face of the Lord
  - the presence of the Lord
  lexicon: BDAG
  rationale: Literally the phrase is 'the face of the Lord,' a common biblical idiom for divine presence. In the main text, 'before the Lord' conveys the sense naturally in English while a footnote preserves the more literal alternative.
- source_word: παντὸς τοῦ οἴκου αὐτοῦ
  chosen: all his household
  alternatives:
  - all his house
  - his whole family
  lexicon: BDAG
  rationale: '''House'' here refers to the household/family unit rather than the building. ''All his household'' is natural English and preserves the collective sense of οἶκος.'
