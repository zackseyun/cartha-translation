  source_review: state/reviews/gemini/phase10_greek_apocrypha/deuterocanon/psalms_of_solomon/006/007.job-73132.json
  category: mistranslation
  tier: 3
  from: he pleaded before the Lord
  to: he entreated the face of the Lord
  rationale: 'The verb δέομαι takes the genitive of the person entreated. Here, ''τοῦ προσώπου Κυρίου'' is the direct object of the entreaty, reflecting the Hebrew idiom ''to entreat the face of the Lord'' (חלה פני יהוה, meaning to seek his favor). Translating it as a locative ''before the Lord'' misrepresents the Greek syntax and loses the specific Hebraic idiom. The accompanying footnote should be removed or adjusted to explain the idiom. | Adjudicator: The reviewer is correct regarding both the Greek syntax and the underlying Hebrew idiom. The verb δέομαι takes a genitive object of the person being asked or entreated. Here, the object is τοῦ προσώπο'
