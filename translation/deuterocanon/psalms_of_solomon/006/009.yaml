id: PSS.6.9
reference: Psalms of Solomon 6:9
source:
  edition: lxx-swete-1909
  text: εὐλογητὸς Κύριος ὁ ποιῶν ἔλεος τοῖς ἀγαπῶσιν αὐτὸν ἐν ἀληθείᾳ.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: Blessed is the Lord, who shows mercy to those who love him in truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “truly,” “with sincerity,” or “faithfully.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογητὸς
  chosen: Blessed
  alternatives:
  - Praised
  lexicon: BDAG
  rationale: Predicate adjective used in doxological language; “Blessed” preserves
    the formal praise formula more naturally than “Praised” here.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Matches the project's default rendering for κύριος as a divine title
    and fits the doxological context.
- source_word: ὁ ποιῶν
  chosen: who shows
  alternatives:
  - who does
  - who performs
  lexicon: BDAG
  rationale: ποιέω with ἔλεος is an idiomatic expression; “shows” is clearer modern
    English while remaining faithful to the sense.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - kindness
  - steadfast mercy
  lexicon: BDAG
  rationale: “Mercy” is the standard and most transparent rendering here, preserving
    the covenantal and compassionate sense.
- source_word: τοῖς ἀγαπῶσιν αὐτὸν
  chosen: to those who love him
  alternatives:
  - for those loving him
  lexicon: BDAG
  rationale: The participial phrase is naturally rendered as a relative clause in
    English without loss of meaning.
- source_word: ἐν ἀληθείᾳ
  chosen: in truth
  alternatives:
  - truly
  - with sincerity
  - faithfully
  lexicon: BDAG
  rationale: A formally close rendering that preserves the phrase's ambiguity between
    truthfulness, sincerity, and fidelity rather than collapsing it into one interpretive
    option.
