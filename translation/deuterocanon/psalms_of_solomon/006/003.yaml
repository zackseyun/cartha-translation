theological_decisions:
- issue: Divine agency in the passive verbs
  chosen_reading: The verse states that the person's ways are directed and his works
    are guarded by God without softening the claim.
  alternative_readings:
  - A weaker providential sense such as 'find success before the Lord'
  rationale: Both passive clauses explicitly name the Lord as agent with ὑπό. The
    translation preserves that strong providential statement rather than reducing
    it to general blessing.
  doctrine_reference: Preserve theological tension rather than resolve it.
