id: PSS.6.3
reference: Psalms of Solomon 6:3
source:
  edition: lxx-swete-1909
  text: αἱ ὁδοὶ αὐτοῦ κατευθύνονται ὑπὸ Κυρίου, καὶ πεφυλαγμένα ἔργα χειρῶν αὐτοῦ
    ὑπὸ Κυρίου θεοῦ αὐτοῦ.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: His ways are directed by the Lord, and the works of his hands are guarded
    by the Lord his God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁδοὶ
  chosen: ways
  alternatives:
  - paths
  - courses
  lexicon: BDAG
  rationale: A standard rendering for literal or figurative courses of life/conduct;
    here it naturally fits a person's manner of life or undertakings without over-specifying.
- source_word: κατευθύνονται
  chosen: are directed
  alternatives:
  - are made straight
  - are guided
  lexicon: BDAG
  rationale: The passive sense suggests being made straight or directed aright by
    divine agency. 'Are directed' preserves the passive and reads naturally in modern
    English.
- source_word: πεφυλαγμένα
  chosen: are guarded
  alternatives:
  - are kept
  - are protected
  - are preserved
  lexicon: BDAG
  rationale: The perfect participial idea conveys a state of being kept under watch/protection.
    'Are guarded' best preserves the protective nuance in idiomatic English.
- source_word: ἔργα χειρῶν αὐτοῦ
  chosen: the works of his hands
  alternatives:
  - his handiwork
  - what his hands have done
  lexicon: BDAG
  rationale: This phrase is transparent and concrete in Greek. 'The works of his hands'
    keeps the imagery and avoids smoothing it into a less auditable idiom.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord.' With ὑπό and no article
    in English idiom, 'the Lord' is the most natural rendering here.
