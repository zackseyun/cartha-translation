id: PSS.6.6
reference: Psalms of Solomon 6:6
source:
  edition: lxx-swete-1909
  text: ἐξανέστη ἐξ ὕπνου αὐτοῦ, καὶ ἐυλόγησεν τῷ ὀνόματι Κυρίου.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: He woke from his sleep, and blessed the name of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He rose from his sleep.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξανέστη
  chosen: woke
  alternatives:
  - rose
  - awoke
  - got up
  lexicon: BDAG
  rationale: The verb can mean either 'rose' or 'got up,' but with ἐξ ὕπνου immediately
    following, the sense is waking from sleep. 'Woke' gives the plain sense in natural
    modern English without adding more than the Greek warrants.
- source_word: ὕπνου
  chosen: sleep
  alternatives:
  - slumber
  lexicon: BDAG
  rationale: The noun straightforwardly refers to sleep. 'Sleep' is the natural English
    equivalent; 'slumber' would sound elevated without textual necessity.
- source_word: ἐυλόγησεν
  chosen: blessed
  alternatives:
  - praised
  - spoke well of
  lexicon: BDAG
  rationale: The verb commonly means 'blessed.' In relation to God's name, 'blessed'
    preserves the biblical register and matches the likely act of reverent praise
    more closely than the flatter 'praised' alone.
- source_word: τῷ ὀνόματι Κυρίου
  chosen: the name of the Lord
  alternatives:
  - the Lord's name
  lexicon: BDAG
  rationale: This construction is idiomatically rendered 'the name of the Lord.' It
    preserves the object of blessing explicitly and follows the project's default
    rendering of κύριος as 'Lord'.
