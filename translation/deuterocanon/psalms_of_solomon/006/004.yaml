id: PSS.6.4
reference: Psalms of Solomon 6:4
source:
  edition: lxx-swete-1909
  text: ἀπὸ ὁράσεως πονηρῶν ἐνυπνίων αὐτοῦ οὐ ταραχθήσεται.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: He will not be troubled by the vision of his evil dreams.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will not be disturbed by the sight of his evil dreams.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπό
  chosen: by
  alternatives:
  - from
  - because of
  lexicon: BDAG
  rationale: Here ἀπό introduces what would occasion disturbance. In natural English,
    'by' best conveys the cause without sounding wooden.
- source_word: ὁράσεως
  chosen: vision
  alternatives:
  - sight
  - appearance
  lexicon: BDAG
  rationale: ὅρασις can denote sight or visionary appearance. 'Vision' fits the dream
    context better than the more physical 'sight' while remaining close to the Greek.
- source_word: πονηρῶν
  chosen: evil
  alternatives:
  - bad
  - troubling
  - wicked
  lexicon: BDAG
  rationale: '''Evil'' is the most direct rendering of πονηρός and preserves the moral-darkening
    force of the Greek better than the weaker ''bad''.'
- source_word: ἐνυπνίων
  chosen: dreams
  alternatives:
  - dream-visions
  lexicon: BDAG
  rationale: ἐνύπνιον straightforwardly means 'dream.' A more expanded rendering would
    add interpretive material not required by the text.
- source_word: ταραχθήσεται
  chosen: will not be troubled
  alternatives:
  - will not be disturbed
  - will not be shaken
  lexicon: BDAG
  rationale: The future passive of ταράσσω denotes inward disturbance or agitation.
    'Will not be troubled' is clear, natural, and preserves that emotional sense.
