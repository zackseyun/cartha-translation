id: PSS.6.8
reference: Psalms of Solomon 6:8
source:
  edition: lxx-swete-1909
  text: καὶ Κύριος εἰσήκουσεν προσευχὴν παντὸς ἐν φόβῳ θεοῦ, καὶ πᾶν αἴτημα ψυχῆς
    ἐλπιζούσης πρὸς αὐτὸν ἐπιτελεῖ ὁ κύριος.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: And the Lord hears the prayer of everyone in the fear of God, and the Lord
    fulfills every request of a soul that hopes in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''every request of a person that hopes in him.'' Greek: ''of a soul.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'has heard the prayer of everyone who fears God'.
    reason: previous_rendering
lexical_decisions:
- source_word: Κύριος / ὁ κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: LEH, LSJ
  rationale: Follows the project's default rendering of κύριος as a title. Repeating
    'the Lord' in both clauses preserves the Greek emphasis.
- source_word: εἰσήκουσεν
  chosen: has heard
  alternatives:
  - heard
  - listened to
  lexicon: LEH, LSJ
  rationale: Rendered with English present perfect to convey a completed action with
    present relevance, which reads naturally in this wisdom-like statement.
- source_word: παντὸς ἐν φόβῳ θεοῦ
  chosen: everyone who fears God
  alternatives:
  - everyone in the fear of God
  - everyone with fear of God
  lexicon: LEH, LSJ
  rationale: This smooths the Greek prepositional expression into natural English
    while preserving the core idea of reverent fear directed toward God.
- source_word: αἴτημα
  chosen: request
  alternatives:
  - petition
  lexicon: LEH, LSJ
  rationale: Request is clear modern English and fits prayer language without sounding
    overly formal.
- source_word: ψυχῆς
  chosen: soul
  alternatives:
  - person
  - life
  lexicon: LEH, LSJ
  rationale: The Greek explicitly says 'soul'; retaining it preserves the text's devotional
    and anthropological texture, though 'person' is possible in context.
- source_word: ἐλπιζούσης πρὸς αὐτόν
  chosen: that hopes in him
  alternatives:
  - hoping toward him
  - that trusts in him
  lexicon: LEH, LSJ
  rationale: '''Hopes in him'' is idiomatic English and preserves the sense of directed
    reliance expressed by the participle with πρὸς.'
- source_word: ἐπιτελεῖ
  chosen: fulfills
  alternatives:
  - accomplishes
  - brings to completion
  lexicon: LEH, LSJ
  rationale: Fulfills fits the object 'request' well in English and conveys effective
    divine response.
