id: PSS.6.1
reference: Psalms of Solomon 6:1
source:
  edition: lxx-swete-1909
  text: Μακάριος ἀνὴρ οὗ ἡ καρδία αὐτοῦ ἑτοίμη ἐπικαλέσασθαι τὸ ὄνομα Κυρίου·
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: Blessed is the man whose heart is ready to call on the name of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ready to invoke the name of the Lord.'
    reason: lexical_alternative
  - marker: b
    text: '''Man'' renders a masculine singular Greek form used here in a representative
      sense; alternatively, ''person.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: A beatitude-style adjective; 'Blessed' preserves the solemn, wisdom-like
    register better than the more psychological 'Happy' or the flatter 'Fortunate'.
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular. Per project philosophy,
    a gender-accurate rendering is preferred where the source uses masculine representative
    language. Here 'man' preserves the form and wisdom-saying tone.
- source_word: καρδία
  chosen: heart
  alternatives:
  - inner self
  - mind
  lexicon: BDAG
  rationale: '''Heart'' is the standard biblical idiom for the inner disposition and
    should be preserved rather than flattened into a more interpretive gloss.'
- source_word: ἑτοίμη
  chosen: ready
  alternatives:
  - prepared
  - willing
  lexicon: BDAG
  rationale: The adjective denotes preparedness. 'Ready' is clear, natural English
    and keeps both the dispositional and practical sense without overinterpreting.
- source_word: ἐπικαλέσασθαι
  chosen: to call on
  alternatives:
  - to invoke
  - to call upon
  lexicon: BDAG
  rationale: The infinitive refers to invoking or appealing to the Lord by name. 'Call
    on' is natural modern English and preserves the biblical-religious sense.
- source_word: τὸ ὄνομα
  chosen: the name
  alternatives:
  - the reputation
  - the authority
  lexicon: BDAG
  rationale: The phrase is idiomatic and theologically loaded in biblical usage. 'The
    name' should be retained rather than paraphrased.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is a contested term in the project glossary, with default rendering
    'Lord.' The article is supplied naturally in English within the phrase 'the name
    of the Lord.'
