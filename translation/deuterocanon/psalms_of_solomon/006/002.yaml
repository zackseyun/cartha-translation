id: PSS.6.2
reference: Psalms of Solomon 6:2
source:
  edition: lxx-swete-1909
  text: ἐν τῷ μνημονεύειν αὐτὸν τὸ ὄνομα Κυρίου σωθήσεται.
  language: Greek
  pages:
  - 796
  validation: swete_direct
translation:
  text: When he remembers the name of the Lord, he will be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be delivered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ μνημονεύειν
  chosen: When he remembers
  alternatives:
  - in remembering
  - by remembering
  lexicon: BDAG
  rationale: The ἐν τῷ + infinitive construction is naturally temporal here, so 'when
    he remembers' gives clear English while preserving the Greek sense.
- source_word: αὐτὸν
  chosen: he
  alternatives:
  - him
  lexicon: Greek grammar / BDAG
  rationale: Here αὐτόν is best understood as the accusative subject of the articular
    infinitive rather than as the direct object, yielding the sense 'when he remembers'
    rather than 'when remembering him.'
- source_word: τὸ ὄνομα Κυρίου
  chosen: the name of the Lord
  alternatives:
  - the Lord's name
  lexicon: BDAG
  rationale: This preserves the Greek wording closely and retains the biblical-theological
    weight of 'the name of the Lord.' 'Lord' follows the project's default rendering
    for κύριος.
- source_word: σωθήσεται
  chosen: will be saved
  alternatives:
  - will be delivered
  - will be preserved
  lexicon: BDAG
  rationale: The future passive of σῴζω commonly means 'will be saved' or 'will be
    delivered.' 'Will be saved' best preserves both the literal sense and the theological
    resonance of the verb.
