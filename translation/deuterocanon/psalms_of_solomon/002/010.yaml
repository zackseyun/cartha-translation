id: PSS.2.10
reference: Psalms of Solomon 2:10
source:
  edition: lxx-swete-1909
  text: καὶ ὁ οὐρανὸς ἐβαρύνθησενσεν, καὶ ἡ γῆ ἐβδελύξατο αὐτούς,
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: And heaven was weighed down, and the earth abhorred them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Zone 1 transcription reads ἐβαρύνθησενσεν, which appears to contain a duplicated ending; the translation follows the evident underlying form ἐβαρύνθησεν.
    reason: textual_variant
  - marker: b
    text: Or 'the sky grew heavy'.
    reason: previous_rendering
lexical_decisions:
- source_word: οὐρανός
  chosen: sky
  alternatives:
  - heaven
  lexicon: LSJ
  rationale: In this poetic judgment context, the term likely refers to the visible heavens as part of creation’s response. “Sky” is more natural in English here while still preserving the cosmic imagery.
- source_word: ἐβαρύνθησεν
  chosen: grew heavy
  alternatives:
  - became heavy
  - was weighed down
  - darkened
  lexicon: LSJ
  rationale: The verb from βαρύνω most directly conveys becoming heavy or weighed down. “Grew heavy” preserves the image without over-interpreting it as specifically darkness or storm.
- source_word: γῆ
  chosen: earth
  alternatives:
  - land
  lexicon: LSJ
  rationale: The paired cosmic expression with “sky” favors the broader sense “earth” rather than a localized “land.”
- source_word: ἐβδελύξατο
  chosen: abhorred
  alternatives:
  - detested
  - loathed
  lexicon: LSJ
  rationale: The verb denotes strong revulsion. “Abhorred” fits the elevated poetic register and conveys moral disgust.
- source_word: αὐτούς
  chosen: them
  lexicon: Greek grammar
  rationale: Straightforward accusative object referring to the people under judgment in the surrounding context.
