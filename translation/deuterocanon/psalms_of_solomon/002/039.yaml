  from: and to show mercy to the righteous by rescuing him from the humiliation inflicted by the sinner, and to repay the sinner for what he did to the righteous.
  to: and to show mercy to the righteous, delivering him from the oppression of the sinner, and to repay the sinner for what he did to the righteous.
  rationale: The draft's expansion 'by rescuing him from the humiliation inflicted by' is overly prosaic and flattens the poetic bicolon. In this context, `ταπείνωσις` carries the sense of 'oppression' or 'affliction' (reflecting Hebrew עֳנִי, as in Ps 9:13), which allows the subjective genitive `ἁμαρτωλοῦ` to be rendered naturally as 'the oppression of the sinner' without needing the explanatory 'inflicted by.' Supplying 'delivering him' is sufficient to handle the pregnant use of `ἀπὸ` after `ἐλεῆσαι`.
