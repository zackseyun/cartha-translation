id: PSS.2.39
reference: Psalms of Solomon 2:39
source:
  edition: lxx-swete-1909
  text: καὶ ἐλεῆσαι δίκαιον ἀπὸ ταπεινώσεως ἁμαρτωλοῦ, καὶ ἀποδοῦναι ἁμαρτωλῷ ἀνθʼ ὧν ἐποίησεν δικαίῳ.
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: and to show mercy to the righteous, delivering him from the oppression of the sinner, and to repay the sinner for what he did to the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to have mercy on the righteous from the humiliation of the sinner.' The Greek is compressed; the main text makes explicit the likely sense of deliverance implied by the construction.
    reason: lexical_alternative
  - marker: b
    text: '''Humiliation'' may also be rendered ''affliction,'' ''abasement,'' or ''oppression.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'and to show mercy to the righteous by rescuing him from the humiliation inflicted by the sinner, and to repay the sinner for what he did to the righteous.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐλεῆσαι
  chosen: to show mercy
  alternatives:
  - to have mercy
  - to pity
  lexicon: BDAG
  rationale: The aorist infinitive denotes merciful action rather than mere feeling. 'Show mercy' reads naturally in English and keeps the active force of the verb.
- source_word: δίκαιον
  chosen: the righteous
  alternatives:
  - the righteous man
  - the just
  lexicon: BDAG
  rationale: The singular refers to a righteous person generically. 'The righteous' preserves the moral category without sounding archaic; the following 'him' in English reflects the singular object implied by the Greek.
- source_word: ἀπὸ ταπεινώσεως
  chosen: from the humiliation
  alternatives:
  - from affliction
  - from oppression
  - from abasement
  lexicon: BDAG
  rationale: ταπείνωσις here most naturally denotes a state of being brought low or humiliated by the wicked. 'Humiliation' preserves that moral-social sense better than the broader 'affliction.'
- source_word: ἁμαρτωλοῦ / ἁμαρτωλῷ
  chosen: the sinner
  alternatives:
  - the wicked
  - the sinful one
  lexicon: BDAG
  rationale: The term is singular and personal in both clauses. 'The sinner' is the most direct rendering and fits the parallel with 'the righteous.'
- source_word: ἀποδοῦναι
  chosen: to repay
  alternatives:
  - to recompense
  - to pay back
  - to render
  lexicon: BDAG
  rationale: '''Repay'' cleanly conveys retributive return in readable modern English without adding extra interpretive weight.'
- source_word: ἀνθʼ ὧν
  chosen: for what
  alternatives:
  - because of what
  - in return for what
  lexicon: BDAG
  rationale: The phrase introduces the basis of repayment. 'For what' is concise and idiomatic while preserving the causal-retributive sense.
- source_word: ἐποίησεν δικαίῳ
  chosen: he did to the righteous
  alternatives:
  - he did against the righteous
  - he did to the just one
  lexicon: BDAG
  rationale: English normally supplies 'to' with this dative construction. This keeps the action concrete without overstating hostility beyond the Greek.
