theological_decisions:
- issue: Compressed infinitival syntax after 'the Lord is kind'
  chosen_reading: 'The infinitives are unpacked into a finite clause plus result clause:
    the Lord mercifully deals with his holy ones so that they may stand before him
    in strength.'
  alternative_readings:
  - A more formal rendering could leave the infinitives as 'to act... to stand...'
  - The final infinitive could be taken more directly of the Lord's own standing-by/presence,
    though that reads less naturally in context
  rationale: The Greek is syntactically compressed in a way that is not natural in
    English. The chosen rendering preserves the apparent sense of divine mercy resulting
    in the sustained standing of God's holy ones before him, without importing new
    doctrine.
