id: PSS.2.40
reference: Psalms of Solomon 2:40
source:
  edition: lxx-swete-1909
  text: ὅτι χρηστὸς ὁ κύριος τοῖς ἐπικαλουμένοις αὐτὸν ἐν ὑπομονῇ, ποιῆσαι κατὰ τὸ
    ἔλεος αὐτοῦ τοῖς ὁσίοις αὐτοῦ, παρεστᾶναι διὰ παντὸς ἐνώπιον αὐτοῦ ἐν ἰσχύι.
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: For the Lord is kind to those who call on him with endurance; he deals with
    his holy ones according to his mercy, so that they may stand continually before
    him in strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his faithful ones' or 'his devout ones.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with patience' for 'with endurance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χρηστὸς
  chosen: kind
  alternatives:
  - good
  - gracious
  lexicon: BDAG
  rationale: χρηστός can mean 'good,' 'kind,' or 'benevolent.' 'Kind' preserves the
    personal, relational sense here better than the broader 'good,' while remaining
    natural English.
- source_word: ἐπικαλουμένοις
  chosen: those who call on
  alternatives:
  - those who call upon
  - those who invoke
  lexicon: BDAG
  rationale: The participle denotes appeal to God in prayer or petition. 'Call on'
    is idiomatic modern English and preserves the worshipful/prayerful sense without
    sounding archaic.
- source_word: ἐν ὑπομονῇ
  chosen: with endurance
  alternatives:
  - in patience
  - with steadfastness
  lexicon: BDAG
  rationale: ὑπομονή is more than mere quiet patience; it often carries the sense
    of perseverance under pressure. 'With endurance' best captures that force here.
- source_word: ποιῆσαι κατὰ τὸ ἔλεος αὐτοῦ
  chosen: he deals with his holy ones according to his mercy
  alternatives:
  - to act according to his mercy toward his holy ones
  - to do according to his mercy for his holy ones
  lexicon: BDAG
  rationale: The Greek infinitival construction is compressed and awkward if translated
    woodenly. This rendering preserves the sense of God's merciful action toward his
    people while producing clear English.
- source_word: τοῖς ὁσίοις αὐτοῦ
  chosen: his holy ones
  alternatives:
  - his faithful ones
  - his devout ones
  lexicon: BDAG
  rationale: ὅσιος often carries the sense of pious/devout, but 'holy ones' stays
    closer to the Greek form and preserves the covenantal-religious weight. The more
    interpretive alternatives are kept as footnote possibilities.
- source_word: παρεστᾶναι
  chosen: stand
  alternatives:
  - stand before
  - be present
  - present themselves
  lexicon: BDAG
  rationale: The verb here is rendered with 'stand' to preserve the imagery of established
    presence before God. The fuller phrase 'stand continually before him' communicates
    the sense without over-expansion.
- source_word: διὰ παντὸς
  chosen: continually
  alternatives:
  - always
  - at all times
  lexicon: BDAG
  rationale: '''Continually'' fits the liturgical/devotional tone well and reflects
    ongoing duration.'
- source_word: ἐν ἰσχύι
  chosen: in strength
  alternatives:
  - with strength
  - in might
  lexicon: BDAG
  rationale: A literal rendering is clear here. 'In strength' preserves the Greek
    structure and leaves the source of that strength appropriately implicit.
