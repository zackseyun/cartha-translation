theological_decisions:
- issue: Retribution idiom
  chosen_reading: The line is rendered as a prayer for God to repay the aggressors on their own heads.
  alternative_readings:
  - The phrase could be kept more mechanically as 'repay to them into heads.'
  rationale: The Greek idiom clearly expresses returned judgment on the guilty, and natural English should make that sense explicit without softening it.
