id: PSS.2.28
reference: Psalms of Solomon 2:28
source:
  edition: lxx-swete-1909
  text: ἐκχέαι τὴν ὀργὴν αὐτῶν εἰς ἡμᾶς ἐν ἁρπάγματι. καὶ μὴ χρονίσῃς, ὁ θεός, τοῦ ἀποδοῦναι αὐτοῖς εἰς κεφαλάς,
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: to pour out their wrath on us in plundering. And do not delay, O God, to repay them on their own heads,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with plundering'; the Greek phrase is compact and may describe violent despoiling.
    reason: lexical_alternative
  - marker: b
    text: Or 'in plunder'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐκχέαι
  chosen: to pour out
  alternatives:
  - to spill out
  - to unleash
  lexicon: BDAG
  rationale: The infinitive retains the Greek verbal image of something being poured out rather than using a more interpretive verb like 'unleash.'
- source_word: ὀργή
  chosen: wrath
  alternatives:
  - anger
  - rage
  lexicon: BDAG
  rationale: '''Wrath'' best preserves the forceful, punitive sense of the Greek in this judgment context.'
- source_word: ἐν ἁρπάγματι
  chosen: in plunder
  alternatives:
  - with plundering
  - in rapine
  - as spoil
  lexicon: LSJ
  rationale: The phrase is difficult, but 'in plunder' most closely reflects the noun-based Greek expression and preserves its violent, despoiling sense without over-paraphrasing.
- source_word: χρονίσῃς
  chosen: do not delay
  alternatives:
  - do not tarry
  - do not linger
  lexicon: BDAG
  rationale: This gives clear modern English while preserving the prayer that God act without postponement.
- source_word: ἀποδοῦναι αὐτοῖς εἰς κεφαλάς
  chosen: to repay them on their own heads
  alternatives:
  - to return it upon their heads
  - to recompense them on their heads
  lexicon: BDAG
  rationale: This preserves the idiom of retribution falling back on the perpetrators themselves; 'their own' makes the English idiom natural while staying faithful to the sense.
