id: PSS.2.27
reference: Psalms of Solomon 2:27
source:
  edition: lxx-swete-1909
  text: ὅτι οὐκ ἐν ζήλῳ ἐποίησαν, ἀλλʼ ἐν ἐπιθυμίᾳ ψυχῆς,
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: For they did not act out of zeal, but out of the desire of their soul,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'but in desire of soul' or 'but in the desire of their soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'out of their own desire'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐποίησαν
  chosen: did not act
  alternatives:
  - did
  - made
  lexicon: LSJ
  rationale: Although the verb is formally 'did/made,' English more naturally uses 'act' with motive phrases like 'out of zeal.' The thought continues into v. 28, so 'act' also leaves the implied object open without over-specifying it.
- source_word: ζήλῳ
  chosen: zeal
  alternatives:
  - jealousy
  - ardor
  lexicon: LSJ
  rationale: In this context the contrast is between an ostensibly principled motive and self-directed desire. 'Zeal' best preserves that moral-religious force without importing the more negative sense 'jealousy.'
- source_word: ἐπιθυμίᾳ
  chosen: desire
  alternatives:
  - craving
  - lust
  lexicon: LSJ
  rationale: The word can be stronger than neutral desire, but 'lust' would oversexualize the sense here. 'Desire' keeps the motive self-directed and morally suspect in context without narrowing the meaning.
- source_word: ψυχῆς
  chosen: their own
  alternatives:
  - of soul
  - of their soul
  - of themselves
  lexicon: LSJ
  rationale: ψυχή can mean 'soul,' 'life,' or 'self.' In the phrase ἐπιθυμίᾳ ψυχῆς, a hyper-literal 'desire of soul' is awkward in English. 'Their own desire' captures the sense of self-driven motive while remaining readable. The more literal 'soul' sense is preserved in a footnote.
