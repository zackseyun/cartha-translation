id: PSS.2.33
reference: Psalms of Solomon 2:33
source:
  edition: lxx-swete-1909
  text: εἶπεν Ἐγὼ κύριος γῆς καὶ θαλάσσης ἔσομαι· καὶ οὐκ ἔγνω ὅτι ὁ θεὸς μέγας, κραταιὸς
    ἐν ἰσχύϊ αὐτοῦ τῇ μεγάλῃ.
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: He said, "I will be lord of land and sea," and he did not know that God is
    great, mighty in his great strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "earth and sea."
    reason: lexical_alternative
  - marker: b
    text: Or "mighty in his great power."
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Here κύριος is a human boast, not a divine title, so it is rendered with
    lowercase "lord." "Master" is possible, but "lord" better preserves the claim
    to dominion.
- source_word: γῆς
  chosen: land
  alternatives:
  - earth
  lexicon: BDAG
  rationale: In the pair "land and sea," "land" fits the political-geographical contrast
    more naturally than "earth," while remaining faithful to the Greek.
- source_word: οὐκ ἔγνω
  chosen: did not know
  alternatives:
  - did not understand
  - failed to recognize
  lexicon: BDAG
  rationale: The aorist states his lack of recognition plainly. "Did not know" is
    the most direct rendering and preserves the moral irony without over-interpreting.
- source_word: κραταιὸς
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: BDAG
  rationale: '"Mighty" fits the elevated tone and pairs well with the following phrase
    about divine strength.'
- source_word: ἐν ἰσχύϊ αὐτοῦ τῇ μεγάλῃ
  chosen: in his great strength
  alternatives:
  - in his great power
  - by his great might
  lexicon: BDAG
  rationale: This preserves the Greek emphasis on God's own overwhelming strength.
    "Strength" keeps the lexical connection to ἰσχύς, while the repetition with "great"
    reflects the source's intensification.
