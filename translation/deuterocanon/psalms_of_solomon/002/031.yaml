id: PSS.2.31
reference: Psalms of Solomon 2:31
source:
  edition: lxx-swete-1909
  text: τὸ σῶμα αὐτοῦ διαφερόμενον ἐπὶ κυμάτων ἐν ὕβρει πολλῇ, καὶ οὐκ ἦν ὁ θάπτων·
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: his body swept along on the waves with great indignity, and there was no one
    to bury him;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being carried along' for 'swept along.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with great abuse' or 'in great outrage' for 'with great indignity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σῶμα
  chosen: body
  alternatives:
  - corpse
  lexicon: BDAG
  rationale: The Greek term is the ordinary word for 'body.' 'Body' keeps the concrete
    force of the source without adding interpretive coloring such as 'corpse,' even
    though death is clearly implied by context.
- source_word: διαφερόμενον
  chosen: swept along
  alternatives:
  - being carried along
  - being borne along
  - drifting
  lexicon: BDAG
  rationale: The participle suggests being carried here and there by external force.
    'Swept along' is vivid, natural English that preserves the passive sense better
    than the looser 'drifting.'
- source_word: ἐπὶ κυμάτων
  chosen: on the waves
  alternatives:
  - upon the waves
  - over the waves
  lexicon: LSJ
  rationale: This straightforwardly locates the body's movement on the sea's waves.
    'On the waves' is idiomatic and faithful.
- source_word: ἐν ὕβρει πολλῇ
  chosen: with great indignity
  alternatives:
  - in great outrage
  - with great abuse
  - with great insolence
  lexicon: BDAG
  rationale: ὕβρις can denote violent arrogance, outrage, or degrading mistreatment.
    In this context of an unburied body at sea, 'with great indignity' best conveys
    the shameful, abusive treatment without sounding unnatural in English.
- source_word: οὐκ ἦν ὁ θάπτων
  chosen: there was no one to bury him
  alternatives:
  - there was none to bury him
  - there was no one burying him
  lexicon: LSJ
  rationale: The construction idiomatically expresses the absence of anyone to perform
    burial. The chosen rendering is clear modern English and preserves the pathos
    of denied burial.
