id: PSS.2.22
reference: Psalms of Solomon 2:22
source:
  edition: lxx-swete-1909
  text: περιείλατο μίτραν δόξης ἣν περιέθηκεν αὐτῇ ὁ θεός·
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: She removed the turban of glory that God had placed on her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "diadem of glory."
    reason: lexical_alternative
lexical_decisions:
- source_word: περιείλατο
  chosen: removed
  alternatives:
  - took off
  - laid aside
  - stripped off
  lexicon: LSJ
  rationale: The aorist middle here most naturally describes the woman’s own act of
    taking off what she had been wearing. In context, where Jerusalem is being shamed
    and her beauty cast down, 'removed' best fits a deliberate laying aside without
    adding more violence than the Greek itself states.
- source_word: μίτραν
  chosen: turban
  alternatives:
  - diadem
  - headband
  lexicon: LSJ
  rationale: μίτρα commonly denotes a head-covering or turban-like headdress. 'Turban'
    preserves the concrete image better than the more interpretive 'diadem,' though
    the context clearly associates it with honor and splendor.
- source_word: δόξης
  chosen: of glory
  alternatives:
  - of splendor
  - glorious
  lexicon: LSJ
  rationale: The genitive is kept directly in English to preserve the elevated, honor-laden
    description of the headdress.
- source_word: περιέθηκεν αὐτῇ
  chosen: had placed on her
  alternatives:
  - put on her
  - set on her
  lexicon: LSJ
  rationale: This verb regularly means to place or put around/on. 'Had placed on her'
    is clear, natural English that preserves the sense that God himself bestowed this
    honored headdress.
- source_word: ὁ θεός
  chosen: God
  lexicon: LSJ
  rationale: Standard rendering; nothing in the verse requires expansion or a title-form
    translation.
