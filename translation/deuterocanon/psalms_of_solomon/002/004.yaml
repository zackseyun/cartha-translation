  category: mistranslation
  tier: 2
  from: “Throw them far away from me; his glorious beauty did them no good.”
  to: “Throw them far away from me.” The beauty of its glory did them no good.
  rationale: The quotation must end after "from me" (ἀπ' ἐμοῦ). Because God is speaking in the first person ("me"), the third-person clause that follows belongs to the psalmist's narration; keeping it inside the quote creates a jarring logical shift. Furthermore, αὐτοῦ is better rendered as "its" (referring to the neuter altar/sanctuary from vv. 2-3), and "the beauty of its glory" preserves the theological noun δόξα (glory) which the draft flattens.
