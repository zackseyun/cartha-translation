id: PSS.2.4
reference: Psalms of Solomon 2:4
source:
  edition: lxx-swete-1909
  text: ἕνεκεν τούτων εἶπεν Ἀπορρίψατε αὐτὰ μακρὰν ἀπ' ἐμοῦ, οὐκ εὐώδωκεν αὐτοῖς τὸ κάλλος τῆς δόξης αὐτοῦ.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: Because of these things he said, “Throw them far away from me.” The beauty of its glory did them no good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the beauty of his glory did not benefit them.'
    reason: lexical_alternative
  - marker: b
    text: A manuscript variant reads 'her' instead of 'his' ('the beauty of her glory').
    reason: textual_variant
  - marker: c
    text: Or '“Throw them far away from me; his glorious beauty did them no good.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἕνεκεν τούτων
  chosen: Because of these things
  alternatives:
  - For this reason
  - Because of these deeds
  lexicon: BDAG
  rationale: The phrase points back to the defilement just described in v. 3. 'Because of these things' preserves the explicit backward reference without over-specifying the antecedent.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he declared
  - he said this
  lexicon: BDAG
  rationale: The verb is the ordinary verb of speaking. Although the speaker is contextually God, the Greek simply says 'he said,' so the translation preserves that restraint.
- source_word: Ἀπορρίψατε αὐτὰ μακρὰν ἀπ' ἐμοῦ
  chosen: Throw them far away from me
  alternatives:
  - Cast them far from me
  - Drive them away from me
  lexicon: BDAG
  rationale: ἀπορρίπτω has the force of throwing away or rejecting. 'Throw them far away from me' keeps the vivid imperative and the spatial force of μακράν.
- source_word: οὐκ εὐώδωκεν αὐτοῖς
  chosen: did them no good
  alternatives:
  - did not benefit them
  - did not prosper them
  lexicon: BDAG
  rationale: εὐοδόω can mean to make prosperous or to benefit. In this context, 'did them no good' is clear modern English and preserves the sense that the beauty in question brought them no advantage.
- source_word: τὸ κάλλος τῆς δόξης αὐτοῦ
  chosen: his glorious beauty
  alternatives:
  - the beauty of his glory
  - his splendid beauty
  lexicon: BDAG
  rationale: The genitive construction is somewhat heavy in English. 'His glorious beauty' keeps the doubled aesthetic weight of κάλλος and δόξα while reading naturally. The masculine pronoun follows the Swete base text's αὐτοῦ.
