id: PSS.2.3
reference: Psalms of Solomon 2:3
source:
  edition: lxx-swete-1909
  text: ἀνθ' ὧν οἱ υἱοὶ Ἱερουσαλὴμ ἐμίαναν τὰ ἅγια Κυρίου, ἐβεβήλωσαν τὰ δῶρα τοῦ
    θεοῦ ἐν ἀνομίαις.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: because the sons of Jerusalem defiled the holy things of the Lord; they profaned
    the gifts of God with their lawless acts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of Jerusalem.' The Greek reads 'sons,' which is retained in
      the main text.
    reason: lexical_alternative
  - marker: b
    text: '''The gifts of God'' may refer more specifically to sacred offerings presented
      to God.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀνθ' ὧν
  chosen: because
  alternatives:
  - therefore
  - in return for which
  - for this reason
  lexicon: BDAG
  rationale: In context this idiom introduces the reason for the judgment being described.
    'Because' gives the causal force clearly in natural English.
- source_word: υἱοὶ Ἱερουσαλήμ
  chosen: sons of Jerusalem
  alternatives:
  - children of Jerusalem
  - people of Jerusalem
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural ('sons'). Per project philosophy,
    the gendered form is preserved unless context clearly requires a generic flattening.
- source_word: ἐμίαναν
  chosen: defiled
  alternatives:
  - polluted
  - made unclean
  lexicon: BDAG
  rationale: '''Defiled'' best captures cultic contamination of sacred things in clear
    modern English.'
- source_word: τὰ ἅγια Κυρίου
  chosen: the holy things of the Lord
  alternatives:
  - the sanctuary of the Lord
  - the holy places of the Lord
  - the sacred things of the Lord
  lexicon: BDAG
  rationale: The plural neuter points most naturally to sacred/holy things rather
    than a single sanctuary building. 'Holy things' preserves that breadth.
- source_word: ἐβεβήλωσαν
  chosen: profaned
  alternatives:
  - desecrated
  - treated as common
  lexicon: BDAG
  rationale: The verb denotes making something sacred profane or common. 'Profaned'
    is concise and retains the cultic force.
- source_word: τὰ δῶρα τοῦ θεοῦ
  chosen: the gifts of God
  alternatives:
  - God's offerings
  - the offerings of God
  lexicon: BDAG
  rationale: While the phrase may refer to sacrificial offerings presented to God,
    'gifts of God' is the direct lexical sense and remains understandable in context.
- source_word: ἐν ἀνομίαις
  chosen: with their lawless acts
  alternatives:
  - in lawless deeds
  - by acts of lawlessness
  - through their iniquities
  lexicon: BDAG
  rationale: This conveys the instrumental or attendant sense of ἐν here while keeping
    ἀνομίαις tied to concrete acts of lawlessness rather than a vague state.
