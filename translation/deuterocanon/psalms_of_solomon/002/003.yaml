  source_review: state/reviews/gemini/phase10_greek_apocrypha/deuterocanon/psalms_of_solomon/002/003.job-73021.json
  category: lexical
  tier: 2
  from: the gifts of God
  to: the offerings of God
  rationale: In a temple context, δῶρα refers to sacrificial offerings (the standard
    LXX translation for Hebrew קָרְבָּן, qorban). The English phrase 'gifts of God'
    strongly implies gifts given *by* God to humans (subjective genitive), whereas
    the author means offerings dedicated *to* God (possessive/objective genitive).
    'Offerings' restores the cultic reality the original audience would have understood
    immediately.
