theological_decisions:
- issue: Scope of divine rule in τῶν οὐρανῶν
  chosen_reading: The line asserts God's kingship over the heavens and his judgment
    of earthly political powers.
  alternative_readings:
  - '''the heavens'' as a reverential equivalent for ''heaven'' singular'
  rationale: 'The Greek plural is retained in translation, but the theological force
    is not altered either way: the emphasis is on transcendent kingship paired with
    active judgment.'
