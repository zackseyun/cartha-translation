id: PSS.2.34
reference: Psalms of Solomon 2:34
source:
  edition: lxx-swete-1909
  text: αὐτὸς βασιλεὺς ἐπὶ τῶν οὐρανῶν, καὶ κρίνων βασιλεῖς καὶ ἀρχάς·
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: He himself is king over the heavens, and he judges kings and rulers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judging kings and princes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - himself
  lexicon: BDAG
  rationale: Used the emphatic form explicitly rather than flattening it to a simple
    pronoun, since the Greek stresses God's own kingship.
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - the king
  - ruler
  lexicon: BDAG
  rationale: 'The noun is anarthrous here and works naturally as a predicate: ''is
    king.'' ''King'' preserves the royal claim more directly than the broader ''ruler.'''
- source_word: ἐπὶ τῶν οὐρανῶν
  chosen: over the heavens
  alternatives:
  - in the heavens
  - over heaven
  lexicon: BDAG
  rationale: With ἐπί and the genitive, the sense is dominion over rather than mere
    location. 'The heavens' preserves the Greek plural.
- source_word: κρίνων
  chosen: he judges
  alternatives:
  - judging
  - while judging
  lexicon: BDAG
  rationale: The participle is rendered as a finite verb in English for natural readability
    while preserving the ongoing judicial sense of the Greek.
- source_word: ἀρχάς
  chosen: rulers
  alternatives:
  - princes
  - authorities
  lexicon: BDAG
  rationale: In context alongside 'kings,' this most naturally refers to earthly ruling
    powers. 'Rulers' is clear modern English without importing later technical senses.
