id: PSS.2.11
reference: Psalms of Solomon 2:11
source:
  edition: lxx-swete-1909
  text: ὅτι οὐκ ἐποίησεν πᾶς ἄνθρωπος ἐπ' αὐτῆς ὅσα ἐποίησαν.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: For no man has done on it what they did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon her' / 'on her' for ἐπ' αὐτῆς; the main text renders the phrase
      idiomatically in a hostile sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'against her'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the grounds or explanation for the preceding statement; 'For'
    fits natural English while preserving the causal force.
- source_word: οὐκ ... πᾶς ἄνθρωπος
  chosen: no man
  alternatives:
  - not every man
  - no human being
  lexicon: BDAG
  rationale: With negation, the phrase is most naturally rendered as a universal negative
    in English. 'No man' preserves the singular masculine-generic form of the Greek
    in line with the project's gender-accurate policy.
- source_word: ἐποίησεν
  chosen: has done
  alternatives:
  - did
  lexicon: BDAG
  rationale: English present perfect conveys a completed act with present relevance
    and reads naturally in this comparative claim.
- source_word: ἐπ' αὐτῆς
  chosen: against her
  alternatives:
  - upon her
  - on her
  lexicon: BDAG
  rationale: Given the hostile context, the prepositional phrase is best expressed
    idiomatically as action directed against the city, rather than merely location
    upon it.
- source_word: ὅσα ἐποίησαν
  chosen: what they did
  alternatives:
  - the things they did
  - as much as they did
  lexicon: BDAG
  rationale: This preserves the comparative sense without over-literal awkwardness.
    'What they did' is the clearest natural equivalent.
