  category: mistranslation
  tier: 2
  from: against her
  to: upon it
  rationale: The feminine pronoun αὐτῆς refers back to its immediate antecedent in
    verse 10, ἡ γῆ ('the earth'). The phrase ἐπ' αὐτῆς means 'upon it' (i.e., no man
    on earth), not 'against her' (Jerusalem, which is not introduced until verse 13).
    The draft's hostile interpretation misses the spatial reference to the earth.
