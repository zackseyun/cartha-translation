id: PSS.2.15
reference: Psalms of Solomon 2:15
source:
  edition: lxx-swete-1909
  text: ἀνθ' ὧν αὐταὶ ἐμίαυσαν ἁγνὰ ἐν ῥύμῳ ἀναμίξεως. τὴν κοιλίαν μου καὶ τὰ σπλάγχνα μου πονῶ ἐπὶ τούτοις.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: Because they themselves defiled pure things in the filth of illicit mingling. My belly and my inward parts ache over these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holy things' for 'pure things.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'mingling' literally; the phrase likely carries a morally charged or sexual sense here.
    reason: cultural_note
  - marker: c
    text: Or 'in a street'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀνθ' ὧν
  chosen: Because
  alternatives:
  - for which reason
  - therefore because
  lexicon: BDAG
  rationale: Introduces the ground for lament in idiomatic English without overstating logical force.
- source_word: αὐταὶ
  chosen: they themselves
  alternatives:
  - they
  - those women themselves
  lexicon: BDAG
  rationale: The pronoun is emphatic and feminine; 'they themselves' preserves the emphasis without importing an explicit noun absent from the verse.
- source_word: ἐμίαυσαν
  chosen: defiled
  alternatives:
  - polluted
  - stained
  lexicon: BDAG
  rationale: '''Defiled'' best preserves moral and ritual contamination language in a grave register.'
- source_word: ἁγνὰ
  chosen: pure things
  alternatives:
  - holy things
  - pure ones
  lexicon: LSJ
  rationale: ἁγνά most naturally denotes what is pure/clean; 'holy things' is possible in context but somewhat more interpretive, so it is preserved in a footnote.
- source_word: ἐν ῥύμῳ
  chosen: in a street
  alternatives:
  - in a lane
  - in an alley
  lexicon: LSJ
  rationale: ῥύμη denotes a street or lane; 'street' is the clearest modern equivalent.
- source_word: ἀναμίξεως
  chosen: illicit mingling
  alternatives:
  - mixture
  - sexual mixing
  - promiscuity
  lexicon: LSJ
  rationale: The noun literally means mixing or mingling, but here likely carries a morally charged sense; 'illicit mingling' keeps that force while remaining somewhat transparent to the Greek image.
- source_word: τὴν κοιλίαν μου
  chosen: My belly
  alternatives:
  - my inner being
  - my stomach
  lexicon: BDAG
  rationale: A bodily term is retained for transparency; the phrase expresses visceral grief rather than merely digestion.
- source_word: τὰ σπλάγχνα μου
  chosen: my inward parts
  alternatives:
  - my heart
  - my entrails
  - my deepest self
  lexicon: BDAG
  rationale: A literal-but-readable rendering preserves the emotional intensity and bodily imagery of the lament.
- source_word: πονῶ
  chosen: ache
  alternatives:
  - am in pain
  - suffer
  lexicon: BDAG
  rationale: Present-tense visceral pain is expressed naturally in English with 'ache.'
- source_word: ἐπὶ τούτοις
  chosen: over these things
  alternatives:
  - because of these things
  - at these things
  lexicon: BDAG
  rationale: This preserves the causal/emotional relation of the grief to the actions just described.
