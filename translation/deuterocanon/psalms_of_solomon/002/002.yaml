id: PSS.2.2
reference: Psalms of Solomon 2:2
source:
  edition: lxx-swete-1909
  text: ἀνέβησαν ἐπὶ τὸ θυσιαστήριόν σου ἔθνη ἀλλότρια, κατεπάτησαν ἐν ὑποδήμασιν
    αὐτῶν ἐν ὑπερηφανίᾳ.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: Foreign nations went up onto your altar; they trampled it with their sandals
    in arrogance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Gentiles'; ἔθνη can mean 'nations' generally or, in a Jewish cultic
      context, non-Israelite peoples specifically.
    reason: lexical_alternative
  - marker: b
    text: Or 'alien' or 'strange' nations, preserving the added sense of otherness
      in ἀλλότρια.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβησαν
  chosen: went up onto
  alternatives:
  - ascended onto
  - came up against
  lexicon: BDAG
  rationale: The verb literally means 'went up' or 'ascended.' With ἐπὶ τὸ θυσιαστήριόν
    σου, 'went up onto' preserves the concrete movement onto the altar without adding
    an interpretive military nuance.
- source_word: θυσιαστήριον
  chosen: altar
  alternatives:
  - sacrificial altar
  lexicon: BDAG
  rationale: '''Altar'' is the standard and natural rendering for θυσιαστήριον. ''Sacrificial
    altar'' is more explicit but unnecessarily heavy in English here.'
- source_word: ἔθνη ἀλλότρια
  chosen: Foreign nations
  alternatives:
  - foreign peoples
  - Gentiles from abroad
  - alien nations
  lexicon: BDAG
  rationale: ἔθνη normally means 'nations' or 'Gentiles,' and ἀλλότρια adds the sense
    of foreignness or estrangement. 'Foreign nations' preserves both elements clearly
    and avoids overloading the phrase with later technical connotations.
- source_word: κατεπάτησαν
  chosen: trampled
  alternatives:
  - trod down
  - stamped on
  lexicon: BDAG
  rationale: The verb conveys forceful desecration underfoot. 'Trampled' is vivid,
    natural English and fits the profanation context well.
- source_word: ἐν ὑποδήμασιν αὐτῶν
  chosen: with their sandals
  alternatives:
  - in their sandals
  - with their shoes
  lexicon: BDAG
  rationale: The phrase marks the means or circumstance of trampling. 'With their
    sandals' is more historically and culturally fitting than 'with their shoes' and
    preserves the image of defilement.
- source_word: ἐν ὑπερηφανίᾳ
  chosen: in arrogance
  alternatives:
  - in pride
  - in haughtiness
  - insolently
  lexicon: BDAG
  rationale: '''In arrogance'' best captures the manner and moral tone of the act
    in readable modern English. ''Pride'' is possible but less sharp in this context
    of sacrilege.'
