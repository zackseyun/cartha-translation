  source_review: state/reviews/gemini/phase10_greek_apocrypha/deuterocanon/psalms_of_solomon/002/020.job-73038.json
  category: mistranslation
  tier: 2
  from: For the nations saw Jerusalem trampled down;
  to: For the nations reproached Jerusalem in her trampling;
  rationale: The draft incorrectly parses συνείδισαν as a form of συνοράω ("to see"). The aorist of συνοράω is συνεῖδον/συνείδοσαν; the -ισαν ending is morphologically impossible for that verb. συνείδισαν is a known manuscript variant or corruption of ὠνείδισαν (from ὀνειδίζω, "to reproach, mock"), likely arising from uncial confusion (C for O). This restores the correct meaning, which aligns with the theme of mockery in 2:25. Consequently, ἐν καταπατήσει should be rendered as a noun phrase ("in her trampling" or "as she was trampled down") rather than a participial complement to "saw".
