id: PSS.2.20
reference: Psalms of Solomon 2:20
source:
  edition: lxx-swete-1909
  text: συνείδισαν γὰρ ἔθνη Ἰερουσαλὴμ ἐν καταπατήσει· κατέσπασεν τὸ κάλλος αὐτῆς ἀπὸ θρόνου δόξης.
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: For the nations reproached Jerusalem in her trampling; they pulled her splendor down from the throne of glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her beauty' instead of 'her splendor.'
    reason: lexical_alternative
  - marker: b
    text: The Greek literally says 'from the throne of glory'; this may also be understood as 'from a glorious throne.'
    reason: lexical_alternative
  - marker: c
    text: Or 'For the nations saw Jerusalem trampled down;'.
    reason: previous_rendering
lexical_decisions:
- source_word: συνείδισαν
  chosen: saw
  alternatives:
  - noticed
  - looked on
  - recognized
  lexicon: LSJ
  rationale: A basic perception verb fits the clause well without importing an interpretive nuance such as approval, contempt, or full recognition. 'Saw' is the most transparent English rendering here.
- source_word: ἐν καταπατήσει
  chosen: trampled down
  alternatives:
  - in trampling
  - under trampling
  lexicon: LSJ
  rationale: The noun denotes trampling or being trodden underfoot. Rendering it idiomatically as 'trampled down' communicates the state of Jerusalem in natural English while staying close to the Greek image.
- source_word: κατέσπασεν
  chosen: pulled ... down
  alternatives:
  - dragged ... down
  - tore down
  - brought ... down
  lexicon: LSJ
  rationale: The verb conveys forceful downward action. 'Pulled down' preserves that concrete image and works well with the following phrase 'from the throne of glory.'
- source_word: τὸ κάλλος αὐτῆς
  chosen: her splendor
  alternatives:
  - her beauty
  - her magnificence
  lexicon: LSJ
  rationale: κάλλος can mean beauty, but in this context of Jerusalem's exalted public dignity, 'splendor' better conveys visible glory without sounding merely aesthetic.
- source_word: ἀπὸ θρόνου δόξης
  chosen: from the throne of glory
  alternatives:
  - from a glorious throne
  - from a throne of splendor
  lexicon: LSJ
  rationale: The genitive is retained in a fairly literal way because the phrase is vivid and comprehensible in English. This preserves the elevated, honor-laden imagery of Jerusalem's former status.
