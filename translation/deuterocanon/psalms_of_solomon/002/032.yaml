id: PSS.2.32
reference: Psalms of Solomon 2:32
source:
  edition: lxx-swete-1909
  text: ὅτι ἐξουδένωσεν αὐτὸν ἐν ἀτιμίᾳ· οὐκ ἐλογίσατο ὅτι ἄνθρωπός ἐστιν, καὶ τὸ ὕστερον οὐκ ἐλογίσατο.
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: because God despised him in dishonor; he did not consider that he was a man, and he did not consider the outcome.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the end' or 'what came after.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because he treated him with contempt and dishonor; he did not consider that he is a man'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐξουδένωσεν
  chosen: treated ... with contempt
  alternatives:
  - despised
  - regarded as nothing
  lexicon: BDAG
  rationale: The verb carries the sense of treating someone as nothing or with contempt. 'Treated ... with contempt' is natural English and preserves the force better than a flatter 'despised.'
- source_word: ἐν ἀτιμίᾳ
  chosen: with dishonor
  alternatives:
  - in dishonor
  - in disgrace
  lexicon: BDAG
  rationale: ἀτιμία denotes dishonor or disgrace. In English, combining it with the verb as 'with contempt and dishonor' communicates both the manner and the shame involved without awkwardness.
- source_word: ἐλογίσατο
  chosen: consider
  alternatives:
  - reckon
  - take into account
  - think about
  lexicon: BDAG
  rationale: The repeated verb marks deliberate consideration or accounting. 'Consider' is clear, readable, and fits both occurrences consistently.
- source_word: ἄνθρωπός
  chosen: man
  alternatives:
  - human being
  lexicon: BDAG
  rationale: The Greek is singular and masculine in form. 'Man' preserves the source wording and likely rhetorical force better than the more generic 'human being,' while still referring to human mortality or frailty.
- source_word: τὸ ὕστερον
  chosen: the outcome
  alternatives:
  - the end
  - what came after
  - the aftermath
  lexicon: BDAG
  rationale: The phrase most likely points to the later result or eventual consequence. 'The outcome' is idiomatic modern English and captures that forward-looking sense without overinterpreting.
