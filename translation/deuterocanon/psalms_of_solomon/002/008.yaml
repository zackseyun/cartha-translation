id: PSS.2.8
reference: Psalms of Solomon 2:8
source:
  edition: lxx-swete-1909
  text: ἀπέστρεψεν γὰρ τὸ πρόσωπον αὐτοῦ ἀπὸ ἐλέους αὐτῶν, νέον καὶ πρεσβύτην καὶ
    τέκνα αὐτῶν εἰς ἅπαξ·
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: For he turned his face away from mercy toward them—young and old and their
    children, all at once.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turned his face away from pitying them.'
    reason: lexical_alternative
  - marker: b
    text: '''Young and old'' renders singular Greek forms used collectively.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψεν
  chosen: turned ... away
  alternatives:
  - turned back
  - withdrew
  lexicon: BDAG
  rationale: The verb indicates turning away or withdrawing. With πρόσωπον as its
    object, 'turned his face away' preserves the concrete Greek image while remaining
    natural English.
- source_word: τὸ πρόσωπον αὐτοῦ
  chosen: his face
  alternatives:
  - his presence
  - his countenance
  lexicon: BDAG
  rationale: A literal rendering best preserves the biblical idiom. 'Presence' would
    interpret the figure rather than translate it.
- source_word: ἀπὸ ἐλέους αὐτῶν
  chosen: from showing them mercy
  alternatives:
  - from mercy toward them
  - from pitying them
  lexicon: BDAG
  rationale: The construction is somewhat compressed in Greek. 'From showing them
    mercy' makes explicit the sense of withholding mercy without losing the force
    of ἔλεος.
- source_word: νέον καὶ πρεσβύτην
  chosen: young and old
  alternatives:
  - young man and old man
  - the young and the elder
  lexicon: BDAG
  rationale: Although both forms are singular, the pair functions distributively and
    idiomatically refers to all ages. 'Young and old' is the most natural equivalent.
- source_word: τέκνα αὐτῶν
  chosen: their children
  alternatives:
  - their sons
  - their offspring
  lexicon: BDAG
  rationale: τέκνα is broader than 'sons' and naturally rendered 'children' here.
- source_word: εἰς ἅπαξ
  chosen: all at once
  alternatives:
  - altogether
  - at one stroke
  lexicon: BDAG
  rationale: The phrase conveys totality/simultaneity. 'All at once' is clear modern
    English and fits the judgment context.
