theological_decisions:
- issue: Anthropomorphic language about the subject turning his face away
  chosen_reading: Preserved the concrete idiom 'turned his face away' rather than
    interpreting it abstractly.
  alternative_readings:
  - withdrew his mercy
  - withheld compassion
  rationale: The text uses embodied, relational imagery. Preserving that tension matches
    the project's philosophy of not flattening theological language into abstraction.
  doctrine_reference: Preserve theological tension rather than resolve it.
