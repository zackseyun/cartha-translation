id: PSS.2.13
reference: Psalms of Solomon 2:13
source:
  edition: lxx-swete-1909
  text: ἔστησαν τοὺς υἱοὺς Ἱερουσαλὴμ εἰς ἐμπαιγμόν, ἀντὶ πορνῶν ἐν αὐτῇ· πᾶς ὁ πορευόμενος
    εἰσεπορεύετο κατέναντι τοῦ ἡλίου· ἐνέπαιζον ταῖς ἀνομίαις αὐτῶν.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: They made the sons of Jerusalem a mockery, like prostitutes within her; everyone
    passing by would enter in broad daylight; they mocked them with their lawless
    deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'before the sun' — that is, openly or publicly.
    reason: lexical_alternative
  - marker: b
    text: Or 'as prostitutes'; the Greek phrase may be read more literally as 'instead
      of prostitutes,' but the contextual sense is comparative humiliation.
    reason: alternative_reading
  - marker: c
    text: Or 'would go in openly, in broad daylight'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔστησαν
  chosen: made
  alternatives:
  - set
  - appointed
  - placed
  lexicon: LSJ
  rationale: The verb literally means 'set' or 'place,' but in the idiom εἰς ἐμπαιγμόν
    it means causing someone to become an object of ridicule. 'Made' gives the English
    sense naturally without losing force.
- source_word: τοὺς υἱοὺς Ἱερουσαλήμ
  chosen: the sons of Jerusalem
  alternatives:
  - the children of Jerusalem
  - Jerusalem's people
  lexicon: LSJ
  rationale: The Greek is explicitly masculine plural, and the project's philosophy
    prefers gender-accurate rendering where the source is masculine. 'Sons of Jerusalem'
    preserves both the familial metaphor and the source form.
- source_word: εἰς ἐμπαιγμόν
  chosen: an object of mockery
  alternatives:
  - for derision
  - for ridicule
  lexicon: LSJ
  rationale: This phrase expresses resultant public humiliation. 'An object of mockery'
    is idiomatic and preserves the shame-focused sense.
- source_word: ἀντὶ πορνῶν
  chosen: like prostitutes
  alternatives:
  - instead of prostitutes
  - as prostitutes
  lexicon: LSJ
  rationale: 'ἀντί can mean ''instead of'' more strictly, but here the sense is comparative:
    Jerusalem''s sons were treated with the same public shame associated with prostitutes.
    ''Like prostitutes'' best communicates the image in context.'
- source_word: πᾶς ὁ πορευόμενος εἰσεπορεύετο
  chosen: everyone passing by would go in
  alternatives:
  - every passerby entered
  - everyone going along went in
  lexicon: LSJ
  rationale: The repeated motion verbs emphasize continual, shameless traffic. 'Everyone
    passing by would go in' conveys the iterative sense clearly in English.
- source_word: κατέναντι τοῦ ἡλίου
  chosen: in broad daylight
  alternatives:
  - before the sun
  - openly before the sun
  lexicon: LSJ
  rationale: The expression is literally 'before the sun,' but idiomatically means
    openly and publicly. 'In broad daylight' preserves the image's force in natural
    English.
- source_word: ἐνέπαιζον
  chosen: made sport
  alternatives:
  - mocked
  - played the wanton
  - ridiculed
  lexicon: LSJ
  rationale: The verb continues the theme of contemptuous public humiliation. 'Made
    sport' keeps the mocking sense and fits the object/instrument phrase that follows.
- source_word: ταῖς ἀνομίαις αὐτῶν
  chosen: with their lawless deeds
  alternatives:
  - in their acts of lawlessness
  - by their lawless acts
  lexicon: LSJ
  rationale: ἀνομία here is best rendered morally rather than merely legally. 'Lawless
    deeds' preserves the active, wicked character of the conduct.
