id: PSS.2.19
reference: Psalms of Solomon 2:19
source:
  edition: lxx-swete-1909
  text: ἐδήλωσας τὸ μνημόσυνον αὐτῶν ἀπὸ τῆς γῆς. ὁ θεὸς κριτὴς δίκαιος, καὶ οὐ θαυμάσει πρόσωπον.
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: You made their memory known from the earth. God is a righteous judge, and he will not show partiality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally uses a verb meaning 'made known' or 'made manifest'; the wording is unusual here, and the translation reflects the likely sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the land' instead of 'from the earth.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'will not admire a face'; this is a Greek idiom for showing no partiality.
    reason: lexical_alternative
  - marker: d
    text: Or 'You made their memory disappear'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐδήλωσας
  chosen: made ... disappear
  alternatives:
  - made known
  - made manifest
  - made clear
  lexicon: BDAG
  rationale: δηλόω ordinarily means 'make known' or 'make manifest.' In this line, however, that ordinary sense sits awkwardly with 'their memory from the earth.' Given the immediate context of exposed sins and divine judgment, the clause most naturally points to the public removal of their remembered presence. 'Made their memory disappear' is therefore an interpretive rendering that preserves the verse's apparent sense while acknowledging the Greek's unusual wording.
- source_word: τὸ μνημόσυνον αὐτῶν
  chosen: their memory
  alternatives:
  - their memorial
  - their remembrance
  lexicon: BDAG
  rationale: μνημόσυνον denotes remembrance or memorial. 'Their memory' is the most natural English expression in an idiom about erasure from the earth.
- source_word: ἀπὸ τῆς γῆς
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' In an idiom of removing memory, 'earth' better conveys broad human remembrance rather than a single territory.
- source_word: κριτὴς δίκαιος
  chosen: a righteous judge
  alternatives:
  - a just judge
  lexicon: BDAG
  rationale: This straightforward predicate identifies God by his morally right judicial character. 'Righteous judge' preserves both the forensic and ethical force.
- source_word: οὐ θαυμάσει πρόσωπον
  chosen: he will not show partiality
  alternatives:
  - he will not admire a face
  - he will not regard persons
  lexicon: BDAG
  rationale: The expression is an idiom for partiality or favoritism based on the person before the judge. 'He will not show partiality' gives the idiomatic sense in clear English rather than preserving the opaque literal image.
