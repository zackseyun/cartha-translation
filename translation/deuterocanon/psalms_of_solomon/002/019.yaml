theological_decisions:
- issue: How to render the unusual first clause without overstating certainty
  chosen_reading: Translate the clause as removal of memory from the earth, while flagging in a footnote that the Greek verb more literally means 'made known' or 'made manifest.'
  alternative_readings:
  - You made their memorial known from the earth.
  - You made their remembrance plain from the earth.
  rationale: A more literal rendering is possible, but in English it is obscure and does not fit the judicial context well. The chosen rendering best captures the likely sense of public eradication while preserving the lexical tension in a footnote.
  doctrine_reference: 'Translation philosophy #3 (preserve theological tension rather than resolve it)'
