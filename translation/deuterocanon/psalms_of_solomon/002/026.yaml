id: PSS.2.26
reference: Psalms of Solomon 2:26
source:
  edition: lxx-swete-1909
  text: καὶ συντελεσθήσονται, ἐὰν μὴ σύ, Κύριε, ἐπιτιμήσεις αὐτοῖς ἐν ὀργῇ σου.
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: And they will be brought to an end, unless you, Lord, rebuke them in your
    wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be finished off' or 'will be destroyed' for 'will be brought to
      an end' (συντελεσθήσονται).
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - and then
  lexicon: LSJ
  rationale: A simple connective continuing the prayer's argument; 'And' preserves
    the flow without adding nuance not explicit in the Greek.
- source_word: συντελεσθήσονται
  chosen: will be brought to an end
  alternatives:
  - will be finished off
  - will be destroyed
  - will be completed
  lexicon: LSJ
  rationale: The future passive of συντελέω denotes being brought to completion or
    ended. In this hostile context, 'will be brought to an end' preserves the passive
    form and judicial force without over-specifying the manner of their end.
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  lexicon: LSJ
  rationale: This is the natural English rendering of the conditional exception introduced
    by ἐὰν μή.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - O Lord
  lexicon: LSJ
  rationale: Direct address to κύριος should be translated, not transliterated. 'Lord'
    follows the project's default rendering and fits the prayerful address.
- source_word: ἐπιτιμήσεις
  chosen: rebuke
  alternatives:
  - reprove
  - check
  - censure
  lexicon: LSJ
  rationale: ἐπιτιμάω commonly carries the sense of stern rebuke or authoritative
    reprimand. 'Rebuke' best preserves the force of divine intervention here.
- source_word: ἐν ὀργῇ σου
  chosen: in your wrath
  alternatives:
  - in your anger
  - with your wrath
  lexicon: LSJ
  rationale: ὀργή here has a judicial and severe sense. 'Wrath' better preserves that
    gravity than the milder 'anger,' while still remaining natural English.
