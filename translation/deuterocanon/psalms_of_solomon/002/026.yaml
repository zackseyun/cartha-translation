  category: grammar
  tier: 2
  from: And they will be brought to an end, unless you, Lord, rebuke them
  to: And Israel will be brought to an end, unless you, Lord, rebuke them
  rationale: In Greek, the switch from the active verbs in v. 25 (the nations mocked) to the passive συντελεσθήσονται in v. 26 signals a change in subject to the victims (Israel, from v. 24). In English, translating both the unexpressed subject and the object (αὐτοῖς) as 'they/them' creates a nonsensical reading where the nations will be destroyed unless God rebukes them. Supplying 'Israel' (the explicit antecedent from v. 24) as the subject resolves the ambiguity and preserves the author's meaning.
