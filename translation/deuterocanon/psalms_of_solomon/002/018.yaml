id: PSS.2.18
reference: Psalms of Solomon 2:18
source:
  edition: lxx-swete-1909
  text: ἀνέκαλυψας τὰς ἁμαρτίας αὐτῶν, ἵνα φανῇ τὸ κρίμα σου
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: You exposed their sins so that your judgment might be seen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You uncovered their sins.”
    reason: lexical_alternative
  - marker: b
    text: Or “so that your judgment might appear.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέκαλυψας
  chosen: exposed
  alternatives:
  - uncovered
  - revealed
  - laid bare
  lexicon: BDAG
  rationale: The verb carries the sense of uncovering what was hidden. “Exposed” is
    natural modern English and preserves the force of bringing sins into the open
    for public moral disclosure.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - offenses
  lexicon: BDAG
  rationale: The standard rendering “sins” best matches the moral and theological
    weight of ἁμαρτία without weakening it.
- source_word: ἵνα φανῇ
  chosen: so that ... might be seen
  alternatives:
  - in order that ... might appear
  - so that ... might be made manifest
  lexicon: BDAG
  rationale: This clause expresses purpose or result. “Might be seen” reflects the
    passive/intransitive force of φανῇ in clear contemporary English.
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - sentence
  - verdict
  lexicon: BDAG
  rationale: “Judgment” is the broadest and most contextually fitting rendering here,
    referring to God’s judicial action without narrowing the sense too specifically
    to a formal sentence.
