  source_review: state/reviews/gemini/phase10_greek_apocrypha/deuterocanon/psalms_of_solomon/002/035.job-73053.json
  category: mistranslation
  tier: 2
  from: brings the proud
  to: lays the proud to sleep
  rationale: The draft translates `κομίζων` ('brings'), which is a typo in the provided source text for the actual Swete reading `κοιμίζων` ('putting to sleep' or 'laying down'). The author's poetic intent relies on the antithetic parallelism between `ἀνιστῶν` (raising up) and `κοιμίζων` (laying down / putting to sleep). 'Brings' flattens this contrast entirely.
