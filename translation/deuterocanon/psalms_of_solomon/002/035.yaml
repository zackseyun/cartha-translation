id: PSS.2.35
reference: Psalms of Solomon 2:35
source:
  edition: lxx-swete-1909
  text: ὁ ἀνιστῶν ἐμέ εἰς δόξαν, καὶ κομίζων ὑπερηφάνους εἰς ἀπωλίαν αἰῶνος ἐν ἀτιμίᾳ, ὅτι οὐκ ἔγνωσαν αὐτόν.
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: the one who raises me to glory and lays the proud to sleep to everlasting destruction in disgrace, because they did not know him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eternal destruction'; more literally, 'destruction of the age.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in dishonor.'
    reason: lexical_alternative
  - marker: c
    text: Or 'did not recognize him' or 'did not acknowledge him.'
    reason: lexical_alternative
  - marker: d
    text: Or 'brings the proud'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀνιστῶν
  chosen: raises
  alternatives:
  - raises up
  - exalts
  lexicon: BDAG
  rationale: The participle denotes lifting or causing to rise. 'Raises' preserves the upward movement and avoids over-interpreting it as purely honorary exaltation, though the following 'to glory' gives it exalted force.
- source_word: εἰς δόξαν
  chosen: to glory
  alternatives:
  - into glory
  - for glory
  lexicon: BDAG
  rationale: The preposition εἰς naturally points to result or goal. 'To glory' is idiomatic and keeps the destination/result sense without adding interpretive weight.
- source_word: κομίζων
  chosen: brings
  alternatives:
  - carries
  - repays
  - deals out
  lexicon: BDAG
  rationale: The core sense is to bring or carry, though in some contexts it can imply receiving or repaying. Here 'brings' stays closest to the Greek wording and fits the εἰς + accusative construction that follows.
- source_word: ὑπερηφάνους
  chosen: the proud
  alternatives:
  - the arrogant
  - proud men
  lexicon: BDAG
  rationale: '''The proud'' is the most natural English substantive rendering and preserves the moral sense of haughtiness without unnecessarily specifying gender.'
- source_word: ἀπωλίαν αἰῶνος
  chosen: everlasting destruction
  alternatives:
  - eternal destruction
  - destruction forever
  - destruction of the age
  lexicon: BDAG
  rationale: αἰῶνος here most likely gives destruction an unending or enduring force. 'Everlasting destruction' is clear modern English while remaining close to the phrase. The more literal 'destruction of the age' is possible but less likely in context.
- source_word: ἐν ἀτιμίᾳ
  chosen: in disgrace
  alternatives:
  - in dishonor
  - with shame
  lexicon: BDAG
  rationale: '''In disgrace'' renders the dative phrase idiomatically in English and preserves the public-humiliation sense of ἀτιμία.'
- source_word: ἔγνωσαν
  chosen: did not know
  alternatives:
  - did not recognize
  - did not acknowledge
  lexicon: BDAG
  rationale: The verb can include recognition or acknowledgment, but 'did not know' is the broadest and most transparent rendering, leaving the relational and moral dimensions intact.
