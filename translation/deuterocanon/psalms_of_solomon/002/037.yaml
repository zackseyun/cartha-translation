id: PSS.2.37
reference: Psalms of Solomon 2:37
source:
  edition: lxx-swete-1909
  text: εὐλογεῖτε τὸν θεόν, οἱ φοβούμενοι τὸν κύριον ἐν ἐπιστήμῃ, ὅτι τὸ ἔλεος Κυρίου
    ἐπὶ τοὺς φοβουμένους αὐτόν, μετὰ κρίματος,
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: Bless God, you who fear the Lord with understanding, because the mercy of
    the Lord is upon those who fear him, with judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with knowledge” or “with discernment.”
    reason: lexical_alternative
  - marker: b
    text: Or “with justice”; the Greek leaves the relation between mercy and judgment
      compressed.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  - Speak well of
  lexicon: BDAG
  rationale: Imperative plural calling for direct doxological response. “Bless” preserves
    the verbal link to biblical blessing language better than the more generic “praise.”
- source_word: οἱ φοβούμενοι
  chosen: you who fear
  alternatives:
  - those who fear
  - the ones fearing
  lexicon: BDAG
  rationale: The participle functions vocatively in apposition to the imperative,
    so direct address in English is clearer and more natural than a detached third-person
    phrase.
- source_word: κύριον / Κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project’s default rendering for κύριος and matches biblical
    title usage.
- source_word: ἐν ἐπιστήμῃ
  chosen: with understanding
  alternatives:
  - in knowledge
  - with knowledge
  - with discernment
  lexicon: BDAG
  rationale: A literal “in knowledge” is awkward in English. “With understanding”
    preserves the sense of informed, knowing reverence without overinterpreting the
    phrase.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: BDAG
  rationale: “Mercy” is the most direct and established equivalent here and fits the
    devotional tone of the line.
- source_word: μετὰ κρίματος
  chosen: with judgment
  alternatives:
  - with justice
  - together with judgment
  lexicon: BDAG
  rationale: The phrase is concise and somewhat tense in Greek; “with judgment” preserves
    that tension rather than softening it to a more interpretive phrase. It likely
    qualifies the Lord’s mercy as not detached from judicial discernment.
