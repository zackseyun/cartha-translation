theological_decisions:
- issue: Relation of mercy and judgment in μετὰ κρίματος
  chosen_reading: 'The main text preserves the juxtaposition: the Lord’s mercy is
    upon those who fear him, with judgment.'
  alternative_readings:
  - the Lord’s mercy is upon those who fear him, with justice
  - the Lord’s mercy upon those who fear him is joined with judgment
  rationale: The Greek does not resolve whether κρίμα emphasizes judgment, justice,
    or judicial measure. Preserving the compressed phrase keeps the theological tension
    intact rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
