id: PSS.2.23
reference: Psalms of Solomon 2:23
source:
  edition: lxx-swete-1909
  text: ἐν ἀτιμίᾳ τὸ κάλλος αὐτῆς ἀπερρίφη ἐπὶ τὴν γῆν.
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: Her splendor was cast to the ground in disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in dishonor' or 'in shame.'
    reason: lexical_alternative
  - marker: b
    text: The feminine 'her' likely refers to a feminine antecedent in context, probably the city personified.
    reason: cross_reference
  - marker: c
    text: Or 'Her beauty was thrown'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀτιμίᾳ
  chosen: in disgrace
  alternatives:
  - in dishonor
  - in shame
  lexicon: BDAG
  rationale: The noun denotes dishonor or humiliation. 'In disgrace' is natural modern English and preserves the public-shame sense of the dative phrase without sounding archaic.
- source_word: κάλλος
  chosen: beauty
  alternatives:
  - splendor
  - comeliness
  lexicon: LSJ
  rationale: The core sense is beauty or splendor. 'Beauty' is the most direct and readable rendering here, while still allowing the context of a city's former glory.
- source_word: ἀπερρίφη
  chosen: was thrown
  alternatives:
  - was cast down
  - was hurled away
  lexicon: LSJ
  rationale: The verb conveys being thrown or cast away/down. 'Was thrown' is clear and direct; the following phrase 'to the ground' supplies the downward motion.
- source_word: ἐπὶ τὴν γῆν
  chosen: to the ground
  alternatives:
  - onto the الأرض
  - upon the ground
  lexicon: BDAG
  rationale: With motion, ἐπί plus the accusative commonly indicates movement onto or to a surface. 'To the ground' is idiomatic and fits the image of humiliation.
