id: PSS.2.29
reference: Psalms of Solomon 2:29
source:
  edition: lxx-swete-1909
  text: τοῦ ἐπιθεῖναι τὴν ὑπερηφανίαν τοῦ δράκοντος ἐν ἀτιμίᾳ.
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: to put the dragon’s pride to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'to put the pride of the dragon in disgrace.'
    reason: lexical_alternative
  - marker: b
    text: The 'dragon' is likely a figurative reference to the hostile ruler or power
      in context, but the Greek image is retained in the main text.
    reason: cross_reference
lexical_decisions:
- source_word: τοῦ ἐπιθεῖναι
  chosen: to put
  alternatives:
  - to lay
  - to bring
  - to inflict
  lexicon: LSJ
  rationale: The articular infinitive continues the prior prayer of requested repayment.
    A compact English infinitive is appropriate here. 'To put ... to shame' renders
    the construction idiomatically without importing more than the Greek warrants.
- source_word: τὴν ὑπερηφανίαν
  chosen: pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: BDAG
  rationale: The noun denotes arrogant self-exaltation. 'Pride' is the most direct
    and natural English equivalent here, while the surrounding judgment context gives
    it the negative force.
- source_word: τοῦ δράκοντος
  chosen: the dragon
  alternatives:
  - the serpent
  - the monster
  lexicon: LSJ
  rationale: The Greek image is literally 'dragon.' Keeping the metaphor preserves
    the text's vivid imagery and avoids prematurely identifying the figure in an overly
    interpretive way.
- source_word: ἐν ἀτιμίᾳ
  chosen: to shame
  alternatives:
  - in disgrace
  - in dishonor
  - in shame
  lexicon: BDAG
  rationale: The phrase expresses humiliation or dishonor. In English, folding it
    into the idiom 'put ... to shame' communicates the force clearly and naturally
    while preserving the public-humiliation sense.
