theological_decisions:
- issue: Identity of 'the dragon'
  chosen_reading: Retain the metaphor as 'the dragon' in the main text.
  alternative_readings:
  - Interpret the figure explicitly as a historical foreign ruler or oppressor
  rationale: The verse itself uses figurative language and does not name the referent here. Preserving the image keeps the translation anchored to the Greek and avoids resolving an interpretive question in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
