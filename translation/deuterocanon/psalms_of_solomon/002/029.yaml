  rationale: 'Adjudicator-modified: The reviewer is correct that ''put to shame'' flattens the specific lexical weight of ἀτιμία (dishonor/disgrace), which is highly relevant here given the historical context of Pompey''s unburied corpse (a literal ''dishonor''). Furthermore, the construction ἐπιθεῖναι... ἐν likely reflects a Hebrew substrate (such as שׂים ב) meaning ''to make into'' or ''to turn into.'' ''To turn the arrogance of the dragon into dishonor'' captures this substrate and the specific meaning of ἀτιμία more accurately than the c'
