id: PSS.2.12
reference: Psalms of Solomon 2:12
source:
  edition: lxx-swete-1909
  text: καὶ γνώσεται ἡ γῆ τὰ κρίματά σου πάντα τὰ δίκαια, ὁ θεός.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: And the earth will know all your righteous judgments, O God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "all your just judgments."
    reason: lexical_alternative
lexical_decisions:
- source_word: γνώσεται
  chosen: will know
  alternatives:
  - will recognize
  - will learn
  lexicon: BDAG
  rationale: Future middle of γινώσκω; "will know" is the most direct and natural
    English rendering, expressing coming recognition or acknowledgment without overinterpreting
    the nuance.
- source_word: ἡ γῆ
  chosen: the earth
  alternatives:
  - the land
  - the world
  lexicon: BDAG
  rationale: γῆ can mean land or earth; here the universal scope with "all your righteous
    judgments" favors "the earth" rather than a narrower territorial sense.
- source_word: τὰ κρίματά σου
  chosen: your judgments
  alternatives:
  - your judgments rendered
  - your judicial acts
  - your decrees
  lexicon: BDAG
  rationale: κρίματα commonly denotes judgments or judicial decisions. "Your judgments"
    preserves the forensic sense without unnecessary expansion.
- source_word: πάντα
  chosen: all
  alternatives:
  - all things
  - every one of
  lexicon: BDAG
  rationale: 'Placed attributively with the phrase, it naturally modifies the whole
    object phrase: the earth will know all of God''s righteous judgments.'
- source_word: τὰ δίκαια
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: BDAG
  rationale: As an attributive adjective modifying κρίματα, δίκαια may be rendered
    "righteous" or "just." "Righteous" preserves the moral quality of God's judgments,
    while "just" remains a viable alternative.
- source_word: ὁ θεός
  chosen: O God
  alternatives:
  - God
  lexicon: BDAG
  rationale: The nominative with article is used vocatively here. Rendering it as
    direct address in English best reflects the prayerful tone.
