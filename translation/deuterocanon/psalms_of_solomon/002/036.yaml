theological_decisions:
- issue: How explicitly to state the subject after ὅτι
  chosen_reading: for he is a great and righteous king
  alternative_readings:
  - for the Lord is a great and righteous king
  rationale: The subject is implied from the immediately preceding "the judgment of
    the Lord." English idiom benefits from supplying "he is," while keeping the focus
    on the Lord's righteous kingship as the ground of his judgment.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
