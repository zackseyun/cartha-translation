id: PSS.2.36
reference: Psalms of Solomon 2:36
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἴδετε, οἱ μεγιστᾶνες τῆς γῆς, τὸ κρίμα τοῦ κυρίου ὅτι μέγας βασιλεὺς
    καὶ δίκαιος, κρίνων τὴν ὑπʼ οὐρανόν.
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: And now see, you nobles of the earth, the judgment of the Lord, that he is
    a great and righteous king, judging what is under heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "great men," "magnates," or "rulers."
    reason: lexical_alternative
  - marker: b
    text: More literally, "judging the under-heaven [realm]"; alternatively, "judging
      the earth under heaven" or "the world under heaven."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδετε
  chosen: see
  alternatives:
  - behold
  - look
  lexicon: BDAG
  rationale: The imperative calls the audience to attend to what God has done. "See"
    is direct, natural English and keeps the force without sounding archaic like "behold."
- source_word: μεγιστᾶνες
  chosen: nobles
  alternatives:
  - magnates
  - great men
  - rulers
  lexicon: BDAG
  rationale: The word refers to leading or high-status men. "Nobles" best fits the
    elevated public address and preserves the social-political sense better than the
    less natural "magnates."
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - verdict
  - justice
  lexicon: BDAG
  rationale: In this context the noun points to the Lord's judicial act or sentence
    against earthly powers. "Judgment" is the clearest and broadest rendering, while
    "verdict" is narrower and "justice" more abstract.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - the Lord
  lexicon: BDAG
  rationale: Following the project's default for κύριος as a divine title, "Lord"
    is used here. The genitive is naturally rendered as "of the Lord."
- source_word: μέγας βασιλεὺς καὶ δίκαιος
  chosen: a great and righteous king
  alternatives:
  - a great king and righteous
  - a great king, righteous
  lexicon: BDAG
  rationale: The adjectives are most naturally taken together with βασιλεύς. English
    requires a smoother predicate expression, and "a great and righteous king" preserves
    both royal majesty and moral rectitude.
- source_word: κρίνων τὴν ὑπʼ οὐρανόν
  chosen: judging all that is under heaven
  alternatives:
  - judging the earth under heaven
  - judging the world under heaven
  lexicon: BDAG
  rationale: The participle expresses ongoing judicial rule. The phrase τὴν ὑπʼ οὐρανόν
    is elliptical and refers to the realm under heaven; "all that is under heaven"
    preserves the scope without forcing an explicit noun not written in the Greek.
