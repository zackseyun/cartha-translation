  category: mistranslation
  tier: 2
  from: He was despised in the sight of God; he was utterly dishonored.
  to: It was despised in the sight of God; it was utterly dishonored.
  rationale: The unexpressed subject of the singular verbs ἐξουδενώθη and ἠτιμώθη refers back to the sanctuary/altar (τὸ θυσιαστήριον, v. 2) or the beauty of God's glory (τὸ κάλλος, v. 4) which God has rejected. Translating it as 'He' incorrectly points back to the 'sinner' (Pompey) from v. 1, who is currently triumphant and is not dishonored until the end of the psalm. The subject must be 'It'.
