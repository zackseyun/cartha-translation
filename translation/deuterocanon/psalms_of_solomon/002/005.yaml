id: PSS.2.5
reference: Psalms of Solomon 2:5
source:
  edition: lxx-swete-1909
  text: ἐξουδενώθη ἐνώπιον τοῦ θεοῦ, ἠτιμώθη ἕως εἰς τέλος.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: It was despised in the sight of God; it was utterly dishonored.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He was treated as nothing in the sight of God.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he was dishonored unto the end.'
    reason: lexical_alternative
  - marker: c
    text: Or 'He was despised in the sight of God; he was utterly dishonored.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐξουδενώθη
  chosen: was despised
  alternatives:
  - was treated as nothing
  - was brought to nothing
  lexicon: LSJ
  rationale: The passive of ἐξουδενόω conveys being regarded as nothing or despised. 'Was despised' is natural English and preserves the shame-laden sense without over-paraphrasing.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: in the sight of God
  alternatives:
  - before God
  lexicon: LSJ
  rationale: The phrase marks evaluation in God's presence or view. 'In the sight of God' is slightly more idiomatic in English while retaining the judicial/moral force.
- source_word: ἠτιμώθη
  chosen: was dishonored
  alternatives:
  - was disgraced
  - was treated shamefully
  lexicon: LSJ
  rationale: The verb centers on dishonor and loss of status. 'Was dishonored' stays close to the Greek and matches the verse's parallelism.
- source_word: ἕως εἰς τέλος
  chosen: utterly
  alternatives:
  - to the end
  - completely
  lexicon: LSJ
  rationale: Here the phrase intensifies the extent of the dishonor. 'Utterly' gives the force in clear modern English, while a more literal rendering is preserved in a footnote.
