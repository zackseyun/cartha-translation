id: PSS.2.38
reference: Psalms of Solomon 2:38
source:
  edition: lxx-swete-1909
  text: τοῦ διαστεῖλαι ἀνὰ μέσον δικαίου καὶ ἁμαρτωλοῦ, ἀποδοῦναι ἁμαρτωλοῖς εἰς τὸν
    αἰῶνα κατὰ τὰ ἔργα αὐτῶν·
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: to distinguish between the righteous and the sinner, to repay sinners forever
    according to their deeds;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to separate between the righteous and the sinner.”
    reason: lexical_alternative
  - marker: b
    text: Literally “for the age”; here likely meaning enduringly or forever.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαστεῖλαι
  chosen: distinguish
  alternatives:
  - separate
  - make a distinction
  lexicon: BDAG
  rationale: The verb here concerns making a clear differentiation between two moral
    classes. “Distinguish” is natural English and preserves the judicial-discriminating
    sense without over-physicalizing it as mere spatial separation.
- source_word: ἀνὰ μέσον
  chosen: between
  alternatives:
  - in the midst of
  - in distinction between
  lexicon: BDAG
  rationale: This idiom regularly marks separation or distinction between two parties.
    “Between” is the most direct and idiomatic rendering in English.
- source_word: δικαίου
  chosen: the righteous
  alternatives:
  - the righteous man
  - the just
  lexicon: BDAG
  rationale: The singular functions generically for a class. “The righteous” preserves
    that representative force in readable English better than the more individualized
    “the righteous man.”
- source_word: ἁμαρτωλοῦ
  chosen: the sinner
  alternatives:
  - the sinful man
  - the wicked
  lexicon: BDAG
  rationale: The noun is singular and paired with δικαίου as a moral counterpart.
    “The sinner” is the closest straightforward equivalent.
- source_word: ἀποδοῦναι
  chosen: repay
  alternatives:
  - render
  - pay back
  - give in return
  lexicon: BDAG
  rationale: In this judgment context the verb carries recompense according to deeds.
    “Repay” communicates retributive correspondence clearly and compactly.
- source_word: ἁμαρτωλοῖς
  chosen: sinners
  alternatives:
  - to sinners
  - the sinful
  lexicon: BDAG
  rationale: The dative is governed by “repay” in English as its indirect object.
    Rendering simply as “sinners” after “repay” yields natural syntax while preserving
    the referent.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for ever
  - unto eternity
  lexicon: BDAG
  rationale: In this punitive context the phrase denotes enduring continuance. “Forever”
    is idiomatic modern English, while a more literal “for the age” would be obscure.
- source_word: κατὰ τὰ ἔργα αὐτῶν
  chosen: according to their deeds
  alternatives:
  - according to their works
  - in accordance with what they have done
  lexicon: BDAG
  rationale: “Deeds” is clear, natural, and morally weighty. “Works” is possible but
    can sound overly traditional or technical in English.
