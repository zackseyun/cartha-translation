theological_decisions:
- issue: Generic singular moral categories
  chosen_reading: Rendered δικαίου and ἁμαρτωλοῦ as class-representative terms (“the
    righteous” / “the sinner”) rather than as individualized male figures.
  alternative_readings:
  - the righteous man and the sinner
  - the just and the sinner
  rationale: The Greek singulars function proverbially or generically in a judgment
    setting. This preserves the moral contrast without importing unnecessary male-specific
    wording into English.
  doctrine_reference: Gender-accurate over gender-neutral
