  text: καθὰ ἐποίουν αὐτοί, ἀπέναντι τοῦ ἡλίου παρεδειγμάτισαν ἀδικίας αὐτῶν. καὶ θυγατέρες Ἱερουσαλὴμ βέβηλοι κατὰ τὸ κρίμα σου,
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: Just as they themselves used to do, they put their As they did, they put their iniquities on display in broad daylight, and the daughters of Jerusalem were profane according to your judgment, on display in broad daylight, and the daughters of Jerusalem were profane according to your judgment,
  philosophy: optimal-equivalence
  footnotes:
