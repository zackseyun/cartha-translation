lexical_decisions:
- source_word: καθά
  chosen: As
  alternatives:
  - Just as
  - According as
  lexicon: LSJ
  rationale: Introduces comparison with the perpetrators' own actions; the short English 'As' preserves the connective force without stiffness.
- source_word: παρεδειγμάτισαν
  chosen: put ... on display
  alternatives:
  - displayed
  - publicly exposed
  - made an example of
  lexicon: LSJ
  rationale: The verb carries a sense of public exhibition. 'Put ... on display' communicates the open, shameless publicity of the act in idiomatic English.
- source_word: ἀδικίας
  chosen: injustices
  alternatives:
  - wrongs
  - unrighteous acts
  lexicon: LSJ
  rationale: The plural points to concrete acts of wrongdoing. 'Injustices' preserves the moral and social weight better than the more general 'wrongs'.
- source_word: ἀπέναντι τοῦ ἡλίου
  chosen: in broad daylight
  alternatives:
  - before the sun
  - in the sight of the sun
  lexicon: LSJ
  rationale: Literally the phrase is 'before the sun,' but in English this functions naturally as an idiom for something done openly and publicly.
- source_word: βέβηλοι
  chosen: profane
  alternatives:
  - defiled
  - unclean
  lexicon: LSJ
  rationale: The adjective denotes what is desecrated or no longer holy. 'Profane' keeps that holiness/profanation contrast visible; 'defiled' remains a viable contextual alternative.
- source_word: κατὰ τὸ κρίμα σου
  chosen: according to your judgment
  alternatives:
  - by your judgment
  - in keeping with your sentence
  lexicon: LSJ
  rationale: This preserves the explicit link between their condition and God's judicial action without over-interpreting the exact nuance of κρίμα.
