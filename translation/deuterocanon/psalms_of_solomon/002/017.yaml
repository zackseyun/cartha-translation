id: PSS.2.17
reference: Psalms of Solomon 2:17
source:
  edition: lxx-swete-1909
  text: ὅτι ἀπέδωκας τοῖς ἁμαρτωλοῖς κατὰ τὰ ἔργα αὐτῶν, καὶ κατὰ τὰς ἁμαρτίας αὐτῶν
    τὰς πονηρὰς σφόδρα.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: For you repaid sinners according to their deeds, according to their exceedingly
    evil sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'works' instead of 'deeds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'very wicked sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέδωκας
  chosen: repaid
  alternatives:
  - paid back
  - rendered
  - gave back
  lexicon: BDAG
  rationale: The verb denotes giving back what is due. 'Repaid' preserves the judicial
    sense of recompense in context without sounding overly wooden.
- source_word: τοῖς ἁμαρτωλοῖς
  chosen: sinners
  alternatives:
  - the sinful
  - wrongdoers
  lexicon: BDAG
  rationale: '''Sinners'' is the direct and established rendering of ἁμαρτωλοί and
    fits the moral-judicial context better than broader options like ''wrongdoers.'''
- source_word: ἔργα
  chosen: deeds
  alternatives:
  - works
  - actions
  lexicon: BDAG
  rationale: Although 'works' is more formal, 'deeds' communicates concrete acts in
    natural English while preserving the idea of moral conduct being judged.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - offenses
  - transgressions
  lexicon: BDAG
  rationale: '''Sins'' is the most direct equivalent and keeps the repetition and
    moral force of the Greek.'
- source_word: πονηρὰς σφόδρα
  chosen: exceedingly evil
  alternatives:
  - very wicked
  - extremely evil
  lexicon: BDAG
  rationale: This keeps both the qualitative force of πονηράς ('evil/wicked') and
    the intensifier σφόδρα ('exceedingly/very strongly') in a natural English order.
