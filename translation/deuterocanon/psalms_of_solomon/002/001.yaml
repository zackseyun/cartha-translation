id: PSS.2.1
reference: Psalms of Solomon 2:1
source:
  edition: lxx-swete-1909
  text: Ἐν τῷ ὑπερηφανεύεσθαι τὸν ἁμαρτωλὸν ἐν κριοῖς κατέβαλλε τείχη ὀχυρά, καὶ οὐκ
    ἐκώλυας.
  language: Greek
  pages:
  - 788
  validation: swete_direct
translation:
  text: While the sinner was acting arrogantly with battering-rams, he was tearing
    down fortified walls, and you did not stop him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with rams'; the Greek word can mean literal rams, but here likely refers
      to siege engines.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν τῷ ὑπερηφανεύεσθαι
  chosen: While ... was acting arrogantly
  alternatives:
  - When ... was exalting himself
  - In the pride of ...
  - While ... was boasting
  lexicon: LSJ
  rationale: The ἐν τῷ + infinitive construction is temporal here, best rendered 'while'
    or 'when.' ὑπερηφανεύομαι conveys proud or arrogant self-exaltation; 'acting arrogantly'
    gives natural English without losing the moral force.
- source_word: τὸν ἁμαρτωλόν
  chosen: the sinner
  alternatives:
  - the wicked man
  - the sinful one
  lexicon: LSJ
  rationale: The singular is retained. 'The sinner' is the most direct rendering and
    preserves the text's individualized portrayal without importing a more interpretive
    label.
- source_word: ἐν κριοῖς
  chosen: with battering-rams
  alternatives:
  - with rams
  lexicon: LSJ
  rationale: κριός literally means 'ram,' but in siege context it naturally refers
    to battering-rams. Since the next clause speaks of tearing down walls, the military
    sense is strongly supported and clearer in English.
- source_word: κατέβαλλε
  chosen: he was tearing down
  alternatives:
  - he cast down
  - he brought down
  - he tore down
  lexicon: LSJ
  rationale: The imperfect suggests ongoing action. 'Was tearing down' preserves that
    aspect better than a simple past while remaining idiomatic.
- source_word: τείχη ὀχυρά
  chosen: fortified walls
  alternatives:
  - strong walls
  - mighty walls
  lexicon: LSJ
  rationale: ὀχυρός means strong or fortified. In connection with city walls, 'fortified
    walls' is the most natural English expression.
- source_word: οὐκ ἐκώλυας
  chosen: you did not stop him
  alternatives:
  - you did not hinder him
  - you did not restrain him
  lexicon: LSJ
  rationale: The object is implicit in Greek and naturally supplied in English from
    the preceding subject. 'Stop him' is clear modern English; 'hinder' is possible
    but less natural.
