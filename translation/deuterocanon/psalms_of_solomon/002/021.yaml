  category: awkward_english
  tier: 1
  from: She wrapped herself in sackcloth instead of splendid clothing, and a cord
  to: She wrapped sackcloth around herself instead of splendid clothing, and a cord
  rationale: The English phrasing 'wrapped herself in' turns 'sackcloth' into the object of a preposition, which creates an awkward zeugma when 'and a cord' follows (one cannot 'wrap herself in a cord around her head'). The Greek verb περιέζωσατο takes both σάκκον and σχοινίον as direct objects. Changing to 'wrapped sackcloth around herself' allows 'and a cord' to share the verb naturally.
