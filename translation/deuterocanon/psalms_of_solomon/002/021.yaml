id: PSS.2.21
reference: Psalms of Solomon 2:21
source:
  edition: lxx-swete-1909
  text: περιέζωσατο σάκκον ἀντὶ ἐνδύματος εὐπρεπείας, σχοινίον περὶ τὴν κεφαλὴν αὐτῆς ἀντὶ στεφάνου.
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: She wrapped sackcloth around herself instead of splendid clothing, and a cord around her head instead of a wreath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “crown” for “wreath.”
    reason: lexical_alternative
  - marker: b
    text: “Splendid clothing” could also be rendered “beautiful garment” or “fine attire.”
    reason: lexical_alternative
  - marker: c
    text: Or 'She wrapped herself in sackcloth instead of splendid clothing, and a cord'.
    reason: previous_rendering
lexical_decisions:
- source_word: περιέζωσατο
  chosen: wrapped herself
  alternatives:
  - girded herself
  - put on
  lexicon: BDAG
  rationale: The middle voice indicates the subject clothing or binding herself. “Wrapped herself” is natural modern English and preserves the sense of self-investment more clearly than the more archaic “girded herself.”
- source_word: σάκκον
  chosen: sackcloth
  alternatives:
  - coarse sackcloth
  lexicon: BDAG
  rationale: This is the standard term for mourning attire and should be preserved directly rather than paraphrased.
- source_word: ἐνδύματος εὐπρεπείας
  chosen: splendid clothing
  alternatives:
  - beautiful garment
  - graceful attire
  - fine clothing
  lexicon: BDAG
  rationale: The phrase contrasts mourning dress with attractive or honorable attire. “Splendid clothing” captures the dignified, ornamental sense without sounding stiff.
- source_word: σχοινίον
  chosen: cord
  alternatives:
  - rope
  - string
  lexicon: BDAG
  rationale: The noun refers to a cord or rope-like binding. “Cord” fits idiomatic English better in this dress/adornment contrast and avoids sounding too heavy.
- source_word: στεφάνου
  chosen: wreath
  alternatives:
  - crown
  - garland
  lexicon: BDAG
  rationale: In this context of feminine adornment and lament, “wreath” best conveys an ornamental headpiece without importing royal overtones that “crown” can suggest.
