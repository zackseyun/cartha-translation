id: PSS.2.7
reference: Psalms of Solomon 2:7
source:
  edition: lxx-swete-1909
  text: κατὰ τὰς ἁμαρτίας αὐτῶν ἐποίησεν αὐτοῖς, ὅτι ἐγκατέλειπεν αὐτοὺς εἰς χεῖρας κατισχυόντων.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: He dealt with them according to their sins, for he abandoned them into the hands of those who overpowered them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those overpowering them' / 'those prevailing over them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because he abandoned them into the hands of those stronger than they.'.
    reason: previous_rendering
lexical_decisions:
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in keeping with
  - in proportion to
  lexicon: BDAG
  rationale: The preposition marks correspondence or measure. 'According to' preserves the judicial sense that what happened matched their sins.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - transgressions
  lexicon: BDAG
  rationale: The ordinary moral sense 'sins' is the most natural and transparent English equivalent here.
- source_word: ἐποίησεν αὐτοῖς
  chosen: he dealt with them
  alternatives:
  - he did to them
  - he acted toward them
  lexicon: BDAG
  rationale: Although the Greek is literally 'he did to them,' idiomatic English prefers 'dealt with them' while preserving the idea of enacted judgment.
- source_word: ἐγκατέλειπεν
  chosen: abandoned
  alternatives:
  - forsook
  - left
  lexicon: BDAG
  rationale: The verb conveys leaving someone exposed or forsaken. 'Abandoned' communicates that force clearly in modern English without archaic tone.
- source_word: εἰς χεῖρας
  chosen: into the hands of
  alternatives:
  - to the power of
  - over to
  lexicon: BDAG
  rationale: This is a standard biblical idiom for being delivered into another's power. Retaining 'into the hands of' preserves the source imagery.
- source_word: κατισχυόντων
  chosen: those stronger than they
  alternatives:
  - those overpowering them
  - their conquerors
  - those prevailing over them
  lexicon: BDAG
  rationale: The participle denotes people who are prevailing over or stronger than them. 'Those stronger than they' gives clear English while fitting the handed-over-to-enemies context.
