id: PSS.17.13
reference: Psalms of Solomon 17:13
source:
  edition: lxx-swete-1909
  text: ἠρήμωσεν ὁ ἄνομος ἐπὶ τὴν γῆν ἡμῶν ἀπὸ ἐνοικούντων αὐτὴν· ἠφάνισαν νέον καὶ
    πρεσβύτην καὶ τέκνα αὐτῶν ἅμα.
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: The lawless one laid waste our land, emptying it of its inhabitants; they
    wiped out young and old, and their children together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek shifts from singular ('the lawless one') to a plural verb ('they
      wiped out'). The translation preserves this change rather than smoothing it
      away.
    reason: textual_variant
lexical_decisions:
- source_word: ἠρήμωσεν
  chosen: laid waste
  alternatives:
  - made desolate
  - devastated
  lexicon: BDAG
  rationale: Conveys forceful desolation in natural English while preserving the concrete
    sense of rendering the land ruined.
- source_word: ὁ ἄνομος
  chosen: the lawless one
  alternatives:
  - the lawless man
  - the wicked one
  lexicon: BDAG
  rationale: The singular with article is best preserved. 'Lawless one' reflects ἄνομος
    more precisely than the broader 'wicked one'.
- source_word: ἀπὸ ἐνοικούντων αὐτήν
  chosen: emptying it of its inhabitants
  alternatives:
  - from those dwelling in it
  - depriving it of its inhabitants
  lexicon: BDAG
  rationale: 'A more literal rendering would be awkward in English. This phrasing
    captures the result implied by the Greek: the land is desolated by the removal
    of its residents.'
- source_word: ἠφάνισαν
  chosen: wiped out
  alternatives:
  - destroyed
  - made disappear
  lexicon: BDAG
  rationale: Carries the sense of obliterating people from view or existence in a
    vivid but readable way.
- source_word: νέον καὶ πρεσβύτην
  chosen: young and old
  alternatives:
  - young man and old man
  - the young and the elder
  lexicon: BDAG
  rationale: This English pair is idiomatic and preserves the merism of age extremes
    without unnecessary stiffness.
- source_word: τέκνα αὐτῶν ἅμα
  chosen: their children together
  alternatives:
  - their children as well
  - their children along with them
  lexicon: BDAG
  rationale: Preserves the inclusion of the children and the force of ἅμα, indicating
    that all were destroyed together.
