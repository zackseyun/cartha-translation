theological_decisions:
- issue: Messianic judgment through speech
  chosen_reading: The verse portrays the ruler’s judgment as effected by his spoken
    word and threatening command, not by describing the mechanics beyond that.
  alternative_readings:
  - A more figurative reading in which the speech merely symbolizes sovereign authority
  rationale: The Greek explicitly emphasizes judgment by word, mouth, and threat.
    The translation preserves that imagery without importing later doctrinal elaboration.
