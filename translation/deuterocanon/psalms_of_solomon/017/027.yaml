id: PSS.17.27
reference: Psalms of Solomon 17:27
source:
  edition: lxx-swete-1909
  text: ὀλοθρεῦσαι ἔθνη παράνομα ἐν λόγῳ στόματος αὐτοῦ, ἐν ἀπειλῇ αὐτοῦ φυγεῖν ἔθνη ἀπὸ προσώπου αὐτοῦ, καὶ ἐλέγξαι ἁμαρτωλοὺς ἐν λόγῳ καρδίας αὐτῶν.
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: to destroy lawless nations with the word of his mouth, for nations to flee from before him by his threat, and to destroy lawless nations with the word of his mouth, to make nations flee from before him by his threat, and to convict sinners by the word of their heart..
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to convict sinners by the word of their heart.” The Greek phrase is compressed and may suggest exposing them by their own inward speech or intent.
    reason: lexical_alternative
  - marker: b
    text: Or 'to make nations flee'.
    reason: previous_rendering
  - marker: c
    text: Or 'to expose sinners by the word of their hearts'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὀλοθρεῦσαι
  chosen: to destroy
  alternatives:
  - to annihilate
  - to wipe out
  lexicon: LSJ
  rationale: The aorist infinitive continues the verse’s chain of messianic actions. “Destroy” is forceful and natural English without overstating the term beyond the Greek.
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: LSJ
  rationale: In this Jewish royal-judgment context, ἔθνη refers to nations/peoples broadly, not specifically ‘Gentiles’ as a later technical religious label.
- source_word: παράνομα
  chosen: lawless
  alternatives:
  - unlawful
  - wicked
  lexicon: LSJ
  rationale: “Lawless” preserves the word’s relation to νόμος and keeps the moral-legal force of the Greek.
- source_word: ἐν λόγῳ στόματος αὐτοῦ
  chosen: with the word of his mouth
  alternatives:
  - by the utterance of his mouth
  - with his spoken word
  lexicon: LSJ
  rationale: This preserves the concrete imagery of judgment effected by speech, while remaining idiomatic in English.
- source_word: ἐν ἀπειλῇ αὐτοῦ
  chosen: by his threat
  alternatives:
  - at his threat
  - by his threatening
  lexicon: LSJ
  rationale: The phrase expresses means or instrument. “By his threat” is concise and natural while keeping the severity of the Greek.
- source_word: φυγεῖν
  chosen: to make ... flee
  alternatives:
  - to drive ... away
  - for ... to flee
  lexicon: LSJ
  rationale: 'Although the Greek uses an infinitive, idiomatic English best expresses the sense here as causative: his threat results in the nations’ flight.'
- source_word: ἀπὸ προσώπου αὐτοῦ
  chosen: from before him
  alternatives:
  - from his presence
  - away from his face
  lexicon: LSJ
  rationale: “From before him” preserves the biblical/judicial flavor of the expression without becoming obscure.
- source_word: ἐλέγξαι
  chosen: to expose
  alternatives:
  - to rebuke
  - to convict
  lexicon: LSJ
  rationale: The verb can mean expose, reprove, or convict. “Expose” fits the context of revealing guilt, while avoiding an overly narrow legal sense.
- source_word: ἐν λόγῳ καρδίας αὐτῶν
  chosen: by the word of their hearts
  alternatives:
  - by the utterance of their hearts
  - for the word of their heart
  - by what their hearts say
  lexicon: LSJ
  rationale: The Greek is somewhat compressed and strikingly literal. This rendering preserves the metaphor of inward speech issuing from the heart, while remaining readable.
