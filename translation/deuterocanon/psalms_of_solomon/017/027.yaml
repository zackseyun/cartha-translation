  from: to expose sinners by the word of their hearts
  to: to destroy lawless nations with the word of his mouth, to make nations flee from before him by his threat, and to convict sinners by the word of their heart.
  rationale: 'Adjudicator-modified: The verb ἐλέγξαι in this messianic context (echoing Isaiah 11:4) carries the judicial force of ''convict'' or ''reprove'' rather than merely ''expose.'' Furthermore, καρδίας is singular, and preserving the Hebraic distributive singular (''their heart'') is more accurate to the source text. I am modifying the suggestion only to provide the complete verse text for the final output.'
