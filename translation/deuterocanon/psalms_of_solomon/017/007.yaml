translation:
  text: submit_verse_draft({"english_text":"And they did not glorify your honored
    name; in splendor they set up a kingdom in place of their own exaltation,","translation_philosophy":"optimal-equivalence","lexical_decisions":[{"source_word":"οὐκ
    ἐδόξασαν","chosen":"did not glorify","alternatives":["did not honor","did not
    give glory to"],"lexicon":"LSJ","entry":null,"rationale":"The verb δοξάζω denotes
    giving honor or glory. 'Did not glorify' preserves the verbal force and fits the
    God-directed context better than the flatter 'did not honor,' while remaining
    natural English."},{"source_word":"τὸ ὄνομά σου τὸ ἔντιμον","chosen":"your honored
    name","alternatives":["your honorable name","your esteemed name"],"lexicon":"LSJ","entry":null,"rationale":"ἔντιμος
    denotes what is honored or held in esteem. 'Your honored name' is natural modern
    English and matches established rendering elsewhere in this corpus."},{"source_word":"ἐν
    δόξῃ","chosen":"in splendor","alternatives":["in glory","gloriously"],"lexicon":"LSJ","entry":null,"rationale":"δόξα
    can mean glory, honor, or splendor. Here it describes the manner or setting of
    royal establishment; 'in splendor' communicates visible pomp without implying
    divine glory."},{"source_word":"ἔθεντο","chosen":"they set up","alternatives":["they
    established","they placed"],"lexicon":"BDAG","entry":null,"rationale":"τίθημι
    here carries the sense of putting in place or establishing. 'Set up' is idiomatic
    and keeps the active political force of the clause."},{"source_word":"βασίλειον","chosen":"a
    kingdom","alternatives":["royal rule","a kingship","a royal house"],"lexicon":"LSJ","entry":null,"rationale":"The
    noun can denote kingdom, kingship, or royal establishment. In this immediate context
    of illegitimate rule and the throne of David in the next verse, 'a kingdom' is
    the most straightforward and least interpretive choice."},{"source_word":"ἀντὶ
    ὕψους αὐτῶν","chosen":"in place of their own exaltation","alternatives":["instead
    of their height","for their own exaltation","in place of their high estate"],"lexicon":"LSJ","entry":null,"rationale":"Literally
    the phrase speaks of 'height' or 'exaltation.' Because ὕψος can be metaphorical
    for elevated status or self-exaltation, 'their own exaltation' best captures the
    likely sense while preserving the underlying ambiguity. The wording remains somewhat
    compressed in English because the Greek is itself compact."}],"theological_decisions":[{"issue":"How
    explicitly to interpret ἀντὶ ὕψους αὐτῶν in a politically charged context","chosen_reading":"Retain
    the compressed idea of 'their own exaltation' rather than expanding it into a
    clearer accusation such as 'for their own glory.'","alternative_readings":["for
    their own glory","instead of their former high position","to magnify themselves"],"rationale":"The
    context clearly condemns arrogant illegitimate rule, but the Greek phrase itself
    is terse and does not fully spell out the relation. The main text preserves that
    terseness without paraphrastic expansion.","doctrine_reference":null}],"footnotes":[{"marker":"a","text":"Or
    'in glory they established a kingdom instead of their height/high estate.' The
    Greek phrase is compressed, especially in 'instead of their height.'","reason":"lexical_alternative"}]})
  philosophy: optimal-equivalence
