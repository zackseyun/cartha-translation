id: PSS.17.18
reference: Psalms of Solomon 17:18
source:
  edition: lxx-swete-1909
  text: ἔφυγοσαν ἀπʼ αὐτῶν οἱ ἀγαπῶντες συναγωγὰς ὁσίων· ὡς στρουθία ἐξεπετάσθησαν ἀπὸ κοίτης αὐτῶν.
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: Those who loved the assemblies of the holy ones fled from them; like sparrows they flew away from their nest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gatherings' or 'synagogues' for 'assemblies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'saints' for 'holy ones.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'bed' or 'lying place'; 'nest' is used here because of the sparrow imagery.
    reason: lexical_alternative
  - marker: d
    text: Or 'were driven'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔφυγοσαν
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: BDAG
  rationale: A straightforward past-tense rendering of φεύγω fits the context of sudden departure without adding interpretive nuance beyond the Greek.
- source_word: οἱ ἀγαπῶντες
  chosen: those who loved
  alternatives:
  - those loving
  - those who cherished
  lexicon: BDAG
  rationale: The substantival participle is best rendered idiomatically in English as 'those who loved,' preserving the group's characteristic affection while remaining natural.
- source_word: συναγωγὰς
  chosen: assemblies
  alternatives:
  - gatherings
  - synagogues
  lexicon: BDAG
  rationale: The core sense is gathered meetings or congregations. 'Assemblies' preserves the communal sense without importing a more institutional meaning that 'synagogues' could suggest in English.
- source_word: ὁσίων
  chosen: the holy ones
  alternatives:
  - the saints
  - the devout
  lexicon: BDAG
  rationale: ὅσιος here denotes people marked by holiness or piety. 'Holy ones' is transparent and close to the Greek, while 'saints' is possible but carries stronger later ecclesial associations.
- source_word: στρουθία
  chosen: sparrows
  alternatives:
  - small birds
  lexicon: LSJ
  rationale: The word commonly refers to sparrows or sparrow-like small birds. 'Sparrows' gives the vivid image naturally in English.
- source_word: ἐξεπετάσθησαν
  chosen: were driven
  alternatives:
  - were scattered
  - flew out
  - were cast out
  lexicon: LSJ
  rationale: The passive form conveys being made to flee or be sent off, not merely voluntary flight. 'Were driven' preserves that force while fitting the bird simile.
- source_word: κοίτης
  chosen: nest
  alternatives:
  - bed
  - resting place
  - dwelling
  lexicon: LSJ
  rationale: Although κοίτη literally means 'bed' or 'lying place,' the comparison with sparrows makes an avian contextual rendering appropriate. 'Nest' communicates the image clearly in natural English.
