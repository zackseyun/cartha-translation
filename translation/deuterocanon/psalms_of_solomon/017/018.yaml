  from: were driven
  to: flew away
  rationale: The verb ἐξεπετάσθησαν is the aorist passive of ἐκπέτομαι (to fly out/away), which functions as a deponent in Hellenistic Greek (cf. LXX Prov 27:8). The draft misinterprets the passive morphology as a true passive ('were driven'), losing the active avian action of the sparrows flying away.
