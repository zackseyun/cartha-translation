id: PSS.17.39
reference: Psalms of Solomon 17:39
source:
  edition: lxx-swete-1909
  text: κατάξει γὰρ γῆν τῷ λόγῳ τοῦ στόματος αὐτοῦ εἰς αἰῶνα,
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: For he will strike the earth with the word of his mouth forever,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “land” for “earth.”
    reason: lexical_alternative
  - marker: b
    text: This line likely echoes Isaiah 11:4, where the ideal ruler judges and strikes
      by the word of his mouth.
    reason: cross_reference
lexical_decisions:
- source_word: κατάξει
  chosen: will strike
  alternatives:
  - will shatter
  - will bring down
  - will subdue
  lexicon: LSJ
  rationale: A future active form expressing forceful action against opponents. “Will
    strike” is clear modern English, preserves the violent/judicial force, and fits
    the likely prophetic echo behind the line without over-specifying the manner of
    defeat.
- source_word: γῆν
  chosen: earth
  alternatives:
  - land
  lexicon: LSJ
  rationale: γῆ can mean either “earth” or “land.” “Earth” best fits the broad, royal-messianic
    scope of the line and preserves the elevated tone of the Greek, though “land”
    remains possible in a more localized reading.
- source_word: τῷ λόγῳ τοῦ στόματος αὐτοῦ
  chosen: with the word of his mouth
  alternatives:
  - by the word of his mouth
  lexicon: LSJ
  rationale: 'This phrase is rendered closely because its imagery is theologically
    and poetically weighty: judgment is carried out by authoritative speech rather
    than physical weaponry.'
- source_word: εἰς αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - unto the age
  lexicon: LSJ
  rationale: A standard idiomatic rendering meaning enduringly or perpetually. “Forever”
    is natural modern English and preserves the solemn force of the phrase.
