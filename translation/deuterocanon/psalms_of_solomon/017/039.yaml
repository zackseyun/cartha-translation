theological_decisions:
- issue: Possible prophetic echo of Isaiah 11:4 in the messianic king's judgment by
    speech
  chosen_reading: Retain the direct image 'strike the earth with the word of his mouth'
    without softening it into a paraphrase about mere command or decree.
  alternative_readings:
  - Interpret more dynamically as 'rule the earth by his command'
  rationale: The Greek presents judicial power exercised through speech, and the likely
    scriptural echo strengthens the case for preserving that imagery in the main text.
