id: PSS.17.25
reference: Psalms of Solomon 17:25
source:
  edition: lxx-swete-1909
  text: καθάρισον Ἰερουσαλὴμ ἀπὸ ἐθνῶν καταπατούντων ἐν ἀπωλείᾳ, ἐν σοφίᾳ, ἐν δικαιοσύνῃ
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: In wisdom and righteousness, cleanse Jerusalem from nations that trample her to ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Gentiles” for “nations.”
    reason: lexical_alternative
  - marker: b
    text: Or “in justice” for “in righteousness.”
    reason: lexical_alternative
  - marker: c
    text: Or 'Cleanse Jerusalem from nations that trample her to ruin, in wisdom and righteousness.'.
    reason: previous_rendering
lexical_decisions:
- source_word: καθάρισον
  chosen: Cleanse
  alternatives:
  - Purify
  - Make clean
  lexicon: BDAG
  rationale: The aorist imperative calls for decisive removal of defilement or corruption. “Cleanse” preserves both the cultic and civic sense better than the flatter “make clean.”
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name, following the project policy to transliterate names.
- source_word: ἐθνῶν
  chosen: nations
  alternatives:
  - Gentiles
  lexicon: BDAG
  rationale: The term can mean either “nations” or “Gentiles.” Here it refers to foreign peoples oppressing Jerusalem; “nations” is the more transparent and less interpretively narrowed rendering, while “Gentiles” remains a viable alternative.
- source_word: καταπατούντων
  chosen: that trample
  alternatives:
  - that tread down
  - that trample underfoot
  lexicon: BDAG
  rationale: The participle describes hostile domination. “Trample” is vivid, natural English and preserves the force of contemptuous oppression.
- source_word: ἐν ἀπωλείᾳ
  chosen: to ruin
  alternatives:
  - destructively
  - unto destruction
  lexicon: BDAG
  rationale: The phrase expresses destructive effect or result. “To ruin” reads naturally in English while retaining the sense of devastation caused by the trampling.
- source_word: ἐν σοφίᾳ
  chosen: in wisdom
  alternatives:
  - with wisdom
  lexicon: BDAG
  rationale: The prepositional phrase is left fairly literal. It most naturally describes the manner or means of the cleansing, and “in wisdom” preserves that ambiguity without over-resolving it.
- source_word: ἐν δικαιοσύνῃ
  chosen: in righteousness
  alternatives:
  - with righteousness
  - in justice
  lexicon: BDAG
  rationale: Following project defaults, δικαιοσύνη is rendered “righteousness,” while acknowledging that “justice” is a plausible contextual alternative. “In righteousness” also pairs well with “in wisdom” in the closing cadence.
