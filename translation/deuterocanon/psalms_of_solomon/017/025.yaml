  category: awkward_english
  tier: 1
  from: Cleanse Jerusalem from nations that trample her to ruin, in wisdom and righteousness.
  to: In wisdom and righteousness, cleanse Jerusalem from nations that trample her to ruin.
  rationale: Placing 'in wisdom and righteousness' at the end of the English sentence creates a dangling modifier, making it sound as though the nations are trampling Jerusalem in wisdom and righteousness. Moving the modifiers to the front correctly attaches them to the imperative 'Cleanse' (καθάρισον), resolving the ambiguity that Greek avoids naturally through context and inflection.
