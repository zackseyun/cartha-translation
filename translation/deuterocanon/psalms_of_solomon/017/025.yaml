theological_decisions:
- issue: Whether ἐθνῶν should be rendered ethnically/religiously as “Gentiles” or more broadly as “nations.”
  chosen_reading: nations
  alternative_readings:
  - Gentiles
  rationale: The immediate sense is foreign nations oppressing Jerusalem. “Nations” preserves that meaning without importing a more technical Jew/Gentile contrast than the verse itself requires.
- issue: Whether the closing phrases ἐν σοφίᾳ, ἐν δικαιοσύνῃ modify the hostile nations or the requested act of cleansing.
  chosen_reading: 'They are taken with the imperative ‘Cleanse,’ expressing manner/means: God is asked to cleanse Jerusalem in wisdom and righteousness.'
  alternative_readings:
  - They describe the standard by which the nations are judged or removed.
  rationale: In English, attaching the phrases to the imperative yields the clearest and most coherent sense. The Greek is compact enough to leave some ambiguity, so the translation avoids overexpansion.
