theological_decisions:
- issue: Unstated object of 'they took away by force'
  chosen_reading: Leave the object implicit in English.
  alternative_readings:
  - Supply an object such as 'the inheritance' or 'the kingdom'
  rationale: The Greek leaves the object unexpressed. Supplying one would clarify
    interpretation beyond the wording of the source text, so the translation preserves
    the ellipsis.
- issue: First-person singular in 'I had not promised'
  chosen_reading: Retain the singular first-person speaker without identifying the
    speaker in the main text.
  alternative_readings:
  - Smooth to an impersonal clause such as 'what had not been promised to them'
  - Emend conceptually toward a plural speaker
  rationale: The source text explicitly reads first-person singular. Even if the speaker
    is understood from context as God or a personified prior authority, the translation
    should not erase that grammatical feature.
