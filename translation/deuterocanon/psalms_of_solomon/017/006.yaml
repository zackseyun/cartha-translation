id: PSS.17.6
reference: Psalms of Solomon 17:6
source:
  edition: lxx-swete-1909
  text: καὶ ἐν ταῖς ἁμαρτίαις ἡμῶν ἐπανέστησαν ἡμῖν ἁμαρτωλοί, ἐπέθεντο ἡμῖν καὶ ἐξώσαντο
    ἡμᾶς· οἷς οὐκ ἐπηγγείλω, μετὰ βίας ἀφείλαντο,
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: And in our sins sinners rose up against us; they attacked us and drove us
    out. Those to whom you had not promised it took it away by force.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has first-person singular, literally 'to whom I did not promise';
      the speaker is unstated in the verse itself.
    reason: textual_variant
  - marker: b
    text: The object of 'took away by force' is not expressed in the Greek and is
      therefore left implicit in the translation.
    reason: lexical_alternative
  - marker: c
    text: Or 'What I had not promised to them, they took away by force.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπανέστησαν
  chosen: rose up against
  alternatives:
  - rebelled against
  - stood up against
  lexicon: BDAG
  rationale: The compound verb naturally carries hostile uprising or opposition. 'Rose
    up against' preserves that adversarial force in clear English.
- source_word: ἐπέθεντο
  chosen: attacked
  alternatives:
  - laid upon
  - set upon
  lexicon: BDAG
  rationale: In context of violence followed by expulsion, the verb is best rendered
    dynamically as 'attacked' rather than a more wooden but less idiomatic expression.
- source_word: ἐξώσαντο
  chosen: drove us out
  alternatives:
  - cast us out
  - expelled us
  lexicon: BDAG
  rationale: The verb expresses forcible removal. 'Drove us out' keeps the vivid coercive
    sense and fits the sequence of hostile actions.
- source_word: οἷς
  chosen: to them
  alternatives:
  - to whom
  lexicon: BDAG
  rationale: The relative pronoun refers to the hostile sinners just mentioned. In
    English the dative relation is conveyed smoothly with 'to them' in the clause.
- source_word: ἐπηγγείλω
  chosen: I had not promised
  alternatives:
  - I did not promise
  - I had not pledged
  lexicon: BDAG
  rationale: The aorist first-person singular is retained rather than emended away.
    English past perfect fits the sense of a prior non-promise relative to their seizure.
    The singular speaker is left as in the Greek, even though the implied subject
    is not restated explicitly.
- source_word: ἀφείλαντο
  chosen: took away
  alternatives:
  - seized
  - carried off
  lexicon: BDAG
  rationale: The verb denotes removal or taking. 'Took away' is broad enough to preserve
    the ellipsis of the unstated object while still sounding natural.
- source_word: μετὰ βίας
  chosen: by force
  alternatives:
  - violently
  - with violence
  lexicon: BDAG
  rationale: This phrase marks coercion. 'By force' is concise, natural, and preserves
    the legal-violent nuance.
