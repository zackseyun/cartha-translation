id: PSS.17.10
reference: Psalms of Solomon 17:10
source:
  edition: lxx-swete-1909
  text: κατὰ τὰ ἁμαρτήματα αὐτῶν ἀποδώσεις αὐτοῖς, ὁ θεός, εὑρεθείη αὐτοῖς κατὰ τὰ
    ἔργα αὐτῶν.
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: According to their sins you will repay them, O God; may they be found according
    to their works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'may it be found for them according to their works.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατά
  chosen: according to
  alternatives:
  - in accordance with
  - for
  lexicon: BDAG
  rationale: 'With the accusative in both clauses, κατά marks standard or measure:
    the repayment is in proportion to their sins and works.'
- source_word: ἁμαρτήματα
  chosen: sins
  alternatives:
  - sinful acts
  - offenses
  lexicon: BDAG
  rationale: A straightforward plural rendering that preserves the moral weight of
    the Greek without over-specifying the kind of wrongdoing.
- source_word: ἀποδώσεις
  chosen: you will repay
  alternatives:
  - you will pay back
  - you will render
  lexicon: BDAG
  rationale: The future verb naturally expresses divine requital. 'Repay' fits the
    judicial context and reads clearly in modern English.
- source_word: ὁ θεός
  chosen: O God
  alternatives:
  - God
  lexicon: BDAG
  rationale: Though formally nominative, this functions as a vocative in direct address.
    'O God' preserves the prayer-like force.
- source_word: εὑρεθείη
  chosen: may they receive
  alternatives:
  - may it be found for them
  - may it come upon them
  lexicon: BDAG
  rationale: The Greek is literally 'may it be found for them,' an idiom for what
    comes to someone or is meted out to them. 'May they receive' conveys the sense
    in idiomatic English while preserving the optative wish.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  - actions
  lexicon: BDAG
  rationale: '''Works'' keeps close to the Greek and matches the recompense formula;
    ''deeds'' would also be possible but is less consistent with common biblical diction
    here.'
