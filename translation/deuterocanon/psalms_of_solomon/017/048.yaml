id: PSS.17.48
reference: Psalms of Solomon 17:48
source:
  edition: lxx-swete-1909
  text: τὰ ῥήματα αὐτοῦ πεπυρωμένα ὑπὲρ χρυσίον τὸ πρῶτον τίμιον, ἐν συναγωγαῖς διακρινεῖ
    λαὸν φυλὰς ἡγιασμένου.
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: His words are refined beyond the finest precious gold; in the assemblies he
    will judge the people, the tribes of the sanctified one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His words are purified/tested by fire beyond the finest gold.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the assemblies he will distinguish' or 'separate' the people.
    reason: alternative_reading
  - marker: c
    text: The phrase 'the tribes of the sanctified one' is syntactically compressed
      in Greek; 'the holy one' or 'the consecrated one' are also possible.
    reason: alternative_reading
lexical_decisions:
- source_word: ῥήματα
  chosen: words
  alternatives:
  - sayings
  - utterances
  lexicon: BDAG
  rationale: ῥήματα refers to spoken words or utterances. 'Words' is the most natural
    modern English choice and preserves the concise force of the Greek.
- source_word: πεπυρωμένα
  chosen: refined
  alternatives:
  - purified
  - tested by fire
  lexicon: BDAG
  rationale: The participle literally evokes something fired or refined in the furnace.
    'Refined' preserves the metallurgical image in readable English and fits the comparison
    with gold.
- source_word: ὑπὲρ χρυσίον τὸ πρῶτον τίμιον
  chosen: beyond the finest precious gold
  alternatives:
  - more than first-rate precious gold
  - beyond choice gold
  lexicon: BDAG
  rationale: The phrase intensifies the value comparison. 'The finest precious gold'
    communicates the superlative sense of τὸ πρῶτον τίμιον without sounding wooden.
- source_word: συναγωγαῖς
  chosen: assemblies
  alternatives:
  - congregations
  - gatherings
  lexicon: BDAG
  rationale: Here the term denotes gathered communal settings rather than a later
    institutional label. 'Assemblies' is natural and contextually broad.
- source_word: διακρινεῖ
  chosen: will judge
  alternatives:
  - will distinguish
  - will separate
  lexicon: BDAG
  rationale: In this royal context, the verb most plausibly carries a judicial/discriminating
    sense. 'Will judge' fits the messianic ruler context, while the alternatives remain
    possible because the verb can also mean distinguish or separate.
- source_word: ἡγιασμένου
  chosen: the sanctified one
  alternatives:
  - the holy one
  - the consecrated one
  lexicon: BDAG
  rationale: 'The Greek is compressed and somewhat awkward in English. A formally
    transparent rendering is best here: the genitive participle is preserved as ''the
    sanctified one,'' likely referring in context to the holy/consecrated people under
    God, but the exact nuance should remain visible rather than over-resolved.'
