theological_decisions:
- issue: How to relate the Lord's kingship here to the Davidic ruler in the surrounding context
  chosen_reading: The Lord himself is their king
  alternative_readings:
  - The Lord himself is his king
  rationale: 'Using Swete''s plural pronoun preserves the text as given while still fitting the psalm''s theology: the Davidic ruler reigns, but the Lord remains the people''s ultimate king. The singular reading is preserved in a footnote because it would make that subordination more explicit.'
  doctrine_reference: Translate titles; preserve theological tension rather than resolve it.
