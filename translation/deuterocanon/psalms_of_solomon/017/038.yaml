id: PSS.17.38
reference: Psalms of Solomon 17:38
source:
  edition: lxx-swete-1909
  text: Κύριος αὐτὸς βασιλεὺς αὐτῶν· ἐλπὶς τοῦ δυνατοῦ ἐλπὶθ θεοῦ, καὶ ἐλεήσει πάντα τὰ ἔθνη ἐνώπιον αὐτοῦ ἐν φόβῳ.
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: The Lord himself is their king; the hope of the mighty one is hope in God, and he will have mercy on all the nations before him in fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some witnesses read 'his king' instead of 'their king,' which would make the line refer more directly to the Davidic ruler's subordination to the Lord.
    reason: textual_variant
  - marker: b
    text: The Greek clause behind 'the hope of the mighty one whose hope is in God' is difficult as transmitted in Swete and may reflect an irregular or uncertain reading.
    reason: textual_variant
  - marker: c
    text: Or 'before him with reverence'; the phrase 'in fear' may denote awe as well as fear.
    reason: lexical_alternative
  - marker: d
    text: Or 'their king—the hope of the mighty one whose hope is in God—and'.
    reason: previous_rendering
lexical_decisions:
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord.' Here it names God as the ultimate sovereign in the midst of the messianic context.
- source_word: βασιλεὺς αὐτῶν
  chosen: their king
  alternatives:
  - his king
  lexicon: LSJ
  rationale: The Swete base text reads the plural pronoun, so the main text keeps 'their king.' A singular variant is worth preserving in a footnote because it would shift the line toward the Davidic ruler's relation to God.
- source_word: ἐλπὶς
  chosen: hope
  alternatives:
  - confidence
  - trust
  lexicon: BDAG
  rationale: The noun belongs to the same hope-language used elsewhere in the psalm. 'Hope' preserves that lexical link better than replacing it with a more interpretive gloss.
- source_word: τοῦ δυνατοῦ
  chosen: the mighty one
  alternatives:
  - the strong one
  - the powerful one
  lexicon: LSJ
  rationale: The singular genitive is best kept as a personal expression, not generalized into an abstract quality. 'The mighty one' is the most transparent English equivalent.
- source_word: ἐλπὶθ θεοῦ
  chosen: whose hope is in God
  alternatives:
  - in hope of God
  - in God's hope
  lexicon: LSJ
  rationale: The transmitted phrase is difficult as given in Swete, with an apparent irregular form after ἐλπὶς τοῦ δυνατοῦ. The chosen rendering preserves the repeated hope-language and the clause's orientation toward God while giving readable English and avoiding a more drastic paraphrase.
- source_word: ἐλεήσει
  chosen: will have mercy on
  alternatives:
  - will show compassion to
  - will pity
  lexicon: BDAG
  rationale: This is a standard merciful-action verb. 'Will have mercy on' is both natural English and theologically weighty.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: BDAG
  rationale: In this royal context ἔθνη refers broadly to the nations. 'Nations' is the least interpretive and most natural rendering.
- source_word: ἐνώπιον αὐτοῦ ἐν φόβῳ
  chosen: before him in fear
  alternatives:
  - in his presence with fear
  - before him with reverence
  lexicon: BDAG
  rationale: '''Before him'' preserves the spatial-relational force of ἐνώπιον, and ''in fear'' keeps the compact Greek expression. The phrase likely carries reverential awe, but the main text leaves that tension intact.'
