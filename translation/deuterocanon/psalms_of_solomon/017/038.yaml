  from: their king—the hope of the mighty one whose hope is in God—and
  to: their king; the hope of the mighty one is hope in God, and
  rationale: 'The Greek has an ano teleia (·) after αὐτῶν, marking a major clause break. The draft ignores this and turns the following phrase into an appositive. Furthermore, ''ἐλπὶς τοῦ δυνατοῦ ἐλπὶθ θεοῦ'' is a nominal clause (whether the irregular ἐλπὶθ is a phonetic spelling of nominative ἐλπὶς or a corruption of dative ἐλπίδι); it should be rendered as a statement (''the hope of the mighty one is hope in God'') rather than paraphrased into a relative clause (''whose hope is in God''). | Adjudicator: The reviewer correctly identifies that the current translation paraphrases the Greek to smooth over a difficult construction. By ignoring the ano teleia (·) and turning ''ἐλπὶθ θεοῦ'' into a relative cl'
