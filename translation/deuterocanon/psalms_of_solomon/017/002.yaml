  category: mistranslation
  tier: 2
  from: As long as that span lasts, so also his hope rests on it.
  to: According to his span, so also is his hope upon him.
  rationale: The phrase 'κατὰ τὸν χρόνον αὐτοῦ' indicates proportion ('according to
    his time/span'), meaning that hope placed in man is as brief and frail as man's
    lifespan. Translating this as 'As long as that span lasts' flattens the qualitative
    comparison into mere duration. Furthermore, 'ἐπʼ αὐτόν' (upon him) refers to the
    man (ἀνθρώπου), setting up the direct theological contrast in verse 3 ('But we
    hope in God'). Translating it as 'on it' (the span) obscures the author's contrast
    between hoping in man and hoping in God. (The accompanying footnote should be
    removed or inverted accordingly).
