id: PSS.17.2
reference: Psalms of Solomon 17:2
source:
  edition: lxx-swete-1909
  text: καὶ τίς ὁ χρόνος ζωῆς ἀνθρώπου ἐπὶ τῆς γῆς; κατὰ τὸν χρόνον αὐτοῦ καὶ ἡ ἐλπὶς
    αὐτοῦ ἐπʼ αὐτόν.
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: And what is the span of a man's life on the earth? According to his span,
    so also is his hope upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his hope rests on him,” taking the final pronoun to refer to the man
      rather than to his span of life.
    reason: alternative_reading
  - marker: b
    text: Or 'As long as that span lasts, so also his hope rests on it.'.
    reason: previous_rendering
lexical_decisions:
- source_word: χρόνος
  chosen: span
  alternatives:
  - time
  - season
  - term
  lexicon: BDAG
  rationale: In both occurrences the word refers not to abstract time in general but
    to the measured duration of human life. “Span” brings out a bounded lifetime more
    naturally in English than repeating “time.”
- source_word: ζωῆς
  chosen: life
  alternatives:
  - lifetime
  lexicon: BDAG
  rationale: The genitive qualifies χρόνος, yielding the sense of the duration of
    a person's life. “Life” is the most direct rendering, while the phrase as a whole
    is conveyed idiomatically as “span of a man's life.”
- source_word: ἀνθρώπου
  chosen: man's
  alternatives:
  - humanity's
  - a human being's
  lexicon: BDAG
  rationale: The singular generic refers representatively to a human person. Per the
    project's gender-accurate philosophy, “man's” is retained for the generic singular
    rather than flattening to a plural or abstract collective.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - upon the earth
  - on earth
  lexicon: BDAG
  rationale: This locative phrase situates human life in its earthly setting. “On
    the earth” is transparent and natural English.
- source_word: κατὰ τὸν χρόνον αὐτοῦ
  chosen: As long as that span lasts
  alternatives:
  - according to his span
  - in proportion to his time
  lexicon: BDAG
  rationale: A wooden rendering would be obscure in English. The phrase expresses
    correspondence to the measure of a person's lifespan, so an idiomatic temporal
    rendering best preserves the sense.
- source_word: ἐλπὶς
  chosen: hope
  alternatives:
  - expectation
  lexicon: BDAG
  rationale: The noun denotes human hope or expectation. “Hope” is the standard and
    clearest English equivalent.
- source_word: ἐπʼ αὐτόν
  chosen: on it
  alternatives:
  - on him
  - upon him
  lexicon: BDAG
  rationale: The pronoun is masculine singular and could grammatically point either
    to the man or to the immediately preceding χρόνος. In context, linking hope to
    the measured span of life best fits the statement's parallel structure, so the
    main text takes the reference as the lifespan while preserving the personal reading
    in a footnote.
