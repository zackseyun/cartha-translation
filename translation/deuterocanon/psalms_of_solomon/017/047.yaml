theological_decisions:
- issue: Whether God's knowledge of the king should be rendered as foreknowledge or simpler recognition/acknowledgment
  chosen_reading: recognized
  alternative_readings:
  - knew
  - foreknew
  - approved
  rationale: The Greek allows several nuances. Rendering it as “recognized” preserves the divine acknowledgment of the king without forcing a more developed doctrinal reading into the line.
  doctrine_reference: Preserve theological tension rather than resolve it.
