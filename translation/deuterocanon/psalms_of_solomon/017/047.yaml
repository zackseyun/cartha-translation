id: PSS.17.47
reference: Psalms of Solomon 17:47
source:
  edition: lxx-swete-1909
  text: αὕτη ἡ εὐπρέπεια τοῦ βασιλέως Ἰσραήλ, ἣν ἔγνω ὁ θεός, ἀναστῆσαι αὐτὸν ἐπʼ οἶκον Ἰσραήλ, παιδεῦσαι αὐτόν.
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: This is the splendor of the king of Israel, which God knew, to raise him up over the house of Israel, to train him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “which God knew,” possibly with the nuance “foreknew” or “approved.”
    reason: lexical_alternative
  - marker: b
    text: Or “disciplining him” or “instructing him.”
    reason: lexical_alternative
  - marker: c
    text: Or 'recognized in raising him up over the house of Israel and training him'.
    reason: previous_rendering
lexical_decisions:
- source_word: εὐπρέπεια
  chosen: splendor
  alternatives:
  - beauty
  - majesty
  - nobility
  lexicon: LSJ
  rationale: The term denotes visible excellence or dignity. “Splendor” preserves both beauty and royal grandeur without sounding overly archaic.
- source_word: ἔγνω
  chosen: recognized
  alternatives:
  - knew
  - foreknew
  - approved
  lexicon: LSJ
  rationale: The Greek verb is broad and can suggest knowing, recognizing, or acknowledging. “Recognized” fits the immediate context without importing a stronger doctrinal sense such as predestination, while a footnote preserves alternatives.
- source_word: ἀναστῆσαι
  chosen: raising him up
  alternatives:
  - to raise him up
  - to appoint him
  - to establish him
  lexicon: LSJ
  rationale: The infinitive carries the sense of causing to arise or establishing. “Raising him up” keeps the verbal imagery and fits royal appointment language.
- source_word: ἐπʼ οἶκον Ἰσραήλ
  chosen: over the house of Israel
  alternatives:
  - for the house of Israel
  - upon the house of Israel
  lexicon: LSJ
  rationale: The phrase is naturally rendered as authority over Israel as a people. “House of Israel” preserves the corporate covenantal expression.
- source_word: παιδεῦσαι
  chosen: training him
  alternatives:
  - disciplining him
  - instructing him
  lexicon: LSJ
  rationale: The verb can mean educate, train, or discipline. In this royal-messianic context, “training him” best conveys formative instruction while avoiding an unnecessarily punitive tone.
