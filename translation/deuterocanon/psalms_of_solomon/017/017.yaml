theological_decisions:
- issue: Whether to soften the covenantal-gendered phrase υἱοὶ τῆς διαθήκης
  chosen_reading: sons of the covenant
  alternative_readings:
  - children of the covenant
  - people of the covenant
  rationale: The Greek is explicitly masculine plural and the phrase appears identity-marking
    rather than incidental. Following the project's gender-accurate policy, the masculine
    form is retained in the main text.
  doctrine_reference: Gender-accurate over gender-neutral.
- issue: How to render the Hebraic moral pair ἔλεος καὶ ἀλήθειαν
  chosen_reading: mercy and truth
  alternative_readings:
  - mercy and faithfulness
  - steadfast love and faithfulness
  rationale: The phrase likely reflects a Semitic ethical-covenantal idiom. The main
    text keeps the transparent literal pair, while the alternative sense of ἀλήθεια
    as 'faithfulness' is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
