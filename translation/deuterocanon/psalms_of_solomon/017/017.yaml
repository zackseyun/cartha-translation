id: PSS.17.17
reference: Psalms of Solomon 17:17
source:
  edition: lxx-swete-1909
  text: καὶ ἐπεκρατοῦσαν αὐτῶν υἱοὶ τῆς διαθήκης ἐν μέσῳ ἐθνῶν συμμίκτων, οὐκ ἦν ὁ ποιῶν ἐν μέσῳ ἐν αὐτοῖς, ἐν Ἰερουσαλήμ, ἔλεος καὶ ἀλήθειαν.
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: And the sons of the covenant surpassed them in the midst of the mixed nations; there was no one among them in Jerusalem doing mercy and truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'doing mercy and faithfulness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were prevailing over them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπεκρατοῦσαν
  chosen: were prevailing over
  alternatives:
  - were ruling over
  - were overpowering
  - had mastery over
  lexicon: BDAG
  rationale: The imperfect suggests ongoing action, and the verb with the genitive αὐτῶν naturally carries the sense of prevailing over or exercising dominance over them. 'Were prevailing over' preserves that force without overcommitting to formal political rule.
- source_word: υἱοὶ τῆς διαθήκης
  chosen: sons of the covenant
  alternatives:
  - children of the covenant
  - people of the covenant
  lexicon: BDAG
  rationale: The phrase is literally masculine plural and likely carries covenant-identity weight rather than merely generic membership. Per project philosophy, the gendered form is retained unless context clearly requires neutralization.
- source_word: ἐθνῶν συμμίκτων
  chosen: the mixed nations
  alternatives:
  - the mixed peoples
  - the mingled nations
  lexicon: LSJ
  rationale: συμμίκτων conveys mixture or mingling. 'Mixed nations' is concise and preserves the collective ethnic-national sense of ἐθνῶν.
- source_word: ὁ ποιῶν
  chosen: doing
  alternatives:
  - practicing
  - showing
  lexicon: BDAG
  rationale: The participle is broad and idiomatic in Semitic-style moral expressions. 'Doing' keeps the source texture and allows the paired objects 'mercy and truth' to stand plainly.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - steadfast love
  - kindness
  lexicon: BDAG
  rationale: ἔλεος regularly denotes mercy or compassionate kindness. 'Mercy' is the most direct rendering here and preserves the moral-religious force of the accusation.
- source_word: ἀλήθειαν
  chosen: truth
  alternatives:
  - faithfulness
  - reliability
  lexicon: BDAG
  rationale: In the collocation 'mercy and truth,' ἀλήθεια can shade toward covenantal faithfulness, but 'truth' preserves the literal wording and familiar pair while allowing readers to sense the broader ethical meaning.
