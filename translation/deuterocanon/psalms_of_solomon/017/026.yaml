id: PSS.17.26
reference: Psalms of Solomon 17:26
source:
  edition: lxx-swete-1909
  text: ἐξῶσαι ἁμαρτωλοὺς ἀπὸ κληρονομίας, ἐκτρῖψαι ὑπερηφανίαν ἁμαρτωλοῦ ὡς σκεύη
    κεραμέως, ἐν ῥάβδῳ σιδηρᾷ συντρίψαι πᾶσαν ὑπόστασιν αὐτῶν.
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: to drive sinners out from the inheritance, to shatter the pride of the sinner
    like a potter’s vessels, to crush all their substance with an iron rod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heritage' for 'inheritance.'
    reason: lexical_alternative
  - marker: b
    text: '''Of the sinner'' is singular in Greek and may function as a representative
      singular.'
    reason: lexical_alternative
  - marker: c
    text: '''All their substance'' may also be understood as ''their whole standing''
      or ''their possessions.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῶσαι
  chosen: to drive ... out
  alternatives:
  - to expel
  - to thrust out
  lexicon: BDAG
  rationale: The verb carries forceful removal. 'Drive out' is clear modern English
    and preserves the expulsive sense without sounding overly technical.
- source_word: κληρονομίας
  chosen: the inheritance
  alternatives:
  - inheritance
  - heritage
  lexicon: BDAG
  rationale: κληρονομία commonly denotes an inherited possession or allotted heritage.
    'The inheritance' preserves the likely covenantal-land sense while remaining natural
    in English.
- source_word: ἐκτρῖψαι
  chosen: to shatter
  alternatives:
  - to wipe out
  - to crush
  - to destroy
  lexicon: BDAG
  rationale: In this context the verb is followed by the image 'like a potter’s vessels,'
    so a breaking term fits the metaphor better than the more abstract 'wipe out.'
    'Shatter' carries both violence and the ceramic imagery.
- source_word: ὑπερηφανίαν
  chosen: the pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: BDAG
  rationale: The noun denotes arrogant self-exaltation. 'Pride' is the most direct
    rendering; the destructive context makes the negative sense clear.
- source_word: ἁμαρτωλοῦ
  chosen: of the sinner
  alternatives:
  - of a sinner
  - of sinners
  lexicon: BDAG
  rationale: The Greek is singular. Following the project's gender-accurate philosophy,
    the singular is preserved as a representative singular rather than flattened into
    a plural.
- source_word: σκεύη κεραμέως
  chosen: a potter’s vessels
  alternatives:
  - pottery vessels
  - pots of a potter
  lexicon: BDAG
  rationale: This keeps the concrete image and echoes the familiar biblical motif
    of pottery easily broken by judgment.
- source_word: ῥάβδῳ σιδηρᾷ
  chosen: with an iron rod
  alternatives:
  - with a rod of iron
  lexicon: BDAG
  rationale: Either order is possible in English. 'With an iron rod' is slightly more
    idiomatic in this clause while preserving the allusive force.
- source_word: συντρίψαι
  chosen: to crush
  alternatives:
  - to shatter
  - to break in pieces
  lexicon: BDAG
  rationale: The verb denotes forceful breaking. Using 'crush' here avoids repeating
    'shatter' from the previous infinitive while still conveying violent destruction.
- source_word: πᾶσαν ὑπόστασιν αὐτῶν
  chosen: all their substance
  alternatives:
  - their whole standing
  - their entire possessions
  - all their existence
  lexicon: BDAG
  rationale: ὑπόστασις here most naturally refers to what stands under them—their
    substance, resources, or material base. 'All their substance' preserves the breadth
    of the Greek without over-interpreting it as exclusively wealth or status.
