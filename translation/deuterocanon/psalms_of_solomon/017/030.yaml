  from: among their tribes upon the earth
  to: For he will recognize them, that they all are sons of their God, and he will apportion them by their tribes upon the land.
  rationale: 'Adjudicator-modified: The reviewer is entirely correct that `γῆς` here refers to the specific, territorial Land of Israel (Hebrew *''erets*), not the globe, and that `ἐν ταῖς φυλαῖς` reflects a Hebrew distributive (''by their tribes'') rather than a locative (''among''). The eschatological allotment of the land is a central theme here. However, to better reflect the Greek preposition `ἐπί` (upon), ''upon the land'' is slightly more precise than ''in the land'' while still capturing the territorial specificity.'
