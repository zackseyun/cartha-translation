id: PSS.17.30
reference: Psalms of Solomon 17:30
source:
  edition: lxx-swete-1909
  text: γνώσεται γὰρ αὐτοὺς ὅτι πάντες υἱοὶ θεοῦ εἰσιν αὐτῶν, καὶ καταμερίσει αὐτοὺς
    ἐν ταῖς φυλαῖς αὐτῶν ἐπὶ τῆς γῆς.
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: For he will recognize them, that they all are sons of their God, and he will
    apportion them among their tribes upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “children of their God.” The Greek more literally says “sons.”'
    reason: lexical_alternative
  - marker: b
    text: 'Or: “in the land,” if γῆ is taken in a more local sense.'
    reason: alternative_reading
lexical_decisions:
- source_word: γνώσεται
  chosen: will recognize
  alternatives:
  - will know
  - will acknowledge
  lexicon: BDAG
  rationale: Future middle of γινώσκω here points to personal recognition or acknowledgment
    of identity, not mere acquisition of information. 'Recognize' fits the relational
    and covenantal tone.
- source_word: υἱοὶ
  chosen: sons
  alternatives:
  - children
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and the project philosophy prefers
    gender-accurate rendering where the source is grammatically masculine. 'Sons'
    preserves the wording and possible covenantal dignity language.
- source_word: θεοῦ
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: Although anarthrous in Greek, the possessive construction αὐτῶν naturally
    yields 'their God' in English. This is the clearest idiomatic rendering.
- source_word: καταμερίσει
  chosen: will apportion
  alternatives:
  - will divide
  - will assign
  - will distribute
  lexicon: BDAG
  rationale: The verb conveys distribution or assignment by portions. 'Apportion'
    preserves the structured, tribal-allotment sense better than the flatter 'divide'.
- source_word: ἐν ταῖς φυλαῖς αὐτῶν
  chosen: among their tribes
  alternatives:
  - in their tribes
  - according to their tribes
  lexicon: BDAG
  rationale: φυλή commonly means 'tribe' in Israelite-national contexts. 'Among their
    tribes' communicates placement within the tribal order in readable English.
- source_word: ἐπὶ τῆς γῆς
  chosen: upon the earth
  alternatives:
  - on the earth
  - in the land
  lexicon: BDAG
  rationale: γῆ can mean either 'earth' or 'land.' Here the broader sense is possible,
    but because no narrower territorial marker is supplied, 'upon the earth' is retained
    as the more literal default.
