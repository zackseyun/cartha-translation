theological_decisions:
- issue: Rendering υἱοὶ θεοῦ
  chosen_reading: sons of their God
  alternative_readings:
  - children of their God
  rationale: The source text uses the masculine noun 'sons,' and the project's stated
    philosophy prefers gender-accurate renderings unless context clearly demands a
    generic smoothing. No doctrinal claim beyond covenant identity is imported.
  doctrine_reference: Gender-accurate over gender-neutral
- issue: Sense of ἐπὶ τῆς γῆς
  chosen_reading: upon the earth
  alternative_readings:
  - in the land
  rationale: Because γῆ can denote either the earth generally or a specific land,
    this phrase carries some real ambiguity. The main text keeps the broader, more
    literal sense, while the alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
