theological_decisions:
- issue: Moral exclusion from the restored community
  chosen_reading: The verse is rendered as excluding unrighteousness and those characterized
    by wickedness from dwelling among the people.
  alternative_readings:
  - The verse could be rendered with slightly more forensic language ('injustice')
    rather than moral-religious language ('unrighteousness').
  rationale: The immediate sense is communal purification under righteous rule, so
    the translation preserves both the abstract evil ('unrighteousness') and the morally
    compromised person ('one who knows wickedness') without importing later doctrinal
    categories.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
