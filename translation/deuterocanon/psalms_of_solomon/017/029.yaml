id: PSS.17.29
reference: Psalms of Solomon 17:29
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἀφήσει ἀδικίαν ἔτι μεῖναι ἐν αὐτῶν αὐληθῆναι ἐν, καὶ οὐ κατοικήσει
    τὰς ἄνθρωπος μετ’ αὐτῶν εἰδὼς κακίαν.
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: And he will not allow unrighteousness to remain among them any longer, and
    no one who knows wickedness will dwell with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek line in this witness is textually awkward around ''among them,''
      but the overall sense is clear: unrighteousness will no longer remain within
      the community.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀφήσει
  chosen: will not allow
  alternatives:
  - will not permit
  - will not leave
  lexicon: BDAG
  rationale: 'The future of ἀφίημι here governs an infinitive (''to remain'') and
    is best rendered as permissive refusal: he will not allow it to continue.'
- source_word: ἀδικίαν
  chosen: unrighteousness
  alternatives:
  - injustice
  - wrongdoing
  lexicon: BDAG
  rationale: ἀδικία commonly denotes injustice or unrighteousness. 'Unrighteousness'
    better fits the moral-religious register of this psalmic context, while still
    remaining natural English.
- source_word: ἔτι
  chosen: any longer
  alternatives:
  - still
  - any more
  lexicon: BDAG
  rationale: With the negated future and infinitive, ἔτι marks cessation of a prior
    state; 'any longer' expresses that force clearly in English.
- source_word: μεῖναι
  chosen: to remain
  alternatives:
  - to stay
  - to continue
  lexicon: BDAG
  rationale: '''Remain'' preserves the verbal sense with appropriate dignity and fits
    the construction after ἀφήσει.'
- source_word: ἐν αὐτῶν
  chosen: among them
  alternatives:
  - in them
  - in their midst
  lexicon: BDAG
  rationale: Although the transmitted line is awkward at this point, the local sense
    is collective rather than internal; 'among them' best conveys the social setting.
- source_word: κατοικήσει
  chosen: will dwell
  alternatives:
  - will live
  - will reside
  lexicon: BDAG
  rationale: '''Dwell'' suits the elevated style and preserves the idea of settled
    residence among the community.'
- source_word: ἄνθρωπος
  chosen: no one
  alternatives:
  - no man
  - no person
  lexicon: BDAG
  rationale: The singular ἄνθρωπος is generic here. 'No one' communicates the representative
    force naturally in modern English without implying a male-only restriction.
- source_word: εἰδὼς κακίαν
  chosen: who knows wickedness
  alternatives:
  - who knows evil
  - who is acquainted with wickedness
  lexicon: BDAG
  rationale: The participle plus object expresses familiarity with evil, not mere
    abstract awareness. 'Knows wickedness' preserves that compactly and solemnly.
- source_word: κακίαν
  chosen: wickedness
  alternatives:
  - evil
  - malice
  lexicon: BDAG
  rationale: In this purification context, κακία is broad moral evil rather than specifically
    interpersonal malice; 'wickedness' matches the tone and scope.
