  category: mistranslation
  tier: 2
  from: In the wrath of his splendor he sent them away as far as the west, and made the rulers of the land a mockery; he did not spare them.
  to: In the wrath of his beauty he sent them away as far as the west, and the rulers of the land to mockery; and he did not spare.
  rationale: 'The drafter chose ''splendor'' for κάλλους based on the mistaken assumption that the subject is God (see the lexical notes: ''context of divine action''). The subject is actually Pompey (''the lawless one'' from v. 13), who sent the Hasmonean rulers to the West (Rome). The Greek text literally says ''beauty'' (a well-known translator''s misreading of a Hebrew word for ''heat''). Since our project translates the Greek as it stands, it should read ''beauty.'' Additionally, the verb ἐξαπέστειλεν governs both clauses, so ''made'' is unnecessary, and the absolute ''he did not spare'' (οὐκ ἐφείσατο) should be preserved without adding ''them.'''
