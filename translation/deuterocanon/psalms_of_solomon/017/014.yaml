id: PSS.17.14
reference: Psalms of Solomon 17:14
source:
  edition: lxx-swete-1909
  text: ἐν ὀργῇ κάλλους αὐτοῦ ἐξαπέστειλεν αὐτὰ ἕως ἐπὶ δυσμῶν, καὶ τοὺς ἄρχοντας τῆς γῆς εἰς ἐμπαιγμόν· καὶ οὐκ ἐφείσατο.
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: In the wrath of his beauty he sent them away as far as the west, and the rulers of the land to mockery; and he did not spare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in the wrath of his beauty.'
    reason: lexical_alternative
  - marker: b
    text: Or 'made the rulers of the land an object of ridicule.'
    reason: lexical_alternative
  - marker: c
    text: Or 'In the wrath of his splendor he sent them away as far as the west, and made the rulers of the land a mockery; he did not spare them.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὀργῇ
  chosen: wrath
  alternatives:
  - anger
  - fury
  lexicon: BDAG
  rationale: ὀργή denotes strong, punitive anger. 'Wrath' best preserves the judicial and forceful sense in this context.
- source_word: κάλλους
  chosen: splendor
  alternatives:
  - beauty
  - majesty
  lexicon: BDAG
  rationale: The noun literally means 'beauty,' but in this context of divine action 'splendor' conveys visible magnificence without sounding overly aesthetic. The genitive is retained in the phrase 'wrath of his splendor' rather than being paraphrased away.
- source_word: ἐξαπέστειλεν
  chosen: sent ... away
  alternatives:
  - drove out
  - banished
  lexicon: BDAG
  rationale: The verb is an intensified form of 'send out.' 'Sent away' keeps the lexical core while fitting the object and destination phrase naturally in English.
- source_word: ἕως ἐπὶ δυσμῶν
  chosen: as far as the west
  alternatives:
  - to the western regions
  - to the place of sunset
  lexicon: LSJ
  rationale: δυσμαί refers to the west or sunset. 'As far as the west' preserves the directional force and the sense of expulsion to a far boundary.
- source_word: ἄρχοντας
  chosen: rulers
  alternatives:
  - princes
  - leaders
  lexicon: BDAG
  rationale: '''Rulers'' is the clearest modern rendering for political authorities in this context.'
- source_word: ἐμπαιγμόν
  chosen: a mockery
  alternatives:
  - derision
  - object of ridicule
  lexicon: BDAG
  rationale: The noun denotes scorn or ridicule. 'A mockery' is concise, natural English and preserves the shame dimension.
- source_word: οὐκ ἐφείσατο
  chosen: he did not spare them
  alternatives:
  - he showed no pity
  - he did not relent
  lexicon: BDAG
  rationale: The verb means to spare or refrain from inflicting harm. Adding 'them' makes the English idiomatic and matches the implied object from context.
