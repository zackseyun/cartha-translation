  from: have the peoples of the nations serve him
  to: have peoples of the nations to serve him
  rationale: 'The Greek construction ἔχω + object + infinitive (ἕξει λαοὺς ... δουλεύειν) means ''to have/possess [someone] to do [something],'' rather than the English causative ''to have [someone] do [something].'' The Greek also lacks the definite article for ''peoples'' (λαοὺς ἐθνῶν). | Adjudicator: The reviewer correctly identifies that the Greek construction ἔχω + object + infinitive (ἕξει λαοὺς... δουλεύειν) indicates possession with a purpose (''to have [someone] to do [something]''), rather th'
