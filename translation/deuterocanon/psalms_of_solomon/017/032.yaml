id: PSS.17.32
reference: Psalms of Solomon 17:32
source:
  edition: lxx-swete-1909
  text: καὶ ἕξει λαοὺς ἐθνῶν δουλεύειν αὐτῷ ὑπὸ τὸν ζυγὸν αὐτοῦ, καὶ τὸν κύριον δοξάσει
    ἐν ἐπισήμῳ πάσης τῆς γῆς.
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: And he will have the peoples of the nations serve him under his yoke, and
    he will glorify the Lord in a place distinguished above all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a place renowned in all the earth.' The Greek phrase with ἐπισήμῳ
      can emphasize notable prominence or renown.
    reason: lexical_alternative
  - marker: b
    text: Or 'have the peoples of the nations serve as subjects under his yoke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕξει
  chosen: he will have
  alternatives:
  - he will possess
  - he will hold
  lexicon: LSJ
  rationale: Future of ἔχω; 'he will have' is the most natural English and fits the
    following infinitive construction.
- source_word: λαοὺς ἐθνῶν
  chosen: the peoples of the nations
  alternatives:
  - peoples from the nations
  - nation-peoples
  - the Gentile peoples
  lexicon: LSJ
  rationale: A literal rendering preserves both λαοί and ἔθνη without prematurely
    collapsing the phrase into 'Gentiles.'
- source_word: δουλεύειν
  chosen: serve
  alternatives:
  - be enslaved
  - serve as subjects
  lexicon: LSJ
  rationale: The verb denotes service/subjection. Because the phrase already includes
    'under his yoke,' the coerced aspect is preserved without making the English unnecessarily
    heavy with 'enslaved' in the main text.
- source_word: ζυγὸν
  chosen: yoke
  alternatives:
  - rule
  - dominion
  lexicon: LSJ
  rationale: '''Yoke'' keeps the concrete metaphor present in the Greek and preserves
    the image of subjection.'
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord' as the default title.
- source_word: δοξάσει
  chosen: will glorify
  alternatives:
  - will honor
  - will give glory to
  lexicon: LSJ
  rationale: '''Will glorify'' is a direct and natural rendering that preserves the
    theological weight of the verb.'
- source_word: ἐν ἐπισήμῳ πάσης τῆς γῆς
  chosen: in a place distinguished above all the earth
  alternatives:
  - in a place renowned in all the earth
  - conspicuously over all the earth
  lexicon: LSJ
  rationale: ἐπίσημος carries the sense of marked, notable, or distinguished. The
    phrase likely refers to a uniquely prominent place without naming it explicitly,
    so the translation preserves that spatial prominence rather than paraphrasing
    it away.
