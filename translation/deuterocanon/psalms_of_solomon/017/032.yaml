  from: in a place distinguished above all the earth
  to: in a place conspicuous to all the earth
  rationale: 'Adjudicator-modified: The phrase `ἐν ἐπισήμῳ` functions substantively to mean ''in a conspicuous place'' or ''in full view'' (LSJ ἐπίσημος II.2). The genitive `πάσης τῆς γῆς` is not comparative (''above all the earth'') but objective or partitive. ''In a place conspicuous to all the earth'' accurately reflects the Greek grammar while providing a more natural English idiom than the reviewer''s literal ''of all the earth.'''
