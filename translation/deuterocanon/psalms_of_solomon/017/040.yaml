id: PSS.17.40
reference: Psalms of Solomon 17:40
source:
  edition: lxx-swete-1909
  text: εὐλογήσει λαὸν Κυρίου ἐν σοφίᾳ μετʼ εὐφροσύνης,
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: He will bless the Lord's people in wisdom, with gladness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in wisdom' for ἐν σοφίᾳ.
    reason: lexical_alternative
  - marker: b
    text: Or 'with joy' / 'with rejoicing' for μετʼ εὐφροσύνης.
    reason: lexical_alternative
  - marker: c
    text: Or 'with wisdom, with gladness'.
    reason: previous_rendering
lexical_decisions:
- source_word: εὐλογήσει
  chosen: He will bless
  alternatives:
  - he will speak well of
  - he will bestow blessing on
  lexicon: BDAG
  rationale: Future active of εὐλογέω. 'Bless' is the natural English equivalent and fits the royal-benefaction context without paraphrasing.
- source_word: λαὸν
  chosen: people
  alternatives:
  - nation
  - folk
  lexicon: BDAG
  rationale: λαός commonly denotes a people as a covenant community. 'People' is the most natural rendering here.
- source_word: Κυρίου
  chosen: the Lord's
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: 'The genitive is possessive: the people belong to the Lord. Following project doctrine, κύριος is rendered ''Lord.'' The possessive form reads naturally in English while preserving the sense.'
- source_word: ἐν σοφίᾳ
  chosen: with wisdom
  alternatives:
  - in wisdom
  lexicon: BDAG
  rationale: ἐν here expresses manner or sphere. 'With wisdom' is slightly more idiomatic in English while keeping the idea that the blessing is exercised wisely.
- source_word: μετʼ εὐφροσύνης
  chosen: with gladness
  alternatives:
  - with joy
  - with rejoicing
  lexicon: BDAG
  rationale: μετά with the genitive marks accompaniment. εὐφροσύνη denotes gladness or joy; 'gladness' preserves the dignified tone and avoids flattening the term.
