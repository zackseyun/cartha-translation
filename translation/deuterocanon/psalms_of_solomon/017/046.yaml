theological_decisions:
- issue: Social character of the king’s rule
  chosen_reading: The verse describes the ruler’s community as marked by equitable leadership and freedom from internal oppression.
  alternative_readings:
  - A more abstract statement about equality without social implications
  - A stronger ideological claim not explicit in the text
  rationale: The Greek emphasizes equitable rule and the absence of arrogant domination within the people. The translation preserves that ethical-social vision without importing claims beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
