id: PSS.17.46
reference: Psalms of Solomon 17:46
source:
  edition: lxx-swete-1909
  text: ἐν ἰσότητι πάντας αὐτοὺς ἄξει, καὶ οὐκ ἔσται ἐν αὐτοῖς ὑπερηφανία τοῦ καταδυναστευθῆναι ἐν αὐτοῖς.
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: With equity he will lead them all, and there will be no arrogance among them that any should be oppressed among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literally “and there will not be among them arrogance of being oppressed among them.” The Greek infinitive is formally passive and difficult; the main text gives the likely sense in context: no one among them will act arrogantly so as to oppress another.'
    reason: alternative_reading
  - marker: b
    text: Or 'for one to oppress another.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐν ἰσότητι
  chosen: with equity
  alternatives:
  - in equality
  - with fairness
  - equitably
  lexicon: LSJ
  rationale: ἰσότης denotes equality or equitable treatment. In a royal-governance context, “with equity” communicates impartial and just leadership more naturally than the wooden “in equality,” while staying close to the Greek sense.
- source_word: πάντας αὐτοὺς
  chosen: them all
  alternatives:
  - all of them
  - all
  lexicon: LSJ
  rationale: The phrase is emphatic and comprehensive. “Them all” preserves the totalizing force in idiomatic English.
- source_word: ἄξει
  chosen: he will lead
  alternatives:
  - he will guide
  - he will conduct
  lexicon: LSJ
  rationale: ἄγω commonly means “lead.” Given the shepherding context in the preceding line, “lead” fits both the lexical sense and the pastoral imagery.
- source_word: ὑπερηφανία
  chosen: arrogance
  alternatives:
  - pride
  - haughtiness
  lexicon: LSJ
  rationale: The noun denotes an exalted, overbearing attitude. “Arrogance” is clear modern English and fits the social-oppression context better than the broader “pride.”
- source_word: τοῦ καταδυναστευθῆναι
  chosen: for one to oppress another
  alternatives:
  - to domineer
  - to tyrannize
  - to be oppressed
  lexicon: LSJ
  rationale: The transmitted Greek is awkward because καταδυναστευθῆναι is formally passive ('to be oppressed' / 'to be tyrannized over'), which does not fit smoothly after “arrogance.” In context, the clause most likely expresses oppressive domination within the community. The main text therefore renders the sense idiomatically, while the footnote preserves the literal difficulty.
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - in them
  - within them
  lexicon: LSJ
  rationale: With a plural personal referent and communal context, “among them” is the natural English equivalent.
