id: PSS.17.45
reference: Psalms of Solomon 17:45
source:
  edition: lxx-swete-1909
  text: ποιμαίνων τὸ ποίμνιον Κυρίου ἐν πίστει καὶ δικαιοσύνῃ, καὶ οὐκ ἀφήσει ἀσθενῆσαι ἐν αὐτοῖς ἐν τῇ νομῇ αὐτῶν.
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: He will shepherd the Lord’s flock with faithfulness and righteousness, and he will not allow any among them to grow weak in their pasture.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in faith”; the Greek πίστει can denote either faith or faithfulness, and here the latter fits the ruler’s manner of shepherding more naturally.
    reason: lexical_alternative
  - marker: b
    text: Or “justice” for “righteousness.”
    reason: lexical_alternative
  - marker: c
    text: Or “will not allow any of them to become weak in their pasturage.”
    reason: lexical_alternative
  - marker: d
    text: Or 'Shepherding the Lord’s flock with faithfulness and righteousness, he will not allow'.
    reason: previous_rendering
lexical_decisions:
- source_word: ποιμαίνων
  chosen: Shepherding
  alternatives:
  - tending
  - pasturing
  lexicon: LSJ
  rationale: The participle evokes royal-pastoral rule, not merely feeding. “Shepherding” preserves the leadership metaphor and connects naturally to the following reference to the flock.
- source_word: ποίμνιον
  chosen: flock
  alternatives:
  - sheepfold
  - little flock
  lexicon: LSJ
  rationale: The noun denotes the flock as a group. “Flock” is the most natural and transparent English equivalent here.
- source_word: Κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  lexicon: LSJ
  rationale: The genitive is possessive. “The Lord’s” is natural English and follows the project’s default rendering of κύριος as “Lord.”
- source_word: πίστει
  chosen: faithfulness
  alternatives:
  - faith
  - trust
  lexicon: LSJ
  rationale: In this royal-shepherd context, the term describes the manner of his rule rather than the flock’s believing response. “Faithfulness” best conveys reliable covenantal integrity in action.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: “Righteousness” is the project’s default and fits the moral quality of the ruler’s shepherding. “Justice” is a plausible contextual alternative but slightly narrower here.
- source_word: ἀφήσει
  chosen: will not allow
  alternatives:
  - will not leave
  - will not permit
  lexicon: LSJ
  rationale: The future verb here expresses prevention rather than simple abandonment. “Will not allow” best fits the following infinitive.
- source_word: ἀσθενῆσαι
  chosen: to grow weak
  alternatives:
  - to become weak
  - to be feeble
  lexicon: LSJ
  rationale: The aorist infinitive marks entry into weakness. “To grow weak” reads naturally while preserving that nuance.
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - in them
  lexicon: LSJ
  rationale: 'With a plural personal reference in context, the idiomatic English sense is distributive: weakness arising within the flock.'
- source_word: νομῇ
  chosen: pasture
  alternatives:
  - pasturage
  - grazing place
  lexicon: LSJ
  rationale: The pastoral imagery continues from “shepherding” and “flock.” “Pasture” is concise, vivid, and faithful to the image.
