  rationale: 'The Greek verb ἐλπιοῦμεν is the future indicative active of ἐλπίζω, not the present tense (which would be ἐλπίζομεν). The future tense should be preserved to reflect the community''s forward-looking resolve, contrasting with the fleeting hope of man in the previous verse. | Adjudicator: The reviewer is factually correct regarding the Greek morphology. The form ἐλπιοῦμεν is the Attic future indicative active (1st person plural) of ἐλπίζω, whereas the present tense would be ἐλπίζομεν. '
