- issue: Whether σωτῆρα should be rendered more generically as 'deliverer' or more theologically as 'savior'
  chosen_reading: savior
  alternative_readings:
  - deliverer
  rationale: The phrase 'God our savior' functions as a confessional title here, and 'savior' preserves that theological force better than the more situational 'deliverer.'
  doctrine_reference: Original-language primacy over translation tradition; readable modern English, not archaic or academic
- issue: Whether βασιλεία should be rendered 'kingdom' or 'reign'
  chosen_reading: kingdom
  alternative_readings:
  - reign
  - kingship
  rationale: The context emphasizes God's everlasting royal rule over the nations. 'Kingdom' best preserves the royal register and parallels the preceding term for dominion, while remaining natural English.
  doctrine_reference: Consistency of key terms, or documented exception
