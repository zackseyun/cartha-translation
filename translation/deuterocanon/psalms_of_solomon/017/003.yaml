id: PSS.17.3
reference: Psalms of Solomon 17:3
source:
  edition: lxx-swete-1909
  text: ἡμεῖς δὲ ἐλπιοῦμεν ἐπὶ τὸν θεὸν σωτῆρα ἡμῶν, ὅτι τὸ κράτος τοῦ θεοῦ ἡμῶν εἰς τὸν αἰῶνα μετʼ ἐλέους, καὶ ἡ βασιλεία τοῦ θεοῦ ἡμῶν εἰς τὸν αἰῶνα ἐπὶ τὰ ἔθνη.
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: But we will hope in God our savior, because the dominion of our God is forever with mercy, and the kingdom of our God is forever over the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we place our hope in God our deliverer.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the sovereignty of our God is forever in mercy.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the reign of our God is forever over the nations.'
    reason: lexical_alternative
  - marker: d
    text: Or 'But we hope in God our savior'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐλπιοῦμεν
  chosen: we hope
  alternatives:
  - we place our hope
  - we trust
  lexicon: BDAG
  rationale: The verb denotes hopeful reliance or expectation. 'We hope' is the most direct and natural English rendering, while still allowing the following prepositional phrase to carry the sense of reliance on God.
- source_word: ἐπὶ τὸν θεόν
  chosen: in God
  alternatives:
  - on God
  lexicon: BDAG
  rationale: With ἐλπίζω, English idiom normally uses 'hope in' rather than 'hope on.' This preserves the sense without woodenly reproducing the preposition.
- source_word: σωτῆρα
  chosen: savior
  alternatives:
  - deliverer
  lexicon: BDAG
  rationale: σωτήρ commonly means 'savior' or 'deliverer.' 'Savior' best preserves the theological weight and is natural in this confessional context.
- source_word: κράτος
  chosen: dominion
  alternatives:
  - might
  - power
  - sovereignty
  lexicon: BDAG
  rationale: κράτος can denote strength or ruling power. Here, parallel with 'kingdom' and followed by 'over the nations,' it points to effective rule; 'dominion' best captures royal governing power.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - unto eternity
  lexicon: BDAG
  rationale: The phrase idiomatically expresses enduring perpetuity. 'Forever' is the clearest modern equivalent.
- source_word: μετʼ ἐλέους
  chosen: with mercy
  alternatives:
  - in mercy
  - accompanied by mercy
  lexicon: BDAG
  rationale: The preposition μετά with the genitive conveys accompaniment. 'With mercy' is compact and preserves the sense that God's dominion is exercised mercifully.
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - reign
  - kingship
  lexicon: BDAG
  rationale: βασιλεία can denote either realm or reign. Because the line speaks of God's rule in a broad royal sense and parallels κράτος, 'kingdom' is a natural and traditional rendering, while still intelligible in modern English.
- source_word: ἐπὶ τὰ ἔθνη
  chosen: over the nations
  alternatives:
  - upon the nations
  - among the nations
  lexicon: BDAG
  rationale: In this context ἐπί conveys authority extending over the nations, not merely location among them. 'Over the nations' best fits the royal sense.
