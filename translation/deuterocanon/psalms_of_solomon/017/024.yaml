id: PSS.17.24
reference: Psalms of Solomon 17:24
source:
  edition: lxx-swete-1909
  text: καὶ ὑψώσον αὐτὸν ἰσχὺν τοῦ θραῦσαι ἄρχοντας ἀδίκους.
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: And raise him up in strength to shatter unjust rulers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “exalt him with strength” or “lift him up mightily.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑψώσον
  chosen: raise ... up
  alternatives:
  - exalt
  - lift up
  lexicon: BDAG
  rationale: The imperative asks God to elevate the anointed figure for action. “Raise
    ... up” preserves the upward/elevating force of the verb while sounding natural
    in English and fitting the following purpose clause.
- source_word: ἰσχὺν
  chosen: in strength
  alternatives:
  - with strength
  - mightily
  lexicon: BDAG
  rationale: The accusative functions adverbially or as a manner expression. “In strength”
    keeps the Greek compactness and avoids over-interpreting whether the sense is
    empowerment or exaltation characterized by strength.
- source_word: θραῦσαι
  chosen: to shatter
  alternatives:
  - to break
  - to crush
  lexicon: BDAG
  rationale: The infinitive expresses purpose after the imperative. “Shatter” preserves
    the forceful, destructive sense better than the milder “break,” while avoiding
    the slightly more interpretive political tone of “crush.”
- source_word: ἄρχοντας
  chosen: rulers
  alternatives:
  - princes
  - leaders
  lexicon: BDAG
  rationale: The term denotes governing authorities. “Rulers” is clear, modern, and
    broad enough for the political sense here.
- source_word: ἀδίκους
  chosen: unjust
  alternatives:
  - unrighteous
  - wicked
  lexicon: BDAG
  rationale: Here the adjective describes corrupt governing authorities in a public/judicial
    sense. “Unjust” captures that political-moral force more naturally than the more
    overtly theological “unrighteous.”
