id: PSS.17.37
reference: Psalms of Solomon 17:37
source:
  edition: lxx-swete-1909
  text: οὐ γὰρ ἐλπιεῖ ἐπὶ ἵππον καὶ ἀναβάτην καὶ τόξον, οὐδὲ πληθυνεῖ αὐτῷ χρυσίον οὐδὲ ἀργύριον εἰς πόλεμον, καὶ πολλοῖς οὐ συνάξει ἐλπίδας εἰς ἡμέραν πολέμου.
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: For he will not put his hope in horse and rider and bow, nor will he multiply For he will not put his hope in horse and rider and bow, nor will he multiply gold or silver for himself for war, nor will he gather confidence from great numbers for the day of battle. for himself for war, nor will he gather confidence from great numbers for the day of battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'nor will he gather hopes with many for the day of war'; the Greek likely refers to relying on large numbers or a large force.
    reason: lexical_alternative
  - marker: b
    text: Or 'gold and silver'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐλπιεῖ
  chosen: will not put his hope
  alternatives:
  - will not hope
  - will not trust
  lexicon: BDAG
  rationale: The verb is from ἐλπίζω, literally 'to hope,' but in this military context it carries the sense of placing reliance on something. 'Put his hope' preserves the lexical link to hope while sounding natural in English.
- source_word: ἵππον
  chosen: horse
  alternatives:
  - war horse
  lexicon: LSJ
  rationale: The Greek is simply 'horse.' Since the surrounding terms are military, the warlike sense is already clear from context and need not be added in translation.
- source_word: ἀναβάτην
  chosen: rider
  alternatives:
  - horseman
  lexicon: LSJ
  rationale: '''Rider'' is the more literal and transparent rendering here, pairing naturally with ''horse'' and preserving the compact sequence of military resources.'
- source_word: τόξον
  chosen: bow
  alternatives:
  - weapon
  - battle bow
  lexicon: LSJ
  rationale: The noun specifically denotes a bow. A more general rendering would lose the concrete military imagery.
- source_word: πληθυνεῖ αὐτῷ
  chosen: will multiply for himself
  alternatives:
  - will increase for himself
  - will make abundant for himself
  lexicon: BDAG
  rationale: The verb means to make many or increase; αὐτῷ is best taken as a dative of advantage ('for himself'). This preserves the sense of accumulating resources personally.
- source_word: χρυσίον οὐδὲ ἀργύριον
  chosen: gold and silver
  alternatives:
  - money
  - treasure
  lexicon: LSJ
  rationale: The text names precious metals directly, and the concrete wording fits the verse's catalog of military means better than an abstract term like 'money.'
- source_word: πολλοῖς
  chosen: from great numbers
  alternatives:
  - with many men
  - by many supporters
  lexicon: LSJ
  rationale: The dative is somewhat compressed, but in context it points to numerical strength or a large force. 'From great numbers' brings out the sense without over-specifying beyond the Greek.
- source_word: συνάξει ἐλπίδας
  chosen: will gather confidence
  alternatives:
  - will gather hopes
  - will assemble hopes
  lexicon: BDAG
  rationale: A formally literal rendering like 'gather hopes' is awkward in English. 'Gather confidence' preserves the underlying idea of collecting grounds for reliance while reading idiomatically.
- source_word: ἡμέραν πολέμου
  chosen: the day of battle
  alternatives:
  - the day of war
  lexicon: LSJ
  rationale: Both are possible, but 'day of battle' is slightly more idiomatic in English while retaining the concrete wartime setting.
