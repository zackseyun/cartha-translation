id: PSS.17.16
reference: Psalms of Solomon 17:16
source:
  edition: lxx-swete-1909
  text: καὶ πάντα ὅσα ἐποίησεν ἐν Ἰερουσαλήμ, καθὼς καὶ τὰ ἔθνη ἐν ταῖς πόλεσι τοὺς
    θεοὺς αὐτῶν.
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: And everything that he did in Jerusalem was just as the nations do to their
    gods in their cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek comparison is elliptical; the implied sense may also be, 'just
      as the nations do with their gods in their cities.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Gentiles' instead of 'the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα ὅσα
  chosen: everything that
  alternatives:
  - all that
  - all the things that
  lexicon: LSJ
  rationale: The phrase is comprehensive and relative in force. 'Everything that'
    is natural English and preserves the sweeping sense of the Greek.
- source_word: ἐποίησεν
  chosen: did
  alternatives:
  - acted
  - performed
  - made
  lexicon: LSJ
  rationale: The verb is broad and here governs the clause's actions in Jerusalem.
    'Did' best preserves that breadth without over-interpreting the specific nature
    of the acts.
- source_word: ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: LSJ
  rationale: The prepositional phrase is straightforwardly locative, and 'in Jerusalem'
    is the standard natural rendering.
- source_word: καθὼς καὶ
  chosen: was just as
  alternatives:
  - was as
  - was in the same way as
  lexicon: LSJ
  rationale: 'The comparison is explicit, and English reads most clearly by making
    the implied copular relation overt: what he did in Jerusalem corresponded to what
    the nations do.'
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: LSJ
  rationale: '''The nations'' is the more literal rendering and fits the broader comparative
    statement. ''Gentiles'' is possible, but the verse is describing peoples in their
    own cities rather than foregrounding Jewish-Gentile contrast.'
- source_word: ἐν ταῖς πόλεσι
  chosen: in their cities
  alternatives:
  - in the cities
  lexicon: LSJ
  rationale: 'Although the possessive is not explicit with πόλεσι, English naturally
    supplies it from the following αὐτῶν and the parallel sense: the nations in their
    own cities.'
- source_word: τοὺς θεοὺς αὐτῶν
  chosen: their gods
  alternatives:
  - their idols
  lexicon: LSJ
  rationale: The Greek says 'their gods,' and the translation should preserve that
    wording rather than importing the interpretive gloss 'idols' into the main text.
