id: PSS.17.1
reference: Psalms of Solomon 17:1
source:
  edition: lxx-swete-1909
  text: Κύριε, σύ Βασιλεὺς ἡμῶν εἰς τὸν αἰῶνα καὶ ἔτι· ὅτι ἐν σοὶ, ὁ θεὸς ἡμῶν, καυχήσεται
    ἡ ψυχὴ ἡμῶν.
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: O Lord, you are our King forever and ever; for in you, our God, our soul will
    boast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forevermore' or more literally 'for the age and further.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will glory' or 'will exult in you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: O Lord
  alternatives:
  - Lord
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος addressed directly to God; 'Lord' follows the project's
    default for κύριος, and 'O' marks direct address naturally in English without
    overstating archaism.
- source_word: Βασιλεὺς
  chosen: King
  alternatives:
  - ruler
  - sovereign
  lexicon: BDAG
  rationale: '''King'' is the plain sense and preserves the royal confession of God''s
    rule more directly than broader alternatives like ''sovereign''.'
- source_word: εἰς τὸν αἰῶνα καὶ ἔτι
  chosen: forever and ever
  alternatives:
  - forevermore
  - forever
  - for the age and beyond
  lexicon: BDAG
  rationale: The phrase intensifies enduring duration beyond a simple 'forever'; 'forever
    and ever' gives a natural English equivalent that preserves the emphatic force
    of καὶ ἔτι.
- source_word: καυχήσεται
  chosen: will boast
  alternatives:
  - will glory
  - will exult
  lexicon: BDAG
  rationale: The verb regularly carries the sense of boasting or glorying. 'Will boast'
    stays closest to the lexical force while remaining clear in modern English.
- source_word: ἡ ψυχὴ ἡμῶν
  chosen: our soul
  alternatives:
  - we ourselves
  - our life
  - our inner being
  lexicon: BDAG
  rationale: The Greek is singular with a plural possessor. 'Our soul' preserves the
    source image and collective sense better than flattening it to 'we'.
