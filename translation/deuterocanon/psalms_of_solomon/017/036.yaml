theological_decisions:
- issue: How to render the title sequence χριστὸς κύριος
  chosen_reading: the Lord Messiah
  alternative_readings:
  - the Messiah, the Lord
  - the Lord's Messiah
  rationale: The Greek text as given reads χριστὸς κύριος without an explicit genitive.
    “The Lord Messiah” preserves both title elements with minimal interpretive expansion
    and avoids importing the fuller interpretive claim “the Lord’s Messiah,” which
    the wording here does not explicitly state. Because the sequence can be understood
    in more than one way in English, alternatives are preserved in a footnote.
  doctrine_reference: Translate titles; preserve theological tension rather than resolve
    it.
