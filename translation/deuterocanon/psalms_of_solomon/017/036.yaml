id: PSS.17.36
reference: Psalms of Solomon 17:36
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἔστιν ἀδικία ἐν ταῖς ἡμέραις αὐτοῦ ἐν μέσῳ αὐτῶν. ὅτι πάντες ἅγιοι,
    καὶ βασιλεὺς αὐτῶν χριστὸς κύριος.
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: And there will be no injustice in his days among them, because all are holy,
    and their king is the Lord's Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “their king is the Messiah, the Lord”; alternatively, “their king is
      the Lord’s Messiah.”
    reason: alternative_reading
  - marker: b
    text: Or 'And there is no injustice'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀδικία
  chosen: injustice
  alternatives:
  - wrongdoing
  - unrighteousness
  lexicon: BDAG
  rationale: The term denotes the absence of moral and social wrong in the community
    under the king’s rule. “Injustice” is natural English and preserves both ethical
    and communal force better than the more abstract “unrighteousness.”
- source_word: ἡμέραις αὐτοῦ
  chosen: in his days
  alternatives:
  - during his reign
  - in the days of him
  lexicon: BDAG
  rationale: A fairly literal rendering keeps the idiom and preserves the temporal
    reference to the king’s era without over-interpreting it as a technical regnal
    formula.
- source_word: ἐν μέσῳ αὐτῶν
  chosen: among them
  alternatives:
  - in their midst
  - in the middle of them
  lexicon: BDAG
  rationale: “Among them” communicates the communal setting clearly in modern English
    while retaining the sense of life within the people.
- source_word: ἅγιοι
  chosen: holy
  alternatives:
  - saints
  - consecrated
  lexicon: BDAG
  rationale: “Holy” is the most direct and transparent rendering. “Saints” would sound
    more tradition-laden and could imply a later technical sense not required by the
    Greek.
- source_word: χριστός
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, the title is translated as “Messiah” where it functions
    as a title rather than a name-like form, preserving the Jewish royal-anointed
    context of the passage.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is normally rendered “Lord.” Here it is
    retained in the title sequence χριστὸς κύριος without collapsing the wording into
    a more interpretive English paraphrase.
