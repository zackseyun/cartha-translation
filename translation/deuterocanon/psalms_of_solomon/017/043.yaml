id: PSS.17.43
reference: Psalms of Solomon 17:43
source:
  edition: lxx-swete-1909
  text: καὶ εὐλογία Κυρίου μετʼ αὐτοῦ ἐν ἰσχύϊ,
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: And the blessing of the Lord is with him in strength,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in might' or 'with power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογία
  chosen: blessing
  alternatives:
  - blessing bestowed
  - favor
  lexicon: BDAG
  rationale: The noun denotes blessing in a straightforward sense here; 'blessing'
    is the most transparent and natural English equivalent.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: The genitive is rendered as 'of the Lord'/'the Lord's.' Following project
    doctrine for κύριος, 'Lord' is the default rendering.
- source_word: μετʼ αὐτοῦ
  chosen: with him
  alternatives:
  - accompanying him
  - upon him
  lexicon: BDAG
  rationale: The preposition μετά with genitive normally means 'with.' 'With him'
    preserves the relational sense without adding interpretation.
- source_word: ἐν ἰσχύϊ
  chosen: in strength
  alternatives:
  - in might
  - with power
  lexicon: BDAG
  rationale: ἰσχύς commonly denotes strength or might. 'In strength' preserves the
    Greek form most closely, while still reading naturally in English; alternatives
    are viable and noted.
- source_word: '[implied copula]'
  chosen: is
  rationale: Greek omits the finite verb in this clause. English normally requires
    an explicit copula, so 'is' is supplied to produce a grammatical translation without
    expanding the sense.
