id: PSS.17.51
reference: Psalms of Solomon 17:51
source:
  edition: lxx-swete-1909
  text: ταχύναι ὁ θεὸς ἐπὶ Ἰσραὴλ τὸ ἔλεος αὐτοῦ. ῥύσεται ἡμᾶς ἀπὸ ἀκαθαρσίας ἐχθρῶν
    βεβήλων. Κύριος αὐτὸς βασιλεὺς ἡμῶν εἰς τὸν αἰῶνα καὶ ἔτι.
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: May God hasten his mercy upon Israel. He will rescue us from the uncleanness
    of profane enemies. The Lord himself is our king forevermore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The opening Greek uses an infinitive (''to hasten''), which is rendered
      idiomatically here as a prayer-like wish: ''May God hasten...'''
    reason: alternative_reading
  - marker: b
    text: Or 'defilement' instead of 'uncleanness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'impious enemies' instead of 'profane enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταχύναι
  chosen: hasten
  alternatives:
  - quickly show
  - speed
  lexicon: BDAG
  rationale: The Greek uses an infinitive in an exclamatory/prayer-like opening. 'Hasten'
    preserves the urgency and works idiomatically in English without over-paraphrasing.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: BDAG
  rationale: '''Mercy'' is the most direct and natural rendering here, expressing
    God''s compassionate favor toward Israel without importing covenantal nuance not
    explicit in this line alone.'
- source_word: ῥύσεται
  chosen: will rescue
  alternatives:
  - will deliver
  - will save
  lexicon: BDAG
  rationale: The future verb naturally reads as a confident declaration following
    the prayer-like opening. 'Rescue' is vivid, clear modern English and fits deliverance
    from hostile pollution.
- source_word: ἀκαθαρσίας
  chosen: uncleanness
  alternatives:
  - defilement
  - impurity
  lexicon: BDAG
  rationale: The word carries impurity/defilement language. 'Uncleanness' keeps the
    cultic and moral force without sounding overly technical.
- source_word: βεβήλων
  chosen: profane
  alternatives:
  - impious
  - godless
  lexicon: BDAG
  rationale: '''Profane'' best matches the sense of what is unhallowed or irreverent,
    and it pairs naturally with the impurity language of the clause.'
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord.' Here it names God as
    Israel's true ruler.
- source_word: εἰς τὸν αἰῶνα καὶ ἔτι
  chosen: forevermore
  alternatives:
  - forever and ever
  - forever and beyond
  lexicon: BDAG
  rationale: The phrase intensifies enduring rule. 'Forevermore' captures the ongoing,
    unending sense in natural English without becoming cumbersome.
