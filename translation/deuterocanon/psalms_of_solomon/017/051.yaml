theological_decisions:
- issue: Force of the opening clause with ταχύναι
  chosen_reading: 'A prayer-like wish: ''May God hasten his mercy upon Israel.'''
  alternative_readings:
  - A more literal but less idiomatic infinitival sense such as 'for God to hasten
    his mercy upon Israel'
  - A declarative sense emphasizing quick action, e.g. 'God hastens his mercy upon
    Israel'
  rationale: The infinitive at the head of the sentence is awkward in English if translated
    mechanically. In context it is best represented as a wish/prayer, which preserves
    the verse's tone while staying close to the Greek sense.
