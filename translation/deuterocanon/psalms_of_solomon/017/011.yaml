id: PSS.17.11
reference: Psalms of Solomon 17:11
source:
  edition: lxx-swete-1909
  text: οὐκ ἐλέησεν αὐτοὺς ὁ θεός. ἐξερεύνησεν τὸ σπέρμα αὐτῶν καὶ οὐκ ἀφῆκεν αὐτῶν
    ἕνα
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: God did not have mercy on them. He searched out their offspring and did not
    leave one of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their seed' or 'their descendants.'
    reason: lexical_alternative
  - marker: b
    text: Or 'God did not spare them.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐλέησεν
  chosen: did not spare
  alternatives:
  - did not have mercy on
  - did not pity
  lexicon: BDAG
  rationale: Although the verb often means 'show mercy,' in this judgment context
    'did not spare' gives the force more naturally in modern English without weakening
    the severity of the action.
- source_word: ἐξερεύνησεν
  chosen: searched out
  alternatives:
  - investigated
  - tracked down
  lexicon: BDAG
  rationale: The verb conveys thorough searching or investigation. 'Searched out'
    preserves that sense while fitting the narrative of punitive pursuit.
- source_word: σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: BDAG
  rationale: Here the word refers to posterity rather than literal seed. 'Offspring'
    is natural English and keeps the familial sense without sounding overly technical.
- source_word: οὐκ ἀφῆκεν αὐτῶν ἕνα
  chosen: did not leave one of them
  alternatives:
  - left not one of them
  - did not spare a single one of them
  lexicon: BDAG
  rationale: This rendering preserves the idiomatic force of totality while staying
    close to the Greek structure.
