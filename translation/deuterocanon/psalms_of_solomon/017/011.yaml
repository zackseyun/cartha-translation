  from: God did not spare them.
  to: God did not have mercy on them.
  rationale: 'Translating ἐλεέω as ''spare'' obscures the covenantal concept of mercy
    and flattens the author''s vocabulary, especially since the author uses the actual
    word for ''spare'' (φείδομαι) just three verses later in 17:14 (οὐκ ἐφείσατο).
    The text explicitly says God withheld mercy. | Adjudicator: The reviewer is correct
    that ἐλεέω specifically denotes having mercy or showing pity, which carries distinct
    covenantal weight in the Psalms of Solomon. Translating it as ''spare'' conflates
    it with φεί'
