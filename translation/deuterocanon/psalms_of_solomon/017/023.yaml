theological_decisions:
- issue: Messianic force of υἱὸν Δαυίδ
  chosen_reading: Rendered as “a son of David” in the main text.
  alternative_readings:
  - the Son of David
  - Davidic king
  rationale: The phrase clearly marks Davidic-messianic expectation, but the Greek wording here is not most naturally a fixed English titular form. The translation preserves descent language directly while allowing readers to hear the messianic implication.
  doctrine_reference: Translate titles for meaning, but avoid importing doctrinal specificity beyond the source text.
- issue: Semantic force of ὃν ἴδες σύ, ὁ θεός
  chosen_reading: Retained the literal sense “you saw, O God.”
  alternative_readings:
  - you chose, O God
  - you appointed, O God
  rationale: The context may imply divine determination of the proper time, but the Greek lexeme itself is the verb “see.” Preserving that wording maintains transparency and avoids over-resolving the theological implication.
  doctrine_reference: Preserve theological tension rather than resolve it.
