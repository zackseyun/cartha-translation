id: PSS.17.23
reference: Psalms of Solomon 17:23
source:
  edition: lxx-swete-1909
  text: ἴδε, Κύριε, καὶ ἀνάστησον αὐτοῖς τὸν βασιλέα αὐτῶν, υἱὸν Δαυίδ, εἰς τὸν καιρὸν ὃν ἴδες σύ, ὁ θεός, τοῦ βασιλεῦσαι ἐπʼ Ἰσραὴλ παῖδά σου.
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: Look, Lord, and raise up for them their king, Look, Lord, and raise up for them their king, the son of David, at the time you chose, O God, for him to reign over Israel your servant., at the time Look, Lord, and raise up for them their king, a son of David, at the time you chose, O God, for him to reign over Israel your servant., O God, for him to reign over Israel your servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the son of David.” The Greek can be heard with stronger messianic force.
    reason: lexical_alternative
  - marker: b
    text: Literally “the time you saw, O God”; this may imply the time God has chosen or determined.
    reason: alternative_reading
  - marker: c
    text: Or “your child” for “your servant.”
    reason: lexical_alternative
  - marker: d
    text: Or 'a son of David'.
    reason: previous_rendering
  - marker: e
    text: Or 'you saw'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἴδε
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: An imperative of address to God. “Look” is natural modern English while preserving the urgent petition; “behold” would sound archaic.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Direct vocative title for God. This matches the project's default rendering of κύριος as “Lord.”
- source_word: ἀνάστησον
  chosen: raise up
  alternatives:
  - appoint
  - bring forth
  lexicon: BDAG
  rationale: The verb naturally carries the sense of causing to arise or raising up. “Raise up” preserves the biblical-messianic flavor better than the flatter “appoint.”
- source_word: αὐτοῖς
  chosen: for them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: With “raise up,” English idiom prefers “for them,” expressing benefit to the people.
- source_word: τὸν βασιλέα αὐτῶν
  chosen: their king
  alternatives:
  - the king for them
  lexicon: BDAG
  rationale: Straightforward possessive construction; “their king” is the clearest natural rendering.
- source_word: υἱὸν Δαυίδ
  chosen: a son of David
  alternatives:
  - the son of David
  - David's son
  lexicon: BDAG
  rationale: The anarthrous phrase is best rendered indefinitely here. It identifies Davidic descent without forcing the more title-like English phrase “the Son of David,” though that messianic resonance remains present.
- source_word: εἰς τὸν καιρὸν
  chosen: at the time
  alternatives:
  - for the time
  - in the time
  lexicon: BDAG
  rationale: This gives the temporal force idiomatically in English.
- source_word: ὃν ἴδες σύ, ὁ θεός
  chosen: you saw, O God
  alternatives:
  - you determined, O God
  - you chose, O God
  lexicon: BDAG
  rationale: The Greek verb is literally “saw.” Although interpreters may understand divine selection or foreseeing by implication, the main text should preserve the plain lexical sense and let interpretation remain transparent.
- source_word: τοῦ βασιλεῦσαι
  chosen: for him to reign
  alternatives:
  - to reign
  - that he might reign
  lexicon: BDAG
  rationale: 'This infinitive expresses purpose. “For him to reign” makes the implied subject clear in English: the raised-up Davidic king.'
- source_word: ἐπʼ Ἰσραὴλ
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: BDAG
  rationale: In royal context, “over Israel” is standard and clear English.
- source_word: παῖδά σου
  chosen: your servant
  alternatives:
  - your child
  lexicon: BDAG
  rationale: With Israel as God's covenant people under royal rule, “servant” fits the biblical idiom better than “child.” It also preserves the corporate-servant nuance common in scriptural usage.
