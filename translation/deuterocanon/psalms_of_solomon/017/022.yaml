id: PSS.17.22
reference: Psalms of Solomon 17:22
source:
  edition: lxx-swete-1909
  text: ὁ βασιλεὺς ἐν παρανομίᾳ καὶ ὁ κριτὴς ἐν ἀπειθείᾳ, καὶ ὁ λαὸς ἐν ἁμαρτίᾳ.
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: The king was in lawlessness, and the judge in disobedience, and the people in sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek is a verbless clause; 'is' is supplied in English for clarity.
    reason: lexical_alternative
  - marker: b
    text: Or 'rebellion' for 'disobedience' (ἀπειθείᾳ).
    reason: lexical_alternative
  - marker: c
    text: Or 'The king is in lawlessness, and the judge in disobedience, and the people in sin.'.
    reason: previous_rendering
lexical_decisions:
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - ruler
  lexicon: BDAG
  rationale: The standard political title is best rendered plainly as 'king'; nothing in the verse requires a broader term like 'ruler'.
- source_word: ἐν
  chosen: in
  alternatives:
  - under
  - characterized by
  lexicon: BDAG
  rationale: The repeated ἐν ties each subject to a sphere or condition. 'In' preserves the Greek structure and the verse's rhythmic parallelism better than a more interpretive expansion.
- source_word: παρανομίᾳ
  chosen: lawlessness
  alternatives:
  - wickedness
  - transgression
  lexicon: BDAG
  rationale: '''Lawlessness'' best reflects the sense of disregard for law or covenantal order and keeps the moral-legal force of the noun.'
- source_word: κριτὴς
  chosen: judge
  alternatives:
  - magistrate
  lexicon: BDAG
  rationale: '''Judge'' is the direct and natural rendering for the office named in the Greek.'
- source_word: ἀπειθείᾳ
  chosen: disobedience
  alternatives:
  - rebellion
  - unbelief
  lexicon: BDAG
  rationale: In this civic-moral context, 'disobedience' best matches refusal to obey rightful authority or divine standard; 'unbelief' would import a narrower religious nuance not required here.
- source_word: λαὸς
  chosen: people
  alternatives:
  - nation
  lexicon: BDAG
  rationale: '''People'' fits the collective sense here without implying a geopolitical emphasis stronger than the Greek demands.'
- source_word: ἁμαρτίᾳ
  chosen: sin
  alternatives:
  - sinfulness
  lexicon: BDAG
  rationale: '''Sin'' is the straightforward rendering and preserves the concise final member of the threefold accusation.'
