  from: The king is in lawlessness, and the judge in disobedience, and the people in sin.
  to: The king was in lawlessness, and the judge in disobedience, and the people in sin.
  rationale: The Greek is a verbless clause, but the governing temporal context established in the preceding verses (especially the imperfect ἦν in 17:21) is past tense. The author is describing the historical corruption of the Hasmonean era that led to judgment and exile, not a present gnomic truth. The supplied verb must be 'was' to maintain the narrative flow.
