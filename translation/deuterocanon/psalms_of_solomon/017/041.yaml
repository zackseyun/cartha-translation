id: PSS.17.41
reference: Psalms of Solomon 17:41
source:
  edition: lxx-swete-1909
  text: καὶ αὐτὸς καθαρὸς ἀπὸ ἁμαρτίας, τοῦ ἄρχειν λαοὺς μεγάλους, ἐλέγξαι ἄρχοντας
    καὶ ἐξᾶραι ἁμαρτωλοὺς ἐν ἰσχύϊ λόγου.
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: And he himself will be free from sin, to rule great peoples, to rebuke rulers,
    and to remove sinners by the strength of his word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pure from sin.'
    reason: lexical_alternative
  - marker: b
    text: Or 'drive out sinners.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθαρὸς
  chosen: free from sin
  alternatives:
  - pure
  - clean
  lexicon: BDAG
  rationale: In the phrase καθαρὸς ἀπὸ ἁμαρτίας, the sense is moral purity rather
    than ritual cleanliness. 'Free from sin' expresses the idiomatic force clearly
    in natural English while preserving the source meaning.
- source_word: ἀπὸ ἁμαρτίας
  chosen: from sin
  alternatives:
  - from impurity
  - from transgression
  lexicon: BDAG
  rationale: The genitive phrase specifies separation from sin as the sphere of purity.
    'From sin' is the plain and direct rendering.
- source_word: ἄρχειν
  chosen: to rule
  alternatives:
  - to govern
  - to reign over
  lexicon: BDAG
  rationale: ἄρχειν denotes exercising authority. 'To rule' is concise and matches
    the royal-messianic context without over-expanding the sense.
- source_word: λαοὺς μεγάλους
  chosen: great peoples
  alternatives:
  - great nations
  - many peoples
  lexicon: BDAG
  rationale: λαοί is best kept as 'peoples' rather than 'nations' here, and μεγάλους
    most naturally modifies them as 'great.' This preserves the plural ethnic-political
    scope of the phrase.
- source_word: ἐλέγξαι
  chosen: to rebuke
  alternatives:
  - to expose
  - to reprove
  - to convict
  lexicon: BDAG
  rationale: In context of rulers, the verb carries the sense of authoritative censure.
    'To rebuke' is strong, readable English and fits the judicial-royal setting.
- source_word: ἐξᾶραι
  chosen: to remove
  alternatives:
  - to drive out
  - to take away
  lexicon: LSJ
  rationale: The verb conveys removal or elimination. 'To remove' preserves the broad
    force without choosing the more specific 'drive out' unless context makes expulsion
    explicit.
- source_word: ἐν ἰσχύϊ λόγου
  chosen: by the strength of his word
  alternatives:
  - by the might of word
  - by the power of speech
  lexicon: BDAG
  rationale: The phrase indicates effective power exercised through speech. English
    normally requires a possessive here, and 'his word' is the most natural way to
    express the subject's authoritative utterance without changing the sense.
