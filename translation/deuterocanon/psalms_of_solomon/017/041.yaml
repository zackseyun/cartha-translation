theological_decisions:
- issue: Messianic figure described as morally unstained
  chosen_reading: free from sin
  alternative_readings:
  - pure from sin
  - clean from sin
  rationale: The Greek states moral sinlessness straightforwardly. 'Free from sin'
    communicates that clearly in modern English without weakening the claim or importing
    later doctrinal phrasing beyond the text itself.
