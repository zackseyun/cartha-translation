theological_decisions:
- issue: Rendering δικαιοσύνη in a non-Pauline Jewish text
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Following project defaults, δικαιοσύνη is rendered “righteousness” here,
    while κρίμα carries the judicial component as “justice.” This preserves the ethical-juridical
    pairing rather than collapsing both terms into one semantic field.
