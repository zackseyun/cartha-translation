id: PSS.17.21
reference: Psalms of Solomon 17:21
source:
  edition: lxx-swete-1909
  text: πηγαὶ συνεσχέθησαν αἰώνιοι ἐξ ἀβύσσων, ἀπὸ ὀρέων ὑψηλῶν. ὅτι οὐκ ἦν ἐν αὐτοῖς
    ποιῶν δικαιοσύνην καὶ κρίμα· ἀπὸ ἄρχοντος αὐτῶν καὶ λαοῦ ἐλαχίστου ἐν πάσῃ ἁμαρτίᾳ.
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: The everlasting springs from the depths, from the lofty mountains, were restrained,
    because there was no one among them doing righteousness and justice; from their
    ruler to the least of the people, all were in every kind of sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “everlasting springs” or “ancient springs.”
    reason: lexical_alternative
  - marker: b
    text: Or 'The perennial springs were restrained from the depths, from the lofty
      mountains,'.
    reason: previous_rendering
lexical_decisions:
- source_word: πηγαὶ
  chosen: springs
  alternatives:
  - fountains
  - wellsprings
  lexicon: LSJ
  rationale: The noun denotes natural sources of flowing water. “Springs” is clear
    modern English and fits the imagery better than the slightly more archaic “fountains.”
- source_word: συνεσχέθησαν
  chosen: were restrained
  alternatives:
  - were held back
  - were shut up
  lexicon: LSJ
  rationale: The passive verb conveys being checked or held in. “Were restrained”
    preserves the judgment-oriented force without over-specifying a mechanical image.
- source_word: αἰώνιοι
  chosen: perennial
  alternatives:
  - everlasting
  - ancient
  lexicon: LSJ
  rationale: With water sources, the sense is likely enduring or age-long rather than
    philosophically eternal. “Perennial” gives natural English for springs that continually
    flow, while preserving the idea of long duration.
- source_word: ἐξ ἀβύσσων
  chosen: from the depths
  alternatives:
  - from the deeps
  - from the abysses
  lexicon: LSJ
  rationale: “The depths” is idiomatic English for subterranean deep places and avoids
    the awkward plural “abysses” while keeping the poetic force.
- source_word: ὀρέων ὑψηλῶν
  chosen: the lofty mountains
  alternatives:
  - the high mountains
  lexicon: LSJ
  rationale: The phrase is straightforwardly descriptive. “Lofty mountains” preserves
    the elevated poetic register naturally.
- source_word: ποιῶν δικαιοσύνην καὶ κρίμα
  chosen: doing righteousness and justice
  alternatives:
  - practicing righteousness and judgment
  - doing what is right and just
  lexicon: BDAG
  rationale: The participle with paired nouns expresses active moral conduct. “Doing
    righteousness and justice” stays close to the Greek and preserves the Hebraic
    ethical pairing without flattening it into paraphrase.
- source_word: ἄρχοντος
  chosen: ruler
  alternatives:
  - leader
  - prince
  lexicon: LSJ
  rationale: “Ruler” is the broadest and most transparent rendering here, fitting
    a social hierarchy contrast with “the least of the people.”
- source_word: ἐλαχίστου
  chosen: the least
  alternatives:
  - the smallest
  - the lowliest
  lexicon: LSJ
  rationale: The superlative marks the lowest social level in the people. “The least”
    is concise and idiomatic in this contrast.
- source_word: ἐν πάσῃ ἁμαρτίᾳ
  chosen: in every kind of sin
  alternatives:
  - in every sin
  - in all sin
  lexicon: BDAG
  rationale: A highly literal rendering (“in every sin”) is awkward in English. “In
    every kind of sin” captures the comprehensive force of the phrase without adding
    content.
