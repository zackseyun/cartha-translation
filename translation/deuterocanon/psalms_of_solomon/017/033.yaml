id: PSS.17.33
reference: Psalms of Solomon 17:33
source:
  edition: lxx-swete-1909
  text: καὶ καθαριεῖ Ἰερουσαλὴμ ἐν ἁγιασμῷ, ὡς καὶ τὸ ἀπ’ ἀρχῆς,
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: And he will purify Jerusalem in holiness, as it was from the beginning,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will cleanse Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: The Greek phrase 'as also the [thing] from the beginning' is elliptical;
      the translation supplies 'it was' for clear English.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθαριεῖ
  chosen: will purify
  alternatives:
  - will cleanse
  lexicon: BDAG
  rationale: The verb denotes making clean or pure. 'Purify' fits the religious setting
    better than the more general 'cleanse' while still remaining natural English.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Proper name transliterated by standard English convention.
- source_word: ἐν ἁγιασμῷ
  chosen: in holiness
  alternatives:
  - by holiness
  - in sanctification
  - with consecration
  lexicon: BDAG
  rationale: ἁγιασμός can denote holiness, consecration, or sanctification. 'In holiness'
    preserves the Greek phrasing closely and avoids over-specifying the exact nuance
    of means versus sphere.
- source_word: ὡς καὶ τὸ ἀπ’ ἀρχῆς
  chosen: as it was from the beginning
  alternatives:
  - as also from the beginning
  - as in the beginning
  lexicon: LSJ
  rationale: The Greek is somewhat elliptical, with τὸ standing in for an understood
    state or condition. Supplying 'it was' makes the comparison intelligible in English
    without adding new content.
