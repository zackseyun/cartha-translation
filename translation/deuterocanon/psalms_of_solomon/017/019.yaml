id: PSS.17.19
reference: Psalms of Solomon 17:19
source:
  edition: lxx-swete-1909
  text: ἐπλανῶντο ἐν ἐρήμοις, σωθῆναι ψυχὰς αὐτῶν ἀπὸ κακοῦ, καὶ τίμιον ἐν ὀφθαλμοῖς παροικίας ψυχὴ σεσωμένη ἐξ αὐτῶν.
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: They wandered in wildernesses They wandered in wildernesses that their lives might be saved from evil, and in the eyes of the sojourning community, a life saved from among them was precious. from evil, and in the eyes of the sojourning community, a life saved from among them was precious.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deserts' instead of 'wildernesses.'
    reason: lexical_alternative
  - marker: b
    text: Greek ψυχή can mean 'life' or 'soul'; here 'life' fits the survival context best.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the eyes of the exile' / 'diaspora'; the Greek παροικία denotes a community living away from its homeland.
    reason: lexical_alternative
  - marker: d
    text: Or 'to save their lives'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπλανῶντο
  chosen: they wandered
  alternatives:
  - they were led astray
  - they roamed
  lexicon: BDAG
  rationale: In this context with ἐν ἐρήμοις, the verb describes physical roaming or wandering rather than moral deception.
- source_word: ἐν ἐρήμοις
  chosen: in wildernesses
  alternatives:
  - in deserts
  - in desolate places
  lexicon: BDAG
  rationale: The plural suggests multiple barren or uninhabited places. 'Wildernesses' preserves the broad sense without narrowing it only to sandy desert terrain.
- source_word: σωθῆναι
  chosen: to save
  alternatives:
  - to be saved
  - for rescue of
  lexicon: BDAG
  rationale: 'The infinitive naturally expresses purpose after the prior clause: they wandered in order to save their lives.'
- source_word: ψυχὰς αὐτῶν
  chosen: their lives
  alternatives:
  - their souls
  lexicon: BDAG
  rationale: Here ψυχή refers to life in the concrete sense of survival, as shown by the flight-from-evil context.
- source_word: ἀπὸ κακοῦ
  chosen: from evil
  alternatives:
  - from harm
  - from disaster
  lexicon: BDAG
  rationale: The phrase can denote evil or calamity. 'Evil' keeps the Greek wording while still allowing the context of threatened harm.
- source_word: τίμιον
  chosen: precious
  alternatives:
  - valuable
  - honored
  lexicon: BDAG
  rationale: '''Precious'' best conveys high value placed on the rescued life in a personal and communal sense.'
- source_word: παροικίας
  chosen: the sojourning community
  alternatives:
  - the exile
  - the diaspora
  - the resident-alien community
  lexicon: BDAG
  rationale: παροικία can denote a community living as foreigners or in exile. 'Sojourning community' preserves that communal and displaced sense in readable English.
- source_word: ψυχὴ σεσωμένη
  chosen: a life saved
  alternatives:
  - a saved soul
  - a life that had been preserved
  lexicon: BDAG
  rationale: Again ψυχή is taken as 'life' rather than 'soul,' and the perfect participle conveys a state of having been rescued.
- source_word: ἐξ αὐτῶν
  chosen: from among them
  alternatives:
  - out of them
  - from them
  lexicon: BDAG
  rationale: This most naturally refers to one rescued out from the group previously mentioned.
