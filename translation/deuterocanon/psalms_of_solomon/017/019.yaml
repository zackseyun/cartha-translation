theological_decisions:
- issue: Whether ψυχή should be rendered 'soul' or 'life' in both occurrences
  chosen_reading: Rendered as 'life/lives' in both cases
  alternative_readings:
  - Rendered as 'soul/souls'
  rationale: The verse speaks about wandering to escape danger, so the immediate sense is preservation of life rather than a more abstract statement about the soul. This avoids importing a stronger anthropological claim than the Greek requires.
