  tier: 3
  from: to save their lives
  to: They wandered in wildernesses that their lives might be saved from evil, and in the eyes of the sojourning community, a life saved from among them was precious.
  rationale: 'Adjudicator-modified: The reviewer is correct that the Greek uses the aorist passive infinitive σωθῆναι with the accusative subject ψυχὰς αὐτῶν, and the current active rendering obscures this passive force (which implies God or circumstance as the agent of rescue, not the wanderers themselves). However, ''for their lives to be saved'' is slightly clunky in this elevated psalmic register. ''That their lives might be saved'' preserves the passive grammar and purpose-clause function while maintaining a better English style.'
