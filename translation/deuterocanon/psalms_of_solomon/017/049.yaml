id: PSS.17.49
reference: Psalms of Solomon 17:49
source:
  edition: lxx-swete-1909
  text: οἱ λόγοι αὐτοῦ ὡς λόγοι ἁγίων ἐν μέσῳ λαῶν ἡγιασμένων.
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: His words are like the words of holy ones among sanctified peoples.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ λόγοι αὐτοῦ
  chosen: His words
  alternatives:
  - His sayings
  - His speech
  lexicon: LSJ / BDAG
  entry: null
  rationale: λόγοι most directly denotes words or utterances. 'His words' is the most
    transparent rendering and preserves the repeated noun in the verse.
- source_word: ὡς
  chosen: are like
  alternatives:
  - are as
  - are like those of
  lexicon: LSJ
  entry: null
  rationale: The comparison particle introduces likeness rather than identity. 'Are
    like' is natural modern English and keeps the simile explicit.
- source_word: λόγοι ἁγίων
  chosen: the words of holy ones
  alternatives:
  - the words of saints
  - holy words
  lexicon: LSJ / BDAG
  entry: null
  rationale: ἁγίων is best taken substantivally here, referring to holy persons rather
    than describing the words themselves. 'Holy ones' avoids overly ecclesiastical
    tradition-language while preserving the personal reference.
- source_word: ἐν μέσῳ
  chosen: in the midst of
  alternatives:
  - among
  - in the middle of
  lexicon: LSJ
  entry: null
  rationale: The phrase denotes being in the midst of or among a group. 'In the midst
    of' stays close to the Greek while remaining readable.
- source_word: λαῶν ἡγιασμένων
  chosen: sanctified peoples
  alternatives:
  - holy peoples
  - consecrated peoples
  - a sanctified people
  lexicon: LSJ / BDAG
  entry: null
  rationale: The Greek is plural, so 'peoples' should be preserved rather than reduced
    to singular 'people.' ἡγιασμένων denotes having been made holy or consecrated;
    'sanctified' best reflects that verbal idea without flattening it to a simple
    adjective.
