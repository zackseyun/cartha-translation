id: PSS.17.31
reference: Psalms of Solomon 17:31
source:
  edition: lxx-swete-1909
  text: καὶ πάροικος καὶ ἀλλογενὴς οὐ παροικήσει αὐτοῖς ἔτι· κρινεῖ λαοὺς καὶ ἔθνη
    ἐν σοφίᾳ δικαιοσύνης αὐτοῦ. διάψαλμα.
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: And no sojourner or foreigner shall sojourn among them any longer; he will
    judge peoples and nations in the wisdom of his righteousness. Selah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sojourner' for 'resident alien.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the wisdom of his justice.'
    reason: lexical_alternative
  - marker: c
    text: '''Selah'' likely marks a liturgical or musical pause; its precise force
      is uncertain.'
    reason: cultural_note
  - marker: d
    text: Or 'And no resident alien or foreigner shall sojourn among them any longer'.
    reason: previous_rendering
lexical_decisions:
- source_word: πάροικος
  chosen: resident alien
  alternatives:
  - sojourner
  - stranger
  lexicon: LSJ
  rationale: πάροικος denotes a person living beside or among a people without full
    native status. 'Resident alien' preserves the outsider-yet-dwelling nuance better
    than the broader 'stranger.'
- source_word: ἀλλογενής
  chosen: foreigner
  alternatives:
  - one of another race
  - outsider
  lexicon: LSJ
  rationale: ἀλλογενής emphasizes foreign origin. 'Foreigner' is the clearest modern
    English equivalent and pairs naturally with πάροικος without collapsing the distinction
    entirely.
- source_word: παροικήσει
  chosen: shall sojourn among them
  alternatives:
  - shall dwell among them
  - shall reside with them
  lexicon: LSJ
  rationale: The verb is cognate with πάροικος and keeps the sense of residing as
    a non-native. 'Sojourn among them' preserves that link more transparently than
    a generic 'live.'
- source_word: λαούς
  chosen: peoples
  alternatives:
  - nations
  lexicon: LSJ
  rationale: Retaining 'peoples' distinguishes λαούς from the following ἔθνη and reflects
    the plural collective sense.
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - gentiles
  - peoples
  lexicon: LSJ
  rationale: '''Nations'' is the most natural rendering here and helps preserve the
    paired expression ''peoples and nations.'''
- source_word: σοφίᾳ
  chosen: wisdom
  alternatives:
  - skill
  - prudence
  lexicon: LSJ
  rationale: The term denotes wise judgment or insight; 'wisdom' is the standard and
    best fit in this royal-judicial context.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness' in the main
    text unless context strongly requires otherwise. Here it describes the moral quality
    of the ruler's judgment; 'justice' remains a viable alternative preserved in a
    footnote.
- source_word: διάψαλμα
  chosen: Selah
  alternatives:
  - interlude
  - musical pause
  lexicon: LSJ
  rationale: As a liturgical or musical marker, 'Selah' preserves the traditional
    uncertainty without over-interpreting its exact function.
