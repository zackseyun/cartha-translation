theological_decisions:
- issue: Whether πνεύματι ἁγίῳ should be rendered as a direct reference to the Holy Spirit
  chosen_reading: Rendered 'in holy spirit'
  alternative_readings:
  - by the Holy Spirit
  - in the Holy Spirit
  rationale: Because the Greek is anarthrous and the phrase can be read qualitatively or instrumentally, the main text preserves the ambiguity rather than resolving it toward a more explicit doctrinal formulation.
  doctrine_reference: Preserve theological tension rather than resolve it.
