id: PSS.17.28
reference: Psalms of Solomon 17:28
source:
  edition: lxx-swete-1909
  text: καὶ συνάξει λαὸν ἅγιον οὗ ἀφήγήσεται ἐν δικαιοσύνῃ, καὶ κρινεῖ φυλὰς λαοῦ ἡγιασμένου ὑπὸ Κυρίου θεοῦ αὐτοῦ.
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: And he will gather a holy people, whom he will lead in righteousness; and he will judge the tribes of a people made holy by the Lord his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in justice.”
    reason: lexical_alternative
  - marker: b
    text: Or “sanctified by the Lord his God.”
    reason: lexical_alternative
  - marker: c
    text: “Judge” may also carry the broader sense “rule” or “govern” in this royal context.
    reason: lexical_alternative
  - marker: d
    text: Or 'the tribes of the people made holy'.
    reason: previous_rendering
lexical_decisions:
- source_word: συνάξει
  chosen: will gather
  alternatives:
  - will assemble
  - will bring together
  lexicon: LSJ
  rationale: The verb naturally denotes gathering people together. “Will gather” is clear, direct, and preserves the future action without unnecessary expansion.
- source_word: λαὸν ἅγιον
  chosen: a holy people
  alternatives:
  - a sacred people
  - a consecrated people
  lexicon: LSJ
  rationale: This phrase is best rendered straightforwardly. “Holy people” preserves the covenantal and religious force of ἅγιος without sounding overly technical.
- source_word: ἀφήγήσεται
  chosen: he will lead
  alternatives:
  - he will guide
  - he will lead the way for
  lexicon: LSJ
  rationale: The verb here fits the sense of leading or guiding a people. “He will lead” is the most natural English rendering and suits the messianic-rule context better than the more verbose alternatives.
- source_word: ἐν δικαιοσύνῃ
  chosen: in righteousness
  alternatives:
  - with righteousness
  - in justice
  lexicon: LSJ
  rationale: Following the project's default for δικαιοσύνη, “righteousness” is retained in the main text. The phrase expresses the manner or sphere of his leadership.
- source_word: κρινεῖ
  chosen: he will judge
  alternatives:
  - he will govern
  - he will rule
  lexicon: LSJ
  rationale: The basic judicial sense of κρίνω should be preserved unless context requires a broader political gloss. Here “judge” keeps the source wording while still allowing the royal nuance to be inferred.
- source_word: ἡγιασμένου
  chosen: made holy
  alternatives:
  - sanctified
  - consecrated
  lexicon: LSJ
  rationale: 'The perfect passive sense is important: the people have been acted upon by God. “Made holy” is more readable than “sanctified” while preserving the theological force.'
- source_word: ὑπὸ Κυρίου θεοῦ αὐτοῦ
  chosen: by the Lord his God
  alternatives:
  - by his Lord God
  - by the Lord God of him
  lexicon: LSJ
  rationale: This keeps κύριος as “Lord” per project policy and preserves the personal relation expressed by αὐτοῦ in idiomatic English.
