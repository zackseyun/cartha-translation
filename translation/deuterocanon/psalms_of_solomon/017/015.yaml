id: PSS.17.15
reference: Psalms of Solomon 17:15
source:
  edition: lxx-swete-1909
  text: ἐν ἀλλοτριότητι ὁ ἐχθρὸς ἐποίησεν, ἐν ὑπερηφανίᾳ· καὶ ἡ καρδία αὐτοῦ ἀλλοτρία
    ἀπὸ τοῦ θεοῦ ἡμῶν.
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: In estrangement the enemy acted, in pride; and his heart was estranged from
    our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In alienation the enemy acted' / 'the enemy acted as a stranger.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his heart was alien to our God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλοτριότητι
  chosen: in estrangement
  alternatives:
  - in alienation
  - in foreignness
  - as a stranger
  lexicon: LSJ
  rationale: The noun conveys otherness or alienation. 'In estrangement' preserves
    the moral-relational sense and matches the parallel with ἀλλοτρία later in the
    verse without sounding overly technical.
- source_word: ὁ ἐχθρός
  chosen: the enemy
  alternatives:
  - the foe
  lexicon: LSJ
  rationale: '''The enemy'' is the plain and natural rendering of the noun here.'
- source_word: ἐποίησεν
  chosen: acted
  alternatives:
  - did
  - worked
  - committed
  lexicon: LSJ
  rationale: The verb is used absolutely here without an expressed object. 'Acted'
    gives clear English while preserving the sense of conduct or behavior.
- source_word: ὑπερηφανίᾳ
  chosen: in pride
  alternatives:
  - in arrogance
  - with haughtiness
  lexicon: LSJ
  rationale: The noun denotes arrogant self-exaltation. 'Pride' is concise and idiomatic,
    while still carrying the negative moral force in context.
- source_word: ἀλλοτρία
  chosen: was estranged
  alternatives:
  - was alien
  - was foreign
  lexicon: LSJ
  rationale: The adjective describes the heart as alienated from God. Rendering it
    verbally in English ('was estranged') reads naturally and preserves the relational
    breach.
- source_word: καρδία
  chosen: heart
  lexicon: LSJ
  rationale: '''Heart'' is the standard rendering and fits the biblical sense of the
    inner person.'
