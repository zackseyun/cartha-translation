id: PSS.17.35
reference: Psalms of Solomon 17:35
source:
  edition: lxx-swete-1909
  text: καὶ ἰδεῖν τὴν δόξαν Κυρίου ἣν ἐδόξασεν αὐτὴν ὁ θεός· καὶ αὐτὸς βασιλεὺς δίκαιος
    διδακτὸς ὑπὸ θεοῦ ἐπ’ αὐτούς,
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: and to see the glory of the Lord with which God glorified her; and he himself
    will be a righteous king, taught by God, over them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “the glory of the Lord which God glorified her with.”
    reason: lexical_alternative
  - marker: b
    text: Or “instructed by God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: LSJ
  rationale: δόξα here denotes visible honor/splendor bestowed on the city, and “glory”
    preserves both the exalted tone and the biblical register.
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: LSJ
  rationale: Per project policy, κύριος is normally rendered “Lord.” The phrase is
    naturally read as “the glory of the Lord,” not merely lordly glory.
- source_word: ἐδόξασεν
  chosen: glorified
  alternatives:
  - honored
  lexicon: LSJ
  rationale: 'Using the cognate verb with δόξα preserves the Greek wordplay: God bestowed
    glory on her.'
- source_word: αὐτὴν
  chosen: her
  alternatives:
  - it
  lexicon: LSJ
  rationale: The feminine pronoun most naturally refers to the city/personified Jerusalem
    in the surrounding context, so “her” is required.
- source_word: βασιλεὺς δίκαιος
  chosen: a righteous king
  alternatives:
  - a just king
  lexicon: LSJ
  rationale: “Righteous” fits the project’s default handling of δικ- language better
    than the more civic-sounding “just,” while still sounding natural in English.
- source_word: διδακτὸς ὑπὸ θεοῦ
  chosen: taught by God
  alternatives:
  - instructed by God
  - God-taught
  lexicon: LSJ
  rationale: διδακτός is best rendered straightforwardly as “taught.” “God-taught”
    is possible but less natural in running English here.
- source_word: ἐπ’ αὐτούς
  chosen: over them
  alternatives:
  - for them
  - upon them
  lexicon: LSJ
  rationale: In context of kingship, ἐπί with the accusative is most naturally rendered
    as rule exercised “over” a people.
