theological_decisions:
- issue: Implied verb in the second clause
  chosen_reading: and he himself will be a righteous king, taught by God, over them
  alternative_readings:
  - and he himself, a righteous king taught by God, over them
  rationale: The Greek clause is verbless as transmitted, but English normally requires a supplied verb. “Will be” best reflects the future-oriented messianic context without adding more than necessary.
