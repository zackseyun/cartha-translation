  from: and he himself will be a righteous king, taught by God, over them,
  to: and he himself will be a righteous king over them, taught by God,
  rationale: The phrase "over them" (ἐπ’ αὐτούς) logically modifies his kingship, but is awkwardly separated from "king" by "taught by God" in the English draft. Moving "over them" immediately after "king" improves the flow while maintaining the author's meaning.
