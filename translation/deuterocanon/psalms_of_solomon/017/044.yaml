id: PSS.17.44
reference: Psalms of Solomon 17:44
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἀσθενήσει ἡ ἐλπὶς αὐτοῦ ἐπὶ Κύριον· καὶ τίς δύναται πρὸς αὐτόν; ἰσχυρὸς ἐν ἔργοις αὐτοῦ καὶ κραταιὸς ἐν φόβῳ θεοῦ,
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: And his hope in the Lord will not grow weak; and who can stand against him? He is strong in his deeds and mighty in the fear of God,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀσθενήσει
  chosen: will not grow weak
  alternatives:
  - will not fail
  - will not become weak
  lexicon: BDAG / LSJ
  entry: null
  rationale: The future verb denotes becoming weak or failing in strength. With 'hope' as the subject, 'will not grow weak' preserves the metaphorical force without flattening it into a more interpretive paraphrase.
- source_word: ἡ ἐλπὶς αὐτοῦ ἐπὶ Κύριον
  chosen: his hope in the Lord
  alternatives:
  - his hope upon the Lord
  - his hope rests on the Lord
  lexicon: BDAG / LSJ
  entry: null
  rationale: The phrase expresses directed reliance on the Lord. 'Hope in the Lord' is idiomatic English that preserves the sense of trust oriented toward him.
- source_word: Κύριον
  chosen: the Lord
  alternatives:
  - Lord
  - Master
  lexicon: BDAG
  entry: null
  rationale: Following the project's contested-terms policy, κύριος is rendered 'Lord.' The article is natural in English in this construction.
- source_word: τίς δύναται πρὸς αὐτόν;
  chosen: who can stand against him?
  alternatives:
  - who can prevail against him?
  - who is able against him?
  lexicon: BDAG / LSJ
  entry: null
  rationale: 'Although the Greek is compact, the rhetorical sense is adversarial: no one is able to oppose him successfully. ''Who can stand against him?'' expresses that force in clear modern English.'
- source_word: ἰσχυρὸς ἐν ἔργοις αὐτοῦ
  chosen: strong in his deeds
  alternatives:
  - strong in his works
  - powerful in what he does
  lexicon: BDAG / LSJ
  entry: null
  rationale: ἰσχυρός denotes strength or might, and ἔργα here refers to his actions or deeds. 'Strong in his deeds' stays close to the Greek structure while remaining readable.
- source_word: κραταιὸς ἐν φόβῳ θεοῦ
  chosen: mighty in the fear of God
  alternatives:
  - mighty in reverence for God
  - strong in fearing God
  lexicon: BDAG / LSJ
  entry: null
  rationale: κραταιός intensifies the description of strength. 'Fear of God' preserves the biblical idiom and theological weight better than softening it to mere reverence, while still being understandable in English.
- source_word: '[implied copula]'
  chosen: He is
  alternatives: null
  lexicon: null
  entry: null
  rationale: Greek omits the finite verb in the final description. English normally requires an explicit subject and copula here, so 'He is' is supplied for a grammatical translation without adding new content.
