  from: nations will come from the end of the earth to see his glory, bringing her sons who had been weakened as gifts,
  to: for nations to come from the end of the earth to see his glory, bringing as gifts her weakened sons,
  rationale: The Greek `ἔρχεσθαι` is an infinitive of purpose or result depending on `καθαριεῖ` in v. 33 ('He will purify Jerusalem... for nations to come...'). Translating it as an independent future indicative ('nations will come') breaks the syntax and leaves the parallel infinitive `καὶ ἰδεῖν` in v. 35 hanging. Additionally, 'bringing her sons who had been weakened as gifts' creates a misplaced modifier effect; 'bringing as gifts her weakened sons' is clearer and more concise.
