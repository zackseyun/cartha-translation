id: PSS.17.34
reference: Psalms of Solomon 17:34
source:
  edition: lxx-swete-1909
  text: ἔρχεσθαι ἔθνη ἀπ’ ἄκρου τῆς γῆς ἰδεῖν τὴν δόξαν αὐτοῦ, φέροντες δῶρα τοὺς
    ἐξησθενηκότας υἱοὺς αὐτῆς,
  language: Greek
  pages:
  - 808
  validation: swete_direct
translation:
  text: nations will come from the end of the earth to see his glory, bringing her
    sons who had been weakened as gifts,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bringing as gifts her sons who had grown weak / were exhausted.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: BDAG
  rationale: The plural refers to the non-Israelite peoples broadly. “Nations” is
    the most natural and standard rendering here, without importing the sharper Jew/Gentile
    contrast that “Gentiles” can suggest.
- source_word: ἀπ’ ἄκρου τῆς γῆς
  chosen: from the end of the earth
  alternatives:
  - from the ends of the earth
  - from the farthest part of the earth
  lexicon: BDAG
  rationale: The phrase is idiomatic for extreme distance. “From the end of the earth”
    stays close to the singular Greek while still sounding natural in English.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to behold
  lexicon: BDAG
  rationale: A simple infinitive of purpose is best kept simple in English. “To behold”
    is possible but sounds more elevated than the surrounding diction requires.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - splendor
  - majesty
  lexicon: BDAG
  rationale: “Glory” is the standard rendering and preserves the theological weight
    of δόξα without overinterpreting the kind of magnificence in view.
- source_word: φέροντες δῶρα
  chosen: bringing ... as gifts
  alternatives:
  - bearing gifts
  - bringing gifts
  lexicon: BDAG
  rationale: Because δῶρα appears to stand in apposition to what is brought, the English
    brings out that the sons themselves are presented as gifts. This is more transparent
    than leaving “gifts” unattached.
- source_word: τοὺς ἐξησθενηκότας
  chosen: who had been weakened
  alternatives:
  - who had grown weak
  - who were exhausted
  - who were worn down
  lexicon: BDAG
  rationale: The perfect participle suggests a resulting state. “Who had been weakened”
    preserves that sense without narrowing the weakness to only physical exhaustion.
- source_word: υἱοὺς αὐτῆς
  chosen: her sons
  alternatives:
  - her children
  lexicon: BDAG
  rationale: The Greek is specifically masculine plural, not a neutral term for children.
    Per project philosophy, the gendered form should be preserved unless context clearly
    requires otherwise.
