id: PSS.17.5
reference: Psalms of Solomon 17:5
source:
  edition: lxx-swete-1909
  text: σύ, Κύριε, ᾑρέτισω τὸν Δαυὶδ βασιλέα ἐπʼ Ἰσραήλ, καὶ σύ ὤμοσας αὐτῷ περὶ τοῦ
    σπέρματος εἰς τὸν αἰῶνα, τοῦ μὴ ἐκλείπειν ἀπέναντί σου βασίλειον αὐτοῦ.
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: You, Lord, chose David as king over Israel, and you swore to him concerning
    his offspring forever, that his kingdom would not fail before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “seed,” that is, his descendants.
    reason: lexical_alternative
  - marker: b
    text: Or “his dynasty would not cease before you.”
    reason: alternative_reading
lexical_decisions:
- source_word: ᾑρέτισω
  chosen: chose
  alternatives:
  - appointed
  - selected
  lexicon: LSJ
  rationale: The verb expresses God's election of David for kingship. “Chose” is natural
    English and preserves the sense of divine selection without adding ceremony beyond
    the Greek.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is normally rendered “Lord.” Here it is
    a direct address to God.
- source_word: βασιλέα ἐπʼ Ἰσραήλ
  chosen: as king over Israel
  alternatives:
  - king upon Israel
  - king for Israel
  lexicon: LSJ
  rationale: This idiom denotes royal rule over Israel. “As king over Israel” is idiomatic
    English while staying close to the Greek construction.
- source_word: περὶ τοῦ σπέρματος
  chosen: concerning his offspring
  alternatives:
  - concerning his seed
  - concerning his descendants
  lexicon: LSJ
  rationale: σπέρμα here refers to David's lineage rather than literal seed. “Offspring”
    is clear modern English; the more literal “seed” is preserved in a footnote as
    an alternative.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for all time
  lexicon: LSJ
  rationale: In covenantal language the phrase conveys enduring duration. “Forever”
    is the most natural equivalent.
- source_word: τοῦ μὴ ἐκλείπειν
  chosen: would not fail
  alternatives:
  - would not cease
  - would not come to an end
  lexicon: LSJ
  rationale: The infinitive clause gives the content or effect of the oath regarding
    David's dynasty. “Would not fail” preserves the sense of not disappearing or coming
    short.
- source_word: ἀπέναντί σου
  chosen: before you
  alternatives:
  - in your presence
  - before your face
  lexicon: LSJ
  rationale: The phrase locates David's kingdom in relation to God. “Before you” is
    both faithful and readable, and it preserves the covenantal nuance of standing
    in God's sight.
- source_word: βασίλειον αὐτοῦ
  chosen: his kingdom
  alternatives:
  - his royal house
  - his kingship
  - his dynasty
  lexicon: LSJ
  rationale: The noun can point to royal rule or realm. “His kingdom” is the most
    straightforward rendering here, while the dynastic nuance is implicit in context.
