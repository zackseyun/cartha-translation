theological_decisions:
- issue: Davidic promise language
  chosen_reading: 'The oath is rendered as a promise concerning David''s continuing
    royal line: ''that his kingdom would not fail before you.'''
  alternative_readings:
  - that his dynasty would not cease before you
  - that his kingship would not fail in your presence
  rationale: The Greek wording combines lineage language (σπέρμα) with royal language
    (βασίλειον). Rendering βασίαλειον as “kingdom” keeps close to the text while allowing
    the Davidic-dynasty implication to remain visible without over-interpreting.
