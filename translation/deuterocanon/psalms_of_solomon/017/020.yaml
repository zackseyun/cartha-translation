id: PSS.17.20
reference: Psalms of Solomon 17:20
source:
  edition: lxx-swete-1909
  text: ἔφυγοσαν ἀπʼ αὐτῶν οἱ ἀγαπῶντες συναγωγὰς ὁσίων· εἰς πᾶσαν τὴν γῆν ἐγενήθη σκορπισμὸς αὐτῶν ὑπὸ ἀνόμων. ὅτι ἀνέσχεν ὁ οὐρανὸς τοῦ στάξαι ὑετὸν ἐπὶ τὴν γῆν·
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: Those who loved the assemblies of the the pious fled from them; their scattering by lawless men spread over all the earth, because heaven held back from dripping rain upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gatherings' or 'congregations' for 'assemblies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'saints' or 'the pious' for 'holy ones.'
    reason: lexical_alternative
  - marker: c
    text: Or 'dispersion' for 'scattering.'
    reason: lexical_alternative
  - marker: d
    text: Literally 'from dripping rain.'
    reason: lexical_alternative
  - marker: e
    text: Or 'holy ones'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔφυγοσαν
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: LSJ
  rationale: The verb denotes flight. 'Fled' is concise, natural English and preserves the force of sudden departure.
- source_word: συναγωγὰς
  chosen: assemblies
  alternatives:
  - gatherings
  - congregations
  lexicon: LSJ
  rationale: The noun refers to gathered communities or meetings. 'Assemblies' preserves the collective and somewhat formal sense without importing later institutional connotations too strongly.
- source_word: ὁσίων
  chosen: holy ones
  alternatives:
  - saints
  - the pious
  lexicon: LSJ
  rationale: Ὅσιος emphasizes piety/holiness. 'Holy ones' is transparent to the Greek and avoids importing later ecclesiastical associations that can cling to 'saints,' while the alternative remains viable.
- source_word: σκορπισμὸς
  chosen: scattering
  alternatives:
  - dispersion
  lexicon: LSJ
  rationale: The noun denotes being scattered abroad. 'Scattering' is vivid and natural in English; 'dispersion' is possible but slightly more technical.
- source_word: ἀνόμων
  chosen: lawless men
  alternatives:
  - the lawless
  - wicked men
  lexicon: LSJ
  rationale: The genitive agent indicates those responsible for the scattering. 'Lawless men' preserves the moral and legal force of ἄνομος and fits the context of oppressive enemies.
- source_word: ἀνέσχεν
  chosen: held back
  alternatives:
  - withheld
  - refrained
  lexicon: LSJ
  rationale: Here the verb conveys restraint or cessation. 'Held back' gives clear idiomatic English and matches the picture of heaven refusing rain.
- source_word: στάξαι ὑετόν
  chosen: from dripping rain
  alternatives:
  - from sending rain
  - from pouring rain
  lexicon: LSJ
  rationale: στάζω is literally 'drip' or 'distill.' Retaining 'dripping rain' keeps the concrete imagery of the Greek, even though smoother English alternatives exist.
