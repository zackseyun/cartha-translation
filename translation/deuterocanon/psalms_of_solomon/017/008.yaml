  category: grammar
  tier: 2
  from: will cast them down and remove
  to: cast them down and removed
  rationale: The Greek verbs καταβαλεῖς and ἀρεῖς are morphologically future, mechanically translating Hebrew imperfects (likely with waw-consecutive). The context describes a past historical event (God's judgment on the Hasmoneans), which is explicitly linked to the past action in v. 9 (ἐν τῷ ἐπαναστῆναι, 'when a man... rose up') and the aorist verbs in v. 11 detailing the destruction of their offspring. Translating these as English futures creates a chronological contradiction. The author's intended narrative meaning is past tense.
