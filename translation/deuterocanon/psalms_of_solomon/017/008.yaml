id: PSS.17.8
reference: Psalms of Solomon 17:8
source:
  edition: lxx-swete-1909
  text: ἠρήμωσαν τὸν θρόνον Δαυὶδ ἐν ὑπερηφανίᾳ ἀλλάγματος. καὶ σύ, ὁ θεός, καταβαλεῖς αὐτούς, καὶ ἀρεῖς σπέρμα αὐτῶν ἀπὸ τῆς γῆς,
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: They laid waste the throne of David in arrogant usurpation. And you, O God, cast them down and removed their offspring from the earth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the arrogance of change/replacement.' The Greek phrase is compressed; 'usurpation' makes explicit the likely political sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'will cast them down and remove'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἠρήμωσαν
  chosen: laid waste
  alternatives:
  - desolated
  - made desolate
  - devastated
  lexicon: BDAG
  rationale: The verb conveys making something desolate or ruined, not merely weakening it. 'Laid waste' preserves the force while remaining natural English.
- source_word: θρόνον Δαυίδ
  chosen: the throne of David
  alternatives:
  - David's throne
  lexicon: BDAG
  rationale: A straightforward formal rendering preserves the dynastic and royal emphasis of the phrase.
- source_word: ἐν ὑπερηφανίᾳ ἀλλάγματος
  chosen: in arrogant usurpation
  alternatives:
  - in the arrogance of change
  - in proud replacement
  - with the arrogance of substitution
  lexicon: LSJ
  rationale: ὑπερηφανία clearly signals pride/arrogance. ἀλλάγματος is literally 'change' or 'exchange,' but in this political-dynastic context the sense is not neutral change; it is a wrongful replacement of the Davidic throne. 'Usurpation' brings out that contextual force in idiomatic English.
- source_word: καταβαλεῖς
  chosen: will cast ... down
  alternatives:
  - will bring ... down
  - will overthrow
  lexicon: BDAG
  rationale: The future verb expresses decisive divine humbling or overthrow. 'Cast down' preserves both vividness and solemn register.
- source_word: ἀρεῖς
  chosen: will remove
  alternatives:
  - will take away
  - will cut off
  lexicon: BDAG
  rationale: The verb αἴρω often means take away or remove. 'Remove' fits the object 'offspring' without overinterpreting the exact mode of judgment.
- source_word: σπέρμα αὐτῶν
  chosen: their offspring
  alternatives:
  - their seed
  - their descendants
  lexicon: BDAG
  rationale: While 'seed' is more literal, 'offspring' is clearer in modern English and still preserves the generational sense.
- source_word: ἀπὸ τῆς γῆς
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: BDAG
  rationale: Both are possible. 'Earth' is retained because the phrase can denote removal from the world of the living broadly, and the immediate context does not require narrowing it to a specific land.
