id: PSS.17.50
reference: Psalms of Solomon 17:50
source:
  edition: lxx-swete-1909
  text: μακάριοι οἱ γενόμενοι ἐν ταῖς ἡμέραις ἐκείναις ἰδεῖν τὰ ἀγαθὰ Ἰσραὴλ ἐν συναγωγῇ φυλῶν· ποιῆσαι ὁ θεός.
  language: Greek
  pages:
  - 809
  validation: swete_direct
translation:
  text: Blessed are those who are alive in those days, to see the good things of Israel in the gathering of the tribes, which God will bring about.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed are
  alternatives:
  - Happy are
  - Fortunate are
  lexicon: BDAG / LSJ
  rationale: μακάριοι is the conventional biblical beatitude term. 'Blessed are' preserves its elevated covenantal and eschatological force better than the flatter 'happy' or 'fortunate.'
- source_word: οἱ γενόμενοι ἐν ταῖς ἡμέραις ἐκείναις
  chosen: those who are alive in those days
  alternatives:
  - those born in those days
  - those who come to be in those days
  lexicon: BDAG / LSJ
  rationale: γενόμενοι literally refers to those who come to be, but in this beatitude it points idiomatically to the people who live to see that future time. 'Are alive in those days' gives the sense in natural English while the alternative 'born' remains possible.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to behold
  lexicon: BDAG / LSJ
  rationale: The infinitive states what the blessed ones live to experience. 'To see' is the plain and sufficient rendering.
- source_word: τὰ ἀγαθὰ Ἰσραήλ
  chosen: the good things of Israel
  alternatives:
  - the good things for Israel
  - Israel's blessings
  lexicon: BDAG / LSJ
  rationale: τὰ ἀγαθά denotes benefits or good things. 'The good things of Israel' stays close to the Greek and leaves the genitive relation slightly open, whereas 'blessings' would be a more interpretive abstraction.
- source_word: ἐν συναγωγῇ φυλῶν
  chosen: in the gathering of the tribes
  alternatives:
  - in the assembly of the tribes
  - when the tribes are assembled
  lexicon: BDAG / LSJ
  rationale: συναγωγή here denotes an assembling or gathering. 'Gathering of the tribes' is natural English and preserves the picture of Israel's tribes being brought together.
- source_word: ποιῆσαι ὁ θεός
  chosen: which God will bring about
  alternatives:
  - for God to accomplish
  - that God will do
  lexicon: BDAG / LSJ
  rationale: The Greek ending is compressed and awkward in English, with an infinitive followed by an explicit subject. The sense is that these good things are what God himself will accomplish. 'Which God will bring about' makes that relationship clear without importing extra theological content.
