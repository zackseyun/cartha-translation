id: PSS.17.12
reference: Psalms of Solomon 17:12
source:
  edition: lxx-swete-1909
  text: πιστὸς ὁ κύριος ἐν πᾶσι τοῖς κρίμασιν αὐτοῦ οἷς ποιεῖ ἐπὶ τὴν γῆν.
  language: Greek
  pages:
  - 807
  validation: swete_direct
translation:
  text: The Lord is faithful in all his judgments that he carries out on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the judgments he carries out'.
    reason: previous_rendering
lexical_decisions:
- source_word: πιστός
  chosen: faithful
  alternatives:
  - trustworthy
  - 'true'
  lexicon: BDAG
  rationale: Predicative adjective describing the Lord’s reliability and constancy; “faithful” is the most natural and theologically weighty English equivalent here.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project’s default rendering for κύριος as a title, preserving both reverence and continuity with Septuagintal usage.
- source_word: κρίμασιν
  chosen: judgments
  alternatives:
  - judicial decisions
  - acts of judgment
  lexicon: BDAG
  rationale: κρίματα here refers to the Lord’s concrete judicial acts or decisions. “Judgments” preserves that sense without over-paraphrasing.
- source_word: ποιεῖ
  chosen: carries out
  alternatives:
  - does
  - executes
  lexicon: BDAG
  rationale: Although ποιέω is formally “does/makes,” English idiom prefers “carries out” with “judgments,” giving a natural rendering while preserving the sense of enacted judicial action.
- source_word: ἐπὶ τὴν γῆν
  chosen: on the earth
  alternatives:
  - upon the earth
  - in the land
  lexicon: BDAG
  rationale: The phrase most straightforwardly denotes the sphere of God’s action. “On the earth” is the broadest and least interpretively restrictive rendering.
