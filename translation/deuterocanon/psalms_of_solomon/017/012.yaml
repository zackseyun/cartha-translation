theological_decisions:
- issue: Whether the verse emphasizes God’s character or merely the correctness of his acts
  chosen_reading: The translation preserves both by rendering πιστός as a predicate of the Lord and keeping 'judgments' concrete.
  alternative_readings:
  - The Lord is righteous in all his judgments
  - The Lord is trustworthy in all his decisions
  rationale: πιστός most naturally describes the Lord himself, while the following phrase locates that faithfulness within his judicial acts. “Righteous” would import a different lexical idea not present in the adjective used here.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
