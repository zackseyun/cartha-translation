id: PSS.17.9
reference: Psalms of Solomon 17:9
source:
  edition: lxx-swete-1909
  text: ἐν τῷ ἐπαναστῆναι αὐτοῖς ἄνθρωπον ἀλλότριον γένους ἡμῶν.
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: when a man foreign to our race rose up against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when a man foreign to our race rose up against them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ ἐπαναστῆναι
  chosen: when ... rose up
  alternatives:
  - in the rising up
  - when ... arose
  - when ... rose up against
  lexicon: LSJ
  rationale: The articular infinitive with ἐν is naturally temporal here, so 'when'
    best conveys the clause function in clear English. 'Rose up' preserves the verbal
    force without over-paraphrase.
- source_word: αὐτοῖς
  chosen: against them
  alternatives:
  - to them
  - over them
  lexicon: LSJ
  rationale: With ἐπανίστημι, the dative commonly marks the party opposed, so 'against
    them' fits the idiom better than a bare 'to them'.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: LSJ
  rationale: The Greek is singular and explicitly masculine; 'a man' preserves that
    form in keeping with the project's gender-accurate policy.
- source_word: ἀλλότριον
  chosen: foreign
  alternatives:
  - alien
  - strange
  - belonging to another
  lexicon: LSJ
  rationale: '''Foreign'' is idiomatic in English and fits the ethnic-national sense
    in context better than the more awkward ''alien'' or the broader ''strange.'''
- source_word: γένους ἡμῶν
  chosen: to our people
  alternatives:
  - to our race
  - to our stock
  - of our nation
  lexicon: LSJ
  rationale: γένους here denotes kin-group or peoplehood. 'Our people' communicates
    the collective identity naturally in modern English, while avoiding the misleading
    modern connotations of 'race.'
