id: PSS.12.7
reference: Psalms of Solomon 12:7
source:
  edition: lxx-swete-1909
  text: τοῦ κυρίου ἡ σωτηρία ἐπὶ Ἰσραὴλ παῖδα αὐτοῦ εἰς τὸν αἰῶνα,
  language: Greek
  pages:
  - 802
  validation: swete_direct
translation:
  text: The Lord’s salvation is upon Israel, his servant, forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Israel, his child/son.” The Greek παῖδα can carry either sense, but
      “servant” best fits the covenantal context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  - from the Lord
  lexicon: BDAG
  rationale: κύριος is rendered with the project’s default English title “Lord.” The
    genitive is taken possessively here, yielding natural English while preserving
    the sense that salvation belongs to and comes from the Lord.
- source_word: σωτηρία
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: σωτηρία most directly denotes salvation/deliverance. “Salvation” preserves
    the broader theological weight and fits the devotional tone of the line.
- source_word: ἐπὶ
  chosen: is upon
  alternatives:
  - be upon
  - rests upon
  lexicon: BDAG
  rationale: With no explicit finite verb in Greek, English supplies “is” for a clear
    nominal clause. “Upon” preserves the prepositional image and keeps the blessing-like
    force of the line.
- source_word: παῖδα
  chosen: servant
  alternatives:
  - child
  - son
  lexicon: BDAG
  rationale: Though παῖς can mean “child” or “son,” in biblical God-and-people language
    with Israel as the referent, “servant” best fits covenantal service and dependence.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - unto eternity
  lexicon: BDAG
  rationale: This idiom regularly expresses enduring duration. “Forever” is clear,
    natural English that preserves the line’s perpetual scope.
