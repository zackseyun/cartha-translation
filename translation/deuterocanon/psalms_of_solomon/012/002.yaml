id: PSS.12.2
reference: Psalms of Solomon 12:2
source:
  edition: lxx-swete-1909
  text: ἐν ποικιλίᾳ στροφῆς οἱ λόγοι τῆς γλώσσης ἀνδρὸς πονηροῦ. ὥσπερ ἐν λαῷ πῦρ
    ἀνάπτον καλλονὴ αὐτοῦ·
  language: Greek
  pages:
  - 802
  validation: swete_direct
translation:
  text: The words on the tongue of an evil man are full of twisted turns; his charm
    is like a fire kindled among a people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in variety of turning'; the Greek depicts speech marked by shifting,
      twisting turns.
    reason: lexical_alternative
  - marker: b
    text: Or 'beauty' instead of 'charm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποικιλίᾳ
  chosen: full of
  alternatives:
  - varied
  - manifold
  - in variety
  lexicon: LSJ
  rationale: The dative phrase ἐν ποικιλίᾳ modifies the character of the man's speech.
    'Full of' brings the idiom into natural English while preserving the idea of multiplicity
    or variegation in his speech.
- source_word: στροφῆς
  chosen: twisted turns
  alternatives:
  - turning
  - crookedness
  - shifts
  lexicon: LSJ
  rationale: στροφή literally suggests a turning, but in context it conveys evasive
    or devious speech. 'Twisted turns' preserves the turning imagery while making
    the negative sense plain.
- source_word: οἱ λόγοι τῆς γλώσσης
  chosen: The words on the tongue
  alternatives:
  - the words of the tongue
  - the speech
  lexicon: LSJ
  rationale: This keeps the concrete tongue-language of the Greek rather than flattening
    it to the more abstract 'speech,' while still sounding idiomatic in English.
- source_word: ἀνδρὸς πονηροῦ
  chosen: of an evil man
  alternatives:
  - of a wicked man
  - of a bad man
  lexicon: LSJ
  rationale: πονηρός here is moral rather than merely harmful; 'evil' is the most
    direct and weighty rendering. 'Man' is retained in line with the project's gender-accurate
    policy because the Greek is singular masculine.
- source_word: καλλονὴ
  chosen: charm
  alternatives:
  - beauty
  - splendor
  - attractiveness
  lexicon: LSJ
  rationale: In this context the point is not physical beauty alone but the attractive
    quality by which the wicked man affects others. 'Charm' best captures that socially
    operative attractiveness in English.
- source_word: πῦρ ἀνάπτον
  chosen: a fire kindled
  alternatives:
  - a blazing fire
  - fire being lit
  - an igniting fire
  lexicon: LSJ
  rationale: This closely follows the participial force of ἀνάπτον while remaining
    smooth English. It preserves the image of something dangerous being set alight
    among others.
- source_word: ἐν λαῷ
  chosen: among a people
  alternatives:
  - among the people
  - in a crowd
  - in the people
  lexicon: LSJ
  rationale: The anarthrous λαῷ is rendered indefinitely. 'Among a people' preserves
    the collective sense without over-specifying a particular group.
