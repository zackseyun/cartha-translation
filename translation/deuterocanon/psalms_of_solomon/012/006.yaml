id: PSS.12.6
reference: Psalms of Solomon 12:6
source:
  edition: lxx-swete-1909
  text: φυλάξαι Κύριος ψυχὴν ἡσύχιον μισοῦσαν ἀδίκους, καὶ κατευθύναι Κύριος ἄνδρα
    ποιοῦντα εἰρήνην ἐν οἴκῳ.
  language: Greek
  pages:
  - 802
  validation: swete_direct
translation:
  text: May the Lord protect a quiet soul that hates the unjust, and may the Lord
    guide a man who makes peace in the home.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'life' or 'self' for 'soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'direct' for 'guide.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the house' or 'in the household.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλάξαι
  chosen: protect
  alternatives:
  - guard
  - keep
  lexicon: BDAG
  rationale: The aorist optative here is best rendered as a wish/prayer formula with
    'may ... protect.' 'Protect' communicates active preservation clearly in modern
    English.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: DOCTRINE.md gives 'Lord' as the default rendering for κύριος. Here it
    functions as the divine title in a benedictory wish.
- source_word: ψυχὴν
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: BDAG
  rationale: ψυχή can mean 'soul,' 'life,' or 'self.' In this moral and devotional
    context, 'soul' best preserves the inner-person sense without flattening the wording.
- source_word: ἡσύχιον
  chosen: quiet
  alternatives:
  - peaceful
  - tranquil
  lexicon: BDAG
  rationale: ἡσύχιος denotes quietness or calmness. 'Quiet' is concise and natural,
    and it preserves the source's emphasis on settled character.
- source_word: μισοῦσαν ἀδίκους
  chosen: that hates the unjust
  alternatives:
  - hating unjust men
  - that hates wrongdoers
  lexicon: BDAG
  rationale: The participle modifies 'soul' and expresses a defining moral stance.
    'The unjust' is more transparent to the adjective ἀδίκους than the more interpretive
    'wrongdoers.'
- source_word: κατευθύναι
  chosen: guide
  alternatives:
  - direct
  - make straight
  lexicon: BDAG
  rationale: The verb can mean to direct or straighten one's path. 'Guide' gives natural
    English while retaining the sense of ordered direction under divine care.
- source_word: ἄνδρα
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular and the doctrine requires
    gender-accurate rendering where that force is present. 'Man' therefore best matches
    the source form.
- source_word: ποιοῦντα εἰρήνην
  chosen: who makes peace
  alternatives:
  - who does peace
  - who works for peace
  lexicon: BDAG
  rationale: A literal rendering would sound unnatural in English. 'Makes peace' preserves
    the idiomatic force of active peacemaking.
- source_word: ἐν οἴκῳ
  chosen: in the home
  alternatives:
  - in the house
  - in the household
  lexicon: BDAG
  rationale: οἶκος can denote house or household. 'In the home' reads naturally and
    preserves the domestic setting without over-specifying the social unit.
