id: PSS.12.8
reference: Psalms of Solomon 12:8
source:
  edition: lxx-swete-1909
  text: καὶ ἀπόλοιντο οἱ ἁμαρτωλοὶ ἀπὸ προσώπου Κυρίου ἅπαξ, καὶ ὅσιοι Κυρίου κληρονομήσαισαν ἐπαγγελίας.
  language: Greek
  pages:
  - 802
  validation: swete_direct
translation:
  text: May the sinners perish from the presence of the Lord once for all, and may the devout of the Lord inherit the promises. from the presence of the Lord once for all, and may the devout of the Lord inherit the promises.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy ones of the Lord' or 'the faithful of the Lord.'
    reason: lexical_alternative
  - marker: b
    text: Or simply 'once'; the Greek may emphasize either singular occurrence or finality.
    reason: lexical_alternative
  - marker: c
    text: Or 'May sinners perish'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀπόλοιντο
  chosen: may perish
  alternatives:
  - let ... perish
  - be destroyed
  lexicon: BDAG
  rationale: The optative form expresses a wish or prayer, so 'may perish' preserves the volitional force better than a bare indicative. 'Perish' is more natural and less over-specific than 'be destroyed.'
- source_word: ἁμαρτωλοὶ
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: A straightforward lexical rendering that preserves the moral category named in the Greek without softening it.
- source_word: ἀπὸ προσώπου Κυρίου
  chosen: from the presence of the Lord
  alternatives:
  - from before the Lord
  - from the face of the Lord
  lexicon: BDAG
  rationale: Literally 'from the face of the Lord,' but 'from the presence of the Lord' is idiomatic modern English and retains the relational and judicial sense of divine presence.
- source_word: ἅπαξ
  chosen: once for all
  alternatives:
  - once
  - once and for all
  lexicon: BDAG
  rationale: In this imprecatory context, the adverb intensifies finality, so 'once for all' best conveys the force without becoming too colloquial.
- source_word: ὅσιοι
  chosen: the devout
  alternatives:
  - the holy ones
  - the faithful
  lexicon: BDAG
  rationale: The term denotes those characterized by piety or covenant devotion. 'The devout' is natural English and avoids implying angelic or overly technical sainthood language that 'holy ones' might suggest here.
- source_word: κληρονομήσαισαν
  chosen: may inherit
  alternatives:
  - may receive as an inheritance
  - let ... inherit
  lexicon: BDAG
  rationale: The optative again signals wish/prayer. 'Inherit' preserves the covenantal nuance of receiving what is promised.
- source_word: ἐπαγγελίας
  chosen: the promises
  alternatives:
  - promises
  lexicon: BDAG
  rationale: Although anarthrous in Greek, English idiom favors 'the promises' when referring to recognized divine promises, especially alongside inheritance language.
