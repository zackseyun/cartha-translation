id: PSS.12.4
reference: Psalms of Solomon 12:4
source:
  edition: lxx-swete-1909
  text: συνταράξαι οἴκους παρανόμους ἐν πολέμῳ χείλεσι ψιθυροῖς. μακρύναι ὁ θεὸς ἀπὸ ἀκάκων χείλη παρανόμων ἐν ἀπορίᾳ, καὶ σκορπισθείησαν ὀστᾶ ψιθύρων ἀπὸ φοβουμένων Κύριον
  language: Greek
  pages:
  - 802
  validation: swete_direct
translation:
  text: May God throw lawless houses into turmoil in war by whispering lips; may God remove the lips of lawless men from the innocent in distress, and may the bones of whisperers be scattered away from those who fear the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by slanderous lips' / 'the bones of slanderers.' The Greek ψιθυρος-word group can denote secretive malicious speech, not mere quiet speaking.
    reason: lexical_alternative
  - marker: b
    text: '''Houses'' may also imply households or family establishments, not only physical buildings.'
    reason: lexical_alternative
  - marker: c
    text: Or 'remove from the innocent the lips of lawless men in distress'.
    reason: previous_rendering
lexical_decisions:
- source_word: συνταράξαι
  chosen: throw ... into turmoil
  alternatives:
  - throw into confusion
  - shake violently
  lexicon: LSJ
  rationale: The optative carries an imprecatory wish. 'Throw into turmoil' preserves both disruption and judgment in natural English.
- source_word: οἴκους
  chosen: houses
  alternatives:
  - households
  lexicon: LSJ
  rationale: The literal sense is 'houses,' though it may imply the families or establishments belonging to the lawless. The concrete image is retained in the main text.
- source_word: παρανόμους / παρανόμων
  chosen: lawless
  alternatives:
  - wicked
  - unlawful
  lexicon: LSJ
  rationale: '''Lawless'' closely reflects the Greek''s sense of people acting against God''s law without adding interpretive color.'
- source_word: χείλεσι ψιθυροῖς
  chosen: by whispering lips
  alternatives:
  - by slanderous lips
  - with whispering lips
  lexicon: LSJ
  rationale: The phrase is rendered fairly literally. 'Whispering' preserves the imagery of secretive malicious speech; the instrumental sense is conveyed by 'by'.
- source_word: μακρύναι
  chosen: remove
  alternatives:
  - put far away
  - keep दूर
  lexicon: LSJ
  rationale: The optative again expresses a wish. 'Remove' is clear modern English and fits the prayer that such speech be kept far from the innocent.
- source_word: ἀκάκων
  chosen: the innocent
  alternatives:
  - the guileless
  - the blameless
  lexicon: LSJ
  rationale: '''The innocent'' is the most natural rendering here and conveys moral harmlessness without sounding archaic.'
- source_word: ἐν ἀπορίᾳ
  chosen: in distress
  alternatives:
  - in perplexity
  - in helplessness
  - in dire straits
  lexicon: LSJ
  rationale: The word can denote difficulty or helpless straits. 'In distress' communicates the condition idiomatically without over-specifying.
- source_word: ψιθύρων
  chosen: whisperers
  alternatives:
  - slanderers
  - gossips
  lexicon: LSJ
  rationale: A formal rendering keeps the lexical link with the earlier 'whispering lips.' Because the term can imply slander, that alternative is preserved in a footnote.
- source_word: φοβουμένων Κύριον
  chosen: those who fear the Lord
  alternatives:
  - those revering the Lord
  lexicon: LSJ
  rationale: This is a standard biblical expression for reverent devotion. 'Lord' follows the project's default for κύριος.
