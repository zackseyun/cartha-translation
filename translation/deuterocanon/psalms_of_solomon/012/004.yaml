  from: remove from the innocent the lips of lawless men in distress
  to: remove the lips of lawless men from the innocent in distress
  rationale: The current word order creates a misplaced modifier, implying that the 'lawless men' are the ones 'in distress.' Reordering the phrase clarifies that `ἐν ἀπορίᾳ` (in distress/perplexity) applies to the innocent being rescued (or the manner of the removal), avoiding the unintended implication that the lawless are the ones currently suffering.
