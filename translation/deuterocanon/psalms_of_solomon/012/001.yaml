id: PSS.12.1
reference: Psalms of Solomon 12:1
source:
  edition: lxx-swete-1909
  text: Κύριε, ῥῦσαι τὴν ψυχήν μου ἀπὸ ἀνδρὸς παρανόμου καὶ πονηροῦ, ἀπὸ γλώσσης παρανόμου καὶ ψιθυροῦ καὶ λαλούσης ψευδῆ καὶ δόλια·
  language: Greek
  pages:
  - 802
  validation: swete_direct
translation:
  text: Lord, deliver my soul from a lawless and wicked man, from a lawless and whispering tongue, speaking falsehood and deceit;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the tongue of a lawless slanderer.'
    reason: lexical_alternative
  - marker: b
    text: '''My soul'' could also be rendered ''my life'' or simply ''me.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'from the tongue of a lawless whisperer'.
    reason: previous_rendering
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - O Lord
  - Master
  lexicon: BDAG
  rationale: Direct vocative address to God; 'Lord' follows the project's default rendering for κύριος and fits both the prayer setting and established covenantal sense without adding archaism.
- source_word: ῥῦσαι
  chosen: deliver
  alternatives:
  - rescue
  - save
  lexicon: BDAG
  rationale: The aorist imperative asks for active rescue from danger. 'Deliver' is natural modern English in prayer language and preserves the sense of being brought out from threatening persons and speech.
- source_word: τὴν ψυχήν μου
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: BDAG
  rationale: ψυχή can mean soul, life, or self. In this prayer context, 'my soul' preserves the text's gravity and personal inward dimension better than the flatter 'me,' while remaining idiomatic.
- source_word: ἀνδρὸς παρανόμου καὶ πονηροῦ
  chosen: a lawless and wicked man
  alternatives:
  - an unlawful and evil man
  - a transgressing and wicked man
  lexicon: BDAG
  rationale: ἀνήρ is specifically 'man,' not generic humanity, so the gendered term is retained. παράνομος conveys being outside or against God's law, hence 'lawless'; πονηρός adds moral corruption, well rendered as 'wicked'.
- source_word: γλώσσης
  chosen: tongue
  alternatives:
  - speech
  - mouth
  lexicon: BDAG
  rationale: The Greek uses the concrete image 'tongue' for harmful speech. Retaining the metaphor preserves the poetic force of the source.
- source_word: ψιθυροῦ
  chosen: whisperer
  alternatives:
  - slanderer
  - murmurer
  lexicon: BDAG
  rationale: ψίθυρος commonly refers to whispering, backbiting speech. 'Whisperer' keeps the vivid image and lets the following participial phrase explain the malicious content. 'Slanderer' is a viable interpretive alternative preserved in a footnote.
- source_word: λαλούσης ψευδῆ καὶ δόλια
  chosen: speaking falsehood and deceit
  alternatives:
  - speaking lies and treachery
  - uttering false and deceitful things
  lexicon: BDAG
  rationale: The participle modifies 'tongue' and describes its activity. 'Speaking falsehood and deceit' is concise, natural, and preserves both elements without over-paraphrasing.
