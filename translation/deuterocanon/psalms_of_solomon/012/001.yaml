  from: from the tongue of a lawless whisperer
  to: from a lawless and whispering tongue
  rationale: The Greek `ἀπὸ γλώσσης παρανόμου καὶ ψιθυροῦ` uses `παρανόμου` and `ψιθυροῦ` as adjectives modifying `γλώσσης` (tongue), coordinated by `καὶ`. The draft turns `ψιθυροῦ` into a noun ('whisperer') and `παρανόμου` into its modifier ('lawless whisperer'), which distorts the syntax. As seen in 12:4 (`χείλεσι ψιθυροῖς`, 'whispering lips'), `ψίθυρος` functions here as an adjective describing the organ of speech itself.
