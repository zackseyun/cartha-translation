id: PSS.12.5
reference: Psalms of Solomon 12:5
source:
  edition: lxx-swete-1909
  text: ἐν πυρὶ φλογὸς γλῶττα ψιθύρων ἀπόλοιτο ἀπὸ ὁσίων.
  language: Greek
  pages:
  - 802
  validation: swete_direct
translation:
  text: May the tongue of whisperers perish in flaming fire, away from the devout.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slanderers' for 'whisperers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the godly' for 'the holy ones.'
    reason: lexical_alternative
  - marker: c
    text: Or 'away from the holy ones.'.
    reason: previous_rendering
lexical_decisions:
- source_word: γλῶττα
  chosen: tongue
  alternatives:
  - speech
  - tongues
  lexicon: LSJ
  rationale: Kept the singular concrete image 'tongue' rather than abstracting to 'speech'; the singular can function collectively, but the vivid metaphor is part of the line's force.
- source_word: ψιθύρων
  chosen: whisperers
  alternatives:
  - slanderers
  - gossipers
  - backbiters
  lexicon: LSJ
  rationale: The noun denotes those who whisper secretly; 'whisperers' preserves the literal image and leaves the moral force implicit in context, while 'slanderers' is a plausible interpretive alternative preserved in a footnote.
- source_word: ἀπόλοιτο
  chosen: perish
  alternatives:
  - be destroyed
  - be wiped out
  lexicon: LSJ
  rationale: This optative-like wish/jussive sense calls down judgment; 'perish' is natural, solemn English without over-specifying the manner of destruction.
- source_word: ἐν πυρὶ φλογός
  chosen: in flaming fire
  alternatives:
  - in the fire of flame
  - in blazing fire
  lexicon: LSJ
  rationale: Rendered idiomatically while preserving the doubled fire imagery. 'Flaming fire' keeps the poetic intensity better than a flatter paraphrase.
- source_word: ὁσίων
  chosen: holy ones
  alternatives:
  - godly ones
  - saints
  - the faithful
  lexicon: LSJ
  rationale: Ὅσιος often denotes the devout or faithful, but 'holy ones' stays closest to the Greek and fits the elevated poetic register. A more interpretive alternative is preserved in a footnote.
