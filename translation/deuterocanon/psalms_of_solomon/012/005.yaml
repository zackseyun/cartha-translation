  rationale: The project guidelines for Psalms of Solomon explicitly note that ὅσιοι refers to the 'pious' or 'faithful' (the specific sociological group of the author), not 'holy ones' (which would be ἅγιοι). Furthermore, the draft correctly translates ὅσιοι as 'devout' in 12:8, making 'holy ones' here inconsistent and obscuring the group identity.
