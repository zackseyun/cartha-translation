  from: Where he lodges, he fills houses with a lying tongue, cutting down trees of gladness and inflaming the lawless.
  to: His lodging is to fill houses with a lying tongue, to cut down trees of gladness that sets the lawless ablaze.
  rationale: The draft flattens the Greek syntax and misattributes the final participle. First, it turns the noun phrase 'ἡ παροικία αὐτοῦ' (his lodging) and its epexegetical infinitives ('ἐμπλῆσαι', 'ἐκκόψαι') into a finite clause. Second, it treats 'φλογιζούσης' (a genitive feminine singular participle) as a coordinate action of the man ('and inflaming'). Grammatically, 'φλογιζούσης' must modify the preceding feminine genitive 'εὐφροσύνης' (gladness) or be a loose modifier for 'γλώσσῃ' (tongue). It cannot be an action of the man. The translation should preserve the nominal structure and the participial dependence.
