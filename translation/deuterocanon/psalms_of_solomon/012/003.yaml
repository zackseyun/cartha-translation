id: PSS.12.3
reference: Psalms of Solomon 12:3
source:
  edition: lxx-swete-1909
  text: ἡ παροικία αὐτοῦ, ἐμπλῆσαι οἴκους ἐν γλώσσῃ ψεύδει, ἐκκόψαι δένδρα εὐφροσύνης φλογίζούσης παρανόμους.
  language: Greek
  pages:
  - 802
  validation: swete_direct
translation:
  text: His lodging is to fill houses with a lying tongue, to cut down trees of gladness that sets the lawless ablaze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his sojourning' or 'his lodging'; the Greek noun speaks of dwelling or residing, often as a stranger.
    reason: lexical_alternative
  - marker: b
    text: Literally 'trees of gladness'; the image is likely metaphorical for what makes a household flourish or rejoice.
    reason: cultural_note
  - marker: c
    text: The final phrase is compressed in Greek; 'inflaming the lawless' could also be rendered 'setting the lawless ablaze.'
    reason: alternative_reading
  - marker: d
    text: Or 'Where he lodges, he fills houses with a lying tongue, cutting down trees of gladness and inflaming the lawless.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἡ παροικία αὐτοῦ
  chosen: Where he lodges
  alternatives:
  - his sojourning
  - his lodging
  - his residence as a stranger
  lexicon: LSJ
  rationale: παροικία ordinarily denotes dwelling or sojourning, often with the nuance of residence as an outsider. In this context the line describes the disruptive effect of the wicked man's presence in households, so 'Where he lodges' brings the sense into natural English without losing the concrete image of his staying among them.
- source_word: ἐμπλῆσαι οἴκους
  chosen: he fills houses
  alternatives:
  - to fill houses
  - he fills households
  lexicon: LSJ
  rationale: The Greek infinitive is folded into a finite English clause for readability, but the imagery is kept concrete. 'Houses' is retained rather than abstracting to 'families,' while still allowing the household sense to be heard.
- source_word: ἐν γλώσσῃ ψεύδει
  chosen: with a lying tongue
  alternatives:
  - with false speech
  - by a deceitful tongue
  lexicon: LSJ
  rationale: The Greek keeps the bodily image of the tongue as the instrument of deceit. 'With a lying tongue' preserves that vividness better than the flatter 'with false speech.'
- source_word: ἐκκόψαι δένδρα εὐφροσύνης
  chosen: cutting down trees of gladness
  alternatives:
  - to cut down trees of joy
  - to cut off what gives gladness
  lexicon: LSJ
  rationale: ἐκκόψαι is a strong verb of cutting down, and δένδρα should remain 'trees' rather than be prematurely explained away. The phrase is metaphorical, but the translation preserves the source image instead of flattening it into an abstract paraphrase.
- source_word: φλογίζούσης παρανόμους
  chosen: inflaming the lawless
  alternatives:
  - setting the lawless ablaze
  - burning up the lawless
  lexicon: LSJ
  rationale: The closing expression is syntactically compressed and somewhat awkward in Greek as transmitted, but the verbal idea is clearly one of setting on fire. Because the immediate context is malicious speech, 'inflaming the lawless' preserves both the fire imagery and the likely figurative sense of stirring up wicked people.
