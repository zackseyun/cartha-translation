id: PSS.16.3
reference: Psalms of Solomon 16:3
source:
  edition: lxx-swete-1909
  text: ἐν τῷ διενεχθῆναι ψυχήν μου ἀπὸ Κυρίου θεοῦ Ἰσραήλ, εἰ μὴ ὁ κύριος ἀντελάβετό
    μου τῷ ἐλέει αὐτοῦ εἰς τὸν αἰῶνα.
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: When my soul was being torn away from the Lord, the God of Israel, had not
    the Lord helped me with his mercy forever,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when my soul was being carried away from the Lord, the God of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'had not the Lord come to my aid by his mercy.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'forever' may qualify either 'his mercy' or the whole saving
      action.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ διενεχθῆναι
  chosen: when ... was being torn away
  alternatives:
  - when ... was carried off
  - when ... was separated
  - in the being dragged away
  lexicon: LSJ
  rationale: The articular infinitive with ἐν is temporal, naturally rendered 'when.'
    διενεχθῆναι conveys being borne or torn away; 'was being torn away' preserves
    the distressing passive sense without becoming wooden.
- source_word: ψυχήν
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: LSJ
  rationale: In this prayer context ψυχή retains its personal and spiritual force.
    'Soul' preserves that weight better than the flatter 'life' or 'self,' though
    those are possible in other contexts.
- source_word: ἀπὸ Κυρίου θεοῦ Ἰσραήλ
  chosen: from the Lord, the God of Israel
  alternatives:
  - away from the Lord God of Israel
  lexicon: LSJ
  rationale: The genitival apposition is best made explicit in English with commas.
    'Lord' follows the project's default for κύριος.
- source_word: εἰ μὴ
  chosen: had not
  alternatives:
  - unless
  - if not
  lexicon: LSJ
  rationale: Here εἰ μὴ introduces an unreal exception to the preceding crisis. 'Had
    not' best captures the conditional force in idiomatic English.
- source_word: ἀντελάβετό μου
  chosen: helped me
  alternatives:
  - taken hold of me
  - come to my aid
  - supported me
  lexicon: LSJ
  rationale: The verb can mean to take hold in support or assistance. 'Helped me'
    is the clearest natural English here, while retaining divine rescue as the sense.
- source_word: τῷ ἐλέει αὐτοῦ
  chosen: with his mercy
  alternatives:
  - by his mercy
  - through his mercy
  lexicon: LSJ
  rationale: The dative is instrumental. 'With his mercy' is straightforward and preserves
    mercy as the means of help.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - unto the age
  - perpetually
  lexicon: LSJ
  rationale: This is the standard idiomatic rendering. It may modify the duration
    of divine mercy or function adverbially with the whole clause; 'forever' preserves
    the phrase without over-interpreting.
