theological_decisions:
- issue: Rendering κύριος
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The project default for κύριος is 'Lord.' Nothing in this verse requires
    deviation.
  doctrine_reference: DOCTRINE.md contested terms
- issue: Scope of εἰς τὸν αἰῶνα
  chosen_reading: Attached in translation to the clause as 'with his mercy forever'
  alternative_readings:
  - attached more narrowly to 'mercy' as 'his everlasting mercy'
  - taken with the rescue action more generally
  rationale: The Greek placement allows some ambiguity. Keeping 'forever' at the end
    preserves that tension rather than resolving it too tightly.
  doctrine_reference: DOCTRINE.md principle 3
