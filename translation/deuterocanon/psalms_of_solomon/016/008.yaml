id: PSS.16.8
reference: Psalms of Solomon 16:8
source:
  edition: lxx-swete-1909
  text: καὶ μὴ ἀπατησάτω με κάλλος γυναικὸς παρανόμου, καὶ παντὸς ὑποκειμένου ἀπὸ
    ἁμαρτίας ἀνωφελοῦς.
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: 'submit_verse_draft({"english_text":"And do not let the beauty of a lawless
    woman deceive me, nor anything laid before me by worthless sin.","translation_philosophy":"optimal-equivalence","lexical_decisions":[{"source_word":"μὴ
    ἀπατησάτω με","chosen":"do not let ... deceive me","alternatives":["may ... not
    deceive me","let ... not mislead me"],"lexicon":"LSJ","entry":null,"rationale":"The
    aorist imperative/jussive force is naturally rendered in English with ''do not
    let ... deceive me.'' ''Deceive'' is the most straightforward equivalent for ἀπατάω
    in a temptation context."},{"source_word":"κάλλος γυναικὸς παρανόμου","chosen":"the
    beauty of a lawless woman","alternatives":["the beauty of an unlawful woman","the
    beauty of a woman who is lawless"],"lexicon":"LSJ","entry":null,"rationale":"κάλλος
    denotes beauty, and παρανόμου describes the woman as lawless rather than merely
    socially improper. ''Lawless'' preserves the moral-religious weight of the Greek
    without overexpanding it."},{"source_word":"παντὸς ὑποκειμένου","chosen":"anything
    laid before me","alternatives":["anything set before me","anything subject to","anything
    lying before me"],"lexicon":"LSJ","entry":null,"rationale":"ὑποκειμένου is difficult
    and semantically broad. In this temptation prayer, ''anything laid before me''
    best fits the sense of something presented or placed in one''s way as an object
    of enticement. The compressed Greek syntax likely carries over the verbal idea
    from the first clause, so English makes the temptation sense explicit."},{"source_word":"ἀπὸ
    ἁμαρτίας ἀνωφελοῦς","chosen":"by worthless sin","alternatives":["from profitless
    sin","from useless sin","by futile sin"],"lexicon":"LSJ","entry":null,"rationale":"ἀνώφελος
    means unprofitable, useless, or futile. ''Worthless'' is idiomatic modern English
    and preserves the moral evaluation. ἀπό is taken here as expressing source: the
    enticement proceeds from such sin."}],"theological_decisions":null,"footnotes":[{"marker":"a","text":"The
    Greek phrase παντὸς ὑποκειμένου is difficult; alternatively, ''anything set before
    me,'' ''anything lying before me,'' or ''anything subject to profitless sin.''","reason":"lexical_alternative"},{"marker":"b","text":"The
    second clause is syntactically compressed in Greek; English repeats the sense
    of ''do not let ... deceive me'' from the first clause.","reason":"cross_reference"}]})'
  philosophy: optimal-equivalence
