  from: Enclose my tongue and my lips with words of truth
  to: Clothe my tongue and my lips with words of truth; keep anger and senseless wrath far from me.
  rationale: 'Adjudicator-modified: The verb περιστέλλω primarily means to wrap, dress, or clothe (often used of swaddling or preparing a body). ''Enclose'' is overly mechanical and misses the metaphor of dressing or wrapping. While the reviewer suggests ''cover'', ''clothe'' better captures the poetic, psalmic register and the specific nuance of adorning or dressing the speech organs in truth.'
