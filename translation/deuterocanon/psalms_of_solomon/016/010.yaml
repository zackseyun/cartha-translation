id: PSS.16.10
reference: Psalms of Solomon 16:10
source:
  edition: lxx-swete-1909
  text: τὴν γλῶσσάν μου καὶ τὰ χείλη μου ἐν λόγοις ἀληθείας περίστειλον, ὀργὴν καὶ θυμὸν ἄλογον μακρὰν ποίησον ἀπʼ ἐμοῦ.
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: Clothe my tongue and my lips with words of truth; keep anger and senseless wrath far from me.; keep anger and senseless wrath far from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Surround," "guard," or "restrain" my tongue and my lips with words of truth.
    reason: lexical_alternative
  - marker: b
    text: Or "irrational wrath" or "unreasonable rage."
    reason: lexical_alternative
  - marker: c
    text: Or 'Enclose my tongue and my lips with words of truth'.
    reason: previous_rendering
lexical_decisions:
- source_word: περίστειλον
  chosen: Enclose
  alternatives:
  - Surround
  - Guard
  - Restrain
  lexicon: LSJ
  rationale: The verb literally suggests surrounding or covering. "Enclose" preserves the concrete image while fitting the prayer's sense of asking God to govern speech by truthful words. "Guard" is interpretive; "restrain" captures effect but weakens the metaphor.
- source_word: γλῶσσάν
  chosen: tongue
  alternatives:
  - speech
  lexicon: LSJ
  rationale: '"Tongue" is the direct lexical sense and preserves the bodily imagery joined with "lips." Rendering it as "speech" would flatten the parallelism.'
- source_word: χείλη
  chosen: lips
  alternatives:
  - mouth
  lexicon: LSJ
  rationale: '"Lips" matches the Greek precisely and maintains the poetic pairing with "tongue."'
- source_word: ἐν λόγοις ἀληθείας
  chosen: with words of truth
  alternatives:
  - in truthful words
  - with true words
  lexicon: LSJ
  rationale: This keeps the plural "words" and the genitival force of ἀληθείας in natural English. "Words of truth" sounds slightly elevated but remains clear and suits the poetic register.
- source_word: ὀργὴν
  chosen: anger
  alternatives:
  - wrath
  lexicon: LSJ
  rationale: '"Anger" is the plain, natural equivalent here. It also allows θυμός to be rendered with a stronger near-synonym so the pair is not collapsed.'
- source_word: θυμὸν
  chosen: wrath
  alternatives:
  - rage
  - fury
  lexicon: LSJ
  rationale: The verse uses two related anger terms. Rendering θυμός as "wrath" preserves distinction from ὀργή without becoming overly colloquial.
- source_word: ἄλογον
  chosen: senseless
  alternatives:
  - irrational
  - unreasonable
  - foolish
  lexicon: LSJ
  rationale: '"Senseless" communicates the moral and rational deficiency of the anger in readable modern English. "Irrational" is accurate but sounds more clinical.'
- source_word: μακρὰν ποίησον ἀπʼ ἐμοῦ
  chosen: keep ... far from me
  alternatives:
  - make ... far from me
  - put ... far from me
  lexicon: LSJ
  rationale: This idiom is rendered naturally in English as a request that God keep such things away. It preserves the sense without wooden phrasing.
