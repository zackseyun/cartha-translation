theological_decisions:
- issue: Whether σωτήρ should be rendered as the titular "Savior" or the more generic
    "deliverer".
  chosen_reading: Savior
  alternative_readings:
  - deliverer
  rationale: The context is prayerful and confessional, and the title-like force is
    well conveyed by "Savior" without importing extra doctrine beyond the text.
  doctrine_reference: Translate by source sense with readable modern English.
