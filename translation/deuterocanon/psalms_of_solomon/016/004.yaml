id: PSS.16.4
reference: Psalms of Solomon 16:4
source:
  edition: lxx-swete-1909
  text: ἔνυξέν με ὡς κέντρον ἵππου ἐπὶ τὴν ἐγρήγορσίν αὐτοῦ, ὁ σωτὴρ καὶ ἀντιλήμπτωρ
    μου ἐν παντὶ καιρῷ ἔσωσέν με.
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: He prodded me like a horse’s goad into wakefulness; my Savior and my helper
    saved me at every time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “spur” for “goad.”
    reason: lexical_alternative
  - marker: b
    text: Or “alertness” for “wakefulness.”
    reason: lexical_alternative
  - marker: c
    text: Greek “my savior and my supporter”; “helper” renders a term for one who
      comes to another’s aid.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνυξέν
  chosen: prodded
  alternatives:
  - pricked
  - goaded
  - pierced
  lexicon: LSJ
  rationale: The verb denotes a sharp prompting or jab. "Prodded" keeps the physical
    metaphor without overstating it as literal wounding.
- source_word: κέντρον
  chosen: goad
  alternatives:
  - spur
  - sting
  lexicon: LSJ
  rationale: In context with "horse," the image is an instrument used to drive an
    animal forward. "Goad" best preserves that motivational force; "sting" is less
    fitting here and "spur" is possible but narrower.
- source_word: ἐγρήγορσιν
  chosen: wakefulness
  alternatives:
  - alertness
  - watchfulness
  lexicon: LSJ
  rationale: The noun points to being awake or roused. "Wakefulness" preserves the
    verbal connection to awakening while remaining natural English.
- source_word: σωτήρ
  chosen: Savior
  alternatives:
  - deliverer
  lexicon: LSJ
  rationale: The term denotes one who saves or rescues. "Savior" is the most direct
    and weighty rendering in this devotional context.
- source_word: ἀντιλήμπτωρ
  chosen: helper
  alternatives:
  - supporter
  - defender
  lexicon: LSJ
  rationale: The word conveys one who takes hold in support or aid. "Helper" is clear
    and natural, while still allowing the sense of active support.
- source_word: ἐν παντὶ καιρῷ
  chosen: at every time
  alternatives:
  - at all times
  - in every season
  lexicon: LSJ
  rationale: The phrase expresses repeated or continual help across circumstances.
    "At every time" stays close to the Greek wording.
