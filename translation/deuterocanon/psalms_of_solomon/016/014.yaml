theological_decisions:
- issue: How to render the difficult phrase ἐν χειρὶ ἀπωλίας αὐτοῦ
  chosen_reading: 'Retained a relatively literal rendering: ''by the hand of his destruction.'''
  alternative_readings:
  - in the power of his ruin
  - at the hand of destruction
  rationale: The Greek of this clause is awkward in the supplied Swete witness, and
    the exact relationship of αὐτοῦ is not entirely clear. A literal rendering best
    preserves the source-level uncertainty rather than smoothing it into a more confident
    interpretation.
