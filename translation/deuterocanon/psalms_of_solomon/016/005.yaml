id: PSS.16.5
reference: Psalms of Solomon 16:5
source:
  edition: lxx-swete-1909
  text: ἐξομολογήσομαί σοι, ὁ θεός, ὅτι ἀντελάβου μου εἰς σωτηρίαν, καὶ οὐκ ἐλογίσω
    με μετὰ τῶν ἁμαρτωλῶν εἰς ἀπώλειαν.
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: I will give thanks to you, O God, because you took hold of me for salvation,
    and you did not count me with sinners for destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you helped me for deliverance.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you did not reckon me among sinners for destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξομολογήσομαί
  chosen: I will give thanks
  alternatives:
  - I will praise
  - I will confess
  lexicon: BDAG
  rationale: In this prayer context, the verb most naturally expresses thankful praise
    directed to God rather than confession of sin. 'Give thanks' preserves the personal,
    devotional force in clear modern English.
- source_word: ἀντελάβου
  chosen: you took hold of
  alternatives:
  - you helped
  - you supported
  lexicon: BDAG
  rationale: The verb literally carries the sense of taking hold in order to help.
    'Took hold of' preserves the vivid metaphor while still communicating divine aid;
    the following phrase makes the saving purpose explicit.
- source_word: εἰς σωτηρίαν
  chosen: for salvation
  alternatives:
  - for deliverance
  - to save me
  lexicon: BDAG
  rationale: The phrase states the purpose or result of God's help. 'For salvation'
    stays close to the Greek and preserves the religious weight of σωτηρία without
    overparaphrase.
- source_word: ἐλογίσω με
  chosen: you did not count me
  alternatives:
  - you did not reckon me
  - you did not consider me
  lexicon: BDAG
  rationale: '''Count'' is a natural modern rendering of λογίζομαι in a judicial or
    evaluative sense and fits the contrast with being grouped among sinners.'
- source_word: μετὰ τῶν ἁμαρτωλῶν
  chosen: with sinners
  alternatives:
  - among sinners
  - with the sinful
  lexicon: BDAG
  rationale: This is the straightforward sense of the prepositional phrase. 'With
    sinners' is concise and preserves the relational grouping implied by the Greek.
- source_word: εἰς ἀπώλειαν
  chosen: for destruction
  alternatives:
  - for ruin
  - to destruction
  lexicon: BDAG
  rationale: The phrase expresses the end or fate from which the speaker was spared.
    'For destruction' is direct, weighty, and closer to the Greek than a softer term
    such as 'ruin'.
