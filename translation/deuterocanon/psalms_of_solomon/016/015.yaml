id: PSS.16.15
reference: Psalms of Solomon 16:15
source:
  edition: lxx-swete-1909
  text: ἐν τῷ ὑπομεῖναι δίκαιον ἐν τούτοις ἐλεηθήσεται ὑπὸ Κυρίου.
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: When the righteous one endures in these things, he will be shown mercy by
    the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By enduring these things, the righteous one will be shown mercy by the
      Lord.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the righteous man' for 'the righteous one.' The Greek uses a singular
      masculine form that may function representatively.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ ὑπομεῖναι
  chosen: When ... endures
  alternatives:
  - By enduring
  - In enduring
  lexicon: BDAG
  rationale: 'The articular infinitive with ἐν can be rendered temporally or instrumentally.
    Here a temporal sense fits the immediate flow from the preceding description of
    testing and poverty: when the righteous one endures such trials, the result follows.'
- source_word: δίκαιον
  chosen: the righteous one
  alternatives:
  - the righteous man
  - the just one
  lexicon: BDAG
  rationale: The accusative likely functions as the subject of the infinitive ('the
    righteous one' enduring). 'Righteous one' preserves the substantival force without
    over-paraphrasing; 'righteous man' remains a plausible gender-accurate alternative.
- source_word: ἐν τούτοις
  chosen: in these things
  alternatives:
  - through these things
  - in such circumstances
  lexicon: BDAG
  rationale: The phrase most directly points back to the hardships just mentioned
    in the context. 'In these things' keeps that backward reference transparent without
    specifying more than the Greek states.
- source_word: ἐλεηθήσεται
  chosen: will be shown mercy
  alternatives:
  - will receive mercy
  - will be pitied
  lexicon: BDAG
  rationale: The future passive is naturally rendered 'will be shown mercy.' This
    preserves both the passive form and the mercy language, while avoiding the weaker
    English sense of mere pity.
- source_word: ὑπὸ Κυρίου
  chosen: by the Lord
  alternatives:
  - from the Lord
  lexicon: BDAG
  rationale: The preposition ὑπό with the genitive marks the agent of the passive
    verb. 'By the Lord' is therefore the most precise rendering and matches the project's
    default rendering of κύριος as 'Lord'.
