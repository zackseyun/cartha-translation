id: PSS.16.9
reference: Psalms of Solomon 16:9
source:
  edition: lxx-swete-1909
  text: τὰ ἔργα τῶν χειρῶν μου κατεύθυνον ἐν τόπῳ σου, καὶ τὰ διαβήματά μου ἐν τῇ μνήμῃ σου διαφύλαξον.
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: Direct the works of my hands in your place, and guard my steps in the remembrance of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in your presence” for “in your place.”
    reason: lexical_alternative
  - marker: b
    text: Or “preserve my steps in your memory.”
    reason: lexical_alternative
  - marker: c
    text: Or 'in your remembrance'.
    reason: previous_rendering
lexical_decisions:
- source_word: κατεύθυνον
  chosen: Direct
  alternatives:
  - Guide
  - Make straight
  - Set right
  lexicon: BDAG
  rationale: Imperative asking God to make the speaker's actions go rightly or straight. “Direct” is natural English and preserves the sense of ordering or guiding.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the deeds
  - the actions
  lexicon: BDAG
  rationale: A broad term for what the speaker does. “Works” stays close to the Greek while remaining readable.
- source_word: τῶν χειρῶν μου
  chosen: of my hands
  alternatives:
  - done by my hands
  - my handiwork
  lexicon: BDAG
  rationale: A common concrete expression for one's actions or labor. Retaining “of my hands” preserves the Hebrew-like idiom reflected in the Greek.
- source_word: ἐν τόπῳ σου
  chosen: in your place
  alternatives:
  - in your presence
  - in your realm
  - at your place
  lexicon: BDAG
  rationale: τόπος most plainly means “place.” Although a more interpretive rendering like “presence” is possible in prayer context, the source text itself says “place,” so the main text keeps that more transparent wording.
- source_word: τὰ διαβήματά μου
  chosen: my steps
  alternatives:
  - my goings
  - my ways
  - my movements
  lexicon: BDAG
  rationale: Refers to the speaker's course of life or movements. “My steps” is idiomatic English and fits the prayer for moral or practical preservation.
- source_word: ἐν τῇ μνήμῃ σου
  chosen: in your remembrance
  alternatives:
  - in your memory
  - before you
  - with you remembering me
  lexicon: BDAG
  rationale: μνήμη is remembrance or memory. “In your remembrance” is slightly formal but transparent and preserves the relational image without flattening it into a paraphrase.
- source_word: διαφύλαξον
  chosen: guard
  alternatives:
  - preserve
  - keep safe
  - watch over
  lexicon: BDAG
  rationale: The verb intensifies the idea of keeping or preserving. “Guard” is concise and strong in English.
