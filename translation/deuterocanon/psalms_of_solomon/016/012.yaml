id: PSS.16.12
reference: Psalms of Solomon 16:12
source:
  edition: lxx-swete-1909
  text: εὐδοκία δὲ μετὰ ἱλαρότητος στήρισον τὴν ψυχήν μου· ἐν τῷ ἐνισχῦσαί σε τὴν
    ψυχήν μου ἀρκέσει μοι τὸ δοθέν.
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: But establish my soul with favor and gladness; when you strengthen my soul,
    what has been given will be enough for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'goodwill' or 'good pleasure' for 'favor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will suffice for me' for 'will be enough for me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδοκία
  chosen: favor
  alternatives:
  - goodwill
  - good pleasure
  lexicon: BDAG
  rationale: The noun denotes benevolent disposition or gracious favor. In this prayer
    setting, 'favor' is natural English and fits the petition without importing a
    more technical theological sense.
- source_word: ἱλαρότητος
  chosen: gladness
  alternatives:
  - cheerfulness
  - joyfulness
  lexicon: LSJ
  rationale: The word conveys cheerful brightness or gladness. 'Gladness' is readable
    modern English and pairs well with 'favor' without sounding casual.
- source_word: στήρισον
  chosen: establish
  alternatives:
  - strengthen
  - make firm
  lexicon: LSJ
  rationale: The verb can mean to make firm or establish. 'Establish' preserves the
    stabilizing nuance, while the next clause uses a different strengthening verb,
    so varying the English avoids flattening the distinction.
- source_word: ψυχήν
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: LSJ
  rationale: In this devotional context, 'soul' best preserves the inner-person sense
    of ψυχή and matches the prayerful tone better than the flatter 'self'.
- source_word: ἐν τῷ ἐνισχῦσαί σε
  chosen: when you strengthen
  alternatives:
  - in your strengthening
  - as you strengthen
  lexicon: LSJ
  rationale: The articular infinitive with ἐν can be rendered temporally. 'When you
    strengthen' gives clear English while preserving the sense of circumstance or
    occasion.
- source_word: ἀρκέσει μοι
  chosen: will be enough for me
  alternatives:
  - will suffice for me
  lexicon: BDAG
  rationale: The future verb expresses sufficiency. 'Will be enough for me' is idiomatic
    contemporary English and preserves the straightforward sense.
- source_word: τὸ δοθέν
  chosen: what has been given
  alternatives:
  - the thing given
  - the gift given
  lexicon: BDAG
  rationale: The substantival participle is intentionally broad. 'What has been given'
    preserves that openness better than the more interpretive 'gift'.
