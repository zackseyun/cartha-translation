  from: and do not take the remembrance of you from my heart
  to: nor the remembrance of you from my heart
  rationale: 'The Greek uses a single verb (ἀποστήσῃς) governing both clauses, connected by μηδὲ (''nor''). Translating μηδὲ as ''nor'' without supplying a new verb (''take'') preserves the tight psalmic parallelism and avoids introducing a different English verb for the elided second instance. | Adjudicator: The Greek uses a single verb (ἀποστήσῃς) governing both objects (τὸ ἔλεός σου and τὴν μνήμην περὶ σοῦ), linked by μηδὲ. The proposed rewrite correctly reflects this by eliding the verb in the second c'
