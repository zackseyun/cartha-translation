id: PSS.16.6
reference: Psalms of Solomon 16:6
source:
  edition: lxx-swete-1909
  text: μὴ ἀποστήσῃς τὸ ἔλεός σου ἀπʼ ἐμοῦ, ὁ θεός, μηδὲ τὴν μνήμην περὶ σοῦ ἀπὸ καρδίας
    ἕως θανάτου.
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: Do not withdraw your mercy from me, O God, and do not take the remembrance
    of you from my heart until death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “nor the remembrance concerning you from my heart until death.”
    reason: lexical_alternative
  - marker: b
    text: “Mercy” could also be rendered “compassion” or, more interpretively, “steadfast
      love.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστήσῃς
  chosen: withdraw
  alternatives:
  - remove
  - take away
  - turn away
  lexicon: BDAG
  rationale: The verb here asks God not to cause something to depart from the speaker.
    “Withdraw” is natural English and preserves the sense of removal without overstating
    hostility.
- source_word: ἔλεός
  chosen: mercy
  alternatives:
  - compassion
  - steadfast love
  lexicon: LEH
  rationale: ἔλεος commonly denotes mercy or compassion. “Mercy” is the most direct
    and idiomatic choice here and fits prayer language well.
- source_word: μνήμην περὶ σοῦ
  chosen: the remembrance of you
  alternatives:
  - the memory of you
  - remembrance concerning you
  lexicon: LEH
  rationale: μνήμη means remembrance or memory. With περὶ σοῦ, the sense is remembrance
    directed toward God. “The remembrance of you” is more natural in English than
    the more literal “remembrance concerning you.”
- source_word: καρδίας
  chosen: heart
  lexicon: LEH
  rationale: In biblical Greek, “heart” naturally conveys the inner life, thought,
    and devotion. No expansion is needed here.
- source_word: ἕως θανάτου
  chosen: until death
  alternatives:
  - unto death
  - as long as I live
  lexicon: LEH
  rationale: The phrase is straightforwardly temporal. “Until death” is both clear
    and close to the Greek.
