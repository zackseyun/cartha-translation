theological_decisions:
- issue: Rendering of ᾅδου
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - the realm of the dead
  - death
  rationale: The Greek explicitly names ᾅδης. Rendering it as 'Hades' preserves the
    source term and its imagery, while alternatives are more interpretive. This follows
    original-language primacy and avoids importing a narrower doctrinal concept.
  doctrine_reference: Translation philosophy §1; preserve theological tension rather
    than resolve it.
- issue: Rendering of ψυχή
  chosen_reading: soul
  alternative_readings:
  - life
  rationale: ψυχή can mean either 'soul' or 'life' depending on context. Here the
    first-person prayer language and the parallel danger imagery favor 'soul' as the
    speaker's inner self, while the footnote preserves the viable alternative 'life.'
  doctrine_reference: Translation philosophy §3; preserve ambiguity where the source
    permits it.
