id: PSS.16.2
reference: Psalms of Solomon 16:2
source:
  edition: lxx-swete-1909
  text: τῷ μακρὰν ἀπὸ θεοῦ παρʼ ὀλίγον ἐξεχύθη ἡ ψυχή μου εἰς θάνατον, σύνεγγυς πυλῶν
    ᾅδου μετὰ ἁμαρτωλοῦ·
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: When I was far from God, my soul was almost poured out to death, near the
    gates of Hades with a sinner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "my life was almost poured out to death."
    reason: lexical_alternative
  - marker: b
    text: Or "near the gates of the grave" or "near the gates of the realm of the
      dead." The Greek reads "Hades."
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ μακρὰν ἀπὸ θεοῦ
  chosen: When I was far from God
  alternatives:
  - while far from God
  - being far from God
  lexicon: LSJ
  rationale: The Greek opening is compressed and somewhat awkward literally, but in
    context it functions like a circumstantial or temporal expression parallel to
    the surrounding lines. 'When I was far from God' brings the sense into clear English
    without adding content beyond what the context warrants.
- source_word: παρʼ ὀλίγον
  chosen: almost
  alternatives:
  - nearly
  - for a little
  lexicon: LSJ
  rationale: This idiom means 'almost' or 'nearly.' 'Almost' is the most natural modern
    English rendering here.
- source_word: ἐξεχύθη ἡ ψυχή μου εἰς θάνατον
  chosen: my soul was almost poured out to death
  alternatives:
  - my soul was nearly poured out unto death
  - my life was nearly spent to death
  lexicon: LSJ
  rationale: ἐκχέω literally means 'pour out,' and the passive preserves the vivid
    image of life draining away. 'Soul' is preferred over 'life' because ψυχή here
    expresses the speaker's very self in prayer, though 'life' is a plausible alternative.
- source_word: σύνεγγυς πυλῶν ᾅδου
  chosen: near the gates of Hades
  alternatives:
  - very near the gates of Hades
  - near the gates of the grave
  - near the gates of the realm of the dead
  lexicon: LSJ
  rationale: σύνεγγυς denotes close proximity. 'Near the gates of Hades' preserves
    both the spatial image and the Greek term ᾅδης rather than flattening it into
    a purely interpretive equivalent.
- source_word: μετὰ ἁμαρτωλοῦ
  chosen: with a sinner
  alternatives:
  - alongside a sinner
  - with the sinner
  lexicon: LSJ
  rationale: The singular is retained because the Greek is singular. 'With a sinner'
    is the most straightforward English and preserves the association without over-interpreting
    whether a specific individual or a representative wicked companion is meant.
