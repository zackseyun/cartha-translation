id: PSS.16.13
reference: Psalms of Solomon 16:13
source:
  edition: lxx-swete-1909
  text: ὅτι ἐὰν μὴ σὺ ἐνισχύσῃς, τίς ὑφέξεται παιδείαν ἐν πενίᾳ,
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: For if you do not strengthen, who will endure discipline in poverty?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instruction' for 'discipline' (παιδείαν).
    reason: lexical_alternative
  - marker: b
    text: The Greek leaves the object of 'give strength' unstated.
    reason: cultural_note
lexical_decisions:
- source_word: ἐνισχύσῃς
  chosen: give strength
  alternatives:
  - strengthen
  - make strong
  lexicon: BDAG
  rationale: The verb denotes imparting strength or support. 'Give strength' preserves
    the open-ended Greek, which leaves the object unstated, while remaining natural
    English.
- source_word: ὑφέξεται
  chosen: will endure
  alternatives:
  - will bear
  - will submit to
  - will hold out under
  lexicon: LSJ
  rationale: The future verb here conveys enduring or holding up under a burden. 'Will
    endure' is idiomatic and fits the rhetorical question.
- source_word: παιδείαν
  chosen: discipline
  alternatives:
  - instruction
  - training
  - correction
  lexicon: BDAG
  rationale: παιδεία can mean instruction or disciplinary training. In this context
    of hardship and endurance, 'discipline' best captures formative correction without
    over-paraphrasing.
- source_word: ἐν πενίᾳ
  chosen: in poverty
  alternatives:
  - in want
  - in affliction of poverty
  - amid poverty
  lexicon: LSJ
  rationale: πενία refers to poverty or want. 'In poverty' is the most direct rendering
    and preserves the stark socioeconomic sense of the Greek.
