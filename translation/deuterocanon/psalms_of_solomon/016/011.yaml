id: PSS.16.11
reference: Psalms of Solomon 16:11
source:
  edition: lxx-swete-1909
  text: γογγυσμὸν καὶ ὀλιγοψυχίαν ἐν θλίψει μάκρυνον ἀπʼ ἐμοῦ, ἐὰν ἁμαρτήσῃς ἐν τῷ
    σε παιδεύειν εἰς ἐπιστροφήν.
  language: Greek
  pages:
  - 805
  - 806
  validation: swete_direct
translation:
  text: 'submit_verse_draft({"english_text":"Keep grumbling and faintheartedness in
    affliction far from me, if you should err while disciplining me toward repentance.","translation_philosophy":"optimal-equivalence","lexical_decisions":[{"source_word":"γογγυσμόν","chosen":"grumbling","alternatives":["murmuring","complaint"],"lexicon":"LSJ","entry":null,"rationale":"γογγυσμός
    denotes murmuring or complaint. ''Grumbling'' is clear modern English and preserves
    the inwardly resentful tone of the prayer."},{"source_word":"ὀλιγοψυχίαν","chosen":"faintheartedness","alternatives":["discouragement","despondency","smallness
    of soul"],"lexicon":"LSJ","entry":null,"rationale":"The noun literally suggests
    smallness of soul, hence discouragement or lack of courage. ''Faintheartedness''
    keeps the moral-psychological force without becoming opaque."},{"source_word":"ἐν
    θλίψει","chosen":"in affliction","alternatives":["in distress","in trouble"],"lexicon":"LSJ","entry":null,"rationale":"θλῖψις
    commonly denotes affliction or distress. ''In affliction'' fits the prayerful,
    weighty register and stays close to the Greek."},{"source_word":"μάκρυνον ἀπʼ
    ἐμοῦ","chosen":"keep ... far from me","alternatives":["remove ... from me","put
    ... far from me"],"lexicon":"LSJ","entry":null,"rationale":"The imperative asks
    that these dispositions be made distant from the speaker. ''Keep ... far from
    me'' is idiomatic English for the Greek expression."},{"source_word":"ἐὰν ἁμαρτήσῃς","chosen":"if
    you should err","alternatives":["if you should sin","if I should sin"],"lexicon":"LSJ","entry":null,"rationale":"The
    transmitted Greek is difficult because the second-person singular naturally addresses
    God, which makes a blunt ''if you should sin'' theologically and contextually
    jarring. ἁμαρτάνω can also mean ''err'' or ''miss,'' so ''if you should err''
    preserves the wording''s difficulty while softening the English just enough to
    remain intelligible. The more literal and the contextually smoother alternatives
    are preserved in a footnote."},{"source_word":"ἐν τῷ σε παιδεύειν","chosen":"while
    disciplining me","alternatives":["while you discipline me","in your disciplining
    me"],"lexicon":"LSJ","entry":null,"rationale":"The articular infinitive with ἐν
    τῷ is temporal: ''while'' or ''when.'' The subject of the infinitive is explicitly
    ''you,'' and the object is left implicit in Greek but is most naturally supplied
    as ''me'' from the prayer context."},{"source_word":"εἰς ἐπιστροφήν","chosen":"toward
    repentance","alternatives":["for repentance","for turning back"],"lexicon":"LSJ","entry":null,"rationale":"ἐπιστροφή
    denotes turning back or repentance. ''Toward repentance'' keeps the directional
    force of εἰς and fits the corrective sense of divine discipline."}],"theological_decisions":[{"issue":"How
    to render the difficult clause ἐὰν ἁμαρτήσῃς ἐν τῷ σε παιδεύειν εἰς ἐπιστροφήν","chosen_reading":"Render
    the second-person verb in the main text as ''if you should err'' while preserving
    the harder literal alternative in a footnote.","alternative_readings":["if you
    should sin while disciplining me toward repentance","if I should sin while you
    discipline me toward repentance"],"rationale":"The Zone 1 Greek as transmitted
    appears to address God with a second-person singular verb, creating a real interpretive
    difficulty. Rather than emending the person silently, the main text keeps the
    second person. Using ''err'' reflects a legitimate semantic range of ἁμαρτάνω
    and avoids overstating a doctrinally loaded reading, while the footnote preserves
    both the literal wording and the smoother contextual alternative.","doctrine_reference":"Preserve
    theological tension rather than resolve it; original-language primacy over translation
    tradition."}],"footnotes":[{"marker":"a","text":"Or ''murmuring.''","reason":"lexical_alternative"},{"marker":"b","text":"Or
    ''discouragement'' or more literally ''smallness of soul.''","reason":"lexical_alternative"},{"marker":"c","text":"Greek
    literally, ''if you should sin,'' a difficult reading in context; some may understand
    the sense as ''if I should sin while you discipline me toward repentance.''","reason":"alternative_reading"}]})'
  philosophy: optimal-equivalence
