id: PSS.16.7
reference: Psalms of Solomon 16:7
source:
  edition: lxx-swete-1909
  text: ἐπικράτησόν μου, ὁ θεός, ἀπὸ ἁμαρτίας πονηρᾶς καὶ ἀπὸ πάσης γυναικὸς πονηρᾶς σκανδαλιζούσης ἄφρονα.
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: Restrain me, O God, from wicked sin and from every wicked woman who causes a foolish man to stumble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Take charge of me, O God, away from'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπικράτησόν μου
  chosen: Take charge of me
  alternatives:
  - Rule over me
  - Have mastery over me
  - Prevail over me
  lexicon: LSJ
  entry: null
  rationale: ἐπικρατέω denotes exercising power, mastery, or prevailing over. In this prayer, the imperative asks God to exercise governing control over the speaker as protection from what follows. 'Take charge of me' renders that force in readable English, while a footnote preserves the more literal alternatives.
- source_word: ἀπὸ ἁμαρτίας πονηρᾶς
  chosen: away from wicked sin
  alternatives:
  - from evil sin
  - from a wicked sin
  lexicon: LSJ
  entry: null
  rationale: ἀπό marks separation, and the phrase expresses a plea to be kept at a distance from sin. πονηρᾶς adds moral badness; 'wicked' is slightly more natural than 'evil' with 'sin' in English while preserving the strong ethical force.
- source_word: καὶ ἀπὸ πάσης γυναικὸς πονηρᾶς
  chosen: and from every wicked woman
  alternatives:
  - and from every evil woman
  - and from any wicked woman
  lexicon: LSJ
  entry: null
  rationale: πάσης with the singular gives a comprehensive sense. 'Every wicked woman' is the most transparent rendering and preserves the repeated adjective πονηρᾶς from the previous phrase.
- source_word: σκανδαλιζούσης
  chosen: who causes ... to stumble
  alternatives:
  - who ensnares
  - who trips up
  - who causes ... to fall
  lexicon: LSJ
  entry: null
  rationale: The participle describes the woman's harmful action. σκανδαλίζω literally evokes causing someone to stumble, and that image is still meaningful in English, so it is preserved rather than flattened into a purely abstract term.
- source_word: ἄφρονα
  chosen: a foolish man
  alternatives:
  - a senseless man
  - a foolish person
  lexicon: LSJ
  entry: null
  rationale: ἄφρων denotes someone lacking sense or wisdom. The Greek form is masculine singular, so the main text keeps 'man' in keeping with the project's gender-accurate policy, while the footnote notes the broader possibility.
