id: PSS.8.20
reference: Psalms of Solomon 8:20
source:
  edition: lxx-swete-1909
  text: εἰσῆλθεν ὡς πατὴρ εἰς οἶκον υἱῶν αὐτοῦ μετʼ εἰρήνης, ἔστησεν τοὺς πόδας αὐτοῦ
    μετὰ ἀσφαλείας πολλῆς.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: He entered like a father into the house of his sons in peace; he set his feet
    with great security.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his sons’ house.' The Greek can be read either as a formally literal
      'the house of his sons' or a more idiomatic possessive.
    reason: lexical_alternative
  - marker: b
    text: Or 'he planted his feet with great safety.' The clause likely conveys secure
      establishment or unhindered footing.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - came in
  - went in
  lexicon: BDAG
  rationale: Aorist of entrance; 'entered' is the most natural and direct English
    equivalent in narrative context.
- source_word: ὡς πατὴρ
  chosen: like a father
  alternatives:
  - as a father
  lexicon: BDAG
  rationale: ὡς naturally marks comparison here. 'Like a father' preserves the simile
    without overstating identity or role.
- source_word: οἶκον υἱῶν αὐτοῦ
  chosen: the house of his sons
  alternatives:
  - his sons' house
  - the household of his sons
  lexicon: BDAG
  rationale: A formally close rendering preserves the concrete image of entering a
    familial house. 'Household' is possible, but 'house' better reflects the Greek
    wording while still reading naturally.
- source_word: μετʼ εἰρήνης
  chosen: in peace
  alternatives:
  - with peace
  - peacefully
  lexicon: BDAG
  rationale: '''In peace'' is idiomatic English and preserves the prepositional sense
    without paraphrase.'
- source_word: ἔστησεν τοὺς πόδας αὐτοῦ
  chosen: he set his feet
  alternatives:
  - he planted his feet
  - he took his stand
  lexicon: BDAG
  rationale: This keeps the bodily image explicit. 'Took his stand' is interpretive;
    'set his feet' stays closer to the source.
- source_word: μετὰ ἀσφαλείας πολλῆς
  chosen: with great security
  alternatives:
  - with great safety
  - very securely
  lexicon: BDAG
  rationale: ἀσφάλεια denotes security or safety. 'With great security' preserves
    the noun-based construction and the intensifier πολλῆς.
