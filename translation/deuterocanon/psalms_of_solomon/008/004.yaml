id: PSS.8.4
reference: Psalms of Solomon 8:4
source:
  edition: lxx-swete-1909
  text: φωνὴν ἤκουσα εἰς Ἰερουσαλὴμ πόλιν ἁγιάσματος.
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: I heard a voice in Jerusalem, the holy city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'a city of holiness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνήν
  chosen: a voice
  alternatives:
  - a sound
  - an आवाज/cry
  lexicon: BDAG
  rationale: φωνή commonly denotes a voice or audible utterance. In this context,
    'a voice' best preserves the personal and report-like force without over-interpreting
    the source.
- source_word: ἤκουσα
  chosen: I heard
  alternatives:
  - I listened to
  lexicon: BDAG
  rationale: The aorist verb straightforwardly reports perception of sound. 'I heard'
    is the plain English equivalent.
- source_word: εἰς Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - into Jerusalem
  - toward Jerusalem
  lexicon: BDAG
  rationale: Although εἰς often means 'into,' in later Greek it can function with
    a locative sense. Here 'I heard a voice in Jerusalem' makes best sense in idiomatic
    English and fits the construction.
- source_word: πόλιν ἁγιάσματος
  chosen: the holy city
  alternatives:
  - a city of holiness
  - a city of sanctity
  - the city of the sanctuary
  lexicon: BDAG
  rationale: Formally the phrase is 'city of holiness/sanctification.' In natural
    English, 'the holy city' conveys the same sense clearly while remaining anchored
    to the Greek. The more literal alternative is preserved in a footnote.
