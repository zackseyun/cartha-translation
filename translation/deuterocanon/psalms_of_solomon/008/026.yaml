  from: sanctified by the name of God
  to: sanctified to the name of God
  rationale: The dative τῷ ὀνόματι here is a dative of dedication ('to/for the name'), not instrumental ('by the name'). The phrase refers to the temple offerings and vessels that were consecrated *to* God's name, consistent with LXX usage for dedicating holy things (e.g., Lev 22:2).
