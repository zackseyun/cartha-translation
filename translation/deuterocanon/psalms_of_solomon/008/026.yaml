id: PSS.8.26
reference: Psalms of Solomon 8:26
source:
  edition: lxx-swete-1909
  text: ἐμίανεν Ἰερουσαλὴμ καὶ τὰ ἡγιασμένα τῷ ὀνόματι τοῦ θεοῦ.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: He defiled Jerusalem and the things sanctified by the name of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the holy things” or “the consecrated things.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμίανεν
  chosen: defiled
  alternatives:
  - polluted
  - profaned
  lexicon: BDAG
  rationale: The verb μίανω denotes making something ritually or morally unclean.
    “Defiled” preserves that impurity language better than the broader “polluted,”
    while avoiding the slightly interpretive sense of “profaned.”
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: τὰ ἡγιασμένα
  chosen: the things sanctified
  alternatives:
  - the holy things
  - the consecrated things
  lexicon: BDAG
  rationale: The perfect passive participle from ἁγιάζω refers to things made holy
    or consecrated. “The things sanctified” is transparent to the Greek form and keeps
    the passive idea explicit.
- source_word: τῷ ὀνόματι τοῦ θεοῦ
  chosen: by the name of God
  alternatives:
  - in the name of God
  - bearing the name of God
  lexicon: BDAG
  rationale: The dative phrase is most naturally rendered instrumentally or associatively
    here, indicating consecration in relation to God's name. “By the name of God”
    stays close to the Greek while remaining intelligible in English.
