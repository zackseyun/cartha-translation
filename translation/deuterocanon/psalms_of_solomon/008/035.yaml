theological_decisions:
- issue: Rendering πίστις σου in reference to God
  chosen_reading: your faithfulness
  alternative_readings:
  - your faith
  rationale: The phrase is best understood as referring to God's steadfast fidelity
    toward his people, not God's exercise of faith. This preserves the sense most
    naturally in English while documenting the more formally literal alternative.
  doctrine_reference: 'Contested terms: πίστις → faith; faithfulness/trust footnoted
    where contested'
