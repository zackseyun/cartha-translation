id: PSS.8.35
reference: Psalms of Solomon 8:35
source:
  edition: lxx-swete-1909
  text: ὅτι πίστις σου μεθʼ ἡμῶν, καὶ ἡμεῖς ἐσκληρύναμεν τράχηλον ἡμῶν, καὶ σὺ παιδευτὴς
    ἡμῶν εἶ.
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: For your faithfulness is with us, and we stiffened our necks, and you are
    the one who disciplines us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “your faith is with us.”
    reason: lexical_alternative
  - marker: b
    text: “Stiffened our necks” is an idiom for becoming stubborn.
    reason: cultural_note
lexical_decisions:
- source_word: πίστις
  chosen: faithfulness
  alternatives:
  - faith
  - trust
  lexicon: BDAG
  rationale: Although πίστις is rendered 'faith' by default, the possessive 'your'
    and the address to God make 'your faith' awkward in English and less likely in
    sense here. 'Faithfulness' best conveys steadfast reliability in this context;
    the default alternative is preserved in a footnote.
- source_word: μεθʼ ἡμῶν
  chosen: is with us
  alternatives:
  - is among us
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase that preserves
    the relational sense without expansion.
- source_word: ἐσκληρύναμεν τράχηλον ἡμῶν
  chosen: we stiffened our necks
  alternatives:
  - we hardened our neck
  - we became stubborn
  lexicon: BDAG
  rationale: This is a biblical idiom for obstinacy. 'We stiffened our necks' preserves
    the metaphor while using natural English; plural 'necks' is idiomatic in English
    though the Greek has a collective singular.
- source_word: παιδευτής
  chosen: the one who disciplines
  alternatives:
  - instructor
  - trainer
  - chastener
  lexicon: LSJ
  rationale: The noun denotes one who trains or disciplines. In address to God, 'the
    one who disciplines' preserves both the pedagogical and corrective sense better
    than the narrower 'instructor' or the overly harsh 'chastener'.
