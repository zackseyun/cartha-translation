id: PSS.8.38
reference: Psalms of Solomon 8:38
source:
  edition: lxx-swete-1909
  text: καὶ ἡμεῖς οὐκ ἀφεξόμεθά σου, ὅτι χρηστὰ τὰ κρίματά σου εἰς ἡμᾶς.
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: And we will not turn away from you, because your judgments toward us are good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we will not keep away from you' or 'we will not depart from you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your judgments toward us are kind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφεξόμεθά
  chosen: will not turn away
  alternatives:
  - will not keep away
  - will not depart
  - will not refrain
  lexicon: BDAG
  rationale: The future middle of ἀπέχω/ἀφέχομαι with a personal genitive conveys
    keeping oneself away from someone. 'Turn away' gives natural English while preserving
    the relational sense of refusing to withdraw from God.
- source_word: χρηστὰ
  chosen: good
  alternatives:
  - kind
  - benevolent
  - favorable
  lexicon: BDAG
  rationale: χρηστός can mean kind, benevolent, or good. Here it describes God's κρίματα
    toward the speaker's community; 'good' is broad and clear, while still allowing
    the nuance of beneficence.
- source_word: κρίματά
  chosen: judgments
  alternatives:
  - decrees
  - judicial decisions
  - acts of judgment
  lexicon: BDAG
  rationale: κρίματα commonly denotes judgments or judicial decisions. 'Judgments'
    best preserves the formal, theological register of divine evaluation and action
    without over-narrowing the term to legal decrees.
- source_word: εἰς ἡμᾶς
  chosen: toward us
  alternatives:
  - for us
  - with respect to us
  - upon us
  lexicon: BDAG
  rationale: The preposition εἰς here marks direction or relation. 'Toward us' naturally
    expresses that God's judgments are directed to the people addressed, without forcing
    either a purely beneficial or punitive nuance.
