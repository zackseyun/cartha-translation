lexical_decisions:
- source_word: ἐν καταγώγαις κρυφίοις
  chosen: in secret chambers
  alternatives:
  - in hidden places
  - in secret haunts
  - in concealed rooms
  lexicon: LSJ
  entry: null
  rationale: The phrase denotes concealed locations. 'Secret chambers' fits the likely indoor, hidden setting of illicit acts and reads naturally in English without over-specifying the architecture.
- source_word: αἱ παρανομίαι αὐτῶν
  chosen: their lawless deeds
  alternatives:
  - their acts of lawlessness
  - their transgressions
  lexicon: LSJ
  entry: null
  rationale: παρανομίαι refers to violations of law or acts done against what is right. 'Lawless deeds' preserves both the concrete sense of acts and the moral-legal force of the noun.
- source_word: ἐν παροργισμῷ
  chosen: in defiance
  alternatives:
  - in provocation
  - in anger
  lexicon: LSJ
  entry: null
  rationale: παροργισμός can denote provocation or embittered anger. In this context of hidden sins exposed by God, 'in defiance' best conveys behavior carried out as a provoking affront, while remaining within the semantic range.
- source_word: '[implied copula]'
  chosen: were
  alternatives:
  - occurred
  - took place
  lexicon: N/A
  entry: null
  rationale: The Greek line is verbless, a common construction. Supplying 'were' is the lightest English completion and avoids adding interpretive weight beyond what the Greek warrants.
