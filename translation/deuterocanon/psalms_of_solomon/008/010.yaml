  from: Son with mother and father with daughter were mixed together.
  to: Son with mother and father with daughter were commingling.
  rationale: 'Adjudicator-modified: The reviewer is correct that the passive/middle
    of συμφύρω (συνεφύροντο) here functions as a euphemism for illicit sexual intercourse,
    making ''were mixed together'' sound inappropriately like a culinary or physical
    operation. However, ''mingling'' in modern English strongly connotes casual socializing
    (e.g., at a party). ''Were commingling'' better captures both the literal prefix/root
    (''mixing together'') and the English register for illicit or inappropriate joining,
    while preserving the imperfect as'
