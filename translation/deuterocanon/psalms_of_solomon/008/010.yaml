theological_decisions:
- issue: Whether to make the incestuous sense explicit in the main text
  chosen_reading: Keep the metaphorically literal wording “were mixed together.”
  alternative_readings:
  - “had relations together”
  - “were sexually joined together”
  rationale: The kinship pairings make the sexual misconduct clear, but the Greek
    verb itself is more literally a mixing/commingling term. Optimal equivalence favors
    retaining that imagery in the main text rather than importing a more explicit
    verbal expression.
  doctrine_reference: Preserve theological tension rather than resolve it; never paraphrase
    beyond what the source text warrants.
