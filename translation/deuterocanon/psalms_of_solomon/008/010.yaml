id: PSS.8.10
reference: Psalms of Solomon 8:10
source:
  edition: lxx-swete-1909
  text: υἱὸς μετὰ μητρὸς καὶ πατὴρ μετὰ θυγατρὸς συνεφύροντο.
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: A son with a mother and a father with a daughter were commingling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “were mingled together.” The sense is that close family relations were
      illicitly mixed.
    reason: lexical_alternative
  - marker: b
    text: Or 'Son with mother and father with daughter were mixed together.'.
    reason: previous_rendering
lexical_decisions:
- source_word: υἱὸς
  chosen: son
  alternatives:
  - a son
  lexicon: BDAG
  rationale: The singular noun is best carried over directly as “son.” The line uses
    representative singulars in a stark vice-list style rather than individualized
    narrative.
- source_word: μετὰ
  chosen: with
  alternatives:
  - together with
  lexicon: BDAG
  rationale: 'Here μετά with the genitive marks association: “with.” A more expanded
    gloss would add English weight not required by the Greek.'
- source_word: μητρὸς
  chosen: mother
  alternatives: []
  lexicon: BDAG
  rationale: Straightforward kinship term; “mother” preserves the familial violation
    described.
- source_word: πατὴρ
  chosen: father
  alternatives:
  - a father
  lexicon: BDAG
  rationale: Rendered plainly as “father,” matching the singular representative style
    of the clause.
- source_word: θυγατρὸς
  chosen: daughter
  alternatives: []
  lexicon: BDAG
  rationale: Straightforward kinship term; “daughter” preserves the symmetry of the
    paired relations.
- source_word: συνεφύροντο
  chosen: were mixed together
  alternatives:
  - mingled together
  - were confounded together
  lexicon: LSJ
  rationale: The verb conveys illicit mixing or commingling. “Were mixed together”
    is idiomatic modern English and preserves the morally shocking force without over-paraphrasing
    into an explicitly sexual gloss not stated by the verb alone, though the context
    clearly implies incestuous union.
