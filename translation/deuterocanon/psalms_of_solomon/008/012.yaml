id: PSS.8.12
reference: Psalms of Solomon 8:12
source:
  edition: lxx-swete-1909
  text: τὰ ἅγια τοῦ θεοῦ διηρπάζοντο, ὡς μὴ ὄντος κληρονόμου λυτρουμένου.
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: The holy things of God were being plundered, as though there were no heir
    to redeem them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as though there were no heir redeeming them'; the Greek participle may
      be rendered more directly.
    reason: alternative_reading
  - marker: b
    text: '''The holy things'' could also be understood more specifically as ''the
      sacred things'' or, less likely here, ''the sanctuary.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἅγια
  chosen: the holy things
  alternatives:
  - the sacred things
  - the sanctuary
  lexicon: BDAG
  rationale: The neuter plural most naturally refers to God's holy/sacred things rather
    than requiring the more spatial sense 'sanctuary.' 'Holy things' preserves the
    concrete yet somewhat broad force of the Greek.
- source_word: διηρπάζοντο
  chosen: were being plundered
  alternatives:
  - were being seized
  - were being pillaged
  lexicon: LSJ
  rationale: The imperfect passive/middle conveys ongoing violent despoiling. 'Were
    being plundered' captures both the iterative/ongoing aspect and the sense of sacrilegious
    seizure.
- source_word: ὡς μὴ ὄντος
  chosen: as though there were no
  alternatives:
  - as if there were no
  lexicon: BDAG
  rationale: 'This idiom introduces the shocking comparison: the plundering proceeded
    as if no such person existed. ''As though there were no'' is natural English and
    preserves the comparative force.'
- source_word: κληρονόμου
  chosen: heir
  alternatives:
  - inheritor
  lexicon: BDAG
  rationale: The ordinary sense is 'heir.' Although the context may evoke a protector-redeemer
    role, the noun itself should remain transparent in the main text rather than being
    expanded to 'redeemer' or 'guardian.'
- source_word: λυτρουμένου
  chosen: to redeem them
  alternatives:
  - redeeming
  - to rescue them
  - to reclaim them
  lexicon: BDAG
  rationale: The participle carries a deliverance/ransom sense. In English, attaching
    it to 'heir' as an infinitival idea ('heir to redeem them') reads most clearly
    while preserving the redemptive force. 'Redeem' is preferable to the flatter 'rescue'
    because λυτρόομαι often includes the notion of reclaiming by deliverance.
