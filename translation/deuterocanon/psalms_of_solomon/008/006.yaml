id: PSS.8.6
reference: Psalms of Solomon 8:6
source:
  edition: lxx-swete-1909
  text: ἐφοβήθη ἡ καρδία μου, ἐταράχθη τὰ ὀστᾶ μου ὡς λίνον.
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: My heart was afraid; my bones were shaken like flax.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my heart feared.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my bones were shaken/disturbed like linen.' The image is difficult, but the Greek most literally reads 'like flax.'
    reason: lexical_alternative
  - marker: c
    text: Or 'were troubled'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐφοβήθη
  chosen: was afraid
  alternatives:
  - feared
  - became afraid
  lexicon: BDAG
  rationale: Aorist passive/deponent form of φοβέω here expresses the onset/state of fear. 'Was afraid' is natural modern English and stays close to the source without over-paraphrasing.
- source_word: καρδία
  chosen: heart
  alternatives:
  - inner being
  lexicon: BDAG
  rationale: '''Heart'' is the standard and transparent rendering, preserving the anthropological imagery of the Greek rather than interpreting it more abstractly.'
- source_word: ἐταράχθη
  chosen: were troubled
  alternatives:
  - were shaken
  - were disturbed
  lexicon: BDAG
  rationale: The verb denotes disturbance or agitation. 'Were troubled' preserves the emotional-physical unrest while remaining readable and not overstating violent motion.
- source_word: ὀστᾶ
  chosen: bones
  alternatives:
  - frame
  lexicon: BDAG
  rationale: The plural noun literally means 'bones' and should be kept concrete, preserving the embodied force of the lament.
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: BDAG
  rationale: This introduces comparison; 'like' is the most natural English equivalent here.
- source_word: λίνον
  chosen: flax
  alternatives:
  - linen
  - tow
  lexicon: LSJ
  rationale: λίνον most basically denotes flax or linen. 'Flax' best fits the simile's raw-material imagery; 'linen' would suggest finished cloth, and 'tow' is more interpretive than the Greek warrants.
