id: PSS.8.14
reference: Psalms of Solomon 8:14
source:
  edition: lxx-swete-1909
  text: οὐ παρέλειπον ἁμαρτίαν ἣν οὐκ ἐποίησαν ὑπὲρ τὰ ἔθνη.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: They omitted no sin that they did not commit, beyond the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They omitted no sin that they did not do more than the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλειπον
  chosen: left
  alternatives:
  - omitted
  - neglected
  lexicon: LSJ
  rationale: The verb here carries the sense of leaving something undone or omitted.
    In English, 'left no sin uncommitted' preserves the idiom naturally and keeps
    the force of totality.
- source_word: ἁμαρτίαν
  chosen: sin
  alternatives:
  - offense
  - wrongdoing
  lexicon: LSJ
  rationale: '''Sin'' is the direct and standard rendering, matching both the moral-religious
    force of the Greek and the tone of the passage.'
- source_word: ἐποίησαν
  chosen: committed
  alternatives:
  - did
  - performed
  lexicon: LSJ
  rationale: Although the verb is literally 'did,' English normally says one 'commits'
    sin. This is a justified contextual rendering rather than paraphrase.
- source_word: ὑπὲρ τὰ ἔθνη
  chosen: going beyond the nations
  alternatives:
  - more than the nations
  - beyond the Gentiles
  lexicon: LSJ
  rationale: ὑπέρ here expresses excess or surpassing. 'Going beyond the nations'
    preserves the comparative force without flattening it. 'Nations' is preferred
    over 'Gentiles' because the contrast is with other peoples generally, not specifically
    a later Jewish-Christian insider/outsider category.
