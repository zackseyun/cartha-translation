id: PSS.8.34
reference: Psalms of Solomon 8:34
source:
  edition: lxx-swete-1909
  text: συνάγαγε τὴν διασπορὰν Ἰσραὴλ μετὰ ἐλέους καὶ χρηστότητος.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: Gather the dispersed of Israel with mercy and kindness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the dispersion of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'goodness' for 'kindness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Israel’s dispersed people'.
    reason: previous_rendering
lexical_decisions:
- source_word: συνάγαγε
  chosen: Gather
  alternatives:
  - Bring together
  - Assemble
  lexicon: BDAG
  rationale: Aorist imperative calling for ingathering. 'Gather' is natural English
    and preserves the prayerful summons without over-specifying the manner.
- source_word: διασπορά
  chosen: dispersed people
  alternatives:
  - dispersion
  - those scattered abroad
  lexicon: BDAG
  rationale: The noun is literally 'dispersion,' but in English this often sounds
    abstract. 'Dispersed people' brings out the collective human referent in clear
    modern English while remaining anchored to the Greek.
- source_word: Ἰσραήλ
  chosen: Israel’s
  alternatives:
  - of Israel
  lexicon: BDAG
  rationale: 'Rendered possessively for natural English: the dispersed people belonging
    to Israel.'
- source_word: μετὰ ἐλέους
  chosen: with mercy
  alternatives:
  - in mercy
  lexicon: BDAG
  rationale: The preposition with the genitive is straightforwardly instrumental/accompaniment
    here; 'with mercy' is idiomatic and transparent.
- source_word: χρηστότης
  chosen: kindness
  alternatives:
  - goodness
  - benevolence
  lexicon: BDAG
  rationale: '''Kindness'' best captures the benevolent quality of χρηστότης in accessible
    modern English. ''Goodness'' is possible but less specific in this prayer context.'
