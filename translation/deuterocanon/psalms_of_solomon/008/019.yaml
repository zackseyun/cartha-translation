id: PSS.8.19
reference: Psalms of Solomon 8:19
source:
  edition: lxx-swete-1909
  text: ὡμάλισαν ὁδοὺς τραχείας ἀπὸ εἰσόδου αὐτοῦ, ἤνοιξαν πύλας ἐπὶ Ἰερουσαλήμ, ἐστεφάνωσαν τείχη αὐτῆς.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: They made rough roads smooth before his entrance; they opened gates toward Jerusalem; they crowned her walls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his entrance'; the Greek phrase is awkward, and the translation takes it as expressing preparation for his entry.
    reason: lexical_alternative
  - marker: b
    text: Or 'garlanded her walls.'
    reason: lexical_alternative
  - marker: c
    text: Or 'They made rough roads smooth for his entrance; they opened gates toward Jerusalem; they crowned her walls.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὡμάλισαν
  chosen: made ... smooth
  alternatives:
  - leveled
  - smoothed
  lexicon: BDAG
  rationale: The verb means to level or smooth out. 'Made ... smooth' is natural English and preserves the concrete image of preparing a way.
- source_word: ὁδοὺς τραχείας
  chosen: rough roads
  alternatives:
  - rough ways
  - rugged roads
  lexicon: BDAG
  rationale: A straightforward rendering of the noun-adjective pair. 'Roads' is slightly more concrete and readable than 'ways' here.
- source_word: ἀπὸ εἰσόδου αὐτοῦ
  chosen: for his entrance
  alternatives:
  - from his entrance
  - at his entry
  lexicon: BDAG
  rationale: The Greek preposition is somewhat awkward in English if rendered woodenly as 'from.' In context the phrase most naturally expresses preparation for the ruler's entry, so 'for his entrance' best captures the sense while staying close to the source.
- source_word: ἤνοιξαν πύλας
  chosen: they opened gates
  alternatives:
  - they opened the gates
  lexicon: BDAG
  rationale: The anarthrous phrase does not require 'the' in English. The verbal action is preserved plainly.
- source_word: ἐπὶ Ἰερουσαλήμ
  chosen: toward Jerusalem
  alternatives:
  - for Jerusalem
  - upon Jerusalem
  lexicon: BDAG
  rationale: With gates, ἐπί here is best taken directionally. 'Toward Jerusalem' gives a coherent spatial sense in context.
- source_word: ἐστεφάνωσαν
  chosen: crowned
  alternatives:
  - garlanded
  - encircled
  lexicon: BDAG
  rationale: The verb is literally 'crowned.' Retaining that image preserves the triumphal or celebratory nuance, even though the object is metaphorical.
- source_word: τείχη αὐτῆς
  chosen: her walls
  alternatives:
  - its walls
  - the walls of Jerusalem
  lexicon: BDAG
  rationale: The feminine pronoun naturally refers to Jerusalem. 'Her walls' preserves the personified-city imagery common in biblical style.
