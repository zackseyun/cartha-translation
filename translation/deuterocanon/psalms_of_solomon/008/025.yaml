id: PSS.8.25
reference: Psalms of Solomon 8:25
source:
  edition: lxx-swete-1909
  text: ἐποίησαν κατὰ τὰς ἀκαθαρσίας αὐτῶν, καθὼς οἱ πατέρες αὐτῶν·
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: They acted according to their uncleannesses, just as their fathers did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their impurities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν
  chosen: acted
  alternatives:
  - did
  - made
  lexicon: BDAG
  rationale: The verb is semantically broad ('do/make'), but 'acted' reads more naturally
    in English with a following moral standard ('according to their uncleannesses')
    while preserving the sense of conduct.
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in accordance with
  - after
  lexicon: BDAG
  rationale: '''According to'' best preserves the governing sense of conduct measured
    by or corresponding to a standard.'
- source_word: τὰς ἀκαθαρσίας αὐτῶν
  chosen: their uncleannesses
  alternatives:
  - their impurities
  - their unclean acts
  lexicon: BDAG
  rationale: The plural noun denotes states or manifestations of impurity/defilement.
    'Uncleannesses' preserves both the plural form and the moral-ritual force better
    than the smoother but less marked 'impurities.'
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - like
  lexicon: BDAG
  rationale: '''Just as'' clearly marks comparison and reflects the rhetorical force
    of continuity with the fathers'' behavior.'
- source_word: οἱ πατέρες αὐτῶν
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: BDAG
  rationale: '''Fathers'' is the direct lexical equivalent and preserves the familial/ancestral
    language of the Greek without broadening it interpretively.'
