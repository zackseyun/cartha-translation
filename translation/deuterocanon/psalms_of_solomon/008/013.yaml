id: PSS.8.13
reference: Psalms of Solomon 8:13
source:
  edition: lxx-swete-1909
  text: ἐπίπουσαν τὸ θυσιαστήριον Κυρίου ἀπὸ πάσης ἀκαθαρσίας καὶ ἐν ἀφέδρῳ αἵματος ἐμίανιν τὰς θυσίας, ὡς κρέα βέβηλα·
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: They trampled the altar of the Lord with every uncleanness, and with menstrual blood they defiled the sacrifices like profane meat;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening Greek form is difficult in the Zone 1 witness. A closely supported reading yields 'They trampled the altar of the Lord.'
    reason: textual_variant
  - marker: b
    text: Or more explicitly, 'with menstrual impurity of blood.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with a bloody discharge'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπίπουσαν
  chosen: trampled
  alternatives:
  - pressed upon
  - assailed
  lexicon: LSJ
  rationale: The transmitted form in Zone 1 is difficult, but the verse’s sense and the closely parallel reading tradition support the idea of violent desecration of the altar. 'Trampled' gives clear English and fits the cultic-pollution context. This uncertainty is preserved in a footnote.
- source_word: θυσιαστήριον Κυρίου
  chosen: the altar of the Lord
  alternatives:
  - the Lord's altar
  lexicon: LSJ
  rationale: Standard cultic rendering. 'Altar' is the natural equivalent for θυσιαστήριον, and κύριος is rendered 'Lord' per project policy.
- source_word: ἀκαθαρσίας
  chosen: uncleanness
  alternatives:
  - impurity
  - defilement
  lexicon: LSJ
  rationale: '''Uncleanness'' preserves the ritual-purity force of the noun more clearly than the more generic ''impurity'' in this temple context.'
- source_word: ἐν ἀφέδρῳ αἵματος
  chosen: with a bloody discharge
  alternatives:
  - with menstrual impurity
  - with a discharge of blood
  lexicon: LSJ
  rationale: The phrase points to blood-related impurity, likely menstrual uncleanness by LXX usage of ἄφεδρος. 'Bloody discharge' preserves the concrete image without over-specifying beyond the Greek; the more explicit alternative is preserved in a footnote.
- source_word: ἐμίανιν
  chosen: they defiled
  alternatives:
  - they polluted
  lexicon: LSJ
  rationale: A standard rendering for μιαίνω in ritual contexts. 'Defiled' best fits sacrificial and sanctuary language in readable modern English.
- source_word: τὰς θυσίας
  chosen: the sacrifices
  alternatives:
  - the sacrificial offerings
  lexicon: LSJ
  rationale: '''Sacrifices'' is direct and sufficiently clear in context.'
- source_word: κρέα βέβηλα
  chosen: profane meat
  alternatives:
  - defiled meat
  - common meat
  lexicon: LSJ
  rationale: βέβηλα contrasts with what is holy or consecrated. 'Profane meat' preserves that sacred/common contrast better than merely 'defiled meat.'
