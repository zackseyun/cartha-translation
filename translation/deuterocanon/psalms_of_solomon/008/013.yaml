  from: with a bloody discharge
  to: with menstrual blood
  rationale: The Greek ἄφεδρος is the technical LXX term for menstrual impurity (translating Hebrew נִדָּה, e.g., Lev 15:19). Translating it as a generic 'bloody discharge' obscures the specific, shocking cultic violation the author is describing. The original audience would hear the exact category of menstrual impurity, which should be explicit in the main text.
