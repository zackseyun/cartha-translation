id: PSS.8.29
reference: Psalms of Solomon 8:29
source:
  edition: lxx-swete-1909
  text: αἰνετὸς Κύριος ὁ κρίνων πᾶσαν τὴν γῆν ἐν δικαιοσύνῃ αὐτοῦ.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: Praised be the Lord, who judges the whole earth in his righteousness. the Lord, who judges the whole earth in his righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in his justice.”
    reason: lexical_alternative
  - marker: b
    text: Or 'Blessed is'.
    reason: previous_rendering
lexical_decisions:
- source_word: αἰνετὸς
  chosen: Blessed is
  alternatives:
  - Praised be
  - Praiseworthy is
  lexicon: LSJ
  rationale: The adjective introduces a doxological blessing formula. “Blessed is” is natural English for this predicative use and preserves the tone of praise better than the more awkward “Praiseworthy is.”
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: This follows the project’s default rendering for κύριος as a title. The article is retained in English because the Greek refers to the Lord as a known, definite figure.
- source_word: ὁ κρίνων
  chosen: who judges
  alternatives:
  - the one who judges
  - who is judging
  lexicon: LSJ
  rationale: The articular present participle is best rendered as a relative clause in smooth English. “Who judges” preserves the participial force without sounding wooden.
- source_word: πᾶσαν τὴν γῆν
  chosen: the whole earth
  alternatives:
  - all the earth
  - the entire land
  lexicon: LSJ
  rationale: In this context γῆ refers most naturally to the earth/world rather than a specific land. “The whole earth” is idiomatic and preserves the universal scope of πᾶσαν.
- source_word: ἐν δικαιοσύνῃ αὐτοῦ
  chosen: in his righteousness
  alternatives:
  - with his righteousness
  - in his justice
  lexicon: LSJ
  rationale: The phrase expresses the manner or sphere of the Lord’s judging. “In his righteousness” follows the project’s default for δικαιοσύνη and preserves the moral-theological nuance; “justice” is a plausible contextual alternative but narrower.
