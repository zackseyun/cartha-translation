id: PSS.8.3
reference: Psalms of Solomon 8:3
source:
  edition: lxx-swete-1909
  text: καὶ εἶπα τῇ καρδίᾳ μου, Ποῦ ἄρα κρινεῖ αὐτὸν ὁ θεός;
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: And I said in my heart, “Where then will God judge him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I said to my heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπα τῇ καρδίᾳ μου
  chosen: I said in my heart
  alternatives:
  - I said to my heart
  - I said to myself
  lexicon: BDAG
  rationale: The Greek is literally 'I said to my heart,' but in English 'I said in
    my heart' best preserves the inward, self-directed sense without sounding unnatural.
    'I said to myself' is possible, but 'heart' retains the source image.
- source_word: Ποῦ ἄρα
  chosen: Where then
  alternatives:
  - Where indeed
  - Where, then
  lexicon: BDAG
  rationale: Ποῦ asks 'where,' and ἄρα adds an inferential or reflective force. 'Where
    then' captures that sense clearly in natural English.
- source_word: κρινεῖ
  chosen: will judge
  alternatives:
  - will condemn
  - will bring to judgment
  lexicon: BDAG
  rationale: The basic sense of κρίνω is 'judge.' Although context may imply punitive
    judgment, the verb itself does not require the stronger gloss 'condemn,' so the
    more transparent rendering is preferred.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - this man
  lexicon: BDAG
  rationale: The pronoun is singular masculine accusative. 'Him' is the direct and
    natural English equivalent.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of the noun with article in this context. No special
    title issue alters the translation.
