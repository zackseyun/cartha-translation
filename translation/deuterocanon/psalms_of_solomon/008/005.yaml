id: PSS.8.5
reference: Psalms of Solomon 8:5
source:
  edition: lxx-swete-1909
  text: συντριβὴ ἡ ὀσφύς μου ἀπὸ ἀκοῆς, παρελύθη γόνατά μου.
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: My loins are crushed from the report; my knees have given way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "at the news" or "from hearing."
    reason: lexical_alternative
  - marker: b
    text: Or "my knees were paralyzed" or "my knees collapsed."
    reason: lexical_alternative
lexical_decisions:
- source_word: συντριβὴ
  chosen: are crushed
  alternatives:
  - are broken
  - are shattered
  - crushing
  lexicon: BDAG
  rationale: The noun denotes crushing or brokenness. In English, a predicate expression
    gives a natural rendering with the implied verbal force in context.
- source_word: ὀσφύς
  chosen: loins
  alternatives:
  - hips
  - lower back
  - waist
  lexicon: BDAG
  rationale: '"Loins" is the most direct and traditional anatomical equivalent and
    preserves the bodily intensity of the lament better than the flatter "hips" or
    interpretive "lower back."'
- source_word: ἀπὸ ἀκοῆς
  chosen: from the report
  alternatives:
  - from what I heard
  - from hearing
  - at the news
  lexicon: BDAG
  rationale: The phrase indicates cause on account of what was heard. "From the report"
    stays close to the Greek while remaining readable; "at the news" is possible but
    slightly freer.
- source_word: παρελύθη
  chosen: have given way
  alternatives:
  - were paralyzed
  - collapsed
  - became weak
  lexicon: BDAG
  rationale: The verb can suggest being disabled, weakened, or collapsing. With knees
    as subject, "have given way" conveys bodily failure in idiomatic English without
    over-specifying paralysis.
- source_word: γόνατά
  chosen: knees
  lexicon: BDAG
  rationale: Direct lexical equivalent.
