id: PSS.8.16
reference: Psalms of Solomon 8:16
source:
  edition: lxx-swete-1909
  text: ἤγαγεν τὸν ἀπʼ ἐσχάτου τῆς γῆς, τὸν παίοντα κραταιῶς,
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: He brought the one from the end of the earth, the one who strikes mightily,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the one from the farthest part of the earth.”
    reason: lexical_alternative
  - marker: b
    text: Or “who strikes forcefully.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγεν
  chosen: He brought
  alternatives:
  - He led
  - He brought in
  lexicon: BDAG
  rationale: Aorist of ἄγω here most naturally introduces someone onto the scene.
    “He brought” is clear, natural English and preserves the causative movement without
    adding more than the Greek states.
- source_word: τὸν ἀπʼ ἐσχάτου τῆς γῆς
  chosen: the one from the end of the earth
  alternatives:
  - the one from the farthest part of the earth
  - the one from earth’s end
  lexicon: BDAG
  rationale: The accusative phrase identifies the figure being brought. “The end of
    the earth” preserves the idiomatic geographic extremity of ἐσχάτου while remaining
    readable.
- source_word: παίοντα
  chosen: who strikes
  alternatives:
  - who smites
  - who beats
  lexicon: BDAG
  rationale: Present participle of παίω denotes striking or smiting. “Who strikes”
    is direct, current English without archaic coloring.
- source_word: κραταιῶς
  chosen: mightily
  alternatives:
  - forcefully
  - violently
  lexicon: LSJ
  rationale: The adverb conveys great strength or force. “Mightily” preserves the
    sense of powerful action and fits the elevated tone of the line.
