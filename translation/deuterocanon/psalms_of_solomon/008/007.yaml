id: PSS.8.7
reference: Psalms of Solomon 8:7
source:
  edition: lxx-swete-1909
  text: εἶπα Κατευθύνουσιν ὁδοὺς αὐτῶν ἐν δικαιοσύνῃ. ἀνελογισάμην τὰ κρίματα τοῦ θεοῦ ἀπὸ κτίσεως οὐρανοῦ καὶ γῆς· ἐδικαίωσα τὸν θεὸν ἐν τοῖς κρίμασιν αὐτοῦ τοῖς ἀπʼ αἰῶνος.
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: I said, “They make their ways straight in righteousness.” I considered the judgments of God from the creation of heaven and earth; I said, “They make their ways straight in righteousness.” I considered the judgments of God from the creation of heaven and earth; I declared God righteous in his judgments from of old. in his judgments from of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “They direct their ways in righteousness.”
    reason: lexical_alternative
  - marker: b
    text: Or “I justified God in his judgments.”
    reason: lexical_alternative
  - marker: c
    text: Or “in his judgments that are from eternity.”
    reason: alternative_reading
  - marker: d
    text: Or 'I vindicated God'.
    reason: previous_rendering
lexical_decisions:
- source_word: Κατευθύνουσιν
  chosen: make ... straight
  alternatives:
  - direct
  - set straight
  lexicon: LSJ
  rationale: The verb carries the sense of making a path straight or directing it rightly. “Make their ways straight” preserves the path imagery more clearly than the flatter “direct their ways.”
- source_word: ὁδοὺς
  chosen: ways
  alternatives:
  - paths
  lexicon: LSJ
  rationale: “Ways” is the natural English equivalent in moral-path imagery and fits the plural object of the verb.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Per project defaults, δικαιοσύνη is rendered “righteousness” unless context strongly favors “justice.” Here the phrase describes moral rectitude in one’s conduct, so “righteousness” fits best.
- source_word: ἀνελογισάμην
  chosen: considered
  alternatives:
  - reflected on
  - reckoned
  lexicon: LSJ
  rationale: The aorist middle indicates thoughtful reckoning or reflection. “Considered” is clear, natural English without losing the deliberative sense.
- source_word: κρίματα
  chosen: judgments
  alternatives:
  - decrees
  - acts of judgment
  lexicon: LSJ
  rationale: “Judgments” best covers both God’s judicial decisions and their execution, which suits the theological tone of the verse.
- source_word: ἐδικαίωσα
  chosen: vindicated
  alternatives:
  - justified
  - declared righteous
  lexicon: LSJ
  rationale: In English, “justified God” can sound awkward or misleading. “Vindicated God” communicates that the speaker acknowledged God to be in the right in his judgments.
- source_word: τοῖς ἀπʼ αἰῶνος
  chosen: from of old
  alternatives:
  - from eternity
  - age-old
  lexicon: LSJ
  rationale: The phrase can denote great antiquity or eternity. “From of old” preserves the elevated tone while avoiding an overly dogmatic metaphysical reading where the phrase may simply mark ancientness.
