theological_decisions:
- issue: How to render ἐδικαίωσα τὸν θεόν
  chosen_reading: I vindicated God
  alternative_readings:
  - I justified God
  - I declared God righteous
  rationale: The statement concerns recognizing God as just in his acts of judgment, not conferring righteousness on God. “Vindicated” communicates the evaluative force idiomatically in English.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.
- issue: Force of τοῖς ἀπʼ αἰῶνος in relation to God’s judgments
  chosen_reading: his judgments from of old
  alternative_readings:
  - his eternal judgments
  rationale: The Greek can suggest either ancient-standing judgments or judgments characterized by eternity. The immediate context of creation language allows either, so the main text preserves a less overdetermined reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
