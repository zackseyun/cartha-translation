theological_decisions:
- issue: Rendering λυτρουμένου
  chosen_reading: to redeem
  alternative_readings:
  - to deliver
  - redeemer
  rationale: The root carries ransom/deliverance-redeemer associations. Because the
    Greek here is participial rather than an explicit title, a verbal rendering best
    preserves the sense without over-theologizing into a formal messianic title.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    alternatives.
revisions:
- timestamp: '2026-04-22T19:10:40Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/phase10_greek_apocrypha/deuterocanon/psalms_of_solomon/008/036.job-73179.json
  category: awkward_english
  tier: 1
  from: lest nations swallow us up, as though there were no one to redeem.
  to: lest the nations swallow us up, as though there were no redeemer.
  rationale: In English, 'nations' without the definite article sounds unnaturally
    generic, whereas ἔθνη in this context refers to the recognized category of foreign
    powers ('the nations' or 'Gentiles'). Furthermore, 'redeem' is transitive and
    sounds incomplete at the end of the clause without an object; rendering the substantive
    participle λυτρουμένου as 'redeemer' (or adding 'us') resolves the awkwardness
    while preserving the verbal force.
