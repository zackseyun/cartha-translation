id: PSS.8.36
reference: Psalms of Solomon 8:36
source:
  edition: lxx-swete-1909
  text: μὴ ὑπερίδῃς ἡμᾶς, ὁ θεὸς ἡμῶν, ἵνα μὴ καταπίωσιν ἡμᾶς ἔθνη, ὡς μὴ ὄντος λυτρουμένου.
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: Do not overlook us, our God, lest the nations swallow us up as though there
    were no one to redeem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as if there were no redeemer' or 'as though no one were delivering.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lest nations swallow us up, as though there were no one to redeem.'.
    reason: previous_rendering
lexical_decisions:
- source_word: μὴ ὑπερίδῃς
  chosen: Do not overlook
  alternatives:
  - Do not disregard
  - Do not ignore
  - Do not despise
  lexicon: LSJ
  rationale: The verb conveys looking past or disregarding. 'Overlook' preserves the
    prayerful force and fits natural modern English without over-paraphrase.
- source_word: ἡμᾶς
  chosen: us
  lexicon: Greek grammar
  rationale: Direct object of both main verbs in the clause sequence; straightforward
    first-person plural rendering.
- source_word: ὁ θεὸς ἡμῶν
  chosen: our God
  alternatives:
  - O our God
  - God of us
  lexicon: Greek grammar
  rationale: Vocative force is clear in context. 'Our God' is natural English and
    preserves the covenantal/prayer address.
- source_word: ἵνα μὴ
  chosen: lest
  alternatives:
  - so that not
  - that ... not
  lexicon: Greek grammar
  rationale: Here the construction expresses feared result. 'Lest' is concise and
    accurate.
- source_word: καταπίωσιν
  chosen: swallow us up
  alternatives:
  - devour us
  - consume us
  lexicon: LSJ
  rationale: The imagery is vivid and metaphorical. 'Swallow us up' preserves the
    concrete force better than the flatter 'consume.'
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: LSJ
  rationale: In this Jewish prayer context the term refers to foreign nations broadly.
    'Nations' is the most transparent default; 'Gentiles' would import later conventional
    phrasing.
- source_word: ὡς μὴ ὄντος λυτρουμένου
  chosen: as though there were no one to redeem
  alternatives:
  - as if there were no redeemer
  - as though no one were delivering
  lexicon: LSJ
  rationale: The participial form suggests the absence of one acting as redeemer/deliverer.
    'No one to redeem' keeps the action verbal and reads smoothly in English, while
    preserving the implicit agent.
