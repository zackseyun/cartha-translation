id: PSS.8.40
reference: Psalms of Solomon 8:40
source:
  edition: lxx-swete-1909
  text: αἰνετὸς Κύριος ἐν τοῖς κρίμασιν αὐτοῦ ἐν στόματι ὁσίων, καὶ εὐλογημένος Ἰσραὴλ ὑπὸ Κυρίου εἰς τὸν αἰῶνα.
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: Praised is the Lord for his judgments on the lips of Praised is the Lord for his judgments on the lips of the pious, and blessed is Israel by the Lord forever., and blessed is Israel by the Lord forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the mouth of the holy ones.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the faithful' for 'the holy ones.'
    reason: lexical_alternative
  - marker: c
    text: Or 'blessed be Israel by the Lord forever.'
    reason: alternative_reading
  - marker: d
    text: Or 'the holy ones'.
    reason: previous_rendering
lexical_decisions:
- source_word: αἰνετὸς
  chosen: Praised is
  alternatives:
  - praiseworthy
  - praised be
  lexicon: BDAG
  rationale: The adjective functions predicatively at the head of a benedictory line. 'Praised is' preserves the declarative force while remaining natural in English; 'praised be' would sound more optative than the Greek requires.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Default project rendering for κύριος as a divine title. The article is natural in English in this clause.
- source_word: κρίμασιν
  chosen: judgments
  alternatives:
  - judicial acts
  - decrees
  lexicon: BDAG
  rationale: '''Judgments'' preserves the semantic range of κρίματα as acts or expressions of divine judgment without over-specifying the form.'
- source_word: ἐν στόματι
  chosen: on the lips of
  alternatives:
  - in the mouth of
  - by the mouth of
  lexicon: BDAG
  rationale: This is an idiomatic expression for spoken praise. 'On the lips of' communicates the sense clearly in modern English while staying close to the Greek image.
- source_word: ὁσίων
  chosen: the holy ones
  alternatives:
  - the faithful
  - the saints
  lexicon: BDAG
  rationale: The term denotes those devoted to God. 'Holy ones' is the most transparent and least tradition-bound choice here; 'saints' would import stronger ecclesiastical associations.
- source_word: εὐλογημένος
  chosen: blessed is
  alternatives:
  - blessed be
  lexicon: BDAG
  rationale: Like αἰνετός, the adjective is best taken predicatively. 'Blessed is' preserves the parallel structure with the first clause.
- source_word: Ἰσραήλ
  chosen: Israel
  lexicon: BDAG
  rationale: Proper name transliterated according to project policy.
- source_word: ὑπὸ Κυρίου
  chosen: by the Lord
  alternatives:
  - from the Lord
  lexicon: BDAG
  rationale: ὑπό with the genitive marks agency here, indicating that the Lord is the one who blesses Israel.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for eternity
  lexicon: BDAG
  rationale: The phrase idiomatically expresses enduring continuance. 'Forever' is the clearest natural English equivalent.
