id: PSS.8.27
reference: Psalms of Solomon 8:27
source:
  edition: lxx-swete-1909
  text: ἐδικαίωθη ὁ θεὸς ἐν τοῖς κρίμασιν αὐτοῦ ἐν τοῖς ἔθνεσι τῆς γῆς,
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: God was vindicated in his judgments among the nations of the earth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God was justified in his judgments among the nations of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδικαίωθη
  chosen: was vindicated
  alternatives:
  - was justified
  - was shown to be righteous
  lexicon: BDAG
  rationale: The passive of δικαιόω here most naturally means that God was shown or
    proved to be in the right by what he did. 'Vindicated' communicates public demonstration
    more clearly in modern English than 'justified,' which can sound technical or
    misleading.
- source_word: κρίμασιν
  chosen: judgments
  alternatives:
  - decrees
  - acts of judgment
  lexicon: BDAG
  rationale: κρίμα commonly denotes judicial decisions or judgments. 'Judgments' preserves
    the legal-moral sense and fits the context of God being shown right through his
    acts of judgment.
- source_word: ἔθνεσι
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: BDAG
  rationale: In this context the reference is to the peoples/nations of the earth
    broadly, not specifically to 'Gentiles' over against Jews. 'Nations' is the most
    natural and consistent rendering.
- source_word: τῆς γῆς
  chosen: of the earth
  alternatives:
  - of the land
  lexicon: BDAG
  rationale: 'Although γῆ can mean either ''land'' or ''earth,'' the phrase with ''nations''
    is best taken universally here: ''the nations of the earth.'''
