theological_decisions:
- issue: Whether δικαιόω applied to God should be rendered with the traditional 'justified'
    or with a clearer modern equivalent
  chosen_reading: was vindicated
  alternative_readings:
  - was justified
  - was shown to be righteous
  rationale: The verse does not suggest that God becomes righteous, but that his righteousness
    is publicly demonstrated through his judgments. 'Vindicated' preserves that theological
    sense without importing later technical justification language.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
