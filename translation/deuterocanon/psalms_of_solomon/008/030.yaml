theological_decisions:
- issue: Rendering δικαιοσύνη in a divine-judgment context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: DOCTRINE.md gives 'righteousness' as the default for δικαιοσύνη, while
    recognizing 'justice' as a viable contextual alternative. Here the phrase can
    bear both moral and judicial nuance, so the default is kept in the main text and
    the alternative is footnoted rather than collapsing the tension.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (δικαιοσύνη → righteousness;
