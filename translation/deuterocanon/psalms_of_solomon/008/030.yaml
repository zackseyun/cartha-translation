id: PSS.8.30
reference: Psalms of Solomon 8:30
source:
  edition: lxx-swete-1909
  text: ἰδοὺ δή, ὁ θεός, ἔδειξας ἡμῖν τὸ κρῖμά σου ἐν τῇ δικαιοσύνῃ σου,
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: Behold now, O God, you have shown us your judgment in your righteousness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ δή
  chosen: Behold now
  alternatives:
  - Look now
  - See now
  - Indeed
  lexicon: BDAG
  rationale: The combination is an emphatic discourse marker drawing attention to
    what follows. 'Behold now' preserves the heightened, prayer-like force better
    than a flatter 'indeed,' while remaining closer to the Greek than a freer paraphrase.
- source_word: ὁ θεός
  chosen: O God
  alternatives:
  - God
  lexicon: BDAG
  rationale: With direct address in context, 'O God' best reflects the vocative force
    in natural English prayer language.
- source_word: ἔδειξας
  chosen: you have shown
  alternatives:
  - you showed
  - you revealed
  lexicon: BDAG
  rationale: The aorist is rendered with English present perfect for natural prayerful
    testimony to a completed act with present relevance. 'Shown' is more direct and
    less interpretive than 'revealed.'
- source_word: τὸ κρῖμά σου
  chosen: your judgment
  alternatives:
  - your decree
  - your sentence
  - your justice
  lexicon: BDAG
  rationale: κρῖμα here most naturally denotes God's judicial act or verdict. 'Judgment'
    preserves that forensic weight without narrowing it to a specific legal sentence.
- source_word: ἐν τῇ δικαιοσύνῃ σου
  chosen: in your righteousness
  alternatives:
  - by your righteousness
  - in your justice
  lexicon: BDAG
  rationale: The phrase most straightforwardly expresses the sphere or manner of God's
    action. Following project defaults, δικαιοσύνη is rendered 'righteousness'; 'justice'
    remains possible and is preserved as an alternative.
