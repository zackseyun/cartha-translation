id: PSS.8.1
reference: Psalms of Solomon 8:1
source:
  edition: lxx-swete-1909
  text: Θλίψιν καὶ φωνὴν πολέμου ἤκουσεν τὸ οὖς μου, φωνὴν σάλπιγγος ἠχούσης σφαγὴν
    καὶ ὄλεθρον·
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: My ear heard distress and the sound of war, the sound of a trumpet sounding
    slaughter and destruction;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “affliction” for “distress.”
    reason: lexical_alternative
  - marker: b
    text: Literally “my ear heard,” preserving the bodily image of hearing.
    reason: lexical_alternative
  - marker: c
    text: Or 'the sound of a trumpet sounding'.
    reason: previous_rendering
lexical_decisions:
- source_word: Θλίψιν
  chosen: distress
  alternatives:
  - affliction
  - tribulation
  - trouble
  lexicon: BDAG
  rationale: The noun denotes severe trouble or pressure. “Distress” is natural English
    and preserves the verse’s immediate auditory shock without importing later theological
    overtones that “tribulation” may carry.
- source_word: φωνὴν
  chosen: the sound of
  alternatives:
  - voice of
  - noise of
  lexicon: BDAG
  rationale: In this context the repeated accusative with verbs of hearing points
    to audible phenomena rather than a speaking voice. “The sound of” best fits war
    and trumpet imagery in idiomatic English.
- source_word: πολέμου
  chosen: war
  alternatives:
  - battle
  lexicon: BDAG
  rationale: The broader term “war” matches the Greek most directly and suits the
    escalating sequence of military sounds.
- source_word: τὸ οὖς μου
  chosen: my ear
  alternatives:
  - I
  - my hearing
  lexicon: BDAG
  rationale: The singular bodily expression is retained for vividness. English can
    naturally say “My ear heard,” preserving the concrete sensory framing of the Greek.
- source_word: σάλπιγγος
  chosen: trumpet
  alternatives:
  - bugle
  - ram's horn
  lexicon: BDAG
  rationale: “Trumpet” is the standard and sufficiently broad rendering for the military
    signal instrument indicated here.
- source_word: ἠχούσης
  chosen: sounding
  alternatives:
  - blaring
  - resounding
  lexicon: BDAG
  rationale: The participle describes the trumpet as making sound. “Sounding” is straightforward,
    accurate, and avoids over-interpretive vividness.
- source_word: σφαγὴν
  chosen: slaughter
  alternatives:
  - slaying
  - carnage
  lexicon: BDAG
  rationale: The term suggests violent killing. “Slaughter” preserves that severity
    better than the milder “slaying,” while avoiding the added rhetorical color of
    “carnage.”
- source_word: ὄλεθρον
  chosen: destruction
  alternatives:
  - ruin
  - devastation
  lexicon: BDAG
  rationale: “Destruction” is a direct and weighty equivalent that pairs well with
    “slaughter” and reflects the broad sense of catastrophic undoing.
