theological_decisions:
- issue: How to render ἐδικαιώσαμεν with God's name as its object
  chosen_reading: Render it as 'have vindicated' rather than the more wooden 'have
    justified.'
  alternative_readings:
  - have justified your honored name
  - have declared your honored name righteous
  rationale: The text speaks of humans responding to God's revealed judgments. 'Vindicated'
    best conveys that they publicly acknowledge the justice and honor of God's name,
    without implying that humans somehow make God righteous.
