id: PSS.8.31
reference: Psalms of Solomon 8:31
source:
  edition: lxx-swete-1909
  text: ἔδοσαν οἱ ὀφθαλμοὶ ἡμῶν τὰ κρίματά σου, ὁ θεός. ἐδικαιώσαμεν τὸ ὄνομά σου
    τὸ ἔντιμον εἰς αἰῶνας,
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: Our eyes have seen your judgments, O God; we have justified your honored name
    forever,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek is difficult here: literally, ''our eyes gave your judgments.''
      The translation follows the apparent sense from the context: ''Our eyes have
      seen your judgments.'''
    reason: textual_variant
  - marker: b
    text: Or 'your honorable name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδοσαν
  chosen: have seen
  alternatives:
  - gave
  - have acknowledged
  - beheld
  lexicon: LSJ
  rationale: 'The transmitted verb is from δίδωμι, literally ''gave,'' but with ''our
    eyes'' as subject and ''your judgments'' as object the Greek is difficult. In
    the immediate context (v. 30: God ''showed'' his judgment), a perception sense
    best fits the line. ''Have seen'' gives the most plausible sense in clear English
    while the textual difficulty is preserved in a footnote.'
- source_word: τὰ κρίματά σου
  chosen: your judgments
  alternatives:
  - your judicial acts
  - your verdicts
  lexicon: LSJ
  rationale: κρίματα here refers to God's acts of judgment or judicial decisions.
    'Judgments' is the most direct and biblically natural rendering, and it matches
    the nearby context.
- source_word: ἐδικαιώσαμεν
  chosen: have vindicated
  alternatives:
  - have justified
  - have declared righteous
  lexicon: LSJ
  rationale: A literal 'justified' is possible, but in English that can suggest conferring
    righteousness. In context the sense is that the speakers have acknowledged and
    upheld the rightness of God's name, so 'have vindicated' communicates that more
    clearly.
- source_word: τὸ ὄνομά σου τὸ ἔντιμον
  chosen: your honored name
  alternatives:
  - your honorable name
  - your precious name
  lexicon: LSJ
  rationale: ἔντιμος denotes what is held in honor or esteem. 'Honored' is natural
    modern English and preserves the reverential force.
- source_word: εἰς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: LSJ
  rationale: The phrase expresses enduring duration. 'Forever' is the clearest idiomatic
    English equivalent here.
