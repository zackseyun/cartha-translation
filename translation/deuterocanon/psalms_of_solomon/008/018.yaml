id: PSS.8.18
reference: Psalms of Solomon 8:18
source:
  edition: lxx-swete-1909
  text: ἠπάντησαν αὐτῷ οἱ ἄρχοντες τῆς γῆς μετὰ χαρᾶς, εἶπαν αὐτῷ Εὐκτὴ ἡ ὁδός σου·
    δεῦτε εἰσέλθατε μετʼ εἰρήνης,
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: The rulers of the land met him with joy; they said to him, “Prosperous is
    your way. Come, enter in peace,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Blessed is your way” or “Welcome is your way/path.”
    reason: lexical_alternative
  - marker: b
    text: “Of the land” may also be understood more broadly as “of the earth,” but
      the local-political sense fits the context better.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠπάντησαν
  chosen: met
  alternatives:
  - went out to meet
  - greeted
  lexicon: LSJ
  rationale: The verb denotes meeting or encountering someone, often by going out
    to receive them. “Met” is natural English and fits the welcoming scene without
    over-translating.
- source_word: οἱ ἄρχοντες
  chosen: the rulers
  alternatives:
  - the leaders
  - the princes
  lexicon: LSJ
  rationale: ἄρχοντες refers to governing authorities or leading figures. “Rulers”
    best preserves the political and social force here.
- source_word: τῆς γῆς
  chosen: of the land
  alternatives:
  - of the earth
  - of the country
  lexicon: LSJ
  rationale: In this context γῆ likely refers to a land or region rather than the
    whole world. “Of the land” is the most contextually fitting and idiomatic choice.
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - rejoicing
  - gladly
  lexicon: LSJ
  rationale: The phrase straightforwardly expresses joyful manner. “With joy” is clear
    and close to the Greek form.
- source_word: Εὐκτὴ
  chosen: Prosperous
  alternatives:
  - Blessed
  - Welcome
  - Good
  lexicon: LSJ
  rationale: The adjective conveys something wished for, welcome, or favorable. Given
    its predication over ‘your way,’ “Prosperous” best captures a favorable, felicitous
    journey or course, while avoiding a stronger religious formula not explicit in
    the Greek.
- source_word: ἡ ὁδός σου
  chosen: your way
  alternatives:
  - your journey
  - your path
  lexicon: LSJ
  rationale: ὁδός can mean road, journey, or way. “Your way” preserves the lexical
    breadth and can refer both to the route and the undertaking.
- source_word: δεῦτε
  chosen: Come
  alternatives:
  - Come now
  - Well then, come
  lexicon: LSJ
  rationale: δεῦτε is an invitational imperative. “Come” is concise and natural in
    English dialogue.
- source_word: εἰσέλθατε
  chosen: enter
  alternatives:
  - go in
  - come in
  lexicon: LSJ
  rationale: The imperative means to enter or go in. “Enter” preserves the formality
    of the welcome.
- source_word: μετʼ εἰρήνης
  chosen: in peace
  alternatives:
  - with peace
  - peacefully
  lexicon: LSJ
  rationale: This expression commonly conveys peaceful reception or safe entrance.
    “In peace” is the closest idiomatic rendering.
