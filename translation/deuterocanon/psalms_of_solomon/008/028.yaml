id: PSS.8.28
reference: Psalms of Solomon 8:28
source:
  edition: lxx-swete-1909
  text: καὶ οἱ ὅσιοι τοῦ θεοῦ ὡς ἀρνία ἐν ἀκακίᾳ ἐν μέσῳ αὐτῶν.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: And the faithful ones of God were like lambs in innocence in their midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the devout ones of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like lambs in innocence among them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'holy ones'.
    reason: previous_rendering
  - marker: d
    text: Or 'are like lambs, innocent'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅσιοι
  chosen: holy ones
  alternatives:
  - devout ones
  - faithful ones
  - saints
  lexicon: BDAG
  rationale: The term denotes those marked by piety and consecrated loyalty to God. 'Holy ones' preserves the covenantal/religious force without importing later ecclesiastical overtones as strongly as 'saints.'
- source_word: ἀρνία
  chosen: lambs
  alternatives:
  - little lambs
  - sheep
  lexicon: LSJ
  rationale: The Greek specifically names lambs, not sheep in general. 'Lambs' preserves the image of vulnerability and innocence.
- source_word: ἀκακίᾳ
  chosen: innocent
  alternatives:
  - in innocence
  - guileless
  - blameless
  lexicon: BDAG
  rationale: The noun denotes innocence or guilelessness. Rendering it adjectivally as 'innocent' makes natural English while preserving the moral sense of the Greek.
- source_word: ἐν μέσῳ αὐτῶν
  chosen: in their midst
  alternatives:
  - among them
  - in the midst of them
  lexicon: BDAG
  rationale: This phrase is spatially straightforward. 'In their midst' preserves the image and leaves the antecedent of 'them' as broad as the Greek does.
