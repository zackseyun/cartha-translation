  from: are like lambs, innocent
  to: were like lambs in innocence
  rationale: 'The Greek lacks a verb, but the preceding verse uses the aorist (ἐδικαίωθη, ''was vindicated''). Supplying the past tense ''were'' better connects this verse to the historical narrative of the invasion. Additionally, translating the prepositional phrase ἐν ἀκακίᾳ literally as ''in innocence'' preserves the likely Hebrew substrate (e.g., bə-tummāh) better than flattening it into an adjective. | Adjudicator: The reviewer is correct that the surrounding context (e.g., ἐδικαιώθη in the preceding verse) establishes a past-tense narrative frame for this verbless clause, making ''were'' more accurate than ''are.'''
