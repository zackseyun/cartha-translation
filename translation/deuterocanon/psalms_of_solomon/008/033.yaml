id: PSS.8.33
reference: Psalms of Solomon 8:33
source:
  edition: lxx-swete-1909
  text: ἐπίστρεψον, ὁ θεός, τὸ ἔλεός σου ἐφʼ ἡμᾶς καὶ οἰκτείρησον ἡμᾶς·
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: Turn your mercy toward us, O God, and have compassion on us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Turn your mercy upon us.'
    reason: lexical_alternative
  - marker: b
    text: Or 'pity us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίστρεψον
  chosen: Turn
  alternatives:
  - Turn back
  - Direct
  lexicon: BDAG
  rationale: The imperative calls on God to direct or turn something toward the speakers.
    'Turn' preserves the verbal image of the Greek while remaining natural in English
    when followed by 'your mercy toward us.'
- source_word: ἔλεός
  chosen: mercy
  alternatives:
  - steadfast mercy
  - kindness
  lexicon: BDAG
  rationale: ἔλεος commonly denotes mercy or compassionate favor. 'Mercy' is the clearest
    and most direct English equivalent here, fitting the prayerful plea for divine
    compassion.
- source_word: ἐφʼ ἡμᾶς
  chosen: toward us
  alternatives:
  - upon us
  - to us
  lexicon: BDAG
  rationale: The preposition with the accusative marks direction toward the petitioners.
    'Toward us' is slightly more idiomatic in modern English than 'upon us' while
    preserving the sense of movement toward them.
- source_word: οἰκτείρησον
  chosen: have compassion on
  alternatives:
  - pity
  - show mercy to
  lexicon: BDAG
  rationale: The verb expresses compassionate pity. 'Have compassion on' is natural,
    reverent English and avoids flattening the sense into a mere repetition of 'mercy,'
    even though the two ideas are closely related.
