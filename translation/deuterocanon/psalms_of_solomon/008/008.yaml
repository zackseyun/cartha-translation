theological_decisions:
- issue: Rendering δίκαια with reference to God's κρίματα
  chosen_reading: righteous judgments
  alternative_readings:
  - just judgments
  rationale: This is not a major doctrinally contested term under the project table,
    but the phrase can lean either moral or judicial in English. “Righteous judgments”
    preserves both divine rectitude and biblical diction, while “just judgments” remains
    a strong alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
