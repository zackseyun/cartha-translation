id: PSS.8.8
reference: Psalms of Solomon 8:8
source:
  edition: lxx-swete-1909
  text: ἀνεκάλυψεν ὁ θεὸς τὰς ἁμαρτίας αὐτῶν ἐναντίον τοῦ ἡλίου· ἔγνω πᾶσα ἡ γῆ τὰ
    κρίματα τοῦ θεοῦ τὰ δίκαια.
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: God exposed their sins before the sun; all the earth came to know the righteous
    judgments of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “just judgments.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεκάλυψεν
  chosen: exposed
  alternatives:
  - uncovered
  - revealed
  - laid bare
  lexicon: BDAG
  rationale: The verb denotes making something hidden visible. “Exposed” fits the
    public-shame context well and is natural English; “revealed” is possible but slightly
    less vivid.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - offenses
  lexicon: BDAG
  rationale: Standard and transparent rendering for ἁμαρτία; no contextual reason
    to soften it.
- source_word: ἐναντίον τοῦ ἡλίου
  chosen: before the sun
  alternatives:
  - in the sight of the sun
  - under the sun
  lexicon: BDAG
  rationale: A literal rendering preserves the image of open, public exposure. “Under
    the sun” would shift toward an idiomatic sense not required by this Greek phrasing.
- source_word: ἔγνω
  chosen: came to know
  alternatives:
  - knew
  - recognized
  - learned
  lexicon: BDAG
  rationale: The aorist can be rendered simply “knew,” but “came to know” better expresses
    the resulting recognition triggered by God’s public act.
- source_word: πᾶσα ἡ γῆ
  chosen: all the earth
  alternatives:
  - the whole earth
  - all the land
  lexicon: BDAG
  rationale: “Earth” best matches the broad scope of universal recognition here; “land”
    would sound too localized.
- source_word: κρίματα
  chosen: judgments
  alternatives:
  - judicial acts
  - decrees
  lexicon: BDAG
  rationale: “Judgments” is the most direct and biblically coherent rendering for
    κρίματα in a context of divine justice.
- source_word: δίκαια
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: BDAG
  rationale: Both “righteous” and “just” are viable. “Righteous” preserves the moral
    quality of God’s judgments, while “just” is preserved as a footnote alternative.
