id: PSS.8.37
reference: Psalms of Solomon 8:37
source:
  edition: lxx-swete-1909
  text: καὶ σὺ ὁ θεὸς ἡμῶν ἀπʼ ἀρχῆς, καὶ ἐπὶ σὲ ἡ ἐλπὶς ἡμῶν, Κύριε·
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: And you are our God from the beginning, and on you is our hope, O Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And you, O our God, are from the beginning'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀπʼ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from of old
  - from the first
  lexicon: BDAG
  rationale: The phrase naturally denotes primordial or longstanding existence. 'From the beginning' is the most transparent and idiomatic English rendering while preserving the temporal force.
- source_word: ἐλπὶς
  chosen: hope
  alternatives:
  - expectation
  - confidence
  lexicon: BDAG
  rationale: '''Hope'' is the standard and most natural rendering here, expressing trustful expectation directed toward God.'
- source_word: ἐπὶ σέ
  chosen: on you
  alternatives:
  - in you
  - upon you
  lexicon: BDAG
  rationale: The preposition with the accusative here supports the sense of hope being set upon God. 'On you' preserves the Greek image closely and reads well in English.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord.' Here it functions as a vocative address to God.
- source_word: ὁ θεὸς ἡμῶν
  chosen: our God
  alternatives:
  - O our God
  lexicon: BDAG
  rationale: 'The possessive construction is straightforwardly ''our God.'' The vocative force is supplied in English by word order and punctuation: ''And you, O our God...'''
- source_word: καὶ σὺ
  chosen: And you
  alternatives:
  - But you
  - And as for you
  lexicon: BDAG
  rationale: The connective and pronoun together create an emphatic transition. 'And you' preserves both the linkage and the emphasis without overinterpreting contrast.
