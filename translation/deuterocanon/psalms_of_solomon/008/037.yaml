theological_decisions:
- issue: Addressing both θεὸς and Κύριε in the same clause
  chosen_reading: Render both distinctly as 'our God' and 'Lord' in direct address.
  alternative_readings:
  - Conflate the addresses into a single smoother English invocation
  rationale: The Greek explicitly preserves both forms of address. Keeping both maintains the prayerful and liturgical force of the line without collapsing titles.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
