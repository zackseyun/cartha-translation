id: PSS.8.2
reference: Psalms of Solomon 8:2
source:
  edition: lxx-swete-1909
  text: φωνὴ λαοῦ πολλοῦ ὡς ἀνέμου πολλοῦ σφόδρα, ὡς καταιγὶς πυρὸς πολλοῦ φερομένου
    διʼ ἐρήμου.
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: The sound of a great multitude was like a very strong wind, like a storm of
    great fire sweeping through the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the voice of many people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like a storm of much fire being driven through the wilderness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the sound of a great multitude, like a very strong wind, like a storm
      of great fire sweeping through the wilderness.'.
    reason: previous_rendering
lexical_decisions:
- source_word: φωνὴ
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: LSJ
  rationale: In this simile chain, the term refers to the audible effect of the crowd
    rather than a single spoken utterance, so 'sound' is the most natural English
    rendering while staying close to the Greek.
- source_word: λαοῦ πολλοῦ
  chosen: of a great multitude
  alternatives:
  - of many people
  - of a great people
  - of a large crowd
  lexicon: LSJ
  rationale: λαός can mean 'people' collectively, but here the emphasis is on the
    massed number producing the sound. 'Great multitude' captures both the collective
    sense and the scale implied by πολλοῦ.
- source_word: ἀνέμου πολλοῦ σφόδρα
  chosen: a very strong wind
  alternatives:
  - a very great wind
  - an exceedingly mighty wind
  lexicon: LSJ
  rationale: The phrase intensifies the image with both πολλοῦ and σφόδρα. 'Very strong
    wind' is idiomatic English that preserves the force of the double intensification.
- source_word: καταιγὶς
  chosen: storm
  alternatives:
  - tempest
  - squall
  lexicon: LSJ
  rationale: '''Storm'' is the clearest modern equivalent. ''Tempest'' is possible
    but sounds more literary than the translation philosophy prefers.'
- source_word: πυρὸς πολλοῦ
  chosen: of great fire
  alternatives:
  - of much fire
  - of a great blaze
  - of raging fire
  lexicon: LSJ
  rationale: The Greek is literally 'of much fire.' 'Of great fire' keeps the image
    vivid and weighty without over-paraphrasing.
- source_word: φερομένου διʼ ἐρήμου
  chosen: sweeping through the wilderness
  alternatives:
  - being driven through the wilderness
  - carried through the desert
  lexicon: LSJ
  rationale: φερομένου suggests movement driven onward. 'Sweeping through' conveys
    that force naturally in English, and 'wilderness' fits ἔρημος well in biblical
    style.
