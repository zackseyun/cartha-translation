  from: He judged war
  to: He decreed war
  rationale: In English, to 'judge war' means to evaluate it (e.g., as a critic or tribunal), not to initiate or pronounce it. The Greek 'κρίνω' here carries the sense of deciding, determining, or decreeing (BDAG κρίνω 4.b). 'Decreed' accurately captures the authoritative, judicial force of the decision without creating a misleading English phrase.
