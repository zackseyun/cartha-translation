id: PSS.8.17
reference: Psalms of Solomon 8:17
source:
  edition: lxx-swete-1909
  text: ἔκρινεν τὸν πόλεμον ἐπὶ Ἰερουσαλὴμ καὶ τὴν γῆν αὐτῆς.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: He decreed war against Jerusalem and her land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He decreed war against Jerusalem and her territory.'
    reason: lexical_alternative
  - marker: b
    text: Or 'He judged war'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔκρινεν
  chosen: judged
  alternatives:
  - decreed
  - brought
  - executed judgment on
  lexicon: BDAG
  rationale: The aorist of κρίνω most plainly means 'judged' or 'decided.' Here it likely carries the sense of pronouncing or determining war against Jerusalem. 'Judged' preserves the verbal link to judicial decision without overparaphrasing into a more interpretive military verb.
- source_word: τὸν πόλεμον
  chosen: war
  alternatives:
  - battle
  - conflict
  lexicon: BDAG
  rationale: πόλεμος normally denotes war rather than a single battle. 'War' best reflects the lexical sense and the gravity of the action.
- source_word: ἐπὶ
  chosen: against
  alternatives:
  - upon
  - concerning
  lexicon: BDAG
  rationale: With πόλεμον and an object of attack, ἐπί naturally conveys hostile direction. 'Against' is the clearest idiomatic English rendering.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: γῆν
  chosen: land
  alternatives:
  - country
  - territory
  lexicon: BDAG
  rationale: γῆ can mean land, earth, or territory. In relation to Jerusalem, 'land' is broad enough to include its surrounding territory without forcing a technical political sense.
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  lexicon: BDAG
  rationale: The feminine pronoun agrees with the grammatically feminine Ἰερουσαλήμ as construed here. 'Her' preserves the personalizing force often used of cities in biblical style better than the flatter 'its'.
