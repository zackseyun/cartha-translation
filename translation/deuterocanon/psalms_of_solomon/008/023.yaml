id: PSS.8.23
reference: Psalms of Solomon 8:23
source:
  edition: lxx-swete-1909
  text: ἀπώλεσεν ἄρχοντας αὐτῶν καὶ πᾶν σοφὸν ἐν βουλῇ, ἐξέχεεν τὸ αἷμα τῶν οἰκούντων
    Ἰερουσαλὴμ ὡς ὕδωρ ἀκαθαρσίας.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: He destroyed their rulers and everyone wise in counsel; he poured out the
    blood of those dwelling in Jerusalem like unclean water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every wise counselor' / 'all who were wise in counsel.' The Greek phrase
      is compressed and collective.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'like water of uncleanness' or 'like water of impurity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπώλεσεν
  chosen: destroyed
  alternatives:
  - ruined
  - killed
  lexicon: LSJ
  rationale: The verb denotes bringing to destruction; 'destroyed' preserves the broad
    force without narrowing it only to execution, even though bloodshed is mentioned
    in the next clause.
- source_word: ἄρχοντας
  chosen: rulers
  alternatives:
  - leaders
  - princes
  lexicon: LSJ
  rationale: The term refers to those exercising authority. 'Rulers' is natural modern
    English and keeps the political sense.
- source_word: πᾶν σοφὸν ἐν βουλῇ
  chosen: everyone wise in counsel
  alternatives:
  - every wise counselor
  - all who were wise in counsel
  lexicon: LSJ
  rationale: The phrase is compressed Greek. The rendering treats it as a collective
    reference to persons marked by wisdom in deliberation, while staying close to
    the wording.
- source_word: ἐξέχεεν
  chosen: poured out
  alternatives:
  - shed
  - spilled
  lexicon: LSJ
  rationale: The concrete image is important. 'Poured out' preserves the vividness
    of the Greek; 'shed' would be smoother but slightly less graphic.
- source_word: τῶν οἰκούντων Ἰερουσαλήμ
  chosen: those dwelling in Jerusalem
  alternatives:
  - the inhabitants of Jerusalem
  lexicon: LSJ
  rationale: This keeps the participial force of οἰκούντων while remaining readable
    English.
- source_word: ὡς ὕδωρ ἀκαθαρσίας
  chosen: like unclean water
  alternatives:
  - like filthy water
  - like water of impurity
  lexicon: LSJ
  rationale: The genitive ἀκαθαρσίας conveys impurity/uncleanness. 'Unclean water'
    is idiomatic English that preserves the image without over-paraphrasing.
