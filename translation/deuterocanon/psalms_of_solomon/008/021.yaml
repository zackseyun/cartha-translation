id: PSS.8.21
reference: Psalms of Solomon 8:21
source:
  edition: lxx-swete-1909
  text: κατελάβετο τὰς πυργοβάρεις αὐτῆς καὶ τὸ τεῖχος Ἰερουσαλήμ,
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: He captured her bastions and the wall of Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The rare Greek word rendered 'bastions' may also be understood as 'citadels,'
      'fortified towers,' or 'ramparts.'
    reason: lexical_alternative
  - marker: b
    text: '''Her'' refers to Jerusalem, which is treated as a feminine city figure
      in the surrounding poetic style.'
    reason: cultural_note
lexical_decisions:
- source_word: κατελάβετο
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: LSJ
  rationale: In this military setting, the verb conveys taking control of fortified
    structures. 'Captured' gives the conquest sense clearly in natural English.
- source_word: τὰς πυργοβάρεις
  chosen: bastions
  alternatives:
  - citadels
  - fortified towers
  - ramparts
  lexicon: Suda; LSJ
  rationale: This rare term is best taken of defensive fortifications. Ancient gloss
    tradition identifies it with προμαχῶνες ('bastions/outworks'), which fits the
    immediate pairing with 'the wall of Jerusalem.'
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - its
  - Jerusalem's
  lexicon: LSJ
  rationale: The feminine pronoun naturally refers to Jerusalem as a personified city.
    'Her' preserves that biblical-city imagery better than the flatter 'its.'
- source_word: τὸ τεῖχος Ἰερουσαλήμ
  chosen: the wall of Jerusalem
  alternatives:
  - Jerusalem's wall
  lexicon: LSJ
  rationale: A close rendering preserves the singular collective sense of the Greek
    and keeps the city's name explicit.
