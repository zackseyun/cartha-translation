id: PSS.8.39
reference: Psalms of Solomon 8:39
source:
  edition: lxx-swete-1909
  text: ἡμῖν καὶ τοῖς τέκνοις ἡμῶν ἡ εὐδοκία εἰς τὸν αἰῶνα· Κύριε σωτὴρ ἡμῶν, οὐ σαλευθησόμεθα
    ἔτι τὸν αἰῶνα χρόνον.
  language: Greek
  pages:
  - 799
  validation: swete_direct
translation:
  text: For us and our children is favor forever; Lord, our Savior, we shall never
    again be shaken for all time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'goodwill' or 'good pleasure' for εὐδοκία.
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''we shall not be shaken any longer for all time,'' an emphatic
      statement of enduring stability.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδοκία
  chosen: favor
  alternatives:
  - good pleasure
  - goodwill
  lexicon: BDAG
  rationale: εὐδοκία here names divine approval or benevolent favor granted to the
    speaker's community. 'Favor' is natural English and fits the covenantal-prayer
    setting better than the more wooden 'good pleasure.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: The vocative of κύριος is best rendered 'Lord' per project policy for
    this title, especially in direct address to God.
- source_word: σωτήρ
  chosen: Savior
  alternatives:
  - deliverer
  lexicon: BDAG
  rationale: σωτήρ denotes one who saves or delivers. 'Savior' preserves the title-like
    force of the vocative phrase 'Lord, our Savior.'
- source_word: σαλευθησόμεθα
  chosen: be shaken
  alternatives:
  - be moved
  - be disturbed
  lexicon: BDAG
  rationale: The future passive conveys being destabilized or shaken. 'Be shaken'
    is both transparent to the Greek and idiomatic in English.
- source_word: τὸν αἰῶνα χρόνον
  chosen: for all time
  alternatives:
  - forever
  - for the age
  lexicon: LSJ
  rationale: The doubled temporal expression intensifies duration. 'For all time'
    preserves the emphatic everlasting sense without sounding overly archaic.
- source_word: ἡμῖν καὶ τοῖς τέκνοις ἡμῶν
  chosen: For us and our children
  alternatives:
  - To us and to our children
  - For us and for our sons/children
  lexicon: BDAG
  rationale: τέκνα is inclusive 'children,' not specifically 'sons.' 'For us and our
    children' preserves the dative beneficiaries in natural English.
