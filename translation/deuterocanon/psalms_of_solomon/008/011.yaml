id: PSS.8.11
reference: Psalms of Solomon 8:11
source:
  edition: lxx-swete-1909
  text: ἐμοιχῶντο ἕκαστος τὴν γυναῖκα τοῦ πλησίον αὐτοῦ· συνέθεντο αὐτοῖς συνθήκας
    μετὰ ὅρκου περὶ τούτων.
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: Each one was committing adultery with his neighbor’s wife; they made covenants
    with one another under oath about these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they made agreements with them by oath concerning these things.' The
      dative αὐτοῖς can be taken more literally as 'with them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμοιχῶντο
  chosen: was committing adultery
  alternatives:
  - committed adultery
  - was adulterating
  lexicon: BDAG
  rationale: The verb means to commit adultery. The imperfect is reflected with 'was
    committing' to preserve the ongoing or repeated force in the Greek accusation.
- source_word: ἕκαστος
  chosen: Each one
  alternatives:
  - each
  - every one
  lexicon: BDAG
  rationale: 'The distributive singular is best carried into English explicitly: the
    charge applies individually across the group, not merely collectively.'
- source_word: τὴν γυναῖκα τοῦ πλησίον αὐτοῦ
  chosen: his neighbor’s wife
  alternatives:
  - the wife of his neighbor
  lexicon: BDAG
  rationale: This is the natural English rendering of the genitive phrase and preserves
    the adultery context clearly.
- source_word: συνέθεντο
  chosen: made
  alternatives:
  - arranged
  - entered into
  lexicon: BDAG
  rationale: In context with συνθήκας, the verb denotes making or entering into an
    agreement. 'Made' is idiomatic and transparent.
- source_word: συνθήκας
  chosen: agreements
  alternatives:
  - covenants
  - pacts
  lexicon: BDAG
  rationale: The noun can mean covenants or agreements. 'Agreements' fits the immediate
    context of conspiratorial arrangements without importing heavier covenantal resonance
    than the verse itself requires.
- source_word: αὐτοῖς
  chosen: with one another
  alternatives:
  - with them
  - for themselves
  lexicon: BDAG
  rationale: The dative pronoun is somewhat compressed in Greek. In this context,
    'with one another' best brings out the sense of mutual arrangements among the
    offenders; the more literal 'with them' is possible but less clear in English.
- source_word: μετὰ ὅρκου
  chosen: under oath
  alternatives:
  - with an oath
  - by oath
  lexicon: BDAG
  rationale: This idiomatic English phrase preserves the solemnizing force of the
    Greek while reading naturally.
- source_word: περὶ τούτων
  chosen: about these things
  alternatives:
  - concerning these matters
  - regarding this
  lexicon: BDAG
  rationale: The phrase points back to the adulterous acts just mentioned. 'About
    these things' is a close and readable rendering.
