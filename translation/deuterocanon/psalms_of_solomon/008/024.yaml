theological_decisions:
- issue: Moral-religious force of ἐν βεβηλώσει
  chosen_reading: The phrase is rendered 'in defilement' to preserve the text's judgment
    that these births were associated with profanation or impurity.
  alternative_readings:
  - in profanation
  - in uncleanness
  rationale: The verse makes an evaluative claim, not merely a biological observation.
    'Defilement' best carries that theological-moral force in accessible English without
    adding detail the Greek does not state.
