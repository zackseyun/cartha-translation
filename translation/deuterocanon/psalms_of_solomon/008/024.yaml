id: PSS.8.24
reference: Psalms of Solomon 8:24
source:
  edition: lxx-swete-1909
  text: ἀπήγαγεν τοὺς υἱοὺς καὶ τὰς θυγατέρας αὐτῶν, ἃ ἐγέννησαν ἐν βεβηλώσει.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: He led away their sons and their daughters, whom they had begotten in defilement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in profanation.' The Greek noun can denote desecration or defilement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγαγεν
  chosen: led away
  alternatives:
  - carried off
  - took away
  lexicon: LSJ
  rationale: Aorist of ἀπάγω here denotes removal or deportation. 'Led away' preserves
    the concrete sense without over-specifying violence, while fitting a context of
    captives being taken off.
- source_word: υἱούς
  chosen: sons
  alternatives:
  - children
  lexicon: LSJ
  rationale: The Greek is specifically masculine plural, not a generic term for offspring.
    Per gender-accurate policy, 'sons' should be retained.
- source_word: θυγατέρας
  chosen: daughters
  alternatives:
  - children
  lexicon: LSJ
  rationale: The Greek explicitly names daughters alongside sons, so the translation
    preserves the paired wording.
- source_word: ἃ
  chosen: whom
  alternatives:
  - which
  lexicon: LSJ
  rationale: Although the relative pronoun is neuter plural, idiomatic English referring
    to persons takes 'whom.' This preserves readability while keeping the children
    as the antecedent.
- source_word: ἐγέννησαν
  chosen: had begotten
  alternatives:
  - bore
  - had borne
  - produced
  lexicon: LSJ
  rationale: The verb γεννάω can refer to begetting or bearing. 'Had begotten' keeps
    the formal, genealogical force and avoids narrowing the action to mothers alone.
- source_word: ἐν βεβηλώσει
  chosen: in defilement
  alternatives:
  - in profanation
  - in uncleanness
  lexicon: LSJ
  rationale: βεβήλωσις conveys profanation or defilement. 'In defilement' is natural
    English and preserves the moral-religious stain implied by the noun.
