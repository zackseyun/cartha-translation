id: PSS.8.22
reference: Psalms of Solomon 8:22
source:
  edition: lxx-swete-1909
  text: ὅτι ὁ θεὸς ἤγαγεν αὐτὸν μετὰ ἀσφαλείας ἐν τῇ πλανήσει αὐτῶν.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: For God led him safely in their wandering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their error' or 'in their deception.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγεν
  chosen: led
  alternatives:
  - brought
  - guided
  lexicon: BDAG
  rationale: The aorist of ἄγω most naturally means 'led' here, preserving the image
    of God directing someone's course without adding interpretive nuance beyond the
    Greek.
- source_word: μετὰ ἀσφαλείας
  chosen: safely
  alternatives:
  - with safety
  - in safety
  - securely
  lexicon: LSJ
  rationale: The phrase denotes being kept safe or brought through securely. 'Safely'
    gives natural English while retaining the adverbial force of the Greek expression.
- source_word: πλανήσει
  chosen: wandering
  alternatives:
  - error
  - deception
  - going astray
  lexicon: BDAG
  rationale: πλάνη can denote wandering or deception/error. In this context, 'wandering'
    preserves the concrete image and avoids prematurely narrowing the sense to either
    moral error or active deceit; the alternatives are noted in a footnote.
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - it
  lexicon: BDAG
  rationale: The pronoun is masculine singular, and 'him' is the straightforward gender-accurate
    rendering absent contextual evidence requiring a different referent.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - of them
  lexicon: BDAG
  rationale: The genitive plural is naturally rendered 'their' in idiomatic English,
    preserving the contrast between the singular object and the plural group.
