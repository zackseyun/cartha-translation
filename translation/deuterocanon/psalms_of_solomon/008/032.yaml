id: PSS.8.32
reference: Psalms of Solomon 8:32
source:
  edition: lxx-swete-1909
  text: ὅτι σὺ ὁ θεὸς τῆς δικαιοσύνης, κρίνων τὸν Ἰσραὴλ ἐν παιδείᾳ.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: For you are the God of righteousness, judging Israel with discipline.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with correction' / 'by discipline.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In this context the clause most naturally gives the ground for the surrounding
    prayer or confession, so 'For' preserves the connective force in idiomatic English
    without overstating causation.
- source_word: θεὸς
  chosen: God
  lexicon: BDAG
  rationale: The noun is definite by apposition with the pronoun and genitive phrase;
    'God' is the straightforward rendering.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness' unless context
    strongly favors 'justice.' Here the phrase names God's moral character and just
    rule together, and 'righteousness' best preserves that fuller theological sense.
- source_word: κρίνων
  chosen: judging
  alternatives:
  - who judges
  lexicon: BDAG
  rationale: The present participle describes God's ongoing action. 'Judging' keeps
    the participial linkage and remains natural in English.
- source_word: ἐν παιδείᾳ
  chosen: with discipline
  alternatives:
  - in discipline
  - by discipline
  - with correction
  lexicon: BDAG
  rationale: παιδεία here conveys corrective discipline or chastening rather than
    mere teaching. 'With discipline' is clear modern English and preserves the instrumental
    sense of ἐν.
- source_word: Ἰσραήλ
  chosen: Israel
  rationale: Standard transliteration of the proper name.
