id: PSS.4.24
reference: Psalms of Solomon 4:24
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἐμνήσθησαν θεοῦ, καὶ οὐκ ἐφοβήθησαν τὸν θεὸν ἐν πᾶσι τούτοις.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: And they did not remember God, and they did not fear God in all these things.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐμνήσθησαν
  chosen: did not remember
  alternatives:
  - did not call to mind
  - were not mindful of
  lexicon: BDAG
  rationale: The aorist passive/deponent form from μιμνῄσκομαι here denotes recalling
    or keeping God in mind. 'Did not remember' is the most direct and natural English
    rendering.
- source_word: ἐφοβήθησαν
  chosen: did not fear
  alternatives:
  - did not revere
  - did not stand in awe of
  lexicon: BDAG
  rationale: φοβέομαι with God as object commonly carries the sense of fearing or
    revering God. 'Fear' preserves the source wording and its moral weight without
    prematurely softening it to mere respect.
- source_word: ἐν πᾶσι τούτοις
  chosen: amid all these things
  alternatives:
  - in all these things
  - through all this
  lexicon: BDAG
  rationale: The phrase situates their failure within the totality of the circumstances
    just described. 'Amid all these things' communicates that contextual force in
    idiomatic English.
