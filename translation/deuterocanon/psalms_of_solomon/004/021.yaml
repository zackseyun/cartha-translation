id: PSS.4.21
reference: Psalms of Solomon 4:21
source:
  edition: lxx-swete-1909
  text: σκορπισθείησαν σάρκες ἀνθρωπαρέσκων ὑπὸ θηρίων, καὶ οὐτὰ παρανόμων κατέναντι τοῦ ἡλίου ἐν ἀτιμίᾳ.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: May the flesh of those who please people be scattered by wild beasts, and the bones of the lawless lie before the sun in dishonor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the remains'.
    reason: previous_rendering
lexical_decisions:
- source_word: σκορπισθείησαν
  chosen: May ... be scattered
  alternatives:
  - let ... be scattered
  - will ... be scattered
  lexicon: LSJ
  entry: null
  rationale: The aorist passive optative carries wish or imprecation force in this context. 'May ... be scattered' preserves the prayer-curse tone better than a simple future.
- source_word: σάρκες
  chosen: flesh
  alternatives:
  - bodies
  - carcasses
  lexicon: LSJ
  entry: null
  rationale: σάρξ is used literally here of bodily flesh exposed after judgment. 'Flesh' preserves the concrete, grim imagery more closely than the more generalized 'bodies.'
- source_word: ἀνθρωπαρέσκων
  chosen: those who please people
  alternatives:
  - people-pleasers
  - men-pleasers
  lexicon: LSJ
  entry: null
  rationale: The compound denotes people whose concern is pleasing human beings. 'Those who please people' is clear modern English and avoids the slightly casual tone of 'people-pleasers' while preserving the generic force of ἀνθρωπο-.
- source_word: ὑπὸ θηρίων
  chosen: by wild beasts
  alternatives:
  - by beasts
  - by animals
  lexicon: LSJ
  entry: null
  rationale: θηρία here refers to savage animals devouring the dishonored dead. 'Wild beasts' communicates the curse image naturally and vividly in English.
- source_word: οὐτὰ
  chosen: the remains
  alternatives:
  - the bodies
  - the bones
  - the ears
  lexicon: LSJ
  entry: null
  rationale: The transmitted form οὐτὰ is difficult and does not yield a clear literal sense in context. Because the line continues the corpse-disgrace imagery of flesh scattered by beasts and eyes pecked by ravens in the next verse, 'the remains' best represents the likely reference while honestly reflecting textual uncertainty.
- source_word: παρανόμων
  chosen: of the lawless
  alternatives:
  - of transgressors
  - of the wicked
  lexicon: LSJ
  entry: null
  rationale: παράνομος denotes one acting against law. 'The lawless' is a strong, consistent rendering that preserves the moral-legal force without paraphrase.
- source_word: κατέναντι τοῦ ἡλίου
  chosen: before the sun
  alternatives:
  - in front of the sun
  - under the sun
  lexicon: LSJ
  entry: null
  rationale: The phrase evokes public exposure in the open, not concealment. 'Before the sun' keeps the image close to the Greek and fits the shame setting.
- source_word: ἐν ἀτιμίᾳ
  chosen: in dishonor
  alternatives:
  - in disgrace
  - with shame
  lexicon: LSJ
  entry: null
  rationale: ἀτιμία denotes dishonor or disgrace. 'In dishonor' is slightly more formal and matches the judicial-shame tone of the imprecation.
