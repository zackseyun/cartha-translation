id: PSS.4.8
reference: Psalms of Solomon 4:8
source:
  edition: lxx-swete-1909
  text: ἀνακαλύψαι ὁ θεὸς τὰ ἔργα ἀνθρώπων ἀρεσκόν, ἐν καταγέλωτι καὶ μυκτηρισμῷ τὰ ἔργα αὐτοῦ.
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: May God expose the deeds of the one who pleases people; may his deeds be for ridicule and derision.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνακαλύψαι ὁ θεὸς
  chosen: May God expose
  alternatives:
  - May God uncover
  - God will expose
  lexicon: LSJ
  entry: null
  rationale: Although ἀνακαλύψαι is formally an infinitive, in this immediate imprecatory context (cf. the surrounding wish-prayer style) it functions as a jussive-like appeal. 'May God expose' preserves that force and gives natural English without flattening the prayerful curse into a simple future statement.
- source_word: τὰ ἔργα
  chosen: the deeds
  alternatives:
  - the works
  - the actions
  lexicon: LSJ
  entry: null
  rationale: ἔργα here refers to what the sinner does in practice. 'Deeds' fits moral exposure language better than the more neutral 'works' and is less interpretive than 'actions.'
- source_word: ἀνθρώπων ἀρεσκόν
  chosen: the one who pleases people
  alternatives:
  - the man-pleaser
  - people-pleasers
  - the one who pleases men
  lexicon: LSJ
  entry: null
  rationale: The transmitted phrase is syntactically difficult, but in context it most naturally points to a person characterized by pleasing human beings rather than God; the nearby wording in verse 9 supports that sense. 'The one who pleases people' keeps the idea clear in modern English while avoiding overly colloquial phrasing.
- source_word: ἐν καταγέλωτι
  chosen: for ridicule
  alternatives:
  - in mockery
  - for scorn
  lexicon: LSJ
  entry: null
  rationale: The phrase marks the disgrace attending the exposed deeds. 'For ridicule' is concise and idiomatic in English and preserves the shame dimension of public mockery.
- source_word: μυκτηρισμῷ
  chosen: derision
  alternatives:
  - mockery
  - sneering
  lexicon: LSJ
  entry: null
  rationale: μυκτηρισμός carries the sense of contemptuous mocking. 'Derision' pairs well with 'ridicule' without collapsing the two Greek terms into one repeated English word.
