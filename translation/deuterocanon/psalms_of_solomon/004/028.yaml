id: PSS.4.28
reference: Psalms of Solomon 4:28
source:
  edition: lxx-swete-1909
  text: ἐξᾶραι ὁ θεὸς τοὺς ποιοῦντας ἐν ὑπερηφανίᾳ πᾶσαν ἀδικίαν, ὅτι κριτὴς μέγας
    καὶ κραταιὸς Κύριος ὁ θεὸς ἡμῶν ἐν δικαιοσύνῃ.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: May God remove those who do every kind of unrighteousness in arrogance, for
    the Lord our God is a great and mighty judge in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every injustice' for 'every kind of unrighteousness.'
    reason: lexical_alternative
  - marker: b
    text: 'The opening Greek form can also be understood more literally as ''God to
      remove,'' expressing a wish or imprecation: ''May God remove ...'''
    reason: alternative_reading
  - marker: c
    text: Or 'in justice' for 'in righteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξᾶραι
  chosen: May God remove
  alternatives:
  - God remove
  - God cut off
  - God take away
  lexicon: LSJ
  rationale: The form is an aorist infinitive, but in this prayerful context it carries
    a jussive/wish-like force. 'May God remove' gives natural English while preserving
    the imprecatory sense without over-specifying violent imagery like 'destroy.'
- source_word: τοὺς ποιοῦντας
  chosen: those who do
  alternatives:
  - those doing
  - those who practice
  lexicon: BDAG
  rationale: The participle denotes ongoing characteristic action. 'Those who do'
    is clear, idiomatic, and sufficiently general.
- source_word: ἐν ὑπερηφανίᾳ
  chosen: in arrogance
  alternatives:
  - in pride
  - arrogantly
  lexicon: LSJ
  rationale: The phrase marks the manner or sphere of action. 'In arrogance' preserves
    the noun-based construction and the moral weight of the Greek.
- source_word: πᾶσαν ἀδικίαν
  chosen: every kind of unrighteousness
  alternatives:
  - every injustice
  - all wickedness
  lexicon: BDAG
  rationale: ἀδικία can mean injustice or unrighteousness. Here the broad moral scope
    favors 'unrighteousness,' and 'every kind of' brings out πᾶσαν naturally in English.
- source_word: κριτὴς
  chosen: judge
  alternatives:
  - ruler
  - arbiter
  lexicon: BDAG
  rationale: The judicial sense is primary here and fits the causal clause explaining
    divine action.
- source_word: κραταιὸς
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: LSJ
  rationale: '''Mighty'' fits elevated biblical English without becoming archaic and
    pairs well with ''great.'''
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the project's default rendering for κύριος as a divine title.
- source_word: ἐν δικαιοσύνῃ
  chosen: in righteousness
  alternatives:
  - with righteousness
  - justly
  lexicon: BDAG
  rationale: The phrase most naturally qualifies the Lord's judging. 'In righteousness'
    preserves the formal theological texture and aligns with the project's default
    rendering of δικαιοσύνη.
