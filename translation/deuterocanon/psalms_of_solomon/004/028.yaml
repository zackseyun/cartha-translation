theological_decisions:
- issue: Rendering δικαιοσύνη in a non-Pauline judicial context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Although 'justice' is possible in a judging context, the project default
    is 'righteousness,' and that rendering preserves the moral and covenantal breadth
    of the Greek without narrowing it to courtroom procedure alone.
