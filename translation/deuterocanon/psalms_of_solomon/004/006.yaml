id: PSS.4.6
reference: Psalms of Solomon 4:6
source:
  edition: lxx-swete-1909
  text: ταχὺς εἰσόδῳ εἰς πᾶσαν οἰκίαν ἱλαρότητι ὡς ἄκακος.
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: quick to enter every house with cheerfulness, as one innocent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “like one who is guileless.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ταχύς
  chosen: quick
  alternatives:
  - swift
  - ready
  lexicon: BDAG
  rationale: The adjective conveys promptness or readiness. “Quick” is natural modern
    English and fits the ethical portrait without sounding archaic.
- source_word: εἰσόδῳ
  chosen: to enter
  alternatives:
  - for entering
  - in entering
  - at entry
  lexicon: BDAG
  rationale: The dative with ταχύς expresses readiness in relation to entering. “To
    enter” gives clear English syntax while preserving the sense of eager access.
- source_word: πᾶσαν οἰκίαν
  chosen: every house
  alternatives:
  - every home
  - any house
  lexicon: BDAG
  rationale: This is a straightforward rendering of the distributive phrase. “House”
    stays closer to the Greek than the more interpretive “home.”
- source_word: ἱλαρότητι
  chosen: with cheerfulness
  alternatives:
  - with gladness
  - with geniality
  - with a pleasant manner
  lexicon: BDAG
  rationale: The noun denotes a cheerful or pleasant demeanor. “With cheerfulness”
    preserves that tone without over-interpreting it as merely manipulative charm.
- source_word: ὡς
  chosen: as if
  alternatives:
  - as
  - like
  lexicon: BDAG
  rationale: In this moral context, the comparison likely carries the sense of appearance
    or pretense rather than simple likeness. “As if” brings out that probable nuance
    in idiomatic English.
- source_word: ἄκακος
  chosen: innocent
  alternatives:
  - guileless
  - harmless
  - without malice
  lexicon: BDAG
  rationale: The adjective can mean innocent or guileless. “Innocent” is the clearest
    English here, while the alternatives remain viable and are worth preserving in
    a note.
