id: PSS.4.17
reference: Psalms of Solomon 4:17
source:
  edition: lxx-swete-1909
  text: ἐν ὀδύναις καὶ πενίᾳ καὶ ἀπορίᾳ ἡ ζωὴ αὐτοῦ, Κύριε, ὁ ὕπνος αὐτοῦ ἐν λύπαις
    καὶ ἡ ἐξέγερσις αὐτοῦ ἐν ἀπορίαις.
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: His life is in pains and poverty and want, O Lord; his sleep is in griefs,
    and his waking in distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in distress" / "in want" for both occurrences of ἀπορία; the Greek term
      can denote severe lack, helplessness, or distress depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀδύναις
  chosen: pains
  alternatives:
  - sorrows
  - torments
  - agonies
  lexicon: BDAG
  rationale: ἐν + dative marks the sphere/condition of his life. "Pains" preserves
    bodily and emotional suffering without overstating to "torments."
- source_word: πενίᾳ
  chosen: poverty
  alternatives:
  - need
  - destitution
  lexicon: LSJ
  rationale: The noun denotes poverty or material lack. "Poverty" is the clearest
    modern equivalent and fits the triad of hardship terms.
- source_word: ἀπορίᾳ
  chosen: want
  alternatives:
  - distress
  - perplexity
  - helplessness
  - need
  lexicon: LSJ
  rationale: In this context alongside poverty and later repeated with sleep/waking,
    the sense is severe lack and hardship rather than intellectual perplexity. "Want"
    gives an idiomatic English expression for deprivation in the main clause.
- source_word: ζωὴ
  chosen: life
  alternatives:
  - living
  - existence
  lexicon: BDAG
  rationale: Standard rendering; here it summarizes the person's whole condition.
- source_word: λύπαις
  chosen: griefs
  alternatives:
  - sorrows
  - troubles
  lexicon: BDAG
  rationale: The plural suggests repeated or surrounding sorrow. "Griefs" keeps the
    emotional weight and matches the plural better than a singular abstract noun.
- source_word: ἐξέγερσις
  chosen: waking
  alternatives:
  - rising
  - awakening
  lexicon: LSJ
  rationale: Refers to the state or act of rising from sleep. "Waking" is natural
    modern English and balances "sleep."
- source_word: ἀπορίαις
  chosen: distress
  alternatives:
  - want
  - hardships
  - perplexities
  lexicon: LSJ
  rationale: Though cognate with earlier ἀπορίᾳ, English style benefits from a contextual
    variation. Here, after "sleep...in griefs," "waking in distress" communicates
    ongoing oppressive hardship more smoothly while remaining within the semantic
    range.
- source_word: Κύριε
  chosen: O Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Vocative address is explicit in the Greek; adding "O" preserves the prayerful
    direct address.
