  from: His life is in pains and poverty and want, O Lord; his sleep is in griefs,
    and his waking in distress.
  to: May his life be in pains and poverty and want, O Lord; his sleep in griefs,
    and his waking in distress.
  rationale: The verse consists of verbless clauses embedded in a continuous, unbroken
    series of optative imprecations against the hypocrite (e.g., γένοιτο in v. 16,
    ἀφαιρεθείη in v. 18). Translating the implied copula as an indicative ('His life
    is...') breaks the author's prayer of cursing. It must be rendered as an optative/jussive
    ('May his life be...').
