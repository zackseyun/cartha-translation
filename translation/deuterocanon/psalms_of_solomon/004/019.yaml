id: PSS.4.19
reference: Psalms of Solomon 4:19
source:
  edition: lxx-swete-1909
  text: καὶ ἐλλιπὴς ὁ οἶκος αὐτοῦ ἀπὸ παντὸς οὗ ἐμπλήσει ψυχὴν αὐτοῦ,
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: And may his house lack everything that would fill his soul.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλλιπὴς
  chosen: lack
  alternatives:
  - be lacking
  - be deficient
  lexicon: LSJ
  rationale: Although ἐλλιπὴς is an adjective ('lacking, deficient') in a verbless clause, the surrounding context is an imprecatory sequence, so English supplies the wish force naturally as 'may ... lack.' 'Lack' is clearer and more idiomatic than the more static 'be deficient.'
- source_word: ὁ οἶκος αὐτοῦ
  chosen: his house
  alternatives:
  - his household
  - his home
  lexicon: LSJ
  rationale: οἶκος can denote either the physical house or the household. In a curse touching a person's provision, 'his house' preserves the Greek wording while still allowing the broader household sense to be heard.
- source_word: ἀπὸ παντὸς
  chosen: everything
  alternatives:
  - from everything
  - of everything
  lexicon: LSJ
  rationale: The phrase expresses deprivation with respect to all things of a certain kind. In English, 'lack everything' conveys the force more naturally than a wooden retention of 'from.'
- source_word: οὗ ἐμπλήσει
  chosen: that would fill
  alternatives:
  - with which he would fill
  - which would satisfy
  lexicon: LSJ
  rationale: The relative expression points to what would fill or satisfy him. 'That would fill' preserves the imagery of fullness while fitting natural English better than the more awkward 'with which he will fill.'
- source_word: ψυχὴν αὐτοῦ
  chosen: his soul
  alternatives:
  - himself
  - his appetite
  - his life
  lexicon: LSJ
  rationale: ψυχή can mean soul, life, self, or appetite depending on context. Here the idiom likely reaches toward inward desire or appetite, but 'his soul' keeps the Greek image intact and avoids over-narrowing the sense in the main text.
