id: PSS.4.22
reference: Psalms of Solomon 4:22
source:
  edition: lxx-swete-1909
  text: ὀφθαλμοὺς ἐκκόψαισαν κόρακες ὑποκρινομένων,
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: May ravens pluck out the eyes of hypocrites,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pretenders' / 'those who dissemble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκόψαισαν
  chosen: may ... pluck out
  alternatives:
  - may ... gouge out
  - may ... tear out
  - let ... pluck out
  lexicon: BDAG
  rationale: The aorist optative functions here as a wish or imprecation, so 'may'
    best represents the force in natural English. 'Pluck out' fits the violent image
    while remaining idiomatic.
- source_word: κόρακες
  chosen: ravens
  alternatives:
  - crows
  lexicon: LSJ
  rationale: κόραξ normally denotes a raven. 'Ravens' preserves the vivid scavenger
    image more precisely than the broader 'crows'.
- source_word: ὀφθαλμοὺς
  chosen: eyes
  alternatives:
  - eyeballs
  lexicon: BDAG
  rationale: The standard meaning is 'eyes.' A more graphic rendering like 'eyeballs'
    would over-translate the Greek.
- source_word: ὑποκρινομένων
  chosen: hypocrites
  alternatives:
  - pretenders
  - those who dissemble
  - those acting hypocritically
  lexicon: LSJ
  rationale: The participle denotes people who feign or dissemble. 'Hypocrites' is
    the most concise and natural English equivalent, though 'pretenders' is a possible
    lexical alternative.
