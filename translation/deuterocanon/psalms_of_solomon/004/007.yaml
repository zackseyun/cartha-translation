id: PSS.4.7
reference: Psalms of Solomon 4:7
source:
  edition: lxx-swete-1909
  text: ἐξάραι ὁ θεὸς τοὺς ἐν ὑποκρίσει ζῶντας μετὰ ὁσίων, ἐν φθορᾷ σαρκός αὐτοῦ καὶ
    πενίᾳ τὴν ζωὴν αὐτοῦ·
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: May God remove those who live in hypocrisy among the pious, in the corruption
    of his flesh and poverty his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'root out' or 'take away.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'his flesh' and 'his life' use singular pronouns distributively for
      the class described.
    reason: lexical_alternative
  - marker: c
    text: Or 'among the holy'.
    reason: previous_rendering
  - marker: d
    text: Or 'with decay in their flesh and poverty in their life.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐξάραι
  chosen: remove
  alternatives:
  - take away
  - root out
  - lift away
  lexicon: LSJ
  rationale: The verb most naturally conveys removal. In this denunciatory context,
    'remove' preserves the force of divine excision without overstating it as physical
    destruction.
- source_word: ὑποκρίσει
  chosen: hypocrisy
  alternatives:
  - pretense
  - dissimulation
  lexicon: LSJ
  rationale: '''Hypocrisy'' is the plain and established sense and fits the moral-religious
    register of the verse.'
- source_word: ὁσίων
  chosen: the holy
  alternatives:
  - the godly
  - the faithful ones
  - the saints
  lexicon: LSJ
  rationale: '''The holy'' stays close to the Greek while remaining natural English.
    ''Saints'' would import later ecclesiastical associations not required by the
    text.'
- source_word: ἐν φθορᾷ
  chosen: with decay
  alternatives:
  - in corruption
  - with ruin
  lexicon: LSJ
  rationale: φθορά here is best rendered concretely as 'decay,' especially with 'flesh,'
    yielding a bodily sense rather than a purely moral abstraction.
- source_word: σαρκός
  chosen: flesh
  alternatives:
  - body
  lexicon: LSJ
  rationale: Following project policy, σάρξ is rendered 'flesh' in literal contexts.
    Here the phrase points to bodily condition, not metaphorical sinful nature.
- source_word: πενίᾳ
  chosen: poverty
  alternatives:
  - want
  - destitution
  lexicon: LSJ
  rationale: '''Poverty'' is the most direct equivalent and matches the terse severity
    of the line.'
- source_word: τὴν ζωὴν αὐτοῦ
  chosen: their life
  alternatives:
  - his life
  - their lives
  lexicon: LSJ
  rationale: The Greek uses a distributive singular, but English reads more naturally
    with singular collective reference after a plural group. This preserves sense
    without woodenness.
