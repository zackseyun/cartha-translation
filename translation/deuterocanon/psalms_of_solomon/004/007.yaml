theological_decisions:
- issue: Sense of the opening clause
  chosen_reading: 'A wish/prayer: ''May God remove those...'''
  alternative_readings:
  - 'Statement: ''God removes those...'''
  - 'Infinitival sense: ''for God to remove those...'''
  rationale: Although the form is syntactically compressed, the verse reads most naturally
    as an imprecatory wish within a denunciatory context. That preserves the line's
    force without forcing a more explicit finite verb than the source gives.
