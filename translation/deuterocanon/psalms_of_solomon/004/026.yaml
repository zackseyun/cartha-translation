id: PSS.4.26
reference: Psalms of Solomon 4:26
source:
  edition: lxx-swete-1909
  text: μακάριοι οἱ φοβούμενοι τὸν κύριον ἐν ἀκακίᾳ αὐτῶν.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: Blessed are those who fear the Lord in their innocence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in their guilelessness" or "in their blamelessness."
    reason: lexical_alternative
  - marker: b
    text: '"Fear" here carries the sense of reverent fear toward the Lord, not mere
      dread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: '"Blessed" preserves the covenantal and wisdom-text weight of the beatitude
    form better than the more emotional "happy" or the flatter "fortunate."'
- source_word: φοβούμενοι
  chosen: fear
  alternatives:
  - revere
  - stand in awe of
  lexicon: BDAG
  rationale: The Greek verb is literally "fear," and that wording best preserves the
    source expression. While reverential fear is clearly in view, "fear" keeps the
    biblical tension without paraphrasing it away.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the project's default rendering for κύριος as a divine title
    and fits the religious context here.
- source_word: ἀκακίᾳ
  chosen: innocence
  alternatives:
  - guilelessness
  - blamelessness
  - simplicity
  lexicon: BDAG
  rationale: The noun denotes lack of malice or deceit. "Innocence" is the clearest
    natural English rendering here, while still allowing the moral sense of guilelessness.
