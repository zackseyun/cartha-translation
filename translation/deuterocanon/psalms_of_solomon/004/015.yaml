id: PSS.4.15
reference: Psalms of Solomon 4:15
source:
  edition: lxx-swete-1909
  text: ἐπλήσθη ἐν παρανομίᾳ ἐν ταύτῃ· καὶ οἱ ὀφθαλμοὶ αὐτοῦ ἐπʼ οἶκον ἕτερον ὀλοθρεύσαι
    ἐν λόγοις ἀνυπερθέσεως· οὐκ ἐμπίπλαται ἡ ψυχὴ αὐτοῦ, ὡς ᾅδης, ἐν πᾶσι τούτοις.
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: He was filled with this lawlessness, and his eyes were set on another household
    to destroy it with relentless words; his soul is not satisfied, like Hades, with
    all these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another house.' The Greek οἶκος can refer either to a physical house
      or to a household/family sphere.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'with relentless words' is difficult; it may also mean
      'with unhesitating words' or 'with words without delay.'
    reason: alternative_reading
  - marker: c
    text: '''Like Hades'' expresses insatiability; ''the grave'' or ''Sheol'' would
      be interpretive alternatives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήσθη
  chosen: was filled
  alternatives:
  - was full
  - filled himself
  lexicon: BDAG
  rationale: The passive form naturally yields 'was filled,' preserving the image
    of a person characterized or saturated by the vice described.
- source_word: παρανομίᾳ
  chosen: lawlessness
  alternatives:
  - wickedness
  - transgression
  lexicon: BDAG
  rationale: '''Lawlessness'' best preserves the sense of conduct opposed to law or
    covenantal order, rather than a more generic moral term.'
- source_word: ἐν ταύτῃ
  chosen: this
  alternatives:
  - therein
  - with it
  lexicon: BDAG
  rationale: 'Taken with the preceding noun, it most naturally points to the lawlessness
    just mentioned: ''this lawlessness.'''
- source_word: οἱ ὀφθαλμοὶ αὐτοῦ
  chosen: his eyes were set on
  alternatives:
  - his eyes were on
  - he looked toward
  lexicon: BDAG
  rationale: The idiom conveys more than mere sight; it suggests intent or fixation.
- source_word: οἶκον ἕτερον
  chosen: another household
  alternatives:
  - another house
  - another home
  lexicon: BDAG
  rationale: '''Household'' captures the likely social sense of οἶκος here—one''s
    domestic sphere or family estate—though ''house'' remains possible.'
- source_word: ὀλοθρεύσαι
  chosen: to destroy it
  alternatives:
  - to ruin it
  - to wipe it out
  lexicon: BDAG
  rationale: The infinitive expresses hostile purpose. 'Destroy' is strong but appropriately
    matches the verb's destructive force.
- source_word: ἐν λόγοις ἀνυπερθέσεως
  chosen: with relentless words
  alternatives:
  - with unhesitating words
  - with urgent words
  - with words without delay
  lexicon: LSJ
  rationale: The phrase is somewhat unusual, but the sense appears to be speech that
    does not hold back or delay. 'Relentless words' gives clear English while preserving
    the aggressive force.
- source_word: οὐκ ἐμπίπλαται
  chosen: is not satisfied
  alternatives:
  - is not filled
  - is not sated
  lexicon: BDAG
  rationale: In English, 'is not satisfied' best conveys the ongoing idea of never
    having enough, especially in the comparison with Hades.
- source_word: ὡς ᾅδης
  chosen: like Hades
  alternatives:
  - like Sheol
  - like the grave
  lexicon: BDAG
  rationale: The Greek text reads ᾅδης, so 'Hades' is the most transparent rendering;
    the comparison is to the underworld's insatiable appetite.
