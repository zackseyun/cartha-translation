id: PSS.4.5
reference: Psalms of Solomon 4:5
source:
  edition: lxx-swete-1909
  text: ἐν νυκτὶ καὶ ἐν ἀποκρύφοις ἁμαρτάνει ὡς οὐχ ὁρώμενος, ἐν ὀφθαλμοῖς αὐτοῦ λαλεῖ
    πάσῃ γυναικὶ ἐν συνταγῇ κακίας·
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: At night and in secret places he sins as though unseen; with his eyes he speaks
    to every woman in a scheme of evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in hidden places.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'with his eyes he speaks'—an image of silent, suggestive signaling.
    reason: cultural_note
  - marker: c
    text: Or 'in an evil plot' / 'in a conspiracy of evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν νυκτί
  chosen: At night
  alternatives:
  - In the night
  - By night
  lexicon: BDAG
  rationale: A natural temporal phrase in English that preserves the Greek sense of
    actions done under cover of darkness.
- source_word: ἐν ἀποκρύφοις
  chosen: in secret places
  alternatives:
  - in hidden places
  - secretly
  lexicon: BDAG
  rationale: The plural dative points to concealed settings rather than merely an
    abstract adverb, so 'in secret places' keeps the concrete force.
- source_word: ἁμαρτάνει
  chosen: he sins
  alternatives:
  - he does wrong
  - he commits sin
  lexicon: BDAG
  rationale: The verb plainly denotes sinning; the direct rendering best preserves
    the moral weight of the Greek.
- source_word: ὡς οὐχ ὁρώμενος
  chosen: as though unseen
  alternatives:
  - as if not being seen
  - as one not seen
  lexicon: BDAG
  rationale: This expresses the man's assumption that he escapes notice. 'As though
    unseen' is idiomatic English while retaining the comparative force of ὡς.
- source_word: ἐν ὀφθαλμοῖς αὐτοῦ λαλεῖ
  chosen: with his eyes he speaks
  alternatives:
  - his eyes speak
  - he signals with his eyes
  lexicon: BDAG
  rationale: The Greek is vivid and bodily. Keeping 'with his eyes he speaks' preserves
    the image of wordless, suggestive communication better than a flattened paraphrase.
- source_word: πάσῃ γυναικί
  chosen: to every woman
  alternatives:
  - with every woman
  - to each woman
  lexicon: BDAG
  rationale: The distributive sense is best captured by 'every woman.' The preposition
    is not explicit here, so the English follows the verb's natural object relation.
- source_word: ἐν συνταγῇ κακίας
  chosen: in a scheme of evil
  alternatives:
  - in an evil plot
  - by an arrangement of wickedness
  - in a conspiracy of evil
  lexicon: LSJ
  rationale: συνταγή suggests an arrangement, plan, or contrivance. 'Scheme of evil'
    is natural English and preserves the sense of deliberate wicked design.
