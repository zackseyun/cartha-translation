id: PSS.4.25
reference: Psalms of Solomon 4:25
source:
  edition: lxx-swete-1909
  text: καὶ παρώργυσαν τὸν θεόν, καὶ παρώξυναν ἐξᾶραι αὐτοὺς ἀπὸ τῆς γῆς· ὅτι ψυχὰς
    ἀκάκων παραλογισμῷ ὑπεκρίνοντο.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: And they provoked God, and stirred him up to remove them from the land, because
    by deceit they pretended to be innocent people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'earth' instead of 'land.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'souls of innocents'; the sense may also be 'innocent lives' or
      'innocent persons.'
    reason: lexical_alternative
  - marker: c
    text: Or 'pretended to be innocent people' or 'played the part of the innocent.'
    reason: alternative_reading
lexical_decisions:
- source_word: παρώργυσαν
  chosen: provoked
  alternatives:
  - angered
  - provoked to anger
  lexicon: BDAG
  rationale: The verb denotes provoking God to anger. 'Provoked' is direct, idiomatic,
    and preserves the moral force without over-expanding the phrase.
- source_word: παρώξυναν
  chosen: stirred him up
  alternatives:
  - incited him
  - provoked further
  - exasperated
  lexicon: LSJ
  rationale: The verb intensifies the previous accusation and is followed by the infinitive
    ἐξᾶραι. 'Stirred him up' communicates that they goaded God toward judicial action.
- source_word: ἐξᾶραι αὐτοὺς ἀπὸ τῆς γῆς
  chosen: to remove them from the land
  alternatives:
  - to root them out from the land
  - to take them away from the earth
  lexicon: BDAG
  rationale: ἐξαίρω can mean remove or take away, sometimes with destructive force.
    'Remove them from the land' is transparent and fits a judgment context without
    overstating beyond the Greek.
- source_word: ψυχὰς
  chosen: people
  alternatives:
  - souls
  - lives
  - persons
  lexicon: BDAG
  rationale: Although literally 'souls,' ψυχή can stand for persons or lives. In natural
    English, 'people' best conveys the referent here while a footnote preserves the
    more literal alternatives.
- source_word: ἀκάκων
  chosen: innocent
  alternatives:
  - guileless
  - blameless
  lexicon: BDAG
  rationale: The adjective denotes those free from malice or deceit. 'Innocent' is
    the clearest modern rendering in this context.
- source_word: παραλογισμῷ
  chosen: by deceit
  alternatives:
  - by trickery
  - by false reasoning
  - deceitfully
  lexicon: LSJ
  rationale: The noun here carries the sense of deceitful contrivance rather than
    neutral reasoning. 'By deceit' is brief and natural in English.
- source_word: ὑπεκρίνοντο
  chosen: posed as
  alternatives:
  - pretended to be
  - played the part of
  - acted hypocritically as
  lexicon: LSJ
  rationale: Given the hypocrisy theme in the surrounding lines, the verb is best
    taken as feigning or impersonating. 'Posed as' expresses that sense idiomatically
    with the accusative object.
