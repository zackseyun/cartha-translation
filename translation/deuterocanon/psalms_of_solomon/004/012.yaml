id: PSS.4.12
reference: Psalms of Solomon 4:12
source:
  edition: lxx-swete-1909
  text: οἱ λόγοι αὐτοῦ παραλογισμοί, εἰς πρᾶξιν ἐπιθυμίας ἀδίκων.
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: His words are false reasonings for carrying out the desire of unjust men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His words are fallacies' or 'His words are deceptions.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the practice of the desire of the wicked.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the desire of the wicked'.
    reason: previous_rendering
lexical_decisions:
- source_word: λόγοι
  chosen: words
  alternatives:
  - speeches
  - sayings
  lexicon: LSJ
  rationale: A straightforward rendering preserves the concrete focus on what he says
    rather than shifting to a more interpretive gloss.
- source_word: παραλογισμοί
  chosen: false reasonings
  alternatives:
  - fallacies
  - deceptions
  - sophistries
  lexicon: LSJ
  rationale: The term denotes faulty or deceptive reasoning. 'False reasonings' keeps
    that intellectual-moral force without sounding overly technical in English.
- source_word: εἰς πρᾶξιν
  chosen: for carrying out
  alternatives:
  - for practice
  - for doing
  - toward the commission of
  lexicon: LSJ
  rationale: The phrase expresses purpose or result. 'For carrying out' gives natural
    English while preserving the sense that his words serve action, not merely thought.
- source_word: ἐπιθυμίας
  chosen: the desire
  alternatives:
  - the craving
  - the lust
  lexicon: LSJ
  rationale: ἐπιθυμία can be rendered more strongly as 'lust' or more psychologically
    as 'craving,' but 'desire' is broad enough to fit the context without over-narrowing
    it to sexual sin alone.
- source_word: ἀδίκων
  chosen: of the wicked
  alternatives:
  - of unjust people
  - of the unrighteous
  lexicon: LSJ
  rationale: The genitive is best taken as referring to wicked persons whose desire
    is being served. 'Of the wicked' is concise, natural, and preserves the moral
    force of ἄδικος.
