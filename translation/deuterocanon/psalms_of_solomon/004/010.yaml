id: PSS.4.10
reference: Psalms of Solomon 4:10
source:
  edition: lxx-swete-1909
  text: καὶ οἱ ὀφθαλμοὶ αὐτῶν ἐπʼ οἶκον ἀνδρὸς ἐν εὐσταθείᾳ, ὡς ὄφις, διαλῦσαι σοφίαν
    ἀλλήλων ἐν λόγοις παρανόμων.
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: And their eyes are on a man's house in prosperity, like a snake, to undo one
    another's wisdom with lawless words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in stability,' 'in security,' or 'in well-being.' The Greek term can
      denote firmness or settled prosperity.
    reason: lexical_alternative
  - marker: b
    text: '''House'' may also carry the sense of household or estate, not merely the
      building itself.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to destroy' or 'to overthrow one another's wisdom.'
    reason: lexical_alternative
  - marker: d
    text: Or 'with lawless words'.
    reason: previous_rendering
lexical_decisions:
- source_word: οἱ ὀφθαλμοὶ αὐτῶν
  chosen: their eyes
  alternatives:
  - their gaze
  - they look
  lexicon: LSJ
  rationale: A literal rendering preserves the vivid bodily imagery and the accusatory
    tone of the Greek.
- source_word: ἐπʼ οἶκον ἀνδρὸς
  chosen: on a man's house
  alternatives:
  - toward a man's house
  - at a man's household
  lexicon: LSJ
  rationale: The phrase is kept fairly literal. 'House' can imply household or estate,
    but 'house' best preserves the source image while allowing the broader social
    sense.
- source_word: ἐν εὐσταθείᾳ
  chosen: in prosperity
  alternatives:
  - in stability
  - in security
  - in well-being
  lexicon: LSJ
  rationale: The term denotes a state of firmness or stability; in this context of
    envying or targeting a successful household, 'prosperity' communicates the likely
    sense in idiomatic English.
- source_word: ὡς ὄφις
  chosen: like a snake
  alternatives:
  - like a serpent
  lexicon: LSJ
  rationale: Either English gloss works, but 'snake' is more natural modern English
    while preserving the predatory simile.
- source_word: διαλῦσαι
  chosen: to undo
  alternatives:
  - to destroy
  - to dissolve
  - to overthrow
  lexicon: LSJ
  rationale: The infinitive expresses purpose. 'Undo' captures the sense of dismantling
    or subverting without overstating total destruction.
- source_word: σοφίαν ἀλλήλων
  chosen: one another's wisdom
  alternatives:
  - each other's good sense
  - each other's prudence
  lexicon: LSJ
  rationale: A formally close rendering preserves both the reciprocal element and
    the moral-intellectual nuance of σοφία.
- source_word: ἐν λόγοις παρανόμων
  chosen: with lawless words
  alternatives:
  - by unlawful words
  - with wicked words
  lexicon: LSJ
  rationale: παράνομος is best represented by 'lawless,' which preserves the moral-juridical
    force better than the more general 'wicked'.
