- issue: Rendering of κύριος in direct address to God
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse is a prayer address, and the project's default rendering for
    κύριος is 'Lord.' This preserves both biblical continuity and the source sense
    without importing extra interpretation.
