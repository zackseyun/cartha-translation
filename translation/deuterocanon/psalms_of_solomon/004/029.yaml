id: PSS.4.29
reference: Psalms of Solomon 4:29
source:
  edition: lxx-swete-1909
  text: γένοιτο, Κύριε, τὸ ἔλεός σου ἐπὶ πάντας τοὺς ἀγαπῶντάς σε.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: May your mercy, O Lord, be upon all who love you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γένοιτο
  chosen: may ... be
  alternatives:
  - let ... be
  - may it come to pass
  lexicon: BDAG
  rationale: Aorist optative of γίνομαι used in a wish or prayer. In English, 'may
    ... be' best conveys the petitionary force naturally and transparently.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος used as a divine address. Per project doctrine, κύριος
    is rendered 'Lord' rather than transliterated or expanded.
- source_word: ἔλεός
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: BDAG
  rationale: ἔλεος regularly denotes mercy or compassion shown by one in authority
    or covenant relationship. 'Mercy' is the most direct and idiomatic rendering here.
- source_word: ἐπὶ
  chosen: upon
  alternatives:
  - 'on'
  - over
  lexicon: BDAG
  rationale: With the accusative after a verb of wish/prayer, ἐπί expresses direction
    toward or resting upon. 'Upon' preserves the prayer-like tone better than the
    flatter 'on.'
- source_word: πάντας τοὺς ἀγαπῶντάς σε
  chosen: all who love you
  alternatives:
  - all those loving you
  - everyone who loves you
  lexicon: BDAG
  rationale: The articular present participle denotes a class of people characterized
    by loving God. 'All who love you' is faithful and idiomatic English.
