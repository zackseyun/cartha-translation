  category: grammar
  tier: 2
  from: may everything done by his hands fail.
  to: may they fall away from every work of his hands.
  rationale: The Greek verb ἀποπέσοιεν is third-person plural ('may they fall away'), followed by the prepositional phrase ἀπὸ παντὸς ἔργου ('from every work'). The draft forces unambiguity by turning the singular prepositional object into the subject and ignoring the plural verb. The translation must preserve the Greek syntax and its genuine ambiguity, rather than smoothing it into a dynamic equivalent.
