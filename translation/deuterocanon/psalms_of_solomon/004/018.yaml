id: PSS.4.18
reference: Psalms of Solomon 4:18
source:
  edition: lxx-swete-1909
  text: ἀφαιρεθείη ὕπνος ἀπὸ κροτάφων αὐτοῦ ἐν νυκτί, ἀποπέσοιεν ἀπὸ παντὸς ἔργου χειρῶν αὐτοῦ·
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: May sleep be taken from his temples in the night; may they fall away from every work of his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from his temples'; the image is of sleep being removed from the sides of his head.
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'may they fall away from every work of his hands,' with the subject left implicit in Greek.
    reason: alternative_reading
  - marker: c
    text: Or 'may everything done by his hands fail.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀφαιρεθείη
  chosen: be taken
  alternatives:
  - be removed
  - be taken away
  lexicon: LSJ
  rationale: Aorist optative in an imprecatory wish. 'Be taken' is concise English that preserves the passive sense without adding interpretive weight.
- source_word: ὕπνος
  chosen: sleep
  alternatives:
  - slumber
  lexicon: LSJ
  rationale: The ordinary sense is 'sleep.' 'Slumber' would sound more literary than the Greek requires.
- source_word: κροτάφων
  chosen: temples
  alternatives:
  - sides of the head
  - eyes
  lexicon: LSJ
  rationale: The word literally refers to the temples/sides of the head. Although English idiom more often says sleep departs from the eyes, the Greek image is retained here for transparency.
- source_word: ἐν νυκτί
  chosen: in the night
  alternatives:
  - at night
  - by night
  lexicon: LSJ
  rationale: This keeps the prepositional force and the solemn tone. It also fits the poetic register of the verse.
- source_word: ἀποπέσοιεν
  chosen: fail
  alternatives:
  - fall away
  - drop away
  - come to nothing
  lexicon: LSJ
  rationale: 'The verb is literally ''fall away,'' but the implied subject is unstated in Greek. ''Fail'' best conveys the likely sense in idiomatic English: that the person''s undertakings collapse.'
- source_word: ἀπὸ παντὸς ἔργου
  chosen: everything done
  alternatives:
  - every work
  - all his work
  lexicon: LSJ
  rationale: Because the Greek leaves the subject of the plural verb implicit, this rendering makes explicit the probable sense that all his works or undertakings are meant.
- source_word: χειρῶν αὐτοῦ
  chosen: by his hands
  alternatives:
  - of his hands
  - from his hands
  lexicon: LSJ
  rationale: This preserves the concrete Hebrew-Greek idiom of action accomplished by one's hands while remaining natural in English.
