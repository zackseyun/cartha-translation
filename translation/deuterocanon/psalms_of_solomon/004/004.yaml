id: PSS.4.4
reference: Psalms of Solomon 4:4
source:
  edition: lxx-swete-1909
  text: οἱ ὀφθαλμοὶ αὐτοῦ ἐπὶ πᾶσαν γυναῖκα ἄνευ διαστολῆς, ἡ γλῶσσα ψευδὴς ἐν συναλλάγματι
    μεθʼ ὅρκου.
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: His eyes are on every woman without restraint; his tongue is false in business,
    with an oath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without distinction.' The Greek expression may mean that he looks indiscriminately
      at every woman.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ὀφθαλμοὶ αὐτοῦ
  chosen: His eyes are
  alternatives:
  - His eyes
  - his gaze is
  lexicon: LSJ
  rationale: The Greek uses a body-part subject idiomatically for directed attention
    or desire. 'His eyes are on' keeps the concrete image while reading naturally
    in English.
- source_word: ἐπὶ πᾶσαν γυναῖκα
  chosen: on every woman
  alternatives:
  - toward every woman
  - upon every woman
  lexicon: LSJ
  rationale: ἐπί with the accusative here marks direction or focus. 'On every woman'
    is the most natural English rendering and preserves the universal scope of πᾶσαν.
- source_word: ἄνευ διαστολῆς
  chosen: without restraint
  alternatives:
  - without distinction
  - without hesitation
  lexicon: LSJ
  rationale: διαστολή can denote distinction or differentiation, but in this moral
    context modifying lustful looking, the idiomatic force is that he makes no moral
    check or limit. 'Without restraint' best conveys the sense in clear modern English,
    while the more literal alternative is preserved in a footnote.
- source_word: ἡ γλῶσσα ψευδὴς
  chosen: his tongue is false
  alternatives:
  - his tongue is deceitful
  - his tongue lies
  lexicon: LSJ
  rationale: The predicate adjective ψευδής describes the character of his speech.
    'False' is concise and preserves the metaphor of the tongue as the instrument
    of deceit.
- source_word: ἐν συναλλάγματι
  chosen: in business
  alternatives:
  - in dealings
  - in transactions
  - in bargaining
  lexicon: LSJ
  rationale: συναλλάγματι refers to dealings or transactions, especially commercial
    or practical exchanges. 'In business' is natural English and captures the transactional
    setting without over-specifying.
- source_word: μεθʼ ὅρκου
  chosen: with an oath
  alternatives:
  - under oath
  - swearing an oath
  lexicon: LSJ
  rationale: The phrase indicates that the falsehood is accompanied or reinforced
    by oath-taking. 'With an oath' stays close to the Greek structure and avoids implying
    a formal courtroom setting.
