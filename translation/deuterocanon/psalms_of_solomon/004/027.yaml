id: PSS.4.27
reference: Psalms of Solomon 4:27
source:
  edition: lxx-swete-1909
  text: καὶ ὁ κύριος ῥύσεται αὐτοὺς ἀπὸ ἀνθρώπων δολίων καὶ ἁμαρτωλῶν. καὶ ῥύσεται
    ἡμᾶς ἀπὸ παντὸς σκανδάλου παρανόμου.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: And the Lord will rescue them from deceitful and sinful people, and he will
    rescue us from every lawless snare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “every lawless snare” or “every cause of stumbling from the lawless one/ones.”
    reason: lexical_alternative
  - marker: b
    text: Or 'deceitful and sinful people'.
    reason: previous_rendering
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Follows the project default for κύριος as a divine title; this preserves
    the religious force of the address without importing a more interpretive rendering.
- source_word: ῥύσεται
  chosen: will rescue
  alternatives:
  - will deliver
  - will save
  lexicon: BDAG
  rationale: “Rescue” gives clear modern English for deliverance from danger and fits
    both clauses naturally.
- source_word: ἀνθρώπων
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: The noun is generic here, not specifically male; “people” best reflects
    the sense in natural English.
- source_word: δολίων
  chosen: deceitful
  alternatives:
  - treacherous
  - crafty
  lexicon: BDAG
  rationale: “Deceitful” directly conveys the sense of guile or fraud in a readable
    modern form.
- source_word: ἁμαρτωλῶν
  chosen: sinful
  alternatives:
  - sinners
  lexicon: BDAG
  rationale: As an attributive description alongside δολίων, “sinful” reads smoothly
    in English while preserving the moral characterization.
- source_word: σκανδάλου
  chosen: stumbling block
  alternatives:
  - snare
  - cause for stumbling
  - offense
  lexicon: BDAG
  rationale: This keeps the core metaphor of something that causes downfall or stumbling;
    it is more transparent to the source than a fully interpretive rendering like
    “trap.”
- source_word: παρανόμου
  chosen: lawless
  alternatives:
  - wicked
  - of the lawless one
  lexicon: BDAG
  rationale: Taken adjectivally with σκανδάλου, it describes the stumbling block as
    characterized by lawlessness. This is the most straightforward reading from the
    given Greek.
