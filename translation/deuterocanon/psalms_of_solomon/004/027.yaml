  category: lexical
  tier: 2
  from: deceitful and sinful people
  to: deceitful people and sinners
  rationale: In the Psalms of Solomon, ἁμαρτωλοί is a specific sociological group
    label ('sinners', referring to the opposing faction), not a generic moral adjective.
    Translating it as 'sinful' modifying 'people' flattens this crucial technical
    term into a generic abstraction, violating the book's specific sociology.
