id: PSS.4.3
reference: Psalms of Solomon 4:3
source:
  edition: lxx-swete-1909
  text: καὶ ἡ χείρ αὐτοῦ ἐν πρώτοις ἐπʼ αὐτὸν ὡς ἐν ζήλει, καὶ αὐτὸς ἔνοχος ἐν ποικιλίᾳ
    ἁμαρτωλῶν, ἐν ἀκρασίαις·
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: And his hand is among the first against him, as if in zeal, but he himself
    is guilty in a variety of sinful deeds, in acts of self-indulgence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his hand is at first upon him,” taking ἐν πρώτοις temporally rather
      than as priority among accusers.
    reason: alternative_reading
  - marker: b
    text: Or “as in zeal”; the phrase may describe apparent zeal or a claimed posture
      of zeal.
    reason: lexical_alternative
  - marker: c
    text: Literally “guilty in a variety of sinners, in self-indulgences”; the Greek
      is compressed, and “the manifold ways of sinners” is an idiomatic rendering
      of the sense.
    reason: lexical_alternative
  - marker: d
    text: Or 'in the manifold ways of sinners'.
    reason: previous_rendering
lexical_decisions:
- source_word: χείρ
  chosen: hand
  alternatives:
  - action
  - power
  lexicon: BDAG
  rationale: A literal rendering fits the idiom of one's hand being against another
    and preserves the vivid bodily image.
- source_word: ἐν πρώτοις
  chosen: among the first
  alternatives:
  - at first
  - in the first place
  lexicon: LSJ
  rationale: In context it most naturally describes eagerness or priority in acting
    against the person he condemns, not merely temporal sequence.
- source_word: ἐπʼ αὐτόν
  chosen: against him
  alternatives:
  - upon him
  - on him
  lexicon: BDAG
  rationale: 'With ''hand'' this is idiomatically adversative in English: his hand
    is set against the accused person.'
- source_word: ὡς ἐν ζήλει
  chosen: as if in zeal
  alternatives:
  - as in zeal
  - as though zealous
  lexicon: BDAG
  rationale: The wording suggests an appearance or pretense of zeal rather than necessarily
    genuine righteous fervor, especially in a denunciation of hypocrisy.
- source_word: ἔνοχος
  chosen: guilty
  alternatives:
  - liable
  - culpable
  lexicon: BDAG
  rationale: '"Guilty" is the most natural judicial term in English and matches the
    verse''s accusatory setting.'
- source_word: ποικιλίᾳ
  chosen: the manifold ways
  alternatives:
  - variety
  - many kinds
  lexicon: LSJ
  rationale: A strictly literal 'variety' is awkward in English here. 'Manifold ways'
    communicates multiplicity while remaining close to the Greek idea of various forms.
- source_word: ἁμαρτωλῶν
  chosen: of sinners
  alternatives:
  - sinful ones
  - sins
  lexicon: BDAG
  rationale: The extant Greek is the genitive plural of 'sinners,' not the noun 'sins.'
    The English keeps that value while smoothing the phrase idiomatically.
- source_word: ἀκρασίαις
  chosen: acts of self-indulgence
  alternatives:
  - lack of self-control
  - excesses
  - intemperances
  lexicon: BDAG
  rationale: The term denotes undisciplined excess or absence of self-mastery. 'Acts
    of self-indulgence' is readable modern English that preserves the moral weight.
