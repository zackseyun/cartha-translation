  from: in the manifold ways of sinners
  to: in a variety of sinful deeds
  rationale: 'The adjective ἁμαρτωλός is two-termination; ἁμαρτωλῶν here is best parsed
    as a neuter plural substantive (''of sinful things/deeds'') rather than masculine
    (''of sinners''). Reading it as neuter perfectly fits the context of the hypocrite''s
    own hidden offenses (parallel to ''acts of self-indulgence'') and allows a direct
    translation of ποικιλίᾳ (''variety'') without needing to paraphrase it as ''manifold
    ways''. (Footnote ''c'' should be updated or removed accordingly). | Adjudicator:
    The reviewer''s grammatical argument is sound: parsing ἁμαρτωλῶν as a neuter plural
    substantive (''sinful deeds/things'') rather than masculine (''sinners'') perfectly
    parallels the subsequent plural ''acts'
