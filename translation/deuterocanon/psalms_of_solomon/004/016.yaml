  from: May his portion, O Lord, be in dishonor before you; his going out in groanings and his coming in under a curse.
  to: May his portion, O Lord, be in dishonor before you, his going out in groanings, and his coming in under a curse.
  rationale: Changing the semicolon to a comma better reflects the Greek syntax, where the single optative verb (γένοιτο) governs all three subjects (μερὶς, ἔξοδος, εἴσοδος) in a continuous list. The semicolon creates an awkward fragment in English.
