theological_decisions:
- issue: Imprecatory wish structure
  chosen_reading: Render the verse as a direct prayer-wish to the Lord against the wicked person.
  alternative_readings:
  - Render more flatly as a prediction of judgment rather than a wish
  rationale: The optative γένοιτο and vocative Κύριε strongly support an imprecatory petition rather than mere description.
  doctrine_reference: Preserve the source's force without softening theological tension.
