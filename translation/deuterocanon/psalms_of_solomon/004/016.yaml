id: PSS.4.16
reference: Psalms of Solomon 4:16
source:
  edition: lxx-swete-1909
  text: γένοιτο, Κύριε, ἡ μερὶς αὐτοῦ ἐν ἀτιμίᾳ ἐνώπιόν σου, ἡ ἔξοδος αὐτοῦ ἐν στεναγμοῖς καὶ ἡ εἴσοδος αὐτοῦ ἐν ἀρᾷ·
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: May his portion, O Lord, be in dishonor before you, his going out in groanings, and his coming in under a curse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lot' instead of 'portion.'
    reason: lexical_alternative
  - marker: b
    text: '''Going out'' and ''coming in'' likely form a paired biblical expression for the whole course of a person''s movements or life.'
    reason: cultural_note
  - marker: c
    text: Or 'in a curse'; the Greek expression is literally 'in curse.'
    reason: lexical_alternative
  - marker: d
    text: Or 'May his portion, O Lord, be in dishonor before you; his going out in groanings and his coming in under a curse.'.
    reason: previous_rendering
lexical_decisions:
- source_word: γένοιτο
  chosen: May ... be
  alternatives:
  - let ... be
  - may it become
  lexicon: LSJ
  rationale: Optative force suits an imprecatory wish or prayer. 'May ... be' is natural English and preserves the petitionary tone.
- source_word: μερὶς
  chosen: portion
  alternatives:
  - lot
  - share
  lexicon: LSJ
  rationale: '''Portion'' preserves the sense of one''s allotted share or fate and fits judgment language better than the more physical ''share''.'
- source_word: ἀτιμίᾳ
  chosen: dishonor
  alternatives:
  - disgrace
  - shame
  lexicon: LSJ
  rationale: '''Dishonor'' best matches the abstract noun and keeps the formal judicial-moral tone of the prayer. ''Shame'' is possible but slightly more emotional than the Greek requires.'
- source_word: ἔξοδος
  chosen: going out
  alternatives:
  - departure
  - exit
  lexicon: LSJ
  rationale: The paired expression with 'coming in' is idiomatic in biblical style for the course of one's movements or life-pattern. 'Going out' preserves that recognizable pairing.
- source_word: στεναγμοῖς
  chosen: groanings
  alternatives:
  - groans
  - lamentation
  lexicon: LSJ
  rationale: The plural dative after ἐν is rendered naturally as 'in groanings,' preserving the concrete, repeated sense of distress.
- source_word: εἴσοδος
  chosen: coming in
  alternatives:
  - entrance
  - arrival
  lexicon: LSJ
  rationale: Chosen to preserve the deliberate antithesis with 'going out.'
- source_word: ἀρᾷ
  chosen: under a curse
  alternatives:
  - in a curse
  - with a curse
  lexicon: LSJ
  rationale: Although formally ἐν + dative could be rendered 'in a curse,' English idiom is clearer with 'under a curse,' which conveys a state resting upon him without adding extra content.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Matches the project's default rendering for κύριος as a divine address.
