theological_decisions:
- issue: Implicit subject of the participles ὁρῶν and κρίνων
  chosen_reading: There is no one who sees and judges
  alternative_readings:
  - There is not one seeing and judging
  - He does not see and judge
  rationale: The Greek most naturally states the denial of any observer-judge rather
    than directly naming God. The chosen rendering preserves that denial without importing
    an explicit divine subject not present in the line.
