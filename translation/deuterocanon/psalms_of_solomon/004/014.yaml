id: PSS.4.14
reference: Psalms of Solomon 4:14
source:
  edition: lxx-swete-1909
  text: παρελογίσατο ἐν λόγοις ὅτι οὐκ ἔστιν ὁρῶν καὶ κρίνων,
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: He reasoned falsely in words, “There is no one who sees and judges.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “He deceived himself by words.”
    reason: lexical_alternative
lexical_decisions:
- source_word: παρελογίσατο
  chosen: reasoned falsely
  alternatives:
  - deceived himself
  - miscalculated
  - reasoned deceitfully
  lexicon: LEH, LSJ
  rationale: The verb carries the sense of faulty or deceptive reasoning. 'Reasoned
    falsely' preserves the cognitive force without over-specifying whether the deceit
    is self-directed or outwardly manipulative.
- source_word: ἐν λόγοις
  chosen: in words
  alternatives:
  - with words
  - in speech
  lexicon: LSJ
  rationale: A fairly literal rendering fits the Greek and keeps the phrase's emphasis
    on verbalized reasoning or spoken claim. 'In words' is slightly more transparent
    than the smoother but less literal 'in speech'.
- source_word: ὁρῶν
  chosen: sees
  alternatives:
  - is seeing
  - looks upon
  lexicon: LEH, LSJ
  rationale: The participle functions substantivally with an implied subject, best
    rendered in idiomatic English as 'one who sees.' In the clause, 'sees' keeps the
    present-force and reads naturally.
- source_word: κρίνων
  chosen: judges
  alternatives:
  - is judging
  - discerns
  lexicon: LEH, LSJ
  rationale: The participle pairs with 'sees' and likely refers to moral or judicial
    evaluation. 'Judges' is the most direct and contextually weighty rendering.
