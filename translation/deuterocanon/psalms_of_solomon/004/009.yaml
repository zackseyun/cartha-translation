id: PSS.4.9
reference: Psalms of Solomon 4:9
source:
  edition: lxx-swete-1909
  text: καὶ δικαιώσαισαν ὅσιοι τὸ κρίμα τοῦ θεοῦ αὐτῶν, ἐν τῷ ἐξαίρεσθαι ἁμαρτωλοὺς ἀπὸ προσώπου δικαίου, ἀνθρώπῳ ἀρέσκον λαλοῦντα μόνον μετὰ δόλου.
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: And may the devout vindicate the judgment of their God when sinners are removed from before the righteous man—even the one speaking what pleases a man, only with deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek shifts from plural “sinners” to a singular participial description (“one speaking…”), likely characterizing the sinner generically; the wording is syntactically awkward in the transmitted text.
    reason: alternative_reading
  - marker: b
    text: Or “from the presence of the righteous one.”
    reason: lexical_alternative
  - marker: c
    text: Or 'And let the devout vindicate the judgment of their God when sinners are removed from before the righteous man, one speaking only to please a man with deceit.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅσιοι
  chosen: the devout
  alternatives:
  - the holy ones
  - the godly
  lexicon: LSJ
  rationale: In this poetic context the term denotes pious people rather than sanctified objects or angelic beings. “The devout” is natural English and preserves the human moral sense.
- source_word: δικαιώσαισαν
  chosen: vindicate
  alternatives:
  - justify
  - acknowledge as just
  - declare righteous
  lexicon: LSJ
  rationale: With κρίμα as its object, the sense is not “make righteous” but affirm or show the justice of God's judgment. “Vindicate” preserves that forensic sense cleanly.
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - verdict
  - sentence
  lexicon: LSJ
  rationale: “Judgment” best fits the judicial setting and pairs naturally with δικαιώσαισαν.
- source_word: ἐν τῷ ἐξαίρεσθαι
  chosen: when ... are removed
  alternatives:
  - in the removing of
  - when ... are taken away
  lexicon: LSJ
  rationale: The construction is temporal here. “When ... are removed” gives idiomatic English while preserving the event-focused sense.
- source_word: ἀπὸ προσώπου δικαίου
  chosen: from before the righteous man
  alternatives:
  - from the presence of the righteous one
  - away from the righteous man
  lexicon: LSJ
  rationale: The idiom ἀπὸ προσώπου is preserved with “from before.” The singular δικαίου is kept as a representative singular; “man” follows the project's gender-accurate policy.
- source_word: ἀνθρώπῳ ἀρέσκον
  chosen: to please a man
  alternatives:
  - man-pleasing
  - pleasing a man
  lexicon: LSJ
  rationale: Given the Zone 1 wording, the phrase is rendered from the dative plus participle rather than importing a compounded reading. “To please a man” is the clearest English equivalent.
- source_word: λαλοῦντα μόνον μετὰ δόλου
  chosen: one speaking only ... with deceit
  alternatives:
  - speaking only deceitfully
  - uttering only with deceit
  lexicon: LSJ
  rationale: The participial phrase is awkward in Greek as transmitted, especially after plural ἁμαρτωλούς. This rendering stays close to the source while preserving the sense of deceptive speech.
