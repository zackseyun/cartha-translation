  to: Why do you, profane one, sit in a pious council, while your heart has gone far away from the Lord, provoking the God of Israel with proverbs?
  rationale: 'Adjudicator-modified: The project guidelines explicitly state that ὅσιος should be translated as ''pious'' or ''faithful'' rather than ''holy'' (which translates ἅγιος) to properly reflect the sociological realities of the Psalms of Solomon (the Hasidim/pious ones). The adjective ὁσίῳ modifying συνεδρίῳ is therefore better rendered ''pious council.'' The verdict is ''modify'' simply to supply the full verse text.'
