id: PSS.4.1
reference: Psalms of Solomon 4:1
source:
  edition: lxx-swete-1909
  text: Ἵνα τί σύ, βέβηλε, κάθησαι ἐν συνεδρίῳ ὁσίῳ, καὶ ἡ καρδία σου μακρὰν ἀφέστηκεν
    ἀπὸ τοῦ κυρίου, ἐν παροιμίαις παροργίζων τὸν θεὸν Ἰσραήλ;
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: Why do you, profane one, sit in a holy council, while your heart has gone
    far away from the Lord, provoking the God of Israel with proverbs?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with taunts,” “with proverbial sayings,” or “in riddling speech.”
    reason: lexical_alternative
lexical_decisions:
- source_word: βέβηλε
  chosen: profane one
  alternatives:
  - godless one
  - impious one
  lexicon: LSJ
  rationale: The vocative addresses the person as morally defiled or irreverent. “Profane
    one” preserves the sharp contrast with “holy council” better than the more interpretive
    “godless one.”
- source_word: συνεδρίῳ ὁσίῳ
  chosen: holy council
  alternatives:
  - holy assembly
  - sacred council
  lexicon: LSJ
  rationale: συνέδριον denotes a seated deliberative gathering or council, and ὅσιος
    marks it as holy. “Holy council” keeps both the institutional and moral force
    of the phrase.
- source_word: ἡ καρδία σου μακρὰν ἀφέστηκεν
  chosen: your heart has gone far away
  alternatives:
  - your heart has stood far off
  - your heart has departed far away
  lexicon: LSJ
  rationale: The perfect of ἀφίστημι conveys a settled state resulting from departure.
    “Has gone far away” expresses both the movement and the resulting estrangement
    in natural English.
- source_word: τοῦ κυρίου
  chosen: the Lord
  alternatives:
  - the lord
  lexicon: LSJ
  rationale: Following project doctrine, κύριος is rendered “Lord.” The context is
    clearly divine, so the capitalized form is appropriate.
- source_word: ἐν παροιμίαις
  chosen: with proverbs
  alternatives:
  - with taunts
  - with proverbial sayings
  - in riddling speech
  lexicon: LSJ
  rationale: The most direct sense of παροιμίαι is “proverbs” or proverbial sayings.
    Because the exact nuance here may shade toward mocking or pointed sayings, the
    more literal rendering is kept in the main text and alternatives are preserved
    in a footnote.
- source_word: παροργίζων
  chosen: provoking
  alternatives:
  - provoking to anger
  - exasperating
  lexicon: LSJ
  rationale: The participle denotes causing anger. “Provoking” is concise and idiomatic
    while allowing the object “the God of Israel” to carry the full force.
