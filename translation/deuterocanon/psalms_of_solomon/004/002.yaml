id: PSS.4.2
reference: Psalms of Solomon 4:2
source:
  edition: lxx-swete-1909
  text: περισσὸς ἐν λόγοις, περισσὸς ἐν σημειώσει ὑπὲρ πάντας, ὁ σκληρὸς ἐν λόγοις
    κατακρῖναι ἁμαρτωλοὺς ἐν κρίσει.
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: Excessive in speech, excessive in show above all others, harsh in speech to
    condemn sinners in judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'excessive in display,' 'excessive in distinction,' or 'excessive in
      outward show' for the difficult Greek term σημειώσει.
    reason: lexical_alternative
lexical_decisions:
- source_word: περισσός
  chosen: excessive
  alternatives:
  - abundant
  - overmuch
  - beyond measure
  lexicon: LSJ
  rationale: In both occurrences the word carries the sense of going beyond proper
    measure, not merely being plentiful. 'Excessive' preserves the verse's moral criticism
    and works naturally in English.
- source_word: λόγοις
  chosen: speech
  alternatives:
  - words
  - talk
  lexicon: LSJ
  rationale: The dative phrase ἐν λόγοις here describes the man's manner of speaking.
    'Speech' is slightly more idiomatic than repeating 'words' twice in English while
    still staying close to the Greek.
- source_word: σημειώσει
  chosen: show
  alternatives:
  - display
  - distinction
  - outward display
  - ostentation
  lexicon: LSJ
  rationale: The noun literally relates to marking or distinction, but in this denunciatory
    context with ὑπὲρ πάντας it likely points to self-conscious display or conspicuousness.
    'Show' communicates that sense in readable modern English without over-interpreting.
- source_word: ὑπὲρ πάντας
  chosen: above all others
  alternatives:
  - beyond all
  - more than everyone
  lexicon: LSJ
  rationale: This comparative phrase intensifies the accusation by placing the person
    beyond everyone else in such excess. 'Above all others' is idiomatic and preserves
    the comparative force.
- source_word: σκληρός
  chosen: harsh
  alternatives:
  - hard
  - severe
  lexicon: LSJ
  rationale: In the phrase ὁ σκληρὸς ἐν λόγοις, the sense is severe or hard in speech.
    'Harsh' best matches natural English for condemning speech.
- source_word: κατακρῖναι
  chosen: to condemn
  alternatives:
  - to judge against
  - to pronounce guilty
  lexicon: LSJ
  rationale: The infinitive expresses the purpose or tendency of his harsh speech.
    'To condemn' straightforwardly captures the judicial force.
- source_word: ἐν κρίσει
  chosen: in judgment
  alternatives:
  - at judgment
  - in court
  lexicon: LSJ
  rationale: The phrase keeps the judicial setting in view. 'In judgment' is broad
    enough to preserve that setting without forcing a narrower courtroom image.
