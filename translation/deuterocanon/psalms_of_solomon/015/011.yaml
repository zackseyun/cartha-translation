id: PSS.15.11
reference: Psalms of Solomon 15:11
source:
  edition: lxx-swete-1909
  text: καὶ ἡ κληρονομία τῶν ἁμαρτωλῶν ἀπώλεια καὶ σκότος, καὶ ἀνομία αὐτῶν διώξεται
    αὐτοὺς ἕως ᾅδου κάτω.
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: And the inheritance of sinners is destruction and darkness, and their lawlessness
    will pursue them as far as Hades below.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to Hades below."
    reason: lexical_alternative
lexical_decisions:
- source_word: κληρονομία
  chosen: inheritance
  alternatives:
  - heritage
  - portion
  lexicon: BDAG
  rationale: '"Inheritance" preserves the concrete allotment language of the Greek
    and fits the clause''s contrastive sense: what sinners ultimately receive is ruin,
    not blessing.'
- source_word: ἁμαρτωλῶν
  chosen: sinners
  alternatives:
  - sinful ones
  lexicon: BDAG
  rationale: '"Sinners" is the natural English equivalent and cleanly represents the
    substantival plural without unnecessary expansion.'
- source_word: ἀπώλεια
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: BDAG
  rationale: '"Destruction" best conveys catastrophic loss in readable modern English
    without the archaic or doctrinal overtones of "perdition."'
- source_word: σκότος
  chosen: darkness
  alternatives:
  - gloom
  lexicon: BDAG
  rationale: '"Darkness" is the standard gloss and preserves both the literal image
    and its moral-eschatological force.'
- source_word: ἀνομία
  chosen: lawlessness
  alternatives:
  - wickedness
  - iniquity
  lexicon: BDAG
  rationale: '"Lawlessness" keeps the direct connection to ἀνομία rather than generalizing
    it to evil in the abstract.'
- source_word: διώξεται
  chosen: will pursue
  alternatives:
  - will chase
  - will hound
  - will persecute
  lexicon: BDAG
  rationale: '"Will pursue" preserves the future verbal force and the image of relentless
    pursuit without importing the narrower sense "persecute."'
- source_word: ἕως ᾅδου κάτω
  chosen: down to Hades
  alternatives:
  - to Hades below
  - as far as Hades beneath
  lexicon: BDAG
  rationale: This rendering captures both the destination (ᾅδης) and the downward
    force of κάτω in idiomatic English. "Hades" is preferred over "hell" because the
    Greek names the underworld/the realm of the dead, not Gehenna.
