theological_decisions:
- issue: Whether to render ᾅδης as "Hades" or "hell"
  chosen_reading: Hades
  alternative_readings:
  - hell
  - the grave
  rationale: The Greek text specifically uses ᾅδης, so the translation preserves that
    term rather than collapsing it into the more interpretively loaded "hell." "The
    grave" is possible in some contexts but is less precise here given the personalizing,
    punitive imagery of pursuit.
