id: PSS.15.12
reference: Psalms of Solomon 15:12
source:
  edition: lxx-swete-1909
  text: ἡ κληρονομία αὐτῶν οὐχ εὑρεθήσεται τοῖς τέκνοις αὐτῶν,
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: Their inheritance will not be found by their children,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Their inheritance will not be found among/to their children,” that is,
      it will not pass on to their descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: κληρονομία
  chosen: inheritance
  alternatives:
  - heritage
  - possession
  lexicon: BDAG
  rationale: κληρονομία ordinarily denotes an inheritance or hereditary possession.
    “Inheritance” preserves the legal/familial sense most directly and fits the mention
    of children.
- source_word: οὐχ εὑρεθήσεται
  chosen: will not be found
  alternatives:
  - will not be discovered
  - will not be obtained
  - will not remain
  lexicon: BDAG
  rationale: The future passive of εὑρίσκω is rendered transparently as “will not
    be found.” Although a more idiomatic English expansion could paraphrase the sense
    as loss or non-transmission, the Greek wording itself is more restrained and should
    be preserved.
- source_word: τοῖς τέκνοις αὐτῶν
  chosen: for their children
  alternatives:
  - to their children
  - among their children
  lexicon: BDAG
  rationale: The dative is left broad with “for,” which best reflects the relation
    without over-specifying whether the sense is possession, benefit, or transmission.
    “Children” is the natural rendering of τέκνα here.
