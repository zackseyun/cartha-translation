id: PSS.15.8
reference: Psalms of Solomon 15:8
source:
  edition: lxx-swete-1909
  text: ὅτι τὸ σημεῖον τοῦ θεοῦ ἐπὶ δικαίους εἰς σωτηρίαν· λιμὸς καὶ ῥομφαία καὶ θάνατος
    ἀπὸ δικαίων μακράν.
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: For the sign of God is upon the righteous for salvation; famine and sword
    and death are far from the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "mark of God."
    reason: lexical_alternative
  - marker: b
    text: Or "the just."
    reason: lexical_alternative
  - marker: c
    text: θανάτος can sometimes carry the sense of pestilence in judgment lists, but
      here it is rendered more broadly as "death."
    reason: alternative_reading
lexical_decisions:
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - mark
  - token
  lexicon: BDAG
  rationale: '"Sign" preserves the concrete yet slightly open-ended sense of a visible
    or recognized indicator of divine favor, without narrowing it to a merely physical
    mark.'
- source_word: δικαίους / δικαίων
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: BDAG
  rationale: The phrase refers generically to those who are righteous. "The righteous"
    is natural English and preserves the class sense better than the stiffer "righteous
    ones."
- source_word: εἰς σωτηρίαν
  chosen: for salvation
  alternatives:
  - unto salvation
  - for deliverance
  lexicon: BDAG
  rationale: '"For salvation" is clear modern English and preserves the goal-oriented
    force of εἰς. "Deliverance" is possible, but "salvation" better retains the term''s
    theological weight.'
- source_word: λιμός
  chosen: famine
  alternatives:
  - hunger
  lexicon: BDAG
  rationale: In a judgment-context list with sword and death, "famine" is the more
    precise and idiomatic rendering.
- source_word: ῥομφαία
  chosen: sword
  alternatives:
  - blade
  lexicon: BDAG
  rationale: '"Sword" is the standard rendering and fits the stock triad of calamities
    without unnecessary specificity.'
- source_word: θάνατος
  chosen: death
  alternatives:
  - deadly plague
  lexicon: BDAG
  rationale: The plain sense is "death." Although in some judgment lists it can shade
    toward pestilence, nothing in this verse alone requires that narrower rendering.
- source_word: μακράν
  chosen: far from
  alternatives:
  - distant from
  lexicon: BDAG
  rationale: '"Far from" is the most natural predicate expression in English for the
    separation being described.'
