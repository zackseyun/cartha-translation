lexical_decisions:
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - mark
  - token
  lexicon: BDAG
  rationale: '"Sign" preserves the concrete yet slightly open-ended sense of a visible or recognized indicator of divine favor, without narrowing it to a merely physical mark.'
- source_word: δικαίους / δικαίων
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: BDAG
  rationale: The phrase refers generically to those who are righteous. "The righteous" is natural English and preserves the class sense better than the stiffer "righteous ones."
- source_word: εἰς σωτηρίαν
  chosen: for salvation
  alternatives:
  - unto salvation
  - for deliverance
  lexicon: BDAG
  rationale: '"For salvation" is clear modern English and preserves the goal-oriented force of εἰς. "Deliverance" is possible, but "salvation" better retains the term''s theological weight.'
- source_word: λιμός
  chosen: famine
  alternatives:
  - hunger
  lexicon: BDAG
  rationale: In a judgment-context list with sword and death, "famine" is the more precise and idiomatic rendering.
- source_word: ῥομφαία
  chosen: sword
  alternatives:
  - blade
  lexicon: BDAG
  rationale: '"Sword" is the standard rendering and fits the stock triad of calamities without unnecessary specificity.'
- source_word: θάνατος
  chosen: death
  alternatives:
  - deadly plague
  lexicon: BDAG
  rationale: The plain sense is "death." Although in some judgment lists it can shade toward pestilence, nothing in this verse alone requires that narrower rendering.
- source_word: μακράν
  chosen: far from
  alternatives:
  - distant from
  lexicon: BDAG
  rationale: '"Far from" is the most natural predicate expression in English for the separation being described.'
