id: PSS.15.9
reference: Psalms of Solomon 15:9
source:
  edition: lxx-swete-1909
  text: φεύξονται γὰρ ὡς διωκόμενοι πολέμου ἀπὸ ὁσίων, καταδιώξονται δὲ ἁμαρτωλοὺς καὶ καταλήψονται· καὶ οὐκ ἐκφεύξονται οἱ ποιοῦντες ἀνομίαν τὸ κρίμα Κυρίου, ὡς ὑπὸ πολεμίων ἐμπείρων καταλημφθήσονται.
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: For they will flee For they will flee from the pious as those pursued by war, but they will pursue sinners and overtake them; and those who practice lawlessness will not escape the Lord’s judgment; they will be captured like men seized by experienced enemies. as those pursued by war, but they will pursue sinners and overtake them; and those who practice lawlessness will not escape the Lord’s judgment; they will be captured like men seized by experienced enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the godly' for 'from the holy ones.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'as those pursued by war' is compressed Greek and may also be understood more dynamically as 'like people driven off by war.'
    reason: alternative_reading
  - marker: c
    text: Or 'from the holy ones'.
    reason: previous_rendering
lexical_decisions:
- source_word: φεύξονται
  chosen: will flee
  alternatives:
  - will escape
  - will run away
  lexicon: BDAG
  rationale: Future middle conveys withdrawal or flight; 'will flee' is the most direct and natural English rendering.
- source_word: ὡς διωκόμενοι πολέμου
  chosen: as those pursued by war
  alternatives:
  - like men driven by war
  - as people chased by battle
  lexicon: BDAG
  rationale: The phrase is somewhat compressed; retaining 'war' preserves the vivid image without over-interpreting the exact mechanism of pursuit.
- source_word: ἀπὸ ὁσίων
  chosen: from the holy ones
  alternatives:
  - from the godly
  - from saints
  lexicon: BDAG
  rationale: ὅσιος here refers to the pious or holy people. 'Holy ones' stays close to the Greek while remaining readable.
- source_word: καταδιώξονται
  chosen: will pursue
  alternatives:
  - will hunt down
  - will chase
  lexicon: BDAG
  rationale: The prefixed verb intensifies pursuit, but 'will pursue' keeps the formal parallel with the surrounding verbs and avoids adding too much color.
- source_word: καταλήψονται
  chosen: overtake
  alternatives:
  - seize
  - catch
  lexicon: BDAG
  rationale: In sequence with pursuit, 'overtake' fits naturally and distinguishes this verb from the later passive 'will be captured.'
- source_word: οἱ ποιοῦντες ἀνομίαν
  chosen: those who practice lawlessness
  alternatives:
  - those doing wickedness
  - the lawless
  lexicon: BDAG
  rationale: The participial construction is durative or characteristic; 'practice lawlessness' reflects ongoing conduct better than a simple label.
- source_word: τὸ κρίμα Κυρίου
  chosen: the Lord’s judgment
  alternatives:
  - the judgment of the Lord
  - the Lord’s sentence
  lexicon: BDAG
  rationale: This is the most natural English expression and preserves κύριος as 'Lord' per project defaults.
- source_word: ὡς ὑπὸ πολεμίων ἐμπείρων καταλημφθήσονται
  chosen: they will be captured like men seized by experienced enemies
  alternatives:
  - they will be overtaken as by skilled enemies
  - they will be taken like those caught by seasoned foes
  lexicon: BDAG
  rationale: ἐμπείρων suggests experienced or seasoned foes. 'Captured' suits the passive and maintains the military imagery established earlier.
