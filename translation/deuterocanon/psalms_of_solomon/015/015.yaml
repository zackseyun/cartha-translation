id: PSS.15.15
reference: Psalms of Solomon 15:15
source:
  edition: lxx-swete-1909
  text: οἱ δὲ φοβούμενοι τὸν κύριον ἐλεηθήσονται ἐν αὐτῇ, καὶ ζήσονται ἐν τῇ ἐλεημοσύνῃ
    τοῦ θεοῦ αὐτῶν καὶ ἁμαρτωλοὶ ἀπολοῦνται εἰς τὸν αἰῶνα χρόνον.
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: But those who fear the Lord will be shown mercy on that day, and they will
    live by the mercy of their God, but sinners will perish forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''in it''; likely referring to the day of the Lord''s judgment just
      mentioned, though it may also echo the land/earth of the previous line.'
    reason: alternative_reading
lexical_decisions:
- source_word: φοβούμενοι
  chosen: those who fear
  alternatives:
  - those fearing
  - those who revere
  lexicon: BDAG
  rationale: The participle functions substantivally for a group characterized by
    fearing the Lord. 'Those who fear' is natural English and preserves the covenantal-religious
    sense without weakening it to mere respect.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: DOCTRINE.md gives κύριος the default rendering 'Lord.' This also fits
    the reverential language of the Psalms of Solomon.
- source_word: ἐλεηθήσονται
  chosen: will be shown mercy
  alternatives:
  - will receive mercy
  - will be pitied
  lexicon: BDAG
  rationale: The future passive is best represented explicitly. 'Will be shown mercy'
    preserves both the passive form and the theological emphasis on mercy granted
    rather than earned.
- source_word: ἐν αὐτῇ
  chosen: on that day
  alternatives:
  - in it
  - in the land
  - in her
  lexicon: BDAG
  rationale: The pronoun's antecedent is not repeated in Greek. From the immediate
    context, the most likely antecedent is 'the day' of the Lord's judgment in verse
    13. 'On that day' makes the sense clear in English, while the ambiguity is preserved
    in a footnote.
- source_word: ἐν τῇ ἐλεημοσύνῃ
  chosen: by the mercy
  alternatives:
  - in the mercy
  - through the mercy
  - by the merciful giving
  lexicon: BDAG
  rationale: ἐλεημοσύνη can denote mercy or merciful action; here the sense is not
    almsgiving but divine mercy. 'By the mercy' communicates the sustaining means
    by which they live.
- source_word: ἀπολοῦνται
  chosen: will perish
  alternatives:
  - will be destroyed
  - will be lost
  lexicon: BDAG
  rationale: '''Will perish'' is idiomatic, grave, and sufficiently transparent for
    the future middle/passive form in this judgment context.'
- source_word: εἰς τὸν αἰῶνα χρόνον
  chosen: forever
  alternatives:
  - for an age
  - for all time
  - for eternal time
  lexicon: BDAG
  rationale: This idiom intensifies duration. 'Forever' is the clearest natural English
    equivalent without unnecessary awkwardness.
