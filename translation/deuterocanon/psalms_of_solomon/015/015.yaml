theological_decisions:
- issue: Antecedent of αὐτῇ
  chosen_reading: The phrase refers to the day of the Lord's judgment mentioned in
    the immediate context, so the main text reads 'on that day.'
  alternative_readings:
  - The phrase could more literally remain 'in it,' leaving the antecedent implicit.
  - The antecedent could be 'the earth/land' from verse 14, yielding 'in it' or 'in
    the land.'
  rationale: 'Verse 13 explicitly mentions ''the day of the Lord''s judgment,'' and
    verse 14 continues that sentence. Reading αὐτῇ as referring back to that day gives
    the most coherent sense: the God-fearing receive mercy in the very time of judgment.'
  doctrine_reference: Preserve theological tension rather than resolve it; alternative
    preserved in footnote.
