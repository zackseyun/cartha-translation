id: PSS.15.7
reference: Psalms of Solomon 15:7
source:
  edition: lxx-swete-1909
  text: ὅταν ἐξέλθῃ ἐφʼ ἁμαρτωλοὺς ἀπὸ προσώπου Κυρίου, ὀλεθρεύσαι πᾶσαν ὑπόστασιν ἁμαρτωλῶν.
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: when it goes out against sinners from the presence of the Lord, to destroy all the substance of sinners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every support'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  entry: null
  rationale: The conjunction introduces a temporal clause. 'When' is natural English and preserves the forward-looking sense without overstating repetition.
- source_word: ἐξέλθῃ
  chosen: it goes out
  alternatives:
  - he goes out
  - comes forth
  lexicon: BDAG
  entry: null
  rationale: The Greek has an implicit singular subject, supplied by the preceding context rather than named here. 'It goes out' preserves that ellipsis better than adding a more specific subject the verse itself does not state.
- source_word: ἐφʼ ἁμαρτωλοὺς
  chosen: against sinners
  alternatives:
  - upon sinners
  lexicon: BDAG
  entry: null
  rationale: With motion, ἐπί here conveys direction toward hostile action. 'Against sinners' makes the judgment sense clear in idiomatic English.
- source_word: ἀπὸ προσώπου Κυρίου
  chosen: from the presence of the Lord
  alternatives:
  - from before the Lord
  lexicon: LSJ
  entry: null
  rationale: The idiom literally refers to what proceeds from before someone's face/presence. 'From the presence of the Lord' is clear, natural, and preserves the source of the judgment. 'Lord' follows the doctrine default for κύριος.
- source_word: ὀλεθρεύσαι
  chosen: to destroy
  alternatives:
  - to wipe out
  - to exterminate
  lexicon: LSJ
  entry: null
  rationale: 'The infinitive expresses purpose or result: the destructive force goes out in order to bring ruin. ''To destroy'' is strong, direct, and not overly interpretive.'
- source_word: πᾶσαν ὑπόστασιν ἁμαρτωλῶν
  chosen: every support of sinners
  alternatives:
  - every substance of sinners
  - every standing of sinners
  - every possession of sinners
  lexicon: LSJ
  entry: null
  rationale: ὑπόστασις has a broad range, including substance, standing, property, or that which undergirds something. In this judgment context, 'support' best conveys the total removal of what upholds sinners, while a footnote preserves the more literal alternatives.
