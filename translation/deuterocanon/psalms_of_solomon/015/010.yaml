lexical_decisions:
- source_word: σημεῖον
  chosen: mark
  alternatives:
  - sign
  lexicon: BDAG
  rationale: '"Mark" fits an identifying sign placed on the forehead and reads more naturally in English than the broader "sign."'
- source_word: ἀπωλείας
  chosen: of destruction
  alternatives:
  - of ruin
  - of perdition
  lexicon: BDAG
  rationale: The genitive most naturally qualifies the mark as belonging to or signifying destruction. "Destruction" is clear, weighty, and less archaic than "perdition."
- source_word: ἐπὶ
  chosen: upon
  alternatives:
  - 'on'
  lexicon: BDAG
  rationale: With τοῦ μετώπου, the sense is location on the forehead. "Upon" preserves the elevated tone while remaining natural.
- source_word: μέτωπον
  chosen: forehead
  lexicon: BDAG
  rationale: This is the direct anatomical sense and needs no paraphrase.
