id: PSS.15.4
reference: Psalms of Solomon 15:4
source:
  edition: lxx-swete-1909
  text: καὶ τί δυνατὸς ἄνθρωπος, εἰ μὴ ἐξομολογήσασθαι τῷ ὀνόματί σου;
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: And what is man able to do, except give thanks to your name?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confess your name' or 'praise your name.' The Greek verb can carry any
      of these senses depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  chosen: what
  alternatives:
  - who
  - what thing
  lexicon: LSJ
  rationale: Used interrogatively to ask what action or capacity remains to man, not
    to identify a particular person.
- source_word: δυνατὸς
  chosen: able to do
  alternatives:
  - capable
  - strong enough
  lexicon: LSJ
  rationale: Here δυνατός expresses capacity rather than strength. 'Able to do' makes
    the implied verbal idea natural in English.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - human being
  - a person
  - humankind
  lexicon: LSJ
  rationale: Rendered 'man' to preserve the generic singular and align with the project's
    gender-accurate policy where the Greek is singular masculine with representative
    force.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - if not
  - unless
  lexicon: LSJ
  rationale: 'In this rhetorical question, εἰ μὴ functions idiomatically as an exception
    clause: man is able to do nothing except the action that follows.'
- source_word: ἐξομολογήσασθαι
  chosen: give thanks
  alternatives:
  - confess
  - praise
  lexicon: LSJ
  rationale: Although the verb can mean 'confess,' in biblical Greek with reference
    to God's name it commonly carries the sense of grateful praise or thanksgiving.
    'Give thanks' best fits the doxological context and the dative phrase that follows.
- source_word: τῷ ὀνόματί σου
  chosen: to your name
  alternatives:
  - your name
  - before your name
  lexicon: LSJ
  rationale: Kept the dative relationship explicit with 'to your name,' preserving
    the common biblical idiom of thanksgiving directed to God's name rather than smoothing
    it away.
