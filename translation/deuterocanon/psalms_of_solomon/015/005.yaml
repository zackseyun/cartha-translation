id: PSS.15.5
reference: Psalms of Solomon 15:5
source:
  edition: lxx-swete-1909
  text: ψαλμὸν καινὸν μετὰ ᾠδῆς ἐν εὐφροσύνῃ καρδίας, καρπὸν χειλέων ἐν ὀργάνῳ ἤρμοσμένῳ γλώσσης, ἀπαρχὴν χειλέων ἐν ἀπὸ καρδίας ὁσίας καὶ δικαίας·
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: a new psalm with song, in the joy of the heart; the fruit of lips with the well-tuned instrument of the tongue; the firstfruits of lips from a holy and righteous heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the fruit of lips with an instrument fitted to the tongue.' The Greek phrase is compact and somewhat difficult, so the main text gives its most natural sense in English.
    reason: lexical_alternative
  - marker: b
    text: The expressions 'fruit of lips' and 'firstfruits of lips' preserve the poem's offering imagery rather than paraphrasing it as mere speech or praise.
    reason: cultural_note
  - marker: c
    text: Or 'with the tongue as a well-tuned instrument'.
    reason: previous_rendering
lexical_decisions:
- source_word: ψαλμὸν καινόν
  chosen: a new psalm
  alternatives:
  - a fresh psalm
  - a new hymn
  lexicon: LSJ
  rationale: ψαλμός naturally denotes a psalm or song for singing; 'psalm' preserves the literary-religious sense better than the broader 'hymn.' καινός is straightforwardly 'new.'
- source_word: ᾠδῆς
  chosen: song
  alternatives:
  - ode
  lexicon: LSJ
  rationale: ᾠδή is the ordinary word for 'song.' 'Ode' is too formal and less natural in modern English.
- source_word: ἐν εὐφροσύνῃ καρδίας
  chosen: in the joy of the heart
  alternatives:
  - with gladness of heart
  - in heart-gladness
  lexicon: LSJ
  rationale: εὐφροσύνη denotes joy/gladness. 'Joy of the heart' is natural English and preserves the inward-source genitive.
- source_word: καρπὸν χειλέων
  chosen: the fruit of lips
  alternatives:
  - fruit from the lips
  - utterance of the lips
  lexicon: LSJ
  rationale: This is a recognizable biblical idiom for spoken praise or confession. Retaining 'fruit of lips' preserves the metaphor rather than flattening it into mere 'words.'
- source_word: ἐν ὀργάνῳ ἤρμοσμένῳ γλώσσης
  chosen: with the tongue as a well-tuned instrument
  alternatives:
  - with a tongue fitted as an instrument
  - with the instrument of a well-tuned tongue
  lexicon: LSJ
  rationale: ὄργανον is 'instrument,' and ἁρμόζω in the participial form conveys something fitted, joined, or tuned. The phrase is somewhat compressed in Greek; this rendering makes explicit that the tongue is being compared to or functioning as the instrument.
- source_word: ἀπαρχὴν χειλέων
  chosen: the firstfruits of lips
  alternatives:
  - first offering of lips
  - first portion of the lips
  lexicon: LSJ
  rationale: ἀπαρχή is best rendered 'firstfruits,' preserving sacrificial/offering imagery rather than reducing it to a generic 'offering.'
- source_word: ἀπὸ καρδίας ὁσίας καὶ δικαίας
  chosen: from a holy and righteous heart
  alternatives:
  - from a devout and righteous heart
  - from a holy and just heart
  lexicon: LSJ
  rationale: ὁσία carries the sense of holy/devout/pious, and δικαία of righteous/just. 'Holy and righteous' best preserves the moral-religious pairing in familiar biblical English.
