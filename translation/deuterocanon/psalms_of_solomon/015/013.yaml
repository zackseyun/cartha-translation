id: PSS.15.13
reference: Psalms of Solomon 15:13
source:
  edition: lxx-swete-1909
  text: αἱ γὰρ ἁμαρτίαι ἐξερημώσουσιν οἴκους ἁμαρτωλῶν, καὶ ἀπολοῦνται ἁμαρτωλοὶ ἐν
    ἡμέρᾳ κρίσεως Κυρίου εἰς τὸν αἰῶνα,
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: For sins will lay waste the houses of sinners, and sinners will perish on
    the day of the Lord’s judgment forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will devastate' or 'will make desolate.'
    reason: lexical_alternative
  - marker: b
    text: Lit. 'for the age'; here rendered 'forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁμαρτίαι
  chosen: sins
  alternatives:
  - sinful acts
  - transgressions
  lexicon: BDAG
  rationale: The plural refers to concrete sinful deeds or accumulated sins; 'sins'
    is the most direct and natural English equivalent.
- source_word: ἐξερημώσουσιν
  chosen: will lay waste
  alternatives:
  - will devastate
  - will desolate
  lexicon: LSJ
  rationale: The verb carries the sense of making desolate or ruining. 'Lay waste'
    preserves the severity and slightly formal tone without becoming obscure.
- source_word: οἴκους
  chosen: houses
  alternatives:
  - households
  lexicon: LSJ
  rationale: The basic meaning is 'houses.' While 'households' is possible in some
    contexts, nothing in this verse requires expanding it beyond the literal term.
- source_word: ἁμαρτωλῶν
  chosen: of sinners
  alternatives:
  - of sinful people
  - of the wicked
  lexicon: BDAG
  rationale: The genitive is straightforward and matches the repeated noun later in
    the verse, preserving the rhetorical parallel.
- source_word: ἀπολοῦνται
  chosen: will perish
  alternatives:
  - will be destroyed
  - will come to ruin
  lexicon: BDAG
  rationale: The verb here denotes ruin or destruction. 'Will perish' is idiomatic
    English and preserves the solemn judicial sense without over-specifying the mechanism.
- source_word: ἐν ἡμέρᾳ κρίσεως Κυρίου
  chosen: on the day of the Lord’s judgment
  alternatives:
  - in the day of the Lord’s judgment
  - on the day of judgment of the Lord
  lexicon: BDAG
  rationale: This keeps the genitival relation explicit while producing natural English.
    'On the day' is the most idiomatic rendering for temporal ἐν here.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - for the age
  lexicon: BDAG
  rationale: In this judgment context the phrase naturally conveys enduring finality.
    'Forever' is clear modern English and fits the verse’s warning.
