theological_decisions:
- issue: Scope of 'forever' (εἰς τὸν αἰῶνα)
  chosen_reading: It modifies 'will perish,' yielding 'will perish forever.'
  alternative_readings:
  - It could be read more loosely as intensifying the whole judgment statement.
  - A more wooden rendering would be 'for the age.'
  rationale: Placed after the clause about sinners perishing, the phrase most naturally
    qualifies their destruction rather than the timing of the judgment day itself.
    'Forever' communicates the force in readable English.
