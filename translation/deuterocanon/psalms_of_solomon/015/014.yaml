id: PSS.15.14
reference: Psalms of Solomon 15:14
source:
  edition: lxx-swete-1909
  text: ὅταν ἐπισκέπτηται ὁ θεὸς τὴν γῆν ἐν κρίματι αὐτοῦ.
  language: Greek
  pages:
  - 805
  validation: swete_direct
translation:
  text: when God visits the earth with his judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when God visits the land in his judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a temporal clause with a subjunctive verb. 'When' is natural
    English and fits the verse's concise, forward-looking sense; 'whenever' is possible
    but sounds more iterative than the context requires.
- source_word: ἐπισκέπτηται
  chosen: visits
  alternatives:
  - comes upon
  - inspects
  - attends to
  lexicon: BDAG
  rationale: The verb carries the sense of visiting or attending, often with purposeful
    intervention. 'Visits' preserves that biblical visitation language without over-interpreting
    the action as either purely benevolent or purely punitive; the following phrase
    supplies the judicial force.
- source_word: γῆν
  chosen: the earth
  alternatives:
  - the land
  lexicon: LSJ
  rationale: Although γῆ can mean either 'land' or 'earth,' this context is broad
    and general rather than tied to a specific territory, so 'the earth' best matches
    the scope.
- source_word: ἐν κρίματι αὐτοῦ
  chosen: in his judgment
  alternatives:
  - with his judgment
  - for judgment
  lexicon: BDAG
  rationale: κρίμα denotes judgment or judicial decision. 'In his judgment' stays
    close to the Greek construction and preserves the solemn, judicial setting. 'With
    his judgment' is also viable but slightly more interpretive.
