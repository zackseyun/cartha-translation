id: PSS.15.2
reference: Psalms of Solomon 15:2
source:
  edition: lxx-swete-1909
  text: ὅτι ἐλπὶς καὶ καταφυγὴ τῶν πτωχῶν σύ, ὁ θεός.
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: For you are the hope and refuge of the poor, O God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the ground or explanation for the surrounding statement; 'For'
    fits natural English while preserving the causal sense.
- source_word: ἐλπὶς
  chosen: hope
  lexicon: BDAG
  rationale: The noun straightforwardly denotes 'hope'; no broader paraphrase is needed.
- source_word: καταφυγὴ
  chosen: refuge
  alternatives:
  - shelter
  - place of refuge
  lexicon: BDAG
  rationale: '''Refuge'' is the most direct and idiomatic rendering for a place or
    source of protection, and it pairs well with ''hope'' in English.'
- source_word: τῶν πτωχῶν
  chosen: of the poor
  alternatives:
  - of the needy
  lexicon: BDAG
  rationale: The genitive is naturally rendered 'of the poor.' 'Poor' preserves the
    social-economic sense more directly than the broader 'needy'.
- source_word: σύ
  chosen: you are
  alternatives:
  - you
  lexicon: BDAG
  rationale: Greek uses an explicit pronoun with nominal predicates; English normally
    requires the copula, so 'you are' makes the clause grammatical without adding
    interpretive content.
- source_word: ὁ θεός
  chosen: O God
  alternatives:
  - God
  lexicon: BDAG
  rationale: In context this functions as direct address, so the vocative sense is
    best conveyed in English as 'O God.'
