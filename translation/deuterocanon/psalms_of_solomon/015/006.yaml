  from: by evil; flame of fire and the wrath of the unrighteous will not touch him.
  to: by evil, by a flame of fire; and the wrath against the unrighteous will not touch him.
  rationale: 'Adjudicator-modified: The reviewer is entirely correct on both counts. First, `φλογὸς` is genitive and therefore governed by `ἀπὸ` (''by/from a flame of fire''), not a nominative subject of `ἅψεται`. Second, the immediate context in 15:7 explicitly identifies this wrath as coming ''from the presence of the Lord'' against sinners, confirming that `ἀδίκων` is an objective genitive (''wrath against the unrighteous''). I am modifying the proposal slightly to include the definite article (''the wrath'') for smoother English flow,'
