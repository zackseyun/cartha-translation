theological_decisions:
- issue: Whether ἀπὸ κακοῦ should be rendered morally ('evil') or more generally ('harm').
  chosen_reading: by evil
  alternative_readings:
  - from evil
  - by harm
  rationale: The immediate context then names destructive forces in vivid terms, suggesting a broad moral-destructive reality rather than mere inconvenience. “Evil” preserves that theological and ethical weight without narrowing too far.
