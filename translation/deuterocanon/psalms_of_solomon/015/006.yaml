id: PSS.15.6
reference: Psalms of Solomon 15:6
source:
  edition: lxx-swete-1909
  text: ὁ ποιῶν ταῦτα οὐ σαλευθήσεται εἰς τὸν αἰῶνα ἀπὸ κακοῦ, φλογὸς πυρὸς καὶ ὀργὴ ἀδίκων οὐχ ἅψεται αὐτοῦ·
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: The one who does these things will never be shaken by evil, by a flame of fire; and the wrath against the unrighteous will not touch him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will not be moved from evil” or “will not be shaken by harm.”
    reason: lexical_alternative
  - marker: b
    text: “Flame of fire” is a vivid Greek expression; alternatively, “fiery flame.”
    reason: lexical_alternative
  - marker: c
    text: Or “the anger of unjust men.”
    reason: lexical_alternative
  - marker: d
    text: Or 'by evil; flame of fire and the wrath of the unrighteous will not touch him.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ ποιῶν
  chosen: The one who does
  alternatives:
  - Whoever does
  - He who does
  lexicon: BDAG
  rationale: A substantival participle is best rendered with a natural English subject phrase. “The one who does” preserves the generic singular without archaic stiffness.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these
  lexicon: BDAG
  rationale: The demonstrative likely refers back to the righteous behaviors in the immediate context. “These things” makes the object explicit in clear English.
- source_word: οὐ σαλευθήσεται
  chosen: will never be shaken
  alternatives:
  - will not be moved
  - will not be disturbed
  lexicon: BDAG
  rationale: The future passive of σαλεύω carries the sense of being shaken or made unstable. “Will never be shaken” captures both the future and the emphatic durability signaled by the following phrase.
- source_word: εἰς τὸν αἰῶνα
  chosen: never
  alternatives:
  - forever
  - for the age
  lexicon: BDAG
  rationale: 'In idiomatic English here, “never” best conveys enduring negation: he will not be shaken at any time. “Forever” is possible, but “never” reads more naturally in this clause.'
- source_word: ἀπὸ κακοῦ
  chosen: by evil
  alternatives:
  - from evil
  - by harm
  lexicon: BDAG
  rationale: With σαλευθήσεται, the phrase is best taken as the source or agency of destabilization. “By evil” fits the verbal idea of being shaken better than a more spatial “from evil.”
- source_word: φλογὸς πυρὸς
  chosen: flame of fire
  alternatives:
  - fiery flame
  - a flame of fire
  lexicon: BDAG
  rationale: The genitival construction is vivid and somewhat Hebraic in feel. “Flame of fire” preserves that force without over-interpreting it.
- source_word: ὀργὴ ἀδίκων
  chosen: the wrath of the unrighteous
  alternatives:
  - the anger of unjust men
  - the wrath of the wicked
  lexicon: BDAG
  rationale: ἀδίκων denotes unrighteous or unjust people. “The unrighteous” is more formally aligned with the Greek and fits the moral contrast of the context.
- source_word: οὐχ ἅψεται αὐτοῦ
  chosen: will not touch him
  alternatives:
  - will not lay hold of him
  - will not come upon him
  lexicon: BDAG
  rationale: ἅπτομαι commonly means to touch or take hold of. “Will not touch him” is direct, idiomatic, and preserves the protective sense of the line.
