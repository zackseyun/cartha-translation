id: PSS.15.3
reference: Psalms of Solomon 15:3
source:
  edition: lxx-swete-1909
  text: τίς γὰρ ἰσχύει, ὁ θεός, εἰ μὴ ἐξομολογήσασθαί σοι ἐν ἀληθείᾳ;
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: For who is strong, O God, except to give thanks to you in truth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acknowledge you in truth,' possibly with the sense 'praise' or 'give
      thanks.'
    reason: lexical_alternative
  - marker: b
    text: Or 'For who is strong, O God, except to confess to you'.
    reason: previous_rendering
lexical_decisions:
- source_word: τίς
  chosen: who
  alternatives:
  - what person
  lexicon: BDAG
  rationale: Direct interrogative pronoun introducing a rhetorical question; 'who'
    is the natural English equivalent.
- source_word: ἰσχύει
  chosen: is strong
  alternatives:
  - has strength
  - prevails
  - is able
  lexicon: BDAG
  rationale: The verb denotes strength or capability. 'Is strong' preserves the lexical
    force and fits the rhetorical structure better than a more paraphrastic 'is able.'
- source_word: ἐξομολογήσασθαί
  chosen: to confess
  alternatives:
  - to acknowledge
  - to give thanks
  - to praise
  lexicon: BDAG
  rationale: The middle infinitive can denote open acknowledgment, confession, or
    praise/thanksgiving depending on context. Here, with dative 'to you' and 'in truth,'
    open acknowledgment/confession best fits the moral-religious sense without over-specifying
    thanksgiving.
- source_word: σοι
  chosen: to you
  alternatives:
  - before you
  lexicon: BDAG
  rationale: Simple dative complement after the infinitive; 'to you' is the most direct
    rendering.
- source_word: ἐν ἀληθείᾳ
  chosen: in truth
  alternatives:
  - truly
  - in sincerity
  lexicon: BDAG
  rationale: The prepositional phrase is best retained fairly literally. 'In truth'
    preserves both the semantic range of truthfulness and the solemn cadence of the
    line.
- source_word: ὁ θεός
  chosen: O God
  alternatives:
  - God
  lexicon: BDAG
  rationale: Taken vocatively in context within the rhetorical address. English idiom
    requires 'O God' or an equivalent direct address; this best reflects the prayerful
    force.
