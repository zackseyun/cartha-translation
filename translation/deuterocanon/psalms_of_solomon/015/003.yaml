theological_decisions:
- issue: Sense of ἐξομολογήσασθαί in a devotional context
  chosen_reading: confess to you in truth
  alternative_readings:
  - acknowledge you truly
  - give thanks to you truly
  - praise you truly
  rationale: The verb can shade toward praise or thanksgiving in biblical Greek, but
    the combination with 'in truth' suggests sincere acknowledgment before God more
    broadly. 'Confess' preserves that solemn, truth-oriented sense without importing
    a specifically penitential meaning.
