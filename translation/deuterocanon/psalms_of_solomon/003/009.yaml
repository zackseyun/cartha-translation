id: PSS.3.9
reference: Psalms of Solomon 3:9
source:
  edition: lxx-swete-1909
  text: ἐξιλάσατο περὶ ἀγνοίας ἐν νηστείᾳ καὶ ταπεινώσει ψυχὴν αὐτοῦ·
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: He makes atonement for unintentional sin by fasting and humbling his soul;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for unintentional sin' / 'for error done in ignorance.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'humbling his soul,' a biblical idiom for self-denial or self-affliction.
    reason: cultural_note
  - marker: c
    text: Or 'He made atonement for ignorance'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐξιλάσατο
  chosen: made atonement
  alternatives:
  - made propitiation
  - made expiation
  - atoned
  lexicon: BDAG
  rationale: The verb carries sacrificial/reconciliatory force. 'Made atonement' is clear modern English and preserves the cultic weight without importing the more technical or potentially misleading 'propitiation.'
- source_word: περὶ ἀγνοίας
  chosen: for ignorance
  alternatives:
  - for an error done in ignorance
  - for unintentional sin
  lexicon: BDAG
  rationale: The Greek names 'ignorance' directly rather than explicitly stating 'sin.' The English keeps the source wording concise while allowing the common biblical sense of wrongdoing committed unknowingly to remain implicit.
- source_word: ἐν νηστείᾳ
  chosen: by fasting
  alternatives:
  - in fasting
  - with fasting
  lexicon: BDAG
  rationale: Here ἐν is instrumental or modal. 'By fasting' reads naturally in English and shows the means or manner of his act.
- source_word: καὶ ταπεινώσει ψυχὴν αὐτοῦ
  chosen: and humbling his soul
  alternatives:
  - and afflicting himself
  - and humbling himself
  lexicon: BDAG
  rationale: The Greek preserves the Semitic-style expression 'humble the soul.' Retaining 'soul' keeps the source texture and avoids flattening the phrase into a generic reflexive expression, though 'humbling himself' is a possible smoother rendering.
