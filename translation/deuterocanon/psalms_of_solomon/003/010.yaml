  rationale: 'In verses 7 and 8, οἶκος is translated as ''house'' (''house of a righteous man'', ''inspects his house''). Translating it as ''household'' here breaks the author''s deliberate repetition of the word, which connects the righteous man''s self-inspection of his house (v. 8) with the Lord''s ultimate cleansing of it (v. 10). | Adjudicator: The reviewer correctly identifies a lexical chain (οἶκος) running through verses 7, 8, and 10. The author uses the exact same phrase (τὸν οἶκον αὐτοῦ) in verses 8 and 10 to draw a direct parallel betw'
