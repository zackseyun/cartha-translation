id: PSS.3.10
reference: Psalms of Solomon 3:10
source:
  edition: lxx-swete-1909
  text: καὶ ὁ κύριος καθαρίζει πᾶν ἄνδρα ὅσιον καὶ τὸν οἶκον αὐτοῦ.
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: And the Lord cleanses every devout man and his household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holy man' or 'pious man' for 'devout man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - the Lord
  lexicon: BDAG
  rationale: Follows the project default for κύριος as a title. With the article,
    English idiom still prefers the capitalized title 'the Lord' within the clause.
- source_word: καθαρίζει
  chosen: cleanses
  alternatives:
  - purifies
  - makes clean
  lexicon: BDAG
  rationale: '''Cleanses'' preserves the present-tense verbal force and the moral-ritual
    nuance of καθαρίζω better than the flatter ''makes clean.'''
- source_word: πᾶν ἄνδρα
  chosen: every devout man
  alternatives:
  - every man who is devout
  - every holy man
  lexicon: BDAG
  rationale: πᾶν with singular ἄνδρα gives a distributive sense, 'every ... man.'
    Per project policy, the masculine noun is retained rather than neutralized, since
    the Greek is explicitly masculine.
- source_word: ὅσιον
  chosen: devout
  alternatives:
  - holy
  - pious
  lexicon: BDAG
  rationale: '''Devout'' communicates covenantal piety in natural modern English without
    sounding overly formal. ''Holy'' is possible but can suggest consecrated status
    more than personal godliness here.'
- source_word: οἶκον
  chosen: household
  alternatives:
  - house
  - home
  lexicon: BDAG
  rationale: In this context οἶκος likely includes the person's domestic sphere and
    dependents, not merely the physical building. 'Household' conveys that sense clearly
    in English.
