id: PSS.3.15
reference: Psalms of Solomon 3:15
source:
  edition: lxx-swete-1909
  text: αὕτη ἡ μερὶς τῶν ἁμαρτωλῶν εἰς τὸν αἰῶνα.
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: This is the portion of sinners forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αὕτη
  chosen: This
  alternatives:
  - This here
  lexicon: BDAG
  rationale: Straightforward demonstrative; English 'This' preserves the emphatic
    identification of what precedes as the sinners' outcome.
- source_word: μερὶς
  chosen: portion
  alternatives:
  - share
  - lot
  lexicon: BDAG
  rationale: '''Portion'' is natural modern English and preserves the sense of an
    assigned share or allotted fate. ''Lot'' is possible but can sound more idiomatic
    or interpretive.'
- source_word: ἁμαρτωλῶν
  chosen: sinners
  alternatives:
  - sinful ones
  lexicon: BDAG
  rationale: The genitive plural refers to people characterized by sin. 'Sinners'
    is the clear and idiomatic rendering in this moral context.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - for the age
  lexicon: BDAG
  rationale: The idiom commonly expresses enduring permanence. 'Forever' best captures
    the force in readable English while avoiding an overly wooden 'for the age'.
