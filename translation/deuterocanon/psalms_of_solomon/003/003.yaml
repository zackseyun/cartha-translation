id: PSS.3.3
reference: Psalms of Solomon 3:3
source:
  edition: lxx-swete-1909
  text: δίκαιοι μνημονεύσουσιν διὰ παντὸς τοῦ κυρίου, ἐν ἐξομολογήσει καὶ δικαιώσει
    τὰ κρίματα τοῦ κυρίου.
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: The righteous will remember the Lord continually, with thanksgiving and vindicating
    the judgments of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with thanksgiving'; the Greek ἐξομολόγησις can denote praise, thanksgiving,
      or confession depending on context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in justification/vindication of the Lord’s judgments.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with praise'.
    reason: previous_rendering
lexical_decisions:
- source_word: δίκαιοι
  chosen: the righteous
  alternatives:
  - the just
  - righteous people
  lexicon: BDAG
  rationale: As a substantival adjective, it denotes those who are characterized by
    righteousness. 'The righteous' is concise, natural English, and preserves the
    moral-religious force better than the flatter 'righteous people.'
- source_word: μνημονεύσουσιν
  chosen: will remember
  alternatives:
  - will call to mind
  - will make mention of
  lexicon: BDAG
  rationale: The future verb most naturally conveys ongoing remembrance here. 'Will
    remember' fits the context better than the more public-speech nuance 'make mention
    of.'
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - always
  - at all times
  lexicon: BDAG
  rationale: The idiom expresses constancy or unbroken continuance. 'Continually'
    is natural modern English and preserves the durative sense.
- source_word: τοῦ κυρίου
  chosen: the Lord
  alternatives:
  - the lord
  lexicon: BDAG
  rationale: Following the project's default for κύριος, 'the Lord' best reflects
    the title's theological weight and established Septuagintal usage.
- source_word: ἐν ἐξομολογήσει
  chosen: with praise
  alternatives:
  - with thanksgiving
  - with confession
  lexicon: BDAG
  rationale: In biblical Greek, especially psalmic contexts, ἐξομολόγησις commonly
    carries the sense of praise or thankful confession to God. 'With praise' best
    fits the devotional context, while 'thanksgiving' remains a plausible alternative.
- source_word: δικαιώσει
  chosen: by declaring ... just
  alternatives:
  - with justification of
  - with vindication of
  lexicon: BDAG
  rationale: The noun denotes justification or vindication. Because the object is
    'the Lord’s judgments,' the sense is not that the judgments justify something
    else, but that the righteous acknowledge or declare those judgments to be just.
    This idiomatic rendering communicates that force clearly in English.
- source_word: τὰ κρίματα τοῦ κυρίου
  chosen: the Lord’s judgments
  alternatives:
  - the judgments of the Lord
  - the Lord’s acts of judgment
  lexicon: BDAG
  rationale: κρίματα here refers to judicial decisions or judgments. 'The Lord’s judgments'
    is clear, direct, and preserves the judicial sense without overexpanding the phrase.
