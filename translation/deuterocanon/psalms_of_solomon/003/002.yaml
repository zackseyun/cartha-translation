id: PSS.3.2
reference: Psalms of Solomon 3:2
source:
  edition: lxx-swete-1909
  text: ὕμνον καὶ αἶνον ψάλλετε τῷ θεῷ τῷ αἰνετῷ. ψάλλε καὶ γρηγόρησον ἐπὶ τὴν γρηγόρησιν αὐτοῦ· ὅτι ἀγαθὸς ψαλμὸς τῷ θεῷ ἐξ ἀγαθῆς καρδίας.
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: Sing a hymn and a song of praise to God, the One worthy of praise. Sing, and keep watch for his watchfulness, for a psalm to God from a good heart is good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the praiseworthy One” or “God who is praised.”
    reason: lexical_alternative
  - marker: b
    text: The Greek phrase rendered “keep watch for his watchfulness” is unusual and may also be understood as “be vigilant for his vigilance” or similarly.
    reason: lexical_alternative
  - marker: c
    text: Or 'Sing a hymn and praise to God'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὕμνον
  chosen: hymn
  alternatives:
  - song
  - psalm
  lexicon: LSJ
  rationale: ὕμνος denotes a song of praise; “hymn” preserves the praise-oriented sense better than the broader “song.”
- source_word: αἶνον
  chosen: praise
  alternatives:
  - praise-song
  - commendation
  lexicon: LSJ
  rationale: αἶνος is straightforwardly “praise.” Rendering both ὕμνον and αἶνον avoids collapsing the paired terms into one idea.
- source_word: ψάλλετε / ψάλλε
  chosen: sing
  alternatives:
  - make melody
  - sing praise
  lexicon: LSJ
  rationale: In this context ψάλλω refers to singing praise to God. “Sing” is natural modern English and keeps the imperative force without sounding archaic.
- source_word: τῷ θεῷ τῷ αἰνετῷ
  chosen: to God, the One worthy of praise
  alternatives:
  - to God, the praiseworthy One
  - to God who is praised
  lexicon: LSJ
  rationale: αἰνετός can mean praised or praiseworthy. “Worthy of praise” conveys the predicate force clearly in contemporary English while preserving the theological orientation toward God.
- source_word: γρηγόρησον
  chosen: keep watch
  alternatives:
  - stay awake
  - be vigilant
  lexicon: LSJ
  rationale: The verb carries the sense of wakefulness and vigilance. “Keep watch” preserves both ideas better than the flatter “stay awake.”
- source_word: ἐπὶ τὴν γρηγόρησιν αὐτοῦ
  chosen: for his watchfulness
  alternatives:
  - toward his watching
  - for his vigilance
  lexicon: LSJ
  rationale: The phrase is unusual and somewhat awkward in Greek itself. “For his watchfulness” keeps the cognate connection with γρηγόρησον and preserves the source’s emphasis on divine vigilance without overinterpreting it.
- source_word: ψαλμός
  chosen: psalm
  alternatives:
  - song
  - melody
  lexicon: LSJ
  rationale: Although the word can mean a sung piece more generally, “psalm” retains the literary-religious character of the term and suits this text’s worship setting.
- source_word: ἐξ ἀγαθῆς καρδίας
  chosen: from a good heart
  alternatives:
  - from a pure heart
  - from a noble heart
  lexicon: LSJ
  rationale: ἀγαθός is most basically “good.” “Good heart” is slightly literal but understandable and avoids importing a stronger moral nuance like “pure” not demanded by the Greek.
- source_word: ἀγαθὸς ... ἀγαθῆς
  chosen: good ... good
  alternatives:
  - fitting ... good
  - beautiful ... sincere
  lexicon: LSJ
  rationale: The Greek deliberately repeats ἀγαθός. Preserving the repetition maintains the verse’s simple rhetorical balance, even if it sounds slightly taut in English.
