id: PSS.3.6
reference: Psalms of Solomon 3:6
source:
  edition: lxx-swete-1909
  text: ἀποσκοπεύει· ὅθεν ἥξει σωτηρία αὐτῷ.
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: He watches to see from where salvation will come to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance' for 'salvation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποσκοπεύει
  chosen: watches to see
  alternatives:
  - looks intently
  - keeps watch
  - looks out
  lexicon: LSJ
  rationale: The verb conveys attentive looking or watching. 'Watches to see' preserves
    the durative, expectant sense in clear modern English better than the more wooden
    'looks out' or the less natural standalone 'observes'.
- source_word: ὅθεν
  chosen: from where
  alternatives:
  - whence
  - from which place
  lexicon: LSJ
  rationale: The adverb marks source or origin. 'From where' is the most natural modern
    equivalent while preserving the directional force.
- source_word: ἥξει
  chosen: will come
  alternatives:
  - will arrive
  - will reach
  lexicon: LSJ
  rationale: The future verb indicates coming or arrival. 'Will come' is the most
    idiomatic rendering in English in combination with 'salvation'.
- source_word: σωτηρία
  chosen: salvation
  alternatives:
  - deliverance
  - rescue
  lexicon: LSJ
  rationale: '''Salvation'' is the broadest equivalent and suits the religious register
    of Psalms of Solomon. ''Deliverance'' is possible, but the context does not require
    narrowing the term to a merely situational rescue.'
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - for him
  lexicon: Greek grammar
  rationale: The dative can be represented as either advantage or direction, but 'to
    him' fits naturally with 'will come' and stays close to the Greek construction.
