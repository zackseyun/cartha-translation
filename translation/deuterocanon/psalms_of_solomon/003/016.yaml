id: PSS.3.16
reference: Psalms of Solomon 3:16
source:
  edition: lxx-swete-1909
  text: οἱ δὲ φοβούμενοι τὸν κύριον ἀναστήσονται εἰς ζωὴν αἰώνιον, καὶ ἡ ζωὴ αὐτῶν
    ἐν φωτὶ Κυρίου οὐκ ἐκλείψει ἔτι.
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: But those who fear the Lord will rise to eternal life, and their life in the
    light of the Lord will never cease.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φοβούμενοι
  chosen: those who fear
  alternatives:
  - those who revere
  - those who are fearing
  lexicon: BDAG
  rationale: The participle functions substantivally for a group defined by ongoing
    posture toward God. 'Fear' preserves the biblical-theological weight better than
    the softer 'revere,' while 'those who fear' is natural English.
- source_word: κύριον
  chosen: the Lord
  alternatives:
  - the LORD
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος defaults to 'Lord.' Here it refers to God
    and does not require the small-caps convention reserved for YHWH in Hebrew contexts.
- source_word: ἀναστήσονται
  chosen: will rise
  alternatives:
  - will arise
  - will be raised
  lexicon: BDAG
  rationale: The future middle naturally conveys rising/arising. 'Will rise' is concise
    and preserves the resurrection sense without importing a passive form not present
    in the Greek.
- source_word: εἰς ζωὴν αἰώνιον
  chosen: to eternal life
  alternatives:
  - into eternal life
  - for eternal life
  lexicon: BDAG
  rationale: This idiom expresses result or destination. 'To eternal life' is idiomatic
    in English and keeps the eschatological force clear.
- source_word: ἐν φωτὶ Κυρίου
  chosen: in the light of the Lord
  alternatives:
  - by the Lord's light
  - in Lordly light
  lexicon: BDAG
  rationale: A straightforward prepositional rendering best preserves the imagery.
    'In the light of the Lord' is both transparent to the Greek and natural in English.
- source_word: οὐκ ἐκλείψει ἔτι
  chosen: will never cease
  alternatives:
  - will no longer fail
  - will never come to an end
  - will not fail anymore
  lexicon: BDAG
  rationale: ἐκλείπω can mean fail, cease, or come to an end. In context of 'life,'
    'will never cease' communicates enduring continuance most clearly. 'Never' captures
    the forward-looking force of οὐκ ... ἔτι in natural English.
