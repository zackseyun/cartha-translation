theological_decisions:
- issue: Resurrection language in ἀναστήσονται εἰς ζωὴν αἰώνιον
  chosen_reading: A future resurrection to everlasting life is expressed directly
    in the main text.
  alternative_readings:
  - A more general 'will arise into eternal life' without explicit resurrection emphasis
  rationale: Given the verb ἀναστήσονται and the eschatological phrase 'to eternal
    life,' the verse most naturally speaks of resurrection life, not merely moral
    renewal.
