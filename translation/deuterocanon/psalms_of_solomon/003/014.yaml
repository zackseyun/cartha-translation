  category: mistranslation
  tier: 2
  from: and it will certainly not be remembered when he visits the righteous.
  to: and he will certainly not be remembered when he visits the righteous.
  rationale: The implied subject of μνησθήσεται is the sinner (ὁ ἁμαρτωλός), continuing
    the chain of verbs describing his fate from verse 13 (ἔπεσεν, ἀνιστήσεται). In
    biblical idiom, it is the wicked person whose memory is blotted out, not their
    'destruction' (ἡ ἀπώλεια). The draft's mechanical agreement with the nearest nominative
    produces a conceptually awkward reading that misses the author's point.
