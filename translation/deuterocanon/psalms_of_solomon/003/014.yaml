id: PSS.3.14
reference: Psalms of Solomon 3:14
source:
  edition: lxx-swete-1909
  text: καὶ οὐ μὴ μνησθήσεται ὅταν ἐπισκέπτηται δικαίους·
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: and he will certainly not be remembered when he visits the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''and he will certainly not be remembered when he visits the righteous,''
      if the implied subject is taken as the sinner rather than his destruction.'
    reason: alternative_reading
  - marker: b
    text: The verb 'visits' can also carry the sense 'looks after' or 'attends to.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and it will certainly not be remembered when he visits the righteous.'.
    reason: previous_rendering
lexical_decisions:
- source_word: οὐ μὴ
  chosen: will certainly not
  alternatives:
  - will not
  - shall by no means
  lexicon: BDAG
  rationale: The doubled negation is emphatic. 'Will certainly not' preserves that
    force in natural modern English without sounding archaic.
- source_word: μνησθήσεται
  chosen: be remembered
  alternatives:
  - be recalled
  - be brought to mind
  lexicon: BDAG
  rationale: The passive form is best rendered straightforwardly as 'be remembered.'
    This also preserves the Greek ambiguity about what exactly is not remembered.
- source_word: ἐπισκέπτηται
  chosen: visits
  alternatives:
  - looks after
  - attends to
  lexicon: BDAG
  rationale: The verb can mean to visit with attention or care. 'Visits' stays closest
    to the Greek and preserves the biblical sense of divine visitation without over-explaining
    it.
- source_word: δικαίους
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: BDAG
  rationale: '''The righteous'' is the most direct and idiomatic rendering in this
    moral-religious context and matches nearby usage in the passage.'
- source_word: implicit subject from prior clause
  chosen: it
  alternatives:
  - he
  - the sinner
  - the sinner's destruction
  rationale: The nearest explicit nominative antecedent in the preceding line is 'the
    destruction' (ἡ ἀπώλεια), so 'it' best preserves the Greek flow while leaving
    some ambiguity. A personal rendering ('he') is possible, but less directly anchored
    in the syntax.
