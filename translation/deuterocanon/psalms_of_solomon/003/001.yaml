id: PSS.3.1
reference: Psalms of Solomon 3:1
source:
  edition: lxx-swete-1909
  text: Ἵνα τί ὑπνοῖς, ψυχή, καὶ οὐκ εὐλογεῖς τὸν κύριον;
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: Why do you sleep, O soul, and not bless the Lord?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Why are you sleeping, O soul?'
    reason: lexical_alternative
  - marker: b
    text: The Greek addresses the soul directly; 'my soul' is not stated.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἵνα τί
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: BDAG
  rationale: Idiomatic interrogative introducing a rebuke or wake-up appeal; 'Why'
    is the most natural English equivalent without losing force.
- source_word: ὑπνοῖς
  chosen: do you sleep
  alternatives:
  - are you sleeping
  - do you lie asleep
  lexicon: BDAG
  rationale: Present active indicative, second singular. 'Do you sleep' preserves
    the direct rhetorical question and reads naturally in English.
- source_word: ψυχή
  chosen: O soul
  alternatives:
  - soul
  - my soul
  lexicon: BDAG
  rationale: Vocative address is explicit in context; 'O soul' best reflects the direct
    apostrophe. 'My soul' would add a possessive not present in the Greek.
- source_word: εὐλογεῖς
  chosen: bless
  alternatives:
  - praise
  - speak well of
  lexicon: BDAG
  rationale: '''Bless'' is the standard rendering for εὐλογέω in God-directed doxological
    contexts and preserves biblical diction without becoming archaic.'
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: DOCTRINE.md specifies κύριος → 'Lord' as the default rendering. In this
    worship context, 'the Lord' is the most fitting English equivalent.
