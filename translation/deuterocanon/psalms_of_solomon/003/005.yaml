id: PSS.3.5
reference: Psalms of Solomon 3:5
source:
  edition: lxx-swete-1909
  text: προσέχων ὁ δίκαιος καὶ δικαιώσει τὸν κύριον· ἔπεσεν, καὶ ἀποβλέπει τί ποιήσει αὐτῷ ὁ θεός·
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: The righteous man is attentive and will declare the Lord just; The righteous man is attentive and will vindicate the Lord; he falls, and he looks to see what God will do for him., and he looks to see what God will do for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "will justify the Lord."
    reason: lexical_alternative
  - marker: b
    text: Or "what God will do to him."
    reason: alternative_reading
  - marker: c
    text: Or 'will vindicate the Lord'.
    reason: previous_rendering
  - marker: d
    text: Or 'he has fallen'.
    reason: previous_rendering
lexical_decisions:
- source_word: προσέχων
  chosen: is attentive
  alternatives:
  - paying attention
  - keeping watch
  - taking heed
  lexicon: BDAG
  rationale: The participle describes the righteous person's alert, watchful posture. 'Is attentive' is natural English and preserves the ongoing sense without over-interpreting it as either purely mental attention or literal watching.
- source_word: ὁ δίκαιος
  chosen: the righteous man
  alternatives:
  - the righteous one
  lexicon: BDAG
  rationale: The singular substantive adjective refers to the representative righteous person. 'Man' preserves the masculine singular form per project policy while still functioning generically in context.
- source_word: δικαιώσει
  chosen: will vindicate
  alternatives:
  - will justify
  - will declare righteous
  lexicon: BDAG
  rationale: With 'the Lord' as object, the sense is not that the righteous person makes the Lord righteous, but that he acknowledges and upholds the Lord as right. 'Vindicate' conveys that sense more clearly in English.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives: []
  lexicon: BDAG
  rationale: The project's default rendering for κύριος is 'Lord.' Here it refers to God in a reverential sense, consistent with the surrounding context.
- source_word: ἔπεσεν
  chosen: he has fallen
  alternatives:
  - he fell
  lexicon: BDAG
  rationale: The aorist can be rendered simply as past, but 'has fallen' works well in English here because the fall's present consequence explains why he is now looking to God.
- source_word: ἀποβλέπει
  chosen: he looks to see
  alternatives:
  - he watches
  - he looks
  - he waits to see
  lexicon: BDAG
  rationale: The verb expresses directed looking or watching. 'Looks to see' preserves the visual expectancy without importing a stronger interpretive nuance such as 'waits expectantly.'
- source_word: τί ποιήσει αὐτῷ ὁ θεός
  chosen: what God will do for him
  alternatives:
  - what God will do to him
  - what God will do for/to him
  lexicon: BDAG
  rationale: The dative αὐτῷ after ποιήσει can be read as either beneficial ('for him') or more neutral/adverse ('to him'). In the immediate context of hoped-for salvation (v. 6), the beneficial sense is slightly more likely, but the alternative remains possible and should be footnoted.
