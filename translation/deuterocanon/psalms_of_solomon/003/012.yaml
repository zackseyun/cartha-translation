id: PSS.3.12
reference: Psalms of Solomon 3:12
source:
  edition: lxx-swete-1909
  text: προσεθήκεν ἁμαρτίας ἐφʼ ἁμαρτίαις τῇ ζωῇ αὐτοῦ·
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: He added sins upon sins to his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''He added sins to sins in his life.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'sin upon sin in his life.'.
    reason: previous_rendering
lexical_decisions:
- source_word: προσεθήκεν
  chosen: added
  alternatives:
  - piled up
  - increased
  lexicon: BDAG
  rationale: Aorist of προστίθημι, with the basic sense of adding. 'Added' preserves the verbal image without over-paraphrasing; the following phrase supplies the cumulative force.
- source_word: ἁμαρτίας
  chosen: sin
  alternatives:
  - sins
  lexicon: BDAG
  rationale: Although the Greek is plural, English idiom commonly uses the singular in the expression 'sin upon sin.' This keeps the cumulative moral sense while reading naturally.
- source_word: ἐφʼ ἁμαρτίαις
  chosen: upon sin
  alternatives:
  - upon sins
  - to sins
  lexicon: BDAG
  rationale: The preposition ἐπί with the repeated noun creates an idiom of accumulation. 'Upon sin' communicates repeated addition clearly in English.
- source_word: τῇ ζωῇ αὐτοῦ
  chosen: in his life
  alternatives:
  - to his life
  - throughout his life
  lexicon: BDAG
  rationale: The dative phrase is best taken as the sphere in which this accumulation occurred. 'In his life' is the most natural and least interpretively loaded rendering.
