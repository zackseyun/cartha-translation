id: PSS.3.11
reference: Psalms of Solomon 3:11
source:
  edition: lxx-swete-1909
  text: προσέκοψεν ἁμαρτωλός, καὶ καταρᾶται ζωὴν αὐτοῦ, τὴν ἡμέραν γενέσεως αὐτοῦ
    καὶ ὠδῖνας μητρός.
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: A sinner stumbled, and he curses his life, the day of his birth and his mother’s
    labor pains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came to ruin' for 'stumbled.' The Greek verb can suggest either literal
      stumbling or a figurative fall into disaster.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέκοψεν
  chosen: stumbled
  alternatives:
  - came to ruin
  - struck against
  lexicon: BDAG
  rationale: προσκόπτω commonly means to stumble or strike against. 'Stumbled' preserves
    the vivid metaphor without over-interpreting it as total destruction.
- source_word: ἁμαρτωλός
  chosen: sinner
  alternatives:
  - sinful man
  - wrongdoer
  lexicon: BDAG
  rationale: The noun straightforwardly denotes a sinner. 'Sinner' is the most direct
    and natural English equivalent.
- source_word: καταρᾶται
  chosen: curses
  alternatives:
  - calls down a curse on
  - denounces
  lexicon: BDAG
  rationale: The verb means to curse. 'Curses' is clear, direct, and preserves the
    force of the Greek without expansion.
- source_word: ζωὴν αὐτοῦ
  chosen: his life
  alternatives:
  - his own life
  - his living
  lexicon: BDAG
  rationale: The object of the curse is his life itself. 'His life' is the plain English
    rendering.
- source_word: τὴν ἡμέραν γενέσεως αὐτοῦ
  chosen: the day of his birth
  alternatives:
  - the day he was born
  - his birthday
  lexicon: BDAG
  rationale: This phrase idiomatically refers to the day he was born. 'The day of
    his birth' stays close to the Greek and retains its solemn tone.
- source_word: ὠδῖνας μητρός
  chosen: his mother’s labor pains
  alternatives:
  - his mother's birth pains
  - his mother's travail
  lexicon: BDAG
  rationale: ὠδῖνες are birth pangs or labor pains. 'Labor pains' is idiomatic modern
    English and preserves the childbirth imagery.
