id: PSS.3.4
reference: Psalms of Solomon 3:4
source:
  edition: lxx-swete-1909
  text: οὐκ ὀλιγωρήσει δίκαιας παιδευόμενους ὑπὸ τοῦ κυρίου ἡ εὐδοκία αὐτοῦ διὰ παντὸς
    ἔναντι Κυρίου.
  language: Greek
  pages:
  - 791
  validation: swete_direct
translation:
  text: The righteous man will not disdain being disciplined by the Lord; his delight
    is continually before the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has an unusual form, δίκαιας, before the participle παιδευόμενους;
      the clause is translated by sense as 'the righteous.'
    reason: textual_variant
  - marker: b
    text: Or 'His good pleasure will not disregard the righteous ...'
    reason: lexical_alternative
  - marker: c
    text: Or 'His favor will not neglect the righteous when they are being disciplined
      by the Lord; it is continually before the Lord.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὀλιγωρήσει
  chosen: will not neglect
  alternatives:
  - will not disregard
  - will not think little of
  lexicon: BDAG
  rationale: ὀλιγωρέω carries the sense of treating something as of little account,
    hence 'neglect' or 'disregard.' 'Will not neglect' is natural English and preserves
    the future-form assertion.
- source_word: δίκαιας
  chosen: the righteous
  alternatives:
  - righteous ones
  lexicon: BDAG
  rationale: The transmitted form is grammatically unusual here, especially beside
    the masculine participle παιδευόμενους. I translated by the clear sense of the
    clause rather than forcing the irregular form into English.
- source_word: παιδευόμενους
  chosen: being disciplined
  alternatives:
  - being chastened
  - being instructed
  lexicon: BDAG
  rationale: In this context παιδεύω refers to corrective training under the Lord,
    not mere teaching. 'Being disciplined' keeps both the formative and corrective
    sense without sounding archaic.
- source_word: εὐδοκία
  chosen: favor
  alternatives:
  - good pleasure
  - approval
  lexicon: BDAG
  rationale: '''Favor'' is more idiomatic in English here while still conveying benevolent
    regard. ''Good pleasure'' is more literal but stiffer in this sentence.'
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - always
  - at all times
  lexicon: BDAG
  rationale: The phrase expresses ongoing duration. 'Continually' fits the elevated
    tone and links naturally with the following phrase.
- source_word: ἔναντι Κυρίου
  chosen: before the Lord
  alternatives:
  - in the Lord's presence
  lexicon: BDAG
  rationale: A formally transparent rendering is preferable here. 'Before the Lord'
    preserves the spatial-relational imagery of the Greek.
- source_word: κυρίου / Κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord.' The repetition is preserved
    in both occurrences.
