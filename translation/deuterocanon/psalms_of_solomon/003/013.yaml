id: PSS.3.13
reference: Psalms of Solomon 3:13
source:
  edition: lxx-swete-1909
  text: ἔπεσεν, ὅτι πονηρὸν τὸ πτῶμα αὐτοῦ, καὶ οὐκ ἀνιστήσεται. ἡ ἀπώλεια τοῦ ἁμαρτωλοῦ εἰς τὸν αἰῶνα,
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: He has fallen, because his fall is grievous, and he will not rise. The destruction of the sinner is forever,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his fall is grievous' or 'his corpse is vile.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his downfall is evil'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔπεσεν
  chosen: He has fallen
  alternatives:
  - He fell
  - He is fallen
  lexicon: BDAG
  rationale: A simple past event with present-result force fits the context of irreversible judgment; 'has fallen' preserves that force in natural English.
- source_word: πτῶμα
  chosen: downfall
  alternatives:
  - fall
  - corpse
  lexicon: BDAG
  rationale: Although the noun can mean 'corpse,' the immediate pairing with ἔπεσεν and οὐκ ἀνιστήσεται favors the sense of a catastrophic fall or downfall rather than a dead body.
- source_word: πονηρόν
  chosen: evil
  alternatives:
  - wicked
  - grievous
  - disastrous
  lexicon: BDAG
  rationale: The Greek adjective is morally weighty and should not be flattened. 'Evil' keeps that force, even though 'disastrous' would sound smoother in English.
- source_word: ἀνιστήσεται
  chosen: he will not rise
  alternatives:
  - he will not get up
  - he will not rise again
  lexicon: BDAG
  rationale: '''Rise'' is the most direct equivalent and preserves the stark finality of the clause without adding ''again,'' which the Greek does not explicitly state.'
- source_word: ἀπώλεια
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: BDAG
  rationale: '''Destruction'' is clear, weighty, and natural. ''Perdition'' is too ecclesiastical here, and ''ruin'' is somewhat weaker.'
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for ever
  lexicon: BDAG
  rationale: In this judgment context, the phrase most naturally conveys enduring permanence; 'forever' gives that sense in current English.
