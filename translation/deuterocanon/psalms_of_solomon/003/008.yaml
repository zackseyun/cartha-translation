id: PSS.3.8
reference: Psalms of Solomon 3:8
source:
  edition: lxx-swete-1909
  text: ἐπισκέπτεται διὰ παντὸς τὸν οἶκον αὐτοῦ ὁ δίκαιος, τοῦ ἐξᾶραι ἀδικίαν ἐν παραπτώματι
    αὐτοῦ.
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: The righteous man continually inspects his house, to remove wrongdoing when
    he trespasses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in his trespass” or “because of his trespass.”
    reason: lexical_alternative
  - marker: b
    text: The verse presents the righteous man as actively examining his own household
      and dealing with sin, not as morally careless.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπισκέπτεται
  chosen: inspects
  alternatives:
  - examines
  - keeps watch over
  - visits
  lexicon: LSJ
  rationale: For one’s own house, the verb is not a social ‘visit’ but active oversight
    or inspection. ‘Inspects’ best captures deliberate scrutiny in context.
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - constantly
  - at all times
  - always
  lexicon: LSJ
  rationale: The phrase marks ongoing or habitual action. ‘Continually’ preserves
    that durative sense in natural English.
- source_word: ὁ δίκαιος
  chosen: the righteous man
  alternatives:
  - the righteous one
  - the righteous
  lexicon: LSJ
  rationale: The singular masculine is retained per the project’s gender-accurate
    policy. ‘The righteous man’ also fits the individual moral exemplar in this immediate
    context.
- source_word: τοῦ ἐξᾶραι
  chosen: to remove
  alternatives:
  - to root out
  - to take away
  lexicon: LSJ
  rationale: The articular infinitive expresses purpose. ‘To remove’ is clear, direct,
    and fits the cleansing/self-purging sense of the context.
- source_word: ἀδικίαν
  chosen: wrongdoing
  alternatives:
  - injustice
  - unrighteousness
  - wickedness
  lexicon: LSJ
  rationale: In this household and repentance setting, the word points to moral wrong
    more broadly than social injustice alone. ‘Wrongdoing’ is the most natural broad
    equivalent.
- source_word: ἐν παραπτώματι αὐτοῦ
  chosen: when he trespasses
  alternatives:
  - in his trespass
  - because of his trespass
  - in the matter of his offense
  lexicon: LSJ
  rationale: Taken woodenly, the phrase is awkward in English. In context it most
    likely marks the circumstance in which the righteous man deals with sin, so ‘when
    he trespasses’ makes the sense clear while staying close to the Greek idea.
