id: PSS.3.7
reference: Psalms of Solomon 3:7
source:
  edition: lxx-swete-1909
  text: ἀλήθεια τῶν δικαίων παρὰ θεοῦ σωτῆρος αὐτῶν· οὐκ αὐλίζεται ἐν οἴκῳ δικαίου ἁμαρτία ἐφʼ ἁμαρτίαν.
  language: Greek
  pages:
  - 792
  validation: swete_direct
translation:
  text: The faithfulness of the righteous is from God their savior; sin upon sin does not lodge in the house of a righteous man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The truth of the righteous is from God,” with ἀλήθεια taken more abstractly; “truthfulness” brings out the ethical sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'The truthfulness'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀλήθεια
  chosen: truthfulness
  alternatives:
  - truth
  - integrity
  - faithfulness
  lexicon: LSJ
  rationale: In this ethical context, ἀλήθεια most naturally refers to the truthful character of the righteous rather than abstract propositional truth. “Truthfulness” preserves the lexical link to “truth” while reading naturally in English.
- source_word: παρὰ θεοῦ
  chosen: is from God
  alternatives:
  - comes from God
  - is from beside God
  lexicon: LSJ
  rationale: παρά with the genitive marks source or origin here. “Is from God” is concise and preserves the claim that this quality originates with God.
- source_word: σωτῆρος
  chosen: savior
  alternatives:
  - deliverer
  lexicon: LSJ
  rationale: σωτήρ regularly means “savior” or “deliverer.” “Savior” fits both the religious register and the established theological sense without overstating the term.
- source_word: αὐλίζεται
  chosen: does not lodge
  alternatives:
  - does not dwell
  - does not camp
  - does not spend the night
  lexicon: LSJ
  rationale: The verb carries the sense of lodging or encamping. “Does not lodge” preserves the concrete metaphor of sin not finding a place to stay in the righteous household.
- source_word: ἐν οἴκῳ δικαίου
  chosen: in the house of a righteous man
  alternatives:
  - in a righteous man's house
  - in the house of the righteous
  lexicon: LSJ
  rationale: The singular δικαίου is best kept as singular. Because the Greek is grammatically masculine, “a righteous man” follows the project’s gender-accurate policy.
- source_word: ἁμαρτία ἐφʼ ἁμαρτίαν
  chosen: sin upon sin
  alternatives:
  - sin on top of sin
  - one sin after another
  lexicon: LSJ
  rationale: The repetition is rhetorically forceful and should be preserved. “Sin upon sin” keeps the piling-up effect of the Greek without paraphrase.
