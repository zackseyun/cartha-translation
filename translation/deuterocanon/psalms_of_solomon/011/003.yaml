id: PSS.11.3
reference: Psalms of Solomon 11:3
source:
  edition: lxx-swete-1909
  text: στῆθι, Ἰερουσαλήμ, ἐφʼ ὑψηλοῦ, καὶ ἴδε τὰ τέκνα σου ἀπὸ ἀνατολῶν καὶ δυσμῶν
    συνηγμένα εἰς ἅπαξ ἀπὸ Κυρίου.
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: Stand, O Jerusalem, on high, and see your children gathered from east and
    west all at once by the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'together' or 'as one' for 'all at once.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στῆθι
  chosen: Stand
  alternatives:
  - Arise
  - Take your stand
  lexicon: LSJ
  rationale: The aorist imperative calls Jerusalem to rise or take position. 'Stand'
    is the most direct and natural rendering in English and fits the following command
    to look.
- source_word: ἐφʼ ὑψηλοῦ
  chosen: on high
  alternatives:
  - on a high place
  - upon a height
  lexicon: LSJ
  rationale: The phrase denotes an elevated position. 'On high' is concise, idiomatic,
    and preserves the elevated vantage point without over-specifying the location.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: LSJ
  rationale: τέκνα is broader than 'sons' and naturally includes all descendants or
    members of Jerusalem's people. 'Children' best matches the Greek and modern English
    usage.
- source_word: ἀπὸ ἀνατολῶν καὶ δυσμῶν
  chosen: from east and west
  alternatives:
  - from the east and the west
  - from the eastlands and westlands
  lexicon: LSJ
  rationale: The plural forms are idiomatic for directions or regions. English normally
    expresses this naturally as 'from east and west.'
- source_word: συνηγμένα
  chosen: gathered
  alternatives:
  - assembled
  - brought together
  lexicon: LSJ
  rationale: The participle denotes people being brought together into one company.
    'Gathered' is the clearest and most natural equivalent.
- source_word: εἰς ἅπαξ
  chosen: all at once
  alternatives:
  - together
  - as one
  - once for all
  lexicon: LSJ
  rationale: The phrase is somewhat compressed and can suggest simultaneity or unified
    gathering. 'All at once' best preserves the adverbial force without importing
    a stronger theological nuance like 'once for all.'
- source_word: Κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: 'κύριος is rendered by the project''s default as ''Lord.'' The article
    is supplied in English because the genitive with ἀπό is most naturally expressed
    as agency or source: ''by the Lord.'''
