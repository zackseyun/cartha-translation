theological_decisions:
- issue: Meaning of ἐπισκοπῇ in the final clause
  chosen_reading: a merciful divine visitation toward Israel
  alternative_readings:
  - oversight
  - providential intervention
  rationale: The immediate context is good news and mercy, so the noun is best taken positively as God's gracious visitation rather than mere administrative oversight. The English keeps the broader term 'visitation' to preserve that theological richness.
