id: PSS.11.2
reference: Psalms of Solomon 11:2
source:
  edition: lxx-swete-1909
  text: κηρύξατε ἐν Ἰερουσαλὴμ φωνὴν εὐαγγελιζομένου· ὅτι ἠλέησεν ὁ θεὸς Ἰσραὴλ ἐν τῇ ἐπισκοπῇ αὐτῶν.
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: 'Proclaim in Jerusalem the voice of one bringing good news: for God has shown mercy to Israel in visiting them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sound/voice of one announcing good news.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in their oversight' or 'in their intervention'; the Greek term can denote a visitation or attentive act of care.
    reason: lexical_alternative
  - marker: c
    text: Or 'in their visitation.'.
    reason: previous_rendering
lexical_decisions:
- source_word: κηρύξατε
  chosen: Proclaim
  alternatives:
  - Announce
  - Herald
  lexicon: BDAG
  rationale: Imperative plural calling for public proclamation; 'Proclaim' preserves the formal, heraldic force without sounding archaic.
- source_word: φωνὴν
  chosen: the voice
  alternatives:
  - a voice
  - the sound
  lexicon: BDAG
  rationale: The accusative is governed by the proclamation formula; 'the voice' preserves the concrete image rather than flattening it to mere content.
- source_word: εὐαγγελιζομένου
  chosen: of one bringing good news
  alternatives:
  - of one announcing good news
  - of a messenger of good news
  lexicon: BDAG
  rationale: The participle denotes a herald of glad tidings. This rendering stays transparent to the Greek and avoids importing later technical Christian overtones into the verb itself.
- source_word: ἠλέησεν
  chosen: has shown mercy
  alternatives:
  - had mercy on
  - has been merciful to
  lexicon: BDAG
  rationale: The verb ἐλεέω is best represented by mercy language. 'Has shown mercy' is idiomatic and keeps the divine action prominent.
- source_word: ἐπισκοπῇ
  chosen: visitation
  alternatives:
  - oversight
  - looking upon
  - intervention
  lexicon: BDAG
  rationale: The noun can denote a visitation or act of attentive intervention. 'Visitation' best preserves the theological and literary resonance while allowing either gracious divine attention or saving intervention.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - his
  lexicon: BDAG
  rationale: The plural pronoun matches the plural referent Israel construed corporately as a people; 'their' is the most straightforward rendering from the Greek form.
