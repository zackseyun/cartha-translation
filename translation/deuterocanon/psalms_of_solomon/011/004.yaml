id: PSS.11.4
reference: Psalms of Solomon 11:4
source:
  edition: lxx-swete-1909
  text: ἀπὸ βορρᾶ ἔρχονται τῇ εὐφροσύνῃ τοῦ θεοῦ αὐτῶν· ἐκ νήσων μακρόθεν συνήγαγεν
    αὐτοὺς ὁ θεός.
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: They come from the north in the joy of their God; from distant islands God
    has gathered them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'coastlands' instead of 'islands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ βορρᾶ
  chosen: from the north
  alternatives:
  - out of the north
  - from the northern region
  lexicon: BDAG
  rationale: ἀπό with the genitive marks source/origin, and βορρᾶ denotes the north
    or northern quarter. 'From the north' is the most natural English rendering and
    preserves the directional force.
- source_word: ἔρχονται
  chosen: they come
  alternatives:
  - they are coming
  - they arrive
  lexicon: BDAG
  rationale: The present tense is retained with a simple English present for readable
    modern English while preserving the vivid ongoing sense of the Greek.
- source_word: τῇ εὐφροσύνῃ
  chosen: in the joy
  alternatives:
  - with joy
  - in gladness
  - with the rejoicing
  lexicon: BDAG
  rationale: The dative is best taken as expressing manner or attendant state. 'In
    the joy' keeps the nominal force of εὐφροσύνη and avoids over-paraphrasing, while
    remaining idiomatic in English.
- source_word: τοῦ θεοῦ αὐτῶν
  chosen: of their God
  alternatives:
  - that comes from their God
  - before their God
  lexicon: BDAG
  rationale: The genitive is rendered straightforwardly. The phrase most naturally
    identifies God as the one to whom they belong, without importing a more interpretive
    causal sense.
- source_word: ἐκ νήσων μακρόθεν
  chosen: from distant islands
  alternatives:
  - from islands far away
  - from far-off coastlands
  lexicon: BDAG
  rationale: ἐκ again marks source. νῆσοι normally means 'islands,' though in biblical
    Greek it can sometimes extend to maritime regions/coastlands. μακρόθεν contributes
    the sense of far distance, well captured by 'distant.'
- source_word: συνήγαγεν
  chosen: has gathered
  alternatives:
  - gathered
  - brought together
  lexicon: BDAG
  rationale: 'The aorist is rendered with English present perfect to fit the discourse
    flow: their coming is now in view because God has already acted to gather them.
    This preserves the completed force without making the English feel disjointed.'
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: The explicit subject is retained at the end of the clause in normal English
    order, preserving emphasis on divine agency.
