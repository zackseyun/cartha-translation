id: PSS.11.8
reference: Psalms of Solomon 11:8
source:
  edition: lxx-swete-1909
  text: ἔνδυσαι, Ἰερουσαλήμ, τὰ ἱμάτια τῆς δόξης σου, ἑτοίμασον τὴν στολὴν τοῦ ἁγιάσματός σου· ὅτι ὁ θεὸς ἐλάλησεν ἀγαθὰ Ἰσραὴλ εἰς τὸν αἰῶνα καὶ ἔτι.
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: Put on, Jerusalem, the garments of your glory; make ready your sacred robe, for God has spoken good things to Israel Put on, Jerusalem, the garments of your glory; make ready your sacred robe, for God has spoken good things to Israel forevermore..
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the robe of your holiness' or 'the robe of your sanctuary.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''has spoken good things to Israel forever and still further.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'forever and beyond'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἔνδυσαι
  chosen: Put on
  alternatives:
  - Clothe yourself
  lexicon: BDAG
  rationale: Middle imperative calling Jerusalem to dress herself. 'Put on' is natural modern English and preserves the imperative force without unnecessary stiffness.
- source_word: ἱμάτια
  chosen: garments
  alternatives:
  - clothes
  - robes
  lexicon: BDAG
  rationale: A general term for clothing. 'Garments' fits the elevated poetic register better than 'clothes' and avoids narrowing the sense to a specific type of attire.
- source_word: δόξης
  chosen: glory
  alternatives:
  - splendor
  - honor
  lexicon: BDAG
  rationale: '''Glory'' preserves the strong biblical-theological resonance of δόξα and suits the exalted address to Jerusalem.'
- source_word: ἑτοίμασον
  chosen: make ready
  alternatives:
  - prepare
  lexicon: BDAG
  rationale: The imperative means to prepare or make ready. 'Make ready' is slightly more idiomatic in direct address while retaining the source sense.
- source_word: στολήν
  chosen: robe
  alternatives:
  - garment
  lexicon: BDAG
  rationale: στολή commonly denotes a robe or stately garment. 'Robe' preserves the singular, dignified sense here.
- source_word: τοῦ ἁγιάσματός σου
  chosen: your sacred
  alternatives:
  - of your holiness
  - of your sanctuary
  lexicon: BDAG
  rationale: ἁγίασμα can denote holiness, something consecrated, or sanctuary. In English, 'your sacred robe' best carries the consecrated sense in a readable way. Because 'sanctuary' is also possible, that alternative is preserved in a footnote.
- source_word: ἐλάλησεν ἀγαθὰ
  chosen: has spoken good things
  alternatives:
  - has promised good things
  - has spoken blessings
  lexicon: BDAG
  rationale: The Greek says literally that God 'spoke good things.' Retaining 'spoken' stays close to the text and avoids importing the more interpretive 'promised,' though the context clearly conveys favor and blessing.
- source_word: εἰς τὸν αἰῶνα καὶ ἔτι
  chosen: forever and beyond
  alternatives:
  - forever and still
  - forevermore
  - for ever and yet further
  lexicon: BDAG
  rationale: The phrase combines permanence (εἰς τὸν αἰῶνα) with an added note of continuation or surplus (καὶ ἔτι). 'Forever and beyond' communicates both enduring duration and the added force of ἔτι in idiomatic English.
