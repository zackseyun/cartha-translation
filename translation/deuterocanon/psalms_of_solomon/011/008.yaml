theological_decisions:
- issue: Meaning of τοῦ ἁγιάσματός σου in Jerusalem's investiture imagery
  chosen_reading: A consecrated or sacred robe belonging to Jerusalem
  alternative_readings:
  - the robe of your holiness
  - the robe of your sanctuary
  rationale: The noun can point either to holiness/consecration or to a sanctuary/holy place. In this poetic context, the main image is Jerusalem being adorned in keeping with her sanctified status, so 'your sacred robe' best preserves the sense without forcing a narrower cultic reading. The sanctuary-related alternative is kept in a footnote.
