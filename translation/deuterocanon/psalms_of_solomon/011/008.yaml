  rationale: 'Adjudicator-modified: The Greek phrase εἰς τὸν αἰῶνα καὶ ἔτι (literally ''unto the age and further'') is a standard idiom for eternal duration. ''Forevermore'' accurately captures this extension and elevates the register appropriately for a psalm, avoiding the slightly modern ring of ''forever and beyond''. Harmonizing with the identical phrase in the adjacent verse (11:9) is correct translation practice here. The verdict is ''modify'' simply to provide the full verse text.'
