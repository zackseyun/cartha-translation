theological_decisions:
- issue: Sense of Israel’s being 'raised up'
  chosen_reading: Kept as 'raise up' without specifying resurrection or merely political
    restoration.
  alternative_readings:
  - restore Israel
  - establish Israel again
  rationale: The Greek does not force a narrower interpretation, so the translation
    preserves the theological breadth of the expression rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
