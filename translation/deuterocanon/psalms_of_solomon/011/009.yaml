id: PSS.11.9
reference: Psalms of Solomon 11:9
source:
  edition: lxx-swete-1909
  text: ποιήσαι Κύριος ἃ ἐλάλησεν ἐπὶ Ἰσραὴλ καὶ Ἰερουσαλήμ· ἀναστήσαι Κύριος τὸν
    Ἰσραὴλ ἐν ὀνόματι δόξης αὐτοῦ. τοῦ κυρίου τὸ ἔλεος ἐπὶ τὸν Ἰσραὴλ εἰς τὸν αἰῶνα
    καὶ ἔτι.
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: May the Lord do what he has spoken concerning Israel and Jerusalem; may the
    Lord raise up Israel in the name of his glory. The Lord’s mercy be upon Israel
    forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fulfill what he has spoken concerning Israel and Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: Or 'restore Israel' for 'raise up Israel.'
    reason: alternative_reading
  - marker: c
    text: Literally, 'forever and still/further.'
    reason: lexical_alternative
  - marker: d
    text: Or 'forevermore'.
    reason: previous_rendering
lexical_decisions:
- source_word: ποιήσαι
  chosen: do
  alternatives:
  - fulfill
  - accomplish
  lexicon: LSJ
  rationale: 'The aorist optative here functions wishfully after an implied benedictory
    force: ''may the Lord do.'' ''Do'' stays close to the Greek while allowing the
    following clause to specify what is to be carried out; ''fulfill'' was possible
    but slightly over-interprets the verb.'
- source_word: ἐλάλησεν ἐπὶ
  chosen: has spoken concerning
  alternatives:
  - spoke about
  - declared over
  lexicon: LSJ
  rationale: With ἐπί plus the accusative objects 'Israel and Jerusalem,' the sense
    is best taken as speech directed with reference to them. 'Concerning' is natural
    English and preserves the referential force without forcing a more specific prophetic
    nuance.
- source_word: ἀναστήσαι
  chosen: raise up
  alternatives:
  - restore
  - establish
  lexicon: LSJ
  rationale: The verb can mean to raise up, rouse, or restore. 'Raise up' preserves
    the literal verbal imagery and leaves open whether the sense is restoration, vindication,
    or re-establishment, rather than narrowing the meaning to one interpretive option.
- source_word: ἐν ὀνόματι δόξης αὐτοῦ
  chosen: in the name of his glory
  alternatives:
  - by his glorious name
  - for the sake of his glorious name
  lexicon: LSJ
  rationale: This phrase is somewhat compressed in Greek. 'In the name of his glory'
    keeps the formal structure and preserves the rhetorical weight of both 'name'
    and 'glory' rather than collapsing them into a single adjective.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: LSJ
  rationale: '''Mercy'' is the standard and most transparent rendering here. Nothing
    in the immediate context requires expansion to covenantal terminology beyond what
    the Greek explicitly states.'
- source_word: εἰς τὸν αἰῶνα καὶ ἔτι
  chosen: forevermore
  alternatives:
  - forever and still
  - forever and beyond
  lexicon: LSJ
  rationale: The phrase literally extends 'forever' with an additional intensifier
    ('and still/further'). 'Forevermore' gives idiomatic modern English while preserving
    the sense of enduring continuance beyond a simple 'forever.'
