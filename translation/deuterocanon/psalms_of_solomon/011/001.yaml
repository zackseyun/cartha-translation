  from: with the signal trumpet of the holy ones
  to: with a signal trumpet for the holy ones
  rationale: 'The genitive ἁγίων is objective, depending on σημασίας (a signal *for* the holy ones to gather, as the following verses describe the exiles returning). The English ''of the holy ones'' strongly implies possession (the trumpet belonging to them), which obscures the author''s meaning. Translating it as ''for the holy ones'' clarifies the objective force. Additionally, ''with a signal trumpet'' is more accurate to the anarthrous Greek (ἐν σάλπιγγι σημασίας) than ''with the signal trumpet''. | Adjudicator: The reviewer correctly identifies the grammatical function of the genitive ἁγίων as objective, depending on σημασίας. A literal ''of the holy ones'' implies possession in English, whereas the context of'
