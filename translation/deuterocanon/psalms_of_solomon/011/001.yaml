theological_decisions:
- issue: Referent of ἁγίων
  chosen_reading: the phrase is rendered literally as 'the holy ones' without deciding whether it refers to consecrated worshipers, priests, or saints more broadly
  alternative_readings:
  - the saints
  - the holy people
  - the consecrated ones
  rationale: The Greek itself does not specify the subgroup clearly enough to justify narrowing the referent in translation. Preserving the broader expression retains the text's ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
