id: PSS.11.1
reference: Psalms of Solomon 11:1
source:
  edition: lxx-swete-1909
  text: Σαλπίσατε ἐν Σιὼν ἐν σάλπιγγι σημασίας ἁγίων,
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: Sound the trumpet in Zion with a signal trumpet for the holy ones,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blow the trumpet in Zion with the trumpet of summons for the holy ones.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with the signal trumpet of the holy ones'.
    reason: previous_rendering
lexical_decisions:
- source_word: Σαλπίσατε
  chosen: Sound the trumpet
  alternatives:
  - Blow the trumpet
  - Trumpet
  lexicon: LSJ
  rationale: Aorist imperative plural of σαλπίζω, calling for a public trumpet-blast. 'Sound the trumpet' is idiomatic modern English and preserves the imperative force.
- source_word: ἐν Σιὼν
  chosen: in Zion
  alternatives:
  - at Zion
  lexicon: LSJ
  rationale: The repeated ἐν is naturally rendered 'in' here, preserving the locative force and the liturgical/public setting centered on Zion.
- source_word: ἐν σάλπιγγι
  chosen: with the trumpet
  alternatives:
  - on a trumpet
  - by trumpet
  lexicon: LSJ
  rationale: Instrumental ἐν with dative is well represented by 'with.' English idiom supplies the article in context.
- source_word: σημασίας
  chosen: signal
  alternatives:
  - summons
  - alarm
  - signal-call
  lexicon: LSJ
  rationale: σημασία denotes a signal or sign-giving function. 'Signal' best preserves the noun's sense here without overinterpreting it as military 'alarm'.
- source_word: ἁγίων
  chosen: of the holy ones
  alternatives:
  - of the saints
  - for the holy ones
  - of holy people
  lexicon: LSJ
  rationale: The genitive is somewhat compact; 'of the holy ones' preserves the Greek wording most transparently. 'Saints' is possible but sounds more tradition-laden in English than the source requires.
