id: PSS.11.5
reference: Psalms of Solomon 11:5
source:
  edition: lxx-swete-1909
  text: ὄρη ὑψηλὰ ἐταπείνωσεν εἰς ὁμαλισμὸν αὐτοῖς·
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: He brought the high mountains low into level ground for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He humbled the lofty mountains into a plain for them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄρη
  chosen: mountains
  alternatives:
  - hills
  lexicon: LSJ
  rationale: The noun ordinarily denotes mountains or large hills; 'mountains' best
    matches the scale of the image in English.
- source_word: ὑψηλά
  chosen: high
  alternatives:
  - lofty
  - elevated
  lexicon: LSJ
  rationale: A straightforward attributive rendering preserves the physical height
    imagery without adding poetic archaism.
- source_word: ἐταπείνωσεν
  chosen: brought low
  alternatives:
  - humbled
  - lowered
  lexicon: LSJ
  rationale: Although the verb can mean 'humbled,' with mountains as the object the
    sense is physical abasement. 'Brought low' preserves the metaphorical force while
    sounding natural in English.
- source_word: εἰς ὁμαλισμόν
  chosen: into level ground
  alternatives:
  - into a plain
  - into smoothness
  lexicon: LSJ
  rationale: 'The phrase expresses result: the mountains are reduced to flatness.
    ''Into level ground'' captures that outcome clearly and idiomatically.'
- source_word: αὐτοῖς
  chosen: for them
  alternatives:
  - to them
  lexicon: LSJ
  rationale: 'In this context the dative is best taken as advantage: the leveling
    is done on their behalf.'
