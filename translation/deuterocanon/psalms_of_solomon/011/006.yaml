id: PSS.11.6
reference: Psalms of Solomon 11:6
source:
  edition: lxx-swete-1909
  text: οἱ βουνοὶ ἔφυγον ἀπὸ εἰσόδου αὐτῶν, οἱ δρυμοὶ ἐσκίασαν αὐτοῖς ἐν τῇ παρόδῳ
    αὐτῶν.
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: The hills fled from their approach; the forests gave them shade along their
    way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at their coming in.' The Greek phrase ἀπὸ εἰσόδου αὐτῶν is compact and
      may be rendered slightly differently in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'woods' or 'thickets' for 'forests.'
    reason: lexical_alternative
  - marker: c
    text: Or 'fled at their entry'.
    reason: previous_rendering
lexical_decisions:
- source_word: βουνοὶ
  chosen: hills
  alternatives:
  - mountains
  lexicon: LSJ
  rationale: βουνός commonly denotes a hill rather than a high mountain; 'hills' best
    matches the likely scale and keeps the imagery natural in English.
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - ran away
  - gave way
  lexicon: LSJ
  rationale: The verb is the ordinary aorist of φεύγω, 'to flee.' 'Fled' preserves
    the vivid personification without paraphrasing it away.
- source_word: ἀπὸ εἰσόδου αὐτῶν
  chosen: at their entry
  alternatives:
  - from before their entrance
  - at their coming in
  lexicon: LSJ
  rationale: The phrase is somewhat compressed. 'At their entry' gives clear English
    while preserving the temporal/situational sense of their arrival rather than over-interpreting
    the preposition.
- source_word: δρυμοὶ
  chosen: forests
  alternatives:
  - woods
  - thickets
  lexicon: LSJ
  rationale: The term can refer to wooded places or thickets. 'Forests' communicates
    a substantial wooded area in natural English; 'woods' and 'thickets' remain possible
    alternatives.
- source_word: ἐσκίασαν αὐτοῖς
  chosen: gave them shade
  alternatives:
  - shaded them
  - cast shade for them
  lexicon: LSJ
  rationale: The dative αὐτοῖς is well represented by 'gave them shade,' which preserves
    both the action and its benefactive nuance.
- source_word: ἐν τῇ παρόδῳ αὐτῶν
  chosen: along their way
  alternatives:
  - in their passing
  - on their journey
  lexicon: LSJ
  rationale: πάροδος here is best taken as the course of passing or route. 'Along
    their way' is idiomatic English that stays close to the underlying image.
