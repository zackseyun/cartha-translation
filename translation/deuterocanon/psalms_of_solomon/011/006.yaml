  rationale: 'Adjudicator-modified: The reviewer is correct that `ἀπὸ` with `φεύγω`
    carries a spatial or causal force (''flee from''), likely reflecting a Hebrew
    substrate like *mippənê* (''from before''). Translating it as ''at'' weakens the
    personification. Furthermore, ''entry'' in English often implies a physical doorway,
    whereas `εἴσοδος` here is an active verbal noun denoting their coming or arrival.
    ''Approach'' captures this active sense more naturally in English than the reviewer''s
    slightly clunky ''entering.'''
