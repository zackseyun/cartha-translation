theological_decisions:
- issue: Sense of ἐν ἐπισκοπῇ δόξης θεοῦ αὐτῶν
  chosen_reading: The phrase refers to Israel passing through under God's glorious
    visitation or attending presence.
  alternative_readings:
  - in the oversight of the glory of their God
  - by the glorious care of their God
  rationale: The noun ἐπισκοπή can denote visitation, care, or oversight. In this
    poetic setting, 'visitation' best preserves the theological sense of God actively
    attending to his people without flattening the phrase into mere administration.
