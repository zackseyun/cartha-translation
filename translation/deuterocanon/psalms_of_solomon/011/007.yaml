id: PSS.11.7
reference: Psalms of Solomon 11:7
source:
  edition: lxx-swete-1909
  text: πᾶν ξύλον εὐωδίας ἀνέτειλεν αὐτοῖς ὁ θεός, ἵνα παρέλθῃ Ἰσραὴλ ἐν ἐπισκοπῇ
    δόξης θεοῦ αὐτῶν,
  language: Greek
  pages:
  - 801
  validation: swete_direct
translation:
  text: God made every fragrant tree spring up for them, so that Israel might pass
    through in the visitation of the glory of their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the oversight/care of the glory of their God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν
  chosen: every
  alternatives:
  - all
  lexicon: LSJ
  rationale: 'With the singular ξύλον, πᾶν is best carried distributively: each kind
    of tree is included.'
- source_word: ξύλον
  chosen: tree
  alternatives:
  - wood
  lexicon: LSJ
  rationale: In this growth context with ἀνέτειλεν and εὐωδίας, 'tree' fits the imagery
    better than the more general 'wood'.
- source_word: εὐωδίας
  chosen: fragrant
  alternatives:
  - sweet-smelling
  - of fragrance
  lexicon: LSJ
  rationale: The genitive is adjectival in sense; 'fragrant' gives clear modern English
    while preserving the idea of pleasing aroma.
- source_word: ἀνέτειλεν
  chosen: made spring up
  alternatives:
  - caused to rise
  - brought forth
  lexicon: LSJ
  rationale: The verb commonly describes things sprouting or rising. 'Made spring
    up' preserves divine agency and vegetal imagery.
- source_word: παρέλθῃ
  chosen: might pass through
  alternatives:
  - might pass by
  - might go through
  lexicon: LSJ
  rationale: The context suggests Israel's movement through a prepared setting. 'Pass
    through' is natural English and keeps the motion explicit.
- source_word: ἐπισκοπῇ
  chosen: visitation
  alternatives:
  - oversight
  - care
  - watchful presence
  lexicon: LSJ
  rationale: Here the noun most naturally refers to God's attentive coming or regard
    rather than administrative 'oversight.' 'Visitation' preserves the elevated theological
    tone without over-interpreting.
- source_word: δόξης
  chosen: glory
  alternatives:
  - splendor
  lexicon: LSJ
  rationale: '''Glory'' is the standard biblical rendering and suits the divine context.'
