translation:
  text: Bless the Lord, every rain and dew; sing praise to him and highly exalt him
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all rain and dew.' The Greek phrase πᾶς ὄμβρος καὶ δρόσος can be taken
      distributively ('every rain and dew') or collectively ('all rain and dew').
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω, used in this litany to call elements of
    creation to speak well of or bless the Lord. 'Bless' preserves the repeated refrain's
    formal texture better than the broader 'praise'.
- source_word: πᾶς ὄμβρος καὶ δρόσος
  chosen: every rain and dew
  alternatives:
  - all rain and dew
  - every shower and dew
  lexicon: LSJ
  rationale: πᾶς with singular collective force can be rendered 'every' or 'all.'
    'Every rain and dew' keeps the distributive feel of the Greek while remaining
    natural enough in English. ὄμβρος denotes rain or rainstorm; δρόσος is dew.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this Greek
    deuterocanonical context, 'the Lord' is the natural direct object of the imperative.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb carries the sense of singing praise. 'Sing praise' communicates
    the musical nuance more clearly than the less idiomatic English verb 'hymn.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - magnify
  lexicon: LSJ
  rationale: The compound intensifies exaltation. 'Highly exalt' preserves the elevated
    and repetitive liturgical style of the refrain.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: The idiom means enduringly or forever. 'Forever' is the clearest modern
    English rendering, while the more literal alternatives are less natural here.
