translation:
  text: and it swept through and burned up those Chaldeans whom it found around the
    furnace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'passed through and set on fire.' The Greek verbs can be rendered more
      formally, but the main text reflects the destructive force of the scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: διώδευσεν
  chosen: swept through
  alternatives:
  - passed through
  - went through
  - moved through
  lexicon: LSJ
  rationale: The compound verb conveys movement through an area, here with force in
    the context of the angel-driven fire. 'Swept through' captures both traversal
    and the destructive momentum better than the flatter 'passed through.'
- source_word: ἐνεπύρισεν
  chosen: burned up
  alternatives:
  - set on fire
  - burned
  - kindled against
  lexicon: LSJ
  rationale: In context the verb describes the fire's destructive effect on the Chaldeans
    near the furnace. 'Burned up' communicates consumption more naturally in English
    than the more wooden 'set on fire.'
- source_word: οὓς εὗρεν
  chosen: those ... whom it found
  alternatives:
  - whoever it found
  - those whom it encountered
  lexicon: LSJ
  rationale: 'The relative clause is straightforward and indefinite in scope: the
    fire affected any Chaldeans it found nearby. The chosen rendering preserves that
    sense without over-paraphrase.'
- source_word: περὶ τὴν κάμινον
  chosen: around the furnace
  alternatives:
  - about the furnace
  - near the furnace
  lexicon: LSJ
  rationale: περί with the accusative here is naturally spatial. 'Around the furnace'
    is the clearest modern English rendering.
- source_word: τῶν Χαλδαίων
  chosen: of the Chaldeans
  alternatives:
  - the Chaldeans
  - of the Babylonians
  lexicon: LSJ
  rationale: Χαλδαῖοι is rendered literally as 'Chaldeans,' the term used in the Greek
    text. Although 'Babylonians' could clarify for modern readers, the source specifically
    says 'Chaldeans,' so the more direct rendering is preferred.
