translation:
  text: Bless the Lord, sun and moon; sing praise to him and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for the ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  - Speak well of
  lexicon: BDAG
  rationale: Imperative plural from εὐλογέω, used in this litany as a summons to offer
    blessing/praise to the Lord. 'Bless' preserves the repeated refrain's formal texture
    better than the more generic 'praise'.
- source_word: ἥλιος καὶ σελήνη
  chosen: sun and moon
  alternatives:
  - the sun and the moon
  lexicon: LSJ
  rationale: Direct vocative address to the heavenly bodies. English can omit the
    articles naturally in poetic address while retaining the sense.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this hymnic
    Jewish context it refers to Israel's God and matches the established covenantal/theological
    usage.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb ὑμνέω denotes singing or chanting praise. 'Sing praise' makes
    the musical nuance explicit in natural English.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: Compound verb intensifies exaltation. 'Highly exalt' preserves the elevated,
    repetitive liturgical force without becoming awkward.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic expression meaning enduring perpetually. 'Forever' is the clearest
    modern English rendering, though more literal options are possible.
