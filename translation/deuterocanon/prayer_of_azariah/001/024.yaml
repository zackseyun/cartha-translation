translation:
  text: And the flame spread above the furnace to forty-nine cubits,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A cubit was a standard ancient unit of length, roughly the distance from
      the elbow to the fingertips.
    reason: cultural_note
lexical_decisions:
- source_word: διείχετο
  chosen: spread
  alternatives:
  - extended
  - went through
  - reached
  lexicon: LSJ
  rationale: The imperfect/middle-passive form here describes the flame's extending
    outward/upward. 'Spread' gives natural English while preserving the image of extension
    rather than motion alone.
- source_word: ἡ φλὸξ
  chosen: the flame
  alternatives:
  - the blaze
  - the fire
  lexicon: LSJ
  rationale: A singular noun is explicit in Greek. 'Flame' is the most direct equivalent
    and preserves the vividness of the image.
- source_word: ἐπάνω τῆς καμίνου
  chosen: above the furnace
  alternatives:
  - over the furnace
  - on top of the furnace
  lexicon: LSJ
  rationale: ἐπάνω with the genitive indicates position above/over. 'Above the furnace'
    is the clearest idiomatic rendering in English.
- source_word: ἐπὶ πήχεις τεσσαράκοντα ἐννέα
  chosen: to forty-nine cubits
  alternatives:
  - for forty-nine cubits
  - up to forty-nine cubits
  lexicon: LSJ
  rationale: The phrase measures the extent/height of the flame. 'To forty-nine cubits'
    is concise and idiomatic, while retaining the ancient unit rather than converting
    it.
