theological_decisions:
- issue: Sense of ἐξωμολογεῖτο in a prayer that includes both praise and confession
  chosen_reading: confessed
  alternative_readings:
  - gave thanks
  - praised
  rationale: The immediate literary context of Azariah's prayer emphasizes acknowledgment
    of God's justice and the people's sin, so 'confessed' best captures the theological
    thrust without excluding praise. Because the verb can also carry thanksgiving/praise
    nuance in biblical Greek, that alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    alternatives in footnotes.
