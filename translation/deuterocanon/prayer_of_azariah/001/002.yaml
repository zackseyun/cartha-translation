id: PAZ.1.2
reference: Prayer of Azariah and Song of the Three 1:2
source:
  edition: lxx-swete-1909
  text: στὰς δὲ Ἀζαρίας προσηύξατο οὕτως, καὶ ἀνοίξας τὸ στόμα αὐτοῦ ἐξωμολογεῖτο
    τῷ κυρίῳ ἅμα τοῖς συνεταίροις αὐτοῦ ἐν μέσῳ τῷ πυρί, ὑποκαιομένης τῆς καμίνου
    ὑπὸ τῶν Χαλδαίων σφόδρα. καὶ εἶπαν
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: Then Azariah stood and prayed thus, and opening his mouth he confessed to
    the Lord together with his companions in the midst of the fire, while the furnace
    was being intensely heated by the Chaldeans. And they said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gave thanks' or 'praised'; the Greek verb can carry either confession
      or thanksgiving/praise depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: στὰς
  chosen: stood
  alternatives:
  - having stood
  - standing up
  lexicon: LSJ
  rationale: Aorist participle of ἵστημι used adverbially before the main verb. 'Stood'
    is natural English and preserves the narrative action without over-literal awkwardness.
- source_word: προσηύξατο
  chosen: prayed
  alternatives:
  - offered prayer
  lexicon: LSJ
  rationale: Standard rendering of προσεύχομαι. 'Prayed' is direct and idiomatic.
- source_word: οὕτως
  chosen: thus
  alternatives:
  - in this way
  - as follows
  lexicon: LSJ
  rationale: Introduces the content of the prayer. 'Thus' keeps the formal narrative
    tone and closely reflects the Greek.
- source_word: ἀνοίξας τὸ στόμα αὐτοῦ
  chosen: opening his mouth
  alternatives:
  - having opened his mouth
  - he opened his mouth
  lexicon: LSJ
  rationale: A conventional Semitic/Greek narrative expression marking solemn speech.
    Preserved rather than reduced to simply 'said' because it contributes to the elevated
    style.
- source_word: ἐξωμολογεῖτο
  chosen: confessed
  alternatives:
  - gave thanks
  - praised
  lexicon: LSJ
  rationale: The verb can denote confession or praise/thanksgiving depending on context.
    Here the prayer that follows includes confession of God's righteousness and Israel's
    sin, so 'confessed' best preserves that dimension, while an alternative is worth
    noting.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - to the master
  lexicon: LSJ
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Jewish scriptural context
    it refers reverently to God.
- source_word: ἅμα τοῖς συνεταίροις αὐτοῦ
  chosen: together with his companions
  alternatives:
  - along with his associates
  - with his fellow companions
  lexicon: LSJ
  rationale: ἅμα marks accompaniment; συνεταῖροι refers to those with him, namely
    the other youths. 'Companions' is natural and contextually fitting.
- source_word: ἐν μέσῳ τῷ πυρί
  chosen: in the midst of the fire
  alternatives:
  - in the middle of the fire
  - amid the fire
  lexicon: LSJ
  rationale: A vivid locative phrase. 'In the midst of the fire' preserves the elevated
    diction and dramatic setting.
- source_word: ὑποκαιομένης τῆς καμίνου
  chosen: while the furnace was being intensely heated
  alternatives:
  - while the furnace was burning underneath
  - while the furnace was being stoked
  lexicon: LSJ
  rationale: Genitive absolute describing the ongoing state of the furnace. The compound
    verb conveys active heating/stoking; in context 'was being intensely heated' communicates
    the sense clearly.
- source_word: ὑπὸ τῶν Χαλδαίων
  chosen: by the Chaldeans
  alternatives:
  - by the Babylonians
  lexicon: LSJ
  rationale: The Greek explicitly says 'Chaldeans.' This should be retained rather
    than generalized to 'Babylonians,' though the terms overlap historically.
- source_word: σφόδρα
  chosen: intensely
  alternatives:
  - greatly
  - exceedingly
  - very much
  lexicon: LSJ
  rationale: Modifies the heating of the furnace. 'Intensely' fits the immediate context
    better than a bare adverb like 'greatly'.
- source_word: καὶ εἶπαν
  chosen: And they said,
  alternatives:
  - And he said,
  lexicon: LSJ
  rationale: The transmitted text here reads plural, introducing the following song/prayer
    as shared speech. Because the immediate preceding subject is singular Azariah,
    the plural may feel abrupt, but it coheres with 'together with his companions'
    and should be retained.
