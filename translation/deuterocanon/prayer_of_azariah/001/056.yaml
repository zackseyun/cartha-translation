translation:
  text: Bless the Lord, sea creatures and all that move in the waters; sing praise
    to him and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great sea creatures,' 'whales,' or 'sea monsters.' The Greek κήτη is
      a broad term for large creatures of the waters.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural calling creatures to speak or enact blessing toward
    the Lord. 'Bless' preserves the liturgical refrain of the passage more closely
    than the broader 'praise.'
- source_word: κήτη
  chosen: sea creatures
  alternatives:
  - great sea creatures
  - whales
  - monsters of the sea
  lexicon: LSJ
  rationale: The term can denote large sea animals or sea monsters. 'Sea creatures'
    is natural modern English and broad enough to include the category without forcing
    the narrower traditional 'whales' or the mythically loaded 'sea monsters' in this
    context.
- source_word: πάντα τὰ κινούμενα
  chosen: all that move
  alternatives:
  - all moving things
  - every creature that moves
  lexicon: BDAG
  rationale: The articular participial phrase is comprehensive and refers to living
    things in motion. 'All that move' is concise and idiomatic while preserving the
    breadth of the Greek.
- source_word: ἐν τοῖς ὕδασι
  chosen: in the waters
  alternatives:
  - in the water
  lexicon: BDAG
  rationale: Plural 'waters' reflects the Greek and matches biblical idiom for the
    watery realm.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' In this hymnic Jewish context
    it functions as the standard divine title.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb specifically denotes singing praise or hymning. 'Sing praise'
    communicates the musical nuance better than plain 'praise.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: This recurring refrain intensifies exaltation. 'Highly exalt' is idiomatic
    and preserves the superlative force.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this refrain the idiomatic sense is enduring perpetually. 'Forever'
    is clear modern English, while more literal alternatives are less natural here.
