theological_decisions:
- issue: Rendering δοῦλος in a patriarchal title
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: The project's default allows 'servant / slave' context-dependently. Here
    the prayer lists covenant ancestors in honorific apposition ('Isaac your servant'),
    where faithful service is primary and the harsh bonded-status nuance is not the
    main point. Therefore 'servant' best reflects the text's function without flattening
    meaning.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος servant / slave (context-dependent)'
- issue: Force of the patriarchal appeal introduced by διὰ
  chosen_reading: for the sake of Abraham... Isaac... Israel
  alternative_readings:
  - because of Abraham... Isaac... Israel
  rationale: The verse appeals to God's relationship with the patriarchs as grounds
    for continued mercy. 'For the sake of' preserves that intercessory and covenantal
    appeal without making a stronger doctrinal claim than the Greek itself states.
  doctrine_reference: DOCTRINE.md §1, §3
