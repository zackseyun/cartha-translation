translation:
  text: And do not withdraw your mercy from us, for the sake of Abraham your beloved,
    and Isaac your servant, and Israel your holy one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not take your mercy away from us.'
    reason: lexical_alternative
  - marker: b
    text: '''Israel'' here refers to the patriarch Jacob under his covenant name.'
    reason: cross_reference
lexical_decisions:
- source_word: ἀποστήσῃς
  chosen: withdraw
  alternatives:
  - turn away
  - remove
  - take away
  lexicon: BDAG
  rationale: 'From ἀφίστημι in the causative/transitive sense with τὸ ἔλεός σου as
    object: a request that God not remove or withdraw mercy from the people. ''Withdraw''
    is natural English and preserves the relational sense better than the more abrupt
    ''remove''.'
- source_word: τὸ ἔλεός
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: LEH
  rationale: ἔλεος commonly denotes mercy/compassion. 'Mercy' is the standard concise
    rendering and fits the prayer context without importing covenantal nuance beyond
    the Greek wording.
- source_word: διὰ
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: BDAG
  rationale: Here διὰ with the accusative introduces the basis of appeal in prayer,
    invoking the patriarchs as grounds for mercy. 'For the sake of' best captures
    this intercessory force in idiomatic English.
- source_word: ἠγαπημένον
  chosen: beloved
  alternatives:
  - loved one
  - one loved by you
  lexicon: BDAG
  rationale: The participle modified by ὑπὸ σοῦ explicitly means 'loved by you.' 'Beloved'
    is compact, reverent, and preserves the passive sense when paired with 'your'
    in English.
- source_word: δοῦλόν
  chosen: servant
  alternatives:
  - slave
  lexicon: BDAG
  rationale: Although δοῦλος can mean 'slave,' in this patriarchal honorific context
    the bonded-status nuance is not foregrounded; the phrase functions as a title
    of faithful devotion before God. Per doctrine, context may favor 'servant' where
    'slave' would overstate the social dimension.
- source_word: ἅγιόν
  chosen: holy one
  alternatives:
  - saint
  - consecrated one
  lexicon: BDAG
  rationale: ἅγιος here is substantival and singular, referring to Israel/Jacob as
    one set apart to God. 'Holy one' is the most transparent rendering; 'saint' would
    sound anachronistic and ecclesiastical.
- source_word: Ἰσραήλ
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: LEH
  rationale: The Greek text reads Ἰσραήλ, the covenant name of the patriarch. It should
    be transliterated as 'Israel' rather than harmonized to 'Jacob,' since the prayer
    intentionally invokes the patriarch under his covenantal name.
