theological_decisions:
- issue: Cultic term sequence in a context of exile/temple loss
  chosen_reading: Render the list distinctly as absent forms of authority and worship
    without collapsing terms into a generalized paraphrase.
  alternative_readings:
  - Compress the sacrificial terms into a shorter summary such as 'no sacrifices or
    offerings'.
  rationale: The verse emphasizes the full deprivation of both leadership and temple
    worship. Preserving each term maintains the rhetorical weight and avoids muting
    the lament.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Meaning of τοῦ καρπῶσαι
  chosen_reading: Translate contextually as 'to bring firstfruits.'
  alternative_readings:
  - '''to offer fruit'''
  - '''to present produce'''
  rationale: Given the surrounding sacrificial vocabulary and the temple setting,
    a cultic sense tied to produce/firstfruits is more likely than a generic reference
    to fruit. This is a lexical-contextual judgment rather than a doctrinal claim.
  doctrine_reference: Translation philosophy §§1, 5
