id: PAZ.1.15
reference: Prayer of Azariah and Song of the Three 1:15
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἔστιν ἐν τῷ καιρῷ τούτῳ ἄρχων καὶ προφήτης οὐδὲ ἡγούμενος, οὐδὲ ὁλοκαύτωσις
    οὐδὲ θυσία οὐδὲ προσφορὰ οὐδὲ θυμίαμα, οὐδὲ τόπος τοῦ καρπῶσαι ἐνώπιόν σου καὶ
    εὑρεῖν ἔλεος.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: And at this time there is no ruler or prophet or leader, no whole burnt offering
    or sacrifice or offering or incense, and no place to offer before you and to find
    mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to offer fruit' or 'to present produce before you.' The Greek expression
      is uncommon; 'bring firstfruits' reflects the cultic context of the surrounding
      terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρχων
  chosen: ruler
  alternatives:
  - prince
  - leader
  lexicon: BDAG
  rationale: A broad term for one who holds governing authority. 'Ruler' preserves
    the political/public sense better than 'leader' alone in this list of absent authorities.
- source_word: προφήτης
  chosen: prophet
  lexicon: BDAG
  rationale: Standard rendering; no contextual reason to vary.
- source_word: ἡγούμενος
  chosen: leader
  alternatives:
  - governor
  - chief
  lexicon: BDAG
  rationale: Distinguished from ἄρχων by using 'leader' rather than repeating 'ruler.'
    This keeps the paired offices distinct without over-specifying the role.
- source_word: ὁλοκαύτωσις
  chosen: whole burnt offering
  alternatives:
  - burnt offering
  lexicon: LEH
  rationale: The term denotes an offering wholly consumed by fire. 'Whole burnt offering'
    makes that nuance explicit and distinguishes it from the broader θυσία.
- source_word: θυσία
  chosen: sacrifice
  lexicon: BDAG
  rationale: General cultic term; 'sacrifice' is the natural broad English equivalent.
- source_word: προσφορά
  chosen: offering
  alternatives:
  - gift offering
  - oblation
  lexicon: LEH
  rationale: A general presented offering. 'Offering' is clear modern English; 'oblation'
    would be too ecclesiastical.
- source_word: θυμίαμα
  chosen: incense
  alternatives:
  - incense offering
  lexicon: LEH
  rationale: The noun commonly denotes incense itself; 'incense' is concise and idiomatic
    in the cultic list.
- source_word: τόπος
  chosen: place
  alternatives:
  - site
  lexicon: BDAG
  rationale: Straightforward rendering for the location where worship actions would
    be performed.
- source_word: τοῦ καρπῶσαι
  chosen: to bring firstfruits
  alternatives:
  - to offer fruit
  - to present produce
  lexicon: LEH
  rationale: In this sacrificial context, the verb built on καρπός most naturally
    refers to presenting produce/firstfruits. 'Bring firstfruits' fits the temple-worship
    setting better than the overly literal 'offer fruit.'
- source_word: ἐνώπιόν σου
  chosen: before you
  alternatives:
  - in your presence
  lexicon: BDAG
  rationale: Direct and natural English preserving the relational/cultic sense.
- source_word: εὑρεῖν ἔλεος
  chosen: to find mercy
  alternatives:
  - to receive mercy
  lexicon: BDAG
  rationale: A common biblical idiom; 'find mercy' preserves the verbal imagery of
    the Greek.
- source_word: ἐν τῷ καιρῷ τούτῳ
  chosen: at this time
  alternatives:
  - in this time
  - at the present time
  lexicon: BDAG
  rationale: Natural English for the temporal phrase, preserving the immediacy of
    the lament.
