translation:
  text: Bless the Lord, slaves; sing praise to him and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' or 'bondservants.' Greek δοῦλοι can denote those in service
      generally or those in bonded status; the main text keeps the stronger sense.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for the ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  - Speak well of
  lexicon: BDAG
  rationale: Imperative plural from εὐλογέω. In liturgical exhortation addressed to
    worshipers, 'Bless' preserves the traditional and lexical sense of speaking praise
    toward God better than flattening to 'praise' alone.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: The noun δοῦλος can mean servant or slave depending on context. Here
    it addresses those in a status of service to the Lord. Following project doctrine,
    'slave' is preferred where bonded belonging is salient; in this hymnic summons
    to the Lord's δοῦλοι, 'slaves' best preserves that force, though 'servants' remains
    a viable alternative.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this doxological
    context it functions as the divine title and should not be weakened to 'master'
    in the main text.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb ὑμνέω specifically denotes singing a hymn or praise. 'Sing praise'
    communicates the musical nuance in natural English better than the less idiomatic
    'hymn' as a verb.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: The compound intensifies the idea of exalting. 'Highly exalt' preserves
    the elevated tone and the intensification without sounding wooden.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: The idiom means enduringly or forever. 'Forever' is the clearest natural
    English equivalent here, while more literal options can be preserved as alternatives
    if needed.
