translation:
  text: Bless the Lord, stars of heaven; sing praise to him and highly exalt him forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω, commonly used in hymnic summons to speak
    well of or bless God. 'Bless' preserves the liturgical force and matches the repeated
    refrain structure of the Song better than flattening it to 'praise'.
- source_word: ἄστρα
  chosen: stars
  alternatives:
  - heavenly bodies
  lexicon: LSJ
  rationale: The noun directly denotes stars. Although broader celestial bodies could
    be conceptually included, the Greek term itself is specific, so 'stars' is the
    most textually anchored rendering.
- source_word: τοῦ οὐρανοῦ
  chosen: of heaven
  alternatives:
  - of the sky
  - of the heavens
  lexicon: LSJ
  rationale: The genitive specifies the realm to which the stars belong. 'Of heaven'
    preserves the elevated register appropriate to the hymn and reflects the singular
    Greek form without sounding unnatural in English.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this doxological context
    it functions as the divine title and should be translated rather than paraphrased.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb means to sing a hymn or sing praise. 'Sing praise' communicates
    the musical and worshipful nuance in natural modern English better than the less
    idiomatic verbal use 'hymn'.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: The compound intensifies exaltation. 'Highly exalt' preserves the heightened
    force while remaining readable and fitting the recurring refrain of the passage.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this liturgical refrain the idiom denotes enduring perpetuity. 'Forever'
    is the clearest natural English equivalent, while more literal options sound wooden
    in this context.
