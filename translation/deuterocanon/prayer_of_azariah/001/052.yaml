translation:
  text: Bless the Lord, mountains and hills; sing praise and highly exalt him forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural calling creation to speak well of or bless the Lord.
    'Bless' preserves the liturgical refrain of the passage better than flattening
    it to 'praise,' while remaining natural in English.
- source_word: ὄρη καὶ βουνοί
  chosen: mountains and hills
  alternatives:
  - mountains and highlands
  lexicon: LSJ
  rationale: A straightforward pairing of elevated landforms. 'Mountains and hills'
    is the most natural and transparent English equivalent and preserves the poetic
    parallelism.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: Following the project's default for κύριος, 'the Lord' is used. In this
    Greek deuterocanonical context the text reads κύριον, and 'the Lord' matches both
    the source wording and the doxological register.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb denotes singing or chanting praise. 'Sing praise' communicates
    the musical sense more clearly than the less idiomatic English verb 'hymn'.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt
  - lift up exceedingly
  lexicon: LSJ
  rationale: The compound intensifies exaltation. 'Highly exalt' preserves that intensification
    better than simple 'exalt' while remaining readable.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring back to the Lord; standard English personal
    pronoun is appropriate.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this recurring refrain, the idiomatic sense is enduring perpetuity.
    'Forever' is clear modern English and fits the liturgical cadence.
