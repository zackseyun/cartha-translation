translation:
  text: 'Then the three, as with one mouth, were singing hymns and glorifying and
    blessing God in the furnace, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with one voice.' The Greek literally says 'as from one mouth,' emphasizing
      the complete unity of the three in their praise.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: LSJ
  rationale: Standard temporal transition introducing the next scene; 'Then' is natural
    and sufficiently formal.
- source_word: οἱ τρεῖς
  chosen: the three
  alternatives:
  - the three men
  - the three youths
  lexicon: LSJ
  rationale: The Greek text here simply says 'the three' without repeating a noun.
    English can preserve that economy; more specific expansions would import context
    not stated in this verse itself.
- source_word: ὡς ἐξ ἑνὸς στόματος
  chosen: as with one mouth
  alternatives:
  - as from one mouth
  - with one voice
  lexicon: LSJ
  rationale: The phrase is idiomatic for unified speech. 'With one voice' is a good
    dynamic equivalent, but 'as with one mouth' better preserves the vivid Greek imagery
    while remaining understandable in English.
- source_word: ὕμνουν
  chosen: were singing hymns
  alternatives:
  - were praising in song
  - were hymning
  lexicon: LSJ
  rationale: The imperfect indicates ongoing action. 'Singing hymns' captures the
    verbal sense of hymnody more precisely than the broader 'praising.'
- source_word: ἐδόξαζον
  chosen: glorifying
  alternatives:
  - giving glory to
  - praising
  lexicon: LSJ
  rationale: This verb specifically denotes giving glory/honor. 'Glorifying' keeps
    the lexical distinction from the surrounding praise verbs.
- source_word: εὐλόγουν
  chosen: blessing
  alternatives:
  - speaking well of
  - praising
  lexicon: LSJ
  rationale: Retaining 'blessing' preserves the distinct verb rather than collapsing
    it into a generic synonym for praise.
- source_word: τὸν θεὸν
  chosen: God
  alternatives:
  - the God
  lexicon: LSJ
  rationale: Although the Greek has the article, English normally omits it before
    'God' in this construction.
- source_word: ἐν τῇ καμίνῳ
  chosen: in the furnace
  alternatives:
  - in the oven
  - inside the furnace
  lexicon: LSJ
  rationale: '''Furnace'' is the standard and contextually appropriate rendering for
    κάμινος in Daniel''s fiery-furnace narrative.'
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: LSJ
  rationale: A participle introducing the following speech. 'Saying' is the most straightforward
    English lead-in.
