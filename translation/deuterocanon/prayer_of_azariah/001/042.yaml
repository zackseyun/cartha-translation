translation:
  text: Bless the Lord, all spirits; sing praise and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all winds,' if πνεύματα is taken in the sense of moving airs rather
      than spiritual beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω, commonly 'bless' in doxological contexts.
    'Bless' preserves the liturgical force and the repeated refrain structure of the
    Song better than flattening it to 'praise.'
- source_word: πάντα τὰ πνεύματα
  chosen: all spirits
  alternatives:
  - every spirit
  - all winds
  lexicon: BDAG
  rationale: The phrase is vocative and naturally rendered 'all spirits.' While πνεῦμα
    can mean 'wind' or 'breath,' the immediate wording addresses a class of beings/powers,
    and the next verse separately addresses 'souls and spirits of the righteous,'
    so 'spirits' is the most direct rendering here.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this hymnic
    Jewish-Greek context it functions as the reverential divine title.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb denotes singing a hymn or praise. 'Sing praise' communicates
    the musical nuance in natural modern English better than the less idiomatic verb
    'hymn.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: The compound intensifies exaltation. 'Highly exalt' preserves that intensification
    and matches the elevated style of the refrain.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic expression for enduring perpetuity. 'Forever' is clear modern
    English while preserving the sense of unending duration.
