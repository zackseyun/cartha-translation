translation:
  text: Blessed are you on the throne of your kingdom, and greatly praised and highly
    exalted forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon the throne of your kingship.' The Greek βασιλεία can mean 'kingdom,'
      'kingship,' or 'reign.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογημένος
  chosen: Blessed
  alternatives:
  - Praised
  - Blessed be
  lexicon: BDAG
  rationale: Predicate adjective in a liturgical blessing formula; 'Blessed' preserves
    the doxological force better than the more interpretive 'Praised.' 'Blessed be'
    would require supplying an imperative nuance not present in the Greek.
- source_word: ἐπὶ θρόνου
  chosen: on the throne
  alternatives:
  - upon the throne
  - enthroned on
  lexicon: LSJ
  rationale: A straightforward locative rendering of ἐπί with the genitive phrase
    following. 'On the throne' is natural English and keeps the imagery concrete;
    'enthroned on' is smoother but adds verbal force not explicit in the text.
- source_word: τῆς βασιλείας σου
  chosen: of your kingdom
  alternatives:
  - of your kingship
  - of your reign
  lexicon: LSJ
  rationale: βασιλεία can denote kingdom, kingship, or reign. 'Kingdom' fits the throne
    imagery and is the most natural collocation in English ('throne of your kingdom'),
    while still allowing the royal sovereignty sense to be heard.
- source_word: ὑπερυμνητός
  chosen: greatly praised
  alternatives:
  - supremely praised
  - extolled above all
  lexicon: LSJ
  rationale: The compound intensifies the idea of praise. 'Greatly praised' communicates
    the superlative force in readable modern English without becoming overly paraphrastic.
- source_word: ὑπερυψωμένος
  chosen: highly exalted
  alternatives:
  - supremely exalted
  - lifted up above all
  lexicon: BDAG
  rationale: A standard doxological term meaning exalted to the highest degree. 'Highly
    exalted' is idiomatic and preserves the elevated register.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: The idiom denotes enduring perpetuity. 'Forever' is the clearest natural
    English equivalent; the more literal 'for the ages' is less idiomatic in contemporary
    English.
