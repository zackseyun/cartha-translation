theological_decisions:
- issue: Rendering the idiom εἰς τέλος in a plea for divine mercy
  chosen_reading: completely
  alternative_readings:
  - to the end
  - utterly
  - for ever
  rationale: The prayer asks God not to abandon his people in a final, total way.
    'Completely' best conveys the idiomatic sense in contemporary English while avoiding
    a potentially misleading temporal reading alone.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: How to render διασκεδάσῃς σου τὴν διαθήκην
  chosen_reading: do not scatter your covenant
  alternative_readings:
  - do not annul your covenant
  - do not break your covenant
  rationale: The Greek verb is concretely 'scatter/disperse.' Although English more
    naturally says a covenant is 'broken' or 'annulled,' preserving the metaphor aligns
    with original-language primacy and avoids importing a stronger legal conclusion
    than the wording itself states. The smoother alternatives are preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
