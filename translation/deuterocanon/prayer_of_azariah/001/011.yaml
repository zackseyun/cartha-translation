id: PAZ.1.11
reference: Prayer of Azariah and Song of the Three 1:11
source:
  edition: lxx-swete-1909
  text: μὴ παραδῷς ἡμᾶς εἰς τέλος διὰ τὸ ὄνομά σου, καὶ μὴ διασκεδάσῃς σου τὴν διαθήκην.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: Do not give us over utterly for the sake of your name, and do not break your
    covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not give us over to the end,' that is, 'do not abandon us utterly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not annul your covenant' or 'do not break your covenant.' The Greek
      verb literally means 'scatter' or 'disperse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ παραδῷς
  chosen: Do not give ... over
  alternatives:
  - Do not hand ... over
  - Do not deliver
  lexicon: BDAG
  rationale: παραδίδωμι commonly means to hand over, deliver, or give over. In prayer
    context, 'give us over' is natural modern English and preserves the sense of being
    surrendered to destruction or enemies without over-paraphrasing.
- source_word: εἰς τέλος
  chosen: completely
  alternatives:
  - to the end
  - utterly
  - for ever
  lexicon: LSJ
  rationale: The phrase can mean 'to the end' or idiomatically 'utterly/completely.'
    Here it modifies the plea not to be abandoned in a final or total way. 'Completely'
    communicates the idiomatic force in readable English better than the more opaque
    literal 'to the end.'
- source_word: διὰ τὸ ὄνομά σου
  chosen: for the sake of your name
  alternatives:
  - because of your name
  - on account of your name
  lexicon: BDAG
  rationale: This phrase appeals to God's reputation and covenantal identity as the
    basis for mercy. 'For the sake of your name' is both idiomatic and theologically
    transparent.
- source_word: μὴ διασκεδάσῃς
  chosen: do not scatter
  alternatives:
  - do not disperse
  - do not break up
  - do not annul
  lexicon: LSJ
  rationale: διασκεδάζω literally means to scatter or disperse. With 'your covenant'
    as object, the image is unusual in English, but preserving 'scatter' keeps the
    Greek metaphor visible. A more interpretive rendering like 'annul' may capture
    effect but moves beyond the lexical image.
- source_word: τὴν διαθήκην
  chosen: your covenant
  alternatives:
  - your agreement
  - your testament
  lexicon: BDAG
  rationale: διαθήκη in biblical Greek regularly carries covenantal force in relation
    to God and his people. 'Covenant' is the established and contextually correct
    rendering.
