translation:
  text: Bless the Lord, seas and rivers; sing praise to him and highly exalt him forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  - Speak well of
  lexicon: BDAG
  rationale: Imperative plural calling creation to offer blessing/praise. 'Bless'
    preserves the liturgical refrain and matches the direct object construction with
    τὸν κύριον.
- source_word: θάλασσαι
  chosen: seas
  alternatives:
  - waters of the sea
  - oceans
  lexicon: LSJ
  rationale: Plural noun is best kept as 'seas,' preserving the poetic personification
    of multiple bodies of salt water rather than flattening to a singular collective.
- source_word: ποταμοί
  chosen: rivers
  alternatives:
  - streams
  lexicon: LSJ
  rationale: Standard gloss for ποταμοί; 'rivers' is the natural English equivalent
    and pairs well with 'seas' in the creation hymn.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this hymnic
    address it functions as the divine title, not a generic master.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb specifically denotes singing a hymn or praise. 'Sing praise'
    communicates the musical nuance better than the more opaque English verb 'hymn.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: The compound intensifies exaltation. 'Highly exalt' preserves the elevated
    register and the intensifying force without sounding unnatural.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this recurring refrain, 'forever' is the clearest idiomatic English
    rendering, while still conveying enduring, age-spanning praise.
