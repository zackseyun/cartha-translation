translation:
  text: Bless the Lord, frost and cold; sing praise to him and highly exalt him forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural calling elements of creation to speak or act in praise.
    'Bless' preserves the liturgical and doxological force of εὐλογέω better than
    the flatter 'praise,' especially in the repeated refrain of this hymn.
- source_word: πάγος
  chosen: frost
  alternatives:
  - ice
  - hoarfrost
  lexicon: LSJ
  rationale: πάγος can denote frost or ice. In pairing with ψῦχος, an atmospheric
    sense fits best in this creation litany. 'Frost' is natural English and distinguishes
    it from the broader coldness of ψῦχος.
- source_word: ψῦχος
  chosen: cold
  alternatives:
  - chill
  - cold weather
  lexicon: LSJ
  rationale: The noun denotes cold or chill. 'Cold' is the most direct and idiomatic
    rendering in this poetic pair with πάγος.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Greek deuterocanonical
    context, 'the Lord' is the standard rendering and fits the hymn's address.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: LSJ
  rationale: The verb specifically carries the sense of singing a hymn or song of
    praise. 'Sing praise' communicates that musical nuance in clear modern English.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: The compound intensifies the act of exalting. 'Highly exalt' preserves
    the heightened force while remaining idiomatic in English.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this refrain, the idiom expresses enduring, unending praise. 'Forever'
    is the clearest natural English equivalent.
