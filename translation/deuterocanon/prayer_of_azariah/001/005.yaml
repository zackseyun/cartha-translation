theological_decisions:
- issue: Rendering the repeated judicial language without softening divine punishment
  chosen_reading: Use 'judgments' and 'judgment' language explicitly, presenting God's
    actions against Jerusalem as just judicial acts because of Israel's sins.
  alternative_readings:
  - Use broader terms like 'justice' or 'what is right' to reduce forensic force
  rationale: The verse is a confession that God's punitive acts were not arbitrary
    but judicially true and warranted. The Greek repeats courtroom language, and the
    translation should preserve that theological emphasis rather than generalize it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
