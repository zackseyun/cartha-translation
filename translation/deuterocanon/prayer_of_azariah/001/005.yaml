id: PAZ.1.5
reference: Prayer of Azariah and Song of the Three 1:5
source:
  edition: lxx-swete-1909
  text: καὶ κρίματα ἀληθείας ἐποίησας κατὰ πάντα ἃ ἐπήγαγες ἡμῖν καὶ ἐπὶ τὴν πόλιν
    σου τὴν ἁγίαν τὴν τῶν πατέρων ἡμῶν Ἰερουσαλήμ· διότι ἐν ἀληθείᾳ καὶ κρίσει ἐποίησας
    πάντα ταῦτα διὰ τὰς ἁμαρτίας ἡμῶν.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: And you have executed true judgments in all that you have brought upon us
    and upon your holy city, Jerusalem, the city of our fathers; for in truth and
    judgment you have done all these things because of our sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in truth and justice.' The Greek phrase can be rendered with either
      'judgment' or 'justice'; 'judgment' is retained here to preserve the verse's
      repeated judicial wording.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίματα
  chosen: judgments
  alternatives:
  - justice
  - sentences
  - decrees
  lexicon: BDAG
  rationale: The plural noun refers to acts or decisions of judgment. 'Judgments'
    preserves the forensic and evaluative sense and fits both occurrences in the verse.
    'Justice' is possible but less concrete; 'sentences' is too narrow.
- source_word: ἀληθείας
  chosen: 'true'
  alternatives:
  - truth
  - faithfulness
  lexicon: BDAG
  rationale: In the phrase κρίματα ἀληθείας, the genitive qualifies the judgments
    as being in accordance with truth. English idiom is smoother with 'true judgments'
    than 'judgments of truth,' while preserving the sense.
- source_word: ἐποίησας
  chosen: have executed / have done
  alternatives:
  - made
  - performed
  lexicon: BDAG
  rationale: The verb occurs twice with slightly different objects. With κρίματα,
    'have executed' best conveys carrying out judicial acts; with πάντα ταῦτα, 'have
    done' is the natural English equivalent. This is a documented context-driven variation
    for readability and precision.
- source_word: κατὰ πάντα ἃ ἐπήγαγες ἡμῖν
  chosen: in all that you have brought upon us
  alternatives:
  - according to all that you brought on us
  - with respect to everything you inflicted on us
  lexicon: BDAG
  rationale: ἐπάγω here means to bring upon, especially calamity or punishment. 'Brought
    upon us' is idiomatic and preserves the causative sense without over-specifying
    'inflicted.'
- source_word: πόλιν σου τὴν ἁγίαν
  chosen: your holy city
  alternatives:
  - your sacred city
  lexicon: BDAG
  rationale: Standard rendering of πόλις + ἅγιος. 'Holy city' is natural biblical
    English and preserves covenantal/theological weight.
- source_word: τὴν τῶν πατέρων ἡμῶν Ἰερουσαλήμ
  chosen: Jerusalem, the city of our fathers
  alternatives:
  - Jerusalem of our fathers
  - Jerusalem, belonging to our fathers
  lexicon: BDAG
  rationale: The appositional structure identifies Jerusalem as the ancestral city.
    Recasting as 'Jerusalem, the city of our fathers' makes the relation clear in
    English without adding content.
- source_word: διότι
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the reason or explanation for the preceding confession. 'For'
    fits the formal tone and links the clauses smoothly.
- source_word: ἐν ἀληθείᾳ καὶ κρίσει
  chosen: in truth and judgment
  alternatives:
  - with truth and justice
  - truly and justly
  lexicon: BDAG
  rationale: The prepositional phrase describes the manner or standard of God's action.
    'In truth and judgment' stays close to the Greek and preserves the judicial register.
    'Justly' is interpretive and would flatten the two-term structure.
- source_word: πάντα ταῦτα
  chosen: all these things
  alternatives:
  - all this
  lexicon: BDAG
  rationale: The plural demonstrative is explicit in Greek; 'all these things' preserves
    that emphasis better than the more compressed 'all this.'
- source_word: διὰ τὰς ἁμαρτίας ἡμῶν
  chosen: because of our sins
  alternatives:
  - on account of our sins
  - for our sins
  lexicon: BDAG
  rationale: διά with the accusative expresses cause. 'Because of our sins' is clear,
    natural, and preserves the confessional force.
