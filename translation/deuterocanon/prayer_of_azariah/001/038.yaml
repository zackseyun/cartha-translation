translation:
  text: Let every power bless the Lord; sing praise and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all powers bless the Lord.' The Greek has singular δύναμις with πᾶσα,
      which may be understood distributively or collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογείτω
  chosen: Let ... bless
  alternatives:
  - bless
  - give praise to
  lexicon: BDAG
  rationale: Third-person imperative; English idiom is best conveyed with 'Let ...
    bless' to preserve the exhortational force without awkwardness.
- source_word: πᾶσα
  chosen: every
  alternatives:
  - all
  lexicon: LSJ
  rationale: With singular ἡ δύναμις, 'every' better reflects the distributive sense
    than 'all' in English.
- source_word: ἡ δύναμις
  chosen: power
  alternatives:
  - might
  - host
  - force
  lexicon: LSJ
  rationale: The Greek is singular with a collective/distributive sense. 'Power' is
    the most direct rendering and preserves the broad scope of created powers; 'host'
    would be more interpretive and could suggest στρατιά rather than δύναμις.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. The article
    is retained naturally in English after 'bless'.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: LSJ
  rationale: The verb specifically denotes singing praise. 'Sing praise' is readable
    modern English and preserves the musical nuance better than simply 'praise'.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: The compound intensifies exaltation. 'Highly exalt' preserves that intensification
    in natural English and matches the liturgical cadence of the passage.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring back to the Lord; standard personal pronoun is
    appropriate.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic English for enduring duration. More literal options are possible,
    but 'forever' best fits optimal equivalence here.
