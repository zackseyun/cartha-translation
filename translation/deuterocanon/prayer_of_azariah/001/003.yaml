reference: Prayer of Azariah and Song of the Three 1:3
source:
  edition: lxx-swete-1909
  text: Εὐλογητὸς εἶ, Κύριε ὁ θεὸς τῶν πατέρων ἡμῶν, καὶ αἰνετὸν καὶ δεδοξασμένον
    τὸ ὄνομά σου εἰς τοὺς αἰῶνας,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: Blessed are you, Lord, the God of our fathers, and praised and glorified is
    your name forever,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the God of our ancestors.' The Greek reads 'our fathers,' a covenantal
      biblical expression retained in the main text.
    reason: lexical_alternative
  - marker: b
    text: Literally 'into the ages,' an idiom meaning enduring perpetuity.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογητὸς
  chosen: Blessed
  alternatives:
  - Worthy of blessing
  - Praised
  lexicon: BDAG
  rationale: Predicate adjective in a liturgical blessing formula; 'Blessed' preserves
    the doxological register and matches the direct address structure without flattening
    it into mere praise.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine, the default rendering is 'Lord.' In
    this prayer context it functions as a divine title in direct address.
- source_word: ὁ θεὸς τῶν πατέρων ἡμῶν
  chosen: the God of our fathers
  alternatives:
  - the God of our ancestors
  lexicon: BDAG
  rationale: A conventional covenantal expression. 'Fathers' is retained for gender-accurate
    fidelity to the Greek and biblical idiom; 'ancestors' is possible in modern English
    but loses the source wording and traditional covenantal resonance.
- source_word: αἰνετὸν
  chosen: praised
  alternatives:
  - praiseworthy
  lexicon: BDAG
  rationale: The adjective denotes being worthy of praise. 'Praised' works idiomatically
    in the verbless doxological clause when paired with 'glorified,' while still conveying
    the honor due to God's name.
- source_word: δεδοξασμένον
  chosen: glorified
  alternatives:
  - honored
  - made glorious
  lexicon: BDAG
  rationale: Perfect passive participial/adjectival form from δοξάζω. 'Glorified'
    preserves the theological weight of divine honor better than the flatter 'honored.'
- source_word: τὸ ὄνομά σου
  chosen: your name
  lexicon: BDAG
  rationale: Standard biblical metonymy for God's revealed identity and reputation;
    no expansion is warranted in the main text.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic rendering of the Greek expression for enduring perpetuity.
    'Forever' is natural modern English while preserving the temporal force.
