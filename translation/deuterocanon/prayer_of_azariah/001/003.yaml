theological_decisions:
- issue: Rendering the covenantal phrase τῶν πατέρων ἡμῶν
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Greek explicitly says 'fathers.' Following the project's gender-accurate
    principle, the translation keeps the masculine familial term rather than neutralizing
    it, while recognizing that 'ancestors' is a viable interpretive alternative in
    contemporary English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Handling the sequence καὶ αἰνετὸν καὶ δεδοξασμένον τὸ ὄνομά σου
  chosen_reading: and praised and glorified is your name
  alternative_readings:
  - and your name is praiseworthy and glorified
  - and your name is to be praised and glorified
  rationale: The Greek is a doxological nominal clause. The chosen English preserves
    the elevated liturgical style and the focus on God's name without over-interpreting
    the syntax into an explicit modal statement.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
