translation:
  text: Bless the Lord, sons of men; sing praise to him and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of men' or 'human beings.' The Greek reads literally 'sons
      of men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω. 'Bless' preserves the liturgical and doxological
    force of the Greek more directly than the broader 'praise.'
- source_word: οἱ υἱοὶ τῶν ἀνθρώπων
  chosen: sons of men
  alternatives:
  - children of men
  - human beings
  - sons of humanity
  lexicon: BDAG
  rationale: A formally masculine expression meaning human beings in descent or class.
    Per gender-accurate philosophy, 'sons of men' best reflects the source wording
    and biblical idiom without flattening it to a neutral paraphrase.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this Greek
    deuterocanonical context, 'the Lord' is the natural English equivalent.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb ὑμνέω denotes singing or chanting praise. 'Sing praise' communicates
    the musical/doxological nuance in clear modern English better than the less idiomatic
    verb 'hymn.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: The compound intensifies exaltation. 'Highly exalt' preserves the heightened
    force while remaining natural in English.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: A standard doxological expression meaning enduringly or forever. 'Forever'
    is the clearest idiomatic rendering in modern English, while the more literal
    alternatives are less natural here.
