translation:
  text: Do not put us to shame, but show us mercy according to your gentleness and
    according to the abundance of your mercy,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show us mercy'; Greek literally, 'do mercy with us.'
    reason: lexical_alternative
  - marker: b
    text: Or 'clemency' or 'forbearance' for 'gentleness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταισχύνῃς
  chosen: put us to shame
  alternatives:
  - disgrace us
  - humiliate us
  lexicon: BDAG
  rationale: The verb means to shame or disgrace. 'Put us to shame' is idiomatic modern
    English and preserves the direct appeal without over-intensifying it.
- source_word: ποίησον μεθʼ ἡμῶν ἔλεος
  chosen: deal with us in mercy
  alternatives:
  - show us mercy
  - do mercy with us
  lexicon: LEH
  rationale: Literally 'do mercy with us.' 'Deal with us in mercy' keeps the verbal
    force of ποιέω while remaining natural English. 'Show us mercy' is possible, but
    slightly smooths over the concrete verbal expression.
- source_word: ἐπιείκειάν
  chosen: gentleness
  alternatives:
  - clemency
  - forbearance
  - kindness
  lexicon: BDAG
  rationale: ἐπιείκεια denotes lenience, clemency, or gentle fairness. 'Gentleness'
    fits the prayerful tone and is accessible English, while still conveying God's
    mildness in judgment. 'Clemency' is precise but more formal and legal-sounding.
- source_word: πλῆθος
  chosen: abundance
  alternatives:
  - multitude
  - greatness
  lexicon: LEH
  rationale: The noun here expresses plentiful extent. 'Abundance' is natural in English
    with 'of your mercy' and preserves the sense of overflowing quantity.
- source_word: ἐλέους
  chosen: mercy
  alternatives:
  - steadfast mercy
  - compassion
  lexicon: BDAG
  rationale: ἔλεος is best rendered 'mercy' here in a penitential prayer context.
    'Compassion' is possible, but 'mercy' better preserves the covenantal and supplicatory
    force.
