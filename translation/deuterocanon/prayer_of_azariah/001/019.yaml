source:
  edition: lxx-swete-1909
  text: μὴ καταισχύνῃς ἡμᾶς, ἀλλὰ ποίησον μεθʼ ἡμῶν ἔλεος κατὰ τὴν ἐπιείκειάν σου
    καὶ κατὰ τὸ πλῆθος τοῦ ἐλέους σου,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
