translation:
  text: Bless the Lord, priests; sing hymns and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Praise the Lord, priests.' The verb can be rendered more generally as
      'praise,' but 'bless' preserves the repeated liturgical wording of the Greek.
    reason: lexical_alternative
  - marker: b
    text: Or 'sing praise and exalt him greatly forever.' The Greek ὑμνεῖτε explicitly
      carries the sense of hymn-singing.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural from εὐλογέω. 'Bless' preserves the liturgical and
    doxological force of the Greek better than the flatter 'praise,' especially in
    this repeated refrain structure.
- source_word: ἱερεῖς
  chosen: priests
  alternatives:
  - you priests
  lexicon: BDAG
  rationale: Vocative plural addressing the priestly group directly. 'Priests' is
    the natural English equivalent and fits the summons pattern of the song.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this Greek
    deuterocanonical context, 'the Lord' best matches the source wording without importing
    the small-caps convention used for the divine name in Hebrew contexts.
- source_word: ὑμνεῖτε
  chosen: sing hymns
  alternatives:
  - hymn
  - sing praise
  - praise
  lexicon: BDAG
  rationale: The verb ὑμνέω specifically denotes singing hymns or songs of praise.
    'Sing hymns' preserves the musical nuance more clearly than simply 'praise.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: The compound verb intensifies exaltation. 'Highly exalt' is idiomatic
    English that preserves the heightened force and matches the recurring refrain
    of the passage.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this doxological formula, 'forever' communicates the enduring temporal
    sense naturally in modern English while remaining faithful to the idiom.
