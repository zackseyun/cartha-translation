translation:
  text: Bless the Lord, Israel; sing praise to him and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Praise the Lord, Israel.' The Greek εὐλογεῖτε can also be rendered 'praise'
      in this worship context.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  - Speak well of
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω in a liturgical context is well rendered
    by 'Bless,' preserving the biblical idiom of directing blessing/praise toward
    God rather than flattening it to simple praise.
- source_word: Ἰσραήλ
  chosen: O Israel
  alternatives:
  - Israel
  lexicon: LSJ
  rationale: As a vocative address to the people, 'O Israel' makes the direct summons
    clear in English and fits the hymn's elevated style without becoming archaic.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the LORD
  - the Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' Here it refers to God in the
    Greek deuterocanonical text; 'the Lord' is the most natural English rendering
    from the source wording.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb ὑμνέω carries the sense of singing praise or hymning. 'Sing
    praise' preserves the musical-liturgical nuance better than the less idiomatic
    English verb 'hymn.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: The compound verb intensifies exaltation. 'Highly exalt' preserves that
    intensification in natural English and matches the recurring refrain style of
    the passage.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this doxological refrain, the idiomatic force is enduring perpetuity.
    'Forever' is clear modern English, while more literal options sound wooden here.
