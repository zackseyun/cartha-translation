translation:
  text: Bless the Lord, rains and springs; sing praise to him and highly exalt him
    forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural calling elements of creation to speak/doxologically
    honor the Lord. 'Bless' preserves the repeated liturgical refrain of the passage
    more closely than the broader 'praise'.
- source_word: ὄμβροι
  chosen: rains
  alternatives:
  - showers
  - rainstorms
  lexicon: LSJ
  rationale: The plural noun refers to rain/showers from heaven. 'Rains' keeps the
    plural form and fits the hymn's catalog of created things.
- source_word: πηγαί
  chosen: springs
  alternatives:
  - fountains
  - sources
  lexicon: LSJ
  rationale: Refers to natural water sources. 'Springs' is idiomatic modern English
    and better suits creation language than the somewhat architectural 'fountains'.
- source_word: κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Accusative object of the imperative. Per doctrine, κύριος is rendered
    'Lord.' The article is retained in English because this refrain regularly addresses
    'the Lord' as the known God of Israel.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb denotes singing a hymn or praise. 'Sing praise' communicates
    the musical/doxological force in natural English.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: A strong intensifying verb in this refrain. 'Highly exalt' preserves
    the elevated liturgical tone and the intensification better than a simple 'exalt'.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic expression for enduring perpetuity. 'Forever' is the clearest
    natural English equivalent in this hymn.
