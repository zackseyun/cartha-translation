- issue: Rendering of φοβούμεθά σε in relation to God
  chosen_reading: we fear you
  alternative_readings:
  - we revere you
  - we stand in awe of you
  rationale: The Greek explicitly uses the language of fear. In keeping with the project's
    principle of preserving theological tension rather than resolving it, the main
    text retains 'fear' rather than reducing it to reverence alone.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Rendering of ζητοῦμεν τὸ πρόσωπόν σου
