id: PAZ.1.18
reference: Prayer of Azariah and Song of the Three 1:18
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἐξακολουθοῦμεν ἐν ὅλῃ καρδίᾳ ἡμῶν καὶ φοβούμεθά σε καὶ ζητοῦμεν τὸ
    πρόσωπόν σου.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: And now we continue to follow you with our whole heart, and we fear you, and
    we seek your face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we seek your presence.' The Greek literally says 'we seek your face,'
      a biblical idiom for seeking God's favor or presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  chosen: And now
  alternatives:
  - But now
  - And at this time
  lexicon: BDAG
  rationale: A straightforward temporal-transition phrase. 'And now' preserves the
    connective καὶ and the present appeal's immediacy without overinterpreting contrast.
- source_word: ἐξακολουθοῦμεν
  chosen: we continue to follow
  alternatives:
  - we follow closely
  - we persist
  - we keep on
  lexicon: BDAG
  rationale: The compound verb conveys following on/continuing after. 'Continue to
    follow' captures both the durative present and the sense of ongoing allegiance
    better than the vaguer 'persist.' The object is implicit from context and supplied
    as 'you' in English for clarity.
- source_word: ἐν ὅλῃ καρδίᾳ ἡμῶν
  chosen: with our whole heart
  alternatives:
  - in our whole heart
  - with all our heart
  lexicon: BDAG
  rationale: This is a standard biblical idiom for undivided devotion. 'With our whole
    heart' is natural modern English and preserves the singular 'heart' with collective
    possessive.
- source_word: φοβούμεθά σε
  chosen: we fear you
  alternatives:
  - we revere you
  - we stand in awe of you
  lexicon: BDAG
  rationale: The verb φοβέομαι with God can denote reverential fear. 'We fear you'
    keeps the source term directly and preserves the theological tension of fear/reverence
    without softening it in the main text.
- source_word: ζητοῦμεν τὸ πρόσωπόν σου
  chosen: we seek your face
  alternatives:
  - we seek your presence
  - we seek you
  lexicon: BDAG
  rationale: The idiom literally refers to seeking God's face, a common biblical expression
    for seeking his favor or presence. Retaining 'your face' preserves the imagery
    and intertextual resonance; the more interpretive 'your presence' is worth preserving
    in a footnote instead of the main text.
