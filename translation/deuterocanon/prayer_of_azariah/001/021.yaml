translation:
  text: And let all who show evil to your servants be put to shame, and let them be
    disgraced from all their dominion, and let their strength be broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your servants.' The Greek is 'your slaves' (τοῖς δούλοις σου), emphasizing
      belonging to God.
    reason: alternative_reading
  - marker: b
    text: Or 'those who inflict evil on your slaves.' The Greek participle literally
      means 'those who show evil' toward them.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'from all their dominion' may also be understood more loosely
      as 'in all their power' or 'despite all their dominion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντραπείησαν
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be confounded
  lexicon: LSJ
  rationale: Aorist passive optative in a prayer/wish context; 'be put to shame' captures
    the jussive force and external disgrace better than the more internal 'be ashamed.'
- source_word: οἱ ἐνδεικνύμενοι
  chosen: those who show
  alternatives:
  - those who display
  - those who demonstrate
  - those who inflict
  lexicon: LSJ
  rationale: The middle participle of ἐνδείκνυμι here governs κακά toward God's servants.
    'Show' is the most transparent base sense in English, while the object 'evil'
    and indirect object make clear hostile action. 'Inflict' is possible interpretively,
    but slightly stronger than the Greek's more general expression.
- source_word: κακά
  chosen: evil
  alternatives:
  - harm
  - bad things
  - troubles
  lexicon: LSJ
  rationale: Plural neuter can denote evil deeds or harms. 'Evil' preserves the moral
    weight and broadness of the Greek without narrowing it merely to injury.
- source_word: τοῖς δούλοις σου
  chosen: your slaves
  alternatives:
  - your servants
  lexicon: LSJ
  rationale: Per project doctrine, δοῦλος is rendered 'slave' where bonded status
    is salient. In this prayer of covenant loyalty and persecution, the speakers identify
    themselves as belonging wholly to God; 'slaves' preserves that stronger relation
    better than the softened traditional 'servants.'
- source_word: καταισχυνθείησαν
  chosen: be disgraced
  alternatives:
  - be put to shame
  - be humiliated
  lexicon: LSJ
  rationale: Used alongside ἐντραπείησαν, a distinct English rendering helps preserve
    the rhetorical parallelism without flattening both verbs into the same phrase.
    'Be disgraced' conveys public shame.
- source_word: ἀπὸ πάσης τῆς δυναστείας
  chosen: from all their dominion
  alternatives:
  - in all their power
  - from all their tyranny
  - from all their authority
  lexicon: LSJ
  rationale: δυναστεία denotes lordship, dominion, or ruling power. With ἀπό, the
    phrase likely marks the sphere/source from which their disgrace comes or in relation
    to which it is total. 'From all their dominion' stays close to the Greek while
    remaining intelligible. 'Tyranny' would overinterpret.
- source_word: ἰσχύς
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: LSJ
  rationale: A straightforward rendering that fits the parallel with dominion and
    the following verb 'be broken.'
- source_word: συντριβείη
  chosen: be broken
  alternatives:
  - be shattered
  - be crushed
  lexicon: LSJ
  rationale: The passive optative continues the prayer-wish sequence. 'Be broken'
    is idiomatic and preserves the image of their power being decisively undone.
