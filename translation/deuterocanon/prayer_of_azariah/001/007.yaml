reference: Prayer of Azariah and Song of the Three 1:7
source:
  edition: lxx-swete-1909
  text: καὶ τῶν ἐντολῶν τοῦ νόμου σου οὐχ ὑπηκούσαμεν οὐδὲ συνετηρήσαμεν, οὐδὲ ἐποιήσαμεν
    καθὼς ἐνετείλω ἡμῖν ἵνα εὖ ἡμῖν γένηται.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: And we have not obeyed the commands of your law, nor kept them, nor done as
    you commanded us, so that it might go well with us.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐντολῶν
  chosen: commands
  alternatives:
  - commandments
  - injunctions
  lexicon: BDAG
  rationale: ἐντολή commonly denotes an authoritative command. 'Commands' is clear
    modern English and avoids unnecessary traditionalism while preserving the force
    of the plural.
- source_word: νόμου
  chosen: law
  alternatives:
  - instruction
  lexicon: BDAG
  rationale: νόμος here refers to God's law as a covenantal body of instruction. 'Law'
    is the most direct and recognizable rendering in this penitential context.
- source_word: οὐχ ὑπηκούσαμεν
  chosen: have not obeyed
  alternatives:
  - did not listen to
  - did not heed
  lexicon: BDAG
  rationale: ὑπακούω means to obey or heed. In context, with 'commands of your law,'
    'obeyed' best captures the practical submission implied.
- source_word: συνετηρήσαμεν
  chosen: kept
  alternatives:
  - observed
  - guarded
  lexicon: BDAG
  rationale: The compound verb conveys keeping or observing commands. 'Kept' is idiomatic
    with 'commands' in English and preserves the covenantal sense.
- source_word: ἐποιήσαμεν
  chosen: done
  alternatives:
  - acted
  - carried out
  lexicon: BDAG
  rationale: 'The verb is broad and straightforward. ''Done'' fits the triadic confession:
    not obeyed, not kept, not done.'
- source_word: καθὼς ἐνετείλω ἡμῖν
  chosen: as you commanded us
  alternatives:
  - just as you gave command to us
  - according as you instructed us
  lexicon: BDAG
  rationale: This clause restates divine command in a comparative way. 'As you commanded
    us' is natural and sufficiently formal.
- source_word: ἵνα εὖ ἡμῖν γένηται
  chosen: so that it might go well with us
  alternatives:
  - that it might be well with us
  - for our good
  lexicon: BDAG
  rationale: This idiom expresses beneficial outcome or well-being resulting from
    obedience. 'It might go well with us' is natural English and preserves the purpose/result
    nuance of ἵνα with the aorist subjunctive.
