theological_decisions:
- issue: Whether to preserve a distinction between ordinary sinning and intensified
    sinning in the two different Greek verbs ἡμάρτομεν and ἐξημάρτομεν
  chosen_reading: 'Different English renderings are used: ''have sinned'' and ''have
    greatly sinned.'''
  alternative_readings:
  - Render both simply as 'have sinned' for smoother English
  - Render the second as 'have sinned grievously'
  rationale: The Greek uses two related but distinct verbs, and the confession gains
    force from the intensification. Preserving that distinction is more transparent
    and avoids flattening the rhetoric.
