translation:
  text: for we have sinned in all things, and we have acted lawlessly by turning away
    from you, and we have sinned greatly in all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we have sinned grievously in everything.' The Greek verb in the final
      clause is stronger than the earlier 'we have sinned.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμάρτομεν
  chosen: we have sinned
  alternatives:
  - we sinned
  lexicon: BDAG
  rationale: Aorist verb from ἁμαρτάνω. Rendered with English present perfect to fit
    the confessional tone and the sequence of present-result admissions in natural
    English, while still reflecting completed action.
- source_word: ἐν πᾶσι
  chosen: in everything
  alternatives:
  - in all things
  - in every way
  lexicon: BDAG
  rationale: The phrase is broad and comprehensive. 'In everything' preserves the
    scope without over-interpreting whether the sense is every matter or every way.
- source_word: ἠνομήσαμεν
  chosen: we have acted lawlessly
  alternatives:
  - we have done wrong
  - we have transgressed
  lexicon: BDAG
  rationale: From ἀνομέω, carrying the sense of acting contrary to law. 'Acted lawlessly'
    preserves the connection to law/command rather than flattening it to generic wrongdoing.
- source_word: ἀποστῆναι ἀπὸ σοῦ
  chosen: by turning away from you
  alternatives:
  - in turning away from you
  - to turn away from you
  - by departing from you
  lexicon: BDAG
  rationale: The infinitive explains the manner or content of the lawless action.
    'By turning away from you' gives clear English and preserves the relational/apostasy
    sense better than the more spatial 'departing'.
- source_word: ἐξημάρτομεν
  chosen: we have greatly sinned
  alternatives:
  - we have sinned grievously
  - we have utterly sinned
  lexicon: BDAG
  rationale: The compound verb intensifies the confession beyond the earlier ἡμάρτομεν.
    'Greatly sinned' is concise, readable, and preserves the intensification without
    sounding archaic.
