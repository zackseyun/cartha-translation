id: PAZ.1.10
reference: Prayer of Azariah and Song of the Three 1:10
source:
  edition: lxx-swete-1909
  text: καὶ νῦν οὐκ ἔστιν ἡμῖν ἀνοῖξαι τὸ στόμα· αἰσχύνη καὶ ὄνειδος ἐγενήθη τῶν δούλων
    σου καὶ τῶν σεβομένων σε.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: And now there is no opening our mouth; shame and reproach have come upon your
    slaves and those who revere you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your servants.' The Greek is 'your slaves' (δοῦλοι), emphasizing belonging
      and subordination.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοῖξαι τὸ στόμα
  chosen: opening our mouth
  alternatives:
  - open our mouth
  - speak
  lexicon: BDAG
  rationale: The infinitive with στόμα is a Greek idiom meaning to open the mouth,
    often implying the ability or freedom to speak. Rendering it as 'opening our mouth'
    keeps the idiom visible while fitting the construction 'there is no...'. 'Speak'
    is possible but flattens the imagery.
- source_word: αἰσχύνη
  chosen: shame
  alternatives:
  - disgrace
  lexicon: LSJ
  rationale: αἰσχύνη commonly denotes shame or disgrace. 'Shame' is the most direct
    and natural English equivalent here and pairs well with ὄνειδος.
- source_word: ὄνειδος
  chosen: reproach
  alternatives:
  - insult
  - disgrace
  lexicon: LSJ
  rationale: ὄνειδος carries the sense of reproach, taunt, or public insult. 'Reproach'
    preserves the relational and public dimension better than the broader 'disgrace'.
- source_word: ἐγενήθη
  chosen: have come upon
  alternatives:
  - have become
  - have happened to us
  lexicon: BDAG
  rationale: Although literally 'became,' English idiom prefers 'have come upon' with
    abstract afflictions like shame and reproach. This communicates resultant condition
    without wooden awkwardness.
- source_word: δούλων σου
  chosen: your slaves
  alternatives:
  - your servants
  lexicon: BDAG
  rationale: Per project doctrine, δοῦλος is rendered 'slave' where bonded belonging
    is salient. In a prayer addressing God, the speakers emphasize their status as
    belonging wholly to him; 'slaves' preserves that force more transparently than
    the traditional 'servants'.
- source_word: τῶν σεβομένων σε
  chosen: those who revere you
  alternatives:
  - those who fear you
  - those who worship you
  lexicon: BDAG
  rationale: σεβομένων denotes reverence, devotion, or pious regard. 'Those who revere
    you' best captures respectful devotion without narrowing the sense to emotion
    alone ('fear') or cultic action alone ('worship').
