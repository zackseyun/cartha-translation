translation:
  text: Bless the Lord, frost and cold; sing hymns and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Praise the Lord, frost and cold.' The Greek imperative εὐλογεῖτε can
      be rendered 'bless' or more generally 'praise'; 'bless' is retained to preserve
      the refrain of the song.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural calling creation to speak well of or praise the Lord.
    'Bless' preserves the liturgical refrain and matches the repeated structure of
    the song more closely than the broader 'praise.'
- source_word: ῥῖγος
  chosen: frost
  alternatives:
  - chill
  - cold
  lexicon: LSJ
  rationale: Refers to coldness or frost; paired with ψῦχος, it is best rendered distinctly
    as 'frost' so the two terms are not collapsed into one English idea.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction joining the two natural phenomena in
    the summons.
- source_word: ψῦχος
  chosen: cold
  alternatives:
  - chill
  - freezing cold
  lexicon: LSJ
  rationale: Denotes cold or chill. 'Cold' is the most natural modern English counterpart
    and complements 'frost' without unnecessary elaboration.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: 'κύριος is rendered by the project''s default as ''Lord.'' The article
    is naturally retained in English after the imperative: ''Bless the Lord.'''
- source_word: ὑμνεῖτε
  chosen: sing hymns
  alternatives:
  - sing praise
  - praise
  lexicon: BDAG
  rationale: The verb specifically denotes singing hymns or songs of praise. 'Sing
    hymns' preserves the musical nuance better than the flatter 'praise.'
- source_word: καὶ ὑπερυψοῦτε
  chosen: and highly exalt
  alternatives:
  - and exalt greatly
  - and lift up exceedingly
  lexicon: BDAG
  rationale: The compound verb intensifies exaltation. 'Highly exalt' is idiomatic
    English that preserves the intensifying force without sounding wooden.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring back to the Lord; standard personal pronoun is
    appropriate.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic expression for enduring perpetuity. 'Forever' gives the sense
    in readable modern English while preserving the doxological force.
