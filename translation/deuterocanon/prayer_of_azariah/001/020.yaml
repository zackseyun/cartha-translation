id: PAZ.1.20
reference: Prayer of Azariah and Song of the Three 1:20
source:
  edition: lxx-swete-1909
  text: καὶ ἐξελοῦ ἡμᾶς κατὰ τὰ θαυμάσιά σου καὶ δὸς δόξαν τῷ ὀνόματί σου, Κύριε·
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: And deliver us according to your wondrous deeds, and give glory to your name,
    O Lord;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your wondrous acts' for 'your wonders.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'give glory to your name' preserves the biblical idiom of honoring
      God's revealed name; compare the more interpretive rendering 'bring glory to
      your name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελοῦ
  chosen: deliver
  alternatives:
  - rescue
  - take out
  lexicon: BDAG
  rationale: Aorist imperative of ἐξαιρέω in prayer context asks for saving intervention.
    'Deliver' is natural, dignified English and preserves the sense of rescue without
    over-literalizing as 'take out'.
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in keeping with
  - by
  lexicon: BDAG
  rationale: With the accusative τὰ θαυμάσιά σου, the phrase most naturally means
    'according to' or 'in keeping with' God's wondrous acts. 'According to' keeps
    the formal correspondence and remains clear.
- source_word: τὰ θαυμάσιά σου
  chosen: your wonders
  alternatives:
  - your marvelous deeds
  - your wondrous acts
  lexicon: BDAG
  rationale: The noun refers to extraordinary deeds associated with divine intervention.
    'Your wonders' is concise and close to the Greek, while still intelligible in
    modern English.
- source_word: δὸς δόξαν
  chosen: give glory
  alternatives:
  - grant glory
  - bring glory
  lexicon: BDAG
  rationale: The imperative plus object is rendered straightforwardly. Although English
    idiom often says 'bring glory,' the Greek verb is simply 'give'; retaining that
    wording preserves the prayer's directness.
- source_word: τῷ ὀνόματί σου
  chosen: to your name
  alternatives:
  - for your name
  - to your reputation
  lexicon: BDAG
  rationale: Biblical idiom treats the 'name' as the bearer of honor and revealed
    identity. 'To your name' preserves that idiom without reducing it to the interpretive
    'reputation'.
- source_word: Κύριε
  chosen: O Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Vocative κύριε is best represented by direct address. 'O Lord' preserves
    the prayerful vocative force and aligns with the project's default rendering of
    κύριος as 'Lord'.
