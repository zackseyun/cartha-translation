  rationale: The project's default for κύριος is 'Lord.' Here it is a direct address
    to God in prayer, so the vocative particle sense is reflected with 'O' for solemnity
    without introducing archaic syntax elsewhere.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Meaning of divine 'name'
  chosen_reading: to your name
