translation:
  text: Bless the Lord, all the works of the Lord; sing praise to him and highly exalt
    him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the ages.' The Greek idiom is literally 'into the ages,' a standard
      expression for enduring praise.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  - Speak well of
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω. 'Bless' preserves the liturgical and doxological
    force of the Greek better than the flatter 'praise,' while remaining natural in
    English.
- source_word: πάντα τὰ ἔργα Κυρίου
  chosen: all the works of the Lord
  alternatives:
  - all the Lord's works
  - all works of the Lord
  lexicon: BDAG
  rationale: A direct rendering of the vocative address to the totality of the Lord's
    works/creatures. 'Works of the Lord' preserves the genitival relation and the
    hymn's repeated refrain structure.
- source_word: Κυρίου / τὸν κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered with the project's default 'Lord.' The first occurrence
    is genitive ('of the Lord'); the second is the direct object ('the Lord'). Retaining
    'the Lord' in both places reflects the Greek and keeps the refrain clear.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb ὑμνέω often carries the sense of singing hymnic praise. 'Sing
    praise' communicates that nuance in readable modern English better than the less
    idiomatic verbal form 'hymn.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: The compound intensifies exaltation. 'Highly exalt' preserves the elevated,
    repetitive doxological style and reflects the superlative force without sounding
    unnatural.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this hymnic refrain, the idiom denotes enduring perpetuity. 'Forever'
    is the clearest natural English equivalent, while more literal options are preserved
    as possible alternatives.
