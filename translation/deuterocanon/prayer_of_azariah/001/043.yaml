translation:
  text: Bless the Lord, fire and heat; sing praise to him and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burning heat' for Greek καῦμα.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural calling the addressed elements to speak well of or
    bless the Lord. 'Bless' preserves the repeated liturgical refrain of the song
    more closely than the broader 'praise.'
- source_word: πῦρ
  chosen: fire
  lexicon: LSJ
  rationale: Straightforward literal reference to fire as one of the created realities
    summoned to bless the Lord.
- source_word: καῦμα
  chosen: heat
  alternatives:
  - burning heat
  - flame
  lexicon: LSJ
  rationale: Denotes heat or burning warmth. 'Heat' is the most natural paired rendering
    with 'fire' and avoids collapsing it into the same sense as πῦρ.
- source_word: τὸν κύριον
  chosen: the Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a divine title.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb specifically carries the sense of singing or chanting praise.
    'Sing praise' communicates that nuance in clear modern English.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: A strong imperative meaning to exalt very highly. 'Highly exalt' preserves
    the intensifying force without sounding unnatural.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic expression for enduring perpetuity. 'Forever' is natural modern
    English and fits the refrain.
