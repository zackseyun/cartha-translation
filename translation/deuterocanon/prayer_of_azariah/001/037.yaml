translation:
  text: Bless the Lord, waters and all that are above the heaven; sing praise to him
    and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'all things above the heaven.' The Greek phrase can
      be taken collectively for the cosmic realities above the sky/heaven.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural calling creation to speak or ascribe blessing to the
    Lord. 'Bless' preserves the liturgical refrain of the passage better than the
    more generic 'praise'.
- source_word: ὕδατα
  chosen: waters
  alternatives:
  - water
  lexicon: LSJ
  rationale: Plural matches the Greek and the poetic address to cosmic elements.
- source_word: πάντα τὰ ἐπάνω τοῦ οὐρανοῦ
  chosen: all that are above the heaven
  alternatives:
  - all things above heaven
  - all that are above the heavens
  - all things in the heights of heaven
  lexicon: LSJ
  rationale: The articular neuter plural with ἐπάνω denotes the things above heaven/sky.
    'All that are above the heaven' stays close to the Greek while remaining intelligible.
    Singular 'heaven' reflects the Greek τοῦ οὐρανοῦ in this witness.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: 'Follows the project''s default rendering for κύριος as a divine title.
    The article is naturally retained in English in this vocative-like imperative
    construction: ''Bless the Lord.'''
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb specifically denotes singing praise. 'Sing praise' preserves
    the musical nuance better than simply 'praise' and is more natural than the English
    verb 'hymn.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: This recurring refrain in the Song intensifies exaltation. 'Highly exalt'
    is idiomatic and preserves the heightened force of the compound verb.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this doxological refrain, 'forever' communicates the enduring sense
    naturally in modern English, while more literal options are less idiomatic.
