translation:
  text: Bless the Lord, O heavens; sing praise to him and highly exalt him forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural meaning to speak well of or bless. 'Bless' preserves
    the liturgical refrain structure of the Song more closely than the broader 'praise.'
- source_word: οὐρανοί
  chosen: O heavens
  alternatives:
  - heavens
  - skies
  lexicon: LSJ
  rationale: Vocative plural addressed to the heavens. 'O heavens' reflects direct
    address in elevated poetic style; 'skies' is too mundane for this hymn.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' Here it refers
    to God in a hymnic summons.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb denotes singing a hymn or praise. 'Sing praise' communicates
    the musical sense more naturally in modern English than the verb 'hymn.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: Compound verb intensifying exaltation. 'Highly exalt' preserves the heightened
    force and matches the repetitive doxological cadence.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic expression for enduring perpetuity. 'Forever' is the clearest
    natural English equivalent in this refrain.
