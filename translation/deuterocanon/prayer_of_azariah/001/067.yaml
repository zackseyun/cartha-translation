translation:
  text: Bless the Lord, all you who fear the Lord, the God of gods; sing praise and
    give thanks, for his mercy is forever, even forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all you who worship the Lord' or 'all you who revere the Lord.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for his steadfast love endures forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω. 'Bless' preserves the liturgical force
    and matches the recurring refrain structure of this hymn better than the more
    generic 'praise.'
- source_word: πάντες οἱ σεβόμενοι τὸν κύριον
  chosen: all you who fear the Lord
  alternatives:
  - all you who worship the Lord
  - all you who revere the Lord
  lexicon: BDAG
  rationale: σεβόμενοι can denote revering or worshiping God. In biblical English,
    'fear the Lord' is the most natural covenantal equivalent for reverential devotion,
    even though the Greek verb is not φοβέω. This choice communicates pious reverence
    rather than mere ritual action.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.'
- source_word: τὸν θεὸν τῶν θεῶν
  chosen: the God of gods
  alternatives:
  - God above gods
  lexicon: BDAG
  rationale: A formally transparent rendering of the genitival superlative/title,
    preserving the biblical idiom without flattening it.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb specifically carries the sense of singing praise. 'Sing praise'
    is idiomatic modern English and preserves the musical nuance.
- source_word: ἐξομολογεῖσθε
  chosen: give thanks
  alternatives:
  - confess
  - praise openly
  lexicon: BDAG
  rationale: In hymnic and doxological contexts this verb commonly means giving thanks
    or praise. Here, alongside ὑμνεῖτε and followed by the mercy refrain, 'give thanks'
    best fits the context.
- source_word: ὅτι εἰς τὸν αἰῶνα τὸ ἔλεος αὐτοῦ
  chosen: for his mercy is forever
  alternatives:
  - for his steadfast love is forever
  - for his mercy endures forever
  lexicon: BDAG
  rationale: ἔλεος can be rendered 'mercy' or 'steadfast love.' 'Mercy' is chosen
    for lexical directness from the Greek; 'is forever' is a concise equivalent of
    the idiom εἰς τὸν αἰῶνα.
- source_word: καὶ εἰς τὸν αἰῶνα τῶν αἰώνων
  chosen: even forever and ever
  alternatives:
  - and to the age of ages
  - and forevermore
  lexicon: BDAG
  rationale: This intensifies the preceding statement. 'Even forever and ever' preserves
    the climactic force in natural English while reflecting the duplicated eternal
    idiom.
