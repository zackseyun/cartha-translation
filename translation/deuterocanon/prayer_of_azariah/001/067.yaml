theological_decisions:
- issue: Rendering σεβόμενοι in a worship context
  chosen_reading: all you who fear the Lord
  alternative_readings:
  - all you who worship the Lord
  - all you who revere the Lord
  rationale: Although the Greek participle derives from σέβομαι rather than φοβέω,
    the phrase denotes reverential devotion toward God. 'Fear the Lord' best captures
    the biblical-theological sense for English readers while remaining faithful to
    the source context.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate and readable
    modern English; contested term κύριος → Lord
- issue: Rendering ἔλεος
  chosen_reading: mercy
  alternative_readings:
  - steadfast love
  rationale: The Greek text uses ἔλεος, not a Hebrew source term directly. 'Mercy'
    is the most transparent lexical rendering from Greek, while 'steadfast love' is
    preserved as a viable liturgical alternative in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy
    over translation tradition
