translation:
  text: Give thanks to the Lord, for he is good, for his mercy is forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his steadfast love endures forever.' The Greek says 'his mercy is forever,'
      but the phrase may carry broader covenant-loyalty overtones in this liturgical
      refrain.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξομολογεῖσθε
  chosen: Give thanks
  alternatives:
  - Confess
  - Praise
  - Give praise
  lexicon: BDAG
  rationale: In liturgical refrain contexts, ἐξομολογέομαι commonly carries the sense
    of giving thanks or praise rather than confessing sins. The parallel structure
    with ὅτι χρηστός and the recurring psalmic formula support 'Give thanks' as the
    most natural English rendering.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - to the LORD
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per project default. Although this refrain
    echoes Hebrew psalm language often associated with YHWH, the Greek source here
    reads κύριος, and in this deuterocanonical Greek context 'the Lord' is the appropriate
    direct rendering.
- source_word: χρηστός
  chosen: good
  alternatives:
  - kind
  - benevolent
  - gracious
  lexicon: BDAG
  rationale: While χρηστός can mean kind or benevolent, in this fixed doxological
    formula the idiomatic English equivalent is 'good.' This preserves the familiar
    covenantal praise sense without over-specifying nuance.
- source_word: εἰς τὸν αἰῶνα
  chosen: is forever
  alternatives:
  - endures forever
  - is for ever
  - lasts forever
  lexicon: BDAG
  rationale: Literally 'unto the age,' the phrase idiomatically denotes enduring permanence.
    Because the Greek clause is verbless with τὸ ἔλεος αὐτοῦ, English requires supplying
    a verb. 'Is forever' stays closer to the Greek than 'endures forever' while remaining
    natural.
- source_word: τὸ ἔλεος αὐτοῦ
  chosen: his mercy
  alternatives:
  - his steadfast love
  - his lovingkindness
  lexicon: BDAG
  rationale: ἔλεος fundamentally denotes mercy. Although in psalmic refrains it can
    overlap with covenantal steadfast love, 'mercy' is the most direct rendering from
    the Greek and avoids importing a specifically Hebrew lexical background not explicit
    in the source wording.
