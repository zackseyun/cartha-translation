translation:
  text: Blessed are you in the temple of your holy glory, and highly praised and exceedingly
    glorious forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογημένος
  chosen: Blessed
  alternatives:
  - Praised
  lexicon: BDAG
  rationale: Predicate adjective in a doxological formula; 'Blessed' preserves the
    liturgical and reverential force better than the flatter 'praised,' while remaining
    natural English.
- source_word: ἐν τῷ ναῷ
  chosen: in the temple
  alternatives:
  - within the sanctuary
  lexicon: BDAG
  rationale: ναός refers to the temple/sanctuary. 'Temple' is the clearest and most
    standard rendering here, fitting the heavenly or cultic setting without over-specifying.
- source_word: τῆς ἁγίας δόξης σου
  chosen: of your holy glory
  alternatives:
  - of your glorious holiness
  - of your holy majesty
  lexicon: BDAG
  rationale: The genitive phrase is rendered straightforwardly. 'Holy glory' keeps
    both nouns' force visible and avoids interpretive reshaping into an abstract quality
    like 'majesty.'
- source_word: ὑπερυμνητός
  chosen: highly praised
  alternatives:
  - supremely praised
  - extolled above all
  lexicon: LEH
  rationale: The compound intensifies praise. 'Highly praised' communicates the superlative
    sense in readable English without sounding overly wooden.
- source_word: ὑπερένδοξος
  chosen: exceedingly glorious
  alternatives:
  - supremely glorious
  - most glorious
  lexicon: LEH
  rationale: Another intensified adjective. 'Exceedingly glorious' preserves the cumulative
    exalted tone alongside the previous predicate rather than collapsing both into
    one expression.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In doxological context this idiom is best rendered idiomatically as 'forever.'
    More literal options are possible but less natural in contemporary English.
