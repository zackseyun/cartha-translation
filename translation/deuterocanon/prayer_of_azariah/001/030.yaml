theological_decisions:
- issue: Number agreement in English for the predicate adjective with εἶ
  chosen_reading: Blessed are you
  alternative_readings:
  - Blessed is he
  - Blessed are you
  rationale: Although εὐλογημένος is morphologically singular, English doxological
    address conventionally uses 'Blessed are you' when directly addressing God. This
    preserves the second-person address signaled by εἶ and σου and avoids an unnatural
    singular adjective construction in English.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic'
