translation:
  text: Bless the Lord, frost and snow; sing hymns and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hoarfrost' for 'frost.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'for the ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural calling creation to speak well of or praise the Lord.
    'Bless' preserves the liturgical refrain and matches the repeated structure of
    the Song better than the more generic 'praise'.
- source_word: πάχναι
  chosen: frost
  alternatives:
  - hoarfrost
  - rime
  lexicon: LSJ
  rationale: Refers to frost or hoarfrost. 'Frost' is the clearest modern English
    choice; 'hoarfrost' is more precise but less natural in a public reading context.
- source_word: χιόνες
  chosen: snow
  alternatives:
  - snows
  lexicon: LSJ
  rationale: Plural in Greek, but English normally uses the mass noun 'snow' for natural
    idiom. The collective sense is preserved.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: DOCTRINE.md gives 'Lord' as the default for κύριος. In this Greek deuterocanonical
    context, 'the Lord' is the natural rendering.
- source_word: ὑμνεῖτε
  chosen: sing hymns
  alternatives:
  - praise in song
  - sing praise
  lexicon: LSJ
  rationale: The verb specifically denotes singing a hymn. 'Sing hymns' preserves
    that musical nuance more directly than simply 'praise'.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: A strong intensive verb meaning to exalt exceedingly. 'Highly exalt'
    is concise, natural, and preserves the intensification.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this refrain, the idiomatic sense is enduring perpetually. 'Forever'
    communicates the meaning in readable modern English, while more literal options
    sound stilted here.
