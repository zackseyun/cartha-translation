translation:
  text: Bless the Lord, angels of the Lord; sing hymns and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Praise the Lord' for 'Bless the Lord'; the Greek verb can bear either
      sense in worship language, but 'bless' more closely follows εὐλογεῖτε.
    reason: lexical_alternative
  - marker: b
    text: Or 'sing praise' for 'sing hymns'; the Greek specifically evokes hymn-singing.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω, commonly 'bless' in doxological address.
    'Bless' preserves the liturgical and biblical register of the Greek better than
    the broader 'praise.'
- source_word: ἄγγελοι
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this hymnic cosmic summons, the referent is heavenly beings rather
    than human envoys, so 'angels' is the natural contextual rendering.
- source_word: Κυρίου / τὸν κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Following project doctrine for κύριος, 'Lord' is the default rendering.
    Here the phrase addresses 'angels of the Lord' and commands them to bless 'the
    Lord.'
- source_word: ὑμνεῖτε
  chosen: sing hymns
  alternatives:
  - praise
  - sing praise
  lexicon: BDAG
  rationale: The verb ὑμνέω specifically denotes singing hymns or praise. 'Sing hymns'
    preserves the musical and liturgical force more precisely than simply 'praise.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt
  - lift up exceedingly
  lexicon: BDAG
  rationale: The compound intensifies the idea of exalting. 'Highly exalt' captures
    the heightened force while remaining natural English.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this refrain, the idiom denotes enduring perpetuity. 'Forever' is
    idiomatic modern English, while more literal options are less natural here.
