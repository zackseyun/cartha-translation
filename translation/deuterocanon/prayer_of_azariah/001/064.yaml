translation:
  text: Bless the Lord, you holy and humble in heart; sing praise to him and highly
    exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'godly and humble in heart.' The Greek ὅσιοι can also be rendered 'godly'
      or 'devout.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω in a liturgical refrain. 'Bless' preserves
    the traditional and lexical sense of speaking well of / blessing God, while remaining
    natural in English.
- source_word: ὅσιοι
  chosen: holy
  alternatives:
  - godly
  - devout
  lexicon: BDAG
  rationale: ὅσιος commonly denotes pious, holy, or devout persons. 'Holy' is concise
    and fits the elevated liturgical register; 'godly' and 'devout' are possible but
    less directly aligned with the adjective's sacred connotation.
- source_word: ταπεινοὶ τῇ καρδίᾳ
  chosen: humble in heart
  alternatives:
  - lowly in heart
  - humble of heart
  lexicon: BDAG
  rationale: ταπεινός means humble/lowly, and the dative phrase τῇ καρδίᾳ specifies
    the inward disposition. 'Humble in heart' is idiomatic modern English and preserves
    the internal, moral sense.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this deuterocanonical Greek
    liturgical context, 'the Lord' is the natural rendering.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb carries the sense of singing praise or chanting a hymn. 'Sing
    praise' communicates the musical/liturgical nuance better than the bare 'praise,'
    while avoiding the less idiomatic verbal use 'hymn'.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: This recurring refrain verb intensifies exaltation. 'Highly exalt' preserves
    the heightened force and works well in English alongside 'sing praise.'
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this refrain the idiom denotes enduring perpetuity. 'Forever' is the
    clearest natural English equivalent; more literal options are possible but less
    readable in this context.
