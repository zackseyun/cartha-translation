translation:
  text: Bless the Lord, nights and days; sing praise to him and highly exalt him forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  - Speak well of
  lexicon: BDAG
  rationale: Imperative plural calling the addressed elements of creation to bless
    the Lord. 'Bless' preserves the liturgical and biblical resonance of εὐλογέω better
    than the flatter 'praise,' especially since ὑμνεῖτε later explicitly covers praise.
- source_word: νύκτες καὶ ἡμέραι
  chosen: nights and days
  alternatives:
  - night and day
  - the nights and the days
  lexicon: LSJ
  rationale: The Greek uses plural vocatives, directly addressing successive times
    as participants in creation's praise. 'Nights and days' keeps the plural and the
    poetic personification.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the LORD
  - the master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this Greek
    deuterocanonical context, 'the Lord' is the natural equivalent and aligns with
    the doxological address.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb denotes offering praise in song. 'Sing praise' communicates
    the musical nuance more clearly in contemporary English than the less idiomatic
    verb 'hymn'.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: The compound intensifies exaltation. 'Highly exalt' preserves the heightened
    force without becoming awkward.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this refrain, the idiom expresses enduring perpetuity. 'Forever' is
    idiomatic modern English while retaining the sense of unending duration.
