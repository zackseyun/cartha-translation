translation:
  text: And the king’s attendants who threw them in did not stop feeding the furnace
    with naphtha and pitch and tow and brushwood, keeping it burning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bitumen' for 'naphtha' (ἀφθάλτῳ); the Greek names a highly flammable
      petroleum-like substance.
    reason: lexical_alternative
  - marker: b
    text: Or 'vine-branches' for 'brushwood' (κληματίδα); the term may refer specifically
      to cut vine shoots used as fuel.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ διέλειπον
  chosen: did not stop
  alternatives:
  - did not cease
  - kept on
  lexicon: LSJ
  rationale: The imperfect with negation conveys continued action. 'Did not stop'
    is natural modern English and preserves the ongoing sense without overparaphrase.
- source_word: οἱ ἐμβάλλοντες αὐτοὺς
  chosen: who threw them in
  alternatives:
  - those casting them in
  - those who put them in
  lexicon: LSJ
  rationale: The participle identifies the attendants as the same men who cast the
    three into the furnace. 'Threw them in' fits the narrative context and is idiomatic.
- source_word: ὑπηρέται τοῦ βασιλέως
  chosen: the king’s attendants
  alternatives:
  - the king's servants
  - the king's officers
  lexicon: LSJ
  rationale: ὑπηρέται denotes subordinates or attendants in service to the king. 'Attendants'
    is clear and avoids implying a more formal office than the Greek requires.
- source_word: καίοντες τὴν κάμινον
  chosen: feeding the furnace ... keeping it burning
  alternatives:
  - burning the furnace
  - heating the furnace
  lexicon: LSJ
  rationale: Literally 'burning the furnace,' but in English furnaces are not usually
    said to be 'burned.' The participle describes stoking or fueling it so that it
    continues to burn. The chosen rendering preserves the action and result.
- source_word: ἀφθάλτῳ
  chosen: naphtha
  alternatives:
  - bitumen
  - asphalt
  lexicon: LSJ
  rationale: The term refers to a combustible petroleum-like substance. 'Naphtha'
    is a standard rendering in this context and distinguishes it from the following
    πίσσα ('pitch').
- source_word: πίσσῃ
  chosen: pitch
  alternatives:
  - tar
  lexicon: LSJ
  rationale: A resinous combustible material; 'pitch' is the most direct and conventional
    equivalent.
- source_word: στιππύῳ
  chosen: tow
  alternatives:
  - oakum
  - flax waste
  - kindling fiber
  lexicon: LSJ
  rationale: The word denotes fibrous tinder, often flax refuse. 'Tow' is concise
    and accurate, though somewhat specialized; it best matches the material named
    in the list of fuels.
- source_word: κληματίδα
  chosen: brushwood
  alternatives:
  - vine-branches
  - twigs
  - faggots
  lexicon: LSJ
  rationale: The noun can denote vine-shoots or brush-like cuttings used as fuel.
    'Brushwood' is natural English for combustible cut branches and avoids the archaic
    'faggots.'
