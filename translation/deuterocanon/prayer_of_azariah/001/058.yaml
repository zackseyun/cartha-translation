translation:
  text: Bless the Lord, four-footed animals and beasts of the earth; sing praise to
    him and highly exalt him forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural calling the addressed creatures to bless the Lord.
    'Bless' preserves the liturgical refrain and distinguishes it from the following
    ὑμνεῖτε ('sing praise').
- source_word: τετράποδα
  chosen: four-footed animals
  alternatives:
  - quadrupeds
  - four-footed creatures
  lexicon: LSJ
  rationale: Literally 'four-footed things.' 'Four-footed animals' is natural modern
    English while retaining the concrete zoological sense.
- source_word: θηρία
  chosen: beasts
  alternatives:
  - wild animals
  - animals
  lexicon: LSJ
  rationale: The term often denotes beasts or wild animals. 'Beasts' keeps the elevated
    poetic register and pairs well with 'of the earth'; 'wild animals' is possible
    but slightly more interpretive than the Greek here.
- source_word: τῆς γῆς
  chosen: of the earth
  alternatives:
  - of the land
  - on earth
  lexicon: LSJ
  rationale: Genitive modifying θηρία, most naturally 'beasts of the earth/land.'
    'Of the earth' fits the cosmic hymn's repeated creation-language.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this hymnic
    Jewish-Greek context it refers to God.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: LSJ
  rationale: The verb is specifically hymnic praise. 'Sing praise' communicates that
    nuance in readable English better than the less idiomatic verbal form 'hymn.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: A strong compound verb meaning to exalt exceedingly. 'Highly exalt' is
    idiomatic and preserves the intensification.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this refrain the idiomatic sense is enduring perpetuity. 'Forever'
    is clear modern English while preserving the doxological force.
