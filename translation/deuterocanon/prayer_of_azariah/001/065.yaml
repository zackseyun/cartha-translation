translation:
  text: Bless the Lord, Hananiah, Azariah, and Mishael; sing praise to him and highly
    exalt him forever. For he has delivered us from Hades, and saved us from the hand
    of death, and rescued us from the midst of the burning flame, and redeemed us
    from the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the grave.' The Greek reads 'from Hades,' the realm of the dead.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω; 'Bless' preserves the liturgical force
    of invoking spoken blessing toward the Lord, while 'Praise' is possible but less
    directly tied to the Greek verb.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' In this
    Jewish-Greek liturgical context it functions as the divine title.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb denotes singing a hymn or song of praise. 'Sing praise' communicates
    the musical nuance in natural English better than the less idiomatic 'hymn' as
    a verb.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: The compound intensifies exaltation. 'Highly exalt' preserves the heightened
    force and matches the recurring refrain of the song.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic English for the durative doxological phrase; more readable
    than a formally wooden rendering while preserving perpetual duration.
- source_word: ἐξείλετο
  chosen: has delivered
  alternatives:
  - rescued
  - snatched away
  lexicon: BDAG
  rationale: Aorist middle of ἐξαιρέω, denoting deliverance out of danger. 'Has delivered'
    fits the thanksgiving context and distinguishes it from later rescue verbs in
    the verse.
- source_word: ἐξ ᾅδου
  chosen: from Hades
  alternatives:
  - from the grave
  - from the underworld
  lexicon: BDAG
  rationale: ᾅδης is best rendered 'Hades' as the Greek term for the realm of the
    dead. 'Grave' is interpretive and narrows the imagery; 'underworld' is possible
    but less conventional in biblical English. Because readers may understand 'Hades'
    differently, the alternative is preserved in a footnote.
- source_word: ἔσωσεν
  chosen: saved
  alternatives:
  - delivered
  - preserved
  lexicon: BDAG
  rationale: Standard rendering of σώζω. Here it refers to concrete rescue from mortal
    peril, not necessarily spiritual salvation, but 'saved' remains the most direct
    equivalent.
- source_word: ἐκ χειρὸς θανάτου
  chosen: from the hand of death
  alternatives:
  - from death's power
  - from the grasp of death
  lexicon: BDAG
  rationale: Retains the Hebrew-like idiom 'hand of' present in the Greek. This preserves
    the vivid personification of death's power rather than flattening it.
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - freed
  lexicon: BDAG
  rationale: ῥύομαι often denotes rescue from danger. 'Rescued' is vivid and helps
    differentiate it from the earlier ἐξείλετο.
- source_word: ἐκ μέσου καιομένης φλογός
  chosen: from the midst of the burning flame
  alternatives:
  - from the middle of the blazing flame
  - out of the burning fire
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the imagery of being saved from
    within the flame itself. 'Burning flame' reflects καιομένης φλογός without unnecessary
    paraphrase.
- source_word: ἐλυτρώσατο
  chosen: redeemed
  alternatives:
  - delivered
  - freed
  lexicon: BDAG
  rationale: λυτρόω carries the sense of release or deliverance, often with redemptive
    overtones. 'Redeemed' preserves that theological resonance, even in a concrete
    rescue context.
