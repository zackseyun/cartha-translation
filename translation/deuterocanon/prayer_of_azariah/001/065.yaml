theological_decisions:
- issue: Rendering of ᾅδης in a thanksgiving for deliverance from mortal danger
  chosen_reading: from Hades
  alternative_readings:
  - from the grave
  - from the underworld
  rationale: The Greek explicitly uses ᾅδης, not merely 'death' or 'grave.' To preserve
    lexical transparency and theological texture, the main text keeps 'Hades,' while
    a footnote preserves the more interpretive alternative 'the grave.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
