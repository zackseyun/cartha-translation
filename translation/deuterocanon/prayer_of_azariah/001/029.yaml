translation:
  text: Blessed are you, Lord, the God of our fathers, and praised and highly exalted
    forever; and blessed is your holy name of glory, and exceedingly praised and highly
    exalted through all the ages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the holy name of your glory.' The Greek phrase is compressed,
      and the main text renders its sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογητὸς
  chosen: Blessed
  alternatives:
  - Praised
  - Blessed be
  lexicon: LSJ
  rationale: Predicate adjective in a blessing formula; 'Blessed are you' preserves
    the direct doxological address better than turning it into an imperative ('Blessed
    be').
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Standard rendering of κύριος in direct address; aligns with project default
    for Kyrios.
- source_word: ὁ θεὸς τῶν πατέρων ἡμῶν
  chosen: the God of our fathers
  alternatives:
  - the God of our ancestors
  lexicon: LSJ
  rationale: Retains the familial-covenantal phrasing of the Greek. 'Fathers' is gender-accurate
    to the source and idiomatic in biblical doxology.
- source_word: αἰνετὸς
  chosen: praised
  alternatives:
  - praiseworthy
  lexicon: LSJ
  rationale: A verbal-sounding English predicate works naturally in the sequence of
    doxological adjectives and avoids the slightly static 'praiseworthy'.
- source_word: ὑπερυψούμενος
  chosen: highly exalted
  alternatives:
  - exalted above all
  - lifted up exceedingly
  lexicon: LSJ
  rationale: Captures the intensive force of the compound while remaining readable
    modern English. Repeated consistently in both occurrences.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: LSJ
  rationale: In this first occurrence, idiomatic English 'forever' best conveys enduring
    duration without awkwardness.
- source_word: τὸ ὄνομα τῆς δόξης σου τὸ ἅγιον
  chosen: your holy, glorious name
  alternatives:
  - the holy name of your glory
  - your holy name of glory
  lexicon: LSJ
  rationale: The Greek phrase is somewhat stacked literally ('the name of your glory,
    the holy [name]'). This rendering preserves both holiness and glory while producing
    natural English. 'Glorious' reflects the genitival relation without wooden literalism.
- source_word: ὑπεραινετὸν
  chosen: supremely praised
  alternatives:
  - exceedingly praised
  - beyond all praise
  lexicon: LSJ
  rationale: Distinguishes this term from αἰνετός while preserving the intensifying
    prefix ὑπερ-. 'Beyond all praise' is interpretive; 'supremely praised' stays closer
    to the form.
- source_word: εἰς ἅπαντας τοὺς αἰῶνας
  chosen: through all the ages
  alternatives:
  - forever and ever
  - unto all ages
  lexicon: LSJ
  rationale: The addition of ἅπαντας ('all') is reflected more explicitly here than
    in the first phrase. 'Through all the ages' preserves the fuller wording and avoids
    flattening the repetition.
