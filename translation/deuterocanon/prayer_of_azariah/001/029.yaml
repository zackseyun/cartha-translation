theological_decisions:
- issue: Traditional liturgical diction versus direct rendering of the Greek blessing
    formula
  chosen_reading: Blessed are you, Lord, the God of our fathers
  alternative_readings:
  - Blessed be thou, O Lord God of our fathers
  - Blessed be you, Lord God of our fathers
  rationale: The Greek uses a direct second-person predicate construction, not an
    English optative formula. The chosen rendering preserves the doxological force
    while using readable modern English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Rendering πατέρων as 'fathers' or 'ancestors'
  chosen_reading: fathers
  alternative_readings:
  - ancestors
  rationale: The source is explicitly masculine plural and reflects a conventional
    covenantal biblical expression. Per project policy, gender-accurate rendering
    is preferred unless context requires otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
