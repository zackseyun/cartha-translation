id: PAZ.1.17
reference: Prayer of Azariah and Song of the Three 1:17
source:
  edition: lxx-swete-1909
  text: ὡς ἐν ὁλοκαυτώμασι κριῶν καὶ ταύρων καὶ ὡς ἐν μυριάσιν ἀρνῶν πιόνων, οὕτω
    γενέσθω ἡμῶν ἡ θυσία ἐνώπιόν σου σήμερον καὶ ἐξιλάσαι ὄπισθέν σου, ὅτι οὐκ ἔστιν
    αἰσχύνη τοῖς πεποιθόσιν ἐπὶ σοί, καὶ τελειῶσαι ὄπισθέν σου.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: As with whole burnt offerings of rams and bulls, and as with tens of thousands
    of fat lambs, so let our sacrifice be before you today, and may it make atonement
    in your presence, for there is no shame for those who have put their trust in
    you, and may it be brought to completion in your presence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally repeats a phrase that can mean 'behind you'; in context
      it is best understood idiomatically as 'before you' or 'in your presence.'
    reason: lexical_alternative
  - marker: b
    text: Or 'may it be accepted before you.' The Greek verb can carry sacrificial
      atonement/appeasement force.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁλοκαυτώμασι
  chosen: whole burnt offerings
  alternatives:
  - burnt offerings
  - holocausts
  lexicon: LSJ
  rationale: The term denotes offerings wholly consumed by fire. 'Whole burnt offerings'
    preserves the sacrificial specificity better than the broader 'burnt offerings,'
    while avoiding the misleading modern connotations of the transliteration 'holocausts'.
- source_word: κριῶν
  chosen: rams
  alternatives:
  - male sheep
  lexicon: LSJ
  rationale: Standard sacrificial term; 'rams' is the natural and precise English
    rendering in this cultic list.
- source_word: ταύρων
  chosen: bulls
  alternatives:
  - oxen
  lexicon: LSJ
  rationale: In sacrificial contexts ταῦρος commonly refers to a bull. 'Bulls' is
    more specific than 'oxen' and fits the parallel list of sacrificial animals.
- source_word: μυριάσιν
  chosen: tens of thousands
  alternatives:
  - myriads
  - countless numbers
  lexicon: LSJ
  rationale: The Greek literally refers to myriads, conventionally ten-thousand units.
    'Tens of thousands' communicates the scale in clear modern English without becoming
    overly idiomatic.
- source_word: ἀρνῶν πιόνων
  chosen: fat lambs
  alternatives:
  - fattened lambs
  - choice lambs
  lexicon: LSJ
  rationale: πίων means fat, well-fed, or choice. 'Fat lambs' is the most direct rendering,
    preserving the sacrificial imagery of valuable animals.
- source_word: θυσία
  chosen: sacrifice
  alternatives:
  - offering
  lexicon: LSJ
  rationale: The prayer contrasts the speakers' present act with animal offerings;
    'sacrifice' best preserves the solemn cultic force of the term.
- source_word: ἐξιλάσαι
  chosen: make atonement
  alternatives:
  - be accepted
  - propitiate
  lexicon: LSJ
  rationale: The verb belongs to atonement/reconciliation language. 'Make atonement'
    is accessible modern English and preserves the sacrificial-theological sense better
    than the more interpretive 'be accepted.'
- source_word: ὄπισθέν σου
  chosen: in your presence
  alternatives:
  - before you
  - behind you
  lexicon: LSJ
  rationale: Although ὄπισθεν often means 'behind,' in this verse the repeated phrase
    is awkward if rendered woodenly. In context, with ἐνώπιόν σου already present
    and in a prayer for acceptance before God, the sense is best taken idiomatically
    as being before or in God's presence. The literal 'behind you' would be misleading
    in English and contextually implausible.
- source_word: αἰσχύνη
  chosen: shame
  alternatives:
  - disgrace
  - confusion
  lexicon: LSJ
  rationale: The noun denotes shame or disgrace. 'Shame' is concise, natural, and
    fits the assurance given to those trusting in God.
- source_word: τοῖς πεποιθόσιν ἐπὶ σοί
  chosen: those who have put their trust in you
  alternatives:
  - those who trust in you
  - those who rely on you
  lexicon: LSJ
  rationale: The perfect participle conveys a settled posture of trust. 'Have put
    their trust in you' reflects that completed-yet-enduring sense better than a simple
    present.
- source_word: τελειῶσαι
  chosen: be brought to completion
  alternatives:
  - be perfected
  - be fulfilled
  - complete it
  lexicon: LSJ
  rationale: The verb carries the sense of bringing something to its intended completion.
    Because the syntax is compressed, an English passive expression best captures
    the prayer that the sacrifice be fully effected or accepted in God's presence.
