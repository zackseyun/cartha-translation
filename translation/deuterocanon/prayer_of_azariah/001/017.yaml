theological_decisions:
- issue: Atonement language in a deuterocanonical prayer
  chosen_reading: may it make atonement in your presence
  alternative_readings:
  - may it be accepted before you
  - may it propitiate before you
  rationale: The Greek ἐξιλάσαι naturally evokes atonement language. Following the
    project's preference for accessible but theologically weighty English, 'make atonement'
    preserves the cultic sense without importing later technical jargon like 'propitiate.'
    Because the speakers lack the lavish sacrifices named, the line asks that their
    present sacrifice function acceptably before God in analogous fashion.
  doctrine_reference: 'DOCTRINE.md: preserve theological weight without archaic jargon'
- issue: Interpretation of the repeated phrase ὄπισθέν σου
  chosen_reading: in your presence
  alternative_readings:
  - before you
  - behind you
  rationale: The transmitted Greek phrase is unusual here. A hyper-literal rendering
    'behind you' would obscure the prayer's sense and likely misrepresent the idiom
    in context. Rendering it as 'in your presence' preserves the relational and cultic
    orientation of the petition while honestly noting the lexical alternative in a
    footnote.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; original-language primacy
    with documented ambiguity'
