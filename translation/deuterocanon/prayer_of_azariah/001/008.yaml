theological_decisions:
- issue: Characterization of God's actions toward the speakers
  chosen_reading: The verse affirms that God's acts, including calamity brought upon
    the people, were done in true judgment.
  alternative_readings:
  - The phrase could be rendered more interpretively as 'in righteous judgment' or
    'with justice'.
  rationale: The Greek explicitly attributes the events to God and evaluates them
    as ἐν ἀληθινῇ κρίσει. The translation preserves that theological claim without
    softening divine agency or importing a fuller doctrine of retribution beyond the
    verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 5
