  text: καὶ νῦν πάντα ὅσα ἡμῖν ἐπήγαγες καὶ πάντα ὅσα ἐποίησας ἡμῖν, ἐν ἀληθινῇ κρίσει
    ἐποίησας,
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
