translation:
  text: Bless the Lord, lightnings and clouds; sing praise to him and highly exalt
    him forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural calling creation to speak well of or bless the Lord.
    'Bless' preserves the repeated liturgical refrain of the Song better than the
    flatter 'praise.'
- source_word: ἀστραπαὶ
  chosen: lightnings
  alternatives:
  - flashes of lightning
  - lightning
  lexicon: LSJ
  rationale: Plural noun referring to lightning flashes. 'Lightnings' keeps the Greek
    plural and matches the poetic catalog of created things.
- source_word: νεφέλαι
  chosen: clouds
  alternatives:
  - cloud masses
  lexicon: LSJ
  rationale: Straightforward rendering of the plural noun for clouds.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. The article
    is naturally represented in English here as 'the Lord.'
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb denotes singing a hymn or praise. 'Sing praise' is idiomatic
    modern English and preserves the musical nuance better than simply 'praise.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: Compound verb intensifying exaltation. 'Highly exalt' preserves the heightened
    force without becoming awkward.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic rendering of the doxological phrase in this refrain. 'Forever'
    is natural English while retaining the sense of enduring perpetually.
