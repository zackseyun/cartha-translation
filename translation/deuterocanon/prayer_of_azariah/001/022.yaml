source:
  edition: lxx-swete-1909
  text: γνώτωσαν ὅτι σὺ εἶ Κύριος θεὸς μόνος καὶ ἔνδοξος ἐφʼ ὅλην τὴν οἰκουμένην.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: let them know that you alone are the Lord God, glorious over all the inhabited
    earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout all the world.' The Greek οἰκουμένη can mean 'the inhabited
      world/earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνώτωσαν
  chosen: let them know
  alternatives:
  - may they know
  - let them come to know
  lexicon: BDAG
  rationale: Aorist imperative, third person plural. 'Let them know' preserves the
    jussive force in natural English better than a bare future-like rendering.
- source_word: σὺ
  chosen: you
  lexicon: BDAG
  rationale: Explicit pronoun adds emphasis in Greek; English retains it naturally
    without extra stress marking.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows project default for κύριος as a divine title. In this Jewish-Greek
    prayer context it functions as the title for Israel's God, and 'Lord' is the standard
    reverential rendering.
- source_word: θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward rendering of the divine designation.
- source_word: μόνος
  chosen: alone
  alternatives:
  - only
  lexicon: BDAG
  rationale: Placed with 'you' in English ('you alone') to reflect the exclusivity
    emphasized by μόνος.
- source_word: ἔνδοξος
  chosen: glorious
  alternatives:
  - glorified
  - renowned
  - honored
  lexicon: BDAG
  rationale: Predicate adjective describing God's majesty. 'Glorious' best captures
    inherent splendor rather than merely reputation or bestowed honor.
- source_word: ἐφʼ ὅλην τὴν οἰκουμένην
  chosen: over all the inhabited earth
  alternatives:
  - throughout all the world
  - over the whole world
  lexicon: BDAG
  rationale: οἰκουμένη in Greek commonly denotes the inhabited world/earth. 'Over'
    reflects ἐπί with accusative in a sense of extent or dominion; this keeps the
    universal scope without flattening to a modern geopolitical 'world'.
