theological_decisions:
- issue: Divine exclusivity in μόνος with Κύριος θεὸς
  chosen_reading: you alone are the Lord God
  alternative_readings:
  - you are the only Lord God
  - you are Lord, God alone
  rationale: The Greek most naturally predicates exclusive deity of the addressed
    God. The chosen wording is idiomatic English and preserves the monotheistic force
    without overcomplicating the syntax.
