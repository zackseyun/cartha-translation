translation:
  text: And you gave us into the hands of our lawless enemies, hateful rebels, and
    to an unjust and most wicked king in all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you handed us over into the power of our lawless enemies.'
    reason: lexical_alternative
  - marker: b
    text: '''Hateful rebels'' may also be rendered ''most hateful apostates'' or ''detestable
      rebels.'''
    reason: lexical_alternative
  - marker: c
    text: 'The final phrase may also be understood comparatively: ''an unjust and
      most wicked king beyond all the earth''—that is, worse than any on earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέδωκας
  chosen: you gave
  alternatives:
  - you handed over
  - you delivered up
  lexicon: BDAG
  rationale: The verb means to hand over or deliver into another's power. 'You gave'
    is natural English with 'into the hands of' and preserves the sense of divine
    surrender without overloading the phrase.
- source_word: εἰς χεῖρας
  chosen: into the hands of
  alternatives:
  - into the power of
  lexicon: BDAG
  rationale: This is a standard idiom for being delivered into someone's power. The
    literal 'hands' is retained because it is clear in English and preserves the biblical
    texture.
- source_word: ἐχθρῶν
  chosen: enemies
  alternatives:
  - foes
  lexicon: BDAG
  rationale: The basic sense is straightforward; 'enemies' is the most transparent
    modern rendering.
- source_word: ἀνόμων
  chosen: lawless
  alternatives:
  - wicked
  - without law
  lexicon: BDAG
  rationale: ἀνόμων modifies the enemies and denotes those acting contrary to law.
    'Lawless' preserves the lexical force better than the broader 'wicked'.
- source_word: ἐχθίστων
  chosen: hateful
  alternatives:
  - most hateful
  - detestable
  lexicon: BDAG
  rationale: As a superlative from ἐχθρός, it can mean 'most hateful' or 'most hostile.'
    In context, paired with ἀποστατῶν, it characterizes them negatively. 'Hateful'
    is concise and idiomatic, though the superlative force is somewhat absorbed into
    the overall description.
- source_word: ἀποστατῶν
  chosen: rebels
  alternatives:
  - apostates
  - traitors
  - renegades
  lexicon: BDAG
  rationale: The term denotes those who revolt or fall away. 'Rebels' is the clearest
    general rendering in context; 'apostates' would narrow the sense more explicitly
    to religious defection than the verse itself requires.
- source_word: βασιλεῖ
  chosen: king
  alternatives:
  - ruler
  lexicon: BDAG
  rationale: The noun directly means 'king' and should be translated plainly.
- source_word: ἀδίκῳ
  chosen: unjust
  alternatives:
  - unrighteous
  - wicked
  lexicon: BDAG
  rationale: The adjective denotes injustice or unrighteousness. 'Unjust' fits a king's
    conduct in accessible modern English.
- source_word: πονηροτάτῳ
  chosen: most wicked
  alternatives:
  - utterly evil
  - most evil
  lexicon: BDAG
  rationale: The superlative should be preserved. 'Most wicked' is idiomatic and weighty
    without sounding archaic.
- source_word: παρὰ πᾶσαν τὴν γῆν
  chosen: in all the earth
  alternatives:
  - in all the land
  - beyond all the earth
  lexicon: BDAG
  rationale: The phrase is comparative/intensive, describing the king as surpassingly
    wicked relative to the whole earth. 'In all the earth' communicates the scope
    naturally in English, though the comparative nuance could also be expressed as
    'more than all the earth.'
