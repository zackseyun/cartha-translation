theological_decisions:
- issue: Divine agency in Israel's judgment
  chosen_reading: 'The verse is rendered with direct divine agency: ''you gave us
    into the hands...'''
  alternative_readings:
  - you allowed us to fall into the hands...
  rationale: The Greek directly attributes the handing over to God. The translation
    preserves that theological tension rather than softening it into mere permission.
