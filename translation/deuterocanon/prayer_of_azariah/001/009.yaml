source:
  edition: lxx-swete-1909
  text: καὶ παρέδωκας ἡμᾶς εἰς χεῖρας ἐχθρῶν ἡμῶν ἀνόμων καὶ ἐχθίστων ἀποστατῶν, καὶ
    βασιλεῖ ἀδίκῳ καὶ πονηροτάτῳ παρὰ πᾶσαν τὴν γῆν.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
