translation:
  text: Blessed are you, who look upon the depths, seated upon the cherubim, and worthy
    of praise and highly exalted forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enthroned above the cherubim.' The Greek more literally says 'seated
      upon the cherubim.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the abysses.' The phrase evokes the cosmic deep.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογημένος
  chosen: Blessed are you
  alternatives:
  - Blessed is he
  - Blessed be you
  lexicon: BDAG
  rationale: Predicate adjective in a liturgical blessing formula addressed directly
    to God. English idiom in this context is best represented by second-person address,
    making the implied addressee explicit.
- source_word: ὁ ἐπιβλέπων
  chosen: who look upon
  alternatives:
  - the one who watches over
  - the one who beholds
  lexicon: BDAG
  rationale: Present participle with article functioning substantivally, modifying
    the implied addressee. 'Look upon' preserves the visual sense of ἐπιβλέπω without
    overinterpreting it as providential care.
- source_word: ἀβύσσους
  chosen: the depths
  alternatives:
  - the abysses
  - the deep places
  lexicon: LEH
  rationale: Plural noun referring to the deep or abyssal realms. 'The depths' is
    natural English and preserves the cosmic imagery without awkward transliteration.
- source_word: καθήμενος
  chosen: seated
  alternatives:
  - sitting
  - enthroned
  lexicon: BDAG
  rationale: Literal participial sense is 'sitting/seated.' 'Enthroned' is possible
    by implication, especially in divine-royal imagery, but 'seated' stays closer
    to the Greek while remaining idiomatic.
- source_word: ἐπὶ χερουβεὶν
  chosen: upon the cherubim
  alternatives:
  - on the cherubim
  - above the cherubim
  lexicon: LEH
  rationale: Traditional biblical imagery of God associated with the cherubim. 'Upon'
    reflects ἐπί naturally in elevated English and fits the liturgical register.
- source_word: αἰνετὸς
  chosen: worthy of praise
  alternatives:
  - praised
  - praiseworthy
  lexicon: LEH
  rationale: The adjective denotes one deserving praise. 'Worthy of praise' communicates
    the force more clearly in modern English than the less natural bare adjective
    'praised.'
- source_word: ὑπερυψούμενος
  chosen: highly exalted
  alternatives:
  - lifted up above all
  - supremely exalted
  lexicon: LEH
  rationale: Present/passive-style participial form in doxological language. 'Highly
    exalted' is idiomatic and preserves the superlative elevation implied by the compound
    verb.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Standard doxological expression indicating enduring perpetuity. 'Forever'
    is the clearest modern equivalent, while more literal options can sound wooden.
