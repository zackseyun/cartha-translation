theological_decisions:
- issue: Divine throne imagery in relation to the cherubim
  chosen_reading: seated upon the cherubim
  alternative_readings:
  - enthroned above the cherubim
  rationale: The Greek says 'seated upon the cherubim.' While the broader biblical
    motif often appears in English as 'enthroned above the cherubim,' this verse's
    wording is adequately conveyed without importing fuller throne terminology not
    explicit in the Greek.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Force of αἰνετὸς in doxology
  chosen_reading: worthy of praise
  alternative_readings:
  - praised
  - praiseworthy
  rationale: This avoids implying merely that praise is being offered and instead
    expresses the evaluative sense that God deserves praise, fitting the doxological
    context while remaining faithful to the adjective.
  doctrine_reference: Translation philosophy §6
