translation:
  text: Bless the Lord, dews and snowstorms; sing praise to him and highly exalt him
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dews and snows' or more broadly 'dews and precipitation'; the Greek
      νιφετοί can refer to snowfall or stormy precipitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural meaning to speak well of or bless. 'Bless' preserves
    the repeated liturgical refrain of the Song more closely than the broader 'praise.'
- source_word: δρόσοι
  chosen: dews
  alternatives:
  - dew
  lexicon: LSJ
  rationale: Plural noun referring to dew formations. The plural is retained to match
    the Greek and the poetic catalog style.
- source_word: νιφετοί
  chosen: showers
  alternatives:
  - snows
  - rainstorms
  - rain showers
  lexicon: LSJ
  rationale: The term denotes falls of snow or rain, precipitation generally. 'Showers'
    fits the meteorological pairing with 'dews' and avoids over-specifying snow where
    the Greek can be broader.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' The article is
    naturally represented in English here as 'the Lord' in direct object position.
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: LSJ
  rationale: The verb specifically carries the sense of singing or chanting praise.
    'Sing praise' communicates that nuance in natural modern English.
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: Compound verb intensifies exaltation. 'Highly exalt' preserves the elevated,
    repetitive liturgical force without sounding archaic.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic expression for enduring perpetuity. 'Forever' is the clearest
    natural English equivalent in this refrain.
