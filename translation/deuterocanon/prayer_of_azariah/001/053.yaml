translation:
  text: Bless the Lord, all things that grow on the earth; sing hymns and highly exalt
    him forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural calling creation to speak well of or bless the Lord.
    'Bless' preserves the recurring liturgical refrain of the Song better than the
    more generic 'praise'.
- source_word: πάντα τὰ φυόμενα
  chosen: all things that grow
  alternatives:
  - all growing things
  - all vegetation
  - everything that springs up
  lexicon: LSJ
  rationale: The articular present middle/passive participle from φύω denotes things
    growing or springing up. 'All things that grow' is natural English and broad enough
    to include plant life generally without over-specifying 'vegetation' beyond the
    Greek.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - upon the earth
  - from the earth
  lexicon: BDAG
  rationale: ἐπί with the genitive commonly means location ('on/upon'). 'On the earth'
    is the plain spatial sense here.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: 'Per doctrine, κύριος is rendered ''Lord.'' The article is retained in
    English because this refrain addresses the God of Israel in a recognizable liturgical
    form: ''Bless the Lord.'''
- source_word: ὑμνεῖτε
  chosen: sing hymns
  alternatives:
  - hymn
  - sing praise
  - praise
  lexicon: BDAG
  rationale: The verb specifically denotes singing hymns or songs of praise. 'Sing
    hymns' preserves the musical nuance better than simply 'praise.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: The compound intensifies ὑψόω. 'Highly exalt' captures the heightened
    force while remaining idiomatic in the refrain.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring back to the Lord; standard personal pronoun rendering.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this liturgical context the idiom expresses enduring perpetuity. 'Forever'
    is the clearest natural English equivalent, while more literal options are less
    idiomatic.
