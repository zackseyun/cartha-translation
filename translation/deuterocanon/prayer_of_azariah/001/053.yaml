theological_decisions:
- issue: Rendering of κύριος in a deuterocanonical liturgical refrain
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The Greek has τὸν κύριον. Following project doctrine, κύριος is translated
    'Lord.' Including the article yields the familiar refrain 'Bless the Lord' and
    reflects the Greek form without importing the tetragrammaton where it is not written.
