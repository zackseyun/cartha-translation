translation:
  text: Let the earth bless the Lord; let it sing praise and highly exalt him forever.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογείτω
  chosen: let ... bless
  alternatives:
  - let ... praise
  - let ... speak well of
  lexicon: BDAG
  rationale: Third-person imperative of εὐλογέω in a liturgical summons. 'Bless' preserves
    the biblical register and the reciprocal praise sense directed toward God better
    than the flatter 'praise.'
- source_word: ἡ γῆ
  chosen: the earth
  alternatives:
  - the land
  lexicon: BDAG
  rationale: In this cosmic hymn sequence, γῆ refers to the earth as part of creation,
    not a particular land.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. In this doxological
    context 'the Lord' is the natural and theologically appropriate title.
- source_word: ὑμνείτω
  chosen: let it sing hymns
  alternatives:
  - let it hymn
  - let it sing praise
  lexicon: BDAG
  rationale: The verb ὑμνέω specifically denotes singing hymns or songs of praise.
    'Sing hymns' preserves that musical-liturgical nuance more clearly than simply
    'praise.'
- source_word: ὑπερυψούτω
  chosen: let it highly exalt
  alternatives:
  - let it exalt greatly
  - let it lift up exceedingly
  lexicon: BDAG
  rationale: The compound verb intensifies exaltation. 'Highly exalt' is idiomatic
    English that preserves the heightened force without becoming cumbersome.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring back to the Lord; standard personal pronoun is
    appropriate.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this refrain-like doxological formula, 'forever' gives the idiomatic
    sense in modern English while retaining the enduring temporal force.
