translation:
  text: Blessed are you in the firmament of heaven, and praised and glorified forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the expanse of heaven.” The Greek στερέωμα can denote the firm structure
      or spread of the sky.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογητὸς
  chosen: Blessed
  alternatives:
  - worthy of blessing
  - blessed be
  lexicon: BDAG
  rationale: Predicate adjective in a liturgical blessing formula; 'Blessed' preserves
    the doxological tone without recasting the clause as an imperative ('Blessed be').
- source_word: ἐν τῷ στερεώματι
  chosen: in the firmament
  alternatives:
  - in the expanse
  - in the vault
  lexicon: LSJ
  rationale: στερέωμα in biblical Greek commonly renders the cosmological term for
    the sky's expanse or firm structure. 'Firmament' preserves the intertextual and
    liturgical resonance, especially with Genesis language, better than the more interpretive
    'expanse' or 'vault'.
- source_word: τοῦ οὐρανοῦ
  chosen: of heaven
  alternatives:
  - of the sky
  lexicon: BDAG
  rationale: οὐρανός here functions in elevated doxological diction; 'heaven' better
    matches the register and traditional cosmological sense than the more mundane
    'sky'.
- source_word: ὑμνητὸς
  chosen: praised
  alternatives:
  - hymned
  - worthy to be praised
  lexicon: LSJ
  rationale: The adjective denotes being celebrated in song or praise. 'Praised' is
    natural modern English while still reflecting the worship context; 'hymned' is
    too wooden.
- source_word: δεδοξασμένος
  chosen: glorified
  alternatives:
  - honored
  - magnified
  lexicon: BDAG
  rationale: Perfect participial/adjectival form from δοξάζω, expressing acknowledged
    glory. 'Glorified' preserves the theological and liturgical weight better than
    'honored'.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic expression for enduring perpetuity. 'Forever' gives clear modern
    English while retaining the sense of unending duration.
