theological_decisions:
- issue: Description of God's justice in relation to suffering experienced by the
    speakers
  chosen_reading: The verse affirms that God is righteous in all he has done to us,
    without softening the directness of divine agency.
  alternative_readings:
  - The verse could be rendered more indirectly to emphasize permitted rather than
    directly enacted events.
  rationale: The Greek explicitly says 'what you have done to us.' The translation
    preserves the text's confession of God's righteousness even in adverse circumstances,
    rather than importing a theological mitigation not present in the wording.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
