reference: Prayer of Azariah and Song of the Three 1:4
source:
  edition: lxx-swete-1909
  text: ὅτι δίκαιος εἶ πᾶσιν οἷς ἐποίησας ἡμῖν, καὶ πάντα τὰ ἔργα σου ἀληθινὰ καὶ
    αἱ ὁδοί σου εὐθεῖαι καὶ πᾶσαι αἱ κρίσεις σου ἀληθιναί.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: For you are righteous in all that you have done to us, and all your works
    are true, and your ways are straight, and all your judgments are true.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: The predicate adjective describes God's moral rightness in his dealings.
    'Righteous' preserves the strong biblical-theological sense better than 'just'
    alone, though 'just' is a viable contextual alternative.
- source_word: πᾶσιν οἷς ἐποίησας ἡμῖν
  chosen: in all that you have done to us
  alternatives:
  - in all the things you have done to us
  - in everything you did to us
  lexicon: BDAG
  rationale: This idiom is best rendered naturally in English as 'in all that you
    have done to us.' The dative-relative construction refers comprehensively to God's
    actions toward the speakers.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: '''Works'' is the most direct and biblically familiar rendering for God''s
    acts, while remaining natural in English.'
- source_word: ἀληθινὰ / ἀληθιναί
  chosen: 'true'
  alternatives:
  - faithful
  - genuine
  lexicon: BDAG
  rationale: Here the term characterizes God's works and judgments as corresponding
    to reality and reliability. 'True' is the most straightforward rendering; 'faithful'
    would narrow the sense too much.
- source_word: ὁδοί
  chosen: ways
  alternatives:
  - paths
  - courses
  lexicon: BDAG
  rationale: '''Ways'' is the standard biblical rendering for God''s manner of acting
    and aligns with established scriptural idiom without being archaic.'
- source_word: εὐθεῖαι
  chosen: straight
  alternatives:
  - upright
  - right
  lexicon: BDAG
  rationale: The adjective literally means 'straight.' While 'upright' or 'right'
    would interpret the metaphor, 'straight' preserves the image and remains understandable
    in context.
- source_word: κρίσεις
  chosen: judgments
  alternatives:
  - judicial decisions
  - ordinances
  lexicon: BDAG
  rationale: In this context the word refers to God's judgments or verdicts. 'Judgments'
    is the most natural and theologically resonant English equivalent.
