theological_decisions:
- issue: Anthropological pairing of ψυχή and πνεῦμα
  chosen_reading: Render distinctly as 'soul' and 'spirit'
  alternative_readings:
  - Render both more generally as aspects of the inner self
  rationale: The Greek uses two distinct terms in poetic parallelism. Preserving both
    maintains the text's theological and literary texture rather than collapsing them
    into a single generalized expression.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
- issue: Penitential language of συντετριμμένῃ
  chosen_reading: Use 'broken' rather than 'contrite'
  alternative_readings:
  - contrite soul
  rationale: The source image is one of being broken/crushed. 'Contrite' is a legitimate
    interpretive gloss, but 'broken' stays closer to the Greek while remaining natural
    English.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1
