reference: Prayer of Azariah and Song of the Three 1:16
source:
  edition: lxx-swete-1909
  text: ἀλλʼ ἐν ψυχῇ συντετριμμένῃ καὶ πνεύματι τεταπεινωμένῳ προσδεχθείημεν·
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: but may we be accepted with a broken soul and a humbled spirit;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a contrite soul and a humbled spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλʼ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: LSJ
  rationale: Marks contrast with the preceding lack of sacrificial offerings; simple
    adversative 'but' fits the flow naturally in English.
- source_word: ἐν
  chosen: with
  alternatives:
  - in
  - by means of
  lexicon: BDAG
  rationale: Although literally 'in,' the phrase here expresses the condition or manner
    in which acceptance is sought. 'With' is idiomatic in English and preserves the
    sense without over-literal awkwardness.
- source_word: ψυχῇ
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: BDAG
  rationale: '''Soul'' best preserves the anthropological and devotional weight of
    ψυχή in this penitential prayer. ''Self'' would flatten the spiritual register,
    and ''life'' is less fitting in this context.'
- source_word: συντετριμμένῃ
  chosen: broken
  alternatives:
  - crushed
  - contrite
  lexicon: LSJ
  rationale: Perfect passive participle conveying a state of being broken or crushed.
    'Broken' is clear, biblically resonant, and avoids importing the more interpretive
    'contrite,' though that is a close contextual alternative.
- source_word: πνεύματι
  chosen: spirit
  alternatives:
  - breath
  - inner spirit
  lexicon: BDAG
  rationale: In parallel with ψυχή, πνεῦμα refers to the inner disposition. 'Spirit'
    preserves the lexical distinction and theological tone.
- source_word: τεταπεινωμένῳ
  chosen: humbled
  alternatives:
  - humiliated
  - brought low
  lexicon: BDAG
  rationale: Perfect passive participle indicating a lowly, humbled condition before
    God. 'Humbled' fits penitential language better than the harsher 'humiliated'.
- source_word: προσδεχθείημεν
  chosen: may we be accepted
  alternatives:
  - may we be received
  - let us be welcomed
  lexicon: BDAG
  rationale: Optative passive expressing a wish or plea for favorable reception by
    God. 'May we be accepted' captures both the volitional nuance and the relational
    sense of divine acceptance.
