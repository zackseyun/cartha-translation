translation:
  text: Bless the Lord, all birds of the sky; sing hymns and highly exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all birds of heaven' or more broadly 'all flying creatures of the sky.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω, commonly 'bless' in doxological summons.
    'Bless' preserves the liturgical force and recurring refrain of the passage better
    than the more generic 'praise'.
- source_word: πάντα τὰ πετεινὰ τοῦ οὐρανοῦ
  chosen: all birds of the sky
  alternatives:
  - all birds of heaven
  - all winged things of the sky
  lexicon: LSJ
  rationale: πετεινά can denote birds or flying creatures generally. In this hymn's
    catalog of creation, 'birds' is the most natural and readable English rendering,
    while 'of the sky' reflects τοῦ οὐρανοῦ without overly archaic 'of heaven'.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Greek deuterocanonical
    context, 'the Lord' is the standard title and fits the direct object of the imperative.
- source_word: ὑμνεῖτε
  chosen: sing hymns
  alternatives:
  - praise in song
  - sing praise
  lexicon: BDAG
  rationale: ὑμνέω specifically carries the sense of singing praise or hymns. 'Sing
    hymns' preserves that musical nuance distinctly from the preceding 'Bless.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: LSJ
  rationale: The compound verb intensifies exaltation. 'Highly exalt' is idiomatic
    English that preserves the heightened force and matches the repeated refrain in
    this section.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring back to the Lord; personal pronoun is
    natural and explicit in English.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic expression for enduring perpetuity. 'Forever' is clear modern
    English and fits the refrain naturally, while more literal alternatives are less
    readable.
