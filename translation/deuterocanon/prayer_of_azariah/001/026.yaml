theological_decisions:
- issue: Rendering of Κυρίου
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  - Master
  rationale: Following the project's contested-terms guidance, κύριος is rendered
    'Lord.' In this deuterocanonical Greek narrative, 'the angel of the Lord' is the
    natural English expression and does not require the small-caps convention used
    for the divine name in Hebrew contexts.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Identity implication of 'the angel of the Lord'
  chosen_reading: Retain the phrase without specifying whether this is a created angel
    or a manifestation of God
  alternative_readings:
  - Interpret as a theophany
  - Interpret as an ordinary angelic messenger
  rationale: The verse itself identifies the figure only as 'the angel of the Lord.'
    The translation preserves that wording and does not import a more specific theological
    identification than the text states.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
