translation:
  text: But the angel of the Lord went down into the furnace together with those around
    Azariah, and drove the flame of the fire out of the furnace,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Azariah's companions' for 'those around Azariah.' The Greek reads more
      literally, 'those around Azariah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: LSJ
  rationale: δέ marks a narrative transition/continuation here; 'But' preserves the
    slight contrastive movement from the preceding danger without overstating it.
- source_word: ἄγγελος Κυρίου
  chosen: the angel of the Lord
  alternatives:
  - an angel of the Lord
  - the Lord's angel
  lexicon: LSJ
  rationale: The Greek has the definite article with ἄγγελος and a genitive Κυρίου;
    'the angel of the Lord' is the most natural and established rendering, and κύριος
    follows the project's default as 'Lord'.
- source_word: συνκατέβη
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: LSJ
  rationale: The compound verb means 'went down together with.' English can express
    the accompanying sense through 'together with' later in the clause, so 'went down'
    is clear and natural without losing the downward motion.
- source_word: ἅμα
  chosen: together with
  alternatives:
  - with
  - at the same time as
  lexicon: LSJ
  rationale: ἅμα explicitly marks accompaniment/simultaneity; 'together with' preserves
    that force more clearly than simple 'with'.
- source_word: τοῖς περὶ τὸν Ἀζαρίαν
  chosen: those around Azariah
  alternatives:
  - Azariah's companions
  - those with Azariah
  lexicon: LSJ
  rationale: Literally 'those around Azariah.' This likely refers to his companions,
    but the Greek expression is somewhat broader and less idiomatic than a fixed term
    for 'companions,' so the translation stays close to the wording while remaining
    readable.
- source_word: κάμινον
  chosen: furnace
  alternatives:
  - oven
  - kiln
  lexicon: LSJ
  rationale: In the Daniel context this is the blazing furnace; 'furnace' is the standard
    and contextually appropriate English term.
- source_word: ἐξετίναξεν
  chosen: drove ... out
  alternatives:
  - cast ... out
  - shook ... out
  - expelled
  lexicon: LSJ
  rationale: The verb conveys forceful removal, literally something like shaking or
    casting out. 'Drove ... out' communicates the effective action in idiomatic English
    while preserving the force of expulsion.
- source_word: τὴν φλόγα τοῦ πυρός
  chosen: the flame of the fire
  alternatives:
  - the fiery flame
  - the blaze of the fire
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the vividness and avoids unnecessary
    smoothing. 'Flame of the fire' reflects the genitival construction.
- source_word: ἐκ τῆς καμίνου
  chosen: out of the furnace
  alternatives:
  - from the furnace
  lexicon: LSJ
  rationale: The preposition ἐκ indicates movement out from within; 'out of the furnace'
    best matches the image.
