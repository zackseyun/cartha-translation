translation:
  text: Bless the Lord, spirits and souls of the righteous; sing hymns and highly
    exalt him forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Praise the Lord, spirits and souls of the righteous.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'for the ages'; the phrase is a standard doxological expression meaning
      enduringly or forever.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω. 'Bless' preserves the liturgical and doxological
    force of the Greek better than the broader 'praise,' especially in this refrain-like
    context.
- source_word: πνεύματα
  chosen: spirits
  alternatives:
  - spiritual beings
  lexicon: BDAG
  rationale: The ordinary sense 'spirits' fits the paired expression with ψυχαί and
    should be retained rather than interpreted more loosely.
- source_word: ψυχαὶ
  chosen: souls
  alternatives:
  - lives
  - persons
  lexicon: BDAG
  rationale: In the collocation 'spirits and souls,' 'souls' is the most transparent
    and natural rendering. Alternatives such as 'lives' or 'persons' weaken the deliberate
    dual expression of the Greek.
- source_word: δικαίων
  chosen: of the righteous
  alternatives:
  - of righteous ones
  - of the just
  lexicon: BDAG
  rationale: The genitive modifies both 'spirits' and 'souls.' 'The righteous' is
    idiomatic modern English and preserves the moral-religious sense without archaic
    stiffness.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' This is a direct
    address/object of praise in a Jewish-Greek liturgical setting.
- source_word: ὑμνεῖτε
  chosen: sing hymns
  alternatives:
  - hymn
  - sing praise
  lexicon: BDAG
  rationale: The verb specifically denotes singing hymnic praise. 'Sing hymns' preserves
    that musical-liturgical nuance more clearly than the more generic 'praise.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: The compound intensifies exaltation. 'Highly exalt' is concise, natural,
    and preserves the heightened force appropriate to the repeated refrain.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: In this doxological formula, 'forever' communicates the enduring sense
    in clear modern English. More literal alternatives are possible but less natural
    in the refrain.
