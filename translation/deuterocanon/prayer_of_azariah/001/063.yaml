theological_decisions:
- issue: Anthropological pairing of 'spirits and souls'
  chosen_reading: 'Retain both terms distinctly: ''spirits and souls of the righteous.'''
  alternative_readings:
  - Interpret as a hendiadys such as 'souls of the righteous'
  - Render more dynamically as 'righteous people, in spirit and soul'
  rationale: The Greek explicitly names both πνεύματα and ψυχαί. The translation preserves
    the text's dual terminology without importing a developed doctrine of human composition
    or collapsing the distinction.
  doctrine_reference: Preserve theological tension rather than resolve it.
