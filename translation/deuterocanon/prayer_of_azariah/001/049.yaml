translation:
  text: Bless the Lord, light and darkness; sing praise to him and highly exalt him
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “for the ages.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Praise
  - Speak well of
  lexicon: BDAG
  rationale: Imperative plural calling the addressed elements of creation to bless
    the Lord. 'Bless' preserves the liturgical and doxological force better than flattening
    to 'praise,' especially in this repeated refrain.
- source_word: φῶς
  chosen: light
  lexicon: BDAG
  rationale: Straightforward cosmic term; singular in Greek but naturally collective
    in English in this poetic address.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordination joining the paired opposites in the hymn.
- source_word: σκότος
  chosen: darkness
  alternatives:
  - gloom
  lexicon: BDAG
  rationale: Standard rendering for the cosmic opposite of light; 'darkness' best
    matches the pair and the hymn's creation-language.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: 'Accusative object of the imperative. Per doctrine, κύριος is rendered
    ''Lord.'' Including the article in English is natural here after the imperative:
    ''Bless the Lord.'''
- source_word: ὑμνεῖτε
  chosen: sing praise
  alternatives:
  - hymn
  - praise
  lexicon: BDAG
  rationale: The verb denotes singing a hymn or praise. 'Sing praise' preserves the
    musical-liturgical nuance better than the bare 'praise.'
- source_word: ὑπερυψοῦτε
  chosen: highly exalt
  alternatives:
  - exalt greatly
  - lift up exceedingly
  lexicon: BDAG
  rationale: The compound intensifies exaltation. 'Highly exalt' is idiomatic English
    and preserves the heightened force found in the recurring refrain.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Refers back to the Lord; masculine singular pronoun rendered directly.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic doxological expression meaning enduring perpetually. 'Forever'
    is the clearest modern English equivalent, while more literal alternatives are
    less natural here.
