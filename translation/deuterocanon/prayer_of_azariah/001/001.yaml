id: PAZ.1.1
reference: Prayer of Azariah and Song of the Three 1:1
source:
  edition: lxx-swete-1909
  text: Οὕτως οὖν προσηύξατο Ἀνανίας καὶ Ἀζαρίας καὶ Μισαήλ, καὶ ὕμνησαν τῷ κυρίῳ,
    ὅτε αὐτοὺς ὁ βασιλεὺς προσέταξεν ἐμβληθῆναι εἰς τὴν κάμινον.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: So Hananiah and Azariah and Mishael prayed in this way, and they sang praise
    to the Lord when the king ordered that they be thrown into the furnace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has the Hebrew names Hananiah, Azariah, and Mishael here, not their
      Babylonian names Shadrach, Meshach, and Abednego.
    reason: cross_reference
  - marker: b
    text: Or 'be cast into the furnace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὕτως οὖν
  chosen: So ... in this way
  alternatives:
  - Therefore ... thus
  - Then ... in this way
  lexicon: LSJ
  rationale: Οὕτως marks manner ('thus/in this way'), while οὖν adds connective force
    ('therefore/so/then'). In smooth English, 'So ... in this way' preserves both
    the discourse connection and the manner reference without sounding wooden.
- source_word: προσηύξατο
  chosen: prayed
  alternatives:
  - offered prayer
  - prayed aloud
  lexicon: BDAG
  rationale: The aorist middle of προσεύχομαι straightforwardly means 'prayed.' No
    added nuance such as 'aloud' is warranted by the verb alone.
- source_word: Ἀνανίας καὶ Ἀζαρίας καὶ Μισαήλ
  chosen: Hananiah and Azariah and Mishael
  alternatives:
  - Ananias and Azarias and Misael
  - Hananiah, Azariah, and Mishael
  rationale: Following the project rule to transliterate personal names by standard
    conventions, the Hebrew-form familiar transliterations are preferred over more
    Greek-shaped forms. The conjunctions are retained in sense, though standard English
    punctuation smooths the list.
- source_word: ὕμνησαν
  chosen: sang praise
  alternatives:
  - hymned
  - sang a hymn
  - praised
  lexicon: BDAG
  rationale: ὑμνέω commonly denotes singing praise or a hymn. 'Sang praise' preserves
    the musical sense better than the flatter 'praised' and is more natural than 'hymned.'
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - to the master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this Jewish-scriptural context
    it refers to God, not a human master.
- source_word: ὅτε
  chosen: when
  alternatives:
  - at the time when
  - after
  lexicon: LSJ
  rationale: 'The conjunction is temporal: ''when.'' It does not require a stronger
    sequential sense such as ''after.'''
- source_word: προσέταξεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders
  lexicon: BDAG
  rationale: προστάσσω means to order or command. 'Ordered' is concise, natural English
    and fits the royal context.
- source_word: ἐμβληθῆναι
  chosen: be thrown
  alternatives:
  - be cast
  - be put
  lexicon: BDAG
  rationale: The passive infinitive of ἐμβάλλω here means 'to be thrown/cast into.'
    'Be thrown' is idiomatic modern English; 'be cast' is more traditional but less
    current.
- source_word: εἰς τὴν κάμινον
  chosen: into the furnace
  alternatives:
  - into the kiln
  - into the blazing furnace
  lexicon: LSJ
  rationale: κάμινος denotes a furnace or kiln. 'Furnace' best fits the Danielic setting.
    'Blazing' is not explicit in this Greek verse and would import detail from the
    broader narrative.
