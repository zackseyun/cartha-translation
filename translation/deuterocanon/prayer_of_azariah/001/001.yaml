theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The term refers to God in a prayer/praise context. The project's default
    for κύριος is 'Lord,' which preserves scriptural-theological usage without flattening
    it to a merely social title.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Form of the three youths' names
  chosen_reading: Hananiah and Azariah and Mishael
  alternative_readings:
  - Ananias and Azarias and Misael
  - Shadrach, Meshach, and Abednego
  rationale: The Greek text here gives the Hebrew names in Greek form, not the Babylonian
    court names. Using standard English transliterations of those Hebrew names best
    reflects the source while following the project's name policy.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
