id: PAZ.1.14
reference: Prayer of Azariah and Song of the Three 1:14
source:
  edition: lxx-swete-1909
  text: ὅτι, δέσποτα, ἐσμικρύνθημεν παρὰ πάντα τὰ ἔθνη, καί ἐσμεν ταπεινοὶ ἐν πάσῃ
    τῇ γῇ σήμερον διὰ τὰς ἁμαρτίας ἡμῶν·
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: For, Master, we have become smaller than all the nations, and today we are
    humbled in all the earth because of our sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we have been reduced below all the nations.' The Greek verb can express
      being made small or diminished in status.
    reason: lexical_alternative
  - marker: b
    text: Or 'in all the land.' Greek γῇ can mean either 'land' or 'earth'; the broader
      sense fits the comparison with the nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσποτα
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: δέσποτα is a vocative of δεσπότης, which more specifically denotes an
    owner or absolute master rather than the more common κύριος. 'Master' preserves
    the direct address and stronger nuance of authority better than 'Lord' here.
- source_word: ἐσμικρύνθημεν
  chosen: we have become smaller
  alternatives:
  - we have been reduced
  - we have become insignificant
  - we have been made few
  lexicon: LSJ
  rationale: The verb from σμικρύνω conveys being made small or reduced. 'We have
    become smaller' keeps the comparative sense tied to παρὰ πάντα τὰ ἔθνη, while
    still sounding natural in English. It points to diminished status rather than
    strictly population size.
- source_word: παρὰ πάντα τὰ ἔθνη
  chosen: than all the nations
  alternatives:
  - more than all the nations
  - before all the nations
  - among all the nations
  lexicon: LSJ
  rationale: With a comparative idea after ἐσμικρύνθημεν, παρά is best taken as 'than'
    rather than spatial 'before.' ἔθνη is rendered 'nations' in this deuterocanonical
    context, referring to peoples around Israel/Judah.
- source_word: ταπεινοὶ
  chosen: humbled
  alternatives:
  - lowly
  - brought low
  - humble
  lexicon: BDAG
  rationale: Although the adjective literally means 'lowly' or 'humble,' in context
    it describes a condition imposed by judgment and disgrace. 'Humbled' communicates
    that resultant state more idiomatically in English.
- source_word: ἐν πάσῃ τῇ γῇ
  chosen: in all the earth
  alternatives:
  - in all the land
  - throughout the whole earth
  lexicon: LSJ
  rationale: γῇ can mean 'land' or 'earth.' Because the comparison is with 'all the
    nations' and the prayer speaks broadly of Israel's public humiliation, 'all the
    earth' best preserves the wider scope. 'Land' could sound too local.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: BDAG
  rationale: A straightforward temporal adverb; 'today' is clear modern English without
    loss of solemnity.
- source_word: διὰ τὰς ἁμαρτίας ἡμῶν
  chosen: because of our sins
  alternatives:
  - on account of our sins
  - for our sins
  lexicon: BDAG
  rationale: διά with the accusative indicates cause. 'Because of our sins' is the
    clearest idiomatic rendering and preserves the confession of culpability.
