id: PAZ.1.13
reference: Prayer of Azariah and Song of the Three 1:13
source:
  edition: lxx-swete-1909
  text: ὡς ἐλάλησας πρὸς αὐτοὺς λέγων πολυπληθῦναι τὸ σπέρμα αὐτῶν ὡς τὰ ἄστρα τοῦ
    οὐρανοῦ τῷ πλήθει καὶ ὡς τὴν ἄμμον τὴν παρὰ τὸ χεῖλος τῆς θαλάσσης.
  language: Greek
  pages: []
  confidence: high
  note: This verse is being loaded from the normalized translation-ready override
    layer derived from the adjudicated corpus. Standalone PAZ extraction from the
    curated ADA stream, using Daniel 3:24-90 as the source span and renumbering it
    to PAZ 1:1-67.
translation:
  text: just as you spoke to them, saying that their offspring would be multiplied
    like the stars of heaven in number and like the sand by the shore of the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their offspring' or 'their descendants.' The Greek says 'their seed,'
      preserving the wording of the ancestral promise.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησας
  chosen: you spoke
  alternatives:
  - you said
  lexicon: BDAG
  rationale: A straightforward rendering of λαλέω in direct address to God. 'Spoke'
    preserves the solemn tone better than the simpler 'said' while remaining natural
    English.
- source_word: πρὸς αὐτοὺς
  chosen: to them
  alternatives:
  - with them
  lexicon: BDAG
  rationale: πρός with accusative here marks direction toward the addressees of the
    promise; 'to them' is the plain sense.
- source_word: λέγων
  chosen: saying
  alternatives:
  - when you said
  lexicon: BDAG
  rationale: The participle introduces the content of the speech. 'Saying' keeps the
    Greek structure without awkwardness.
- source_word: πολυπληθῦναι
  chosen: would be multiplied
  alternatives:
  - to be multiplied
  - would become very numerous
  lexicon: LSJ
  rationale: The infinitive expresses the promised result for the descendants. 'Would
    be multiplied' captures the future-promissory force in idiomatic English while
    staying close to the Greek.
- source_word: τὸ σπέρμα αὐτῶν
  chosen: their seed
  alternatives:
  - their offspring
  - their descendants
  lexicon: BDAG
  rationale: σπέρμα is literally 'seed' and is standard covenant language in biblical
    promise contexts. Although 'offspring' or 'descendants' is smoother, 'seed' preserves
    the intertextual resonance with the patriarchal promises.
- source_word: ὡς τὰ ἄστρα τοῦ οὐρανοῦ
  chosen: like the stars of heaven
  alternatives:
  - as the stars of the sky
  lexicon: BDAG
  rationale: A conventional biblical comparison. 'Heaven' reflects οὐρανός more directly
    than 'sky' and preserves scriptural register.
- source_word: τῷ πλήθει
  chosen: in number
  alternatives:
  - in multitude
  - for multitude
  lexicon: LSJ
  rationale: The dative specifies respect or measure. 'In number' is clear modern
    English and conveys the sense of numerical abundance.
- source_word: ὡς τὴν ἄμμον τὴν παρὰ τὸ χεῖλος τῆς θαλάσσης
  chosen: like the sand by the shore of the sea
  alternatives:
  - like the sand beside the edge of the sea
  - like the sand on the seashore
  lexicon: BDAG
  rationale: χείλος literally means 'lip' or 'edge'; in this idiom it refers to the
    shore. 'By the shore of the sea' stays close to the Greek while remaining readable.
    'On the seashore' is possible but slightly less transparent to the underlying
    wording.
