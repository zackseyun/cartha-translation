id: TOB.9.6
reference: Tobit 9:6
source:
  edition: lxx-swete-1909
  text: καὶ ὤρθρευσαν κοινῶς καὶ ἦλθοσαν εἰς τὸν γάμον, καὶ εὐλόγησεν Τωβείας τὴν
    γυναῖκα αὐτοῦ.
  language: Greek
  pages:
  - 832
  - 835
  - 850
  - 851
  - 852
  - 853
  - 854
  confidence: high
  validation: agree
translation:
  text: And they rose early together and came to the wedding, and Tobias blessed his
    wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the marriage feast.' The Greek γάμος can refer either to the marriage
      itself or to the wedding celebration.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤρθρευσαν
  chosen: rose early
  alternatives:
  - got up at dawn
  - set out early
  lexicon: LSJ
  rationale: The verb denotes being up early or at daybreak. 'Rose early' is natural
    English and preserves the temporal nuance without overinterpreting movement.
- source_word: κοινῶς
  chosen: together
  alternatives:
  - in company
  - jointly
  lexicon: LSJ
  rationale: Here the adverb modifies their early rising and likely their going, indicating
    shared action. 'Together' is idiomatic and clear.
- source_word: ἦλθοσαν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: LSJ
  rationale: The Greek literally says 'came.' In English, either 'came' or 'went'
    could fit depending on narrative viewpoint; 'came' stays closest to the source
    wording.
- source_word: γάμον
  chosen: the wedding
  alternatives:
  - the marriage feast
  - the marriage
  lexicon: LSJ
  rationale: γάμος can mean marriage or wedding feast. In this narrative setting of
    ongoing celebration, 'the wedding' is the broadest natural rendering without adding
    'feast' explicitly.
- source_word: εὐλόγησεν
  chosen: blessed
  alternatives:
  - spoke a blessing over
  - praised
  lexicon: LSJ
  rationale: The standard sense is 'blessed.' The object is 'his wife,' so the translation
    preserves the direct wording and leaves the precise form of blessing implicit,
    as in the Greek.
- source_word: Τωβείας
  chosen: Tobias
  alternatives:
  - Tobiah
  lexicon: Greek proper name tradition
  rationale: Standard English transliteration for the Greek form Τωβείας in Tobit
    is 'Tobias.'
- source_word: γυναῖκα αὐτοῦ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: LSJ
  rationale: In marital context γυνή plainly means 'wife,' not merely 'woman.'
