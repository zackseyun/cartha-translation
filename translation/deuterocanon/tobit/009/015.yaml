theological_decisions:
- issue: Textual form of the blessing phrase
  chosen_reading: 'Translate the extant short Greek wording as a simple enduring blessing:
    ''He blessed them all forever.'''
  alternative_readings:
  - A marginal reading adds 'with a pure and holy blessing'
  - Some witnesses also add 'and' before 'all' and 'all' before 'the ages'
  rationale: The Zone 1 text is extremely compressed and survives here with apparatus-style
    notes rather than a full continuous line. The base wording supports a minimal
    translation centered on blessing and enduring duration. Added descriptors such
    as 'pure and holy' are preserved in a footnote rather than imported into the main
    text, since they are not part of the base reading supplied.
  doctrine_reference: Preserve textual alternatives in footnotes rather than resolving
    them silently.
