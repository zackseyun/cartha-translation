id: TOB.9.15
reference: Tobit 9:15
source:
  edition: lxx-swete-1909
  text: ηυλογησεν A | ευλογια] + καθαρα και αγια Bab mgA | παντες] pr και A | τους
    αιωνας] pr παντας A
  language: Greek
  pages:
  - 852
  validation: no_reference
translation:
  text: He blessed them forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some marginal witnesses add, 'with a pure and holy blessing.'
    reason: textual_variant
lexical_decisions:
- source_word: ηυλογησεν
  chosen: He blessed
  alternatives:
  - he spoke a blessing
  - he praised
  lexicon: BDAG
  rationale: The aorist of εὐλογέω most naturally means 'blessed' in this narrative
    context. 'Praised' would normally take God as object and shifts the sense; 'spoke
    a blessing' is possible but less natural in English.
- source_word: παντες
  chosen: them all
  alternatives:
  - all
  - everyone
  lexicon: LSJ
  rationale: The transmitted reading includes πάντες ('all'), but English requires
    an object for the verb. Given the context of a blessing directed toward persons
    present, 'them all' makes the sense explicit without overtranslating.
- source_word: τους αιωνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: The idiom εἰς/τοὺς αἰῶνας in blessing language denotes enduring duration.
    'Forever' is idiomatic modern English; the more literal 'for the ages' is less
    natural and may sound opaque.
