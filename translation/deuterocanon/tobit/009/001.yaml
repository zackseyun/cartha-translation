  parallel_sources:
  - edition: neubauer-tobit-1878
    text: אז קרא טוביה אל רפאל ויאמר לו עזריה אחי קח עמך מזה ארבעה עבדים ושני גמלים
      ולך בא אל רגאיש אל גביאל דודי ותן לו את אמתחתו ויתן לך את הכסף וקרא אותו שיבוא
      לחופתי כי אני לא אוכל ללכת שם מפני השבועה שנשבע רעואל עלי שלא אצא מביתו עד ארבעה
      עשר ימים ואבי ואמי (י)ספרו את הימים ואם יעבר הזמן יום אחד אכאיב נפש אבותי.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
