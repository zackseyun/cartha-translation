      do not treat as Vorlage.
    reference: TOB 9:1
translation:
  text: And Tobiah called Raphael and said to him, “Azariah, brother,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Raphael is addressed here as 'Azariah,' the name under which he has been
      traveling with Tobiah.
    reason: cross_reference
  - marker: b
    text: The longer Semitic-aligned tradition continues immediately with Tobiah’s
      instructions to Azariah/Raphael; the Greek witness used here preserves only
      the opening address in this verse.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: The aorist of καλέω here introduces direct speech and is naturally rendered
    'called.' 'Summoned' is possible, especially since the parallel Semitic tradition
    continues with instructions, but the Greek wording itself does not require the
    stronger nuance.
- source_word: Τωβίας
  chosen: Tobiah
  alternatives:
  - Tobias
  rationale: Personal names are transliterated by standard conventions. 'Tobiah' better
    reflects the Semitic form and aligns with the project's preference for source-oriented
    naming over traditional Latinate forms.
- source_word: Ῥαφαήλ
  chosen: Raphael
  rationale: Standard transliteration of the personal name.
- source_word: Ἀζαρία
  chosen: Azariah
  rationale: Although Tobiah is speaking to Raphael, he addresses him by the assumed
    name 'Azariah' in the narrative. The Greek preserves this directly, and the Semitic
    parallel confirms the same naming pattern.
- source_word: ἀδελφέ
  chosen: brother
  alternatives:
  - brother of mine
  - friend
  lexicon: BDAG
  rationale: Vocative ἀδελφέ is literally 'brother.' In this context it may function
    as a warm form of address rather than a biological claim, but the source wording
    should be preserved. 'Friend' would over-interpret; 'brother of mine' is possible
    but less natural in English here.
