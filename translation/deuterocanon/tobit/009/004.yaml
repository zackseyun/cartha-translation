id: TOB.9.4
reference: Tobit 9:4
source:
  edition: lxx-swete-1909
  text: καὶ ὁ πατήρ μου ἀριθμεῖ τὰς ἡμέρας, καὶ ἐὰν χρονίσω μέγα, ὀδυνηθήσεται λίαν.
  language: Greek
  pages:
  - 832
  - 835
  - 850
  - 851
  - 852
  - 853
  - 854
  confidence: high
  validation: agree
translation:
  text: And my father is counting the days, and if I delay long, he will be greatly
    distressed.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀριθμεῖ
  chosen: is counting
  alternatives:
  - counts
  - is numbering
  lexicon: BDAG
  rationale: 'The present tense conveys ongoing action: the father is actively keeping
    track of the days while waiting. ''Is counting'' preserves that durative sense
    more naturally than a simple English present.'
- source_word: τὰς ἡμέρας
  chosen: the days
  alternatives:
  - days
  lexicon: BDAG
  rationale: A direct rendering of the accusative object. In English idiom, 'counting
    the days' naturally communicates anxious waiting without adding meaning beyond
    the Greek.
- source_word: χρονίσω
  chosen: I delay long
  alternatives:
  - I am delayed a long time
  - I tarry long
  - I take too long
  lexicon: BDAG
  rationale: The aorist subjunctive after ἐὰν expresses a future contingency. 'I delay
    long' keeps the first-person perspective and avoids implying an external cause
    ('am delayed') not stated in the Greek.
- source_word: μέγα
  chosen: long
  alternatives:
  - greatly
  - for a long time
  - too much
  lexicon: LSJ
  rationale: Here μέγα functions adverbially with χρονίσω, intensifying the delay.
    In idiomatic English, 'delay long' or 'for a long time' best captures the sense;
    'long' is concise and natural.
- source_word: ὀδυνηθήσεται
  chosen: he will be greatly distressed
  alternatives:
  - he will be grieved
  - he will be in anguish
  - he will be pained
  lexicon: BDAG
  rationale: The future passive/middle form denotes strong emotional pain or distress.
    'Greatly distressed' communicates serious anxiety and grief in accessible modern
    English.
- source_word: λίαν
  chosen: greatly
  alternatives:
  - very
  - exceedingly
  lexicon: BDAG
  rationale: λίαν intensifies the father's distress. 'Greatly' pairs well with 'distressed'
    and preserves the force without sounding archaic.
