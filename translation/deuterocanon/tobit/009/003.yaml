id: TOB.9.3
reference: Tobit 9:3
source:
  edition: lxx-swete-1909
  text: διότι ὠμόμοκεν ὁ Ῥαγουὴλ μὴ ἐξελθεῖν με·
  language: Greek
  pages:
  - 832
  - 835
  - 850
  - 851
  - 852
  - 853
  - 854
  confidence: high
  validation: minor_mismatch
translation:
  text: For Raguel has sworn not to let me leave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'For Raguel has sworn that I should not go out.' The
      Greek uses 'go out,' but in context it refers to departing from Raguel's house.
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  chosen: For
  alternatives:
  - because
  lexicon: LSJ
  rationale: Introduces the reason for the preceding statement. 'For' fits natural
    English narrative linkage while preserving the causal force.
- source_word: ὠμόμοκεν
  chosen: has sworn
  alternatives:
  - swore
  - has taken an oath
  lexicon: LSJ
  rationale: Perfect tense of ὄμνυμι. 'Has sworn' preserves the completed action with
    present relevance better than simple past, and is more idiomatic than 'has taken
    an oath.'
- source_word: ὁ Ῥαγουὴλ
  chosen: Raguel
  alternatives:
  - Ragouel
  rationale: Personal name is transliterated by standard English convention. 'Raguel'
    is the established and readable transliteration of Ῥαγουήλ.
- source_word: μὴ ἐξελθεῖν με
  chosen: not to let me leave
  alternatives:
  - that I should not go out
  - not to allow me to depart
  lexicon: LSJ
  rationale: The construction expresses the content/effect of the oath with first-person
    object. 'Leave' is natural modern English for ἐξέρχομαι in this travel context;
    'let me leave' makes explicit the implied control Raguel exercises over Tobias's
    departure.
