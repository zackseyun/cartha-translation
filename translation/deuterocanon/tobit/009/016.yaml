      brief.'
    reason: textual_variant
lexical_decisions:
- source_word: ηυφρανας / ευφρανας
  chosen: you made glad
  alternatives:
  - you gladdened
  - you rejoiced
  - you brought joy
  lexicon: LSJ
  rationale: The form is an aorist active second-person singular from εὐφραίνω, meaning
    to gladden or make joyful. 'You made glad' preserves the causative force better
    than the intransitive 'you rejoiced.'
- source_word: ηυφρανας
  chosen: you made glad
  alternatives:
  - you gladdened
  lexicon: BDAG
  rationale: Swete's line gives only this verb, with orthographic variation ηυφρανας
    / ευφρανας across witnesses. The translation should reflect the verbal action
    alone without supplying an unstated object.
