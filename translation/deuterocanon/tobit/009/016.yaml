translation:
  text: you made glad
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek witness is fragmentary here in the provided source, preserving only
      the verb ''you made glad'' (orthographic variant: ευφρανας). No object is expressed
