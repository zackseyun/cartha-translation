id: TOB.9.5
reference: Tobit 9:5
source:
  edition: lxx-swete-1909
  text: καὶ ἐπορεύθη Ῥαφαὴλ, καὶ ηὐλίσθη παρὰ Γαβαήλ, καὶ ἔδωκεν αὐτῷ τὸ χειρόγραφον·
    ὃς δὲ προήνεγκεν τὰ θυλάκια ἐν ταῖς σφραγῖσιν καὶ ἔδωκεν αὐτῷ.
  language: Greek
  pages:
  - 832
  - 835
  - 850
  - 851
  - 852
  - 853
  - 854
  confidence: high
  validation: agree
translation:
  text: So Raphael went and lodged with Gabael, and he gave him the written note;
    then Gabael brought out the money bags with the seals and gave them to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bond' or 'the promissory note.' The Greek χειρόγραφον can denote
      a written document acknowledging a financial claim.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the bags in the seals,' that is, the money bags with their seals
      still intact.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθη
  chosen: went
  alternatives:
  - traveled
  - set out
  lexicon: BDAG
  rationale: A straightforward narrative aorist of πορεύομαι. 'Went' is natural modern
    English and sufficiently formal for the simple movement described.
- source_word: ηὐλίσθη
  chosen: lodged
  alternatives:
  - stayed
  - spent the night
  lexicon: LSJ
  rationale: The verb αὐλίζομαι commonly means to lodge or spend the night. 'Lodged'
    preserves the travel-context nuance without overexpanding the text.
- source_word: παρὰ Γαβαήλ
  chosen: with Gabael
  alternatives:
  - at Gabael's house
  - beside Gabael
  lexicon: BDAG
  rationale: παρά with a person here indicates staying with or at the place of that
    person. 'With Gabael' is concise and idiomatic while preserving the personal reference.
- source_word: τὸ χειρόγραφον
  chosen: the written note
  alternatives:
  - the handwritten document
  - the bond
  - the promissory note
  lexicon: BDAG
  rationale: χειρόγραφον denotes a written document, often specifically a note of
    indebtedness or certificate. In Tobit's narrative context it is the written record
    connected to the deposited money. 'Written note' is clear and avoids importing
    a more technical financial term than the immediate context requires.
- source_word: προήνεγκεν
  chosen: brought out
  alternatives:
  - produced
  - brought forth
  lexicon: BDAG
  rationale: The verb indicates bringing something forward/out in response to the
    note. 'Brought out' fits the concrete action in readable English.
- source_word: τὰ θυλάκια
  chosen: the money bags
  alternatives:
  - the bags
  - the purses
  - the pouches
  lexicon: LSJ
  rationale: θυλάκιον is a small bag or pouch. Because the context is retrieval of
    deposited funds, 'money bags' makes explicit the function already implied by the
    narrative and avoids an overly vague 'bags'.
- source_word: ἐν ταῖς σφραγῖσιν
  chosen: with their seals
  alternatives:
  - still sealed
  - under seal
  - in the seals
  lexicon: BDAG
  rationale: The phrase literally refers to the bags in/with the seals, indicating
    that they remained sealed. 'With their seals' preserves the concrete image without
    awkward literalism.
- source_word: ἔδωκεν αὐτῷ
  chosen: gave them to him
  alternatives:
  - handed them over to him
  lexicon: BDAG
  rationale: The final singular object in Greek is understood from context as the
    money bags. English requires the object to be made explicit for clarity.
