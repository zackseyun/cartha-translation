  validation: no_reference
translation:
  text: health.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness supplied for this verse is fragmentary in the source data
      and appears to preserve only the word for 'health' (with a minor manuscript
      spelling variant) plus a prepositional variant. The translation therefore reflects
      the surviving wording only, not a reconstructed full sentence.
    reason: textual_variant
lexical_decisions:
- source_word: υγιεια / υγια
  chosen: health
  alternatives:
  - good health
  - well-being
  - safe and sound
  lexicon: LSJ
  rationale: The surviving Zone 1 text for this verse is fragmentary and appears to
    preserve only the noun/adjectival form meaning 'health' or 'soundness.' 'Health'
    is the most direct and least interpretively expanded English rendering. 'Good
    health' is possible but adds an evaluative adjective not clearly required if the
    reading is the noun ὑγίεια; 'safe and sound' would be more idiomatic but less
    formally anchored.
- source_word: μετα / μετ
  chosen: with
  alternatives:
  - among
  - after
  lexicon: LSJ
  rationale: The apparatus note shows a variant spelling of the preposition, but without
    broader context it most naturally means 'with.' Because the extant Zone 1 line
    is too truncated to support a fuller clause translation, this decision is documented
    but not expressed in the final English text.
