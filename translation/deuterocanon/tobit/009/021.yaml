translation:
  text: And Tobit his father was counting every day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek source on this page is textually crowded and appears to contain
      duplicated material from the surrounding context. This clause is a clear unit
      and is translated directly; later clauses in the page reflect overlapping recensional
      material.
    reason: textual_variant
lexical_decisions:
- source_word: ἐλογίζετο
  chosen: was counting
  alternatives:
  - was reckoning
  - was considering
  - was calculating
  lexicon: LSJ
  rationale: The imperfect middle indicates ongoing repeated action. In context Tobit
    is counting off the days of his son's journey, so 'was counting' is the clearest
    natural English rendering.
- source_word: ἑκάστης ἡμέρας
  chosen: each day
  alternatives:
  - every day
  - day by day
  lexicon: LSJ
  rationale: This phrase expresses daily repetition. 'Each day' is concise and preserves
    the distributive sense.
- source_word: Τωβεὶθ ὁ πατὴρ αὐτοῦ
  chosen: Tobit his father
  alternatives:
  - Tobit, his father
  - his father Tobit
  lexicon: LSJ
  rationale: The Greek names Tobit and appositionally identifies him as 'his father.'
    English smooths this slightly while preserving the relationship.
