translation:
  text: Take with you a servant and two camels, and go to Rages of Media, to Gabael,
    and bring me the money, and bring him with you to the wedding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'silver'; here it refers to the money entrusted to Gabael.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the wedding feast.' The Greek term can refer either to the marriage
      itself or to the celebratory banquet.
    reason: lexical_alternative
  - marker: c
    text: The parallel Semitic tradition expands the instruction with additional attendants
      and details about Gabael's house, but the Greek source used here is shorter.
    reason: alternative_reading
lexical_decisions:
- source_word: λάβε μετὰ σεαυτοῦ
  chosen: Take with yourself
  alternatives:
  - Take with you
  lexicon: LSJ
  rationale: The idiom literally includes 'with yourself.' In English, 'take with
    you' is more natural, but 'with yourself' preserves the personal involvement and
    remains understandable. The phrase introduces the attendant and camels as companions
    for the journey.
- source_word: παῖδα
  chosen: servant
  alternatives:
  - boy
  - young man
  - slave
  lexicon: LSJ
  rationale: παῖς can mean child, boy, or servant/attendant depending on context.
    Here the travel context and the parallel Semitic tradition's mention of attendants
    support 'servant' or 'attendant' rather than 'boy.' 'Slave' is possible in some
    contexts, but the verse does not emphasize bonded status; 'servant' best fits
    optimal equivalence.
- source_word: δύο καμήλους
  chosen: two camels
  lexicon: LSJ
  rationale: Straightforward numeral plus noun; retained formally.
- source_word: πορεύθητι
  chosen: go
  alternatives:
  - travel
  - set out
  lexicon: LSJ
  rationale: A simple imperative of movement. 'Go' is the clearest modern English
    rendering; 'travel' or 'set out' are possible but less direct.
- source_word: ἐν Ῥάγοις τῆς Μηδείας
  chosen: to Rages of Media
  alternatives:
  - into Rages of Media
  - in Rages of Media
  lexicon: LSJ
  rationale: 'Although ἐν can suggest location, with a verb of motion and the following
    παρὰ Γαβαήλ the sense is destination: he is to go to Rages in Media. ''Rages of
    Media'' preserves the place name and regional designation.'
- source_word: παρὰ Γαβαήλ
  chosen: to Gabael
  alternatives:
  - to the house of Gabael
  - beside Gabael
  - with Gabael
  lexicon: LSJ
  rationale: παρά with a personal object in this context indicates going to someone
    / to their place. The Hebrew back-translation expands this to 'to the house of
    Gabael,' which clarifies but exceeds the Greek wording. 'To Gabael' keeps the
    Greek concise while conveying the destination.
- source_word: κόμισαί μοι τὸ ἀργύριον
  chosen: bring me the money
  alternatives:
  - recover the money for me
  - bring me the silver
  lexicon: LSJ
  rationale: ἀργύριον literally means 'silver' and often by extension 'money.' Since
    the sense is retrieval of deposited funds, 'money' is the most natural English.
    κόμισαι here means to bring back or recover and deliver; 'bring me the money'
    captures the practical sense.
- source_word: καὶ αὐτὸν ἄγε μοι
  chosen: and bring him with you to me
  alternatives:
  - and lead him to me
  - and bring him to me
  lexicon: LSJ
  rationale: ἄγε is an imperative of leading/bringing. The pronoun αὐτόν refers to
    Gabael. Because the next phrase specifies the destination 'to the wedding,' the
    English smooths the sequence as bringing him along to Tobit's family celebration.
    'Bring him with you' captures the personal accompaniment implied.
- source_word: εἰς τὸν γάμον
  chosen: to the wedding
  alternatives:
  - to the marriage feast
  - to the wedding feast
  lexicon: LSJ
  rationale: γάμος can denote marriage or wedding feast. In this narrative setting,
    an invitation to the celebration is intended. 'Wedding' is concise and natural;
    'wedding feast' is a viable fuller alternative.
