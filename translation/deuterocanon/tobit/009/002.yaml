  text: λάβε μετὰ σεαυτοῦ παῖδα καὶ δύο καμήλους, καὶ πορεύθητι ἐν Ῥάγοις τῆς Μηδείας
    παρὰ Γαβαήλ, καὶ κόμισαί μοι τὸ ἀργύριον καὶ αὐτὸν ἄγε μοι εἰς τὸν γάμον.
  language: Greek
  pages:
