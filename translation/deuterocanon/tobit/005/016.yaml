translation:
  text: And I will add more to your wages, if you return in good health.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'if you return being healthy.' The Greek emphasizes bodily well-being
      on the journey.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι
  chosen: more
  alternatives:
  - still
  - yet
  - further
  lexicon: LSJ
  rationale: In the phrase ἔτι προσθήσω, the adverb intensifies the promise of additional
    payment. 'More' gives natural English with the sense of something added beyond
    the stated wage.
- source_word: προσθήσω
  chosen: I will add
  alternatives:
  - I will increase
  - I will give additionally
  lexicon: LSJ
  rationale: Future of προστίθημι, here governing ἐπὶ τὸν μισθόν. 'I will add' is
    the most direct and idiomatic rendering.
- source_word: ἐπὶ τὸν μισθόν
  chosen: to your wages
  alternatives:
  - to the wage
  - on top of the pay
  - to your pay
  lexicon: LSJ
  rationale: The preposition with accusative here expresses addition to an agreed
    payment. Rendering μισθός as 'wages' fits the employment context and the possessive
    'your' is natural in English though implicit from σοι and context.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - provided that
  - whenever
  lexicon: LSJ
  rationale: Introduces a straightforward conditional clause dependent on the future
    promise.
- source_word: ὑγιαίνοντες
  chosen: in good health
  alternatives:
  - safe and sound
  - healthy
  - well
  lexicon: LSJ
  rationale: The participle literally means 'being healthy/sound.' In English, with
    ἐπιστρέψητε, 'return in good health' preserves the health/safety nuance without
    over-paraphrasing.
- source_word: ἐπιστρέψητε
  chosen: you return
  alternatives:
  - you come back
  - you turn back
  lexicon: LSJ
  rationale: In travel context the verb means returning from a journey. 'You return'
    is clear and suitably direct.
