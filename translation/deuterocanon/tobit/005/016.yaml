id: TOB.5.16
reference: Tobit 5:16
source:
  edition: lxx-swete-1909
  text: καὶ ἔτι προσθήσω σοι ἐπὶ τὸν μισθόν, ἐὰν ὑγιαίνοντες ἐπιστρέψητε.
  language: Greek
  pages:
  - 832
  - 835
  - 840
  - 841
  - 842
  - 843
  - 844
