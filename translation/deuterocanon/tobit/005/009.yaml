translation:
  text: And he went in and said to his father, “Look, I have found someone who will
    travel with me.” And he said, “Call him to me, so that I may learn what tribe
    he is from, and whether he is trustworthy to go with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “one who will accompany me.”
    reason: lexical_alternative
  - marker: b
    text: “What tribe he is from” reflects the Greek concern for Israelite tribal
      identity.
    reason: cultural_note
  - marker: c
    text: Or “whether he is reliable/faithful to go with you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθὼν
  chosen: after he went in
  alternatives:
  - when he entered
  - having entered
  lexicon: LSJ
  rationale: Aorist participle indicating prior action before the main verb. 'After
    he went in' gives clear English sequence without sounding overly wooden.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: LSJ
  rationale: Deictic particle drawing attention. 'Look' is natural modern English
    and preserves the immediacy better than archaic 'Behold.'
- source_word: εὕρηκα
  chosen: I have found
  alternatives:
  - I found
  lexicon: LSJ
  rationale: 'Perfect tense suggests a present result: he has now found such a person.
    English present perfect reflects this well.'
- source_word: ὃς συμπορεύσεταί μοι
  chosen: someone who will travel with me
  alternatives:
  - one who will go with me
  - someone who will accompany me
  lexicon: LSJ
  rationale: The relative clause identifies a companion for the journey. 'Travel with
    me' is idiomatic and fits the journey context; 'accompany' was possible but slightly
    more formal.
- source_word: Φώνησον αὐτὸν πρὸς μέ
  chosen: Call him to me
  alternatives:
  - Summon him to me
  - Bring him to me
  lexicon: LSJ
  rationale: Imperative of calling/summoning. 'Call him to me' stays close to the
    Greek and sounds natural.
- source_word: ἐπιγνῶ
  chosen: I may learn
  alternatives:
  - I may know fully
  - I may find out
  lexicon: LSJ
  rationale: The verb can imply fuller or definite knowledge. Here the father wants
    to ascertain the man's identity. 'Learn' is concise and natural; 'find out' was
    possible but slightly more colloquial.
- source_word: ποίας φυλῆς ἐστίν
  chosen: what tribe he is from
  alternatives:
  - of what tribe he is
  - what family line he belongs to
  lexicon: LSJ
  rationale: φυλή ordinarily means 'tribe.' In Tobit's Israelite setting, tribal identity
    is the plain sense and should be preserved rather than generalized to 'family
    line.'
- source_word: πιστὸς
  chosen: trustworthy
  alternatives:
  - reliable
  - faithful
  lexicon: LSJ
  rationale: In this context the concern is whether the prospective companion can
    be relied on for the journey. 'Trustworthy' captures character and practical reliability
    without importing heavier covenantal overtones of 'faithful.'
- source_word: τοῦ πορευθῆναι μετὰ σοῦ
  chosen: to go with you
  alternatives:
  - for traveling with you
  - to travel with you
  lexicon: LSJ
  rationale: Articular infinitive expressing respect in which he must be trustworthy.
    'To go with you' is a close, readable rendering; the main clause already uses
    'travel,' so slight variation avoids awkward repetition.
