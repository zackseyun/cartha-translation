theological_decisions:
- issue: Social identity term φυλή
  chosen_reading: tribe
  alternative_readings:
  - family line
  - clan
  rationale: The Greek explicitly uses φυλή, and in Tobit's Israelite context this
    most naturally refers to tribal affiliation. Rendering it more generically would
    flatten an important ancestral-identity concern in the narrative.
  doctrine_reference: Translation philosophy §1, §5
- issue: Character assessment term πιστός
  chosen_reading: trustworthy
  alternative_readings:
  - faithful
  - reliable
  rationale: The verse concerns whether the guide can be depended on for a journey,
    not a doctrinal statement about faith. 'Trustworthy' best fits the immediate context
    while preserving the moral dimension.
  doctrine_reference: Translation philosophy §6
