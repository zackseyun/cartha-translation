id: TOB.5.13
reference: Tobit 5:13
source:
  edition: lxx-swete-1909
  text: ἐπιγνῶναι τὸ γένος σου καὶ τὸ ὄνομα. ὃς δὲ εἶπεν Ἐγὼ Ἀζαρίας Ἀνανίου τοῦ μεγάλου,
    τῶν ἀδελφῶν σου.
  language: Greek
  pages:
  - 832
  - 835
  - 840
  - 841
  - 842
  - 843
  - 844
  - 845
  - 846
  - 847
  confidence: high
  validation: minor_mismatch
translation:
  text: to learn your family line and your name. But he said, “I am Azarias, son of
    the great Ananias, of your brothers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among your kinsmen' / 'of your relatives'; Greek 'of your brothers'
      can function as a broader kinship term in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνῶναι
  chosen: to learn
  alternatives:
  - to know
  - to recognize
  - to ascertain
  lexicon: BDAG
  rationale: The infinitive continues the prior speaker’s desire to obtain identifying
    information. 'To learn' gives natural English for acquiring knowledge, while still
    reflecting the cognitive force of the verb.
- source_word: γένος
  chosen: family line
  alternatives:
  - kindred
  - clan
  - family
  - stock
  lexicon: LSJ
  rationale: In this context the word refers to lineage or kin-group rather than 'race'
    or abstract 'kind.' 'Family line' is clear modern English and preserves the genealogical
    sense.
- source_word: ὄνομα
  chosen: name
  lexicon: LSJ
  rationale: Straightforward identification term; no contextual pressure for expansion.
- source_word: Ἐγὼ Ἀζαρίας
  chosen: I am Azarias
  alternatives:
  - I am Azariah
  rationale: Personal names are transliterated. 'Azarias' follows the Greek form of
    the name in the source text rather than normalizing it to the more Hebraic 'Azariah.'
- source_word: Ἀνανίου
  chosen: Ananias
  alternatives:
  - Ananiah
  rationale: The genitive identifies Azarias by patronymic. 'Ananias' reflects the
    Greek name form attested here.
- source_word: τοῦ μεγάλου
  chosen: the great
  alternatives:
  - the elder
  - the distinguished
  lexicon: LSJ
  rationale: The adjective literally means 'great.' Although it may function honorifically,
    the source does not require the interpretive rendering 'elder,' so the more transparent
    wording is retained.
- source_word: τῶν ἀδελφῶν σου
  chosen: one of your brothers
  alternatives:
  - of your brothers
  - from among your kinsmen
  lexicon: BDAG
  rationale: The phrase is partitive and refers to kinship within Tobit's people/family
    network. Because English idiom normally supplies the implied singular member,
    'one of your brothers' makes the sense explicit without overparaphrasing. 'Brothers'
    is retained as gender-accurate to the Greek form and kinship idiom.
