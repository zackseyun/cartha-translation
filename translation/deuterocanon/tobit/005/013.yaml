theological_decisions:
- issue: Kinship term ἀδελφῶν in a broader familial/ethnic sense
  chosen_reading: brothers
  alternative_readings:
  - kinsmen
  - relatives
  rationale: Per project philosophy, gender-accurate language is preferred where the
    Greek is masculine. In Tobit, 'brothers' can denote fellow Israelites or close
    kin; here the immediate context of genealogy supports a kinship sense, but the
    Greek term itself is preserved in the main text and a broader alternative is noted.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
