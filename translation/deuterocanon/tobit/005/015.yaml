id: TOB.5.15
reference: Tobit 5:15
source:
  edition: lxx-swete-1909
  text: ἀλλʼ εἰπόν μοι τίνα σοὶ ἔσομαι μισθὸν διδόναι; δραχμὴν τῆς ἡμέρας καὶ τὰ δέοντά
    σοι ὡς καὶ τῷ υἱῷ μου;
  language: Greek
  pages:
  - 832
  - 835
  - 840
  - 841
  - 842
  - 843
  - 844
  - 845
  - 846
  - 847
  confidence: high
  validation: agree
translation:
  text: But tell me, what wages shall I give you? A drachma a day, and what you need,
    as for my own son?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what shall I pay you?' The Greek asks directly what compensation Tobit
      should give.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισθὸν
  chosen: wages
  alternatives:
  - pay
  - hire
  lexicon: BDAG
  rationale: μισθός denotes payment for work or service. 'Wages' best fits the employment
    context and sounds natural in modern English.
- source_word: δραχμὴν τῆς ἡμέρας
  chosen: A drachma a day
  alternatives:
  - one drachma per day
  - a day's drachma
  lexicon: LSJ
  rationale: 'The genitive construction expresses rate or time: payment reckoned by
    the day. ''A drachma a day'' is concise and idiomatic while preserving the ancient
    monetary term rather than flattening it into a modern equivalent.'
- source_word: τὰ δέοντά σοι
  chosen: your necessities
  alternatives:
  - what you need
  - your provisions
  - your expenses
  lexicon: LSJ
  rationale: The phrase refers to what is necessary or needed for the journey/living.
    'Your necessities' preserves the concrete sense of needed provisions or expenses
    without over-specifying beyond the Greek.
- source_word: ὡς καὶ τῷ υἱῷ μου
  chosen: as for my own son
  alternatives:
  - as also for my son
  - just as for my son
  lexicon: LSJ
  rationale: 'ὡς καί marks comparison: Tobit promises to provide for him in the same
    way he would for his son. ''My own son'' brings out the familial comparison naturally
    in English.'
- source_word: τίνα σοὶ ἔσομαι ... διδόναι
  chosen: what wages shall I give you
  alternatives:
  - what shall I pay you
  - what wage am I to give you
  lexicon: BDAG
  rationale: The future of εἰμί with infinitive διδόναι functions idiomatically for
    intended action. 'What wages shall I give you' preserves the directness of the
    Greek while remaining readable.
