translation:
  text: And he said to him, “Are you looking for a tribe and a family line, or a hired
    man who will go with your son?” And Tobit said to him, “I want to know, brother,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek is slightly elliptical at the end: literally, ''I want, brother.''
      The translation supplies ''to know'' from the preceding question to make the
      sense explicit.'
    reason: lexical_alternative
  - marker: b
    text: The wording 'tribe and family line' reflects social and genealogical identity,
      not necessarily two sharply distinct categories in modern terms.
    reason: cultural_note
  - marker: c
    text: The source text for this verse shows a minor mismatch in transcription confidence,
      but the overall sense is clear.
    reason: textual_variant
lexical_decisions:
- source_word: Φυλήν
  chosen: tribe
  alternatives:
  - clan
  lexicon: LSJ
  rationale: φυλή commonly denotes a tribe or tribal grouping. 'Tribe' preserves the
    social-kinship sense more directly than the broader 'clan.'
- source_word: πατριὰν
  chosen: family line
  alternatives:
  - kindred
  - ancestry
  - family
  lexicon: LSJ
  rationale: πατριά refers to lineage or family descent. 'Family line' communicates
    genealogical identity in natural English and fits the paired question with 'tribe.'
- source_word: μίσθιον
  chosen: a hired man
  alternatives:
  - hireling
  - a wage-worker
  lexicon: LSJ
  rationale: The term denotes someone hired for pay. 'Hired man' is idiomatic modern
    English; 'hireling' is possible but more archaic and often pejorative beyond what
    the context requires.
- source_word: συμπορεύσεται
  chosen: will go with
  alternatives:
  - will travel with
  - will accompany
  lexicon: LSJ
  rationale: The verb means to go along with or accompany. 'Will go with' is simple
    and direct; 'accompany' is slightly more formal but not necessary here.
- source_word: Βούλομαι
  chosen: I want to know
  alternatives:
  - I wish
  - I desire
  lexicon: LSJ
  rationale: Given the immediate context, Tobit's reply is elliptical in Greek. Rendering
    βούλομαι as 'I want to know' supplies the implied object from the preceding question
    and yields coherent English without over-paraphrasing.
- source_word: ἀδελφέ
  chosen: brother
  alternatives:
  - friend
  lexicon: LSJ
  rationale: Literally 'brother'; in context it functions as a courteous form of address.
    The literal rendering is retained for transparency, while readers can infer the
    polite sense from context.
