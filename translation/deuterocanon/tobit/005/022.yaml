id: TOB.5.22
reference: Tobit 5:22
source:
  edition: lxx-swete-1909
  text: ἄγγελος γὰρ ἀγαθὸς συνπορεύσεται αὐτῷ, καὶ εὐοδωθήσεται ἡ ὁδὸς αὐτοῦ, καὶ
    ὑποστρέψει ὑγιαίνων.
  language: Greek
  pages:
  - 832
  - 835
  - 840
  - 841
  - 842
  - 843
  - 844
  - 845
  - 846
  - 847
  confidence: high
  validation: agree
translation:
  text: For a good angel will go with him, and his journey will be successful, and
    he will return in good health.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Tobit the referent is a heavenly being, not merely a human courier,
    so 'angel' best matches the narrative context and ordinary sense here.
- source_word: ἀγαθὸς
  chosen: good
  alternatives:
  - kind
  - beneficent
  lexicon: BDAG
  rationale: The adjective straightforwardly qualifies the angel's character or beneficent
    role. 'Good' preserves the simple Greek without overinterpreting.
- source_word: συνπορεύσεται
  chosen: will go with
  alternatives:
  - will accompany
  - will travel together with
  lexicon: BDAG
  rationale: The compound verb means to go along with someone. 'Will go with' is natural
    modern English and keeps the motion sense more directly than the slightly more
    abstract 'accompany.'
- source_word: εὐοδωθήσεται
  chosen: will be successful
  alternatives:
  - will prosper
  - will go well
  lexicon: BDAG
  rationale: The passive here describes the journey as being made prosperous or successful.
    'Will be successful' reads naturally in English while preserving the favorable-outcome
    sense.
- source_word: ἡ ὁδὸς αὐτοῦ
  chosen: his journey
  alternatives:
  - his way
  - his road
  lexicon: BDAG
  rationale: Although literally 'his way/road,' in travel context it refers to the
    course of his trip. 'His journey' communicates the intended sense in idiomatic
    English.
- source_word: ὑποστρέψει
  chosen: he will return
  alternatives:
  - he will come back
  lexicon: BDAG
  rationale: The verb commonly means to return. 'He will return' is a clear and suitably
    formal rendering.
- source_word: ὑγιαίνων
  chosen: in good health
  alternatives:
  - safe and sound
  - healthy
  - well
  lexicon: BDAG
  rationale: The participle means being healthy or sound. 'In good health' preserves
    the health emphasis more precisely than the idiomatic but broader 'safe and sound.'
