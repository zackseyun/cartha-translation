translation:
  text: And he said to him, “Go, and do not delay.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Go, and do not delay.'' The Semitic parallel material for this
      section is fuller in surrounding verses, but this command itself is straightforward
      and does not materially alter the translation here.'
    reason: cross_reference
lexical_decisions:
- source_word: Πορεύου
  chosen: Go
  alternatives:
  - Be on your way
  - Set out
  - Proceed
  lexicon: BDAG
  rationale: Aorist/middle imperative of πορεύομαι functioning as a straightforward
    command to depart. 'Go' is the most natural modern English equivalent and fits
    the brevity of the Greek without adding nuance not explicit in the text.
- source_word: μὴ χρονίσῃς
  chosen: do not delay
  alternatives:
  - do not linger
  - do not tarry
  - do not be long
  lexicon: BDAG
  rationale: From χρονίζω, 'to spend time, delay, tarry.' 'Do not delay' is clear
    modern English and preserves the prohibition against lingering. More archaic options
    like 'tarry' are avoided per style guidance.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  lexicon: BDAG
  rationale: The conjunction simply links the command clauses. Rendering it as 'and'
    preserves the Greek coordination without imposing a stronger temporal sense.
- source_word: εἶπεν αὐτῷ
  chosen: he said to him
  alternatives:
  - he told him
  lexicon: BDAG
  rationale: Standard narrative formula. 'Said to him' stays closer to the Greek than
    'told him.' The subject remains implicit in English as in the Greek context.
