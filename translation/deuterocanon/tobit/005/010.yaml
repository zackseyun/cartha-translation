translation:
  text: And he called him, and he went in, and they greeted one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek text here is brief: ''And he called him; and he went in; and
      they greeted one another.'' A longer Semitic-form tradition of Tobit preserves
      fuller dialogue in this part of the story, but the main text follows the extant
      Greek witness used for this translation.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  - invited
  lexicon: BDAG
  rationale: The aorist of καλέω most naturally means 'called' here. 'Summoned' is
    too formal and forceful for this domestic scene, while 'invited' over-specifies
    the purpose. The parallel Semitic witness also supports a straightforward calling/speaking
    action.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: A simple masculine singular object pronoun. The immediate context identifies
    the referent; English likewise uses 'him' without expansion.
- source_word: εἰσῆλθεν
  chosen: went in
  alternatives:
  - entered
  - came in
  lexicon: BDAG
  rationale: The verb means 'entered/went in.' 'Went in' is idiomatic modern English
    and preserves the motion implied by the Greek. 'Entered' is possible but slightly
    stiffer.
- source_word: ἠσπάσαντο
  chosen: greeted
  alternatives:
  - embraced
  - exchanged greetings
  lexicon: BDAG
  rationale: ἀσπάζομαι commonly means 'greet' or 'welcome.' 'Embraced' imports a physical
    action not stated by the verb itself, and 'exchanged greetings' is more explicit
    than necessary. 'Greeted' best fits optimal equivalence.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: The reciprocal pronoun is naturally rendered 'one another' in literary
    biblical English. 'Each other' would also be acceptable, but 'one another' reads
    slightly better in this narrative sequence.
