id: TOB.5.1
reference: Tobit 5:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἀποκριθεὶς Τωβίας εἶπεν αὐτῷ Πάτερ, ποιήσω πάντα ὅσα ἐντέταλσαί μοι.
  language: Greek
  pages:
  - 832
  - 835
  - 840
  - 841
  - 842
  - 843
  - 844
  - 845
  - 846
  - 847
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ויען טוביה את אביו ויאמר כל אשר צויתני אבי כן אעשה.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 5:1
translation:
  text: And Tobiah answered him, “Father, I will do everything that you have commanded
    me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel Semitic-form witness reads explicitly, 'Tobiah answered his
      father ... all that you commanded me, my father, I will do.' The Greek main
      witness has the simpler 'answered him' and vocative 'Father.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - in answer
  lexicon: BDAG
  rationale: Standard narrative participle introducing speech; concise English finite
    verb is natural and preserves the discourse function.
- source_word: Τωβίας
  chosen: Tobiah
  alternatives:
  - Tobias
  lexicon: Greek proper-name tradition
  rationale: Personal names are transliterated by standard conventions. 'Tobiah' aligns
    well with the Semitic form reflected in the parallel source and avoids unnecessary
    Latinizing.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - his father
  lexicon: BDAG
  rationale: The Greek pronoun is explicit but not the referent; 'him' is the direct
    translation. The following vocative 'Father' makes the referent clear without
    over-specifying in the main text.
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - My father
  lexicon: BDAG
  rationale: The vocative directly addresses Tobit's fatherhood. 'Father' is formally
    closer to the Greek; the Semitic parallel includes 'my father,' but the Greek
    witness used as primary anchor lacks the possessive, so it is not imported into
    the main text.
- source_word: ποιήσω
  chosen: I will do
  alternatives:
  - I will carry out
  - I will act
  lexicon: BDAG
  rationale: Future of ποιέω here expresses intended obedience. 'I will do' is simple,
    direct, and idiomatic.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all
  lexicon: BDAG
  rationale: Idiomatic English for the neuter plural object in this context of comprehensive
    obedience.
- source_word: ὅσα
  chosen: that
  alternatives:
  - whatever
  - all that
  lexicon: BDAG
  rationale: In English, 'everything that you have commanded me' best captures the
    relation between πάντα and ὅσα without awkwardness.
- source_word: ἐντέταλσαί
  chosen: have commanded
  alternatives:
  - commanded
  - ordered
  - instructed
  lexicon: BDAG
  rationale: The verb denotes giving a charge or command. 'Have commanded' reflects
    the Greek perfect infinitive's completed action with present relevance. 'Ordered'
    is possible but slightly harsher than the familial context requires.
- source_word: μοι
  chosen: me
  alternatives:
  - to me
  lexicon: BDAG
  rationale: English idiom prefers 'commanded me' rather than the more wooden 'commanded
    to me,' while preserving the indirect-object sense.
