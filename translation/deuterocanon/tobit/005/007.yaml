translation:
  text: And Tobiah said to him, “Wait for me, and I will tell my father.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek text is brief: ''And Tobiah said to him, “Wait for me, and I
      will tell my father.”'' A parallel Semitic-form witness expands the scene by
      stating that Tobiah went and informed his father about the man he had found,
      then went out to call him. The main text follows the Greek source while the
      fuller context is preserved here.'
    reason: textual_variant
lexical_decisions:
- source_word: Ὑπόμεινόν
  chosen: Wait for me
  alternatives:
  - Stay here for me
  - Remain for me
  - Be patient with me
  lexicon: BDAG
  rationale: The aorist imperative of ὑπομένω here most naturally asks the man to
    stay/wait while Tobiah goes to speak with his father. 'Wait for me' is idiomatic
    modern English and fits both the immediate context and the Semitic parallel, which
    expands the scene with Tobiah going to report to his father.
- source_word: ἐρῶ
  chosen: I will tell
  alternatives:
  - I will speak to
  - I will say to
  - I will report to
  lexicon: BDAG
  rationale: Future of λέγω. In context Tobiah intends to inform his father about
    the man he has found, so 'I will tell' communicates the sense more naturally than
    the more wooden 'I will say to.'
- source_word: τῷ πατρί
  chosen: my father
  alternatives:
  - the father
  - my own father
  lexicon: BDAG
  rationale: 'Although the Greek has the article with ''father,'' English idiom in
    direct speech requires the possessive: Tobiah means his own father, Tobit. The
    parallel Semitic witness explicitly has Tobiah reporting to his father, supporting
    this contextual possessive.'
- source_word: Τωβίας
  chosen: Tobiah
  alternatives:
  - Tobias
  lexicon: Greek proper name tradition
  rationale: Personal names are transliterated by standard conventions. 'Tobiah' aligns
    with the Semitic form and avoids unnecessary dependence on Latinate English tradition
    'Tobias'.
