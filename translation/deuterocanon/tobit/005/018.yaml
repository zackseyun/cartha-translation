  text: Ἔκλαυσεν δὲ Ἄννα ἡ μήτηρ αὐτοῦ, καὶ εἶπεν πρὸς Τωβεὶτ Τί ἐξαπέστειλας τὸ παιδίον
    ἡμῶν; ἢ οὐχὶ ἡ ῥάβδος τῆς χειρὸς ἡμῶν ἐστιν ἐν τῷ εἰσπορεύεσθαι αὐτὸν καὶ ἐκπορεύεσθαι
    ἐνώπιον ἡμῶν;
