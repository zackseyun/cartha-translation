translation:
  text: But Anna his mother wept and said to Tobit, “Why did you send our child away?
    Is he not the staff of our hand, as he goes in and goes out before us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “our support” for “the staff of our hand.” The
      main text preserves the metaphor in the Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔκλαυσεν
  chosen: wept
  alternatives:
  - cried
  lexicon: BDAG
  rationale: Aorist of κλαίω denotes weeping/lamenting. 'Wept' is natural, concise
    English and preserves the emotional force better than the more ambiguous 'cried.'
- source_word: ἐξαπέστειλας
  chosen: send ... away
  alternatives:
  - send out
  - dispatch
  lexicon: BDAG
  rationale: The compound verb carries the sense of sending off/from oneself. 'Send
    ... away' captures Anna's grief at his departure more idiomatically than the stiffer
    'send out.'
- source_word: τὸ παιδίον ἡμῶν
  chosen: our child
  alternatives:
  - our boy
  - our son
  lexicon: BDAG
  rationale: παιδίον can mean child/boy. 'Our child' preserves the mother's affectionate
    perspective without over-specifying age; 'our son' is possible by context but
    not the lexical force of the noun itself.
- source_word: ῥάβδος τῆς χειρὸς ἡμῶν
  chosen: the staff of our hand
  alternatives:
  - the staff in our hand
  - the support of our hand
  lexicon: LSJ
  rationale: The phrase is metaphorical and somewhat Semitic in feel, expressing dependence/support.
    'The staff of our hand' keeps the image visible and remains understandable in
    English; a more interpretive rendering like 'support' would flatten the metaphor.
- source_word: ἐν τῷ εἰσπορεύεσθαι αὐτὸν καὶ ἐκπορεύεσθαι
  chosen: as he goes in and goes out
  alternatives:
  - in his coming and going
  - when he enters and leaves
  lexicon: BDAG
  rationale: This infinitival construction expresses customary movement. 'As he goes
    in and goes out' preserves the Hebrew-like idiom and its rhythm better than a
    fully smoothed paraphrase.
- source_word: ἐνώπιον ἡμῶν
  chosen: before us
  alternatives:
  - in our presence
  lexicon: BDAG
  rationale: '''Before us'' is the straightforward rendering and fits the idiomatic
    movement language of the clause.'
