translation:
  text: And Tobit said to him, “Brother, from what tribe and from what homeland are
    you? Show me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Tell me.” The Greek verb literally means “show” or “indicate,” but in
      context it asks for identification.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφέ
  chosen: Brother
  alternatives:
  - Friend
  - brother
  lexicon: BDAG
  rationale: Vocative singular of ἀδελφός. In this address to an unknown traveler,
    it functions as a courteous form of address. 'Brother' preserves the literal kinship
    term and the social warmth of the Greek better than the looser 'friend.' Capitalized
    only because it begins the quotation.
- source_word: φυλῆς
  chosen: tribe
  alternatives:
  - clan
  lexicon: LEH
  rationale: φυλή commonly denotes a tribe or tribal division. 'Tribe' is the most
    direct and biblically intelligible rendering here, fitting Tobit's inquiry about
    lineage.
- source_word: πατρίδος
  chosen: homeland
  alternatives:
  - fatherland
  - native place
  - country
  lexicon: LEH
  rationale: πατρίς refers to one's native land or home region. 'Homeland' is natural
    modern English and preserves the sense of place of origin better than the more
    archaic 'fatherland' or the flatter 'country.'
- source_word: ὑπόδειξόν
  chosen: Show
  alternatives:
  - tell
  - make known
  - point out
  lexicon: BDAG
  rationale: Aorist imperative of ὑποδείκνυμι, 'show, indicate, make known.' In context
    Tobit is asking the man to identify himself. 'Show me' is a close rendering of
    the Greek imperative, even if idiomatic English might prefer 'tell me'; the more
    literal wording preserves the force of the verb.
- source_word: μοι
  chosen: me
  alternatives:
  - to me
  lexicon: BDAG
  rationale: Dative pronoun retained in natural English as the indirect object 'me.'
