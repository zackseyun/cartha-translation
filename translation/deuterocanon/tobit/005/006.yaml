theological_decisions:
- issue: Identity and capitalization of ὁ ἄγγελος
  chosen_reading: the angel
  alternative_readings:
  - the messenger
  rationale: In Tobit the figure is indeed an angelic being, and the Greek explicitly
    says ὁ ἄγγελος. English 'angel' is the natural rendering. Lowercase is used because
    this is a common noun, not a proper name in this clause.
