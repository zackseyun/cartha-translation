translation:
  text: They agreed to this. Then he said to Tobiah, “Get ready for the journey, and
    may your journey be prosperous.” So his son prepared what was needed for the journey.
    Then his father said to him, “Go with the man, and may God, who dwells in heaven,
    make your journey prosper, and may his angel go with you.” So both went out to
    depart, and the boy’s dog went with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “may your journey prosper.” The Greek expresses a wish for success on
      the road.
    reason: lexical_alternative
  - marker: b
    text: “Angel” could more generally mean “messenger,” but in Tobit the heavenly
      sense is most likely.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐδόκησαν
  chosen: They agreed
  alternatives:
  - They were pleased
  - They approved
  lexicon: LSJ
  rationale: In context this verb concludes the prior discussion and signals consent
    to the proposed plan. 'They agreed' is idiomatic English that captures the decision
    rather than mere emotional pleasure.
- source_word: Ἔτοιμος γίνου
  chosen: Get ready
  alternatives:
  - Be ready
  - Make yourself ready
  lexicon: LSJ
  rationale: An imperative calling Tobiah to prepare for departure. 'Get ready' is
    natural modern English while preserving the command force.
- source_word: πρὸς τὴν ὁδόν
  chosen: for the journey
  alternatives:
  - for the road
  - for the trip
  lexicon: LSJ
  rationale: Here ὁδός refers to the impending travel, not merely a literal road.
    'Journey' best fits the narrative setting and remains close to the Greek.
- source_word: εὐοδωθεῖητε
  chosen: may you have a prosperous trip
  alternatives:
  - may your journey prosper
  - may you be prospered on the way
  lexicon: LSJ
  rationale: Optative of wish from εὐοδόω. Because the addressee is Tobiah in view
    of the travel, this is rendered as a blessing for successful travel. 'Prosperous
    trip' communicates the idiom clearly in English.
- source_word: τὰ πρὸς τὴν ὁδόν
  chosen: what was needed for the journey
  alternatives:
  - the things for the journey
  - the travel provisions
  lexicon: LSJ
  rationale: The phrase refers to supplies or preparations for travel. The chosen
    rendering makes the implied sense explicit without over-specifying the exact items.
- source_word: ὁ ἐν τῷ οὐρανῷ οἰκῶν θεός
  chosen: God, who dwells in heaven
  alternatives:
  - the God dwelling in heaven
  - God who lives in heaven
  lexicon: LSJ
  rationale: A reverent descriptive phrase for God. 'Dwells in heaven' preserves the
    elevated tone and the participial construction.
- source_word: εὐοδώσει τὴν ὁδὸν ὑμῶν
  chosen: make your journey prosper
  alternatives:
  - prosper your way
  - grant success to your journey
  lexicon: LSJ
  rationale: The object 'your way' is idiomatic for the course of travel. In English,
    'make your journey prosper' conveys successful travel more naturally than the
    literal 'prosper your way.'
- source_word: ὁ ἄγγελος αὐτοῦ συμπορευθήτω ὑμῖν
  chosen: may his angel go with you
  alternatives:
  - may his angel travel with you
  - may his messenger accompany you
  lexicon: LSJ
  rationale: ἄγγελος can mean messenger or angel, but in Tobit the heavenly being
    motif makes 'angel' the appropriate rendering. συμπορευθήτω is well expressed
    by 'go with you.'
- source_word: ἐξῆλθαν ἀμφότεροι ἀπελθεῖν
  chosen: both went out to depart
  alternatives:
  - both went out to go on their way
  - both set out
  lexicon: LSJ
  rationale: The Greek is somewhat redundant, combining 'went out' with an infinitive
    of departure. The translation preserves that narrative movement without collapsing
    it entirely, though in smoother English.
- source_word: ὁ κύων τοῦ παιδαρίου
  chosen: the boy’s dog
  alternatives:
  - the lad's dog
  - the youth's dog
  lexicon: LSJ
  rationale: παιδάριον refers to the young Tobiah in a diminutive form. 'Boy' is the
    most natural English equivalent here and keeps the detail vivid.
