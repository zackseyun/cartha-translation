- issue: Reference of ἄγγελος
  chosen_reading: his angel
  alternative_readings:
  - his messenger
  rationale: Within Tobit's narrative world, divine guidance by an angel is a major
    theme, so 'angel' is preferable to the more generic 'messenger.' This reflects
    literary and theological context without importing later doctrinal claims.
