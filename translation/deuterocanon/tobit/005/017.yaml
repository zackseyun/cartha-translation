  text: εὐδόκησαν οὕτως· καὶ εἶπεν πρὸς Τωβίαν Ἔτοιμος γίνου πρὸς τὴν ὁδόν· καὶ εὐοδωθεῖητε.
    καὶ ἡτοίμασεν ὁ υἱὸς αὐτοῦ τὰ πρὸς τὴν ὁδόν· καὶ εἶπεν αὐτῷ ὁ πατὴρ αὐτοῦ Πορεύου
    μετὰ τοῦ ἀνθρώπου· ὁ δὲ ἐν τῷ οὐρανῷ οἰκῶν θεὸς εὐοδώσει τὴν ὁδὸν ὑμῶν, καὶ ὁ
    ἄγγελος αὐτοῦ συμπορευθήτω ὑμῖν. καὶ ἐξῆλθαν ἀμφότεροι ἀπελθεῖν, καὶ ὁ κύων τοῦ
    παιδαρίου μετ’ αὐτῶν.
  language: Greek
  pages:
