translation:
  text: And he went to look for a man, and he found Raphael, who was an angel, but
    he did not know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'messenger.' The Greek word can mean either, but here the narrator means
      that Raphael was an angelic being.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθη
  chosen: he went
  alternatives:
  - he departed
  - he traveled
  lexicon: BDAG
  rationale: Aorist passive/deponent of πορεύομαι commonly means 'go' or 'travel.'
    In this narrative sequence, 'went' is the most natural and sufficiently formal
    rendering.
- source_word: ζητῆσαι
  chosen: to look for
  alternatives:
  - to seek
  - to find
  lexicon: BDAG
  rationale: The infinitive expresses purpose. 'Look for' is slightly more idiomatic
    in modern English than 'seek' while preserving the sense of searching for a person.
    The Semitic parallel also supports the idea of seeking a suitable man.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: The Greek explicitly uses the masculine singular 'man.' In context Tobiah
    is seeking a male traveling companion/guide, so gender-accurate 'a man' best matches
    the source and the project's philosophy.
- source_word: εὗρεν
  chosen: he found
  alternatives:
  - he came upon
  lexicon: BDAG
  rationale: Standard narrative rendering of εὑρίσκω; 'found' is direct and natural.
- source_word: Ῥαφαήλ
  chosen: Raphael
  alternatives:
  - Rafael
  rationale: Standard English transliteration of the personal name.
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: Although ἄγγελος can mean 'messenger,' the narrative identifies Raphael
    as a heavenly being, so 'angel' is the correct contextual rendering.
- source_word: οὐκ ᾔδει
  chosen: he did not know it
  alternatives:
  - he did not know
  - he was unaware
  lexicon: BDAG
  rationale: The Greek leaves the object implicit; English benefits from making the
    sense explicit. 'It' refers to Raphael's identity as an angel. This avoids awkwardness
    while not adding new information beyond what the clause implies.
