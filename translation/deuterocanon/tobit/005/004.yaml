theological_decisions:
- issue: Identity of Raphael as ἄγγελος
  chosen_reading: Render ἄγγελος as 'angel' in the main text
  alternative_readings:
  - messenger
  rationale: In Tobit's narrative world Raphael is not merely a human envoy but a
    divine angelic figure. Translating 'messenger' would obscure the plot revelation
    already signaled by the narrator in this verse.
