  - 847
  confidence: high
  validation: agree
translation:
  text: For as it has been given to us by the Lord to live, this is enough for us.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς γὰρ
  chosen: For as
  alternatives:
  - For
  - since
  lexicon: LSJ
  rationale: Retains the explanatory force of γάρ together with ὡς introducing the
    basis of the statement. 'For as' is slightly formal but clear in context.
- source_word: δέδοται
  chosen: it has been given
  alternatives:
  - it is given
  - it was given
  lexicon: BDAG
  rationale: Perfect passive indicates a granted state/result continuing into the
    present. 'Has been given' preserves that better than a simple present or past.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - us
  lexicon: BDAG
  rationale: Dative of advantage/recipient; explicit 'to us' reads naturally in English
    and preserves the Greek relation.
- source_word: ζῇν
  chosen: to live
  alternatives:
  - life
  - to be alive
  lexicon: BDAG
  rationale: 'Infinitive after δέδοται is best rendered verbally: what has been granted
    is ''to live,'' not merely abstract ''life.'''
- source_word: παρὰ τοῦ κυρίου
  chosen: by the Lord
  alternatives:
  - from the Lord
  - at the Lord's hand
  lexicon: BDAG
  rationale: παρά with genitive marks source/origin. 'By the Lord' is idiomatic with
    passive 'has been given,' while still conveying divine source. 'Lord' follows
    the project's default for κύριος.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - that
  - this much
  lexicon: BDAG
  rationale: Refers back to the granted fact of continued life. Simple 'this' is sufficiently
    clear and avoids over-interpreting.
- source_word: ἱκανὸν
  chosen: enough
  alternatives:
  - sufficient
  - adequate
  lexicon: BDAG
  rationale: ἱκανός here expresses sufficiency. 'Enough' is natural modern English
    and preserves the sense without sounding technical.
- source_word: ὑπάρχει
  chosen: is
  alternatives:
  - exists as
  - proves to be
  lexicon: BDAG
  rationale: In this idiom, ἱκανὸν ... ὑπάρχει means 'is enough/sufficient.' A simple
    copular rendering is best English.
