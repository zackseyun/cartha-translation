id: TOB.5.20
reference: Tobit 5:20
source:
  edition: lxx-swete-1909
  text: ὡς γὰρ δέδοται ἡμῖν ζῇν παρὰ τοῦ κυρίου, τοῦτο ἱκανὸν ἡμῖν ὑπάρχει.
  language: Greek
  pages:
