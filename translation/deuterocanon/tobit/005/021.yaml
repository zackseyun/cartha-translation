  text: καὶ εἶπεν αὐτῇ Τωβεὶτ Μὴ λόγον ἔχε, ἀδελφή· ὑγιαίνων ἐλεύσεται, καὶ οἱ ὀφθαλμοί
    σου ὄψονται αὐτόν.
