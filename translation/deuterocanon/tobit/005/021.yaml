translation:
  text: And Tobit said to her, “Do not worry, sister; he will return safe and sound,
    and your eyes will see him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Sister” is the literal Greek form of address. In this context Tobit is
      speaking to his wife; the term reflects familial/spousal address rather than
      biological siblinghood.
    reason: cultural_note
lexical_decisions:
- source_word: Μὴ λόγον ἔχε
  chosen: Do not worry
  alternatives:
  - Do not be concerned
  - Do not make a matter of it
  - Do not keep speaking
  lexicon: LSJ
  rationale: The idiom literally involves 'having a word/matter,' but in context it
    functions as reassurance to a distressed listener. 'Do not worry' best captures
    the natural sense in readable modern English without over-paraphrasing.
- source_word: ἀδελφή
  chosen: sister
  alternatives:
  - wife
  lexicon: LSJ
  rationale: The Greek literally reads 'sister,' a common Semitic-influenced familial
    address between spouses in Tobit. Following the source-text primacy and gender-accurate
    policy, the main text preserves 'sister' rather than replacing it with the interpretive
    'wife.'
- source_word: ὑγιαίνων
  chosen: safe and sound
  alternatives:
  - well
  - in good health
  - unharmed
  lexicon: LSJ
  rationale: The participle denotes being healthy/sound. In this travel context, English
    idiom 'safe and sound' naturally conveys both physical well-being and successful
    return, matching the reassurance intended by the Greek.
- source_word: ἐλεύσεται
  chosen: he will return
  alternatives:
  - he will come
  - he will arrive
  lexicon: LSJ
  rationale: Although the verb is simply 'will come,' the context is the son's journey
    away from home, so 'return' expresses the directional sense implicit in the scene
    and is standard optimal-equivalence English.
- source_word: οἱ ὀφθαλμοί σου ὄψονται αὐτόν
  chosen: your eyes will see him
  alternatives:
  - you will see him
  lexicon: LSJ
  rationale: The Greek explicitly mentions 'your eyes,' and preserving that phrase
    retains the vividness and emotional force of the reassurance while remaining natural
    in English.
