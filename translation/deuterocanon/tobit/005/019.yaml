theological_decisions:
- issue: Relative value of wealth and the child's life in a compressed Greek idiom
  chosen_reading: The verse is rendered as a proverbial statement that money is worthless
    by comparison with the child.
  alternative_readings:
  - Do not add silver to silver, but let it be as refuse for our child.
  - Do not compare money with money, but let it count as rubbish for the sake of our
    child.
  rationale: 'The Greek is elliptical and idiomatic rather than doctrinally contested.
    The translation preserves the mother''s point: financial loss is insignificant
    compared with the safety of their son. The wording avoids importing a more specific
    economic meaning than the text warrants while still making the comparison intelligible
    in English.'
  doctrine_reference: Translation philosophy §§1, 3, 6
