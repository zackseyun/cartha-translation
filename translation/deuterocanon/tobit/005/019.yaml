translation:
  text: Do not value silver against silver, but let it become refuse for our child.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek literally, ''Do not let silver get ahead of silver, but let it become
      offscouring of our child.'' The line is idiomatic: the sense is that money should
      be treated as worthless compared with the child.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀργύριον
  chosen: silver
  alternatives:
  - money
  lexicon: LSJ
  rationale: The noun literally denotes silver and by extension money. Here the repetition
    ἀργύριον τῷ ἀργυρίῳ is proverbial and gains force if the concrete term 'silver'
    is retained rather than generalized to 'money'.
- source_word: τῷ ἀργυρίῳ
  chosen: against silver
  alternatives:
  - with silver
  - as equal to silver
  lexicon: LSJ
  rationale: The dative with φθάσαι is difficult in this compressed idiom. The sense
    is not to value or reckon one amount of silver in comparison with another when
    the child's life is at stake. 'Against silver' preserves the comparative force
    without over-paraphrasing.
- source_word: μὴ φθάσαι
  chosen: do not count
  alternatives:
  - do not value
  - do not compare
  - do not prefer
  lexicon: LSJ
  rationale: Although φθάνω commonly means 'come before' or 'anticipate,' in this
    idiomatic construction the clause functions as a warning not to let money be the
    determining consideration. 'Do not count' captures the financial idiom and fits
    the repeated 'silver,' while avoiding an overly interpretive expansion.
- source_word: ἀλλά
  chosen: but
  alternatives:
  - rather
  lexicon: LSJ
  rationale: Standard adversative conjunction introducing the preferred valuation.
- source_word: περίψημα
  chosen: refuse
  alternatives:
  - offscouring
  - rubbish
  - sweepings
  lexicon: LSJ
  rationale: The term denotes something wiped off, refuse, or offscouring. 'Refuse'
    is clear modern English and preserves the strong depreciation of wealth in comparison
    with the child.
- source_word: τοῦ παιδίου ἡμῶν
  chosen: compared with our child
  alternatives:
  - for our child
  - on account of our child
  - of our child
  lexicon: LSJ
  rationale: The genitive after περίψημα is terse and idiomatic. The sense is that
    money should be treated as refuse in relation to the child. English requires slight
    expansion to make the comparison intelligible.
- source_word: γένοιτο
  chosen: let it become
  alternatives:
  - may it be
  - let it be regarded as
  lexicon: LSJ
  rationale: Optative expressing wish or resolve. 'Let it become' preserves the verbal
    force and the hortatory tone.
