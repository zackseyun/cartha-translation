      do not treat as Vorlage.
    reference: TOB 5:2
translation:
  text: But how will I be able to get the money, since I do not know him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek says 'the silver'; here it refers to money entrusted for safekeeping,
      so 'the money' is used for clarity.
    reason: lexical_alternative
  - marker: b
    text: 'The parallel Semitic tradition expands the thought: ''How can I take the
      money from Gabael? He will not recognize me, and I do not recognize him...,''
      making explicit that the problem is mutual lack of acquaintance.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - And
  - Yet
  lexicon: BDAG
  rationale: Adversative particle introducing Tobit's objection or difficulty in response
    to the preceding instruction; 'But' is the most natural English discourse marker
    here.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  lexicon: BDAG
  rationale: Directly expresses the practical problem being raised. Simple 'how' preserves
    the question's force.
- source_word: δυνησομαι
  chosen: will I be able
  alternatives:
  - can I
  - shall I be able
  lexicon: BDAG
  rationale: Future middle of δύναμαι conveys ability in future action. 'Will I be
    able' preserves both futurity and incapacity better than the flatter 'can I.'
- source_word: λαβεῖν
  chosen: to get
  alternatives:
  - to receive
  - to take
  lexicon: BDAG
  rationale: Although literally 'to take/receive,' in context of recovering deposited
    silver, idiomatic English 'get the money' best captures retrieval without sounding
    wooden. The Semitic parallel expands the idea as taking the money from Gabael's
    hand, supporting a retrieval sense.
- source_word: τὸ ἀργύριον
  chosen: the money
  alternatives:
  - the silver
  lexicon: BDAG
  rationale: ἀργύριον can mean silver or money. In this narrative context it refers
    to entrusted funds, so 'the money' is clearer for modern readers while remaining
    faithful to sense.
- source_word: καὶ
  chosen: since
  alternatives:
  - and
  - when
  lexicon: BDAG
  rationale: 'Though formally ''and,'' the conjunction here links the reason for the
    difficulty: he cannot retrieve the money because he does not know the man. English
    ''since'' makes the logic explicit without adding foreign content.'
- source_word: οὐ γινώσκω
  chosen: I do not know
  alternatives:
  - I am not acquainted with
  - I do not recognize
  lexicon: BDAG
  rationale: Standard rendering of γινώσκω. In context it denotes personal acquaintance/recognition
    with the man from whom the money must be collected.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Masculine singular pronoun referring to the man holding the money.
