  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ועתה אבי תן לי עצה איך אוכל לקחת את הכסף מיד גביאל כי הוא לא יכירני ואנכי
      לא אכירהו ומה סימן אומר אליו לתת לי את הכסף וגם הדרכים שילכו בהם למדי לא ידעתים.
