theological_decisions:
- issue: Genealogical language and kinship terminology
  chosen_reading: Retain literal familial terms ('brother,' 'tribe,' 'family,' 'root')
    rather than smoothing into generalized social language.
  alternative_readings:
  - Use 'kinsman' throughout
  - Use more idiomatic 'good family' instead of 'good root'
  rationale: The verse foregrounds Israelite ancestry, covenant identity, and fidelity
    in worship. Preserving the kinship and lineage vocabulary keeps the theological-social
    texture of the text visible.
  doctrine_reference: DOCTRINE.md §§1, 4, 5
