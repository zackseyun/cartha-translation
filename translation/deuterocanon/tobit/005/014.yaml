id: TOB.5.14
reference: Tobit 5:14
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν αὐτῷ Ὑγιαίνων ἔλθοις, ἀδελφέ· καὶ μὴ μοι ὀργισθῇς ὅτι ἐζήτησα τὴν
    φυλήν σου καὶ τὴν πατριάν σου ἐπιγνῶναι. καὶ σὺ τυγχάνεις ἀδελφός μου ἐκ τῆς καλῆς
    καὶ ἀγαθῆς γενεᾶς· ἐπεγίνωσκον γὰρ ἐγὼ Ἀνανίαν καὶ Ἰαθὰν τοὺς υἱοὺς Σεμείου τοῦ
    μεγάλου, ὡς ἐπορευόμεθα κοινῶς εἰς Ἰερουσαλὴμ προσκυνεῖν, ἀναφέροντες τὰ πρωτότοκα
    καὶ τὰς δεκάτας τῶν γενημάτων, καὶ οὐκ ἐπλανήθησαν ἐν τῇ πλάνῃ τῶν ἀδελφῶν ἡμῶν·
    ἐκ ῥίζης καλῆς εἶ, ἀδελφέ.
