translation:
  text: And he said to him, “May you come in health, brother; and do not be angry
    with me because I sought to learn your tribe and your family. And you indeed turn
    out to be my brother, from a good and noble lineage. For I knew Ananias and Jathan,
    the sons of Shemaiah the great, as we used to go together to Jerusalem to worship,
    bringing the firstborn and the tithes of the produce; and they were not led astray
    in the error of our brothers. You are from a good root, brother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go in health.' The Greek literally says, 'May you come in health,' a
      conventional wish for well-being.
    reason: lexical_alternative
  - marker: b
    text: '''Our brothers'' here refers to fellow kinsmen/Israelites, not necessarily
      only male siblings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑγιαίνων ἔλθοις
  chosen: May you come in health
  alternatives:
  - Go in health
  - May you arrive safely
  lexicon: LSJ
  rationale: A conventional wish for well-being/safe journey. 'Come in health' stays
    close to the Greek ἔλθοις ('may you come') while still sounding intelligible in
    English. 'Go in health' would reflect a more idiomatic farewell but is less literal
    to the attested wording.
- source_word: φυλήν
  chosen: tribe
  alternatives:
  - clan
  lexicon: LSJ
  rationale: φυλή commonly denotes tribe or tribal affiliation. 'Tribe' preserves
    the social-genealogical sense important in Israelite identity.
- source_word: πατριάν
  chosen: family
  alternatives:
  - father's house
  - lineage
  lexicon: LSJ
  rationale: πατριά refers to family line or ancestral house. 'Family' is readable
    modern English; the broader genealogical nuance is supported by the surrounding
    context of ancestry.
- source_word: ἐπιγνῶναι
  chosen: to learn
  alternatives:
  - to know fully
  - to ascertain
  lexicon: BDAG
  rationale: The infinitive expresses finding out or learning someone's identity.
    'To learn' is natural English and fits the context of inquiry into ancestry.
- source_word: τυγχάνεις
  chosen: turn out to be
  alternatives:
  - happen to be
  - are
  lexicon: BDAG
  rationale: 'τυγχάνω here conveys the resulting discovery: ''you turn out to be.''
    This preserves the sense of recognition better than a flat ''are.'''
- source_word: ἀδελφός μου
  chosen: my brother
  alternatives:
  - my kinsman
  lexicon: BDAG
  rationale: In context this likely means kinship rather than merely friendship, but
    'brother' preserves the source term and the familial warmth. The broader kinship
    sense is evident from the genealogy discussion.
- source_word: γενεᾶς
  chosen: lineage
  alternatives:
  - stock
  - generation
  - family line
  lexicon: LSJ
  rationale: Given the ancestry context, 'lineage' best conveys descent rather than
    a temporal 'generation.'
- source_word: ἐπεγίνωσκον
  chosen: I knew
  alternatives:
  - I recognized
  - I was acquainted with
  lexicon: BDAG
  rationale: The imperfect indicates prior acquaintance. 'I knew' is concise and sufficient
    in context.
- source_word: κοινῶς
  chosen: together
  alternatives:
  - in company
  - jointly
  lexicon: LSJ
  rationale: The adverb indicates shared travel. 'Together' is the clearest modern
    rendering.
- source_word: προσκυνεῖν
  chosen: to worship
  alternatives:
  - to bow down in worship
  lexicon: BDAG
  rationale: In pilgrimage context to Jerusalem, the verb denotes worship. The fuller
    bodily nuance is possible but not necessary in the main text.
- source_word: τὰ πρωτότοκα
  chosen: the firstborn
  alternatives:
  - the firstborn offspring
  - the firstlings
  lexicon: LSJ
  rationale: Refers to firstborn animals/offerings. 'The firstborn' is the most direct
    rendering; the sacrificial sense is clear from 'bringing' and the cultic context.
- source_word: τὰς δεκάτας τῶν γενημάτων
  chosen: the tithes of the produce
  alternatives:
  - the tithes of the crops
  - the tenths of the yield
  lexicon: LSJ
  rationale: γενήματα denotes produce/yield. 'Produce' is broad enough to cover agricultural
    increase without over-specifying.
- source_word: οὐκ ἐπλανήθησαν ἐν τῇ πλάνῃ
  chosen: they were not led astray in the error
  alternatives:
  - they did not go astray in the wandering
  - they were not deceived by the delusion
  lexicon: BDAG
  rationale: The cognate construction emphasizes deviation into error. 'Were not led
    astray in the error' preserves both the passive and the noun's moral-religious
    force.
- source_word: τῶν ἀδελφῶν ἡμῶν
  chosen: of our brothers
  alternatives:
  - of our kindred
  - of our fellow Israelites
  lexicon: BDAG
  rationale: The Greek is literally 'our brothers.' Per project philosophy, the masculine
    familial term is retained rather than neutralized, while context indicates fellow
    kinsmen.
- source_word: ἐκ ῥίζης καλῆς
  chosen: from a good root
  alternatives:
  - of good stock
  - from a good family root
  lexicon: LSJ
  rationale: The metaphor of root evokes ancestry and moral stock. 'From a good root'
    preserves the image rather than flattening it into mere social pedigree.
