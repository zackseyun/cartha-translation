translation:
  text: And he gave him the written note and said to him, “Find for yourself a man
    who will go with you, and I will give him wages as long as I live; then go and
    get the silver.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the money.” Greek ἀργύριον literally means “silver,” but in context
      it refers to the deposited funds.
    reason: lexical_alternative
  - marker: b
    text: The parallel Semitic witness points to a token or identifying document connected
      with the deposit; this supports translating χειρόγραφον as a written note rather
      than a generic letter.
    reason: cross_reference
lexical_decisions:
- source_word: χειρόγραφον
  chosen: written note
  alternatives:
  - handwritten document
  - bond
  - receipt
  - letter of hand
  lexicon: LSJ
  rationale: χειρόγραφον literally denotes something written by hand. In this context
    Tobit is handing over the document connected with the deposited money, so 'written
    note' preserves the concrete sense without over-specifying its legal form. 'Bond'
    or 'receipt' may be too narrow from the Greek alone, though the Semitic parallel
    supports a token/document identifying the deposit.
- source_word: Ζήτησον σεαυτῷ ἄνθρωπον
  chosen: Find for yourself a man
  alternatives:
  - seek yourself a man
  - find yourself someone
  lexicon: LSJ
  rationale: The Greek explicitly has ἄνθρωπον, singular masculine. Per gender-accurate
    policy, 'a man' is retained rather than the more generic 'someone.' The context
    is a travel companion or guide.
- source_word: συμπορεύσεταί
  chosen: will go with you
  alternatives:
  - will travel with you
  - will accompany you
  lexicon: LSJ
  rationale: The compound verb means to go or travel together. 'Will go with you'
    is natural modern English and keeps the movement sense; 'accompany' is possible
    but slightly less concrete.
- source_word: μισθὸν
  chosen: wages
  alternatives:
  - pay
  - hire
  lexicon: LSJ
  rationale: μισθός is payment for work or service. 'Wages' fits the hiring context
    and preserves the sense of compensation promised to the companion.
- source_word: ἕως ζῶ
  chosen: as long as I live
  alternatives:
  - while I live
  - so long as I am alive
  lexicon: LSJ
  rationale: The phrase is idiomatic and straightforward. It likely functions as an
    assurance of payment from Tobit's own resources; 'as long as I live' is the most
    natural rendering.
- source_word: λάβε πορευθεὶς τὸ ἀργύριον
  chosen: then go and get the silver
  alternatives:
  - and having gone, take the money
  - go and receive the silver
  lexicon: LSJ
  rationale: ἀργύριον can mean silver or money. Because the immediate context concerns
    deposited funds, either is possible; 'silver' keeps the more literal wording while
    still being intelligible. The participle πορευθείς is smoothed into idiomatic
    English as 'then go and get.'
