  text: καὶ εἶπεν αὐτῷ Εἰ δύναμαι πορευθῆναι μετὰ σοῦ ἐν Ῥάγοις τῆς Μηδείας, καὶ εἰ
    ἔμπειρος εἶ τῶν τόπων;
