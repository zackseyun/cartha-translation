theological_decisions:
- issue: Reference to Mosaic law in a deuterocanonical narrative setting
  chosen_reading: Retain the explicit phrase 'according to the law of Moses' without
    softening or expanding it.
  alternative_readings:
  - in keeping with our law
  - according to the law
  rationale: The Greek explicitly names Moses. The translation should preserve the
    narrative's claim of legal grounding without importing later doctrinal judgments
    about Tobit's historical or canonical status.
  doctrine_reference: Translation philosophy §§1, 6
