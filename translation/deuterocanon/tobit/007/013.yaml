id: TOB.7.13
reference: Tobit 7:13
source:
  edition: lxx-swete-1909
  text: καὶ ἐκάλεσεν Σάρραν τὴν θυγατέρα αὐτοῦ, καὶ λαβὼν τῆς χειρὸς αὐτῆς παρέδωκεν
    αὐτὴν Τωβείᾳ γυναῖκα, καὶ εἶπεν Ἰδοὺ κατὰ τὸν νόμον Μωυσέως κομίζου αὐτὴν καὶ
    ἄπαγε πρὸς τὸν πατέρα σου· καὶ εὐλόγησεν αὐτούς.
  language: Greek
