translation:
  text: And he called Sarah his daughter, and taking her by the hand he gave her to
    Tobiah as a wife, and he said, “See, according to the law of Moses, take her and
    bring her to your father.” And he blessed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “receive her” for “take her”; the Greek imperative can carry the sense
      of taking, receiving, or bringing, but the following command already expresses
      the movement toward his father.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: The verb straightforwardly means 'called' here. 'Summoned' is possible
    in context, but 'called' is more natural and sufficiently precise without overstating
    formality.
- source_word: λαβὼν τῆς χειρὸς αὐτῆς
  chosen: taking her by the hand
  alternatives:
  - taking her hand
  - having taken her by the hand
  lexicon: BDAG
  rationale: This participial phrase describes the marriage-transfer gesture. 'Taking
    her by the hand' preserves the concrete action and the genitive construction's
    sense better than a more idiomatic but slightly less explicit 'taking her hand.'
- source_word: παρέδωκεν αὐτὴν Τωβείᾳ γυναῖκα
  chosen: he gave her to Tobiah as a wife
  alternatives:
  - he handed her over to Tobiah as wife
  - he gave her to Tobiah for a wife
  lexicon: BDAG
  rationale: παραδίδωμι here is not hostile 'betray' but formal transfer/giving in
    marriage. 'As a wife' communicates γυναῖκα predicatively in natural English while
    preserving the marital sense.
- source_word: Ἰδοὺ
  chosen: See
  alternatives:
  - Behold
  - Look
  lexicon: BDAG
  rationale: A deictic attention-marker. 'See' is readable modern English and preserves
    the force without archaic tone. 'Behold' would sound overly traditional.
- source_word: κατὰ τὸν νόμον Μωυσέως
  chosen: according to the law of Moses
  alternatives:
  - in accordance with the law of Moses
  - by the law of Moses
  lexicon: BDAG
  rationale: This phrase explicitly grounds the marriage action in Mosaic law. 'According
    to' is clear and formal enough, preserving the legal-religious reference.
- source_word: κομίζου
  chosen: take her
  alternatives:
  - receive her
  - take her with you
  lexicon: BDAG
  rationale: The imperative can mean 'take/bring/receive.' In this sequence with ἄπαγε
    ('bring/lead away'), 'take her' best fits the first step of receiving the bride,
    while the next verb carries the movement toward the father's house.
- source_word: ἄπαγε πρὸς τὸν πατέρα σου
  chosen: bring her to your father
  alternatives:
  - lead her to your father
  - take her away to your father
  lexicon: BDAG
  rationale: ἄπαγε implies leading or taking someone along. 'Bring her to your father'
    reads naturally in English from the speaker's perspective and matches the destination
    phrase. 'Lead' is possible but stiffer.
- source_word: εὐλόγησεν αὐτούς
  chosen: he blessed them
  alternatives:
  - he gave them his blessing
  lexicon: BDAG
  rationale: A simple and direct rendering of the blessing formula. 'He blessed them'
    preserves the verbal action without expansion.
