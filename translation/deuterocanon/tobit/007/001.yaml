id: TOB.7.1
reference: Tobit 7:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἦλθεν εἰς Ἐκβάτανα καὶ παρεγένετο εἰς τὴν οἰκίαν Ῥαγουήλ, καὶ Σάρρα δὲ
    ὑπήντησεν αὐτῷ· καὶ ἐχαιρέτισεν αὐτὸν καὶ αὐτὸς αὐτούς. καὶ εἰσήγαγεν αὐτοὺς εἰς
    τὴν οἰκίαν.
  language: Greek
  pages:
  - 832
  - 835
  - 846
  - 847
  - 848
  - 849
  - 850
  - 851
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ויהי כשמוע טוביה כל הדברים האלה ונפשו נקשרה בנפש שרה ויבאו באגבתניס בבית
      רעואל וימצאו אותו אצל שער ביתו וישאלו לו לשלום וישב להם שלום.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 7:1
translation:
  text: And he came to Ecbatana and arrived at the house of Raguel, and Sarah also
    met him. She greeted him, and he greeted them, and he brought them into the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Sarah also met him.'' The final clause has an implicit singular
      subject (''he brought them into the house''); the text does not explicitly name
      who brought them in.'
    reason: alternative_reading
  - marker: b
    text: The parallel Semitic witness reflects the same arrival-and-greeting scene
      at Raguel's house, though with some differences in wording and detail.
    reason: cross_reference
lexical_decisions:
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: A basic motion verb; 'came' fits the narrative movement into Ecbatana
    in natural English without over-specifying direction.
- source_word: παρεγένετο
  chosen: arrived
  alternatives:
  - came
  - presented himself
  - came to
  lexicon: BDAG
  rationale: Used here after ἦλθεν to mark arrival at a specific destination, the
    house of Raguel. Rendering it 'arrived' preserves the slight progression rather
    than flattening both verbs into the same English word.
- source_word: οἰκίαν
  chosen: house
  alternatives:
  - home
  - household
  lexicon: BDAG
  rationale: The immediate sense is the physical dwelling. 'House' is straightforward
    and can also carry the household sense implicitly in context.
- source_word: ὑπήντησεν
  chosen: met
  alternatives:
  - went out to meet
  - greeted
  lexicon: BDAG
  rationale: The verb denotes meeting someone, often by going out to meet them. Since
    greeting is expressed separately by ἐχαιρέτισεν, 'met' avoids redundancy.
- source_word: ἐχαιρέτισεν
  chosen: greeted
  alternatives:
  - welcomed
  - saluted
  lexicon: BDAG
  rationale: A standard greeting verb. 'Greeted' is the most direct modern equivalent
    and keeps distinct from the subsequent act of bringing them inside.
- source_word: αὐτὸς αὐτούς
  chosen: he greeted them
  alternatives:
  - he greeted them in return
  - he greeted them
  lexicon: BDAG
  rationale: The Greek is concise and slightly elliptical after Sarah's greeting.
    'He greeted them' is the clearest English rendering; reciprocal force is evident
    from context without needing expansion in the main text.
- source_word: εἰσήγαγεν
  chosen: brought ... into
  alternatives:
  - led ... into
  - took ... into
  lexicon: BDAG
  rationale: The verb means to bring or lead in. 'Brought them into the house' is
    natural English and preserves the movement indoors.
- source_word: Ἐκβάτανα
  chosen: Ecbatana
  alternatives:
  - Ekbatana
  rationale: Standard English transliteration of the place name.
- source_word: Ῥαγουήλ
  chosen: Raguel
  alternatives:
  - Reuel
  rationale: The Greek form supports 'Raguel'; this is the standard transliteration
    from the source witness.
- source_word: Σάρρα
  chosen: Sarah
  alternatives:
  - Sara
  rationale: The Greek spelling corresponds to the familiar English form 'Sarah.'
