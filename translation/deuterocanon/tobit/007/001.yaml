theological_decisions:
- issue: Subject reference in the final clause
  chosen_reading: he brought them into the house
  alternative_readings:
  - he led them into his house
  - they were brought into the house
  rationale: The Greek singular verb εἰσήγαγεν most naturally takes an implicit singular
    subject carried forward from the preceding clause. Given the sequence of hospitality
    actions and the parallel Semitic witness's household-greeting setting, the narrative
    sense is that the host party received the travelers indoors. The Greek text as
    given does not explicitly name the subject, so the English keeps the pronoun rather
    than over-interpreting with a proper name.
