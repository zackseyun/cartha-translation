theological_decisions:
- issue: Rendering χάρις in a prayer to God
  chosen_reading: favor
  alternative_readings:
  - grace
  rationale: The context is a parental blessing over a distressed bride, not a doctrinal
    exposition. 'Favor' best conveys the sense of gracious blessing without importing
    technical theological freight. The alternative remains lexically possible.
  doctrine_reference: Translation philosophy §1, §6; Contested terms table notes doctrinally
    weighty terms should not be overloaded beyond context.
