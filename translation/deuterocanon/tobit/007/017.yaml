translation:
  text: Take courage, child; may the Lord of heaven and earth grant you favor instead
    of this sorrow of yours. Take courage, daughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grace' instead of 'favor'; the Greek χάρις can bear either sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θάρσει
  chosen: Take courage
  alternatives:
  - Be of good courage
  - Be encouraged
  - Have courage
  lexicon: LSJ
  rationale: Imperative of θαρσέω expressing encouragement in distress. 'Take courage'
    is natural modern English and preserves the direct exhortation better than the
    more archaic 'be of good courage.' The repetition is retained in both clauses.
- source_word: τέκνον
  chosen: child
  alternatives:
  - my child
  - son
  lexicon: LSJ
  rationale: τέκνον is a general term of filial address, not specifically male. 'Child'
    preserves the affectionate, non-gendered address. 'My child' adds a possessive
    not present in the Greek.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: LSJ
  rationale: Per doctrine, κύριος is rendered 'Lord.' In this Jewish prayer context
    it functions as a divine title.
- source_word: τοῦ οὐρανοῦ καὶ τῆς γῆς
  chosen: of heaven and earth
  alternatives:
  - of the sky and the earth
  lexicon: LSJ
  rationale: A standard biblical merism for God's universal sovereignty. 'Heaven and
    earth' is the established and accurate English equivalent.
- source_word: δῴη
  chosen: may ... grant
  alternatives:
  - may ... give
  lexicon: LSJ
  rationale: Optative expressing a wish or prayer. 'May ... grant' fits idiomatic
    English prayer language and suits χάριν better than the more wooden 'give.'
- source_word: σοι χάριν
  chosen: you favor
  alternatives:
  - you grace
  - you kindness
  lexicon: LSJ
  rationale: χάρις here denotes favor or gracious benefit. 'Favor' is the clearest
    idiomatic rendering in this benedictory context; 'grace' would be possible but
    may import later theological associations not demanded here.
- source_word: ἀντὶ τῆς λύπης σου ταύτης
  chosen: instead of this sorrow of yours
  alternatives:
  - in place of this grief of yours
  - for this sorrow of yours
  lexicon: LSJ
  rationale: ἀντί marks exchange or replacement. λύπη is sorrow/grief. 'Instead of
    this sorrow of yours' preserves both the substitution sense and the personal address.
- source_word: θύγατερ
  chosen: daughter
  alternatives:
  - my daughter
  lexicon: LSJ
  rationale: Direct feminine filial address. It should be rendered explicitly to preserve
    the shift from the more general τέκνον to the specific θύγατερ at the close.
