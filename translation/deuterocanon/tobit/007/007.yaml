theological_decisions:
- issue: Elliptical identification formula in the opening clause
  chosen_reading: Expanded the Greek ellipsis as 'He is the son of a noble and good
    man'
  alternative_readings:
  - He is of a noble and good man
  - '[He is] the one of the noble and good man'
  rationale: The Greek as transmitted is abrupt and elliptical. A minimal expansion
    is needed for intelligible English. 'Son' is supplied because it best fits the
    social-identification context and avoids an un-English literalism, while remaining
    closely anchored to the likely sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition'
- issue: Concrete versus interpretive rendering of Tobit's blindness
  chosen_reading: Retained the concrete expression 'had lost his eyes' in the main
    text
  alternative_readings:
  - had lost his sight
  rationale: The Greek wording is concrete. Although English often prefers 'lost his
    sight,' the more literal rendering preserves the source texture without becoming
    unintelligible. The alternative is worth preserving in a footnote because it expresses
    the idiomatic sense.
  doctrine_reference: 'Translation philosophy: preserve source plain sense; readable
    modern English'
