id: TOB.7.10
reference: Tobit 7:10
source:
  edition: lxx-swete-1909
  text: καὶ μετέδωκεν τὸν λόγον τῷ Ῥαγουήλ. καὶ εἶπεν Ῥαγουὴλ πρὸς Τωβείαν Φάγε, πίε
    καὶ ἡδέως γίνου, σοὶ γὰρ καθήκει τὸ παιδίον μου λαβεῖν· πλὴν ὑποδείξω τὴν ἀλήθειαν.
  language: Greek
