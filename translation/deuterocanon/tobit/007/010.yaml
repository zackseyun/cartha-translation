  confidence: high
  validation: agree
translation:
  text: And he conveyed the matter to Raguel. And Raguel said to Tobiah, “Eat, drink,
    and be merry, for it is fitting for you to take my child; but I will explain the
    truth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my daughter.” The Greek says “my child,” with Sarah as the intended
      referent.
    reason: lexical_alternative
  - marker: b
    text: That is, “to take in marriage.” The Greek uses the more literal expression
      “to take.”
    reason: lexical_alternative
lexical_decisions:
- source_word: μετέδωκεν
  chosen: conveyed
  alternatives:
  - communicated
  - reported
  - passed on
  lexicon: LSJ
  rationale: The verb here means to impart or communicate. 'Conveyed' fits the context
    of passing along the proposal/request without sounding overly formal or wooden.
- source_word: τὸν λόγον
  chosen: the matter
  alternatives:
  - the word
  - the message
  - the proposal
  lexicon: LSJ
  rationale: Although literally 'the word/message,' in context it refers to the subject
    under discussion just mentioned. 'The matter' is idiomatic English that preserves
    the sense without over-specifying.
- source_word: ἡδέως γίνου
  chosen: be glad
  alternatives:
  - be cheerful
  - make merry
  - be joyful
  lexicon: LSJ
  rationale: The phrase is an idiomatic invitation to enjoy oneself pleasantly at
    table. 'Be glad' is natural modern English and keeps the positive imperative force.
- source_word: καθήκει
  chosen: it is fitting
  alternatives:
  - it is proper
  - it is right
  - it is appropriate
  lexicon: LSJ
  rationale: The verb expresses what is proper or appropriate. 'It is fitting' preserves
    the formal, socially and morally appropriate nuance in the marriage context.
- source_word: τὸ παιδίον μου
  chosen: my child
  alternatives:
  - my daughter
  - my girl
  lexicon: LSJ
  rationale: The Greek expression is literally 'my child.' Since the referent is Sarah,
    'my daughter' would be interpretively explicit, but 'my child' better reflects
    the source wording while remaining clear enough in context.
- source_word: λαβεῖν
  chosen: to take
  alternatives:
  - to marry
  - to receive
  lexicon: LSJ
  rationale: The infinitive literally means 'to take.' In marriage contexts it can
    imply taking in marriage, but the Greek itself does not use an explicit verb 'to
    marry,' so 'to take' preserves the source texture.
- source_word: ὑποδείξω
  chosen: I will explain
  alternatives:
  - I will show
  - I will point out
  - I will make known
  lexicon: LSJ
  rationale: The verb can mean to show or point out. In this context Raguel is about
    to disclose important information, so 'I will explain' communicates the forthcoming
    clarification naturally.
- source_word: τὴν ἀλήθειαν
  chosen: the truth
  alternatives:
  - the true matter
  - the reality
  lexicon: LSJ
  rationale: A straightforward rendering of ἀλήθεια. Here it signals candid disclosure,
    so 'the truth' is both literal and idiomatic.
