id: TOB.7.16
reference: Tobit 7:16
source:
  edition: lxx-swete-1909
  text: καὶ ἐποίησεν ὡς εἶπεν καὶ εἰσήγαγεν αὐτὴν ἐκεῖ, καὶ ἔκλαυσεν· καὶ ἀπεδέξατο
    τὰ δάκρυα τῆς θυγατρὸς αὐτῆς καὶ εἶπεν αὐτῇ
  language: Greek
