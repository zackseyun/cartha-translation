theological_decisions:
- issue: Pronoun resolution in τῆς θυγατρὸς αὐτῆς
  chosen_reading: Render contextually as 'his daughter'
  alternative_readings:
  - '''her daughter'' as a strictly formal reflection of the feminine pronoun'
  rationale: The Greek wording as transmitted uses a feminine pronoun, but the narrative
    flow indicates Ragouel is the one acting and consoling Sarah. Rendering 'her daughter'
    in English would suggest a different subject and obscure the scene. This is a
    contextual translation decision driven by coherence in the source narrative, not
    by doctrinal preference.
