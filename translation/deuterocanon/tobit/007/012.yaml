id: TOB.7.12
reference: Tobit 7:12
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν Ῥαγουὴλ Κομίζου αὐτὴν ἀπὸ τοῦ νῦν κατὰ τὴν κρίσιν· σὺ δὲ ἀδελφὸς
    εἶ αὐτῆς, καὶ αὐτή σού ἐστιν· ὁ δὲ ἐλεήμων θεὸς εὐοδώσει ὑμῖν τὰ κάλλιστα.
  language: Greek
