translation:
  text: And Raguel said, “Take her from now on according to the judgment. You are
    her brother, and she is yours. And may the merciful God prosper for you what is
    best.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Brother'' here reflects kinship language and likely means a close relative
      eligible under family custom, not a literal sibling.'
    reason: cultural_note
  - marker: b
    text: Or 'according to the ruling' or 'according to the legal decision.'
    reason: lexical_alternative
  - marker: c
    text: The Greek could also be rendered more literally, 'the merciful God will
      prosper for you the best things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κομίζου
  chosen: Take
  alternatives:
  - Receive
  - Take with you
  - Take into your care
  lexicon: LSJ
  rationale: Middle imperative of κομίζω here functions as an instruction to take/receive
    Sarah as wife. 'Take' is concise and natural in English, while still preserving
    the directness of the imperative.
- source_word: ἀπὸ τοῦ νῦν
  chosen: from now on
  alternatives:
  - henceforth
  - from this time
  lexicon: LSJ
  rationale: Temporal phrase straightforwardly marks the beginning of the new marital
    status. 'From now on' is idiomatic modern English.
- source_word: κατὰ τὴν κρίσιν
  chosen: according to the judgment
  alternatives:
  - according to the ruling
  - according to the legal decision
  - as is decreed
  lexicon: LSJ
  rationale: κρίσις can denote judgment, decision, or legal ruling. Because the context
    is marriage authorization within kinship law/custom, 'according to the judgment'
    preserves the formal/legal nuance without over-specifying the exact juridical
    mechanism.
- source_word: ἀδελφὸς
  chosen: brother
  alternatives:
  - kinsman
  - relative
  lexicon: LSJ
  rationale: The Greek says 'brother,' which in this context reflects close kinship
    rather than a literal sibling relationship. Per translation philosophy, the main
    text keeps the source term rather than flattening it to 'relative'; the kinship
    sense can be clarified in a footnote.
- source_word: ἐλεήμων
  chosen: merciful
  alternatives:
  - compassionate
  - kind
  lexicon: LSJ
  rationale: ἐλεήμων is a standard adjective for one who shows mercy. 'Merciful' is
    the most direct and theologically resonant rendering.
- source_word: εὐοδώσει
  chosen: prosper
  alternatives:
  - grant success to
  - make successful
  - guide prosperously
  lexicon: LSJ
  rationale: εὐοδόω commonly means to prosper or grant success. 'Prosper' fits the
    blessing context and keeps the verbal force compact.
- source_word: τὰ κάλλιστα
  chosen: what is best
  alternatives:
  - the best things
  - the finest things
  - all good things
  lexicon: LSJ
  rationale: The neuter plural superlative can be rendered literally as 'the best
    things,' but idiomatic English in a blessing context is 'what is best,' which
    preserves the sense without sounding wooden.
