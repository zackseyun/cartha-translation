theological_decisions:
- issue: Kinship term in marriage context
  chosen_reading: Retain 'brother' in the main text while understanding it as close-kin
    language, not literal siblinghood.
  alternative_readings:
  - Render as 'kinsman' or 'relative' directly in the main text
  rationale: The Greek witness uses ἀδελφός. Because the text's wording matters and
    the term can function broadly in family/legal contexts, the translation preserves
    'brother' and explains the broader kinship sense in a footnote rather than resolving
    it in the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Gender-accurate over gender-neutral'
- issue: Blessing formula with future indicative
  chosen_reading: 'Render as a prayer-wish in English: ''may the merciful God prosper
    for you what is best.'''
  alternative_readings:
  - '''the merciful God will prosper for you what is best'''
  rationale: Although the Greek uses a future indicative, in blessing contexts English
    often naturally expresses the force as a wish/prayer with 'may.' This preserves
    the speech act better than a flat predictive future.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence'
