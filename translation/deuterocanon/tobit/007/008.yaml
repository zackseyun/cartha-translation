id: TOB.7.8
reference: Tobit 7:8
source:
  edition: lxx-swete-1909
  text: καὶ Ἔδνα ἡ γυνὴ αὐτοῦ καὶ Σάρρα ἡ θυγάτηρ αὐτοῦ ἔκλαυσαν· καὶ ὑπεδέξαντο αὐτοὺς
    προθύμως.
  language: Greek
  pages:
  - 832
