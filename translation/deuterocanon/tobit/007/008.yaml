  - 847
  - 848
  - 849
  - 850
  - 851
  confidence: high
  validation: agree
translation:
  text: And Edna his wife and Sarah his daughter wept, and they welcomed them eagerly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'received them warmly' or 'received them willingly'; the Greek adverb
      emphasizes ready, wholehearted hospitality.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔδνα
  chosen: Edna
  rationale: Personal name transliterated by standard convention rather than translated,
    per project philosophy.
- source_word: ἡ γυνὴ αὐτοῦ
  chosen: his wife
  alternatives:
  - the woman of him
  lexicon: BDAG
  rationale: γυνή here plainly denotes marital relationship, so 'wife' is the natural
    English rendering.
- source_word: Σάρρα
  chosen: Sarah
  rationale: Personal name transliterated in standard English form.
- source_word: ἡ θυγάτηρ αὐτοῦ
  chosen: his daughter
  alternatives:
  - the daughter of him
  lexicon: BDAG
  rationale: Straightforward familial designation; possessive rendered idiomatically
    in English.
- source_word: ἔκλαυσαν
  chosen: wept
  alternatives:
  - cried
  - began to weep
  lexicon: BDAG
  rationale: Aorist verb of weeping; 'wept' is concise and natural without adding
    aspect not explicit in the Greek.
- source_word: ὑπεδέξαντο
  chosen: welcomed
  alternatives:
  - received
  - received hospitably
  lexicon: BDAG
  rationale: The verb can mean receive or welcome; in this hospitality context 'welcomed'
    best conveys the social sense in readable English.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Direct object pronoun referring to the visitors; rendered simply as 'them'.
- source_word: προθύμως
  chosen: eagerly
  alternatives:
  - warmly
  - readily
  - willingly
  lexicon: BDAG
  rationale: The adverb conveys readiness and willing enthusiasm. 'Eagerly' preserves
    that positive warmth better than the flatter 'readily.'
