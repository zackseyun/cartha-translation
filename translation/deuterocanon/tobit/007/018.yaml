id: TOB.7.18
reference: Tobit 7:18
source:
  edition: lxx-swete-1909
  text: καὶ ὀσφρανθήσεται τὸ δαιμόνιον καὶ φεύξεται, καὶ οὐκέτι μὴ φανῇ περὶ αὐτὴν
    τὸν πάντα αἰῶνα. καὶ ὅταν μέλλῃς γίνεσθαι μετʼ αὐτῆς, ἐγέρθητι πρῶτον ἀμφότεροι
    καὶ προσεύξασθε καὶ δεήθητε τοῦ κυρίου τοῦ οὐρανοῦ ἵνα ἔλεος γένηται καὶ σωτηρία
    ἐφʼ ὑμᾶς. καὶ μὴ φοβοῦ, σοί γάρ ἐστιν μεμερισμένη πρὸ τοῦ αἰῶνος, καὶ σὺ αὐτὴν
    σώσεις, καὶ μετὰ σοῦ πορεύσεται, καὶ ὑπολαμβάνω ὅτι ἔσονταί σοι ἐξ αὐτῆς παιδία
    καὶ ἔσονταί σοι ὡς ἀδελφοί· μὴ λόγον ἔχε. καὶ ὅτε ἤκουσεν Τωβίας τῶν λόγων Ῥαφαὴλ
    καὶ ὅτι ἔστιν αὐτῷ ἀδελφὴ ἐκ τοῦ σπέρματος τοῦ οἴκου τοῦ πατρὸς αὐτοῦ, λίαν ἠγάπησεν
    αὐτὴν καὶ ἡ καρδία αὐτοῦ ἐκολλήθη εἰς αὐτήν. αἴνε. καὶ εἶπεν Τωβίας Πατήρ μου
    ἐστιν. καὶ ἀνεπήδησεν Ῥαγουὴλ, καὶ κατεφίλησεν αὐτὸν καὶ ἔκλαυσεν· καὶ εἶπεν αὐτῷ
    Ὁ τοῦ καλοῦ καὶ ἀγαθοῦ ἀνθρώπου· καὶ ἀκούσας ὅτι Τωβεὶτ ἀπώλεσεν τοὺς ὀφθαλμοὺς
    ἑαυτοῦ, ἐλυπήθη καὶ ἔκλαυσεν. καὶ Ἔδνα ἡ γυνὴ αὐτοῦ καὶ Σάρρα ἡ θυγάτηρ αὐτοῦ
    ἔκλαυσαν· καὶ ὑπεδέξαντο αὐτοὺς προθύμως. καὶ ἔθυσαν κριὸν προβάτων, καὶ παρέθηκαν
    ὄψα πλείονα. Εἶπεν δὲ Τωβείας τῷ Ῥαφαὴλ Ἀζαρία ἀδελφέ, λάλησον ὑπὲρ ὧν ἔλεγες
    ἐν τῇ πορείᾳ, καὶ τελεσθήτω τὸ πρᾶγμα. καὶ μετέδωκεν τὸν λόγον τῷ Ῥαγουήλ. καὶ
    εἶπεν Ῥαγουὴλ πρὸς Τωβείαν Φάγε, πίε καὶ ἡδέως γίνου, σοὶ γὰρ καθήκει τὸ παιδίον
    μου λαβεῖν· πλὴν ὑποδείξω τὴν ἀλήθειαν. ἔδωκα τὸ παιδίον μου ἑπτὰ ἀνδράσιν, καὶ
    ὁπότε ἐὰν εἰσεπορεύοντο πρὸς αὐτήν, ἀπέθνησκον ὑπὸ νύκτα. ἀλλὰ τὸ ἀλλὰ τὸ νῦν
    ἔχων ἡδέως γίνου. καὶ εἶπεν Τωβίας Οὐ γεύομαι οὐδὲν ὧδε ἕως ἂν στήσητε καὶ σταθῆτε
    πρὸς μέ. καὶ εἶπεν Ῥαγουὴλ καὶ εἶπεν δὲ Ῥαγουὴλ Κομίζου αὐτὴν ἀπὸ τοῦ νῦν κατὰ
    τὴν κρίσιν· σὺ δὲ ἀδελφὸς εἰ αὐτῆς, καὶ αὐτή σου ἐστιν· ὁ δὲ ἐλεήμων θεὸς εὐοδώσει
    ὑμῖν τὰ κάλλιστα. καὶ ἐκάλεσεν Σάρραν τὴν θυγατέρα αὐτοῦ, καὶ λαβὼν τῆς χειρὸς
    αὐτῆς παρέδωκεν αὐτὴν Τωβείᾳ γυναῖκα, καὶ εἶπεν Ἰδοὺ κατὰ τὸν νόμον Μωυσέως κομίζου
    αὐτὴν καὶ ἄπαγε πρὸς τὸν πατέρα σου· καὶ εὐλόγησεν αὐτούς. καὶ ἐκάλεσεν Ἔδναν
    τὴν γυναῖκα αὐτοῦ· καὶ λαβὼν βιβλίον ἔγραψεν συνγραφήν καὶ ἐσφραγίσαντο. καὶ ἤρξαντο
    ἐσθίειν. καὶ ἐκά- λεσεν Ραγουὴλ Ἔδναν τὴν γυναῖκα αὐτοῦ καὶ εἶπεν αὐτῇ Ἀδελφή,
    ἑτοίμασον τὸ ἕτερον ταμεῖον καὶ εἴσαγε αὐτήν. καὶ ἐποίησεν ὡς εἶπεν καὶ εἰσήγαγεν
    αὐτὴν ἐκεῖ, καὶ ἔκλαυσεν· καὶ ἀπεδέ- ξατο τὰ δάκρυα τῆς θυγατρὸς αὐτῆς καὶ εἶπεν
    αὐτῇ Θάρσει, τέκνον, ὁ κύριος τοῦ οὐρανοῦ καὶ τῆς γῆς δῴη σοι χάριν ἀντὶ τῆς λύπης
    σου ταύτης· θάρσει, θύγατερ.
  language: Greek
