translation:
  text: And Raguel called Edna his wife and said to her, “Sister, prepare the other
    room and bring her in there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the other chamber.” The Greek ταμεῖον can refer to an inner room or
      chamber.
    reason: lexical_alternative
  - marker: b
    text: “Sister” is a literal form of address to his wife, not a statement of biological
      relationship.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀδελφή
  chosen: Sister
  alternatives:
  - My sister
  - Dear sister
  lexicon: LSJ
  rationale: Direct vocative of address to his wife. 'Sister' preserves the literal
    familial-style address common in Semitic/ancient usage without paraphrasing it
    away.
- source_word: ἑτοίμασον
  chosen: prepare
  alternatives:
  - make ready
  - get ready
  lexicon: LSJ
  rationale: Imperative meaning to make something ready. 'Prepare' is natural modern
    English and sufficiently formal.
- source_word: τὸ ἕτερον ταμεῖον
  chosen: the other room
  alternatives:
  - the other chamber
  - the second room
  lexicon: LSJ
  rationale: ταμεῖον can denote an inner room, chamber, or storeroom. In this marriage
    context, 'room' is the clearest idiomatic rendering; 'other' reflects ἕτερον straightforwardly.
- source_word: εἴσαγε
  chosen: bring her in there
  alternatives:
  - lead her in there
  - take her in there
  lexicon: LSJ
  rationale: Imperative of bringing/leading someone into a place. 'Bring her in there'
    fits the English flow and preserves the directional sense toward the prepared
    room.
