theological_decisions:
- issue: Speaker identification versus possessive reference
  chosen_reading: 'Translate the Greek as written: Edna said to his wife.'
  alternative_readings:
  - Raguel said to his wife Edna
  - Raguel said to Edna his wife
  rationale: The Zone 1 Greek explicitly names Ἔδνα as the speaker and then says 'to
    his wife,' which is awkward in context and differs from the Semitic parallel,
    where Raguel speaks to Edna his wife. Because the project prioritizes the Greek
    source for deuterocanonical books, the main text follows the Greek wording rather
    than silently emending to the smoother Semitic reading. The contextual alternative
    is preserved in a footnote as likely reflecting a variant or corruption behind
    the Greek tradition.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    source uncertainty honestly.
