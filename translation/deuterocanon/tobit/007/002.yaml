translation:
  text: And Edna said to his wife, “How much the young man Tobit resembles my nephew!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text reads, 'Edna said to his wife,' though the Semitic parallel
      has Raguel speaking to Edna his wife. The context may suggest a textual or transmission
      irregularity.
    reason: textual_variant
  - marker: b
    text: Or 'my cousin.' The Greek kinship term can be used more broadly for a close
      male relative, though 'nephew' is the more specific sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν
  chosen: And ... said
  alternatives:
  - and he said
  - then he said
  lexicon: BDAG
  rationale: Standard narrative conjunction plus speech verb; simple past in English
    best fits the flow.
- source_word: Ἔδνα
  chosen: Edna
  rationale: Personal name transliterated per project philosophy.
- source_word: τῇ γυναικὶ αὐτοῦ
  chosen: to his wife
  alternatives:
  - to his woman
  - to his spouse
  lexicon: BDAG
  rationale: γυνή here clearly means wife, not merely woman. The possessive αὐτοῦ
    is retained.
- source_word: Ὡς
  chosen: How much
  alternatives:
  - How
  - What a
  - How very
  lexicon: BDAG
  rationale: Exclamatory ὡς introduces a statement of strong resemblance. 'How much'
    captures the idiomatic force in natural English better than a wooden 'How'.
- source_word: ὅμοιος
  chosen: resembles
  alternatives:
  - is like
  - is similar to
  lexicon: BDAG
  rationale: Predicate adjective with dative of comparison expresses likeness. Rendering
    the clause verbally as 'resembles' is idiomatic English while preserving the sense.
- source_word: ὁ νεανίσκος
  chosen: the young man
  alternatives:
  - the youth
  - the young fellow
  lexicon: BDAG
  rationale: νεανίσκος denotes a young man; this is clear, natural modern English.
- source_word: Τωβεὶτ
  chosen: Tobit
  alternatives:
  - Tobit/Tobias
  rationale: The Greek form points to the personal name Tobit. Standard English transliteration
    is used.
- source_word: τῷ ἀνεψιῷ μου
  chosen: my nephew
  alternatives:
  - my kinsman
  - my cousin
  lexicon: BDAG
  rationale: ἀνεψιός can denote nephew or cousin in broader kinship usage, but the
    parallel Semitic phrasing refers to 'Tobi my brother,' implying the younger man
    is recognized through resemblance to a close family relation. In context, 'my
    nephew' best fits the Greek's more specific kinship term and the narrative logic
    that Raguel is identifying Tobiah as related through Tobit.
