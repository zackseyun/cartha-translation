translation:
  text: And they began to eat. Then Raguel called Edna his wife and said to her, “Sister,
    prepare the other room and bring her in.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Sister” is a literal kinship form of address to his wife, preserving the
      Greek wording; it functions idiomatically as an affectionate domestic address.
    reason: cultural_note
  - marker: b
    text: Or “the other chamber.” The Greek ταμεῖον can refer to an inner room or
      chamber.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο ἐσθίειν
  chosen: they began to eat
  alternatives:
  - they began eating
  - they began to dine
  lexicon: BDAG
  rationale: 'A straightforward ingressive construction: ἄρχομαι + infinitive marks
    the beginning of the action. ''Eat'' is the plain sense of ἐσθίω; ''dine'' is
    possible in context but slightly more interpretive.'
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: The verb simply indicates that Raguel called to Edna. 'Summoned' would
    sound more formal or authoritative than the domestic context requires.
- source_word: Ἀδελφή
  chosen: Sister
  alternatives:
  - My sister
  lexicon: BDAG
  rationale: Used here as a familiar form of address to one's wife, reflecting Semitic-style
    kinship language. 'Sister' preserves the source wording more transparently than
    replacing it with a modern equivalent.
- source_word: ἑτοίμασον
  chosen: prepare
  alternatives:
  - make ready
  - get ready
  lexicon: BDAG
  rationale: '''Prepare'' is natural modern English and closely matches the imperative
    sense.'
- source_word: τὸ ἕτερον ταμεῖον
  chosen: the other room
  alternatives:
  - the other chamber
  - the other inner room
  lexicon: LSJ
  rationale: ταμεῖον can denote an inner room, chamber, or storeroom. In this wedding-night
    context, 'room' is the clearest natural rendering; 'other' reflects ἕτερον.
- source_word: εἴσαγε
  chosen: bring her in there
  alternatives:
  - lead her in
  - take her in
  lexicon: BDAG
  rationale: The imperative means to bring or lead someone inside. Adding 'there'
    makes explicit the motion into the prepared room, which is implicit from the context
    and object.
- source_word: αὐτήν
  chosen: her
  lexicon: BDAG
  rationale: The feminine pronoun most naturally refers to Sarah in context.
