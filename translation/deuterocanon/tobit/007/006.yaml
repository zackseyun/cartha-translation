translation:
  text: And Raguel sprang up, kissed him, and wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek verb behind 'kissed him warmly' is stronger than a simple 'kissed'
      and suggests marked affection.
    reason: lexical_alternative
  - marker: b
    text: The parallel Semitic reference supplied here is a much later back-translation
      and does not control the wording of this verse; the translation is anchored
      in the Greek witness.
    reason: textual_variant
lexical_decisions:
- source_word: ἀνεπήδησεν
  chosen: sprang up
  alternatives:
  - jumped up
  - rose up
  lexicon: LSJ
  rationale: The verb conveys a sudden, eager rising or leaping up. 'Sprang up' preserves
    the emotional immediacy better than the flatter 'rose up' while remaining natural
    English.
- source_word: κατεφίλησεν
  chosen: kissed him warmly
  alternatives:
  - kissed him
  - embraced and kissed him
  - kissed him affectionately
  lexicon: LSJ
  rationale: The compound verb intensifies the act of kissing, often implying affection
    or repeated/warm kissing. 'Kissed him warmly' brings out that force without overtranslating
    into multiple actions not stated in the Greek.
- source_word: ἔκλαυσε
  chosen: wept
  alternatives:
  - cried
  lexicon: LSJ
  rationale: '''Wept'' is slightly more literary and precise for emotional tears in
    narrative, fitting the solemn affectionate reunion scene.'
- source_word: Ῥαγουὴλ
  chosen: Raguel
  alternatives:
  - Reuel
  lexicon: Greek proper-name tradition
  rationale: Personal names are transliterated. 'Raguel' follows the Greek form Ῥαγουήλ
    represented in the source witness.
- source_word: αὐτόν
  chosen: him
  lexicon: Greek grammar
  rationale: The pronoun's referent in context is Tobias/Tobit’s son, addressed and
    received by Raguel. 'Him' is the straightforward contextual rendering.
