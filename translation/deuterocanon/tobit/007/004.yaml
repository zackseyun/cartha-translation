translation:
  text: And he said to them, “Do you know Tobit our brother?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our kinsman' / 'our relative.' The Greek says 'our brother,' likely
      as a kinship term rather than for a literal sibling.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γινώσκετε
  chosen: Do you know
  alternatives:
  - Do you recognize
  - Are you acquainted with
  lexicon: BDAG
  rationale: Present active indicative/interrogative force in context asks about personal
    acquaintance. 'Do you know' is the most natural modern English rendering and fits
    the social inquiry.
- source_word: Τωβεὶτ
  chosen: Tobit
  alternatives:
  - Tobit/Tobit spelled Tobeit in transliteration
  rationale: Personal names are transliterated by standard English convention. 'Tobit'
    is the established and readable form for Τωβεὶτ.
- source_word: τὸν ἀδελφὸν ἡμῶν
  chosen: our brother
  alternatives:
  - our kinsman
  - our fellow countryman
  lexicon: BDAG
  rationale: ἀδελφός can denote literal brother, kinsman, or fellow member of a people.
    In this context, with Tobit not being the speaker's literal sibling, the phrase
    likely expresses kinship/clan solidarity. The Greek nevertheless uses 'brother,'
    and the translation preserves that familial idiom rather than flattening it to
    'kinsman.'
