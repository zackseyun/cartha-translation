translation:
  text: And Raguel asked them, “Where are you from, brothers?” And they said to him,
    “We are from the sons of Naphtali, the captives in Nineveh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the descendants of Naphtali” or “from the tribe of Naphtali.” The
      Greek literally says “from the sons of Naphtali.”
    reason: lexical_alternative
  - marker: b
    text: Or “the exiles in Nineveh.” The Greek says “the captives,” emphasizing their
      deported status.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρώτησεν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: Standard narrative verb for asking a question; 'asked' is natural modern
    English and adequately reflects the Greek without overformalizing.
- source_word: Πόθεν ἐστέ
  chosen: Where are you from
  alternatives:
  - From where are you?
  - Where do you come from?
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the Greek question about origin. 'Where
    are you from' preserves the sense cleanly.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - friends
  - kinsmen
  lexicon: BDAG
  rationale: The Greek directly says 'brothers.' In this context it functions as a
    warm form of address, but the translation philosophy prefers gender-accurate renderings
    where the source is masculine. No contextual pressure requires neutralization.
- source_word: Ἐκ τῶν υἱῶν Νεφθαλεὶ
  chosen: from the sons of Naphtali
  alternatives:
  - from the descendants of Naphtali
  - from the tribe of Naphtali
  lexicon: BDAG
  rationale: Literally 'from the sons of Naphtali.' This can denote tribal descent.
    The more literal phrasing is retained in the main text to preserve the genealogical/tribal
    flavor, while still being understandable in English.
- source_word: τῶν αἰχμαλώτων
  chosen: the captives
  alternatives:
  - the exiles
  - those taken captive
  lexicon: BDAG
  rationale: The noun denotes people taken captive. 'Captives' is the most direct
    rendering from the Greek witness. 'Exiles' is possible in context, but slightly
    smooths the coercive force of the term.
- source_word: ἐκ Νινευή
  chosen: in Nineveh
  alternatives:
  - from Nineveh
  lexicon: BDAG
  rationale: 'Although the preposition is repeated (''from Nineveh''), in English
    the phrase modifies ''the captives'' more naturally as location: ''the captives
    in Nineveh.'' This preserves the sense that these Naphtalites are among those
    living there in captivity.'
