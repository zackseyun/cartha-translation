    text: ויאמר טוביה לא אכל ולא אשתה עד אשר תתננה לי לאשה ויאמר רעואל קח אותה כי
      היא אחותך ואתה אחיה הנה נתתיה לך לאשה כדת משה וישראל ויי אלהי השמים יושיבכם
