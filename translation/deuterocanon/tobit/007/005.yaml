translation:
  text: They said, “He is alive and well.” And Tobiah said, “He is my father.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''lives and is healthy''; rendered idiomatically as ''is alive and
      well.'''
    reason: lexical_alternative
  - marker: b
    text: Traditional English forms often use 'Tobias' here instead of 'Tobiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: ζῇ
  chosen: is alive
  alternatives:
  - lives
  lexicon: BDAG
  rationale: The present tense of ζάω here answers an implied inquiry about Tobit's
    condition. English idiom prefers 'is alive' over the more wooden 'lives' in this
    conversational context.
- source_word: ὑγιαίνει
  chosen: is well
  alternatives:
  - is in good health
  - is healthy
  lexicon: BDAG
  rationale: ὑγιαίνω commonly means to be healthy or sound. 'Is well' is natural modern
    English and fits the paired response 'alive and well' without overstating beyond
    the Greek.
- source_word: Πατήρ μου
  chosen: my father
  alternatives:
  - father of me
  lexicon: BDAG
  rationale: Straightforward possessive construction. English requires the natural
    possessive form 'my father.'
- source_word: ἐστιν
  chosen: is
  alternatives:
  - he is
  lexicon: BDAG
  rationale: The copula identifies the person just mentioned. In English, 'He is my
    father' is explicit and natural after the Greek word order.
- source_word: Τωβίας
  chosen: Tobiah
  alternatives:
  - Tobias
  rationale: The Greek form Τωβίας corresponds to the name commonly rendered 'Tobiah'
    when transliterated in a Semitic-aware way. This follows the project's preference
    to transliterate names rather than preserve traditional Latinate forms where not
    required.
