id: TOB.2.2
reference: Tobit 2:2
source:
  edition: lxx-swete-1909
  text: καὶ ἐθεασάμην ὄψα πολλά, καὶ εἶπα τῷ υἱῷ μου Βάδισον 2 καὶ ἄγαγε ὃν ἐὰν εὕρῃς
    τῶν ἀδελφῶν ἡμῶν ἐνδεὴς ὃς μέμνηται τοῦ κυρίου, καὶ ἰδοὺ μένω σε.
  language: Greek
  pages:
  - 835
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: וילך טוביה בני לבקש מהעניים וישב מר נפש ויאמר אלי אבי אחד מאחינו נהרג והושלך
      ברחוב העיר.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 2:2
translation:
  text: And I saw much food, and I said to my son, “Go and bring whichever one of
    our brothers you may find in need, who remembers the Lord; and look, I am waiting
    for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “many dishes” or “much meat”; the Greek term refers to prepared food
      served with a meal.
    reason: lexical_alternative
  - marker: b
    text: “Our brothers” here means fellow members of Tobit’s people, not only literal
      siblings.
    reason: cultural_note
  - marker: c
    text: The closing words are awkward in the Greek manuscript tradition; the sense
      is that Tobit remains behind waiting for his son to return.
    reason: textual_variant
lexical_decisions:
- source_word: ἐθεασάμην
  chosen: I saw
  alternatives:
  - I looked at
  - I beheld
  lexicon: LSJ
  rationale: Aorist middle of θεάομαι, here functioning simply as a perception verb.
    'I saw' is natural modern English and fits the narrative sequence without unnecessary
    archaism.
- source_word: ὄψα πολλά
  chosen: much food
  alternatives:
  - many dishes
  - much meat
  - many provisions
  lexicon: LSJ
  rationale: ὄψον/ὄψα commonly refers to cooked food, relish, or dishes eaten with
    bread; in context of a meal being prepared, 'much food' best captures the sense
    without over-specifying the menu. 'Many dishes' is possible but slightly more
    interpretive.
- source_word: Βάδισον
  chosen: Go
  alternatives:
  - Walk
  - Be on your way
  lexicon: LSJ
  rationale: Imperative of βαδίζω. In idiomatic English direct speech, 'Go' conveys
    the command naturally; 'Walk' would be too literal and misleading.
- source_word: ἄγαγε
  chosen: bring
  alternatives:
  - lead
  - bring here
  lexicon: LSJ
  rationale: Aorist imperative of ἄγω. In this context Tobit instructs his son to
    bring a needy fellow Israelite to the meal, so 'bring' is the clearest English
    equivalent.
- source_word: ὃν ἐὰν εὕρῃς
  chosen: whichever one ... you may find
  alternatives:
  - whoever ... you find
  - anyone ... you find
  lexicon: LSJ
  rationale: The relative with ἐάν expresses indefiniteness. 'Whichever one ... you
    may find' preserves that open-ended sense while fitting the singular construction.
- source_word: τῶν ἀδελφῶν ἡμῶν
  chosen: of our brothers
  alternatives:
  - of our brethren
  - of our people
  - of our kinsmen
  lexicon: LSJ
  rationale: ἀδελφοί here refers to fellow Israelites/community members. Per project
    philosophy, the masculine familial term is retained as 'brothers' rather than
    neutralized, while the broader communal sense is carried by context.
- source_word: ἐνδεής
  chosen: in need
  alternatives:
  - poor
  - needy
  - lacking
  lexicon: LSJ
  rationale: ἐνδεής denotes being in want or need. 'In need' is clear modern English
    and avoids narrowing the term to financial poverty alone, though poverty is certainly
    included.
- source_word: ὃς μέμνηται τοῦ κυρίου
  chosen: who remembers the Lord
  alternatives:
  - who is mindful of the Lord
  - who remembers the LORD
  lexicon: LSJ
  rationale: μέμνηται means 'remembers' or 'is mindful of.' 'Who remembers the Lord'
    is a transparent rendering of the Greek and preserves the pious criterion Tobit
    states. 'Lord' follows the project's default for κύριος.
- source_word: ἰδοὺ μένω σε
  chosen: look, I am waiting for you
  alternatives:
  - see, I am staying for you
  - behold, I will wait for you
  lexicon: LSJ
  rationale: The transmitted Greek is somewhat awkward, but the sense in context is
    that Tobit will wait for his son before proceeding. The Semitic parallel supports
    a narrative in which the son goes out and the father remains awaiting him. 'Look,
    I am waiting for you' gives a coherent rendering while staying close to the Greek
    wording.
