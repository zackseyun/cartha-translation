theological_decisions:
- issue: Rendering κύριος in a deuterocanonical narrative piety formula
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The Greek reads τοῦ κυρίου. Following project doctrine, κύριος is normally
    rendered 'Lord.' Since the Greek text itself has κύριος rather than the Hebrew
    divine name, 'the Lord' is preferred in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Scope of ἀδελφῶν ἡμῶν
  chosen_reading: our brothers
  alternative_readings:
  - our people
  - our fellow Israelites
  rationale: The phrase likely refers to fellow members of Tobit's covenant community,
    not merely biological brothers. Still, the source uses the masculine kinship term,
    and project philosophy prefers gender-accurate rendering rather than flattening
    to a neutral collective in the main text.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
