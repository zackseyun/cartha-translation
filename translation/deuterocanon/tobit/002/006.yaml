id: TOB.2.6
reference: Tobit 2:6
source:
  edition: lxx-swete-1909
  text: καὶ ἐμνήσθην τῆς προφητείας Ἀμὼς, καθὼς εἶπεν Στραφήσονται αἱ ἑορταὶ ὑμῶν
    εἰς πένθος, καὶ πᾶσαι αἱ εὐφροσύναι ὑμῶν εἰς θρῆνον. καὶ ἔκλαυσα.
  language: Greek
  pages:
  - 836
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ובעת ההיא חנה אשתי עושה מלאכה לנשים ואורגת יריעות לאחרים ומקבלת שכרה ויהי
      היום ויתנו לה גדי אחד בשכרה ואשמע קול הגדי צועק ואומר לה מאין בא הגדי הזה השמרי
      בנפשו שלא יהיה גנוב.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 2:6
translation:
  text: And I remembered the prophecy of Amos, as he said, “Your festivals will be
    turned into mourning, and all your rejoicing into lamentation.” And I wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The quoted line echoes Amos 8:10 in the Septuagint tradition.
    reason: cross_reference
lexical_decisions:
- source_word: ἐμνήσθην
  chosen: I remembered
  alternatives:
  - I recalled
  - it came to mind
  lexicon: BDAG
  rationale: Aorist passive/deponent of μιμνῄσκομαι functions naturally as active
    in English. 'I remembered' is the most direct and idiomatic rendering.
- source_word: προφητείας
  chosen: prophecy
  alternatives:
  - oracle
  - prophetic word
  lexicon: BDAG
  rationale: The singular refers to the prophetic utterance being cited from Amos.
    'Prophecy' is clear, standard, and preserves the scriptural register without overtechnicality.
- source_word: Στραφήσονται
  chosen: will be turned
  alternatives:
  - will turn
  - will be changed
  lexicon: BDAG
  rationale: 'Future passive better supports an English passive here: the festivals
    undergo a reversal. ''Will be turned'' preserves the sense of divinely effected
    transformation found in the prophetic citation.'
- source_word: ἑορταὶ
  chosen: festivals
  alternatives:
  - feasts
  - festal celebrations
  lexicon: BDAG
  rationale: '''Festivals'' communicates communal religious celebrations in accessible
    modern English. ''Feasts'' is possible but can sound narrower or more archaic.'
- source_word: πένθος
  chosen: mourning
  alternatives:
  - grief
  - sorrow
  lexicon: BDAG
  rationale: In prophetic context this denotes public mourning rather than merely
    inward sadness. 'Mourning' best matches the reversal of festivals.
- source_word: εὐφροσύναι
  chosen: rejoicing
  alternatives:
  - joys
  - merriment
  - gladness
  lexicon: BDAG
  rationale: Plural noun denotes occasions or expressions of joy. 'Rejoicing' captures
    both the emotional and celebratory sense in natural English.
- source_word: θρῆνον
  chosen: lamentation
  alternatives:
  - lament
  - wailing
  lexicon: BDAG
  rationale: The term points to formal lament rather than generic sadness. 'Lamentation'
    preserves the elevated, prophetic tone and pairs well with 'mourning.'
- source_word: ἔκλαυσα
  chosen: I wept
  alternatives:
  - I cried
  lexicon: BDAG
  rationale: Simple aorist narrative verb. 'I wept' is concise, dignified, and fits
    the solemn context better than the more colloquial 'I cried'.
