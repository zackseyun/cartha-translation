theological_decisions:
- issue: Rendering the embedded citation from Amos
  chosen_reading: 'Translate as a direct prophetic quotation addressed to ''you''
    plural: ''Your festivals will be turned into mourning, and all your rejoicing
    into lamentation.'''
  alternative_readings:
  - A less formal rendering such as 'your feasts shall become grief, and all your
    joys lament'
  rationale: The Greek explicitly introduces a remembered prophecy and then quotes
    it. Preserving the direct quotation maintains the intertextual force and Tobit's
    self-location within Israel's prophetic warnings without importing additional
    interpretation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition.'
