id: TOB.2.12
reference: Tobit 2:12
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστελλεν τοῖς κυρίοις, καὶ ἀπέδωκαν αὐτῇ καὶ αὐτοὶ τὸν μισθόν, προσδόντες
    καὶ ἔριφον.
  language: Greek
  pages:
  - 837
  confidence: high
  validation: agree
translation:
  text: And she would send it to the owners, and they also paid her wages, adding
    a young goat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'masters.' The Greek says 'lords/masters' (κυρίοις), here referring to
      those for whom she worked.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστελλεν
  chosen: would send
  alternatives:
  - sent
  lexicon: BDAG
  rationale: Imperfect tense suggests customary or repeated action in the narrative
    setting, so 'would send' preserves the ongoing/habitual sense better than a simple
    past.
- source_word: τοῖς κυρίοις
  chosen: to the owners
  alternatives:
  - to the masters
  - to the lords
  lexicon: BDAG
  rationale: In this domestic labor context, κύριοι refers to those for whom she worked
    and to whom the finished work was returned. 'Owners' fits the economic setting
    better than the more elevated 'lords'; 'masters' is possible but can sound overly
    harsh or ambiguous in modern English.
- source_word: ἀπέδωκαν
  chosen: paid
  alternatives:
  - gave back
  - returned
  lexicon: BDAG
  rationale: Although the verb can mean 'give back' or 'repay,' the object τὸν μισθόν
    makes the sense specifically payment of wages. 'Paid' is the most natural and
    precise English rendering here.
- source_word: τὸν μισθόν
  chosen: wages
  alternatives:
  - pay
  - hire
  lexicon: BDAG
  rationale: μισθός here denotes compensation for labor. 'Wages' clearly conveys earned
    payment in a work context.
- source_word: προσδόντες
  chosen: adding
  alternatives:
  - giving in addition
  - besides giving
  lexicon: BDAG
  rationale: The participle indicates something given in addition to the wages. 'Adding'
    is concise and preserves the supplementary sense.
- source_word: ἔριφον
  chosen: a young goat
  alternatives:
  - a kid
  lexicon: LSJ
  rationale: ἔριφος denotes a young goat. 'Young goat' is clearer for modern readers
    than 'kid,' which can be misunderstood.
