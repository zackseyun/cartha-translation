id: TOB.2.13
reference: Tobit 2:13
source:
  edition: lxx-swete-1909
  text: ὅτε δὲ ἦλθεν πρὸς μέ, ἤρξατο κράζειν· καὶ εἶπα αὐτῇ Πόθεν τὸ ἔριφον; μὴ κλεμμάιον
    ἐστίν; ἀπόδος αὐτὸ τοῖς κυρίοις· οὐ γὰρ θεμιτὸν ἐστιν φαγεῖν κλεψιμαῖον.
  language: Greek
  pages:
  - 837
  confidence: high
  validation: agree
translation:
  text: But when she came to me, she began to cry out, and I said to her, “Where is
    the young goat from? Is it stolen? Give it back to its owners, for it is not lawful
    to eat what is stolen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἔριφον can also be rendered 'kid,' that is, a young goat.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο κράζειν
  chosen: began to cry out
  alternatives:
  - began to shout
  - began to protest
  - began to cry aloud
  lexicon: BDAG
  rationale: The construction marks the onset of loud speech. 'Cry out' preserves
    the intensity without over-specifying whether the tone is anger, grief, or protest.
- source_word: Πόθεν τὸ ἔριφον;
  chosen: Where is the young goat from?
  alternatives:
  - Where did the young goat come from?
  - From where is the kid?
  lexicon: LSJ
  rationale: πόθεν asks about source or origin. ἔριφον denotes a young goat/kid. 'Young
    goat' is natural modern English while preserving the animal specified.
- source_word: ἔριφον
  chosen: young goat
  alternatives:
  - kid
  lexicon: LSJ
  rationale: Although 'kid' is concise, it can be misunderstood in modern English.
    'Young goat' is clearer for contemporary readers.
- source_word: μὴ κλεμμάιον ἐστίν;
  chosen: Is it stolen?
  alternatives:
  - Surely it is stolen?
  - Is it a stolen thing?
  lexicon: LSJ
  rationale: The noun refers to stolen property. English idiom prefers the predicate
    adjective 'stolen.' The μή in context conveys suspicion in question form; 'Is
    it stolen?' communicates that naturally.
- source_word: ἀπόδος αὐτὸ τοῖς κυρίοις
  chosen: Give it back to its owners
  alternatives:
  - Return it to its masters
  - Give it back to the owners
  lexicon: LSJ
  rationale: ἀπόδος is a command to return or give back. κυρίοις here refers to those
    who own the animal, not to 'lords' in a theological sense. 'Owners' is the clearest
    contextual rendering.
- source_word: θεμιτὸν
  chosen: lawful
  alternatives:
  - permitted
  - rightful
  - acceptable
  lexicon: LSJ
  rationale: The term denotes what is permitted by custom or law. 'Lawful' best preserves
    the moral-legal force in Tobit's scruple.
- source_word: φαγεῖν κλεψιμαῖον
  chosen: to eat what is stolen
  alternatives:
  - to eat stolen food
  - to eat stolen property
  lexicon: LSJ
  rationale: The infinitive plus adjective/noun phrase is rendered idiomatically in
    English. 'What is stolen' preserves the broad sense without awkwardness.
