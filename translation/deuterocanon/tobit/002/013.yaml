theological_decisions:
- issue: Moral force of θεμιτὸν in Tobit's objection
  chosen_reading: for it is not lawful to eat what is stolen
  alternative_readings:
  - for it is not right to eat what is stolen
  - for it is not permitted to eat stolen food
  rationale: The verse expresses Tobit's concern in moral-legal terms rather than
    merely personal distaste. 'Lawful' preserves that ethical weight without importing
    a specific later legal system.
