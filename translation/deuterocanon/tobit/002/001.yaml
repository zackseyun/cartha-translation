id: TOB.2.1
reference: Tobit 2:1
source:
  edition: lxx-swete-1909
  text: ν Ὅτε δὲ κατῆλθον εἰς τὸν οἶκόν μου καὶ ἀπεδόθη μοι Ἄννα ἡ 1 II γυνή μου καὶ
    Τωβίας ὁ υἱός μου, ἐν τῇ πεντηκοστῇ ἑορτῇ ᾗ ἐστιν ἁγία ἑπτὰ ἑβδομάδων, ἐγενήθη
    ἄριστον καλὸν μοι· ἀνέπεσα τοῦ φαγεῖν.
  language: Greek
  pages:
  - 835
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ובשנה ההיא בחג השבועות הכינותי [בביתי] סעודה גדולה וישבתי על שלחני לאכול
      ואמרתי לטוביה בני לך והבא לנו מאחינו העניים לאכול עמנו ואני וכל היושבים עמי
      לא נאכל עד בואך.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
