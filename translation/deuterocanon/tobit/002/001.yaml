theological_decisions:
- issue: Rendering of the festival name πεντηκοστή in a deuterocanonical Jewish context
  chosen_reading: the feast of Pentecost ... the holy feast of seven weeks
  alternative_readings:
  - the Feast of Weeks
  rationale: The Greek text uses πεντηκοστή and then glosses it with 'holy [feast]
    of seven weeks.' Keeping 'Pentecost' honors the Greek witness, while the explanatory
    phrase prevents a later Christian-only hearing and preserves the Jewish festal
    reference.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; readable modern English'
- issue: Name form for Τωβίας
  chosen_reading: Tobiah
  alternative_readings:
  - Tobias
  rationale: The project philosophy prefers transliterated names rather than inherited
    English traditional forms when the source supports it. 'Tobiah' also coheres better
    with the Semitic parallel tradition than the Latinate 'Tobias.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
