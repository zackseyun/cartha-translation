      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 2:1
translation:
  text: Now when I had come down to my house, and Anna my wife and Tobiah my son were
    restored to me, on the feast of Pentecost, which is the holy feast of seven weeks,
    a fine meal was prepared for me, and I reclined to eat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Feast of Weeks.' The Greek says 'Pentecost' and immediately explains
      it as 'the holy feast of seven weeks.'
    reason: alternative_reading
  - marker: b
    text: The Greek literally says 'I reclined to eat,' reflecting the ancient custom
      of reclining at table.
    reason: cultural_note
  - marker: c
    text: The parallel Semitic tradition for this verse is fuller, adding Tobiah's
      being sent to invite a poor kinsman to the meal; that material is not present
      in the shorter Greek wording translated here.
    reason: textual_variant
lexical_decisions:
- source_word: κατῆλθον
  chosen: had come down
  alternatives:
  - came
  - returned
  lexicon: BDAG
  rationale: The verb literally means 'went/came down.' In context it marks Tobit's
    return home; 'had come down' preserves the directional nuance of the Greek better
    than simply 'returned,' while still reading naturally in English.
- source_word: οἶκόν
  chosen: house
  alternatives:
  - home
  lexicon: BDAG
  rationale: οἶκος can mean either the physical house or household/home. 'House' keeps
    closer to the Greek wording, while the possessive 'my' still conveys the personal
    sense.
- source_word: ἀπεδόθη μοι
  chosen: were restored to me
  alternatives:
  - was given back to me
  - was returned to me
  lexicon: BDAG
  rationale: The passive of ἀποδίδωμι means 'was given back/returned.' Because both
    Anna and Tobiah are included after the singular verb by sense, English plural
    'were restored to me' best captures the family-reunion sense. This also aligns
    with the broader narrative context of return after separation.
- source_word: Ἄννα ἡ γυνή μου
  chosen: Anna my wife
  alternatives:
  - Hannah my wife
  lexicon: BDAG
  rationale: The proper name is transliterated as 'Anna' from the Greek form Ἄννα.
    'My wife' directly renders ἡ γυνή μου.
- source_word: Τωβίας
  chosen: Tobiah
  alternatives:
  - Tobias
  lexicon: BDAG
  rationale: Names are transliterated rather than conformed to traditional Latinate
    forms. 'Tobiah' reflects the Semitic name more transparently and is supported
    by the parallel Semitic tradition.
- source_word: πεντηκοστῇ ἑορτῇ
  chosen: the feast of Pentecost
  alternatives:
  - the Feast of Weeks
  - Pentecost
  lexicon: BDAG
  rationale: πεντηκοστή is the Greek designation later familiar as 'Pentecost.' Because
    the verse itself immediately explains it as the holy feast of seven weeks, retaining
    'Pentecost' preserves the Greek term while the apposition clarifies its Jewish
    festal identity.
- source_word: ἁγία ἑπτὰ ἑβδομάδων
  chosen: the holy feast of seven weeks
  alternatives:
  - the sacred feast of seven weeks
  - the holy festival of seven weeks
  lexicon: LEH
  rationale: This explanatory phrase identifies Pentecost with the Feast of Weeks.
    Rendering it explicitly as 'the holy feast of seven weeks' preserves the appositional
    explanation in the Greek.
- source_word: ἐγενήθη ἄριστον καλὸν μοι
  chosen: a fine meal was prepared for me
  alternatives:
  - a good dinner was made for me
  - an excellent meal came to be for me
  lexicon: BDAG
  rationale: Literally, 'a good meal came to be for me.' Idiomatic English prefers
    a passive-like expression. 'Fine meal' preserves καλόν without sounding wooden;
    'prepared for me' conveys the event naturally.
- source_word: ἀνέπεσα
  chosen: I reclined
  alternatives:
  - I sat down
  - I lay back
  lexicon: BDAG
  rationale: At ancient meals, ἀναπίπτω commonly refers to reclining at table. 'I
    reclined' preserves the cultural practice more accurately than the generic 'sat
    down.'
- source_word: τοῦ φαγεῖν
  chosen: to eat
  alternatives:
  - for eating
  - to begin eating
  lexicon: BDAG
  rationale: 'The articular infinitive here expresses purpose: he reclined in order
    to eat. ''To eat'' is the most natural English rendering.'
