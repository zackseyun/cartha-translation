id: TOB.2.10
reference: Tobit 2:10
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ᾔδειν ὅτι στρουθία ἐν τῷ τοίχῳ ἐστίν· καὶ τῶν ὀφθαλμῶν μου ἀνεῳγότων,
    ἀφώδευσαν τὰ στρουθία θερμὰ εἰς τοὺς ὀφθαλμούς μου, καὶ ἐγενήθη λευκώ- ματα εἰς
    τοὺς ὀφθαλμούς μου· καὶ ἐπορεύθην πρὸς ἰατρούς, καὶ οὐκ ὠφέλησάν με· Ἀχειαχάρος
    δὲ ἔτρεφέν με ἕως οὗ ἐπορεύθην εἰς τὴν Ἐλυμαΐδα.
  language: Greek
  pages:
  - 836
  confidence: high
  validation: agree
translation:
  text: And I did not know that sparrows were in the wall; and while my eyes were
    open, the sparrows dropped warm dung into my eyes, and white films formed on my
    eyes. Then I went to physicians, but they did not help me. But Achiacharus supported
    me until I went to Elymais.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'small birds'; the Greek στρουθία can refer more generally to small birds,
      though 'sparrows' is the most likely sense.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'white films' or 'white opacities' formed on his eyes; this
      is often understood as a cataract-like condition, but the text itself does not
      give a precise medical diagnosis.
    reason: lexical_alternative
lexical_decisions:
- source_word: στρουθία
  chosen: sparrows
  alternatives:
  - small birds
  - birds
  lexicon: LSJ
  rationale: στρουθίον commonly denotes a sparrow or small bird. 'Sparrows' is specific,
    natural English, and fits the traditional identification without over-paraphrasing.
- source_word: ἐν τῷ τοίχῳ
  chosen: in the wall
  alternatives:
  - on the wall
  - in the roof
  lexicon: LSJ
  rationale: The Greek explicitly says 'in the wall.' Although context may suggest
    birds nesting in a wall or crevice, the translation stays close to the source
    wording rather than smoothing to a more interpretive location.
- source_word: ἀνεῳγότων
  chosen: were open
  alternatives:
  - having been opened
  - opened
  lexicon: LSJ
  rationale: The genitive absolute with τῶν ὀφθαλμῶν μου is rendered idiomatically
    as 'while my eyes were open,' preserving the temporal sense in readable English.
- source_word: ἀφώδευσαν
  chosen: dropped ... dung
  alternatives:
  - defecated
  - dropped droppings
  lexicon: LSJ
  rationale: The verb is blunt and refers to excretion. 'Dropped warm dung' preserves
    the earthy force of the Greek while remaining readable modern English; 'defecated'
    would sound overly clinical, and 'droppings' slightly softens the concreteness.
- source_word: θερμὰ
  chosen: warm
  alternatives:
  - hot
  lexicon: LSJ
  rationale: θερμά literally means 'warm/hot.' 'Warm' is the more natural English
    choice here and matches the likely sense without exaggeration.
- source_word: λευκώματα
  chosen: white films
  alternatives:
  - white spots
  - whitenings
  - cloudiness
  lexicon: LSJ
  rationale: The noun refers to white opaque formations in the eyes, likely cataract-like
    or leukomatous opacity. 'White films' communicates the visible result in accessible
    English without pretending to a precise modern diagnosis.
- source_word: ἰατρούς
  chosen: physicians
  alternatives:
  - doctors
  - healers
  lexicon: LSJ
  rationale: ἰατροί are medical practitioners. 'Physicians' preserves the formal tone
    of the narrative better than the more colloquial 'doctors.'
- source_word: οὐκ ὠφέλησάν με
  chosen: they did not help me
  alternatives:
  - they did me no good
  - they did not benefit me
  lexicon: LSJ
  rationale: The idiom means they were of no benefit. 'They did not help me' is clear,
    natural English and preserves the sense.
- source_word: ἔτρεφέν με
  chosen: supported me
  alternatives:
  - fed me
  - provided for me
  - maintained me
  lexicon: LSJ
  rationale: τρέφω literally can mean 'nourish/feed,' but in context of disability
    and dependence it likely extends to ongoing provision. 'Supported me' captures
    the broader sense without excluding food.
- source_word: Ἐλυμαΐδα
  chosen: Elymais
  alternatives:
  - Elamais
  lexicon: LSJ
  rationale: This is a proper place name; standard transliteration from the Greek
    is preferred.
