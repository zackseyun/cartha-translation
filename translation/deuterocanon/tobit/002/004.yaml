id: TOB.2.4
reference: Tobit 2:4
source:
  edition: lxx-swete-1909
  text: κἀγὼ πρὶν ἢ γεύσασθαί με ἀναπηδήσας ἀνειλόμην αὐτὸν εἰς τι οἴκημα ἕως οὗ ἔδυ
    ὁ ἥλιος.
  language: Greek
  pages:
  - 836
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: ויהי כבוא השמש הלכתי וקברתי את החלל וקרובי ומשפחתי מלעיגים עלי לאמר אין
      זה ירא על נפשו והוא קובר את החללים.
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 2:4
translation:
  text: And I, before I had tasted anything, sprang up and took him into a room until
    the sun set.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel Semitic/longer Tobit tradition reflects the sense, 'And when
      the sun went down, I went and buried him,' making explicit the burial at sunset
      rather than the temporary placement of the body indoors.
    reason: textual_variant
lexical_decisions:
- source_word: πρὶν ἢ γεύσασθαί με
  chosen: before I had tasted anything
  alternatives:
  - before I ate
  - before I tasted
  lexicon: BDAG
  rationale: γεύομαι literally means 'taste,' but in meal contexts can function idiomatically
    for eating. 'Tasted anything' preserves the Greek wording while remaining natural
    in English and making clear he had not yet begun the meal.
- source_word: ἀναπηδήσας
  chosen: sprang up
  alternatives:
  - jumped up
  - rose quickly
  lexicon: LSJ
  rationale: The participle conveys sudden, energetic movement. 'Sprang up' preserves
    the urgency better than the flatter 'rose'.
- source_word: ἀνειλόμην
  chosen: removed
  alternatives:
  - took up
  - carried away
  lexicon: LSJ
  rationale: The verb indicates taking up or carrying off the body. 'Removed' fits
    the immediate context of taking the corpse away from the meal setting into another
    place, while avoiding over-specifying the manner of transport.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - it
  lexicon: BDAG
  rationale: Although the referent is a corpse, the Greek masculine pronoun naturally
    refers to the dead man as a person. 'Him' preserves that personal reference.
- source_word: εἰς τι οἴκημα
  chosen: into a room
  alternatives:
  - into a house
  - into some chamber
  - into a building
  lexicon: LSJ
  rationale: οἴκημα can denote a room, chamber, or dwelling place. In context, Tobit
    temporarily places the body somewhere until sunset, so 'a room' best fits a temporary
    indoor location without implying a separate house.
- source_word: ἕως οὗ ἔδυ ὁ ἥλιος
  chosen: until the sun set
  alternatives:
  - until sunset
  - until the sun went down
  lexicon: BDAG
  rationale: A straightforward temporal clause. 'Until the sun set' is idiomatic modern
    English and preserves the explicit subject in Greek.
