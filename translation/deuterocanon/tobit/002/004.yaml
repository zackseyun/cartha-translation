theological_decisions:
- issue: Use of the parallel Semitic tradition alongside the Greek short recension
  chosen_reading: Translate the Greek wording 'removed him into a room until the sun
    set' in the main text, while recognizing that the Semitic/longer tradition reflects
    burial at sunset.
  alternative_readings:
  - And when the sun went down, I went and buried him.
  rationale: The Zone 1 primary witness is the Greek text of Swete/Vaticanus, which
    here describes Tobit first moving the corpse indoors until sunset. The parallel
    Hebrew back-translation, reflecting the longer Semitic tradition, points to the
    subsequent burial action at sunset rather than the temporary placement. Because
    the task requires anchoring in the primary Greek while using the parallel source
    as translation input, the main text follows the Greek and the alternative is preserved
    in a footnote as a significant textual/tradition-level difference.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy for the selected source
    text; preserve source uncertainty honestly'
