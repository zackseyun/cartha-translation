translation:
  text: And when I returned, I washed myself and ate my bread in sorrow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek says 'washed myself.' In context this likely refers to washing
      after corpse impurity; the parallel Semitic tradition makes the purity setting
      more explicit.
    reason: cultural_note
  - marker: b
    text: Or 'my meal.' The Greek literally reads 'my bread,' which can also mean
      food more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστρέψας
  chosen: when I returned
  alternatives:
  - having returned
  - after I returned
  - turning back
  lexicon: BDAG
  rationale: Aorist participle of ἐπιστρέφω here marks prior action relative to the
    main verbs. 'When I returned' gives natural English sequence without overformal
    stiffness. The parallel Semitic tradition places the action after burial and before
    the meal, supporting a temporal sense.
- source_word: ἐλουσάμην
  chosen: I washed myself
  alternatives:
  - I bathed
  - I performed a washing
  lexicon: BDAG
  rationale: Middle voice naturally suggests washing oneself. In context of corpse
    impurity, the act is likely ritual washing, but the Greek does not explicitly
    specify 'ritually purified myself'; 'washed myself' preserves the wording while
    allowing the impurity context to remain implicit.
- source_word: ἤσθιον
  chosen: ate
  alternatives:
  - was eating
  - took food
  lexicon: BDAG
  rationale: Imperfect can be rendered simply in English narrative as a past tense
    event. 'Ate' is idiomatic and fits the sequence. The object phrase supplies the
    meal context.
- source_word: τὸν ἄρτον μου
  chosen: my bread
  alternatives:
  - my food
  - my meal
  lexicon: BDAG
  rationale: ἄρτος literally means 'bread,' and in many contexts can stand metonymically
    for food or a meal. Here 'my bread' preserves the concrete Greek wording while
    remaining understandable in English. 'My meal' is possible but less transparent
    to the source.
- source_word: ἐν λύπῃ
  chosen: in sorrow
  alternatives:
  - in grief
  - with sadness
  lexicon: BDAG
  rationale: λύπη denotes sorrow, grief, or distress. 'In sorrow' closely matches
    the prepositional phrase and suits the mournful context after burial. 'Grief'
    is possible, but 'sorrow' is slightly broader and less interpretively loaded.
