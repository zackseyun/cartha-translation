theological_decisions:
- issue: Whether to make the washing explicitly ritual/purity-related
  chosen_reading: Kept as 'I washed myself' without adding 'for purification' to the
    main text.
  alternative_readings:
  - I purified myself
  - I bathed for purification
  rationale: The broader context and Semitic parallel indicate corpse impurity, but
    the Greek wording itself only states washing. Following optimal equivalence, the
    translation preserves the explicit action and does not import a fuller ritual
    explanation into the main text.
  doctrine_reference: Translation philosophy §1, §3
