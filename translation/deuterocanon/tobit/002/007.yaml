translation:
  text: And I wept. And when the sun had set, I went and dug and buried him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'having dug, I buried him.' The object 'a grave' is implied by
      the burial context and made explicit in English for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκλαυσα
  chosen: I wept
  alternatives:
  - I cried
  - I mourned
  lexicon: BDAG
  rationale: Aorist of κλαίω denotes weeping/crying. 'I wept' is concise and natural,
    preserving the emotional force without overinterpreting it as formal mourning.
- source_word: ὅτε ἔδυ ὁ ἥλιος
  chosen: when the sun had set
  alternatives:
  - when the sun went down
  - at sunset
  lexicon: LSJ
  rationale: The clause marks the time after sunset. 'When the sun had set' reflects
    the completed action naturally in English and fits the sequence before the burial.
- source_word: ᾠχόμην
  chosen: I went
  alternatives:
  - I departed
  - I went away
  lexicon: BDAG
  rationale: The verb indicates going/departing. In this narrative context, simple
    'I went' is idiomatic and avoids unnecessary stiffness.
- source_word: ὀρύξας
  chosen: dug a grave
  alternatives:
  - dug
  - having dug
  lexicon: LSJ
  rationale: The participle literally means 'having dug.' English normally supplies
    the object from the burial context; 'dug a grave' makes the implied action explicit
    without adding foreign detail.
- source_word: ἔθαψα αὐτόν
  chosen: buried him
  alternatives:
  - interred him
  lexicon: BDAG
  rationale: Standard rendering of θάπτω. 'Buried him' is clear, direct, and matches
    normal modern English.
