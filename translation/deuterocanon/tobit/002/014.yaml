id: TOB.2.14
reference: Tobit 2:14
source:
  edition: lxx-swete-1909
  text: ἡ δὲ εἶπεν Δῶρον δέδοταί μοι ἐπὶ τῷ μισθῷ. καὶ οὐκ ἐπίστευον αὐτῇ, καὶ ἔλεγον
    ἀποδιδόναι αὐτὸ τοῖς κυρίοις, καὶ ἠρυθρίων πρὸς αὐτήν. ἡ δὲ ἀποκριθεῖσα εἶπέν
    μοι Ποῦ εἰσιν αἱ ἐλεημοσύναι σου καὶ αἱ δικαιοσύναι σου; ἰδοὺ γνωστὰ πάντα μετὰ
    σοῦ.
  language: Greek
  pages:
  - 837
  confidence: high
  validation: minor_mismatch
translation:
  text: But she said, “It was given to me as a gift in addition to my wages.” But
    I did not believe her, and I told her to give it back to its owners; and I became
    ashamed before her. Then she answered and said to me, “Where are your acts of
    mercy and your righteous deeds? Look—everything about you is known.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “along with my wages” / “as part of my wages.” The Greek phrase can indicate
      something given in connection with her pay; the context suggests she claims
      it was an extra gift rather than stolen property.
    reason: lexical_alternative
  - marker: b
    text: Greek “masters” (κυρίοις); here rendered “owners” because the context concerns
      returning disputed property to those who possessed it.
    reason: lexical_alternative
  - marker: c
    text: The Greek literally refers to blushing or reddening; the sense in context
      is shame or embarrassment.
    reason: lexical_alternative
  - marker: d
    text: Or “your almsgivings and your acts of righteousness.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Δῶρον
  chosen: gift
  alternatives:
  - present
  lexicon: LSJ
  rationale: The noun denotes a gift or present. 'Gift' is the most natural modern
    English equivalent and fits the domestic context.
- source_word: δέδοταί
  chosen: it was given
  alternatives:
  - it has been given
  lexicon: LSJ
  rationale: Perfect passive of δίδωμι. English simple passive reads naturally here
    while preserving the sense that the item came to her from another party.
- source_word: ἐπὶ τῷ μισθῷ
  chosen: in addition to my wages
  alternatives:
  - for my wages
  - as part of my wages
  - along with my pay
  lexicon: LSJ
  rationale: The phrase most naturally indicates something given on top of or in connection
    with wages. 'In addition to my wages' best explains why she distinguishes the
    item from ordinary pay.
- source_word: οὐκ ἐπίστευον αὐτῇ
  chosen: I did not believe her
  alternatives:
  - I was not trusting her
  lexicon: LSJ
  rationale: Imperfect of πιστεύω here is idiomatically rendered as past narrative
    disbelief. Singular English matches the first-person speaker implied by the surrounding
    verbs.
- source_word: ἀποδιδόναι
  chosen: to give it back
  alternatives:
  - to return it
  - to pay it back
  lexicon: LSJ
  rationale: The infinitive means to give back or restore. 'Give it back' is clear,
    idiomatic, and suits direct speech in narrative.
- source_word: τοῖς κυρίοις
  chosen: its owners
  alternatives:
  - its masters
  - the masters
  lexicon: LSJ
  rationale: Although κύριος often means 'lord' or 'master,' in this household-economic
    setting it refers to those who own the item or employ her. 'Owners' avoids misleading
    theological resonance and fits the accusation that the animal belonged to someone
    else.
- source_word: ἠρυθρίων
  chosen: I became ashamed
  alternatives:
  - I blushed
  - I was embarrassed
  lexicon: LSJ
  rationale: The verb literally relates to reddening/blushing, but in context it expresses
    shame or embarrassment in relation to his harsh suspicion. 'I became ashamed'
    captures the moral-social force better than the merely physical 'blushed.'
- source_word: ἐλεημοσύναι
  chosen: acts of mercy
  alternatives:
  - almsgivings
  - charitable deeds
  lexicon: LSJ
  rationale: The term can denote almsgiving specifically, but more broadly merciful
    deeds. Since the plural is paired with δικαιοσύναι and used in a rebuking summary
    of Tobit's piety, 'acts of mercy' preserves the ethical sense without archaic
    wording.
- source_word: δικαιοσύναι
  chosen: righteous deeds
  alternatives:
  - righteousnesses
  - just deeds
  - acts of righteousness
  lexicon: LSJ
  rationale: Plural δικαιοσύναι here refers to concrete righteous acts rather than
    abstract righteousness. 'Righteous deeds' is natural English and preserves the
    moral-religious force. This is a contextual exception from the default singular
    'righteousness' because the Greek plural points to deeds.
- source_word: γνωστὰ πάντα μετὰ σοῦ
  chosen: everything about you is known
  alternatives:
  - all things with you are known
  - everything concerning you is evident
  lexicon: LSJ
  rationale: The clause is idiomatic and somewhat compressed. 'Everything about you
    is known' communicates the sense that Tobit's true condition and the outcome of
    his piety are plain to see.
