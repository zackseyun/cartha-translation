theological_decisions:
- issue: Rendering of δικαιοσύναι in a non-Pauline plural ethical context
  chosen_reading: righteous deeds
  alternative_readings:
  - acts of righteousness
  - just deeds
  rationale: The doctrine table gives δικαιοσύνη the default 'righteousness,' with
    'justice' preserved in footnotes especially for Pauline passages. Here the plural
    form refers to concrete deeds, not an abstract theological status, so 'righteous
    deeds' best reflects the source and context.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δικαιοσύνη; Translation
    philosophy #5'
- issue: Force of Anna's rebuke in the final clause
  chosen_reading: Look—everything about you is known.
  alternative_readings:
  - See, all your deeds are evident.
  - Behold, everything has become clear with you.
  rationale: The Greek is terse and idiomatic. This rendering preserves the rebuke
    without over-interpreting it as either divine judgment or public scandal alone.
    It leaves the tension intact, in keeping with the instruction not to resolve ambiguity
    beyond the text.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3'
