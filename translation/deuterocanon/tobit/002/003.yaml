translation:
  text: And he came and said, “Father, one of our own people has been strangled and
    thrown down in the marketplace.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “one of our kin.” The Greek says “one from our γένος,” which can refer
      to family, kin-group, or one’s own people.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  chosen: he came
  alternatives:
  - having come
  - when he came
  lexicon: BDAG
  rationale: Aorist participle of ἔρχομαι preceding the main verb. English narrative
    style is best served by coordinating it as 'he came and said' rather than a more
    wooden participial construction.
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - My father
  lexicon: BDAG
  rationale: Direct address to Tobit by his son. 'Father' preserves the vocative plainly;
    'my father' is possible in English but adds a possessive not explicit in the Greek.
- source_word: εἷς ἐκ τοῦ γένους ἡμῶν
  chosen: one of our own people
  alternatives:
  - one of our kin
  - one from our family line
  - one of our race
  lexicon: BDAG
  rationale: γένος can denote family, kin-group, or people-group. In context of Tobit
    identifying a fellow Israelite/Judean for burial, 'one of our own people' communicates
    kinship and shared ethnic-religious identity without narrowing it to immediate
    family.
- source_word: ἐστραγγαλωμένος
  chosen: has been strangled
  alternatives:
  - has been throttled
  - has been hanged
  lexicon: BDAG
  rationale: Perfect/passive participle from στραγγαλάω/στραγγαλίζω indicates death
    by strangling. 'Hanged' could over-specify a method associated with suspension;
    'strangled' is the safer rendering from the Greek wording.
- source_word: ἔρριπται
  chosen: thrown down
  alternatives:
  - has been thrown
  - lies cast out
  - has been cast
  lexicon: BDAG
  rationale: Perfect/passive of ῥίπτω conveys that the body has been thrown and now
    lies there. 'Thrown down' preserves the force of violent disposal and fits the
    public setting.
- source_word: ἐν τῇ ἀγορᾷ
  chosen: in the marketplace
  alternatives:
  - in the square
  - in the market
  lexicon: BDAG
  rationale: ἀγορά is the public market/square. 'Marketplace' is natural modern English
    and preserves the public civic setting.
