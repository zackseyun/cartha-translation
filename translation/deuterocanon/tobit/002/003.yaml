source:
  edition: lxx-swete-1909
  text: καὶ ἐλθὼν εἶπεν Πάτερ, εἷς ἐκ τοῦ γένους ἡμῶν ἐστραγγαλωμένος ἔρριπται ἐν
    τῇ ἀγορᾷ.
  language: Greek
  pages:
  - 836
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: וכאשר שמעתי נבהלתי ויצר לי מאד ועזבתי את שלחני והלכתי והרימותיו מן הרחוב
      ושמתיו ברשותי עד בא השמש שאוכל לקברו ושבתי לביתי ואכלתי לחמי בדמעה ובקינה וזכרתי
      את הדבר אשר דבר עמוס [הנביא] בבית אל לאמר "והפכתי חגיכם לאבל וגו'" (עמוס ח,
