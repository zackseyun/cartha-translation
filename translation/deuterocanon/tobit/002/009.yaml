id: TOB.2.9
reference: Tobit 2:9
source:
  edition: lxx-swete-1909
  text: καὶ ἐν αὐτῇ τῇ νυκτὶ ἀνέλυσα θάψας, καὶ ἐκοιμήθην μεμιαμμένος παρὰ τὸν τοῖχον
    τῆς αὐλῆς, καὶ τὸ πρόσωπόν μου ἀκάλυπτον ἦν.
  language: Greek
  pages:
  - 836
  confidence: high
  validation: agree
translation:
  text: And on that very night, after I had gone out and buried him, I lay down to
    sleep in a defiled state beside the wall of the courtyard, and my face was uncovered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unclean.' The Greek describes ritual defilement after burial, not necessarily
      moral impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτῇ τῇ νυκτί
  chosen: on that very night
  alternatives:
  - in that night
  - that same night
  lexicon: LSJ
  rationale: The demonstrative plus intensive positioning naturally emphasizes immediacy.
    'On that very night' preserves the temporal force in idiomatic English.
- source_word: ἀνέλυσα
  chosen: I had gone out
  alternatives:
  - I departed
  - I returned
  lexicon: LSJ
  rationale: In context with θάψας ('having buried'), the verb is best taken as 'went
    away/departed' rather than a technical 'returned.' English requires some smoothing
    to make the participial sequence intelligible, so 'after I had gone out and buried
    him' captures the action flow without overparaphrase.
- source_word: θάψας
  chosen: buried him
  alternatives:
  - having buried
  - after burying
  lexicon: LSJ
  rationale: Aorist participle indicating prior action. 'Buried him' makes explicit
    the implied object from context and reads naturally in English.
- source_word: ἐκοιμήθην
  chosen: I lay down to sleep
  alternatives:
  - I slept
  - I fell asleep
  lexicon: LSJ
  rationale: The middle/passive form of κοιμάω can mean 'sleep' or 'lie down to sleep.'
    Here the narrative setting favors the more concrete action of lying down.
- source_word: μεμιαμμένος
  chosen: in a defiled state
  alternatives:
  - unclean
  - defiled
  lexicon: LSJ
  rationale: The perfect participle denotes a state resulting from corpse impurity.
    'In a defiled state' preserves the ritual-impurity sense more clearly than the
    potentially vague 'unclean.'
- source_word: παρὰ τὸν τοῖχον τῆς αὐλῆς
  chosen: beside the wall of the courtyard
  alternatives:
  - by the courtyard wall
  - alongside the wall of the court
  lexicon: LSJ
  rationale: A straightforward spatial phrase. 'Courtyard' is more natural than 'court'
    in contemporary English while preserving the domestic setting.
- source_word: τὸ πρόσωπόν μου ἀκάλυπτον ἦν
  chosen: my face was uncovered
  alternatives:
  - my face was bare
  - my head was uncovered
  lexicon: LSJ
  rationale: The Greek explicitly says 'face,' not 'head.' The adjective ἀκάλυπτον
    means 'uncovered,' and the wording should remain close to the source because the
    exposed face sets up the following incident.
