- issue: Ritual impurity language from contact with burial
  chosen_reading: in a defiled state
  alternative_readings:
  - unclean
  - defiled
  rationale: The verse concerns ceremonial impurity rather than moral guilt. The chosen
    rendering preserves that distinction and avoids importing ethical condemnation
    into the text.
