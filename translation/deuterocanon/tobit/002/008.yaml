id: TOB.2.8
reference: Tobit 2:8
source:
  edition: lxx-swete-1909
  text: καὶ οἱ πλησίον ἐνέγελων λέγοντες Οὐκέτι φοβεῖται φονευθῆναι περὶ τοῦ πράγματος
    τούτου· καὶ ἀπέδρα, καὶ ἰδοὺ πάλιν θάπτει τοὺς νεκρούς.
  language: Greek
  pages:
  - 836
  confidence: high
  validation: agree
  note: Primary translation anchor remains the Greek; see parallel_sources for the
    Semitic / MT witness.
  parallel_sources:
  - edition: neubauer-tobit-1878
    text: 'ותען חנה ותאמר אלי איה חסדיך וצדקותיך שלא יועילו לך בעת צרתך וחרפתך מודעת
      לבריות:'
    kind: indirect_hebrew
    note: NOT an ancient Hebrew witness. Neubauer's 1878 Hebrew is a back-translation
      from an Aramaic Munich MS. The actual ancient evidence is Qumran 4Q196-200 (Aramaic),
      published in DJD XIX (not redistributable). Use for translation reference only;
      do not treat as Vorlage.
    reference: TOB 2:8
translation:
  text: And the neighbors were mocking, saying, “He is no longer afraid of being put
    to death over this matter; he ran away, and look, he is burying the dead again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Other textual traditions of Tobit differ substantially here. The indirect
      Hebrew back-translation has Hannah speaking about Tobit's acts of kindness and
      righteousness not helping him in his distress and disgrace, rather than neighbors
      mocking his burial of the dead.
    reason: textual_variant
lexical_decisions:
- source_word: οἱ πλησίον
  chosen: the neighbors
  alternatives:
  - those nearby
  - the people nearby
  lexicon: LSJ
  rationale: As a substantivized adjective/plural, it refers to nearby people, naturally
    rendered 'the neighbors' in idiomatic English.
- source_word: ἐνέγελων
  chosen: were mocking
  alternatives:
  - were laughing at
  - were ridiculing
  lexicon: LSJ
  rationale: The imperfect indicates ongoing/repeated derision. 'Were mocking' captures
    both the verbal scorn and the imperfective aspect better than a simple 'laughed.'
- source_word: Οὐκέτι φοβεῖται
  chosen: He is no longer afraid
  alternatives:
  - He no longer fears
  - He is not afraid anymore
  lexicon: LSJ
  rationale: Present middle/passive with οὐκέτι is well represented by 'is no longer
    afraid.' This keeps the direct force of the accusation.
- source_word: φονευθῆναι
  chosen: of being put to death
  alternatives:
  - of being killed
  - of being murdered
  lexicon: LSJ
  rationale: The passive infinitive denotes being killed. 'Put to death' fits the
    context of threatened execution better than the more general 'killed,' while avoiding
    overprecision the Greek itself does not explicitly mark.
- source_word: περὶ τοῦ πράγματος τούτου
  chosen: over this matter
  alternatives:
  - because of this thing
  - about this affair
  lexicon: LSJ
  rationale: πρᾶγμα here means a matter/affair/case. 'Over this matter' is natural
    English and preserves the causal-reference sense in context.
- source_word: ἀπέδρα
  chosen: he ran away
  alternatives:
  - he fled
  - he escaped
  lexicon: LSJ
  rationale: The aorist refers to his prior flight. 'Ran away' is vivid and idiomatic;
    'fled' is possible but slightly more formal. The clause is part of the neighbors'
    taunt, recalling the earlier event.
- source_word: καὶ ἰδοὺ
  chosen: and look
  alternatives:
  - and behold
  - and see
  lexicon: LSJ
  rationale: ἰδού is a discourse particle drawing attention. 'And look' preserves
    the immediacy in readable modern English better than the more archaic 'behold.'
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: LSJ
  rationale: Simple adverb of repetition; 'again' is the most direct rendering.
- source_word: θάπτει τοὺς νεκρούς
  chosen: he is burying the dead
  alternatives:
  - he buries the dead
  lexicon: LSJ
  rationale: The present tense in direct speech is naturally rendered as progressive
    English here, especially after 'look,' highlighting renewed action.
