id: TOB.2.11
reference: Tobit 2:11
source:
  edition: lxx-swete-1909
  text: Καὶ ἡ γυνή μου Ἄννα ἠριθεύετο ἐν τοῖς γυναικείοις·
  language: Greek
  pages:
  - 837
  confidence: high
  validation: agree
translation:
  text: And my wife Anna worked at women's tasks;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in women's work'; the Greek phrase may refer generally to work customarily
      done by women rather than to a physical location.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ γυνή μου
  chosen: my wife
  alternatives:
  - my woman
  lexicon: LSJ
  rationale: In context γυνή with possessive naturally means 'wife,' not merely 'woman.'
    This is the idiomatic and contextually precise English rendering.
- source_word: Ἄννα
  chosen: Anna
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: ἠριθεύετο
  chosen: worked
  alternatives:
  - labored
  - earned wages
  - spun
  lexicon: LSJ
  rationale: The verb denotes working for hire or engaging in labor. Because the following
    phrase specifies the sphere of work, 'worked' is the clearest main-text rendering.
    More specific possibilities such as 'earned wages' or craft-specific renderings
    are possible but go beyond what this wording alone secures.
- source_word: ἐν τοῖς γυναικείοις
  chosen: at women's tasks
  alternatives:
  - in women's quarters
  - in women's work
  - among women's things
  lexicon: LSJ
  rationale: The phrase likely refers to the sphere of women's domestic work rather
    than simply location. 'At women's tasks' preserves the idiomatic sense without
    over-specifying a particular craft. 'In women's quarters' is possible lexically
    but fits the context less well here, where Anna's labor is in view.
