id: TOB.10.8
reference: Tobit 10:8
source:
  edition: lxx-swete-1909
  text: Εἶπεν δὲ Τωβείας τῷ Ῥαγουὴλ Ἐξαπόστειλόν με, ὅτι ὁ πατήρ μου καὶ ἡ μήτηρ μου
    οὐκέτι ἐλπίζουσιν ὄψεσθαί με.
  language: Greek
  pages:
  - 832
  - 835
  - 852
  - 853
  - 854
  - 855
  - 856
  - 857
  confidence: high
  validation: major_mismatch
translation:
  text: Then Tobias said to Raguel, “Send me away, because my father and my mother
    no longer expect to see me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'no longer hope to see me.' The Greek verb can denote either expectation
      or hope; 'expect' was chosen for natural English in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν δὲ
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: LSJ
  rationale: δέ is lightly connective here; 'Then' gives natural narrative progression
    without overstating contrast.
- source_word: Τωβείας
  chosen: Tobias
  alternatives:
  - Tobias/Tobiah (variant transliterations)
  lexicon: LSJ
  rationale: Personal name is transliterated per project philosophy. 'Tobias' is the
    standard English form for Greek Τωβείας.
- source_word: τῷ Ῥαγουὴλ
  chosen: to Raguel
  alternatives:
  - to Ragouel
  lexicon: LSJ
  rationale: Dative indirect object rendered idiomatically in English; name transliterated
    in standard English form.
- source_word: Ἐξαπόστειλόν με
  chosen: Send me away
  alternatives:
  - Send me off
  - Dismiss me
  - Let me go
  lexicon: LSJ
  rationale: The aorist imperative asks for release/departure. 'Send me away' preserves
    the directness of the request and the agency of Raguel in permitting the departure.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: LSJ
  rationale: Introduces the reason for the request; 'because' is the clearest modern
    English connector.
- source_word: ὁ πατήρ μου καὶ ἡ μήτηρ μου
  chosen: my father and my mother
  alternatives:
  - my parents
  lexicon: LSJ
  rationale: The Greek names both parents explicitly. The fuller rendering preserves
    that emphasis better than the compressed 'my parents.'
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any more
  - no more
  lexicon: LSJ
  rationale: Standard rendering of temporal cessation; natural and precise in modern
    English.
- source_word: ἐλπίζουσιν
  chosen: expect
  alternatives:
  - hope
  - are hoping
  lexicon: LSJ
  rationale: Although the verb can mean 'hope,' in this context with an infinitive
    of seeing him it carries the sense of expecting as a realistic prospect. 'Expect'
    best fits the implied fear that they have given up hope of seeing him again.
- source_word: ὄψεσθαί με
  chosen: to see me
  alternatives:
  - that they will see me
  - to catch sight of me
  lexicon: LSJ
  rationale: Future middle infinitive after ἐλπίζω is rendered idiomatically as an
    English infinitive clause.
