  confidence: high
  validation: major_mismatch
translation:
  text: Then Raguel rose and gave him Sarah his wife, and half of his possessions—servants
    and livestock and silver—and after blessing them he sent them away, saying, “May
    the God of heaven prosper you, children, before I die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slaves' for 'servants'; the Greek literally says 'bodies' in a list
      of property.
    reason: lexical_alternative
  - marker: b
    text: Or 'The God of heaven will prosper you'; the Greek uses a future form that
      can function as a blessing.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναστὰς
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι used idiomatically for getting up to act.
    'Rose' is concise and natural in narrative English.
- source_word: ἔδωκεν αὐτῷ Σάρραν τὴν γυναῖκα αὐτοῦ
  chosen: gave him Sarah his wife
  alternatives:
  - gave Sarah his wife to him
  - gave him his wife Sarah
  lexicon: BDAG
  rationale: Keeps the Greek order and legal/familial sense of entrusting the bride
    to the husband. 'His wife Sarah' would be smoother, but the chosen wording stays
    closer to the source while remaining readable.
- source_word: τὰ ἥμισυ τῶν ὑπαρχόντων
  chosen: half of his possessions
  alternatives:
  - half of what he owned
  - half of his property
  lexicon: BDAG
  rationale: ὑπάρχοντα commonly denotes possessions/property. 'Possessions' is broad
    enough to cover the following specifics.
- source_word: σώματα
  chosen: servants
  alternatives:
  - slaves
  - household members
  - male and female slaves
  lexicon: LSJ
  rationale: Literally 'bodies,' but in this property list it refers to persons belonging
    to the household. Because the term is indirect and the verse does not specify
    the bonded status as explicitly as δοῦλοι would, 'servants' is the best main-text
    rendering; 'slaves' is preserved as a lexical alternative.
- source_word: κτήνη
  chosen: livestock
  alternatives:
  - cattle
  - beasts
  lexicon: BDAG
  rationale: A general term for domesticated animals/property animals. 'Livestock'
    is accurate and modern.
- source_word: ἀργύριον
  chosen: silver
  alternatives:
  - money
  lexicon: BDAG
  rationale: The Greek literally says 'silver,' which may function as money, but the
    concrete term should be preserved in the main text.
- source_word: εὐλογήσας αὐτοὺς
  chosen: after blessing them
  alternatives:
  - and blessing them
  - having blessed them
  lexicon: BDAG
  rationale: Aorist participle indicating action accompanying/somewhat preceding the
    sending. 'After blessing them' reads naturally in English and preserves sequence.
- source_word: ἐξαπέστειλεν
  chosen: sent them away
  alternatives:
  - sent them off
  - dispatched them
  lexicon: BDAG
  rationale: The compound verb conveys sending forth/departure. 'Sent them away' fits
    the travel context.
- source_word: Εὐοδώσει ὑμᾶς
  chosen: May ... prosper you
  alternatives:
  - will prosper you
  - make your journey successful
  lexicon: BDAG
  rationale: Though formally future, in this blessing context it functions as a wish/prayer.
    'Prosper you' captures both general success and journey-blessing without over-specifying
    travel.
- source_word: τέκνα
  chosen: children
  alternatives:
  - my children
  lexicon: BDAG
  rationale: Vocative of affection/address. The possessive 'my' is not explicit in
    the Greek, so it is omitted.
- source_word: ὁ θεὸς τοῦ οὐρανοῦ
  chosen: the God of heaven
  alternatives:
  - God in heaven
  lexicon: BDAG
  rationale: Standard Jewish reverential title; a formal rendering preserves its theological
    resonance.
- source_word: πρὸ τοῦ μὲ ἀποθανεῖν
  chosen: before I die
  alternatives:
  - before my death
  lexicon: BDAG
  rationale: Straightforward infinitival construction best rendered idiomatically
    in English.
