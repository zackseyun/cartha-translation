id: TOB.10.11
reference: Tobit 10:11
source:
  edition: lxx-swete-1909
  text: ἀναστὰς δὲ Ῥαγουὴλ ἔδωκεν αὐτῷ Σάρραν τὴν γυναῖκα αὐτοῦ καὶ τὰ ἥμισυ τῶν ὑπαρχόντων,
    σώματα καὶ κτήνη, ἀργύριον, καὶ εὐλογήσας αὐτοὺς ἐξαπέστειλεν λέγων Εὐοδώσει ὑμᾶς,
    τέκνα, ὁ θεὸς τοῦ οὐρανοῦ πρὸ τοῦ μὲ ἀποθανεῖν.
  language: Greek
  pages:
