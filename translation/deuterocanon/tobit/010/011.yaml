theological_decisions:
- issue: Force of the future verb Εὐοδώσει in a blessing formula
  chosen_reading: 'Rendered as a wish/prayer: ''May the God of heaven prosper you'''
  alternative_readings:
  - 'Predictive statement: ''The God of heaven will prosper you'''
  rationale: In direct speech accompanying a parental blessing and departure, English
    idiom favors a benedictory 'May ...' rather than a flat prediction. This preserves
    the speech act without adding doctrine.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Rendering of σώματα in a property list
  chosen_reading: Main text 'servants' with 'slaves' preserved as an alternative
  alternative_readings:
  - slaves
  - household members
  rationale: The noun literally means 'bodies' but in this context denotes human dependents
    counted among property. Because the source does not use δοῦλοι explicitly, 'servants'
    is less overdetermined in the main text, while the stronger social reality is
    preserved in a footnote-level alternative via lexical documentation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5; Contested terms table
    for δοῦλος by analogy
