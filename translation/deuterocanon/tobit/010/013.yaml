translation:
  text: After these things Tobiah also went on his way, blessing God because he had
    made his journey successful, and he kept blessing Raguel and Edna his wife. And
    he went on until they came near to Nineveh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''because he prospered his way,'' an idiom meaning that God granted
      success to his journey.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek text here is syntactically awkward, with a plural verb (''they
      came near'') alongside a singular pronoun (''him''). The translation gives the
      apparent narrative sense: the travelers came near to Nineveh.'
    reason: textual_variant
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: LSJ
  rationale: A straightforward temporal transition. 'After these things' preserves
    the plural and the narrative linkage without sounding overly stiff.
- source_word: ἐπορεύετο
  chosen: went on his way / went on
  alternatives:
  - traveled
  - journeyed
  lexicon: LSJ
  rationale: The imperfect indicates ongoing movement. English varies slightly for
    readability across the verse, but both instances preserve the sense of continued
    travel.
- source_word: εὐλογῶν τὸν θεόν
  chosen: blessing God
  alternatives:
  - praising God
  lexicon: LSJ
  rationale: εὐλογέω commonly means 'bless' in biblical diction. 'Blessing God' keeps
    the lexical connection with the following κατευλόγει and preserves the religious
    register.
- source_word: ὅτι εὐώδωσεν τὴν ὁδὸν αὐτοῦ
  chosen: because he had made his journey successful
  alternatives:
  - because he had prospered his way
  - because he had given success to his journey
  lexicon: LSJ
  rationale: εὐοδόω with ὁδός is an idiom for granting success in travel or undertaking.
    'Made his journey successful' communicates the idiom naturally in modern English
    while remaining anchored to the travel context.
- source_word: κατευλόγει
  chosen: he kept blessing
  alternatives:
  - he blessed
  - he spoke blessings over
  lexicon: LSJ
  rationale: The imperfect suggests repeated or continued action. 'Kept blessing'
    reflects that aspect better than a simple past.
- source_word: Ῥαγουὴλ καὶ Ἔδναν τὴν γυναῖκα αὐτοῦ
  chosen: Raguel and Edna his wife
  alternatives:
  - Raguel and his wife Edna
  lexicon: LSJ
  rationale: The Greek apposition most directly modifies Edna as Raguel's wife. English
    could reorder more idiomatically, but the chosen wording stays close to the source
    while remaining clear.
- source_word: μέχρις οὗ ἤγγισαν αὐτὸν εἰς Νινευή
  chosen: until they came near to Nineveh
  alternatives:
  - until he came near to Nineveh
  - until they approached Nineveh
  lexicon: LSJ
  rationale: The transmitted Greek has plural ἤγγισαν with singular αὐτόν, a syntactically
    awkward construction. The sense is that the traveling party reached the vicinity
    of Nineveh. 'They came near to Nineveh' best reflects the likely narrative sense
    while acknowledging the Greek irregularity.
