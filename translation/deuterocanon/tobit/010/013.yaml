theological_decisions:
- issue: Reference of the successful journey
  chosen_reading: God is the one who granted success to Tobiah's journey
  alternative_readings:
  - God prospered the road itself
  - God prospered the undertaking more generally
  rationale: The clause ὅτι εὐώδωσεν τὴν ὁδὸν αὐτοῦ naturally attributes the success
    of the journey to God. This is not a major doctrinal crux, but it is a meaningful
    theological attribution of providence and should be stated clearly.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source''s theological claim without expansion.'
