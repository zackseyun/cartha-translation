id: TOB.10.13
reference: Tobit 10:13
source:
  edition: lxx-swete-1909
  text: Μετὰ ταῦτα ἐπορεύετο καὶ Τωβείας εὐλογῶν τὸν θεὸν ὅτι εὐώδωσεν τὴν ὁδὸν αὐτοῦ,
    καὶ κατευλόγει Ῥαγουὴλ καὶ Ἔδναν τὴν γυναῖκα αὐτοῦ. καὶ ἐπορεύετο μέχρις οὗ ἤγγισαν
    αὐτὸν εἰς Νινευή.
  language: Greek
  pages:
