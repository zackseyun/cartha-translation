translation:
  text: he said, “Could it be that he has been delayed? Or could it be that Gabael
    has died, and no one is giving him the money?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, “has been put to shame.” The phrase may imply some humiliating
      setback or failed attempt, but the exact circumstance is not stated.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μή ποτε
  chosen: Could it be that
  alternatives:
  - Perhaps
  - Might it be that
  - Lest somehow
  lexicon: LSJ
  rationale: Introduces anxious rhetorical questions expressing apprehension rather
    than assertion. 'Could it be that' captures the worried uncertainty in natural
    English.
- source_word: κατῄσχυνται
  chosen: has been put to shame
  alternatives:
  - has been delayed in disgrace
  - has been dishonored
  - has been detained
  lexicon: LSJ
  rationale: From καταισχύνω, normally 'put to shame/disgrace.' In context Tobit fears
    some humiliating setback or rebuff. The passive perfect sense is preserved without
    over-specifying the cause. A more idiomatic expansion like 'has been delayed'
    would import interpretation not explicit in the Greek.
- source_word: ἀπέθανεν
  chosen: has died
  alternatives:
  - died
  lexicon: LSJ
  rationale: Simple aorist of dying. Present perfect English fits the current-result
    force of Tobit's concern.
- source_word: Γαβαήλ
  chosen: Gabael
  alternatives:
  - Gabriel
  rationale: Personal name is transliterated from the Greek form in keeping with project
    policy. 'Gabriel' would be a different, more familiar name and is not warranted
    by the source.
- source_word: δίδωσιν αὐτῷ τὸ ἀργύριον
  chosen: is giving him the money
  alternatives:
  - gives him the silver
  - is paying him the money
  - returns the money to him
  lexicon: LSJ
  rationale: ἀργύριον literally means 'silver/money.' In this narrative context it
    refers to the deposited funds. 'Money' is clearer modern English than 'silver,'
    while 'is giving him' stays close to the Greek and avoids over-interpreting the
    transaction as repayment in the wording itself.
