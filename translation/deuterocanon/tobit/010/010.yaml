id: TOB.10.10
reference: Tobit 10:10
source:
  edition: lxx-swete-1909
  text: καὶ Τωβείας λέγει Ἐξαπόστειλόν με πρὸς τὸν πατέρα μου.
  language: Greek
  pages:
  - 832
  - 835
  - 852
  - 853
  - 854
  - 855
  - 856
  - 857
  confidence: high
  validation: major_mismatch
translation:
  text: And Tobias said, “Send me away to my father.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has the historical present, literally 'Tobias says'; English idiom
      renders it as past tense in narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), idiomatic modern
    English narrative normally renders it as simple past, especially in a straightforward
    prose sequence.
- source_word: Ἐξαπόστειλόν
  chosen: Send me away
  alternatives:
  - Send me off
  - Dismiss me
  - Let me go
  lexicon: BDAG
  rationale: The imperative of ἐξαποστέλλω carries the sense of sending someone out
    or away. 'Send me away' preserves the directional force better than the flatter
    'let me go,' while remaining natural English.
- source_word: πρὸς τὸν πατέρα μου
  chosen: to my father
  alternatives:
  - to my father’s house
  - back to my father
  lexicon: BDAG
  rationale: The preposition πρός with accusative here indicates movement toward a
    person. 'To my father' is the most direct rendering of the Greek; additions like
    'house' or 'back' are interpretive and not explicit in the source.
- source_word: Τωβείας
  chosen: Tobias
  alternatives:
  - Tobias/Tobiah
  lexicon: LSJ
  rationale: As a personal name in Greek Tobit, Τωβείας is conventionally transliterated
    'Tobias.' This follows the project's policy to transliterate names rather than
    translate them.
