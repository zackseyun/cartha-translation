translation:
  text: And Tobit his father counted each day; and when the days of the journey were
    completed and they were not coming back,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they were not coming.' The Greek imperfect can denote that they had
      still not arrived after the expected time for the journey had passed; in context
      this implies not returning home on schedule.
    reason: lexical_alternative
  - marker: b
    text: The Semitic parallel tradition expands the scene by mentioning counting
      both days and nights and the parents' distress, but the main translation here
      follows the shorter Greek wording of the primary source.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλογίζετο
  chosen: counted
  alternatives:
  - was reckoning
  - was calculating
  - was considering
  lexicon: BDAG
  rationale: In context with ἑκάστης ἡμέρας ('each day'), the verb most naturally
    refers to counting or reckoning the passing days rather than abstract reflection.
    The Semitic parallel likewise emphasizes counting the days and nights, supporting
    a concrete temporal sense.
- source_word: ἑκάστης ἡμέρας
  chosen: each day
  alternatives:
  - every day
  - day by day
  lexicon: LSJ
  rationale: A straightforward temporal expression. 'Each day' preserves the distributive
    force clearly and reads naturally in English.
- source_word: ἐπληρώθησαν
  chosen: were completed
  alternatives:
  - were fulfilled
  - ran out
  - came to an end
  lexicon: BDAG
  rationale: For days/time, 'were completed' preserves the formal sense without sounding
    overly wooden. 'Were fulfilled' is possible but can sound theologically loaded
    in English where simple elapsed time is meant.
- source_word: αἱ ἡμέραι τῆς πορείας
  chosen: the days of the journey
  alternatives:
  - the days for the journey
  - the travel days
  - the time of the journey
  lexicon: LSJ
  rationale: This keeps close to the Greek while remaining idiomatic. It refers to
    the expected duration of the trip.
- source_word: οὐκ ἤρχοντο
  chosen: they were not coming back
  alternatives:
  - they were not coming
  - they did not return
  lexicon: BDAG
  rationale: 'The imperfect suggests ongoing expectation unmet: after the expected
    travel time had passed, they still were not arriving/returning. Because the context
    is Tobit''s waiting at home, ''coming back'' makes the directional sense explicit
    in natural English. A more formal alternative would be ''they were not coming.'''
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: LSJ
  rationale: Simple connective retained for narrative continuity.
- source_word: Τωβεὶτ ὁ πατὴρ αὐτοῦ
  chosen: Tobit his father
  alternatives:
  - Tobit, his father
  - his father Tobit
  lexicon: LSJ
  rationale: This preserves the appositional structure of the Greek while remaining
    readable. English punctuation may later regularize this, but the sense is unchanged.
