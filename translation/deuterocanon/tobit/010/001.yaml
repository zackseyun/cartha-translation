  parallel_sources:
  - edition: neubauer-tobit-1878
    text: וטובי ואשתו מחשבים את הימים ואת הלילות וכואבים על אשר שלחוהו ובוכים ומתענים
      עליו וטובי מנחם את חנה אשתו לאמר החרישי כי בשלום יבא ובשמחה ותמאן להתנחם ותצא
