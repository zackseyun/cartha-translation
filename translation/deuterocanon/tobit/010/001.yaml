      כאשר תמו ארבעה עשר ימי החפה ויאמר טוביה אל רעואל שלחני כי אבי ואמי מחשבים את
      הימים ואינם חושבים [לראותי] ויאמר רעואל שבה עוד עמדי ואשלח להגיד לאביך את כל
