id: TOB.10.1
reference: Tobit 10:1
source:
  edition: lxx-swete-1909
  text: Καὶ Τωβεὶτ ὁ πατὴρ αὐτοῦ ἐλογίζετο ἑκάστης ἡμέρας· καὶ ὡς ἐπληρώθησαν αἱ ἡμέραι
    τῆς πορείας καὶ οὐκ ἤρχοντο,
  language: Greek
  pages:
