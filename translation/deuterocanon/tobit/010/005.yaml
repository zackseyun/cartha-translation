translation:
  text: Do I not care, child, that I have let you go, the light of my eyes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Does it not matter to me, child, that I have sent you away, the light
      of my eyes?' The Greek wording is a rhetorical question expressing deep personal
      distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ μέλει μοι
  chosen: Do I not care
  alternatives:
  - Does it not matter to me
  - Am I not concerned
  lexicon: BDAG
  rationale: The idiom μέλει μοι expresses concern or care. Rendering it as a rhetorical
    question in English preserves the Greek form and emotional force better than a
    flat statement.
- source_word: τέκνον
  chosen: child
  alternatives:
  - my child
  - son
  lexicon: BDAG
  rationale: τέκνον is a term of endearment meaning 'child.' 'Child' preserves the
    familial tenderness without over-specifying gender from the noun alone; the possessive
    sense is already conveyed by context.
- source_word: ἀφῆκά σε
  chosen: I have let you go
  alternatives:
  - I sent you away
  - I left you
  lexicon: BDAG
  rationale: ἀφίημι here naturally means allowing or sending someone to depart. 'Have
    let you go' fits the emotional context of reluctant separation and preserves the
    perfective sense of a completed act with present emotional consequence.
- source_word: τὸ φῶς τῶν ὀφθαλμῶν μου
  chosen: the light of my eyes
  alternatives:
  - the light of my eye
  - my dearest one
  lexicon: BDAG
  rationale: This is an affectionate idiom. A fairly literal rendering preserves the
    metaphor and emotional intensity. 'The light of my eyes' is understandable modern
    English and avoids paraphrasing the image away.
