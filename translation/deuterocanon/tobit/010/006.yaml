  - 854
  - 855
  - 856
  - 857
  confidence: high
  validation: agree
translation:
  text: And Tobit said to her, “Be quiet; do not worry. Be well.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'Do not have a word/matter.' The phrase is rendered idiomatically
      as 'do not worry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σίγα
  chosen: Be quiet
  alternatives:
  - Be silent
  - Hush
  lexicon: LSJ
  rationale: Imperative from σιγάω/σιγάω-related form, functioning as a brief calming
    command to Anna. 'Be quiet' is natural modern English and preserves the directness
    without sounding overly harsh or archaic.
- source_word: μὴ λόγον ἔχε
  chosen: do not worry
  alternatives:
  - do not be upset
  - do not make an issue of it
  - do not be concerned
  lexicon: LSJ
  rationale: Literally 'do not have a word/matter,' an idiomatic expression. In context
    Tobit is calming her anxiety, so 'do not worry' best conveys the sense in readable
    English. A more literal rendering would be obscure in English.
- source_word: ὑγίαινε
  chosen: Be well
  alternatives:
  - Be healthy
  - Take heart
  lexicon: LSJ
  rationale: Imperative of ὑγιαίνω, literally relating to health or soundness. Here
    it serves as a brief wish or exhortation for well-being. 'Be well' is concise
    and idiomatic, preserving the health-related nuance better than the more interpretive
    'take heart'.
- source_word: λέγει αὐτῇ
  chosen: said to her
  alternatives:
  - says to her
  lexicon: LSJ
  rationale: Although the Greek uses a present-tense historical narrative form, standard
    English narrative style normally renders it as a past tense here.
- source_word: Τωβείτ
  chosen: Tobit
  alternatives:
  - Tobit/Tobit spelled differently
  rationale: Personal name transliterated according to standard English convention,
    in keeping with project policy to transliterate names rather than translate them.
