id: TOB.10.6
reference: Tobit 10:6
source:
  edition: lxx-swete-1909
  text: καὶ Τωβείτ λέγει αὐτῇ Σίγα, μὴ λόγον ἔχε, ὑγίαινε.
  language: Greek
  pages:
  - 832
  - 835
