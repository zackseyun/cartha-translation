id: TOB.10.7
reference: Tobit 10:7
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν αὐτῇ Σίγα, μὴ πλάνα με· ἀπώλετο τὸ παιδίον μου. καὶ ἐπορεύετο καθʼ
    ἡμέραν εἰς τὴν ὁδὸν ἔξω οἵας ἀπῆλθεν, ἡμέρας τε ἄρτον οὐκ ἤσθιεν, τὰς δὲ νύκτας
    οὐ διέλιμπανεν θρηνοῦσα Τωβείαν τὸν υἱὸν αὐτῆς, ἕως οὗ συνετελέσθησαν αἱ δέκα
    τέσσαρες ἡμέραι τοῦ γάμου ἃς ὤμοσεν Ῥαγουὴλ ποιῆσαι αὐτὸν ἐκεῖ.
  language: Greek
  pages:
  - 832
  - 835
  - 852
  - 853
  - 854
  - 855
  - 856
  - 857
  confidence: high
  validation: minor_mismatch
translation:
  text: And she said to him, “Be quiet; do not mislead me. My child has perished.”
    And every day she would go out to the road by which he had departed, and by day
    she would eat no bread, and at night she did not stop mourning for Tobias her
    son, until the fourteen days of the wedding feast were completed, which Raguel
    had sworn that he should spend there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My child is lost.' The Greek ἀπώλετο can express either loss or presumed
      death; here it reflects the mother's fearful conclusion, not the narrator's
      confirmation.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the fourteen days of the marriage.' The phrase refers to the
      wedding celebration period.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σίγα
  chosen: Be quiet
  alternatives:
  - Be silent
  - Hush
  lexicon: LSJ
  rationale: Imperative of silence. 'Be quiet' is natural modern English while preserving
    the abruptness of Anna's response.
- source_word: μὴ πλάνα με
  chosen: do not mislead me
  alternatives:
  - do not deceive me
  - do not lead me astray
  lexicon: LSJ
  rationale: The verb conveys causing someone to wander or be deceived. 'Do not mislead
    me' fits the context of refusing false reassurance without overstating deliberate
    fraud.
- source_word: ἀπώλετο
  chosen: has perished
  alternatives:
  - is lost
  - has been destroyed
  - is dead
  lexicon: LSJ
  rationale: The aorist middle/passive can mean 'has perished' or 'is lost.' In context
    Anna fears Tobias has died, but the Greek does not state death as an objective
    fact. 'Has perished' preserves her despairing conclusion without flattening the
    nuance into a narrator's declaration.
- source_word: τὸ παιδίον μου
  chosen: my child
  alternatives:
  - my boy
  - my son
  lexicon: LSJ
  rationale: The diminutive/affectionate term expresses maternal grief. 'My child'
    preserves the tenderness better than the more merely biological 'my son,' especially
    since 'her son' appears explicitly later in the verse.
- source_word: καθʼ ἡμέραν
  chosen: every day
  alternatives:
  - day by day
  - daily
  lexicon: LSJ
  rationale: Idiomatic temporal expression best rendered in clear modern English.
- source_word: εἰς τὴν ὁδὸν ἔξω οἵας ἀπῆλθεν
  chosen: go out to the road by which he had departed
  alternatives:
  - go outside to the road from which he left
  - go out onto the road where he had gone
  lexicon: LSJ
  rationale: The phrase depicts her repeatedly going out to watch the route Tobias
    took. 'By which he had departed' is slightly formal but accurately conveys the
    path of his departure.
- source_word: ἡμέρας τε ἄρτον οὐκ ἤσθιεν
  chosen: by day she would eat no bread
  alternatives:
  - during the day she ate no food
  - she did not eat bread by day
  lexicon: LSJ
  rationale: Bread can stand for food generally, but retaining 'bread' preserves the
    concrete idiom and the austerity of mourning.
- source_word: οὐ διέλιμπανεν θρηνοῦσα
  chosen: she did not stop mourning
  alternatives:
  - she did not cease lamenting
  - she kept mourning
  lexicon: LSJ
  rationale: Imperfect plus participle expresses ongoing, unbroken lament. 'Did not
    stop mourning' is natural and preserves durative force.
- source_word: συνετελέσθησαν
  chosen: were completed
  alternatives:
  - came to an end
  - were fulfilled
  lexicon: LSJ
  rationale: Marks the finishing of the set period. 'Were completed' is straightforward
    and suitably formal for narrative timekeeping.
- source_word: αἱ δέκα τέσσαρες ἡμέραι τοῦ γάμου
  chosen: the fourteen days of the wedding feast
  alternatives:
  - the fourteen days of the marriage
  - the two weeks of the wedding
  lexicon: LSJ
  rationale: In context this refers to the marriage celebration period, not merely
    the legal state of marriage. 'Wedding feast' makes the narrative sense clear.
- source_word: ἃς ὤμοσεν Ῥαγουὴλ ποιῆσαι αὐτὸν ἐκεῖ
  chosen: which Raguel had sworn that he should spend there
  alternatives:
  - which Raguel had sworn to make him stay there for
  - which Raguel had sworn to keep him there for
  lexicon: LSJ
  rationale: 'The Greek is somewhat compressed: Raguel swore to have him remain there
    for that period. ''Should spend there'' expresses the intended sense in readable
    English while avoiding an awkwardly literal construction.'
