id: TOB.10.4
reference: Tobit 10:4
source:
  edition: lxx-swete-1909
  text: εἶπεν δὲ αὐτῷ ἡ γυνὴ Ἀπώλετο τὸ παιδίον, διότι κεχρόνικεν· καὶ ἤρξατο θρηνεῖν
    αὐτὸν αὐτὸν καὶ εἶπεν
  language: Greek
  pages:
  - 832
  - 835
  - 852
  - 853
  - 854
  - 855
  - 856
  - 857
  confidence: high
  validation: agree
translation:
  text: Then his wife said to him, “The child has perished, because he has delayed.”
    And she began to mourn for him and said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek repeats 'him' ('for him, him'), likely for emphasis or as a scribal
      repetition; the English smooths this to idiomatic 'for him.'
    reason: textual_variant
lexical_decisions:
- source_word: Ἀπώλετο
  chosen: has perished
  alternatives:
  - is lost
  - has been destroyed
  lexicon: LSJ
  rationale: Aorist middle/passive of ἀπόλλυμι here expresses the wife's fearful conclusion
    that the boy is dead or ruined. 'Has perished' preserves the gravity without over-specifying
    the manner of death. 'Is lost' is possible but weaker; the following mourning
    favors a stronger rendering.
- source_word: τὸ παιδίον
  chosen: the child
  alternatives:
  - the boy
  lexicon: LSJ
  rationale: παιδίον can mean 'child' or 'boy.' Since Tobias is her son and the mother's
    speech is emotionally charged, 'the child' reflects the Greek wording naturally,
    though contextually it refers to her son.
- source_word: κεχρόνικεν
  chosen: has delayed
  alternatives:
  - has tarried
  - has taken too long
  - has been gone a long time
  lexicon: LSJ
  rationale: Perfect of χρονίζω indicates prolonged delay. 'Has delayed' is concise
    and idiomatic in English while preserving the causal link introduced by διότι.
    The sense is that his long absence leads her to fear he has perished.
- source_word: ἤρξατο θρηνεῖν
  chosen: began to mourn
  alternatives:
  - began to lament
  - began to wail for
  lexicon: LSJ
  rationale: This construction marks the onset of lamentation. 'Mourn' is readable
    modern English and fits the context of presumed death; 'lament' is possible but
    slightly more formal.
- source_word: αὐτὸν
  chosen: for him
  alternatives:
  - him
  lexicon: LSJ
  rationale: With θρηνεῖν, the object can be rendered idiomatically in English as
    'mourn for him.' This makes the relation clear and avoids awkward repetition.
- source_word: αὐτὸν αὐτὸν
  chosen: for him
  alternatives:
  - him, yes him
  - him repeatedly
  lexicon: LSJ
  rationale: The transmitted text repeats αὐτόν. This likely reflects emphatic or
    scribal repetition. The sense is adequately conveyed in idiomatic English by a
    single 'for him'; the repetition is preserved in a footnote as a textual note
    rather than forced into the main text.
