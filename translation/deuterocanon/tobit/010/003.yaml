translation:
  text: And he was very grieved.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλυπεῖτο
  chosen: he was grieved
  alternatives:
  - he was distressed
  - he was sorrowful
  - he was troubled
  lexicon: BDAG
  rationale: The imperfect middle/passive of λυπέω here denotes an ongoing state of
    sorrow or distress. 'Was grieved' preserves the emotional weight and the imperfective
    sense without overinterpreting the cause.
- source_word: λίαν
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: LSJ
  rationale: λίαν intensifies the verb. 'Very' is natural modern English and adequately
    conveys the strong degree of sorrow.
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - So
  lexicon: BDAG
  rationale: The conjunction simply continues the narrative. 'And' preserves the straightforward
    connective force of the Greek.
