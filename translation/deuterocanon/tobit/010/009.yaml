  - 856
  - 857
  confidence: high
  validation: major_mismatch
translation:
  text: Then his father-in-law said to him, “Stay with me, and I will send word to
    your father, and they will report to him the things concerning you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'they will make known to him the things concerning you.'
      The plural 'they will report' likely refers indefinitely to those sent with
      the message.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πενθερός
  chosen: his father-in-law
  alternatives:
  - the bride's father
  - his wife's father
  lexicon: LSJ
  rationale: πενθερός denotes a relationship by marriage, specifically a father-in-law.
    In context Raguel is speaking to Tobias, so 'his father-in-law' is the natural
    English rendering.
- source_word: Μεῖνον
  chosen: Stay
  alternatives:
  - Remain
  - Stay here
  lexicon: BDAG
  rationale: Aorist imperative of μένω. 'Stay' is idiomatic modern English and fits
    the direct request without unnecessary expansion.
- source_word: παρʼ ἐμοί
  chosen: with me
  alternatives:
  - by me
  - at my house
  lexicon: BDAG
  rationale: The phrase means remaining in the speaker's company/presence. 'With me'
    is the most natural concise rendering.
- source_word: κἀγὼ ἐξαποστελῶ
  chosen: and I will send word
  alternatives:
  - and I will send
  - and I will dispatch a message
  lexicon: BDAG
  rationale: ἐξαποστέλλω literally means 'send out,' but with πρὸς τὸν πατέρα σου
    and the following clause about informing him, the sense is sending a message or
    messenger. 'Send word' captures the implied communicative purpose in natural English.
- source_word: δηλώσουσιν
  chosen: they will report
  alternatives:
  - they will make known
  - they will inform
  lexicon: BDAG
  rationale: The plural verb likely has an indefinite subject ('they' = the messengers/people
    sent). 'Report' conveys the act of making the matter known to the father.
- source_word: τὰ κατὰ σέ
  chosen: the things concerning you
  alternatives:
  - what concerns you
  - how things are with you
  - your situation
  lexicon: LSJ
  rationale: The idiom refers to matters relating to the person addressed. 'The things
    concerning you' stays close to the Greek while remaining understandable; smoother
    alternatives are possible but slightly more interpretive.
