id: TOB.10.9
reference: Tobit 10:9
source:
  edition: lxx-swete-1909
  text: εἶπεν δὲ αὐτῷ ὁ πενθερὸς Μεῖνον παρʼ ἐμοί, κἀγὼ ἐξαποστελῶ πρὸς τὸν πατέρα
    σου καὶ δηλώσουσιν αὐτῷ τὰ κατὰ σέ.
  language: Greek
  pages:
