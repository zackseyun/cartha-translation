id: TOB.14.15
reference: Tobit 14:15
source:
  edition: lxx-swete-1909
  text: καὶ ἤκουσεν πρὶν ἢ ἀποθανεῖν αὐτὸν τὴν ἀπωλίαν Νινευὴ ἣν ᾐχμαλώτισεν Ναβουχοδονοσὸρ
    καὶ Ἀσύηρος· ἐχάρη πρὸ τοῦ ἀποθανεῖν ἐπὶ Νινευή. ἀμήν.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And before he died, he heard of the destruction of Nineveh, which Nebuchadnezzar
    and Ahasuerus had taken captive; before dying, he rejoiced over Nineveh. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''which Nebuchadnezzar and Ahasuerus had taken captive.'' The wording
      is retained as found in the source text, though interpreters debate the historical
      identification of these rulers in relation to Nineveh''s fall.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἤκουσεν
  chosen: he heard of
  alternatives:
  - he heard
  - he learned of
  lexicon: LSJ
  rationale: The verb means 'heard,' but in English 'heard of' naturally introduces
    the reported event ('the destruction of Nineveh') without implying direct auditory
    experience of the event itself.
- source_word: πρὶν ἢ ἀποθανεῖν αὐτόν
  chosen: before he died
  alternatives:
  - before his death
  - before he was to die
  lexicon: LSJ
  rationale: This infinitival construction is most naturally rendered temporally as
    'before he died.' It is idiomatic and preserves the sequence of events.
- source_word: ἀπωλίαν
  chosen: destruction
  alternatives:
  - ruin
  - downfall
  - perdition
  lexicon: LSJ
  rationale: In this historical context the noun refers to Nineveh's overthrow, so
    'destruction' is the clearest modern English rendering.
- source_word: ᾐχμαλώτισεν
  chosen: had taken captive
  alternatives:
  - captured
  - carried off captive
  lexicon: LSJ
  rationale: The verb's core sense is taking into captivity. 'Had taken captive' preserves
    that nuance better than the flatter 'captured,' even though the object is the
    city Nineveh metonymically for its people.
- source_word: Ναβουχοδονοσὸρ
  chosen: Nebuchadnezzar
  alternatives:
  - Nabuchodonosor
  rationale: Standard English transliteration favors 'Nebuchadnezzar.' This follows
    the project's policy to transliterate names by standard conventions rather than
    preserve the exact Greek form.
- source_word: Ἀσύηρος
  chosen: Ahasuerus
  alternatives:
  - Asuerus
  rationale: Standard English biblical transliteration is 'Ahasuerus.'
- source_word: ἐχάρη
  chosen: he rejoiced
  alternatives:
  - he was glad
  - he took joy
  lexicon: LSJ
  rationale: The aorist passive/deponent is well represented by 'he rejoiced,' which
    is both accurate and suitably dignified.
- source_word: ἐπὶ Νινευή
  chosen: over Nineveh
  alternatives:
  - because of Nineveh
  - at Nineveh's downfall
  lexicon: LSJ
  rationale: With verbs of rejoicing, ἐπί can indicate the object or occasion of joy.
    'Over Nineveh' is concise and preserves the ambiguity that his joy concerns Nineveh's
    downfall without over-explicating.
- source_word: ἀμήν
  chosen: Amen
  alternatives:
  - truly
  - so be it
  lexicon: LSJ
  rationale: The Greek text includes ἀμήν explicitly, and it should be preserved rather
    than omitted.
