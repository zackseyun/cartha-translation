theological_decisions:
- issue: Historical identification of the conquerors named in the Greek text
  chosen_reading: Retain the source text's wording 'Nebuchadnezzar and Ahasuerus'
    in the main text without harmonizing to later historical reconstructions.
  alternative_readings:
  - Some interpreters treat the names as historically confused or as reflecting a
    different tradition about Nineveh's fall.
  rationale: The translation should represent the Greek witness as given, not silently
    correct or harmonize it to external historical expectations. Any historical tension
    belongs to interpretation, not to the translation itself.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
