theological_decisions:
- issue: Euphemistic expression for impending death
  chosen_reading: I am about to depart from life
  alternative_readings:
  - I am about to die
  - I am near the end of my life
  rationale: The Greek uses a softened, idiomatic expression rather than the blunt
    verb 'die.' Preserving the euphemism respects the source's tone without becoming
    obscure.
  doctrine_reference: Translation philosophy §§1, 6
