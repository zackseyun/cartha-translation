id: TOB.14.3
reference: Tobit 14:3
source:
  edition: lxx-swete-1909
  text: μεγάλως δὲ ἐγήρασεν· καὶ ἐκάλεσεν τὸν υἱὸν αὐτοῦ καὶ τοὺς υἱοὺς αὐτοῦ, καὶ
    εἶπεν αὐτῷ Τέκνον, λάβε τοὺς υἱούς σου· ἰδοὺ γεγήρακα, καὶ πρὸς τὸ ἀποτρέχειν
    ἐκ τοῦ ζῇν εἰμί.
  language: Greek
  pages: []
  confidence: high
translation:
  text: Now he had grown very old; and he called his son and his son's sons, and said
    to him, “Child, take your sons. Look, I have grown old, and I am about to depart
    from life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “his son and his son's sons”; that is, his son and grandsons.
    reason: lexical_alternative
  - marker: b
    text: The Greek says, more literally, “I am toward departing from living,” an
      idiomatic way of saying that death is near.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγάλως
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: LSJ
  rationale: With ἐγήρασεν it intensifies the extent of aging rather than adding a
    separate idea of greatness; 'very old' is natural modern English and preserves
    the force.
- source_word: ἐγήρασεν
  chosen: had grown ... old
  alternatives:
  - became old
  - aged
  lexicon: LSJ
  rationale: The aorist states the completed condition of advanced age. 'Had grown
    old' fits English narrative style and pairs well with the following perfect γεγήρακα.
- source_word: τοὺς υἱοὺς αὐτοῦ
  chosen: his son's sons
  alternatives:
  - his grandsons
  - his sons
  lexicon: LSJ
  rationale: After 'he called his son,' the repeated phrase most naturally refers
    to the son's sons, i.e., Tobit's grandsons. Rendering the relationship explicitly
    avoids ambiguity in English while staying close to the Greek wording.
- source_word: Τέκνον
  chosen: Child
  alternatives:
  - Son
  - My child
  lexicon: LSJ
  rationale: τέκνον is an affectionate filial address. 'Child' preserves the direct
    lexical sense and warmth without over-specifying beyond the Greek; 'Son' is possible
    but less literal.
- source_word: λάβε
  chosen: take
  alternatives:
  - gather
  - bring
  lexicon: LSJ
  rationale: A straightforward imperative. In context it likely means to take charge
    of or gather his sons for departure, but 'take' best preserves the Greek while
    remaining intelligible.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: LSJ
  rationale: Introduces solemn attention. 'Look' is readable modern English without
    archaic tone.
- source_word: γεγήρακα
  chosen: I have grown old
  alternatives:
  - I am old
  - I have become old
  lexicon: LSJ
  rationale: The perfect emphasizes his present state resulting from aging. 'I have
    grown old' preserves that aspect better than the flatter 'I am old.'
- source_word: πρὸς τὸ ἀποτρέχειν ἐκ τοῦ ζῇν εἰμί
  chosen: I am about to depart from life
  alternatives:
  - I am near to running off from life
  - I am at the point of departing this life
  - I am about to die
  lexicon: LSJ
  rationale: The expression is idiomatic and somewhat unusual literally ('I am toward
    running away from living'). 'Depart from life' preserves the euphemistic tone
    for death without flattening it to the bare 'die,' while 'about to' reflects πρὸς
    τὸ ... εἰμί as imminent.
