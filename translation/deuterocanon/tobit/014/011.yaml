theological_decisions:
- issue: Rendering of δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The project default is 'righteousness.' In this wisdom context the term
    denotes upright moral conduct associated with deliverance; 'justice' is possible
    but less likely as the primary sense in English here.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; justice
    preserved where relevant'
- issue: Death idiom ἐξέλιπεν αὐτοῦ ἡ ψυχὴ
  chosen_reading: his life came to an end
  alternative_readings:
  - his soul departed
  - he breathed his last
  rationale: The phrase marks death, but a more literal 'his soul departed' could
    be read as making a stronger anthropological claim than the narrative requires.
    The chosen rendering preserves the event without over-defining the mechanics of
    death.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
