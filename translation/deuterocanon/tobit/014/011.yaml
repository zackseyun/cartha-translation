id: TOB.14.11
reference: Tobit 14:11
source:
  edition: lxx-swete-1909
  text: καὶ νῦν, παιδία, ἴδετε τί ἐλεημοσύνη ποιεῖ καὶ δικαιοσύνη ῥύεται. καὶ ταῦτα
    αὐτοῦ λέγοντος ἐξέλιπεν αὐτοῦ ἡ ψυχὴ ἐπὶ τῆς κλίνης· ἦν δὲ ἐτῶν ἑκατὸν πεντήκοντα
    ὀκτώ· καὶ ἔθαψεν αὐτὸν ἐνδόξως.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And now, children, see what almsgiving does, and how righteousness delivers.
    And while he was saying these things, his soul departed on the bed. He was a hundred
    fifty-eight years old, and he buried him honorably.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice delivers.' The Greek word can denote either righteousness or
      justice depending on context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his soul failed/left him.' This is a Greek idiom for death.
    reason: lexical_alternative
  - marker: c
    text: 'Some readers may expect ''they buried him honorably,'' but the Greek witness
      here has a singular verb: ''he buried him honorably.'''
    reason: textual_variant
lexical_decisions:
- source_word: παιδία
  chosen: children
  alternatives:
  - sons
  - young ones
  lexicon: LSJ
  rationale: Vocative plural addressing descendants or younger hearers; 'children'
    is natural modern English and preserves the familial address without over-specifying
    gender.
- source_word: ἴδετε
  chosen: see
  alternatives:
  - behold
  - consider
  lexicon: LSJ
  rationale: Imperative plural meaning 'see' or 'perceive.' 'See' is concise, idiomatic,
    and keeps the exhortational force.
- source_word: ἐλεημοσύνη
  chosen: almsgiving
  alternatives:
  - charity
  - acts of mercy
  lexicon: LSJ
  rationale: In Tobit this term regularly refers to concrete giving to the needy,
    not merely an abstract disposition. 'Almsgiving' best preserves that specific
    practice.
- source_word: ποιεῖ
  chosen: does
  alternatives:
  - accomplishes
  - works
  lexicon: LSJ
  rationale: Simple present verb; 'does' is direct and leaves the object clause open-ended
    as in the Greek.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Per doctrine default, δικαιοσύνη is rendered 'righteousness' unless context
    strongly favors 'justice.' Here the wisdom-style moral sense fits 'righteousness,'
    though 'justice' remains a viable lexical alternative.
- source_word: ῥύεται
  chosen: delivers
  alternatives:
  - rescues
  - saves
  lexicon: LSJ
  rationale: The verb denotes rescue or deliverance. 'Delivers' is broad and dignified,
    preserving the moral-theological force without narrowing to physical or eternal
    salvation alone.
- source_word: ἐξέλιπεν αὐτοῦ ἡ ψυχὴ
  chosen: his life came to an end
  alternatives:
  - his soul departed
  - he breathed his last
  lexicon: LSJ
  rationale: This idiom refers to death. 'His life came to an end' communicates the
    event clearly in modern English without importing a more specific anthropology
    than the phrase itself requires.
- source_word: κλίνη
  chosen: bed
  alternatives:
  - couch
  lexicon: LSJ
  rationale: Standard sense in this context is the bed on which he died.
- source_word: ἐτῶν ἑκατὸν πεντήκοντα ὀκτώ
  chosen: a hundred fifty-eight years old
  alternatives:
  - one hundred and fifty-eight years old
  lexicon: LSJ
  rationale: Natural English rendering of the age statement.
- source_word: ἔθαψεν αὐτὸν ἐνδόξως
  chosen: he buried him honorably
  alternatives:
  - they buried him honorably
  - he buried him gloriously
  lexicon: LSJ
  rationale: The singular verb in Swete most naturally yields 'he buried him,' though
    the subject is contextually implicit. ἐνδόξως here is best rendered adverbially
    as 'honorably,' indicating an honorable burial rather than splendor in a modern
    sense.
