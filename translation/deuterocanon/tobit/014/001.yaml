theological_decisions:
- issue: Sense of ἐξομολογούμενος in a worship context
  chosen_reading: praise/thanksgiving rather than confession of sins
  alternative_readings:
  - confessing
  rationale: The verse closes Tobit's preceding speech of blessing and doxology. Rendering
    the participle as 'giving praise' preserves the worshipful context and avoids
    implying a penitential act the immediate context does not require.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
