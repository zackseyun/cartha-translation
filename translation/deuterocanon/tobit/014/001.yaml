id: TOB.14.1
reference: Tobit 14:1
source:
  edition: lxx-swete-1909
  text: Καὶ ἐπαύσατο ἐξομολογούμενος Τωβείτ.
  language: Greek
  pages:
  - 832
  - 835
  - 860
  - 861
  - 862
  confidence: high
  validation: minor_mismatch
translation:
  text: And Tobit ceased giving thanks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stopped confessing' if ἐξομολογούμενος is taken in its penitential sense;
      here the context favors praise or thanksgiving.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαύσατο
  chosen: stopped
  alternatives:
  - ceased
  - finished
  lexicon: BDAG
  rationale: Aorist middle of παύω, here meaning to come to an end or stop. 'Stopped'
    is natural modern English and fits the ingressive/completive sense without sounding
    archaic.
- source_word: ἐξομολογούμενος
  chosen: giving praise
  alternatives:
  - confessing
  - giving thanks
  - praising
  lexicon: BDAG
  rationale: The participle ἐξομολογούμενος can mean 'confessing' or 'giving thanks/praise'
    depending on context. In Tobit 14 the immediate context is Tobit's concluding
    hymn/blessing, so 'giving praise' best reflects the sense here rather than admission
    of sin.
- source_word: Τωβείτ
  chosen: Tobit
  alternatives:
  - 'Tobit (transliteration variant: Tōbeit)'
  rationale: Personal names are transliterated by standard English convention. 'Tobit'
    is the established and recognizable form for Τωβείτ.
