theological_decisions:
- issue: Rendering of Κύριος
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  - Master
  rationale: The doctrine table specifies 'Lord' as the default rendering for κύριος.
    Nothing in this verse requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering of δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine table gives 'righteousness' as the default, with 'justice'
    preserved where context warrants. Here the phrase describes upright devotion and
    conduct rather than judicial equity specifically, so 'righteousness' is preferred.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness'
- issue: Gendered familial term ἀδελφοῖς
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The source uses a masculine plural familial term. Following the project's
    gender-accurate policy, the main text retains 'brothers' rather than neutralizing
    it, while acknowledging that the referent may be broader in context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
