id: TOB.14.7
reference: Tobit 14:7
source:
  edition: lxx-swete-1909
  text: καὶ εὐλογήσουσιν πάντα τὰ ἔθνη Κύριον. καὶ ὁ λαὸς αὐτοῦ ἐξομολογήσεται τῷ
    θεῷ, καὶ ὑψώσει Κύριος τὸν λαὸν αὐτοῦ· καὶ χαρήσονται πάντες οἱ ἀγαπῶντες Κύριον
    τὸν θεὸν ἐν ἀληθείᾳ καὶ δικαιοσύνῃ, ποιοῦντες ἔλεος τοῖς ἀδελφοῖς ἡμῶν.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And all the nations will bless the Lord. And his people will give thanks to
    God, and the Lord will exalt his people; and all who love the Lord God in truth
    and righteousness will rejoice, showing mercy to our brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will confess God' or 'will praise God'; the Greek verb can carry senses
      of confession or thanksgiving/praise depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Righteousness'' could also be rendered ''justice,'' though here the sense
      is likely uprightness in devotion and conduct.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'our brothers'; the term may function representatively for one's fellow
      kin or community members.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογήσουσιν
  chosen: will bless
  alternatives:
  - will praise
  lexicon: BDAG
  rationale: The future of εὐλογέω commonly means 'bless' or 'speak well of.' With
    πάντα τὰ ἔθνη as subject and Κύριον as object, 'will bless' preserves the direct
    verbal force and biblical register better than the more interpretive 'will praise.'
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all peoples
  lexicon: BDAG
  rationale: ἔθνη in LXX usage often means 'nations' and can imply the non-Israelite
    peoples, but here the universal scope is primary. 'All the nations' is the most
    direct rendering and avoids over-interpreting ethnic contrast.
- source_word: ἐξομολογήσεται
  chosen: will give thanks
  alternatives:
  - will confess
  - will praise
  lexicon: BDAG
  rationale: In biblical Greek this verb can mean confess or give thanks/praise depending
    on context. With τῷ θεῷ and in a sequence of worship responses, 'will give thanks'
    best fits the sense here without importing penitential overtones.
- source_word: ὑψώσει
  chosen: will exalt
  alternatives:
  - will lift up
  - will raise high
  lexicon: BDAG
  rationale: ὑψόω means to raise or exalt. 'Will exalt' preserves both the literal
    upward metaphor and the honorific sense in idiomatic English.
- source_word: ἐν ἀληθείᾳ καὶ δικαιοσύνῃ
  chosen: in truth and righteousness
  alternatives:
  - with truth and righteousness
  - in truth and justice
  lexicon: BDAG
  rationale: The prepositional phrase most naturally describes the manner or sphere
    of loving God. 'In truth and righteousness' is formally close and preserves δικαιοσύνη
    with the project's default rendering 'righteousness'; 'justice' is possible but
    less fitting in this devotional-moral context.
- source_word: ποιοῦντες ἔλεος
  chosen: showing mercy
  alternatives:
  - doing mercy
  - practicing mercy
  lexicon: BDAG
  rationale: The participial phrase is a Semitic-style expression meaning to act mercifully.
    'Showing mercy' gives natural English while staying close to the source sense.
- source_word: τοῖς ἀδελφοῖς ἡμῶν
  chosen: to our brothers
  alternatives:
  - to our brothers and sisters
  - to our kin
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural 'brothers.' Per doctrine, gender-accurate
    rendering is preferred, especially where representative force may be present.
    A more inclusive English expansion would go beyond the wording of the source.
