id: TOB.14.6
reference: Tobit 14:6
source:
  edition: lxx-swete-1909
  text: καὶ πάντα τὰ ἔθνη ἐπιστρέψουσιν ἀληθινῶς φοβεῖσθαι Κύριον τὸν θεόν· κατορύξουσιν
    τὰ εἴδωλα αὐτῶν·
  language: Greek
  pages: []
  confidence: high
translation:
  text: And all the nations will truly turn to fear the Lord God; they will bury their
    idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will truly return to fear the Lord God.' The Greek verb can mean 'turn'
      or 'return,' here expressing the nations' sincere turning toward God.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - every nation
  lexicon: LSJ
  rationale: ἔθνη in this context refers broadly to the peoples/nations of the world,
    not specifically to non-Jews as a contrast term. 'All the nations' preserves the
    universal scope and standard biblical diction.
- source_word: ἐπιστρέψουσιν
  chosen: will turn
  alternatives:
  - will return
  - will be converted
  lexicon: LSJ
  rationale: The verb means 'turn' or 'turn back.' 'Will turn' preserves the metaphor
    of repentance/conversion without importing later doctrinal terminology too strongly.
- source_word: ἀληθινῶς
  chosen: truly
  alternatives:
  - genuinely
  - in truth
  lexicon: LSJ
  rationale: ἀληθινῶς modifies the turning/fearing as sincere and real. 'Truly' is
    concise and natural, and it preserves the adverbial force.
- source_word: φοβεῖσθαι
  chosen: to fear
  alternatives:
  - to revere
  - to worship
  lexicon: LSJ
  rationale: The infinitive after ἐπιστρέψουσιν expresses what they turn to do. 'Fear'
    is the direct lexical sense and preserves biblical theological resonance; 'revere'
    is interpretive and 'worship' is too broad.
- source_word: Κύριον τὸν θεόν
  chosen: the Lord God
  alternatives:
  - the Lord, God
  - the Lord their God
  lexicon: LSJ
  rationale: κύριος is rendered 'Lord' per doctrine. The Greek has the articular phrase
    'the Lord God' without an explicit possessive, so that should not be added.
- source_word: κατορύξουσιν
  chosen: will bury
  alternatives:
  - will hide away
  - will dig under
  - will put underground
  lexicon: LSJ
  rationale: The verb literally means to dig down or bury. In context of renouncing
    idols, 'bury' is vivid, idiomatic, and closely tied to the Greek image.
- source_word: τὰ εἴδωλα αὐτῶν
  chosen: their idols
  alternatives:
  - their images
  - their false gods
  lexicon: LSJ
  rationale: εἴδωλα is best rendered 'idols' in this religious context. 'Images' is
    too neutral, and 'false gods' interprets beyond the lexical form.
