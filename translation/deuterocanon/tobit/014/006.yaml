theological_decisions:
- issue: Whether φοβεῖσθαι should be softened to 'revere' in a context of the nations
    turning to God
  chosen_reading: to fear
  alternative_readings:
  - to revere
  rationale: The Greek explicitly uses the common biblical language of fearing God.
    Retaining 'fear' preserves the theological texture of reverent awe and submission
    without reducing it to a modernized abstraction.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English without flattening theological weight.'
- issue: Whether ἐπιστρέψουσιν implies formal conversion language
  chosen_reading: will truly turn to fear the Lord God
  alternative_readings:
  - will truly be converted to fear the Lord God
  rationale: The source text speaks of turning, a standard biblical metaphor for repentance
    and conversion. Rendering it as 'turn' keeps the metaphor visible and avoids importing
    later technical language not present in the Greek.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    optimal equivalence.'
