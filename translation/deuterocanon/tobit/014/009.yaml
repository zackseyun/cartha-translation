id: TOB.14.9
reference: Tobit 14:9
source:
  edition: lxx-swete-1909
  text: σὺ δὲ τήρησον τὸν νόμον καὶ τὰ προστάγματα, καὶ γενοῦ φιλελεήμων καὶ δίκαιος,
    ἵνα σοι καλῶς ἦν.
  language: Greek
  pages: []
  confidence: high
translation:
  text: But you, keep the law and the commandments, and be merciful and righteous,
    so that it may go well with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be just.' The Greek adjective can denote both moral righteousness and
      justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: τήρησον
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: BDAG
  rationale: Imperative of τηρέω in legal/ethical context commonly means to keep or
    observe commandments. 'Keep' is idiomatic modern English and preserves the covenantal-ethical
    force without sounding wooden.
- source_word: νόμον
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: With the article, the phrase naturally refers to the law as a recognized
    body of instruction. 'The law' best reflects the Greek and the Jewish scriptural
    setting.
- source_word: προστάγματα
  chosen: the commandments
  alternatives:
  - ordinances
  - commands
  - precepts
  lexicon: BDAG
  rationale: The term denotes authoritative injunctions. 'Commandments' fits the moral-exhortational
    context and pairs naturally with 'the law' in English.
- source_word: γενοῦ
  chosen: become
  alternatives:
  - be
  lexicon: BDAG
  rationale: Aorist middle imperative of γίνομαι is more literally 'become' than stative
    'be.' Here it calls for entering into or showing oneself in a pattern of character,
    so 'become' preserves the verbal force.
- source_word: φιλελεήμων
  chosen: merciful
  alternatives:
  - compassionate
  - kindly merciful
  - loving the needy
  lexicon: LSJ
  rationale: The adjective denotes being loving or disposed toward mercy. 'Merciful'
    is concise, natural, and captures the ethical sense without overexpanding the
    compound.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: In a moral exhortation alongside mercy, 'righteous' better preserves
    the ethical-religious dimension than the narrower civic sense 'just.'
- source_word: ἵνα σοι καλῶς ἦν
  chosen: so that it may go well with you
  alternatives:
  - so that it may be well with you
  - that it may be well for you
  lexicon: BDAG
  rationale: This is a common idiomatic expression of well-being or prosperity. 'It
    may go well with you' is natural modern English while preserving the purposive/result
    nuance of ἵνα.
