translation:
  text: And he was fifty-eight years old when he lost his sight, and after eight years
    he regained it; and he did acts of mercy, and he continued to fear God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'he lost the sights' and later 'looked up/saw again,' an
      idiom for losing and recovering sight.
    reason: lexical_alternative
  - marker: b
    text: Or 'he gave alms'; the Greek term can refer specifically to almsgiving or
      more broadly to deeds of mercy.
    reason: lexical_alternative
  - marker: c
    text: The Greek says only 'continued to fear'; 'God' is implied by the pious context
      and supplied for clear English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν ἐτῶν πεντήκοντα ὀκτὼ
  chosen: he was fifty-eight years old
  alternatives:
  - he was fifty-eight years of age
  lexicon: LSJ
  rationale: Idiomatic age expression in Greek; standard English equivalent is 'was
    fifty-eight years old.'
- source_word: ἀπώλεσεν τὰς ὄψεις
  chosen: he lost his sight
  alternatives:
  - he lost his eyes
  - he became blind
  lexicon: LSJ
  rationale: Literally 'he lost the sights/eyesight.' 'Lost his sight' is the most
    natural English rendering and preserves the sense without awkward literalism.
    'Became blind' is possible but less directly tied to the Greek wording.
- source_word: μετὰ ἔτη ὀκτὼ
  chosen: after eight years
  alternatives:
  - eight years later
  lexicon: LSJ
  rationale: Straightforward temporal phrase; 'after eight years' closely follows
    the Greek and reads naturally.
- source_word: ἀνέβλεψεν
  chosen: he regained it
  alternatives:
  - he recovered his sight
  - he saw again
  lexicon: LSJ
  rationale: The verb means 'look up' or, in healing/blindness contexts, 'recover
    sight.' Because the previous clause explicitly mentions sight, 'regained it' avoids
    repetition while clearly referring back to his sight. 'Recovered his sight' is
    also strong, but the chosen rendering keeps the sentence flowing in English.
- source_word: ἐποίει ἐλεημοσύνας
  chosen: he kept doing acts of mercy
  alternatives:
  - he gave alms
  - he practiced merciful deeds
  - he did charitable acts
  lexicon: LSJ
  rationale: ἐλεημοσύνας can denote almsgiving or merciful deeds more broadly. 'Acts
    of mercy' preserves the semantic link to mercy rather than narrowing the phrase
    to monetary alms alone, while the imperfect ἐποίει is reflected by 'kept doing.'
- source_word: προσεθέτο φοβεῖσθαι
  chosen: he continued to fear God
  alternatives:
  - he continued to fear
  - he gave himself still more to fearing God
  lexicon: LSJ
  rationale: The construction means 'he continued/additionally set himself to fear.'
    Because the object of fear is implicit from biblical idiom and context, 'God'
    is supplied in English for clarity. 'Continued to fear' alone would sound incomplete
    in English. The additive/imperfect nuance is conveyed by 'continued.'
