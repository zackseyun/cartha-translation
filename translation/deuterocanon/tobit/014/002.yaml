theological_decisions:
- issue: Implicit object of φοβεῖσθαι
  chosen_reading: 'Supplied ''God'' in English: ''continued to fear God'''
  alternative_readings:
  - continued to fear
  - continued in reverence
  rationale: In biblical Greek, 'fear' in a pious summary commonly implies fear of
    God. English normally requires the object to avoid ambiguity, and the context
    is a commendation of Tobit's piety. This is an interpretive supply for clarity,
    not an added doctrinal claim.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
