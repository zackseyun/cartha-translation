theological_decisions:
- issue: Prophetic fulfillment wording in relation to Jonah's speech about Nineveh
  chosen_reading: 'rendered the content as future fulfillment: ''what Jonah the prophet
    spoke concerning Nineveh will happen: it will be overthrown'''
  alternative_readings:
  - '''I am convinced of what Jonah the prophet spoke concerning Nineveh, that it
    will be overthrown'''
  - '''I believe everything Jonah the prophet said about Nineveh, that it shall be
    destroyed'''
  rationale: The Greek sequence ὅσα ἐλάλησεν ... ὅτι καταστραφήσεται can be represented
    more woodenly, but English benefits from making explicit that Tobit is affirming
    the truth of Jonah's prophecy. This does not add doctrine; it clarifies the syntax
    of conviction plus prophetic content.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of οἱ ἀδελφοὶ ἡμῶν
  chosen_reading: our brothers
  alternative_readings:
  - our kindred
  - our people
  rationale: The project prefers gender-accurate renderings where the source is masculine
    and representative. Here 'brothers' preserves the Greek form while still naturally
    referring to fellow Israelites in context.
  doctrine_reference: Translation philosophy §4
