id: TOB.14.4
reference: Tobit 14:4
source:
  edition: lxx-swete-1909
  text: ἄπελθε εἰς τὴν Μηδείαν, τέκνον, ὅτι πέπεισμαι ὅσα ἐλάλησεν Ἰωνᾶς ὁ προφήτης
    περὶ Νινευὴ ὅτι καταστραφήσεται, ἐν δὲ τῇ Μηδείᾳ ἔσται εἰρήνη μᾶλλον ἕως καιροῦ·
    καὶ ὅτι οἱ ἀδελφοὶ ἡμῶν ἐν τῇ γῇ σκορπισθήσονται ἀπὸ τῆς ἀγαθῆς γῆς, καὶ Ἰεροσόλυμα
    ἔσται ἔρημος καὶ ὁ οἶκος τοῦ θεοῦ ἐν αὐτῇ κατακαήσεται, καὶ ἔρημος ἔσται μέχρι
    χρόνου.
  language: Greek
  pages: []
  confidence: high
translation:
  text: 'Go to Media, my child, because I am convinced that what Jonah the prophet
    spoke concerning Nineveh will happen: it will be overthrown. But in Media there
    will be peace for a time. And our brothers will be scattered from the good land,
    and Jerusalem will be desolate, and the house of God in it will be burned down,
    and it will be desolate until a time.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there will be rather more peace until a season.' The Greek includes
      a comparative term that may suggest relative safety in Media rather than absolute
      peace.
    reason: lexical_alternative
  - marker: b
    text: '''The house of God'' refers to the temple in Jerusalem.'
    reason: cross_reference
lexical_decisions:
- source_word: ἄπελθε
  chosen: Go
  alternatives:
  - Depart
  - Leave
  lexicon: LSJ
  rationale: Aorist imperative of ἀπέρχομαι; 'Go' is natural modern English and fits
    the directional phrase 'to Media' without unnecessary stiffness.
- source_word: Μηδείαν
  chosen: Media
  alternatives:
  - the land of the Medes
  lexicon: LSJ
  rationale: Standard transliteration of the place name; concise and recognizable
    in English.
- source_word: τέκνον
  chosen: my child
  alternatives:
  - child
  - son
  lexicon: LSJ
  rationale: Vocative of affection. 'My child' preserves the familial tenderness better
    than bare 'child.' 'Son' would over-specify beyond the lexical form, even though
    the addressee is Tobias in context.
- source_word: πέπεισμαι
  chosen: I am convinced
  alternatives:
  - I am persuaded
  - I am certain
  lexicon: LSJ
  rationale: Perfect middle/passive of πείθω expressing settled conviction. 'I am
    convinced' is idiomatic and preserves the force of a present state grounded in
    prior persuasion.
- source_word: ὅσα ἐλάλησεν
  chosen: what ... spoke
  alternatives:
  - the things ... said
  - everything ... declared
  lexicon: LSJ
  rationale: The neuter plural relative with λαλέω refers to the content of Jonah's
    prophetic speech. 'What ... spoke' is slightly compressed in English but clear
    when expanded with the following clause.
- source_word: περὶ Νινευὴ
  chosen: concerning Nineveh
  alternatives:
  - about Nineveh
  lexicon: LSJ
  rationale: '''Concerning'' preserves the formal prophetic tone while remaining readable.'
- source_word: καταστραφήσεται
  chosen: it will be overthrown
  alternatives:
  - it will be destroyed
  - it will be laid waste
  lexicon: LSJ
  rationale: Future passive of καταστρέφω. 'Overthrown' preserves the classic judgment-language
    nuance and echoes destruction by divine reversal more closely than the flatter
    'destroyed.'
- source_word: ἔσται εἰρήνη μᾶλλον ἕως καιροῦ
  chosen: there will be peace for a time
  alternatives:
  - there will be rather more peace until a season
  - there will be peace instead until the appointed time
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic. μᾶλλον here likely has the sense of
    comparative relief or relative safety; in smooth English 'there will be peace
    for a time' captures the main point without forcing an awkward literal comparative.
    The temporal limit ἕως καιροῦ is preserved as temporary duration.
- source_word: οἱ ἀδελφοὶ ἡμῶν
  chosen: our brothers
  alternatives:
  - our kindred
  - our brethren
  lexicon: LSJ
  rationale: Gender-accurate rendering of the masculine plural, likely referring to
    fellow Israelites. 'Brothers' follows project policy; broader inclusivity can
    be inferred from context without neutralizing the term.
- source_word: σκορπισθήσονται
  chosen: will be scattered
  alternatives:
  - will be dispersed
  lexicon: LSJ
  rationale: Future passive; 'scattered' is the standard and vivid English equivalent
    for exile/dispersal language.
- source_word: ἀπὸ τῆς ἀγαθῆς γῆς
  chosen: from the good land
  alternatives:
  - from the fertile land
  - from the pleasant land
  lexicon: LSJ
  rationale: ἀγαθῆς is literally 'good.' Retaining 'good land' preserves the biblical
    resonance of the land's covenantal goodness without interpretive expansion.
- source_word: Ἰεροσόλυμα ἔσται ἔρημος
  chosen: Jerusalem will be desolate
  alternatives:
  - Jerusalem will be laid waste
  - Jerusalem will become a wilderness
  lexicon: LSJ
  rationale: ἔρημος in this context denotes devastation/desolation rather than literal
    wilderness. 'Desolate' is the most natural prophetic English equivalent.
- source_word: ὁ οἶκος τοῦ θεοῦ
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: LSJ
  rationale: Literally 'the house of God.' This preserves the source wording and its
    biblical register; readers can understand it as the temple from context.
- source_word: κατακαήσεται
  chosen: will be burned down
  alternatives:
  - will be burned up
  - will be consumed by fire
  lexicon: LSJ
  rationale: Future passive of κατακαίω. 'Burned down' is clear, natural, and conveys
    destruction by fire.
- source_word: μέχρι χρόνου
  chosen: until a time
  alternatives:
  - until a season
  - for a time
  lexicon: LSJ
  rationale: The phrase marks a limited but unspecified duration. 'Until a time' preserves
    the open-ended temporal expression more closely than 'for a time' in this final
    clause.
