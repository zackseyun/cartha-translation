theological_decisions:
- issue: Subject reference after the burial notice
  chosen_reading: '''he buried her with his father'' refers to Tobit as the implied
    subject, followed by ''Then Tobit went away'' as the next explicit clause.'
  alternative_readings:
  - The implied subject could be understood as Tobias from broader narrative context.
  rationale: The Greek has an unexpressed subject in ἔθαψεν and then an explicit Τωβίας
    with ἀπῆλθεν. The most natural reading of the Greek sequence is to leave the first
    clause as an English 'he' and then render the second clause with the explicit
    name as given. This preserves the source wording without importing a harmonizing
    clarification into the first clause.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
