id: TOB.14.12
reference: Tobit 14:12
source:
  edition: lxx-swete-1909
  text: Καὶ ὅτε ἀπέθανεν Ἅννα, ἔθαψεν αὐτὴν μετὰ τοῦ πατρὸς αὐτοῦ· ἀπῆλθεν δὲ Τωβίας
    μετὰ τῆς γυναικὸς αὐτοῦ καὶ τῶν υἱῶν αὐτοῦ εἰς Ἐκβάτανα πρὸς Ῥαγουὴλ τὸν πενθερὸν
    αὐτοῦ.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And when Hanna died, he buried her with his father. Then Tobias went away
    with his wife and his sons to Ecbatana, to Raguel his father-in-law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''he buried her with his father.'' The implied subject is not stated
      in that clause; the next clause explicitly names Tobit/Tobias in Greek.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: The aorist of ἀποθνῄσκω straightforwardly denotes death. 'Died' is the
    plain, non-euphemistic English equivalent and fits the narrative style.
- source_word: ἔθαψεν
  chosen: buried
  alternatives:
  - laid to rest
  - entombed
  lexicon: BDAG
  rationale: The verb θάπτω means to bury. 'Buried' is the most direct and transparent
    rendering.
- source_word: μετὰ τοῦ πατρὸς αὐτοῦ
  chosen: with his father
  alternatives:
  - beside his father
  lexicon: BDAG
  rationale: μετά with the genitive commonly means 'with.' In burial context it can
    imply interment together or in the same family burial place; 'with his father'
    preserves the Greek without over-specifying the spatial nuance.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went
  lexicon: BDAG
  rationale: ἀπέρχομαι indicates departure from one place to another. 'Went away'
    preserves the sense of leaving after the burial, while remaining natural English.
- source_word: γυναικὸς
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In this possessive family context, γυνή clearly means 'wife,' not merely
    'woman.'
- source_word: υἱῶν
  chosen: sons
  alternatives:
  - children
  lexicon: BDAG
  rationale: The Greek specifically says 'sons.' Following the project's gender-accurate
    principle, the masculine familial term should not be generalized to 'children'
    without textual warrant.
- source_word: Ἐκβάτανα
  chosen: Ecbatana
  alternatives:
  - Ekbatana
  lexicon: LSJ
  rationale: This is a proper place name; standard English transliteration is 'Ecbatana.'
- source_word: πρὸς Ῥαγουὴλ τὸν πενθερὸν αὐτοῦ
  chosen: to Raguel his father-in-law
  alternatives:
  - to Raguel, his wife's father
  lexicon: BDAG
  rationale: πρός with a personal object here indicates movement toward a person,
    idiomatically 'to.' πενθερός means 'father-in-law'; the appositional phrase is
    rendered directly and naturally.
