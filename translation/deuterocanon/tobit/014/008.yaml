theological_decisions:
- issue: Prophetic certainty regarding Nineveh's fate
  chosen_reading: 'Render the statement as an emphatic prediction: ''what the prophet
    Jonah spoke will surely happen.'''
  alternative_readings:
  - '''what the prophet Jonah said will certainly come to pass'''
  rationale: The verse presents Tobit's confidence in the fulfillment of Jonah's prophecy.
    The translation should preserve the certainty without importing further interpretive
    detail about timing or mechanism.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
