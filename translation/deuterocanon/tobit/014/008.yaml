id: TOB.14.8
reference: Tobit 14:8
source:
  edition: lxx-swete-1909
  text: καὶ νῦν, τέκνον, ἄπελθε ἀπὸ Νινευή, ὅτι πάντως ἔσται ἃ ἐλάλησεν ὁ προφήτης
    Ἰωνᾶς.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And now, child, depart from Nineveh, because what the prophet Jonah spoke
    will surely happen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'son' for 'child'; the Greek τέκνον is a filial term of address and can
      be rendered either way depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνον
  chosen: child
  alternatives:
  - son
  lexicon: BDAG
  rationale: τέκνον is a term of filial address meaning 'child'; 'child' preserves
    the direct parental address without adding the more specific male term 'son,'
    which the Greek here does not require.
- source_word: ἄπελθε
  chosen: depart
  alternatives:
  - go away
  - leave
  lexicon: BDAG
  rationale: The aorist imperative of ἀπέρχομαι calls for immediate departure. 'Depart'
    is slightly more formal than 'leave' and fits the solemn tone while remaining
    natural English.
- source_word: ἀπὸ Νινευή
  chosen: from Nineveh
  alternatives:
  - away from Nineveh
  lexicon: BDAG
  rationale: The preposition ἀπό marks separation from the city. 'From Nineveh' is
    the most direct and idiomatic rendering in English.
- source_word: πάντως
  chosen: will surely
  alternatives:
  - certainly
  - by all means
  lexicon: BDAG
  rationale: πάντως intensifies the certainty of the prediction. Rendering it with
    'will surely' communicates that emphatic certainty in smooth English.
- source_word: ἔσται
  chosen: happen
  alternatives:
  - be
  - come to pass
  lexicon: BDAG
  rationale: Although literally 'will be,' in this prophetic context English idiom
    prefers 'will happen' to express the occurrence of foretold events.
- source_word: ἃ ἐλάλησεν
  chosen: what ... spoke
  alternatives:
  - the things that ... said
  - what ... said
  lexicon: BDAG
  rationale: The relative pronoun with ἐλάλησεν refers to the content of Jonah's prophetic
    speech. 'What ... spoke' stays close to the Greek; 'said' is possible, but 'spoke'
    better matches prophetic diction.
- source_word: ὁ προφήτης Ἰωνᾶς
  chosen: the prophet Jonah
  alternatives:
  - Jonah the prophet
  lexicon: BDAG
  rationale: This is a straightforward titular identification. 'The prophet Jonah'
    is natural English and preserves the Greek order and emphasis.
