id: TOB.14.5
reference: Tobit 14:5
source:
  edition: lxx-swete-1909
  text: καὶ πάλιν ἐλεήσει αὐτοὺς ὁ θεὸς καὶ ἐπιστρέψει αὐτοὺς εἰς τὴν γῆν, καὶ οἰκοδομήσουσιν
    τὸν οἶκον, οὐχ οἷος ὁ πρότερος, ἕως πληρωθῶσιν καιροὶ τοῦ αἰῶνος. καὶ μετὰ ταῦτα
    ἐπιστρέψουσιν ἐκ τῶν αἰχμαλωσιῶν καὶ οἰκοδομήσουσιν Ἰερουσαλὴμ ἐντίμως, καὶ ὁ
    οἶκος τοῦ θεοῦ ἐν αὐτῇ οἰκοδομηθήσεται ἐνδόξως, καθὼς ἐλάλησαν περὶ αὐτῆς οἱ προφῆται.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And God will again have mercy on them and bring them back to the land, and
    they will build the house, though not like the former one, until the times of
    the age are fulfilled. And after these things they will return from the captivities
    and build Jerusalem honorably, and the house of God in her will be built gloriously,
    just as the prophets spoke concerning her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from exile.' The Greek has the plural 'from the captivities,' which
      may point to multiple places or episodes of exile.
    reason: lexical_alternative
  - marker: b
    text: '''The times of the age'' is an idiomatic phrase that may refer to appointed
      times leading up to God''s fuller restoration; the Greek is left intentionally
      open here.'
    reason: lexical_alternative
  - marker: c
    text: 'Jerusalem is referred to with feminine pronouns in Greek: ''in her'' and
      ''concerning her.'''
    reason: cultural_note
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Marks renewed divine action after prior judgment/restoration; 'again'
    is the most natural concise rendering.
- source_word: ἐλεήσει
  chosen: will have mercy on
  alternatives:
  - will show mercy to
  - will pity
  lexicon: BDAG
  rationale: The future of ἐλεέω denotes compassionate divine favor. 'Have mercy on'
    is idiomatic English and preserves the covenantal-religious tone.
- source_word: ἐπιστρέψει αὐτοὺς εἰς τὴν γῆν
  chosen: bring them back to the land
  alternatives:
  - restore them to the land
  - turn them back into the land
  lexicon: BDAG
  rationale: Although ἐπιστρέφω is literally 'turn/return,' with a direct object and
    destination it conveys restoration from exile. 'Bring them back' reads naturally
    while preserving the causative sense. 'The land' is retained rather than 'their
    land' because the Greek has the article without possessive pronoun.
- source_word: οἰκοδομήσουσιν τὸν οἶκον
  chosen: they will build the house
  alternatives:
  - they will rebuild the house
  - they will build the temple
  lexicon: BDAG
  rationale: The immediate Greek says 'the house.' In context this refers to the temple,
    but retaining 'house' preserves the source wording and biblical idiom; the referent
    becomes explicit later in 'the house of God.'
- source_word: οὐχ οἷος ὁ πρότερος
  chosen: though not like the former one
  alternatives:
  - not such as the former
  - not like the first
  lexicon: LSJ
  rationale: This comparative phrase qualifies the rebuilt house as inferior or different
    relative to the earlier temple. 'Though not like the former one' captures the
    concessive force naturally in English.
- source_word: ἕως πληρωθῶσιν καιροὶ τοῦ αἰῶνος
  chosen: until the times of the age are fulfilled
  alternatives:
  - until the appointed times of the age are completed
  - until the times of eternity are fulfilled
  lexicon: BDAG
  rationale: καιροί suggests appointed times or seasons; αἰών here is best kept as
    'age' rather than paraphrased away. The phrase is somewhat idiomatic/apocalyptic,
    so a relatively formal rendering preserves its theological openness.
- source_word: ἐκ τῶν αἰχμαλωσιῶν
  chosen: from the captivities
  alternatives:
  - from exile
  - from the places of captivity
  lexicon: LSJ
  rationale: The plural is explicit in Greek and may suggest multiple dispersions/places
    of exile. 'Captivities' preserves that plurality better than the smoother singular
    'exile.'
- source_word: ἐντίμως
  chosen: honorably
  alternatives:
  - splendidly
  - with honor
  - worthily
  lexicon: BDAG
  rationale: The adverb denotes in an honorable or dignified manner. 'Honorably' is
    slightly formal but transparent and avoids overcommitting to architectural grandeur
    alone.
- source_word: ἐν αὐτῇ
  chosen: in her
  alternatives:
  - in it
  - within it
  lexicon: BDAG
  rationale: The pronoun refers to Jerusalem, a grammatically feminine city name.
    'In her' preserves the personified-city idiom present in the Greek better than
    the flatter 'in it.'
- source_word: ἐνδόξως
  chosen: gloriously
  alternatives:
  - with glory
  - splendidly
  lexicon: BDAG
  rationale: The adverb carries the sense of glory/splendor. 'Gloriously' preserves
    the theological resonance of δόξα rather than reducing it to mere aesthetics.
- source_word: καθὼς ἐλάλησαν περὶ αὐτῆς οἱ προφῆται
  chosen: just as the prophets spoke concerning her
  alternatives:
  - as the prophets spoke about her
  - just as the prophets said of her
  lexicon: BDAG
  rationale: Retains the explicit prophetic reference and again preserves the feminine
    personification of Jerusalem with 'her.'
