theological_decisions:
- issue: Temporal phrase καιροὶ τοῦ αἰῶνος
  chosen_reading: until the times of the age are fulfilled
  alternative_readings:
  - until the appointed times are fulfilled
  - until the age-long times are fulfilled
  rationale: The phrase is eschatologically suggestive but not precise enough to justify
    an interpretive paraphrase. The main text preserves the ambiguity/tension rather
    than resolving it into a specific end-times scheme.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referent of 'the house'
  chosen_reading: the house
  alternative_readings:
  - the temple
  rationale: Although the referent is clearly the temple, the source first uses the
    idiomatic biblical expression 'the house.' Retaining it respects original-language
    primacy and lets the later phrase 'the house of God' clarify the meaning.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Personification of Jerusalem in pronouns
  chosen_reading: in her / concerning her
  alternative_readings:
  - in it / concerning it
  rationale: The Greek uses feminine forms referring to Jerusalem. Preserving the
    personified city imagery is more faithful than neutralizing it, and it does not
    create doctrinal distortion.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
