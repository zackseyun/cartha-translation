id: TOB.14.14
reference: Tobit 14:14
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέθανεν ἐτῶν ἑκατὸν ἑπτὰ ἐν Ἐκβατάνοις τῆς Μηδείας.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And he died at the age of one hundred seven in Ecbatana of Media.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: The aorist verb straightforwardly denotes death. 'Died' is the plain,
    direct English equivalent and avoids euphemism.
- source_word: ἐτῶν ἑκατὸν ἑπτὰ
  chosen: at one hundred seven years old
  alternatives:
  - being one hundred seven years old
  - aged one hundred seven
  lexicon: LSJ
  rationale: This genitive-of-age expression indicates age at death. 'At one hundred
    seven years old' is natural modern English while preserving the sense.
- source_word: ἐν Ἐκβατάνοις
  chosen: in Ecbatana
  alternatives:
  - at Ecbatana
  lexicon: LSJ
  rationale: The preposition ἐν with the place name is most naturally rendered 'in.'
    'Ecbatana' is the standard English transliteration of the city name.
- source_word: τῆς Μηδείας
  chosen: of Media
  alternatives:
  - in Media
  - of the Medes
  lexicon: LSJ
  rationale: The genitive identifies which Ecbatana is meant, functioning appositionally
    or descriptively. 'Of Media' preserves the Greek construction closely and clearly
    distinguishes the location.
