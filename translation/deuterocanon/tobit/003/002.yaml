translation:
  text: You are righteous, Lord, and all your works and all your ways are mercy and
    truth, and you judge true and righteous judgment forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all your ways are mercies and faithfulness.' The Greek ἐλεημοσύναι can
      denote merciful acts, and ἀλήθεια can carry the nuance 'faithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: Predicative adjective describing the Lord's character. 'Righteous' preserves
    the moral/theological sense more naturally in biblical English, while 'just' remains
    a viable alternative.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Direct address to God. Per doctrine, κύριος defaults to 'Lord.'
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: A standard rendering that preserves the broad sense of what God does
    without narrowing it.
- source_word: ὁδοί
  chosen: ways
  alternatives:
  - paths
  - courses
  lexicon: BDAG
  rationale: Common biblical idiom for God's manner of acting and governing; 'ways'
    is both natural and intertextually resonant.
- source_word: ἐλεημοσύναι
  chosen: acts of mercy
  alternatives:
  - mercies
  - almsgivings
  - charitable deeds
  lexicon: BDAG
  rationale: Though often used for almsgiving, here it predicates God's ways and so
    denotes merciful acts or mercy shown. 'Acts of mercy' avoids the misleadingly
    narrow sense of human almsgiving while preserving the plural force.
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - faithfulness
  lexicon: BDAG
  rationale: The pairing with mercy echoes a common biblical collocation. 'Truth'
    is the most direct rendering of the Greek; 'faithfulness' is a meaningful nuance
    but is better preserved as an alternative.
- source_word: κρίσιν ἀληθινὴν καὶ δικαίαν
  chosen: true and righteous judgment
  alternatives:
  - true and just judgment
  - a judgment that is true and righteous
  lexicon: BDAG
  rationale: Retains both adjectives modifying 'judgment' and preserves the formal
    weight of the clause.
- source_word: κρίνεις
  chosen: you judge
  alternatives:
  - you render judgment
  - you decide
  lexicon: BDAG
  rationale: Direct and transparent rendering of the verb, fitting the prayer's address
    to God.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - for the age
  lexicon: BDAG
  rationale: Idiomatic English for enduring duration. Here it most naturally modifies
    God's judging as an abiding reality.
