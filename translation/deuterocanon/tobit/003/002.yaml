theological_decisions:
- issue: Whether ἀλήθεια should be rendered 'truth' or 'faithfulness' in the mercy-truth
    pairing
  chosen_reading: truth
  alternative_readings:
  - faithfulness
  rationale: The Greek plainly reads ἀλήθεια, and 'truth' preserves the lexical form.
    Because the collocation can also imply covenantal reliability, 'faithfulness'
    is preserved in a footnote as a meaningful alternative nuance rather than imported
    into the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
