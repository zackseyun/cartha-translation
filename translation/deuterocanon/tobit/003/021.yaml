id: TOB.3.21
reference: Tobit 3:21
source:
  edition: lxx-swete-1909
  text: καὶ μὴ φοβοῦ, παιδίον, ὅτι ἐπτωχεύσαμεν· ὑπάρχει σοι πολλὰ, ἐὰν φοβηθῇς τὸν
    θεὸν καὶ ἀποστῇς ἀπὸ πάσης ἁμαρτίας καὶ ποιήσῃς τὸ ἀρεστὸν ἐνώπιον αὐτοῦ. αὐτῷ
    Ζήτησον σεαυτῷ ἄνθρωπον ὃς συμπορεύσεταί σοι, καὶ δώσω αὐτῷ μισθὸν ἕως ζῶ, καὶ
    λάβε πορευθεὶς τὸ ἀργύριον. καὶ ἐπορεύθη ζητῆσαι ἄνθρωπον, καὶ εὗρεν Ῥαφαὴλ ὃς
    ἦν ἄγγελος, καὶ οὐκ ᾔδει· καὶ εἶπεν αὐτῷ Εἰ δύναμαι πορευθῆναι μετὰ σοῦ ἐν Ῥάγοις
    τῆς Μηδείας, καὶ εἰ ἔμπειρος εἶ τῶν τόπων; καὶ εἶπεν αὐτῷ ὁ ἄγγελος Πορεύσομαι
    μετὰ σοῦ, καὶ τῆς ὁδοῦ ἐμπειρῶ, καὶ παρὰ Γαβαὴλ τὸν ἀδελφὸν ἡμῶν ηὐλίσθην. καὶ
    εἶπεν αὐτῷ Τωβίας Ὑπόμεινόν με, καὶ ἐρῶ τῷ πατρί. καὶ εἶπεν αὐτῷ Πορεύου καὶ μὴ
    χρονίσῃς. Καὶ εἰσελθὼν εἶπεν τῷ πατρί Ἰδοὺ εὕρηκα ὃς συμπορεύσεταί μοι. ὁ δὲ εἶπεν
    Φώνησον αὐτὸν πρὸς μέ, ἵνα ἐπιγνῶ ποίας φυλῆς ἐστίν, καὶ εἰ πιστὸς τοῦ πορευθῆναι
    μετὰ σοῦ. καὶ ἐκάλεσεν αὐτόν· καὶ εἰσῆλθεν, καὶ ἠσπά- [⋯] ἠσπάσασαντο ἀλλήλους.
    καὶ εἶπεν αὐτῷ Τωβεὶτ Ἀδελφέ, ἐκ ποίας φυλῆς καὶ ἐκ ποίας πατρίδος σὺ εἶ; ὑπόδειξόν
    μοι. καὶ εἶπεν αὐτῷ Φυλὴν καὶ πατριὰν τί ζητεῖς, ἢ μίσθιον, ὃς συμπορεύ- σεται
    μετὰ τοῦ υἱοῦ σου; καὶ εἶπεν αὐτῷ Τωβεὶτ Βούλομαι, ἀδελφέ, ἐπιγνῶναι τὸ γένος
    σου καὶ τὸ ὄνομα. ὃς δὲ εἶπεν Ἐγὼ Ἀζαρίας Ἀνανίου τοῦ μεγάλου, τῶν ἀδελφῶν σου.
    καὶ εἶπεν αὐτῷ Ὑγιαίνων ἔλθοις, ἀδελφέ· καὶ μὴ μοι ὀργισθῇς ὅτι ἐζήτησα τὴν φυλήν
    σου καὶ τὴν πατριάν σου ἐπιγνῶναι. καὶ σὺ τυγχάνεις ἀδελφός μου ἐκ τῆς καλῆς καὶ
    ἀγαθῆς γενεᾶς· ἐπεγίνωσκον γὰρ ἐγὼ Ἀνανίαν καὶ Ἰαθὰν τοὺς υἱοὺς Σεμείου τοῦ μεγάλου,
    ὡς ἐπορευόμεθα κοινῶς εἰς Ἰερουσαλὴμ προσκυνεῖν, ἀναφέροντες τὰ πρωτότοκα καὶ
    τὰς δεκάτας τῶν γενημάτων, καὶ οὐκ ἐπλανήθησαν ἐν τῇ πλάνῃ τῶν ἀδελφῶν ἡμῶν· ἐκ
    ῥίζης - καλῆς εἶ, ἀδελφέ. ἀλλʼ εἰπόν μοι τίνα σοὶ ἔσομαι μισθὸν διδόναι; δραχμὴν
    τῆς ἡμέρας καὶ τὰ δέοντά σοι ὡς καὶ τῷ υἱῷ μου; καὶ ἔτι προσθήσω σοι ἐπὶ τὸν μισθόν,
    ἐὰν ὑγιαίνοντες ἐπιστρέψητε. εὐδόκησαν οὕτως· καὶ εἶπεν πρὸς Τωβίαν Ἔτοιμος γίνου
    πρὸς τὴν ὁδόν· καὶ εὐοδωθεῖητε. καὶ ἡτοίμασεν ὁ υἱὸς αὐτοῦ τὰ πρὸς τὴν ὁδόν· καὶ
    εἶπεν αὐτῷ ὁ πατὴρ αὐτοῦ Πορεύου μετὰ τοῦ ἀνθρώπου· ὁ δὲ ἐν τῷ οὐρανῷ οἰκῶν θεὸς
    εὐοδώσει τὴν ὁδὸν ὑμῶν, καὶ ὁ ἄγγελος αὐτοῦ συμπορευθήτω ὑμῖν. καὶ ἐξῆλθαν ἀμφότεροι
    ἀπελθεῖν, καὶ ὁ κύων τοῦ παιδαρίου μετ’ αὐτῶν. ἰχθύος· καὶ ἐκράτησεν τὸν ἰχθὺν
    τὸ παιδάριον, καὶ ἀνέβαλεν αὐτὸν ἐπὶ τὴν γῆν. καὶ εἶπεν αὐτῷ ὁ ἄγγελος Ἀνάτεμε
    τὸν ἰχθύν, καὶ λαβὼν τὴν καρδίαν καὶ τὸ ἧπαρ καὶ τὴν χολὴν θὲς ἀσφαλῶς. καὶ ἐποίησεν
    τὸ παιδάριον ὡς εἶπεν αὐτῷ ὁ ἄγγελος, τὸν δὲ ἰχθὺν ὀπτήσαντες ἔφαγον· καὶ ὥδευον
    ἀμφότεροι ἕως ἤγγισαν ἐν Ἐκβατάνοις. καὶ εἶπεν τὸ παιδάριον τῷ ἀγγέλῳ Ἀζαρία ἀδελφέ,
    τί ἐστιν τὸ ἧπαρ καὶ ἡ καρδία καὶ ἡ χολὴ τοῦ ἰχθύος; καὶ εἶπεν αὐτῷ Ἡ καρδία καὶ
    τὸ ἧπαρ, ἐάν τινα ὀχλῇ δαιμόνιον ἢ πνεῦμα πονηρόν· ταῦτα δὲ καπνίσαι ἐνώπιον ἀνθρώπου
    ἢ γυναικός, καὶ οὐ μηκέτι ὀχληθῇ. ἡ δὲ χολὴ ἐγχρῖσαι ἄνθρωπον ὃς ἔχει λευκώματα
    ἐν τοῖς ὀφθαλμοῖς, καὶ ἰαθήσεται. Ὡς δὲ προσήγγισαν τῇ Ῥάγης,
