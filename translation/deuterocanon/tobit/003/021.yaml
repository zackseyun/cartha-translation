lexical_decisions:
- source_word: ἐλυπήθη
  chosen: was utterly grieved
  alternatives:
  - was saddened
  - was distressed
  lexicon: LSJ
  rationale: The verb denotes deep sorrow or distress. 'Was utterly grieved' preserves
    the emotional weight better than the flatter 'was saddened.'
- source_word: σφόδρα
  chosen: utterly
  alternatives:
  - greatly
  - very much
  lexicon: LSJ
  rationale: This adverb intensifies the grief. 'Utterly' gives a natural modern English
    equivalent with strong force.
- source_word: ἔκλαυσεν
  chosen: wept
  alternatives:
  - cried
  lexicon: LSJ
  rationale: '''Wept'' is the more precise and dignified rendering for lamentation
    in this narrative context.'
