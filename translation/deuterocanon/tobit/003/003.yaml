theological_decisions:
- issue: Scope of the relative clause ἃ ἥμαρτον ἐνώπιόν σου
  chosen_reading: The clause refers specifically to 'my fathers' and their sins before
    God.
  alternative_readings:
  - The clause could be taken more loosely as summarizing all the sins just mentioned.
  rationale: The plural verb ἥμαρτον points most naturally to the nearest plural antecedent,
    'my fathers.' This also fits the penitential pattern of confessing both personal
    and ancestral sin without collapsing them into one subject.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than flatten it.
