translation:
  text: Remember me and look upon me; do not punish me for my sins, for my errors
    done in ignorance, and for those of my fathers, which they sinned before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not exact vengeance for my sins.' The Greek verb can carry the sense
      of avenging or exacting justice; here it is rendered 'punish' because the prayer
      asks God not to requite sins.
    reason: lexical_alternative
  - marker: b
    text: '''My errors done in ignorance'' translates a term for wrongs committed
      unwittingly or without full awareness.'
    reason: lexical_alternative
  - marker: c
    text: That is, 'my ancestors' or 'my forefathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητί
  chosen: Remember
  alternatives:
  - Be mindful of
  - Recall
  lexicon: BDAG
  rationale: Imperative of μιμνῄσκομαι/μιμνήσκομαι in prayer language asks God to
    take notice favorably. 'Remember' is the most direct and idiomatic English equivalent
    and preserves biblical prayer diction without archaism.
- source_word: ἐπίβλεψον ἐπʼ ἐμέ
  chosen: look upon me
  alternatives:
  - look at me
  - regard me
  - turn your gaze to me
  lexicon: BDAG
  rationale: The phrase intensifies the plea for divine attention. 'Look upon me'
    preserves the elevated but still readable tone of petition better than the flatter
    'look at me.'
- source_word: μὴ ἐκδίκῃς
  chosen: do not punish
  alternatives:
  - do not avenge
  - do not exact vengeance for
  - do not take vengeance for
  lexicon: BDAG
  rationale: Although ἐκδικέω can mean 'avenge' or 'exact justice,' in this penitential
    context with sins as the object, the sense is God's punitive requital. 'Do not
    punish' communicates the force clearly in modern English without importing a narrower
    revenge nuance.
- source_word: τὰς ἁμαρτίας μου
  chosen: my sins
  alternatives:
  - my offenses
  lexicon: BDAG
  rationale: Standard rendering of ἁμαρτία. 'Sins' best preserves the moral and theological
    weight of the confession.
- source_word: τοῖς ἀγνοήμασίν μου
  chosen: my errors done in ignorance
  alternatives:
  - my inadvertent sins
  - my ignorant acts
  - my mistakes
  lexicon: BDAG
  rationale: ἀγνόημα denotes wrongdoing committed in ignorance or unwittingly. 'Errors
    done in ignorance' preserves that nuance more clearly for modern readers than
    the more technical 'inadvertent sins,' while avoiding the overly weak 'mistakes.'
- source_word: τῶν πατέρων μου
  chosen: my fathers
  alternatives:
  - my ancestors
  - my forefathers
  lexicon: BDAG
  rationale: The Greek is literally 'my fathers.' In context it refers to ancestral
    guilt. 'My fathers' preserves the source wording and its familial-covenantal resonance;
    a footnote is not necessary because the sense remains intelligible.
- source_word: ἃ ἥμαρτον ἐνώπιόν σου
  chosen: which they sinned before you
  alternatives:
  - which they committed before you
  - which they did in your sight
  lexicon: BDAG
  rationale: The relative clause most naturally modifies 'my fathers,' not all preceding
    items. Rendering the plural subject explicitly as 'they' reflects the Greek verb
    ἥμαρτον and avoids implying that Tobit himself committed the fathers' sins. 'Before
    you' preserves the relational/judicial sense of ἐνώπιόν σου.
