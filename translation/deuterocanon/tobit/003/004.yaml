theological_decisions:
- issue: Corporate confession and divine agency in judgment
  chosen_reading: Retain both Israel's disobedience ('they disobeyed') and God's judicial
    action ('you gave us over') without softening either.
  alternative_readings:
  - 'Soften divine agency: ''we were given over'''
  - Generalize guilt to 'we disobeyed'
  rationale: The Greek text distinguishes the ancestors/people who disobeyed ('they')
    from the present community suffering the consequences ('us'), while explicitly
    attributing the handing over to God. The translation preserves this theological
    tension rather than harmonizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Idiomatic shame language
  chosen_reading: Render παραβολὴν ὀνειδισμοῦ closely as 'a proverb of reproach' in
    the main text, with a more idiomatic alternative preserved in a footnote.
  alternative_readings:
  - an object of reproach
  - a byword of disgrace
  rationale: The phrase expresses public shame among the nations. A close rendering
    best preserves the source imagery, while the footnote documents the idiomatic
    sense for readers.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
