translation:
  text: For they disobeyed your commandments, and you gave us over to plunder and
    captivity and death, and to become a proverb of reproach among all the nations
    where we have been scattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a byword of disgrace' or 'an object of reproach.' The Greek phrase literally
      combines 'proverb/byword' with 'reproach.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρήκουσαν
  chosen: they disobeyed
  alternatives:
  - they refused to listen
  - they were disobedient to
  lexicon: BDAG
  rationale: The verb denotes failure to heed or obey. 'Disobeyed' is concise and
    idiomatic in English, and it fits the direct object 'your commandments' better
    than the more literal 'refused to listen to.'
- source_word: ἐντολῶν
  chosen: commandments
  alternatives:
  - commands
  lexicon: BDAG
  rationale: '''Commandments'' preserves the formal covenantal/religious force of
    the term in prayer language better than the slightly flatter ''commands.'''
- source_word: ἔδωκας ἡμᾶς εἰς
  chosen: you gave us over to
  alternatives:
  - you handed us over to
  - you gave us to
  lexicon: BDAG
  rationale: The construction conveys divine delivering over into adverse conditions.
    'Gave us over to' is natural English and preserves the judicial/theological force.
- source_word: διαρπαγήν
  chosen: plunder
  alternatives:
  - spoil
  - pillage
  lexicon: BDAG
  rationale: The noun refers to being given over to looting or prey. 'Plunder' is
    clear modern English and fits the sequence of calamities.
- source_word: αἰχμαλωσίαν
  chosen: captivity
  alternatives:
  - exile
  - being taken captive
  lexicon: BDAG
  rationale: '''Captivity'' is the most direct rendering. ''Exile'' is possible in
    context, but the Greek term more specifically denotes capture/captivity.'
- source_word: θάνατον
  chosen: death
  alternatives:
  - destruction
  lexicon: BDAG
  rationale: The plain sense is 'death'; there is no need to soften or broaden it.
- source_word: παραβολὴν ὀνειδισμοῦ
  chosen: a proverb of reproach
  alternatives:
  - an object of reproach
  - a byword of disgrace
  lexicon: BDAG
  rationale: παραβολή here carries the sense of a proverbial saying/byword, and ὀνειδισμός
    adds the sense of insult or reproach. 'A proverb of reproach' stays close to the
    Greek while remaining intelligible. Because the idiom may be unfamiliar, a lexical
    alternative is worth preserving in a footnote.
- source_word: πᾶσιν τοῖς ἔθνεσιν
  chosen: among all the nations
  alternatives:
  - to all the nations
  - among all the Gentiles
  lexicon: BDAG
  rationale: In Tobit's exilic setting, 'nations' is the broad and contextually appropriate
    rendering. 'Gentiles' would import later Jewish/Christian usage too strongly.
- source_word: ἐν οἷς ἐσκορπίσμεθα
  chosen: where we have been scattered
  alternatives:
  - among whom we were scattered
  - where we were dispersed
  lexicon: BDAG
  rationale: The passive verb refers to diaspora scattering. 'Where we have been scattered'
    reads naturally in English and preserves the continuing result of the scattering.
