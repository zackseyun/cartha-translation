theological_decisions:
- issue: Rendering κύριος in direct address to God
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse is a prayer addressed to God. Per doctrine, κύριος defaults
    to 'Lord'; no contextual factor here warrants deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Doxological language of blessing directed toward God
  chosen_reading: let all your works bless you
  alternative_readings:
  - let all your works praise you
  rationale: The Greek repeats the blessing vocabulary rather than using a distinct
    praise verb. Retaining 'bless' preserves the lexical cohesion of the prayer, while
    the alternative is worth preserving because English readers may find 'praise'
    more idiomatic when creatures address God.
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, or documented exception
