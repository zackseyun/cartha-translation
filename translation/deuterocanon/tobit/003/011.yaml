id: TOB.3.11
reference: Tobit 3:11
source:
  edition: lxx-swete-1909
  text: καὶ ἐδεήθη πρὸς τῇ θυρίδι καὶ εἶπεν Εὐλογητὸς εἶ εἶ, Κύριε ὁ θεός μου, καὶ
    εὐλογητὸν τὸ ὄνομά σου τὸ ἅγιον καὶ ἔντιμον εἰς τοὺς αἰῶνας· εὐλογησάτωσάν σε
    πάντα τὰ ἔργα σου εἰς τὸν αἰῶνα.
  language: Greek
