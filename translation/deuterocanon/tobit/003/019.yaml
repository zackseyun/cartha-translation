theological_decisions:
- issue: Rendering κύριος in a deuterocanonical wisdom-exhortation context
  chosen_reading: the Lord
  alternative_readings:
  - Master
  rationale: The project's default rendering for κύριος is 'Lord.' In this context
    it denotes God in a reverential title, and 'Lord God' is the most natural English
    equivalent.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Divine sovereignty statement in ὃ ἐὰν θέλῃ ταπεινοῖ, καθὼς βούλεται
  chosen_reading: whomever he wills he humbles, as he wills
  alternative_readings:
  - whatever he wills he humbles, as he chooses
  rationale: The verse emphasizes God's freedom to bestow good and to humble. The
    translation preserves that tension without softening the claim or over-systematizing
    it doctrinally.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
