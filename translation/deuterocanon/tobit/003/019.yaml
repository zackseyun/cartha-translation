id: TOB.3.19
reference: Tobit 3:19
source:
  edition: lxx-swete-1909
  text: καὶ ἐν παντὶ καιρῷ εὐλόγει Κύριον τὸν Θεόν, καὶ παρʼ αὐτοῦ αἴτησον ὅπως αἱ
    ὁδοί σου εὐθεῖαι γένωνται καὶ πᾶσαι αἱ τρίβοι καὶ βουλαὶ εὐοδωθῶσιν. διότι πᾶν
    ἔθνος οὐκ ἔχει βουλήν, ἀλλὰ αὐτὸς ὁ κύριος δίδωσιν πάντα τὰ ἀγαθὰ καὶ ὃ ἐὰν θέλῃ
    ταπεινοῖ, καθὼς βούλεται. καὶ νῦν, παιδίον, μνημόνευε τῶν ἐντολῶν μου, καὶ μὴ
    ἐξαλειφθή- τωσαν ἐκ τῆς καρδίας σου.
  language: Greek
  pages:
  - 842
  validation: no_reference
translation:
  text: And at all times bless the Lord God, and ask from him that your ways may be
    made straight and that all your paths and plans may prosper. For no nation has
    counsel, but the Lord himself gives all good things, and whomever he wills he
    humbles, as he wills. And now, child, remember my commandments, and do not let
    them be blotted out from your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'that your ways may become straight.' The Greek can
      express either becoming straight or being made straight.
    reason: lexical_alternative
  - marker: b
    text: The clause 'For no nation has counsel' is terse in Greek and may mean that
      no people possesses reliable counsel in itself, in contrast to the Lord who
      gives what is good.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν παντὶ καιρῷ
  chosen: at all times
  alternatives:
  - at every time
  - always
  lexicon: LSJ
  rationale: A natural English rendering that preserves the distributive force of
    the phrase without sounding wooden.
- source_word: εὐλόγει
  chosen: bless
  alternatives:
  - praise
  lexicon: LSJ
  rationale: The imperative directly means 'bless'; 'praise' is possible in context,
    but 'bless' better reflects the Greek wording and biblical idiom.
- source_word: Κύριον τὸν Θεόν
  chosen: the Lord God
  alternatives:
  - the Lord, God
  lexicon: LSJ
  rationale: Follows the Greek title sequence naturally in English. 'Lord' matches
    the project's default for κύριος.
- source_word: παρʼ αὐτοῦ αἴτησον
  chosen: ask from him
  alternatives:
  - ask of him
  - request from him
  lexicon: LSJ
  rationale: Preserves the explicit preposition παρʼ ('from') while remaining readable.
    Slightly more formal than 'ask him' to reflect the source.
- source_word: ὅπως ... γένωνται
  chosen: that your ways may be made straight
  alternatives:
  - that your ways may become straight
  - that your ways may be directed aright
  lexicon: LSJ
  rationale: εὐθεῖαι with γένωνται suggests being made or becoming straight. 'Made
    straight' preserves the passive/resultative sense and echoes biblical path imagery.
- source_word: ὁδοί
  chosen: ways
  alternatives:
  - roads
  - conduct
  lexicon: LSJ
  rationale: Retains the metaphorical breadth of life-course or course of action,
    not merely literal roads.
- source_word: τρίβοι
  chosen: paths
  alternatives:
  - tracks
  - ways
  lexicon: LSJ
  rationale: A standard English equivalent that preserves the parallelism with ὁδοί
    while still distinguishing the terms.
- source_word: βουλαὶ
  chosen: plans
  alternatives:
  - counsels
  - purposes
  lexicon: LSJ
  rationale: In the first clause, βουλαί refers to one's intentions or designs; 'plans'
    is clear modern English. The same Greek root later appears in a different syntactic
    setting and is rendered 'counsel' there to fit the statement idiomatically.
- source_word: εὐοδωθῶσιν
  chosen: may prosper
  alternatives:
  - may succeed
  - may be prospered
  lexicon: LSJ
  rationale: Conveys successful progress or favorable outcome. 'May prosper' is idiomatic
    and fits the prayer context.
- source_word: πᾶν ἔθνος οὐκ ἔχει βουλήν
  chosen: no nation has counsel
  alternatives:
  - every nation has no counsel
  - no people has understanding of counsel
  - no nation possesses true counsel
  lexicon: LSJ
  rationale: The Greek is somewhat abrupt. This rendering stays close to the wording
    while making coherent English. 'Counsel' here fits the generalized statement better
    than 'plan.'
- source_word: δίδωσιν πάντα τὰ ἀγαθὰ
  chosen: gives all good things
  alternatives:
  - grants every good thing
  - gives all the good
  lexicon: LSJ
  rationale: Straightforward rendering of the phrase, preserving divine agency and
    the broad sense of blessings.
- source_word: ὃ ἐὰν θέλῃ ταπεινοῖ
  chosen: whomever he wills he humbles
  alternatives:
  - whatever he wills he humbles
  - anyone he wishes he brings low
  lexicon: LSJ
  rationale: Although ὃ can be formally neuter, the context of divine sovereignty
    over persons favors a personal sense in English. 'Humbles' preserves the theological
    and social force of ταπεινοῖ.
- source_word: παιδίον
  chosen: child
  alternatives:
  - my child
  - son
  lexicon: LSJ
  rationale: A direct, affectionate address. 'Child' preserves the diminutive/familial
    tone without importing male specificity not explicit in the Greek form here.
- source_word: μνημόνευε
  chosen: remember
  alternatives:
  - keep in mind
  - be mindful of
  lexicon: LSJ
  rationale: Simple imperative matching the Greek and fitting wisdom-instruction style.
- source_word: ἐντολῶν μου
  chosen: my commandments
  alternatives:
  - my commands
  - my instructions
  lexicon: LSJ
  rationale: '''Commandments'' preserves the moral-authoritative force of ἐντολαί
    and echoes biblical instruction language.'
- source_word: μὴ ἐξαλειφθήτωσαν ἐκ τῆς καρδίας σου
  chosen: do not let them be blotted out from your heart
  alternatives:
  - let them not be erased from your heart
  - do not let them be wiped away from your heart
  lexicon: LSJ
  rationale: Keeps the vivid metaphor of erasure and the passive force, while expressing
    the prohibitive sense naturally in English.
