id: TOB.3.12
reference: Tobit 3:12
source:
  edition: lxx-swete-1909
  text: καὶ νῦν, Κύριε, τοὺς ὀφθαλμούς μου καὶ τὸ πρόσωπόν μου εἰς σὲ δέδωκα.
  language: Greek
  pages:
  - 832
  - 835
  - 836
  - 837
  - 838
  - 839
  - 840
  - 841
  confidence: high
  validation: agree
translation:
  text: And now, Lord, I have set my eyes and my face toward you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I have given my eyes and my face to you.' The Greek
      likely uses bodily language idiomatically for turning oneself in prayer toward
      God.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  chosen: And now
  alternatives:
  - and now
  lexicon: LSJ
  rationale: A straightforward transitional phrase marking the immediate turn of the
    prayer.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - O Lord
  lexicon: LSJ
  rationale: Vocative of κύριος. 'Lord' follows the project's default rendering for
    Kyrios. English can omit 'O' without loss of reverence, yielding more natural
    modern style.
- source_word: τοὺς ὀφθαλμούς μου
  chosen: my eyes
  alternatives:
  - my gaze
  lexicon: LSJ
  rationale: Literal rendering preserves the bodily imagery of prayer and orientation.
- source_word: τὸ πρόσωπόν μου
  chosen: my face
  alternatives:
  - my countenance
  - my presence
  lexicon: LSJ
  rationale: πρόσωπον here is best taken literally alongside 'eyes,' forming a paired
    expression of turning oneself toward God.
- source_word: εἰς σὲ
  chosen: toward you
  alternatives:
  - to you
  - upon you
  lexicon: LSJ
  rationale: With δίδωμι in this idiom, a wooden 'have given ... to you' is awkward
    in English. 'Toward you' captures directional orientation in prayer while staying
    close to the Greek preposition.
- source_word: δέδωκα
  chosen: I have set
  alternatives:
  - I have given
  - I have directed
  - I have turned
  lexicon: LSJ
  rationale: Perfect of δίδωμι literally means 'I have given,' but in context with
    'eyes' and 'face' it functions idiomatically as directing or setting them toward
    someone. 'I have set' preserves the completed, deliberate action without sounding
    unnatural.
