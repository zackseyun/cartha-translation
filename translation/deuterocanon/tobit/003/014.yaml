theological_decisions:
- issue: Sense of Sarah's claim of purity
  chosen_reading: A claim of moral/sexual purity in the face of accusation, not a
    universal doctrinal claim of sinlessness.
  alternative_readings:
  - A hyperbolic claim of total sinlessness
  - A narrower claim of virginity only
  rationale: The phrase combines 'from every sin' with 'and from a man,' suggesting
    a defense of innocence and chastity within the narrative situation. The translation
    keeps the wording broad enough to preserve the tension without importing a doctrinal
    assertion the text does not require.
  doctrine_reference: Preserve theological tension rather than resolve it.
