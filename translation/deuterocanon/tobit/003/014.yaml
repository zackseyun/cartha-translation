id: TOB.3.14
reference: Tobit 3:14
source:
  edition: lxx-swete-1909
  text: σὺ γινώσκεις, Κύριε, ὅτι καθαρά εἰμι ἀπὸ πάσης ἁμαρτίας καὶ ἀνδρός,
  language: Greek
  pages:
  - 832
  - 835
  - 836
  - 837
  - 838
  - 839
  - 840
  - 841
  confidence: high
  validation: major_mismatch
translation:
  text: You know, Lord, that I am pure from every sin and from a man,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from any man'; the Greek says 'from a man,' which in context likely
      refers to sexual relations or marriage contact rather than merely male association.
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκεις
  chosen: you know
  alternatives:
  - you understand
  - you are aware
  lexicon: BDAG
  rationale: Direct present-tense address to God; 'you know' is the plain and natural
    English equivalent.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Matches the standard rendering of κύριος as a divine title per project
    doctrine.
- source_word: καθαρά
  chosen: pure
  alternatives:
  - clean
  - innocent
  lexicon: LSJ
  rationale: The adjective denotes cleanness/purity. 'Pure' preserves both moral and
    sexual overtones in context better than the flatter 'clean' or the more interpretive
    'innocent'.
- source_word: ἀπὸ πάσης ἁμαρτίας
  chosen: from every sin
  alternatives:
  - free from all sin
  - from any sin
  lexicon: BDAG
  rationale: A fairly literal rendering of the prepositional phrase. 'From every sin'
    keeps the source structure without overinterpreting whether this means guiltlessness
    in an absolute sense or freedom from the specific charge in context.
- source_word: ἀνδρός
  chosen: a man
  alternatives:
  - any man
  - a husband
  lexicon: BDAG
  rationale: The Greek is singular genitive after ἀπό. In Sarah's prayer the point
    is sexual/marital contact with a male; 'a man' is the most direct rendering. 'Husband'
    is possible contextually, but the Greek here is broader and should not be narrowed
    in the main text.
