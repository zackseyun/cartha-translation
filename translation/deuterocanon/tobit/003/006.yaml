id: TOB.3.6
reference: Tobit 3:6
source:
  edition: lxx-swete-1909
  text: καὶ νῦν κατὰ τὸ ἀρεστόν σου ποίησον μετʼ ἐμοῦ· ἐπίταξον ἀναλαβεῖν τὸ πνεῦμά
    μου, ὅπως ἀπολυθῶ καὶ γένωμαι γῆ· διότι λυσιτελεῖ μοι ἀποθανεῖν ἢ ζῆν, ὅτι ὀνειδισμοὺς
    ψευδεῖς ἤκουσα, λύπη ἐστὶν πολλὴ ἐν ἐμοί· ἐπίταξον ἀπολυθῆναι με τῆς ἀνάγκης ἤδη
    εἰς τὸν αἰώνιον τόπον, μὴ ἀποστρέψῃς τὸ πρόσωπόν σου ἀπʼ ἐμοῦ.
  language: Greek
