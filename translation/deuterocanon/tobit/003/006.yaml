  confidence: high
  validation: agree
translation:
  text: And now deal with me according to what is pleasing to you. Command that my
    spirit be taken up, so that I may be released and become dust. For it is better
    for me to die than to live, because I have heard false reproaches, and there is
    great grief within me. Command that I be released now from this distress into
    the everlasting place, and do not turn your face away from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'become earth.' The Greek literally says 'become earth,' a death idiom
      rendered here as 'become dust.'
    reason: lexical_alternative
  - marker: b
    text: '''The everlasting place'' is a general expression for the place of the
      dead; the Greek does not specify a more developed doctrinal term here.'
    reason: cultural_note
lexical_decisions:
- source_word: κατὰ τὸ ἀρεστόν σου
  chosen: according to what is pleasing to you
  alternatives:
  - according to your pleasure
  - as seems good to you
  lexicon: BDAG
  rationale: The phrase expresses conformity to God's will or what is acceptable to
    him. 'According to what is pleasing to you' is natural English while preserving
    the God-directed sense more clearly than the more idiomatic 'as seems good to
    you.'
- source_word: ἐπίταξον
  chosen: Command
  alternatives:
  - order
  - decree
  lexicon: BDAG
  rationale: The imperative asks God to issue an authoritative command. 'Command'
    preserves the directness and solemnity of the prayer.
- source_word: ἀναλαβεῖν τὸ πνεῦμά μου
  chosen: that my spirit be taken up
  alternatives:
  - to take my spirit
  - to receive my spirit
  lexicon: BDAG
  rationale: ἀναλαμβάνω literally suggests taking up. The passive English 'be taken
    up' fits the infinitive governed by 'command' and avoids importing later formulaic
    wording not explicit in this text. 'Spirit' is retained for πνεῦμα rather than
    'life' to preserve the anthropological wording.
- source_word: ἀπολυθῶ
  chosen: I may be released
  alternatives:
  - I may be set free
  - I may depart
  lexicon: BDAG
  rationale: The verb means to be released or dismissed. Here it functions as a reverent
    circumlocution for death. 'Released' preserves the metaphor and links with the
    later repeated verb.
- source_word: γένωμαι γῆ
  chosen: become dust
  alternatives:
  - become earth
  - return to the ground
  lexicon: LSJ
  rationale: Though γῆ is literally 'earth,' in this death context 'become dust' communicates
    the idiom of returning to mortal materiality in more natural biblical English.
    This is a modest dynamic adjustment anchored in the funerary sense.
- source_word: λυσιτελεῖ μοι
  chosen: it is better for me
  alternatives:
  - it profits me
  - it is advantageous for me
  lexicon: LSJ
  rationale: The idiom means 'it is advantageous/beneficial.' In context of preferring
    death to life, 'it is better for me' is the clearest idiomatic English.
- source_word: ὀνειδισμοὺς ψευδεῖς
  chosen: false reproaches
  alternatives:
  - lying insults
  - false taunts
  lexicon: BDAG
  rationale: ὀνειδισμός denotes reproach or insult; ψευδεῖς marks them as false. 'False
    reproaches' is slightly formal but preserves both elements without overinterpreting
    tone.
- source_word: λύπη ἐστὶν πολλὴ ἐν ἐμοί
  chosen: there is great grief within me
  alternatives:
  - there is much sorrow in me
  - I am deeply grieved
  lexicon: BDAG
  rationale: The clause states an internal condition. 'There is great grief within
    me' keeps the existential structure and inward emphasis.
- source_word: τῆς ἀνάγκης
  chosen: this distress
  alternatives:
  - this affliction
  - this necessity
  - this trouble
  lexicon: BDAG
  rationale: ἀνάγκη can mean necessity, compulsion, or distress. In this lament-prayer,
    'distress' best fits the experiential sense of oppressive suffering.
- source_word: εἰς τὸν αἰώνιον τόπον
  chosen: into the everlasting place
  alternatives:
  - to the eternal place
  - to the age-long place
  lexicon: LSJ
  rationale: The phrase refers to the place of the dead in solemn terms. 'Everlasting
    place' is a transparent rendering of the Greek and avoids specifying a later doctrinal
    concept not named in the text.
- source_word: μὴ ἀποστρέψῃς τὸ πρόσωπόν σου ἀπʼ ἐμοῦ
  chosen: do not turn your face away from me
  alternatives:
  - do not turn away your face from me
  - do not hide your face from me
  lexicon: BDAG
  rationale: This is a common biblical idiom for withdrawing favor or attention. 'Turn
    your face away from me' preserves the imagery directly.
