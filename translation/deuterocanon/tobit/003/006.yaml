theological_decisions:
- issue: Anthropological wording in the death request
  chosen_reading: my spirit be taken up
  alternative_readings:
  - my life be taken
  - receive my spirit
  rationale: The Greek explicitly uses πνεῦμα, so the translation preserves 'spirit'
    rather than reducing it to 'life.' This keeps the text's wording without forcing
    a detailed doctrine of the intermediate state.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the destination after death
  chosen_reading: the everlasting place
  alternative_readings:
  - the eternal home
  - the grave
  - the place appointed forever
  rationale: The Greek says 'into the everlasting place' without naming Sheol, Hades,
    or heaven. The translation therefore keeps the broad expression and avoids importing
    a more specific afterlife concept than the source states.
  doctrine_reference: Preserve theological tension rather than resolve it.
