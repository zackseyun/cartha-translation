id: TOB.3.7
reference: Tobit 3:7
source:
  edition: lxx-swete-1909
  text: Ἐν τῇ αὐτῇ ἡμέρᾳ συνέβη τῇ θυγατρὶ Ῥαγουὴλ Σάρρᾳ ἐν Ἐκβατάνοις τῆς Μηδείας,
    καὶ ταύτην ὀνειδισθῆναι ὑπὸ παιδισκῶν πατρὸς αὐτῆς,
  language: Greek
  pages:
  - 832
  - 835
  - 836
  - 837
  - 838
  - 839
  - 840
  - 841
  confidence: high
  validation: agree
translation:
  text: On that same day it happened also to Sarah, the daughter of Raguel, in Ecbatana
    of Media, that she was reproached by her father's maidservants,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was insulted' or 'was taunted'; the Greek verb conveys public reproach
      or verbal abuse.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν τῇ αὐτῇ ἡμέρᾳ
  chosen: On that same day
  alternatives:
  - In that same day
  - On the same day
  lexicon: LSJ
  rationale: A natural temporal opening that preserves the demonstrative force of
    αὐτῇ and the narrative linkage implied by the phrase.
- source_word: συνέβη
  chosen: it happened
  alternatives:
  - it came to pass
  - it occurred
  lexicon: LSJ
  rationale: Keeps the impersonal narrative sense without archaic English. 'It happened'
    is clear modern English and fits optimal equivalence.
- source_word: τῇ θυγατρὶ Ῥαγουὴλ Σάρρᾳ
  chosen: to Sarah, the daughter of Raguel
  alternatives:
  - to Raguel's daughter Sarah
  lexicon: LSJ
  rationale: Reordered for idiomatic English while preserving both the personal name
    and filial identification.
- source_word: ἐν Ἐκβατάνοις τῆς Μηδείας
  chosen: in Ecbatana of Media
  alternatives:
  - in Ecbatana, in Media
  - in Ecbatana of the Medes
  lexicon: LSJ
  rationale: Preserves the place-name and regional designation straightforwardly.
    'Of Media' reflects the genitive naturally and avoids overexpansion.
- source_word: καὶ ταύτην
  chosen: that she too
  alternatives:
  - and that this woman
  - and her also
  lexicon: LSJ
  rationale: The construction resumes Sarah and marks parallelism with the preceding
    narrative context; 'she too' captures the additive force in idiomatic English.
- source_word: ὀνειδισθῆναι
  chosen: was reproached
  alternatives:
  - was insulted
  - was taunted
  - was reviled
  lexicon: LSJ
  rationale: '''Reproached'' preserves the verbal sense of being subjected to insulting
    blame without narrowing it to mockery alone. It also fits the serious tone of
    the narrative.'
- source_word: ὑπὸ παιδισκῶν πατρὸς αὐτῆς
  chosen: by her father's maidservants
  alternatives:
  - by the servant girls of her father
  - by her father's female servants
  lexicon: LSJ
  rationale: παιδίσκη refers to a female servant/slave; 'maidservants' is a readable
    rendering that preserves status and gender without sounding overly technical.
    The possessive relation to her father is retained explicitly.
