theological_decisions:
- issue: Whether δόξης should be expanded to an explicit reference to God
  chosen_reading: the glory
  alternative_readings:
  - God's glory
  - the glorious presence of God
  rationale: The Greek text does not explicitly name God in this clause, though the
    referent is clear from context. Preserving 'the glory' maintains the text's reverential
    indirection rather than resolving it into an explicit paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
