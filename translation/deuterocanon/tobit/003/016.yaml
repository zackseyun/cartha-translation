id: TOB.3.16
reference: Tobit 3:16
source:
  edition: lxx-swete-1909
  text: Καὶ εἰσηκούσθη προσευχὴ ἀμφοτέρων ἐνώπιον τῆς δόξης
  language: Greek
  pages:
  - 832
  - 835
  - 836
  - 837
  - 838
  - 839
  - 840
  - 841
  confidence: high
  validation: minor_mismatch
translation:
  text: And the prayer of both was heard before the glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before God's glory' or 'in the presence of the glory.' The Greek does
      not explicitly name God in this clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσηκούσθη
  chosen: was heard
  alternatives:
  - was listened to
  - was answered
  lexicon: BDAG
  rationale: The passive of εἰσακούω commonly means that a prayer is heard favorably.
    'Was heard' stays close to the Greek and avoids importing the stronger implication
    of an explicit answer that the verb itself does not require in this clause.
- source_word: προσευχὴ
  chosen: prayer
  alternatives:
  - petition
  lexicon: BDAG
  rationale: The standard sense is 'prayer.' 'Petition' is possible in context, but
    'prayer' is the more direct and natural rendering.
- source_word: ἀμφοτέρων
  chosen: of both
  alternatives:
  - of the two
  lexicon: BDAG
  rationale: The genitive refers to the two persons just mentioned in context. 'Of
    both' is concise and idiomatic English.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  - before the presence of
  lexicon: BDAG
  rationale: The preposition denotes being before or in the presence of. 'Before'
    is the most natural compact rendering here.
- source_word: δόξης
  chosen: the glory
  alternatives:
  - glory
  - the glorious presence
  lexicon: BDAG
  rationale: The Greek has the article, and in this reverential context 'the glory'
    likely functions as a metonymic way of speaking of God's glorious presence. Retaining
    'the glory' preserves the source wording and theological texture better than an
    interpretive expansion.
