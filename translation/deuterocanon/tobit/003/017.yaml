id: TOB.3.17
reference: Tobit 3:17
source:
  edition: lxx-swete-1909
  text: τοῦ μεγάλου Ῥαφαήλ, καὶ ἀπεστάλη ἰάσασθαι τοὺς δύο, τοῦ Τωβείτ λεπίσαι τὰ
    λευκώματα, καὶ Σάρραν τὴν τοῦ Ῥαγουὴλ δοῦναι Τωβίᾳ τῷ υἱῷ Τωβείτ γυναῖκα, καὶ
    δῆσαι Ἀσμοδαῖον τὸ πονηρὸν δαιμόνιον, διότι Τωβία ἐπιβάλλει κληρονομῆσαι αὐτήν.
    ἐν αὐτῷ τῷ καιρῷ ἐπιστρέψας Τωβείτ εἰσῆλθεν εἰς τὸν οἶκον αὐτοῦ, καὶ Σάρρα ἡ τοῦ
    Ῥαγουὴλ κατέβη ἐκ τοῦ ὑπερῴου αὐτῆς.
  language: Greek
  pages:
  - 832
  - 835
  - 836
  - 837
  - 838
  - 839
  - 840
  - 841
  confidence: high
  validation: agree
translation:
  text: 'of the great Raphael. And he was sent to heal the two: to remove the white
    films from Tobit''s eyes, and to give Sarah daughter of Raguel to Tobiah son of
    Tobit as a wife, and to bind Asmodeus, the evil demon, because Tobiah was entitled
    to inherit her. At that same time Tobit returned and entered into his house, and
    Sarah daughter of Raguel came down from her upper room.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'because Tobiah had the right to marry her.' The
      Greek says 'inherit her,' reflecting the legal-family framework of the story.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ῥαφαήλ
  chosen: Raphael
  rationale: Personal name transliterated per project philosophy. The preceding genitive
    phrase is carried over as 'of the great Raphael' to reflect the Greek construction
    linking this clause to the prior context.
- source_word: ἀπεστάλη
  chosen: he was sent
  alternatives:
  - was dispatched
  lexicon: BDAG
  rationale: Aorist passive of ἀποστέλλω naturally renders as 'was sent.' The passive
    leaves the implied divine sender unstated, as in the Greek.
- source_word: ἰάσασθαι
  chosen: to heal
  alternatives:
  - to cure
  lexicon: BDAG
  rationale: Standard rendering for the infinitive; broad enough to cover both physical
    healing and deliverance actions named in the verse.
- source_word: τοὺς δύο
  chosen: the two
  alternatives:
  - both of them
  lexicon: BDAG
  rationale: Keeps the concise Greek expression and preserves the link to Tobit and
    Sarah as the two recipients of divine intervention.
- source_word: λεπίσαι τὰ λευκώματα
  chosen: to remove the white films from Tobit's eyes
  alternatives:
  - to peel away the whiteness
  - to remove the cataracts
  lexicon: LSJ
  rationale: λεπίσαι literally suggests peeling/scaling off, and λευκώματα refers
    to white opacities on the eyes. 'White films' is medically intelligible without
    overcommitting to the modern diagnosis 'cataracts,' which is interpretive.
- source_word: δοῦναι ... γυναῖκα
  chosen: to give Sarah ... to Tobiah ... as a wife
  alternatives:
  - to give Sarah ... in marriage to Tobiah
  - to give Tobiah Sarah as wife
  lexicon: BDAG
  rationale: Reflects the Greek infinitive construction and the marital sense of γυναῖκα
    here. 'As a wife' is idiomatic and preserves the ancient marital formula.
- source_word: δῆσαι
  chosen: to bind
  alternatives:
  - to restrain
  - to tie up
  lexicon: BDAG
  rationale: '''Bind'' is the direct and traditional sense, fitting the demon-restraining
    action without paraphrase.'
- source_word: τὸ πονηρὸν δαιμόνιον
  chosen: the evil demon
  alternatives:
  - the wicked demon
  lexicon: BDAG
  rationale: Straightforward rendering of adjective plus noun; 'evil' is the most
    natural English equivalent for πονηρόν in this context.
- source_word: ἐπιβάλλει κληρονομῆσαι αὐτήν
  chosen: was entitled to inherit her
  alternatives:
  - had the right to receive her as heir
  - was next in line to marry her
  lexicon: LSJ
  rationale: The idiom indicates legal claim or priority. Because αὐτήν refers to
    Sarah in the marriage context, 'inherit her' sounds unusual in English but reflects
    the source's legal-marital framework better than a smoother paraphrase. 'Was entitled'
    captures the force of ἐπιβάλλει as having a claim.
- source_word: ἐν αὐτῷ τῷ καιρῷ
  chosen: At that same time
  alternatives:
  - At that very time
  - At the same moment
  lexicon: BDAG
  rationale: Natural temporal marker preserving the narrative simultaneity emphasized
    by the Greek.
- source_word: ἐπιστρέψας
  chosen: returned
  alternatives:
  - turned back
  lexicon: BDAG
  rationale: Context favors the narrative sense 'returned' rather than the more literal
    but less idiomatic 'turned back.'
- source_word: εἰσῆλθεν εἰς τὸν οἶκον αὐτοῦ
  chosen: entered into his house
  alternatives:
  - went into his house
  - entered his house
  lexicon: BDAG
  rationale: Keeps the motion explicit. Slightly fuller phrasing reflects the Greek
    preposition εἰς, though still readable English.
- source_word: τὸ ὑπερῷον
  chosen: upper room
  alternatives:
  - upstairs room
  - roof chamber
  lexicon: LSJ
  rationale: '''Upper room'' is the standard and clear rendering for ὑπερῷον, preserving
    the architectural sense without overexplaining.'
