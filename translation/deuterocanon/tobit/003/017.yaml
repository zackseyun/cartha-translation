theological_decisions:
- issue: Nature of Raphael's mission
  chosen_reading: The verse presents Raphael as divinely sent to heal both Tobit and
    Sarah through multiple concrete actions.
  alternative_readings:
  - The healing language could be narrowed to Tobit's physical cure alone, with Sarah's
    deliverance treated separately.
  rationale: The infinitive ἰάσασθαι governs the whole sequence concerning 'the two,'
    so the translation preserves the broader scope of healing/deliverance rather than
    restricting it to eyesight.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
- issue: κληρονομῆσαι αὐτήν in relation to Sarah
  chosen_reading: Rendered as 'was entitled to inherit her' in the main text, preserving
    the legal-marital idiom.
  alternative_readings:
  - was next in line to marry her
  - had the right to take her as wife
  rationale: The Greek uses inheritance language in a marriage context. Rather than
    flattening the legal nuance into mere romance or generic marriageability, the
    main text keeps the inheritance concept, while a footnote preserves a more idiomatic
    explanatory alternative.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    significant lexical decisions.
