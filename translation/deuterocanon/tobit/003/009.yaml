id: TOB.3.9
reference: Tobit 3:9
source:
  edition: lxx-swete-1909
  text: τί ἡμᾶς μαστιγοῖς; εἰ ἀπέθαναν, βάδιζε μετʼ αὐτῶν· μὴ ἴδωμέν σου υἱὸν ἢ θυγατέρα
    εἰς τὸν αἰῶνα.
  language: Greek
  pages:
  - 832
  - 835
  - 836
  - 837
  - 838
  - 839
  - 840
  - 841
  confidence: high
  validation: agree
translation:
  text: Why do you flog us? If they have died, go with them! May we never see from
    you a son or daughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly by implication, 'go die with them.' The Greek says only
      'go with them,' but the dead husbands are in view.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαστιγοῖς
  chosen: flog
  alternatives:
  - beat
  - whip
  - scourge
  lexicon: LSJ
  rationale: The verb literally denotes whipping or scourging. 'Flog' preserves the
    harsh, abusive force of the insult better than the broader 'beat' while remaining
    idiomatic modern English.
- source_word: βάδιζε μετʼ αὐτῶν
  chosen: go with them
  alternatives:
  - walk with them
  - be off with them
  lexicon: LSJ
  rationale: βάδιζε is an imperative of going/walking. In context the speaker is telling
    Sarah to join her dead husbands in death; 'go with them' is the most natural English
    rendering without over-paraphrasing.
- source_word: μὴ ἴδωμέν
  chosen: May we never see
  alternatives:
  - let us not see
  - may we not see
  lexicon: LSJ
  rationale: The aorist subjunctive with μή expresses a strong wish or imprecation.
    'May we never see' captures the curse-like force and the phrase εἰς τὸν αἰῶνα.
- source_word: σου υἱὸν ἢ θυγατέρα
  chosen: from you a son or daughter
  alternatives:
  - your son or daughter
  - a son or daughter of yours
  lexicon: LSJ
  rationale: The genitive σου can be rendered possessively, but in English 'see from
    you a son or daughter' better reflects the sense of offspring issuing from her,
    fitting the servant girl's taunt about Sarah never bearing children.
- source_word: εἰς τὸν αἰῶνα
  chosen: never
  alternatives:
  - forever
  - for all time
  - unto the age
  lexicon: LSJ
  rationale: In this imprecatory context the idiomatic English equivalent is 'never.'
    'Forever' is possible but less natural with 'see' in English.
