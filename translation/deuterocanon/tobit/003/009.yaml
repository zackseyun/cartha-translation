theological_decisions:
- issue: Implied reference of 'go with them'
  chosen_reading: The line is rendered as a hostile wish that Sarah join her dead
    husbands in death, without making the implication more explicit in the main text.
  alternative_readings:
  - A more explicit rendering such as 'go die with them'
  rationale: The Greek states only 'go with them.' The death-reference is contextually
    clear, but making it explicit in the main text would add wording not present in
    the source. Optimal equivalence preserves the insult's force without interpretive
    expansion.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
