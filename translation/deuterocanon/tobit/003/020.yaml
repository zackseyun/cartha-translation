id: TOB.3.20
reference: Tobit 3:20
source:
  edition: lxx-swete-1909
  text: καὶ νῦν ἐπιδεικνύω σοι τὰ δέκα τάλαντα τοῦ ἀργυρίου ἃ παρεθέμην Γαβαήλῳ τῷ
    τοῦ Γαβρεία ἐν Ῥάγοις τῆς Μηδείας.
  language: Greek
  pages:
  - 842
  validation: no_reference
translation:
  text: And now I am showing you the ten talents of silver that I deposited with Gabael
    son of Gabrias in Rages of Media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am making known to you' for ἐπιδεικνύω; the Greek verb can emphasize
      drawing someone's attention to the matter rather than physically displaying
      it.
    reason: lexical_alternative
  - marker: b
    text: '''Rages'' is also often spelled ''Rhages'' in English transliteration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιδεικνύω
  chosen: am showing
  alternatives:
  - show
  - point out
  - make known
  lexicon: LSJ
  rationale: The present tense is retained with a progressive English form for naturalness.
    The verb can mean to show or point out; here the speaker is drawing attention
    to the money in a direct, immediate way.
- source_word: τὰ δέκα τάλαντα τοῦ ἀργυρίου
  chosen: the ten talents of silver
  alternatives:
  - the ten silver talents
  - the ten talents in silver
  lexicon: LSJ
  rationale: A fairly formal rendering preserves both the amount and the material.
    'Talents' is kept rather than converted into a modern unit because it is an ancient
    weight/money term and translational transparency is preferable.
- source_word: παρεθέμην
  chosen: I deposited
  alternatives:
  - I entrusted
  - I placed in safekeeping
  lexicon: LSJ
  rationale: The middle form here refers to placing funds with another for safekeeping.
    'Deposited' fits the financial context better than the broader 'entrusted,' while
    still reflecting the act of committing money to another's care.
- source_word: Γαβαήλῳ
  chosen: Gabael
  alternatives:
  - Gabaael
  rationale: Personal names are transliterated rather than translated. 'Gabael' is
    a standard English transliteration from the Greek form given in the source.
- source_word: τῷ τοῦ Γαβρεία
  chosen: son of Gabrias
  alternatives:
  - the son of Gabria
  - of the family of Gabrias
  lexicon: LSJ
  rationale: The article with τοῦ plus a personal name is a Greek way of identifying
    someone by his father. In idiomatic English this is best rendered 'son of Gabrias.'
- source_word: ἐν Ῥάγοις τῆς Μηδείας
  chosen: in Rages of Media
  alternatives:
  - in Rhages of Media
  - in Rages in Media
  rationale: The place name is transliterated. 'Of Media' closely follows the genitive
    construction and preserves the ancient geographical designation.
