translation:
  text: When she heard these things, she was deeply grieved, so that she wanted to
    hang herself. But she said, “I am my father’s only child. If I do this, it will
    be a disgrace to him, and I will bring his old age down with sorrow to Hades.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the realm of the dead” or “to the grave.” The Greek reads “to Hades.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα ἀκούσασα
  chosen: When she heard these things
  alternatives:
  - After hearing these things
  - On hearing these things
  lexicon: LSJ
  rationale: A natural temporal participial rendering in English. 'These things' preserves
    the demonstrative without over-specifying the content.
- source_word: ἐλυπήθη σφόδρα
  chosen: she was deeply grieved
  alternatives:
  - she was very distressed
  - she was exceedingly sorrowful
  lexicon: LSJ
  rationale: λυπέω here denotes emotional pain or grief; 'deeply grieved' is idiomatic
    modern English and preserves the force of σφόδρα.
- source_word: ὥστε ἀπάγξασθαι
  chosen: so that she wanted to hang herself
  alternatives:
  - to the point of hanging herself
  - so that she resolved to hang herself
  lexicon: LSJ
  rationale: The infinitive with ὥστε expresses result tending toward contemplated
    action. Since the following clause shows she does not carry it out but reasons
    against it, 'wanted to hang herself' best captures the sense without overstating
    it as completed resolve.
- source_word: Μία μέν εἰμι τῷ πατρί μου
  chosen: I am my father’s only child
  alternatives:
  - I am alone to my father
  - I am my father’s one daughter
  lexicon: LSJ
  rationale: The idiom means she is her father's sole child/only one. 'Only child'
    communicates the familial sense clearly in modern English. 'Only daughter' is
    possible by context, but the Greek says simply 'one/only' and does not explicitly
    repeat 'daughter.'
- source_word: ὄνειδος αὐτῷ ἔσται
  chosen: it will be a disgrace to him
  alternatives:
  - it will be a reproach to him
  - it will bring him shame
  lexicon: LSJ
  rationale: ὄνειδος denotes reproach, disgrace, or shame. 'Disgrace' fits the social-honor
    context and reads naturally.
- source_word: τὸ γῆρας αὐτοῦ κατάξω
  chosen: I will bring his old age down
  alternatives:
  - I will bring down his old age
  - I will send his old age down
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the idiom, which is completed by
    the destination phrase 'to Hades.' The subject is Sarah speaking of what her action
    would do to her father.
- source_word: μετʼ ὀδύνης
  chosen: with sorrow
  alternatives:
  - in grief
  - with pain
  lexicon: LSJ
  rationale: ὀδύνη can denote pain or grief; in this filial and funerary context 'sorrow'
    best conveys emotional anguish.
- source_word: εἰς ᾅδου
  chosen: to Hades
  alternatives:
  - to the grave
  - to the realm of the dead
  lexicon: LSJ
  rationale: The Greek explicitly has ᾅδης. Following the project's principle of original-language
    primacy, 'Hades' is retained rather than flattened to 'grave,' while remaining
    understandable in context.
