id: TOB.3.10
reference: Tobit 3:10
source:
  edition: lxx-swete-1909
  text: ταῦτα ἀκούσασα ἐλυπήθη σφόδρα ὥστε ἀπάγξασθαι· καὶ εἶπεν Μία μέν εἰμι τῷ πατρί
    μου· ἐὰν ποιήσω τοῦτο, ὄνειδος αὐτῷ ἔσται, καὶ τὸ γῆρας αὐτοῦ κατάξω μετʼ ὀδύνης
    εἰς ᾅδου.
