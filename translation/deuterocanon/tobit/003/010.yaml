theological_decisions:
- issue: Rendering of ᾅδης in a deuterocanonical Greek context
  chosen_reading: Hades
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The source text names ᾅδης explicitly. 'Hades' preserves the Greek term
    and avoids importing a more specific doctrinal concept such as 'hell.' A lexical
    alternative is preserved in a footnote for readers who may understand it as the
    underworld or realm of the dead rather than a proper name.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
