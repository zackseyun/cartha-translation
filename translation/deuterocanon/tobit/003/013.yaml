theological_decisions:
- issue: Idiomatic expression for death in a prayer to God
  chosen_reading: release me from the earth
  alternative_readings:
  - take me from the earth
  - remove me from the earth
  rationale: The Greek uses ἀπολῦσαί με ἀπὸ τῆς γῆς, literally 'release me from the
    earth.' This likely functions as a reverent, indirect request for death. The main
    text preserves the metaphor rather than resolving it into an explicit doctrinal
    statement about death beyond what the source says.
  doctrine_reference: Preserve theological tension rather than resolve it.
