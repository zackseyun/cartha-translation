id: TOB.3.18
reference: Tobit 3:18
source:
  edition: lxx-swete-1909
  text: συμβουλίαν παρὰ παντὸς φρονίμου ζήτησον, καὶ μὴ καταφρονήσῃς ἐπὶ πάσης συμβουλίας
    χρησίμης.
  language: Greek
  pages:
  - 842
  validation: no_reference
translation:
  text: Seek counsel from every wise person, and do not despise any useful counsel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not disregard any beneficial counsel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συμβουλίαν
  chosen: counsel
  alternatives:
  - advice
  - guidance
  lexicon: BDAG
  rationale: The noun denotes counsel/advice given for decision-making. 'Counsel'
    fits the imperative 'seek' naturally in English and preserves the deliberative
    sense better than the more casual 'advice' in the first clause.
- source_word: παρὰ παντὸς φρονίμου
  chosen: from every wise person
  alternatives:
  - from every prudent person
  - from every sensible person
  - from every wise man
  lexicon: BDAG
  rationale: παρά with the genitive indicates source, 'from.' φρόνιμος means wise,
    prudent, sensible. 'Wise person' is clear modern English and avoids narrowing
    the generic expression to males where the Greek adjective is substantival and
    generic.
- source_word: ζήτησον
  chosen: Seek
  alternatives:
  - ask for
  - look for
  lexicon: BDAG
  rationale: The aorist imperative calls for active pursuit. 'Seek' preserves the
    force and works idiomatically with 'counsel.'
- source_word: μὴ καταφρονήσῃς
  chosen: do not despise
  alternatives:
  - do not disregard
  - do not look down on
  lexicon: BDAG
  rationale: καταφρονέω carries the sense of treating with contempt or disdain. 'Despise'
    preserves the stronger moral force better than the softer 'disregard.'
- source_word: ἐπὶ πάσης συμβουλίας χρησίμης
  chosen: any useful advice
  alternatives:
  - every useful counsel
  - any beneficial counsel
  lexicon: BDAG
  rationale: The phrase refers broadly to beneficial counsel. Rendering συμβουλία
    as 'advice' here avoids awkward repetition of 'counsel' in English while preserving
    the meaning; 'useful' is the straightforward sense of χρησίμης. 'Any' communicates
    the distributive force naturally in English.
