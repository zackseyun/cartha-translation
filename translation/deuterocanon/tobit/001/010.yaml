theological_decisions:
- issue: Ethno-religious force of ἐθνῶν
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: In Tobit's Jewish exile setting, the contrast is between Israelites and
    non-Israelites, with dietary/religious implications. 'Gentiles' better conveys
    that force in English.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; readable modern English'
- issue: Whether to make the dietary concern explicit in the main text
  chosen_reading: Keep the literal 'bread of the Gentiles' without adding 'unclean'
  alternative_readings:
  - the unclean food of the Gentiles
  - Gentile food
  rationale: The Greek itself does not explicitly say 'unclean' in this clause. The
    narrative implication can be inferred from context and the next verse, so the
    translation should not import the interpretation into the main text.
  doctrine_reference: 'DOCTRINE.md: Never import doctrinal claims the text does not
    make'
