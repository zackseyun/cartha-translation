    text: ויהי כאשר שמע סנחריב את הדבר הזה ויחר אפו עלי מאד ויצו לתפוש אותי ואת חנה
      אשתי וטוביה בני ויבקש להרגני בזעפו וכאשר נודע לי הדבר הזה ברחתי מפניו ויצו לשלול
      את כל אשר לי ונסתרתי מפניו עד אשר צעקו עלי אלמנות ישראל ויתומיו במר נפשם ובצום
      ובבכי ונגע אל השמים משפטו ונשא עד שחקים וימכרהו אל ישראל ביד שני בניו ויהרגוהו
      בחרב כי שאל את יועציו ולזקניו על מה קנא הק'ב'ה על ישראל ועל ירושלם והשמיד מלאך
      יי את חיל פרעה ואת כל בכורי מצרים והבחורי' אשר נתן יי להם תמיד ישועה על ידם
      ויאמרו לו חכמיו ויועציו כי אברהם אביהם של ישראל הוליך לשחוט את בנו אולי יתרצה
      בו לפני יי אלהיו על כך קנא על בניו ויעש בעבדיך נקמה.
