translation:
  text: And when we were taken captive to Nineveh, all my brothers and those of my
    kindred ate from the bread of the Gentiles;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the food of the Gentiles.' The Greek says literally 'the breads of the
      Gentiles,' an idiom for food provisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾐχμαλωτίσθημεν
  chosen: we were taken captive
  alternatives:
  - we were led away captive
  - we were exiled
  lexicon: BDAG
  rationale: The passive aorist indicates being carried off in captivity. 'Taken captive'
    is clear modern English and preserves the forced nature better than the broader
    'exiled.'
- source_word: εἰς Νινευή
  chosen: to Nineveh
  alternatives:
  - into Nineveh
  lexicon: BDAG
  rationale: With a verb of movement, εἰς naturally marks destination. 'To Nineveh'
    is idiomatic English.
- source_word: πάντες οἱ ἀδελφοί μου
  chosen: all my brothers
  alternatives:
  - all my brethren
  - all my kinsmen
  lexicon: BDAG
  rationale: ἀδελφοί here most naturally refers to male family/community members in
    Tobit's narrative setting. 'Brothers' is gender-accurate to the Greek and fits
    the immediate contrast with 'those of my kin.'
- source_word: οἱ ἐκ τοῦ γένους
  chosen: those of my kin
  alternatives:
  - those from my family line
  - those of my clan
  - those of my race
  lexicon: BDAG
  rationale: γένος denotes family stock, lineage, or kin-group. 'Those of my kin'
    is natural English and avoids the misleading modern connotations of 'race' while
    preserving the broader familial sense beyond immediate brothers.
- source_word: ἤσθιον
  chosen: ate
  alternatives:
  - were eating
  - used to eat
  lexicon: BDAG
  rationale: The imperfect can suggest customary action, but in English the simple
    past here reads naturally in narrative while still allowing the sense that this
    was their practice in exile.
- source_word: ἐκ τῶν ἄρτων τῶν ἐθνῶν
  chosen: from the bread of the Gentiles
  alternatives:
  - the food of the Gentiles
  - from the loaves of the nations
  - from Gentile bread
  lexicon: BDAG
  rationale: ἄρτων is literally 'breads/loaves,' but in context refers to food provisions.
    Retaining 'bread' preserves the concrete idiom and the likely concern over food
    associated with Gentiles. ἐθνῶν is best rendered 'Gentiles' in this Jewish identity
    context rather than the more generic 'nations.'
