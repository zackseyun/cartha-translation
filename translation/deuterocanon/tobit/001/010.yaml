  text: καὶ ὅτε ᾐχμαλωτίσθημεν εἰς Νινευή, πάντες οἱ ἀδελφοί μου καὶ οἱ ἐκ τοῦ γένους
    ἤσθιον ἐκ τῶν ἄρτων τῶν ἐθνῶν·
  language: Greek
